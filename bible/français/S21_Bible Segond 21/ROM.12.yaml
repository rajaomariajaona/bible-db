document_id: ROM.12,152
type_code: fra
verses:
  '1':
  - type: heading
    content: La vie nouvelle
  - type: heading
    content: 12.1–16.27
  - type: heading
    content: De nouveaux comportements
  - type: text
    content: 'Je vous encourage donc, frères et sœurs, par les compassions de Dieu, à offrir votre corps comme un sacrifice vivant, saint, agréable à Dieu. Ce sera de votre part un culte raisonnable. '
  '10':
  - type: text
    content: 'Par amour fraternel soyez pleins d''affection les uns pour les autres et rivalisez d''estime réciproque. '
  '11':
  - type: text
    content: 'Ayez du zèle, et non de la paresse. Soyez fervents d''esprit et servez le Seigneur. '
  '12':
  - type: text
    content: 'Réjouissez-vous dans l''espérance et soyez patients dans la détresse. Persévérez dans la prière. '
  '13':
  - type: text
    content: Pourvoyez aux besoins des saints et exercez l'hospitalité avec empressement.
  '14':
  - type: text
    content: 'Bénissez ceux qui vous persécutent, bénissez et ne maudissez pas. '
  '15':
  - type: text
    content: 'Réjouissez-vous avec ceux qui se réjouissent, pleurez avec ceux qui pleurent. '
  '16':
  - type: text
    content: 'Vivez en plein accord les uns avec les autres. N''aspirez pas à ce qui est élevé, mais laissez-vous attirer par ce qui est humble. '
  - type: text
    content: Ne vous prenez pas pour des sages
  - type: text
    content: .
  - type: note
    content: 'Ne vous… sages: citation de Proverbes 3.7.'
  '17':
  - type: text
    content: 'Ne rendez à personne le mal pour le mal. Recherchez ce qui est bien devant tous les hommes. '
  '18':
  - type: text
    content: 'Si cela est possible, dans la mesure où cela dépend de vous, soyez en paix avec tous les hommes. '
  '19':
  - type: text
    content: 'Ne vous vengez pas vous-mêmes, bien-aimés, mais laissez agir la colère de Dieu, car il est écrit: '
  - type: text
    content: C'est à moi qu'appartient la vengeance, c'est moi qui donnerai à chacun ce qu'il mérite, dit le Seigneur
  - type: text
    content: .
  - type: note
    content: 'C''est à moi… Seigneur: citation de Deutéronome 32.35.'
  - type: text
    content: ' '
  '2':
  - type: text
    content: Ne vous conformez pas au monde actuel, mais soyez transformés par le renouvellement de l'intelligence afin de discerner quelle est la volonté de Dieu, ce qui est bon, agréable et parfait.
  '20':
  - type: text
    content: Mais si ton ennemi a faim, donne-lui à manger, s'il a soif, donne-lui à boire, car en agissant ainsi, tu amasseras des charbons ardents sur sa tête
  - type: text
    content: .
  - type: note
    content: 'Mais si… tête: citation de Proverbes 25.21-22.'
  - type: text
    content: ' '
  '21':
  - type: text
    content: Ne te laisse pas vaincre par le mal, mais sois vainqueur du mal par le bien.
  '3':
  - type: text
    content: 'Par la grâce qui m''a été donnée, je dis à chacun de vous de ne pas avoir une trop haute opinion de lui-même, mais de garder des sentiments modestes, chacun selon la mesure de foi que Dieu lui a donnée. '
  '4':
  - type: text
    content: 'En effet, de même que nous avons plusieurs membres dans un seul corps et que tous les membres n''ont pas la même fonction, '
  '5':
  - type: text
    content: 'de même, nous qui sommes plusieurs, nous formons un seul corps en Christ et nous sommes tous membres les uns des autres, chacun pour sa part. '
  '6':
  - type: text
    content: 'Nous avons des dons différents, selon la grâce qui nous a été accordée. Si quelqu''un a le don de prophétie, qu''il l''exerce en accord avec la foi; '
  '7':
  - type: text
    content: 'si un autre est appelé à servir, qu''il se consacre à son service. Que celui qui enseigne se donne à son enseignement, '
  '8':
  - type: text
    content: et celui qui a le don d'encourager à l'encouragement. Que celui qui donne le fasse avec générosité, celui qui préside, avec zèle, et que celui qui exerce la bienveillance le fasse avec joie.
  '9':
  - type: text
    content: 'Que l''amour soit sans hypocrisie. Ayez le mal en horreur, attachez-vous au bien. '
