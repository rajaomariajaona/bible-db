document_id: ISA.66
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Gloire de la Jérusalem future
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Voici ce que dit l''Eternel: *Le ciel est mon trône,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la terre mon marchepied.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quelle maison pourrez-vous me construire
- type: usfm
  marker: q1
  children:
  - type: text
    text: et quel endroit pourra être mon lieu de repos?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tout cela, c'est ma main qui l'a fait
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '66.1-2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le ciel… l''a fait: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Actes 7.49-50
      metadata:
        usfm: ACT.7.49+ACT.7.50
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' par Etienne et partiellement en Matthieu 5.34-35.'
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tout a alors reçu l'existence, déclare l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Voici sur qui je porterai les regards:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur celui qui est humble et a l'esprit abattu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur celui qui fait preuve de respect vis-à-vis de ma parole.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Celui qui égorge un bœuf abat un homme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: celui qui sacrifie un agneau brise la nuque d'un chien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: celui qui présente une offrande verse du sang de porc,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'celui qui fait brûler de l''encens adore des idoles:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous ceux-là ont choisi de suivre leurs propres voies
- type: usfm
  marker: q1
  children:
  - type: text
    text: et trouvent du plaisir dans leurs monstruosités.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Moi aussi, je choisirai de les abandonner à leurs caprices
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je ferai venir sur eux ce qui cause leur frayeur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce que j'ai appelé et qu'ils n'ont pas répondu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce que j'ai parlé et qu'ils n'ont pas écouté.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au contraire, ils ont fait ce qui est mal à mes yeux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils ont choisi ce qui ne me plaît pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ecoutez la parole de l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous qui faites preuve de respect envers sa parole.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voici ce que disent vos frères,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ceux qui vous détestent et vous repoussent
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'à cause de mon nom: «Que l''Eternel montre sa gloire'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que nous voyions votre joie!»
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cependant, c'est eux qui seront couverts de honte.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Un tapage provient de la ville,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'un bruit sort du temple:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est celui que fait l'Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: en rendant à ses ennemis ce qu'ils méritent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Avant de se tordre de douleur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle a accouché;
- type: usfm
  marker: q1
  children:
  - type: text
    text: avant de connaître la souffrance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle a donné naissance à un fils!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Qui a déjà entendu pareille nouvelle?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui a déjà vu quelque chose de semblable?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Un pays peut-il naître en un seul jour?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Une nation peut-elle naître d'un seul coup?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourtant, à peine en train d'accoucher, Sion a mis ses fils au monde!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Est-ce moi qui ouvrirais le ventre maternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour ne pas laisser un enfant naître? dit l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moi qui fais naître,
- type: usfm
  marker: q1
  children:
  - type: text
    text: empêcherais-je d'accoucher? dit ton Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Réjouissez-vous avec Jérusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: faites d'elle le sujet de votre allégresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous tous qui l'aimez!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Exprimez votre joie avec elle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous tous qui meniez deuil sur elle!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ainsi vous vous nourrirez à satiété
- type: usfm
  marker: q1
  children:
  - type: text
    text: à sa poitrine consolatrice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ainsi vous savourerez avec bonheur
- type: usfm
  marker: q1
  children:
  - type: text
    text: la plénitude de sa gloire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'En effet, voici ce que dit l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je dirigerai la paix vers elle comme un fleuve,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la gloire des nations comme un torrent qui déborde,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et vous serez allaités,
- type: usfm
  marker: q1
  children:
  - type: text
    text: portés sur les bras
- type: usfm
  marker: q1
  children:
  - type: text
    text: et caressés sur les genoux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tout comme un homme est consolé par sa mère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je vous consolerai moi-même;
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous recevrez la consolation dans Jérusalem.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Lorsque vous verrez cela, votre cœur sera dans la joie
- type: usfm
  marker: q1
  children:
  - type: text
    text: et vos os retrouveront de la vigueur comme le fait l'herbe.
- type: usfm
  marker: q1
  children:
  - type: text
    text: L'Eternel manifestera sa puissance à ses serviteurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il fera sentir sa colère à ses ennemis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Oui, voici l'Eternel! Il arrive dans un feu
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ses chars sont comme un tourbillon;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il manifeste sa colère dans un brasier
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ses menaces par des flammes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: C'est par le feu, par son épée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que l'Eternel juge toute créature,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ses victimes seront nombreuses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ceux qui se consacrent et se purifient pour aller dans les jardins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: en disciples de l'idole qui est parmi eux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui mangent de la viande de porc,
- type: usfm
  marker: q1
  children:
  - type: text
    text: des choses monstrueuses et des souris,
- type: usfm
  marker: q1
  children:
  - type: text
    text: disparaîtront tous ensemble, déclare l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Moi, je connais leurs actes et leurs pensées.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je viens rassembler toutes les nations de toutes les langues;
- type: usfm
  marker: q1
  children:
  - type: text
    text: elles viendront et verront ma gloire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Je mettrai un signe au milieu d'elles
- type: usfm
  marker: q1
  children:
  - type: text
    text: et j'enverrai plusieurs de leurs rescapés vers les autres nations
- type: usfm
  marker: q1
  children:
  - type: text
    text: – Tarsis, Pul et Lud, les peuples qui tirent à l'arc,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tubal, la Grèce
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les îles lointaines,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les hommes qui n'ont jamais entendu parler de moi
- type: usfm
  marker: q1
  children:
  - type: text
    text: ni vu ma gloire –
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils révéleront ma gloire parmi les nations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ils amèneront tous vos frères, issus de toutes les nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: en offrande à l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils les amèneront sur des chevaux, des chars, des litières,
- type: usfm
  marker: q1
  children:
  - type: text
    text: des mulets ou des dromadaires
- type: usfm
  marker: q1
  children:
  - type: text
    text: à ma montagne sainte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à Jérusalem, dit l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tout comme les Israélites amènent leur offrande
- type: usfm
  marker: q1
  children:
  - type: text
    text: à la maison de l'Eternel sur des plats purifiés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Parmi eux aussi, je prendrai
- type: usfm
  marker: q1
  children:
  - type: text
    text: des prêtres et des Lévites, dit l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: En effet, le nouveau ciel
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la nouvelle terre que je vais créer
- type: usfm
  marker: q1
  children:
  - type: text
    text: subsisteront devant moi, déclare l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: De la même manière, votre descendance et votre nom subsisteront.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: A chaque début de mois et à chaque sabbat,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tout être vivant viendra se prosterner devant moi, dit l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: et quand on sortira, on verra
- type: usfm
  marker: q1
  children:
  - type: text
    text: les cadavres des hommes qui se sont rebellés contre moi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: En effet, *leur ver ne mourra pas et leur feu ne s'éteindra pas
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '66.24 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Leur ver… s''éteindra pas: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'image reprise par Jésus en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Marc 9.44
      metadata:
        usfm: MRK.9.44
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '46'
      metadata:
        usfm: MRK.9.46
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '48'
      metadata:
        usfm: MRK.9.48
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' à propos de l''enfer.'
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils seront pour chacun un objet d'horreur.
