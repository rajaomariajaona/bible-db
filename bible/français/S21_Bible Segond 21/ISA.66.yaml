document_id: ISA.66,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Gloire de la Jérusalem future
  - type: text
    content: 'Voici ce que dit l''Eternel: *Le ciel est mon trône,'
  - type: text
    content: et la terre mon marchepied.
  - type: text
    content: Quelle maison pourrez-vous me construire
  - type: text
    content: et quel endroit pourra être mon lieu de repos?
  '10':
  - type: text
    content: Réjouissez-vous avec Jérusalem,
  - type: text
    content: faites d'elle le sujet de votre allégresse,
  - type: text
    content: vous tous qui l'aimez!
  - type: text
    content: Exprimez votre joie avec elle,
  - type: text
    content: vous tous qui meniez deuil sur elle!
  '11':
  - type: text
    content: Ainsi vous vous nourrirez à satiété
  - type: text
    content: à sa poitrine consolatrice,
  - type: text
    content: ainsi vous savourerez avec bonheur
  - type: text
    content: la plénitude de sa gloire.
  '12':
  - type: text
    content: 'En effet, voici ce que dit l''Eternel:'
  - type: text
    content: Je dirigerai la paix vers elle comme un fleuve,
  - type: text
    content: et la gloire des nations comme un torrent qui déborde,
  - type: text
    content: et vous serez allaités,
  - type: text
    content: portés sur les bras
  - type: text
    content: et caressés sur les genoux.
  '13':
  - type: text
    content: Tout comme un homme est consolé par sa mère,
  - type: text
    content: je vous consolerai moi-même;
  - type: text
    content: vous recevrez la consolation dans Jérusalem.
  '14':
  - type: text
    content: Lorsque vous verrez cela, votre cœur sera dans la joie
  - type: text
    content: et vos os retrouveront de la vigueur comme le fait l'herbe.
  - type: text
    content: L'Eternel manifestera sa puissance à ses serviteurs,
  - type: text
    content: et il fera sentir sa colère à ses ennemis.
  '15':
  - type: text
    content: Oui, voici l'Eternel! Il arrive dans un feu
  - type: text
    content: et ses chars sont comme un tourbillon;
  - type: text
    content: il manifeste sa colère dans un brasier
  - type: text
    content: et ses menaces par des flammes.
  '16':
  - type: text
    content: C'est par le feu, par son épée,
  - type: text
    content: que l'Eternel juge toute créature,
  - type: text
    content: et ses victimes seront nombreuses.
  '17':
  - type: text
    content: Ceux qui se consacrent et se purifient pour aller dans les jardins,
  - type: text
    content: en disciples de l'idole qui est parmi eux,
  - type: text
    content: qui mangent de la viande de porc,
  - type: text
    content: des choses monstrueuses et des souris,
  - type: text
    content: disparaîtront tous ensemble, déclare l'Eternel.
  '18':
  - type: text
    content: Moi, je connais leurs actes et leurs pensées.
  - type: text
    content: Je viens rassembler toutes les nations de toutes les langues;
  - type: text
    content: elles viendront et verront ma gloire.
  '19':
  - type: text
    content: Je mettrai un signe au milieu d'elles
  - type: text
    content: et j'enverrai plusieurs de leurs rescapés vers les autres nations
  - type: text
    content: – Tarsis, Pul et Lud, les peuples qui tirent à l'arc,
  - type: text
    content: Tubal, la Grèce
  - type: text
    content: et les îles lointaines,
  - type: text
    content: les hommes qui n'ont jamais entendu parler de moi
  - type: text
    content: ni vu ma gloire –
  - type: text
    content: et ils révéleront ma gloire parmi les nations.
  '2':
  - type: text
    content: Tout cela, c'est ma main qui l'a fait
  - type: note
    content: 'Le ciel… l''a fait: cité en Actes 7.49-50 par Etienne et partiellement en Matthieu 5.34-35.'
  - type: text
    content: ','
  - type: text
    content: et tout a alors reçu l'existence, déclare l'Eternel.
  - type: text
    content: 'Voici sur qui je porterai les regards:'
  - type: text
    content: sur celui qui est humble et a l'esprit abattu,
  - type: text
    content: sur celui qui fait preuve de respect vis-à-vis de ma parole.
  '20':
  - type: text
    content: Ils amèneront tous vos frères, issus de toutes les nations,
  - type: text
    content: en offrande à l'Eternel.
  - type: text
    content: Ils les amèneront sur des chevaux, des chars, des litières,
  - type: text
    content: des mulets ou des dromadaires
  - type: text
    content: à ma montagne sainte,
  - type: text
    content: à Jérusalem, dit l'Eternel,
  - type: text
    content: tout comme les Israélites amènent leur offrande
  - type: text
    content: à la maison de l'Eternel sur des plats purifiés.
  '21':
  - type: text
    content: Parmi eux aussi, je prendrai
  - type: text
    content: des prêtres et des Lévites, dit l'Eternel.
  '22':
  - type: text
    content: En effet, le nouveau ciel
  - type: text
    content: et la nouvelle terre que je vais créer
  - type: text
    content: subsisteront devant moi, déclare l'Eternel.
  - type: text
    content: De la même manière, votre descendance et votre nom subsisteront.
  '23':
  - type: text
    content: A chaque début de mois et à chaque sabbat,
  - type: text
    content: tout être vivant viendra se prosterner devant moi, dit l'Eternel,
  '24':
  - type: text
    content: et quand on sortira, on verra
  - type: text
    content: les cadavres des hommes qui se sont rebellés contre moi.
  - type: text
    content: En effet, *leur ver ne mourra pas et leur feu ne s'éteindra pas
  - type: note
    content: 'Leur ver… s''éteindra pas: image reprise par Jésus en Marc 9.44, 46, 48 à propos de l''enfer.'
  - type: text
    content: ','
  - type: text
    content: et ils seront pour chacun un objet d'horreur.
  '3':
  - type: text
    content: Celui qui égorge un bœuf abat un homme,
  - type: text
    content: celui qui sacrifie un agneau brise la nuque d'un chien,
  - type: text
    content: celui qui présente une offrande verse du sang de porc,
  - type: text
    content: 'celui qui fait brûler de l''encens adore des idoles:'
  - type: text
    content: tous ceux-là ont choisi de suivre leurs propres voies
  - type: text
    content: et trouvent du plaisir dans leurs monstruosités.
  '4':
  - type: text
    content: Moi aussi, je choisirai de les abandonner à leurs caprices
  - type: text
    content: et je ferai venir sur eux ce qui cause leur frayeur,
  - type: text
    content: parce que j'ai appelé et qu'ils n'ont pas répondu,
  - type: text
    content: parce que j'ai parlé et qu'ils n'ont pas écouté.
  - type: text
    content: Au contraire, ils ont fait ce qui est mal à mes yeux,
  - type: text
    content: ils ont choisi ce qui ne me plaît pas.
  '5':
  - type: text
    content: Ecoutez la parole de l'Eternel,
  - type: text
    content: vous qui faites preuve de respect envers sa parole.
  - type: text
    content: Voici ce que disent vos frères,
  - type: text
    content: ceux qui vous détestent et vous repoussent
  - type: text
    content: 'à cause de mon nom: «Que l''Eternel montre sa gloire'
  - type: text
    content: et que nous voyions votre joie!»
  - type: text
    content: Cependant, c'est eux qui seront couverts de honte.
  '6':
  - type: text
    content: Un tapage provient de la ville,
  - type: text
    content: 'un bruit sort du temple:'
  - type: text
    content: c'est celui que fait l'Eternel
  - type: text
    content: en rendant à ses ennemis ce qu'ils méritent.
  '7':
  - type: text
    content: Avant de se tordre de douleur,
  - type: text
    content: elle a accouché;
  - type: text
    content: avant de connaître la souffrance,
  - type: text
    content: elle a donné naissance à un fils!
  '8':
  - type: text
    content: Qui a déjà entendu pareille nouvelle?
  - type: text
    content: Qui a déjà vu quelque chose de semblable?
  - type: text
    content: Un pays peut-il naître en un seul jour?
  - type: text
    content: Une nation peut-elle naître d'un seul coup?
  - type: text
    content: Pourtant, à peine en train d'accoucher, Sion a mis ses fils au monde!
  '9':
  - type: text
    content: Est-ce moi qui ouvrirais le ventre maternel
  - type: text
    content: pour ne pas laisser un enfant naître? dit l'Eternel.
  - type: text
    content: Moi qui fais naître,
  - type: text
    content: empêcherais-je d'accoucher? dit ton Dieu.
