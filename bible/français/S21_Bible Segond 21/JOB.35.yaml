document_id: JOB.35,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Appel à rechercher Dieu
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elihu reprit:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'mais personne ne dit: ‘Où est Dieu, celui qui m''a fait,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui inspire des chants d'allégresse pendant la nuit,
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui nous instruit par les bêtes de la terre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et nous enseigne la sagesse par les oiseaux du ciel?’
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On a beau crier alors, Dieu ne répond pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à cause de l'arrogance des hommes mauvais.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Vraiment, il ne sert à rien de crier:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu n'écoute pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le Tout-Puissant ne le remarque pas.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Même si tu affirmes ne pas le remarquer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ta cause est devant lui: attends-le!'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais maintenant, parce que sa colère n'intervient pas encore
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qu'il semble indifférent aux pires offenses,
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Job ouvre la bouche pour parler dans le vide,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il multiplie les propos sans rien savoir.»
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Penses-tu avoir raison?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu te prétends juste devant Dieu,
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'tu dis: ‘Si je ne pèche pas, quelle importance pour toi?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et moi, qu'est-ce que j'y gagne?’
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »C'est moi qui vais te répondre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ainsi qu'à tes amis en même temps.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Considère le ciel et regarde!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Observe les nuages: ils sont bien au-dessus de toi!'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si tu pèches, quel tort lui causes-tu?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et quand tes révoltes se multiplient, en quoi cela le touche-t-il?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si tu es juste, quel cadeau lui fais-tu
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ou que reçoit-il de ta part?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Ta méchanceté ne peut atteindre qu'un homme comme toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ta justice ne touchera qu'un être humain.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On crie à cause de la violence de l'oppression,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on appelle au secours à cause des actes des grands,
