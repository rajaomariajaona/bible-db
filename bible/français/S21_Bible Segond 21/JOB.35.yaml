document_id: JOB.35
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Appel à rechercher Dieu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Elihu reprit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: «Penses-tu avoir raison?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu te prétends juste devant Dieu,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'tu dis: ‘Si je ne pèche pas, quelle importance pour toi?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et moi, qu'est-ce que j'y gagne?’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: »C'est moi qui vais te répondre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ainsi qu'à tes amis en même temps.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Considère le ciel et regarde!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Observe les nuages: ils sont bien au-dessus de toi!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Si tu pèches, quel tort lui causes-tu?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et quand tes révoltes se multiplient, en quoi cela le touche-t-il?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Si tu es juste, quel cadeau lui fais-tu
- type: usfm
  marker: q1
  children:
  - type: text
    text: ou que reçoit-il de ta part?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: »Ta méchanceté ne peut atteindre qu'un homme comme toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ta justice ne touchera qu'un être humain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: On crie à cause de la violence de l'oppression,
- type: usfm
  marker: q1
  children:
  - type: text
    text: on appelle au secours à cause des actes des grands,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'mais personne ne dit: ‘Où est Dieu, celui qui m''a fait,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui inspire des chants d'allégresse pendant la nuit,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: qui nous instruit par les bêtes de la terre
- type: usfm
  marker: q1
  children:
  - type: text
    text: et nous enseigne la sagesse par les oiseaux du ciel?’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: On a beau crier alors, Dieu ne répond pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à cause de l'arrogance des hommes mauvais.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Vraiment, il ne sert à rien de crier:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dieu n'écoute pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le Tout-Puissant ne le remarque pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: »Même si tu affirmes ne pas le remarquer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ta cause est devant lui: attends-le!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Mais maintenant, parce que sa colère n'intervient pas encore
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu'il semble indifférent aux pires offenses,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Job ouvre la bouche pour parler dans le vide,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il multiplie les propos sans rien savoir.»
