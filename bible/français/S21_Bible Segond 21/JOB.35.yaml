document_id: JOB.35,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Appel à rechercher Dieu
  - type: text
    content: 'Elihu reprit:'
  '10':
  - type: text
    content: 'mais personne ne dit: ‘Où est Dieu, celui qui m''a fait,'
  - type: text
    content: qui inspire des chants d'allégresse pendant la nuit,
  '11':
  - type: text
    content: qui nous instruit par les bêtes de la terre
  - type: text
    content: et nous enseigne la sagesse par les oiseaux du ciel?’
  '12':
  - type: text
    content: On a beau crier alors, Dieu ne répond pas,
  - type: text
    content: à cause de l'arrogance des hommes mauvais.
  '13':
  - type: text
    content: 'Vraiment, il ne sert à rien de crier:'
  - type: text
    content: Dieu n'écoute pas,
  - type: text
    content: le Tout-Puissant ne le remarque pas.
  '14':
  - type: text
    content: »Même si tu affirmes ne pas le remarquer,
  - type: text
    content: 'ta cause est devant lui: attends-le!'
  '15':
  - type: text
    content: Mais maintenant, parce que sa colère n'intervient pas encore
  - type: text
    content: et qu'il semble indifférent aux pires offenses,
  '16':
  - type: text
    content: Job ouvre la bouche pour parler dans le vide,
  - type: text
    content: il multiplie les propos sans rien savoir.»
  '2':
  - type: text
    content: «Penses-tu avoir raison?
  - type: text
    content: Tu te prétends juste devant Dieu,
  '3':
  - type: text
    content: 'tu dis: ‘Si je ne pèche pas, quelle importance pour toi?'
  - type: text
    content: Et moi, qu'est-ce que j'y gagne?’
  '4':
  - type: text
    content: »C'est moi qui vais te répondre,
  - type: text
    content: ainsi qu'à tes amis en même temps.
  '5':
  - type: text
    content: Considère le ciel et regarde!
  - type: text
    content: 'Observe les nuages: ils sont bien au-dessus de toi!'
  '6':
  - type: text
    content: Si tu pèches, quel tort lui causes-tu?
  - type: text
    content: Et quand tes révoltes se multiplient, en quoi cela le touche-t-il?
  '7':
  - type: text
    content: Si tu es juste, quel cadeau lui fais-tu
  - type: text
    content: ou que reçoit-il de ta part?
  '8':
  - type: text
    content: »Ta méchanceté ne peut atteindre qu'un homme comme toi,
  - type: text
    content: ta justice ne touchera qu'un être humain.
  '9':
  - type: text
    content: On crie à cause de la violence de l'oppression,
  - type: text
    content: on appelle au secours à cause des actes des grands,
