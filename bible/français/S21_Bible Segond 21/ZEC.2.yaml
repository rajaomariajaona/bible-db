document_id: ZEC.2,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Vision de quatre cornes et quatre forgerons
  - type: text
    content: 'J''ai levé les yeux et vu quatre cornes. '
  '10':
  - type: text
    content: '»Allons, allons! Fuyez du pays du nord, déclare l''Eternel, car je vous avais dispersés aux quatre coins de l''horizon, déclare l''Eternel. '
  '11':
  - type: text
    content: 'Allons! Sauve-toi, Sion, toi qui habites à Babylone, '
  '12':
  - type: text
    content: 'car voici ce que dit l''Eternel, le maître de l''univers: Après cela viendra la gloire. Il m''a envoyé vers les nations qui vous ont dépouillés, car celui qui vous touche touche à la prunelle de son œil. '
  '13':
  - type: text
    content: Me voici, je lève ma main contre elles, elles seront la proie de ceux qui étaient leurs esclaves, et vous saurez que l'Eternel, le maître de l'univers, m'a envoyé.
  '14':
  - type: text
    content: '»Pousse des cris d''allégresse et réjouis-toi, fille de Sion! En effet, je viens habiter au milieu de toi, déclare l''Eternel. '
  '15':
  - type: text
    content: 'Beaucoup de nations s''attacheront à l''Eternel, ce jour-là, et deviendront mon peuple. J''habiterai au milieu de toi, et tu sauras que l''Eternel, le maître de l''univers, m''a envoyé vers toi. '
  '16':
  - type: text
    content: 'L''Eternel possédera Juda comme sa part dans la terre sainte, et il choisira encore Jérusalem. '
  '17':
  - type: text
    content: Que toute créature fasse silence devant l'Eternel, car il s'est réveillé et sort de sa demeure sainte.»
  '2':
  - type: text
    content: 'J''ai dit à l''ange qui me parlait: «Qu''est-ce que ces cornes?» Et il m''a répondu: «Ce sont les puissances qui ont dispersé Juda, Israël et Jérusalem.»'
  '3':
  - type: text
    content: 'L''Eternel m''a fait voir quatre forgerons. '
  '4':
  - type: text
    content: 'J''ai dit: «Que viennent-ils faire?» Il a répondu: «Des puissances ont dispersé Juda au point que personne ne redresse la tête, et ces forgerons sont venus pour les effrayer, pour abattre la puissance des nations qui se sont levées contre le pays de Juda afin de disperser ses habitants.»'
  - type: heading
    content: Vision d'un ruban à mesurer
  '5':
  - type: text
    content: 'J''ai levé les yeux et vu un homme qui tenait dans la main un ruban à mesurer. '
  '6':
  - type: text
    content: 'J''ai dit: «Où vas-tu?» Il m''a répondu: «Je vais mesurer Jérusalem pour voir sa largeur et sa longueur.» '
  '7':
  - type: text
    content: 'Alors, l''ange qui me parlait s''est avancé. Un autre ange est venu à sa rencontre '
  '8':
  - type: text
    content: 'et lui a ordonné: «Cours dire à ce jeune homme: ‘Jérusalem sera une ville ouverte à cause du grand nombre d''hommes et de bêtes qui y vivront. '
  '9':
  - type: text
    content: Je serai moi-même pour elle une muraille de feu tout autour, déclare l'Eternel, et je serai sa gloire au milieu d'elle.’
