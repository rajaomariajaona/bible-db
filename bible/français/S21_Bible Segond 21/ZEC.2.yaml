document_id: ZEC.2,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Vision de quatre cornes et quatre forgerons
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J''ai levé les yeux et vu quatre cornes. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Allons, allons! Fuyez du pays du nord, déclare l''Eternel, car je vous avais dispersés aux quatre coins de l''horizon, déclare l''Eternel. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Allons! Sauve-toi, Sion, toi qui habites à Babylone, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'car voici ce que dit l''Eternel, le maître de l''univers: Après cela viendra la gloire. Il m''a envoyé vers les nations qui vous ont dépouillés, car celui qui vous touche touche à la prunelle de son œil. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Me voici, je lève ma main contre elles, elles seront la proie de ceux qui étaient leurs esclaves, et vous saurez que l'Eternel, le maître de l'univers, m'a envoyé.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Pousse des cris d''allégresse et réjouis-toi, fille de Sion! En effet, je viens habiter au milieu de toi, déclare l''Eternel. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Beaucoup de nations s''attacheront à l''Eternel, ce jour-là, et deviendront mon peuple. J''habiterai au milieu de toi, et tu sauras que l''Eternel, le maître de l''univers, m''a envoyé vers toi. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''Eternel possédera Juda comme sa part dans la terre sainte, et il choisira encore Jérusalem. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Que toute créature fasse silence devant l'Eternel, car il s'est réveillé et sort de sa demeure sainte.»
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J''ai dit à l''ange qui me parlait: «Qu''est-ce que ces cornes?» Et il m''a répondu: «Ce sont les puissances qui ont dispersé Juda, Israël et Jérusalem.»'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''Eternel m''a fait voir quatre forgerons. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J''ai dit: «Que viennent-ils faire?» Il a répondu: «Des puissances ont dispersé Juda au point que personne ne redresse la tête, et ces forgerons sont venus pour les effrayer, pour abattre la puissance des nations qui se sont levées contre le pays de Juda afin de disperser ses habitants.»'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Vision d'un ruban à mesurer
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J''ai levé les yeux et vu un homme qui tenait dans la main un ruban à mesurer. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J''ai dit: «Où vas-tu?» Il m''a répondu: «Je vais mesurer Jérusalem pour voir sa largeur et sa longueur.» '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors, l''ange qui me parlait s''est avancé. Un autre ange est venu à sa rencontre '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et lui a ordonné: «Cours dire à ce jeune homme: ‘Jérusalem sera une ville ouverte à cause du grand nombre d''hommes et de bêtes qui y vivront. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je serai moi-même pour elle une muraille de feu tout autour, déclare l'Eternel, et je serai sa gloire au milieu d'elle.’
