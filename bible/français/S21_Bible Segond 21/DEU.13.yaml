document_id: DEU.13,152
type_code: fra
verses:
  '1':
  - type: text
    content: »Vous respecterez et mettrez en pratique tout ce que je vous ordonne. Vous n'y ajouterez rien et vous n'en enlèverez rien.
  - type: heading
    content: Punition des prétendus prophètes et des idolâtres
  '10':
  - type: text
    content: 'Au contraire, tu le feras mourir. C''est ta main qui se lèvera la première contre lui pour le mettre à mort, puis celle de tout le peuple. '
  '11':
  - type: text
    content: 'Tu le lapideras et il mourra, parce qu''il a cherché à te détourner de l''Eternel, ton Dieu, qui t''a fait sortir d''Egypte, de la maison d''esclavage. '
  '12':
  - type: text
    content: Tous les Israélites en entendront parler et éprouveront de la crainte, et ainsi l'on ne commettra plus d'acte aussi criminel au milieu de toi.
  '13':
  - type: text
    content: '»Si tu entends dire, au sujet de l''une des villes que l''Eternel, ton Dieu, t''a données pour habitation, '
  '14':
  - type: text
    content: 'que des hommes mauvais sont sortis du milieu de toi et ont égaré les habitants de leur ville en les invitant à aller servir d''autres dieux, des dieux que tu ne connais pas, '
  '15':
  - type: text
    content: 'tu feras des recherches. Tu enquêteras, tu interrogeras avec soin: est-ce vrai, le fait est-il établi, cet acte abominable a-t-il été commis au milieu de toi? '
  '16':
  - type: text
    content: 'Alors tu frapperas du tranchant de l''épée les habitants de cette ville, tu la voueras à la destruction avec tout ce qui s''y trouvera, et tu en passeras le bétail au fil de l''épée. '
  '17':
  - type: text
    content: 'Tu entasseras tout le butin au milieu de la place et tu brûleras entièrement la ville avec tout son butin, devant l''Eternel, ton Dieu. Elle sera pour toujours un tas de ruines, elle ne sera jamais reconstruite. '
  '18':
  - type: text
    content: 'Rien de ce qui sera voué à la destruction ne s''attachera à ta main. Ainsi, l''Eternel renoncera à son ardente colère, il fera preuve de tendresse envers toi, il aura compassion de toi et te multipliera, comme il l''a juré à tes ancêtres, '
  '19':
  - type: text
    content: si tu obéis à l'Eternel, ton Dieu, en respectant tous ses commandements que je te prescris aujourd'hui et en faisant ce qui est droit aux yeux de l'Eternel, ton Dieu.
  '2':
  - type: text
    content: '»Si un prophète ou un faiseur de rêves se lève au milieu de toi et t''annonce un signe ou un prodige, '
  '3':
  - type: text
    content: 'et qu''il y ait accomplissement du signe ou du prodige dont il t''a parlé tout en t''invitant à suivre d''autres dieux, des dieux que tu ne connais pas, et à les servir, '
  '4':
  - type: text
    content: 'tu n''écouteras pas les paroles de ce prophète ou de ce faiseur de rêves. En effet, c''est l''Eternel, votre Dieu, qui vous met à l''épreuve pour savoir si vous l''aimez, lui, de tout votre cœur et toute votre âme. '
  '5':
  - type: text
    content: 'C''est l''Eternel, votre Dieu, que vous suivrez et c''est lui que vous craindrez. Ce sont ses commandements que vous respecterez, c''est à lui que vous obéirez, c''est lui que vous servirez et c''est à lui que vous vous attacherez. '
  '6':
  - type: text
    content: Ce prophète ou ce faiseur de rêves sera puni de mort, car il a parlé de révolte contre l'Eternel, votre Dieu, qui vous a fait sortir d'Egypte et vous a délivrés de la maison d'esclavage, et il a voulu te détourner de la voie dans laquelle l'Eternel, ton Dieu, t'a ordonné de marcher. *Tu extirperas ainsi le mal du milieu de toi.
  - type: note
    content: 'Tu extirperas… toi: principe répété en 17.7, 12 et repris en 1 Corinthiens 5.13.'
  '7':
  - type: text
    content: '»Si ton frère, le fils de ta mère, ou ton fils ou ta fille, ou la femme qui repose sur ta poitrine, ou encore ton ami que tu aimes comme toi-même, t''incite secrètement à aller servir d''autres dieux, des dieux que ni toi ni tes ancêtres n''avez connus, '
  '8':
  - type: text
    content: 'pris parmi les dieux des peuples qui vous entourent, qu''ils soient près ou loin de toi, d''une extrémité de la terre à l''autre, '
  '9':
  - type: text
    content: 'tu ne te montreras pas d''accord avec lui et tu ne l''écouteras pas. Ton regard sera sans pitié envers lui, tu ne l''épargneras pas et tu ne le couvriras pas. '
