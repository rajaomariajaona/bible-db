document_id: NEH.8,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Alors tout le peuple s''est rassemblé comme un seul homme sur la place qui fait face à la porte des eaux. Ils ont demandé au scribe Esdras d''apporter le livre de la loi de Moïse, prescrite par l''Eternel à Israël, '
  '10':
  - type: text
    content: 'Ils ont ajouté: «Allez manger un bon repas et boire des liqueurs douces, en envoyant des parts à ceux qui n''ont rien préparé, car ce jour est un jour saint pour notre Seigneur. Ne soyez pas tristes, car c''est la joie de l''Eternel qui fait votre force.» '
  '11':
  - type: text
    content: 'Les Lévites calmaient tout le peuple en disant: «Taisez-vous, car ce jour est saint. Ne soyez pas tristes!» '
  '12':
  - type: text
    content: L'ensemble du peuple est donc allé manger et boire, envoyer des parts à d'autres et s'adonner à de grandes réjouissances. Ils avaient en effet compris les paroles qu'on leur avait exposées.
  '13':
  - type: text
    content: 'Le deuxième jour, les chefs de famille de tout le peuple ainsi que les prêtres et les Lévites se sont rassemblés auprès du scribe Esdras pour qu''il leur indique le sens des paroles de la loi. '
  '14':
  - type: text
    content: 'Ils ont trouvé écrit, dans la loi que l''Eternel avait prescrite par l''intermédiaire de Moïse, que les Israélites devaient habiter sous des tentes pendant la fête du septième mois '
  '15':
  - type: text
    content: 'et faire entendre un message dans toutes leurs villes, tout comme à Jérusalem, pour ordonner: «Allez chercher à la montagne des branches d''olivier, d''olivier sauvage, de myrte, de palmier et d''arbres touffus pour faire des cabanes, conformément à ce qui est écrit.» '
  '16':
  - type: text
    content: 'Alors le peuple est allé chercher des branches et ils se sont fait des cabanes sur le toit de leurs maisons, dans leurs cours, dans les parvis de la maison de Dieu, sur la place de la porte des eaux et sur la place de la porte d''Ephraïm. '
  '17':
  - type: text
    content: Toute l'assemblée des Juifs revenus de déportation a fait des cabanes et ils y ont habité. Depuis l'époque de Josué
  - type: note
    content: 'Josué: c''est-à-dire à l''époque de la conquête du pays promis, après la sortie d''Egypte.'
  - type: text
    content: ', fils de Nun, jusqu''à ce jour-là, les Israélites n''avaient jamais célébré une pareille fête et il y a eu de très grandes réjouissances.'
  '18':
  - type: text
    content: On a lu dans le livre de la loi de Dieu chaque jour, depuis le premier jusqu'au dernier. On a fait la fête pendant 7 jours, et le huitième il y a eu une assemblée solennelle, conformément à la règle.
  '2':
  - type: text
    content: 'et Esdras, qui était aussi prêtre, a apporté la loi devant l''assemblée. Celle-ci était composée d''hommes et de femmes, de tous ceux qui étaient aptes à la comprendre. C''était le premier jour du septième mois. '
  '3':
  - type: text
    content: Esdras a lu dans le livre depuis le matin jusqu'à la mi-journée, sur la place qui fait face à la porte des eaux, en présence des hommes et des femmes, de ceux qui étaient en âge de comprendre. Le peuple tout entier s'est montré attentif à la lecture du livre de la loi.
  '4':
  - type: text
    content: 'Le scribe Esdras se tenait debout sur une estrade en bois, fabriquée pour l''occasion. A côté de lui, à sa droite, se tenaient Matthithia, Shéma, Anaja, Urie, Hilkija et Maaséja, et à sa gauche Pedaja, Mishaël, Malkija, Hashum, Hashbaddana, Zacharie et Meshullam. '
  '5':
  - type: text
    content: 'Esdras a ouvert le livre de façon visible pour le peuple dans son entier – puisqu''il était surélevé par rapport à lui – et lorsqu''il a fait ce geste, tout le peuple s''est mis debout. '
  '6':
  - type: text
    content: 'Esdras a béni l''Eternel, le grand Dieu, et tous les membres du peuple ont répondu: «Amen! Amen!» en levant les mains, puis ils se sont prosternés et ont adoré l''Eternel, le visage contre terre. '
  '7':
  - type: text
    content: 'Josué, Bani, Shérébia, Jamin, Akkub, Shabbethaï, Hodija, Maaséja, Kelitha, Azaria, Jozabad, Hanan et Pelaja, qui étaient lévites, expliquaient la loi au peuple, et celui-ci est resté debout sur place. '
  '8':
  - type: text
    content: Ils lisaient distinctement dans le livre de la loi de Dieu et ils en donnaient le sens pour faire comprendre ce qu'ils avaient lu.
  - type: heading
    content: Célébration de la fête des tentes
  '9':
  - type: text
    content: 'Le gouverneur Néhémie, le prêtre et scribe Esdras et les Lévites qui donnaient des explications ont dit à l''ensemble du peuple: «Ce jour est un jour saint pour l''Eternel, votre Dieu. Ne prenez pas le deuil et ne pleurez pas!» En effet, le peuple tout entier pleurait à l''écoute des paroles de la loi. '
