document_id: NEH.8
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Alors tout le peuple s''est rassemblé comme un seul homme sur la place qui fait face à la porte des eaux. Ils ont demandé au scribe Esdras d''apporter le livre de la loi de Moïse, prescrite par l''Eternel à Israël, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'et Esdras, qui était aussi prêtre, a apporté la loi devant l''assemblée. Celle-ci était composée d''hommes et de femmes, de tous ceux qui étaient aptes à la comprendre. C''était le premier jour du septième mois. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Esdras a lu dans le livre depuis le matin jusqu'à la mi-journée, sur la place qui fait face à la porte des eaux, en présence des hommes et des femmes, de ceux qui étaient en âge de comprendre. Le peuple tout entier s'est montré attentif à la lecture du livre de la loi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Le scribe Esdras se tenait debout sur une estrade en bois, fabriquée pour l''occasion. A côté de lui, à sa droite, se tenaient Matthithia, Shéma, Anaja, Urie, Hilkija et Maaséja, et à sa gauche Pedaja, Mishaël, Malkija, Hashum, Hashbaddana, Zacharie et Meshullam. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Esdras a ouvert le livre de façon visible pour le peuple dans son entier – puisqu''il était surélevé par rapport à lui – et lorsqu''il a fait ce geste, tout le peuple s''est mis debout. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Esdras a béni l''Eternel, le grand Dieu, et tous les membres du peuple ont répondu: «Amen! Amen!» en levant les mains, puis ils se sont prosternés et ont adoré l''Eternel, le visage contre terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Josué, Bani, Shérébia, Jamin, Akkub, Shabbethaï, Hodija, Maaséja, Kelitha, Azaria, Jozabad, Hanan et Pelaja, qui étaient lévites, expliquaient la loi au peuple, et celui-ci est resté debout sur place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ils lisaient distinctement dans le livre de la loi de Dieu et ils en donnaient le sens pour faire comprendre ce qu'ils avaient lu.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Célébration de la fête des tentes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Le gouverneur Néhémie, le prêtre et scribe Esdras et les Lévites qui donnaient des explications ont dit à l''ensemble du peuple: «Ce jour est un jour saint pour l''Eternel, votre Dieu. Ne prenez pas le deuil et ne pleurez pas!» En effet, le peuple tout entier pleurait à l''écoute des paroles de la loi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ils ont ajouté: «Allez manger un bon repas et boire des liqueurs douces, en envoyant des parts à ceux qui n''ont rien préparé, car ce jour est un jour saint pour notre Seigneur. Ne soyez pas tristes, car c''est la joie de l''Eternel qui fait votre force.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Les Lévites calmaient tout le peuple en disant: «Taisez-vous, car ce jour est saint. Ne soyez pas tristes!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: L'ensemble du peuple est donc allé manger et boire, envoyer des parts à d'autres et s'adonner à de grandes réjouissances. Ils avaient en effet compris les paroles qu'on leur avait exposées.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Le deuxième jour, les chefs de famille de tout le peuple ainsi que les prêtres et les Lévites se sont rassemblés auprès du scribe Esdras pour qu''il leur indique le sens des paroles de la loi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ils ont trouvé écrit, dans la loi que l''Eternel avait prescrite par l''intermédiaire de Moïse, que les Israélites devaient habiter sous des tentes pendant la fête du septième mois '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'et faire entendre un message dans toutes leurs villes, tout comme à Jérusalem, pour ordonner: «Allez chercher à la montagne des branches d''olivier, d''olivier sauvage, de myrte, de palmier et d''arbres touffus pour faire des cabanes, conformément à ce qui est écrit.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Alors le peuple est allé chercher des branches et ils se sont fait des cabanes sur le toit de leurs maisons, dans leurs cours, dans les parvis de la maison de Dieu, sur la place de la porte des eaux et sur la place de la porte d''Ephraïm. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Toute l'assemblée des Juifs revenus de déportation a fait des cabanes et ils y ont habité. Depuis l'époque de Josué
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Josué: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: c'est-à-dire à l'époque de la conquête du pays promis, après la sortie d'Egypte.
    marker-yv: yv-n
  - type: text
    text: ', fils de Nun, jusqu''à ce jour-là, les Israélites n''avaient jamais célébré une pareille fête et il y a eu de très grandes réjouissances.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: On a lu dans le livre de la loi de Dieu chaque jour, depuis le premier jusqu'au dernier. On a fait la fête pendant 7 jours, et le huitième il y a eu une assemblée solennelle, conformément à la règle.
