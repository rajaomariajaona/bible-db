document_id: MAT.7
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les relations humaines
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '»Ne jugez pas afin de ne pas être jugés, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'car on vous jugera de la même manière que vous aurez jugé et on utilisera pour vous la mesure dont vous vous serez servis. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Pourquoi vois-tu la paille qui est dans l''œil de ton frère et ne remarques-tu pas la poutre qui est dans ton œil? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ou comment peux-tu dire à ton frère: ‘Laisse-moi enlever la paille de ton œil’, alors que toi, tu as une poutre dans le tien? '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Hypocrite, enlève d'abord la poutre de ton œil, et alors tu verras clair pour retirer la paille de l'œil de ton frère.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: »Ne donnez pas les choses saintes aux chiens et ne jetez pas vos perles devant les porcs, de peur qu'ils ne les piétinent et qu'ils ne se retournent pour vous déchirer.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '»Demandez et l''on vous donnera, cherchez et vous trouverez, frappez et l''on vous ouvrira. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'En effet, toute personne qui demande reçoit, celui qui cherche trouve et l''on ouvre à celui qui frappe. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Qui parmi vous donnera une pierre à son fils, s''il lui demande du pain? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ou s''il demande un poisson, lui donnera-t-il un serpent? '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Si donc, mauvais comme vous l'êtes, vous savez donner de bonnes choses à vos enfants, votre Père céleste donnera d'autant plus volontiers de bonnes choses à ceux qui les lui demandent.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: »Tout ce que vous voudriez que les hommes fassent pour vous, vous aussi, faites-le de même pour eux, car c'est ce qu'enseignent la loi et les prophètes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'La loi et les prophètes: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: c'est-à-dire l'Ancien Testament.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: L'entrée dans le royaume
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '»Entrez par la porte étroite! En effet, large est la porte, spacieux le chemin menant à la perdition, et il y en a beaucoup qui entrent par là, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: mais étroite est la porte, resserré le chemin menant à la vie, et il y en a peu qui les trouvent.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '»Méfiez-vous des prétendus prophètes! Ils viennent à vous en vêtements de brebis, mais au-dedans ce sont des loups voraces. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Vous les reconnaîtrez à leurs fruits. Cueille-t-on des raisins sur des ronces ou des figues sur des chardons? '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Tout bon arbre produit de bons fruits, mais le mauvais arbre produit de mauvais fruits. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Un bon arbre ne peut pas porter de mauvais fruits, ni un mauvais arbre porter de bons fruits. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tout arbre qui ne produit pas de bons fruits est coupé et jeté au feu. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: C'est donc à leurs fruits que vous les reconnaîtrez.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '»Ceux qui me disent: ‘Seigneur, Seigneur!’ n''entreront pas tous dans le royaume des cieux, mais seulement celui qui fait la volonté de mon Père céleste. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Beaucoup me diront ce jour-là: ‘Seigneur, Seigneur, n''avons-nous pas prophétisé en ton nom? N''avons-nous pas chassé des démons en ton nom? N''avons-nous pas fait beaucoup de miracles en ton nom?’ '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Alors je leur dirai ouvertement: ‘Je ne vous ai jamais connus. '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Eloignez-vous de moi, vous qui commettez le mal!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.23 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Eloignez-vous… mal: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation du '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psaume 6.9
      metadata:
        usfm: PSA.6.9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '»C''est pourquoi, toute personne qui entend ces paroles que je dis et les met en pratique, je la comparerai à un homme prudent qui a construit sa maison sur le rocher. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'La pluie est tombée, les torrents sont venus, les vents ont soufflé et se sont déchaînés contre cette maison; elle ne s''est pas écroulée, parce qu''elle était fondée sur le rocher. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Mais toute personne qui entend ces paroles que je dis et ne les met pas en pratique ressemblera à un fou qui a construit sa maison sur le sable. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: La pluie est tombée, les torrents sont venus, les vents ont soufflé et se sont abattus sur cette maison; elle s'est écroulée et sa ruine a été grande.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Quand Jésus eut fini de prononcer ces paroles, les foules restèrent frappées par son enseignement, '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: car il enseignait avec autorité, et non comme leurs spécialistes de la loi.
