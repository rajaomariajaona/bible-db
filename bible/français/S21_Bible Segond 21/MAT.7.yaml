document_id: MAT.7,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Les relations humaines
  - type: text
    content: '»Ne jugez pas afin de ne pas être jugés, '
  '10':
  - type: text
    content: 'Ou s''il demande un poisson, lui donnera-t-il un serpent? '
  '11':
  - type: text
    content: Si donc, mauvais comme vous l'êtes, vous savez donner de bonnes choses à vos enfants, votre Père céleste donnera d'autant plus volontiers de bonnes choses à ceux qui les lui demandent.
  '12':
  - type: text
    content: »Tout ce que vous voudriez que les hommes fassent pour vous, vous aussi, faites-le de même pour eux, car c'est ce qu'enseignent la loi et les prophètes
  - type: note
    content: 'La loi et les prophètes: c''est-à-dire l''Ancien Testament.'
  - type: text
    content: .
  - type: heading
    content: L'entrée dans le royaume
  '13':
  - type: text
    content: '»Entrez par la porte étroite! En effet, large est la porte, spacieux le chemin menant à la perdition, et il y en a beaucoup qui entrent par là, '
  '14':
  - type: text
    content: mais étroite est la porte, resserré le chemin menant à la vie, et il y en a peu qui les trouvent.
  '15':
  - type: text
    content: '»Méfiez-vous des prétendus prophètes! Ils viennent à vous en vêtements de brebis, mais au-dedans ce sont des loups voraces. '
  '16':
  - type: text
    content: 'Vous les reconnaîtrez à leurs fruits. Cueille-t-on des raisins sur des ronces ou des figues sur des chardons? '
  '17':
  - type: text
    content: 'Tout bon arbre produit de bons fruits, mais le mauvais arbre produit de mauvais fruits. '
  '18':
  - type: text
    content: 'Un bon arbre ne peut pas porter de mauvais fruits, ni un mauvais arbre porter de bons fruits. '
  '19':
  - type: text
    content: 'Tout arbre qui ne produit pas de bons fruits est coupé et jeté au feu. '
  '2':
  - type: text
    content: 'car on vous jugera de la même manière que vous aurez jugé et on utilisera pour vous la mesure dont vous vous serez servis. '
  '20':
  - type: text
    content: C'est donc à leurs fruits que vous les reconnaîtrez.
  '21':
  - type: text
    content: '»Ceux qui me disent: ‘Seigneur, Seigneur!’ n''entreront pas tous dans le royaume des cieux, mais seulement celui qui fait la volonté de mon Père céleste. '
  '22':
  - type: text
    content: 'Beaucoup me diront ce jour-là: ‘Seigneur, Seigneur, n''avons-nous pas prophétisé en ton nom? N''avons-nous pas chassé des démons en ton nom? N''avons-nous pas fait beaucoup de miracles en ton nom?’ '
  '23':
  - type: text
    content: 'Alors je leur dirai ouvertement: ‘Je ne vous ai jamais connus. '
  - type: text
    content: Eloignez-vous de moi, vous qui commettez le mal!
  - type: note
    content: 'Eloignez-vous… mal: citation du Psaume 6.9.'
  - type: text
    content: ’
  '24':
  - type: text
    content: '»C''est pourquoi, toute personne qui entend ces paroles que je dis et les met en pratique, je la comparerai à un homme prudent qui a construit sa maison sur le rocher. '
  '25':
  - type: text
    content: 'La pluie est tombée, les torrents sont venus, les vents ont soufflé et se sont déchaînés contre cette maison; elle ne s''est pas écroulée, parce qu''elle était fondée sur le rocher. '
  '26':
  - type: text
    content: 'Mais toute personne qui entend ces paroles que je dis et ne les met pas en pratique ressemblera à un fou qui a construit sa maison sur le sable. '
  '27':
  - type: text
    content: La pluie est tombée, les torrents sont venus, les vents ont soufflé et se sont abattus sur cette maison; elle s'est écroulée et sa ruine a été grande.»
  '28':
  - type: text
    content: 'Quand Jésus eut fini de prononcer ces paroles, les foules restèrent frappées par son enseignement, '
  '29':
  - type: text
    content: car il enseignait avec autorité, et non comme leurs spécialistes de la loi.
  '3':
  - type: text
    content: 'Pourquoi vois-tu la paille qui est dans l''œil de ton frère et ne remarques-tu pas la poutre qui est dans ton œil? '
  '4':
  - type: text
    content: 'Ou comment peux-tu dire à ton frère: ‘Laisse-moi enlever la paille de ton œil’, alors que toi, tu as une poutre dans le tien? '
  '5':
  - type: text
    content: Hypocrite, enlève d'abord la poutre de ton œil, et alors tu verras clair pour retirer la paille de l'œil de ton frère.
  '6':
  - type: text
    content: »Ne donnez pas les choses saintes aux chiens et ne jetez pas vos perles devant les porcs, de peur qu'ils ne les piétinent et qu'ils ne se retournent pour vous déchirer.
  '7':
  - type: text
    content: '»Demandez et l''on vous donnera, cherchez et vous trouverez, frappez et l''on vous ouvrira. '
  '8':
  - type: text
    content: 'En effet, toute personne qui demande reçoit, celui qui cherche trouve et l''on ouvre à celui qui frappe. '
  '9':
  - type: text
    content: 'Qui parmi vous donnera une pierre à son fils, s''il lui demande du pain? '
