document_id: JOB.29
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Job poursuivit son développement:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: «Si seulement je pouvais revivre les mois passés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les jours où Dieu me gardait,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: où sa lampe brillait sur ma tête
- type: usfm
  marker: q1
  children:
  - type: text
    text: et où sa lumière me guidait dans les ténèbres!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: J'atteignais alors mon plein épanouissement.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dieu veillait en ami sur ma tente,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: le Tout-Puissant était encore avec moi
- type: usfm
  marker: q1
  children:
  - type: text
    text: et mes enfants m'entouraient.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mes pieds baignaient dans la crème
- type: usfm
  marker: q1
  children:
  - type: text
    text: et un rocher déversait près de moi des torrents d'huile!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: »Quand je sortais pour aller à la porte de la ville
- type: usfm
  marker: q1
  children:
  - type: text
    text: et me faisais préparer un siège sur la place,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: les jeunes gens se retiraient à mon approche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les vieillards se levaient et restaient debout.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Les chefs arrêtaient leurs discours
- type: usfm
  marker: q1
  children:
  - type: text
    text: et mettaient la main sur leur bouche,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: la voix des princes s'estompait
- type: usfm
  marker: q1
  children:
  - type: text
    text: et leur langue restait attachée à leur palais.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: L'oreille qui m'entendait me disait heureux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'œil qui me voyait me rendait un témoignage favorable.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: »C'est que je délivrais le malheureux qui appelait à l'aide
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l'orphelin que personne ne secourait.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Le mourant me bénissait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je remplissais de joie le cœur de la veuve.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Je me revêtais de la justice, elle était pour moi un habit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon manteau et mon turban, c'était mon respect du droit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: J'étais les yeux de l'aveugle
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les pieds du boiteux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: J'étais un père pour les pauvres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j'examinais la cause d'un inconnu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Je brisais les mâchoires de l'homme injuste
- type: usfm
  marker: q1
  children:
  - type: text
    text: et j'arrachais la proie de ses dents.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '»Je me disais alors: ‘Je mourrai dans mon foyer.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: J'aurai des jours aussi abondants que le sable.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: L'eau pourra pénétrer dans mes racines,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la rosée passera la nuit sur mes branches,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ma gloire sera sans cesse nouvelle
- type: usfm
  marker: q1
  children:
  - type: text
    text: et mon arc reprendra des forces dans ma main.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: »On m'écoutait, plein d'attente,
- type: usfm
  marker: q1
  children:
  - type: text
    text: on gardait le silence pour entendre mes conseils.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Après mes discours, personne ne répliquait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et mes propos étaient aussi bienfaisants que la rosée pour eux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ils comptaient sur moi comme sur la pluie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils buvaient mes paroles comme les dernières pluies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Je leur souriais et ils n'osaient pas y croire.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rien ne pouvait altérer le rayonnement de mon visage.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Je choisissais le chemin à suivre pour eux et je m'asseyais à leur tête.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je restais là comme un roi au milieu de sa troupe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme un consolateur auprès des personnes endeuillées.
