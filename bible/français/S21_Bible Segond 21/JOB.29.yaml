document_id: JOB.29,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Job poursuivit son développement:'
  '10':
  - type: text
    content: la voix des princes s'estompait
  - type: text
    content: et leur langue restait attachée à leur palais.
  '11':
  - type: text
    content: L'oreille qui m'entendait me disait heureux,
  - type: text
    content: l'œil qui me voyait me rendait un témoignage favorable.
  '12':
  - type: text
    content: »C'est que je délivrais le malheureux qui appelait à l'aide
  - type: text
    content: et l'orphelin que personne ne secourait.
  '13':
  - type: text
    content: Le mourant me bénissait,
  - type: text
    content: je remplissais de joie le cœur de la veuve.
  '14':
  - type: text
    content: Je me revêtais de la justice, elle était pour moi un habit.
  - type: text
    content: Mon manteau et mon turban, c'était mon respect du droit.
  '15':
  - type: text
    content: J'étais les yeux de l'aveugle
  - type: text
    content: et les pieds du boiteux.
  '16':
  - type: text
    content: J'étais un père pour les pauvres,
  - type: text
    content: j'examinais la cause d'un inconnu.
  '17':
  - type: text
    content: Je brisais les mâchoires de l'homme injuste
  - type: text
    content: et j'arrachais la proie de ses dents.
  '18':
  - type: text
    content: '»Je me disais alors: ‘Je mourrai dans mon foyer.'
  - type: text
    content: J'aurai des jours aussi abondants que le sable.
  '19':
  - type: text
    content: L'eau pourra pénétrer dans mes racines,
  - type: text
    content: la rosée passera la nuit sur mes branches,
  '2':
  - type: text
    content: «Si seulement je pouvais revivre les mois passés,
  - type: text
    content: les jours où Dieu me gardait,
  '20':
  - type: text
    content: ma gloire sera sans cesse nouvelle
  - type: text
    content: et mon arc reprendra des forces dans ma main.’
  '21':
  - type: text
    content: »On m'écoutait, plein d'attente,
  - type: text
    content: on gardait le silence pour entendre mes conseils.
  '22':
  - type: text
    content: Après mes discours, personne ne répliquait,
  - type: text
    content: et mes propos étaient aussi bienfaisants que la rosée pour eux.
  '23':
  - type: text
    content: Ils comptaient sur moi comme sur la pluie,
  - type: text
    content: ils buvaient mes paroles comme les dernières pluies.
  '24':
  - type: text
    content: Je leur souriais et ils n'osaient pas y croire.
  - type: text
    content: Rien ne pouvait altérer le rayonnement de mon visage.
  '25':
  - type: text
    content: Je choisissais le chemin à suivre pour eux et je m'asseyais à leur tête.
  - type: text
    content: Je restais là comme un roi au milieu de sa troupe,
  - type: text
    content: comme un consolateur auprès des personnes endeuillées.
  '3':
  - type: text
    content: où sa lampe brillait sur ma tête
  - type: text
    content: et où sa lumière me guidait dans les ténèbres!
  '4':
  - type: text
    content: J'atteignais alors mon plein épanouissement.
  - type: text
    content: Dieu veillait en ami sur ma tente,
  '5':
  - type: text
    content: le Tout-Puissant était encore avec moi
  - type: text
    content: et mes enfants m'entouraient.
  '6':
  - type: text
    content: Mes pieds baignaient dans la crème
  - type: text
    content: et un rocher déversait près de moi des torrents d'huile!
  '7':
  - type: text
    content: »Quand je sortais pour aller à la porte de la ville
  - type: text
    content: et me faisais préparer un siège sur la place,
  '8':
  - type: text
    content: les jeunes gens se retiraient à mon approche,
  - type: text
    content: les vieillards se levaient et restaient debout.
  '9':
  - type: text
    content: Les chefs arrêtaient leurs discours
  - type: text
    content: et mettaient la main sur leur bouche,
