document_id: EZK.19,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Complainte sur les princes d'Israël
  - type: text
    content: '»Quant à toi, prononce une complainte sur les princes d''Israël! '
  '10':
  - type: text
    content: »Ta mère était, comme toi, semblable à une vigne
  - type: text
    content: plantée près de l'eau.
  - type: text
    content: Elle était porteuse de fruits et chargée de sarments,
  - type: text
    content: grâce à l'abondance de l'eau.
  '11':
  - type: text
    content: Elle avait de solides branches, qui sont devenues des sceptres royaux.
  - type: text
    content: Par sa taille, elle dominait les broussailles.
  - type: text
    content: Elle attirait les regards par sa hauteur
  - type: text
    content: et par le grand nombre de ses branches.
  '12':
  - type: text
    content: »Cependant, elle a été arrachée avec fureur et jetée par terre.
  - type: text
    content: Le vent d'est a desséché ses fruits.
  - type: text
    content: Ses solides branches ont été cassées et sont devenues toutes sèches;
  - type: text
    content: le feu les a dévorées.
  '13':
  - type: text
    content: Elle est maintenant transplantée dans le désert,
  - type: text
    content: dans une terre sèche et aride.
  '14':
  - type: text
    content: Le feu est sorti d'une partie de ses branches
  - type: text
    content: et a dévoré son fruit.
  - type: text
    content: Elle n'a plus de branche solide
  - type: text
    content: qui pourrait devenir un sceptre royal.’
  - type: text
    content: »C'est une complainte, à utiliser comme complainte.»
  '2':
  - type: text
    content: 'Tu diras:'
  - type: text
    content: »‘Qu'était ta mère? Une lionne.
  - type: text
    content: Elle était couchée parmi les lions.
  - type: text
    content: C'est au milieu des jeunes lions
  - type: text
    content: qu'elle a élevé ses petits.
  '3':
  - type: text
    content: Elle a dressé tout particulièrement l'un de ses petits,
  - type: text
    content: qui est devenu un jeune lion.
  - type: text
    content: Il a appris à déchirer sa proie,
  - type: text
    content: il a dévoré des hommes.
  '4':
  - type: text
    content: Les nations ont entendu parler de lui
  - type: text
    content: et il a été pris dans leur piège.
  - type: text
    content: Elles l'ont emmené, en mettant des crochets à ses narines,
  - type: text
    content: jusqu'en Egypte.
  '5':
  - type: text
    content: »Quand la lionne a vu qu'elle attendait pour rien,
  - type: text
    content: qu'il n'y avait plus d'espoir,
  - type: text
    content: elle a pris un autre de ses petits
  - type: text
    content: et en a fait un jeune lion.
  '6':
  - type: text
    content: Il rôdait parmi les lions,
  - type: text
    content: il est devenu un jeune lion.
  - type: text
    content: Il a appris à déchirer sa proie,
  - type: text
    content: il a dévoré des hommes.
  '7':
  - type: text
    content: Il a violé leurs veuves
  - type: text
    content: et détruit leurs villes.
  - type: text
    content: Le pays a été dévasté, avec tout ce qui s'y trouvait,
  - type: text
    content: au son de ses rugissements.
  '8':
  - type: text
    content: »Contre lui se sont rangées les nations
  - type: text
    content: environnantes, venues de leurs provinces.
  - type: text
    content: Elles ont tendu leur filet sur lui
  - type: text
    content: et il a été pris dans leur piège.
  '9':
  - type: text
    content: Elles ont mis des crochets à ses narines, l'ont placé dans une cage
  - type: text
    content: et l'ont emmené auprès du roi de Babylone.
  - type: text
    content: Puis elles l'ont conduit dans une forteresse
  - type: text
    content: afin qu'on n'entende plus sa voix sur les montagnes d'Israël.
