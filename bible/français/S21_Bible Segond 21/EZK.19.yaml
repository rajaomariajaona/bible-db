document_id: EZK.19
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Complainte sur les princes d'Israël
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '»Quant à toi, prononce une complainte sur les princes d''Israël! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Tu diras:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: »‘Qu'était ta mère? Une lionne.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle était couchée parmi les lions.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est au milieu des jeunes lions
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu'elle a élevé ses petits.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Elle a dressé tout particulièrement l'un de ses petits,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui est devenu un jeune lion.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a appris à déchirer sa proie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a dévoré des hommes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Les nations ont entendu parler de lui
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il a été pris dans leur piège.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elles l'ont emmené, en mettant des crochets à ses narines,
- type: usfm
  marker: q1
  children:
  - type: text
    text: jusqu'en Egypte.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: »Quand la lionne a vu qu'elle attendait pour rien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu'il n'y avait plus d'espoir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle a pris un autre de ses petits
- type: usfm
  marker: q1
  children:
  - type: text
    text: et en a fait un jeune lion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Il rôdait parmi les lions,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il est devenu un jeune lion.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a appris à déchirer sa proie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a dévoré des hommes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il a violé leurs veuves
- type: usfm
  marker: q1
  children:
  - type: text
    text: et détruit leurs villes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le pays a été dévasté, avec tout ce qui s'y trouvait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: au son de ses rugissements.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: »Contre lui se sont rangées les nations
- type: usfm
  marker: q1
  children:
  - type: text
    text: environnantes, venues de leurs provinces.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elles ont tendu leur filet sur lui
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il a été pris dans leur piège.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Elles ont mis des crochets à ses narines, l'ont placé dans une cage
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l'ont emmené auprès du roi de Babylone.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Puis elles l'ont conduit dans une forteresse
- type: usfm
  marker: q1
  children:
  - type: text
    text: afin qu'on n'entende plus sa voix sur les montagnes d'Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: »Ta mère était, comme toi, semblable à une vigne
- type: usfm
  marker: q1
  children:
  - type: text
    text: plantée près de l'eau.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle était porteuse de fruits et chargée de sarments,
- type: usfm
  marker: q1
  children:
  - type: text
    text: grâce à l'abondance de l'eau.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Elle avait de solides branches, qui sont devenues des sceptres royaux.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Par sa taille, elle dominait les broussailles.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle attirait les regards par sa hauteur
- type: usfm
  marker: q1
  children:
  - type: text
    text: et par le grand nombre de ses branches.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: »Cependant, elle a été arrachée avec fureur et jetée par terre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le vent d'est a desséché ses fruits.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses solides branches ont été cassées et sont devenues toutes sèches;
- type: usfm
  marker: q1
  children:
  - type: text
    text: le feu les a dévorées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Elle est maintenant transplantée dans le désert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans une terre sèche et aride.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Le feu est sorti d'une partie de ses branches
- type: usfm
  marker: q1
  children:
  - type: text
    text: et a dévoré son fruit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle n'a plus de branche solide
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui pourrait devenir un sceptre royal.’
- type: usfm
  marker: p
  children:
  - type: text
    text: »C'est une complainte, à utiliser comme complainte.»
