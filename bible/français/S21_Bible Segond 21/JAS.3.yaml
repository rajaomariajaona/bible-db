document_id: JAS.3,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L'usage de la parole
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ne soyez pas nombreux à vouloir devenir des enseignants car, vous le savez, mes frères et sœurs, nous serons jugés plus sévèrement. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De la même bouche sortent la bénédiction et la malédiction. Mes frères et sœurs, il ne faut pas que tel soit le cas. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Une source fait-elle jaillir par la même ouverture de l''eau douce et de l''eau amère? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Un figuier, mes frères et sœurs, peut-il produire des olives, ou une vigne des figues? [De même,] aucune source ne peut produire de l'eau salée et de l'eau douce.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sagesse et mauvais désirs
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lequel parmi vous est sage et intelligent? Qu''il montre, par un bon comportement, ses œuvres empreintes de douceur et de sagesse. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais si vous avez dans votre cœur une jalousie amère et un esprit de rivalité, ne faites pas les fiers et ne mentez pas contre la vérité. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Une telle sagesse ne vient pas d''en haut, elle est au contraire terrestre, purement humaine, démoniaque. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, là où il y a de la jalousie et un esprit de rivalité, il y a du désordre et toutes sortes de pratiques mauvaises. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La sagesse d''en haut est tout d''abord pure, ensuite porteuse de paix, douce, conciliante, pleine de compassion et de bons fruits, elle est sans parti pris et sans hypocrisie. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le fruit de la justice est semé dans la paix par ceux qui travaillent à la paix.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: En effet, nous trébuchons tous de bien des manières. Si quelqu'un ne trébuche pas en paroles, c'est un homme mûr, capable de tenir tout son corps en bride.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand nous mettons le mors dans la bouche des chevaux pour qu''ils nous obéissent, nous dirigeons ainsi leur corps tout entier. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voyez aussi les bateaux: même très grands et poussés par des vents impétueux, ils sont conduits par un tout petit gouvernail là où le pilote le veut. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De même, la langue est un petit membre et elle peut se vanter de grandes choses. Voyez comme un petit feu peut embraser une grande forêt! '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: La langue aussi est un feu, c'est le monde de la méchanceté. [Ainsi,] la langue se trouve parmi nos membres; elle souille tout notre corps et enflamme le cours de notre existence, étant elle-même enflammée par l'enfer.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toutes les espèces de bêtes, d''oiseaux, de reptiles et d''animaux marins peuvent être domptées et ont été domptées par l''homme. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La langue en revanche, aucun homme ne peut la dompter; c''est un mal qu''on ne peut pas maîtriser, elle est pleine d''un venin mortel. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Par elle nous bénissons Dieu notre Père, et par elle nous maudissons les hommes faits à l''image de Dieu. '
