document_id: 1CO.11
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Soyez mes imitateurs, comme je le suis moi-même de Christ.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Attitudes dans l'Eglise
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Je vous félicite de ce que vous vous souvenez de moi à tout point de vue et de ce que vous retenez mes instructions telles que je vous les ai transmises. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Je veux cependant que vous sachiez ceci: Christ est le chef de tout homme, l''homme est le chef de la femme, et Dieu est le chef de Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tout homme qui prie ou qui prophétise la tête couverte déshonore son chef. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Toute femme, en revanche, qui prie ou qui prophétise la tête non couverte déshonore son chef à elle. En effet, c''est exactement comme si elle était rasée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Si une femme n''a pas la tête couverte, qu''elle se tonde aussi les cheveux. Et s''il est honteux pour une femme d''avoir les cheveux tondus ou d''être rasée, qu''elle se couvre donc la tête. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'L''homme n''est pas tenu de se couvrir la tête, puisqu''il est l''image et la gloire de Dieu; la femme, elle, est la gloire de l''homme. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'En effet, ce n''est pas l''homme qui a été tiré de la femme, mais la femme de l''homme; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'et ce n''est pas l''homme qui a été créé à cause de la femme, mais la femme à cause de l''homme. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Voilà pourquoi, à cause des anges, la femme doit porter sur la tête une marque d''autorité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Toutefois, dans le Seigneur, la femme n''existe pas sans l''homme, ni l''homme sans la femme, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: car, de même que la femme a été tirée de l'homme, de même l'homme naît de la femme, et tout vient de Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Jugez-en vous-mêmes: est-il convenable pour une femme de prier Dieu sans avoir la tête couverte? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'La nature elle-même ne vous enseigne-t-elle pas que c''est une honte pour l''homme de porter des cheveux longs, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'alors que c''est une gloire pour la femme d''en porter parce que la chevelure lui a été donnée pour servir de voile? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Si quelqu'un se plaît à contester, nous n'avons pas une telle habitude, et les Eglises de Dieu non plus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'En faisant la remarque suivante, je ne peux pas vous féliciter, car vous vous rassemblez non pour devenir meilleurs, mais pour devenir pires. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tout d''abord, j''apprends que, lorsque vous vous réunissez en assemblée, il y a parmi vous des divisions – et je le crois en partie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Il faut bien en effet qu''il y ait aussi des divisions parmi vous, afin que l''on puisse reconnaître ceux qui sont approuvés de Dieu au milieu de vous. – '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ainsi donc, lorsque vous vous réunissez, ce n''est pas pour prendre part au repas du Seigneur, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'car, dès que vous vous mettez à table, chacun s''empresse de prendre son propre repas, de sorte que l''un a faim, tandis que l''autre est ivre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: N'avez-vous pas des maisons pour manger et boire? Ou bien méprisez-vous l'Eglise de Dieu et voulez-vous faire honte à ceux qui n'ont rien? Que vous dire? Faut-il vous féliciter? Sur ce point, je ne vous félicite pas.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'En effet, j''ai reçu du Seigneur ce que je vous ai transmis. Le Seigneur Jésus, la nuit où il a été arrêté, a pris du pain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Après avoir remercié Dieu, il l''a rompu et a dit: [«Prenez, mangez.] Ceci est mon corps qui est [rompu] pour vous. Faites ceci en souvenir de moi.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'De même, après le repas, il a pris la coupe et a dit: «Cette coupe est la nouvelle alliance en mon sang. Faites ceci en souvenir de moi toutes les fois que vous en boirez.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: En effet, toutes les fois que vous mangez ce pain et que vous buvez cette coupe, vous annoncez la mort du Seigneur jusqu'à ce qu'il vienne.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'C''est pourquoi, celui qui mange ce pain ou boit la coupe du Seigneur indignement sera coupable envers le corps et le sang du Seigneur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Que chacun donc s''examine lui-même, et qu''ainsi il mange du pain et boive de la coupe, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: car celui qui mange et boit [indignement], sans discerner le corps [du Seigneur], mange et boit un jugement contre lui-même.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'C''est pour cela qu''il y a parmi vous beaucoup d''infirmes et de malades, et que plusieurs sont morts. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Si nous nous examinions nous-mêmes, nous ne serions pas jugés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Mais quand nous sommes jugés, c''est le Seigneur qui nous corrige afin que nous ne soyons pas condamnés avec le monde. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ainsi, mes frères et sœurs, lorsque vous vous réunissez pour le repas, attendez-vous les uns les autres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Si quelqu'un a faim, qu'il mange chez lui, afin que vous ne vous réunissiez pas pour attirer un jugement sur vous.
- type: usfm
  marker: p
  children:
  - type: text
    text: Quant aux autres questions, je les réglerai quand je viendrai chez vous.
