document_id: 1CO.11,152
type_code: fra
verses:
  '1':
  - type: text
    content: Soyez mes imitateurs, comme je le suis moi-même de Christ.
  - type: heading
    content: Attitudes dans l'Eglise
  '10':
  - type: text
    content: 'Voilà pourquoi, à cause des anges, la femme doit porter sur la tête une marque d''autorité. '
  '11':
  - type: text
    content: 'Toutefois, dans le Seigneur, la femme n''existe pas sans l''homme, ni l''homme sans la femme, '
  '12':
  - type: text
    content: car, de même que la femme a été tirée de l'homme, de même l'homme naît de la femme, et tout vient de Dieu.
  '13':
  - type: text
    content: 'Jugez-en vous-mêmes: est-il convenable pour une femme de prier Dieu sans avoir la tête couverte? '
  '14':
  - type: text
    content: 'La nature elle-même ne vous enseigne-t-elle pas que c''est une honte pour l''homme de porter des cheveux longs, '
  '15':
  - type: text
    content: 'alors que c''est une gloire pour la femme d''en porter parce que la chevelure lui a été donnée pour servir de voile? '
  '16':
  - type: text
    content: Si quelqu'un se plaît à contester, nous n'avons pas une telle habitude, et les Eglises de Dieu non plus.
  '17':
  - type: text
    content: 'En faisant la remarque suivante, je ne peux pas vous féliciter, car vous vous rassemblez non pour devenir meilleurs, mais pour devenir pires. '
  '18':
  - type: text
    content: 'Tout d''abord, j''apprends que, lorsque vous vous réunissez en assemblée, il y a parmi vous des divisions – et je le crois en partie. '
  '19':
  - type: text
    content: 'Il faut bien en effet qu''il y ait aussi des divisions parmi vous, afin que l''on puisse reconnaître ceux qui sont approuvés de Dieu au milieu de vous. – '
  '2':
  - type: text
    content: 'Je vous félicite de ce que vous vous souvenez de moi à tout point de vue et de ce que vous retenez mes instructions telles que je vous les ai transmises. '
  '20':
  - type: text
    content: 'Ainsi donc, lorsque vous vous réunissez, ce n''est pas pour prendre part au repas du Seigneur, '
  '21':
  - type: text
    content: 'car, dès que vous vous mettez à table, chacun s''empresse de prendre son propre repas, de sorte que l''un a faim, tandis que l''autre est ivre. '
  '22':
  - type: text
    content: N'avez-vous pas des maisons pour manger et boire? Ou bien méprisez-vous l'Eglise de Dieu et voulez-vous faire honte à ceux qui n'ont rien? Que vous dire? Faut-il vous féliciter? Sur ce point, je ne vous félicite pas.
  '23':
  - type: text
    content: 'En effet, j''ai reçu du Seigneur ce que je vous ai transmis. Le Seigneur Jésus, la nuit où il a été arrêté, a pris du pain. '
  '24':
  - type: text
    content: 'Après avoir remercié Dieu, il l''a rompu et a dit: [«Prenez, mangez.] Ceci est mon corps qui est [rompu] pour vous. Faites ceci en souvenir de moi.» '
  '25':
  - type: text
    content: 'De même, après le repas, il a pris la coupe et a dit: «Cette coupe est la nouvelle alliance en mon sang. Faites ceci en souvenir de moi toutes les fois que vous en boirez.» '
  '26':
  - type: text
    content: En effet, toutes les fois que vous mangez ce pain et que vous buvez cette coupe, vous annoncez la mort du Seigneur jusqu'à ce qu'il vienne.
  '27':
  - type: text
    content: 'C''est pourquoi, celui qui mange ce pain ou boit la coupe du Seigneur indignement sera coupable envers le corps et le sang du Seigneur. '
  '28':
  - type: text
    content: 'Que chacun donc s''examine lui-même, et qu''ainsi il mange du pain et boive de la coupe, '
  '29':
  - type: text
    content: car celui qui mange et boit [indignement], sans discerner le corps [du Seigneur], mange et boit un jugement contre lui-même.
  '3':
  - type: text
    content: 'Je veux cependant que vous sachiez ceci: Christ est le chef de tout homme, l''homme est le chef de la femme, et Dieu est le chef de Christ. '
  '30':
  - type: text
    content: 'C''est pour cela qu''il y a parmi vous beaucoup d''infirmes et de malades, et que plusieurs sont morts. '
  '31':
  - type: text
    content: 'Si nous nous examinions nous-mêmes, nous ne serions pas jugés. '
  '32':
  - type: text
    content: 'Mais quand nous sommes jugés, c''est le Seigneur qui nous corrige afin que nous ne soyons pas condamnés avec le monde. '
  '33':
  - type: text
    content: 'Ainsi, mes frères et sœurs, lorsque vous vous réunissez pour le repas, attendez-vous les uns les autres. '
  '34':
  - type: text
    content: Si quelqu'un a faim, qu'il mange chez lui, afin que vous ne vous réunissiez pas pour attirer un jugement sur vous.
  - type: text
    content: Quant aux autres questions, je les réglerai quand je viendrai chez vous.
  '4':
  - type: text
    content: 'Tout homme qui prie ou qui prophétise la tête couverte déshonore son chef. '
  '5':
  - type: text
    content: 'Toute femme, en revanche, qui prie ou qui prophétise la tête non couverte déshonore son chef à elle. En effet, c''est exactement comme si elle était rasée. '
  '6':
  - type: text
    content: 'Si une femme n''a pas la tête couverte, qu''elle se tonde aussi les cheveux. Et s''il est honteux pour une femme d''avoir les cheveux tondus ou d''être rasée, qu''elle se couvre donc la tête. '
  '7':
  - type: text
    content: 'L''homme n''est pas tenu de se couvrir la tête, puisqu''il est l''image et la gloire de Dieu; la femme, elle, est la gloire de l''homme. '
  '8':
  - type: text
    content: 'En effet, ce n''est pas l''homme qui a été tiré de la femme, mais la femme de l''homme; '
  '9':
  - type: text
    content: 'et ce n''est pas l''homme qui a été créé à cause de la femme, mais la femme à cause de l''homme. '
