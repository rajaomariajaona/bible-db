document_id: 2CH.23
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Au bout de 7 ans, Jehojada s''arma de courage et fit alliance avec les chefs de centaines: Azaria, fils de Jerocham, Ismaël, fils de Jochanan, Azaria, fils d''Obed, Maaséja, fils d''Adaja, et Elishaphath, fils de Zicri. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ils parcoururent Juda et rassemblèrent les Lévites de toutes les villes de Juda ainsi que les chefs de famille d''Israël, puis ils vinrent à Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Toute l''assemblée fit alliance avec le roi dans la maison de Dieu. Jehojada leur dit: «Voici le fils du roi! C''est à lui de régner, conformément à ce que l''Eternel a déclaré à propos des descendants de David. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Voici ce que vous ferez. Le tiers des prêtres et Lévites qui, parmi vous, prend son service le jour du sabbat devra garder les entrées, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'un autre tiers se postera au palais royal et un tiers à la porte de Jesod. Tout le peuple se trouvera alors dans les parvis de la maison de l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Que personne n''entre dans la maison de l''Eternel, excepté les prêtres et les Lévites de service: eux pourront entrer, car ils sont saints. Tout le peuple respectera les ordres de l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Les Lévites entoureront le roi de tous les côtés, chacun les armes à la main, et l'on donnera la mort à toute personne qui voudra entrer dans le temple. Vous serez près du roi dans toutes ses allées et venues.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Les Lévites et tout Juda suivirent tous les ordres qu''avait donnés le prêtre Jehojada. Ils prirent chacun leurs hommes, aussi bien ceux qui entraient en service que ceux qui sortaient de service le jour du sabbat, car le prêtre Jehojada n''avait exempté aucune des divisions. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Le prêtre Jehojada remit aux chefs de centaines les lances et les boucliers, grands et petits, qui venaient du roi David et qui se trouvaient dans la maison de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il fit entourer le roi en plaçant tout le peuple, chacun les armes à la main, en demi-cercle devant l''autel et le temple, depuis le côté droit jusqu''au côté gauche du bâtiment. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'On fit avancer le fils du roi, mit sur lui la couronne et lui donna le témoignage. On le proclama roi. Jehojada et ses fils le consacrèrent par onction et dirent: «Vive le roi!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Athalie entendit le bruit que faisait le peuple en accourant et célébrant le roi, et elle vint vers le peuple à la maison de l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Elle regarda et vit le roi qui se tenait sur son estrade à l''entrée; les chefs et les joueurs de trompette se tenaient près de lui. Tout le peuple du pays était dans la joie; on sonnait de la trompette et les musiciens avec leurs instruments dirigeaient les chants de louange. Athalie déchira ses habits et dit: «C''est une conspiration! C''est une conspiration!» '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Alors le prêtre Jehojada, faisant approcher les chefs de centaines qui étaient à la tête de l''armée, leur dit: «Faites-la sortir des rangs et que l''on tue par l''épée toute personne qui la suivra!» En effet, le prêtre avait interdit de la mettre à mort dans la maison de l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: On l'entraîna de force et elle arriva au palais royal par la porte des chevaux. C'est là qu'ils lui donnèrent la mort.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Jehojada conclut entre lui, tout le peuple et le roi une alliance par laquelle ils devaient être le peuple de l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Tout le peuple se rua vers le temple de Baal. Ils le démolirent, brisèrent ses autels et ses statues, et ils tuèrent Matthan, le prêtre de Baal, devant les autels. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Jehojada confia la responsabilité de la maison de l''Eternel aux prêtres lévites. C''étaient eux que David avait répartis en classes et chargés de la maison de l''Eternel pour qu''ils offrent des holocaustes à l''Eternel, conformément à ce qui est écrit dans la loi de Moïse. Cela se passa au milieu des réjouissances et des chants composés par David. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Il mit les portiers en place aux portes de la maison de l''Eternel, afin qu''aucune personne impure de quelque manière que ce soit ne puisse y entrer. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Il prit les chefs de centaines, les hommes influents, ceux qui dominaient le peuple ainsi que tout le peuple du pays, et il fit descendre le roi de la maison de l''Eternel. Ils entrèrent dans le palais royal par la porte supérieure et firent asseoir le roi sur le trône royal. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Tout le peuple du pays se réjouissait et la ville était tranquille. On avait fait mourir Athalie par l'épée.
