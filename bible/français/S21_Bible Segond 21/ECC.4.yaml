document_id: ECC.4,152
type_code: fra
verses:
  '1':
  - type: heading
    content: L'oppression et la solitude
  - type: text
    content: 'J''ai examiné ensuite toutes les oppressions qui se commettent sous le soleil: les opprimés sont dans les larmes et personne ne les console! La force est du côté de leurs oppresseurs et personne ne les console! '
  '10':
  - type: text
    content: 'En effet, en cas de chute, l''un relève son compagnon, mais malheur à celui qui est seul et qui tombe sans avoir de proche pour le relever! '
  '11':
  - type: text
    content: 'De même, si deux personnes dorment ensemble, elles auront chaud, mais celui qui est seul, comment aura-t-il chaud? '
  '12':
  - type: text
    content: Si quelqu'un peut l'emporter contre un seul homme, à deux on peut lui résister; la corde à trois fils ne se coupe pas facilement.
  '13':
  - type: text
    content: 'Mieux vaut être un enfant pauvre et sage qu''un roi vieux et stupide qui ne sait plus se laisser avertir. '
  '14':
  - type: text
    content: 'Oui, il peut même sortir de prison pour régner ou être né pauvre dans son royaume: '
  '15':
  - type: text
    content: 'j''ai vu tous les êtres vivants qui marchent sous le soleil se rallier à l''enfant destiné à succéder au roi et à régner à sa place; '
  '16':
  - type: text
    content: il n'y avait pas de fin à tout ce peuple, à tous ceux dont il avait pris la tête. Pourtant, les générations suivantes ne se réjouiront plus à son sujet. Oui, cela aussi, c'est de la fumée et cela revient à poursuivre le vent.
  - type: heading
    content: Danger de la langue
  '17':
  - type: text
    content: 'Veille sur ton pied, lorsque tu entres dans la maison de Dieu: approche-toi pour écouter, au lieu d''offrir le sacrifice que présentent les hommes stupides parce qu''ils ne savent pas qu''ils agissent mal.'
  '2':
  - type: text
    content: 'J''ai alors déclaré que les morts sont plus heureux d''être déjà morts que les vivants d''être encore en vie, '
  '3':
  - type: text
    content: et j'ai déclaré plus heureux encore que les uns et les autres celui qui n'a pas encore vécu, puisqu'il n'a pas vu le mal qui se commet sous le soleil.
  '4':
  - type: text
    content: J'ai vu que toute la peine que l'on se donne et tout le succès que l'on recherche dans une entreprise ne sont motivés que par la jalousie de l'homme vis-à-vis de son prochain. Cela aussi, c'est de la fumée et cela revient à poursuivre le vent.
  '5':
  - type: text
    content: 'L''homme stupide croise les bras et se détruit lui-même. '
  '6':
  - type: text
    content: Mieux vaut une poignée pleine de repos que deux poignées pleines de travail et d'une activité qui revient à poursuivre le vent.
  '7':
  - type: text
    content: 'J''ai examiné une autre réalité qui n''est que fumée sous le soleil: '
  '8':
  - type: text
    content: un homme peut être seul, sans aucun proche, sans fils ni frère, et pourtant son travail n'a pas de fin et ses yeux ne sont jamais rassasiés de richesses. «Pour qui donc est-ce que je travaille et me prive de bonheur?» se demande-t-il. Cela aussi, c'est de la fumée et une mauvaise occupation.
  '9':
  - type: text
    content: 'Il vaut mieux être deux que tout seul, parce qu''à deux on retire un bon profit du travail. '
