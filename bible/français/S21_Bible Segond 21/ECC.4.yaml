document_id: ECC.4
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L'oppression et la solitude
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'J''ai examiné ensuite toutes les oppressions qui se commettent sous le soleil: les opprimés sont dans les larmes et personne ne les console! La force est du côté de leurs oppresseurs et personne ne les console! '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'J''ai alors déclaré que les morts sont plus heureux d''être déjà morts que les vivants d''être encore en vie, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: et j'ai déclaré plus heureux encore que les uns et les autres celui qui n'a pas encore vécu, puisqu'il n'a pas vu le mal qui se commet sous le soleil.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: J'ai vu que toute la peine que l'on se donne et tout le succès que l'on recherche dans une entreprise ne sont motivés que par la jalousie de l'homme vis-à-vis de son prochain. Cela aussi, c'est de la fumée et cela revient à poursuivre le vent.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'L''homme stupide croise les bras et se détruit lui-même. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mieux vaut une poignée pleine de repos que deux poignées pleines de travail et d'une activité qui revient à poursuivre le vent.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'J''ai examiné une autre réalité qui n''est que fumée sous le soleil: '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: un homme peut être seul, sans aucun proche, sans fils ni frère, et pourtant son travail n'a pas de fin et ses yeux ne sont jamais rassasiés de richesses. «Pour qui donc est-ce que je travaille et me prive de bonheur?» se demande-t-il. Cela aussi, c'est de la fumée et une mauvaise occupation.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il vaut mieux être deux que tout seul, parce qu''à deux on retire un bon profit du travail. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'En effet, en cas de chute, l''un relève son compagnon, mais malheur à celui qui est seul et qui tombe sans avoir de proche pour le relever! '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'De même, si deux personnes dorment ensemble, elles auront chaud, mais celui qui est seul, comment aura-t-il chaud? '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Si quelqu'un peut l'emporter contre un seul homme, à deux on peut lui résister; la corde à trois fils ne se coupe pas facilement.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mieux vaut être un enfant pauvre et sage qu''un roi vieux et stupide qui ne sait plus se laisser avertir. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Oui, il peut même sortir de prison pour régner ou être né pauvre dans son royaume: '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'j''ai vu tous les êtres vivants qui marchent sous le soleil se rallier à l''enfant destiné à succéder au roi et à régner à sa place; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: il n'y avait pas de fin à tout ce peuple, à tous ceux dont il avait pris la tête. Pourtant, les générations suivantes ne se réjouiront plus à son sujet. Oui, cela aussi, c'est de la fumée et cela revient à poursuivre le vent.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Danger de la langue
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Veille sur ton pied, lorsque tu entres dans la maison de Dieu: approche-toi pour écouter, au lieu d''offrir le sacrifice que présentent les hommes stupides parce qu''ils ne savent pas qu''ils agissent mal.'
