document_id: PSA.84,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Bénédiction dans la maison de Dieu
  - type: text
    content: Au chef de chœur, sur la guitthith. Psaume des descendants de Koré.
  '10':
  - type: text
    content: Toi qui es notre bouclier, vois, ô Dieu,
  - type: text
    content: regarde le visage de celui que tu as désigné par onction!
  '11':
  - type: text
    content: Mieux vaut un jour dans tes parvis que 1000 ailleurs.
  - type: text
    content: Je préfère me tenir sur le seuil de la maison de mon Dieu
  - type: text
    content: plutôt que d'habiter sous les tentes des méchants,
  '12':
  - type: text
    content: car l'Eternel Dieu est un soleil et un bouclier.
  - type: text
    content: L'Eternel donne la grâce et la gloire,
  - type: text
    content: il ne refuse aucun bien à ceux qui marchent dans l'intégrité.
  '13':
  - type: text
    content: Eternel, maître de l'univers,
  - type: text
    content: heureux l'homme qui se confie en toi!
  '2':
  - type: text
    content: Combien tes résidences sont aimées,
  - type: text
    content: Eternel, maître de l'univers!
  '3':
  - type: text
    content: Mon âme soupire et même languit après les parvis de l'Eternel.
  - type: text
    content: Tout mon être pousse des cris de joie vers le Dieu vivant.
  '4':
  - type: text
    content: Même le moineau trouve une maison,
  - type: text
    content: et l'hirondelle un nid où elle dépose ses petits.
  - type: text
    content: Moi, je soupire après tes autels, Eternel, maître de l'univers,
  - type: text
    content: mon roi et mon Dieu!
  '5':
  - type: text
    content: 'Heureux ceux qui habitent ta maison:'
  - type: text
    content: 'ils peuvent te célébrer sans cesse. '
  - type: text
    content: – Pause.
  '6':
  - type: text
    content: 'Heureux ceux qui trouvent leur force en toi:'
  - type: text
    content: ils trouvent dans leur cœur des chemins tout tracés.
  '7':
  - type: text
    content: Lorsqu'ils traversent la vallée des pleurs,
  - type: text
    content: ils la transforment en un lieu plein de sources,
  - type: text
    content: et la pluie la couvre aussi de bénédictions.
  '8':
  - type: text
    content: Leur force augmente pendant la marche,
  - type: text
    content: et ils se présentent devant Dieu à Sion.
  '9':
  - type: text
    content: Eternel, Dieu de l'univers, écoute ma prière!
  - type: text
    content: 'Prête l''oreille, Dieu de Jacob! '
  - type: text
    content: – Pause.
