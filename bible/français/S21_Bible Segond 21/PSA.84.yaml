document_id: PSA.84
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Bénédiction dans la maison de Dieu
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef de chœur, sur la guitthith. Psaume des descendants de Koré.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Combien tes résidences sont aimées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eternel, maître de l'univers!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mon âme soupire et même languit après les parvis de l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tout mon être pousse des cris de joie vers le Dieu vivant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Même le moineau trouve une maison,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l'hirondelle un nid où elle dépose ses petits.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moi, je soupire après tes autels, Eternel, maître de l'univers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mon roi et mon Dieu!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Heureux ceux qui habitent ta maison:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ils peuvent te célébrer sans cesse. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: – Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Heureux ceux qui trouvent leur force en toi:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils trouvent dans leur cœur des chemins tout tracés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Lorsqu'ils traversent la vallée des pleurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils la transforment en un lieu plein de sources,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la pluie la couvre aussi de bénédictions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Leur force augmente pendant la marche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils se présentent devant Dieu à Sion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Eternel, Dieu de l'univers, écoute ma prière!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Prête l''oreille, Dieu de Jacob! '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: – Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Toi qui es notre bouclier, vois, ô Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: regarde le visage de celui que tu as désigné par onction!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mieux vaut un jour dans tes parvis que 1000 ailleurs.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je préfère me tenir sur le seuil de la maison de mon Dieu
- type: usfm
  marker: q1
  children:
  - type: text
    text: plutôt que d'habiter sous les tentes des méchants,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: car l'Eternel Dieu est un soleil et un bouclier.
- type: usfm
  marker: q1
  children:
  - type: text
    text: L'Eternel donne la grâce et la gloire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il ne refuse aucun bien à ceux qui marchent dans l'intégrité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Eternel, maître de l'univers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: heureux l'homme qui se confie en toi!
