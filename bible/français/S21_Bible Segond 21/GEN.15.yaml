document_id: GEN.15,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Renouvellement des promesses à Abram
  - type: text
    content: 'Après ces événements, la parole de l''Eternel fut adressée à Abram dans une vision. Il dit: «Abram, n''aie pas peur! Je suis ton bouclier et ta récompense sera très grande.» '
  '10':
  - type: text
    content: 'Abram prit tous ces animaux, les coupa par le milieu et mit chaque morceau l''un vis-à-vis de l''autre, mais il ne partagea pas les oiseaux. '
  '11':
  - type: text
    content: Les oiseaux de proie s'abattirent sur les cadavres, mais Abram les chassa.
  '12':
  - type: text
    content: 'Au coucher du soleil, un profond sommeil tomba sur Abram, et voici qu''il fut assailli par la terreur et une grande obscurité. '
  '13':
  - type: text
    content: 'L''Eternel dit à Abram: «Sache que *tes descendants seront étrangers dans un pays qui ne sera pas à eux. On les réduira en esclavage et on les opprimera pendant 400 ans. '
  '14':
  - type: text
    content: Cependant, la nation dont ils seront esclaves, c'est moi-même qui la jugerai
  - type: note
    content: 'Tes descendants… jugerai: cité par Etienne en Actes 7.6-7, avec une paraphrase du verset 16.'
  - type: text
    content: ', et ils sortiront ensuite avec de grandes richesses. '
  '15':
  - type: text
    content: 'Quant à toi, tu iras dans la paix rejoindre tes ancêtres, tu seras enterré après une heureuse vieillesse. '
  '16':
  - type: text
    content: 'Ce n''est qu''à la quatrième génération qu''ils reviendront ici, car la faute des Amoréens n''est pas encore à son comble.» '
  '17':
  - type: text
    content: Quand le soleil fut couché, il y eut une obscurité profonde, et un four fumant et des flammes passèrent entre les animaux partagés.
  '18':
  - type: text
    content: 'Ce jour-là, l''Eternel fit alliance avec Abram en disant: «C''est à ta descendance que je donne ce pays, celui qui va du fleuve d''Egypte jusqu''au grand fleuve, jusqu''à l''Euphrate, '
  '19':
  - type: text
    content: 'le pays des Kéniens, des Keniziens, des Kadmoniens, '
  '2':
  - type: text
    content: 'Abram répondit: «Seigneur Eternel, que me donneras-tu? Je m''en vais sans enfants et l''héritier de mes biens, c''est Eliézer de Damas.» '
  '20':
  - type: text
    content: 'des Hittites, des Phéréziens, des Rephaïm, '
  '21':
  - type: text
    content: des Amoréens, des Cananéens, des Guirgasiens et des Jébusiens.»
  '3':
  - type: text
    content: 'Abram dit: «Tu ne m''as pas donné de descendance, et c''est un serviteur de ma famille qui sera mon héritier.»'
  '4':
  - type: text
    content: 'Alors l''Eternel lui adressa la parole: «Ce n''est pas lui qui sera ton héritier, mais bien celui qui naîtra de toi.» '
  '5':
  - type: text
    content: 'Après l''avoir conduit dehors, il dit: «Regarde vers le ciel et compte les étoiles, si tu peux les compter.» Il lui affirma: *«Telle sera ta descendance.»'
  - type: note
    content: 'Telle… descendance: cité en Romains 4.18.'
  - type: text
    content: ' '
  '6':
  - type: text
    content: '*Abram eut confiance en l''Eternel, qui le lui compta comme justice.'
  - type: note
    content: 'Abram… justice: cité en Romains 4.3, 9, 22; Galates 3.6; Jacques 2.23.'
  '7':
  - type: text
    content: 'L''Eternel lui dit encore: «Je suis l''Eternel qui t''ai fait sortir d''Ur en Chaldée pour te donner ce pays en possession.» '
  '8':
  - type: text
    content: 'Abram répondit: «Seigneur Eternel, à quoi reconnaîtrai-je que je le posséderai?» '
  '9':
  - type: text
    content: 'L''Eternel lui dit: «Prends une génisse de 3 ans, une chèvre de 3 ans, un bélier de 3 ans, une tourterelle et une jeune colombe.» '
