document_id: GEN.15,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Renouvellement des promesses à Abram
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Après ces événements, la parole de l''Eternel fut adressée à Abram dans une vision. Il dit: «Abram, n''aie pas peur! Je suis ton bouclier et ta récompense sera très grande.» '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Abram prit tous ces animaux, les coupa par le milieu et mit chaque morceau l''un vis-à-vis de l''autre, mais il ne partagea pas les oiseaux. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Les oiseaux de proie s'abattirent sur les cadavres, mais Abram les chassa.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Au coucher du soleil, un profond sommeil tomba sur Abram, et voici qu''il fut assailli par la terreur et une grande obscurité. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'L''Eternel dit à Abram: «Sache que *tes descendants seront étrangers dans un pays qui ne sera pas à eux. On les réduira en esclavage et on les opprimera pendant 400 ans. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Cependant, la nation dont ils seront esclaves, c'est moi-même qui la jugerai
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.13-14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tes descendants… jugerai: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité par Etienne en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Actes 7.6-7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', avec une paraphrase du verset 16.'
      marker-yv: yv-n
    - type: text
      text: ', et ils sortiront ensuite avec de grandes richesses. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Quant à toi, tu iras dans la paix rejoindre tes ancêtres, tu seras enterré après une heureuse vieillesse. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ce n''est qu''à la quatrième génération qu''ils reviendront ici, car la faute des Amoréens n''est pas encore à son comble.» '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Quand le soleil fut couché, il y eut une obscurité profonde, et un four fumant et des flammes passèrent entre les animaux partagés.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ce jour-là, l''Eternel fit alliance avec Abram en disant: «C''est à ta descendance que je donne ce pays, celui qui va du fleuve d''Egypte jusqu''au grand fleuve, jusqu''à l''Euphrate, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'le pays des Kéniens, des Keniziens, des Kadmoniens, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Abram répondit: «Seigneur Eternel, que me donneras-tu? Je m''en vais sans enfants et l''héritier de mes biens, c''est Eliézer de Damas.» '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'des Hittites, des Phéréziens, des Rephaïm, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: des Amoréens, des Cananéens, des Guirgasiens et des Jébusiens.»
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Abram dit: «Tu ne m''as pas donné de descendance, et c''est un serviteur de ma famille qui sera mon héritier.»'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Alors l''Eternel lui adressa la parole: «Ce n''est pas lui qui sera ton héritier, mais bien celui qui naîtra de toi.» '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Après l''avoir conduit dehors, il dit: «Regarde vers le ciel et compte les étoiles, si tu peux les compter.» Il lui affirma: *«Telle sera ta descendance.»'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Telle… descendance: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Romains 4.18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: '*Abram eut confiance en l''Eternel, qui le lui compta comme justice.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Abram… justice: cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Romains 4.3
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '9'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '22'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Galates 3.6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jacques 2.23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'L''Eternel lui dit encore: «Je suis l''Eternel qui t''ai fait sortir d''Ur en Chaldée pour te donner ce pays en possession.» '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Abram répondit: «Seigneur Eternel, à quoi reconnaîtrai-je que je le posséderai?» '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'L''Eternel lui dit: «Prends une génisse de 3 ans, une chèvre de 3 ans, un bélier de 3 ans, une tourterelle et une jeune colombe.» '
