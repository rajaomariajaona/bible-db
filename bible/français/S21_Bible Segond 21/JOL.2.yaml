document_id: JOL.2,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Sonnez de la trompette dans Sion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: faites-la retentir sur ma montagne sainte!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que tous les habitants du pays tremblent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'car le jour de l''Eternel vient, il est proche:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Devant eux la terre tremble,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le ciel est ébranlé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le soleil et la lune s'obscurcissent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les étoiles perdent leur éclat.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: L'Eternel fait entendre sa voix à la tête de son armée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car son camp est immense,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et celui qui accomplit sa parole est puissant.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, le jour de l'Eternel est grand, il est terrible.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui pourra le supporter?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Appel à revenir à Dieu
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Maintenant encore, déclare l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: revenez à moi de tout votre cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avec des jeûnes, avec des pleurs et des lamentations.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Déchirez votre cœur et non vos habits,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et revenez à l'Eternel, votre Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car *il fait grâce, il est rempli de compassion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lent à la colère et riche en bonté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il regrette le mal qu'il envoie
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Il fait… envoie: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'même présentation en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jonas 4.2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Qui sait? Peut-être regrettera-t-il encore
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et laissera-t-il après lui la bénédiction,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des offrandes végétales et liquides pour l'Eternel, votre Dieu.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Sonnez de la trompette dans Sion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: proclamez un jeûne, une assemblée solennelle!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Rassemblez le peuple, formez une sainte réunion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rassemblez les vieillards,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rassemblez les enfants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: même les nourrissons!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que le jeune marié sorte de son foyer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la jeune mariée de sa chambre!
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Qu'entre le portique et l'autel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les prêtres pleurent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les serviteurs de l'Eternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Qu''ils disent: «Eternel, épargne ton peuple,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: n'expose pas ton héritage à l'insulte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aux moqueries des nations!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Pourquoi dirait-on parmi les peuples:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Où est leur Dieu?’»
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: L'Eternel aime jalousement son pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il épargne son peuple.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'L''Eternel répond et dit à son peuple:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Je vous enverrai le blé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le vin nouveau et l'huile.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous en serez rassasiés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je ne vous exposerai plus à l'insulte parmi les nations.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: jour de ténèbres et d'obscurité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: jour de nuages et de brouillard,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il vient comme l'aurore qui se déploie sur les montagnes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici un peuple nombreux et puissant;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il n'y en a jamais eu
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il n'y en aura jamais de pareil, de génération en génération.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: J'éloignerai de vous l'ennemi du nord,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je le chasserai vers une terre aride et déserte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: son avant-garde dans la mer Morte
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et son arrière-garde dans la mer Méditerranée.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Son infection se propagera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sa puanteur s'élèvera dans les airs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce qu'il a fait de grandes choses.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: »Terre, n'aie pas peur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sois dans l'allégresse et réjouis-toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car l'Eternel fait de grandes choses!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Bêtes sauvages, n'ayez pas peur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car les plaines du désert reverdiront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les arbres porteront leurs fruits,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le figuier et la vigne donneront leurs richesses.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Et vous, habitants de Sion, soyez dans l'allégresse et réjouissez-vous
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en l'Eternel, votre Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car il vous donnera la pluie au moment voulu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il vous enverra les premières et les dernières pluies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme par le passé.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Les aires se rempliront de blé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les cuves regorgeront de vin nouveau et d'huile.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: »Je vous remplacerai les années
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu'ont dévorées la sauterelle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le grillon, le criquet et la chenille,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ma grande armée que j'avais envoyée contre vous.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Vous mangerez et vous vous rassasierez,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous célébrerez le nom de l'Eternel, votre Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui aura fait pour vous des prodiges;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et mon peuple ne sera plus jamais dans la honte.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Vous saurez que je suis au milieu d'Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que je suis l'Eternel, votre Dieu, et qu'il n'y en a pas d'autre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et mon peuple ne sera plus jamais dans la honte.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Devant lui est un feu dévorant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et derrière lui une flamme brûlante.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avant, le pays était comme un jardin d'Eden
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Jardin d''Eden: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Genèse 2.8-15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et depuis, c''est un désert affreux:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rien ne lui échappe.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: A les voir, on dirait des chevaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils courent comme des cavaliers.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: A les entendre, on dirait un bruit de chars
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur le sommet des montagnes où ils bondissent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on dirait le pétillement d'une flamme de feu
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand elle brûle la paille.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est comme une armée puissante
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui se prépare au combat.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Devant eux les peuples tremblent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous les visages pâlissent.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ils s'élancent comme des guerriers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils escaladent les murs comme des hommes de guerre.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Chacun va son chemin
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans s'écarter de sa route.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ils ne se bousculent pas les uns les autres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: chacun garde son rang.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils se précipitent au travers des projectiles
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans arrêter leur marche.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ils attaquent la ville,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: courent sur les murailles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: montent dans les maisons,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: entrent par les fenêtres comme un voleur.
