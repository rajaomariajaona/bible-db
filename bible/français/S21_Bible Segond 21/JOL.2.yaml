document_id: JOL.2,152
type_code: fra
verses:
  '1':
  - type: text
    content: Sonnez de la trompette dans Sion,
  - type: text
    content: faites-la retentir sur ma montagne sainte!
  - type: text
    content: Que tous les habitants du pays tremblent,
  - type: text
    content: 'car le jour de l''Eternel vient, il est proche:'
  '10':
  - type: text
    content: Devant eux la terre tremble,
  - type: text
    content: le ciel est ébranlé,
  - type: text
    content: le soleil et la lune s'obscurcissent
  - type: text
    content: et les étoiles perdent leur éclat.
  '11':
  - type: text
    content: L'Eternel fait entendre sa voix à la tête de son armée,
  - type: text
    content: car son camp est immense,
  - type: text
    content: et celui qui accomplit sa parole est puissant.
  - type: text
    content: Oui, le jour de l'Eternel est grand, il est terrible.
  - type: text
    content: Qui pourra le supporter?
  - type: heading
    content: Appel à revenir à Dieu
  '12':
  - type: text
    content: Maintenant encore, déclare l'Eternel,
  - type: text
    content: revenez à moi de tout votre cœur,
  - type: text
    content: avec des jeûnes, avec des pleurs et des lamentations.
  '13':
  - type: text
    content: Déchirez votre cœur et non vos habits,
  - type: text
    content: et revenez à l'Eternel, votre Dieu,
  - type: text
    content: car *il fait grâce, il est rempli de compassion,
  - type: text
    content: lent à la colère et riche en bonté,
  - type: text
    content: et il regrette le mal qu'il envoie
  - type: note
    content: 'Il fait… envoie: même présentation en Jonas 4.2.'
  - type: text
    content: .
  '14':
  - type: text
    content: Qui sait? Peut-être regrettera-t-il encore
  - type: text
    content: et laissera-t-il après lui la bénédiction,
  - type: text
    content: des offrandes végétales et liquides pour l'Eternel, votre Dieu.
  '15':
  - type: text
    content: Sonnez de la trompette dans Sion,
  - type: text
    content: proclamez un jeûne, une assemblée solennelle!
  '16':
  - type: text
    content: Rassemblez le peuple, formez une sainte réunion,
  - type: text
    content: rassemblez les vieillards,
  - type: text
    content: rassemblez les enfants,
  - type: text
    content: même les nourrissons!
  - type: text
    content: Que le jeune marié sorte de son foyer,
  - type: text
    content: et la jeune mariée de sa chambre!
  '17':
  - type: text
    content: Qu'entre le portique et l'autel
  - type: text
    content: les prêtres pleurent,
  - type: text
    content: les serviteurs de l'Eternel!
  - type: text
    content: 'Qu''ils disent: «Eternel, épargne ton peuple,'
  - type: text
    content: n'expose pas ton héritage à l'insulte,
  - type: text
    content: aux moqueries des nations!
  - type: text
    content: 'Pourquoi dirait-on parmi les peuples:'
  - type: text
    content: ‘Où est leur Dieu?’»
  '18':
  - type: text
    content: L'Eternel aime jalousement son pays,
  - type: text
    content: et il épargne son peuple.
  '19':
  - type: text
    content: 'L''Eternel répond et dit à son peuple:'
  - type: text
    content: «Je vous enverrai le blé,
  - type: text
    content: le vin nouveau et l'huile.
  - type: text
    content: Vous en serez rassasiés,
  - type: text
    content: et je ne vous exposerai plus à l'insulte parmi les nations.
  '2':
  - type: text
    content: jour de ténèbres et d'obscurité,
  - type: text
    content: jour de nuages et de brouillard,
  - type: text
    content: il vient comme l'aurore qui se déploie sur les montagnes.
  - type: text
    content: Voici un peuple nombreux et puissant;
  - type: text
    content: il n'y en a jamais eu
  - type: text
    content: et il n'y en aura jamais de pareil, de génération en génération.
  '20':
  - type: text
    content: J'éloignerai de vous l'ennemi du nord,
  - type: text
    content: je le chasserai vers une terre aride et déserte,
  - type: text
    content: son avant-garde dans la mer Morte
  - type: text
    content: et son arrière-garde dans la mer Méditerranée.
  - type: text
    content: Son infection se propagera,
  - type: text
    content: sa puanteur s'élèvera dans les airs,
  - type: text
    content: parce qu'il a fait de grandes choses.
  '21':
  - type: text
    content: »Terre, n'aie pas peur,
  - type: text
    content: sois dans l'allégresse et réjouis-toi,
  - type: text
    content: car l'Eternel fait de grandes choses!
  '22':
  - type: text
    content: Bêtes sauvages, n'ayez pas peur,
  - type: text
    content: car les plaines du désert reverdiront,
  - type: text
    content: les arbres porteront leurs fruits,
  - type: text
    content: le figuier et la vigne donneront leurs richesses.
  '23':
  - type: text
    content: Et vous, habitants de Sion, soyez dans l'allégresse et réjouissez-vous
  - type: text
    content: en l'Eternel, votre Dieu,
  - type: text
    content: car il vous donnera la pluie au moment voulu,
  - type: text
    content: il vous enverra les premières et les dernières pluies,
  - type: text
    content: comme par le passé.
  '24':
  - type: text
    content: Les aires se rempliront de blé,
  - type: text
    content: et les cuves regorgeront de vin nouveau et d'huile.
  '25':
  - type: text
    content: »Je vous remplacerai les années
  - type: text
    content: qu'ont dévorées la sauterelle,
  - type: text
    content: le grillon, le criquet et la chenille,
  - type: text
    content: ma grande armée que j'avais envoyée contre vous.
  '26':
  - type: text
    content: Vous mangerez et vous vous rassasierez,
  - type: text
    content: vous célébrerez le nom de l'Eternel, votre Dieu,
  - type: text
    content: qui aura fait pour vous des prodiges;
  - type: text
    content: et mon peuple ne sera plus jamais dans la honte.
  '27':
  - type: text
    content: Vous saurez que je suis au milieu d'Israël,
  - type: text
    content: que je suis l'Eternel, votre Dieu, et qu'il n'y en a pas d'autre,
  - type: text
    content: et mon peuple ne sera plus jamais dans la honte.
  '3':
  - type: text
    content: Devant lui est un feu dévorant,
  - type: text
    content: et derrière lui une flamme brûlante.
  - type: text
    content: Avant, le pays était comme un jardin d'Eden
  - type: note
    content: 'Jardin d''Eden: voir Genèse 2.8-15.'
  - type: text
    content: ','
  - type: text
    content: 'et depuis, c''est un désert affreux:'
  - type: text
    content: rien ne lui échappe.
  '4':
  - type: text
    content: A les voir, on dirait des chevaux,
  - type: text
    content: et ils courent comme des cavaliers.
  '5':
  - type: text
    content: A les entendre, on dirait un bruit de chars
  - type: text
    content: sur le sommet des montagnes où ils bondissent,
  - type: text
    content: on dirait le pétillement d'une flamme de feu
  - type: text
    content: quand elle brûle la paille.
  - type: text
    content: C'est comme une armée puissante
  - type: text
    content: qui se prépare au combat.
  '6':
  - type: text
    content: Devant eux les peuples tremblent,
  - type: text
    content: tous les visages pâlissent.
  '7':
  - type: text
    content: Ils s'élancent comme des guerriers,
  - type: text
    content: ils escaladent les murs comme des hommes de guerre.
  - type: text
    content: Chacun va son chemin
  - type: text
    content: sans s'écarter de sa route.
  '8':
  - type: text
    content: Ils ne se bousculent pas les uns les autres,
  - type: text
    content: chacun garde son rang.
  - type: text
    content: Ils se précipitent au travers des projectiles
  - type: text
    content: sans arrêter leur marche.
  '9':
  - type: text
    content: Ils attaquent la ville,
  - type: text
    content: courent sur les murailles,
  - type: text
    content: montent dans les maisons,
  - type: text
    content: entrent par les fenêtres comme un voleur.
