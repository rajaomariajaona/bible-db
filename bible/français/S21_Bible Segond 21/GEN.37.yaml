document_id: GEN.37,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Histoire de Joseph
  - type: heading
    content: 37.1–50.26
  - type: heading
    content: Joseph vendu par ses frères
  - type: text
    content: Quant à Jacob, il s'installa dans le pays de Canaan, là où son père avait séjourné.
  '10':
  - type: text
    content: 'Il le raconta à son père et à ses frères. Son père lui fit des reproches et lui dit: «Que signifie le rêve que tu as fait? Faut-il que nous venions, moi, ta mère et tes frères, nous prosterner jusqu''à terre devant toi?» '
  '11':
  - type: text
    content: Ses frères se montrèrent jaloux de lui, mais son père garda le souvenir de cela.
  '12':
  - type: text
    content: 'Les frères de Joseph étaient allés s''occuper du troupeau de leur père à Sichem. '
  '13':
  - type: text
    content: 'Israël dit à Joseph: «Tes frères ne s''occupent-ils pas du troupeau à Sichem? Vas-y! Je veux t''envoyer vers eux.» Il lui répondit: «Me voici!» '
  '14':
  - type: text
    content: 'Israël lui dit: «Va donc voir si tes frères sont en bonne santé et si le troupeau est en bon état; tu m''en rapporteras des nouvelles.» Il le fit ainsi partir de la vallée d''Hébron. Joseph se rendit à Sichem. '
  '15':
  - type: text
    content: 'Un homme le rencontra alors qu''il errait dans la campagne et lui demanda: «Que cherches-tu?» '
  '16':
  - type: text
    content: 'Joseph répondit: «Ce sont mes frères que je cherche. Dis-moi donc où ils gardent le troupeau.» '
  '17':
  - type: text
    content: 'L''homme dit: «Ils sont partis d''ici. En effet, je les ai entendus dire: ‘Allons à Dothan.’» Joseph partit sur les traces de ses frères, et il les trouva à Dothan.'
  '18':
  - type: text
    content: 'Ils le virent de loin et, avant qu''il ne soit près d''eux, ils complotèrent de le faire mourir. '
  '19':
  - type: text
    content: 'Ils se dirent l''un à l''autre: «Voici le rêveur qui arrive! '
  '2':
  - type: text
    content: 'Voici la lignée de Jacob. A l''âge de 17 ans, Joseph prenait soin du troupeau avec ses frères. Le garçon était en compagnie des fils de Bilha et de Zilpa, les femmes de son père, et il rapportait leurs mauvais propos à leur père. '
  '20':
  - type: text
    content: 'Allons-y maintenant! Tuons-le et jetons-le dans une des citernes. Nous dirons qu''une bête féroce l''a dévoré et nous verrons ce que deviendront ses rêves.» '
  '21':
  - type: text
    content: 'Ruben entendit cela et il le délivra de leurs mains. Il dit: «N''attentons pas à sa vie!» '
  '22':
  - type: text
    content: 'Il leur dit encore: «Ne versez pas de sang! Jetez-le dans cette citerne qui est dans le désert et ne portez pas la main contre lui!» Il avait l''intention de le délivrer de leurs mains pour le faire retourner vers son père.'
  '23':
  - type: text
    content: 'Lorsque Joseph fut arrivé vers ses frères, ils le dépouillèrent de son habit, de l''habit de plusieurs couleurs qu''il portait. '
  '24':
  - type: text
    content: 'Ils s''emparèrent de lui et le jetèrent dans la citerne. Celle-ci était vide: il n''y avait pas d''eau. '
  '25':
  - type: text
    content: 'Ils s''assirent ensuite pour manger. Levant les yeux, ils virent une caravane d''Ismaélites qui venaient de Galaad. Leurs chameaux étaient chargés d''aromates, de baume et de myrrhe qu''ils transportaient en Egypte. '
  '26':
  - type: text
    content: 'Juda dit alors à ses frères: «Que gagnerons-nous à tuer notre frère et à cacher son sang? '
  '27':
  - type: text
    content: 'Venez, vendons-le aux Ismaélites et ne portons pas la main sur lui, car il est notre frère, il est de notre chair.» Ses frères l''écoutèrent. '
  '28':
  - type: text
    content: Au passage des marchands madianites, ils tirèrent et firent remonter Joseph de la citerne, et ils le vendirent pour 20 pièces d'argent aux Ismaélites qui l'emmenèrent en Egypte.
  '29':
  - type: text
    content: 'Lorsque Ruben revint à la citerne, il constata que Joseph n''y était plus. Il déchira ses vêtements, '
  '3':
  - type: text
    content: 'Israël aimait Joseph plus que tous ses autres fils parce qu''il l''avait eu dans sa vieillesse, et il lui fit un habit de plusieurs couleurs. '
  '30':
  - type: text
    content: 'retourna vers ses frères et dit: «Il n''est plus là! Et moi, où puis-je aller?» '
  '31':
  - type: text
    content: 'Ils prirent alors l''habit de Joseph, tuèrent un bouc et plongèrent l''habit dans le sang. '
  '32':
  - type: text
    content: 'Ils envoyèrent l''habit de plusieurs couleurs à leur père avec ce message: «Voici ce que nous avons trouvé. Reconnais donc si c''est l''habit de ton fils ou non.»'
  '33':
  - type: text
    content: 'Jacob le reconnut et dit: «C''est l''habit de mon fils! Une bête féroce l''a dévoré, Joseph a été mis en pièces!» '
  '34':
  - type: text
    content: 'Jacob déchira ses vêtements, il mit un sac sur sa taille et il mena longtemps le deuil sur son fils. '
  '35':
  - type: text
    content: 'Tous ses fils et toutes ses filles vinrent pour le consoler, mais il refusait d''être consolé. Il disait: «C''est dans le deuil que je descendrai vers mon fils au séjour des morts», et il pleurait son fils.'
  '36':
  - type: text
    content: Quant aux Madianites, ils vendirent Joseph en Egypte à Potiphar, un officier du pharaon qui était chef des gardes.
  '4':
  - type: text
    content: Ses frères remarquèrent que leur père l'aimait plus qu'eux tous et se mirent à le détester. Ils étaient incapables de lui parler sans agressivité.
  '5':
  - type: text
    content: 'Joseph fit un rêve, et il le raconta à ses frères qui le détestèrent encore plus. '
  '6':
  - type: text
    content: 'Il leur dit: «Ecoutez donc le rêve que j''ai fait! '
  '7':
  - type: text
    content: 'Nous étions en train d''attacher des gerbes au milieu des champs, et voici que ma gerbe s''est dressée et est même restée debout. Vos gerbes l''ont alors entourée et se sont prosternées devant elle.» '
  '8':
  - type: text
    content: 'Ses frères lui dirent: «Est-ce que tu vas vraiment régner sur nous? Est-ce que tu vas nous gouverner?» Ils le détestèrent encore plus à cause de ses rêves et de ses paroles.'
  '9':
  - type: text
    content: 'Joseph fit encore un autre rêve, et il le raconta à ses frères. Il dit: «J''ai fait encore un rêve: le soleil, la lune et onze étoiles se prosternaient devant moi.» '
