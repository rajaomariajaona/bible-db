document_id: GEN.37
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Histoire de Joseph
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 37.1–50.26
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Joseph vendu par ses frères
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Quant à Jacob, il s'installa dans le pays de Canaan, là où son père avait séjourné.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Voici la lignée de Jacob. A l''âge de 17 ans, Joseph prenait soin du troupeau avec ses frères. Le garçon était en compagnie des fils de Bilha et de Zilpa, les femmes de son père, et il rapportait leurs mauvais propos à leur père. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Israël aimait Joseph plus que tous ses autres fils parce qu''il l''avait eu dans sa vieillesse, et il lui fit un habit de plusieurs couleurs. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ses frères remarquèrent que leur père l'aimait plus qu'eux tous et se mirent à le détester. Ils étaient incapables de lui parler sans agressivité.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Joseph fit un rêve, et il le raconta à ses frères qui le détestèrent encore plus. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il leur dit: «Ecoutez donc le rêve que j''ai fait! '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nous étions en train d''attacher des gerbes au milieu des champs, et voici que ma gerbe s''est dressée et est même restée debout. Vos gerbes l''ont alors entourée et se sont prosternées devant elle.» '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ses frères lui dirent: «Est-ce que tu vas vraiment régner sur nous? Est-ce que tu vas nous gouverner?» Ils le détestèrent encore plus à cause de ses rêves et de ses paroles.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Joseph fit encore un autre rêve, et il le raconta à ses frères. Il dit: «J''ai fait encore un rêve: le soleil, la lune et onze étoiles se prosternaient devant moi.» '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il le raconta à son père et à ses frères. Son père lui fit des reproches et lui dit: «Que signifie le rêve que tu as fait? Faut-il que nous venions, moi, ta mère et tes frères, nous prosterner jusqu''à terre devant toi?» '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ses frères se montrèrent jaloux de lui, mais son père garda le souvenir de cela.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Les frères de Joseph étaient allés s''occuper du troupeau de leur père à Sichem. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Israël dit à Joseph: «Tes frères ne s''occupent-ils pas du troupeau à Sichem? Vas-y! Je veux t''envoyer vers eux.» Il lui répondit: «Me voici!» '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Israël lui dit: «Va donc voir si tes frères sont en bonne santé et si le troupeau est en bon état; tu m''en rapporteras des nouvelles.» Il le fit ainsi partir de la vallée d''Hébron. Joseph se rendit à Sichem. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Un homme le rencontra alors qu''il errait dans la campagne et lui demanda: «Que cherches-tu?» '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Joseph répondit: «Ce sont mes frères que je cherche. Dis-moi donc où ils gardent le troupeau.» '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'L''homme dit: «Ils sont partis d''ici. En effet, je les ai entendus dire: ‘Allons à Dothan.’» Joseph partit sur les traces de ses frères, et il les trouva à Dothan.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ils le virent de loin et, avant qu''il ne soit près d''eux, ils complotèrent de le faire mourir. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ils se dirent l''un à l''autre: «Voici le rêveur qui arrive! '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Allons-y maintenant! Tuons-le et jetons-le dans une des citernes. Nous dirons qu''une bête féroce l''a dévoré et nous verrons ce que deviendront ses rêves.» '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ruben entendit cela et il le délivra de leurs mains. Il dit: «N''attentons pas à sa vie!» '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Il leur dit encore: «Ne versez pas de sang! Jetez-le dans cette citerne qui est dans le désert et ne portez pas la main contre lui!» Il avait l''intention de le délivrer de leurs mains pour le faire retourner vers son père.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Lorsque Joseph fut arrivé vers ses frères, ils le dépouillèrent de son habit, de l''habit de plusieurs couleurs qu''il portait. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ils s''emparèrent de lui et le jetèrent dans la citerne. Celle-ci était vide: il n''y avait pas d''eau. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ils s''assirent ensuite pour manger. Levant les yeux, ils virent une caravane d''Ismaélites qui venaient de Galaad. Leurs chameaux étaient chargés d''aromates, de baume et de myrrhe qu''ils transportaient en Egypte. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Juda dit alors à ses frères: «Que gagnerons-nous à tuer notre frère et à cacher son sang? '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Venez, vendons-le aux Ismaélites et ne portons pas la main sur lui, car il est notre frère, il est de notre chair.» Ses frères l''écoutèrent. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Au passage des marchands madianites, ils tirèrent et firent remonter Joseph de la citerne, et ils le vendirent pour 20 pièces d'argent aux Ismaélites qui l'emmenèrent en Egypte.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Lorsque Ruben revint à la citerne, il constata que Joseph n''y était plus. Il déchira ses vêtements, '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'retourna vers ses frères et dit: «Il n''est plus là! Et moi, où puis-je aller?» '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ils prirent alors l''habit de Joseph, tuèrent un bouc et plongèrent l''habit dans le sang. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ils envoyèrent l''habit de plusieurs couleurs à leur père avec ce message: «Voici ce que nous avons trouvé. Reconnais donc si c''est l''habit de ton fils ou non.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Jacob le reconnut et dit: «C''est l''habit de mon fils! Une bête féroce l''a dévoré, Joseph a été mis en pièces!» '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Jacob déchira ses vêtements, il mit un sac sur sa taille et il mena longtemps le deuil sur son fils. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Tous ses fils et toutes ses filles vinrent pour le consoler, mais il refusait d''être consolé. Il disait: «C''est dans le deuil que je descendrai vers mon fils au séjour des morts», et il pleurait son fils.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Quant aux Madianites, ils vendirent Joseph en Egypte à Potiphar, un officier du pharaon qui était chef des gardes.
