document_id: GEN.49,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Bénédiction et mort de Jacob
  - type: text
    content: 'Jacob appela ses fils et dit: «Rassemblez-vous et je vous annoncerai ce qui vous arrivera dans l''avenir.'
  '10':
  - type: text
    content: Le sceptre ne s'éloignera pas de Juda,
  - type: text
    content: ni le bâton souverain d'entre ses pieds,
  - type: text
    content: jusqu'à ce que vienne le Shilo
  - type: note
    content: 'Le Shilo: le sens de ce mot est incertain (l''envoyé, le pacifique ou encore celui à qui il appartient), mais il est généralement compris comme renvoyant au Messie.'
  - type: text
    content: et que les peuples lui obéissent.
  '11':
  - type: text
    content: Il attache son âne à la vigne
  - type: text
    content: et le petit de son ânesse au meilleur cep.
  - type: text
    content: Il lave son vêtement dans le vin
  - type: text
    content: et son manteau dans le sang des raisins.
  '12':
  - type: text
    content: Il a les yeux rouges de vin
  - type: text
    content: et les dents blanches de lait.
  '13':
  - type: text
    content: »Zabulon résidera sur la côte maritime,
  - type: text
    content: il sera sur la côte des bateaux
  - type: text
    content: et sa frontière s'étendra du côté de Sidon.
  '14':
  - type: text
    content: »Issacar est un âne robuste
  - type: text
    content: qui se couche dans les étables.
  '15':
  - type: text
    content: Il voit que le repos est agréable
  - type: text
    content: et que la région est magnifique,
  - type: text
    content: et il courbe son épaule sous le fardeau,
  - type: text
    content: il se soumet à des corvées d'esclave.
  '16':
  - type: text
    content: »Dan jugera son peuple
  - type: text
    content: comme une seule des tribus d'Israël.
  '17':
  - type: text
    content: Dan sera un serpent sur le chemin,
  - type: text
    content: une vipère sur le sentier,
  - type: text
    content: qui mord les talons du cheval
  - type: text
    content: pour que le cavalier tombe à la renverse.
  '18':
  - type: text
    content: »J'espère en ton secours, Eternel!
  '19':
  - type: text
    content: Gad sera attaqué par des bandes armées,
  - type: text
    content: mais c'est lui qui les attaquera et les poursuivra.
  '2':
  - type: text
    content: Rassemblez-vous et écoutez, fils de Jacob!
  - type: text
    content: Ecoutez Israël, votre père!
  '20':
  - type: text
    content: »Aser produit une nourriture excellente;
  - type: text
    content: il fournira les plats les plus raffinés des rois.
  '21':
  - type: text
    content: »Nephthali est une biche en liberté.
  - type: text
    content: Il profère de belles paroles.
  '22':
  - type: text
    content: »Joseph est le rejeton d'un arbre fertile,
  - type: text
    content: le rejeton d'un arbre fertile près d'une source;
  - type: text
    content: ses branches dépassent le mur.
  '23':
  - type: text
    content: On l'a provoqué, on lui a lancé des flèches,
  - type: text
    content: les archers l'ont poursuivi de leur haine,
  '24':
  - type: text
    content: mais son arc est resté ferme
  - type: text
    content: et ses bras ont été fortifiés
  - type: text
    content: par l'intervention du Dieu puissant de Jacob.
  - type: text
    content: Il est ainsi devenu le berger, le rocher d'Israël.
  '25':
  - type: text
    content: C'est l'œuvre du Dieu de ton père, et il t'aidera;
  - type: text
    content: c'est l'œuvre du Tout-Puissant, et il te bénira.
  - type: text
    content: Il t'accordera les bénédictions du ciel,
  - type: text
    content: les bénédictions de l'eau souterraine,
  - type: text
    content: les bénédictions de la mamelle et du ventre maternel.
  '26':
  - type: text
    content: Les bénédictions de ton père dépassent celles de ses ancêtres,
  - type: text
    content: elles vont jusqu'aux limites des anciennes collines.
  - type: text
    content: Qu'elles reposent sur la tête de Joseph,
  - type: text
    content: sur le crâne de celui qui est le prince consacré de ses frères!
  '27':
  - type: text
    content: »Benjamin est un loup qui déchire.
  - type: text
    content: Le matin il dévore sa proie,
  - type: text
    content: et le soir il partage le butin.»
  '28':
  - type: text
    content: 'Voilà quels sont tous ceux qui forment les douze tribus d''Israël, et voilà ce que leur dit leur père en les bénissant. Il les bénit en attribuant à chacun la bénédiction qui lui était propre. '
  '29':
  - type: text
    content: 'Puis il leur donna cet ordre: «Je vais rejoindre les miens. Enterrez-moi avec mes pères dans la grotte qui se trouve dans le champ d''Ephron le Hittite, '
  '3':
  - type: text
    content: »Ruben, toi, mon aîné,
  - type: text
    content: toi qui es ma force et le premier de mes enfants,
  - type: text
    content: supérieur en dignité et en puissance,
  '30':
  - type: text
    content: 'dans la grotte du champ de Macpéla, vis-à-vis de Mamré dans le pays de Canaan. C''est le champ qu''Abraham a acheté à Ephron le Hittite comme propriété funéraire. '
  '31':
  - type: text
    content: 'C''est là qu''on a enterré Abraham et sa femme Sara, là qu''on a enterré Isaac et sa femme Rebecca, et c''est là que j''ai enterré Léa. '
  '32':
  - type: text
    content: Le champ et la grotte qui s'y trouve ont été achetés aux Hittites.»
  '33':
  - type: text
    content: Lorsque Jacob eut fini de donner ses ordres à ses fils, il remit ses pieds dans le lit, il expira et alla rejoindre les siens.
  '4':
  - type: text
    content: impétueux comme l'eau, tu n'auras aucun avantage,
  - type: text
    content: car tu es monté sur le lit de ton père,
  - type: text
    content: tu as souillé mon lit en y montant.
  '5':
  - type: text
    content: »Siméon et Lévi sont frères;
  - type: text
    content: leurs épées sont des instruments de violence.
  '6':
  - type: text
    content: Je ne veux pas participer à leur conciliabule,
  - type: text
    content: je ne veux pas m'associer à leur assemblée,
  - type: text
    content: car pour assouvir leur colère ils ont tué des hommes
  - type: text
    content: et pour suivre leurs désirs ils ont mutilé les jarrets des taureaux.
  '7':
  - type: text
    content: Maudite soit leur colère, car elle est violente,
  - type: text
    content: et leur fureur, car elle est cruelle!
  - type: text
    content: Je les séparerai dans Jacob,
  - type: text
    content: je les disperserai dans Israël.
  '8':
  - type: text
    content: »Juda, c'est toi que tes frères célébreront.
  - type: text
    content: Ta main sera sur la nuque de tes ennemis.
  - type: text
    content: Les fils de ton père se prosterneront devant toi.
  '9':
  - type: text
    content: Juda est un jeune lion.
  - type: text
    content: Tu reviens du carnage, mon fils!
  - type: text
    content: '*Il plie les genoux, il se couche comme un lion,'
  - type: text
    content: 'comme une lionne: qui le fera se lever?'
  - type: note
    content: 'Il plie… se lever: cité en Nombres 24.9.'
