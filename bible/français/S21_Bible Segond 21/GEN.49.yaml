document_id: GEN.49
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Bénédiction et mort de Jacob
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jacob appela ses fils et dit: «Rassemblez-vous et je vous annoncerai ce qui vous arrivera dans l''avenir.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Rassemblez-vous et écoutez, fils de Jacob!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ecoutez Israël, votre père!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: »Ruben, toi, mon aîné,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toi qui es ma force et le premier de mes enfants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: supérieur en dignité et en puissance,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: impétueux comme l'eau, tu n'auras aucun avantage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car tu es monté sur le lit de ton père,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu as souillé mon lit en y montant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: »Siméon et Lévi sont frères;
- type: usfm
  marker: q1
  children:
  - type: text
    text: leurs épées sont des instruments de violence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Je ne veux pas participer à leur conciliabule,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je ne veux pas m'associer à leur assemblée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car pour assouvir leur colère ils ont tué des hommes
- type: usfm
  marker: q1
  children:
  - type: text
    text: et pour suivre leurs désirs ils ont mutilé les jarrets des taureaux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Maudite soit leur colère, car elle est violente,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et leur fureur, car elle est cruelle!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je les séparerai dans Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je les disperserai dans Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: »Juda, c'est toi que tes frères célébreront.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ta main sera sur la nuque de tes ennemis.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les fils de ton père se prosterneront devant toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Juda est un jeune lion.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu reviens du carnage, mon fils!
- type: usfm
  marker: q1
  children:
  - type: text
    text: '*Il plie les genoux, il se couche comme un lion,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'comme une lionne: qui le fera se lever?'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Il plie… se lever: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Nombres 24.9
      metadata:
        usfm: NUM.24.9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Le sceptre ne s'éloignera pas de Juda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ni le bâton souverain d'entre ses pieds,
- type: usfm
  marker: q1
  children:
  - type: text
    text: jusqu'à ce que vienne le Shilo
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le Shilo: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: le sens de ce mot est incertain (l'envoyé, le pacifique ou encore celui à qui il appartient), mais il est généralement compris comme renvoyant au Messie.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que les peuples lui obéissent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Il attache son âne à la vigne
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le petit de son ânesse au meilleur cep.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il lave son vêtement dans le vin
- type: usfm
  marker: q1
  children:
  - type: text
    text: et son manteau dans le sang des raisins.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Il a les yeux rouges de vin
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les dents blanches de lait.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: »Zabulon résidera sur la côte maritime,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il sera sur la côte des bateaux
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sa frontière s'étendra du côté de Sidon.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: »Issacar est un âne robuste
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui se couche dans les étables.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Il voit que le repos est agréable
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que la région est magnifique,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il courbe son épaule sous le fardeau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il se soumet à des corvées d'esclave.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: »Dan jugera son peuple
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme une seule des tribus d'Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Dan sera un serpent sur le chemin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: une vipère sur le sentier,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui mord les talons du cheval
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour que le cavalier tombe à la renverse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: »J'espère en ton secours, Eternel!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Gad sera attaqué par des bandes armées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais c'est lui qui les attaquera et les poursuivra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: »Aser produit une nourriture excellente;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il fournira les plats les plus raffinés des rois.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: »Nephthali est une biche en liberté.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il profère de belles paroles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: »Joseph est le rejeton d'un arbre fertile,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le rejeton d'un arbre fertile près d'une source;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ses branches dépassent le mur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: On l'a provoqué, on lui a lancé des flèches,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les archers l'ont poursuivi de leur haine,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: mais son arc est resté ferme
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ses bras ont été fortifiés
- type: usfm
  marker: q1
  children:
  - type: text
    text: par l'intervention du Dieu puissant de Jacob.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est ainsi devenu le berger, le rocher d'Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: C'est l'œuvre du Dieu de ton père, et il t'aidera;
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est l'œuvre du Tout-Puissant, et il te bénira.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il t'accordera les bénédictions du ciel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les bénédictions de l'eau souterraine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les bénédictions de la mamelle et du ventre maternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Les bénédictions de ton père dépassent celles de ses ancêtres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elles vont jusqu'aux limites des anciennes collines.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu'elles reposent sur la tête de Joseph,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur le crâne de celui qui est le prince consacré de ses frères!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: »Benjamin est un loup qui déchire.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le matin il dévore sa proie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le soir il partage le butin.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Voilà quels sont tous ceux qui forment les douze tribus d''Israël, et voilà ce que leur dit leur père en les bénissant. Il les bénit en attribuant à chacun la bénédiction qui lui était propre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Puis il leur donna cet ordre: «Je vais rejoindre les miens. Enterrez-moi avec mes pères dans la grotte qui se trouve dans le champ d''Ephron le Hittite, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'dans la grotte du champ de Macpéla, vis-à-vis de Mamré dans le pays de Canaan. C''est le champ qu''Abraham a acheté à Ephron le Hittite comme propriété funéraire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'C''est là qu''on a enterré Abraham et sa femme Sara, là qu''on a enterré Isaac et sa femme Rebecca, et c''est là que j''ai enterré Léa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Le champ et la grotte qui s'y trouve ont été achetés aux Hittites.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Lorsque Jacob eut fini de donner ses ordres à ses fils, il remit ses pieds dans le lit, il expira et alla rejoindre les siens.
