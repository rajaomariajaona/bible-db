document_id: 1TH.2,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ministère de Paul à Thessalonique
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Vous savez vous-mêmes, frères et sœurs, que notre arrivée chez vous n''a pas été sans résultat. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Vous en êtes témoins, et Dieu l''est aussi: nous nous sommes comportés envers vous qui croyez d''une manière sainte, juste et irréprochable. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Vous savez aussi que nous avons été pour chacun de vous ce qu''un père est pour ses enfants: '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: nous vous avons encouragés, réconfortés et suppliés de marcher d'une manière digne de Dieu, qui vous appelle à son royaume et à sa gloire.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'C''est pourquoi nous disons sans cesse à Dieu toute notre reconnaissance de ce que, en recevant la parole de Dieu que nous vous avons fait entendre, vous l''avez accueillie non comme la parole des hommes, mais comme ce qu''elle est vraiment: la parole de Dieu agissant en vous qui croyez. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'De fait, vous, frères et sœurs, vous êtes devenus les imitateurs des Eglises de Dieu qui sont en Jésus-Christ en Judée, parce que vous aussi, vous avez enduré de la part de vos propres compatriotes les mêmes souffrances qu''elles de la part des Juifs. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ils ont fait mourir le Seigneur Jésus et leurs prophètes, ils nous ont persécutés, ils ne plaisent pas à Dieu, ils se comportent en adversaires de tous les hommes: '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ils nous empêchent de parler aux non-Juifs pour qu'ils soient sauvés et portent ainsi constamment leurs péchés à leur comble. Mais la colère
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'La colère: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: c'est-à-dire la colère de Dieu.
      marker-yv: yv-n
    - type: text
      text: ' a fini par les atteindre.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mission de Timothée
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Quant à nous, frères et sœurs, séparés de vous pour un peu de temps – de corps mais non de cœur – nous avons redoublé d''efforts pour vous revoir, car c''était notre grand désir. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'C''est ainsi que nous avons voulu aller vers vous, du moins moi Paul, à une ou deux reprises, mais Satan nous en a empêchés. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'En effet, quelle est notre espérance, ou notre joie, ou notre couronne de gloire? N''est-ce pas vous aussi, devant notre Seigneur Jésus, lors de son retour? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Après avoir souffert et avoir été maltraités à Philippes, comme vous le savez, nous avons pris de l''assurance en notre Dieu pour vous annoncer l''Evangile de Dieu à travers bien des combats. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Oui, vous êtes notre gloire et notre joie.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'En effet, notre prédication ne repose ni sur l''erreur, ni sur des motifs impurs, ni sur la ruse. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Mais, puisque Dieu nous a jugés dignes de nous confier l'Evangile, nous parlons, non dans l'idée de plaire à des hommes, mais pour plaire à Dieu qui éprouve notre cœur.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Jamais, en effet, nous n''avons eu recours à des paroles flatteuses, comme vous le savez; jamais nous n''avons eu la soif de posséder pour mobile, Dieu en est témoin. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Nous n''avons pas recherché la gloire qui vient des hommes, ni de vous ni des autres. Nous aurions pu nous imposer en tant qu''apôtres de Christ, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'mais nous avons été pleins de bienveillance au milieu de vous. De même qu''une mère prend un tendre soin de ses enfants, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'nous aurions voulu, dans notre vive affection pour vous, non seulement vous donner l''Evangile de Dieu, mais encore notre propre vie, tant vous nous étiez devenus chers. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Vous vous rappelez, frères et sœurs, notre peine et notre fatigue: c''est en travaillant nuit et jour, pour n''être à la charge d''aucun d''entre vous, que nous vous avons prêché l''Evangile de Dieu. '
