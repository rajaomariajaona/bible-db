document_id: 1SA.7
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Défaite des Philistins
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Les habitants de Kirjath-Jearim vinrent et firent monter l'arche de l'Eternel chez eux. Ils la conduisirent dans la maison d'Abinadab, sur la colline, et ils consacrèrent son fils Eléazar pour la garder.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il s''était passé bien du temps depuis le jour où l''arche avait été déposée à Kirjath-Jearim. Vingt années avaient passé. Alors toute la communauté d''Israël poussa des gémissements vers l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Samuel dit à toute la communauté d''Israël: «Si c''est de tout votre cœur que vous revenez à l''Eternel, enlevez du milieu de vous les dieux étrangers et les Astartés, dirigez votre cœur vers l''Eternel et servez-le lui seul. Il vous délivrera alors de l''oppression des Philistins.» '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Les Israélites enlevèrent du milieu d'eux les Baals
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Baals: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nom de la principale divinité des Phéniciens et des Cananéens ainsi que des Moabites, devenu le titre de plusieurs divinités du paganisme antique.
    marker-yv: yv-n
  - type: text
    text: ' et les Astartés'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Les Astartés: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nom de la déesse de la fécondité adorée par les Cananéens et sous divers noms par d'autres peuples de l'Antiquité.
    marker-yv: yv-n
  - type: text
    text: ', et ils servirent l''Eternel seul.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Samuel dit: «Rassemblez tout Israël à Mitspa et je prierai l''Eternel pour vous.» Et ils se rassemblèrent à Mitspa. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ils puisèrent de l''eau et la versèrent devant l''Eternel, et ils jeûnèrent ce jour-là en disant: «Nous avons péché contre l''Eternel!» Samuel jugea les Israélites à Mitspa.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Les Philistins apprirent que les Israélites s''étaient rassemblés à Mitspa, et les princes des Philistins montèrent pour attaquer Israël. A cette nouvelle, les Israélites eurent peur des Philistins, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'et ils dirent à Samuel: «N''arrête pas de crier pour nous à l''Eternel, notre Dieu, afin qu''il nous sauve de la domination des Philistins.» '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Samuel prit un tout jeune agneau et l''offrit tout entier en holocauste à l''Eternel. Il cria à l''Eternel pour Israël et l''Eternel l''exauça. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Pendant que Samuel offrait l''holocauste, les Philistins s''approchèrent pour attaquer Israël. L''Eternel fit gronder ce jour-là son tonnerre sur les Philistins et les mit en déroute. Ils furent battus devant Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Les hommes d'Israël sortirent de Mitspa, poursuivirent les Philistins et les battirent jusqu'au-dessous de Beth-Car.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Samuel prit une pierre qu'il plaça entre Mitspa et Shen, et il l'appela Eben-Ezer
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Eben-Ezer: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: littéralementpierre du secours.
    marker-yv: yv-n
  - type: text
    text: ' en disant: «Jusqu''ici l''Eternel nous a secourus.» '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ainsi, les Philistins furent humiliés et ils ne vinrent plus sur le territoire d''Israël. La main de l''Eternel fut contre les Philistins pendant toute la vie de Samuel. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Les villes que les Philistins avaient prises à Israël retournèrent à Israël, depuis Ekron jusqu'à Gath, avec leur territoire; Israël les arracha à la domination des Philistins. Il y eut aussi paix entre Israël et les Amoréens.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Samuel fut juge en Israël pendant toute sa vie. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il allait chaque année faire le tour de Béthel, de Guilgal et de Mitspa, et il jugeait Israël dans toutes ces villes. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Puis il revenait à Rama, où se trouvait sa maison. Il y jugeait Israël et il construisit là un autel en l'honneur de l'Eternel.
