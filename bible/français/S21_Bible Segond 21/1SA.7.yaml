document_id: 1SA.7,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Défaite des Philistins
  - type: text
    content: Les habitants de Kirjath-Jearim vinrent et firent monter l'arche de l'Eternel chez eux. Ils la conduisirent dans la maison d'Abinadab, sur la colline, et ils consacrèrent son fils Eléazar pour la garder.
  '10':
  - type: text
    content: 'Pendant que Samuel offrait l''holocauste, les Philistins s''approchèrent pour attaquer Israël. L''Eternel fit gronder ce jour-là son tonnerre sur les Philistins et les mit en déroute. Ils furent battus devant Israël. '
  '11':
  - type: text
    content: Les hommes d'Israël sortirent de Mitspa, poursuivirent les Philistins et les battirent jusqu'au-dessous de Beth-Car.
  '12':
  - type: text
    content: Samuel prit une pierre qu'il plaça entre Mitspa et Shen, et il l'appela Eben-Ezer
  - type: note
    content: 'Eben-Ezer: littéralementpierre du secours.'
  - type: text
    content: ' en disant: «Jusqu''ici l''Eternel nous a secourus.» '
  '13':
  - type: text
    content: 'Ainsi, les Philistins furent humiliés et ils ne vinrent plus sur le territoire d''Israël. La main de l''Eternel fut contre les Philistins pendant toute la vie de Samuel. '
  '14':
  - type: text
    content: Les villes que les Philistins avaient prises à Israël retournèrent à Israël, depuis Ekron jusqu'à Gath, avec leur territoire; Israël les arracha à la domination des Philistins. Il y eut aussi paix entre Israël et les Amoréens.
  '15':
  - type: text
    content: 'Samuel fut juge en Israël pendant toute sa vie. '
  '16':
  - type: text
    content: 'Il allait chaque année faire le tour de Béthel, de Guilgal et de Mitspa, et il jugeait Israël dans toutes ces villes. '
  '17':
  - type: text
    content: Puis il revenait à Rama, où se trouvait sa maison. Il y jugeait Israël et il construisit là un autel en l'honneur de l'Eternel.
  '2':
  - type: text
    content: 'Il s''était passé bien du temps depuis le jour où l''arche avait été déposée à Kirjath-Jearim. Vingt années avaient passé. Alors toute la communauté d''Israël poussa des gémissements vers l''Eternel. '
  '3':
  - type: text
    content: 'Samuel dit à toute la communauté d''Israël: «Si c''est de tout votre cœur que vous revenez à l''Eternel, enlevez du milieu de vous les dieux étrangers et les Astartés, dirigez votre cœur vers l''Eternel et servez-le lui seul. Il vous délivrera alors de l''oppression des Philistins.» '
  '4':
  - type: text
    content: Les Israélites enlevèrent du milieu d'eux les Baals
  - type: note
    content: 'Baals: nom de la principale divinité des Phéniciens et des Cananéens ainsi que des Moabites, devenu le titre de plusieurs divinités du paganisme antique.'
  - type: text
    content: ' et les Astartés'
  - type: note
    content: 'Les Astartés: nom de la déesse de la fécondité adorée par les Cananéens et sous divers noms par d''autres peuples de l''Antiquité.'
  - type: text
    content: ', et ils servirent l''Eternel seul.'
  '5':
  - type: text
    content: 'Samuel dit: «Rassemblez tout Israël à Mitspa et je prierai l''Eternel pour vous.» Et ils se rassemblèrent à Mitspa. '
  '6':
  - type: text
    content: 'Ils puisèrent de l''eau et la versèrent devant l''Eternel, et ils jeûnèrent ce jour-là en disant: «Nous avons péché contre l''Eternel!» Samuel jugea les Israélites à Mitspa.'
  '7':
  - type: text
    content: 'Les Philistins apprirent que les Israélites s''étaient rassemblés à Mitspa, et les princes des Philistins montèrent pour attaquer Israël. A cette nouvelle, les Israélites eurent peur des Philistins, '
  '8':
  - type: text
    content: 'et ils dirent à Samuel: «N''arrête pas de crier pour nous à l''Eternel, notre Dieu, afin qu''il nous sauve de la domination des Philistins.» '
  '9':
  - type: text
    content: 'Samuel prit un tout jeune agneau et l''offrit tout entier en holocauste à l''Eternel. Il cria à l''Eternel pour Israël et l''Eternel l''exauça. '
