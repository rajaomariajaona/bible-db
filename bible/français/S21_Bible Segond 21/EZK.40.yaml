document_id: EZK.40
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vision du temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La vingt-cinquième année de notre exil, au début de l''année, le dixième jour du mois, 14 ans jour pour jour après la prise de Jérusalem, la main de l''Eternel a reposé sur moi et il m''a transporté dans le pays d''Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il m''y a transporté dans des visions divines et m''a déposé sur une montagne très haute; du côté sud, on y trouvait comme les bâtiments d''une ville. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il m''y a transporté et j''ai vu un homme dont l''aspect ressemblait à celui du bronze. Il tenait un cordon en lin et une canne servant à mesurer. Il se tenait à l''entrée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Cet homme m''a dit: «Fils de l''homme, observe bien de tes yeux et ouvre bien tes oreilles, fais attention à tout ce que je vais te montrer! En effet, si tu as été amené ici, c''est pour que je te le montre. Rapporte tout ce que tu verras à la communauté d''Israël!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Un mur extérieur entourait le temple de tous côtés. Dans la main de l'homme se trouvait une canne à mesurer de 6 mesures
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Mesures: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: littéralement coudées, arrondies à 50 centimètres.
    marker-yv: yv-n
  - type: text
    text: ; chaque mesure avait 8 centimètres de plus que la mesure ordinaire. Il a mesuré 3 mètres pour la largeur de l'enceinte et 3 mètres pour sa hauteur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il s''est rendu à l''entrée du côté est et en a gravi les marches. Puis il a mesuré 3 mètres de large pour le seuil de la porte et 3 mètres de large pour l''autre seuil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Chaque local mesurait 3 mètres de long et 3 mètres de large. Il y avait entre eux un espace de 2 mètres et demi. Le seuil de la porte, près du vestibule de l''entrée, à l''intérieur, mesurait 3 mètres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Il a mesuré 3 mètres pour le vestibule de l''entrée, à l''intérieur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il a mesuré le vestibule de l''entrée: il faisait 4 mètres, et ses piliers un. Le vestibule de l''entrée se trouvait à l''intérieur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Les locaux de l''entrée est étaient au nombre de trois d''un côté et trois de l''autre. Tous les trois avaient les mêmes dimensions, et les piliers de chaque côté avaient aussi les mêmes dimensions. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il a mesuré 5 mètres pour la largeur de l''ouverture de l''entrée et 6 mètres et demi pour la longueur de l''entrée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il y avait devant les locaux un muret d''un demi-mètre de chaque côté. Chaque local avait 3 mètres d''un côté et 3 mètres de l''autre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il a mesuré l''entrée depuis le toit d''un local jusqu''au toit de l''autre: il y avait une largeur de 12 mètres et demi entre les deux ouvertures opposées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il a compté 30 mètres pour les piliers, près desquels se trouvait une cour qui s''étendait tout autour de l''entrée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Depuis le devant de l''entrée extérieure jusqu''au vestibule de l''entrée intérieure, il y avait 25 mètres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Il y avait des fenêtres grillagées tout autour des locaux et de leurs piliers, à l'intérieur de l'entrée. Il y avait aussi des fenêtres tout autour du vestibule, à l'intérieur. Des branches de palmier étaient sculptées sur les piliers.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ensuite, il m''a conduit dans le parvis extérieur. Tout autour se trouvaient des salles et un dallage qui garnissait le parvis. Il y avait 30 salles sur ce dallage. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Le dallage s''étendait de chaque côté des entrées et répondait à leur longueur; c''était le dallage inférieur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Il a mesuré la largeur depuis l''entrée inférieure jusqu''à la partie externe du parvis intérieur: il y avait 50 mètres à l''est. En ce qui concerne la partie nord, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'l''homme a mesuré la longueur et la largeur de l''entrée nord du parvis extérieur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ses locaux, au nombre de trois d''un côté et trois de l''autre, ses piliers et son vestibule avaient les mêmes dimensions que la première entrée: 25 mètres de long et 12 mètres et demi de large. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ses fenêtres, son vestibule et ses branches de palmier sculptées avaient les mêmes dimensions que pour l''entrée du côté est. On y accédait par sept marches en face desquelles se trouvait son vestibule. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Il y avait une entrée au parvis intérieur, vis-à-vis de l'entrée nord, comme c'était le cas de l'entrée du côté est. Il a mesuré 50 mètres d'une entrée à l'autre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Puis il m''a amené du côté sud, où se trouvait aussi une entrée. Il a mesuré ses piliers et son vestibule, qui avaient les mêmes dimensions que pour les autres entrées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Cette entrée et son vestibule avaient des fenêtres tout autour, pareilles aux autres fenêtres, et mesuraient 25 mètres de long et 12 mètres et demi de large. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'On y accédait par sept marches en face desquelles se trouvait son vestibule. Il y avait, de part et d''autre, des branches de palmier sculptées sur ses piliers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Le parvis intérieur avait aussi une entrée du côté sud. L''homme a mesuré d''une entrée sud à l''autre: il y avait 50 mètres.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ensuite, il m''a conduit dans cette cour intérieure, par l''entrée sud. Il a mesuré l''entrée sud, qui avait les mêmes dimensions que les autres entrées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ses locaux, ses piliers et son vestibule avaient les mêmes dimensions. Cette entrée et son vestibule avaient des fenêtres tout autour et mesuraient 25 mètres de long et 12 mètres et demi de large. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: '[Il y avait, tout autour, des vestibules de 12 mètres et demi de long et 2 mètres et demi de large.] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Son vestibule débouchait sur le parvis extérieur. Il y avait des branches de palmier sculptées sur ses piliers, et huit marches pour y accéder.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Puis il m''a conduit dans le parvis intérieur par le côté est. Il a mesuré l''entrée, qui avait les mêmes dimensions que les autres entrées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ses locaux, ses piliers et son vestibule avaient les mêmes dimensions que pour les autres entrées. Cette entrée et son vestibule avaient des fenêtres tout autour et mesuraient 25 mètres de long et 12 mètres et demi de large. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Son vestibule donnait sur le parvis extérieur. Il y avait, de part et d'autre, des branches de palmier sculptées sur ses piliers, et huit marches pour y accéder.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Puis il m''a conduit à l''entrée nord. Il l''a mesurée et a trouvé les mêmes dimensions que pour les autres entrées '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'à ses locaux, à ses piliers et à son vestibule. Elle avait des fenêtres tout autour et mesurait 25 mètres de long et 12 mètres et demi de large. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Son vestibule donnait sur le parvis extérieur. Il y avait, de part et d'autre, des branches de palmier sculptées sur ses piliers, et huit marches pour y accéder.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Il y avait une salle dont l''accès se situait près des piliers des entrées. C''était là qu''on devait laver les victimes destinées aux holocaustes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'De chaque côté du vestibule de l''entrée se trouvaient deux tables sur lesquelles on devait égorger les animaux destinés aux holocaustes, aux sacrifices d''expiation et aux sacrifices de culpabilité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'A l''un des côtés extérieurs par où l''on montait, à l''entrée nord, il y avait deux tables; de l''autre côté, vers le vestibule de l''entrée, il y avait aussi deux tables. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Il y avait ainsi, sur les côtés de l''entrée, quatre tables d''une part et quatre tables de l''autre, en tout huit tables sur lesquelles on devait égorger les animaux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Il y avait encore pour les holocaustes quatre tables en pierres de taille, longues de 75 centimètres, larges de 75 centimètres et hautes de 50 centimètres. On devait déposer sur ces tables les instruments avec lesquels on égorgeait les animaux pour les holocaustes et pour les autres sacrifices. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Des crochets de 8 centimètres étaient fixés à l'intérieur, tout autour, tandis que la viande des sacrifices devait être mise sur les tables.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'A l''extérieur de l''entrée intérieure, dans le parvis intérieur, il y avait des salles pour les chanteurs: l''une était à côté de l''entrée nord et orientée au sud, l''autre était à côté de l''entrée est et orientée au nord. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'L''homme m''a dit: «Cette salle orientée au sud est destinée aux prêtres qui ont la charge du temple, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: alors que la salle orientée au nord est destinée aux prêtres qui ont la charge de l'autel. Parmi les Lévites, ce sont les descendants de Tsadok
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40.46 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tsadok: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: descendant d'Eléazar, le troisième fils d'Aaron; il était prêtre à la cour du roi David et a participé à l'onction du roi Salomon; sa lignée a eu la charge du service dans le temple de Salomon jusqu'à sa destruction.
    marker-yv: yv-n
  - type: text
    text: ' qui s''approchent de l''Eternel pour le servir.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Il a mesuré le parvis: il faisait 50 mètres de long et 50 mètres de large, il était carré. L''autel était devant le temple.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Puis il m''a conduit dans le vestibule du temple. Il a mesuré les piliers du vestibule et a trouvé 2 mètres et demi d''un côté et 2 mètres et demi de l''autre. La largeur de l''entrée était d''un mètre et demi d''un côté et d''un mètre et demi de l''autre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Le vestibule avait une longueur de 10 mètres et une largeur de 5 mètres et demi. On y accédait par des marches. Il y avait des colonnes à côté des piliers, l'une d'un côté et l'autre de l'autre.
