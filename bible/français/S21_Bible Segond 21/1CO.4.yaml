document_id: 1CO.4
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ainsi donc, qu''on nous considère comme des serviteurs de Christ et des administrateurs des mystères de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Du reste, ce qu''on demande des administrateurs, c''est qu''ils soient trouvés fidèles. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Pour ma part, il m''importe très peu d''être jugé par vous ou par un tribunal humain. Bien plus, je ne me juge pas non plus moi-même. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ma conscience, il est vrai, ne me reproche rien, mais ce n''est pas pour autant que je peux être considéré comme juste. Celui qui me juge, c''est le Seigneur. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: C'est pourquoi ne portez aucun jugement avant le moment fixé, avant le retour du Seigneur, car il mettra en lumière ce qui est caché dans les ténèbres et il dévoilera les intentions des cœurs. Chacun recevra alors de Dieu la louange qui lui revient.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Orgueil et humilité
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Frères et sœurs, c''est à cause de vous que j''ai appliqué ces images à Apollos et à moi-même, afin que vous appreniez par notre exemple à ne pas aller [dans vos pensées] au-delà de ce qui est écrit et que personne ne s''enfle d''orgueil en prenant parti pour l''un contre l''autre. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: En effet, qui est celui qui te distingue? Qu'as-tu que tu n'aies pas reçu? Et si tu l'as reçu, pourquoi faire le fier comme si tu ne l'avais pas reçu?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Déjà vous êtes rassasiés, déjà vous êtes riches, vous avez commencé à régner sans nous. Si seulement vous pouviez régner en effet, pour que nous aussi nous puissions régner avec vous! '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'En effet, il me semble que Dieu a fait de nous, apôtres, les derniers des hommes, des condamnés à mort en quelque sorte, puisque nous avons été donnés en spectacle au monde, aux anges et aux hommes. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nous sommes fous à cause de Christ, mais vous, vous êtes sages en Christ; nous sommes faibles, mais vous êtes forts. Vous êtes honorés et nous sommes méprisés! '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Jusqu''à cette heure, nous souffrons de la faim, de la soif, du dénuement; nous sommes maltraités, errants; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'nous nous fatiguons à travailler de nos propres mains. Injuriés, nous bénissons; persécutés, nous supportons; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: calomniés, nous répondons avec bonté. Nous sommes devenus comme les balayures du monde, le déchet de tous, jusqu'à maintenant.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ce n''est pas pour vous faire honte que j''écris cela, mais je vous avertis comme mes enfants bien-aimés. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'En effet, même si vous aviez 10''000 maîtres en Christ, vous n''avez cependant pas plusieurs pères, puisque c''est moi qui vous ai donné la vie en Jésus-Christ par l''Evangile. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Je vous en supplie donc: soyez mes imitateurs. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Pour cela je vous ai envoyé Timothée, qui est mon enfant bien-aimé et fidèle dans le Seigneur. Il vous rappellera quels sont mes principes de vie en Christ, tels que je les enseigne partout, dans toutes les Eglises.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Quelques-uns se sont enflés d''orgueil en pensant que je ne viendrais pas chez vous. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Mais je viendrai bientôt, si c''est la volonté du Seigneur, et je prendrai connaissance non des paroles, mais de la puissance de ceux qui se sont enflés d''orgueil. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'En effet, le royaume de Dieu ne consiste pas en paroles, mais en puissance. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Que voulez-vous? Que je vienne chez vous avec un bâton, ou avec amour et dans un esprit de douceur?
