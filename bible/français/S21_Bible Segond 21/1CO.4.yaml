document_id: 1CO.4,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Ainsi donc, qu''on nous considère comme des serviteurs de Christ et des administrateurs des mystères de Dieu. '
  '10':
  - type: text
    content: 'Nous sommes fous à cause de Christ, mais vous, vous êtes sages en Christ; nous sommes faibles, mais vous êtes forts. Vous êtes honorés et nous sommes méprisés! '
  '11':
  - type: text
    content: 'Jusqu''à cette heure, nous souffrons de la faim, de la soif, du dénuement; nous sommes maltraités, errants; '
  '12':
  - type: text
    content: 'nous nous fatiguons à travailler de nos propres mains. Injuriés, nous bénissons; persécutés, nous supportons; '
  '13':
  - type: text
    content: calomniés, nous répondons avec bonté. Nous sommes devenus comme les balayures du monde, le déchet de tous, jusqu'à maintenant.
  '14':
  - type: text
    content: 'Ce n''est pas pour vous faire honte que j''écris cela, mais je vous avertis comme mes enfants bien-aimés. '
  '15':
  - type: text
    content: 'En effet, même si vous aviez 10''000 maîtres en Christ, vous n''avez cependant pas plusieurs pères, puisque c''est moi qui vous ai donné la vie en Jésus-Christ par l''Evangile. '
  '16':
  - type: text
    content: 'Je vous en supplie donc: soyez mes imitateurs. '
  '17':
  - type: text
    content: Pour cela je vous ai envoyé Timothée, qui est mon enfant bien-aimé et fidèle dans le Seigneur. Il vous rappellera quels sont mes principes de vie en Christ, tels que je les enseigne partout, dans toutes les Eglises.
  '18':
  - type: text
    content: 'Quelques-uns se sont enflés d''orgueil en pensant que je ne viendrais pas chez vous. '
  '19':
  - type: text
    content: 'Mais je viendrai bientôt, si c''est la volonté du Seigneur, et je prendrai connaissance non des paroles, mais de la puissance de ceux qui se sont enflés d''orgueil. '
  '2':
  - type: text
    content: 'Du reste, ce qu''on demande des administrateurs, c''est qu''ils soient trouvés fidèles. '
  '20':
  - type: text
    content: 'En effet, le royaume de Dieu ne consiste pas en paroles, mais en puissance. '
  '21':
  - type: text
    content: Que voulez-vous? Que je vienne chez vous avec un bâton, ou avec amour et dans un esprit de douceur?
  '3':
  - type: text
    content: 'Pour ma part, il m''importe très peu d''être jugé par vous ou par un tribunal humain. Bien plus, je ne me juge pas non plus moi-même. '
  '4':
  - type: text
    content: 'Ma conscience, il est vrai, ne me reproche rien, mais ce n''est pas pour autant que je peux être considéré comme juste. Celui qui me juge, c''est le Seigneur. '
  '5':
  - type: text
    content: C'est pourquoi ne portez aucun jugement avant le moment fixé, avant le retour du Seigneur, car il mettra en lumière ce qui est caché dans les ténèbres et il dévoilera les intentions des cœurs. Chacun recevra alors de Dieu la louange qui lui revient.
  - type: heading
    content: Orgueil et humilité
  '6':
  - type: text
    content: 'Frères et sœurs, c''est à cause de vous que j''ai appliqué ces images à Apollos et à moi-même, afin que vous appreniez par notre exemple à ne pas aller [dans vos pensées] au-delà de ce qui est écrit et que personne ne s''enfle d''orgueil en prenant parti pour l''un contre l''autre. '
  '7':
  - type: text
    content: En effet, qui est celui qui te distingue? Qu'as-tu que tu n'aies pas reçu? Et si tu l'as reçu, pourquoi faire le fier comme si tu ne l'avais pas reçu?
  '8':
  - type: text
    content: 'Déjà vous êtes rassasiés, déjà vous êtes riches, vous avez commencé à régner sans nous. Si seulement vous pouviez régner en effet, pour que nous aussi nous puissions régner avec vous! '
  '9':
  - type: text
    content: 'En effet, il me semble que Dieu a fait de nous, apôtres, les derniers des hommes, des condamnés à mort en quelque sorte, puisque nous avons été donnés en spectacle au monde, aux anges et aux hommes. '
