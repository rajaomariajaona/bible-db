document_id: ISA.35,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Bénédiction future d'Israël
  - type: text
    content: Le désert et le terrain sec se réjouiront,
  - type: text
    content: la plaine aride exprimera sa joie et fleurira comme un narcisse;
  '10':
  - type: text
    content: Ceux que l'Eternel aura libérés reviendront,
  - type: text
    content: ils arriveront à Sion avec des chants de triomphe
  - type: text
    content: et une joie éternelle couronnera leur tête.
  - type: text
    content: Ils connaîtront la gaieté et la joie,
  - type: text
    content: la douleur et les gémissements s'enfuiront.
  '2':
  - type: text
    content: elle se couvrira de fleurs et exprimera sa joie
  - type: text
    content: par des chants d'allégresse et des cris de triomphe.
  - type: text
    content: La gloire du Liban lui sera donnée,
  - type: text
    content: de même que la splendeur du Carmel et du Saron.
  - type: text
    content: On verra la gloire de l'Eternel,
  - type: text
    content: la splendeur de notre Dieu.
  '3':
  - type: text
    content: '*Fortifiez les mains affaiblies'
  - type: text
    content: et affermissez les genoux flageolants!
  - type: note
    content: 'Fortifiez… flageolants: renvoi à ce verset en Hébreux 12.12.'
  '4':
  - type: text
    content: 'Dites à ceux qui ont le cœur battant:'
  - type: text
    content: «Fortifiez-vous, n'ayez pas peur!
  - type: text
    content: 'Voici votre Dieu: elle viendra, la vengeance,'
  - type: text
    content: la rémunération de Dieu.
  - type: text
    content: Il viendra lui-même pour vous sauver.»
  '5':
  - type: text
    content: Alors *les yeux des aveugles seront ouverts
  - type: text
    content: et les oreilles des sourds seront débouchées.
  '6':
  - type: text
    content: Alors le boiteux sautera
  - type: note
    content: 'Les yeux… sautera: signes évoqués en Matthieu 11.5; Luc 7.22 par Jésus comme preuves qu''il était le Messie.'
  - type: text
    content: ' comme un cerf'
  - type: text
    content: et la langue du muet lancera des cris joyeux.
  - type: text
    content: Oui, de l'eau jaillira dans le désert
  - type: text
    content: et des ruisseaux dans la plaine aride.
  '7':
  - type: text
    content: La terre brûlante deviendra un étang
  - type: text
    content: et la terre aride se changera en sources d'eau.
  - type: text
    content: Dans le repaire qui servait de gîte aux chacals
  - type: text
    content: pousseront des roseaux et des joncs.
  '8':
  - type: text
    content: Il y aura là une route, un chemin
  - type: text
    content: qu'on appellera «chemin de la sainteté».
  - type: text
    content: Aucun impur n'y passera, il sera réservé pour eux lorsqu'ils suivront ce chemin.
  - type: text
    content: Même les fous ne pourront pas s'y égarer.
  '9':
  - type: text
    content: On n'y croisera aucun lion,
  - type: text
    content: aucune bête sauvage ne le gravira, aucune ne s'y trouvera.
  - type: text
    content: Ce sont les rachetés de l'Eternel qui y marcheront.
