document_id: ISA.35,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Bénédiction future d'Israël
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le désert et le terrain sec se réjouiront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la plaine aride exprimera sa joie et fleurira comme un narcisse;
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux que l'Eternel aura libérés reviendront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils arriveront à Sion avec des chants de triomphe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et une joie éternelle couronnera leur tête.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils connaîtront la gaieté et la joie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la douleur et les gémissements s'enfuiront.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle se couvrira de fleurs et exprimera sa joie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: par des chants d'allégresse et des cris de triomphe.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La gloire du Liban lui sera donnée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de même que la splendeur du Carmel et du Saron.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On verra la gloire de l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la splendeur de notre Dieu.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '*Fortifiez les mains affaiblies'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et affermissez les genoux flageolants!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Fortifiez… flageolants: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: renvoi à ce verset en Hébreux 12.12.
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dites à ceux qui ont le cœur battant:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Fortifiez-vous, n'ayez pas peur!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici votre Dieu: elle viendra, la vengeance,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la rémunération de Dieu.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il viendra lui-même pour vous sauver.»
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors *les yeux des aveugles seront ouverts
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les oreilles des sourds seront débouchées.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors le boiteux sautera
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.5-6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Les yeux… sautera: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: signes évoqués en Matthieu 11.5; Luc 7.22 par Jésus comme preuves qu'il était le Messie.
      marker-yv: yv-n
    - type: text
      text: ' comme un cerf'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la langue du muet lancera des cris joyeux.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, de l'eau jaillira dans le désert
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et des ruisseaux dans la plaine aride.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La terre brûlante deviendra un étang
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la terre aride se changera en sources d'eau.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans le repaire qui servait de gîte aux chacals
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pousseront des roseaux et des joncs.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il y aura là une route, un chemin
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu'on appellera «chemin de la sainteté».
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aucun impur n'y passera, il sera réservé pour eux lorsqu'ils suivront ce chemin.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Même les fous ne pourront pas s'y égarer.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On n'y croisera aucun lion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aucune bête sauvage ne le gravira, aucune ne s'y trouvera.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce sont les rachetés de l'Eternel qui y marcheront.
