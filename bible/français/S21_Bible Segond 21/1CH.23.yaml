document_id: 1CH.23,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Recensement et fonctions des Lévites
  - type: text
    content: 'Agé et rassasié de jours, David désigna son fils Salomon roi sur Israël. '
  '10':
  - type: text
    content: 'Autres fils de Shimeï: Jachath, Ziza, Jeush et Beria. Ce sont là les 4 fils de Shimeï. '
  '11':
  - type: text
    content: Jachath était le chef, et Ziza le deuxième; Jeush et Beria n'eurent pas beaucoup de fils et ils formèrent une seule famille dans le dénombrement.
  '12':
  - type: text
    content: 'Voici les fils de Kehath: Amram, Jitsehar, Hébron et Uziel, 4 en tout. '
  '13':
  - type: text
    content: 'Fils d''Amram: Aaron et Moïse. Aaron fut mis à part pour être consacré au lieu très saint, avec ses descendants, pour toujours. Ils devaient offrir les parfums devant l''Eternel, le servir et bénir pour toujours en son nom. '
  '14':
  - type: text
    content: 'Quant aux fils de Moïse, homme de Dieu, ils furent comptés dans la tribu de Lévi. '
  '15':
  - type: text
    content: 'Fils de Moïse: Guershom et Eliézer. '
  '16':
  - type: text
    content: 'Fils de Guershom: Shebuel, le chef. '
  '17':
  - type: text
    content: 'Les descendants d''Eliézer furent: Rechabia, le chef, et ses très nombreux fils; Eliézer lui-même n''eut pas d''autre fils. '
  '18':
  - type: text
    content: 'Fils de Jitsehar: Shelomith, le chef. '
  '19':
  - type: text
    content: 'Fils d''Hébron: Jerija, le chef, Amaria, le deuxième, Jachaziel, le troisième, et Jekameam, le quatrième. '
  '2':
  - type: text
    content: 'Il rassembla tous les chefs d''Israël, les prêtres et les Lévites. '
  '20':
  - type: text
    content: 'Fils d''Uziel: Michée, le chef, et Jishija, le deuxième.'
  '21':
  - type: text
    content: 'Voici les fils de Merari: Machli et Mushi. Fils de Machli: Eléazar et Kis. '
  '22':
  - type: text
    content: 'Eléazar mourut sans avoir de fils, mais il eut des filles qui épousèrent les fils de Kis, leurs cousins. '
  '23':
  - type: text
    content: 'Fils de Mushi: Machli, Eder et Jerémoth, ce qui fait 3.'
  '24':
  - type: text
    content: 'Ce sont là les Lévites en fonction de leur famille avec les chefs de famille d''après le dénombrement qu''on en fit en comptant les noms des individus. Dès l''âge de 20 ans, ils furent affectés au service de la maison de l''Eternel, '
  '25':
  - type: text
    content: 'car David avait dit: «L''Eternel, le Dieu d''Israël, a donné du repos à son peuple, et il habitera pour toujours à Jérusalem. '
  '26':
  - type: text
    content: 'Ainsi, les Lévites n''auront plus à porter le tabernacle ni tous les ustensiles destinés à son service.» '
  '27':
  - type: text
    content: 'Ce fut d''après les derniers ordres de David qu''eut lieu le dénombrement des Lévites âgés de 20 ans et plus. '
  '28':
  - type: text
    content: 'Chargés d''assister les descendants d''Aaron pour le service de la maison de l''Eternel, ils étaient responsables des parvis et des chambres, de la purification de toutes les choses saintes, des travaux liés au service de la maison de Dieu, '
  '29':
  - type: text
    content: 'des pains consacrés, de la fleur de farine pour les offrandes, des galettes sans levain, des gâteaux cuits sur la plaque et des gâteaux frits, de toutes les mesures de capacité et de longueur. '
  '3':
  - type: text
    content: 'On fit le dénombrement des Lévites âgés de 30 ans et plus; on compta 38''000 individus de sexe masculin. '
  '30':
  - type: text
    content: 'Ils devaient être présents chaque matin et chaque soir afin de louer et de célébrer l''Eternel, '
  '31':
  - type: text
    content: 'et offrir continuellement devant lui tous les holocaustes qui lui étaient destinés lors des sabbats, des débuts de mois et des fêtes, suivant le nombre fixé par la règle. '
  '32':
  - type: text
    content: Ils veillaient sur la tente de la rencontre, sur le sanctuaire et sur les descendants d'Aaron, leurs frères, pour le service de la maison de l'Eternel.
  '4':
  - type: text
    content: 'David dit: «Qu''il y en ait 24''000 pour diriger les travaux de la maison de l''Eternel, 6000 pour officier comme magistrats et juges, '
  '5':
  - type: text
    content: '4000 comme portiers et 4000 pour louer l''Eternel avec les instruments que j''ai faits pour le célébrer.» '
  '6':
  - type: text
    content: 'David les répartit en classes d''après les fils de Lévi: Guershon, Kehath et Merari.'
  '7':
  - type: text
    content: 'Pour les Guershonites, il y avait Laedan et Shimeï. '
  '8':
  - type: text
    content: 'Fils de Laedan: le chef Jehiel, Zétham et Joël, 3 en tout. '
  '9':
  - type: text
    content: 'Fils de Shimeï: Shelomith, Haziel et Haran, ce qui fait 3. Ce sont là les chefs de famille de Laedan. '
