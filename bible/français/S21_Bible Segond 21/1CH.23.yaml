document_id: 1CH.23
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Recensement et fonctions des Lévites
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Agé et rassasié de jours, David désigna son fils Salomon roi sur Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il rassembla tous les chefs d''Israël, les prêtres et les Lévites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'On fit le dénombrement des Lévites âgés de 30 ans et plus; on compta 38''000 individus de sexe masculin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'David dit: «Qu''il y en ait 24''000 pour diriger les travaux de la maison de l''Eternel, 6000 pour officier comme magistrats et juges, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '4000 comme portiers et 4000 pour louer l''Eternel avec les instruments que j''ai faits pour le célébrer.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'David les répartit en classes d''après les fils de Lévi: Guershon, Kehath et Merari.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Pour les Guershonites, il y avait Laedan et Shimeï. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fils de Laedan: le chef Jehiel, Zétham et Joël, 3 en tout. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fils de Shimeï: Shelomith, Haziel et Haran, ce qui fait 3. Ce sont là les chefs de famille de Laedan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Autres fils de Shimeï: Jachath, Ziza, Jeush et Beria. Ce sont là les 4 fils de Shimeï. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Jachath était le chef, et Ziza le deuxième; Jeush et Beria n'eurent pas beaucoup de fils et ils formèrent une seule famille dans le dénombrement.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Voici les fils de Kehath: Amram, Jitsehar, Hébron et Uziel, 4 en tout. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fils d''Amram: Aaron et Moïse. Aaron fut mis à part pour être consacré au lieu très saint, avec ses descendants, pour toujours. Ils devaient offrir les parfums devant l''Eternel, le servir et bénir pour toujours en son nom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Quant aux fils de Moïse, homme de Dieu, ils furent comptés dans la tribu de Lévi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fils de Moïse: Guershom et Eliézer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fils de Guershom: Shebuel, le chef. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Les descendants d''Eliézer furent: Rechabia, le chef, et ses très nombreux fils; Eliézer lui-même n''eut pas d''autre fils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fils de Jitsehar: Shelomith, le chef. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fils d''Hébron: Jerija, le chef, Amaria, le deuxième, Jachaziel, le troisième, et Jekameam, le quatrième. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fils d''Uziel: Michée, le chef, et Jishija, le deuxième.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Voici les fils de Merari: Machli et Mushi. Fils de Machli: Eléazar et Kis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Eléazar mourut sans avoir de fils, mais il eut des filles qui épousèrent les fils de Kis, leurs cousins. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fils de Mushi: Machli, Eder et Jerémoth, ce qui fait 3.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ce sont là les Lévites en fonction de leur famille avec les chefs de famille d''après le dénombrement qu''on en fit en comptant les noms des individus. Dès l''âge de 20 ans, ils furent affectés au service de la maison de l''Eternel, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'car David avait dit: «L''Eternel, le Dieu d''Israël, a donné du repos à son peuple, et il habitera pour toujours à Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ainsi, les Lévites n''auront plus à porter le tabernacle ni tous les ustensiles destinés à son service.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ce fut d''après les derniers ordres de David qu''eut lieu le dénombrement des Lévites âgés de 20 ans et plus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Chargés d''assister les descendants d''Aaron pour le service de la maison de l''Eternel, ils étaient responsables des parvis et des chambres, de la purification de toutes les choses saintes, des travaux liés au service de la maison de Dieu, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'des pains consacrés, de la fleur de farine pour les offrandes, des galettes sans levain, des gâteaux cuits sur la plaque et des gâteaux frits, de toutes les mesures de capacité et de longueur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ils devaient être présents chaque matin et chaque soir afin de louer et de célébrer l''Eternel, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'et offrir continuellement devant lui tous les holocaustes qui lui étaient destinés lors des sabbats, des débuts de mois et des fêtes, suivant le nombre fixé par la règle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ils veillaient sur la tente de la rencontre, sur le sanctuaire et sur les descendants d'Aaron, leurs frères, pour le service de la maison de l'Eternel.
