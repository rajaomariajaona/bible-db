document_id: PSA.20,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Prière pour le roi
  - type: text
    content: Au chef de chœur. Psaume de David.
  '10':
  - type: text
    content: Eternel, sauve le roi!
  - type: text
    content: Réponds-nous, quand nous faisons appel à toi!
  '2':
  - type: text
    content: Que l'Eternel te réponde lorsque tu es dans la détresse,
  - type: text
    content: que le nom du Dieu de Jacob te protège!
  '3':
  - type: text
    content: Qu'il t'envoie du secours depuis le sanctuaire,
  - type: text
    content: depuis Sion qu'il te soutienne!
  '4':
  - type: text
    content: Qu'il se souvienne de toutes tes offrandes
  - type: text
    content: 'et qu''il accepte tes holocaustes! '
  - type: text
    content: – Pause.
  '5':
  - type: text
    content: Qu'il te donne ce que ton cœur désire
  - type: text
    content: et qu'il accomplisse tous tes projets!
  '6':
  - type: text
    content: Nous nous réjouirons de ton salut,
  - type: text
    content: nous dresserons l'étendard au nom de notre Dieu;
  - type: text
    content: l'Eternel exaucera tous tes vœux.
  '7':
  - type: text
    content: Je sais maintenant que l'Eternel sauve celui qu'il a désigné par onction;
  - type: text
    content: il lui répond du ciel, de sa sainte demeure,
  - type: text
    content: par le secours puissant de sa main droite.
  '8':
  - type: text
    content: Les uns s'appuient sur leurs chars, les autres sur leurs chevaux;
  - type: text
    content: nous, nous célébrons l'Eternel, notre Dieu.
  '9':
  - type: text
    content: Eux, ils plient et tombent;
  - type: text
    content: nous, nous tenons ferme, nous restons debout.
