document_id: PSA.20
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prière pour le roi
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef de chœur. Psaume de David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Que l'Eternel te réponde lorsque tu es dans la détresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que le nom du Dieu de Jacob te protège!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Qu'il t'envoie du secours depuis le sanctuaire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: depuis Sion qu'il te soutienne!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Qu'il se souvienne de toutes tes offrandes
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et qu''il accepte tes holocaustes! '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: – Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Qu'il te donne ce que ton cœur désire
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu'il accomplisse tous tes projets!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Nous nous réjouirons de ton salut,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nous dresserons l'étendard au nom de notre Dieu;
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'Eternel exaucera tous tes vœux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Je sais maintenant que l'Eternel sauve celui qu'il a désigné par onction;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il lui répond du ciel, de sa sainte demeure,
- type: usfm
  marker: q1
  children:
  - type: text
    text: par le secours puissant de sa main droite.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Les uns s'appuient sur leurs chars, les autres sur leurs chevaux;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nous, nous célébrons l'Eternel, notre Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Eux, ils plient et tombent;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nous, nous tenons ferme, nous restons debout.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Eternel, sauve le roi!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Réponds-nous, quand nous faisons appel à toi!
