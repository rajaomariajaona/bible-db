document_id: PSA.114,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Rappel des délivrances passées
  - type: text
    content: Quand Israël est sorti d'Egypte,
  - type: text
    content: quand la famille de Jacob s'est éloignée d'un peuple étranger,
  '2':
  - type: text
    content: Juda est devenu le sanctuaire de Dieu,
  - type: text
    content: Israël a été son domaine.
  '3':
  - type: text
    content: La mer l'a vu et s'est enfuie,
  - type: text
    content: le Jourdain est retourné en arrière;
  '4':
  - type: text
    content: les montagnes ont sauté comme des béliers,
  - type: text
    content: les collines comme des agneaux.
  '5':
  - type: text
    content: Qu'as-tu, mer, pour t'enfuir,
  - type: text
    content: et toi, Jourdain, pour retourner en arrière?
  '6':
  - type: text
    content: Qu'avez-vous, montagnes, pour sauter comme des béliers,
  - type: text
    content: et vous, collines, comme des agneaux?
  '7':
  - type: text
    content: Tremble donc, terre, devant le Seigneur,
  - type: text
    content: devant le Dieu de Jacob!
  '8':
  - type: text
    content: Il change le rocher en étang,
  - type: text
    content: le roc en source d'eau.
