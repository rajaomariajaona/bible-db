document_id: PSA.114
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Rappel des délivrances passées
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Quand Israël est sorti d'Egypte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand la famille de Jacob s'est éloignée d'un peuple étranger,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Juda est devenu le sanctuaire de Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Israël a été son domaine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: La mer l'a vu et s'est enfuie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le Jourdain est retourné en arrière;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: les montagnes ont sauté comme des béliers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les collines comme des agneaux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Qu'as-tu, mer, pour t'enfuir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et toi, Jourdain, pour retourner en arrière?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Qu'avez-vous, montagnes, pour sauter comme des béliers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et vous, collines, comme des agneaux?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tremble donc, terre, devant le Seigneur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: devant le Dieu de Jacob!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Il change le rocher en étang,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le roc en source d'eau.
