document_id: JDG.6,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Appel de Gédéon
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Les Israélites firent ce qui déplaît à l''Eternel et l''Eternel les livra entre les mains de Madian pendant 7 ans. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Je vous ai dit: ‘Je suis l''Eternel, votre Dieu. Vous ne craindrez pas les dieux des Amoréens, même si vous habitez dans leur pays.’ Mais vous ne m''avez pas écouté.»'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Puis l''ange de l''Eternel vint et il s''assit sous le térébinthe d''Ophra, qui appartenait à Joas, membre de la famille d''Abiézer. Son fils Gédéon battait du blé au pressoir pour le mettre à l''abri des Madianites. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'L''ange de l''Eternel lui apparut et lui dit: «L''Eternel est avec toi, vaillant héros!» '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Gédéon lui dit: «Ah! mon seigneur, si l''Eternel est avec nous, pourquoi tout cela nous est-il arrivé? Où sont tous ses actes merveilleux, ceux que nos pères nous racontent quand ils disent: ‘L''Eternel ne nous a-t-il pas fait sortir d''Egypte?’ Maintenant l''Eternel nous abandonne et nous livre entre les mains de Madian!»'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'L''Eternel se tourna vers lui et dit: «Va avec la force que tu as et délivre Israël de l''oppression de Madian. N''est-ce pas moi qui t''envoie?» '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Gédéon lui dit: «Ah! mon seigneur, avec quoi délivrerai-je Israël? Mon clan est le plus faible de Manassé et je suis le plus petit dans la famille de mon père.»'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'L''Eternel répondit: «Mais je serai avec toi et tu battras les Madianites comme s''il s''agissait d''un seul homme.» '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Gédéon lui dit: «Si j''ai trouvé grâce à tes yeux, donne-moi un signe pour montrer que c''est bien toi qui me parles. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ne t''éloigne pas d''ici jusqu''à ce que je revienne auprès de toi, que j''apporte mon offrande et que je la dépose devant toi.» Et l''Eternel dit: «Je resterai jusqu''à ce que tu reviennes.»'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Gédéon entra chez lui, prépara un chevreau et fit des pains sans levain avec 22 litres de farine. Il mit la viande dans un panier et le jus dans un pot, les lui apporta sous le térébinthe et les présenta. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'La domination des Madianites fut puissante contre Israël. Pour leur échapper, les Israélites se retiraient dans les ravins des montagnes, dans les grottes et sur les rochers fortifiés. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'L''ange de Dieu lui dit: «Prends la viande et les pains sans levain, pose-les sur ce rocher et verse le jus par-dessus.» C''est ce que fit Gédéon. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'L''ange de l''Eternel avança le bâton qu''il avait à la main et en toucha la viande et les pains sans levain. Alors un feu s''éleva du rocher, un feu qui brûla la viande et les pains sans levain. Puis l''ange de l''Eternel disparut de la vue de Gédéon. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Comprenant que c''était l''ange de l''Eternel, Gédéon s''exclama: «Malheur à moi, Seigneur Eternel, car j''ai vu l''ange de l''Eternel face à face.» '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Et l''Eternel lui dit: «Reste en paix, n''aie pas peur, tu ne mourras pas.»'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Gédéon construisit là un autel à l'Eternel, et il l'appela «L'Eternel paix». Il existe aujourd'hui encore à Ophra, qui appartenait à la famille d'Abiézer.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Au cours de la même nuit, l''Eternel dit à Gédéon: «Prends le jeune taureau de ton père, ainsi qu''un deuxième taureau de 7 ans. Démolis l''autel de Baal qui appartient à ton père et abats le poteau sacré qui se trouve dessus. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Tu construiras ensuite et tu disposeras, sur le haut de ce rocher, un autel consacré à l''Eternel, ton Dieu. Tu prendras le deuxième taureau et tu l''offriras en holocauste en utilisant le bois de l''idole que tu auras abattue.» '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Gédéon prit dix de ses serviteurs et fit ce que l'Eternel avait dit. Toutefois, comme il avait peur de la famille de son père et des habitants de la ville, il l'accomplit de nuit, et non de jour.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Lorsque les habitants de la ville se levèrent de bon matin, ils constatèrent que l''autel de Baal avait été démoli, le poteau sacré placé dessus abattu, et le deuxième taureau offert en holocauste sur le nouvel autel qui avait été construit. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Ils se dirent l''un à l''autre: «Qui a fait cela?» et ils s''informèrent et firent des recherches. On leur dit: «C''est Gédéon, fils de Joas, qui a fait cela.» '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Quand Israël avait semé, les Madianites montaient avec Amalek et les nomades de l''est et marchaient contre lui. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Alors les habitants de la ville dirent à Joas: «Fais sortir ton fils de chez toi et qu''il meure, car il a démoli l''autel de Baal et abattu le poteau sacré qui se trouvait dessus.» '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Joas répondit à tous ceux qui se présentèrent à lui: «Est-ce à vous de défendre Baal? Est-ce à vous de venir à son secours? Toute personne qui défendra Baal mourra avant le matin. Si Baal est un dieu, qu''il se défende lui-même, puisqu''on a démoli son autel.» '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Ce jour-là on donna à Gédéon le nom de Jerubbaal
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.32 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Jerubbaal: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: littéralement que Baal se défende.
      marker-yv: yv-n
    - type: text
      text: ' en disant: «Que Baal se défende contre lui, puisqu''il a démoli son autel.»'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Tous les Madianites, les Amalécites et les nomades de l''est se rassemblèrent. Ils passèrent le Jourdain et campèrent dans la vallée de Jizreel. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Gédéon fut revêtu de l''Esprit de l''Eternel. Il sonna de la trompette et la famille d''Abiézer fut convoquée pour marcher à sa suite. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Il envoya des messagers dans tout Manassé, qui fut aussi convoqué pour marcher à sa suite. Il envoya des messagers dans les tribus d'Aser, de Zabulon et de Nephthali, qui montèrent à leur rencontre.
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Gédéon dit à Dieu: «Si tu veux délivrer Israël par mon intermédiaire, comme tu l''as dit, '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'je vais mettre une peau de mouton avec sa laine dans l''aire de battage. Si la peau seule se couvre de rosée et que tout le terrain reste sec, je saurai que tu délivreras Israël par mon intermédiaire, comme tu l''as dit.» '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Et cela se passa ainsi. Le lendemain, il se leva de bonne heure, pressa la peau de mouton et en fit sortir la rosée. Elle donna une coupe pleine d''eau. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Gédéon dit à Dieu: «Que ta colère ne s''enflamme pas contre moi, et je ne parlerai plus que cette fois. Je voudrais seulement faire encore une épreuve avec la peau de mouton: que la peau seule reste sèche et que tout le terrain se couvre de rosée.» '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ils campaient en face de lui, détruisaient les produits du pays jusque vers Gaza et ne laissaient en Israël ni vivres, ni brebis, ni bœufs, ni ânes. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Et Dieu agit ainsi cette nuit-là: la peau de mouton seule resta sèche et tout le terrain se couvrit de rosée.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'En effet, ils montaient avec leurs troupeaux et leurs tentes, arrivant comme un essaim de sauterelles; il était impossible de les compter, eux et leurs chameaux, et ils venaient dans le pays pour le dévaster. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Israël fut plongé dans une grande misère à cause de Madian, et les Israélites crièrent à l'Eternel.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Lorsque les Israélites crièrent à l''Eternel au sujet de Madian, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'l''Eternel leur envoya un prophète. Il leur dit: «Voici ce que dit l''Eternel, le Dieu d''Israël: Je vous ai fait sortir d''Egypte et quitter la maison d''esclavage. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Je vous ai délivrés de la domination des Egyptiens et de tous ceux qui vous opprimaient. Je les ai chassés devant vous et je vous ai donné leur pays. '
