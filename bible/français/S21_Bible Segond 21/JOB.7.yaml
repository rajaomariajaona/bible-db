document_id: JOB.7
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: »Le sort de l'homme sur la terre n'est-il pas celui d'un soldat,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sa vie n'est-elle pas celle d'un ouvrier?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: L'esclave aspire à jouir de l'ombre
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l'ouvrier attend son salaire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: De même, j'ai hérité de mois de douleur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: on m'a attribué des nuits de souffrance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Je me couche en disant:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Quand pourrai-je me lever?’ Le soir se prolonge
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je suis rassasié d'insomnies jusqu'au lever du jour.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mon corps se couvre de vers et d'une croûte terreuse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ma peau s'est crevassée et se décompose.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Plus rapides que la navette d'un tisserand,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'mes jours s''évanouissent: plus d''espérance!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: »Mon Dieu, souviens-toi que ma vie est un simple souffle!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mes yeux ne reverront pas le bonheur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: L'œil qui me regarde ne me verra plus.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ton œil me cherchera, et je ne serai plus là.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Pareil à un nuage qui se dissipe et s'en va,
- type: usfm
  marker: q1
  children:
  - type: text
    text: celui qui descend au séjour des morts n'en remontera pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Il ne reviendra plus chez lui
- type: usfm
  marker: q1
  children:
  - type: text
    text: et son domicile ne le connaîtra plus.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: C'est pourquoi je ne me retiendrai pas.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je parlerai, dans la détresse de mon esprit;
- type: usfm
  marker: q1
  children:
  - type: text
    text: je me plaindrai, dans l'amertume de mon âme.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: »Suis-je une mer ou un monstre marin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour que tu places des gardes autour de moi?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Quand je me dis: ‘Mon divan me soulagera,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: mon lit calmera mes douleurs’,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: tu m'effraies par des rêves,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu m'assailles de visions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Je voudrais être étranglé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je voudrais mourir plutôt que d'être réduit à l'état de squelette!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Je suis dégoûté! Je n'en ai plus pour longtemps.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Laisse-moi, car ma vie est sans consistance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: »Qu'est-ce que l'homme, pour que tu fasses tant de cas de lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour que tu lui portes tant d'attention,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: pour que tu le visites tous les matins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour que tu le mettes à l'épreuve à chaque instant?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Quand cesseras-tu de me fixer du regard?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand me laisseras-tu le temps d'avaler ma salive?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Si j'ai péché, qu'ai-je pu te faire, gardien des hommes?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi m'as-tu pris pour cible?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi te serais-je à charge?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Pourquoi ne pardonnes-tu pas ma transgression
- type: usfm
  marker: q1
  children:
  - type: text
    text: et n'oublies-tu pas ma faute?
- type: usfm
  marker: q1
  children:
  - type: text
    text: En effet, je vais bientôt me coucher dans la poussière.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu auras beau me chercher de bon matin, je ne serai plus là!»
