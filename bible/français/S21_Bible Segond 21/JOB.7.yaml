document_id: JOB.7,152
type_code: fra
verses:
  '1':
  - type: text
    content: »Le sort de l'homme sur la terre n'est-il pas celui d'un soldat,
  - type: text
    content: et sa vie n'est-elle pas celle d'un ouvrier?
  '10':
  - type: text
    content: Il ne reviendra plus chez lui
  - type: text
    content: et son domicile ne le connaîtra plus.
  '11':
  - type: text
    content: C'est pourquoi je ne me retiendrai pas.
  - type: text
    content: Je parlerai, dans la détresse de mon esprit;
  - type: text
    content: je me plaindrai, dans l'amertume de mon âme.
  '12':
  - type: text
    content: »Suis-je une mer ou un monstre marin,
  - type: text
    content: pour que tu places des gardes autour de moi?
  '13':
  - type: text
    content: 'Quand je me dis: ‘Mon divan me soulagera,'
  - type: text
    content: mon lit calmera mes douleurs’,
  '14':
  - type: text
    content: tu m'effraies par des rêves,
  - type: text
    content: tu m'assailles de visions.
  '15':
  - type: text
    content: Je voudrais être étranglé,
  - type: text
    content: je voudrais mourir plutôt que d'être réduit à l'état de squelette!
  '16':
  - type: text
    content: Je suis dégoûté! Je n'en ai plus pour longtemps.
  - type: text
    content: Laisse-moi, car ma vie est sans consistance.
  '17':
  - type: text
    content: »Qu'est-ce que l'homme, pour que tu fasses tant de cas de lui,
  - type: text
    content: pour que tu lui portes tant d'attention,
  '18':
  - type: text
    content: pour que tu le visites tous les matins,
  - type: text
    content: pour que tu le mettes à l'épreuve à chaque instant?
  '19':
  - type: text
    content: Quand cesseras-tu de me fixer du regard?
  - type: text
    content: Quand me laisseras-tu le temps d'avaler ma salive?
  '2':
  - type: text
    content: L'esclave aspire à jouir de l'ombre
  - type: text
    content: et l'ouvrier attend son salaire.
  '20':
  - type: text
    content: Si j'ai péché, qu'ai-je pu te faire, gardien des hommes?
  - type: text
    content: Pourquoi m'as-tu pris pour cible?
  - type: text
    content: Pourquoi te serais-je à charge?
  '21':
  - type: text
    content: Pourquoi ne pardonnes-tu pas ma transgression
  - type: text
    content: et n'oublies-tu pas ma faute?
  - type: text
    content: En effet, je vais bientôt me coucher dans la poussière.
  - type: text
    content: Tu auras beau me chercher de bon matin, je ne serai plus là!»
  '3':
  - type: text
    content: De même, j'ai hérité de mois de douleur,
  - type: text
    content: on m'a attribué des nuits de souffrance.
  '4':
  - type: text
    content: 'Je me couche en disant:'
  - type: text
    content: ‘Quand pourrai-je me lever?’ Le soir se prolonge
  - type: text
    content: et je suis rassasié d'insomnies jusqu'au lever du jour.
  '5':
  - type: text
    content: Mon corps se couvre de vers et d'une croûte terreuse,
  - type: text
    content: ma peau s'est crevassée et se décompose.
  '6':
  - type: text
    content: Plus rapides que la navette d'un tisserand,
  - type: text
    content: 'mes jours s''évanouissent: plus d''espérance!'
  '7':
  - type: text
    content: »Mon Dieu, souviens-toi que ma vie est un simple souffle!
  - type: text
    content: Mes yeux ne reverront pas le bonheur.
  '8':
  - type: text
    content: L'œil qui me regarde ne me verra plus.
  - type: text
    content: Ton œil me cherchera, et je ne serai plus là.
  '9':
  - type: text
    content: Pareil à un nuage qui se dissipe et s'en va,
  - type: text
    content: celui qui descend au séjour des morts n'en remontera pas.
