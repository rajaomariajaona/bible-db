document_id: DEU.1,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Rappels et encouragements
  - type: heading
    content: 1.1–11.32
  - type: heading
    content: Rappel des paroles de l'Eternel à Horeb
  - type: text
    content: 'Voici les paroles que Moïse adressa à tout Israël de l''autre côté du Jourdain, dans le désert, dans la plaine qui se trouve vis-à-vis de Suph, entre Paran, Tophel, Laban, Hatséroth et Di-Zahab. '
  '10':
  - type: text
    content: 'L''Eternel, votre Dieu, vous a multipliés et vous êtes aujourd''hui aussi nombreux que les étoiles du ciel. '
  '11':
  - type: text
    content: 'Que l''Eternel, le Dieu de vos ancêtres, vous augmente 1000 fois autant et vous bénisse comme il vous l''a promis! '
  '12':
  - type: text
    content: 'Comment pourrais-je porter, à moi tout seul, votre charge, votre fardeau et vos contestations? '
  '13':
  - type: text
    content: 'Prenez dans vos tribus des hommes sages, intelligents et connus, et je les mettrai à votre tête.’ '
  '14':
  - type: text
    content: 'Vous m''avez répondu: ‘Ce que tu proposes de faire est une bonne chose.’ '
  '15':
  - type: text
    content: 'J''ai alors pris les chefs de vos tribus, des hommes sages et connus, et je les ai mis à votre tête comme chefs de milliers, de centaines, de cinquantaines et de dizaines, et comme responsables dans vos tribus. '
  '16':
  - type: text
    content: 'A la même époque j''ai donné l''ordre suivant à vos juges: ‘Ecoutez vos frères'
  - type: note
    content: 'Frères: terme souvent utilisé pour désigner les compatriotes.'
  - type: text
    content: ' et jugez conformément à la justice les différends de chacun avec son frère ou avec l''étranger. '
  '17':
  - type: text
    content: 'Vous ne ferez pas preuve de partialité dans vos jugements: vous écouterez le petit comme le grand. Vous ne montrerez aucune crainte devant un homme, car c''est Dieu qui rend la justice. Et lorsque vous trouverez une cause trop difficile, vous la porterez devant moi pour que je l''entende.’ '
  '18':
  - type: text
    content: C'est ainsi que je vous ai prescrit, à cette époque-là, tout ce que vous aviez à faire.
  - type: heading
    content: Incrédulité à Kadès-Barnéa
  '19':
  - type: text
    content: »Nous sommes partis d'Horeb et nous avons parcouru en entier le grand et affreux désert que vous avez vu. Nous avons pris le chemin de la région montagneuse des Amoréens, comme l'Eternel, notre Dieu, nous l'avait ordonné, et nous sommes arrivés à Kadès-Barnéa.
  '2':
  - type: text
    content: Il y a 11 journées de marche depuis Horeb
  - type: note
    content: 'Horeb: c''est-à-dire le Sinaï.'
  - type: text
    content: ' jusqu''à Kadès-Barnéa en passant par la région montagneuse de Séir. '
  '20':
  - type: text
    content: '»Je vous ai dit: ‘Vous êtes arrivés à la région montagneuse des Amoréens, que l''Eternel, notre Dieu, nous donne. '
  '21':
  - type: text
    content: 'Regarde, l''Eternel, ton Dieu, met le pays devant toi. Monte, prends-en possession, comme te l''a dit l''Eternel, le Dieu de tes ancêtres. N''aie pas peur, ne te laisse pas effrayer!’ '
  '22':
  - type: text
    content: 'Vous vous êtes tous approchés de moi et vous avez dit: ‘Envoyons des hommes devant nous pour explorer le pays et pour nous faire un rapport sur le chemin par lequel nous y monterons et sur les villes où nous arriverons.’ '
  '23':
  - type: text
    content: 'Cet avis m''a paru bon et j''ai pris douze hommes parmi vous, un par tribu. '
  '24':
  - type: text
    content: 'Ils sont partis, ont traversé la montagne et sont arrivés jusqu''à la vallée d''Eshcol, qu''ils ont explorée. '
  '25':
  - type: text
    content: 'Ils ont pris dans leurs mains des produits du pays et nous les ont présentés. Ils nous ont fait un rapport et ont dit: ‘C''est un bon pays que l''Eternel, notre Dieu, nous donne.’ '
  '26':
  - type: text
    content: 'Mais vous n''avez pas voulu y monter et vous vous êtes révoltés contre l''ordre de l''Eternel, votre Dieu. '
  '27':
  - type: text
    content: 'Vous avez murmuré dans vos tentes et vous avez dit: ‘C''est parce que l''Eternel nous déteste qu''il nous a fait sortir d''Egypte. Il voulait nous livrer entre les mains des Amoréens et nous détruire. '
  '28':
  - type: text
    content: 'Où pourrions-nous monter? Nos frères nous ont fait perdre courage en disant: C''est un peuple plus grand et de plus haute taille que nous; ce sont des villes grandes et fortifiées jusqu''au ciel; nous y avons même vu des descendants d''Anak.’ '
  '29':
  - type: text
    content: 'Je vous ai dit: ‘Ne tremblez pas et n''ayez pas peur d''eux. '
  '3':
  - type: text
    content: Au cours de la quarantième année après la sortie d'Egypte
  - type: note
    content: 'Après la sortie d''Egypte: non exprimé en hébreu.'
  - type: text
    content: ', le premier jour du onzième mois, Moïse parla aux Israélites conformément à tout ce que l''Eternel lui avait ordonné de leur dire. '
  '30':
  - type: text
    content: 'L''Eternel, votre Dieu qui marche devant vous, combattra lui-même pour vous, conformément à tout ce qu''il a fait pour vous sous vos yeux en Egypte, '
  '31':
  - type: text
    content: 'puis dans le désert. Tu as vu que l''Eternel, ton Dieu, t''a porté comme un homme porte son fils, pendant tout le parcours que vous avez effectué jusqu''à votre arrivée ici.’ '
  '32':
  - type: text
    content: 'Malgré cela, vous n''avez pas eu confiance en l''Eternel, votre Dieu '
  '33':
  - type: text
    content: qui marchait devant vous sur la route pour vous chercher un lieu de campement, la nuit dans un feu afin de vous montrer le chemin où vous deviez marcher, et le jour dans une nuée.
  '34':
  - type: text
    content: '»L''Eternel a entendu vos paroles. Il s''est irrité et a juré: '
  '35':
  - type: text
    content: '‘Aucun des hommes de cette génération méchante ne verra le bon pays que j''ai juré de donner à vos ancêtres, '
  '36':
  - type: text
    content: 'excepté Caleb, fils de Jephunné. Il le verra, lui, et parce qu''il a pleinement suivi la voie de l''Eternel, je lui donnerai, ainsi qu''à ses enfants, le pays sur lequel il a marché.’ '
  '37':
  - type: text
    content: 'L''Eternel s''est aussi irrité contre moi à cause de vous et il a dit: ‘Toi non plus, tu n''y entreras pas. '
  '38':
  - type: text
    content: 'C''est Josué, fils de Nun, ton serviteur, qui y entrera. Fortifie-le, car c''est lui qui mettra Israël en possession de ce pays. '
  '39':
  - type: text
    content: 'Ce sont vos petits enfants, eux dont vous avez dit qu''ils deviendraient une proie, vos fils, qui ne connaissent aujourd''hui ni le bien ni le mal, ce sont eux qui y entreront, c''est à eux que je le donnerai et ce sont eux qui le posséderont. '
  '4':
  - type: text
    content: 'C''était après ses victoires contre Sihon, le roi des Amoréens qui habitait à Hesbon, et contre Og, le roi du Basan qui habitait à Ashtaroth et à Edréï. '
  '40':
  - type: text
    content: Mais vous, tournez-vous et partez pour le désert, dans la direction de la mer des Roseaux.’
  '41':
  - type: text
    content: '»Vous m''avez répondu: ‘Nous avons péché contre l''Eternel. Nous monterons et nous combattrons, comme l''Eternel, notre Dieu, nous l''a ordonné.’ Vous avez mis chacun vos armes à la ceinture et vous avez formé le projet téméraire de monter sur la montagne. '
  '42':
  - type: text
    content: 'L''Eternel m''a dit: ‘Dis-leur: Ne montez pas et ne combattez pas, car je ne suis pas au milieu de vous. Ne vous faites pas battre par vos ennemis.’ '
  '43':
  - type: text
    content: 'Je vous ai parlé, mais vous n''avez pas écouté. Vous vous êtes révoltés contre l''ordre de l''Eternel et, dans votre insolence, vous êtes montés sur la montagne. '
  '44':
  - type: text
    content: 'Alors les Amoréens qui y habitent sont sortis à votre rencontre et vous ont poursuivis comme le font les abeilles. Ils vous ont battus en Séir et vous ont poursuivis jusqu''à Horma. '
  '45':
  - type: text
    content: 'A votre retour, vous avez pleuré devant l''Eternel, mais l''Eternel n''a pas écouté votre voix, il ne vous a pas prêté l''oreille. '
  '46':
  - type: text
    content: Vous êtes restés à Kadès. Vous y avez séjourné longtemps.
  '5':
  - type: text
    content: 'De l''autre côté du Jourdain, dans le pays de Moab, Moïse commença à expliquer cette loi. Il dit:'
  '6':
  - type: text
    content: '«L''Eternel, notre Dieu, nous a dit à Horeb: ‘Vous êtes assez restés sur cette montagne. '
  '7':
  - type: text
    content: 'Tournez-vous et partez. Rendez-vous dans la région montagneuse des Amoréens et chez tous leurs voisins, dans la plaine, sur la montagne, dans la vallée, dans le sud, sur la côte de la mer, dans le pays des Cananéens et au Liban, jusqu''au grand fleuve, jusqu''à l''Euphrate. '
  '8':
  - type: text
    content: 'Voyez, j''ai mis le pays devant vous: allez-y et prenez possession du pays que l''Eternel a juré de donner à vos ancêtres Abraham, Isaac et Jacob ainsi qu''à leur descendance après eux.’'
  '9':
  - type: text
    content: '»A cette époque-là, je vous ai dit: ‘Je ne peux pas, à moi tout seul, vous porter. '
