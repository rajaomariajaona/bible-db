document_id: DEU.1
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Rappels et encouragements
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 1.1–11.32
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Rappel des paroles de l'Eternel à Horeb
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Voici les paroles que Moïse adressa à tout Israël de l''autre côté du Jourdain, dans le désert, dans la plaine qui se trouve vis-à-vis de Suph, entre Paran, Tophel, Laban, Hatséroth et Di-Zahab. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Il y a 11 journées de marche depuis Horeb
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Horeb: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: c'est-à-dire le Sinaï.
    marker-yv: yv-n
  - type: text
    text: ' jusqu''à Kadès-Barnéa en passant par la région montagneuse de Séir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Au cours de la quarantième année après la sortie d'Egypte
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Après la sortie d''Egypte: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: non exprimé en hébreu.
    marker-yv: yv-n
  - type: text
    text: ', le premier jour du onzième mois, Moïse parla aux Israélites conformément à tout ce que l''Eternel lui avait ordonné de leur dire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'C''était après ses victoires contre Sihon, le roi des Amoréens qui habitait à Hesbon, et contre Og, le roi du Basan qui habitait à Ashtaroth et à Edréï. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'De l''autre côté du Jourdain, dans le pays de Moab, Moïse commença à expliquer cette loi. Il dit:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '«L''Eternel, notre Dieu, nous a dit à Horeb: ‘Vous êtes assez restés sur cette montagne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tournez-vous et partez. Rendez-vous dans la région montagneuse des Amoréens et chez tous leurs voisins, dans la plaine, sur la montagne, dans la vallée, dans le sud, sur la côte de la mer, dans le pays des Cananéens et au Liban, jusqu''au grand fleuve, jusqu''à l''Euphrate. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Voyez, j''ai mis le pays devant vous: allez-y et prenez possession du pays que l''Eternel a juré de donner à vos ancêtres Abraham, Isaac et Jacob ainsi qu''à leur descendance après eux.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '»A cette époque-là, je vous ai dit: ‘Je ne peux pas, à moi tout seul, vous porter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'L''Eternel, votre Dieu, vous a multipliés et vous êtes aujourd''hui aussi nombreux que les étoiles du ciel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Que l''Eternel, le Dieu de vos ancêtres, vous augmente 1000 fois autant et vous bénisse comme il vous l''a promis! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Comment pourrais-je porter, à moi tout seul, votre charge, votre fardeau et vos contestations? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Prenez dans vos tribus des hommes sages, intelligents et connus, et je les mettrai à votre tête.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Vous m''avez répondu: ‘Ce que tu proposes de faire est une bonne chose.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'J''ai alors pris les chefs de vos tribus, des hommes sages et connus, et je les ai mis à votre tête comme chefs de milliers, de centaines, de cinquantaines et de dizaines, et comme responsables dans vos tribus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'A la même époque j''ai donné l''ordre suivant à vos juges: ‘Ecoutez vos frères'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Frères: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: terme souvent utilisé pour désigner les compatriotes.
    marker-yv: yv-n
  - type: text
    text: ' et jugez conformément à la justice les différends de chacun avec son frère ou avec l''étranger. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Vous ne ferez pas preuve de partialité dans vos jugements: vous écouterez le petit comme le grand. Vous ne montrerez aucune crainte devant un homme, car c''est Dieu qui rend la justice. Et lorsque vous trouverez une cause trop difficile, vous la porterez devant moi pour que je l''entende.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: C'est ainsi que je vous ai prescrit, à cette époque-là, tout ce que vous aviez à faire.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Incrédulité à Kadès-Barnéa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: »Nous sommes partis d'Horeb et nous avons parcouru en entier le grand et affreux désert que vous avez vu. Nous avons pris le chemin de la région montagneuse des Amoréens, comme l'Eternel, notre Dieu, nous l'avait ordonné, et nous sommes arrivés à Kadès-Barnéa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '»Je vous ai dit: ‘Vous êtes arrivés à la région montagneuse des Amoréens, que l''Eternel, notre Dieu, nous donne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Regarde, l''Eternel, ton Dieu, met le pays devant toi. Monte, prends-en possession, comme te l''a dit l''Eternel, le Dieu de tes ancêtres. N''aie pas peur, ne te laisse pas effrayer!’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Vous vous êtes tous approchés de moi et vous avez dit: ‘Envoyons des hommes devant nous pour explorer le pays et pour nous faire un rapport sur le chemin par lequel nous y monterons et sur les villes où nous arriverons.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Cet avis m''a paru bon et j''ai pris douze hommes parmi vous, un par tribu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ils sont partis, ont traversé la montagne et sont arrivés jusqu''à la vallée d''Eshcol, qu''ils ont explorée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ils ont pris dans leurs mains des produits du pays et nous les ont présentés. Ils nous ont fait un rapport et ont dit: ‘C''est un bon pays que l''Eternel, notre Dieu, nous donne.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Mais vous n''avez pas voulu y monter et vous vous êtes révoltés contre l''ordre de l''Eternel, votre Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Vous avez murmuré dans vos tentes et vous avez dit: ‘C''est parce que l''Eternel nous déteste qu''il nous a fait sortir d''Egypte. Il voulait nous livrer entre les mains des Amoréens et nous détruire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Où pourrions-nous monter? Nos frères nous ont fait perdre courage en disant: C''est un peuple plus grand et de plus haute taille que nous; ce sont des villes grandes et fortifiées jusqu''au ciel; nous y avons même vu des descendants d''Anak.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Je vous ai dit: ‘Ne tremblez pas et n''ayez pas peur d''eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'L''Eternel, votre Dieu qui marche devant vous, combattra lui-même pour vous, conformément à tout ce qu''il a fait pour vous sous vos yeux en Egypte, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'puis dans le désert. Tu as vu que l''Eternel, ton Dieu, t''a porté comme un homme porte son fils, pendant tout le parcours que vous avez effectué jusqu''à votre arrivée ici.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Malgré cela, vous n''avez pas eu confiance en l''Eternel, votre Dieu '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: qui marchait devant vous sur la route pour vous chercher un lieu de campement, la nuit dans un feu afin de vous montrer le chemin où vous deviez marcher, et le jour dans une nuée.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: '»L''Eternel a entendu vos paroles. Il s''est irrité et a juré: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: '‘Aucun des hommes de cette génération méchante ne verra le bon pays que j''ai juré de donner à vos ancêtres, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'excepté Caleb, fils de Jephunné. Il le verra, lui, et parce qu''il a pleinement suivi la voie de l''Eternel, je lui donnerai, ainsi qu''à ses enfants, le pays sur lequel il a marché.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'L''Eternel s''est aussi irrité contre moi à cause de vous et il a dit: ‘Toi non plus, tu n''y entreras pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'C''est Josué, fils de Nun, ton serviteur, qui y entrera. Fortifie-le, car c''est lui qui mettra Israël en possession de ce pays. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ce sont vos petits enfants, eux dont vous avez dit qu''ils deviendraient une proie, vos fils, qui ne connaissent aujourd''hui ni le bien ni le mal, ce sont eux qui y entreront, c''est à eux que je le donnerai et ce sont eux qui le posséderont. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Mais vous, tournez-vous et partez pour le désert, dans la direction de la mer des Roseaux.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: '»Vous m''avez répondu: ‘Nous avons péché contre l''Eternel. Nous monterons et nous combattrons, comme l''Eternel, notre Dieu, nous l''a ordonné.’ Vous avez mis chacun vos armes à la ceinture et vous avez formé le projet téméraire de monter sur la montagne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'L''Eternel m''a dit: ‘Dis-leur: Ne montez pas et ne combattez pas, car je ne suis pas au milieu de vous. Ne vous faites pas battre par vos ennemis.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Je vous ai parlé, mais vous n''avez pas écouté. Vous vous êtes révoltés contre l''ordre de l''Eternel et, dans votre insolence, vous êtes montés sur la montagne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Alors les Amoréens qui y habitent sont sortis à votre rencontre et vous ont poursuivis comme le font les abeilles. Ils vous ont battus en Séir et vous ont poursuivis jusqu''à Horma. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'A votre retour, vous avez pleuré devant l''Eternel, mais l''Eternel n''a pas écouté votre voix, il ne vous a pas prêté l''oreille. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Vous êtes restés à Kadès. Vous y avez séjourné longtemps.
