document_id: ACT.27,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Départ de Paul pour Rome
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand notre embarquement pour l''Italie a été décidé, on a confié Paul et quelques autres prisonniers à un dénommé Julius, officier de la cohorte impériale. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Mes amis, je vois que la navigation ne se fera pas sans dommages et qu''il y aura beaucoup de pertes, non seulement pour la cargaison et pour le bateau, mais encore pour nous-mêmes.» '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais l''officier se fiait plus au capitaine et au patron du bateau qu''aux paroles de Paul. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Comme le port n'était pas approprié pour hiverner, la plupart ont été d'avis de le quitter pour essayer d'atteindre Phénix, un port de Crète orienté vers le sud-ouest et le nord-ouest, afin d'y passer l'hiver.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Un léger vent du sud s'est mis à souffler et, se croyant maîtres de leur projet, ils ont levé l'ancre et ont longé de près l'île de Crète.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais bientôt un vent violent, qu''on appelle Euraquilon, s''est déchaîné. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le bateau a été entraîné sans pouvoir résister au vent et nous nous sommes laissé emporter à la dérive. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors que nous passions au sud d''une petite île appelée Cauda, nous avons eu beaucoup de peine à nous rendre maîtres du canot de sauvetage. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Après l'avoir hissé à bord, ils ont utilisé les cordages de secours pour ceinturer le bateau. Dans la crainte d'échouer sur la Syrte
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'La Syrte: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ou les Syrtes, deux célèbres bancs de sables mouvants redoutés des navigateurs, sur la côte nord de l'Afrique, aujourd'hui le golfe de la Sidre et le golfe de Gabès.
      marker-yv: yv-n
    - type: text
      text: ', ils ont abaissé les voiles, et c''est ainsi qu''ils se sont laissé emporter par le vent. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Comme nous étions violemment battus par la tempête, le lendemain ils ont jeté la cargaison à la mer, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et le troisième jour ils ont jeté de leurs propres mains les agrès du bateau. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nous sommes montés sur un bateau d'Adramytte qui devait faire voile vers les côtes de l'Asie et nous sommes partis. Aristarque, un Macédonien de Thessalonique, était avec nous.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le soleil et les étoiles ne nous sont pas apparus pendant plusieurs jours et la tempête a été si forte que, finalement, nous avions perdu tout espoir d'être sauvés.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On n''avait pas mangé depuis longtemps. Alors Paul, debout au milieu d''eux, leur a dit: «Mes amis, il aurait fallu m''écouter et ne pas quitter la Crète, afin d''éviter ces dommages et ces pertes. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais maintenant, je vous invite à prendre courage, car aucun de vous ne perdra la vie; seul le bateau sera perdu. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, un ange du Dieu auquel j''appartiens et que je sers m''est apparu cette nuit '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et m''a dit: ‘Paul, n''aie pas peur! Il faut que tu comparaisses devant l''empereur, et voici que Dieu t''accorde la vie de tous ceux qui naviguent avec toi.’ '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C''est pourquoi, mes amis, prenez courage! J''ai confiance en Dieu: tout se passera comme cela m''a été dit. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nous devons toutefois échouer sur une île.»
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La quatorzième nuit, vers le milieu de la nuit, alors que nous étions ballottés sur l''Adriatique, les marins ont supposé que l''on approchait d''une terre. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils ont jeté la sonde et trouvé 36 mètres de profondeur. Un peu plus loin, ils l''ont de nouveau jetée et ont trouvé 27 mètres. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dans la crainte d''échouer sur des récifs, ils ont jeté quatre ancres à l''arrière du bateau et attendu le jour avec impatience. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le jour suivant, nous avons abordé à Sidon; Julius, qui traitait Paul avec bienveillance, lui a permis d''aller chez ses amis et de recevoir leurs soins. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais, alors que les marins cherchaient à s''échapper du bateau et mettaient le canot à la mer sous prétexte de jeter les ancres situées à l''avant, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Paul a dit à l''officier et aux soldats: «Si ces hommes ne restent pas sur le bateau, vous ne pouvez pas être sauvés.» '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors les soldats ont coupé les cordages du canot et l'ont laissé tomber.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avant que le jour se lève, Paul a encouragé tout le monde à prendre de la nourriture en disant: «C''est aujourd''hui le quatorzième jour que vous êtes dans l''attente sans manger, sans rien prendre. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je vous invite donc à prendre de la nourriture, car cela est nécessaire pour votre salut et aucun de vous ne perdra un cheveu de sa tête.» '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après avoir dit cela, il a pris du pain, a remercié Dieu devant tous, puis il l''a rompu et s''est mis à manger. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors tous ont repris courage et ont eux aussi mangé. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous étions 276 personnes en tout sur le bateau. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Une fois rassasiés, ils ont allégé le bateau en jetant le blé à la mer.
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Au lever du jour, sans reconnaître l''endroit, ils ont aperçu un golfe avec une plage et décidé, si possible, d''y faire échouer le bateau. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Partis de là, nous avons longé l''île de Chypre, parce que les vents étaient contraires. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils ont détaché les ancres pour les laisser aller dans la mer et ont en même temps relâché les attaches des gouvernails. Puis ils ont mis au vent la voile d''artimon et se sont dirigés vers le rivage, '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mais ils sont tombés sur un banc de sable où ils ont fait échouer le bateau. L''avant du bateau s''y est enfoncé et a été immobilisé, tandis que l''arrière se brisait sous la violence [des vagues]. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les soldats étaient d''avis de tuer les prisonniers de peur que l''un d''eux ne s''échappe à la nage, '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mais l''officier, qui voulait sauver Paul, les a empêchés de mettre ce projet à exécution. Il a ordonné à ceux qui savaient nager de se jeter les premiers à l''eau pour gagner la terre '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: et aux autres de s'agripper à des planches ou à des débris du bateau. C'est ainsi que tous sont parvenus sains et saufs à terre.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après avoir traversé la mer qui baigne la Cilicie et la Pamphylie, nous sommes arrivés à Myra en Lycie. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Là, ayant trouvé un bateau d'Alexandrie qui allait en Italie, l'officier nous y a fait monter.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pendant plusieurs jours nous avons navigué lentement, et ce n''est pas sans difficulté que nous sommes parvenus à la hauteur de Cnide, où le vent ne nous a pas permis d''aborder. Nous avons alors doublé le cap Salmoné pour passer au sud de la Crète. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nous avons longé l’île avec peine et sommes arrivés à un endroit appelé Beaux-Ports près de la ville de Lasée.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un temps assez long s''était écoulé et la navigation devenait dangereuse, car l''époque même du jeûne était déjà passée. C''est pourquoi Paul a donné cet avertissement: '
