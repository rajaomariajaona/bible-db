document_id: PSA.150,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Appel à une louange universelle
  - type: text
    content: Louez l'Eternel!
  - type: text
    content: Louez Dieu dans son sanctuaire!
  - type: text
    content: Louez-le dans l'étendue céleste où éclate sa puissance!
  '2':
  - type: text
    content: Louez-le pour son extraordinaire façon d'agir!
  - type: text
    content: Louez-le pour l'immensité de sa grandeur!
  '3':
  - type: text
    content: Louez-le au son de la trompette!
  - type: text
    content: Louez-le avec le luth et la harpe!
  '4':
  - type: text
    content: Louez-le avec le tambourin et avec des danses!
  - type: text
    content: Louez-le avec les instruments à cordes et la flûte!
  '5':
  - type: text
    content: Louez-le avec les cymbales sonores!
  - type: text
    content: Louez-le avec les cymbales retentissantes!
  '6':
  - type: text
    content: Que tout ce qui respire loue l'Eternel!
  - type: text
    content: Louez l'Eternel!
