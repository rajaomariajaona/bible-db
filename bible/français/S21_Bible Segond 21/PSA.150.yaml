document_id: PSA.150
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Appel à une louange universelle
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Louez l'Eternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Louez Dieu dans son sanctuaire!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Louez-le dans l'étendue céleste où éclate sa puissance!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Louez-le pour son extraordinaire façon d'agir!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Louez-le pour l'immensité de sa grandeur!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Louez-le au son de la trompette!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Louez-le avec le luth et la harpe!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Louez-le avec le tambourin et avec des danses!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Louez-le avec les instruments à cordes et la flûte!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Louez-le avec les cymbales sonores!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Louez-le avec les cymbales retentissantes!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Que tout ce qui respire loue l'Eternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Louez l'Eternel!
