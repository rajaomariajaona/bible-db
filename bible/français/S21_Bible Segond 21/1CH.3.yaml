document_id: 1CH.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Descendance de David
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Voici les fils de David qu''il eut à Hébron: l''aîné, Amnon, qu''il eut d''Achinoam de Jizreel; le deuxième, Daniel, d''Abigaïl de Carmel; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'le troisième, Absalom, fils de Maaca, elle-même fille de Talmaï, le roi de Gueshur; le quatrième, Adonija, fils de Haggith; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'le cinquième, Shephatia, d''Abithal; le sixième, Jithream, de sa femme Egla. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Il eut ces six fils à Hébron. Il y régna 7 ans et 6 mois, et il régna 33 ans à Jérusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Voici les fils qu''il eut à Jérusalem: Shimea, Shobab, Nathan et Salomon, tous les quatre de Bath-Shéba, fille d''Ammiel, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'ainsi que Jibhar, Elishama, Eliphéleth, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Noga, Népheg, Japhia, Elishama, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Eliada et Eliphéleth, ce qui fait 9.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ce sont là tous les fils de David, en plus des fils de ses concubines. Tamar était leur sœur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fils de Salomon: Roboam. Son fils était Abija, lui-même père d''Asa, père de Josaphat, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'père de Joram, père d''Achazia, père de Joas, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'père d''Amatsia, père d''Azaria, père de Jotham, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'père d''Achaz, père d''Ezéchias, père de Manassé, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: père d'Amon, père de Josias.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fils de Josias: l''aîné, Jochanan; le deuxième, Jojakim; le troisième, Sédécias; le quatrième, Shallum. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fils de Jojakim: Jéconias et Sédécias. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fils de Jéconias, le déporté: Shealthiel, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Malkiram, Pedaja, Shénatsar, Jekamia, Hoshama et Nedabia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fils de Pedaja: Zorobabel et Shimeï. Fils de Zorobabel: Meshullam et Hanania; Shelomith était leur sœur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Puis il y eut Hashuba, Ohel, Bérékia, Hasadia, Jushab-Hésed, ce qui fait 5. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Descendants de Hanania: Pelathia et Esaïe, ainsi que les fils de Rephaja, d''Arnan, d''Abdias et de Shecania. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Descendants de Shecania: Shemaeja et ses fils Hattush, Jigueal, Bariach, Nearia et Shaphath, ce qui fait 6. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fils de Nearia: Eljoénaï, Ezéchias et Azrikam, ce qui fait 3. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Fils d''Eljoénaï: Hodavia, Eliashib, Pelaja, Akkub, Jochanan, Delaja et Anani, ce qui fait 7.'
