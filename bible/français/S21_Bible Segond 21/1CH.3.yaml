document_id: 1CH.3,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Descendance de David
  - type: text
    content: 'Voici les fils de David qu''il eut à Hébron: l''aîné, Amnon, qu''il eut d''Achinoam de Jizreel; le deuxième, Daniel, d''Abigaïl de Carmel; '
  '10':
  - type: text
    content: 'Fils de Salomon: Roboam. Son fils était Abija, lui-même père d''Asa, père de Josaphat, '
  '11':
  - type: text
    content: 'père de Joram, père d''Achazia, père de Joas, '
  '12':
  - type: text
    content: 'père d''Amatsia, père d''Azaria, père de Jotham, '
  '13':
  - type: text
    content: 'père d''Achaz, père d''Ezéchias, père de Manassé, '
  '14':
  - type: text
    content: père d'Amon, père de Josias.
  '15':
  - type: text
    content: 'Fils de Josias: l''aîné, Jochanan; le deuxième, Jojakim; le troisième, Sédécias; le quatrième, Shallum. '
  '16':
  - type: text
    content: 'Fils de Jojakim: Jéconias et Sédécias. '
  '17':
  - type: text
    content: 'Fils de Jéconias, le déporté: Shealthiel, '
  '18':
  - type: text
    content: 'Malkiram, Pedaja, Shénatsar, Jekamia, Hoshama et Nedabia. '
  '19':
  - type: text
    content: 'Fils de Pedaja: Zorobabel et Shimeï. Fils de Zorobabel: Meshullam et Hanania; Shelomith était leur sœur. '
  '2':
  - type: text
    content: 'le troisième, Absalom, fils de Maaca, elle-même fille de Talmaï, le roi de Gueshur; le quatrième, Adonija, fils de Haggith; '
  '20':
  - type: text
    content: 'Puis il y eut Hashuba, Ohel, Bérékia, Hasadia, Jushab-Hésed, ce qui fait 5. '
  '21':
  - type: text
    content: 'Descendants de Hanania: Pelathia et Esaïe, ainsi que les fils de Rephaja, d''Arnan, d''Abdias et de Shecania. '
  '22':
  - type: text
    content: 'Descendants de Shecania: Shemaeja et ses fils Hattush, Jigueal, Bariach, Nearia et Shaphath, ce qui fait 6. '
  '23':
  - type: text
    content: 'Fils de Nearia: Eljoénaï, Ezéchias et Azrikam, ce qui fait 3. '
  '24':
  - type: text
    content: 'Fils d''Eljoénaï: Hodavia, Eliashib, Pelaja, Akkub, Jochanan, Delaja et Anani, ce qui fait 7.'
  '3':
  - type: text
    content: 'le cinquième, Shephatia, d''Abithal; le sixième, Jithream, de sa femme Egla. '
  '4':
  - type: text
    content: Il eut ces six fils à Hébron. Il y régna 7 ans et 6 mois, et il régna 33 ans à Jérusalem.
  '5':
  - type: text
    content: 'Voici les fils qu''il eut à Jérusalem: Shimea, Shobab, Nathan et Salomon, tous les quatre de Bath-Shéba, fille d''Ammiel, '
  '6':
  - type: text
    content: 'ainsi que Jibhar, Elishama, Eliphéleth, '
  '7':
  - type: text
    content: 'Noga, Népheg, Japhia, Elishama, '
  '8':
  - type: text
    content: Eliada et Eliphéleth, ce qui fait 9.
  '9':
  - type: text
    content: Ce sont là tous les fils de David, en plus des fils de ses concubines. Tamar était leur sœur.
