document_id: DEU.33,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Bénédiction de Moïse
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Voici la bénédiction par laquelle Moïse, l''homme de Dieu, bénit les Israélites avant sa mort. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ils enseignent tes règles à Jacob et ta loi à Israël. Ils mettent l''encens sous tes narines et l''holocauste sur ton autel. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Bénis sa force, Eternel! Accepte l'activité de ses mains! Brise les reins de ses adversaires et que ses ennemis ne se relèvent plus!»
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Sur Benjamin il dit: «C''est le bien-aimé de l''Eternel, il habitera en sécurité auprès de lui. L''Eternel le couvrira toujours et résidera entre ses épaules.»'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Sur Joseph il dit: «Son pays recevra de l''Eternel, en signe de bénédiction, le meilleur don du ciel, la rosée, la meilleure eau qui est en bas, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'les meilleurs fruits du soleil, les meilleurs fruits de chaque mois, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'les meilleurs produits des montagnes anciennes, les meilleurs produits des collines éternelles, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: les meilleurs produits de la terre et de ce qu'elle contient.
  - type: usfm
    marker: p
    children:
    - type: text
      text: »Que la grâce de celui qui est apparu dans le buisson
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Celui… buisson: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'désignation de l''Eternel (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Exode 3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' vienne sur la tête de Joseph, sur le crâne du prince consacré de ses frères! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: De son taureau premier-né il a la majesté. Ses cornes sont les cornes du buffle. Avec elles il frappera tous les peuples, jusqu'aux extrémités de la terre. Ce sont les dizaines de milliers d'Ephraïm, ce sont les milliers de Manassé.»
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Sur Zabulon il dit: «Réjouis-toi, Zabulon, dans tes expéditions et toi, Issacar, dans tes tentes! '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ils appelleront les peuples sur la montagne. Là, ils offriront des sacrifices de justice, car ils suceront l'abondance de la mer et les trésors cachés dans le sable.»
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Il dit: «L''Eternel est venu du Sinaï, il s''est levé sur eux de Séir, il a resplendi des monts de Paran et il est sorti du milieu des saintes troupes, il leur a, de sa main droite, envoyé le feu de la loi.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Sur Gad il dit: «Béni soit celui qui met Gad au large! Gad se couche comme une lionne, il déchire les pattes et la tête de sa victime. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Il a eu droit au premier choix, car là est cachée la part du chef. Il a marché en tête du peuple, il a mis en œuvre la justice de l'Eternel et ses règles envers Israël.»
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Sur Dan il dit: «Dan est un jeune lion qui s''élance du Basan.»'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Sur Nephthali il dit: «Nephthali, toi qui es rassasié de faveurs et comblé des bénédictions de l''Eternel, prends possession des régions situées à l''ouest et au sud!»'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Sur Aser il dit: «Béni soit Aser parmi les fils de Jacob! Qu''il soit agréable à ses frères et qu''il plonge son pied dans l''huile'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Dans l''huile: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: c'est-à-dire dans l'abondance.
      marker-yv: yv-n
    - type: text
      text: '! '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Que tes verrous soient en fer et en bronze et que ta vigueur dure autant que ta vie!
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: '»Personne ne peut se comparer au Dieu de Jeshurun. Il chevauche le ciel pour venir à ton aide, il chevauche avec majesté les nuages. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Le Dieu d''éternité est un refuge; sous ses bras éternels est un abri. Devant toi il a chassé l''ennemi et il a dit: ‘Extermine-le.’'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: '»Israël réside en sécurité, la source de Jacob est à part dans un pays de blé et de vin nouveau, et son ciel distille la rosée. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Que tu es heureux, Israël! Qui est, comme toi, un peuple sauvé par l'Eternel? Il est le bouclier qui te secourt, l'épée qui fait ta grandeur. Tes ennemis te flatteront et toi, tu piétineras leurs hauteurs.»
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: '»Oui, il aime les peuples. Tous ses saints sont dans ta main. Ils se sont tenus à tes pieds, ils ont reçu tes paroles. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Moïse nous a donné la loi, héritage de l''assemblée de Jacob. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Il était roi en Jeshurun
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Jeshurun: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'voir la note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '32.15'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' quand se rassemblaient les chefs du peuple et les tribus d''Israël.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: »Que Ruben vive et ne meure pas, et que ses hommes soient nombreux!»
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Voici ce qu''il dit sur Juda: «Ecoute, Eternel, la voix de Juda et ramène-le vers son peuple. Que ses mains soient puissantes et que tu le secoures contre ses ennemis!»'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Sur Lévi il dit: «Le thummim et l''urim ont été confiés à l''homme saint'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Al''homme saint: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: c'est-à-dire au grand-prêtre Aaron.
      marker-yv: yv-n
    - type: text
      text: ' que tu as provoqué à Massa et avec qui tu as contesté dans l''épisode des eaux de Meriba. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Lévi dit de son père et de sa mère: ‘Je ne les ai pas vus!’ Il ne reconnaît pas ses frères, il ne connaît pas ses enfants.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Il ne reconnaît pas… enfants: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: évoque l'entière consécration des Lévites à leur ministère.
      marker-yv: yv-n
    - type: text
      text: ' En effet, ils respectent ta parole et gardent ton alliance. '
