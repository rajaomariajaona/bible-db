document_id: DEU.33,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Bénédiction de Moïse
  - type: text
    content: 'Voici la bénédiction par laquelle Moïse, l''homme de Dieu, bénit les Israélites avant sa mort. '
  '10':
  - type: text
    content: 'Ils enseignent tes règles à Jacob et ta loi à Israël. Ils mettent l''encens sous tes narines et l''holocauste sur ton autel. '
  '11':
  - type: text
    content: Bénis sa force, Eternel! Accepte l'activité de ses mains! Brise les reins de ses adversaires et que ses ennemis ne se relèvent plus!»
  '12':
  - type: text
    content: 'Sur Benjamin il dit: «C''est le bien-aimé de l''Eternel, il habitera en sécurité auprès de lui. L''Eternel le couvrira toujours et résidera entre ses épaules.»'
  '13':
  - type: text
    content: 'Sur Joseph il dit: «Son pays recevra de l''Eternel, en signe de bénédiction, le meilleur don du ciel, la rosée, la meilleure eau qui est en bas, '
  '14':
  - type: text
    content: 'les meilleurs fruits du soleil, les meilleurs fruits de chaque mois, '
  '15':
  - type: text
    content: 'les meilleurs produits des montagnes anciennes, les meilleurs produits des collines éternelles, '
  '16':
  - type: text
    content: les meilleurs produits de la terre et de ce qu'elle contient.
  - type: text
    content: »Que la grâce de celui qui est apparu dans le buisson
  - type: note
    content: 'Celui… buisson: désignation de l''Eternel (voir Exode 3).'
  - type: text
    content: ' vienne sur la tête de Joseph, sur le crâne du prince consacré de ses frères! '
  '17':
  - type: text
    content: De son taureau premier-né il a la majesté. Ses cornes sont les cornes du buffle. Avec elles il frappera tous les peuples, jusqu'aux extrémités de la terre. Ce sont les dizaines de milliers d'Ephraïm, ce sont les milliers de Manassé.»
  '18':
  - type: text
    content: 'Sur Zabulon il dit: «Réjouis-toi, Zabulon, dans tes expéditions et toi, Issacar, dans tes tentes! '
  '19':
  - type: text
    content: Ils appelleront les peuples sur la montagne. Là, ils offriront des sacrifices de justice, car ils suceront l'abondance de la mer et les trésors cachés dans le sable.»
  '2':
  - type: text
    content: 'Il dit: «L''Eternel est venu du Sinaï, il s''est levé sur eux de Séir, il a resplendi des monts de Paran et il est sorti du milieu des saintes troupes, il leur a, de sa main droite, envoyé le feu de la loi.'
  '20':
  - type: text
    content: 'Sur Gad il dit: «Béni soit celui qui met Gad au large! Gad se couche comme une lionne, il déchire les pattes et la tête de sa victime. '
  '21':
  - type: text
    content: Il a eu droit au premier choix, car là est cachée la part du chef. Il a marché en tête du peuple, il a mis en œuvre la justice de l'Eternel et ses règles envers Israël.»
  '22':
  - type: text
    content: 'Sur Dan il dit: «Dan est un jeune lion qui s''élance du Basan.»'
  '23':
  - type: text
    content: 'Sur Nephthali il dit: «Nephthali, toi qui es rassasié de faveurs et comblé des bénédictions de l''Eternel, prends possession des régions situées à l''ouest et au sud!»'
  '24':
  - type: text
    content: 'Sur Aser il dit: «Béni soit Aser parmi les fils de Jacob! Qu''il soit agréable à ses frères et qu''il plonge son pied dans l''huile'
  - type: note
    content: 'Dans l''huile: c''est-à-dire dans l''abondance.'
  - type: text
    content: '! '
  '25':
  - type: text
    content: Que tes verrous soient en fer et en bronze et que ta vigueur dure autant que ta vie!
  '26':
  - type: text
    content: '»Personne ne peut se comparer au Dieu de Jeshurun. Il chevauche le ciel pour venir à ton aide, il chevauche avec majesté les nuages. '
  '27':
  - type: text
    content: 'Le Dieu d''éternité est un refuge; sous ses bras éternels est un abri. Devant toi il a chassé l''ennemi et il a dit: ‘Extermine-le.’'
  '28':
  - type: text
    content: '»Israël réside en sécurité, la source de Jacob est à part dans un pays de blé et de vin nouveau, et son ciel distille la rosée. '
  '29':
  - type: text
    content: Que tu es heureux, Israël! Qui est, comme toi, un peuple sauvé par l'Eternel? Il est le bouclier qui te secourt, l'épée qui fait ta grandeur. Tes ennemis te flatteront et toi, tu piétineras leurs hauteurs.»
  '3':
  - type: text
    content: '»Oui, il aime les peuples. Tous ses saints sont dans ta main. Ils se sont tenus à tes pieds, ils ont reçu tes paroles. '
  '4':
  - type: text
    content: 'Moïse nous a donné la loi, héritage de l''assemblée de Jacob. '
  '5':
  - type: text
    content: Il était roi en Jeshurun
  - type: note
    content: 'Jeshurun: voir la note 32.15.'
  - type: text
    content: ' quand se rassemblaient les chefs du peuple et les tribus d''Israël.'
  '6':
  - type: text
    content: »Que Ruben vive et ne meure pas, et que ses hommes soient nombreux!»
  '7':
  - type: text
    content: 'Voici ce qu''il dit sur Juda: «Ecoute, Eternel, la voix de Juda et ramène-le vers son peuple. Que ses mains soient puissantes et que tu le secoures contre ses ennemis!»'
  '8':
  - type: text
    content: 'Sur Lévi il dit: «Le thummim et l''urim ont été confiés à l''homme saint'
  - type: note
    content: 'Al''homme saint: c''est-à-dire au grand-prêtre Aaron.'
  - type: text
    content: ' que tu as provoqué à Massa et avec qui tu as contesté dans l''épisode des eaux de Meriba. '
  '9':
  - type: text
    content: 'Lévi dit de son père et de sa mère: ‘Je ne les ai pas vus!’ Il ne reconnaît pas ses frères, il ne connaît pas ses enfants.'
  - type: note
    content: 'Il ne reconnaît pas… enfants: évoque l''entière consécration des Lévites à leur ministère.'
  - type: text
    content: ' En effet, ils respectent ta parole et gardent ton alliance. '
