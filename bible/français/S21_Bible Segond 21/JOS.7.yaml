document_id: JOS.7
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Faute et punition d'Acan
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Les Israélites commirent un acte d''infidélité au sujet des biens voués à la destruction: Acan, fils de Carmi, petit-fils de Zabdi et descendant de Zérach, de la tribu de Juda, prit des biens ainsi consacrés, et la colère de l''Eternel s''enflamma contre les Israélites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'De Jéricho, Josué envoya des hommes vers Aï, qui est située près de Beth-Aven, à l''est de Béthel. Il leur dit: «Montez explorer le pays.» Ces hommes montèrent explorer Aï. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'De retour vers Josué, ils lui dirent: «Il est inutile de faire monter tout le peuple à l''attaque: 2000 ou 3000 hommes suffiront pour battre Aï. Ne donne pas cette fatigue à tout le peuple, car eux sont en petit nombre.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ainsi, 3000 hommes environ se mirent en marche, mais ils prirent la fuite devant les habitants d''Aï. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Les habitants d'Aï leur tuèrent environ 36 hommes. Ils les poursuivirent depuis la porte de la ville jusqu'à Shebarim et les battirent à la descente. Le peuple perdit courage, il se liquéfia.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Josué déchira ses vêtements et se prosterna jusqu''au soir, le visage contre terre, devant l''arche de l''Eternel. Il était avec les anciens d''Israël, et ils se couvrirent la tête de poussière. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Josué dit: «Ah! Seigneur Eternel, pourquoi as-tu fait passer le Jourdain à ce peuple? Est-ce pour nous livrer entre les mains des Amoréens et nous faire mourir? Si seulement nous avions su rester de l''autre côté du Jourdain! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'De grâce, Seigneur, que dirai-je maintenant qu''Israël a pris la fuite devant ses ennemis? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Les Cananéens et tous les habitants du pays l'apprendront. Ils nous encercleront et feront disparaître notre nom de la terre. Et que feras-tu pour ton grand nom?»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'L''Eternel dit à Josué: «Lève-toi! Pourquoi restes-tu ainsi prosterné? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Israël a péché. Ils ont violé mon alliance, celle que je leur ai prescrite; ils ont pris des biens voués à la destruction, ils les ont volés et ont menti, et ils les ont cachés parmi leurs affaires. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ainsi, les Israélites ne peuvent plus résister à leurs ennemis. Ils prendront la fuite devant eux, car ils sont sous une menace de destruction. Je ne serai plus avec vous si vous n''éliminez pas l''objet voué à la destruction du milieu de vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Lève-toi, consacre le peuple. Tu ordonneras: ‘Consacrez-vous pour demain, car voici ce que dit l''Eternel, le Dieu d''Israël: Il y a un objet voué à la destruction au milieu de toi, Israël. Tu ne pourras plus résister à tes ennemis, jusqu''à ce que vous l''ayez enlevé du milieu de vous.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Vous vous approcherez le matin par tribus et la tribu que désignera l''Eternel s''approchera clan par clan, le clan que désignera l''Eternel s''approchera famille par famille, puis la famille que désignera l''Eternel s''approchera homme par homme. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Celui qui sera désigné comme ayant pris des biens voués à la destruction sera brûlé au feu, lui et tout ce qui lui appartient, pour avoir violé l'alliance de l'Eternel et commis un acte odieux en Israël.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Josué se leva de bon matin. Il fit approcher Israël par tribus et la tribu de Juda fut désignée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il fit approcher les clans de Juda et le clan de Zérach fut désigné. Il fit approcher le clan de Zérach famille par famille et Zabdi fut désigné. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Il fit approcher la famille de Zabdi homme par homme et Acan, fils de Carmi, petit-fils de Zabdi et descendant de Zérach, de la tribu de Juda, fut désigné.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Josué dit à Acan: «Mon fils, donne gloire à l''Eternel, le Dieu d''Israël, et rends-lui hommage. Dis-moi donc ce que tu as fait, ne me le cache pas.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Acan répondit à Josué: «Il est vrai que j''ai péché contre l''Eternel, le Dieu d''Israël, et voici ce que j''ai fait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'J''ai vu dans le butin un beau manteau de Shinear, 200 pièces d''argent et un lingot d''or de près de 600 grammes. J''en ai eu envie et je les ai pris. Ils sont cachés dans la terre dans ma tente et l''argent est dessous.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Josué envoya des hommes qui coururent à la tente: les objets étaient bien cachés dans la tente d''Acan et l''argent était bien dessous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ils les prirent dans la tente, les apportèrent à Josué et à tous les Israélites et les déposèrent devant l'Eternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Josué et tout Israël avec lui prirent Acan, fils de Zérach, l''argent, le manteau, le lingot d''or, les fils et les filles d''Acan, ses bœufs, ses ânes, ses brebis, sa tente et tout ce qui lui appartenait. Ils les firent monter dans la vallée d''Acor. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Josué dit: «Pourquoi as-tu causé notre malheur? L''Eternel causera ton malheur aujourd''hui.» Et tout Israël lapida Acan. On les brûla au feu, on les lapida '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: et l'on éleva sur Acan un grand tas de pierres qui subsiste encore aujourd'hui. L'Eternel renonça alors à son ardente colère. C'est à cause de cet événement qu'on a appelé jusqu'à aujourd'hui cet endroit vallée d'Acor
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.26 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Acor: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mot qui, en hébreu, fait assonance avec causer le malheur (verset 25).
    marker-yv: yv-n
  - type: text
    text: .
