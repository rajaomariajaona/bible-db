document_id: GEN.4
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Caïn et Abel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Adam eut des relations conjugales avec sa femme Eve. Elle tomba enceinte et mit au monde Caïn. Elle dit: «J''ai donné vie à un homme avec l''aide de l''Eternel.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Elle mit encore au monde le frère de Caïn, Abel. Abel fut berger et Caïn fut cultivateur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Au bout de quelque temps, Caïn fit une offrande des produits de la terre à l''Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'De son côté, Abel en fit une des premiers-nés de son troupeau et de leur graisse. L''Eternel porta un regard favorable sur Abel et sur son offrande, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'mais pas sur Caïn et sur son offrande. Caïn fut très irrité et il arbora un air sombre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'L''Eternel dit à Caïn: «Pourquoi es-tu irrité et pourquoi arbores-tu un air sombre? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Certainement, si tu agis bien, tu te relèveras. Si en revanche tu agis mal, le péché est couché à la porte et ses désirs se portent vers toi, mais c'est à toi de dominer sur lui.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Cependant, Caïn dit à son frère Abel: «Allons dans les champs» et, alors qu''ils étaient dans les champs, il se jeta sur lui et le tua.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'L''Eternel dit à Caïn: «Où est ton frère Abel?» Il répondit: «Je ne sais pas. Suis-je le gardien de mon frère?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dieu dit alors: «Qu''as-tu fait? Le sang de ton frère crie de la terre jusqu''à moi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Désormais, tu es maudit, chassé loin du sol qui s''est entrouvert pour boire le sang de ton frère versé par ta main. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Quand tu cultiveras le sol, il ne te donnera plus toutes ses ressources. Tu seras errant et vagabond sur la terre.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Caïn dit à l''Eternel: «Ma peine est trop grande pour être supportée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Voici que tu me chasses aujourd''hui de cette terre. Je serai caché loin de toi, je serai errant et vagabond sur la terre, et toute personne qui me trouvera pourra me tuer.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'L''Eternel lui dit: «Si quelqu''un tue Caïn, Caïn sera vengé sept fois» et l''Eternel mit un signe sur Caïn afin que ceux qui le trouveraient ne le tuent pas.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Descendance de Caïn
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Caïn s'éloigna de l'Eternel et habita le pays de Nod, à l'est d'Eden.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Caïn eut des relations conjugales avec sa femme. Elle tomba enceinte et mit au monde Hénoc. Il construisit ensuite une ville à laquelle il donna le nom de son fils Hénoc. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Hénoc eut pour fils Irad, Irad eut Mehujaël, Mehujaël eut Metushaël et Metushaël eut Lémec.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Lémec prit deux femmes. L''une s''appelait Ada, l''autre Tsilla. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ada mit au monde Jabal. Il est l''ancêtre de ceux qui habitent sous des tentes et près des troupeaux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Le nom de son frère était Jubal. Il est l''ancêtre de tous ceux qui jouent de la harpe et du chalumeau. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: De son côté, Tsilla mit au monde Tubal-Caïn. Il forgeait tous les outils en bronze et en fer. La sœur de Tubal-Caïn était Naama.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Lémec dit à ses femmes: «Ada et Tsilla, écoutez-moi, femmes de Lémec, prêtez attention à ce que je dis! C''est que j''ai tué un homme pour ma blessure et un enfant pour ma contusion. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Si Caïn est vengé 7 fois, Lémec le sera 77 fois.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Adam eut encore des relations conjugales avec sa femme. Elle mit au monde un fils et l'appela Seth, car, dit-elle, «Dieu m'a donné un autre fils pour remplacer Abel que Caïn a tué.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Seth eut lui aussi un fils, et il l'appela Enosh. C'est alors que l'on commença à faire appel au nom de l'Eternel.
