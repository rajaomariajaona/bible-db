document_id: 2KI.14,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Règne d'Amatsia sur Juda
  - type: text
    content: 'La deuxième année du règne de Joas, le fils de Joachaz, sur Israël, Amatsia, fils de Joas, le roi de Juda, devint roi. '
  '10':
  - type: text
    content: 'Tu as battu les Edomites et ton cœur se remplit d''orgueil. Jouis de ta gloire et reste chez toi. Pourquoi t''engager dans une malheureuse entreprise qui amènerait ta ruine et celle de Juda?» '
  '11':
  - type: text
    content: 'Mais Amatsia ne l''écouta pas. Joas, le roi d''Israël, monta et ils s''affrontèrent, lui et Amatsia, le roi de Juda, à Beth-Shémesh, une ville qui appartenait à Juda. '
  '12':
  - type: text
    content: 'Juda fut battu par Israël et chacun s''enfuit dans sa tente. '
  '13':
  - type: text
    content: 'Joas, le roi d''Israël, captura Amatsia, le roi de Juda, le fils de Joas et petit-fils d''Achazia, à Beth-Shémesh. Il vint à Jérusalem et fit une brèche de 200 mètres dans la muraille de Jérusalem, depuis la porte d''Ephraïm jusqu''à la porte de l''angle. '
  '14':
  - type: text
    content: Il prit tout l'or et l'argent ainsi que tous les objets qui se trouvaient dans la maison de l'Eternel et dans les trésors du palais royal; il prit aussi des otages, puis il retourna à Samarie.
  '15':
  - type: text
    content: 'Le reste des actes de Joas, ce qu''il a accompli, ses exploits et la guerre qu''il a menée contre Amatsia, le roi de Juda, cela est décrit dans les annales des rois d''Israël. '
  '16':
  - type: text
    content: Joas se coucha avec ses ancêtres et il fut enterré à Samarie avec les rois d'Israël. Son fils Jéroboam devint roi à sa place.
  '17':
  - type: text
    content: Amatsia, fils de Joas, roi de Juda, vécut 15 ans après la mort de Joas, le fils de Joachaz et le roi d'Israël.
  '18':
  - type: text
    content: Le reste des actes d'Amatsia, cela est décrit dans les annales des rois de Juda.
  '19':
  - type: text
    content: 'On forma une conspiration contre lui à Jérusalem et il s''enfuit à Lakis, mais on le poursuivit là-bas et on l''y fit mourir. '
  '2':
  - type: text
    content: Il avait 25 ans lorsqu'il devint roi et il régna 29 ans à Jérusalem. Sa mère s'appelait Joaddan et elle était de Jérusalem.
  '20':
  - type: text
    content: 'On transporta son corps sur des chevaux et il fut enterré à Jérusalem avec ses ancêtres, dans la ville de David. '
  '21':
  - type: text
    content: 'Tout le peuple de Juda prit Azaria, âgé de 16 ans, et le proclama roi à la place de son père Amatsia. '
  '22':
  - type: text
    content: C'est lui qui reconstruisit Elath et la ramena sous l'autorité de Juda, une fois le roi couché avec ses ancêtres.
  - type: heading
    content: Règne de Jéroboam II sur Israël
  '23':
  - type: text
    content: La quinzième année du règne d'Amatsia, le fils de Joas, sur Juda, Jéroboam, fils de Joas, le roi d'Israël, devint roi à Samarie. Il régna 41 ans.
  '24':
  - type: text
    content: 'Il fit ce qui est mal aux yeux de l''Eternel, il ne se détourna d''aucun des péchés de Jéroboam, fils de Nebath, qui avait fait pécher Israël. '
  '25':
  - type: text
    content: 'Il rétablit les frontières d''Israël depuis l''entrée de Hamath jusqu''à la mer Morte, conformément à la parole que l''Eternel, le Dieu d''Israël, avait prononcée par son serviteur Jonas, le prophète, fils d''Amitthaï, de Gath-Hépher. '
  '26':
  - type: text
    content: 'En effet, l''Eternel avait vu que le malheur d''Israël était à son comble et qu''il n''y avait personne, ni esclave, ni homme libre, pour venir à son secours. '
  '27':
  - type: text
    content: Or l'Eternel n'avait pas parlé d'effacer le nom d'Israël de dessous le ciel, et il les délivra par l'intermédiaire de Jéroboam, le fils de Joas.
  '28':
  - type: text
    content: 'Le reste des actes de Jéroboam, tout ce qu''il a accompli, ses exploits au combat et la manière dont il a ramené sous l''autorité d''Israël Damas et Hamath, villes qui avaient appartenu à Juda, cela est décrit dans les annales des rois d''Israël. '
  '29':
  - type: text
    content: Jéroboam se coucha avec ses ancêtres, avec les rois d'Israël. Son fils Zacharie devint roi à sa place.
  '3':
  - type: text
    content: 'Il fit ce qui est droit aux yeux de l''Eternel, mais pas autant que son ancêtre David; il agit entièrement comme son père Joas. '
  '4':
  - type: text
    content: 'Toutefois, les hauts lieux ne disparurent pas; le peuple y offrait encore des sacrifices et des parfums. '
  '5':
  - type: text
    content: 'Lorsque la royauté fut bien solide entre ses mains, il exécuta ceux de ses serviteurs qui avaient tué le roi, son père. '
  '6':
  - type: text
    content: 'Cependant, il ne fit pas mourir les fils des meurtriers, conformément à ce qui est écrit dans le livre de la loi de Moïse, où l''Eternel donne ce commandement: «*On ne fera pas mourir les pères à la place des enfants, ni les enfants à la place des pères. On fera mourir chacun pour son péché.»'
  - type: note
    content: 'On ne fera… péché: citation de Deutéronome 24.16.'
  '7':
  - type: text
    content: Il battit 10'000 Edomites dans la vallée du sel, et durant cette guerre il prit Séla; il l'appela Joktheel, nom qu'elle a conservé jusqu'à aujourd'hui.
  '8':
  - type: text
    content: 'Alors Amatsia envoya des messagers à Joas, fils de Joachaz et petit-fils de Jéhu, le roi d''Israël, pour lui dire: «Viens, affrontons-nous!» '
  '9':
  - type: text
    content: 'Joas, le roi d''Israël, fit dire à Amatsia, le roi de Juda: «Le chardon du Liban envoya dire au cèdre du Liban: ‘Donne ta fille en mariage à mon fils!’ Mais les bêtes sauvages qui vivent au Liban passèrent et piétinèrent le chardon. '
