document_id: 2TH.2,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Retour du Seigneur
  - type: text
    content: 'En ce qui concerne le retour de notre Seigneur Jésus-Christ et notre rassemblement auprès de lui, nous vous le demandons, frères et sœurs: '
  '10':
  - type: text
    content: 'et avec toutes les séductions de l''injustice pour ceux qui périssent parce qu''ils n''ont pas accueilli l''amour de la vérité pour être sauvés. '
  '11':
  - type: text
    content: 'C''est pourquoi Dieu leur envoie une puissance d''égarement pour qu''ils croient au mensonge, '
  '12':
  - type: text
    content: afin que tous ceux qui n'ont pas cru à la vérité mais ont pris plaisir à l'injustice soient condamnés.
  - type: heading
    content: Appel à la fermeté, à la prière et au travail
  '13':
  - type: text
    content: 'Quant à nous, frères et sœurs bien-aimés du Seigneur, nous devons constamment dire à Dieu toute notre reconnaissance à votre sujet, parce que Dieu vous a choisis dès le commencement pour le salut par la sainteté que procure l''Esprit et par la foi en la vérité. '
  '14':
  - type: text
    content: 'C''est à cela qu''il vous a appelés par notre Evangile, pour que vous possédiez la gloire de notre Seigneur Jésus-Christ. '
  '15':
  - type: text
    content: 'Ainsi donc, frères et sœurs, tenez ferme et retenez les enseignements que nous vous avons transmis, soit oralement, soit par notre lettre. '
  '16':
  - type: text
    content: 'Que notre Seigneur Jésus-Christ lui-même et Dieu notre Père, qui nous a aimés et qui nous a donné par sa grâce une consolation éternelle et une bonne espérance, '
  '17':
  - type: text
    content: encouragent votre cœur et vous affermissent dans toute bonne œuvre et dans toute bonne parole!
  '2':
  - type: text
    content: 'ne vous laissez pas facilement ébranler dans votre bon sens ni troubler par une révélation, par une parole, ou par une lettre qui semblerait venir de nous, comme si le jour du Seigneur était déjà là. '
  '3':
  - type: text
    content: 'Que personne ne vous trompe d''aucune manière. En effet, il faut que l''apostasie arrive d''abord et qu''apparaisse l''homme de péché, le fils de la perdition, '
  '4':
  - type: text
    content: l'adversaire qui s'élève contre tout ce qu'on appelle Dieu ou qu'on adore; il va jusqu'à s'asseoir [comme Dieu] dans le temple de Dieu en se proclamant lui-même Dieu.
  '5':
  - type: text
    content: 'Ne vous rappelez-vous pas que je vous disais cela, lorsque j''étais encore chez vous? '
  '6':
  - type: text
    content: 'Et maintenant vous savez ce qui le retient, afin qu''il n''apparaisse que lorsque le moment sera venu pour lui. '
  '7':
  - type: text
    content: 'En effet, le mystère de l''impiété agit déjà. Il faut seulement que celui qui le retient encore ait disparu. '
  '8':
  - type: text
    content: 'Alors apparaîtra l''impie que le Seigneur [Jésus] détruira par le souffle de sa bouche et qu''il anéantira par la manifestation de son retour. '
  '9':
  - type: text
    content: 'La venue de cet impie se fera par la puissance de Satan, avec toutes sortes de miracles, de signes et de prodiges mensongers '
