document_id: LEV.27
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les vœux et les dîmes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L''Eternel dit à Moïse: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Transmets ces instructions aux Israélites: Lorsqu''on consacrera une personne à l''Eternel par un vœu, on le fera d''après ton estimation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Pour un homme de 20 à 60 ans, ton estimation sera de 50 pièces d''argent, d''après la valeur étalon du sanctuaire; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'si c''est une femme, ton estimation sera de 30 pièces. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Pour une personne de 5 à 20 ans, ton estimation sera de 20 pièces pour un garçon, et de 10 pièces pour une fille. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'D''un mois à 5 ans, ton estimation sera de 5 pièces d''argent pour un garçon, et de 3 pièces d''argent pour une fille. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Pour une personne de 60 ans et plus, ton estimation sera de 15 pièces pour un homme, et de 10 pièces pour une femme. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Si celui qui a fait le vœu est trop pauvre pour payer ton estimation, on le présentera au prêtre pour qu'il l'estime et le prêtre fera une estimation en rapport avec les moyens de cet homme.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '»S''il s''agit d''animaux qui peuvent être offerts en sacrifice à l''Eternel, tout animal qu''on donnera à l''Eternel sera saint. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'On ne l''échangera pas, on n''en mettra pas un mauvais à la place d''un bon ni un bon à la place d''un mauvais; si l''on remplace un animal par un autre, ils seront tous les deux saints. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'S''il s''agit d''animaux impurs qui ne peuvent être offerts en sacrifice à l''Eternel, on présentera l''animal au prêtre, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'qui en fera l''estimation en fonction de ses qualités et défauts, et l''on se conformera à l''estimation du prêtre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Si on veut le racheter, on ajoutera un cinquième à son estimation.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '»Si quelqu''un consacre sa maison comme une chose sainte pour l''Eternel, le prêtre en fera l''estimation en fonction de son état, bon ou mauvais, et l''on s''en tiendra à l''estimation du prêtre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Si celui qui a consacré sa maison veut la racheter, il ajoutera un cinquième au prix de son estimation et elle lui appartiendra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '»Si quelqu''un consacre à l''Eternel un champ de sa propriété, ton estimation sera en rapport avec la quantité de semence, 50 pièces d''argent pour 220 litres d''orge. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Si c''est dès l''année du jubilé qu''il consacre son champ, on s''en tiendra à ton estimation; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'si c''est après le jubilé qu''il consacre son champ, le prêtre en évaluera le prix en fonction du nombre d''années qui restent jusqu''au jubilé et on fera une réduction sur ton estimation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Si celui qui a consacré son champ veut le racheter, il ajoutera un cinquième au prix de ton estimation et le champ lui restera. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'S''il ne rachète pas le champ et qu''on le vende à un autre homme, il ne pourra plus être racheté. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Et quand l''acheteur en sortira lors du jubilé, ce champ sera consacré à l''Eternel comme un champ qui lui a été définitivement voué: il deviendra la propriété du prêtre.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: '»Si quelqu''un consacre à l''Eternel un champ qu''il a acquis et qui ne fait pas partie de sa propriété, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'le prêtre en évaluera le prix d''après ton estimation jusqu''à l''année du jubilé et cet homme paiera le jour même le prix fixé comme étant consacré à l''Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: L'année du jubilé, le champ retournera à la personne à qui on l'avait acheté et qui en avait la propriété.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: »Toutes tes estimations se feront en pièces du sanctuaire, en pièces de 10 grammes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: '»Personne ne pourra consacrer le premier-né de son bétail, car il appartient déjà à l''Eternel en tant que premier-né; qu''il s''agisse d''un veau ou d''un agneau, il appartient à l''Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: S'il s'agit d'un animal impur, on le rachètera au prix de ton estimation en y ajoutant un cinquième; s'il n'est pas racheté, on le vendra d'après ton estimation.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: '»Aucun des biens qu''un homme vouera de manière définitive à l''Eternel ne pourra être vendu ni racheté, qu''il s''agisse d''une personne, d''un animal ou d''un champ de sa propriété; tout ce qui lui sera voué de manière définitive sera très saint, propriété de l''Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Aucune personne vouée de manière définitive ne pourra être rachetée: on la mettra à mort.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: '»Toute dîme de la terre, soit des récoltes de la terre, soit du fruit des arbres, appartient à l''Eternel; c''est une chose consacrée à l''Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Si quelqu''un veut racheter quelque chose de sa dîme, il y ajoutera un cinquième. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Toute dîme de gros et de petit bétail, une bête sur dix de tout ce qui passe sous un bâton de berger, sera consacrée à l''Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: On n'examinera pas si l'animal est bon ou mauvais et l'on ne fera pas d'échange; si l'on remplace un animal par un autre, ils seront tous les deux saints et ne pourront pas être rachetés.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Tels sont les commandements que l'Eternel donna à Moïse pour les Israélites sur le mont Sinaï.
