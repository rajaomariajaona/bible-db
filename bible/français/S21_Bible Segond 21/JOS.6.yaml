document_id: JOS.6,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Jéricho était fermée, barricadée devant les Israélites. Personne n'en sortait et personne n'y entrait.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Josué avait donné cet ordre au peuple: «Vous ne crierez pas, vous ne ferez pas entendre votre voix et il ne sortira pas un mot de votre bouche jusqu''au jour où je vous dirai: ‘Poussez des cris!’ Alors vous pousserez des cris.» '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: L'arche de l'Eternel fit le tour de la ville. Elle fit une fois le tour, puis on rentra dans le camp et l'on y passa la nuit.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Josué se leva de bon matin et les prêtres portèrent l''arche de l''Eternel. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Les sept prêtres qui portaient les sept trompettes retentissantes devant l''arche de l''Eternel se mirent en marche et sonnèrent de la trompette. Les hommes équipés marchaient devant eux et l''arrière-garde suivait l''arche de l''Eternel. Pendant la marche, on sonnait de la trompette. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ils firent une fois le tour de la ville, le deuxième jour, puis ils retournèrent dans le camp. Ils agirent de même pendant six jours.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Le septième jour, ils se levèrent de bon matin, dès l''aurore, et ils firent de la même manière sept fois le tour de la ville. Ce fut le seul jour où ils firent sept fois le tour de la ville. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'La septième fois, comme les prêtres sonnaient de la trompette, Josué dit au peuple: «Poussez des cris, car l''Eternel vous a livré la ville! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'La ville sera vouée à l''Eternel, elle et tout ce qui s''y trouve. Mais on laissera la vie à Rahab la prostituée et à tous ceux qui seront avec elle dans sa maison, parce qu''elle a caché les messagers que nous avions envoyés. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Seulement, gardez-vous bien de toucher à ce qui sera voué à la destruction. En effet, si vous preniez de ce que vous aurez voué à la destruction, vous mettriez le camp d''Israël sous une menace de destruction et vous causeriez son malheur. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Tout l'argent et tout l'or, tous les objets en bronze et en fer seront consacrés à l'Eternel et entreront dans le trésor de l'Eternel.»
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'L''Eternel dit à Josué: «Regarde, je livre entre tes mains Jéricho et son roi, ainsi que ses vaillants soldats. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Le peuple poussa des cris et les prêtres sonnèrent de la trompette. Lorsque le peuple entendit le son de la trompette, il poussa de grands cris et la muraille s''écroula. Le peuple monta dans la ville, chacun devant soi. Ils s''emparèrent de la ville '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'et vouèrent à la destruction, en le passant au fil de l''épée, tout ce qui s''y trouvait: hommes et femmes, enfants et vieillards, jusqu''aux bœufs, aux brebis et aux ânes.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Josué dit aux deux hommes qui avaient exploré le pays: «Entrez dans la maison de la femme prostituée et faites-en sortir cette femme et tous les siens, comme vous le lui avez juré.» '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Les jeunes espions entrèrent chez Rahab et en firent sortir Rahab, son père, sa mère, ses frères et tous les siens. Ils firent sortir tous les membres de sa famille et les installèrent en lieu sûr, à l'extérieur du camp d'Israël.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ils brûlèrent la ville et tout ce qui s''y trouvait. Toutefois, ils mirent dans le trésor de la maison de l''Eternel l''argent, l''or et tous les objets en bronze et en fer. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Josué laissa la vie à Rahab la prostituée, à sa famille et à tous les siens. Elle a habité au milieu d'Israël jusqu'à aujourd'hui, parce qu'elle avait caché les messagers que Josué avait envoyés pour explorer Jéricho.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ce fut alors que Josué jura: «Maudit soit devant l''Eternel l''homme qui se lèvera pour reconstruire cette ville de Jéricho! Il en jettera les fondations au prix de son fils aîné et il en posera les portes au prix de son plus jeune fils.»'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: L'Eternel fut avec Josué et l'on parla de lui dans tout le pays.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Faites le tour de la ville, vous tous les hommes de guerre. Faites une fois le tour de la ville. Tu agiras ainsi pendant six jours. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Sept prêtres porteront sept trompettes retentissantes devant l''arche. Le septième jour, vous ferez sept fois le tour de la ville et les prêtres sonneront de la trompette. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Quand ils sonneront de la corne retentissante, quand vous entendrez le son de la trompette, tout le peuple poussera de grands cris. Alors la muraille de la ville s'écroulera et le peuple montera à l'attaque, chacun devant soi.»
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Josué, fils de Nun, appela les prêtres et leur dit: «Portez l''arche de l''alliance et que sept prêtres portent sept trompettes retentissantes devant l''arche de l''Eternel.» '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Puis il dit au peuple: «Marchez, faites le tour de la ville et que les hommes équipés passent devant l''arche de l''Eternel.»'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Lorsque Josué eut parlé au peuple, les sept prêtres qui portaient les sept trompettes retentissantes devant l''Eternel se mirent en marche et sonnèrent de la trompette. L''arche de l''alliance de l''Eternel allait à leur suite. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Les hommes équipés marchaient devant les prêtres qui sonnaient de la trompette et l''arrière-garde suivait l''arche. Pendant la marche, on sonnait de la trompette. '
