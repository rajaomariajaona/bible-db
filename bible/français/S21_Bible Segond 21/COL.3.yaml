document_id: COL.3,152
type_code: fra
verses:
  '1':
  - type: heading
    content: La vie nouvelle en Christ
  - type: text
    content: 'Si donc vous êtes ressuscités avec Christ, recherchez les choses d''en haut, où Christ est assis à la droite de Dieu. '
  '10':
  - type: text
    content: 'vous avez revêtu l''homme nouveau qui se renouvelle pour parvenir à la vraie connaissance, conformément à l''image de celui qui l''a créé. '
  '11':
  - type: text
    content: Il n'y a plus ni Juif ni non-Juif, ni circoncis ni incirconcis, ni étranger, ni sauvage, ni esclave ni homme libre, mais Christ est tout et en tous.
  '12':
  - type: text
    content: 'Ainsi donc, en tant qu''êtres choisis par Dieu, saints et bien-aimés, revêtez-vous de sentiments de compassion, de bonté, d''humilité, de douceur, de patience. '
  '13':
  - type: text
    content: 'Supportez-vous les uns les autres et, si l''un de vous a une raison de se plaindre d''un autre, pardonnez-vous réciproquement. Tout comme Christ vous a pardonné, pardonnez-vous aussi. '
  '14':
  - type: text
    content: 'Mais par-dessus tout cela, revêtez-vous de l''amour, qui est le lien de la perfection. '
  '15':
  - type: text
    content: Que la paix de Christ, à laquelle vous avez été appelés pour former un seul corps, règne dans votre cœur. Et soyez reconnaissants.
  '16':
  - type: text
    content: 'Que la parole de Christ habite en vous dans toute sa richesse! Instruisez-vous et avertissez-vous les uns les autres en toute sagesse par des psaumes, par des hymnes, par des cantiques spirituels, chantez pour le Seigneur de tout votre cœur sous l''inspiration de la grâce. '
  '17':
  - type: text
    content: Et quoi que vous fassiez, en parole ou en acte, faites tout au nom du Seigneur Jésus en exprimant par lui votre reconnaissance à Dieu le Père.
  - type: heading
    content: Les relations à la maison
  '18':
  - type: text
    content: 'Femmes, soumettez-vous à votre mari comme il convient dans le Seigneur. '
  '19':
  - type: text
    content: Maris, aimez votre femme et ne vous aigrissez pas contre elle.
  '2':
  - type: text
    content: 'Attachez-vous aux réalités d''en haut, et non à celles qui sont sur la terre. '
  '20':
  - type: text
    content: 'Enfants, obéissez en tout à vos parents, car cela est agréable au Seigneur. '
  '21':
  - type: text
    content: Pères, n'exaspérez pas vos enfants, de peur qu'ils ne se découragent.
  '22':
  - type: text
    content: 'Esclaves, obéissez en tout à vos maîtres terrestres, et pas seulement sous leurs yeux, comme le feraient des êtres désireux de plaire aux hommes, mais avec sincérité de cœur, dans la crainte de Dieu. '
  '23':
  - type: text
    content: 'Tout ce que vous faites, faites-le de tout votre cœur, comme pour le Seigneur et non pour des hommes, '
  '24':
  - type: text
    content: 'sachant que vous recevrez du Seigneur un héritage pour récompense. [En effet,] le Seigneur que vous servez, c''est Christ. '
  '25':
  - type: text
    content: Mais celui qui agit injustement recevra le salaire de son injustice, et il n'y a pas de favoritisme.
  '3':
  - type: text
    content: 'En effet, vous avez connu la mort et votre vie est cachée avec Christ en Dieu. '
  '4':
  - type: text
    content: Quand Christ, notre vie, apparaîtra, alors vous apparaîtrez aussi avec lui dans la gloire.
  '5':
  - type: text
    content: 'Faites donc mourir en vous ce qui est terrestre: l''immoralité sexuelle, l''impureté, les passions, les mauvais désirs et la soif de posséder, qui est une idolâtrie. '
  '6':
  - type: text
    content: 'C''est à cause de cela que la colère de Dieu vient [sur les hommes rebelles]. '
  '7':
  - type: text
    content: 'Vous aussi autrefois, lorsque vous viviez parmi eux, vous marchiez dans ces péchés. '
  '8':
  - type: text
    content: Mais maintenant, renoncez à tout cela, à la colère, à la fureur, à la méchanceté, à la calomnie, aux grossièretés qui pourraient sortir de votre bouche.
  - type: heading
    content: Les relations dans l'Eglise
  '9':
  - type: text
    content: 'Ne vous mentez pas les uns aux autres, car vous vous êtes dépouillés du vieil homme et de ses manières d''agir, '
