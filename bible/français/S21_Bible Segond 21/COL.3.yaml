document_id: COL.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La vie nouvelle en Christ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Si donc vous êtes ressuscités avec Christ, recherchez les choses d''en haut, où Christ est assis à la droite de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Attachez-vous aux réalités d''en haut, et non à celles qui sont sur la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'En effet, vous avez connu la mort et votre vie est cachée avec Christ en Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Quand Christ, notre vie, apparaîtra, alors vous apparaîtrez aussi avec lui dans la gloire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Faites donc mourir en vous ce qui est terrestre: l''immoralité sexuelle, l''impureté, les passions, les mauvais désirs et la soif de posséder, qui est une idolâtrie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'C''est à cause de cela que la colère de Dieu vient [sur les hommes rebelles]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Vous aussi autrefois, lorsque vous viviez parmi eux, vous marchiez dans ces péchés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mais maintenant, renoncez à tout cela, à la colère, à la fureur, à la méchanceté, à la calomnie, aux grossièretés qui pourraient sortir de votre bouche.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les relations dans l'Eglise
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ne vous mentez pas les uns aux autres, car vous vous êtes dépouillés du vieil homme et de ses manières d''agir, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'vous avez revêtu l''homme nouveau qui se renouvelle pour parvenir à la vraie connaissance, conformément à l''image de celui qui l''a créé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Il n'y a plus ni Juif ni non-Juif, ni circoncis ni incirconcis, ni étranger, ni sauvage, ni esclave ni homme libre, mais Christ est tout et en tous.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ainsi donc, en tant qu''êtres choisis par Dieu, saints et bien-aimés, revêtez-vous de sentiments de compassion, de bonté, d''humilité, de douceur, de patience. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Supportez-vous les uns les autres et, si l''un de vous a une raison de se plaindre d''un autre, pardonnez-vous réciproquement. Tout comme Christ vous a pardonné, pardonnez-vous aussi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Mais par-dessus tout cela, revêtez-vous de l''amour, qui est le lien de la perfection. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Que la paix de Christ, à laquelle vous avez été appelés pour former un seul corps, règne dans votre cœur. Et soyez reconnaissants.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Que la parole de Christ habite en vous dans toute sa richesse! Instruisez-vous et avertissez-vous les uns les autres en toute sagesse par des psaumes, par des hymnes, par des cantiques spirituels, chantez pour le Seigneur de tout votre cœur sous l''inspiration de la grâce. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Et quoi que vous fassiez, en parole ou en acte, faites tout au nom du Seigneur Jésus en exprimant par lui votre reconnaissance à Dieu le Père.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les relations à la maison
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Femmes, soumettez-vous à votre mari comme il convient dans le Seigneur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Maris, aimez votre femme et ne vous aigrissez pas contre elle.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Enfants, obéissez en tout à vos parents, car cela est agréable au Seigneur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Pères, n'exaspérez pas vos enfants, de peur qu'ils ne se découragent.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Esclaves, obéissez en tout à vos maîtres terrestres, et pas seulement sous leurs yeux, comme le feraient des êtres désireux de plaire aux hommes, mais avec sincérité de cœur, dans la crainte de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Tout ce que vous faites, faites-le de tout votre cœur, comme pour le Seigneur et non pour des hommes, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'sachant que vous recevrez du Seigneur un héritage pour récompense. [En effet,] le Seigneur que vous servez, c''est Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Mais celui qui agit injustement recevra le salaire de son injustice, et il n'y a pas de favoritisme.
