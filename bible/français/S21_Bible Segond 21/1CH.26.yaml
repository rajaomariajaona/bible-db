document_id: 1CH.26,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Portiers du temple et intendants
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici les classes des portiers. Pour les Koréites: Meshélémia, fils de Koré, un des descendants d''Asaph. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Parmi les fils de Merari, Hosa avait pour fils: Shimri, le chef, qui avait été désigné chef par son père alors qu''il n''était pas l''aîné, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hilkija le deuxième, Thebalia le troisième, Zacharie le quatrième. Les fils et les frères de Hosa étaient 13 au total. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C''est à ces classes de portiers, aux chefs de ces hommes et à leurs frères, que fut confiée la tâche de faire le service dans la maison de l''Eternel. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Petits et grands, ils tirèrent chaque porte au sort en fonction de leur famille.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le sort tomba sur Shélémia pour le côté est. On tira au sort pour son fils Zacharie, qui était un sage conseiller, et le côté nord lui fut attribué par le sort. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le côté sud fut attribué à Obed-Edom, et l''entrepôt à ses fils. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le côté ouest fut attribué à Shuppim et à Hosa, avec la porte Shalléketh, sur le chemin montant: les deux gardes se faisaient face. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il y avait 6 Lévites à l''est, au nord 4 par jour, au sud 4 par jour, et 4 aux entrepôts, à deux endroits différents; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: pour l'annexe située à l'ouest, il y en avait 4 vers le chemin, 2 vers l'annexe.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Voilà quelles étaient les classes des portiers, parmi les descendants des Koréites et de Merari.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de Meshélémia: Zacharie l''aîné, Jediaël le deuxième, Zebadia le troisième, Jathniel le quatrième, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'D''autres Lévites, parmi lesquels Achija, étaient responsables des trésors de la maison de Dieu et des trésors des choses saintes. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Parmi les descendants de Laedan, qui étaient issus des Guershonites par Laedan et qui étaient chefs de famille de Laedan le Guershonite, c''étaient Jehiéli '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et ses fils, Zétham et son frère Joël, qui étaient chargés des trésors de la maison de l''Eternel. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Parmi les Amramites, les Jitseharites, les Hébronites et les Uziélites, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'c''était Shebuel, un descendant de Guershom, le fils de Moïse, qui était le chef des trésors. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les membres de sa parenté issus d''Eliézer étaient le fils de celui-ci, Rechabia, lui-même père d''Esaïe, père de Joram, père de Zicri, père de Shelomith. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C''étaient ce Shelomith et ses frères qui étaient responsables de tous les trésors des choses saintes qu''avaient consacrées le roi David, les chefs de famille, les chefs de milliers et de centaines et les chefs de l''armée. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C''était sur le butin pris à la guerre qu''ils les avaient consacrées pour l''entretien de la maison de l''Eternel. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tout ce qui avait été consacré par Samuel, le voyant, par Saül, fils de Kis, par Abner, fils de Ner, par Joab, fils de Tseruja, et par qui que ce soit était sous la responsabilité de Shelomith et de ses frères.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Magistrats et surveillants en Israël
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Parmi les Jitseharites, Kenania et ses frères étaient employés pour les affaires extérieures au temple comme officiers et juges d''Israël. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elam le cinquième, Jochanan le sixième, Eljoénaï le septième. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Parmi les Hébronites, Hashabia et ses frères, soit 1700 hommes vaillants, étaient chargés de surveiller la région d''Israël située de l''autre côté du Jourdain, à l''ouest, pour toutes les affaires de l''Eternel et pour le service du roi. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En ce qui concerne les Hébronites, Jerija était leur chef, d''après sa généalogie paternelle. La quarantième année du règne de David, on les rechercha et l''on trouva parmi eux de vaillants hommes à Jaezer en Galaad. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les membres de la parenté de Jerija, des hommes vaillants, comptaient 2700 chefs de famille. Le roi David les établit responsables des Rubénites, des Gadites et de la demi-tribu de Manassé pour toutes les affaires de Dieu et pour celles du roi.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quant à Obed-Edom, il eut pour fils: Shemaeja l''aîné, Jozabad le deuxième, Joach le troisième, Sacar le quatrième, Nathanaël le cinquième, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ammiel le sixième, Issacar le septième, Peulthaï le huitième. En effet, Dieu l''avait béni. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Son fils Shemaeja eut des fils qui occupèrent des positions dominantes dans leur famille, car ils étaient de vaillants guerriers. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici les fils de Shemaeja: Othni, Rephaël, Obed, Elzabad et ses frères Elihu et Semaeja, qui étaient des hommes vaillants. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tous ceux-là étaient des descendants d''Obed-Edom. Eux, leurs fils et leurs pères étaient des hommes pleins de vigueur et de force pour le service. Ils étaient 62 pour Obed-Edom. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les fils et les frères de Meshélémia, des hommes vaillants, étaient au nombre de 18. '
