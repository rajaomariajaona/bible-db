document_id: LUK.16,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Parabole de l'intendant infidèle
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus dit aussi à ses disciples: «Un homme riche avait un intendant. On vint lui rapporter qu''il gaspillait ses biens. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Celui qui est fidèle dans les petites choses l''est aussi dans les grandes, et celui qui est malhonnête dans les petites choses l''est aussi dans les grandes. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si donc vous n''avez pas été fidèles dans les richesses injustes, qui vous confiera les biens véritables? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et si vous n''avez pas été fidèles dans ce qui est à autrui, qui vous donnera ce qui est à vous? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aucun serviteur ne peut servir deux maîtres, car ou il détestera le premier et aimera le second, ou il s'attachera au premier et méprisera le second. Vous ne pouvez pas servir Dieu et l'argent
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'L''argent: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: littéralement mamon, transcription d'un mot araméen désignant la richesse, personnifiée comme une divinité.
      marker-yv: yv-n
    - type: text
      text: .»
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En entendant tout cela, les pharisiens qui aimaient l''argent se moquaient de lui. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus leur dit: «Vous, vous cherchez à paraître justes devant les hommes, mais Dieu connaît votre cœur. De fait, ce qui est très estimé parmi les hommes est abominable devant Dieu. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La loi et les prophètes ont subsisté jusqu''à Jean; depuis lors, la bonne nouvelle du royaume de Dieu est annoncée et chacun cherche avec force à y entrer. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le ciel et la terre disparaîtront plus facilement que ne tombera un seul trait de lettre de la loi. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tout homme qui renvoie sa femme et en épouse une autre commet un adultère, et tout homme qui épouse une femme divorcée de son mari commet un adultère.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Histoire de l'homme riche et du pauvre Lazare
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Il y avait un homme riche, qui s''habillait de pourpre et de fin lin et qui chaque jour menait joyeuse et brillante vie. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il l''appela et lui dit: ‘Qu''est-ce que j''entends dire à ton sujet? Rends compte de ta gestion, car tu ne pourras plus gérer mes biens.’ '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un pauvre du nom de Lazare était couché devant son portail, couvert d''ulcères. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il aurait bien voulu se rassasier des miettes qui tombaient de la table du riche, cependant même les chiens venaient lécher ses ulcères. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le pauvre mourut et fut porté par les anges auprès d''Abraham. Le riche mourut aussi et fut enterré. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dans le séjour des morts, en proie à une grande souffrance il leva les yeux et vit de loin Abraham, avec Lazare à ses côtés. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il s''écria: ‘Père Abraham, aie pitié de moi et envoie Lazare pour qu''il trempe le bout de son doigt dans l''eau afin de me rafraîchir la langue, car je souffre cruellement dans cette flamme.’ '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abraham répondit: ‘Mon enfant, souviens-toi que tu as reçu tes biens pendant ta vie et que Lazare a connu les maux pendant la sienne; maintenant, il est consolé ici et toi, tu souffres. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De plus, il y a un grand abîme entre nous et vous, afin que ceux qui voudraient passer d''ici vers vous, ou de chez vous vers nous, ne puissent pas le faire.’ '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le riche dit: ‘Je te prie alors, père, d''envoyer Lazare chez mon père, car j''ai cinq frères. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C''est pour qu''il les avertisse, afin qu''ils n''aboutissent pas, eux aussi, dans ce lieu de souffrances.’ '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abraham [lui] répondit: ‘Ils ont Moïse et les prophètes, qu''ils les écoutent.’ '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''intendant se dit en lui-même: ‘Que vais-je faire, puisque mon maître m''enlève la gestion de ses biens? Travailler la terre? Je n''en ai pas la force. Mendier? J''en ai honte. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le riche dit: ‘Non, père Abraham, mais si quelqu''un vient de chez les morts vers eux, ils changeront d''attitude.’ '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abraham lui dit alors: ‘S''ils n''écoutent pas Moïse et les prophètes, ils ne se laisseront pas persuader, même si quelqu''un ressuscite.’»'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je sais ce que je ferai pour qu''il y ait des gens qui m''accueillent chez eux quand je serai renvoyé de mon emploi.’ '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il fit venir chacun des débiteurs de son maître et dit au premier: ‘Combien dois-tu à mon maître?’ '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘Je dois 100 tonneaux d''huile d''olive’, répondit-il. Il lui dit: ‘Voici ton reçu, assieds-toi vite et écris 50.’ '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il dit ensuite à un autre: ‘Et toi, combien dois-tu?’ ‘Je dois 100 mesures de blé’, répondit-il. Et il lui dit: ‘Voici ton reçu, écris 80.’ '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le maître fit l'éloge de l'intendant malhonnête à cause de l'habileté dont il avait fait preuve. En effet, les enfants de ce monde sont plus habiles vis-à-vis de leur génération que ne le sont les enfants de la lumière.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Et moi, je vous dis: Faites-vous des amis avec les richesses injustes, afin qu''ils vous accueillent dans les habitations éternelles lorsqu''elles viendront à vous manquer. '
