document_id: ACT.4
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Arrestation de Pierre et de Jean
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Pierre et Jean parlaient encore au peuple quand survinrent les prêtres, le commandant des gardes du temple et les sadducéens
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Sadducéens: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: membres d'un courant du judaïsme souvent associé aux prêtres et à l'aristocratie.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ils étaient excédés parce que les apôtres enseignaient le peuple et annonçaient la résurrection des morts dans la personne de Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ils les arrêtèrent et, comme c''était déjà le soir, ils les mirent en prison jusqu''au lendemain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Cependant, beaucoup de ceux qui avaient entendu la parole crurent, ce qui porta le nombre des hommes à 5000 environ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Le lendemain, les chefs du peuple, les anciens et les spécialistes de la loi se rassemblèrent à Jérusalem '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'avec le grand-prêtre Anne, Caïphe, Jean, Alexandre et tous ceux qui étaient de la famille du grand-prêtre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ils firent comparaître Pierre et Jean au milieu d''eux et leur demandèrent: «Par quelle puissance ou quel nom avez-vous fait cela?»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Alors Pierre, rempli du Saint-Esprit, leur dit: «Chefs du peuple et anciens [d''Israël], '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'on nous interroge aujourd''hui sur un bienfait accordé à un infirme, afin que nous disions comment il a été guéri. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Sachez-le bien, vous tous, et que tout le peuple d''Israël le sache: c''est par le nom de Jésus-Christ de Nazareth, celui que vous avez crucifié et que Dieu a ressuscité, oui, c''est par lui que cet homme se présente en pleine santé devant vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Jésus est '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: la pierre rejetée par vous qui construisez et qui est devenue la pierre angulaire
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'La pierre rejetée… angulaire: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation du '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psaume 118.22
      metadata:
        usfm: PSA.118.22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Il n'y a de salut en aucun autre, car il n'y a sous le ciel aucun autre nom qui ait été donné parmi les hommes, par lequel nous devions être sauvés.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Lorsqu''ils virent l''assurance de Pierre et de Jean, ils furent étonnés, car ils savaient que c''étaient des hommes du peuple sans instruction et ils les reconnaissaient pour avoir été avec Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Mais comme ils voyaient debout avec eux l''homme qui avait été guéri, ils n''avaient rien à répliquer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ils leur ordonnèrent de sortir du sanhédrin
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Sanhédrin: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nom donné au conseil juif, présidé par le grand-prêtre, qui faisait office de gouvernement et de tribunal pour les affaires qui n'étaient pas du ressort des Romains.
    marker-yv: yv-n
  - type: text
    text: ', puis ils délibérèrent entre eux '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'en disant: «Que faire à ces hommes? En effet, ils ont accompli un signe miraculeux évident, c''est clair pour tous les habitants de Jérusalem et nous ne pouvons pas le nier. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Mais, afin que cela ne se propage pas davantage parmi le peuple, défendons-leur avec menaces de parler désormais à qui que ce soit en ce nom-là.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Alors ils les appelèrent et leur interdirent absolument de parler ou d''enseigner au nom de Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Pierre et Jean leur répondirent: «Est-il juste, devant Dieu, de vous écouter, vous, plutôt que Dieu? Jugez-en vous-mêmes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Quant à nous, nous ne pouvons pas ne pas annoncer ce que nous avons vu et entendu.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Les chefs du peuple leur firent de nouvelles menaces et les relâchèrent. A cause du peuple, ils ne trouvaient pas le moyen de les punir, parce que tous attribuaient à Dieu la gloire de ce qui était arrivé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: En effet, l'homme qui avait bénéficié de cette guérison miraculeuse était âgé de plus de 40 ans.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Une fois relâchés, Pierre et Jean allèrent trouver les leurs et racontèrent tout ce que les chefs des prêtres et les anciens leur avaient dit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Après les avoir écoutés, ils s''adressèrent tous ensemble à Dieu en disant: «Maître, tu es le Dieu qui'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: as créé le ciel, la terre, la mer et tout ce qui s'y trouve
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.24 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'As créé… trouve: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: présentation de Dieu tirée d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Exode 20.11
      metadata:
        usfm: EXO.20.11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ou du '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psaume 146.6
      metadata:
        usfm: PSA.146.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'c''est toi qui as dit [par le Saint-Esprit,] par la bouche de [notre père,] ton serviteur David: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Pourquoi cette agitation parmi les nations et ces préoccupations dépourvues de sens parmi les peuples?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Les rois de la terre se sont soulevés et les chefs se sont ligués ensemble contre le Seigneur et contre celui qu'il a désigné par onction.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.25-26 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Pourquoi… onction: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation du '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psaume 2.1-2
      metadata:
        usfm: PSA.2.1+PSA.2.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Il est bien vrai qu''Hérode et Ponce Pilate se sont ligués [dans cette ville] avec les nations et les peuples d''Israël contre ton saint serviteur Jésus, que tu as consacré par onction; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'ils ont accompli tout ce que ta main et ta volonté avaient décidé d''avance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Et maintenant, Seigneur, sois attentif à leurs menaces et donne à tes serviteurs d''annoncer ta parole avec une pleine assurance, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: déploie ta puissance pour qu'il se produise des guérisons, des signes miraculeux et des prodiges par le nom de ton saint serviteur Jésus!»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Quand ils eurent prié, l'endroit où ils étaient rassemblés trembla; ils furent tous remplis du Saint-Esprit et ils annonçaient la parole de Dieu avec assurance.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Solidarité des croyants
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'La foule de ceux qui avaient cru n''était qu''un cœur et qu''une âme. Personne ne disait que ses biens lui appartenaient en propre, mais ils mettaient tout en commun. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Avec beaucoup de puissance, les apôtres rendaient témoignage de la résurrection du Seigneur Jésus, et une grande grâce reposait sur eux tous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Il n''y avait aucun nécessiteux parmi eux: tous ceux qui possédaient des champs ou des maisons les vendaient, apportaient le prix de ce qu''ils avaient vendu '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: et le déposaient aux pieds des apôtres; et l'on faisait des distributions à chacun en fonction de ses besoins.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Joseph – celui que les apôtres surnommaient Barnabas, ce qui signifie «fils d''encouragement» –, un Lévite originaire de Chypre, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: vendit un champ qu'il possédait, apporta l'argent et le déposa aux pieds des apôtres.
