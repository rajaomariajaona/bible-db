document_id: ACT.4,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Arrestation de Pierre et de Jean
  - type: text
    content: Pierre et Jean parlaient encore au peuple quand survinrent les prêtres, le commandant des gardes du temple et les sadducéens
  - type: note
    content: 'Sadducéens: membres d''un courant du judaïsme souvent associé aux prêtres et à l''aristocratie.'
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Sachez-le bien, vous tous, et que tout le peuple d''Israël le sache: c''est par le nom de Jésus-Christ de Nazareth, celui que vous avez crucifié et que Dieu a ressuscité, oui, c''est par lui que cet homme se présente en pleine santé devant vous. '
  '11':
  - type: text
    content: 'Jésus est '
  - type: text
    content: la pierre rejetée par vous qui construisez et qui est devenue la pierre angulaire
  - type: text
    content: .
  - type: note
    content: 'La pierre rejetée… angulaire: citation du Psaume 118.22.'
  - type: text
    content: ' '
  '12':
  - type: text
    content: Il n'y a de salut en aucun autre, car il n'y a sous le ciel aucun autre nom qui ait été donné parmi les hommes, par lequel nous devions être sauvés.»
  '13':
  - type: text
    content: 'Lorsqu''ils virent l''assurance de Pierre et de Jean, ils furent étonnés, car ils savaient que c''étaient des hommes du peuple sans instruction et ils les reconnaissaient pour avoir été avec Jésus. '
  '14':
  - type: text
    content: 'Mais comme ils voyaient debout avec eux l''homme qui avait été guéri, ils n''avaient rien à répliquer. '
  '15':
  - type: text
    content: Ils leur ordonnèrent de sortir du sanhédrin
  - type: note
    content: 'Sanhédrin: nom donné au conseil juif, présidé par le grand-prêtre, qui faisait office de gouvernement et de tribunal pour les affaires qui n''étaient pas du ressort des Romains.'
  - type: text
    content: ', puis ils délibérèrent entre eux '
  '16':
  - type: text
    content: 'en disant: «Que faire à ces hommes? En effet, ils ont accompli un signe miraculeux évident, c''est clair pour tous les habitants de Jérusalem et nous ne pouvons pas le nier. '
  '17':
  - type: text
    content: 'Mais, afin que cela ne se propage pas davantage parmi le peuple, défendons-leur avec menaces de parler désormais à qui que ce soit en ce nom-là.» '
  '18':
  - type: text
    content: 'Alors ils les appelèrent et leur interdirent absolument de parler ou d''enseigner au nom de Jésus. '
  '19':
  - type: text
    content: 'Pierre et Jean leur répondirent: «Est-il juste, devant Dieu, de vous écouter, vous, plutôt que Dieu? Jugez-en vous-mêmes. '
  '2':
  - type: text
    content: 'Ils étaient excédés parce que les apôtres enseignaient le peuple et annonçaient la résurrection des morts dans la personne de Jésus. '
  '20':
  - type: text
    content: 'Quant à nous, nous ne pouvons pas ne pas annoncer ce que nous avons vu et entendu.» '
  '21':
  - type: text
    content: 'Les chefs du peuple leur firent de nouvelles menaces et les relâchèrent. A cause du peuple, ils ne trouvaient pas le moyen de les punir, parce que tous attribuaient à Dieu la gloire de ce qui était arrivé. '
  '22':
  - type: text
    content: En effet, l'homme qui avait bénéficié de cette guérison miraculeuse était âgé de plus de 40 ans.
  '23':
  - type: text
    content: 'Une fois relâchés, Pierre et Jean allèrent trouver les leurs et racontèrent tout ce que les chefs des prêtres et les anciens leur avaient dit. '
  '24':
  - type: text
    content: 'Après les avoir écoutés, ils s''adressèrent tous ensemble à Dieu en disant: «Maître, tu es le Dieu qui'
  - type: text
    content: as créé le ciel, la terre, la mer et tout ce qui s'y trouve
  - type: note
    content: 'As créé… trouve: présentation de Dieu tirée d''Exode 20.11 ou du Psaume 146.6.'
  - type: text
    content: ', '
  '25':
  - type: text
    content: 'c''est toi qui as dit [par le Saint-Esprit,] par la bouche de [notre père,] ton serviteur David: '
  - type: text
    content: Pourquoi cette agitation parmi les nations et ces préoccupations dépourvues de sens parmi les peuples?
  - type: text
    content: ' '
  '26':
  - type: text
    content: Les rois de la terre se sont soulevés et les chefs se sont ligués ensemble contre le Seigneur et contre celui qu'il a désigné par onction.
  - type: note
    content: 'Pourquoi… onction: citation du Psaume 2.1-2.'
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'Il est bien vrai qu''Hérode et Ponce Pilate se sont ligués [dans cette ville] avec les nations et les peuples d''Israël contre ton saint serviteur Jésus, que tu as consacré par onction; '
  '28':
  - type: text
    content: 'ils ont accompli tout ce que ta main et ta volonté avaient décidé d''avance. '
  '29':
  - type: text
    content: 'Et maintenant, Seigneur, sois attentif à leurs menaces et donne à tes serviteurs d''annoncer ta parole avec une pleine assurance, '
  '3':
  - type: text
    content: 'Ils les arrêtèrent et, comme c''était déjà le soir, ils les mirent en prison jusqu''au lendemain. '
  '30':
  - type: text
    content: déploie ta puissance pour qu'il se produise des guérisons, des signes miraculeux et des prodiges par le nom de ton saint serviteur Jésus!»
  '31':
  - type: text
    content: Quand ils eurent prié, l'endroit où ils étaient rassemblés trembla; ils furent tous remplis du Saint-Esprit et ils annonçaient la parole de Dieu avec assurance.
  - type: heading
    content: Solidarité des croyants
  '32':
  - type: text
    content: 'La foule de ceux qui avaient cru n''était qu''un cœur et qu''une âme. Personne ne disait que ses biens lui appartenaient en propre, mais ils mettaient tout en commun. '
  '33':
  - type: text
    content: 'Avec beaucoup de puissance, les apôtres rendaient témoignage de la résurrection du Seigneur Jésus, et une grande grâce reposait sur eux tous. '
  '34':
  - type: text
    content: 'Il n''y avait aucun nécessiteux parmi eux: tous ceux qui possédaient des champs ou des maisons les vendaient, apportaient le prix de ce qu''ils avaient vendu '
  '35':
  - type: text
    content: et le déposaient aux pieds des apôtres; et l'on faisait des distributions à chacun en fonction de ses besoins.
  '36':
  - type: text
    content: 'Joseph – celui que les apôtres surnommaient Barnabas, ce qui signifie «fils d''encouragement» –, un Lévite originaire de Chypre, '
  '37':
  - type: text
    content: vendit un champ qu'il possédait, apporta l'argent et le déposa aux pieds des apôtres.
  '4':
  - type: text
    content: Cependant, beaucoup de ceux qui avaient entendu la parole crurent, ce qui porta le nombre des hommes à 5000 environ.
  '5':
  - type: text
    content: 'Le lendemain, les chefs du peuple, les anciens et les spécialistes de la loi se rassemblèrent à Jérusalem '
  '6':
  - type: text
    content: 'avec le grand-prêtre Anne, Caïphe, Jean, Alexandre et tous ceux qui étaient de la famille du grand-prêtre. '
  '7':
  - type: text
    content: 'Ils firent comparaître Pierre et Jean au milieu d''eux et leur demandèrent: «Par quelle puissance ou quel nom avez-vous fait cela?»'
  '8':
  - type: text
    content: 'Alors Pierre, rempli du Saint-Esprit, leur dit: «Chefs du peuple et anciens [d''Israël], '
  '9':
  - type: text
    content: 'on nous interroge aujourd''hui sur un bienfait accordé à un infirme, afin que nous disions comment il a été guéri. '
