document_id: ISA.56,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici ce que dit l''Eternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Respectez le droit et pratiquez la justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car mon salut est sur le point d'arriver,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ma justice est prête à se révéler.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses guetteurs sont tous aveugles, incompétents.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ne sont tous que des chiens muets, incapables d'aboyer.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils rêvent couchés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tant ils aiment sommeiller.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourtant, ce sont aussi des chiens voraces, insatiables.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce sont des bergers incompétents en matière de discernement.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous suivent leur propre voie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: chacun sans exception à la recherche de son profit.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ils disent: «Venez, je vais chercher du vin'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et nous boirons des liqueurs fortes!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous ferons la même chose demain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il en reste encore beaucoup!»
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Heureux l'homme qui adopte ce comportement
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le fils de l'homme qui y reste fermement attaché,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui respecte le sabbat au lieu de le violer
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et veille sur ses actes pour ne commettre aucun mal!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Que l''étranger qui s''attache à l''Eternel ne dise pas:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «L'Eternel me séparera certainement de son peuple!»
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et que l''eunuque ne dise pas:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Je ne suis qu'un arbre sec!»
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'En effet, voici ce que dit l''Eternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si des eunuques respectent mes sabbats,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: choisissent de faire ce qui me plaît
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et restent attachés à mon alliance,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je leur donnerai dans mon temple et à l'intérieur de mes murailles une place et un nom
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui vaudront mieux, pour eux, que des fils et des filles.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, je leur donnerai un nom éternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui ne disparaîtra jamais.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quant aux étrangers qui s'attacheront à l'Eternel pour lui rendre un culte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour aimer son nom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour être ses serviteurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous ceux qui respecteront le sabbat au lieu de le violer
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui resteront attachés à mon alliance,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je les amènerai sur ma montagne sainte
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je les réjouirai dans ma maison de prière.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leurs holocaustes et leurs sacrifices seront acceptés sur mon autel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car *mon temple sera appelé une maison de prière
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '56.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Mon temple… prière: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité par Jésus à ses contemporains en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matthieu 21.13
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Marc 11.17
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luc 19.46
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' pour tous les peuples.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Déclaration du Seigneur, de l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'de celui qui rassemble les exilés d''Israël:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J'en rassemblerai d'autres en les ajoutant à lui, aux siens déjà rassemblés.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Reproches aux chefs et aux idolâtres
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous toutes, bêtes sauvages,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: venez manger, vous toutes, bêtes de la forêt!
