document_id: ISA.56,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Voici ce que dit l''Eternel:'
  - type: text
    content: Respectez le droit et pratiquez la justice,
  - type: text
    content: car mon salut est sur le point d'arriver,
  - type: text
    content: et ma justice est prête à se révéler.
  '10':
  - type: text
    content: Ses guetteurs sont tous aveugles, incompétents.
  - type: text
    content: Ils ne sont tous que des chiens muets, incapables d'aboyer.
  - type: text
    content: Ils rêvent couchés,
  - type: text
    content: tant ils aiment sommeiller.
  '11':
  - type: text
    content: Pourtant, ce sont aussi des chiens voraces, insatiables.
  - type: text
    content: Ce sont des bergers incompétents en matière de discernement.
  - type: text
    content: Tous suivent leur propre voie,
  - type: text
    content: chacun sans exception à la recherche de son profit.
  '12':
  - type: text
    content: 'Ils disent: «Venez, je vais chercher du vin'
  - type: text
    content: et nous boirons des liqueurs fortes!
  - type: text
    content: Nous ferons la même chose demain,
  - type: text
    content: il en reste encore beaucoup!»
  '2':
  - type: text
    content: Heureux l'homme qui adopte ce comportement
  - type: text
    content: et le fils de l'homme qui y reste fermement attaché,
  - type: text
    content: qui respecte le sabbat au lieu de le violer
  - type: text
    content: et veille sur ses actes pour ne commettre aucun mal!
  '3':
  - type: text
    content: 'Que l''étranger qui s''attache à l''Eternel ne dise pas:'
  - type: text
    content: «L'Eternel me séparera certainement de son peuple!»
  - type: text
    content: 'et que l''eunuque ne dise pas:'
  - type: text
    content: «Je ne suis qu'un arbre sec!»
  '4':
  - type: text
    content: 'En effet, voici ce que dit l''Eternel:'
  - type: text
    content: Si des eunuques respectent mes sabbats,
  - type: text
    content: choisissent de faire ce qui me plaît
  - type: text
    content: et restent attachés à mon alliance,
  '5':
  - type: text
    content: je leur donnerai dans mon temple et à l'intérieur de mes murailles une place et un nom
  - type: text
    content: qui vaudront mieux, pour eux, que des fils et des filles.
  - type: text
    content: En effet, je leur donnerai un nom éternel
  - type: text
    content: qui ne disparaîtra jamais.
  '6':
  - type: text
    content: Quant aux étrangers qui s'attacheront à l'Eternel pour lui rendre un culte,
  - type: text
    content: pour aimer son nom,
  - type: text
    content: pour être ses serviteurs,
  - type: text
    content: tous ceux qui respecteront le sabbat au lieu de le violer
  - type: text
    content: et qui resteront attachés à mon alliance,
  '7':
  - type: text
    content: je les amènerai sur ma montagne sainte
  - type: text
    content: et je les réjouirai dans ma maison de prière.
  - type: text
    content: Leurs holocaustes et leurs sacrifices seront acceptés sur mon autel,
  - type: text
    content: car *mon temple sera appelé une maison de prière
  - type: note
    content: 'Mon temple… prière: cité par Jésus à ses contemporains en Matthieu 21.13; Marc 11.17; Luc 19.46.'
  - type: text
    content: ' pour tous les peuples.'
  '8':
  - type: text
    content: Déclaration du Seigneur, de l'Eternel,
  - type: text
    content: 'de celui qui rassemble les exilés d''Israël:'
  - type: text
    content: J'en rassemblerai d'autres en les ajoutant à lui, aux siens déjà rassemblés.
  - type: heading
    content: Reproches aux chefs et aux idolâtres
  '9':
  - type: text
    content: Vous toutes, bêtes sauvages,
  - type: text
    content: venez manger, vous toutes, bêtes de la forêt!
