document_id: EZK.38,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Gog, instrument du jugement d'Israël
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La parole de l''Eternel m''a été adressée: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Voici ce que dit le Seigneur, l''Eternel: Ce jour-là, des pensées surgiront dans ton cœur et tu formeras des projets funestes. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu diras: ‘Je vais attaquer un pays sans protection, fondre sur des hommes tranquilles qui habitent en toute sécurité, tous installés dans des endroits dépourvus de murailles, de verrous et de portes. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: J'emporterai un butin et me livrerai au pillage, je porterai la main sur des ruines de nouveau habitées et sur un peuple rassemblé du milieu des nations, qui a des troupeaux et des possessions et qui habite le centre de la terre.’
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Séba et Dedan, les marchands de Tarsis et tous leurs jeunes lions te diront: ‘Viens-tu pour emporter un butin? Est-ce pour te livrer au pillage que tu as formé ta coalition, afin d''emporter de l''argent et de l''or, afin de prendre des troupeaux et des possessions et d''en retirer un grand butin?’'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»C''est pourquoi, prophétise, fils de l''homme! Tu annonceras à Gog: ‘Voici ce que dit le Seigneur, l''Eternel: Oui, le jour où mon peuple, Israël, vivra en sécurité, tu le sauras. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors tu partiras de chez toi, de l''extrême nord, accompagné de nombreux peuples, tous montés sur des chevaux et formant une grande coalition, une armée puissante. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tu attaqueras mon peuple, Israël, pareil à un nuage prêt à couvrir le pays. Cela se produira dans l'avenir. Je te ferai venir contre mon pays afin que les nations me reconnaissent, quand je manifesterai ma sainteté à travers toi sous leurs yeux, Gog!’
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Voici ce que dit le Seigneur, l''Eternel: N''es-tu pas celui dont j''ai parlé, dans le passé, par l''intermédiaire de mes serviteurs les prophètes d''Israël? A cette époque-là, pendant des années ils ont prophétisé que je te ferais venir contre eux. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce jour-là, le jour où Gog arrivera sur le territoire d''Israël, déclare le Seigneur, l''Eternel, la colère me montera au nez. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je le déclare dans ma jalousie et dans le feu de ma fureur, ce jour-là il y aura un grand tremblement sur le territoire d''Israël. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Fils de l''homme, tourne ton visage vers Gog, du pays de Magog, vers le prince de Rosh, de Méshec et de Tubal, et prophétise contre lui! '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les poissons de la mer, les oiseaux du ciel, les bêtes des champs, tous les reptiles qui rampent sur la terre et tous les hommes qui vivent à la surface de la terre trembleront devant moi. Les montagnes seront renversées, les falaises s''écrouleront et toutes les murailles tomberont par terre. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je déclencherai une guerre contre Gog sur toutes mes montagnes, déclare le Seigneur, l''Eternel. Ils s''entretueront en retournant leurs armes les uns contre les autres. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J''exécuterai mes jugements contre lui par la peste et par le sang, par une pluie torrentielle et par des grêlons. Je ferai pleuvoir le feu et le soufre sur lui, sur ses troupes et sur les nombreux peuples qui l''accompagneront. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ainsi, je manifesterai ma grandeur et ma sainteté et je me ferai connaître aux yeux de beaucoup de nations. Elles reconnaîtront alors que je suis l'Eternel.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu annonceras:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»‘Voici ce que dit le Seigneur, l''Eternel: Je m''en prends à toi, Gog, prince de Rosh, de Méshec et de Tubal! '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je t''entraînerai, je mettrai un crochet à tes mâchoires. Je te ferai sortir, toi et toute ton armée, chevaux et cavaliers, tous habillés magnifiquement, assemblée nombreuse portant le grand et le petit boucliers, maniant tous l''épée. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ceux de Perse, d''Ethiopie et de Puth les accompagneront, portant tous le bouclier et le casque. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je ferai sortir Gomer et toutes ses troupes, la communauté de Togarma à l'extrême nord et toutes ses troupes, ces peuples nombreux qui t'accompagneront.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Prépare-toi, tiens-toi prêt, toi et toute la coalition rassemblée à tes côtés! Tu seras leur protecteur. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après de nombreux jours, tu seras chargé d''une mission. Dans l''avenir, tu t''avanceras contre un pays rétabli des blessures de la guerre, dont les habitants revenus de nombreux peuples ont été rassemblés sur les montagnes d''Israël longtemps restées en ruine. Retirés des divers peuples, ces habitants habiteront tous en sécurité. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tu monteras, tu t'avanceras comme une tempête, tu seras pareil à un nuage prêt à couvrir le pays, avec toutes tes troupes et les nombreux peuples qui t'accompagneront.’
