document_id: ISA.22,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Prophétie sur Jérusalem
  - type: text
    content: Message sur la vallée de la vision.
  - type: text
    content: Qu'as-tu donc pour monter avec tout ton peuple sur les toits?
  '10':
  - type: text
    content: Vous comptez les maisons de Jérusalem
  - type: text
    content: et vous en démolissez pour fortifier la muraille.
  '11':
  - type: text
    content: Vous construisez un bassin entre les deux murailles pour l'eau de l'ancien réservoir.
  - type: text
    content: Mais vous ne tournez pas les regards vers l'auteur de tout cela,
  - type: text
    content: vous ne voyez pas celui qui le prépare depuis longtemps.
  '12':
  - type: text
    content: Le Seigneur, l'Eternel, le maître de l'univers, vous appelle aujourd'hui
  - type: text
    content: à pleurer et à vous lamenter,
  - type: text
    content: à vous raser la tête et à vous habiller d'un sac,
  '13':
  - type: text
    content: et voici de la gaieté et de la joie!
  - type: text
    content: On abat des bœufs et l'on tue des brebis,
  - type: text
    content: 'on mange de la viande et l''on boit du vin:'
  - type: text
    content: '*«Mangeons et buvons, puisque demain nous mourrons!»'
  - type: note
    content: 'Mangeons et… mourrons: proverbe cité en 1 Corinthiens 15.32.'
  - type: text
    content: ' dit-on.'
  '14':
  - type: text
    content: 'L''Eternel, le maître de l''univers, me l''a révélé:'
  - type: text
    content: «Non, cette faute ne vous sera pas pardonnée, jusqu'à votre mort.»
  - type: text
    content: C'est le Seigneur, l'Eternel, le maître de l'univers, qui le dit.
  '15':
  - type: text
    content: 'Voici ce que dit le Seigneur, l''Eternel, le maître de l''univers:'
  - type: text
    content: «Va trouver le dignitaire
  - type: text
    content: 'qu''est Shebna, le responsable du palais, et dis-lui:'
  '16':
  - type: text
    content: ‘Que possèdes-tu ici et qui t'appartient ici
  - type: text
    content: pour que tu y creuses un tombeau?’
  - type: text
    content: On se creuse un tombeau sur la hauteur,
  - type: text
    content: on se taille une habitation dans la roche!
  '17':
  - type: text
    content: L'Eternel va te lancer d'un jet vigoureux,
  - type: text
    content: t'envelopper soigneusement
  '18':
  - type: text
    content: et te faire rouler en te lançant comme une balle
  - type: text
    content: sur un vaste territoire.
  - type: text
    content: C'est là que tu mourras, là que se retrouveront tes glorieux chars,
  - type: text
    content: toi qui fais la honte de la maison de ton maître!
  '19':
  - type: text
    content: Je te chasserai de ton poste,
  - type: text
    content: l'Eternel t'arrachera de ta situation.
  '2':
  - type: text
    content: Ville tapageuse, pleine de vacarme,
  - type: text
    content: ville joyeuse, tes morts ne seront pas victimes de l'épée,
  - type: text
    content: ils ne mourront pas en combattant.
  '20':
  - type: text
    content: »Ce jour-là,
  - type: text
    content: j'appellerai mon serviteur Eliakim, le fils de Hilkija.
  '21':
  - type: text
    content: Je lui ferai enfiler ta tenue, je lui mettrai ta ceinture
  - type: text
    content: et je remettrai ton pouvoir entre ses mains.
  - type: text
    content: Il sera un père pour les habitants de Jérusalem
  - type: text
    content: et pour la communauté de Juda.
  '22':
  - type: text
    content: 'Je mettrai sur son épaule la clé de la maison de David:'
  - type: text
    content: quand il ouvrira, personne ne pourra fermer,
  - type: text
    content: et quand il fermera, personne ne pourra ouvrir.
  '23':
  - type: text
    content: Je l'enfoncerai comme un piquet dans un endroit solide
  - type: text
    content: et il sera un trône de gloire pour sa famille.
  '24':
  - type: text
    content: On suspendra sur lui tout le poids de la maison de son père,
  - type: text
    content: les branches et les rameaux,
  - type: text
    content: tous les petits ustensiles,
  - type: text
    content: les bassines comme les vases.
  '25':
  - type: text
    content: Ce jour-là, déclare l'Eternel, le maître de l'univers,
  - type: text
    content: le piquet enfoncé dans un endroit solide sera enlevé,
  - type: text
    content: il sera cassé et tombera, et le fardeau qui était sur lui sera retiré.
  - type: text
    content: Oui, l'Eternel l'a décrété.»
  '3':
  - type: text
    content: Tous tes chefs prennent la fuite ensemble,
  - type: text
    content: ils sont faits prisonniers par les archers.
  - type: text
    content: Tous ceux qu'on trouve sont faits prisonniers
  - type: text
    content: pendant qu'ils s'enfuient au loin.
  '4':
  - type: text
    content: 'Voilà pourquoi je dis: «Détournez le regard de moi,'
  - type: text
    content: laissez-moi pleurer amèrement,
  - type: text
    content: ne vous empressez pas de me consoler
  - type: text
    content: de la dévastation qui frappe la fille de mon peuple!
  '5':
  - type: text
    content: En effet, c'est un jour d'angoisse, d'écrasement et de honte
  - type: text
    content: envoyé par le Seigneur, l'Eternel, le maître de l'univers,
  - type: text
    content: dans la vallée de la vision.»
  - type: text
    content: Une muraille est abattue
  - type: text
    content: et les cris de détresse s'élèvent vers la montagne.
  '6':
  - type: text
    content: Elam porte le carquois
  - type: text
    content: sur des chars, des attelages,
  - type: text
    content: Kir sort le bouclier.
  '7':
  - type: text
    content: Tes plus belles vallées sont remplies de chars
  - type: text
    content: et les cavaliers se rangent en ordre de bataille à tes portes.
  '8':
  - type: text
    content: Les dernières défenses de Juda sont forcées,
  - type: text
    content: et ce jour-là tu tournes les regards vers l'arsenal de la maison de la forêt.
  '9':
  - type: text
    content: Vous constatez les nombreuses brèches faites aux remparts de la ville de David
  - type: text
    content: et vous emmagasinez l'eau dans le réservoir inférieur.
