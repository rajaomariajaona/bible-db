document_id: ISA.22
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prophétie sur Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Message sur la vallée de la vision.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu'as-tu donc pour monter avec tout ton peuple sur les toits?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ville tapageuse, pleine de vacarme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ville joyeuse, tes morts ne seront pas victimes de l'épée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils ne mourront pas en combattant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tous tes chefs prennent la fuite ensemble,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils sont faits prisonniers par les archers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous ceux qu'on trouve sont faits prisonniers
- type: usfm
  marker: q1
  children:
  - type: text
    text: pendant qu'ils s'enfuient au loin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Voilà pourquoi je dis: «Détournez le regard de moi,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: laissez-moi pleurer amèrement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne vous empressez pas de me consoler
- type: usfm
  marker: q1
  children:
  - type: text
    text: de la dévastation qui frappe la fille de mon peuple!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: En effet, c'est un jour d'angoisse, d'écrasement et de honte
- type: usfm
  marker: q1
  children:
  - type: text
    text: envoyé par le Seigneur, l'Eternel, le maître de l'univers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans la vallée de la vision.»
- type: usfm
  marker: q1
  children:
  - type: text
    text: Une muraille est abattue
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les cris de détresse s'élèvent vers la montagne.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Elam porte le carquois
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur des chars, des attelages,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kir sort le bouclier.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tes plus belles vallées sont remplies de chars
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les cavaliers se rangent en ordre de bataille à tes portes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Les dernières défenses de Juda sont forcées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ce jour-là tu tournes les regards vers l'arsenal de la maison de la forêt.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Vous constatez les nombreuses brèches faites aux remparts de la ville de David
- type: usfm
  marker: q1
  children:
  - type: text
    text: et vous emmagasinez l'eau dans le réservoir inférieur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Vous comptez les maisons de Jérusalem
- type: usfm
  marker: q1
  children:
  - type: text
    text: et vous en démolissez pour fortifier la muraille.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Vous construisez un bassin entre les deux murailles pour l'eau de l'ancien réservoir.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais vous ne tournez pas les regards vers l'auteur de tout cela,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous ne voyez pas celui qui le prépare depuis longtemps.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Le Seigneur, l'Eternel, le maître de l'univers, vous appelle aujourd'hui
- type: usfm
  marker: q1
  children:
  - type: text
    text: à pleurer et à vous lamenter,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à vous raser la tête et à vous habiller d'un sac,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: et voici de la gaieté et de la joie!
- type: usfm
  marker: q1
  children:
  - type: text
    text: On abat des bœufs et l'on tue des brebis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'on mange de la viande et l''on boit du vin:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '*«Mangeons et buvons, puisque demain nous mourrons!»'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Mangeons et… mourrons: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'proverbe cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Corinthiens 15.32
      metadata:
        usfm: 1CO.15.32
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' dit-on.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'L''Eternel, le maître de l''univers, me l''a révélé:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Non, cette faute ne vous sera pas pardonnée, jusqu'à votre mort.»
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est le Seigneur, l'Eternel, le maître de l'univers, qui le dit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Voici ce que dit le Seigneur, l''Eternel, le maître de l''univers:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Va trouver le dignitaire
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'qu''est Shebna, le responsable du palais, et dis-lui:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ‘Que possèdes-tu ici et qui t'appartient ici
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour que tu y creuses un tombeau?’
- type: usfm
  marker: q1
  children:
  - type: text
    text: On se creuse un tombeau sur la hauteur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: on se taille une habitation dans la roche!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: L'Eternel va te lancer d'un jet vigoureux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: t'envelopper soigneusement
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: et te faire rouler en te lançant comme une balle
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur un vaste territoire.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est là que tu mourras, là que se retrouveront tes glorieux chars,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toi qui fais la honte de la maison de ton maître!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Je te chasserai de ton poste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'Eternel t'arrachera de ta situation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: »Ce jour-là,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j'appellerai mon serviteur Eliakim, le fils de Hilkija.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Je lui ferai enfiler ta tenue, je lui mettrai ta ceinture
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je remettrai ton pouvoir entre ses mains.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il sera un père pour les habitants de Jérusalem
- type: usfm
  marker: q1
  children:
  - type: text
    text: et pour la communauté de Juda.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Je mettrai sur son épaule la clé de la maison de David:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand il ouvrira, personne ne pourra fermer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et quand il fermera, personne ne pourra ouvrir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Je l'enfoncerai comme un piquet dans un endroit solide
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il sera un trône de gloire pour sa famille.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: On suspendra sur lui tout le poids de la maison de son père,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les branches et les rameaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous les petits ustensiles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les bassines comme les vases.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ce jour-là, déclare l'Eternel, le maître de l'univers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le piquet enfoncé dans un endroit solide sera enlevé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il sera cassé et tombera, et le fardeau qui était sur lui sera retiré.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, l'Eternel l'a décrété.»
