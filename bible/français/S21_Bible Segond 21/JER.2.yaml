document_id: JER.2,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Reproches à la population de Juda
  - type: text
    content: 'La parole de l''Eternel m''a été adressée:'
  '10':
  - type: text
    content: Allez jusqu'aux îles de Kittim et regardez!
  - type: text
    content: Envoyez quelqu'un à Kédar, observez bien
  - type: text
    content: et regardez s'il est arrivé quelque chose de semblable!
  '11':
  - type: text
    content: Une nation a-t-elle déjà changé de dieux,
  - type: text
    content: alors même que ce ne sont pas de vrais dieux?
  - type: text
    content: Pourtant, mon peuple a échangé ce qui faisait sa gloire contre ce qui n'a aucune valeur!
  '12':
  - type: text
    content: »Ciel, sois-en consterné,
  - type: text
    content: sois-en horrifié, atterré! déclare l'Eternel.
  '13':
  - type: text
    content: 'En effet, c''est un double mal que mon peuple a commis:'
  - type: text
    content: ils m'ont abandonné, moi qui suis une source d'eau vive,
  - type: text
    content: pour se creuser des citernes, des citernes fissurées
  - type: text
    content: qui ne retiennent pas l'eau.
  '14':
  - type: text
    content: »Israël est-il un esclave acheté ou né dans la maison?
  - type: text
    content: Pourquoi est-il donc livré au pillage?
  '15':
  - type: text
    content: Contre lui les lionceaux rugissent, poussent leurs cris,
  - type: text
    content: et ils dévastent son pays;
  - type: text
    content: ses villes sont brûlées, il n'y a plus d'habitants.
  '16':
  - type: text
    content: »Même les enfants de Memphis et de Tachpanès
  - type: text
    content: te brouteront le sommet de la tête.
  '17':
  - type: text
    content: Cela ne t'arrive-t-il pas
  - type: text
    content: parce que tu as abandonné l'Eternel, ton Dieu,
  - type: text
    content: lorsqu'il te guidait sur le chemin?
  '18':
  - type: text
    content: Et maintenant, pourquoi prendrais-tu le chemin de l'Egypte
  - type: text
    content: pour boire l'eau du Nil?
  - type: text
    content: Pourquoi prendrais-tu le chemin de l'Assyrie
  - type: text
    content: pour boire l'eau de l'Euphrate?
  '19':
  - type: text
    content: »Ta méchanceté te punira et ton infidélité te jugera.
  - type: text
    content: Sache et constate que c'est mal et que c'est source d'amertume
  - type: text
    content: d'abandonner l'Eternel, ton Dieu,
  - type: text
    content: et de n'avoir aucun respect pour moi,
  - type: text
    content: déclare le Seigneur, l'Eternel, le maître de l'univers.
  '2':
  - type: text
    content: '«Va crier aux oreilles de Jérusalem:'
  - type: text
    content: '‘Voici ce que dit l''Eternel:'
  - type: text
    content: Je me souviens de ton attachement de jeune fille,
  - type: text
    content: de ton amour de jeune mariée.
  - type: text
    content: Tu me suivais alors dans le désert,
  - type: text
    content: sur une terre impossible à ensemencer.
  '20':
  - type: text
    content: »Depuis longtemps tu t'es révoltée contre l'autorité exercée sur toi,
  - type: text
    content: tu as arraché tes liens
  - type: text
    content: 'et tu as dit: ‘Je ne veux plus être en esclavage!’'
  - type: text
    content: Pourtant, sur toute colline élevée et sous tout arbre vert
  - type: text
    content: tu t'es vautrée comme une prostituée.
  '21':
  - type: text
    content: »Moi, je t'avais plantée pour produire des raisins excellents,
  - type: text
    content: d'une variété sûre.
  - type: text
    content: Comment t'es-tu transformée à mes yeux
  - type: text
    content: en fruits dégénérés d'une vigne étrangère?
  '22':
  - type: text
    content: Même si tu te lavais avec du nitrate,
  - type: text
    content: même si tu employais beaucoup de savon,
  - type: text
    content: ta faute resterait marquée devant moi,
  - type: text
    content: déclare le Seigneur, l'Eternel.
  '23':
  - type: text
    content: '»Comment pourrais-tu affirmer: ‘Je ne me suis pas rendue impure,'
  - type: text
    content: je n'ai pas suivi les Baals’?
  - type: text
    content: Regarde le chemin que tu suis dans la vallée,
  - type: text
    content: reconnais ce que tu as fait,
  - type: text
    content: chamelle légère qui parcours ton chemin dans tous les sens!
  '24':
  - type: text
    content: C'est une ânesse sauvage, habituée au désert,
  - type: text
    content: en chaleur, toute haletante à cause de son désir.
  - type: text
    content: Qui la détournera de ce qu'elle recherche?
  - type: text
    content: 'Tous ceux qui la cherchent n''ont pas à se fatiguer:'
  - type: text
    content: ils la trouvent pendant qu'elle est en chaleur.
  '25':
  - type: text
    content: Arrête-toi avant de finir pieds nus,
  - type: text
    content: avant que ton gosier ne se dessèche!
  - type: text
    content: 'Mais tu dis: ‘Rien à faire, non!'
  - type: text
    content: J'aime les étrangers et je veux courir après eux.’
  '26':
  - type: text
    content: »Tout comme un voleur est dans la honte lorsqu'il est surpris,
  - type: text
    content: la communauté d'Israël sera couverte de honte,
  - type: text
    content: eux, leurs rois, leurs chefs,
  - type: text
    content: leurs prêtres et leurs prophètes.
  '27':
  - type: text
    content: 'Ils disent au bois: ‘Tu es mon père!’'
  - type: text
    content: 'et à la pierre: ‘Tu m''as donné la vie!’'
  - type: text
    content: Oui, ils m'ont tourné le dos, ils ne me regardent plus en face
  - type: text
    content: 'et, quand ils sont dans le malheur, ils disent:'
  - type: text
    content: ‘Lève-toi, sauve-nous!’
  '28':
  - type: text
    content: Où sont donc tes dieux, ceux que tu t'es faits?
  - type: text
    content: Qu'ils se lèvent, s'ils peuvent te sauver lorsque tu es dans le malheur!
  - type: text
    content: Oui, tu as autant de dieux que de villes, Juda!
  '29':
  - type: text
    content: »Pourquoi plaidez-vous contre moi?
  - type: text
    content: Vous tous, vous vous êtes révoltés contre moi, déclare l'Eternel.
  '3':
  - type: text
    content: Israël était consacré à l'Eternel,
  - type: text
    content: il était la première partie de sa récolte.
  - type: text
    content: Tous ceux qui en mangeaient se rendaient coupables,
  - type: text
    content: le malheur fondait sur eux, déclare l'Eternel.’
  '30':
  - type: text
    content: 'C''est bien inutilement que j''ai frappé vos enfants:'
  - type: text
    content: ils n'ont pas voulu tenir compte de la correction.
  - type: text
    content: Votre épée a dévoré vos prophètes,
  - type: text
    content: pareille à un lion destructeur.
  '31':
  - type: text
    content: »Hommes d'aujourd'hui, considérez la parole de l'Eternel!
  - type: text
    content: Ai-je été pour Israël un désert
  - type: text
    content: ou un pays de ténèbres?
  - type: text
    content: 'Pourquoi mon peuple dit-il: ‘Nous allons où nous voulons,'
  - type: text
    content: nous ne viendrons plus vers toi’?
  '32':
  - type: text
    content: La jeune fille oublie-t-elle ses bijoux,
  - type: text
    content: ou la fiancée sa parure?
  - type: text
    content: Pourtant, mon peuple m'a oublié
  - type: text
    content: depuis un nombre de jours incalculable.
  '33':
  - type: text
    content: »Comme tu traces bien ton chemin pour chercher l'amour!
  - type: text
    content: C'est en commettant le mal que tu as appris tes voies.
  '34':
  - type: text
    content: Jusque sur les pans de ton habit se trouve
  - type: text
    content: le sang de pauvres innocents
  - type: text
    content: que tu ne peux accuser d'avoir commis une effraction.
  '35':
  - type: text
    content: 'Malgré cela, tu dis: ‘Oui, je suis innocente, certainement que sa colère s''est détournée de moi!’'
  - type: text
    content: »Je vais te juger sur ce que tu as dit, je vais contester avec toi
  - type: text
    content: 'parce que tu dis: ‘Je n''ai pas commis de péché.’'
  '36':
  - type: text
    content: Comme tu te conduis mal, à changer ton chemin!
  - type: text
    content: C'est de l'Egypte que viendra ta honte,
  - type: text
    content: comme elle est venue de l'Assyrie.
  '37':
  - type: text
    content: De là aussi tu sortiras les mains sur la tête,
  - type: text
    content: car l'Eternel rejette ceux en qui tu te confies,
  - type: text
    content: et ce n'est pas avec eux que tu réussiras.
  '4':
  - type: text
    content: »Ecoutez la parole de l'Eternel, famille de Jacob,
  - type: text
    content: et vous tous, clans de la communauté d'Israël!
  '5':
  - type: text
    content: 'Voici ce que dit l''Eternel:'
  - type: text
    content: Quelle injustice vos ancêtres ont-ils trouvée en moi
  - type: text
    content: pour s'éloigner de moi
  - type: text
    content: et suivre des idoles sans consistance au point de perdre eux-mêmes toute consistance?
  '6':
  - type: text
    content: 'Ils n''ont pas dit: ‘Où est l''Eternel'
  - type: text
    content: qui nous a fait sortir d'Egypte,
  - type: text
    content: qui nous a conduits dans le désert,
  - type: text
    content: sur une terre aride et pleine de ravins,
  - type: text
    content: sur une terre où règnent la sécheresse et l'ombre de la mort,
  - type: text
    content: sur une terre par où personne ne passe
  - type: text
    content: et où n'habite aucun homme?’
  '7':
  - type: text
    content: »Je vous ai fait entrer dans un pays fertile
  - type: text
    content: pour que vous mangiez les fruits et les bons produits qui s'y trouvent,
  - type: text
    content: mais vous êtes venus et vous avez rendu mon pays impur,
  - type: text
    content: vous avez fait de mon héritage une horreur.
  '8':
  - type: text
    content: 'Les prêtres n''ont pas dit:'
  - type: text
    content: ‘Où est l'Eternel?’
  - type: text
    content: Les spécialistes de la loi ne m'ont pas connu,
  - type: text
    content: les bergers se sont révoltés contre moi,
  - type: text
    content: les prophètes ont prophétisé au nom de Baal
  - type: note
    content: 'Baal: nom de la principale divinité des Phéniciens et des Cananéens ainsi que des Moabites, devenu le titre de plusieurs divinités du paganisme antique.'
  - type: text
    content: et ils ont couru après ce qui ne sert à rien.
  '9':
  - type: text
    content: »C'est pourquoi je veux encore lancer des accusations contre vous, déclare l'Eternel,
  - type: text
    content: je veux aussi en lancer contre vos descendants.
