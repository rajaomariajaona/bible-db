document_id: JER.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Reproches à la population de Juda
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La parole de l''Eternel m''a été adressée:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Va crier aux oreilles de Jérusalem:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '‘Voici ce que dit l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je me souviens de ton attachement de jeune fille,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de ton amour de jeune mariée.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu me suivais alors dans le désert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur une terre impossible à ensemencer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Israël était consacré à l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il était la première partie de sa récolte.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous ceux qui en mangeaient se rendaient coupables,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le malheur fondait sur eux, déclare l'Eternel.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: »Ecoutez la parole de l'Eternel, famille de Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et vous tous, clans de la communauté d'Israël!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Voici ce que dit l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quelle injustice vos ancêtres ont-ils trouvée en moi
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour s'éloigner de moi
- type: usfm
  marker: q1
  children:
  - type: text
    text: et suivre des idoles sans consistance au point de perdre eux-mêmes toute consistance?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ils n''ont pas dit: ‘Où est l''Eternel'
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui nous a fait sortir d'Egypte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui nous a conduits dans le désert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur une terre aride et pleine de ravins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur une terre où règnent la sécheresse et l'ombre de la mort,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur une terre par où personne ne passe
- type: usfm
  marker: q1
  children:
  - type: text
    text: et où n'habite aucun homme?’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: »Je vous ai fait entrer dans un pays fertile
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour que vous mangiez les fruits et les bons produits qui s'y trouvent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais vous êtes venus et vous avez rendu mon pays impur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous avez fait de mon héritage une horreur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Les prêtres n''ont pas dit:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Où est l'Eternel?’
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les spécialistes de la loi ne m'ont pas connu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les bergers se sont révoltés contre moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les prophètes ont prophétisé au nom de Baal
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Baal: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nom de la principale divinité des Phéniciens et des Cananéens ainsi que des Moabites, devenu le titre de plusieurs divinités du paganisme antique.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils ont couru après ce qui ne sert à rien.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: »C'est pourquoi je veux encore lancer des accusations contre vous, déclare l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je veux aussi en lancer contre vos descendants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Allez jusqu'aux îles de Kittim et regardez!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Envoyez quelqu'un à Kédar, observez bien
- type: usfm
  marker: q1
  children:
  - type: text
    text: et regardez s'il est arrivé quelque chose de semblable!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Une nation a-t-elle déjà changé de dieux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: alors même que ce ne sont pas de vrais dieux?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourtant, mon peuple a échangé ce qui faisait sa gloire contre ce qui n'a aucune valeur!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: »Ciel, sois-en consterné,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sois-en horrifié, atterré! déclare l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'En effet, c''est un double mal que mon peuple a commis:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils m'ont abandonné, moi qui suis une source d'eau vive,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour se creuser des citernes, des citernes fissurées
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui ne retiennent pas l'eau.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: »Israël est-il un esclave acheté ou né dans la maison?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi est-il donc livré au pillage?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Contre lui les lionceaux rugissent, poussent leurs cris,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils dévastent son pays;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ses villes sont brûlées, il n'y a plus d'habitants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: »Même les enfants de Memphis et de Tachpanès
- type: usfm
  marker: q1
  children:
  - type: text
    text: te brouteront le sommet de la tête.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Cela ne t'arrive-t-il pas
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce que tu as abandonné l'Eternel, ton Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: lorsqu'il te guidait sur le chemin?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Et maintenant, pourquoi prendrais-tu le chemin de l'Egypte
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour boire l'eau du Nil?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi prendrais-tu le chemin de l'Assyrie
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour boire l'eau de l'Euphrate?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: »Ta méchanceté te punira et ton infidélité te jugera.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sache et constate que c'est mal et que c'est source d'amertume
- type: usfm
  marker: q1
  children:
  - type: text
    text: d'abandonner l'Eternel, ton Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de n'avoir aucun respect pour moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: déclare le Seigneur, l'Eternel, le maître de l'univers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: »Depuis longtemps tu t'es révoltée contre l'autorité exercée sur toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu as arraché tes liens
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et tu as dit: ‘Je ne veux plus être en esclavage!’'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourtant, sur toute colline élevée et sous tout arbre vert
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu t'es vautrée comme une prostituée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: »Moi, je t'avais plantée pour produire des raisins excellents,
- type: usfm
  marker: q1
  children:
  - type: text
    text: d'une variété sûre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comment t'es-tu transformée à mes yeux
- type: usfm
  marker: q1
  children:
  - type: text
    text: en fruits dégénérés d'une vigne étrangère?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Même si tu te lavais avec du nitrate,
- type: usfm
  marker: q1
  children:
  - type: text
    text: même si tu employais beaucoup de savon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ta faute resterait marquée devant moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: déclare le Seigneur, l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '»Comment pourrais-tu affirmer: ‘Je ne me suis pas rendue impure,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: je n'ai pas suivi les Baals’?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Regarde le chemin que tu suis dans la vallée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: reconnais ce que tu as fait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: chamelle légère qui parcours ton chemin dans tous les sens!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: C'est une ânesse sauvage, habituée au désert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: en chaleur, toute haletante à cause de son désir.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui la détournera de ce qu'elle recherche?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tous ceux qui la cherchent n''ont pas à se fatiguer:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils la trouvent pendant qu'elle est en chaleur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Arrête-toi avant de finir pieds nus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: avant que ton gosier ne se dessèche!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Mais tu dis: ‘Rien à faire, non!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: J'aime les étrangers et je veux courir après eux.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: »Tout comme un voleur est dans la honte lorsqu'il est surpris,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la communauté d'Israël sera couverte de honte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eux, leurs rois, leurs chefs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: leurs prêtres et leurs prophètes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ils disent au bois: ‘Tu es mon père!’'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et à la pierre: ‘Tu m''as donné la vie!’'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, ils m'ont tourné le dos, ils ne me regardent plus en face
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et, quand ils sont dans le malheur, ils disent:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Lève-toi, sauve-nous!’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Où sont donc tes dieux, ceux que tu t'es faits?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu'ils se lèvent, s'ils peuvent te sauver lorsque tu es dans le malheur!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, tu as autant de dieux que de villes, Juda!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: »Pourquoi plaidez-vous contre moi?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous tous, vous vous êtes révoltés contre moi, déclare l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'C''est bien inutilement que j''ai frappé vos enfants:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils n'ont pas voulu tenir compte de la correction.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Votre épée a dévoré vos prophètes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pareille à un lion destructeur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: »Hommes d'aujourd'hui, considérez la parole de l'Eternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ai-je été pour Israël un désert
- type: usfm
  marker: q1
  children:
  - type: text
    text: ou un pays de ténèbres?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Pourquoi mon peuple dit-il: ‘Nous allons où nous voulons,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: nous ne viendrons plus vers toi’?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: La jeune fille oublie-t-elle ses bijoux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ou la fiancée sa parure?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourtant, mon peuple m'a oublié
- type: usfm
  marker: q1
  children:
  - type: text
    text: depuis un nombre de jours incalculable.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: »Comme tu traces bien ton chemin pour chercher l'amour!
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est en commettant le mal que tu as appris tes voies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Jusque sur les pans de ton habit se trouve
- type: usfm
  marker: q1
  children:
