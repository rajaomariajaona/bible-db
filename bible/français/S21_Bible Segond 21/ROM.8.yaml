document_id: ROM.8
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La vie animée par l'Esprit
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Il n''y a donc maintenant aucune condamnation pour ceux qui sont en Jésus-Christ, [qui ne vivent pas conformément à leur nature propre mais conformément à l''Esprit]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'En effet, la loi de l''Esprit qui donne la vie en Jésus-Christ m''a libéré de la loi du péché et de la mort, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'car ce qui était impossible à la loi parce que la nature humaine la rendait impuissante, Dieu l''a fait: il a condamné le péché dans la nature humaine en envoyant à cause du péché son propre Fils dans une nature semblable à celle de l''homme pécheur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ainsi, la justice réclamée par la loi est accomplie en nous qui vivons non conformément à notre nature propre mais conformément à l'Esprit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'En effet, ceux qui se conforment à leur nature propre se préoccupent des réalités de la nature humaine, tandis que ceux qui se conforment à l''Esprit sont préoccupés par ce qui est de l''Esprit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'De fait, la nature humaine tend vers la mort, tandis que l''Esprit tend vers la vie et la paix. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'En effet, la nature humaine tend à la révolte contre Dieu, parce qu''elle ne se soumet pas à la loi de Dieu et qu''elle n''en est même pas capable. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Or, ceux qui sont animés par leur nature propre ne peuvent pas plaire à Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Quant à vous, vous n''êtes pas animés par votre nature propre mais par l''Esprit, si du moins l''Esprit de Dieu habite en vous. Si quelqu''un n''a pas l''Esprit de Christ, il ne lui appartient pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Et si Christ est en vous, votre corps, il est vrai, est mort à cause du péché, mais votre esprit est vie à cause de la justice. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Et si l'Esprit de celui qui a ressuscité Jésus habite en vous, celui qui a ressuscité Christ rendra aussi la vie à votre corps mortel par son Esprit qui habite en vous.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ainsi donc, frères et sœurs, nous avons une dette, mais pas envers notre nature propre pour nous conformer à ses exigences. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Si vous vivez en vous conformant à votre nature propre, vous allez mourir, mais si par l''Esprit vous faites mourir les manières d''agir du corps, vous vivrez. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'En effet, tous ceux qui sont conduits par l''Esprit de Dieu sont fils de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Et vous n''avez pas reçu un esprit d''esclavage pour être encore dans la crainte, mais vous avez reçu un Esprit d''adoption, par lequel nous crions: «Abba! Père!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'L''Esprit lui-même rend témoignage à notre esprit que nous sommes enfants de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Or, si nous sommes enfants, nous sommes aussi héritiers: héritiers de Dieu et cohéritiers de Christ, si toutefois nous souffrons avec lui afin de prendre aussi part à sa gloire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'J''estime que les souffrances du moment présent ne sont pas dignes d''être comparées à la gloire qui va être révélée pour nous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'De fait, la création attend avec un ardent désir la révélation des fils de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: En effet, la création a été soumise à l'inconsistance, non de son propre gré, mais à cause de celui qui l'y a soumise
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.20 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Celui… soumise: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: c'est-à-dire Dieu, en sanction de la faute d'Adam, ou Adam lui-même.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Toutefois, elle a l''espérance d''être elle aussi libérée de l''esclavage de la corruption pour prendre part à la glorieuse liberté des enfants de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Or nous savons que, jusqu''à maintenant, la création tout entière soupire et souffre les douleurs de l''accouchement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Et ce n''est pas elle seule qui soupire, mais nous aussi, qui avons pourtant dans l''Esprit un avant-goût de cet avenir, nous soupirons en nous-mêmes en attendant l''adoption, la libération de notre corps. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'En effet, c''est en espérance que nous avons été sauvés. Or l''espérance qu''on voit n''est plus de l''espérance: ce que l''on voit, peut-on l''espérer encore? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Mais si nous espérons ce que nous ne voyons pas, nous l'attendons avec persévérance.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'De même l''Esprit aussi nous vient en aide dans notre faiblesse. En effet, nous ne savons pas ce qu''il convient de demander dans nos prières, mais l''Esprit lui-même intercède [pour nous] par des soupirs que les mots ne peuvent exprimer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Et Dieu qui examine les cœurs sait quelle est la pensée de l'Esprit, parce que c'est en accord avec lui qu'il intercède en faveur des saints
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.27 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Saints: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: manière de désigner les chrétiens en tant que personnes consacrées à Dieu et appelées à avoir le comportement qui découle de leur appartenance à ce Dieu.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Du reste, nous savons que tout contribue au bien de ceux qui aiment Dieu, de ceux qui sont appelés conformément à son plan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'En effet, ceux qu''il a connus d''avance, il les a aussi prédestinés à devenir conformes à l''image de son Fils, afin que celui-ci soit le premier-né d''un grand nombre de frères. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ceux qu'il a prédestinés, il les a aussi appelés; ceux qu'il a appelés, il les a aussi déclarés justes; et ceux qu'il a déclarés justes, il leur a aussi accordé la gloire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Que dirons-nous donc de plus? Si Dieu est pour nous, qui sera contre nous? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Lui qui n''a pas épargné son propre Fils mais l''a donné pour nous tous, comment ne nous accorderait-il pas aussi tout avec lui? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Qui accusera ceux que Dieu a choisis? C''est Dieu qui les déclare justes! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Qui les condamnera? [Jésus-]Christ est mort, bien plus, il est ressuscité, il est à la droite de Dieu et il intercède pour nous! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Qui nous séparera de l''amour de Christ? Serait-ce la détresse, l''angoisse, la persécution, la faim, le dénuement, le danger ou l''épée? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'De fait, il est écrit: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: C'est à cause de toi qu'on nous met à mort à longueur de journée, qu'on nous considère comme des brebis destinées à la boucherie
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.36 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'C''est à cause… boucherie: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation du '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psaume 44.23
      metadata:
        usfm: PSA.44.23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Au contraire, dans tout cela nous sommes plus que vainqueurs grâce à celui qui nous a aimés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'En effet, j''ai l''assurance que ni la mort ni la vie, ni les anges ni les dominations, ni le présent ni l''avenir, ni les puissances, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ni la hauteur, ni la profondeur, ni aucune autre créature ne pourra nous séparer de l'amour de Dieu manifesté en Jésus-Christ notre Seigneur.
