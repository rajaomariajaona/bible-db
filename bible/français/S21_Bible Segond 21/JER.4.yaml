document_id: JER.4,152
type_code: fra
verses:
  '1':
  - type: text
    content: «Israël, si tu reviens, si tu reviens vers moi, déclare l'Eternel,
  - type: text
    content: si tu cesses de faire ce qui est horrible devant moi,
  - type: text
    content: si tu ne vagabondes plus de-ci de-là,
  '10':
  - type: text
    content: 'J''ai dit: «Ah! Seigneur Eternel!'
  - type: text
    content: 'Vraiment, tu as bien trompé ce peuple et Jérusalem lorsque tu as dit:'
  - type: text
    content: ‘Vous aurez la paix!’
  - type: text
    content: alors que l'épée est prête à frapper leur vie.»
  '11':
  - type: text
    content: '«A ce moment-là, on dira à ce peuple et à Jérusalem:'
  - type: text
    content: ‘Un vent brûlant souffle des hauteurs du désert
  - type: text
    content: sur le chemin de la fille de mon peuple,
  - type: text
    content: mais non pour trier ni pour nettoyer le grain.
  '12':
  - type: text
    content: C'est un vent impétueux qui vient de là-bas jusqu'à moi.
  - type: text
    content: Maintenant, je prononcerai moi-même des jugements contre eux.’»
  '13':
  - type: text
    content: «Voici que le destructeur monte comme une masse nuageuse;
  - type: text
    content: ses chars sont comme une tempête,
  - type: text
    content: ses chevaux sont plus rapides que les aigles.
  - type: text
    content: Malheur à nous, car nous sommes anéantis!»
  '14':
  - type: text
    content: «Purifie ton cœur du mal, Jérusalem,
  - type: text
    content: afin d'être sauvée!
  - type: text
    content: Jusqu'à quand garderas-tu en toi des pensées de malheur?
  '15':
  - type: text
    content: Oui, une voix qui part de Dan annonce le malheur,
  - type: text
    content: elle le proclame depuis la région montagneuse d'Ephraïm.
  '16':
  - type: text
    content: 'Rappelez-le aux nations, faites-le connaître à Jérusalem:'
  - type: text
    content: des assaillants viennent d'une terre lointaine,
  - type: text
    content: ils font retentir leur voix contre les villes de Juda.
  '17':
  - type: text
    content: Pareils à ceux qui gardent un champ, ils fondent sur Jérusalem de tous côtés,
  - type: text
    content: car elle s'est révoltée contre moi, déclare l'Eternel.
  '18':
  - type: text
    content: Voilà où t'ont amenée ta conduite et tes agissements,
  - type: text
    content: voilà ce qui cause ton malheur.
  - type: text
    content: Oui, c'est une source d'amertume, cela te va droit au cœur.»
  '19':
  - type: text
    content: «Mon ventre! Mon ventre! Je me tords de douleur, mon cœur vacille,
  - type: text
    content: mon cœur frémit, je ne peux pas me taire,
  - type: text
    content: car j'entends le son de la trompette,
  - type: text
    content: le cri de guerre.
  '2':
  - type: text
    content: 'si tu prêtes serment en disant: ‘L''Eternel est vivant!’'
  - type: text
    content: avec vérité, droiture et justice,
  - type: text
    content: alors les nations se béniront les unes les autres grâce à lui,
  - type: text
    content: elles tireront leur fierté de lui.
  '20':
  - type: text
    content: On annonce désastre sur désastre,
  - type: text
    content: car tout le pays est dévasté.
  - type: text
    content: Soudain, mes tentes sont dévastées,
  - type: text
    content: mes abris en toile le sont en un instant.
  '21':
  - type: text
    content: Jusqu'à quand verrai-je l'étendard
  - type: text
    content: et entendrai-je le son de la trompette?»
  '22':
  - type: text
    content: «C'est que mon peuple est fou, il ne me connaît pas.
  - type: text
    content: Ce sont des enfants stupides, dépourvus d'intelligence.
  - type: text
    content: Ils sont habiles pour faire le mal,
  - type: text
    content: mais ils ne savent pas faire le bien.»
  '23':
  - type: text
    content: Je regarde la terre et je constate que c'est le chaos et le vide.
  - type: text
    content: Je regarde le ciel et je constate que sa lumière a disparu.
  '24':
  - type: text
    content: Je regarde les montagnes et je constate qu'elles tremblent,
  - type: text
    content: que toutes les collines sont secouées.
  '25':
  - type: text
    content: Je regarde et je constate qu'il n'y a plus d'homme,
  - type: text
    content: que tous les oiseaux se sont enfuis.
  '26':
  - type: text
    content: 'Je regarde et je constate que la région fertile n''est plus qu''un désert:'
  - type: text
    content: toutes ses villes ont été démolies
  - type: text
    content: devant l'Eternel, devant son ardente colère.
  '27':
  - type: text
    content: 'En effet, voici ce qu''a dit l''Eternel:'
  - type: text
    content: «Tout le pays deviendra un désert,
  - type: text
    content: mais je n'accomplirai pas une destruction totale.
  '28':
  - type: text
    content: A cause de cela, le pays sera en deuil
  - type: text
    content: et le ciel, en haut, s'assombrira.
  - type: text
    content: En effet je l'ai dit, j'y ai réfléchi,
  - type: text
    content: je ne le regrette pas et je ne reviendrai pas en arrière.»
  '29':
  - type: text
    content: Au bruit des cavaliers et des archers, toute la ville est en fuite.
  - type: text
    content: On se réfugie dans les buissons, on monte sur les rochers.
  - type: text
    content: Toute la ville est abandonnée, il n'y a plus d'habitants.
  '3':
  - type: text
    content: '»En effet, voici ce que dit l''Eternel aux hommes de Juda et de Jérusalem:'
  - type: text
    content: '*Défrichez-vous un champ nouveau'
  - type: note
    content: 'Défrichez… nouveau: renvoi à Osée 10.12 (même formulation hébraïque).'
  - type: text
    content: et ne semez pas parmi les ronces!
  '30':
  - type: text
    content: Et toi qui seras anéantie, que fais-tu?
  - type: text
    content: Tu t'habilles de cramoisi, tu te pares de bijoux en or,
  - type: text
    content: tu mets du fard à tes yeux!
  - type: text
    content: 'C''est inutilement que tu te fais belle:'
  - type: text
    content: tes amants te méprisent,
  - type: text
    content: ils en veulent à ta vie.
  '31':
  - type: text
    content: Oui, j'entends des cris pareils à ceux d'une femme prête à accoucher,
  - type: text
    content: des cris d'angoisse pareils à ceux d'une femme qui met son premier enfant au monde.
  - type: text
    content: 'C''est la voix de la fille de Sion; elle suffoque, elle tend ses mains:'
  - type: text
    content: «Malheureuse que je suis! Je m'effondre face aux meurtriers!»
  '4':
  - type: text
    content: Circoncisez-vous pour l'Eternel, circoncisez votre cœur,
  - type: text
    content: hommes de Juda et habitants de Jérusalem!
  - type: text
    content: Sinon, ma colère éclatera comme un feu
  - type: text
    content: et s'enflammera sans qu'on puisse l'éteindre
  - type: text
    content: à cause de la méchanceté de vos agissements.
  - type: heading
    content: Annonce d'une invasion étrangère
  '5':
  - type: text
    content: »Annoncez-le en Juda, proclamez-le à Jérusalem,
  - type: text
    content: 'dites: ‘Sonnez de la trompette dans le pays!’'
  - type: text
    content: 'Criez à pleine voix:'
  - type: text
    content: ‘Rassemblez-vous et allons dans les villes fortifiées!’
  '6':
  - type: text
    content: Dressez un étendard vers Sion,
  - type: text
    content: enfuyez-vous, ne vous arrêtez pas,
  - type: text
    content: car je fais moi-même venir du nord le malheur
  - type: text
    content: et un grand désastre.
  '7':
  - type: text
    content: Le lion s'élance de son taillis,
  - type: text
    content: le destructeur des nations est en marche, il est sorti de chez lui
  - type: text
    content: pour dévaster ton pays.
  - type: text
    content: Tes villes tomberont en ruine, il n'y aura plus d'habitants.»
  '8':
  - type: text
    content: «C'est pourquoi habillez-vous de sacs, lamentez-vous et gémissez,
  - type: text
    content: car la colère ardente de l'Eternel ne se détourne pas de nous.»
  '9':
  - type: text
    content: «Ce jour-là, déclare l'Eternel,
  - type: text
    content: le roi et les chefs perdront courage,
  - type: text
    content: les prêtres seront consternés
  - type: text
    content: et les prophètes stupéfaits.»
