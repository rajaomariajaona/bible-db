document_id: JER.4
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: «Israël, si tu reviens, si tu reviens vers moi, déclare l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si tu cesses de faire ce qui est horrible devant moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si tu ne vagabondes plus de-ci de-là,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'si tu prêtes serment en disant: ‘L''Eternel est vivant!’'
- type: usfm
  marker: q1
  children:
  - type: text
    text: avec vérité, droiture et justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: alors les nations se béniront les unes les autres grâce à lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elles tireront leur fierté de lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '»En effet, voici ce que dit l''Eternel aux hommes de Juda et de Jérusalem:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '*Défrichez-vous un champ nouveau'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Défrichez… nouveau: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'renvoi à '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Osée 10.12
      metadata:
        usfm: HOS.10.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (même formulation hébraïque).'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ne semez pas parmi les ronces!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Circoncisez-vous pour l'Eternel, circoncisez votre cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hommes de Juda et habitants de Jérusalem!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sinon, ma colère éclatera comme un feu
- type: usfm
  marker: q1
  children:
  - type: text
    text: et s'enflammera sans qu'on puisse l'éteindre
- type: usfm
  marker: q1
  children:
  - type: text
    text: à cause de la méchanceté de vos agissements.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Annonce d'une invasion étrangère
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: »Annoncez-le en Juda, proclamez-le à Jérusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dites: ‘Sonnez de la trompette dans le pays!’'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Criez à pleine voix:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Rassemblez-vous et allons dans les villes fortifiées!’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dressez un étendard vers Sion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: enfuyez-vous, ne vous arrêtez pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car je fais moi-même venir du nord le malheur
- type: usfm
  marker: q1
  children:
  - type: text
    text: et un grand désastre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Le lion s'élance de son taillis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le destructeur des nations est en marche, il est sorti de chez lui
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour dévaster ton pays.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tes villes tomberont en ruine, il n'y aura plus d'habitants.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: «C'est pourquoi habillez-vous de sacs, lamentez-vous et gémissez,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car la colère ardente de l'Eternel ne se détourne pas de nous.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: «Ce jour-là, déclare l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le roi et les chefs perdront courage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les prêtres seront consternés
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les prophètes stupéfaits.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'J''ai dit: «Ah! Seigneur Eternel!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Vraiment, tu as bien trompé ce peuple et Jérusalem lorsque tu as dit:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Vous aurez la paix!’
- type: usfm
  marker: q1
  children:
  - type: text
    text: alors que l'épée est prête à frapper leur vie.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '«A ce moment-là, on dira à ce peuple et à Jérusalem:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Un vent brûlant souffle des hauteurs du désert
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur le chemin de la fille de mon peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais non pour trier ni pour nettoyer le grain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: C'est un vent impétueux qui vient de là-bas jusqu'à moi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Maintenant, je prononcerai moi-même des jugements contre eux.’»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: «Voici que le destructeur monte comme une masse nuageuse;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ses chars sont comme une tempête,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ses chevaux sont plus rapides que les aigles.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Malheur à nous, car nous sommes anéantis!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: «Purifie ton cœur du mal, Jérusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: afin d'être sauvée!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jusqu'à quand garderas-tu en toi des pensées de malheur?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Oui, une voix qui part de Dan annonce le malheur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle le proclame depuis la région montagneuse d'Ephraïm.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Rappelez-le aux nations, faites-le connaître à Jérusalem:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: des assaillants viennent d'une terre lointaine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils font retentir leur voix contre les villes de Juda.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Pareils à ceux qui gardent un champ, ils fondent sur Jérusalem de tous côtés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car elle s'est révoltée contre moi, déclare l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Voilà où t'ont amenée ta conduite et tes agissements,
- type: usfm
  marker: q1
  children:
  - type: text
    text: voilà ce qui cause ton malheur.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, c'est une source d'amertume, cela te va droit au cœur.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: «Mon ventre! Mon ventre! Je me tords de douleur, mon cœur vacille,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mon cœur frémit, je ne peux pas me taire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car j'entends le son de la trompette,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le cri de guerre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: On annonce désastre sur désastre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car tout le pays est dévasté.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Soudain, mes tentes sont dévastées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mes abris en toile le sont en un instant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Jusqu'à quand verrai-je l'étendard
- type: usfm
  marker: q1
  children:
  - type: text
    text: et entendrai-je le son de la trompette?»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: «C'est que mon peuple est fou, il ne me connaît pas.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce sont des enfants stupides, dépourvus d'intelligence.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils sont habiles pour faire le mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais ils ne savent pas faire le bien.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Je regarde la terre et je constate que c'est le chaos et le vide.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je regarde le ciel et je constate que sa lumière a disparu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Je regarde les montagnes et je constate qu'elles tremblent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que toutes les collines sont secouées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Je regarde et je constate qu'il n'y a plus d'homme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que tous les oiseaux se sont enfuis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Je regarde et je constate que la région fertile n''est plus qu''un désert:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: toutes ses villes ont été démolies
- type: usfm
  marker: q1
  children:
  - type: text
    text: devant l'Eternel, devant son ardente colère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'En effet, voici ce qu''a dit l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Tout le pays deviendra un désert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais je n'accomplirai pas une destruction totale.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: A cause de cela, le pays sera en deuil
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le ciel, en haut, s'assombrira.
- type: usfm
  marker: q1
  children:
  - type: text
    text: En effet je l'ai dit, j'y ai réfléchi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je ne le regrette pas et je ne reviendrai pas en arrière.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Au bruit des cavaliers et des archers, toute la ville est en fuite.
- type: usfm
  marker: q1
  children:
  - type: text
    text: On se réfugie dans les buissons, on monte sur les rochers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toute la ville est abandonnée, il n'y a plus d'habitants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Et toi qui seras anéantie, que fais-tu?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu t'habilles de cramoisi, tu te pares de bijoux en or,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu mets du fard à tes yeux!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'C''est inutilement que tu te fais belle:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: tes amants te méprisent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils en veulent à ta vie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Oui, j'entends des cris pareils à ceux d'une femme prête à accoucher,
- type: usfm
  marker: q1
  children:
  - type: text
    text: des cris d'angoisse pareils à ceux d'une femme qui met son premier enfant au monde.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'C''est la voix de la fille de Sion; elle suffoque, elle tend ses mains:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Malheureuse que je suis! Je m'effondre face aux meurtriers!»
