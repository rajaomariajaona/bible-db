document_id: 1PE.5,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Les relations dans l'Eglise
  - type: text
    content: 'Voici [donc] les recommandations que j''adresse à ceux qui sont anciens parmi vous, moi qui suis ancien comme eux, témoin des souffrances de Christ et participant de la gloire qui doit être révélée: '
  '10':
  - type: text
    content: 'Le Dieu de toute grâce vous a appelés en [Jésus-]Christ à sa gloire éternelle. Après que vous aurez souffert un peu de temps, il vous rétablira lui-même, vous affermira, vous fortifiera, vous rendra inébranlables. '
  '11':
  - type: text
    content: A lui soient [la gloire et] la puissance aux siècles des siècles! Amen!
  - type: heading
    content: Salutations
  '12':
  - type: text
    content: C'est par Silvain, qui est à mes yeux un frère fidèle, que je vous ai écrit ces quelques mots pour vous encourager et pour vous attester que c'est bien à la véritable grâce de Dieu que vous êtes attachés.
  '13':
  - type: text
    content: 'Ceux qui ont été choisis comme vous et sont à Babylone vous saluent, ainsi que Marc, mon fils. '
  '14':
  - type: text
    content: Saluez-vous les uns les autres par un baiser plein d'amour. Que la paix soit avec vous tous qui êtes en [Jésus-]Christ!
  '2':
  - type: text
    content: 'prenez soin du troupeau de Dieu qui est sous votre garde [en veillant sur lui] non par contrainte, mais de bon gré, [selon Dieu]. Faites-le non par recherche d''un gain, mais avec dévouement, '
  '3':
  - type: text
    content: 'non en dominant sur ceux qui vous sont confiés, mais en étant les modèles du troupeau. '
  '4':
  - type: text
    content: Ainsi, lorsque le souverain berger apparaîtra, vous recevrez la couronne de gloire qui ne perd jamais son éclat.
  '5':
  - type: text
    content: 'De même, vous qui êtes jeunes, soumettez-vous aux anciens. Et vous soumettant tous les uns aux autres, revêtez-vous d''humilité, car '
  - type: text
    content: Dieu s'oppose aux orgueilleux, mais il fait grâce aux humbles
  - type: note
    content: 'Dieu… humbles: citation de Proverbes 3.34.'
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Humiliez-vous donc sous la puissante main de Dieu, afin qu''il vous élève au moment voulu. '
  '7':
  - type: text
    content: Déchargez-vous sur lui de tous vos soucis, car lui-même prend soin de vous.
  '8':
  - type: text
    content: 'Soyez sobres, restez vigilants: votre adversaire, le diable, rôde comme un lion rugissant, cherchant qui dévorer. '
  '9':
  - type: text
    content: Résistez-lui avec une foi inébranlable, sachant que les mêmes souffrances sont imposées à vos frères et sœurs dans le monde.
