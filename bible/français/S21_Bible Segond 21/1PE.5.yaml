document_id: 1PE.5,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les relations dans l'Eglise
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici [donc] les recommandations que j''adresse à ceux qui sont anciens parmi vous, moi qui suis ancien comme eux, témoin des souffrances de Christ et participant de la gloire qui doit être révélée: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le Dieu de toute grâce vous a appelés en [Jésus-]Christ à sa gloire éternelle. Après que vous aurez souffert un peu de temps, il vous rétablira lui-même, vous affermira, vous fortifiera, vous rendra inébranlables. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: A lui soient [la gloire et] la puissance aux siècles des siècles! Amen!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Salutations
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: C'est par Silvain, qui est à mes yeux un frère fidèle, que je vous ai écrit ces quelques mots pour vous encourager et pour vous attester que c'est bien à la véritable grâce de Dieu que vous êtes attachés.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ceux qui ont été choisis comme vous et sont à Babylone vous saluent, ainsi que Marc, mon fils. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Saluez-vous les uns les autres par un baiser plein d'amour. Que la paix soit avec vous tous qui êtes en [Jésus-]Christ!
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'prenez soin du troupeau de Dieu qui est sous votre garde [en veillant sur lui] non par contrainte, mais de bon gré, [selon Dieu]. Faites-le non par recherche d''un gain, mais avec dévouement, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'non en dominant sur ceux qui vous sont confiés, mais en étant les modèles du troupeau. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ainsi, lorsque le souverain berger apparaîtra, vous recevrez la couronne de gloire qui ne perd jamais son éclat.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De même, vous qui êtes jeunes, soumettez-vous aux anciens. Et vous soumettant tous les uns aux autres, revêtez-vous d''humilité, car '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Dieu s'oppose aux orgueilleux, mais il fait grâce aux humbles
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Dieu… humbles: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Proverbes 3.34
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Humiliez-vous donc sous la puissante main de Dieu, afin qu''il vous élève au moment voulu. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Déchargez-vous sur lui de tous vos soucis, car lui-même prend soin de vous.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Soyez sobres, restez vigilants: votre adversaire, le diable, rôde comme un lion rugissant, cherchant qui dévorer. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Résistez-lui avec une foi inébranlable, sachant que les mêmes souffrances sont imposées à vos frères et sœurs dans le monde.
