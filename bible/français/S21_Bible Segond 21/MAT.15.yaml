document_id: MAT.15,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Le cœur humain
  - type: text
    content: 'Alors des pharisiens et des spécialistes de la loi vinrent de Jérusalem trouver Jésus et dirent: '
  '10':
  - type: text
    content: 'Jésus appela la foule à lui et dit: «Ecoutez-moi et comprenez bien: '
  '11':
  - type: text
    content: ce n'est pas ce qui entre dans la bouche qui rend l'homme impur, mais ce qui sort de la bouche. Voilà ce qui rend l'homme impur.»
  '12':
  - type: text
    content: 'Alors ses disciples s''approchèrent et lui dirent: «Sais-tu que les pharisiens ont été scandalisés d''entendre ces paroles?» '
  '13':
  - type: text
    content: 'Il répondit: «Toute plante que n''a pas plantée mon Père céleste sera déracinée. '
  '14':
  - type: text
    content: 'Laissez-les: ce sont des aveugles qui conduisent des aveugles; si un aveugle conduit un aveugle, ils tomberont tous les deux dans un fossé.»'
  '15':
  - type: text
    content: 'Pierre prit la parole et lui dit: «Explique-nous cette parabole.» '
  '16':
  - type: text
    content: 'Jésus dit: «Vous aussi, vous êtes encore sans intelligence? '
  '17':
  - type: text
    content: 'Ne comprenez-vous pas encore que tout ce qui entre dans la bouche va dans le ventre, puis est évacué dans les toilettes? '
  '18':
  - type: text
    content: 'Mais ce qui sort de la bouche vient du cœur, et c''est ce qui rend l''homme impur. '
  '19':
  - type: text
    content: 'En effet, c''est du cœur que viennent les mauvaises pensées, les meurtres, les adultères, l''immoralité sexuelle, les vols, les faux témoignages, les calomnies. '
  '2':
  - type: text
    content: '«Pourquoi tes disciples transgressent-ils la tradition des anciens? En effet, ils ne se lavent pas les mains quand ils prennent leur repas.» '
  '20':
  - type: text
    content: Voilà ce qui rend l'homme impur; mais manger sans s'être lavé les mains, cela ne rend pas l'homme impur.»
  - type: heading
    content: Jésus et la femme non juive
  '21':
  - type: text
    content: 'Jésus partit de là et se retira dans le territoire de Tyr et de Sidon. '
  '22':
  - type: text
    content: Alors une femme cananéenne
  - type: note
    content: 'Cananéenne: nom des occupants de la région avant que les Israélites n''en fassent la conquête.'
  - type: text
    content: ' qui venait de cette région lui cria: «Aie pitié de moi, Seigneur, Fils de David'
  - type: note
    content: 'Fils de David: voir la note 9.27.'
  - type: text
    content: '! Ma fille est cruellement tourmentée par un démon.» '
  '23':
  - type: text
    content: 'Il ne lui répondit pas un mot; ses disciples s''approchèrent et lui demandèrent: «Renvoie-la, car elle crie derrière nous.» '
  '24':
  - type: text
    content: 'Il répondit: «Je n''ai été envoyé qu''aux brebis perdues de la communauté d''Israël.» '
  '25':
  - type: text
    content: 'Mais elle vint se prosterner devant lui et dit: «Seigneur, secours-moi!» '
  '26':
  - type: text
    content: 'Il répondit: «Il n''est pas bien de prendre le pain des enfants et de le jeter aux petits chiens.» '
  '27':
  - type: text
    content: '«Oui, Seigneur, dit-elle, mais les petits chiens mangent les miettes qui tombent de la table de leurs maîtres.» '
  '28':
  - type: text
    content: 'Alors Jésus lui dit: «Femme, ta foi est grande. Sois traitée conformément à ton désir.» A partir de ce moment, sa fille fut guérie.'
  '29':
  - type: text
    content: 'Jésus quitta cet endroit et vint sur les bords du lac de Galilée. Il monta sur la montagne et s''y assit. '
  '3':
  - type: text
    content: 'Il leur répondit: «Et vous, pourquoi transgressez-vous le commandement de Dieu au profit de votre tradition? '
  '30':
  - type: text
    content: 'Une grande foule s''approcha de lui; il y avait parmi eux des boiteux, des aveugles, des muets, des estropiés et beaucoup d''autres malades. On les amena aux pieds de Jésus et il les guérit, '
  '31':
  - type: text
    content: de sorte que la foule était émerveillée de voir les muets parler, les estropiés être guéris, les boiteux marcher, les aveugles voir, et elle célébrait la gloire du Dieu d'Israël.
  - type: heading
    content: Multiplication des pains pour 4000 hommes
  '32':
  - type: text
    content: 'Jésus appela ses disciples et leur dit: «Je suis rempli de compassion pour cette foule, car voilà trois jours qu''ils sont près de moi et ils n''ont rien à manger. Je ne veux pas les renvoyer à jeun, de peur que les forces ne leur manquent en chemin.» '
  '33':
  - type: text
    content: 'Les disciples lui dirent: «Comment nous procurer dans cet endroit désert assez de pains pour rassasier une si grande foule?» '
  '34':
  - type: text
    content: 'Jésus leur demanda: «Combien avez-vous de pains?» «Sept, répondirent-ils, et quelques petits poissons.» '
  '35':
  - type: text
    content: 'Alors il fit asseoir la foule par terre, '
  '36':
  - type: text
    content: 'prit les sept pains et les poissons et, après avoir remercié Dieu, il les rompit et les donna à ses disciples, qui les distribuèrent à la foule. '
  '37':
  - type: text
    content: 'Tous mangèrent et furent rassasiés, et l''on emporta sept corbeilles pleines des morceaux qui restaient. '
  '38':
  - type: text
    content: Ceux qui avaient mangé étaient 4000 hommes, sans compter les femmes et les enfants.
  '39':
  - type: text
    content: Ensuite, il renvoya la foule, monta dans la barque et se rendit dans la région de Magdala.
  '4':
  - type: text
    content: 'En effet, Dieu a dit: '
  - type: text
    content: Honore ton père et ta mère
  - type: note
    content: 'Honore… mère: citation du 5e des dix commandements (Exode 20.12; Deutéronome 5.16).'
  - type: text
    content: ' et: '
  - type: text
    content: Celui qui maudira son père ou sa mère sera puni de mort
  - type: note
    content: 'Celui qui… mort: citation d''Exode 21.17 (repris en Lévitique 20.9).'
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Mais d''après vous, celui qui dira à son père ou à sa mère: ‘Ce dont j''aurais pu t''assister est une offrande à Dieu’ '
  '6':
  - type: text
    content: 'n''est pas tenu d''honorer son père [ou sa mère]. Vous annulez ainsi la parole de Dieu au profit de votre tradition. '
  '7':
  - type: text
    content: 'Hypocrites, Esaïe a bien prophétisé sur vous, quand il a dit: '
  '8':
  - type: text
    content: Ce peuple [prétend s'approcher de moi et] m'honore des lèvres, mais son cœur est éloigné de moi.
  - type: text
    content: ' '
  '9':
  - type: text
    content: C'est faussement qu'ils m'honorent en donnant des enseignements qui sont des commandements humains
  - type: text
    content: .
  - type: note
    content: 'Ce peuple… humains: citation d''Esaïe 29.13.'
  - type: text
    content: »
