document_id: MAT.15
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le cœur humain
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Alors des pharisiens et des spécialistes de la loi vinrent de Jérusalem trouver Jésus et dirent: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Pourquoi tes disciples transgressent-ils la tradition des anciens? En effet, ils ne se lavent pas les mains quand ils prennent leur repas.» '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il leur répondit: «Et vous, pourquoi transgressez-vous le commandement de Dieu au profit de votre tradition? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'En effet, Dieu a dit: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Honore ton père et ta mère
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Honore… mère: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation du 5e des dix commandements (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Exode 20.12
      metadata:
        usfm: EXO.20.12
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Deutéronome 5.16
      metadata:
        usfm: DEU.5.16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' et: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Celui qui maudira son père ou sa mère sera puni de mort
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Celui qui… mort: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Exode 21.17
      metadata:
        usfm: EXO.21.17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (repris en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lévitique 20.9
      metadata:
        usfm: LEV.20.9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mais d''après vous, celui qui dira à son père ou à sa mère: ‘Ce dont j''aurais pu t''assister est une offrande à Dieu’ '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'n''est pas tenu d''honorer son père [ou sa mère]. Vous annulez ainsi la parole de Dieu au profit de votre tradition. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Hypocrites, Esaïe a bien prophétisé sur vous, quand il a dit: '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Ce peuple [prétend s'approcher de moi et] m'honore des lèvres, mais son cœur est éloigné de moi.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: C'est faussement qu'ils m'honorent en donnant des enseignements qui sont des commandements humains
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.8-9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ce peuple… humains: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Esaïe 29.13
      metadata:
        usfm: ISA.29.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Jésus appela la foule à lui et dit: «Ecoutez-moi et comprenez bien: '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ce n'est pas ce qui entre dans la bouche qui rend l'homme impur, mais ce qui sort de la bouche. Voilà ce qui rend l'homme impur.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Alors ses disciples s''approchèrent et lui dirent: «Sais-tu que les pharisiens ont été scandalisés d''entendre ces paroles?» '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il répondit: «Toute plante que n''a pas plantée mon Père céleste sera déracinée. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Laissez-les: ce sont des aveugles qui conduisent des aveugles; si un aveugle conduit un aveugle, ils tomberont tous les deux dans un fossé.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Pierre prit la parole et lui dit: «Explique-nous cette parabole.» '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Jésus dit: «Vous aussi, vous êtes encore sans intelligence? '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ne comprenez-vous pas encore que tout ce qui entre dans la bouche va dans le ventre, puis est évacué dans les toilettes? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Mais ce qui sort de la bouche vient du cœur, et c''est ce qui rend l''homme impur. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'En effet, c''est du cœur que viennent les mauvaises pensées, les meurtres, les adultères, l''immoralité sexuelle, les vols, les faux témoignages, les calomnies. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Voilà ce qui rend l'homme impur; mais manger sans s'être lavé les mains, cela ne rend pas l'homme impur.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus et la femme non juive
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Jésus partit de là et se retira dans le territoire de Tyr et de Sidon. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Alors une femme cananéenne
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.22 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Cananéenne: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nom des occupants de la région avant que les Israélites n'en fassent la conquête.
    marker-yv: yv-n
  - type: text
    text: ' qui venait de cette région lui cria: «Aie pitié de moi, Seigneur, Fils de David'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Fils de David: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'voir la note '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '9.27'
      metadata:
        usfm: MAT.9.27
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '! Ma fille est cruellement tourmentée par un démon.» '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Il ne lui répondit pas un mot; ses disciples s''approchèrent et lui demandèrent: «Renvoie-la, car elle crie derrière nous.» '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Il répondit: «Je n''ai été envoyé qu''aux brebis perdues de la communauté d''Israël.» '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Mais elle vint se prosterner devant lui et dit: «Seigneur, secours-moi!» '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Il répondit: «Il n''est pas bien de prendre le pain des enfants et de le jeter aux petits chiens.» '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: '«Oui, Seigneur, dit-elle, mais les petits chiens mangent les miettes qui tombent de la table de leurs maîtres.» '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Alors Jésus lui dit: «Femme, ta foi est grande. Sois traitée conformément à ton désir.» A partir de ce moment, sa fille fut guérie.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Jésus quitta cet endroit et vint sur les bords du lac de Galilée. Il monta sur la montagne et s''y assit. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Une grande foule s''approcha de lui; il y avait parmi eux des boiteux, des aveugles, des muets, des estropiés et beaucoup d''autres malades. On les amena aux pieds de Jésus et il les guérit, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: de sorte que la foule était émerveillée de voir les muets parler, les estropiés être guéris, les boiteux marcher, les aveugles voir, et elle célébrait la gloire du Dieu d'Israël.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Multiplication des pains pour 4000 hommes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Jésus appela ses disciples et leur dit: «Je suis rempli de compassion pour cette foule, car voilà trois jours qu''ils sont près de moi et ils n''ont rien à manger. Je ne veux pas les renvoyer à jeun, de peur que les forces ne leur manquent en chemin.» '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Les disciples lui dirent: «Comment nous procurer dans cet endroit désert assez de pains pour rassasier une si grande foule?» '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Jésus leur demanda: «Combien avez-vous de pains?» «Sept, répondirent-ils, et quelques petits poissons.» '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Alors il fit asseoir la foule par terre, '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'prit les sept pains et les poissons et, après avoir remercié Dieu, il les rompit et les donna à ses disciples, qui les distribuèrent à la foule. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Tous mangèrent et furent rassasiés, et l''on emporta sept corbeilles pleines des morceaux qui restaient. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Ceux qui avaient mangé étaient 4000 hommes, sans compter les femmes et les enfants.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Ensuite, il renvoya la foule, monta dans la barque et se rendit dans la région de Magdala.
