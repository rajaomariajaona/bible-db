document_id: GEN.40,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: 'Après cela, le responsable des boissons et le boulanger du roi d''Egypte commirent une faute envers leur seigneur, le roi d''Egypte. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce cep portait trois sarments. Quand il a bourgeonné, sa fleur s''est développée et ses grappes ont donné des raisins mûrs. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La coupe du pharaon était dans ma main. J''ai pris les raisins, je les ai pressés dans la coupe du pharaon et j''ai mis la coupe dans la main du pharaon.» '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joseph lui dit: «Voici l''explication. Les trois sarments représentent trois jours. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Encore trois jours et le pharaon t''élèvera bien haut et te rétablira dans tes fonctions. Tu mettras la coupe dans la main du pharaon, comme tu en avais l''habitude lorsque tu étais son responsable des boissons. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cependant, souviens-toi de moi quand tu seras heureux et fais preuve de bonté envers moi: parle en ma faveur au pharaon et fais-moi sortir de cette maison. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: En effet, j'ai été arraché au pays des Hébreux, et même ici je n'ai rien fait qui mérite la prison.»
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voyant que Joseph avait donné une explication favorable, le chef des boulangers dit: «Dans mon rêve, il y avait aussi trois corbeilles de pain blanc sur ma tête. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dans la corbeille supérieure, il y avait des plats cuits au four de toute sorte pour le pharaon, et les oiseaux les mangeaient dans la corbeille au-dessus de ma tête.» '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joseph répondit: «Voici l''explication. Les trois corbeilles représentent trois jours. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Encore trois jours et le pharaon t''élèvera bien trop haut pour toi: il te fera pendre à un bois et les oiseaux mangeront ton corps.»'
  '2':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: 'Le pharaon fut irrité contre ses deux officiers, le grand responsable des boissons et le chef des boulangers. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Trois jours plus tard, le jour de son anniversaire, le pharaon organisa un festin pour tous ses serviteurs et il éleva bien haut le grand responsable des boissons ainsi que le chef des boulangers au milieu de ses serviteurs: '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'il rétablit le grand responsable des boissons dans ses fonctions pour qu''il mette la coupe dans la main du pharaon, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: mais il fit pendre le chef des boulangers, conformément à l'explication que Joseph leur avait donnée.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le grand responsable des boissons ne se souvint pas de Joseph. Il l'oublia.
  '3':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: 'Il les fit mettre dans la maison du chef des gardes, dans la prison, à l''endroit où Joseph était enfermé. '
  '4':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: Le chef des gardes les confia à Joseph, qui fit le service auprès d'eux. Ils passèrent un certain temps en prison.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Une même nuit, le responsable des boissons et le boulanger du roi d''Egypte qui étaient enfermés dans la prison firent tous les deux un rêve, chacun le sien avec son explication propre. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joseph vint le matin vers eux et vit qu''ils étaient tristes. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors il demanda aux officiers du pharaon qui étaient avec lui dans la prison de son maître: «Pourquoi avez-vous mauvaise mine aujourd''hui?» '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils lui répondirent: «Nous avons fait un rêve et il n''y a personne pour l''expliquer.» Joseph leur dit: «N''est-ce pas à Dieu qu''appartiennent les explications? Racontez-moi donc votre rêve.»'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le grand responsable des boissons raconta son rêve à Joseph. Il lui dit: «Dans mon rêve, il y avait un cep de vigne devant moi. '
