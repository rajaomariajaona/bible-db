verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Offrandes des douze princes
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque Moïse eut fini de dresser le tabernacle, il versa de l''huile sur lui et le consacra avec tous ses ustensiles, ainsi que l''autel avec tous ses ustensiles; il versa de l''huile sur eux et les consacra. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les princes présentèrent leur offrande pour la dédicace de l''autel, le jour où on le consacra par onction; ils présentèrent leur offrande devant l''autel. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''Eternel dit à Moïse: «Les princes viendront un à un, et à des jours différents, présenter leur offrande pour la dédicace de l''autel.»'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Celui qui présenta son offrande le premier jour fut Nachshon, fils d''Amminadab, de la tribu de Juda. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il offrit un plat en argent qui pesait un kilo et 300 grammes et un bassin en argent de 700 grammes d''après la valeur étalon du sanctuaire. Ils étaient tous deux pleins de fleur de farine pétrie à l''huile pour l''offrande. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il offrit aussi une coupe en or qui pesait 100 grammes et était pleine de parfum, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'un jeune taureau, un bélier et un agneau d''un an pour l''holocauste, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'un bouc pour le sacrifice d''expiation '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: et, pour le sacrifice de communion, 2 bœufs, 5 béliers, 5 boucs et 5 agneaux d'un an. Telle fut l'offrande de Nachshon, fils d'Amminadab.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le deuxième jour, Nathanaël, fils de Tsuar, prince d''Issacar, présenta son offrande. '
  '19':
