  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il donna 4 chars et 8 bœufs aux descendants de Merari, selon les besoins des fonctions qu''ils exerçaient sous la conduite d''Ithamar, le fils du prêtre Aaron. '
