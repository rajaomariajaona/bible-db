    children:
    - type: text
      text: '84'
  - type: text
    text: 'Tels furent les dons des princes d''Israël pour la dédicace de l''autel, le jour où on le consacra par onction: 12 plats en argent, 12 bassins en argent, 12 coupes en or. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '85'
  - type: text
    text: 'Chaque plat en argent pesait un kilo et 300 grammes et chaque bassin pesait 700 grammes, ce qui fit pour l''argent de ces ustensiles un total de 24 kilos d''après la valeur étalon du sanctuaire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '86'
  - type: text
    text: 'Les 12 coupes en or pleines de parfum, à 100 grammes la coupe d''après la valeur étalon du sanctuaire, firent pour l''or des coupes un total de 1200 grammes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '87'
  - type: text
    text: 'Total des animaux pour l''holocauste: 12 taureaux, 12 béliers, 12 agneaux d''un an, avec les offrandes qui les accompagnaient. 12 boucs pour le sacrifice d''expiation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '88'
  - type: text
    text: 'Total des animaux pour le sacrifice de communion: 24 bœufs, 60 béliers, 60 boucs, 60 agneaux d''un an. Tels furent les dons pour la dédicace de l''autel, une fois qu''on l''eut consacré par onction.'
