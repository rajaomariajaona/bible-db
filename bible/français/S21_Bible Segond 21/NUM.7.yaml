      text: '89'
  - type: text
    text: Lorsque Moïse entrait dans la tente de la rencontre pour parler avec l'Eternel, il entendait la voix lui parler du haut du couvercle placé sur l'arche du témoignage entre les deux chérubins. Et il parlait avec l'Eternel.
