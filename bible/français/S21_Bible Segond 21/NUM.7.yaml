  '39':
  - type: text
    content: 'un jeune taureau, un bélier et un agneau d''un an pour l''holocauste, '
  '4':
  - type: text
    content: 'L''Eternel dit à Moïse: '
  '40':
  - type: text
    content: 'un bouc pour le sacrifice d''expiation '
  '41':
  - type: text
    content: et, pour le sacrifice de communion, 2 bœufs, 5 béliers, 5 boucs et 5 agneaux d'un an. Telle fut l'offrande de Shelumiel, fils de Tsurishaddaï.
  '42':
  - type: text
    content: 'Le sixième jour, le prince des Gadites, Eliasaph, fils de Déuel, '
  '43':
  - type: text
    content: 'offrit un plat en argent qui pesait un kilo et 300 grammes et un bassin en argent de 700 grammes d''après la valeur étalon du sanctuaire. Ils étaient tous deux pleins de fleur de farine pétrie à l''huile pour l''offrande. '
  '44':
  - type: text
    content: 'Il offrit aussi une coupe en or qui pesait 100 grammes et était pleine de parfum, '
  '45':
  - type: text
    content: 'un jeune taureau, un bélier et un agneau d''un an pour l''holocauste, '
  '46':
  - type: text
    content: 'un bouc pour le sacrifice d''expiation '
  '47':
  - type: text
    content: et, pour le sacrifice de communion, 2 bœufs, 5 béliers, 5 boucs et 5 agneaux d'un an. Telle fut l'offrande d'Eliasaph, fils de Déuel.
  '48':
  - type: text
    content: 'Le septième jour, le prince des Ephraïmites, Elishama, fils d''Ammihud, '
  '49':
  - type: text
    content: 'offrit un plat en argent qui pesait un kilo et 300 grammes et un bassin en argent de 700 grammes d''après la valeur étalon du sanctuaire. Ils étaient tous deux pleins de fleur de farine pétrie à l''huile pour l''offrande. '
  '5':
  - type: text
    content: '«Prends ces éléments de leur part afin de les employer pour le service de la tente de la rencontre. Tu les donneras aux Lévites, à chacun selon les besoins de sa fonction.» '
  '50':
  - type: text
    content: 'Il offrit aussi une coupe en or qui pesait 100 grammes et était pleine de parfum, '
  '51':
  - type: text
    content: 'un jeune taureau, un bélier et un agneau d''un an pour l''holocauste, '
  '52':
  - type: text
    content: 'un bouc pour le sacrifice d''expiation '
  '53':
  - type: text
    content: et, pour le sacrifice de communion, 2 bœufs, 5 béliers, 5 boucs et 5 agneaux d'un an. Telle fut l'offrande d'Elishama, fils d'Ammihud.
  '54':
  - type: text
    content: 'Le huitième jour, le prince des Manassites, Gamliel, fils de Pedahtsur, '
  '55':
  - type: text
    content: 'offrit un plat en argent qui pesait un kilo et 300 grammes et un bassin en argent de 700 grammes d''après la valeur étalon du sanctuaire. Ils étaient tous deux pleins de fleur de farine pétrie à l''huile pour l''offrande. '
  '56':
  - type: text
    content: 'Il offrit aussi une coupe en or qui pesait 100 grammes et était pleine de parfum, '
  '57':
  - type: text
    content: 'un jeune taureau, un bélier et un agneau d''un an pour l''holocauste, '
  '58':
  - type: text
    content: 'un bouc pour le sacrifice d''expiation '
  '59':
  - type: text
    content: et, pour le sacrifice de communion, 2 bœufs, 5 béliers, 5 boucs et 5 agneaux d'un an. Telle fut l'offrande de Gamliel, fils de Pedahtsur.
  '6':
  - type: text
    content: 'Moïse prit les chars et les bœufs, et il les remit aux Lévites. '
  '60':
  - type: text
    content: 'Le neuvième jour, le prince des Benjaminites, Abidan, fils de Guideoni, '
  '61':
  - type: text
    content: 'offrit un plat en argent qui pesait un kilo et 300 grammes et un bassin en argent de 700 grammes d''après la valeur étalon du sanctuaire. Ils étaient tous deux pleins de fleur de farine pétrie à l''huile pour l''offrande. '
  '62':
  - type: text
    content: 'Il offrit aussi une coupe en or qui pesait 100 grammes et était pleine de parfum, '
  '63':
  - type: text
    content: 'un jeune taureau, un bélier et un agneau d''un an pour l''holocauste, '
  '64':
  - type: text
    content: 'un bouc pour le sacrifice d''expiation '
  '65':
  - type: text
    content: et, pour le sacrifice de communion, 2 bœufs, 5 béliers, 5 boucs et 5 agneaux d'un an. Telle fut l'offrande d'Abidan, fils de Guideoni.
  '66':
  - type: text
    content: 'Le dixième jour, le prince des Danites, Ahiézer, fils d''Ammishaddaï, '
  '67':
  - type: text
    content: 'offrit un plat en argent qui pesait un kilo et 300 grammes et un bassin en argent de 700 grammes d''après la valeur étalon du sanctuaire. Ils étaient tous deux pleins de fleur de farine pétrie à l''huile pour l''offrande. '
  '68':
  - type: text
    content: 'Il offrit aussi une coupe en or qui pesait 100 grammes et était pleine de parfum, '
  '69':
  - type: text
    content: 'un jeune taureau, un bélier et un agneau d''un an pour l''holocauste, '
  '7':
  - type: text
    content: 'Il donna 2 chars et 4 bœufs aux descendants de Guershon, selon les besoins de leurs fonctions. '
  '70':
  - type: text
    content: 'un bouc pour le sacrifice d''expiation '
  '71':
  - type: text
    content: et, pour le sacrifice de communion, 2 bœufs, 5 béliers, 5 boucs et 5 agneaux d'un an. Telle fut l'offrande d'Ahiézer, fils d'Ammishaddaï.
  '72':
  - type: text
    content: 'Le onzième jour, le prince des Asérites, Paguiel, fils d''Ocran, '
  '73':
  - type: text
    content: 'offrit un plat en argent qui pesait un kilo et 300 grammes et un bassin en argent de 700 grammes d''après la valeur étalon du sanctuaire. Ils étaient tous deux pleins de fleur de farine pétrie à l''huile pour l''offrande. '
  '74':
  - type: text
    content: 'Il offrit aussi une coupe en or qui pesait 100 grammes et était pleine de parfum, '
  '75':
  - type: text
    content: 'un jeune taureau, un bélier et un agneau d''un an pour l''holocauste, '
  '76':
  - type: text
    content: 'un bouc pour le sacrifice d''expiation '
  '77':
  - type: text
    content: et, pour le sacrifice de communion, 2 bœufs, 5 béliers, 5 boucs et 5 agneaux d'un an. Telle fut l'offrande de Paguiel, fils d'Ocran.
  '78':
  - type: text
    content: 'Le douzième jour, le prince des Nephthalites, Ahira, fils d''Enan, '
  '79':
  - type: text
    content: 'offrit un plat en argent qui pesait un kilo et 300 grammes et un bassin en argent de 700 grammes d''après la valeur étalon du sanctuaire. Ils étaient tous deux pleins de fleur de farine pétrie à l''huile pour l''offrande. '
  '8':
  - type: text
    content: 'Il donna 4 chars et 8 bœufs aux descendants de Merari, selon les besoins des fonctions qu''ils exerçaient sous la conduite d''Ithamar, le fils du prêtre Aaron. '
  '80':
  - type: text
    content: 'Il offrit aussi une coupe en or qui pesait 100 grammes et était pleine de parfum, '
  '81':
  - type: text
    content: 'un jeune taureau, un bélier et un agneau d''un an pour l''holocauste, '
  '82':
  - type: text
    content: 'un bouc pour le sacrifice d''expiation '
  '83':
  - type: text
    content: et, pour le sacrifice de communion, 2 bœufs, 5 béliers, 5 boucs et 5 agneaux d'un an. Telle fut l'offrande d'Ahira, fils d'Enan.
  '84':
  - type: text
    content: 'Tels furent les dons des princes d''Israël pour la dédicace de l''autel, le jour où on le consacra par onction: 12 plats en argent, 12 bassins en argent, 12 coupes en or. '
  '85':
  - type: text
    content: 'Chaque plat en argent pesait un kilo et 300 grammes et chaque bassin pesait 700 grammes, ce qui fit pour l''argent de ces ustensiles un total de 24 kilos d''après la valeur étalon du sanctuaire. '
  '86':
  - type: text
    content: 'Les 12 coupes en or pleines de parfum, à 100 grammes la coupe d''après la valeur étalon du sanctuaire, firent pour l''or des coupes un total de 1200 grammes. '
  '87':
  - type: text
    content: 'Total des animaux pour l''holocauste: 12 taureaux, 12 béliers, 12 agneaux d''un an, avec les offrandes qui les accompagnaient. 12 boucs pour le sacrifice d''expiation. '
  '88':
  - type: text
    content: 'Total des animaux pour le sacrifice de communion: 24 bœufs, 60 béliers, 60 boucs, 60 agneaux d''un an. Tels furent les dons pour la dédicace de l''autel, une fois qu''on l''eut consacré par onction.'
  '89':
  - type: text
    content: Lorsque Moïse entrait dans la tente de la rencontre pour parler avec l'Eternel, il entendait la voix lui parler du haut du couvercle placé sur l'arche du témoignage entre les deux chérubins. Et il parlait avec l'Eternel.
  '9':
  - type: text
    content: Mais il n'en donna pas aux descendants de Kehath parce que, selon leurs fonctions, ils devaient porter les choses saintes sur les épaules.
