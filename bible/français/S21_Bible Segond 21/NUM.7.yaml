document_id: NUM.7
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Offrandes des douze princes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Lorsque Moïse eut fini de dresser le tabernacle, il versa de l''huile sur lui et le consacra avec tous ses ustensiles, ainsi que l''autel avec tous ses ustensiles; il versa de l''huile sur eux et les consacra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Alors les princes d''Israël, les chefs de famille, présentèrent leur offrande. C''étaient les princes des tribus, ceux qui avaient présidé au dénombrement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ils amenèrent leur offrande devant l''Eternel: 6 chars couverts et 12 bœufs – soit un char pour 2 princes et un bœuf pour chaque prince – et ils les offrirent devant le tabernacle.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'L''Eternel dit à Moïse: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '«Prends ces éléments de leur part afin de les employer pour le service de la tente de la rencontre. Tu les donneras aux Lévites, à chacun selon les besoins de sa fonction.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Moïse prit les chars et les bœufs, et il les remit aux Lévites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il donna 2 chars et 4 bœufs aux descendants de Guershon, selon les besoins de leurs fonctions. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Il donna 4 chars et 8 bœufs aux descendants de Merari, selon les besoins des fonctions qu''ils exerçaient sous la conduite d''Ithamar, le fils du prêtre Aaron. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mais il n'en donna pas aux descendants de Kehath parce que, selon leurs fonctions, ils devaient porter les choses saintes sur les épaules.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Les princes présentèrent leur offrande pour la dédicace de l''autel, le jour où on le consacra par onction; ils présentèrent leur offrande devant l''autel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'L''Eternel dit à Moïse: «Les princes viendront un à un, et à des jours différents, présenter leur offrande pour la dédicace de l''autel.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Celui qui présenta son offrande le premier jour fut Nachshon, fils d''Amminadab, de la tribu de Juda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il offrit un plat en argent qui pesait un kilo et 300 grammes et un bassin en argent de 700 grammes d''après la valeur étalon du sanctuaire. Ils étaient tous deux pleins de fleur de farine pétrie à l''huile pour l''offrande. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il offrit aussi une coupe en or qui pesait 100 grammes et était pleine de parfum, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'un jeune taureau, un bélier et un agneau d''un an pour l''holocauste, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'un bouc pour le sacrifice d''expiation '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: et, pour le sacrifice de communion, 2 bœufs, 5 béliers, 5 boucs et 5 agneaux d'un an. Telle fut l'offrande de Nachshon, fils d'Amminadab.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
