document_id: NUM.7,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Offrandes des douze princes
  - type: text
    content: 'Lorsque Moïse eut fini de dresser le tabernacle, il versa de l''huile sur lui et le consacra avec tous ses ustensiles, ainsi que l''autel avec tous ses ustensiles; il versa de l''huile sur eux et les consacra. '
  '10':
  - type: text
    content: 'Les princes présentèrent leur offrande pour la dédicace de l''autel, le jour où on le consacra par onction; ils présentèrent leur offrande devant l''autel. '
  '11':
  - type: text
    content: 'L''Eternel dit à Moïse: «Les princes viendront un à un, et à des jours différents, présenter leur offrande pour la dédicace de l''autel.»'
  '12':
  - type: text
    content: 'Celui qui présenta son offrande le premier jour fut Nachshon, fils d''Amminadab, de la tribu de Juda. '
  '13':
  - type: text
    content: 'Il offrit un plat en argent qui pesait un kilo et 300 grammes et un bassin en argent de 700 grammes d''après la valeur étalon du sanctuaire. Ils étaient tous deux pleins de fleur de farine pétrie à l''huile pour l''offrande. '
  '14':
  - type: text
    content: 'Il offrit aussi une coupe en or qui pesait 100 grammes et était pleine de parfum, '
  '15':
  - type: text
    content: 'un jeune taureau, un bélier et un agneau d''un an pour l''holocauste, '
  '16':
  - type: text
    content: 'un bouc pour le sacrifice d''expiation '
  '17':
  - type: text
    content: et, pour le sacrifice de communion, 2 bœufs, 5 béliers, 5 boucs et 5 agneaux d'un an. Telle fut l'offrande de Nachshon, fils d'Amminadab.
  '18':
  - type: text
    content: 'Le deuxième jour, Nathanaël, fils de Tsuar, prince d''Issacar, présenta son offrande. '
  '19':
  - type: text
    content: 'Il offrit un plat en argent qui pesait un kilo et 300 grammes et un bassin en argent de 700 grammes d''après la valeur étalon du sanctuaire. Ils étaient tous deux pleins de fleur de farine pétrie à l''huile pour l''offrande. '
  '2':
  - type: text
    content: 'Alors les princes d''Israël, les chefs de famille, présentèrent leur offrande. C''étaient les princes des tribus, ceux qui avaient présidé au dénombrement. '
  '20':
  - type: text
    content: 'Il offrit aussi une coupe en or qui pesait 100 grammes et était pleine de parfum, '
  '21':
  - type: text
    content: 'un jeune taureau, un bélier et un agneau d''un an pour l''holocauste, '
  '22':
  - type: text
    content: 'un bouc pour le sacrifice d''expiation '
  '23':
  - type: text
    content: et, pour le sacrifice de communion, 2 bœufs, 5 béliers, 5 boucs et 5 agneaux d'un an. Telle fut l'offrande de Nathanaël, fils de Tsuar.
  '24':
  - type: text
    content: 'Le troisième jour, le prince des Zabulonites, Eliab, fils de Hélon, '
  '25':
  - type: text
    content: 'offrit un plat en argent qui pesait un kilo et 300 grammes et un bassin en argent de 700 grammes d''après la valeur étalon du sanctuaire. Ils étaient tous deux pleins de fleur de farine pétrie à l''huile pour l''offrande. '
  '26':
  - type: text
    content: 'Il offrit aussi une coupe en or qui pesait 100 grammes et était pleine de parfum, '
  '27':
  - type: text
    content: 'un jeune taureau, un bélier et un agneau d''un an pour l''holocauste, '
  '28':
  - type: text
    content: 'un bouc pour le sacrifice d''expiation '
  '29':
  - type: text
    content: et, pour le sacrifice de communion, 2 bœufs, 5 béliers, 5 boucs et 5 agneaux d'un an. Telle fut l'offrande d'Eliab, fils de Hélon.
  '3':
  - type: text
    content: 'Ils amenèrent leur offrande devant l''Eternel: 6 chars couverts et 12 bœufs – soit un char pour 2 princes et un bœuf pour chaque prince – et ils les offrirent devant le tabernacle.'
  '30':
  - type: text
    content: 'Le quatrième jour, le prince des Rubénites, Elitsur, fils de Shedéur, '
  '31':
