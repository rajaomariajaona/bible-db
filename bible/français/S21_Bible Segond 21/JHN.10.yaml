document_id: JHN.10,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus, le bon berger
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»En vérité, en vérité, je vous le dis, celui qui n''entre pas dans l''enclos des brebis par la porte mais s''y introduit par un autre endroit est un voleur et un brigand. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le voleur ne vient que pour voler, égorger et détruire; moi, je suis venu afin que les brebis aient la vie et qu'elles l'aient en abondance.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Je suis le bon berger. Le bon berger donne sa vie pour ses brebis. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le simple salarié, quant à lui, n''est pas le berger et les brebis ne lui appartiennent pas. Lorsqu''il voit venir le loup, il abandonne les brebis et prend la fuite; alors le loup s''en empare et les disperse. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '[Le simple salarié s''enfuit] car il travaille pour de l''argent et ne se soucie pas des brebis. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moi, je suis le bon berger. Je connais mes brebis et elles me connaissent, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tout comme le Père me connaît et comme je connais le Père. Je donne ma vie pour mes brebis. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J''ai encore d''autres brebis, qui ne sont pas de cet enclos; celles-là aussi, il faut que je les amène; elles écouteront ma voix et il y aura un seul troupeau, un seul berger. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le Père m''aime, parce que je donne ma vie pour la reprendre ensuite. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Personne ne me l'enlève, mais je la donne de moi-même. J'ai le pouvoir de la donner et j'ai le pouvoir de la reprendre. Tel est l'ordre que j'ai reçu de mon Père.»
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ces paroles provoquèrent de nouveau une division parmi les Juifs. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais celui qui entre par la porte est le berger des brebis. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Beaucoup d''entre eux disaient: «Il a un démon, il est fou. Pourquoi l''écoutez-vous?» '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'D''autres disaient: «Ce ne sont pas les paroles d''un démoniaque. Un démon peut-il ouvrir les yeux des aveugles?»'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On célébrait alors à Jérusalem la fête de la dédicace. C''était l''hiver. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus marchait dans le temple, sous le portique de Salomon. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les Juifs l''entourèrent et lui dirent: «Jusqu''à quand nous laisseras-tu dans l''incertitude? Si tu es le Messie, dis-le-nous franchement.»'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus leur répondit: «Je vous l''ai dit et vous ne croyez pas. Les œuvres que je fais au nom de mon Père témoignent en ma faveur, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mais vous ne croyez pas parce que vous ne faites pas partie de mes brebis, [comme je vous l''ai dit]. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mes brebis écoutent ma voix, je les connais et elles me suivent. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je leur donne la vie éternelle. Elles ne périront jamais et personne ne pourra les arracher à ma main. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mon Père, qui me les a données, est plus grand que tous et personne ne peut les arracher à la main de mon Père. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le gardien lui ouvre et les brebis écoutent sa voix; il appelle par leur nom les brebis qui lui appartiennent et il les conduit dehors. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le Père et moi, nous sommes un.»
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors les Juifs prirent de nouveau des pierres pour le lapider. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus leur dit: «Je vous ai fait voir beaucoup de belles œuvres qui viennent de mon Père. A cause de laquelle me lapidez-vous?» '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les Juifs lui répondirent: «Ce n''est pas pour une belle œuvre que nous te lapidons, mais pour un blasphème, parce que toi, qui es un être humain, tu te fais Dieu.» '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus leur répondit: «N''est-il pas écrit dans votre loi: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: 'J''ai dit: ‘Vous êtes des dieux’'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.34 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'J''ai dit… dieux: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation du '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Psaume 82.6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '? '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'S''il est vrai qu''elle a appelé '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: dieux
    - type: text
      text: ' ceux à qui la parole de Dieu a été adressée et si l''Ecriture ne peut pas être annulée, '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'comment pouvez-vous dire à celui que le Père a consacré et envoyé dans le monde: ‘Tu blasphèmes’, et cela parce que j''ai affirmé: ‘Je suis le Fils de Dieu’? '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si je ne fais pas les œuvres de mon Père, ne me croyez pas! '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais si je les fais, même si vous ne me croyez pas, croyez à ces œuvres afin de savoir et de reconnaître que le Père est en moi et que je suis en lui.» '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Voilà pourquoi ils cherchaient encore à l'arrêter, mais il leur échappa.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsqu''il les a [toutes] fait sortir, il marche devant elles et les brebis le suivent, parce qu''elles connaissent sa voix. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus retourna de l''autre côté du Jourdain, à l''endroit où Jean avait d''abord baptisé, et il y resta. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Beaucoup de gens vinrent vers lui; ils disaient: «Jean n''a fait aucun signe miraculeux, mais tout ce qu''il a dit à propos de cet homme était vrai.» '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et là, beaucoup crurent en lui.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elles ne suivront pas un étranger, mais elles fuiront au contraire loin de lui, parce qu''elles ne connaissent pas la voix des étrangers.» '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jésus leur dit cette parabole
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Parabole: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: histoire visant à faire comprendre une vérité spirituelle au moyen d'un exemple tiré de la vie courante.
      marker-yv: yv-n
    - type: text
      text: ', mais ils ne comprirent pas de quoi il leur parlait.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus leur dit encore: «En vérité, en vérité, je vous le dis, je suis la porte des brebis. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tous ceux qui sont venus avant moi sont des voleurs et des brigands, mais les brebis ne les ont pas écoutés. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C''est moi qui suis la porte. Si quelqu''un entre par moi, il sera sauvé; il entrera et sortira, et il trouvera de quoi se nourrir. '
