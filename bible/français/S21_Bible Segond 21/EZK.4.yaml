document_id: EZK.4,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Siège de Jérusalem
  - type: text
    content: '»Quant à toi, fils de l''homme, prends une brique, place-la devant toi, et dessus tu dessineras une ville: Jérusalem. '
  '10':
  - type: text
    content: 'Le poids de la nourriture que tu mangeras sera de 200 grammes par jour; tu en mangeras de temps à autre. '
  '11':
  - type: text
    content: 'La quantité d''eau que tu boiras sera de 6 décilitres; tu en boiras de temps à autre. '
  '12':
  - type: text
    content: 'Tu mangeras des gâteaux d''orge que tu feras cuire en leur présence à l''aide d''excréments humains.» '
  '13':
  - type: text
    content: 'L''Eternel a ajouté: «C''est ainsi que les Israélites mangeront leur pain impur, parmi les nations vers lesquelles je les chasserai.»'
  '14':
  - type: text
    content: 'J''ai répondu: «Ah! Seigneur Eternel, depuis mon enfance jusqu''à maintenant, je ne me suis pas rendu impur en mangeant une bête trouvée morte ou déchiquetée, et aucune viande infecte n''est entrée dans ma bouche!» '
  '15':
  - type: text
    content: 'Il m''a répondu: «Eh bien, je te donne le fumier du bétail au lieu d''excréments humains, et tu prépareras ton pain dessus.» '
  '16':
  - type: text
    content: 'Il a ajouté: «Fils de l''homme, je vais priver Jérusalem de pain. Ils mangeront du pain, mais de façon rationnée et dans l''angoisse, et ils boiront de l''eau en quantité limitée et avec frayeur. '
  '17':
  - type: text
    content: Ils manqueront ainsi de pain et d'eau, et ils seront consternés, les uns comme les autres. Ils dépériront à cause de leur faute.
  '2':
  - type: text
    content: 'Puis assiège-la, construis des retranchements contre elle, mets en place des remblais contre elle, dresse des armées en face d''elle et installe des machines de guerre tout autour d''elle! '
  '3':
  - type: text
    content: Prends une plaque de fer, dresse-la comme un mur de fer entre toi et la ville, et dirige ton regard sur elle. Elle sera assiégée, car tu l'assiégeras. Ce sera un signe pour la communauté d'Israël.
  '4':
  - type: text
    content: '»Ensuite, couche-toi sur le côté gauche et places-y la faute de la communauté d''Israël. Tu porteras leur faute sur toi tous les jours où tu seras couché sur ce côté. '
  '5':
  - type: text
    content: 'Je te fixe moi-même un nombre de jours qui correspond au nombre d''années marquées par leur faute: 390 jours. C''est ainsi que tu porteras la faute de la communauté d''Israël. '
  '6':
  - type: text
    content: 'Une fois cette période terminée, tu te coucheras encore, cette fois-ci sur le côté droit, et tu porteras la faute de la communauté de Juda pendant 40 jours: je te fixe un jour par année. '
  '7':
  - type: text
    content: 'Tu dirigeras ton regard et ton bras nu contre Jérusalem assiégée et tu prophétiseras contre elle. '
  '8':
  - type: text
    content: 'Je vais mettre des cordes sur toi afin que tu ne puisses pas changer de côté jusqu''à ce que tu sois arrivé au bout de ta période de siège. '
  '9':
  - type: text
    content: 'Prends du blé, de l''orge, des fèves, des lentilles, du millet et de l''épeautre! Mets-les dans un même récipient et fais-en du pain. Tu en mangeras tous les jours où tu seras couché sur le côté, à savoir durant 390 jours. '
