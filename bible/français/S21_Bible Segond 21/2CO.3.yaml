document_id: 2CO.3,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Commençons-nous de nouveau à nous recommander nous-mêmes? Ou avons-nous besoin, comme certains, de lettres de recommandation pour vous, ou alors de votre part? '
  '10':
  - type: text
    content: 'Et même, de ce point de vue, ce qui était glorieux a perdu son éclat à cause de la gloire qui lui est supérieure. '
  '11':
  - type: text
    content: En effet, si ce qui était passager a été marqué par la gloire, ce qui est permanent sera bien plus glorieux.
  '12':
  - type: text
    content: 'Puisque nous avons une telle espérance, nous faisons preuve d''une grande assurance. '
  '13':
  - type: text
    content: 'Nous ne faisons pas comme Moïse, qui mettait un voile sur son visage pour que les Israélites ne fixent pas les regards sur la fin d''une réalité passagère. '
  '14':
  - type: text
    content: 'Mais leur intelligence s''est obscurcie. Jusqu''à aujourd''hui en effet, le même voile reste lorsqu''ils font la lecture de l''Ancien Testament, et il ne se lève pas parce que c''est en Christ qu''il disparaît. '
  '15':
  - type: text
    content: 'Jusqu''à aujourd''hui, quand les écrits de Moïse sont lus, un voile recouvre leur cœur; '
  '16':
  - type: text
    content: 'mais lorsque quelqu''un se convertit au Seigneur, le voile est enlevé. '
  '17':
  - type: text
    content: 'Or le Seigneur, c''est l''Esprit, et là où est l''Esprit du Seigneur, là est la liberté. '
  '18':
  - type: text
    content: Nous tous qui, sans voile sur le visage, contemplons comme dans un miroir la gloire du Seigneur, nous sommes transformés à son image, de gloire en gloire
  - type: note
    content: 'De gloire en gloire: c''est-à-dire en progressant dans la sainteté ou bien en passant de la gloire terrestre à la gloire à venir.'
  - type: text
    content: ', par l''Esprit du Seigneur.'
  '2':
  - type: text
    content: 'C''est vous qui êtes notre lettre, écrite dans notre cœur, connue et lue de tous les hommes. '
  '3':
  - type: text
    content: Il est clair que vous êtes une lettre de Christ écrite par notre ministère, non avec de l'encre mais avec l'Esprit du Dieu vivant, non sur des tables de pierre mais sur des tables de chair, sur les cœurs.
  '4':
  - type: text
    content: 'Telle est l''assurance que nous avons par Christ auprès de Dieu. '
  '5':
  - type: text
    content: 'Je ne dis pas que nous soyons capables, par nous-mêmes, de concevoir quelque chose comme si cela venait de nous. Notre capacité, au contraire, vient de Dieu. '
  '6':
  - type: text
    content: Il nous a aussi rendus capables d'être serviteurs d'une nouvelle alliance, non de la lettre, mais de l'Esprit; car la lettre tue, mais l'Esprit fait vivre.
  '7':
  - type: text
    content: Or, si le ministère de la mort
  - type: note
    content: 'Le ministère de la mort: la loi promulguée par Moïse était porteuse de mort car personne n''est capable, par lui-même, de satisfaire à ses exigences; chacun mérite donc la condamnation à mort.'
  - type: text
    content: ', gravé avec des lettres sur des pierres, a été glorieux au point que les Israélites ne pouvaient pas fixer les regards sur le visage de Moïse à cause de la gloire dont il rayonnait et qui, pourtant, était passagère, '
  '8':
  - type: text
    content: 'combien le ministère de l''Esprit sera plus glorieux! '
  '9':
  - type: text
    content: 'En effet, si le ministère de la condamnation a été glorieux, le ministère de la justice est bien plus glorieux encore. '
