document_id: 2CO.3
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Commençons-nous de nouveau à nous recommander nous-mêmes? Ou avons-nous besoin, comme certains, de lettres de recommandation pour vous, ou alors de votre part? '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'C''est vous qui êtes notre lettre, écrite dans notre cœur, connue et lue de tous les hommes. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Il est clair que vous êtes une lettre de Christ écrite par notre ministère, non avec de l'encre mais avec l'Esprit du Dieu vivant, non sur des tables de pierre mais sur des tables de chair, sur les cœurs.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Telle est l''assurance que nous avons par Christ auprès de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Je ne dis pas que nous soyons capables, par nous-mêmes, de concevoir quelque chose comme si cela venait de nous. Notre capacité, au contraire, vient de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Il nous a aussi rendus capables d'être serviteurs d'une nouvelle alliance, non de la lettre, mais de l'Esprit; car la lettre tue, mais l'Esprit fait vivre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Or, si le ministère de la mort
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le ministère de la mort: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: la loi promulguée par Moïse était porteuse de mort car personne n'est capable, par lui-même, de satisfaire à ses exigences; chacun mérite donc la condamnation à mort.
    marker-yv: yv-n
  - type: text
    text: ', gravé avec des lettres sur des pierres, a été glorieux au point que les Israélites ne pouvaient pas fixer les regards sur le visage de Moïse à cause de la gloire dont il rayonnait et qui, pourtant, était passagère, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'combien le ministère de l''Esprit sera plus glorieux! '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'En effet, si le ministère de la condamnation a été glorieux, le ministère de la justice est bien plus glorieux encore. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Et même, de ce point de vue, ce qui était glorieux a perdu son éclat à cause de la gloire qui lui est supérieure. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: En effet, si ce qui était passager a été marqué par la gloire, ce qui est permanent sera bien plus glorieux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Puisque nous avons une telle espérance, nous faisons preuve d''une grande assurance. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nous ne faisons pas comme Moïse, qui mettait un voile sur son visage pour que les Israélites ne fixent pas les regards sur la fin d''une réalité passagère. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Mais leur intelligence s''est obscurcie. Jusqu''à aujourd''hui en effet, le même voile reste lorsqu''ils font la lecture de l''Ancien Testament, et il ne se lève pas parce que c''est en Christ qu''il disparaît. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Jusqu''à aujourd''hui, quand les écrits de Moïse sont lus, un voile recouvre leur cœur; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'mais lorsque quelqu''un se convertit au Seigneur, le voile est enlevé. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Or le Seigneur, c''est l''Esprit, et là où est l''Esprit du Seigneur, là est la liberté. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Nous tous qui, sans voile sur le visage, contemplons comme dans un miroir la gloire du Seigneur, nous sommes transformés à son image, de gloire en gloire
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'De gloire en gloire: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: c'est-à-dire en progressant dans la sainteté ou bien en passant de la gloire terrestre à la gloire à venir.
    marker-yv: yv-n
  - type: text
    text: ', par l''Esprit du Seigneur.'
