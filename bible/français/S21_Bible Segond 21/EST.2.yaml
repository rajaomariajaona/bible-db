document_id: EST.2,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Choix d'Esther comme reine
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Après ces événements, une fois sa colère apaisée, le roi Assuérus pensa avec regret à Vasthi, à ce qu''elle avait fait et à la décision qui avait été prise à son sujet. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Esther ne révéla ni son origine ni sa famille, car Mardochée lui avait interdit de le faire. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Chaque jour il se promenait devant la cour du harem pour s'assurer du bien-être d'Esther et de la façon dont on la traitait.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Chaque jeune fille devait se rendre vers le roi Assuérus lorsque c''était son tour, soit après 12 mois passés à prendre soin de son corps, conformément à la règle en vigueur pour les femmes: 6 mois avec de l''huile de myrrhe et 6 mois avec des aromates et des produits cosmétiques spécifiquement féminins. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'C''est ainsi que chaque jeune fille se rendait vers le roi. Quand elle passait du harem au palais, on lui permettait de prendre avec elle tout ce qu''elle demandait. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Elle y allait le soir, et le lendemain matin elle passait dans le second harem, sous l'autorité de Shaashgaz, l'eunuque du roi responsable des concubines. Elle ne retournait plus vers le roi, à moins que celui-ci n'ait envie d'elle et qu'elle ne soit nommément appelée.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Lorsque son tour d''aller vers le roi arriva, Esther, fille d''Abichaïl – l''oncle de Mardochée, celui qui l''avait adoptée – ne réclama que ce que lui conseilla Hégaï, l''eunuque du roi responsable des femmes. Elle gagnait les faveurs de tous ceux qui la voyaient. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Esther fut conduite vers le roi Assuérus, dans son palais royal, le dixième mois – c''est-à-dire le mois de Tébeth – la septième année de son règne. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Le roi préféra Esther à toutes les autres femmes, elle gagna ses faveurs et sa sympathie plus que toutes les autres jeunes filles. Il mit la couronne royale sur sa tête et la proclama reine à la place de Vasthi. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Le roi organisa un grand banquet pour tous ses princes et serviteurs, et ce en l'honneur d'Esther. Il accorda aussi des dispenses d'impôts aux provinces et distribua des cadeaux avec une générosité toute royale.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Echec d'un complot grâce à Mardochée
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'La deuxième fois qu''on rassembla des jeunes filles, Mardochée était assis à la porte du roi. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Alors les jeunes serviteurs du roi dirent: «Qu''on recherche des jeunes filles qui soient vierges et belles pour le roi. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Esther n''avait toujours pas révélé ni sa famille ni son origine, car Mardochée le lui avait interdit, et elle respectait ses ordres comme lorsqu''elle était sous sa tutelle. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'A ce moment-là, Mardochée était donc assis à la porte du roi. Bigthan et Théresh, deux eunuques du roi qui avaient la garde de l''entrée, eurent un mouvement d''irritation et cherchèrent à porter la main contre le roi Assuérus. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Mardochée en fut informé et le révéla à la reine Esther, qui parla de sa part au roi. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: L'information fut vérifiée et confirmée, de sorte que les deux eunuques furent pendus à une potence. Tout cela fut enregistré par écrit dans les annales en présence du roi.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Que le roi désigne, dans toutes les provinces de son royaume, des inspecteurs chargés de rassembler toutes les jeunes filles vierges et belles à Suse, la capitale, dans le harem, sous l''autorité d''Hégaï, l''eunuque du roi responsable des femmes! Il leur fournira les produits cosmétiques nécessaires, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: et la jeune fille qui plaira au roi deviendra reine à la place de Vasthi.» Le roi trouva le conseil bon et s'y conforma.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Il y avait à Suse, la capitale, un Juif du nom de Mardochée. C''était un fils de Jaïr, un descendant de Shimeï et de Kis, un Benjaminite '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'qui avait quitté Jérusalem en compagnie du groupe d''exilés partis avec Jéconia, le roi de Juda, sur ordre de Nebucadnetsar, le roi de Babylone. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Il se chargeait de l'éducation d'Hadassa, alias Esther, la fille de son oncle, car elle n'avait plus ni père ni mère. Cette jeune fille était belle à tout point de vue. A la mort de ses parents, Mardochée l'avait adoptée.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Lorsqu''on proclama le message du roi, qui avait valeur de loi, et qu''on rassembla un grand nombre de jeunes filles à Suse, la capitale, sous l''autorité d''Hégaï, Esther fut aussi prise. Elle fut conduite au palais et placée sous l''autorité d''Hégaï, le responsable des femmes. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: La jeune fille lui plut et gagna sa sympathie. Il s'empressa de lui fournir les produits cosmétiques et les éléments dont elle avait besoin. Il lui donna aussi sept jeunes filles sélectionnées parmi le personnel du palais, puis il la déplaça avec ses suivantes dans le meilleur appartement du harem.
