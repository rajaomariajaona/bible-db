document_id: ACT.16
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Il se rendit ensuite à Derbe et à Lystre. Il y avait là un disciple appelé Timothée, fils d''une femme juive croyante et d''un père grec. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Les frères de Lystre et d''Iconium rendaient un bon témoignage de lui. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Paul voulut l''emmener avec lui; il le prit et le circoncit à cause des Juifs qui étaient dans ces régions, car tous savaient que son père était grec. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dans les villes où ils passaient, ils transmettaient aux frères les décisions prises par les apôtres et les anciens de Jérusalem en recommandant de les respecter. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Les Eglises se fortifiaient dans la foi et augmentaient en nombre chaque jour.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Empêchés par le Saint-Esprit d''annoncer la parole en Asie, ils traversèrent la Phrygie et la Galatie. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Arrivés près de la Mysie, ils se préparaient à entrer en Bithynie, mais l''Esprit [de Jésus] ne le leur permit pas. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ils traversèrent alors la Mysie et descendirent à Troas. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Pendant la nuit, Paul eut une vision; un Macédonien lui apparut et le supplia: «Passe en Macédoine, secours-nous!»'
- type: usfm
  marker: s1
  children:
  - type: text
    text: L'Evangile à Philippes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Suite à cette vision de Paul, nous avons aussitôt cherché à nous rendre en Macédoine, concluant que le Seigneur nous appelait à y annoncer la bonne nouvelle. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Après avoir embarqué à Troas, nous avons fait voile directement vers Samothrace, et le lendemain vers Néapolis. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'De là nous sommes allés à Philippes qui est la première ville du district de Macédoine et une colonie. Nous avons passé quelques jours dans la ville même. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Le jour du sabbat, nous nous sommes rendus à l''extérieur de la ville, au bord d''une rivière où nous pensions trouver un lieu de prière. Nous nous sommes assis et avons parlé aux femmes qui étaient réunies. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: L'une d'elles s'appelait Lydie. C'était une marchande de pourpre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Pourpre: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: substance colorante extraite de mollusques, utilisée pour teindre des étoffes et des vêtements chers.
    marker-yv: yv-n
  - type: text
    text: ' originaire de la ville de Thyatire, qui craignait Dieu. Elle nous écoutait et le Seigneur a ouvert son cœur pour qu''elle soit attentive à ce que disait Paul. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Après avoir été baptisée avec sa famille, elle nous a invités en disant: «Si vous me jugez fidèle au Seigneur, entrez dans ma maison et logez-y», et elle a fortement insisté pour que nous acceptions.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Alors que nous nous rendions au lieu de prière, une jeune esclave qui avait un esprit de divination est venue à notre rencontre. Par ses prédictions, elle procurait un grand profit à ses maîtres. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Elle s''est mise à nous suivre, Paul et nous, en criant: «Ces hommes sont les serviteurs du Dieu très-haut et ils nous annoncent le chemin du salut.» '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Elle a fait cela pendant plusieurs jours. Paul, agacé, s''est retourné et a dit à l''esprit: «Je t''ordonne, au nom de Jésus-Christ, de sortir d''elle.» Il est sorti au moment même.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Quand les maîtres de la servante ont vu disparaître l''espoir de leur gain, ils se sont emparés de Paul et Silas et les ont traînés sur la place publique devant les magistrats. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ils les ont présentés aux juges en disant: «Ces hommes sèment le trouble dans notre ville. Ce sont des Juifs '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'et ils annoncent des coutumes qu''il ne nous est pas permis d''accepter ni de suivre, à nous qui sommes romains.» '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'La foule s''est aussi soulevée contre eux, et les juges ont fait arracher leurs vêtements et ordonné qu''on les batte à coups de fouet. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Après les avoir roués de coups, ils les ont jetés en prison en recommandant au gardien de la prison de les surveiller de près. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Face à une telle consigne, le gardien les a jetés dans la prison intérieure et a emprisonné leurs pieds dans des entraves
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.24 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Entraves: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: cadres de bois dans lesquels on enfermait les pieds et qui maintenaient le prisonnier assis.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Vers le milieu de la nuit, Paul et Silas priaient et chantaient les louanges de Dieu, et les prisonniers les écoutaient. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Tout à coup, il y a eu un tremblement de terre si violent que les fondations de la prison ont été ébranlées. Toutes les portes se sont immédiatement ouvertes et les liens de tous les prisonniers ont été détachés. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Lorsque le gardien de la prison s''est réveillé et a vu les portes de la prison ouvertes, il a tiré son épée, prêt à se tuer car il croyait que les prisonniers s''étaient enfuis. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Mais Paul a crié d''une voix forte: «Ne te fais pas de mal, car nous sommes tous ici.» '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Alors le gardien a demandé de la lumière, est entré précipitamment et s''est jeté tout tremblant aux pieds de Paul et de Silas. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Il les a fait sortir et a dit: «Seigneurs, que faut-il que je fasse pour être sauvé?» '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Paul et Silas ont répondu: «Crois au Seigneur Jésus[-Christ] et tu seras sauvé, toi et ta famille.» '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Et ils lui ont annoncé la parole du Seigneur, ainsi qu''à tous ceux qui étaient dans sa maison. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'A cette heure-là de la nuit, le gardien les a emmenés pour laver leurs plaies. Il a immédiatement été baptisé, lui et tous les siens. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Après les avoir conduits chez lui, il leur a servi à manger. Il se réjouissait avec toute sa famille d'avoir cru en Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Quand il a fait jour, les juges ont envoyé leurs agents dire au gardien de la prison: «Relâche ces hommes.» '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Le gardien a rapporté ces paroles à Paul: «Les juges ont fait dire de vous relâcher. Sortez donc maintenant et partez dans la paix!» '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Mais Paul a dit aux agents: «Après nous avoir fait battre en public et sans jugement alors que nous sommes romains, ils nous ont jetés en prison, et maintenant ils nous feraient sortir en secret? Il n''en est pas question. Qu''ils viennent eux-mêmes nous remettre en liberté!» '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Les agents ont rapporté ces paroles aux juges, qui ont été effrayés en apprenant que Paul et Silas étaient romains. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ils sont venus leur présenter des excuses et les ont libérés en leur demandant de quitter la ville. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Une fois sortis de la prison, ils sont entrés chez Lydie et, après avoir vu et encouragé les frères et sœurs, ils sont partis.
