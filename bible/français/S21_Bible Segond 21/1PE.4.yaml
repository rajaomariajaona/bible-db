document_id: 1PE.4,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ainsi donc, puisque Christ a souffert [pour nous] dans son corps, vous aussi armez-vous de la même pensée: celui qui a souffert dans son corps en a fini avec le péché '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Comme de bons intendants des diverses grâces de Dieu, mettez chacun au service des autres le don que vous avez reçu. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Si quelqu'un parle, qu'il annonce les paroles révélées de Dieu; si quelqu'un accomplit un service, qu'il le fasse avec la force que Dieu communique, afin qu'en tout Dieu reçoive la gloire qui lui est due à travers Jésus-Christ. C'est à lui qu'appartiennent la gloire et la puissance, aux siècles des siècles. Amen!
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Mes bien-aimés, ne soyez pas surpris de la fournaise qui sévit parmi vous pour vous éprouver, comme s''il vous arrivait quelque chose d''étrange. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Réjouissez-vous, au contraire, de la part que vous prenez aux souffrances de Christ, afin d'être aussi dans la joie et dans l'allégresse lorsque sa gloire sera dévoilée.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Si vous êtes insultés à cause du nom de Christ, vous êtes heureux, parce que l''Esprit de gloire, l''Esprit de Dieu, repose sur vous. [Eux, ils blasphèment l''Esprit, tandis que vous, vous lui rendez gloire.] '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Que personne parmi vous n''ait à souffrir pour avoir tué, volé, fait le mal ou pour s''être mêlé des affaires d''autrui. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Mais si quelqu''un souffre parce qu''il est chrétien, qu''il n''en ait pas honte. Au contraire, qu''il rende gloire à Dieu dans cette situation. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'En effet, c''est le moment où le jugement commence, et il commence par la maison de Dieu. Or, si c''est par nous qu''il débute, quelle sera la fin de ceux qui n''obéissent pas à l''Evangile de Dieu? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Et si le juste est sauvé avec peine, que deviendront l'impie et le pécheur?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Et si… pécheur: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Proverbes 11.31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ainsi, que ceux qui souffrent selon la volonté de Dieu s'en remettent à lui comme au fidèle Créateur, en faisant ce qui est bien.
  '2':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'afin de ne plus vivre en suivant les désirs des hommes, mais la volonté de Dieu, pendant le temps qu''il lui reste à vivre ici-bas. '
  '3':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'C''est déjà bien suffisant d''avoir par le passé accompli la volonté des non-croyants en marchant dans les désordres, les convoitises, l''ivrognerie, les orgies et autres beuveries ainsi que dans les idolâtries criminelles. '
  '4':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Aussi trouvent-ils étrange que vous ne vous précipitiez plus avec eux dans le même débordement de débauche, et ils vous calomnient. '
  '5':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ils rendront des comptes à celui qui est prêt à juger les vivants et les morts. '
  '6':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: En effet, l'Evangile a aussi été annoncé aux morts
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Aux morts: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: c'est-à-dire à ceux qui sont maintenant décédés, après avoir entendu et accepté l'Evangile.
      marker-yv: yv-n
    - type: text
      text: ' afin qu''après avoir été jugés comme tous les hommes ici-bas ils vivent selon Dieu par l''Esprit.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'La fin de toutes choses est proche. Soyez donc sages et sobres afin de vous livrer à la prière. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Avant tout, ayez un amour ardent les uns pour les autres, car '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: l'amour couvrira une foule de péchés
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'L''amour… péchés: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Proverbes 10.12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Exercez l'hospitalité les uns envers les autres sans murmurer.
