document_id: PSA.123,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Prière pour le peuple opprimé
  - type: text
    content: Chant des montées.
  - type: text
    content: J'ai levé les yeux vers toi,
  - type: text
    content: qui sièges dans le ciel.
  '2':
  - type: text
    content: Oui, tout comme les yeux des serviteurs sont fixés sur la main de leur maître,
  - type: text
    content: et les yeux de la servante sur la main de sa maîtresse,
  - type: text
    content: ainsi nos yeux se tournent vers l'Eternel, notre Dieu,
  - type: text
    content: jusqu'à ce qu'il nous fasse grâce.
  '3':
  - type: text
    content: Fais-nous grâce, Eternel, fais-nous grâce,
  - type: text
    content: car nous n'en pouvons plus d'être méprisés,
  '4':
  - type: text
    content: nous en avons plus qu'assez des moqueries
  - type: text
    content: des orgueilleux, du mépris des hautains!
