document_id: PSA.123,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prière pour le peuple opprimé
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Chant des montées.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J'ai levé les yeux vers toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui sièges dans le ciel.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Oui, tout comme les yeux des serviteurs sont fixés sur la main de leur maître,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les yeux de la servante sur la main de sa maîtresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ainsi nos yeux se tournent vers l'Eternel, notre Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: jusqu'à ce qu'il nous fasse grâce.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Fais-nous grâce, Eternel, fais-nous grâce,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car nous n'en pouvons plus d'être méprisés,
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: nous en avons plus qu'assez des moqueries
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des orgueilleux, du mépris des hautains!
