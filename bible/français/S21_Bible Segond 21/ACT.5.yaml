document_id: ACT.5
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Cependant, un homme appelé Ananias, avec Saphira sa femme, vendit une propriété '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'et garda une partie du prix, en accord avec sa femme. Il apporta le reste et le déposa aux pieds des apôtres. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Pierre lui dit: «Ananias, pourquoi Satan a-t-il rempli ton cœur, au point que tu aies menti au Saint-Esprit et gardé une partie du prix du champ? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'S''il n''avait pas été vendu, ne te restait-il pas? Et, après l''avoir vendu, n''avais-tu pas le droit de disposer du prix? Comment as-tu pu former dans ton cœur un projet pareil? Ce n''est pas à des hommes que tu as menti, mais à Dieu.» '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Quand Ananias entendit ces paroles, il tomba et expira. Une grande crainte s''empara de tous ceux qui l''apprirent. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Les jeunes gens se levèrent pour envelopper le corps, puis ils l'emportèrent pour l'enterrer.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Environ trois heures plus tard, sa femme entra sans savoir ce qui était arrivé. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Pierre lui adressa la parole: «Dis-moi, est-ce bien à ce prix que vous avez vendu le champ?» «Oui, répondit-elle, c''est à ce prix-là.» '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Alors Pierre lui dit: «Comment avez-vous pu vous mettre d''accord pour provoquer l''Esprit du Seigneur? Ceux qui ont enterré ton mari sont à la porte et ils vont t''emporter, toi aussi.» '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Elle tomba immédiatement aux pieds de l''apôtre et expira. Quand les jeunes gens rentrèrent, ils la trouvèrent morte et l''emportèrent pour l''enterrer à côté de son mari. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Une grande crainte s'empara de toute l'Eglise et de tous ceux qui apprirent ces événements.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Arrestation des apôtres
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Beaucoup de signes miraculeux et de prodiges se faisaient au milieu du peuple par l''intermédiaire des apôtres. Ils se tenaient tous d''un commun accord au portique de Salomon. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Personne d''autre n''osait se joindre à eux, mais le peuple les tenait en grande estime. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Le nombre de ceux qui croyaient au Seigneur, hommes et femmes, augmentait de plus en plus. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'On en venait à sortir les malades dans les rues et à les placer sur des civières et des brancards afin que, lorsque Pierre passerait, son ombre au moins couvre l''un d''eux. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Une foule de gens accouraient aussi des villes voisines vers Jérusalem; ils amenaient des malades et des personnes tourmentées par des esprits impurs, et tous étaient guéris.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Alors le grand-prêtre et tous ceux qui étaient avec lui, c''est-à-dire le parti des sadducéens, se levèrent, remplis de jalousie. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ils firent arrêter les apôtres et les jetèrent dans la prison publique. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Mais, pendant la nuit, un ange du Seigneur ouvrit les portes de la prison, les fit sortir et leur dit: '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '«Allez-y, tenez-vous dans le temple et annoncez au peuple toutes les paroles de la vie nouvelle.» '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Après avoir entendu cela, ils entrèrent de bonne heure dans le temple et se mirent à enseigner. Quand le grand-prêtre et ceux qui étaient avec lui arrivèrent, ils convoquèrent le sanhédrin et tout le conseil des anciens d''Israël, et ils envoyèrent chercher les apôtres à la prison. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Cependant, les gardes, à leur arrivée, ne les trouvèrent pas dans la prison. Ils repartirent et firent leur rapport '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'en disant: «Nous avons trouvé la prison soigneusement fermée, et les gardiens devant les portes, mais quand nous avons ouvert, nous n''avons trouvé personne à l''intérieur.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'A l''écoute de ces paroles, le commandant des gardes du temple et les chefs des prêtres se montrèrent perplexes, ne sachant que penser de cette affaire. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Quelqu''un vint leur dire: «Les hommes que vous avez mis en prison sont dans le temple et enseignent le peuple.» '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Alors le commandant partit avec les gardes et les ramena, mais sans violence car ils avaient peur d''être lapidés par le peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Après les avoir ramenés, ils les présentèrent au sanhédrin. Le grand-prêtre les interrogea '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'en disant: «Nous vous avions formellement interdit d''enseigner en ce nom-là, et voilà que vous avez rempli Jérusalem de votre enseignement et que vous voulez faire retomber sur nous le sang de cet homme!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Pierre et les apôtres répondirent: «Il faut obéir à Dieu plutôt qu''aux hommes. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Le Dieu de nos ancêtres a ressuscité Jésus, que vous avez tué en le clouant sur le bois. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Dieu l'a élevé à sa droite comme Prince et Sauveur pour donner à Israël la repentance
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.31 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'La repentance: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: désignant littéralement un changement de pensée, le mot renvoie à une transformation radicale de la personne, qui renonce à ses attitudes fautives pour adopter un nouveau comportement et une nouvelle perspective, conformes à la volonté de Dieu.
    marker-yv: yv-n
  - type: text
    text: ' et le pardon des péchés. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Nous sommes témoins de ces événements, de même que le Saint-Esprit que Dieu a donné à ceux qui lui obéissent.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Furieux de ces paroles, ils voulaient les faire mourir. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Mais un pharisien
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.34 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Pharisien: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: membre d'un courant du judaïsme caractérisé par un fort intérêt pour les questions de pureté rituelle et par le souci de respecter le plus strictement possible la loi de Moïse ainsi que les traditions.
    marker-yv: yv-n
  - type: text
    text: ' du nom de Gamaliel, professeur de la loi estimé de tout le peuple, se leva dans le sanhédrin et ordonna de faire sortir un instant les apôtres. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Puis il leur dit: «Israélites, faites attention à ce que vous allez faire vis-à-vis de ces hommes. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'En effet, il y a quelque temps, Theudas est apparu; il prétendait être quelqu''un et environ 400 hommes se sont ralliés à lui. Il a été tué et tous ses partisans ont été mis en déroute, il n''en est rien resté. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Après lui est apparu Judas le Galiléen, à l''époque du recensement, et il a attiré du monde à sa suite. Lui aussi est mort et tous ses partisans ont été dispersés. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Maintenant, je vous le dis, ne vous occupez plus de ces hommes et laissez-les faire. Si cette entreprise ou cette activité vient des êtres humains, elle se détruira; '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: en revanche, si elle vient de Dieu, vous ne pourrez pas la détruire. Ne courez pas le risque de combattre contre Dieu!»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Ils se rangèrent à son avis. Ils appelèrent les apôtres, les firent fouetter, leur interdirent de parler au nom de Jésus et les relâchèrent.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Les apôtres quittèrent le sanhédrin, joyeux d''avoir été jugés dignes d''être maltraités pour le nom [de Jésus]. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Et chaque jour, dans le temple et dans les maisons, ils ne cessaient pas d'enseigner et d'annoncer la bonne nouvelle de Jésus le Messie.
