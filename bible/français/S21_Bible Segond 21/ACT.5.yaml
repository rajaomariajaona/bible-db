document_id: ACT.5,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Cependant, un homme appelé Ananias, avec Saphira sa femme, vendit une propriété '
  '10':
  - type: text
    content: 'Elle tomba immédiatement aux pieds de l''apôtre et expira. Quand les jeunes gens rentrèrent, ils la trouvèrent morte et l''emportèrent pour l''enterrer à côté de son mari. '
  '11':
  - type: text
    content: Une grande crainte s'empara de toute l'Eglise et de tous ceux qui apprirent ces événements.
  - type: heading
    content: Arrestation des apôtres
  '12':
  - type: text
    content: 'Beaucoup de signes miraculeux et de prodiges se faisaient au milieu du peuple par l''intermédiaire des apôtres. Ils se tenaient tous d''un commun accord au portique de Salomon. '
  '13':
  - type: text
    content: 'Personne d''autre n''osait se joindre à eux, mais le peuple les tenait en grande estime. '
  '14':
  - type: text
    content: 'Le nombre de ceux qui croyaient au Seigneur, hommes et femmes, augmentait de plus en plus. '
  '15':
  - type: text
    content: 'On en venait à sortir les malades dans les rues et à les placer sur des civières et des brancards afin que, lorsque Pierre passerait, son ombre au moins couvre l''un d''eux. '
  '16':
  - type: text
    content: Une foule de gens accouraient aussi des villes voisines vers Jérusalem; ils amenaient des malades et des personnes tourmentées par des esprits impurs, et tous étaient guéris.
  '17':
  - type: text
    content: 'Alors le grand-prêtre et tous ceux qui étaient avec lui, c''est-à-dire le parti des sadducéens, se levèrent, remplis de jalousie. '
  '18':
  - type: text
    content: 'Ils firent arrêter les apôtres et les jetèrent dans la prison publique. '
  '19':
  - type: text
    content: 'Mais, pendant la nuit, un ange du Seigneur ouvrit les portes de la prison, les fit sortir et leur dit: '
  '2':
  - type: text
    content: 'et garda une partie du prix, en accord avec sa femme. Il apporta le reste et le déposa aux pieds des apôtres. '
  '20':
  - type: text
    content: '«Allez-y, tenez-vous dans le temple et annoncez au peuple toutes les paroles de la vie nouvelle.» '
  '21':
  - type: text
    content: 'Après avoir entendu cela, ils entrèrent de bonne heure dans le temple et se mirent à enseigner. Quand le grand-prêtre et ceux qui étaient avec lui arrivèrent, ils convoquèrent le sanhédrin et tout le conseil des anciens d''Israël, et ils envoyèrent chercher les apôtres à la prison. '
  '22':
  - type: text
    content: 'Cependant, les gardes, à leur arrivée, ne les trouvèrent pas dans la prison. Ils repartirent et firent leur rapport '
  '23':
  - type: text
    content: 'en disant: «Nous avons trouvé la prison soigneusement fermée, et les gardiens devant les portes, mais quand nous avons ouvert, nous n''avons trouvé personne à l''intérieur.»'
  '24':
  - type: text
    content: 'A l''écoute de ces paroles, le commandant des gardes du temple et les chefs des prêtres se montrèrent perplexes, ne sachant que penser de cette affaire. '
  '25':
  - type: text
    content: 'Quelqu''un vint leur dire: «Les hommes que vous avez mis en prison sont dans le temple et enseignent le peuple.» '
  '26':
  - type: text
    content: 'Alors le commandant partit avec les gardes et les ramena, mais sans violence car ils avaient peur d''être lapidés par le peuple. '
  '27':
  - type: text
    content: 'Après les avoir ramenés, ils les présentèrent au sanhédrin. Le grand-prêtre les interrogea '
  '28':
  - type: text
    content: 'en disant: «Nous vous avions formellement interdit d''enseigner en ce nom-là, et voilà que vous avez rempli Jérusalem de votre enseignement et que vous voulez faire retomber sur nous le sang de cet homme!»'
  '29':
  - type: text
    content: 'Pierre et les apôtres répondirent: «Il faut obéir à Dieu plutôt qu''aux hommes. '
  '3':
  - type: text
    content: 'Pierre lui dit: «Ananias, pourquoi Satan a-t-il rempli ton cœur, au point que tu aies menti au Saint-Esprit et gardé une partie du prix du champ? '
  '30':
  - type: text
    content: 'Le Dieu de nos ancêtres a ressuscité Jésus, que vous avez tué en le clouant sur le bois. '
  '31':
  - type: text
    content: Dieu l'a élevé à sa droite comme Prince et Sauveur pour donner à Israël la repentance
  - type: note
    content: 'La repentance: désignant littéralement un changement de pensée, le mot renvoie à une transformation radicale de la personne, qui renonce à ses attitudes fautives pour adopter un nouveau comportement et une nouvelle perspective, conformes à la volonté de Dieu.'
  - type: text
    content: ' et le pardon des péchés. '
  '32':
  - type: text
    content: Nous sommes témoins de ces événements, de même que le Saint-Esprit que Dieu a donné à ceux qui lui obéissent.»
  '33':
  - type: text
    content: 'Furieux de ces paroles, ils voulaient les faire mourir. '
  '34':
  - type: text
    content: Mais un pharisien
  - type: note
    content: 'Pharisien: membre d''un courant du judaïsme caractérisé par un fort intérêt pour les questions de pureté rituelle et par le souci de respecter le plus strictement possible la loi de Moïse ainsi que les traditions.'
  - type: text
    content: ' du nom de Gamaliel, professeur de la loi estimé de tout le peuple, se leva dans le sanhédrin et ordonna de faire sortir un instant les apôtres. '
  '35':
  - type: text
    content: 'Puis il leur dit: «Israélites, faites attention à ce que vous allez faire vis-à-vis de ces hommes. '
  '36':
  - type: text
    content: 'En effet, il y a quelque temps, Theudas est apparu; il prétendait être quelqu''un et environ 400 hommes se sont ralliés à lui. Il a été tué et tous ses partisans ont été mis en déroute, il n''en est rien resté. '
  '37':
  - type: text
    content: 'Après lui est apparu Judas le Galiléen, à l''époque du recensement, et il a attiré du monde à sa suite. Lui aussi est mort et tous ses partisans ont été dispersés. '
  '38':
  - type: text
    content: 'Maintenant, je vous le dis, ne vous occupez plus de ces hommes et laissez-les faire. Si cette entreprise ou cette activité vient des êtres humains, elle se détruira; '
  '39':
  - type: text
    content: en revanche, si elle vient de Dieu, vous ne pourrez pas la détruire. Ne courez pas le risque de combattre contre Dieu!»
  '4':
  - type: text
    content: 'S''il n''avait pas été vendu, ne te restait-il pas? Et, après l''avoir vendu, n''avais-tu pas le droit de disposer du prix? Comment as-tu pu former dans ton cœur un projet pareil? Ce n''est pas à des hommes que tu as menti, mais à Dieu.» '
  '40':
  - type: text
    content: Ils se rangèrent à son avis. Ils appelèrent les apôtres, les firent fouetter, leur interdirent de parler au nom de Jésus et les relâchèrent.
  '41':
  - type: text
    content: 'Les apôtres quittèrent le sanhédrin, joyeux d''avoir été jugés dignes d''être maltraités pour le nom [de Jésus]. '
  '42':
  - type: text
    content: Et chaque jour, dans le temple et dans les maisons, ils ne cessaient pas d'enseigner et d'annoncer la bonne nouvelle de Jésus le Messie.
  '5':
  - type: text
    content: 'Quand Ananias entendit ces paroles, il tomba et expira. Une grande crainte s''empara de tous ceux qui l''apprirent. '
  '6':
  - type: text
    content: Les jeunes gens se levèrent pour envelopper le corps, puis ils l'emportèrent pour l'enterrer.
  '7':
  - type: text
    content: 'Environ trois heures plus tard, sa femme entra sans savoir ce qui était arrivé. '
  '8':
  - type: text
    content: 'Pierre lui adressa la parole: «Dis-moi, est-ce bien à ce prix que vous avez vendu le champ?» «Oui, répondit-elle, c''est à ce prix-là.» '
  '9':
  - type: text
    content: 'Alors Pierre lui dit: «Comment avez-vous pu vous mettre d''accord pour provoquer l''Esprit du Seigneur? Ceux qui ont enterré ton mari sont à la porte et ils vont t''emporter, toi aussi.» '
