document_id: PSA.75,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu, le juge souverain
  - type: text
    content: Au chef de chœur, sur la mélodie de «Ne détruis pas». Psaume, chant d'Asaph.
  '10':
  - type: text
    content: Quant à moi, je ne cesserai d'annoncer cela,
  - type: text
    content: je chanterai en l'honneur du Dieu de Jacob.
  '11':
  - type: text
    content: J'abattrai toutes les forces des méchants,
  - type: text
    content: mais les forces du juste seront relevées.
  '2':
  - type: text
    content: Nous te louons, ô Dieu, nous te louons.
  - type: text
    content: Ton nom est dans nos bouches,
  - type: text
    content: nous proclamons tes merveilles.
  '3':
  - type: text
    content: Au moment que j'aurai fixé,
  - type: text
    content: je jugerai avec droiture.
  '4':
  - type: text
    content: La terre tremble avec tous ceux qui l'habitent,
  - type: text
    content: 'mais moi, j''affermis ses piliers. '
  - type: text
    content: – Pause.
  '5':
  - type: text
    content: 'Je dis à ceux qui se vantent: «Ne vous vantez pas!»'
  - type: text
    content: 'et aux méchants: «Ne levez pas la tête!»'
  '6':
  - type: text
    content: Ne levez pas si haut votre tête,
  - type: text
    content: ne parlez pas avec tant d'arrogance,
  '7':
  - type: text
    content: car ce n'est ni de l'est, ni de l'ouest,
  - type: text
    content: ni du désert que vient la grandeur.
  '8':
  - type: text
    content: 'En effet, c''est Dieu qui juge:'
  - type: text
    content: il abaisse l'un et il élève l'autre.
  '9':
  - type: text
    content: Il y a dans la main de l'Eternel une coupe
  - type: text
    content: où fermente un vin plein de liqueurs mêlées.
  - type: text
    content: Il en verse, et tous les méchants de la terre
  - type: text
    content: boivent, ils vident la coupe jusqu'à la lie.
