document_id: PSA.75,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dieu, le juge souverain
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Au chef de chœur, sur la mélodie de «Ne détruis pas». Psaume, chant d'Asaph.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Quant à moi, je ne cesserai d'annoncer cela,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je chanterai en l'honneur du Dieu de Jacob.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: J'abattrai toutes les forces des méchants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais les forces du juste seront relevées.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Nous te louons, ô Dieu, nous te louons.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ton nom est dans nos bouches,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nous proclamons tes merveilles.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Au moment que j'aurai fixé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je jugerai avec droiture.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: La terre tremble avec tous ceux qui l'habitent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'mais moi, j''affermis ses piliers. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: – Pause.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Je dis à ceux qui se vantent: «Ne vous vantez pas!»'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et aux méchants: «Ne levez pas la tête!»'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ne levez pas si haut votre tête,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne parlez pas avec tant d'arrogance,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: car ce n'est ni de l'est, ni de l'ouest,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ni du désert que vient la grandeur.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'En effet, c''est Dieu qui juge:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il abaisse l'un et il élève l'autre.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Il y a dans la main de l'Eternel une coupe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: où fermente un vin plein de liqueurs mêlées.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il en verse, et tous les méchants de la terre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: boivent, ils vident la coupe jusqu'à la lie.
