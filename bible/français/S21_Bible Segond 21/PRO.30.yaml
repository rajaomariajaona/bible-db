document_id: PRO.30,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Proverbes d'Agur
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: 30.1-33
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La relation avec Dieu
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Paroles d'Agur, fils de Jaké. Message
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Message: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou de Massa, nom d''un royaume ismaélite (cf. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Genèse 25.13-14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' prononcé par cet homme pour Ithiel et pour Ucal.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne dénigre pas un serviteur auprès de son maître,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de peur qu'il ne te maudisse et que tu n'aies à en subir les conséquences.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il existe une génération qui maudit son père
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui ne bénit pas sa mère,
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il existe une génération qui se croit pure
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui n'est pas lavée de sa souillure,
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il existe une génération aux yeux hautains
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et aux paupières insolentes,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il existe une génération dont les dents sont des épées
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les mâchoires des couteaux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour dévorer les plus humbles sur la terre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les plus pauvres parmi les hommes.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'La sangsue a deux filles: «Donne! Donne!»'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Trois choses sont insatiables,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'quatre ne disent jamais «Assez»:'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le séjour des morts, la femme stérile,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la terre qui n'est pas saturée d'eau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le feu qui ne dit jamais «Assez».
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'œil qui se moque d'un père
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui méprise l'obéissance envers une mère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les corbeaux de la rivière le crèveront
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les petits de l'aigle le mangeront.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il y a trois choses qui sont trop merveilleuses pour moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'même quatre que je ne parviens pas à connaître:'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la trace de l'aigle dans le ciel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la trace du serpent sur le rocher,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la trace du bateau au milieu de la mer
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la trace de l'homme chez la jeune fille.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Certes, je suis idiot plus que tout autre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je n'ai pas l'intelligence d'un homme,
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici quelle est la conduite de la femme adultère:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle mange et s'essuie la bouche
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'avant de dire: «Je n''ai fait aucun mal.»'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il y a trois choses qui font trembler la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'même quatre qu''elle ne peut pas supporter:'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un esclave qui devient roi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un fou qui a de la nourriture à satiété,
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: une femme détestée qui se marie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et une servante qui dépossède sa maîtresse.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il y a sur la terre quatre animaux petits,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et cependant particulièrement sages:'
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les fourmis, peuple sans force,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui préparent leur nourriture en été;
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les damans, peuple sans puissance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui font leur habitation dans les rochers;
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les sauterelles, qui n'ont pas de roi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais sortent toutes en bon ordre;
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le lézard, que tu peux attraper avec tes mains
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui se trouve dans les palais des rois.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il y en a trois qui ont une belle allure,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'même quatre qui ont une belle démarche:'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je n'ai pas appris la sagesse
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je n'ai pas la connaissance du Saint
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Du Saint: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ou des saints.
      marker-yv: yv-n
    - type: text
      text: .
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le lion, le plus puissant des animaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui ne recule devant personne,
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le cheval tout équipé, ou encore le bouc,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le roi à qui personne ne résiste.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si l'orgueil te pousse à des actes de folie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et si tu as de mauvaises pensées, mets la main sur la bouche!
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, battre le lait produit du beurre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: frapper le nez produit du sang
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et provoquer la colère produit des disputes.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui est monté au ciel et qui en est descendu?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui a rassemblé le vent dans le creux de ses mains?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui a serré l'eau dans son manteau?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui a fixé les limites de la terre?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quel est son nom et quel est le nom de son fils?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le sais-tu?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toute parole de Dieu est pure.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est un bouclier pour ceux qui cherchent refuge en lui.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N'ajoute rien à ses paroles!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il te reprendrait et tu apparaîtrais comme un menteur.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je te demande deux choses.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ne me les refuse pas avant que je meure:'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: éloigne de moi la fausseté et le mensonge,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ne me donne ni pauvreté ni richesse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais accorde-moi le pain qui m'est nécessaire!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sinon je risquerais, une fois rassasié, de te renier
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et de dire: «Qui est l''Eternel?»'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ou, après avoir tout perdu, de voler
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et de m'en prendre au nom de mon Dieu.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A propos des catégories
    marker-yv: yv-h
