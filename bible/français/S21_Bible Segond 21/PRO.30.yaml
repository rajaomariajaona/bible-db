document_id: PRO.30,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Proverbes d'Agur
  - type: heading
    content: 30.1-33
  - type: heading
    content: La relation avec Dieu
  - type: text
    content: Paroles d'Agur, fils de Jaké. Message
  - type: note
    content: 'Message: ou de Massa, nom d''un royaume ismaélite (cf. Genèse 25.13-14).'
  - type: text
    content: ' prononcé par cet homme pour Ithiel et pour Ucal.'
  '10':
  - type: text
    content: Ne dénigre pas un serviteur auprès de son maître,
  - type: text
    content: de peur qu'il ne te maudisse et que tu n'aies à en subir les conséquences.
  '11':
  - type: text
    content: Il existe une génération qui maudit son père
  - type: text
    content: et qui ne bénit pas sa mère,
  '12':
  - type: text
    content: il existe une génération qui se croit pure
  - type: text
    content: et qui n'est pas lavée de sa souillure,
  '13':
  - type: text
    content: il existe une génération aux yeux hautains
  - type: text
    content: et aux paupières insolentes,
  '14':
  - type: text
    content: il existe une génération dont les dents sont des épées
  - type: text
    content: et les mâchoires des couteaux
  - type: text
    content: pour dévorer les plus humbles sur la terre
  - type: text
    content: et les plus pauvres parmi les hommes.
  '15':
  - type: text
    content: 'La sangsue a deux filles: «Donne! Donne!»'
  - type: text
    content: Trois choses sont insatiables,
  - type: text
    content: 'quatre ne disent jamais «Assez»:'
  '16':
  - type: text
    content: le séjour des morts, la femme stérile,
  - type: text
    content: la terre qui n'est pas saturée d'eau,
  - type: text
    content: et le feu qui ne dit jamais «Assez».
  '17':
  - type: text
    content: L'œil qui se moque d'un père
  - type: text
    content: et qui méprise l'obéissance envers une mère,
  - type: text
    content: les corbeaux de la rivière le crèveront
  - type: text
    content: et les petits de l'aigle le mangeront.
  '18':
  - type: text
    content: Il y a trois choses qui sont trop merveilleuses pour moi,
  - type: text
    content: 'même quatre que je ne parviens pas à connaître:'
  '19':
  - type: text
    content: la trace de l'aigle dans le ciel,
  - type: text
    content: la trace du serpent sur le rocher,
  - type: text
    content: la trace du bateau au milieu de la mer
  - type: text
    content: et la trace de l'homme chez la jeune fille.
  '2':
  - type: text
    content: Certes, je suis idiot plus que tout autre
  - type: text
    content: et je n'ai pas l'intelligence d'un homme,
  '20':
  - type: text
    content: 'Voici quelle est la conduite de la femme adultère:'
  - type: text
    content: elle mange et s'essuie la bouche
  - type: text
    content: 'avant de dire: «Je n''ai fait aucun mal.»'
  '21':
  - type: text
    content: Il y a trois choses qui font trembler la terre,
  - type: text
    content: 'même quatre qu''elle ne peut pas supporter:'
  '22':
  - type: text
    content: un esclave qui devient roi,
  - type: text
    content: un fou qui a de la nourriture à satiété,
  '23':
  - type: text
    content: une femme détestée qui se marie
  - type: text
    content: et une servante qui dépossède sa maîtresse.
  '24':
  - type: text
    content: Il y a sur la terre quatre animaux petits,
  - type: text
    content: 'et cependant particulièrement sages:'
  '25':
  - type: text
    content: les fourmis, peuple sans force,
  - type: text
    content: qui préparent leur nourriture en été;
  '26':
  - type: text
    content: les damans, peuple sans puissance,
  - type: text
    content: qui font leur habitation dans les rochers;
  '27':
  - type: text
    content: les sauterelles, qui n'ont pas de roi
  - type: text
    content: mais sortent toutes en bon ordre;
  '28':
  - type: text
    content: le lézard, que tu peux attraper avec tes mains
  - type: text
    content: et qui se trouve dans les palais des rois.
  '29':
  - type: text
    content: Il y en a trois qui ont une belle allure,
  - type: text
    content: 'même quatre qui ont une belle démarche:'
  '3':
  - type: text
    content: je n'ai pas appris la sagesse
  - type: text
    content: et je n'ai pas la connaissance du Saint
  - type: note
    content: 'Du Saint: ou des saints.'
  - type: text
    content: .
  '30':
  - type: text
    content: le lion, le plus puissant des animaux,
  - type: text
    content: qui ne recule devant personne,
  '31':
  - type: text
    content: le cheval tout équipé, ou encore le bouc,
  - type: text
    content: et le roi à qui personne ne résiste.
  '32':
  - type: text
    content: Si l'orgueil te pousse à des actes de folie
  - type: text
    content: et si tu as de mauvaises pensées, mets la main sur la bouche!
  '33':
  - type: text
    content: En effet, battre le lait produit du beurre,
  - type: text
    content: frapper le nez produit du sang
  - type: text
    content: et provoquer la colère produit des disputes.
  '4':
  - type: text
    content: Qui est monté au ciel et qui en est descendu?
  - type: text
    content: Qui a rassemblé le vent dans le creux de ses mains?
  - type: text
    content: Qui a serré l'eau dans son manteau?
  - type: text
    content: Qui a fixé les limites de la terre?
  - type: text
    content: Quel est son nom et quel est le nom de son fils?
  - type: text
    content: Le sais-tu?
  '5':
  - type: text
    content: Toute parole de Dieu est pure.
  - type: text
    content: Il est un bouclier pour ceux qui cherchent refuge en lui.
  '6':
  - type: text
    content: N'ajoute rien à ses paroles!
  - type: text
    content: Il te reprendrait et tu apparaîtrais comme un menteur.
  '7':
  - type: text
    content: Je te demande deux choses.
  - type: text
    content: 'Ne me les refuse pas avant que je meure:'
  '8':
  - type: text
    content: éloigne de moi la fausseté et le mensonge,
  - type: text
    content: et ne me donne ni pauvreté ni richesse,
  - type: text
    content: mais accorde-moi le pain qui m'est nécessaire!
  '9':
  - type: text
    content: Sinon je risquerais, une fois rassasié, de te renier
  - type: text
    content: 'et de dire: «Qui est l''Eternel?»'
  - type: text
    content: ou, après avoir tout perdu, de voler
  - type: text
    content: et de m'en prendre au nom de mon Dieu.
  - type: heading
    content: A propos des catégories
