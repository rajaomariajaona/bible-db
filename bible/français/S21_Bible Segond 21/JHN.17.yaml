document_id: JHN.17
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La prière sacerdotale
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Après ces paroles, Jésus leva les yeux vers le ciel et dit: «Père, l''heure est venue! Révèle la gloire de ton Fils afin que ton Fils [aussi] révèle ta gloire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Tu lui as donné pouvoir sur tout être humain, afin qu''il accorde la vie éternelle à tous ceux que tu lui as donnés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Or, la vie éternelle, c''est qu''ils te connaissent, toi, le seul vrai Dieu, et celui que tu as envoyé, Jésus-Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'J''ai révélé ta gloire sur la terre, j''ai terminé ce que tu m''avais donné à faire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Maintenant, Père, révèle toi-même ma gloire auprès de toi en me donnant la gloire que j'avais auprès de toi avant que le monde existe.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '»Je t''ai fait connaître aux hommes que tu m''as donnés du milieu du monde. Ils étaient à toi et tu me les as donnés, et ils ont gardé ta parole. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Maintenant ils savent que tout ce que tu m''as donné vient de toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'En effet, je leur ai donné les paroles que tu m''as données, ils les ont acceptées et ils ont vraiment reconnu que je suis sorti de toi, et ils ont cru que tu m''as envoyé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'C''est pour eux que je prie. Je ne prie pas pour le monde, mais pour ceux que tu m''as donnés, parce qu''ils sont à toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tout ce qui est à moi est à toi et ce qui est à toi est à moi, et ma gloire est manifestée en eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Désormais je ne suis plus dans le monde, mais eux, ils sont dans le monde, tandis que je vais vers toi. Père saint, garde-les en ton nom, ce nom que tu m''as donné, afin qu''ils soient un comme nous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Lorsque j''étais avec eux [dans le monde], je les gardais en ton nom. J''ai protégé ceux que tu m''as donnés et aucun d''eux ne s''est perdu, à part le fils de perdition afin que l''Ecriture soit accomplie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Maintenant je vais vers toi et je dis ces paroles dans le monde afin qu''ils aient en eux ma joie, une joie complète. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Je leur ai donné ta parole et le monde les a détestés parce qu''ils ne sont pas du monde, tout comme moi, je ne suis pas du monde. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Je ne te demande pas de les retirer du monde, mais de les préserver du mal
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Du mal: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ou du mauvais, c'est-à-dire le diable.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ils ne sont pas du monde, tout comme moi, je ne suis pas du monde. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Consacre-les par ta vérité! Ta parole est la vérité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tout comme tu m''as envoyé dans le monde, je les ai moi aussi envoyés dans le monde, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: et je me consacre moi-même pour eux afin qu'eux aussi soient consacrés par la vérité.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '»Je ne prie pas pour eux seulement, mais encore pour ceux qui croiront en moi à travers leur parole, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'afin que tous soient un comme toi, Père, tu es en moi et comme je suis en toi, afin qu''eux aussi soient [un] en nous pour que le monde croie que tu m''as envoyé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Je leur ai donné la gloire que tu m''as donnée afin qu''ils soient un comme nous sommes un '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '- moi en eux et toi en moi -, afin qu''ils soient parfaitement un et qu''ainsi le monde reconnaisse que tu m''as envoyé et que tu les as aimés comme tu m''as aimé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Père, je veux que là où je suis ceux que tu m''as donnés soient aussi avec moi afin qu''ils contemplent ma gloire, la gloire que tu m''as donnée parce que tu m''as aimé avant la création du monde. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Père juste, le monde ne t''a pas connu, mais moi, je t''ai connu, et ceux-ci ont reconnu que tu m''as envoyé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Je leur ai fait connaître ton nom et je le leur ferai connaître encore, afin que l'amour dont tu m'as aimé soit en eux et que moi je sois en eux.»
