document_id: JHN.17,152
type_code: fra
verses:
  '1':
  - type: heading
    content: La prière sacerdotale
  - type: text
    content: 'Après ces paroles, Jésus leva les yeux vers le ciel et dit: «Père, l''heure est venue! Révèle la gloire de ton Fils afin que ton Fils [aussi] révèle ta gloire. '
  '10':
  - type: text
    content: 'Tout ce qui est à moi est à toi et ce qui est à toi est à moi, et ma gloire est manifestée en eux. '
  '11':
  - type: text
    content: 'Désormais je ne suis plus dans le monde, mais eux, ils sont dans le monde, tandis que je vais vers toi. Père saint, garde-les en ton nom, ce nom que tu m''as donné, afin qu''ils soient un comme nous. '
  '12':
  - type: text
    content: 'Lorsque j''étais avec eux [dans le monde], je les gardais en ton nom. J''ai protégé ceux que tu m''as donnés et aucun d''eux ne s''est perdu, à part le fils de perdition afin que l''Ecriture soit accomplie. '
  '13':
  - type: text
    content: 'Maintenant je vais vers toi et je dis ces paroles dans le monde afin qu''ils aient en eux ma joie, une joie complète. '
  '14':
  - type: text
    content: 'Je leur ai donné ta parole et le monde les a détestés parce qu''ils ne sont pas du monde, tout comme moi, je ne suis pas du monde. '
  '15':
  - type: text
    content: Je ne te demande pas de les retirer du monde, mais de les préserver du mal
  - type: note
    content: 'Du mal: ou du mauvais, c''est-à-dire le diable.'
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Ils ne sont pas du monde, tout comme moi, je ne suis pas du monde. '
  '17':
  - type: text
    content: 'Consacre-les par ta vérité! Ta parole est la vérité. '
  '18':
  - type: text
    content: 'Tout comme tu m''as envoyé dans le monde, je les ai moi aussi envoyés dans le monde, '
  '19':
  - type: text
    content: et je me consacre moi-même pour eux afin qu'eux aussi soient consacrés par la vérité.
  '2':
  - type: text
    content: 'Tu lui as donné pouvoir sur tout être humain, afin qu''il accorde la vie éternelle à tous ceux que tu lui as donnés. '
  '20':
  - type: text
    content: '»Je ne prie pas pour eux seulement, mais encore pour ceux qui croiront en moi à travers leur parole, '
  '21':
  - type: text
    content: 'afin que tous soient un comme toi, Père, tu es en moi et comme je suis en toi, afin qu''eux aussi soient [un] en nous pour que le monde croie que tu m''as envoyé. '
  '22':
  - type: text
    content: 'Je leur ai donné la gloire que tu m''as donnée afin qu''ils soient un comme nous sommes un '
  '23':
  - type: text
    content: '- moi en eux et toi en moi -, afin qu''ils soient parfaitement un et qu''ainsi le monde reconnaisse que tu m''as envoyé et que tu les as aimés comme tu m''as aimé. '
  '24':
  - type: text
    content: 'Père, je veux que là où je suis ceux que tu m''as donnés soient aussi avec moi afin qu''ils contemplent ma gloire, la gloire que tu m''as donnée parce que tu m''as aimé avant la création du monde. '
  '25':
  - type: text
    content: 'Père juste, le monde ne t''a pas connu, mais moi, je t''ai connu, et ceux-ci ont reconnu que tu m''as envoyé. '
  '26':
  - type: text
    content: Je leur ai fait connaître ton nom et je le leur ferai connaître encore, afin que l'amour dont tu m'as aimé soit en eux et que moi je sois en eux.»
  '3':
  - type: text
    content: 'Or, la vie éternelle, c''est qu''ils te connaissent, toi, le seul vrai Dieu, et celui que tu as envoyé, Jésus-Christ. '
  '4':
  - type: text
    content: 'J''ai révélé ta gloire sur la terre, j''ai terminé ce que tu m''avais donné à faire. '
  '5':
  - type: text
    content: Maintenant, Père, révèle toi-même ma gloire auprès de toi en me donnant la gloire que j'avais auprès de toi avant que le monde existe.
  '6':
  - type: text
    content: '»Je t''ai fait connaître aux hommes que tu m''as donnés du milieu du monde. Ils étaient à toi et tu me les as donnés, et ils ont gardé ta parole. '
  '7':
  - type: text
    content: 'Maintenant ils savent que tout ce que tu m''as donné vient de toi. '
  '8':
  - type: text
    content: 'En effet, je leur ai donné les paroles que tu m''as données, ils les ont acceptées et ils ont vraiment reconnu que je suis sorti de toi, et ils ont cru que tu m''as envoyé. '
  '9':
  - type: text
    content: 'C''est pour eux que je prie. Je ne prie pas pour le monde, mais pour ceux que tu m''as donnés, parce qu''ils sont à toi. '
