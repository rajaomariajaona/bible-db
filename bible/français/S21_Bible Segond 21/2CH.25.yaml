document_id: 2CH.25,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Règne d'Amatsia
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Amatsia devint roi à l'âge de 25 ans et il régna 29 ans à Jérusalem. Sa mère s'appelait Joaddan et elle était de Jérusalem.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Alors Amatsia se sépara de la troupe qui était venue d'Ephraïm vers lui, il la renvoya chez elle. Mais ces hommes furent très irrités contre Juda et c'est en colère qu'ils repartirent chez eux.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Amatsia prit courage et conduisit son peuple dans la vallée du sel. Il battit 10''000 habitants de Séir. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Les Judéens en capturèrent 10'000 autres vivants. Ils les conduisirent au sommet d'un rocher, d'où ils les précipitèrent, et ils furent tous déchiquetés.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Quant aux hommes de la troupe qu'Amatsia avait renvoyée pour qu'ils n'aillent pas à la guerre avec lui, ils lancèrent une attaque contre les villes de Juda, depuis Samarie jusqu'à Beth-Horon. Ils y tuèrent 3000 personnes et emportèrent un grand butin.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Idolâtrie d'Amatsia
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Lorsque Amatsia fut de retour après la défaite des Edomites, il fit venir les dieux des habitants de Séir et en fit ses dieux. Il se prosterna devant eux et leur offrit des parfums. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Alors la colère de l''Eternel s''enflamma contre Amatsia et il envoya vers lui un prophète qui lui dit: «Pourquoi as-tu recherché les dieux de ce peuple, alors qu''ils n''ont pas pu délivrer leur peuple de ta domination?» '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Il parlait encore quand Amatsia lui dit: «Est-ce que nous t''avons désigné comme conseiller du roi? Retire-toi! Pourquoi devrait-on te frapper?» Le prophète se retira en disant: «Je sais que Dieu a projeté de te détruire, puisque tu as agi de cette manière et que tu n''as pas écouté mon conseil.»'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Après avoir pris conseil, Amatsia, roi de Juda, envoya dire à Joas, fils de Joachaz et petit-fils de Jéhu, le roi d''Israël: «Viens, affrontons-nous!» '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Joas, le roi d''Israël, fit dire à Amatsia, le roi de Juda: «Le chardon du Liban envoya dire au cèdre du Liban: ‘Donne ta fille en mariage à mon fils!’ Mais les bêtes sauvages qui vivent au Liban passèrent et piétinèrent le chardon. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Tu te dis que tu as battu les Edomites et ton cœur te remplit d''orgueil jusqu''à l''endurcissement. Reste maintenant chez toi. Pourquoi t''engager dans une malheureuse entreprise qui amènerait ta ruine et celle de Juda?» '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Il fit ce qui est droit aux yeux de l''Eternel, mais avec un cœur qui ne lui était pas attaché sans réserve. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Mais Amatsia ne l''écouta pas. En effet, Dieu avait décidé de les livrer à l''oppression parce qu''ils avaient recherché les dieux d''Edom. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Joas, le roi d''Israël, monta et ils s''affrontèrent, lui et Amatsia, le roi de Juda, à Beth-Shémesh, une ville qui appartenait à Juda. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Juda fut battu par Israël et chacun s''enfuit dans sa tente. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Joas, le roi d''Israël, captura Amatsia, le roi de Juda, fils de Joas et petit-fils de Joachaz, à Beth-Shémesh. Il le fit venir à Jérusalem et il fit une brèche de 200 mètres dans la muraille de Jérusalem, depuis la porte d''Ephraïm jusqu''à la porte de l''angle. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Il prit tout l'or et l'argent ainsi que tous les objets qui se trouvaient dans la maison de Dieu, sous la garde d'Obed-Edom, et les trésors du palais royal; il prit aussi des otages, puis il retourna à Samarie.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Amatsia, fils de Joas, roi de Juda, vécut 15 ans après la mort de Joas, le fils de Joachaz et le roi d'Israël.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Le reste des actes d'Amatsia, des premiers aux derniers, est décrit dans les annales des rois de Juda et d'Israël.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Dès le moment où Amatsia se détourna de l''Eternel, on forma une conspiration contre lui à Jérusalem et il s''enfuit à Lakis, mais on le poursuivit là-bas et on l''y fit mourir. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: On le transporta sur des chevaux et on l'enterra avec ses ancêtres dans la ville de David.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Lorsque la royauté fut bien solide entre ses mains, il mit à mort ceux de ses serviteurs qui avaient tué le roi, son père. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Cependant, il ne fit pas mourir leurs fils, car il se conforma à ce qui est écrit dans la loi, dans le livre de Moïse, où l''Eternel donne ce commandement: «*On ne fera pas mourir les pères à la place des enfants, ni les enfants à la place des pères. On fera mourir chacun pour son péché.»'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'On ne fera… péché: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: citation de Deutéronome 24.16.
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Amatsia rassembla les hommes de Juda et les répartit en fonction de leur famille avec des chefs de milliers et des chefs de centaines. Il fit cela pour tout Juda et Benjamin. Il fit le dénombrement des hommes âgés de 20 ans et plus, et il trouva 300''000 hommes d''élite aptes au service militaire et capables de manier la lance et le bouclier. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Il enrôla encore 100'000 vaillants hommes issus d'Israël pour 3 tonnes d'argent.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Un homme de Dieu vint le trouver et dit: «Roi, ne te fais pas accompagner d''une armée israélite, car l''Eternel n''est pas avec Israël, avec tous ces Ephraïmites. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Tu auras beau y aller et te montrer fort au combat, Dieu te fera tomber devant l''ennemi, car c''est lui qui a le pouvoir d''aider et de faire tomber.» '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Amatsia dit à l''homme de Dieu: «Et que faire pour les 3 tonnes d''argent que j''ai données à la troupe israélite?» L''homme de Dieu répondit: «L''Eternel peut te donner bien plus que cela.» '
