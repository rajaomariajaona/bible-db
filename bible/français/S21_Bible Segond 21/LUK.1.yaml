document_id: LUK.1
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Naissance et jeunesse de Jésus
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 1.1–4.13
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Objectif de l'auteur
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Plusieurs ont entrepris de composer un récit des événements qui se sont accomplis parmi nous, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'd''après ce que nous ont transmis ceux qui ont été des témoins oculaires dès le commencement et qui sont devenus des serviteurs de la parole. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il m''a donc paru bon à moi aussi, qui me suis soigneusement informé sur toutes ces choses dès l''origine, de te les exposer par écrit d''une manière suivie, excellent Théophile, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: afin que tu reconnaisses la certitude des enseignements que tu as reçus.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Annonce de la naissance de Jean-Baptiste
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Durant le règne d''Hérode sur la Judée, il y avait un prêtre du nom de Zacharie, de la classe d''Abia; sa femme était une descendante d''Aaron et s''appelait Elisabeth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tous deux étaient justes devant Dieu, ils suivaient d''une manière irréprochable tous les commandements et toutes les lois du Seigneur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ils n'avaient pas d'enfant, parce qu'Elisabeth était stérile, et ils étaient l'un et l'autre d'un âge avancé.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Or, pendant que Zacharie remplissait sa fonction de prêtre devant Dieu – c''était le tour de sa classe – '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'il fut désigné par le sort, d''après la règle en vigueur pour les prêtres, pour entrer dans le temple du Seigneur et y brûler le parfum. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Toute la multitude du peuple était dehors en prière, à l''heure de l''offrande du parfum. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Alors un ange du Seigneur apparut à Zacharie et se tint debout à droite de l''autel des parfums. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Zacharie fut troublé en le voyant et la peur s''empara de lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mais l''ange lui dit: «N''aie pas peur, Zacharie, car ta prière a été exaucée. Ta femme Elisabeth te donnera un fils et tu l''appelleras Jean. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il sera pour toi un sujet de joie et d''allégresse et beaucoup se réjouiront de sa naissance, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'car il sera grand devant le Seigneur. Il ne boira ni vin ni boisson alcoolisée et il sera rempli de l''Esprit saint dès le ventre de sa mère. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il ramènera beaucoup d''Israélites au Seigneur, leur Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il marchera devant Dieu avec l''esprit et la puissance d''Elie '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: pour ramener le cœur des pères vers leurs enfants
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Pour… enfants: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Malachie 3.24
      metadata:
        usfm: MAL.3.24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' et les rebelles à la sagesse des justes, afin de préparer pour le Seigneur un peuple bien disposé.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Zacharie dit à l''ange: «A quoi reconnaîtrai-je cela? En effet, je suis vieux et ma femme est d''un âge avancé.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'L''ange lui répondit: «Je suis Gabriel, je me tiens devant Dieu; j''ai été envoyé pour te parler et pour t''annoncer cette bonne nouvelle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Voici, tu seras muet et tu ne pourras plus parler jusqu'au jour où cela arrivera, parce que tu n'as pas cru à mes paroles qui s'accompliront au moment voulu.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Cependant, le peuple attendait Zacharie et s''étonnait qu''il s''attarde si longtemps dans le temple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Quand il sortit, il ne pouvait pas leur parler, et ils comprirent qu''il avait eu une vision dans le temple; il s''exprimait par signes et il resta muet. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Lorsque ses jours de service furent terminés, il rentra chez lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Quelque temps après, sa femme Elisabeth fut enceinte. Elle se cacha pendant cinq mois, disant: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: «C'est l'œuvre que le Seigneur a faite quand il a porté le regard sur moi pour enlever ce qui faisait ma honte parmi les hommes.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Annonce de la naissance de Jésus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Le sixième mois, l''ange Gabriel fut envoyé par Dieu dans une ville de Galilée, appelée Nazareth, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: chez une vierge fiancée à un homme de la famille de David
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.27 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'David: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: premier grand roi d'Israël; il avait reçu la promesse que le libérateur envoyé par Dieu (le Messie) serait issu de sa dynastie.
    marker-yv: yv-n
  - type: text
    text: ', appelé Joseph. Le nom de la vierge était Marie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'L''ange entra chez elle et dit: «Je te salue, toi à qui une grâce a été faite, le Seigneur est avec toi. [Tu es bénie parmi les femmes.]» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Troublée par cette parole, Marie se demandait ce que pouvait signifier une telle salutation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'L''ange lui dit: «N''aie pas peur, Marie, car tu as trouvé grâce auprès de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Voici que tu seras enceinte. Tu mettras au monde un fils et tu lui donneras le nom de Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Il sera grand et sera appelé Fils du Très-Haut, et le Seigneur Dieu lui donnera le trône de David, son ancêtre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Il régnera sur la famille de Jacob éternellement, son règne n''aura pas de fin.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Marie dit à l''ange: «Comment cela se fera-t-il, puisque je n''ai pas de relations avec un homme?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'L''ange lui répondit: «Le Saint-Esprit viendra sur toi et la puissance du Très-Haut te couvrira de son ombre. C''est pourquoi le saint enfant qui naîtra sera appelé Fils de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Voici qu''Elisabeth, ta parente, est elle aussi devenue enceinte d''un fils dans sa vieillesse. Celle que l''on appelait ‘la stérile’ est dans son sixième mois. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'En effet, rien n''est impossible à Dieu.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Marie dit: «Je suis la servante du Seigneur. Que ta parole s''accomplisse pour moi!» Et l''ange la quitta.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'A la même époque, Marie s''empressa de se rendre dans une ville de la région montagneuse de Juda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Elle entra dans la maison de Zacharie et salua Elisabeth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Dès qu''Elisabeth entendit la salutation de Marie, son enfant remua brusquement en elle et elle fut remplie du Saint-Esprit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Elle s''écria d''une voix forte: «Tu es bénie parmi les femmes et l''enfant que tu portes est béni. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Comment m''est-il accordé que la mère de mon Seigneur vienne vers moi? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'En effet, dès que j''ai entendu ta salutation, l''enfant a tressailli de joie en moi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Heureuse celle qui a cru, parce que ce qui lui a été dit de la part du Seigneur s'accomplira.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Marie dit:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Mon âme célèbre la grandeur du Seigneur
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: et mon esprit se réjouit en Dieu, mon Sauveur,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: parce qu'il a porté le regard sur son humble servante.
- type: usfm
  marker: q1
  children:
  - type: text
    text: En effet, voici, désormais toutes les générations me diront heureuse,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: parce que le Tout-Puissant a fait de grandes choses pour moi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Son nom est saint,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: ' '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: et sa bonté s'étend de génération en génération
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: qt
    children:
    - type: text
      text: sur ceux qui le craignent
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.50 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Et sa bonté… craignent: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation du '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psaume 103.17
      metadata:
        usfm: PSA.103.17
    - type: text
      text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: Il a agi avec la force de son bras,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a dispersé ceux qui avaient dans le cœur des pensées orgueilleuses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: Il a renversé les puissants de leurs trônes
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il a élevé les humbles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: Il a rassasié de biens les affamés
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il a renvoyé les riches les mains vides.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: Il a secouru Israël, son serviteur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: il s'est souvenu de sa bonté
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.54 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Il s''est souvenu de sa bonté: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation du '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psaume 98.3
      metadata:
        usfm: PSA.98.3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: – comme il l'avait dit à nos ancêtres –
- type: usfm
  marker: q1
  children:
  - type: text
    text: en faveur d'Abraham et de sa descendance pour toujours.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: Marie resta environ trois mois avec Elisabeth, puis elle retourna chez elle.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Naissance de Jean-Baptiste
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Le moment où Elisabeth devait accoucher arriva et elle mit au monde un fils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'Ses voisins et ses parents apprirent que le Seigneur avait fait preuve d''une grande bonté envers elle, et ils se réjouirent avec elle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'Le huitième jour, ils vinrent pour circoncire l''enfant. Ils voulaient l''appeler Zacharie, d''après le nom de son père, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'mais sa mère prit la parole et dit: «Non, il sera appelé Jean.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'Ils lui dirent: «Il n''y a dans ta parenté personne qui porte ce nom» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'et ils firent des signes à son père pour savoir comment il voulait qu''on l''appelle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'Zacharie demanda une tablette et il écrivit: «Son nom est Jean.» Tous furent dans l''étonnement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'Immédiatement sa bouche s''ouvrit, sa langue se délia, et il parlait et bénissait Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: 'La crainte s''empara de tous les habitants des environs, et dans toute la région montagneuse de Judée on s''entretenait de tous ces événements. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: 'Tous ceux qui les apprirent les gardèrent dans leur cœur, et ils disaient: «Que sera donc cet enfant?» Et [en effet] la main du Seigneur était avec lui.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: 'Son père Zacharie fut rempli du Saint-Esprit et prophétisa en ces termes:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: text
    text: «Béni soit le Seigneur, le Dieu d'Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce qu'il a visité et racheté son peuple.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '69'
  - type: text
    text: Il nous a donné un puissant Sauveur
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans la famille de son serviteur David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '70'
  - type: text
    text: 'C''est ce qu''il avait annoncé par la bouche de ses saints prophètes des temps anciens:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '71'
  - type: text
    text: un Sauveur qui nous délivre de nos ennemis et de la domination de tous ceux qui nous détestent!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '72'
  - type: text
    text: Ainsi, il manifeste sa bonté envers nos ancêtres
- type: usfm
  marker: q1
  children:
  - type: text
    text: et se souvient de sa sainte alliance,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '73'
  - type: text
    text: 'conformément au serment qu''il avait fait à Abraham, notre ancêtre:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '74'
  - type: text
    text: il avait juré qu'après nous avoir délivrés de nos ennemis il nous accorderait
- type: usfm
  marker: q1
  children:
  - type: text
    text: de le servir sans crainte,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '75'
  - type: text
    text: en marchant devant lui dans la sainteté et dans la justice tous les jours de notre vie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '76'
  - type: text
    text: »Et toi, petit enfant, tu seras appelé prophète du Très-Haut,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car tu marcheras sous le regard du Seigneur pour préparer ses chemins
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '77'
  - type: text
    text: et pour donner à son peuple la connaissance du salut
- type: usfm
  marker: q1
  children:
  - type: text
    text: par le pardon de ses péchés,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '78'
  - type: text
    text: à cause de la profonde bonté de notre Dieu.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Grâce à elle, le soleil levant nous a visités d'en haut
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '79'
  - type: text
    text: 'pour '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: éclairer ceux qui sont assis dans les ténèbres et dans l'ombre de la mort
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.79 '
