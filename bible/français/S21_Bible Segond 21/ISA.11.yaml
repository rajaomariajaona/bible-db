document_id: ISA.11,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Le Messie et son règne
  - type: text
    content: Puis un rameau poussera de la souche d'Isaï,
  - type: text
    content: un rejeton de ses racines portera du fruit.
  '10':
  - type: text
    content: Ce jour-là, *la racine d'Isaï,
  - type: text
    content: dressée comme un étendard pour les peuples,
  - type: text
    content: sera recherchée par les nations
  - type: note
    content: 'La racine… nations: cité d''après la Septante en Romains 15.12.'
  - type: text
    content: ','
  - type: text
    content: et son lieu de résidence sera glorieux.
  '11':
  - type: text
    content: Ce jour-là, le Seigneur interviendra de nouveau
  - type: text
    content: pour racheter le reste de son peuple,
  - type: text
    content: ceux qui seront restés en Assyrie et en Egypte,
  - type: text
    content: à Pathros et en Ethiopie,
  - type: text
    content: à Elam, à Shinear, à Hamath
  - type: text
    content: et dans les îles de la mer.
  '12':
  - type: text
    content: Il dressera un étendard pour les nations,
  - type: text
    content: il rassemblera les exilés d'Israël
  - type: text
    content: et réunira les dispersés de Juda
  - type: text
    content: des quatre coins de la terre.
  '13':
  - type: text
    content: La jalousie d'Ephraïm disparaîtra
  - type: text
    content: et ses adversaires en Juda seront éliminés;
  - type: text
    content: Ephraïm ne sera plus jaloux de Juda
  - type: text
    content: et Juda ne sera plus l'adversaire d'Ephraïm.
  '14':
  - type: text
    content: Au contraire, ils fondront sur l'épaule des Philistins à l'ouest,
  - type: text
    content: ils pilleront ensemble les nomades de l'est;
  - type: text
    content: ils auront la mainmise sur Edom et Moab
  - type: text
    content: et les Ammonites leur seront soumis.
  '15':
  - type: text
    content: L'Eternel fendra le golfe de la mer d'Egypte
  - type: text
    content: 'et menacera l''Euphrate en soufflant avec force:'
  - type: text
    content: il le partagera en sept canaux
  - type: text
    content: et l'on pourra y marcher en sandales.
  '16':
  - type: text
    content: Il y aura une route pour le reste de son peuple,
  - type: text
    content: pour ceux qui seront restés en Assyrie,
  - type: text
    content: comme il y en a eu une pour Israël
  - type: text
    content: le jour où il est sorti d'Egypte.
  '2':
  - type: text
    content: 'L''Esprit de l''Eternel reposera sur lui:'
  - type: text
    content: Esprit de sagesse et de discernement,
  - type: text
    content: Esprit de conseil et de puissance,
  - type: text
    content: Esprit de connaissance et de crainte de l'Eternel.
  '3':
  - type: text
    content: Il prendra plaisir dans la crainte de l'Eternel.
  - type: text
    content: Il ne jugera pas sur l'apparence,
  - type: text
    content: n'adressera pas de reproches sur la base d'un ouï-dire.
  '4':
  - type: text
    content: Au contraire, il jugera les faibles avec justice
  - type: text
    content: et corrigera les malheureux de la terre avec droiture.
  - type: text
    content: Il frappera la terre par sa parole comme par un coup de bâton,
  - type: text
    content: et par le souffle de ses lèvres il fera mourir le méchant.
  '5':
  - type: text
    content: La justice sera comme une ceinture autour de sa taille,
  - type: text
    content: et la fidélité comme une ceinture sur ses hanches.
  '6':
  - type: text
    content: Le loup habitera avec l'agneau
  - type: text
    content: et la panthère se couchera avec le chevreau;
  - type: text
    content: le veau, le jeune lion et le bétail qu'on engraisse vivront ensemble,
  - type: text
    content: et un jeune garçon les conduira.
  '7':
  - type: text
    content: La vache et l'ourse auront un même pâturage,
  - type: text
    content: leurs petits un même enclos,
  - type: text
    content: et le lion mangera de la paille comme le bœuf.
  '8':
  - type: text
    content: Le nouveau-né s'amusera sur le nid de la vipère
  - type: text
    content: et le petit enfant mettra sa main dans la grotte du cobra.
  '9':
  - type: text
    content: On ne commettra ni mal ni destruction
  - type: text
    content: sur toute ma montagne sainte,
  - type: text
    content: car *la terre sera remplie de la connaissance de l'Eternel,
  - type: text
    content: tout comme le fond de la mer est recouvert par l'eau
  - type: note
    content: 'La terre… l''eau: texte quasi identique en Habakuk 2.14.'
  - type: text
    content: .
