document_id: ISA.11
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le Messie et son règne
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Puis un rameau poussera de la souche d'Isaï,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un rejeton de ses racines portera du fruit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'L''Esprit de l''Eternel reposera sur lui:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Esprit de sagesse et de discernement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Esprit de conseil et de puissance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Esprit de connaissance et de crainte de l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Il prendra plaisir dans la crainte de l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il ne jugera pas sur l'apparence,
- type: usfm
  marker: q1
  children:
  - type: text
    text: n'adressera pas de reproches sur la base d'un ouï-dire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Au contraire, il jugera les faibles avec justice
- type: usfm
  marker: q1
  children:
  - type: text
    text: et corrigera les malheureux de la terre avec droiture.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il frappera la terre par sa parole comme par un coup de bâton,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et par le souffle de ses lèvres il fera mourir le méchant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: La justice sera comme une ceinture autour de sa taille,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la fidélité comme une ceinture sur ses hanches.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Le loup habitera avec l'agneau
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la panthère se couchera avec le chevreau;
- type: usfm
  marker: q1
  children:
  - type: text
    text: le veau, le jeune lion et le bétail qu'on engraisse vivront ensemble,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et un jeune garçon les conduira.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: La vache et l'ourse auront un même pâturage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: leurs petits un même enclos,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le lion mangera de la paille comme le bœuf.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Le nouveau-né s'amusera sur le nid de la vipère
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le petit enfant mettra sa main dans la grotte du cobra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: On ne commettra ni mal ni destruction
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur toute ma montagne sainte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car *la terre sera remplie de la connaissance de l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tout comme le fond de la mer est recouvert par l'eau
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'La terre… l''eau: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'texte quasi identique en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Habakuk 2.14
      metadata:
        usfm: HAB.2.14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ce jour-là, *la racine d'Isaï,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dressée comme un étendard pour les peuples,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sera recherchée par les nations
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'La racine… nations: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité d''après la Septante en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Romains 15.12
      metadata:
        usfm: ROM.15.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: et son lieu de résidence sera glorieux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ce jour-là, le Seigneur interviendra de nouveau
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour racheter le reste de son peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ceux qui seront restés en Assyrie et en Egypte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à Pathros et en Ethiopie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à Elam, à Shinear, à Hamath
- type: usfm
  marker: q1
  children:
  - type: text
    text: et dans les îles de la mer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Il dressera un étendard pour les nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il rassemblera les exilés d'Israël
- type: usfm
  marker: q1
  children:
  - type: text
    text: et réunira les dispersés de Juda
- type: usfm
  marker: q1
  children:
  - type: text
    text: des quatre coins de la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: La jalousie d'Ephraïm disparaîtra
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ses adversaires en Juda seront éliminés;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ephraïm ne sera plus jaloux de Juda
- type: usfm
  marker: q1
  children:
  - type: text
    text: et Juda ne sera plus l'adversaire d'Ephraïm.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Au contraire, ils fondront sur l'épaule des Philistins à l'ouest,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils pilleront ensemble les nomades de l'est;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils auront la mainmise sur Edom et Moab
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les Ammonites leur seront soumis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: L'Eternel fendra le golfe de la mer d'Egypte
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et menacera l''Euphrate en soufflant avec force:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il le partagera en sept canaux
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l'on pourra y marcher en sandales.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Il y aura une route pour le reste de son peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour ceux qui seront restés en Assyrie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme il y en a eu une pour Israël
- type: usfm
  marker: q1
  children:
  - type: text
    text: le jour où il est sorti d'Egypte.
