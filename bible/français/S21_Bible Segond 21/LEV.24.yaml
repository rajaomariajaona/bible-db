document_id: LEV.24,152
type_code: fra
verses:
  '1':
  - type: heading
    content: L'huile et les pains consacrés
  - type: text
    content: 'L''Eternel dit à Moïse: '
  '10':
  - type: text
    content: 'Le fils d''une femme israélite et d''un homme égyptien sortit au milieu des Israélites et se disputa dans le camp avec un Israélite. '
  '11':
  - type: text
    content: 'Le fils de la femme israélite blasphéma et maudit le nom de Dieu. On l''amena à Moïse. – Sa mère s''appelait Shelomith, elle était la fille de Dibri, de la tribu de Dan. – '
  '12':
  - type: text
    content: 'On le mit sous bonne garde jusqu''à ce que Moïse ait déclaré ce que l''Eternel ordonnerait. '
  '13':
  - type: text
    content: 'L''Eternel dit à Moïse: '
  '14':
  - type: text
    content: '«Fais sortir le blasphémateur du camp. Tous ceux qui l''ont entendu poseront leurs mains sur sa tête et toute l''assemblée le lapidera. '
  '15':
  - type: text
    content: 'Tu transmettras ces instructions aux Israélites: ‘Celui qui maudira son Dieu supportera les conséquences de son péché. '
  '16':
  - type: text
    content: Celui qui blasphémera le nom de l'Eternel sera puni de mort. Toute l'assemblée le lapidera. Qu'il soit étranger ou israélite, il mourra pour avoir blasphémé le nom de Dieu.
  '17':
  - type: text
    content: '»Celui qui frappera un homme mortellement sera puni de mort; '
  '18':
  - type: text
    content: 'celui qui frappera un animal mortellement le remplacera: vie pour vie. '
  '19':
  - type: text
    content: 'Si quelqu''un blesse son prochain, on lui fera comme il a fait: '
  '2':
  - type: text
    content: '«Ordonne aux Israélites de t''apporter pour le chandelier de l''huile pure d''olives concassées, afin d''entretenir constamment les lampes. '
  '20':
  - type: text
    content: fracture pour fracture, *œil pour œil, dent pour dent
  - type: note
    content: 'Œil pour… dent: voir la note sur Exode 21.24.'
  - type: text
    content: '; on lui infligera la même blessure que celle qu''il a infligée à son prochain. '
  '21':
  - type: text
    content: 'Celui qui tuera un animal le remplacera, mais celui qui tuera un homme sera puni de mort. '
  '22':
  - type: text
    content: Vous aurez la même règle pour l'étranger que pour l'Israélite, car je suis l'Eternel, votre Dieu.’»
  '23':
  - type: text
    content: Moïse parla aux Israélites. Ils firent sortir le blasphémateur du camp et le lapidèrent. Les Israélites se conformèrent à l'ordre que l'Eternel avait donné à Moïse.
  '3':
  - type: text
    content: 'C''est devant le voile qui cache le témoignage, dans la tente de la rencontre, qu''Aaron la préparera, pour que les lampes brûlent constamment, du soir au matin, en présence de l''Eternel. C''est une prescription perpétuelle pour vous au fil des générations. '
  '4':
  - type: text
    content: Il arrangera les lampes sur le chandelier d'or pur pour qu'elles brûlent constamment devant l'Eternel.
  '5':
  - type: text
    content: '»Tu prendras de la fleur de farine et tu en feras 12 gâteaux. Chaque gâteau sera fait avec 4 litres et demi de fleur de farine. '
  '6':
  - type: text
    content: 'Tu les placeras en 2 piles, 6 par pile, sur la table d''or pur devant l''Eternel. '
  '7':
  - type: text
    content: 'Tu mettras de l''encens pur sur chaque pile et il brûlera à la place du pain en l''honneur de l''Eternel, comme souvenir. '
  '8':
  - type: text
    content: 'Chaque jour de sabbat, sans exception, on rangera ces pains devant l''Eternel de la part des Israélites. C''est une alliance éternelle. '
  '9':
  - type: text
    content: Ils appartiendront à Aaron et à ses descendants et ils les mangeront dans un endroit saint, car ce sera pour eux une chose très sainte, prise sur les offrandes passées par le feu pour l'Eternel. C'est une prescription perpétuelle.»
  - type: heading
    content: Le blasphème et la violence
