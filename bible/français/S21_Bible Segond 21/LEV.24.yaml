document_id: LEV.24
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L'huile et les pains consacrés
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L''Eternel dit à Moïse: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Ordonne aux Israélites de t''apporter pour le chandelier de l''huile pure d''olives concassées, afin d''entretenir constamment les lampes. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'C''est devant le voile qui cache le témoignage, dans la tente de la rencontre, qu''Aaron la préparera, pour que les lampes brûlent constamment, du soir au matin, en présence de l''Eternel. C''est une prescription perpétuelle pour vous au fil des générations. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Il arrangera les lampes sur le chandelier d'or pur pour qu'elles brûlent constamment devant l'Eternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '»Tu prendras de la fleur de farine et tu en feras 12 gâteaux. Chaque gâteau sera fait avec 4 litres et demi de fleur de farine. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tu les placeras en 2 piles, 6 par pile, sur la table d''or pur devant l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tu mettras de l''encens pur sur chaque pile et il brûlera à la place du pain en l''honneur de l''Eternel, comme souvenir. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Chaque jour de sabbat, sans exception, on rangera ces pains devant l''Eternel de la part des Israélites. C''est une alliance éternelle. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ils appartiendront à Aaron et à ses descendants et ils les mangeront dans un endroit saint, car ce sera pour eux une chose très sainte, prise sur les offrandes passées par le feu pour l'Eternel. C'est une prescription perpétuelle.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le blasphème et la violence
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Le fils d''une femme israélite et d''un homme égyptien sortit au milieu des Israélites et se disputa dans le camp avec un Israélite. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Le fils de la femme israélite blasphéma et maudit le nom de Dieu. On l''amena à Moïse. – Sa mère s''appelait Shelomith, elle était la fille de Dibri, de la tribu de Dan. – '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'On le mit sous bonne garde jusqu''à ce que Moïse ait déclaré ce que l''Eternel ordonnerait. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'L''Eternel dit à Moïse: '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '«Fais sortir le blasphémateur du camp. Tous ceux qui l''ont entendu poseront leurs mains sur sa tête et toute l''assemblée le lapidera. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tu transmettras ces instructions aux Israélites: ‘Celui qui maudira son Dieu supportera les conséquences de son péché. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Celui qui blasphémera le nom de l'Eternel sera puni de mort. Toute l'assemblée le lapidera. Qu'il soit étranger ou israélite, il mourra pour avoir blasphémé le nom de Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '»Celui qui frappera un homme mortellement sera puni de mort; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'celui qui frappera un animal mortellement le remplacera: vie pour vie. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Si quelqu''un blesse son prochain, on lui fera comme il a fait: '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: fracture pour fracture, *œil pour œil, dent pour dent
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.20 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Œil pour… dent: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: voir la note sur Exode 21.24.
    marker-yv: yv-n
  - type: text
    text: '; on lui infligera la même blessure que celle qu''il a infligée à son prochain. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Celui qui tuera un animal le remplacera, mais celui qui tuera un homme sera puni de mort. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Vous aurez la même règle pour l'étranger que pour l'Israélite, car je suis l'Eternel, votre Dieu.’»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Moïse parla aux Israélites. Ils firent sortir le blasphémateur du camp et le lapidèrent. Les Israélites se conformèrent à l'ordre que l'Eternel avait donné à Moïse.
