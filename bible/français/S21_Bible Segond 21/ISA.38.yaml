document_id: ISA.38,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Maladie et guérison d'Ezéchias
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'A cette époque-là, Ezéchias fut atteint d''une maladie mortelle. Le prophète Esaïe, fils d''Amots, vint le trouver et lui annonça: «Voici ce que dit l''Eternel: Donne tes ordres à ta famille, car tu vas mourir, tu ne vivras plus.»'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '«Je disais: ‘Au beau milieu de mon existence, je dois passer'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: par les portes du séjour des morts.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis privé du reste de mes années!’
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Je disais: ‘Je ne verrai plus l''Eternel,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'Eternel, sur la terre des vivants.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ne pourrai plus regarder aucun homme
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en compagnie des habitants du monde!’
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Mon habitation était enlevée et transportée loin de moi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme une tente de berger.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pareil à un tisserand, j'arrivais au bout du rouleau de ma vie.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il m'arrachait à la chaîne de tissage.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avant la nuit tu en aurais fini avec moi!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: »Je me suis retenu jusqu'au matin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais pareil à un lion, il brisait tous mes os.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avant la nuit tu m'aurais achevé!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Je poussais des petits cris, tel une hirondelle en train de voltiger,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je gémissais comme une colombe.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mes yeux se levaient, épuisés, vers le ciel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Seigneur, je suis accablé, porte-toi garant pour moi!’
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: »Que dire? Il m'a parlé, et c'est lui-même qui a agi.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je marcherai humblement jusqu'au terme de mes années,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à cause de l'amertume dont j'ai fait preuve.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Seigneur, c'est par tes bontés que l'on vit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est grâce à elles que j'ai encore un souffle de vie.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu m'as restauré, tu m'as fait revivre.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Mon amertume même s'est changée en bien-être.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu m'as aimé au point de me retirer de la fosse de la destruction,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car tu as jeté derrière toi tous mes péchés.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: »Ce n'est pas le séjour des morts qui te célébrera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce n'est pas la mort qui te louera.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux qui sont descendus dans la tombe n'espèrent plus en ta fidélité.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: C'est le vivant, oui, c'est le vivant qui te célèbre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme moi aujourd'hui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et c'est le père qui fait connaître ta fidélité à ses enfants.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ezéchias tourna le visage contre le mur et fit cette prière à l''Eternel: '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: »Eternel, puisque tu m'as sauvé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nous ferons résonner les cordes de nos instruments,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous les jours de notre vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: près de la maison de l'Eternel.»
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Esaïe avait dit: «Qu''on apporte un gâteau aux figues, qu''on l''étale sur l''ulcère et Ezéchias vivra.» '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Quant à Ezéchias, il avait dit: «Quel est le signe que je pourrai monter à la maison de l''Eternel?»'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: «Eternel, souviens-toi que j'ai marché devant toi dans la vérité, avec un cœur intègre, et que j'ai fait ce qui est bien à tes yeux!» Puis il pleura abondamment.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Alors la parole de l''Eternel fut adressée à Esaïe: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: '«Va annoncer à Ezéchias: ‘Voici ce que dit l''Eternel, le Dieu de ton ancêtre David: J''ai entendu ta prière, j''ai vu tes larmes. J''ajoute quinze années à ta vie. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Je te délivrerai, de même que cette ville, du roi d''Assyrie. Je protégerai cette ville. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Voici pour toi, de la part de l''Eternel, le signe qu''il accomplira la parole qu''il a prononcée: '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: je vais faire reculer l'ombre des marches qui est descendue sur l'escalier d'Achaz, et ce grâce au soleil. Je vais la faire reculer de 10 marches.’» Et le soleil recula de 10 marches sur l'escalier où il était déjà descendu.
  '9':
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Poème d'Ezéchias, le roi de Juda, sur sa maladie et son rétablissement.
