document_id: ISA.38,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Maladie et guérison d'Ezéchias
  - type: text
    content: 'A cette époque-là, Ezéchias fut atteint d''une maladie mortelle. Le prophète Esaïe, fils d''Amots, vint le trouver et lui annonça: «Voici ce que dit l''Eternel: Donne tes ordres à ta famille, car tu vas mourir, tu ne vivras plus.»'
  '10':
  - type: text
    content: '«Je disais: ‘Au beau milieu de mon existence, je dois passer'
  - type: text
    content: par les portes du séjour des morts.
  - type: text
    content: Je suis privé du reste de mes années!’
  '11':
  - type: text
    content: 'Je disais: ‘Je ne verrai plus l''Eternel,'
  - type: text
    content: l'Eternel, sur la terre des vivants.
  - type: text
    content: Je ne pourrai plus regarder aucun homme
  - type: text
    content: en compagnie des habitants du monde!’
  '12':
  - type: text
    content: Mon habitation était enlevée et transportée loin de moi
  - type: text
    content: comme une tente de berger.
  - type: text
    content: Pareil à un tisserand, j'arrivais au bout du rouleau de ma vie.
  - type: text
    content: Il m'arrachait à la chaîne de tissage.
  - type: text
    content: Avant la nuit tu en aurais fini avec moi!
  '13':
  - type: text
    content: »Je me suis retenu jusqu'au matin,
  - type: text
    content: mais pareil à un lion, il brisait tous mes os.
  - type: text
    content: Avant la nuit tu m'aurais achevé!
  '14':
  - type: text
    content: Je poussais des petits cris, tel une hirondelle en train de voltiger,
  - type: text
    content: je gémissais comme une colombe.
  - type: text
    content: 'Mes yeux se levaient, épuisés, vers le ciel:'
  - type: text
    content: ‘Seigneur, je suis accablé, porte-toi garant pour moi!’
  '15':
  - type: text
    content: »Que dire? Il m'a parlé, et c'est lui-même qui a agi.
  - type: text
    content: Je marcherai humblement jusqu'au terme de mes années,
  - type: text
    content: à cause de l'amertume dont j'ai fait preuve.
  '16':
  - type: text
    content: Seigneur, c'est par tes bontés que l'on vit,
  - type: text
    content: c'est grâce à elles que j'ai encore un souffle de vie.
  - type: text
    content: Tu m'as restauré, tu m'as fait revivre.
  '17':
  - type: text
    content: Mon amertume même s'est changée en bien-être.
  - type: text
    content: Tu m'as aimé au point de me retirer de la fosse de la destruction,
  - type: text
    content: car tu as jeté derrière toi tous mes péchés.
  '18':
  - type: text
    content: »Ce n'est pas le séjour des morts qui te célébrera,
  - type: text
    content: ce n'est pas la mort qui te louera.
  - type: text
    content: Ceux qui sont descendus dans la tombe n'espèrent plus en ta fidélité.
  '19':
  - type: text
    content: C'est le vivant, oui, c'est le vivant qui te célèbre,
  - type: text
    content: comme moi aujourd'hui,
  - type: text
    content: et c'est le père qui fait connaître ta fidélité à ses enfants.
  '2':
  - type: text
    content: 'Ezéchias tourna le visage contre le mur et fit cette prière à l''Eternel: '
  '20':
  - type: text
    content: »Eternel, puisque tu m'as sauvé,
  - type: text
    content: nous ferons résonner les cordes de nos instruments,
  - type: text
    content: tous les jours de notre vie,
  - type: text
    content: près de la maison de l'Eternel.»
  '21':
  - type: text
    content: 'Esaïe avait dit: «Qu''on apporte un gâteau aux figues, qu''on l''étale sur l''ulcère et Ezéchias vivra.» '
  '22':
  - type: text
    content: 'Quant à Ezéchias, il avait dit: «Quel est le signe que je pourrai monter à la maison de l''Eternel?»'
  '3':
  - type: text
    content: «Eternel, souviens-toi que j'ai marché devant toi dans la vérité, avec un cœur intègre, et que j'ai fait ce qui est bien à tes yeux!» Puis il pleura abondamment.
  '4':
  - type: text
    content: 'Alors la parole de l''Eternel fut adressée à Esaïe: '
  '5':
  - type: text
    content: '«Va annoncer à Ezéchias: ‘Voici ce que dit l''Eternel, le Dieu de ton ancêtre David: J''ai entendu ta prière, j''ai vu tes larmes. J''ajoute quinze années à ta vie. '
  '6':
  - type: text
    content: 'Je te délivrerai, de même que cette ville, du roi d''Assyrie. Je protégerai cette ville. '
  '7':
  - type: text
    content: 'Voici pour toi, de la part de l''Eternel, le signe qu''il accomplira la parole qu''il a prononcée: '
  '8':
  - type: text
    content: je vais faire reculer l'ombre des marches qui est descendue sur l'escalier d'Achaz, et ce grâce au soleil. Je vais la faire reculer de 10 marches.’» Et le soleil recula de 10 marches sur l'escalier où il était déjà descendu.
  '9':
  - type: text
    content: Poème d'Ezéchias, le roi de Juda, sur sa maladie et son rétablissement.
