document_id: ISA.14,152
type_code: fra
verses:
  '1':
  - type: text
    content: En effet, l'Eternel aura compassion de Jacob,
  - type: text
    content: son choix se portera encore sur Israël,
  - type: text
    content: et il leur accordera du repos sur leur terre;
  - type: text
    content: les étrangers se joindront à eux,
  - type: text
    content: ils se rattacheront à la famille de Jacob.
  '10':
  - type: text
    content: 'Tous prennent la parole pour te dire:'
  - type: text
    content: ‘Toi aussi, tu es désormais sans force comme nous,
  - type: text
    content: tu es devenu pareil à nous!’
  '11':
  - type: text
    content: Ta majesté est descendue dans le séjour des morts,
  - type: text
    content: ainsi que le son de tes luths.
  - type: text
    content: Sous toi, ce sont des vers qui te servent de lit,
  - type: text
    content: et des chenilles forment ta couverture.
  '12':
  - type: text
    content: Comment es-tu tombé du ciel,
  - type: text
    content: astre brillant, fils de l'aurore?
  - type: text
    content: Te voilà abattu par terre,
  - type: text
    content: toi qui terrassais les nations!
  '13':
  - type: text
    content: '»Tu disais dans ton cœur: ‘Je monterai au ciel,'
  - type: text
    content: je hisserai mon trône au-dessus des étoiles de Dieu
  - type: text
    content: et je siégerai sur la montagne de la rencontre,
  - type: text
    content: à l'extrême nord.
  '14':
  - type: text
    content: Je monterai au sommet des nuages,
  - type: text
    content: je ressemblerai au Très-Haut.’
  '15':
  - type: text
    content: »Pourtant, tu as été précipité dans le séjour des morts,
  - type: text
    content: dans les profondeurs de la tombe.
  '16':
  - type: text
    content: Ceux qui te voient te fixent du regard,
  - type: text
    content: 'ils t''examinent avec attention:'
  - type: text
    content: ‘Est-ce bien cet homme-là qui faisait trembler la terre,
  - type: text
    content: qui ébranlait des royaumes,
  '17':
  - type: text
    content: qui rendait le monde pareil à un désert,
  - type: text
    content: qui dévastait ses villes
  - type: text
    content: et ne relâchait pas ses prisonniers?’
  '18':
  - type: text
    content: »Tous les rois des nations, oui, tous,
  - type: text
    content: reposent dans la gloire, chacun chez lui,
  '19':
  - type: text
    content: mais toi, tu as été jeté loin de ton tombeau
  - type: text
    content: comme un rejeton méprisé.
  - type: text
    content: Ton linceul, ce sont des morts transpercés par l'épée
  - type: text
    content: et précipités sur les pavés d'une tombe,
  - type: text
    content: tu es pareil à un cadavre qu'on piétine.
  '2':
  - type: text
    content: Des peuples les prendront et les conduiront chez eux,
  - type: text
    content: et la communauté d'Israël prendra possession d'eux dans le pays de l'Eternel,
  - type: text
    content: elle fera d'eux des serviteurs et des servantes.
  - type: text
    content: Ils retiendront prisonniers ceux qui les avaient déportés
  - type: text
    content: et ils domineront sur ceux qui les opprimaient.
  '20':
  - type: text
    content: Tu ne partages pas un tombeau avec eux,
  - type: text
    content: car tu as détruit ton pays, tu as provoqué la mort de ton peuple.
  - type: text
    content: On ne mentionnera plus jamais la descendance des méchants.»
  '21':
  - type: text
    content: Préparez le massacre des fils
  - type: text
    content: à cause de la faute de leurs pères!
  - type: text
    content: Qu'ils ne se relèvent pas pour conquérir la terre
  - type: text
    content: et couvrir la surface du monde de villes!
  '22':
  - type: text
    content: Je me dresserai contre eux,
  - type: text
    content: déclare l'Eternel, le maître de l'univers.
  - type: text
    content: Je supprimerai le nom et le reste de Babylone,
  - type: text
    content: leurs enfants et petits-enfants, déclare l'Eternel.
  '23':
  - type: text
    content: Je ferai d'elle le domaine du hérisson et un marécage,
  - type: text
    content: et je la balaierai à l'aide du balai de la destruction,
  - type: text
    content: déclare l'Eternel, le maître de l'univers.
  - type: heading
    content: Prophétie sur l'Assyrie
  '24':
  - type: text
    content: 'L''Eternel, le maître de l''univers, en a fait le serment:'
  - type: text
    content: «Oui, tout se passera comme je l'ai projeté,
  - type: text
    content: ce que j'ai décidé s'accomplira.
  '25':
  - type: text
    content: Je mettrai l'Assyrien en pièces dans mon pays,
  - type: text
    content: je le piétinerai sur mes montagnes,
  - type: text
    content: si bien que la domination qu'il exerçait sur eux sera écartée,
  - type: text
    content: le fardeau qu'il faisait peser sur eux sera retiré.»
  '26':
  - type: text
    content: Voilà la décision qui a été prise contre toute la terre,
  - type: text
    content: telle est la puissance qui est déployée contre toutes les nations.
  '27':
  - type: text
    content: L'Eternel, le maître de l'univers, a pris une décision. Qui pourrait y faire échec?
  - type: text
    content: Sa puissance est déployée. Qui pourrait l'écarter?
  - type: heading
    content: Prophétie contre les Philistins
  '28':
  - type: text
    content: Voici le message prononcé l'année de la mort du roi Achaz.
  '29':
  - type: text
    content: Ne te réjouis pas, Philistie tout entière,
  - type: text
    content: de ce que le gourdin qui te frappait a été mis en pièces!
  - type: text
    content: En effet, de la racine du serpent sortira une vipère,
  - type: text
    content: et son rejeton sera un serpent venimeux volant.
  '3':
  - type: text
    content: Le jour où l'Eternel t'aura donné du repos,
  - type: text
    content: après tant de souffrance et d'agitation,
  - type: text
    content: après le dur esclavage qui t'a été imposé,
  '30':
  - type: text
    content: Alors les premiers-nés des plus faibles auront de quoi se nourrir,
  - type: text
    content: et les pauvres pourront se reposer en toute sécurité.
  - type: text
    content: En revanche, je ferai mourir de faim ta racine
  - type: text
    content: et ce qui restera de toi sera tué.
  '31':
  - type: text
    content: Porte, pousse des gémissements! Ville, lamente-toi!
  - type: text
    content: Tremble, Philistie tout entière,
  - type: text
    content: 'car une fumée arrive du nord:'
  - type: text
    content: c'est une troupe aux rangs serrés.
  '32':
  - type: text
    content: Que répondra-t-on aux messagers de la nation?
  - type: text
    content: Que c'est l'Eternel qui a fondé Sion
  - type: text
    content: et que les malheureux de son peuple y trouveront refuge.
  '4':
  - type: text
    content: 'tu entonneras ce chant satirique sur le roi de Babylone, tu diras:'
  - type: text
    content: «Comment! L'oppresseur n'est plus là!
  - type: text
    content: La dictature a pris fin!
  '5':
  - type: text
    content: L'Eternel a brisé le bâton des méchants,
  - type: text
    content: le gourdin des dominateurs.
  '6':
  - type: text
    content: Celui qui dans sa fureur frappait des peuples à coups ininterrompus,
  - type: text
    content: celui qui dans sa colère écrasait des nations par sa domination
  - type: text
    content: est poursuivi sans répit.
  '7':
  - type: text
    content: Toute la terre connaît la paix et la tranquillité,
  - type: text
    content: on pousse des cris de joie.
  '8':
  - type: text
    content: 'Même les cyprès et les cèdres du Liban se réjouissent de ta chute:'
  - type: text
    content: ‘Depuis que tu es tombé, le bûcheron ne monte plus pour nous abattre.’
  '9':
  - type: text
    content: »En bas, le séjour des morts s'agite pour toi,
  - type: text
    content: à l'annonce de ton arrivée.
  - type: text
    content: Il réveille pour toi les défunts, tous les grands de la terre,
  - type: text
    content: il fait se lever de leur trône tous les rois des nations.
