document_id: ISA.14,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, l'Eternel aura compassion de Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: son choix se portera encore sur Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il leur accordera du repos sur leur terre;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les étrangers se joindront à eux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils se rattacheront à la famille de Jacob.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tous prennent la parole pour te dire:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Toi aussi, tu es désormais sans force comme nous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu es devenu pareil à nous!’
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ta majesté est descendue dans le séjour des morts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ainsi que le son de tes luths.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sous toi, ce sont des vers qui te servent de lit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et des chenilles forment ta couverture.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comment es-tu tombé du ciel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: astre brillant, fils de l'aurore?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Te voilà abattu par terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toi qui terrassais les nations!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '»Tu disais dans ton cœur: ‘Je monterai au ciel,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je hisserai mon trône au-dessus des étoiles de Dieu
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je siégerai sur la montagne de la rencontre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à l'extrême nord.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je monterai au sommet des nuages,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ressemblerai au Très-Haut.’
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Pourtant, tu as été précipité dans le séjour des morts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans les profondeurs de la tombe.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux qui te voient te fixent du regard,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ils t''examinent avec attention:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Est-ce bien cet homme-là qui faisait trembler la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui ébranlait des royaumes,
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui rendait le monde pareil à un désert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui dévastait ses villes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ne relâchait pas ses prisonniers?’
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Tous les rois des nations, oui, tous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: reposent dans la gloire, chacun chez lui,
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais toi, tu as été jeté loin de ton tombeau
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme un rejeton méprisé.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ton linceul, ce sont des morts transpercés par l'épée
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et précipités sur les pavés d'une tombe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu es pareil à un cadavre qu'on piétine.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des peuples les prendront et les conduiront chez eux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la communauté d'Israël prendra possession d'eux dans le pays de l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle fera d'eux des serviteurs et des servantes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils retiendront prisonniers ceux qui les avaient déportés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils domineront sur ceux qui les opprimaient.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu ne partages pas un tombeau avec eux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car tu as détruit ton pays, tu as provoqué la mort de ton peuple.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On ne mentionnera plus jamais la descendance des méchants.»
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Préparez le massacre des fils
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à cause de la faute de leurs pères!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu'ils ne se relèvent pas pour conquérir la terre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et couvrir la surface du monde de villes!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je me dresserai contre eux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: déclare l'Eternel, le maître de l'univers.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je supprimerai le nom et le reste de Babylone,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: leurs enfants et petits-enfants, déclare l'Eternel.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ferai d'elle le domaine du hérisson et un marécage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je la balaierai à l'aide du balai de la destruction,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: déclare l'Eternel, le maître de l'univers.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prophétie sur l'Assyrie
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'L''Eternel, le maître de l''univers, en a fait le serment:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Oui, tout se passera comme je l'ai projeté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce que j'ai décidé s'accomplira.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je mettrai l'Assyrien en pièces dans mon pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je le piétinerai sur mes montagnes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: si bien que la domination qu'il exerçait sur eux sera écartée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le fardeau qu'il faisait peser sur eux sera retiré.»
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voilà la décision qui a été prise contre toute la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: telle est la puissance qui est déployée contre toutes les nations.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'Eternel, le maître de l'univers, a pris une décision. Qui pourrait y faire échec?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sa puissance est déployée. Qui pourrait l'écarter?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prophétie contre les Philistins
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: d
    children:
    - type: text
      text: Voici le message prononcé l'année de la mort du roi Achaz.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne te réjouis pas, Philistie tout entière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de ce que le gourdin qui te frappait a été mis en pièces!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, de la racine du serpent sortira une vipère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et son rejeton sera un serpent venimeux volant.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le jour où l'Eternel t'aura donné du repos,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: après tant de souffrance et d'agitation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: après le dur esclavage qui t'a été imposé,
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors les premiers-nés des plus faibles auront de quoi se nourrir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les pauvres pourront se reposer en toute sécurité.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En revanche, je ferai mourir de faim ta racine
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ce qui restera de toi sera tué.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Porte, pousse des gémissements! Ville, lamente-toi!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tremble, Philistie tout entière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'car une fumée arrive du nord:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est une troupe aux rangs serrés.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que répondra-t-on aux messagers de la nation?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que c'est l'Eternel qui a fondé Sion
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que les malheureux de son peuple y trouveront refuge.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'tu entonneras ce chant satirique sur le roi de Babylone, tu diras:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Comment! L'oppresseur n'est plus là!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La dictature a pris fin!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'Eternel a brisé le bâton des méchants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le gourdin des dominateurs.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui dans sa fureur frappait des peuples à coups ininterrompus,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celui qui dans sa colère écrasait des nations par sa domination
  - type: usfm
    marker: q1
    children:
    - type: text
      text: est poursuivi sans répit.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toute la terre connaît la paix et la tranquillité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on pousse des cris de joie.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Même les cyprès et les cèdres du Liban se réjouissent de ta chute:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Depuis que tu es tombé, le bûcheron ne monte plus pour nous abattre.’
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »En bas, le séjour des morts s'agite pour toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à l'annonce de ton arrivée.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il réveille pour toi les défunts, tous les grands de la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il fait se lever de leur trône tous les rois des nations.
