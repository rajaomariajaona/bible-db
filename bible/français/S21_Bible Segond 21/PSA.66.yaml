document_id: PSA.66,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Bénédictions après l'épreuve
  - type: text
    content: Au chef de chœur. Chant, psaume.
  - type: text
    content: Poussez vers Dieu des cris de joie,
  - type: text
    content: vous, tous les habitants de la terre!
  '10':
  - type: text
    content: En effet, tu nous as mis à l'épreuve, ô Dieu,
  - type: text
    content: tu nous as purifiés au creuset comme l'argent.
  '11':
  - type: text
    content: Tu nous as amenés dans un piège,
  - type: text
    content: tu as mis sur nos reins un fardeau pesant,
  '12':
  - type: text
    content: tu as fait monter des hommes sur notre tête;
  - type: text
    content: nous avons traversé le feu et l'eau,
  - type: text
    content: mais tu nous en as tirés pour nous donner l'abondance.
  '13':
  - type: text
    content: J'irai dans ta maison avec des holocaustes,
  - type: text
    content: 'j''accomplirai mes vœux envers toi:'
  '14':
  - type: text
    content: mes lèvres se sont ouvertes pour les exprimer,
  - type: text
    content: ma bouche les a prononcés quand j'étais dans la détresse.
  '15':
  - type: text
    content: Je t'offrirai des bêtes grasses en holocauste,
  - type: text
    content: des béliers avec de l'encens;
  - type: text
    content: 'je sacrifierai des taureaux avec des boucs. '
  - type: text
    content: – Pause.
  '16':
  - type: text
    content: Venez, écoutez, vous tous qui craignez Dieu, et je raconterai
  - type: text
    content: ce qu'il a fait pour moi.
  '17':
  - type: text
    content: J'ai crié à lui de ma bouche,
  - type: text
    content: et ma langue a célébré sa louange.
  '18':
  - type: text
    content: Si j'avais eu l'injustice en vue dans mon cœur,
  - type: text
    content: le Seigneur ne m'aurait pas exaucé,
  '19':
  - type: text
    content: mais Dieu m'a exaucé,
  - type: text
    content: il a été attentif à ma prière.
  '2':
  - type: text
    content: Chantez la gloire de son nom,
  - type: text
    content: célébrez sa gloire par vos louanges!
  '20':
  - type: text
    content: Béni soit Dieu,
  - type: text
    content: car il n'a pas rejeté ma prière,
  - type: text
    content: il ne m'a pas retiré sa bonté!
  '3':
  - type: text
    content: 'Dites à Dieu: «Que ta manière d''agir est redoutable!'
  - type: text
    content: A cause de la grandeur de ta force, tes ennemis te flattent.
  '4':
  - type: text
    content: Toute la terre t'adore et chante en ton honneur,
  - type: text
    content: 'elle chante ton nom.» '
  - type: text
    content: – Pause.
  '5':
  - type: text
    content: Venez voir ce que Dieu a fait!
  - type: text
    content: Il est redoutable quand il agit envers les hommes.
  '6':
  - type: text
    content: 'Il a changé la mer en terre ferme:'
  - type: text
    content: on a traversé le fleuve à pied;
  - type: text
    content: alors nous nous sommes réjouis en lui.
  '7':
  - type: text
    content: Il domine éternellement par sa puissance;
  - type: text
    content: 'ses yeux observent les nations:'
  - type: text
    content: 'que les rebelles ne fassent pas les fiers! '
  - type: text
    content: – Pause.
  '8':
  - type: text
    content: Peuples, bénissez notre Dieu,
  - type: text
    content: faites retentir sa louange!
  '9':
  - type: text
    content: Il nous a conservé la vie,
  - type: text
    content: et il n'a pas permis que notre pied trébuche.
