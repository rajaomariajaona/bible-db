document_id: PSA.66
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Bénédictions après l'épreuve
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef de chœur. Chant, psaume.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Poussez vers Dieu des cris de joie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous, tous les habitants de la terre!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Chantez la gloire de son nom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: célébrez sa gloire par vos louanges!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dites à Dieu: «Que ta manière d''agir est redoutable!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: A cause de la grandeur de ta force, tes ennemis te flattent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Toute la terre t'adore et chante en ton honneur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'elle chante ton nom.» '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: – Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Venez voir ce que Dieu a fait!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est redoutable quand il agit envers les hommes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il a changé la mer en terre ferme:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: on a traversé le fleuve à pied;
- type: usfm
  marker: q1
  children:
  - type: text
    text: alors nous nous sommes réjouis en lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il domine éternellement par sa puissance;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ses yeux observent les nations:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'que les rebelles ne fassent pas les fiers! '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: – Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Peuples, bénissez notre Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: faites retentir sa louange!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Il nous a conservé la vie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il n'a pas permis que notre pied trébuche.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: En effet, tu nous as mis à l'épreuve, ô Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu nous as purifiés au creuset comme l'argent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tu nous as amenés dans un piège,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu as mis sur nos reins un fardeau pesant,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: tu as fait monter des hommes sur notre tête;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nous avons traversé le feu et l'eau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais tu nous en as tirés pour nous donner l'abondance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: J'irai dans ta maison avec des holocaustes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'j''accomplirai mes vœux envers toi:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: mes lèvres se sont ouvertes pour les exprimer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ma bouche les a prononcés quand j'étais dans la détresse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Je t'offrirai des bêtes grasses en holocauste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: des béliers avec de l'encens;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'je sacrifierai des taureaux avec des boucs. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: – Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Venez, écoutez, vous tous qui craignez Dieu, et je raconterai
- type: usfm
  marker: q1
  children:
  - type: text
    text: ce qu'il a fait pour moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: J'ai crié à lui de ma bouche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ma langue a célébré sa louange.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Si j'avais eu l'injustice en vue dans mon cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le Seigneur ne m'aurait pas exaucé,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: mais Dieu m'a exaucé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a été attentif à ma prière.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Béni soit Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car il n'a pas rejeté ma prière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il ne m'a pas retiré sa bonté!
