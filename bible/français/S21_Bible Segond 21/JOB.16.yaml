document_id: JOB.16,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Intervention n° 5 de Job
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Job prit la parole et dit:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ils ouvrent la bouche contre moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils m'insultent et me frappent les joues,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils s'attroupent contre moi.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: »Dieu m'a livré au pouvoir d'un gamin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il me jette entre les mains des méchants.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: J'étais tranquille et il m'a secoué.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il m'a attrapé par la nuque et m'a brisé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il m'a redressé et me prend pour cible.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ses flèches m'environnent.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il me transperce les reins sans aucune pitié,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il verse ma bile par terre.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Il fait en moi brèche sur brèche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il se précipite sur moi comme un guerrier.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: J'ai cousu un sac sur ma peau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j'ai traîné ma fierté dans la poussière.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Mon visage est enflammé à force de pleurer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'ombre de la mort est sur mes paupières.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Pourtant, je n'ai commis aucune violence
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ma prière a toujours été pure.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: »Terre, ne couvre pas mon sang,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que mon cri ne reste pas cantonné à un endroit!
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Déjà maintenant, mon témoin est dans le ciel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mon défenseur est dans les lieux élevés.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: «J'ai entendu beaucoup de propos semblables.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous êtes tous des consolateurs pénibles.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Mes amis se moquent de moi?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est Dieu que j'implore avec larmes.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Puisse-t-il être l'arbitre entre l'homme et Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: entre l'être humain et son ami!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: En effet, encore quelques années seulement
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je m'en irai par un sentier d'où je ne reviendrai pas.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Quand finiront ces discours qui ne sont que du vent?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi cette irritation dans tes réponses?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Moi aussi, je pourrais parler comme vous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'si vous étiez à ma place:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j'alignerais les discours contre vous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je hocherais la tête sur vous,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: je vous fortifierais par mes paroles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le mouvement de mes lèvres vous apporterait du soulagement.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: »Si je parle, ma souffrance n'est pas soulagée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: si je me tais, elle ne s'en ira pas loin de moi.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Maintenant, hélas, il m'a épuisé.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as dévasté tous les miens.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Tu m'as creusé des rides qui témoignent contre moi.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ma maigreur se dresse contre moi et m'accuse en face.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: »Sa colère me déchire et s'attaque à moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il grince des dents contre moi.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon adversaire me transperce de son regard.
