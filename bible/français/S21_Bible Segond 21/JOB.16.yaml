document_id: JOB.16,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Intervention n° 5 de Job
  - type: text
    content: 'Job prit la parole et dit:'
  '10':
  - type: text
    content: Ils ouvrent la bouche contre moi,
  - type: text
    content: ils m'insultent et me frappent les joues,
  - type: text
    content: ils s'attroupent contre moi.
  '11':
  - type: text
    content: »Dieu m'a livré au pouvoir d'un gamin,
  - type: text
    content: il me jette entre les mains des méchants.
  '12':
  - type: text
    content: J'étais tranquille et il m'a secoué.
  - type: text
    content: Il m'a attrapé par la nuque et m'a brisé,
  - type: text
    content: il m'a redressé et me prend pour cible.
  '13':
  - type: text
    content: Ses flèches m'environnent.
  - type: text
    content: Il me transperce les reins sans aucune pitié,
  - type: text
    content: il verse ma bile par terre.
  '14':
  - type: text
    content: Il fait en moi brèche sur brèche,
  - type: text
    content: il se précipite sur moi comme un guerrier.
  '15':
  - type: text
    content: J'ai cousu un sac sur ma peau,
  - type: text
    content: j'ai traîné ma fierté dans la poussière.
  '16':
  - type: text
    content: Mon visage est enflammé à force de pleurer,
  - type: text
    content: l'ombre de la mort est sur mes paupières.
  '17':
  - type: text
    content: Pourtant, je n'ai commis aucune violence
  - type: text
    content: et ma prière a toujours été pure.
  '18':
  - type: text
    content: »Terre, ne couvre pas mon sang,
  - type: text
    content: que mon cri ne reste pas cantonné à un endroit!
  '19':
  - type: text
    content: Déjà maintenant, mon témoin est dans le ciel,
  - type: text
    content: mon défenseur est dans les lieux élevés.
  '2':
  - type: text
    content: «J'ai entendu beaucoup de propos semblables.
  - type: text
    content: Vous êtes tous des consolateurs pénibles.
  '20':
  - type: text
    content: Mes amis se moquent de moi?
  - type: text
    content: C'est Dieu que j'implore avec larmes.
  '21':
  - type: text
    content: Puisse-t-il être l'arbitre entre l'homme et Dieu,
  - type: text
    content: entre l'être humain et son ami!
  '22':
  - type: text
    content: En effet, encore quelques années seulement
  - type: text
    content: et je m'en irai par un sentier d'où je ne reviendrai pas.
  '3':
  - type: text
    content: Quand finiront ces discours qui ne sont que du vent?
  - type: text
    content: Pourquoi cette irritation dans tes réponses?
  '4':
  - type: text
    content: Moi aussi, je pourrais parler comme vous,
  - type: text
    content: 'si vous étiez à ma place:'
  - type: text
    content: j'alignerais les discours contre vous,
  - type: text
    content: je hocherais la tête sur vous,
  '5':
  - type: text
    content: je vous fortifierais par mes paroles,
  - type: text
    content: le mouvement de mes lèvres vous apporterait du soulagement.
  '6':
  - type: text
    content: »Si je parle, ma souffrance n'est pas soulagée,
  - type: text
    content: si je me tais, elle ne s'en ira pas loin de moi.
  '7':
  - type: text
    content: Maintenant, hélas, il m'a épuisé.
  - type: text
    content: Tu as dévasté tous les miens.
  '8':
  - type: text
    content: Tu m'as creusé des rides qui témoignent contre moi.
  - type: text
    content: Ma maigreur se dresse contre moi et m'accuse en face.
  '9':
  - type: text
    content: »Sa colère me déchire et s'attaque à moi,
  - type: text
    content: il grince des dents contre moi.
  - type: text
    content: Mon adversaire me transperce de son regard.
