document_id: NEH.6
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Achèvement de la muraille
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Je n''avais pas encore posé les battants des portes lorsque Sanballat, Tobija, Guéshem l''Arabe et nos autres ennemis ont appris que j''avais reconstruit la muraille et qu''il n''y restait plus de brèche. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Alors Sanballat et Guéshem m''ont fait parvenir ce message: «Viens! Ayons une entrevue ensemble dans les villages de la vallée d''Ono.» Ils avaient l''intention de me faire du mal. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Je leur ai envoyé des messagers avec cette réponse: «J''ai une grande tâche à accomplir et je ne peux pas descendre là-bas. Pourquoi le travail devrait-il être interrompu pendant que je l''abandonnerais pour vous rejoindre?» '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ils m''ont adressé quatre fois la même demande, avec toujours la même réponse de ma part. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'La cinquième fois, Sanballat m''a fait parvenir ce message par son serviteur. Celui-ci tenait une lettre ouverte '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'où il était écrit: «On raconte parmi les nations, et Guéshem l''affirme, que les Juifs et toi, vous avez l''intention de vous révolter et que c''est la raison pour laquelle tu reconstruis la muraille. D''après ces rumeurs, tu vas devenir leur roi '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'et tu as même établi des prophètes pour te proclamer roi de Juda à Jérusalem. Maintenant, le roi va avoir connaissance de ces rumeurs. Viens donc et tenons conseil ensemble!» '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'J''ai fait répondre à Sanballat: «Il n''y a rien de vrai dans ces rumeurs dont tu parles; c''est toi qui les inventes de toutes pièces!» '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Tous ces gens voulaient nous effrayer; ils se disaient: «Ils baisseront les bras et le travail ne se fera pas.»'
- type: usfm
  marker: p
  children:
  - type: text
    text: Maintenant, mon Dieu, fortifie-moi!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Pour ma part, je me suis rendu à la maison de Shemaeja, fils de Delaja et petit-fils de Mehétabeel. Il s''était enfermé chez lui et a dit: «Allons ensemble dans la maison de Dieu, à l''intérieur du sanctuaire, et fermons les portes derrière nous, car on va venir pour te tuer, et c''est pendant la nuit qu''on viendra pour cela.» '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'J''ai répondu: «Un gouverneur comme moi prendre la fuite! Du reste, comment un laïc tel que moi pourrait-il entrer dans le sanctuaire et rester en vie? Je n''y entrerai pas.» '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'J''ai discerné par là que ce n''était pas Dieu qui l''avait envoyé, mais qu''il prononçait cette prophétie sur moi parce que Sanballat et Tobija l''avaient soudoyé. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Par son intermédiaire, ils espéraient me faire peur pour que je suive son conseil et commette ainsi un péché. Cela leur aurait permis de salir ma réputation et de m'enlever tout crédit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Mon Dieu, souviens-toi de Tobija et de Sanballat en les traitant conformément à leur façon d'agir! Souviens-toi aussi de la prophétesse Noadia et des autres prophètes qui cherchaient à m'effrayer!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'La muraille a été terminée le vingt-cinquième jour du mois d''Elul, soit en 52 jours. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Lorsque tous nos ennemis, dans toutes les nations environnantes, l'ont appris, ils ont eu peur. Ils se sont sentis tout petits et ont reconnu que c'était notre Dieu qui avait présidé à la réalisation de ce travail.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Même à cette époque-là, il y avait des nobles de Juda qui adressaient fréquemment des lettres à Tobija et qui en recevaient de lui. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Beaucoup, en Juda, avaient en effet conclu un pacte avec lui parce qu''il était le gendre de Shecania, fils d''Arach, et que son fils Jochanan avait épousé la fille de Meshullam, fils de Bérékia. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ils allaient jusqu'à vanter ses mérites en ma présence et à lui rapporter mes paroles. Quant à Tobija, il envoyait des lettres pour m'effrayer.
