document_id: ECC.3,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Un temps pour tout
  - type: text
    content: 'Il y a un moment pour tout et un temps pour toute activité sous le ciel: '
  '10':
  - type: text
    content: 'J''ai vu quelle occupation Dieu réserve aux humains. '
  '11':
  - type: text
    content: 'Il fait toute chose belle au moment voulu. Il a même mis dans leur cœur la pensée de l''éternité, même si l''homme ne peut pas comprendre l''œuvre que Dieu accomplit du début à la fin. '
  '12':
  - type: text
    content: 'J''ai reconnu que leur seul bonheur consiste à se réjouir et à bien agir pendant leur vie, '
  '13':
  - type: text
    content: 'et que, si un homme mange, boit et prend du plaisir dans tout son travail, c''est un cadeau de Dieu. '
  '14':
  - type: text
    content: 'J''ai reconnu que tout ce que Dieu fait durera toujours, sans qu''on puisse ajouter ou enlever quoi que ce soit, et que Dieu agit de cette manière afin qu''on éprouve de la crainte devant lui. '
  '15':
  - type: text
    content: Ce qui existe a déjà existé, tout comme ce qui existera, et Dieu ramène ce qui est passé.
  - type: heading
    content: L'homme et la bête
  '16':
  - type: text
    content: 'J''ai encore vu, sous le soleil, qu''à l''endroit désigné pour le jugement se trouvait la méchanceté et qu''à l''endroit désigné pour la justice régnait la méchanceté. '
  '17':
  - type: text
    content: 'Je me suis dit dans mon cœur: «Le juste et le méchant, c''est Dieu qui les jugera, car il y a un temps pour toute activité et pour tout ce qui se fait.» '
  '18':
  - type: text
    content: 'Je me suis dit dans mon cœur, à propos des humains, que Dieu les met à l''épreuve pour qu''ils voient par eux-mêmes qu''ils ne sont que des bêtes. '
  '19':
  - type: text
    content: 'En effet, le sort de l''homme et celui de la bête sont identiques: ils meurent tous les deux, ils ont tous un même souffle et la supériorité de l''homme sur la bête est nulle, puisque tout n''est que fumée. '
  '2':
  - type: text
    content: 'un temps pour naître et un temps pour mourir, un temps pour planter et un temps pour arracher ce qui a été planté, '
  '20':
  - type: text
    content: 'Tout va au même endroit. Tout a été fait à partir de la poussière et tout retourne à la poussière. '
  '21':
  - type: text
    content: 'Qui sait si le souffle des humains monte vers les hauteurs et si le souffle de la bête descend dans la terre? '
  '22':
  - type: text
    content: 'J''ai vu qu''il n''y a rien de mieux pour l''homme que de se réjouir de ce qu''il fait: voilà quelle est sa part. En effet, qui le ramènera pour qu''il voie ce qui sera après lui?'
  '3':
  - type: text
    content: 'un temps pour tuer et un temps pour guérir, un temps pour démolir et un temps pour construire, '
  '4':
  - type: text
    content: 'un temps pour pleurer et un temps pour rire, un temps pour se lamenter et un temps pour danser, '
  '5':
  - type: text
    content: 'un temps pour lancer des pierres et un temps pour en ramasser, un temps pour embrasser et un temps pour s''éloigner des embrassades, '
  '6':
  - type: text
    content: 'un temps pour chercher et un temps pour perdre, un temps pour garder et un temps pour jeter, '
  '7':
  - type: text
    content: 'un temps pour déchirer et un temps pour coudre, un temps pour se taire et un temps pour parler, '
  '8':
  - type: text
    content: 'un temps pour aimer et un temps pour détester, un temps pour la guerre et un temps pour la paix. '
  '9':
  - type: text
    content: Mais quel avantage celui qui agit retire-t-il de la peine qu'il se donne?
