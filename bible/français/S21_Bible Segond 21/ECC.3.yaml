document_id: ECC.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Un temps pour tout
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Il y a un moment pour tout et un temps pour toute activité sous le ciel: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'un temps pour naître et un temps pour mourir, un temps pour planter et un temps pour arracher ce qui a été planté, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'un temps pour tuer et un temps pour guérir, un temps pour démolir et un temps pour construire, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'un temps pour pleurer et un temps pour rire, un temps pour se lamenter et un temps pour danser, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'un temps pour lancer des pierres et un temps pour en ramasser, un temps pour embrasser et un temps pour s''éloigner des embrassades, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'un temps pour chercher et un temps pour perdre, un temps pour garder et un temps pour jeter, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'un temps pour déchirer et un temps pour coudre, un temps pour se taire et un temps pour parler, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'un temps pour aimer et un temps pour détester, un temps pour la guerre et un temps pour la paix. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mais quel avantage celui qui agit retire-t-il de la peine qu'il se donne?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'J''ai vu quelle occupation Dieu réserve aux humains. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il fait toute chose belle au moment voulu. Il a même mis dans leur cœur la pensée de l''éternité, même si l''homme ne peut pas comprendre l''œuvre que Dieu accomplit du début à la fin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'J''ai reconnu que leur seul bonheur consiste à se réjouir et à bien agir pendant leur vie, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'et que, si un homme mange, boit et prend du plaisir dans tout son travail, c''est un cadeau de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'J''ai reconnu que tout ce que Dieu fait durera toujours, sans qu''on puisse ajouter ou enlever quoi que ce soit, et que Dieu agit de cette manière afin qu''on éprouve de la crainte devant lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ce qui existe a déjà existé, tout comme ce qui existera, et Dieu ramène ce qui est passé.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L'homme et la bête
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'J''ai encore vu, sous le soleil, qu''à l''endroit désigné pour le jugement se trouvait la méchanceté et qu''à l''endroit désigné pour la justice régnait la méchanceté. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Je me suis dit dans mon cœur: «Le juste et le méchant, c''est Dieu qui les jugera, car il y a un temps pour toute activité et pour tout ce qui se fait.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Je me suis dit dans mon cœur, à propos des humains, que Dieu les met à l''épreuve pour qu''ils voient par eux-mêmes qu''ils ne sont que des bêtes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'En effet, le sort de l''homme et celui de la bête sont identiques: ils meurent tous les deux, ils ont tous un même souffle et la supériorité de l''homme sur la bête est nulle, puisque tout n''est que fumée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tout va au même endroit. Tout a été fait à partir de la poussière et tout retourne à la poussière. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Qui sait si le souffle des humains monte vers les hauteurs et si le souffle de la bête descend dans la terre? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'J''ai vu qu''il n''y a rien de mieux pour l''homme que de se réjouir de ce qu''il fait: voilà quelle est sa part. En effet, qui le ramènera pour qu''il voie ce qui sera après lui?'
