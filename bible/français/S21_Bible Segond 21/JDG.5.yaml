document_id: JDG.5,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Cantique de Débora
  - type: text
    content: 'Ce jour-là, Débora chanta le cantique que voici avec Barak, fils d''Abinoam:'
  '10':
  - type: text
    content: »Vous qui montez de blanches ânesses,
  - type: text
    content: vous qui avez pour sièges des tapis
  - type: text
    content: et vous qui marchez sur les routes, chantez!
  '11':
  - type: text
    content: Que de leur voix, du milieu des abreuvoirs,
  - type: text
    content: les porteurs d'eau célèbrent les bienfaits de l'Eternel,
  - type: text
    content: les bienfaits de son chef en Israël!
  - type: text
    content: '»Alors le peuple de l''Eternel est descendu vers les portes:'
  '12':
  - type: text
    content: ‘Réveille-toi, réveille-toi, Débora!
  - type: text
    content: Réveille-toi, réveille-toi, dis un cantique!
  - type: text
    content: Lève-toi, Barak, emmène tes prisonniers, fils d'Abinoam!’
  '13':
  - type: text
    content: »Alors un reste du peuple a triomphé des puissants,
  - type: text
    content: l'Eternel m'a donné la victoire sur les héros.
  '14':
  - type: text
    content: D'Ephraïm sont arrivés les habitants d'Amalek,
  - type: text
    content: à ta suite a marché Benjamin comme membre de ta troupe.
  - type: text
    content: De Makir sont venus des chefs,
  - type: text
    content: et de Zabulon des commandants.
  '15':
  - type: text
    content: Les princes d'Issacar ont accompagné Débora,
  - type: text
    content: et Issacar a suivi Barak.
  - type: text
    content: Il a été envoyé sur ses pas dans la vallée.
  - type: text
    content: »Mais près des ruisseaux de Ruben,
  - type: text
    content: grandes ont été les délibérations du cœur!
  '16':
  - type: text
    content: Pourquoi es-tu resté au milieu des étables
  - type: text
    content: à écouter le bêlement des troupeaux?
  - type: text
    content: Près des ruisseaux de Ruben,
  - type: text
    content: grandes ont été les délibérations du cœur!
  '17':
  - type: text
    content: Galaad, de l'autre côté du Jourdain, n'a pas quitté sa demeure.
  - type: text
    content: Pourquoi Dan est-il resté sur les bateaux?
  - type: text
    content: Aser s'est assis sur le rivage de la mer et s'est reposé dans ses ports.
  '18':
  - type: text
    content: »Mais Zabulon est un peuple qui a affronté la mort,
  - type: text
    content: et Nephthali de même, sur les hauteurs des champs.
  '19':
  - type: text
    content: Les rois sont venus, ils ont combattu.
  - type: text
    content: Alors les rois de Canaan ont combattu
  - type: text
    content: à Thaanac, vers les eaux de Meguiddo.
  - type: text
    content: Ils n'ont remporté ni butin ni argent.
  '2':
  - type: text
    content: «Des chefs se sont mis à la tête du peuple en Israël,
  - type: text
    content: et le peuple s'est montré prêt à combattre.
  - type: text
    content: Bénissez-en l'Eternel!
  '20':
  - type: text
    content: Du haut du ciel on a combattu,
  - type: text
    content: depuis leur parcours les étoiles ont combattu contre Sisera.
  '21':
  - type: text
    content: Le torrent du Kison les a entraînés,
  - type: text
    content: le torrent des temps anciens, le torrent du Kison.
  - type: text
    content: Mon âme, va de l'avant, sois forte!
  '22':
  - type: text
    content: Alors les sabots des chevaux ont retenti,
  - type: text
    content: dans la course, dans la course précipitée de leurs guerriers.
  '23':
  - type: text
    content: »Maudissez Méroz, dit l'ange de l'Eternel,
  - type: text
    content: maudissez, maudissez ses habitants,
  - type: text
    content: car ils ne sont pas venus au secours de l'Eternel,
  - type: text
    content: au secours de l'Eternel, parmi les hommes vaillants.
  '24':
  - type: text
    content: »Que Jaël, la femme de Héber le Kénien,
  - type: text
    content: soit bénie parmi les femmes!
  - type: text
    content: Qu'elle soit bénie parmi les femmes qui habitent sous les tentes!
  '25':
  - type: text
    content: Il a demandé de l'eau, elle a donné du lait;
  - type: text
    content: dans la coupe d'honneur elle a présenté du lait caillé.
  '26':
  - type: text
    content: D'une main elle a pris le pieu,
  - type: text
    content: et de l'autre le marteau des ouvriers.
  - type: text
    content: Elle a frappé Sisera, lui a fendu la tête,
  - type: text
    content: fracassé et transpercé la tempe.
  '27':
  - type: text
    content: Aux pieds de Jaël il s'est affaissé,
  - type: text
    content: il est tombé, il s'est couché.
  - type: text
    content: A ses pieds il s'est affaissé, il est tombé.
  - type: text
    content: Là même où il s'est affaissé, il est tombé sans vie.
  '28':
  - type: text
    content: »Par la fenêtre, à travers le treillis,
  - type: text
    content: 'la mère de Sisera regarde et s''écrie:'
  - type: text
    content: ‘Pourquoi son char tarde-t-il à venir?
  - type: text
    content: Pourquoi ses chars vont-ils si lentement?’
  '29':
  - type: text
    content: Les plus sages parmi ses femmes lui répondent,
  - type: text
    content: 'et elle se répète à elle-même:'
  '3':
  - type: text
    content: »Rois, écoutez! Princes, prêtez l'oreille!
  - type: text
    content: Je chanterai, oui, je chanterai en l'honneur de l'Eternel,
  - type: text
    content: je chanterai en l'honneur de l'Eternel, le Dieu d'Israël.
  '30':
  - type: text
    content: ‘N'est-ce pas parce qu'ils trouvent du butin? N'est-ce pas parce qu'ils se le partagent?
  - type: text
    content: Une jeune fille, deux jeunes filles par homme,
  - type: text
    content: du butin en vêtements de couleur pour Sisera,
  - type: text
    content: du butin en vêtements de couleur brodés,
  - type: text
    content: un vêtement de couleur, deux vêtements brodés
  - type: text
    content: pour le cou du vainqueur?’
  '31':
  - type: text
    content: »Que tous tes ennemis disparaissent ainsi, Eternel!
  - type: text
    content: Ceux qui l'aiment sont pareils au soleil
  - type: text
    content: quand il paraît dans toute sa force.»
  - type: text
    content: Le pays fut en paix pendant 40 ans.
  '4':
  - type: text
    content: »Eternel, quand tu es sorti de Séir,
  - type: text
    content: quand tu t'es avancé, venant des champs d'Edom,
  - type: text
    content: la terre a tremblé et le ciel a ruisselé,
  - type: text
    content: les nuages ont déversé leur eau.
  '5':
  - type: text
    content: Les montagnes se sont liquéfiées devant l'Eternel,
  - type: text
    content: le Sinaï a tremblé devant l'Eternel, le Dieu d'Israël.
  '6':
  - type: text
    content: »A l'époque de Shamgar, fils d'Anath,
  - type: text
    content: à l'époque de Jaël, les routes étaient abandonnées,
  - type: text
    content: et ceux qui voyageaient prenaient des chemins détournés.
  '7':
  - type: text
    content: Les chefs étaient sans force en Israël, sans force,
  - type: text
    content: quand je me suis levée, moi, Débora,
  - type: text
    content: quand je me suis levée comme une mère en Israël.
  '8':
  - type: text
    content: 'Le peuple avait choisi de nouveaux dieux:'
  - type: text
    content: alors la guerre était aux portes.
  - type: text
    content: On ne voyait ni bouclier ni lance
  - type: text
    content: pour 40'000 hommes en Israël.
  '9':
  - type: text
    content: »Mon cœur est avec les chefs d'Israël,
  - type: text
    content: avec ceux du peuple qui se sont montrés prêts à combattre.
  - type: text
    content: Bénissez l'Eternel!
