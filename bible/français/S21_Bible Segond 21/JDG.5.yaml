document_id: JDG.5
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Cantique de Débora
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ce jour-là, Débora chanta le cantique que voici avec Barak, fils d''Abinoam:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: «Des chefs se sont mis à la tête du peuple en Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le peuple s'est montré prêt à combattre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Bénissez-en l'Eternel!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: »Rois, écoutez! Princes, prêtez l'oreille!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je chanterai, oui, je chanterai en l'honneur de l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je chanterai en l'honneur de l'Eternel, le Dieu d'Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: »Eternel, quand tu es sorti de Séir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand tu t'es avancé, venant des champs d'Edom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la terre a tremblé et le ciel a ruisselé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les nuages ont déversé leur eau.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Les montagnes se sont liquéfiées devant l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le Sinaï a tremblé devant l'Eternel, le Dieu d'Israël.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: »A l'époque de Shamgar, fils d'Anath,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à l'époque de Jaël, les routes étaient abandonnées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ceux qui voyageaient prenaient des chemins détournés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Les chefs étaient sans force en Israël, sans force,
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand je me suis levée, moi, Débora,
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand je me suis levée comme une mère en Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Le peuple avait choisi de nouveaux dieux:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: alors la guerre était aux portes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: On ne voyait ni bouclier ni lance
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour 40'000 hommes en Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: »Mon cœur est avec les chefs d'Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: avec ceux du peuple qui se sont montrés prêts à combattre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Bénissez l'Eternel!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: »Vous qui montez de blanches ânesses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous qui avez pour sièges des tapis
- type: usfm
  marker: q1
  children:
  - type: text
    text: et vous qui marchez sur les routes, chantez!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Que de leur voix, du milieu des abreuvoirs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les porteurs d'eau célèbrent les bienfaits de l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les bienfaits de son chef en Israël!
- type: usfm
  marker: q1
  children:
  - type: text
    text: '»Alors le peuple de l''Eternel est descendu vers les portes:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ‘Réveille-toi, réveille-toi, Débora!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Réveille-toi, réveille-toi, dis un cantique!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lève-toi, Barak, emmène tes prisonniers, fils d'Abinoam!’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: »Alors un reste du peuple a triomphé des puissants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'Eternel m'a donné la victoire sur les héros.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: D'Ephraïm sont arrivés les habitants d'Amalek,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à ta suite a marché Benjamin comme membre de ta troupe.
- type: usfm
  marker: q1
  children:
  - type: text
    text: De Makir sont venus des chefs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de Zabulon des commandants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Les princes d'Issacar ont accompagné Débora,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et Issacar a suivi Barak.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a été envoyé sur ses pas dans la vallée.
- type: usfm
  marker: q1
  children:
  - type: text
    text: »Mais près des ruisseaux de Ruben,
- type: usfm
  marker: q1
  children:
  - type: text
    text: grandes ont été les délibérations du cœur!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Pourquoi es-tu resté au milieu des étables
- type: usfm
  marker: q1
  children:
  - type: text
    text: à écouter le bêlement des troupeaux?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Près des ruisseaux de Ruben,
- type: usfm
  marker: q1
  children:
  - type: text
    text: grandes ont été les délibérations du cœur!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Galaad, de l'autre côté du Jourdain, n'a pas quitté sa demeure.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi Dan est-il resté sur les bateaux?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aser s'est assis sur le rivage de la mer et s'est reposé dans ses ports.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: »Mais Zabulon est un peuple qui a affronté la mort,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et Nephthali de même, sur les hauteurs des champs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Les rois sont venus, ils ont combattu.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Alors les rois de Canaan ont combattu
- type: usfm
  marker: q1
  children:
  - type: text
    text: à Thaanac, vers les eaux de Meguiddo.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils n'ont remporté ni butin ni argent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Du haut du ciel on a combattu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: depuis leur parcours les étoiles ont combattu contre Sisera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Le torrent du Kison les a entraînés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le torrent des temps anciens, le torrent du Kison.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon âme, va de l'avant, sois forte!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Alors les sabots des chevaux ont retenti,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans la course, dans la course précipitée de leurs guerriers.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: »Maudissez Méroz, dit l'ange de l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: maudissez, maudissez ses habitants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car ils ne sont pas venus au secours de l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: au secours de l'Eternel, parmi les hommes vaillants.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: »Que Jaël, la femme de Héber le Kénien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: soit bénie parmi les femmes!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu'elle soit bénie parmi les femmes qui habitent sous les tentes!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Il a demandé de l'eau, elle a donné du lait;
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans la coupe d'honneur elle a présenté du lait caillé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: D'une main elle a pris le pieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de l'autre le marteau des ouvriers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle a frappé Sisera, lui a fendu la tête,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fracassé et transpercé la tempe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Aux pieds de Jaël il s'est affaissé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il est tombé, il s'est couché.
- type: usfm
  marker: q1
  children:
  - type: text
    text: A ses pieds il s'est affaissé, il est tombé.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Là même où il s'est affaissé, il est tombé sans vie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: »Par la fenêtre, à travers le treillis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'la mère de Sisera regarde et s''écrie:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Pourquoi son char tarde-t-il à venir?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi ses chars vont-ils si lentement?’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Les plus sages parmi ses femmes lui répondent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et elle se répète à elle-même:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ‘N'est-ce pas parce qu'ils trouvent du butin? N'est-ce pas parce qu'ils se le partagent?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Une jeune fille, deux jeunes filles par homme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: du butin en vêtements de couleur pour Sisera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: du butin en vêtements de couleur brodés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un vêtement de couleur, deux vêtements brodés
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour le cou du vainqueur?’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: »Que tous tes ennemis disparaissent ainsi, Eternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ceux qui l'aiment sont pareils au soleil
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand il paraît dans toute sa force.»
- type: usfm
  marker: m
  children:
  - type: text
    text: Le pays fut en paix pendant 40 ans.
