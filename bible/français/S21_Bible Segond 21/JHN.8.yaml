document_id: JHN.8,152
type_code: fra
verses:
  '1':
  - type: heading
    content: La femme adultère
  - type: text
    content: 'Jésus se rendit au mont des Oliviers. '
  '10':
  - type: text
    content: 'Alors il se redressa et, ne voyant plus qu''elle, il lui dit: «Femme, où sont ceux qui t''accusaient? Personne ne t''a donc condamnée?» '
  '11':
  - type: text
    content: 'Elle répondit: «Personne, Seigneur.» Jésus lui dit: «Moi non plus, je ne te condamne pas; vas-y et désormais ne pèche plus.»]'
  - type: heading
    content: Jésus, la lumière du monde
  '12':
  - type: text
    content: 'Jésus leur parla de nouveau. Il dit: «Je suis la lumière du monde. Celui qui me suit ne marchera pas dans les ténèbres, mais il aura au contraire la lumière de la vie.»'
  '13':
  - type: text
    content: 'Là-dessus, les pharisiens lui dirent: «Tu te rends témoignage à toi-même; ton témoignage n''est pas vrai.» '
  '14':
  - type: text
    content: 'Jésus leur répondit: «Même si je me rends témoignage à moi-même, mon témoignage est vrai, car je sais d''où je suis venu et où je vais. Quant à vous, vous ne savez pas d''où je viens ni où je vais. '
  '15':
  - type: text
    content: 'Vous, vous jugez de façon humaine; moi, je ne juge personne. '
  '16':
  - type: text
    content: 'Et si je juge, mon jugement est vrai, car je ne suis pas seul, mais le Père qui m''a envoyé est avec moi. '
  '17':
  - type: text
    content: 'Il est écrit dans votre loi que le témoignage de deux personnes est vrai. '
  '18':
  - type: text
    content: 'Or, je me rends témoignage à moi-même et le Père qui m''a envoyé me rend aussi témoignage.» '
  '19':
  - type: text
    content: 'Ils lui dirent donc: «Où est ton père?» Jésus répondit: «Vous ne connaissez ni moi ni mon Père. Si vous me connaissiez, vous connaîtriez aussi mon Père.»'
  '2':
  - type: text
    content: 'Mais dès le matin il revint dans le temple et tout le peuple s''approcha de lui. Il s''assit et se mit à les enseigner. '
  '20':
  - type: text
    content: Jésus dit ces paroles alors qu'il enseignait dans le temple à l'endroit où était le trésor, et personne ne l'arrêta parce que son heure n'était pas encore venue.
  '21':
  - type: text
    content: 'Jésus leur dit encore: «Je m''en vais et vous me chercherez, mais vous mourrez dans votre péché; vous ne pouvez pas venir là où je vais.» '
  '22':
  - type: text
    content: 'Là-dessus les Juifs dirent: «Va-t-il se tuer, puisqu''il dit: ‘Vous ne pouvez pas venir où je vais’?» '
  '23':
  - type: text
    content: 'Il leur dit: «Vous êtes d''en bas; moi, je suis d''en haut. Vous êtes de ce monde; moi, je ne suis pas de ce monde. '
  '24':
  - type: text
    content: 'C''est pourquoi je vous ai dit que vous mourrez dans vos péchés. En effet, si vous ne croyez pas que '
  - type: text
    content: moi, je suis
  - type: note
    content: 'Moi, je suis: nom que Dieu s''est donné quand il s''est révélé à Moïse en Exode 3.14 (idem versets 28, 58). Voir Hébreux 13.8.'
  - type: text
    content: ', vous mourrez dans vos péchés.» '
  '25':
  - type: text
    content: '«Toi, qui es-tu?» lui dirent-ils. Jésus leur répondit: «Ce que je vous dis depuis le début. '
  '26':
  - type: text
    content: 'J''ai beaucoup de choses à dire et à juger à votre sujet, mais celui qui m''a envoyé est vrai, et ce que j''ai entendu de lui, je le dis au monde.» '
  '27':
  - type: text
    content: 'Ils ne comprirent pas qu''il leur parlait du Père. '
  '28':
  - type: text
    content: 'Jésus leur dit donc: «Quand vous aurez élevé le Fils de l''homme, alors vous reconnaîtrez que'
  - type: text
    content: moi, je suis
  - type: text
    content: ' et que je ne fais rien de moi-même, mais que je dis ce que mon Père m''a enseigné. '
  '29':
  - type: text
    content: Celui qui m'a envoyé est avec moi, il ne m'a pas laissé seul, parce que je fais toujours ce qui lui est agréable.»
  '3':
  - type: text
    content: 'Alors les spécialistes de la loi et les pharisiens amenèrent une femme surprise en train de commettre un adultère. Ils la placèrent au milieu de la foule '
  '30':
  - type: text
    content: 'Comme Jésus disait cela, beaucoup crurent en lui. '
  '31':
  - type: text
    content: 'Alors il dit aux Juifs qui avaient cru en lui: «Si vous demeurez dans ma parole, vous êtes vraiment mes disciples, '
  '32':
  - type: text
    content: 'vous connaîtrez la vérité, et la vérité vous rendra libres.» '
  '33':
  - type: text
    content: 'Ils lui répondirent: «Nous sommes la descendance d''Abraham et nous n''avons jamais été esclaves de personne. Comment peux-tu dire: ‘Vous deviendrez libres’?» '
  '34':
  - type: text
    content: '«En vérité, en vérité, je vous le dis, leur répliqua Jésus, toute personne qui commet le péché est esclave du péché. '
  '35':
  - type: text
    content: 'Or, l''esclave ne reste pas pour toujours dans la famille; c''est le fils qui y reste pour toujours. '
  '36':
  - type: text
    content: 'Si donc le Fils vous libère, vous serez réellement libres. '
  '37':
  - type: text
    content: 'Je sais que vous êtes la descendance d''Abraham. Pourtant, vous cherchez à me faire mourir, parce que ma parole ne pénètre pas en vous. '
  '38':
  - type: text
    content: Je dis ce que j'ai vu chez mon Père et vous, vous faites ce que vous avez entendu de la part de votre père.»
  '39':
  - type: text
    content: 'Ils lui répondirent: «Notre père, c''est Abraham.» Jésus leur dit: «Si vous étiez les enfants d''Abraham, vous agiriez comme lui. '
  '4':
  - type: text
    content: 'et dirent à Jésus: «Maître, cette femme a été surprise en flagrant délit d''adultère. '
  '40':
  - type: text
    content: 'Mais en réalité, vous cherchez à me faire mourir, moi qui, en tant qu''être humain, vous ai dit la vérité que j''ai entendue de Dieu. Cela, Abraham ne l''a pas fait. '
  '41':
  - type: text
    content: 'Vous, vous agissez comme votre père.» Ils lui dirent: «Nous, nous ne sommes pas des enfants illégitimes; nous avons un seul Père: Dieu.» '
  '42':
  - type: text
    content: 'Jésus leur dit: «Si Dieu était votre Père, vous m''aimeriez, car c''est de Dieu que je suis sorti et c''est de sa part que je viens. Je ne suis pas venu de moi-même, mais c''est au contraire lui qui m''a envoyé. '
  '43':
  - type: text
    content: 'Pourquoi ne comprenez-vous pas mon langage? Parce que vous ne pouvez pas écouter ma parole. '
  '44':
  - type: text
    content: 'Vous, vous avez pour père le diable et vous voulez accomplir les désirs de votre père. Il a été meurtrier dès le commencement et il ne s''est pas tenu dans la vérité parce qu''il n''y a pas de vérité en lui. Lorsqu''il profère le mensonge, il parle de son propre fond, car il est menteur et le père du mensonge. '
  '45':
  - type: text
    content: 'Mais moi, parce que je dis la vérité, vous ne me croyez pas. '
  '46':
  - type: text
    content: 'Qui de vous me convaincra de péché? Si je dis la vérité, pourquoi ne me croyez-vous pas? '
  '47':
  - type: text
    content: Celui qui est de Dieu écoute les paroles de Dieu; vous, vous n'écoutez pas parce que vous n'êtes pas de Dieu.»
  '48':
  - type: text
    content: 'Les Juifs lui répondirent: «N''avons-nous pas raison de dire que tu es un Samaritain'
  - type: note
    content: 'Un Samaritain: terme désignant une population méprisée par les Juifs; voir 4.9.'
  - type: text
    content: ' et que tu as un démon?» '
  '49':
  - type: text
    content: 'Jésus répliqua: «Je n''ai pas de démon. Au contraire, j''honore mon Père et vous, vous me déshonorez. '
  '5':
  - type: text
    content: 'Moïse, dans la loi, nous a ordonné de lapider de telles femmes. Et toi, que dis-tu?» '
  '50':
  - type: text
    content: 'Je ne cherche pas ma gloire. Il y en a un qui la cherche et qui juge. '
  '51':
  - type: text
    content: 'En vérité, en vérité, je vous le dis, si quelqu''un garde ma parole, il ne mourra jamais.» '
  '52':
  - type: text
    content: '«Maintenant, lui dirent les Juifs, nous savons que tu as un démon. Abraham est mort, les prophètes aussi, et toi, tu dis: ‘Si quelqu''un garde ma parole, il ne mourra jamais.’ '
  '53':
  - type: text
    content: Serais-tu plus grand que notre père Abraham, qui est mort? Les prophètes aussi sont morts. Pour qui te prends-tu donc?»
  '54':
  - type: text
    content: 'Jésus répondit: «Si je me rends gloire à moi-même, ma gloire ne vaut rien. Cependant, c''est mon Père qui me rend gloire, lui que vous présentez comme votre Dieu '
  '55':
  - type: text
    content: 'alors que vous ne le connaissez pas. Moi, je le connais; et si je disais que je ne le connais pas, je serais comme vous: un menteur. Mais je le connais et je garde sa parole. '
  '56':
  - type: text
    content: 'Votre ancêtre Abraham a été rempli de joie à la pensée de voir mon jour; il l''a vu et il s''est réjoui.» '
  '57':
  - type: text
    content: 'Les Juifs lui dirent: «Tu n''as pas encore 50 ans et tu as vu Abraham!» '
  '58':
  - type: text
    content: 'Jésus leur dit: «En vérité, en vérité, je vous le dis, avant qu''Abraham soit né, '
  - type: text
    content: je suis
  - type: text
    content: .»
  '59':
  - type: text
    content: Là-dessus, ils prirent des pierres pour les jeter contre lui, mais Jésus se cacha et sortit du temple [en passant au milieu d'eux. C'est ainsi qu'il s'en alla].
  '6':
  - type: text
    content: Ils disaient cela pour lui tendre un piège, afin de pouvoir l'accuser.
  - type: text
    content: 'Mais Jésus se baissa et se mit à écrire avec le doigt sur le sol. '
  '7':
  - type: text
    content: 'Comme ils continuaient à l''interroger, il se redressa et leur dit: «Que celui d''entre vous qui est sans péché jette le premier la pierre contre elle.» '
  '8':
  - type: text
    content: 'Puis il se baissa de nouveau et se remit à écrire sur le sol. '
  '9':
  - type: text
    content: 'Quand ils entendirent cela, accusés par leur conscience ils se retirèrent un à un, à commencer par les plus âgés et jusqu''aux derniers; Jésus resta seul avec la femme qui était là au milieu. '
