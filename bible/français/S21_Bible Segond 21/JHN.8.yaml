document_id: JHN.8
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La femme adultère
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jésus se rendit au mont des Oliviers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mais dès le matin il revint dans le temple et tout le peuple s''approcha de lui. Il s''assit et se mit à les enseigner. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Alors les spécialistes de la loi et les pharisiens amenèrent une femme surprise en train de commettre un adultère. Ils la placèrent au milieu de la foule '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'et dirent à Jésus: «Maître, cette femme a été surprise en flagrant délit d''adultère. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Moïse, dans la loi, nous a ordonné de lapider de telles femmes. Et toi, que dis-tu?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ils disaient cela pour lui tendre un piège, afin de pouvoir l'accuser.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Mais Jésus se baissa et se mit à écrire avec le doigt sur le sol. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Comme ils continuaient à l''interroger, il se redressa et leur dit: «Que celui d''entre vous qui est sans péché jette le premier la pierre contre elle.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Puis il se baissa de nouveau et se remit à écrire sur le sol. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Quand ils entendirent cela, accusés par leur conscience ils se retirèrent un à un, à commencer par les plus âgés et jusqu''aux derniers; Jésus resta seul avec la femme qui était là au milieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Alors il se redressa et, ne voyant plus qu''elle, il lui dit: «Femme, où sont ceux qui t''accusaient? Personne ne t''a donc condamnée?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Elle répondit: «Personne, Seigneur.» Jésus lui dit: «Moi non plus, je ne te condamne pas; vas-y et désormais ne pèche plus.»]'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus, la lumière du monde
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Jésus leur parla de nouveau. Il dit: «Je suis la lumière du monde. Celui qui me suit ne marchera pas dans les ténèbres, mais il aura au contraire la lumière de la vie.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Là-dessus, les pharisiens lui dirent: «Tu te rends témoignage à toi-même; ton témoignage n''est pas vrai.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Jésus leur répondit: «Même si je me rends témoignage à moi-même, mon témoignage est vrai, car je sais d''où je suis venu et où je vais. Quant à vous, vous ne savez pas d''où je viens ni où je vais. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Vous, vous jugez de façon humaine; moi, je ne juge personne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Et si je juge, mon jugement est vrai, car je ne suis pas seul, mais le Père qui m''a envoyé est avec moi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il est écrit dans votre loi que le témoignage de deux personnes est vrai. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Or, je me rends témoignage à moi-même et le Père qui m''a envoyé me rend aussi témoignage.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ils lui dirent donc: «Où est ton père?» Jésus répondit: «Vous ne connaissez ni moi ni mon Père. Si vous me connaissiez, vous connaîtriez aussi mon Père.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Jésus dit ces paroles alors qu'il enseignait dans le temple à l'endroit où était le trésor, et personne ne l'arrêta parce que son heure n'était pas encore venue.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Jésus leur dit encore: «Je m''en vais et vous me chercherez, mais vous mourrez dans votre péché; vous ne pouvez pas venir là où je vais.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Là-dessus les Juifs dirent: «Va-t-il se tuer, puisqu''il dit: ‘Vous ne pouvez pas venir où je vais’?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Il leur dit: «Vous êtes d''en bas; moi, je suis d''en haut. Vous êtes de ce monde; moi, je ne suis pas de ce monde. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'C''est pourquoi je vous ai dit que vous mourrez dans vos péchés. En effet, si vous ne croyez pas que '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: moi, je suis
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.24 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Moi, je suis: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'nom que Dieu s''est donné quand il s''est révélé à Moïse en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Exode 3.14
      metadata:
        usfm: EXO.3.14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (idem versets 28, 58). Voir '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hébreux 13.8
      metadata:
        usfm: HEB.13.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', vous mourrez dans vos péchés.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '«Toi, qui es-tu?» lui dirent-ils. Jésus leur répondit: «Ce que je vous dis depuis le début. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'J''ai beaucoup de choses à dire et à juger à votre sujet, mais celui qui m''a envoyé est vrai, et ce que j''ai entendu de lui, je le dis au monde.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ils ne comprirent pas qu''il leur parlait du Père. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Jésus leur dit donc: «Quand vous aurez élevé le Fils de l''homme, alors vous reconnaîtrez que'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: moi, je suis
  - type: text
    text: ' et que je ne fais rien de moi-même, mais que je dis ce que mon Père m''a enseigné. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Celui qui m'a envoyé est avec moi, il ne m'a pas laissé seul, parce que je fais toujours ce qui lui est agréable.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Comme Jésus disait cela, beaucoup crurent en lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Alors il dit aux Juifs qui avaient cru en lui: «Si vous demeurez dans ma parole, vous êtes vraiment mes disciples, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'vous connaîtrez la vérité, et la vérité vous rendra libres.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ils lui répondirent: «Nous sommes la descendance d''Abraham et nous n''avons jamais été esclaves de personne. Comment peux-tu dire: ‘Vous deviendrez libres’?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: '«En vérité, en vérité, je vous le dis, leur répliqua Jésus, toute personne qui commet le péché est esclave du péché. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Or, l''esclave ne reste pas pour toujours dans la famille; c''est le fils qui y reste pour toujours. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Si donc le Fils vous libère, vous serez réellement libres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Je sais que vous êtes la descendance d''Abraham. Pourtant, vous cherchez à me faire mourir, parce que ma parole ne pénètre pas en vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Je dis ce que j'ai vu chez mon Père et vous, vous faites ce que vous avez entendu de la part de votre père.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ils lui répondirent: «Notre père, c''est Abraham.» Jésus leur dit: «Si vous étiez les enfants d''Abraham, vous agiriez comme lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Mais en réalité, vous cherchez à me faire mourir, moi qui, en tant qu''être humain, vous ai dit la vérité que j''ai entendue de Dieu. Cela, Abraham ne l''a pas fait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Vous, vous agissez comme votre père.» Ils lui dirent: «Nous, nous ne sommes pas des enfants illégitimes; nous avons un seul Père: Dieu.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Jésus leur dit: «Si Dieu était votre Père, vous m''aimeriez, car c''est de Dieu que je suis sorti et c''est de sa part que je viens. Je ne suis pas venu de moi-même, mais c''est au contraire lui qui m''a envoyé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Pourquoi ne comprenez-vous pas mon langage? Parce que vous ne pouvez pas écouter ma parole. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Vous, vous avez pour père le diable et vous voulez accomplir les désirs de votre père. Il a été meurtrier dès le commencement et il ne s''est pas tenu dans la vérité parce qu''il n''y a pas de vérité en lui. Lorsqu''il profère le mensonge, il parle de son propre fond, car il est menteur et le père du mensonge. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Mais moi, parce que je dis la vérité, vous ne me croyez pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Qui de vous me convaincra de péché? Si je dis la vérité, pourquoi ne me croyez-vous pas? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Celui qui est de Dieu écoute les paroles de Dieu; vous, vous n'écoutez pas parce que vous n'êtes pas de Dieu.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Les Juifs lui répondirent: «N''avons-nous pas raison de dire que tu es un Samaritain'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.48 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Un Samaritain: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: terme désignant une population méprisée par les Juifs; voir 4.9.
    marker-yv: yv-n
  - type: text
    text: ' et que tu as un démon?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Jésus répliqua: «Je n''ai pas de démon. Au contraire, j''honore mon Père et vous, vous me déshonorez. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Je ne cherche pas ma gloire. Il y en a un qui la cherche et qui juge. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'En vérité, en vérité, je vous le dis, si quelqu''un garde ma parole, il ne mourra jamais.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: '«Maintenant, lui dirent les Juifs, nous savons que tu as un démon. Abraham est mort, les prophètes aussi, et toi, tu dis: ‘Si quelqu''un garde ma parole, il ne mourra jamais.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: Serais-tu plus grand que notre père Abraham, qui est mort? Les prophètes aussi sont morts. Pour qui te prends-tu donc?»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Jésus répondit: «Si je me rends gloire à moi-même, ma gloire ne vaut rien. Cependant, c''est mon Père qui me rend gloire, lui que vous présentez comme votre Dieu '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'alors que vous ne le connaissez pas. Moi, je le connais; et si je disais que je ne le connais pas, je serais comme vous: un menteur. Mais je le connais et je garde sa parole. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'Votre ancêtre Abraham a été rempli de joie à la pensée de voir mon jour; il l''a vu et il s''est réjoui.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Les Juifs lui dirent: «Tu n''as pas encore 50 ans et tu as vu Abraham!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'Jésus leur dit: «En vérité, en vérité, je vous le dis, avant qu''Abraham soit né, '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: je suis
  - type: text
    text: .»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: Là-dessus, ils prirent des pierres pour les jeter contre lui, mais Jésus se cacha et sortit du temple [en passant au milieu d'eux. C'est ainsi qu'il s'en alla].
