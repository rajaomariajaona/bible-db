document_id: 2SA.18
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Défaite et mort d'Absalom
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'David passa en revue le peuple qui était avec lui, et il établit à sa tête des chefs de milliers et des chefs de centaines. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il plaça un tiers du peuple sous le commandement de Joab, un tiers sous celui d''Abishaï, fils de Tseruja et frère de Joab, et un tiers sous celui d''Ittaï, de Gath. Puis le roi dit au peuple: «Moi aussi, je veux partir en campagne avec vous.» '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mais le peuple dit: «Tu ne feras pas cela! En effet, si nous prenons la fuite, ce n''est pas sur nous que l''attention se portera. Même si la moitié d''entre nous mourions, on n''y ferait pas attention, alors que toi, tu vaux autant que 10''000 d''entre nous. En réalité, il vaut mieux que tu puisses nous porter secours depuis la ville.» '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Le roi leur répondit: «Je ferai ce qui vous paraît bon.» Puis il se tint à côté de la porte pendant que tout le peuple sortait, par centaines et par milliers. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Le roi donna cet ordre à Joab, à Abishaï et à Ittaï: «Pour l''amour de moi, faites doucement avec le jeune Absalom!» Tout le peuple entendit l''ordre donné par le roi à tous les chefs au sujet d''Absalom.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Le peuple sortit dans la campagne à la rencontre d''Israël, et la bataille eut lieu dans la forêt d''Ephraïm. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Là, le peuple d''Israël fut battu par les serviteurs de David; il connut ce jour-là une grande défaite en perdant 20''000 hommes. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Le combat s'étendit à toute la région et la forêt fit ce jour-là plus de victimes que l'épée parmi les membres du peuple.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Absalom se trouva en présence des serviteurs de David. Il montait un mulet. Le mulet pénétra sous les branches entrelacées d''un grand térébinthe et la tête d''Absalom fut prise dans le térébinthe. Il resta suspendu en l''air, tandis que le mulet qu''il montait continuait son chemin. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Un homme le vit et annonça à Joab: «J''ai vu Absalom suspendu à un térébinthe.» '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Joab dit à l''homme qui lui apportait cette nouvelle: «Tu l''as vu? Pourquoi donc ne l''as-tu pas abattu sur place? Je t''aurais donné 10 pièces d''argent et une ceinture.» '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mais cet homme dit à Joab: «Même pour 1000 pièces d''argent je ne porterais pas la main contre le fils du roi. En effet, nous avons entendu l''ordre que le roi vous a donné, à Abishaï, à Ittaï et à toi. Il a dit: ‘Veillez chacun sur le jeune Absalom!’ '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Si j''avais menti et l''avais tué, rien n''aurait été caché au roi. Toi-même, tu aurais pris position contre moi.» '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Joab dit: «Je ne vais pas perdre mon temps avec toi!» Puis il prit en main trois javelots et les enfonça dans le cœur d''Absalom alors que celui-ci était encore bien vivant au milieu du térébinthe. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Dix jeunes gens qui portaient les armes de Joab entourèrent Absalom et le frappèrent à mort.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Joab fit alors sonner de la trompette et le peuple revint. Il cessa ainsi de poursuivre Israël, parce que Joab l''en empêcha. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ils prirent Absalom, le jetèrent dans une grande fosse au milieu de la forêt et mirent sur lui un énorme tas de pierres. Tout Israël prit la fuite, chacun se réfugia dans sa tente. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'De son vivant, Absalom s''était fait ériger un monument dans la vallée du roi. Il se disait en effet: «Je n''ai pas de fils pour perpétuer le souvenir de mon nom.» Et il avait donné son propre nom au monument, qu''on appelle encore aujourd''hui «monument d''Absalom».'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Achimaats, fils de Tsadok, dit à Joab: «Laisse-moi courir et apporter au roi la bonne nouvelle que l''Eternel lui a rendu justice en le délivrant de ses ennemis.» '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Joab lui dit: «Tu ne serais pas un messager de bonnes nouvelles aujourd''hui. Tu pourras l''être un autre jour, mais pas aujourd''hui, puisque le fils du roi est mort.» '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Puis Joab dit à un Ethiopien: «Va rapporter au roi ce que tu as vu.» L''Ethiopien se prosterna devant Joab et partit en courant. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Achimaats, fils de Tsadok, insista auprès de Joab: «Quoi qu''il arrive, laisse-moi courir après l''Ethiopien.» Joab dit: «Pourquoi veux-tu faire cela, mon fils? Ce n''est pas un message qui te sera profitable.» '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '«Quoi qu''il arrive, je veux courir», reprit Achimaats. Joab lui dit alors: «Cours!» Achimaats courut en empruntant le chemin de la plaine, et il dépassa l''Ethiopien.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'David était alors assis entre les deux portes de la ville. La sentinelle marchait sur le toit au-dessus de la porte, sur la muraille. Elle leva les yeux et regarda: un homme courait tout seul. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'La sentinelle cria pour l''annoncer au roi. Le roi dit: «S''il est seul, il apporte de bonnes nouvelles.» Cet homme arrivait toujours plus près. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'La sentinelle vit un autre homme courir. Elle cria au portier: «Voici un homme qui court tout seul.» Le roi dit: «Il apporte aussi de bonnes nouvelles.» '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'La sentinelle dit: «La manière de courir du premier me paraît être celle d''Achimaats, le fils de Tsadok.» Le roi dit alors: «C''est un homme de bien, il vient apporter de bonnes nouvelles.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Achimaats cria au roi: «Tout va bien!» Il se prosterna devant le roi, le visage contre terre, et dit: «Béni soit l''Eternel, ton Dieu! Il a livré en ton pouvoir les hommes qui levaient la main contre mon seigneur le roi!» '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Le roi demanda: «Le jeune Absalom va-t-il bien?» Achimaats répondit: «J''ai aperçu une grande agitation au moment où Joab a envoyé le serviteur du roi et moi ton serviteur, mais je ne sais pas ce que c''était.» '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Et le roi dit: «Mets-toi là, de côté.» Achimaats recula et se tint debout.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Alors arriva l''Ethiopien. Il dit: «Que le roi mon seigneur apprenne la bonne nouvelle! Aujourd''hui l''Eternel t''a rendu justice en te délivrant de tous ceux qui s''attaquaient à toi.» '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Le roi demanda à l''Ethiopien: «Le jeune Absalom va-t-il bien?» L''Ethiopien répondit: «Qu''ils soient comme ce jeune homme, les ennemis de mon seigneur le roi et tous ceux qui se dressent contre toi pour te faire du mal!»'
