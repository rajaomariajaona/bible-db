document_id: 2SA.18,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Défaite et mort d'Absalom
  - type: text
    content: 'David passa en revue le peuple qui était avec lui, et il établit à sa tête des chefs de milliers et des chefs de centaines. '
  '10':
  - type: text
    content: 'Un homme le vit et annonça à Joab: «J''ai vu Absalom suspendu à un térébinthe.» '
  '11':
  - type: text
    content: 'Joab dit à l''homme qui lui apportait cette nouvelle: «Tu l''as vu? Pourquoi donc ne l''as-tu pas abattu sur place? Je t''aurais donné 10 pièces d''argent et une ceinture.» '
  '12':
  - type: text
    content: 'Mais cet homme dit à Joab: «Même pour 1000 pièces d''argent je ne porterais pas la main contre le fils du roi. En effet, nous avons entendu l''ordre que le roi vous a donné, à Abishaï, à Ittaï et à toi. Il a dit: ‘Veillez chacun sur le jeune Absalom!’ '
  '13':
  - type: text
    content: 'Si j''avais menti et l''avais tué, rien n''aurait été caché au roi. Toi-même, tu aurais pris position contre moi.» '
  '14':
  - type: text
    content: 'Joab dit: «Je ne vais pas perdre mon temps avec toi!» Puis il prit en main trois javelots et les enfonça dans le cœur d''Absalom alors que celui-ci était encore bien vivant au milieu du térébinthe. '
  '15':
  - type: text
    content: Dix jeunes gens qui portaient les armes de Joab entourèrent Absalom et le frappèrent à mort.
  '16':
  - type: text
    content: 'Joab fit alors sonner de la trompette et le peuple revint. Il cessa ainsi de poursuivre Israël, parce que Joab l''en empêcha. '
  '17':
  - type: text
    content: 'Ils prirent Absalom, le jetèrent dans une grande fosse au milieu de la forêt et mirent sur lui un énorme tas de pierres. Tout Israël prit la fuite, chacun se réfugia dans sa tente. '
  '18':
  - type: text
    content: 'De son vivant, Absalom s''était fait ériger un monument dans la vallée du roi. Il se disait en effet: «Je n''ai pas de fils pour perpétuer le souvenir de mon nom.» Et il avait donné son propre nom au monument, qu''on appelle encore aujourd''hui «monument d''Absalom».'
  '19':
  - type: text
    content: 'Achimaats, fils de Tsadok, dit à Joab: «Laisse-moi courir et apporter au roi la bonne nouvelle que l''Eternel lui a rendu justice en le délivrant de ses ennemis.» '
  '2':
  - type: text
    content: 'Il plaça un tiers du peuple sous le commandement de Joab, un tiers sous celui d''Abishaï, fils de Tseruja et frère de Joab, et un tiers sous celui d''Ittaï, de Gath. Puis le roi dit au peuple: «Moi aussi, je veux partir en campagne avec vous.» '
  '20':
  - type: text
    content: 'Joab lui dit: «Tu ne serais pas un messager de bonnes nouvelles aujourd''hui. Tu pourras l''être un autre jour, mais pas aujourd''hui, puisque le fils du roi est mort.» '
  '21':
  - type: text
    content: 'Puis Joab dit à un Ethiopien: «Va rapporter au roi ce que tu as vu.» L''Ethiopien se prosterna devant Joab et partit en courant. '
  '22':
  - type: text
    content: 'Achimaats, fils de Tsadok, insista auprès de Joab: «Quoi qu''il arrive, laisse-moi courir après l''Ethiopien.» Joab dit: «Pourquoi veux-tu faire cela, mon fils? Ce n''est pas un message qui te sera profitable.» '
  '23':
  - type: text
    content: '«Quoi qu''il arrive, je veux courir», reprit Achimaats. Joab lui dit alors: «Cours!» Achimaats courut en empruntant le chemin de la plaine, et il dépassa l''Ethiopien.'
  '24':
  - type: text
    content: 'David était alors assis entre les deux portes de la ville. La sentinelle marchait sur le toit au-dessus de la porte, sur la muraille. Elle leva les yeux et regarda: un homme courait tout seul. '
  '25':
  - type: text
    content: 'La sentinelle cria pour l''annoncer au roi. Le roi dit: «S''il est seul, il apporte de bonnes nouvelles.» Cet homme arrivait toujours plus près. '
  '26':
  - type: text
    content: 'La sentinelle vit un autre homme courir. Elle cria au portier: «Voici un homme qui court tout seul.» Le roi dit: «Il apporte aussi de bonnes nouvelles.» '
  '27':
  - type: text
    content: 'La sentinelle dit: «La manière de courir du premier me paraît être celle d''Achimaats, le fils de Tsadok.» Le roi dit alors: «C''est un homme de bien, il vient apporter de bonnes nouvelles.»'
  '28':
  - type: text
    content: 'Achimaats cria au roi: «Tout va bien!» Il se prosterna devant le roi, le visage contre terre, et dit: «Béni soit l''Eternel, ton Dieu! Il a livré en ton pouvoir les hommes qui levaient la main contre mon seigneur le roi!» '
  '29':
  - type: text
    content: 'Le roi demanda: «Le jeune Absalom va-t-il bien?» Achimaats répondit: «J''ai aperçu une grande agitation au moment où Joab a envoyé le serviteur du roi et moi ton serviteur, mais je ne sais pas ce que c''était.» '
  '3':
  - type: text
    content: 'Mais le peuple dit: «Tu ne feras pas cela! En effet, si nous prenons la fuite, ce n''est pas sur nous que l''attention se portera. Même si la moitié d''entre nous mourions, on n''y ferait pas attention, alors que toi, tu vaux autant que 10''000 d''entre nous. En réalité, il vaut mieux que tu puisses nous porter secours depuis la ville.» '
  '30':
  - type: text
    content: 'Et le roi dit: «Mets-toi là, de côté.» Achimaats recula et se tint debout.'
  '31':
  - type: text
    content: 'Alors arriva l''Ethiopien. Il dit: «Que le roi mon seigneur apprenne la bonne nouvelle! Aujourd''hui l''Eternel t''a rendu justice en te délivrant de tous ceux qui s''attaquaient à toi.» '
  '32':
  - type: text
    content: 'Le roi demanda à l''Ethiopien: «Le jeune Absalom va-t-il bien?» L''Ethiopien répondit: «Qu''ils soient comme ce jeune homme, les ennemis de mon seigneur le roi et tous ceux qui se dressent contre toi pour te faire du mal!»'
  '4':
  - type: text
    content: 'Le roi leur répondit: «Je ferai ce qui vous paraît bon.» Puis il se tint à côté de la porte pendant que tout le peuple sortait, par centaines et par milliers. '
  '5':
  - type: text
    content: 'Le roi donna cet ordre à Joab, à Abishaï et à Ittaï: «Pour l''amour de moi, faites doucement avec le jeune Absalom!» Tout le peuple entendit l''ordre donné par le roi à tous les chefs au sujet d''Absalom.'
  '6':
  - type: text
    content: 'Le peuple sortit dans la campagne à la rencontre d''Israël, et la bataille eut lieu dans la forêt d''Ephraïm. '
  '7':
  - type: text
    content: 'Là, le peuple d''Israël fut battu par les serviteurs de David; il connut ce jour-là une grande défaite en perdant 20''000 hommes. '
  '8':
  - type: text
    content: Le combat s'étendit à toute la région et la forêt fit ce jour-là plus de victimes que l'épée parmi les membres du peuple.
  '9':
  - type: text
    content: 'Absalom se trouva en présence des serviteurs de David. Il montait un mulet. Le mulet pénétra sous les branches entrelacées d''un grand térébinthe et la tête d''Absalom fut prise dans le térébinthe. Il resta suspendu en l''air, tandis que le mulet qu''il montait continuait son chemin. '
