document_id: DEU.14
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: »Vous êtes les enfants de l'Eternel, votre Dieu. Vous ne vous ferez pas d'incisions et vous ne vous raserez
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Incisions… raserez: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: rites du paganisme antique.
    marker-yv: yv-n
  - type: text
    text: ' pas entre les yeux pour un décès. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: En effet, tu es un peuple saint pour l'Eternel, ton Dieu, et l'Eternel, ton Dieu, t'a choisi pour que tu sois un peuple qui lui appartienne parmi tous les peuples qui sont à la surface de la terre.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Lois sur les animaux purs et impurs
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: »Tu ne mangeras rien d'abominable.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '»Voici les animaux que vous pourrez manger: le bœuf, la brebis et la chèvre; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'le cerf, la gazelle et le daim; le bouquetin, le chevreuil, la chèvre sauvage et la girafe. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Vous pourrez manger de tout animal qui a le sabot fendu ou le pied fourchu et qui rumine. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'En revanche, vous ne mangerez pas de ceux qui ruminent seulement ou qui ont seulement le sabot fendu ou le pied fourchu. Ainsi, vous ne mangerez pas le chameau, le lièvre et le daman, qui ruminent mais n''ont pas le sabot fendu; vous les considérerez comme impurs. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Vous ne mangerez pas le porc, qui a le sabot fendu mais ne rumine pas; vous le considérerez comme impur. Vous ne mangerez pas de leur viande et vous ne toucherez pas leur cadavre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '»Voici les animaux dont vous pourrez manger parmi tous ceux qui sont dans l''eau: vous pourrez manger de tous ceux qui ont des nageoires et des écailles. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: En revanche, vous ne mangerez d'aucun de ceux qui sont dépourvus de nageoires et d'écailles; vous les considérerez comme impurs.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '»Vous pourrez manger tout oiseau pur. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Voici ceux dont vous ne mangerez pas: l''aigle, l''orfraie, l''aigle de mer, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'le milan, les diverses espèces de vautours, l''autour, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'toutes les espèces de corbeaux, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'l''autruche, le hibou, la mouette, les diverses espèces d''éperviers, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'le chat-huant, la chouette, le cygne, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'le pélican, le cormoran, le plongeon, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'la cigogne, les diverses espèces de hérons, la huppe et la chauve-souris. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Vous considérerez comme impur tout reptile qui vole; on n''en mangera pas. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Vous pourrez manger tout oiseau pur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: »Vous ne mangerez d'aucune bête déjà morte. Tu la donneras à l'étranger qui habitera dans ta ville afin qu'il la mange, ou tu la vendras à un immigré, car tu es un peuple saint pour l'Eternel, ton Dieu. Tu ne feras pas cuire un chevreau dans le lait de sa mère.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les dîmes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: '»Tu prélèveras la dîme de tout ce que produira ta semence, de ce que ton champ rapportera chaque année, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'et tu mangeras devant l''Eternel, ton Dieu, à l''endroit qu''il choisira pour y faire résider son nom, la dîme de ton blé, de ton vin nouveau et de ton huile, ainsi que les premiers-nés de ton gros et de ton petit bétail. Ainsi tu apprendras à toujours craindre l''Eternel, ton Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Lorsque l''Eternel, ton Dieu, t''aura béni, peut-être le chemin sera-t-il trop long pour que tu puisses transporter ta dîme, parce que tu habiteras loin de l''endroit que l''Eternel, ton Dieu, aura choisi pour y faire résider son nom. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Alors, tu échangeras ta dîme contre de l''argent, tu serreras cet argent dans ta main et tu te rendras à l''endroit que l''Eternel, ton Dieu, aura choisi. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Là, tu achèteras avec cet argent tout ce que tu désireras – bœufs, brebis, vin et liqueurs fortes, tout ce qui te fera plaisir – tu mangeras devant l''Eternel, ton Dieu, et tu te réjouiras, toi et ta famille. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Tu ne délaisseras pas le Lévite qui habitera dans ta ville, car il n'a ni part ni héritage avec toi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: '»Tous les 3 ans, tu sortiras toute la dîme des produits que tu auras obtenus durant cette troisième année et tu la déposeras dans ta ville. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Alors le Lévite qui n'a ni part ni héritage avec toi, l'étranger, l'orphelin et la veuve qui habiteront dans ta ville viendront et ils mangeront à satiété. Ainsi l'Eternel, ton Dieu, te bénira dans tous les travaux que tu entreprendras de tes mains.
