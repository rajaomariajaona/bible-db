document_id: DEU.14,152
type_code: fra
verses:
  '1':
  - type: text
    content: »Vous êtes les enfants de l'Eternel, votre Dieu. Vous ne vous ferez pas d'incisions et vous ne vous raserez
  - type: note
    content: 'Incisions… raserez: rites du paganisme antique.'
  - type: text
    content: ' pas entre les yeux pour un décès. '
  '10':
  - type: text
    content: En revanche, vous ne mangerez d'aucun de ceux qui sont dépourvus de nageoires et d'écailles; vous les considérerez comme impurs.
  '11':
  - type: text
    content: '»Vous pourrez manger tout oiseau pur. '
  '12':
  - type: text
    content: 'Voici ceux dont vous ne mangerez pas: l''aigle, l''orfraie, l''aigle de mer, '
  '13':
  - type: text
    content: 'le milan, les diverses espèces de vautours, l''autour, '
  '14':
  - type: text
    content: 'toutes les espèces de corbeaux, '
  '15':
  - type: text
    content: 'l''autruche, le hibou, la mouette, les diverses espèces d''éperviers, '
  '16':
  - type: text
    content: 'le chat-huant, la chouette, le cygne, '
  '17':
  - type: text
    content: 'le pélican, le cormoran, le plongeon, '
  '18':
  - type: text
    content: 'la cigogne, les diverses espèces de hérons, la huppe et la chauve-souris. '
  '19':
  - type: text
    content: 'Vous considérerez comme impur tout reptile qui vole; on n''en mangera pas. '
  '2':
  - type: text
    content: En effet, tu es un peuple saint pour l'Eternel, ton Dieu, et l'Eternel, ton Dieu, t'a choisi pour que tu sois un peuple qui lui appartienne parmi tous les peuples qui sont à la surface de la terre.
  - type: heading
    content: Lois sur les animaux purs et impurs
  '20':
  - type: text
    content: Vous pourrez manger tout oiseau pur.
  '21':
  - type: text
    content: »Vous ne mangerez d'aucune bête déjà morte. Tu la donneras à l'étranger qui habitera dans ta ville afin qu'il la mange, ou tu la vendras à un immigré, car tu es un peuple saint pour l'Eternel, ton Dieu. Tu ne feras pas cuire un chevreau dans le lait de sa mère.
  - type: heading
    content: Les dîmes
  '22':
  - type: text
    content: '»Tu prélèveras la dîme de tout ce que produira ta semence, de ce que ton champ rapportera chaque année, '
  '23':
  - type: text
    content: 'et tu mangeras devant l''Eternel, ton Dieu, à l''endroit qu''il choisira pour y faire résider son nom, la dîme de ton blé, de ton vin nouveau et de ton huile, ainsi que les premiers-nés de ton gros et de ton petit bétail. Ainsi tu apprendras à toujours craindre l''Eternel, ton Dieu. '
  '24':
  - type: text
    content: 'Lorsque l''Eternel, ton Dieu, t''aura béni, peut-être le chemin sera-t-il trop long pour que tu puisses transporter ta dîme, parce que tu habiteras loin de l''endroit que l''Eternel, ton Dieu, aura choisi pour y faire résider son nom. '
  '25':
  - type: text
    content: 'Alors, tu échangeras ta dîme contre de l''argent, tu serreras cet argent dans ta main et tu te rendras à l''endroit que l''Eternel, ton Dieu, aura choisi. '
  '26':
  - type: text
    content: 'Là, tu achèteras avec cet argent tout ce que tu désireras – bœufs, brebis, vin et liqueurs fortes, tout ce qui te fera plaisir – tu mangeras devant l''Eternel, ton Dieu, et tu te réjouiras, toi et ta famille. '
  '27':
  - type: text
    content: Tu ne délaisseras pas le Lévite qui habitera dans ta ville, car il n'a ni part ni héritage avec toi.
  '28':
  - type: text
    content: '»Tous les 3 ans, tu sortiras toute la dîme des produits que tu auras obtenus durant cette troisième année et tu la déposeras dans ta ville. '
  '29':
  - type: text
    content: Alors le Lévite qui n'a ni part ni héritage avec toi, l'étranger, l'orphelin et la veuve qui habiteront dans ta ville viendront et ils mangeront à satiété. Ainsi l'Eternel, ton Dieu, te bénira dans tous les travaux que tu entreprendras de tes mains.
  '3':
  - type: text
    content: »Tu ne mangeras rien d'abominable.
  '4':
  - type: text
    content: '»Voici les animaux que vous pourrez manger: le bœuf, la brebis et la chèvre; '
  '5':
  - type: text
    content: 'le cerf, la gazelle et le daim; le bouquetin, le chevreuil, la chèvre sauvage et la girafe. '
  '6':
  - type: text
    content: 'Vous pourrez manger de tout animal qui a le sabot fendu ou le pied fourchu et qui rumine. '
  '7':
  - type: text
    content: 'En revanche, vous ne mangerez pas de ceux qui ruminent seulement ou qui ont seulement le sabot fendu ou le pied fourchu. Ainsi, vous ne mangerez pas le chameau, le lièvre et le daman, qui ruminent mais n''ont pas le sabot fendu; vous les considérerez comme impurs. '
  '8':
  - type: text
    content: Vous ne mangerez pas le porc, qui a le sabot fendu mais ne rumine pas; vous le considérerez comme impur. Vous ne mangerez pas de leur viande et vous ne toucherez pas leur cadavre.
  '9':
  - type: text
    content: '»Voici les animaux dont vous pourrez manger parmi tous ceux qui sont dans l''eau: vous pourrez manger de tous ceux qui ont des nageoires et des écailles. '
