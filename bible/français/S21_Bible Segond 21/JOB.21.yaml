document_id: JOB.21
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Intervention n° 7 de Job
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Job prit la parole et dit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: «Ecoutez attentivement mon propos,
- type: usfm
  marker: q1
  children:
  - type: text
    text: donnez-moi seulement cette consolation!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Permettez-moi de parler
- type: usfm
  marker: q1
  children:
  - type: text
    text: et, quand j'aurai parlé, tu pourras te moquer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: »Est-ce contre un homme que ma plainte est dirigée?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et pourquoi mon esprit ne serait-il pas à bout de patience?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tournez-vous vers moi, soyez stupéfaits,
- type: usfm
  marker: q1
  children:
  - type: text
    text: puis mettez la main sur votre bouche!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Quand je pense à cela, je suis terrifié
- type: usfm
  marker: q1
  children:
  - type: text
    text: et un tremblement s'empare de mon corps.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: »Pourquoi les méchants vivent-ils?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi les voit-on vieillir et même développer leur force?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ils voient leur descendance s'affermir à leurs côtés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: leurs rejetons prospèrent sous leurs yeux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dans leurs maisons règne la paix, sans aucune peur:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: le bâton de Dieu ne vient pas les frapper.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Leurs taureaux transmettent leur sperme à coup sûr,
- type: usfm
  marker: q1
  children:
  - type: text
    text: leurs vaches mettent bas et n'avortent pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ils laissent courir leurs enfants comme des brebis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et leurs jeunes garçons peuvent gambader librement.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ils chantent au son du tambourin et de la harpe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils se réjouissent au son des instruments à vent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ils finissent leurs jours dans le bonheur
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils descendent en un instant au séjour des morts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Pourtant, ils disaient à Dieu: ‘Eloigne-toi de nous!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous ne désirons pas connaître tes voies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Qu'est donc le Tout-Puissant pour que nous le servions?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que gagnerons-nous à lui adresser nos prières?’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: »Certes, leur bonheur ne dépend pas d'eux-mêmes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ainsi, les projets des méchants sont bien loin de moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Cependant, arrive-t-il souvent que leur lampe s'éteigne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que la misère s'abatte sur eux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que Dieu leur distribue leur part en fonction de sa colère,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: qu'ils soient pareils à la paille emportée par le vent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à la bale enlevée par le tourbillon?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Est-ce aux fils du méchant que Dieu réserve le malheur?
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est le méchant lui-même que Dieu devrait punir, pour qu'il le reconnaisse,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: c'est lui qui devrait contempler sa propre ruine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est lui qui devrait être touché par la fureur du Tout-Puissant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: »En effet, que lui importe ce que deviendra sa famille,
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand le nombre de mois qu'il lui reste à vivre est abrégé?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Est-ce à Dieu qu'on enseignera la connaissance?
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est lui qui gouverne les êtres célestes!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: L'un meurt au milieu du bien-être,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans une tranquillité totale et dans l'insouciance,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: alors que ses récipients sont remplis de lait
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ses os pleins de moelle,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: l'autre meurt dans l'amertume,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans avoir goûté au bonheur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Tous les deux se couchent dans la poussière
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ce sont les vers qui les recouvrent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: »Je sais bien quelles sont vos réflexions
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les pensées violentes qui vous animent vis-à-vis de moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Vous dites: ‘Où est la maison du grand homme?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Où est la tente qu'habitaient les méchants?’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: N'avez-vous pas interrogé les voyageurs?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Allez-vous négliger leur témoignage?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Lorsque vient la misère, celui qui fait le mal est épargné.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lorsque la colère déferle, il y échappe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Qui lui reproche en face sa conduite?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui lui rend ce qu'il a fait?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Quand il est emmené au cimetière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: on veille sur l'emplacement de sa tombe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Les mottes de la vallée sont légères pour lui.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Chacun se joint au cortège qui le suit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: une foule innombrable le précède.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Pourquoi donc m'offrir des consolations sans consistance?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vos réponses ne sont que tromperie.»
