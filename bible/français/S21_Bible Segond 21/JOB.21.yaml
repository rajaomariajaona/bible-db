document_id: JOB.21,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Intervention n° 7 de Job
  - type: text
    content: 'Job prit la parole et dit:'
  '10':
  - type: text
    content: Leurs taureaux transmettent leur sperme à coup sûr,
  - type: text
    content: leurs vaches mettent bas et n'avortent pas.
  '11':
  - type: text
    content: Ils laissent courir leurs enfants comme des brebis,
  - type: text
    content: et leurs jeunes garçons peuvent gambader librement.
  '12':
  - type: text
    content: Ils chantent au son du tambourin et de la harpe,
  - type: text
    content: ils se réjouissent au son des instruments à vent.
  '13':
  - type: text
    content: Ils finissent leurs jours dans le bonheur
  - type: text
    content: et ils descendent en un instant au séjour des morts.
  '14':
  - type: text
    content: 'Pourtant, ils disaient à Dieu: ‘Eloigne-toi de nous!'
  - type: text
    content: Nous ne désirons pas connaître tes voies.
  '15':
  - type: text
    content: Qu'est donc le Tout-Puissant pour que nous le servions?
  - type: text
    content: Que gagnerons-nous à lui adresser nos prières?’
  '16':
  - type: text
    content: »Certes, leur bonheur ne dépend pas d'eux-mêmes.
  - type: text
    content: Ainsi, les projets des méchants sont bien loin de moi.
  '17':
  - type: text
    content: Cependant, arrive-t-il souvent que leur lampe s'éteigne,
  - type: text
    content: que la misère s'abatte sur eux,
  - type: text
    content: que Dieu leur distribue leur part en fonction de sa colère,
  '18':
  - type: text
    content: qu'ils soient pareils à la paille emportée par le vent,
  - type: text
    content: à la bale enlevée par le tourbillon?
  '19':
  - type: text
    content: Est-ce aux fils du méchant que Dieu réserve le malheur?
  - type: text
    content: C'est le méchant lui-même que Dieu devrait punir, pour qu'il le reconnaisse,
  '2':
  - type: text
    content: «Ecoutez attentivement mon propos,
  - type: text
    content: donnez-moi seulement cette consolation!
  '20':
  - type: text
    content: c'est lui qui devrait contempler sa propre ruine,
  - type: text
    content: c'est lui qui devrait être touché par la fureur du Tout-Puissant.
  '21':
  - type: text
    content: »En effet, que lui importe ce que deviendra sa famille,
  - type: text
    content: quand le nombre de mois qu'il lui reste à vivre est abrégé?
  '22':
  - type: text
    content: Est-ce à Dieu qu'on enseignera la connaissance?
  - type: text
    content: C'est lui qui gouverne les êtres célestes!
  '23':
  - type: text
    content: L'un meurt au milieu du bien-être,
  - type: text
    content: dans une tranquillité totale et dans l'insouciance,
  '24':
  - type: text
    content: alors que ses récipients sont remplis de lait
  - type: text
    content: et ses os pleins de moelle,
  '25':
  - type: text
    content: l'autre meurt dans l'amertume,
  - type: text
    content: sans avoir goûté au bonheur.
  '26':
  - type: text
    content: Tous les deux se couchent dans la poussière
  - type: text
    content: et ce sont les vers qui les recouvrent.
  '27':
  - type: text
    content: »Je sais bien quelles sont vos réflexions
  - type: text
    content: et les pensées violentes qui vous animent vis-à-vis de moi.
  '28':
  - type: text
    content: 'Vous dites: ‘Où est la maison du grand homme?'
  - type: text
    content: Où est la tente qu'habitaient les méchants?’
  '29':
  - type: text
    content: N'avez-vous pas interrogé les voyageurs?
  - type: text
    content: Allez-vous négliger leur témoignage?
  '3':
  - type: text
    content: Permettez-moi de parler
  - type: text
    content: et, quand j'aurai parlé, tu pourras te moquer.
  '30':
  - type: text
    content: Lorsque vient la misère, celui qui fait le mal est épargné.
  - type: text
    content: Lorsque la colère déferle, il y échappe.
  '31':
  - type: text
    content: Qui lui reproche en face sa conduite?
  - type: text
    content: Qui lui rend ce qu'il a fait?
  '32':
  - type: text
    content: Quand il est emmené au cimetière,
  - type: text
    content: on veille sur l'emplacement de sa tombe.
  '33':
  - type: text
    content: Les mottes de la vallée sont légères pour lui.
  - type: text
    content: Chacun se joint au cortège qui le suit,
  - type: text
    content: une foule innombrable le précède.
  '34':
  - type: text
    content: Pourquoi donc m'offrir des consolations sans consistance?
  - type: text
    content: Vos réponses ne sont que tromperie.»
  '4':
  - type: text
    content: »Est-ce contre un homme que ma plainte est dirigée?
  - type: text
    content: Et pourquoi mon esprit ne serait-il pas à bout de patience?
  '5':
  - type: text
    content: Tournez-vous vers moi, soyez stupéfaits,
  - type: text
    content: puis mettez la main sur votre bouche!
  '6':
  - type: text
    content: Quand je pense à cela, je suis terrifié
  - type: text
    content: et un tremblement s'empare de mon corps.
  '7':
  - type: text
    content: »Pourquoi les méchants vivent-ils?
  - type: text
    content: Pourquoi les voit-on vieillir et même développer leur force?
  '8':
  - type: text
    content: Ils voient leur descendance s'affermir à leurs côtés,
  - type: text
    content: leurs rejetons prospèrent sous leurs yeux.
  '9':
  - type: text
    content: 'Dans leurs maisons règne la paix, sans aucune peur:'
  - type: text
    content: le bâton de Dieu ne vient pas les frapper.
