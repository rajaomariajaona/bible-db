document_id: GEN.26,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Isaac à Guérar
  - type: text
    content: 'Il y eut une famine dans le pays, en plus de la première famine de l''époque d''Abraham, et Isaac se rendit vers Abimélec, le roi des Philistins, à Guérar. '
  '10':
  - type: text
    content: 'Abimélec dit: «Qu''est-ce que tu nous as fait? Pour un peu, quelqu''un du peuple aurait couché avec ta femme et tu nous aurais rendus coupables.» '
  '11':
  - type: text
    content: 'Alors Abimélec fit ce décret pour tout le peuple: «Celui qui touchera à cet homme ou à sa femme sera mis à mort.»'
  '12':
  - type: text
    content: 'Isaac fit des semailles dans le pays et il récolta le centuple cette année-là, car l''Eternel le bénit. '
  '13':
  - type: text
    content: 'Cet homme devint riche. Il s''enrichit de plus en plus, jusqu''à devenir très riche. '
  '14':
  - type: text
    content: 'Il avait des troupeaux de petit et de gros bétail, ainsi qu''un grand nombre de serviteurs. Les Philistins furent jaloux de lui. '
  '15':
  - type: text
    content: 'Tous les puits qu''avaient creusés les serviteurs de son père à l''époque de son père Abraham, les Philistins les comblèrent en les remplissant de terre. '
  '16':
  - type: text
    content: 'Et Abimélec dit à Isaac: «Va-t''en de chez nous, car tu es beaucoup plus puissant que nous.» '
  '17':
  - type: text
    content: Isaac partit de là et campa dans la vallée de Guérar où il s'installa.
  '18':
  - type: text
    content: 'Isaac creusa de nouveau les puits qu''on avait creusés à l''époque de son père Abraham et que les Philistins avaient comblés après la mort d''Abraham. Il leur donna les noms que son père leur avait donnés. '
  '19':
  - type: text
    content: 'Les serviteurs d''Isaac creusèrent encore dans la vallée et y trouvèrent un puits d''eau vive. '
  '2':
  - type: text
    content: 'L''Eternel lui apparut et dit: «Ne descends pas en Egypte! Réside dans le pays que je vais t''indiquer: '
  '20':
  - type: text
    content: 'Les bergers de Guérar cherchèrent querelle aux bergers d''Isaac en disant: «L''eau est à nous.» Il appela le puits Esek'
  - type: note
    content: 'Esek: même racine hébraïque que se disputer.'
  - type: text
    content: ' parce qu''on s''était disputé avec lui. '
  '21':
  - type: text
    content: Ses serviteurs creusèrent un autre puits, au sujet duquel on chercha aussi querelle, et il l'appela Sitna
  - type: note
    content: 'Sitna: littéralement accusation.'
  - type: text
    content: '. '
  '22':
  - type: text
    content: Il partit de là et creusa un autre puits, pour lequel on ne chercha pas querelle. Il l'appela Rehoboth, «car, dit-il, l'Eternel nous a maintenant mis au large et nous prospérerons dans le pays.»
  '23':
  - type: text
    content: 'Il remonta de là à Beer-Shéba. '
  '24':
  - type: text
    content: 'L''Eternel lui apparut dans la nuit et dit: «Je suis le Dieu de ton père Abraham. N''aie pas peur, car je suis avec toi. Je te bénirai et je rendrai ta descendance nombreuse à cause de mon serviteur Abraham.» '
  '25':
  - type: text
    content: Il construisit là un autel et fit appel au nom de l'Eternel. Il y dressa sa tente et les serviteurs d'Isaac y creusèrent un puits.
  '26':
  - type: text
    content: 'Abimélec vint de Guérar le trouver avec Ahuzath, son ami, et Picol, le chef de son armée. '
  '27':
  - type: text
    content: 'Isaac leur dit: «Pourquoi venez-vous me trouver, puisque vous me détestez et que vous m''avez renvoyé de chez vous?» '
  '28':
  - type: text
    content: 'Ils répondirent: «Nous voyons que l''Eternel est avec toi. C''est pourquoi nous disons: ‘Qu''il y ait un serment entre nous, entre nous et toi. Concluons une alliance avec toi!’ '
  '29':
  - type: text
    content: 'Jure que tu ne nous feras aucun mal, de même que nous ne t''avons pas maltraité, que nous t''avons fait seulement du bien et que nous t''avons laissé partir dans la paix. Maintenant, tu es béni de l''Eternel.» '
  '3':
  - type: text
    content: 'séjourne dans ce pays-ci. Je serai avec toi et je te bénirai, car je te donnerai toutes ces terres, à toi et à ta descendance. Je tiendrai le serment que j''ai fait à ton père Abraham: '
  '30':
  - type: text
    content: 'Isaac leur prépara un festin et ils mangèrent et burent. '
  '31':
  - type: text
    content: Ils se levèrent de bon matin et se prêtèrent mutuellement serment. Isaac les laissa partir et ils le quittèrent dans la paix.
  '32':
  - type: text
    content: 'Ce jour-là, des serviteurs d''Isaac vinrent lui parler du puits qu''ils creusaient et lui dirent: «Nous avons trouvé de l''eau.» '
  '33':
  - type: text
    content: Il appela le puits Shiba
  - type: note
    content: 'Shiba: même racine hébraïque que serment.'
  - type: text
    content: . C'est pourquoi on a donné à la ville le nom de Beer-Shéba, jusqu'à aujourd'hui.
  '34':
  - type: text
    content: 'A l''âge de 40 ans, Esaü prit pour femmes Judith, fille de Beéri le Hittite, et Basmath, fille d''Elon le Hittite. '
  '35':
  - type: text
    content: Elles furent un sujet d'amertume pour le cœur d'Isaac et de Rebecca.
  '4':
  - type: text
    content: 'je rendrai ta descendance aussi nombreuse que les étoiles du ciel, je donnerai toutes ces terres à ta descendance, toutes les nations de la terre seront bénies en ta descendance, '
  '5':
  - type: text
    content: 'parce qu''Abraham m''a obéi et qu''il a respecté mes ordres, mes commandements, mes prescriptions et mes lois.» '
  '6':
  - type: text
    content: Isaac resta donc à Guérar.
  '7':
  - type: text
    content: 'Lorsque les habitants de l''endroit posaient des questions sur sa femme, il disait: «C''est ma sœur.» Il avait peur, en effet, qu''ils ne le tuent s''il disait «ma femme», parce que Rebecca était belle. '
  '8':
  - type: text
    content: 'Comme son séjour se prolongeait, Abimélec, le roi des Philistins, regardant un jour par la fenêtre, vit Isaac plaisanter avec sa femme Rebecca. '
  '9':
  - type: text
    content: 'Abimélec fit appeler Isaac et dit: «C''est certain, c''est ta femme. Comment as-tu pu dire: ‘C''est ma sœur’?» Isaac lui répondit: «J''ai dit cela pour ne pas mourir à cause d''elle.» '
