document_id: GEN.26,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Isaac à Guérar
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Il y eut une famine dans le pays, en plus de la première famine de l''époque d''Abraham, et Isaac se rendit vers Abimélec, le roi des Philistins, à Guérar. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Abimélec dit: «Qu''est-ce que tu nous as fait? Pour un peu, quelqu''un du peuple aurait couché avec ta femme et tu nous aurais rendus coupables.» '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Alors Abimélec fit ce décret pour tout le peuple: «Celui qui touchera à cet homme ou à sa femme sera mis à mort.»'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Isaac fit des semailles dans le pays et il récolta le centuple cette année-là, car l''Eternel le bénit. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Cet homme devint riche. Il s''enrichit de plus en plus, jusqu''à devenir très riche. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Il avait des troupeaux de petit et de gros bétail, ainsi qu''un grand nombre de serviteurs. Les Philistins furent jaloux de lui. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Tous les puits qu''avaient creusés les serviteurs de son père à l''époque de son père Abraham, les Philistins les comblèrent en les remplissant de terre. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Et Abimélec dit à Isaac: «Va-t''en de chez nous, car tu es beaucoup plus puissant que nous.» '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Isaac partit de là et campa dans la vallée de Guérar où il s'installa.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Isaac creusa de nouveau les puits qu''on avait creusés à l''époque de son père Abraham et que les Philistins avaient comblés après la mort d''Abraham. Il leur donna les noms que son père leur avait donnés. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Les serviteurs d''Isaac creusèrent encore dans la vallée et y trouvèrent un puits d''eau vive. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'L''Eternel lui apparut et dit: «Ne descends pas en Egypte! Réside dans le pays que je vais t''indiquer: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Les bergers de Guérar cherchèrent querelle aux bergers d''Isaac en disant: «L''eau est à nous.» Il appela le puits Esek'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Esek: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: même racine hébraïque que se disputer.
      marker-yv: yv-n
    - type: text
      text: ' parce qu''on s''était disputé avec lui. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ses serviteurs creusèrent un autre puits, au sujet duquel on chercha aussi querelle, et il l'appela Sitna
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Sitna: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: littéralement accusation.
      marker-yv: yv-n
    - type: text
      text: '. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Il partit de là et creusa un autre puits, pour lequel on ne chercha pas querelle. Il l'appela Rehoboth, «car, dit-il, l'Eternel nous a maintenant mis au large et nous prospérerons dans le pays.»
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Il remonta de là à Beer-Shéba. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'L''Eternel lui apparut dans la nuit et dit: «Je suis le Dieu de ton père Abraham. N''aie pas peur, car je suis avec toi. Je te bénirai et je rendrai ta descendance nombreuse à cause de mon serviteur Abraham.» '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Il construisit là un autel et fit appel au nom de l'Eternel. Il y dressa sa tente et les serviteurs d'Isaac y creusèrent un puits.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Abimélec vint de Guérar le trouver avec Ahuzath, son ami, et Picol, le chef de son armée. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Isaac leur dit: «Pourquoi venez-vous me trouver, puisque vous me détestez et que vous m''avez renvoyé de chez vous?» '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Ils répondirent: «Nous voyons que l''Eternel est avec toi. C''est pourquoi nous disons: ‘Qu''il y ait un serment entre nous, entre nous et toi. Concluons une alliance avec toi!’ '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Jure que tu ne nous feras aucun mal, de même que nous ne t''avons pas maltraité, que nous t''avons fait seulement du bien et que nous t''avons laissé partir dans la paix. Maintenant, tu es béni de l''Eternel.» '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'séjourne dans ce pays-ci. Je serai avec toi et je te bénirai, car je te donnerai toutes ces terres, à toi et à ta descendance. Je tiendrai le serment que j''ai fait à ton père Abraham: '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Isaac leur prépara un festin et ils mangèrent et burent. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Ils se levèrent de bon matin et se prêtèrent mutuellement serment. Isaac les laissa partir et ils le quittèrent dans la paix.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Ce jour-là, des serviteurs d''Isaac vinrent lui parler du puits qu''ils creusaient et lui dirent: «Nous avons trouvé de l''eau.» '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Il appela le puits Shiba
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.33 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Shiba: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: même racine hébraïque que serment.
      marker-yv: yv-n
    - type: text
      text: . C'est pourquoi on a donné à la ville le nom de Beer-Shéba, jusqu'à aujourd'hui.
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'A l''âge de 40 ans, Esaü prit pour femmes Judith, fille de Beéri le Hittite, et Basmath, fille d''Elon le Hittite. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Elles furent un sujet d'amertume pour le cœur d'Isaac et de Rebecca.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'je rendrai ta descendance aussi nombreuse que les étoiles du ciel, je donnerai toutes ces terres à ta descendance, toutes les nations de la terre seront bénies en ta descendance, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'parce qu''Abraham m''a obéi et qu''il a respecté mes ordres, mes commandements, mes prescriptions et mes lois.» '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Isaac resta donc à Guérar.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Lorsque les habitants de l''endroit posaient des questions sur sa femme, il disait: «C''est ma sœur.» Il avait peur, en effet, qu''ils ne le tuent s''il disait «ma femme», parce que Rebecca était belle. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Comme son séjour se prolongeait, Abimélec, le roi des Philistins, regardant un jour par la fenêtre, vit Isaac plaisanter avec sa femme Rebecca. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Abimélec fit appeler Isaac et dit: «C''est certain, c''est ta femme. Comment as-tu pu dire: ‘C''est ma sœur’?» Isaac lui répondit: «J''ai dit cela pour ne pas mourir à cause d''elle.» '
