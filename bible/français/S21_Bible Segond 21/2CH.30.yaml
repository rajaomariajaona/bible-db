document_id: 2CH.30
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Célébration de la Pâque
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ezéchias envoya des messagers dans tout Israël et Juda, et il écrivit aussi des lettres à Ephraïm et à Manassé pour qu''ils viennent à la maison de l''Eternel à Jérusalem célébrer la Pâque en l''honneur de l''Eternel, le Dieu d''Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Le roi, ses chefs et toute l''assemblée avaient tenu conseil à Jérusalem afin que la Pâque soit célébrée au cours du deuxième mois. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'En effet, on n''avait pas pu le faire au moment voulu parce que les prêtres ne s''étaient pas consacrés en assez grand nombre et que le peuple n''était pas rassemblé à Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Cette proposition eut l''approbation du roi et de toute l''assemblée, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: et ils décidèrent de faire une proclamation dans tout Israël, depuis Beer-Shéba jusqu'à Dan, pour que l'on vienne à Jérusalem célébrer la Pâque en l'honneur de l'Eternel, le Dieu d'Israël. En effet, depuis longtemps on ne la célébrait plus comme cela est prescrit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Les coureurs parcoururent tout Israël et Juda avec les lettres du roi et de ses chefs et, conformément à l''ordre du roi, ils dirent: «Israélites, revenez à l''Eternel, le Dieu d''Abraham, d''Isaac et d''Israël, afin qu''il revienne à vous, rescapés de l''intervention des rois d''Assyrie. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ne soyez pas comme vos pères et vos frères! Ils ont fait preuve d''infidélité envers l''Eternel, le Dieu de leurs ancêtres, et il les a livrés à la dévastation, comme vous le voyez. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ne vous montrez donc pas réfractaires comme l''étaient vos pères! Engagez-vous envers l''Eternel, venez à son sanctuaire, qu''il a consacré pour toujours, et servez l''Eternel, votre Dieu, pour que son ardente colère se détourne de vous. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Si vous revenez à l''Eternel, vos frères et vos fils seront l''objet de la compassion de ceux qui les ont déportés et ils reviendront dans ce pays. En effet, l''Eternel, votre Dieu, fait grâce et est rempli de compassion, et il ne se détournera pas de vous si vous revenez à lui.» '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Les coureurs allèrent ainsi de ville en ville dans le pays d''Ephraïm et de Manassé et jusqu''à Zabulon, mais on riait et se moquait d''eux. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Cependant, quelques hommes issus d''Aser, de Manassé et de Zabulon s''humilièrent et vinrent à Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Dans Juda aussi, Dieu intervint pour qu'ils soient unanimes à respecter l'ordre du roi et des chefs, suivant la parole de l'Eternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Une population nombreuse se réunit à Jérusalem pour célébrer la fête des pains sans levain au cours du deuxième mois. Ce fut une immense assemblée. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ils se levèrent, enlevèrent les autels sur lesquels on offrait des sacrifices dans Jérusalem ainsi que tous ceux sur lesquels on brûlait des parfums et les jetèrent dans le torrent du Cédron. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ils firent ensuite les sacrifices de la Pâque le quatorzième jour du deuxième mois. Remplis de honte, les prêtres et les Lévites s''étaient consacrés, et ils offrirent des holocaustes dans la maison de l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ils se tenaient au poste qui leur avait été attribué, conformément à la loi de Moïse, l''homme de Dieu. Les prêtres faisaient l''aspersion du sang qu''ils recevaient des Lévites. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Comme il y avait dans l''assemblée beaucoup de personnes qui ne s''étaient pas consacrées, les Lévites se chargèrent de sacrifier l''agneau pascal pour tous ceux qui n''étaient pas purs afin de les consacrer à l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'En effet, une grande partie des membres du peuple, et en particulier ceux d''Ephraïm, de Manassé, d''Issacar et de Zabulon, ne s''étaient pas purifiés et ils mangèrent le repas de la Pâque sans se conformer à ce qui est écrit. Mais Ezéchias pria pour eux en disant: «Veuille l''Eternel, qui est bon, pardonner à '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'tous ceux qui ont appliqué leur cœur à rechercher Dieu, l''Eternel, le Dieu de leurs ancêtres, même s''ils n''ont pas pratiqué la sainte purification!» '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'L''Eternel exauça Ezéchias et il épargna le peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ainsi, les Israélites qui se trouvaient à Jérusalem célébrèrent la fête des pains sans levain pendant 7 jours, avec une grande joie. Chaque jour les Lévites et les prêtres louaient l''Eternel avec les instruments qui retentissaient en son honneur. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ezéchias toucha, par ses paroles, le cœur de tous les Lévites qui montraient une grande perspicacité pour le service de l'Eternel. Ils mangèrent de ce repas de fête pendant 7 jours en offrant des sacrifices de communion et en louant l'Eternel, le Dieu de leurs ancêtres.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Toute l''assemblée décida de célébrer 7 autres jours, et ils célébrèrent ces 7 jours dans la joie. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'En effet, Ezéchias, le roi de Juda, avait donné à l''assemblée 1000 taureaux et 7000 brebis, et les chefs 1000 taureaux et 10''000 brebis. De plus, un grand nombre de prêtres s''étaient consacrés. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Toute l''assemblée de Juda, les prêtres, les Lévites, tous les membres du peuple venus d''Israël et les étrangers, qu''ils soient venus du territoire d''Israël ou installés en Juda, se réjouirent. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Il y eut une grande joie à Jérusalem, car depuis le règne de Salomon, fils de David, sur Israël, on n''avait rien vu de pareil à Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Les prêtres lévites se levèrent pour bénir le peuple et leur voix fut entendue, leur prière parvint jusqu'à la sainte demeure de l'Eternel, jusqu'au ciel.
