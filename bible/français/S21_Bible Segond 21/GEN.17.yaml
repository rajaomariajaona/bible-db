document_id: GEN.17
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Alliance de Dieu avec Abraham
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Lorsque Abram fut âgé de 99 ans, l''Eternel apparut à Abram et lui dit: «Je suis le Dieu tout-puissant. Marche devant moi et sois intègre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: J'établirai mon alliance entre moi et toi, et je te multiplierai considérablement.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Abram tomba le visage contre terre, et Dieu lui dit: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '«Voici quelle est mon alliance avec toi. Tu deviendras le père d''un grand nombre de nations. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: On ne t'appellera plus Abram, mais ton nom sera Abraham
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Abram: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: littéralement père élevé. En hébreu, Abraham fait assonance avec père d'un grand nombre.
    marker-yv: yv-n
  - type: text
    text: ', car *je te rends père d''un grand nombre de nations'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Je te rends… nations: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: cité en Romains 4.17, 18.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Je te ferai beaucoup proliférer, je ferai de toi des nations et des rois seront issus de toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'J''établirai mon alliance entre moi et toi, ainsi que tes descendants après toi, au fil des générations: ce sera une alliance perpétuelle en vertu de laquelle je serai ton Dieu et celui de ta descendance après toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '*Je te donnerai, à toi et à tes descendants après toi, le pays où tu séjournes en étranger, tout le pays de Canaan; il sera leur propriété pour toujours'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Je te donnerai… toujours: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'promesse rappelée en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Exode 32.13
      metadata:
        usfm: EXO.32.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' et je serai leur Dieu.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dieu dit à Abraham: «Quant à toi, tu garderas mon alliance, toi et tes descendants après toi au fil des générations. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Voici quelle est mon alliance, celle que vous garderez entre moi et vous, ainsi que ta descendance après toi: tout garçon parmi vous sera circoncis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Vous vous circoncirez
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Vous vous circoncirez: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: littéralement vous serez coupés avec la chair de votre prépuce.
    marker-yv: yv-n
  - type: text
    text: ' et ce sera un signe d''alliance entre moi et vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'A l''âge de 8 jours, tout garçon parmi vous sera circoncis, et ce à chacune de vos générations, qu''il soit né chez toi ou qu''il ait été acheté à un étranger, en dehors de ta descendance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'On devra circoncire celui qui est né chez toi et celui que tu as acheté. Mon alliance sera inscrite dans votre chair comme une alliance perpétuelle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Un homme incirconcis, qui n''aura pas été circoncis dans son corps, sera exclu de son peuple: il aura violé mon alliance.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dieu dit à Abraham: «Quant à ta femme Saraï, tu ne l''appelleras plus Saraï, car son nom est Sara'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Saraï… Sara: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: littéralement ma princesse… princesse.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Je la bénirai et je te donnerai même un fils à travers elle. Je la bénirai et elle donnera naissance à des nations; des rois seront issus d''elle.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Abraham tomba le visage contre terre; il rit et dit dans son cœur: «Un fils pourrait-il naître à un homme de 100 ans? Et Sara, âgée de 90 ans, pourrait-elle mettre un enfant au monde?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Abraham dit alors à Dieu: «Si seulement Ismaël pouvait vivre devant toi!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dieu dit: «C''est certain, ta femme Sara te donnera un fils et tu l''appelleras Isaac. J''établirai mon alliance avec lui comme une alliance perpétuelle pour sa descendance après lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'En ce qui concerne Ismaël, je t''ai exaucé: je le bénirai, je le ferai proliférer et je le multiplierai considérablement. Il aura pour fils douze princes et je ferai de lui une grande nation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Cependant, mon alliance, je l'établirai avec Isaac, le fils que Sara te donnera à cette époque-ci de l'année prochaine.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Lorsqu'il eut fini de lui parler, Dieu s'éleva au-dessus d'Abraham.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Abraham prit son fils Ismaël, ainsi que tous ceux qui étaient nés chez lui et tous ceux qu''il avait achetés, tous les hommes parmi les membres de son foyer, et il les circoncit le jour même, conformément à l''ordre que Dieu lui avait donné. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Abraham était âgé de 99 ans lorsqu''il fut circoncis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Quant à son fils Ismaël, il était âgé de 13 ans lorsqu''il fut circoncis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Le jour même, Abraham fut circoncis, ainsi que son fils Ismaël, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: et tous les membres de son foyer, qu'ils soient nés chez lui ou aient été achetés à des étrangers, furent circoncis avec lui.
