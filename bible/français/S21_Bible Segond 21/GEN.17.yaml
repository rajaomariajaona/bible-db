document_id: GEN.17,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Alliance de Dieu avec Abraham
  - type: text
    content: 'Lorsque Abram fut âgé de 99 ans, l''Eternel apparut à Abram et lui dit: «Je suis le Dieu tout-puissant. Marche devant moi et sois intègre. '
  '10':
  - type: text
    content: 'Voici quelle est mon alliance, celle que vous garderez entre moi et vous, ainsi que ta descendance après toi: tout garçon parmi vous sera circoncis. '
  '11':
  - type: text
    content: Vous vous circoncirez
  - type: note
    content: 'Vous vous circoncirez: littéralement vous serez coupés avec la chair de votre prépuce.'
  - type: text
    content: ' et ce sera un signe d''alliance entre moi et vous. '
  '12':
  - type: text
    content: 'A l''âge de 8 jours, tout garçon parmi vous sera circoncis, et ce à chacune de vos générations, qu''il soit né chez toi ou qu''il ait été acheté à un étranger, en dehors de ta descendance. '
  '13':
  - type: text
    content: 'On devra circoncire celui qui est né chez toi et celui que tu as acheté. Mon alliance sera inscrite dans votre chair comme une alliance perpétuelle. '
  '14':
  - type: text
    content: 'Un homme incirconcis, qui n''aura pas été circoncis dans son corps, sera exclu de son peuple: il aura violé mon alliance.»'
  '15':
  - type: text
    content: 'Dieu dit à Abraham: «Quant à ta femme Saraï, tu ne l''appelleras plus Saraï, car son nom est Sara'
  - type: note
    content: 'Saraï… Sara: littéralement ma princesse… princesse.'
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Je la bénirai et je te donnerai même un fils à travers elle. Je la bénirai et elle donnera naissance à des nations; des rois seront issus d''elle.» '
  '17':
  - type: text
    content: 'Abraham tomba le visage contre terre; il rit et dit dans son cœur: «Un fils pourrait-il naître à un homme de 100 ans? Et Sara, âgée de 90 ans, pourrait-elle mettre un enfant au monde?» '
  '18':
  - type: text
    content: 'Abraham dit alors à Dieu: «Si seulement Ismaël pouvait vivre devant toi!» '
  '19':
  - type: text
    content: 'Dieu dit: «C''est certain, ta femme Sara te donnera un fils et tu l''appelleras Isaac. J''établirai mon alliance avec lui comme une alliance perpétuelle pour sa descendance après lui. '
  '2':
  - type: text
    content: J'établirai mon alliance entre moi et toi, et je te multiplierai considérablement.»
  '20':
  - type: text
    content: 'En ce qui concerne Ismaël, je t''ai exaucé: je le bénirai, je le ferai proliférer et je le multiplierai considérablement. Il aura pour fils douze princes et je ferai de lui une grande nation. '
  '21':
  - type: text
    content: Cependant, mon alliance, je l'établirai avec Isaac, le fils que Sara te donnera à cette époque-ci de l'année prochaine.»
  '22':
  - type: text
    content: Lorsqu'il eut fini de lui parler, Dieu s'éleva au-dessus d'Abraham.
  '23':
  - type: text
    content: 'Abraham prit son fils Ismaël, ainsi que tous ceux qui étaient nés chez lui et tous ceux qu''il avait achetés, tous les hommes parmi les membres de son foyer, et il les circoncit le jour même, conformément à l''ordre que Dieu lui avait donné. '
  '24':
  - type: text
    content: 'Abraham était âgé de 99 ans lorsqu''il fut circoncis. '
  '25':
  - type: text
    content: 'Quant à son fils Ismaël, il était âgé de 13 ans lorsqu''il fut circoncis. '
  '26':
  - type: text
    content: 'Le jour même, Abraham fut circoncis, ainsi que son fils Ismaël, '
  '27':
  - type: text
    content: et tous les membres de son foyer, qu'ils soient nés chez lui ou aient été achetés à des étrangers, furent circoncis avec lui.
  '3':
  - type: text
    content: 'Abram tomba le visage contre terre, et Dieu lui dit: '
  '4':
  - type: text
    content: '«Voici quelle est mon alliance avec toi. Tu deviendras le père d''un grand nombre de nations. '
  '5':
  - type: text
    content: On ne t'appellera plus Abram, mais ton nom sera Abraham
  - type: note
    content: 'Abram: littéralement père élevé. En hébreu, Abraham fait assonance avec père d''un grand nombre.'
  - type: text
    content: ', car *je te rends père d''un grand nombre de nations'
  - type: note
    content: 'Je te rends… nations: cité en Romains 4.17, 18.'
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Je te ferai beaucoup proliférer, je ferai de toi des nations et des rois seront issus de toi. '
  '7':
  - type: text
    content: 'J''établirai mon alliance entre moi et toi, ainsi que tes descendants après toi, au fil des générations: ce sera une alliance perpétuelle en vertu de laquelle je serai ton Dieu et celui de ta descendance après toi. '
  '8':
  - type: text
    content: '*Je te donnerai, à toi et à tes descendants après toi, le pays où tu séjournes en étranger, tout le pays de Canaan; il sera leur propriété pour toujours'
  - type: note
    content: 'Je te donnerai… toujours: promesse rappelée en Exode 32.13.'
  - type: text
    content: ' et je serai leur Dieu.»'
  '9':
  - type: text
    content: 'Dieu dit à Abraham: «Quant à toi, tu garderas mon alliance, toi et tes descendants après toi au fil des générations. '
