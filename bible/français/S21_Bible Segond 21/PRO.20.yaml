document_id: PRO.20
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Le vin est moqueur, les boissons fortes sont bruyantes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: s'en enivrer n'est pas sage.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: La terreur qu'inspire le roi est pareille au rugissement d'un lion.
- type: usfm
  marker: q1
  children:
  - type: text
    text: L'irriter, c'est pécher contre soi-même.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: C'est une gloire pour l'homme d'éviter les disputes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais un fou s'y engage.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: A cause du froid, le paresseux ne laboure pas;
- type: usfm
  marker: q1
  children:
  - type: text
    text: au moment de la moisson il voudrait récolter, mais il n'y a rien.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Les projets dans le cœur de l'homme sont des eaux profondes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais l'homme intelligent sait y puiser.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Beaucoup proclament leur bonté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais l'homme fidèle, qui le trouvera?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Le juste marche dans l'intégrité;
- type: usfm
  marker: q1
  children:
  - type: text
    text: heureux ses enfants après lui!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Le roi qui siège pour rendre la justice
- type: usfm
  marker: q1
  children:
  - type: text
    text: disperse tout mal par son regard.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Qui pourra dire: «J''ai purifié mon cœur,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: je suis pur de mon péché»?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Deux poids différents et deux mesures différentes
- type: usfm
  marker: q1
  children:
  - type: text
    text: font l'un et l'autre horreur à l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'L''enfant se fait déjà connaître par sa manière d''agir:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: on devine si sa conduite sera pure et droite.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: L'oreille qui entend et l'œil qui voit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est l'Eternel qui les a faits l'un et l'autre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: N'aime pas le sommeil! Tu risquerais de t'appauvrir.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Garde les yeux ouverts et tu seras rassasié de pain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: «Mauvais! Mauvais!» affirme l'acheteur
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais, une fois parti, il se félicite.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Il existe des objets en or et des perles en quantité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais la parure vraiment précieuse, ce sont des lèvres qui transmettent la connaissance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Quelqu'un s'est porté garant pour un étranger? Prends son habit!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il s'est engagé en faveur d'une inconnue? Exige de lui des gages!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Le pain du mensonge est doux à l'homme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais plus tard sa bouche est comme remplie de gravier.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Les projets s''affermissent par le conseil:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: fais la guerre avec prudence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Celui qui propage des calomnies dévoile des secrets.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne fréquente pas l'homme trop bavard!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Si quelqu'un maudit son père et sa mère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sa lampe s'éteindra au milieu d'épaisses ténèbres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Une possession trop vite acquise au départ n
- type: usfm
  marker: q1
  children:
  - type: text
    text: e sera pas bénie à la fin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ne dis pas: «Je rendrai le mal.»'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Compte sur l'Eternel, et il te sauvera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Deux poids différents font horreur à l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la balance faussée n'est pas une bonne chose.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'C''est l''Eternel qui dirige les pas de l''homme:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: que peut comprendre l'être humain à sa voie?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: C'est un piège pour l'homme que de prendre à la légère un engagement envers Dieu
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de ne réfléchir qu'après avoir fait des vœux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Un roi sage disperse les méchants
- type: usfm
  marker: q1
  children:
  - type: text
    text: et fait passer les roues
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.26 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Les roues: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: il s'agit des roues du chariot que l'on faisait passer sur l'aire de battage pour séparer le grain des épis; le bon roi doit distinguer bons et méchants.
    marker-yv: yv-n
  - type: text
    text: ' sur eux.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'L''esprit de l''homme est une lampe de l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il explore le plus profond de l'être.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: La bonté et la vérité protègent le roi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il soutient son trône par la bonté.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: La force est la gloire des jeunes gens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les cheveux blancs sont l'ornement des vieillards.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Les plaies d'une blessure sont un remède au mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tout comme les coups pour les profondeurs de l'être.
