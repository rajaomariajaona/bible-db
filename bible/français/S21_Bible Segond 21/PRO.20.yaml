document_id: PRO.20,152
type_code: fra
verses:
  '1':
  - type: text
    content: Le vin est moqueur, les boissons fortes sont bruyantes;
  - type: text
    content: s'en enivrer n'est pas sage.
  '10':
  - type: text
    content: Deux poids différents et deux mesures différentes
  - type: text
    content: font l'un et l'autre horreur à l'Eternel.
  '11':
  - type: text
    content: 'L''enfant se fait déjà connaître par sa manière d''agir:'
  - type: text
    content: on devine si sa conduite sera pure et droite.
  '12':
  - type: text
    content: L'oreille qui entend et l'œil qui voit,
  - type: text
    content: c'est l'Eternel qui les a faits l'un et l'autre.
  '13':
  - type: text
    content: N'aime pas le sommeil! Tu risquerais de t'appauvrir.
  - type: text
    content: Garde les yeux ouverts et tu seras rassasié de pain.
  '14':
  - type: text
    content: «Mauvais! Mauvais!» affirme l'acheteur
  - type: text
    content: mais, une fois parti, il se félicite.
  '15':
  - type: text
    content: Il existe des objets en or et des perles en quantité,
  - type: text
    content: mais la parure vraiment précieuse, ce sont des lèvres qui transmettent la connaissance.
  '16':
  - type: text
    content: Quelqu'un s'est porté garant pour un étranger? Prends son habit!
  - type: text
    content: Il s'est engagé en faveur d'une inconnue? Exige de lui des gages!
  '17':
  - type: text
    content: Le pain du mensonge est doux à l'homme,
  - type: text
    content: mais plus tard sa bouche est comme remplie de gravier.
  '18':
  - type: text
    content: 'Les projets s''affermissent par le conseil:'
  - type: text
    content: fais la guerre avec prudence.
  '19':
  - type: text
    content: Celui qui propage des calomnies dévoile des secrets.
  - type: text
    content: Ne fréquente pas l'homme trop bavard!
  '2':
  - type: text
    content: La terreur qu'inspire le roi est pareille au rugissement d'un lion.
  - type: text
    content: L'irriter, c'est pécher contre soi-même.
  '20':
  - type: text
    content: Si quelqu'un maudit son père et sa mère,
  - type: text
    content: sa lampe s'éteindra au milieu d'épaisses ténèbres.
  '21':
  - type: text
    content: Une possession trop vite acquise au départ n
  - type: text
    content: e sera pas bénie à la fin.
  '22':
  - type: text
    content: 'Ne dis pas: «Je rendrai le mal.»'
  - type: text
    content: Compte sur l'Eternel, et il te sauvera.
  '23':
  - type: text
    content: Deux poids différents font horreur à l'Eternel,
  - type: text
    content: et la balance faussée n'est pas une bonne chose.
  '24':
  - type: text
    content: 'C''est l''Eternel qui dirige les pas de l''homme:'
  - type: text
    content: que peut comprendre l'être humain à sa voie?
  '25':
  - type: text
    content: C'est un piège pour l'homme que de prendre à la légère un engagement envers Dieu
  - type: text
    content: et de ne réfléchir qu'après avoir fait des vœux.
  '26':
  - type: text
    content: Un roi sage disperse les méchants
  - type: text
    content: et fait passer les roues
  - type: note
    content: 'Les roues: il s''agit des roues du chariot que l''on faisait passer sur l''aire de battage pour séparer le grain des épis; le bon roi doit distinguer bons et méchants.'
  - type: text
    content: ' sur eux.'
  '27':
  - type: text
    content: 'L''esprit de l''homme est une lampe de l''Eternel:'
  - type: text
    content: il explore le plus profond de l'être.
  '28':
  - type: text
    content: La bonté et la vérité protègent le roi,
  - type: text
    content: et il soutient son trône par la bonté.
  '29':
  - type: text
    content: La force est la gloire des jeunes gens,
  - type: text
    content: et les cheveux blancs sont l'ornement des vieillards.
  '3':
  - type: text
    content: C'est une gloire pour l'homme d'éviter les disputes,
  - type: text
    content: mais un fou s'y engage.
  '30':
  - type: text
    content: Les plaies d'une blessure sont un remède au mal,
  - type: text
    content: tout comme les coups pour les profondeurs de l'être.
  '4':
  - type: text
    content: A cause du froid, le paresseux ne laboure pas;
  - type: text
    content: au moment de la moisson il voudrait récolter, mais il n'y a rien.
  '5':
  - type: text
    content: Les projets dans le cœur de l'homme sont des eaux profondes,
  - type: text
    content: mais l'homme intelligent sait y puiser.
  '6':
  - type: text
    content: Beaucoup proclament leur bonté,
  - type: text
    content: mais l'homme fidèle, qui le trouvera?
  '7':
  - type: text
    content: Le juste marche dans l'intégrité;
  - type: text
    content: heureux ses enfants après lui!
  '8':
  - type: text
    content: Le roi qui siège pour rendre la justice
  - type: text
    content: disperse tout mal par son regard.
  '9':
  - type: text
    content: 'Qui pourra dire: «J''ai purifié mon cœur,'
  - type: text
    content: je suis pur de mon péché»?
