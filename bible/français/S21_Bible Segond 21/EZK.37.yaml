document_id: EZK.37,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Réunion d'Israël et de Juda
  - type: text
    content: 'La main de l''Eternel reposait sur moi et l''Eternel m''a transporté par son Esprit pour me déposer au milieu de la vallée. Celle-ci était remplie d''ossements. '
  '10':
  - type: text
    content: 'J''ai prophétisé conformément à l''ordre qu''il m''avait donné. Alors l''Esprit est entré en eux et ils ont repris vie, puis ils se sont tenus sur leurs pieds. C''était une armée nombreuse, très nombreuse. '
  '11':
  - type: text
    content: 'Il m''a dit: «Fils de l''homme, ces ossements, c''est toute la communauté d''Israël. Ils affirment: ‘Nos os sont desséchés, notre espérance est détruite, nous sommes anéantis!’ '
  '12':
  - type: text
    content: 'C''est pourquoi, prophétise! Tu leur annonceras: ‘Voici ce que dit le Seigneur, l''Eternel: Je vais ouvrir vos tombes et je vous en ferai sortir, vous qui êtes mon peuple, et je vous ramènerai sur le territoire d''Israël. '
  '13':
  - type: text
    content: 'Vous reconnaîtrez que je suis l''Eternel, lorsque j''ouvrirai vos tombes et vous en ferai sortir, vous qui êtes mon peuple. '
  '14':
  - type: text
    content: Je mettrai mon Esprit en vous, vous vivrez et je vous donnerai du repos sur votre territoire. Vous reconnaîtrez alors que moi, l'Eternel, j'ai parlé et agi, déclare l'Eternel.’»
  '15':
  - type: text
    content: 'La parole de l''Eternel m''a été adressée: '
  '16':
  - type: text
    content: '«Quant à toi, fils de l''homme, prends un morceau de bois et écris dessus: ‘Pour Juda et pour les Israélites qui s''y rattachent.’ Prends un autre morceau de bois et écris dessus: ‘Pour Joseph, le bois d''Ephraïm, et pour toute la communauté d''Israël qui s''y rattache.’ '
  '17':
  - type: text
    content: 'Rapproche-les l''un de l''autre pour n''avoir plus qu''un seul morceau de bois, afin qu''ils soient unis dans ta main. '
  '18':
  - type: text
    content: 'Lorsque les membres de ton peuple te diront: ‘Ne vas-tu pas nous expliquer ce que cela signifie?’ '
  '19':
  - type: text
    content: 'réponds-leur: ‘Voici ce que dit le Seigneur, l''Eternel: Je vais prendre le bois de Joseph qui est dans la main d''Ephraïm, ainsi que les tribus d''Israël qui s''y rattachent, je les joindrai au bois de Juda et je n''en ferai plus qu''un seul morceau de bois, si bien qu''ils seront unis dans ma main.’ '
  '2':
  - type: text
    content: Il m'a fait passer près d'eux, tout autour. J'ai constaté qu'ils étaient très nombreux sur le sol de la vallée et qu'ils étaient complètement secs.
  '20':
  - type: text
    content: 'Les bois sur lesquels tu écriras seront dans ta main, devant leurs yeux, '
  '21':
  - type: text
    content: 'et tu leur diras:'
  - type: text
    content: '»‘Voici ce que dit le Seigneur, l''Eternel: Je vais arracher les Israélites aux nations où ils sont allés, je les rassemblerai de tous côtés et je les ramènerai vers leur territoire. '
  '22':
  - type: text
    content: 'Je ferai d''eux une seule nation dans le pays, dans les montagnes d''Israël. Ils auront tous un même roi, ils ne formeront plus deux nations et ne seront plus divisés en deux royaumes. '
  '23':
  - type: text
    content: 'Ils ne se rendront plus impurs par leurs idoles, ni par leurs monstruosités et toutes leurs transgressions. Je les sauverai de tous les lieux d''habitation où ils ont péché, et je les purifierai. Ils seront mon peuple et je serai leur Dieu. '
  '24':
  - type: text
    content: 'Mon serviteur David sera leur roi et ils auront tous un seul berger. Ils suivront mes règles, ils respecteront mes prescriptions et les mettront en pratique. '
  '25':
  - type: text
    content: 'Ils habiteront le pays que j''ai donné à mon serviteur Jacob, celui que vos ancêtres ont habité. Ils y habiteront, ainsi que leurs enfants et petits-enfants, pour toujours, et mon serviteur David sera leur prince pour toujours. '
  '26':
  - type: text
    content: 'Je conclurai avec eux une alliance de paix qui sera une alliance éternelle. Je les établirai, je les multiplierai et je placerai pour toujours mon sanctuaire au milieu d''eux. '
  '27':
  - type: text
    content: '*Mon habitation sera parmi eux. Je serai leur Dieu et ils seront mon peuple.'
  - type: note
    content: 'Mon habitation… peuple: reprise d''Exode 29.45 et Lévitique 26.11-12 (voir la note).'
  - type: text
    content: ' '
  '28':
  - type: text
    content: Les nations reconnaîtront que je suis l'Eternel, celui qui considère Israël comme saint, lorsque mon sanctuaire sera pour toujours au milieu d'eux.’»
  '3':
  - type: text
    content: 'Il m''a dit: «Fils de l''homme, ces os pourront-ils revivre?» J''ai répondu: «Seigneur Eternel, c''est toi qui le sais.»'
  '4':
  - type: text
    content: 'Puis il m''a dit: «Prophétise sur ces os! Tu leur annonceras: ‘Ossements desséchés, écoutez la parole de l''Eternel!’ '
  '5':
  - type: text
    content: 'Voici ce que dit le Seigneur, l''Eternel, à ces os: ‘Je vais faire entrer un esprit en vous et vous vivrez. '
  '6':
  - type: text
    content: Je vous donnerai des nerfs, je ferai pousser sur vous de la chair, je vous recouvrirai de peau, je mettrai un esprit en vous et vous vivrez. Vous reconnaîtrez alors que je suis l'Eternel.’»
  '7':
  - type: text
    content: 'J''ai prophétisé conformément à l''ordre que j''avais reçu. Alors que je prophétisais, il y a eu un bruit: un mouvement s''est produit et les os se sont rapprochés les uns des autres. '
  '8':
  - type: text
    content: J'ai regardé et j'ai vu qu'il leur apparaissait des nerfs; la chair a commencé à pousser et la peau les a recouverts en dernier, mais il n'y avait pas d'esprit en eux.
  '9':
  - type: text
    content: 'Il m''a dit: «Prophétise à l''intention de l''Esprit, prophétise, fils de l''homme! Tu annonceras à l''Esprit: ‘Voici ce que dit le Seigneur, l''Eternel: Esprit, viens des quatre vents, souffle sur ces morts et qu''ils revivent!’»'
