document_id: EZK.37
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Réunion d'Israël et de Juda
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La main de l''Eternel reposait sur moi et l''Eternel m''a transporté par son Esprit pour me déposer au milieu de la vallée. Celle-ci était remplie d''ossements. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Il m'a fait passer près d'eux, tout autour. J'ai constaté qu'ils étaient très nombreux sur le sol de la vallée et qu'ils étaient complètement secs.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il m''a dit: «Fils de l''homme, ces os pourront-ils revivre?» J''ai répondu: «Seigneur Eternel, c''est toi qui le sais.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Puis il m''a dit: «Prophétise sur ces os! Tu leur annonceras: ‘Ossements desséchés, écoutez la parole de l''Eternel!’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Voici ce que dit le Seigneur, l''Eternel, à ces os: ‘Je vais faire entrer un esprit en vous et vous vivrez. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Je vous donnerai des nerfs, je ferai pousser sur vous de la chair, je vous recouvrirai de peau, je mettrai un esprit en vous et vous vivrez. Vous reconnaîtrez alors que je suis l'Eternel.’»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'J''ai prophétisé conformément à l''ordre que j''avais reçu. Alors que je prophétisais, il y a eu un bruit: un mouvement s''est produit et les os se sont rapprochés les uns des autres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: J'ai regardé et j'ai vu qu'il leur apparaissait des nerfs; la chair a commencé à pousser et la peau les a recouverts en dernier, mais il n'y avait pas d'esprit en eux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il m''a dit: «Prophétise à l''intention de l''Esprit, prophétise, fils de l''homme! Tu annonceras à l''Esprit: ‘Voici ce que dit le Seigneur, l''Eternel: Esprit, viens des quatre vents, souffle sur ces morts et qu''ils revivent!’»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'J''ai prophétisé conformément à l''ordre qu''il m''avait donné. Alors l''Esprit est entré en eux et ils ont repris vie, puis ils se sont tenus sur leurs pieds. C''était une armée nombreuse, très nombreuse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il m''a dit: «Fils de l''homme, ces ossements, c''est toute la communauté d''Israël. Ils affirment: ‘Nos os sont desséchés, notre espérance est détruite, nous sommes anéantis!’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'C''est pourquoi, prophétise! Tu leur annonceras: ‘Voici ce que dit le Seigneur, l''Eternel: Je vais ouvrir vos tombes et je vous en ferai sortir, vous qui êtes mon peuple, et je vous ramènerai sur le territoire d''Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Vous reconnaîtrez que je suis l''Eternel, lorsque j''ouvrirai vos tombes et vous en ferai sortir, vous qui êtes mon peuple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Je mettrai mon Esprit en vous, vous vivrez et je vous donnerai du repos sur votre territoire. Vous reconnaîtrez alors que moi, l'Eternel, j'ai parlé et agi, déclare l'Eternel.’»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'La parole de l''Eternel m''a été adressée: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '«Quant à toi, fils de l''homme, prends un morceau de bois et écris dessus: ‘Pour Juda et pour les Israélites qui s''y rattachent.’ Prends un autre morceau de bois et écris dessus: ‘Pour Joseph, le bois d''Ephraïm, et pour toute la communauté d''Israël qui s''y rattache.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Rapproche-les l''un de l''autre pour n''avoir plus qu''un seul morceau de bois, afin qu''ils soient unis dans ta main. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Lorsque les membres de ton peuple te diront: ‘Ne vas-tu pas nous expliquer ce que cela signifie?’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'réponds-leur: ‘Voici ce que dit le Seigneur, l''Eternel: Je vais prendre le bois de Joseph qui est dans la main d''Ephraïm, ainsi que les tribus d''Israël qui s''y rattachent, je les joindrai au bois de Juda et je n''en ferai plus qu''un seul morceau de bois, si bien qu''ils seront unis dans ma main.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Les bois sur lesquels tu écriras seront dans ta main, devant leurs yeux, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'et tu leur diras:'
- type: usfm
  marker: p
  children:
  - type: text
    text: '»‘Voici ce que dit le Seigneur, l''Eternel: Je vais arracher les Israélites aux nations où ils sont allés, je les rassemblerai de tous côtés et je les ramènerai vers leur territoire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Je ferai d''eux une seule nation dans le pays, dans les montagnes d''Israël. Ils auront tous un même roi, ils ne formeront plus deux nations et ne seront plus divisés en deux royaumes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ils ne se rendront plus impurs par leurs idoles, ni par leurs monstruosités et toutes leurs transgressions. Je les sauverai de tous les lieux d''habitation où ils ont péché, et je les purifierai. Ils seront mon peuple et je serai leur Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Mon serviteur David sera leur roi et ils auront tous un seul berger. Ils suivront mes règles, ils respecteront mes prescriptions et les mettront en pratique. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ils habiteront le pays que j''ai donné à mon serviteur Jacob, celui que vos ancêtres ont habité. Ils y habiteront, ainsi que leurs enfants et petits-enfants, pour toujours, et mon serviteur David sera leur prince pour toujours. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Je conclurai avec eux une alliance de paix qui sera une alliance éternelle. Je les établirai, je les multiplierai et je placerai pour toujours mon sanctuaire au milieu d''eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: '*Mon habitation sera parmi eux. Je serai leur Dieu et ils seront mon peuple.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.27 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Mon habitation… peuple: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: reprise d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Exode 29.45
      metadata:
        usfm: EXO.29.45
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' et '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lévitique 26.11-12
      metadata:
        usfm: LEV.26.11+LEV.26.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (voir la note).'
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Les nations reconnaîtront que je suis l'Eternel, celui qui considère Israël comme saint, lorsque mon sanctuaire sera pour toujours au milieu d'eux.’»
