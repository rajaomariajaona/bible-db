document_id: 2SA.19,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Alors le roi, bouleversé, monta dans la chambre située au-dessus de la porte et pleura. Il disait tout en marchant: «Mon fils Absalom! Mon fils, mon fils Absalom! Si seulement j''étais mort à ta place! Absalom, mon fils, mon fils!»'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Dans toutes les tribus d''Israël, tout le peuple était en grande discussion. On disait: «C''est le roi qui nous a délivrés de nos ennemis, c''est lui qui nous a sauvés des Philistins. Et maintenant il a dû fuir le pays devant Absalom. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Or Absalom, que nous avions consacré par onction pour qu''il règne sur nous, est mort au combat. Maintenant, pourquoi ne parlez-vous pas de faire revenir le roi?» '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'De son côté, le roi David envoya un messager dire aux prêtres Tsadok et Abiathar: «Parlez aux anciens de Juda, dites-leur: ‘Pourquoi seriez-vous les derniers à faire revenir le roi chez lui? – En effet, ce qui se disait dans tout Israël était parvenu jusqu''au roi, chez lui. – '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Vous êtes mes frères, vous êtes faits des mêmes os et de la même chair que moi. Pourquoi seriez-vous les derniers à faire revenir le roi?’ '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Vous direz aussi à Amasa: ‘N''es-tu pas fait des mêmes os et de la même chair que moi? Que Dieu me traite avec la plus grande sévérité, si tu ne deviens pas pour toujours chef de l''armée devant moi, à la place de Joab!’» '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'David gagna le cœur de tous les Judéens comme s''ils n''avaient été qu''un seul homme, et ils firent dire au roi: «Reviens, toi ainsi que tous tes serviteurs.» '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Le roi revint et il arriva jusqu'au Jourdain. Quant aux Judéens, ils s'étaient rendus à Guilgal pour aller à la rencontre du roi et lui faire passer le Jourdain.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Shimeï, fils de Guéra, le Benjaminite, qui était de Bachurim, s''empressa de descendre avec les Judéens à la rencontre du roi David. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Il avait avec lui 1000 hommes de Benjamin, ainsi que Tsiba, le serviteur de la famille de Saül, avec ses 15 fils et ses 20 serviteurs. Ils se précipitèrent vers le Jourdain à la rencontre du roi. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Le bateau destiné au transport de la famille du roi et à ce qui lui paraissait bon faisait la traversée. Au moment où le roi traversait le Jourdain, Shimeï, le fils de Guéra, se prosterna devant lui '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'On vint dire à Joab: «Le roi pleure et mène le deuil sur Absalom.» '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'et lui dit: «Que mon seigneur ne tienne pas compte de ma faute! Qu''il oublie la mauvaise conduite de ton serviteur le jour où mon seigneur le roi a quitté Jérusalem, que le roi ne la prenne pas à cœur! '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'En effet, moi ton serviteur, je reconnais que j''ai péché. Et aujourd''hui je suis le premier de toute la famille de Joseph à venir à la rencontre de mon seigneur le roi.» '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Alors Abishaï, fils de Tseruja, prit la parole. Il dit: «Shimeï ne doit-il pas mourir pour avoir maudit celui que l''Eternel a désigné par onction?» '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Mais David dit: «Qu''ai-je affaire avec vous, fils de Tseruja, et pourquoi êtes-vous aujourd''hui mes adversaires? Devrait-on faire mourir un homme en Israël aujourd''hui? N''ai-je donc pas la certitude que je règne aujourd''hui sur Israël?» '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Puis le roi dit à Shimeï: «Tu ne mourras pas», et il lui en fit le serment.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Mephibosheth, le petit-fils de Saül, descendit aussi à la rencontre du roi. Il n''avait pas soigné ses pieds, fait sa barbe ni lavé ses habits depuis le jour où le roi était parti jusqu''à celui où il revenait en paix. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Lorsqu''il alla à la rencontre du roi à Jérusalem, celui-ci lui dit: «Pourquoi n''es-tu pas venu avec moi, Mephibosheth?» '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Il répondit: «Roi mon seigneur, mon serviteur m''a trompé. En effet, moi ton serviteur, qui suis estropié, j''avais dit: ‘Je vais faire seller mon âne, je le monterai et j''irai avec le roi.’ '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Et lui, il m''a calomnié, moi ton serviteur, auprès de mon seigneur le roi. Mais mon seigneur le roi est comme un ange de Dieu. Fais ce qui te semblera bon. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'En effet, tous les membres de ma famille ne méritaient que la mort aux yeux de mon seigneur le roi. Pourtant, tu as accueilli ton serviteur parmi ceux qui mangent à ta table. Quel droit aurais-je encore de réclamer quoi que ce soit au roi?» '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ce jour-là, la victoire fut changée en deuil pour tout le peuple, car le peuple entendait dire: «Le roi est rempli de chagrin à cause de son fils.» '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Le roi lui dit: «A quoi bon toutes tes paroles? Je l''ai déclaré, Tsiba et toi, vous vous partagerez les terres.» '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Mephibosheth dit au roi: «Il peut même tout prendre, puisque mon seigneur le roi est revenu en paix chez lui.»'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Barzillaï le Galaadite descendit de Roguelim et passa le Jourdain avec le roi pour l''accompagner de l''autre côté du fleuve. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Barzillaï était très vieux: il avait 80 ans. C''était lui qui avait pourvu à l''entretien du roi pendant son séjour à Mahanaïm. En effet, c''était un homme très riche. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Le roi lui dit: «Viens avec moi, je pourvoirai à ton entretien chez moi à Jérusalem.» '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Mais Barzillaï répondit au roi: «Combien d''années vivrai-je encore, pour que je monte avec le roi à Jérusalem? '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Je suis aujourd''hui âgé de 80 ans. Suis-je capable de distinguer ce qui est bon et ce qui est mauvais? Ton serviteur peut-il savourer ce qu''il mange et boit? Puis-je encore entendre la voix des chanteurs et des chanteuses? Et pourquoi ton serviteur serait-il encore une charge pour mon seigneur le roi? '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Ton serviteur avancera juste un peu de l''autre côté du Jourdain avec le roi. Pourquoi, d''ailleurs, le roi m''accorderait-il ce bienfait? '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Laisse donc ton serviteur repartir chez lui! Que je meure dans ma ville, près du tombeau de mon père et de ma mère! Mais voici ton serviteur Kimham: il accompagnera mon seigneur le roi. Fais pour lui ce qui te plaira.» '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Le roi dit: «Kimham m''accompagnera donc et je ferai pour lui ce qui te plaira. Tout ce que tu me demanderas, je le ferai pour toi.» '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ce jour-là, le peuple rentra dans la ville comme un voleur, comme l''auraient fait des soldats honteux d''avoir pris la fuite au cours du combat. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Quand tout le peuple et le roi eurent passé le Jourdain, le roi embrassa Barzillaï et le bénit. Barzillaï retourna alors chez lui. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: Le roi prit la direction de Guilgal et Kimham l'accompagna.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tensions entre Judéens et Israélites
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tous les Judéens ainsi que la moitié des Israélites avaient fait traverser le Jourdain au roi. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Mais tous les Israélites abordèrent le roi et lui dirent: «Pourquoi nos frères de Juda t''ont-ils enlevé et ont-ils fait passer le Jourdain au roi, à sa famille et à tous les hommes de David?» '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Tous les Judéens répondirent aux Israélites: «C''est que nous sommes plus proches du roi. Pourquoi vous irriter de cela? Avons-nous vécu aux crochets du roi? Nous a-t-il fait des cadeaux?» '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Les Israélites répondirent aux Judéens: «Le roi nous appartient dix fois autant, David est même plus à nous qu''à vous. Pourquoi nous avez-vous traités avec mépris? N''avons-nous pas été les premiers à proposer de faire revenir notre roi?» Et les Judéens parlèrent avec plus de dureté encore que les hommes d''Israël.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Le roi s''était couvert le visage et criait à haute voix: «Mon fils Absalom! Absalom, mon fils, mon fils!» '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Joab entra dans la chambre où se trouvait le roi et dit: «Tu couvres aujourd''hui de honte tous tes serviteurs, alors qu''ils ont aujourd''hui sauvé ta vie, celle de tes fils et de tes filles, celle de tes femmes et de tes concubines. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Tu aimes ceux qui te montrent de la haine et tu montres de la haine envers ceux qui t''aiment. En effet, tu déclares aujourd''hui que tes chefs et tes serviteurs ne représentent rien pour toi. Je vois maintenant que si Absalom était en vie et que nous soyons tous morts aujourd''hui, tu serais content. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Lève-toi donc, sors et parle au cœur de tes serviteurs! En effet, je t''en fais le serment par l''Eternel: si tu ne sors pas, pas un homme ne restera avec toi cette nuit; et ce sera pire pour toi que tous les malheurs que tu as connus depuis ta jeunesse jusqu''à maintenant.» '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Alors le roi se leva et s''assit à la porte de la ville. On annonça à tout le peuple: «Le roi siège à la porte.» Et tout le peuple vint devant le roi.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Retour de David sur le trône
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quant aux Israélites, ils s''étaient enfuis, chacun dans sa tente. '
