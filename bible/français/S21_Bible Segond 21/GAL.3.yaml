document_id: GAL.3,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Justifiés par la foi, non par la loi
  - type: text
    content: 'Galates sans intelligence! Qui vous a fascinés [pour que vous n''obéissiez plus à la vérité], vous aux yeux de qui Jésus-Christ a été décrit comme crucifié? '
  '10':
  - type: text
    content: 'En effet tous ceux qui dépendent des œuvres de la loi sont sous la malédiction, car il est écrit: '
  - type: text
    content: Maudit soit tout homme qui ne reste pas fidèle à tout ce qui est écrit dans le livre de la loi pour le mettre en pratique.
  - type: note
    content: 'Maudit… en pratique: citation de Deutéronome 27.26.'
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'De plus, il est évident que personne n''est déclaré juste devant Dieu dans le cadre de la loi, puisqu''il est dit: '
  - type: text
    content: Le juste vivra par la foi.
  - type: note
    content: 'Le juste vivra par la foi: citation d''Habakuk 2.4.'
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'Or, la loi ne s''appuie pas sur la foi; elle dit au contraire: '
  - type: text
    content: L'homme qui mettra ces règles en pratique vivra par elles.
  - type: note
    content: 'L''homme… par elles: citation de Lévitique 18.5.'
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'Christ nous a rachetés de la malédiction de la loi en devenant malédiction pour nous, puisqu''il est écrit: '
  - type: text
    content: Tout homme pendu au bois est maudit.
  - type: note
    content: 'Tout homme… maudit: citation de Deutéronome 21.23.'
  - type: text
    content: ' '
  '14':
  - type: text
    content: C'est ainsi qu'en Jésus-Christ la bénédiction d'Abraham touche aussi les non-Juifs et que nous recevons par la foi l'Esprit qui avait été promis.
  - type: heading
    content: Le rôle de la loi et le statut des croyants
  '15':
  - type: text
    content: 'Frères et sœurs – je parle ici selon les règles humaines – quand un testament est établi par un homme, personne ne peut l''annuler ni lui ajouter quelque chose. '
  '16':
  - type: text
    content: 'Or les promesses ont été faites à Abraham et à sa descendance. Il n''est pas dit: «et aux descendances», comme s''il s''agissait de plusieurs, mais c''est d''une seule qu''il s''agit: '
  - type: text
    content: à ta descendance
  - type: note
    content: 'Ata descendance: renvoi à Genèse 12.7; 13.15.'
  - type: text
    content: ', c''est-à-dire à Christ. '
  '17':
  - type: text
    content: 'Voici ce que je veux dire: un testament que Dieu a établi, la loi survenue 430 ans plus tard ne peut l''annuler et rendre ainsi la promesse sans effet. '
  '18':
  - type: text
    content: En effet, si l'héritage venait de la loi, il ne viendrait plus de la promesse, or c'est par une promesse que Dieu a accordé sa grâce à Abraham.
  '19':
  - type: text
    content: 'Pourquoi donc la loi? Elle a été ajoutée ensuite à cause des transgressions, jusqu''à ce que vienne la descendance à qui la promesse avait été faite; elle a été promulguée par des anges, au moyen d''un médiateur. '
  '2':
  - type: text
    content: 'Voici seulement ce que je veux apprendre de vous: est-ce en pratiquant les œuvres de la loi que vous avez reçu l''Esprit ou en écoutant l''Evangile avec foi? '
  '20':
  - type: text
    content: Un médiateur n'intervient pas quand il y a une seule partie, or là, Dieu est seul.
  '21':
  - type: text
    content: 'La loi est-elle donc contre les promesses de Dieu? Certainement pas! Si une loi qui puisse procurer la vie avait été donnée, la justice viendrait réellement de la loi. '
  '22':
  - type: text
    content: 'Mais l''Ecriture a déclaré le monde entier prisonnier du péché afin que ce qui avait été promis soit accordé par la foi en Jésus-Christ à ceux qui croient. '
  '23':
  - type: text
    content: 'Avant que la foi vienne, nous étions prisonniers sous la garde de la loi en vue de la foi qui devait être révélée. '
  '24':
  - type: text
    content: 'Ainsi la loi a été le guide chargé de nous conduire à Christ afin que nous soyons déclarés justes sur la base de la foi. '
  '25':
  - type: text
    content: Depuis que la foi est venue, nous ne sommes plus soumis à ce guide.
  '26':
  - type: text
    content: 'Vous êtes tous fils de Dieu par la foi en Jésus-Christ; '
  '27':
  - type: text
    content: 'en effet, vous tous qui avez été baptisés en Christ, vous vous êtes revêtus de Christ. '
  '28':
  - type: text
    content: 'Il n''y a plus ni Juif ni non-Juif, il n''y a plus ni esclave ni libre, il n''y a plus ni homme ni femme, car vous êtes tous un en Jésus-Christ. '
  '29':
  - type: text
    content: Si vous appartenez à Christ, vous êtes donc la descendance d'Abraham [et] vous êtes héritiers conformément à la promesse.
  '3':
  - type: text
    content: 'Manquez-vous à ce point de bon sens? Après avoir commencé par l''Esprit, voulez-vous maintenant finir par vos propres forces? '
  '4':
  - type: text
    content: 'Avez-vous tant souffert pour rien? Si du moins c''est pour rien. '
  '5':
  - type: text
    content: Celui qui vous accorde l'Esprit et qui accomplit des miracles parmi vous le fait-il donc parce que vous pratiquez les œuvres de la loi ou parce que vous écoutez avec foi?
  '6':
  - type: text
    content: 'Tout comme Abraham '
  - type: text
    content: eut confiance en Dieu
  - type: text
    content: et que
  - type: text
    content: cela lui fut compté comme justice
  - type: note
    content: 'Eut confiance… justice: citation de Genèse 15.6.'
  - type: text
    content: ', '
  '7':
  - type: text
    content: 'reconnaissez donc que ce sont ceux qui ont la foi qui sont les fils d''Abraham. '
  '8':
  - type: text
    content: 'Or l''Ecriture prévoyait que Dieu considérerait les non-Juifs comme justes sur la base de la foi, et elle a d''avance annoncé cette bonne nouvelle à Abraham: '
  - type: text
    content: Toutes les nations seront bénies en toi!
  - type: note
    content: 'Toutes… en toi: citation de Genèse 12.3.'
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'Ainsi ceux qui croient sont bénis avec Abraham le croyant. '
