document_id: GAL.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Justifiés par la foi, non par la loi
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Galates sans intelligence! Qui vous a fascinés [pour que vous n''obéissiez plus à la vérité], vous aux yeux de qui Jésus-Christ a été décrit comme crucifié? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Voici seulement ce que je veux apprendre de vous: est-ce en pratiquant les œuvres de la loi que vous avez reçu l''Esprit ou en écoutant l''Evangile avec foi? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Manquez-vous à ce point de bon sens? Après avoir commencé par l''Esprit, voulez-vous maintenant finir par vos propres forces? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Avez-vous tant souffert pour rien? Si du moins c''est pour rien. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Celui qui vous accorde l'Esprit et qui accomplit des miracles parmi vous le fait-il donc parce que vous pratiquez les œuvres de la loi ou parce que vous écoutez avec foi?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tout comme Abraham '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: eut confiance en Dieu
  - type: text
    text: et que
  - type: usfm
    marker: qt
    children:
    - type: text
      text: cela lui fut compté comme justice
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Eut confiance… justice: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Genèse 15.6
      metadata:
        usfm: GEN.15.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'reconnaissez donc que ce sont ceux qui ont la foi qui sont les fils d''Abraham. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Or l''Ecriture prévoyait que Dieu considérerait les non-Juifs comme justes sur la base de la foi, et elle a d''avance annoncé cette bonne nouvelle à Abraham: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Toutes les nations seront bénies en toi!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Toutes… en toi: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Genèse 12.3
      metadata:
        usfm: GEN.12.3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ainsi ceux qui croient sont bénis avec Abraham le croyant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'En effet tous ceux qui dépendent des œuvres de la loi sont sous la malédiction, car il est écrit: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Maudit soit tout homme qui ne reste pas fidèle à tout ce qui est écrit dans le livre de la loi pour le mettre en pratique.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Maudit… en pratique: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Deutéronome 27.26
      metadata:
        usfm: DEU.27.26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'De plus, il est évident que personne n''est déclaré juste devant Dieu dans le cadre de la loi, puisqu''il est dit: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Le juste vivra par la foi.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le juste vivra par la foi: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Habakuk 2.4
      metadata:
        usfm: HAB.2.4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Or, la loi ne s''appuie pas sur la foi; elle dit au contraire: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: L'homme qui mettra ces règles en pratique vivra par elles.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'L''homme… par elles: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lévitique 18.5
      metadata:
        usfm: LEV.18.5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Christ nous a rachetés de la malédiction de la loi en devenant malédiction pour nous, puisqu''il est écrit: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Tout homme pendu au bois est maudit.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tout homme… maudit: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Deutéronome 21.23
      metadata:
        usfm: DEU.21.23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: C'est ainsi qu'en Jésus-Christ la bénédiction d'Abraham touche aussi les non-Juifs et que nous recevons par la foi l'Esprit qui avait été promis.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le rôle de la loi et le statut des croyants
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Frères et sœurs – je parle ici selon les règles humaines – quand un testament est établi par un homme, personne ne peut l''annuler ni lui ajouter quelque chose. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Or les promesses ont été faites à Abraham et à sa descendance. Il n''est pas dit: «et aux descendances», comme s''il s''agissait de plusieurs, mais c''est d''une seule qu''il s''agit: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: à ta descendance
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ata descendance: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'renvoi à '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Genèse 12.7
      metadata:
        usfm: GEN.12.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '13.15'
      metadata:
        usfm: GEN.13.15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', c''est-à-dire à Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Voici ce que je veux dire: un testament que Dieu a établi, la loi survenue 430 ans plus tard ne peut l''annuler et rendre ainsi la promesse sans effet. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: En effet, si l'héritage venait de la loi, il ne viendrait plus de la promesse, or c'est par une promesse que Dieu a accordé sa grâce à Abraham.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Pourquoi donc la loi? Elle a été ajoutée ensuite à cause des transgressions, jusqu''à ce que vienne la descendance à qui la promesse avait été faite; elle a été promulguée par des anges, au moyen d''un médiateur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Un médiateur n'intervient pas quand il y a une seule partie, or là, Dieu est seul.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'La loi est-elle donc contre les promesses de Dieu? Certainement pas! Si une loi qui puisse procurer la vie avait été donnée, la justice viendrait réellement de la loi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Mais l''Ecriture a déclaré le monde entier prisonnier du péché afin que ce qui avait été promis soit accordé par la foi en Jésus-Christ à ceux qui croient. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Avant que la foi vienne, nous étions prisonniers sous la garde de la loi en vue de la foi qui devait être révélée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ainsi la loi a été le guide chargé de nous conduire à Christ afin que nous soyons déclarés justes sur la base de la foi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Depuis que la foi est venue, nous ne sommes plus soumis à ce guide.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Vous êtes tous fils de Dieu par la foi en Jésus-Christ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'en effet, vous tous qui avez été baptisés en Christ, vous vous êtes revêtus de Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Il n''y a plus ni Juif ni non-Juif, il n''y a plus ni esclave ni libre, il n''y a plus ni homme ni femme, car vous êtes tous un en Jésus-Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Si vous appartenez à Christ, vous êtes donc la descendance d'Abraham [et] vous êtes héritiers conformément à la promesse.
