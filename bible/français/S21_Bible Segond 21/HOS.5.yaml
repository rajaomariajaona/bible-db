document_id: HOS.5,152
type_code: fra
verses:
  '1':
  - type: text
    content: Ecoutez ceci, prêtres!
  - type: text
    content: Sois attentive, communauté d'Israël!
  - type: text
    content: Prête l'oreille, famille du roi!
  - type: text
    content: En effet, c'est à vous que le jugement s'adresse
  - type: text
    content: parce que vous avez été un piège à Mitspa,
  - type: text
    content: et un filet tendu sur le Thabor.
  '10':
  - type: text
    content: Les chefs de Juda sont pareils à ceux qui déplacent les bornes;
  - type: text
    content: je déverserai ma colère sur eux comme un torrent.
  '11':
  - type: text
    content: Ephraïm est opprimé, brisé par le jugement,
  - type: text
    content: car il a suivi les ordres qui lui plaisaient.
  '12':
  - type: text
    content: Je serai comme une teigne pour Ephraïm,
  - type: text
    content: comme une carie pour la communauté de Juda.
  '13':
  - type: text
    content: Ephraïm voit son mal, et Juda ses plaies;
  - type: text
    content: Ephraïm se rend en Assyrie et s'adresse au roi Jareb,
  - type: text
    content: mais ce roi ne pourra pas vous guérir
  - type: text
    content: ni porter remède à vos plaies.
  '14':
  - type: text
    content: Je serai comme un lion pour Ephraïm,
  - type: text
    content: comme un lionceau pour la communauté de Juda.
  - type: text
    content: Moi, moi, je déchirerai, puis je m'en irai,
  - type: text
    content: j'emporterai ma proie sans personne pour la délivrer.
  '15':
  - type: text
    content: Je m'en irai, je reviendrai à ma place,
  - type: text
    content: jusqu'à ce qu'ils s'avouent coupables et recherchent ma présence.
  - type: text
    content: 'Quand ils seront dans la détresse, ils auront recours à moi:'
  '2':
  - type: text
    content: Par leurs sacrifices, les infidèles s'enfoncent dans le crime,
  - type: text
    content: mais j'aurai une correction pour eux tous.
  '3':
  - type: text
    content: Je connais Ephraïm,
  - type: text
    content: et Israël ne m'est pas caché.
  - type: text
    content: En effet, maintenant, Ephraïm, tu t'es prostitué
  - type: text
    content: et Israël s'est rendu impur.
  '4':
  - type: text
    content: Leurs agissements ne leur permettent pas de revenir à leur Dieu,
  - type: text
    content: parce que l'esprit de prostitution est au milieu d'eux
  - type: text
    content: et parce qu'ils ne connaissent pas l'Eternel.
  '5':
  - type: text
    content: 'L''orgueil d''Israël témoigne contre lui:'
  - type: text
    content: Israël et Ephraïm trébucheront par leur faute;
  - type: text
    content: Juda aussi trébuchera avec eux.
  '6':
  - type: text
    content: Ils iront avec leurs brebis et leurs bœufs rechercher l'Eternel,
  - type: text
    content: 'mais ils ne le trouveront pas:'
  - type: text
    content: il s'est éloigné d'eux.
  '7':
  - type: text
    content: Ils ont été infidèles à l'Eternel,
  - type: text
    content: car ils ont donné naissance à des enfants illégitimes;
  - type: text
    content: maintenant, un mois suffira pour les détruire avec leurs biens.
  - type: heading
    content: Punition d'Israël et Juda
  '8':
  - type: text
    content: Sonnez de la trompette à Guibea,
  - type: text
    content: sonnez de la trompette à Rama,
  - type: text
    content: poussez des cris à Beth-Aven!
  - type: text
    content: Derrière toi, Benjamin!
  '9':
  - type: text
    content: Ephraïm sera dévasté, le jour de la punition.
  - type: text
    content: J'annonce aux tribus d'Israël une chose certaine.
