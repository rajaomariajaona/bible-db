document_id: HOS.5
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ecoutez ceci, prêtres!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sois attentive, communauté d'Israël!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Prête l'oreille, famille du roi!
- type: usfm
  marker: q1
  children:
  - type: text
    text: En effet, c'est à vous que le jugement s'adresse
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce que vous avez été un piège à Mitspa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et un filet tendu sur le Thabor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Par leurs sacrifices, les infidèles s'enfoncent dans le crime,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais j'aurai une correction pour eux tous.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Je connais Ephraïm,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et Israël ne m'est pas caché.
- type: usfm
  marker: q1
  children:
  - type: text
    text: En effet, maintenant, Ephraïm, tu t'es prostitué
- type: usfm
  marker: q1
  children:
  - type: text
    text: et Israël s'est rendu impur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Leurs agissements ne leur permettent pas de revenir à leur Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce que l'esprit de prostitution est au milieu d'eux
- type: usfm
  marker: q1
  children:
  - type: text
    text: et parce qu'ils ne connaissent pas l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'L''orgueil d''Israël témoigne contre lui:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Israël et Ephraïm trébucheront par leur faute;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Juda aussi trébuchera avec eux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ils iront avec leurs brebis et leurs bœufs rechercher l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'mais ils ne le trouveront pas:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il s'est éloigné d'eux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ils ont été infidèles à l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car ils ont donné naissance à des enfants illégitimes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: maintenant, un mois suffira pour les détruire avec leurs biens.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Punition d'Israël et Juda
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Sonnez de la trompette à Guibea,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sonnez de la trompette à Rama,
- type: usfm
  marker: q1
  children:
  - type: text
    text: poussez des cris à Beth-Aven!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Derrière toi, Benjamin!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ephraïm sera dévasté, le jour de la punition.
- type: usfm
  marker: q1
  children:
  - type: text
    text: J'annonce aux tribus d'Israël une chose certaine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Les chefs de Juda sont pareils à ceux qui déplacent les bornes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: je déverserai ma colère sur eux comme un torrent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ephraïm est opprimé, brisé par le jugement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car il a suivi les ordres qui lui plaisaient.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Je serai comme une teigne pour Ephraïm,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme une carie pour la communauté de Juda.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ephraïm voit son mal, et Juda ses plaies;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ephraïm se rend en Assyrie et s'adresse au roi Jareb,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais ce roi ne pourra pas vous guérir
- type: usfm
  marker: q1
  children:
  - type: text
    text: ni porter remède à vos plaies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Je serai comme un lion pour Ephraïm,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme un lionceau pour la communauté de Juda.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moi, moi, je déchirerai, puis je m'en irai,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j'emporterai ma proie sans personne pour la délivrer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Je m'en irai, je reviendrai à ma place,
- type: usfm
  marker: q1
  children:
  - type: text
    text: jusqu'à ce qu'ils s'avouent coupables et recherchent ma présence.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Quand ils seront dans la détresse, ils auront recours à moi:'
