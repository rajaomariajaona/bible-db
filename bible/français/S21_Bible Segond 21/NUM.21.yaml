document_id: NUM.21,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Les serpents brûlants
  - type: text
    content: 'Le roi d''Arad, un Cananéen qui habitait le sud, apprit qu''Israël venait par la route d''Atharim. Il combattit Israël et emmena des prisonniers. '
  '10':
  - type: text
    content: 'Les Israélites partirent et campèrent à Oboth. '
  '11':
  - type: text
    content: 'Ils partirent d''Oboth et campèrent à Ijjé-Abarim, dans le désert qui se trouve vis-à-vis de Moab, du côté du soleil levant. '
  '12':
  - type: text
    content: 'Partis de là, ils campèrent dans la vallée de Zéred. '
  '13':
  - type: text
    content: 'Partis de là, ils campèrent de l''autre côté de l''Arnon, rivière qui coule dans le désert en sortant du territoire des Amoréens. En effet, l''Arnon forme la frontière de Moab, entre Moab et les Amoréens. '
  '14':
  - type: text
    content: 'C''est pourquoi il est parlé, dans le livre des Guerres de l''Eternel, de Vaheb en Supha et ses torrents, de l''Arnon '
  '15':
  - type: text
    content: et le cours de ses torrents, qui s'étend du côté d'Ar et touche la frontière de Moab.
  '16':
  - type: text
    content: 'De là ils allèrent à Beer. C''est à ce puits que l''Eternel dit à Moïse: «Rassemble le peuple, que je leur donne de l''eau.» '
  '17':
  - type: text
    content: 'Alors Israël chanta ce cantique: «Monte, puits! Chantez en son honneur! '
  '18':
  - type: text
    content: Puits que des princes ont creusé, que les grands du peuple ont creusé avec le sceptre, avec leurs bâtons!»
  '19':
  - type: text
    content: 'Du désert ils allèrent à Matthana, de Matthana à Nahaliel, de Nahaliel à Bamoth, '
  '2':
  - type: text
    content: 'Alors Israël fit ce vœu à l''Eternel: «Si tu livres ce peuple entre mes mains, je vouerai ses villes à la destruction.» '
  '20':
  - type: text
    content: de Bamoth à la vallée qui se trouve dans le territoire de Moab, vers le sommet du Pisga, d'où l'on domine le désert.
  - type: heading
    content: Victoires d'Israël
  '21':
  - type: text
    content: 'Israël envoya des messagers à Sihon, le roi des Amoréens, pour lui dire: '
  '22':
  - type: text
    content: '«Laisse-moi passer par ton pays. Nous n''entrerons ni dans les champs ni dans les vignes, et nous ne boirons pas l''eau des puits. Nous suivrons la route royale jusqu''à ce que nous ayons franchi ton territoire.» '
  '23':
  - type: text
    content: 'Sihon n''accorda pas à Israël l''autorisation de passer sur son territoire. Il rassembla tout son peuple et sortit à la rencontre d''Israël dans le désert. Il vint combattre Israël à Jahats. '
  '24':
  - type: text
    content: 'Israël le frappa du tranchant de l''épée et s''empara de son pays depuis la rivière de l''Arnon jusqu''au torrent du Jabbok, jusqu''à la frontière avec les Ammonites. En effet, la frontière des Ammonites était fortifiée. '
  '25':
  - type: text
    content: 'Israël prit toutes les villes et s''établit dans toutes les villes des Amoréens, à Hesbon et dans toutes les villes qui en dépendaient. '
  '26':
  - type: text
    content: Hesbon était la capitale de Sihon, le roi des Amoréens. Il avait fait la guerre au précédent roi de Moab et s'était emparé de tout son pays jusqu'à l'Arnon.
  '27':
  - type: text
    content: 'C''est pourquoi les poètes disent: «Venez à Hesbon! Que la ville de Sihon soit reconstruite et fortifiée! '
  '28':
  - type: text
    content: 'Oui, *un feu est sorti de Hesbon, une flamme est sortie de la ville de Sihon. Elle a dévoré Ar-Moab, les habitants des hauteurs de l''Arnon. '
  '29':
  - type: text
    content: Malheur à toi, Moab! Tu es perdu, peuple de Kemosh
  - type: note
    content: 'Kemosh: dieu des Moabites.'
  - type: text
    content: '! Il a fait de ses fils des fuyards et il a livré ses filles comme prisonnières'
  - type: note
    content: 'Un feu… prisonnières: cité avec quelques omissions en Jérémie 48.45-46.'
  - type: text
    content: ' à Sihon, le roi des Amoréens. '
  '3':
  - type: text
    content: L'Eternel exauça Israël et lui livra les Cananéens. On les voua à la destruction, ainsi que leurs villes, et l'on appela cet endroit Horma.
  '30':
  - type: text
    content: 'Nous avons lancé nos flèches contre eux: de Hesbon à Dibon, tout est détruit. Nous avons étendu nos dévastations jusqu''à Nophach, jusqu''à Médeba.»'
  '31':
  - type: text
    content: 'Israël s''établit dans le pays des Amoréens. '
  '32':
  - type: text
    content: Moïse fit faire une reconnaissance à Jaezer, et ils prirent les villes qui en dépendaient et chassèrent les Amoréens qui s'y trouvaient.
  '33':
  - type: text
    content: 'Ils changèrent ensuite de direction et montèrent par la route du Basan. Og, le roi du Basan, sortit à leur rencontre avec tout son peuple pour les combattre à Edréï. '
  '34':
  - type: text
    content: 'L''Eternel dit à Moïse: «N''aie pas peur de lui, car je le livre entre tes mains ainsi que tout son peuple et son pays. Tu le traiteras comme tu as traité Sihon, le roi des Amoréens qui habitait à Hesbon.» '
  '35':
  - type: text
    content: Ils le battirent, lui, ses fils et tout son peuple, sans laisser un seul survivant, et ils s'emparèrent de son pays.
  '4':
  - type: text
    content: 'Ils partirent du mont Hor par le chemin de la mer des Roseaux pour contourner le pays d''Edom. Le peuple s''impatienta en route '
  '5':
  - type: text
    content: 'et parla contre Dieu et contre Moïse: «Pourquoi nous avez-vous fait quitter l''Egypte, si c''est pour que nous mourions dans le désert? En effet, il n''y a ni pain, ni eau, et nous sommes dégoûtés de cette misérable nourriture.» '
  '6':
  - type: text
    content: 'Alors l''Eternel envoya des serpents venimeux contre le peuple. Ils mordirent le peuple et beaucoup d''Israélites moururent. '
  '7':
  - type: text
    content: 'Le peuple vint trouver Moïse et dit: «Nous avons péché, car nous avons parlé contre l''Eternel et contre toi. Prie l''Eternel afin qu''il éloigne ces serpents de nous.» Moïse pria pour le peuple, '
  '8':
  - type: text
    content: 'et l''Eternel lui dit: «Fais-toi un serpent venimeux et place-le sur une perche. Toute personne mordue qui le regardera aura la vie sauve.» '
  '9':
  - type: text
    content: Moïse fit un serpent en bronze et le plaça sur une perche. Toute personne qui avait été mordue par un serpent et regardait le serpent en bronze avait la vie sauve.
