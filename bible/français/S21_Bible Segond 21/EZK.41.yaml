document_id: EZK.41
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vision de l'intérieur du temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ensuite, l''homme m''a conduit dans le temple. Il a mesuré les piliers: ils avaient 3 mètres de large d''un côté et 3 mètres de large de l''autre, qui correspondaient à la largeur de la tente'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'La tente: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: probable allusion au lieu saint du tabernacle.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'La largeur de l''ouverture faisait 5 mètres. Il y avait 2 mètres et demi d''un côté de l''entrée et 2 mètres et demi de l''autre. Il a mesuré 20 mètres pour la longueur du lieu saint et 10 mètres pour sa largeur. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Puis il a pénétré à l''intérieur. Il a mesuré un mètre pour les piliers de l''entrée, 3 mètres pour l''entrée et 3 mètres et demi pour la largeur de l''entrée. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il a mesuré une longueur de 10 mètres et une largeur de 10 mètres devant le temple, puis il m''a dit: «Voici le lieu très saint.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ensuite, il a mesuré 3 mètres pour le mur du temple et 2 mètres pour la largeur des annexes qui se trouvaient tout autour du temple. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ces annexes étaient disposées les unes à côté des autres sur trois étages, au nombre de 30 par étage. Elles s''inséraient dans un mur construit pour elles tout autour du temple; elles y étaient encastrées et n''étaient pas encastrées dans le mur même du temple. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Les annexes s'élargissaient d'étage en étage, car cette galerie du temple s'élevait étage par étage tout autour du temple. Il y avait ainsi plus d'espace dans le haut de cette partie adjacente au temple, et l'on passait de l'étage inférieur à l'étage supérieur par celui du milieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'J''ai vu une élévation tout autour du temple. Le soubassement des annexes mesurait une canne entière, soit 3 mètres. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Le mur extérieur des annexes avait une épaisseur de 2 mètres et demi. L''espace libre entre les annexes du temple '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'et les salles situées autour du temple avait une largeur de 10 mètres, tout autour. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: L'accès aux annexes donnait sur l'espace libre; il y avait une entrée du côté nord et une entrée au sud. La largeur de l'espace libre était de 2 mètres et demi tout autour.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Le bâtiment qui était devant une cour, à l''ouest, avait une largeur de 35 mètres, un mur de 2 mètres et demi d''épaisseur tout autour et une longueur de 45 mètres. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'L''homme a mesuré le temple: il faisait 50 mètres de long. La cour, le bâtiment et ses murs avaient une longueur de 50 mètres. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'La largeur de la façade du temple et de la cour, à l''est, était de 50 mètres. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Il a mesuré la longueur du bâtiment devant la cour, à l''arrière, et ses galeries de chaque côté: il y avait 50 mètres. L''intérieur du temple, le vestibule qui donnait sur le parvis, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'les seuils, les fenêtres grillagées, les galeries du pourtour sur leurs trois étages, face au seuil: tout cela était recouvert de bois tout autour, depuis le sol jusqu''aux fenêtres, qui étaient elles-mêmes recouvertes. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Au-dessus de l''entrée et jusqu''au fond du temple, de même qu''à l''extérieur, tant à l''intérieur qu''à l''extérieur de tout le mur, à intervalles réguliers, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'on avait sculpté des chérubins et des branches de palmier. Il y avait une branche de palmier entre deux chérubins. Chaque chérubin avait deux visages: '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'un visage d''homme tourné d''un côté vers la branche de palmier, et une face de lion tournée de l''autre côté vers l''autre branche de palmier. C''était comme cela tout autour du temple: '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'depuis le sol jusqu''au-dessus de l''entrée, il y avait des chérubins et des branches de palmier sculptés sur le mur du temple. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'L''encadrement des portes du lieu saint était carré, et le devant du lieu très saint avait le même aspect. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'L''autel était en bois, haut d''un mètre et demi et long d''un mètre. Ses angles, sa longueur et ses parois étaient en bois. L''homme m''a dit: «Voici la table qui est devant l''Eternel.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Le lieu saint du temple et le lieu très saint avaient deux portes. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ces portes avaient deux battants pivotants, deux battants pour une porte et deux pour l''autre. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Des chérubins et des branches de palmier étaient sculptés sur les portes du temple, comme c''était le cas sur les murs. Il y avait un auvent en bois sur le devant du vestibule, à l''extérieur. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Sur les côtés du vestibule, il y avait des fenêtres grillagées et des branches de palmier sculptées de part et d'autre, ainsi que sur les annexes du temple et sur les auvents.
