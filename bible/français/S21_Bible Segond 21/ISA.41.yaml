document_id: ISA.41
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Puissance de Dieu et inconsistance des idoles
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Iles, faites silence pour m'écouter!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que les peuples renouvellent leur force,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu'ils s'avancent pour parler!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Approchons-nous ensemble pour le jugement.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Qui a fait surgir de l'est
- type: usfm
  marker: q1
  children:
  - type: text
    text: celui que la justice appelle à sa suite?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui lui a livré des nations et soumis des rois?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui a transformé leur épée en poussière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et leur arc en un fétu de paille qui s'envole?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Il s'est lancé à leur poursuite, il circule en paix
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur un sentier que ses pieds n'avaient jamais touché.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Qui a accompli cela? Qui l'a mis en œuvre?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'C''est celui qui a convoqué les générations dès le commencement:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est moi, l'Eternel, qui suis le premier,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je serai encore le même avec les générations à venir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Les îles le voient, et elles ont peur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'les extrémités de la terre tremblent:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils s'approchent, ils viennent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ils s'aident mutuellement
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et chacun dit à son frère: «Courage!»'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Le sculpteur encourage l'orfèvre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: celui qui travaille au marteau encourage celui qui frappe sur l'enclume.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il affirme que la soudure est bonne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: puis il fixe l'idole avec des clous pour qu'elle ne soit pas branlante.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mais toi, Israël, tu es mon serviteur.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jacob, tu es celui que j'ai choisi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le descendant de mon ami Abraham.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Je t'ai pris aux extrémités de la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je t'ai appelé d'une région lointaine
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et t''ai dit: «Tu es mon serviteur.»'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je t'ai choisi et ne te rejette pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: N'aie pas peur, car je suis moi-même avec toi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne promène pas des regards inquiets, car je suis ton Dieu.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je te fortifie, je viens à ton secours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je te soutiens par ma main droite, la main de la justice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ils seront couverts de honte et humiliés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous ceux qui sont furieux contre toi;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils seront réduits à rien, ils disparaîtront,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ceux qui t'intentent un procès.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tu auras beau les chercher, tu ne les trouveras plus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ceux qui te combattaient;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils seront réduits à rien, réduits au néant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ceux qui te faisaient la guerre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: En effet, c'est moi, l'Eternel, ton Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui empoigne ta main droite
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et qui te dis: «N''aie pas peur! J'
- type: usfm
  marker: q1
  children:
  - type: text
    text: e viens moi-même à ton secours.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: N'aie pas peur, vermisseau de Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: faible reste d'Israël!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je viens à ton secours, déclare l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celui qui te rachète, c'est le Saint d'Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Je vais faire de toi un traîneau de battage tout neuf,
- type: usfm
  marker: q1
  children:
  - type: text
    text: garni de pointes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu écraseras, tu broieras les montagnes
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu rendras les collines semblables à la bale du blé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Tu les secoueras et le vent les emportera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un tourbillon les dispersera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais toi, tu trouveras ta joie dans l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu feras ton sujet de fierté du Saint d'Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Les plus humbles et les plus pauvres cherchent de l'eau, mais il n'y en a pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et leur langue est desséchée par la soif.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moi, l'Eternel, je répondrai à leurs prières.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moi, le Dieu d'Israël, je ne les abandonnerai pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Je ferai jaillir des fleuves sur les collines
- type: usfm
  marker: q1
  children:
  - type: text
    text: et des sources au milieu des vallées.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je changerai le désert en étang
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la terre aride en cours d'eau.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Je ferai pousser dans le désert le cèdre, l'acacia,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le myrte et l'olivier.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je placerai pêle-mêle dans la plaine aride
- type: usfm
  marker: q1
  children:
  - type: text
    text: le cyprès, l'orme et le buis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ils le verront et ainsi ils reconnaîtront,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils constateront et comprendront tous ensemble
- type: usfm
  marker: q1
  children:
  - type: text
    text: que c'est la main de l'Eternel qui a fait cela,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que c'est le Saint d'Israël qui l'a créé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Plaidez votre cause,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dit l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Présentez des arguments pour votre défense,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dit le roi de Jacob.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Qu'ils les présentent! Qu'ils nous révèlent
- type: usfm
  marker: q1
  children:
  - type: text
    text: ce qui doit arriver!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quelles prédictions avez-vous déjà faites?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Révélez-le! Nous y réfléchirons
- type: usfm
  marker: q1
  children:
  - type: text
    text: et saurons ainsi si elles se sont accomplies.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ou bien annoncez-nous l'avenir!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Révélez ce qui arrivera plus tard!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous reconnaîtrons alors que vous êtes des dieux.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Faites seulement quelque chose, que ce soit bien ou mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour que nous le voyions et l'examinions ensemble!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: En réalité, vous êtes moins que rien
- type: usfm
  marker: q1
  children:
  - type: text
    text: et votre activité est plus que vide.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est une erreur monstrueuse que de vous choisir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Je l'ai fait surgir du nord et il est venu;
- type: usfm
  marker: q1
  children:
  - type: text
    text: depuis l'est, il recourt à mon nom;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il écrase les gouverneurs comme de la boue,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tout comme le potier piétine l'argile.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Qui l'a révélé dès le début pour que nous le sachions,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'longtemps à l''avance pour que nous puissions dire: «C''est juste»?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Personne ne l'a révélé, personne ne l'a annoncé
- type: usfm
  marker: q1
  children:
  - type: text
    text: et personne n'a entendu vos paroles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'J''ai été le premier à dire à Sion:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Les voici»,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à donner à Jérusalem un messager de bonnes nouvelles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Je regarde, mais personne ne se présente:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: personne parmi eux qui puisse donner un avis
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui puisse répondre si je l'interroge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ils ne sont tous que tromperie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils ne fabriquent que du vide,
- type: usfm
  marker: q1
  children:
  - type: text
    text: leurs idoles ne sont que du vent, c'est le désert.
