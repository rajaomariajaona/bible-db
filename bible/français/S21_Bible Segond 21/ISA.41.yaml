document_id: ISA.41,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Puissance de Dieu et inconsistance des idoles
  - type: text
    content: Iles, faites silence pour m'écouter!
  - type: text
    content: Que les peuples renouvellent leur force,
  - type: text
    content: qu'ils s'avancent pour parler!
  - type: text
    content: Approchons-nous ensemble pour le jugement.
  '10':
  - type: text
    content: N'aie pas peur, car je suis moi-même avec toi.
  - type: text
    content: Ne promène pas des regards inquiets, car je suis ton Dieu.
  - type: text
    content: Je te fortifie, je viens à ton secours,
  - type: text
    content: je te soutiens par ma main droite, la main de la justice.
  '11':
  - type: text
    content: Ils seront couverts de honte et humiliés,
  - type: text
    content: tous ceux qui sont furieux contre toi;
  - type: text
    content: ils seront réduits à rien, ils disparaîtront,
  - type: text
    content: ceux qui t'intentent un procès.
  '12':
  - type: text
    content: Tu auras beau les chercher, tu ne les trouveras plus,
  - type: text
    content: ceux qui te combattaient;
  - type: text
    content: ils seront réduits à rien, réduits au néant,
  - type: text
    content: ceux qui te faisaient la guerre.
  '13':
  - type: text
    content: En effet, c'est moi, l'Eternel, ton Dieu,
  - type: text
    content: qui empoigne ta main droite
  - type: text
    content: 'et qui te dis: «N''aie pas peur! J'
  - type: text
    content: e viens moi-même à ton secours.»
  '14':
  - type: text
    content: N'aie pas peur, vermisseau de Jacob,
  - type: text
    content: faible reste d'Israël!
  - type: text
    content: Je viens à ton secours, déclare l'Eternel.
  - type: text
    content: Celui qui te rachète, c'est le Saint d'Israël.
  '15':
  - type: text
    content: Je vais faire de toi un traîneau de battage tout neuf,
  - type: text
    content: garni de pointes.
  - type: text
    content: Tu écraseras, tu broieras les montagnes
  - type: text
    content: et tu rendras les collines semblables à la bale du blé.
  '16':
  - type: text
    content: Tu les secoueras et le vent les emportera,
  - type: text
    content: un tourbillon les dispersera,
  - type: text
    content: mais toi, tu trouveras ta joie dans l'Eternel,
  - type: text
    content: tu feras ton sujet de fierté du Saint d'Israël.
  '17':
  - type: text
    content: Les plus humbles et les plus pauvres cherchent de l'eau, mais il n'y en a pas,
  - type: text
    content: et leur langue est desséchée par la soif.
  - type: text
    content: Moi, l'Eternel, je répondrai à leurs prières.
  - type: text
    content: Moi, le Dieu d'Israël, je ne les abandonnerai pas.
  '18':
  - type: text
    content: Je ferai jaillir des fleuves sur les collines
  - type: text
    content: et des sources au milieu des vallées.
  - type: text
    content: Je changerai le désert en étang
  - type: text
    content: et la terre aride en cours d'eau.
  '19':
  - type: text
    content: Je ferai pousser dans le désert le cèdre, l'acacia,
  - type: text
    content: le myrte et l'olivier.
  - type: text
    content: Je placerai pêle-mêle dans la plaine aride
  - type: text
    content: le cyprès, l'orme et le buis.
  '2':
  - type: text
    content: Qui a fait surgir de l'est
  - type: text
    content: celui que la justice appelle à sa suite?
  - type: text
    content: Qui lui a livré des nations et soumis des rois?
  - type: text
    content: Qui a transformé leur épée en poussière,
  - type: text
    content: et leur arc en un fétu de paille qui s'envole?
  '20':
  - type: text
    content: Ils le verront et ainsi ils reconnaîtront,
  - type: text
    content: ils constateront et comprendront tous ensemble
  - type: text
    content: que c'est la main de l'Eternel qui a fait cela,
  - type: text
    content: que c'est le Saint d'Israël qui l'a créé.
  '21':
  - type: text
    content: Plaidez votre cause,
  - type: text
    content: dit l'Eternel.
  - type: text
    content: Présentez des arguments pour votre défense,
  - type: text
    content: dit le roi de Jacob.
  '22':
  - type: text
    content: Qu'ils les présentent! Qu'ils nous révèlent
  - type: text
    content: ce qui doit arriver!
  - type: text
    content: Quelles prédictions avez-vous déjà faites?
  - type: text
    content: Révélez-le! Nous y réfléchirons
  - type: text
    content: et saurons ainsi si elles se sont accomplies.
  - type: text
    content: Ou bien annoncez-nous l'avenir!
  '23':
  - type: text
    content: Révélez ce qui arrivera plus tard!
  - type: text
    content: Nous reconnaîtrons alors que vous êtes des dieux.
  - type: text
    content: Faites seulement quelque chose, que ce soit bien ou mal,
  - type: text
    content: pour que nous le voyions et l'examinions ensemble!
  '24':
  - type: text
    content: En réalité, vous êtes moins que rien
  - type: text
    content: et votre activité est plus que vide.
  - type: text
    content: C'est une erreur monstrueuse que de vous choisir.
  '25':
  - type: text
    content: Je l'ai fait surgir du nord et il est venu;
  - type: text
    content: depuis l'est, il recourt à mon nom;
  - type: text
    content: il écrase les gouverneurs comme de la boue,
  - type: text
    content: tout comme le potier piétine l'argile.
  '26':
  - type: text
    content: Qui l'a révélé dès le début pour que nous le sachions,
  - type: text
    content: 'longtemps à l''avance pour que nous puissions dire: «C''est juste»?'
  - type: text
    content: Personne ne l'a révélé, personne ne l'a annoncé
  - type: text
    content: et personne n'a entendu vos paroles.
  '27':
  - type: text
    content: 'J''ai été le premier à dire à Sion:'
  - type: text
    content: «Les voici»,
  - type: text
    content: à donner à Jérusalem un messager de bonnes nouvelles.
  '28':
  - type: text
    content: 'Je regarde, mais personne ne se présente:'
  - type: text
    content: personne parmi eux qui puisse donner un avis
  - type: text
    content: et qui puisse répondre si je l'interroge.
  '29':
  - type: text
    content: Ils ne sont tous que tromperie,
  - type: text
    content: ils ne fabriquent que du vide,
  - type: text
    content: leurs idoles ne sont que du vent, c'est le désert.
  '3':
  - type: text
    content: Il s'est lancé à leur poursuite, il circule en paix
  - type: text
    content: sur un sentier que ses pieds n'avaient jamais touché.
  '4':
  - type: text
    content: Qui a accompli cela? Qui l'a mis en œuvre?
  - type: text
    content: 'C''est celui qui a convoqué les générations dès le commencement:'
  - type: text
    content: c'est moi, l'Eternel, qui suis le premier,
  - type: text
    content: et je serai encore le même avec les générations à venir.
  '5':
  - type: text
    content: Les îles le voient, et elles ont peur,
  - type: text
    content: 'les extrémités de la terre tremblent:'
  - type: text
    content: ils s'approchent, ils viennent.
  '6':
  - type: text
    content: Ils s'aident mutuellement
  - type: text
    content: 'et chacun dit à son frère: «Courage!»'
  '7':
  - type: text
    content: Le sculpteur encourage l'orfèvre,
  - type: text
    content: celui qui travaille au marteau encourage celui qui frappe sur l'enclume.
  - type: text
    content: Il affirme que la soudure est bonne,
  - type: text
    content: puis il fixe l'idole avec des clous pour qu'elle ne soit pas branlante.
  '8':
  - type: text
    content: Mais toi, Israël, tu es mon serviteur.
  - type: text
    content: Jacob, tu es celui que j'ai choisi,
  - type: text
    content: le descendant de mon ami Abraham.
  '9':
  - type: text
    content: Je t'ai pris aux extrémités de la terre,
  - type: text
    content: je t'ai appelé d'une région lointaine
  - type: text
    content: 'et t''ai dit: «Tu es mon serviteur.»'
  - type: text
    content: Je t'ai choisi et ne te rejette pas.
