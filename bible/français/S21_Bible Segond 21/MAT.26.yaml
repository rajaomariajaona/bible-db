document_id: MAT.26,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Mort et résurrection de Jésus
  - type: heading
    content: 26.1–28.20
  - type: heading
    content: Complot contre Jésus
  - type: text
    content: 'Lorsque Jésus eut fini de donner toutes ces instructions, il dit à ses disciples: '
  '10':
  - type: text
    content: 'Le sachant, Jésus leur dit: «Pourquoi faites-vous de la peine à cette femme? Elle a accompli une bonne action envers moi. '
  '11':
  - type: text
    content: 'En effet, vous avez toujours des pauvres avec vous, mais vous ne m''aurez pas toujours. '
  '12':
  - type: text
    content: 'En versant ce parfum sur mon corps, elle l''a fait pour mon ensevelissement. '
  '13':
  - type: text
    content: Je vous le dis en vérité, partout où cette bonne nouvelle sera proclamée, dans le monde entier, on racontera aussi en souvenir de cette femme ce qu'elle a fait.»
  '14':
  - type: text
    content: 'Alors l''un des douze, appelé Judas l''Iscariot, alla vers les chefs des prêtres '
  '15':
  - type: text
    content: 'et dit: «Que voulez-vous me donner pour que je vous livre Jésus?» Ils lui payèrent 30 pièces d''argent. '
  '16':
  - type: text
    content: Dès ce moment, il se mit à chercher une occasion favorable pour trahir Jésus.
  - type: heading
    content: Institution de la cène
  '17':
  - type: text
    content: 'Le premier jour des pains sans levain, les disciples s''adressèrent à Jésus pour lui dire: «Où veux-tu que nous te préparions le repas de la Pâque?» '
  '18':
  - type: text
    content: 'Il répondit: «Allez à la ville chez un tel et vous lui direz: ‘Le maître dit: Mon heure est proche. Je célébrerai la Pâque chez toi avec mes disciples.’» '
  '19':
  - type: text
    content: Les disciples firent ce que Jésus leur avait ordonné et préparèrent la Pâque.
  '2':
  - type: text
    content: «Vous savez que la Pâque
  - type: note
    content: 'La Pâque: grande fête juive qui commémorait le départ d''Egypte des Israélites, leur délivrance de l''esclavage et le fait que la vie de leurs fils aînés avait été épargnée. Pendant toute la semaine qui suivait la Pâque, on mangeait des pains sans levain.'
  - type: text
    content: ' a lieu dans deux jours et que le Fils de l''homme sera arrêté pour être crucifié.»'
  '20':
  - type: text
    content: 'Le soir venu, il se mit à table avec les douze. '
  '21':
  - type: text
    content: 'Pendant qu''ils mangeaient, il dit: «Je vous le dis en vérité, l''un de vous me trahira.» '
  '22':
  - type: text
    content: 'Ils furent profondément attristés et chacun se mit à lui dire: «Est-ce moi, Seigneur?» '
  '23':
  - type: text
    content: 'Il répondit: «Celui qui a mis la main dans le plat avec moi, c''est celui qui me trahira. '
  '24':
  - type: text
    content: 'Le Fils de l''homme s''en va, conformément à ce qui est écrit à son sujet, mais malheur à l''homme par qui le Fils de l''homme est trahi! Mieux vaudrait pour cet homme qu''il ne soit pas né.» '
  '25':
  - type: text
    content: 'Judas, celui qui le trahissait, prit la parole et dit: «Est-ce moi, maître?» Jésus lui répondit: «Tu le dis.»'
  '26':
  - type: text
    content: 'Pendant qu''ils mangeaient, Jésus prit du pain et prononça la prière de bénédiction, puis il le rompit et le donna aux disciples en disant: «Prenez, mangez, ceci est mon corps.» '
  '27':
  - type: text
    content: 'Il prit ensuite une coupe et remercia Dieu, puis il la leur donna en disant: «Buvez-en tous, '
  '28':
  - type: text
    content: 'car ceci est mon sang, le sang de la [nouvelle] alliance, qui est versé pour beaucoup, pour le pardon des péchés. '
  '29':
  - type: text
    content: Je vous le dis, je ne boirai plus désormais de ce fruit de la vigne, jusqu'au jour où je le boirai nouveau avec vous dans le royaume de mon Père.»
  '3':
  - type: text
    content: 'Alors les chefs des prêtres, [les spécialistes de la loi] et les anciens du peuple se réunirent dans la cour du grand-prêtre, appelé Caïphe, '
  '30':
  - type: text
    content: 'Après avoir chanté les psaumes, ils se rendirent au mont des Oliviers. '
  '31':
  - type: text
    content: 'Alors Jésus leur dit: «Vous trébucherez tous, cette nuit, à cause de moi, car il est écrit: '
  - type: text
    content: Je frapperai le berger et les brebis du troupeau seront dispersées
  - type: text
    content: .
  - type: note
    content: 'Je frapperai… dispersées: citation de Zacharie 13.7.'
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'Mais, après ma résurrection, je vous précéderai en Galilée.» '
  '33':
  - type: text
    content: 'Pierre prit la parole et lui dit: «Même si tous trébuchent à cause de toi, ce ne sera jamais mon cas.» '
  '34':
  - type: text
    content: 'Jésus lui dit: «Je te le dis en vérité, cette nuit même, avant que le coq chante, trois fois tu me renieras.» '
  '35':
  - type: text
    content: 'Pierre lui répondit: «Même s''il me faut mourir avec toi, je ne te renierai pas.» Et tous les disciples dirent la même chose.'
  - type: heading
    content: Arrestation de Jésus
  '36':
  - type: text
    content: 'Là-dessus, Jésus se rendit avec eux dans un endroit appelé Gethsémané et il dit aux disciples: «Asseyez-vous [ici] pendant que je m''éloignerai pour prier.» '
  '37':
  - type: text
    content: 'Il prit avec lui Pierre et les deux fils de Zébédée et il commença à être saisi de tristesse et d''angoisse. '
  '38':
  - type: text
    content: 'Il leur dit alors: «Mon âme est triste à en mourir. Restez ici, éveillés avec moi.» '
  '39':
  - type: text
    content: 'Puis il avança de quelques pas, se jeta le visage contre terre et fit cette prière: «Mon Père, si cela est possible, que cette coupe s''éloigne de moi! Toutefois, non pas ce que je veux, mais ce que tu veux.» '
  '4':
  - type: text
    content: 'et ils décidèrent d''arrêter Jésus par ruse et de le faire mourir. '
  '40':
  - type: text
    content: 'Il revint vers les disciples, qu''il trouva endormis, et dit à Pierre: «Vous n''avez donc pas pu rester éveillés une seule heure avec moi! '
  '41':
  - type: text
    content: 'Restez vigilants et priez pour ne pas céder à la tentation. L''esprit est bien disposé, mais par nature l''homme est faible.» '
  '42':
  - type: text
    content: 'Il s''éloigna une deuxième fois et fit cette prière: «Mon Père, s''il n''est pas possible que cette coupe s''éloigne [de moi] sans que je la boive, que ta volonté soit faite!» '
  '43':
  - type: text
    content: 'Il revint et les trouva encore endormis, car ils avaient les paupières lourdes. '
  '44':
  - type: text
    content: 'Il les quitta, s''éloigna de nouveau et pria pour la troisième fois, répétant les mêmes paroles. '
  '45':
  - type: text
    content: 'Puis il revint vers ses disciples et leur dit: «Vous dormez maintenant et vous vous reposez! Voici, l''heure est proche et le Fils de l''homme est livré entre les mains des pécheurs. '
  '46':
  - type: text
    content: Levez-vous, allons-y! Celui qui me trahit s'approche.»
  '47':
  - type: text
    content: 'Il parlait encore quand Judas, l''un des douze, arriva avec une foule nombreuse armée d''épées et de bâtons, envoyée par les chefs des prêtres et par les anciens du peuple. '
  '48':
  - type: text
    content: 'Celui qui le trahissait leur avait donné ce signe: «L''homme auquel je donnerai un baiser, c''est lui. Arrêtez-le!» '
  '49':
  - type: text
    content: 'Aussitôt, il s''approcha de Jésus en disant: «Salut, maître!», et il l''embrassa. '
  '5':
  - type: text
    content: 'Cependant, ils se dirent: «Que ce ne soit pas pendant la fête, afin qu''il n''y ait pas d''agitation parmi le peuple.»'
  - type: heading
    content: Une femme verse du parfum sur Jésus
  '50':
  - type: text
    content: 'Jésus lui dit: «Mon ami, ce que tu es venu faire, fais-le.» Alors ces gens s''avancèrent, mirent la main sur Jésus et l''arrêtèrent.'
  '51':
  - type: text
    content: 'Un de ceux qui étaient avec Jésus mit la main sur son épée et la tira; il frappa le serviteur du grand-prêtre et lui emporta l''oreille. '
  '52':
  - type: text
    content: 'Alors Jésus lui dit: «Remets ton épée à sa place, car tous ceux qui prendront l''épée mourront par l''épée. '
  '53':
  - type: text
    content: 'Penses-tu que je ne puisse pas faire appel à mon Père, qui me donnerait à l''instant plus de douze légions d''anges? '
  '54':
  - type: text
    content: Comment donc s'accompliraient les Ecritures, d'après lesquelles cela doit se passer ainsi?»
  '55':
  - type: text
    content: 'A ce moment, Jésus dit à la foule: «Vous êtes venus vous emparer de moi avec des épées et des bâtons, comme pour un brigand. J''étais tous les jours assis [parmi vous], enseignant dans le temple, et vous ne m''avez pas arrêté. '
  '56':
  - type: text
    content: Mais tout cela est arrivé afin que les écrits des prophètes soient accomplis.» Alors tous les disciples l'abandonnèrent et prirent la fuite.
  - type: heading
    content: Jésus devant le conseil juif
  '57':
  - type: text
    content: 'Ceux qui avaient arrêté Jésus l''emmenèrent chez le grand-prêtre Caïphe, où les spécialistes de la loi et les anciens étaient rassemblés. '
  '58':
  - type: text
    content: Pierre le suivit de loin jusqu'à la cour du grand-prêtre, y entra et s'assit avec les serviteurs pour voir comment cela finirait.
  '59':
  - type: text
    content: Les chefs des prêtres, [les anciens] et tout le sanhédrin
  - type: note
    content: 'Sanhédrin: conseil juif présidé par le grand-prêtre, qui faisait office de gouvernement et de tribunal pour les affaires qui n''étaient pas du ressort des Romains.'
  - type: text
    content: ' cherchaient un faux témoignage contre Jésus afin de le faire mourir, '
  '6':
  - type: text
    content: 'Comme Jésus était à Béthanie, dans la maison de Simon le lépreux, '
  '60':
  - type: text
    content: 'mais ils n''en trouvèrent pas, quoique beaucoup de faux témoins se soient présentés. Enfin, il en vint deux qui dirent: '
  '61':
  - type: text
    content: '«Celui-ci a dit: ‘Je peux détruire le temple de Dieu et le reconstruire en trois jours.’» '
  '62':
  - type: text
    content: 'Le grand-prêtre se leva et lui dit: «Ne réponds-tu rien? Pourquoi ces hommes témoignent-ils contre toi?» '
  '63':
  - type: text
    content: 'Mais Jésus gardait le silence. Le grand-prêtre [prit la parole et] lui dit: «Je t''adjure, par le Dieu vivant, de nous dire si tu es le Messie, le Fils de Dieu.» '
  '64':
  - type: text
    content: 'Jésus lui répondit: «Tu le dis. De plus, je vous le déclare, vous verrez désormais '
  - type: text
    content: le Fils de l'homme assis à la droite du Tout-Puissant
  - type: text
    content: ' et '
  - type: text
    content: venant sur les nuées du ciel
  - type: note
    content: 'Le Fils… ciel: citation combinant le Psaume 110.1 et Daniel 7.13; Jésus s''identifie ainsi au Messie qui, dans la vision de Daniel, reçoit le gouvernement de l''univers.'
  - type: text
    content: '.» '
  '65':
  - type: text
    content: 'Alors le grand-prêtre déchira ses vêtements en disant: «Il a blasphémé! Qu''avons-nous encore besoin de témoins? Vous venez d''entendre son blasphème. '
  '66':
  - type: text
    content: 'Qu''en pensez-vous?» Ils répondirent: «Il mérite la mort.» '
  '67':
  - type: text
    content: 'Là-dessus, ils lui crachèrent au visage et le frappèrent à coups de poing; certains lui donnaient des gifles en disant: '
  '68':
  - type: text
    content: «Christ, prophétise-nous qui t'a frappé!»
  '69':
  - type: text
    content: 'Or Pierre était assis dehors dans la cour. Une servante s''approcha de lui et dit: «Toi aussi, tu étais avec Jésus le Galiléen.» '
  '7':
  - type: text
    content: 'une femme s''approcha de lui avec un vase qui contenait un parfum de grande valeur. Pendant qu''il était à table, elle versa le parfum sur sa tête. '
  '70':
  - type: text
    content: 'Mais il le nia devant tous en disant: «Je ne sais pas ce que tu veux dire.» '
  '71':
  - type: text
    content: 'Comme il se dirigeait vers la porte, une autre servante le vit et dit à ceux qui se trouvaient là: «Cet homme [aussi] était avec Jésus de Nazareth.» '
  '72':
  - type: text
    content: 'Il le nia de nouveau, avec serment: «Je ne connais pas cet homme.» '
  '73':
  - type: text
    content: 'Peu après, ceux qui étaient là s''approchèrent et dirent à Pierre: «Certainement, toi aussi tu fais partie de ces gens-là, car ton langage te fait reconnaître.» '
  '74':
  - type: text
    content: 'Alors il se mit à jurer en lançant des malédictions: «Je ne connais pas cet homme.» Aussitôt un coq chanta. '
  '75':
  - type: text
    content: 'Pierre se souvint alors de ce que Jésus [lui] avait dit: «Avant que le coq chante, tu me renieras trois fois.» Il sortit et pleura amèrement.'
  '8':
  - type: text
    content: 'A cette vue, les disciples s''indignèrent et dirent: «A quoi bon un tel gaspillage? '
  '9':
  - type: text
    content: 'On aurait pu vendre ce parfum très cher et donner l''argent aux pauvres.» '
