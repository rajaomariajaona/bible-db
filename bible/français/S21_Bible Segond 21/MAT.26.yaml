document_id: MAT.26,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Mort et résurrection de Jésus
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: 26.1–28.20
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Complot contre Jésus
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Lorsque Jésus eut fini de donner toutes ces instructions, il dit à ses disciples: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Le sachant, Jésus leur dit: «Pourquoi faites-vous de la peine à cette femme? Elle a accompli une bonne action envers moi. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'En effet, vous avez toujours des pauvres avec vous, mais vous ne m''aurez pas toujours. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'En versant ce parfum sur mon corps, elle l''a fait pour mon ensevelissement. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Je vous le dis en vérité, partout où cette bonne nouvelle sera proclamée, dans le monde entier, on racontera aussi en souvenir de cette femme ce qu'elle a fait.»
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Alors l''un des douze, appelé Judas l''Iscariot, alla vers les chefs des prêtres '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'et dit: «Que voulez-vous me donner pour que je vous livre Jésus?» Ils lui payèrent 30 pièces d''argent. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Dès ce moment, il se mit à chercher une occasion favorable pour trahir Jésus.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Institution de la cène
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Le premier jour des pains sans levain, les disciples s''adressèrent à Jésus pour lui dire: «Où veux-tu que nous te préparions le repas de la Pâque?» '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Il répondit: «Allez à la ville chez un tel et vous lui direz: ‘Le maître dit: Mon heure est proche. Je célébrerai la Pâque chez toi avec mes disciples.’» '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Les disciples firent ce que Jésus leur avait ordonné et préparèrent la Pâque.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: «Vous savez que la Pâque
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'La Pâque: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: grande fête juive qui commémorait le départ d'Egypte des Israélites, leur délivrance de l'esclavage et le fait que la vie de leurs fils aînés avait été épargnée. Pendant toute la semaine qui suivait la Pâque, on mangeait des pains sans levain.
      marker-yv: yv-n
    - type: text
      text: ' a lieu dans deux jours et que le Fils de l''homme sera arrêté pour être crucifié.»'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Le soir venu, il se mit à table avec les douze. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Pendant qu''ils mangeaient, il dit: «Je vous le dis en vérité, l''un de vous me trahira.» '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ils furent profondément attristés et chacun se mit à lui dire: «Est-ce moi, Seigneur?» '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Il répondit: «Celui qui a mis la main dans le plat avec moi, c''est celui qui me trahira. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Le Fils de l''homme s''en va, conformément à ce qui est écrit à son sujet, mais malheur à l''homme par qui le Fils de l''homme est trahi! Mieux vaudrait pour cet homme qu''il ne soit pas né.» '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Judas, celui qui le trahissait, prit la parole et dit: «Est-ce moi, maître?» Jésus lui répondit: «Tu le dis.»'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Pendant qu''ils mangeaient, Jésus prit du pain et prononça la prière de bénédiction, puis il le rompit et le donna aux disciples en disant: «Prenez, mangez, ceci est mon corps.» '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Il prit ensuite une coupe et remercia Dieu, puis il la leur donna en disant: «Buvez-en tous, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'car ceci est mon sang, le sang de la [nouvelle] alliance, qui est versé pour beaucoup, pour le pardon des péchés. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Je vous le dis, je ne boirai plus désormais de ce fruit de la vigne, jusqu'au jour où je le boirai nouveau avec vous dans le royaume de mon Père.»
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Alors les chefs des prêtres, [les spécialistes de la loi] et les anciens du peuple se réunirent dans la cour du grand-prêtre, appelé Caïphe, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Après avoir chanté les psaumes, ils se rendirent au mont des Oliviers. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Alors Jésus leur dit: «Vous trébucherez tous, cette nuit, à cause de moi, car il est écrit: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Je frapperai le berger et les brebis du troupeau seront dispersées
    - type: text
      text: .
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.31 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Je frapperai… dispersées: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Zacharie 13.7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Mais, après ma résurrection, je vous précéderai en Galilée.» '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Pierre prit la parole et lui dit: «Même si tous trébuchent à cause de toi, ce ne sera jamais mon cas.» '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Jésus lui dit: «Je te le dis en vérité, cette nuit même, avant que le coq chante, trois fois tu me renieras.» '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Pierre lui répondit: «Même s''il me faut mourir avec toi, je ne te renierai pas.» Et tous les disciples dirent la même chose.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Arrestation de Jésus
    marker-yv: yv-h
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Là-dessus, Jésus se rendit avec eux dans un endroit appelé Gethsémané et il dit aux disciples: «Asseyez-vous [ici] pendant que je m''éloignerai pour prier.» '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Il prit avec lui Pierre et les deux fils de Zébédée et il commença à être saisi de tristesse et d''angoisse. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Il leur dit alors: «Mon âme est triste à en mourir. Restez ici, éveillés avec moi.» '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Puis il avança de quelques pas, se jeta le visage contre terre et fit cette prière: «Mon Père, si cela est possible, que cette coupe s''éloigne de moi! Toutefois, non pas ce que je veux, mais ce que tu veux.» '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'et ils décidèrent d''arrêter Jésus par ruse et de le faire mourir. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Il revint vers les disciples, qu''il trouva endormis, et dit à Pierre: «Vous n''avez donc pas pu rester éveillés une seule heure avec moi! '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Restez vigilants et priez pour ne pas céder à la tentation. L''esprit est bien disposé, mais par nature l''homme est faible.» '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Il s''éloigna une deuxième fois et fit cette prière: «Mon Père, s''il n''est pas possible que cette coupe s''éloigne [de moi] sans que je la boive, que ta volonté soit faite!» '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Il revint et les trouva encore endormis, car ils avaient les paupières lourdes. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Il les quitta, s''éloigna de nouveau et pria pour la troisième fois, répétant les mêmes paroles. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Puis il revint vers ses disciples et leur dit: «Vous dormez maintenant et vous vous reposez! Voici, l''heure est proche et le Fils de l''homme est livré entre les mains des pécheurs. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: Levez-vous, allons-y! Celui qui me trahit s'approche.»
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'Il parlait encore quand Judas, l''un des douze, arriva avec une foule nombreuse armée d''épées et de bâtons, envoyée par les chefs des prêtres et par les anciens du peuple. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Celui qui le trahissait leur avait donné ce signe: «L''homme auquel je donnerai un baiser, c''est lui. Arrêtez-le!» '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'Aussitôt, il s''approcha de Jésus en disant: «Salut, maître!», et il l''embrassa. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Cependant, ils se dirent: «Que ce ne soit pas pendant la fête, afin qu''il n''y ait pas d''agitation parmi le peuple.»'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Une femme verse du parfum sur Jésus
    marker-yv: yv-h
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'Jésus lui dit: «Mon ami, ce que tu es venu faire, fais-le.» Alors ces gens s''avancèrent, mirent la main sur Jésus et l''arrêtèrent.'
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'Un de ceux qui étaient avec Jésus mit la main sur son épée et la tira; il frappa le serviteur du grand-prêtre et lui emporta l''oreille. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: 'Alors Jésus lui dit: «Remets ton épée à sa place, car tous ceux qui prendront l''épée mourront par l''épée. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: 'Penses-tu que je ne puisse pas faire appel à mon Père, qui me donnerait à l''instant plus de douze légions d''anges? '
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: Comment donc s'accompliraient les Ecritures, d'après lesquelles cela doit se passer ainsi?»
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: 'A ce moment, Jésus dit à la foule: «Vous êtes venus vous emparer de moi avec des épées et des bâtons, comme pour un brigand. J''étais tous les jours assis [parmi vous], enseignant dans le temple, et vous ne m''avez pas arrêté. '
  '56':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '56'
    - type: text
      text: Mais tout cela est arrivé afin que les écrits des prophètes soient accomplis.» Alors tous les disciples l'abandonnèrent et prirent la fuite.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus devant le conseil juif
    marker-yv: yv-h
  '57':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '57'
    - type: text
      text: 'Ceux qui avaient arrêté Jésus l''emmenèrent chez le grand-prêtre Caïphe, où les spécialistes de la loi et les anciens étaient rassemblés. '
  '58':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '58'
    - type: text
      text: Pierre le suivit de loin jusqu'à la cour du grand-prêtre, y entra et s'assit avec les serviteurs pour voir comment cela finirait.
  '59':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '59'
    - type: text
      text: Les chefs des prêtres, [les anciens] et tout le sanhédrin
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.59 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Sanhédrin: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: conseil juif présidé par le grand-prêtre, qui faisait office de gouvernement et de tribunal pour les affaires qui n'étaient pas du ressort des Romains.
      marker-yv: yv-n
    - type: text
      text: ' cherchaient un faux témoignage contre Jésus afin de le faire mourir, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Comme Jésus était à Béthanie, dans la maison de Simon le lépreux, '
  '60':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '60'
    - type: text
      text: 'mais ils n''en trouvèrent pas, quoique beaucoup de faux témoins se soient présentés. Enfin, il en vint deux qui dirent: '
  '61':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '61'
    - type: text
      text: '«Celui-ci a dit: ‘Je peux détruire le temple de Dieu et le reconstruire en trois jours.’» '
  '62':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '62'
    - type: text
      text: 'Le grand-prêtre se leva et lui dit: «Ne réponds-tu rien? Pourquoi ces hommes témoignent-ils contre toi?» '
  '63':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '63'
    - type: text
      text: 'Mais Jésus gardait le silence. Le grand-prêtre [prit la parole et] lui dit: «Je t''adjure, par le Dieu vivant, de nous dire si tu es le Messie, le Fils de Dieu.» '
  '64':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '64'
    - type: text
      text: 'Jésus lui répondit: «Tu le dis. De plus, je vous le déclare, vous verrez désormais '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: le Fils de l'homme assis à la droite du Tout-Puissant
    - type: text
      text: ' et '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: venant sur les nuées du ciel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.64 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le Fils… ciel: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation combinant le '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Psaume 110.1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' et '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Daniel 7.13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; Jésus s'identifie ainsi au Messie qui, dans la vision de Daniel, reçoit le gouvernement de l'univers.
      marker-yv: yv-n
    - type: text
      text: '.» '
  '65':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '65'
    - type: text
      text: 'Alors le grand-prêtre déchira ses vêtements en disant: «Il a blasphémé! Qu''avons-nous encore besoin de témoins? Vous venez d''entendre son blasphème. '
  '66':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '66'
    - type: text
      text: 'Qu''en pensez-vous?» Ils répondirent: «Il mérite la mort.» '
  '67':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '67'
    - type: text
      text: 'Là-dessus, ils lui crachèrent au visage et le frappèrent à coups de poing; certains lui donnaient des gifles en disant: '
  '68':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '68'
    - type: text
      text: «Christ, prophétise-nous qui t'a frappé!»
  '69':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '69'
    - type: text
      text: 'Or Pierre était assis dehors dans la cour. Une servante s''approcha de lui et dit: «Toi aussi, tu étais avec Jésus le Galiléen.» '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'une femme s''approcha de lui avec un vase qui contenait un parfum de grande valeur. Pendant qu''il était à table, elle versa le parfum sur sa tête. '
  '70':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '70'
    - type: text
      text: 'Mais il le nia devant tous en disant: «Je ne sais pas ce que tu veux dire.» '
  '71':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '71'
    - type: text
      text: 'Comme il se dirigeait vers la porte, une autre servante le vit et dit à ceux qui se trouvaient là: «Cet homme [aussi] était avec Jésus de Nazareth.» '
  '72':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '72'
    - type: text
      text: 'Il le nia de nouveau, avec serment: «Je ne connais pas cet homme.» '
  '73':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '73'
    - type: text
      text: 'Peu après, ceux qui étaient là s''approchèrent et dirent à Pierre: «Certainement, toi aussi tu fais partie de ces gens-là, car ton langage te fait reconnaître.» '
  '74':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '74'
    - type: text
      text: 'Alors il se mit à jurer en lançant des malédictions: «Je ne connais pas cet homme.» Aussitôt un coq chanta. '
  '75':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '75'
    - type: text
      text: 'Pierre se souvint alors de ce que Jésus [lui] avait dit: «Avant que le coq chante, tu me renieras trois fois.» Il sortit et pleura amèrement.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'A cette vue, les disciples s''indignèrent et dirent: «A quoi bon un tel gaspillage? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'On aurait pu vendre ce parfum très cher et donner l''argent aux pauvres.» '
