document_id: PRO.5,152
type_code: fra
verses:
  '1':
  - type: heading
    content: L'adultère
  - type: text
    content: Mon fils, sois attentif à ma sagesse,
  - type: text
    content: tends l'oreille vers mon intelligence,
  '10':
  - type: text
    content: sinon des étrangers se rassasieront de ton bien
  - type: text
    content: et du produit de ton travail dans la maison d'un autre;
  '11':
  - type: text
    content: sinon tu gémiras, près de ta fin,
  - type: text
    content: quand ta chair et ton corps dépériront.
  '12':
  - type: text
    content: 'Tu diras alors: «Comment donc ai-je pu détester l''instruction'
  - type: text
    content: et comment mon cœur a-t-il pu mépriser le reproche?
  '13':
  - type: text
    content: Comment ai-je pu ne pas écouter la voix de mes maîtres,
  - type: text
    content: ne pas tendre l'oreille vers ceux qui m'instruisaient?
  '14':
  - type: text
    content: Encore un peu et j'aurais été au comble du malheur
  - type: text
    content: au milieu du peuple et de l'assemblée.»
  '15':
  - type: text
    content: Bois l'eau de ta citerne,
  - type: text
    content: l'eau qui sort de ton puits!
  '16':
  - type: text
    content: Tes sources doivent-elles se déverser à l'extérieur?
  - type: text
    content: Tes ruisseaux doivent-ils couler sur les places publiques?
  '17':
  - type: text
    content: Qu'ils soient pour toi seul,
  - type: text
    content: et non pour des étrangers avec toi.
  '18':
  - type: text
    content: Que ta source soit bénie,
  - type: text
    content: fais ta joie de la femme de ta jeunesse,
  '19':
  - type: text
    content: biche des amours, gazelle pleine de grâce!
  - type: text
    content: Que ses seins te rassasient constamment,
  - type: text
    content: enivre-toi sans cesse de son amour!
  '2':
  - type: text
    content: afin que tu conserves la réflexion
  - type: text
    content: et que tes lèvres gardent la connaissance.
  '20':
  - type: text
    content: Pourquoi, mon fils, t'enivrerais-tu d'une étrangère
  - type: text
    content: et embrasserais-tu la poitrine d'une inconnue?
  '21':
  - type: text
    content: 'En effet, les voies de l''homme sont devant les yeux de l''Eternel:'
  - type: text
    content: il examine tous ses sentiers.
  '22':
  - type: text
    content: Le méchant est prisonnier de ses propres fautes,
  - type: text
    content: il est retenu par les liens de son péché.
  '23':
  - type: text
    content: Il mourra faute d'instruction,
  - type: text
    content: c'est de l'excès de sa folie qu'il s'enivrera.
  '3':
  - type: text
    content: Certes, les lèvres de l'étrangère ruissellent de miel
  - type: text
    content: et son palais est plus doux que l'huile,
  '4':
  - type: text
    content: mais à la fin elle est amère comme l'absinthe,
  - type: text
    content: coupante comme une épée à deux tranchants.
  '5':
  - type: text
    content: Ses pieds descendent vers la mort,
  - type: text
    content: ses pas aboutissent au séjour des morts.
  '6':
  - type: text
    content: Elle se garde bien d'examiner le chemin de la vie.
  - type: text
    content: Ses voies sont des voies d'errance, mais elle ne le sait pas.
  '7':
  - type: text
    content: Et maintenant, mes fils, écoutez-moi
  - type: text
    content: et ne vous détournez pas des paroles de ma bouche!
  '8':
  - type: text
    content: Passe loin de chez elle
  - type: text
    content: et ne t'approche pas de la porte de sa maison!
  '9':
  - type: text
    content: Sinon tu livreras ta dignité à d'autres
  - type: text
    content: et tes années à un mari sans pitié;
