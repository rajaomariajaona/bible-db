document_id: PRO.5,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L'adultère
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon fils, sois attentif à ma sagesse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tends l'oreille vers mon intelligence,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sinon des étrangers se rassasieront de ton bien
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et du produit de ton travail dans la maison d'un autre;
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sinon tu gémiras, près de ta fin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand ta chair et ton corps dépériront.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tu diras alors: «Comment donc ai-je pu détester l''instruction'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et comment mon cœur a-t-il pu mépriser le reproche?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comment ai-je pu ne pas écouter la voix de mes maîtres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne pas tendre l'oreille vers ceux qui m'instruisaient?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Encore un peu et j'aurais été au comble du malheur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au milieu du peuple et de l'assemblée.»
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bois l'eau de ta citerne,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'eau qui sort de ton puits!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes sources doivent-elles se déverser à l'extérieur?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes ruisseaux doivent-ils couler sur les places publiques?
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu'ils soient pour toi seul,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et non pour des étrangers avec toi.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que ta source soit bénie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fais ta joie de la femme de ta jeunesse,
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: biche des amours, gazelle pleine de grâce!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que ses seins te rassasient constamment,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: enivre-toi sans cesse de son amour!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin que tu conserves la réflexion
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que tes lèvres gardent la connaissance.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi, mon fils, t'enivrerais-tu d'une étrangère
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et embrasserais-tu la poitrine d'une inconnue?
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'En effet, les voies de l''homme sont devant les yeux de l''Eternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il examine tous ses sentiers.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le méchant est prisonnier de ses propres fautes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il est retenu par les liens de son péché.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il mourra faute d'instruction,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est de l'excès de sa folie qu'il s'enivrera.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Certes, les lèvres de l'étrangère ruissellent de miel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et son palais est plus doux que l'huile,
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais à la fin elle est amère comme l'absinthe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: coupante comme une épée à deux tranchants.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses pieds descendent vers la mort,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ses pas aboutissent au séjour des morts.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle se garde bien d'examiner le chemin de la vie.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses voies sont des voies d'errance, mais elle ne le sait pas.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et maintenant, mes fils, écoutez-moi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ne vous détournez pas des paroles de ma bouche!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Passe loin de chez elle
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ne t'approche pas de la porte de sa maison!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sinon tu livreras ta dignité à d'autres
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tes années à un mari sans pitié;
