document_id: PRO.5
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L'adultère
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Mon fils, sois attentif à ma sagesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tends l'oreille vers mon intelligence,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: afin que tu conserves la réflexion
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que tes lèvres gardent la connaissance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Certes, les lèvres de l'étrangère ruissellent de miel
- type: usfm
  marker: q1
  children:
  - type: text
    text: et son palais est plus doux que l'huile,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: mais à la fin elle est amère comme l'absinthe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: coupante comme une épée à deux tranchants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ses pieds descendent vers la mort,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ses pas aboutissent au séjour des morts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Elle se garde bien d'examiner le chemin de la vie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses voies sont des voies d'errance, mais elle ne le sait pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Et maintenant, mes fils, écoutez-moi
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ne vous détournez pas des paroles de ma bouche!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Passe loin de chez elle
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ne t'approche pas de la porte de sa maison!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Sinon tu livreras ta dignité à d'autres
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tes années à un mari sans pitié;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: sinon des étrangers se rassasieront de ton bien
- type: usfm
  marker: q1
  children:
  - type: text
    text: et du produit de ton travail dans la maison d'un autre;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: sinon tu gémiras, près de ta fin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand ta chair et ton corps dépériront.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tu diras alors: «Comment donc ai-je pu détester l''instruction'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et comment mon cœur a-t-il pu mépriser le reproche?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Comment ai-je pu ne pas écouter la voix de mes maîtres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne pas tendre l'oreille vers ceux qui m'instruisaient?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Encore un peu et j'aurais été au comble du malheur
- type: usfm
  marker: q1
  children:
  - type: text
    text: au milieu du peuple et de l'assemblée.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Bois l'eau de ta citerne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'eau qui sort de ton puits!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Tes sources doivent-elles se déverser à l'extérieur?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tes ruisseaux doivent-ils couler sur les places publiques?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Qu'ils soient pour toi seul,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et non pour des étrangers avec toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Que ta source soit bénie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fais ta joie de la femme de ta jeunesse,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: biche des amours, gazelle pleine de grâce!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que ses seins te rassasient constamment,
- type: usfm
  marker: q1
  children:
  - type: text
    text: enivre-toi sans cesse de son amour!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Pourquoi, mon fils, t'enivrerais-tu d'une étrangère
- type: usfm
  marker: q1
  children:
  - type: text
    text: et embrasserais-tu la poitrine d'une inconnue?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'En effet, les voies de l''homme sont devant les yeux de l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il examine tous ses sentiers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Le méchant est prisonnier de ses propres fautes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il est retenu par les liens de son péché.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Il mourra faute d'instruction,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est de l'excès de sa folie qu'il s'enivrera.
