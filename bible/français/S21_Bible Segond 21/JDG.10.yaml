document_id: JDG.10,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Thola et Jaïr juges en Israël
  - type: text
    content: 'Après Abimélec, Thola, fils de Pua et petit-fils de Dodo, membre de la tribu d''Issacar, se leva pour délivrer Israël. Il habitait à Shamir, dans la région montagneuse d''Ephraïm. '
  '10':
  - type: text
    content: 'Les Israélites crièrent à l''Eternel en disant: «Nous avons péché contre toi, car nous avons abandonné notre Dieu et nous avons servi les Baals.» '
  '11':
  - type: text
    content: 'L''Eternel dit aux Israélites: «Ne vous ai-je pas délivrés des Egyptiens, des Amoréens, des Ammonites, des Philistins? '
  '12':
  - type: text
    content: 'Lorsque les Sidoniens, les Amalécites et les Maonites vous ont opprimés et que vous avez crié à moi, ne vous ai-je pas délivrés de leurs mains? '
  '13':
  - type: text
    content: 'Mais vous, vous m''avez abandonné et vous avez servi d''autres dieux. C''est pourquoi je ne vous délivrerai plus. '
  '14':
  - type: text
    content: 'Allez crier vers les dieux que vous avez choisis. Qu''ils vous délivrent dans votre temps de détresse!» '
  '15':
  - type: text
    content: 'Les Israélites dirent à l''Eternel: «Nous avons péché. Traite-nous comme il te plaira. Seulement, nous t''en prions, délivre-nous aujourd''hui!» '
  '16':
  - type: text
    content: Ils enlevèrent les dieux étrangers du milieu d'eux et servirent l'Eternel, qui fut touché par la souffrance d'Israël.
  '17':
  - type: text
    content: 'Les Ammonites se rassemblèrent et installèrent leur camp en Galaad. De leur côté, les Israélites se rassemblèrent et installèrent leur camp à Mitspa. '
  '18':
  - type: text
    content: 'Le peuple et les chefs de Galaad se dirent l''un à l''autre: «Quel est l''homme qui commencera l''attaque contre les Ammonites? Il sera le chef de tous les habitants de Galaad.»'
  '2':
  - type: text
    content: Il fut juge en Israël pendant 23 ans. Puis il mourut et fut enterré à Shamir.
  '3':
  - type: text
    content: 'Après lui se leva Jaïr, le Galaadite, qui fut juge en Israël pendant 22 ans. '
  '4':
  - type: text
    content: 'Il avait 30 fils, qui montaient sur 30 ânons et qui possédaient 30 villes, appelées aujourd''hui encore «bourgs de Jaïr» et situées dans le pays de Galaad. '
  '5':
  - type: text
    content: Puis Jaïr mourut et fut enterré à Kamon.
  - type: heading
    content: Intervention de Jephthé
  '6':
  - type: text
    content: 'Les Israélites firent encore ce qui déplaît à l''Eternel. Ils servirent les Baals et les Astartés, les dieux de la Syrie, de Sidon, de Moab, des Ammonites et des Philistins; ils abandonnèrent l''Eternel et ne le servirent plus. '
  '7':
  - type: text
    content: 'La colère de l''Eternel s''enflamma contre Israël et il les vendit aux Philistins et aux Ammonites. '
  '8':
  - type: text
    content: 'Ils opprimèrent et écrasèrent les Israélites cette année-là, et ils opprimèrent pendant 18 ans tous les Israélites qui étaient installés de l''autre côté du Jourdain, dans le pays des Amoréens, en Galaad. '
  '9':
  - type: text
    content: Les Ammonites passèrent le Jourdain pour combattre aussi contre Juda, contre Benjamin et contre la communauté d'Ephraïm. Israël fut dans une grande détresse.
