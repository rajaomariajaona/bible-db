document_id: LUK.21,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: 'Jésus leva les yeux et vit les riches qui mettaient leurs offrandes dans le tronc. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis il leur dit: «'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Une nation se dressera contre une nation et un royaume contre un royaume
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Une nation… contre un royaume: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'renvoi à '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Esaïe 19.2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'il y aura de grands tremblements de terre en divers endroits, ainsi que des pestes et des famines; il y aura des phénomènes terrifiants et de grands signes dans le ciel. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais, avant tout cela, on mettra la main sur vous et l''on vous persécutera, on vous livrera aux synagogues, on vous jettera en prison, on vous traînera devant des rois et devant des gouverneurs à cause de mon nom. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cela vous donnera une occasion de témoignage. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mettez-vous donc dans l''esprit de ne pas préparer votre défense, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'car je vous donnerai des paroles et une sagesse telles qu''aucun de vos adversaires ne pourra s''y opposer ni les contredire. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous serez trahis même par vos parents, par vos frères, par vos proches et par vos amis, et l''on fera mourir plusieurs d''entre vous. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous serez détestés de tous à cause de mon nom, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mais pas un seul cheveu de votre tête ne sera perdu. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Par votre persévérance vous sauverez votre âme.
  '2':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: 'Il vit aussi une pauvre veuve, qui y mettait deux petites pièces. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Lorsque vous verrez Jérusalem encerclée par des armées, sachez que sa destruction est proche. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors, que ceux qui seront en Judée s''enfuient dans les montagnes, que ceux qui seront à l''intérieur de Jérusalem en sortent et que ceux qui seront dans les champs n''entrent pas dans la ville, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'car ce seront des jours de vengeance, où s''accomplira tout ce qui est écrit. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Malheur aux femmes qui seront enceintes et à celles qui allaiteront durant ces jours-là, car il y aura une grande détresse dans le pays et de la colère contre ce peuple. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils tomberont sous le tranchant de l'épée, ils seront emmenés prisonniers dans toutes les nations et Jérusalem sera piétinée par des non-Juifs jusqu'à ce que la période accordée aux nations prenne fin.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Il y aura des signes dans le soleil, dans la lune et dans les étoiles. Et sur la terre, les nations seront dans l''angoisse, épouvantées par le bruit de la mer et des vagues. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Des hommes rendront l''âme de terreur dans l''attente de ce qui surviendra sur la terre, car les puissances célestes seront ébranlées. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors on verra '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: le Fils de l'homme venir sur une nuée
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.27 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le Fils… nuée: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Daniel 7.13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' avec beaucoup de puissance et de gloire. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Quand ces événements commenceront à se produire, redressez-vous et relevez la tête, parce que votre délivrance est proche.»
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis il leur dit une parabole: «Regardez le figuier et tous les autres arbres. '
  '3':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: 'Alors il dit: «Je vous le dis en vérité, cette pauvre veuve a mis plus que tous les autres, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dès qu''ils bourgeonnent, vous savez de vous-mêmes que déjà l''été est proche. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De même, quand vous verrez ces choses arriver, sachez que le royaume de Dieu est proche. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je vous le dis en vérité, cette génération ne passera pas avant que tout cela n''arrive. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le ciel et la terre disparaîtront, mais mes paroles ne disparaîtront pas. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Faites bien attention à vous-mêmes, de peur que votre cœur ne devienne insensible, au milieu des excès du manger et du boire et des soucis de la vie, et que ce jour ne fonde sur vous à l''improviste. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, il s''abattra comme un piège sur tous les habitants de la terre. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Restez donc en éveil, priez en tout temps, afin d'avoir la force d'échapper à tous ces événements à venir et de vous présenter debout devant le Fils de l'homme.»
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pendant la journée, Jésus enseignait dans le temple, et il allait passer la nuit à la colline appelée mont des Oliviers. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tout le peuple se rendait dès le matin vers lui dans le temple pour l'écouter.
  '4':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: car eux tous ont pris de leur superflu pour mettre des offrandes [à Dieu] dans le tronc, mais elle, elle a mis de son nécessaire, tout ce qu'elle avait pour vivre.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Discours sur le mont des Oliviers
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Comme quelques-uns parlaient du temple, qui était orné de belles pierres et d''objets apportés en offrandes, Jésus dit: '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Les jours viendront où il ne restera pas pierre sur pierre de ce que vous voyez, tout sera détruit.» '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils lui demandèrent: «Maître, quand donc cela arrivera-t-il et à quel signe reconnaîtra-t-on que ces événements vont se produire?»'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus répondit: «Faites bien attention à ne pas vous laisser égarer. En effet, beaucoup viendront sous mon nom en disant: ‘C''est moi’, et: ‘Le moment est arrivé.’ Ne les suivez [donc] pas. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Quand vous entendrez parler de guerres et de soulèvements, ne vous laissez pas effrayer, car il faut que ces choses arrivent d'abord. Cependant, ce ne sera pas encore la fin.»
