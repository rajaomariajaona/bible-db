document_id: LUK.21,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Jésus leva les yeux et vit les riches qui mettaient leurs offrandes dans le tronc. '
  '10':
  - type: text
    content: 'Puis il leur dit: «'
  - type: text
    content: Une nation se dressera contre une nation et un royaume contre un royaume
  - type: note
    content: 'Une nation… contre un royaume: renvoi à Esaïe 19.2.'
  - type: text
    content: '; '
  '11':
  - type: text
    content: 'il y aura de grands tremblements de terre en divers endroits, ainsi que des pestes et des famines; il y aura des phénomènes terrifiants et de grands signes dans le ciel. '
  '12':
  - type: text
    content: 'Mais, avant tout cela, on mettra la main sur vous et l''on vous persécutera, on vous livrera aux synagogues, on vous jettera en prison, on vous traînera devant des rois et devant des gouverneurs à cause de mon nom. '
  '13':
  - type: text
    content: 'Cela vous donnera une occasion de témoignage. '
  '14':
  - type: text
    content: 'Mettez-vous donc dans l''esprit de ne pas préparer votre défense, '
  '15':
  - type: text
    content: 'car je vous donnerai des paroles et une sagesse telles qu''aucun de vos adversaires ne pourra s''y opposer ni les contredire. '
  '16':
  - type: text
    content: 'Vous serez trahis même par vos parents, par vos frères, par vos proches et par vos amis, et l''on fera mourir plusieurs d''entre vous. '
  '17':
  - type: text
    content: 'Vous serez détestés de tous à cause de mon nom, '
  '18':
  - type: text
    content: 'mais pas un seul cheveu de votre tête ne sera perdu. '
  '19':
  - type: text
    content: Par votre persévérance vous sauverez votre âme.
  '2':
  - type: text
    content: 'Il vit aussi une pauvre veuve, qui y mettait deux petites pièces. '
  '20':
  - type: text
    content: '»Lorsque vous verrez Jérusalem encerclée par des armées, sachez que sa destruction est proche. '
  '21':
  - type: text
    content: 'Alors, que ceux qui seront en Judée s''enfuient dans les montagnes, que ceux qui seront à l''intérieur de Jérusalem en sortent et que ceux qui seront dans les champs n''entrent pas dans la ville, '
  '22':
  - type: text
    content: 'car ce seront des jours de vengeance, où s''accomplira tout ce qui est écrit. '
  '23':
  - type: text
    content: 'Malheur aux femmes qui seront enceintes et à celles qui allaiteront durant ces jours-là, car il y aura une grande détresse dans le pays et de la colère contre ce peuple. '
  '24':
  - type: text
    content: Ils tomberont sous le tranchant de l'épée, ils seront emmenés prisonniers dans toutes les nations et Jérusalem sera piétinée par des non-Juifs jusqu'à ce que la période accordée aux nations prenne fin.
  '25':
  - type: text
    content: '»Il y aura des signes dans le soleil, dans la lune et dans les étoiles. Et sur la terre, les nations seront dans l''angoisse, épouvantées par le bruit de la mer et des vagues. '
  '26':
  - type: text
    content: 'Des hommes rendront l''âme de terreur dans l''attente de ce qui surviendra sur la terre, car les puissances célestes seront ébranlées. '
  '27':
  - type: text
    content: 'Alors on verra '
  - type: text
    content: le Fils de l'homme venir sur une nuée
  - type: note
    content: 'Le Fils… nuée: citation de Daniel 7.13.'
  - type: text
    content: ' avec beaucoup de puissance et de gloire. '
  '28':
  - type: text
    content: Quand ces événements commenceront à se produire, redressez-vous et relevez la tête, parce que votre délivrance est proche.»
  '29':
  - type: text
    content: 'Puis il leur dit une parabole: «Regardez le figuier et tous les autres arbres. '
  '3':
  - type: text
    content: 'Alors il dit: «Je vous le dis en vérité, cette pauvre veuve a mis plus que tous les autres, '
  '30':
  - type: text
    content: 'Dès qu''ils bourgeonnent, vous savez de vous-mêmes que déjà l''été est proche. '
  '31':
  - type: text
    content: 'De même, quand vous verrez ces choses arriver, sachez que le royaume de Dieu est proche. '
  '32':
  - type: text
    content: 'Je vous le dis en vérité, cette génération ne passera pas avant que tout cela n''arrive. '
  '33':
  - type: text
    content: 'Le ciel et la terre disparaîtront, mais mes paroles ne disparaîtront pas. '
  '34':
  - type: text
    content: 'Faites bien attention à vous-mêmes, de peur que votre cœur ne devienne insensible, au milieu des excès du manger et du boire et des soucis de la vie, et que ce jour ne fonde sur vous à l''improviste. '
  '35':
  - type: text
    content: 'En effet, il s''abattra comme un piège sur tous les habitants de la terre. '
  '36':
  - type: text
    content: Restez donc en éveil, priez en tout temps, afin d'avoir la force d'échapper à tous ces événements à venir et de vous présenter debout devant le Fils de l'homme.»
  '37':
  - type: text
    content: 'Pendant la journée, Jésus enseignait dans le temple, et il allait passer la nuit à la colline appelée mont des Oliviers. '
  '38':
  - type: text
    content: Tout le peuple se rendait dès le matin vers lui dans le temple pour l'écouter.
  '4':
  - type: text
    content: car eux tous ont pris de leur superflu pour mettre des offrandes [à Dieu] dans le tronc, mais elle, elle a mis de son nécessaire, tout ce qu'elle avait pour vivre.»
  - type: heading
    content: Discours sur le mont des Oliviers
  '5':
  - type: text
    content: 'Comme quelques-uns parlaient du temple, qui était orné de belles pierres et d''objets apportés en offrandes, Jésus dit: '
  '6':
  - type: text
    content: '«Les jours viendront où il ne restera pas pierre sur pierre de ce que vous voyez, tout sera détruit.» '
  '7':
  - type: text
    content: 'Ils lui demandèrent: «Maître, quand donc cela arrivera-t-il et à quel signe reconnaîtra-t-on que ces événements vont se produire?»'
  '8':
  - type: text
    content: 'Jésus répondit: «Faites bien attention à ne pas vous laisser égarer. En effet, beaucoup viendront sous mon nom en disant: ‘C''est moi’, et: ‘Le moment est arrivé.’ Ne les suivez [donc] pas. '
  '9':
  - type: text
    content: Quand vous entendrez parler de guerres et de soulèvements, ne vous laissez pas effrayer, car il faut que ces choses arrivent d'abord. Cependant, ce ne sera pas encore la fin.»
