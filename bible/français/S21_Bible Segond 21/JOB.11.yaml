document_id: JOB.11,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Intervention n° 1 de Tsophar
  - type: text
    content: 'Tsophar de Naama prit la parole et dit:'
  '10':
  - type: text
    content: S'il passe, s'il emprisonne,
  - type: text
    content: s'il convoque à son tribunal, qui s'y opposera?
  '11':
  - type: text
    content: En effet, il discerne les hommes faux,
  - type: text
    content: il voit l'injustice sans même y prêter attention.
  '12':
  - type: text
    content: En revanche, l'homme à la tête creuse aura de l'intelligence
  - type: text
    content: quand le petit d'un âne sauvage naîtra comme un être humain.
  '13':
  - type: text
    content: »Quant à toi, si tu changes d'attitude, si tu tends tes mains vers Dieu,
  '14':
  - type: text
    content: si tu éloignes l'injustice de ta façon de faire,
  - type: text
    content: si tu ne laisses pas le crime habiter sous tes tentes,
  '15':
  - type: text
    content: alors tu pourras lever un front dépourvu de tache,
  - type: text
    content: tu seras ferme et sans peur.
  '16':
  - type: text
    content: Tu oublieras tes souffrances,
  - type: text
    content: tu ne t'en souviendras pas plus que de l'eau qui s'est écoulée.
  '17':
  - type: text
    content: Ton existence aura plus d'éclat que le soleil en plein midi,
  - type: text
    content: tes ténèbres seront pareilles à la lumière du matin,
  '18':
  - type: text
    content: tu reprendras confiance, parce qu'il y aura de l'espoir.
  - type: text
    content: Tu regarderas autour de toi, et tu te coucheras en sécurité.
  '19':
  - type: text
    content: Tu t'allongeras sans personne pour t'inquiéter
  - type: text
    content: et beaucoup rechercheront ta faveur.
  '2':
  - type: text
    content: «Cette foule de paroles ne trouvera-t-elle pas de réponse
  - type: text
    content: et suffira-t-il de savoir parler pour avoir raison?
  '20':
  - type: text
    content: »En revanche, les yeux des méchants s'épuiseront
  - type: text
    content: à chercher sans succès un refuge.
  - type: text
    content: Pouvoir rendre l'âme, voilà quelle est leur espérance!»
  '3':
  - type: text
    content: Tes bavardages feront-ils taire les hommes?
  - type: text
    content: Te moqueras-tu sans que personne ne puisse te confondre?
  '4':
  - type: text
    content: '»Tu affirmes: ‘Ma manière de voir est indiscutable'
  - type: text
    content: et je suis pur à tes yeux.’
  '5':
  - type: text
    content: Si seulement Dieu voulait parler,
  - type: text
    content: s'il ouvrait la bouche pour te répondre
  '6':
  - type: text
    content: et te révélait les secrets de sa sagesse
  - type: text
    content: qui dépassent de loin notre compréhension,
  - type: text
    content: tu verrais alors que Dieu oublie, à ton avantage, une partie de ta faute.
  '7':
  - type: text
    content: »Prétends-tu pénétrer les profondeurs de la pensée de Dieu?
  - type: text
    content: Prétends-tu découvrir ce qui touche à la perfection du Tout-Puissant?
  '8':
  - type: text
    content: 'Elle est aussi haute que le ciel: comment t''y prendras-tu?'
  - type: text
    content: 'Elle est plus profonde que le séjour des morts: que pourras-tu en savoir?'
  '9':
  - type: text
    content: Ses dimensions sont plus longues que la terre
  - type: text
    content: et plus larges que la mer.
