document_id: JOB.11
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Intervention n° 1 de Tsophar
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tsophar de Naama prit la parole et dit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: «Cette foule de paroles ne trouvera-t-elle pas de réponse
- type: usfm
  marker: q1
  children:
  - type: text
    text: et suffira-t-il de savoir parler pour avoir raison?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tes bavardages feront-ils taire les hommes?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Te moqueras-tu sans que personne ne puisse te confondre?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '»Tu affirmes: ‘Ma manière de voir est indiscutable'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je suis pur à tes yeux.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Si seulement Dieu voulait parler,
- type: usfm
  marker: q1
  children:
  - type: text
    text: s'il ouvrait la bouche pour te répondre
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: et te révélait les secrets de sa sagesse
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui dépassent de loin notre compréhension,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu verrais alors que Dieu oublie, à ton avantage, une partie de ta faute.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: »Prétends-tu pénétrer les profondeurs de la pensée de Dieu?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Prétends-tu découvrir ce qui touche à la perfection du Tout-Puissant?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Elle est aussi haute que le ciel: comment t''y prendras-tu?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Elle est plus profonde que le séjour des morts: que pourras-tu en savoir?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ses dimensions sont plus longues que la terre
- type: usfm
  marker: q1
  children:
  - type: text
    text: et plus larges que la mer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: S'il passe, s'il emprisonne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: s'il convoque à son tribunal, qui s'y opposera?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: En effet, il discerne les hommes faux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il voit l'injustice sans même y prêter attention.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: En revanche, l'homme à la tête creuse aura de l'intelligence
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand le petit d'un âne sauvage naîtra comme un être humain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: »Quant à toi, si tu changes d'attitude, si tu tends tes mains vers Dieu,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: si tu éloignes l'injustice de ta façon de faire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si tu ne laisses pas le crime habiter sous tes tentes,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: alors tu pourras lever un front dépourvu de tache,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu seras ferme et sans peur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Tu oublieras tes souffrances,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu ne t'en souviendras pas plus que de l'eau qui s'est écoulée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ton existence aura plus d'éclat que le soleil en plein midi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tes ténèbres seront pareilles à la lumière du matin,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: tu reprendras confiance, parce qu'il y aura de l'espoir.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu regarderas autour de toi, et tu te coucheras en sécurité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tu t'allongeras sans personne pour t'inquiéter
- type: usfm
  marker: q1
  children:
  - type: text
    text: et beaucoup rechercheront ta faveur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: »En revanche, les yeux des méchants s'épuiseront
- type: usfm
  marker: q1
  children:
  - type: text
    text: à chercher sans succès un refuge.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pouvoir rendre l'âme, voilà quelle est leur espérance!»
