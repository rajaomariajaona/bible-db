document_id: DEU.18
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les droits des Lévites et des prêtres
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '»Les prêtres, les Lévites, toute la tribu de Lévi, n''auront ni part ni héritage avec Israël. Ils se nourriront des sacrifices passés par le feu en l''honneur de l''Eternel et de la part qui lui revient. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ils n''auront pas d''héritage au milieu de leurs frères. C''est l''Eternel qui sera leur héritage, comme il le leur a dit. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Voici la part à laquelle les prêtres auront droit sur le peuple, sur ceux qui offriront un sacrifice, un bœuf ou un agneau: on donnera au prêtre la cuisse, les mâchoires et l''estomac. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tu lui donneras la première partie de ton blé, de ton vin nouveau et de ton huile, ainsi que de la toison de tes brebis. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: En effet, c'est lui que l'Eternel, ton Dieu, a choisi entre toutes tes tribus pour faire toujours le service au nom de l'Eternel, lui et ses descendants.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '»Lorsque, de son plein gré, un Lévite quittera l''une de tes villes, l''endroit où il habite en Israël, pour se rendre à l''endroit que l''Eternel choisira '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'et y faire le service au nom de l''Eternel, ton Dieu, comme tous ses frères les Lévites qui se tiennent là devant l''Eternel, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: il recevra pour sa nourriture une portion égale à la leur. Il jouira, de plus, des revenus que lui aura procurés la vente de son patrimoine.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les prophètes et non la divination
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '»Lorsque tu seras entré dans le pays que l''Eternel, ton Dieu, te donne, tu n''apprendras pas à imiter les pratiques abominables de ces nations-là. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Qu''on ne trouve chez toi personne qui fasse passer son fils ou sa fille par le feu, personne qui exerce le métier de devin, d''astrologue, d''augure, de sorcier, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'de magicien, personne qui consulte les esprits ou les spirites, personne qui interroge les morts. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'En effet, celui qui fait cela fait horreur à l''Eternel et c''est à cause de ces pratiques abominables que l''Eternel, ton Dieu, va chasser ces nations devant toi. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tu seras tout entier à l''Eternel, ton Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: En effet, les nations que tu vas chasser écoutent les astrologues et les devins, mais à toi, l'Eternel, ton Dieu, ne le permet pas.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '»*L''Eternel, ton Dieu, fera surgir pour toi et du milieu de toi, parmi tes frères, un prophète comme moi: c''est lui que vous devrez écouter.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'L''Eternel… écouter: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Actes 3.22
      metadata:
        usfm: ACT.3.22
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '7.37'
      metadata:
        usfm: ACT.7.37
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il répondra ainsi à la demande que tu as faite à l''Eternel, ton Dieu, à Horeb, le jour de l''assemblée. Tu disais: ‘Je ne veux plus entendre la voix de l''Eternel, mon Dieu, ni voir ce grand feu, afin de ne pas mourir.’ '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'L''Eternel m''a dit: ‘Ce qu''ils ont dit est bien. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Je ferai surgir pour eux, du milieu de leurs frères, un prophète comme toi. Je mettrai mes paroles dans sa bouche et il leur dira tout ce que je lui ordonnerai. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '*Si quelqu''un n''écoute pas mes paroles, celles qu''il dira en mon nom, c''est moi qui lui en demanderai compte.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Si quelqu''un… compte: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'évoqué en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Actes 3.23
      metadata:
        usfm: ACT.3.23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Mais si un prophète a l''arrogance de dire en mon nom une parole que je ne lui ai pas ordonné de dire ou parle au nom d''autres dieux, il sera puni de mort.’ '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Peut-être diras-tu dans ton cœur: ‘Comment reconnaîtrons-nous la parole que l''Eternel n''aura pas dite?’ '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Quand ce que dira le prophète n'aura pas lieu et n'arrivera pas, ce sera une parole que l'Eternel n'aura pas dite. C'est par arrogance que le prophète l'aura dite. N'aie pas peur de lui.
