document_id: DEU.18,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Les droits des Lévites et des prêtres
  - type: text
    content: '»Les prêtres, les Lévites, toute la tribu de Lévi, n''auront ni part ni héritage avec Israël. Ils se nourriront des sacrifices passés par le feu en l''honneur de l''Eternel et de la part qui lui revient. '
  '10':
  - type: text
    content: 'Qu''on ne trouve chez toi personne qui fasse passer son fils ou sa fille par le feu, personne qui exerce le métier de devin, d''astrologue, d''augure, de sorcier, '
  '11':
  - type: text
    content: 'de magicien, personne qui consulte les esprits ou les spirites, personne qui interroge les morts. '
  '12':
  - type: text
    content: 'En effet, celui qui fait cela fait horreur à l''Eternel et c''est à cause de ces pratiques abominables que l''Eternel, ton Dieu, va chasser ces nations devant toi. '
  '13':
  - type: text
    content: 'Tu seras tout entier à l''Eternel, ton Dieu. '
  '14':
  - type: text
    content: En effet, les nations que tu vas chasser écoutent les astrologues et les devins, mais à toi, l'Eternel, ton Dieu, ne le permet pas.
  '15':
  - type: text
    content: '»*L''Eternel, ton Dieu, fera surgir pour toi et du milieu de toi, parmi tes frères, un prophète comme moi: c''est lui que vous devrez écouter.'
  - type: note
    content: 'L''Eternel… écouter: cité en Actes 3.22; 7.37.'
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'Il répondra ainsi à la demande que tu as faite à l''Eternel, ton Dieu, à Horeb, le jour de l''assemblée. Tu disais: ‘Je ne veux plus entendre la voix de l''Eternel, mon Dieu, ni voir ce grand feu, afin de ne pas mourir.’ '
  '17':
  - type: text
    content: 'L''Eternel m''a dit: ‘Ce qu''ils ont dit est bien. '
  '18':
  - type: text
    content: 'Je ferai surgir pour eux, du milieu de leurs frères, un prophète comme toi. Je mettrai mes paroles dans sa bouche et il leur dira tout ce que je lui ordonnerai. '
  '19':
  - type: text
    content: '*Si quelqu''un n''écoute pas mes paroles, celles qu''il dira en mon nom, c''est moi qui lui en demanderai compte.'
  - type: note
    content: 'Si quelqu''un… compte: évoqué en Actes 3.23.'
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Ils n''auront pas d''héritage au milieu de leurs frères. C''est l''Eternel qui sera leur héritage, comme il le leur a dit. '
  '20':
  - type: text
    content: 'Mais si un prophète a l''arrogance de dire en mon nom une parole que je ne lui ai pas ordonné de dire ou parle au nom d''autres dieux, il sera puni de mort.’ '
  '21':
  - type: text
    content: 'Peut-être diras-tu dans ton cœur: ‘Comment reconnaîtrons-nous la parole que l''Eternel n''aura pas dite?’ '
  '22':
  - type: text
    content: Quand ce que dira le prophète n'aura pas lieu et n'arrivera pas, ce sera une parole que l'Eternel n'aura pas dite. C'est par arrogance que le prophète l'aura dite. N'aie pas peur de lui.
  '3':
  - type: text
    content: 'Voici la part à laquelle les prêtres auront droit sur le peuple, sur ceux qui offriront un sacrifice, un bœuf ou un agneau: on donnera au prêtre la cuisse, les mâchoires et l''estomac. '
  '4':
  - type: text
    content: 'Tu lui donneras la première partie de ton blé, de ton vin nouveau et de ton huile, ainsi que de la toison de tes brebis. '
  '5':
  - type: text
    content: En effet, c'est lui que l'Eternel, ton Dieu, a choisi entre toutes tes tribus pour faire toujours le service au nom de l'Eternel, lui et ses descendants.
  '6':
  - type: text
    content: '»Lorsque, de son plein gré, un Lévite quittera l''une de tes villes, l''endroit où il habite en Israël, pour se rendre à l''endroit que l''Eternel choisira '
  '7':
  - type: text
    content: 'et y faire le service au nom de l''Eternel, ton Dieu, comme tous ses frères les Lévites qui se tiennent là devant l''Eternel, '
  '8':
  - type: text
    content: il recevra pour sa nourriture une portion égale à la leur. Il jouira, de plus, des revenus que lui aura procurés la vente de son patrimoine.
  - type: heading
    content: Les prophètes et non la divination
  '9':
  - type: text
    content: '»Lorsque tu seras entré dans le pays que l''Eternel, ton Dieu, te donne, tu n''apprendras pas à imiter les pratiques abominables de ces nations-là. '
