document_id: EXO.4
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Moïse répondit: «Ils ne me croiront pas et ne m''écouteront pas. Au contraire, ils diront: ‘L''Eternel ne t''est pas apparu.’» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'L''Eternel lui dit: «Qu''y a-t-il dans ta main?» Il répondit: «Un bâton.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'L''Eternel dit: «Jette-le par terre.» Il le jeta par terre et le bâton se changea en serpent. Moïse prit la fuite devant lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'L''Eternel dit à Moïse: «Tends la main et prends-le par la queue.» Il tendit la main et l''attrapa. Le serpent redevint alors un bâton dans sa main. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'L''Eternel dit: «Voilà ce que tu feras afin qu''ils croient que l''Eternel, le Dieu de leurs ancêtres, t''est apparu, le Dieu d''Abraham, le Dieu d''Isaac et le Dieu de Jacob.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'L''Eternel lui dit encore: «Mets ta main sur ta poitrine.» Il mit sa main sur sa poitrine, puis la retira, et voici que sa main était couverte de lèpre, blanche comme la neige. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'L''Eternel dit: «Remets ta main sur ta poitrine.» Il remit sa main sur sa poitrine, puis l''en retira, et voici qu''elle était redevenue normale. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'L''Eternel dit: «S''ils ne te croient pas et n''écoutent pas le message du premier signe, ils croiront à celui du dernier signe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: S'ils ne croient toujours pas, même avec ces deux signes, et ne t'écoutent pas, tu prendras de l'eau du fleuve, tu la verseras sur la terre et l'eau que tu auras prise dans le fleuve se changera en sang sur la terre.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Moïse dit à l''Eternel: «Ah, Seigneur, je ne suis pas un homme doué pour parler et cela ne date ni d''hier ni d''avant-hier, ni même du moment où tu as parlé à ton serviteur. En effet, j''ai la bouche et la langue embarrassées.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'L''Eternel lui dit: «Qui a donné une bouche à l''homme? Qui rend muet ou sourd, capable de voir ou aveugle? N''est-ce pas moi, l''Eternel? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Maintenant, vas-y! Je serai moi-même avec ta bouche et je t'enseignerai ce que tu devras dire.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Moïse dit: «Ah, Seigneur, envoie quelqu''un d''autre que moi!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Alors la colère de l''Eternel s''enflamma contre Moïse. Il dit: «N''y a-t-il pas ton frère Aaron, le Lévite? Je sais qu''il parlera facilement, lui. Le voici même qui vient à ta rencontre. Quand il te verra, il se réjouira dans son cœur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tu lui parleras et tu mettras les paroles dans sa bouche, et moi, je serai avec ta bouche et avec sa bouche et je vous enseignerai ce que vous devrez faire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'C''est lui qui parlera pour toi au peuple: il te servira de bouche et toi, tu tiendras pour lui la place de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Prends ce bâton dans ta main. C'est avec lui que tu accompliras les signes.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Moïse s'en alla. De retour chez son beau-père Jéthro
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Jéthro: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'appelé Réuel en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '2.18'
      metadata:
        usfm: EXO.2.18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', il lui dit: «Laisse-moi retourner vers mes frères'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Frères: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: au sens de compatriotes.
    marker-yv: yv-n
  - type: text
    text: ' qui sont en Egypte pour voir s''ils sont encore en vie.» Jéthro dit à Moïse: «Vas-y en toute tranquillité.»'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Retour de Moïse en Egypte
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'L''Eternel dit à Moïse dans le pays de Madian: «Vas-y, retourne en Egypte, car tous ceux qui en voulaient à ta vie sont morts.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Moïse prit sa femme et ses fils, les fit monter sur des ânes et retourna en Egypte. Il prit à la main le bâton de Dieu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.20 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le bâton de Dieu: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: voir les versets 2-4.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'L''Eternel dit à Moïse: «En partant pour retourner en Egypte, vois tous les prodiges que j''ai mis dans ta main: tu les feras devant le pharaon. De mon côté, j''endurcirai son cœur et il ne laissera pas partir le peuple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Tu annonceras au pharaon: ‘Voici ce que dit l''Eternel: Israël est mon fils aîné. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Je t'ordonne de laisser partir mon fils pour qu'il me serve. Si tu refuses de le laisser partir, je ferai mourir ton fils aîné.’»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Pendant le voyage, à l''endroit où ils passaient la nuit, l''Eternel l''attaqua et chercha à le faire mourir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Séphora prit une pierre tranchante, coupa le prépuce de son fils et le jeta aux pieds de Moïse en disant: «Tu es pour moi un mari de sang!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Alors l''Eternel le laissa. C''est à ce moment-là qu''elle dit: «Mari de sang!» à cause de la circoncision'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.26 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'La circoncision: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: cette opération consistant à enlever le prépuce avait été ordonnée par Dieu à Abraham comme signe de son alliance avec lui et avec ses descendants.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'L''Eternel dit à Aaron: «Va dans le désert à la rencontre de Moïse.» Aaron partit. Il rencontra Moïse à la montagne de Dieu et l''embrassa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Moïse informa Aaron de toutes les paroles de l''Eternel, celui qui l''avait envoyé, et de tous les signes qu''il lui avait ordonné d''accomplir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Moïse et Aaron poursuivirent leur chemin et rassemblèrent tous les anciens des Israélites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Aaron rapporta toutes les paroles que l''Eternel avait dites à Moïse et accomplit les signes sous les yeux du peuple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Le peuple crut. Ils apprirent que l'Eternel s'occupait des Israélites, qu'il avait vu leur souffrance, et ils se prosternèrent et adorèrent.
