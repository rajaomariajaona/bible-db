document_id: EXO.4,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Moïse répondit: «Ils ne me croiront pas et ne m''écouteront pas. Au contraire, ils diront: ‘L''Eternel ne t''est pas apparu.’» '
  '10':
  - type: text
    content: 'Moïse dit à l''Eternel: «Ah, Seigneur, je ne suis pas un homme doué pour parler et cela ne date ni d''hier ni d''avant-hier, ni même du moment où tu as parlé à ton serviteur. En effet, j''ai la bouche et la langue embarrassées.» '
  '11':
  - type: text
    content: 'L''Eternel lui dit: «Qui a donné une bouche à l''homme? Qui rend muet ou sourd, capable de voir ou aveugle? N''est-ce pas moi, l''Eternel? '
  '12':
  - type: text
    content: Maintenant, vas-y! Je serai moi-même avec ta bouche et je t'enseignerai ce que tu devras dire.»
  '13':
  - type: text
    content: 'Moïse dit: «Ah, Seigneur, envoie quelqu''un d''autre que moi!» '
  '14':
  - type: text
    content: 'Alors la colère de l''Eternel s''enflamma contre Moïse. Il dit: «N''y a-t-il pas ton frère Aaron, le Lévite? Je sais qu''il parlera facilement, lui. Le voici même qui vient à ta rencontre. Quand il te verra, il se réjouira dans son cœur. '
  '15':
  - type: text
    content: 'Tu lui parleras et tu mettras les paroles dans sa bouche, et moi, je serai avec ta bouche et avec sa bouche et je vous enseignerai ce que vous devrez faire. '
  '16':
  - type: text
    content: 'C''est lui qui parlera pour toi au peuple: il te servira de bouche et toi, tu tiendras pour lui la place de Dieu. '
  '17':
  - type: text
    content: Prends ce bâton dans ta main. C'est avec lui que tu accompliras les signes.»
  '18':
  - type: text
    content: Moïse s'en alla. De retour chez son beau-père Jéthro
  - type: note
    content: 'Jéthro: appelé Réuel en 2.18.'
  - type: text
    content: ', il lui dit: «Laisse-moi retourner vers mes frères'
  - type: note
    content: 'Frères: au sens de compatriotes.'
  - type: text
    content: ' qui sont en Egypte pour voir s''ils sont encore en vie.» Jéthro dit à Moïse: «Vas-y en toute tranquillité.»'
  - type: heading
    content: Retour de Moïse en Egypte
  '19':
  - type: text
    content: 'L''Eternel dit à Moïse dans le pays de Madian: «Vas-y, retourne en Egypte, car tous ceux qui en voulaient à ta vie sont morts.» '
  '2':
  - type: text
    content: 'L''Eternel lui dit: «Qu''y a-t-il dans ta main?» Il répondit: «Un bâton.» '
  '20':
  - type: text
    content: Moïse prit sa femme et ses fils, les fit monter sur des ânes et retourna en Egypte. Il prit à la main le bâton de Dieu
  - type: note
    content: 'Le bâton de Dieu: voir les versets 2-4.'
  - type: text
    content: '. '
  '21':
  - type: text
    content: 'L''Eternel dit à Moïse: «En partant pour retourner en Egypte, vois tous les prodiges que j''ai mis dans ta main: tu les feras devant le pharaon. De mon côté, j''endurcirai son cœur et il ne laissera pas partir le peuple. '
  '22':
  - type: text
    content: 'Tu annonceras au pharaon: ‘Voici ce que dit l''Eternel: Israël est mon fils aîné. '
  '23':
  - type: text
    content: Je t'ordonne de laisser partir mon fils pour qu'il me serve. Si tu refuses de le laisser partir, je ferai mourir ton fils aîné.’»
  '24':
  - type: text
    content: 'Pendant le voyage, à l''endroit où ils passaient la nuit, l''Eternel l''attaqua et chercha à le faire mourir. '
  '25':
  - type: text
    content: 'Séphora prit une pierre tranchante, coupa le prépuce de son fils et le jeta aux pieds de Moïse en disant: «Tu es pour moi un mari de sang!» '
  '26':
  - type: text
    content: 'Alors l''Eternel le laissa. C''est à ce moment-là qu''elle dit: «Mari de sang!» à cause de la circoncision'
  - type: note
    content: 'La circoncision: cette opération consistant à enlever le prépuce avait été ordonnée par Dieu à Abraham comme signe de son alliance avec lui et avec ses descendants.'
  - type: text
    content: .
  '27':
  - type: text
    content: 'L''Eternel dit à Aaron: «Va dans le désert à la rencontre de Moïse.» Aaron partit. Il rencontra Moïse à la montagne de Dieu et l''embrassa. '
  '28':
  - type: text
    content: 'Moïse informa Aaron de toutes les paroles de l''Eternel, celui qui l''avait envoyé, et de tous les signes qu''il lui avait ordonné d''accomplir. '
  '29':
  - type: text
    content: 'Moïse et Aaron poursuivirent leur chemin et rassemblèrent tous les anciens des Israélites. '
  '3':
  - type: text
    content: 'L''Eternel dit: «Jette-le par terre.» Il le jeta par terre et le bâton se changea en serpent. Moïse prit la fuite devant lui. '
  '30':
  - type: text
    content: 'Aaron rapporta toutes les paroles que l''Eternel avait dites à Moïse et accomplit les signes sous les yeux du peuple. '
  '31':
  - type: text
    content: Le peuple crut. Ils apprirent que l'Eternel s'occupait des Israélites, qu'il avait vu leur souffrance, et ils se prosternèrent et adorèrent.
  '4':
  - type: text
    content: 'L''Eternel dit à Moïse: «Tends la main et prends-le par la queue.» Il tendit la main et l''attrapa. Le serpent redevint alors un bâton dans sa main. '
  '5':
  - type: text
    content: 'L''Eternel dit: «Voilà ce que tu feras afin qu''ils croient que l''Eternel, le Dieu de leurs ancêtres, t''est apparu, le Dieu d''Abraham, le Dieu d''Isaac et le Dieu de Jacob.»'
  '6':
  - type: text
    content: 'L''Eternel lui dit encore: «Mets ta main sur ta poitrine.» Il mit sa main sur sa poitrine, puis la retira, et voici que sa main était couverte de lèpre, blanche comme la neige. '
  '7':
  - type: text
    content: 'L''Eternel dit: «Remets ta main sur ta poitrine.» Il remit sa main sur sa poitrine, puis l''en retira, et voici qu''elle était redevenue normale. '
  '8':
  - type: text
    content: 'L''Eternel dit: «S''ils ne te croient pas et n''écoutent pas le message du premier signe, ils croiront à celui du dernier signe. '
  '9':
  - type: text
    content: S'ils ne croient toujours pas, même avec ces deux signes, et ne t'écoutent pas, tu prendras de l'eau du fleuve, tu la verseras sur la terre et l'eau que tu auras prise dans le fleuve se changera en sang sur la terre.»
