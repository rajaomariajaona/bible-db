document_id: PSA.78
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fidélité de Dieu au cours de l'histoire d'Israël
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Cantique d'Asaph.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon peuple, écoute mes instructions!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Prête l'oreille aux paroles de ma bouche!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '*J''ouvre la bouche pour parler en paraboles,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: j'annonce la sagesse du passé.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '78.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'J''ouvre… passé: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matthieu 13.35
      metadata:
        usfm: MAT.13.35
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ce que nous avons entendu, ce que nous savons,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ce que nos pères nous ont raconté,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: nous ne le cacherons pas à leurs enfants;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nous redirons à la génération future les louanges de l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sa puissance et les merveilles qu'il a accomplies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Il a établi un témoignage en Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a mis une loi en Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il a ordonné à nos ancêtres de l'enseigner à leurs enfants
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: pour que la génération future,
- type: usfm
  marker: q1
  children:
  - type: text
    text: celle des enfants à naître, la connaisse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que, devenus grands, ils en parlent à leurs enfants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ainsi, ils mettraient leur confiance en Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils n'oublieraient pas la manière d'agir de Dieu
- type: usfm
  marker: q1
  children:
  - type: text
    text: et respecteraient ses commandements.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ainsi, ils ne seraient pas comme leurs ancêtres:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: une génération désobéissante et rebelle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: une génération dont le cœur était inconstant
- type: usfm
  marker: q1
  children:
  - type: text
    text: et dont l'esprit n'était pas fidèle à Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Les hommes d'Ephraïm, armés de leur arc,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ont tourné le dos, le jour du combat.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ils n'ont pas gardé l'alliance de Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils ont refusé de se conformer à sa loi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ils ont oublié ses actes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les merveilles qu'il leur avait fait voir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Devant leurs ancêtres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il avait fait des miracles en Egypte, dans les campagnes de Tsoan
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '78.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tsoan: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ou Tanis, ville d'Egypte à l'est du delta du Nil.
    marker-yv: yv-n
  - type: text
    text: ':'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: il avait fendu la mer pour les faire passer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il avait dressé l'eau comme une muraille.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Il les avait guidés le jour par la nuée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et toute la nuit par un feu éclatant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Il avait fendu des rochers dans le désert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il leur avait donné à boire en abondance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Du rocher il avait fait jaillir des sources
- type: usfm
  marker: q1
  children:
  - type: text
    text: et couler de l'eau, comme des fleuves.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Mais ils ont continué à pécher contre lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à se révolter contre le Très-Haut dans le désert.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ils ont provoqué Dieu dans leur cœur
- type: usfm
  marker: q1
  children:
  - type: text
    text: en demandant de la nourriture à leur goût.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ils ont parlé contre Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ils ont dit: «Dieu pourrait-il'
- type: usfm
  marker: q1
  children:
  - type: text
    text: dresser une table dans le désert?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Voici, il a frappé le rocher et l'eau a coulé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: des torrents se sont déversés.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourra-t-il aussi donner du pain
- type: usfm
  marker: q1
  children:
  - type: text
    text: ou fournir de la viande à son peuple?»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: L'Eternel a entendu cela, et il a été irrité;
- type: usfm
  marker: q1
  children:
  - type: text
    text: un feu s'est allumé contre Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la colère a éclaté contre Israël
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: parce qu'ils n'ont pas cru en Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce qu'ils n'ont pas eu confiance dans son secours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Il a donné ses ordres aux nuages d'en haut,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il a ouvert les portes du ciel;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: il a fait pleuvoir sur eux de la manne comme nourriture,
- type: usfm
  marker: q1
  children:
  - type: text
    text: '*il leur a donné le pain du ciel'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '78.24 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Il leur… du ciel: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jean 6.31
      metadata:
        usfm: JHN.6.31
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' par les adversaires de Jésus pour réclamer un miracle de sa part.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ils ont tous mangé ce pain des grands,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il leur a envoyé de la nourriture à satiété.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Il a fait souffler dans le ciel le vent d'est,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il a amené par sa puissance le vent du sud.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Il a fait pleuvoir sur eux la viande comme de la poussière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les oiseaux ailés comme le sable de la mer;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: il les a fait tomber au milieu de leur camp,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tout autour de leurs tentes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ils ont mangé et ont été pleinement rassasiés:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dieu leur a donné ce qu'ils avaient désiré.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Mais ils n'avaient pas encore assouvi leur désir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils avaient encore la nourriture dans la bouche,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'quand la colère de Dieu a éclaté contre eux:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a fait mourir les plus vigoureux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a abattu les jeunes hommes d'Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Malgré tout cela, ils ont continué à pécher
- type: usfm
  marker: q1
  children:
  - type: text
    text: et n'ont pas cru à ses merveilles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Il a mis un terme à leurs jours d'un seul souffle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à leurs années par une fin soudaine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Quand il les frappait de mort, ils le cherchaient,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils revenaient à Dieu, ils se tournaient vers lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Ils se souvenaient que Dieu était leur rocher,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que le Dieu très-haut était celui qui les rachetait.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Cependant, ils le trompaient de la bouche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils lui mentaient de la langue.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Leur cœur ne lui était pas fermement attaché
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils n'étaient pas fidèles à son alliance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Pourtant lui, dans sa compassion, il pardonne la faute et ne détruit pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il retient souvent sa colère et ne s'abandonne pas à toute sa fureur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Il s'est souvenu qu'ils n'étaient que des créatures,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un souffle qui s'en va et ne revient pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Que de fois ils se sont révoltés contre lui dans le désert!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que de fois ils l'ont irrité dans les lieux arides!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Ainsi, ils ont recommencé à provoquer Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à attrister le Saint d'Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Ils ne se sont pas souvenus de sa puissance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: du jour où il les avait délivrés de l'ennemi,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: des miracles qu'il avait accomplis en Egypte
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et de ses prodiges dans les campagnes de Tsoan:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: il avait changé leurs fleuves en sang,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils n'avaient pu en boire l'eau.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Il avait envoyé contre eux des mouches venimeuses qui les dévoraient
- type: usfm
  marker: q1
  children:
  - type: text
    text: et des grenouilles qui leur apportaient la dévastation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Il avait livré leurs récoltes aux criquets,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le produit de leur travail aux sauterelles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Il avait détruit leurs vignes par la grêle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et leurs sycomores par la gelée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: Il avait abandonné leur bétail à la grêle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et leurs troupeaux à la foudre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Il avait lâché contre eux son ardente colère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la fureur, la rage et la détresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: une troupe d'anges de malheur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Il avait donné libre cours à sa colère:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il ne les avait pas sauvés de la mort,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il avait livré leur vie à la peste.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: Il avait frappé tous les premiers-nés de l'Egypte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ceux qui étaient les aînés des enfants sous les tentes de Cham
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '78.51 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Cham: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: désignation de l'Egypte.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: Il avait fait partir son peuple comme des brebis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il les avait conduits comme un troupeau dans le désert.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: Il les avait guidés en toute sécurité, pour qu'ils soient sans crainte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la mer avait recouvert leurs ennemis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: Il les avait amenés sur son saint territoire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: jusqu'à la montagne que sa main droite avait conquise.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: Il avait chassé des nations devant eux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: leur avait distribué le pays en héritage
- type: usfm
  marker: q1
  children:
  - type: text
    text: et avait fait habiter les tribus d'Israël dans les tentes de ces peuples.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: Mais ils ont provoqué le Dieu très-haut et se sont révoltés contre lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils n'ont pas respecté ses instructions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: Ils se sont éloignés et ont été infidèles comme leurs ancêtres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils se sont retournés comme un arc trompeur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: Ils l'ont irrité par leurs hauts lieux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils ont excité sa jalousie par leurs idoles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: Dieu a entendu cela, et il a été irrité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a durement rejeté Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: Il a abandonné la demeure de Silo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la tente où il habitait parmi les hommes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: Il a livré sa puissance à l'exil,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sa parure entre les mains de l'ennemi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: Il a livré son peuple à l'épée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'il s''est irrité contre son héritage:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: le feu a dévoré ses jeunes gens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ses vierges n'ont plus été célébrées;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: ses prêtres sont tombés par l'épée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ses veuves n'ont pas pleuré leurs morts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: Le Seigneur s'est éveillé comme un homme qui a dormi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme un héros ragaillardi par le vin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: Il a frappé ses adversaires et les a fait reculer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il les a couverts d'une honte éternelle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: Il a rejeté la tente de Joseph,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il n'a pas choisi la tribu d'Ephraïm,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: text
    text: mais il a choisi la tribu de Juda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le mont Sion qu'il aimait.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '69'
  - type: text
    text: Il y a construit son sanctuaire, solide comme les hauteurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme la terre qu'il a établie pour toujours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '70'
  - type: text
    text: Il a choisi David, son serviteur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l'a fait sortir des bergeries;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '71'
  - type: text
    text: il l'a pris derrière les brebis qui allaitent
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour faire de lui le berger de Jacob, son peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: d'Israël, son héritage.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '72'
  - type: text
    text: David les a dirigés avec un cœur intègre
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les a guidés avec des mains habiles.
