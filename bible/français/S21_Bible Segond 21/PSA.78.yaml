document_id: PSA.78,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Fidélité de Dieu au cours de l'histoire d'Israël
  - type: text
    content: Cantique d'Asaph.
  - type: text
    content: Mon peuple, écoute mes instructions!
  - type: text
    content: Prête l'oreille aux paroles de ma bouche!
  '10':
  - type: text
    content: Ils n'ont pas gardé l'alliance de Dieu,
  - type: text
    content: ils ont refusé de se conformer à sa loi.
  '11':
  - type: text
    content: Ils ont oublié ses actes,
  - type: text
    content: les merveilles qu'il leur avait fait voir.
  '12':
  - type: text
    content: Devant leurs ancêtres,
  - type: text
    content: il avait fait des miracles en Egypte, dans les campagnes de Tsoan
  - type: note
    content: 'Tsoan: ou Tanis, ville d''Egypte à l''est du delta du Nil.'
  - type: text
    content: ':'
  '13':
  - type: text
    content: il avait fendu la mer pour les faire passer,
  - type: text
    content: il avait dressé l'eau comme une muraille.
  '14':
  - type: text
    content: Il les avait guidés le jour par la nuée,
  - type: text
    content: et toute la nuit par un feu éclatant.
  '15':
  - type: text
    content: Il avait fendu des rochers dans le désert,
  - type: text
    content: et il leur avait donné à boire en abondance.
  '16':
  - type: text
    content: Du rocher il avait fait jaillir des sources
  - type: text
    content: et couler de l'eau, comme des fleuves.
  '17':
  - type: text
    content: Mais ils ont continué à pécher contre lui,
  - type: text
    content: à se révolter contre le Très-Haut dans le désert.
  '18':
  - type: text
    content: Ils ont provoqué Dieu dans leur cœur
  - type: text
    content: en demandant de la nourriture à leur goût.
  '19':
  - type: text
    content: Ils ont parlé contre Dieu,
  - type: text
    content: 'ils ont dit: «Dieu pourrait-il'
  - type: text
    content: dresser une table dans le désert?
  '2':
  - type: text
    content: '*J''ouvre la bouche pour parler en paraboles,'
  - type: text
    content: j'annonce la sagesse du passé.
  - type: note
    content: 'J''ouvre… passé: cité en Matthieu 13.35.'
  '20':
  - type: text
    content: Voici, il a frappé le rocher et l'eau a coulé,
  - type: text
    content: des torrents se sont déversés.
  - type: text
    content: Pourra-t-il aussi donner du pain
  - type: text
    content: ou fournir de la viande à son peuple?»
  '21':
  - type: text
    content: L'Eternel a entendu cela, et il a été irrité;
  - type: text
    content: un feu s'est allumé contre Jacob,
  - type: text
    content: et la colère a éclaté contre Israël
  '22':
  - type: text
    content: parce qu'ils n'ont pas cru en Dieu,
  - type: text
    content: parce qu'ils n'ont pas eu confiance dans son secours.
  '23':
  - type: text
    content: Il a donné ses ordres aux nuages d'en haut,
  - type: text
    content: et il a ouvert les portes du ciel;
  '24':
  - type: text
    content: il a fait pleuvoir sur eux de la manne comme nourriture,
  - type: text
    content: '*il leur a donné le pain du ciel'
  - type: note
    content: 'Il leur… du ciel: cité en Jean 6.31 par les adversaires de Jésus pour réclamer un miracle de sa part.'
  - type: text
    content: .
  '25':
  - type: text
    content: Ils ont tous mangé ce pain des grands,
  - type: text
    content: il leur a envoyé de la nourriture à satiété.
  '26':
  - type: text
    content: Il a fait souffler dans le ciel le vent d'est,
  - type: text
    content: et il a amené par sa puissance le vent du sud.
  '27':
  - type: text
    content: Il a fait pleuvoir sur eux la viande comme de la poussière,
  - type: text
    content: et les oiseaux ailés comme le sable de la mer;
  '28':
  - type: text
    content: il les a fait tomber au milieu de leur camp,
  - type: text
    content: tout autour de leurs tentes.
  '29':
  - type: text
    content: 'Ils ont mangé et ont été pleinement rassasiés:'
  - type: text
    content: Dieu leur a donné ce qu'ils avaient désiré.
  '3':
  - type: text
    content: Ce que nous avons entendu, ce que nous savons,
  - type: text
    content: ce que nos pères nous ont raconté,
  '30':
  - type: text
    content: Mais ils n'avaient pas encore assouvi leur désir,
  - type: text
    content: ils avaient encore la nourriture dans la bouche,
  '31':
  - type: text
    content: 'quand la colère de Dieu a éclaté contre eux:'
  - type: text
    content: il a fait mourir les plus vigoureux,
  - type: text
    content: il a abattu les jeunes hommes d'Israël.
  '32':
  - type: text
    content: Malgré tout cela, ils ont continué à pécher
  - type: text
    content: et n'ont pas cru à ses merveilles.
  '33':
  - type: text
    content: Il a mis un terme à leurs jours d'un seul souffle,
  - type: text
    content: à leurs années par une fin soudaine.
  '34':
  - type: text
    content: Quand il les frappait de mort, ils le cherchaient,
  - type: text
    content: ils revenaient à Dieu, ils se tournaient vers lui.
  '35':
  - type: text
    content: Ils se souvenaient que Dieu était leur rocher,
  - type: text
    content: que le Dieu très-haut était celui qui les rachetait.
  '36':
  - type: text
    content: Cependant, ils le trompaient de la bouche,
  - type: text
    content: ils lui mentaient de la langue.
  '37':
  - type: text
    content: Leur cœur ne lui était pas fermement attaché
  - type: text
    content: et ils n'étaient pas fidèles à son alliance.
  '38':
  - type: text
    content: Pourtant lui, dans sa compassion, il pardonne la faute et ne détruit pas,
  - type: text
    content: il retient souvent sa colère et ne s'abandonne pas à toute sa fureur.
  '39':
  - type: text
    content: Il s'est souvenu qu'ils n'étaient que des créatures,
  - type: text
    content: un souffle qui s'en va et ne revient pas.
  '4':
  - type: text
    content: nous ne le cacherons pas à leurs enfants;
  - type: text
    content: nous redirons à la génération future les louanges de l'Eternel,
  - type: text
    content: sa puissance et les merveilles qu'il a accomplies.
  '40':
  - type: text
    content: Que de fois ils se sont révoltés contre lui dans le désert!
  - type: text
    content: Que de fois ils l'ont irrité dans les lieux arides!
  '41':
  - type: text
    content: Ainsi, ils ont recommencé à provoquer Dieu,
  - type: text
    content: à attrister le Saint d'Israël.
  '42':
  - type: text
    content: Ils ne se sont pas souvenus de sa puissance,
  - type: text
    content: du jour où il les avait délivrés de l'ennemi,
  '43':
  - type: text
    content: des miracles qu'il avait accomplis en Egypte
  - type: text
    content: 'et de ses prodiges dans les campagnes de Tsoan:'
  '44':
  - type: text
    content: il avait changé leurs fleuves en sang,
  - type: text
    content: et ils n'avaient pu en boire l'eau.
  '45':
  - type: text
    content: Il avait envoyé contre eux des mouches venimeuses qui les dévoraient
  - type: text
    content: et des grenouilles qui leur apportaient la dévastation.
  '46':
  - type: text
    content: Il avait livré leurs récoltes aux criquets,
  - type: text
    content: le produit de leur travail aux sauterelles.
  '47':
  - type: text
    content: Il avait détruit leurs vignes par la grêle,
  - type: text
    content: et leurs sycomores par la gelée.
  '48':
  - type: text
    content: Il avait abandonné leur bétail à la grêle,
  - type: text
    content: et leurs troupeaux à la foudre.
  '49':
  - type: text
    content: Il avait lâché contre eux son ardente colère,
  - type: text
    content: la fureur, la rage et la détresse,
  - type: text
    content: une troupe d'anges de malheur.
  '5':
  - type: text
    content: Il a établi un témoignage en Jacob,
  - type: text
    content: il a mis une loi en Israël,
  - type: text
    content: et il a ordonné à nos ancêtres de l'enseigner à leurs enfants
  '50':
  - type: text
    content: 'Il avait donné libre cours à sa colère:'
  - type: text
    content: il ne les avait pas sauvés de la mort,
  - type: text
    content: il avait livré leur vie à la peste.
  '51':
  - type: text
    content: Il avait frappé tous les premiers-nés de l'Egypte,
  - type: text
    content: ceux qui étaient les aînés des enfants sous les tentes de Cham
  - type: note
    content: 'Cham: désignation de l''Egypte.'
  - type: text
    content: .
  '52':
  - type: text
    content: Il avait fait partir son peuple comme des brebis,
  - type: text
    content: il les avait conduits comme un troupeau dans le désert.
  '53':
  - type: text
    content: Il les avait guidés en toute sécurité, pour qu'ils soient sans crainte,
  - type: text
    content: et la mer avait recouvert leurs ennemis.
  '54':
  - type: text
    content: Il les avait amenés sur son saint territoire,
  - type: text
    content: jusqu'à la montagne que sa main droite avait conquise.
  '55':
  - type: text
    content: Il avait chassé des nations devant eux,
  - type: text
    content: leur avait distribué le pays en héritage
  - type: text
    content: et avait fait habiter les tribus d'Israël dans les tentes de ces peuples.
  '56':
  - type: text
    content: Mais ils ont provoqué le Dieu très-haut et se sont révoltés contre lui,
  - type: text
    content: ils n'ont pas respecté ses instructions.
  '57':
  - type: text
    content: Ils se sont éloignés et ont été infidèles comme leurs ancêtres,
  - type: text
    content: ils se sont retournés comme un arc trompeur.
  '58':
  - type: text
    content: Ils l'ont irrité par leurs hauts lieux,
  - type: text
    content: ils ont excité sa jalousie par leurs idoles.
  '59':
  - type: text
    content: Dieu a entendu cela, et il a été irrité,
  - type: text
    content: il a durement rejeté Israël.
  '6':
  - type: text
    content: pour que la génération future,
  - type: text
    content: celle des enfants à naître, la connaisse,
  - type: text
    content: et que, devenus grands, ils en parlent à leurs enfants.
  '60':
  - type: text
    content: Il a abandonné la demeure de Silo,
  - type: text
    content: la tente où il habitait parmi les hommes.
  '61':
  - type: text
    content: Il a livré sa puissance à l'exil,
  - type: text
    content: et sa parure entre les mains de l'ennemi.
  '62':
  - type: text
    content: Il a livré son peuple à l'épée,
  - type: text
    content: 'il s''est irrité contre son héritage:'
  '63':
  - type: text
    content: le feu a dévoré ses jeunes gens,
  - type: text
    content: et ses vierges n'ont plus été célébrées;
  '64':
  - type: text
    content: ses prêtres sont tombés par l'épée,
  - type: text
    content: et ses veuves n'ont pas pleuré leurs morts.
  '65':
  - type: text
    content: Le Seigneur s'est éveillé comme un homme qui a dormi,
  - type: text
    content: comme un héros ragaillardi par le vin.
  '66':
  - type: text
    content: Il a frappé ses adversaires et les a fait reculer,
  - type: text
    content: il les a couverts d'une honte éternelle.
  '67':
  - type: text
    content: Il a rejeté la tente de Joseph,
  - type: text
    content: il n'a pas choisi la tribu d'Ephraïm,
  '68':
  - type: text
    content: mais il a choisi la tribu de Juda,
  - type: text
    content: le mont Sion qu'il aimait.
  '69':
  - type: text
    content: Il y a construit son sanctuaire, solide comme les hauteurs,
  - type: text
    content: comme la terre qu'il a établie pour toujours.
  '7':
  - type: text
    content: Ainsi, ils mettraient leur confiance en Dieu,
  - type: text
    content: ils n'oublieraient pas la manière d'agir de Dieu
  - type: text
    content: et respecteraient ses commandements.
  '70':
  - type: text
    content: Il a choisi David, son serviteur,
  - type: text
    content: et l'a fait sortir des bergeries;
  '71':
  - type: text
    content: il l'a pris derrière les brebis qui allaitent
  - type: text
    content: pour faire de lui le berger de Jacob, son peuple,
  - type: text
    content: d'Israël, son héritage.
  '72':
  - type: text
    content: David les a dirigés avec un cœur intègre
  - type: text
    content: et les a guidés avec des mains habiles.
  '8':
  - type: text
    content: 'Ainsi, ils ne seraient pas comme leurs ancêtres:'
  - type: text
    content: une génération désobéissante et rebelle,
  - type: text
    content: une génération dont le cœur était inconstant
  - type: text
    content: et dont l'esprit n'était pas fidèle à Dieu.
  '9':
  - type: text
    content: Les hommes d'Ephraïm, armés de leur arc,
  - type: text
    content: ont tourné le dos, le jour du combat.
