document_id: JOB.40,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Incapacité de Job à répondre
  - type: text
    content: 'L''Eternel reprit la parole et dit à Job:'
  '10':
  - type: text
    content: Pare-toi donc de fierté et de prestige,
  - type: text
    content: habille-toi de majesté et de splendeur!
  '11':
  - type: text
    content: Déverse le trop-plein de ta colère
  - type: text
    content: et d'un regard abaisse ceux qui font les fiers!
  '12':
  - type: text
    content: D'un regard humilie tous les fiers,
  - type: text
    content: écrase sur place les méchants,
  '13':
  - type: text
    content: cache-les tous ensemble dans la poussière,
  - type: text
    content: enferme-les dans un endroit caché!
  '14':
  - type: text
    content: Alors moi-même je te rendrai hommage
  - type: text
    content: parce que le salut te sera venu de toi-même.
  '15':
  - type: text
    content: »Vois l'animal par excellence
  - type: note
    content: 'L''animal par excellence: en hébreu behémot, littéralement les bêtes, souvent identifié à l''hippopotame.'
  - type: text
    content: ' que j''ai créé, tout comme toi!'
  - type: text
    content: Il mange de l'herbe comme un bœuf.
  '16':
  - type: text
    content: 'Vois: sa force est dans ses reins'
  - type: text
    content: et sa vigueur dans les muscles de son ventre.
  '17':
  - type: text
    content: Il raidit sa queue comme un cèdre.
  - type: text
    content: Les nerfs de ses cuisses sont entrelacés.
  '18':
  - type: text
    content: Ses os sont des tubes de bronze,
  - type: text
    content: ses membres sont pareils à des barres de fer.
  '19':
  - type: text
    content: Il est le chef-d’œuvre de Dieu.
  - type: text
    content: Celui qui l'a fait l'a pourvu d'une épée.
  '2':
  - type: text
    content: «Le faiseur de reproches va-t-il faire un procès au Tout-Puissant?
  - type: text
    content: Celui qui veut corriger Dieu va-t-il répliquer?»
  '20':
  - type: text
    content: Il trouve sa nourriture dans les montagnes,
  - type: text
    content: là où jouent toutes les bêtes sauvages.
  '21':
  - type: text
    content: Il se couche sous les lotus,
  - type: text
    content: il se cache dans les roseaux et les marécages.
  '22':
  - type: text
    content: Les lotus le couvrent de leur ombre,
  - type: text
    content: les saules de la rivière l'environnent.
  '23':
  - type: text
    content: Si le fleuve devient violent, il ne s'alarme pas;
  - type: text
    content: si le Jourdain se précipite contre sa gueule, il reste confiant.
  '24':
  - type: text
    content: Est-ce quand il a les yeux ouverts qu'on pourra l'attraper?
  - type: text
    content: Utilisera-t-on des pièges pour lui transpercer le nez?
  '25':
  - type: text
    content: »Prendras-tu le léviathan
  - type: note
    content: 'Léviathan: voir la note 3.8.'
  - type: text
    content: ' à l''hameçon?'
  - type: text
    content: Lui attacheras-tu la gueule avec une corde?
  '26':
  - type: text
    content: Mettras-tu une baguette dans ses narines?
  - type: text
    content: Lui transperceras-tu la mâchoire avec un crochet?
  '27':
  - type: text
    content: T'adressera-t-il de nombreuses supplications?
  - type: text
    content: Te parlera-t-il d'une voix douce?
  '28':
  - type: text
    content: Conclura-t-il une alliance avec toi?
  - type: text
    content: Pourras-tu le prendre comme esclave pour toujours?
  '29':
  - type: text
    content: Joueras-tu avec lui comme avec un oiseau?
  - type: text
    content: L'attacheras-tu pour amuser tes filles?
  '3':
  - type: text
    content: 'Job répondit à l''Eternel:'
  '30':
  - type: text
    content: Des pêcheurs en feront-ils le commerce?
  - type: text
    content: Le partagera-t-on entre marchands?
  '31':
  - type: text
    content: Cribleras-tu sa peau de flèches
  - type: text
    content: et sa tête de harpons?
  '32':
  - type: text
    content: Pose la main sur lui! Tu te souviendras ensuite du combat
  - type: text
    content: et tu ne recommenceras plus!
  '4':
  - type: text
    content: «Je ne fais pas le poids. Que pourrais-je te répondre?
  - type: text
    content: 'Je mets la main sur ma bouche:'
  '5':
  - type: text
    content: j'ai parlé une fois, mais je ne répliquerai plus,
  - type: text
    content: et même deux, mais je n'ajouterai rien.»
  - type: heading
    content: Les animaux monstrueux
  '6':
  - type: text
    content: 'L''Eternel répondit encore à Job du milieu de la tempête et dit:'
  '7':
  - type: text
    content: «Mets donc une ceinture autour de ta taille comme un vaillant homme!
  - type: text
    content: Je t'interrogerai et tu me renseigneras.
  '8':
  - type: text
    content: Voudrais-tu vraiment casser mon jugement?
  - type: text
    content: Voudrais-tu me condamner pour te donner raison?
  '9':
  - type: text
    content: As-tu un bras pareil à celui de Dieu,
  - type: text
    content: une voix tonnante comme la sienne?
