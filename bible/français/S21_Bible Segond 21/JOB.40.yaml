document_id: JOB.40
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Incapacité de Job à répondre
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L''Eternel reprit la parole et dit à Job:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: «Le faiseur de reproches va-t-il faire un procès au Tout-Puissant?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celui qui veut corriger Dieu va-t-il répliquer?»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Job répondit à l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: «Je ne fais pas le poids. Que pourrais-je te répondre?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Je mets la main sur ma bouche:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: j'ai parlé une fois, mais je ne répliquerai plus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et même deux, mais je n'ajouterai rien.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les animaux monstrueux
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'L''Eternel répondit encore à Job du milieu de la tempête et dit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: «Mets donc une ceinture autour de ta taille comme un vaillant homme!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je t'interrogerai et tu me renseigneras.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Voudrais-tu vraiment casser mon jugement?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voudrais-tu me condamner pour te donner raison?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: As-tu un bras pareil à celui de Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: une voix tonnante comme la sienne?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Pare-toi donc de fierté et de prestige,
- type: usfm
  marker: q1
  children:
  - type: text
    text: habille-toi de majesté et de splendeur!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Déverse le trop-plein de ta colère
- type: usfm
  marker: q1
  children:
  - type: text
    text: et d'un regard abaisse ceux qui font les fiers!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: D'un regard humilie tous les fiers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: écrase sur place les méchants,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: cache-les tous ensemble dans la poussière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: enferme-les dans un endroit caché!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Alors moi-même je te rendrai hommage
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce que le salut te sera venu de toi-même.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: »Vois l'animal par excellence
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'L''animal par excellence: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: en hébreu behémot, littéralement les bêtes, souvent identifié à l'hippopotame.
    marker-yv: yv-n
  - type: text
    text: ' que j''ai créé, tout comme toi!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il mange de l'herbe comme un bœuf.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Vois: sa force est dans ses reins'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sa vigueur dans les muscles de son ventre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Il raidit sa queue comme un cèdre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les nerfs de ses cuisses sont entrelacés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ses os sont des tubes de bronze,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ses membres sont pareils à des barres de fer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Il est le chef-d’œuvre de Dieu.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celui qui l'a fait l'a pourvu d'une épée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Il trouve sa nourriture dans les montagnes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: là où jouent toutes les bêtes sauvages.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Il se couche sous les lotus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il se cache dans les roseaux et les marécages.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Les lotus le couvrent de leur ombre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les saules de la rivière l'environnent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Si le fleuve devient violent, il ne s'alarme pas;
- type: usfm
  marker: q1
  children:
  - type: text
    text: si le Jourdain se précipite contre sa gueule, il reste confiant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Est-ce quand il a les yeux ouverts qu'on pourra l'attraper?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Utilisera-t-on des pièges pour lui transpercer le nez?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: »Prendras-tu le léviathan
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40.25 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Léviathan: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'voir la note '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '3.8'
      metadata:
        usfm: JOB.3.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' à l''hameçon?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lui attacheras-tu la gueule avec une corde?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Mettras-tu une baguette dans ses narines?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lui transperceras-tu la mâchoire avec un crochet?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: T'adressera-t-il de nombreuses supplications?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Te parlera-t-il d'une voix douce?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Conclura-t-il une alliance avec toi?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourras-tu le prendre comme esclave pour toujours?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Joueras-tu avec lui comme avec un oiseau?
- type: usfm
  marker: q1
  children:
  - type: text
    text: L'attacheras-tu pour amuser tes filles?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Des pêcheurs en feront-ils le commerce?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le partagera-t-on entre marchands?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Cribleras-tu sa peau de flèches
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sa tête de harpons?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Pose la main sur lui! Tu te souviendras ensuite du combat
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu ne recommenceras plus!
