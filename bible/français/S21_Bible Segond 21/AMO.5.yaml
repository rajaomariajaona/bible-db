document_id: AMO.5
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Appel à revenir à Dieu
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ecoutez cette parole,
- type: usfm
  marker: q1
  children:
  - type: text
    text: cette complainte que je prononce sur vous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'communauté d''Israël:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Elle est tombée, elle ne se relèvera plus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la vierge d'Israël;
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle est couchée par terre
- type: usfm
  marker: q1
  children:
  - type: text
    text: et personne ne la relève.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Oui, voici ce que dit le Seigneur, l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: La ville qui mettait en campagne 1000 hommes
- type: usfm
  marker: q1
  children:
  - type: text
    text: n'en conservera que 100,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et celle qui mettait en campagne 100 hommes
- type: usfm
  marker: q1
  children:
  - type: text
    text: n'en conservera que 10 pour la communauté d'Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'En effet, voici ce que dit l''Eternel à la communauté d''Israël:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cherchez-moi, et vous vivrez!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ne cherchez pas Béthel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: n'allez pas à Guilgal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne passez pas à Beer-Shéba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car Guilgal sera exilée
- type: usfm
  marker: q1
  children:
  - type: text
    text: et Béthel deviendra une ruine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Cherchez l'Eternel, et vous vivrez!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sinon, il fondra comme le feu sur la famille de Joseph
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Famille de Joseph: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: l'expression désigne habituellement les tribus issues de Joseph, à savoir Ephraïm et Manassé, et par extension le royaume du nord d'Israël.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: un feu qui la dévorera, sans personne à Béthel pour l'éteindre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ils changent le droit en absinthe
- type: usfm
  marker: q1
  children:
  - type: text
    text: et jettent la justice par terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Il a créé les Pléiades et Orion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il change les ténèbres en aurore,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il obscurcit le jour pour en faire la nuit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il appelle l'eau de la mer
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la verse à la surface de la terre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: L'Eternel est son nom.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Il fait venir la ruine sur les hommes forts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la ruine survient sur les forteresses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ils détestent celui qui les reprend à la porte de la ville
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: La porte de la ville était le lieu des délibérations, des affaires, du tribunal.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils ont en horreur celui qui parle sincèrement.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Vous avez exploité le faible
- type: usfm
  marker: q1
  children:
  - type: text
    text: et vous avez prélevé du blé sur sa récolte;
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous avez construit des maisons en pierres de taille,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais vous ne les habiterez pas;
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous avez planté d'excellentes vignes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais vous n'en boirez pas le vin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: En effet, je le sais, vos crimes sont nombreux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vos péchés se sont multipliés.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous opprimez le juste, vous recevez des pots-de-vin
- type: usfm
  marker: q1
  children:
  - type: text
    text: et vous violez le droit des pauvres à la porte de la ville.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Voilà pourquoi, en des temps comme ceux-ci, le sage se tait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: '*car ces temps sont mauvais'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Car… mauvais: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'même texte en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Michée 2.3
      metadata:
        usfm: MIC.2.3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ephésiens 5.16
      metadata:
        usfm: EPH.5.16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Recherchez le bien et non le mal, afin que vous viviez,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ainsi l'Eternel, le Dieu de l'univers, sera avec vous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme vous le dites.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Détestez le mal et aimez le bien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: faites régner la justice à la porte de la ville!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Peut-être que l'Eternel, le Dieu de l'univers, fera grâce
- type: usfm
  marker: q1
  children:
  - type: text
    text: au reste de Joseph.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'C''est pourquoi voici ce que dit l''Eternel, le Dieu de l''univers, le Seigneur:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sur toutes les places on se lamentera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dans toutes les rues on dira: «Quel malheur! Quel malheur!»'
- type: usfm
  marker: q1
  children:
  - type: text
    text: On appellera le laboureur à prendre le deuil,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ceux qui disent des complaintes à se lamenter.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Dans toutes les vignes on se lamentera
- type: usfm
  marker: q1
  children:
  - type: text
    text: lorsque je passerai au milieu de toi, dit l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Malheur à ceux qui désirent le jour de l'Eternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu'attendez-vous du jour de l'Eternel?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il sera ténèbres et non lumière.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Vous serez comme un homme qui fuit devant un lion
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et qu''un ours surprend:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il gagne sa maison, appuie sa main contre le mur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et un serpent le mord.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Le jour de l'Eternel n'est-il pas ténèbres et non lumière?
- type: usfm
  marker: q1
  children:
  - type: text
    text: N'est-il pas obscur et sans éclat?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Je déteste, je méprise vos fêtes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je ne peux pas sentir vos assemblées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Quand vous me présentez des holocaustes et des offrandes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je n'y prends aucun plaisir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les veaux engraissés que vous offrez en sacrifice de communion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je ne les regarde pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Eloigne de moi le bruit de tes cantiques:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: je n'écoute pas le son de tes luths.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Mais que le droit jaillisse comme un cours d'eau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la justice comme un torrent qui n'arrête jamais de couler!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '*M''avez-vous offert des sacrifices et des offrandes'
- type: usfm
  marker: q1
  children:
  - type: text
    text: pendant 40 ans au désert, communauté d'Israël?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Vous avez porté Sakkut, votre roi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et Kewan, vos idoles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'étoile de votre dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: celui que vous vous êtes fabriqué.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Je vous exilerai au-delà de Damas,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.25-27 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'M''avez-vous… Damas: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Actes 7.42-43
      metadata:
        usfm: ACT.7.42+ACT.7.43
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' avec remplacement de Damas par Babylone.'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: dit l'Eternel, dont le nom est le Dieu de l'univers.
