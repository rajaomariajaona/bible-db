document_id: AMO.5,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Appel à revenir à Dieu
  - type: text
    content: Ecoutez cette parole,
  - type: text
    content: cette complainte que je prononce sur vous,
  - type: text
    content: 'communauté d''Israël:'
  '10':
  - type: text
    content: Ils détestent celui qui les reprend à la porte de la ville
  - type: note
    content: La porte de la ville était le lieu des délibérations, des affaires, du tribunal.
  - type: text
    content: et ils ont en horreur celui qui parle sincèrement.
  '11':
  - type: text
    content: Vous avez exploité le faible
  - type: text
    content: et vous avez prélevé du blé sur sa récolte;
  - type: text
    content: vous avez construit des maisons en pierres de taille,
  - type: text
    content: mais vous ne les habiterez pas;
  - type: text
    content: vous avez planté d'excellentes vignes,
  - type: text
    content: mais vous n'en boirez pas le vin.
  '12':
  - type: text
    content: En effet, je le sais, vos crimes sont nombreux,
  - type: text
    content: vos péchés se sont multipliés.
  - type: text
    content: Vous opprimez le juste, vous recevez des pots-de-vin
  - type: text
    content: et vous violez le droit des pauvres à la porte de la ville.
  '13':
  - type: text
    content: Voilà pourquoi, en des temps comme ceux-ci, le sage se tait,
  - type: text
    content: '*car ces temps sont mauvais'
  - type: note
    content: 'Car… mauvais: même texte en Michée 2.3, cité en Ephésiens 5.16.'
  - type: text
    content: .
  '14':
  - type: text
    content: Recherchez le bien et non le mal, afin que vous viviez,
  - type: text
    content: et ainsi l'Eternel, le Dieu de l'univers, sera avec vous,
  - type: text
    content: comme vous le dites.
  '15':
  - type: text
    content: Détestez le mal et aimez le bien,
  - type: text
    content: faites régner la justice à la porte de la ville!
  - type: text
    content: Peut-être que l'Eternel, le Dieu de l'univers, fera grâce
  - type: text
    content: au reste de Joseph.
  '16':
  - type: text
    content: 'C''est pourquoi voici ce que dit l''Eternel, le Dieu de l''univers, le Seigneur:'
  - type: text
    content: Sur toutes les places on se lamentera,
  - type: text
    content: 'dans toutes les rues on dira: «Quel malheur! Quel malheur!»'
  - type: text
    content: On appellera le laboureur à prendre le deuil,
  - type: text
    content: et ceux qui disent des complaintes à se lamenter.
  '17':
  - type: text
    content: Dans toutes les vignes on se lamentera
  - type: text
    content: lorsque je passerai au milieu de toi, dit l'Eternel.
  '18':
  - type: text
    content: Malheur à ceux qui désirent le jour de l'Eternel!
  - type: text
    content: Qu'attendez-vous du jour de l'Eternel?
  - type: text
    content: Il sera ténèbres et non lumière.
  '19':
  - type: text
    content: Vous serez comme un homme qui fuit devant un lion
  - type: text
    content: 'et qu''un ours surprend:'
  - type: text
    content: il gagne sa maison, appuie sa main contre le mur,
  - type: text
    content: et un serpent le mord.
  '2':
  - type: text
    content: Elle est tombée, elle ne se relèvera plus,
  - type: text
    content: la vierge d'Israël;
  - type: text
    content: elle est couchée par terre
  - type: text
    content: et personne ne la relève.
  '20':
  - type: text
    content: Le jour de l'Eternel n'est-il pas ténèbres et non lumière?
  - type: text
    content: N'est-il pas obscur et sans éclat?
  '21':
  - type: text
    content: Je déteste, je méprise vos fêtes,
  - type: text
    content: je ne peux pas sentir vos assemblées.
  '22':
  - type: text
    content: Quand vous me présentez des holocaustes et des offrandes,
  - type: text
    content: je n'y prends aucun plaisir,
  - type: text
    content: et les veaux engraissés que vous offrez en sacrifice de communion,
  - type: text
    content: je ne les regarde pas.
  '23':
  - type: text
    content: 'Eloigne de moi le bruit de tes cantiques:'
  - type: text
    content: je n'écoute pas le son de tes luths.
  '24':
  - type: text
    content: Mais que le droit jaillisse comme un cours d'eau,
  - type: text
    content: et la justice comme un torrent qui n'arrête jamais de couler!
  '25':
  - type: text
    content: '*M''avez-vous offert des sacrifices et des offrandes'
  - type: text
    content: pendant 40 ans au désert, communauté d'Israël?
  '26':
  - type: text
    content: Vous avez porté Sakkut, votre roi,
  - type: text
    content: et Kewan, vos idoles,
  - type: text
    content: l'étoile de votre dieu,
  - type: text
    content: celui que vous vous êtes fabriqué.
  '27':
  - type: text
    content: Je vous exilerai au-delà de Damas,
  - type: note
    content: 'M''avez-vous… Damas: cité en Actes 7.42-43 avec remplacement de Damas par Babylone.'
  - type: text
    content: dit l'Eternel, dont le nom est le Dieu de l'univers.
  '3':
  - type: text
    content: 'Oui, voici ce que dit le Seigneur, l''Eternel:'
  - type: text
    content: La ville qui mettait en campagne 1000 hommes
  - type: text
    content: n'en conservera que 100,
  - type: text
    content: et celle qui mettait en campagne 100 hommes
  - type: text
    content: n'en conservera que 10 pour la communauté d'Israël.
  '4':
  - type: text
    content: 'En effet, voici ce que dit l''Eternel à la communauté d''Israël:'
  - type: text
    content: Cherchez-moi, et vous vivrez!
  '5':
  - type: text
    content: Ne cherchez pas Béthel,
  - type: text
    content: n'allez pas à Guilgal,
  - type: text
    content: ne passez pas à Beer-Shéba,
  - type: text
    content: car Guilgal sera exilée
  - type: text
    content: et Béthel deviendra une ruine.
  '6':
  - type: text
    content: Cherchez l'Eternel, et vous vivrez!
  - type: text
    content: Sinon, il fondra comme le feu sur la famille de Joseph
  - type: note
    content: 'Famille de Joseph: l''expression désigne habituellement les tribus issues de Joseph, à savoir Ephraïm et Manassé, et par extension le royaume du nord d''Israël.'
  - type: text
    content: ','
  - type: text
    content: un feu qui la dévorera, sans personne à Béthel pour l'éteindre.
  '7':
  - type: text
    content: Ils changent le droit en absinthe
  - type: text
    content: et jettent la justice par terre.
  '8':
  - type: text
    content: Il a créé les Pléiades et Orion,
  - type: text
    content: il change les ténèbres en aurore,
  - type: text
    content: il obscurcit le jour pour en faire la nuit,
  - type: text
    content: il appelle l'eau de la mer
  - type: text
    content: et la verse à la surface de la terre.
  - type: text
    content: L'Eternel est son nom.
  '9':
  - type: text
    content: Il fait venir la ruine sur les hommes forts,
  - type: text
    content: et la ruine survient sur les forteresses.
