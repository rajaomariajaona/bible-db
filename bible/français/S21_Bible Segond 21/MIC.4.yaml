document_id: MIC.4,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Promesse pour Jérusalem
  - type: text
    content: '*Il arrivera, dans l''avenir,'
  - type: text
    content: que la montagne de la maison de l'Eternel
  - type: text
    content: sera fondée au sommet des montagnes.
  - type: text
    content: Elle s'élèvera au-dessus des collines
  - type: text
    content: et des peuples y afflueront.
  '10':
  - type: text
    content: Fille de Sion, souffre et gémis comme une femme qui accouche,
  - type: text
    content: car maintenant tu sortiras de la ville, tu habiteras dans les champs
  - type: text
    content: et tu iras jusqu'à Babylone!
  - type: text
    content: Là tu seras délivrée,
  - type: text
    content: c'est là que l'Eternel te libérera
  - type: text
    content: du pouvoir de tes ennemis.
  '11':
  - type: text
    content: Maintenant de nombreuses nations se sont rassemblées contre toi.
  - type: text
    content: «Qu'elle soit souillée, disent-elles,
  - type: text
    content: et que nos yeux contemplent la ruine de Sion!»
  '12':
  - type: text
    content: Mais elles ne connaissent pas les pensées de l'Eternel,
  - type: text
    content: elles ne comprennent pas son intention,
  - type: text
    content: elles ignorent qu'il les a rassemblées comme des gerbes dans l'aire de battage.
  '13':
  - type: text
    content: Fille de Sion, lève-toi et foule le grain!
  - type: text
    content: Je te ferai une corne de fer et des sabots de bronze,
  - type: text
    content: et tu écraseras des peuples nombreux.
  - type: text
    content: Tu consacreras leurs biens à l'Eternel,
  - type: text
    content: leurs richesses au Seigneur de toute la terre.
  '14':
  - type: text
    content: Maintenant, ville de troupes, rassemble tes troupes!
  - type: text
    content: On nous assiège,
  - type: text
    content: à coups de bâton on frappe sur la joue le juge d'Israël.
  '2':
  - type: text
    content: 'Des nations s''y rendront en foule et diront:'
  - type: text
    content: «Venez, montons à la montagne de l'Eternel,
  - type: text
    content: à la maison du Dieu de Jacob!
  - type: text
    content: Il nous enseignera ses voies
  - type: text
    content: et nous marcherons dans ses sentiers.»
  - type: text
    content: En effet, c'est de Sion que sortira la loi,
  - type: text
    content: et de Jérusalem la parole de l'Eternel.
  '3':
  - type: text
    content: Il sera le juge d'un grand nombre de peuples,
  - type: text
    content: l'arbitre de nations puissantes, lointaines.
  - type: text
    content: Celles-ci mettront en pièces leurs épées pour en faire des socs de charrue,
  - type: text
    content: 'et leurs lances pour en faire des serpes:'
  - type: text
    content: aucune nation ne prendra plus les armes contre une autre
  - type: text
    content: et l'on n'apprendra plus à faire la guerre.
  - type: note
    content: 'Il arrivera… guerre: texte quasi identique en Esaïe 2.2-4.'
  '4':
  - type: text
    content: Ils habiteront chacun au milieu de ses vignes et de ses figuiers,
  - type: text
    content: et il n'y aura personne pour les troubler,
  - type: text
    content: car la bouche de l'Eternel, le maître de l'univers, a parlé.
  '5':
  - type: text
    content: Tous les peuples marchent, chacun au nom de son dieu,
  - type: text
    content: mais nous, nous marcherons au nom de l'Eternel, notre Dieu,
  - type: text
    content: pour toujours et à perpétuité.
  '6':
  - type: text
    content: Ce jour-là, déclare l'Eternel, je rassemblerai les boiteux,
  - type: text
    content: je réunirai ceux qui étaient chassés,
  - type: text
    content: ceux que j'avais maltraités.
  '7':
  - type: text
    content: Des boiteux je ferai un reste,
  - type: text
    content: de ceux qui étaient chassés une nation puissante.
  - type: text
    content: L'Eternel régnera sur eux depuis le mont Sion,
  - type: text
    content: dès ce moment et pour toujours.
  '8':
  - type: text
    content: Et toi, tour du troupeau, citadelle de Sion,
  - type: text
    content: à toi reviendra l'ancienne domination,
  - type: text
    content: la royauté qui appartenait à Jérusalem.
  - type: heading
    content: Déportation et délivrance d'Israël
  '9':
  - type: text
    content: Pourquoi maintenant pousses-tu des cris?
  - type: text
    content: N'as-tu pas de roi, plus de conseiller,
  - type: text
    content: pour que la douleur s'empare de toi comme d'une femme qui accouche?
