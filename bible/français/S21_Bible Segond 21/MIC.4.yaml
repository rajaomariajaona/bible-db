document_id: MIC.4
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Promesse pour Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '*Il arrivera, dans l''avenir,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: que la montagne de la maison de l'Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: sera fondée au sommet des montagnes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle s'élèvera au-dessus des collines
- type: usfm
  marker: q1
  children:
  - type: text
    text: et des peuples y afflueront.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Des nations s''y rendront en foule et diront:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Venez, montons à la montagne de l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à la maison du Dieu de Jacob!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il nous enseignera ses voies
- type: usfm
  marker: q1
  children:
  - type: text
    text: et nous marcherons dans ses sentiers.»
- type: usfm
  marker: q1
  children:
  - type: text
    text: En effet, c'est de Sion que sortira la loi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de Jérusalem la parole de l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Il sera le juge d'un grand nombre de peuples,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'arbitre de nations puissantes, lointaines.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celles-ci mettront en pièces leurs épées pour en faire des socs de charrue,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et leurs lances pour en faire des serpes:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: aucune nation ne prendra plus les armes contre une autre
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l'on n'apprendra plus à faire la guerre.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.1-3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Il arrivera… guerre: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'texte quasi identique en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Esaïe 2.2-4
      metadata:
        usfm: ISA.2.2+ISA.2.3+ISA.2.4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ils habiteront chacun au milieu de ses vignes et de ses figuiers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il n'y aura personne pour les troubler,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car la bouche de l'Eternel, le maître de l'univers, a parlé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tous les peuples marchent, chacun au nom de son dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais nous, nous marcherons au nom de l'Eternel, notre Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour toujours et à perpétuité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ce jour-là, déclare l'Eternel, je rassemblerai les boiteux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je réunirai ceux qui étaient chassés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ceux que j'avais maltraités.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Des boiteux je ferai un reste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de ceux qui étaient chassés une nation puissante.
- type: usfm
  marker: q1
  children:
  - type: text
    text: L'Eternel régnera sur eux depuis le mont Sion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dès ce moment et pour toujours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Et toi, tour du troupeau, citadelle de Sion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à toi reviendra l'ancienne domination,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la royauté qui appartenait à Jérusalem.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Déportation et délivrance d'Israël
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Pourquoi maintenant pousses-tu des cris?
- type: usfm
  marker: q1
  children:
  - type: text
    text: N'as-tu pas de roi, plus de conseiller,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour que la douleur s'empare de toi comme d'une femme qui accouche?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fille de Sion, souffre et gémis comme une femme qui accouche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car maintenant tu sortiras de la ville, tu habiteras dans les champs
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu iras jusqu'à Babylone!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Là tu seras délivrée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est là que l'Eternel te libérera
- type: usfm
  marker: q1
  children:
  - type: text
    text: du pouvoir de tes ennemis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Maintenant de nombreuses nations se sont rassemblées contre toi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Qu'elle soit souillée, disent-elles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que nos yeux contemplent la ruine de Sion!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mais elles ne connaissent pas les pensées de l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elles ne comprennent pas son intention,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elles ignorent qu'il les a rassemblées comme des gerbes dans l'aire de battage.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Fille de Sion, lève-toi et foule le grain!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je te ferai une corne de fer et des sabots de bronze,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu écraseras des peuples nombreux.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu consacreras leurs biens à l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: leurs richesses au Seigneur de toute la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Maintenant, ville de troupes, rassemble tes troupes!
- type: usfm
  marker: q1
  children:
  - type: text
    text: On nous assiège,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à coups de bâton on frappe sur la joue le juge d'Israël.
