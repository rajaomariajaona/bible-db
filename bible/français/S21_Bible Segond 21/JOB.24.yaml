document_id: JOB.24,152
type_code: fra
verses:
  '1':
  - type: text
    content: »Pourquoi le Tout-Puissant ne réserve-t-il pas des temps pour le jugement
  - type: text
    content: et pourquoi ceux qui le connaissent ne voient-ils pas les jours de son intervention?
  '10':
  - type: text
    content: Ils vont tout nus, sans habit.
  - type: text
    content: Ils doivent porter des gerbes tout en restant eux-mêmes affamés.
  '11':
  - type: text
    content: Ils font de l'huile dans les domaines des riches,
  - type: text
    content: ils écrasent le raisin au pressoir, et pourtant ils restent assoiffés.
  '12':
  - type: text
    content: De la ville montent les soupirs de la population,
  - type: text
    content: les blessés appellent au secours.
  - type: text
    content: Et Dieu ne prête pas attention à ces actes écœurants!
  '13':
  - type: text
    content: '»D''autres se révoltent contre la lumière:'
  - type: text
    content: ils ignorent ses voies,
  - type: text
    content: ils ne s'attachent pas à ses sentiers.
  '14':
  - type: text
    content: L'assassin se lève avec la lumière,
  - type: text
    content: il tue le malheureux et le pauvre,
  - type: text
    content: et pendant la nuit il se mue en voleur.
  '15':
  - type: text
    content: 'L''œil de l''homme adultère guette le crépuscule:'
  - type: text
    content: ‘Personne ne me verra’, se dit-il,
  - type: text
    content: et il met un voile sur son visage.
  '16':
  - type: text
    content: La nuit ils forcent les maisons,
  - type: text
    content: le jour ils se tiennent enfermés;
  - type: text
    content: ils ne connaissent pas la lumière.
  '17':
  - type: text
    content: 'C''est que pour eux tous, le matin est synonyme d''ombre de la mort:'
  - type: text
    content: ils n'ignorent pas les terreurs de l'ombre de la mort.
  '18':
  - type: text
    content: »Pourtant, d'après vous, le méchant serait tout léger à la surface de l'eau,
  - type: text
    content: il n'aurait droit sur la terre qu'à une part maudite
  - type: text
    content: et ne prendrait jamais le chemin des vignes!
  '19':
  - type: text
    content: Tout comme la sécheresse et la chaleur absorbent la fonte de la neige,
  - type: text
    content: le séjour des morts engloutirait ceux qui pèchent.
  '2':
  - type: text
    content: On déplace les bornes,
  - type: text
    content: on vole des troupeaux et on les conduit au pâturage,
  '20':
  - type: text
    content: Le ventre de sa mère oublierait l'homme injuste,
  - type: text
    content: les vers feraient leurs délices de lui.
  - type: text
    content: On ne se souviendrait plus de lui, il serait brisé comme un arbre,
  '21':
  - type: text
    content: lui qui dépouille la femme stérile, sans enfants,
  - type: text
    content: lui qui ne traite pas bien la veuve.
  '22':
  - type: text
    content: »Non! Dieu prolonge par sa force les jours des tyrans,
  - type: text
    content: et les voilà debout quand ils ne comptaient plus sur la vie.
  '23':
  - type: text
    content: Il leur permet de vivre en sécurité et ils en profitent,
  - type: text
    content: mais il surveille leur conduite.
  '24':
  - type: text
    content: Ils se sont élevés quelque temps,
  - type: text
    content: 'mais ils ne sont plus là:'
  - type: text
    content: ils s'effondrent et sont fauchés comme tous les autres,
  - type: text
    content: ils sont coupés comme la tête d'un épi.
  '25':
  - type: text
    content: Si tel n'est pas le cas, qui pourra prouver que je mens
  - type: text
    content: et réduire à néant mes affirmations?»
  '3':
  - type: text
    content: on s'empare de l'âne des orphelins,
  - type: text
    content: on prend pour gage le bœuf de la veuve,
  '4':
  - type: text
    content: on écarte les pauvres du chemin,
  - type: text
    content: on force tous les faibles du pays à se cacher.
  '5':
  - type: text
    content: Pareils à des ânes sauvages dans le désert,
  - type: text
    content: ils doivent partir au travail dès l'aube pour chercher leur nourriture,
  - type: text
    content: mais ils n'ont que des plaines arides pour trouver du pain à leurs enfants.
  '6':
  - type: text
    content: Ils coupent le fourrage qui reste dans les champs,
  - type: text
    content: ils grappillent dans la vigne du méchant.
  '7':
  - type: text
    content: Ils passent la nuit tout nus, sans habit,
  - type: text
    content: sans protection contre le froid.
  '8':
  - type: text
    content: Ils sont trempés par les fortes averses des montagnes
  - type: text
    content: et, faute de refuge, ils se blottissent contre les rochers.
  '9':
  - type: text
    content: On arrache l'orphelin à sa mère,
  - type: text
    content: on réclame des gages au pauvre.
