document_id: JDG.7,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Victoire de Gédéon sur les Madianites
  - type: text
    content: Jerubbaal, c'est-à-dire Gédéon, et tout le peuple qui était avec lui se levèrent de bon matin et installèrent leur camp près de la source de Harod. Le camp de Madian se trouvait au nord de Gédéon, vers la colline de Moré, dans la vallée.
  '10':
  - type: text
    content: 'Si tu as peur d''y descendre, vas-y avec ton serviteur Pura. '
  '11':
  - type: text
    content: 'Tu écouteras ce qu''ils diront et après cela tes mains seront fortifiées. Descends donc au camp.» Gédéon descendit avec son serviteur Pura jusqu''aux avant-postes du camp. '
  '12':
  - type: text
    content: 'Les Madianites, les Amalécites et tous les nomades de l''est étaient dispersés dans la vallée comme un essaim de sauterelles, et leurs chameaux étaient innombrables, comme le sable qui est au bord de la mer. '
  '13':
  - type: text
    content: 'Lorsque Gédéon arriva, un homme était en train de raconter un rêve à son camarade. Il disait: «J''ai fait un rêve. J''y voyais un gâteau de pain d''orge rouler dans le camp de Madian. Il est venu heurter la tente et elle est tombée. Il l''a retournée sens dessus dessous, elle a été démolie.» '
  '14':
  - type: text
    content: 'Son camarade répondit: «Ce n''est rien d''autre que l''épée de Gédéon, fils de Joas, l''Israélite. Dieu a livré entre ses mains Madian et tout le camp.»'
  '15':
  - type: text
    content: 'Lorsque Gédéon eut entendu le récit du rêve et son explication, il se prosterna, revint au camp d''Israël et dit: «Levez-vous, car l''Eternel a livré le camp de Madian entre vos mains.» '
  '16':
  - type: text
    content: 'Il répartit les 300 hommes en 3 groupes et leur remit à tous des trompettes ainsi que des cruches vides, avec des torches dans les cruches. '
  '17':
  - type: text
    content: 'Il leur dit: «Vous me regarderez et vous ferez comme moi. Dès que je serai arrivé aux abords du camp, vous ferez ce que je ferai. '
  '18':
  - type: text
    content: 'Quand je sonnerai de la trompette, ainsi que tous ceux qui seront avec moi, vous sonnerez aussi de la trompette tout autour du camp et vous direz: ‘Pour l''Eternel et pour Gédéon!’»'
  '19':
  - type: text
    content: 'Gédéon et les 100 hommes qui l''accompagnaient arrivèrent aux abords du camp peu avant minuit, alors qu''on venait de remplacer les gardes. Ils sonnèrent de la trompette et brisèrent les cruches qu''ils avaient à la main. '
  '2':
  - type: text
    content: 'L''Eternel dit à Gédéon: «Le peuple que tu as avec toi est trop nombreux pour que je livre Madian entre ses mains. Il pourrait en tirer gloire à mes dépens et dire: ‘C''est ma main qui m''a délivré.’ '
  '20':
  - type: text
    content: 'Les trois groupes sonnèrent de la trompette et brisèrent les cruches. Prenant de la main gauche les torches et de la main droite les trompettes dont ils devaient sonner, ils s''écrièrent: «A vos épées pour l''Eternel et pour Gédéon!» '
  '21':
  - type: text
    content: 'tout en restant chacun à sa place autour du camp. Le camp tout entier se mit à courir, à pousser des cris et à prendre la fuite. '
  '22':
  - type: text
    content: 'Les 300 hommes sonnèrent une nouvelle fois de la trompette et, dans tout le camp, l''Eternel fit en sorte que les hommes tournent l''épée les uns contre les autres. Les hommes du camp s''enfuirent jusqu''à Beth-Shitta vers Tseréra et jusqu''aux abords d''Abel-Mehola, près de Tabbath. '
  '23':
  - type: text
    content: Les hommes d'Israël, les hommes des tribus de Nephthali, d'Aser et de tout Manassé, se rassemblèrent et poursuivirent les Madianites.
  '24':
  - type: text
    content: 'Gédéon envoya des messagers dans toute la région montagneuse d''Ephraïm pour dire: «Descendez à la rencontre des Madianites et coupez-leur le passage de l''eau jusqu''à Beth-Bara, tout le long du Jourdain.» Tous les hommes d''Ephraïm se rassemblèrent, et ils s''emparèrent des gués du Jourdain jusqu''à Beth-Bara. '
  '25':
  - type: text
    content: Ils capturèrent deux chefs de Madian appelés Oreb et Zeeb. Ils tuèrent Oreb au rocher d'Oreb, et Zeeb au pressoir de Zeeb. Ils poursuivirent les Madianites et ils apportèrent la tête d'Oreb et de Zeeb à Gédéon de l'autre côté du Jourdain.
  '3':
  - type: text
    content: 'Proclame donc le message suivant aux oreilles du peuple: ‘Que celui qui a peur et tremble retourne chez lui et quitte la région montagneuse de Galaad.’» Il y eut 22''000 hommes du peuple qui retournèrent chez eux et il en resta 10''000.'
  '4':
  - type: text
    content: 'L''Eternel dit à Gédéon: «Le peuple est encore trop nombreux. Fais-les descendre au bord de l''eau et là je ferai pour toi un tri parmi eux. Celui à propos duquel je te dirai: ‘Que celui-ci aille avec toi’ ira avec toi. Et celui à propos duquel je te dirai: ‘Que celui-ci n''aille pas avec toi’ n''ira pas avec toi.» '
  '5':
  - type: text
    content: 'Gédéon fit descendre le peuple au bord de l''eau et l''Eternel dit à Gédéon: «Tous ceux qui laperont l''eau avec la langue comme le ferait un chien, tu les sépareras de tous ceux qui se mettront à genoux pour boire.» '
  '6':
  - type: text
    content: 'Ceux qui lapèrent l''eau en la portant à la bouche avec leur main furent au nombre de 300, et tout le reste du peuple se mit à genoux pour boire. '
  '7':
  - type: text
    content: 'L''Eternel dit alors à Gédéon: «C''est par les 300 hommes qui ont lapé l''eau que je vous sauverai et que je livrerai Madian entre tes mains. Que tout le reste du peuple reparte, chacun chez soi.» '
  '8':
  - type: text
    content: On prit les provisions et les trompettes du peuple, puis Gédéon renvoya tous les hommes d'Israël chez eux, en gardant seulement les 300 hommes. Le camp de Madian se trouvait au-dessous de lui dans la vallée.
  '9':
  - type: text
    content: 'L''Eternel dit à Gédéon pendant la nuit: «Lève-toi, descends au camp des Madianites, car je l''ai livré entre tes mains. '
