document_id: JON.2,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Jonas dans le poisson
  - type: text
    content: L'Eternel fit venir un grand poisson pour avaler Jonas, et *Jonas fut trois jours et trois nuits dans le ventre du poisson
  - type: note
    content: 'Jonas fut… poisson: cité par Jésus en Matthieu 12.40 à propos de sa mort et de sa résurrection.'
  - type: text
    content: '. '
  '10':
  - type: text
    content: Quant à moi, je t'offrirai des sacrifices avec un cri de reconnaissance,
  - type: text
    content: j'accomplirai les vœux que j'ai faits.
  - type: text
    content: Le salut vient de l'Eternel.»
  '11':
  - type: text
    content: L'Eternel parla au poisson, et le poisson vomit Jonas sur la terre.
  '2':
  - type: text
    content: 'Du ventre du poisson, Jonas pria l''Eternel, son Dieu, '
  '3':
  - type: text
    content: 'en disant:'
  - type: text
    content: «Dans ma détresse j'ai fait appel à l'Eternel,
  - type: text
    content: et il m'a répondu.
  - type: text
    content: Du milieu du séjour des morts j'ai appelé au secours,
  - type: text
    content: et tu as entendu ma voix.
  '4':
  - type: text
    content: Tu m'as jeté dans l'abîme, dans les profondeurs de la mer,
  - type: text
    content: et les courants m'ont environné;
  - type: text
    content: toutes tes vagues et tous tes flots sont passés sur moi.
  '5':
  - type: text
    content: 'Je disais: ‘Je suis chassé loin de ton regard’,'
  - type: text
    content: mais je verrai encore ton saint temple.
  '6':
  - type: text
    content: »L'eau m'a couvert jusqu'à m'enlever la vie.
  - type: text
    content: L'abîme m'a enveloppé,
  - type: text
    content: les algues s'enroulaient autour de ma tête.
  '7':
  - type: text
    content: Je suis descendu jusqu'aux racines des montagnes.
  - type: text
    content: Les verrous de la terre m'enfermaient pour toujours,
  - type: text
    content: mais tu m'as fait remonter vivant du gouffre,
  - type: text
    content: Eternel, mon Dieu!
  '8':
  - type: text
    content: »Quand mon âme était abattue en moi,
  - type: text
    content: je me suis souvenu de l'Eternel,
  - type: text
    content: et ma prière est parvenue jusqu'à toi,
  - type: text
    content: dans ton saint temple.
  '9':
  - type: text
    content: Ceux qui s'attachent à des idoles sans consistance
  - type: text
    content: éloignent d'eux la bonté.
