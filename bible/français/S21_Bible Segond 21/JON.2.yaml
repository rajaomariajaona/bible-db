document_id: JON.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jonas dans le poisson
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: L'Eternel fit venir un grand poisson pour avaler Jonas, et *Jonas fut trois jours et trois nuits dans le ventre du poisson
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Jonas fut… poisson: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité par Jésus en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matthieu 12.40
      metadata:
        usfm: MAT.12.40
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' à propos de sa mort et de sa résurrection.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Du ventre du poisson, Jonas pria l''Eternel, son Dieu, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'en disant:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Dans ma détresse j'ai fait appel à l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il m'a répondu.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Du milieu du séjour des morts j'ai appelé au secours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu as entendu ma voix.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tu m'as jeté dans l'abîme, dans les profondeurs de la mer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les courants m'ont environné;
- type: usfm
  marker: q1
  children:
  - type: text
    text: toutes tes vagues et tous tes flots sont passés sur moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Je disais: ‘Je suis chassé loin de ton regard’,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais je verrai encore ton saint temple.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: »L'eau m'a couvert jusqu'à m'enlever la vie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: L'abîme m'a enveloppé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les algues s'enroulaient autour de ma tête.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Je suis descendu jusqu'aux racines des montagnes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les verrous de la terre m'enfermaient pour toujours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais tu m'as fait remonter vivant du gouffre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eternel, mon Dieu!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: »Quand mon âme était abattue en moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je me suis souvenu de l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ma prière est parvenue jusqu'à toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans ton saint temple.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ceux qui s'attachent à des idoles sans consistance
- type: usfm
  marker: q1
  children:
  - type: text
    text: éloignent d'eux la bonté.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Quant à moi, je t'offrirai des sacrifices avec un cri de reconnaissance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j'accomplirai les vœux que j'ai faits.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le salut vient de l'Eternel.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: L'Eternel parla au poisson, et le poisson vomit Jonas sur la terre.
