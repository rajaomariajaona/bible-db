document_id: 3JN.1,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Salutation et louange
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: De la part de l'ancien au bien-aimé Gaïus que j'aime dans la vérité.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: C'est pourquoi, si je viens, je rappellerai les actes qu'il commet en bavardant contre nous de façon malveillante. Non content de cela, il n'accueille pas les frères, et ceux qui voudraient le faire, il les en empêche et les chasse de l'Eglise.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Bien-aimé, n'imite pas le mal, mais le bien. Celui qui fait le bien est de Dieu; celui qui fait le mal n'a pas vu Dieu.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Quant à Démétrius, tous lui rendent un bon témoignage, et la vérité elle-même témoigne pour lui. Nous aussi, nous lui rendons témoignage, et tu sais que notre témoignage est vrai.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J''aurais beaucoup de choses à [t'']écrire, mais je ne veux pas le faire avec l''encre et la plume. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J''espère te voir très bientôt, et nous parlerons de vive voix. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Que la paix soit avec toi! Les amis te saluent. Salue les amis, chacun en particulier.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Bien-aimé, je souhaite que tu prospères à tout point de vue et sois en bonne santé, à l''image de ton âme. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J''ai en effet éprouvé une très grande joie lorsque des frères sont arrivés et ont rendu témoignage de ta sincérité, de la manière dont tu marches dans la vérité. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je n'ai pas de plus grande joie que d'apprendre que mes enfants marchent dans la vérité.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Bien-aimé, tu agis avec fidélité dans ce que tu fais pour les frères, notamment pour des frères étrangers. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils ont du reste rendu témoignage à ton amour devant l''Eglise. Tu feras bien de les aider d''une manière digne de Dieu dans leur voyage, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'car c''est pour le nom de Jésus-Christ qu''ils sont partis, sans rien recevoir des non-croyants. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nous devons donc accueillir de tels hommes afin de travailler avec eux pour la vérité.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Diotrèphe et Démétrius
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J''ai écrit [quelques mots] à l''Eglise, mais Diotrèphe, qui aime être le premier parmi eux, ne nous accueille pas. '
