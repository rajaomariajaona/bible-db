document_id: LAM.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Souffrance et consolation
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Je suis l'homme qui a vu la misère
- type: usfm
  marker: q1
  children:
  - type: text
    text: sous le bâton de sa fureur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Il m'a poussé, il m'a fait avancer dans les ténèbres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et non dans la lumière.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Sans cesse il tourne et retourne sa main contre moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Il a fait dépérir ma chair et ma peau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a brisé mes os.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Il a érigé des constructions contre moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il m'a environné de poison et de douleur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Il me fait habiter dans les ténèbres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme ceux qui sont morts depuis longtemps.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il m'a emmuré pour que je ne puisse pas sortir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a alourdi mes chaînes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: J'ai beau crier et implorer du secours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il tient ma prière enfermée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Il a barré mon chemin avec des pierres de taille,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a dévié mes sentiers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Il a été pour moi un ours en embuscade,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un lion dans un endroit caché.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Il a détourné mes voies, il m'a mis en pièces,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a fait de moi un homme dévasté.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Il a tendu son arc et m'a dressé
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme cible pour ses flèches.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Il a fait pénétrer dans les profondeurs de mon être
- type: usfm
  marker: q1
  children:
  - type: text
    text: les flèches de son carquois.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Je suis pour tout mon peuple un objet de moquerie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à longueur de journée je suis l'objet de leurs chansons.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Il m'a rassasié d'herbes amères,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il m'a enivré d'absinthe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Il a cassé mes dents avec des cailloux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il m'a piétiné dans la cendre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Tu m'as enlevé la paix,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j'ai oublié ce qu'est le bonheur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Alors j''ai dit: «Je n''ai plus d''avenir,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: je n'ai plus d'espérance en l'Eternel!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Souviens-toi de ma détresse et de ma misère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de l'absinthe et du poison!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Moi, je m'en souviens bien
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je sombre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Voici ce que je veux méditer
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'pour garder espoir:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: les bontés de l'Eternel ne sont pas épuisées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ses compassions ne prennent pas fin;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: elles se renouvellent chaque matin.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que ta fidélité est grande!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Je le déclare, l'Eternel est mon bien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est pourquoi je veux m'attendre à lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: L'Eternel a de la bonté
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour celui qui compte sur lui, pour celui qui le recherche.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Il est bon d'attendre en silence
- type: usfm
  marker: q1
  children:
  - type: text
    text: le secours de l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Il est bon, pour l'homme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de devoir se plier à des contraintes dans sa jeunesse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Qu'il se tienne solitaire et silencieux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: lorsque l'Eternel le lui impose!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Qu''il mette sa bouche dans la poussière:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il y a peut-être de l'espoir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Qu'il présente la joue à celui qui le frappe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu'il soit rassasié d'insultes!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: En effet, le Seigneur
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne rejette pas pour toujours,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: mais quand il cause du chagrin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il fait preuve de compassion, tant sa bonté est grande.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: De fait, ce n'est pas de bon cœur qu'il humilie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu'il cause du chagrin aux hommes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Quand on écrase et piétine
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous les prisonniers d'un pays,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: quand on viole le droit d'un homme
- type: usfm
  marker: q1
  children:
  - type: text
    text: devant le Très-Haut,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: quand on fait du tort à un être humain alors qu'il défend sa cause,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le Seigneur ne le voit-il pas?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Qui n'a qu'à parler pour qu'une chose se produise,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si le Seigneur ne l'a pas ordonnée?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: N'est-ce pas de la bouche du Très-Haut que sortent
- type: usfm
  marker: q1
  children:
  - type: text
    text: les malheurs et le bonheur?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Pourquoi l'être humain resté en vie se plaindrait-il?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que chacun se plaigne de ses propres péchés!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Réfléchissons à nos voies, examinons-les
- type: usfm
  marker: q1
  children:
  - type: text
    text: et retournons à l'Eternel!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Elevons notre cœur, tout comme nos mains,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'vers le Dieu qui est au ciel:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: «Nous, nous avons commis des transgressions, nous nous sommes révoltés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et toi, tu n'as pas pardonné.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Tu t'es enveloppé de colère et tu nous as poursuivis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu as tué sans pitié.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Tu t'es enveloppé d'un nuage
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour empêcher la prière de parvenir jusqu'à toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Tu as fait de nous un objet de mépris et de rejet
- type: usfm
  marker: q1
  children:
  - type: text
    text: au milieu des peuples.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Tous nos ennemis ouvrent la bouche contre nous.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Nous avons connu la terreur et le trou,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la dévastation et la ruine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: Des torrents d'eau coulent de mes yeux
- type: usfm
  marker: q1
  children:
  - type: text
    text: à cause du désastre qui frappe la fille de mon peuple.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Mon œil fond en larmes, sans repos,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans répit,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: jusqu'à ce que l'Eternel regarde et voie
- type: usfm
  marker: q1
  children:
  - type: text
    text: du haut du ciel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: Mon œil me fait souffrir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à cause du malheur qui s'est abattu sur toutes les filles de ma ville.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: Ils m'ont pourchassé avec persévérance comme si j'étais un oiseau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ceux qui sont mes ennemis sans raison.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: Ils ont voulu mettre fin à ma vie en me jetant dans un puits
- type: usfm
  marker: q1
  children:
  - type: text
    text: et m'ont lancé des pierres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: L'eau a submergé ma tête.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Je me disais: «Je suis perdu!»'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: J'ai fait appel à ton nom, Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: au plus profond du puits.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'Tu as entendu ma voix:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne bouche pas tes oreilles à ma demande de délivrance, à mon appel au secours!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: Le jour où j'ai fait appel à toi, tu t'es approché,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'tu as dit: «N''aie pas peur!»'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: Seigneur, tu as défendu ma cause,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu as racheté ma vie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'Eternel, tu as vu le tort qu''on m''a fait:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: rends-moi justice!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: Tu as vu leur soif de vengeance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous leurs complots contre moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: Eternel, tu as entendu leurs insultes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous leurs complots contre moi,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: les discours de mes adversaires et les propos
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu'ils tenaient à longueur de journée contre moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'Regarde: qu''ils restent assis ou se lèvent,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils se moquent de moi dans leurs chansons.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: Tu leur rendras ce qu'ils méritent, Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: conformément à leur manière d'agir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '65'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: Tu les rendras obstinés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ta malédiction reposera contre eux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '66'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: Dans ta colère tu les pourchasseras
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu les extermineras de dessous le ciel, Eternel!
