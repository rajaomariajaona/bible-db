document_id: LAM.3,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Souffrance et consolation
  - type: text
    content: Je suis l'homme qui a vu la misère
  - type: text
    content: sous le bâton de sa fureur.
  '10':
  - type: text
    content: Il a été pour moi un ours en embuscade,
  - type: text
    content: un lion dans un endroit caché.
  '11':
  - type: text
    content: Il a détourné mes voies, il m'a mis en pièces,
  - type: text
    content: il a fait de moi un homme dévasté.
  '12':
  - type: text
    content: Il a tendu son arc et m'a dressé
  - type: text
    content: comme cible pour ses flèches.
  '13':
  - type: text
    content: Il a fait pénétrer dans les profondeurs de mon être
  - type: text
    content: les flèches de son carquois.
  '14':
  - type: text
    content: Je suis pour tout mon peuple un objet de moquerie,
  - type: text
    content: à longueur de journée je suis l'objet de leurs chansons.
  '15':
  - type: text
    content: Il m'a rassasié d'herbes amères,
  - type: text
    content: il m'a enivré d'absinthe.
  '16':
  - type: text
    content: Il a cassé mes dents avec des cailloux,
  - type: text
    content: il m'a piétiné dans la cendre.
  '17':
  - type: text
    content: Tu m'as enlevé la paix,
  - type: text
    content: j'ai oublié ce qu'est le bonheur.
  '18':
  - type: text
    content: 'Alors j''ai dit: «Je n''ai plus d''avenir,'
  - type: text
    content: je n'ai plus d'espérance en l'Eternel!»
  '19':
  - type: text
    content: Souviens-toi de ma détresse et de ma misère,
  - type: text
    content: de l'absinthe et du poison!
  '2':
  - type: text
    content: Il m'a poussé, il m'a fait avancer dans les ténèbres,
  - type: text
    content: et non dans la lumière.
  '20':
  - type: text
    content: Moi, je m'en souviens bien
  - type: text
    content: et je sombre.
  '21':
  - type: text
    content: Voici ce que je veux méditer
  - type: text
    content: 'pour garder espoir:'
  '22':
  - type: text
    content: les bontés de l'Eternel ne sont pas épuisées,
  - type: text
    content: ses compassions ne prennent pas fin;
  '23':
  - type: text
    content: elles se renouvellent chaque matin.
  - type: text
    content: Que ta fidélité est grande!
  '24':
  - type: text
    content: Je le déclare, l'Eternel est mon bien,
  - type: text
    content: c'est pourquoi je veux m'attendre à lui.
  '25':
  - type: text
    content: L'Eternel a de la bonté
  - type: text
    content: pour celui qui compte sur lui, pour celui qui le recherche.
  '26':
  - type: text
    content: Il est bon d'attendre en silence
  - type: text
    content: le secours de l'Eternel.
  '27':
  - type: text
    content: Il est bon, pour l'homme,
  - type: text
    content: de devoir se plier à des contraintes dans sa jeunesse.
  '28':
  - type: text
    content: Qu'il se tienne solitaire et silencieux,
  - type: text
    content: lorsque l'Eternel le lui impose!
  '29':
  - type: text
    content: 'Qu''il mette sa bouche dans la poussière:'
  - type: text
    content: il y a peut-être de l'espoir.
  '3':
  - type: text
    content: Sans cesse il tourne et retourne sa main contre moi.
  '30':
  - type: text
    content: Qu'il présente la joue à celui qui le frappe,
  - type: text
    content: qu'il soit rassasié d'insultes!
  '31':
  - type: text
    content: En effet, le Seigneur
  - type: text
    content: ne rejette pas pour toujours,
  '32':
  - type: text
    content: mais quand il cause du chagrin,
  - type: text
    content: il fait preuve de compassion, tant sa bonté est grande.
  '33':
  - type: text
    content: De fait, ce n'est pas de bon cœur qu'il humilie,
  - type: text
    content: qu'il cause du chagrin aux hommes.
  '34':
  - type: text
    content: Quand on écrase et piétine
  - type: text
    content: tous les prisonniers d'un pays,
  '35':
  - type: text
    content: quand on viole le droit d'un homme
  - type: text
    content: devant le Très-Haut,
  '36':
  - type: text
    content: quand on fait du tort à un être humain alors qu'il défend sa cause,
  - type: text
    content: le Seigneur ne le voit-il pas?
  '37':
  - type: text
    content: Qui n'a qu'à parler pour qu'une chose se produise,
  - type: text
    content: si le Seigneur ne l'a pas ordonnée?
  '38':
  - type: text
    content: N'est-ce pas de la bouche du Très-Haut que sortent
  - type: text
    content: les malheurs et le bonheur?
  '39':
  - type: text
    content: Pourquoi l'être humain resté en vie se plaindrait-il?
  - type: text
    content: Que chacun se plaigne de ses propres péchés!
  '4':
  - type: text
    content: Il a fait dépérir ma chair et ma peau,
  - type: text
    content: il a brisé mes os.
  '40':
  - type: text
    content: Réfléchissons à nos voies, examinons-les
  - type: text
    content: et retournons à l'Eternel!
  '41':
  - type: text
    content: Elevons notre cœur, tout comme nos mains,
  - type: text
    content: 'vers le Dieu qui est au ciel:'
  '42':
  - type: text
    content: «Nous, nous avons commis des transgressions, nous nous sommes révoltés,
  - type: text
    content: et toi, tu n'as pas pardonné.
  '43':
  - type: text
    content: Tu t'es enveloppé de colère et tu nous as poursuivis,
  - type: text
    content: tu as tué sans pitié.
  '44':
  - type: text
    content: Tu t'es enveloppé d'un nuage
  - type: text
    content: pour empêcher la prière de parvenir jusqu'à toi.
  '45':
  - type: text
    content: Tu as fait de nous un objet de mépris et de rejet
  - type: text
    content: au milieu des peuples.»
  '46':
  - type: text
    content: Tous nos ennemis ouvrent la bouche contre nous.
  '47':
  - type: text
    content: Nous avons connu la terreur et le trou,
  - type: text
    content: la dévastation et la ruine.
  '48':
  - type: text
    content: Des torrents d'eau coulent de mes yeux
  - type: text
    content: à cause du désastre qui frappe la fille de mon peuple.
  '49':
  - type: text
    content: Mon œil fond en larmes, sans repos,
  - type: text
    content: sans répit,
  '5':
  - type: text
    content: Il a érigé des constructions contre moi,
  - type: text
    content: il m'a environné de poison et de douleur.
  '50':
  - type: text
    content: jusqu'à ce que l'Eternel regarde et voie
  - type: text
    content: du haut du ciel.
  '51':
  - type: text
    content: Mon œil me fait souffrir,
  - type: text
    content: à cause du malheur qui s'est abattu sur toutes les filles de ma ville.
  '52':
  - type: text
    content: Ils m'ont pourchassé avec persévérance comme si j'étais un oiseau,
  - type: text
    content: ceux qui sont mes ennemis sans raison.
  '53':
  - type: text
    content: Ils ont voulu mettre fin à ma vie en me jetant dans un puits
  - type: text
    content: et m'ont lancé des pierres.
  '54':
  - type: text
    content: L'eau a submergé ma tête.
  - type: text
    content: 'Je me disais: «Je suis perdu!»'
  '55':
  - type: text
    content: J'ai fait appel à ton nom, Eternel,
  - type: text
    content: au plus profond du puits.
  '56':
  - type: text
    content: 'Tu as entendu ma voix:'
  - type: text
    content: ne bouche pas tes oreilles à ma demande de délivrance, à mon appel au secours!
  '57':
  - type: text
    content: Le jour où j'ai fait appel à toi, tu t'es approché,
  - type: text
    content: 'tu as dit: «N''aie pas peur!»'
  '58':
  - type: text
    content: Seigneur, tu as défendu ma cause,
  - type: text
    content: tu as racheté ma vie.
  '59':
  - type: text
    content: 'Eternel, tu as vu le tort qu''on m''a fait:'
  - type: text
    content: rends-moi justice!
  '6':
  - type: text
    content: Il me fait habiter dans les ténèbres,
  - type: text
    content: comme ceux qui sont morts depuis longtemps.
  '60':
  - type: text
    content: Tu as vu leur soif de vengeance,
  - type: text
    content: tous leurs complots contre moi.
  '61':
  - type: text
    content: Eternel, tu as entendu leurs insultes,
  - type: text
    content: tous leurs complots contre moi,
  '62':
  - type: text
    content: les discours de mes adversaires et les propos
  - type: text
    content: qu'ils tenaient à longueur de journée contre moi.
  '63':
  - type: text
    content: 'Regarde: qu''ils restent assis ou se lèvent,'
  - type: text
    content: ils se moquent de moi dans leurs chansons.
  '64':
  - type: text
    content: Tu leur rendras ce qu'ils méritent, Eternel,
  - type: text
    content: conformément à leur manière d'agir.
  '65':
  - type: text
    content: Tu les rendras obstinés,
  - type: text
    content: ta malédiction reposera contre eux.
  '66':
  - type: text
    content: Dans ta colère tu les pourchasseras
  - type: text
    content: et tu les extermineras de dessous le ciel, Eternel!
  '7':
  - type: text
    content: Il m'a emmuré pour que je ne puisse pas sortir,
  - type: text
    content: il a alourdi mes chaînes.
  '8':
  - type: text
    content: J'ai beau crier et implorer du secours,
  - type: text
    content: il tient ma prière enfermée.
  '9':
  - type: text
    content: Il a barré mon chemin avec des pierres de taille,
  - type: text
    content: il a dévié mes sentiers.
