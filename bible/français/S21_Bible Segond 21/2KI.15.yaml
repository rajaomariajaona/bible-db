document_id: 2KI.15,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Règne d'Azaria (Ozias) sur Juda
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La vingt-septième année du règne de Jéroboam sur Israël, Azaria, fils d''Amatsia, le roi de Juda, devint roi. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Shallum, le fils de Jabesh, conspira contre lui et le frappa à mort devant le peuple, puis il devint roi à sa place.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le reste des actes de Zacharie, cela est décrit dans les annales des rois d'Israël.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi s''accomplit ce que l''Eternel avait déclaré à Jéhu: «Tes descendants jusqu''à la quatrième génération seront assis sur le trône d''Israël.»'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Règne de Shallum sur Israël
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Shallum, le fils de Jabesh, devint roi la trente-neuvième année du règne d''Ozias sur Juda. Il régna pendant un mois à Samarie. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Menahem, le fils de Gadi, monta de Thirtsa et vint à Samarie. Il frappa à mort Shallum, fils de Jabesh, dans Samarie et il devint roi à sa place.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le reste des actes de Shallum et la conspiration qu'il a formée, cela est décrit dans les annales des rois d'Israël.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors Menahem frappa la ville de Thiphsach, tous ceux qui s'y trouvaient, ainsi que son territoire jusqu'à Thirtsa; il la frappa parce qu'elle ne lui avait pas ouvert ses portes, et il fendit le ventre de toutes les femmes enceintes.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Règne de Menahem sur Israël
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: La trente-neuvième année du règne d'Azaria sur Juda, Menahem, le fils de Gadi, devint roi d'Israël. Il régna 10 ans à Samarie.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il fit ce qui est mal aux yeux de l''Eternel; de toute sa vie, il ne se détourna pas des péchés de Jéroboam, fils de Nebath, qui avait fait pécher Israël. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pul, le roi d''Assyrie, vint attaquer le pays, et Menahem lui donna 30 tonnes d''argent pour qu''il contribue à affermir la royauté entre ses mains. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il avait 16 ans lorsqu'il devint roi et il régna 52 ans à Jérusalem. Sa mère s'appelait Jecolia et elle était de Jérusalem.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Menahem préleva cet argent sur tous les Israélites riches afin de le donner au roi d'Assyrie, à raison de 50 pièces d'argent chacun. Le roi d'Assyrie repartit alors sans prendre position dans le pays.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le reste des actes de Menahem, tout ce qu'il a accompli, cela est décrit dans les annales des rois d'Israël.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Menahem se coucha avec ses ancêtres. Son fils Pekachia devint roi à sa place.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Règne de Pekachia sur Israël
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: La cinquantième année du règne d'Azaria sur Juda, Pekachia, le fils de Menahem, devint roi d'Israël à Samarie. Il régna 2 ans.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il fit ce qui est mal aux yeux de l''Eternel; il ne se détourna pas des péchés de Jéroboam, fils de Nebath, qui avait fait pécher Israël. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Son officier Pékach, fils de Remalia, conspira contre lui. Il le frappa à Samarie, dans une partie fortifiée du palais royal, avec l'aide d'Argob et d'Arié. Il avait avec lui 50 Galaadites. Il fit ainsi mourir Pekachia et il devint roi à sa place.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le reste des actes de Pekachia, tout ce qu'il a accompli, cela est décrit dans les annales des rois d'Israël.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Règne de Pékach sur Israël
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: La cinquante-deuxième année du règne d'Azaria sur Juda, Pékach, le fils de Remalia, devint roi d'Israël à Samarie. Il régna 20 ans.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il fit ce qui est mal aux yeux de l''Eternel; il ne se détourna pas des péchés de Jéroboam, fils de Nebath, qui avait fait pécher Israël. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Durant le règne de Pékach sur Israël, Tiglath-Piléser, le roi d''Assyrie, vint s''emparer des villes d''Ijjon, d''Abel-Beth-Maaca, de Janoach, de Kédesh, de Hatsor, de Galaad, de la Galilée et de tout le pays de Nephthali, et il exila les habitants en Assyrie. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il fit ce qui est droit aux yeux de l''Eternel, entièrement comme l''avait fait son père Amatsia. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Osée, fils d'Ela, forma une conspiration contre Pékach, fils de Remalia, et le frappa à mort, puis il devint roi à sa place. C'était la vingtième année du règne de Jotham, fils d'Ozias.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le reste des actes de Pékach, tout ce qu'il a accompli, cela est décrit dans les annales des rois d'Israël.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Règne de Jotham sur Juda
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La deuxième année du règne de Pékach, fils de Remalia, sur Israël, Jotham, fils d''Ozias, le roi de Juda, devint roi. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il avait 25 ans lorsqu'il devint roi et il régna 16 ans à Jérusalem. Sa mère s'appelait Jerusha et c'était la fille de Tsadok.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il fit ce qui est droit aux yeux de l''Eternel, il agit entièrement comme l''avait fait son père Ozias. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Toutefois, les hauts lieux ne disparurent pas; le peuple y offrait encore des sacrifices et des parfums. Jotham construisit la porte supérieure de la maison de l'Eternel.
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le reste des actes de Jotham, tout ce qu'il a accompli, cela est décrit dans les annales des rois de Juda.
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: A cette époque, l'Eternel commença à envoyer contre Juda Retsin, le roi de Syrie, et Pékach, le fils de Remalia.
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jotham se coucha avec ses ancêtres et il fut enterré à leurs côtés dans la ville de son ancêtre David. Son fils Achaz devint roi à sa place.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toutefois, les hauts lieux ne disparurent pas; le peuple y offrait encore des sacrifices et des parfums. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: L'Eternel frappa le roi, et il fut lépreux jusqu'au jour de sa mort. Il habitait dans une maison isolée et c'était Jotham, son fils, qui était responsable du palais et jugeait le peuple du pays.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le reste des actes d'Azaria, tout ce qu'il a accompli, cela est décrit dans les annales des rois de Juda.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Azaria se coucha avec ses ancêtres et on l'enterra à leurs côtés dans la ville de David. Son fils Jotham devint roi à sa place.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Règne de Zacharie sur Israël
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: La trente-huitième année du règne d'Azaria sur Juda, Zacharie, le fils de Jéroboam, devint roi d'Israël à Samarie. Il régna 6 mois.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il fit ce qui est mal aux yeux de l''Eternel, comme l''avaient fait ses ancêtres; il ne se détourna pas des péchés de Jéroboam, fils de Nebath, qui avait fait pécher Israël. '
