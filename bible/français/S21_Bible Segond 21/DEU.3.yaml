document_id: DEU.3,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Conquête du royaume d'Og
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Nous avons pris la direction du Basan. Og, le roi du Basan, est sorti à notre rencontre avec tout son peuple pour nous combattre à Edréï. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous leur avons pris toutes les villes de la plaine, tout Galaad et tout le Basan jusqu''à Salca et Edréï, villes qui appartenaient au royaume d''Og en Basan. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Og, le roi du Basan, était le seul survivant du peuple des Rephaïm. Son lit, un lit en fer, ne se trouve-t-il pas à Rabba, la capitale des Ammonites? Il mesure 4 mètres et demi de long et 2 de large.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Attribution des premiers territoires
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Nous avons alors pris possession de ce pays. J''ai donné aux Rubénites et aux Gadites le territoire qui s''étend d''Aroër sur le torrent de l''Arnon jusqu''à la moitié de la région montagneuse de Galaad avec ses villes. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J''ai donné à la moitié de la tribu de Manassé le reste de Galaad et tout le royaume d''Og en Basan, toute la région d''Argob avec tout le Basan. C''est ce qu''on appelait le pays des Rephaïm. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jaïr, le descendant de Manassé, a pris toute la région d''Argob jusqu''à la frontière des Gueshuriens et des Maacathiens, et il a donné son nom aux villages du Basan appelés aujourd''hui encore bourgs de Jaïr. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J''ai donné Galaad à Makir. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aux Rubénites et aux Gadites j''ai donné une partie de Galaad jusqu''au torrent de l''Arnon, dont le milieu sert de frontière, et jusqu''au torrent du Jabbok, qui marque la frontière avec les Ammonites; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: je leur ai donné encore la plaine qui est limitée par le Jourdain et s'étend de Génésareth jusqu'à la mer de la plaine, la mer Morte, et jusqu'au pied du Pisga vers l'est.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»A cette époque-là, je leur ai donné cet ordre: ‘L''Eternel, votre Dieu, vous livre ce pays pour que vous le possédiez. Vous tous, les soldats, vous marcherez tout équipés devant vos frères les Israélites. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Seuls vos femmes, vos petits enfants et vos troupeaux – je sais que vous avez de nombreux troupeaux – resteront dans les villes que je vous ai données, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''Eternel m''a dit: ‘N''aie pas peur de lui, car je le livre entre tes mains, ainsi que tout son peuple et son pays. Tu le traiteras comme tu as traité Sihon, le roi des Amoréens qui habitait à Hesbon.’ '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: jusqu'à ce que l'Eternel ait accordé du repos à vos frères comme à vous et qu'ils possèdent, eux aussi, le pays que l'Eternel, votre Dieu, leur donne de l'autre côté du Jourdain. Alors vous retournerez chacun dans l'héritage que je vous ai donné.’
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»A cette époque-là, j''ai donné cet ordre à Josué: ‘Tes yeux ont vu tout ce que l''Eternel, votre Dieu, a fait à ces deux rois. C''est ainsi que l''Eternel agira envers tous les royaumes contre lesquels tu vas marcher. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: N'ayez pas peur d'eux, car l'Eternel, votre Dieu, combattra lui-même pour vous.’
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L'entrée en Canaan refusée à Moïse
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»A cette époque-là, j''ai imploré la grâce de l''Eternel en disant: '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘Seigneur Eternel, tu as commencé à montrer à ton serviteur ta grandeur et ta main puissante. En effet, quel dieu y a-t-il, dans le ciel et sur la terre, qui puisse imiter tes œuvres et ton extraordinaire façon d''agir? '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Laisse-moi traverser, je t''en prie, laisse-moi voir ce bon pays de l''autre côté du Jourdain, ces belles montagnes et le Liban!’ '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais l''Eternel était irrité contre moi, à cause de vous, et il ne m''a pas écouté. L''Eternel m''a dit: ‘En voilà assez! Ne me parle plus de cette affaire. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Monte au sommet du Pisga, porte tes regards vers l''ouest, le nord, le sud et l''est, et contemple le pays de tes yeux, car tu ne passeras pas le Jourdain. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Donne des ordres à Josué, fortifie-le et affermis-le, car c'est lui qui marchera devant ce peuple et qui le mettra en possession du pays que tu verras.’
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: »Nous sommes restés dans la vallée vis-à-vis de Beth-Peor.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et l''Eternel, notre Dieu, a livré encore entre nos mains Og, roi du Basan, avec tout son peuple. Nous l''avons battu, sans laisser un seul survivant. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous avons alors pris toutes ses villes et il n''y en a pas une qui ne soit tombée en notre pouvoir: 60 villes, toute la région d''Argob, le royaume d''Og en Basan. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toutes ces villes étaient fortifiées, avec de hautes murailles, des portes et des barres. Il y avait aussi un très grand nombre de villes sans murailles. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous les avons vouées à la destruction, comme nous l''avions fait pour Sihon, roi de Hesbon. Nous avons consacré toutes les villes par la destruction, hommes, femmes et petits enfants. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais nous avons pillé pour nous tout le bétail et le butin des villes.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»C''est ainsi que, à cette époque-là, nous avons pris aux deux rois des Amoréens le pays qui est situé de l''autre côté du Jourdain et qui s''étend du torrent de l''Arnon jusqu''au mont Hermon. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les Sidoniens donnent à l''Hermon le nom de Sirion, et les Amoréens celui de Senir. '
