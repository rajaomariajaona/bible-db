document_id: 1TI.4,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Conseils à propos des fausses doctrines
  - type: text
    content: 'Mais l''Esprit dit expressément que, dans les derniers temps, certains abandonneront la foi pour s''attacher à des esprits trompeurs et à des doctrines de démons, '
  '10':
  - type: text
    content: C'est dans cette perspective en effet que nous travaillons et que nous nous laissons insulter, parce que nous avons mis notre espérance dans le Dieu vivant qui est le Sauveur de tous les hommes, et en particulier des croyants.
  '11':
  - type: text
    content: 'Transmets ces instructions et enseigne-les. '
  '12':
  - type: text
    content: 'Que personne ne méprise ta jeunesse, mais sois un modèle pour les croyants par tes paroles, ta conduite, ton amour, [ton esprit,] ta foi, ta pureté. '
  '13':
  - type: text
    content: 'En attendant que je vienne, applique-toi à lire les Ecritures dans l''assemblée, à encourager, à enseigner. '
  '14':
  - type: text
    content: 'Ne néglige pas le don que tu as reçu, celui qui t''a été donné d''après une prophétie lorsque le conseil des anciens a posé les mains sur toi. '
  '15':
  - type: text
    content: 'Occupe-toi de ces choses, donne-toi tout entier à elles, afin que tes progrès soient évidents pour tous. '
  '16':
  - type: text
    content: Veille sur toi-même et sur ton enseignement. Mets-y de la persévérance, car en agissant ainsi, tu te sauveras toi-même ainsi que ceux qui t'écoutent.
  '2':
  - type: text
    content: car ils seront égarés par l'hypocrisie de menteurs dont la conscience est marquée au fer rouge
  - type: note
    content: 'Marquée au fer rouge: on marquait au fer rouge les esclaves fugitifs et les criminels.'
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'Ces gens-là interdisent de se marier et de consommer des aliments que Dieu a pourtant créés pour qu''ils soient pris avec reconnaissance par ceux qui sont croyants et qui ont connu la vérité. '
  '4':
  - type: text
    content: 'Tout ce que Dieu a créé est bon et rien ne doit être rejeté, pourvu qu''on le prenne dans une attitude de reconnaissance, '
  '5':
  - type: text
    content: car cela est rendu saint par la parole de Dieu et la prière.
  - type: heading
    content: 2Tm 2.14-16 (Tt 2.7, 15; 2Tm 1.6, 13; 4.1-2, 5)
  '6':
  - type: text
    content: 'En exposant cela aux frères et sœurs, tu seras un bon serviteur de Jésus-Christ, nourri des paroles de la foi et du bon enseignement que tu as fidèlement suivi. '
  '7':
  - type: text
    content: 'Rejette les contes profanes de vieilles femmes. Exerce-toi plutôt à la piété. '
  '8':
  - type: text
    content: 'En effet, l''exercice physique est utile à peu de chose, tandis que la piété est utile à tout, car elle a la promesse de la vie présente et de la vie à venir. '
  '9':
  - type: text
    content: 'Voilà une parole certaine, digne d''être acceptée sans réserve. '
