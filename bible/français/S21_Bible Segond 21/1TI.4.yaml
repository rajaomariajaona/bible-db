document_id: 1TI.4,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Conseils à propos des fausses doctrines
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Mais l''Esprit dit expressément que, dans les derniers temps, certains abandonneront la foi pour s''attacher à des esprits trompeurs et à des doctrines de démons, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: C'est dans cette perspective en effet que nous travaillons et que nous nous laissons insulter, parce que nous avons mis notre espérance dans le Dieu vivant qui est le Sauveur de tous les hommes, et en particulier des croyants.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Transmets ces instructions et enseigne-les. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Que personne ne méprise ta jeunesse, mais sois un modèle pour les croyants par tes paroles, ta conduite, ton amour, [ton esprit,] ta foi, ta pureté. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'En attendant que je vienne, applique-toi à lire les Ecritures dans l''assemblée, à encourager, à enseigner. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ne néglige pas le don que tu as reçu, celui qui t''a été donné d''après une prophétie lorsque le conseil des anciens a posé les mains sur toi. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Occupe-toi de ces choses, donne-toi tout entier à elles, afin que tes progrès soient évidents pour tous. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Veille sur toi-même et sur ton enseignement. Mets-y de la persévérance, car en agissant ainsi, tu te sauveras toi-même ainsi que ceux qui t'écoutent.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: car ils seront égarés par l'hypocrisie de menteurs dont la conscience est marquée au fer rouge
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Marquée au fer rouge: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: on marquait au fer rouge les esclaves fugitifs et les criminels.
      marker-yv: yv-n
    - type: text
      text: '. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ces gens-là interdisent de se marier et de consommer des aliments que Dieu a pourtant créés pour qu''ils soient pris avec reconnaissance par ceux qui sont croyants et qui ont connu la vérité. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Tout ce que Dieu a créé est bon et rien ne doit être rejeté, pourvu qu''on le prenne dans une attitude de reconnaissance, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: car cela est rendu saint par la parole de Dieu et la prière.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Tm 2.14-16 (Tt 2.7, 15; 2Tm 1.6, 13; 4.1-2, 5)
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'En exposant cela aux frères et sœurs, tu seras un bon serviteur de Jésus-Christ, nourri des paroles de la foi et du bon enseignement que tu as fidèlement suivi. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Rejette les contes profanes de vieilles femmes. Exerce-toi plutôt à la piété. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'En effet, l''exercice physique est utile à peu de chose, tandis que la piété est utile à tout, car elle a la promesse de la vie présente et de la vie à venir. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Voilà une parole certaine, digne d''être acceptée sans réserve. '
