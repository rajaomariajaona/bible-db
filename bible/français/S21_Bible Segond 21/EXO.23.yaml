document_id: EXO.23,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Règles morales
  - type: text
    content: »Tu ne propageras pas de faux bruit. Tu ne t'associeras pas au méchant pour faire un faux témoignage.
  '10':
  - type: text
    content: '»Pendant 6 ans, tu ensemenceras la terre et tu en récolteras le produit. '
  '11':
  - type: text
    content: Mais la septième année, tu lui donneras du répit et tu la laisseras en repos. Les pauvres de ton peuple en jouiront et les bêtes des champs mangeront ce qui restera. Tu feras de même pour ta vigne et pour tes oliviers.
  '12':
  - type: text
    content: »Pendant 6 jours, tu feras ton travail, mais le septième jour, tu te reposeras afin que ton bœuf et ton âne aient du repos, afin que le fils de ton esclave et l'étranger reprennent leur souffle.
  '13':
  - type: text
    content: '»Vous respecterez tout ce que je vous ai dit et vous ne mentionnerez pas le nom d''autres dieux: qu''on ne l''entende pas sortir de votre bouche.'
  '14':
  - type: text
    content: '»Trois fois par an, tu célébreras des fêtes en mon honneur. '
  '15':
  - type: text
    content: 'Tu observeras la fête des pains sans levain. Pendant 7 jours, au moment fixé lors du mois des épis, tu mangeras des pains sans levain, comme je t''en ai donné l''ordre. En effet, c''est au cours de ce mois que tu es sorti d''Egypte. On ne se présentera pas devant moi les mains vides. '
  '16':
  - type: text
    content: 'Tu observeras la fête de la moisson. C''est la fête des premiers fruits de ton travail, de ce que tu auras semé dans les champs. Tu observeras aussi la fête de la récolte, à la fin de l''année, quand tu récolteras dans les champs le fruit de ton travail. '
  '17':
  - type: text
    content: Trois fois par an, tous les hommes se présenteront devant le Seigneur, l'Eternel.
  '18':
  - type: text
    content: »Tu n'offriras pas le sang de la victime sacrifiée en mon honneur sur du pain levé et on ne gardera pas sa graisse pendant la nuit jusqu'au matin.
  '19':
  - type: text
    content: »Tu apporteras à la maison de l'Eternel, ton Dieu, les tout premiers produits de ton sol. Tu ne feras pas cuire un chevreau dans le lait de sa mère.
  - type: heading
    content: Instructions et promesses pour la conquête
  '2':
  - type: text
    content: »Tu ne suivras pas la majorité pour faire le mal et tu ne déposeras pas dans un procès en te mettant du côté du grand nombre pour violer la justice.
  '20':
  - type: text
    content: '»Voici que j''envoie un ange devant toi pour te protéger en chemin et pour te faire arriver à l''endroit que j''ai préparé. '
  '21':
  - type: text
    content: 'Fais bien attention en sa présence et écoute-le, ne lui résiste pas. En effet, il ne pardonnera pas vos péchés, car mon nom est en lui. '
  '22':
  - type: text
    content: 'Mais si tu l''écoutes et si tu fais tout ce que je te dirai, je serai l''ennemi de tes ennemis et l''adversaire de tes adversaires. '
  '23':
  - type: text
    content: Mon ange marchera devant toi et te conduira chez les Amoréens, les Hittites, les Phéréziens, les Cananéens, les Héviens et les Jébusiens, et je les exterminerai.
  '24':
  - type: text
    content: '»Tu ne te prosterneras pas devant leurs dieux et tu ne les serviras pas. Tu n''imiteras pas le comportement de ces peuples. Au contraire, tu les détruiras et tu briseras leurs statues. '
  '25':
  - type: text
    content: 'Vous servirez l''Eternel, votre Dieu, et il bénira votre pain et votre eau. J''éloignerai la maladie du milieu de toi. '
  '26':
  - type: text
    content: Il n'y aura dans ton pays ni femme qui avorte, ni femme stérile. Je te donnerai une longue vie.
  '27':
  - type: text
    content: '»J''enverrai ma terreur devant toi, je mettrai en déroute tous les peuples chez lesquels tu arriveras et je mettrai tous tes ennemis en fuite devant toi. '
  '28':
  - type: text
    content: 'J''enverrai les frelons devant toi et ils chasseront loin de toi les Héviens, les Cananéens et les Hittites. '
  '29':
  - type: text
    content: 'Je ne les chasserai pas en une seule année loin de toi, sinon le pays deviendrait un désert et les bêtes des champs se multiplieraient à ton détriment. '
  '3':
  - type: text
    content: »Tu ne favoriseras pas le faible dans son procès.
  '30':
  - type: text
    content: 'C''est peu à peu que je les chasserai loin de toi, jusqu''à ce que tu aies suffisamment augmenté en nombre pour pouvoir hériter du pays. '
  '31':
  - type: text
    content: 'Je fixerai tes frontières: ton territoire ira de la mer des Roseaux à la mer Méditerranée, et du désert du Sinaï à l''Euphrate. En effet, je livrerai entre vos mains les habitants de cette région et tu les chasseras devant toi. '
  '32':
  - type: text
    content: 'Tu ne feras aucune alliance avec eux ni avec leurs dieux. '
  '33':
  - type: text
    content: 'Ils n''habiteront pas dans ton pays, sinon ils te feraient pécher contre moi: tu servirais leurs dieux et ce serait un piège pour toi.»'
  '4':
  - type: text
    content: '»Si tu rencontres le bœuf ou l''âne de ton ennemi alors qu''il est égaré, tu le lui ramèneras. '
  '5':
  - type: text
    content: Si tu vois l'âne de ton ennemi s'effondrer sous sa charge et que tu hésites à le décharger, tu l'aideras néanmoins à le décharger.
  '6':
  - type: text
    content: »Tu ne porteras pas atteinte au droit du pauvre dans son procès.
  '7':
  - type: text
    content: '»Tu t''éloigneras de tout mensonge et tu ne feras pas mourir l''innocent et le juste, car je ne déclarerai pas juste le coupable. '
  '8':
  - type: text
    content: Tu n'accepteras aucun cadeau, car les cadeaux aveuglent ceux qui ont les yeux ouverts et pervertissent les paroles des justes.
  '9':
  - type: text
    content: »Tu n'opprimeras pas l'étranger. Vous-mêmes, vous savez ce qu'éprouve l'étranger car vous avez été étrangers en Egypte.
  - type: heading
    content: Les fêtes et le sabbat
