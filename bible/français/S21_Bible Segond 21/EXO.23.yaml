document_id: EXO.23
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Règles morales
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: »Tu ne propageras pas de faux bruit. Tu ne t'associeras pas au méchant pour faire un faux témoignage.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: »Tu ne suivras pas la majorité pour faire le mal et tu ne déposeras pas dans un procès en te mettant du côté du grand nombre pour violer la justice.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: »Tu ne favoriseras pas le faible dans son procès.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '»Si tu rencontres le bœuf ou l''âne de ton ennemi alors qu''il est égaré, tu le lui ramèneras. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Si tu vois l'âne de ton ennemi s'effondrer sous sa charge et que tu hésites à le décharger, tu l'aideras néanmoins à le décharger.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: »Tu ne porteras pas atteinte au droit du pauvre dans son procès.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '»Tu t''éloigneras de tout mensonge et tu ne feras pas mourir l''innocent et le juste, car je ne déclarerai pas juste le coupable. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tu n'accepteras aucun cadeau, car les cadeaux aveuglent ceux qui ont les yeux ouverts et pervertissent les paroles des justes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: »Tu n'opprimeras pas l'étranger. Vous-mêmes, vous savez ce qu'éprouve l'étranger car vous avez été étrangers en Egypte.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les fêtes et le sabbat
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '»Pendant 6 ans, tu ensemenceras la terre et tu en récolteras le produit. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mais la septième année, tu lui donneras du répit et tu la laisseras en repos. Les pauvres de ton peuple en jouiront et les bêtes des champs mangeront ce qui restera. Tu feras de même pour ta vigne et pour tes oliviers.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: »Pendant 6 jours, tu feras ton travail, mais le septième jour, tu te reposeras afin que ton bœuf et ton âne aient du repos, afin que le fils de ton esclave et l'étranger reprennent leur souffle.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '»Vous respecterez tout ce que je vous ai dit et vous ne mentionnerez pas le nom d''autres dieux: qu''on ne l''entende pas sortir de votre bouche.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '»Trois fois par an, tu célébreras des fêtes en mon honneur. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tu observeras la fête des pains sans levain. Pendant 7 jours, au moment fixé lors du mois des épis, tu mangeras des pains sans levain, comme je t''en ai donné l''ordre. En effet, c''est au cours de ce mois que tu es sorti d''Egypte. On ne se présentera pas devant moi les mains vides. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Tu observeras la fête de la moisson. C''est la fête des premiers fruits de ton travail, de ce que tu auras semé dans les champs. Tu observeras aussi la fête de la récolte, à la fin de l''année, quand tu récolteras dans les champs le fruit de ton travail. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Trois fois par an, tous les hommes se présenteront devant le Seigneur, l'Eternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: »Tu n'offriras pas le sang de la victime sacrifiée en mon honneur sur du pain levé et on ne gardera pas sa graisse pendant la nuit jusqu'au matin.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: »Tu apporteras à la maison de l'Eternel, ton Dieu, les tout premiers produits de ton sol. Tu ne feras pas cuire un chevreau dans le lait de sa mère.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Instructions et promesses pour la conquête
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '»Voici que j''envoie un ange devant toi pour te protéger en chemin et pour te faire arriver à l''endroit que j''ai préparé. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fais bien attention en sa présence et écoute-le, ne lui résiste pas. En effet, il ne pardonnera pas vos péchés, car mon nom est en lui. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Mais si tu l''écoutes et si tu fais tout ce que je te dirai, je serai l''ennemi de tes ennemis et l''adversaire de tes adversaires. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Mon ange marchera devant toi et te conduira chez les Amoréens, les Hittites, les Phéréziens, les Cananéens, les Héviens et les Jébusiens, et je les exterminerai.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '»Tu ne te prosterneras pas devant leurs dieux et tu ne les serviras pas. Tu n''imiteras pas le comportement de ces peuples. Au contraire, tu les détruiras et tu briseras leurs statues. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Vous servirez l''Eternel, votre Dieu, et il bénira votre pain et votre eau. J''éloignerai la maladie du milieu de toi. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Il n'y aura dans ton pays ni femme qui avorte, ni femme stérile. Je te donnerai une longue vie.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: '»J''enverrai ma terreur devant toi, je mettrai en déroute tous les peuples chez lesquels tu arriveras et je mettrai tous tes ennemis en fuite devant toi. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'J''enverrai les frelons devant toi et ils chasseront loin de toi les Héviens, les Cananéens et les Hittites. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Je ne les chasserai pas en une seule année loin de toi, sinon le pays deviendrait un désert et les bêtes des champs se multiplieraient à ton détriment. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'C''est peu à peu que je les chasserai loin de toi, jusqu''à ce que tu aies suffisamment augmenté en nombre pour pouvoir hériter du pays. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Je fixerai tes frontières: ton territoire ira de la mer des Roseaux à la mer Méditerranée, et du désert du Sinaï à l''Euphrate. En effet, je livrerai entre vos mains les habitants de cette région et tu les chasseras devant toi. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Tu ne feras aucune alliance avec eux ni avec leurs dieux. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ils n''habiteront pas dans ton pays, sinon ils te feraient pécher contre moi: tu servirais leurs dieux et ce serait un piège pour toi.»'
