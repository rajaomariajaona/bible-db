document_id: 1SA.18
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Alors que David finissait de parler à Saül, Jonathan s''attacha à lui. Jonathan aima David comme lui-même. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ce jour-là, Saül garda David chez lui et ne le laissa pas retourner chez son père. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jonathan fit alliance avec David, parce qu''il l''aimait comme lui-même. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Il retira le manteau qu'il portait pour le donner à David et il lui donna ses vêtements, y compris son épée, son arc et sa ceinture.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jalousie et hostilité de Saül envers David
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: David partait en campagne et il réussissait partout où l'envoyait Saül. Celui-ci le mit à la tête des hommes de guerre, et il plaisait à tout le peuple, même aux serviteurs de Saül.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Alors qu''ils revenaient de guerre, après que David eut tué le Philistin, les femmes sortirent de toutes les villes d''Israël à la rencontre du roi Saül. Elles chantaient et dansaient au son des tambourins et des triangles, et elles poussaient des cris de joie. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Les femmes qui chantaient se répondaient les unes aux autres en disant: «Saül a frappé ses 1000, et David ses 10''000.» '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Saül fut très irrité, il prit très mal la situation. Il dit: «On en donne 10''000 à David, et c''est à moi que l''on donne les 1000! Il ne lui manque plus que la royauté!» '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Saül regarda David avec malveillance à partir de ce jour et par la suite.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Le lendemain, le mauvais esprit envoyé par Dieu vint sur Saül, qui eut des accès de délire au milieu de sa maison. David jouait comme les autres jours et Saül avait sa lance à la main. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Saül leva sa lance en se disant: «Je vais clouer David contre la paroi.» Mais David l''évita par deux fois. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Saül éprouvait de la peur vis-à-vis de David, parce que l''Eternel était avec David alors qu''il s''était retiré de lui. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il l''éloigna de lui et l''établit chef de mille hommes. David partait en campagne et en revenait à la tête du peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il réussissait dans toutes ses entreprises et l''Eternel était avec lui. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Voyant qu''il réussissait toujours, Saül avait peur de lui. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: En revanche, tout Israël et tout Juda aimaient David, parce qu'il partait en campagne et en revenait à leur tête.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Saül dit à David: «Je vais te donner en mariage ma fille aînée Mérab. Seulement, sers-moi comme un vaillant homme et mène les guerres de l''Eternel.» Il se disait: «Je ne veux pas porter la main contre lui. Que ce soient les Philistins qui le fassent!» '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'David répondit à Saül: «Qui suis-je, qu''est-ce que ma vie et qu''est-ce que le clan de mon père en Israël, pour que je devienne le gendre du roi?» '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Lorsque le moment où Mérab, la fille de Saül, devait être donnée en mariage à David arriva, elle fut donnée à Adriel, de Mehola.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Mical, la fille de Saül, tomba amoureuse de David. On en informa Saül et cela lui plut. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Il se disait: «Je la lui donnerai en mariage. Ainsi, elle représentera un piège pour lui et il tombera sous les coups des Philistins.» Saül dit une nouvelle fois à David: «Aujourd''hui tu vas devenir mon gendre.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Saül donna l''ordre suivant à ses serviteurs: «Parlez en secret à David et dites-lui: ‘Le roi a de l''affection pour toi et tous ses serviteurs t''aiment. Deviens maintenant son gendre!’» '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Les serviteurs de Saül répétèrent ces paroles à David et il répondit: «Croyez-vous qu''il soit facile de devenir le gendre du roi? Je ne suis qu''un homme pauvre, sans importance.» '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Les serviteurs de Saül lui rapportèrent ce qu''avait répondu David. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Saül dit: «Voici comment vous parlerez à David: ‘Le roi ne réclame aucune dot. Toutefois, il désire 100 prépuces de Philistins pour être vengé de ses ennemis.’» Saül avait le projet de faire tomber David entre les mains des Philistins. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Les serviteurs de Saül rapportèrent ces paroles à David, et ce dernier accepta les conditions qui lui étaient posées pour devenir le gendre du roi. Avant le délai fixé, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: David se leva, partit avec ses hommes et tua 200 Philistins. Il rapporta leurs prépuces et les livra tous au roi afin de devenir son gendre. Alors Saül lui donna sa fille Mical pour femme.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Saül vit et comprit que l''Eternel était avec David. Quant à sa fille Mical, elle aimait David. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Saül eut de plus en plus peur de David et il fut toute sa vie son ennemi. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Chaque fois que les princes des Philistins partaient au combat, David avait plus de succès que tous les serviteurs de Saül, et son nom devint très célèbre.
