document_id: REV.2,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Lettre à l'Eglise d'Ephèse
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Ecris à l''ange de l''Eglise d''Ephèse: ‘Voici ce que dit celui qui tient les sept étoiles dans sa main droite, celui qui marche au milieu des sept chandeliers d''or: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ne redoute pas ce que tu vas souffrir. Voici, le diable va jeter quelques-uns d''entre vous en prison afin que vous soyez mis à l''épreuve, et vous aurez dix jours de détresse. Sois fidèle jusqu''à la mort et je te donnerai la couronne de vie. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Que celui qui a des oreilles écoute ce que l''Esprit dit aux Eglises: Le vainqueur n''aura pas à souffrir de la seconde mort.’'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Lettre à l'Eglise de Pergame
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Ecris à l''ange de l''Eglise de Pergame: ‘Voici ce que dit celui qui tient l''épée aiguë à deux tranchants: '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je connais [tes œuvres et] l''endroit où tu es établi: là se trouve le trône de Satan. Tu es fermement attaché à mon nom et tu n''as pas renié la foi en moi, même durant les jours où Antipas, mon témoin fidèle, a été mis à mort chez vous, là où Satan est établi. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais j''ai certaines choses contre toi: tu as là des gens attachés à la doctrine de Balaam, qui enseignait à Balak à tendre un piège aux Israélites pour qu''ils mangent des viandes sacrifiées aux idoles et se livrent à l''immoralité sexuelle. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi, toi aussi, tu as des gens attachés de la même manière à la doctrine des Nicolaïtes. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Repens-toi donc, sinon je viendrai bientôt à toi et je les combattrai avec l''épée de ma bouche. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Que celui qui a des oreilles écoute ce que l''Esprit dit aux Eglises: Au vainqueur je donnerai [à manger] de la manne'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Manne: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'allusion à la nourriture accordée chaque jour, durant 40 ans, par Dieu aux Israélites après leur sortie d''Egypte, pendant leur parcours dans le désert (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Exode 16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '). Jésus s''était comparé à ce pain descendu du ciel (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jean 6.30-31
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 47-58
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' cachée, et je lui donnerai un caillou blanc. Sur ce caillou est écrit un nom nouveau que personne ne connaît, si ce n''est celui qui le reçoit.’'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Lettre à l'Eglise de Thyatire
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Ecris à l''ange de l''Eglise de Thyatire: ‘Voici ce que dit le Fils de Dieu, celui qui a les yeux comme une flamme de feu et dont les pieds sont semblables à du bronze ardent: '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je connais tes œuvres, ton amour, ta foi, ton service et ta persévérance. Je sais que tes dernières œuvres sont plus nombreuses que les premières. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je connais tes œuvres, ton travail et ta persévérance. Je sais que tu ne peux pas supporter les méchants. Tu as mis à l''épreuve ceux qui se prétendent apôtres sans l''être, et tu les as trouvés menteurs. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais ce que j''ai contre toi, c''est que tu laisses faire Jézabel, cette femme qui se prétend prophétesse. Elle enseigne et égare mes serviteurs pour qu''ils se livrent à l''immoralité sexuelle et mangent des viandes sacrifiées aux idoles. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je lui ai donné du temps pour changer d''attitude, mais elle ne veut pas se détourner de son immoralité. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici, je vais la jeter sur un lit et envoyer un grand tourment à ceux qui commettent l''adultère avec elle, s''ils ne se repentent pas de leurs œuvres. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je frapperai de mort ses enfants, et toutes les Eglises reconnaîtront que je suis celui qui examine les reins et les cœurs, et je traiterai chacun de vous conformément à ses œuvres. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quant à vous, les autres croyants de Thyatire, qui n''acceptez pas cet enseignement et qui n''avez pas connu les profondeurs de Satan – comme ils les appellent – je vous dis: Je ne mettrai pas sur vous d''autre fardeau. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Seulement, ce que vous avez, tenez-le fermement jusqu''à ce que je vienne. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Au vainqueur, à celui qui accomplit mes œuvres jusqu''à la fin, '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: je donnerai
    - type: text
      text: ' autorité sur '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: les nations
    - type: text
      text: '. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Il les dirigera avec un sceptre de fer, comme on brise les vases d'argile
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.26-27 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Je donnerai… argile: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation du '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Psaume 2.8-9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', ainsi que moi-même j''en ai reçu le pouvoir de mon Père, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et je lui donnerai l''étoile du matin. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Que celui qui a des oreilles écoute ce que l'Esprit dit aux Eglises.’
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Oui, tu as de la persévérance, tu as souffert à cause de mon nom et tu ne t''es pas lassé. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais ce que j''ai contre toi, c''est que tu as abandonné ton premier amour. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Souviens-toi donc d'où tu es tombé, repens-toi et pratique tes premières œuvres. Sinon, je viendrai [bientôt] à toi et j'enlèverai ton chandelier de sa place, à moins que tu ne changes d'attitude
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Repens-toi… changes d''attitude: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: même verbe grec; il désigne littéralement un changement de pensée et renvoie à une transformation radicale de la personne, qui renonce à ses attitudes fautives pour adopter un nouveau comportement et une nouvelle perspective, conformes à la volonté de Dieu.
      marker-yv: yv-n
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cependant, tu as ceci pour toi: tu détestes les œuvres des Nicolaïtes, tout comme je les déteste, moi aussi. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Que celui qui a des oreilles écoute ce que l''Esprit dit aux Eglises: Au vainqueur je donnerai à manger du fruit de l''arbre de vie, qui est dans le paradis de Dieu.’'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Lettre à l'Eglise de Smyrne
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Ecris à l''ange de l''Eglise de Smyrne: ‘Voici ce que dit le premier et le dernier, celui qui était mort et qui est revenu à la vie: '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je connais [tes œuvres,] ta détresse et ta pauvreté – et pourtant tu es riche – ainsi que les calomnies de ceux qui se disent juifs et ne le sont pas mais qui sont une synagogue de Satan. '
