document_id: 1CO.2,152
type_code: fra
verses:
  '1':
  - type: heading
    content: L'exemple de Paul
  - type: text
    content: 'Pour ma part, frères et sœurs, lorsque je suis venu chez vous, ce n''est pas avec une supériorité de langage ou de sagesse que je suis venu vous annoncer le témoignage de Dieu, '
  '10':
  - type: text
    content: 'Or, c''est à nous que Dieu l''a révélé, par son Esprit, car l''Esprit examine tout, même les profondeurs de Dieu. '
  '11':
  - type: text
    content: En effet, qui parmi les hommes connaît les pensées de l'homme, si ce n'est l'esprit de l'homme qui est en lui? De même, personne ne peut connaître les pensées de Dieu, si ce n'est l'Esprit de Dieu.
  '12':
  - type: text
    content: 'Or nous, nous n''avons pas reçu l''esprit du monde, mais l''Esprit qui vient de Dieu, afin de connaître les bienfaits que Dieu nous a donnés par sa grâce. '
  '13':
  - type: text
    content: 'Et nous en parlons non avec les paroles qu''enseigne la sagesse humaine, mais avec celles qu''enseigne l''Esprit [saint]. Ainsi nous employons un langage spirituel pour exprimer ce qui est spirituel. '
  '14':
  - type: text
    content: 'Mais l''homme naturel n''accepte pas ce qui vient de l''Esprit de Dieu, car c''est une folie pour lui; il est même incapable de le comprendre, parce que c''est spirituellement qu''on en juge. '
  '15':
  - type: text
    content: 'L''homme dirigé par l''Esprit, au contraire, juge de tout et n''est lui-même jugé par personne. '
  '16':
  - type: text
    content: 'En effet, '
  - type: text
    content: qui a connu la pensée du Seigneur et pourrait l'instruire?
  - type: note
    content: 'Qui a connu… l''instruire: citation d''Esaïe 40.13.'
  - type: text
    content: Or nous, nous avons la pensée de Christ.
  '2':
  - type: text
    content: 'car j''avais décidé de ne connaître parmi vous rien d''autre que Jésus-Christ, et Jésus-Christ crucifié. '
  '3':
  - type: text
    content: 'J''ai été faible, craintif et tout tremblant chez vous. '
  '4':
  - type: text
    content: 'Ma parole et ma prédication ne reposaient pas sur les discours persuasifs de la sagesse [humaine], mais sur une démonstration d''Esprit et de puissance, '
  '5':
  - type: text
    content: afin que votre foi soit fondée non sur la sagesse des hommes, mais sur la puissance de Dieu.
  '6':
  - type: text
    content: 'C''est pourtant bien une sagesse que nous enseignons parmi les hommes mûrs, mais une sagesse qui n''est pas de ce temps ni des chefs de ce temps, qui sont voués à la destruction. '
  '7':
  - type: text
    content: 'Non, nous annonçons la sagesse de Dieu mystérieuse et cachée, celle que Dieu, avant tous les temps, avait préparée d''avance pour notre gloire. '
  '8':
  - type: text
    content: 'Cette sagesse, aucun des chefs de ce temps ne l''a connue, car, s''ils l''avaient connue, ils n''auraient pas crucifié le Seigneur de la gloire. '
  '9':
  - type: text
    content: 'Mais, comme il est écrit, '
  - type: text
    content: ce que l'œil n'a pas vu, ce que l'oreille n'a pas entendu, ce qui n'est pas monté au cœur de l'homme, Dieu l'a préparé pour ceux qui l'aiment
  - type: note
    content: 'Ce que… l''aiment: citation d''Esaïe 64.3.'
  - type: text
    content: '. '
