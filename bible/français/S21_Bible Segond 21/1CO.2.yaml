document_id: 1CO.2,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L'exemple de Paul
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Pour ma part, frères et sœurs, lorsque je suis venu chez vous, ce n''est pas avec une supériorité de langage ou de sagesse que je suis venu vous annoncer le témoignage de Dieu, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Or, c''est à nous que Dieu l''a révélé, par son Esprit, car l''Esprit examine tout, même les profondeurs de Dieu. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: En effet, qui parmi les hommes connaît les pensées de l'homme, si ce n'est l'esprit de l'homme qui est en lui? De même, personne ne peut connaître les pensées de Dieu, si ce n'est l'Esprit de Dieu.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Or nous, nous n''avons pas reçu l''esprit du monde, mais l''Esprit qui vient de Dieu, afin de connaître les bienfaits que Dieu nous a donnés par sa grâce. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Et nous en parlons non avec les paroles qu''enseigne la sagesse humaine, mais avec celles qu''enseigne l''Esprit [saint]. Ainsi nous employons un langage spirituel pour exprimer ce qui est spirituel. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Mais l''homme naturel n''accepte pas ce qui vient de l''Esprit de Dieu, car c''est une folie pour lui; il est même incapable de le comprendre, parce que c''est spirituellement qu''on en juge. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'L''homme dirigé par l''Esprit, au contraire, juge de tout et n''est lui-même jugé par personne. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'En effet, '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: qui a connu la pensée du Seigneur et pourrait l'instruire?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Qui a connu… l''instruire: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: citation d'
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Esaïe 40.13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Or nous, nous avons la pensée de Christ.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'car j''avais décidé de ne connaître parmi vous rien d''autre que Jésus-Christ, et Jésus-Christ crucifié. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'J''ai été faible, craintif et tout tremblant chez vous. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ma parole et ma prédication ne reposaient pas sur les discours persuasifs de la sagesse [humaine], mais sur une démonstration d''Esprit et de puissance, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: afin que votre foi soit fondée non sur la sagesse des hommes, mais sur la puissance de Dieu.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'C''est pourtant bien une sagesse que nous enseignons parmi les hommes mûrs, mais une sagesse qui n''est pas de ce temps ni des chefs de ce temps, qui sont voués à la destruction. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Non, nous annonçons la sagesse de Dieu mystérieuse et cachée, celle que Dieu, avant tous les temps, avait préparée d''avance pour notre gloire. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Cette sagesse, aucun des chefs de ce temps ne l''a connue, car, s''ils l''avaient connue, ils n''auraient pas crucifié le Seigneur de la gloire. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Mais, comme il est écrit, '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: ce que l'œil n'a pas vu, ce que l'oreille n'a pas entendu, ce qui n'est pas monté au cœur de l'homme, Dieu l'a préparé pour ceux qui l'aiment
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ce que… l''aiment: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: citation d'
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Esaïe 64.3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
