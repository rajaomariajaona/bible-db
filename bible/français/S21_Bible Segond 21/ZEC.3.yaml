document_id: ZEC.3,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Vision du grand-prêtre
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Il m''a fait voir le grand-prêtre Josué, debout devant l''ange de l''Eternel, et Satan qui se tenait à sa droite pour l''accuser. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ce jour-là, déclare l'Eternel, le maître de l'univers, vous vous inviterez les uns les autres au milieu des vignes et des figuiers.»
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'L''Eternel a dit à Satan: «Que l''Eternel te réduise au silence, Satan, que l''Eternel te réduise au silence, lui qui a choisi Jérusalem! Celui-ci n''est-il pas un bout de bois arraché au feu?» '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Or Josué portait des habits sales et se tenait debout devant l''ange. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'L''ange a pris la parole et a dit à ceux qui se tenaient devant lui: «Enlevez-lui les habits sales!» Puis il a dit à Josué: «Regarde, je t''enlève ta faute et je te mets des habits de fête.» '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'J''ai dit: «Qu''on mette sur sa tête un turban pur!» Ils ont placé un turban pur sur sa tête et lui ont mis des habits. L''ange de l''Eternel était là.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'L''ange de l''Eternel a fait cette déclaration à Josué: '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: '«Voici ce que dit l''Eternel, le maître de l''univers: Si tu marches dans mes voies et si tu respectes mes ordres, tu jugeras ma maison, tu garderas mes parvis et je te donnerai libre accès parmi ceux qui sont ici. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ecoute donc, Josué, grand-prêtre, toi et tes compagnons qui sont assis devant toi, car ce sont des hommes qui serviront de signes. Je ferai venir mon serviteur, le germe. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'En effet, voici la pierre que j''ai placée devant Josué: il y a sept yeux sur cette seule pierre. Je graverai moi-même ce qui doit y être gravé, déclare l''Eternel, le maître de l''univers, et j''enlèverai la faute de ce pays en un jour. '
