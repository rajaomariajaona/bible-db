document_id: PSA.46,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu, le souverain refuge
  - type: text
    content: Au chef de chœur. Des descendants de Koré, pour sopranos, chant.
  '10':
  - type: text
    content: C'est lui qui a fait cesser les combats jusqu'aux extrémités de la terre;
  - type: text
    content: il a brisé l'arc et rompu la lance,
  - type: text
    content: il a détruit par le feu les chars de guerre.
  '11':
  - type: text
    content: «Arrêtez, et sachez que je suis Dieu!
  - type: text
    content: Je domine sur les nations, je domine sur la terre.»
  '12':
  - type: text
    content: L'Eternel, le maître de l'univers, est avec nous,
  - type: text
    content: 'le Dieu de Jacob est pour nous une forteresse. '
  - type: text
    content: – Pause.
  '2':
  - type: text
    content: Dieu est pour nous un refuge et un appui,
  - type: text
    content: un secours toujours présent dans la détresse.
  '3':
  - type: text
    content: C'est pourquoi nous sommes sans crainte quand la terre est bouleversée,
  - type: text
    content: quand les montagnes sont ébranlées au cœur des mers
  '4':
  - type: text
    content: et que les flots de la mer mugissent, écument,
  - type: text
    content: 'se soulèvent jusqu''à faire trembler les montagnes. '
  - type: text
    content: – Pause.
  '5':
  - type: text
    content: Les bras d'un fleuve réjouissent la ville de Dieu,
  - type: text
    content: le sanctuaire des demeures du Très-Haut.
  '6':
  - type: text
    content: 'Dieu est au milieu d''elle: elle n''est pas ébranlée;'
  - type: text
    content: Dieu la secourt dès le point du jour.
  '7':
  - type: text
    content: 'Des nations s''agitent, des royaumes sont ébranlés:'
  - type: text
    content: il fait entendre sa voix, et la terre tombe en défaillance.
  '8':
  - type: text
    content: L'Eternel, le maître de l'univers, est avec nous,
  - type: text
    content: 'le Dieu de Jacob est une forteresse pour nous. '
  - type: text
    content: – Pause.
  '9':
  - type: text
    content: Venez contempler ce que l'Eternel a fait,
  - type: text
    content: les actes dévastateurs qu'il a accomplis sur la terre!
