document_id: PSA.46
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dieu, le souverain refuge
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef de chœur. Des descendants de Koré, pour sopranos, chant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Dieu est pour nous un refuge et un appui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un secours toujours présent dans la détresse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: C'est pourquoi nous sommes sans crainte quand la terre est bouleversée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand les montagnes sont ébranlées au cœur des mers
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: et que les flots de la mer mugissent, écument,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'se soulèvent jusqu''à faire trembler les montagnes. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: – Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Les bras d'un fleuve réjouissent la ville de Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le sanctuaire des demeures du Très-Haut.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dieu est au milieu d''elle: elle n''est pas ébranlée;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dieu la secourt dès le point du jour.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Des nations s''agitent, des royaumes sont ébranlés:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il fait entendre sa voix, et la terre tombe en défaillance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: L'Eternel, le maître de l'univers, est avec nous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'le Dieu de Jacob est une forteresse pour nous. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: – Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Venez contempler ce que l'Eternel a fait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les actes dévastateurs qu'il a accomplis sur la terre!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: C'est lui qui a fait cesser les combats jusqu'aux extrémités de la terre;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a brisé l'arc et rompu la lance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a détruit par le feu les chars de guerre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: «Arrêtez, et sachez que je suis Dieu!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je domine sur les nations, je domine sur la terre.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: L'Eternel, le maître de l'univers, est avec nous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'le Dieu de Jacob est pour nous une forteresse. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: – Pause.
