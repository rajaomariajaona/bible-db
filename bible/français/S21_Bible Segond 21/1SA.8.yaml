document_id: 1SA.8,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Demande d'un roi par Israël
  - type: text
    content: 'Lorsque Samuel devint vieux, il établit ses fils juges sur Israël. '
  '10':
  - type: text
    content: 'Samuel rapporta toutes les paroles de l''Eternel au peuple qui lui demandait un roi. '
  '11':
  - type: text
    content: 'Il dit: «Voici quels seront les droits du roi qui régnera sur vous. Il prendra vos fils et les mettra sur ses chars ou parmi ses cavaliers, ou encore ils devront courir devant son char. '
  '12':
  - type: text
    content: 'Il fera d''eux des chefs de milliers et des chefs de cinquantaines. Il les emploiera à labourer ses terres, à récolter ses moissons, à fabriquer ses armes de guerre et l''équipement de ses chars. '
  '13':
  - type: text
    content: 'Il prendra vos filles pour faire d''elles des parfumeuses, des cuisinières et des boulangères. '
  '14':
  - type: text
    content: 'Il prendra la meilleure partie de vos champs, de vos vignes et de vos oliviers et la donnera à ses serviteurs. '
  '15':
  - type: text
    content: 'Il prendra la dîme du produit de vos champs et de vos vignes et la donnera à ses serviteurs. '
  '16':
  - type: text
    content: 'Il prendra vos esclaves et vos servantes, vos meilleurs bœufs et vos ânes et se servira d''eux pour ses travaux. '
  '17':
  - type: text
    content: 'Il prendra la dîme de vos troupeaux et vous serez vous-mêmes ses esclaves. '
  '18':
  - type: text
    content: Alors vous crierez contre votre roi, celui que vous vous serez choisi, mais l'Eternel ne vous exaucera pas.»
  '19':
  - type: text
    content: 'Le peuple refusa d''écouter Samuel. «Cela ne fait rien, dirent-ils, il y aura quand même un roi sur nous, '
  '2':
  - type: text
    content: 'Son fils aîné se nommait Joël, et le second Abija. Ils étaient juges à Beer-Shéba. '
  '20':
  - type: text
    content: 'et nous aussi nous serons pareils à toutes les nations: notre roi nous jugera, il marchera à notre tête et conduira nos guerres.» '
  '21':
  - type: text
    content: 'Après avoir entendu toutes les paroles du peuple, Samuel les répéta à l''Eternel, '
  '22':
  - type: text
    content: 'et l''Eternel lui dit: «Ecoute-les et établis un roi sur eux.» Samuel dit aux hommes d''Israël: «Que chacun retourne dans sa ville.»'
  '3':
  - type: text
    content: 'Les fils de Samuel ne marchèrent pas sur ses traces; ils se livraient à des profits malhonnêtes, acceptaient des cadeaux et tordaient le droit. '
  '4':
  - type: text
    content: 'Tous les anciens d''Israël se rassemblèrent et allèrent trouver Samuel à Rama. '
  '5':
  - type: text
    content: 'Ils lui dirent: «Te voilà vieux et tes fils ne marchent pas sur tes traces. Maintenant, établis sur nous un roi pour nous juger, comme on en trouve dans toutes les nations.» '
  '6':
  - type: text
    content: 'Cela déplut à Samuel qu''ils disent: «Donne-nous un roi pour nous juger», et il pria l''Eternel. '
  '7':
  - type: text
    content: 'L''Eternel dit à Samuel: «Ecoute le peuple dans tout ce qu''il te dira, car ce n''est pas toi qu''ils rejettent, c''est moi, afin que je ne règne plus sur eux. '
  '8':
  - type: text
    content: 'Ils agissent envers toi comme ils l''ont toujours fait depuis que je les ai fait sortir d''Egypte jusqu''à aujourd''hui: ils m''ont abandonné pour servir d''autres dieux. '
  '9':
  - type: text
    content: Ecoute-les donc, mais donne-leur des avertissements, fais-leur connaître les droits du roi qui régnera sur eux.»
