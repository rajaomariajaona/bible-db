document_id: NUM.1,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: L'organisation d'Israël dans le désert
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: 1.1–10.36
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Recensement des Israélites
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'L''Eternel parla à Moïse dans le désert du Sinaï, dans la tente de la rencontre, le premier jour du deuxième mois, la deuxième année après leur sortie d''Egypte. Il dit: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'pour les fils de Joseph, pour Ephraïm: Elishama, fils d''Ammihud, et pour Manassé: Gamliel, fils de Pedahtsur; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'pour Benjamin: Abidan, fils de Guideoni; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'pour Dan: Ahiézer, fils d''Ammishaddaï; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'pour Aser: Paguiel, fils d''Ocran; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'pour Gad: Eliasaph, fils de Déuel; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'pour Nephthali: Ahira, fils d''Enan. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Tels sont les princes des tribus de leurs ancêtres, les chefs des milliers d'Israël appelés parmi l'assemblée.»
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Moïse et Aaron prirent comme adjoints les hommes qui avaient été nommément désignés, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'et ils convoquèrent toute l''assemblée le premier jour du deuxième mois. On enregistra les Israélites sur la base de leurs clans, en fonction de leur famille, en comptant les noms de tous les individus âgés de 20 ans et plus. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Moïse les dénombra dans le désert du Sinaï, comme l'Eternel le lui avait ordonné.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '«Faites le dénombrement de toute l''assemblée des Israélites en fonction de leur clan, de leur famille. Vous compterez les noms de tous les individus de sexe masculin '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'On enregistra les descendants de Ruben, l''aîné d''Israël, en fonction de leur clan, de leur famille, en comptant les noms de tous les individus de sexe masculin âgés de 20 ans et plus, tous ceux qui étaient aptes au service militaire. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: On dénombra 46'500 hommes dans la tribu de Ruben.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'On enregistra les descendants de Siméon en fonction de leur clan, de leur famille. On les dénombra en comptant les noms de tous les individus de sexe masculin âgés de 20 ans et plus, tous ceux qui étaient aptes au service militaire. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: On dénombra 59'300 hommes dans la tribu de Siméon.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'On enregistra les descendants de Gad en fonction de leur clan, de leur famille, en comptant les noms des hommes âgés de 20 ans et plus, tous ceux qui étaient aptes au service militaire. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: On dénombra 45'650 hommes dans la tribu de Gad.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'On enregistra les descendants de Juda en fonction de leur clan, de leur famille, en comptant les noms des hommes âgés de 20 ans et plus, tous ceux qui étaient aptes au service militaire. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: On dénombra 74'600 hommes dans la tribu de Juda.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'On enregistra les descendants d''Issacar en fonction de leur clan, de leur famille, en comptant les noms des hommes âgés de 20 ans et plus, tous ceux qui étaient aptes au service militaire. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: On dénombra 54'400 hommes dans la tribu d'Issacar.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'âgés de 20 ans et plus, tous les membres du peuple d''Israël aptes au service militaire. Vous les dénombrerez par corps d''armée, Aaron et toi. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'On enregistra les descendants de Zabulon en fonction de leur clan, de leur famille, en comptant les noms des hommes âgés de 20 ans et plus, tous ceux qui étaient aptes au service militaire. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: On dénombra 57'400 hommes dans la tribu de Zabulon.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Pour les fils de Joseph, on enregistra les descendants d''Ephraïm en fonction de leur clan, de leur famille, en comptant les noms des hommes âgés de 20 ans et plus, tous ceux qui étaient aptes au service militaire. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'On dénombra 40''500 hommes dans la tribu d''Ephraïm. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'On enregistra les descendants de Manassé en fonction de leur clan, de leur famille, en comptant les noms des hommes âgés de 20 ans et plus, tous ceux qui étaient aptes au service militaire. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: On dénombra 32'200 hommes dans la tribu de Manassé.
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'On enregistra les descendants de Benjamin en fonction de leur clan, de leur famille, en comptant les noms des hommes âgés de 20 ans et plus, tous ceux qui étaient aptes au service militaire. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: On dénombra 35'400 hommes dans la tribu de Benjamin.
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'On enregistra les descendants de Dan en fonction de leur clan, de leur famille, en comptant les noms des hommes âgés de 20 ans et plus, tous ceux qui étaient aptes au service militaire. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: On dénombra 62'700 hommes dans la tribu de Dan.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Il y aura avec vous un homme par tribu, un chef de famille.
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'On enregistra les descendants d''Aser en fonction de leur clan, de leur famille, en comptant les noms des hommes âgés de 20 ans et plus, tous ceux qui étaient aptes au service militaire. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: On dénombra 41'500 hommes dans la tribu d'Aser.
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'On enregistra les descendants de Nephthali en fonction de leur clan, de leur famille, en comptant les noms des hommes âgés de 20 ans et plus, tous ceux qui étaient aptes au service militaire. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: On dénombra 53'400 hommes dans la tribu de Nephthali.
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Tels sont ceux dont le dénombrement fut fait par Moïse et Aaron ainsi que par les douze princes d''Israël; il y avait un homme pour chacune des familles. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'On dénombra en fonction de leur famille tous les Israélites âgés de 20 ans et plus, tous les hommes d''Israël qui étaient aptes au service militaire. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: On dénombra au total 603'550 hommes.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Responsabilités des Lévites
    marker-yv: yv-h
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'Les Lévites, selon la tribu de leurs ancêtres, ne furent pas inclus dans ce dénombrement. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'L''Eternel avait transmis ces instructions à Moïse: '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: '«Tu ne feras pas le dénombrement de la tribu de Lévi et tu ne compteras pas ses membres au milieu des Israélites. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: '»Voici le nom des hommes qui se tiendront à vos côtés. Pour Ruben: Elitsur, fils de Shedéur; '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'Confie aux Lévites la responsabilité du tabernacle du témoignage, de tous ses ustensiles et de tout ce qui lui appartient. Ils porteront le tabernacle et tous ses ustensiles, ils en feront le service et ils camperont autour du tabernacle. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'Quand le tabernacle partira, les Lévites le démonteront; quand le tabernacle campera, les Lévites le dresseront. Si quelqu''un d''autre s''en approche, il sera puni de mort. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: 'Les Israélites camperont chacun dans son camp, chacun près de son étendard, selon leurs corps d''armée. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: 'Les Lévites, quant à eux, camperont autour du tabernacle du témoignage afin que ma colère n''éclate pas contre l''assemblée des Israélites. Les Lévites auront la responsabilité du tabernacle du témoignage.» '
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: Les Israélites se conformèrent à tous les ordres que l'Eternel avait donnés à Moïse, c'est ce qu'ils firent.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'pour Siméon: Shelumiel, fils de Tsurishaddaï; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'pour Juda: Nachshon, fils d''Amminadab; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'pour Issacar: Nathanaël, fils de Tsuar; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'pour Zabulon: Eliab, fils de Hélon; '
