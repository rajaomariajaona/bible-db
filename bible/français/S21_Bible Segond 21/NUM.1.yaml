document_id: NUM.1,152
type_code: fra
verses:
  '1':
  - type: heading
    content: L'organisation d'Israël dans le désert
  - type: heading
    content: 1.1–10.36
  - type: heading
    content: Recensement des Israélites
  - type: text
    content: 'L''Eternel parla à Moïse dans le désert du Sinaï, dans la tente de la rencontre, le premier jour du deuxième mois, la deuxième année après leur sortie d''Egypte. Il dit: '
  '10':
  - type: text
    content: 'pour les fils de Joseph, pour Ephraïm: Elishama, fils d''Ammihud, et pour Manassé: Gamliel, fils de Pedahtsur; '
  '11':
  - type: text
    content: 'pour Benjamin: Abidan, fils de Guideoni; '
  '12':
  - type: text
    content: 'pour Dan: Ahiézer, fils d''Ammishaddaï; '
  '13':
  - type: text
    content: 'pour Aser: Paguiel, fils d''Ocran; '
  '14':
  - type: text
    content: 'pour Gad: Eliasaph, fils de Déuel; '
  '15':
  - type: text
    content: 'pour Nephthali: Ahira, fils d''Enan. '
  '16':
  - type: text
    content: Tels sont les princes des tribus de leurs ancêtres, les chefs des milliers d'Israël appelés parmi l'assemblée.»
  '17':
  - type: text
    content: 'Moïse et Aaron prirent comme adjoints les hommes qui avaient été nommément désignés, '
  '18':
  - type: text
    content: 'et ils convoquèrent toute l''assemblée le premier jour du deuxième mois. On enregistra les Israélites sur la base de leurs clans, en fonction de leur famille, en comptant les noms de tous les individus âgés de 20 ans et plus. '
  '19':
  - type: text
    content: Moïse les dénombra dans le désert du Sinaï, comme l'Eternel le lui avait ordonné.
  '2':
  - type: text
    content: '«Faites le dénombrement de toute l''assemblée des Israélites en fonction de leur clan, de leur famille. Vous compterez les noms de tous les individus de sexe masculin '
  '20':
  - type: text
    content: 'On enregistra les descendants de Ruben, l''aîné d''Israël, en fonction de leur clan, de leur famille, en comptant les noms de tous les individus de sexe masculin âgés de 20 ans et plus, tous ceux qui étaient aptes au service militaire. '
  '21':
  - type: text
    content: On dénombra 46'500 hommes dans la tribu de Ruben.
  '22':
  - type: text
    content: 'On enregistra les descendants de Siméon en fonction de leur clan, de leur famille. On les dénombra en comptant les noms de tous les individus de sexe masculin âgés de 20 ans et plus, tous ceux qui étaient aptes au service militaire. '
  '23':
  - type: text
    content: On dénombra 59'300 hommes dans la tribu de Siméon.
  '24':
  - type: text
    content: 'On enregistra les descendants de Gad en fonction de leur clan, de leur famille, en comptant les noms des hommes âgés de 20 ans et plus, tous ceux qui étaient aptes au service militaire. '
  '25':
  - type: text
    content: On dénombra 45'650 hommes dans la tribu de Gad.
  '26':
  - type: text
    content: 'On enregistra les descendants de Juda en fonction de leur clan, de leur famille, en comptant les noms des hommes âgés de 20 ans et plus, tous ceux qui étaient aptes au service militaire. '
  '27':
  - type: text
    content: On dénombra 74'600 hommes dans la tribu de Juda.
  '28':
  - type: text
    content: 'On enregistra les descendants d''Issacar en fonction de leur clan, de leur famille, en comptant les noms des hommes âgés de 20 ans et plus, tous ceux qui étaient aptes au service militaire. '
  '29':
  - type: text
    content: On dénombra 54'400 hommes dans la tribu d'Issacar.
  '3':
  - type: text
    content: 'âgés de 20 ans et plus, tous les membres du peuple d''Israël aptes au service militaire. Vous les dénombrerez par corps d''armée, Aaron et toi. '
  '30':
  - type: text
    content: 'On enregistra les descendants de Zabulon en fonction de leur clan, de leur famille, en comptant les noms des hommes âgés de 20 ans et plus, tous ceux qui étaient aptes au service militaire. '
  '31':
  - type: text
    content: On dénombra 57'400 hommes dans la tribu de Zabulon.
  '32':
  - type: text
    content: 'Pour les fils de Joseph, on enregistra les descendants d''Ephraïm en fonction de leur clan, de leur famille, en comptant les noms des hommes âgés de 20 ans et plus, tous ceux qui étaient aptes au service militaire. '
  '33':
  - type: text
    content: 'On dénombra 40''500 hommes dans la tribu d''Ephraïm. '
  '34':
  - type: text
    content: 'On enregistra les descendants de Manassé en fonction de leur clan, de leur famille, en comptant les noms des hommes âgés de 20 ans et plus, tous ceux qui étaient aptes au service militaire. '
  '35':
  - type: text
    content: On dénombra 32'200 hommes dans la tribu de Manassé.
  '36':
  - type: text
    content: 'On enregistra les descendants de Benjamin en fonction de leur clan, de leur famille, en comptant les noms des hommes âgés de 20 ans et plus, tous ceux qui étaient aptes au service militaire. '
  '37':
  - type: text
    content: On dénombra 35'400 hommes dans la tribu de Benjamin.
  '38':
  - type: text
    content: 'On enregistra les descendants de Dan en fonction de leur clan, de leur famille, en comptant les noms des hommes âgés de 20 ans et plus, tous ceux qui étaient aptes au service militaire. '
  '39':
  - type: text
    content: On dénombra 62'700 hommes dans la tribu de Dan.
  '4':
  - type: text
    content: Il y aura avec vous un homme par tribu, un chef de famille.
  '40':
  - type: text
    content: 'On enregistra les descendants d''Aser en fonction de leur clan, de leur famille, en comptant les noms des hommes âgés de 20 ans et plus, tous ceux qui étaient aptes au service militaire. '
  '41':
  - type: text
    content: On dénombra 41'500 hommes dans la tribu d'Aser.
  '42':
  - type: text
    content: 'On enregistra les descendants de Nephthali en fonction de leur clan, de leur famille, en comptant les noms des hommes âgés de 20 ans et plus, tous ceux qui étaient aptes au service militaire. '
  '43':
  - type: text
    content: On dénombra 53'400 hommes dans la tribu de Nephthali.
  '44':
  - type: text
    content: 'Tels sont ceux dont le dénombrement fut fait par Moïse et Aaron ainsi que par les douze princes d''Israël; il y avait un homme pour chacune des familles. '
  '45':
  - type: text
    content: 'On dénombra en fonction de leur famille tous les Israélites âgés de 20 ans et plus, tous les hommes d''Israël qui étaient aptes au service militaire. '
  '46':
  - type: text
    content: On dénombra au total 603'550 hommes.
  - type: heading
    content: Responsabilités des Lévites
  '47':
  - type: text
    content: 'Les Lévites, selon la tribu de leurs ancêtres, ne furent pas inclus dans ce dénombrement. '
  '48':
  - type: text
    content: 'L''Eternel avait transmis ces instructions à Moïse: '
  '49':
  - type: text
    content: '«Tu ne feras pas le dénombrement de la tribu de Lévi et tu ne compteras pas ses membres au milieu des Israélites. '
  '5':
  - type: text
    content: '»Voici le nom des hommes qui se tiendront à vos côtés. Pour Ruben: Elitsur, fils de Shedéur; '
  '50':
  - type: text
    content: 'Confie aux Lévites la responsabilité du tabernacle du témoignage, de tous ses ustensiles et de tout ce qui lui appartient. Ils porteront le tabernacle et tous ses ustensiles, ils en feront le service et ils camperont autour du tabernacle. '
  '51':
  - type: text
    content: 'Quand le tabernacle partira, les Lévites le démonteront; quand le tabernacle campera, les Lévites le dresseront. Si quelqu''un d''autre s''en approche, il sera puni de mort. '
  '52':
  - type: text
    content: 'Les Israélites camperont chacun dans son camp, chacun près de son étendard, selon leurs corps d''armée. '
  '53':
  - type: text
    content: 'Les Lévites, quant à eux, camperont autour du tabernacle du témoignage afin que ma colère n''éclate pas contre l''assemblée des Israélites. Les Lévites auront la responsabilité du tabernacle du témoignage.» '
  '54':
  - type: text
    content: Les Israélites se conformèrent à tous les ordres que l'Eternel avait donnés à Moïse, c'est ce qu'ils firent.
  '6':
  - type: text
    content: 'pour Siméon: Shelumiel, fils de Tsurishaddaï; '
  '7':
  - type: text
    content: 'pour Juda: Nachshon, fils d''Amminadab; '
  '8':
  - type: text
    content: 'pour Issacar: Nathanaël, fils de Tsuar; '
  '9':
  - type: text
    content: 'pour Zabulon: Eliab, fils de Hélon; '
