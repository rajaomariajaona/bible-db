document_id: JHN.9
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Guérison d'un aveugle-né
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jésus vit, en passant, un homme aveugle de naissance. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ses disciples lui posèrent cette question: «Maître, qui a péché, cet homme ou ses parents, pour qu''il soit né aveugle?» '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jésus répondit: «Ce n''est pas que lui ou ses parents aient péché, mais c''est afin que les œuvres de Dieu soient révélées en lui. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il faut que je fasse, tant qu''il fait jour, les œuvres de celui qui m''a envoyé; la nuit vient, où personne ne peut travailler. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Pendant que je suis dans le monde, je suis la lumière du monde.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Après avoir dit cela, il cracha par terre et fit de la boue avec sa salive. Puis il appliqua cette boue sur les yeux [de l''aveugle] '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'et lui dit: «Va te laver au bassin de Siloé», nom qui signifie «envoyé». Il y alla donc, se lava et revint voyant clair. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ses voisins et ceux qui l''avaient vu mendier auparavant disaient: «N''est-ce pas celui qui se tenait assis et qui mendiait?» '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Les uns disaient: «C''est lui.» D''autres disaient: «Non, mais il lui ressemble.» Mais lui affirmait: «C''est bien moi.» '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ils lui dirent donc: «Comment [donc] tes yeux ont-ils été ouverts?» '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il répondit: «L''homme qu''on appelle Jésus a fait de la boue, l''a appliquée sur mes yeux et m''a dit: ‘Va au bassin de Siloé et lave-toi.’ J''y suis donc allé, je me suis lavé et j''ai pu voir.» '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ils lui dirent: «Où est cet homme?» Il répondit: «Je ne sais pas.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ils menèrent vers les pharisiens l''homme qui avait été aveugle. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Or c''était un jour de sabbat que Jésus avait fait de la boue et lui avait ouvert les yeux. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'A leur tour, les pharisiens lui demandèrent comment il avait pu voir. Il leur dit: «Il a appliqué de la boue sur mes yeux, je me suis lavé et je vois.» '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Là-dessus, quelques-uns des pharisiens disaient: «Cet homme ne vient pas de Dieu, car il ne respecte pas le sabbat», mais d''autres disaient: «Comment un homme pécheur peut-il faire de tels signes miraculeux?» Et il y eut division parmi eux. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ils dirent encore à l''aveugle: «Toi, que dis-tu de lui, puisqu''il t''a ouvert les yeux?» Il répondit: «C''est un prophète.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Les Juifs ne voulurent pas croire qu''il avait été aveugle et qu''il voyait désormais, avant d''avoir fait venir ses parents. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ils les interrogèrent en disant: «Est-ce bien votre fils, que vous dites être né aveugle? Comment donc se fait-il qu''il voie maintenant?» '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ses parents leur répondirent: «Nous savons que c''est bien notre fils et qu''il est né aveugle, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'mais nous ne savons pas comment il se fait qu''il voie maintenant, ni qui lui a ouvert les yeux. Interrogez-le lui-même, il est assez grand pour parler de ce qui le concerne.» '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ses parents dirent cela parce qu''ils avaient peur des chefs juifs. En effet, ceux-ci avaient déjà décidé d''exclure de la synagogue celui qui reconnaîtrait Jésus comme le Messie. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Voilà pourquoi ses parents dirent: «Il est assez grand, interrogez-le lui-même.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Les pharisiens appelèrent une seconde fois l''homme qui avait été aveugle et lui dirent: «Rends gloire à Dieu! Nous savons que cet homme est un pécheur.» '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Il répondit: «S''il est un pécheur, je n''en sais rien. Je sais une chose: c''est que j''étais aveugle et maintenant je vois.» '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ils lui dirent [de nouveau]: «Que t''a-t-il fait? Comment t''a-t-il ouvert les yeux?» '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Il leur répondit: «Je vous l''ai déjà dit et vous n''avez pas écouté. Pourquoi voulez-vous l''entendre encore? Voulez-vous aussi devenir ses disciples?» '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ils l''insultèrent et dirent: «C''est toi qui es son disciple. Nous, nous sommes disciples de Moïse. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Nous savons que Dieu a parlé à Moïse, mais celui-ci, nous ne savons pas d''où il est.» '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Cet homme leur répondit: «Voilà qui est étonnant: vous ne savez pas d''où il est, et pourtant il m''a ouvert les yeux! '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Nous savons que Dieu n''exauce pas les pécheurs mais qu''en revanche, si quelqu''un l''honore et fait sa volonté, il l''exauce. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Jamais encore on n''a entendu dire que quelqu''un ait ouvert les yeux d''un aveugle-né. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Si cet homme ne venait pas de Dieu, il ne pourrait rien faire.» '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ils lui répondirent: «Tu es né tout entier dans le péché et tu nous enseignes!» Et ils le chassèrent.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Jésus apprit qu''ils l''avaient chassé. L''ayant rencontré, il [lui] dit: «Crois-tu au Fils de Dieu?» '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Il répondit: «Et qui est-il, Seigneur, afin que je croie en lui?» '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: '«Tu l''as vu, lui dit Jésus, et celui qui te parle, c''est lui.» '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Alors il dit: «Je crois, Seigneur.» Et il se prosterna devant lui.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Puis Jésus dit: «Je suis venu dans ce monde pour un jugement, pour que ceux qui ne voient pas voient et pour que ceux qui voient deviennent aveugles.» '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Quelques pharisiens qui étaient avec lui entendirent ces paroles et lui dirent: «Nous aussi, sommes-nous aveugles?» '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Jésus leur répondit: «Si vous étiez aveugles, vous n''auriez pas de péché. Mais en réalité, vous dites: ‘Nous voyons.’ [Ainsi donc,] votre péché reste.'
