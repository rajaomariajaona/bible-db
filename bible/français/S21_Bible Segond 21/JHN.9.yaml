document_id: JHN.9,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Guérison d'un aveugle-né
  - type: text
    content: 'Jésus vit, en passant, un homme aveugle de naissance. '
  '10':
  - type: text
    content: 'Ils lui dirent donc: «Comment [donc] tes yeux ont-ils été ouverts?» '
  '11':
  - type: text
    content: 'Il répondit: «L''homme qu''on appelle Jésus a fait de la boue, l''a appliquée sur mes yeux et m''a dit: ‘Va au bassin de Siloé et lave-toi.’ J''y suis donc allé, je me suis lavé et j''ai pu voir.» '
  '12':
  - type: text
    content: 'Ils lui dirent: «Où est cet homme?» Il répondit: «Je ne sais pas.»'
  '13':
  - type: text
    content: 'Ils menèrent vers les pharisiens l''homme qui avait été aveugle. '
  '14':
  - type: text
    content: 'Or c''était un jour de sabbat que Jésus avait fait de la boue et lui avait ouvert les yeux. '
  '15':
  - type: text
    content: 'A leur tour, les pharisiens lui demandèrent comment il avait pu voir. Il leur dit: «Il a appliqué de la boue sur mes yeux, je me suis lavé et je vois.» '
  '16':
  - type: text
    content: 'Là-dessus, quelques-uns des pharisiens disaient: «Cet homme ne vient pas de Dieu, car il ne respecte pas le sabbat», mais d''autres disaient: «Comment un homme pécheur peut-il faire de tels signes miraculeux?» Et il y eut division parmi eux. '
  '17':
  - type: text
    content: 'Ils dirent encore à l''aveugle: «Toi, que dis-tu de lui, puisqu''il t''a ouvert les yeux?» Il répondit: «C''est un prophète.»'
  '18':
  - type: text
    content: 'Les Juifs ne voulurent pas croire qu''il avait été aveugle et qu''il voyait désormais, avant d''avoir fait venir ses parents. '
  '19':
  - type: text
    content: 'Ils les interrogèrent en disant: «Est-ce bien votre fils, que vous dites être né aveugle? Comment donc se fait-il qu''il voie maintenant?» '
  '2':
  - type: text
    content: 'Ses disciples lui posèrent cette question: «Maître, qui a péché, cet homme ou ses parents, pour qu''il soit né aveugle?» '
  '20':
  - type: text
    content: 'Ses parents leur répondirent: «Nous savons que c''est bien notre fils et qu''il est né aveugle, '
  '21':
  - type: text
    content: 'mais nous ne savons pas comment il se fait qu''il voie maintenant, ni qui lui a ouvert les yeux. Interrogez-le lui-même, il est assez grand pour parler de ce qui le concerne.» '
  '22':
  - type: text
    content: 'Ses parents dirent cela parce qu''ils avaient peur des chefs juifs. En effet, ceux-ci avaient déjà décidé d''exclure de la synagogue celui qui reconnaîtrait Jésus comme le Messie. '
  '23':
  - type: text
    content: 'Voilà pourquoi ses parents dirent: «Il est assez grand, interrogez-le lui-même.»'
  '24':
  - type: text
    content: 'Les pharisiens appelèrent une seconde fois l''homme qui avait été aveugle et lui dirent: «Rends gloire à Dieu! Nous savons que cet homme est un pécheur.» '
  '25':
  - type: text
    content: 'Il répondit: «S''il est un pécheur, je n''en sais rien. Je sais une chose: c''est que j''étais aveugle et maintenant je vois.» '
  '26':
  - type: text
    content: 'Ils lui dirent [de nouveau]: «Que t''a-t-il fait? Comment t''a-t-il ouvert les yeux?» '
  '27':
  - type: text
    content: 'Il leur répondit: «Je vous l''ai déjà dit et vous n''avez pas écouté. Pourquoi voulez-vous l''entendre encore? Voulez-vous aussi devenir ses disciples?» '
  '28':
  - type: text
    content: 'Ils l''insultèrent et dirent: «C''est toi qui es son disciple. Nous, nous sommes disciples de Moïse. '
  '29':
  - type: text
    content: 'Nous savons que Dieu a parlé à Moïse, mais celui-ci, nous ne savons pas d''où il est.» '
  '3':
  - type: text
    content: 'Jésus répondit: «Ce n''est pas que lui ou ses parents aient péché, mais c''est afin que les œuvres de Dieu soient révélées en lui. '
  '30':
  - type: text
    content: 'Cet homme leur répondit: «Voilà qui est étonnant: vous ne savez pas d''où il est, et pourtant il m''a ouvert les yeux! '
  '31':
  - type: text
    content: 'Nous savons que Dieu n''exauce pas les pécheurs mais qu''en revanche, si quelqu''un l''honore et fait sa volonté, il l''exauce. '
  '32':
  - type: text
    content: 'Jamais encore on n''a entendu dire que quelqu''un ait ouvert les yeux d''un aveugle-né. '
  '33':
  - type: text
    content: 'Si cet homme ne venait pas de Dieu, il ne pourrait rien faire.» '
  '34':
  - type: text
    content: 'Ils lui répondirent: «Tu es né tout entier dans le péché et tu nous enseignes!» Et ils le chassèrent.'
  '35':
  - type: text
    content: 'Jésus apprit qu''ils l''avaient chassé. L''ayant rencontré, il [lui] dit: «Crois-tu au Fils de Dieu?» '
  '36':
  - type: text
    content: 'Il répondit: «Et qui est-il, Seigneur, afin que je croie en lui?» '
  '37':
  - type: text
    content: '«Tu l''as vu, lui dit Jésus, et celui qui te parle, c''est lui.» '
  '38':
  - type: text
    content: 'Alors il dit: «Je crois, Seigneur.» Et il se prosterna devant lui.'
  '39':
  - type: text
    content: 'Puis Jésus dit: «Je suis venu dans ce monde pour un jugement, pour que ceux qui ne voient pas voient et pour que ceux qui voient deviennent aveugles.» '
  '4':
  - type: text
    content: 'Il faut que je fasse, tant qu''il fait jour, les œuvres de celui qui m''a envoyé; la nuit vient, où personne ne peut travailler. '
  '40':
  - type: text
    content: 'Quelques pharisiens qui étaient avec lui entendirent ces paroles et lui dirent: «Nous aussi, sommes-nous aveugles?» '
  '41':
  - type: text
    content: 'Jésus leur répondit: «Si vous étiez aveugles, vous n''auriez pas de péché. Mais en réalité, vous dites: ‘Nous voyons.’ [Ainsi donc,] votre péché reste.'
  '5':
  - type: text
    content: Pendant que je suis dans le monde, je suis la lumière du monde.»
  '6':
  - type: text
    content: 'Après avoir dit cela, il cracha par terre et fit de la boue avec sa salive. Puis il appliqua cette boue sur les yeux [de l''aveugle] '
  '7':
  - type: text
    content: 'et lui dit: «Va te laver au bassin de Siloé», nom qui signifie «envoyé». Il y alla donc, se lava et revint voyant clair. '
  '8':
  - type: text
    content: 'Ses voisins et ceux qui l''avaient vu mendier auparavant disaient: «N''est-ce pas celui qui se tenait assis et qui mendiait?» '
  '9':
  - type: text
    content: 'Les uns disaient: «C''est lui.» D''autres disaient: «Non, mais il lui ressemble.» Mais lui affirmait: «C''est bien moi.» '
