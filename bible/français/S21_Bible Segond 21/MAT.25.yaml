document_id: MAT.25,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Parabole des dix jeunes filles
  - type: text
    content: '»Alors le royaume des cieux ressemblera à dix jeunes filles qui ont pris leurs lampes pour aller à la rencontre du marié. '
  '10':
  - type: text
    content: 'Pendant qu''elles allaient en acheter, le marié arriva. Celles qui étaient prêtes entrèrent avec lui dans la salle des noces et la porte fut fermée. '
  '11':
  - type: text
    content: 'Plus tard, les autres jeunes filles vinrent et dirent: ‘Seigneur, Seigneur, ouvre-nous!’ '
  '12':
  - type: text
    content: 'mais il répondit: ‘Je vous le dis en vérité, je ne vous connais pas.’ '
  '13':
  - type: text
    content: Restez donc vigilants, puisque vous ne savez ni le jour ni l'heure [où le Fils de l'homme viendra].
  - type: heading
    content: Parabole des serviteurs et des récompenses
  '14':
  - type: text
    content: '»Ce sera en effet pareil au cas d''un homme qui, partant pour un voyage, appela ses serviteurs et leur remit ses biens. '
  '15':
  - type: text
    content: 'Il donna cinq sacs d''argent à l''un, deux à l''autre et un au troisième, à chacun selon sa capacité, puis il partit aussitôt. '
  '16':
  - type: text
    content: 'Celui qui avait reçu les cinq sacs d''argent s''en alla travailler avec eux et gagna cinq autres sacs d''argent. '
  '17':
  - type: text
    content: 'De même, celui qui avait reçu les deux sacs d''argent en gagna deux autres. '
  '18':
  - type: text
    content: 'Celui qui n''en avait reçu qu''un alla creuser un trou dans la terre et cacha l''argent de son maître. '
  '19':
  - type: text
    content: 'Longtemps après, le maître de ces serviteurs revint et leur fit rendre des comptes. '
  '2':
  - type: text
    content: 'Cinq d''entre elles étaient folles et cinq étaient sages. '
  '20':
  - type: text
    content: 'Celui qui avait reçu les cinq sacs d''argent s''approcha, en apporta cinq autres et dit: ‘Seigneur, tu m''as remis cinq sacs d''argent. En voici cinq autres que j''ai gagnés.’ '
  '21':
  - type: text
    content: 'Son maître lui dit: ‘C''est bien, bon et fidèle serviteur; tu as été fidèle en peu de chose, je te confierai beaucoup. Viens partager la joie de ton maître.’ '
  '22':
  - type: text
    content: 'Celui qui avait reçu les deux sacs d''argent s''approcha aussi et dit: ‘Seigneur, tu m''as remis deux sacs d''argent. En voici deux autres que j''ai gagnés.’ '
  '23':
  - type: text
    content: 'Son maître lui dit: ‘C''est bien, bon et fidèle serviteur; tu as été fidèle en peu de chose, je te confierai beaucoup. Viens partager la joie de ton maître.’ '
  '24':
  - type: text
    content: 'Celui qui n''avait reçu qu''un sac d''argent s''approcha ensuite et dit: ‘Seigneur, je savais que tu es un homme dur: tu moissonnes où tu n''as pas semé et tu récoltes où tu n''as pas planté. '
  '25':
  - type: text
    content: 'J''ai eu peur et je suis allé cacher ton sac d''argent dans la terre. Le voici, prends ce qui est à toi.’ '
  '26':
  - type: text
    content: 'Son maître lui répondit: ‘Serviteur mauvais et paresseux, tu savais que je moissonne où je n''ai pas semé et que je récolte où je n''ai pas planté. '
  '27':
  - type: text
    content: 'Il te fallait donc remettre mon argent aux banquiers et à mon retour j''aurais retiré ce qui est à moi avec un intérêt. '
  '28':
  - type: text
    content: 'Prenez-lui donc le sac d''argent et donnez-le à celui qui a les dix sacs d''argent. '
  '29':
  - type: text
    content: 'En effet, on donnera à celui qui a et il sera dans l''abondance, mais à celui qui n''a pas on enlèvera même ce qu''il a. '
  '3':
  - type: text
    content: 'Celles qui étaient folles ne prirent pas d''huile avec elles en emportant leurs lampes, '
  '30':
  - type: text
    content: 'Quant au serviteur inutile, jetez-le dans les ténèbres extérieures: c''est là qu''il y aura des pleurs et des grincements de dents.’'
  - type: heading
    content: Jugement des nations
  '31':
  - type: text
    content: '»Lorsque le Fils de l''homme viendra dans sa gloire avec tous les [saints] anges, il s''assiéra sur son trône de gloire. '
  '32':
  - type: text
    content: 'Toutes les nations seront rassemblées devant lui. Il séparera les uns des autres, comme le berger sépare les brebis des boucs; '
  '33':
  - type: text
    content: 'il mettra les brebis à sa droite et les boucs à sa gauche. '
  '34':
  - type: text
    content: 'Alors le roi dira à ceux qui seront à sa droite: ‘Venez, vous qui êtes bénis par mon Père, prenez possession du royaume qui vous a été préparé dès la création du monde! '
  '35':
  - type: text
    content: 'En effet, j''ai eu faim et vous m''avez donné à manger; j''ai eu soif et vous m''avez donné à boire; j''étais étranger et vous m''avez accueilli; '
  '36':
  - type: text
    content: 'j''étais nu et vous m''avez habillé; j''étais malade et vous m''avez rendu visite; j''étais en prison et vous êtes venus vers moi.’ '
  '37':
  - type: text
    content: 'Les justes lui répondront: ‘Seigneur, quand t''avons-nous vu affamé et t''avons-nous donné à manger, ou assoiffé et t''avons-nous donné à boire? '
  '38':
  - type: text
    content: 'Quand t''avons-nous vu étranger et t''avons-nous accueilli, ou nu et t''avons-nous habillé? '
  '39':
  - type: text
    content: 'Quand t''avons-nous vu malade ou en prison et sommes-nous allés vers toi?’ '
  '4':
  - type: text
    content: 'tandis que les sages prirent, avec leurs lampes, de l''huile dans des vases. '
  '40':
  - type: text
    content: 'Et le roi leur répondra: ‘Je vous le dis en vérité, toutes les fois que vous avez fait cela à l''un de ces plus petits de mes frères, c''est à moi que vous l''avez fait.’ '
  '41':
  - type: text
    content: 'Ensuite il dira à ceux qui seront à sa gauche: ‘Eloignez-vous de moi, maudits, allez dans le feu éternel qui a été préparé pour le diable et pour ses anges! '
  '42':
  - type: text
    content: 'En effet, j''ai eu faim et vous ne m''avez pas donné à manger; j''ai eu soif et vous ne m''avez pas donné à boire; '
  '43':
  - type: text
    content: 'j''étais étranger et vous ne m''avez pas accueilli; j''étais nu et vous ne m''avez pas habillé; j''étais malade et en prison et vous ne m''avez pas rendu visite.’ '
  '44':
  - type: text
    content: 'Ils répondront aussi: ‘Seigneur, quand t''avons-nous vu affamé, ou assoiffé, ou étranger, ou nu, ou malade ou en prison et ne t''avons-nous pas servi?’ '
  '45':
  - type: text
    content: 'Et il leur répondra: ‘Je vous le dis en vérité, toutes les fois que vous n''avez pas fait cela à l''un de ces plus petits, c''est à moi que vous ne l''avez pas fait.’ '
  '46':
  - type: text
    content: Et ils iront à la peine éternelle, tandis que les justes iront à la vie éternelle.»
  '5':
  - type: text
    content: 'Comme le marié tardait, toutes s''assoupirent et s''endormirent. '
  '6':
  - type: text
    content: 'Au milieu de la nuit, on cria: ‘Voici le marié, allez à sa rencontre!’ '
  '7':
  - type: text
    content: 'Alors toutes ces jeunes filles se réveillèrent et préparèrent leurs lampes. '
  '8':
  - type: text
    content: 'Les folles dirent aux sages: ‘Donnez-nous de votre huile, car nos lampes s''éteignent.’ '
  '9':
  - type: text
    content: 'Les sages répondirent: ‘Non, il n''y en aurait pas assez pour nous et pour vous. Allez plutôt chez ceux qui en vendent et achetez-en pour vous.’ '
