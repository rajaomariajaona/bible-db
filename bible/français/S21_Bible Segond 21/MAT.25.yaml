document_id: MAT.25
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Parabole des dix jeunes filles
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '»Alors le royaume des cieux ressemblera à dix jeunes filles qui ont pris leurs lampes pour aller à la rencontre du marié. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Cinq d''entre elles étaient folles et cinq étaient sages. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Celles qui étaient folles ne prirent pas d''huile avec elles en emportant leurs lampes, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'tandis que les sages prirent, avec leurs lampes, de l''huile dans des vases. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Comme le marié tardait, toutes s''assoupirent et s''endormirent. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Au milieu de la nuit, on cria: ‘Voici le marié, allez à sa rencontre!’ '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Alors toutes ces jeunes filles se réveillèrent et préparèrent leurs lampes. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Les folles dirent aux sages: ‘Donnez-nous de votre huile, car nos lampes s''éteignent.’ '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Les sages répondirent: ‘Non, il n''y en aurait pas assez pour nous et pour vous. Allez plutôt chez ceux qui en vendent et achetez-en pour vous.’ '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Pendant qu''elles allaient en acheter, le marié arriva. Celles qui étaient prêtes entrèrent avec lui dans la salle des noces et la porte fut fermée. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Plus tard, les autres jeunes filles vinrent et dirent: ‘Seigneur, Seigneur, ouvre-nous!’ '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'mais il répondit: ‘Je vous le dis en vérité, je ne vous connais pas.’ '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Restez donc vigilants, puisque vous ne savez ni le jour ni l'heure [où le Fils de l'homme viendra].
- type: usfm
  marker: s1
  children:
  - type: text
    text: Parabole des serviteurs et des récompenses
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '»Ce sera en effet pareil au cas d''un homme qui, partant pour un voyage, appela ses serviteurs et leur remit ses biens. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Il donna cinq sacs d''argent à l''un, deux à l''autre et un au troisième, à chacun selon sa capacité, puis il partit aussitôt. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Celui qui avait reçu les cinq sacs d''argent s''en alla travailler avec eux et gagna cinq autres sacs d''argent. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'De même, celui qui avait reçu les deux sacs d''argent en gagna deux autres. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Celui qui n''en avait reçu qu''un alla creuser un trou dans la terre et cacha l''argent de son maître. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Longtemps après, le maître de ces serviteurs revint et leur fit rendre des comptes. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Celui qui avait reçu les cinq sacs d''argent s''approcha, en apporta cinq autres et dit: ‘Seigneur, tu m''as remis cinq sacs d''argent. En voici cinq autres que j''ai gagnés.’ '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Son maître lui dit: ‘C''est bien, bon et fidèle serviteur; tu as été fidèle en peu de chose, je te confierai beaucoup. Viens partager la joie de ton maître.’ '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Celui qui avait reçu les deux sacs d''argent s''approcha aussi et dit: ‘Seigneur, tu m''as remis deux sacs d''argent. En voici deux autres que j''ai gagnés.’ '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Son maître lui dit: ‘C''est bien, bon et fidèle serviteur; tu as été fidèle en peu de chose, je te confierai beaucoup. Viens partager la joie de ton maître.’ '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Celui qui n''avait reçu qu''un sac d''argent s''approcha ensuite et dit: ‘Seigneur, je savais que tu es un homme dur: tu moissonnes où tu n''as pas semé et tu récoltes où tu n''as pas planté. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'J''ai eu peur et je suis allé cacher ton sac d''argent dans la terre. Le voici, prends ce qui est à toi.’ '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Son maître lui répondit: ‘Serviteur mauvais et paresseux, tu savais que je moissonne où je n''ai pas semé et que je récolte où je n''ai pas planté. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Il te fallait donc remettre mon argent aux banquiers et à mon retour j''aurais retiré ce qui est à moi avec un intérêt. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Prenez-lui donc le sac d''argent et donnez-le à celui qui a les dix sacs d''argent. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'En effet, on donnera à celui qui a et il sera dans l''abondance, mais à celui qui n''a pas on enlèvera même ce qu''il a. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Quant au serviteur inutile, jetez-le dans les ténèbres extérieures: c''est là qu''il y aura des pleurs et des grincements de dents.’'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jugement des nations
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: '»Lorsque le Fils de l''homme viendra dans sa gloire avec tous les [saints] anges, il s''assiéra sur son trône de gloire. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Toutes les nations seront rassemblées devant lui. Il séparera les uns des autres, comme le berger sépare les brebis des boucs; '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'il mettra les brebis à sa droite et les boucs à sa gauche. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Alors le roi dira à ceux qui seront à sa droite: ‘Venez, vous qui êtes bénis par mon Père, prenez possession du royaume qui vous a été préparé dès la création du monde! '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'En effet, j''ai eu faim et vous m''avez donné à manger; j''ai eu soif et vous m''avez donné à boire; j''étais étranger et vous m''avez accueilli; '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'j''étais nu et vous m''avez habillé; j''étais malade et vous m''avez rendu visite; j''étais en prison et vous êtes venus vers moi.’ '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Les justes lui répondront: ‘Seigneur, quand t''avons-nous vu affamé et t''avons-nous donné à manger, ou assoiffé et t''avons-nous donné à boire? '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Quand t''avons-nous vu étranger et t''avons-nous accueilli, ou nu et t''avons-nous habillé? '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Quand t''avons-nous vu malade ou en prison et sommes-nous allés vers toi?’ '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Et le roi leur répondra: ‘Je vous le dis en vérité, toutes les fois que vous avez fait cela à l''un de ces plus petits de mes frères, c''est à moi que vous l''avez fait.’ '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ensuite il dira à ceux qui seront à sa gauche: ‘Eloignez-vous de moi, maudits, allez dans le feu éternel qui a été préparé pour le diable et pour ses anges! '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'En effet, j''ai eu faim et vous ne m''avez pas donné à manger; j''ai eu soif et vous ne m''avez pas donné à boire; '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'j''étais étranger et vous ne m''avez pas accueilli; j''étais nu et vous ne m''avez pas habillé; j''étais malade et en prison et vous ne m''avez pas rendu visite.’ '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Ils répondront aussi: ‘Seigneur, quand t''avons-nous vu affamé, ou assoiffé, ou étranger, ou nu, ou malade ou en prison et ne t''avons-nous pas servi?’ '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Et il leur répondra: ‘Je vous le dis en vérité, toutes les fois que vous n''avez pas fait cela à l''un de ces plus petits, c''est à moi que vous ne l''avez pas fait.’ '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Et ils iront à la peine éternelle, tandis que les justes iront à la vie éternelle.»
