document_id: PSA.43,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Attente de l'intervention divine
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rends-moi justice, ô Dieu, défends ma cause contre une nation infidèle!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Délivre-moi des hommes trompeurs et criminels!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toi, mon Dieu protecteur, pourquoi me repousses-tu?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi dois-je marcher dans la tristesse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sous l'oppression de l'ennemi?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Envoie ta lumière et ta vérité!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu'elles me guident
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et me conduisent à ta montagne sainte et à ta demeure!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J'irai vers l'autel de Dieu, vers Dieu, ma joie et mon allégresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je te célébrerai sur la harpe, ô Dieu, mon Dieu!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi être abattue, mon âme, et pourquoi gémir en moi?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Espère en Dieu, car je le louerai encore!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est mon salut et mon Dieu.
