document_id: PSA.43,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Attente de l'intervention divine
  - type: text
    content: Rends-moi justice, ô Dieu, défends ma cause contre une nation infidèle!
  - type: text
    content: Délivre-moi des hommes trompeurs et criminels!
  '2':
  - type: text
    content: Toi, mon Dieu protecteur, pourquoi me repousses-tu?
  - type: text
    content: Pourquoi dois-je marcher dans la tristesse,
  - type: text
    content: sous l'oppression de l'ennemi?
  '3':
  - type: text
    content: Envoie ta lumière et ta vérité!
  - type: text
    content: Qu'elles me guident
  - type: text
    content: et me conduisent à ta montagne sainte et à ta demeure!
  '4':
  - type: text
    content: J'irai vers l'autel de Dieu, vers Dieu, ma joie et mon allégresse,
  - type: text
    content: et je te célébrerai sur la harpe, ô Dieu, mon Dieu!
  '5':
  - type: text
    content: Pourquoi être abattue, mon âme, et pourquoi gémir en moi?
  - type: text
    content: Espère en Dieu, car je le louerai encore!
  - type: text
    content: Il est mon salut et mon Dieu.
