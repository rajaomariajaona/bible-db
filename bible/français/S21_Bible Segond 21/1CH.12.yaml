document_id: 1CH.12
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Voici les hommes qui se joignirent à David à Tsiklag, lorsqu''il était encore contraint de vivre loin de Saül, fils de Kis. Ils faisaient partie des vaillants hommes qui lui portèrent secours pendant la guerre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'C''étaient des archers et ils étaient capables d''utiliser aussi bien la main gauche que la droite pour lancer des pierres et tirer des flèches avec leur arc. Ils faisaient partie des frères de Saül, étant issus de Benjamin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il y avait le chef, Achiézer; puis Joas, fils de Shemaa, originaire de Guibea; Jeziel et Péleth, les fils d''Azmaveth; Beraca; Jéhu, originaire d''Anathoth; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Jishmaeja, originaire de Gabaon, qui était vaillant parmi les trente et à leur tête; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Jérémie; Jachaziel; Jochanan; Jozabad, originaire de Guedéra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Eluzaï; Jerimoth; Bealia; Shemaria; Shephathia, originaire de Haroph; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Elkana, Jishija, Azareel, Joézer et Jashobeam, les Koréites; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Joéla et Zebadia, les fils de Jerocham, originaires de Guedor.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Des hommes vaillants se séparèrent des autres Gadites pour se joindre à David dans la forteresse du désert. C''étaient des soldats exercés à la guerre, capables de manier le bouclier et la lance, aussi terribles que des lions et aussi rapides que des gazelles sur les montagnes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ezer était le chef; Abdias, le deuxième; Eliab, le troisième; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mishmanna, le quatrième; Jérémie, le cinquième; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Attaï, le sixième; Eliel, le septième; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Jochanan, le huitième; Elzabad, le neuvième; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Jérémie, le dixième; Macbannaï, le onzième. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'C''étaient des descendants de Gad, des chefs de l''armée. A lui seul, le plus petit pouvait s''attaquer à 100 hommes, et le plus grand à 1000. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ce furent eux qui traversèrent le Jourdain pendant le premier mois, alors qu'il débordait sur toutes ses rives, et qui mirent en fuite tous les habitants des vallées, à l'est comme à l'ouest.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il y eut aussi des Benjaminites et des Judéens qui se joignirent à David dans la forteresse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'David sortit à leur rencontre et leur adressa la parole en disant: «Si vous venez vers moi avec des intentions de paix, pour m''aider, unissons-nous! Mais si c''est pour me tromper au profit de mes ennemis, alors que je ne commets aucune violence, que le Dieu de nos ancêtres en soit témoin et qu''il fasse justice!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Amasaï, le chef des officiers, fut revêtu de l''Esprit et dit: «Nous sommes à ton service, David, nous sommes avec toi, fils d''Isaï! Paix, paix pour toi et paix pour celui qui te porte secours, car ton Dieu t''a secouru!» David les accueillit alors et les plaça à la tête de la troupe.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Des hommes de Manassé se rallièrent à David lorsqu''il alla avec les Philistins faire la guerre à Saül. Toutefois, ils ne purent pas aider les Philistins car, après avoir tenu conseil, leurs princes renvoyèrent David en disant: «Il se ralliera à son maître Saül en lui apportant nos têtes.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Voici les Manassites qui se rallièrent à David quand il retourna à Tsiklag: Adnach, Jozabad, Jediaël, Micaël, Jozabad, Elihu et Tsilthaï. C''étaient des chefs de milliers de Manassé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ils prêtèrent secours à David à la tête de la troupe. En effet, ils étaient tous de vaillants hommes et ils furent chefs dans son armée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Chaque jour de nouveaux renforts se joignaient à David, jusqu'à former une grande armée, aussi grande que l'armée de Dieu.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Israélites venus sacrer David à Hébron
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Voici le nombre d'hommes équipés pour la guerre qui se joignirent à David à Hébron afin de lui transférer la royauté de Saül, conformément à l'ordre de l'Eternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Judéens: 6800 hommes armés du bouclier et de la lance, équipés pour la guerre.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Des Siméonites: 7100 hommes vaillants à la guerre.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Des Lévites: 4600 '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'ainsi que Jehojada, prince de la famille d''Aaron, avec 3700 hommes, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: et Tsadok, un homme vaillant malgré sa jeunesse, avec 22 chefs de la famille de son père.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Des Benjaminites, des frères de Saül: 3000. Jusqu''alors la plus grande partie d''entre eux étaient restés fidèles à la famille de Saül.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Des Ephraïmites: 20''800 hommes vaillants de grande réputation, répartis en fonction de leur famille.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'De la demi-tribu de Manassé: 18''000, qui furent nommément désignés pour aller proclamer David roi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Des Issacarites: 200 chefs et tous leurs frères, placés sous leurs ordres. Ils étaient capables de discerner les temps pour savoir ce que devait faire Israël.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'De Zabulon: 50''000 hommes aptes au service, capables de manier toutes les armes de guerre au combat et prêts à s''engager d''un cœur sans partage.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'De Nephthali: 1000 chefs avec 37''000 hommes munis du bouclier et de la lance.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Des Danites: 28''600 hommes prêts à combattre.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'D''Aser: 40''000 hommes aptes au service et prêts à combattre.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'De l''autre côté du Jourdain, des tribus de Ruben et de Gad ainsi que de la demi-tribu de Manassé: 120''000 hommes munis de toutes les armes de guerre.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Tous ces hommes de guerre, prêts à se ranger en ordre de bataille, arrivèrent à Hébron avec un cœur sans réserve pour proclamer David roi sur tout Israël. Tout le reste d''Israël était aussi unanime pour faire régner David. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ils restèrent là trois jours avec David, mangeant et buvant, car leurs frères leur avaient préparé des vivres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Que ce soit du voisinage ou jusqu''à Issacar, Zabulon et Nephthali, on apportait de la nourriture sur des ânes, sur des chameaux, sur des mulets et sur des bœufs: des plats à base de farine, des gâteaux aux figues sèches et aux raisins secs, du vin, de l''huile, des bœufs et des brebis en abondance, car Israël était dans la joie.'
