document_id: 1KI.3,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Apparition de Dieu à Salomon
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Salomon s''allia par mariage avec le pharaon, le roi d''Egypte. Il prit pour femme la fille du pharaon et il l''installa dans la ville de David en attendant d''avoir fini de construire son palais ainsi que la maison de l''Eternel et le mur d''enceinte de Jérusalem. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Cette demande de Salomon plut au Seigneur. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Et Dieu lui dit: «Puisque c''est cela que tu demandes, puisque tu ne réclames pour toi ni une longue vie, ni les richesses, ni la mort de tes ennemis, mais que tu demandes de l''intelligence pour exercer la justice, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'je vais agir conformément à ta parole. Je vais te donner un cœur si sage et si intelligent qu''il n''y a eu avant toi et qu''on ne verra jamais personne de pareil à toi. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Je te donnerai en outre ce que tu n''as pas demandé: des richesses et de la gloire en si grande quantité qu''il n''y aura pendant toute ta vie aucun roi qui soit ton égal. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Et si tu marches dans mes voies en respectant mes prescriptions et mes commandements, comme l'a fait ton père David, je te donnerai une longue vie.»
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Salomon se réveilla, et voilà quel avait été son rêve. Il revint à Jérusalem et se présenta devant l'arche de l'alliance du Seigneur. Il offrit des holocaustes et des sacrifices de communion, et il fit un festin pour tous ses serviteurs.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le sage jugement de Salomon
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'C''est alors que deux femmes prostituées vinrent chez le roi et se présentèrent devant lui. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'L''une des femmes dit: «Pardon! Mon seigneur, cette femme et moi, nous habitons dans la même maison et j''ai accouché près d''elle dans la maison. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Trois jours après, cette femme a aussi accouché. Nous habitons ensemble, il n''y a aucun étranger avec nous dans la maison, il n''y a que nous deux. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Le fils de cette femme est mort pendant la nuit, parce qu''elle s''était couchée sur lui. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Le peuple n'offrait des sacrifices que sur les hauts lieux
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Hauts lieux: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'lieux de culte en plein air consacrés à diverses divinités, souvent situés sur des hauteurs; voir la note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Samuel 9.12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', car jusque-là on n''avait pas encore construit de maison en l''honneur de l''Eternel. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Elle s''est levée au milieu de la nuit, elle a pris mon fils qui était à côté de moi pendant que moi, ta servante, je dormais et elle l''a couché contre elle. Quant à son fils, qui était mort, elle l''a couché contre moi. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ce matin, je me suis levée pour allaiter mon fils et voici qu''il était mort. Je l''ai regardé attentivement, le matin venu, et ce n''était pas mon fils, celui que j''ai mis au monde.» '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'L''autre femme dit: «C''est faux! C''est mon fils qui est vivant et ton fils qui est mort.» Mais la première répliqua: «Absolument pas! C''est ton fils qui est mort et mon fils qui est vivant.» C''est ainsi qu''elles discutèrent devant le roi.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Le roi constata: «L''une dit: ‘C''est mon fils qui est vivant et ton fils qui est mort’, et l''autre dit: ‘Absolument pas! C''est ton fils qui est mort et mon fils qui est vivant.’» '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Puis il ordonna: «Apportez-moi une épée.» On apporta une épée devant le roi. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Le roi dit alors: «Coupez en deux l''enfant qui est en vie et donnez-en la moitié à chacune.» '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Alors la femme dont le fils était vivant fut remplie de compassion pour son fils et elle dit au roi: «Ah! Mon seigneur, donnez-lui l''enfant qui est en vie, ne le faites pas mourir.» Mais l''autre répliqua: «Il ne sera ni à moi ni à toi. Coupez-le!» '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Prenant la parole, le roi dit alors: «Donnez l''enfant qui est en vie à la première femme, ne le faites pas mourir. C''est elle qui est sa mère.»'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Tout Israël apprit le jugement que le roi avait prononcé et l'on éprouva de la crainte envers lui. En effet, on avait constaté qu'il bénéficiait de la sagesse de Dieu pour exercer la justice.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Salomon aimait l'Eternel, suivant ainsi les prescriptions de son père David. Toutefois, c'était sur les hauts lieux qu'il offrait des sacrifices et des parfums.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Le roi se rendit à Gabaon pour y offrir des sacrifices, car c''était le principal des hauts lieux. Salomon offrit 1000 holocaustes sur l''autel. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'A Gabaon, l''Eternel lui apparut en rêve pendant la nuit et Dieu lui dit: «Demande-moi ce que tu veux que je te donne.» '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Salomon répondit: «Tu as traité avec une grande bonté ton serviteur David, mon père, parce qu''il marchait en ta présence dans la fidélité et la justice, et avec un cœur droit envers toi. Tu lui as conservé cette grande bonté et tu lui as donné un fils pour siéger sur son trône, comme on le voit aujourd''hui. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Maintenant, Eternel mon Dieu, tu m''as établi roi, moi ton serviteur, à la place de mon père David. Or je ne suis qu''un jeune homme, je n''ai pas d''expérience. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ton serviteur se trouve au milieu de ton peuple, celui que tu as choisi, et c''est un peuple immense, si nombreux qu''il ne peut être ni compté ni recensé. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Accorde donc à ton serviteur un cœur apte à écouter pour juger ton peuple, pour distinguer le bien du mal! En effet, qui serait capable de juger ton peuple, ce peuple si important?»
