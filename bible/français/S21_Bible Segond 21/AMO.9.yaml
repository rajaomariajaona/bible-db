document_id: AMO.9,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Vision du Seigneur sur l'autel
  - type: text
    content: 'J''ai vu le Seigneur debout sur l''autel. Il a dit:'
  - type: text
    content: «Frappe les chapiteaux! Que les seuils soient ébranlés,
  - type: text
    content: et brise-les sur leurs têtes à tous!
  - type: text
    content: 'Je ferai mourir le reste par l''épée:'
  - type: text
    content: aucun d'eux ne pourra se sauver en fuyant,
  - type: text
    content: il n'y aura parmi eux aucun rescapé.
  '10':
  - type: text
    content: Tous les pécheurs de mon peuple mourront par l'épée,
  - type: text
    content: 'ceux qui disent:'
  - type: text
    content: ‘Le malheur n'approchera pas, il ne nous atteindra pas.’
  '11':
  - type: text
    content: »*Ce jour-là, je relèverai de sa chute la cabane de David,
  - type: text
    content: je réparerai ses brèches, je redresserai ses ruines,
  - type: text
    content: et je la reconstruirai comme elle était autrefois.
  '12':
  - type: text
    content: Alors ils posséderont le reste d'Edom et toutes les nations
  - type: text
    content: appelées de mon nom,
  - type: text
    content: déclare l'Eternel, celui qui fait tout cela.
  - type: note
    content: 'Ce jour-là… tout cela: cité en Actes 15.16-17 d''après la Septante.'
  '13':
  - type: text
    content: »Les jours viennent, déclare l'Eternel,
  - type: text
    content: où le laboureur suivra de près le moissonneur,
  - type: text
    content: et le vendangeur le semeur,
  - type: text
    content: où le vin nouveau ruissellera des montagnes
  - type: text
    content: et coulera de toutes les collines.
  '14':
  - type: text
    content: Je ramènerai les déportés de mon peuple, d'Israël;
  - type: text
    content: ils reconstruiront les villes dévastées et les habiteront,
  - type: text
    content: ils planteront des vignes et en boiront le vin,
  - type: text
    content: ils cultiveront des jardins et en mangeront les fruits.
  '15':
  - type: text
    content: Je les planterai dans leur pays
  - type: text
    content: et ils ne seront plus arrachés du pays que je leur ai donné,
  - type: text
    content: dit l'Eternel, ton Dieu.»
  '2':
  - type: text
    content: S'ils pénètrent dans le séjour des morts,
  - type: text
    content: ma main les en arrachera;
  - type: text
    content: s'ils montent au ciel,
  - type: text
    content: je les en ferai descendre.
  '3':
  - type: text
    content: S'ils se cachent au sommet du Carmel,
  - type: text
    content: je les y chercherai et je les attraperai;
  - type: text
    content: s'ils se cachent à mes regards dans le fond de la mer,
  - type: text
    content: j'ordonnerai au serpent de les y mordre.
  '4':
  - type: text
    content: S'ils sont emmenés en déportation par leurs ennemis,
  - type: text
    content: j'ordonnerai à l'épée de les y faire mourir;
  - type: text
    content: je dirigerai mes regards vers eux
  - type: text
    content: pour leur faire du mal et non du bien.»
  '5':
  - type: text
    content: Le Seigneur, l'Eternel, le maître de l'univers, touche la terre, et elle tremble,
  - type: text
    content: et tous ses habitants sont dans le deuil;
  - type: text
    content: elle se soulève tout entière comme le Nil,
  - type: text
    content: et elle s'affaisse comme le fleuve d'Egypte.
  '6':
  - type: text
    content: Il a construit son palais dans le ciel
  - type: text
    content: et fondé sa voûte sur la terre;
  - type: text
    content: il appelle l'eau de la mer
  - type: text
    content: et la verse à la surface de la terre.
  - type: text
    content: L'Eternel est son nom.
  '7':
  - type: text
    content: «N'êtes-vous pas pour moi comme des Ethiopiens,
  - type: text
    content: Israélites? déclare l'Eternel.
  - type: text
    content: N'ai-je pas fait sortir Israël d'Egypte
  - type: text
    content: comme j'ai fait sortir les Philistins de Caphtor et les Syriens de Kir?»
  '8':
  - type: text
    content: Le Seigneur, l'Eternel, a les yeux sur le royaume coupable.
  - type: text
    content: «Je le détruirai de la surface de la terre.
  - type: text
    content: Toutefois ce n'est pas entièrement que je détruirai la famille de Jacob,
  - type: text
    content: déclare l'Eternel,
  '9':
  - type: text
    content: car je donnerai mes ordres
  - type: text
    content: et je secouerai la communauté d'Israël parmi toutes les nations
  - type: text
    content: comme on secoue avec le crible,
  - type: text
    content: sans qu'il tombe à terre un seul grain.
