document_id: AMO.9
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vision du Seigneur sur l'autel
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'J''ai vu le Seigneur debout sur l''autel. Il a dit:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Frappe les chapiteaux! Que les seuils soient ébranlés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et brise-les sur leurs têtes à tous!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Je ferai mourir le reste par l''épée:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: aucun d'eux ne pourra se sauver en fuyant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il n'y aura parmi eux aucun rescapé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: S'ils pénètrent dans le séjour des morts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ma main les en arrachera;
- type: usfm
  marker: q1
  children:
  - type: text
    text: s'ils montent au ciel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je les en ferai descendre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: S'ils se cachent au sommet du Carmel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je les y chercherai et je les attraperai;
- type: usfm
  marker: q1
  children:
  - type: text
    text: s'ils se cachent à mes regards dans le fond de la mer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j'ordonnerai au serpent de les y mordre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: S'ils sont emmenés en déportation par leurs ennemis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j'ordonnerai à l'épée de les y faire mourir;
- type: usfm
  marker: q1
  children:
  - type: text
    text: je dirigerai mes regards vers eux
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour leur faire du mal et non du bien.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Le Seigneur, l'Eternel, le maître de l'univers, touche la terre, et elle tremble,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tous ses habitants sont dans le deuil;
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle se soulève tout entière comme le Nil,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et elle s'affaisse comme le fleuve d'Egypte.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Il a construit son palais dans le ciel
- type: usfm
  marker: q1
  children:
  - type: text
    text: et fondé sa voûte sur la terre;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il appelle l'eau de la mer
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la verse à la surface de la terre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: L'Eternel est son nom.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: «N'êtes-vous pas pour moi comme des Ethiopiens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Israélites? déclare l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: N'ai-je pas fait sortir Israël d'Egypte
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme j'ai fait sortir les Philistins de Caphtor et les Syriens de Kir?»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Le Seigneur, l'Eternel, a les yeux sur le royaume coupable.
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Je le détruirai de la surface de la terre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toutefois ce n'est pas entièrement que je détruirai la famille de Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: déclare l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: car je donnerai mes ordres
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je secouerai la communauté d'Israël parmi toutes les nations
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme on secoue avec le crible,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans qu'il tombe à terre un seul grain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tous les pécheurs de mon peuple mourront par l'épée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ceux qui disent:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Le malheur n'approchera pas, il ne nous atteindra pas.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: »*Ce jour-là, je relèverai de sa chute la cabane de David,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je réparerai ses brèches, je redresserai ses ruines,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je la reconstruirai comme elle était autrefois.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Alors ils posséderont le reste d'Edom et toutes les nations
- type: usfm
  marker: q1
  children:
  - type: text
    text: appelées de mon nom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: déclare l'Eternel, celui qui fait tout cela.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.11-12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ce jour-là… tout cela: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Actes 15.16-17
      metadata:
        usfm: ACT.15.16+ACT.15.17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' d''après la Septante.'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: »Les jours viennent, déclare l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: où le laboureur suivra de près le moissonneur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le vendangeur le semeur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: où le vin nouveau ruissellera des montagnes
- type: usfm
  marker: q1
  children:
  - type: text
    text: et coulera de toutes les collines.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Je ramènerai les déportés de mon peuple, d'Israël;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils reconstruiront les villes dévastées et les habiteront,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils planteront des vignes et en boiront le vin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils cultiveront des jardins et en mangeront les fruits.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Je les planterai dans leur pays
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils ne seront plus arrachés du pays que je leur ai donné,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dit l'Eternel, ton Dieu.»
