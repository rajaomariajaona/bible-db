document_id: MRK.10
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Ministère de Jésus en Judée
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 10.1–13.37
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le divorce
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Jésus partit de là et se rendit dans le territoire de la Judée, de l'autre côté du Jourdain. La foule se rassembla de nouveau près de lui et, conformément à son habitude, il se mit encore à l'enseigner.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Les pharisiens l''abordèrent et, pour lui tendre un piège, ils lui demandèrent s''il est permis à un homme de divorcer de sa femme. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il leur répondit: «Que vous a prescrit Moïse?» '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: «Moïse, dirent-ils, nous a permis d'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: écrire une lettre de divorce et de renvoyer notre femme
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ecrire… notre femme: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'renvoi à '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Deutéronome 24.1
      metadata:
        usfm: DEU.24.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '.» '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Jésus leur dit: «C''est à cause de la dureté de votre cœur que Moïse vous a donné cette règle. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Mais au commencement de la création, '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Dieu a fait l'homme et la femme;
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: c'est pourquoi l'homme quittera son père et sa mère [et s'attachera à sa femme],
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: et les deux ne feront qu'un
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.6-8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Dieu a fait… qu''un: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Genèse 1.27
      metadata:
        usfm: GEN.1.27
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' puis 2.24.'
    marker-yv: yv-n
  - type: text
    text: '. Ainsi, ils ne sont plus deux mais ne font qu''un. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Que l'homme ne sépare donc pas ce que Dieu a uni.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Lorsqu''ils furent dans la maison, les disciples l''interrogèrent encore là-dessus. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il leur dit: «Celui qui renvoie sa femme et qui en épouse une autre commet un adultère envers elle, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: et si une femme divorce de son mari et en épouse un autre, elle commet un adultère.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les petits enfants et l'homme riche
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Des gens lui amenaient des petits enfants afin qu''il les touche, mais les disciples leur firent des reproches. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Voyant cela, Jésus fut indigné et leur dit: «Laissez les petits enfants venir à moi et ne les en empêchez pas, car le royaume de Dieu est pour ceux qui leur ressemblent. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Je vous le dis en vérité: celui qui n''accueille pas le royaume de Dieu comme un petit enfant n''y entrera pas.» '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Puis il les prit dans ses bras et les bénit en posant les mains sur eux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Comme Jésus se mettait en chemin, un homme accourut et se jeta à genoux devant lui: «Bon maître, lui demanda-t-il, que dois-je faire pour hériter de la vie éternelle?» '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Jésus lui dit: «Pourquoi m''appelles-tu bon? Personne n''est bon, si ce n''est Dieu seul. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tu connais les commandements: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Tu ne commettras pas d'adultère; tu ne commettras pas de meurtre; tu ne commettras pas de vol; tu ne porteras pas de faux témoignage
  - type: text
    text: '; tu ne feras de tort à personne; '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: honore ton père et ta mère
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tu ne commettras… ta mère: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation de cinq des dix commandements (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Exode 20.12-16
      metadata:
        usfm: EXO.20.12+EXO.20.13+EXO.20.14+EXO.20.15+EXO.20.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Deutéronome 5.16-20
      metadata:
        usfm: DEU.5.16+DEU.5.17+DEU.5.18+DEU.5.19+DEU.5.20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '.» '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Il lui répondit: «Maître, j''ai respecté tous ces commandements dès ma jeunesse.» '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'L''ayant regardé, Jésus l''aima, et il lui dit: «Il te manque une chose: va vendre tout ce que tu as, donne-le aux pauvres, et tu auras un trésor dans le ciel. Puis viens, [charge-toi de la croix] et suis-moi.» '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Mais l''homme s''assombrit à cette parole et s''en alla tout triste, car il avait de grands biens. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Regardant autour de lui, Jésus dit à ses disciples: «Qu''il est difficile à ceux qui ont des richesses d''entrer dans le royaume de Dieu!» '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Les disciples furent effrayés de ce que Jésus parlait ainsi. Il reprit: «Mes enfants, qu''il est difficile [à ceux qui se confient dans les richesses] d''entrer dans le royaume de Dieu! '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Il est plus facile à un chameau de passer par un trou d''aiguille qu''à un riche d''entrer dans le royaume de Dieu.» '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Les disciples furent encore plus étonnés et se dirent les uns aux autres: «Qui donc peut être sauvé?» '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Jésus les regarda et dit: «Aux hommes cela est impossible, mais non à Dieu, car tout est possible à Dieu.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Alors Pierre lui dit: «Nous avons tout quitté et nous t''avons suivi.» '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Jésus répondit: «Je vous le dis en vérité, personne n''aura quitté à cause de moi et à cause de la bonne nouvelle sa maison ou ses frères, ses sœurs, sa mère, son père, [sa femme,] ses enfants ou ses terres, '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'sans recevoir au centuple, dans le temps présent, des maisons, des frères, des sœurs, des mères, des enfants et des terres, avec des persécutions et, dans le monde à venir, la vie éternelle. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Bien des premiers seront les derniers et bien des derniers seront les premiers.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Demande de Jacques et Jean
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ils étaient en chemin pour monter à Jérusalem et Jésus allait devant eux. Les disciples étaient effrayés et ceux qui le suivaient étaient dans la crainte. Jésus prit de nouveau les douze avec lui et commença à leur dire ce qui devait lui arriver: '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: '«Nous montons à Jérusalem et le Fils de l''homme sera livré aux chefs des prêtres et aux spécialistes de la loi. Ils le condamneront à mort et le livreront aux non-Juifs. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ils se moqueront de lui, cracheront sur lui, le fouetteront et le feront mourir, et trois jours après il ressuscitera.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Jacques et Jean, les fils de Zébédée, s''approchèrent de Jésus et lui dirent: «Maître, nous voudrions que tu fasses pour nous ce que nous te demanderons.» '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Il leur dit: «Que voulez-vous que je fasse pour vous?» '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: '«Accorde-nous, lui dirent-ils, d''être assis l''un à ta droite et l''autre à ta gauche, quand tu seras dans ta gloire.» '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Jésus leur répondit: «Vous ne savez pas ce que vous demandez. Pouvez-vous boire la coupe que je vais boire ou être baptisés du baptême dont je vais être baptisé?» «Nous le pouvons», dirent-ils. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Jésus leur répondit: «Vous boirez en effet la coupe que je vais boire et vous serez baptisés du baptême dont je vais être baptisé. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Mais quant à être assis à ma droite ou à ma gauche, cela ne dépend pas de moi et ne sera donné qu''à ceux pour qui cela est préparé.» '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Après avoir entendu cela, les dix autres commencèrent à s''indigner contre Jacques et Jean. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Jésus les appela et leur dit: «Vous savez que ceux que l''on considère comme les chefs des nations dominent sur elles et que leurs grands les tiennent sous leur pouvoir. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Ce n''est pas le cas au milieu de vous, mais si quelqu''un veut être grand parmi vous, il sera votre serviteur; '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'et si quelqu''un veut être le premier parmi vous, qu''il soit l''esclave de tous. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: En effet, le Fils de l'homme est venu non pour être servi, mais pour servir et donner sa vie en rançon pour beaucoup.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Guérison d'un aveugle
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Ils arrivèrent à Jéricho. Lorsque Jésus sortit de la ville avec ses disciples et une assez grande foule, Bartimée, le fils aveugle de Timée, était assis en train de mendier au bord du chemin. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Il entendit que c''était Jésus de Nazareth et se mit à crier: «Fils de David'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.47 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Fils de David: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'titre donné au Messie, le Sauveur attendu par les Juifs, sur la base notamment de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Samuel 7.12-16
      metadata:
        usfm: 2SA.7.12+2SA.7.13+2SA.7.14+2SA.7.15+2SA.7.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Esaïe 9.5-6
      metadata:
        usfm: ISA.9.5+ISA.9.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', Jésus, aie pitié de moi!» '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Beaucoup le reprenaient pour le faire taire, mais il criait beaucoup plus fort: «Fils de David, aie pitié de moi!» '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Jésus s''arrêta et dit: «Appelez-le.» Ils appelèrent l''aveugle en lui disant: «Prends courage, lève-toi, il t''appelle.» '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'L''aveugle jeta son manteau et, se levant d''un bond, vint vers Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Jésus prit la parole et lui dit: «Que veux-tu que je fasse pour toi?» «Mon maître, lui répondit l''aveugle, que je retrouve la vue.» '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Jésus lui dit: «Vas-y, ta foi t''a sauvé.» Aussitôt il retrouva la vue et il suivit Jésus sur le chemin.'
