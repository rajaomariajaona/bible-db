document_id: GEN.30,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Lorsque Rachel vit qu''elle ne donnait pas d''enfants à Jacob, elle fut jalouse de sa sœur et dit à Jacob: «Donne-moi des enfants ou je meurs!» '
  '10':
  - type: text
    content: 'Zilpa, la servante de Léa, donna un fils à Jacob. '
  '11':
  - type: text
    content: 'Léa dit: «Quel bonheur!» et elle l''appela Gad. '
  '12':
  - type: text
    content: 'Zilpa, la servante de Léa, donna un deuxième fils à Jacob. '
  '13':
  - type: text
    content: 'Léa dit: «Que je suis heureuse! Oui, les femmes me diront heureuse.» Et elle l''appela Aser.'
  '14':
  - type: text
    content: Ruben sortit à l'époque de la moisson des blés et trouva des mandragores
  - type: note
    content: 'Mandragores: plantes auxquelles on attribuait certaines propriétés aphrodisiaques.'
  - type: text
    content: ' dans les champs. Il les apporta à sa mère Léa. Rachel dit alors à Léa: «Donne-moi, je t''en prie, des mandragores de ton fils.» '
  '15':
  - type: text
    content: 'Elle lui répondit: «Est-ce trop peu d''avoir pris mon mari, pour que tu prennes aussi les mandragores de mon fils?» Rachel dit: «Eh bien, il couchera avec toi cette nuit en échange des mandragores de ton fils.» '
  '16':
  - type: text
    content: 'Le soir, quand Jacob revint des champs, Léa sortit à sa rencontre et dit: «C''est vers moi que tu viendras, car je t''ai eu en salaire pour les mandragores de mon fils.» Et il coucha avec elle cette nuit-là. '
  '17':
  - type: text
    content: 'Dieu exauça Léa. Elle tomba enceinte et donna un cinquième fils à Jacob. '
  '18':
  - type: text
    content: 'Léa dit: «Dieu m''a donné mon salaire parce que j''ai donné ma servante à mon mari» et elle l''appela Issacar. '
  '19':
  - type: text
    content: 'Léa tomba encore enceinte et donna un sixième fils à Jacob. '
  '2':
  - type: text
    content: 'La colère de Jacob s''enflamma contre Rachel et il dit: «Suis-je à la place de Dieu, qui t''empêche d''avoir des enfants?» '
  '20':
  - type: text
    content: 'Léa dit: «Dieu m''a fait un beau cadeau: cette fois, mon mari habitera avec moi, car je lui ai donné six fils.» Et elle l''appela Zabulon. '
  '21':
  - type: text
    content: Ensuite, elle mit au monde une fille qu'elle appela Dina.
  '22':
  - type: text
    content: 'Dieu se souvint de Rachel, il l''exauça et lui permit d''avoir des enfants. '
  '23':
  - type: text
    content: 'Elle tomba enceinte et mit au monde un fils. Elle dit: «Dieu a enlevé ma honte» '
  '24':
  - type: text
    content: 'et elle l''appela Joseph en disant: «Que l''Eternel m''ajoute un autre fils!»'
  - type: heading
    content: Départ de Jacob pour Canaan
  '25':
  - type: text
    content: 'Après que Rachel eut donné naissance à Joseph, Jacob dit à Laban: «Laisse-moi partir pour que j''aille chez moi, dans mon pays. '
  '26':
  - type: text
    content: 'Donne-moi mes femmes et mes enfants, pour lesquels je t''ai servi, et je m''en irai. Tu sais en effet quel service j''ai accompli pour toi.» '
  '27':
  - type: text
    content: 'Laban lui dit: «Si seulement je pouvais trouver grâce à tes yeux! J''ai appris que l''Eternel m''avait béni à cause de toi. '
  '28':
  - type: text
    content: 'Fixe-moi ton salaire et je te le donnerai.» '
  '29':
  - type: text
    content: 'Jacob lui dit: «Tu sais comment je t''ai servi et ce qu''est devenu ton troupeau avec moi: '
  '3':
  - type: text
    content: 'Elle dit: «Voici ma servante Bilha. Aie des relations avec elle! Qu''elle mette un enfant au monde sur mes genoux'
  - type: note
    content: 'Sur mes genoux: possible allusion à l''adoption de cet enfant par Rachel. Cf. 48.12; 50.23.'
  - type: text
    content: ' et que par elle j''aie aussi des fils.» '
  '30':
  - type: text
    content: 'le peu que tu possédais avant mon arrivée a beaucoup augmenté et l''Eternel t''a béni sur mes traces. Maintenant, quand pourrai-je travailler pour ma propre famille?» '
  '31':
  - type: text
    content: 'Laban dit: «Que dois-je te donner?» Jacob répondit: «Tu ne me donneras rien si tu es d''accord avec ce que je vais te proposer. Je prendrai encore soin de ton troupeau et je le garderai. '
  '32':
  - type: text
    content: 'Je parcourrai aujourd''hui tout ton troupeau pour en retirer, parmi les brebis, tout agneau tacheté et marqueté et tout agneau noir, et parmi les chèvres tout ce qui est marqueté et tacheté: ce sera mon salaire. '
  '33':
  - type: text
    content: 'Ma droiture répondra pour moi demain quand tu viendras voir mon salaire: tout ce qui ne sera pas tacheté et marqueté parmi les chèvres, et noir parmi les agneaux, ce sera de ma part un vol.» '
  '34':
  - type: text
    content: 'Laban dit: «Qu''on fasse donc comme tu l''as dit.» '
  '35':
  - type: text
    content: 'Le jour même, Laban retira les boucs rayés et marquetés, toutes les chèvres tachetées et marquetées, toutes celles où il y avait du blanc et tout ce qui était noir parmi les brebis, et il les confia à ses fils. '
  '36':
  - type: text
    content: Puis il mit une distance de trois journées de marche entre Jacob et lui. Quant à Jacob, il prit soin du reste du troupeau de Laban.
  '37':
  - type: text
    content: 'Jacob prit des branches vertes de peuplier, d''amandier et de platane. Il y pela des bandes blanches, mettant à nu le blanc qui était sur les branches. '
  '38':
  - type: text
    content: 'Puis il plaça les branches qu''il avait pelées dans les auges, dans les abreuvoirs, en face des brebis qui venaient boire, pour qu''elles entrent en chaleur en venant boire. '
  '39':
  - type: text
    content: 'Les brebis entraient en chaleur près des branches et elles faisaient des petits rayés, tachetés et marquetés. '
  '4':
  - type: text
    content: 'Elle lui donna pour femme sa servante Bilha et Jacob eut des relations avec elle. '
  '40':
  - type: text
    content: 'Jacob séparait les agneaux et il mettait ensemble ce qui était rayé et tout ce qui était noir dans le troupeau de Laban. Il se fit ainsi des troupeaux à part, qu''il ne réunit pas au troupeau de Laban. '
  '41':
  - type: text
    content: 'Toutes les fois que les brebis vigoureuses entraient en chaleur, Jacob plaçait les branches dans les auges, sous les yeux des brebis, pour qu''elles entrent en chaleur près des branches. '
  '42':
  - type: text
    content: Quand les brebis étaient chétives, il ne le faisait pas, de sorte que les chétives étaient pour Laban et les vigoureuses pour Jacob.
  '43':
  - type: text
    content: Cet homme devint de plus en plus riche; il posséda du petit bétail en abondance, des servantes et des serviteurs, des chameaux et des ânes.
  '5':
  - type: text
    content: 'Bilha tomba enceinte et donna un fils à Jacob. '
  '6':
  - type: text
    content: 'Rachel dit: «Dieu m''a rendu justice, il m''a même écoutée et m''a accordé un fils.» C''est pourquoi elle l''appela Dan. '
  '7':
  - type: text
    content: 'Bilha, la servante de Rachel, tomba encore enceinte et donna un deuxième fils à Jacob. '
  '8':
  - type: text
    content: 'Rachel dit: «J''ai lutté divinement contre ma sœur et j''ai été victorieuse», et elle l''appela Nephthali.'
  '9':
  - type: text
    content: 'Voyant qu''elle avait cessé d''avoir des enfants, Léa prit sa servante Zilpa et la donna pour femme à Jacob. '
