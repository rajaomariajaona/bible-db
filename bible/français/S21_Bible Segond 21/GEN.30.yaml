document_id: GEN.30
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Lorsque Rachel vit qu''elle ne donnait pas d''enfants à Jacob, elle fut jalouse de sa sœur et dit à Jacob: «Donne-moi des enfants ou je meurs!» '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'La colère de Jacob s''enflamma contre Rachel et il dit: «Suis-je à la place de Dieu, qui t''empêche d''avoir des enfants?» '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Elle dit: «Voici ma servante Bilha. Aie des relations avec elle! Qu''elle mette un enfant au monde sur mes genoux'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Sur mes genoux: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'possible allusion à l''adoption de cet enfant par Rachel. Cf. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '48.12'
      metadata:
        usfm: GEN.48.12
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '50.23'
      metadata:
        usfm: GEN.50.23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' et que par elle j''aie aussi des fils.» '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Elle lui donna pour femme sa servante Bilha et Jacob eut des relations avec elle. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Bilha tomba enceinte et donna un fils à Jacob. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Rachel dit: «Dieu m''a rendu justice, il m''a même écoutée et m''a accordé un fils.» C''est pourquoi elle l''appela Dan. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Bilha, la servante de Rachel, tomba encore enceinte et donna un deuxième fils à Jacob. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Rachel dit: «J''ai lutté divinement contre ma sœur et j''ai été victorieuse», et elle l''appela Nephthali.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Voyant qu''elle avait cessé d''avoir des enfants, Léa prit sa servante Zilpa et la donna pour femme à Jacob. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Zilpa, la servante de Léa, donna un fils à Jacob. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Léa dit: «Quel bonheur!» et elle l''appela Gad. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Zilpa, la servante de Léa, donna un deuxième fils à Jacob. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Léa dit: «Que je suis heureuse! Oui, les femmes me diront heureuse.» Et elle l''appela Aser.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ruben sortit à l'époque de la moisson des blés et trouva des mandragores
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Mandragores: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: plantes auxquelles on attribuait certaines propriétés aphrodisiaques.
    marker-yv: yv-n
  - type: text
    text: ' dans les champs. Il les apporta à sa mère Léa. Rachel dit alors à Léa: «Donne-moi, je t''en prie, des mandragores de ton fils.» '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Elle lui répondit: «Est-ce trop peu d''avoir pris mon mari, pour que tu prennes aussi les mandragores de mon fils?» Rachel dit: «Eh bien, il couchera avec toi cette nuit en échange des mandragores de ton fils.» '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Le soir, quand Jacob revint des champs, Léa sortit à sa rencontre et dit: «C''est vers moi que tu viendras, car je t''ai eu en salaire pour les mandragores de mon fils.» Et il coucha avec elle cette nuit-là. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dieu exauça Léa. Elle tomba enceinte et donna un cinquième fils à Jacob. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Léa dit: «Dieu m''a donné mon salaire parce que j''ai donné ma servante à mon mari» et elle l''appela Issacar. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Léa tomba encore enceinte et donna un sixième fils à Jacob. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Léa dit: «Dieu m''a fait un beau cadeau: cette fois, mon mari habitera avec moi, car je lui ai donné six fils.» Et elle l''appela Zabulon. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ensuite, elle mit au monde une fille qu'elle appela Dina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dieu se souvint de Rachel, il l''exauça et lui permit d''avoir des enfants. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Elle tomba enceinte et mit au monde un fils. Elle dit: «Dieu a enlevé ma honte» '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'et elle l''appela Joseph en disant: «Que l''Eternel m''ajoute un autre fils!»'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Départ de Jacob pour Canaan
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Après que Rachel eut donné naissance à Joseph, Jacob dit à Laban: «Laisse-moi partir pour que j''aille chez moi, dans mon pays. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Donne-moi mes femmes et mes enfants, pour lesquels je t''ai servi, et je m''en irai. Tu sais en effet quel service j''ai accompli pour toi.» '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Laban lui dit: «Si seulement je pouvais trouver grâce à tes yeux! J''ai appris que l''Eternel m''avait béni à cause de toi. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Fixe-moi ton salaire et je te le donnerai.» '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Jacob lui dit: «Tu sais comment je t''ai servi et ce qu''est devenu ton troupeau avec moi: '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'le peu que tu possédais avant mon arrivée a beaucoup augmenté et l''Eternel t''a béni sur mes traces. Maintenant, quand pourrai-je travailler pour ma propre famille?» '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Laban dit: «Que dois-je te donner?» Jacob répondit: «Tu ne me donneras rien si tu es d''accord avec ce que je vais te proposer. Je prendrai encore soin de ton troupeau et je le garderai. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Je parcourrai aujourd''hui tout ton troupeau pour en retirer, parmi les brebis, tout agneau tacheté et marqueté et tout agneau noir, et parmi les chèvres tout ce qui est marqueté et tacheté: ce sera mon salaire. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ma droiture répondra pour moi demain quand tu viendras voir mon salaire: tout ce qui ne sera pas tacheté et marqueté parmi les chèvres, et noir parmi les agneaux, ce sera de ma part un vol.» '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Laban dit: «Qu''on fasse donc comme tu l''as dit.» '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Le jour même, Laban retira les boucs rayés et marquetés, toutes les chèvres tachetées et marquetées, toutes celles où il y avait du blanc et tout ce qui était noir parmi les brebis, et il les confia à ses fils. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Puis il mit une distance de trois journées de marche entre Jacob et lui. Quant à Jacob, il prit soin du reste du troupeau de Laban.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Jacob prit des branches vertes de peuplier, d''amandier et de platane. Il y pela des bandes blanches, mettant à nu le blanc qui était sur les branches. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Puis il plaça les branches qu''il avait pelées dans les auges, dans les abreuvoirs, en face des brebis qui venaient boire, pour qu''elles entrent en chaleur en venant boire. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Les brebis entraient en chaleur près des branches et elles faisaient des petits rayés, tachetés et marquetés. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Jacob séparait les agneaux et il mettait ensemble ce qui était rayé et tout ce qui était noir dans le troupeau de Laban. Il se fit ainsi des troupeaux à part, qu''il ne réunit pas au troupeau de Laban. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Toutes les fois que les brebis vigoureuses entraient en chaleur, Jacob plaçait les branches dans les auges, sous les yeux des brebis, pour qu''elles entrent en chaleur près des branches. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Quand les brebis étaient chétives, il ne le faisait pas, de sorte que les chétives étaient pour Laban et les vigoureuses pour Jacob.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Cet homme devint de plus en plus riche; il posséda du petit bétail en abondance, des servantes et des serviteurs, des chameaux et des ânes.
