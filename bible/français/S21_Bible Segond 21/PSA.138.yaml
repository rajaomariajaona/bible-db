document_id: PSA.138,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Louange pour l'accomplissement des promesses
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: De David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je te célèbre de tout mon cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je chante tes louanges en face des dieux.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je me prosterne dans ton saint temple
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je célèbre ton nom à cause de ta bonté et de ta vérité.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, tu as surpassé ta réputation dans l'accomplissement de tes promesses.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lorsque je t'ai appelé, tu m'as répondu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu m'as encouragé, tu m'as fortifié.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous les rois de la terre te loueront, Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en entendant les paroles de ta bouche;
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils célébreront les voies de l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car la gloire de l'Eternel est grande.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'Eternel est élevé, mais il voit les humbles
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il reconnaît de loin les orgueilleux.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand je marche dans la détresse, tu me rends la vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu portes la main contre la colère de mes ennemis
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ta main droite me sauve.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'Eternel terminera ce qu'il a commencé pour moi.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Eternel, ta bonté dure éternellement:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: n'abandonne pas les œuvres de tes mains!
