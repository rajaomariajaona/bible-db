document_id: PSA.138,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Louange pour l'accomplissement des promesses
  - type: text
    content: De David.
  - type: text
    content: Je te célèbre de tout mon cœur,
  - type: text
    content: je chante tes louanges en face des dieux.
  '2':
  - type: text
    content: Je me prosterne dans ton saint temple
  - type: text
    content: et je célèbre ton nom à cause de ta bonté et de ta vérité.
  - type: text
    content: Oui, tu as surpassé ta réputation dans l'accomplissement de tes promesses.
  '3':
  - type: text
    content: Lorsque je t'ai appelé, tu m'as répondu,
  - type: text
    content: tu m'as encouragé, tu m'as fortifié.
  '4':
  - type: text
    content: Tous les rois de la terre te loueront, Eternel,
  - type: text
    content: en entendant les paroles de ta bouche;
  '5':
  - type: text
    content: ils célébreront les voies de l'Eternel,
  - type: text
    content: car la gloire de l'Eternel est grande.
  '6':
  - type: text
    content: L'Eternel est élevé, mais il voit les humbles
  - type: text
    content: et il reconnaît de loin les orgueilleux.
  '7':
  - type: text
    content: Quand je marche dans la détresse, tu me rends la vie,
  - type: text
    content: tu portes la main contre la colère de mes ennemis
  - type: text
    content: et ta main droite me sauve.
  '8':
  - type: text
    content: L'Eternel terminera ce qu'il a commencé pour moi.
  - type: text
    content: 'Eternel, ta bonté dure éternellement:'
  - type: text
    content: n'abandonne pas les œuvres de tes mains!
