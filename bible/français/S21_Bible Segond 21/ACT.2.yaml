document_id: ACT.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Venue de l'Esprit à la Pentecôte
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Quand le jour de la Pentecôte arriva, ils étaient tous ensemble au même endroit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Tout à coup il vint du ciel un bruit comme celui d''un vent violent, qui remplit toute la maison où ils étaient assis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Des langues qui semblaient de feu leur apparurent, séparées les unes des autres, et elles se posèrent sur chacun d''eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ils furent tous remplis du Saint-Esprit et se mirent à parler en d'autres langues, comme l'Esprit leur donnait de s'exprimer.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Or il y avait en séjour à Jérusalem des Juifs, hommes pieux venus de toutes les nations qui sont sous le ciel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'A ce bruit, ils accoururent en foule, et ils furent stupéfaits parce que chacun les entendait parler dans sa propre langue. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ils étaient [tous] remplis d''étonnement et d''admiration et ils se disaient [les uns aux autres]: «Ces gens qui parlent ne sont-ils pas tous galiléens? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Comment se fait-il donc que nous les entendions chacun dans notre propre langue, notre langue maternelle? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Parthes, Mèdes, Elamites, habitants de la Mésopotamie, de la Judée, de la Cappadoce, du Pont, de l''Asie, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'de la Phrygie, de la Pamphylie, de l''Egypte, du territoire de la Libye voisine de Cyrène et résidents venus de Rome, Juifs de naissance ou par conversion, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Crétois et Arabes, nous les entendons parler dans notre langue des merveilles de Dieu!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tous remplis d''étonnement et ne sachant que penser, ils se disaient les uns aux autres: «Qu''est-ce que cela veut dire?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mais d''autres se moquaient et disaient: «Ils sont pleins de vin doux.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Alors Pierre, debout avec les onze apôtres, s''exprima d''une voix forte en ces termes: «Hommes de Judée et vous tous qui séjournez à Jérusalem, comprenez ce qui se passe et prêtez l''oreille à mes paroles! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ces gens ne sont pas ivres, comme vous le supposez, car il est neuf heures du matin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Mais maintenant se réalise ce qu''a dit le prophète Joël: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Dans les derniers jours,
  - type: text
    text: ' dit Dieu, '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: je déverserai de mon Esprit sur tout être humain; vos fils et vos filles prophétiseront, vos jeunes gens auront des visions et vos vieillards auront des rêves.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Oui, sur mes serviteurs et sur mes servantes, durant ces jours-là, je déverserai de mon Esprit et ils prophétiseront.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: 'Je ferai des prodiges en haut dans le ciel et des signes miraculeux en bas sur la terre: du sang, du feu et une vapeur de fumée;'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: le soleil se changera en ténèbres et la lune en sang avant l'arrivée du jour du Seigneur, de ce jour grand et glorieux.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Alors toute personne qui fera appel au nom du Seigneur sera sauvée.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.17-21 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Dans les derniers… sauvée: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Joël 3.1-5
      metadata:
        usfm: JOL.3.1+JOL.3.2+JOL.3.3+JOL.3.4+JOL.3.5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: '»Israélites, écoutez ces paroles! Dieu vous a désigné Jésus de Nazareth en accomplissant par lui, au milieu de vous, des miracles, des prodiges et des signes, comme vous le savez vous-mêmes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Cet homme vous a été livré suivant le projet défini et la prescience de Dieu. [Vous l''avez arrêté,] vous l''avez fait mourir sur une croix par l''intermédiaire d''hommes impies. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Mais Dieu a brisé les liens de la mort, il l''a ressuscité, parce qu''il n''était pas possible qu''elle le retienne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'En effet, David dit à propos de lui: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Je voyais constamment le Seigneur devant moi, parce qu'il est à ma droite afin que je ne sois pas ébranlé.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: C'est pourquoi mon cœur est dans la joie et ma langue dans l'allégresse; même mon corps reposera avec espérance,
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: car tu n'abandonneras pas mon âme au séjour des morts, tu ne permettras pas que ton saint connaisse la décomposition.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Tu m'as fait connaître les sentiers de la vie, tu me rempliras de joie par ta présence.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.25-28 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Je voyais… présence: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation du '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psaume 16.8-11
      metadata:
        usfm: PSA.16.8+PSA.16.9+PSA.16.10+PSA.16.11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: '»Mes frères, qu''il me soit permis de vous parler en toute franchise au sujet du patriarche David: il est mort, il a été enseveli et son tombeau existe encore aujourd''hui parmi nous! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Or il était prophète et il savait que Dieu lui avait juré par serment de faire surgir [le Messie
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.30 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Messie: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ou oint de Dieu, en grec Christos. Les Juifs attendaient, d'après les promesses de l'Ancien Testament, la venue d'une personne désignée par Dieu, qui leur apporterait la délivrance.
    marker-yv: yv-n
  - type: text
    text: ',] un de ses descendants, pour le faire asseoir sur son trône. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'C''est donc la résurrection du Christ qu''il a prévue et annoncée en disant qu''il ne serait pas '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: abandonné au séjour des morts et que son corps ne connaîtrait pas la décomposition
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.31 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Abandonné… décomposition: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'renvoi au '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psaume 16.10
      metadata:
        usfm: PSA.16.10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: '»C''est ce Jésus que Dieu a ressuscité, nous en sommes tous témoins. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Elevé à la droite de Dieu, il a reçu du Père le Saint-Esprit qui avait été promis et il l''a déversé, comme vous le voyez et l''entendez [maintenant]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'David en effet n''est pas monté au ciel, mais il dit lui-même: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: 'Le Seigneur a dit à mon Seigneur: ‘Assieds-toi à ma droite'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: jusqu'à ce que j'aie fait de tes ennemis ton marchepied.’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.34-35 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le Seigneur… marchepied: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Christ avait lui-même utilisé le passage cité ici (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psaume 110.1
      metadata:
        usfm: PSA.110.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) dans une argumentation relative à son rôle en tant que Messie, libérateur envoyé par Dieu (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matthieu 22.41-45
      metadata:
        usfm: MAT.22.41+MAT.22.42+MAT.22.43+MAT.22.44+MAT.22.45
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Que toute la communauté d'Israël sache donc avec certitude que Dieu a fait Seigneur et Messie ce Jésus que vous avez crucifié.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Après avoir entendu ce discours, ils eurent le cœur vivement touché et dirent à Pierre et aux autres apôtres: «Frères, que ferons-nous?»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Pierre leur dit: «Changez d''attitude et que chacun de vous soit baptisé au nom de Jésus-Christ pour le pardon de vos péchés, et vous recevrez le don du Saint-Esprit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'En effet, la promesse est pour vous, pour vos enfants et pour tous ceux qui sont au loin, en aussi grand nombre que le Seigneur notre Dieu les appellera.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Et par beaucoup d''autres paroles, il rendait témoignage et les encourageait en disant: «Sauvez-vous de cette génération pervertie!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ceux qui acceptèrent sa parole furent donc baptisés et, ce jour-là, le nombre des disciples augmenta d''environ 3000 personnes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ils persévéraient dans l''enseignement des apôtres, dans la communion fraternelle, dans la fraction du pain et dans les prières. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'La crainte s''emparait de chacun et il se faisait beaucoup de prodiges et de signes miraculeux par l''intermédiaire des apôtres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Tous ceux qui croyaient étaient ensemble et ils avaient tout en commun. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Ils vendaient leurs propriétés et leurs biens et ils en partageaient le produit entre tous, en fonction des besoins. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Chaque jour, avec persévérance, ils se retrouvaient d''un commun accord au temple; ils rompaient le pain dans les maisons et ils prenaient leur nourriture avec joie et simplicité de cœur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Ils louaient Dieu et avaient la faveur de tout le peuple. Le Seigneur ajoutait chaque jour à l'Eglise ceux qui étaient sauvés.
