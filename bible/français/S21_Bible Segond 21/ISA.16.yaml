document_id: ISA.16,152
type_code: fra
verses:
  '1':
  - type: text
    content: Envoyez un bélier au souverain du pays!
  - type: text
    content: De Séla, envoyez-le dans le désert
  - type: text
    content: jusqu'à la montagne de la fille de Sion!
  '10':
  - type: text
    content: La joie et l'allégresse ont disparu des vergers.
  - type: text
    content: Dans les vignes, plus de chant, plus de réjouissance!
  - type: text
    content: Le vendangeur ne presse plus le raisin dans les cuves.
  - type: text
    content: J'ai fait cesser les cris de joie.
  '11':
  - type: text
    content: Voilà pourquoi je vibre intérieurement pour Moab, pareil à une harpe,
  - type: text
    content: je suis profondément ému pour Kir-Harès.
  '12':
  - type: text
    content: Moab se présente, il se fatigue sur les hauts lieux.
  - type: text
    content: Il entre dans son sanctuaire pour prier, mais il ne peut rien obtenir.
  '13':
  - type: text
    content: Telle est la parole que l'Eternel a prononcée depuis longtemps à l'intention de Moab.
  '14':
  - type: text
    content: 'Et maintenant, voici ce que dit l''Eternel:'
  - type: text
    content: Dans trois ans, comptés aussi précisément que les années d'un salarié,
  - type: text
    content: la gloire de Moab sera un objet de mépris,
  - type: text
    content: malgré toute sa population;
  - type: text
    content: il n'en restera pas grand-chose, presque rien.
  '2':
  - type: text
    content: Pareilles à un oiseau fugitif ou à une couvée effrayée,
  - type: text
    content: 'voilà comment seront les filles de Moab au passage de l''Arnon:'
  '3':
  - type: text
    content: «Tiens conseil, prenez une décision!
  - type: text
    content: Couvre-nous en plein midi de ton ombre aussi épaisse que la nuit,
  - type: text
    content: cache les exilés,
  - type: text
    content: ne trahis pas le fugitif!
  '4':
  - type: text
    content: Laisse les exilés de Moab séjourner chez toi,
  - type: text
    content: abrite-les contre le dévastateur!
  - type: text
    content: En effet, l'oppression cessera, la dévastation prendra fin,
  - type: text
    content: celui qui piétine le pays disparaîtra.
  '5':
  - type: text
    content: Le trône s'affermira par la bonté
  - type: text
    content: et sur lui, dans la tente de David, on verra siéger en toute vérité
  - type: text
    content: un juge soucieux du droit et zélé pour rendre la justice.»
  '6':
  - type: text
    content: '*Nous avons entendu s''exprimer l''orgueil du très arrogant Moab,'
  - type: text
    content: son arrogance, son orgueil et ses excès. Son bavardage ne vaut rien.
  - type: note
    content: 'Nous avons… rien: cité en Jérémie 48.29, 30.'
  '7':
  - type: text
    content: Voilà pourquoi Moab se lamente sur lui-même, il se lamente tout entier.
  - type: text
    content: Vous soupirez à cause des gâteaux de raisin qu'on faisait à Kir-Haréseth,
  - type: text
    content: profondément abattus.
  '8':
  - type: text
    content: C'est que les campagnes de Hesbon dépérissent.
  - type: text
    content: Les maîtres des nations ont brisé les ceps de la vigne de Sibma
  - type: text
    content: qui s'étendaient jusqu'à Jaezer et s'égaraient dans le désert,
  - type: text
    content: et dont les sarments se prolongeaient pour traverser la mer.
  '9':
  - type: text
    content: C'est pourquoi je pleurerai sur la vigne de Sibma autant que sur Jaezer,
  - type: text
    content: je vous arroserai de mes larmes, Hesbon et Elealé!
  - type: text
    content: En effet, sur votre récolte et sur votre vendange
  - type: text
    content: les cris des vendangeurs ont cessé.
