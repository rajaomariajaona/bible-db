document_id: ISA.16,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Envoyez un bélier au souverain du pays!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De Séla, envoyez-le dans le désert
  - type: usfm
    marker: q1
    children:
    - type: text
      text: jusqu'à la montagne de la fille de Sion!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: La joie et l'allégresse ont disparu des vergers.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans les vignes, plus de chant, plus de réjouissance!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le vendangeur ne presse plus le raisin dans les cuves.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J'ai fait cesser les cris de joie.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Voilà pourquoi je vibre intérieurement pour Moab, pareil à une harpe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je suis profondément ému pour Kir-Harès.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Moab se présente, il se fatigue sur les hauts lieux.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il entre dans son sanctuaire pour prier, mais il ne peut rien obtenir.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Telle est la parole que l'Eternel a prononcée depuis longtemps à l'intention de Moab.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Et maintenant, voici ce que dit l''Eternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans trois ans, comptés aussi précisément que les années d'un salarié,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la gloire de Moab sera un objet de mépris,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: malgré toute sa population;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il n'en restera pas grand-chose, presque rien.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Pareilles à un oiseau fugitif ou à une couvée effrayée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'voilà comment seront les filles de Moab au passage de l''Arnon:'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: «Tiens conseil, prenez une décision!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Couvre-nous en plein midi de ton ombre aussi épaisse que la nuit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: cache les exilés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne trahis pas le fugitif!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Laisse les exilés de Moab séjourner chez toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: abrite-les contre le dévastateur!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, l'oppression cessera, la dévastation prendra fin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celui qui piétine le pays disparaîtra.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Le trône s'affermira par la bonté
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et sur lui, dans la tente de David, on verra siéger en toute vérité
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un juge soucieux du droit et zélé pour rendre la justice.»
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: '*Nous avons entendu s''exprimer l''orgueil du très arrogant Moab,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: son arrogance, son orgueil et ses excès. Son bavardage ne vaut rien.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Nous avons… rien: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jérémie 48.29
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '30'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Voilà pourquoi Moab se lamente sur lui-même, il se lamente tout entier.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous soupirez à cause des gâteaux de raisin qu'on faisait à Kir-Haréseth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: profondément abattus.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: C'est que les campagnes de Hesbon dépérissent.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les maîtres des nations ont brisé les ceps de la vigne de Sibma
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui s'étendaient jusqu'à Jaezer et s'égaraient dans le désert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et dont les sarments se prolongeaient pour traverser la mer.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: C'est pourquoi je pleurerai sur la vigne de Sibma autant que sur Jaezer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je vous arroserai de mes larmes, Hesbon et Elealé!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, sur votre récolte et sur votre vendange
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les cris des vendangeurs ont cessé.
