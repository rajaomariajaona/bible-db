document_id: EZK.35
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prophétie contre Edom
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La parole de l''Eternel m''a été adressée: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Fils de l''homme, tourne ton visage vers la région montagneuse de Séir et prophétise contre elle! '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tu lui annonceras:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '»Voici ce que dit le Seigneur, l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je m'en prends à toi, région montagneuse de Séir!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je déploierai ma puissance contre toi
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je ferai de toi un sujet de consternation et un endroit dévasté.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Je réduirai tes villes en ruine
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu deviendras un sujet de consternation.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu reconnaîtras alors que je suis l'Eternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '»Tu as montré une hostilité constante et tu as précipité les Israélites sur le tranchant de l''épée au moment où ils étaient dans la détresse, au moment où leur faute était arrivée à son comble. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'C''est pourquoi – aussi vrai que je suis vivant, déclare le Seigneur, l''Eternel – je te mettrai à sang et le sang te poursuivra. Puisque tu n''as pas détesté le sang, le sang te poursuivra. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Je ferai de la région montagneuse de Séir un endroit entièrement dévasté, dépourvu de toute animation. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Je remplirai ses montagnes de victimes. Les victimes de l''épée joncheront tes collines, tes vallées et tous tes cours d''eau. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Je ferai de toi un sujet de consternation éternel et tes villes ne seront plus habitées. Vous reconnaîtrez alors que je suis l'Eternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '»Tu as affirmé: ‘Les deux nations, les deux pays seront à moi, nous en prendrons possession’, alors que l''Eternel était là. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'C''est pourquoi – aussi vrai que je suis vivant, déclare le Seigneur, l''Eternel – j''agirai avec la colère et l''acharnement dont tu as fait preuve dans ta haine contre eux. Ainsi je me ferai connaître au milieu d''eux, quand je te jugerai. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tu sauras que moi, l''Eternel, j''ai entendu toutes les insultes que tu as proférées contre les montagnes d''Israël lorsque tu as dit: ‘Elles sont dévastées, elles nous sont données en guise de nourriture.’ '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Vous vous êtes attaqués à moi par votre bouche, vous avez multiplié vos paroles contre moi. Moi, j'ai entendu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '»Voici ce que dit le Seigneur, l''Eternel: Lorsque toute la terre sera dans la joie, je ferai de toi un endroit dévasté. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Puisque tu t''es réjouie lorsque l''héritage de la communauté d''Israël était dévasté, je te traiterai exactement de la même manière: tu deviendras un endroit dévasté, région montagneuse de Séir, ainsi qu''Edom tout entier. Ils reconnaîtront alors que je suis l''Eternel.'
