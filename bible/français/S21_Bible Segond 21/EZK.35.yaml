document_id: EZK.35,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Prophétie contre Edom
  - type: text
    content: 'La parole de l''Eternel m''a été adressée: '
  '10':
  - type: text
    content: '»Tu as affirmé: ‘Les deux nations, les deux pays seront à moi, nous en prendrons possession’, alors que l''Eternel était là. '
  '11':
  - type: text
    content: 'C''est pourquoi – aussi vrai que je suis vivant, déclare le Seigneur, l''Eternel – j''agirai avec la colère et l''acharnement dont tu as fait preuve dans ta haine contre eux. Ainsi je me ferai connaître au milieu d''eux, quand je te jugerai. '
  '12':
  - type: text
    content: 'Tu sauras que moi, l''Eternel, j''ai entendu toutes les insultes que tu as proférées contre les montagnes d''Israël lorsque tu as dit: ‘Elles sont dévastées, elles nous sont données en guise de nourriture.’ '
  '13':
  - type: text
    content: Vous vous êtes attaqués à moi par votre bouche, vous avez multiplié vos paroles contre moi. Moi, j'ai entendu.
  '14':
  - type: text
    content: '»Voici ce que dit le Seigneur, l''Eternel: Lorsque toute la terre sera dans la joie, je ferai de toi un endroit dévasté. '
  '15':
  - type: text
    content: 'Puisque tu t''es réjouie lorsque l''héritage de la communauté d''Israël était dévasté, je te traiterai exactement de la même manière: tu deviendras un endroit dévasté, région montagneuse de Séir, ainsi qu''Edom tout entier. Ils reconnaîtront alors que je suis l''Eternel.'
  '2':
  - type: text
    content: '«Fils de l''homme, tourne ton visage vers la région montagneuse de Séir et prophétise contre elle! '
  '3':
  - type: text
    content: 'Tu lui annonceras:'
  - type: text
    content: '»Voici ce que dit le Seigneur, l''Eternel:'
  - type: text
    content: Je m'en prends à toi, région montagneuse de Séir!
  - type: text
    content: Je déploierai ma puissance contre toi
  - type: text
    content: et je ferai de toi un sujet de consternation et un endroit dévasté.
  '4':
  - type: text
    content: Je réduirai tes villes en ruine
  - type: text
    content: et tu deviendras un sujet de consternation.
  - type: text
    content: Tu reconnaîtras alors que je suis l'Eternel.
  '5':
  - type: text
    content: '»Tu as montré une hostilité constante et tu as précipité les Israélites sur le tranchant de l''épée au moment où ils étaient dans la détresse, au moment où leur faute était arrivée à son comble. '
  '6':
  - type: text
    content: 'C''est pourquoi – aussi vrai que je suis vivant, déclare le Seigneur, l''Eternel – je te mettrai à sang et le sang te poursuivra. Puisque tu n''as pas détesté le sang, le sang te poursuivra. '
  '7':
  - type: text
    content: 'Je ferai de la région montagneuse de Séir un endroit entièrement dévasté, dépourvu de toute animation. '
  '8':
  - type: text
    content: 'Je remplirai ses montagnes de victimes. Les victimes de l''épée joncheront tes collines, tes vallées et tous tes cours d''eau. '
  '9':
  - type: text
    content: Je ferai de toi un sujet de consternation éternel et tes villes ne seront plus habitées. Vous reconnaîtrez alors que je suis l'Eternel.
