document_id: LEV.1
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Les sacrifices
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 1.1–7.38
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: L'holocauste
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L''Eternel appela Moïse; de la tente de la rencontre, il lui dit: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Transmets ces instructions aux Israélites: Lorsque quelqu''un parmi vous fera une offrande à l''Eternel, il offrira du bétail, du gros ou du petit bétail.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: »Si son offrande est un holocauste de gros bétail, il offrira un mâle sans défaut; il l'offrira à l'entrée
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Al''entrée: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: c'est-à-dire dans le parvis.
    marker-yv: yv-n
  - type: text
    text: ' de la tente de la rencontre, devant l''Eternel, pour obtenir sa faveur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il posera sa main sur la tête de l''holocauste, qui sera accepté de l''Eternel pour lui servir d''expiation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il égorgera le veau devant l''Eternel et les prêtres, les descendants d''Aaron, offriront le sang et le verseront sur tout le pourtour de l''autel qui est à l''entrée de la tente de la rencontre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il enlèvera la peau de l''holocauste et le coupera en morceaux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Les descendants du prêtre Aaron mettront du feu sur l''autel et arrangeront du bois sur le feu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Les prêtres, les descendants d''Aaron, poseront les morceaux, la tête et la graisse sur le bois en feu placé sur l''autel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Il lavera les entrailles et les pattes avec de l'eau. Le prêtre brûlera toute l'offrande sur l'autel. C'est un holocauste, un sacrifice brûlé au feu dont l'odeur est agréable à l'Eternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '»Si son offrande est un holocauste de petit bétail, d''agneaux ou de chevreaux, il offrira un mâle sans défaut. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il l''égorgera du côté nord de l''autel, devant l''Eternel. Les prêtres, les descendants d''Aaron, en verseront le sang sur tout le pourtour de l''autel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il le coupera en morceaux et le prêtre les posera, avec la tête et la graisse, sur le bois mis au feu sur l''autel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Il lavera les entrailles et les pattes avec de l'eau, et le prêtre sacrifiera le tout, il brûlera l'offrande sur l'autel. C'est un holocauste, un sacrifice brûlé au feu dont l'odeur est agréable à l'Eternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '»Si son offrande à l''Eternel est un holocauste d''oiseaux, il offrira des tourterelles ou de jeunes pigeons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Le prêtre sacrifiera l''oiseau sur l''autel. Il lui ouvrira la tête avec l''ongle, la brûlera sur l''autel et versera le sang contre un côté de l''autel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il enlèvera le jabot avec ses plumes et le jettera près de l''autel, vers l''est, à l''endroit où l''on met les cendres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Il le déchirera par les ailes, sans les détacher. Le prêtre brûlera l'oiseau sur l'autel, sur le bois mis au feu. C'est un holocauste, un sacrifice brûlé au feu dont l'odeur est agréable à l'Eternel.
