document_id: 1KI.17
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Famine annoncée par Elie
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Elie le Thishbite, l''un des habitants de Galaad, dit à Achab: «L''Eternel, le Dieu d''Israël, dont je suis le serviteur est vivant! Il n''y aura ces années-ci pas de rosée ni de pluie, sauf sur ma parole.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Puis la parole de l''Eternel fut adressée à Elie: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '«Pars d''ici en direction de l''est et cache-toi près du torrent de Kerith, qui se trouve en face du Jourdain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tu boiras de l''eau du torrent et c''est aux corbeaux que j''ai ordonné de te nourrir là.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Elie partit et se conforma à la parole de l''Eternel: il alla s''installer près du torrent de Kerith, qui se trouve en face du Jourdain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Les corbeaux lui apportaient du pain et de la viande matin et soir, et il buvait de l''eau du torrent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mais au bout d'un certain temps, le torrent fut à sec, car il n'était pas tombé de pluie dans le pays.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Alors la parole de l''Eternel lui fut adressée: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '«Lève-toi, va à Sarepta, qui appartient au territoire de Sidon, et installe-toi là. J''y ai ordonné à une femme veuve de te nourrir.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il se leva et partit à Sarepta. En arrivant à l''entrée de la ville, il y vit une femme veuve en train de ramasser du bois. Il l''appela et dit: «Je t''en prie, va me chercher un peu d''eau dans une cruche, afin que je boive.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Et elle alla en chercher. Il l''appela de nouveau et dit: «Je t''en prie, apporte-moi un morceau de pain dans ta main.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Et elle répondit: «L''Eternel, ton Dieu, est vivant! Je n''ai rien de cuit, je n''ai qu''une poignée de farine dans un pot et un peu d''huile dans une cruche. Je suis en train de ramasser deux morceaux de bois, puis je rentrerai et je préparerai cela pour mon fils et pour moi. Nous le mangerons, après quoi nous mourrons.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Elie lui dit: «N''aie pas peur, rentre et fais comme tu l''as dit. Seulement, prépare-moi d''abord avec cela un petit gâteau et apporte-le-moi. Ensuite, tu en feras pour ton fils et pour toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'En effet, voici ce que dit l''Eternel, le Dieu d''Israël: ‘La farine qui est dans le pot ne manquera pas et l''huile qui est dans la cruche ne diminuera pas, jusqu''au jour où l''Eternel fera tomber de la pluie sur le pays.’» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Elle partit et se conforma à la parole d''Elie. Et pendant longtemps elle eut de quoi manger, ainsi que sa famille et Elie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: La farine qui était dans le pot ne manqua pas et l'huile qui était dans la cruche ne diminua pas, conformément à la parole que l'Eternel avait prononcée par l'intermédiaire d'Elie.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Après ces événements, le fils de cette maîtresse de maison tomba malade. Sa maladie fut si violente qu''il cessa de respirer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'La femme dit alors à Elie: «Que me veux-tu, homme de Dieu? Es-tu venu chez moi pour rappeler le souvenir de ma faute et pour faire mourir mon fils?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Il lui répondit: «Donne-moi ton fils.» Et il le prit des bras de la femme, le monta dans la chambre à l''étage où il logeait et le coucha sur son lit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Puis il fit appel à l''Eternel et dit: «Eternel, mon Dieu, est-ce que tu vas faire du mal, au point de faire mourir son fils, même à cette veuve qui m''a accueilli chez elle?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Puis il s''étendit trois fois sur l''enfant, fit appel à l''Eternel et dit: «Eternel, mon Dieu, je t''en prie, que l''âme de cet enfant revienne en lui!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'L''Eternel écouta Elie: l''âme de l''enfant revint en lui et il retrouva la vie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Elie prit l''enfant, le descendit de la chambre jusque dans la maison et le donna à sa mère en lui disant: «Vois, ton fils est vivant.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'La femme dit alors à Elie: «Je reconnais maintenant que tu es un homme de Dieu et que la parole de l''Eternel dans ta bouche est vraie.»'
