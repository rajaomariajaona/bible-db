document_id: PSA.47,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La souveraineté de Dieu
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Au chef de chœur. Psaume des descendants de Koré.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Les princes des peuples s'unissent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au peuple du Dieu d'Abraham,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'car les puissants de la terre appartiennent à Dieu:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il est souverainement élevé.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Vous, tous les peuples, battez des mains,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: poussez vers Dieu des cris de joie,
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: car l'Eternel, le Très-Haut, est redoutable,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il est un grand roi sur toute la terre.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Il nous soumet des peuples,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il met des nations sous nos pieds;
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: il choisit pour nous un héritage
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'qui fait la fierté de Jacob, son bien-aimé. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: – Pause.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Dieu monte au milieu des cris de triomphe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'Eternel s'avance au son de la trompette.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Chantez en l'honneur de Dieu, chantez,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: chantez en l'honneur de notre roi, chantez,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: car Dieu est le roi de toute la terre!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Chantez un cantique!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Dieu règne sur les nations, Dieu siège sur son saint trône.
