document_id: PSA.47,152
type_code: fra
verses:
  '1':
  - type: heading
    content: La souveraineté de Dieu
  - type: text
    content: Au chef de chœur. Psaume des descendants de Koré.
  '10':
  - type: text
    content: Les princes des peuples s'unissent
  - type: text
    content: au peuple du Dieu d'Abraham,
  - type: text
    content: 'car les puissants de la terre appartiennent à Dieu:'
  - type: text
    content: il est souverainement élevé.
  '2':
  - type: text
    content: Vous, tous les peuples, battez des mains,
  - type: text
    content: poussez vers Dieu des cris de joie,
  '3':
  - type: text
    content: car l'Eternel, le Très-Haut, est redoutable,
  - type: text
    content: il est un grand roi sur toute la terre.
  '4':
  - type: text
    content: Il nous soumet des peuples,
  - type: text
    content: il met des nations sous nos pieds;
  '5':
  - type: text
    content: il choisit pour nous un héritage
  - type: text
    content: 'qui fait la fierté de Jacob, son bien-aimé. '
  - type: text
    content: – Pause.
  '6':
  - type: text
    content: Dieu monte au milieu des cris de triomphe,
  - type: text
    content: l'Eternel s'avance au son de la trompette.
  '7':
  - type: text
    content: Chantez en l'honneur de Dieu, chantez,
  - type: text
    content: chantez en l'honneur de notre roi, chantez,
  '8':
  - type: text
    content: car Dieu est le roi de toute la terre!
  - type: text
    content: Chantez un cantique!
  '9':
  - type: text
    content: Dieu règne sur les nations, Dieu siège sur son saint trône.
