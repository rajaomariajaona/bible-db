document_id: DEU.19
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les villes de refuge
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '»Lorsque l''Eternel, ton Dieu, aura exterminé les nations dont il te donne le pays, lorsque tu les auras chassées et que tu habiteras dans leurs villes et dans leurs maisons, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'tu mettras 3 villes à part au milieu du pays dont l''Eternel, ton Dieu, te donne la possession. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tu établiras des routes pour y aller et tu diviseras en 3 parties le territoire que l''Eternel, ton Dieu, va te donner en héritage. Ce sera le cas afin que tout auteur d''un homicide puisse s''enfuir dans ces villes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Cette loi s''appliquera au meurtrier qui s''enfuira là pour sauver sa vie après avoir involontairement tué son prochain, sans avoir été son ennemi auparavant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'C''est le cas, par exemple, d''un homme qui va couper du bois dans la forêt avec un autre homme. La hache en main, il s''élance pour abattre un arbre. Le fer se détache du manche, atteint le compagnon de cet homme et lui donne la mort. Alors l''homme pourra s''enfuir dans l''une de ces villes pour sauver sa vie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Cela permettra d''éviter que le vengeur du sang, échauffé par la colère et poursuivant l''auteur de l''homicide, ne finisse par l''atteindre, s''il y avait beaucoup de chemin à faire, et ne frappe mortellement un homme qui ne mérite pas la mort, puisqu''il n''était pas l''ennemi de son prochain auparavant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'C''est pourquoi je te donne l''ordre de mettre 3 villes à part. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'L''Eternel, ton Dieu, va élargir tes frontières comme il l''a juré à tes ancêtres et te donner tout le pays qu''il a promis à tes ancêtres de te donner, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'pourvu que tu respectes tous les commandements que je te prescris aujourd''hui en les mettant en pratique, en aimant l''Eternel, ton Dieu, et en marchant toujours dans ses voies. Tu ajouteras alors encore 3 villes à ces trois-là, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: afin que le sang innocent ne soit pas versé au milieu du pays que l'Eternel, ton Dieu, te donne en héritage et que tu ne te rendes pas coupable de meurtre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '»Mais si un homme s''enfuit dans une de ces villes après avoir tendu des embuscades à son prochain par haine contre lui, après l''avoir attaqué et frappé de manière à causer sa mort, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'les anciens de sa ville le feront arrêter et le livreront entre les mains du vengeur du sang afin qu''il meure. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ton regard sera sans pitié envers lui. Tu feras ainsi disparaître d'Israël le sang innocent et tu seras heureux.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Respect des limites et nécessité de témoins
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: »Tu ne reculeras pas les bornes de ton prochain, celles qu'ont posées tes ancêtres, dans l'héritage que tu auras au pays dont l'Eternel, ton Dieu, te donne la possession.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: »Un seul témoin ne suffira pas contre un homme pour constater un crime ou un péché, quel qu'il soit; *un fait ne pourra être établi que sur la déposition de 2 ou de 3 témoins
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Un fait… témoins: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'exigence évoquée et confirmée en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matthieu 18.16
      metadata:
        usfm: MAT.18.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jean 8.17
      metadata:
        usfm: JHN.8.17
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Corinthiens 13.1
      metadata:
        usfm: 2CO.13.1
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Timothée 5.19
      metadata:
        usfm: 1TI.5.19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '»Lorsqu''un faux témoin se dressera contre quelqu''un pour l''accuser d''un crime, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'les deux hommes en contestation comparaîtront devant l''Eternel, devant les prêtres et les juges alors en fonction. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Les juges feront avec soin des recherches: le témoin est-il un faux témoin, a-t-il fait une fausse déposition contre son frère? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Alors vous le traiterez comme il avait l''intention de traiter son frère. Tu extirperas ainsi le mal du milieu de toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Les autres en entendront parler et éprouveront de la crainte, et l''on ne commettra plus un acte aussi criminel au milieu de toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ton regard sera sans pitié: *œil pour œil, dent pour dent'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.21 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Œil pour… dent: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: cette «loi du talion» est reprise d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Exode 21.24
      metadata:
        usfm: EXO.21.24
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lévitique 24.20
      metadata:
        usfm: LEV.24.20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' et mentionnée par Jésus en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matthieu 5.38
      metadata:
        usfm: MAT.5.38
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', main pour main, pied pour pied.'
