document_id: DEU.19,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Les villes de refuge
  - type: text
    content: '»Lorsque l''Eternel, ton Dieu, aura exterminé les nations dont il te donne le pays, lorsque tu les auras chassées et que tu habiteras dans leurs villes et dans leurs maisons, '
  '10':
  - type: text
    content: afin que le sang innocent ne soit pas versé au milieu du pays que l'Eternel, ton Dieu, te donne en héritage et que tu ne te rendes pas coupable de meurtre.
  '11':
  - type: text
    content: '»Mais si un homme s''enfuit dans une de ces villes après avoir tendu des embuscades à son prochain par haine contre lui, après l''avoir attaqué et frappé de manière à causer sa mort, '
  '12':
  - type: text
    content: 'les anciens de sa ville le feront arrêter et le livreront entre les mains du vengeur du sang afin qu''il meure. '
  '13':
  - type: text
    content: Ton regard sera sans pitié envers lui. Tu feras ainsi disparaître d'Israël le sang innocent et tu seras heureux.
  - type: heading
    content: Respect des limites et nécessité de témoins
  '14':
  - type: text
    content: »Tu ne reculeras pas les bornes de ton prochain, celles qu'ont posées tes ancêtres, dans l'héritage que tu auras au pays dont l'Eternel, ton Dieu, te donne la possession.
  '15':
  - type: text
    content: »Un seul témoin ne suffira pas contre un homme pour constater un crime ou un péché, quel qu'il soit; *un fait ne pourra être établi que sur la déposition de 2 ou de 3 témoins
  - type: note
    content: 'Un fait… témoins: exigence évoquée et confirmée en Matthieu 18.16; Jean 8.17; 2 Corinthiens 13.1; 1 Timothée 5.19.'
  - type: text
    content: .
  '16':
  - type: text
    content: '»Lorsqu''un faux témoin se dressera contre quelqu''un pour l''accuser d''un crime, '
  '17':
  - type: text
    content: 'les deux hommes en contestation comparaîtront devant l''Eternel, devant les prêtres et les juges alors en fonction. '
  '18':
  - type: text
    content: 'Les juges feront avec soin des recherches: le témoin est-il un faux témoin, a-t-il fait une fausse déposition contre son frère? '
  '19':
  - type: text
    content: 'Alors vous le traiterez comme il avait l''intention de traiter son frère. Tu extirperas ainsi le mal du milieu de toi. '
  '2':
  - type: text
    content: 'tu mettras 3 villes à part au milieu du pays dont l''Eternel, ton Dieu, te donne la possession. '
  '20':
  - type: text
    content: 'Les autres en entendront parler et éprouveront de la crainte, et l''on ne commettra plus un acte aussi criminel au milieu de toi. '
  '21':
  - type: text
    content: 'Ton regard sera sans pitié: *œil pour œil, dent pour dent'
  - type: note
    content: 'Œil pour… dent: cette «loi du talion» est reprise d''Exode 21.24; Lévitique 24.20 et mentionnée par Jésus en Matthieu 5.38.'
  - type: text
    content: ', main pour main, pied pour pied.'
  '3':
  - type: text
    content: 'Tu établiras des routes pour y aller et tu diviseras en 3 parties le territoire que l''Eternel, ton Dieu, va te donner en héritage. Ce sera le cas afin que tout auteur d''un homicide puisse s''enfuir dans ces villes. '
  '4':
  - type: text
    content: 'Cette loi s''appliquera au meurtrier qui s''enfuira là pour sauver sa vie après avoir involontairement tué son prochain, sans avoir été son ennemi auparavant. '
  '5':
  - type: text
    content: 'C''est le cas, par exemple, d''un homme qui va couper du bois dans la forêt avec un autre homme. La hache en main, il s''élance pour abattre un arbre. Le fer se détache du manche, atteint le compagnon de cet homme et lui donne la mort. Alors l''homme pourra s''enfuir dans l''une de ces villes pour sauver sa vie. '
  '6':
  - type: text
    content: 'Cela permettra d''éviter que le vengeur du sang, échauffé par la colère et poursuivant l''auteur de l''homicide, ne finisse par l''atteindre, s''il y avait beaucoup de chemin à faire, et ne frappe mortellement un homme qui ne mérite pas la mort, puisqu''il n''était pas l''ennemi de son prochain auparavant. '
  '7':
  - type: text
    content: 'C''est pourquoi je te donne l''ordre de mettre 3 villes à part. '
  '8':
  - type: text
    content: 'L''Eternel, ton Dieu, va élargir tes frontières comme il l''a juré à tes ancêtres et te donner tout le pays qu''il a promis à tes ancêtres de te donner, '
  '9':
  - type: text
    content: 'pourvu que tu respectes tous les commandements que je te prescris aujourd''hui en les mettant en pratique, en aimant l''Eternel, ton Dieu, et en marchant toujours dans ses voies. Tu ajouteras alors encore 3 villes à ces trois-là, '
