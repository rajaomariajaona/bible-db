document_id: 2CH.28,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Règne d'Achaz
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Achaz avait 20 ans lorsqu''il devint roi et il régna 16 ans à Jérusalem. Il ne fit pas ce qui est droit aux yeux de l''Eternel, contrairement à son ancêtre David. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et vous parlez maintenant de faire des habitants de Juda et de Jérusalem vos serviteurs et vos servantes! Mais vous, n''êtes-vous pas aussi coupables envers l''Eternel, votre Dieu? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ecoutez-moi donc et renvoyez ces prisonniers que vous avez faits parmi vos frères, car la colère de l''Eternel est enflammée contre vous.» '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quelques-uns des chefs des Ephraïmites – Azaria, fils de Jochanan, Bérékia, fils de Meshillémoth, Ezéchias, fils de Shallum, et Amasa, fils de Hadlaï – se dressèrent contre ceux qui revenaient de l''expédition '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et leur dirent: «Vous ne ferez pas entrer ces prisonniers ici, car c''est pour nous rendre plus coupables encore envers l''Eternel que vous parlez d''ajouter à nos péchés et à nos fautes. En effet, nous sommes déjà bien coupables et la colère de l''Eternel est enflammée contre Israël.»'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les soldats abandonnèrent les prisonniers et le butin devant les chefs et devant toute l''assemblée, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: et les hommes dont les noms viennent d'être mentionnés se mirent à réconforter les prisonniers. Ils employèrent le butin à habiller tous ceux qui étaient nus en leur donnant vêtements et chaussures. Ils les firent manger et boire et les soignèrent. Puis ils conduisirent sur des ânes tous ceux qui étaient fatigués et les amenèrent à Jéricho, la ville des palmiers, près de leurs frères, avant de retourner à Samarie.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A cette époque-là, le roi Achaz envoya demander du secours aux rois d''Assyrie. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les Edomites étaient encore venus, avaient battu Juda et emmené des prisonniers. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quant aux Philistins, ils avaient lancé une attaque contre les villes de la plaine et du sud de Juda. Ils avaient pris Beth-Shémesh, Ajalon, Guedéroth, Soco et les villes qui en dépendaient, Thimna et les villes qui en dépendaient, Guimzo et les villes qui en dépendaient, et ils s''y étaient installés. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, l''Eternel avait humilié Juda à cause d''Achaz, roi d''Israël, qui avait poussé au dérèglement dans Juda et avait commis des actes d''infidélité envers lui. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il marcha sur la voie des rois d''Israël. Il fit même fabriquer des idoles en métal fondu pour les Baals, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tilgath-Pilnéser, le roi d''Assyrie, vint contre lui et le traita en ennemi au lieu de le soutenir. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Achaz avait dépouillé la maison de l'Eternel, le palais royal et la maison des chefs pour faire des cadeaux au roi d'Assyrie, mais cela ne lui servit à rien.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors même qu''il était dans la détresse, il persista dans son infidélité envers l''Eternel, lui, le roi Achaz. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il offrit des sacrifices aux dieux de Damas qui l''avaient frappé et dit: «Puisque les dieux des rois de Syrie leur viennent en aide, je leur offrirai des sacrifices pour qu''ils viennent à mon aide.» Mais ils provoquèrent sa chute et celle de tout Israël. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Achaz rassembla les ustensiles de la maison de Dieu et les mit en pièces. Il ferma les portes de la maison de l''Eternel et se fit faire des autels à tous les coins de rue de Jérusalem. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dans chacune des villes de Juda, il établit des hauts lieux pour offrir des parfums à d'autres dieux. Il irrita ainsi l'Eternel, le Dieu de ses ancêtres.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le reste de ses actes, des premiers aux derniers, tout ce qu'il a fait est décrit dans les annales des rois de Juda et d'Israël.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Achaz se coucha avec ses ancêtres et on l'enterra dans la ville, à Jérusalem, car on ne le mit pas dans les tombeaux des rois d'Israël. Son fils Ezéchias devint roi à sa place.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'brûla des parfums dans la vallée des fils de Hinnom et fit passer ses fils par le feu, conformément aux pratiques abominables des nations que l''Eternel avait dépossédées devant les Israélites. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il offrait des sacrifices et des parfums sur les hauts lieux, sur les collines et sous tout arbre vert.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''Eternel, son Dieu, le livra entre les mains du roi de Syrie. Les Syriens le battirent et lui firent un grand nombre de prisonniers, qu''ils emmenèrent à Damas. Il fut aussi livré entre les mains du roi d''Israël, qui lui infligea une grande défaite. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pékach, fils de Remalia, tua en une seule journée 120''000 hommes, tous vaillants, en Juda, parce qu''ils avaient abandonné l''Eternel, le Dieu de leurs ancêtres. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Zicri, un guerrier d''Ephraïm, tua Maaséja, le fils du roi, Azrikam, le chef du palais, et Elkana, l''adjoint du roi. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les Israélites firent parmi leurs frères 200'000 prisonniers, femmes, fils et filles. Ils leur prirent aussi un très grand butin qu'ils emmenèrent à Samarie.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il y avait là-bas un prophète de l''Eternel du nom d''Oded. Il alla à la rencontre de l''armée alors qu''elle revenait à Samarie et il leur dit: «C''est à cause de sa colère contre Juda que l''Eternel, le Dieu de vos ancêtres, les a livrés entre vos mains, et vous les avez tués avec une rage telle qu''elle est parvenue jusqu''au ciel. '
