document_id: MAL.2,152
type_code: fra
verses:
  '1':
  - type: text
    content: Maintenant, prêtres, ce commandement est pour vous!
  '10':
  - type: text
    content: N'avons-nous pas tous un seul père?
  - type: text
    content: N'est-ce pas un seul Dieu qui nous a créés?
  - type: text
    content: Pourquoi donc sommes-nous infidèles l'un envers l'autre
  - type: text
    content: en violant l'alliance de nos ancêtres?
  '11':
  - type: text
    content: Juda s'est montré infidèle,
  - type: text
    content: et l'on a commis un acte abominable en Israël et à Jérusalem.
  - type: text
    content: En effet, Juda a profané ce qui est consacré à l'Eternel,
  - type: text
    content: 'ce qu''aime l''Eternel: il a épousé la fille d''un dieu étranger.'
  '12':
  - type: text
    content: Si quelqu'un agit de cette manière, l'Eternel supprimera des tentes de Jacob
  - type: text
    content: celui qui veille, celui qui répond
  - type: text
    content: et celui qui présente une offrande
  - type: note
    content: 'Celui qui veille… une offrande: ces trois catégories pourraient désigner un bébé, un enfant en âge de parler et un adulte, et il s''agirait alors d''une privation de descendance. D''autres y voient l''absence de réaction d''un campement massacré à l''appel d''arrivants.'
  - type: text
    content: à l'Eternel, le maître de l'univers.
  '13':
  - type: text
    content: 'Voici une deuxième chose que vous faites:'
  - type: text
    content: vous couvrez l'autel de l'Eternel de larmes,
  - type: text
    content: de pleurs et de gémissements,
  - type: text
    content: de sorte qu'il ne prête plus attention aux offrandes
  - type: text
    content: et qu'il ne peut rien accepter de vos mains,
  '14':
  - type: text
    content: 'et vous dites: «Pourquoi?»'
  - type: text
    content: Parce que l'Eternel a été témoin entre toi et la femme de ta jeunesse,
  - type: text
    content: que tu as trahie.
  - type: text
    content: Et pourtant, elle était ta compagne et la femme avec laquelle tu étais lié par une alliance.
  '15':
  - type: text
    content: Personne n'a fait cela, avec un reste de bon sens.
  - type: text
    content: Un seul l'a fait, et pourquoi?
  - type: text
    content: Parce qu'il recherchait la descendance que Dieu lui avait promise.
  - type: text
    content: 'Veillez sur votre esprit:'
  - type: text
    content: que personne ne trahisse la femme de sa jeunesse,
  '16':
  - type: text
    content: car je déteste le divorce,
  - type: text
    content: dit l'Eternel, le Dieu d'Israël,
  - type: text
    content: et celui qui couvre son habit de violence,
  - type: text
    content: dit l'Eternel, le maître de l'univers.
  - type: text
    content: Veillez sur votre esprit
  - type: text
    content: et ne commettez pas cette trahison!
  - type: heading
    content: Justice de Dieu et purification
  '17':
  - type: text
    content: Vous fatiguez l'Eternel par vos paroles
  - type: text
    content: 'et vous dites: «En quoi l''avons-nous fatigué?»'
  - type: text
    content: 'C''est en disant: «L''Eternel voit d''un bon œil celui qui fait le mal,'
  - type: text
    content: c'est en lui qu'il prend plaisir»,
  - type: text
    content: 'ou encore: «Où est le Dieu de la justice?»'
  '2':
  - type: text
    content: Si vous n'écoutez pas, si vous ne prenez pas à cœur
  - type: text
    content: de donner gloire à mon nom, dit l'Eternel, le maître de l'univers,
  - type: text
    content: j'enverrai parmi vous la malédiction et je maudirai vos bénédictions.
  - type: text
    content: Oui, je les maudirai, parce que vous ne prenez pas cela à cœur.
  '3':
  - type: text
    content: Me voici, je menace votre descendance
  - type: text
    content: et je vous jetterai des excréments au visage,
  - type: text
    content: les excréments des victimes que vous sacrifiez,
  - type: text
    content: et on vous emportera avec eux.
  '4':
  - type: text
    content: Vous saurez alors que je vous ai adressé ce commandement
  - type: text
    content: afin que mon alliance avec Lévi subsiste,
  - type: text
    content: dit l'Eternel, le maître de l'univers.
  '5':
  - type: text
    content: Mon alliance avec lui était une alliance de vie et de paix;
  - type: text
    content: je les lui ai données pour qu'il me craigne,
  - type: text
    content: et il a eu pour moi de la crainte,
  - type: text
    content: il a tremblé devant mon nom.
  '6':
  - type: text
    content: La loi de vérité était dans sa bouche,
  - type: text
    content: on ne trouvait pas d'injustice sur ses lèvres.
  - type: text
    content: Il a marché avec moi dans la paix et dans la droiture,
  - type: text
    content: et il a détourné beaucoup d'hommes du mal.
  '7':
  - type: text
    content: En effet, les lèvres du prêtre sont les gardiennes de la connaissance,
  - type: text
    content: c'est à sa bouche qu'on demande la loi,
  - type: text
    content: parce qu'il est un messager de l'Eternel, le maître de l'univers.
  '8':
  - type: text
    content: Mais vous, vous vous êtes écartés de cette voie,
  - type: text
    content: vous en avez fait trébucher beaucoup par le moyen de la loi,
  - type: text
    content: vous avez violé l'alliance de Lévi,
  - type: text
    content: dit l'Eternel, le maître de l'univers.
  '9':
  - type: text
    content: Et moi, je vous livrerai au mépris et à l'humiliation
  - type: text
    content: aux yeux de tout le peuple
  - type: text
    content: parce que vous n'avez pas gardé mes voies
  - type: text
    content: et que vous faites preuve de partialité
  - type: text
    content: dans l'application de la loi.
  - type: heading
    content: Mariages mixtes et divorces
