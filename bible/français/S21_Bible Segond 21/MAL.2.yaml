document_id: MAL.2
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Maintenant, prêtres, ce commandement est pour vous!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Si vous n'écoutez pas, si vous ne prenez pas à cœur
- type: usfm
  marker: q1
  children:
  - type: text
    text: de donner gloire à mon nom, dit l'Eternel, le maître de l'univers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j'enverrai parmi vous la malédiction et je maudirai vos bénédictions.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, je les maudirai, parce que vous ne prenez pas cela à cœur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Me voici, je menace votre descendance
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je vous jetterai des excréments au visage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les excréments des victimes que vous sacrifiez,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et on vous emportera avec eux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Vous saurez alors que je vous ai adressé ce commandement
- type: usfm
  marker: q1
  children:
  - type: text
    text: afin que mon alliance avec Lévi subsiste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dit l'Eternel, le maître de l'univers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mon alliance avec lui était une alliance de vie et de paix;
- type: usfm
  marker: q1
  children:
  - type: text
    text: je les lui ai données pour qu'il me craigne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il a eu pour moi de la crainte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a tremblé devant mon nom.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: La loi de vérité était dans sa bouche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: on ne trouvait pas d'injustice sur ses lèvres.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a marché avec moi dans la paix et dans la droiture,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il a détourné beaucoup d'hommes du mal.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: En effet, les lèvres du prêtre sont les gardiennes de la connaissance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est à sa bouche qu'on demande la loi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce qu'il est un messager de l'Eternel, le maître de l'univers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mais vous, vous vous êtes écartés de cette voie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous en avez fait trébucher beaucoup par le moyen de la loi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous avez violé l'alliance de Lévi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dit l'Eternel, le maître de l'univers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Et moi, je vous livrerai au mépris et à l'humiliation
- type: usfm
  marker: q1
  children:
  - type: text
    text: aux yeux de tout le peuple
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce que vous n'avez pas gardé mes voies
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que vous faites preuve de partialité
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans l'application de la loi.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mariages mixtes et divorces
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: N'avons-nous pas tous un seul père?
- type: usfm
  marker: q1
  children:
  - type: text
    text: N'est-ce pas un seul Dieu qui nous a créés?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi donc sommes-nous infidèles l'un envers l'autre
- type: usfm
  marker: q1
  children:
  - type: text
    text: en violant l'alliance de nos ancêtres?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Juda s'est montré infidèle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l'on a commis un acte abominable en Israël et à Jérusalem.
- type: usfm
  marker: q1
  children:
  - type: text
    text: En effet, Juda a profané ce qui est consacré à l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ce qu''aime l''Eternel: il a épousé la fille d''un dieu étranger.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Si quelqu'un agit de cette manière, l'Eternel supprimera des tentes de Jacob
- type: usfm
  marker: q1
  children:
  - type: text
    text: celui qui veille, celui qui répond
- type: usfm
  marker: q1
  children:
  - type: text
    text: et celui qui présente une offrande
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Celui qui veille… une offrande: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ces trois catégories pourraient désigner un bébé, un enfant en âge de parler et un adulte, et il s'agirait alors d'une privation de descendance. D'autres y voient l'absence de réaction d'un campement massacré à l'appel d'arrivants.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: à l'Eternel, le maître de l'univers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Voici une deuxième chose que vous faites:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous couvrez l'autel de l'Eternel de larmes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de pleurs et de gémissements,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de sorte qu'il ne prête plus attention aux offrandes
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu'il ne peut rien accepter de vos mains,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'et vous dites: «Pourquoi?»'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parce que l'Eternel a été témoin entre toi et la femme de ta jeunesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que tu as trahie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et pourtant, elle était ta compagne et la femme avec laquelle tu étais lié par une alliance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Personne n'a fait cela, avec un reste de bon sens.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Un seul l'a fait, et pourquoi?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parce qu'il recherchait la descendance que Dieu lui avait promise.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Veillez sur votre esprit:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: que personne ne trahisse la femme de sa jeunesse,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: car je déteste le divorce,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dit l'Eternel, le Dieu d'Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et celui qui couvre son habit de violence,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dit l'Eternel, le maître de l'univers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Veillez sur votre esprit
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ne commettez pas cette trahison!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Justice de Dieu et purification
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Vous fatiguez l'Eternel par vos paroles
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et vous dites: «En quoi l''avons-nous fatigué?»'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'C''est en disant: «L''Eternel voit d''un bon œil celui qui fait le mal,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est en lui qu'il prend plaisir»,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ou encore: «Où est le Dieu de la justice?»'
