document_id: LUK.11,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Enseignement de Jésus sur la prière
  - type: text
    content: 'Jésus priait un jour dans un certain endroit. Quand il eut fini, un de ses disciples lui dit: «Seigneur, enseigne-nous à prier, tout comme Jean l''a enseigné à ses disciples.» '
  '10':
  - type: text
    content: 'En effet, tous ceux qui demandent reçoivent, celui qui cherche trouve et l''on ouvrira à celui qui frappe. '
  '11':
  - type: text
    content: 'Quel père parmi vous donnera une pierre à son fils, s''il lui demande du pain? Ou bien s''il demande un poisson, lui donnera-t-il un serpent au lieu d''un poisson? '
  '12':
  - type: text
    content: 'Ou bien s''il demande un œuf, lui donnera-t-il un scorpion? '
  '13':
  - type: text
    content: Si donc, mauvais comme vous l'êtes, vous savez donner de bonnes choses à vos enfants, le Père céleste donnera d'autant plus volontiers le Saint-Esprit à ceux qui le lui demandent.»
  - type: heading
    content: Jésus contesté après un miracle
  '14':
  - type: text
    content: 'Jésus chassa un démon qui était muet. Lorsque le démon fut sorti, le muet se mit à parler, et la foule fut dans l''admiration. '
  '15':
  - type: text
    content: 'Cependant, quelques-uns dirent: «C''est par Béelzébul'
  - type: note
    content: 'Béelzébul: terme de mépris pour désigner Satan.'
  - type: text
    content: ', le prince des démons, qu''il chasse les démons.» '
  '16':
  - type: text
    content: 'D''autres, pour le mettre à l''épreuve, lui demandaient un signe venant du ciel. '
  '17':
  - type: text
    content: 'Comme Jésus connaissait leurs pensées, il leur dit: «Tout royaume confronté à des luttes internes est dévasté et les maisons s''écroulent l''une sur l''autre. '
  '18':
  - type: text
    content: 'Si donc Satan lutte contre lui-même, comment son royaume subsistera-t-il, puisque vous dites que je chasse les démons par Béelzébul? '
  '19':
  - type: text
    content: 'Et si moi, je chasse les démons par Béelzébul, vos disciples, par qui les chassent-ils? C''est pourquoi ils seront eux-mêmes vos juges. '
  '2':
  - type: text
    content: 'Il leur dit: «Quand vous priez, dites: ‘[Notre] Père [céleste]! Que la sainteté de ton nom soit respectée, que ton règne vienne, [que ta volonté soit faite sur la terre comme au ciel.] '
  '20':
  - type: text
    content: 'Mais si c''est par le doigt de Dieu que je chasse les démons, alors le royaume de Dieu est venu jusqu''à vous. '
  '21':
  - type: text
    content: 'Lorsqu''un homme fort et bien armé garde sa maison, ce qu''il possède est en sécurité. '
  '22':
  - type: text
    content: 'Mais, si un autre plus fort que lui survient et le maîtrise, il lui enlève toutes les armes sur lesquelles il comptait et distribue ses biens à d''autres. '
  '23':
  - type: text
    content: Celui qui n'est pas avec moi est contre moi et celui qui ne rassemble pas avec moi disperse.
  '24':
  - type: text
    content: '»Lorsqu''un esprit impur est sorti d''un homme, il va dans des endroits arides pour chercher du repos. Comme il n''en trouve pas, il dit: ‘Je retournerai dans ma maison, d''où je suis sorti.’ '
  '25':
  - type: text
    content: 'A son arrivée, il la trouve balayée et bien rangée. '
  '26':
  - type: text
    content: Alors il s'en va prendre sept autres esprits plus mauvais que lui; ils entrent dans la maison, s'y installent, et la dernière condition de cet homme est pire que la première.»
  '27':
  - type: text
    content: 'Jésus parlait encore quand une femme se mit à lui dire, du milieu de la foule: «Heureux le ventre qui t''a porté! Heureux les seins qui t''ont allaité!» '
  '28':
  - type: text
    content: 'Il répondit: «Heureux plutôt ceux qui écoutent la parole de Dieu et qui la gardent!»'
  '29':
  - type: text
    content: 'Comme la foule s''amassait, il se mit à dire: «Cette génération est une génération mauvaise; elle réclame un signe miraculeux, il ne lui sera pas donné d''autre signe que celui de Jonas [le prophète]. '
  '3':
  - type: text
    content: 'Donne-nous chaque jour notre pain quotidien; '
  '30':
  - type: text
    content: 'En effet, de même que Jonas a été un signe pour les Ninivites, de même le Fils de l''homme en sera un pour cette génération. '
  '31':
  - type: text
    content: Lors du jugement, la reine du Midi
  - type: note
    content: 'La reine du Midi: elle est venue du Séba (aujourd''hui le Yémen) pour mettre à l''épreuve la sagesse légendaire du roi Salomon (10e siècle av. J.-C.).'
  - type: text
    content: ' se lèvera avec les hommes de cette génération et les condamnera, parce qu''elle est venue des extrémités de la terre pour entendre la sagesse de Salomon. Or, il y a ici plus que Salomon. '
  '32':
  - type: text
    content: Lors du jugement, les habitants de Ninive se lèveront avec cette génération et la condamneront, parce qu'ils ont changé d'attitude à la prédication de Jonas. Or, il y a ici plus que Jonas.
  '33':
  - type: text
    content: '»Personne n''allume une lampe pour la mettre dans un endroit caché ou sous un seau, mais on la met sur son support, afin que ceux qui entrent voient la lumière. '
  '34':
  - type: text
    content: 'Ton œil est la lampe de ton corps. Lorsque ton œil est en bon état, tout ton corps est éclairé; mais lorsque ton œil est en mauvais état, ton corps aussi est dans les ténèbres. '
  '35':
  - type: text
    content: 'Veille donc à ce que la lumière qui est en toi ne soit pas ténèbres. '
  '36':
  - type: text
    content: Si donc ton corps tout entier est éclairé, sans aucune partie dans les ténèbres, il sera entièrement éclairé comme lorsque la lampe t'éclaire de sa lueur.»
  - type: heading
    content: Jésus condamne les pharisiens et les spécialistes de la loi
  '37':
  - type: text
    content: 'Pendant que Jésus parlait, un pharisien l''invita à dîner chez lui. Il entra et se mit à table. '
  '38':
  - type: text
    content: 'Le pharisien vit avec étonnement qu''il ne s''était pas lavé avant le repas. '
  '39':
  - type: text
    content: 'Mais le Seigneur lui dit: «Vous, pharisiens, vous nettoyez l''extérieur de la coupe et du plat, mais à l''intérieur vous êtes pleins d''avidité et de méchanceté. '
  '4':
  - type: text
    content: pardonne-nous nos péchés, car nous aussi nous pardonnons à toute personne qui nous offense, et ne nous expose pas à la tentation, [mais délivre-nous du mal
  - type: note
    content: 'Du mal: ou du mauvais, c''est-à-dire du diable.'
  - type: text
    content: .]’»
  '40':
  - type: text
    content: 'Hommes dépourvus de bon sens! Celui qui a fait l''extérieur n''a-t-il pas fait aussi l''intérieur? '
  '41':
  - type: text
    content: 'Faites plutôt don de ce que vous avez à l''intérieur, et alors tout sera pur pour vous. '
  '42':
  - type: text
    content: 'Mais malheur à vous, pharisiens, parce que vous payez la dîme de la menthe, de la rue et de chaque plante et que vous négligez la justice et l''amour de Dieu; voilà ce qu''il fallait pratiquer, sans négliger le reste. '
  '43':
  - type: text
    content: 'Malheur à vous, pharisiens, parce que vous aimez occuper les sièges d''honneur dans les synagogues et être salués sur les places publiques. '
  '44':
  - type: text
    content: Malheur à vous, [spécialistes de la loi et pharisiens hypocrites,] parce que vous êtes comme des tombeaux qu'on ne remarque pas et sur lesquels on marche sans le savoir.»
  '45':
  - type: text
    content: 'Un des professeurs de la loi prit la parole et lui dit: «Maître, en parlant ainsi, c''est aussi nous que tu insultes.» '
  '46':
  - type: text
    content: 'Jésus répondit: «Malheur à vous aussi, professeurs de la loi, parce que vous chargez les hommes de fardeaux difficiles à porter, que vous ne touchez pas vous-mêmes d''un seul doigt. '
  '47':
  - type: text
    content: 'Malheur à vous, parce que vous construisez les tombeaux des prophètes que vos ancêtres ont tués. '
  '48':
  - type: text
    content: 'Vous rendez donc témoignage aux actes de vos ancêtres et vous les approuvez, car eux, ils ont tué les prophètes et vous, vous construisez [leurs tombeaux]. '
  '49':
  - type: text
    content: 'C''est pourquoi la sagesse de Dieu a dit: ‘Je leur enverrai des prophètes et des apôtres, ils tueront les uns et persécuteront les autres’, '
  '5':
  - type: text
    content: 'Il leur dit encore: «Supposons que l''un de vous ait un ami et qu''il aille le trouver au milieu de la nuit pour lui dire: ‘Mon ami, prête-moi trois pains, '
  '50':
  - type: text
    content: 'afin qu''il soit demandé compte à cette génération du sang de tous les prophètes qui a été versé depuis la création du monde, '
  '51':
  - type: text
    content: 'depuis le sang d''Abel jusqu''au sang de Zacharie, tué entre l''autel et le temple. Oui, je vous le dis, il en sera demandé compte à cette génération. '
  '52':
  - type: text
    content: Malheur à vous, professeurs de la loi, parce que vous avez enlevé la clé de la connaissance; vous n'êtes pas entrés vous-mêmes et ceux qui voulaient entrer, vous les en avez empêchés.»
  '53':
  - type: text
    content: 'Comme il leur disait cela, les spécialistes de la loi et les pharisiens commencèrent à s''acharner contre lui et à le faire parler sur bien des sujets; '
  '54':
  - type: text
    content: ils lui tendaient des pièges pour surprendre une parole sortie de sa bouche [afin de pouvoir l'accuser].
  '6':
  - type: text
    content: 'car un de mes amis est arrivé de voyage chez moi et je n''ai rien à lui offrir.’ '
  '7':
  - type: text
    content: 'Supposons que, de l''intérieur de sa maison, cet ami lui réponde: ‘Ne m''ennuie pas, la porte est déjà fermée, mes enfants et moi sommes au lit, je ne peux pas me lever pour te donner des pains.’ '
  '8':
  - type: text
    content: 'Je vous le dis, même s''il ne se lève pas pour les lui donner parce que c''est son ami, il se lèvera à cause de son insistance et lui donnera tout ce dont il a besoin. '
  '9':
  - type: text
    content: 'Et moi, je vous dis: Demandez et l''on vous donnera; cherchez et vous trouverez; frappez et l''on vous ouvrira. '
