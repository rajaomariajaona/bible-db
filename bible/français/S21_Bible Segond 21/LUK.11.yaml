document_id: LUK.11
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Enseignement de Jésus sur la prière
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jésus priait un jour dans un certain endroit. Quand il eut fini, un de ses disciples lui dit: «Seigneur, enseigne-nous à prier, tout comme Jean l''a enseigné à ses disciples.» '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il leur dit: «Quand vous priez, dites: ‘[Notre] Père [céleste]! Que la sainteté de ton nom soit respectée, que ton règne vienne, [que ta volonté soit faite sur la terre comme au ciel.] '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Donne-nous chaque jour notre pain quotidien; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: pardonne-nous nos péchés, car nous aussi nous pardonnons à toute personne qui nous offense, et ne nous expose pas à la tentation, [mais délivre-nous du mal
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Du mal: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ou du mauvais, c'est-à-dire du diable.
    marker-yv: yv-n
  - type: text
    text: .]’»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il leur dit encore: «Supposons que l''un de vous ait un ami et qu''il aille le trouver au milieu de la nuit pour lui dire: ‘Mon ami, prête-moi trois pains, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'car un de mes amis est arrivé de voyage chez moi et je n''ai rien à lui offrir.’ '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Supposons que, de l''intérieur de sa maison, cet ami lui réponde: ‘Ne m''ennuie pas, la porte est déjà fermée, mes enfants et moi sommes au lit, je ne peux pas me lever pour te donner des pains.’ '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Je vous le dis, même s''il ne se lève pas pour les lui donner parce que c''est son ami, il se lèvera à cause de son insistance et lui donnera tout ce dont il a besoin. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Et moi, je vous dis: Demandez et l''on vous donnera; cherchez et vous trouverez; frappez et l''on vous ouvrira. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'En effet, tous ceux qui demandent reçoivent, celui qui cherche trouve et l''on ouvrira à celui qui frappe. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Quel père parmi vous donnera une pierre à son fils, s''il lui demande du pain? Ou bien s''il demande un poisson, lui donnera-t-il un serpent au lieu d''un poisson? '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ou bien s''il demande un œuf, lui donnera-t-il un scorpion? '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Si donc, mauvais comme vous l'êtes, vous savez donner de bonnes choses à vos enfants, le Père céleste donnera d'autant plus volontiers le Saint-Esprit à ceux qui le lui demandent.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus contesté après un miracle
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Jésus chassa un démon qui était muet. Lorsque le démon fut sorti, le muet se mit à parler, et la foule fut dans l''admiration. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Cependant, quelques-uns dirent: «C''est par Béelzébul'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Béelzébul: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: terme de mépris pour désigner Satan.
    marker-yv: yv-n
  - type: text
    text: ', le prince des démons, qu''il chasse les démons.» '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'D''autres, pour le mettre à l''épreuve, lui demandaient un signe venant du ciel. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Comme Jésus connaissait leurs pensées, il leur dit: «Tout royaume confronté à des luttes internes est dévasté et les maisons s''écroulent l''une sur l''autre. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Si donc Satan lutte contre lui-même, comment son royaume subsistera-t-il, puisque vous dites que je chasse les démons par Béelzébul? '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Et si moi, je chasse les démons par Béelzébul, vos disciples, par qui les chassent-ils? C''est pourquoi ils seront eux-mêmes vos juges. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Mais si c''est par le doigt de Dieu que je chasse les démons, alors le royaume de Dieu est venu jusqu''à vous. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Lorsqu''un homme fort et bien armé garde sa maison, ce qu''il possède est en sécurité. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Mais, si un autre plus fort que lui survient et le maîtrise, il lui enlève toutes les armes sur lesquelles il comptait et distribue ses biens à d''autres. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Celui qui n'est pas avec moi est contre moi et celui qui ne rassemble pas avec moi disperse.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '»Lorsqu''un esprit impur est sorti d''un homme, il va dans des endroits arides pour chercher du repos. Comme il n''en trouve pas, il dit: ‘Je retournerai dans ma maison, d''où je suis sorti.’ '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'A son arrivée, il la trouve balayée et bien rangée. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Alors il s'en va prendre sept autres esprits plus mauvais que lui; ils entrent dans la maison, s'y installent, et la dernière condition de cet homme est pire que la première.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Jésus parlait encore quand une femme se mit à lui dire, du milieu de la foule: «Heureux le ventre qui t''a porté! Heureux les seins qui t''ont allaité!» '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Il répondit: «Heureux plutôt ceux qui écoutent la parole de Dieu et qui la gardent!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Comme la foule s''amassait, il se mit à dire: «Cette génération est une génération mauvaise; elle réclame un signe miraculeux, il ne lui sera pas donné d''autre signe que celui de Jonas [le prophète]. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'En effet, de même que Jonas a été un signe pour les Ninivites, de même le Fils de l''homme en sera un pour cette génération. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Lors du jugement, la reine du Midi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.31 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'La reine du Midi: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: elle est venue du Séba (aujourd'hui le Yémen) pour mettre à l'épreuve la sagesse légendaire du roi Salomon (10e siècle av. J.-C.).
    marker-yv: yv-n
  - type: text
    text: ' se lèvera avec les hommes de cette génération et les condamnera, parce qu''elle est venue des extrémités de la terre pour entendre la sagesse de Salomon. Or, il y a ici plus que Salomon. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Lors du jugement, les habitants de Ninive se lèveront avec cette génération et la condamneront, parce qu'ils ont changé d'attitude à la prédication de Jonas. Or, il y a ici plus que Jonas.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: '»Personne n''allume une lampe pour la mettre dans un endroit caché ou sous un seau, mais on la met sur son support, afin que ceux qui entrent voient la lumière. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ton œil est la lampe de ton corps. Lorsque ton œil est en bon état, tout ton corps est éclairé; mais lorsque ton œil est en mauvais état, ton corps aussi est dans les ténèbres. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Veille donc à ce que la lumière qui est en toi ne soit pas ténèbres. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Si donc ton corps tout entier est éclairé, sans aucune partie dans les ténèbres, il sera entièrement éclairé comme lorsque la lampe t'éclaire de sa lueur.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus condamne les pharisiens et les spécialistes de la loi
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Pendant que Jésus parlait, un pharisien l''invita à dîner chez lui. Il entra et se mit à table. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Le pharisien vit avec étonnement qu''il ne s''était pas lavé avant le repas. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Mais le Seigneur lui dit: «Vous, pharisiens, vous nettoyez l''extérieur de la coupe et du plat, mais à l''intérieur vous êtes pleins d''avidité et de méchanceté. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Hommes dépourvus de bon sens! Celui qui a fait l''extérieur n''a-t-il pas fait aussi l''intérieur? '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Faites plutôt don de ce que vous avez à l''intérieur, et alors tout sera pur pour vous. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Mais malheur à vous, pharisiens, parce que vous payez la dîme de la menthe, de la rue et de chaque plante et que vous négligez la justice et l''amour de Dieu; voilà ce qu''il fallait pratiquer, sans négliger le reste. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Malheur à vous, pharisiens, parce que vous aimez occuper les sièges d''honneur dans les synagogues et être salués sur les places publiques. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Malheur à vous, [spécialistes de la loi et pharisiens hypocrites,] parce que vous êtes comme des tombeaux qu'on ne remarque pas et sur lesquels on marche sans le savoir.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Un des professeurs de la loi prit la parole et lui dit: «Maître, en parlant ainsi, c''est aussi nous que tu insultes.» '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Jésus répondit: «Malheur à vous aussi, professeurs de la loi, parce que vous chargez les hommes de fardeaux difficiles à porter, que vous ne touchez pas vous-mêmes d''un seul doigt. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Malheur à vous, parce que vous construisez les tombeaux des prophètes que vos ancêtres ont tués. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Vous rendez donc témoignage aux actes de vos ancêtres et vous les approuvez, car eux, ils ont tué les prophètes et vous, vous construisez [leurs tombeaux]. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'C''est pourquoi la sagesse de Dieu a dit: ‘Je leur enverrai des prophètes et des apôtres, ils tueront les uns et persécuteront les autres’, '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'afin qu''il soit demandé compte à cette génération du sang de tous les prophètes qui a été versé depuis la création du monde, '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'depuis le sang d''Abel jusqu''au sang de Zacharie, tué entre l''autel et le temple. Oui, je vous le dis, il en sera demandé compte à cette génération. '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: Malheur à vous, professeurs de la loi, parce que vous avez enlevé la clé de la connaissance; vous n'êtes pas entrés vous-mêmes et ceux qui voulaient entrer, vous les en avez empêchés.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Comme il leur disait cela, les spécialistes de la loi et les pharisiens commencèrent à s''acharner contre lui et à le faire parler sur bien des sujets; '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: ils lui tendaient des pièges pour surprendre une parole sortie de sa bouche [afin de pouvoir l'accuser].
