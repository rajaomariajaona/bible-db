document_id: JOB.23,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Intervention n° 8 de Job
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Job prit la parole et dit:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il sait néanmoins quelle voie j'ai suivie.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Quand il m''aura mis à l''épreuve, je sortirai pur comme l''or:'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mon pied s'est attaché à ses pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j'ai gardé sa voie sans en dévier,
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je n'ai pas abandonné les commandements sortis de ses lèvres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j'ai fait plier ma volonté aux paroles de sa bouche.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Mais sa décision est prise. Qui pourra l'y faire renoncer?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce qu'il désire, il le met en œuvre.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il accomplira donc ses intentions envers moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il en a bien d'autres en réserve.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voilà pourquoi je suis terrifié en sa présence.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand j'y réfléchis, j'ai peur de lui.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu a brisé mon courage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le Tout-Puissant m'a rempli de terreur,
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais je n'ai pas été anéanti par les ténèbres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: par l'obscurité qui m'a recouvert.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Aujourd'hui encore ma plainte est synonyme de révolte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ma main doit étouffer mes gémissements.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si seulement je savais où le trouver,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: si je pouvais arriver jusqu'à son lieu de résidence!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je défendrais ma cause devant lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je remplirais ma bouche d'arguments,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je connaîtrais ses réponses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je pourrais comprendre ce qu'il a à me dire.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Emploierait-il toute sa force à me combattre?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lui au moins, ne ferait-il pas attention à moi?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce serait un homme droit qui discuterait avec lui
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je serais pour toujours absous par mon juge.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Cependant, si je vais à l'est, il n'y est pas.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si je vais à l'ouest, je ne l'aperçois pas.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Est-il occupé au nord, je ne le remarque pas.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Se cache-t-il au sud, je ne le vois pas.
