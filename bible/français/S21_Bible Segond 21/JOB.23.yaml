document_id: JOB.23,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Intervention n° 8 de Job
  - type: text
    content: 'Job prit la parole et dit:'
  '10':
  - type: text
    content: Il sait néanmoins quelle voie j'ai suivie.
  - type: text
    content: 'Quand il m''aura mis à l''épreuve, je sortirai pur comme l''or:'
  '11':
  - type: text
    content: mon pied s'est attaché à ses pas,
  - type: text
    content: j'ai gardé sa voie sans en dévier,
  '12':
  - type: text
    content: je n'ai pas abandonné les commandements sortis de ses lèvres,
  - type: text
    content: j'ai fait plier ma volonté aux paroles de sa bouche.
  '13':
  - type: text
    content: »Mais sa décision est prise. Qui pourra l'y faire renoncer?
  - type: text
    content: Ce qu'il désire, il le met en œuvre.
  '14':
  - type: text
    content: Il accomplira donc ses intentions envers moi,
  - type: text
    content: et il en a bien d'autres en réserve.
  '15':
  - type: text
    content: Voilà pourquoi je suis terrifié en sa présence.
  - type: text
    content: Quand j'y réfléchis, j'ai peur de lui.
  '16':
  - type: text
    content: Dieu a brisé mon courage,
  - type: text
    content: le Tout-Puissant m'a rempli de terreur,
  '17':
  - type: text
    content: mais je n'ai pas été anéanti par les ténèbres,
  - type: text
    content: par l'obscurité qui m'a recouvert.
  '2':
  - type: text
    content: «Aujourd'hui encore ma plainte est synonyme de révolte,
  - type: text
    content: ma main doit étouffer mes gémissements.
  '3':
  - type: text
    content: Si seulement je savais où le trouver,
  - type: text
    content: si je pouvais arriver jusqu'à son lieu de résidence!
  '4':
  - type: text
    content: Je défendrais ma cause devant lui,
  - type: text
    content: je remplirais ma bouche d'arguments,
  '5':
  - type: text
    content: je connaîtrais ses réponses,
  - type: text
    content: je pourrais comprendre ce qu'il a à me dire.
  '6':
  - type: text
    content: Emploierait-il toute sa force à me combattre?
  - type: text
    content: Lui au moins, ne ferait-il pas attention à moi?
  '7':
  - type: text
    content: Ce serait un homme droit qui discuterait avec lui
  - type: text
    content: et je serais pour toujours absous par mon juge.
  '8':
  - type: text
    content: »Cependant, si je vais à l'est, il n'y est pas.
  - type: text
    content: Si je vais à l'ouest, je ne l'aperçois pas.
  '9':
  - type: text
    content: Est-il occupé au nord, je ne le remarque pas.
  - type: text
    content: Se cache-t-il au sud, je ne le vois pas.
