document_id: JOB.23
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Intervention n° 8 de Job
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Job prit la parole et dit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: «Aujourd'hui encore ma plainte est synonyme de révolte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ma main doit étouffer mes gémissements.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Si seulement je savais où le trouver,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si je pouvais arriver jusqu'à son lieu de résidence!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Je défendrais ma cause devant lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je remplirais ma bouche d'arguments,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: je connaîtrais ses réponses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je pourrais comprendre ce qu'il a à me dire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Emploierait-il toute sa force à me combattre?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lui au moins, ne ferait-il pas attention à moi?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ce serait un homme droit qui discuterait avec lui
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je serais pour toujours absous par mon juge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: »Cependant, si je vais à l'est, il n'y est pas.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si je vais à l'ouest, je ne l'aperçois pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Est-il occupé au nord, je ne le remarque pas.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Se cache-t-il au sud, je ne le vois pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Il sait néanmoins quelle voie j'ai suivie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Quand il m''aura mis à l''épreuve, je sortirai pur comme l''or:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: mon pied s'est attaché à ses pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j'ai gardé sa voie sans en dévier,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: je n'ai pas abandonné les commandements sortis de ses lèvres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j'ai fait plier ma volonté aux paroles de sa bouche.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: »Mais sa décision est prise. Qui pourra l'y faire renoncer?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce qu'il désire, il le met en œuvre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Il accomplira donc ses intentions envers moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il en a bien d'autres en réserve.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Voilà pourquoi je suis terrifié en sa présence.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand j'y réfléchis, j'ai peur de lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Dieu a brisé mon courage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le Tout-Puissant m'a rempli de terreur,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: mais je n'ai pas été anéanti par les ténèbres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: par l'obscurité qui m'a recouvert.
