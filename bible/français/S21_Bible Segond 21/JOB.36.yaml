document_id: JOB.36
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le sort des justes et des coupables
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Elihu continua:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: «Patiente encore un peu et je vais poursuivre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car j'ai encore des choses à dire pour la cause de Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: J'irai chercher loin mes arguments
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je prouverai la justice de mon créateur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Sois-en sûr, mes propos ne sont pas des mensonges,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est un homme intègre dans ses réflexions qui est avec toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: »Dieu est puissant, mais il ne rejette personne.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est puissant par la force de son intelligence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Il ne laisse pas vivre le méchant
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il fait droit aux plus humbles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il ne détourne pas les yeux des hommes justes:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il les place avec les rois sur le trône,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il les y fait asseoir définitivement afin qu'ils soient honorés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: S'ils sont chargés de chaînes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: s'ils sont pris dans les liens du malheur,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: c'est qu'il leur révèle la nature de leur activité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les transgressions qu'ils ont commises à cause de leur arrogance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Il leur communique son message pour les corriger,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il les invite à renoncer au mal.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: S'ils écoutent et se soumettent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils finissent leurs jours dans le bonheur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: leurs années dans la joie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: S'ils n'écoutent pas, ils meurent par les armes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils expirent faute de connaissance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '»Les impies se livrent à la colère:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils ne crient pas à Dieu quand il les charge de chaînes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ils meurent en pleine jeunesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils perdent la vie parmi les prostitués.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Cependant, Dieu délivre le malheureux par son malheur même,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et c'est par la souffrance qu'il lui parle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Il t'arrachera aussi à la détresse
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour te mettre à l'aise, loin de toute contrainte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ta table sera chargée de plats délicieux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: »Mais si tu défends ta cause comme le méchant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le jugement sera inséparable de ta cause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Attention! Que l'irritation ne t'entraîne pas à la moquerie
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que la grandeur de la rançon ne te fasse pas dévier!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tes appels au secours suffiraient-ils pour te sortir de l'angoisse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et même toutes les forces que tu pourrais déployer?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: N'aspire pas à voir arriver la nuit
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui enlève les peuples de leur place!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Veille à ne pas te tourner vers le mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car c'est ce que tu as choisi à cause de la souffrance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: »Dieu se montre d'une force inaccessible.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui peut enseigner comme lui?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Qui peut lui prescrire la conduite à tenir?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Qui peut lui dire: ‘Tu as commis une injustice’?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Souviens-toi de célébrer la grandeur de son activité:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: les hommes l'ont chantée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: C'est que tous les êtres humains peuvent la contempler,
- type: usfm
  marker: q1
  children:
  - type: text
    text: chacun la voit de loin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: »Oui, la grandeur de Dieu dépasse ce que nous pouvons connaître.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le nombre de ses années est incalculable.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Il attire les gouttes d'eau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui s'évaporent et retombent en pluie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Les nuages la laissent couler,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils la déversent avec abondance sur les hommes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Qui donc comprendra le déploiement des nuages,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le fracas de sa tente?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Il déploie autour de lui sa lumière
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il recouvre les profondeurs de la mer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: C'est ainsi qu'il juge les peuples
- type: usfm
  marker: q1
  children:
  - type: text
    text: et donne la nourriture avec abondance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Il cache dans ses mains des éclairs
- type: usfm
  marker: q1
  children:
  - type: text
    text: auxquels il fixe une cible.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Il s'annonce par son tonnerre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et même le bétail pressent son approche.
