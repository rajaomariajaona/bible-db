document_id: JOB.36,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Le sort des justes et des coupables
  - type: text
    content: 'Elihu continua:'
  '10':
  - type: text
    content: Il leur communique son message pour les corriger,
  - type: text
    content: il les invite à renoncer au mal.
  '11':
  - type: text
    content: S'ils écoutent et se soumettent,
  - type: text
    content: ils finissent leurs jours dans le bonheur,
  - type: text
    content: leurs années dans la joie.
  '12':
  - type: text
    content: S'ils n'écoutent pas, ils meurent par les armes,
  - type: text
    content: ils expirent faute de connaissance.
  '13':
  - type: text
    content: '»Les impies se livrent à la colère:'
  - type: text
    content: ils ne crient pas à Dieu quand il les charge de chaînes.
  '14':
  - type: text
    content: Ils meurent en pleine jeunesse,
  - type: text
    content: ils perdent la vie parmi les prostitués.
  '15':
  - type: text
    content: Cependant, Dieu délivre le malheureux par son malheur même,
  - type: text
    content: et c'est par la souffrance qu'il lui parle.
  '16':
  - type: text
    content: Il t'arrachera aussi à la détresse
  - type: text
    content: pour te mettre à l'aise, loin de toute contrainte,
  - type: text
    content: et ta table sera chargée de plats délicieux.
  '17':
  - type: text
    content: »Mais si tu défends ta cause comme le méchant,
  - type: text
    content: le jugement sera inséparable de ta cause.
  '18':
  - type: text
    content: Attention! Que l'irritation ne t'entraîne pas à la moquerie
  - type: text
    content: et que la grandeur de la rançon ne te fasse pas dévier!
  '19':
  - type: text
    content: Tes appels au secours suffiraient-ils pour te sortir de l'angoisse,
  - type: text
    content: et même toutes les forces que tu pourrais déployer?
  '2':
  - type: text
    content: «Patiente encore un peu et je vais poursuivre,
  - type: text
    content: car j'ai encore des choses à dire pour la cause de Dieu.
  '20':
  - type: text
    content: N'aspire pas à voir arriver la nuit
  - type: text
    content: qui enlève les peuples de leur place!
  '21':
  - type: text
    content: Veille à ne pas te tourner vers le mal,
  - type: text
    content: car c'est ce que tu as choisi à cause de la souffrance.
  '22':
  - type: text
    content: »Dieu se montre d'une force inaccessible.
  - type: text
    content: Qui peut enseigner comme lui?
  '23':
  - type: text
    content: Qui peut lui prescrire la conduite à tenir?
  - type: text
    content: 'Qui peut lui dire: ‘Tu as commis une injustice’?'
  '24':
  - type: text
    content: 'Souviens-toi de célébrer la grandeur de son activité:'
  - type: text
    content: les hommes l'ont chantée.
  '25':
  - type: text
    content: C'est que tous les êtres humains peuvent la contempler,
  - type: text
    content: chacun la voit de loin.
  '26':
  - type: text
    content: »Oui, la grandeur de Dieu dépasse ce que nous pouvons connaître.
  - type: text
    content: Le nombre de ses années est incalculable.
  '27':
  - type: text
    content: Il attire les gouttes d'eau,
  - type: text
    content: qui s'évaporent et retombent en pluie.
  '28':
  - type: text
    content: Les nuages la laissent couler,
  - type: text
    content: ils la déversent avec abondance sur les hommes.
  '29':
  - type: text
    content: Qui donc comprendra le déploiement des nuages,
  - type: text
    content: le fracas de sa tente?
  '3':
  - type: text
    content: J'irai chercher loin mes arguments
  - type: text
    content: et je prouverai la justice de mon créateur.
  '30':
  - type: text
    content: Il déploie autour de lui sa lumière
  - type: text
    content: et il recouvre les profondeurs de la mer.
  '31':
  - type: text
    content: C'est ainsi qu'il juge les peuples
  - type: text
    content: et donne la nourriture avec abondance.
  '32':
  - type: text
    content: Il cache dans ses mains des éclairs
  - type: text
    content: auxquels il fixe une cible.
  '33':
  - type: text
    content: Il s'annonce par son tonnerre,
  - type: text
    content: et même le bétail pressent son approche.
  '4':
  - type: text
    content: Sois-en sûr, mes propos ne sont pas des mensonges,
  - type: text
    content: c'est un homme intègre dans ses réflexions qui est avec toi.
  '5':
  - type: text
    content: »Dieu est puissant, mais il ne rejette personne.
  - type: text
    content: Il est puissant par la force de son intelligence.
  '6':
  - type: text
    content: Il ne laisse pas vivre le méchant
  - type: text
    content: et il fait droit aux plus humbles.
  '7':
  - type: text
    content: 'Il ne détourne pas les yeux des hommes justes:'
  - type: text
    content: il les place avec les rois sur le trône,
  - type: text
    content: il les y fait asseoir définitivement afin qu'ils soient honorés.
  '8':
  - type: text
    content: S'ils sont chargés de chaînes,
  - type: text
    content: s'ils sont pris dans les liens du malheur,
  '9':
  - type: text
    content: c'est qu'il leur révèle la nature de leur activité,
  - type: text
    content: les transgressions qu'ils ont commises à cause de leur arrogance.
