document_id: JER.50,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prophétie sur Babylone
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Voici la parole prononcée par l'Eternel à l'intention de Babylone, à l'intention du pays des Babyloniens, par l'intermédiaire du prophète Jérémie.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: La Babylonie sera livrée au pillage.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous ceux qui la pilleront seront rassasiés, déclare l'Eternel.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Cela arrivera parce que vous vous êtes réjouis, parce que vous vous êtes régalés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous qui avez pillé mon héritage.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cela arrivera parce que vous avez bondi comme une génisse qui écrase le blé
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que vous avez henni comme des chevaux fougueux.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Votre mère est profondément honteuse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'celle qui vous a mis au monde est humiliée:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la voici devenue la dernière des nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un désert, une terre sèche et aride.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: A cause de l'indignation de l'Eternel, elle ne sera plus habitée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle ne sera plus qu'un désert.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous ceux qui passeront près de Babylone
  - type: usfm
    marker: q1
    children:
    - type: text
      text: seront consternés et siffleront à la vue de toutes ses blessures.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Rangez-vous en ordre de bataille autour de Babylone, vous tous qui maniez l'arc!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tirez contre elle, n'épargnez pas les flèches,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car elle a péché contre l'Eternel.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Poussez de tous côtés un cri de guerre contre elle!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle se rend.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses fondations s'écroulent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ses murs sont démolis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car telle est la vengeance de l'Eternel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vengez-vous d'elle! Traitez-la comme elle a traité les autres!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Exterminez de Babylone celui qui sème
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et celui qui manie la faucille à l'époque de la moisson!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Devant l'épée destructrice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '*que chacun se tourne vers son peuple,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que chacun se réfugie dans son pays
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '50.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Que chacun… pays: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: citation d'
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Esaïe 13.14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '!'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Israël est une brebis perdue que les lions ont pourchassée.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le premier à la dévorer a été le roi d'Assyrie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le dernier à lui briser les os a été Nebucadnetsar, le roi de Babylone.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'C''est pourquoi, voici ce que dit l''Eternel, le maître de l''univers, le Dieu d''Israël:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je vais intervenir contre le roi de Babylone et son pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tout comme je suis intervenu contre le roi d'Assyrie.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Je ramènerai Israël dans son domaine.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il broutera sur le Carmel et en Basan
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il se rassasiera dans la région montagneuse d'Ephraïm et en Galaad.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Annoncez-le parmi les nations, proclamez-le, dressez un étendard!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Proclamez-le, ne cachez rien!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dites: «Babylone est prise! Bel est couvert de honte, Merodac'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '50.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Bel… Merodac: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ces deux noms désignent la principale divinité babylonienne.
      marker-yv: yv-n
    - type: text
      text: ' est brisé!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses idoles sont couvertes de honte, ses statues sont brisées!»
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Durant ces jours-là, à ce moment-là, déclare l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on cherchera la faute d'Israël et elle aura disparu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on cherchera le péché de Juda et on ne le trouvera plus,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car je pardonnerai au reste que j'aurai laissé.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Monte contre le pays de Merataïm
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et contre les habitants de Peqod!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Massacre, voue à la destruction ce qui reste derrière eux, déclare l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fais tout ce que je t'ai ordonné!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Des cris de guerre retentissent dans le pays.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le désastre est grand.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Comment! Il est brisé, mis en pièces, le marteau de toute la terre!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comment! Babylone n'est plus qu'un sujet de consternation parmi les nations!
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Je t'ai tendu un piège et tu as été prise, Babylone,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans même que tu t'en aperçoives.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as été découverte et on s'est emparé de toi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce que c'est à l'Eternel que tu t'es attaquée.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: L'Eternel a ouvert son arsenal
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et en a tiré les armes de sa colère.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, c'est une œuvre du Seigneur, de l'Eternel, le maître de l'univers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans le pays des Babyloniens.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Venez de partout contre Babylone, ouvrez ses greniers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: entassez-la comme on entasse des tas de gerbes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et vouez-la à la destruction! Qu'il ne reste plus rien d'elle!
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Massacrez tous ses taureaux, qu'ils descendent à l'abattoir!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Malheur à eux, car leur jour est arrivé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est le moment pour moi d'intervenir contre eux.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Les cris des fuyards, des rescapés de la région de Babylone,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: viennent annoncer dans Sion la vengeance de l'Eternel, notre Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la vengeance de son temple.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Mobilisez des archers contre Babylone!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous tous qui maniez l'arc,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: campez autour d'elle! Qu'il n'y ait aucun rescapé!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Traitez-la conformément à ses actes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rendez-lui exactement la pareille!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, elle a fait preuve d'arrogance envers l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: envers le Saint d'Israël.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: En effet, une nation venue du nord est montée pour l'attaquer.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle transformera son pays en sujet de consternation.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n'y aura plus d'habitants.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hommes et bêtes auront décampé, ils auront pris le large.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Voilà pourquoi ses jeunes gens tomberont sur ses places
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tous ses hommes de guerre seront réduits au silence ce jour-là,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: déclare l'Eternel.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Oui, je m'en prends à toi, orgueilleuse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: déclare le Seigneur, l'Eternel, le maître de l'univers.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ton jour est arrivé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est le moment pour moi d'intervenir contre toi.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: L'orgueilleuse trébuchera, elle tombera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il n'y aura personne pour la relever.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je mettrai le feu à ses villes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il dévorera tous leurs environs.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Voici ce que dit l''Eternel, le maître de l''univers:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les Israélites et les Judéens sont opprimés ensemble.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous ceux qui les ont déportés les retiennent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et refusent de les laisser partir.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Cependant, *celui qui les rachète est puissant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lui dont le nom est l'Eternel, le maître de l'univers.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il défendra vraiment leur cause
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '50.34 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Celui qui… cause: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Proverbes 23.11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin de donner du repos au pays
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et de faire trembler les habitants de Babylone.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Que l'épée frappe les Babyloniens, déclare l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu'elle atteigne les habitants de Babylone, ses chefs et ses sages!
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Que l'épée atteigne les faiseurs de prédictions
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qu'ils se conduisent comme des fous!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que l'épée atteigne ses guerriers
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qu'ils soient terrorisés!
  '37':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Que l'épée atteigne ses chevaux et ses chars!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu'elle atteigne les peuples de toutes sortes qui vivent au milieu d'elle
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qu'ils deviennent des femmelettes!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que l'épée atteigne ses trésors et qu'ils soient pillés!
  '38':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Que la sécheresse atteigne son eau, qu'elle arrête de couler!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, c'est un pays rempli de sculptures sacrées
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils délirent à cause de ces représentations terrifiantes.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: Voilà pourquoi les animaux du désert s'y installeront en compagnie des chacals
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les autruches y éliront domicile.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Babylone ne sera plus jamais habitée.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les générations passeront, mais plus personne n'y résidera.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Durant ces jours-là, à ce moment-là, déclare l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les Israélites et les Judéens reviendront ensemble.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils marcheront en pleurant
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et rechercheront l'Eternel, leur Dieu.
  '40':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Ce sera comme lors de la catastrophe dont Dieu a frappé Sodome et Gomorrhe ainsi que les villes voisines,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'déclare l''Eternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: plus personne n'y habitera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aucun homme n'y séjournera.
  '41':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: Un peuple vient du nord,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: une grande nation et de nombreux rois
  - type: usfm
    marker: q1
    children:
    - type: text
      text: se mettent en mouvement depuis les extrémités de la terre.
  '42':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: Ils empoignent l'arc et le javelot.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils sont cruels et ne montrent aucune compassion.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leur voix gronde comme la mer.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils sont montés sur des chevaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: prêts à combattre comme un seul homme
  - type: usfm
    marker: q1
    children:
    - type: text
      text: contre toi, fille de Babylone!
  '43':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: En apprenant la nouvelle, le roi de Babylone
  - type: usfm
    marker: q1
    children:
    - type: text
      text: baisse les bras.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'angoisse s'empare de lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pareille à la douleur d'une femme qui accouche.
  '44':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: Voici que, pareil à un lion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il monte des rives luxuriantes du Jourdain
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour s'attaquer à un domaine solide.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J'agirai en un clin d’œil, je les ferai déguerpir de là
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et j'établirai à la tête de Babylone celui que j'ai choisi.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, qui est semblable à moi? Qui me donnera des ordres?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quel est le berger qui me résistera?
  '45':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: C'est pourquoi écoutez la décision que l'Eternel a prise contre Babylone
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et les projets qu''il a formés contre le pays des Babyloniens:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on les traînera comme de faibles brebis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on dévastera leur domaine devant eux.
  '46':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: Au bruit de la prise de Babylone, la terre tremble.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est un cri qu'on entend parmi les nations.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ils s'informeront du chemin qui conduit à Sion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ils se tourneront vers elle:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Venez, attachez-vous à l'Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: par une alliance éternelle qui ne soit jamais oubliée!»
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Mon peuple n'était qu'un troupeau de brebis perdues.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leurs bergers les avaient égarées, ils les faisaient errer dans les montagnes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles allaient de montagne en colline
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et avaient fini par oublier leur lieu de refuge.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Tous ceux qui les trouvaient les dévoraient
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et leurs ennemis disaient:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Nous ne sommes pas coupables,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: puisqu'ils ont péché contre l'Eternel alors qu'il était pour eux un domaine de justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: puisqu'ils ont péché contre celui qui était l'espérance de leurs ancêtres, l'Eternel.»
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Décampez de Babylone, sortez du pays des Babyloniens
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et imitez le comportement des boucs à la tête du troupeau!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: En effet, voici, je vais mettre en mouvement et faire monter contre Babylone
  - type: usfm
    marker: q1
    children:
    - type: text
      text: une coalition de grandes nations venant de la région du nord.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles se rangeront en ordre de bataille contre elle et s'en empareront.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Leurs flèches sont pareilles à un habile guerrier:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il ne revient pas les mains vides.
