document_id: JER.50,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Prophétie sur Babylone
  - type: text
    content: Voici la parole prononcée par l'Eternel à l'intention de Babylone, à l'intention du pays des Babyloniens, par l'intermédiaire du prophète Jérémie.
  '10':
  - type: text
    content: La Babylonie sera livrée au pillage.
  - type: text
    content: Tous ceux qui la pilleront seront rassasiés, déclare l'Eternel.
  '11':
  - type: text
    content: Cela arrivera parce que vous vous êtes réjouis, parce que vous vous êtes régalés,
  - type: text
    content: vous qui avez pillé mon héritage.
  - type: text
    content: Cela arrivera parce que vous avez bondi comme une génisse qui écrase le blé
  - type: text
    content: et que vous avez henni comme des chevaux fougueux.
  '12':
  - type: text
    content: Votre mère est profondément honteuse,
  - type: text
    content: 'celle qui vous a mis au monde est humiliée:'
  - type: text
    content: la voici devenue la dernière des nations,
  - type: text
    content: un désert, une terre sèche et aride.
  '13':
  - type: text
    content: A cause de l'indignation de l'Eternel, elle ne sera plus habitée,
  - type: text
    content: elle ne sera plus qu'un désert.
  - type: text
    content: Tous ceux qui passeront près de Babylone
  - type: text
    content: seront consternés et siffleront à la vue de toutes ses blessures.
  '14':
  - type: text
    content: Rangez-vous en ordre de bataille autour de Babylone, vous tous qui maniez l'arc!
  - type: text
    content: Tirez contre elle, n'épargnez pas les flèches,
  - type: text
    content: car elle a péché contre l'Eternel.
  '15':
  - type: text
    content: Poussez de tous côtés un cri de guerre contre elle!
  - type: text
    content: Elle se rend.
  - type: text
    content: Ses fondations s'écroulent,
  - type: text
    content: ses murs sont démolis,
  - type: text
    content: car telle est la vengeance de l'Eternel.
  - type: text
    content: Vengez-vous d'elle! Traitez-la comme elle a traité les autres!
  '16':
  - type: text
    content: Exterminez de Babylone celui qui sème
  - type: text
    content: et celui qui manie la faucille à l'époque de la moisson!
  - type: text
    content: Devant l'épée destructrice,
  - type: text
    content: '*que chacun se tourne vers son peuple,'
  - type: text
    content: que chacun se réfugie dans son pays
  - type: note
    content: 'Que chacun… pays: citation d''Esaïe 13.14.'
  - type: text
    content: '!'
  '17':
  - type: text
    content: Israël est une brebis perdue que les lions ont pourchassée.
  - type: text
    content: Le premier à la dévorer a été le roi d'Assyrie,
  - type: text
    content: et le dernier à lui briser les os a été Nebucadnetsar, le roi de Babylone.
  '18':
  - type: text
    content: 'C''est pourquoi, voici ce que dit l''Eternel, le maître de l''univers, le Dieu d''Israël:'
  - type: text
    content: Je vais intervenir contre le roi de Babylone et son pays,
  - type: text
    content: tout comme je suis intervenu contre le roi d'Assyrie.
  '19':
  - type: text
    content: Je ramènerai Israël dans son domaine.
  - type: text
    content: Il broutera sur le Carmel et en Basan
  - type: text
    content: et il se rassasiera dans la région montagneuse d'Ephraïm et en Galaad.
  '2':
  - type: text
    content: Annoncez-le parmi les nations, proclamez-le, dressez un étendard!
  - type: text
    content: Proclamez-le, ne cachez rien!
  - type: text
    content: 'Dites: «Babylone est prise! Bel est couvert de honte, Merodac'
  - type: note
    content: 'Bel… Merodac: ces deux noms désignent la principale divinité babylonienne.'
  - type: text
    content: ' est brisé!'
  - type: text
    content: Ses idoles sont couvertes de honte, ses statues sont brisées!»
  '20':
  - type: text
    content: Durant ces jours-là, à ce moment-là, déclare l'Eternel,
  - type: text
    content: on cherchera la faute d'Israël et elle aura disparu,
  - type: text
    content: on cherchera le péché de Juda et on ne le trouvera plus,
  - type: text
    content: car je pardonnerai au reste que j'aurai laissé.
  '21':
  - type: text
    content: Monte contre le pays de Merataïm
  - type: text
    content: et contre les habitants de Peqod!
  - type: text
    content: Massacre, voue à la destruction ce qui reste derrière eux, déclare l'Eternel,
  - type: text
    content: fais tout ce que je t'ai ordonné!
  '22':
  - type: text
    content: Des cris de guerre retentissent dans le pays.
  - type: text
    content: Le désastre est grand.
  '23':
  - type: text
    content: Comment! Il est brisé, mis en pièces, le marteau de toute la terre!
  - type: text
    content: Comment! Babylone n'est plus qu'un sujet de consternation parmi les nations!
  '24':
  - type: text
    content: Je t'ai tendu un piège et tu as été prise, Babylone,
  - type: text
    content: sans même que tu t'en aperçoives.
  - type: text
    content: Tu as été découverte et on s'est emparé de toi
  - type: text
    content: parce que c'est à l'Eternel que tu t'es attaquée.
  '25':
  - type: text
    content: L'Eternel a ouvert son arsenal
  - type: text
    content: et en a tiré les armes de sa colère.
  - type: text
    content: Oui, c'est une œuvre du Seigneur, de l'Eternel, le maître de l'univers,
  - type: text
    content: dans le pays des Babyloniens.
  '26':
  - type: text
    content: Venez de partout contre Babylone, ouvrez ses greniers,
  - type: text
    content: entassez-la comme on entasse des tas de gerbes
  - type: text
    content: et vouez-la à la destruction! Qu'il ne reste plus rien d'elle!
  '27':
  - type: text
    content: Massacrez tous ses taureaux, qu'ils descendent à l'abattoir!
  - type: text
    content: Malheur à eux, car leur jour est arrivé,
  - type: text
    content: c'est le moment pour moi d'intervenir contre eux.
  '28':
  - type: text
    content: Les cris des fuyards, des rescapés de la région de Babylone,
  - type: text
    content: viennent annoncer dans Sion la vengeance de l'Eternel, notre Dieu,
  - type: text
    content: la vengeance de son temple.
  '29':
  - type: text
    content: Mobilisez des archers contre Babylone!
  - type: text
    content: Vous tous qui maniez l'arc,
  - type: text
    content: campez autour d'elle! Qu'il n'y ait aucun rescapé!
  - type: text
    content: Traitez-la conformément à ses actes,
  - type: text
    content: rendez-lui exactement la pareille!
  - type: text
    content: En effet, elle a fait preuve d'arrogance envers l'Eternel,
  - type: text
    content: envers le Saint d'Israël.
  '3':
  - type: text
    content: En effet, une nation venue du nord est montée pour l'attaquer.
  - type: text
    content: Elle transformera son pays en sujet de consternation.
  - type: text
    content: Il n'y aura plus d'habitants.
  - type: text
    content: Hommes et bêtes auront décampé, ils auront pris le large.
  '30':
  - type: text
    content: Voilà pourquoi ses jeunes gens tomberont sur ses places
  - type: text
    content: et tous ses hommes de guerre seront réduits au silence ce jour-là,
  - type: text
    content: déclare l'Eternel.
  '31':
  - type: text
    content: Oui, je m'en prends à toi, orgueilleuse,
  - type: text
    content: déclare le Seigneur, l'Eternel, le maître de l'univers.
  - type: text
    content: Ton jour est arrivé,
  - type: text
    content: c'est le moment pour moi d'intervenir contre toi.
  '32':
  - type: text
    content: L'orgueilleuse trébuchera, elle tombera,
  - type: text
    content: et il n'y aura personne pour la relever.
  - type: text
    content: Je mettrai le feu à ses villes
  - type: text
    content: et il dévorera tous leurs environs.
  '33':
  - type: text
    content: 'Voici ce que dit l''Eternel, le maître de l''univers:'
  - type: text
    content: Les Israélites et les Judéens sont opprimés ensemble.
  - type: text
    content: Tous ceux qui les ont déportés les retiennent
  - type: text
    content: et refusent de les laisser partir.
  '34':
  - type: text
    content: Cependant, *celui qui les rachète est puissant,
  - type: text
    content: lui dont le nom est l'Eternel, le maître de l'univers.
  - type: text
    content: Il défendra vraiment leur cause
  - type: note
    content: 'Celui qui… cause: citation de Proverbes 23.11.'
  - type: text
    content: afin de donner du repos au pays
  - type: text
    content: et de faire trembler les habitants de Babylone.
  '35':
  - type: text
    content: Que l'épée frappe les Babyloniens, déclare l'Eternel,
  - type: text
    content: qu'elle atteigne les habitants de Babylone, ses chefs et ses sages!
  '36':
  - type: text
    content: Que l'épée atteigne les faiseurs de prédictions
  - type: text
    content: et qu'ils se conduisent comme des fous!
  - type: text
    content: Que l'épée atteigne ses guerriers
  - type: text
    content: et qu'ils soient terrorisés!
  '37':
  - type: text
    content: Que l'épée atteigne ses chevaux et ses chars!
  - type: text
    content: Qu'elle atteigne les peuples de toutes sortes qui vivent au milieu d'elle
  - type: text
    content: et qu'ils deviennent des femmelettes!
  - type: text
    content: Que l'épée atteigne ses trésors et qu'ils soient pillés!
  '38':
  - type: text
    content: Que la sécheresse atteigne son eau, qu'elle arrête de couler!
  - type: text
    content: En effet, c'est un pays rempli de sculptures sacrées
  - type: text
    content: et ils délirent à cause de ces représentations terrifiantes.
  '39':
  - type: text
    content: Voilà pourquoi les animaux du désert s'y installeront en compagnie des chacals
  - type: text
    content: et les autruches y éliront domicile.
  - type: text
    content: Babylone ne sera plus jamais habitée.
  - type: text
    content: Les générations passeront, mais plus personne n'y résidera.
  '4':
  - type: text
    content: Durant ces jours-là, à ce moment-là, déclare l'Eternel,
  - type: text
    content: les Israélites et les Judéens reviendront ensemble.
  - type: text
    content: Ils marcheront en pleurant
  - type: text
    content: et rechercheront l'Eternel, leur Dieu.
  '40':
  - type: text
    content: Ce sera comme lors de la catastrophe dont Dieu a frappé Sodome et Gomorrhe ainsi que les villes voisines,
  - type: text
    content: 'déclare l''Eternel:'
  - type: text
    content: plus personne n'y habitera,
  - type: text
    content: aucun homme n'y séjournera.
  '41':
  - type: text
    content: Un peuple vient du nord,
  - type: text
    content: une grande nation et de nombreux rois
  - type: text
    content: se mettent en mouvement depuis les extrémités de la terre.
  '42':
  - type: text
    content: Ils empoignent l'arc et le javelot.
  - type: text
    content: Ils sont cruels et ne montrent aucune compassion.
  - type: text
    content: Leur voix gronde comme la mer.
  - type: text
    content: Ils sont montés sur des chevaux,
  - type: text
    content: prêts à combattre comme un seul homme
  - type: text
    content: contre toi, fille de Babylone!
  '43':
  - type: text
    content: En apprenant la nouvelle, le roi de Babylone
  - type: text
    content: baisse les bras.
  - type: text
    content: L'angoisse s'empare de lui,
  - type: text
    content: pareille à la douleur d'une femme qui accouche.
  '44':
  - type: text
    content: Voici que, pareil à un lion,
  - type: text
    content: il monte des rives luxuriantes du Jourdain
  - type: text
    content: pour s'attaquer à un domaine solide.
  - type: text
    content: J'agirai en un clin d’œil, je les ferai déguerpir de là
  - type: text
    content: et j'établirai à la tête de Babylone celui que j'ai choisi.
  - type: text
    content: En effet, qui est semblable à moi? Qui me donnera des ordres?
  - type: text
    content: Quel est le berger qui me résistera?
  '45':
  - type: text
    content: C'est pourquoi écoutez la décision que l'Eternel a prise contre Babylone
  - type: text
    content: 'et les projets qu''il a formés contre le pays des Babyloniens:'
  - type: text
    content: on les traînera comme de faibles brebis,
  - type: text
    content: on dévastera leur domaine devant eux.
  '46':
  - type: text
    content: Au bruit de la prise de Babylone, la terre tremble.
  - type: text
    content: C'est un cri qu'on entend parmi les nations.
  '5':
  - type: text
    content: Ils s'informeront du chemin qui conduit à Sion,
  - type: text
    content: 'ils se tourneront vers elle:'
  - type: text
    content: «Venez, attachez-vous à l'Eternel
  - type: text
    content: par une alliance éternelle qui ne soit jamais oubliée!»
  '6':
  - type: text
    content: Mon peuple n'était qu'un troupeau de brebis perdues.
  - type: text
    content: Leurs bergers les avaient égarées, ils les faisaient errer dans les montagnes.
  - type: text
    content: Elles allaient de montagne en colline
  - type: text
    content: et avaient fini par oublier leur lieu de refuge.
  '7':
  - type: text
    content: Tous ceux qui les trouvaient les dévoraient
  - type: text
    content: 'et leurs ennemis disaient:'
  - type: text
    content: «Nous ne sommes pas coupables,
  - type: text
    content: puisqu'ils ont péché contre l'Eternel alors qu'il était pour eux un domaine de justice,
  - type: text
    content: puisqu'ils ont péché contre celui qui était l'espérance de leurs ancêtres, l'Eternel.»
  '8':
  - type: text
    content: Décampez de Babylone, sortez du pays des Babyloniens
  - type: text
    content: et imitez le comportement des boucs à la tête du troupeau!
  '9':
  - type: text
    content: En effet, voici, je vais mettre en mouvement et faire monter contre Babylone
  - type: text
    content: une coalition de grandes nations venant de la région du nord.
  - type: text
    content: Elles se rangeront en ordre de bataille contre elle et s'en empareront.
  - type: text
    content: 'Leurs flèches sont pareilles à un habile guerrier:'
  - type: text
    content: il ne revient pas les mains vides.
