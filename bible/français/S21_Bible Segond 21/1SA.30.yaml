document_id: 1SA.30,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Victoire de David sur les Amalécites
  - type: text
    content: 'Deux jours plus tard, lorsque David arriva à Tsiklag avec ses hommes, les Amalécites avaient lancé une attaque dans le Néguev et à Tsiklag. Ils avaient détruit et brûlé Tsiklag, '
  '10':
  - type: text
    content: David continua la poursuite avec 400 hommes, tandis que 200 s'étaient arrêtés, trop fatigués pour passer le torrent de Besor.
  '11':
  - type: text
    content: 'Ils trouvèrent dans les champs un Egyptien qu''ils conduisirent vers David. Ils lui firent manger du pain et boire de l''eau, '
  '12':
  - type: text
    content: 'et ils lui donnèrent un morceau d''un gâteau aux figues sèches et deux gâteaux aux raisins secs. Lorsqu''il eut mangé, les forces lui revinrent, car il n''avait pas pris de nourriture et pas bu d''eau depuis 3 jours et 3 nuits. '
  '13':
  - type: text
    content: 'David lui dit: «A qui appartiens-tu et d''où viens-tu?» Il répondit: «Je suis un jeune Egyptien. J''étais au service d''un Amalécite, mais voilà 3 jours que mon maître m''a abandonné parce que j''étais malade. '
  '14':
  - type: text
    content: 'Nous avons lancé une attaque dans le sud du territoire des Kéréthiens, sur le territoire de Juda et au sud du territoire de Caleb, et nous avons brûlé Tsiklag.» '
  '15':
  - type: text
    content: 'David lui dit: «Veux-tu me faire descendre vers cette troupe?» Il répondit: «Jure-moi au nom de Dieu que tu ne me tueras pas et que tu ne me livreras pas à mon maître, et je te ferai descendre vers cette troupe.» '
  '16':
  - type: text
    content: 'Il lui servit ainsi de guide. Les Amalécites étaient dispersés dans la région. Ils mangeaient, buvaient et dansaient à cause du grand butin qu''ils avaient pris au pays des Philistins et de Juda. '
  '17':
  - type: text
    content: 'David leur porta des coups depuis l''aube de ce jour-là jusqu''au lendemain soir, et aucun d''eux ne put s''échapper, excepté 400 jeunes hommes qui montèrent sur des chameaux et s''enfuirent. '
  '18':
  - type: text
    content: 'David sauva tout ce que les Amalécites avaient pris et il délivra aussi ses deux femmes. '
  '19':
  - type: text
    content: 'Il ne leur manqua personne, ni petit ni grand, ni fils ni fille, ni quoi que ce soit du butin ni rien de ce qu''on leur avait enlevé. David ramena tout. '
  '2':
  - type: text
    content: 'après avoir fait prisonniers les femmes et tous ceux qui s''y trouvaient, petits et grands. Ils n''avaient tué personne, mais ils avaient tout emmené et s''étaient remis en route. '
  '20':
  - type: text
    content: 'David prit tout le petit et le gros bétail. Ceux qui conduisaient ce troupeau et marchaient à sa tête disaient: «Voici le butin de David!»'
  '21':
  - type: text
    content: 'David arriva vers les 200 hommes qui avaient été trop fatigués pour le suivre et qu''on avait laissés au torrent de Besor. Ils s''avancèrent à la rencontre de David et de sa troupe. David s''approcha d''eux et leur demanda comment ils allaient. '
  '22':
  - type: text
    content: 'Tous les hommes méchants et les vauriens qui avaient accompagné David prirent la parole et dirent: «Puisqu''ils ne sont pas venus avec nous, nous ne leur donnerons rien du butin que nous avons sauvé, à part à chacun sa femme et ses enfants. Qu''ils les emmènent et s''en aillent.» '
  '23':
  - type: text
    content: 'Mais David dit: «N''agissez pas ainsi, mes frères, au sujet de ce que l''Eternel nous a donné. En effet, il nous a gardés et a livré entre nos mains la troupe qui était venue nous faire du mal. '
  '24':
  - type: text
    content: 'Qui pourrait vous écouter dans cette affaire? La part doit être la même pour celui qui est descendu sur le champ de bataille et pour celui qui est resté près du matériel: ils partageront tout ensemble.» '
  '25':
  - type: text
    content: Cela se passa ainsi dès ce jour et par la suite, et l'on en a fait jusqu'à aujourd'hui une prescription et une règle en Israël.
  '26':
  - type: text
    content: 'De retour à Tsiklag, David envoya une partie du butin aux anciens de Juda qui étaient ses amis en leur adressant ces paroles: «Voici pour vous un cadeau pris sur le butin des ennemis de l''Eternel.» '
  '27':
  - type: text
    content: 'Il fit ainsi des envois aux anciens de Béthel, de Ramoth dans le Néguev, de Jatthir, '
  '28':
  - type: text
    content: 'd''Aroër, de Siphmoth, d''Eshthemoa, '
  '29':
  - type: text
    content: 'de Racal, des villes des Jerachmeélites, des villes des Kéniens, '
  '3':
  - type: text
    content: 'En arrivant à la ville, David et ses hommes virent qu''elle était brûlée et que leurs femmes, leurs fils et leurs filles avaient été faits prisonniers. '
  '30':
  - type: text
    content: 'de Horma, de Cor-Ashan, d''Athac, '
  '31':
  - type: text
    content: d'Hébron et dans tous les endroits que ses hommes et lui avaient parcourus.
  '4':
  - type: text
    content: 'Alors David et la troupe qui l''accompagnait se mirent à pleurer tout haut jusqu''à ce qu''ils n''aient plus la force de pleurer. '
  '5':
  - type: text
    content: Les deux femmes de David, Achinoam de Jizreel et Abigaïl de Carmel, la femme de Nabal, avaient été emmenées.
  '6':
  - type: text
    content: 'David fut dans une grande angoisse, car la troupe parlait de le lapider. Tous éprouvaient en effet de l''amertume, chacun à cause de ses fils et de ses filles. Mais David reprit courage en s''appuyant sur l''Eternel, son Dieu. '
  '7':
  - type: text
    content: 'Il dit au prêtre Abiathar, fils d''Achimélec: «Apporte-moi donc l''éphod!» Abiathar le lui apporta. '
  '8':
  - type: text
    content: 'David consulta l''Eternel en disant: «Dois-je poursuivre cette troupe? Réussirai-je à la rattraper?» L''Eternel lui répondit: «Poursuis-la, car tu la rattraperas et tu délivreras les prisonniers.» '
  '9':
  - type: text
    content: 'David se mit en marche avec ses 600 compagnons. Ils arrivèrent au torrent de Besor, où ceux qui traînaient à l''arrière s''arrêtèrent. '
