document_id: JER.21,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Imminence de la prise de Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici la parole qui fut adressée à Jérémie par l''Eternel lorsque le roi Sédécias lui envoya Pashhur, fils de Malkija, et le prêtre Sophonie, fils de Maaséja, pour lui dire: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: En effet, je me tourne contre cette ville pour lui faire du mal et non du bien, déclare l'Eternel. Elle sera livrée entre les mains du roi de Babylone, qui y mettra le feu.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Famille du roi de Juda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: écoutez la parole de l'Eternel!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Famille de David, voici ce que dit l''Eternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rendez la justice dès le matin
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et délivrez celui qui est maltraité de son exploiteur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sinon ma colère éclatera comme un feu
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et s'enflammera sans qu'on puisse l'éteindre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à cause de la méchanceté de vos agissements.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Oui, je m'en prends à toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à toi qui habites au-dessus de la vallée, sur le rocher qui domine la plaine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: déclare l'Eternel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je vous en veux, à vous qui dites: ‘Qui nous attaquera?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui entrera dans nos habitations?’
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J'interviendrai contre vous en fonction de vos agissements, déclare l'Eternel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je mettrai le feu à votre forêt
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il dévorera tout ce qu'il y a autour.»
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: «Consulte, je t'en prie, l'Eternel pour nous, car Nebucadnetsar, le roi de Babylone, nous fait la guerre. Peut-être l'Eternel nous accordera-t-il un de ses miracles pour qu'il s'éloigne de nous.»
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jérémie leur répondit: «Vous direz à Sédécias: '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘Voici ce que dit l''Eternel, le Dieu d''Israël: Je vais retourner contre vous les armes qui sont dans vos mains et avec lesquelles vous combattez, à l''extérieur des murailles, le roi de Babylone et les Babyloniens qui vous assiègent, je les rassemblerai contre le centre de cette ville. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce sera moi-même qui vous combattrai, par la puissance de ma main et la force de mon bras, avec colère, fureur et une grande indignation. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je tuerai les habitants de cette ville, hommes et bêtes. Ils mourront d''une peste terrible.’ '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Après cela, déclare l'Eternel, je livrerai Sédécias, roi de Juda, ses serviteurs, le peuple et ceux qui auront survécu dans cette ville à la peste, à l'épée et à la famine, je les livrerai entre les mains de Nebucadnetsar, roi de Babylone, entre les mains de leurs ennemis et de ceux qui en veulent à leur vie. Nebucadnetsar les tuera avec l'épée. Il ne les épargnera pas, il n'aura aucune pitié, aucune compassion.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Tu diras à ce peuple: ‘Voici ce que dit l''Eternel: Je vous donne le choix entre le chemin de la vie et celui de la mort. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Celui qui restera dans cette ville mourra par l''épée, par la famine ou par la peste, mais celui qui en sortira pour se rendre aux Babyloniens qui vous assiègent aura la vie sauve, sa vie sera sa part de butin.’ '
