document_id: 1TI.6
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: Ep 6.5-8; Tt 2.9-10; 1P 2.18-20
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Que tous ceux qui vivent sous la contrainte de l''esclavage considèrent leurs maîtres comme dignes d''un plein respect, afin que le nom de Dieu et sa doctrine ne soient pas calomniés. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Quant à ceux qui ont des maîtres croyants, ils ne doivent pas les mépriser sous prétexte qu'ils sont des frères, mais les servir d'autant mieux que ce sont des croyants et des bien-aimés qui bénéficient de leurs services. Enseigne ces choses et recommande-les.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les dangers de se détourner de la foi
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Si quelqu''un enseigne une autre doctrine et ne s''attache pas aux saines paroles de notre Seigneur Jésus-Christ et à l''enseignement qui est conforme à la piété, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'il est aveuglé par l''orgueil, il ne sait rien, il a la maladie des controverses et des querelles de mots. C''est de là que naissent les jalousies, les disputes, les calomnies, les mauvais soupçons, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: les discussions violentes entre des hommes à l'intelligence corrompue, privés de la vérité, qui croient que la piété est une source de profit. [Eloigne-toi de telles personnes.]
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'La piété est pourtant une grande source de profit quand on se contente de ce que l''on a. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'En effet, nous n''avons rien apporté dans le monde et [il est évident que] nous ne pouvons rien en emporter. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Si donc nous avons de la nourriture et des vêtements, cela nous suffira. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Quant à ceux qui veulent s''enrichir, ils tombent dans la tentation, dans un piège et dans une foule de désirs stupides et nuisibles qui plongent les hommes dans la ruine et provoquent leur perte. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: L'amour de l'argent est en effet à la racine de tous les maux. En s'y livrant, certains se sont égarés loin de la foi et se sont infligé eux-mêmes bien des tourments.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Quant à toi, homme de Dieu, fuis ces choses et recherche la justice, la piété, la foi, l''amour, la persévérance, la douceur. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Combats le bon combat de la foi, saisis la vie éternelle. C'est à elle que tu as été appelé et c'est pour elle que tu as fait une belle profession de foi en présence d'un grand nombre de témoins.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Devant Dieu qui donne vie à toute chose et devant Jésus-Christ qui a rendu témoignage par sa belle déclaration face à Ponce Pilate, je t''ordonne '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'de garder le commandement reçu en vivant sans tache et sans reproche jusqu''à l''apparition de notre Seigneur Jésus-Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Cette apparition, le bienheureux et seul souverain, le Roi des rois et le Seigneur des seigneurs, la révélera au moment voulu. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Il est le seul à posséder l'immortalité
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le seul à posséder l''immortalité: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dieu est le seul qui soit immortel par essence.
    marker-yv: yv-n
  - type: text
    text: ', lui qui habite une lumière inaccessible et qu''aucun homme n''a vu ni ne peut voir. A lui soient l''honneur et la puissance éternelle. Amen!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Aux riches de ce monde, ordonne de ne pas être orgueilleux et de ne pas mettre leur espérance dans des richesses incertaines, mais dans le Dieu [vivant,] qui nous donne tout avec abondance pour que nous en jouissions. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ordonne-leur de faire le bien, d''être riches en belles œuvres, de se montrer généreux, prêts à partager. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ils s'assureront ainsi en guise de trésor de bonnes fondations pour l'avenir, afin de saisir la vie éternelle.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Cher Timothée, garde le dépôt qui t'a été confié
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.20 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le dépôt qui t''a été confié: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: c'est-à-dire le véritable Evangile.
    marker-yv: yv-n
  - type: text
    text: ', évite les bavardages profanes et les objections de la pseudo-connaissance. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: En s'y engageant, certains se sont détournés de la foi. Que la grâce soit avec toi!
