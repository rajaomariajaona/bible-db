document_id: 1TI.6,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Ep 6.5-8; Tt 2.9-10; 1P 2.18-20
  - type: text
    content: 'Que tous ceux qui vivent sous la contrainte de l''esclavage considèrent leurs maîtres comme dignes d''un plein respect, afin que le nom de Dieu et sa doctrine ne soient pas calomniés. '
  '10':
  - type: text
    content: L'amour de l'argent est en effet à la racine de tous les maux. En s'y livrant, certains se sont égarés loin de la foi et se sont infligé eux-mêmes bien des tourments.
  '11':
  - type: text
    content: 'Quant à toi, homme de Dieu, fuis ces choses et recherche la justice, la piété, la foi, l''amour, la persévérance, la douceur. '
  '12':
  - type: text
    content: Combats le bon combat de la foi, saisis la vie éternelle. C'est à elle que tu as été appelé et c'est pour elle que tu as fait une belle profession de foi en présence d'un grand nombre de témoins.
  '13':
  - type: text
    content: 'Devant Dieu qui donne vie à toute chose et devant Jésus-Christ qui a rendu témoignage par sa belle déclaration face à Ponce Pilate, je t''ordonne '
  '14':
  - type: text
    content: 'de garder le commandement reçu en vivant sans tache et sans reproche jusqu''à l''apparition de notre Seigneur Jésus-Christ. '
  '15':
  - type: text
    content: 'Cette apparition, le bienheureux et seul souverain, le Roi des rois et le Seigneur des seigneurs, la révélera au moment voulu. '
  '16':
  - type: text
    content: Il est le seul à posséder l'immortalité
  - type: note
    content: 'Le seul à posséder l''immortalité: Dieu est le seul qui soit immortel par essence.'
  - type: text
    content: ', lui qui habite une lumière inaccessible et qu''aucun homme n''a vu ni ne peut voir. A lui soient l''honneur et la puissance éternelle. Amen!'
  '17':
  - type: text
    content: 'Aux riches de ce monde, ordonne de ne pas être orgueilleux et de ne pas mettre leur espérance dans des richesses incertaines, mais dans le Dieu [vivant,] qui nous donne tout avec abondance pour que nous en jouissions. '
  '18':
  - type: text
    content: 'Ordonne-leur de faire le bien, d''être riches en belles œuvres, de se montrer généreux, prêts à partager. '
  '19':
  - type: text
    content: Ils s'assureront ainsi en guise de trésor de bonnes fondations pour l'avenir, afin de saisir la vie éternelle.
  '2':
  - type: text
    content: Quant à ceux qui ont des maîtres croyants, ils ne doivent pas les mépriser sous prétexte qu'ils sont des frères, mais les servir d'autant mieux que ce sont des croyants et des bien-aimés qui bénéficient de leurs services. Enseigne ces choses et recommande-les.
  - type: heading
    content: Les dangers de se détourner de la foi
  '20':
  - type: text
    content: Cher Timothée, garde le dépôt qui t'a été confié
  - type: note
    content: 'Le dépôt qui t''a été confié: c''est-à-dire le véritable Evangile.'
  - type: text
    content: ', évite les bavardages profanes et les objections de la pseudo-connaissance. '
  '21':
  - type: text
    content: En s'y engageant, certains se sont détournés de la foi. Que la grâce soit avec toi!
  '3':
  - type: text
    content: 'Si quelqu''un enseigne une autre doctrine et ne s''attache pas aux saines paroles de notre Seigneur Jésus-Christ et à l''enseignement qui est conforme à la piété, '
  '4':
  - type: text
    content: 'il est aveuglé par l''orgueil, il ne sait rien, il a la maladie des controverses et des querelles de mots. C''est de là que naissent les jalousies, les disputes, les calomnies, les mauvais soupçons, '
  '5':
  - type: text
    content: les discussions violentes entre des hommes à l'intelligence corrompue, privés de la vérité, qui croient que la piété est une source de profit. [Eloigne-toi de telles personnes.]
  '6':
  - type: text
    content: 'La piété est pourtant une grande source de profit quand on se contente de ce que l''on a. '
  '7':
  - type: text
    content: 'En effet, nous n''avons rien apporté dans le monde et [il est évident que] nous ne pouvons rien en emporter. '
  '8':
  - type: text
    content: 'Si donc nous avons de la nourriture et des vêtements, cela nous suffira. '
  '9':
  - type: text
    content: 'Quant à ceux qui veulent s''enrichir, ils tombent dans la tentation, dans un piège et dans une foule de désirs stupides et nuisibles qui plongent les hommes dans la ruine et provoquent leur perte. '
