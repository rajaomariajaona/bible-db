document_id: 1SA.15,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Guerre contre les Amalécites
  - type: text
    content: 'Samuel dit à Saül: «C''est moi que l''Eternel a envoyé pour te consacrer par onction comme roi sur son peuple, sur Israël. Ecoute donc les paroles prononcées par l''Eternel! '
  '10':
  - type: text
    content: 'L''Eternel adressa la parole à Samuel: '
  '11':
  - type: text
    content: '«Je regrette d''avoir établi Saül pour roi, car il se détourne de moi et n''accomplit pas mes paroles.» Samuel fut irrité et il cria à l''Eternel toute la nuit. '
  '12':
  - type: text
    content: 'Il se leva de bon matin pour aller à la rencontre de Saül. On vint lui dire: «Saül s''est rendu à Carmel et il s''y est érigé un monument. Puis il est reparti et, passant plus loin, il est descendu à Guilgal.» '
  '13':
  - type: text
    content: 'Samuel se rendit vers Saül, et Saül lui dit: «Sois béni de l''Eternel! J''ai accompli la parole de l''Eternel.» '
  '14':
  - type: text
    content: 'Samuel dit: «Qu''est-ce donc que ce bêlement de brebis qui parvient à mes oreilles et ce mugissement de bœufs que j''entends?» '
  '15':
  - type: text
    content: 'Saül répondit: «Ils les ont amenés de chez les Amalécites, parce que le peuple a épargné les meilleures brebis et les meilleurs bœufs afin de les offrir en sacrifice à l''Eternel, ton Dieu. Le reste, nous l''avons voué à la destruction.» '
  '16':
  - type: text
    content: 'Samuel dit à Saül: «Arrête! Je vais te révéler ce que l''Eternel m''a dit cette nuit.» Saül lui dit: «Parle!»'
  '17':
  - type: text
    content: 'Samuel dit: «Alors que tu étais petit à tes propres yeux, n''es-tu pas devenu le chef des tribus d''Israël et l''Eternel ne t''a-t-il pas désigné par onction pour que tu sois roi sur Israël? '
  '18':
  - type: text
    content: 'L''Eternel t''avait envoyé en disant: ‘Va vouer à la destruction ces pécheurs que sont les Amalécites. Tu leur feras la guerre jusqu''à ce que tu les aies exterminés.’ '
  '19':
  - type: text
    content: 'Pourquoi n''as-tu pas écouté l''Eternel? Pourquoi t''es-tu jeté sur le butin et as-tu fait ce qu''il désapprouve?» '
  '2':
  - type: text
    content: 'Voici ce que dit l''Eternel, le maître de l''univers: ‘Je me souviens de ce que les Amalécites ont fait à Israël lorsqu''ils lui ont barré le chemin à sa sortie d''Egypte. '
  '20':
  - type: text
    content: 'Saül répondit à Samuel: «J''ai écouté l''Eternel et j''ai suivi la voie où il m''envoyait. J''ai ramené Agag, le roi d''Amalek, et j''ai voué les Amalécites à la destruction. '
  '21':
  - type: text
    content: 'Mais le peuple a pris sur le butin les meilleures brebis et les meilleurs bœufs qui devaient être consacrés, afin de les offrir en sacrifice à l''Eternel, ton Dieu, à Guilgal.» '
  '22':
  - type: text
    content: 'Samuel dit: «L''Eternel trouve-t-il autant de plaisir dans les holocaustes et les sacrifices que dans l''obéissance à sa voix? Non, l''obéissance vaut mieux que les sacrifices et l''écoute attentive vaut mieux que la graisse des béliers. '
  '23':
  - type: text
    content: Oui, la révolte est aussi coupable que la divination, et la résistance au Seigneur est aussi fautive que le recours aux théraphim. Puisque tu as rejeté la parole de l'Eternel, il te rejette lui aussi comme roi.»
  '24':
  - type: text
    content: 'Alors Saül dit à Samuel: «J''ai péché, car j''ai enfreint l''ordre de l''Eternel et tes paroles. J''ai eu peur du peuple et je l''ai écouté. '
  '25':
  - type: text
    content: 'Maintenant, je t''en prie, pardonne mon péché, reviens avec moi et j''adorerai l''Eternel.» '
  '26':
  - type: text
    content: 'Samuel dit à Saül: «Je ne reviendrai pas avec toi, car tu as rejeté la parole de l''Eternel et l''Eternel te rejette. Tu ne seras plus roi sur Israël.» '
  '27':
  - type: text
    content: 'Alors que Samuel tournait le dos pour s''en aller, Saül l''attrapa par le pan de son manteau, qui fut arraché. '
  '28':
  - type: text
    content: 'Samuel lui dit: «L''Eternel t''arrache aujourd''hui la royauté d''Israël et la donne à un autre, qui est meilleur que toi. '
  '29':
  - type: text
    content: 'Celui qui est la force d''Israël ne ment pas et n''éprouve pas de regrets, car il n''est pas un homme pour avoir des regrets.» '
  '3':
  - type: text
    content: Va maintenant frapper les Amalécites. Vouez à la destruction tout ce qui leur appartient. Tu ne les épargneras pas et tu feras mourir hommes et femmes, enfants et bébés, bœufs et brebis, chameaux et ânes.’»
  '30':
  - type: text
    content: 'Saül répéta: «J''ai péché! Maintenant honore-moi devant les anciens de mon peuple et devant Israël. Reviens avec moi et j''adorerai l''Eternel, ton Dieu.»'
  '31':
  - type: text
    content: 'Samuel revint à la suite de Saül, et Saül adora l''Eternel. '
  '32':
  - type: text
    content: 'Puis Samuel dit: «Amenez-moi Agag, le roi d''Amalek.» Agag s''avança vers lui d''un air joyeux; il se disait: «Certainement, l''amertume de la mort s''est écartée.» '
  '33':
  - type: text
    content: 'Samuel dit: «De même que ton épée a privé des femmes de leurs enfants, de même ta mère sera privée d''un fils.» Et Samuel mit Agag en pièces devant l''Eternel à Guilgal.'
  '34':
  - type: text
    content: 'Samuel partit pour Rama et Saül remonta chez lui à Guibea de Saül. '
  '35':
  - type: text
    content: Samuel n'alla plus voir Saül jusqu'au jour de sa mort. En effet, il pleurait sur lui, parce que l'Eternel regrettait de l'avoir établi roi d'Israël.
  '4':
  - type: text
    content: 'Saül convoqua le peuple et le passa en revue à Thelaïm: il y avait 200''000 fantassins ainsi que 10''000 hommes de Juda.'
  '5':
  - type: text
    content: 'Saül marcha jusqu''à la ville d''Amalek et plaça une embuscade dans la vallée. '
  '6':
  - type: text
    content: 'Il dit aux Kéniens: «Partez, retirez-vous, quittez les Amalécites afin que je ne vous fasse pas subir le même sort qu''à eux. En effet, vous avez fait preuve de bonté envers tous les Israélites lorsqu''ils sont montés d''Egypte.» Les Kéniens se retirèrent alors du milieu des Amalécites.'
  '7':
  - type: text
    content: 'Saül porta des coups à Amalek depuis Havila jusqu''à Shur, qui fait face à l''Egypte. '
  '8':
  - type: text
    content: 'Il captura Agag, roi d''Amalek, vivant et il voua à la destruction tout le peuple en le passant au fil de l''épée. '
  '9':
  - type: text
    content: Mais Saül et le peuple épargnèrent Agag ainsi que les meilleures brebis, les meilleurs bœufs, les meilleures bêtes de la seconde portée, les agneaux gras et tout ce qu'il y avait de bon; ils ne voulurent pas le vouer à la destruction. En revanche, ils exterminèrent tout ce qui était sans valeur et chétif.
