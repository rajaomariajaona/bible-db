document_id: LAM.5,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Après la prise de Jérusalem
  - type: text
    content: Souviens-toi, Eternel, de ce qui nous est arrivé!
  - type: text
    content: Regarde, vois notre honte!
  '10':
  - type: text
    content: Notre peau est bouillante comme un four
  - type: text
    content: à cause des brûlures de la faim.
  '11':
  - type: text
    content: Ils ont violé des femmes dans Sion,
  - type: text
    content: des jeunes filles dans les villes de Juda.
  '12':
  - type: text
    content: Des chefs ont été pendus par les mains,
  - type: text
    content: la personne des anciens n'a pas été respectée.
  '13':
  - type: text
    content: Des jeunes hommes ont dû porter la pierre à moudre,
  - type: text
    content: des enfants ont trébuché sous des fardeaux de bois.
  '14':
  - type: text
    content: Les anciens ont déserté les portes de la ville,
  - type: text
    content: les jeunes hommes ont arrêté de chanter.
  '15':
  - type: text
    content: La joie a disparu de notre cœur,
  - type: text
    content: le deuil a remplacé nos danses.
  '16':
  - type: text
    content: La couronne qui était sur notre tête est tombée.
  - type: text
    content: Malheur à nous, parce que nous avons péché!
  '17':
  - type: text
    content: Si notre cœur est souffrant,
  - type: text
    content: si nos yeux sont obscurcis,
  '18':
  - type: text
    content: c'est parce que le mont Sion est dévasté
  - type: text
    content: et que les renards y rôdent.
  '19':
  - type: text
    content: Toi, Eternel, tu règnes pour toujours,
  - type: text
    content: ton trône subsiste de génération en génération.
  '2':
  - type: text
    content: Notre héritage est passé à des étrangers,
  - type: text
    content: nos maisons sont passées à des inconnus.
  '20':
  - type: text
    content: Pourquoi nous oublier définitivement,
  - type: text
    content: nous abandonner pendant si longtemps?
  '21':
  - type: text
    content: Fais-nous revenir vers toi, Eternel, et nous reviendrons!
  - type: text
    content: Donne-nous encore des jours pareils à ceux du passé!
  '22':
  - type: text
    content: Nous aurais-tu entièrement rejetés?
  - type: text
    content: Serais-tu irrité contre nous à l'excès?
  '3':
  - type: text
    content: Nous sommes devenus orphelins, privés de père;
  - type: text
    content: nos mères sont comme des veuves.
  '4':
  - type: text
    content: Notre eau, nous devons la payer pour la boire;
  - type: text
    content: notre bois, nous devons l'acheter pour pouvoir en disposer.
  '5':
  - type: text
    content: Ceux qui nous persécutent sont sur notre dos.
  - type: text
    content: Nous sommes épuisés, nous n'avons pas de repos.
  '6':
  - type: text
    content: Nous avons tendu la main vers l'Egypte,
  - type: text
    content: vers l'Assyrie, pour manger à notre faim.
  '7':
  - type: text
    content: Nos pères ont péché, ils ne sont plus là,
  - type: text
    content: et c'est nous qui supportons les conséquences de leurs fautes.
  '8':
  - type: text
    content: Des esclaves dominent sur nous
  - type: text
    content: et il n'y a personne pour nous arracher à leur pouvoir.
  '9':
  - type: text
    content: Nous risquons notre vie pour chercher de la nourriture
  - type: text
    content: à cause des attaques provenant du désert.
