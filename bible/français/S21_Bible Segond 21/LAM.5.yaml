document_id: LAM.5
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Après la prise de Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Souviens-toi, Eternel, de ce qui nous est arrivé!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Regarde, vois notre honte!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Notre héritage est passé à des étrangers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nos maisons sont passées à des inconnus.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Nous sommes devenus orphelins, privés de père;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nos mères sont comme des veuves.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Notre eau, nous devons la payer pour la boire;
- type: usfm
  marker: q1
  children:
  - type: text
    text: notre bois, nous devons l'acheter pour pouvoir en disposer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ceux qui nous persécutent sont sur notre dos.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous sommes épuisés, nous n'avons pas de repos.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Nous avons tendu la main vers l'Egypte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vers l'Assyrie, pour manger à notre faim.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Nos pères ont péché, ils ne sont plus là,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et c'est nous qui supportons les conséquences de leurs fautes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Des esclaves dominent sur nous
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il n'y a personne pour nous arracher à leur pouvoir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Nous risquons notre vie pour chercher de la nourriture
- type: usfm
  marker: q1
  children:
  - type: text
    text: à cause des attaques provenant du désert.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Notre peau est bouillante comme un four
- type: usfm
  marker: q1
  children:
  - type: text
    text: à cause des brûlures de la faim.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ils ont violé des femmes dans Sion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: des jeunes filles dans les villes de Juda.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Des chefs ont été pendus par les mains,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la personne des anciens n'a pas été respectée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Des jeunes hommes ont dû porter la pierre à moudre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: des enfants ont trébuché sous des fardeaux de bois.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Les anciens ont déserté les portes de la ville,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les jeunes hommes ont arrêté de chanter.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: La joie a disparu de notre cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le deuil a remplacé nos danses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: La couronne qui était sur notre tête est tombée.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Malheur à nous, parce que nous avons péché!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Si notre cœur est souffrant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si nos yeux sont obscurcis,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: c'est parce que le mont Sion est dévasté
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que les renards y rôdent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Toi, Eternel, tu règnes pour toujours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ton trône subsiste de génération en génération.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Pourquoi nous oublier définitivement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nous abandonner pendant si longtemps?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Fais-nous revenir vers toi, Eternel, et nous reviendrons!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Donne-nous encore des jours pareils à ceux du passé!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Nous aurais-tu entièrement rejetés?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Serais-tu irrité contre nous à l'excès?
