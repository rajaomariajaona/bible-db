document_id: GEN.10
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Descendance des fils de Noé
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Voici la lignée des fils de Noé, Sem, Cham et Japhet. Ils eurent des fils après le déluge.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Les fils de Japhet furent Gomer, Magog, Madaï, Javan, Tubal, Méshec et Tiras. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Les fils de Gomer: Ashkenaz, Riphat et Togarma. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Les fils de Javan: Elisha, Tarsis, Kittim et Dodanim. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ce sont eux qui ont peuplé les îles des nations, répartis par territoire d'après leur langue, groupés par clan dans leurs nations.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Les fils de Cham furent Cush, Mitsraïm, Puth et Canaan.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Les fils de Cush: Saba, Havila, Sabta, Raema et Sabteca. Les fils de Raema: Séba et Dedan. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Cush eut aussi pour fils Nimrod, qui fut le premier homme puissant sur la terre. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il fut un puissant chasseur devant l''Eternel, c''est pourquoi l''on dit: «Comme Nimrod, puissant chasseur devant l''Eternel.» '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il régna d''abord sur Babel, Erec, Accad et Calné, dans le pays de Shinear. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'C''est de ce pays-là que sortit Assur. Il construisit Ninive, Rehoboth-Hir, Calach '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: et Résen entre Ninive et Calach, la grande ville.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mitsraïm eut pour descendants les Ludim, les Anamim, les Lehabim, les Naphtuhim, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: les Patrusim, les Casluhim, dont sont issus les Philistins, et les Caphtorim.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Canaan eut pour descendants Sidon, son fils aîné, et Heth, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'ainsi que les Jébusiens, les Amoréens, les Guirgasiens, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'les Héviens, les Arkiens, les Siniens, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'les Arvadiens, les Tsemariens, les Hamathiens. Ensuite, les clans des Cananéens se dispersèrent. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Le territoire des Cananéens allait de Sidon, du côté de Guérar jusqu''à Gaza, et du côté de Sodome, de Gomorrhe, d''Adma et de Tseboïm jusqu''à Lésha. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Voilà quels sont les fils de Cham, groupés par clan et par langue dans leurs territoires et leurs nations.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Le frère aîné de Japhet, Sem, eut aussi des fils. Il fut l''ancêtre de tous les descendants d''Héber. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Les fils de Sem furent Elam, Assur, Arpacshad, Lud et Aram. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Les fils d''Aram: Uts, Hul, Guéter et Mash. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Arpacshad eut pour fils Shélach et Shélach eut Héber. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Héber eut deux fils. Le nom de l''un était Péleg, parce que c''est à son époque que la terre fut partagée, et celui de son frère était Jokthan. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Jokthan eut pour fils Almodad, Shéleph, Hatsarmaveth, Jérach, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Hadoram, Uzal, Dikla, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Obal, Abimaël, Séba, '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ophir, Havila et Jobab. Tous ceux-là furent les fils de Jokthan. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ils habitèrent depuis Mésha jusqu''à Sephar, la montagne de l''est. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Voilà quels sont les fils de Sem, groupés par clan et par langue dans leurs territoires et leurs nations.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Tels sont les clans des fils de Noé en fonction de leur lignée avec leurs nations. C'est d'eux que sont issues les nations qui se sont dispersées sur la terre après le déluge.
