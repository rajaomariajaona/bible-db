document_id: 2CH.20
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Victoires de Josaphat
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Après cela, les Moabites et les Ammonites, accompagnés de Maonites, marchèrent contre Josaphat pour lui faire la guerre. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'On vint annoncer à Josaphat: «Une foule nombreuse s''avance contre toi depuis l''autre côté de la mer, depuis la Syrie, et ils sont déjà à Hatsatson-Thamar, c''est-à-dire En-Guédi.» '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Josaphat eut peur et décida de chercher l''Eternel. Il proclama un jeûne pour tout Juda. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Les Judéens se rassemblèrent pour supplier l'Eternel; c'est même de toutes les villes de Juda que l'on vint pour chercher l'Eternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Josaphat se tint debout au milieu de l''assemblée de Juda et de Jérusalem, dans la maison de l''Eternel, devant le nouveau parvis, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'et dit: «Eternel, Dieu de nos ancêtres, n''est-ce pas toi qui es Dieu dans le ciel et n''est-ce pas toi qui domines sur tous les royaumes des nations? N''est-ce pas toi qui détiens la force et la puissance, toi à qui personne ne peut résister? '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'N''est-ce pas toi, notre Dieu, qui as dépossédé les habitants de ce pays devant ton peuple, devant Israël, et qui l''as donné pour toujours à la descendance d''Abraham, ton ami? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ils l''ont habité et ils t''y ont construit un sanctuaire en l''honneur de ton nom en disant: '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '‘Si un malheur nous atteint – que ce soit l''épée, le jugement, la peste ou la famine – nous nous présenterons devant ce temple et devant toi, car ton nom réside dans cette maison. Nous crierons à toi du fond de notre détresse, et tu nous écouteras et nous sauveras!’ '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Voici maintenant les Ammonites et les Moabites ainsi que les habitants de la région montagneuse de Séir. Tu n''as pas permis aux Israélites de pénétrer sur leur territoire quand ils venaient d''Egypte et, en effet, ils ont fait un détour et ne les ont pas détruits. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Les voici qui nous récompensent en venant nous chasser de ton héritage, celui que tu nous as donné! '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Notre Dieu, ne vas-tu pas les juger? En effet, nous sommes sans force devant cette foule nombreuse qui vient nous attaquer et nous ne savons que faire, mais nos yeux sont sur toi.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tous les Judéens se tenaient debout devant l''Eternel, y compris leurs jeunes enfants, leurs femmes et leurs fils. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Alors l''Esprit de l''Eternel reposa, au milieu de l''assemblée, sur Jachaziel, fils de Zacharie et descendant de Benaja, Jeïel et Matthania. C''était un Lévite, un descendant d''Asaph. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Jachaziel dit: «Soyez attentifs, vous tous, Judéens et habitants de Jérusalem, et toi, roi Josaphat! Voici ce que vous dit l''Eternel: ‘N''ayez pas peur et ne vous laissez pas effrayer devant cette foule nombreuse, car ce ne sera pas vous qui combattrez, ce sera Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Demain, descendez contre eux. Ils vont monter par la colline de Tsits et vous les rencontrerez à l''extrémité de la vallée, en face du désert de Jeruel. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Vous n'aurez pas à mener ce combat. Prenez position, tenez-vous là et vous verrez la délivrance que l'Eternel vous accordera.’ Juda et Jérusalem, n'ayez pas peur et ne vous laissez pas effrayer! Demain, sortez à leur rencontre et l'Eternel sera avec vous.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Josaphat s''inclina, le visage contre terre, et tous les Judéens et les habitants de Jérusalem tombèrent devant l''Eternel pour l''adorer. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Les Lévites qui faisaient partie des Kehathites et des Koréites se levèrent pour louer d'une voix très forte l'Eternel, le Dieu d'Israël.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Le lendemain, ils se levèrent tôt et partirent pour le désert de Tekoa. Au moment de leur départ, Josaphat se tint debout et dit: «Ecoutez-moi, Judéens et habitants de Jérusalem! Ayez confiance en l''Eternel, votre Dieu, et vous serez affermis. Ayez confiance en ses prophètes et vous réussirez.» '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Puis, en accord avec le peuple, il désigna des musiciens qui, couverts d''ornements sacrés, célébraient l''Eternel tout en marchant devant l''armée et disaient: «Louez l''Eternel! Oui, sa bonté dure éternellement!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Au moment où l''on commençait les chants et les louanges, l''Eternel plaça une embuscade contre les Ammonites, les Moabites et les habitants de la région montagneuse de Séir qui étaient venus contre Juda, et ils furent battus. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Les Ammonites et les Moabites se dressèrent contre les habitants de la région montagneuse de Séir pour les vouer à la destruction et les exterminer; et, quand ils en eurent fini avec les habitants de Séir, ils s'aidèrent mutuellement à se détruire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Lorsque les Judéens furent arrivés à un point de vue donnant sur le désert, ils regardèrent du côté de la foule et constatèrent que ce n''était plus que cadavres tombés à terre. Il n''y avait aucun rescapé. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Josaphat et son peuple allèrent piller leurs dépouilles; ils trouvèrent en abondance parmi eux des richesses, des habits et des objets précieux et ils en ramassèrent tant qu'ils ne purent tout emporter. Ils mirent 3 jours pour procéder au pillage du butin, car il était considérable.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Le quatrième jour, ils se rassemblèrent dans la vallée de Beraca. Ils y bénirent l''Eternel, c''est pourquoi ils appelèrent cet endroit vallée de Beraca, nom qui lui est resté jusqu''à aujourd''hui. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Tous les hommes de Juda et de Jérusalem, avec Josaphat à leur tête, repartirent joyeux à Jérusalem, car l''Eternel les avait remplis de joie en les délivrant de leurs ennemis. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ils entrèrent à Jérusalem et dans la maison de l'Eternel au son des luths, des harpes et des trompettes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'La terreur de Dieu s''empara de tous les royaumes des autres pays lorsqu''ils apprirent que l''Eternel avait combattu contre les ennemis d''Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ainsi, le royaume de Josaphat fut tranquille et son Dieu lui donna du repos de tous les côtés.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Résumé du règne de Josaphat
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Josaphat régna sur Juda. Il avait 35 ans lorsqu'il devint roi et il régna 25 ans à Jérusalem. Sa mère s'appelait Azuba et c'était la fille de Shilchi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Il marcha sur la voie de son père Asa. Il ne s''en écarta pas, faisant ce qui est droit aux yeux de l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Toutefois, les hauts lieux ne disparurent pas et le peuple n'avait pas encore le cœur fermement attaché au Dieu de ses ancêtres.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Le reste des actes de Josaphat, des premiers aux derniers, est décrit dans les mémoires de Jéhu, fils de Hanani, qui sont insérés dans les annales des rois d'Israël.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Après cela, Josaphat, roi de Juda, s''associa avec le roi d''Israël, Achazia, qui avait une conduite coupable. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Il s''associa avec lui pour construire des bateaux long-courriers et ils firent ces bateaux à Etsjon-Guéber. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Alors Eliézer, fils de Dodava, de Marésha, prophétisa contre Josaphat en disant: «Parce que tu t''es associé avec Achazia, l''Eternel détruit ce que tu as fait.» Les bateaux furent brisés et ne purent atteindre leur lointaine destination.'
