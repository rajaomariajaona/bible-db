document_id: PSA.144,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Prière pour la libération du peuple
  - type: text
    content: De David.
  - type: text
    content: Béni soit l'Eternel, mon rocher,
  - type: text
    content: qui exerce mes mains pour le combat,
  - type: text
    content: mes doigts pour la bataille.
  '10':
  - type: text
    content: Toi qui donnes la victoire aux rois,
  - type: text
    content: qui sauves ton serviteur David de l'épée meurtrière,
  '11':
  - type: text
    content: délivre-moi, sauve-moi des étrangers
  - type: text
    content: dont la bouche est menteuse et la main droite parjure!
  '12':
  - type: text
    content: Ainsi nos fils seront comme des plantes
  - type: text
    content: qui poussent dans leur jeunesse,
  - type: text
    content: nos filles ressembleront aux colonnes sculptées
  - type: text
    content: qui font l'ornement des palais.
  '13':
  - type: text
    content: Nos greniers seront pleins,
  - type: text
    content: ils regorgeront de toutes sortes de provisions.
  - type: text
    content: Nos troupeaux se multiplieront par milliers,
  - type: text
    content: par dizaines de milliers, dans nos campagnes,
  '14':
  - type: text
    content: nos bœufs seront bien gros.
  - type: text
    content: Pas de brèche dans nos murs ni de déportation,
  - type: text
    content: pas de cris dans nos rues!
  '15':
  - type: text
    content: Heureux le peuple comblé de ces bienfaits,
  - type: text
    content: heureux le peuple dont l'Eternel est le Dieu!
  '2':
  - type: text
    content: Il est mon bienfaiteur et ma forteresse,
  - type: text
    content: mon refuge et mon libérateur.
  - type: text
    content: 'Il est mon bouclier: c''est en lui que je me réfugie.'
  - type: text
    content: Il me soumet mon peuple.
  '3':
  - type: text
    content: Eternel, qu'est-ce que l'homme pour que tu le connaisses,
  - type: text
    content: le fils de l'homme pour que tu penses à lui?
  '4':
  - type: text
    content: L'homme est pareil à un souffle,
  - type: text
    content: sa vie passe comme une ombre.
  '5':
  - type: text
    content: Eternel, incline ton ciel et descends,
  - type: text
    content: touche les montagnes, et qu'elles soient fumantes!
  '6':
  - type: text
    content: Fais briller les éclairs, disperse mes ennemis,
  - type: text
    content: lance tes flèches et mets-les en déroute!
  '7':
  - type: text
    content: Interviens d'en haut, délivre-moi,
  - type: text
    content: sauve-moi des grandes eaux, des étrangers
  '8':
  - type: text
    content: dont la bouche est menteuse
  - type: text
    content: et la main droite
  - type: note
    content: 'La main droite: celle que l''on a levée pour faire un serment.'
  - type: text
    content: ' parjure!'
  '9':
  - type: text
    content: O Dieu, je chanterai en ton honneur un cantique nouveau,
  - type: text
    content: je te célébrerai sur le luth à dix cordes.
