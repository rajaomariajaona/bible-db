document_id: PSA.144
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prière pour la libération du peuple
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: De David.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Béni soit l'Eternel, mon rocher,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui exerce mes mains pour le combat,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mes doigts pour la bataille.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Il est mon bienfaiteur et ma forteresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mon refuge et mon libérateur.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Il est mon bouclier: c''est en lui que je me réfugie.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il me soumet mon peuple.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Eternel, qu'est-ce que l'homme pour que tu le connaisses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le fils de l'homme pour que tu penses à lui?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: L'homme est pareil à un souffle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sa vie passe comme une ombre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Eternel, incline ton ciel et descends,
- type: usfm
  marker: q1
  children:
  - type: text
    text: touche les montagnes, et qu'elles soient fumantes!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fais briller les éclairs, disperse mes ennemis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: lance tes flèches et mets-les en déroute!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Interviens d'en haut, délivre-moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sauve-moi des grandes eaux, des étrangers
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: dont la bouche est menteuse
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la main droite
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '144.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'La main droite: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: celle que l'on a levée pour faire un serment.
    marker-yv: yv-n
  - type: text
    text: ' parjure!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: O Dieu, je chanterai en ton honneur un cantique nouveau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je te célébrerai sur le luth à dix cordes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Toi qui donnes la victoire aux rois,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui sauves ton serviteur David de l'épée meurtrière,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: délivre-moi, sauve-moi des étrangers
- type: usfm
  marker: q1
  children:
  - type: text
    text: dont la bouche est menteuse et la main droite parjure!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ainsi nos fils seront comme des plantes
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui poussent dans leur jeunesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nos filles ressembleront aux colonnes sculptées
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui font l'ornement des palais.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Nos greniers seront pleins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils regorgeront de toutes sortes de provisions.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nos troupeaux se multiplieront par milliers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: par dizaines de milliers, dans nos campagnes,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: nos bœufs seront bien gros.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pas de brèche dans nos murs ni de déportation,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pas de cris dans nos rues!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Heureux le peuple comblé de ces bienfaits,
- type: usfm
  marker: q1
  children:
  - type: text
    text: heureux le peuple dont l'Eternel est le Dieu!
