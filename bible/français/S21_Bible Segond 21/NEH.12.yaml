document_id: NEH.12,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Recensement des prêtres et des Lévites
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Voici les prêtres et les Lévites qui étaient revenus de déportation avec Zorobabel, fils de Shealthiel, et avec Josué: Seraja, Jérémie, Esdras, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Josué a eu pour fils Jojakim, Jojakim a eu Eliashib, Eliashib a eu Jojada, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Jojada a eu pour fils Jonathan et Jonathan a eu Jaddua.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Voici les prêtres qui étaient chefs de famille à l''époque de Jojakim: pour la famille de Seraja, Meraja; pour celle de Jérémie, Hanania; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'pour celle d''Esdras, Meshullam; pour celle d''Amaria, Jochanan; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'pour celle de Melikou, Jonathan; pour celle de Shebania, Joseph; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'pour celle de Harim, Adna; pour celle de Merajoth, Helkaï; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'pour celle d''Iddo, Zacharie; pour celle de Guinnethon, Meshullam; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'pour celle d''Abija, Zicri; pour celle de Minjamin et Moadia, Pilthaï; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'pour celle de Bilga, Shammua; pour celle de Shemaeja, Jonathan; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'pour celle de Jojarib, Matthnaï; pour celle de Jedaeja, Uzzi; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Amaria, Malluc, Hattush, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'pour celle de Sallaï, Kallaï; pour celle d''Amok, Eber; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: pour celle de Hilkija, Hashabia; pour celle de Jedaeja, Nathanaël.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Sous le règne de Darius le Perse, on a enregistré par écrit le nom des Lévites qui étaient chefs de famille à l''époque d''Eliashib, de Jojada, de Jochanan et de Jaddua, de même que celui des prêtres. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Le nom des Lévites chefs de famille a été inscrit dans les annales jusqu''à l''époque de Jochanan, descendant d''Eliashib. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Les chefs des Lévites Hashabia, Shérébia et Josué, fils de Kadmiel, ainsi que leurs frères qui les assistaient, étaient chargés de louer et célébrer l''Eternel à tour de rôle, suivant l''ordre de David, l''homme de Dieu. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Matthania, Bakbukia, Abdias, Meshullam, Thalmon et Akkub, qui étaient portiers, avaient la charge des provisions situées près des portes, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: et ce à l'époque de Jojakim, le fils de Josué et petit-fils de Jotsadak, ainsi qu'à celle du gouverneur Néhémie et du prêtre et scribe Esdras.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dédicace de la muraille de Jérusalem
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Au moment de la dédicace de la muraille de Jérusalem, on est allé chercher les Lévites, où qu''ils habitent, et on les a fait venir à Jérusalem afin de célébrer la dédicace dans une fête joyeuse, avec des chants de louange, au son des cymbales, des luths et des harpes. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Les membres des chorales se sont rassemblés, venus de la plaine qui entoure Jérusalem, des villages des Nethophathiens, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'de Beth-Guilgal ainsi que du territoire de Guéba et d''Azmaveth. En effet, les musiciens s''étaient construit des villages autour de Jérusalem. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Shecania, Rehum, Merémoth, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Les prêtres et les Lévites se sont purifiés eux-mêmes, puis ils ont purifié le peuple, les portes et la muraille.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'J''ai fait monter les chefs de Juda sur la muraille et j''ai mis en place deux grands chœurs avec leur cortège. Le premier s''est mis en marche du côté droit de la muraille, vers la porte du fumier. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Derrière lui marchaient Hosée et la moitié des chefs de Juda, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Azaria, Esdras, Meshullam, '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Juda, Benjamin, Shemaeja et Jérémie, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'ainsi que, parmi les prêtres munis de trompettes, Zacharie, fils de Jonathan et descendant de Shemaeja, Matthania, Michée, Zaccur et Asaph, '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'avec ses frères Shemaeja, Azareel, Milalaï, Guilalaï, Maaï, Nathanaël, Juda et Hanani qui jouaient des instruments de musique de David, l''homme de Dieu. Le scribe Esdras marchait à leur tête. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'A la porte de la source, ils ont gravi droit devant eux, par les marches de la ville de David, la montée de la muraille qui surplombe le palais de David, poursuivant leur chemin jusqu''à la porte des eaux, située à l''est. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Le deuxième chœur a pris la direction opposée. Je marchais moi-même derrière lui avec l''autre moitié du peuple, sur la muraille. Passant au-dessus de la tour des fours, il est allé jusqu''à la muraille large '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'et a poursuivi son chemin au-dessus de la porte d''Ephraïm, de la vieille porte, de la porte des poissons, de la tour de Hananeel et de la tour de Méa jusqu''à la porte des brebis, avant de s''arrêter à la porte de la prison. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Iddo, Guinnethoï, Abija, '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Puis les deux chœurs ont pris place dans la maison de Dieu, et j''ai fait de même avec ceux des magistrats qui m''accompagnaient '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'ainsi que les prêtres Eliakim, Maaséja, Minjamin, Michée, Eljoénaï, Zacharie, Hanania, munis de trompettes, '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: et Maaséja, Shemaeja, Eléazar, Uzzi, Jochanan, Malkija, Elam et Ezer. Les musiciens se sont alors fait entendre, sous la direction de Jizrachja.
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: Ce jour-là, les Israélites ont offert de nombreux sacrifices et se sont livrés à des réjouissances, car Dieu leur avait donné un grand sujet de joie. Même les femmes et les enfants se sont livrés aux réjouissances, et l'on a entendu de loin les cris de joie de Jérusalem.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Revenus des serviteurs du temple
    marker-yv: yv-h
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'C''est à ce moment-là qu''on a désigné des hommes pour la surveillance des salles destinées à l''entreposage des offrandes, des premières récoltes et des dîmes et on les a chargés d''y rassembler les parts accordées par la loi aux prêtres et aux Lévites au nom des divers territoires. En effet, Juda se réjouissait de ce que les prêtres et les Lévites étaient à leur poste, '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'assurant le service de leur Dieu et des purifications. Quant aux musiciens et aux portiers, ils respectaient l''ordre laissé par David et par son fils Salomon. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'En effet, à l''époque de David et d''Asaph déjà, cela faisait bien longtemps, il y avait des chefs de musiciens ainsi que des chants de louange et de reconnaissance en l''honneur de Dieu. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: A l'époque de Zorobabel comme à celle de Néhémie, tout Israël faisait don des parts journalières destinées aux musiciens et aux portiers; il donnait aussi aux Lévites les éléments consacrés, et les Lévites les redistribuaient aux descendants d'Aaron.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Mijamin, Maadia, Bilga, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Shemaeja, Jojarib, Jedaeja, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Sallu, Amok, Hilkija et Jedaeja. Ceux-ci étaient les chefs des prêtres et de leurs frères à l''époque de Josué. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Pour les Lévites, il y avait Josué, Binnuï, Kadmiel, Shérébia, Juda, Matthania, qui était responsable des chants de louange avec ses frères, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ainsi que Bakbukia et Unni, leurs frères, qui les assistaient en fonction de leurs responsabilités.
