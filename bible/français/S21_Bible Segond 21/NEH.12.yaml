document_id: NEH.12,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Recensement des prêtres et des Lévites
  - type: text
    content: 'Voici les prêtres et les Lévites qui étaient revenus de déportation avec Zorobabel, fils de Shealthiel, et avec Josué: Seraja, Jérémie, Esdras, '
  '10':
  - type: text
    content: 'Josué a eu pour fils Jojakim, Jojakim a eu Eliashib, Eliashib a eu Jojada, '
  '11':
  - type: text
    content: Jojada a eu pour fils Jonathan et Jonathan a eu Jaddua.
  '12':
  - type: text
    content: 'Voici les prêtres qui étaient chefs de famille à l''époque de Jojakim: pour la famille de Seraja, Meraja; pour celle de Jérémie, Hanania; '
  '13':
  - type: text
    content: 'pour celle d''Esdras, Meshullam; pour celle d''Amaria, Jochanan; '
  '14':
  - type: text
    content: 'pour celle de Melikou, Jonathan; pour celle de Shebania, Joseph; '
  '15':
  - type: text
    content: 'pour celle de Harim, Adna; pour celle de Merajoth, Helkaï; '
  '16':
  - type: text
    content: 'pour celle d''Iddo, Zacharie; pour celle de Guinnethon, Meshullam; '
  '17':
  - type: text
    content: 'pour celle d''Abija, Zicri; pour celle de Minjamin et Moadia, Pilthaï; '
  '18':
  - type: text
    content: 'pour celle de Bilga, Shammua; pour celle de Shemaeja, Jonathan; '
  '19':
  - type: text
    content: 'pour celle de Jojarib, Matthnaï; pour celle de Jedaeja, Uzzi; '
  '2':
  - type: text
    content: 'Amaria, Malluc, Hattush, '
  '20':
  - type: text
    content: 'pour celle de Sallaï, Kallaï; pour celle d''Amok, Eber; '
  '21':
  - type: text
    content: pour celle de Hilkija, Hashabia; pour celle de Jedaeja, Nathanaël.
  '22':
  - type: text
    content: 'Sous le règne de Darius le Perse, on a enregistré par écrit le nom des Lévites qui étaient chefs de famille à l''époque d''Eliashib, de Jojada, de Jochanan et de Jaddua, de même que celui des prêtres. '
  '23':
  - type: text
    content: 'Le nom des Lévites chefs de famille a été inscrit dans les annales jusqu''à l''époque de Jochanan, descendant d''Eliashib. '
  '24':
  - type: text
    content: 'Les chefs des Lévites Hashabia, Shérébia et Josué, fils de Kadmiel, ainsi que leurs frères qui les assistaient, étaient chargés de louer et célébrer l''Eternel à tour de rôle, suivant l''ordre de David, l''homme de Dieu. '
  '25':
  - type: text
    content: 'Matthania, Bakbukia, Abdias, Meshullam, Thalmon et Akkub, qui étaient portiers, avaient la charge des provisions situées près des portes, '
  '26':
  - type: text
    content: et ce à l'époque de Jojakim, le fils de Josué et petit-fils de Jotsadak, ainsi qu'à celle du gouverneur Néhémie et du prêtre et scribe Esdras.
  - type: heading
    content: Dédicace de la muraille de Jérusalem
  '27':
  - type: text
    content: 'Au moment de la dédicace de la muraille de Jérusalem, on est allé chercher les Lévites, où qu''ils habitent, et on les a fait venir à Jérusalem afin de célébrer la dédicace dans une fête joyeuse, avec des chants de louange, au son des cymbales, des luths et des harpes. '
  '28':
  - type: text
    content: 'Les membres des chorales se sont rassemblés, venus de la plaine qui entoure Jérusalem, des villages des Nethophathiens, '
  '29':
  - type: text
    content: 'de Beth-Guilgal ainsi que du territoire de Guéba et d''Azmaveth. En effet, les musiciens s''étaient construit des villages autour de Jérusalem. '
  '3':
  - type: text
    content: 'Shecania, Rehum, Merémoth, '
  '30':
  - type: text
    content: Les prêtres et les Lévites se sont purifiés eux-mêmes, puis ils ont purifié le peuple, les portes et la muraille.
  '31':
  - type: text
    content: 'J''ai fait monter les chefs de Juda sur la muraille et j''ai mis en place deux grands chœurs avec leur cortège. Le premier s''est mis en marche du côté droit de la muraille, vers la porte du fumier. '
  '32':
  - type: text
    content: 'Derrière lui marchaient Hosée et la moitié des chefs de Juda, '
  '33':
  - type: text
    content: 'Azaria, Esdras, Meshullam, '
  '34':
  - type: text
    content: 'Juda, Benjamin, Shemaeja et Jérémie, '
  '35':
  - type: text
    content: 'ainsi que, parmi les prêtres munis de trompettes, Zacharie, fils de Jonathan et descendant de Shemaeja, Matthania, Michée, Zaccur et Asaph, '
  '36':
  - type: text
    content: 'avec ses frères Shemaeja, Azareel, Milalaï, Guilalaï, Maaï, Nathanaël, Juda et Hanani qui jouaient des instruments de musique de David, l''homme de Dieu. Le scribe Esdras marchait à leur tête. '
  '37':
  - type: text
    content: 'A la porte de la source, ils ont gravi droit devant eux, par les marches de la ville de David, la montée de la muraille qui surplombe le palais de David, poursuivant leur chemin jusqu''à la porte des eaux, située à l''est. '
  '38':
  - type: text
    content: 'Le deuxième chœur a pris la direction opposée. Je marchais moi-même derrière lui avec l''autre moitié du peuple, sur la muraille. Passant au-dessus de la tour des fours, il est allé jusqu''à la muraille large '
  '39':
  - type: text
    content: 'et a poursuivi son chemin au-dessus de la porte d''Ephraïm, de la vieille porte, de la porte des poissons, de la tour de Hananeel et de la tour de Méa jusqu''à la porte des brebis, avant de s''arrêter à la porte de la prison. '
  '4':
  - type: text
    content: 'Iddo, Guinnethoï, Abija, '
  '40':
  - type: text
    content: 'Puis les deux chœurs ont pris place dans la maison de Dieu, et j''ai fait de même avec ceux des magistrats qui m''accompagnaient '
  '41':
  - type: text
    content: 'ainsi que les prêtres Eliakim, Maaséja, Minjamin, Michée, Eljoénaï, Zacharie, Hanania, munis de trompettes, '
  '42':
  - type: text
    content: et Maaséja, Shemaeja, Eléazar, Uzzi, Jochanan, Malkija, Elam et Ezer. Les musiciens se sont alors fait entendre, sous la direction de Jizrachja.
  '43':
  - type: text
    content: Ce jour-là, les Israélites ont offert de nombreux sacrifices et se sont livrés à des réjouissances, car Dieu leur avait donné un grand sujet de joie. Même les femmes et les enfants se sont livrés aux réjouissances, et l'on a entendu de loin les cris de joie de Jérusalem.
  - type: heading
    content: Revenus des serviteurs du temple
  '44':
  - type: text
    content: 'C''est à ce moment-là qu''on a désigné des hommes pour la surveillance des salles destinées à l''entreposage des offrandes, des premières récoltes et des dîmes et on les a chargés d''y rassembler les parts accordées par la loi aux prêtres et aux Lévites au nom des divers territoires. En effet, Juda se réjouissait de ce que les prêtres et les Lévites étaient à leur poste, '
  '45':
  - type: text
    content: 'assurant le service de leur Dieu et des purifications. Quant aux musiciens et aux portiers, ils respectaient l''ordre laissé par David et par son fils Salomon. '
  '46':
  - type: text
    content: 'En effet, à l''époque de David et d''Asaph déjà, cela faisait bien longtemps, il y avait des chefs de musiciens ainsi que des chants de louange et de reconnaissance en l''honneur de Dieu. '
  '47':
  - type: text
    content: A l'époque de Zorobabel comme à celle de Néhémie, tout Israël faisait don des parts journalières destinées aux musiciens et aux portiers; il donnait aussi aux Lévites les éléments consacrés, et les Lévites les redistribuaient aux descendants d'Aaron.
  '5':
  - type: text
    content: 'Mijamin, Maadia, Bilga, '
  '6':
  - type: text
    content: 'Shemaeja, Jojarib, Jedaeja, '
  '7':
  - type: text
    content: 'Sallu, Amok, Hilkija et Jedaeja. Ceux-ci étaient les chefs des prêtres et de leurs frères à l''époque de Josué. '
  '8':
  - type: text
    content: 'Pour les Lévites, il y avait Josué, Binnuï, Kadmiel, Shérébia, Juda, Matthania, qui était responsable des chants de louange avec ses frères, '
  '9':
  - type: text
    content: ainsi que Bakbukia et Unni, leurs frères, qui les assistaient en fonction de leurs responsabilités.
