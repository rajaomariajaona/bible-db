document_id: ECC.12,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Souviens-toi de ton créateur durant ta jeunesse, avant l''arrivée des jours mauvais, avant d''atteindre les années où tu diras: «Je n''y prends aucun plaisir.» '
  '10':
  - type: text
    content: 'L''Ecclésiaste s''est efforcé de trouver des paroles agréables, des écrits pleins de droiture et des paroles vraies. '
  '11':
  - type: text
    content: 'Les paroles des sages sont comme des aiguillons et, rassemblées en un recueil, elles sont comme des clous plantés; elles sont données par un seul berger. '
  '12':
  - type: text
    content: Attention, mon fils, à ce qui pourrait y être ajouté! On n'en finirait pas, si l'on voulait faire un grand nombre de livres, et beaucoup d'étude fatigue le corps.
  '13':
  - type: text
    content: 'Ecoutons la conclusion de tout ce discours: «Crains Dieu et respecte ses commandements, car c''est ce que doit faire tout homme. '
  '14':
  - type: text
    content: En effet, Dieu amènera toute œuvre en jugement, et ce jugement portera sur tout ce qui est caché, que ce soit bon ou mauvais.»
  '2':
  - type: text
    content: 'C''est le moment où le soleil et la lumière, la lune et les étoiles s''obscurcissent, et où les nuages reviennent juste après la pluie. '
  '3':
  - type: text
    content: 'C''est l''époque où les gardiens de la maison tremblent, où les hommes forts se courbent, où celles qui broient interrompent leur tâche parce qu''elles sont trop peu nombreuses, où ceux qui regardent par les fenêtres s''obscurcissent. '
  '4':
  - type: text
    content: 'C''est l''époque où les deux battants de la porte se ferment sur la rue tandis que le bruit de la meule diminue, où l''on se lève au chant de l''oiseau, où toutes les chanteuses s''affaiblissent. '
  '5':
  - type: text
    content: C'est l'époque où l'on redoute ce qui est haut, où l'on a des terreurs en chemin, où l'amandier fleurit, où la sauterelle devient lourde et où la câpre n'a plus d'effet, car l'homme s'en va vers son habitation éternelle et les pleureurs parcourent les rues.
  - type: note
    content: Description de la vieillesse et de la déchéance physique à l'aide de métaphores.
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'Souviens-toi de ton créateur avant que le cordon d''argent ne se détache, que le vase d''or ne se brise, que la cruche ne se casse à la source et que la poulie ne tombe, rompue, dans le puits, '
  '7':
  - type: text
    content: avant que la poussière ne retourne à la terre, comme elle y était, et que l'esprit ne retourne à Dieu, celui qui l'a donné!
  '8':
  - type: text
    content: Comble de l'inconsistance, dit l'Ecclésiaste, tout n'est que fumée!
  - type: heading
    content: Crainte de Dieu et obéissance
  '9':
  - type: text
    content: 'L''Ecclésiaste n''a pas seulement été un sage, il a aussi enseigné la connaissance au peuple et il a examiné, recherché, mis en ordre un grand nombre de proverbes. '
