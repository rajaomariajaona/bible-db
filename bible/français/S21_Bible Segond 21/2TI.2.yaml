document_id: 2TI.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Conseils pour le service dans l'Eglise
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Toi donc, mon enfant, fortifie-toi dans la grâce qui est en Jésus-Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ce que tu as entendu de moi en présence de nombreux témoins, confie-le à des personnes fidèles qui soient capables de l''enseigner aussi à d''autres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Souffre [avec moi] comme un bon soldat de Jésus-Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Aucun soldat en service ne s''embarrasse des affaires de la vie courante s''il veut plaire à celui qui l''a recruté. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'L''athlète n''est pas couronné s''il n''a pas lutté en respectant les règles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Le cultivateur qui travaille dur doit être le premier à récolter les fruits. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Comprends ce que je dis, et que le Seigneur te donne en effet de l'intelligence en toute chose.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Souviens-toi de Jésus, le Messie ressuscité, issu de la descendance de David
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'David: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dieu avait promis à ce grand roi d'Israël qu'un de ses descendants aurait un trône éternel.
    marker-yv: yv-n
  - type: text
    text: ', conformément à l''Evangile que je prêche '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'et pour lequel je souffre au point d''être enchaîné comme un malfaiteur. Mais la parole de Dieu n''est pas enchaînée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: C'est pourquoi je supporte tout à cause de ceux qui ont été choisis, afin qu'eux aussi obtiennent le salut qui est en Jésus-Christ, avec la gloire éternelle.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Cette parole est certaine: si nous sommes morts avec lui, nous vivrons aussi avec lui; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'si nous persévérons, nous régnerons aussi avec lui; si nous le renions, lui aussi nous reniera; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: si nous sommes infidèles, lui reste fidèle, [car] il ne peut se renier lui-même.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Rappelle ces vérités aux croyants en les suppliant devant le Seigneur de ne pas se livrer à des disputes de mots: elles ne servent à rien, si ce n''est à la ruine de ceux qui écoutent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Efforce-toi de te présenter devant Dieu comme un homme qui a fait ses preuves, un ouvrier qui n'a pas à rougir mais qui expose avec droiture la parole de la vérité.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Evite les bavardages profanes, car ceux qui s''y livrent avanceront toujours plus dans l''impiété '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'et leur parole propagera son infection comme la gangrène. C''est le cas d''Hyménée et de Philète. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ils se sont détournés de la vérité en affirmant que la résurrection
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'La résurrection: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: celle des croyants. Ces hommes affirmaient probablement, à tort, que les chrétiens n'avaient pas à attendre de résurrection physique, puisqu'ils étaient déjà morts et ressuscités spirituellement avec Christ.
    marker-yv: yv-n
  - type: text
    text: ' est déjà arrivée, et ils ébranlent la foi de certains.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Cependant, les solides fondations posées par Dieu subsistent, porteuses de cette inscription: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Le Seigneur connaît ceux qui lui appartiennent
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le Seigneur… appartiennent: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Nombres 16.5
      metadata:
        usfm: NUM.16.5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' et: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Tout homme qui prononce le nom du Seigneur, qu'il se détourne du mal
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Tout homme… mal: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'reprise du '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psaume 97.10
      metadata:
        usfm: PSA.97.10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dans une grande maison, il n''y a pas seulement des ustensiles d''or et d''argent, mais il y en a aussi en bois et en terre. Les uns sont d''un usage noble, les autres d''un usage méprisable. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Si donc quelqu'un se purifie de ces choses, il sera un vase d'usage noble, saint, utile à son maître, prêt pour toute œuvre bonne.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fuis les passions de la jeunesse et recherche la justice, la foi, l''amour, la paix avec ceux qui font appel au Seigneur d''un cœur pur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Repousse les spéculations folles et stupides, sachant qu''elles font naître des conflits. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Or, il ne faut pas qu''un serviteur du Seigneur ait des conflits. Il doit au contraire être plein de bienveillance envers tous, capable d''enseigner et de supporter l''opposition. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Il doit corriger avec douceur les adversaires: peut-être Dieu leur donnera-t-il de changer d''attitude pour connaître la vérité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Revenus à leur bon sens, ils se dégageront alors des pièges du diable, qui s'est emparé d'eux pour les soumettre à sa volonté.
