document_id: 2TI.2,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Conseils pour le service dans l'Eglise
  - type: text
    content: 'Toi donc, mon enfant, fortifie-toi dans la grâce qui est en Jésus-Christ. '
  '10':
  - type: text
    content: C'est pourquoi je supporte tout à cause de ceux qui ont été choisis, afin qu'eux aussi obtiennent le salut qui est en Jésus-Christ, avec la gloire éternelle.
  '11':
  - type: text
    content: 'Cette parole est certaine: si nous sommes morts avec lui, nous vivrons aussi avec lui; '
  '12':
  - type: text
    content: 'si nous persévérons, nous régnerons aussi avec lui; si nous le renions, lui aussi nous reniera; '
  '13':
  - type: text
    content: si nous sommes infidèles, lui reste fidèle, [car] il ne peut se renier lui-même.
  '14':
  - type: text
    content: 'Rappelle ces vérités aux croyants en les suppliant devant le Seigneur de ne pas se livrer à des disputes de mots: elles ne servent à rien, si ce n''est à la ruine de ceux qui écoutent. '
  '15':
  - type: text
    content: Efforce-toi de te présenter devant Dieu comme un homme qui a fait ses preuves, un ouvrier qui n'a pas à rougir mais qui expose avec droiture la parole de la vérité.
  '16':
  - type: text
    content: 'Evite les bavardages profanes, car ceux qui s''y livrent avanceront toujours plus dans l''impiété '
  '17':
  - type: text
    content: 'et leur parole propagera son infection comme la gangrène. C''est le cas d''Hyménée et de Philète. '
  '18':
  - type: text
    content: Ils se sont détournés de la vérité en affirmant que la résurrection
  - type: note
    content: 'La résurrection: celle des croyants. Ces hommes affirmaient probablement, à tort, que les chrétiens n''avaient pas à attendre de résurrection physique, puisqu''ils étaient déjà morts et ressuscités spirituellement avec Christ.'
  - type: text
    content: ' est déjà arrivée, et ils ébranlent la foi de certains.'
  '19':
  - type: text
    content: 'Cependant, les solides fondations posées par Dieu subsistent, porteuses de cette inscription: '
  - type: text
    content: Le Seigneur connaît ceux qui lui appartiennent
  - type: note
    content: 'Le Seigneur… appartiennent: citation de Nombres 16.5.'
  - type: text
    content: ' et: '
  - type: text
    content: Tout homme qui prononce le nom du Seigneur, qu'il se détourne du mal
  - type: note
    content: 'Tout homme… mal: reprise du Psaume 97.10.'
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'Ce que tu as entendu de moi en présence de nombreux témoins, confie-le à des personnes fidèles qui soient capables de l''enseigner aussi à d''autres. '
  '20':
  - type: text
    content: 'Dans une grande maison, il n''y a pas seulement des ustensiles d''or et d''argent, mais il y en a aussi en bois et en terre. Les uns sont d''un usage noble, les autres d''un usage méprisable. '
  '21':
  - type: text
    content: Si donc quelqu'un se purifie de ces choses, il sera un vase d'usage noble, saint, utile à son maître, prêt pour toute œuvre bonne.
  '22':
  - type: text
    content: 'Fuis les passions de la jeunesse et recherche la justice, la foi, l''amour, la paix avec ceux qui font appel au Seigneur d''un cœur pur. '
  '23':
  - type: text
    content: 'Repousse les spéculations folles et stupides, sachant qu''elles font naître des conflits. '
  '24':
  - type: text
    content: 'Or, il ne faut pas qu''un serviteur du Seigneur ait des conflits. Il doit au contraire être plein de bienveillance envers tous, capable d''enseigner et de supporter l''opposition. '
  '25':
  - type: text
    content: 'Il doit corriger avec douceur les adversaires: peut-être Dieu leur donnera-t-il de changer d''attitude pour connaître la vérité. '
  '26':
  - type: text
    content: Revenus à leur bon sens, ils se dégageront alors des pièges du diable, qui s'est emparé d'eux pour les soumettre à sa volonté.
  '3':
  - type: text
    content: 'Souffre [avec moi] comme un bon soldat de Jésus-Christ. '
  '4':
  - type: text
    content: 'Aucun soldat en service ne s''embarrasse des affaires de la vie courante s''il veut plaire à celui qui l''a recruté. '
  '5':
  - type: text
    content: 'L''athlète n''est pas couronné s''il n''a pas lutté en respectant les règles. '
  '6':
  - type: text
    content: 'Le cultivateur qui travaille dur doit être le premier à récolter les fruits. '
  '7':
  - type: text
    content: Comprends ce que je dis, et que le Seigneur te donne en effet de l'intelligence en toute chose.
  '8':
  - type: text
    content: Souviens-toi de Jésus, le Messie ressuscité, issu de la descendance de David
  - type: note
    content: 'David: Dieu avait promis à ce grand roi d''Israël qu''un de ses descendants aurait un trône éternel.'
  - type: text
    content: ', conformément à l''Evangile que je prêche '
  '9':
  - type: text
    content: 'et pour lequel je souffre au point d''être enchaîné comme un malfaiteur. Mais la parole de Dieu n''est pas enchaînée. '
