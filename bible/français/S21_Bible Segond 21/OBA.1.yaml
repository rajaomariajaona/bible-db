document_id: OBA.1,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le jugement d'Edom et ses causes
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Vision d'Abdias.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici ce que dit le Seigneur, l''Eternel, sur Edom:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '*Nous avons appris une nouvelle de la part de l''Eternel'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et un messager a été envoyé parmi les nations:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Levez-vous! Dressons-nous contre Edom pour lui faire la guerre!»
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause de ta violence contre ton frère Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu seras couvert de honte
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu seras exterminé pour toujours.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le jour où tu te tenais en face de lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le jour où des inconnus emmenaient ses richesses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: où des étrangers entraient dans sa ville
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et se partageaient au sort Jérusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toi aussi tu étais comme l'un d'eux.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne regarde pas avec plaisir le jour de ton frère, le jour de son malheur!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne te réjouis pas aux dépens des Judéens le jour de leur ruine
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et n'ouvre pas une grande bouche le jour de la détresse!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N'entre pas dans la ville de mon peuple le jour de sa ruine!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne regarde pas son malheur avec plaisir le jour de sa ruine
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ne porte pas la main sur ses richesses le jour de sa ruine!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne te poste pas au carrefour pour exterminer ses fuyards
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ne livre pas ses rescapés le jour de la détresse!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le jour de l'Eternel
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, le jour de l'Eternel est proche pour toutes les nations.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'On te fera comme tu as fait:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tes actes retomberont sur ta tête.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tout comme vous avez bu sur ma montagne sainte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toutes les nations boiront sans cesse.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles boiront jusqu'à l'ivresse
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et elles seront comme si elles n'avaient jamais existé.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cependant, *il y aura des rescapés sur le mont Sion
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Il y aura… Sion: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'même texte en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Joël 3.5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ': il sera saint,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la famille de Jacob reprendra ses possessions.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La famille de Jacob sera un feu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la famille de Joseph une flamme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais la famille d'Esaü sera de la paille
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu'elles allumeront et brûleront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il ne restera rien de la famille d'Esaü,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car l'Eternel a parlé.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les habitants du Néguev
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Néguev: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: région désertique du sud de Juda.
      marker-yv: yv-n
    - type: text
      text: ' posséderont la montagne d''Esaü,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ceux de la plaine le pays des Philistins;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils posséderont le territoire d'Ephraïm et celui de Samarie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et Benjamin possédera Galaad.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je t'ai rendu petit parmi les nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu es l'objet du plus grand mépris.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les exilés, cette armée d'Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: posséderont le pays occupé par les Cananéens jusqu'à Sarepta,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les exilés de Jérusalem qui sont à Sepharad
  - type: usfm
    marker: q1
    children:
    - type: text
      text: posséderont les villes du Néguev.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des libérateurs monteront sur le mont Sion
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour juger la montagne d'Esaü,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et à l'Eternel appartiendra le règne.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'orgueil de ton cœur t'a égaré,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toi qui es installé dans le creux des rochers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toi qui habites sur les hauteurs
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et qui te dis: «Qui me fera tomber jusqu''à terre?»'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Même si tu places ton nid aussi haut que celui de l'aigle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: même si tu le places parmi les étoiles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je t'en ferai tomber, déclare l'Eternel.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1-4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Nous avons appris… déclare l''Eternel: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'texte similaire en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jérémie 49.14-16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si des voleurs, des pillards, viennent de nuit chez toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme te voilà dévasté!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne voleront-ils pas tout ce qu'ils peuvent?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '*Si des vendangeurs viennent chez toi,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: laisseront-ils de quoi grappiller?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Si des vendangeurs… grappiller: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'même texte en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jérémie 49.9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ah! comme Esaü
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Esaü: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: désignation des Edomites par le nom de leur ancêtre, qui était le frère de Jacob, l'ancêtre des Israélites.
      marker-yv: yv-n
    - type: text
      text: ' est fouillé!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme ses trésors cachés sont découverts!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous tes alliés t'ont chassé jusqu'à la frontière;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tes amis t'ont trompé, ils l'ont emporté sur toi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ceux qui mangeaient ton pain t'ont tendu un piège,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu n'as pas su t'en apercevoir!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce jour-là, déclare l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ferai disparaître d'Edom les sages,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et de la montagne d'Esaü l'intelligence.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes guerriers, Théman, seront dans une telle épouvante
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que tous les habitants de la montagne d'Esaü mourront dans le carnage.
