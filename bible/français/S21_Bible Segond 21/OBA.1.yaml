document_id: OBA.1,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Le jugement d'Edom et ses causes
  - type: text
    content: Vision d'Abdias.
  - type: text
    content: 'Voici ce que dit le Seigneur, l''Eternel, sur Edom:'
  - type: text
    content: '*Nous avons appris une nouvelle de la part de l''Eternel'
  - type: text
    content: 'et un messager a été envoyé parmi les nations:'
  - type: text
    content: «Levez-vous! Dressons-nous contre Edom pour lui faire la guerre!»
  '10':
  - type: text
    content: A cause de ta violence contre ton frère Jacob,
  - type: text
    content: tu seras couvert de honte
  - type: text
    content: et tu seras exterminé pour toujours.
  '11':
  - type: text
    content: Le jour où tu te tenais en face de lui,
  - type: text
    content: le jour où des inconnus emmenaient ses richesses,
  - type: text
    content: où des étrangers entraient dans sa ville
  - type: text
    content: et se partageaient au sort Jérusalem,
  - type: text
    content: toi aussi tu étais comme l'un d'eux.
  '12':
  - type: text
    content: Ne regarde pas avec plaisir le jour de ton frère, le jour de son malheur!
  - type: text
    content: Ne te réjouis pas aux dépens des Judéens le jour de leur ruine
  - type: text
    content: et n'ouvre pas une grande bouche le jour de la détresse!
  '13':
  - type: text
    content: N'entre pas dans la ville de mon peuple le jour de sa ruine!
  - type: text
    content: Ne regarde pas son malheur avec plaisir le jour de sa ruine
  - type: text
    content: et ne porte pas la main sur ses richesses le jour de sa ruine!
  '14':
  - type: text
    content: Ne te poste pas au carrefour pour exterminer ses fuyards
  - type: text
    content: et ne livre pas ses rescapés le jour de la détresse!
  - type: heading
    content: Le jour de l'Eternel
  '15':
  - type: text
    content: En effet, le jour de l'Eternel est proche pour toutes les nations.
  - type: text
    content: 'On te fera comme tu as fait:'
  - type: text
    content: tes actes retomberont sur ta tête.
  '16':
  - type: text
    content: Tout comme vous avez bu sur ma montagne sainte,
  - type: text
    content: toutes les nations boiront sans cesse.
  - type: text
    content: Elles boiront jusqu'à l'ivresse
  - type: text
    content: et elles seront comme si elles n'avaient jamais existé.
  '17':
  - type: text
    content: Cependant, *il y aura des rescapés sur le mont Sion
  - type: note
    content: 'Il y aura… Sion: même texte en Joël 3.5.'
  - type: text
    content: ': il sera saint,'
  - type: text
    content: et la famille de Jacob reprendra ses possessions.
  '18':
  - type: text
    content: La famille de Jacob sera un feu,
  - type: text
    content: et la famille de Joseph une flamme,
  - type: text
    content: mais la famille d'Esaü sera de la paille
  - type: text
    content: qu'elles allumeront et brûleront,
  - type: text
    content: et il ne restera rien de la famille d'Esaü,
  - type: text
    content: car l'Eternel a parlé.
  '19':
  - type: text
    content: Les habitants du Néguev
  - type: note
    content: 'Néguev: région désertique du sud de Juda.'
  - type: text
    content: ' posséderont la montagne d''Esaü,'
  - type: text
    content: et ceux de la plaine le pays des Philistins;
  - type: text
    content: ils posséderont le territoire d'Ephraïm et celui de Samarie,
  - type: text
    content: et Benjamin possédera Galaad.
  '2':
  - type: text
    content: Je t'ai rendu petit parmi les nations,
  - type: text
    content: tu es l'objet du plus grand mépris.
  '20':
  - type: text
    content: Les exilés, cette armée d'Israël,
  - type: text
    content: posséderont le pays occupé par les Cananéens jusqu'à Sarepta,
  - type: text
    content: et les exilés de Jérusalem qui sont à Sepharad
  - type: text
    content: posséderont les villes du Néguev.
  '21':
  - type: text
    content: Des libérateurs monteront sur le mont Sion
  - type: text
    content: pour juger la montagne d'Esaü,
  - type: text
    content: et à l'Eternel appartiendra le règne.
  '3':
  - type: text
    content: L'orgueil de ton cœur t'a égaré,
  - type: text
    content: toi qui es installé dans le creux des rochers,
  - type: text
    content: toi qui habites sur les hauteurs
  - type: text
    content: 'et qui te dis: «Qui me fera tomber jusqu''à terre?»'
  '4':
  - type: text
    content: Même si tu places ton nid aussi haut que celui de l'aigle,
  - type: text
    content: même si tu le places parmi les étoiles,
  - type: text
    content: je t'en ferai tomber, déclare l'Eternel.
  - type: note
    content: 'Nous avons appris… déclare l''Eternel: texte similaire en Jérémie 49.14-16.'
  '5':
  - type: text
    content: Si des voleurs, des pillards, viennent de nuit chez toi,
  - type: text
    content: comme te voilà dévasté!
  - type: text
    content: Ne voleront-ils pas tout ce qu'ils peuvent?
  - type: text
    content: '*Si des vendangeurs viennent chez toi,'
  - type: text
    content: laisseront-ils de quoi grappiller?
  - type: note
    content: 'Si des vendangeurs… grappiller: même texte en Jérémie 49.9.'
  '6':
  - type: text
    content: Ah! comme Esaü
  - type: note
    content: 'Esaü: désignation des Edomites par le nom de leur ancêtre, qui était le frère de Jacob, l''ancêtre des Israélites.'
  - type: text
    content: ' est fouillé!'
  - type: text
    content: Comme ses trésors cachés sont découverts!
  '7':
  - type: text
    content: Tous tes alliés t'ont chassé jusqu'à la frontière;
  - type: text
    content: tes amis t'ont trompé, ils l'ont emporté sur toi;
  - type: text
    content: ceux qui mangeaient ton pain t'ont tendu un piège,
  - type: text
    content: et tu n'as pas su t'en apercevoir!
  '8':
  - type: text
    content: Ce jour-là, déclare l'Eternel,
  - type: text
    content: je ferai disparaître d'Edom les sages,
  - type: text
    content: et de la montagne d'Esaü l'intelligence.
  '9':
  - type: text
    content: Tes guerriers, Théman, seront dans une telle épouvante
  - type: text
    content: que tous les habitants de la montagne d'Esaü mourront dans le carnage.
