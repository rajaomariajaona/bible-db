document_id: 1CH.20,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prise de Rabba
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''année suivante, à l''époque où les rois partent en campagne, Joab alla, à la tête d''une forte armée, semer la dévastation dans le pays des Ammonites et faire le siège de Rabba. Quant à David, il resta à Jérusalem. Joab battit Rabba et la détruisit. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David retira la couronne de la tête de son roi et il constata qu''elle était faite d''une trentaine de kilos d''or et qu''elle était garnie de pierres précieuses. On la mit sur la tête de David, qui emporta de la ville un très grand butin. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il déporta ses habitants et les affecta au maniement des scies, des pics de fer et des haches de fer. Il traita de la même manière toutes les villes des Ammonites. Puis David retourna à Jérusalem avec tout le peuple.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Exploits contre les Philistins
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Après cela, il y eut une bataille contre les Philistins à Guézer. C'est alors que Sibbecaï le Hushatite tua Sippaï, l'un des descendants des Rephaïm, et que les Philistins furent humiliés.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il y eut encore une bataille contre les Philistins. Elchanan, fils de Jaïr, y tua le frère de Goliath, Lachmi de Gath, qui avait une lance dont le bois avait la grosseur d'un cylindre de métier à tisser.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il y eut encore une bataille à Gath. Il s''y trouva un homme de haute taille, qui avait six doigts à chaque main et à chaque pied – 24 en tout – et qui était aussi un descendant de Rapha. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il lança un défi à Israël et Jonathan, fils de Shimea, le frère de David, le tua.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ces hommes étaient des descendants de Rapha qui habitaient à Gath. Ils tombèrent sous les coups de David et de ses serviteurs.
