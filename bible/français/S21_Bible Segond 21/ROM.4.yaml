document_id: ROM.4,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Exemples de justice par la foi dans l'Ancien Testament
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Que dirons-nous donc d''Abraham, notre ancêtre? Qu''a-t-il obtenu par ses propres efforts? '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand donc a-t-elle été portée à son compte? Etait-ce après ou avant sa circoncision? Ce n''était pas après sa circoncision, mais bien alors qu''il était incirconcis. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et il a reçu le signe de la circoncision comme le gage de la justice qu''il avait obtenue par la foi alors qu''il était incirconcis. Il est ainsi le père de tous les incirconcis qui croient, afin que la justice soit aussi portée à leur compte. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il est aussi le père des circoncis qui ne se contentent pas d'être circoncis mais qui marchent aussi sur les traces de la foi de notre ancêtre Abraham quand il était encore incirconcis.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, ce n''est pas par la loi que la promesse de recevoir le monde en héritage a été faite à Abraham ou à sa descendance, mais c''est par la justice de la foi, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: car si l'on devient héritier par la loi, la foi est dépourvue de sens et la promesse
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'La promesse: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: c'est-à-dire la promesse de Dieu.
      marker-yv: yv-n
    - type: text
      text: ' sans effets. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En fait, la loi produit la colère de Dieu, puisque là où il n''y a pas de loi, il n''y a pas non plus de transgression. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C''est donc par la foi que l''on devient héritier, pour que ce soit par grâce et que la promesse soit assurée à toute la descendance, non seulement à celle qui dépend de la loi, mais aussi à celle qui a la foi d''Abraham. En effet, Abraham est notre père à tous, comme cela est d''ailleurs écrit: '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Je t'ai établi père d'un grand nombre de nations
    - type: text
      text: .
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Je t''ai établi… nations: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Genèse 17.5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' Il est notre père devant le Dieu en qui il a cru, le Dieu qui donne la vie aux morts et appelle ce qui n''existe pas à l''existence. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Espérant contre toute espérance, Abraham a cru et est ainsi devenu '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: le père d'un grand nombre de nations
    - type: text
      text: ', conformément à ce qui lui avait été dit: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Telle sera ta descendance
    - type: text
      text: .
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Telle sera ta descendance: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Genèse 15.5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sans faiblir dans la foi, il n''a pas considéré que son corps était déjà usé, puisqu''il avait près de 100 ans, ni que Sara n''était plus en état d''avoir des enfants. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si Abraham a été considéré comme juste sur la base de ses œuvres, il a de quoi se montrer fier, mais non devant Dieu. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il n''a pas douté, par incrédulité, de la promesse de Dieu, mais il a été fortifié par la foi et il a rendu gloire à Dieu, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'car il avait la pleine conviction que ce que Dieu promet, il peut aussi l''accomplir. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C''est pourquoi '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: cela lui a été compté comme justice
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Cela… justice: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'reprise de la citation de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Genèse 15.6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (voir verset 3).'
      marker-yv: yv-n
    - type: text
      text: .
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or ce n''est pas pour lui seulement qu''il est écrit que la foi a été portée à son compte, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mais c''est aussi pour nous. Elle sera portée à notre compte, puisque nous croyons en celui qui a ressuscité Jésus notre Seigneur, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: lui qui a été donné à cause de nos fautes et qui est ressuscité à cause de notre justification.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, que dit l''Ecriture? '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Abraham a eu confiance en Dieu et cela lui a été compté comme justice
    - type: text
      text: .
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Abraham… justice: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Genèse 15.6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or, si quelqu''un accomplit quelque chose, le salaire est porté à son compte non comme une grâce, mais comme un dû. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Par contre, si quelqu'un ne fait rien mais croit en celui qui déclare juste l'impie, sa foi lui est comptée comme justice.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De même, David exprime le bonheur de l''homme à qui Dieu attribue la justice sans les œuvres: '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Heureux ceux dont les fautes sont pardonnées et dont les péchés sont couverts,
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: heureux l'homme à qui le Seigneur ne tient pas compte de son péché!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.7-8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Heureux ceux… péché: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation du '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Psaume 32.1-2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce bonheur n''est-il que pour les circoncis, ou bien est-il également pour les incirconcis? En effet, nous disons que la '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: foi d'Abraham lui a été comptée comme justice
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Foi… justice: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'reprise de la citation de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Genèse 15.6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (voir verset 3).'
      marker-yv: yv-n
    - type: text
      text: '. '
