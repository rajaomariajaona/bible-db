document_id: ROM.4,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Exemples de justice par la foi dans l'Ancien Testament
  - type: text
    content: 'Que dirons-nous donc d''Abraham, notre ancêtre? Qu''a-t-il obtenu par ses propres efforts? '
  '10':
  - type: text
    content: 'Quand donc a-t-elle été portée à son compte? Etait-ce après ou avant sa circoncision? Ce n''était pas après sa circoncision, mais bien alors qu''il était incirconcis. '
  '11':
  - type: text
    content: 'Et il a reçu le signe de la circoncision comme le gage de la justice qu''il avait obtenue par la foi alors qu''il était incirconcis. Il est ainsi le père de tous les incirconcis qui croient, afin que la justice soit aussi portée à leur compte. '
  '12':
  - type: text
    content: Il est aussi le père des circoncis qui ne se contentent pas d'être circoncis mais qui marchent aussi sur les traces de la foi de notre ancêtre Abraham quand il était encore incirconcis.
  '13':
  - type: text
    content: 'En effet, ce n''est pas par la loi que la promesse de recevoir le monde en héritage a été faite à Abraham ou à sa descendance, mais c''est par la justice de la foi, '
  '14':
  - type: text
    content: car si l'on devient héritier par la loi, la foi est dépourvue de sens et la promesse
  - type: note
    content: 'La promesse: c''est-à-dire la promesse de Dieu.'
  - type: text
    content: ' sans effets. '
  '15':
  - type: text
    content: 'En fait, la loi produit la colère de Dieu, puisque là où il n''y a pas de loi, il n''y a pas non plus de transgression. '
  '16':
  - type: text
    content: 'C''est donc par la foi que l''on devient héritier, pour que ce soit par grâce et que la promesse soit assurée à toute la descendance, non seulement à celle qui dépend de la loi, mais aussi à celle qui a la foi d''Abraham. En effet, Abraham est notre père à tous, comme cela est d''ailleurs écrit: '
  '17':
  - type: text
    content: Je t'ai établi père d'un grand nombre de nations
  - type: text
    content: .
  - type: note
    content: 'Je t''ai établi… nations: citation de Genèse 17.5.'
  - type: text
    content: ' Il est notre père devant le Dieu en qui il a cru, le Dieu qui donne la vie aux morts et appelle ce qui n''existe pas à l''existence. '
  '18':
  - type: text
    content: 'Espérant contre toute espérance, Abraham a cru et est ainsi devenu '
  - type: text
    content: le père d'un grand nombre de nations
  - type: text
    content: ', conformément à ce qui lui avait été dit: '
  - type: text
    content: Telle sera ta descendance
  - type: text
    content: .
  - type: note
    content: 'Telle sera ta descendance: citation de Genèse 15.5.'
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'Sans faiblir dans la foi, il n''a pas considéré que son corps était déjà usé, puisqu''il avait près de 100 ans, ni que Sara n''était plus en état d''avoir des enfants. '
  '2':
  - type: text
    content: 'Si Abraham a été considéré comme juste sur la base de ses œuvres, il a de quoi se montrer fier, mais non devant Dieu. '
  '20':
  - type: text
    content: 'Il n''a pas douté, par incrédulité, de la promesse de Dieu, mais il a été fortifié par la foi et il a rendu gloire à Dieu, '
  '21':
  - type: text
    content: 'car il avait la pleine conviction que ce que Dieu promet, il peut aussi l''accomplir. '
  '22':
  - type: text
    content: 'C''est pourquoi '
  - type: text
    content: cela lui a été compté comme justice
  - type: note
    content: 'Cela… justice: reprise de la citation de Genèse 15.6 (voir verset 3).'
  - type: text
    content: .
  '23':
  - type: text
    content: 'Or ce n''est pas pour lui seulement qu''il est écrit que la foi a été portée à son compte, '
  '24':
  - type: text
    content: 'mais c''est aussi pour nous. Elle sera portée à notre compte, puisque nous croyons en celui qui a ressuscité Jésus notre Seigneur, '
  '25':
  - type: text
    content: lui qui a été donné à cause de nos fautes et qui est ressuscité à cause de notre justification.
  '3':
  - type: text
    content: 'En effet, que dit l''Ecriture? '
  - type: text
    content: Abraham a eu confiance en Dieu et cela lui a été compté comme justice
  - type: text
    content: .
  - type: note
    content: 'Abraham… justice: citation de Genèse 15.6.'
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'Or, si quelqu''un accomplit quelque chose, le salaire est porté à son compte non comme une grâce, mais comme un dû. '
  '5':
  - type: text
    content: Par contre, si quelqu'un ne fait rien mais croit en celui qui déclare juste l'impie, sa foi lui est comptée comme justice.
  '6':
  - type: text
    content: 'De même, David exprime le bonheur de l''homme à qui Dieu attribue la justice sans les œuvres: '
  '7':
  - type: text
    content: Heureux ceux dont les fautes sont pardonnées et dont les péchés sont couverts,
  - type: text
    content: ' '
  '8':
  - type: text
    content: heureux l'homme à qui le Seigneur ne tient pas compte de son péché!
  - type: note
    content: 'Heureux ceux… péché: citation du Psaume 32.1-2.'
  '9':
  - type: text
    content: 'Ce bonheur n''est-il que pour les circoncis, ou bien est-il également pour les incirconcis? En effet, nous disons que la '
  - type: text
    content: foi d'Abraham lui a été comptée comme justice
  - type: note
    content: 'Foi… justice: reprise de la citation de Genèse 15.6 (voir verset 3).'
  - type: text
    content: '. '
