document_id: 2TH.1,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Salutation et louange
  - type: text
    content: 'De la part de Paul, Silvain et Timothée à l''Eglise des Thessaloniciens qui est en Dieu notre Père et dans le Seigneur Jésus-Christ: '
  '10':
  - type: text
    content: lorsqu'il viendra, ce jour-là, pour être célébré parmi ses saints
  - type: note
    content: 'Saints: manière de désigner les chrétiens en tant que personnes consacrées à Dieu et appelées à avoir le comportement qui découle de leur appartenance à ce Dieu.'
  - type: text
    content: ' et admiré parmi tous ceux qui auront cru; or vous avez cru à notre témoignage.'
  '11':
  - type: text
    content: 'C''est pourquoi nous prions constamment pour vous, afin que notre Dieu vous trouve dignes de son appel et que par sa puissance il mène à leur accomplissement tout désir de faire le bien et toute œuvre de la foi. '
  '12':
  - type: text
    content: Ainsi la gloire du nom de notre Seigneur Jésus[-Christ] sera révélée en vous et la vôtre en lui, conformément à la grâce de notre Dieu et Seigneur Jésus-Christ.
  '2':
  - type: text
    content: que la grâce et la paix vous soient données de la part de Dieu notre Père et du Seigneur Jésus-Christ!
  '3':
  - type: text
    content: 'Frères et sœurs, nous devons constamment dire à Dieu toute notre reconnaissance à votre sujet, et cela est juste, parce que votre foi fait de grands progrès et que l''amour mutuel que vous vous portez tous augmente de plus en plus. '
  '4':
  - type: text
    content: 'Aussi sommes-nous fiers de vous dans les Eglises de Dieu à cause de votre persévérance et de votre foi au milieu de toutes les persécutions et les difficultés que vous supportez. '
  '5':
  - type: text
    content: 'C''est une preuve du juste jugement de Dieu, pour que vous soyez trouvés dignes du royaume de Dieu, pour lequel vous souffrez aussi. '
  '6':
  - type: text
    content: 'En effet, il est juste aux yeux de Dieu de rendre la souffrance à ceux qui vous font souffrir '
  '7':
  - type: text
    content: 'et de vous donner, à vous qui souffrez, du repos avec nous lorsque le Seigneur Jésus apparaîtra du ciel avec les anges de sa puissance, '
  '8':
  - type: text
    content: 'au milieu d''une flamme de feu, pour punir ceux qui ne connaissent pas Dieu et ceux qui n''obéissent pas à l''Evangile de notre Seigneur Jésus[-Christ]. '
  '9':
  - type: text
    content: 'Ils auront pour peine une ruine éternelle, loin de la présence du Seigneur et de la gloire de sa force '
