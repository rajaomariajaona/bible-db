document_id: 2TH.1
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Salutation et louange
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'De la part de Paul, Silvain et Timothée à l''Eglise des Thessaloniciens qui est en Dieu notre Père et dans le Seigneur Jésus-Christ: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: que la grâce et la paix vous soient données de la part de Dieu notre Père et du Seigneur Jésus-Christ!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Frères et sœurs, nous devons constamment dire à Dieu toute notre reconnaissance à votre sujet, et cela est juste, parce que votre foi fait de grands progrès et que l''amour mutuel que vous vous portez tous augmente de plus en plus. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Aussi sommes-nous fiers de vous dans les Eglises de Dieu à cause de votre persévérance et de votre foi au milieu de toutes les persécutions et les difficultés que vous supportez. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'C''est une preuve du juste jugement de Dieu, pour que vous soyez trouvés dignes du royaume de Dieu, pour lequel vous souffrez aussi. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'En effet, il est juste aux yeux de Dieu de rendre la souffrance à ceux qui vous font souffrir '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'et de vous donner, à vous qui souffrez, du repos avec nous lorsque le Seigneur Jésus apparaîtra du ciel avec les anges de sa puissance, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'au milieu d''une flamme de feu, pour punir ceux qui ne connaissent pas Dieu et ceux qui n''obéissent pas à l''Evangile de notre Seigneur Jésus[-Christ]. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ils auront pour peine une ruine éternelle, loin de la présence du Seigneur et de la gloire de sa force '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: lorsqu'il viendra, ce jour-là, pour être célébré parmi ses saints
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Saints: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: manière de désigner les chrétiens en tant que personnes consacrées à Dieu et appelées à avoir le comportement qui découle de leur appartenance à ce Dieu.
    marker-yv: yv-n
  - type: text
    text: ' et admiré parmi tous ceux qui auront cru; or vous avez cru à notre témoignage.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'C''est pourquoi nous prions constamment pour vous, afin que notre Dieu vous trouve dignes de son appel et que par sa puissance il mène à leur accomplissement tout désir de faire le bien et toute œuvre de la foi. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ainsi la gloire du nom de notre Seigneur Jésus[-Christ] sera révélée en vous et la vôtre en lui, conformément à la grâce de notre Dieu et Seigneur Jésus-Christ.
