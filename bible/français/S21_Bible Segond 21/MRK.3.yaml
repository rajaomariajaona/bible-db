document_id: MRK.3,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Jésus entra de nouveau dans la synagogue. Il s''y trouvait un homme qui avait la main paralysée. '
  '10':
  - type: text
    content: 'En effet, comme il guérissait beaucoup de gens, tous ceux qui avaient des maladies se jetaient sur lui pour le toucher. '
  '11':
  - type: text
    content: 'Les esprits impurs, quand ils le voyaient, se prosternaient devant lui et s''écriaient: «Tu es le Fils de Dieu.» '
  '12':
  - type: text
    content: Mais il leur recommandait très sévèrement de ne pas le faire connaître.
  - type: heading
    content: Choix des douze apôtres
  '13':
  - type: text
    content: 'Il monta ensuite sur la montagne; il appela ceux qu''il voulait, et ils vinrent vers lui. '
  '14':
  - type: text
    content: 'Il en établit douze [auxquels il donna le nom d''apôtres,] pour qu''ils soient avec lui, et pour les envoyer prêcher '
  '15':
  - type: text
    content: 'avec le pouvoir [de guérir les maladies et] de chasser les démons. '
  '16':
  - type: text
    content: '[Voici les douze qu''il établit:] Simon, qu''il appela Pierre; '
  '17':
  - type: text
    content: 'Jacques, fils de Zébédée, et Jean, frère de Jacques, auxquels il donna le nom de Boanergès, qui signifie «fils du tonnerre»; '
  '18':
  - type: text
    content: André; Philippe; Barthélémy; Matthieu; Thomas; Jacques, fils d'Alphée; Thaddée; Simon le Cananite
  - type: note
    content: 'Cananite: terme qui désignait le membre d''un parti de patriotes juifs créé afin de résister aux Romains ou, plus généralement, une personne zélée pour la loi de Moïse.'
  - type: text
    content: '; '
  '19':
  - type: text
    content: et Judas l'Iscariot
  - type: note
    content: 'Iscariot: c''est-à-dire homme de Karioth, ville de Judée.'
  - type: text
    content: ', celui qui trahit Jésus.'
  - type: heading
    content: Jésus contesté
  '2':
  - type: text
    content: 'Ils observaient Jésus pour voir s''il le guérirait le jour du sabbat: c''était afin de pouvoir l''accuser. '
  '20':
  - type: text
    content: 'Ils se rendirent à la maison, et la foule se rassembla de nouveau, de sorte qu''ils ne pouvaient même pas prendre leur repas. '
  '21':
  - type: text
    content: 'Lorsqu''ils l''apprirent, les membres de la famille de Jésus vinrent pour s''emparer de lui, car ils disaient: «Il a perdu la raison.»'
  '22':
  - type: text
    content: 'Les spécialistes de la loi qui étaient descendus de Jérusalem disaient: «Il a en lui Béelzébul'
  - type: note
    content: 'Béelzébul: terme de mépris pour désigner Satan.'
  - type: text
    content: '; c''est par le prince des démons qu''il chasse les démons.» '
  '23':
  - type: text
    content: Jésus les appela et leur dit sous forme de paraboles
  - type: note
    content: 'Paraboles: histoires visant à faire comprendre une vérité spirituelle au moyen d''un exemple tiré de la vie courante.'
  - type: text
    content: ': «Comment Satan peut-il chasser Satan? '
  '24':
  - type: text
    content: 'Si un royaume est confronté à des luttes internes, ce royaume ne peut pas subsister, '
  '25':
  - type: text
    content: 'et si une famille est confrontée à des luttes internes, cette famille ne peut pas subsister. '
  '26':
  - type: text
    content: 'Si donc Satan se dresse contre lui-même, s''il est divisé, il ne peut pas subsister, c''en est fini de lui. '
  '27':
  - type: text
    content: 'Personne ne peut entrer dans la maison d''un homme fort et piller ses biens sans avoir d''abord attaché cet homme fort; alors seulement il pillera sa maison. '
  '28':
  - type: text
    content: 'Je vous le dis en vérité, tous les péchés seront pardonnés aux hommes, ainsi que les blasphèmes qu''ils auront proférés, '
  '29':
  - type: text
    content: 'mais celui qui blasphémera contre le Saint-Esprit n''obtiendra jamais de pardon: il mérite une condamnation éternelle.» '
  '3':
  - type: text
    content: 'Jésus dit à l''homme qui avait la main paralysée: «Lève-toi, là au milieu.» '
  '30':
  - type: text
    content: 'Jésus parla de cette manière parce qu''ils disaient: «Il a un esprit impur.»'
  '31':
  - type: text
    content: 'Sa mère et ses frères arrivèrent donc. Ils se tenaient dehors et l''envoyèrent appeler. '
  '32':
  - type: text
    content: 'La foule était assise autour de lui, et on lui dit: «Voici, ta mère et tes frères [et sœurs] sont dehors et te cherchent.» '
  '33':
  - type: text
    content: 'Il répondit: «Qui est ma mère, et qui sont mes frères?» '
  '34':
  - type: text
    content: 'Puis il promena le regard sur ceux qui étaient assis tout autour de lui et dit: «Voici ma mère et mes frères. '
  '35':
  - type: text
    content: En effet, celui qui fait la volonté de Dieu, celui-là est mon frère, ma sœur, ma mère.»
  '4':
  - type: text
    content: 'Puis il leur dit: «Est-il permis, le jour du sabbat, de faire du bien ou de faire du mal, de sauver une personne ou de la tuer?» Mais ils gardèrent le silence. '
  '5':
  - type: text
    content: 'Alors il promena sur eux un regard de colère et, peiné de l''endurcissement de leur cœur, il dit à l''homme: «Tends ta main.» Il la tendit, et sa main fut guérie.'
  '6':
  - type: text
    content: Les pharisiens sortirent et tinrent aussitôt conseil avec les hérodiens
  - type: note
    content: 'Hérodiens: partisans de la dynastie des Hérode et donc de l''occupant romain.'
  - type: text
    content: ' sur les moyens de le faire mourir.'
  '7':
  - type: text
    content: 'Jésus se retira au bord du lac avec ses disciples. Une foule nombreuse le suivit, venue de la Galilée, de la Judée, '
  '8':
  - type: text
    content: 'de Jérusalem, de l''Idumée, de l''autre côté du Jourdain et des environs de Tyr et de Sidon; cette foule vint à lui car elle avait appris tout ce qu''il faisait. '
  '9':
  - type: text
    content: 'Il dit à ses disciples de tenir toujours à sa disposition une petite barque afin de ne pas être écrasé par la foule. '
