document_id: MRK.3
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jésus entra de nouveau dans la synagogue. Il s''y trouvait un homme qui avait la main paralysée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ils observaient Jésus pour voir s''il le guérirait le jour du sabbat: c''était afin de pouvoir l''accuser. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jésus dit à l''homme qui avait la main paralysée: «Lève-toi, là au milieu.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Puis il leur dit: «Est-il permis, le jour du sabbat, de faire du bien ou de faire du mal, de sauver une personne ou de la tuer?» Mais ils gardèrent le silence. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Alors il promena sur eux un regard de colère et, peiné de l''endurcissement de leur cœur, il dit à l''homme: «Tends ta main.» Il la tendit, et sa main fut guérie.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Les pharisiens sortirent et tinrent aussitôt conseil avec les hérodiens
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Hérodiens: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: partisans de la dynastie des Hérode et donc de l'occupant romain.
    marker-yv: yv-n
  - type: text
    text: ' sur les moyens de le faire mourir.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Jésus se retira au bord du lac avec ses disciples. Une foule nombreuse le suivit, venue de la Galilée, de la Judée, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'de Jérusalem, de l''Idumée, de l''autre côté du Jourdain et des environs de Tyr et de Sidon; cette foule vint à lui car elle avait appris tout ce qu''il faisait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il dit à ses disciples de tenir toujours à sa disposition une petite barque afin de ne pas être écrasé par la foule. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'En effet, comme il guérissait beaucoup de gens, tous ceux qui avaient des maladies se jetaient sur lui pour le toucher. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Les esprits impurs, quand ils le voyaient, se prosternaient devant lui et s''écriaient: «Tu es le Fils de Dieu.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mais il leur recommandait très sévèrement de ne pas le faire connaître.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Choix des douze apôtres
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il monta ensuite sur la montagne; il appela ceux qu''il voulait, et ils vinrent vers lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il en établit douze [auxquels il donna le nom d''apôtres,] pour qu''ils soient avec lui, et pour les envoyer prêcher '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'avec le pouvoir [de guérir les maladies et] de chasser les démons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '[Voici les douze qu''il établit:] Simon, qu''il appela Pierre; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Jacques, fils de Zébédée, et Jean, frère de Jacques, auxquels il donna le nom de Boanergès, qui signifie «fils du tonnerre»; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: André; Philippe; Barthélémy; Matthieu; Thomas; Jacques, fils d'Alphée; Thaddée; Simon le Cananite
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Cananite: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: terme qui désignait le membre d'un parti de patriotes juifs créé afin de résister aux Romains ou, plus généralement, une personne zélée pour la loi de Moïse.
    marker-yv: yv-n
  - type: text
    text: '; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: et Judas l'Iscariot
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Iscariot: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: c'est-à-dire homme de Karioth, ville de Judée.
    marker-yv: yv-n
  - type: text
    text: ', celui qui trahit Jésus.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus contesté
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ils se rendirent à la maison, et la foule se rassembla de nouveau, de sorte qu''ils ne pouvaient même pas prendre leur repas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Lorsqu''ils l''apprirent, les membres de la famille de Jésus vinrent pour s''emparer de lui, car ils disaient: «Il a perdu la raison.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Les spécialistes de la loi qui étaient descendus de Jérusalem disaient: «Il a en lui Béelzébul'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.22 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Béelzébul: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: terme de mépris pour désigner Satan.
    marker-yv: yv-n
  - type: text
    text: '; c''est par le prince des démons qu''il chasse les démons.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Jésus les appela et leur dit sous forme de paraboles
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.23 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Paraboles: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: histoires visant à faire comprendre une vérité spirituelle au moyen d'un exemple tiré de la vie courante.
    marker-yv: yv-n
  - type: text
    text: ': «Comment Satan peut-il chasser Satan? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Si un royaume est confronté à des luttes internes, ce royaume ne peut pas subsister, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'et si une famille est confrontée à des luttes internes, cette famille ne peut pas subsister. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Si donc Satan se dresse contre lui-même, s''il est divisé, il ne peut pas subsister, c''en est fini de lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Personne ne peut entrer dans la maison d''un homme fort et piller ses biens sans avoir d''abord attaché cet homme fort; alors seulement il pillera sa maison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Je vous le dis en vérité, tous les péchés seront pardonnés aux hommes, ainsi que les blasphèmes qu''ils auront proférés, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'mais celui qui blasphémera contre le Saint-Esprit n''obtiendra jamais de pardon: il mérite une condamnation éternelle.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Jésus parla de cette manière parce qu''ils disaient: «Il a un esprit impur.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Sa mère et ses frères arrivèrent donc. Ils se tenaient dehors et l''envoyèrent appeler. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'La foule était assise autour de lui, et on lui dit: «Voici, ta mère et tes frères [et sœurs] sont dehors et te cherchent.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Il répondit: «Qui est ma mère, et qui sont mes frères?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Puis il promena le regard sur ceux qui étaient assis tout autour de lui et dit: «Voici ma mère et mes frères. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: En effet, celui qui fait la volonté de Dieu, celui-là est mon frère, ma sœur, ma mère.»
