document_id: PSA.59
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prière pour le jugement des impies
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef de chœur, sur la mélodie de «Ne détruis pas». Hymne de David, lorsque Saül envoya cerner sa maison pour le faire mourir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mon Dieu, délivre-moi de mes ennemis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: protège-moi contre mes adversaires!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Délivre-moi de ceux qui commettent l'injustice
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sauve-moi des hommes sanguinaires,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: car les voici aux aguets pour m'enlever la vie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Des hommes puissants complotent contre moi
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans que je sois coupable, sans que j'aie péché, Eternel!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Malgré mon innocence ils accourent, prêts à m'attaquer.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Réveille-toi, viens vers moi et regarde!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Toi, Eternel, Dieu de l'univers, Dieu d'Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: lève-toi pour corriger toutes les nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ne fais grâce à aucun de ces traîtres impies! '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: – Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ils reviennent chaque soir, ils hurlent comme des chiens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils font le tour de la ville.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: De leur bouche ils font jaillir l'injure,
- type: usfm
  marker: q1
  children:
  - type: text
    text: leurs paroles sont des épées.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ils disent: «Qui est-ce qui entend?»'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mais toi, Eternel, tu te ris d'eux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu te moques de toutes les nations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Toi qui es ma force, c'est en toi que j'espère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car Dieu est ma forteresse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mon Dieu m'accueille dans sa bonté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dieu me fait contempler mes adversaires.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ne les tue pas, sinon mon peuple les oublierait;
- type: usfm
  marker: q1
  children:
  - type: text
    text: fais-les trembler par ta puissance et jette-les à bas, Seigneur, notre bouclier!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Leur bouche pèche à chaque parole de leurs lèvres:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu'ils soient pris dans leur propre orgueil!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ils ne profèrent que malédictions et mensonges:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: détruis-les, dans ta fureur, détruis-les, et qu'ils n'existent plus!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu'on sache que Dieu règne sur Jacob
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'jusqu''aux extrémités de la terre! '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: – Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ils reviennent chaque soir, ils hurlent comme des chiens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils font le tour de la ville.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ils errent çà et là, cherchant leur nourriture,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils passent la nuit sans être rassasiés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Quant à moi, je chanterai ta force,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dès le matin je célébrerai ta bonté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car tu es pour moi une forteresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un refuge quand je suis dans la détresse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Toi qui es ma force, c'est pour toi que je veux chanter,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car Dieu, mon Dieu si bon, est ma forteresse.
