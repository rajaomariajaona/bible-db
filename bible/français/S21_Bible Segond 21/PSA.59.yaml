document_id: PSA.59,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Prière pour le jugement des impies
  - type: text
    content: Au chef de chœur, sur la mélodie de «Ne détruis pas». Hymne de David, lorsque Saül envoya cerner sa maison pour le faire mourir.
  '10':
  - type: text
    content: Toi qui es ma force, c'est en toi que j'espère,
  - type: text
    content: car Dieu est ma forteresse.
  '11':
  - type: text
    content: Mon Dieu m'accueille dans sa bonté,
  - type: text
    content: Dieu me fait contempler mes adversaires.
  '12':
  - type: text
    content: Ne les tue pas, sinon mon peuple les oublierait;
  - type: text
    content: fais-les trembler par ta puissance et jette-les à bas, Seigneur, notre bouclier!
  '13':
  - type: text
    content: 'Leur bouche pèche à chaque parole de leurs lèvres:'
  - type: text
    content: qu'ils soient pris dans leur propre orgueil!
  - type: text
    content: 'Ils ne profèrent que malédictions et mensonges:'
  '14':
  - type: text
    content: détruis-les, dans ta fureur, détruis-les, et qu'ils n'existent plus!
  - type: text
    content: Qu'on sache que Dieu règne sur Jacob
  - type: text
    content: 'jusqu''aux extrémités de la terre! '
  - type: text
    content: – Pause.
  '15':
  - type: text
    content: Ils reviennent chaque soir, ils hurlent comme des chiens,
  - type: text
    content: ils font le tour de la ville.
  '16':
  - type: text
    content: Ils errent çà et là, cherchant leur nourriture,
  - type: text
    content: et ils passent la nuit sans être rassasiés.
  '17':
  - type: text
    content: Quant à moi, je chanterai ta force,
  - type: text
    content: dès le matin je célébrerai ta bonté,
  - type: text
    content: car tu es pour moi une forteresse,
  - type: text
    content: un refuge quand je suis dans la détresse.
  '18':
  - type: text
    content: Toi qui es ma force, c'est pour toi que je veux chanter,
  - type: text
    content: car Dieu, mon Dieu si bon, est ma forteresse.
  '2':
  - type: text
    content: Mon Dieu, délivre-moi de mes ennemis,
  - type: text
    content: protège-moi contre mes adversaires!
  '3':
  - type: text
    content: Délivre-moi de ceux qui commettent l'injustice
  - type: text
    content: et sauve-moi des hommes sanguinaires,
  '4':
  - type: text
    content: car les voici aux aguets pour m'enlever la vie.
  - type: text
    content: Des hommes puissants complotent contre moi
  - type: text
    content: sans que je sois coupable, sans que j'aie péché, Eternel!
  '5':
  - type: text
    content: Malgré mon innocence ils accourent, prêts à m'attaquer.
  - type: text
    content: Réveille-toi, viens vers moi et regarde!
  '6':
  - type: text
    content: Toi, Eternel, Dieu de l'univers, Dieu d'Israël,
  - type: text
    content: lève-toi pour corriger toutes les nations,
  - type: text
    content: 'ne fais grâce à aucun de ces traîtres impies! '
  - type: text
    content: – Pause.
  '7':
  - type: text
    content: Ils reviennent chaque soir, ils hurlent comme des chiens,
  - type: text
    content: ils font le tour de la ville.
  '8':
  - type: text
    content: De leur bouche ils font jaillir l'injure,
  - type: text
    content: leurs paroles sont des épées.
  - type: text
    content: 'Ils disent: «Qui est-ce qui entend?»'
  '9':
  - type: text
    content: Mais toi, Eternel, tu te ris d'eux,
  - type: text
    content: tu te moques de toutes les nations.
