document_id: ISA.50
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Reproches de l'Eternel à son peuple
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Voici ce que dit l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Où est la lettre de divorce par laquelle j'ai renvoyé votre mère?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ou bien auquel de mes créanciers vous ai-je vendus?
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est à cause de vos fautes que vous avez été vendus
- type: usfm
  marker: q1
  children:
  - type: text
    text: et c'est à cause de vos transgressions que votre mère a été renvoyée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Je suis venu: pourquoi n''y avait-il personne?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'J''ai appelé: pourquoi personne n''a-t-il répondu?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon bras serait-il trop court pour vous libérer?
- type: usfm
  marker: q1
  children:
  - type: text
    text: N'ai-je pas assez de force pour vous délivrer?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Par une simple menace je mets la mer à sec,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je change les fleuves en désert.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Faute d'eau, leurs poissons crèvent de soif et pourrissent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: J'habille le ciel d'obscurité
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je lui donne un sac en guise de couverture.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le serviteur de l'Eternel insulté
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Le Seigneur, l'Eternel, m'a donné le langage des disciples
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour que je sache soutenir par la parole celui qui est abattu.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il réveille, oui, matin après matin il réveille mon oreille
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour que j'écoute comme le font des disciples.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Le Seigneur, l'Eternel, m'a ouvert l'oreille,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et moi, je ne me suis pas rebellé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je n'ai pas reculé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: J'ai présenté mon dos à ceux qui me frappaient
- type: usfm
  marker: q1
  children:
  - type: text
    text: et mes joues à ceux qui m'arrachaient la barbe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je n'ai pas caché mon visage aux insultes et aux crachats.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Cependant, le Seigneur, l'Eternel, est venu à mon aide.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voilà pourquoi je ne me suis pas laissé atteindre par les insultes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: voilà pourquoi j'ai rendu mon visage dur comme une pierre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je sais que je ne serai pas couvert de honte.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Celui qui me déclare juste est proche:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui veut m'accuser?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comparaissons ensemble!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui s'oppose à mon droit?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu'il s'avance vers moi!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'C''est le Seigneur, l''Eternel, qui viendra à mon aide:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui me condamnera?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils tomberont tous en lambeaux comme un habit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dévorés par la teigne.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Qui parmi vous craint l'Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: et écoute son serviteur?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si quelqu'un marche dans l'obscurité et manque de lumière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu'il place sa confiance dans le nom de l'Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: et s'appuie sur son Dieu!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Quant à vous tous qui allumez un feu
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui êtes armés de flèches incendiaires,
- type: usfm
  marker: q1
  children:
  - type: text
    text: allez dans la flamme de votre feu et au milieu des flèches que vous avez enflammées!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'C''est ma main qui vous réserve ce sort:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous vous coucherez dans la souffrance.
