document_id: ISA.50,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Reproches de l'Eternel à son peuple
  - type: text
    content: 'Voici ce que dit l''Eternel:'
  - type: text
    content: Où est la lettre de divorce par laquelle j'ai renvoyé votre mère?
  - type: text
    content: Ou bien auquel de mes créanciers vous ai-je vendus?
  - type: text
    content: C'est à cause de vos fautes que vous avez été vendus
  - type: text
    content: et c'est à cause de vos transgressions que votre mère a été renvoyée.
  '10':
  - type: text
    content: Qui parmi vous craint l'Eternel
  - type: text
    content: et écoute son serviteur?
  - type: text
    content: Si quelqu'un marche dans l'obscurité et manque de lumière,
  - type: text
    content: qu'il place sa confiance dans le nom de l'Eternel
  - type: text
    content: et s'appuie sur son Dieu!
  '11':
  - type: text
    content: Quant à vous tous qui allumez un feu
  - type: text
    content: et qui êtes armés de flèches incendiaires,
  - type: text
    content: allez dans la flamme de votre feu et au milieu des flèches que vous avez enflammées!
  - type: text
    content: 'C''est ma main qui vous réserve ce sort:'
  - type: text
    content: vous vous coucherez dans la souffrance.
  '2':
  - type: text
    content: 'Je suis venu: pourquoi n''y avait-il personne?'
  - type: text
    content: 'J''ai appelé: pourquoi personne n''a-t-il répondu?'
  - type: text
    content: Mon bras serait-il trop court pour vous libérer?
  - type: text
    content: N'ai-je pas assez de force pour vous délivrer?
  - type: text
    content: Par une simple menace je mets la mer à sec,
  - type: text
    content: je change les fleuves en désert.
  - type: text
    content: Faute d'eau, leurs poissons crèvent de soif et pourrissent.
  '3':
  - type: text
    content: J'habille le ciel d'obscurité
  - type: text
    content: et je lui donne un sac en guise de couverture.
  - type: heading
    content: Le serviteur de l'Eternel insulté
  '4':
  - type: text
    content: Le Seigneur, l'Eternel, m'a donné le langage des disciples
  - type: text
    content: pour que je sache soutenir par la parole celui qui est abattu.
  - type: text
    content: Il réveille, oui, matin après matin il réveille mon oreille
  - type: text
    content: pour que j'écoute comme le font des disciples.
  '5':
  - type: text
    content: Le Seigneur, l'Eternel, m'a ouvert l'oreille,
  - type: text
    content: et moi, je ne me suis pas rebellé,
  - type: text
    content: je n'ai pas reculé.
  '6':
  - type: text
    content: J'ai présenté mon dos à ceux qui me frappaient
  - type: text
    content: et mes joues à ceux qui m'arrachaient la barbe,
  - type: text
    content: je n'ai pas caché mon visage aux insultes et aux crachats.
  '7':
  - type: text
    content: Cependant, le Seigneur, l'Eternel, est venu à mon aide.
  - type: text
    content: Voilà pourquoi je ne me suis pas laissé atteindre par les insultes,
  - type: text
    content: voilà pourquoi j'ai rendu mon visage dur comme une pierre,
  - type: text
    content: et je sais que je ne serai pas couvert de honte.
  '8':
  - type: text
    content: 'Celui qui me déclare juste est proche:'
  - type: text
    content: qui veut m'accuser?
  - type: text
    content: Comparaissons ensemble!
  - type: text
    content: Qui s'oppose à mon droit?
  - type: text
    content: Qu'il s'avance vers moi!
  '9':
  - type: text
    content: 'C''est le Seigneur, l''Eternel, qui viendra à mon aide:'
  - type: text
    content: qui me condamnera?
  - type: text
    content: Ils tomberont tous en lambeaux comme un habit,
  - type: text
    content: dévorés par la teigne.
