document_id: JOB.31,152
type_code: fra
verses:
  '1':
  - type: text
    content: »J'avais fait un pacte avec mes yeux.
  - type: text
    content: Comment aurais-je pu porter mes regards sur une jeune fille?
  '10':
  - type: text
    content: que ma femme tourne la meule pour un autre
  - type: text
    content: et que d'autres couchent avec elle!
  '11':
  - type: text
    content: En effet, c'est un acte scandaleux,
  - type: text
    content: une faute qui doit être sanctionnée,
  '12':
  - type: text
    content: c'est un feu qui dévore jusqu'au gouffre de perdition
  - type: text
    content: et qui aurait détruit jusqu'à la racine toute ma récolte.
  '13':
  - type: text
    content: »Si j'ai méprisé le droit de mon serviteur ou de ma servante
  - type: text
    content: lorsqu'ils étaient en litige avec moi,
  '14':
  - type: text
    content: que ferai-je quand Dieu se lèvera?
  - type: text
    content: Que répondrai-je quand il me demandera des comptes?
  '15':
  - type: text
    content: Celui qui m'a formé dans le ventre de ma mère ne les a-t-il pas formés eux aussi?
  - type: text
    content: N'est-ce pas le même Dieu qui nous a façonnés dans le ventre maternel?
  '16':
  - type: text
    content: »Ai-je refusé aux faibles ce qu'ils désiraient,
  - type: text
    content: ai-je fait languir les yeux de la veuve,
  '17':
  - type: text
    content: ai-je mangé tout seul mon morceau de pain,
  - type: text
    content: sans que l'orphelin n'en ait eu sa part?
  '18':
  - type: text
    content: Au contraire! Dès ma jeunesse je l'ai élevé comme un père,
  - type: text
    content: dès ma tendre enfance j'ai soutenu la veuve.
  '19':
  - type: text
    content: »Si j'ai vu quelqu'un mourir par manque d'habit,
  - type: text
    content: le pauvre manquer de couverture,
  '2':
  - type: text
    content: Quelle part Dieu m'aurait-il attribuée d'en haut?
  - type: text
    content: Quel héritage le Tout-Puissant m'aurait-il envoyé du ciel?
  '20':
  - type: text
    content: sans lui donner de raison de me bénir,
  - type: text
    content: sans qu'il ait été réchauffé par la toison de mes agneaux,
  '21':
  - type: text
    content: si j'ai levé la main contre l'orphelin
  - type: text
    content: parce que je me savais soutenu par les juges,
  '22':
  - type: text
    content: que mon bras se détache de mon épaule,
  - type: text
    content: que mon avant-bras se brise au coude!
  '23':
  - type: text
    content: De fait, je redoutais les malheurs envoyés par Dieu.
  - type: text
    content: Je suis incapable de quoi que ce soit face à sa majesté.
  '24':
  - type: text
    content: »Si j'ai placé ma confiance dans de l'or,
  - type: text
    content: 'si j''ai dit au métal précieux: ‘Tu es ma sécurité’,'
  '25':
  - type: text
    content: si je me suis réjoui de la grandeur de ma fortune,
  - type: text
    content: de la quantité de mes biens,
  '26':
  - type: text
    content: si j'ai regardé la lumière du soleil quand il brillait,
  - type: text
    content: la lune quand elle s'avançait radieuse,
  '27':
  - type: text
    content: et si mon cœur s'est laissé attirer en secret,
  - type: text
    content: si je les ai adorés,
  '28':
  - type: text
    content: 'c''est encore une faute qui mérite d''être sanctionnée:'
  - type: text
    content: j'aurais renié le Dieu d'en haut!
  '29':
  - type: text
    content: »Me suis-je réjoui du malheur de celui qui me détestait,
  - type: text
    content: ai-je sauté d'allégresse parce qu'un mal l'avait atteint?
  '3':
  - type: text
    content: La misère n'est-elle pas réservée à l'homme injuste
  - type: text
    content: et le désastre à ceux qui commettent le mal?
  '30':
  - type: text
    content: Non! Je n'ai pas permis à ma bouche de pécher
  - type: text
    content: en demandant sa mort dans une malédiction.
  '31':
  - type: text
    content: 'Les occupants de ma tente disaient:'
  - type: text
    content: ‘Peut-on trouver quelqu'un qui n'ait pas été rassasié grâce à sa viande?’
  '32':
  - type: text
    content: L'étranger ne passait pas la nuit dehors,
  - type: text
    content: j'ouvrais ma porte au voyageur.
  '33':
  - type: text
    content: »Ai-je, comme Adam, caché ma transgression,
  - type: text
    content: cherché à dissimuler ma faute
  '34':
  - type: text
    content: parce que je redoutais le qu'en-dira-t-on,
  - type: text
    content: parce que j'étais effrayé par le mépris des familles
  - type: text
    content: au point de garder le silence et de ne pas oser sortir?
  '35':
  - type: text
    content: »Si seulement quelqu'un m'écoutait!
  - type: text
    content: Voilà mon dernier mot.
  - type: text
    content: Que le Tout-Puissant me réponde!
  - type: text
    content: Quant à la plainte écrite par mon adversaire,
  '36':
  - type: text
    content: je la mettrai sur mon épaule,
  - type: text
    content: je la porterai sur mon front comme une couronne.
  '37':
  - type: text
    content: Je lui rendrai compte de ma conduite dans le détail,
  - type: text
    content: je m'approcherai de lui comme un prince.
  '38':
  - type: text
    content: »Si mon terrain crie contre moi
  - type: text
    content: et que ses sillons versent des larmes,
  '39':
  - type: text
    content: si j'ai mangé son produit sans le payer
  - type: text
    content: et que j'aie fait le désespoir de ses propriétaires,
  '4':
  - type: text
    content: Dieu ne voit-il pas ma conduite?
  - type: text
    content: Ne compte-t-il pas tous mes pas?
  '40':
  - type: text
    content: qu'il y pousse des ronces au lieu du blé
  - type: text
    content: et de la mauvaise herbe au lieu de l'orge!»
  - type: text
    content: Fin des paroles de Job.
  '5':
  - type: text
    content: »Si j'ai marché dans la fausseté,
  - type: text
    content: si mon pied a couru vers la tromperie,
  '6':
  - type: text
    content: que Dieu me pèse sur une balance juste
  - type: text
    content: et il reconnaîtra mon intégrité!
  '7':
  - type: text
    content: »Si mon pas s'est écarté du droit chemin,
  - type: text
    content: si mon cœur s'est laissé guider par mes yeux,
  - type: text
    content: si une impureté quelconque s'est attachée à mes mains,
  '8':
  - type: text
    content: qu'un autre profite de ce que j'ai semé
  - type: text
    content: et que mes jeunes plantes soient déracinées!
  '9':
  - type: text
    content: »Si mon cœur s'est laissé attirer par une femme,
  - type: text
    content: si j'ai fait le guet à la porte de mon prochain,
