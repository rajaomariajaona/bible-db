document_id: JOB.31
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: »J'avais fait un pacte avec mes yeux.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comment aurais-je pu porter mes regards sur une jeune fille?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Quelle part Dieu m'aurait-il attribuée d'en haut?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quel héritage le Tout-Puissant m'aurait-il envoyé du ciel?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: La misère n'est-elle pas réservée à l'homme injuste
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le désastre à ceux qui commettent le mal?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Dieu ne voit-il pas ma conduite?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne compte-t-il pas tous mes pas?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: »Si j'ai marché dans la fausseté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si mon pied a couru vers la tromperie,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: que Dieu me pèse sur une balance juste
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il reconnaîtra mon intégrité!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: »Si mon pas s'est écarté du droit chemin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si mon cœur s'est laissé guider par mes yeux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si une impureté quelconque s'est attachée à mes mains,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: qu'un autre profite de ce que j'ai semé
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que mes jeunes plantes soient déracinées!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: »Si mon cœur s'est laissé attirer par une femme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si j'ai fait le guet à la porte de mon prochain,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: que ma femme tourne la meule pour un autre
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que d'autres couchent avec elle!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: En effet, c'est un acte scandaleux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: une faute qui doit être sanctionnée,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: c'est un feu qui dévore jusqu'au gouffre de perdition
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui aurait détruit jusqu'à la racine toute ma récolte.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: »Si j'ai méprisé le droit de mon serviteur ou de ma servante
- type: usfm
  marker: q1
  children:
  - type: text
    text: lorsqu'ils étaient en litige avec moi,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: que ferai-je quand Dieu se lèvera?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que répondrai-je quand il me demandera des comptes?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Celui qui m'a formé dans le ventre de ma mère ne les a-t-il pas formés eux aussi?
- type: usfm
  marker: q1
  children:
  - type: text
    text: N'est-ce pas le même Dieu qui nous a façonnés dans le ventre maternel?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: »Ai-je refusé aux faibles ce qu'ils désiraient,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ai-je fait languir les yeux de la veuve,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ai-je mangé tout seul mon morceau de pain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans que l'orphelin n'en ait eu sa part?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Au contraire! Dès ma jeunesse je l'ai élevé comme un père,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dès ma tendre enfance j'ai soutenu la veuve.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: »Si j'ai vu quelqu'un mourir par manque d'habit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le pauvre manquer de couverture,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: sans lui donner de raison de me bénir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans qu'il ait été réchauffé par la toison de mes agneaux,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: si j'ai levé la main contre l'orphelin
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce que je me savais soutenu par les juges,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: que mon bras se détache de mon épaule,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que mon avant-bras se brise au coude!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: De fait, je redoutais les malheurs envoyés par Dieu.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je suis incapable de quoi que ce soit face à sa majesté.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: »Si j'ai placé ma confiance dans de l'or,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'si j''ai dit au métal précieux: ‘Tu es ma sécurité’,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: si je me suis réjoui de la grandeur de ma fortune,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de la quantité de mes biens,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: si j'ai regardé la lumière du soleil quand il brillait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la lune quand elle s'avançait radieuse,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: et si mon cœur s'est laissé attirer en secret,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si je les ai adorés,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'c''est encore une faute qui mérite d''être sanctionnée:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: j'aurais renié le Dieu d'en haut!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: »Me suis-je réjoui du malheur de celui qui me détestait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ai-je sauté d'allégresse parce qu'un mal l'avait atteint?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Non! Je n'ai pas permis à ma bouche de pécher
- type: usfm
  marker: q1
  children:
  - type: text
    text: en demandant sa mort dans une malédiction.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Les occupants de ma tente disaient:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Peut-on trouver quelqu'un qui n'ait pas été rassasié grâce à sa viande?’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: L'étranger ne passait pas la nuit dehors,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j'ouvrais ma porte au voyageur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: »Ai-je, comme Adam, caché ma transgression,
- type: usfm
  marker: q1
  children:
  - type: text
    text: cherché à dissimuler ma faute
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: parce que je redoutais le qu'en-dira-t-on,
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce que j'étais effrayé par le mépris des familles
- type: usfm
  marker: q1
  children:
  - type: text
    text: au point de garder le silence et de ne pas oser sortir?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: »Si seulement quelqu'un m'écoutait!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voilà mon dernier mot.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que le Tout-Puissant me réponde!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quant à la plainte écrite par mon adversaire,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: je la mettrai sur mon épaule,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je la porterai sur mon front comme une couronne.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Je lui rendrai compte de ma conduite dans le détail,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je m'approcherai de lui comme un prince.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: »Si mon terrain crie contre moi
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que ses sillons versent des larmes,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: si j'ai mangé son produit sans le payer
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que j'aie fait le désespoir de ses propriétaires,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: qu'il y pousse des ronces au lieu du blé
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de la mauvaise herbe au lieu de l'orge!»
- type: usfm
  marker: d
  children:
  - type: text
    text: Fin des paroles de Job.
