document_id: PSA.147,152
type_code: fra
verses:
  '1':
  - type: heading
    content: La puissance de Dieu en faveur d'Israël
  - type: text
    content: Louez l'Eternel!
  - type: text
    content: Oui, il est bon de célébrer notre Dieu.
  - type: text
    content: Oui, il est agréable, il est convenable de le louer.
  '10':
  - type: text
    content: Ce n'est pas la vigueur du cheval qu'il apprécie, c
  - type: text
    content: 'e n''est pas aux mollets de l''homme qu''il prend plaisir:'
  '11':
  - type: text
    content: l'Eternel prend plaisir en ceux qui le craignent,
  - type: text
    content: en ceux qui s'attendent à sa bonté.
  '12':
  - type: text
    content: Jérusalem, célèbre l'Eternel,
  - type: text
    content: Sion, loue ton Dieu,
  '13':
  - type: text
    content: car il renforce les verrous de tes portes
  - type: text
    content: ', il bénit tes fils au milieu de toi;'
  '14':
  - type: text
    content: il donne la paix à ton territoire,
  - type: text
    content: il te rassasie du meilleur blé.
  '15':
  - type: text
    content: 'Il envoie ses ordres sur la terre:'
  - type: text
    content: sa parole court avec rapidité.
  '16':
  - type: text
    content: Il fait tomber la neige pareille à de la laine,
  - type: text
    content: il répand la gelée blanche comme de la cendre.
  '17':
  - type: text
    content: 'Il lance sa glace sous forme de grêlons:'
  - type: text
    content: qui peut résister devant ce froid qu'il provoque?
  '18':
  - type: text
    content: Il envoie sa parole et il les fait fondre,
  - type: text
    content: il fait souffler son vent et l'eau coule.
  '19':
  - type: text
    content: Il révèle sa parole à Jacob,
  - type: text
    content: ses prescriptions et ses jugements à Israël.
  '2':
  - type: text
    content: L'Eternel reconstruit Jérusalem,
  - type: text
    content: il rassemble les exilés d'Israël;
  '20':
  - type: text
    content: Il n'a pas agi de cette manière pour toutes les nations
  - type: text
    content: et elles ne connaissent pas ses jugements.
  - type: text
    content: Louez l'Eternel!
  '3':
  - type: text
    content: il guérit ceux qui ont le cœur brisé
  - type: text
    content: et panse leurs blessures.
  '4':
  - type: text
    content: Il compte le nombre des étoiles
  - type: text
    content: et leur donne à toutes un nom.
  '5':
  - type: text
    content: Notre Seigneur est grand, puissant par sa force.
  - type: text
    content: Son intelligence est sans limite.
  '6':
  - type: text
    content: L'Eternel soutient les malheureux,
  - type: text
    content: mais il abaisse les méchants jusqu'à terre.
  '7':
  - type: text
    content: Chantez en l'honneur de l'Eternel avec reconnaissance,
  - type: text
    content: célébrez notre Dieu avec la harpe!
  '8':
  - type: text
    content: Il couvre le ciel de nuages,
  - type: text
    content: il prépare la pluie pour la terre,
  - type: text
    content: il fait pousser l'herbe sur les montagnes.
  '9':
  - type: text
    content: Il donne la nourriture au bétail
  - type: text
    content: et aux petits du corbeau quand ils crient.
