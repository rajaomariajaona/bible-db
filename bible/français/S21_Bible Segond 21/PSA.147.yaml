document_id: PSA.147,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La puissance de Dieu en faveur d'Israël
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Louez l'Eternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, il est bon de célébrer notre Dieu.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, il est agréable, il est convenable de le louer.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce n'est pas la vigueur du cheval qu'il apprécie, c
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'e n''est pas aux mollets de l''homme qu''il prend plaisir:'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'Eternel prend plaisir en ceux qui le craignent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en ceux qui s'attendent à sa bonté.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jérusalem, célèbre l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sion, loue ton Dieu,
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car il renforce les verrous de tes portes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ', il bénit tes fils au milieu de toi;'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il donne la paix à ton territoire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il te rassasie du meilleur blé.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Il envoie ses ordres sur la terre:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sa parole court avec rapidité.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il fait tomber la neige pareille à de la laine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il répand la gelée blanche comme de la cendre.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Il lance sa glace sous forme de grêlons:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui peut résister devant ce froid qu'il provoque?
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il envoie sa parole et il les fait fondre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il fait souffler son vent et l'eau coule.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il révèle sa parole à Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ses prescriptions et ses jugements à Israël.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'Eternel reconstruit Jérusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il rassemble les exilés d'Israël;
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n'a pas agi de cette manière pour toutes les nations
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et elles ne connaissent pas ses jugements.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Louez l'Eternel!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il guérit ceux qui ont le cœur brisé
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et panse leurs blessures.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il compte le nombre des étoiles
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et leur donne à toutes un nom.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Notre Seigneur est grand, puissant par sa force.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Son intelligence est sans limite.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'Eternel soutient les malheureux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais il abaisse les méchants jusqu'à terre.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Chantez en l'honneur de l'Eternel avec reconnaissance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: célébrez notre Dieu avec la harpe!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il couvre le ciel de nuages,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il prépare la pluie pour la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il fait pousser l'herbe sur les montagnes.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il donne la nourriture au bétail
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et aux petits du corbeau quand ils crient.
