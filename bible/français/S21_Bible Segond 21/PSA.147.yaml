document_id: PSA.147
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La puissance de Dieu en faveur d'Israël
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Louez l'Eternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, il est bon de célébrer notre Dieu.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, il est agréable, il est convenable de le louer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: L'Eternel reconstruit Jérusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il rassemble les exilés d'Israël;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: il guérit ceux qui ont le cœur brisé
- type: usfm
  marker: q1
  children:
  - type: text
    text: et panse leurs blessures.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Il compte le nombre des étoiles
- type: usfm
  marker: q1
  children:
  - type: text
    text: et leur donne à toutes un nom.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Notre Seigneur est grand, puissant par sa force.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Son intelligence est sans limite.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: L'Eternel soutient les malheureux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais il abaisse les méchants jusqu'à terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Chantez en l'honneur de l'Eternel avec reconnaissance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: célébrez notre Dieu avec la harpe!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Il couvre le ciel de nuages,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il prépare la pluie pour la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il fait pousser l'herbe sur les montagnes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Il donne la nourriture au bétail
- type: usfm
  marker: q1
  children:
  - type: text
    text: et aux petits du corbeau quand ils crient.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ce n'est pas la vigueur du cheval qu'il apprécie, c
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'e n''est pas aux mollets de l''homme qu''il prend plaisir:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: l'Eternel prend plaisir en ceux qui le craignent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: en ceux qui s'attendent à sa bonté.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Jérusalem, célèbre l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sion, loue ton Dieu,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: car il renforce les verrous de tes portes
- type: usfm
  marker: q1
  children:
  - type: text
    text: ', il bénit tes fils au milieu de toi;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: il donne la paix à ton territoire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il te rassasie du meilleur blé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Il envoie ses ordres sur la terre:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: sa parole court avec rapidité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Il fait tomber la neige pareille à de la laine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il répand la gelée blanche comme de la cendre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il lance sa glace sous forme de grêlons:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui peut résister devant ce froid qu'il provoque?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Il envoie sa parole et il les fait fondre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il fait souffler son vent et l'eau coule.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Il révèle sa parole à Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ses prescriptions et ses jugements à Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Il n'a pas agi de cette manière pour toutes les nations
- type: usfm
  marker: q1
  children:
  - type: text
    text: et elles ne connaissent pas ses jugements.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Louez l'Eternel!
