document_id: PRO.4
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L'acquisition de la sagesse
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ecoutez, mes fils, l'instruction d'un père,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et soyez attentifs pour connaître l'intelligence,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: car je vous transmets un bon savoir.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne rejetez pas mon enseignement!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: J'étais un fils pour mon père,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un fils tendre et unique aux yeux de ma mère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il m''enseignait alors et me disait:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Que ton cœur retienne mes paroles!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Obéis à mes commandements et tu vivras.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Acquiers la sagesse, acquiers l'intelligence!
- type: usfm
  marker: q1
  children:
  - type: text
    text: N'oublie pas les paroles de ma bouche et ne t'en détourne pas!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ne l'abandonne pas et elle te gardera.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aime-la et elle te protégera.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Voici le commencement de la sagesse: acquiers la sagesse'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et avec tout ce que tu possèdes acquiers l'intelligence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tiens-la en haute estime et elle t'élèvera.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle fera ta gloire, quand tu l'embrasseras.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Elle mettra sur ta tête une couronne de grâce,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle t'ornera d'un magnifique diadème.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ecoute-moi, mon fils, fais bon accueil à mes paroles
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les années de ta vie seront nombreuses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Je t'enseigne la voie de la sagesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je te conduis dans les sentiers de la droiture.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Pendant ta marche, ton pas ne sera pas gêné,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et si tu cours, tu ne trébucheras pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Attache-toi à l'instruction, ne la délaisse pas!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Garde-la, car elle est ta vie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: N'emprunte pas le sentier des méchants
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ne t'avance pas sur le chemin des hommes mauvais.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Evite-le, n'y passe pas!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Détourne-toi de lui et passe plus loin!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: En effet, ils ne dorment pas tant qu'ils n'ont pas fait le mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le sommeil leur est enlevé s'ils n'ont pas fait trébucher quelqu'un.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Oui, le pain qu'ils mangent, c'est la méchanceté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le vin qu'ils boivent, c'est la violence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Le sentier des justes ressemble à la lumière de l''aube:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: son éclat grandit jusqu'au milieu du jour.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'La voie des méchants ressemble aux ténèbres:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils n'aperçoivent pas ce qui les fera trébucher.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Mon fils, sois attentif à mes paroles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tends l'oreille vers mes discours!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Qu'ils ne s'éloignent pas de tes yeux!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Garde-les au fond de ton cœur,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: car ils apportent la vie à ceux qui les trouvent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la guérison à tout leur corps.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Garde ton cœur plus que toute autre chose,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car de lui jaillissent les sources de la vie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ecarte de ta bouche la fausseté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: éloigne de tes lèvres les détours!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Que tes yeux regardent bien en face
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que tes paupières se dirigent droit devant toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: '*Fais une route droite pour tes pieds'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.26 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Fais… pieds: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hébreux 12.13
      metadata:
        usfm: HEB.12.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que toutes tes voies soient bien sûres!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ne dévie ni à droite ni à gauche
- type: usfm
  marker: q1
  children:
  - type: text
    text: et détourne ton pied du mal.
