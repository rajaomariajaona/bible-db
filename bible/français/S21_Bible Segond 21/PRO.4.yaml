document_id: PRO.4,152
type_code: fra
verses:
  '1':
  - type: heading
    content: L'acquisition de la sagesse
  - type: text
    content: Ecoutez, mes fils, l'instruction d'un père,
  - type: text
    content: et soyez attentifs pour connaître l'intelligence,
  '10':
  - type: text
    content: Ecoute-moi, mon fils, fais bon accueil à mes paroles
  - type: text
    content: et les années de ta vie seront nombreuses.
  '11':
  - type: text
    content: Je t'enseigne la voie de la sagesse,
  - type: text
    content: je te conduis dans les sentiers de la droiture.
  '12':
  - type: text
    content: Pendant ta marche, ton pas ne sera pas gêné,
  - type: text
    content: et si tu cours, tu ne trébucheras pas.
  '13':
  - type: text
    content: Attache-toi à l'instruction, ne la délaisse pas!
  - type: text
    content: Garde-la, car elle est ta vie.
  '14':
  - type: text
    content: N'emprunte pas le sentier des méchants
  - type: text
    content: et ne t'avance pas sur le chemin des hommes mauvais.
  '15':
  - type: text
    content: Evite-le, n'y passe pas!
  - type: text
    content: Détourne-toi de lui et passe plus loin!
  '16':
  - type: text
    content: En effet, ils ne dorment pas tant qu'ils n'ont pas fait le mal,
  - type: text
    content: le sommeil leur est enlevé s'ils n'ont pas fait trébucher quelqu'un.
  '17':
  - type: text
    content: Oui, le pain qu'ils mangent, c'est la méchanceté,
  - type: text
    content: le vin qu'ils boivent, c'est la violence.
  '18':
  - type: text
    content: 'Le sentier des justes ressemble à la lumière de l''aube:'
  - type: text
    content: son éclat grandit jusqu'au milieu du jour.
  '19':
  - type: text
    content: 'La voie des méchants ressemble aux ténèbres:'
  - type: text
    content: ils n'aperçoivent pas ce qui les fera trébucher.
  '2':
  - type: text
    content: car je vous transmets un bon savoir.
  - type: text
    content: Ne rejetez pas mon enseignement!
  '20':
  - type: text
    content: Mon fils, sois attentif à mes paroles,
  - type: text
    content: tends l'oreille vers mes discours!
  '21':
  - type: text
    content: Qu'ils ne s'éloignent pas de tes yeux!
  - type: text
    content: Garde-les au fond de ton cœur,
  '22':
  - type: text
    content: car ils apportent la vie à ceux qui les trouvent,
  - type: text
    content: la guérison à tout leur corps.
  '23':
  - type: text
    content: Garde ton cœur plus que toute autre chose,
  - type: text
    content: car de lui jaillissent les sources de la vie.
  '24':
  - type: text
    content: Ecarte de ta bouche la fausseté,
  - type: text
    content: éloigne de tes lèvres les détours!
  '25':
  - type: text
    content: Que tes yeux regardent bien en face
  - type: text
    content: et que tes paupières se dirigent droit devant toi.
  '26':
  - type: text
    content: '*Fais une route droite pour tes pieds'
  - type: note
    content: 'Fais… pieds: cité en Hébreux 12.13.'
  - type: text
    content: et que toutes tes voies soient bien sûres!
  '27':
  - type: text
    content: Ne dévie ni à droite ni à gauche
  - type: text
    content: et détourne ton pied du mal.
  '3':
  - type: text
    content: J'étais un fils pour mon père,
  - type: text
    content: un fils tendre et unique aux yeux de ma mère.
  '4':
  - type: text
    content: 'Il m''enseignait alors et me disait:'
  - type: text
    content: «Que ton cœur retienne mes paroles!
  - type: text
    content: Obéis à mes commandements et tu vivras.
  '5':
  - type: text
    content: Acquiers la sagesse, acquiers l'intelligence!
  - type: text
    content: N'oublie pas les paroles de ma bouche et ne t'en détourne pas!
  '6':
  - type: text
    content: Ne l'abandonne pas et elle te gardera.
  - type: text
    content: Aime-la et elle te protégera.»
  '7':
  - type: text
    content: 'Voici le commencement de la sagesse: acquiers la sagesse'
  - type: text
    content: et avec tout ce que tu possèdes acquiers l'intelligence.
  '8':
  - type: text
    content: Tiens-la en haute estime et elle t'élèvera.
  - type: text
    content: Elle fera ta gloire, quand tu l'embrasseras.
  '9':
  - type: text
    content: Elle mettra sur ta tête une couronne de grâce,
  - type: text
    content: elle t'ornera d'un magnifique diadème.
