document_id: JER.7
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Reproches et menaces
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Voici la parole adressée à Jérémie par l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: «Tiens-toi à la porte de la maison de l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et là tu proclameras cette parole,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'tu diras: ‘Ecoutez la parole de l''Eternel, vous tous, Judéens,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous qui entrez par ces portes
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour adorer l'Eternel!’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Voici ce que dit l''Eternel, le maître de l''univers, le Dieu d''Israël:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Corrigez votre conduite et votre manière d'agir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je vous laisserai habiter ici.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ne vous fiez pas aux paroles trompeuses qui prétendent:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘C'est ici qu'est le temple de l'Eternel, le temple de l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le temple de l'Eternel!’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: »Si vraiment vous corrigez votre conduite et votre manière d'agir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si vraiment vous faites justice aux uns et aux autres,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: si vous n'exploitez pas l'étranger, l'orphelin et la veuve,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si vous ne versez pas le sang innocent dans cet endroit
- type: usfm
  marker: q1
  children:
  - type: text
    text: et si vous ne vous tournez pas vers d'autres dieux pour votre malheur,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: alors je vous laisserai habiter ici,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans ce pays que j'ai donné à vos ancêtres
- type: usfm
  marker: q1
  children:
  - type: text
    text: depuis toujours et pour toujours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: »Mais voici que vous vous fiez à des paroles trompeuses
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui ne servent à rien.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Quoi! Vous vous permettez de voler, tuer, commettre des adultères,
- type: usfm
  marker: q1
  children:
  - type: text
    text: prêter serment de façon hypocrite, faire brûler de l'encens en l'honneur de Baal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: suivre d'autres dieux que vous ne connaissez pas,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: puis vous venez vous présenter devant moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans ce temple auquel mon nom est associé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et vous dites: ‘Nous avons été délivrés’!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et c'est pour commettre toutes ces horreurs!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Est-il à vos yeux *une caverne de voleurs
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Une caverne de voleurs: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: expression reprise par Jésus (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matthieu 21.13
      metadata:
        usfm: MAT.21.13
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Marc 11.17
      metadata:
        usfm: MRK.11.17
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Luc 19.46
      metadata:
        usfm: LUK.19.46
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) lorsqu'il a fait le ménage dans le temple.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: ce temple auquel mon nom est associé?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moi-même, je constate que tel est le cas, déclare l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: »Allez donc à l'endroit qui m'était consacré à Silo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: là où j'avais fait en premier résider mon nom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et voyez ce que j'en ai fait
- type: usfm
  marker: q1
  children:
  - type: text
    text: à cause de la méchanceté de mon peuple, d'Israël!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Et maintenant, puisque vous avez commis tous ces actes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: déclare l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: puisque je vous ai parlé et reparlé, inlassablement, et que vous n'avez pas écouté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: puisque je vous ai appelés et que vous n'avez pas répondu,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: je traiterai le temple auquel mon nom est associé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: auquel vous vous fiez,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l'endroit que je vous ai donné, à vous et à vos ancêtres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'de la même manière que j''ai traité Silo:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: je vous chasserai loin de moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme j'ai chassé tous vos frères,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toute la descendance d'Ephraïm.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: »Quant à toi, n'intercède pas en faveur de ce peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne fais monter pour eux ni supplications ni prières.
- type: usfm
  marker: q1
  children:
  - type: text
    text: N'insiste pas auprès de moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car je ne t'écouterai pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ne vois-tu pas ce qu'ils font dans les villes de Juda
- type: usfm
  marker: q1
  children:
  - type: text
    text: et dans les rues de Jérusalem?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Les enfants ramassent du bois,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les pères allument le feu
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les femmes pétrissent la pâte
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour préparer des gâteaux en l'honneur de la reine du ciel
- type: usfm
  marker: q1
  children:
  - type: text
    text: et verser des offrandes liquides en l'honneur d'autres dieux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de sorte qu'ils m'irritent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Est-ce moi qu'ils irritent – déclaration de l'Eternel –
- type: usfm
  marker: q1
  children:
  - type: text
    text: n'est-ce pas eux-mêmes, pour leur propre honte?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '»C''est pourquoi, voici ce que dit le Seigneur, l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ma colère et ma fureur vont se déverser contre cet endroit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur les hommes et sur les bêtes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur les arbres des champs et sur les fruits de la terre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elles brûleront sans plus s'éteindre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '»Voici ce que dit l''Eternel, le maître de l''univers, le Dieu d''Israël:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ajoutez vos holocaustes à vos sacrifices
- type: usfm
  marker: q1
  children:
  - type: text
    text: et mangez-en la viande!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: En effet, je n'ai pas parlé avec vos ancêtres, je ne leur ai donné aucun ordre
- type: usfm
  marker: q1
  children:
  - type: text
    text: au sujet des holocaustes et des sacrifices,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le jour où je les ai fait sortir d'Egypte.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Voici l''ordre que je leur ai donné:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Ecoutez ma voix
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je serai votre Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et vous mon peuple.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Marchez dans toutes les voies que je vous prescris
- type: usfm
  marker: q1
  children:
  - type: text
    text: afin d'être heureux!’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Cependant, ils n'ont pas écouté, ils n'ont pas tendu l'oreille.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ont persévéré dans les conseils et les penchants de leur cœur mauvais.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ont régressé au lieu de progresser.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: »Depuis le jour où vos ancêtres sont sortis d'Egypte jusqu'à aujourd'hui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je vous ai envoyé tous mes serviteurs, les prophètes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je les ai envoyés chaque jour, inlassablement,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: mais ils ne m'ont pas écouté, ils n'ont pas tendu l'oreille.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils se sont montrés réfractaires,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils ont fait le mal plus encore que leurs ancêtres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: »Tu leur diras tout cela, mais ils ne t'écouteront pas.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu les appelleras, mais ils ne te répondront pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Alors tu leur diras:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘C'est ici que se trouve la nation qui n'écoute pas la voix de l'Eternel, son Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui ne veut pas tenir compte de la correction.’
- type: usfm
  marker: q1
  children:
  - type: text
    text: La vérité a disparu, elle a été retirée de leur bouche.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: »Coupe tes cheveux et jette-les,
- type: usfm
  marker: q1
  children:
  - type: text
    text: entonne une complainte sur les hauteurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car l'Eternel rejette
- type: usfm
  marker: q1
  children:
  - type: text
    text: et abandonne la génération qui a provoqué sa colère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: En effet, les Judéens ont fait ce qui est mal à mes yeux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dit l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ont placé leurs monstrueuses idoles
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans le temple auquel mon nom est associé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de manière à le rendre impur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ils ont construit des hauts lieux à Topheth, dans la vallée de Ben-Hinnom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour livrer aux flammes leurs fils et leurs filles.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cela, je ne l'avais pas ordonné,
- type: usfm
  marker: q1
  children:
  - type: text
    text: cela ne m'était pas venu à la pensée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: »Voilà pourquoi les jours viennent, déclare l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: où l'on ne parlera plus de Topheth et de la vallée de Ben-Hinnom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais où l'on parlera de la vallée du carnage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l'on enterrera les morts à Topheth, faute de place.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Les cadavres de ce peuple serviront de nourriture
- type: usfm
  marker: q1
  children:
  - type: text
    text: aux oiseaux du ciel et aux bêtes de la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il n'y aura personne pour les faire fuir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Je ferai cesser dans les villes de Juda et dans les rues de Jérusalem
- type: usfm
  marker: q1
  children:
  - type: text
    text: les cris de réjouissance et de joie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les chants du fiancé et de la fiancée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car le pays sera en ruine.
