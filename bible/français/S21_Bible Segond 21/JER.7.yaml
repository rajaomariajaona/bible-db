document_id: JER.7,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Reproches et menaces
  - type: text
    content: Voici la parole adressée à Jérémie par l'Eternel.
  '10':
  - type: text
    content: puis vous venez vous présenter devant moi,
  - type: text
    content: dans ce temple auquel mon nom est associé,
  - type: text
    content: 'et vous dites: ‘Nous avons été délivrés’!'
  - type: text
    content: Et c'est pour commettre toutes ces horreurs!
  '11':
  - type: text
    content: Est-il à vos yeux *une caverne de voleurs
  - type: note
    content: 'Une caverne de voleurs: expression reprise par Jésus (Matthieu 21.13; Marc 11.17; Luc 19.46) lorsqu''il a fait le ménage dans le temple.'
  - type: text
    content: ','
  - type: text
    content: ce temple auquel mon nom est associé?
  - type: text
    content: Moi-même, je constate que tel est le cas, déclare l'Eternel.
  '12':
  - type: text
    content: »Allez donc à l'endroit qui m'était consacré à Silo,
  - type: text
    content: là où j'avais fait en premier résider mon nom,
  - type: text
    content: et voyez ce que j'en ai fait
  - type: text
    content: à cause de la méchanceté de mon peuple, d'Israël!
  '13':
  - type: text
    content: Et maintenant, puisque vous avez commis tous ces actes,
  - type: text
    content: déclare l'Eternel,
  - type: text
    content: puisque je vous ai parlé et reparlé, inlassablement, et que vous n'avez pas écouté,
  - type: text
    content: puisque je vous ai appelés et que vous n'avez pas répondu,
  '14':
  - type: text
    content: je traiterai le temple auquel mon nom est associé,
  - type: text
    content: auquel vous vous fiez,
  - type: text
    content: et l'endroit que je vous ai donné, à vous et à vos ancêtres,
  - type: text
    content: 'de la même manière que j''ai traité Silo:'
  '15':
  - type: text
    content: je vous chasserai loin de moi,
  - type: text
    content: comme j'ai chassé tous vos frères,
  - type: text
    content: toute la descendance d'Ephraïm.
  '16':
  - type: text
    content: »Quant à toi, n'intercède pas en faveur de ce peuple,
  - type: text
    content: ne fais monter pour eux ni supplications ni prières.
  - type: text
    content: N'insiste pas auprès de moi,
  - type: text
    content: car je ne t'écouterai pas.
  '17':
  - type: text
    content: Ne vois-tu pas ce qu'ils font dans les villes de Juda
  - type: text
    content: et dans les rues de Jérusalem?
  '18':
  - type: text
    content: Les enfants ramassent du bois,
  - type: text
    content: les pères allument le feu
  - type: text
    content: et les femmes pétrissent la pâte
  - type: text
    content: pour préparer des gâteaux en l'honneur de la reine du ciel
  - type: text
    content: et verser des offrandes liquides en l'honneur d'autres dieux,
  - type: text
    content: de sorte qu'ils m'irritent.
  '19':
  - type: text
    content: Est-ce moi qu'ils irritent – déclaration de l'Eternel –
  - type: text
    content: n'est-ce pas eux-mêmes, pour leur propre honte?
  '2':
  - type: text
    content: «Tiens-toi à la porte de la maison de l'Eternel,
  - type: text
    content: et là tu proclameras cette parole,
  - type: text
    content: 'tu diras: ‘Ecoutez la parole de l''Eternel, vous tous, Judéens,'
  - type: text
    content: vous qui entrez par ces portes
  - type: text
    content: pour adorer l'Eternel!’
  '20':
  - type: text
    content: '»C''est pourquoi, voici ce que dit le Seigneur, l''Eternel:'
  - type: text
    content: Ma colère et ma fureur vont se déverser contre cet endroit,
  - type: text
    content: sur les hommes et sur les bêtes,
  - type: text
    content: sur les arbres des champs et sur les fruits de la terre.
  - type: text
    content: Elles brûleront sans plus s'éteindre.
  '21':
  - type: text
    content: '»Voici ce que dit l''Eternel, le maître de l''univers, le Dieu d''Israël:'
  - type: text
    content: Ajoutez vos holocaustes à vos sacrifices
  - type: text
    content: et mangez-en la viande!
  '22':
  - type: text
    content: En effet, je n'ai pas parlé avec vos ancêtres, je ne leur ai donné aucun ordre
  - type: text
    content: au sujet des holocaustes et des sacrifices,
  - type: text
    content: le jour où je les ai fait sortir d'Egypte.
  '23':
  - type: text
    content: 'Voici l''ordre que je leur ai donné:'
  - type: text
    content: ‘Ecoutez ma voix
  - type: text
    content: et je serai votre Dieu,
  - type: text
    content: et vous mon peuple.
  - type: text
    content: Marchez dans toutes les voies que je vous prescris
  - type: text
    content: afin d'être heureux!’
  '24':
  - type: text
    content: Cependant, ils n'ont pas écouté, ils n'ont pas tendu l'oreille.
  - type: text
    content: Ils ont persévéré dans les conseils et les penchants de leur cœur mauvais.
  - type: text
    content: Ils ont régressé au lieu de progresser.
  '25':
  - type: text
    content: »Depuis le jour où vos ancêtres sont sortis d'Egypte jusqu'à aujourd'hui,
  - type: text
    content: je vous ai envoyé tous mes serviteurs, les prophètes.
  - type: text
    content: Je les ai envoyés chaque jour, inlassablement,
  '26':
  - type: text
    content: mais ils ne m'ont pas écouté, ils n'ont pas tendu l'oreille.
  - type: text
    content: Ils se sont montrés réfractaires,
  - type: text
    content: ils ont fait le mal plus encore que leurs ancêtres.
  '27':
  - type: text
    content: »Tu leur diras tout cela, mais ils ne t'écouteront pas.
  - type: text
    content: Tu les appelleras, mais ils ne te répondront pas.
  '28':
  - type: text
    content: 'Alors tu leur diras:'
  - type: text
    content: ‘C'est ici que se trouve la nation qui n'écoute pas la voix de l'Eternel, son Dieu,
  - type: text
    content: et qui ne veut pas tenir compte de la correction.’
  - type: text
    content: La vérité a disparu, elle a été retirée de leur bouche.
  '29':
  - type: text
    content: »Coupe tes cheveux et jette-les,
  - type: text
    content: entonne une complainte sur les hauteurs,
  - type: text
    content: car l'Eternel rejette
  - type: text
    content: et abandonne la génération qui a provoqué sa colère.
  '3':
  - type: text
    content: 'Voici ce que dit l''Eternel, le maître de l''univers, le Dieu d''Israël:'
  - type: text
    content: Corrigez votre conduite et votre manière d'agir,
  - type: text
    content: et je vous laisserai habiter ici.
  '30':
  - type: text
    content: En effet, les Judéens ont fait ce qui est mal à mes yeux,
  - type: text
    content: dit l'Eternel.
  - type: text
    content: Ils ont placé leurs monstrueuses idoles
  - type: text
    content: dans le temple auquel mon nom est associé,
  - type: text
    content: de manière à le rendre impur.
  '31':
  - type: text
    content: Ils ont construit des hauts lieux à Topheth, dans la vallée de Ben-Hinnom,
  - type: text
    content: pour livrer aux flammes leurs fils et leurs filles.
  - type: text
    content: Cela, je ne l'avais pas ordonné,
  - type: text
    content: cela ne m'était pas venu à la pensée.
  '32':
  - type: text
    content: »Voilà pourquoi les jours viennent, déclare l'Eternel,
  - type: text
    content: où l'on ne parlera plus de Topheth et de la vallée de Ben-Hinnom,
  - type: text
    content: mais où l'on parlera de la vallée du carnage,
  - type: text
    content: et l'on enterrera les morts à Topheth, faute de place.
  '33':
  - type: text
    content: Les cadavres de ce peuple serviront de nourriture
  - type: text
    content: aux oiseaux du ciel et aux bêtes de la terre,
  - type: text
    content: et il n'y aura personne pour les faire fuir.
  '34':
  - type: text
    content: Je ferai cesser dans les villes de Juda et dans les rues de Jérusalem
  - type: text
    content: les cris de réjouissance et de joie,
  - type: text
    content: les chants du fiancé et de la fiancée,
  - type: text
    content: car le pays sera en ruine.
  '4':
  - type: text
    content: 'Ne vous fiez pas aux paroles trompeuses qui prétendent:'
  - type: text
    content: ‘C'est ici qu'est le temple de l'Eternel, le temple de l'Eternel,
  - type: text
    content: le temple de l'Eternel!’
  '5':
  - type: text
    content: »Si vraiment vous corrigez votre conduite et votre manière d'agir,
  - type: text
    content: si vraiment vous faites justice aux uns et aux autres,
  '6':
  - type: text
    content: si vous n'exploitez pas l'étranger, l'orphelin et la veuve,
  - type: text
    content: si vous ne versez pas le sang innocent dans cet endroit
  - type: text
    content: et si vous ne vous tournez pas vers d'autres dieux pour votre malheur,
  '7':
  - type: text
    content: alors je vous laisserai habiter ici,
  - type: text
    content: dans ce pays que j'ai donné à vos ancêtres
  - type: text
    content: depuis toujours et pour toujours.
  '8':
  - type: text
    content: »Mais voici que vous vous fiez à des paroles trompeuses
  - type: text
    content: qui ne servent à rien.
  '9':
  - type: text
    content: Quoi! Vous vous permettez de voler, tuer, commettre des adultères,
  - type: text
    content: prêter serment de façon hypocrite, faire brûler de l'encens en l'honneur de Baal,
  - type: text
    content: suivre d'autres dieux que vous ne connaissez pas,
