document_id: SNG.2
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Je suis un narcisse du Saron,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un lis des vallées.
- type: usfm
  marker: sp
  children:
  - type: text
    text: Le jeune homme
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Pareille à un lis au milieu des ronces,
- type: usfm
  marker: q1
  children:
  - type: text
    text: telle est mon amie parmi les filles.
- type: usfm
  marker: sp
  children:
  - type: text
    text: La jeune femme
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Pareil à un pommier au milieu des arbres de la forêt,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tel est mon bien-aimé parmi les jeunes hommes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: J'aime m'asseoir à son ombre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et son fruit est doux à mon goût.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Il m'a fait entrer dans la maison du vin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l'étendard qu'il déploie au-dessus de moi, c'est l'amour.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Soutenez-moi avec des gâteaux de raisins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fortifiez-moi avec des pommes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car je suis malade d'amour!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Que sa main gauche soutienne ma tête
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que de sa main droite il m'enlace!
- type: usfm
  marker: sp
  children:
  - type: text
    text: Le jeune homme
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Je vous en supplie, filles de Jérusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: par les gazelles et les biches des champs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne réveillez pas, ne réveillez pas l'amour
- type: usfm
  marker: q1
  children:
  - type: text
    text: avant qu'elle ne le veuille!
- type: usfm
  marker: sp
  children:
  - type: text
    text: La jeune femme
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: C'est la voix de mon bien-aimé! Le voici qui arrive,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sautant sur les montagnes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: bondissant sur les collines.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mon bien-aimé est pareil à la gazelle
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ou au jeune cerf. Le voici: il se tient derrière notre mur,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: observant par la fenêtre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: regardant par le treillis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Mon bien-aimé parle et me dit:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Lève-toi, mon amie, ma belle, et viens!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: En effet, l'hiver est passé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la pluie a cessé, elle s'en est allée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Les fleurs apparaissent dans le pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le temps de chanter est arrivé
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l'on entend le roucoulement de la tourterelle dans notre pays.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Le figuier embaume par ses fruits
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les vignes en fleur répandent leur parfum.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lève-toi, mon amie, ma belle, et viens!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ma colombe, toi qui te tiens dans les fentes du rocher,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui te caches dans les parois escarpées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fais-moi voir ta figure, fais-moi entendre ta voix,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car ta voix est douce et ta figure est charmante!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Attrapez pour nous les renards,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les petits renards qui dévastent les vignes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car nos vignes sont en fleur!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Mon bien-aimé est à moi, et moi je suis à lui.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il conduit son troupeau parmi les lis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Avant que la brise du jour ne souffle
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que les ombres ne fuient,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tourne-toi! Montre-toi pareil, mon bien-aimé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à la gazelle ou au jeune cerf,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur les montagnes rocailleuses!
