document_id: SNG.2,152
type_code: fra
verses:
  '1':
  - type: text
    content: Je suis un narcisse du Saron,
  - type: text
    content: un lis des vallées.
  - type: heading
    content: Le jeune homme
  '10':
  - type: text
    content: 'Mon bien-aimé parle et me dit:'
  - type: text
    content: «Lève-toi, mon amie, ma belle, et viens!
  '11':
  - type: text
    content: En effet, l'hiver est passé,
  - type: text
    content: la pluie a cessé, elle s'en est allée.
  '12':
  - type: text
    content: Les fleurs apparaissent dans le pays,
  - type: text
    content: le temps de chanter est arrivé
  - type: text
    content: et l'on entend le roucoulement de la tourterelle dans notre pays.
  '13':
  - type: text
    content: Le figuier embaume par ses fruits
  - type: text
    content: et les vignes en fleur répandent leur parfum.
  - type: text
    content: Lève-toi, mon amie, ma belle, et viens!
  '14':
  - type: text
    content: Ma colombe, toi qui te tiens dans les fentes du rocher,
  - type: text
    content: qui te caches dans les parois escarpées,
  - type: text
    content: fais-moi voir ta figure, fais-moi entendre ta voix,
  - type: text
    content: car ta voix est douce et ta figure est charmante!»
  '15':
  - type: text
    content: Attrapez pour nous les renards,
  - type: text
    content: les petits renards qui dévastent les vignes,
  - type: text
    content: car nos vignes sont en fleur!
  '16':
  - type: text
    content: Mon bien-aimé est à moi, et moi je suis à lui.
  - type: text
    content: Il conduit son troupeau parmi les lis.
  '17':
  - type: text
    content: Avant que la brise du jour ne souffle
  - type: text
    content: et que les ombres ne fuient,
  - type: text
    content: tourne-toi! Montre-toi pareil, mon bien-aimé,
  - type: text
    content: à la gazelle ou au jeune cerf,
  - type: text
    content: sur les montagnes rocailleuses!
  '2':
  - type: text
    content: Pareille à un lis au milieu des ronces,
  - type: text
    content: telle est mon amie parmi les filles.
  - type: heading
    content: La jeune femme
  '3':
  - type: text
    content: Pareil à un pommier au milieu des arbres de la forêt,
  - type: text
    content: tel est mon bien-aimé parmi les jeunes hommes.
  - type: text
    content: J'aime m'asseoir à son ombre,
  - type: text
    content: et son fruit est doux à mon goût.
  '4':
  - type: text
    content: Il m'a fait entrer dans la maison du vin,
  - type: text
    content: et l'étendard qu'il déploie au-dessus de moi, c'est l'amour.
  '5':
  - type: text
    content: Soutenez-moi avec des gâteaux de raisins,
  - type: text
    content: fortifiez-moi avec des pommes,
  - type: text
    content: car je suis malade d'amour!
  '6':
  - type: text
    content: Que sa main gauche soutienne ma tête
  - type: text
    content: et que de sa main droite il m'enlace!
  - type: heading
    content: Le jeune homme
  '7':
  - type: text
    content: Je vous en supplie, filles de Jérusalem,
  - type: text
    content: par les gazelles et les biches des champs,
  - type: text
    content: ne réveillez pas, ne réveillez pas l'amour
  - type: text
    content: avant qu'elle ne le veuille!
  - type: heading
    content: La jeune femme
  '8':
  - type: text
    content: C'est la voix de mon bien-aimé! Le voici qui arrive,
  - type: text
    content: sautant sur les montagnes,
  - type: text
    content: bondissant sur les collines.
  '9':
  - type: text
    content: Mon bien-aimé est pareil à la gazelle
  - type: text
    content: 'ou au jeune cerf. Le voici: il se tient derrière notre mur,'
  - type: text
    content: observant par la fenêtre,
  - type: text
    content: regardant par le treillis.
