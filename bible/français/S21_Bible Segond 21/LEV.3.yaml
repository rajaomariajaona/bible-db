document_id: LEV.3,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Le sacrifice de communion
  - type: text
    content: '»Lorsque quelqu''un offrira à l''Eternel un sacrifice de communion, s''il offre du gros bétail, mâle ou femelle, il l''offrira sans défaut devant l''Eternel. '
  '10':
  - type: text
    content: 'les deux rognons et la graisse qui les entoure, qui couvre les flancs, et le grand lobe du foie, qu''il détachera près des rognons. '
  '11':
  - type: text
    content: Le prêtre brûlera cela sur l'autel. C'est l'aliment d'un sacrifice passé par le feu pour l'Eternel.
  '12':
  - type: text
    content: '»Si son offrande est une chèvre, il la présentera devant l''Eternel. '
  '13':
  - type: text
    content: 'Il posera sa main sur la tête de sa victime et l''égorgera devant la tente de la rencontre. Les descendants d''Aaron en verseront le sang sur tout le pourtour de l''autel. '
  '14':
  - type: text
    content: 'De la victime, il offrira en sacrifice passé par le feu pour l''Eternel la graisse qui couvre les entrailles et toute celle qui y est attachée, '
  '15':
  - type: text
    content: 'les deux rognons et la graisse qui les entoure, qui couvre les flancs, et le grand lobe du foie, qu''il détachera près des rognons. '
  '16':
  - type: text
    content: Le prêtre brûlera cela sur l'autel. Toute la graisse est l'aliment d'un sacrifice passé par le feu, dont l'odeur est agréable à l'Eternel.
  '17':
  - type: text
    content: '»C''est une prescription perpétuelle pour vous au fil des générations, partout où vous habiterez: vous ne mangerez ni graisse ni sang.»'
  '2':
  - type: text
    content: 'Il posera sa main sur la tête de la victime et l''égorgera à l''entrée de la tente de la rencontre. Les prêtres, les descendants d''Aaron, verseront le sang sur tout le pourtour de l''autel. '
  '3':
  - type: text
    content: 'De ce sacrifice de communion, il offrira en sacrifice passé par le feu pour l''Eternel la graisse qui couvre les entrailles et toute celle qui y est attachée, '
  '4':
  - type: text
    content: 'les deux rognons et la graisse qui les entoure, qui couvre les flancs, et le grand lobe du foie, qu''il détachera près des rognons. '
  '5':
  - type: text
    content: Les descendants d'Aaron brûleront cela sur l'autel, par-dessus l'holocauste qui sera sur le bois mis au feu. C'est un sacrifice passé par le feu, dont l'odeur est agréable à l'Eternel.
  '6':
  - type: text
    content: '»S''il offre du petit bétail, mâle ou femelle, en sacrifice de communion à l''Eternel, il l''offrira sans défaut. '
  '7':
  - type: text
    content: 'S''il offre en sacrifice un agneau, il le présentera devant l''Eternel. '
  '8':
  - type: text
    content: 'Il posera sa main sur la tête de la victime et l''égorgera devant la tente de la rencontre. Les descendants d''Aaron en verseront le sang sur tout le pourtour de l''autel. '
  '9':
  - type: text
    content: 'De ce sacrifice de communion, il offrira en sacrifice passé par le feu pour l''Eternel la graisse, la queue entière, qu''il séparera près de l''échine, la graisse qui couvre les entrailles et toute celle qui y est attachée, '
