document_id: LEV.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le sacrifice de communion
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '»Lorsque quelqu''un offrira à l''Eternel un sacrifice de communion, s''il offre du gros bétail, mâle ou femelle, il l''offrira sans défaut devant l''Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il posera sa main sur la tête de la victime et l''égorgera à l''entrée de la tente de la rencontre. Les prêtres, les descendants d''Aaron, verseront le sang sur tout le pourtour de l''autel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'De ce sacrifice de communion, il offrira en sacrifice passé par le feu pour l''Eternel la graisse qui couvre les entrailles et toute celle qui y est attachée, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'les deux rognons et la graisse qui les entoure, qui couvre les flancs, et le grand lobe du foie, qu''il détachera près des rognons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Les descendants d'Aaron brûleront cela sur l'autel, par-dessus l'holocauste qui sera sur le bois mis au feu. C'est un sacrifice passé par le feu, dont l'odeur est agréable à l'Eternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '»S''il offre du petit bétail, mâle ou femelle, en sacrifice de communion à l''Eternel, il l''offrira sans défaut. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'S''il offre en sacrifice un agneau, il le présentera devant l''Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Il posera sa main sur la tête de la victime et l''égorgera devant la tente de la rencontre. Les descendants d''Aaron en verseront le sang sur tout le pourtour de l''autel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'De ce sacrifice de communion, il offrira en sacrifice passé par le feu pour l''Eternel la graisse, la queue entière, qu''il séparera près de l''échine, la graisse qui couvre les entrailles et toute celle qui y est attachée, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'les deux rognons et la graisse qui les entoure, qui couvre les flancs, et le grand lobe du foie, qu''il détachera près des rognons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Le prêtre brûlera cela sur l'autel. C'est l'aliment d'un sacrifice passé par le feu pour l'Eternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '»Si son offrande est une chèvre, il la présentera devant l''Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il posera sa main sur la tête de sa victime et l''égorgera devant la tente de la rencontre. Les descendants d''Aaron en verseront le sang sur tout le pourtour de l''autel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'De la victime, il offrira en sacrifice passé par le feu pour l''Eternel la graisse qui couvre les entrailles et toute celle qui y est attachée, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'les deux rognons et la graisse qui les entoure, qui couvre les flancs, et le grand lobe du foie, qu''il détachera près des rognons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Le prêtre brûlera cela sur l'autel. Toute la graisse est l'aliment d'un sacrifice passé par le feu, dont l'odeur est agréable à l'Eternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '»C''est une prescription perpétuelle pour vous au fil des générations, partout où vous habiterez: vous ne mangerez ni graisse ni sang.»'
