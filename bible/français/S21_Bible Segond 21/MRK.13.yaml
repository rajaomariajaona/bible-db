document_id: MRK.13,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Discours sur le mont des Oliviers
  - type: text
    content: 'Lorsque Jésus sortit du temple, un de ses disciples lui dit: «Maître, regarde: quelles pierres et quelles constructions!» '
  '10':
  - type: text
    content: 'Il faut d''abord que la bonne nouvelle soit proclamée à toutes les nations. '
  '11':
  - type: text
    content: 'Quand on vous emmènera pour vous faire arrêter, ne vous inquiétez pas d''avance de ce que vous direz, mais dites ce qui vous sera donné au moment même. En effet, ce n''est pas vous qui parlerez, mais l''Esprit saint. '
  '12':
  - type: text
    content: 'Le frère livrera son frère à la mort, et le père son enfant; les enfants se soulèveront contre leurs parents et les feront mourir. '
  '13':
  - type: text
    content: Vous serez détestés de tous à cause de mon nom, mais celui qui persévérera jusqu'à la fin sera sauvé.
  '14':
  - type: text
    content: »Lorsque vous verrez l'abominable dévastation
  - type: note
    content: 'L''abominable dévastation: littéralement l''abomination de la dévastation, expression reprise de Daniel 11.31; 12.11.'
  - type: text
    content: ' [dont a parlé le prophète Daniel] établie là où elle ne doit pas être – que celui qui lit fasse attention – alors, que ceux qui seront en Judée s''enfuient dans les montagnes, '
  '15':
  - type: text
    content: 'que celui qui sera sur le toit ne descende pas et n''entre pas dans sa maison pour prendre quelque chose, '
  '16':
  - type: text
    content: 'et que celui qui sera dans les champs ne retourne pas en arrière pour prendre son manteau. '
  '17':
  - type: text
    content: 'Malheur aux femmes qui seront enceintes et à celles qui allaiteront durant ces jours-là! '
  '18':
  - type: text
    content: 'Priez pour que cela n''arrive pas en hiver, '
  '19':
  - type: text
    content: car ces jours-là, la détresse sera telle qu'il n'y en a pas eu de pareille depuis le commencement du monde
  - type: note
    content: 'Car… monde: citation de Daniel 12.1.'
  - type: text
    content: ' que Dieu a créé jusqu''à présent et qu''il n''y en aura jamais plus. '
  '2':
  - type: text
    content: 'Jésus lui répondit: «Vois-tu ces grandes constructions? Il ne restera pas pierre sur pierre, tout sera détruit.»'
  '20':
  - type: text
    content: 'Et si le Seigneur n''avait pas abrégé ces jours, personne ne serait sauvé; mais il les a abrégés à cause des élus, de ceux qu''il a choisis. '
  '21':
  - type: text
    content: 'Si quelqu''un vous dit alors: ‘Le Messie est ici’ ou: ‘Il est là’, ne le croyez pas, '
  '22':
  - type: text
    content: 'car de prétendus messies et de prétendus prophètes surgiront; ils feront des prodiges et des signes miraculeux pour tromper, si c''était possible, [même] ceux qui ont été choisis. '
  '23':
  - type: text
    content: 'Soyez sur vos gardes: je vous ai tout annoncé d''avance. '
  '24':
  - type: text
    content: 'Mais ces jours-là, après ce temps de détresse, '
  - type: text
    content: le soleil s'obscurcira, la lune ne donnera plus sa lumière,
  - type: text
    content: ' '
  '25':
  - type: text
    content: les étoiles tomberont du ciel
  - type: note
    content: 'Le soleil… ciel: citation combinée d''Esaïe 13.10 et 34.4.'
  - type: text
    content: ' et les puissances célestes seront ébranlées. '
  '26':
  - type: text
    content: 'Alors on verra '
  - type: text
    content: le Fils de l'homme venir sur les nuées
  - type: note
    content: 'Le Fils… nuées: citation de Daniel 7.13.'
  - type: text
    content: ' avec beaucoup de puissance et de gloire. '
  '27':
  - type: text
    content: 'Il enverra ses anges et rassemblera ceux qu''il a choisis des quatre coins du monde, de l''extrémité de la terre jusqu''à l''extrémité du ciel. '
  '28':
  - type: text
    content: 'Tirez instruction de la parabole du figuier: dès que ses branches deviennent tendres et que les feuilles poussent, vous savez que l''été est proche. '
  '29':
  - type: text
    content: 'De même, quand vous verrez ces choses arriver, sachez que le Fils de l''homme est proche, qu''il est à la porte. '
  '3':
  - type: text
    content: 'Puis il s''assit sur le mont des Oliviers, en face du temple. Pierre, Jacques, Jean et André lui posèrent en privé cette question: '
  '30':
  - type: text
    content: 'Je vous le dis en vérité, cette génération ne passera pas avant que tout cela n''arrive. '
  '31':
  - type: text
    content: Le ciel et la terre disparaîtront, mais mes paroles ne disparaîtront pas.
  '32':
  - type: text
    content: '»Quant au jour et à l''heure, personne ne les connaît, pas même les anges dans le ciel ni le Fils: le Père seul les connaît. '
  '33':
  - type: text
    content: 'Faites bien attention, restez en éveil et priez, car vous ignorez quand ce temps viendra. '
  '34':
  - type: text
    content: 'Cela se passera comme pour un homme qui part en voyage: il laisse sa maison, remet l''autorité à ses serviteurs, indique à chacun son travail et ordonne au portier de rester éveillé. '
  '35':
  - type: text
    content: 'Restez donc vigilants, car vous ne savez pas quand viendra le maître de la maison: le soir, ou au milieu de la nuit, ou au chant du coq, ou le matin. '
  '36':
  - type: text
    content: 'Qu''il ne vous trouve pas endormis quand il arrivera tout à coup! '
  '37':
  - type: text
    content: 'Ce que je vous dis, je le dis à tous: Restez vigilants.»'
  '4':
  - type: text
    content: '«Dis-nous: quand cela arrivera-t-il et à quel signe reconnaîtra-t-on que tous ces événements vont s''accomplir?»'
  '5':
  - type: text
    content: 'Jésus se mit alors à leur dire: «Faites bien attention que personne ne vous égare. '
  '6':
  - type: text
    content: 'En effet, beaucoup viendront sous mon nom et diront: ‘C''est moi.’ Et ils tromperont beaucoup de gens. '
  '7':
  - type: text
    content: 'Quand vous entendrez parler de guerres et de menaces de guerres, ne vous laissez pas effrayer, car il faut que ces choses arrivent. Cependant, ce ne sera pas encore la fin. '
  '8':
  - type: text
    content: Une nation se dressera contre une nation et un royaume contre un royaume
  - type: note
    content: 'Une nation… royaume: renvoi à Esaïe 19.2.'
  - type: text
    content: '; en divers endroits il y aura des tremblements de terre, il y aura des famines [et des troubles]. Ce sera le commencement des douleurs. '
  '9':
  - type: text
    content: 'Faites attention à vous-mêmes. On vous livrera aux tribunaux et vous serez battus dans les synagogues; vous comparaîtrez devant des gouverneurs et devant des rois à cause de moi pour leur apporter votre témoignage. '
