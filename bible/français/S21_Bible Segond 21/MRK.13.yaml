document_id: MRK.13
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Discours sur le mont des Oliviers
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Lorsque Jésus sortit du temple, un de ses disciples lui dit: «Maître, regarde: quelles pierres et quelles constructions!» '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Jésus lui répondit: «Vois-tu ces grandes constructions? Il ne restera pas pierre sur pierre, tout sera détruit.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Puis il s''assit sur le mont des Oliviers, en face du temple. Pierre, Jacques, Jean et André lui posèrent en privé cette question: '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '«Dis-nous: quand cela arrivera-t-il et à quel signe reconnaîtra-t-on que tous ces événements vont s''accomplir?»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Jésus se mit alors à leur dire: «Faites bien attention que personne ne vous égare. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'En effet, beaucoup viendront sous mon nom et diront: ‘C''est moi.’ Et ils tromperont beaucoup de gens. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Quand vous entendrez parler de guerres et de menaces de guerres, ne vous laissez pas effrayer, car il faut que ces choses arrivent. Cependant, ce ne sera pas encore la fin. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Une nation se dressera contre une nation et un royaume contre un royaume
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Une nation… royaume: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'renvoi à '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Esaïe 19.2
      metadata:
        usfm: ISA.19.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '; en divers endroits il y aura des tremblements de terre, il y aura des famines [et des troubles]. Ce sera le commencement des douleurs. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Faites attention à vous-mêmes. On vous livrera aux tribunaux et vous serez battus dans les synagogues; vous comparaîtrez devant des gouverneurs et devant des rois à cause de moi pour leur apporter votre témoignage. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il faut d''abord que la bonne nouvelle soit proclamée à toutes les nations. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Quand on vous emmènera pour vous faire arrêter, ne vous inquiétez pas d''avance de ce que vous direz, mais dites ce qui vous sera donné au moment même. En effet, ce n''est pas vous qui parlerez, mais l''Esprit saint. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Le frère livrera son frère à la mort, et le père son enfant; les enfants se soulèveront contre leurs parents et les feront mourir. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Vous serez détestés de tous à cause de mon nom, mais celui qui persévérera jusqu'à la fin sera sauvé.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: »Lorsque vous verrez l'abominable dévastation
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'L''abominable dévastation: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'littéralement l''abomination de la dévastation, expression reprise de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Daniel 11.31
      metadata:
        usfm: DAN.11.31
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '12.11'
      metadata:
        usfm: DAN.12.11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' [dont a parlé le prophète Daniel] établie là où elle ne doit pas être – que celui qui lit fasse attention – alors, que ceux qui seront en Judée s''enfuient dans les montagnes, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'que celui qui sera sur le toit ne descende pas et n''entre pas dans sa maison pour prendre quelque chose, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'et que celui qui sera dans les champs ne retourne pas en arrière pour prendre son manteau. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Malheur aux femmes qui seront enceintes et à celles qui allaiteront durant ces jours-là! '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Priez pour que cela n''arrive pas en hiver, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: car ces jours-là, la détresse sera telle qu'il n'y en a pas eu de pareille depuis le commencement du monde
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Car… monde: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Daniel 12.1
      metadata:
        usfm: DAN.12.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' que Dieu a créé jusqu''à présent et qu''il n''y en aura jamais plus. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Et si le Seigneur n''avait pas abrégé ces jours, personne ne serait sauvé; mais il les a abrégés à cause des élus, de ceux qu''il a choisis. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Si quelqu''un vous dit alors: ‘Le Messie est ici’ ou: ‘Il est là’, ne le croyez pas, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'car de prétendus messies et de prétendus prophètes surgiront; ils feront des prodiges et des signes miraculeux pour tromper, si c''était possible, [même] ceux qui ont été choisis. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Soyez sur vos gardes: je vous ai tout annoncé d''avance. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Mais ces jours-là, après ce temps de détresse, '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: le soleil s'obscurcira, la lune ne donnera plus sa lumière,
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: les étoiles tomberont du ciel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.24-25 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le soleil… ciel: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation combinée d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Esaïe 13.10
      metadata:
        usfm: ISA.13.10
    - type: text
      text: ' et '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '34.4'
      metadata:
        usfm: ISA.34.4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' et les puissances célestes seront ébranlées. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Alors on verra '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: le Fils de l'homme venir sur les nuées
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.26 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le Fils… nuées: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Daniel 7.13
      metadata:
        usfm: DAN.7.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' avec beaucoup de puissance et de gloire. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Il enverra ses anges et rassemblera ceux qu''il a choisis des quatre coins du monde, de l''extrémité de la terre jusqu''à l''extrémité du ciel. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Tirez instruction de la parabole du figuier: dès que ses branches deviennent tendres et que les feuilles poussent, vous savez que l''été est proche. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'De même, quand vous verrez ces choses arriver, sachez que le Fils de l''homme est proche, qu''il est à la porte. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Je vous le dis en vérité, cette génération ne passera pas avant que tout cela n''arrive. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Le ciel et la terre disparaîtront, mais mes paroles ne disparaîtront pas.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: '»Quant au jour et à l''heure, personne ne les connaît, pas même les anges dans le ciel ni le Fils: le Père seul les connaît. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Faites bien attention, restez en éveil et priez, car vous ignorez quand ce temps viendra. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Cela se passera comme pour un homme qui part en voyage: il laisse sa maison, remet l''autorité à ses serviteurs, indique à chacun son travail et ordonne au portier de rester éveillé. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Restez donc vigilants, car vous ne savez pas quand viendra le maître de la maison: le soir, ou au milieu de la nuit, ou au chant du coq, ou le matin. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Qu''il ne vous trouve pas endormis quand il arrivera tout à coup! '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ce que je vous dis, je le dis à tous: Restez vigilants.»'
