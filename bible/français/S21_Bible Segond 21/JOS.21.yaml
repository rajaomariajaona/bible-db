document_id: JOS.21
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Désignation des 48 villes des Lévites
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Les chefs de famille des Lévites s''approchèrent du prêtre Eléazar, de Josué, fils de Nun, et des chefs de famille des tribus israélites. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ils leur dirent à Silo, dans le pays de Canaan: «L''Eternel a ordonné, par l''intermédiaire de Moïse, qu''on nous donne des villes pour y habiter, ainsi que leurs environs pour notre bétail.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Conformément à l'ordre de l'Eternel, les Israélites donnèrent alors aux Lévites, en prenant sur leur héritage, des villes et leurs environs.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'On tira au sort pour les clans des Kehathites. Les Lévites qui descendaient du prêtre Aaron eurent par tirage au sort 13 villes des tribus de Juda, de Siméon et de Benjamin. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Les autres descendants de Kehath eurent par tirage au sort 10 villes qui appartenaient aux clans de la tribu d''Ephraïm, à la tribu de Dan et à la demi-tribu de Manassé. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Les descendants de Guershon eurent par le sort 13 villes qui appartenaient aux clans de la tribu d''Issacar, à la tribu d''Aser, à celle de Nephthali et à la demi-tribu de Manassé installée en Basan. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Les clans des descendants de Merari eurent 12 villes qui appartenaient aux tribus de Ruben, de Gad et de Zabulon. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Les Israélites donnèrent par tirage au sort ces villes et leurs environs aux Lévites, comme l'Eternel l'avait ordonné par l'intermédiaire de Moïse.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Parmi les villes qui appartenaient aux tribus des Judéens et des Siméonites, ils donnèrent les villes qui vont être désignées par leur nom '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'et qui furent pour ceux qui descendaient d''Aaron parmi les clans des Kehathites et des descendants de Lévi. En effet, le sort les avait indiqués les premiers. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ils leur donnèrent Kirjath-Arba, c''est-à-dire Hébron dans la région montagneuse de Juda, avec ses environs, le territoire qui l''entoure. Arba était l''ancêtre d''Anak. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'La campagne et les villages qui dépendaient de la ville avaient été accordés en possession à Caleb, fils de Jephunné. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ils donnèrent aux descendants du prêtre Aaron Hébron, la ville de refuge pour les auteurs d''homicide, et ses environs, ainsi que Libna et ses environs, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Jatthir et ses environs, Eshthlemoa et ses environs, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Holon et ses environs, Debir et ses environs, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Aïn et ses environs, Jutta et ses environs, ainsi que Beth-Shémesh et ses environs, soit 9 villes appartenant à ces deux tribus. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Parmi les villes qui appartenaient à la tribu de Benjamin, ils donnèrent Gabaon et ses environs, Guéba et ses environs, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Anathoth et ses environs, ainsi qu''Almon et ses environs, soit 4 villes. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Nombre total des villes des prêtres qui descendaient d''Aaron: 13, avec leurs environs.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Les Lévites qui appartenaient aux clans des autres descendants de Kehath eurent par tirage au sort des villes de la tribu d''Ephraïm. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'On leur donna Sichem, la ville de refuge pour les auteurs d''homicide, et ses environs, dans la région montagneuse d''Ephraïm, Guézer et ses environs, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Kibtsaïm et ses environs, ainsi que Beth-Horon et ses environs, soit 4 villes. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Parmi les villes qui appartenaient à la tribu de Dan, ils donnèrent Eltheké et ses environs, Guibbethon et ses environs, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ajalon et ses environs, ainsi que Gath-Rimmon et ses environs, soit 4 villes. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Parmi les villes de la demi-tribu de Manassé, ils donnèrent Thaanac et ses environs ainsi que Gath-Rimmon et ses environs, soit 2 villes. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Nombre total des villes: 10, avec leurs environs, pour les clans des autres descendants de Kehath.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'On donna les villes suivantes à ceux qui descendaient de Guershon parmi les clans des Lévites: dans la demi-tribu de Manassé, Golan en Basan, la ville de refuge pour les auteurs d''homicide, et ses environs, ainsi que Beeshthra et ses environs, soit 2 villes; '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'dans la tribu d''Issacar, Kishjon et ses environs, Dabrath et ses environs, '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Jarmuth et ses environs, ainsi qu''En-Gannim et ses environs, soit 4 villes; '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'dans la tribu d''Aser, Misheal et ses environs, Abdon et ses environs, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Helkath et ses environs, ainsi que Rehob et ses environs, soit 4 villes; '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'et dans la tribu de Nephthali, Kédesh en Galilée, la ville de refuge pour les auteurs d''homicide, et ses environs, Hammoth-Dor et ses environs, ainsi que Karthan et ses environs, soit 3 villes. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Nombre total des villes attribuées aux clans des Guershonites: 13, avec leurs environs.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'On donna au reste des Lévites, à ceux qui appartenaient aux clans des descendants de Merari: dans la tribu de Zabulon, Jokneam et ses environs, Kartha et ses environs, '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Dimna et ses environs, ainsi que Nahalal et ses environs, soit 4 villes; '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'dans la tribu de Ruben, Betser et ses environs, Jahtsa et ses environs, '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Kedémoth et ses environs, ainsi que Méphaath et ses environs, soit 4 villes; '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'dans la tribu de Gad, Ramoth en Galaad, la ville de refuge pour les auteurs d''homicide, et ses environs, Mahanaïm et ses environs, '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Hesbon et ses environs, ainsi que Jaezer et ses environs, soit en tout 4 villes. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Nombre total des villes qui furent attribuées par tirage au sort aux clans des descendants de Merari, qui formaient le reste des clans des Lévites: 12.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Le nombre total des villes des Lévites situées au milieu des propriétés des Israélites était de 48, avec leurs environs. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Chacune de ces villes était donnée avec ses environs, avec le territoire qui l'entourait; il en allait de même pour toutes ces villes.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les promesses divines accomplies
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'C''est ainsi que l''Eternel donna à Israël tout le pays qu''il avait juré de donner à leurs ancêtres. Ils en prirent possession et s''y installèrent. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'L''Eternel leur accorda du repos de tous côtés, comme il l''avait juré à leurs ancêtres. Aucun de leurs ennemis ne put leur résister et l''Eternel les livra tous entre leurs mains. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'De toutes les bonnes paroles que l''Eternel avait dites à la communauté d''Israël, aucune ne resta sans effet: toutes s''accomplirent.'
