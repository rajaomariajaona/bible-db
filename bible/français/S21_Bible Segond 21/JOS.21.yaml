document_id: JOS.21,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Désignation des 48 villes des Lévites
  - type: text
    content: 'Les chefs de famille des Lévites s''approchèrent du prêtre Eléazar, de Josué, fils de Nun, et des chefs de famille des tribus israélites. '
  '10':
  - type: text
    content: 'et qui furent pour ceux qui descendaient d''Aaron parmi les clans des Kehathites et des descendants de Lévi. En effet, le sort les avait indiqués les premiers. '
  '11':
  - type: text
    content: 'Ils leur donnèrent Kirjath-Arba, c''est-à-dire Hébron dans la région montagneuse de Juda, avec ses environs, le territoire qui l''entoure. Arba était l''ancêtre d''Anak. '
  '12':
  - type: text
    content: 'La campagne et les villages qui dépendaient de la ville avaient été accordés en possession à Caleb, fils de Jephunné. '
  '13':
  - type: text
    content: 'Ils donnèrent aux descendants du prêtre Aaron Hébron, la ville de refuge pour les auteurs d''homicide, et ses environs, ainsi que Libna et ses environs, '
  '14':
  - type: text
    content: 'Jatthir et ses environs, Eshthlemoa et ses environs, '
  '15':
  - type: text
    content: 'Holon et ses environs, Debir et ses environs, '
  '16':
  - type: text
    content: 'Aïn et ses environs, Jutta et ses environs, ainsi que Beth-Shémesh et ses environs, soit 9 villes appartenant à ces deux tribus. '
  '17':
  - type: text
    content: 'Parmi les villes qui appartenaient à la tribu de Benjamin, ils donnèrent Gabaon et ses environs, Guéba et ses environs, '
  '18':
  - type: text
    content: 'Anathoth et ses environs, ainsi qu''Almon et ses environs, soit 4 villes. '
  '19':
  - type: text
    content: 'Nombre total des villes des prêtres qui descendaient d''Aaron: 13, avec leurs environs.'
  '2':
  - type: text
    content: 'Ils leur dirent à Silo, dans le pays de Canaan: «L''Eternel a ordonné, par l''intermédiaire de Moïse, qu''on nous donne des villes pour y habiter, ainsi que leurs environs pour notre bétail.»'
  '20':
  - type: text
    content: 'Les Lévites qui appartenaient aux clans des autres descendants de Kehath eurent par tirage au sort des villes de la tribu d''Ephraïm. '
  '21':
  - type: text
    content: 'On leur donna Sichem, la ville de refuge pour les auteurs d''homicide, et ses environs, dans la région montagneuse d''Ephraïm, Guézer et ses environs, '
  '22':
  - type: text
    content: 'Kibtsaïm et ses environs, ainsi que Beth-Horon et ses environs, soit 4 villes. '
  '23':
  - type: text
    content: 'Parmi les villes qui appartenaient à la tribu de Dan, ils donnèrent Eltheké et ses environs, Guibbethon et ses environs, '
  '24':
  - type: text
    content: 'Ajalon et ses environs, ainsi que Gath-Rimmon et ses environs, soit 4 villes. '
  '25':
  - type: text
    content: 'Parmi les villes de la demi-tribu de Manassé, ils donnèrent Thaanac et ses environs ainsi que Gath-Rimmon et ses environs, soit 2 villes. '
  '26':
  - type: text
    content: 'Nombre total des villes: 10, avec leurs environs, pour les clans des autres descendants de Kehath.'
  '27':
  - type: text
    content: 'On donna les villes suivantes à ceux qui descendaient de Guershon parmi les clans des Lévites: dans la demi-tribu de Manassé, Golan en Basan, la ville de refuge pour les auteurs d''homicide, et ses environs, ainsi que Beeshthra et ses environs, soit 2 villes; '
  '28':
  - type: text
    content: 'dans la tribu d''Issacar, Kishjon et ses environs, Dabrath et ses environs, '
  '29':
  - type: text
    content: 'Jarmuth et ses environs, ainsi qu''En-Gannim et ses environs, soit 4 villes; '
  '3':
  - type: text
    content: Conformément à l'ordre de l'Eternel, les Israélites donnèrent alors aux Lévites, en prenant sur leur héritage, des villes et leurs environs.
  '30':
  - type: text
    content: 'dans la tribu d''Aser, Misheal et ses environs, Abdon et ses environs, '
  '31':
  - type: text
    content: 'Helkath et ses environs, ainsi que Rehob et ses environs, soit 4 villes; '
  '32':
  - type: text
    content: 'et dans la tribu de Nephthali, Kédesh en Galilée, la ville de refuge pour les auteurs d''homicide, et ses environs, Hammoth-Dor et ses environs, ainsi que Karthan et ses environs, soit 3 villes. '
  '33':
  - type: text
    content: 'Nombre total des villes attribuées aux clans des Guershonites: 13, avec leurs environs.'
  '34':
  - type: text
    content: 'On donna au reste des Lévites, à ceux qui appartenaient aux clans des descendants de Merari: dans la tribu de Zabulon, Jokneam et ses environs, Kartha et ses environs, '
  '35':
  - type: text
    content: 'Dimna et ses environs, ainsi que Nahalal et ses environs, soit 4 villes; '
  '36':
  - type: text
    content: 'dans la tribu de Ruben, Betser et ses environs, Jahtsa et ses environs, '
  '37':
  - type: text
    content: 'Kedémoth et ses environs, ainsi que Méphaath et ses environs, soit 4 villes; '
  '38':
  - type: text
    content: 'dans la tribu de Gad, Ramoth en Galaad, la ville de refuge pour les auteurs d''homicide, et ses environs, Mahanaïm et ses environs, '
  '39':
  - type: text
    content: 'Hesbon et ses environs, ainsi que Jaezer et ses environs, soit en tout 4 villes. '
  '4':
  - type: text
    content: 'On tira au sort pour les clans des Kehathites. Les Lévites qui descendaient du prêtre Aaron eurent par tirage au sort 13 villes des tribus de Juda, de Siméon et de Benjamin. '
  '40':
  - type: text
    content: 'Nombre total des villes qui furent attribuées par tirage au sort aux clans des descendants de Merari, qui formaient le reste des clans des Lévites: 12.'
  '41':
  - type: text
    content: 'Le nombre total des villes des Lévites situées au milieu des propriétés des Israélites était de 48, avec leurs environs. '
  '42':
  - type: text
    content: Chacune de ces villes était donnée avec ses environs, avec le territoire qui l'entourait; il en allait de même pour toutes ces villes.
  - type: heading
    content: Les promesses divines accomplies
  '43':
  - type: text
    content: 'C''est ainsi que l''Eternel donna à Israël tout le pays qu''il avait juré de donner à leurs ancêtres. Ils en prirent possession et s''y installèrent. '
  '44':
  - type: text
    content: 'L''Eternel leur accorda du repos de tous côtés, comme il l''avait juré à leurs ancêtres. Aucun de leurs ennemis ne put leur résister et l''Eternel les livra tous entre leurs mains. '
  '45':
  - type: text
    content: 'De toutes les bonnes paroles que l''Eternel avait dites à la communauté d''Israël, aucune ne resta sans effet: toutes s''accomplirent.'
  '5':
  - type: text
    content: 'Les autres descendants de Kehath eurent par tirage au sort 10 villes qui appartenaient aux clans de la tribu d''Ephraïm, à la tribu de Dan et à la demi-tribu de Manassé. '
  '6':
  - type: text
    content: 'Les descendants de Guershon eurent par le sort 13 villes qui appartenaient aux clans de la tribu d''Issacar, à la tribu d''Aser, à celle de Nephthali et à la demi-tribu de Manassé installée en Basan. '
  '7':
  - type: text
    content: 'Les clans des descendants de Merari eurent 12 villes qui appartenaient aux tribus de Ruben, de Gad et de Zabulon. '
  '8':
  - type: text
    content: Les Israélites donnèrent par tirage au sort ces villes et leurs environs aux Lévites, comme l'Eternel l'avait ordonné par l'intermédiaire de Moïse.
  '9':
  - type: text
    content: 'Parmi les villes qui appartenaient aux tribus des Judéens et des Siméonites, ils donnèrent les villes qui vont être désignées par leur nom '
