document_id: ISA.51,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Promesses de délivrance
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ecoutez-moi, vous qui poursuivez la justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui cherchez l'Eternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Portez les regards sur le rocher d'où vous avez été taillés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur la carrière d'où vous avez été tirés.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: N'est-ce pas toi qui as mis à sec la mer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'eau du grand abîme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui as tracé dans les profondeurs de la mer
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un chemin pour le passage des rachetés?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ceux que l'Eternel aura libérés reviendront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils arriveront à Sion avec des chants de triomphe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et une joie éternelle couronnera leur tête.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils connaîtront la gaieté et la joie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la douleur et les gémissements s'enfuiront.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: C'est moi, c'est moi qui vous console.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui es-tu pour avoir peur de l'homme, alors qu'il va mourir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et du fils de l'homme, dont le sort est pareil à celui de l'herbe?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Et tu oublierais l'Eternel, celui qui t'a fait,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui a déployé le ciel et fondé la terre!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu serais constamment, à longueur de journée, terrorisé
  - type: usfm
    marker: q1
    children:
    - type: text
      text: devant la colère de l'oppresseur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce qu'il se prépare à te détruire!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Où donc est-elle, la colère de l'oppresseur?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Le prisonnier sera bientôt libéré,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il ne mourra pas dans la fosse
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il ne manquera pas de pain.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Moi, je suis l'Eternel, ton Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui soulève la mer et fais gronder ses vagues.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'Eternel, le maître de l'univers, voilà mon nom.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: J'ai mis mes paroles dans ta bouche
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je t'ai couvert de l'ombre de ma main
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour déployer un nouveau ciel et fonder une nouvelle terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et pour dire à Sion: «Tu es mon peuple!»'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Réveille-toi! Réveille-toi! Lève-toi, Jérusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toi qui as bu, donnée par l'Eternel, la coupe de sa colère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui as bu, qui as vidé jusqu'au fond la coupe destinée à étourdir!
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: De tous les fils qu'elle a mis au monde,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il n'y en a aucun pour la conduire.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De tous les fils qu'elle a élevés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il n'y en a aucun pour la prendre par la main.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Qui te plaindra? Deux malheurs t''ont atteinte:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la dévastation et la ruine, la famine et l'épée.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui pourra te consoler?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Portez les regards sur votre ancêtre Abraham
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et sur Sara, celle qui vous a donné naissance!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Abraham était tout seul quand je l'ai appelé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je l'ai béni et lui ai donné une grande famille.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Tes fils sont couchés, sans force, à tous les coins de rue,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pareils à une antilope prise au piège.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils sont submergés par la colère de l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: par les menaces de ton Dieu.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: C'est pourquoi, écoute donc ceci, malheureuse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toi qui es ivre, mais non de vin!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Voici ce que dit ton Seigneur, l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ton Dieu qui défend son peuple:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je te reprends la coupe destinée à étourdir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la coupe de ma colère.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu ne la boiras plus.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Je la donnerai à ceux qui t'ont fait souffrir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'à ceux qui te disaient: «Allonge-toi pour que nous puissions te passer dessus!»'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu présentais alors ton dos
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en guise de sol, de rue pour les passants.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: En effet, l'Eternel console Sion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il a pitié de toutes ses ruines;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il rendra son désert pareil au jardin d'Eden,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sa plaine aride pareille à un jardin de l'Eternel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On trouvera au milieu d'elle la joie et l'allégresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la reconnaissance et le chant des cantiques.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Mon peuple, fais attention à moi!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ma nation, prête-moi l'oreille!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, de moi sortira la loi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et j'établirai mon droit en guise de lumière pour les peuples.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ma justice est proche, mon salut est en marche
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et mes bras jugeront les peuples.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les îles placeront leur attente en moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elles compteront sur l'action de mon bras.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Levez les yeux vers le ciel et regardez en bas sur la terre!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, le ciel se dissipera comme une fumée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la terre tombera en lambeaux comme un habit
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ses habitants mourront comme des mouches.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En revanche, mon salut durera éternellement
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ma justice n'aura pas de fin.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ecoutez-moi, vous qui connaissez la justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toi le peuple qui portes ma loi dans le cœur!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N'ayez pas peur de la honte infligée par les hommes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ne vous laissez pas terrifier par leurs insultes,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: car la teigne les dévorera comme un habit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les mites les rongeront comme de la laine.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En revanche, ma justice durera éternellement,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et mon salut de génération en génération.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Réveille-toi! Réveille-toi! Couvre-toi de force, bras de l'Eternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Réveille-toi comme par le passé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme dans les générations précédentes!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N'est-ce pas toi qui as abattu l'Egypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui as transpercé le monstre?
