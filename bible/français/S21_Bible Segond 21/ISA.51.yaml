document_id: ISA.51,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Promesses de délivrance
  - type: text
    content: Ecoutez-moi, vous qui poursuivez la justice,
  - type: text
    content: qui cherchez l'Eternel!
  - type: text
    content: Portez les regards sur le rocher d'où vous avez été taillés,
  - type: text
    content: sur la carrière d'où vous avez été tirés.
  '10':
  - type: text
    content: N'est-ce pas toi qui as mis à sec la mer,
  - type: text
    content: l'eau du grand abîme,
  - type: text
    content: qui as tracé dans les profondeurs de la mer
  - type: text
    content: un chemin pour le passage des rachetés?
  '11':
  - type: text
    content: Ceux que l'Eternel aura libérés reviendront,
  - type: text
    content: ils arriveront à Sion avec des chants de triomphe
  - type: text
    content: et une joie éternelle couronnera leur tête.
  - type: text
    content: Ils connaîtront la gaieté et la joie,
  - type: text
    content: la douleur et les gémissements s'enfuiront.
  '12':
  - type: text
    content: C'est moi, c'est moi qui vous console.
  - type: text
    content: Qui es-tu pour avoir peur de l'homme, alors qu'il va mourir,
  - type: text
    content: et du fils de l'homme, dont le sort est pareil à celui de l'herbe?
  '13':
  - type: text
    content: Et tu oublierais l'Eternel, celui qui t'a fait,
  - type: text
    content: qui a déployé le ciel et fondé la terre!
  - type: text
    content: Tu serais constamment, à longueur de journée, terrorisé
  - type: text
    content: devant la colère de l'oppresseur,
  - type: text
    content: parce qu'il se prépare à te détruire!
  - type: text
    content: Où donc est-elle, la colère de l'oppresseur?
  '14':
  - type: text
    content: Le prisonnier sera bientôt libéré,
  - type: text
    content: il ne mourra pas dans la fosse
  - type: text
    content: et il ne manquera pas de pain.
  '15':
  - type: text
    content: Moi, je suis l'Eternel, ton Dieu,
  - type: text
    content: qui soulève la mer et fais gronder ses vagues.
  - type: text
    content: L'Eternel, le maître de l'univers, voilà mon nom.
  '16':
  - type: text
    content: J'ai mis mes paroles dans ta bouche
  - type: text
    content: et je t'ai couvert de l'ombre de ma main
  - type: text
    content: pour déployer un nouveau ciel et fonder une nouvelle terre,
  - type: text
    content: 'et pour dire à Sion: «Tu es mon peuple!»'
  '17':
  - type: text
    content: Réveille-toi! Réveille-toi! Lève-toi, Jérusalem,
  - type: text
    content: toi qui as bu, donnée par l'Eternel, la coupe de sa colère,
  - type: text
    content: qui as bu, qui as vidé jusqu'au fond la coupe destinée à étourdir!
  '18':
  - type: text
    content: De tous les fils qu'elle a mis au monde,
  - type: text
    content: il n'y en a aucun pour la conduire.
  - type: text
    content: De tous les fils qu'elle a élevés,
  - type: text
    content: il n'y en a aucun pour la prendre par la main.
  '19':
  - type: text
    content: 'Qui te plaindra? Deux malheurs t''ont atteinte:'
  - type: text
    content: la dévastation et la ruine, la famine et l'épée.
  - type: text
    content: Qui pourra te consoler?
  '2':
  - type: text
    content: Portez les regards sur votre ancêtre Abraham
  - type: text
    content: et sur Sara, celle qui vous a donné naissance!
  - type: text
    content: Abraham était tout seul quand je l'ai appelé,
  - type: text
    content: et je l'ai béni et lui ai donné une grande famille.
  '20':
  - type: text
    content: Tes fils sont couchés, sans force, à tous les coins de rue,
  - type: text
    content: pareils à une antilope prise au piège.
  - type: text
    content: Ils sont submergés par la colère de l'Eternel,
  - type: text
    content: par les menaces de ton Dieu.
  '21':
  - type: text
    content: C'est pourquoi, écoute donc ceci, malheureuse,
  - type: text
    content: toi qui es ivre, mais non de vin!
  '22':
  - type: text
    content: Voici ce que dit ton Seigneur, l'Eternel,
  - type: text
    content: 'ton Dieu qui défend son peuple:'
  - type: text
    content: Je te reprends la coupe destinée à étourdir,
  - type: text
    content: la coupe de ma colère.
  - type: text
    content: Tu ne la boiras plus.
  '23':
  - type: text
    content: Je la donnerai à ceux qui t'ont fait souffrir,
  - type: text
    content: 'à ceux qui te disaient: «Allonge-toi pour que nous puissions te passer dessus!»'
  - type: text
    content: Tu présentais alors ton dos
  - type: text
    content: en guise de sol, de rue pour les passants.
  '3':
  - type: text
    content: En effet, l'Eternel console Sion,
  - type: text
    content: il a pitié de toutes ses ruines;
  - type: text
    content: il rendra son désert pareil au jardin d'Eden,
  - type: text
    content: sa plaine aride pareille à un jardin de l'Eternel.
  - type: text
    content: On trouvera au milieu d'elle la joie et l'allégresse,
  - type: text
    content: la reconnaissance et le chant des cantiques.
  '4':
  - type: text
    content: Mon peuple, fais attention à moi!
  - type: text
    content: Ma nation, prête-moi l'oreille!
  - type: text
    content: En effet, de moi sortira la loi
  - type: text
    content: et j'établirai mon droit en guise de lumière pour les peuples.
  '5':
  - type: text
    content: Ma justice est proche, mon salut est en marche
  - type: text
    content: et mes bras jugeront les peuples.
  - type: text
    content: Les îles placeront leur attente en moi,
  - type: text
    content: elles compteront sur l'action de mon bras.
  '6':
  - type: text
    content: Levez les yeux vers le ciel et regardez en bas sur la terre!
  - type: text
    content: En effet, le ciel se dissipera comme une fumée,
  - type: text
    content: la terre tombera en lambeaux comme un habit
  - type: text
    content: et ses habitants mourront comme des mouches.
  - type: text
    content: En revanche, mon salut durera éternellement
  - type: text
    content: et ma justice n'aura pas de fin.
  '7':
  - type: text
    content: Ecoutez-moi, vous qui connaissez la justice,
  - type: text
    content: toi le peuple qui portes ma loi dans le cœur!
  - type: text
    content: N'ayez pas peur de la honte infligée par les hommes
  - type: text
    content: et ne vous laissez pas terrifier par leurs insultes,
  '8':
  - type: text
    content: car la teigne les dévorera comme un habit,
  - type: text
    content: les mites les rongeront comme de la laine.
  - type: text
    content: En revanche, ma justice durera éternellement,
  - type: text
    content: et mon salut de génération en génération.
  '9':
  - type: text
    content: Réveille-toi! Réveille-toi! Couvre-toi de force, bras de l'Eternel!
  - type: text
    content: Réveille-toi comme par le passé,
  - type: text
    content: comme dans les générations précédentes!
  - type: text
    content: N'est-ce pas toi qui as abattu l'Egypte,
  - type: text
    content: qui as transpercé le monstre?
