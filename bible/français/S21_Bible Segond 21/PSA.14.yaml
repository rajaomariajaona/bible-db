document_id: PSA.14,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Portrait de l'homme impie
  - type: text
    content: Au chef de chœur. De David.
  - type: text
    content: 'Le fou dit dans son cœur: «Il n''y a pas de Dieu!»'
  - type: text
    content: '*Ils se sont corrompus, ils ont commis des actions abominables;'
  - type: text
    content: il n'y en a aucun qui fasse le bien.
  '2':
  - type: text
    content: Du haut du ciel, l'Eternel observe les hommes
  - type: text
    content: pour voir s'il y en a un qui est intelligent,
  - type: text
    content: 'qui cherche Dieu:'
  '3':
  - type: text
    content: tous se sont éloignés, ensemble ils se sont pervertis;
  - type: text
    content: il n'y en a aucun qui fasse le bien,
  - type: text
    content: pas même un seul.
  - type: note
    content: 'Ils se sont corrompus… un seul: cité en Romains 3.10-12 dans une description de l''homme en général.'
  '4':
  - type: text
    content: Tous ceux qui commettent l'injustice n'ont-ils aucune connaissance?
  - type: text
    content: Ils dévorent mon peuple, ils le prennent pour nourriture;
  - type: text
    content: ils ne font pas appel à l'Eternel.
  '5':
  - type: text
    content: C'est alors qu'ils trembleront d'épouvante,
  - type: text
    content: car Dieu est au milieu des justes.
  '6':
  - type: text
    content: Vous bafouez l'espoir du malheureux?
  - type: text
    content: Sachez que l'Eternel est son refuge.
  '7':
  - type: text
    content: Oh! qui accordera depuis Sion la délivrance à Israël?
  - type: text
    content: Quand l'Eternel rétablira son peuple,
  - type: text
    content: Jacob sera dans l'allégresse, Israël se réjouira.
