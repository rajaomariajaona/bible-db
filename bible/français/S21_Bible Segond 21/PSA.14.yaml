document_id: PSA.14
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Portrait de l'homme impie
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef de chœur. De David.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Le fou dit dans son cœur: «Il n''y a pas de Dieu!»'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '*Ils se sont corrompus, ils ont commis des actions abominables;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il n'y en a aucun qui fasse le bien.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Du haut du ciel, l'Eternel observe les hommes
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour voir s'il y en a un qui est intelligent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'qui cherche Dieu:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: tous se sont éloignés, ensemble ils se sont pervertis;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il n'y en a aucun qui fasse le bien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pas même un seul.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.1-3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ils se sont corrompus… un seul: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Romains 3.10-12
      metadata:
        usfm: ROM.3.10+ROM.3.11+ROM.3.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dans une description de l''homme en général.'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tous ceux qui commettent l'injustice n'ont-ils aucune connaissance?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils dévorent mon peuple, ils le prennent pour nourriture;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils ne font pas appel à l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: C'est alors qu'ils trembleront d'épouvante,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car Dieu est au milieu des justes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Vous bafouez l'espoir du malheureux?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sachez que l'Eternel est son refuge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Oh! qui accordera depuis Sion la délivrance à Israël?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand l'Eternel rétablira son peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jacob sera dans l'allégresse, Israël se réjouira.
