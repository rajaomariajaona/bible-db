document_id: EZK.26,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Sur Tyr
  - type: text
    content: 'La onzième année, le premier jour du mois, la parole de l''Eternel m''a été adressée: '
  '10':
  - type: text
    content: 'Tu seras couverte de poussière à cause de sa quantité de chevaux. Tes murailles trembleront au bruit des cavaliers, des roues et des chars, lorsqu''il entrera dans tes portes comme on entre dans une ville conquise. '
  '11':
  - type: text
    content: 'Il piétinera toutes tes rues avec les sabots de ses chevaux, il tuera ton peuple par l''épée et les piliers dont tu étais fier s''écrouleront. '
  '12':
  - type: text
    content: 'Ils feront de tes richesses leur butin, ils pilleront tes marchandises, ils abattront tes murailles, ils démoliront tes maisons de luxe et ils jetteront dans l''eau tes pierres, ton bois et ta poussière. '
  '13':
  - type: text
    content: 'Je ferai cesser le bruit de tes chants et l''on n''entendra plus le son de tes harpes. '
  '14':
  - type: text
    content: Je ferai de toi un rocher nu, tu ne seras plus qu'un endroit où l'on étendra les filets, tu ne seras plus reconstruite. En effet, moi, l'Eternel, j'ai parlé, déclare le Seigneur, l'Eternel.
  '15':
  - type: text
    content: '»Voici ce que dit le Seigneur, l''Eternel, à Tyr: Au bruit de ta chute, quand les blessés agoniseront, quand le carnage sévira au milieu de toi, les îles ne seront-elles pas ébranlées? '
  '16':
  - type: text
    content: 'Tous les princes de la mer descendront de leur trône. Ils enlèveront leur manteau et quitteront leurs vêtements brodés. Ils auront la frayeur pour habit et s''assiéront par terre. A chaque instant la frayeur s''emparera d''eux et ils seront consternés à cause de toi. '
  '17':
  - type: text
    content: 'Alors ils prononceront une complainte sur toi et te diront:'
  - type: text
    content: »‘Comment! Te voilà détruite,
  - type: text
    content: toi qu'habitaient ceux qui parcourent les mers,
  - type: text
    content: ville célèbre qui étais puissante sur la mer!
  - type: text
    content: Avec tes habitants,
  - type: text
    content: tu inspirais la terreur à tous tes voisins.
  '18':
  - type: text
    content: Maintenant les côtes sont effrayées
  - type: text
    content: parce que le jour de ta chute est venu,
  - type: text
    content: les îles de la mer sont terrifiées par ta disparition.’
  '19':
  - type: text
    content: '»En effet, voici ce que dit le Seigneur, l''Eternel: Quand je ferai de toi une ville déserte, pareille aux villes qui ne sont plus habitées, quand je ferai monter l''abîme contre toi et que les grandes eaux te couvriront, '
  '2':
  - type: text
    content: '«Fils de l''homme, Tyr a dit au sujet de Jérusalem: ‘C''est bien fait! Elle est brisée, la porte des peuples! On se tourne vers moi, je vais m''enrichir puisqu''elle est en ruine!’ '
  '20':
  - type: text
    content: 'je te précipiterai avec ceux qui descendent dans la tombe, vers le peuple d''autrefois. Je te ferai habiter dans les profondeurs de la terre, pareille à des ruines éternelles, avec ceux qui descendent dans la tombe. Ainsi, tu ne seras plus habitée, tandis que je distribuerai la beauté dans le pays des vivants. '
  '21':
  - type: text
    content: Ce que je ferai de toi sera affreux. Tu n'existeras plus. On te cherchera, mais on ne te trouvera plus, déclare le Seigneur, l'Eternel.»
  '3':
  - type: text
    content: 'A cause de cela, voici ce que dit le Seigneur, l''Eternel: Je t''en veux, Tyr! Je ferai monter contre toi un grand nombre de nations, tout comme la mer fait monter ses flots. '
  '4':
  - type: text
    content: 'Elles détruiront les murailles de Tyr, elles abattront ses tours et j''en balaierai la poussière. Je ferai d''elle un rocher nu. '
  '5':
  - type: text
    content: 'Elle ne sera plus dans la mer qu''un endroit où l''on étendra les filets. En effet, c''est moi qui ai parlé, déclare le Seigneur, l''Eternel. Elle sera pillée par les nations. '
  '6':
  - type: text
    content: Ses filles dans la campagne seront tuées par l'épée. Ils reconnaîtront alors que je suis l'Eternel.
  '7':
  - type: text
    content: '»Oui, voici ce que dit le Seigneur, l''Eternel: Je vais faire venir du nord contre Tyr Nebucadnetsar, le roi de Babylone, le roi des rois, avec des chevaux, des chars, des cavaliers et le ralliement d''une armée nombreuse. '
  '8':
  - type: text
    content: 'Il tuera tes filles par l''épée dans la campagne. Il construira des retranchements contre toi, il mettra des remblais en place contre toi et il dressera le bouclier contre toi. '
  '9':
  - type: text
    content: 'Il enfoncera tes murailles à coups de bélier et il démolira tes tours avec ses machines de guerre. '
