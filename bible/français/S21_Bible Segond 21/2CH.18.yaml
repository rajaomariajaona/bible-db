document_id: 2CH.18
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Expédition contre les Syriens
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Josaphat eut des richesses et de la gloire en abondance, et il s''allia par mariage avec Achab. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Au bout de quelques années, il descendit trouver Achab à Samarie. Ce dernier tua pour lui et pour la troupe qui l''accompagnait un grand nombre de brebis et de bœufs, et il le poussa à monter à Ramoth en Galaad. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Achab, roi d''Israël, dit à Josaphat, roi de Juda: «Veux-tu venir avec moi à Ramoth en Galaad?» Josaphat lui répondit: «Toi et moi, ton peuple et le mien, il n''y aura aucune différence et nous irons l''attaquer avec toi.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Puis Josaphat dit au roi d''Israël: «Consulte donc maintenant la parole de l''Eternel.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Le roi d''Israël rassembla les prophètes, au nombre de 400, et leur demanda: «Devons-nous aller attaquer Ramoth en Galaad ou dois-je y renoncer?» Ils répondirent: «Montes-y et Dieu la livrera entre les mains du roi.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Mais Josaphat dit: «N''y a-t-il plus ici aucun prophète de l''Eternel, pour que nous puissions le consulter?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Le roi d''Israël répondit à Josaphat: «Il reste un seul homme par qui l''on puisse consulter l''Eternel; mais je le déteste, car il ne prophétise rien de bon sur moi, il ne prophétise toujours que du mal: c''est Michée, fils de Jimla.» Josaphat répliqua: «Que le roi ne parle pas de cette manière!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Alors le roi d''Israël appela un eunuque et lui dit: «Fais venir tout de suite Michée, fils de Jimla.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Le roi d''Israël et Josaphat, le roi de Juda, étaient assis chacun sur son trône, habillés de leur tenue royale; ils siégeaient sur la place qui se trouve à l''entrée de Samarie et tous les prophètes prophétisaient devant eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Sédécias, fils de Kenaana, s''était fabriqué des cornes en fer et il affirma: «Voici ce que dit l''Eternel: Avec ces cornes, tu frapperas les Syriens jusqu''à leur destruction.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tous les prophètes renchérissaient: «Monte à Ramoth en Galaad! Tu connaîtras le succès et l''Eternel la livrera entre les mains du roi.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Le messager qui était allé appeler Michée lui dit: «Les prophètes sont unanimes pour prédire du bien au roi. Que ta parole soit donc pareille à celle de chacun d''eux! Annonce du bien!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Michée répondit: «L''Eternel est vivant! Je communiquerai ce que mon Dieu dira.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Lorsqu''il fut arrivé vers le roi, celui-ci lui dit: «Michée, devons-nous aller attaquer Ramoth en Galaad ou dois-je y renoncer?» Il répondit: «Montez-y! Vous connaîtrez le succès et ils seront livrés entre vos mains.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Le roi lui dit: «Combien de fois me faudra-t-il te faire jurer de ne me dire que la vérité au nom de l''Eternel?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Michée répondit: «Je vois tout Israël dispersé sur les montagnes, *comme des brebis qui n''ont pas de berger'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Comme… berger: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'renvoi à '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Nombres 27.17
      metadata:
        usfm: NUM.27.17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. Et l''Eternel a dit: ‘Ils n''ont pas de seigneur. Que chacun retourne en paix chez lui!’»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Le roi d''Israël dit à Josaphat: «Ne te l''avais-je pas dit? Il ne prophétise rien de bon sur moi, il ne prophétise que du mal.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Michée ajouta: «Eh bien, écoutez donc la parole de l''Eternel! J''ai vu l''Eternel assis sur son trône, et tous les corps célestes debout à sa droite et à sa gauche. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'L''Eternel a dit: ‘Qui va persuader Achab, roi d''Israël, de monter à Ramoth en Galaad afin qu''il y meure?’ Ils ont répondu l''un d''une manière, l''autre d''une autre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Mais un esprit est venu se présenter devant l''Eternel et a dit: ‘Moi, je vais le persuader.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'L''Eternel lui a dit: ‘Comment?’ ‘Je vais sortir, a-t-il répondu, et je vais être un esprit de mensonge dans la bouche de tous ses prophètes.’ L''Eternel a dit: ‘Tu le persuaderas, tu vas y parvenir. Sors et agis de cette manière!’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Maintenant, l'Eternel a mis un esprit de mensonge dans la bouche de tes prophètes que voici, mais lui, il a prononcé le malheur contre toi.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Alors Sédécias, fils de Kenaana, s''approcha, frappa Michée sur la joue et dit: «Par quel chemin l''esprit de l''Eternel est-il sorti de moi pour te parler?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Michée répondit: «Tu le verras le jour où tu iras de chambre en chambre pour te cacher.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Le roi d''Israël dit: «Arrêtez Michée et amenez-le à Amon, le chef de la ville, et à mon fils Joas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Vous leur ordonnerez: ‘Voici ce que dit le roi: Mettez cet homme en prison et nourrissez-le du pain et de l''eau de misère jusqu''à ce que je revienne en paix.’» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Michée dit: «Si tu reviens en paix, c''est que l''Eternel n''a pas parlé par moi.» Il ajouta: «Ecoutez, vous, tous les peuples!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Le roi d''Israël et Josaphat, le roi de Juda, montèrent à Ramoth en Galaad. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Le roi d''Israël dit à Josaphat: «Je vais me déguiser pour aller au combat; mais toi, mets tes habits.» Le roi d''Israël se déguisa donc, puis ils partirent au combat.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Le roi de Syrie avait donné cet ordre aux chefs de ses chars: «Vous n''attaquerez ni soldats ni officiers, mais seulement le roi d''Israël.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Quand les chefs des chars aperçurent Josaphat, ils se dirent: «C''est le roi d''Israël», et ils l''encerclèrent pour l''attaquer. Josaphat poussa alors un cri et l''Eternel vint à son aide, Dieu les écarta de lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Voyant que ce n''était pas le roi d''Israël, les chefs des chars s''éloignèrent de lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Alors un homme tira au hasard avec son arc et il frappa le roi d''Israël entre les deux parties de la cuirasse. Le roi dit à celui qui conduisait son char: «Fais demi-tour et fais-moi sortir du champ de bataille, car je suis blessé.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Le combat fut si violent, ce jour-là, que le roi d'Israël fut retenu jusqu'au soir dans son char face aux Syriens, et il mourut vers le coucher du soleil.
