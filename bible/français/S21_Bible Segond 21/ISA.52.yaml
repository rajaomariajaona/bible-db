document_id: ISA.52,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Promesse de rétablissement
  - type: text
    content: Réveille-toi! Réveille-toi! Enfile ta force en guise de vêtement, Sion!
  - type: text
    content: Mets tes habits de fête, Jérusalem, ville sainte!
  - type: text
    content: En effet, l'incirconcis et l'homme impur n'entreront plus chez toi.
  '10':
  - type: text
    content: L'Eternel déploie le bras de sa sainteté,
  - type: text
    content: et ce à la vue de toutes les nations.
  - type: text
    content: Même les extrémités de la terre verront
  - type: text
    content: le salut de notre Dieu.
  '11':
  - type: text
    content: Partez, partez, sortez de là
  - type: text
    content: et *ne touchez à rien d'impur! Sortez du milieu d'elle!
  - type: text
    content: Purifiez-vous
  - type: note
    content: 'Ne touchez… Purifiez-vous: cité en 2 Corinthiens 6.17.'
  - type: text
    content: ', vous qui portez les ustensiles du culte de l''Eternel!'
  '12':
  - type: text
    content: Cependant ne sortez pas avec précipitation,
  - type: text
    content: ne partez pas en fugitifs,
  - type: text
    content: car l'Eternel marche devant vous
  - type: text
    content: et le Dieu d'Israël est votre arrière-garde.
  - type: heading
    content: La personne et l'activité du serviteur de l'Eternel
  '13':
  - type: text
    content: Mon serviteur réussira.
  - type: text
    content: Il grandira et gagnera en importance, il sera très haut placé.
  '14':
  - type: text
    content: Tout comme beaucoup ont été horrifiés en le voyant,
  - type: text
    content: tant son visage était défiguré,
  - type: text
    content: tant son aspect était différent de celui des humains,
  '15':
  - type: text
    content: il purifiera beaucoup de nations.
  - type: text
    content: Devant lui des rois fermeront la bouche,
  - type: text
    content: car *ils verront ce qu'on ne leur avait pas raconté,
  - type: text
    content: ils comprendront ce dont ils n'avaient pas entendu parler
  - type: note
    content: 'Ils verront… parler: cité par Paul en Romains 15.21.'
  - type: text
    content: .
  '2':
  - type: text
    content: Secoue ta poussière, lève-toi
  - type: text
    content: et reprends ta place, Jérusalem!
  - type: text
    content: Détache les chaînes qui enserrent ton cou, toi la déportée, fille de Sion!
  '3':
  - type: text
    content: 'En effet, voici ce que dit l''Eternel:'
  - type: text
    content: C'est pour rien que vous avez été vendus,
  - type: text
    content: et ce n'est pas à prix d'argent que vous serez rachetés.
  '4':
  - type: text
    content: 'Oui, voici ce que dit le Seigneur, l''Eternel:'
  - type: text
    content: Tout d'abord, c'est en Egypte que mon peuple est descendu pour y séjourner,
  - type: text
    content: puis c'est l'Assyrien qui l'a exploité sans raison.
  '5':
  - type: text
    content: Et maintenant, quel intérêt ai-je à voir
  - type: text
    content: mon peuple capturé pour rien? déclare l'Eternel.
  - type: text
    content: Ses tyrans poussent des cris, déclare l'Eternel,
  - type: text
    content: et *constamment, à longueur de journée, mon nom est blasphémé
  - type: note
    content: 'Constamment… blasphémé: cité en Romains 2.24 d''après la Septante.'
  - type: text
    content: .
  '6':
  - type: text
    content: Voilà pourquoi mon peuple connaîtra mon nom. Voilà pourquoi il saura, ce jour-là, que c'est moi qui parle. Me voici!
  '7':
  - type: text
    content: '*Qu''ils sont beaux, sur les montagnes,'
  - type: text
    content: les pieds de celui qui apporte de bonnes nouvelles,
  - type: text
    content: qui annonce la paix
  - type: note
    content: 'Qu''ils sont… paix: cité en Romains 10.15.'
  - type: text
    content: ','
  - type: text
    content: de celui qui apporte de très bonnes nouvelles,
  - type: text
    content: qui annonce le salut,
  - type: text
    content: 'de celui qui dit à Sion:'
  - type: text
    content: «Ton Dieu règne!»
  '8':
  - type: text
    content: La voix de tes guetteurs retentit,
  - type: text
    content: ils se font entendre,
  - type: text
    content: ils poussent ensemble des cris d'allégresse,
  - type: text
    content: car de leurs propres yeux ils voient
  - type: text
    content: le retour de l'Eternel à Sion.
  '9':
  - type: text
    content: Eclatez ensemble en cris de joie,
  - type: text
    content: ruines de Jérusalem,
  - type: text
    content: car l'Eternel console son peuple,
  - type: text
    content: il rachète Jérusalem.
