document_id: ISA.52
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Promesse de rétablissement
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Réveille-toi! Réveille-toi! Enfile ta force en guise de vêtement, Sion!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mets tes habits de fête, Jérusalem, ville sainte!
- type: usfm
  marker: q1
  children:
  - type: text
    text: En effet, l'incirconcis et l'homme impur n'entreront plus chez toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Secoue ta poussière, lève-toi
- type: usfm
  marker: q1
  children:
  - type: text
    text: et reprends ta place, Jérusalem!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Détache les chaînes qui enserrent ton cou, toi la déportée, fille de Sion!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'En effet, voici ce que dit l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est pour rien que vous avez été vendus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ce n'est pas à prix d'argent que vous serez rachetés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Oui, voici ce que dit le Seigneur, l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tout d'abord, c'est en Egypte que mon peuple est descendu pour y séjourner,
- type: usfm
  marker: q1
  children:
  - type: text
    text: puis c'est l'Assyrien qui l'a exploité sans raison.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Et maintenant, quel intérêt ai-je à voir
- type: usfm
  marker: q1
  children:
  - type: text
    text: mon peuple capturé pour rien? déclare l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses tyrans poussent des cris, déclare l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et *constamment, à longueur de journée, mon nom est blasphémé
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '52.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Constamment… blasphémé: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Romains 2.24
      metadata:
        usfm: ROM.2.24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' d''après la Septante.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Voilà pourquoi mon peuple connaîtra mon nom. Voilà pourquoi il saura, ce jour-là, que c'est moi qui parle. Me voici!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '*Qu''ils sont beaux, sur les montagnes,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: les pieds de celui qui apporte de bonnes nouvelles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui annonce la paix
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '52.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Qu''ils sont… paix: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Romains 10.15
      metadata:
        usfm: ROM.10.15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: de celui qui apporte de très bonnes nouvelles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui annonce le salut,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'de celui qui dit à Sion:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Ton Dieu règne!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: La voix de tes guetteurs retentit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils se font entendre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils poussent ensemble des cris d'allégresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car de leurs propres yeux ils voient
- type: usfm
  marker: q1
  children:
  - type: text
    text: le retour de l'Eternel à Sion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Eclatez ensemble en cris de joie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ruines de Jérusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car l'Eternel console son peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il rachète Jérusalem.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: L'Eternel déploie le bras de sa sainteté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ce à la vue de toutes les nations.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Même les extrémités de la terre verront
- type: usfm
  marker: q1
  children:
  - type: text
    text: le salut de notre Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Partez, partez, sortez de là
- type: usfm
  marker: q1
  children:
  - type: text
    text: et *ne touchez à rien d'impur! Sortez du milieu d'elle!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Purifiez-vous
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '52.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ne touchez… Purifiez-vous: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Corinthiens 6.17
      metadata:
        usfm: 2CO.6.17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', vous qui portez les ustensiles du culte de l''Eternel!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Cependant ne sortez pas avec précipitation,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne partez pas en fugitifs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car l'Eternel marche devant vous
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le Dieu d'Israël est votre arrière-garde.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La personne et l'activité du serviteur de l'Eternel
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mon serviteur réussira.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il grandira et gagnera en importance, il sera très haut placé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Tout comme beaucoup ont été horrifiés en le voyant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tant son visage était défiguré,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tant son aspect était différent de celui des humains,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: il purifiera beaucoup de nations.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Devant lui des rois fermeront la bouche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car *ils verront ce qu'on ne leur avait pas raconté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils comprendront ce dont ils n'avaient pas entendu parler
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '52.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ils verront… parler: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité par Paul en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Romains 15.21
      metadata:
        usfm: ROM.15.21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
