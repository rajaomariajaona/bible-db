document_id: GAL.2,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Quatorze ans plus tard, je suis monté de nouveau à Jérusalem avec Barnabas; j''avais aussi pris Tite avec moi. '
  '10':
  - type: text
    content: Ils nous ont seulement recommandé de nous souvenir des pauvres, ce que j'ai eu bien soin de faire.
  '11':
  - type: text
    content: 'Mais lorsque Pierre est venu à Antioche, je me suis ouvertement opposé à lui, parce qu''il était condamnable. '
  '12':
  - type: text
    content: 'En effet, avant la venue de quelques personnes de l''entourage de Jacques, il mangeait avec les non-Juifs, mais après leur arrivée, il s''est esquivé et s''est tenu à l''écart par crainte des circoncis. '
  '13':
  - type: text
    content: 'Les autres Juifs ont pratiqué avec lui ce double jeu, de telle sorte que même Barnabas a été entraîné dans leur hypocrisie. '
  '14':
  - type: text
    content: 'Quand j''ai vu qu''ils ne marchaient pas droit, puisqu''ils ne respectaient pas la vérité de l''Evangile, j''ai dit à Pierre devant tous: «Si toi, qui es juif, tu vis à la manière des non-Juifs et non à la manière des Juifs, pourquoi veux-tu forcer les non-Juifs à se comporter comme des Juifs?'
  '15':
  - type: text
    content: '»Nous, nous sommes des Juifs de naissance, et non des pécheurs issus des autres nations. '
  '16':
  - type: text
    content: Cependant, nous savons que ce n'est pas sur la base des œuvres de la loi que l'homme est déclaré juste, mais au moyen de la foi en Jésus-Christ. Ainsi, nous aussi nous avons cru en Jésus-Christ afin d'être déclarés justes sur la base de la foi en Christ et non des œuvres de la loi, puisque personne ne sera considéré comme juste sur la base des œuvres de la loi.
  '17':
  - type: text
    content: '»Mais si, en cherchant à être déclarés justes en Christ, nous avons été trouvés pécheurs nous aussi, cela signifie-t-il que Christ serait un serviteur du péché? Certainement pas! '
  '18':
  - type: text
    content: En effet, si je reconstruis ce que j'ai détruit
  - type: note
    content: 'Ce que j''ai détruit: c''est-à-dire le faux système de la justification par la loi.'
  - type: text
    content: ', je me présente moi-même comme coupable, '
  '19':
  - type: text
    content: 'puisque c''est la loi qui m''a amené à mourir à la loi afin de vivre pour Dieu. '
  '2':
  - type: text
    content: 'J''y suis monté à la suite d''une révélation et je leur ai présenté l''Evangile que je prêche parmi les non-Juifs; je l''ai exposé en privé à ceux qui sont les plus considérés afin de ne pas courir ou avoir couru pour rien. '
  '20':
  - type: text
    content: 'J''ai été crucifié avec Christ; ce n''est plus moi qui vis, c''est Christ qui vit en moi; et ce que je vis maintenant dans mon corps, je le vis dans la foi au Fils de Dieu qui m''a aimé et qui s''est donné lui-même pour moi. '
  '21':
  - type: text
    content: Je ne rejette pas la grâce de Dieu; en effet, si la justice s'obtient par la loi, alors Christ est mort pour rien.»
  '3':
  - type: text
    content: 'Or Tite, qui était avec moi et qui est grec, n''a même pas été contraint de se faire circoncire, '
  '4':
  - type: text
    content: 'malgré les prétendus frères qui s''étaient furtivement glissés parmi nous pour épier la liberté que nous avons en Jésus-Christ, avec l''intention de nous asservir. '
  '5':
  - type: text
    content: 'Nous ne leur avons pas cédé un seul instant, afin que la vérité de l''Evangile soit maintenue pour vous. '
  '6':
  - type: text
    content: 'Quant à ceux qui sont les plus considérés – ce qu''ils étaient autrefois m''importe peu, Dieu ne fait pas de favoritisme – ils ne m''ont rien imposé de plus. '
  '7':
  - type: text
    content: Au contraire, ils ont vu que l'Evangile m'avait été confié pour les incirconcis comme à Pierre pour les circoncis
  - type: note
    content: 'Les incirconcis… les circoncis: c''est-à-dire les non-Juifs… les Juifs.'
  - type: text
    content: ' '
  '8':
  - type: text
    content: '– car celui qui a fait de Pierre l''apôtre des circoncis a aussi fait de moi l''apôtre des non-Juifs – '
  '9':
  - type: text
    content: et ils ont reconnu la grâce qui m'avait été accordée. Jacques, Céphas
  - type: note
    content: 'Céphas: autre nom de l''apôtre Pierre.'
  - type: text
    content: ' et Jean, qui sont considérés comme des piliers, nous ont alors donné la main d''association, à Barnabas et à moi, afin que nous allions, nous vers les non-Juifs, eux vers les circoncis. '
