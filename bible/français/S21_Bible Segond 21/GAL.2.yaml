document_id: GAL.2
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Quatorze ans plus tard, je suis monté de nouveau à Jérusalem avec Barnabas; j''avais aussi pris Tite avec moi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'J''y suis monté à la suite d''une révélation et je leur ai présenté l''Evangile que je prêche parmi les non-Juifs; je l''ai exposé en privé à ceux qui sont les plus considérés afin de ne pas courir ou avoir couru pour rien. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Or Tite, qui était avec moi et qui est grec, n''a même pas été contraint de se faire circoncire, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'malgré les prétendus frères qui s''étaient furtivement glissés parmi nous pour épier la liberté que nous avons en Jésus-Christ, avec l''intention de nous asservir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Nous ne leur avons pas cédé un seul instant, afin que la vérité de l''Evangile soit maintenue pour vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Quant à ceux qui sont les plus considérés – ce qu''ils étaient autrefois m''importe peu, Dieu ne fait pas de favoritisme – ils ne m''ont rien imposé de plus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Au contraire, ils ont vu que l'Evangile m'avait été confié pour les incirconcis comme à Pierre pour les circoncis
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Les incirconcis… les circoncis: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: c'est-à-dire les non-Juifs… les Juifs.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '– car celui qui a fait de Pierre l''apôtre des circoncis a aussi fait de moi l''apôtre des non-Juifs – '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: et ils ont reconnu la grâce qui m'avait été accordée. Jacques, Céphas
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Céphas: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: autre nom de l'apôtre Pierre.
    marker-yv: yv-n
  - type: text
    text: ' et Jean, qui sont considérés comme des piliers, nous ont alors donné la main d''association, à Barnabas et à moi, afin que nous allions, nous vers les non-Juifs, eux vers les circoncis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ils nous ont seulement recommandé de nous souvenir des pauvres, ce que j'ai eu bien soin de faire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mais lorsque Pierre est venu à Antioche, je me suis ouvertement opposé à lui, parce qu''il était condamnable. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'En effet, avant la venue de quelques personnes de l''entourage de Jacques, il mangeait avec les non-Juifs, mais après leur arrivée, il s''est esquivé et s''est tenu à l''écart par crainte des circoncis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Les autres Juifs ont pratiqué avec lui ce double jeu, de telle sorte que même Barnabas a été entraîné dans leur hypocrisie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Quand j''ai vu qu''ils ne marchaient pas droit, puisqu''ils ne respectaient pas la vérité de l''Evangile, j''ai dit à Pierre devant tous: «Si toi, qui es juif, tu vis à la manière des non-Juifs et non à la manière des Juifs, pourquoi veux-tu forcer les non-Juifs à se comporter comme des Juifs?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '»Nous, nous sommes des Juifs de naissance, et non des pécheurs issus des autres nations. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Cependant, nous savons que ce n'est pas sur la base des œuvres de la loi que l'homme est déclaré juste, mais au moyen de la foi en Jésus-Christ. Ainsi, nous aussi nous avons cru en Jésus-Christ afin d'être déclarés justes sur la base de la foi en Christ et non des œuvres de la loi, puisque personne ne sera considéré comme juste sur la base des œuvres de la loi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '»Mais si, en cherchant à être déclarés justes en Christ, nous avons été trouvés pécheurs nous aussi, cela signifie-t-il que Christ serait un serviteur du péché? Certainement pas! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: En effet, si je reconstruis ce que j'ai détruit
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ce que j''ai détruit: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: c'est-à-dire le faux système de la justification par la loi.
    marker-yv: yv-n
  - type: text
    text: ', je me présente moi-même comme coupable, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'puisque c''est la loi qui m''a amené à mourir à la loi afin de vivre pour Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'J''ai été crucifié avec Christ; ce n''est plus moi qui vis, c''est Christ qui vit en moi; et ce que je vis maintenant dans mon corps, je le vis dans la foi au Fils de Dieu qui m''a aimé et qui s''est donné lui-même pour moi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Je ne rejette pas la grâce de Dieu; en effet, si la justice s'obtient par la loi, alors Christ est mort pour rien.»
