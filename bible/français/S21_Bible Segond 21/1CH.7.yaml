document_id: 1CH.7,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Descendance d'Issacar, Benjamin et Nephthali
  - type: text
    content: 'Fils d''Issacar: Thola, Pua, Jashub et Shimron, ce qui fait 4. '
  '10':
  - type: text
    content: 'Descendants de Jediaël: Bilhan et ses fils Jeush, Benjamin, Ehud, Kenaana, Zéthan, Tarsis et Achishachar. '
  '11':
  - type: text
    content: Tous ceux-là étaient des descendants de Jediaël et chefs de leurs familles. Les hommes vaillants étaient au nombre de 17'200, tous aptes au service militaire et à la guerre.
  '12':
  - type: text
    content: Shuppim et Huppim descendaient d'Ir, et Hushim d'Acher.
  '13':
  - type: text
    content: 'Fils de Nephthali: Jahtsiel, Guni, Jetser et Shallum. Ils étaient les descendants de Bilha.'
  - type: heading
    content: Descendance de Manassé et Ephraïm
  '14':
  - type: text
    content: 'Descendants de Manassé: Asriel, que lui donna sa concubine syrienne; elle avait mis au monde Makir, le père de Galaad. '
  '15':
  - type: text
    content: 'Makir prit une femme pour Huppim et Shuppim. Sa sœur s''appelait Maaca. Le nom du deuxième descendant était Tselophchad, qui n''eut que des filles. '
  '16':
  - type: text
    content: 'Maaca, la femme de Makir, mit au monde un fils qu''elle appela Péresh; le frère de ce Péresh s''appelait Shéresh, et ses fils Ulam et Rékem. '
  '17':
  - type: text
    content: 'Fils d''Ulam: Bedan. Ce sont là les descendants de Galaad, fils de Makir, fils de Manassé. '
  '18':
  - type: text
    content: 'Sa sœur Hammoléketh mit au monde Ishhod, Abiézer et Machla. '
  '19':
  - type: text
    content: Les fils de Shemida étaient Achjan, Sichem, Likchi et Aniam.
  '2':
  - type: text
    content: 'Fils de Thola: Uzzi, Rephaja, Jeriel, Jachmaï, Jibsam et Samuel, qui étaient chefs de leurs familles. Ceux qui appartenaient à Thola étaient de vaillants hommes dans leur lignée. A l''époque de David, leur nombre était de 22''600. '
  '20':
  - type: text
    content: 'Descendants d''Ephraïm: Shutélach, lui-même père de Béred, père de Thachath, père d''Eleada, père de Thachath, '
  '21':
  - type: text
    content: 'père de Zabad, père de Shutélach. Il y avait aussi Ezer et Elead, que les hommes de Gath, ceux qui étaient nés dans le pays, tuèrent parce qu''ils étaient descendus pour s''emparer de leurs troupeaux. '
  '22':
  - type: text
    content: 'Leur père Ephraïm mena longtemps le deuil et ses frères vinrent pour le consoler. '
  '23':
  - type: text
    content: Puis il s'unit à sa femme, qui devint enceinte et mit au monde un fils; il l'appela Beria
  - type: note
    content: 'Beria: fait assonance avec les mots hébreux traduits par dans le malheur.'
  - type: text
    content: ' parce qu''elle avait été dans le malheur chez lui. '
  '24':
  - type: text
    content: 'Il eut pour fille Shééra, qui construisit Beth-Horon-la-basse et Beth-Horon-la-haute, ainsi qu''Uzzen-Shééra. '
  '25':
  - type: text
    content: 'Puis il y eut Réphach et Résheph, Thélach, Thachan, '
  '26':
  - type: text
    content: 'Laedan, Ammihud, Elishama, '
  '27':
  - type: text
    content: 'Nun et Josué. '
  '28':
  - type: text
    content: 'Ils avaient en propriété et pour lieu d''habitation Béthel et les villes qui en dépendent; à l''est, Naaran; à l''ouest, Guézer et les villes qui en dépendent, Sichem et les villes qui en dépendent, jusqu''à Gaza et aux villes qui en dépendent. '
  '29':
  - type: text
    content: Quant aux Manassites, ils possédaient Beth-Shean et les villes qui en dépendent, Thaanac et les villes qui en dépendent, Meguiddo et les villes qui en dépendent, Dor et les villes qui en dépendent. Ce fut dans ces villes qu'habitèrent les descendants de Joseph, le fils d'Israël.
  - type: heading
    content: Descendance d'Aser
  '3':
  - type: text
    content: 'Descendants d''Uzzi: Jizrachja et ses fils Micaël, Abdias, Joël et Jishija. Cela faisait en tout 5 chefs. '
  '30':
  - type: text
    content: 'Enfants d''Aser: Jimna, Jishva, Jishvi, Beria et Sérach, leur sœur. '
  '31':
  - type: text
    content: 'Fils de Beria: Héber et Malkiel. Malkiel fut le père de Birzavith. '
  '32':
  - type: text
    content: 'Héber eut pour enfants Japhleth, Shomer et Hotham, ainsi que Shua, leur sœur. '
  '33':
  - type: text
    content: 'Fils de Japhleth: Pasac, Bimhal et Ashvath. Ce sont là les fils de Japhleth. '
  '34':
  - type: text
    content: 'Fils de Shomer: Achi, Rohega, Hubba et Aram. '
  '35':
  - type: text
    content: 'Fils de son frère Hélem: Tsophach, Jimna, Shélesh et Amal. '
  '36':
  - type: text
    content: 'Fils de Tsophach: Suach, Harnépher, Shual, Béri, Jimra, '
  '37':
  - type: text
    content: 'Betser, Hod, Shamma, Shilsha, Jéther et Beéra. '
  '38':
  - type: text
    content: 'Fils de Jéther: Jephunné, Pispa et Ara. '
  '39':
  - type: text
    content: 'Fils d''Ulla: Arach, Hanniel et Ritsja. '
  '4':
  - type: text
    content: 'Ils avaient avec eux, répartis en fonction de leur lignée et leur famille, 36''000 hommes de troupes armés pour la guerre. En effet, ils avaient beaucoup de femmes et de fils. '
  '40':
  - type: text
    content: Tous ceux-là descendaient d'Aser et étaient les chefs de leurs familles, des hommes d'élite et vaillants, des chefs des princes. Les hommes qui étaient enregistrés étaient au nombre de 26'000, tous aptes au service militaire et à la guerre.
  '5':
  - type: text
    content: Leurs frères, membres de tous les clans d'Issacar et hommes vaillants, formaient un total de 87'000 enregistrés dans les généalogies.
  '6':
  - type: text
    content: 'Fils de Benjamin: Béla, Béker et Jediaël, ce qui fait 3. '
  '7':
  - type: text
    content: 'Fils de Béla: Etsbon, Uzzi, Uziel, Jerimoth et Iri, tous les cinq chefs de leurs familles. Les hommes vaillants enregistrés dans les généalogies étaient au nombre de 22''034. '
  '8':
  - type: text
    content: 'Fils de Béker: Zemira, Joash, Eliézer, Eljoénaï, Omri, Jerémoth, Abija, Anathoth et Alameth, tous fils de Béker. '
  '9':
  - type: text
    content: 'Ceux qui étaient enregistrés dans les généalogies, en fonction de leur lignée, comme chefs de leurs familles, tous hommes vaillants, étaient au nombre de 20''200. '
