document_id: 1CH.7,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Descendance d'Issacar, Benjamin et Nephthali
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Fils d''Issacar: Thola, Pua, Jashub et Shimron, ce qui fait 4. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Descendants de Jediaël: Bilhan et ses fils Jeush, Benjamin, Ehud, Kenaana, Zéthan, Tarsis et Achishachar. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Tous ceux-là étaient des descendants de Jediaël et chefs de leurs familles. Les hommes vaillants étaient au nombre de 17'200, tous aptes au service militaire et à la guerre.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Shuppim et Huppim descendaient d'Ir, et Hushim d'Acher.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Fils de Nephthali: Jahtsiel, Guni, Jetser et Shallum. Ils étaient les descendants de Bilha.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Descendance de Manassé et Ephraïm
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Descendants de Manassé: Asriel, que lui donna sa concubine syrienne; elle avait mis au monde Makir, le père de Galaad. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Makir prit une femme pour Huppim et Shuppim. Sa sœur s''appelait Maaca. Le nom du deuxième descendant était Tselophchad, qui n''eut que des filles. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Maaca, la femme de Makir, mit au monde un fils qu''elle appela Péresh; le frère de ce Péresh s''appelait Shéresh, et ses fils Ulam et Rékem. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Fils d''Ulam: Bedan. Ce sont là les descendants de Galaad, fils de Makir, fils de Manassé. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Sa sœur Hammoléketh mit au monde Ishhod, Abiézer et Machla. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Les fils de Shemida étaient Achjan, Sichem, Likchi et Aniam.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Fils de Thola: Uzzi, Rephaja, Jeriel, Jachmaï, Jibsam et Samuel, qui étaient chefs de leurs familles. Ceux qui appartenaient à Thola étaient de vaillants hommes dans leur lignée. A l''époque de David, leur nombre était de 22''600. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Descendants d''Ephraïm: Shutélach, lui-même père de Béred, père de Thachath, père d''Eleada, père de Thachath, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'père de Zabad, père de Shutélach. Il y avait aussi Ezer et Elead, que les hommes de Gath, ceux qui étaient nés dans le pays, tuèrent parce qu''ils étaient descendus pour s''emparer de leurs troupeaux. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Leur père Ephraïm mena longtemps le deuil et ses frères vinrent pour le consoler. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Puis il s'unit à sa femme, qui devint enceinte et mit au monde un fils; il l'appela Beria
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Beria: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fait assonance avec les mots hébreux traduits par dans le malheur.
      marker-yv: yv-n
    - type: text
      text: ' parce qu''elle avait été dans le malheur chez lui. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Il eut pour fille Shééra, qui construisit Beth-Horon-la-basse et Beth-Horon-la-haute, ainsi qu''Uzzen-Shééra. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Puis il y eut Réphach et Résheph, Thélach, Thachan, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Laedan, Ammihud, Elishama, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Nun et Josué. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Ils avaient en propriété et pour lieu d''habitation Béthel et les villes qui en dépendent; à l''est, Naaran; à l''ouest, Guézer et les villes qui en dépendent, Sichem et les villes qui en dépendent, jusqu''à Gaza et aux villes qui en dépendent. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Quant aux Manassites, ils possédaient Beth-Shean et les villes qui en dépendent, Thaanac et les villes qui en dépendent, Meguiddo et les villes qui en dépendent, Dor et les villes qui en dépendent. Ce fut dans ces villes qu'habitèrent les descendants de Joseph, le fils d'Israël.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Descendance d'Aser
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Descendants d''Uzzi: Jizrachja et ses fils Micaël, Abdias, Joël et Jishija. Cela faisait en tout 5 chefs. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Enfants d''Aser: Jimna, Jishva, Jishvi, Beria et Sérach, leur sœur. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Fils de Beria: Héber et Malkiel. Malkiel fut le père de Birzavith. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Héber eut pour enfants Japhleth, Shomer et Hotham, ainsi que Shua, leur sœur. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Fils de Japhleth: Pasac, Bimhal et Ashvath. Ce sont là les fils de Japhleth. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Fils de Shomer: Achi, Rohega, Hubba et Aram. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Fils de son frère Hélem: Tsophach, Jimna, Shélesh et Amal. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Fils de Tsophach: Suach, Harnépher, Shual, Béri, Jimra, '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Betser, Hod, Shamma, Shilsha, Jéther et Beéra. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Fils de Jéther: Jephunné, Pispa et Ara. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Fils d''Ulla: Arach, Hanniel et Ritsja. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ils avaient avec eux, répartis en fonction de leur lignée et leur famille, 36''000 hommes de troupes armés pour la guerre. En effet, ils avaient beaucoup de femmes et de fils. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Tous ceux-là descendaient d'Aser et étaient les chefs de leurs familles, des hommes d'élite et vaillants, des chefs des princes. Les hommes qui étaient enregistrés étaient au nombre de 26'000, tous aptes au service militaire et à la guerre.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Leurs frères, membres de tous les clans d'Issacar et hommes vaillants, formaient un total de 87'000 enregistrés dans les généalogies.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Fils de Benjamin: Béla, Béker et Jediaël, ce qui fait 3. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Fils de Béla: Etsbon, Uzzi, Uziel, Jerimoth et Iri, tous les cinq chefs de leurs familles. Les hommes vaillants enregistrés dans les généalogies étaient au nombre de 22''034. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Fils de Béker: Zemira, Joash, Eliézer, Eljoénaï, Omri, Jerémoth, Abija, Anathoth et Alameth, tous fils de Béker. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ceux qui étaient enregistrés dans les généalogies, en fonction de leur lignée, comme chefs de leurs familles, tous hommes vaillants, étaient au nombre de 20''200. '
