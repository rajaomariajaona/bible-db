document_id: HEB.3,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Christ supérieur à Moïse et Josué
  - type: text
    content: 'Ainsi donc, frères et sœurs saints, vous qui avez part à l''appel céleste, portez vos pensées sur l''apôtre et le grand-prêtre de la foi que nous professons, Jésus[-Christ]. '
  '10':
  - type: text
    content: 'C''est pourquoi j''ai été irrité contre cette génération et j''ai dit: ‘Ils ont toujours un cœur qui s''égare, ils n''ont pas connu mes voies.’'
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'Aussi, j''ai juré dans ma colère: ‘Ils n''entreront pas dans mon repos!’'
  - type: note
    content: 'Aujourd''hui… repos: citation du Psaume 95.7-11.'
  '12':
  - type: text
    content: 'Faites attention, frères et sœurs: qu''aucun de vous n''ait un cœur mauvais et incrédule qui le détourne du Dieu vivant. '
  '13':
  - type: text
    content: 'Au contraire, encouragez-vous les uns les autres chaque jour, aussi longtemps qu''on peut dire: «Aujourd''hui», afin qu''aucun de vous ne s''endurcisse, trompé par le péché. '
  '14':
  - type: text
    content: 'En effet, nous sommes devenus les compagnons de Christ, pourvu que nous retenions fermement jusqu''à la fin notre position première, '
  '15':
  - type: text
    content: 'aussi longtemps qu''il est dit: '
  - type: text
    content: Aujourd'hui, si vous entendez sa voix, n'endurcissez pas votre cœur comme lors de la révolte
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Qui s''est en effet révolté après avoir entendu? N''est-ce pas tous ceux qui étaient sortis d''Egypte sous la conduite de Moïse? '
  '17':
  - type: text
    content: 'Contre qui Dieu a-t-il été irrité pendant 40 ans? N''est-ce pas contre ceux qui avaient péché et dont les cadavres sont tombés dans le désert? '
  '18':
  - type: text
    content: 'Et à qui a-t-il juré qu''ils n''entreraient pas dans son repos, sinon à ceux qui avaient désobéi? '
  '19':
  - type: text
    content: Ainsi nous voyons qu'ils n'ont pas pu y entrer à cause de leur incrédulité.
  '2':
  - type: text
    content: Il est resté fidèle à celui qui l'a établi tout comme Moïse l'a été dans [toute] sa maison.
  '3':
  - type: text
    content: 'En effet, il a été jugé digne d''une gloire supérieure à celle de Moïse, dans la mesure où celui qui a construit une maison reçoit plus d''honneur que la maison elle-même. '
  '4':
  - type: text
    content: 'Toute maison est construite par quelqu''un, mais celui qui a construit toute chose, c''est Dieu. '
  '5':
  - type: text
    content: Moïse a été fidèle dans toute la maison de Dieu comme serviteur
  - type: note
    content: 'Moïse… serviteur: citation de Nombres 12.7.'
  - type: text
    content: ', pour témoigner de ce qui allait être dit, '
  '6':
  - type: text
    content: mais Christ l'est comme Fils à la tête de sa maison. Or sa maison, c'est nous, pourvu que nous retenions [fermement jusqu'à la fin] la confiance et l'espérance dont nous tirons notre fierté.
  '7':
  - type: text
    content: 'C''est pourquoi, comme le dit le Saint-Esprit, '
  - type: text
    content: aujourd'hui, si vous entendez sa voix,
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'n''endurcissez pas votre cœur comme lors de la révolte, comme le jour de la tentation dans le désert:'
  - type: text
    content: ' '
  '9':
  - type: text
    content: là, vos ancêtres m'ont provoqué, ils m'ont mis à l'épreuve et ils m'ont vu agir pendant 40 ans.
  - type: text
    content: ' '
