document_id: HEB.3,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Christ supérieur à Moïse et Josué
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi donc, frères et sœurs saints, vous qui avez part à l''appel céleste, portez vos pensées sur l''apôtre et le grand-prêtre de la foi que nous professons, Jésus[-Christ]. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: 'C''est pourquoi j''ai été irrité contre cette génération et j''ai dit: ‘Ils ont toujours un cœur qui s''égare, ils n''ont pas connu mes voies.’'
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: 'Aussi, j''ai juré dans ma colère: ‘Ils n''entreront pas dans mon repos!’'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.7-11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Aujourd''hui… repos: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation du '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Psaume 95.7-11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Faites attention, frères et sœurs: qu''aucun de vous n''ait un cœur mauvais et incrédule qui le détourne du Dieu vivant. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Au contraire, encouragez-vous les uns les autres chaque jour, aussi longtemps qu''on peut dire: «Aujourd''hui», afin qu''aucun de vous ne s''endurcisse, trompé par le péché. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, nous sommes devenus les compagnons de Christ, pourvu que nous retenions fermement jusqu''à la fin notre position première, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'aussi longtemps qu''il est dit: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Aujourd'hui, si vous entendez sa voix, n'endurcissez pas votre cœur comme lors de la révolte
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Qui s''est en effet révolté après avoir entendu? N''est-ce pas tous ceux qui étaient sortis d''Egypte sous la conduite de Moïse? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Contre qui Dieu a-t-il été irrité pendant 40 ans? N''est-ce pas contre ceux qui avaient péché et dont les cadavres sont tombés dans le désert? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et à qui a-t-il juré qu''ils n''entreraient pas dans son repos, sinon à ceux qui avaient désobéi? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ainsi nous voyons qu'ils n'ont pas pu y entrer à cause de leur incrédulité.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il est resté fidèle à celui qui l'a établi tout comme Moïse l'a été dans [toute] sa maison.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, il a été jugé digne d''une gloire supérieure à celle de Moïse, dans la mesure où celui qui a construit une maison reçoit plus d''honneur que la maison elle-même. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toute maison est construite par quelqu''un, mais celui qui a construit toute chose, c''est Dieu. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Moïse a été fidèle dans toute la maison de Dieu comme serviteur
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Moïse… serviteur: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nombres 12.7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', pour témoigner de ce qui allait être dit, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: mais Christ l'est comme Fils à la tête de sa maison. Or sa maison, c'est nous, pourvu que nous retenions [fermement jusqu'à la fin] la confiance et l'espérance dont nous tirons notre fierté.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C''est pourquoi, comme le dit le Saint-Esprit, '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: aujourd'hui, si vous entendez sa voix,
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: 'n''endurcissez pas votre cœur comme lors de la révolte, comme le jour de la tentation dans le désert:'
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: là, vos ancêtres m'ont provoqué, ils m'ont mis à l'épreuve et ils m'ont vu agir pendant 40 ans.
    - type: text
      text: ' '
