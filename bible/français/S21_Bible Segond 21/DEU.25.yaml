document_id: DEU.25,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Les différends
  - type: text
    content: '»Lorsque des hommes qui ont un différend se présenteront en justice pour être jugés, on acquittera l''innocent et l''on condamnera le coupable. '
  '10':
  - type: text
    content: Et sa famille sera appelée en Israël ‘la famille du déchaussé’.
  '11':
  - type: text
    content: '»Lorsque des hommes se querelleront ensemble, l''un avec l''autre, si la femme de l''un d''eux s''approche pour délivrer son mari de la main qui le frappe et que, avançant la main, elle attrape ce dernier par les parties honteuses, '
  '12':
  - type: text
    content: tu lui couperas la main. Ton regard sera sans pitié envers elle.
  - type: heading
    content: Une mesure juste
  '13':
  - type: text
    content: '»Tu n''auras pas dans ton sac deux sortes de poids, un gros et un petit. '
  '14':
  - type: text
    content: 'Tu n''auras pas dans ta maison deux sortes de mesures, une grande et une petite. '
  '15':
  - type: text
    content: 'Tu auras un poids exact et juste, et une mesure exacte et juste, afin de vivre longtemps sur le territoire que l''Eternel, ton Dieu, te donne. '
  '16':
  - type: text
    content: En effet, celui qui agit de cette manière, qui commet une injustice, est en horreur à l'Eternel, ton Dieu.
  - type: heading
    content: Jugement futur d'Amalek
  '17':
  - type: text
    content: '»Souviens-toi de ce que t''a fait Amalek sur le chemin de votre sortie d''Egypte, '
  '18':
  - type: text
    content: 'la façon dont il est venu à ta rencontre sur ton parcours et, sans aucune crainte de Dieu, est tombé par-derrière sur toi, sur tous ceux qui se traînaient les derniers, pendant que tu étais toi-même fatigué et épuisé. '
  '19':
  - type: text
    content: Lorsque l'Eternel, ton Dieu, t'aura délivré de tous les ennemis qui t'entourent et t'accordera du repos dans le pays qu'il te donne en héritage et en propriété, tu effaceras le souvenir d'Amalek de dessous le ciel. Ne l'oublie pas.
  '2':
  - type: text
    content: 'Si le coupable mérite d''être battu, le juge le fera s''allonger par terre et frapper en sa présence d''un nombre de coups proportionnel à la gravité de sa faute. '
  '3':
  - type: text
    content: Il ne lui fera pas donner plus de 40 coups car, si l'on continuait à le frapper en dépassant de beaucoup ce nombre, ton frère serait déshonoré à tes yeux.
  '4':
  - type: text
    content: »*Tu ne mettras pas de muselière au bœuf quand il foulera le grain.
  - type: note
    content: 'Tu ne mettras… grain: cité par l''apôtre Paul en 1 Corinthiens 9.9; 1 Timothée 5.18.'
  - type: heading
    content: La descendance d'un frère mort
  '5':
  - type: text
    content: '»*Lorsque des frères habiteront ensemble et que l''un d''eux mourra sans laisser d''enfant, la femme du défunt ne se mariera pas en dehors de la famille avec un étranger. C''est son beau-frère qui s''unira à elle, la prendra pour femme et l''épousera comme beau-frère. '
  '6':
  - type: text
    content: Le premier-né qu'elle mettra au monde succédera au frère
  - type: note
    content: 'Lorsque… frère: principe mentionné en Matthieu 22.24; Marc 12.19; Luc 20.28.'
  - type: text
    content: ' mort et portera son nom, afin que ce nom ne soit pas effacé d''Israël. '
  '7':
  - type: text
    content: 'Si l''homme ne veut pas épouser sa belle-sœur, elle montera à la porte vers les anciens et dira: ‘Mon beau-frère refuse de maintenir le nom de son frère en Israël, il ne veut pas m''épouser conformément à son devoir de beau-frère.’ '
  '8':
  - type: text
    content: 'Les anciens de la ville appelleront l''homme et lui parleront. S''il persiste dans sa position et dit: ‘Je ne veux pas l''épouser’, '
  '9':
  - type: text
    content: 'alors sa belle-sœur s''approchera de lui en présence des anciens, lui enlèvera sa sandale du pied et lui crachera au visage. Prenant la parole, elle dira: ‘Voilà ce que l''on fera à l''homme qui ne veut pas bâtir la famille de son frère.’ '
