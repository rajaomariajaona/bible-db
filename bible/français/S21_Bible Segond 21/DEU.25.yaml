document_id: DEU.25
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les différends
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '»Lorsque des hommes qui ont un différend se présenteront en justice pour être jugés, on acquittera l''innocent et l''on condamnera le coupable. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Si le coupable mérite d''être battu, le juge le fera s''allonger par terre et frapper en sa présence d''un nombre de coups proportionnel à la gravité de sa faute. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Il ne lui fera pas donner plus de 40 coups car, si l'on continuait à le frapper en dépassant de beaucoup ce nombre, ton frère serait déshonoré à tes yeux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: »*Tu ne mettras pas de muselière au bœuf quand il foulera le grain.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tu ne mettras… grain: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité par l''apôtre Paul en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Corinthiens 9.9
      metadata:
        usfm: 1CO.9.9
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Timothée 5.18
      metadata:
        usfm: 1TI.5.18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: La descendance d'un frère mort
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '»*Lorsque des frères habiteront ensemble et que l''un d''eux mourra sans laisser d''enfant, la femme du défunt ne se mariera pas en dehors de la famille avec un étranger. C''est son beau-frère qui s''unira à elle, la prendra pour femme et l''épousera comme beau-frère. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Le premier-né qu'elle mettra au monde succédera au frère
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.5-6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Lorsque… frère: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'principe mentionné en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matthieu 22.24
      metadata:
        usfm: MAT.22.24
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Marc 12.19
      metadata:
        usfm: MRK.12.19
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Luc 20.28
      metadata:
        usfm: LUK.20.28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' mort et portera son nom, afin que ce nom ne soit pas effacé d''Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Si l''homme ne veut pas épouser sa belle-sœur, elle montera à la porte vers les anciens et dira: ‘Mon beau-frère refuse de maintenir le nom de son frère en Israël, il ne veut pas m''épouser conformément à son devoir de beau-frère.’ '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Les anciens de la ville appelleront l''homme et lui parleront. S''il persiste dans sa position et dit: ‘Je ne veux pas l''épouser’, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'alors sa belle-sœur s''approchera de lui en présence des anciens, lui enlèvera sa sandale du pied et lui crachera au visage. Prenant la parole, elle dira: ‘Voilà ce que l''on fera à l''homme qui ne veut pas bâtir la famille de son frère.’ '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Et sa famille sera appelée en Israël ‘la famille du déchaussé’.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '»Lorsque des hommes se querelleront ensemble, l''un avec l''autre, si la femme de l''un d''eux s''approche pour délivrer son mari de la main qui le frappe et que, avançant la main, elle attrape ce dernier par les parties honteuses, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: tu lui couperas la main. Ton regard sera sans pitié envers elle.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Une mesure juste
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '»Tu n''auras pas dans ton sac deux sortes de poids, un gros et un petit. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Tu n''auras pas dans ta maison deux sortes de mesures, une grande et une petite. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tu auras un poids exact et juste, et une mesure exacte et juste, afin de vivre longtemps sur le territoire que l''Eternel, ton Dieu, te donne. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: En effet, celui qui agit de cette manière, qui commet une injustice, est en horreur à l'Eternel, ton Dieu.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jugement futur d'Amalek
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '»Souviens-toi de ce que t''a fait Amalek sur le chemin de votre sortie d''Egypte, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'la façon dont il est venu à ta rencontre sur ton parcours et, sans aucune crainte de Dieu, est tombé par-derrière sur toi, sur tous ceux qui se traînaient les derniers, pendant que tu étais toi-même fatigué et épuisé. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Lorsque l'Eternel, ton Dieu, t'aura délivré de tous les ennemis qui t'entourent et t'accordera du repos dans le pays qu'il te donne en héritage et en propriété, tu effaceras le souvenir d'Amalek de dessous le ciel. Ne l'oublie pas.
