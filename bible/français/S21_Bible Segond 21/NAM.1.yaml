document_id: NAM.1,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Description de l'Eternel
  - type: text
    content: Message sur Ninive
  - type: note
    content: 'Ninive: capitale de l''Empire assyrien.'
  - type: text
    content: . Livre de la vision de Nahum, d'Elkosh.
  '10':
  - type: text
    content: car entrelacés comme des buissons d'épines
  - type: text
    content: et comme ivres de leur vin,
  - type: text
    content: ils
  - type: note
    content: 'Ils: c''est-à-dire les ennemis de Juda, les Assyriens.'
  - type: text
    content: ' seront dévorés'
  - type: text
    content: comme la paille sèche, entièrement.
  '11':
  - type: text
    content: De toi
  - type: note
    content: 'Toi: s''adresse à Ninive.'
  - type: text
    content: ' est sorti'
  - type: text
    content: celui qui méditait le mal contre l'Eternel,
  - type: text
    content: l'homme aux conseils pervers.
  '12':
  - type: text
    content: 'Voici ce que dit l''Eternel:'
  - type: text
    content: «Même s'ils sont au complet et nombreux,
  - type: text
    content: ils seront fauchés et disparaîtront.
  - type: text
    content: Je t'ai humilié pour ne plus avoir à t'humilier.
  '13':
  - type: text
    content: Je briserai maintenant la domination qu'il exerce sur toi
  - type: text
    content: et j'arracherai tes liens.»
  '14':
  - type: text
    content: Voici ce que l'Eternel a ordonné à ton sujet
  - type: note
    content: 'Aton sujet: s''adresse au roi de Ninive.'
  - type: text
    content: ':'
  - type: text
    content: «Tu n'auras plus de descendant qui porte ton nom.
  - type: text
    content: Je supprimerai du temple de ton dieu les sculptures sacrées ou les idoles en métal fondu.
  - type: text
    content: Je préparerai ta tombe, car tu ne fais pas le poids.»
  '2':
  - type: text
    content: L'Eternel est un Dieu jaloux, il se venge.
  - type: text
    content: L'Eternel se venge, il est plein de fureur.
  - type: text
    content: L'Eternel se venge de ses adversaires,
  - type: text
    content: il garde rancune à ses ennemis.
  '3':
  - type: text
    content: L'Eternel est lent à la colère, il est grand par sa force,
  - type: text
    content: mais il ne laisse pas impuni.
  - type: text
    content: L'Eternel marche dans la tempête, dans le tourbillon;
  - type: text
    content: les nuages sont la poussière de ses pieds.
  '4':
  - type: text
    content: Il menace la mer et l'assèche,
  - type: text
    content: il met tous les fleuves à sec.
  - type: text
    content: Le Basan et le Carmel sont flétris,
  - type: text
    content: elle est flétrie, la fleur du Liban.
  '5':
  - type: text
    content: Les montagnes tremblent devant lui,
  - type: text
    content: et les collines s'effondrent.
  - type: text
    content: La terre se soulève devant lui,
  - type: text
    content: le monde et tous ses habitants.
  '6':
  - type: text
    content: Qui résistera devant son indignation?
  - type: text
    content: Qui tiendra contre son ardente colère?
  - type: text
    content: Sa fureur se propage comme le feu
  - type: text
    content: et les rochers se brisent devant lui.
  '7':
  - type: text
    content: L'Eternel est bon,
  - type: text
    content: il est un refuge le jour de la détresse,
  - type: text
    content: il connaît ceux qui se confient en lui,
  '8':
  - type: text
    content: mais avec des flots qui déborderont
  - type: text
    content: il détruira cet endroit,
  - type: text
    content: et il poursuivra ses ennemis jusque dans les ténèbres.
  - type: heading
    content: Annonce de la destruction de Ninive
  '9':
  - type: text
    content: Que méditez-vous contre l'Eternel?
  - type: text
    content: C'est lui qui détruit.
  - type: text
    content: La détresse ne se lèvera pas deux fois,
