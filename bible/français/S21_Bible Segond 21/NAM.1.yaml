document_id: NAM.1
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Description de l'Eternel
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Message sur Ninive
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ninive: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: capitale de l'Empire assyrien.
    marker-yv: yv-n
  - type: text
    text: . Livre de la vision de Nahum, d'Elkosh.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: L'Eternel est un Dieu jaloux, il se venge.
- type: usfm
  marker: q1
  children:
  - type: text
    text: L'Eternel se venge, il est plein de fureur.
- type: usfm
  marker: q1
  children:
  - type: text
    text: L'Eternel se venge de ses adversaires,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il garde rancune à ses ennemis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: L'Eternel est lent à la colère, il est grand par sa force,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais il ne laisse pas impuni.
- type: usfm
  marker: q1
  children:
  - type: text
    text: L'Eternel marche dans la tempête, dans le tourbillon;
- type: usfm
  marker: q1
  children:
  - type: text
    text: les nuages sont la poussière de ses pieds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Il menace la mer et l'assèche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il met tous les fleuves à sec.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le Basan et le Carmel sont flétris,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle est flétrie, la fleur du Liban.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Les montagnes tremblent devant lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les collines s'effondrent.
- type: usfm
  marker: q1
  children:
  - type: text
    text: La terre se soulève devant lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le monde et tous ses habitants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Qui résistera devant son indignation?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui tiendra contre son ardente colère?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sa fureur se propage comme le feu
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les rochers se brisent devant lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: L'Eternel est bon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il est un refuge le jour de la détresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il connaît ceux qui se confient en lui,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: mais avec des flots qui déborderont
- type: usfm
  marker: q1
  children:
  - type: text
    text: il détruira cet endroit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il poursuivra ses ennemis jusque dans les ténèbres.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Annonce de la destruction de Ninive
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Que méditez-vous contre l'Eternel?
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est lui qui détruit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: La détresse ne se lèvera pas deux fois,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: car entrelacés comme des buissons d'épines
- type: usfm
  marker: q1
  children:
  - type: text
    text: et comme ivres de leur vin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ils: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: c'est-à-dire les ennemis de Juda, les Assyriens.
    marker-yv: yv-n
  - type: text
    text: ' seront dévorés'
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme la paille sèche, entièrement.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: De toi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Toi: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: s'adresse à Ninive.
    marker-yv: yv-n
  - type: text
    text: ' est sorti'
- type: usfm
  marker: q1
  children:
  - type: text
    text: celui qui méditait le mal contre l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'homme aux conseils pervers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Voici ce que dit l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Même s'ils sont au complet et nombreux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils seront fauchés et disparaîtront.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je t'ai humilié pour ne plus avoir à t'humilier.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Je briserai maintenant la domination qu'il exerce sur toi
- type: usfm
  marker: q1
  children:
  - type: text
    text: et j'arracherai tes liens.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Voici ce que l'Eternel a ordonné à ton sujet
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Aton sujet: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: s'adresse au roi de Ninive.
    marker-yv: yv-n
  - type: text
    text: ':'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Tu n'auras plus de descendant qui porte ton nom.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je supprimerai du temple de ton dieu les sculptures sacrées ou les idoles en métal fondu.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je préparerai ta tombe, car tu ne fais pas le poids.»
