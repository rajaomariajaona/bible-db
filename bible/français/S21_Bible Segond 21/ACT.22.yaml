document_id: ACT.22,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: «Mes frères et mes pères, écoutez ce que j'ai maintenant à vous dire pour ma défense!»
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors j''ai dit: ‘Que dois-je faire, Seigneur?’ Et le Seigneur m''a dit: ‘Lève-toi, va à Damas et là on te dira tout ce que tu dois faire.’ '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Comme je ne voyais plus à cause de l'éclat de cette lumière, ceux qui étaient avec moi m'ont pris par la main et je suis arrivé à Damas.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Or un certain Ananias, un homme pieux, fidèle à la loi et estimé de tous les Juifs qui résidaient à Damas, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'est venu me trouver. Il m''a dit: ‘Saul, mon frère, retrouve la vue.’ Au même instant, j''ai pu le voir. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il a ajouté: ‘Le Dieu de nos ancêtres t''a destiné à connaître sa volonté, à voir le juste et à entendre les paroles de sa bouche, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'car tu seras son témoin, devant tous les hommes, de ce que tu as vu et entendu. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et maintenant, pourquoi tarder? Lève-toi, sois baptisé et sois lavé de tes péchés en faisant appel au nom du Seigneur.’
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»De retour à Jérusalem, comme je priais dans le temple, je suis tombé en extase '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et j''ai vu le Seigneur qui me disait: ‘Dépêche-toi, sors rapidement de Jérusalem parce qu''ils n''accueilleront pas ton témoignage à mon sujet.’ '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J''ai répondu: ‘Seigneur, ils savent bien que j''allais de synagogue en synagogue pour faire mettre en prison et fouetter ceux qui croyaient en toi. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsqu''ils entendirent qu''il leur parlait en langue hébraïque, ils redoublèrent de calme. Paul dit alors:'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De plus, lorsqu''on a versé le sang d''Etienne, ton témoin, j''étais moi-même présent, approuvant [son exécution] et gardant les vêtements de ceux qui le faisaient mourir.’ '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors le Seigneur m''a dit: ‘Vas-y, car je t''enverrai au loin vers les non-Juifs.’»'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La foule l''avait écouté jusqu''à ces mots, mais ils se mirent alors à crier: «Fais disparaître de la terre un pareil homme! Il n''est pas digne de vivre.» '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils poussaient des cris, jetaient leurs vêtements et lançaient de la poussière en l'air.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le commandant ordonna de faire entrer Paul dans la forteresse et de procéder à son interrogatoire par le fouet afin de savoir pour quel motif ils criaient ainsi contre lui. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors qu''ils l''attachaient avec des courroies, Paul dit à l''officier qui était présent: «Avez-vous le droit de fouetter un citoyen romain qui n''est pas même condamné?» '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A ces mots, l''officier alla avertir le commandant en disant: «Attention à ce que tu vas faire, car cet homme est romain.» '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'S''approchant de Paul, le commandant lui demanda: «Dis-moi, es-tu romain?» «Oui», répondit-il. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le commandant reprit: «C''est avec beaucoup d''argent que j''ai acquis ce droit de citoyen.» «Quant à moi, dit Paul, je l''ai de naissance.» '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aussitôt ceux qui devaient procéder à l'interrogatoire se retirèrent, et le commandant eut peur en prenant conscience que Paul était romain et qu'il l'avait fait enchaîner.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Je suis juif, né à Tarse en Cilicie, mais j''ai été élevé à Jérusalem et formé aux pieds de Gamaliel dans la connaissance exacte de la loi héritée de nos ancêtres; j''étais plein de zèle pour Dieu, comme vous l''êtes tous aujourd''hui. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le lendemain, le commandant voulut savoir avec certitude de quoi les Juifs l'accusaient. Il le fit détacher et donna l'ordre aux chefs des prêtres et à tout le sanhédrin
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.30 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Sanhédrin: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'voir la note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '4.15'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' de se réunir; puis il fit venir Paul et le plaça au milieu d''eux.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J''ai combattu à mort cet enseignement, enchaînant et mettant en prison hommes et femmes. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le grand-prêtre et tout le collège des anciens m'en sont témoins, puisque j'ai même reçu d'eux des lettres pour les frères de Damas, où je me suis rendu afin d'arrêter ceux qui s'y trouvaient et de les ramener à Jérusalem pour les faire punir.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»J''étais en chemin et j''approchais de Damas quand tout à coup, vers midi, une grande lumière venue du ciel a resplendi autour de moi. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je suis tombé par terre et j''ai entendu une voix qui me disait: ‘Saul, Saul, pourquoi me persécutes-tu?’ '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J''ai répondu: ‘Qui es-tu, Seigneur?’ Il m''a dit: ‘Je suis Jésus de Nazareth, celui que tu persécutes.’ '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ceux qui étaient avec moi ont bien vu la lumière [et ont été effrayés], mais ils n''ont pas compris celui qui me parlait. '
