document_id: NUM.26
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Place à une nouvelle génération
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 26.1–27.23
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nouveau recensement
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'A la suite de ce fléau, l''Eternel dit à Moïse et à Eléazar, le fils du prêtre Aaron: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Faites le dénombrement de toute l''assemblée des Israélites âgés de 20 ans et plus en fonction de leur famille, de tous les membres du peuple d''Israël aptes au service militaire.» '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Moïse et le prêtre Eléazar leur parlèrent dans les plaines de Moab, près du Jourdain, vis-à-vis de Jéricho. Ils dirent: '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: «On fera le dénombrement des hommes âgés de 20 ans et plus, comme l'Eternel l'avait ordonné à Moïse et aux Israélites à leur sortie d'Egypte.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ruben était l''aîné d''Israël. Voici les descendants de Ruben: Hénoc dont descend le clan des Hénokites, Pallu dont descend celui des Palluites, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Hetsron dont descend celui des Hetsronites, Carmi dont descend celui des Carmites. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tels sont les clans des Rubénites. On dénombra 43''730 hommes. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Descendant de Pallu: Eliab. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fils d''Eliab: Nemuel, Dathan et Abiram. C''est ce Dathan et cet Abiram qui faisaient partie des hommes convoqués à l''assemblée et qui se soulevèrent contre Moïse et Aaron avec la bande des partisans de Koré, lors de leur révolte contre l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'La terre s''entrouvrit et les engloutit avec Koré, quand ceux qui s''étaient rassemblés moururent et que le feu dévora les 250 hommes: ils servirent d''avertissement au peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Quant aux fils de Koré, ils ne moururent pas.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Voici les descendants de Siméon en fonction de leur clan: de Nemuel descend le clan des Nemuélites, de Jamin celui des Jaminites, de Jakin celui des Jakinites, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'de Zérach celui des Zérachites, de Saül celui des Saülites. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Tels sont les clans des Siméonites. On dénombra 22'200 hommes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Voici les descendants de Gad en fonction de leur clan: de Tsephon descend le clan des Tsephonites, de Haggi celui des Haggites, de Shuni celui des Shunites, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'd''Ozni celui des Oznites, d''Eri celui des Erites, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'd''Arod celui des Arodites, d''Areéli celui des Areélites. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Tels sont les clans des descendants de Gad. On dénombra 40'500 hommes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Les fils de Juda étaient Er et Onan, mais ils moururent dans le pays de Canaan. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Voici donc les descendants de Juda en fonction de leur clan: de Shéla descend le clan des Shélanites, de Pérets celui des Péretsites, de Zérach celui des Zérachites. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Les fils de Pérets furent Hetsron, dont descend le clan des Hetsronites, et Hamul, dont descend celui des Hamulites. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Tels sont les clans de Juda. On dénombra 76'500 hommes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Voici les descendants d''Issacar en fonction de leur clan: de Thola descend le clan des Tholaïtes, de Puva celui des Puvites, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'de Jashub celui des Jashubites, de Shimron celui des Shimronites. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Tels sont les clans d'Issacar. On dénombra 64'300 hommes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Voici les descendants de Zabulon en fonction de leur clan: de Séred descend le clan des Sardites, d''Elon celui des Elonites, de Jahleel celui des Jahleélites. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Tels sont les clans des Zabulonites. On dénombra 60'500 hommes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Les fils de Joseph, en fonction de leur clan, furent Manassé et Ephraïm.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Voici les descendants de Manassé: de Makir descend le clan des Makirites. Makir eut pour fils Galaad. De Galaad descend le clan des Galaadites. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Voici les fils de Galaad: Jézer, dont descend le clan des Jézerites, Hélek celui des Hélekites, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Asriel celui des Asriélites, Sichem celui des Sichémites, '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Shemida celui des Shemidaïtes, Hépher celui des Héphérites. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Tselophchad, un descendant de Hépher, n''eut pas de fils, mais il eut des filles. Voici leur nom: Machla, Noa, Hogla, Milca et Thirtsa. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Tels sont les clans de Manassé. On dénombra 52'700 hommes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Voici les descendants d''Ephraïm en fonction de leur clan: de Shutélach descend le clan des Shutalchites, de Béker celui des Bakrites, de Thachan celui des Thachanites. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Voici les descendants de Shutélach: d''Eran est descendu le clan des Eranites. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Tels sont les clans des descendants d'Ephraïm. On dénombra 32'500 hommes. Ce sont les descendants de Joseph en fonction de leur clan.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Voici les descendants de Benjamin en fonction de leur clan: de Béla descend le clan des Balites, d''Ashbel celui des Ashbélites, d''Achiram celui des Achiramites, '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'de Shupham celui des Shuphamites, de Hupham celui des Huphamites. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Les fils de Béla furent Ard et Naaman. D''Ard descend le clan des Ardites et de Naaman celui des Naamanites. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Tels sont les descendants de Benjamin en fonction de leur clan. On dénombra 45'600 hommes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Voici les descendants de Dan en fonction de leur clan: de Shucham descend le clan des Shuchamites. Tels sont les clans de Dan en fonction de leur clan. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: On dénombra au total, pour les clans des Shuchamites, 64'400 hommes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Voici les descendants d''Aser en fonction de leur clan: de Jimna descend le clan des Jimnites, de Jishvi celui des Jishvites, de Beria celui des Beriites. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Des fils de Beria descendent: de Héber le clan des Hébrites et de Malkiel celui des Malkiélites. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'La fille d''Aser s''appelait Sérach. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Tels sont les clans des descendants d'Aser. On dénombra 53'400 hommes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Voici les descendants de Nephthali en fonction de leur clan: de Jahtseel descend le clan des Jahtseélites, de Guni celui des Gunites, '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'de Jetser celui des Jitsrites, de Shillem celui des Shillémites. '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: Tels sont les clans de Nephthali en fonction de leur clan. On dénombra 45'400 hommes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: On dénombra 601'730 Israélites.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'L''Eternel dit à Moïse: '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: '«Le pays sera partagé entre eux pour être leur propriété proportionnellement au nombre de personnes. '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'A ceux qui sont plus nombreux tu donneras une portion plus grande, et à ceux qui sont moins nombreux tu donneras une portion plus petite. On donnera à chacun sa portion en se basant sur le dénombrement. '
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Toutefois, le partage du pays s''effectuera par tirage au sort. Ils le recevront en propriété selon le nom des tribus de leurs ancêtres. '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: C'est par tirage au sort qu'on répartira le pays entre eux, en fonction de leur nombre.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Voici les Lévites dont on fit le dénombrement en fonction de leur clan: de Guershon descend le clan des Guershonites, de Kehath celui des Kehathites, de Merari celui des Merarites. '
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'Voici les clans de Lévi: le clan des Libnites, celui des Hébronites, celui des Machlites, celui des Mushites, celui des Koréites. Kehath eut pour descendant Amram. '
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'La femme d''Amram s''appelait Jokébed. Elle était une descendante de Lévi née en Egypte; elle donna à Amram Aaron, Moïse et leur sœur Miriam. '
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'Aaron eut pour fils Nadab et Abihu, Eléazar et Ithamar. '
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'Nadab et Abihu moururent lorsqu''ils apportèrent du feu étranger devant l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: On dénombra au total 23'000 hommes âgés d'un mois et plus. Ils ne furent pas inclus dans le dénombrement des Israélites parce qu'ils ne reçurent pas de possession au milieu d'eux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'Tels sont les Israélites dont Moïse et le prêtre Eléazar firent le dénombrement dans les plaines de Moab, près du Jourdain, vis-à-vis de Jéricho. '
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'Parmi eux ne figurait aucun des Israélites dont Moïse et le prêtre Aaron avaient fait le dénombrement dans le désert du Sinaï. '
  - type: usfm
    marker: v
    metadata:
      v: '65'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: 'En effet, l''Eternel avait dit: «Ils mourront dans le désert et il ne restera pas un seul d''entre eux, excepté Caleb, fils de Jephunné, et Josué, fils de Nun.»'
