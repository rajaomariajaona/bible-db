document_id: 1SA.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Cantique d'Anne
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Anne fit cette prière:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Mon cœur se réjouit en l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ma force a été relevée par l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ma bouche s'est ouverte contre mes ennemis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car je me réjouis de ton secours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Personne n'est saint comme l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il n'y a pas d'autre Dieu que toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il n'y a pas de rocher pareil à notre Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: »Ne prononcez plus de paroles hautaines!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que l'arrogance ne sorte plus de votre bouche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car l'Eternel est un Dieu qui sait tout
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui pèse la valeur de toutes les actions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: »L'arc des puissants est brisé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les faibles ont la force pour ceinture.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ceux qui étaient rassasiés se louent pour du pain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ceux qui étaient affamés se reposent.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Même la stérile accouche sept fois,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et celle qui avait beaucoup d'enfants devient flétrie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: »L'Eternel fait mourir et il fait vivre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il fait descendre au séjour des morts et il en fait remonter.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: L'Eternel appauvrit et il enrichit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il abaisse et il élève.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: De la poussière il retire le pauvre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: du fumier il relève le faible,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour les faire asseoir avec les grands,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il leur donne en possession un trône de gloire.
- type: usfm
  marker: q1
  children:
  - type: text
    text: »Oui, c'est à l'Eternel qu'appartiennent les fondements de la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et c'est sur eux qu'il a établi le monde.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Il gardera les pas de ses bien-aimés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tandis que les méchants seront réduits au silence dans les ténèbres.
- type: usfm
  marker: q1
  children:
  - type: text
    text: En effet, l'homme ne triomphera pas par la force.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: »Les ennemis de l'Eternel trembleront.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Du haut du ciel il fera gronder son tonnerre contre eux.
- type: usfm
  marker: q1
  children:
  - type: text
    text: L'Eternel jugera les extrémités de la terre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il donnera la puissance à son roi
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il relèvera la force de celui qu'il a désigné par onction.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Elkana repartit chez lui à Rama et l'enfant resta au service de l'Eternel devant le prêtre Eli.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Corruption et condamnation des fils d'Eli
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Les fils d''Eli étaient des vauriens qui ne connaissaient pas l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Voici quelle était la manière d''agir de ces prêtres envers le peuple: lorsque quelqu''un offrait un sacrifice, le serviteur du prêtre arrivait au moment où l''on faisait cuire la viande; tenant à la main une fourchette à trois dents, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'il piquait dans le récipient, dans le chaudron, dans la marmite ou dans le pot, et tout ce que la fourchette ramenait, le prêtre le prenait pour lui. Voilà comment ils agissaient vis-à-vis de tous les Israélites qui venaient à Silo. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Avant même qu''on ne fasse brûler la graisse, le serviteur du prêtre arrivait et disait à celui qui offrait le sacrifice: «Donne de la viande à rôtir pour le prêtre; il n''acceptera de ta part aucune viande cuite, c''est de la viande crue qu''il veut.» '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Si l''homme lui disait: «Quand on aura brûlé la graisse, tu prendras ce qui te plaira», le serviteur répondait: «Non! Donne-la maintenant, sinon je la prends de force.» '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ces jeunes gens se rendaient coupables d'un très grand péché devant l'Eternel, parce qu'ils traitaient avec mépris les offrandes faites à l'Eternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Samuel faisait le service devant l''Eternel et cet enfant était habillé d''un éphod en lin. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Sa mère lui faisait chaque année une petite robe et la lui apportait lorsqu''elle montait à Silo avec son mari pour offrir le sacrifice annuel. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Eli bénit Elkana et sa femme en disant: «Que l''Eternel te fasse avoir des enfants de cette femme pour remplacer celui qu''elle a prêté à l''Eternel!» Et ils repartirent chez eux. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Lorsque l'Eternel fut intervenu pour Anne, elle devint enceinte et elle eut trois fils et deux filles. Quant au jeune Samuel, il grandissait devant l'Eternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Eli était très âgé lorsqu''il apprit comment ses fils agissaient vis-à-vis de tout Israël. Il apprit aussi qu''ils couchaient avec les femmes qui se rassemblaient à l''entrée de la tente de la rencontre. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Il leur dit: «Pourquoi faites-vous de telles choses? En effet, tout le peuple me parle de vos mauvaises actions. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Non, mes enfants, ce que j''entends dire n''est pas bon, vous faites pécher le peuple de l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Si un homme pèche contre un autre homme, Dieu le jugera, mais s'il pèche contre l'Eternel, qui pourra intercéder en sa faveur?» Mais ils n'écoutèrent pas leur père, car l'Eternel voulait les faire mourir.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Le jeune Samuel continuait à grandir, et il était agréable aussi bien à l'Eternel qu'aux hommes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Un homme de Dieu se rendit vers Eli et lui dit: «Voici ce que dit l''Eternel: Ne me suis-je pas révélé aux membres de ta famille, lorsqu''ils étaient en Egypte et étaient esclaves du pharaon? '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Je les ai choisis parmi toutes les tribus d''Israël pour être à mon service en tant que prêtres, pour monter à mon autel, pour brûler le parfum, pour porter l''éphod devant moi, et j''ai donné à la famille de ton père tous les sacrifices passés par le feu qu''offrent les Israélites. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Pourquoi traitez-vous avec mépris mes sacrifices et mes offrandes, ceux que j''ai ordonné de faire dans ma demeure? Et comment se fait-il que tu accordes plus d''importance à tes fils qu''à moi? C''en est au point où vous vous engraissez des meilleures parts de toutes les offrandes d''Israël, mon peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'C''est pourquoi, l''Eternel, le Dieu d''Israël, déclare: J''avais certes dit que ta famille et celle de ton ancêtre marcheraient devant moi pour toujours, mais maintenant, l''Eternel le déclare, loin de moi cette intention! En effet, j''honorerai celui qui m''honore, mais ceux qui me méprisent seront méprisés. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Voici que viennent les jours où je vais briser ta force et celle de ta famille, de sorte qu''il n''y aura plus de vieillard chez toi. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Tu verras un adversaire dans ma demeure, tandis qu''Israël sera comblé de biens par l''Eternel, et il n''y aura plus jamais de vieillard dans ta famille. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Je laisserai subsister l''un des tiens près de mon autel afin d''épuiser tes yeux et d''attrister ton âme, mais tous les membres de ta famille mourront dans la force de l''âge. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Tu auras pour signe ce qui arrivera à tes deux fils Hophni et Phinées: ils mourront tous les deux le même jour. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Je ferai surgir pour moi un prêtre fidèle, qui agira selon mon cœur et selon mon désir. Je lui construirai une maison stable et il marchera toujours devant celui que j''aurai désigné par onction. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Tous les membres restants de ta famille viendront se prosterner devant lui pour avoir une pièce d''argent et un morceau de pain; ils diront: ‘Je t''en prie, rattache-moi à l''une des fonctions de prêtre, afin que j''aie un morceau de pain à manger.’»'
