document_id: 1SA.2,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Cantique d'Anne
  - type: text
    content: 'Anne fit cette prière:'
  - type: text
    content: «Mon cœur se réjouit en l'Eternel,
  - type: text
    content: ma force a été relevée par l'Eternel.
  - type: text
    content: Ma bouche s'est ouverte contre mes ennemis,
  - type: text
    content: car je me réjouis de ton secours.
  '10':
  - type: text
    content: »Les ennemis de l'Eternel trembleront.
  - type: text
    content: Du haut du ciel il fera gronder son tonnerre contre eux.
  - type: text
    content: L'Eternel jugera les extrémités de la terre.
  - type: text
    content: Il donnera la puissance à son roi
  - type: text
    content: et il relèvera la force de celui qu'il a désigné par onction.»
  '11':
  - type: text
    content: Elkana repartit chez lui à Rama et l'enfant resta au service de l'Eternel devant le prêtre Eli.
  - type: heading
    content: Corruption et condamnation des fils d'Eli
  '12':
  - type: text
    content: 'Les fils d''Eli étaient des vauriens qui ne connaissaient pas l''Eternel. '
  '13':
  - type: text
    content: 'Voici quelle était la manière d''agir de ces prêtres envers le peuple: lorsque quelqu''un offrait un sacrifice, le serviteur du prêtre arrivait au moment où l''on faisait cuire la viande; tenant à la main une fourchette à trois dents, '
  '14':
  - type: text
    content: 'il piquait dans le récipient, dans le chaudron, dans la marmite ou dans le pot, et tout ce que la fourchette ramenait, le prêtre le prenait pour lui. Voilà comment ils agissaient vis-à-vis de tous les Israélites qui venaient à Silo. '
  '15':
  - type: text
    content: 'Avant même qu''on ne fasse brûler la graisse, le serviteur du prêtre arrivait et disait à celui qui offrait le sacrifice: «Donne de la viande à rôtir pour le prêtre; il n''acceptera de ta part aucune viande cuite, c''est de la viande crue qu''il veut.» '
  '16':
  - type: text
    content: 'Si l''homme lui disait: «Quand on aura brûlé la graisse, tu prendras ce qui te plaira», le serviteur répondait: «Non! Donne-la maintenant, sinon je la prends de force.» '
  '17':
  - type: text
    content: Ces jeunes gens se rendaient coupables d'un très grand péché devant l'Eternel, parce qu'ils traitaient avec mépris les offrandes faites à l'Eternel.
  '18':
  - type: text
    content: 'Samuel faisait le service devant l''Eternel et cet enfant était habillé d''un éphod en lin. '
  '19':
  - type: text
    content: 'Sa mère lui faisait chaque année une petite robe et la lui apportait lorsqu''elle montait à Silo avec son mari pour offrir le sacrifice annuel. '
  '2':
  - type: text
    content: Personne n'est saint comme l'Eternel.
  - type: text
    content: Il n'y a pas d'autre Dieu que toi,
  - type: text
    content: il n'y a pas de rocher pareil à notre Dieu.
  '20':
  - type: text
    content: 'Eli bénit Elkana et sa femme en disant: «Que l''Eternel te fasse avoir des enfants de cette femme pour remplacer celui qu''elle a prêté à l''Eternel!» Et ils repartirent chez eux. '
  '21':
  - type: text
    content: Lorsque l'Eternel fut intervenu pour Anne, elle devint enceinte et elle eut trois fils et deux filles. Quant au jeune Samuel, il grandissait devant l'Eternel.
  '22':
  - type: text
    content: 'Eli était très âgé lorsqu''il apprit comment ses fils agissaient vis-à-vis de tout Israël. Il apprit aussi qu''ils couchaient avec les femmes qui se rassemblaient à l''entrée de la tente de la rencontre. '
  '23':
  - type: text
    content: 'Il leur dit: «Pourquoi faites-vous de telles choses? En effet, tout le peuple me parle de vos mauvaises actions. '
  '24':
  - type: text
    content: 'Non, mes enfants, ce que j''entends dire n''est pas bon, vous faites pécher le peuple de l''Eternel. '
  '25':
  - type: text
    content: Si un homme pèche contre un autre homme, Dieu le jugera, mais s'il pèche contre l'Eternel, qui pourra intercéder en sa faveur?» Mais ils n'écoutèrent pas leur père, car l'Eternel voulait les faire mourir.
  '26':
  - type: text
    content: Le jeune Samuel continuait à grandir, et il était agréable aussi bien à l'Eternel qu'aux hommes.
  '27':
  - type: text
    content: 'Un homme de Dieu se rendit vers Eli et lui dit: «Voici ce que dit l''Eternel: Ne me suis-je pas révélé aux membres de ta famille, lorsqu''ils étaient en Egypte et étaient esclaves du pharaon? '
  '28':
  - type: text
    content: 'Je les ai choisis parmi toutes les tribus d''Israël pour être à mon service en tant que prêtres, pour monter à mon autel, pour brûler le parfum, pour porter l''éphod devant moi, et j''ai donné à la famille de ton père tous les sacrifices passés par le feu qu''offrent les Israélites. '
  '29':
  - type: text
    content: 'Pourquoi traitez-vous avec mépris mes sacrifices et mes offrandes, ceux que j''ai ordonné de faire dans ma demeure? Et comment se fait-il que tu accordes plus d''importance à tes fils qu''à moi? C''en est au point où vous vous engraissez des meilleures parts de toutes les offrandes d''Israël, mon peuple. '
  '3':
  - type: text
    content: »Ne prononcez plus de paroles hautaines!
  - type: text
    content: Que l'arrogance ne sorte plus de votre bouche,
  - type: text
    content: car l'Eternel est un Dieu qui sait tout
  - type: text
    content: et qui pèse la valeur de toutes les actions.
  '30':
  - type: text
    content: 'C''est pourquoi, l''Eternel, le Dieu d''Israël, déclare: J''avais certes dit que ta famille et celle de ton ancêtre marcheraient devant moi pour toujours, mais maintenant, l''Eternel le déclare, loin de moi cette intention! En effet, j''honorerai celui qui m''honore, mais ceux qui me méprisent seront méprisés. '
  '31':
  - type: text
    content: 'Voici que viennent les jours où je vais briser ta force et celle de ta famille, de sorte qu''il n''y aura plus de vieillard chez toi. '
  '32':
  - type: text
    content: 'Tu verras un adversaire dans ma demeure, tandis qu''Israël sera comblé de biens par l''Eternel, et il n''y aura plus jamais de vieillard dans ta famille. '
  '33':
  - type: text
    content: 'Je laisserai subsister l''un des tiens près de mon autel afin d''épuiser tes yeux et d''attrister ton âme, mais tous les membres de ta famille mourront dans la force de l''âge. '
  '34':
  - type: text
    content: 'Tu auras pour signe ce qui arrivera à tes deux fils Hophni et Phinées: ils mourront tous les deux le même jour. '
  '35':
  - type: text
    content: 'Je ferai surgir pour moi un prêtre fidèle, qui agira selon mon cœur et selon mon désir. Je lui construirai une maison stable et il marchera toujours devant celui que j''aurai désigné par onction. '
  '36':
  - type: text
    content: 'Tous les membres restants de ta famille viendront se prosterner devant lui pour avoir une pièce d''argent et un morceau de pain; ils diront: ‘Je t''en prie, rattache-moi à l''une des fonctions de prêtre, afin que j''aie un morceau de pain à manger.’»'
  '4':
  - type: text
    content: »L'arc des puissants est brisé,
  - type: text
    content: et les faibles ont la force pour ceinture.
  '5':
  - type: text
    content: Ceux qui étaient rassasiés se louent pour du pain,
  - type: text
    content: et ceux qui étaient affamés se reposent.
  - type: text
    content: Même la stérile accouche sept fois,
  - type: text
    content: et celle qui avait beaucoup d'enfants devient flétrie.
  '6':
  - type: text
    content: »L'Eternel fait mourir et il fait vivre,
  - type: text
    content: il fait descendre au séjour des morts et il en fait remonter.
  '7':
  - type: text
    content: L'Eternel appauvrit et il enrichit,
  - type: text
    content: il abaisse et il élève.
  '8':
  - type: text
    content: De la poussière il retire le pauvre,
  - type: text
    content: du fumier il relève le faible,
  - type: text
    content: pour les faire asseoir avec les grands,
  - type: text
    content: et il leur donne en possession un trône de gloire.
  - type: text
    content: »Oui, c'est à l'Eternel qu'appartiennent les fondements de la terre,
  - type: text
    content: et c'est sur eux qu'il a établi le monde.
  '9':
  - type: text
    content: Il gardera les pas de ses bien-aimés,
  - type: text
    content: tandis que les méchants seront réduits au silence dans les ténèbres.
  - type: text
    content: En effet, l'homme ne triomphera pas par la force.
