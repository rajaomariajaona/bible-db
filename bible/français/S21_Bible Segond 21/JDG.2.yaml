document_id: JDG.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Constat d'échec et mort de Josué
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Un envoyé de l''Eternel monta de Guilgal à Bokim et dit: «Je vous ai fait sortir d''Egypte et je vous ai amenés dans le pays que j''avais juré à vos ancêtres de vous donner. J''ai dit: ‘Jamais je ne romprai mon alliance avec vous. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Quant à vous, vous ne conclurez pas d''alliance avec les habitants de ce pays, vous démolirez leurs autels.’ Mais vous ne m''avez pas obéi. Pourquoi avez-vous fait cela? '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'J''ai dit alors: ‘Je ne chasserai pas les habitants de ce pays devant vous. Au contraire, ils resteront à vos côtés et leurs dieux seront un piège pour vous.’» '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Lorsque l''envoyé de l''Eternel eut dit ces paroles à tous les Israélites, le peuple se mit à pleurer tout haut. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ils appelèrent cet endroit Bokim
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Bokim: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: littéralement ceux qui pleurent.
    marker-yv: yv-n
  - type: text
    text: ' et ils y offrirent des sacrifices à l''Eternel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Josué renvoya le peuple, et les Israélites se rendirent chacun dans le territoire qu''il avait reçu en héritage pour prendre possession du pays. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Le peuple servit l''Eternel pendant toute la vie de Josué et pendant toute la vie des anciens qui lui survécurent et qui avaient vu toutes les grandes choses que l''Eternel avait faites en faveur d''Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Josué, fils de Nun, serviteur de l''Eternel, mourut à l''âge de 110 ans. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: On l'ensevelit dans le territoire qui lui avait été attribué, à Thimnath-Hérès, dans la région montagneuse d'Ephraïm, au nord du mont Gaash.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Attitude de la nouvelle génération
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Toute cette génération alla rejoindre ses ancêtres, et après elle surgit une autre génération, qui ne connaissait pas l''Eternel ni ce qu''il avait fait en faveur d''Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Les Israélites firent alors ce qui déplaît à l'Eternel et servirent les Baals
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Baals: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nom de la principale divinité des Phéniciens et des Cananéens ainsi que des Moabites, devenu le titre de plusieurs divinités du paganisme antique.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ils abandonnèrent l''Eternel, le Dieu de leurs ancêtres, celui qui les avait fait sortir d''Egypte, et ils suivirent d''autres dieux pris parmi les dieux des peuples qui les entouraient. Ils se prosternèrent devant eux et irritèrent ainsi l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ils abandonnèrent l'Eternel et servirent Baal et les Astartés
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Les Astartés: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nom de la déesse de la fécondité adorée par les Cananéens et sous divers noms par d'autres peuples de l'Antiquité.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'La colère de l''Eternel s''enflamma contre Israël. Il les livra entre les mains de pillards qui les dépouillèrent, il les vendit aux ennemis qui les environnaient, de sorte qu''ils ne purent plus résister à leurs ennemis. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Partout où ils allaient, la main de l''Eternel était contre eux pour leur faire du mal, comme l''Eternel l''avait dit, comme l''Eternel le leur avait juré. Ils se trouvèrent ainsi dans une grande détresse. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: L'Eternel fit surgir des juges
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Juges: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nom donné aux magistrats chargés de régler les questions civiles et, dans ce livre, les questions militaires.
    marker-yv: yv-n
  - type: text
    text: ' afin qu''ils les délivrent de ceux qui les dépouillaient. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Mais ils n'écoutèrent même pas leurs juges, car ils se prostituèrent à d'autres dieux en se prosternant devant eux. Ils se détournèrent bien vite de la voie qu'avaient suivie leurs ancêtres et ils n'obéirent pas comme eux aux commandements de l'Eternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Lorsque l''Eternel faisait surgir pour eux des juges, il était avec le juge et les délivrait de leurs ennemis pendant toute la vie du juge. En effet, il avait pitié des gémissements qu''ils poussaient à cause de leurs oppresseurs et de leurs persécuteurs. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Mais, à la mort du juge, ils se corrompaient de nouveau plus que leurs ancêtres en suivant d''autres dieux pour les servir et se prosterner devant eux. Ils persistaient dans les mêmes agissements et la même conduite, le même endurcissement. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Alors la colère de l''Eternel s''enflamma contre Israël et il dit: «Puisque les membres de cette nation ont violé mon alliance, celle que j''avais prescrite à leurs ancêtres, et puisqu''ils ne m''ont pas obéi, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'je ne chasserai plus devant eux aucune des nations que Josué n''avait pas encore pu chasser à sa mort. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: En effet, à travers elles je mettrai les Israélites à l'épreuve pour savoir s'ils imiteront l'exemple de leurs ancêtres et veilleront, ou non, à suivre la voie de l'Eternel.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ainsi, l'Eternel laissa tranquilles les nations qu'il n'avait pas livrées entre les mains de Josué, il ne s'empressa pas de les chasser.
