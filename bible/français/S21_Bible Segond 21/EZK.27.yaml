document_id: EZK.27,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'La parole de l''Eternel m''a été adressée: '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ceux de Perse, de Lud et de Puth servaient dans ton armée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'étaient des hommes de guerre.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils suspendaient leurs boucliers et leurs casques chez toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils te procuraient du prestige.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '»Les habitants d''Arvad et tes guerriers garnissaient partout tes murailles, et des hommes de Gammad occupaient tes tours. Ils suspendaient leurs boucliers partout sur tes murailles, ils rendaient ta beauté parfaite. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ceux de Tarsis traitaient avec toi à cause de tous les biens que tu avais en abondance. Ils donnaient de l''argent, du fer, de l''étain et du plomb en échange de tes denrées. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Javan, Tubal et Méshec faisaient du commerce avec toi. Ils donnaient des esclaves et des objets en bronze en échange de tes marchandises. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'La communauté de Togarma donnait des chevaux de trait, des chevaux d''attelage et des mulets en échange de tes denrées. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Les habitants de Dedan faisaient du commerce avec toi. Les affaires commerciales de beaucoup d''îles passaient par toi. On te payait avec des cornes d''ivoire et de l''ébène. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: La Syrie traitait avec toi à cause de la quantité de tes activités. Elle donnait des escarboucles, de la pourpre, des broderies, du fin lin, du corail et des rubis en échange de tes denrées.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: '»Juda et le pays d''Israël faisaient du commerce avec toi. Ils donnaient du blé de Minnith, du millet, du miel, de l''huile et du baume en échange de tes marchandises. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Damas traitait avec toi à cause de la quantité de tes activités et à cause de tous les biens que tu avais en abondance. Elle te fournissait du vin de Helbon et de la laine blanche. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'En échange de tes denrées, les Danites et les Grecs, depuis Uzal, donnaient du fer forgé, de la casse et du roseau aromatique qui faisaient partie de tes marchandises. '
  '2':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '«Toi aussi, fils de l''homme, prononce une complainte sur Tyr! '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Dedan faisait avec toi le commerce de couvertures pour s''asseoir à cheval. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: L'Arabie et tous les princes de Kédar te fournissaient en agneaux, en béliers et en boucs. Pour tout cela, ils étaient tes fournisseurs.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: '»Les marchands de Séba et de Raema faisaient avec toi le commerce de tous les meilleurs aromates, de toutes sortes de pierres précieuses et de l''or, en échange de tes denrées. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Charan, Canné et Eden, les marchands de Séba, d''Assour et de Kilmad faisaient du commerce avec toi. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Ils faisaient avec toi le commerce d'habits de luxe, de manteaux teints en bleu, de broderies, de tapis, de tissus de couleur, de cordes tressées et résistantes qui figuraient sur tes marchés.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: »C'étaient des bateaux long-courriers qui transportaient tes marchandises.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu étais au comble de la richesse et de la gloire, au cœur de la mer.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Pourtant, alors que tes rameurs te faisaient voguer vers le grand large,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un vent d'est t'a brisée au cœur de la mer.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Tes biens, tes denrées et tes marchandises, tes marins et tes navigateurs, ceux qui réparent tes avaries et ceux qui négocient tes marchandises, tous les hommes de guerre qui sont chez toi et toute ta population sombreront au cœur de la mer, quand viendra le jour de ta chute.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: »Aux cris de tes navigateurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les rivages trembleront.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Tous les rameurs, les marins, descendront de leurs bateaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous les navigateurs de la mer se tiendront sur la terre.
  '3':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Tu annonceras à Tyr, à celle qui habite à l''entrée de la mer et qui fait du commerce avec les peuples et de nombreuses îles:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Voici ce que dit le Seigneur, l''Eternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tyr, tu disais: ‘Je suis d''une beauté parfaite!’'
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Ils feront entendre leur voix à cause de ce qui t'arrive,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils crieront leur amertume.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils jetteront de la poussière sur leur tête,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: se rouleront dans la cendre,
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: se raseront la tête à cause de toi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et s'habilleront de sacs.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils pleureront sur toi, dans l'amertume de leur âme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils mèneront un deuil amer.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Dans leur douleur, ils entonneront un chant funèbre sur toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ils chanteront une complainte: ‘Qui est pareil à Tyr,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à cette ville réduite au silence au milieu de la mer?’
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: »Quand tes denrées sortaient des mers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu rassasiais un grand nombre de peuples.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par l'abondance de tes biens et de tes marchandises,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu enrichissais les rois de la terre.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Et quand tu as été brisée par la mer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand tu as disparu dans les profondeurs de l'eau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tes marchandises et toute ta population
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ont sombré avec toi.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: »Tous les habitants des îles sont consternés à cause de ce qui t'arrive,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: leurs rois en sont horrifiés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: leur visage est bouleversé.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Les marchands qui circulent parmi les peuples sifflent à cause de ce qui t'arrive,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu provoques de la terreur.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu n'existeras plus jamais!»
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ton territoire se trouve au cœur de la mer;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ceux qui t'ont construite t'ont donné une beauté parfaite.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ils ont construit toute ta coque en cyprès de Senir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ont pris du cèdre du Liban pour te fabriquer un mât,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ils ont fait tes rames avec des chênes du Basan
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ton pont avec de l'ivoire venant d'Assyrie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et importé des îles de Kittim.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Du fin lin d'Egypte avec des broderies
  - type: usfm
    marker: q1
    children:
    - type: text
      text: te servait de voiles et de pavillon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des étoffes teintes en bleu et en pourpre des îles d'Elisha
  - type: usfm
    marker: q1
    children:
    - type: text
      text: formaient tes tentures.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Les habitants de Sidon et d'Arvad étaient tes rameurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les plus experts de chez toi, Tyr, constituaient tes navigateurs.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Les anciens de Guebal et ses ouvriers experts se tenaient là
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour réparer tes avaries,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous les bateaux de la mer et leurs marins se retrouvaient chez toi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour négocier tes marchandises.
