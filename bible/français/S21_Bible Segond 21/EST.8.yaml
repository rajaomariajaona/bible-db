document_id: EST.8
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Edit en faveur des Juifs
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Le jour même, le roi Assuérus donna la propriété d''Haman, l''adversaire des Juifs, à la reine Esther et Mardochée eut à se présenter devant lui, car elle avait révélé ce qu''il était pour elle. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Le roi retira son anneau, celui qu'il avait repris à Haman, et le donna à Mardochée. Esther, de son côté, le désigna responsable de la propriété d'Haman.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Puis Esther poursuivit son plaidoyer devant le roi. Elle se jeta à ses pieds en pleurant et en le suppliant de faire échec à la méchanceté d''Haman, l''Agaguite, et à ses projets contre les Juifs. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Le roi lui tendit le sceptre en or. Elle se releva alors et c''est debout devant lui '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'qu''elle lui dit: «Si tu le juges bon, roi, et si j''ai trouvé grâce devant toi, si cela te paraît convenable et si je te suis agréable, il faudrait qu''on écrive pour révoquer les lettres conçues par Haman, fils d''Hammedatha, l''Agaguite. Il les avait rédigées dans le but de faire disparaître les Juifs qui se trouvent dans toutes les provinces du roi. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Comment pourrais-je supporter d'assister au malheur qui frapperait mon peuple, à la disparition de ma famille?»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Le roi Assuérus dit à la reine Esther et au Juif Mardochée: «J''ai déjà donné la propriété d''Haman à Esther et lui-même a été pendu à une potence pour avoir tenté de porter la main contre les Juifs. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ecrivez donc ce que vous voudrez concernant les Juifs! Faites-le au nom du roi et apposez l'empreinte royale sur vos lettres! En effet, un document écrit au nom du roi et porteur de l'empreinte royale ne peut être révoqué.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'On convoqua alors les secrétaires du roi, le vingt-troisième jour du troisième mois, c''est-à-dire le mois de Sivan, et l''on écrivit un message en tout point conforme aux ordres de Mardochée et adressé aux Juifs, aux satrapes, aux gouverneurs et aux chefs des 127 provinces qui couvraient un territoire allant de l''Inde à l''Ethiopie, à chaque province dans son écriture et à chaque peuple dans sa langue, y compris aux Juifs dans leur écriture et dans leur langue. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'On écrivit ce message au nom du roi Assuérus et l''on y apposa l''empreinte du roi. On envoya les lettres par l''intermédiaire de coursiers à cheval qui montaient des attelages royaux, des pur-sang. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Le roi y autorisait les Juifs, quelle que soit la ville qu''ils habitent, à se rassembler et à défendre leur vie en exterminant, massacrant et supprimant tous les groupes armés d''un peuple ou d''une province qui les attaqueraient, y compris les petits enfants et les femmes, et à procéder au pillage de leurs biens. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Cette autorisation concernait toutes les provinces du roi Assuérus mais était valable un seul jour: le treizième du douzième mois, c''est-à-dire le mois d''Adar. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Une copie du document devait être donnée avec force de loi à chaque province et être communiquée à tous les peuples afin que les Juifs soient prêts pour ce jour-là, pour la vengeance contre leurs ennemis. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Montés sur les attelages royaux, les coursiers partirent sans aucun retard, sur ordre du roi. L'édit fut aussi proclamé à Suse, la capitale.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Mardochée sortit de chez le roi porteur d''un vêtement royal bleu et blanc, d''une grande couronne en or et d''un manteau en fin lin et en pourpre, au milieu des cris de joie et d''allégresse de la ville de Suse. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Les Juifs étaient rayonnants de joie, remplis d''allégresse et comblés de marques d''honneur. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Dans chaque province et dans chaque ville, partout où arrivait le message du roi, qui avait valeur de loi, les Juifs s'adonnaient à la joie et à l'allégresse, avec banquets et fêtes. De plus, beaucoup de membres des autres peuples du pays se faisaient juifs, tant ils avaient peur d'eux.
