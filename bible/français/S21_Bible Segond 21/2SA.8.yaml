document_id: 2SA.8
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Guerres et victoires de David
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Après cela, David battit les Philistins et les humilia, et il leur prit le contrôle de leur capitale.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Il battit les Moabites et il les mesura avec un ruban en les faisant se coucher par terre. Il mesura deux rubans à mettre à mort, et un plein ruban à laisser en vie. Les Moabites furent asservis à David et lui payèrent un tribut.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'David battit Hadadézer, fils de Rehob et roi de Tsoba, lorsqu''il alla rétablir sa domination sur l''Euphrate. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: David lui prit 1700 cavaliers et 20'000 fantassins. Il mutila les jarrets de tous les chevaux de trait pour ne conserver que 100 attelages.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Les Syriens de Damas vinrent au secours d''Hadadézer, le roi de Tsoba, et David battit 22''000 d''entre eux. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'David posta des garnisons chez les Syriens de Damas. Les Syriens furent asservis à David et lui payèrent un tribut. L''Eternel protégeait David partout où il allait. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'David prit les boucliers en or que portaient les serviteurs d''Hadadézer et les amena à Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Le roi David prit encore une grande quantité de bronze à Béthach et à Bérothaï, villes qui appartenaient à Hadadézer.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Thoï, le roi de Hamath, apprit que David avait battu toute l''armée d''Hadadézer, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'et il envoya son fils Joram vers le roi David pour le saluer et pour le féliciter d''avoir attaqué Hadadézer et de l''avoir battu. En effet, Thoï était en guerre contre Hadadézer. Joram apporta des objets en argent, en or et en bronze. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Le roi David les consacra à l''Eternel, comme il l''avait déjà fait pour l''argent et l''or pris à toutes les nations qu''il avait vaincues '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: – la Syrie, Moab, les Ammonites, les Philistins, Amalek – ainsi que sur le butin d'Hadadézer, fils de Rehob et roi de Tsoba.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'David se fit encore un nom lorsqu''il revint de sa victoire sur les Syriens, au nombre de 18''000, dans la vallée du sel. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Il établit des garnisons dans Edom, il en posta dans tout Edom. Edom tout entier fut asservi à David. L'Eternel protégeait David partout où il allait.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'David régna sur tout Israël, et il faisait droit et justice à tout son peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Joab, fils de Tseruja, commandait l''armée; Josaphat, fils d''Achilud, était archiviste; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Tsadok, fils d''Achithub, et Achimélec, fils d''Abiathar, étaient prêtres; Seraja était secrétaire; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Benaja, fils de Jehojada, était le chef des Kéréthiens et des Péléthiens; et les fils de David étaient ministres d'Etat.
