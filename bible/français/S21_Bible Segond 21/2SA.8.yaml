document_id: 2SA.8,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Guerres et victoires de David
  - type: text
    content: Après cela, David battit les Philistins et les humilia, et il leur prit le contrôle de leur capitale.
  '10':
  - type: text
    content: 'et il envoya son fils Joram vers le roi David pour le saluer et pour le féliciter d''avoir attaqué Hadadézer et de l''avoir battu. En effet, Thoï était en guerre contre Hadadézer. Joram apporta des objets en argent, en or et en bronze. '
  '11':
  - type: text
    content: 'Le roi David les consacra à l''Eternel, comme il l''avait déjà fait pour l''argent et l''or pris à toutes les nations qu''il avait vaincues '
  '12':
  - type: text
    content: – la Syrie, Moab, les Ammonites, les Philistins, Amalek – ainsi que sur le butin d'Hadadézer, fils de Rehob et roi de Tsoba.
  '13':
  - type: text
    content: 'David se fit encore un nom lorsqu''il revint de sa victoire sur les Syriens, au nombre de 18''000, dans la vallée du sel. '
  '14':
  - type: text
    content: Il établit des garnisons dans Edom, il en posta dans tout Edom. Edom tout entier fut asservi à David. L'Eternel protégeait David partout où il allait.
  '15':
  - type: text
    content: 'David régna sur tout Israël, et il faisait droit et justice à tout son peuple. '
  '16':
  - type: text
    content: 'Joab, fils de Tseruja, commandait l''armée; Josaphat, fils d''Achilud, était archiviste; '
  '17':
  - type: text
    content: 'Tsadok, fils d''Achithub, et Achimélec, fils d''Abiathar, étaient prêtres; Seraja était secrétaire; '
  '18':
  - type: text
    content: Benaja, fils de Jehojada, était le chef des Kéréthiens et des Péléthiens; et les fils de David étaient ministres d'Etat.
  '2':
  - type: text
    content: Il battit les Moabites et il les mesura avec un ruban en les faisant se coucher par terre. Il mesura deux rubans à mettre à mort, et un plein ruban à laisser en vie. Les Moabites furent asservis à David et lui payèrent un tribut.
  '3':
  - type: text
    content: 'David battit Hadadézer, fils de Rehob et roi de Tsoba, lorsqu''il alla rétablir sa domination sur l''Euphrate. '
  '4':
  - type: text
    content: David lui prit 1700 cavaliers et 20'000 fantassins. Il mutila les jarrets de tous les chevaux de trait pour ne conserver que 100 attelages.
  '5':
  - type: text
    content: 'Les Syriens de Damas vinrent au secours d''Hadadézer, le roi de Tsoba, et David battit 22''000 d''entre eux. '
  '6':
  - type: text
    content: 'David posta des garnisons chez les Syriens de Damas. Les Syriens furent asservis à David et lui payèrent un tribut. L''Eternel protégeait David partout où il allait. '
  '7':
  - type: text
    content: 'David prit les boucliers en or que portaient les serviteurs d''Hadadézer et les amena à Jérusalem. '
  '8':
  - type: text
    content: Le roi David prit encore une grande quantité de bronze à Béthach et à Bérothaï, villes qui appartenaient à Hadadézer.
  '9':
  - type: text
    content: 'Thoï, le roi de Hamath, apprit que David avait battu toute l''armée d''Hadadézer, '
