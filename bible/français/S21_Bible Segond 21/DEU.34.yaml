document_id: DEU.34,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mort de Moïse
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Moïse monta des plaines de Moab sur le mont Nebo, au sommet du Pisga, vis-à-vis de Jéricho. L''Eternel lui fit voir tout le pays: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Il n''a plus surgi en Israël de prophète semblable à Moïse, que l''Eternel connaissait face à face. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Personne ne peut lui être comparé pour tous les signes et les miracles que Dieu l''a envoyé faire en Egypte contre le pharaon, contre ses serviteurs et contre tout son pays, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: et pour tous les actes terrifiants que Moïse a accomplis avec puissance sous les yeux de tout Israël.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Galaad jusqu''à Dan, tout Nephthali, le pays d''Ephraïm et de Manassé, tout le pays de Juda jusqu''à la mer Méditerranée, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'le Néguev, les environs du Jourdain, la vallée de Jéricho, la ville des palmiers, jusqu''à Tsoar. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'L''Eternel lui dit: «Voilà le pays que j''ai juré de donner à Abraham, à Isaac et à Jacob en disant: ‘Je le donnerai à ta descendance.’ Je te l''ai fait voir de tes yeux, mais tu n''y entreras pas.» '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Moïse, le serviteur de l''Eternel, mourut là, dans le pays de Moab, conformément à l''ordre de l''Eternel. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'L''Eternel l''enterra dans la vallée, dans le pays de Moab, vis-à-vis de Beth-Peor. Personne n''a su où était son tombeau jusqu''à aujourd''hui. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Moïse était âgé de 120 ans lorsqu''il mourut. Sa vue n''était pas affaiblie et il n''avait pas perdu sa vigueur. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Les Israélites pleurèrent Moïse pendant 30 jours dans les plaines de Moab. Puis les jours de pleurs et de deuil sur Moïse arrivèrent à leur terme.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Josué, fils de Nun, était rempli de l'Esprit de sagesse car Moïse avait posé ses mains sur lui. Les Israélites lui obéirent et se conformèrent aux ordres que l'Eternel avait donnés à Moïse.
