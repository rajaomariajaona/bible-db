document_id: JER.27,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Conseils de soumission à Nebucadnetsar
  - type: text
    content: Au début du règne de Jojakim, fils de Josias, sur Juda, une parole fut adressée à Jérémie de la part de l'Eternel.
  '10':
  - type: text
    content: 'En effet, ce qu''ils vous prophétisent est faux. A cause d''eux vous serez éloignés de votre terre, je vous chasserai et vous disparaîtrez. '
  '11':
  - type: text
    content: En revanche, la nation qui se soumettra au roi de Babylone et le servira, je la laisserai vivre tranquille sur sa terre, déclare l'Eternel, pour qu'elle la cultive et qu'elle y habite.’»
  '12':
  - type: text
    content: 'J''ai adressé exactement les mêmes paroles à Sédécias, roi de Juda: «Soumettez-vous au roi de Babylone, servez-le, lui et son peuple, et vous resterez en vie. '
  '13':
  - type: text
    content: 'Pourquoi devriez-vous mourir, toi et ton peuple, par l''épée, par la famine et par la peste, conformément à la parole prononcée par l''Eternel à l''intention de la nation qui ne servira pas le roi de Babylone? '
  '14':
  - type: text
    content: 'N''écoutez pas les paroles des prophètes qui vous affirment que vous ne serez pas asservis au roi de Babylone! En effet, ce qu''ils vous prophétisent est faux. '
  '15':
  - type: text
    content: 'Je ne les ai pas envoyés, déclare l''Eternel, et ils prophétisent des faussetés comme si cela venait de moi, avec une conséquence: je vous chasserai et vous disparaîtrez, vous et les prophètes qui vous font leurs prédictions.»'
  '16':
  - type: text
    content: 'J''ai dit aux prêtres et à tout ce peuple: «Voici ce que dit l''Eternel: N''écoutez pas les paroles de vos prophètes qui vous prédisent: ‘C''est maintenant, et rapidement, que les ustensiles de la maison de l''Eternel vont être rapportés de Babylone!’ En effet, ce qu''ils vous prophétisent est faux. '
  '17':
  - type: text
    content: 'Ne les écoutez pas! Servez le roi de Babylone et vous resterez en vie. Pourquoi cette ville devrait-elle devenir une ruine? '
  '18':
  - type: text
    content: 'S''ils sont prophètes et ont reçu la parole de l''Eternel, qu''ils intercèdent donc auprès de l''Eternel, le maître de l''univers, pour que les ustensiles restés dans la maison de l''Eternel, dans le palais du roi de Juda et à Jérusalem ne partent pas à Babylone! '
  '19':
  - type: text
    content: 'Voici ce que dit l''Eternel, le maître de l''univers, au sujet des colonnes, de la grande cuve, des bases et des autres ustensiles restés dans cette ville, '
  '2':
  - type: text
    content: 'Voici ce que m''a dit l''Eternel: «Fabrique-toi des cordes et des barres et mets-les sur ton cou. '
  '20':
  - type: text
    content: 'ceux qui n''ont pas été pris par Nebucadnetsar, roi de Babylone, lorsqu''il a exilé loin de Jérusalem, à Babylone, Jéconia, fils de Jojakim, roi de Juda, et tous les notables de Juda et de Jérusalem, '
  '21':
  - type: text
    content: 'voici ce que dit l''Eternel, le maître de l''univers, le Dieu d''Israël, au sujet des ustensiles restés dans la maison de l''Eternel, dans le palais du roi de Juda et à Jérusalem: '
  '22':
  - type: text
    content: Ils seront amenés à Babylone et ils y resteront jusqu'au jour où je m'en occuperai, déclare l'Eternel. Alors je les ferai remonter et revenir ici.»
  '3':
  - type: text
    content: 'Ensuite, fais-les parvenir aux rois d''Edom, de Moab, des Ammonites, de Tyr et de Sidon, par l''intermédiaire de leurs ambassadeurs, ceux qui sont venus trouver Sédécias, roi de Juda, à Jérusalem. '
  '4':
  - type: text
    content: 'Charge-les de ce message pour leurs seigneurs: ‘Voici ce que dit l''Eternel, le maître de l''univers, le Dieu d''Israël: Vous annoncerez à vos seigneurs: '
  '5':
  - type: text
    content: 'C''est moi qui ai fait la terre, ainsi que les hommes et les animaux qui la peuplent, par ma grande puissance et par ma force, et je donne la terre à qui je le veux. '
  '6':
  - type: text
    content: 'Et maintenant, c''est moi qui donne tous ces pays à mon serviteur Nebucadnetsar, roi de Babylone; je lui donne même les animaux sauvages pour qu''ils soient à son service. '
  '7':
  - type: text
    content: 'Toutes les nations lui seront asservies, à lui, à son fils et à son petit-fils, jusqu''à ce que le moment fixé pour son pays arrive aussi et que des nations puissantes et de grands rois l''asservissent. '
  '8':
  - type: text
    content: 'Si une nation ou un royaume ne sert pas Nebucadnetsar, roi de Babylone, et ne se soumet pas au roi de Babylone, j''interviendrai contre cette nation par l''épée, par la famine et par la peste, déclare l''Eternel, jusqu''à ce que je l''aie éliminée par son intermédiaire. '
  '9':
  - type: text
    content: 'Et vous, n''écoutez pas vos prophètes, vos devins, vos rêves, vos astrologues, vos sorciers, ceux qui vous affirment que vous ne serez pas asservis au roi de Babylone! '
