document_id: LEV.7
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '»Voici la loi du sacrifice de culpabilité. C''est une chose très sainte. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'C''est à l''endroit où l''on égorge l''holocauste que sera égorgée la victime pour le sacrifice de culpabilité. On versera son sang sur tout le pourtour de l''autel. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'On offrira toute sa graisse: la queue, la graisse qui couvre les entrailles, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'les deux rognons et la graisse qui les entoure, celle qui couvre les flancs, et le grand lobe du foie qu''on détachera près des rognons. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Le prêtre brûlera cela sur l''autel en sacrifice passé par le feu devant l''Eternel. C''est un sacrifice de culpabilité. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tout homme parmi les prêtres en mangera. Il le mangera dans un endroit saint. C''est une chose très sainte. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il en va pour le sacrifice de culpabilité comme pour le sacrifice d''expiation; la loi est la même pour ces deux sacrifices: la victime sera pour le prêtre qui fera l''expiation. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Le prêtre qui offrira l''holocauste de quelqu''un aura pour lui la peau de l''holocauste qu''il a offert. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Toute offrande cuite au four, préparée sur le gril ou à la poêle sera pour le prêtre qui l''a offerte. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Toute offrande pétrie à l'huile ou sèche sera pour tous les descendants d'Aaron, sans distinction.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '»Voici la loi du sacrifice de communion qu''on offrira à l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Si quelqu''un l''offre par reconnaissance, il offrira avec le sacrifice de communion des gâteaux sans levain pétris à l''huile, des galettes sans levain arrosées d''huile et des gâteaux de fleur de farine pétris à l''huile. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'A ces gâteaux il ajoutera du pain levé pour son offrande, pour accompagner son sacrifice de reconnaissance et de communion. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'On présentera à titre de prélèvement pour l''Eternel une portion de chaque offrande. Elle sera pour le prêtre qui a versé le sang de la victime du sacrifice de communion. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'La viande du sacrifice de reconnaissance et de communion sera mangée le jour où il est offert; on n''en laissera rien jusqu''au matin. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Si quelqu''un offre un sacrifice pour l''accomplissement d''un vœu ou comme offrande volontaire, la victime sera mangée le jour où il l''offrira et ce qui en restera sera mangé le lendemain. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ce qui restera de la viande de la victime le troisième jour sera brûlé au feu. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dans le cas où quelqu''un mangerait de la viande de son sacrifice de communion le troisième jour, le sacrifice ne sera pas accepté. Il ne sera pas porté au compte de celui qui l''a offert; ce sera une chose infecte et celui qui en mangera restera chargé de sa faute. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'La viande qui a touché quelque chose d''impur ne sera pas mangée: elle sera brûlée au feu. Toute personne pure peut manger de la viande; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'mais si quelqu''un, alors qu''il se trouve en état d''impureté, mange de la viande du sacrifice de communion qui appartient à l''Eternel, il sera exclu de son peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Et si quelqu'un touche quelque chose d'impur – une impureté humaine, un animal impur ou n'importe quelle abomination impure – et mange de la viande du sacrifice de communion qui appartient à l'Eternel, il sera exclu de son peuple.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'L''Eternel dit à Moïse: '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '«Transmets ces instructions aux Israélites: Vous ne mangerez aucune graisse de bœuf, d''agneau ou de chèvre. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'La graisse d''une bête trouvée morte ou déchiquetée pourra servir à n''importe quel usage, mais vous ne la mangerez pas. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Si quelqu''un mange de la graisse des animaux qu''on offre à l''Eternel en sacrifices passés par le feu, il sera exclu de son peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Vous ne mangerez pas de sang d''oiseau ni de bétail, où que vous habitiez. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Si quelqu'un mange du sang, il sera exclu de son peuple.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'L''Eternel dit à Moïse: '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: '«Transmets ces instructions aux Israélites: Celui qui offrira à l''Eternel un sacrifice de communion apportera à l''Eternel une offrande prise sur son sacrifice de communion. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Il apportera de ses propres mains ce qui doit être passé par le feu pour l''Eternel, la graisse qui est sur la poitrine, et il fera avec la poitrine le geste de présentation devant l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Le prêtre brûlera la graisse sur l''autel et la poitrine sera pour Aaron et pour ses descendants. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Vous donnerez au prêtre la cuisse droite à titre de prélèvement sur vos sacrifices de communion; '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'le descendant d''Aaron qui offrira le sang et la graisse du sacrifice de communion aura comme part la cuisse droite. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'En effet, je prends sur les sacrifices de communion offerts par les Israélites la poitrine avec laquelle on fait le geste de présentation et la cuisse prélevée, et je les donne au prêtre Aaron et à ses descendants, par une prescription perpétuelle que respecteront les Israélites. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Telle est la part d''Aaron et de ses descendants dans les sacrifices passés par le feu pour l''Eternel, dès le jour où ils seront présentés pour être à mon service en tant que prêtres. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: C'est ce que l'Eternel ordonne aux Israélites de leur donner dès le jour de leur onction. Ce sera une prescription perpétuelle pour eux au fil des générations.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Telle est la loi pour l''holocauste, l''offrande, le sacrifice d''expiation, le sacrifice de culpabilité, la consécration et le sacrifice de communion. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: L'Eternel la prescrivit à Moïse sur le mont Sinaï, le jour où il ordonna aux Israélites de présenter leurs offrandes à l'Eternel dans le désert du Sinaï.
