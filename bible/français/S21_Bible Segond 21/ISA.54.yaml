document_id: ISA.54
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prospérité future d'Israël
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '*Réjouis-toi, stérile, toi qui n''as pas eu d''enfant!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eclate de joie et pousse des cris de triomphe, toi qui n'as pas connu les douleurs de l'accouchement!
- type: usfm
  marker: q1
  children:
  - type: text
    text: En effet, les enfants de la femme délaissée seront plus nombreux
- type: usfm
  marker: q1
  children:
  - type: text
    text: que ceux de la femme mariée
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '54.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Réjouis-toi… mariée: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Galates 4.27
      metadata:
        usfm: GAL.4.27
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', dit l''Eternel.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Agrandis l'espace de ta tente!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Qu''on déplie les toiles qui te servent d''habitation:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: n'en retiens rien! Allonge tes cordages
- type: usfm
  marker: q1
  children:
  - type: text
    text: et renforce tes piquets!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: En effet, tu déborderas à droite et à gauche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ta descendance envahira des nations
- type: usfm
  marker: q1
  children:
  - type: text
    text: et peuplera des villes désertes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: N'aie pas peur, car tu ne seras pas couverte de honte.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne rougis pas, car tu ne seras pas déshonorée.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au contraire, tu oublieras la honte de ton adolescence
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu ne te souviendras plus du déshonneur de ta période de veuvage.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: En effet, ton époux, c'est celui qui t'a faite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et son nom est l'Eternel, le maître de l'univers;
- type: usfm
  marker: q1
  children:
  - type: text
    text: celui qui te rachète, c'est le Saint d'Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et on l'appelle Dieu de toute la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Oui, l'Eternel t'a rappelée comme une femme abandonnée, à l'esprit abattu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme une femme des jeunes années qu'on a rejetée, dit ton Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Pendant un court moment je t'avais abandonnée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais c'est avec une grande compassion que je t'accueillerai.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Dans un débordement de colère, je m'étais un instant caché à toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais avec un amour éternel j'aurai compassion de toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dit l'Eternel, celui qui te rachète.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'En effet, la situation est, pour moi, pareille à celle de Noé:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: j'avais juré que le déluge qui a frappé Noé ne frapperait plus la terre;
- type: usfm
  marker: q1
  children:
  - type: text
    text: de même, je jure de ne plus m'irriter contre toi
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de ne plus te menacer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Même si les montagnes s'éloignaient,
- type: usfm
  marker: q1
  children:
  - type: text
    text: même si les collines étaient ébranlées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mon amour ne s'éloignera pas de toi
- type: usfm
  marker: q1
  children:
  - type: text
    text: et mon alliance de paix ne sera pas ébranlée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dit celui qui a compassion de toi, l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Malheureuse, toi qui es battue par la tempête et que personne ne console,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je pose tes pierres avec du mortier
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je te donnerai des fondations en saphir;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: je ferai tes ouvertures en rubis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tes portes en escarboucles
- type: usfm
  marker: q1
  children:
  - type: text
    text: et toute ton enceinte en pierres précieuses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '*Tous tes fils seront disciples de l''Eternel'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '54.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tous… l''Eternel: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'renvoi à ce texte par Jésus en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jean 6.45
      metadata:
        usfm: JHN.6.45
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: et leur prospérité sera grande.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Tu seras affermie par la justice.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oublie l'oppression, car tu n'as rien à craindre!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oublie la terreur, car elle ne s'approchera pas de toi!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Si l'on forme des complots, cela ne viendra pas de moi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celui qui se liguera contre toi tombera contre toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Vois: j''ai créé le forgeron qui souffle sur les braises'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui fabrique une arme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais j'ai aussi créé le destructeur chargé de l'anéantir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Toute arme préparée contre toi sera sans effet
- type: usfm
  marker: q1
  children:
  - type: text
    text: et toute personne qui s'attaquera à toi au tribunal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est toi qui la condamneras.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tel est l'héritage des serviteurs de l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: telle est la justice qui leur viendra de moi, déclare l'Eternel.
