document_id: ISA.54,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Prospérité future d'Israël
  - type: text
    content: '*Réjouis-toi, stérile, toi qui n''as pas eu d''enfant!'
  - type: text
    content: Eclate de joie et pousse des cris de triomphe, toi qui n'as pas connu les douleurs de l'accouchement!
  - type: text
    content: En effet, les enfants de la femme délaissée seront plus nombreux
  - type: text
    content: que ceux de la femme mariée
  - type: note
    content: 'Réjouis-toi… mariée: cité en Galates 4.27.'
  - type: text
    content: ', dit l''Eternel.'
  '10':
  - type: text
    content: Même si les montagnes s'éloignaient,
  - type: text
    content: même si les collines étaient ébranlées,
  - type: text
    content: mon amour ne s'éloignera pas de toi
  - type: text
    content: et mon alliance de paix ne sera pas ébranlée,
  - type: text
    content: dit celui qui a compassion de toi, l'Eternel.
  '11':
  - type: text
    content: Malheureuse, toi qui es battue par la tempête et que personne ne console,
  - type: text
    content: je pose tes pierres avec du mortier
  - type: text
    content: et je te donnerai des fondations en saphir;
  '12':
  - type: text
    content: je ferai tes ouvertures en rubis,
  - type: text
    content: tes portes en escarboucles
  - type: text
    content: et toute ton enceinte en pierres précieuses.
  '13':
  - type: text
    content: '*Tous tes fils seront disciples de l''Eternel'
  - type: note
    content: 'Tous… l''Eternel: renvoi à ce texte par Jésus en Jean 6.45.'
  - type: text
    content: et leur prospérité sera grande.
  '14':
  - type: text
    content: Tu seras affermie par la justice.
  - type: text
    content: Oublie l'oppression, car tu n'as rien à craindre!
  - type: text
    content: Oublie la terreur, car elle ne s'approchera pas de toi!
  '15':
  - type: text
    content: Si l'on forme des complots, cela ne viendra pas de moi.
  - type: text
    content: Celui qui se liguera contre toi tombera contre toi.
  '16':
  - type: text
    content: 'Vois: j''ai créé le forgeron qui souffle sur les braises'
  - type: text
    content: et qui fabrique une arme,
  - type: text
    content: mais j'ai aussi créé le destructeur chargé de l'anéantir.
  '17':
  - type: text
    content: Toute arme préparée contre toi sera sans effet
  - type: text
    content: et toute personne qui s'attaquera à toi au tribunal,
  - type: text
    content: c'est toi qui la condamneras.
  - type: text
    content: Tel est l'héritage des serviteurs de l'Eternel,
  - type: text
    content: telle est la justice qui leur viendra de moi, déclare l'Eternel.
  '2':
  - type: text
    content: Agrandis l'espace de ta tente!
  - type: text
    content: 'Qu''on déplie les toiles qui te servent d''habitation:'
  - type: text
    content: n'en retiens rien! Allonge tes cordages
  - type: text
    content: et renforce tes piquets!
  '3':
  - type: text
    content: En effet, tu déborderas à droite et à gauche,
  - type: text
    content: ta descendance envahira des nations
  - type: text
    content: et peuplera des villes désertes.
  '4':
  - type: text
    content: N'aie pas peur, car tu ne seras pas couverte de honte.
  - type: text
    content: Ne rougis pas, car tu ne seras pas déshonorée.
  - type: text
    content: Au contraire, tu oublieras la honte de ton adolescence
  - type: text
    content: et tu ne te souviendras plus du déshonneur de ta période de veuvage.
  '5':
  - type: text
    content: En effet, ton époux, c'est celui qui t'a faite,
  - type: text
    content: et son nom est l'Eternel, le maître de l'univers;
  - type: text
    content: celui qui te rachète, c'est le Saint d'Israël,
  - type: text
    content: et on l'appelle Dieu de toute la terre.
  '6':
  - type: text
    content: Oui, l'Eternel t'a rappelée comme une femme abandonnée, à l'esprit abattu,
  - type: text
    content: comme une femme des jeunes années qu'on a rejetée, dit ton Dieu.
  '7':
  - type: text
    content: Pendant un court moment je t'avais abandonnée,
  - type: text
    content: mais c'est avec une grande compassion que je t'accueillerai.
  '8':
  - type: text
    content: Dans un débordement de colère, je m'étais un instant caché à toi,
  - type: text
    content: mais avec un amour éternel j'aurai compassion de toi,
  - type: text
    content: dit l'Eternel, celui qui te rachète.
  '9':
  - type: text
    content: 'En effet, la situation est, pour moi, pareille à celle de Noé:'
  - type: text
    content: j'avais juré que le déluge qui a frappé Noé ne frapperait plus la terre;
  - type: text
    content: de même, je jure de ne plus m'irriter contre toi
  - type: text
    content: et de ne plus te menacer.
