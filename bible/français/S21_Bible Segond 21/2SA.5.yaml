document_id: 2SA.5,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Règne de David sur Israël
  - type: heading
    content: 5.1–24.25
  - type: heading
    content: Sacre de David
  - type: text
    content: 'Toutes les tribus d''Israël vinrent trouver David à Hébron pour dire: «Nous sommes faits des mêmes os et de la même chair que toi. '
  '10':
  - type: text
    content: David devenait de plus en plus puissant et l'Eternel, le Dieu de l'univers, était avec lui.
  '11':
  - type: text
    content: 'Hiram, le roi de Tyr, envoya des messagers à David, ainsi que du bois de cèdre, avec des charpentiers et des tailleurs de pierres, et ils lui construisirent une maison. '
  '12':
  - type: text
    content: David reconnut alors que l'Eternel l'affermissait comme roi sur Israël et donnait du rayonnement à sa royauté à cause de son peuple, Israël.
  '13':
  - type: text
    content: 'David prit encore des concubines et des femmes de Jérusalem, après son arrivée d''Hébron, et il eut encore des fils et des filles. '
  '14':
  - type: text
    content: 'Voici le nom des enfants qu''il eut à Jérusalem: Shammua, Shobab, Nathan, Salomon, '
  '15':
  - type: text
    content: 'Jibhar, Elishua, Népheg, Japhia, '
  '16':
  - type: text
    content: Elishama, Eliada et Eliphéleth.
  - type: heading
    content: Victoires de David sur les Philistins
  '17':
  - type: text
    content: 'Les Philistins apprirent qu''on avait consacré par onction David comme roi sur Israël, et ils montèrent tous à sa recherche. David en fut informé et descendit à la forteresse. '
  '18':
  - type: text
    content: 'Les Philistins arrivèrent et se déployèrent dans la vallée des Rephaïm. '
  '19':
  - type: text
    content: 'David consulta l''Eternel en disant: «Dois-je monter contre les Philistins? Les livreras-tu entre mes mains?» Et l''Eternel dit à David: «Monte, car je livrerai les Philistins entre tes mains.» '
  '2':
  - type: text
    content: 'Auparavant déjà, lorsque Saül était notre roi, c''était toi qui faisais partir Israël en campagne et qui l''en faisais revenir. L''Eternel t''a dit: ‘*C''est toi qui prendras soin de mon peuple, Israël, et qui deviendras son chef.’'
  - type: note
    content: 'C''est toi… chef: cité en Matthieu 2.6 en association avec Michée 5.1 à propos de Jésus-Christ.'
  - type: text
    content: '» '
  '20':
  - type: text
    content: 'David vint à Baal-Peratsim où il les battit. Puis il dit: «L''Eternel a dispersé mes ennemis devant moi comme de l''eau qui coule.» C''est pourquoi l''on a appelé cet endroit Baal-Peratsim. '
  '21':
  - type: text
    content: Ils y abandonnèrent leurs idoles, et David et ses hommes les emportèrent.
  '22':
  - type: text
    content: 'Les Philistins montèrent de nouveau pour attaquer et se déployèrent dans la vallée des Rephaïm. '
  '23':
  - type: text
    content: 'David consulta l''Eternel, et l''Eternel dit: «Tu ne monteras pas. Contourne-les par-derrière et tu arriveras sur eux vis-à-vis des mûriers. '
  '24':
  - type: text
    content: 'Quand tu entendras un bruit de pas dans les cimes des mûriers, alors dépêche-toi, car c''est l''Eternel qui marche devant toi pour battre l''armée des Philistins.» '
  '25':
  - type: text
    content: David fit ce que l'Eternel lui avait ordonné et il porta des coups aux Philistins depuis Guéba jusqu'à Guézer.
  '3':
  - type: text
    content: Ainsi, tous les anciens d'Israël vinrent trouver le roi à Hébron et là, le roi David fit alliance avec eux devant l'Eternel. Ils consacrèrent par onction David comme roi sur Israël.
  '4':
  - type: text
    content: 'David était âgé de 30 ans lorsqu''il devint roi, et il régna 40 ans. '
  '5':
  - type: text
    content: Il régna 7 ans et 6 mois sur Juda à Hébron, et 33 ans sur tout Israël et Juda à Jérusalem.
  '6':
  - type: text
    content: 'Le roi marcha avec ses hommes sur Jérusalem contre les Jébusiens, qui habitaient le pays. Ils dirent à David: «Tu n''entreras pas ici, car même les aveugles et les boiteux te repousseront en disant: ‘David n''entrera pas ici.’» '
  '7':
  - type: text
    content: 'David s''empara néanmoins de la forteresse de Sion, c''est-à-dire la ville de David. '
  '8':
  - type: text
    content: 'David avait dit ce jour-là: «Si quelqu''un veut battre les Jébusiens, il devra atteindre par le canal ces boiteux et ces aveugles qui sont les ennemis de David.» C''est pourquoi l''on dit: «L''aveugle et le boiteux n''entreront pas dans le temple.»'
  '9':
  - type: text
    content: 'David s''installa dans la forteresse, qu''il appela ville de David. Il fit des constructions de tous côtés, à partir de la terrasse de Millo jusque vers l''intérieur. '
