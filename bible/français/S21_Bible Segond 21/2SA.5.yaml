document_id: 2SA.5,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Règne de David sur Israël
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: 5.1–24.25
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sacre de David
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Toutes les tribus d''Israël vinrent trouver David à Hébron pour dire: «Nous sommes faits des mêmes os et de la même chair que toi. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: David devenait de plus en plus puissant et l'Eternel, le Dieu de l'univers, était avec lui.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Hiram, le roi de Tyr, envoya des messagers à David, ainsi que du bois de cèdre, avec des charpentiers et des tailleurs de pierres, et ils lui construisirent une maison. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: David reconnut alors que l'Eternel l'affermissait comme roi sur Israël et donnait du rayonnement à sa royauté à cause de son peuple, Israël.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'David prit encore des concubines et des femmes de Jérusalem, après son arrivée d''Hébron, et il eut encore des fils et des filles. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Voici le nom des enfants qu''il eut à Jérusalem: Shammua, Shobab, Nathan, Salomon, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Jibhar, Elishua, Népheg, Japhia, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Elishama, Eliada et Eliphéleth.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Victoires de David sur les Philistins
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Les Philistins apprirent qu''on avait consacré par onction David comme roi sur Israël, et ils montèrent tous à sa recherche. David en fut informé et descendit à la forteresse. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Les Philistins arrivèrent et se déployèrent dans la vallée des Rephaïm. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'David consulta l''Eternel en disant: «Dois-je monter contre les Philistins? Les livreras-tu entre mes mains?» Et l''Eternel dit à David: «Monte, car je livrerai les Philistins entre tes mains.» '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Auparavant déjà, lorsque Saül était notre roi, c''était toi qui faisais partir Israël en campagne et qui l''en faisais revenir. L''Eternel t''a dit: ‘*C''est toi qui prendras soin de mon peuple, Israël, et qui deviendras son chef.’'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'C''est toi… chef: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matthieu 2.6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' en association avec '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Michée 5.1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' à propos de Jésus-Christ.'
      marker-yv: yv-n
    - type: text
      text: '» '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'David vint à Baal-Peratsim où il les battit. Puis il dit: «L''Eternel a dispersé mes ennemis devant moi comme de l''eau qui coule.» C''est pourquoi l''on a appelé cet endroit Baal-Peratsim. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ils y abandonnèrent leurs idoles, et David et ses hommes les emportèrent.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Les Philistins montèrent de nouveau pour attaquer et se déployèrent dans la vallée des Rephaïm. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'David consulta l''Eternel, et l''Eternel dit: «Tu ne monteras pas. Contourne-les par-derrière et tu arriveras sur eux vis-à-vis des mûriers. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Quand tu entendras un bruit de pas dans les cimes des mûriers, alors dépêche-toi, car c''est l''Eternel qui marche devant toi pour battre l''armée des Philistins.» '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: David fit ce que l'Eternel lui avait ordonné et il porta des coups aux Philistins depuis Guéba jusqu'à Guézer.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ainsi, tous les anciens d'Israël vinrent trouver le roi à Hébron et là, le roi David fit alliance avec eux devant l'Eternel. Ils consacrèrent par onction David comme roi sur Israël.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'David était âgé de 30 ans lorsqu''il devint roi, et il régna 40 ans. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Il régna 7 ans et 6 mois sur Juda à Hébron, et 33 ans sur tout Israël et Juda à Jérusalem.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Le roi marcha avec ses hommes sur Jérusalem contre les Jébusiens, qui habitaient le pays. Ils dirent à David: «Tu n''entreras pas ici, car même les aveugles et les boiteux te repousseront en disant: ‘David n''entrera pas ici.’» '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'David s''empara néanmoins de la forteresse de Sion, c''est-à-dire la ville de David. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'David avait dit ce jour-là: «Si quelqu''un veut battre les Jébusiens, il devra atteindre par le canal ces boiteux et ces aveugles qui sont les ennemis de David.» C''est pourquoi l''on dit: «L''aveugle et le boiteux n''entreront pas dans le temple.»'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'David s''installa dans la forteresse, qu''il appela ville de David. Il fit des constructions de tous côtés, à partir de la terrasse de Millo jusque vers l''intérieur. '
