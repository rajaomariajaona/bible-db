document_id: LEV.23
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les rendez-vous fixés par l'Eternel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L''Eternel dit à Moïse: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Transmets ces instructions aux Israélites: Les fêtes de l''Eternel que vous proclamerez seront de saintes assemblées. Voici quelles sont mes fêtes.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le sabbat
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: »On travaillera 6 jours, mais le septième jour est le sabbat, le jour du repos; il y aura une sainte assemblée. Vous ne ferez aucun travail, c'est le sabbat de l'Eternel dans toutes vos maisons.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La Pâque et la fête des pains sans levain
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: »Voici les fêtes de l'Eternel, les saintes assemblées que vous proclamerez à la date fixée pour elles.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '»Le quatorzième jour du premier mois, au coucher du soleil, ce sera la Pâque de l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Et le quinzième jour de ce mois, ce sera la fête des pains sans levain en l''honneur de l''Eternel. Vous mangerez pendant 7 jours des pains sans levain. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Le premier jour, vous aurez une sainte assemblée; vous n''effectuerez aucun travail pénible. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Pendant 7 jours, vous offrirez à l'Eternel des sacrifices passés par le feu. Le septième jour, il y aura une sainte assemblée; vous n'effectuerez aucun travail pénible.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: La fête des prémices et la fête des moissons
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'L''Eternel dit à Moïse: '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '«Transmets ces instructions aux Israélites: Quand vous serez entrés dans le pays que je vous donne et que vous y ferez la moisson, vous apporterez au prêtre la première gerbe de votre moisson. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il fera avec la gerbe le geste de présentation devant l''Eternel afin qu''elle soit acceptée, il fera le geste de présentation le lendemain du sabbat. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Le jour où vous présenterez la gerbe, vous offrirez en holocauste à l''Eternel un agneau d''un an sans défaut. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Vous y joindrez une offrande de 4 litres et demi de fleur de farine pétrie à l''huile, comme offrande passée par le feu dont l''odeur est agréable à l''Eternel, et vous ferez une offrande d''un litre de vin. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Vous ne mangerez ni pain, ni épis rôtis ou broyés jusqu'au jour même où vous apporterez l'offrande à votre Dieu. C'est une prescription perpétuelle pour vous au fil des générations, partout où vous habiterez.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '»Depuis ce lendemain du sabbat, depuis le jour où vous apporterez la gerbe pour faire le geste de présentation, vous compterez sept semaines entières. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Vous compterez 50 jours jusqu''au lendemain du septième sabbat et vous ferez une offrande nouvelle à l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Vous apporterez de vos maisons deux pains pour qu''ils soient présentés. Ils seront faits avec 4 litres et demi de fleur de farine et cuits avec du levain, en tant que premières parts réservées à l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'En plus de ces pains, vous offrirez en holocauste à l''Eternel 7 agneaux d''un an sans défaut, un jeune taureau et 2 béliers, ainsi que l''offrande végétale et les offrandes liquides qui les accompagnent. Ce sera une offrande passée par le feu dont l''odeur est agréable à l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Vous offrirez un bouc en sacrifice d''expiation et 2 agneaux d''un an en sacrifice de communion. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Le prêtre fera pour ces victimes le geste de présentation devant l''Eternel, avec le pain et les 2 agneaux. Elles seront consacrées à l''Eternel et appartiendront au prêtre. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ce jour même, vous proclamerez la fête et vous aurez une sainte assemblée; vous n'effectuerez aucun travail pénible. C'est une prescription perpétuelle pour vous au fil des générations, partout où vous habiterez.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: »Quand vous ferez la moisson dans votre pays, tu ne moissonneras pas ton champ jusqu'aux bords et tu ne ramasseras pas ce qui reste à glaner. Tu laisseras cela au pauvre et à l'étranger. Je suis l'Eternel, votre Dieu.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: La fête des trompettes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'L''Eternel dit à Moïse: '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '«Transmets ces instructions aux Israélites: Le premier jour du septième mois, vous aurez un jour de repos proclamé au son des trompettes et une sainte assemblée. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Vous n'effectuerez aucun travail pénible et vous offrirez à l'Eternel des sacrifices passés par le feu.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le jour des expiations
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'L''Eternel dit à Moïse: '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: '«Le dixième jour de ce septième mois, ce sera le jour des expiations. Vous aurez une sainte assemblée, vous vous humilierez et vous offrirez à l''Eternel des sacrifices passés par le feu. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Vous ne ferez aucun travail ce jour-là, car c''est le jour des expiations, où l''expiation doit être faite pour vous devant l''Eternel, votre Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Toute personne qui ne s''humiliera pas ce jour-là sera exclue de son peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Toute personne qui fera ce jour-là un travail quelconque, je l''exclurai du milieu de son peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Vous ne ferez aucun travail. C''est une prescription perpétuelle pour vous au fil des générations, partout où vous habiterez. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ce sera pour vous un sabbat, un jour de repos, et vous vous humilierez. Dès le soir du neuvième jour jusqu'au soir suivant, vous célébrerez votre sabbat.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: La fête des tentes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'L''Eternel dit à Moïse: '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: '«Transmets ces instructions aux Israélites: Le quinzième jour de ce septième mois, ce sera la fête des tentes en l''honneur de l''Eternel, qui durera 7 jours. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Le premier jour, il y aura une sainte assemblée; vous n''effectuerez aucun travail pénible. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Pendant 7 jours, vous offrirez à l'Eternel des sacrifices passés par le feu. Le huitième jour, vous aurez une sainte assemblée et vous offrirez à l'Eternel des sacrifices passés par le feu; ce sera une assemblée solennelle, vous n'effectuerez aucun travail pénible.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: '»Telles sont les fêtes de l''Eternel, les saintes assemblées que vous proclamerez afin que l''on offre à l''Eternel des sacrifices passés par le feu, des holocaustes, des offrandes végétales, des victimes et des offrandes liquides, chacun le jour fixé. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Vous respecterez en plus les sabbats de l'Eternel et vous continuerez à faire vos dons à l'Eternel, tous vos sacrifices pour l'accomplissement d'un vœu et toutes vos offrandes volontaires.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: '»Le quinzième jour du septième mois, quand vous récolterez les produits du pays, vous célébrerez donc une fête en l''honneur de l''Eternel pendant 7 jours: le premier jour sera un jour de repos, et le huitième aussi. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Le premier jour, vous prendrez de beaux fruits, des branches de palmiers, des rameaux d''arbres touffus et des saules de rivière, et vous vous réjouirez devant l''Eternel, votre Dieu, pendant 7 jours. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Vous célébrerez chaque année cette fête à l''Eternel pendant 7 jours. C''est une prescription perpétuelle pour vous au fil des générations. Vous la célébrerez le septième mois. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Vous habiterez pendant 7 jours sous des tentes. Tous les Israélites de naissance habiteront sous des tentes '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: afin que vos descendants sachent que j'ai fait habiter les Israélites sous des tentes après les avoir fait sortir d'Egypte. Je suis l'Eternel, votre Dieu.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: C'est ainsi que Moïse dit aux Israélites quelles sont les fêtes de l'Eternel.
