document_id: ISA.62,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Instances pour la venue du salut
  - type: heading
    content: 'V. 1-5: cf. (És 61:3-11; 65:15, 18, 19.) Os 2:20-25.'
  - type: text
    content: Pour l’amour de Sion je ne me tairai point,
  - type: text
    content: Pour l’amour de Jérusalem je ne prendrai point de repos,
  - type: text
    content: Jusqu’à ce que son salut paraisse, comme l’aurore,
  - type: text
    content: Et sa délivrance, comme un flambeau qui s’allume.
  '10':
  - type: text
    content: ' '
  - type: note
    content: És 40:3; 57:14.
  - type: text
    content: Franchissez, franchissez les portes!
  - type: text
    content: Préparez un chemin pour le peuple!
  - type: text
    content: Frayez, frayez la route, ôtez les pierres!
  - type: text
    content: Élevez une bannière vers les peuples!
  '11':
  - type: text
    content: 'Voici ce que l’Éternel proclame aux extrémités de la terre:'
  - type: text
    content: 'Dites à la fille de Sion:'
  - type: text
    content: Voici, ton sauveur arrive;
  - type: text
    content: Voici, le salaire est avec lui,
  - type: text
    content: Et les rétributions le précèdent.
  '12':
  - type: text
    content: On les appellera peuple saint, rachetés de l’Éternel;
  - type: text
    content: Et toi, on t’appellera recherchée, ville non délaissée.
  '2':
  - type: text
    content: Alors les nations verront ton salut,
  - type: text
    content: Et tous les rois ta gloire;
  - type: text
    content: 'Et l’on t’appellera '
  - type: note
    content: És 65:15.
  - type: text
    content: d’un nom nouveau,
  - type: text
    content: Que la bouche de l’Éternel déterminera.
  '3':
  - type: text
    content: Tu seras une couronne éclatante dans la main de l’Éternel,
  - type: text
    content: Un turban royal dans la main de ton Dieu.
  '4':
  - type: text
    content: On ne te nommera plus délaissée,
  - type: text
    content: On ne nommera plus ta terre désolation;
  - type: text
    content: Mais on t’appellera mon plaisir en elle,
  - type: text
    content: Et l’on appellera ta terre épouse;
  - type: text
    content: Car l’Éternel met son plaisir en toi,
  - type: text
    content: Et ta terre aura un époux.
  '5':
  - type: text
    content: Comme un jeune homme s’unit à une vierge,
  - type: text
    content: Ainsi tes fils s’uniront à toi;
  - type: text
    content: Et comme la fiancée fait la joie de son fiancé,
  - type: text
    content: Ainsi tu feras la joie de ton Dieu.
  - type: heading
    content: 'V. 6-9: cf. (Ps 122:6-9. Éz 36:33-37. Mt 6:10.)'
  '6':
  - type: text
    content: Sur tes murs, Jérusalem, j’ai placé des gardes;
  - type: text
    content: Ils ne se tairont ni jour ni nuit.
  - type: text
    content: Vous qui la rappelez au souvenir de l’Éternel,
  - type: text
    content: Point de repos pour vous!
  '7':
  - type: text
    content: Et ne lui laissez aucune relâche,
  - type: text
    content: Jusqu’à ce qu’il rétablisse Jérusalem
  - type: text
    content: Et la rende glorieuse sur la terre.
  '8':
  - type: text
    content: 'L’Éternel l’a juré par sa droite et par son bras puissant:'
  - type: text
    content: Je ne donnerai plus ton blé pour nourriture à tes ennemis,
  - type: text
    content: Et les fils de l’étranger ne boiront plus ton vin,
  - type: text
    content: Produit de tes labeurs;
  '9':
  - type: text
    content: Mais ceux qui auront amassé le blé le mangeront
  - type: text
    content: Et loueront l’Éternel,
  - type: text
    content: Et ceux qui auront récolté le vin le boiront,
  - type: text
    content: Dans les parvis de mon sanctuaire.
  - type: heading
    content: 'V. 10-12: cf. (És 40:1-11. Za 9:9-12.)'
