document_id: ISA.62
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Instances pour la venue du salut
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-5: cf. (És 61:3-11; 65:15, 18, 19.) Os 2:20-25.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Pour l’amour de Sion je ne me tairai point,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour l’amour de Jérusalem je ne prendrai point de repos,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jusqu’à ce que son salut paraisse, comme l’aurore,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et sa délivrance, comme un flambeau qui s’allume.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Alors les nations verront ton salut,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tous les rois ta gloire;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et l’on t’appellera '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 65:15
      metadata:
        usfm: ISA.65.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: d’un nom nouveau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que la bouche de l’Éternel déterminera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tu seras une couronne éclatante dans la main de l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Un turban royal dans la main de ton Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: On ne te nommera plus délaissée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: On ne nommera plus ta terre désolation;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais on t’appellera mon plaisir en elle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et l’on appellera ta terre épouse;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car l’Éternel met son plaisir en toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ta terre aura un époux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Comme un jeune homme s’unit à une vierge,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ainsi tes fils s’uniront à toi;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et comme la fiancée fait la joie de son fiancé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ainsi tu feras la joie de ton Dieu.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 6-9: cf. (Ps 122:6-9. Éz 36:33-37. Mt 6:10.)'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Sur tes murs, Jérusalem, j’ai placé des gardes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ne se tairont ni jour ni nuit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous qui la rappelez au souvenir de l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Point de repos pour vous!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Et ne lui laissez aucune relâche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jusqu’à ce qu’il rétablisse Jérusalem
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la rende glorieuse sur la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'L’Éternel l’a juré par sa droite et par son bras puissant:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je ne donnerai plus ton blé pour nourriture à tes ennemis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les fils de l’étranger ne boiront plus ton vin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Produit de tes labeurs;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mais ceux qui auront amassé le blé le mangeront
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et loueront l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ceux qui auront récolté le vin le boiront,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans les parvis de mon sanctuaire.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 10-12: cf. (És 40:1-11. Za 9:9-12.)'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 40:3
      metadata:
        usfm: ISA.40.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 57:14
      metadata:
        usfm: ISA.57.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Franchissez, franchissez les portes!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Préparez un chemin pour le peuple!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Frayez, frayez la route, ôtez les pierres!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Élevez une bannière vers les peuples!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Voici ce que l’Éternel proclame aux extrémités de la terre:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dites à la fille de Sion:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voici, ton sauveur arrive;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voici, le salaire est avec lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les rétributions le précèdent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: On les appellera peuple saint, rachetés de l’Éternel;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et toi, on t’appellera recherchée, ville non délaissée.
