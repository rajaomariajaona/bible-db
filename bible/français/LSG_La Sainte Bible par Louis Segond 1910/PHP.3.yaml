document_id: PHP.3,93
type_code: fra
verses:
  '1':
  - type: text
    content: 'Au reste, mes frères, '
  - type: note
    content: Ph 4:4. Ja 1:2. 1 Pi 4:13.
  - type: text
    content: réjouissez-vous dans le Seigneur.
  - type: heading
    content: Se tenir en garde contre les faux docteurs, et tendre à la perfection en s’attachant à Jésus-Christ. Suivre l’exemple de Paul
  - type: heading
    content: 'V. 1-14: cf. Ga 5:1-6. (Ga 1:13-16; 2:15, 16, 20; 6:12-14. Mt 13:44-46.) Ro 6:3-13. (1 Co 9:24-27. 2 Pi 1:5-11.)'
  - type: text
    content: 'Je ne me lasse point de vous écrire les mêmes choses, et pour vous cela est salutaire. '
  '10':
  - type: text
    content: 'Afin de connaître Christ, et la puissance de sa résurrection, '
  - type: note
    content: Ro 8:17. 2 Co 4:10. 2 Ti 2:11, 12. 1 Pi 4:13.
  - type: text
    content: 'et la communion de ses souffrances, en devenant conforme à lui dans sa mort, pour parvenir, '
  '11':
  - type: text
    content: 'si je puis, à la résurrection d’entre les morts. '
  '12':
  - type: text
    content: 'Ce n’est pas que j’aie déjà remporté le prix, ou que j’aie déjà atteint la perfection; mais je cours, pour tâcher de le saisir, puisque moi aussi j’ai été saisi par Jésus-Christ. '
  '13':
  - type: text
    content: 'Frères, je ne pense pas l’avoir saisi; mais je fais une chose: oubliant ce qui est en arrière et me portant vers ce qui est en avant, '
  '14':
  - type: note
    content: 1 Co 9:24. 2 Ti 4:7.
  - type: text
    content: je cours vers le but, pour remporter le prix de la vocation céleste de Dieu en Jésus-Christ.
  - type: heading
    content: '3 v. 15 à 4 v. 1: cf. 1 Co 11:1. (Ro 16:17, 18. Ga 6:7, 8.) (Hé 13:14. Col 3:1-4. 1 Jn 3:1-3.)'
  '15':
  - type: text
    content: 'Nous tous donc qui sommes parfaits, ayons cette même pensée; et si vous êtes en quelque point d’un autre avis, Dieu vous éclairera aussi là-dessus. '
  '16':
  - type: text
    content: 'Seulement, au point où nous sommes parvenus, '
  - type: note
    content: Ga 6:16.
  - type: text
    content: 'marchons d’un même pas. '
  '17':
  - type: text
    content: 'Soyez tous '
  - type: note
    content: 1 Co 4:16; 11:1. 1 Th 1:6.
  - type: text
    content: 'mes imitateurs, frères, et portez les regards sur ceux qui marchent '
  - type: note
    content: 2 Th 3:9. 1 Pi 5:3.
  - type: text
    content: 'selon le modèle que vous avez en nous. '
  '18':
  - type: note
    content: Ro 16:17.
  - type: text
    content: 'Car il en est plusieurs qui marchent en ennemis de la croix de Christ, je vous en ai souvent parlé, et j’en parle maintenant encore en pleurant. '
  '19':
  - type: text
    content: 'Leur fin sera la perdition; ils ont pour dieu leur ventre, ils mettent leur gloire dans ce qui fait leur honte, ils ne pensent qu’aux choses de la terre. '
  '2':
  - type: note
    content: És 56:10.
  - type: text
    content: 'Prenez garde aux chiens, prenez garde aux mauvais ouvriers, prenez garde aux faux circoncis. '
  '20':
  - type: note
    content: Hé 13:14.
  - type: text
    content: 'Mais notre cité à nous est dans les cieux, '
  - type: note
    content: 1 Co 1:7. 1 Th 1:10. Tit 2:13.
  - type: text
    content: 'd’où nous attendons aussi comme Sauveur le Seigneur Jésus-Christ, '
  '21':
  - type: note
    content: 1 Co 15:51. Col 3:4. 1 Jn 3:2.
  - type: text
    content: qui transformera le corps de notre humiliation, en le rendant semblable au corps de sa gloire, par le pouvoir qu’il a de s’assujettir toutes choses.
  '3':
  - type: note
    content: De 10:16; 30:6. Jé 4:4. Ro 2:29. Col 2:11.
  - type: text
    content: 'Car les circoncis, c’est nous, qui rendons à '
  - type: note
    content: Jn 4:24.
  - type: text
    content: 'Dieu notre culte par l’Esprit de Dieu, qui nous glorifions en Jésus-Christ, et qui ne mettons point notre confiance en la chair. '
  '4':
  - type: text
    content: 'Moi aussi, cependant, j’aurais sujet de mettre ma confiance en la chair. Si quelque autre croit pouvoir se confier en la chair, '
  - type: note
    content: 2 Co 11:21.
  - type: text
    content: 'je le puis bien davantage, '
  '5':
  - type: text
    content: 'moi, circoncis le huitième jour, de la race '
  - type: note
    content: 2 Co 11:22.
  - type: text
    content: 'd’Israël, de la tribu de '
  - type: note
    content: Ge 49:27.
  - type: text
    content: 'Benjamin, Hébreu né d’Hébreux; quant à la loi, '
  - type: note
    content: Ac 23:6.
  - type: text
    content: 'pharisien; '
  '6':
  - type: text
    content: 'quant au zèle, '
  - type: note
    content: Ac 8:3; 9:1; 22:3, 4. Ga 1:13. 1 Ti 1:13.
  - type: text
    content: 'persécuteur de l’Église; irréprochable, à l’égard de la justice de la loi. '
  '7':
  - type: note
    content: Mt 13:44.
  - type: text
    content: 'Mais ces choses qui étaient pour moi des gains, je les ai regardées comme une perte, à cause de Christ. '
  '8':
  - type: text
    content: 'Et même je regarde toutes choses comme une perte, '
  - type: note
    content: És 53:11. Jé 9:23. Jn 17:3. Col 2:2.
  - type: text
    content: 'à cause de l’excellence de la connaissance de Jésus-Christ mon Seigneur, pour lequel j’ai renoncé à tout, et je les regarde comme de la boue, afin de gagner Christ, '
  '9':
  - type: text
    content: 'et d’être trouvé en lui, non avec ma justice, celle qui vient de la loi, mais avec celle qui s’obtient par la foi en Christ, la justice '
  - type: note
    content: Ro 1:17; 3:21.
  - type: text
    content: 'qui vient de Dieu par la foi, '
