      metadata:
        usfm: 1TI.1.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'persécuteur de l’Église; irréprochable, à l’égard de la justice de la loi. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 13:44
      metadata:
        usfm: MAT.13.44
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Mais ces choses qui étaient pour moi des gains, je les ai regardées comme une perte, à cause de Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Et même je regarde toutes choses comme une perte, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 53:11
      metadata:
        usfm: ISA.53.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 9:23
      metadata:
        usfm: JER.9.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 17:3
      metadata:
        usfm: JHN.17.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 2:2
      metadata:
        usfm: COL.2.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'à cause de l’excellence de la connaissance de Jésus-Christ mon Seigneur, pour lequel j’ai renoncé à tout, et je les regarde comme de la boue, afin de gagner Christ, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'et d’être trouvé en lui, non avec ma justice, celle qui vient de la loi, mais avec celle qui s’obtient par la foi en Christ, la justice '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 1:17
      metadata:
        usfm: ROM.1.17
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 3:21
      metadata:
        usfm: ROM.3.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qui vient de Dieu par la foi, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Afin de connaître Christ, et la puissance de sa résurrection, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 8:17
      metadata:
        usfm: ROM.8.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 4:10
      metadata:
        usfm: 2CO.4.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ti 2:11
      metadata:
        usfm: 2TI.2.11
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '12'
      metadata:
        usfm: 2TI.2.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 4:13
      metadata:
        usfm: 1PE.4.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et la communion de ses souffrances, en devenant conforme à lui dans sa mort, pour parvenir, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'si je puis, à la résurrection d’entre les morts. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ce n’est pas que j’aie déjà remporté le prix, ou que j’aie déjà atteint la perfection; mais je cours, pour tâcher de le saisir, puisque moi aussi j’ai été saisi par Jésus-Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Frères, je ne pense pas l’avoir saisi; mais je fais une chose: oubliant ce qui est en arrière et me portant vers ce qui est en avant, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 9:24
      metadata:
        usfm: 1CO.9.24
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ti 4:7
      metadata:
        usfm: 2TI.4.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: je cours vers le but, pour remporter le prix de la vocation céleste de Dieu en Jésus-Christ.
- type: usfm
  marker: r
  children:
  - type: text
    text: '3 v. 15 à 4 v. 1: cf. 1 Co 11:1. (Ro 16:17, 18. Ga 6:7, 8.) (Hé 13:14. Col 3:1-4. 1 Jn 3:1-3.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nous tous donc qui sommes parfaits, ayons cette même pensée; et si vous êtes en quelque point d’un autre avis, Dieu vous éclairera aussi là-dessus. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Seulement, au point où nous sommes parvenus, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 6:16
      metadata:
        usfm: GAL.6.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'marchons d’un même pas. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Soyez tous '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 4:16
      metadata:
        usfm: 1CO.4.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 11:1
      metadata:
        usfm: 1CO.11.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 1:6
      metadata:
        usfm: 1TH.1.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'mes imitateurs, frères, et portez les regards sur ceux qui marchent '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Th 3:9
      metadata:
        usfm: 2TH.3.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 5:3
      metadata:
        usfm: 1PE.5.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'selon le modèle que vous avez en nous. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 16:17
      metadata:
        usfm: ROM.16.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Car il en est plusieurs qui marchent en ennemis de la croix de Christ, je vous en ai souvent parlé, et j’en parle maintenant encore en pleurant. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Leur fin sera la perdition; ils ont pour dieu leur ventre, ils mettent leur gloire dans ce qui fait leur honte, ils ne pensent qu’aux choses de la terre. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 13:14
      metadata:
        usfm: HEB.13.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Mais notre cité à nous est dans les cieux, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 1:7
      metadata:
        usfm: 1CO.1.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 1:10
      metadata:
        usfm: 1TH.1.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Tit 2:13
      metadata:
        usfm: TIT.2.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'd’où nous attendons aussi comme Sauveur le Seigneur Jésus-Christ, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 15:51
      metadata:
        usfm: 1CO.15.51
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 3:4
      metadata:
        usfm: COL.3.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 3:2
      metadata:
        usfm: 1JN.3.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: qui transformera le corps de notre humiliation, en le rendant semblable au corps de sa gloire, par le pouvoir qu’il a de s’assujettir toutes choses.
