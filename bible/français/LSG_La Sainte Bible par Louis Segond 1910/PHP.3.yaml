        usfm: DEU.30.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 4:4
      metadata:
        usfm: JER.4.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 2:29
      metadata:
        usfm: ROM.2.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 2:11
      metadata:
        usfm: COL.2.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Car les circoncis, c’est nous, qui rendons à '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 4:24
      metadata:
        usfm: JHN.4.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Dieu notre culte par l’Esprit de Dieu, qui nous glorifions en Jésus-Christ, et qui ne mettons point notre confiance en la chair. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Moi aussi, cependant, j’aurais sujet de mettre ma confiance en la chair. Si quelque autre croit pouvoir se confier en la chair, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 11:21
      metadata:
        usfm: 2CO.11.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'je le puis bien davantage, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'moi, circoncis le huitième jour, de la race '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 11:22
      metadata:
        usfm: 2CO.11.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'd’Israël, de la tribu de '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 49:27
      metadata:
        usfm: GEN.49.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Benjamin, Hébreu né d’Hébreux; quant à la loi, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 23:6
      metadata:
        usfm: ACT.23.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'pharisien; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'quant au zèle, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 8:3
      metadata:
        usfm: ACT.8.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 9:1
      metadata:
        usfm: ACT.9.1
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 22:3
      metadata:
        usfm: ACT.22.3
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '4'
      metadata:
        usfm: ACT.22.4
    - type: text
      text: '. '
