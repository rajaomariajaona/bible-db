document_id: PHP.3,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Au reste, mes frères, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ph 4:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ja 1:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 4:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: réjouissez-vous dans le Seigneur.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Se tenir en garde contre les faux docteurs, et tendre à la perfection en s’attachant à Jésus-Christ. Suivre l’exemple de Paul
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-14: cf. Ga 5:1-6. (Ga 1:13-16; 2:15, 16, 20; 6:12-14. Mt 13:44-46.) Ro 6:3-13. (1 Co 9:24-27. 2 Pi 1:5-11.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je ne me lasse point de vous écrire les mêmes choses, et pour vous cela est salutaire. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Afin de connaître Christ, et la puissance de sa résurrection, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 8:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 4:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ti 2:11
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '12'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 4:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'et la communion de ses souffrances, en devenant conforme à lui dans sa mort, pour parvenir, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'si je puis, à la résurrection d’entre les morts. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce n’est pas que j’aie déjà remporté le prix, ou que j’aie déjà atteint la perfection; mais je cours, pour tâcher de le saisir, puisque moi aussi j’ai été saisi par Jésus-Christ. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Frères, je ne pense pas l’avoir saisi; mais je fais une chose: oubliant ce qui est en arrière et me portant vers ce qui est en avant, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 9:24
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ti 4:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: je cours vers le but, pour remporter le prix de la vocation céleste de Dieu en Jésus-Christ.
  - type: usfm
    marker: r
    children:
    - type: text
      text: '3 v. 15 à 4 v. 1: cf. 1 Co 11:1. (Ro 16:17, 18. Ga 6:7, 8.) (Hé 13:14. Col 3:1-4. 1 Jn 3:1-3.)'
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous tous donc qui sommes parfaits, ayons cette même pensée; et si vous êtes en quelque point d’un autre avis, Dieu vous éclairera aussi là-dessus. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Seulement, au point où nous sommes parvenus, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 6:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'marchons d’un même pas. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Soyez tous '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 4:16
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 11:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Th 1:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'mes imitateurs, frères, et portez les regards sur ceux qui marchent '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Th 3:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 5:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'selon le modèle que vous avez en nous. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 16:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Car il en est plusieurs qui marchent en ennemis de la croix de Christ, je vous en ai souvent parlé, et j’en parle maintenant encore en pleurant. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Leur fin sera la perdition; ils ont pour dieu leur ventre, ils mettent leur gloire dans ce qui fait leur honte, ils ne pensent qu’aux choses de la terre. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 56:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Prenez garde aux chiens, prenez garde aux mauvais ouvriers, prenez garde aux faux circoncis. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 13:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Mais notre cité à nous est dans les cieux, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 1:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Th 1:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Tit 2:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'd’où nous attendons aussi comme Sauveur le Seigneur Jésus-Christ, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 15:51
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 3:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Jn 3:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: qui transformera le corps de notre humiliation, en le rendant semblable au corps de sa gloire, par le pouvoir qu’il a de s’assujettir toutes choses.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 10:16
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 30:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 4:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 2:29
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 2:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Car les circoncis, c’est nous, qui rendons à '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 4:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Dieu notre culte par l’Esprit de Dieu, qui nous glorifions en Jésus-Christ, et qui ne mettons point notre confiance en la chair. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moi aussi, cependant, j’aurais sujet de mettre ma confiance en la chair. Si quelque autre croit pouvoir se confier en la chair, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 11:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'je le puis bien davantage, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'moi, circoncis le huitième jour, de la race '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 11:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'd’Israël, de la tribu de '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 49:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Benjamin, Hébreu né d’Hébreux; quant à la loi, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 23:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'pharisien; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'quant au zèle, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 8:3
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 22:3
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '4'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 1:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ti 1:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'persécuteur de l’Église; irréprochable, à l’égard de la justice de la loi. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 13:44
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Mais ces choses qui étaient pour moi des gains, je les ai regardées comme une perte, à cause de Christ. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et même je regarde toutes choses comme une perte, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 53:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 9:23
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 17:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 2:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'à cause de l’excellence de la connaissance de Jésus-Christ mon Seigneur, pour lequel j’ai renoncé à tout, et je les regarde comme de la boue, afin de gagner Christ, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et d’être trouvé en lui, non avec ma justice, celle qui vient de la loi, mais avec celle qui s’obtient par la foi en Christ, la justice '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 1:17
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'qui vient de Dieu par la foi, '
