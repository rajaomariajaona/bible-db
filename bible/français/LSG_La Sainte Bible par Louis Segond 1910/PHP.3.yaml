        usfm: 1PE.4.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: réjouissez-vous dans le Seigneur.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Se tenir en garde contre les faux docteurs, et tendre à la perfection en s’attachant à Jésus-Christ. Suivre l’exemple de Paul
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-14: cf. Ga 5:1-6. (Ga 1:13-16; 2:15, 16, 20; 6:12-14. Mt 13:44-46.) Ro 6:3-13. (1 Co 9:24-27. 2 Pi 1:5-11.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Je ne me lasse point de vous écrire les mêmes choses, et pour vous cela est salutaire. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 56:10
      metadata:
        usfm: ISA.56.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Prenez garde aux chiens, prenez garde aux mauvais ouvriers, prenez garde aux faux circoncis. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
