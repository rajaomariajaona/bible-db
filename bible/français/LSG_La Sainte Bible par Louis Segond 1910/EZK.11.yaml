document_id: EZK.11,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jugement des chefs du peuple
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-12: cf. Éz 24:1-14.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’esprit m’enleva, et me transporta à la porte orientale de la maison de l’Éternel, à celle qui regarde l’orient. Et voici, à l’entrée de la porte, il y avait vingt-cinq hommes; et je vis au milieu d’eux Jaazania, fils d’Azzur, et Pelathia, fils de Benaja, chefs du peuple. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous tomberez par l’épée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je vous jugerai sur la frontière d’Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et vous saurez que je suis l’Éternel.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La ville ne sera pas pour vous une chaudière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et vous ne serez pas la viande au milieu d’elle:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est sur la frontière d’Israël que je vous jugerai.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et vous saurez que je suis l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dont vous n’avez pas suivi les ordonnances
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et pratiqué les lois;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais vous avez agi selon les lois des nations qui vous entourent.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Promesses faites aux déportés
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 13-21: cf. Jé 24. (Éz 36:24, etc. Jé 32:36, etc.)'
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Comme je prophétisais, Pelathia, fils de Benaja, mourut. Je tombai sur ma face, et je m’écriai à haute voix: Ah! Seigneur Éternel, anéantiras-tu ce qui reste d’Israël? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et la parole de l’Éternel me fut adressée, en ces mots:'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fils de l’homme, ce sont tes frères, tes frères,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux de ta parenté, et la maison d’Israël tout entière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A qui les habitants de Jérusalem disent:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Restez loin de l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le pays nous a été donné en propriété.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'C’est pourquoi tu diras: Ainsi parle le Seigneur, l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si je les tiens éloignés parmi les nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si je les ai dispersés en divers pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je serai pour eux quelque temps un asile
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans les pays où ils sont venus.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'C’est pourquoi tu diras: Ainsi parle le Seigneur, l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je vous rassemblerai du milieu des peuples,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je vous recueillerai des pays où vous êtes dispersés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je vous donnerai la terre d’Israël.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est là qu’ils iront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils en ôteront toutes les idoles et toutes les abominations.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je leur donnerai '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 32:39
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 36:26
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: un même cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je mettrai en vous un esprit nouveau;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ôterai de leur corps le cœur de pierre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je leur donnerai un cœur de chair,
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et l’Éternel me dit: Fils de l’homme, ce sont les hommes qui méditent l’iniquité, et qui donnent de mauvais conseils dans cette ville. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afin qu’ils suivent mes ordonnances,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qu’ils observent et pratiquent mes lois;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et ils seront '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 24:7
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 30:22
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 31:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 32:38
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: mon peuple, et je serai leur Dieu.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais pour ceux dont le cœur se plaît à leurs idoles et à leurs abominations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je ferai retomber leurs œuvres sur leur '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 9:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: tête,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit le Seigneur, l’Éternel.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fin de la vision
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 22-25: cf. Éz 43:1-7.'
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les chérubins déployèrent leurs ailes, accompagnés des roues; et la gloire du Dieu d’Israël était sur eux, en haut. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La gloire de l’Éternel s’éleva du milieu de la ville, et elle se plaça sur la montagne qui est à l’orient de la ville. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’esprit m’enleva, et me transporta en Chaldée auprès des captifs, en vision par l’esprit de Dieu; et la vision que j’avais eue disparut au-dessus de moi. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je dis aux captifs toutes les paroles de l’Éternel, qu’il m’avait révélées.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils disent: Ce n’est pas le moment! Bâtissons des maisons! La ville est la chaudière, et nous sommes la viande. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est pourquoi prophétise contre eux, prophétise, fils de l’homme! '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors l’esprit de l’Éternel tomba sur moi. Et il me dit:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dis: Ainsi parle l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous parlez de la sorte, maison d’Israël!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ce qui vous monte à la pensée, je le sais.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous avez multiplié les meurtres dans cette ville,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous avez rempli les rues de cadavres.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'C’est pourquoi ainsi parle le Seigneur, l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vos morts que vous avez étendus au milieu d’elle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est la viande, et elle, c’est la chaudière;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais vous, on vous en fera sortir.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous avez peur de l’épée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je ferai venir sur vous l’épée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit le Seigneur, l’Éternel.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je vous ferai sortir du milieu d’elle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je vous livrerai entre les mains des étrangers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et j’exercerai contre vous mes jugements.
