document_id: EZK.11,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Jugement des chefs du peuple
  - type: heading
    content: 'V. 1-12: cf. Éz 24:1-14.'
  - type: text
    content: 'L’esprit m’enleva, et me transporta à la porte orientale de la maison de l’Éternel, à celle qui regarde l’orient. Et voici, à l’entrée de la porte, il y avait vingt-cinq hommes; et je vis au milieu d’eux Jaazania, fils d’Azzur, et Pelathia, fils de Benaja, chefs du peuple. '
  '10':
  - type: text
    content: Vous tomberez par l’épée,
  - type: text
    content: Je vous jugerai sur la frontière d’Israël,
  - type: text
    content: Et vous saurez que je suis l’Éternel.
  '11':
  - type: text
    content: La ville ne sera pas pour vous une chaudière,
  - type: text
    content: 'Et vous ne serez pas la viande au milieu d’elle:'
  - type: text
    content: C’est sur la frontière d’Israël que je vous jugerai.
  '12':
  - type: text
    content: Et vous saurez que je suis l’Éternel,
  - type: text
    content: Dont vous n’avez pas suivi les ordonnances
  - type: text
    content: Et pratiqué les lois;
  - type: text
    content: Mais vous avez agi selon les lois des nations qui vous entourent.
  - type: heading
    content: Promesses faites aux déportés
  - type: heading
    content: 'V. 13-21: cf. Jé 24. (Éz 36:24, etc. Jé 32:36, etc.)'
  '13':
  - type: text
    content: 'Comme je prophétisais, Pelathia, fils de Benaja, mourut. Je tombai sur ma face, et je m’écriai à haute voix: Ah! Seigneur Éternel, anéantiras-tu ce qui reste d’Israël? '
  '14':
  - type: text
    content: 'Et la parole de l’Éternel me fut adressée, en ces mots:'
  '15':
  - type: text
    content: Fils de l’homme, ce sont tes frères, tes frères,
  - type: text
    content: Ceux de ta parenté, et la maison d’Israël tout entière,
  - type: text
    content: 'A qui les habitants de Jérusalem disent:'
  - type: text
    content: Restez loin de l’Éternel,
  - type: text
    content: Le pays nous a été donné en propriété.
  '16':
  - type: text
    content: 'C’est pourquoi tu diras: Ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: Si je les tiens éloignés parmi les nations,
  - type: text
    content: Si je les ai dispersés en divers pays,
  - type: text
    content: Je serai pour eux quelque temps un asile
  - type: text
    content: Dans les pays où ils sont venus.
  '17':
  - type: text
    content: 'C’est pourquoi tu diras: Ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: Je vous rassemblerai du milieu des peuples,
  - type: text
    content: Je vous recueillerai des pays où vous êtes dispersés,
  - type: text
    content: Et je vous donnerai la terre d’Israël.
  '18':
  - type: text
    content: C’est là qu’ils iront,
  - type: text
    content: Et ils en ôteront toutes les idoles et toutes les abominations.
  '19':
  - type: text
    content: 'Je leur donnerai '
  - type: note
    content: Jé 32:39. Éz 36:26.
  - type: text
    content: un même cœur,
  - type: text
    content: Et je mettrai en vous un esprit nouveau;
  - type: text
    content: J’ôterai de leur corps le cœur de pierre,
  - type: text
    content: Et je leur donnerai un cœur de chair,
  '2':
  - type: text
    content: 'Et l’Éternel me dit: Fils de l’homme, ce sont les hommes qui méditent l’iniquité, et qui donnent de mauvais conseils dans cette ville. '
  '20':
  - type: text
    content: Afin qu’ils suivent mes ordonnances,
  - type: text
    content: Et qu’ils observent et pratiquent mes lois;
  - type: text
    content: 'Et ils seront '
  - type: note
    content: Jé 24:7; 30:22; 31:1; 32:38.
  - type: text
    content: mon peuple, et je serai leur Dieu.
  '21':
  - type: text
    content: Mais pour ceux dont le cœur se plaît à leurs idoles et à leurs abominations,
  - type: text
    content: 'Je ferai retomber leurs œuvres sur leur '
  - type: note
    content: Éz 9:10.
  - type: text
    content: tête,
  - type: text
    content: Dit le Seigneur, l’Éternel.
  - type: heading
    content: Fin de la vision
  - type: heading
    content: 'V. 22-25: cf. Éz 43:1-7.'
  '22':
  - type: text
    content: 'Les chérubins déployèrent leurs ailes, accompagnés des roues; et la gloire du Dieu d’Israël était sur eux, en haut. '
  '23':
  - type: text
    content: 'La gloire de l’Éternel s’éleva du milieu de la ville, et elle se plaça sur la montagne qui est à l’orient de la ville. '
  '24':
  - type: text
    content: 'L’esprit m’enleva, et me transporta en Chaldée auprès des captifs, en vision par l’esprit de Dieu; et la vision que j’avais eue disparut au-dessus de moi. '
  '25':
  - type: text
    content: Je dis aux captifs toutes les paroles de l’Éternel, qu’il m’avait révélées.
  '3':
  - type: text
    content: 'Ils disent: Ce n’est pas le moment! Bâtissons des maisons! La ville est la chaudière, et nous sommes la viande. '
  '4':
  - type: text
    content: 'C’est pourquoi prophétise contre eux, prophétise, fils de l’homme! '
  '5':
  - type: text
    content: 'Alors l’esprit de l’Éternel tomba sur moi. Et il me dit:'
  - type: text
    content: 'Dis: Ainsi parle l’Éternel:'
  - type: text
    content: Vous parlez de la sorte, maison d’Israël!
  - type: text
    content: Et ce qui vous monte à la pensée, je le sais.
  '6':
  - type: text
    content: Vous avez multiplié les meurtres dans cette ville,
  - type: text
    content: Vous avez rempli les rues de cadavres.
  '7':
  - type: text
    content: 'C’est pourquoi ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: Vos morts que vous avez étendus au milieu d’elle,
  - type: text
    content: C’est la viande, et elle, c’est la chaudière;
  - type: text
    content: Mais vous, on vous en fera sortir.
  '8':
  - type: text
    content: Vous avez peur de l’épée,
  - type: text
    content: Et je ferai venir sur vous l’épée,
  - type: text
    content: Dit le Seigneur, l’Éternel.
  '9':
  - type: text
    content: Je vous ferai sortir du milieu d’elle,
  - type: text
    content: Je vous livrerai entre les mains des étrangers,
  - type: text
    content: Et j’exercerai contre vous mes jugements.
