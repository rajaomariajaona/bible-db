document_id: 1TH.1,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Adresse et salutation
  - type: heading
    content: 'V. 1: cf. 2 Th 1:1, 2.'
  - type: text
    content: 'Paul, et Silvain, et Timothée, à l’Église des Thessaloniciens, qui est en Dieu le Père et en Jésus-Christ le Seigneur: '
  - type: note
    content: Ro 1:7. Ép 1:2. 1 Pi 1:2.
  - type: text
    content: que la grâce et la paix vous soient données!
  - type: heading
    content: Succès de l’Évangile à Thessalonique, et fidélité de son Église
  - type: heading
    content: 'V. 2-10: cf. Ph 1:3-6. Col 1:3-8. 1 Th 2:13, 14.'
  '10':
  - type: note
    content: Ac 1:11. Ph 3:20. 2 Th 1:10. Ap 1:7.
  - type: text
    content: et pour attendre des cieux son Fils, qu’il a ressuscité des morts, Jésus, qui nous délivre de la colère à venir.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Ép 1:16. Ph 1:3. Col 1:3. 2 Th 1:3.
  - type: text
    content: 'Nous rendons continuellement grâces à Dieu pour vous tous, faisant mention de vous dans nos prières, '
  '3':
  - type: text
    content: 'nous rappelant sans cesse '
  - type: note
    content: Jn 6:29.
  - type: text
    content: 'l’œuvre de votre foi, le travail de votre charité, et la fermeté de votre espérance en notre Seigneur Jésus-Christ, devant Dieu notre Père. '
  '4':
  - type: text
    content: 'Nous savons, frères bien-aimés de Dieu, que vous avez été élus, '
  '5':
  - type: note
    content: 1 Co 2:4; 4:20.
  - type: text
    content: 'notre Évangile ne vous ayant pas été prêché en paroles seulement, mais avec puissance, avec l’Esprit Saint, et avec une pleine persuasion; '
  - type: note
    content: 1 Th 2:1.
  - type: text
    content: 'car vous n’ignorez pas que nous nous sommes montrés ainsi parmi vous, à cause de vous. '
  '6':
  - type: note
    content: 1 Co 4:16; 11:1. Ph 3:17. 2 Th 3:9.
  - type: text
    content: 'Et vous-mêmes, vous avez été mes imitateurs et ceux du Seigneur, en recevant la parole au milieu de beaucoup de tribulations, avec la joie du Saint-Esprit, '
  '7':
  - type: text
    content: 'en sorte que vous êtes devenus un modèle pour tous les croyants de la Macédoine et de l’Achaïe. '
  '8':
  - type: text
    content: 'Non seulement, en effet, la parole du Seigneur a retenti de chez vous dans la Macédoine et dans l’Achaïe, mais votre foi en Dieu s’est fait connaître en tout lieu, de telle manière que nous n’avons pas besoin d’en parler. '
  '9':
  - type: text
    content: 'Car on raconte, à notre sujet, quel accès nous avons eu auprès de vous, et comment vous vous êtes convertis à Dieu, en abandonnant les idoles pour servir le Dieu vivant et vrai, '
