document_id: 1TH.1
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Adresse et salutation
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1: cf. 2 Th 1:1, 2.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Paul, et Silvain, et Timothée, à l’Église des Thessaloniciens, qui est en Dieu le Père et en Jésus-Christ le Seigneur: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 1:7
      metadata:
        usfm: ROM.1.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 1:2
      metadata:
        usfm: EPH.1.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 1:2
      metadata:
        usfm: 1PE.1.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: que la grâce et la paix vous soient données!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Succès de l’Évangile à Thessalonique, et fidélité de son Église
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 2-10: cf. Ph 1:3-6. Col 1:3-8. 1 Th 2:13, 14.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 1:16
      metadata:
        usfm: EPH.1.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 1:3
      metadata:
        usfm: PHP.1.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 1:3
      metadata:
        usfm: COL.1.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Th 1:3
      metadata:
        usfm: 2TH.1.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Nous rendons continuellement grâces à Dieu pour vous tous, faisant mention de vous dans nos prières, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'nous rappelant sans cesse '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 6:29
      metadata:
        usfm: JHN.6.29
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'l’œuvre de votre foi, le travail de votre charité, et la fermeté de votre espérance en notre Seigneur Jésus-Christ, devant Dieu notre Père. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nous savons, frères bien-aimés de Dieu, que vous avez été élus, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 2:4
      metadata:
        usfm: 1CO.2.4
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 4:20
      metadata:
        usfm: 1CO.4.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'notre Évangile ne vous ayant pas été prêché en paroles seulement, mais avec puissance, avec l’Esprit Saint, et avec une pleine persuasion; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 2:1
      metadata:
        usfm: 1TH.2.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'car vous n’ignorez pas que nous nous sommes montrés ainsi parmi vous, à cause de vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 4:16
      metadata:
        usfm: 1CO.4.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 11:1
      metadata:
        usfm: 1CO.11.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 3:17
      metadata:
        usfm: PHP.3.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Th 3:9
      metadata:
        usfm: 2TH.3.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Et vous-mêmes, vous avez été mes imitateurs et ceux du Seigneur, en recevant la parole au milieu de beaucoup de tribulations, avec la joie du Saint-Esprit, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'en sorte que vous êtes devenus un modèle pour tous les croyants de la Macédoine et de l’Achaïe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Non seulement, en effet, la parole du Seigneur a retenti de chez vous dans la Macédoine et dans l’Achaïe, mais votre foi en Dieu s’est fait connaître en tout lieu, de telle manière que nous n’avons pas besoin d’en parler. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Car on raconte, à notre sujet, quel accès nous avons eu auprès de vous, et comment vous vous êtes convertis à Dieu, en abandonnant les idoles pour servir le Dieu vivant et vrai, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 1:11
      metadata:
        usfm: ACT.1.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 3:20
      metadata:
        usfm: PHP.3.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Th 1:10
      metadata:
        usfm: 2TH.1.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 1:7
      metadata:
        usfm: REV.1.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: et pour attendre des cieux son Fils, qu’il a ressuscité des morts, Jésus, qui nous délivre de la colère à venir.
