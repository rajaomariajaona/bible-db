document_id: EXO.23,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Lois morales et cérémonielles
  - type: heading
    content: 'V. 1-9: cf. (Ex 20:16. Pr 19:5, 9. De 19:16-20.) (Lé 19:15-18. De 16:18-20.)'
  - type: text
    content: 'Tu ne répandras point de faux bruit. Tu ne te joindras point au méchant pour faire un faux témoignage. '
  '10':
  - type: text
    content: 'Pendant six années, tu ensemenceras la terre, et tu en recueilleras le produit. '
  '11':
  - type: note
    content: Lé 25:4, 5.
  - type: text
    content: 'Mais la septième, tu lui donneras du relâche et tu la laisseras en repos; les pauvres de ton peuple en jouiront, et les bêtes des champs mangeront ce qui restera. Tu feras de même pour ta vigne et pour tes oliviers. '
  '12':
  - type: note
    content: Ex 20:8; 31:13, 14, etc.
  - type: text
    content: 'Pendant six jours, tu feras ton ouvrage. Mais le septième jour, tu te reposeras, afin que ton bœuf et ton âne aient du repos, afin que le fils de ton esclave et l’étranger aient du relâche. '
  '13':
  - type: text
    content: 'Vous observerez tout ce que je vous ai dit, et '
  - type: note
    content: No 32:38. Jos 23:7. Ps 16:4. Os 2:16. Za 13:2.
  - type: text
    content: 'vous ne prononcerez point le nom d’autres dieux: qu’on ne l’entende point sortir de votre bouche.'
  - type: heading
    content: 'V. 14-19: cf. (Ex 34:18-26. Lé 23:4-44. De 16:1-17.)'
  '14':
  - type: text
    content: 'Trois fois par année, tu célébreras des fêtes en mon honneur. '
  '15':
  - type: note
    content: Ex 12:14, 15; 13:3.
  - type: text
    content: 'Tu observeras la fête des pains sans levain; pendant sept jours, au temps fixé dans le mois des épis, tu mangeras des pains sans levain, comme je t’en ai donné l’ordre, car c’est dans ce mois que tu es sorti d’Égypte; '
  - type: note
    content: Ex 34:20. De 16:16.
  - type: text
    content: 'et l’on ne se présentera point à vide devant ma face. '
  '16':
  - type: text
    content: 'Tu observeras la fête de la moisson, des prémices de ton travail, de ce que tu auras semé dans les champs; et la fête de la récolte, à la fin de l’année, quand tu recueilleras des champs le fruit de ton travail. '
  '17':
  - type: text
    content: 'Trois fois par année, tous les mâles se présenteront devant le Seigneur, l’Éternel. '
  '18':
  - type: text
    content: 'Tu n’offriras point avec du pain levé le sang de la victime sacrifiée en mon honneur; et sa graisse ne sera point gardée pendant la nuit jusqu’au matin. '
  '19':
  - type: note
    content: Ex 34:26.
  - type: text
    content: 'Tu apporteras à la maison de l’Éternel, ton Dieu, les prémices des premiers fruits de la terre. Tu '
  - type: note
    content: Ex 34:26.
  - type: text
    content: ne feras point cuire un chevreau dans le lait de sa mère.
  - type: heading
    content: 'V. 20-33: cf. És 63:9, 10. (Ex 34:11-16. De 7.)'
  '2':
  - type: text
    content: 'Tu ne suivras point la multitude pour faire le mal; et tu ne déposeras point dans un procès en te mettant du côté du grand nombre, pour violer la justice. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: Ex 33:2.
  - type: text
    content: 'Voici, j’envoie un ange devant toi, pour te protéger en chemin, et pour te faire arriver au lieu que j’ai préparé. '
  '21':
  - type: text
    content: 'Tiens-toi sur tes gardes en sa présence, et écoute sa voix; ne lui résiste point, parce qu’il ne pardonnera pas vos péchés, car mon nom est en lui. '
  '22':
  - type: text
    content: 'Mais si tu écoutes sa voix, et si tu fais tout ce que '
  - type: note
    content: Ge 12:3.
  - type: text
    content: 'je te dirai, je serai l’ennemi de tes ennemis et l’adversaire de tes adversaires. '
  '23':
  - type: text
    content: 'Mon ange marchera devant toi, et te conduira chez les Amoréens, les Héthiens, les Phéréziens, les Cananéens, les Héviens et les Jébusiens, et je les exterminerai. '
  '24':
  - type: text
    content: 'Tu ne te prosterneras point devant leurs dieux, et tu ne les serviras point; '
  - type: note
    content: Lé 18:3.
  - type: text
    content: 'tu n’imiteras point ces peuples dans leur conduite, mais tu les détruiras, et tu briseras leurs statues. '
  '25':
  - type: text
    content: 'Vous servirez l’Éternel, votre Dieu, '
  - type: note
    content: Ex 15:26. De 7:15.
  - type: text
    content: 'et il bénira votre pain et vos eaux, et j’éloignerai la maladie du milieu de toi. '
  '26':
  - type: note
    content: De 7:14.
  - type: text
    content: 'Il n’y aura dans ton pays ni femme qui avorte, ni femme stérile. Je remplirai le nombre de tes jours. '
  '27':
  - type: note
    content: Ex 14:24. Jos 10:10.
  - type: text
    content: 'J’enverrai ma terreur devant toi, je mettrai en déroute tous les peuples chez lesquels tu arriveras, et je ferai tourner le dos devant toi à tous tes ennemis. '
  '28':
  - type: note
    content: De 7:20. Jos 24:12.
  - type: text
    content: 'J’enverrai les frelons devant toi, et ils chasseront loin de ta face les Héviens, les Cananéens et les Héthiens. '
  '29':
  - type: text
    content: 'Je ne les chasserai pas en une seule année loin de ta face, de peur que le pays ne devienne un désert et que les bêtes des champs ne se multiplient contre toi. '
  '3':
  - type: note
    content: Lé 19:15.
  - type: text
    content: 'Tu ne favoriseras point le pauvre dans son procès. '
  '30':
  - type: text
    content: 'Je les chasserai peu à peu loin de ta face, jusqu’à ce que tu augmentes en nombre et que tu puisses prendre possession du pays. '
  '31':
  - type: note
    content: No 34:3, 4.
  - type: text
    content: 'J’établirai tes limites depuis la mer Rouge jusqu’à la mer des Philistins, et depuis le désert jusqu’au fleuve; car je livrerai entre vos mains les habitants du pays, et tu les chasseras devant toi. '
  '32':
  - type: note
    content: Ex 34:12, 15. De 7:2.
  - type: text
    content: 'Tu ne feras point d’alliance avec eux, ni avec leurs dieux. '
  '33':
  - type: note
    content: Jos 23:12. Jg 2:3.
  - type: text
    content: Ils n’habiteront point dans ton pays, de peur qu’ils ne te fassent pécher contre moi; car tu servirais leurs dieux, et ce serait un piège pour toi.
  '4':
  - type: note
    content: De 22:1, 2. Lu 6:27. Ph 2:4.
  - type: text
    content: 'Si tu rencontres le bœuf de ton ennemi ou son âne égaré, tu le lui ramèneras. '
  '5':
  - type: note
    content: De 22:4.
  - type: text
    content: 'Si tu vois l’âne de ton ennemi succombant sous sa charge, et que tu hésites à le décharger, tu l’aideras à le décharger. '
  '6':
  - type: note
    content: De 27:19.
  - type: text
    content: 'Tu ne porteras point atteinte au droit du pauvre dans son procès. '
  '7':
  - type: text
    content: 'Tu ne prononceras point de sentence inique, et tu ne feras point mourir l’innocent et le juste; car je n’absoudrai point le coupable. '
  '8':
  - type: note
    content: De 16:19. 1 S 8:3. Pr 19:6. Ec 7:7.
  - type: text
    content: 'Tu ne recevras point de présent; car les présents aveuglent ceux qui ont les yeux ouverts et corrompent les paroles des justes. '
  '9':
  - type: note
    content: Ex 22:21. Lé 19:33. De 24:17.
  - type: text
    content: Tu n’opprimeras point l’étranger; vous savez ce qu’éprouve l’étranger, car vous avez été étrangers dans le pays d’Égypte.
  - type: heading
    content: 'V. 10-13: cf. Lé 25:1-7, 18-22. De 5:13-15.'
