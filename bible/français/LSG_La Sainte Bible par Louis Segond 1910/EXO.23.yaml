document_id: EXO.23
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Lois morales et cérémonielles
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-9: cf. (Ex 20:16. Pr 19:5, 9. De 19:16-20.) (Lé 19:15-18. De 16:18-20.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tu ne répandras point de faux bruit. Tu ne te joindras point au méchant pour faire un faux témoignage. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Tu ne suivras point la multitude pour faire le mal; et tu ne déposeras point dans un procès en te mettant du côté du grand nombre, pour violer la justice. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 19:15
      metadata:
        usfm: LEV.19.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu ne favoriseras point le pauvre dans son procès. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 22:1
      metadata:
        usfm: DEU.22.1
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '2'
      metadata:
        usfm: DEU.22.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 6:27
      metadata:
        usfm: LUK.6.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 2:4
      metadata:
        usfm: PHP.2.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Si tu rencontres le bœuf de ton ennemi ou son âne égaré, tu le lui ramèneras. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 22:4
      metadata:
        usfm: DEU.22.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Si tu vois l’âne de ton ennemi succombant sous sa charge, et que tu hésites à le décharger, tu l’aideras à le décharger. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 27:19
      metadata:
        usfm: DEU.27.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu ne porteras point atteinte au droit du pauvre dans son procès. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tu ne prononceras point de sentence inique, et tu ne feras point mourir l’innocent et le juste; car je n’absoudrai point le coupable. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 16:19
      metadata:
        usfm: DEU.16.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 8:3
      metadata:
        usfm: 1SA.8.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 19:6
      metadata:
        usfm: PRO.19.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ec 7:7
      metadata:
        usfm: ECC.7.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu ne recevras point de présent; car les présents aveuglent ceux qui ont les yeux ouverts et corrompent les paroles des justes. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 22:21
      metadata:
        usfm: EXO.22.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 19:33
      metadata:
        usfm: LEV.19.33
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 24:17
      metadata:
        usfm: DEU.24.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Tu n’opprimeras point l’étranger; vous savez ce qu’éprouve l’étranger, car vous avez été étrangers dans le pays d’Égypte.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 10-13: cf. Lé 25:1-7, 18-22. De 5:13-15.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Pendant six années, tu ensemenceras la terre, et tu en recueilleras le produit. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 25:4
      metadata:
        usfm: LEV.25.4
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '5'
      metadata:
        usfm: LEV.25.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Mais la septième, tu lui donneras du relâche et tu la laisseras en repos; les pauvres de ton peuple en jouiront, et les bêtes des champs mangeront ce qui restera. Tu feras de même pour ta vigne et pour tes oliviers. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 20:8
      metadata:
        usfm: EXO.20.8
    - type: text
      text: ; 31:13, 14, etc.
    marker-yv: yv-n
  - type: text
    text: 'Pendant six jours, tu feras ton ouvrage. Mais le septième jour, tu te reposeras, afin que ton bœuf et ton âne aient du repos, afin que le fils de ton esclave et l’étranger aient du relâche. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Vous observerez tout ce que je vous ai dit, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 32:38
      metadata:
        usfm: NUM.32.38
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 23:7
      metadata:
        usfm: JOS.23.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 16:4
      metadata:
        usfm: PSA.16.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Os 2:16
      metadata:
        usfm: HOS.2.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Za 13:2
      metadata:
        usfm: ZEC.13.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'vous ne prononcerez point le nom d’autres dieux: qu’on ne l’entende point sortir de votre bouche.'
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 14-19: cf. (Ex 34:18-26. Lé 23:4-44. De 16:1-17.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Trois fois par année, tu célébreras des fêtes en mon honneur. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 12:14
      metadata:
        usfm: EXO.12.14
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '15'
      metadata:
        usfm: EXO.12.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 13:3
      metadata:
        usfm: EXO.13.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu observeras la fête des pains sans levain; pendant sept jours, au temps fixé dans le mois des épis, tu mangeras des pains sans levain, comme je t’en ai donné l’ordre, car c’est dans ce mois que tu es sorti d’Égypte; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 34:20
      metadata:
        usfm: EXO.34.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 16:16
      metadata:
        usfm: DEU.16.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et l’on ne se présentera point à vide devant ma face. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Tu observeras la fête de la moisson, des prémices de ton travail, de ce que tu auras semé dans les champs; et la fête de la récolte, à la fin de l’année, quand tu recueilleras des champs le fruit de ton travail. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Trois fois par année, tous les mâles se présenteront devant le Seigneur, l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tu n’offriras point avec du pain levé le sang de la victime sacrifiée en mon honneur; et sa graisse ne sera point gardée pendant la nuit jusqu’au matin. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 34:26
      metadata:
        usfm: EXO.34.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu apporteras à la maison de l’Éternel, ton Dieu, les prémices des premiers fruits de la terre. Tu '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 34:26
      metadata:
        usfm: EXO.34.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: ne feras point cuire un chevreau dans le lait de sa mère.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 20-33: cf. És 63:9, 10. (Ex 34:11-16. De 7.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 33:2
      metadata:
        usfm: EXO.33.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Voici, j’envoie un ange devant toi, pour te protéger en chemin, et pour te faire arriver au lieu que j’ai préparé. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Tiens-toi sur tes gardes en sa présence, et écoute sa voix; ne lui résiste point, parce qu’il ne pardonnera pas vos péchés, car mon nom est en lui. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Mais si tu écoutes sa voix, et si tu fais tout ce que '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 12:3
      metadata:
        usfm: GEN.12.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'je te dirai, je serai l’ennemi de tes ennemis et l’adversaire de tes adversaires. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Mon ange marchera devant toi, et te conduira chez les Amoréens, les Héthiens, les Phéréziens, les Cananéens, les Héviens et les Jébusiens, et je les exterminerai. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Tu ne te prosterneras point devant leurs dieux, et tu ne les serviras point; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 18:3
      metadata:
        usfm: LEV.18.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'tu n’imiteras point ces peuples dans leur conduite, mais tu les détruiras, et tu briseras leurs statues. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Vous servirez l’Éternel, votre Dieu, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 15:26
      metadata:
        usfm: EXO.15.26
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 7:15
      metadata:
        usfm: DEU.7.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et il bénira votre pain et vos eaux, et j’éloignerai la maladie du milieu de toi. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 7:14
      metadata:
        usfm: DEU.7.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il n’y aura dans ton pays ni femme qui avorte, ni femme stérile. Je remplirai le nombre de tes jours. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 14:24
      metadata:
        usfm: EXO.14.24
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 10:10
      metadata:
        usfm: JOS.10.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'J’enverrai ma terreur devant toi, je mettrai en déroute tous les peuples chez lesquels tu arriveras, et je ferai tourner le dos devant toi à tous tes ennemis. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 7:20
      metadata:
        usfm: DEU.7.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 24:12
      metadata:
        usfm: JOS.24.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'J’enverrai les frelons devant toi, et ils chasseront loin de ta face les Héviens, les Cananéens et les Héthiens. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Je ne les chasserai pas en une seule année loin de ta face, de peur que le pays ne devienne un désert et que les bêtes des champs ne se multiplient contre toi. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Je les chasserai peu à peu loin de ta face, jusqu’à ce que tu augmentes en nombre et que tu puisses prendre possession du pays. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 34:3
      metadata:
        usfm: NUM.34.3
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '4'
      metadata:
        usfm: NUM.34.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'J’établirai tes limites depuis la mer Rouge jusqu’à la mer des Philistins, et depuis le désert jusqu’au fleuve; car je livrerai entre vos mains les habitants du pays, et tu les chasseras devant toi. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 34:12
      metadata:
        usfm: EXO.34.12
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '15'
      metadata:
        usfm: EXO.34.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 7:2
      metadata:
        usfm: DEU.7.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu ne feras point d’alliance avec eux, ni avec leurs dieux. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 23:12
      metadata:
        usfm: JOS.23.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jg 2:3
      metadata:
