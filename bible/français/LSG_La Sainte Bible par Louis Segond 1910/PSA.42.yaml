document_id: PSA.42
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: LIVRE DEUXIÈME
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: (Ex 15:1, 21.)
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2 S 17:22-29. (Ps 43; 27; 84; 63.) La 3:24. És 8:17.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef des chantres. Cantique des fils de Koré.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Comme une biche soupire après des courants d’eau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ainsi mon âme soupire après toi, ô Dieu!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 63:2
      metadata:
        usfm: PSA.63.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Mon âme a soif de Dieu, du Dieu vivant:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand irai-je et paraîtrai-je devant la face de Dieu?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 80:6
      metadata:
        usfm: PSA.80.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Mes larmes sont ma nourriture jour et nuit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Pendant qu’on me dit sans cesse:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Où est ton Dieu?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Je me rappelle avec effusion de cœur
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand je marchais entouré de la foule,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que je m’avançais à sa tête vers la maison de Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au milieu des cris de joie et des actions de grâces
- type: usfm
  marker: q1
  children:
  - type: text
    text: D’une multitude en fête.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 43:5
      metadata:
        usfm: PSA.43.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Pourquoi t’abats-tu, mon âme, et gémis-tu au-dedans de moi?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Espère en Dieu, car je le louerai encore;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est mon salut et mon Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mon âme est abattue au-dedans de moi:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aussi c’est à toi que je pense, depuis le pays du Jourdain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Depuis l’Hermon, depuis la montagne de Mitsear.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Un flot appelle un autre flot au bruit de tes ondées;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toutes tes vagues et tous tes flots passent sur moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Le jour, l’Éternel m’accordait sa grâce;
- type: usfm
  marker: q1
  children:
  - type: text
    text: La nuit, je chantais ses louanges,
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’adressais une prière au Dieu de ma vie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Je dis à Dieu, mon rocher: Pourquoi m’oublies-tu?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Pourquoi dois-je marcher '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 35:14
      metadata:
        usfm: PSA.35.14
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 38:7
      metadata:
        usfm: PSA.38.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 43:2
      metadata:
        usfm: PSA.43.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: dans la tristesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sous l’oppression de l’ennemi?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mes os se brisent quand mes persécuteurs m’outragent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'En me disant sans cesse: Où est ton Dieu?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Pourquoi t’abats-tu, mon âme, et gémis-tu au-dedans de moi?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Espère en Dieu, car je le louerai encore;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est mon salut et mon Dieu.
