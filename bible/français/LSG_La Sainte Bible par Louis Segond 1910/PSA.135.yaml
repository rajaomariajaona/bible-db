      text: Il frappa les premiers-nés de l’Égypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Depuis les hommes jusqu’aux animaux.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
