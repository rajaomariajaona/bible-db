document_id: PSA.135,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ps 136; 115.
  - type: text
    content: Louez l’Éternel!
  - type: text
    content: Louez le nom de l’Éternel,
  - type: text
    content: Louez-le, serviteurs de l’Éternel,
  '10':
  - type: text
    content: 'Il frappa des '
  - type: note
    content: Jos 12.
  - type: text
    content: nations nombreuses,
  - type: text
    content: Et tua des rois puissants,
  '11':
  - type: text
    content: Sihon, roi des Amoréens,
  - type: text
    content: Og, roi de Basan,
  - type: text
    content: Et tous les rois de Canaan;
  '12':
  - type: text
    content: ' '
  - type: note
    content: Ps 78:55.
  - type: text
    content: Et il donna leur pays en héritage,
  - type: text
    content: En héritage à Israël, son peuple.
  '13':
  - type: text
    content: Éternel! Ton nom subsiste à toujours,
  - type: text
    content: 'Éternel! '
  - type: note
    content: Ps 102:13.
  - type: text
    content: ta mémoire dure de génération en génération.
  '14':
  - type: text
    content: ' '
  - type: note
    content: De 32:36.
  - type: text
    content: Car l’Éternel jugera son peuple,
  - type: text
    content: Et il aura pitié de ses serviteurs.
  '15':
  - type: text
    content: ' '
  - type: note
    content: Ps 115:4, etc.
  - type: text
    content: Les idoles des nations sont de l’argent et de l’or,
  - type: text
    content: Elles sont l’ouvrage de la main des hommes.
  '16':
  - type: text
    content: Elles ont une bouche et ne parlent point,
  - type: text
    content: Elles ont des yeux et ne voient point,
  '17':
  - type: text
    content: Elles ont des oreilles et n’entendent point,
  - type: text
    content: Elles n’ont point de souffle dans leur bouche.
  '18':
  - type: text
    content: Ils leur ressemblent, ceux qui les fabriquent,
  - type: text
    content: Tous ceux qui se confient en elles.
  '19':
  - type: text
    content: Maison d’Israël, bénissez l’Éternel!
  - type: text
    content: Maison d’Aaron, bénissez l’Éternel!
  '2':
  - type: text
    content: Qui vous tenez dans la maison de l’Éternel,
  - type: text
    content: Dans les parvis de la maison de notre Dieu!
  '20':
  - type: text
    content: Maison de Lévi, bénissez l’Éternel!
  - type: text
    content: Vous qui craignez l’Éternel, bénissez l’Éternel!
  '21':
  - type: text
    content: Que de Sion l’on bénisse l’Éternel,
  - type: text
    content: Qui habite à Jérusalem!
  - type: text
    content: Louez l’Éternel!
  '3':
  - type: text
    content: Louez l’Éternel! Car l’Éternel est bon.
  - type: text
    content: Chantez à son nom! Car il est favorable.
  '4':
  - type: text
    content: Car l’Éternel s’est choisi Jacob,
  - type: text
    content: 'Israël, '
  - type: note
    content: Ex 19:5. De 7:6. Tit 2:14. 1 Pi 2:9.
  - type: text
    content: pour qu’il lui appartînt.
  '5':
  - type: text
    content: Je sais que l’Éternel est grand,
  - type: text
    content: Et que notre Seigneur est au-dessus de tous les dieux.
  '6':
  - type: text
    content: Tout ce que l’Éternel veut, il le fait,
  - type: text
    content: Dans les cieux et sur la terre,
  - type: text
    content: Dans les mers et dans tous les abîmes.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Jé 10:13; 51:16.
  - type: text
    content: Il fait monter les nuages des extrémités de la terre,
  - type: text
    content: Il produit les éclairs et la pluie,
  - type: text
    content: Il tire le vent de ses trésors.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Ex 12:12, 29. Ps 78:51.
  - type: text
    content: Il frappa les premiers-nés de l’Égypte,
  - type: text
    content: Depuis les hommes jusqu’aux animaux.
  '9':
  - type: text
    content: ' '
  - type: note
    content: Ex 7:8, 9, 10, 14.
  - type: text
    content: Il envoya des signes et des miracles au milieu de toi, Égypte!
  - type: text
    content: Contre Pharaon et contre tous ses serviteurs.
