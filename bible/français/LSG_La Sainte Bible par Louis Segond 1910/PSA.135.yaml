  children:
  - type: text
    text: Ps 136; 115.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Louez l’Éternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Louez le nom de l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Louez-le, serviteurs de l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Qui vous tenez dans la maison de l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans les parvis de la maison de notre Dieu!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Louez l’Éternel! Car l’Éternel est bon.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Chantez à son nom! Car il est favorable.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Car l’Éternel s’est choisi Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Israël, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 19:5
      metadata:
        usfm: EXO.19.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 7:6
      metadata:
        usfm: DEU.7.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Tit 2:14
      metadata:
        usfm: TIT.2.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 2:9
      metadata:
        usfm: 1PE.2.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: pour qu’il lui appartînt.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Je sais que l’Éternel est grand,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que notre Seigneur est au-dessus de tous les dieux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tout ce que l’Éternel veut, il le fait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans les cieux et sur la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans les mers et dans tous les abîmes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 10:13
      metadata:
        usfm: JER.10.13
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 51:16
      metadata:
        usfm: JER.51.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il fait monter les nuages des extrémités de la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il produit les éclairs et la pluie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il tire le vent de ses trésors.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 12:12
      metadata:
        usfm: EXO.12.12
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '29'
      metadata:
        usfm: EXO.12.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 78:51
      metadata:
        usfm: PSA.78.51
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il frappa les premiers-nés de l’Égypte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Depuis les hommes jusqu’aux animaux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 7:8
      metadata:
        usfm: EXO.7.8
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '9'
      metadata:
        usfm: EXO.7.9
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '10'
      metadata:
        usfm: EXO.7.10
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '14'
      metadata:
        usfm: EXO.7.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il envoya des signes et des miracles au milieu de toi, Égypte!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Contre Pharaon et contre tous ses serviteurs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il frappa des '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 12
      metadata:
        usfm: JOS.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: nations nombreuses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tua des rois puissants,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Sihon, roi des Amoréens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Og, roi de Basan,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tous les rois de Canaan;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 78:55
      metadata:
        usfm: PSA.78.55
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et il donna leur pays en héritage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: En héritage à Israël, son peuple.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Éternel! Ton nom subsiste à toujours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Éternel! '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 102:13
      metadata:
        usfm: PSA.102.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: ta mémoire dure de génération en génération.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 32:36
      metadata:
        usfm: DEU.32.36
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Car l’Éternel jugera son peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il aura pitié de ses serviteurs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps 115:4, etc.
    marker-yv: yv-n
  - type: text
    text: Les idoles des nations sont de l’argent et de l’or,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elles sont l’ouvrage de la main des hommes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Elles ont une bouche et ne parlent point,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elles ont des yeux et ne voient point,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Elles ont des oreilles et n’entendent point,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elles n’ont point de souffle dans leur bouche.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ils leur ressemblent, ceux qui les fabriquent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous ceux qui se confient en elles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Maison d’Israël, bénissez l’Éternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Maison d’Aaron, bénissez l’Éternel!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Maison de Lévi, bénissez l’Éternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous qui craignez l’Éternel, bénissez l’Éternel!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Que de Sion l’on bénisse l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui habite à Jérusalem!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Louez l’Éternel!
