document_id: ZEC.11,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Jugement de Dieu sur les pasteurs infidèles
  - type: heading
    content: 'V. 1-3: cf. Lu 21:20-24.'
  - type: text
    content: Liban, ouvre tes portes,
  - type: text
    content: Et que le feu dévore tes cèdres!
  '10':
  - type: text
    content: 'Je pris ma houlette Grâce, et je la brisai, pour rompre mon alliance que j’avais traitée avec tous les peuples. '
  '11':
  - type: text
    content: 'Elle fut rompue ce jour-là; et les malheureuses brebis, qui prirent garde à moi, reconnurent ainsi que c’était la parole de l’Éternel. '
  '12':
  - type: text
    content: 'Je leur dis: Si vous le trouvez bon, donnez-moi mon salaire; sinon, ne le donnez pas. Et '
  - type: note
    content: Mt 26:15; 27:9.
  - type: text
    content: 'ils pesèrent pour mon salaire trente sicles d’argent. '
  '13':
  - type: text
    content: 'L’Éternel me dit: Jette-le au potier, ce prix magnifique auquel ils m’ont estimé! Et je pris les trente sicles d’argent, et je les jetai dans la maison de l’Éternel, pour le potier. '
  '14':
  - type: text
    content: Puis je brisai ma seconde houlette Union, pour rompre la fraternité entre Juda et Israël.
  - type: heading
    content: 'V. 15-17: cf. Éz 34:1-10. Mt 23.'
  '15':
  - type: text
    content: 'L’Éternel me dit: Prends encore l’équipage d’un pasteur insensé! '
  '16':
  - type: text
    content: Car voici, je susciterai dans le pays un pasteur qui n’aura pas souci des brebis qui périssent; il n’ira pas à la recherche des plus jeunes, il ne guérira pas les blessées, il ne soignera pas les saines; mais il dévorera la chair des plus grasses, et il déchirera jusqu’aux cornes de leurs pieds.
  '17':
  - type: text
    content: ' '
  - type: note
    content: Jé 23:1. Éz 34:2. Jn 10:12.
  - type: text
    content: Malheur au pasteur de néant, qui abandonne ses brebis!
  - type: text
    content: Que l’épée fonde sur son bras et sur son œil droit!
  - type: text
    content: Que son bras se dessèche,
  - type: text
    content: Et que son œil droit s’éteigne!
  '2':
  - type: text
    content: Gémis, cyprès, car le cèdre est tombé,
  - type: text
    content: Ceux qui s’élevaient sont détruits!
  - type: text
    content: Gémissez, chênes de Basan,
  - type: text
    content: Car la forêt inaccessible est renversée!
  '3':
  - type: text
    content: Les bergers poussent des cris lamentables,
  - type: text
    content: Parce que leur magnificence est détruite;
  - type: text
    content: Les lionceaux rugissent,
  - type: text
    content: Parce que l’orgueil du Jourdain est abattu.
  - type: heading
    content: 'V. 4-14: cf. És 40:11. Mt 9:36; 23:37-39; 26:14-16; 27:1-10. Éz 37:15, etc.'
  '4':
  - type: text
    content: 'Ainsi parle l’Éternel, mon Dieu:'
  - type: text
    content: Pais les brebis destinées à la boucherie!
  '5':
  - type: text
    content: Ceux qui les achètent les égorgent impunément;
  - type: text
    content: 'Celui qui les vend dit:'
  - type: text
    content: Béni soit l’Éternel, car je m’enrichis!
  - type: text
    content: Et leurs pasteurs ne les épargnent pas.
  '6':
  - type: text
    content: Car je n’ai plus de pitié pour les habitants du pays,
  - type: text
    content: Dit l’Éternel;
  - type: text
    content: Et voici, je livre les hommes
  - type: text
    content: Aux mains les uns des autres et aux mains de leur roi;
  - type: text
    content: Ils ravageront le pays,
  - type: text
    content: Et je ne délivrerai pas de leurs mains.
  '7':
  - type: text
    content: 'Alors je me mis à paître les brebis destinées à la boucherie, assurément les plus misérables du troupeau. Je pris deux houlettes: j’appelai l’une Grâce, et j’appelai l’autre Union. Et je fis paître les brebis. '
  '8':
  - type: text
    content: 'J’exterminai les trois pasteurs en un mois; mon âme était impatiente à leur sujet, et leur âme avait aussi pour moi du dégoût. '
  '9':
  - type: text
    content: 'Et je dis: Je ne vous paîtrai plus! Que celle qui va mourir meure, que celle qui va périr périsse, et que celles qui restent se dévorent les unes les autres! '
