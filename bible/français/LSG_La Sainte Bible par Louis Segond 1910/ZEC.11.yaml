document_id: ZEC.11
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jugement de Dieu sur les pasteurs infidèles
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-3: cf. Lu 21:20-24.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Liban, ouvre tes portes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que le feu dévore tes cèdres!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Gémis, cyprès, car le cèdre est tombé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ceux qui s’élevaient sont détruits!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Gémissez, chênes de Basan,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car la forêt inaccessible est renversée!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Les bergers poussent des cris lamentables,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parce que leur magnificence est détruite;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les lionceaux rugissent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parce que l’orgueil du Jourdain est abattu.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 4-14: cf. És 40:11. Mt 9:36; 23:37-39; 26:14-16; 27:1-10. Éz 37:15, etc.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ainsi parle l’Éternel, mon Dieu:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pais les brebis destinées à la boucherie!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ceux qui les achètent les égorgent impunément;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Celui qui les vend dit:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Béni soit l’Éternel, car je m’enrichis!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et leurs pasteurs ne les épargnent pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Car je n’ai plus de pitié pour les habitants du pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit l’Éternel;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et voici, je livre les hommes
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aux mains les uns des autres et aux mains de leur roi;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ravageront le pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je ne délivrerai pas de leurs mains.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Alors je me mis à paître les brebis destinées à la boucherie, assurément les plus misérables du troupeau. Je pris deux houlettes: j’appelai l’une Grâce, et j’appelai l’autre Union. Et je fis paître les brebis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'J’exterminai les trois pasteurs en un mois; mon âme était impatiente à leur sujet, et leur âme avait aussi pour moi du dégoût. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Et je dis: Je ne vous paîtrai plus! Que celle qui va mourir meure, que celle qui va périr périsse, et que celles qui restent se dévorent les unes les autres! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Je pris ma houlette Grâce, et je la brisai, pour rompre mon alliance que j’avais traitée avec tous les peuples. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Elle fut rompue ce jour-là; et les malheureuses brebis, qui prirent garde à moi, reconnurent ainsi que c’était la parole de l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Je leur dis: Si vous le trouvez bon, donnez-moi mon salaire; sinon, ne le donnez pas. Et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 26:15
      metadata:
        usfm: MAT.26.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 27:9
      metadata:
        usfm: MAT.27.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ils pesèrent pour mon salaire trente sicles d’argent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'L’Éternel me dit: Jette-le au potier, ce prix magnifique auquel ils m’ont estimé! Et je pris les trente sicles d’argent, et je les jetai dans la maison de l’Éternel, pour le potier. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Puis je brisai ma seconde houlette Union, pour rompre la fraternité entre Juda et Israël.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 15-17: cf. Éz 34:1-10. Mt 23.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'L’Éternel me dit: Prends encore l’équipage d’un pasteur insensé! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Car voici, je susciterai dans le pays un pasteur qui n’aura pas souci des brebis qui périssent; il n’ira pas à la recherche des plus jeunes, il ne guérira pas les blessées, il ne soignera pas les saines; mais il dévorera la chair des plus grasses, et il déchirera jusqu’aux cornes de leurs pieds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 23:1
      metadata:
        usfm: JER.23.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 34:2
      metadata:
        usfm: EZK.34.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 10:12
      metadata:
        usfm: JHN.10.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Malheur au pasteur de néant, qui abandonne ses brebis!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que l’épée fonde sur son bras et sur son œil droit!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que son bras se dessèche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que son œil droit s’éteigne!
