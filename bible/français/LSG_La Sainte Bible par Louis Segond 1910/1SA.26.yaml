document_id: 1SA.26
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: David dans le camp de Saül. Saül encore épargné par David
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-25: cf. (1 S 23:19-28; 24:1, etc.) Ps 17. 1 Th 5:15.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Les Ziphiens allèrent auprès de Saül à Guibea, et dirent: David n’est-il pas caché sur la colline de Hakila, en face du désert? '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Saül se leva et descendit au désert de Ziph, avec trois mille hommes de l’élite d’Israël, pour chercher David dans le désert de Ziph. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il campa sur la colline de Hakila, en face du désert, près du chemin. David était dans le désert; et s’étant aperçu que Saül marchait à sa poursuite au désert, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'il envoya des espions, et apprit avec certitude que Saül était arrivé. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Alors David se leva et vint au lieu où Saül était campé, et il vit la place où couchait Saül, avec Abner, fils de Ner, chef de son armée. Saül couchait au milieu du camp, et le peuple campait autour de lui. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'David prit la parole, et s’adressant à Achimélec, Héthien, et à Abischaï, fils de Tseruja et frère de Joab, il dit: Qui veut descendre avec moi dans le camp vers Saül? Et Abischaï répondit: Moi, je descendrai avec toi. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'David et Abischaï allèrent de nuit vers le peuple. Et voici, Saül était couché et dormait au milieu du camp, et sa lance était fixée en terre à son chevet. Abner et le peuple étaient couchés autour de lui. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Abischaï dit à David: Dieu livre aujourd’hui ton ennemi entre tes mains; laisse-moi, je te prie, le frapper de ma lance et le clouer en terre d’un seul coup, pour que je n’aie pas à y revenir. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Mais David dit à Abischaï: Ne le détruis pas! Car qui pourrait impunément porter la main sur l’oint de l’Éternel? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Et David dit: L’Éternel est vivant! C’est à l’Éternel seul à le frapper, soit que son jour vienne et qu’il meure, soit qu’il descende sur un champ de bataille et qu’il y périsse. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Loin de moi, par l’Éternel! De porter la main sur l’oint de l’Éternel! Prends seulement la lance qui est à son chevet, avec la cruche d’eau, et allons-nous-en. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'David prit donc la lance et la cruche d’eau qui étaient au chevet de Saül; et ils s’en allèrent. Personne ne les vit ni ne s’aperçut de rien, et personne ne se réveilla, car ils dormaient tous d’un profond sommeil dans lequel l’Éternel les avait plongés. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'David passa de l’autre côté, et s’arrêta au loin sur le sommet de la montagne, à une grande distance du camp. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Et il cria au peuple et à Abner, fils de Ner: Ne répondras-tu pas, Abner? Abner répondit: Qui es-tu, toi qui pousses des cris vers le roi? '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Et David dit à Abner: N’es-tu pas un homme? Et qui est ton pareil en Israël? Pourquoi donc n’as-tu pas gardé le roi, ton maître? Car quelqu’un du peuple est venu pour tuer le roi, ton maître. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ce que tu as fait là n’est pas bien. L’Éternel est vivant! Vous méritez la mort, pour n’avoir pas veillé sur votre maître, sur l’oint de l’Éternel. Regarde maintenant où sont la lance du roi et la cruche d’eau, qui étaient à son chevet! '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Saül reconnut la voix de David, et dit: Est-ce bien ta voix, mon fils David? Et David répondit: C’est ma voix, ô roi, mon seigneur! '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Et il dit: Pourquoi mon seigneur poursuit-il son serviteur? Qu’ai-je fait, et de quoi suis-je coupable? '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Que le roi, mon seigneur, daigne maintenant écouter les paroles de son serviteur: si c’est l’Éternel qui t’excite contre moi, qu’il agrée le parfum d’une offrande; mais si ce sont des hommes, qu’ils soient maudits devant l’Éternel, puisqu’ils me chassent aujourd’hui pour me détacher de l’héritage de l’Éternel, et qu’ils me disent: Va servir des dieux étrangers! '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Oh! Que mon sang ne tombe pas en terre loin de la face de l’Éternel! Car le roi d’Israël s’est mis en marche pour chercher une puce, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 24:15
      metadata:
        usfm: 1SA.24.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'comme on chasserait une perdrix dans les montagnes. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Saül dit: J’ai péché; reviens, mon fils David, car je ne te ferai plus de mal, puisqu’en ce jour ma vie a été précieuse à tes yeux. J’ai agi comme un insensé, et j’ai fait une grande faute. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'David répondit: Voici la lance du roi; que l’un de tes gens vienne la prendre. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'L’Éternel rendra à chacun selon sa justice et sa fidélité; car l’Éternel t’avait livré aujourd’hui entre mes mains, et je n’ai pas voulu porter la main sur l’oint de l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Et comme aujourd’hui ta vie a été d’un grand prix à mes yeux, ainsi ma vie sera d’un grand prix aux yeux de l’Éternel et il me délivrera de toute angoisse. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Saül dit à David: Sois béni, mon fils David! Tu réussiras dans tes entreprises. David continua son chemin, et Saül retourna chez lui.'
