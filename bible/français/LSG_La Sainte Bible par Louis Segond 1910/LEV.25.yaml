document_id: LEV.25,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les années sabbatiques et le jubilé. Rachat des propriétés et des esclaves
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-7: cf. (Ex 23:10, 11. De 15:1-15.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Éternel parla à Moïse sur la montagne de Sinaï, et dit: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et vous sanctifierez la cinquantième année, vous publierez la liberté dans le pays pour tous ses habitants: ce sera pour vous le jubilé; chacun de vous retournera dans sa propriété, et chacun de vous retournera dans sa famille. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La cinquantième année sera pour vous le jubilé: vous ne sèmerez point, vous ne moissonnerez point ce que les champs produiront d’eux-mêmes, et vous ne vendangerez point la vigne non taillée. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car c’est le jubilé: vous le regarderez comme une chose sainte. Vous mangerez le produit de vos champs. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dans cette année de jubilé, chacun de vous retournera dans sa propriété. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si vous vendez à votre prochain, ou si vous achetez de votre prochain, qu’aucun de vous ne trompe son frère. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu achèteras de ton prochain, en comptant les années depuis le jubilé; et il te vendra, en comptant les années de rapport. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Plus il y aura d’années, plus tu élèveras le prix; et moins il y aura d’années, plus tu le réduiras; car c’est le nombre des récoltes qu’il te vend. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aucun de vous ne trompera son prochain, et tu craindras ton Dieu; car je suis l’Éternel, votre Dieu. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mettez mes lois en pratique, observez mes ordonnances et mettez-les en pratique; et vous habiterez en sécurité dans le pays. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le pays donnera ses fruits, vous mangerez à satiété, et vous y habiterez en sécurité. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Parle aux enfants d’Israël, et tu leur diras: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 23:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Quand vous serez entrés dans le pays que je vous donne, la terre se reposera: ce sera un sabbat en l’honneur de l’Éternel. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si vous dites: Que mangerons-nous la septième année, puisque nous ne sèmerons point et ne ferons point nos récoltes? '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'je vous accorderai ma bénédiction la sixième année, et elle donnera des produits pour trois ans. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous sèmerez la huitième année, et vous mangerez de l’ancienne récolte; jusqu’à la neuvième année, jusqu’à la nouvelle récolte, vous mangerez de l’ancienne. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les terres ne se vendront point à perpétuité; car le pays est à moi, car vous êtes chez moi comme étrangers et comme habitants. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dans tout le pays dont vous aurez la possession, vous établirez le droit de rachat pour les terres. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si ton frère devient pauvre et vend une portion de sa propriété, celui qui a le droit de rachat, son plus proche parent, viendra et rachètera ce qu’a vendu son frère. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si un homme n’a personne qui ait le droit de rachat, et qu’il se procure lui-même de quoi faire son rachat, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'il comptera les années depuis la vente, restituera le surplus à l’acquéreur, et retournera dans sa propriété. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'S’il ne trouve pas de quoi lui faire cette restitution, ce qu’il a vendu restera entre les mains de l’acquéreur jusqu’à l’année du jubilé; au jubilé, il retournera dans sa propriété, et l’acquéreur en sortira. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si un homme vend une maison d’habitation dans une ville entourée de murs, il aura le droit de rachat jusqu’à l’accomplissement d’une année depuis la vente; son droit de rachat durera un an. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pendant six années tu ensemenceras ton champ, pendant six années tu tailleras ta vigne; et tu en recueilleras le produit. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais si cette maison située dans une ville entourée de murs n’est pas rachetée avant l’accomplissement d’une année entière, elle restera à perpétuité à l’acquéreur et à ses descendants; il n’en sortira point au jubilé. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les maisons des villages non entourés de murs seront considérées comme des fonds de terre; elles pourront être rachetées, et l’acquéreur en sortira au jubilé. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quant aux villes des Lévites et aux maisons qu’ils y posséderont, les Lévites auront droit perpétuel de rachat. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Celui qui achètera des Lévites une maison, sortira au jubilé de la maison vendue et de la ville où il la possédait; car les maisons des villes des Lévites sont leur propriété au milieu des enfants d’Israël. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les champs situés autour des villes des Lévites ne pourront point se vendre; car ils en ont à perpétuité la possession. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si ton frère devient pauvre, et que sa main fléchisse près de toi, tu le soutiendras; tu feras de même pour celui qui est étranger et qui demeure dans le pays, afin qu’il vive avec toi. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu ne tireras de lui '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 22:25
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 23:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 28:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 18:8
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 22:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'ni intérêt ni usure, tu craindras ton Dieu, et ton frère vivra avec toi. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu ne lui prêteras point ton argent à intérêt, et tu ne lui prêteras point tes vivres à usure. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je suis l’Éternel, ton Dieu, qui vous ai fait sortir du pays d’Égypte, pour vous donner le pays de Canaan, pour être votre Dieu. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 21:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 15:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 34:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Si ton frère devient pauvre près de toi, et qu’il se vende à toi, tu ne lui imposeras point le travail d’un esclave. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais la septième année sera un sabbat, un temps de repos pour la terre, un sabbat en l’honneur de l’Éternel: tu n’ensemenceras point ton champ, et tu ne tailleras point ta vigne. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il sera chez toi comme un mercenaire, comme celui qui y demeure; il sera à ton service jusqu’à l’année du jubilé. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il sortira alors de chez toi, lui et ses enfants avec lui, et il retournera dans sa famille, dans la propriété de ses pères. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car ce sont mes serviteurs, que j’ai fait sortir du pays d’Égypte; ils ne seront point vendus comme on vend des esclaves. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 6:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 4:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Tu ne domineras point sur lui avec dureté, et tu craindras ton Dieu. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est des nations qui vous entourent que tu prendras ton esclave et ta servante qui t’appartiendront, c’est d’elles que vous achèterez l’esclave et la servante. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous pourrez aussi en acheter des enfants des étrangers qui demeureront chez toi, et de leurs familles qu’ils engendreront dans votre pays; et ils seront votre propriété. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous les laisserez en héritage à vos enfants après vous, comme une propriété; vous les garderez comme esclaves à perpétuité. Mais à l’égard de vos frères, les enfants d’Israël, aucun de vous ne dominera avec dureté sur son frère. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si un étranger, si celui qui demeure chez toi devient riche, et que ton frère devienne pauvre près de lui et se vende à l’étranger qui demeure chez toi ou à quelqu’un de la famille de l’étranger, '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'il y aura pour lui le droit de rachat, après qu’il se sera vendu: un de ses frères pourra le racheter. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Son oncle, ou le fils de son oncle, ou l’un de ses proches parents, pourra le racheter; ou bien, s’il en a les ressources, il se rachètera lui-même. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu ne moissonneras point ce qui proviendra des grains tombés de ta moisson, et tu ne vendangeras point les raisins de ta vigne non taillée: ce sera une année de repos pour la terre. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il comptera avec celui qui l’a acheté depuis l’année où il s’est vendu jusqu’à l’année du jubilé; et le prix à payer dépendra du nombre d’années, lesquelles seront évaluées comme celles d’un mercenaire. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'S’il y a encore beaucoup d’années, il paiera son rachat à raison du prix de ces années et pour lequel il a été acheté; '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 's’il reste peu d’années jusqu’à celle du jubilé, il en fera le compte, et il paiera son rachat à raison de ces années. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il sera comme un mercenaire à l’année, et celui chez qui il sera ne le traitera point avec dureté sous tes yeux. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'S’il n’est racheté d’aucune de ces manières, il sortira l’année du jubilé, lui et ses enfants avec lui. '
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Car c’est de moi que les enfants d’Israël sont esclaves; ce sont mes esclaves, que j’ai fait sortir du pays d’Égypte. Je suis l’Éternel, votre Dieu.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce que produira la terre pendant son sabbat vous servira de nourriture, à toi, à ton serviteur et à ta servante, à ton mercenaire et à l’étranger qui demeurent avec toi, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: à ton bétail et aux animaux qui sont dans ton pays; tout son produit servira de nourriture.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 8-55: cf. (És 61:1-3. Lu 4:16-21.) Lé 27:17-24.'
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu compteras sept sabbats d’années, sept fois sept années, et les jours de ces sept sabbats d’années feront quarante-neuf ans. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le dixième jour du septième mois, tu feras retentir les sons éclatants de la trompette; le jour des expiations, vous sonnerez de la trompette dans tout votre pays. '
