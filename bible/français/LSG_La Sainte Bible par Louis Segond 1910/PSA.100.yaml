document_id: PSA.100,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ps 95:1-7; 117.
  - type: text
    content: Psaume de louange.
  - type: text
    content: Poussez vers l’Éternel des cris de joie,
  - type: text
    content: Vous tous, habitants de la terre!
  '2':
  - type: text
    content: Servez l’Éternel, avec joie,
  - type: text
    content: Venez avec allégresse en sa présence!
  '3':
  - type: text
    content: Sachez que l’Éternel est Dieu!
  - type: text
    content: C’est lui qui nous a faits, et nous lui appartenons;
  - type: text
    content: 'Nous sommes son peuple, et '
  - type: note
    content: Ps 95:7. Éz 34:30, 31.
  - type: text
    content: le troupeau de son pâturage.
  '4':
  - type: text
    content: Entrez dans ses portes avec des louanges,
  - type: text
    content: Dans ses parvis avec des cantiques!
  - type: text
    content: Célébrez-le, bénissez son nom!
  '5':
  - type: text
    content: Car l’Éternel est bon; sa bonté dure toujours,
  - type: text
    content: Et sa fidélité de génération en génération.
