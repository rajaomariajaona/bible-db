document_id: GEN.5,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Postérité d’Adam par Seth jusqu’à Noé
  - type: heading
    content: 'V. 1-32: cf. (Ge 4:25, 26. 1 Ch 1:1-4.) (Hé 11:5, 6. Jud 14, 15.)'
  - type: text
    content: 'Voici le livre de la postérité d’Adam. Lorsque Dieu créa l’homme, il le fit '
  - type: note
    content: Ge 1:26; 9:6. 1 Co 11:7.
  - type: text
    content: 'à la ressemblance de Dieu. '
  '10':
  - type: text
    content: 'Énosch vécut, après la naissance de Kénan, huit cent quinze ans; et il engendra des fils et des filles. '
  '11':
  - type: text
    content: 'Tous les jours d’Énosch furent de neuf cent cinq ans; puis il mourut. '
  '12':
  - type: text
    content: 'Kénan, âgé de soixante-dix ans, engendra Mahalaleel. '
  '13':
  - type: text
    content: 'Kénan vécut, après la naissance de Mahalaleel, huit cent quarante ans; et il engendra des fils et des filles. '
  '14':
  - type: text
    content: 'Tous les jours de Kénan furent de neuf cent dix ans; puis il mourut. '
  '15':
  - type: text
    content: 'Mahalaleel, âgé de soixante-cinq ans, engendra Jéred. '
  '16':
  - type: text
    content: 'Mahalaleel vécut, après la naissance de Jéred, huit cent trente ans; et il engendra des fils et des filles. '
  '17':
  - type: text
    content: 'Tous les jours de Mahalaleel furent de huit cent quatre-vingt-quinze ans; puis il mourut. '
  '18':
  - type: text
    content: 'Jéred, âgé de cent soixante-deux ans, engendra '
  - type: note
    content: 1 Ch 1:3.
  - type: text
    content: 'Hénoc. '
  '19':
  - type: text
    content: 'Jéred vécut, après la naissance d’Hénoc, huit cents ans; et il engendra des fils et des filles. '
  '2':
  - type: note
    content: Ge 1:26. Mt 19:4. Mc 10:6.
  - type: text
    content: 'Il créa l’homme et la femme, il les bénit, et il les appela du nom d’homme, lorsqu’ils furent créés. '
  '20':
  - type: text
    content: 'Tous les jours de Jéred furent de neuf cent soixante-deux ans; puis il mourut. '
  '21':
  - type: note
    content: Jud v. 14.
  - type: text
    content: 'Hénoc, âgé de soixante-cinq ans, engendra Metuschélah. '
  '22':
  - type: note
    content: Hé 11:5.
  - type: text
    content: 'Hénoc, après la naissance de Metuschélah, marcha avec Dieu trois cents ans; et il engendra des fils et des filles. '
  '23':
  - type: text
    content: 'Tous les jours d’Hénoc furent de trois cent soixante-cinq ans. '
  '24':
  - type: text
    content: 'Hénoc marcha avec Dieu; puis il ne fut plus, '
  - type: note
    content: 2 R 2:11. Hé 11:5.
  - type: text
    content: 'parce que Dieu le prit. '
  '25':
  - type: text
    content: 'Metuschélah, âgé de cent quatre-vingt-sept ans, engendra Lémec. '
  '26':
  - type: text
    content: 'Metuschélah vécut, après la naissance de Lémec, sept cent quatre-vingt-deux ans; et il engendra des fils et des filles. '
  '27':
  - type: text
    content: 'Tous les jours de Metuschélah furent de neuf cent soixante-neuf ans; puis il mourut. '
  '28':
  - type: text
    content: 'Lémec, âgé de cent quatre-vingt-deux ans, engendra un fils. '
  '29':
  - type: text
    content: 'Il lui donna le nom de Noé, en disant: Celui-ci nous consolera de nos fatigues et du travail pénible de nos mains, provenant de cette terre que l’Éternel a maudite. '
  '3':
  - type: text
    content: 'Adam, âgé de cent trente ans, engendra un fils à sa ressemblance, selon son image, et il lui donna le nom de Seth. '
  '30':
  - type: text
    content: 'Lémec vécut, après la naissance de Noé, cinq cent quatre-vingt-quinze ans; et il engendra des fils et des filles. '
  '31':
  - type: text
    content: 'Tous les jours de Lémec furent de sept cent soixante-dix sept ans; puis il mourut. '
  '32':
  - type: text
    content: Noé, âgé de cinq cents ans, engendra Sem, Cham et Japhet.
  '4':
  - type: text
    content: 'Les jours d’Adam, '
  - type: note
    content: 1 Ch 1:1.
  - type: text
    content: 'après la naissance de Seth, furent de huit cents ans; et il engendra des fils et des filles. '
  '5':
  - type: text
    content: 'Tous les jours qu’Adam vécut furent de neuf cent trente ans; puis il mourut. '
  '6':
  - type: text
    content: 'Seth, âgé de cent cinq ans, '
  - type: note
    content: Ge 4:26.
  - type: text
    content: 'engendra Énosch. '
  '7':
  - type: text
    content: 'Seth vécut, après la naissance d’Énosch, huit cent sept ans; et il engendra des fils et des filles. '
  '8':
  - type: text
    content: 'Tous les jours de Seth furent de neuf cent douze ans; puis il mourut. '
  '9':
  - type: text
    content: 'Énosch, âgé de quatre-vingt-dix ans, engendra '
  - type: note
    content: 1 Ch 1:2.
  - type: text
    content: 'Kénan. '
