document_id: ISA.6
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vocation d’Ésaïe
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-7: cf. (Éz 1. Da 7:9, 10. Ap 4:2, etc.) Job 42:5, 6.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 15:7
      metadata:
        usfm: 2KI.15.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'L’année de la mort du roi Ozias, je vis le Seigneur assis sur un trône très élevé, et les pans de sa robe remplissaient le temple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Des séraphins se tenaient au-dessus de lui; ils avaient chacun '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 4:8
      metadata:
        usfm: REV.4.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'six ailes; deux dont ils se couvraient la face, deux dont ils se couvraient les pieds, et deux dont ils se servaient pour voler. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ils criaient l’un à l’autre, et disaient: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 4:8
      metadata:
        usfm: REV.4.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Saint, saint, saint est l’Éternel des armées! Toute la terre est pleine de sa gloire! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Les portes furent ébranlées dans leurs fondements par la voix qui retentissait, et la maison se remplit de fumée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Alors je dis: Malheur à moi! Je suis perdu, car je suis un homme dont les lèvres sont impures, j’habite au milieu d’un peuple dont les lèvres sont impures, et mes yeux ont vu le Roi, l’Éternel des armées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Mais l’un des séraphins vola vers moi, tenant à la main une pierre ardente, qu’il avait prise sur l’autel avec des pincettes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il en toucha ma bouche, et dit: Ceci a '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 1:9
      metadata:
        usfm: JER.1.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Da 10:16
      metadata:
        usfm: DAN.10.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: touché tes lèvres; ton iniquité est enlevée, et ton péché est expié.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 8-13: cf. (Mt 13:13-15. Jn 12:39, 41. Ac 28:25-29.) Ro 11:1-5.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'J’entendis la voix du Seigneur, disant:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui enverrai-je, et qui marchera pour nous?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Je répondis: Me voici, envoie-moi.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il dit alors: Va, et dis à ce peuple:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 13:14
      metadata:
        usfm: MAT.13.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 4:12
      metadata:
        usfm: MRK.4.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 8:10
      metadata:
        usfm: LUK.8.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 12:40
      metadata:
        usfm: JHN.12.40
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 28:26
      metadata:
        usfm: ACT.28.26
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 11:8
      metadata:
        usfm: ROM.11.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Vous entendrez, et vous ne comprendrez point;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous verrez, et vous ne saisirez point.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Rends insensible le cœur de ce peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Endurcis ses oreilles, et bouche-lui les yeux,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 5:21
      metadata:
        usfm: JER.5.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Pour qu’il ne voie point de ses yeux, n’entende point de ses oreilles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne comprenne point de son cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne se convertisse point et ne soit point guéri.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Je dis: Jusqu’à quand, Seigneur?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et il répondit: Jusqu’à ce que les villes soient dévastées'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et privées d’habitants;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jusqu’à ce qu’il n’y ait personne dans les maisons,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que le pays soit ravagé par la solitude;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Jusqu’à ce que l’Éternel ait éloigné les hommes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que le pays devienne un immense désert,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Et s’il y reste encore un dixième des habitants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils seront à leur tour anéantis.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais, comme le térébinthe et le chêne
- type: usfm
  marker: q1
  children:
  - type: text
    text: Conservent leur tronc quand ils sont abattus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Une sainte postérité renaîtra de ce peuple.
