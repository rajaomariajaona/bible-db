document_id: ISA.6,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Vocation d’Ésaïe
  - type: heading
    content: 'V. 1-7: cf. (Éz 1. Da 7:9, 10. Ap 4:2, etc.) Job 42:5, 6.'
  - type: text
    content: ' '
  - type: note
    content: 2 R 15:7.
  - type: text
    content: 'L’année de la mort du roi Ozias, je vis le Seigneur assis sur un trône très élevé, et les pans de sa robe remplissaient le temple. '
  '10':
  - type: text
    content: Rends insensible le cœur de ce peuple,
  - type: text
    content: Endurcis ses oreilles, et bouche-lui les yeux,
  - type: note
    content: Jé 5:21.
  - type: text
    content: Pour qu’il ne voie point de ses yeux, n’entende point de ses oreilles,
  - type: text
    content: Ne comprenne point de son cœur,
  - type: text
    content: Ne se convertisse point et ne soit point guéri.
  '11':
  - type: text
    content: 'Je dis: Jusqu’à quand, Seigneur?'
  - type: text
    content: 'Et il répondit: Jusqu’à ce que les villes soient dévastées'
  - type: text
    content: Et privées d’habitants;
  - type: text
    content: Jusqu’à ce qu’il n’y ait personne dans les maisons,
  - type: text
    content: Et que le pays soit ravagé par la solitude;
  '12':
  - type: text
    content: Jusqu’à ce que l’Éternel ait éloigné les hommes,
  - type: text
    content: Et que le pays devienne un immense désert,
  '13':
  - type: text
    content: Et s’il y reste encore un dixième des habitants,
  - type: text
    content: Ils seront à leur tour anéantis.
  - type: text
    content: Mais, comme le térébinthe et le chêne
  - type: text
    content: Conservent leur tronc quand ils sont abattus,
  - type: text
    content: Une sainte postérité renaîtra de ce peuple.
  '2':
  - type: text
    content: 'Des séraphins se tenaient au-dessus de lui; ils avaient chacun '
  - type: note
    content: Ap 4:8.
  - type: text
    content: 'six ailes; deux dont ils se couvraient la face, deux dont ils se couvraient les pieds, et deux dont ils se servaient pour voler. '
  '3':
  - type: text
    content: 'Ils criaient l’un à l’autre, et disaient: '
  - type: note
    content: Ap 4:8.
  - type: text
    content: 'Saint, saint, saint est l’Éternel des armées! Toute la terre est pleine de sa gloire! '
  '4':
  - type: text
    content: 'Les portes furent ébranlées dans leurs fondements par la voix qui retentissait, et la maison se remplit de fumée. '
  '5':
  - type: text
    content: 'Alors je dis: Malheur à moi! Je suis perdu, car je suis un homme dont les lèvres sont impures, j’habite au milieu d’un peuple dont les lèvres sont impures, et mes yeux ont vu le Roi, l’Éternel des armées. '
  '6':
  - type: text
    content: 'Mais l’un des séraphins vola vers moi, tenant à la main une pierre ardente, qu’il avait prise sur l’autel avec des pincettes. '
  '7':
  - type: text
    content: 'Il en toucha ma bouche, et dit: Ceci a '
  - type: note
    content: Jé 1:9. Da 10:16.
  - type: text
    content: touché tes lèvres; ton iniquité est enlevée, et ton péché est expié.
  - type: heading
    content: 'V. 8-13: cf. (Mt 13:13-15. Jn 12:39, 41. Ac 28:25-29.) Ro 11:1-5.'
  '8':
  - type: text
    content: 'J’entendis la voix du Seigneur, disant:'
  - type: text
    content: Qui enverrai-je, et qui marchera pour nous?
  - type: text
    content: 'Je répondis: Me voici, envoie-moi.'
  '9':
  - type: text
    content: 'Il dit alors: Va, et dis à ce peuple:'
  - type: note
    content: Mt 13:14. Mc 4:12. Lu 8:10. Jn 12:40. Ac 28:26. Ro 11:8.
  - type: text
    content: Vous entendrez, et vous ne comprendrez point;
  - type: text
    content: Vous verrez, et vous ne saisirez point.
