document_id: ACT.10
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le centenier Corneille, premier païen converti par le ministère de l’apôtre Pierre. Le Saint-Esprit accordé à d’autres païens
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-8: cf. (Ac 11:13, 14; 10:30-35.) Ps 145:18, 19. És 56:6, 7. Ps 112:4.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Il y avait à Césarée un homme nommé Corneille, centenier dans la cohorte dite italienne. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Cet homme était pieux et craignait Dieu, avec toute sa maison; il faisait beaucoup d’aumônes au peuple, et priait Dieu continuellement. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Vers la neuvième heure du jour, il vit clairement dans une vision un ange de Dieu qui entra chez lui, et qui lui dit: Corneille! '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Les regards fixés sur lui, et saisi d’effroi, il répondit: Qu’est-ce, Seigneur? Et l’ange lui dit: Tes prières et tes aumônes sont montées devant Dieu, et il s’en est souvenu. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Envoie maintenant des hommes à Joppé, et fais venir Simon, surnommé Pierre; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'il est logé chez un certain Simon, corroyeur, dont la maison est près de la mer. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dès que l’ange qui lui avait parlé fut parti, Corneille appela deux de ses serviteurs, et un soldat pieux d’entre ceux qui étaient attachés à sa personne; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: et, après leur avoir tout raconté, il les envoya à Joppé.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 9-48: cf. Ac 11:1-18; 15:7-9. Ro 9:25, 26. Za 2:4. Ap 21:24-27; 22:2.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Le lendemain, comme ils étaient en route, et qu’ils approchaient de la ville, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 4:33
      metadata:
        usfm: 2KI.4.33
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 6:6
      metadata:
        usfm: MAT.6.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Pierre monta sur le toit, vers la sixième heure, pour prier. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il eut faim, et il voulut manger. Pendant qu’on lui préparait à manger, il tomba en extase. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il vit le ciel ouvert, et un objet semblable à une grande nappe attachée par les quatre coins, qui descendait et s’abaissait vers la terre, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'et où se trouvaient tous les quadrupèdes et les reptiles de la terre et les oiseaux du ciel. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Et une voix lui dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Lève-toi, Pierre, tue et mange.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Mais Pierre dit: Non, Seigneur, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 11:4
      metadata:
        usfm: LEV.11.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 14:7
      metadata:
        usfm: DEU.14.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'car je n’ai jamais rien mangé de souillé ni d’impur. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Et pour la seconde fois la voix se fit encore entendre à lui: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 15:11
      metadata:
        usfm: MAT.15.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 14:17
      metadata:
        usfm: ROM.14.17
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '20'
      metadata:
        usfm: ROM.14.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 4:4
      metadata:
        usfm: 1TI.4.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Tit 1:15
      metadata:
        usfm: TIT.1.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ce que Dieu a déclaré pur, ne le regarde pas comme souillé.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Cela arriva jusqu’à trois fois; et aussitôt après, l’objet fut retiré dans le ciel. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Tandis que Pierre ne savait en lui-même que penser du sens de la vision qu’il avait eue, voici, les hommes envoyés par Corneille, s’étant informés de la maison de Simon, se présentèrent à la porte, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'et demandèrent à haute voix si c’était là que logeait Simon, surnommé Pierre. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Et comme Pierre était à réfléchir sur la vision, l’Esprit lui dit: Voici, trois hommes te demandent; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 15:7
      metadata:
        usfm: ACT.15.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'lève-toi, descends, et pars avec eux sans hésiter, car c’est moi qui les ai envoyés. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Pierre donc descendit, et il dit à ces hommes: Voici, je suis celui que vous cherchez; quel est le motif qui vous amène? '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ils répondirent: Corneille, centenier, homme juste et craignant Dieu, et de qui toute la nation des Juifs rend un bon témoignage, a été divinement averti par un saint ange de te faire venir dans sa maison et d’entendre tes paroles. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Pierre donc les fit entrer, et les logea. Le lendemain, il se leva, et partit avec eux. Quelques-uns des frères de Joppé l’accompagnèrent. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ils arrivèrent à Césarée le jour suivant. Corneille les attendait, et avait invité ses parents et ses amis intimes. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Lorsque Pierre entra, Corneille, qui était allé au-devant de lui, tomba à ses pieds et se prosterna. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Mais Pierre le releva, en disant: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 14:14
      metadata:
        usfm: ACT.14.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 19:10
      metadata:
        usfm: REV.19.10
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 22:9
      metadata:
        usfm: REV.22.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Lève-toi; moi aussi, je suis un homme. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Et conversant avec lui, il entra, et trouva beaucoup de personnes réunies. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 23:32
      metadata:
        usfm: EXO.23.32
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 34:15
      metadata:
        usfm: EXO.34.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 7:2
      metadata:
        usfm: DEU.7.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 4:9
      metadata:
        usfm: JHN.4.9
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 18:28
      metadata:
        usfm: JHN.18.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Vous savez, leur dit-il, qu’il est défendu à un Juif de se lier avec un étranger ou d’entrer chez lui; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 15:8
      metadata:
        usfm: ACT.15.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 3:6
      metadata:
        usfm: EPH.3.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'mais Dieu m’a appris à ne regarder aucun homme comme souillé et impur. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'C’est pourquoi je n’ai pas eu d’objection à venir, puisque vous m’avez appelé; je vous demande donc pour quel motif vous m’avez envoyé chercher. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Corneille dit: Il y a quatre jours, à cette heure-ci, je priais dans ma maison à la neuvième heure; et voici, un homme '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 28:3
      metadata:
        usfm: MAT.28.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 16:5
      metadata:
        usfm: MRK.16.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 24:4
      metadata:
        usfm: LUK.24.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'vêtu d’un habit éclatant se présenta devant moi, et dit: '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Corneille, ta prière a été exaucée, et Dieu s’est souvenu de tes aumônes. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Envoie donc à Joppé, et fais venir Simon, surnommé Pierre; il est logé dans la maison de Simon, corroyeur, près de la mer. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Aussitôt j’ai envoyé vers toi, et tu as bien fait de venir. Maintenant donc nous sommes tous devant Dieu, pour entendre tout ce que le Seigneur t’a ordonné de nous dire. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Alors Pierre, ouvrant la bouche, dit: En vérité, je reconnais '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 10:17
      metadata:
        usfm: DEU.10.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 19:7
      metadata:
        usfm: 2CH.19.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 34:19
      metadata:
        usfm: JOB.34.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 2:11
      metadata:
        usfm: ROM.2.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 2:6
      metadata:
        usfm: GAL.2.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 6:9
      metadata:
        usfm: EPH.6.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 3:25
      metadata:
        usfm: COL.3.25
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 1:17
      metadata:
        usfm: 1PE.1.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'que Dieu ne fait point acception de personnes, '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 56:6
      metadata:
        usfm: ISA.56.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'mais qu’en toute nation celui qui le craint et qui pratique la justice lui est agréable. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Il a envoyé la parole aux fils d’Israël, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 9:5
      metadata:
        usfm: ISA.9.5
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 52:7
      metadata:
        usfm: ISA.52.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 16:33
      metadata:
        usfm: JHN.16.33
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 5:1
      metadata:
        usfm: ROM.5.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 1:20
      metadata:
        usfm: COL.1.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'en leur annonçant la paix par Jésus-Christ, qui est le Seigneur de tous. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Vous savez ce qui est arrivé dans toute la Judée, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 8:23
      metadata:
        usfm: ISA.8.23
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 9:1
      metadata:
        usfm: ISA.9.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 4:12
      metadata:
        usfm: MAT.4.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 1:14
      metadata:
        usfm: MRK.1.14
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '38'
      metadata:
        usfm: MRK.1.38
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '39'
      metadata:
        usfm: MRK.1.39
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 4:14
      metadata:
        usfm: LUK.4.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'après avoir commencé en Galilée, à la suite du baptême que Jean a prêché; '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'vous savez comment '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
