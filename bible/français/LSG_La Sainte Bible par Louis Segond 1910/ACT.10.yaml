document_id: ACT.10,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Le centenier Corneille, premier païen converti par le ministère de l’apôtre Pierre. Le Saint-Esprit accordé à d’autres païens
  - type: heading
    content: 'V. 1-8: cf. (Ac 11:13, 14; 10:30-35.) Ps 145:18, 19. És 56:6, 7. Ps 112:4.'
  - type: text
    content: 'Il y avait à Césarée un homme nommé Corneille, centenier dans la cohorte dite italienne. '
  '10':
  - type: text
    content: 'Il eut faim, et il voulut manger. Pendant qu’on lui préparait à manger, il tomba en extase. '
  '11':
  - type: text
    content: 'Il vit le ciel ouvert, et un objet semblable à une grande nappe attachée par les quatre coins, qui descendait et s’abaissait vers la terre, '
  '12':
  - type: text
    content: 'et où se trouvaient tous les quadrupèdes et les reptiles de la terre et les oiseaux du ciel. '
  '13':
  - type: text
    content: 'Et une voix lui dit: '
  - type: text
    content: Lève-toi, Pierre, tue et mange.
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'Mais Pierre dit: Non, Seigneur, '
  - type: note
    content: Lé 11:4. De 14:7.
  - type: text
    content: 'car je n’ai jamais rien mangé de souillé ni d’impur. '
  '15':
  - type: text
    content: 'Et pour la seconde fois la voix se fit encore entendre à lui: '
  - type: note
    content: Mt 15:11. Ro 14:17, 20. 1 Ti 4:4. Tit 1:15.
  - type: text
    content: Ce que Dieu a déclaré pur, ne le regarde pas comme souillé.
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'Cela arriva jusqu’à trois fois; et aussitôt après, l’objet fut retiré dans le ciel. '
  '17':
  - type: text
    content: 'Tandis que Pierre ne savait en lui-même que penser du sens de la vision qu’il avait eue, voici, les hommes envoyés par Corneille, s’étant informés de la maison de Simon, se présentèrent à la porte, '
  '18':
  - type: text
    content: 'et demandèrent à haute voix si c’était là que logeait Simon, surnommé Pierre. '
  '19':
  - type: text
    content: 'Et comme Pierre était à réfléchir sur la vision, l’Esprit lui dit: Voici, trois hommes te demandent; '
  '2':
  - type: text
    content: 'Cet homme était pieux et craignait Dieu, avec toute sa maison; il faisait beaucoup d’aumônes au peuple, et priait Dieu continuellement. '
  '20':
  - type: note
    content: Ac 15:7.
  - type: text
    content: 'lève-toi, descends, et pars avec eux sans hésiter, car c’est moi qui les ai envoyés. '
  '21':
  - type: text
    content: 'Pierre donc descendit, et il dit à ces hommes: Voici, je suis celui que vous cherchez; quel est le motif qui vous amène? '
  '22':
  - type: text
    content: 'Ils répondirent: Corneille, centenier, homme juste et craignant Dieu, et de qui toute la nation des Juifs rend un bon témoignage, a été divinement averti par un saint ange de te faire venir dans sa maison et d’entendre tes paroles. '
  '23':
  - type: text
    content: 'Pierre donc les fit entrer, et les logea. Le lendemain, il se leva, et partit avec eux. Quelques-uns des frères de Joppé l’accompagnèrent. '
  '24':
  - type: text
    content: 'Ils arrivèrent à Césarée le jour suivant. Corneille les attendait, et avait invité ses parents et ses amis intimes. '
  '25':
  - type: text
    content: 'Lorsque Pierre entra, Corneille, qui était allé au-devant de lui, tomba à ses pieds et se prosterna. '
  '26':
  - type: text
    content: 'Mais Pierre le releva, en disant: '
  - type: note
    content: Ac 14:14. Ap 19:10; 22:9.
  - type: text
    content: 'Lève-toi; moi aussi, je suis un homme. '
  '27':
  - type: text
    content: 'Et conversant avec lui, il entra, et trouva beaucoup de personnes réunies. '
  '28':
  - type: note
    content: Ex 23:32; 34:15. De 7:2. Jn 4:9; 18:28.
  - type: text
    content: 'Vous savez, leur dit-il, qu’il est défendu à un Juif de se lier avec un étranger ou d’entrer chez lui; '
  - type: note
    content: Ac 15:8. Ép 3:6.
  - type: text
    content: 'mais Dieu m’a appris à ne regarder aucun homme comme souillé et impur. '
  '29':
  - type: text
    content: 'C’est pourquoi je n’ai pas eu d’objection à venir, puisque vous m’avez appelé; je vous demande donc pour quel motif vous m’avez envoyé chercher. '
  '3':
  - type: text
    content: 'Vers la neuvième heure du jour, il vit clairement dans une vision un ange de Dieu qui entra chez lui, et qui lui dit: Corneille! '
  '30':
  - type: text
    content: 'Corneille dit: Il y a quatre jours, à cette heure-ci, je priais dans ma maison à la neuvième heure; et voici, un homme '
  - type: note
    content: Mt 28:3. Mc 16:5. Lu 24:4.
  - type: text
    content: 'vêtu d’un habit éclatant se présenta devant moi, et dit: '
  '31':
  - type: text
    content: 'Corneille, ta prière a été exaucée, et Dieu s’est souvenu de tes aumônes. '
  '32':
  - type: text
    content: 'Envoie donc à Joppé, et fais venir Simon, surnommé Pierre; il est logé dans la maison de Simon, corroyeur, près de la mer. '
  '33':
  - type: text
    content: 'Aussitôt j’ai envoyé vers toi, et tu as bien fait de venir. Maintenant donc nous sommes tous devant Dieu, pour entendre tout ce que le Seigneur t’a ordonné de nous dire. '
  '34':
  - type: text
    content: 'Alors Pierre, ouvrant la bouche, dit: En vérité, je reconnais '
  - type: note
    content: De 10:17. 2 Ch 19:7. Job 34:19. Ro 2:11. Ga 2:6. Ép 6:9. Col 3:25. 1 Pi 1:17.
  - type: text
    content: 'que Dieu ne fait point acception de personnes, '
  '35':
  - type: note
    content: És 56:6.
  - type: text
    content: 'mais qu’en toute nation celui qui le craint et qui pratique la justice lui est agréable. '
  '36':
  - type: text
    content: 'Il a envoyé la parole aux fils d’Israël, '
  - type: note
    content: És 9:5; 52:7. Jn 16:33. Ro 5:1. Col 1:20.
  - type: text
    content: 'en leur annonçant la paix par Jésus-Christ, qui est le Seigneur de tous. '
  '37':
  - type: text
    content: 'Vous savez ce qui est arrivé dans toute la Judée, '
  - type: note
    content: És 8:23; 9:1. Mt 4:12. Mc 1:14, 38, 39. Lu 4:14.
  - type: text
    content: 'après avoir commencé en Galilée, à la suite du baptême que Jean a prêché; '
  '38':
  - type: text
    content: 'vous savez comment '
  - type: note
    content: Ps 45:8. És 61:1. Lu 4:18.
  - type: text
    content: 'Dieu a oint du Saint-Esprit et de force Jésus de Nazareth, qui allait de lieu en lieu faisant du bien et guérissant tous ceux qui étaient sous l’empire du diable, car Dieu était avec lui. '
  '39':
  - type: text
    content: 'Nous sommes témoins de tout ce qu’il a fait dans le pays des Juifs et à Jérusalem. Ils l’ont tué, en le pendant au bois. '
  '4':
  - type: text
    content: 'Les regards fixés sur lui, et saisi d’effroi, il répondit: Qu’est-ce, Seigneur? Et l’ange lui dit: Tes prières et tes aumônes sont montées devant Dieu, et il s’en est souvenu. '
  '40':
  - type: note
    content: Mc 16:14. Lu 24:34. Jn 20:19. Ac 2:24. 1 Co 15:5.
  - type: text
    content: 'Dieu l’a ressuscité le troisième jour, et il a permis qu’il apparût, '
  '41':
  - type: text
    content: 'non à tout le peuple, mais aux témoins choisis d’avance par Dieu, à nous qui avons mangé et bu avec lui, après qu’il fut ressuscité des morts. '
  '42':
  - type: note
    content: Mt 28:19. Mc 16:15. Jn 15:16.
  - type: text
    content: 'Et Jésus nous a ordonné de prêcher au peuple et d’attester que c’est lui '
  - type: note
    content: Ac 17:31.
  - type: text
    content: 'qui a été établi par Dieu juge des vivants et des morts. '
  '43':
  - type: note
    content: Ge 3:15; 22:18; 26:4; 49:10. De 18:15. Ps 132:11. És 4:2; 7:14; 9:5; 40:10. Jé 23:5; 33:14. Éz 34:23; 37:24. Da 9:24. Mi 7:20.
  - type: text
    content: 'Tous les prophètes rendent de lui le témoignage '
  - type: note
    content: Ac 15:9.
  - type: text
    content: 'que quiconque croit en lui reçoit par son nom le pardon des péchés. '
  '44':
  - type: note
    content: Ac 8:17.
  - type: text
    content: 'Comme Pierre prononçait encore ces mots, le Saint-Esprit descendit sur tous ceux qui écoutaient la parole. '
  '45':
  - type: text
    content: 'Tous les fidèles circoncis qui étaient venus avec Pierre furent étonnés de ce que le don du Saint-Esprit était aussi répandu sur les païens. '
  '46':
  - type: note
    content: Mc 16:17. Ac 2:4.
  - type: text
    content: 'Car ils les entendaient parler en langues et glorifier Dieu. '
  '47':
  - type: note
    content: Ac 8:36; 11:17.
  - type: text
    content: 'Alors Pierre dit: Peut-on refuser l’eau du baptême à ceux qui ont reçu le Saint-Esprit aussi bien que nous? '
  '48':
  - type: text
    content: Et il ordonna qu’ils fussent baptisés au nom du Seigneur. Sur quoi ils le prièrent de rester quelques jours auprès d’eux.
  '5':
  - type: text
    content: 'Envoie maintenant des hommes à Joppé, et fais venir Simon, surnommé Pierre; '
  '6':
  - type: text
    content: 'il est logé chez un certain Simon, corroyeur, dont la maison est près de la mer. '
  '7':
  - type: text
    content: 'Dès que l’ange qui lui avait parlé fut parti, Corneille appela deux de ses serviteurs, et un soldat pieux d’entre ceux qui étaient attachés à sa personne; '
  '8':
  - type: text
    content: et, après leur avoir tout raconté, il les envoya à Joppé.
  - type: heading
    content: 'V. 9-48: cf. Ac 11:1-18; 15:7-9. Ro 9:25, 26. Za 2:4. Ap 21:24-27; 22:2.'
  '9':
  - type: text
    content: 'Le lendemain, comme ils étaient en route, et qu’ils approchaient de la ville, '
  - type: note
    content: 2 R 4:33. Mt 6:6.
  - type: text
    content: 'Pierre monta sur le toit, vers la sixième heure, pour prier. '
