document_id: NUM.21,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Les serpents brûlants
  - type: heading
    content: 'V. 1-3: cf. (No 33:40. Jg 1:17.) És 49:24-26.'
  - type: text
    content: 'Le roi d’Arad, Cananéen, qui habitait le midi, apprit qu’Israël venait par le chemin d’Atharim. Il combattit Israël, et emmena des prisonniers. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: No 33:43.
  - type: text
    content: 'Les enfants d’Israël partirent, et ils campèrent à Oboth. '
  '11':
  - type: text
    content: 'Ils partirent d’Oboth et ils campèrent à Ijjé-Abarim, dans le désert qui est vis-à-vis de Moab, vers le soleil levant. '
  '12':
  - type: text
    content: 'De là ils partirent, et ils campèrent dans la vallée de Zéred. '
  '13':
  - type: text
    content: 'De là ils partirent, et ils campèrent de l’autre côté de l’Arnon, qui coule dans le désert en sortant du territoire des Amoréens; '
  - type: note
    content: Jg 11:18.
  - type: text
    content: 'car l’Arnon est la frontière de Moab, entre Moab et les Amoréens. '
  '14':
  - type: text
    content: 'C’est pourquoi il est dit dans le livre des Guerres de l’Éternel: …Vaheb en Supha, et les torrents de l’Arnon, '
  '15':
  - type: text
    content: 'et le cours des torrents, qui s’étend du côté d’Ar et touche à la frontière de Moab. '
  '16':
  - type: text
    content: 'De là ils allèrent à Beer. C’est ce Beer, où l’Éternel dit à Moïse: Rassemble le peuple, et je leur donnerai de l’eau. '
  '17':
  - type: text
    content: 'Alors Israël chanta ce cantique: Monte, puits! Chantez en son honneur! '
  '18':
  - type: text
    content: 'Puits, que des princes ont creusé, Que les grands du peuple ont creusé, Avec le sceptre, avec leurs bâtons! '
  '19':
  - type: text
    content: 'Du désert ils allèrent à Matthana; de Matthana, à Nahaliel; de Nahaliel, à Bamoth; '
  '2':
  - type: text
    content: 'Alors Israël fit un vœu à l’Éternel, et dit: Si tu livres ce peuple entre mes mains, je dévouerai ses villes par interdit. '
  '20':
  - type: text
    content: de Bamoth, à la vallée qui est dans le territoire de Moab, au sommet du Pisga, en regard du désert.
  - type: heading
    content: 'V. 21-35: cf. De 2:24-37; 3:1-20. Jos 24:8. Ps 136:17-22.'
  '21':
  - type: text
    content: ' '
  - type: note
    content: De 2:26. Jg 11:19.
  - type: text
    content: 'Israël envoya des messagers à Sihon, roi des Amoréens, pour lui dire: '
  '22':
  - type: text
    content: 'Laisse-moi passer par ton pays; '
  - type: note
    content: No 20:17.
  - type: text
    content: 'nous n’entrerons ni dans les champs, ni dans les vignes, et nous ne boirons pas l’eau des puits; nous suivrons la route royale, jusqu’à ce que nous ayons franchi ton territoire. '
  '23':
  - type: note
    content: De 2:30; 29:7. Jos 24:8. Jg 11:20.
  - type: text
    content: 'Sihon n’accorda point à Israël le passage sur son territoire; il rassembla tout son peuple, et sortit à la rencontre d’Israël, dans le désert; il vint à Jahats, et combattit Israël. '
  '24':
  - type: note
    content: De 2:33; 29:7. Jos 12:2; 24:8. Jg 11:21.
  - type: text
    content: 'Israël le frappa du tranchant de l’épée et '
  - type: note
    content: Ps 135:11, 12; 136:19. Am 2:9.
  - type: text
    content: 's’empara de son pays depuis l’Arnon jusqu’au Jabbok, '
  - type: note
    content: De 2:37.
  - type: text
    content: 'jusqu’à la frontière des enfants d’Ammon; car la frontière des enfants d’Ammon était fortifiée. '
  '25':
  - type: note
    content: De 2:34, 35.
  - type: text
    content: 'Israël prit toutes les villes, et s’établit dans toutes les villes des Amoréens, à Hesbon et dans toutes les villes de son ressort. '
  '26':
  - type: text
    content: 'Car Hesbon était la ville de Sihon, roi des Amoréens; il avait fait la guerre au précédent roi de Moab, et lui avait enlevé tout son pays jusqu’à l’Arnon. '
  '27':
  - type: text
    content: 'C’est pourquoi les poètes disent: Venez à Hesbon! Que la ville de Sihon soit rebâtie et fortifiée! '
  '28':
  - type: text
    content: 'Car il est sorti un feu de Hesbon, Une flamme de la ville de Sihon; Elle a dévoré Ar-Moab, les habitants des hauteurs de l’Arnon. '
  '29':
  - type: text
    content: 'Malheur à toi, Moab! Tu es perdu, peuple de '
  - type: note
    content: 1 R 11:7, 33.
  - type: text
    content: 'Kemosch! Il a fait de ses fils des fuyards, Et il a livré ses filles captives à Sihon, roi des Amoréens. '
  '3':
  - type: text
    content: L’Éternel entendit la voix d’Israël, et livra les Cananéens. On les dévoua par interdit, eux et leurs villes; et l’on nomma ce lieu Horma.
  - type: heading
    content: 'V. 4-9: cf. 1 Co 10:9. Jn 3:14-16. (2 R 18:4.)'
  '30':
  - type: text
    content: 'Nous avons lancé sur eux nos traits: De Hesbon à Dibon tout est détruit; Nous avons étendu nos ravages jusqu’à Nophach, Jusqu’à Médeba. '
  '31':
  - type: text
    content: 'Israël s’établit dans le pays des Amoréens. '
  '32':
  - type: text
    content: 'Moïse envoya reconnaître Jaezer; et ils prirent les villes de son ressort, et chassèrent les Amoréens qui y étaient. '
  '33':
  - type: text
    content: 'Ils changèrent ensuite de direction, et montèrent par le chemin de Basan. '
  - type: note
    content: De 3:1; 29:7.
  - type: text
    content: 'Og, roi de Basan, sortit à leur rencontre, avec tout son peuple, pour les combattre à Édréï. '
  '34':
  - type: text
    content: 'L’Éternel dit à Moïse: Ne le crains point; car je le livre entre tes mains, lui et tout son peuple, et son pays; '
  - type: note
    content: Ps 136:20.
  - type: text
    content: 'tu le traiteras comme tu as traité Sihon, roi des Amoréens, qui habitait à Hesbon. '
  '35':
  - type: note
    content: Ps 136:20, 21, 22.
  - type: text
    content: Et ils le battirent, lui et ses fils, et tout son peuple, sans en laisser échapper un seul, et ils s’emparèrent de son pays.
  '4':
  - type: text
    content: 'Ils partirent de la montagne de Hor par le chemin de la mer Rouge, pour contourner le pays d’Édom. Le peuple s’impatienta en route, '
  '5':
  - type: text
    content: 'et parla contre Dieu et contre Moïse: Pourquoi nous avez-vous fait monter hors d’Égypte, pour que nous mourions dans le désert? Car il n’y a point de pain, et il n’y a point d’eau, et '
  - type: note
    content: No 11:6.
  - type: text
    content: 'notre âme est dégoûtée de cette misérable nourriture. '
  '6':
  - type: text
    content: 'Alors l’Éternel '
  - type: note
    content: 1 Co 10:9.
  - type: text
    content: 'envoya contre le peuple des serpents brûlants; ils mordirent le peuple, et il mourut beaucoup de gens en Israël. '
  '7':
  - type: text
    content: 'Le peuple vint à Moïse, et dit: Nous avons péché, car nous avons parlé contre l’Éternel et contre toi. Prie l’Éternel, afin qu’il éloigne de nous ces serpents. Moïse pria pour le peuple. '
  '8':
  - type: text
    content: 'L’Éternel dit à Moïse: Fais-toi un serpent brûlant, et place-le sur une perche; '
  - type: note
    content: Jn 3:14.
  - type: text
    content: 'quiconque aura été mordu, et le regardera, conservera la vie. '
  '9':
  - type: note
    content: 2 R 18:4. Jn 3:14.
  - type: text
    content: Moïse fit un serpent d’airain, et le plaça sur une perche; et quiconque avait été mordu par un serpent, et regardait le serpent d’airain, conservait la vie.
  - type: heading
    content: 'V. 10-20: cf. No 33:41-47. De 8:2.'
