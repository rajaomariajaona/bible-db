document_id: NUM.21
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les serpents brûlants
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-3: cf. (No 33:40. Jg 1:17.) És 49:24-26.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Le roi d’Arad, Cananéen, qui habitait le midi, apprit qu’Israël venait par le chemin d’Atharim. Il combattit Israël, et emmena des prisonniers. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Alors Israël fit un vœu à l’Éternel, et dit: Si tu livres ce peuple entre mes mains, je dévouerai ses villes par interdit. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: L’Éternel entendit la voix d’Israël, et livra les Cananéens. On les dévoua par interdit, eux et leurs villes; et l’on nomma ce lieu Horma.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 4-9: cf. 1 Co 10:9. Jn 3:14-16. (2 R 18:4.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ils partirent de la montagne de Hor par le chemin de la mer Rouge, pour contourner le pays d’Édom. Le peuple s’impatienta en route, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'et parla contre Dieu et contre Moïse: Pourquoi nous avez-vous fait monter hors d’Égypte, pour que nous mourions dans le désert? Car il n’y a point de pain, et il n’y a point d’eau, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 11:6
      metadata:
        usfm: NUM.11.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'notre âme est dégoûtée de cette misérable nourriture. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Alors l’Éternel '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 10:9
      metadata:
        usfm: 1CO.10.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'envoya contre le peuple des serpents brûlants; ils mordirent le peuple, et il mourut beaucoup de gens en Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Le peuple vint à Moïse, et dit: Nous avons péché, car nous avons parlé contre l’Éternel et contre toi. Prie l’Éternel, afin qu’il éloigne de nous ces serpents. Moïse pria pour le peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'L’Éternel dit à Moïse: Fais-toi un serpent brûlant, et place-le sur une perche; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 3:14
      metadata:
        usfm: JHN.3.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'quiconque aura été mordu, et le regardera, conservera la vie. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 18:4
      metadata:
        usfm: 2KI.18.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 3:14
      metadata:
        usfm: JHN.3.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Moïse fit un serpent d’airain, et le plaça sur une perche; et quiconque avait été mordu par un serpent, et regardait le serpent d’airain, conservait la vie.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 10-20: cf. No 33:41-47. De 8:2.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 33:43
      metadata:
        usfm: NUM.33.43
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Les enfants d’Israël partirent, et ils campèrent à Oboth. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ils partirent d’Oboth et ils campèrent à Ijjé-Abarim, dans le désert qui est vis-à-vis de Moab, vers le soleil levant. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'De là ils partirent, et ils campèrent dans la vallée de Zéred. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'De là ils partirent, et ils campèrent de l’autre côté de l’Arnon, qui coule dans le désert en sortant du territoire des Amoréens; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jg 11:18
      metadata:
        usfm: JDG.11.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'car l’Arnon est la frontière de Moab, entre Moab et les Amoréens. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'C’est pourquoi il est dit dans le livre des Guerres de l’Éternel: …Vaheb en Supha, et les torrents de l’Arnon, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'et le cours des torrents, qui s’étend du côté d’Ar et touche à la frontière de Moab. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'De là ils allèrent à Beer. C’est ce Beer, où l’Éternel dit à Moïse: Rassemble le peuple, et je leur donnerai de l’eau. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Alors Israël chanta ce cantique: Monte, puits! Chantez en son honneur! '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Puits, que des princes ont creusé, Que les grands du peuple ont creusé, Avec le sceptre, avec leurs bâtons! '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Du désert ils allèrent à Matthana; de Matthana, à Nahaliel; de Nahaliel, à Bamoth; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: de Bamoth, à la vallée qui est dans le territoire de Moab, au sommet du Pisga, en regard du désert.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 21-35: cf. De 2:24-37; 3:1-20. Jos 24:8. Ps 136:17-22.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 2:26
      metadata:
        usfm: DEU.2.26
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jg 11:19
      metadata:
        usfm: JDG.11.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Israël envoya des messagers à Sihon, roi des Amoréens, pour lui dire: '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Laisse-moi passer par ton pays; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 20:17
      metadata:
        usfm: NUM.20.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'nous n’entrerons ni dans les champs, ni dans les vignes, et nous ne boirons pas l’eau des puits; nous suivrons la route royale, jusqu’à ce que nous ayons franchi ton territoire. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 2:30
      metadata:
        usfm: DEU.2.30
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 29:7
      metadata:
        usfm: DEU.29.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 24:8
      metadata:
        usfm: JOS.24.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jg 11:20
      metadata:
        usfm: JDG.11.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Sihon n’accorda point à Israël le passage sur son territoire; il rassembla tout son peuple, et sortit à la rencontre d’Israël, dans le désert; il vint à Jahats, et combattit Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 2:33
      metadata:
        usfm: DEU.2.33
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 29:7
      metadata:
        usfm: DEU.29.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 12:2
      metadata:
        usfm: JOS.12.2
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 24:8
      metadata:
        usfm: JOS.24.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jg 11:21
      metadata:
        usfm: JDG.11.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Israël le frappa du tranchant de l’épée et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 135:11
      metadata:
        usfm: PSA.135.11
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '12'
      metadata:
        usfm: PSA.135.12
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 136:19
      metadata:
        usfm: PSA.136.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Am 2:9
      metadata:
        usfm: AMO.2.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 's’empara de son pays depuis l’Arnon jusqu’au Jabbok, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 2:37
      metadata:
        usfm: DEU.2.37
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'jusqu’à la frontière des enfants d’Ammon; car la frontière des enfants d’Ammon était fortifiée. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 2:34
      metadata:
        usfm: DEU.2.34
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '35'
      metadata:
        usfm: DEU.2.35
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Israël prit toutes les villes, et s’établit dans toutes les villes des Amoréens, à Hesbon et dans toutes les villes de son ressort. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Car Hesbon était la ville de Sihon, roi des Amoréens; il avait fait la guerre au précédent roi de Moab, et lui avait enlevé tout son pays jusqu’à l’Arnon. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'C’est pourquoi les poètes disent: Venez à Hesbon! Que la ville de Sihon soit rebâtie et fortifiée! '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Car il est sorti un feu de Hesbon, Une flamme de la ville de Sihon; Elle a dévoré Ar-Moab, les habitants des hauteurs de l’Arnon. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Malheur à toi, Moab! Tu es perdu, peuple de '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 11:7
      metadata:
        usfm: 1KI.11.7
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '33'
      metadata:
        usfm: 1KI.11.33
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Kemosch! Il a fait de ses fils des fuyards, Et il a livré ses filles captives à Sihon, roi des Amoréens. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Nous avons lancé sur eux nos traits: De Hesbon à Dibon tout est détruit; Nous avons étendu nos ravages jusqu’à Nophach, Jusqu’à Médeba. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Israël s’établit dans le pays des Amoréens. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Moïse envoya reconnaître Jaezer; et ils prirent les villes de son ressort, et chassèrent les Amoréens qui y étaient. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ils changèrent ensuite de direction, et montèrent par le chemin de Basan. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 3:1
      metadata:
        usfm: DEU.3.1
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 29:7
      metadata:
        usfm: DEU.29.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Og, roi de Basan, sortit à leur rencontre, avec tout son peuple, pour les combattre à Édréï. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'L’Éternel dit à Moïse: Ne le crains point; car je le livre entre tes mains, lui et tout son peuple, et son pays; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 136:20
      metadata:
        usfm: PSA.136.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'tu le traiteras comme tu as traité Sihon, roi des Amoréens, qui habitait à Hesbon. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 136:20
      metadata:
        usfm: PSA.136.20
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '21'
      metadata:
        usfm: PSA.136.21
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '22'
      metadata:
        usfm: PSA.136.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et ils le battirent, lui et ses fils, et tout son peuple, sans en laisser échapper un seul, et ils s’emparèrent de son pays.
