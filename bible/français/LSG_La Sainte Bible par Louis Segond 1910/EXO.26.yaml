document_id: EXO.26
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Description du tabernacle
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-30: cf. Ex 36:8-34. (Hé 9:1, 11, 24. Ap 21:3.) 1 Co 3:16.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tu feras le '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 36:8
      metadata:
        usfm: EXO.36.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'tabernacle de dix tapis de fin lin retors, et d’étoffes teintes en bleu, en pourpre et en cramoisi; tu y représenteras des chérubins artistement travaillés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'La longueur d’un tapis sera de vingt-huit coudées, et la largeur d’un tapis sera de quatre coudées; la mesure sera la même pour tous les tapis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Cinq de ces tapis seront joints ensemble; les cinq autres seront aussi joints ensemble. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tu feras des lacets bleus au bord du tapis terminant le premier assemblage; et tu feras de même au bord du tapis terminant le second assemblage. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tu mettras cinquante lacets au premier tapis, et tu mettras cinquante lacets au bord du tapis terminant le second assemblage; ces lacets se correspondront les uns aux autres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tu feras cinquante agrafes d’or, et tu joindras les tapis l’un à l’autre avec les agrafes. Et le tabernacle formera un tout. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tu feras '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 36:14
      metadata:
        usfm: EXO.36.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'des tapis de poil de chèvre, pour servir de tente sur le tabernacle; tu feras onze de ces tapis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'La longueur d’un tapis sera de trente coudées, et la largeur d’un tapis sera de quatre coudées; la mesure sera la même pour les onze tapis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Tu joindras séparément cinq de ces tapis, et les six autres séparément, et tu redoubleras le sixième tapis sur le devant de la tente. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tu mettras cinquante lacets au bord du tapis terminant le premier assemblage, et cinquante lacets au bord du tapis du second assemblage. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tu feras cinquante agrafes d’airain, et tu feras entrer les agrafes dans les lacets. Tu assembleras ainsi la tente, qui fera un tout. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Comme il y aura du surplus dans les tapis de la tente, la moitié du tapis de reste retombera sur le derrière du tabernacle; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'la coudée d’une part, et la coudée d’autre part, qui seront de reste sur la longueur des tapis de la tente, retomberont sur les deux côtés du tabernacle, pour le couvrir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Tu feras pour la tente une couverture de peaux de béliers teintes en rouge, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 36:19
      metadata:
        usfm: EXO.36.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et une couverture de peaux de dauphins par-dessus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tu feras des planches pour le tabernacle; elles seront de bois d’acacia, placées debout. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'La longueur d’une planche sera de dix coudées, et la largeur d’une planche sera d’une coudée et demie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il y aura à chaque planche deux tenons joints l’un à l’autre; tu feras de même pour toutes les planches du tabernacle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tu feras vingt planches pour le tabernacle, du côté du midi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tu mettras quarante bases d’argent sous les vingt planches, deux bases sous chaque planche pour ses deux tenons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tu feras vingt planches pour le second côté du tabernacle, le côté du nord, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'et leurs quarante bases d’argent, deux bases sous chaque planche. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Tu feras six planches pour le fond du tabernacle, du côté de l’occident. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Tu feras deux planches pour les angles du tabernacle, dans le fond; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'elles seront doubles depuis le bas, et bien liées à leur sommet par un anneau; il en sera de même pour toutes les deux, placées aux deux angles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Il y aura ainsi huit planches, avec leurs bases d’argent, soit seize bases, deux bases sous chaque planche. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Tu feras cinq barres de bois d’acacia pour les planches de l’un des côtés du tabernacle, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'cinq barres pour les planches du second côté du tabernacle, et cinq barres pour les planches du côté du tabernacle formant le fond vers l’occident. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'La barre du milieu traversera les planches d’une extrémité à l’autre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Tu couvriras d’or les planches, et tu feras d’or leurs anneaux qui recevront les barres, et tu couvriras d’or les barres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 25:9
      metadata:
        usfm: EXO.25.9
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '40'
      metadata:
        usfm: EXO.25.40
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 7:44
      metadata:
        usfm: ACT.7.44
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 8:5
      metadata:
        usfm: HEB.8.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Tu dresseras le tabernacle d’après le modèle qui t’est montré sur la montagne.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 31-37: cf. Ex 36:35-38. Hé 9:1-12. (Hé 6:19, 20; 10:19-22.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 36:35
      metadata:
        usfm: EXO.36.35
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu feras un voile bleu, pourpre et cramoisi, et de fin lin retors; il sera artistement travaillé, et l’on y représentera des chérubins. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Tu le mettras sur quatre colonnes d’acacia, couvertes d’or; ces colonnes auront des crochets d’or, et poseront sur quatre bases d’argent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Tu mettras le voile au-dessous des agrafes, et c’est là, en dedans du voile, que tu feras entrer l’arche du témoignage; le voile vous servira de séparation entre le lieu saint et le lieu très saint. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Tu mettras le propitiatoire sur l’arche du témoignage dans le lieu très saint. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Tu mettras la table en dehors du voile, et le chandelier en face de la table, au côté méridional du tabernacle; et tu mettras la table au côté septentrional. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 36:37
      metadata:
        usfm: EXO.36.37
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu feras pour l’entrée de la tente un rideau bleu, pourpre et cramoisi, et de fin lin retors; ce sera un ouvrage de broderie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Tu feras pour le rideau cinq colonnes d’acacia, et tu les couvriras d’or; elles auront des crochets d’or, et tu fondras pour elles cinq bases d’airain.
