document_id: ROM.14,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Préceptes de tolérance
  - type: heading
    content: 'V. 1-12: cf. Ro 15:1-7. 1 Co 4:3-5; 8:7. Col 2:16.'
  - type: text
    content: 'Faites accueil à celui qui est faible dans la foi, et ne discutez pas sur les opinions. '
  '10':
  - type: text
    content: 'Mais toi, pourquoi juges-tu ton frère? Ou toi, pourquoi méprises-tu ton frère? '
  - type: note
    content: Mt 25:31. 2 Co 5:10.
  - type: text
    content: 'puisque nous comparaîtrons tous devant le tribunal de Dieu. '
  '11':
  - type: text
    content: 'Car il est écrit:'
  - type: note
    content: És 45:23. Ph 2:10.
  - type: text
    content: Je suis vivant, dit le Seigneur,
  - type: text
    content: tout genou fléchira devant moi,
  - type: text
    content: et toute langue donnera gloire à Dieu.
  '12':
  - type: text
    content: ' '
  - type: note
    content: Ps 62:13. Jé 17:10; 32:19. Mt 16:27. Ro 2:6. 1 Co 3:8. 2 Co 5:10. Ga 6:5. Ap 2:23; 22:12.
  - type: text
    content: Ainsi chacun de nous rendra compte à Dieu pour lui-même.
  - type: heading
    content: 'V. 13-23: cf. 1 Co 8; 10:23-33.'
  '13':
  - type: text
    content: 'Ne nous jugeons donc plus les uns les autres; mais pensez plutôt à ne rien faire '
  - type: note
    content: 1 Co 10:32. 2 Co 6:3.
  - type: text
    content: 'qui soit pour votre frère une pierre d’achoppement ou une occasion de chute. '
  '14':
  - type: note
    content: Mt 15:11. Ac 10:15. 1 Co 8:4. 1 Ti 4:4.
  - type: text
    content: 'Je sais et je suis persuadé par le Seigneur Jésus que rien n’est impur en soi, et qu’une chose n’est impure que pour celui qui la croit impure. '
  '15':
  - type: text
    content: 'Mais si, pour un aliment, ton frère est attristé, tu ne marches plus selon l’amour: '
  - type: note
    content: 1 Co 8:11.
  - type: text
    content: 'ne cause pas, par ton aliment, la perte de celui pour lequel Christ est mort. '
  '16':
  - type: text
    content: 'Que votre privilège ne soit pas un sujet de calomnie. '
  '17':
  - type: note
    content: 1 Co 8:8.
  - type: text
    content: 'Car le royaume de Dieu, ce n’est pas le manger et le boire, mais la justice, la paix et la joie, par le Saint-Esprit. '
  '18':
  - type: text
    content: 'Celui qui sert Christ de cette manière est agréable à Dieu et approuvé des hommes. '
  '19':
  - type: text
    content: 'Ainsi donc, recherchons ce qui contribue à la paix et à l’édification mutuelle. '
  '2':
  - type: text
    content: 'Tel croit pouvoir manger de tout: tel autre, qui est faible, ne mange que des légumes. '
  '20':
  - type: text
    content: 'Pour un aliment, ne détruis pas l’œuvre de Dieu. '
  - type: note
    content: Tit 1:15.
  - type: text
    content: 'A la vérité toutes choses sont pures; mais il est mal à l’homme, quand il mange, de devenir une pierre d’achoppement. '
  '21':
  - type: note
    content: 1 Co 8:13.
  - type: text
    content: 'Il est bien de ne pas manger de viande, de ne pas boire de vin, et de s’abstenir de ce qui peut être pour ton frère une occasion de chute, de scandale ou de faiblesse. '
  '22':
  - type: text
    content: 'Cette foi que tu as, garde-la pour toi devant Dieu. Heureux celui qui ne se condamne pas lui-même dans ce qu’il approuve! '
  '23':
  - type: text
    content: 'Mais celui qui a des doutes au sujet de ce qu’il mange est condamné, parce qu’il n’agit pas par conviction. '
  - type: note
    content: Tit 1:15.
  - type: text
    content: Tout ce qui n’est pas le produit d’une conviction est péché.
  '3':
  - type: note
    content: Col 2:16.
  - type: text
    content: 'Que celui qui mange ne méprise point celui qui ne mange pas, et que celui qui ne mange pas ne juge point celui qui mange, car Dieu l’a accueilli. '
  '4':
  - type: note
    content: Ja 4:12.
  - type: text
    content: 'Qui es-tu, toi qui juges un serviteur d’autrui? S’il se tient debout, ou s’il tombe, cela regarde son maître. Mais il se tiendra debout, car le Seigneur a le pouvoir de l’affermir. '
  '5':
  - type: note
    content: Ga 4:10. Col 2:16.
  - type: text
    content: 'Tel fait une distinction entre les jours; tel autre les estime tous égaux. Que chacun ait en son esprit une pleine conviction. '
  '6':
  - type: text
    content: 'Celui qui distingue entre les jours agit ainsi pour le Seigneur. Celui qui mange, c’est pour le Seigneur qu’il mange, '
  - type: note
    content: 1 Co 10:31. 1 Ti 4:3.
  - type: text
    content: 'car il rend grâces à Dieu; celui qui ne mange pas, c’est pour le Seigneur qu’il ne mange pas, et il rend grâces à Dieu. '
  '7':
  - type: note
    content: 2 Co 5:15. Ga 2:20. 1 Th 5:10. 1 Pi 4:2.
  - type: text
    content: 'En effet, nul de nous ne vit pour lui-même, et nul ne meurt pour lui-même. '
  '8':
  - type: text
    content: 'Car si nous vivons, nous vivons pour le Seigneur; et si nous mourons, nous mourons pour le Seigneur. Soit donc que nous vivions, soit que nous mourions, nous sommes au Seigneur. '
  '9':
  - type: text
    content: 'Car Christ est mort et il a vécu, afin de dominer sur les morts et sur les vivants. '
