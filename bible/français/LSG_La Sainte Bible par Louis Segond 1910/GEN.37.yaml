document_id: GEN.37,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Joseph vendu par ses frères
  - type: heading
    content: 'V. 1-28: cf. (1 S 18:6-9. Ge 4:3-20.) Pr 18:19. (Ac 7:9. Ge 45:4-8.) Jn 7:5.'
  - type: text
    content: 'Jacob demeura dans le pays de Canaan, où avait '
  - type: note
    content: Ge 36:7. Hé 11:9.
  - type: text
    content: 'séjourné son père. '
  '10':
  - type: text
    content: 'Il le raconta à son père et à ses frères. Son père le réprimanda, et lui dit: Que signifie ce songe que tu as eu? Faut-il que nous venions, moi, ta mère et tes frères, nous prosterner en terre devant toi? '
  '11':
  - type: text
    content: 'Ses frères '
  - type: note
    content: Ac 7:9.
  - type: text
    content: 'eurent de l’envie contre lui, mais son père garda le souvenir de ces choses. '
  '12':
  - type: text
    content: 'Les frères de Joseph étant allés à Sichem, pour faire paître le troupeau de leur père, '
  '13':
  - type: text
    content: 'Israël dit à Joseph: Tes frères ne font-ils pas paître le troupeau à Sichem? Viens, je veux t’envoyer vers eux. Et il répondit: Me voici! '
  '14':
  - type: text
    content: 'Israël lui dit: Va, je te prie, et vois si tes frères sont en bonne santé et si le troupeau est en bon état; et tu m’en rapporteras des nouvelles. Il l’envoya ainsi de la vallée d’Hébron; et Joseph alla à Sichem. '
  '15':
  - type: text
    content: 'Un homme le rencontra, comme il errait dans les champs. Il le questionna, en disant: Que cherches-tu? '
  '16':
  - type: text
    content: 'Joseph répondit: Je cherche mes frères; dis-moi, je te prie, où ils font paître leur troupeau. '
  '17':
  - type: text
    content: 'Et l’homme dit: Ils sont partis d’ici; car je les ai entendus dire: Allons à Dothan. Joseph alla après ses frères, et il les trouva à Dothan. '
  '18':
  - type: text
    content: 'Ils le virent de loin; et, avant qu’il fût près d’eux, ils complotèrent de le faire mourir. '
  '19':
  - type: text
    content: 'Ils se dirent l’un à l’autre: Voici le faiseur de songes qui arrive. '
  '2':
  - type: text
    content: 'Voici la postérité de Jacob. Joseph, âgé de dix-sept ans, faisait paître le troupeau avec ses frères; cet enfant était auprès des fils de Bilha et des fils de Zilpa, femmes de son père. Et Joseph rapportait à leur père leurs mauvais propos. '
  '20':
  - type: text
    content: 'Venez maintenant, tuons-le, et jetons-le dans une des citernes; nous dirons qu’une bête féroce l’a dévoré, et nous verrons ce que deviendront ses songes. '
  '21':
  - type: text
    content: 'Ruben entendit cela, et il le délivra de leurs mains. '
  - type: note
    content: Ge 42:22.
  - type: text
    content: 'Il dit: Ne lui ôtons pas la vie. '
  '22':
  - type: text
    content: 'Ruben leur dit: Ne répandez point de sang; jetez-le dans cette citerne qui est au désert, et ne mettez pas la main sur lui. Il avait dessein de le délivrer de leurs mains pour le faire retourner vers son père. '
  '23':
  - type: text
    content: 'Lorsque Joseph fut arrivé auprès de ses frères, ils le dépouillèrent de sa tunique, de la tunique de plusieurs couleurs, qu’il avait sur lui. '
  '24':
  - type: text
    content: 'Ils le prirent, et le jetèrent dans la citerne. Cette citerne était vide; il n’y avait point d’eau. '
  '25':
  - type: text
    content: 'Ils s’assirent ensuite pour manger. Ayant levé les yeux, ils virent une caravane d’Ismaélites venant de Galaad; leurs chameaux étaient chargés d’aromates, de baume et de myrrhe, qu’ils transportaient en Égypte. '
  '26':
  - type: text
    content: 'Alors Juda dit à ses frères: Que gagnerons-nous à tuer notre frère et à cacher son sang? '
  '27':
  - type: text
    content: 'Venez, vendons-le aux Ismaélites, et ne mettons pas la main sur lui, car il est notre frère, notre chair. Et ses frères l’écoutèrent. '
  '28':
  - type: text
    content: 'Au passage des marchands madianites, ils tirèrent et firent remonter Joseph hors de la citerne; et '
  - type: note
    content: Ps 105:17. Ac 7:9.
  - type: text
    content: ils le vendirent pour vingt sicles d’argent aux Ismaélites, qui l’emmenèrent en Égypte.
  - type: heading
    content: 'V. 29-36: cf. Pr 28:13. Jé 31:15-17. Ge 45:28.'
  '29':
  - type: text
    content: 'Ruben revint à la citerne; et voici, Joseph n’était plus dans la citerne. Il déchira ses vêtements, '
  '3':
  - type: text
    content: 'Israël aimait Joseph plus que tous ses autres fils, parce qu’il l’avait eu dans sa vieillesse; et il lui fit une tunique de plusieurs couleurs. '
  '30':
  - type: text
    content: 'retourna vers ses frères, et dit: L’enfant n’y est plus! Et moi, où irai-je? '
  '31':
  - type: text
    content: 'Ils prirent alors la tunique de Joseph; et, ayant tué un bouc, ils plongèrent la tunique dans le sang. '
  '32':
  - type: text
    content: 'Ils envoyèrent à leur père la tunique de plusieurs couleurs, en lui faisant dire: Voici ce que nous avons trouvé! Reconnais si c’est la tunique de ton fils, ou non. '
  '33':
  - type: text
    content: 'Jacob la reconnut, et dit: C’est la tunique de mon fils! '
  - type: note
    content: Ge 44:28.
  - type: text
    content: 'une bête féroce l’a dévoré! Joseph a été mis en pièces! '
  '34':
  - type: text
    content: 'Et il déchira ses vêtements, il mit un sac sur ses reins, et il porta longtemps le deuil de son fils. '
  '35':
  - type: text
    content: 'Tous ses fils et toutes ses filles vinrent pour le consoler; mais il ne voulut recevoir aucune consolation. Il disait: '
  - type: note
    content: Ge 42:38; 44:29, 31.
  - type: text
    content: 'C’est en pleurant que je descendrai vers mon fils au séjour des morts! Et il pleurait son fils. '
  '36':
  - type: note
    content: Ge 39:1. Ps 105:17.
  - type: text
    content: Les Madianites le vendirent en Égypte à Potiphar, officier de Pharaon, chef des gardes.
  '4':
  - type: text
    content: 'Ses frères virent que leur père l’aimait plus qu’eux tous, et '
  - type: note
    content: Ge 49:23.
  - type: text
    content: 'ils le prirent en haine. Ils ne pouvaient lui parler avec amitié. '
  '5':
  - type: text
    content: 'Joseph eut un songe, et il le raconta à ses frères, qui le haïrent encore davantage. '
  '6':
  - type: text
    content: 'Il leur dit: Écoutez donc ce songe que j’ai eu! '
  '7':
  - type: text
    content: 'Nous étions à lier des gerbes au milieu des champs; et voici, ma gerbe se leva et se tint debout, et vos gerbes l’entourèrent et se prosternèrent devant elle. '
  '8':
  - type: text
    content: 'Ses frères lui dirent: Est-ce que tu régneras sur nous? Est-ce que tu nous gouverneras? Et ils le haïrent encore davantage, à cause de ses songes et à cause de ses paroles. '
  '9':
  - type: text
    content: 'Il eut encore un autre songe, et il le raconta à ses frères. Il dit: J’ai eu encore un songe! Et voici, le soleil, la lune et onze étoiles se prosternaient devant moi. '
