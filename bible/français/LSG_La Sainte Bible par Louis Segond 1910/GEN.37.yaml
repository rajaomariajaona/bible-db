document_id: GEN.37,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Joseph vendu par ses frères
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-28: cf. (1 S 18:6-9. Ge 4:3-20.) Pr 18:19. (Ac 7:9. Ge 45:4-8.) Jn 7:5.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jacob demeura dans le pays de Canaan, où avait '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 36:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 11:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'séjourné son père. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il le raconta à son père et à ses frères. Son père le réprimanda, et lui dit: Que signifie ce songe que tu as eu? Faut-il que nous venions, moi, ta mère et tes frères, nous prosterner en terre devant toi? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ses frères '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 7:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'eurent de l’envie contre lui, mais son père garda le souvenir de ces choses. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les frères de Joseph étant allés à Sichem, pour faire paître le troupeau de leur père, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Israël dit à Joseph: Tes frères ne font-ils pas paître le troupeau à Sichem? Viens, je veux t’envoyer vers eux. Et il répondit: Me voici! '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Israël lui dit: Va, je te prie, et vois si tes frères sont en bonne santé et si le troupeau est en bon état; et tu m’en rapporteras des nouvelles. Il l’envoya ainsi de la vallée d’Hébron; et Joseph alla à Sichem. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un homme le rencontra, comme il errait dans les champs. Il le questionna, en disant: Que cherches-tu? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joseph répondit: Je cherche mes frères; dis-moi, je te prie, où ils font paître leur troupeau. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et l’homme dit: Ils sont partis d’ici; car je les ai entendus dire: Allons à Dothan. Joseph alla après ses frères, et il les trouva à Dothan. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils le virent de loin; et, avant qu’il fût près d’eux, ils complotèrent de le faire mourir. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils se dirent l’un à l’autre: Voici le faiseur de songes qui arrive. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici la postérité de Jacob. Joseph, âgé de dix-sept ans, faisait paître le troupeau avec ses frères; cet enfant était auprès des fils de Bilha et des fils de Zilpa, femmes de son père. Et Joseph rapportait à leur père leurs mauvais propos. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Venez maintenant, tuons-le, et jetons-le dans une des citernes; nous dirons qu’une bête féroce l’a dévoré, et nous verrons ce que deviendront ses songes. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ruben entendit cela, et il le délivra de leurs mains. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 42:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Il dit: Ne lui ôtons pas la vie. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ruben leur dit: Ne répandez point de sang; jetez-le dans cette citerne qui est au désert, et ne mettez pas la main sur lui. Il avait dessein de le délivrer de leurs mains pour le faire retourner vers son père. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque Joseph fut arrivé auprès de ses frères, ils le dépouillèrent de sa tunique, de la tunique de plusieurs couleurs, qu’il avait sur lui. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils le prirent, et le jetèrent dans la citerne. Cette citerne était vide; il n’y avait point d’eau. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils s’assirent ensuite pour manger. Ayant levé les yeux, ils virent une caravane d’Ismaélites venant de Galaad; leurs chameaux étaient chargés d’aromates, de baume et de myrrhe, qu’ils transportaient en Égypte. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Juda dit à ses frères: Que gagnerons-nous à tuer notre frère et à cacher son sang? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Venez, vendons-le aux Ismaélites, et ne mettons pas la main sur lui, car il est notre frère, notre chair. Et ses frères l’écoutèrent. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Au passage des marchands madianites, ils tirèrent et firent remonter Joseph hors de la citerne; et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 105:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 7:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: ils le vendirent pour vingt sicles d’argent aux Ismaélites, qui l’emmenèrent en Égypte.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 29-36: cf. Pr 28:13. Jé 31:15-17. Ge 45:28.'
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ruben revint à la citerne; et voici, Joseph n’était plus dans la citerne. Il déchira ses vêtements, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Israël aimait Joseph plus que tous ses autres fils, parce qu’il l’avait eu dans sa vieillesse; et il lui fit une tunique de plusieurs couleurs. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'retourna vers ses frères, et dit: L’enfant n’y est plus! Et moi, où irai-je? '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils prirent alors la tunique de Joseph; et, ayant tué un bouc, ils plongèrent la tunique dans le sang. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils envoyèrent à leur père la tunique de plusieurs couleurs, en lui faisant dire: Voici ce que nous avons trouvé! Reconnais si c’est la tunique de ton fils, ou non. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jacob la reconnut, et dit: C’est la tunique de mon fils! '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 44:28
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'une bête féroce l’a dévoré! Joseph a été mis en pièces! '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et il déchira ses vêtements, il mit un sac sur ses reins, et il porta longtemps le deuil de son fils. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tous ses fils et toutes ses filles vinrent pour le consoler; mais il ne voulut recevoir aucune consolation. Il disait: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 42:38
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 44:29
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '31'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'C’est en pleurant que je descendrai vers mon fils au séjour des morts! Et il pleurait son fils. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 39:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 105:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Les Madianites le vendirent en Égypte à Potiphar, officier de Pharaon, chef des gardes.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ses frères virent que leur père l’aimait plus qu’eux tous, et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 49:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'ils le prirent en haine. Ils ne pouvaient lui parler avec amitié. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joseph eut un songe, et il le raconta à ses frères, qui le haïrent encore davantage. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il leur dit: Écoutez donc ce songe que j’ai eu! '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous étions à lier des gerbes au milieu des champs; et voici, ma gerbe se leva et se tint debout, et vos gerbes l’entourèrent et se prosternèrent devant elle. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ses frères lui dirent: Est-ce que tu régneras sur nous? Est-ce que tu nous gouverneras? Et ils le haïrent encore davantage, à cause de ses songes et à cause de ses paroles. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il eut encore un autre songe, et il le raconta à ses frères. Il dit: J’ai eu encore un songe! Et voici, le soleil, la lune et onze étoiles se prosternaient devant moi. '
