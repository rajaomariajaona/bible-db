document_id: ISA.63,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Un jour de vengeance
  - type: heading
    content: 'V. 1-6: cf. És 34:1-8. Ap 19:11, etc.'
  - type: text
    content: Qui est celui-ci qui vient d’Édom,
  - type: text
    content: De Botsra, en vêtements rouges,
  - type: text
    content: En habits éclatants,
  - type: text
    content: Et se redressant avec fierté dans la plénitude de sa force?
  - type: text
    content: C’est moi qui ai promis le salut,
  - type: text
    content: Qui ai le pouvoir de délivrer.
  '10':
  - type: text
    content: ' '
  - type: note
    content: No 14:11. Ps 78:57; 94:9, etc.
  - type: text
    content: Mais ils ont été rebelles, ils ont attristé son esprit saint;
  - type: text
    content: Et il est devenu leur ennemi, il a combattu contre eux.
  '11':
  - type: text
    content: 'Alors son peuple se souvint des anciens jours de Moïse:'
  - type: text
    content: Où est celui qui les fit monter de la mer,
  - type: text
    content: Avec le berger de son troupeau?
  - type: text
    content: Où est celui qui mettait au milieu d’eux son esprit saint;
  '12':
  - type: text
    content: Qui dirigea la droite de Moïse,
  - type: text
    content: Par son bras glorieux;
  - type: text
    content: Qui fendit les eaux devant eux,
  - type: text
    content: Pour se faire un nom éternel;
  '13':
  - type: text
    content: Qui les dirigea au travers des flots,
  - type: text
    content: Comme un coursier dans le désert,
  - type: note
    content: Ps 105:37.
  - type: text
    content: Sans qu’ils bronchassent?
  '14':
  - type: text
    content: Comme la bête qui descend dans la vallée,
  - type: text
    content: L’esprit de l’Éternel les a menés au repos.
  - type: text
    content: C’est ainsi que tu as conduit ton peuple,
  - type: text
    content: Pour te faire un nom glorieux.
  - type: heading
    content: 'V. 15-19: cf. És 64:7-11.'
  '15':
  - type: text
    content: ' '
  - type: note
    content: De 26:15.
  - type: text
    content: Regarde du ciel, et vois,
  - type: text
    content: 'De ta demeure sainte et glorieuse:'
  - type: text
    content: Où sont ton zèle et ta puissance?
  - type: text
    content: Le frémissement de tes entrailles et tes compassions
  - type: text
    content: Ne se font plus sentir envers moi.
  '16':
  - type: text
    content: Tu es cependant notre père,
  - type: text
    content: Car Abraham ne nous connaît pas,
  - type: text
    content: Et Israël ignore qui nous sommes;
  - type: text
    content: C’est toi, Éternel, qui es notre père,
  - type: text
    content: Qui, dès l’éternité, t’appelles notre sauveur.
  '17':
  - type: text
    content: Pourquoi, ô Éternel, nous fais-tu errer loin de tes voies,
  - type: text
    content: Et endurcis-tu notre cœur contre ta crainte?
  - type: text
    content: Reviens, pour l’amour de tes serviteurs,
  - type: text
    content: Des tribus de ton héritage!
  '18':
  - type: text
    content: Ton peuple saint n’a possédé le pays que peu de temps;
  - type: text
    content: 'Nos ennemis ont foulé '
  - type: note
    content: Ps 74:7.
  - type: text
    content: ton sanctuaire.
  '19':
  - type: text
    content: Nous sommes depuis longtemps comme un peuple que tu ne gouvernes pas,
  - type: text
    content: Et qui n’est point appelé de ton nom…
  - type: heading
    content: 'V. 1-6: cf. (Ps 68:2, 3, 8, 9. És 51:9, 10.) (Ps 31:20. 1 Co 2:7-10.) Esd 9:6, 7.'
  - type: text
    content: Oh! Si tu déchirais les cieux, et si tu descendais,
  - type: text
    content: Les montagnes s’ébranleraient devant toi,
  '2':
  - type: text
    content: ' '
  - type: note
    content: Ap 19:13.
  - type: text
    content: Pourquoi tes habits sont-ils rouges,
  - type: text
    content: Et tes vêtements comme les vêtements de celui qui foule dans la cuve?
  '3':
  - type: text
    content: J’ai été seul à fouler au pressoir,
  - type: text
    content: Et nul homme d’entre les peuples n’était avec moi;
  - type: text
    content: Je les ai foulés dans ma colère,
  - type: text
    content: Je les ai écrasés dans ma fureur;
  - type: text
    content: Leur sang a jailli sur mes vêtements,
  - type: text
    content: Et j’ai souillé tous mes habits.
  '4':
  - type: text
    content: 'Car '
  - type: note
    content: És 61:2.
  - type: text
    content: un jour de vengeance était dans mon cœur,
  - type: text
    content: Et l’année de mes rachetés est venue.
  '5':
  - type: text
    content: ' '
  - type: note
    content: És 59:16.
  - type: text
    content: Je regardais, et personne pour m’aider;
  - type: text
    content: J’étais étonné, et personne pour me soutenir;
  - type: text
    content: Alors mon bras m’a été en aide,
  - type: text
    content: Et ma fureur m’a servi d’appui.
  '6':
  - type: text
    content: J’ai foulé des peuples dans ma colère,
  - type: text
    content: Je les ai rendus ivres dans ma fureur,
  - type: text
    content: Et j’ai répandu leur sang sur la terre.
  - type: heading
    content: Prière du peuple de Dieu
  - type: heading
    content: 'V. 7-14: cf. Ps 78.'
  '7':
  - type: text
    content: Je publierai les grâces de l’Éternel, les louanges de l’Éternel,
  - type: text
    content: D’après tout ce que l’Éternel a fait pour nous;
  - type: text
    content: Je dirai sa grande bonté envers la maison d’Israël,
  - type: text
    content: Qu’il a traitée selon ses compassions et la richesse de son amour.
  '8':
  - type: text
    content: 'Il avait dit: Certainement ils sont mon peuple,'
  - type: text
    content: Des enfants qui ne seront pas infidèles!
  - type: text
    content: Et il a été pour eux un sauveur.
  '9':
  - type: text
    content: Dans toutes leurs détresses ils n’ont pas été sans secours,
  - type: text
    content: Et l’ange qui est devant sa face les a sauvés;
  - type: text
    content: 'Il les a lui-même rachetés, '
  - type: note
    content: De 7:7, 8, 9.
  - type: text
    content: dans son amour et sa miséricorde,
  - type: text
    content: Et constamment il les a soutenus et portés, aux anciens jours.
