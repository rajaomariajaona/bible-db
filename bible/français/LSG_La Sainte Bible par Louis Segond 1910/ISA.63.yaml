document_id: ISA.63,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Un jour de vengeance
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-6: cf. És 34:1-8. Ap 19:11, etc.'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui est celui-ci qui vient d’Édom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De Botsra, en vêtements rouges,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En habits éclatants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et se redressant avec fierté dans la plénitude de sa force?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est moi qui ai promis le salut,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui ai le pouvoir de délivrer.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 14:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 78:57
      - type: text
        text: ; 94:9, etc.
      marker-yv: yv-n
    - type: text
      text: Mais ils ont été rebelles, ils ont attristé son esprit saint;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il est devenu leur ennemi, il a combattu contre eux.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Alors son peuple se souvint des anciens jours de Moïse:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Où est celui qui les fit monter de la mer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avec le berger de son troupeau?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Où est celui qui mettait au milieu d’eux son esprit saint;
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui dirigea la droite de Moïse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par son bras glorieux;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui fendit les eaux devant eux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour se faire un nom éternel;
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui les dirigea au travers des flots,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme un coursier dans le désert,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 105:37
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Sans qu’ils bronchassent?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme la bête qui descend dans la vallée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’esprit de l’Éternel les a menés au repos.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est ainsi que tu as conduit ton peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour te faire un nom glorieux.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 15-19: cf. És 64:7-11.'
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 26:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Regarde du ciel, et vois,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'De ta demeure sainte et glorieuse:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Où sont ton zèle et ta puissance?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le frémissement de tes entrailles et tes compassions
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne se font plus sentir envers moi.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu es cependant notre père,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car Abraham ne nous connaît pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et Israël ignore qui nous sommes;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est toi, Éternel, qui es notre père,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui, dès l’éternité, t’appelles notre sauveur.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi, ô Éternel, nous fais-tu errer loin de tes voies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et endurcis-tu notre cœur contre ta crainte?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Reviens, pour l’amour de tes serviteurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des tribus de ton héritage!
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ton peuple saint n’a possédé le pays que peu de temps;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Nos ennemis ont foulé '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 74:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: ton sanctuaire.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous sommes depuis longtemps comme un peuple que tu ne gouvernes pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qui n’est point appelé de ton nom…
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-6: cf. (Ps 68:2, 3, 8, 9. És 51:9, 10.) (Ps 31:20. 1 Co 2:7-10.) Esd 9:6, 7.'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oh! Si tu déchirais les cieux, et si tu descendais,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les montagnes s’ébranleraient devant toi,
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 19:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Pourquoi tes habits sont-ils rouges,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tes vêtements comme les vêtements de celui qui foule dans la cuve?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai été seul à fouler au pressoir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et nul homme d’entre les peuples n’était avec moi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je les ai foulés dans ma colère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je les ai écrasés dans ma fureur;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leur sang a jailli sur mes vêtements,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et j’ai souillé tous mes habits.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 61:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: un jour de vengeance était dans mon cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’année de mes rachetés est venue.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 59:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Je regardais, et personne pour m’aider;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’étais étonné, et personne pour me soutenir;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors mon bras m’a été en aide,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ma fureur m’a servi d’appui.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai foulé des peuples dans ma colère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je les ai rendus ivres dans ma fureur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et j’ai répandu leur sang sur la terre.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prière du peuple de Dieu
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 7-14: cf. Ps 78.'
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je publierai les grâces de l’Éternel, les louanges de l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: D’après tout ce que l’Éternel a fait pour nous;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je dirai sa grande bonté envers la maison d’Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’il a traitée selon ses compassions et la richesse de son amour.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Il avait dit: Certainement ils sont mon peuple,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des enfants qui ne seront pas infidèles!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il a été pour eux un sauveur.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans toutes leurs détresses ils n’ont pas été sans secours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’ange qui est devant sa face les a sauvés;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Il les a lui-même rachetés, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 7:7
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '9'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: dans son amour et sa miséricorde,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et constamment il les a soutenus et portés, aux anciens jours.
