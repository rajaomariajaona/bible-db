document_id: NEH.6,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nouveaux obstacles surmontés par Néhémie
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-19: cf. (Né 4. Da 9:25.) Ps 124; 129; 119:108-110. 2 Co 2:11.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Je n’avais pas encore posé les battants des portes, lorsque Sanballat, Tobija, Guéschem, l’Arabe, et nos autres ennemis apprirent que j’avais rebâti la muraille et qu’il n’y restait plus de brèche. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Je me rendis chez Schemaeja, fils de Delaja, fils de Mehétabeel. Il s’était enfermé, et il dit: Allons ensemble dans la maison de Dieu, au milieu du temple, et fermons les portes du temple; car ils viennent pour te tuer, et c’est pendant la nuit qu’ils viendront pour te tuer. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Je répondis: Un homme comme moi prendre la fuite! Et quel homme tel que moi pourrait entrer dans le temple et vivre? Je n’entrerai point. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Et je reconnus que ce n’était pas Dieu qui l’envoyait. Mais il prophétisa ainsi sur moi parce que Sanballat et Tobija lui avaient donné de l’argent. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'En le gagnant ainsi, ils espéraient que j’aurais peur, et que je suivrais ses avis et commettrais un péché; et ils auraient profité de cette atteinte à ma réputation pour me couvrir d’opprobre. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Souviens-toi, ô mon Dieu, de Tobija et de Sanballat, et de leurs œuvres! Souviens-toi aussi de Noadia, la prophétesse, et des autres prophètes qui cherchaient à m’effrayer! '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'La muraille fut achevée le vingt-cinquième jour du mois d’Élul, en cinquante-deux jours. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Lorsque tous nos ennemis l’apprirent, toutes les nations qui étaient autour de nous furent dans la crainte; elles éprouvèrent une grande humiliation, et reconnurent que l’œuvre s’était accomplie par la volonté de notre Dieu. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Dans ce temps-là, il y avait aussi des grands de Juda qui adressaient fréquemment des lettres à Tobija et qui en recevaient de lui. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Car plusieurs en Juda étaient liés à lui par serment, parce qu’il était gendre de Schecania, fils d’Arach, et que son fils Jochanan avait pris la fille de Meschullam, fils de Bérékia. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ils disaient même du bien de lui en ma présence, et ils lui rapportaient mes paroles. Tobija envoyait des lettres pour m’effrayer.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Alors Sanballat et Guéschem m’envoyèrent dire: Viens, et ayons ensemble une entrevue dans les villages de la vallée d’Ono. Ils avaient médité de me faire du mal. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Je leur envoyai des messagers avec cette réponse: J’ai un grand ouvrage à exécuter, et je ne puis descendre; le travail serait interrompu pendant que je le quitterais pour aller vers vous. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ils m’adressèrent quatre fois la même demande, et je leur fis la même réponse. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Sanballat m’envoya ce message une cinquième fois par son serviteur, qui tenait à la main une lettre ouverte. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Il y était écrit: Le bruit se répand parmi les nations et Gaschmu affirme que toi et les Juifs vous pensez à vous révolter, et que c’est dans ce but que tu rebâtis la muraille. Tu vas, dit-on, devenir leur roi, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'tu as même établi des prophètes pour te proclamer à Jérusalem roi de Juda. Et maintenant ces choses arriveront à la connaissance du roi. Viens donc, et consultons-nous ensemble. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Je fis répondre à Sanballat: Ce que tu dis là n’est pas; c’est toi qui l’inventes! '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Tous ces gens voulaient nous effrayer, et ils se disaient: Ils perdront courage, et l’œuvre ne se fera pas. Maintenant, ô Dieu, fortifie-moi! '
