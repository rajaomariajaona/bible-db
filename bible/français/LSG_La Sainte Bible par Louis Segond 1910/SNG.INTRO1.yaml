type_code: fra
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: INTRODUCTION AU LIVRE DU CANTIQUE DES CANTIQUES
  - type: usfm
    marker: imt3
    children:
    - type: text
      text: (Ro 8:38, 39. 2 Co 11:2, 3. Pr 1:17.)
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Ce livre, attribué à Salomon, est un recueil de chants d’amour d’un bien-aimé et d’une bien-aimée qui s’apprécient sans fausse pudeur. Le langage très érotique de ce livre a amené plusieurs savants au cours de l’histoire à proposer de comprendre le Cantique des Cantiques comme un poème symbolique et même typologique, décrivant les relations entre Dieu et son peuple. Cependant rien dans le texte n’exige pareille lecture.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Le recours au vocabulaire de la tendresse physique a souvent choqué. C’est un des livres de la Bible qui a fait couler beaucoup d’encre. Rien que dans la littérature de la synagogue, on a recensé 49 commentaires officiels le concerrant. Toutefois, c’est un précieux poème d’amour humain, véritable don de Dieu, et il doit être pris comme tel. Sept poèmes articulent ce livre du Cantique des Cantiques:'
  - type: usfm
    marker: ipi
    children:
    - type: text
      text: 'Chapitres 1:2 à 2:7: le dialogue amoureux entre Elle et Lui, thème du poème.'
  - type: usfm
    marker: ipi
    children:
    - type: text
      text: 'Chapitre 2:8-17: l’arrivée du bien-aimé: le voici, il vient. C’est le chant de la bien-aimée.'
  - type: usfm
    marker: ipi
    children:
    - type: text
      text: 'Chapitres 3:1 à 5:1: elle rêve qu’elle le cherche et le trouve.'
  - type: usfm
    marker: ipi
    children:
    - type: text
      text: 'Chapitres 5:2 à 6:3: elle lui ouvre sa porte mais trop tard. C’est le cauchemar de la rencontre manquée.'
  - type: usfm
    marker: ipi
    children:
    - type: text
      text: 'Chapitres 6:4 à 7:11: le bien-aimé fait le portrait de sa fiancée. C’est le duo amoureux.'
  - type: usfm
    marker: ipi
    children:
    - type: text
      text: 'Chapitres 7:12 à 8:5: c’est un bonheur que d’être aimé.'
  - type: usfm
    marker: ipi
    children:
    - type: text
      text: 'Chapitre 8:6-14: l’amour est aussi fort que la mort. C’est aussi le rapport aux frères, aux amis et à Salomon.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: En somme, telles sont les grandes articulations de ce poème qui valorise le portrait physique de toute personne aimée. S’aimer et aimer son conjoint, c’est surtout savoir s’apprécier non seulement sur le plan moral mais aussi sur le plan physique.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'L’amour est un don de l’Éternel pour tout couple. Ce livre contient les dialogues d’un homme et d’une femme qui se cherchent, se trouvent, se perdent et se recherchent. Des voix étrangères interrompent parfois ces dialogues; ces interférences humaines entravent l’harmonie du couple qui souhaiterait vivre un amour continu. Ces personnages qui interfèrent sont: les frères (1:6; 8:8-9), Salomon, mentionné à six reprises (1:1, 5; 3:7, 11; 8:11, 12), les filles de Jérusalem, évoquées sept fois (1:5; 2:7; 3:5, 11; 5:8, 16; 8:4) et les gardes (3:3; 5:7). En somme, l’amour est une flamme du Seigneur que même les grandes eaux ne peuvent éteindre.'
