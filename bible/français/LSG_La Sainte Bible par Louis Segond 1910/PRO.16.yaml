        text: Job 28:15
      metadata:
        usfm: JOB.28.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 19:11
      metadata:
        usfm: PSA.19.11
    - type: text
      text: '; '
    - type: usfm
      marker: ref
