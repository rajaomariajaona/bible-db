    marker-yv: yv-n
  - type: text
    text: Recommande à l’Éternel tes œuvres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tes projets réussiront.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: L’Éternel a tout fait pour un but,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 21:30
      metadata:
        usfm: JOB.21.30
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Même le méchant pour le jour du malheur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 6:17
      metadata:
        usfm: PRO.6.17
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 8:13
      metadata:
        usfm: PRO.8.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Tout cœur hautain est en abomination à l’Éternel;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 11:21
      metadata:
        usfm: PRO.11.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Certes, il ne restera pas impuni.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Par la bonté et la fidélité on expie l’iniquité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et par la crainte de l’Éternel on se détourne du mal.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Quand l’Éternel approuve les voies d’un homme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il dispose favorablement à son égard même ses ennemis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 37:6
      metadata:
        usfm: PSA.37.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 15:16
      metadata:
        usfm: PRO.15.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Mieux vaut peu, avec la justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que de grands revenus, avec l’injustice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Le cœur de l’homme médite sa voie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais c’est l’Éternel qui dirige ses pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Des oracles sont sur les lèvres du roi:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sa bouche ne doit pas être infidèle quand il juge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 19:36
      metadata:
        usfm: LEV.19.36
    - type: text
      text: '. De 25:13, etc. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 11:1
      metadata:
        usfm: PRO.11.1
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 20:10
      metadata:
        usfm: PRO.20.10
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '23'
      metadata:
        usfm: PRO.20.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Le poids et la balance justes sont à l’Éternel;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous les poids du sac sont son ouvrage.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Les rois ont horreur de faire le mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car c’est par la justice que le trône s’affermit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Les lèvres justes gagnent la faveur des rois,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils aiment celui qui parle avec droiture.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 19:12
      metadata:
        usfm: PRO.19.12
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 20:2
      metadata:
        usfm: PRO.20.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: La fureur du roi est un messager de mort,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et un homme sage doit l’apaiser.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 19:12
      metadata:
        usfm: PRO.19.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: La sérénité du visage du roi donne la vie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et sa faveur est comme une pluie du printemps.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
