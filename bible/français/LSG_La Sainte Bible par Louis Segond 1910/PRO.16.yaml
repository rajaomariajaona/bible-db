  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'v. 9. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 19:21
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 20:24
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 10:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Les projets que forme le cœur dépendent de l’homme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais la réponse que donne la bouche vient de l’Éternel.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Des oracles sont sur les lèvres du roi:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sa bouche ne doit pas être infidèle quand il juge.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 19:36
      - type: text
        text: '. De 25:13, etc. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 11:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 20:10
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '23'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Le poids et la balance justes sont à l’Éternel;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous les poids du sac sont son ouvrage.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Les rois ont horreur de faire le mal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car c’est par la justice que le trône s’affermit.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Les lèvres justes gagnent la faveur des rois,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils aiment celui qui parle avec droiture.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 19:12
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 20:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: La fureur du roi est un messager de mort,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et un homme sage doit l’apaiser.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 19:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: La sérénité du visage du roi donne la vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et sa faveur est comme une pluie du printemps.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 28:15
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 19:11
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 119:72
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 3:14
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '15'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:11
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '19'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Combien acquérir la sagesse vaut mieux que l’or!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Combien acquérir l’intelligence est préférable à l’argent!
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Le chemin des hommes droits, c’est d’éviter le mal;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui garde son âme veille sur sa voie.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 11:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 17:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: L’arrogance précède la ruine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’orgueil précède la chute.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Mieux vaut être humble avec les humbles
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que de partager le butin avec les orgueilleux.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 21:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Toutes les voies de l’homme sont pures à ses yeux;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais celui qui pèse les esprits, c’est l’Éternel.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Celui qui réfléchit sur les choses trouve le bonheur,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 2:12
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 34:9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 125:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 30:18
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 17:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Et celui qui se confie en l’Éternel est heureux.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Celui qui est sage de cœur est appelé intelligent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la douceur des lèvres augmente le savoir.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'La sagesse est '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 13:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: une source de vie pour celui qui la possède;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le châtiment des insensés, c’est leur folie.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Celui qui est sage de cœur manifeste la sagesse par sa bouche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’accroissement de son savoir paraît sur ses lèvres.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Les paroles agréables sont un rayon de miel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Douces pour l’âme et salutaires pour le corps.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 14:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Telle voie paraît droite à un homme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais son issue, c’est la voie de la mort.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Celui qui travaille, travaille pour lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car sa bouche l’y excite.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: L’homme pervers prépare le malheur,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 12:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Et il y a sur ses lèvres comme un feu ardent.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 15:18
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 26:21
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 29:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: L’homme pervers excite des querelles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le rapporteur divise les amis.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: L’homme violent séduit son prochain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le fait marcher dans une voie qui n’est pas bonne.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 37:5
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 55:23
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 6:25
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 12:22
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 5:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Recommande à l’Éternel tes œuvres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tes projets réussiront.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 6:13
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Celui qui ferme les yeux pour se livrer à des pensées perverses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui se mord les lèvres, a déjà consommé le mal.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Les cheveux blancs sont une couronne d’honneur;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est dans le chemin de la justice qu’on la trouve.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Celui qui est lent à la colère vaut mieux qu’un héros,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et celui qui est maître de lui-même, que celui qui prend des villes.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: On jette le sort dans le pan de la robe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais toute décision vient de l’Éternel.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: L’Éternel a tout fait pour un but,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 21:30
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Même le méchant pour le jour du malheur.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 6:17
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Tout cœur hautain est en abomination à l’Éternel;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 11:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Certes, il ne restera pas impuni.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Par la bonté et la fidélité on expie l’iniquité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et par la crainte de l’Éternel on se détourne du mal.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Quand l’Éternel approuve les voies d’un homme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il dispose favorablement à son égard même ses ennemis.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 37:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 15:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Mieux vaut peu, avec la justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que de grands revenus, avec l’injustice.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Le cœur de l’homme médite sa voie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais c’est l’Éternel qui dirige ses pas.
