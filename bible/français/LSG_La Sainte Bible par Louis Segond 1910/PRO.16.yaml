      metadata:
        usfm: PSA.119.72
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 3:14
      metadata:
        usfm: PRO.3.14
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '15'
      metadata:
        usfm: PRO.3.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 8:11
      metadata:
        usfm: PRO.8.11
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '19'
      metadata:
        usfm: PRO.8.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Combien acquérir la sagesse vaut mieux que l’or!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Combien acquérir l’intelligence est préférable à l’argent!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Le chemin des hommes droits, c’est d’éviter le mal;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celui qui garde son âme veille sur sa voie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 11:2
      metadata:
        usfm: PRO.11.2
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 17:19
      metadata:
        usfm: PRO.17.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: L’arrogance précède la ruine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et l’orgueil précède la chute.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Mieux vaut être humble avec les humbles
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que de partager le butin avec les orgueilleux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Celui qui réfléchit sur les choses trouve le bonheur,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 2:12
      metadata:
        usfm: PSA.2.12
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 34:9
      metadata:
        usfm: PSA.34.9
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 125:1
      metadata:
        usfm: PSA.125.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 30:18
      metadata:
        usfm: ISA.30.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 17:7
      metadata:
        usfm: JER.17.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et celui qui se confie en l’Éternel est heureux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Celui qui est sage de cœur est appelé intelligent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la douceur des lèvres augmente le savoir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'La sagesse est '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 13:14
      metadata:
        usfm: PRO.13.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: une source de vie pour celui qui la possède;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le châtiment des insensés, c’est leur folie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Celui qui est sage de cœur manifeste la sagesse par sa bouche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et l’accroissement de son savoir paraît sur ses lèvres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Les paroles agréables sont un rayon de miel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Douces pour l’âme et salutaires pour le corps.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 14:12
      metadata:
        usfm: PRO.14.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Telle voie paraît droite à un homme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais son issue, c’est la voie de la mort.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Celui qui travaille, travaille pour lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car sa bouche l’y excite.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: L’homme pervers prépare le malheur,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 12:18
      metadata:
        usfm: PRO.12.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et il y a sur ses lèvres comme un feu ardent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 15:18
      metadata:
        usfm: PRO.15.18
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 26:21
      metadata:
        usfm: PRO.26.21
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 29:22
      metadata:
        usfm: PRO.29.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: L’homme pervers excite des querelles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le rapporteur divise les amis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: L’homme violent séduit son prochain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le fait marcher dans une voie qui n’est pas bonne.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 6:13
      metadata:
        usfm: PRO.6.13
    - type: text
      text: ', '
    - type: usfm
