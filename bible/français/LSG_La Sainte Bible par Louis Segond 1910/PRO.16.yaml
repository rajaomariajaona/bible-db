document_id: PRO.16,93
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: v. 9. Pr 19:21; 20:24. Jé 10:23.
  - type: text
    content: Les projets que forme le cœur dépendent de l’homme,
  - type: text
    content: Mais la réponse que donne la bouche vient de l’Éternel.
  '10':
  - type: text
    content: 'Des oracles sont sur les lèvres du roi:'
  - type: text
    content: Sa bouche ne doit pas être infidèle quand il juge.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Lé 19:36. De 25:13, etc. Pr 11:1; 20:10, 23.
  - type: text
    content: Le poids et la balance justes sont à l’Éternel;
  - type: text
    content: Tous les poids du sac sont son ouvrage.
  '12':
  - type: text
    content: Les rois ont horreur de faire le mal,
  - type: text
    content: Car c’est par la justice que le trône s’affermit.
  '13':
  - type: text
    content: Les lèvres justes gagnent la faveur des rois,
  - type: text
    content: Et ils aiment celui qui parle avec droiture.
  '14':
  - type: text
    content: ' '
  - type: note
    content: Pr 19:12; 20:2.
  - type: text
    content: La fureur du roi est un messager de mort,
  - type: text
    content: Et un homme sage doit l’apaiser.
  '15':
  - type: text
    content: ' '
  - type: note
    content: Pr 19:12.
  - type: text
    content: La sérénité du visage du roi donne la vie,
  - type: text
    content: Et sa faveur est comme une pluie du printemps.
  '16':
  - type: text
    content: ' '
  - type: note
    content: Job 28:15. Ps 19:11; 119:72. Pr 3:14, 15; 8:11, 19.
  - type: text
    content: Combien acquérir la sagesse vaut mieux que l’or!
  - type: text
    content: Combien acquérir l’intelligence est préférable à l’argent!
  '17':
  - type: text
    content: Le chemin des hommes droits, c’est d’éviter le mal;
  - type: text
    content: Celui qui garde son âme veille sur sa voie.
  '18':
  - type: text
    content: ' '
  - type: note
    content: Pr 11:2; 17:19.
  - type: text
    content: L’arrogance précède la ruine,
  - type: text
    content: Et l’orgueil précède la chute.
  '19':
  - type: text
    content: Mieux vaut être humble avec les humbles
  - type: text
    content: Que de partager le butin avec les orgueilleux.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Pr 21:2.
  - type: text
    content: Toutes les voies de l’homme sont pures à ses yeux;
  - type: text
    content: Mais celui qui pèse les esprits, c’est l’Éternel.
  '20':
  - type: text
    content: Celui qui réfléchit sur les choses trouve le bonheur,
  - type: note
    content: Ps 2:12; 34:9; 125:1. És 30:18. Jé 17:7.
  - type: text
    content: Et celui qui se confie en l’Éternel est heureux.
  '21':
  - type: text
    content: Celui qui est sage de cœur est appelé intelligent,
  - type: text
    content: Et la douceur des lèvres augmente le savoir.
  '22':
  - type: text
    content: 'La sagesse est '
  - type: note
    content: Pr 13:14.
  - type: text
    content: une source de vie pour celui qui la possède;
  - type: text
    content: Et le châtiment des insensés, c’est leur folie.
  '23':
  - type: text
    content: Celui qui est sage de cœur manifeste la sagesse par sa bouche,
  - type: text
    content: Et l’accroissement de son savoir paraît sur ses lèvres.
  '24':
  - type: text
    content: Les paroles agréables sont un rayon de miel,
  - type: text
    content: Douces pour l’âme et salutaires pour le corps.
  '25':
  - type: text
    content: ' '
  - type: note
    content: Pr 14:12.
  - type: text
    content: Telle voie paraît droite à un homme,
  - type: text
    content: Mais son issue, c’est la voie de la mort.
  '26':
  - type: text
    content: Celui qui travaille, travaille pour lui,
  - type: text
    content: Car sa bouche l’y excite.
  '27':
  - type: text
    content: L’homme pervers prépare le malheur,
  - type: note
    content: Pr 12:18.
  - type: text
    content: Et il y a sur ses lèvres comme un feu ardent.
  '28':
  - type: text
    content: ' '
  - type: note
    content: Pr 15:18; 26:21; 29:22.
  - type: text
    content: L’homme pervers excite des querelles,
  - type: text
    content: Et le rapporteur divise les amis.
  '29':
  - type: text
    content: L’homme violent séduit son prochain,
  - type: text
    content: Et le fait marcher dans une voie qui n’est pas bonne.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Ps 37:5; 55:23. Mt 6:25. Lu 12:22. 1 Pi 5:7.
  - type: text
    content: Recommande à l’Éternel tes œuvres,
  - type: text
    content: Et tes projets réussiront.
  '30':
  - type: text
    content: ' '
  - type: note
    content: Pr 6:13, 14.
  - type: text
    content: Celui qui ferme les yeux pour se livrer à des pensées perverses,
  - type: text
    content: Celui qui se mord les lèvres, a déjà consommé le mal.
  '31':
  - type: text
    content: Les cheveux blancs sont une couronne d’honneur;
  - type: text
    content: C’est dans le chemin de la justice qu’on la trouve.
  '32':
  - type: text
    content: Celui qui est lent à la colère vaut mieux qu’un héros,
  - type: text
    content: Et celui qui est maître de lui-même, que celui qui prend des villes.
  '33':
  - type: text
    content: On jette le sort dans le pan de la robe,
  - type: text
    content: Mais toute décision vient de l’Éternel.
  '4':
  - type: text
    content: L’Éternel a tout fait pour un but,
  - type: note
    content: Job 21:30.
  - type: text
    content: Même le méchant pour le jour du malheur.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Pr 6:17; 8:13.
  - type: text
    content: Tout cœur hautain est en abomination à l’Éternel;
  - type: note
    content: Pr 11:21.
  - type: text
    content: Certes, il ne restera pas impuni.
  '6':
  - type: text
    content: Par la bonté et la fidélité on expie l’iniquité,
  - type: text
    content: Et par la crainte de l’Éternel on se détourne du mal.
  '7':
  - type: text
    content: Quand l’Éternel approuve les voies d’un homme,
  - type: text
    content: Il dispose favorablement à son égard même ses ennemis.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Ps 37:6. Pr 15:16.
  - type: text
    content: Mieux vaut peu, avec la justice,
  - type: text
    content: Que de grands revenus, avec l’injustice.
  '9':
  - type: text
    content: Le cœur de l’homme médite sa voie,
  - type: text
    content: Mais c’est l’Éternel qui dirige ses pas.
