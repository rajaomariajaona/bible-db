      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Les cheveux blancs sont une couronne d’honneur;
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est dans le chemin de la justice qu’on la trouve.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Celui qui est lent à la colère vaut mieux qu’un héros,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et celui qui est maître de lui-même, que celui qui prend des villes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: On jette le sort dans le pan de la robe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais toute décision vient de l’Éternel.
