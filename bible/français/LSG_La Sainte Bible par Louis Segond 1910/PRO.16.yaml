    marker-yv: yv-n
  - type: text
    text: Les projets que forme le cœur dépendent de l’homme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais la réponse que donne la bouche vient de l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
