        text: Pr 21:2
      metadata:
        usfm: PRO.21.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Toutes les voies de l’homme sont pures à ses yeux;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais celui qui pèse les esprits, c’est l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
