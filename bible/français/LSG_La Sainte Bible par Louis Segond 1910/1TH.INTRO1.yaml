document_id: 1TH.INTRO1,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: INTRODUCTION À LA PREMIÈRE ÉPÎTRE AUX THESSALONICIENS
  - type: usfm
    marker: imt3
    children:
    - type: text
      text: (Ac 17:1-9; 18:5.) (2 Pi 3:18.)
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Thessalonique est une ville de Macédoine. A l’époque où Paul y annonça l’Évangile pour la première fois, vers 50, accompagné de Silas et de Timothée, Thessalonique était une grande ville avec une importante colonie juive.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Les deux épîtres aux chrétiens de Thessalonique sont parmi les écrits les plus anciens du Nouveau Testament. Elles ont été écrites à seulement quelques mois d’intervalle entre 51 et 52. Elles traitent de l’évangélisation, de l’eschatologie et de questions éthiques du point de vue chrétien.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Voici la structure de la première épître aux Thessaloniciens:'
  - type: usfm
    marker: io1
    children:
    - type: text
      text: '1. Adresse et salutations '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 1:1-2
  - type: usfm
    marker: io1
    children:
    - type: text
      text: '2. Succès de l’Évangile à Thessalonique '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 1:3-10
  - type: usfm
    marker: io1
    children:
    - type: text
      text: '3. Ministère de Paul parmi les Thessaloniciens '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 2:1-16
  - type: usfm
    marker: io1
    children:
    - type: text
      text: '4. Désir qu’éprouve Paul de revoir les Thessaloniciens '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 2:17–3:13
  - type: usfm
    marker: io1
    children:
    - type: text
      text: '5. Exhortation à la sainteté, à la charité, sur la résurrection et l’avènement du Seigneur '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 4:1–5:11
  - type: usfm
    marker: io1
    children:
    - type: text
      text: '6. Préceptes divers, vœux et salutations '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 5:12-28
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'L’authenticité paulienne de 1 Thessaloniciens semble hors de doute. Par contre celle de 2 Thessaloniciens souffre de contestations à cause du retour du Seigneur qui y est présenté différemment par rapport à 1 Thessaloniciens. En effet dans cette dernière, ce retour est apparenté à celui d’un voleur en ces termes: '
    - type: usfm
      marker: it
      children:
      - type: text
        text: «Pour ce qui est des temps et des moments, vous n’avez pas besoin, frères, qu’on vous en écrive. Car vous savez bien vous-mêmes que le jour du Seigneur viendra comme un voleur dans la nuit»
    - type: text
      text: ' (5:1-2). Dans 2 Thessaloniciens par contre, ce retour apparaît précédé de signes apocalyptiques (2:1-4).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Dans 1 Thessaloniciens, Paul commence par montrer que son message n’est pas de lui seul. Il associe ses compagnons Silvain et Timothée comme des coauteurs de l’épître. Puis, il développe les trois vertus théologiques, la foi, l’espérance et l’amour, appliquées dans la fermeté et l’espérance. Paul sait que les chrétiens de Thessalonique suivent la bonne voie, et qu’ils ont résisté à l’épreuve. Il leur recommande donc ce qui leur reste à faire: persévérer.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Dans son message, Paul cherche à les aider à se conduire d’une manière qui plaise à Dieu. À ce sujet, il les exhorte à une vie de pureté, faite d’amour fraternel, et d’ardeur au travail de leurs propres mains pour ne pas être à charge aux autres.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: S’agissant de la résurrection et du retour du Seigneur Jésus-Christ, Paul oriente ses exhortations en vue d’éviter à ses destinataires le triste souvenir de leurs frères morts. Pour lui, si Jésus est ressuscité, ceux qui meurent en lui ressusciteront de la même manière. Paul va même plus loin pour dire que ce jour viendra comme un voleur, d’où l’exhortation à la vigilance.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: La première épître aux Thessaloniciens peut être qualifiée d’épître de l’espérance chrétienne fondée sur l’attente du retour du Seigneur Jésus-Christ. C’est certainement la question de ce retour qui était l’objet de discussion au sein de la communauté.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: En effet, les premiers chrétiens attendaient le retour du Christ dans leur génération (Matt 16:28; Mc 9:1; Lc 9:27). La tension chez les Thessaloniciens portait sur la crainte que les croyants morts ne bénéficient de l’avènement du Seigneur et par conséquent de la résurrection finale. Cette attente étant donc très vive, l’épître a été écrite sur un ton apologétique contre ceux qui croyaient à la venue imminente du Christ. Paul remet les pendules à l’heure (5:1-3).
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Pour lui, il est clair que les morts en Christ participeront à son avènement et surtout à sa résurrection finale (4:13–5:11) car tous ceux qui sont en Christ, vivants ou morts, sont nettement distincts de ceux qui sont dans les ténèbres (5:4-5).
