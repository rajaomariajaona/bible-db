document_id: JER.48,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Prophétie contre les Moabites
  - type: heading
    content: 'V. 1-47: cf. (És 15; 16. Éz 25:8-11. So 2:8-11. Am 2:1-3.) No 24:17.'
  - type: text
    content: 'Sur '
  - type: note
    content: Jé 25:21; 27:3.
  - type: text
    content: Moab.
  - type: text
    content: 'Ainsi parle l’Éternel des armées, le Dieu d’Israël:'
  - type: text
    content: Malheur à Nebo, car elle est ravagée!
  - type: text
    content: Kirjathaïm est confuse, elle est prise;
  - type: text
    content: Misgab est confuse, elle est brisée.
  '10':
  - type: text
    content: Maudit soit celui qui fait avec négligence l’œuvre de l’Éternel,
  - type: text
    content: Maudit soit celui qui éloigne son épée du carnage!
  '11':
  - type: text
    content: Moab était tranquille depuis sa jeunesse,
  - type: text
    content: 'Il reposait sur sa '
  - type: note
    content: So 1:12.
  - type: text
    content: lie,
  - type: text
    content: Il n’était pas vidé d’un vase dans un autre,
  - type: text
    content: Et il n’allait pas en captivité.
  - type: text
    content: Aussi son goût lui est resté,
  - type: text
    content: Et son odeur ne s’est pas changée.
  '12':
  - type: text
    content: C’est pourquoi voici, les jours viennent, dit l’Éternel,
  - type: text
    content: Où je lui enverrai des gens qui le transvaseront;
  - type: text
    content: Ils videront ses vases,
  - type: text
    content: Et feront sauter ses outres.
  '13':
  - type: text
    content: Moab aura honte de Kemosch,
  - type: text
    content: Comme la maison d’Israël a eu honte
  - type: text
    content: 'De Béthel, qui la remplissait de '
  - type: note
    content: 1 R 12:29.
  - type: text
    content: confiance.
  '14':
  - type: text
    content: 'Comment pouvez-vous dire: Nous sommes de vaillants hommes,'
  - type: text
    content: Des soldats prêts à combattre?
  '15':
  - type: text
    content: Moab est ravagé, ses villes montent en fumée,
  - type: text
    content: L’élite de sa jeunesse est égorgée,
  - type: text
    content: Dit le roi, dont l’Éternel des armées est le nom.
  '16':
  - type: text
    content: La ruine de Moab est près d’arriver,
  - type: text
    content: Son malheur vient en grande hâte.
  '17':
  - type: text
    content: Lamentez-vous sur lui, vous tous qui l’environnez,
  - type: text
    content: Vous tous qui connaissez son nom!
  - type: text
    content: 'Dites: Comment ce sceptre puissant a-t-il été brisé,'
  - type: text
    content: Ce bâton majestueux?
  '18':
  - type: text
    content: Descends du séjour de la gloire, assieds-toi sur la terre desséchée,
  - type: text
    content: Habitante, fille de Dibon!
  - type: text
    content: Car le dévastateur de Moab monte contre toi,
  - type: text
    content: Il détruit tes forteresses.
  '19':
  - type: text
    content: Tiens-toi sur le chemin, et regarde, habitante d’Aroër!
  - type: text
    content: Interroge le fuyard, le réchappé,
  - type: text
    content: 'Demande: Qu’est-il arrivé?'
  '2':
  - type: text
    content: Elle n’est plus, la gloire de Moab;
  - type: text
    content: 'A Hesbon, on médite sa perte:'
  - type: text
    content: Allons, exterminons-le du milieu des nations!
  - type: text
    content: Toi aussi, Madmen, tu seras détruite;
  - type: text
    content: L’épée marche derrière toi.
  '20':
  - type: text
    content: Moab est confus, car il est brisé.
  - type: text
    content: 'Poussez des '
  - type: note
    content: És 16:7.
  - type: text
    content: gémissements et des cris!
  - type: text
    content: Publiez sur l’Arnon
  - type: text
    content: Que Moab est ravagé!
  '21':
  - type: text
    content: Le châtiment est venu sur le pays de la plaine,
  - type: text
    content: Sur Holon, sur Jahats, sur Méphaath,
  '22':
  - type: text
    content: Sur Dibon, sur Nebo, sur Beth-Diblathaïm,
  '23':
  - type: text
    content: Sur Kirjathaïm, sur Beth-Gamul, sur Beth-Meon,
  '24':
  - type: text
    content: Sur Kerijoth, sur Botsra,
  - type: text
    content: Sur toutes les villes du pays de Moab,
  - type: text
    content: Éloignées et proches.
  '25':
  - type: text
    content: La force de Moab est abattue,
  - type: text
    content: Et son bras est brisé,
  - type: text
    content: Dit l’Éternel.
  '26':
  - type: text
    content: Enivrez-le, car il s’est élevé contre l’Éternel!
  - type: text
    content: Que Moab se roule dans son vomissement,
  - type: text
    content: Et qu’il devienne aussi un objet de raillerie!
  '27':
  - type: text
    content: Israël n’a-t-il pas été pour toi un objet de raillerie?
  - type: text
    content: Avait-il donc été surpris parmi les voleurs,
  - type: text
    content: Pour que tu ne parles de lui qu’en secouant la tête?
  '28':
  - type: text
    content: Abandonnez les villes, et demeurez dans les rochers,
  - type: text
    content: Habitants de Moab!
  - type: text
    content: Soyez comme les colombes,
  - type: text
    content: Qui font leur nid sur le flanc des cavernes!
  '29':
  - type: text
    content: 'Nous connaissons '
  - type: note
    content: És 16:6.
  - type: text
    content: l’orgueil du superbe Moab,
  - type: text
    content: Sa hauteur, sa fierté, son arrogance, et son cœur altier.
  '3':
  - type: text
    content: Des cris partent de Choronaïm;
  - type: text
    content: C’est un ravage, c’est une grande détresse.
  '30':
  - type: text
    content: Je connais, dit l’Éternel, sa présomption et ses vains discours,
  - type: text
    content: Et ses œuvres de néant.
  '31':
  - type: text
    content: C’est pourquoi je gémis sur Moab,
  - type: text
    content: Je gémis sur tout Moab;
  - type: text
    content: On soupire pour les gens de Kir-Hérès.
  '32':
  - type: text
    content: Vigne de Sibma, je pleure sur toi plus que sur Jaezer;
  - type: text
    content: Tes rameaux allaient au-delà de la mer,
  - type: text
    content: Ils s’étendaient jusqu’à la mer de Jaezer;
  - type: text
    content: Le dévastateur s’est jeté sur ta récolte et sur ta vendange.
  '33':
  - type: text
    content: ' '
  - type: note
    content: És 16:10.
  - type: text
    content: La joie et l’allégresse ont disparu des campagnes
  - type: text
    content: Et du pays de Moab;
  - type: text
    content: J’ai fait tarir le vin dans les cuves;
  - type: text
    content: On ne foule plus gaîment au pressoir;
  - type: text
    content: Il y a des cris de guerre, et non des cris de joie.
  '34':
  - type: text
    content: Les cris de Hesbon retentissent jusqu’à Élealé,
  - type: text
    content: Et ils font entendre leur voix jusqu’à Jahats,
  - type: text
    content: 'Depuis '
  - type: note
    content: És 15:5, 6.
  - type: text
    content: Tsoar jusqu’à Choronaïm,
  - type: text
    content: Jusqu’à Églath-Schelischija;
  - type: text
    content: Car les eaux de Nimrim sont aussi ravagées.
  '35':
  - type: text
    content: Je veux en finir dans Moab, dit l’Éternel,
  - type: text
    content: Avec celui qui monte sur les hauts lieux,
  - type: text
    content: Et qui offre de l’encens à son dieu.
  '36':
  - type: text
    content: Aussi mon cœur gémit comme une flûte sur Moab,
  - type: text
    content: Mon cœur gémit comme une flûte sur les gens de Kir-Hérès,
  - type: text
    content: Parce que tous les biens qu’ils ont amassés sont perdus.
  '37':
  - type: text
    content: 'Car toutes les '
  - type: note
    content: És 15:2, 3.
  - type: text
    content: têtes sont rasées,
  - type: text
    content: Toutes les barbes sont coupées;
  - type: text
    content: 'Sur toutes les mains il y a des '
  - type: note
    content: Jé 47:5.
  - type: text
    content: incisions,
  - type: text
    content: Et sur les reins des sacs.
  '38':
  - type: text
    content: Sur tous les toits de Moab et dans ses places,
  - type: text
    content: Ce ne sont que lamentations,
  - type: text
    content: Parce que j’ai brisé Moab comme un vase qui n’a pas de prix,
  - type: text
    content: Dit l’Éternel.
  '39':
  - type: text
    content: Comme il est brisé! Poussez des gémissements!
  - type: text
    content: Comme Moab tourne honteusement le dos!
  - type: text
    content: Moab devient un objet de raillerie et d’effroi
  - type: text
    content: Pour tous ceux qui l’environnent.
  '4':
  - type: text
    content: Moab est brisé!
  - type: text
    content: Les petits font entendre leurs cris.
  '40':
  - type: text
    content: 'Car ainsi parle l’Éternel:'
  - type: text
    content: 'Voici, il vole comme '
  - type: note
    content: Jé 4:13.
  - type: text
    content: l’aigle,
  - type: text
    content: Et il étend ses ailes sur Moab.
  '41':
  - type: text
    content: Kerijoth est prise,
  - type: text
    content: Les forteresses sont emportées,
  - type: text
    content: Et le cœur des héros de Moab est en ce jour
  - type: text
    content: Comme le cœur d’une femme en travail.
  '42':
  - type: text
    content: Moab sera exterminé, il cessera d’être un peuple,
  - type: text
    content: Car il s’est élevé contre l’Éternel.
  '43':
  - type: text
    content: La terreur, la fosse, et le filet,
  - type: text
    content: Sont sur toi, habitant de Moab!
  - type: text
    content: Dit l’Éternel.
  '44':
  - type: text
    content: Celui qui fuit devant la terreur tombe dans la fosse,
  - type: text
    content: Et celui qui remonte de la fosse se prend au filet;
  - type: text
    content: Car je fais venir sur lui, sur Moab,
  - type: text
    content: L’année de son châtiment, dit l’Éternel.
  '45':
  - type: text
    content: A l’ombre de Hesbon les fuyards s’arrêtent épuisés;
  - type: text
    content: 'Mais il sort un '
  - type: note
    content: No 21:28.
  - type: text
    content: feu de Hesbon,
  - type: text
    content: Une flamme du milieu de Sihon;
  - type: text
    content: Elle dévore les flancs de Moab,
  - type: text
    content: Et le sommet de la tête des fils du tumulte.
  '46':
  - type: text
    content: Malheur à toi, Moab!
  - type: text
    content: Le peuple de Kemosch est perdu!
  - type: text
    content: Car tes fils sont emmenés captifs,
  - type: text
    content: Et tes filles captives.
  '47':
  - type: text
    content: Mais je ramènerai les captifs de Moab, dans la suite des temps,
  - type: text
    content: Dit l’Éternel.
  - type: text
    content: Tel est le jugement sur Moab.
  '5':
  - type: text
    content: 'Car on répand '
  - type: note
    content: És 15:5.
  - type: text
    content: des pleurs à la montée de Luchith,
  - type: text
    content: Et des cris de détresse retentissent à la descente de Choronaïm.
  '6':
  - type: text
    content: Fuyez, sauvez votre vie,
  - type: text
    content: 'Et soyez comme un '
  - type: note
    content: Jé 17:6.
  - type: text
    content: misérable dans le désert!
  '7':
  - type: text
    content: Car, parce que tu t’es confié dans tes œuvres et dans tes trésors,
  - type: text
    content: Toi aussi, tu seras pris,
  - type: text
    content: Et Kemosch s’en ira en captivité,
  - type: text
    content: 'Avec ses '
  - type: note
    content: Jé 49:3.
  - type: text
    content: prêtres et avec ses chefs.
  '8':
  - type: text
    content: Le dévastateur entrera dans chaque ville,
  - type: text
    content: Et aucune ville n’échappera;
  - type: text
    content: La vallée périra et la plaine sera détruite,
  - type: text
    content: Comme l’Éternel l’a dit.
  '9':
  - type: text
    content: Donnez des ailes à Moab,
  - type: text
    content: Et qu’il parte au vol!
  - type: text
    content: Ses villes seront réduites en désert,
  - type: text
    content: Elles n’auront plus d’habitants.
