document_id: JER.48
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prophétie contre les Moabites
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-47: cf. (És 15; 16. Éz 25:8-11. So 2:8-11. Am 2:1-3.) No 24:17.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Sur '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 25:21
      metadata:
        usfm: JER.25.21
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 27:3
      metadata:
        usfm: JER.27.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Moab.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ainsi parle l’Éternel des armées, le Dieu d’Israël:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Malheur à Nebo, car elle est ravagée!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Kirjathaïm est confuse, elle est prise;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Misgab est confuse, elle est brisée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Elle n’est plus, la gloire de Moab;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'A Hesbon, on médite sa perte:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Allons, exterminons-le du milieu des nations!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toi aussi, Madmen, tu seras détruite;
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’épée marche derrière toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Des cris partent de Choronaïm;
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est un ravage, c’est une grande détresse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Moab est brisé!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les petits font entendre leurs cris.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Car on répand '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 15:5
      metadata:
        usfm: ISA.15.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: des pleurs à la montée de Luchith,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et des cris de détresse retentissent à la descente de Choronaïm.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fuyez, sauvez votre vie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et soyez comme un '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 17:6
      metadata:
        usfm: JER.17.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: misérable dans le désert!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Car, parce que tu t’es confié dans tes œuvres et dans tes trésors,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toi aussi, tu seras pris,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et Kemosch s’en ira en captivité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Avec ses '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 49:3
      metadata:
        usfm: JER.49.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: prêtres et avec ses chefs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Le dévastateur entrera dans chaque ville,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et aucune ville n’échappera;
- type: usfm
  marker: q1
  children:
  - type: text
    text: La vallée périra et la plaine sera détruite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme l’Éternel l’a dit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Donnez des ailes à Moab,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qu’il parte au vol!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses villes seront réduites en désert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elles n’auront plus d’habitants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Maudit soit celui qui fait avec négligence l’œuvre de l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Maudit soit celui qui éloigne son épée du carnage!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Moab était tranquille depuis sa jeunesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Il reposait sur sa '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: So 1:12
      metadata:
        usfm: ZEP.1.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: lie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il n’était pas vidé d’un vase dans un autre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il n’allait pas en captivité.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aussi son goût lui est resté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et son odeur ne s’est pas changée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: C’est pourquoi voici, les jours viennent, dit l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Où je lui enverrai des gens qui le transvaseront;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils videront ses vases,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et feront sauter ses outres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Moab aura honte de Kemosch,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme la maison d’Israël a eu honte
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'De Béthel, qui la remplissait de '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 12:29
      metadata:
        usfm: 1KI.12.29
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: confiance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Comment pouvez-vous dire: Nous sommes de vaillants hommes,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Des soldats prêts à combattre?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Moab est ravagé, ses villes montent en fumée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’élite de sa jeunesse est égorgée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit le roi, dont l’Éternel des armées est le nom.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: La ruine de Moab est près d’arriver,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Son malheur vient en grande hâte.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Lamentez-vous sur lui, vous tous qui l’environnez,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous tous qui connaissez son nom!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dites: Comment ce sceptre puissant a-t-il été brisé,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce bâton majestueux?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Descends du séjour de la gloire, assieds-toi sur la terre desséchée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Habitante, fille de Dibon!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car le dévastateur de Moab monte contre toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il détruit tes forteresses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tiens-toi sur le chemin, et regarde, habitante d’Aroër!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Interroge le fuyard, le réchappé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Demande: Qu’est-il arrivé?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Moab est confus, car il est brisé.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Poussez des '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 16:7
      metadata:
        usfm: ISA.16.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: gémissements et des cris!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Publiez sur l’Arnon
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que Moab est ravagé!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Le châtiment est venu sur le pays de la plaine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sur Holon, sur Jahats, sur Méphaath,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Sur Dibon, sur Nebo, sur Beth-Diblathaïm,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Sur Kirjathaïm, sur Beth-Gamul, sur Beth-Meon,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Sur Kerijoth, sur Botsra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sur toutes les villes du pays de Moab,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Éloignées et proches.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: La force de Moab est abattue,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et son bras est brisé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Enivrez-le, car il s’est élevé contre l’Éternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que Moab se roule dans son vomissement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qu’il devienne aussi un objet de raillerie!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Israël n’a-t-il pas été pour toi un objet de raillerie?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avait-il donc été surpris parmi les voleurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour que tu ne parles de lui qu’en secouant la tête?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Abandonnez les villes, et demeurez dans les rochers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Habitants de Moab!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Soyez comme les colombes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui font leur nid sur le flanc des cavernes!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Nous connaissons '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 16:6
      metadata:
        usfm: ISA.16.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: l’orgueil du superbe Moab,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sa hauteur, sa fierté, son arrogance, et son cœur altier.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Je connais, dit l’Éternel, sa présomption et ses vains discours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ses œuvres de néant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: C’est pourquoi je gémis sur Moab,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je gémis sur tout Moab;
- type: usfm
  marker: q1
  children:
  - type: text
    text: On soupire pour les gens de Kir-Hérès.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Vigne de Sibma, je pleure sur toi plus que sur Jaezer;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tes rameaux allaient au-delà de la mer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils s’étendaient jusqu’à la mer de Jaezer;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le dévastateur s’est jeté sur ta récolte et sur ta vendange.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 16:10
      metadata:
        usfm: ISA.16.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: La joie et l’allégresse ont disparu des campagnes
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et du pays de Moab;
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’ai fait tarir le vin dans les cuves;
- type: usfm
  marker: q1
  children:
  - type: text
    text: On ne foule plus gaîment au pressoir;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il y a des cris de guerre, et non des cris de joie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Les cris de Hesbon retentissent jusqu’à Élealé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils font entendre leur voix jusqu’à Jahats,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Depuis '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 15:5
      metadata:
        usfm: ISA.15.5
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '6'
      metadata:
        usfm: ISA.15.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Tsoar jusqu’à Choronaïm,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jusqu’à Églath-Schelischija;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car les eaux de Nimrim sont aussi ravagées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Je veux en finir dans Moab, dit l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avec celui qui monte sur les hauts lieux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui offre de l’encens à son dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Aussi mon cœur gémit comme une flûte sur Moab,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon cœur gémit comme une flûte sur les gens de Kir-Hérès,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parce que tous les biens qu’ils ont amassés sont perdus.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Car toutes les '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 15:2
      metadata:
        usfm: ISA.15.2
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '3'
      metadata:
        usfm: ISA.15.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: têtes sont rasées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toutes les barbes sont coupées;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Sur toutes les mains il y a des '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 47:5
      metadata:
        usfm: JER.47.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: incisions,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et sur les reins des sacs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Sur tous les toits de Moab et dans ses places,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce ne sont que lamentations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parce que j’ai brisé Moab comme un vase qui n’a pas de prix,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Comme il est brisé! Poussez des gémissements!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme Moab tourne honteusement le dos!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moab devient un objet de raillerie et d’effroi
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour tous ceux qui l’environnent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Car ainsi parle l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Voici, il vole comme '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 4:13
      metadata:
        usfm: JER.4.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: l’aigle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il étend ses ailes sur Moab.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Kerijoth est prise,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les forteresses sont emportées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le cœur des héros de Moab est en ce jour
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme le cœur d’une femme en travail.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Moab sera exterminé, il cessera d’être un peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car il s’est élevé contre l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: La terreur, la fosse, et le filet,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sont sur toi, habitant de Moab!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Celui qui fuit devant la terreur tombe dans la fosse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et celui qui remonte de la fosse se prend au filet;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car je fais venir sur lui, sur Moab,
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’année de son châtiment, dit l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: A l’ombre de Hesbon les fuyards s’arrêtent épuisés;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Mais il sort un '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 21:28
      metadata:
        usfm: NUM.21.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: feu de Hesbon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Une flamme du milieu de Sihon;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle dévore les flancs de Moab,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le sommet de la tête des fils du tumulte.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Malheur à toi, Moab!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le peuple de Kemosch est perdu!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car tes fils sont emmenés captifs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tes filles captives.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Mais je ramènerai les captifs de Moab, dans la suite des temps,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tel est le jugement sur Moab.
