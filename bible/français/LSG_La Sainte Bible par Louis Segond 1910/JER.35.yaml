document_id: JER.35,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les Récabites
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-11: cf. (2 R 10:15, etc. 1 Ch 2:55.) Ex 20:12.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La parole fut adressée à Jérémie de la part de l’Éternel, au temps de Jojakim, fils de Josias, roi de Juda, en ces mots: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'nous habitons sous des tentes, et nous suivons et pratiquons tout ce que nous a prescrit Jonadab, notre père. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque Nebucadnetsar, roi de Babylone, est monté contre ce pays, nous avons dit: Allons, retirons-nous à Jérusalem, loin de l’armée des Chaldéens et de l’armée de Syrie. C’est ainsi que nous habitons à Jérusalem.'
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 12-19: cf. (Mal 1:6. De 32:5, 6. Jé 7.) Ép 6:1-3. (Mt 25:21. Lu 12:48.)'
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors la parole de l’Éternel fut adressée à Jérémie, en ces mots: '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi parle l’Éternel des armées, le Dieu d’Israël: Va, et dis aux hommes de Juda et aux habitants de Jérusalem: Ne recevrez-vous pas instruction, pour obéir à mes paroles? Dit l’Éternel. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On a observé les paroles de Jonadab, fils de Récab, qui a ordonné à ses fils de ne pas boire du vin, et ils n’en ont point bu jusqu’à ce jour, parce qu’ils ont obéi à l’ordre de leur père. Et moi, je vous ai parlé, je vous ai parlé '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 11:7
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 25:3
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 26:5
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 29:19
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 32:33
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'dès le matin, et vous ne m’avez pas écouté. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je vous ai envoyé tous mes serviteurs, les prophètes, je les ai envoyés dès le matin, pour vous dire: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 18:11
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 25:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Revenez chacun de votre mauvaise voie, amendez vos actions, n’allez pas après d’autres dieux pour les servir, et vous resterez dans le pays que j’ai donné à vous et à vos pères. Mais vous n’avez pas prêté l’oreille, vous ne m’avez pas écouté. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Oui, les fils de Jonadab, fils de Récab, observent l’ordre que leur a donné leur père, et ce peuple ne m’écoute pas! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est pourquoi ainsi parle l’Éternel, le Dieu des armées, le Dieu d’Israël: Voici, je vais faire venir sur Juda et sur tous les habitants de Jérusalem tous les malheurs que j’ai annoncés sur eux, parce que je leur ai parlé et qu’ils n’ont pas écouté, parce que je les ai appelés et qu’ils n’ont pas répondu. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et Jérémie dit à la maison des Récabites: Ainsi parle l’Éternel des armées, le Dieu d’Israël: Parce que vous avez obéi aux ordres de Jonadab, votre père, parce que vous avez observé tous ses commandements et fait tout ce qu’il vous a prescrit; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'à cause de cela, ainsi parle l’Éternel des armées, le Dieu d’Israël: Jonadab, fils de Récab, ne manquera jamais de descendants qui se tiennent en ma présence.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Va à la maison des Récabites, et parle-leur; tu les conduiras à la maison de l’Éternel, dans une des chambres, et tu leur offriras du vin à boire. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je pris Jaazania, fils de Jérémie, fils de Habazinia, ses frères, tous ses fils, et toute la maison des Récabites, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et je les conduisis à la maison de l’Éternel, dans la chambre des fils de Hanan, fils de Jigdalia, homme de Dieu, près de la chambre des chefs, au-dessus de la chambre de Maaséja, fils de Schallum, garde du seuil. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je mis devant les fils de la maison des Récabites des coupes pleines de vin, et des calices, et je leur dis: Buvez du vin! '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais ils répondirent: Nous ne buvons pas de vin; car Jonadab, fils de Récab, notre père, nous a donné cet ordre: Vous ne boirez jamais de vin, ni vous, ni vos fils; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et vous ne bâtirez point de maisons, vous ne sèmerez aucune semence, vous ne planterez point de vignes et vous n’en posséderez point; mais vous habiterez sous des tentes toute votre vie, afin que vous viviez longtemps dans le pays où vous êtes étrangers. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous obéissons à tout ce que nous a prescrit Jonadab, fils de Récab, notre père: nous ne buvons pas de vin pendant toute notre vie, nous, nos femmes, nos fils et nos filles; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'nous ne bâtissons point de maisons pour nos demeures, et nous ne possédons ni vignes, ni champs, ni terres ensemencées; '
