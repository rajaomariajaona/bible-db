document_id: ROM.5,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Fruits de la justification par la foi
  - type: heading
    content: 'V. 1-11: cf. 1 Pi 1:3-9. (1 Jn 4:9, 10. Ro 8:32.)'
  - type: text
    content: ' '
  - type: note
    content: És 32:17. Jn 16:33. Ép 2:13.
  - type: text
    content: 'Étant donc justifiés par la foi, nous avons la paix avec Dieu par notre Seigneur Jésus-Christ, '
  '10':
  - type: text
    content: 'Car si, lorsque nous étions ennemis, nous avons été réconciliés avec Dieu par la mort de son Fils, à plus forte raison, étant réconciliés, serons-nous sauvés par sa vie. '
  '11':
  - type: text
    content: Et non seulement cela, mais encore nous nous glorifions en Dieu par notre Seigneur Jésus-Christ, par qui maintenant nous avons obtenu la réconciliation.
  - type: heading
    content: Le péché et la grâce
  - type: heading
    content: 'V. 12-21: cf. 1 Co 15:21, 22, 45-49, 56, 57. Ro 6:23.'
  '12':
  - type: text
    content: 'C’est pourquoi, comme '
  - type: note
    content: Ge 3:6. 1 Co 15:21.
  - type: text
    content: 'par un seul homme le péché est entré dans le monde, et par le péché '
  - type: note
    content: Ge 2:17. Ro 6:23.
  - type: text
    content: 'la mort, et qu’ainsi la mort s’est étendue sur tous les hommes, parce que tous ont péché,… '
  '13':
  - type: text
    content: 'car jusqu’à la loi le péché était dans le monde. Or, le péché n’est pas imputé, quand il n’y a point de loi. '
  '14':
  - type: text
    content: 'Cependant la mort a régné depuis Adam jusqu’à Moïse, même sur ceux qui n’avaient pas péché par une transgression semblable à celle d’Adam, lequel est la figure de celui qui devait venir. '
  '15':
  - type: text
    content: 'Mais il n’en est pas du don gratuit comme de l’offense; car, si par l’offense d’un seul il en est beaucoup qui sont morts, à plus forte raison la grâce de Dieu et le don de la grâce venant d’un seul homme, Jésus-Christ, ont-ils été abondamment répandus sur beaucoup. '
  '16':
  - type: text
    content: 'Et il n’en est pas du don comme de ce qui est arrivé par un seul qui a péché; car c’est après une seule offense que le jugement est devenu condamnation, tandis que le don gratuit devient justification après plusieurs offenses. '
  '17':
  - type: text
    content: 'Si par l’offense d’un seul la mort a régné par lui seul, à plus forte raison ceux qui reçoivent l’abondance de la grâce et du don de la justice régneront-ils dans la vie par Jésus-Christ lui seul. '
  '18':
  - type: text
    content: 'Ainsi donc, comme par une seule offense la condamnation a atteint tous les hommes, de même par un seul acte de justice la justification qui donne la vie s’étend à tous les hommes. '
  '19':
  - type: text
    content: 'Car, comme par la désobéissance d’un seul homme beaucoup ont été rendus pécheurs, de même par l’obéissance d’un seul beaucoup seront rendus justes. '
  '2':
  - type: note
    content: Jn 10:9; 14:6. Ép 2:18; 3:12. Hé 10:19.
  - type: text
    content: 'à qui nous devons d’avoir eu par la foi accès à cette grâce, dans laquelle nous '
  - type: note
    content: 1 Co 15:1.
  - type: text
    content: 'demeurons fermes, et nous nous '
  - type: note
    content: Hé 3:6.
  - type: text
    content: 'glorifions dans l’espérance de la gloire de Dieu. '
  '20':
  - type: note
    content: Jn 15:22. Ro 4:15; 7:8. Ga 3:19.
  - type: text
    content: 'Or, la loi est intervenue pour que l’offense abondât, '
  - type: note
    content: Lu 7:47.
  - type: text
    content: 'mais là où le péché a abondé, la grâce a surabondé, '
  '21':
  - type: text
    content: afin que, comme le péché a régné par la mort, ainsi la grâce régnât par la justice pour la vie éternelle, par Jésus-Christ notre Seigneur.
  '3':
  - type: text
    content: 'Bien plus, '
  - type: note
    content: Ja 1:3.
  - type: text
    content: 'nous nous glorifions même des afflictions, sachant que l’affliction produit la persévérance, '
  '4':
  - type: text
    content: 'la persévérance la victoire dans l’épreuve, et cette victoire l’espérance. '
  '5':
  - type: text
    content: 'Or, l’espérance ne trompe point, parce que l’amour de Dieu est répandu dans nos cœurs par le Saint-Esprit qui nous a été donné. '
  '6':
  - type: note
    content: Ép 2:1. Col 2:13. Hé 9:15. 1 Pi 3:18.
  - type: text
    content: 'Car, lorsque nous étions encore sans force, Christ, au temps marqué, est mort pour des impies. '
  '7':
  - type: text
    content: 'A peine mourrait-on pour un juste; quelqu’un peut-être mourrait-il pour un homme de bien. '
  '8':
  - type: text
    content: 'Mais Dieu prouve son amour envers nous, en ce que, lorsque nous étions encore des pécheurs, Christ '
  - type: note
    content: Hé 9:15. 1 Pi 3:18.
  - type: text
    content: 'est mort pour nous. '
  '9':
  - type: text
    content: 'A plus forte raison donc, maintenant que nous sommes justifiés par son sang, serons-nous sauvés par lui de la colère. '
