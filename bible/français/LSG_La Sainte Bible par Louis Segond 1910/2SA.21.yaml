document_id: 2SA.21,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Famine de trois ans
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-14: cf. (No 35:31-34. Jos 9:3, etc.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Du temps de David, il y eut une famine qui dura trois ans. David chercha la face de l’Éternel, et l’Éternel dit: C’est à cause de Saül et de sa maison sanguinaire, c’est parce qu’il a fait périr les Gabaonites. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ritspa, fille d’Ajja, prit un sac et l’étendit sous elle contre le rocher, depuis le commencement de la moisson jusqu’à ce que la pluie du ciel tombât sur eux; et elle empêcha les oiseaux du ciel de s’approcher d’eux pendant le jour, et les bêtes des champs pendant la nuit. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On informa David de ce qu’avait fait Ritspa, fille d’Ajja, concubine de Saül. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et David alla prendre les os de Saül et les os de Jonathan, son fils, chez les habitants de Jabès en Galaad, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 S 31:10, etc.
      marker-yv: yv-n
    - type: text
      text: 'qui les avaient enlevés de la place de Beth-Schan, où les Philistins les avaient suspendus lorsqu’ils battirent Saül à Guilboa. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il emporta de là les os de Saül et de Jonathan, son fils; et l’on recueillit aussi les os de ceux qui avaient été pendus. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: On enterra les os de Saül et de Jonathan, son fils, au pays de Benjamin, à Tséla, dans le sépulcre de Kis, père de Saül. Et l’on fit tout ce que le roi avait ordonné. Après cela, Dieu fut apaisé envers le pays.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Guerres contre les Philistins
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 15-22: cf. 1 Ch 20:4-8. Ps 60:14; 144:9-11.'
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les Philistins firent encore la guerre à Israël. David descendit avec ses serviteurs, et ils combattirent les Philistins. David était fatigué. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et Jischbi-Benob, l’un des enfants de Rapha, eut la pensée de tuer David; il avait une lance du poids de trois cents sicles d’airain, et il était ceint d’une épée neuve. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abischaï, fils de Tseruja, vint au secours de David, frappa le Philistin et le tua. Alors les gens de David jurèrent, en lui disant: Tu ne sortiras plus avec nous pour combattre, et tu n’éteindras pas la lampe d’Israël. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il y eut encore, après cela, une bataille à '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 20:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Gob avec les Philistins. Alors Sibbecaï, le Huschatite, tua Saph, qui était un des enfants de Rapha. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il y eut encore une bataille à Gob avec les Philistins. Et Elchanan, fils de Jaaré-Oreguim, de Bethléhem, tua Goliath de Gath, qui avait une lance dont le bois était comme une ensouple de tisserand. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi appela les Gabaonites pour leur parler. Les Gabaonites n’étaient point d’entre les enfants d’Israël, mais c’était un reste des Amoréens; les enfants d’Israël s’étaient '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 9:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'liés envers eux par un serment, et néanmoins Saül avait voulu les frapper, dans son zèle pour les enfants d’Israël et de Juda. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il y eut encore une bataille à Gath. Il s’y trouva un homme de haute taille, qui avait six doigts à chaque main et à chaque pied, vingt-quatre en tout, et qui était aussi issu de Rapha. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il jeta un défi à Israël; et Jonathan, fils de Schimea, frère de David, le tua. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ces quatre hommes étaient des enfants de Rapha à Gath. Ils périrent par la main de David et par la main de ses serviteurs.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David dit aux Gabaonites: Que puis-je faire pour vous, et avec quoi ferai-je expiation, afin que vous bénissiez l’héritage de l’Éternel? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les Gabaonites lui répondirent: Ce n’est pas pour nous une question d’argent et d’or avec Saül et avec sa maison, et ce n’est pas à nous qu’il appartient de faire mourir personne en Israël. Et le roi dit: Que voulez-vous donc que je fasse pour vous? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils répondirent au roi: Puisque cet homme nous a consumés, et qu’il avait le projet de nous détruire pour nous faire disparaître de tout le territoire d’Israël, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'qu’on nous livre sept hommes d’entre ses fils, et nous les pendrons devant l’Éternel à Guibea de Saül, l’élu de l’Éternel. Et le roi dit: Je les livrerai. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi épargna Mephiboscheth, fils de Jonathan, fils de Saül, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 18:3
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 20:15
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '42'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 23:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'à cause du serment qu’avaient fait entre eux, devant l’Éternel, David et Jonathan, fils de Saül. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais le roi prit les deux fils que Ritspa, fille d’Ajja, avait enfantés à Saül, Armoni et Mephiboscheth, et les cinq fils que Mérab, fille de Saül, avait enfantés à Adriel de Mehola, fils de Barzillaï; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et il les livra entre les mains des Gabaonites, qui les pendirent sur la montagne, devant l’Éternel. Tous les sept périrent ensemble; ils furent mis à mort dans les premiers jours de la moisson, au commencement de la moisson des orges. '
