document_id: EXO.20,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Les dix commandements
  - type: heading
    content: 'V. 1-17: cf. De 5:2-22. (Mt 5:17-48; 22:35-40. Ro 13:8-10.) Jn 1:17.'
  - type: text
    content: 'Alors Dieu prononça toutes ces paroles, en disant: '
  '10':
  - type: text
    content: 'Mais le septième jour est le jour du repos de l’Éternel, ton Dieu: tu ne feras aucun ouvrage, ni toi, ni ton fils, ni ta fille, ni ton serviteur, ni ta servante, ni ton bétail, ni l’étranger qui est dans tes portes. '
  '11':
  - type: text
    content: 'Car '
  - type: note
    content: Ge 2:2.
  - type: text
    content: 'en six jours l’Éternel a fait les cieux, la terre et la mer, et tout ce qui y est contenu, et il s’est reposé le septième jour: c’est pourquoi l’Éternel a béni le jour du repos et l’a sanctifié. '
  '12':
  - type: note
    content: Mt 15:4. Ép 6:2.
  - type: text
    content: 'Honore ton père et ta mère, afin que tes jours se prolongent dans le pays que l’Éternel, ton Dieu, te donne. '
  '13':
  - type: note
    content: Mt 5:21.
  - type: text
    content: 'Tu ne tueras point. '
  '14':
  - type: note
    content: Mt 5:27.
  - type: text
    content: 'Tu ne commettras point d’adultère. '
  '15':
  - type: text
    content: 'Tu ne déroberas point. '
  '16':
  - type: text
    content: 'Tu ne porteras point de faux témoignage contre ton prochain. '
  '17':
  - type: note
    content: Ro 7:7.
  - type: text
    content: Tu ne convoiteras point la maison de ton prochain; tu ne convoiteras point la femme de ton prochain, ni son serviteur, ni sa servante, ni son bœuf, ni son âne, ni aucune chose qui appartienne à ton prochain.
  - type: heading
    content: 'V. 18-26: cf. De 5:22-31; 27:5-7. (Mt 18:20.)'
  '18':
  - type: text
    content: 'Tout le peuple entendait les tonnerres et le son de la trompette; il voyait les flammes de la montagne fumante. A ce spectacle, le peuple tremblait, et se tenait dans l’éloignement. '
  '19':
  - type: note
    content: De 5:25. Hé 12:19.
  - type: text
    content: 'Ils dirent à Moïse: Parle-nous toi-même, et nous écouterons; mais que Dieu ne nous parle point, de peur que nous ne mourions. '
  '2':
  - type: text
    content: 'Je suis l’Éternel, ton Dieu, qui t’ai fait sortir du pays d’Égypte, '
  - type: note
    content: Ex 13:3. De 5:6. Ps 81:11.
  - type: text
    content: 'de la maison de servitude. '
  '20':
  - type: text
    content: 'Moïse dit au peuple: Ne vous effrayez pas; car c’est pour vous mettre à l’épreuve que Dieu est venu, et c’est pour que vous ayez sa crainte devant les yeux, afin que vous ne péchiez point. '
  '21':
  - type: note
    content: Ex 18:17. Hé 12:18.
  - type: text
    content: 'Le peuple restait dans l’éloignement; mais Moïse s’approcha de la nuée où était Dieu. '
  '22':
  - type: text
    content: 'L’Éternel dit à Moïse: Tu parleras ainsi aux enfants d’Israël: Vous avez vu que je vous ai parlé depuis les cieux. '
  '23':
  - type: text
    content: 'Vous ne ferez point des dieux d’argent et des dieux d’or, pour me les associer; vous ne vous en ferez point. '
  '24':
  - type: note
    content: Ex 27:1; 38:1.
  - type: text
    content: 'Tu m’élèveras un autel de terre, sur lequel tu offriras tes holocaustes et tes sacrifices d’actions de grâces, tes brebis et tes bœufs. Partout où je rappellerai mon nom, je viendrai à toi, et je te bénirai. '
  '25':
  - type: note
    content: De 27:5. Jos 8:30, 31.
  - type: text
    content: 'Si tu m’élèves un autel de pierre, tu ne le bâtiras point en pierres taillées; car en passant ton ciseau sur la pierre, tu la profanerais. '
  '26':
  - type: text
    content: Tu ne monteras point à mon autel par des degrés, afin que ta nudité ne soit pas découverte.
  '3':
  - type: text
    content: 'Tu n’auras pas d’autres dieux devant ma face. '
  '4':
  - type: note
    content: Lé 26:1. Ps 97:7.
  - type: text
    content: 'Tu ne te feras point d’image taillée, ni de représentation quelconque des choses qui sont en haut dans les cieux, qui sont en bas sur la terre, et qui sont dans les eaux plus bas que la terre. '
  '5':
  - type: text
    content: 'Tu ne te prosterneras point devant elles, et tu ne les serviras point; car moi, l’Éternel, ton Dieu, je suis un Dieu jaloux, qui punis l’iniquité des pères sur les enfants jusqu’à la troisième et la quatrième génération de ceux qui me haïssent, '
  '6':
  - type: text
    content: 'et qui fais miséricorde jusqu’en mille générations à ceux qui m’aiment et qui gardent mes commandements. '
  '7':
  - type: note
    content: Lé 19:12. Mt 5:33.
  - type: text
    content: 'Tu ne prendras point le nom de l’Éternel, ton Dieu, en vain; car l’Éternel ne laissera point impuni celui qui prendra son nom en vain. '
  '8':
  - type: note
    content: Éz 20:12.
  - type: text
    content: 'Souviens-toi du jour du repos, pour le sanctifier. '
  '9':
  - type: note
    content: Ex 23:12; 34:21. Lu 13:14.
  - type: text
    content: 'Tu travailleras six jours, et tu feras tout ton ouvrage. '
