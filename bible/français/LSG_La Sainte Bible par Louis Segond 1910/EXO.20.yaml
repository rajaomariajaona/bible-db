document_id: EXO.20
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les dix commandements
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-17: cf. De 5:2-22. (Mt 5:17-48; 22:35-40. Ro 13:8-10.) Jn 1:17.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Alors Dieu prononça toutes ces paroles, en disant: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Je suis l’Éternel, ton Dieu, qui t’ai fait sortir du pays d’Égypte, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 13:3
      metadata:
        usfm: EXO.13.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 5:6
      metadata:
        usfm: DEU.5.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 81:11
      metadata:
        usfm: PSA.81.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'de la maison de servitude. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tu n’auras pas d’autres dieux devant ma face. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 26:1
      metadata:
        usfm: LEV.26.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 97:7
      metadata:
        usfm: PSA.97.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu ne te feras point d’image taillée, ni de représentation quelconque des choses qui sont en haut dans les cieux, qui sont en bas sur la terre, et qui sont dans les eaux plus bas que la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tu ne te prosterneras point devant elles, et tu ne les serviras point; car moi, l’Éternel, ton Dieu, je suis un Dieu jaloux, qui punis l’iniquité des pères sur les enfants jusqu’à la troisième et la quatrième génération de ceux qui me haïssent, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'et qui fais miséricorde jusqu’en mille générations à ceux qui m’aiment et qui gardent mes commandements. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 19:12
      metadata:
        usfm: LEV.19.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 5:33
      metadata:
        usfm: MAT.5.33
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu ne prendras point le nom de l’Éternel, ton Dieu, en vain; car l’Éternel ne laissera point impuni celui qui prendra son nom en vain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 20:12
      metadata:
        usfm: EZK.20.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Souviens-toi du jour du repos, pour le sanctifier. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 23:12
      metadata:
        usfm: EXO.23.12
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 34:21
      metadata:
        usfm: EXO.34.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 13:14
      metadata:
        usfm: LUK.13.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu travailleras six jours, et tu feras tout ton ouvrage. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Mais le septième jour est le jour du repos de l’Éternel, ton Dieu: tu ne feras aucun ouvrage, ni toi, ni ton fils, ni ta fille, ni ton serviteur, ni ta servante, ni ton bétail, ni l’étranger qui est dans tes portes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Car '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 2:2
      metadata:
        usfm: GEN.2.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'en six jours l’Éternel a fait les cieux, la terre et la mer, et tout ce qui y est contenu, et il s’est reposé le septième jour: c’est pourquoi l’Éternel a béni le jour du repos et l’a sanctifié. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 15:4
      metadata:
        usfm: MAT.15.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 6:2
      metadata:
        usfm: EPH.6.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Honore ton père et ta mère, afin que tes jours se prolongent dans le pays que l’Éternel, ton Dieu, te donne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 5:21
      metadata:
        usfm: MAT.5.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu ne tueras point. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 5:27
      metadata:
        usfm: MAT.5.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu ne commettras point d’adultère. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tu ne déroberas point. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Tu ne porteras point de faux témoignage contre ton prochain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 7:7
      metadata:
        usfm: ROM.7.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Tu ne convoiteras point la maison de ton prochain; tu ne convoiteras point la femme de ton prochain, ni son serviteur, ni sa servante, ni son bœuf, ni son âne, ni aucune chose qui appartienne à ton prochain.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 18-26: cf. De 5:22-31; 27:5-7. (Mt 18:20.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tout le peuple entendait les tonnerres et le son de la trompette; il voyait les flammes de la montagne fumante. A ce spectacle, le peuple tremblait, et se tenait dans l’éloignement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 5:25
      metadata:
        usfm: DEU.5.25
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 12:19
      metadata:
        usfm: HEB.12.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ils dirent à Moïse: Parle-nous toi-même, et nous écouterons; mais que Dieu ne nous parle point, de peur que nous ne mourions. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Moïse dit au peuple: Ne vous effrayez pas; car c’est pour vous mettre à l’épreuve que Dieu est venu, et c’est pour que vous ayez sa crainte devant les yeux, afin que vous ne péchiez point. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 18:17
      metadata:
        usfm: EXO.18.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 12:18
      metadata:
        usfm: HEB.12.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Le peuple restait dans l’éloignement; mais Moïse s’approcha de la nuée où était Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'L’Éternel dit à Moïse: Tu parleras ainsi aux enfants d’Israël: Vous avez vu que je vous ai parlé depuis les cieux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Vous ne ferez point des dieux d’argent et des dieux d’or, pour me les associer; vous ne vous en ferez point. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 27:1
      metadata:
        usfm: EXO.27.1
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 38:1
      metadata:
        usfm: EXO.38.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu m’élèveras un autel de terre, sur lequel tu offriras tes holocaustes et tes sacrifices d’actions de grâces, tes brebis et tes bœufs. Partout où je rappellerai mon nom, je viendrai à toi, et je te bénirai. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 27:5
      metadata:
        usfm: DEU.27.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 8:30
      metadata:
        usfm: JOS.8.30
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '31'
      metadata:
        usfm: JOS.8.31
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Si tu m’élèves un autel de pierre, tu ne le bâtiras point en pierres taillées; car en passant ton ciseau sur la pierre, tu la profanerais. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Tu ne monteras point à mon autel par des degrés, afin que ta nudité ne soit pas découverte.
