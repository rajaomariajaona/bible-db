document_id: PSA.56,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 1 S 21:10-15; 24:15, 16. (Ps 54; 57; 59.) Ps 34; 112:7, 8.
  - type: text
    content: 'Au chef des chantres. Sur “Colombe des térébinthes lointains”. Hymne de David. '
  - type: note
    content: 1 S 21:12, 13, 14.
  - type: text
    content: Lorsque les Philistins le saisirent à Gath.
  '10':
  - type: text
    content: Mes ennemis reculent, au jour où je crie;
  - type: text
    content: Je sais que Dieu est pour moi.
  '11':
  - type: text
    content: Je me glorifierai en Dieu, en sa parole;
  - type: text
    content: Je me glorifierai en l’Éternel, en sa parole;
  '12':
  - type: text
    content: 'Je me confie en Dieu, je ne crains rien:'
  - type: note
    content: Ps 118:6.
  - type: text
    content: Que peuvent me faire des hommes?
  '13':
  - type: text
    content: O Dieu! Je dois accomplir les vœux que je t’ai faits;
  - type: text
    content: Je t’offrirai des actions de grâces.
  '14':
  - type: text
    content: Car tu as délivré mon âme de la mort,
  - type: text
    content: Tu as garanti mes pieds de la chute,
  - type: text
    content: Afin que je marche devant Dieu, à la lumière des vivants.
  '2':
  - type: text
    content: Aie pitié de moi, ô Dieu! Car des hommes me harcèlent;
  - type: text
    content: Tout le jour ils me font la guerre, ils me tourmentent.
  '3':
  - type: text
    content: Tout le jour mes adversaires me harcèlent;
  - type: text
    content: Ils sont nombreux, ils me font la guerre comme des hautains.
  '4':
  - type: text
    content: Quand je suis dans la crainte,
  - type: text
    content: En toi je me confie.
  '5':
  - type: text
    content: Je me glorifierai en Dieu, en sa parole;
  - type: text
    content: 'Je me confie en Dieu, je ne crains rien:'
  - type: text
    content: Que peuvent me faire des hommes?
  '6':
  - type: text
    content: Sans cesse ils portent atteinte à mes droits,
  - type: text
    content: Ils n’ont à mon égard que de mauvaises pensées.
  '7':
  - type: text
    content: Ils complotent, ils épient, ils observent mes traces,
  - type: text
    content: Parce qu’ils en veulent à ma vie.
  '8':
  - type: text
    content: 'C’est par l’iniquité qu’ils espèrent échapper:'
  - type: text
    content: Dans ta colère, ô Dieu, précipite les peuples!
  '9':
  - type: text
    content: Tu comptes les pas de ma vie errante;
  - type: text
    content: 'Recueille mes larmes dans ton outre:'
  - type: text
    content: Ne sont-elles pas inscrites dans ton livre?
