document_id: PSA.56,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 1 S 21:10-15; 24:15, 16. (Ps 54; 57; 59.) Ps 34; 112:7, 8.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Au chef des chantres. Sur “Colombe des térébinthes lointains”. Hymne de David. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 21:12
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '13'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Lorsque les Philistins le saisirent à Gath.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes ennemis reculent, au jour où je crie;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je sais que Dieu est pour moi.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je me glorifierai en Dieu, en sa parole;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je me glorifierai en l’Éternel, en sa parole;
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je me confie en Dieu, je ne crains rien:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 118:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Que peuvent me faire des hommes?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Dieu! Je dois accomplir les vœux que je t’ai faits;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je t’offrirai des actions de grâces.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car tu as délivré mon âme de la mort,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as garanti mes pieds de la chute,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afin que je marche devant Dieu, à la lumière des vivants.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aie pitié de moi, ô Dieu! Car des hommes me harcèlent;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tout le jour ils me font la guerre, ils me tourmentent.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tout le jour mes adversaires me harcèlent;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils sont nombreux, ils me font la guerre comme des hautains.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand je suis dans la crainte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En toi je me confie.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je me glorifierai en Dieu, en sa parole;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je me confie en Dieu, je ne crains rien:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que peuvent me faire des hommes?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sans cesse ils portent atteinte à mes droits,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils n’ont à mon égard que de mauvaises pensées.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils complotent, ils épient, ils observent mes traces,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce qu’ils en veulent à ma vie.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'C’est par l’iniquité qu’ils espèrent échapper:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans ta colère, ô Dieu, précipite les peuples!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu comptes les pas de ma vie errante;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Recueille mes larmes dans ton outre:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne sont-elles pas inscrites dans ton livre?
