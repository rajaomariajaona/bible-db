document_id: 2SA.17
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-14: cf. 2 S 15:31-34. Job 5:12-16.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Achitophel dit à Absalom: Laisse-moi choisir douze mille hommes! Je me lèverai, et je poursuivrai David cette nuit même. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Je le surprendrai pendant qu’il est fatigué et que ses mains sont affaiblies, je l’épouvanterai, et tout le peuple qui est avec lui s’enfuira. Je frapperai le roi seul, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'et je ramènerai à toi tout le peuple; la mort de l’homme à qui tu en veux assurera le retour de tous, et tout le peuple sera en paix. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Cette parole plut à Absalom et à tous les anciens d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Cependant Absalom dit: Appelez encore Huschaï, l’Arkien, et que nous entendions aussi ce qu’il dira. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Huschaï vint auprès d’Absalom, et Absalom lui dit: Voici comment a parlé Achitophel: devons-nous faire ce qu’il a dit, ou non? Parle, toi! '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Huschaï répondit à Absalom: Pour cette fois le conseil qu’a donné Achitophel n’est pas bon. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Et Huschaï dit: Tu connais la bravoure de ton père et de ses gens, ils sont furieux comme le serait dans les champs une ourse à qui l’on aurait enlevé ses petits. Ton père est un homme de guerre, et il ne passera pas la nuit avec le peuple; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'voici maintenant, il est caché dans quelque fosse ou dans quelque autre lieu. Et si, dès le commencement, il en est qui tombent sous leurs coups, on ne tardera pas à l’apprendre et l’on dira: Il y a une défaite parmi le peuple qui suit Absalom! '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Alors le plus vaillant, eût-il un cœur de lion, sera saisi d’épouvante; car tout Israël sait que ton père est un héros et qu’il a des braves avec lui. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Je conseille donc que tout Israël se rassemble auprès de toi, depuis Dan jusqu’à Beer-Schéba, multitude pareille au sable qui est sur le bord de la mer. Tu marcheras en personne au combat. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nous arriverons à lui en quelque lieu que nous le trouvions, et nous tomberons sur lui comme la rosée tombe sur le sol; et pas un n’échappera, ni lui ni aucun des hommes qui sont avec lui. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'S’il se retire dans une ville, tout Israël portera des cordes vers cette ville, et nous la traînerons au torrent, jusqu’à ce qu’on n’en trouve plus une pierre. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Absalom et tous les gens d’Israël dirent: Le conseil de Huschaï, l’Arkien, vaut mieux que le conseil d’Achitophel. Or l’Éternel avait résolu d’anéantir le bon conseil d’Achitophel, afin d’amener le malheur sur Absalom.'
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 15-23: cf. (2 S 15:35, 36. Jos 2:1-7.) Mt 27:3-5. Ps 55.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Huschaï dit aux sacrificateurs Tsadok et Abiathar: Achitophel a donné tel et tel conseil à Absalom et aux anciens d’Israël; et moi, j’ai conseillé telle et telle chose. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Maintenant, envoyez tout de suite informer David et faites-lui dire: Ne passe point la nuit dans les plaines du désert, mais va plus loin, de peur que le roi et tout le peuple qui est avec lui ne soient exposés à périr. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Jonathan et Achimaats se tenaient à En-Roguel. Une servante vint leur dire d’aller informer le roi David; car ils n’osaient pas se montrer et entrer dans la ville. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Un jeune homme les aperçut, et le rapporta à Absalom. Mais ils partirent tous deux en hâte, et ils arrivèrent à Bachurim à la maison d’un homme qui avait un puits dans sa cour, et ils y descendirent. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'La femme prit une couverture qu’elle étendit sur l’ouverture du puits, et elle y répandit du grain pilé pour qu’on ne se doutât de rien. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Les serviteurs d’Absalom entrèrent dans la maison auprès de cette femme, et dirent: Où sont Achimaats et Jonathan? La femme leur répondit: Ils ont passé le ruisseau. Ils cherchèrent, et ne les trouvant pas, ils retournèrent à Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Après leur départ, Achimaats et Jonathan remontèrent du puits et allèrent informer le roi David. Ils dirent à David: Levez-vous et hâtez-vous de passer l’eau, car Achitophel a conseillé contre vous telle chose. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'David et tout le peuple qui était avec lui se levèrent et ils passèrent le Jourdain; à la lumière du matin, il n’y en avait pas un qui fût resté à l’écart, pas un qui n’eût passé le Jourdain. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Achitophel, voyant que son conseil n’était pas suivi, sella son âne et partit pour s’en aller chez lui dans sa ville. Il donna ses ordres à sa maison, et il s’étrangla. C’est ainsi qu’il mourut, et on l’enterra dans le sépulcre de son père.
- type: usfm
  marker: s1
  children:
  - type: text
    text: David à Mahanaïm, au-delà du Jourdain; Absalom à sa poursuite
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 24-29: cf. (Ps 4; 42; 43; 61; 63.) 2 S 19:31-39.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'David arriva à Mahanaïm. Et Absalom passa le Jourdain, lui et tous les hommes d’Israël avec lui. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Absalom mit Amasa à la tête de l’armée, en remplacement de Joab; Amasa était fils d’un homme appelé Jithra, l’Israélite, qui était allé vers Abigal, fille de Nachasch et sœur de Tseruja, mère de Joab. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Israël et Absalom campèrent dans le pays de Galaad. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Lorsque David fut arrivé à Mahanaïm, Schobi, fils de Nachasch, de Rabba des fils d’Ammon, Makir, fils d’Ammiel, de Lodebar, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 S 19:31
      metadata:
        usfm: 2SA.19.31
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '32'
      metadata:
        usfm: 2SA.19.32
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 2:7
      metadata:
        usfm: 1KI.2.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Barzillaï, le Galaadite, de Roguelim, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'apportèrent des lits, des bassins, des vases de terre, du froment, de l’orge, de la farine, du grain rôti, des fèves, des lentilles, des pois rôtis, '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'du miel, de la crème, des brebis, et des fromages de vache. Ils apportèrent ces choses à David et au peuple qui était avec lui, afin qu’ils mangeassent; car ils disaient: Ce peuple a dû souffrir de la faim, de la fatigue et de la soif, dans le désert.'
