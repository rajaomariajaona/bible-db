document_id: COL.INTRO1
type_code: fra
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: INTRODUCTION À L’ÉPÎTRE AUX COLOSSIENS
- type: usfm
  marker: imt3
  children:
  - type: text
    text: (1 Co 1:30. 1 Jn 5:12. Ép 3:8.)
- type: usfm
  marker: ip
  children:
  - type: text
    text: La parenté de l’Épître aux Colossiens avec l’Épître aux Éphésiens exige de se reporter à l’introduction de cette dernière pour les points communs.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Colosses tout comme Éphèse est une ville d’Asie Mineure. Mais l’épître apparaît comme une circulaire destinée à être lue dans d’autres Églises que celle de Colosses, plus précisément celle de Laodicée (4:16). C’est pourquoi, s’agissant de la parenté de cette épître avec celle aux Éphésiens, cette dernière serait fort probablement celle adressée aux Laodicéens dont la lecture fut recommandée aux Colossiens par Paul en ces termes: '
  - type: usfm
    marker: it
    children:
    - type: text
      text: «Lorsque cette lettre aura été lue chez vous, faites en sorte qu’elle soit aussi lue dans l’Église des Laodicéens, et que vous lisiez à votre tour celle qui vous arrivera de Laodicée»
  - type: text
    text: ' (Col 4:16).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Voici la structure de cette épître:'
- type: usfm
  marker: io1
  children:
  - type: text
    text: '1. Adresse, salutations et éloges sur la foi et la charité des Colossiens '
  - type: usfm
    marker: ior
    children:
    - type: text
      text: 1:1-8
- type: usfm
  marker: io1
  children:
  - type: text
    text: '2. Jésus-Christ, chef de l’Église '
  - type: usfm
    marker: ior
    children:
    - type: text
      text: 1:9-23
- type: usfm
  marker: io1
  children:
  - type: text
    text: '3. Travaux et combats de Paul dans son ministère parmi les païens '
  - type: usfm
    marker: ior
    children:
    - type: text
      text: 1:24–2:3
- type: usfm
  marker: io1
  children:
  - type: text
    text: '4. Avertissement contre les fausses doctrines '
  - type: usfm
    marker: ior
    children:
    - type: text
      text: 2:4–3:4
- type: usfm
  marker: io1
  children:
  - type: text
    text: '5. Exhortation à la sainteté, à la charité et à la piété '
  - type: usfm
    marker: ior
    children:
    - type: text
      text: 3:5-17
- type: usfm
  marker: io1
  children:
  - type: text
    text: '6. Devoirs domestiques '
  - type: usfm
    marker: ior
    children:
    - type: text
      text: 3:18–4:8
- type: usfm
  marker: io1
  children:
  - type: text
    text: '7. Envoi de Tychique et Onésime et salutations finales '
  - type: usfm
    marker: ior
    children:
    - type: text
      text: 4:9-18
- type: usfm
  marker: ip
  children:
  - type: text
    text: La petite ville appelée Colosses en Phrygie occidentale jouissait d’une relative prospérité due principalement à l’élevage des moutons. Ce qui est rapporté en 1:7 et 4:12-13 suggère que l’Église de Colosses fut fondée par un compagnon de Paul, Épaphras, et non par lui-même. Mais la mission de Paul dans cette région a certainement eu des retentissements.
- type: usfm
  marker: ip
  children:
  - type: text
    text: Paul écrit quand il est en prison. Mais comme pour l’Épître aux Philippiens, on ignore le lieu exact de son emprisonnement, ce qui a des conséquences sur sa date de rédaction.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le but de l’épître est une mise en garde contre l’hérésie dont la communauté est menacée sur le plan aussi bien doctrinal que moral: '
  - type: usfm
    marker: it
    children:
    - type: text
      text: «Prenez garde que personne ne fasse de vous sa proie par la philosophie et par une vaine tromperie, s’appuyant sur la tradition des hommes, sur les rudiments du monde, et non sur Christ»
  - type: text
    text: ' (2:8, voir aussi 2:10: '
  - type: usfm
    marker: it
    children:
    - type: text
      text: «Vous avez tout pleinement en Christ qui est le chef de toute domination et de toute autorité»).
- type: usfm
  marker: ip
  children:
  - type: text
    text: Au-delà des problèmes de communauté propre à chaque épître, celle aux Colossiens a donc une grande importance parce qu’elle expose l’œuvre universelle du Christ. En Christ et en Christ seul s’établit le rapport entre l’histoire du salut et la création tout entière.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Une singulière parenté littéraire existe entre l’épître aux Colossiens et celle aux Éphésiens. Elle a trait en particulier à la nature des thèmes qui sont traités dans l’une et l’autre. On peut en faire une présentation synoptique. À titre d’exemple: Christ est la tête de l’Église qui est son corps 1:18 (voir Éph 1:22); les relations mari et femme, enfants et parents 3:18-21 (voir Éph 5:21–6:4); les relations esclaves et maîtres 3:22 – 4:1 (voir Éph 6:5-9). On s’aperçoit ainsi que l’ecclésiologie domine le message doctrinal des deux épîtres.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Toutefois, le vocabulaire des deux est différent. On peut donc logiquement penser, concernant leurs auteurs, que l’une serait l’œuvre d’un rédacteur final qui aurait utilisé l’autre.
- type: usfm
  marker: is1
  children:
  - type: text
    text: 'Quelques développements parallèles:'
- type: text
  text: Colossiens:Éphésiens:1:6-71:13-141:131:152:1-52:131:151:93:131:24-294:15-162:195:63:6
