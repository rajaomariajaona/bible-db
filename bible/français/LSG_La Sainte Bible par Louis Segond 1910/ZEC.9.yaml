document_id: ZEC.9,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Les nations vaincues
  - type: heading
    content: 'V. 1-8: cf. Jé 49:23-27. (Éz 26 à 28.) So 2:4-7.'
  - type: text
    content: Oracle, parole de l’Éternel sur le pays de Hadrac.
  - type: text
    content: Elle s’arrête sur Damas,
  - type: text
    content: Car l’Éternel a l’œil sur les hommes
  - type: text
    content: Comme sur toutes les tribus d’Israël;
  '10':
  - type: text
    content: Je détruirai les chars d’Éphraïm,
  - type: text
    content: Et les chevaux de Jérusalem;
  - type: text
    content: Et les arcs de guerre seront anéantis.
  - type: text
    content: Il annoncera la paix aux nations,
  - type: text
    content: Et il dominera d’une mer à l’autre,
  - type: text
    content: Depuis le fleuve jusqu’aux extrémités de la terre.
  '11':
  - type: text
    content: 'Et pour toi, à cause de ton alliance scellée par le '
  - type: note
    content: Mt 26:28. 1 Co 11:25. Hé 9:19, 20, 21.
  - type: text
    content: sang,
  - type: text
    content: Je retirerai tes captifs de la fosse où il n’y a pas d’eau.
  '12':
  - type: text
    content: Retournez à la forteresse, captifs pleins d’espérance!
  - type: text
    content: Aujourd’hui encore je le déclare,
  - type: text
    content: Je te rendrai le double.
  - type: heading
    content: 'V. 13-17: cf. Za 10:3-12. Jé 31:10-14.'
  '13':
  - type: text
    content: Car je bande Juda comme un arc,
  - type: text
    content: Je m’arme d’Éphraïm comme d’un arc,
  - type: text
    content: Et je soulèverai tes enfants, ô Sion,
  - type: text
    content: Contre tes enfants, ô Javan!
  - type: text
    content: Je te rendrai pareille à l’épée d’un vaillant homme.
  '14':
  - type: text
    content: L’Éternel au-dessus d’eux apparaîtra,
  - type: text
    content: 'Et sa flèche partira comme '
  - type: note
    content: Na 2:4.
  - type: text
    content: l’éclair;
  - type: text
    content: Le Seigneur, l’Éternel, sonnera de la trompette,
  - type: text
    content: Il s’avancera dans l’ouragan du midi.
  '15':
  - type: text
    content: L’Éternel des armées les protégera;
  - type: text
    content: Ils dévoreront, ils vaincront les pierres de la fronde;
  - type: text
    content: Ils boiront, ils seront bruyants comme pris de vin;
  - type: text
    content: Ils seront pleins comme une coupe,
  - type: text
    content: Comme les coins de l’autel.
  '16':
  - type: text
    content: L’Éternel, leur Dieu, les sauvera en ce jour-là,
  - type: text
    content: Comme le troupeau de son peuple;
  - type: text
    content: Car ils sont les pierres d’un diadème,
  - type: text
    content: Qui brilleront dans son pays.
  '17':
  - type: text
    content: Oh! Quelle prospérité pour eux! Quelle beauté!
  - type: text
    content: Le froment fera croître les jeunes hommes,
  - type: text
    content: Et le moût les jeunes filles.
  '2':
  - type: text
    content: Elle s’arrête aussi sur Hamath, à la frontière de Damas,
  - type: text
    content: Sur Tyr et Sidon, malgré toute leur sagesse.
  '3':
  - type: text
    content: Tyr s’est bâti une forteresse;
  - type: text
    content: Elle a amassé l’argent comme la poussière,
  - type: text
    content: Et l’or comme la boue des rues.
  '4':
  - type: text
    content: Voici, le Seigneur s’en emparera,
  - type: text
    content: Il précipitera sa puissance dans la mer,
  - type: text
    content: Et elle sera consumée par le feu.
  '5':
  - type: text
    content: Askalon le verra, et elle sera dans la crainte;
  - type: text
    content: Gaza aussi, et un violent tremblement la saisira;
  - type: text
    content: Ékron aussi, car son espoir sera confondu.
  - type: text
    content: Le roi disparaîtra de Gaza,
  - type: text
    content: Et Askalon ne sera plus habitée.
  '6':
  - type: text
    content: L’étranger s’établira dans Asdod,
  - type: text
    content: Et j’abattrai l’orgueil des Philistins.
  '7':
  - type: text
    content: J’ôterai le sang de sa bouche,
  - type: text
    content: Et les abominations d’entre ses dents;
  - type: text
    content: Lui aussi restera pour notre Dieu;
  - type: text
    content: Il sera comme un chef en Juda,
  - type: text
    content: Et Ékron sera comme les Jébusiens.
  '8':
  - type: text
    content: Je camperai autour de ma maison pour la défendre contre une armée,
  - type: text
    content: Contre les allants et les venants,
  - type: text
    content: Et l’oppresseur ne passera plus près d’eux;
  - type: text
    content: Car maintenant mes yeux sont fixés sur elle.
  - type: heading
    content: Jérusalem sauvée
  - type: heading
    content: 'V. 9-12: cf. Mt 21:1-11. Ps 72. Jé 31:17, 21.'
  '9':
  - type: text
    content: Sois transportée d’allégresse, fille de Sion!
  - type: text
    content: Pousse des cris de joie, fille de Jérusalem!
  - type: text
    content: Voici, ton roi vient à toi;
  - type: text
    content: Il est juste et victorieux,
  - type: text
    content: Il est humble et monté sur un âne,
  - type: text
    content: Sur un âne, le petit d’une ânesse.
