document_id: ZEC.9
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les nations vaincues
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-8: cf. Jé 49:23-27. (Éz 26 à 28.) So 2:4-7.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Oracle, parole de l’Éternel sur le pays de Hadrac.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle s’arrête sur Damas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car l’Éternel a l’œil sur les hommes
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme sur toutes les tribus d’Israël;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Elle s’arrête aussi sur Hamath, à la frontière de Damas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sur Tyr et Sidon, malgré toute leur sagesse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tyr s’est bâti une forteresse;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle a amassé l’argent comme la poussière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et l’or comme la boue des rues.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Voici, le Seigneur s’en emparera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il précipitera sa puissance dans la mer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et elle sera consumée par le feu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Askalon le verra, et elle sera dans la crainte;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Gaza aussi, et un violent tremblement la saisira;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ékron aussi, car son espoir sera confondu.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le roi disparaîtra de Gaza,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et Askalon ne sera plus habitée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: L’étranger s’établira dans Asdod,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et j’abattrai l’orgueil des Philistins.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: J’ôterai le sang de sa bouche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les abominations d’entre ses dents;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lui aussi restera pour notre Dieu;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il sera comme un chef en Juda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et Ékron sera comme les Jébusiens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Je camperai autour de ma maison pour la défendre contre une armée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Contre les allants et les venants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et l’oppresseur ne passera plus près d’eux;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car maintenant mes yeux sont fixés sur elle.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jérusalem sauvée
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 9-12: cf. Mt 21:1-11. Ps 72. Jé 31:17, 21.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Sois transportée d’allégresse, fille de Sion!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pousse des cris de joie, fille de Jérusalem!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voici, ton roi vient à toi;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est juste et victorieux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est humble et monté sur un âne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sur un âne, le petit d’une ânesse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Je détruirai les chars d’Éphraïm,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les chevaux de Jérusalem;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les arcs de guerre seront anéantis.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il annoncera la paix aux nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il dominera d’une mer à l’autre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Depuis le fleuve jusqu’aux extrémités de la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Et pour toi, à cause de ton alliance scellée par le '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 26:28
      metadata:
        usfm: MAT.26.28
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 11:25
      metadata:
        usfm: 1CO.11.25
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 9:19
      metadata:
        usfm: HEB.9.19
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '20'
      metadata:
        usfm: HEB.9.20
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '21'
      metadata:
        usfm: HEB.9.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: sang,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je retirerai tes captifs de la fosse où il n’y a pas d’eau.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Retournez à la forteresse, captifs pleins d’espérance!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aujourd’hui encore je le déclare,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je te rendrai le double.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 13-17: cf. Za 10:3-12. Jé 31:10-14.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Car je bande Juda comme un arc,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je m’arme d’Éphraïm comme d’un arc,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je soulèverai tes enfants, ô Sion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Contre tes enfants, ô Javan!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je te rendrai pareille à l’épée d’un vaillant homme.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: L’Éternel au-dessus d’eux apparaîtra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et sa flèche partira comme '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Na 2:4
      metadata:
        usfm: NAM.2.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: l’éclair;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le Seigneur, l’Éternel, sonnera de la trompette,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il s’avancera dans l’ouragan du midi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: L’Éternel des armées les protégera;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils dévoreront, ils vaincront les pierres de la fronde;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils boiront, ils seront bruyants comme pris de vin;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils seront pleins comme une coupe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme les coins de l’autel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: L’Éternel, leur Dieu, les sauvera en ce jour-là,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme le troupeau de son peuple;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car ils sont les pierres d’un diadème,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui brilleront dans son pays.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Oh! Quelle prospérité pour eux! Quelle beauté!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le froment fera croître les jeunes hommes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le moût les jeunes filles.
