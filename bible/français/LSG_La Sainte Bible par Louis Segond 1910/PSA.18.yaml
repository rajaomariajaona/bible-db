document_id: PSA.18,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 2 S 22. Ps 2.
  - type: text
    content: 'Au chef des chantres. Du serviteur de l’Éternel, de David, qui adressa à l’Éternel les paroles de ce cantique, lorsque l’Éternel l’eut délivré de la main de tous ses ennemis et de la main de Saül. Il dit:'
  '10':
  - type: text
    content: 'Il abaissa les cieux, et il descendit:'
  - type: text
    content: Il y avait une épaisse nuée sous ses pieds.
  '11':
  - type: text
    content: Il était monté sur un chérubin, et il volait,
  - type: text
    content: Il planait sur les ailes du vent.
  '12':
  - type: text
    content: Il faisait des ténèbres sa retraite, sa tente autour de lui,
  - type: text
    content: Il était enveloppé des eaux obscures et de sombres nuages.
  '13':
  - type: text
    content: De la splendeur qui le précédait s’échappaient les nuées,
  - type: text
    content: Lançant de la grêle et des charbons de feu.
  '14':
  - type: text
    content: L’Éternel tonna dans les cieux,
  - type: text
    content: Le Très-Haut fit retentir sa voix,
  - type: text
    content: Avec la grêle et les charbons de feu.
  '15':
  - type: text
    content: Il lança ses flèches et dispersa mes ennemis,
  - type: text
    content: Il multiplia les coups de la foudre et les mit en déroute.
  '16':
  - type: text
    content: Le lit des eaux apparut,
  - type: text
    content: Les fondements du monde furent découverts,
  - type: text
    content: Par ta menace, ô Éternel!
  - type: text
    content: Par le bruit du souffle de tes narines.
  '17':
  - type: text
    content: Il étendit sa main d’en haut, il me saisit,
  - type: text
    content: Il me retira des grandes eaux;
  '18':
  - type: text
    content: Il me délivra de mon adversaire puissant,
  - type: text
    content: De mes ennemis qui étaient plus forts que moi.
  '19':
  - type: text
    content: Ils m’avaient surpris au jour de ma détresse;
  - type: text
    content: Mais l’Éternel fut mon appui.
  '2':
  - type: text
    content: Je t’aime, ô Éternel, ma force!
  '20':
  - type: text
    content: Il m’a mis au large,
  - type: text
    content: Il m’a sauvé, parce qu’il m’aime.
  '21':
  - type: text
    content: L’Éternel m’a traité selon ma droiture,
  - type: text
    content: Il m’a rendu selon la pureté de mes mains;
  '22':
  - type: text
    content: Car j’ai observé les voies de l’Éternel,
  - type: text
    content: Et je n’ai point été coupable envers mon Dieu.
  '23':
  - type: text
    content: Toutes ses ordonnances ont été devant moi,
  - type: text
    content: Et je ne me suis point écarté de ses lois.
  '24':
  - type: text
    content: J’ai été sans reproche envers lui,
  - type: text
    content: Et je me suis tenu en garde contre mon iniquité.
  '25':
  - type: text
    content: Aussi l’Éternel m’a rendu selon ma droiture,
  - type: text
    content: Selon la pureté de mes mains devant ses yeux.
  '26':
  - type: text
    content: Avec celui qui est bon tu te montres bon,
  - type: text
    content: Avec l’homme droit tu agis selon la droiture,
  '27':
  - type: text
    content: Avec celui qui est pur tu te montres pur,
  - type: text
    content: Et avec le pervers tu agis selon sa perversité.
  '28':
  - type: text
    content: Tu sauves le peuple qui s’humilie,
  - type: text
    content: Et tu abaisses les regards hautains.
  '29':
  - type: text
    content: Oui, tu fais briller ma lumière;
  - type: text
    content: L’Éternel, mon Dieu, éclaire mes ténèbres.
  '3':
  - type: text
    content: Éternel, mon rocher, ma forteresse, mon libérateur!
  - type: text
    content: Mon Dieu, mon rocher, où je trouve un abri!
  - type: text
    content: Mon bouclier, la force qui me sauve, ma haute retraite!
  '30':
  - type: text
    content: Avec toi je me précipite sur une troupe en armes,
  - type: text
    content: Avec mon Dieu je franchis une muraille.
  '31':
  - type: text
    content: Les voies de Dieu sont parfaites,
  - type: text
    content: La parole de l’Éternel est éprouvée;
  - type: text
    content: Il est un bouclier pour tous ceux qui se confient en lui.
  '32':
  - type: text
    content: Car qui est Dieu, si ce n’est l’Éternel;
  - type: text
    content: Et qui est un rocher, si ce n’est notre Dieu?
  '33':
  - type: text
    content: C’est Dieu qui me ceint de force,
  - type: text
    content: Et qui me conduit dans la voie droite.
  '34':
  - type: text
    content: Il rend mes pieds semblables à ceux des biches,
  - type: text
    content: Et il me place sur mes lieux élevés.
  '35':
  - type: text
    content: Il exerce mes mains au combat,
  - type: text
    content: Et mes bras tendent l’arc d’airain.
  '36':
  - type: text
    content: Tu me donnes le bouclier de ton salut,
  - type: text
    content: Ta droite me soutient,
  - type: text
    content: Et je deviens grand par ta bonté.
  '37':
  - type: text
    content: Tu élargis le chemin sous mes pas,
  - type: text
    content: Et mes pieds ne chancellent point.
  '38':
  - type: text
    content: Je poursuis mes ennemis, je les atteins,
  - type: text
    content: Et je ne reviens pas avant de les avoir anéantis.
  '39':
  - type: text
    content: Je les brise, et ils ne peuvent se relever;
  - type: text
    content: Ils tombent sous mes pieds.
  '4':
  - type: text
    content: 'Je m’écrie: Loué soit l’Éternel!'
  - type: text
    content: Et je suis délivré de mes ennemis.
  '40':
  - type: text
    content: Tu me ceins de force pour le combat,
  - type: text
    content: Tu fais plier sous moi mes adversaires.
  '41':
  - type: text
    content: Tu fais tourner le dos à mes ennemis devant moi,
  - type: text
    content: Et j’extermine ceux qui me haïssent.
  '42':
  - type: text
    content: Ils crient, et personne pour les sauver!
  - type: text
    content: Ils crient à l’Éternel, et il ne leur répond pas!
  '43':
  - type: text
    content: Je les broie comme la poussière qu’emporte le vent,
  - type: text
    content: Je les foule comme la boue des rues.
  '44':
  - type: text
    content: Tu me délivres des dissensions du peuple;
  - type: text
    content: Tu me mets à la tête des nations;
  - type: text
    content: Un peuple que je ne connaissais pas m’est asservi.
  '45':
  - type: text
    content: Ils m’obéissent au premier ordre,
  - type: text
    content: Les fils de l’étranger me flattent;
  '46':
  - type: text
    content: Les fils de l’étranger sont en défaillance,
  - type: text
    content: Ils tremblent hors de leurs forteresses.
  '47':
  - type: text
    content: Vive l’Éternel, et béni soit mon rocher!
  - type: text
    content: Que le Dieu de mon salut soit exalté,
  '48':
  - type: text
    content: Le Dieu qui est mon vengeur,
  - type: text
    content: Qui m’assujettit les peuples,
  '49':
  - type: text
    content: Qui me délivre de mes ennemis!
  - type: text
    content: Tu m’élèves au-dessus de mes adversaires,
  - type: text
    content: Tu me sauves de l’homme violent.
  '5':
  - type: text
    content: Les liens de la mort m’avaient environné,
  - type: text
    content: Et les torrents de la destruction m’avaient épouvanté;
  '50':
  - type: text
    content: C’est pourquoi je te louerai parmi les nations, ô Éternel!
  - type: text
    content: Et je chanterai à la gloire de ton nom.
  '51':
  - type: text
    content: Il accorde de grandes délivrances à son roi,
  - type: text
    content: Et il fait miséricorde à son oint,
  - type: text
    content: A David, et à sa postérité, pour toujours.
  '6':
  - type: text
    content: Les liens du sépulcre m’avaient entouré,
  - type: text
    content: Les filets de la mort m’avaient surpris.
  '7':
  - type: text
    content: Dans ma détresse, j’ai invoqué l’Éternel,
  - type: text
    content: J’ai crié à mon Dieu;
  - type: text
    content: De son palais, il a entendu ma voix,
  - type: text
    content: Et mon cri est parvenu devant lui à ses oreilles.
  '8':
  - type: text
    content: La terre fut ébranlée et trembla,
  - type: text
    content: Les fondements des montagnes frémirent,
  - type: text
    content: Et ils furent ébranlés, parce qu’il était irrité.
  '9':
  - type: text
    content: Il s’élevait de la fumée dans ses narines,
  - type: text
    content: 'Et un feu dévorant sortait de sa bouche:'
  - type: text
    content: Il en jaillissait des charbons embrasés.
