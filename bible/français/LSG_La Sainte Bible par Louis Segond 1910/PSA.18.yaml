document_id: PSA.18,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2 S 22. Ps 2.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Au chef des chantres. Du serviteur de l’Éternel, de David, qui adressa à l’Éternel les paroles de ce cantique, lorsque l’Éternel l’eut délivré de la main de tous ses ennemis et de la main de Saül. Il dit:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Il abaissa les cieux, et il descendit:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il y avait une épaisse nuée sous ses pieds.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Il était monté sur un chérubin, et il volait,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il planait sur les ailes du vent.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Il faisait des ténèbres sa retraite, sa tente autour de lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il était enveloppé des eaux obscures et de sombres nuages.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: De la splendeur qui le précédait s’échappaient les nuées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lançant de la grêle et des charbons de feu.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: L’Éternel tonna dans les cieux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le Très-Haut fit retentir sa voix,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avec la grêle et les charbons de feu.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Il lança ses flèches et dispersa mes ennemis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il multiplia les coups de la foudre et les mit en déroute.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Le lit des eaux apparut,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les fondements du monde furent découverts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par ta menace, ô Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par le bruit du souffle de tes narines.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Il étendit sa main d’en haut, il me saisit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il me retira des grandes eaux;
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Il me délivra de mon adversaire puissant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De mes ennemis qui étaient plus forts que moi.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ils m’avaient surpris au jour de ma détresse;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais l’Éternel fut mon appui.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Je t’aime, ô Éternel, ma force!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Il m’a mis au large,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il m’a sauvé, parce qu’il m’aime.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: L’Éternel m’a traité selon ma droiture,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il m’a rendu selon la pureté de mes mains;
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Car j’ai observé les voies de l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je n’ai point été coupable envers mon Dieu.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Toutes ses ordonnances ont été devant moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je ne me suis point écarté de ses lois.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: J’ai été sans reproche envers lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je me suis tenu en garde contre mon iniquité.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Aussi l’Éternel m’a rendu selon ma droiture,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Selon la pureté de mes mains devant ses yeux.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Avec celui qui est bon tu te montres bon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avec l’homme droit tu agis selon la droiture,
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Avec celui qui est pur tu te montres pur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et avec le pervers tu agis selon sa perversité.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Tu sauves le peuple qui s’humilie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tu abaisses les regards hautains.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Oui, tu fais briller ma lumière;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel, mon Dieu, éclaire mes ténèbres.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Éternel, mon rocher, ma forteresse, mon libérateur!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon Dieu, mon rocher, où je trouve un abri!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon bouclier, la force qui me sauve, ma haute retraite!
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Avec toi je me précipite sur une troupe en armes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avec mon Dieu je franchis une muraille.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Les voies de Dieu sont parfaites,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La parole de l’Éternel est éprouvée;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est un bouclier pour tous ceux qui se confient en lui.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Car qui est Dieu, si ce n’est l’Éternel;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qui est un rocher, si ce n’est notre Dieu?
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: C’est Dieu qui me ceint de force,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qui me conduit dans la voie droite.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Il rend mes pieds semblables à ceux des biches,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il me place sur mes lieux élevés.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Il exerce mes mains au combat,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et mes bras tendent l’arc d’airain.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Tu me donnes le bouclier de ton salut,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ta droite me soutient,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je deviens grand par ta bonté.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Tu élargis le chemin sous mes pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et mes pieds ne chancellent point.
  '38':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Je poursuis mes ennemis, je les atteins,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je ne reviens pas avant de les avoir anéantis.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: Je les brise, et ils ne peuvent se relever;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils tombent sous mes pieds.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Je m’écrie: Loué soit l’Éternel!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je suis délivré de mes ennemis.
  '40':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Tu me ceins de force pour le combat,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu fais plier sous moi mes adversaires.
  '41':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: Tu fais tourner le dos à mes ennemis devant moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et j’extermine ceux qui me haïssent.
  '42':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: Ils crient, et personne pour les sauver!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils crient à l’Éternel, et il ne leur répond pas!
  '43':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: Je les broie comme la poussière qu’emporte le vent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je les foule comme la boue des rues.
  '44':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: Tu me délivres des dissensions du peuple;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu me mets à la tête des nations;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un peuple que je ne connaissais pas m’est asservi.
  '45':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: Ils m’obéissent au premier ordre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les fils de l’étranger me flattent;
  '46':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: Les fils de l’étranger sont en défaillance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils tremblent hors de leurs forteresses.
  '47':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: Vive l’Éternel, et béni soit mon rocher!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que le Dieu de mon salut soit exalté,
  '48':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: Le Dieu qui est mon vengeur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui m’assujettit les peuples,
  '49':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: Qui me délivre de mes ennemis!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu m’élèves au-dessus de mes adversaires,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu me sauves de l’homme violent.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Les liens de la mort m’avaient environné,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les torrents de la destruction m’avaient épouvanté;
  '50':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: C’est pourquoi je te louerai parmi les nations, ô Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je chanterai à la gloire de ton nom.
  '51':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: Il accorde de grandes délivrances à son roi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il fait miséricorde à son oint,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A David, et à sa postérité, pour toujours.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Les liens du sépulcre m’avaient entouré,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les filets de la mort m’avaient surpris.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Dans ma détresse, j’ai invoqué l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai crié à mon Dieu;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De son palais, il a entendu ma voix,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et mon cri est parvenu devant lui à ses oreilles.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: La terre fut ébranlée et trembla,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les fondements des montagnes frémirent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils furent ébranlés, parce qu’il était irrité.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Il s’élevait de la fumée dans ses narines,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et un feu dévorant sortait de sa bouche:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il en jaillissait des charbons embrasés.
