- type: usfm
  marker: s1
  children:
  - type: text
    text: Les deux paniers de figues et l’avenir du peuple
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-10: cf. Jé 29:1-19.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Éternel me fit voir deux paniers de figues posés devant le temple de l’Éternel, après que '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 24:15
      metadata:
        usfm: 2KI.24.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 36:20
      metadata:
        usfm: 2CH.36.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Nebucadnetsar, roi de Babylone, eut emmené de Jérusalem et conduit à Babylone Jeconia, fils de Jojakim, roi de Juda, les chefs de Juda, les charpentiers et les serruriers. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'L’un des paniers contenait de très bonnes figues, comme les figues de la première récolte, et l’autre panier de très mauvaises figues, qu’on ne pouvait manger à cause de leur mauvaise qualité. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'L’Éternel me dit: Que vois-tu, Jérémie? Je répondis: Des figues. Les bonnes figues sont très bonnes, et les mauvaises sont très mauvaises et ne peuvent être mangées à cause de leur mauvaise qualité. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'La parole de l’Éternel me fut adressée, en ces mots: '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ainsi parle l’Éternel, le Dieu d’Israël: Comme tu distingues ces bonnes figues, ainsi je distinguerai, pour leur être favorable, les captifs de Juda, que j’ai envoyés de ce lieu dans le pays des Chaldéens. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Je les regarderai d’un œil favorable, et je les '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 16:15
      metadata:
        usfm: JER.16.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ramènerai dans ce pays; je les établirai et ne les détruirai plus, je les planterai et ne les arracherai plus. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 30:6
      metadata:
        usfm: DEU.30.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 32:39
      metadata:
        usfm: JER.32.39
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 11:19
      metadata:
        usfm: EZK.11.19
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 36:26
      metadata:
        usfm: EZK.36.26
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '27'
      metadata:
        usfm: EZK.36.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Je leur donnerai un cœur pour qu’ils connaissent que je suis l’Éternel; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 30:22
      metadata:
        usfm: JER.30.22
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 31:33
      metadata:
        usfm: JER.31.33
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 32:38
      metadata:
        usfm: JER.32.38
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ils seront mon peuple, et je serai leur Dieu, s’ils reviennent à moi de tout leur cœur. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 29:17
      metadata:
        usfm: JER.29.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Et comme les mauvaises figues qui ne peuvent être mangées à cause de leur mauvaise qualité, dit l’Éternel, ainsi ferai-je devenir Sédécias, roi de Juda, ses chefs, et le reste de Jérusalem, ceux qui sont restés dans ce pays et ceux qui habitent dans le pays d’Égypte. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 28:25
      metadata:
        usfm: DEU.28.25
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '37'
      metadata:
        usfm: DEU.28.37
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 9:7
      metadata:
        usfm: 1KI.9.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 7:20
      metadata:
        usfm: 2CH.7.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 15:4
      metadata:
        usfm: JER.15.4
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 29:18
      metadata:
        usfm: JER.29.18
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 34:17
      metadata:
        usfm: JER.34.17
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 42:18
      metadata:
        usfm: JER.42.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Je les rendrai un objet d’effroi, de malheur, pour tous les royaumes de la terre, un sujet d’opprobre, de sarcasme, de raillerie, et de malédiction, dans tous les lieux où je les chasserai. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: J’enverrai parmi eux l’épée, la famine et la peste, jusqu’à ce qu’ils aient disparu du pays que j’avais donné à eux et à leurs pères.
