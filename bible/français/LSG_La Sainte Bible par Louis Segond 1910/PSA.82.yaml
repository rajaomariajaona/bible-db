document_id: PSA.82,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 2 Ch 19:5-11. (Ps 58. És 1:16-26.)
  - type: text
    content: Psaume d’Asaph.
  - type: text
    content: Dieu se tient dans l’assemblée de Dieu;
  - type: text
    content: Il juge au milieu des dieux.
  '2':
  - type: text
    content: Jusques à quand jugerez-vous avec iniquité,
  - type: text
    content: 'Et aurez-vous égard à la personne des méchants? '
  - type: text
    content: — Pause.
  '3':
  - type: text
    content: Rendez justice au faible et à l’orphelin,
  - type: text
    content: Faites droit au malheureux et au pauvre,
  '4':
  - type: text
    content: ' '
  - type: note
    content: Pr 24:11.
  - type: text
    content: Sauvez le misérable et l’indigent,
  - type: text
    content: Délivrez-les de la main des méchants.
  '5':
  - type: text
    content: Ils n’ont ni savoir ni intelligence,
  - type: text
    content: Ils marchent dans les ténèbres;
  - type: text
    content: Tous les fondements de la terre sont ébranlés.
  '6':
  - type: text
    content: 'J’avais dit: Vous êtes des dieux,'
  - type: text
    content: Vous êtes tous des fils du Très-Haut.
  '7':
  - type: text
    content: Cependant vous mourrez comme des hommes,
  - type: text
    content: Vous tomberez comme un prince quelconque.
  '8':
  - type: text
    content: Lève-toi, ô Dieu, juge la terre!
  - type: note
    content: Ps 2:8. Hé 1:2.
  - type: text
    content: Car toutes les nations t’appartiennent.
