document_id: PSA.82
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 2 Ch 19:5-11. (Ps 58. És 1:16-26.)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Psaume d’Asaph.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dieu se tient dans l’assemblée de Dieu;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il juge au milieu des dieux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Jusques à quand jugerez-vous avec iniquité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et aurez-vous égard à la personne des méchants? '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: — Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Rendez justice au faible et à l’orphelin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Faites droit au malheureux et au pauvre,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 24:11
      metadata:
        usfm: PRO.24.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Sauvez le misérable et l’indigent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Délivrez-les de la main des méchants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ils n’ont ni savoir ni intelligence,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils marchent dans les ténèbres;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous les fondements de la terre sont ébranlés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'J’avais dit: Vous êtes des dieux,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous êtes tous des fils du Très-Haut.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Cependant vous mourrez comme des hommes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous tomberez comme un prince quelconque.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Lève-toi, ô Dieu, juge la terre!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 2:8
      metadata:
        usfm: PSA.2.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 1:2
      metadata:
        usfm: HEB.1.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Car toutes les nations t’appartiennent.
