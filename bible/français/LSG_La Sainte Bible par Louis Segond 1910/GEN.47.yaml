document_id: GEN.47,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-12: cf. Ge 46:31-34; 45:7, 10, 11. Ps 103:15-18.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joseph alla avertir Pharaon, et lui dit: Mes frères et mon père sont arrivés du pays de Canaan, avec leurs brebis et leurs bœufs, et tout ce qui leur appartient; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 45:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'et les voici dans le pays de Gosen. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jacob bénit encore Pharaon, et se retira de devant Pharaon. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joseph établit son père et ses frères, et leur donna une propriété dans le pays d’Égypte, dans la meilleure partie du pays, dans la contrée de Ramsès, comme Pharaon l’avait ordonné. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Joseph fournit du pain à son père et à ses frères, et à toute la famille de son père, selon le nombre des enfants.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 13-26: cf. Ge 41:30-36, 48-57.'
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il n’y avait plus de pain dans tout le pays, car la famine était très grande; le pays d’Égypte et le pays de Canaan languissaient, à cause de la famine. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joseph recueillit tout l’argent qui se trouvait dans le pays d’Égypte et dans le pays de Canaan, contre le blé qu’on achetait; et il fit entrer cet argent dans la maison de Pharaon. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand l’argent du pays d’Égypte et du pays de Canaan fut épuisé, tous les Égyptiens vinrent à Joseph, en disant: Donne-nous du pain! Pourquoi mourrions-nous en ta présence? Car l’argent manque. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joseph dit: Donnez vos troupeaux, et je vous donnerai du pain contre vos troupeaux, si l’argent manque. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils amenèrent leurs troupeaux à Joseph, et Joseph leur donna du pain contre les chevaux, contre les troupeaux de brebis et de bœufs, et contre les ânes. Il leur fournit ainsi du pain cette année-là contre tous leurs troupeaux. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque cette année fut écoulée, ils vinrent à Joseph l’année suivante, et lui dirent: Nous ne cacherons point à mon seigneur que l’argent est épuisé, et que les troupeaux de bétail ont été amenés à mon seigneur; il ne reste devant mon seigneur que nos corps et nos terres. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pourquoi mourrions-nous sous tes yeux, nous et nos terres? Achète-nous avec nos terres contre du pain, et nous appartiendrons à mon seigneur, nous et nos terres. Donne-nous de quoi semer, afin que nous vivions et que nous ne mourions pas, et que nos terres ne soient pas désolées. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il prit cinq de ses frères, et les présenta à Pharaon. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joseph acheta toutes les terres de l’Égypte pour Pharaon; car les Égyptiens vendirent chacun leur champ, parce que la famine les pressait. Et le pays devint la propriété de Pharaon. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il fit passer le peuple dans les villes, d’un bout à l’autre des frontières de l’Égypte. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Seulement, il n’acheta point les terres des prêtres, parce qu’il y avait une loi de Pharaon en faveur des prêtres, qui vivaient du revenu que leur assurait Pharaon: c’est pourquoi ils ne vendirent point leurs terres. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joseph dit au peuple: Je vous ai achetés aujourd’hui avec vos terres, pour Pharaon; voici pour vous de la semence, et vous pourrez ensemencer le sol. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A la récolte, vous donnerez un cinquième à Pharaon, et vous aurez les quatre autres parties, pour ensemencer les champs, et pour vous nourrir avec vos enfants et ceux qui sont dans vos maisons. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils dirent: Tu nous sauves la vie! Que nous trouvions grâce aux yeux de mon seigneur, et nous serons esclaves de Pharaon. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Joseph fit de cela une loi, qui a subsisté jusqu’à ce jour, et d’après laquelle un cinquième du revenu des terres de l’Égypte appartient à Pharaon; il n’y a que les terres des prêtres qui ne soient point à Pharaon.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 27-31: cf. Ge 49:29-32; 50:4-13.'
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Israël habita dans le pays d’Égypte, dans le pays de Gosen. Ils eurent des possessions, ils furent féconds et multiplièrent beaucoup. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jacob vécut dix-sept ans dans le pays d’Égypte; et les jours des années de la vie de Jacob furent de cent quarante-sept ans. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsqu’Israël approcha du moment de sa mort, il appela son fils Joseph, et lui dit: Si j’ai trouvé grâce à tes yeux, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 24:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'mets, je te prie, ta main sous ma cuisse, et use envers moi de bonté et de fidélité: ne m’enterre pas en Égypte! '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pharaon leur dit: Quelle est votre occupation? Ils répondirent à Pharaon: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 46:34
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Tes serviteurs sont bergers, comme l’étaient nos pères. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand je serai couché avec mes pères, tu me transporteras hors de l’Égypte, et tu m’enterreras dans leur sépulcre. Joseph répondit: Je ferai selon ta parole. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jacob dit: Jure-le-moi. Et Joseph le lui jura. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 11:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Puis Israël se prosterna sur le chevet de son lit.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils dirent encore à Pharaon: Nous sommes venus pour séjourner dans le pays, parce qu’il n’y a plus de pâturage pour les brebis de tes serviteurs, car la famine s’appesantit sur le pays de Canaan; permets donc à tes serviteurs d’habiter au pays de Gosen. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pharaon dit à Joseph: Ton père et tes frères sont venus auprès de toi. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le pays d’Égypte est devant toi; établis ton père et tes frères dans la meilleure partie du pays. Qu’ils habitent dans le pays de Gosen; et, si tu trouves parmi eux des hommes capables, mets-les à la tête de mes troupeaux. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joseph fit venir Jacob, son père, et le présenta à Pharaon. Et Jacob bénit Pharaon. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pharaon dit à Jacob: Quel est le nombre de jours des années de ta vie? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jacob répondit à Pharaon: Les jours des années de '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 119:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 11:9
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '13'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'mon pèlerinage sont de cent trente ans. Les jours des années de ma vie ont été peu nombreux et mauvais, et ils n’ont point atteint les jours des années de la vie de mes pères durant leur pèlerinage. '
