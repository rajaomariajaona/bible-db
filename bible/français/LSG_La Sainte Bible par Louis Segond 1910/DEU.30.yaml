document_id: DEU.30,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les promesses et les menaces
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-10: cf. Lé 26:40-45. (Jé 29:10-14. Esd 1.) (Jé 30 à 33. Éz 36; 37.) Ro 5:20.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Lorsque toutes ces choses t’arriveront, la bénédiction et la malédiction que je mets devant toi, si tu les prends à cœur au milieu de toutes les nations chez lesquelles l’Éternel, ton Dieu, t’aura chassé, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: lorsque tu obéiras à la voix de l’Éternel, ton Dieu, en observant ses commandements et ses ordres écrits dans ce livre de la loi, lorsque tu reviendras à l’Éternel, ton Dieu, de tout ton cœur et de toute ton âme.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 11-14: cf. Ro 10:6-11. 1 Jn 5:3.'
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ce commandement que je te prescris aujourd’hui n’est certainement point '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 45:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'au-dessus de tes forces et hors de ta portée. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Il n’est pas dans le ciel, pour que tu dises: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ro 10:6, etc.
      marker-yv: yv-n
    - type: text
      text: 'Qui montera pour nous au ciel et nous l’ira chercher, qui nous le fera entendre, afin que nous le mettions en pratique? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Il n’est pas de l’autre côté de la mer, pour que tu dises: Qui passera pour nous de l’autre côté de la mer et nous l’ira chercher, qui nous le fera entendre, afin que nous le mettions en pratique? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: C’est une chose, au contraire, qui est tout près de toi, dans ta bouche et dans ton cœur, afin que tu la mettes en pratique.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 15-20: cf. De 11:26-28; 28. (Pr 8:1-5, 32, 35, 36; 9:11.) (Lu 10:42.)'
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Vois, je mets aujourd’hui devant toi la vie et le bien, la mort et le mal. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Car je te prescris aujourd’hui d’aimer l’Éternel, ton Dieu, de marcher dans ses voies, et d’observer ses commandements, ses lois et ses ordonnances, afin que tu vives et que tu multiplies, et que l’Éternel, ton Dieu, te bénisse dans le pays dont tu vas entrer en possession. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Mais si ton cœur se détourne, si tu n’obéis point, et si tu te laisses entraîner à te prosterner devant d’autres dieux et à les servir, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'je vous déclare aujourd’hui que vous périrez, que vous ne prolongerez point vos jours dans le pays dont vous allez entrer en possession, après avoir passé le Jourdain. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 4:26
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'J’en prends aujourd’hui à témoin contre vous le ciel et la terre: j’ai mis devant toi la vie et la mort, la bénédiction et la malédiction. Choisis la vie, afin que tu vives, toi et ta postérité, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'si tu reviens à l’Éternel, ton Dieu, et si tu obéis à sa voix de tout ton cœur et de toute ton âme, toi et tes enfants, selon tout ce que je te prescris aujourd’hui, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'pour aimer l’Éternel, ton Dieu, pour obéir à sa voix, et pour t’attacher à lui: car de cela dépendent ta vie et la prolongation de tes jours, et c’est ainsi que tu pourras demeurer dans le pays que l’Éternel a juré de donner à tes pères, Abraham, Isaac et Jacob.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'alors l’Éternel, ton Dieu, ramènera '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Né 1:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 106:45
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 32:37
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'tes captifs et aura compassion de toi, il te rassemblera encore du milieu de tous les peuples chez lesquels l’Éternel, ton Dieu, t’aura dispersé. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Né 1:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Quand tu serais exilé à l’autre extrémité du ciel, l’Éternel, ton Dieu, te rassemblera de là, et c’est là qu’il t’ira chercher. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'L’Éternel, ton Dieu, te ramènera dans le pays que possédaient tes pères, et tu le posséderas; il te fera du bien, et te rendra plus nombreux que tes pères. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'L’Éternel, ton Dieu, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 32:39
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 11:19
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 39:26
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'circoncira ton cœur et le cœur de ta postérité, et tu aimeras l’Éternel, ton Dieu, de tout ton cœur et de toute ton âme, afin que tu vives. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'L’Éternel, ton Dieu, fera tomber toutes ces malédictions sur tes ennemis, sur ceux qui t’auront haï et persécuté. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Et toi, tu reviendras à l’Éternel, tu obéiras à sa voix, et tu mettras en pratique tous ces commandements que je te prescris aujourd’hui. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 28:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'L’Éternel, ton Dieu, te comblera de biens en faisant prospérer tout le travail de tes mains, le fruit de tes entrailles, le fruit de tes troupeaux et le fruit de ton sol; car l’Éternel prendra de nouveau plaisir à ton bonheur, comme il prenait plaisir à celui de tes pères, '
