document_id: JOS.4
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les douze pierres
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-24: cf. (Jos 3:10-17. Mi 6:5.) Ps 78:2-8. (Lu 19:40.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Lorsque toute la nation eut achevé de passer le Jourdain, l’Éternel '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 3:12
      metadata:
        usfm: JOS.3.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'dit à Josué: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Prenez douze hommes parmi le peuple, un homme de chaque tribu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Donnez-leur cet ordre: Enlevez d’ici, du milieu du Jourdain, de la place où les sacrificateurs se sont arrêtés de pied ferme, douze pierres, que vous emporterez avec vous, et que vous déposerez dans le lieu où vous passerez cette nuit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Josué appela les douze hommes qu’il choisit parmi les enfants d’Israël, un homme de chaque tribu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il leur dit: Passez devant l’arche de l’Éternel, votre Dieu, au milieu du Jourdain, et que chacun de vous charge une pierre sur son épaule, selon le nombre des tribus des enfants d’Israël, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'afin que cela soit un signe au milieu de vous. Lorsque vos enfants demanderont un jour: Que signifient pour vous ces pierres? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'vous leur direz: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 3:13
      metadata:
        usfm: JOS.3.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Les eaux du Jourdain ont été coupées devant l’arche de l’alliance de l’Éternel; lorsqu’elle passa le Jourdain, les eaux du Jourdain ont été coupées, et ces pierres seront à jamais un souvenir pour les enfants d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Les enfants d’Israël firent ce que Josué leur avait ordonné. Ils enlevèrent douze pierres du milieu du Jourdain, comme l’Éternel l’avait dit à Josué, selon le nombre des tribus des enfants d’Israël, ils les emportèrent avec eux, et les déposèrent dans le lieu où ils devaient passer la nuit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Josué dressa aussi douze pierres au milieu du Jourdain, à la place où s’étaient arrêtés les pieds des sacrificateurs qui portaient l’arche de l’alliance; et elles y sont restées jusqu’à ce jour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Les sacrificateurs qui portaient l’arche se tinrent au milieu du Jourdain jusqu’à l’entière exécution de ce que l’Éternel avait ordonné à Josué de dire au peuple, selon tout ce que Moïse avait prescrit à Josué. Et le peuple se hâta de passer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Lorsque tout le peuple eut achevé de passer, l’arche de l’Éternel et les sacrificateurs passèrent devant le peuple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 32:20
      metadata:
        usfm: NUM.32.20
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '29'
      metadata:
        usfm: NUM.32.29
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Les fils de Ruben, les fils de Gad, et la demi-tribu de Manassé, passèrent en armes devant les enfants d’Israël, comme Moïse le leur avait dit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Environ quarante mille hommes, équipés pour la guerre et prêts à combattre, passèrent devant l’Éternel dans les plaines de Jéricho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 3:7
      metadata:
        usfm: JOS.3.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'En ce jour-là, l’Éternel éleva Josué aux yeux de tout Israël; et ils le craignirent, comme ils avaient craint Moïse, tous les jours de sa vie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'L’Éternel dit à Josué: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ordonne aux sacrificateurs qui portent l’arche du témoignage de sortir du Jourdain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Et Josué donna cet ordre aux sacrificateurs: Sortez du Jourdain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Lorsque les sacrificateurs qui portaient l’arche de l’alliance de l’Éternel furent sortis du milieu du Jourdain, et que la plante de leurs pieds se posa sur le sec, les eaux du Jourdain retournèrent à leur place, et se répandirent comme auparavant sur tous ses bords. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Le peuple sortit du Jourdain le dixième jour du premier mois, et il campa à Guilgal, à l’extrémité orientale de Jéricho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Josué dressa à Guilgal les douze pierres qu’ils avaient prises du Jourdain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Il dit aux enfants d’Israël: Lorsque vos enfants demanderont un jour à leurs pères: Que signifient ces pierres? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'vous en instruirez vos enfants, et vous direz: Israël a passé ce Jourdain à sec. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Car l’Éternel, votre Dieu, a mis à sec devant vous les eaux du Jourdain jusqu’à ce que vous eussiez passé, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 14:21
      metadata:
        usfm: EXO.14.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'comme l’Éternel, votre Dieu, l’avait fait à la mer Rouge, qu’il mit à sec devant nous jusqu’à ce que nous eussions passé, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: afin que tous les peuples de la terre sachent que la main de l’Éternel est puissante, et afin que vous ayez toujours la crainte de l’Éternel, votre Dieu.
