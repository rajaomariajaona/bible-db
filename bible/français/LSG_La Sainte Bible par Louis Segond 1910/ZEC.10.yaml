document_id: ZEC.10,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Le règne de l’Éternel
  - type: heading
    content: 'V. 1-5: cf. (Jé 14:22; 27:9, 10.) Éz 34:1-22. Za 9:13-15.'
  - type: text
    content: Demandez à l’Éternel la pluie, la pluie du printemps!
  - type: text
    content: L’Éternel produira des éclairs,
  - type: text
    content: Et il vous enverra une abondante pluie,
  - type: text
    content: Il donnera à chacun de l’herbe dans son champ.
  '10':
  - type: text
    content: Je les ramènerai du pays d’Égypte,
  - type: text
    content: Et je les rassemblerai de l’Assyrie;
  - type: text
    content: Je les ferai venir au pays de Galaad et au Liban,
  - type: text
    content: Et l’espace ne leur suffira pas.
  '11':
  - type: text
    content: Il passera la mer de détresse, il frappera les flots de la mer,
  - type: text
    content: Et toutes les profondeurs du fleuve seront desséchées;
  - type: text
    content: L’orgueil de l’Assyrie sera abattu,
  - type: text
    content: Et le sceptre de l’Égypte disparaîtra.
  '12':
  - type: text
    content: Je les fortifierai par l’Éternel,
  - type: text
    content: Et ils marcheront en son nom,
  - type: text
    content: Dit l’Éternel.
  '2':
  - type: text
    content: Car les théraphim ont des paroles de néant,
  - type: text
    content: Les devins prophétisent des faussetés,
  - type: note
    content: Ec 5:6.
  - type: text
    content: Les songes mentent et consolent par la vanité.
  - type: text
    content: C’est pourquoi ils sont errants comme un troupeau,
  - type: text
    content: Ils sont malheureux parce qu’il n’y a point de pasteur.
  '3':
  - type: text
    content: Ma colère s’est enflammée contre les pasteurs,
  - type: text
    content: Et je châtierai les boucs;
  - type: text
    content: Car l’Éternel des armées visite son troupeau, la maison de Juda,
  - type: text
    content: Et il en fera comme son cheval de gloire dans la bataille;
  '4':
  - type: text
    content: De lui sortira l’angle, de lui le clou, de lui l’arc de guerre;
  - type: text
    content: De lui sortiront tous les chefs ensembles.
  '5':
  - type: text
    content: Ils seront comme des héros foulant dans la bataille la boue des rues;
  - type: text
    content: Ils combattront, parce que l’Éternel sera avec eux;
  - type: text
    content: Et ceux qui seront montés sur des chevaux seront couverts de honte.
  - type: heading
    content: 'V. 6-12: cf. És 11:11-16; 27:12, 13.'
  '6':
  - type: text
    content: Je fortifierai la maison de Juda,
  - type: text
    content: Et je délivrerai la maison de Joseph;
  - type: text
    content: Je les ramènerai, car j’ai compassion d’eux,
  - type: text
    content: Et ils seront comme si je ne les avais pas rejetés;
  - type: text
    content: Car je suis l’Éternel, leur Dieu, et je les exaucerai.
  '7':
  - type: text
    content: Éphraïm sera comme un héros;
  - type: text
    content: Leur cœur aura la joie que donne le vin;
  - type: text
    content: Leurs fils le verront et seront dans l’allégresse,
  - type: text
    content: Leur cœur se réjouira en l’Éternel.
  '8':
  - type: text
    content: Je les sifflerai et les rassemblerai, car je les rachète,
  - type: text
    content: Et ils multiplieront comme ils multipliaient.
  '9':
  - type: text
    content: Je les disperserai parmi les peuples,
  - type: text
    content: Et au loin ils se souviendront de moi;
  - type: text
    content: Ils vivront avec leurs enfants, et ils reviendront.
