document_id: ZEC.10
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le règne de l’Éternel
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-5: cf. (Jé 14:22; 27:9, 10.) Éz 34:1-22. Za 9:13-15.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Demandez à l’Éternel la pluie, la pluie du printemps!
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’Éternel produira des éclairs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il vous enverra une abondante pluie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il donnera à chacun de l’herbe dans son champ.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Car les théraphim ont des paroles de néant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les devins prophétisent des faussetés,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ec 5:6
      metadata:
        usfm: ECC.5.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Les songes mentent et consolent par la vanité.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est pourquoi ils sont errants comme un troupeau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils sont malheureux parce qu’il n’y a point de pasteur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ma colère s’est enflammée contre les pasteurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je châtierai les boucs;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car l’Éternel des armées visite son troupeau, la maison de Juda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il en fera comme son cheval de gloire dans la bataille;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: De lui sortira l’angle, de lui le clou, de lui l’arc de guerre;
- type: usfm
  marker: q1
  children:
  - type: text
    text: De lui sortiront tous les chefs ensembles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ils seront comme des héros foulant dans la bataille la boue des rues;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils combattront, parce que l’Éternel sera avec eux;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ceux qui seront montés sur des chevaux seront couverts de honte.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 6-12: cf. És 11:11-16; 27:12, 13.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Je fortifierai la maison de Juda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je délivrerai la maison de Joseph;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je les ramènerai, car j’ai compassion d’eux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils seront comme si je ne les avais pas rejetés;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car je suis l’Éternel, leur Dieu, et je les exaucerai.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Éphraïm sera comme un héros;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leur cœur aura la joie que donne le vin;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leurs fils le verront et seront dans l’allégresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leur cœur se réjouira en l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Je les sifflerai et les rassemblerai, car je les rachète,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils multiplieront comme ils multipliaient.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Je les disperserai parmi les peuples,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et au loin ils se souviendront de moi;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils vivront avec leurs enfants, et ils reviendront.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Je les ramènerai du pays d’Égypte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je les rassemblerai de l’Assyrie;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je les ferai venir au pays de Galaad et au Liban,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et l’espace ne leur suffira pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Il passera la mer de détresse, il frappera les flots de la mer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et toutes les profondeurs du fleuve seront desséchées;
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’orgueil de l’Assyrie sera abattu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le sceptre de l’Égypte disparaîtra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Je les fortifierai par l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils marcheront en son nom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit l’Éternel.
