document_id: PSA.85
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: Esd 1 à 3. Ps 126.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef des chantres. Des fils de Koré. Psaume.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tu as été favorable à ton pays, ô Éternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu as ramené les captifs de Jacob;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tu as pardonné l’iniquité de ton peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tu as couvert tous ses péchés; '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: — Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tu as retiré toute ta fureur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu es revenu de l’ardeur de ta colère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Rétablis-nous, Dieu de notre salut!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cesse ton indignation contre nous!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: T’irriteras-tu contre nous à jamais?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Prolongeras-tu ta colère éternellement?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ne nous '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 71:20
      metadata:
        usfm: PSA.71.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: rendras-tu pas à la vie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afin que ton peuple se réjouisse en toi?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Éternel! Fais-nous voir ta bonté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et accorde-nous ton salut!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: J’écouterai ce que dit Dieu, l’Éternel;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car il parle de paix à son peuple et à ses fidèles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourvu qu’ils ne retombent pas dans la folie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Oui, son salut est près de ceux qui le craignent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afin que la gloire habite dans notre pays.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: La bonté et la fidélité se rencontrent,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 7:2
      metadata:
        usfm: HEB.7.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: La justice et la paix s’embrassent;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: La fidélité germe de la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la justice regarde du haut des cieux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: L’Éternel aussi accordera le bonheur,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 67:7
      metadata:
        usfm: PSA.67.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et notre terre donnera ses fruits.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: La justice marchera devant lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et imprimera ses pas sur le chemin.
