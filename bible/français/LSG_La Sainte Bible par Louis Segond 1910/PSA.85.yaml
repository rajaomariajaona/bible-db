document_id: PSA.85,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: Esd 1 à 3. Ps 126.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Au chef des chantres. Des fils de Koré. Psaume.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Oui, son salut est près de ceux qui le craignent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afin que la gloire habite dans notre pays.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: La bonté et la fidélité se rencontrent,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 7:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: La justice et la paix s’embrassent;
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: La fidélité germe de la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la justice regarde du haut des cieux.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: L’Éternel aussi accordera le bonheur,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 67:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Et notre terre donnera ses fruits.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: La justice marchera devant lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et imprimera ses pas sur le chemin.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Tu as été favorable à ton pays, ô Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as ramené les captifs de Jacob;
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Tu as pardonné l’iniquité de ton peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tu as couvert tous ses péchés; '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: — Pause.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Tu as retiré toute ta fureur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu es revenu de l’ardeur de ta colère.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Rétablis-nous, Dieu de notre salut!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cesse ton indignation contre nous!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: T’irriteras-tu contre nous à jamais?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prolongeras-tu ta colère éternellement?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ne nous '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 71:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: rendras-tu pas à la vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afin que ton peuple se réjouisse en toi?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Éternel! Fais-nous voir ta bonté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et accorde-nous ton salut!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: J’écouterai ce que dit Dieu, l’Éternel;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car il parle de paix à son peuple et à ses fidèles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourvu qu’ils ne retombent pas dans la folie.
