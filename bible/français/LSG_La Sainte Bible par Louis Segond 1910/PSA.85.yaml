document_id: PSA.85,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Esd 1 à 3. Ps 126.
  - type: text
    content: Au chef des chantres. Des fils de Koré. Psaume.
  '10':
  - type: text
    content: Oui, son salut est près de ceux qui le craignent,
  - type: text
    content: Afin que la gloire habite dans notre pays.
  '11':
  - type: text
    content: La bonté et la fidélité se rencontrent,
  - type: note
    content: Hé 7:2.
  - type: text
    content: La justice et la paix s’embrassent;
  '12':
  - type: text
    content: La fidélité germe de la terre,
  - type: text
    content: Et la justice regarde du haut des cieux.
  '13':
  - type: text
    content: L’Éternel aussi accordera le bonheur,
  - type: note
    content: Ps 67:7.
  - type: text
    content: Et notre terre donnera ses fruits.
  '14':
  - type: text
    content: La justice marchera devant lui,
  - type: text
    content: Et imprimera ses pas sur le chemin.
  '2':
  - type: text
    content: Tu as été favorable à ton pays, ô Éternel!
  - type: text
    content: Tu as ramené les captifs de Jacob;
  '3':
  - type: text
    content: Tu as pardonné l’iniquité de ton peuple,
  - type: text
    content: 'Tu as couvert tous ses péchés; '
  - type: text
    content: — Pause.
  '4':
  - type: text
    content: Tu as retiré toute ta fureur,
  - type: text
    content: Tu es revenu de l’ardeur de ta colère.
  '5':
  - type: text
    content: Rétablis-nous, Dieu de notre salut!
  - type: text
    content: Cesse ton indignation contre nous!
  '6':
  - type: text
    content: T’irriteras-tu contre nous à jamais?
  - type: text
    content: Prolongeras-tu ta colère éternellement?
  '7':
  - type: text
    content: 'Ne nous '
  - type: note
    content: Ps 71:20.
  - type: text
    content: rendras-tu pas à la vie,
  - type: text
    content: Afin que ton peuple se réjouisse en toi?
  '8':
  - type: text
    content: Éternel! Fais-nous voir ta bonté,
  - type: text
    content: Et accorde-nous ton salut!
  '9':
  - type: text
    content: J’écouterai ce que dit Dieu, l’Éternel;
  - type: text
    content: Car il parle de paix à son peuple et à ses fidèles,
  - type: text
    content: Pourvu qu’ils ne retombent pas dans la folie.
