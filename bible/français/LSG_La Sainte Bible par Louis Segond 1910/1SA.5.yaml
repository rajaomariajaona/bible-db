document_id: 1SA.5
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Samuel, prophète et juge en Israël
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-5: cf. (Ps 115:1-8. Jé 10:14, 15.) Job 20:5.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Les Philistins prirent l’arche de Dieu, et ils la transportèrent d’Ében-Ézer à Asdod. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Après s’être emparés de l’arche de Dieu, les Philistins la firent entrer dans la maison de Dagon et la placèrent à côté de Dagon. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Le lendemain, les Asdodiens, qui s’étaient levés de bon matin, trouvèrent Dagon étendu la face contre terre, devant l’arche de l’Éternel. Ils prirent Dagon, et le remirent à sa place. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Le lendemain encore, s’étant levés de bon matin, ils trouvèrent Dagon étendu la face contre terre, devant l’arche de l’Éternel; la tête de Dagon et ses deux mains étaient abattues sur le seuil, et il ne lui restait que le tronc. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: C’est pourquoi jusqu’à ce jour, les prêtres de Dagon et tous ceux qui entrent dans la maison de Dagon à Asdod ne marchent point sur le seuil.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’arche chez les Philistins
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 6-12: cf. 1 S 6:1-12. Job 2:5. Ps 97:9.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'La main de l’Éternel s’appesantit sur les Asdodiens, et il mit la désolation parmi eux; il les frappa d’hémorroïdes à '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 78:66
      metadata:
        usfm: PSA.78.66
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Asdod et dans son territoire. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Voyant qu’il en était ainsi, les gens d’Asdod dirent: L’arche du Dieu d’Israël ne restera pas chez nous, car il appesantit sa main sur nous et sur Dagon, notre dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Et ils firent chercher et assemblèrent auprès d’eux tous les princes des Philistins, et ils dirent: Que ferons-nous de l’arche du Dieu d’Israël? Les princes répondirent: Que l’on transporte à Gath l’arche du Dieu d’Israël. Et l’on y transporta l’arche du Dieu d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Mais après qu’elle eut été transportée, la main de l’Éternel fut sur la ville, et il y eut une très grande consternation; il frappa les gens de la ville depuis le petit jusqu’au grand, et ils eurent une éruption d’hémorroïdes. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Alors ils envoyèrent l’arche de Dieu à Ékron. Lorsque l’arche de Dieu entra dans Ékron, les Ékroniens poussèrent des cris, en disant: On a transporté chez nous l’arche du Dieu d’Israël, pour nous faire mourir, nous et notre peuple! '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Et ils firent chercher et assemblèrent tous les princes des Philistins, et ils dirent: Renvoyez l’arche du Dieu d’Israël; qu’elle retourne en son lieu, et qu’elle ne nous fasse pas mourir, nous et notre peuple. Car il y avait dans toute la ville une terreur mortelle; la main de Dieu s’y appesantissait fortement. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Les gens qui ne mouraient pas étaient frappés d’hémorroïdes, et les cris de la ville montaient jusqu’au ciel.
