document_id: LEV.1,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les holocaustes
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-13: cf. Ge 8:20, 21. (Lé 6:2-4. No 15:1-16, 28.) (Ps 66:13-15; 51:18-21.) (Hé 10:1-14. Ép 5:2. Ph 2:8.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Éternel appela Moïse; de la tente d’assignation, il lui parla et dit: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si son offrande est un holocauste de menu bétail, d’agneaux ou de chèvres, il offrira un mâle sans défaut. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il l’égorgera au côté septentrional de l’autel, devant l’Éternel; et les sacrificateurs, fils d’Aaron, en répandront le sang sur l’autel tout autour. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il le coupera par morceaux; et le sacrificateur les posera, avec la tête et la graisse, sur le bois mis au feu sur l’autel. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il lavera avec de l’eau les entrailles et les jambes; et le sacrificateur sacrifiera le tout, et le brûlera sur l’autel. C’est un holocauste, un sacrifice consumé par le feu, d’une agréable odeur à l’Éternel.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 14-17: cf. Lé 5:7-10. 2 Co 8:12.'
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si son offrande à l’Éternel est un holocauste d’oiseaux, il offrira des tourterelles ou de jeunes pigeons. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le sacrificateur sacrifiera l’oiseau sur l’autel; il lui ouvrira la tête avec l’ongle, et la brûlera sur l’autel, et il exprimera le sang contre un côté de l’autel. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il ôtera le jabot avec ses plumes, et le jettera près de l’autel, vers l’orient, dans le lieu où l’on met les cendres. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il déchirera les ailes, sans les détacher; et le sacrificateur brûlera l’oiseau sur l’autel, sur le bois mis au feu. C’est un holocauste, un sacrifice consumé par le feu, d’une agréable odeur à l’Éternel.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Parle aux enfants d’Israël, et dis-leur: Lorsque quelqu’un d’entre vous fera une offrande à l’Éternel, il offrira du bétail, du gros ou du menu bétail. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si son offrande est un holocauste de gros bétail, il offrira un mâle sans défaut; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 29:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'il l’offrira à l’entrée de la tente d’assignation, devant l’Éternel, pour obtenir sa faveur. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il posera sa main sur la tête de l’holocauste, qui sera agréé de l’Éternel, pour lui servir d’expiation. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il égorgera le veau devant l’Éternel; et les sacrificateurs, fils d’Aaron, offriront le sang, et le répandront tout autour sur l’autel qui est à l’entrée de la tente d’assignation. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il dépouillera l’holocauste, et le coupera par morceaux. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les fils du sacrificateur Aaron mettront du feu sur l’autel, et arrangeront du bois sur le feu. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les sacrificateurs, fils d’Aaron, poseront les morceaux, la tête et la graisse, sur le bois mis au feu sur l’autel. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il lavera avec de l’eau les entrailles et les jambes; et le sacrificateur brûlera le tout sur l’autel. C’est un holocauste, un sacrifice consumé par le feu, d’une agréable odeur à l’Éternel. '
