document_id: AMO.2,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-3: cf. És 15; 16. Jé 48. Éz 25:8-11. So 2:8, 9.'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ainsi parle l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause de trois crimes de Moab,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Même de quatre, je ne révoque pas mon arrêt,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce qu’il a brûlé, calciné les os du roi d’Édom.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Et pourtant je vous ai fait monter du pays '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 12:51
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: d’Égypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je vous ai conduits quarante ans dans le désert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour vous mettre en possession du pays des Amoréens.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: J’ai suscité parmi vos fils des prophètes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et parmi vos jeunes hommes des naziréens.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N’en est-il pas ainsi, enfants d’Israël? Dit l’Éternel…
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Et vous avez fait boire du vin aux naziréens!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et aux prophètes vous avez '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Am 7:12
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '13'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'donné cet ordre:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne prophétisez pas!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Voici, je vous écraserai,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme foule la terre un chariot chargé de gerbes.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Celui qui est agile ne pourra fuir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui a de la force ne pourra s’en servir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’homme vaillant ne sauvera pas sa vie;
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Celui qui manie l’arc ne résistera pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui a les pieds légers n’échappera pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le cavalier ne sauvera pas sa vie;
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Le plus courageux des guerriers
  - type: usfm
    marker: q1
    children:
    - type: text
      text: S’enfuira nu dans ce jour-là, dit l’Éternel.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: J’enverrai le feu dans Moab,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il dévorera les palais de Kerijoth;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et Moab périra au milieu du tumulte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au milieu des cris de guerre et du bruit de la trompette.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: J’exterminerai de son sein le juge,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je tuerai tous ses chefs avec lui, dit l’Éternel.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 4-5: cf. Jé 9:11-16. 2 Ch 36:14-20.'
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ainsi parle l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause de trois crimes de Juda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Même de quatre, je ne révoque pas mon arrêt,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce qu’ils ont méprisé la loi de l’Éternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qu’ils n’ont pas gardé ses ordonnances,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce qu’ils ont été égarés par les idoles mensongères
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Après lesquelles leurs pères ont marché.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: J’enverrai le feu dans Juda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il dévorera les palais de Jérusalem.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 6-16: cf. (Am 4:1-3; 5:11-13; 8:4-7.) Jé 2:4-7, 19.'
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ainsi parle l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause de trois crimes d’Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Même de quatre, je ne révoque pas mon arrêt,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Parce qu’ils ont vendu le juste pour '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Am 8:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: de l’argent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le pauvre pour une paire de souliers.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ils aspirent à voir la poussière de la terre sur la tête des misérables,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils violent le droit des malheureux.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le fils et le père vont vers la même fille,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afin de profaner mon saint nom.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ils s’étendent près de chaque autel sur des vêtements pris en gage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils boivent dans la maison de leurs dieux le vin de ceux qu’ils condamnent.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Et pourtant j’ai détruit devant eux les '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 21:24
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 2:31
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 24:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Amoréens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dont la hauteur égalait celle des cèdres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la force celle des chênes;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai détruit leurs fruits en haut,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et leurs racines en bas.
