document_id: AMO.2,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-3: cf. És 15; 16. Jé 48. Éz 25:8-11. So 2:8, 9.'
  - type: text
    content: 'Ainsi parle l’Éternel:'
  - type: text
    content: A cause de trois crimes de Moab,
  - type: text
    content: Même de quatre, je ne révoque pas mon arrêt,
  - type: text
    content: Parce qu’il a brûlé, calciné les os du roi d’Édom.
  '10':
  - type: text
    content: 'Et pourtant je vous ai fait monter du pays '
  - type: note
    content: Ex 12:51.
  - type: text
    content: d’Égypte,
  - type: text
    content: Et je vous ai conduits quarante ans dans le désert,
  - type: text
    content: Pour vous mettre en possession du pays des Amoréens.
  '11':
  - type: text
    content: J’ai suscité parmi vos fils des prophètes,
  - type: text
    content: Et parmi vos jeunes hommes des naziréens.
  - type: text
    content: N’en est-il pas ainsi, enfants d’Israël? Dit l’Éternel…
  '12':
  - type: text
    content: Et vous avez fait boire du vin aux naziréens!
  - type: text
    content: 'Et aux prophètes vous avez '
  - type: note
    content: Am 7:12, 13.
  - type: text
    content: 'donné cet ordre:'
  - type: text
    content: Ne prophétisez pas!
  '13':
  - type: text
    content: Voici, je vous écraserai,
  - type: text
    content: Comme foule la terre un chariot chargé de gerbes.
  '14':
  - type: text
    content: Celui qui est agile ne pourra fuir,
  - type: text
    content: Celui qui a de la force ne pourra s’en servir,
  - type: text
    content: Et l’homme vaillant ne sauvera pas sa vie;
  '15':
  - type: text
    content: Celui qui manie l’arc ne résistera pas,
  - type: text
    content: Celui qui a les pieds légers n’échappera pas,
  - type: text
    content: Et le cavalier ne sauvera pas sa vie;
  '16':
  - type: text
    content: Le plus courageux des guerriers
  - type: text
    content: S’enfuira nu dans ce jour-là, dit l’Éternel.
  '2':
  - type: text
    content: J’enverrai le feu dans Moab,
  - type: text
    content: Et il dévorera les palais de Kerijoth;
  - type: text
    content: Et Moab périra au milieu du tumulte,
  - type: text
    content: Au milieu des cris de guerre et du bruit de la trompette.
  '3':
  - type: text
    content: J’exterminerai de son sein le juge,
  - type: text
    content: Et je tuerai tous ses chefs avec lui, dit l’Éternel.
  - type: heading
    content: 'V. 4-5: cf. Jé 9:11-16. 2 Ch 36:14-20.'
  '4':
  - type: text
    content: 'Ainsi parle l’Éternel:'
  - type: text
    content: A cause de trois crimes de Juda,
  - type: text
    content: Même de quatre, je ne révoque pas mon arrêt,
  - type: text
    content: Parce qu’ils ont méprisé la loi de l’Éternel
  - type: text
    content: Et qu’ils n’ont pas gardé ses ordonnances,
  - type: text
    content: Parce qu’ils ont été égarés par les idoles mensongères
  - type: text
    content: Après lesquelles leurs pères ont marché.
  '5':
  - type: text
    content: J’enverrai le feu dans Juda,
  - type: text
    content: Et il dévorera les palais de Jérusalem.
  - type: heading
    content: 'V. 6-16: cf. (Am 4:1-3; 5:11-13; 8:4-7.) Jé 2:4-7, 19.'
  '6':
  - type: text
    content: 'Ainsi parle l’Éternel:'
  - type: text
    content: A cause de trois crimes d’Israël,
  - type: text
    content: Même de quatre, je ne révoque pas mon arrêt,
  - type: text
    content: 'Parce qu’ils ont vendu le juste pour '
  - type: note
    content: Am 8:6.
  - type: text
    content: de l’argent,
  - type: text
    content: Et le pauvre pour une paire de souliers.
  '7':
  - type: text
    content: Ils aspirent à voir la poussière de la terre sur la tête des misérables,
  - type: text
    content: Et ils violent le droit des malheureux.
  - type: text
    content: Le fils et le père vont vers la même fille,
  - type: text
    content: Afin de profaner mon saint nom.
  '8':
  - type: text
    content: Ils s’étendent près de chaque autel sur des vêtements pris en gage,
  - type: text
    content: Et ils boivent dans la maison de leurs dieux le vin de ceux qu’ils condamnent.
  '9':
  - type: text
    content: 'Et pourtant j’ai détruit devant eux les '
  - type: note
    content: No 21:24. De 2:31. Jos 24:8.
  - type: text
    content: Amoréens,
  - type: text
    content: Dont la hauteur égalait celle des cèdres,
  - type: text
    content: Et la force celle des chênes;
  - type: text
    content: J’ai détruit leurs fruits en haut,
  - type: text
    content: Et leurs racines en bas.
