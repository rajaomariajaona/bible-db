document_id: 1CO.11,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Soyez '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 4:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ph 3:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Th 1:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Th 3:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: mes imitateurs, comme je le suis moi-même de Christ.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sur la tenue de la femme dans les assemblées religieuses
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 2-16: cf. 1 Co 14:40. (Ép 5:22-24. 1 Ti 2:8-14.)'
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est pourquoi la femme, à cause des anges, doit avoir sur la tête une marque de l’autorité dont elle dépend. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toutefois, dans le Seigneur, la femme n’est point sans l’homme, ni l’homme sans la femme. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car, de même que la femme a été tirée de l’homme, de même l’homme existe par la femme, et tout vient de Dieu. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jugez-en vous-mêmes: est-il convenable qu’une femme prie Dieu sans être voilée? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La nature elle-même ne vous enseigne-t-elle pas que c’est une honte pour l’homme de porter de longs cheveux, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mais que c’est une gloire pour la femme d’en porter, parce que la chevelure lui a été donnée comme voile? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ti 6:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Si quelqu’un se plaît à contester, nous n’avons pas cette habitude, non plus que les Églises de Dieu.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sur la manière de célébrer le repas du Seigneur
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 17-34: cf. (Mt 26:26-28. Mc 14:22-25. Lu 22:19, 20. 1 Co 10:16, 17.) 1 S 2:12-17.'
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En donnant cet avertissement, ce que je ne loue point, c’est que vous vous assemblez, non pour devenir meilleurs, mais pour devenir pires. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et d’abord, j’apprends que, lorsque vous vous réunissez en assemblée, il y a parmi vous des divisions, et je le crois en partie, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 18:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 17:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'car il faut qu’il y ait aussi des sectes '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 20:30
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Jn 2:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'parmi vous, afin que ceux qui sont approuvés soient reconnus comme tels au milieu de vous. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je vous loue de ce que vous vous souvenez de moi à tous égards, et de ce que vous retenez mes instructions telles que je vous les ai données. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lors donc que vous vous réunissez, ce n’est pas pour manger le repas du Seigneur; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'car, quand on se met à table, chacun commence par prendre son propre repas, et l’un a faim, tandis que l’autre est ivre. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'N’avez-vous pas des maisons pour y manger et boire? Ou méprisez-vous l’Église de Dieu, et faites-vous honte à ceux qui n’ont rien? Que vous dirai-je? Vous louerai-je? En cela je ne vous loue point. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car j’ai reçu du Seigneur ce que je vous ai enseigné; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 26:26
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 14:22
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 22:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'c’est que le Seigneur Jésus, dans la nuit où il fut livré, prit du pain, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et, après avoir rendu grâces, le rompit, et dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ceci est mon corps, qui est rompu pour vous; faites ceci en mémoire de moi.
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De même, après avoir soupé, il prit la coupe, et dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Cette coupe est la nouvelle alliance en mon sang; faites ceci en mémoire de moi toutes les fois que vous en boirez.
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car toutes les fois que vous mangez ce pain et que vous buvez cette coupe, vous annoncez la mort du Seigneur, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 14:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 1:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'jusqu’à ce qu’il vienne. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 9:10
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '13'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 6:51
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '63'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '64'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 13:27
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 10:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'C’est pourquoi celui qui mangera le pain ou boira la coupe du Seigneur indignement, sera coupable envers le corps et le sang du Seigneur. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 13:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Que chacun donc s’éprouve soi-même, et qu’ainsi il mange du pain et boive de la coupe; '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'car celui qui mange et boit sans discerner le corps du Seigneur, mange et boit un jugement contre lui-même. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je veux cependant que vous sachiez '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 5:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'que Christ est le chef de tout homme, que l’homme est le chef de la femme, et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 14:28
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 3:23
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'que Dieu est le chef de Christ. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est pour cela qu’il y a parmi vous beaucoup d’infirmes et de malades, et qu’un grand nombre sont morts. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 32:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 18:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Si nous nous jugions nous-mêmes, nous ne serions pas jugés. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais quand nous sommes jugés, nous sommes châtiés par le Seigneur, afin que nous ne soyons pas condamnés avec le monde. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi, mes frères, lorsque vous vous réunissez pour le repas, attendez-vous les uns les autres. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si quelqu’un a faim, qu’il mange chez lui, afin que vous ne vous réunissiez pas pour attirer un jugement sur vous. Je réglerai les autres choses quand je serai arrivé.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tout homme qui prie ou qui prophétise, la tête couverte, déshonore son chef. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toute femme, au contraire, qui prie ou qui prophétise, la tête non voilée, déshonore son chef: c’est comme si elle était rasée. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car si une femme n’est pas voilée, qu’elle se coupe aussi les cheveux. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 5:18
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 22:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Or, s’il est honteux pour une femme d’avoir les cheveux coupés ou d’être rasée, qu’elle se voile. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’homme ne doit pas se couvrir la tête, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 1:26
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '27'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 3:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'puisqu’il est l’image et la gloire de Dieu, tandis que la femme est la gloire de l’homme. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, l’homme n’a pas été tiré de la femme, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 2:18
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '21'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'mais la femme a été tirée de l’homme; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et l’homme n’a pas été créé à cause de la femme, mais la femme a été créée à cause de l’homme. '
