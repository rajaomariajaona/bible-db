document_id: 1CO.11,93
type_code: fra
verses:
  '1':
  - type: text
    content: 'Soyez '
  - type: note
    content: 1 Co 4:16. Ph 3:17. 1 Th 1:6. 2 Th 3:9.
  - type: text
    content: mes imitateurs, comme je le suis moi-même de Christ.
  - type: heading
    content: Sur la tenue de la femme dans les assemblées religieuses
  - type: heading
    content: 'V. 2-16: cf. 1 Co 14:40. (Ép 5:22-24. 1 Ti 2:8-14.)'
  '10':
  - type: text
    content: 'C’est pourquoi la femme, à cause des anges, doit avoir sur la tête une marque de l’autorité dont elle dépend. '
  '11':
  - type: text
    content: 'Toutefois, dans le Seigneur, la femme n’est point sans l’homme, ni l’homme sans la femme. '
  '12':
  - type: text
    content: 'Car, de même que la femme a été tirée de l’homme, de même l’homme existe par la femme, et tout vient de Dieu. '
  '13':
  - type: text
    content: 'Jugez-en vous-mêmes: est-il convenable qu’une femme prie Dieu sans être voilée? '
  '14':
  - type: text
    content: 'La nature elle-même ne vous enseigne-t-elle pas que c’est une honte pour l’homme de porter de longs cheveux, '
  '15':
  - type: text
    content: 'mais que c’est une gloire pour la femme d’en porter, parce que la chevelure lui a été donnée comme voile? '
  '16':
  - type: note
    content: 1 Ti 6:4.
  - type: text
    content: Si quelqu’un se plaît à contester, nous n’avons pas cette habitude, non plus que les Églises de Dieu.
  - type: heading
    content: Sur la manière de célébrer le repas du Seigneur
  - type: heading
    content: 'V. 17-34: cf. (Mt 26:26-28. Mc 14:22-25. Lu 22:19, 20. 1 Co 10:16, 17.) 1 S 2:12-17.'
  '17':
  - type: text
    content: 'En donnant cet avertissement, ce que je ne loue point, c’est que vous vous assemblez, non pour devenir meilleurs, mais pour devenir pires. '
  '18':
  - type: text
    content: 'Et d’abord, j’apprends que, lorsque vous vous réunissez en assemblée, il y a parmi vous des divisions, et je le crois en partie, '
  '19':
  - type: note
    content: Mt 18:7. Lu 17:1.
  - type: text
    content: 'car il faut qu’il y ait aussi des sectes '
  - type: note
    content: Ac 20:30. 1 Jn 2:19.
  - type: text
    content: 'parmi vous, afin que ceux qui sont approuvés soient reconnus comme tels au milieu de vous. '
  '2':
  - type: text
    content: 'Je vous loue de ce que vous vous souvenez de moi à tous égards, et de ce que vous retenez mes instructions telles que je vous les ai données. '
  '20':
  - type: text
    content: 'Lors donc que vous vous réunissez, ce n’est pas pour manger le repas du Seigneur; '
  '21':
  - type: text
    content: 'car, quand on se met à table, chacun commence par prendre son propre repas, et l’un a faim, tandis que l’autre est ivre. '
  '22':
  - type: text
    content: 'N’avez-vous pas des maisons pour y manger et boire? Ou méprisez-vous l’Église de Dieu, et faites-vous honte à ceux qui n’ont rien? Que vous dirai-je? Vous louerai-je? En cela je ne vous loue point. '
  '23':
  - type: text
    content: 'Car j’ai reçu du Seigneur ce que je vous ai enseigné; '
  - type: note
    content: Mt 26:26. Mc 14:22. Lu 22:19.
  - type: text
    content: 'c’est que le Seigneur Jésus, dans la nuit où il fut livré, prit du pain, '
  '24':
  - type: text
    content: 'et, après avoir rendu grâces, le rompit, et dit: '
  - type: text
    content: Ceci est mon corps, qui est rompu pour vous; faites ceci en mémoire de moi.
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'De même, après avoir soupé, il prit la coupe, et dit: '
  - type: text
    content: Cette coupe est la nouvelle alliance en mon sang; faites ceci en mémoire de moi toutes les fois que vous en boirez.
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'Car toutes les fois que vous mangez ce pain et que vous buvez cette coupe, vous annoncez la mort du Seigneur, '
  - type: note
    content: Jn 14:3. Ac 1:11.
  - type: text
    content: 'jusqu’à ce qu’il vienne. '
  '27':
  - type: note
    content: No 9:10, 13. Jn 6:51, 63, 64; 13:27. 1 Co 10:21.
  - type: text
    content: 'C’est pourquoi celui qui mangera le pain ou boira la coupe du Seigneur indignement, sera coupable envers le corps et le sang du Seigneur. '
  '28':
  - type: note
    content: 2 Co 13:5.
  - type: text
    content: 'Que chacun donc s’éprouve soi-même, et qu’ainsi il mange du pain et boive de la coupe; '
  '29':
  - type: text
    content: 'car celui qui mange et boit sans discerner le corps du Seigneur, mange et boit un jugement contre lui-même. '
  '3':
  - type: text
    content: 'Je veux cependant que vous sachiez '
  - type: note
    content: Ép 5:23.
  - type: text
    content: 'que Christ est le chef de tout homme, que l’homme est le chef de la femme, et '
  - type: note
    content: Jn 14:28. 1 Co 3:23; 15:27.
  - type: text
    content: 'que Dieu est le chef de Christ. '
  '30':
  - type: text
    content: 'C’est pour cela qu’il y a parmi vous beaucoup d’infirmes et de malades, et qu’un grand nombre sont morts. '
  '31':
  - type: note
    content: Ps 32:5. Pr 18:17.
  - type: text
    content: 'Si nous nous jugions nous-mêmes, nous ne serions pas jugés. '
  '32':
  - type: text
    content: 'Mais quand nous sommes jugés, nous sommes châtiés par le Seigneur, afin que nous ne soyons pas condamnés avec le monde. '
  '33':
  - type: text
    content: 'Ainsi, mes frères, lorsque vous vous réunissez pour le repas, attendez-vous les uns les autres. '
  '34':
  - type: text
    content: Si quelqu’un a faim, qu’il mange chez lui, afin que vous ne vous réunissiez pas pour attirer un jugement sur vous. Je réglerai les autres choses quand je serai arrivé.
  '4':
  - type: text
    content: 'Tout homme qui prie ou qui prophétise, la tête couverte, déshonore son chef. '
  '5':
  - type: text
    content: 'Toute femme, au contraire, qui prie ou qui prophétise, la tête non voilée, déshonore son chef: c’est comme si elle était rasée. '
  '6':
  - type: text
    content: 'Car si une femme n’est pas voilée, qu’elle se coupe aussi les cheveux. '
  - type: note
    content: No 5:18. De 22:5.
  - type: text
    content: 'Or, s’il est honteux pour une femme d’avoir les cheveux coupés ou d’être rasée, qu’elle se voile. '
  '7':
  - type: text
    content: 'L’homme ne doit pas se couvrir la tête, '
  - type: note
    content: Ge 1:26, 27; 5:1; 9:6. Col 3:10.
  - type: text
    content: 'puisqu’il est l’image et la gloire de Dieu, tandis que la femme est la gloire de l’homme. '
  '8':
  - type: text
    content: 'En effet, l’homme n’a pas été tiré de la femme, '
  - type: note
    content: Ge 2:18, 21.
  - type: text
    content: 'mais la femme a été tirée de l’homme; '
  '9':
  - type: text
    content: 'et l’homme n’a pas été créé à cause de la femme, mais la femme a été créée à cause de l’homme. '
