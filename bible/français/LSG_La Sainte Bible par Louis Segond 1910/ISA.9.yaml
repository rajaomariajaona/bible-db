document_id: ISA.9,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 4:15
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '16'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 5:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Le peuple qui marchait dans les ténèbres
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voit une grande lumière;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur ceux qui habitaient le pays de l’ombre de la mort
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Une lumière resplendit.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: L’Éternel élèvera contre eux les ennemis de Retsin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il armera leurs ennemis,
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Les Syriens à l’orient, les Philistins à l’occident;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils dévoreront Israël à pleine bouche.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 5:25
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Malgré tout cela, sa colère ne s’apaise point,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et sa main est encore étendue.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Le peuple ne revient pas à celui qui le frappe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il ne cherche pas l’Éternel des armées.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Aussi l’Éternel arrachera d’Israël la tête et la queue,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La branche de palmier et le roseau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En un seul jour.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: (L’ancien et le magistrat, c’est la tête,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le prophète qui enseigne le mensonge, c’est la queue).
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ceux qui conduisent ce peuple l’égarent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ceux qui se laissent conduire se perdent.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: C’est pourquoi le Seigneur ne saurait se réjouir de leurs jeunes hommes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ni avoir pitié de leurs orphelins et de leurs veuves;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car tous sont '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 10:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: des impies et des méchants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et toutes les bouches profèrent des infamies.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Malgré tout cela, sa colère ne s’apaise point,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et sa main est encore étendue.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Car '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 5:24
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 4:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: la méchanceté consume comme un feu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui dévore ronces et épines;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il embrase l’épaisseur de la forêt,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: D’où s’élèvent des colonnes de fumée.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Par la colère de l’Éternel des armées le pays est embrasé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le peuple est comme la proie du feu;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nul n’épargne son frère.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: On pille à droite, et l’on a faim;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On dévore à gauche, et l’on n’est pas rassasié;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Chacun dévore la chair de son bras.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Tu rends le peuple nombreux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu lui accordes de grandes joies;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il se réjouit devant toi, comme on se réjouit à la moisson,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme on pousse des cris d’allégresse au partage du butin.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Manassé dévore Éphraïm, Éphraïm Manassé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ensemble ils fondent sur Juda.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Malgré tout cela, sa colère ne s’apaise point,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et sa main est encore étendue.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Car le joug qui pesait sur lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le bâton qui frappait son dos,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La verge de celui qui l’opprimait,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tu les brises, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jg 7:22
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 10:26
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: comme à la journée de Madian.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Car toute chaussure qu’on porte dans la mêlée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tout vêtement guerrier roulé dans le sang,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Seront livrés aux flammes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour être dévorés par le feu.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Car un enfant nous est né, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 22:22
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 2:10
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '11'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 4:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: un fils nous est donné,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la domination reposera sur son épaule;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'On l’appellera Admirable, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 11:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 23:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Conseiller, Dieu puissant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Père éternel, Prince de la paix.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Donner à l’empire de l’accroissement,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et une paix sans fin au trône de David et à son royaume,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’affermir et le soutenir par le droit et par la justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dès maintenant et à toujours:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 19:31
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 37:32
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Voilà ce que fera le zèle de l’Éternel des armées.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Menaces contre d’Israël
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 7-20: cf. (Os 7:10-16. Am 5:18-20.) Ps 56:8. Hé 12:25.'
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Le Seigneur envoie une parole à Jacob:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle tombe sur Israël.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Tout le peuple en aura connaissance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Éphraïm et les habitants de Samarie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Qui disent avec orgueil et fierté:'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Des briques sont tombées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous bâtirons en pierres de taille;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des sycomores ont été coupés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous les remplacerons par des cèdres.
