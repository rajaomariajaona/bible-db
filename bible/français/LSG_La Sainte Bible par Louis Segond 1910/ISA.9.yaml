document_id: ISA.9,93
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: Mt 4:15, 16. Ép 5:14.
  - type: text
    content: Le peuple qui marchait dans les ténèbres
  - type: text
    content: Voit une grande lumière;
  - type: text
    content: Sur ceux qui habitaient le pays de l’ombre de la mort
  - type: text
    content: Une lumière resplendit.
  '10':
  - type: text
    content: L’Éternel élèvera contre eux les ennemis de Retsin,
  - type: text
    content: Et il armera leurs ennemis,
  '11':
  - type: text
    content: Les Syriens à l’orient, les Philistins à l’occident;
  - type: text
    content: Et ils dévoreront Israël à pleine bouche.
  - type: note
    content: És 5:25; 10:4.
  - type: text
    content: Malgré tout cela, sa colère ne s’apaise point,
  - type: text
    content: Et sa main est encore étendue.
  '12':
  - type: text
    content: Le peuple ne revient pas à celui qui le frappe,
  - type: text
    content: Et il ne cherche pas l’Éternel des armées.
  '13':
  - type: text
    content: Aussi l’Éternel arrachera d’Israël la tête et la queue,
  - type: text
    content: La branche de palmier et le roseau,
  - type: text
    content: En un seul jour.
  '14':
  - type: text
    content: (L’ancien et le magistrat, c’est la tête,
  - type: text
    content: Et le prophète qui enseigne le mensonge, c’est la queue).
  '15':
  - type: text
    content: Ceux qui conduisent ce peuple l’égarent,
  - type: text
    content: Et ceux qui se laissent conduire se perdent.
  '16':
  - type: text
    content: C’est pourquoi le Seigneur ne saurait se réjouir de leurs jeunes hommes,
  - type: text
    content: Ni avoir pitié de leurs orphelins et de leurs veuves;
  - type: text
    content: 'Car tous sont '
  - type: note
    content: És 10:6.
  - type: text
    content: des impies et des méchants,
  - type: text
    content: Et toutes les bouches profèrent des infamies.
  - type: text
    content: Malgré tout cela, sa colère ne s’apaise point,
  - type: text
    content: Et sa main est encore étendue.
  '17':
  - type: text
    content: 'Car '
  - type: note
    content: És 5:24; 4:6.
  - type: text
    content: la méchanceté consume comme un feu,
  - type: text
    content: Qui dévore ronces et épines;
  - type: text
    content: Il embrase l’épaisseur de la forêt,
  - type: text
    content: D’où s’élèvent des colonnes de fumée.
  '18':
  - type: text
    content: Par la colère de l’Éternel des armées le pays est embrasé,
  - type: text
    content: Et le peuple est comme la proie du feu;
  - type: text
    content: Nul n’épargne son frère.
  '19':
  - type: text
    content: On pille à droite, et l’on a faim;
  - type: text
    content: On dévore à gauche, et l’on n’est pas rassasié;
  - type: text
    content: Chacun dévore la chair de son bras.
  '2':
  - type: text
    content: Tu rends le peuple nombreux,
  - type: text
    content: Tu lui accordes de grandes joies;
  - type: text
    content: Il se réjouit devant toi, comme on se réjouit à la moisson,
  - type: text
    content: Comme on pousse des cris d’allégresse au partage du butin.
  '20':
  - type: text
    content: Manassé dévore Éphraïm, Éphraïm Manassé,
  - type: text
    content: Et ensemble ils fondent sur Juda.
  - type: text
    content: Malgré tout cela, sa colère ne s’apaise point,
  - type: text
    content: Et sa main est encore étendue.
  '3':
  - type: text
    content: Car le joug qui pesait sur lui,
  - type: text
    content: Le bâton qui frappait son dos,
  - type: text
    content: La verge de celui qui l’opprimait,
  - type: text
    content: 'Tu les brises, '
  - type: note
    content: Jg 7:22. És 10:26.
  - type: text
    content: comme à la journée de Madian.
  '4':
  - type: text
    content: Car toute chaussure qu’on porte dans la mêlée,
  - type: text
    content: Et tout vêtement guerrier roulé dans le sang,
  - type: text
    content: Seront livrés aux flammes,
  - type: text
    content: Pour être dévorés par le feu.
  '5':
  - type: text
    content: 'Car un enfant nous est né, '
  - type: note
    content: És 22:22. Lu 2:10, 11. Jn 4:10.
  - type: text
    content: un fils nous est donné,
  - type: text
    content: Et la domination reposera sur son épaule;
  - type: text
    content: 'On l’appellera Admirable, '
  - type: note
    content: És 11:2. Jé 23:6.
  - type: text
    content: Conseiller, Dieu puissant,
  - type: text
    content: Père éternel, Prince de la paix.
  '6':
  - type: text
    content: Donner à l’empire de l’accroissement,
  - type: text
    content: Et une paix sans fin au trône de David et à son royaume,
  - type: text
    content: L’affermir et le soutenir par le droit et par la justice,
  - type: text
    content: 'Dès maintenant et à toujours:'
  - type: note
    content: 2 R 19:31. És 37:32.
  - type: text
    content: Voilà ce que fera le zèle de l’Éternel des armées.
  - type: heading
    content: Menaces contre d’Israël
  - type: heading
    content: 'V. 7-20: cf. (Os 7:10-16. Am 5:18-20.) Ps 56:8. Hé 12:25.'
  '7':
  - type: text
    content: 'Le Seigneur envoie une parole à Jacob:'
  - type: text
    content: Elle tombe sur Israël.
  '8':
  - type: text
    content: Tout le peuple en aura connaissance,
  - type: text
    content: Éphraïm et les habitants de Samarie,
  - type: text
    content: 'Qui disent avec orgueil et fierté:'
  '9':
  - type: text
    content: Des briques sont tombées,
  - type: text
    content: Nous bâtirons en pierres de taille;
  - type: text
    content: Des sycomores ont été coupés,
  - type: text
    content: Nous les remplacerons par des cèdres.
