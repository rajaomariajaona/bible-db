document_id: PSA.125,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Jé 17:7, 8. Ps 34:8-23. És 26:3. 2 Ch 16:9.
  - type: text
    content: Cantique des degrés.
  - type: text
    content: Ceux qui se confient en l’Éternel
  - type: text
    content: 'Sont comme la montagne de Sion: elle ne chancelle point,'
  - type: text
    content: Elle est affermie pour toujours.
  '2':
  - type: text
    content: Des montagnes entourent Jérusalem;
  - type: text
    content: Ainsi l’Éternel entoure son peuple,
  - type: text
    content: Dès maintenant et à jamais.
  '3':
  - type: text
    content: Car le sceptre de la méchanceté ne restera pas sur le lot des justes,
  - type: text
    content: Afin que les justes ne tendent pas les mains vers l’iniquité.
  '4':
  - type: text
    content: Éternel, répands tes bienfaits sur les bons
  - type: text
    content: Et sur ceux dont le cœur est droit!
  '5':
  - type: text
    content: Mais ceux qui s’engagent dans des voies détournées,
  - type: text
    content: Que l’Éternel les détruise avec ceux qui font le mal!
  - type: text
    content: Que la paix soit sur Israël!
