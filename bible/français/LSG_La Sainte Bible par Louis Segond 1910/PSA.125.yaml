document_id: PSA.125,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: Jé 17:7, 8. Ps 34:8-23. És 26:3. 2 Ch 16:9.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Cantique des degrés.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux qui se confient en l’Éternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Sont comme la montagne de Sion: elle ne chancelle point,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle est affermie pour toujours.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Des montagnes entourent Jérusalem;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi l’Éternel entoure son peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dès maintenant et à jamais.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Car le sceptre de la méchanceté ne restera pas sur le lot des justes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afin que les justes ne tendent pas les mains vers l’iniquité.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Éternel, répands tes bienfaits sur les bons
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et sur ceux dont le cœur est droit!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Mais ceux qui s’engagent dans des voies détournées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que l’Éternel les détruise avec ceux qui font le mal!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que la paix soit sur Israël!
