document_id: JOL.1
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Une invasion de sauterelles. Exhortation à la repentance
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-20: cf. Ex 10:12-15. De 28:38-42. (Jé 14:1-9. Am 4:9.)'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: La parole de l’Éternel qui fut adressée à Joël, fils de Pethuel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Écoutez ceci, vieillards!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Prêtez l’oreille, vous tous, habitants du pays!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rien de pareil est-il arrivé de votre temps,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ou du temps de vos pères?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Racontez-le à vos enfants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que vos enfants le racontent à leurs enfants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et leurs enfants à la génération qui suivra!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ce qu’a laissé le gazam, la sauterelle l’a dévoré;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce qu’a laissé la sauterelle, le jélek l’a dévoré;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce qu’a laissé le jélek, le hasil l’a dévoré.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Réveillez-vous, ivrognes, et pleurez!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous tous, buveurs de vin, gémissez,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parce que le moût vous est enlevé de la bouche!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Car un peuple est venu fondre sur mon pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Puissant et innombrable.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a les dents d’un lion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les mâchoires d’une lionne.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il a dévasté ma vigne;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a mis en morceaux mon figuier,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il l’a dépouillé, abattu;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les rameaux de la vigne ont blanchi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Lamente-toi, comme la vierge qui se revêt d’un sac
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour pleurer l’ami de sa jeunesse!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Offrandes et libations disparaissent de la maison de l’Éternel;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les sacrificateurs, serviteurs de l’Éternel, sont dans le deuil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Les champs sont ravagés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La terre est attristée;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car les blés sont détruits,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le moût est tari, l’huile est desséchée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Les laboureurs sont consternés, les vignerons gémissent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A cause du froment et de l’orge,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parce que la moisson des champs est perdue.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: La vigne est confuse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le figuier languissant;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le grenadier, le palmier, le pommier,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous les arbres des champs sont flétris…
- type: usfm
  marker: q1
  children:
  - type: text
    text: La joie a cessé parmi les fils de l’homme!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Sacrificateurs, ceignez-vous et pleurez!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lamentez-vous, serviteurs de l’autel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Venez, passez la nuit revêtus de sacs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Serviteurs de mon Dieu!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car offrandes et libations ont disparu de la maison de votre Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Joë 2:15
      metadata:
        usfm: JOL.2.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Publiez un jeûne, une convocation solennelle!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Assemblez les vieillards, tous les habitants du pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans la maison de l’Éternel, votre Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et criez à l’Éternel!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ah! Quel jour!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Car '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 13:6
      metadata:
        usfm: ISA.13.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'le jour de l’Éternel est proche:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il vient comme un ravage du Tout-Puissant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: La nourriture n’est-elle pas enlevée sous nos yeux?
- type: usfm
  marker: q1
  children:
  - type: text
    text: La joie et l’allégresse n’ont-elles pas disparu de la maison de notre Dieu?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Les semences ont séché sous les mottes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les greniers sont vides,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les magasins sont en ruines,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car il n’y a point de blé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Comme les bêtes gémissent!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les troupeaux de bœufs sont consternés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parce qu’ils sont sans pâturage;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et même les troupeaux de brebis sont en souffrance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: C’est vers toi que je crie, ô Éternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car le feu a dévoré les plaines du désert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la flamme a brûlé tous les arbres des champs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Les bêtes des champs crient aussi vers toi;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car les torrents sont à sec,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le feu a dévoré les plaines du désert.
