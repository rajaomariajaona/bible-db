document_id: JOL.1,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Une invasion de sauterelles. Exhortation à la repentance
  - type: heading
    content: 'V. 1-20: cf. Ex 10:12-15. De 28:38-42. (Jé 14:1-9. Am 4:9.)'
  - type: text
    content: La parole de l’Éternel qui fut adressée à Joël, fils de Pethuel.
  '10':
  - type: text
    content: Les champs sont ravagés,
  - type: text
    content: La terre est attristée;
  - type: text
    content: Car les blés sont détruits,
  - type: text
    content: Le moût est tari, l’huile est desséchée.
  '11':
  - type: text
    content: Les laboureurs sont consternés, les vignerons gémissent,
  - type: text
    content: A cause du froment et de l’orge,
  - type: text
    content: Parce que la moisson des champs est perdue.
  '12':
  - type: text
    content: La vigne est confuse,
  - type: text
    content: Le figuier languissant;
  - type: text
    content: Le grenadier, le palmier, le pommier,
  - type: text
    content: Tous les arbres des champs sont flétris…
  - type: text
    content: La joie a cessé parmi les fils de l’homme!
  '13':
  - type: text
    content: Sacrificateurs, ceignez-vous et pleurez!
  - type: text
    content: Lamentez-vous, serviteurs de l’autel!
  - type: text
    content: Venez, passez la nuit revêtus de sacs,
  - type: text
    content: Serviteurs de mon Dieu!
  - type: text
    content: Car offrandes et libations ont disparu de la maison de votre Dieu.
  '14':
  - type: text
    content: ' '
  - type: note
    content: Joë 2:15.
  - type: text
    content: Publiez un jeûne, une convocation solennelle!
  - type: text
    content: Assemblez les vieillards, tous les habitants du pays,
  - type: text
    content: Dans la maison de l’Éternel, votre Dieu,
  - type: text
    content: Et criez à l’Éternel!
  '15':
  - type: text
    content: Ah! Quel jour!
  - type: text
    content: 'Car '
  - type: note
    content: És 13:6.
  - type: text
    content: 'le jour de l’Éternel est proche:'
  - type: text
    content: Il vient comme un ravage du Tout-Puissant.
  '16':
  - type: text
    content: La nourriture n’est-elle pas enlevée sous nos yeux?
  - type: text
    content: La joie et l’allégresse n’ont-elles pas disparu de la maison de notre Dieu?
  '17':
  - type: text
    content: Les semences ont séché sous les mottes;
  - type: text
    content: Les greniers sont vides,
  - type: text
    content: Les magasins sont en ruines,
  - type: text
    content: Car il n’y a point de blé.
  '18':
  - type: text
    content: Comme les bêtes gémissent!
  - type: text
    content: Les troupeaux de bœufs sont consternés,
  - type: text
    content: Parce qu’ils sont sans pâturage;
  - type: text
    content: Et même les troupeaux de brebis sont en souffrance.
  '19':
  - type: text
    content: C’est vers toi que je crie, ô Éternel!
  - type: text
    content: Car le feu a dévoré les plaines du désert,
  - type: text
    content: Et la flamme a brûlé tous les arbres des champs.
  '2':
  - type: text
    content: Écoutez ceci, vieillards!
  - type: text
    content: Prêtez l’oreille, vous tous, habitants du pays!
  - type: text
    content: Rien de pareil est-il arrivé de votre temps,
  - type: text
    content: Ou du temps de vos pères?
  '20':
  - type: text
    content: Les bêtes des champs crient aussi vers toi;
  - type: text
    content: Car les torrents sont à sec,
  - type: text
    content: Et le feu a dévoré les plaines du désert.
  '3':
  - type: text
    content: Racontez-le à vos enfants,
  - type: text
    content: Et que vos enfants le racontent à leurs enfants,
  - type: text
    content: Et leurs enfants à la génération qui suivra!
  '4':
  - type: text
    content: Ce qu’a laissé le gazam, la sauterelle l’a dévoré;
  - type: text
    content: Ce qu’a laissé la sauterelle, le jélek l’a dévoré;
  - type: text
    content: Ce qu’a laissé le jélek, le hasil l’a dévoré.
  '5':
  - type: text
    content: Réveillez-vous, ivrognes, et pleurez!
  - type: text
    content: Vous tous, buveurs de vin, gémissez,
  - type: text
    content: Parce que le moût vous est enlevé de la bouche!
  '6':
  - type: text
    content: Car un peuple est venu fondre sur mon pays,
  - type: text
    content: Puissant et innombrable.
  - type: text
    content: Il a les dents d’un lion,
  - type: text
    content: Les mâchoires d’une lionne.
  '7':
  - type: text
    content: Il a dévasté ma vigne;
  - type: text
    content: Il a mis en morceaux mon figuier,
  - type: text
    content: Il l’a dépouillé, abattu;
  - type: text
    content: Les rameaux de la vigne ont blanchi.
  '8':
  - type: text
    content: Lamente-toi, comme la vierge qui se revêt d’un sac
  - type: text
    content: Pour pleurer l’ami de sa jeunesse!
  '9':
  - type: text
    content: Offrandes et libations disparaissent de la maison de l’Éternel;
  - type: text
    content: Les sacrificateurs, serviteurs de l’Éternel, sont dans le deuil.
