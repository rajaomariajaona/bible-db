document_id: LEV.11
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Loi sur les animaux purs et impurs
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-47: cf. Lé 20:25, 26. De 14:1-21. Ac 10:11-16. Hé 9:10.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Éternel parla à Moïse et à Aaron, et leur dit: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Parlez aux enfants d’Israël, et dites: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 14:4
      metadata:
        usfm: DEU.14.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 10:14
      metadata:
        usfm: ACT.10.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Voici les animaux dont vous mangerez parmi toutes les bêtes qui sont sur la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Vous mangerez de tout animal qui a la corne fendue, le pied fourchu, et qui rumine. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Mais vous ne mangerez pas de ceux qui ruminent seulement, ou qui ont la corne fendue seulement. Ainsi, vous ne mangerez pas le chameau, qui rumine, mais qui n’a pas la corne fendue: vous le regarderez comme impur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Vous ne mangerez pas le daman, qui rumine, mais qui n’a pas la corne fendue: vous le regarderez comme impur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Vous ne mangerez pas le lièvre, qui rumine, mais qui n’a pas la corne fendue: vous le regarderez comme impur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Vous ne mangerez pas le porc, qui a la corne fendue et le pied fourchu, mais qui ne rumine pas: vous le regarderez comme impur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Vous ne mangerez pas de leur chair, et vous ne toucherez pas leurs corps morts: vous les regarderez comme impurs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Voici les animaux dont vous mangerez parmi tous ceux qui sont dans les eaux. Vous mangerez de tous ceux qui ont des nageoires et des écailles, et qui sont dans les eaux, soit dans les mers, soit dans les rivières. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Mais vous aurez en abomination tous ceux qui n’ont pas des nageoires et des écailles, parmi tout ce qui se meut dans les eaux et tout ce qui est vivant dans les eaux, soit dans les mers, soit dans les rivières. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Vous les aurez en abomination, vous ne mangerez pas de leur chair, et vous aurez en abomination leurs corps morts. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Vous aurez en abomination tous ceux qui, dans les eaux, n’ont pas des nageoires et des écailles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Voici, parmi les oiseaux, ceux que vous aurez en abomination, et dont on ne mangera pas: l’aigle, l’orfraie et l’aigle de mer; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'le milan, l’autour et ce qui est de son espèce; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'le corbeau et toutes ses espèces; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'l’autruche, le hibou, la mouette, l’épervier et ce qui est de son espèce; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'le chat-huant, le plongeon et la chouette; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'le cygne, le pélican et le cormoran; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'la cigogne, le héron et ce qui est de son espèce, la huppe et la chauve-souris. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Vous aurez en abomination tout reptile qui vole et qui marche sur quatre pieds. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Mais, parmi tous les reptiles qui volent et qui marchent sur quatre pieds, vous mangerez ceux qui ont des jambes au-dessus de leurs pieds, pour sauter sur la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Voici ceux que vous mangerez: la sauterelle, le solam, le hargol et le hagab, selon leurs espèces. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Vous aurez en abomination tous les autres reptiles qui volent et qui ont quatre pieds. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ils vous rendront impurs: quiconque touchera leurs corps morts sera impur jusqu’au soir, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'et quiconque portera leurs corps morts lavera ses vêtements et sera impur jusqu’au soir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Vous regarderez comme impur tout animal qui a la corne fendue, mais qui n’a pas le pied fourchu et qui ne rumine pas: quiconque le touchera sera impur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Vous regarderez comme impurs tous ceux des animaux à quatre pieds qui marchent sur leurs pattes: quiconque touchera leurs corps morts sera impur jusqu’au soir, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'et quiconque portera leurs corps morts lavera ses vêtements et sera impur jusqu’au soir. Vous les regarderez comme impurs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Voici, parmi les animaux qui rampent sur la terre, ceux que vous regarderez comme impurs: la taupe, la souris et le lézard, selon leurs espèces; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'le hérisson, la grenouille, la tortue, le limaçon et le caméléon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Vous les regarderez comme impurs parmi tous les reptiles: quiconque les touchera morts sera impur jusqu’au soir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Tout objet sur lequel tombera quelque chose de leurs corps morts sera souillé, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 15:12
      metadata:
        usfm: LEV.15.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ustensile de bois, vêtement, peau, sac, tout objet dont on fait usage; il sera mis dans l’eau, et restera souillé jusqu’au soir; après quoi, il sera pur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Tout ce qui se trouvera dans un vase de terre où il en tombera quelque chose, sera souillé, et vous briserez le vase. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Tout aliment qui sert à la nourriture, et sur lequel il sera tombé de cette eau, sera souillé; et toute boisson dont on fait usage, quel que soit le vase qui la contienne, sera souillée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Tout objet sur lequel tombera quelque chose de leurs corps morts sera souillé; le four et le foyer seront détruits: ils seront souillés, et vous les regarderez comme souillés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Il n’y aura que les sources et les citernes, formant des amas d’eaux, qui resteront pures; mais celui qui y touchera de leurs corps morts sera impur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'S’il tombe quelque chose de leurs corps morts sur une semence qui doit être semée, elle restera pure; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'mais si l’on a mis de l’eau sur la semence, et qu’il y tombe quelque chose de leurs corps morts, vous la regarderez comme souillée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'S’il meurt un des animaux qui vous servent de nourriture, celui qui touchera son corps mort sera impur jusqu’au soir; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'celui qui mangera de son corps mort lavera ses vêtements et sera impur jusqu’au soir, et celui qui portera son corps mort lavera ses vêtements et sera impur jusqu’au soir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Vous aurez en abomination tout reptile qui rampe sur la terre: on n’en mangera point. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Vous ne mangerez point, parmi tous les reptiles qui rampent sur la terre, de tous ceux qui se traînent sur le ventre, ni de tous ceux qui marchent sur quatre pieds ou sur un grand nombre de pieds; car vous les aurez en abomination. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Ne rendez point vos personnes abominables par tous ces reptiles qui rampent; ne vous rendez point impurs par eux, ne vous souillez point par eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 19:2
      metadata:
        usfm: LEV.19.2
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 20:7
      metadata:
        usfm: LEV.20.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 1:16
      metadata:
        usfm: 1PE.1.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Car je suis l’Éternel, votre Dieu; vous vous sanctifierez, et vous serez saints, car je suis saint; et vous ne vous rendrez point impurs par tous ces reptiles qui rampent sur la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Car je suis l’Éternel, qui vous ai fait monter du pays d’Égypte, pour être votre Dieu, et pour que vous soyez saints; car je suis saint. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Telle est la loi touchant les animaux, les oiseaux, tous les êtres vivants qui se meuvent dans les eaux, et tous les êtres qui rampent sur la terre, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: afin que vous distinguiez ce qui est impur et ce qui est pur, l’animal qui se mange et l’animal qui ne se mange pas.
