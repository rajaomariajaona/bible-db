document_id: LEV.8,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Consécration d’Aaron et de ses fils
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-13: cf. (Ex 29:1-9; 30:23-30.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Éternel parla à Moïse, et dit: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse prit l’huile d’onction, il oignit le sanctuaire et toutes les choses qui y étaient, et le sanctifia. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il en fit sept fois l’aspersion sur l’autel, et il oignit l’autel et tous ses ustensiles, et la cuve avec sa base, afin de les sanctifier. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 133:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Il répandit de l’huile d’onction sur la tête d’Aaron, et l’oignit, afin de la sanctifier. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse fit aussi approcher les fils d’Aaron; il les revêtit de tuniques, les ceignit de ceintures, et leur attacha des bonnets, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 29:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: comme l’Éternel l’avait ordonné à Moïse.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 14-21: cf. Ex 29:10-18. Hé 5:1-4.'
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 29:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Il fit approcher le taureau expiatoire, et Aaron et ses fils posèrent leurs mains sur la tête du taureau expiatoire. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse l’égorgea, prit du sang, et en mit avec son doigt sur les cornes de l’autel tout autour, et purifia l’autel; il répandit le sang au pied de l’autel, et le sanctifia pour y faire l’expiation. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il prit toute la graisse qui couvre les entrailles, le grand lobe du foie, et les deux rognons avec leur graisse, et il brûla cela sur l’autel. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais il brûla au feu hors du camp le taureau, sa peau, sa chair et ses excréments, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 29:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 4:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'comme l’Éternel l’avait ordonné à Moïse. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il fit approcher le bélier de l’holocauste, et Aaron et ses fils posèrent leurs mains sur la tête du bélier. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse l’égorgea, et répandit le sang sur l’autel tout autour. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 28:1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Prends Aaron et ses fils avec lui, les vêtements, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 30:25
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'l’huile d’onction, le taureau expiatoire, les deux béliers et la corbeille de pains sans levain; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il coupa le bélier par morceaux, et il brûla la tête, les morceaux et la graisse. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il lava avec de l’eau les entrailles et les jambes, et il brûla tout le bélier sur l’autel: ce fut l’holocauste, ce fut un sacrifice consumé par le feu, d’une agréable odeur à l’Éternel, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 29:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: comme l’Éternel l’avait ordonné à Moïse.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 22-36: cf. Ex 29:19-37. (Hé 5:1-10; 7.)'
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il fit approcher l’autre bélier, le bélier de consécration, et Aaron et ses fils posèrent leurs mains sur la tête du bélier. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse égorgea le bélier, prit de son sang, et en mit sur le lobe de l’oreille droite d’Aaron, sur le pouce de sa main droite et sur le gros orteil de son pied droit. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il fit approcher les fils d’Aaron, mit du sang sur le lobe de leur oreille droite, sur le pouce de leur main droite et sur le gros orteil de leur pied droit, et il répandit le sang sur l’autel tout autour. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 29:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Il prit la graisse, la queue, toute la graisse qui couvre les entrailles, le grand lobe du foie, les deux rognons avec leur graisse, et l’épaule droite; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'il prit aussi dans la corbeille de pains sans levain, placée devant l’Éternel, un gâteau sans levain, un gâteau de pain à l’huile et une galette, et il les posa sur les graisses et sur l’épaule droite. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 29:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Il mit toutes ces choses sur les mains d’Aaron et sur les mains de ses fils, et il les agita de côté et d’autre devant l’Éternel. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis Moïse les ôta de leurs mains, et il les brûla sur l’autel, par-dessus l’holocauste: ce fut le sacrifice de consécration, ce fut un sacrifice consumé par le feu, d’une agréable odeur à l’Éternel. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse prit la poitrine du bélier de consécration, et il l’agita de côté et d’autre devant l’Éternel: ce fut la portion de Moïse, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 29:26
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 7:33
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'comme l’Éternel l’avait ordonné à Moïse. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et convoque toute l’assemblée à l’entrée de la tente d’assignation. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 19:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Moïse prit de l’huile d’onction et du sang qui était sur l’autel; il en fit l’aspersion sur Aaron et sur ses vêtements, sur les fils d’Aaron et sur leurs vêtements; et il sanctifia Aaron et ses vêtements, les fils d’Aaron et leurs vêtements avec lui. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse dit à Aaron et à ses fils: Faites cuire la chair à l’entrée de la tente d’assignation; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 29:32
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 24:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'c’est là que vous la mangerez, avec le pain qui est dans la corbeille de consécration, comme je l’ai ordonné, en disant: Aaron et ses fils la mangeront. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous brûlerez dans le feu ce qui restera de la chair et du pain. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pendant sept jours, vous ne sortirez point de l’entrée de la tente d’assignation, jusqu’à ce que les jours de votre consécration soient accomplis; car sept jours seront employés à vous consacrer. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce qui s’est fait aujourd’hui, l’Éternel a ordonné de le faire comme expiation pour vous. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous resterez donc sept jours à l’entrée de la tente d’assignation, jour et nuit, et vous observerez les commandements de l’Éternel, afin que vous ne mouriez pas; car c’est là ce qui m’a été ordonné. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aaron et ses fils firent toutes les choses que l’Éternel avait ordonnées par Moïse.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse fit ce que l’Éternel lui avait ordonné; et l’assemblée se réunit à l’entrée de la tente d’assignation. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse dit à l’assemblée: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 29:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Voici ce que l’Éternel a ordonné de faire. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse fit approcher Aaron et ses fils, et il les lava avec de l’eau. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 28:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Il mit à Aaron la tunique, il le ceignit de la ceinture, il le revêtit de la robe, et il plaça sur lui l’éphod, qu’il serra avec la ceinture de l’éphod dont il le revêtit. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il lui mit le pectoral, et il joignit au '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 28:30
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'pectoral l’urim et le thummim. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il posa la tiare sur sa tête, et il plaça sur le devant de la tiare la lame d’or, diadème sacré, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 28:36
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 29:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'comme l’Éternel l’avait ordonné à Moïse. '
