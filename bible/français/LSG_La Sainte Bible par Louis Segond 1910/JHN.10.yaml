document_id: JHN.10,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Le bon berger
  - type: heading
    content: 'V. 1-6: cf. Jn 9:24-38. Éz 34:1-19. 1 Pi 5:1-4.'
  - type: text
    content: ' '
  - type: text
    content: En vérité, en vérité, je vous le dis, celui qui n’entre pas par la porte dans la bergerie, mais qui y monte par ailleurs, est un voleur et un brigand.
  - type: text
    content: ' '
  '10':
  - type: text
    content: Le voleur ne vient que pour dérober, égorger et détruire; moi, je suis venu afin que les brebis aient la vie, et qu’elles soient dans l’abondance.
  - type: text
    content: ' '
  '11':
  - type: note
    content: És 40:11. Éz 34:23. Hé 13:20. 1 Pi 5:4.
  - type: text
    content: Je suis le bon berger. Le bon berger donne sa vie pour ses brebis.
  - type: text
    content: ' '
  '12':
  - type: note
    content: Za 11:16.
  - type: text
    content: Mais le mercenaire, qui n’est pas le berger, et à qui n’appartiennent pas les brebis, voit venir le loup, abandonne les brebis, et prend la fuite; et le loup les ravit et les disperse.
  - type: text
    content: ' '
  '13':
  - type: text
    content: Le mercenaire s’enfuit, parce qu’il est mercenaire, et qu’il ne se met point en peine des brebis. Je suis le bon berger.
  - type: text
    content: ' '
  '14':
  - type: note
    content: 2 Ti 2:19.
  - type: text
    content: Je connais mes brebis, et elles me connaissent,
  - type: text
    content: ' '
  '15':
  - type: note
    content: Mt 11:27. Lu 10:22. Jn 6:46; 7:29.
  - type: text
    content: comme le Père me connaît et comme je connais le Père; et je donne ma vie pour mes brebis.
  - type: text
    content: ' '
  '16':
  - type: text
    content: J’ai encore d’autres brebis, qui ne sont pas de cette bergerie; celles-là, il faut que je les amène; elles entendront ma voix,
  - type: text
    content: ' '
  - type: note
    content: Éz 37:22.
  - type: text
    content: et il y aura un seul troupeau, un seul berger.
  - type: text
    content: ' '
  '17':
  - type: text
    content: Le Père m’aime, parce que je donne
  - type: text
    content: ' '
  - type: note
    content: És 53:12.
  - type: text
    content: ma vie, afin de la reprendre.
  - type: text
    content: ' '
  '18':
  - type: text
    content: Personne ne me l’ôte, mais je la donne de moi-même;
  - type: text
    content: ' '
  - type: note
    content: Jn 2:19.
  - type: text
    content: 'j’ai le pouvoir de la donner, et j’ai le pouvoir de la reprendre: tel est l’ordre que j’ai reçu de mon Père.'
  - type: text
    content: ' '
  '19':
  - type: note
    content: Jn 7:12; 9:16.
  - type: text
    content: 'Il y eut de nouveau, à cause de ces paroles, division parmi les Juifs. '
  '2':
  - type: text
    content: Mais celui qui entre par la porte est le berger des brebis.
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'Plusieurs d’entre eux disaient: '
  - type: note
    content: Jn 7:20; 8:48, 52.
  - type: text
    content: 'Il a un démon, il est fou; pourquoi l’écoutez-vous? '
  '21':
  - type: text
    content: 'D’autres disaient: Ce ne sont pas les paroles d’un démoniaque; '
  - type: note
    content: Ex 4:11. Ps 94:9; 146:8.
  - type: text
    content: un démon peut-il ouvrir les yeux des aveugles?
  - type: heading
    content: Jésus à Jérusalem pendant la fête de la Dédicace. — Discours sur ses rapports avec Dieu. — Nouvelles hostilités de la part des Juifs. Départ, et séjour dans la Pérée
  - type: heading
    content: 'V. 22-39: cf. (Ro 8:35-39. 1 Pi 1:3-5.) (Jn 8:51-59; 14:9-11.)'
  '22':
  - type: text
    content: 'On célébrait à Jérusalem la fête de la Dédicace. C’était l’hiver. '
  '23':
  - type: text
    content: 'Et Jésus se promenait dans le temple, '
  - type: note
    content: 1 R 6:3. Ac 3:11; 5:12.
  - type: text
    content: 'sous le portique de Salomon. '
  '24':
  - type: text
    content: 'Les Juifs l’entourèrent, et lui dirent: Jusques à quand tiendras-tu notre esprit en suspens? Si tu es le Christ, dis-le nous franchement. '
  '25':
  - type: text
    content: 'Jésus leur répondit: '
  - type: text
    content: Je vous l’ai dit, et vous ne croyez pas.
  - type: text
    content: ' '
  - type: note
    content: Jn 5:36.
  - type: text
    content: Les œuvres que je fais au nom de mon Père rendent témoignage de moi.
  '26':
  - type: text
    content: ' '
  - type: text
    content: Mais vous ne croyez pas, parce que vous n’êtes pas de mes brebis.
  - type: text
    content: ' '
  '27':
  - type: note
    content: Jn 8:47.
  - type: text
    content: Mes brebis entendent ma voix; je les connais, et elles me suivent.
  - type: text
    content: ' '
  '28':
  - type: text
    content: Je leur donne la vie éternelle;
  - type: text
    content: ' '
  - type: note
    content: Jn 6:39; 17:12; 18:9.
  - type: text
    content: et elles ne périront jamais, et personne ne les ravira de ma main.
  - type: text
    content: ' '
  '29':
  - type: text
    content: Mon Père, qui me les a données, est plus grand que tous; et personne ne peut les ravir de la main de mon Père.
  - type: text
    content: ' '
  '3':
  - type: text
    content: Le portier lui ouvre, et les brebis entendent sa voix; il appelle par leur nom les brebis qui lui appartiennent, et il les conduit dehors.
  - type: text
    content: ' '
  '30':
  - type: note
    content: És 54:5. Jn 5:19; 14:9; 17:5.
  - type: text
    content: Moi et le Père nous sommes un.
  - type: text
    content: ' '
  '31':
  - type: note
    content: Jn 8:59; 11:8.
  - type: text
    content: 'Alors les Juifs prirent de nouveau des pierres pour le lapider. '
  '32':
  - type: text
    content: 'Jésus leur dit: '
  - type: text
    content: 'Je vous ai fait voir plusieurs bonnes œuvres venant de mon Père: pour laquelle me lapidez-vous?'
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'Les Juifs lui répondirent: Ce n’est point pour une bonne œuvre que nous te lapidons, '
  - type: note
    content: Jn 5:18.
  - type: text
    content: 'mais pour un blasphème, et parce que toi, qui es un homme, tu te fais Dieu. '
  '34':
  - type: text
    content: 'Jésus leur répondit: '
  - type: text
    content: 'N’est-il pas écrit dans votre loi:'
  - type: note
    content: Ps 82:6.
  - type: text
    content: 'J’ai dit: Vous êtes des dieux?'
  '35':
  - type: text
    content: ' '
  - type: text
    content: Si elle a appelé dieux ceux à qui la parole de Dieu a été adressée, et si l’Écriture ne peut être anéantie,
  - type: text
    content: ' '
  '36':
  - type: note
    content: Jn 6:27.
  - type: text
    content: 'celui que le Père a sanctifié et envoyé dans le monde, vous lui dites: Tu blasphèmes! Et cela'
  - type: text
    content: ' '
  - type: note
    content: Jn 5:17.
  - type: text
    content: 'parce que j’ai dit: Je suis le Fils de Dieu.'
  - type: text
    content: ' '
  '37':
  - type: note
    content: Jn 15:24.
  - type: text
    content: Si je ne fais pas les œuvres de mon Père, ne me croyez pas.
  - type: text
    content: ' '
  '38':
  - type: text
    content: Mais si je les fais, quand même vous ne me croyez point, croyez à ces œuvres, afin que vous sachiez et reconnaissiez
  - type: text
    content: ' '
  - type: note
    content: Jn 14:11; 17:21.
  - type: text
    content: que le Père est en moi et que je suis dans le Père.
  - type: text
    content: ' '
  '39':
  - type: note
    content: Lu 4:29. Jn 8:59.
  - type: text
    content: Là-dessus, ils cherchèrent encore à le saisir, mais il s’échappa de leurs mains.
  - type: heading
    content: 'V. 40-42: cf. Jn 11:53, 54. Ph 1:12.'
  '4':
  - type: text
    content: Lorsqu’il a fait sortir toutes ses propres brebis, il marche devant elles; et les brebis le suivent, parce qu’elles connaissent sa voix.
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'Jésus s’en alla de nouveau au-delà du Jourdain, '
  - type: note
    content: Jn 1:28; 3:23.
  - type: text
    content: 'dans le lieu où Jean avait d’abord baptisé. Et il y demeura. '
  '41':
  - type: text
    content: 'Beaucoup de gens vinrent à lui, et ils disaient: Jean n’a fait aucun miracle; mais tout ce que Jean a dit de cet homme était vrai. '
  '42':
  - type: text
    content: Et, dans ce lieu-là, plusieurs crurent en lui.
  '5':
  - type: text
    content: Elles ne suivront point un étranger; mais elles fuiront loin de lui, parce qu’elles ne connaissent pas la voix des étrangers.
  - type: text
    content: ' '
  '6':
  - type: text
    content: Jésus leur dit cette parabole, mais ils ne comprirent pas de quoi il leur parlait.
  - type: heading
    content: 'V. 7-21: cf. Jn 14:6. (És 40:11. Ps 23.) 1 Pi 2:24, 25. Ép 5:2, 25-27; 2:11-19.'
  '7':
  - type: text
    content: 'Jésus leur dit encore: '
  - type: text
    content: En vérité, en vérité, je vous le dis, je suis la porte des brebis.
  '8':
  - type: text
    content: ' '
  - type: text
    content: Tous ceux qui sont venus avant moi sont des voleurs et des brigands; mais les brebis ne les ont point écoutés.
  - type: text
    content: ' '
  '9':
  - type: note
    content: Jn 14:6.
  - type: text
    content: Je suis la porte. Si quelqu’un entre par moi, il sera sauvé; il entrera et il sortira, et il trouvera des pâturages.
  - type: text
    content: ' '
