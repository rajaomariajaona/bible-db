document_id: JHN.21,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Appendice: apparition de Jésus près de la mer de Tibériade'
  - type: heading
    content: 'V. 1-14: cf. Mt 28:16. Lu 5:1-11. És 26:12.'
  - type: text
    content: 'Après cela, Jésus se montra encore aux disciples, sur les bords de la mer de Tibériade. Et voici de quelle manière il se montra. '
  '10':
  - type: note
    content: Lu 24:41.
  - type: text
    content: 'Jésus leur dit: '
  - type: text
    content: Apportez des poissons que vous venez de prendre.
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'Simon Pierre monta dans la barque, et tira à terre le filet plein de cent cinquante-trois grands poissons; et quoiqu’il y en eût tant, le filet ne se rompit point. '
  '12':
  - type: text
    content: 'Jésus leur dit: '
  - type: text
    content: Venez, mangez.
  - type: text
    content: ' Et aucun des disciples n’osait lui demander: Qui es-tu? Sachant que c’était le Seigneur. '
  '13':
  - type: text
    content: 'Jésus s’approcha, prit le pain, et leur en donna; il fit de même du poisson. '
  '14':
  - type: text
    content: C’était déjà la troisième fois que Jésus se montrait à ses disciples depuis qu’il était ressuscité des morts.
  - type: heading
    content: 'V. 15-25: cf. Lu 22:55-62; 24:34. Mal 3:3. (1 Pi 5:1-4. 2 Pi 1:13, 14.) Jn 12:26; 20:30, 31.'
  '15':
  - type: text
    content: 'Après qu’ils eurent mangé, Jésus dit à Simon Pierre: '
  - type: text
    content: Simon, fils de Jonas, m’aimes-tu plus que ne m’aiment ceux-ci?
  - type: text
    content: ' Il lui répondit: Oui, Seigneur, tu sais que je t’aime. Jésus lui dit: '
  - type: text
    content: Pais mes agneaux.
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'Il lui dit une seconde fois: '
  - type: text
    content: Simon, fils de Jonas, m’aimes-tu?
  - type: text
    content: ' Pierre lui répondit: Oui, Seigneur, tu sais que je t’aime. Jésus lui dit: '
  - type: text
    content: Pais mes brebis.
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'Il lui dit pour la troisième fois: '
  - type: text
    content: Simon, fils de Jonas, m’aimes-tu?
  - type: text
    content: ' Pierre fut attristé de ce qu’il lui avait dit pour la troisième fois: M’aimes-tu? Et il lui répondit: '
  - type: note
    content: Jn 16:30.
  - type: text
    content: 'Seigneur, tu sais toutes choses, tu sais que je t’aime. Jésus lui dit: '
  - type: text
    content: Pais mes brebis.
  '18':
  - type: text
    content: ' '
  - type: note
    content: Jn 13:36. Ac 12:3. 2 Pi 1:14.
  - type: text
    content: En vérité, en vérité, je te le dis, quand tu étais plus jeune, tu te ceignais toi-même, et tu allais où tu voulais; mais quand tu seras vieux, tu étendras tes mains, et un autre te ceindra, et te mènera où tu ne voudras pas.
  - type: text
    content: ' '
  '19':
  - type: note
    content: 2 Pi 1:14.
  - type: text
    content: 'Il dit cela pour indiquer par quelle mort Pierre glorifierait Dieu. Et ayant ainsi parlé, il lui dit: '
  - type: text
    content: Suis-moi.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Simon Pierre, Thomas, appelé Didyme, '
  - type: note
    content: Jn 1:46.
  - type: text
    content: 'Nathanaël, de Cana en Galilée, '
  - type: note
    content: Mt 4:21. Mc 1:19.
  - type: text
    content: 'les fils de Zébédée, et deux autres disciples de Jésus, étaient ensemble. '
  '20':
  - type: text
    content: 'Pierre, s’étant retourné, vit venir après eux '
  - type: note
    content: Jn 13:23; 20:2; 21:7.
  - type: text
    content: 'le disciple que Jésus aimait, celui qui, pendant le souper, s’était penché sur la poitrine de Jésus, et avait dit: Seigneur, qui est celui qui te livre? '
  '21':
  - type: text
    content: 'En le voyant, Pierre dit à Jésus: Et celui-ci, Seigneur, que lui arrivera-t-il? '
  '22':
  - type: text
    content: 'Jésus lui dit: '
  - type: text
    content: Si je veux qu’il demeure jusqu’à ce que je vienne, que t’importe? Toi, suis-moi.
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'Là-dessus, le bruit courut parmi les frères que ce disciple ne mourrait point. Cependant Jésus n’avait pas dit à Pierre qu’il ne mourrait point; mais: '
  - type: text
    content: Si je veux qu’il demeure jusqu’à ce que je vienne, que t’importe?
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'C’est ce disciple qui rend témoignage de ces choses, et qui les a écrites. Et nous savons que son témoignage est '
  - type: note
    content: Jn 19:35.
  - type: text
    content: 'vrai. '
  '25':
  - type: note
    content: Jn 20:30.
  - type: text
    content: Jésus a fait encore beaucoup d’autres choses; si on les écrivait en détail, je ne pense pas que le monde même pût contenir les livres qu’on écrirait.
  '3':
  - type: text
    content: 'Simon Pierre leur dit: Je vais pêcher. Ils lui dirent: Nous allons aussi avec toi. Ils sortirent et montèrent dans une barque, et cette nuit-là ils ne prirent rien. '
  '4':
  - type: text
    content: 'Le matin étant venu, Jésus se trouva sur le rivage; mais les disciples ne savaient pas que c’était Jésus. '
  '5':
  - type: text
    content: 'Jésus leur dit: '
  - type: text
    content: Enfants, n’avez-vous rien à manger?
  - type: text
    content: ' Ils lui répondirent: Non. '
  '6':
  - type: text
    content: 'Il leur dit: '
  - type: note
    content: Lu 5:4, 6, 7.
  - type: text
    content: Jetez le filet du côté droit de la barque, et vous trouverez.
  - type: text
    content: ' Ils le jetèrent donc, et ils ne pouvaient plus le retirer, à cause de la grande quantité de poissons. '
  '7':
  - type: text
    content: 'Alors le disciple '
  - type: note
    content: Jn 13:23; 20:2.
  - type: text
    content: 'que Jésus aimait dit à Pierre: C’est le Seigneur! Et Simon Pierre, dès qu’il eut entendu que c’était le Seigneur, mit son vêtement et sa ceinture, car il était nu, et se jeta dans la mer. '
  '8':
  - type: text
    content: 'Les autres disciples vinrent avec la barque, tirant le filet plein de poissons, car ils n’étaient éloignés de terre que d’environ deux cents coudées. '
  '9':
  - type: text
    content: 'Lorsqu’ils furent descendus à terre, ils virent là des charbons allumés, du poisson dessus, et du pain. '
