document_id: JHN.21
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Appendice: apparition de Jésus près de la mer de Tibériade'
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-14: cf. Mt 28:16. Lu 5:1-11. És 26:12.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Après cela, Jésus se montra encore aux disciples, sur les bords de la mer de Tibériade. Et voici de quelle manière il se montra. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Simon Pierre, Thomas, appelé Didyme, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 1:46
      metadata:
        usfm: JHN.1.46
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Nathanaël, de Cana en Galilée, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 4:21
      metadata:
        usfm: MAT.4.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 1:19
      metadata:
        usfm: MRK.1.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'les fils de Zébédée, et deux autres disciples de Jésus, étaient ensemble. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Simon Pierre leur dit: Je vais pêcher. Ils lui dirent: Nous allons aussi avec toi. Ils sortirent et montèrent dans une barque, et cette nuit-là ils ne prirent rien. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Le matin étant venu, Jésus se trouva sur le rivage; mais les disciples ne savaient pas que c’était Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Jésus leur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Enfants, n’avez-vous rien à manger?
  - type: text
    text: ' Ils lui répondirent: Non. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il leur dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 5:4
      metadata:
        usfm: LUK.5.4
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '6'
      metadata:
        usfm: LUK.5.6
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '7'
      metadata:
        usfm: LUK.5.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Jetez le filet du côté droit de la barque, et vous trouverez.
  - type: text
    text: ' Ils le jetèrent donc, et ils ne pouvaient plus le retirer, à cause de la grande quantité de poissons. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Alors le disciple '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 13:23
      metadata:
        usfm: JHN.13.23
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 20:2
      metadata:
        usfm: JHN.20.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'que Jésus aimait dit à Pierre: C’est le Seigneur! Et Simon Pierre, dès qu’il eut entendu que c’était le Seigneur, mit son vêtement et sa ceinture, car il était nu, et se jeta dans la mer. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Les autres disciples vinrent avec la barque, tirant le filet plein de poissons, car ils n’étaient éloignés de terre que d’environ deux cents coudées. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Lorsqu’ils furent descendus à terre, ils virent là des charbons allumés, du poisson dessus, et du pain. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 24:41
      metadata:
        usfm: LUK.24.41
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Jésus leur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Apportez des poissons que vous venez de prendre.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Simon Pierre monta dans la barque, et tira à terre le filet plein de cent cinquante-trois grands poissons; et quoiqu’il y en eût tant, le filet ne se rompit point. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Jésus leur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Venez, mangez.
  - type: text
    text: ' Et aucun des disciples n’osait lui demander: Qui es-tu? Sachant que c’était le Seigneur. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Jésus s’approcha, prit le pain, et leur en donna; il fit de même du poisson. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: C’était déjà la troisième fois que Jésus se montrait à ses disciples depuis qu’il était ressuscité des morts.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 15-25: cf. Lu 22:55-62; 24:34. Mal 3:3. (1 Pi 5:1-4. 2 Pi 1:13, 14.) Jn 12:26; 20:30, 31.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Après qu’ils eurent mangé, Jésus dit à Simon Pierre: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Simon, fils de Jonas, m’aimes-tu plus que ne m’aiment ceux-ci?
  - type: text
    text: ' Il lui répondit: Oui, Seigneur, tu sais que je t’aime. Jésus lui dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Pais mes agneaux.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il lui dit une seconde fois: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Simon, fils de Jonas, m’aimes-tu?
  - type: text
    text: ' Pierre lui répondit: Oui, Seigneur, tu sais que je t’aime. Jésus lui dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Pais mes brebis.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il lui dit pour la troisième fois: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Simon, fils de Jonas, m’aimes-tu?
  - type: text
    text: ' Pierre fut attristé de ce qu’il lui avait dit pour la troisième fois: M’aimes-tu? Et il lui répondit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 16:30
      metadata:
        usfm: JHN.16.30
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Seigneur, tu sais toutes choses, tu sais que je t’aime. Jésus lui dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Pais mes brebis.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 13:36
      metadata:
        usfm: JHN.13.36
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 12:3
      metadata:
        usfm: ACT.12.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Pi 1:14
      metadata:
        usfm: 2PE.1.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: En vérité, en vérité, je te le dis, quand tu étais plus jeune, tu te ceignais toi-même, et tu allais où tu voulais; mais quand tu seras vieux, tu étendras tes mains, et un autre te ceindra, et te mènera où tu ne voudras pas.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Pi 1:14
      metadata:
        usfm: 2PE.1.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il dit cela pour indiquer par quelle mort Pierre glorifierait Dieu. Et ayant ainsi parlé, il lui dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Suis-moi.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Pierre, s’étant retourné, vit venir après eux '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 13:23
      metadata:
        usfm: JHN.13.23
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 20:2
      metadata:
        usfm: JHN.20.2
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 21:7
      metadata:
        usfm: JHN.21.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'le disciple que Jésus aimait, celui qui, pendant le souper, s’était penché sur la poitrine de Jésus, et avait dit: Seigneur, qui est celui qui te livre? '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'En le voyant, Pierre dit à Jésus: Et celui-ci, Seigneur, que lui arrivera-t-il? '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Jésus lui dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Si je veux qu’il demeure jusqu’à ce que je vienne, que t’importe? Toi, suis-moi.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Là-dessus, le bruit courut parmi les frères que ce disciple ne mourrait point. Cependant Jésus n’avait pas dit à Pierre qu’il ne mourrait point; mais: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Si je veux qu’il demeure jusqu’à ce que je vienne, que t’importe?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'C’est ce disciple qui rend témoignage de ces choses, et qui les a écrites. Et nous savons que son témoignage est '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 19:35
      metadata:
        usfm: JHN.19.35
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'vrai. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 20:30
      metadata:
        usfm: JHN.20.30
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Jésus a fait encore beaucoup d’autres choses; si on les écrivait en détail, je ne pense pas que le monde même pût contenir les livres qu’on écrirait.
