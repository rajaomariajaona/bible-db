document_id: PRO.9,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-12: cf. (Pr 1:20, etc.; 8.) És 55:1-7.'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: La sagesse a bâti sa maison,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle a taillé ses sept colonnes.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 28:28
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 111:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 1:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Le commencement de la sagesse, c’est la crainte de l’Éternel;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la science des saints, c’est l’intelligence.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'C’est par moi que tes '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 10:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: jours se multiplieront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que les années de ta vie augmenteront.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Si tu es sage, tu es sage pour toi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si tu es moqueur, tu en porteras seul la peine.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 13-18: cf. Pr 1:10-19; 7:6, etc.'
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 7:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: La folie est une femme bruyante,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Stupide et ne sachant rien.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Elle s’assied à l’entrée de sa maison,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur un siège, dans les hauteurs de la ville,
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Pour crier aux passants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Qui vont droit leur chemin:'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Que celui qui est stupide entre ici!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Elle dit à celui qui est dépourvu de sens:'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 20:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Les eaux dérobées sont douces,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le pain du mystère est agréable!
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Et il ne sait pas que là sont les '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 2:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: morts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que ses invités sont dans les vallées du séjour des morts.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Elle a égorgé ses victimes, mêlé son vin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et dressé sa table.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Elle a envoyé ses servantes, elle crie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Sur '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 8:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'le sommet des hauteurs de la ville:'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Que celui qui est stupide entre ici!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Elle dit à ceux qui sont dépourvus de sens:'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Venez, mangez de mon pain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et buvez du vin que j’ai mêlé;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Quittez la stupidité, et vous vivrez,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et marchez dans la voie de l’intelligence!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Celui qui reprend le moqueur s’attire le dédain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et celui qui corrige le méchant reçoit un outrage.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 7:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ne reprends pas le moqueur, de crainte qu’il ne te haïsse;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Reprends le sage, et il t’aimera.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Donne au sage, et il deviendra plus sage;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Instruis le juste, et il augmentera son savoir.
