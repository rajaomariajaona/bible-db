document_id: PRO.9,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-12: cf. (Pr 1:20, etc.; 8.) És 55:1-7.'
  - type: text
    content: La sagesse a bâti sa maison,
  - type: text
    content: Elle a taillé ses sept colonnes.
  '10':
  - type: text
    content: ' '
  - type: note
    content: Job 28:28. Ps 111:10. Pr 1:7.
  - type: text
    content: Le commencement de la sagesse, c’est la crainte de l’Éternel;
  - type: text
    content: Et la science des saints, c’est l’intelligence.
  '11':
  - type: text
    content: 'C’est par moi que tes '
  - type: note
    content: Pr 10:27.
  - type: text
    content: jours se multiplieront,
  - type: text
    content: Et que les années de ta vie augmenteront.
  '12':
  - type: text
    content: Si tu es sage, tu es sage pour toi;
  - type: text
    content: Si tu es moqueur, tu en porteras seul la peine.
  - type: heading
    content: 'V. 13-18: cf. Pr 1:10-19; 7:6, etc.'
  '13':
  - type: text
    content: ' '
  - type: note
    content: Pr 7:11.
  - type: text
    content: La folie est une femme bruyante,
  - type: text
    content: Stupide et ne sachant rien.
  '14':
  - type: text
    content: Elle s’assied à l’entrée de sa maison,
  - type: text
    content: Sur un siège, dans les hauteurs de la ville,
  '15':
  - type: text
    content: Pour crier aux passants,
  - type: text
    content: 'Qui vont droit leur chemin:'
  '16':
  - type: text
    content: Que celui qui est stupide entre ici!
  - type: text
    content: 'Elle dit à celui qui est dépourvu de sens:'
  '17':
  - type: text
    content: ' '
  - type: note
    content: Pr 20:17.
  - type: text
    content: Les eaux dérobées sont douces,
  - type: text
    content: Et le pain du mystère est agréable!
  '18':
  - type: text
    content: 'Et il ne sait pas que là sont les '
  - type: note
    content: Pr 2:18.
  - type: text
    content: morts,
  - type: text
    content: Et que ses invités sont dans les vallées du séjour des morts.
  '2':
  - type: text
    content: Elle a égorgé ses victimes, mêlé son vin,
  - type: text
    content: Et dressé sa table.
  '3':
  - type: text
    content: Elle a envoyé ses servantes, elle crie
  - type: text
    content: 'Sur '
  - type: note
    content: Pr 8:2.
  - type: text
    content: 'le sommet des hauteurs de la ville:'
  '4':
  - type: text
    content: Que celui qui est stupide entre ici!
  - type: text
    content: 'Elle dit à ceux qui sont dépourvus de sens:'
  '5':
  - type: text
    content: Venez, mangez de mon pain,
  - type: text
    content: Et buvez du vin que j’ai mêlé;
  '6':
  - type: text
    content: Quittez la stupidité, et vous vivrez,
  - type: text
    content: Et marchez dans la voie de l’intelligence!
  '7':
  - type: text
    content: Celui qui reprend le moqueur s’attire le dédain,
  - type: text
    content: Et celui qui corrige le méchant reçoit un outrage.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Mt 7:6.
  - type: text
    content: Ne reprends pas le moqueur, de crainte qu’il ne te haïsse;
  - type: text
    content: Reprends le sage, et il t’aimera.
  '9':
  - type: text
    content: Donne au sage, et il deviendra plus sage;
  - type: text
    content: Instruis le juste, et il augmentera son savoir.
