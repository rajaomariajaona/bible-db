document_id: HEB.6,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-8: cf. (Ép 4:13-15. Ph 3:12-14.) (Hé 10:26-31; 12:15-17, 25.)'
  - type: text
    content: 'C’est pourquoi, laissant les éléments de la parole de Christ, tendons à ce qui est parfait, sans poser de nouveau le fondement du renoncement aux œuvres mortes, '
  '10':
  - type: note
    content: Pr 14:31. Mt 10:42; 25:40. Mc 9:41. Jn 13:20.
  - type: text
    content: 'Car Dieu n’est pas injuste, pour oublier votre travail et l’amour que vous avez montré pour son nom, ayant rendu et rendant encore des services aux saints. '
  '11':
  - type: text
    content: 'Nous désirons que chacun de vous montre le même zèle pour conserver jusqu’à la fin une pleine espérance, '
  '12':
  - type: text
    content: 'en sorte que vous ne vous relâchiez point, et que vous imitiez ceux qui, par la foi et la persévérance, héritent des promesses. '
  '13':
  - type: text
    content: 'Lorsque Dieu fit la promesse à Abraham, ne pouvant jurer par un plus grand que lui, il jura par lui-même, '
  '14':
  - type: text
    content: 'et dit: '
  - type: note
    content: Ge 12:3; 17:4; 22:16. Ps 105:9. Lu 1:73.
  - type: text
    content: 'Certainement je te bénirai et je multiplierai ta postérité. '
  '15':
  - type: text
    content: 'Et c’est ainsi qu’Abraham, ayant persévéré, obtint l’effet de la promesse. '
  '16':
  - type: text
    content: 'Or les hommes jurent par celui qui est plus grand qu’eux, et '
  - type: note
    content: Ex 22:11.
  - type: text
    content: 'le serment est une garantie qui met fin à tous leurs différends. '
  '17':
  - type: text
    content: 'C’est pourquoi Dieu, voulant montrer avec plus d’évidence aux héritiers de la promesse l’immuabilité de sa résolution, intervint par un serment, '
  '18':
  - type: text
    content: 'afin que, par deux choses immuables, dans lesquelles il est impossible que Dieu mente, nous trouvions un puissant encouragement, nous dont le seul refuge a été de saisir l’espérance qui nous était proposée. '
  '19':
  - type: text
    content: 'Cette espérance, nous la possédons comme une ancre de l’âme, sûre et solide; elle pénètre au-delà du voile, '
  '2':
  - type: text
    content: 'de la foi en Dieu, de la doctrine des baptêmes, de l’imposition des mains, de la résurrection des morts, et du jugement éternel. '
  '20':
  - type: text
    content: 'là où Jésus est entré pour nous comme précurseur, ayant été fait '
  - type: note
    content: Hé 3:1; 4:14; 8:1; 9:11.
  - type: text
    content: souverain sacrificateur pour toujours, selon l’ordre de Melchisédek.
  '3':
  - type: text
    content: 'C’est ce que nous ferons, '
  - type: note
    content: Ac 18:21. 1 Co 4:19. Ja 4:15.
  - type: text
    content: 'si Dieu le permet. '
  '4':
  - type: note
    content: Mt 12:31. Hé 10:26. 1 Jn 5:16.
  - type: text
    content: 'Car il est impossible que ceux qui ont été une fois éclairés, qui ont goûté le don céleste, qui ont eu part au Saint-Esprit, '
  '5':
  - type: text
    content: 'qui ont goûté la bonne parole de Dieu et les puissances du siècle à venir, '
  '6':
  - type: text
    content: 'et qui sont tombés, soient encore renouvelés et amenés à la repentance, puisqu’ils crucifient pour leur part le Fils de Dieu et l’exposent à l’ignominie. '
  '7':
  - type: text
    content: 'Lorsqu’une terre est abreuvée par la pluie qui tombe souvent sur elle, et qu’elle produit une herbe utile à ceux pour qui elle est cultivée, elle participe à la bénédiction de Dieu; '
  '8':
  - type: text
    content: mais, si elle produit des épines et des chardons, elle est réprouvée et près d’être maudite, et on finit par y mettre le feu.
  - type: heading
    content: 'V. 9-20: cf. Hé 10:23, 24, 32-36.'
  '9':
  - type: text
    content: 'Quoique nous parlions ainsi, bien-aimés, nous attendons, pour ce qui vous concerne, des choses meilleures et favorables au salut. '
