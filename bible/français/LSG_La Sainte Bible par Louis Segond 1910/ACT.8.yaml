document_id: ACT.8,93
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: Ac 22:20.
  - type: text
    content: Saul avait approuvé le meurtre d’Étienne.
  - type: heading
    content: Persécution à Jérusalem. Dispersion des disciples dans les contrées voisines. Le diacre Philippe prêche le Christ dans une ville de Samarie. Simon le magicien
  - type: heading
    content: 'V. 1-13: cf. (Ac 11:19-21. Ph 1:12-14.) (Jn 4:35-42; 6:70.)'
  - type: text
    content: 'Il y eut, ce jour-là, une grande persécution contre l’Église de Jérusalem; '
  - type: note
    content: Ac 11:19.
  - type: text
    content: 'et tous, excepté les apôtres, se dispersèrent dans les contrées de la Judée et de la Samarie. '
  '10':
  - type: text
    content: 'Tous, depuis le plus petit jusqu’au plus grand, l’écoutaient attentivement, et disaient: Celui-ci est la puissance de Dieu, celle qui s’appelle la grande. '
  '11':
  - type: text
    content: 'Ils l’écoutaient attentivement, parce qu’il les avait longtemps étonnés par ses actes de magie. '
  '12':
  - type: text
    content: 'Mais, quand ils eurent cru à Philippe, qui leur annonçait la bonne nouvelle du royaume de Dieu et du nom de Jésus-Christ, hommes et femmes se firent baptiser. '
  '13':
  - type: text
    content: Simon lui-même crut, et, après avoir été baptisé, il ne quittait plus Philippe, et il voyait avec étonnement les miracles et les grands prodiges qui s’opéraient.
  - type: heading
    content: Pierre et Jean en Samarie
  - type: heading
    content: 'V. 14-25: cf. Ac 19:5, 6. (1 Ti 6:5, 9, 10. Mt 6:24.)'
  '14':
  - type: text
    content: 'Les apôtres, qui étaient à Jérusalem, ayant appris que la Samarie avait reçu la parole de Dieu, y envoyèrent Pierre et Jean. '
  '15':
  - type: text
    content: 'Ceux-ci, arrivés chez les Samaritains, prièrent pour eux, afin qu’ils reçussent le Saint-Esprit. '
  '16':
  - type: text
    content: 'Car il n’était encore descendu sur aucun d’eux; ils avaient seulement été baptisés au nom du Seigneur Jésus. '
  '17':
  - type: note
    content: Ac 6:6; 13:3; 19:6. 1 Ti 4:14; 5:22. 2 Ti 1:6.
  - type: text
    content: 'Alors Pierre et Jean leur imposèrent les mains, et ils reçurent le Saint-Esprit. '
  '18':
  - type: text
    content: 'Lorsque Simon vit que le Saint-Esprit était donné par l’imposition des mains des apôtres, il leur offrit de l’argent, '
  '19':
  - type: text
    content: 'en disant: Accordez-moi aussi ce pouvoir, afin que celui à qui j’imposerai les mains reçoive le Saint-Esprit. '
  '2':
  - type: text
    content: 'Des hommes pieux ensevelirent Étienne, '
  - type: note
    content: Ge 23:2; 50:10. 2 S 3:31.
  - type: text
    content: 'et le pleurèrent à grand bruit. '
  '20':
  - type: text
    content: 'Mais Pierre lui dit: Que ton argent périsse avec toi, '
  - type: note
    content: Mt 10:8.
  - type: text
    content: 'puisque tu as cru que le don de Dieu s’acquérait à prix d’argent! '
  '21':
  - type: text
    content: 'Il n’y a pour toi ni part ni lot dans cette affaire, car ton cœur n’est pas droit devant Dieu. '
  '22':
  - type: text
    content: 'Repens-toi donc de ta méchanceté, et prie le Seigneur pour que la pensée de ton cœur te soit pardonnée, s’il est possible; '
  '23':
  - type: text
    content: 'car je vois que tu es dans un fiel amer et dans les liens de l’iniquité. '
  '24':
  - type: text
    content: 'Simon répondit: '
  - type: note
    content: No 21:7.
  - type: text
    content: 'Priez vous-mêmes le Seigneur pour moi, afin qu’il ne m’arrive rien de ce que vous avez dit. '
  '25':
  - type: text
    content: Après avoir rendu témoignage à la parole du Seigneur, et après l’avoir prêchée, Pierre et Jean retournèrent à Jérusalem, en annonçant la bonne nouvelle dans plusieurs villages des Samaritains.
  - type: heading
    content: Le diacre Philippe et l’eunuque éthiopien
  - type: heading
    content: 'V. 26-40: cf. 1 R 8:41-43. És 56:3-7.'
  '26':
  - type: text
    content: 'Un ange du Seigneur, s’adressant à Philippe, lui dit: Lève-toi, et va du côté du midi, sur le chemin qui descend de Jérusalem à Gaza, celui qui est désert. '
  '27':
  - type: text
    content: 'Il se leva, et partit. Et voici, un Éthiopien, un eunuque, ministre de Candace, reine d’Éthiopie, et surintendant de tous ses trésors, '
  - type: note
    content: Jn 12:20.
  - type: text
    content: 'venu à Jérusalem pour adorer, '
  '28':
  - type: text
    content: 's’en retournait, assis sur son char, et lisait le prophète Ésaïe. '
  '29':
  - type: text
    content: 'L’Esprit dit à Philippe: Avance, et approche-toi de ce char. '
  '3':
  - type: note
    content: Ac 9:1; 22:4; 26:9. 1 Co 15:9. Ga 1:13. 1 Ti 1:13.
  - type: text
    content: 'Saul, de son côté, ravageait l’Église; pénétrant dans les maisons, il en arrachait hommes et femmes, et les faisait jeter en prison. '
  '30':
  - type: text
    content: 'Philippe accourut, et entendit l’Éthiopien qui lisait le prophète Ésaïe. Il lui dit: Comprends-tu ce que tu lis? '
  '31':
  - type: text
    content: 'Il répondit: Comment le pourrais-je, si quelqu’un ne me guide? Et il invita Philippe à monter et à s’asseoir avec lui. '
  '32':
  - type: note
    content: És 53:7.
  - type: text
    content: 'Le passage de l’Écriture qu’il lisait était celui-ci:'
  - type: text
    content: Il a été mené comme une brebis à la boucherie;
  - type: text
    content: Et, comme un agneau muet devant celui qui le tond,
  - type: text
    content: Il n’a point ouvert la bouche.
  '33':
  - type: text
    content: Dans son humiliation, son jugement a été levé.
  - type: text
    content: Et sa postérité, qui la dépeindra?
  - type: text
    content: Car sa vie a été retranchée de la terre.
  '34':
  - type: text
    content: 'L’eunuque dit à Philippe: Je te prie, de qui le prophète parle-t-il ainsi? Est-ce de lui-même, ou de quelque autre? '
  '35':
  - type: text
    content: 'Alors Philippe, ouvrant la bouche et commençant par ce passage, '
  - type: note
    content: Lu 24:45.
  - type: text
    content: 'lui annonça la bonne nouvelle de Jésus. '
  '36':
  - type: text
    content: 'Comme ils continuaient leur chemin, ils rencontrèrent de l’eau. Et l’eunuque dit: Voici de l’eau; '
  - type: note
    content: Ac 10:47.
  - type: text
    content: 'qu’est-ce qui empêche que je sois baptisé? '
  '37':
  - type: text
    content: 'Philippe dit: Si tu crois de tout ton cœur, cela est possible. L’eunuque répondit: Je crois que Jésus-Christ est le Fils de Dieu. '
  '38':
  - type: text
    content: 'Il fit arrêter le char; Philippe et l’eunuque descendirent tous deux dans l’eau, et Philippe baptisa l’eunuque. '
  '39':
  - type: text
    content: 'Quand ils furent sortis de l’eau, l’Esprit du Seigneur enleva Philippe, et l’eunuque ne le vit plus. Tandis que, joyeux, il poursuivait sa route, '
  '4':
  - type: text
    content: 'Ceux qui avaient été dispersés '
  - type: note
    content: Mt 10:23. Ac 11:19.
  - type: text
    content: 'allaient de lieu en lieu, annonçant la bonne nouvelle de la parole. '
  '40':
  - type: text
    content: Philippe se trouva dans Azot, d’où il alla jusqu’à Césarée, en évangélisant toutes les villes par lesquelles il passait.
  '5':
  - type: text
    content: 'Philippe, étant descendu dans la ville de Samarie, y prêcha le Christ. '
  '6':
  - type: text
    content: 'Les foules tout entières étaient attentives à ce que disait Philippe, lorsqu’elles apprirent et virent les miracles qu’il faisait. '
  '7':
  - type: note
    content: Mc 16:17. Ac 5:16; 16:18; 19:11.
  - type: text
    content: 'Car des esprits impurs sortirent de plusieurs démoniaques, en poussant de grands cris, et beaucoup de paralytiques et de boiteux furent guéris. '
  '8':
  - type: text
    content: 'Et il y eut une grande joie dans cette ville. '
  '9':
  - type: text
    content: 'Il y avait auparavant dans la ville un homme nommé Simon, qui, se donnant pour un personnage important, exerçait '
  - type: note
    content: Ac 13:6.
  - type: text
    content: 'la magie et provoquait l’étonnement du peuple de la Samarie. '
