document_id: MIC.5,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Naissance et règne du Messie
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-5: cf. És 9:5, 6. (Mt 2:1-11. Lu 2:1-14; 1:30-33.) Ps 72.'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et toi, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 2:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 7:42
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Bethléhem Éphrata,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Petite entre les milliers de Juda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De toi sortira pour moi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui dominera sur Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et dont l’origine remonte aux temps anciens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aux jours de l’éternité.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’exterminerai les villes de ton pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je renverserai toutes tes forteresses;
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’exterminerai de ta main les enchantements,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tu n’auras plus de magiciens;
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’exterminerai du milieu de toi tes idoles et tes statues,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tu ne te prosterneras plus devant l’ouvrage de tes mains;
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’exterminerai du milieu de toi tes idoles d’Astarté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je détruirai tes villes.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’exercerai ma vengeance avec colère, avec fureur, sur les nations
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui n’ont pas écouté.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est pourquoi il les livrera
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jusqu’au temps où enfantera celle qui doit enfanter,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le reste de ses frères
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Reviendra auprès des enfants d’Israël.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il se présentera, et il gouvernera avec la force de l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Avec la majesté du nom de l’Éternel, son Dieu:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils auront une demeure assurée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car il sera glorifié jusqu’aux extrémités de la terre.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est lui qui ramènera la paix.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lorsque l’Assyrien viendra dans notre pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qu’il pénétrera dans nos palais,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous ferons lever contre lui sept pasteurs
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et huit princes du peuple.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils feront avec l’épée leur pâture du pays d’Assyrie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et du pays de Nimrod au-dedans de ses portes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il nous délivrera ainsi de l’Assyrien,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lorsqu’il viendra dans notre pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qu’il pénétrera sur notre territoire.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 6-8: cf. Ro 11:11, 12, 15. És 54:15-17. 2 Co 2:15, 16.'
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le reste de Jacob sera au milieu des peuples nombreux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme une rosée qui vient de l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Comme des gouttes d’eau sur l’herbe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles ne comptent pas sur l’homme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles ne dépendent pas des enfants des hommes.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le reste de Jacob sera parmi les nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au milieu des peuples nombreux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme un lion parmi les bêtes de la forêt,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Comme un lionceau parmi les troupeaux de brebis:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lorsqu’il passe, il foule et déchire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et personne ne délivre.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que ta main se lève sur tes adversaires,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que tous tes ennemis soient exterminés!
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 9-14: cf. Za 9:10; 13:2.'
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En ce jour-là, dit l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'J’exterminerai du milieu de toi tes '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Os 14:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: chevaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je détruirai tes chars;
