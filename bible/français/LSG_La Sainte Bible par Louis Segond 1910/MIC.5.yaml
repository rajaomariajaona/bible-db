document_id: MIC.5,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Naissance et règne du Messie
  - type: heading
    content: 'V. 1-5: cf. És 9:5, 6. (Mt 2:1-11. Lu 2:1-14; 1:30-33.) Ps 72.'
  - type: text
    content: 'Et toi, '
  - type: note
    content: Mt 2:6. Jn 7:42.
  - type: text
    content: Bethléhem Éphrata,
  - type: text
    content: Petite entre les milliers de Juda,
  - type: text
    content: De toi sortira pour moi
  - type: text
    content: Celui qui dominera sur Israël,
  - type: text
    content: Et dont l’origine remonte aux temps anciens,
  - type: text
    content: Aux jours de l’éternité.
  '10':
  - type: text
    content: J’exterminerai les villes de ton pays,
  - type: text
    content: Et je renverserai toutes tes forteresses;
  '11':
  - type: text
    content: J’exterminerai de ta main les enchantements,
  - type: text
    content: Et tu n’auras plus de magiciens;
  '12':
  - type: text
    content: J’exterminerai du milieu de toi tes idoles et tes statues,
  - type: text
    content: Et tu ne te prosterneras plus devant l’ouvrage de tes mains;
  '13':
  - type: text
    content: J’exterminerai du milieu de toi tes idoles d’Astarté,
  - type: text
    content: Et je détruirai tes villes.
  '14':
  - type: text
    content: J’exercerai ma vengeance avec colère, avec fureur, sur les nations
  - type: text
    content: Qui n’ont pas écouté.
  '2':
  - type: text
    content: C’est pourquoi il les livrera
  - type: text
    content: Jusqu’au temps où enfantera celle qui doit enfanter,
  - type: text
    content: Et le reste de ses frères
  - type: text
    content: Reviendra auprès des enfants d’Israël.
  '3':
  - type: text
    content: Il se présentera, et il gouvernera avec la force de l’Éternel,
  - type: text
    content: 'Avec la majesté du nom de l’Éternel, son Dieu:'
  - type: text
    content: Et ils auront une demeure assurée,
  - type: text
    content: Car il sera glorifié jusqu’aux extrémités de la terre.
  '4':
  - type: text
    content: C’est lui qui ramènera la paix.
  - type: text
    content: Lorsque l’Assyrien viendra dans notre pays,
  - type: text
    content: Et qu’il pénétrera dans nos palais,
  - type: text
    content: Nous ferons lever contre lui sept pasteurs
  - type: text
    content: Et huit princes du peuple.
  '5':
  - type: text
    content: Ils feront avec l’épée leur pâture du pays d’Assyrie
  - type: text
    content: Et du pays de Nimrod au-dedans de ses portes.
  - type: text
    content: Il nous délivrera ainsi de l’Assyrien,
  - type: text
    content: Lorsqu’il viendra dans notre pays,
  - type: text
    content: Et qu’il pénétrera sur notre territoire.
  - type: heading
    content: 'V. 6-8: cf. Ro 11:11, 12, 15. És 54:15-17. 2 Co 2:15, 16.'
  '6':
  - type: text
    content: Le reste de Jacob sera au milieu des peuples nombreux
  - type: text
    content: Comme une rosée qui vient de l’Éternel,
  - type: text
    content: 'Comme des gouttes d’eau sur l’herbe:'
  - type: text
    content: Elles ne comptent pas sur l’homme,
  - type: text
    content: Elles ne dépendent pas des enfants des hommes.
  '7':
  - type: text
    content: Le reste de Jacob sera parmi les nations,
  - type: text
    content: Au milieu des peuples nombreux,
  - type: text
    content: Comme un lion parmi les bêtes de la forêt,
  - type: text
    content: 'Comme un lionceau parmi les troupeaux de brebis:'
  - type: text
    content: Lorsqu’il passe, il foule et déchire,
  - type: text
    content: Et personne ne délivre.
  '8':
  - type: text
    content: Que ta main se lève sur tes adversaires,
  - type: text
    content: Et que tous tes ennemis soient exterminés!
  - type: heading
    content: 'V. 9-14: cf. Za 9:10; 13:2.'
  '9':
  - type: text
    content: En ce jour-là, dit l’Éternel,
  - type: text
    content: 'J’exterminerai du milieu de toi tes '
  - type: note
    content: Os 14:4.
  - type: text
    content: chevaux,
  - type: text
    content: Et je détruirai tes chars;
