document_id: PSA.52
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: (1 S 21:1-9; 22:9, etc.) Ps 92:8, etc. Pr 11:28.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef des chantres. Cantique de David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 S 22:9, etc.
    marker-yv: yv-n
  - type: text
    text: 'A l’occasion du rapport que Doëg, l’Édomite, vint faire à Saül, en lui disant: David s’est rendu dans la maison d’Achimélec.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Pourquoi te glorifies-tu de ta méchanceté, tyran?
- type: usfm
  marker: q1
  children:
  - type: text
    text: La bonté de Dieu subsiste toujours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ta langue n’invente que malice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme un rasoir affilé, fourbe que tu es!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tu aimes le mal plutôt que le bien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Le mensonge plutôt que la droiture. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: — Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tu aimes toutes les paroles de destruction,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Langue trompeuse!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Aussi Dieu t’abattra pour toujours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il te saisira et t’enlèvera de ta tente;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Il te déracinera de la terre des vivants. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: — Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Les justes le verront, et auront de la crainte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et ils feront de lui le sujet de leurs moqueries:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Voilà l’homme qui ne prenait point Dieu pour protecteur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais qui se confiait en ses grandes richesses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui triomphait dans sa malice!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Et moi, je suis dans la maison de Dieu comme un olivier verdoyant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je me confie dans la bonté de Dieu, éternellement et à jamais.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Je te louerai toujours, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 22:32
      metadata:
        usfm: PSA.22.32
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: parce que tu as agi;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je veux espérer en ton nom, parce qu’il est favorable,
- type: usfm
  marker: q1
  children:
  - type: text
    text: En présence de tes fidèles.
