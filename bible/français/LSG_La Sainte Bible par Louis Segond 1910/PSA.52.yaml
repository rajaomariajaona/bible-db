document_id: PSA.52,93
type_code: fra
verses:
  '1':
  - type: heading
    content: (1 S 21:1-9; 22:9, etc.) Ps 92:8, etc. Pr 11:28.
  - type: text
    content: Au chef des chantres. Cantique de David.
  '10':
  - type: text
    content: Et moi, je suis dans la maison de Dieu comme un olivier verdoyant,
  - type: text
    content: Je me confie dans la bonté de Dieu, éternellement et à jamais.
  '11':
  - type: text
    content: 'Je te louerai toujours, '
  - type: note
    content: Ps 22:32.
  - type: text
    content: parce que tu as agi;
  - type: text
    content: Et je veux espérer en ton nom, parce qu’il est favorable,
  - type: text
    content: En présence de tes fidèles.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 1 S 22:9, etc.
  - type: text
    content: 'A l’occasion du rapport que Doëg, l’Édomite, vint faire à Saül, en lui disant: David s’est rendu dans la maison d’Achimélec.'
  '3':
  - type: text
    content: Pourquoi te glorifies-tu de ta méchanceté, tyran?
  - type: text
    content: La bonté de Dieu subsiste toujours.
  '4':
  - type: text
    content: Ta langue n’invente que malice,
  - type: text
    content: Comme un rasoir affilé, fourbe que tu es!
  '5':
  - type: text
    content: Tu aimes le mal plutôt que le bien,
  - type: text
    content: 'Le mensonge plutôt que la droiture. '
  - type: text
    content: — Pause.
  '6':
  - type: text
    content: Tu aimes toutes les paroles de destruction,
  - type: text
    content: Langue trompeuse!
  '7':
  - type: text
    content: Aussi Dieu t’abattra pour toujours,
  - type: text
    content: Il te saisira et t’enlèvera de ta tente;
  - type: text
    content: 'Il te déracinera de la terre des vivants. '
  - type: text
    content: — Pause.
  '8':
  - type: text
    content: Les justes le verront, et auront de la crainte,
  - type: text
    content: 'Et ils feront de lui le sujet de leurs moqueries:'
  '9':
  - type: text
    content: Voilà l’homme qui ne prenait point Dieu pour protecteur,
  - type: text
    content: Mais qui se confiait en ses grandes richesses,
  - type: text
    content: Et qui triomphait dans sa malice!
