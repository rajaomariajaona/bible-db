document_id: EPH.4,93
type_code: fra
verses:
  '1':
  - type: heading
    content: L’unité de la foi
  - type: heading
    content: 'V. 1-16: cf. Col 3:12-14. (Ro 12:4-8. 1 Co 12:4-31.)'
  - type: text
    content: 'Je vous exhorte donc, moi, le prisonnier dans le Seigneur, '
  - type: note
    content: Ge 17:1. 1 Co 7:20. Ph 1:27. Col 1:10. 1 Th 2:12.
  - type: text
    content: 'à marcher d’une manière digne de la vocation qui vous a été adressée, '
  '10':
  - type: text
    content: 'Celui qui est descendu, c’est le même qui est monté au-dessus de tous les cieux, afin de remplir toutes choses. '
  '11':
  - type: note
    content: 1 Co 12:28.
  - type: text
    content: 'Et il a donné les uns comme apôtres, les autres comme prophètes, les autres comme évangélistes, les autres comme pasteurs et docteurs, '
  '12':
  - type: text
    content: 'pour le perfectionnement des saints en vue de l’œuvre du ministère et de l’édification '
  - type: note
    content: Ro 12:5. 1 Co 12:27. Ép 1:23. Col 1:24.
  - type: text
    content: 'du corps de Christ, '
  '13':
  - type: text
    content: 'jusqu’à ce que nous soyons tous parvenus à l’unité de la foi et de la connaissance du Fils de Dieu, à l’état d’homme fait, à la mesure de la stature parfaite de Christ, '
  '14':
  - type: note
    content: 1 Co 14:20.
  - type: text
    content: 'afin que nous ne soyons plus des enfants, '
  - type: note
    content: Mt 11:7.
  - type: text
    content: 'flottants et emportés à tout vent de doctrine, par la tromperie des hommes, par leur ruse dans les moyens de séduction, '
  '15':
  - type: text
    content: 'mais que, professant la vérité dans la charité, nous croissions à tous égards en celui qui est '
  - type: note
    content: Ép 5:23. Col 1:18.
  - type: text
    content: 'le chef, Christ. '
  '16':
  - type: note
    content: Ro 12:5. 1 Co 12:27. Ép 2:21.
  - type: text
    content: C’est de lui, et grâce à tous les liens de son assistance, que tout le corps, bien coordonné et formant un solide assemblage, tire son accroissement selon la force qui convient à chacune de ses parties, et s’édifie lui-même dans la charité.
  - type: heading
    content: La sainteté chrétienne, opposée aux mœurs corrompues des païens
  - type: heading
    content: '4 v. 17 à 5 v. 2: cf. (Col 3:1-13. Ga 5:16-25.) (1 Jn 4:7-11; 3:16-18.)'
  '17':
  - type: text
    content: 'Voici donc ce que je dis '
  - type: note
    content: Ro 1:9.
  - type: text
    content: 'et ce que je déclare dans le Seigneur, '
  - type: note
    content: Ro 1:18. 1 Pi 4:3.
  - type: text
    content: 'c’est que vous ne devez plus marcher comme les païens, qui marchent selon la vanité de leurs pensées. '
  '18':
  - type: text
    content: 'Ils ont l’intelligence obscurcie, ils sont étrangers à la vie de Dieu, '
  - type: note
    content: 1 Th 4:5.
  - type: text
    content: 'à cause de l’ignorance qui est en eux, à cause de l’endurcissement de leur cœur. '
  '19':
  - type: text
    content: 'Ayant perdu tout sentiment, ils se sont livrés à la dissolution, pour commettre toute espèce d’impureté jointe à la cupidité. '
  '2':
  - type: note
    content: Col 1:11; 3:12. 1 Th 5:14.
  - type: text
    content: 'en toute humilité et douceur, avec patience, vous supportant les uns les autres avec charité, '
  '20':
  - type: text
    content: 'Mais vous, ce n’est pas ainsi que vous avez appris Christ, '
  '21':
  - type: text
    content: 'si du moins vous l’avez entendu, et si, conformément à la vérité qui est en Jésus, c’est en lui que vous avez été instruits à vous dépouiller, '
  '22':
  - type: text
    content: 'eu égard à votre vie passée, du '
  - type: note
    content: Col 3:9. Hé 12:1. 1 Pi 2:1.
  - type: text
    content: 'vieil homme qui se corrompt par les convoitises trompeuses, '
  '23':
  - type: text
    content: 'à être renouvelés dans l’esprit de votre intelligence, '
  '24':
  - type: note
    content: Ro 6:4. Col 3:10. 1 Pi 4:2.
  - type: text
    content: 'et à revêtir l’homme nouveau, créé selon Dieu dans une justice et une sainteté que produit la vérité. '
  '25':
  - type: text
    content: 'C’est pourquoi, renoncez au mensonge, '
  - type: note
    content: Za 8:16.
  - type: text
    content: 'et que chacun de vous parle selon la vérité à son prochain; car nous sommes membres les uns des autres. '
  '26':
  - type: note
    content: Ps 4:5.
  - type: text
    content: 'Si vous vous mettez en colère, ne péchez point; que le soleil ne se couche pas sur votre colère, '
  '27':
  - type: note
    content: Ja 4:7. 1 Pi 5:9.
  - type: text
    content: 'et ne donnez pas accès au diable. '
  '28':
  - type: text
    content: 'Que celui qui dérobait ne dérobe plus; '
  - type: note
    content: Ac 20:35. 1 Th 4:11. 2 Th 3:8, 12.
  - type: text
    content: 'mais plutôt qu’il travaille, en faisant de ses mains ce qui est bien, pour avoir de quoi donner à celui qui est dans le besoin. '
  '29':
  - type: note
    content: Mt 12:36. Ép 5:3, 4.
  - type: text
    content: 'Qu’il ne sorte de votre bouche aucune parole mauvaise, mais, s’il y a lieu, quelque bonne parole, qui serve à l’édification et communique une grâce à ceux qui l’entendent. '
  '3':
  - type: text
    content: 'vous efforçant de conserver l’unité de l’esprit par le lien de la paix. '
  '30':
  - type: text
    content: 'N’attristez pas le Saint-Esprit de Dieu, '
  - type: note
    content: Ro 8:16. 2 Co 1:22; 5:5. Ép 1:13.
  - type: text
    content: 'par lequel vous avez été scellés pour le jour '
  - type: note
    content: Lu 21:28. Ro 8:23. Ép 1:14.
  - type: text
    content: 'de la rédemption. '
  '31':
  - type: note
    content: Col 3:19.
  - type: text
    content: 'Que toute amertume, toute animosité, toute colère, toute clameur, toute calomnie, et toute espèce de méchanceté, disparaissent du milieu de vous. '
  '32':
  - type: note
    content: Ph 2:1. Col 3:12.
  - type: text
    content: 'Soyez bons les uns envers les autres, compatissants, '
  - type: note
    content: Mt 6:14. Mc 11:25. Col 3:13.
  - type: text
    content: vous pardonnant réciproquement, comme Dieu vous a pardonné en Christ.
  '4':
  - type: text
    content: 'Il y a un seul corps et un seul Esprit, comme aussi vous avez été appelés à une seule espérance par votre vocation; '
  '5':
  - type: note
    content: De 4:39. Mal 2:10. 1 Co 8:4, 6.
  - type: text
    content: 'il y a un seul Seigneur, une seule foi, un seul baptême, '
  '6':
  - type: text
    content: 'un seul Dieu et Père de tous, qui est au-dessus de tous, et parmi tous, et en tous. '
  '7':
  - type: note
    content: Ro 12:6. 1 Co 12:11. 2 Co 10:13. 1 Pi 4:10.
  - type: text
    content: 'Mais à chacun de nous la grâce a été donnée selon la mesure du don de Christ. '
  '8':
  - type: text
    content: 'C’est pourquoi il est dit:'
  - type: note
    content: Ps 68:19.
  - type: text
    content: Étant monté en haut, il a emmené des captifs,
  - type: text
    content: 'Et il a fait des dons aux hommes. '
  '9':
  - type: note
    content: Jn 3:13; 6:62.
  - type: text
    content: 'Or, que signifie: Il est monté, sinon qu’il est aussi descendu dans les régions inférieures de la terre? '
