document_id: EPH.4
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’unité de la foi
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-16: cf. Col 3:12-14. (Ro 12:4-8. 1 Co 12:4-31.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Je vous exhorte donc, moi, le prisonnier dans le Seigneur, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 17:1
      metadata:
        usfm: GEN.17.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 7:20
      metadata:
        usfm: 1CO.7.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 1:27
      metadata:
        usfm: PHP.1.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 1:10
      metadata:
        usfm: COL.1.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 2:12
      metadata:
        usfm: 1TH.2.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'à marcher d’une manière digne de la vocation qui vous a été adressée, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 1:11
      metadata:
        usfm: COL.1.11
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 3:12
      metadata:
        usfm: COL.3.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 5:14
      metadata:
        usfm: 1TH.5.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'en toute humilité et douceur, avec patience, vous supportant les uns les autres avec charité, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'vous efforçant de conserver l’unité de l’esprit par le lien de la paix. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il y a un seul corps et un seul Esprit, comme aussi vous avez été appelés à une seule espérance par votre vocation; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 4:39
      metadata:
        usfm: DEU.4.39
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mal 2:10
      metadata:
        usfm: MAL.2.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 8:4
      metadata:
        usfm: 1CO.8.4
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '6'
      metadata:
        usfm: 1CO.8.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'il y a un seul Seigneur, une seule foi, un seul baptême, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'un seul Dieu et Père de tous, qui est au-dessus de tous, et parmi tous, et en tous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 12:6
      metadata:
        usfm: ROM.12.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 12:11
      metadata:
        usfm: 1CO.12.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 10:13
      metadata:
        usfm: 2CO.10.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 4:10
      metadata:
        usfm: 1PE.4.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Mais à chacun de nous la grâce a été donnée selon la mesure du don de Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'C’est pourquoi il est dit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 68:19
      metadata:
        usfm: PSA.68.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Étant monté en haut, il a emmené des captifs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et il a fait des dons aux hommes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 3:13
      metadata:
        usfm: JHN.3.13
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 6:62
      metadata:
        usfm: JHN.6.62
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Or, que signifie: Il est monté, sinon qu’il est aussi descendu dans les régions inférieures de la terre? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Celui qui est descendu, c’est le même qui est monté au-dessus de tous les cieux, afin de remplir toutes choses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 12:28
      metadata:
        usfm: 1CO.12.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Et il a donné les uns comme apôtres, les autres comme prophètes, les autres comme évangélistes, les autres comme pasteurs et docteurs, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'pour le perfectionnement des saints en vue de l’œuvre du ministère et de l’édification '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 12:5
      metadata:
        usfm: ROM.12.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 12:27
      metadata:
        usfm: 1CO.12.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 1:23
      metadata:
        usfm: EPH.1.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 1:24
      metadata:
        usfm: COL.1.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'du corps de Christ, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'jusqu’à ce que nous soyons tous parvenus à l’unité de la foi et de la connaissance du Fils de Dieu, à l’état d’homme fait, à la mesure de la stature parfaite de Christ, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 14:20
      metadata:
        usfm: 1CO.14.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'afin que nous ne soyons plus des enfants, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 11:7
      metadata:
        usfm: MAT.11.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'flottants et emportés à tout vent de doctrine, par la tromperie des hommes, par leur ruse dans les moyens de séduction, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'mais que, professant la vérité dans la charité, nous croissions à tous égards en celui qui est '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 5:23
      metadata:
        usfm: EPH.5.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 1:18
      metadata:
        usfm: COL.1.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'le chef, Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 12:5
      metadata:
        usfm: ROM.12.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 12:27
      metadata:
        usfm: 1CO.12.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 2:21
      metadata:
        usfm: EPH.2.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: C’est de lui, et grâce à tous les liens de son assistance, que tout le corps, bien coordonné et formant un solide assemblage, tire son accroissement selon la force qui convient à chacune de ses parties, et s’édifie lui-même dans la charité.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La sainteté chrétienne, opposée aux mœurs corrompues des païens
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: '4 v. 17 à 5 v. 2: cf. (Col 3:1-13. Ga 5:16-25.) (1 Jn 4:7-11; 3:16-18.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Voici donc ce que je dis '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 1:9
      metadata:
        usfm: ROM.1.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et ce que je déclare dans le Seigneur, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 1:18
      metadata:
        usfm: ROM.1.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 4:3
      metadata:
        usfm: 1PE.4.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'c’est que vous ne devez plus marcher comme les païens, qui marchent selon la vanité de leurs pensées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ils ont l’intelligence obscurcie, ils sont étrangers à la vie de Dieu, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 4:5
      metadata:
        usfm: 1TH.4.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'à cause de l’ignorance qui est en eux, à cause de l’endurcissement de leur cœur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ayant perdu tout sentiment, ils se sont livrés à la dissolution, pour commettre toute espèce d’impureté jointe à la cupidité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Mais vous, ce n’est pas ainsi que vous avez appris Christ, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'si du moins vous l’avez entendu, et si, conformément à la vérité qui est en Jésus, c’est en lui que vous avez été instruits à vous dépouiller, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'eu égard à votre vie passée, du '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 3:9
      metadata:
        usfm: COL.3.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 12:1
      metadata:
        usfm: HEB.12.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 2:1
      metadata:
        usfm: 1PE.2.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'vieil homme qui se corrompt par les convoitises trompeuses, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'à être renouvelés dans l’esprit de votre intelligence, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 6:4
      metadata:
        usfm: ROM.6.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 3:10
      metadata:
        usfm: COL.3.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 4:2
      metadata:
        usfm: 1PE.4.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et à revêtir l’homme nouveau, créé selon Dieu dans une justice et une sainteté que produit la vérité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'C’est pourquoi, renoncez au mensonge, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Za 8:16
      metadata:
        usfm: ZEC.8.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et que chacun de vous parle selon la vérité à son prochain; car nous sommes membres les uns des autres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 4:5
      metadata:
        usfm: PSA.4.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Si vous vous mettez en colère, ne péchez point; que le soleil ne se couche pas sur votre colère, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ja 4:7
      metadata:
        usfm: JAS.4.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 5:9
      metadata:
        usfm: 1PE.5.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et ne donnez pas accès au diable. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Que celui qui dérobait ne dérobe plus; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 20:35
      metadata:
        usfm: ACT.20.35
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 4:11
      metadata:
        usfm: 1TH.4.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Th 3:8
      metadata:
        usfm: 2TH.3.8
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '12'
      metadata:
        usfm: 2TH.3.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'mais plutôt qu’il travaille, en faisant de ses mains ce qui est bien, pour avoir de quoi donner à celui qui est dans le besoin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 12:36
      metadata:
        usfm: MAT.12.36
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 5:3
      metadata:
        usfm: EPH.5.3
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '4'
      metadata:
        usfm: EPH.5.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Qu’il ne sorte de votre bouche aucune parole mauvaise, mais, s’il y a lieu, quelque bonne parole, qui serve à l’édification et communique une grâce à ceux qui l’entendent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'N’attristez pas le Saint-Esprit de Dieu, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 8:16
      metadata:
        usfm: ROM.8.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 1:22
      metadata:
        usfm: 2CO.1.22
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 5:5
      metadata:
        usfm: 2CO.5.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 1:13
      metadata:
        usfm: EPH.1.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'par lequel vous avez été scellés pour le jour '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 21:28
      metadata:
        usfm: LUK.21.28
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 8:23
      metadata:
        usfm: ROM.8.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 1:14
      metadata:
        usfm: EPH.1.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'de la rédemption. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 3:19
      metadata:
        usfm: COL.3.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Que toute amertume, toute animosité, toute colère, toute clameur, toute calomnie, et toute espèce de méchanceté, disparaissent du milieu de vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 2:1
      metadata:
        usfm: PHP.2.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 3:12
      metadata:
        usfm: COL.3.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
