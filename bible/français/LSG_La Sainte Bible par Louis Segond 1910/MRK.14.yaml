    - type: usfm
      marker: ref
      children:
      - type: text
        text: '24'
      metadata:
        usfm: JHN.18.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ils emmenèrent Jésus chez le souverain sacrificateur, où s’assemblèrent tous les principaux sacrificateurs, les anciens et les scribes. '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Pierre le suivit de loin jusque dans l’intérieur de la cour du souverain sacrificateur; il s’assit avec les serviteurs, et il se chauffait près du feu. '
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 26:59
      metadata:
        usfm: MAT.26.59
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 6:13
      metadata:
        usfm: ACT.6.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Les principaux sacrificateurs et tout le sanhédrin cherchaient un témoignage contre Jésus, pour le faire mourir, et ils n’en trouvaient point; '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'car plusieurs rendaient de faux témoignages contre lui, mais les témoignages ne s’accordaient pas. '
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Quelques-uns se levèrent, et portèrent un faux témoignage contre lui, disant: '
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'Nous l’avons entendu dire: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 15:29
      metadata:
        usfm: MRK.15.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 2:19
      metadata:
        usfm: JHN.2.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Je détruirai ce temple fait de main d’homme, et en trois jours j’en bâtirai un autre qui ne sera pas fait de main d’homme. '
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'Même sur ce point-là leur témoignage ne s’accordait pas. '
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 26:62
      metadata:
        usfm: MAT.26.62
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Alors le souverain sacrificateur, se levant au milieu de l’assemblée, interrogea Jésus, et dit: Ne réponds-tu rien? Qu’est-ce que ces gens déposent contre toi? '
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 53:7
      metadata:
        usfm: ISA.53.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 8:32
      metadata:
        usfm: ACT.8.32
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Jésus garda le silence, et ne répondit rien. Le souverain sacrificateur l’interrogea de nouveau, et lui dit: Es-tu le Christ, le Fils du Dieu béni? '
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'Jésus répondit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je le suis.
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Da 7:13
      metadata:
        usfm: DAN.7.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 16:27
      metadata:
        usfm: MAT.16.27
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 24:30
      metadata:
        usfm: MAT.24.30
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 25:31
      metadata:
        usfm: MAT.25.31
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 21:27
      metadata:
        usfm: LUK.21.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 1:17
      metadata:
        usfm: ACT.1.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 4:16
      metadata:
        usfm: 1TH.4.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Th 1:10
      metadata:
        usfm: 2TH.1.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 1:1
      metadata:
        usfm: REV.1.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Et vous verrez le Fils de l’homme assis à la droite de la puissance de Dieu, et venant sur les nuées du ciel.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'Alors le souverain sacrificateur déchira ses vêtements, et dit: Qu’avons-nous encore besoin de témoins? '
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'Vous avez entendu le blasphème. Que vous en semble? Tous le condamnèrent comme méritant la mort. '
  - type: usfm
    marker: v
    metadata:
      v: '65'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: 'Et quelques-uns se mirent à cracher sur lui, à lui voiler le visage et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 16:10
      metadata:
        usfm: JOB.16.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 50:6
      metadata:
        usfm: ISA.50.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 19:3
      metadata:
        usfm: JHN.19.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'à le frapper à coups de poing, en lui disant: Devine! Et les serviteurs le reçurent en lui donnant des soufflets.'
