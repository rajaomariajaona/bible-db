document_id: MRK.14,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Histoire de la passion. Complot contre Jésus
  - type: heading
    content: 'V. 1-2: cf. (Mt 26:1-5. Lu 22:1, 2.)'
  - type: text
    content: ' '
  - type: note
    content: Mt 26:2. Lu 22:1. Jn 11:55; 13:1.
  - type: text
    content: 'La fête de Pâque et des pains sans levain devait avoir lieu deux jours après. Les principaux sacrificateurs et les scribes cherchaient les moyens d’arrêter Jésus par ruse, et de le faire mourir. '
  '10':
  - type: note
    content: Mt 26:14. Lu 22:4.
  - type: text
    content: 'Judas Iscariot, l’un des douze, alla vers les principaux sacrificateurs, afin de leur livrer Jésus. '
  '11':
  - type: text
    content: Après l’avoir entendu, ils furent dans la joie, et promirent de lui donner de l’argent. Et Judas cherchait une occasion favorable pour le livrer.
  - type: heading
    content: Célébration de la Pâque et institution de la sainte cène
  - type: heading
    content: 'V. 12-21: cf. (Mt 26:17-25. Lu 22:7-18, 21-30.) Jn 13:1-30.'
  '12':
  - type: text
    content: ' '
  - type: note
    content: Mt 26:17. Lu 22:7.
  - type: text
    content: 'Le premier jour '
  - type: note
    content: Ex 12:17.
  - type: text
    content: 'des pains sans levain, où l’on immolait la Pâque, les disciples de Jésus lui dirent: Où veux-tu que nous allions te préparer la Pâque? '
  '13':
  - type: text
    content: 'Et il envoya deux de ses disciples, et leur dit: '
  - type: text
    content: Allez à la ville; vous rencontrerez un homme portant une cruche d’eau, suivez-le.
  '14':
  - type: text
    content: ' '
  - type: text
    content: 'Quelque part qu’il entre, dites au maître de la maison: Le maître dit: Où est le lieu où je mangerai la Pâque avec mes disciples?'
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'Et il vous montrera une grande chambre haute, meublée et toute prête: c’est là que vous nous préparerez la Pâque.'
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'Les disciples partirent, arrivèrent à la ville, et trouvèrent les choses comme il le leur avait dit; et ils préparèrent la Pâque. '
  '17':
  - type: note
    content: Mt 26:20. Lu 22:14.
  - type: text
    content: 'Le soir étant venu, il arriva avec les douze. '
  '18':
  - type: text
    content: 'Pendant qu’ils étaient à table et qu’ils mangeaient, Jésus dit: '
  - type: text
    content: Je vous le dis en vérité,
  - type: text
    content: ' '
  - type: note
    content: Ps 41:10. Ac 1:17.
  - type: text
    content: l’un de vous, qui mange avec moi, me livrera.
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'Ils commencèrent à s’attrister, et à lui dire, l’un après l’autre: Est-ce moi? '
  '2':
  - type: text
    content: 'Car ils disaient: Que ce ne soit pas pendant la fête, afin qu’il n’y ait pas de tumulte parmi le peuple.'
  - type: heading
    content: Parfum répandu sur la tête de Jésus à Béthanie. Trahison de Judas
  - type: heading
    content: 'V. 3-11: cf. (Mt 26:6-16. Jn 12:1-8. Lu 22:3-6). Lu 7:36-50.'
  '20':
  - type: text
    content: 'Il leur répondit: '
  - type: text
    content: C’est l’un des douze, qui met avec moi la main dans le plat.
  '21':
  - type: text
    content: ' '
  - type: text
    content: Le Fils de l’homme s’en va selon ce qui est écrit de lui. Mais malheur à l’homme par qui le Fils de l’homme est livré! Mieux vaudrait pour cet homme qu’il ne fût pas né.
  - type: heading
    content: 'V. 22-25: cf. (Mt 26:26-29. Lu 22:19, 20. 1 Co 11:23-25.) 1 Co 10:16, 17.'
  '22':
  - type: text
    content: ' '
  - type: note
    content: Mt 26:26. Lu 22:19. 1 Co 11:23.
  - type: text
    content: 'Pendant qu’ils mangeaient, Jésus prit du pain; et, après avoir rendu grâces, il le rompit, et le leur donna, en disant: '
  - type: text
    content: Prenez, ceci est mon corps.
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'Il prit ensuite une coupe; et, après avoir rendu grâces, il la leur donna, et ils en burent tous. '
  '24':
  - type: text
    content: 'Et il leur dit: '
  - type: text
    content: Ceci est mon sang, le sang de l’alliance, qui est répandu pour plusieurs.
  '25':
  - type: text
    content: ' '
  - type: text
    content: Je vous le dis en vérité, je ne boirai plus jamais du fruit de la vigne, jusqu’au jour où je le boirai nouveau dans le royaume de Dieu.
  - type: heading
    content: 'V. 26-31: cf. (Mt 26:30-35. Lu 22:39. Jn 18:1.) (Lu 22:31-38. Jn 13:36-38.)'
  '26':
  - type: text
    content: 'Après avoir chanté les cantiques, ils se rendirent à la montagne des oliviers. '
  '27':
  - type: note
    content: Mt 26:31. Jn 16:32.
  - type: text
    content: 'Jésus leur dit: '
  - type: text
    content: 'Vous serez tous scandalisés; car il est écrit:'
  - type: text
    content: ' '
  - type: note
    content: Za 13:7.
  - type: text
    content: Je frapperai le berger, et les brebis seront dispersées.
  '28':
  - type: text
    content: ' '
  - type: note
    content: Mt 26:32; 28:10. Mc 16:7.
  - type: text
    content: Mais, après que je serai ressuscité, je vous précéderai en Galilée.
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'Pierre lui dit: Quand tous seraient scandalisés, je ne serai pas scandalisé. '
  '3':
  - type: text
    content: ' '
  - type: note
    content: Mt 26:6. Lu 7:37. Jn 11:2; 12:3.
  - type: text
    content: 'Comme Jésus était à Béthanie, dans la maison de Simon le lépreux, une femme entra, pendant qu’il se trouvait à table. Elle tenait un vase d’albâtre, qui renfermait un parfum de nard pur de grand prix; et, ayant rompu le vase, elle répandit le parfum sur la tête de Jésus. '
  '30':
  - type: note
    content: Mt 26:34. Lu 22:34. Jn 13:38.
  - type: text
    content: 'Et Jésus lui dit: '
  - type: text
    content: Je te le dis en vérité, toi, aujourd’hui, cette nuit même, avant que le coq chante deux fois, tu me renieras trois fois.
  - type: text
    content: ' '
  '31':
  - type: note
    content: Jn 13:37.
  - type: text
    content: 'Mais Pierre reprit plus fortement: Quand il me faudrait mourir avec toi, je ne te renierai pas. Et tous dirent la même chose.'
  - type: heading
    content: Gethsémané
  - type: heading
    content: 'V. 32-42: cf. (Mt 26:36-46. Lu 22:40-46.)'
  '32':
  - type: text
    content: ' '
  - type: note
    content: Mt 26:36. Lu 22:39. Jn 18:1.
  - type: text
    content: 'Ils allèrent ensuite dans un lieu appelé Gethsémané, et Jésus dit à ses disciples: '
  - type: text
    content: Asseyez-vous ici, pendant que je prierai.
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'Il prit avec lui Pierre, Jacques et Jean, et il commença à éprouver de la frayeur et des angoisses. '
  '34':
  - type: text
    content: 'Il leur dit: '
  - type: note
    content: Jn 12:27.
  - type: text
    content: Mon âme est triste jusqu’à la mort; restez ici, et veillez.
  - type: text
    content: ' '
  '35':
  - type: note
    content: Lu 22:41.
  - type: text
    content: 'Puis, ayant fait quelques pas en avant, il se jeta contre terre, et pria que, s’il était possible, cette heure s’éloignât de lui. '
  '36':
  - type: text
    content: 'Il disait: '
  - type: text
    content: Abba, Père, toutes choses te sont possibles, éloigne de moi cette coupe!
  - type: text
    content: ' '
  - type: note
    content: Jn 6:38.
  - type: text
    content: Toutefois, non pas ce que je veux, mais ce que tu veux.
  - type: text
    content: ' '
  '37':
  - type: note
    content: Mt 26:40. Lu 22:45.
  - type: text
    content: 'Et il vint vers les disciples, qu’il trouva endormis, et il dit à Pierre: '
  - type: text
    content: Simon, tu dors! Tu n’as pu veiller une heure!
  '38':
  - type: text
    content: ' '
  - type: text
    content: Veillez et priez, afin que vous ne tombiez pas en tentation;
  - type: text
    content: ' '
  - type: note
    content: Ga 5:17.
  - type: text
    content: l’esprit est bien disposé, mais la chair est faible.
  - type: text
    content: ' '
  '39':
  - type: text
    content: 'Il s’éloigna de nouveau, et fit la même prière. '
  '4':
  - type: text
    content: 'Quelques-uns exprimèrent entre eux leur indignation: A quoi bon perdre ce parfum? '
  '40':
  - type: text
    content: 'Il revint, et les trouva encore endormis; car leurs yeux étaient appesantis. Ils ne surent que lui répondre. '
  '41':
  - type: text
    content: 'Il revint pour la troisième fois, et leur dit: '
  - type: text
    content: Dormez maintenant, et reposez-vous! C’est assez! L’heure est venue; voici, le Fils de l’homme est livré aux mains des pécheurs.
  '42':
  - type: text
    content: ' '
  - type: text
    content: Levez-vous, allons; voici, celui qui me livre s’approche.
  - type: heading
    content: Arrestation de Jésus
  - type: heading
    content: 'V. 43-52: cf. (Mt 26:47-56. Lu 22:47-53. Jn 18:2-12.)'
  '43':
  - type: text
    content: ' '
  - type: note
    content: Mt 26:47. Lu 22:47. Jn 18:3.
  - type: text
    content: 'Et aussitôt, comme il parlait encore, arriva Judas l’un des douze, et avec lui une foule armée d’épées et de bâtons, envoyée par les principaux sacrificateurs, par les scribes et par les anciens. '
  '44':
  - type: text
    content: 'Celui qui le livrait leur avait donné ce signe: Celui que je baiserai, c’est lui; saisissez-le, et emmenez-le sûrement. '
  '45':
  - type: text
    content: 'Dès qu’il fut arrivé, il s’approcha de Jésus, disant: Rabbi! '
  - type: note
    content: 2 S 20:9.
  - type: text
    content: 'Et il le baisa. '
  '46':
  - type: text
    content: 'Alors ces gens mirent la main sur Jésus, et le saisirent. '
  '47':
  - type: text
    content: 'Un de ceux qui étaient là, tirant l’épée, frappa le serviteur du souverain sacrificateur, et lui emporta l’oreille. '
  '48':
  - type: text
    content: 'Jésus, prenant la parole, leur dit: '
  - type: text
    content: Vous êtes venus, comme après un brigand, avec des épées et des bâtons, pour vous emparer de moi.
  '49':
  - type: text
    content: ' '
  - type: text
    content: J’étais tous les jours parmi vous, enseignant dans le temple, et vous ne m’avez pas saisi.
  - type: text
    content: ' '
  - type: note
    content: Ps 22:7; 69:10. Lu 24:25.
  - type: text
    content: Mais c’est afin que les Écritures soient accomplies.
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'On aurait pu le vendre plus de trois cents deniers, et les donner aux pauvres. Et ils s’irritaient contre cette femme. '
  '50':
  - type: note
    content: Job 19:13. Ps 88:9.
  - type: text
    content: 'Alors tous l’abandonnèrent, et prirent la fuite. '
  '51':
  - type: text
    content: 'Un jeune homme le suivait, n’ayant sur le corps qu’un drap. On se saisit de lui; '
  '52':
  - type: text
    content: mais il lâcha son vêtement, et se sauva tout nu.
  - type: heading
    content: Jésus devant le sanhédrin présidé par Caïphe. Condamnation
  - type: heading
    content: 'V. 53-65: cf. (Mt 26:57-68. Lu 22:54, 63-65. Jn 18:13-15, 19-24.)'
  '53':
  - type: text
    content: ' '
  - type: note
    content: Mt 26:57. Lu 22:54. Jn 18:13, 24.
  - type: text
    content: 'Ils emmenèrent Jésus chez le souverain sacrificateur, où s’assemblèrent tous les principaux sacrificateurs, les anciens et les scribes. '
  '54':
  - type: text
    content: 'Pierre le suivit de loin jusque dans l’intérieur de la cour du souverain sacrificateur; il s’assit avec les serviteurs, et il se chauffait près du feu. '
  '55':
  - type: note
    content: Mt 26:59. Ac 6:13.
  - type: text
    content: 'Les principaux sacrificateurs et tout le sanhédrin cherchaient un témoignage contre Jésus, pour le faire mourir, et ils n’en trouvaient point; '
  '56':
  - type: text
    content: 'car plusieurs rendaient de faux témoignages contre lui, mais les témoignages ne s’accordaient pas. '
  '57':
  - type: text
    content: 'Quelques-uns se levèrent, et portèrent un faux témoignage contre lui, disant: '
  '58':
  - type: text
    content: 'Nous l’avons entendu dire: '
  - type: note
    content: Mc 15:29. Jn 2:19.
  - type: text
    content: 'Je détruirai ce temple fait de main d’homme, et en trois jours j’en bâtirai un autre qui ne sera pas fait de main d’homme. '
  '59':
  - type: text
    content: 'Même sur ce point-là leur témoignage ne s’accordait pas. '
  '6':
  - type: text
    content: 'Mais Jésus dit: '
  - type: text
    content: Laissez-la. Pourquoi lui faites-vous de la peine? Elle a fait une bonne action à mon égard;
  '60':
  - type: note
    content: Mt 26:62.
  - type: text
    content: 'Alors le souverain sacrificateur, se levant au milieu de l’assemblée, interrogea Jésus, et dit: Ne réponds-tu rien? Qu’est-ce que ces gens déposent contre toi? '
  '61':
  - type: note
    content: És 53:7. Ac 8:32.
  - type: text
    content: 'Jésus garda le silence, et ne répondit rien. Le souverain sacrificateur l’interrogea de nouveau, et lui dit: Es-tu le Christ, le Fils du Dieu béni? '
  '62':
  - type: text
    content: 'Jésus répondit: '
  - type: text
    content: Je le suis.
  - type: text
    content: ' '
  - type: note
    content: Da 7:13. Mt 16:27; 24:30; 25:31. Lu 21:27. Ac 1:17. 1 Th 4:16. 2 Th 1:10. Ap 1:1.
  - type: text
    content: Et vous verrez le Fils de l’homme assis à la droite de la puissance de Dieu, et venant sur les nuées du ciel.
  - type: text
    content: ' '
  '63':
  - type: text
    content: 'Alors le souverain sacrificateur déchira ses vêtements, et dit: Qu’avons-nous encore besoin de témoins? '
  '64':
  - type: text
    content: 'Vous avez entendu le blasphème. Que vous en semble? Tous le condamnèrent comme méritant la mort. '
  '65':
  - type: text
    content: 'Et quelques-uns se mirent à cracher sur lui, à lui voiler le visage et '
  - type: note
    content: Job 16:10. És 50:6. Jn 19:3.
  - type: text
    content: 'à le frapper à coups de poing, en lui disant: Devine! Et les serviteurs le reçurent en lui donnant des soufflets.'
  - type: heading
    content: Reniement de Pierre
  - type: heading
    content: 'V. 66-72: cf. (Mt 26:69-75. Lu 22:55-62. Jn 18:15-18, 25-27.)'
  '66':
  - type: text
    content: ' '
  - type: note
    content: Mt 26:58, 69. Lu 22:55. Jn 18:16, 17.
  - type: text
    content: 'Pendant que Pierre était en bas dans la cour, il vint une des servantes du souverain sacrificateur. '
  '67':
  - type: text
    content: 'Voyant Pierre qui se chauffait, elle le regarda, et lui dit: Toi aussi, tu étais avec Jésus de Nazareth. '
  '68':
  - type: text
    content: 'Il le nia, disant: Je ne sais pas, je ne comprends pas ce que tu veux dire. Puis il sortit pour aller dans le vestibule. Et le coq chanta. '
  '69':
  - type: note
    content: Mt 26:71. Lu 22:58. Jn 18:25.
  - type: text
    content: 'La servante, l’ayant vu, se mit de nouveau à dire à ceux qui étaient présents: Celui-ci est de ces gens-là. Et il le nia de nouveau. '
  '7':
  - type: text
    content: ' '
  - type: note
    content: De 15:11.
  - type: text
    content: car vous avez toujours les pauvres avec vous, et vous pouvez leur faire du bien quand vous voulez, mais vous ne m’avez pas toujours.
  - type: text
    content: ' '
  '70':
  - type: text
    content: 'Peu après, ceux qui étaient présents dirent encore à Pierre: Certainement tu es de ces gens-là, car tu es Galiléen. '
  '71':
  - type: text
    content: 'Alors il commença à faire des imprécations et à jurer: Je ne connais pas cet homme dont vous parlez. '
  '72':
  - type: text
    content: 'Aussitôt, pour la seconde fois, le coq chanta. Et Pierre se souvint de la parole que Jésus lui avait dite: '
  - type: note
    content: Mt 26:34, 75. Lu 22:61. Jn 13:38; 18:27.
  - type: text
    content: Avant que le coq chante deux fois, tu me renieras trois fois. Et en y réfléchissant, il pleurait.
  '8':
  - type: text
    content: Elle a fait ce qu’elle a pu; elle a d’avance embaumé mon corps pour la sépulture.
  - type: text
    content: ' '
  '9':
  - type: text
    content: Je vous le dis en vérité, partout où la bonne nouvelle sera prêchée, dans le monde entier, on racontera aussi en mémoire de cette femme ce qu’elle a fait.
  - type: text
    content: ' '
