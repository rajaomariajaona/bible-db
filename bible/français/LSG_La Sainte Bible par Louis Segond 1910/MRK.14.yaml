    marker-yv: yv-n
  - type: text
    text: 'La servante, l’ayant vu, se mit de nouveau à dire à ceux qui étaient présents: Celui-ci est de ces gens-là. Et il le nia de nouveau. '
  - type: usfm
    marker: v
    metadata:
      v: '70'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '70'
  - type: text
    text: 'Peu après, ceux qui étaient présents dirent encore à Pierre: Certainement tu es de ces gens-là, car tu es Galiléen. '
  - type: usfm
    marker: v
    metadata:
      v: '71'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '71'
  - type: text
    text: 'Alors il commença à faire des imprécations et à jurer: Je ne connais pas cet homme dont vous parlez. '
  - type: usfm
    marker: v
    metadata:
      v: '72'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '72'
  - type: text
    text: 'Aussitôt, pour la seconde fois, le coq chanta. Et Pierre se souvint de la parole que Jésus lui avait dite: '
