document_id: MRK.14
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Histoire de la passion. Complot contre Jésus
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-2: cf. (Mt 26:1-5. Lu 22:1, 2.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 26:2
      metadata:
        usfm: MAT.26.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 22:1
      metadata:
        usfm: LUK.22.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 11:55
      metadata:
        usfm: JHN.11.55
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 13:1
      metadata:
        usfm: JHN.13.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'La fête de Pâque et des pains sans levain devait avoir lieu deux jours après. Les principaux sacrificateurs et les scribes cherchaient les moyens d’arrêter Jésus par ruse, et de le faire mourir. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Car ils disaient: Que ce ne soit pas pendant la fête, afin qu’il n’y ait pas de tumulte parmi le peuple.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Parfum répandu sur la tête de Jésus à Béthanie. Trahison de Judas
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 3-11: cf. (Mt 26:6-16. Jn 12:1-8. Lu 22:3-6). Lu 7:36-50.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 26:6
      metadata:
        usfm: MAT.26.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 7:37
      metadata:
        usfm: LUK.7.37
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 11:2
      metadata:
        usfm: JHN.11.2
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 12:3
      metadata:
        usfm: JHN.12.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Comme Jésus était à Béthanie, dans la maison de Simon le lépreux, une femme entra, pendant qu’il se trouvait à table. Elle tenait un vase d’albâtre, qui renfermait un parfum de nard pur de grand prix; et, ayant rompu le vase, elle répandit le parfum sur la tête de Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Quelques-uns exprimèrent entre eux leur indignation: A quoi bon perdre ce parfum? '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'On aurait pu le vendre plus de trois cents deniers, et les donner aux pauvres. Et ils s’irritaient contre cette femme. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Mais Jésus dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Laissez-la. Pourquoi lui faites-vous de la peine? Elle a fait une bonne action à mon égard;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 15:11
      metadata:
        usfm: DEU.15.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: car vous avez toujours les pauvres avec vous, et vous pouvez leur faire du bien quand vous voulez, mais vous ne m’avez pas toujours.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Elle a fait ce qu’elle a pu; elle a d’avance embaumé mon corps pour la sépulture.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je vous le dis en vérité, partout où la bonne nouvelle sera prêchée, dans le monde entier, on racontera aussi en mémoire de cette femme ce qu’elle a fait.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 26:14
      metadata:
        usfm: MAT.26.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 22:4
      metadata:
        usfm: LUK.22.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Judas Iscariot, l’un des douze, alla vers les principaux sacrificateurs, afin de leur livrer Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Après l’avoir entendu, ils furent dans la joie, et promirent de lui donner de l’argent. Et Judas cherchait une occasion favorable pour le livrer.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Célébration de la Pâque et institution de la sainte cène
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 12-21: cf. (Mt 26:17-25. Lu 22:7-18, 21-30.) Jn 13:1-30.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 26:17
      metadata:
        usfm: MAT.26.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 22:7
      metadata:
        usfm: LUK.22.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Le premier jour '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 12:17
      metadata:
        usfm: EXO.12.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'des pains sans levain, où l’on immolait la Pâque, les disciples de Jésus lui dirent: Où veux-tu que nous allions te préparer la Pâque? '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Et il envoya deux de ses disciples, et leur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Allez à la ville; vous rencontrerez un homme portant une cruche d’eau, suivez-le.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Quelque part qu’il entre, dites au maître de la maison: Le maître dit: Où est le lieu où je mangerai la Pâque avec mes disciples?'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Et il vous montrera une grande chambre haute, meublée et toute prête: c’est là que vous nous préparerez la Pâque.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Les disciples partirent, arrivèrent à la ville, et trouvèrent les choses comme il le leur avait dit; et ils préparèrent la Pâque. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 26:20
      metadata:
        usfm: MAT.26.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 22:14
      metadata:
        usfm: LUK.22.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Le soir étant venu, il arriva avec les douze. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Pendant qu’ils étaient à table et qu’ils mangeaient, Jésus dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je vous le dis en vérité,
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 41:10
      metadata:
        usfm: PSA.41.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 1:17
      metadata:
        usfm: ACT.1.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: l’un de vous, qui mange avec moi, me livrera.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ils commencèrent à s’attrister, et à lui dire, l’un après l’autre: Est-ce moi? '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Il leur répondit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: C’est l’un des douze, qui met avec moi la main dans le plat.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Le Fils de l’homme s’en va selon ce qui est écrit de lui. Mais malheur à l’homme par qui le Fils de l’homme est livré! Mieux vaudrait pour cet homme qu’il ne fût pas né.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 22-25: cf. (Mt 26:26-29. Lu 22:19, 20. 1 Co 11:23-25.) 1 Co 10:16, 17.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 26:26
      metadata:
        usfm: MAT.26.26
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 22:19
      metadata:
        usfm: LUK.22.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 11:23
      metadata:
        usfm: 1CO.11.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Pendant qu’ils mangeaient, Jésus prit du pain; et, après avoir rendu grâces, il le rompit, et le leur donna, en disant: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Prenez, ceci est mon corps.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Il prit ensuite une coupe; et, après avoir rendu grâces, il la leur donna, et ils en burent tous. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Et il leur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ceci est mon sang, le sang de l’alliance, qui est répandu pour plusieurs.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je vous le dis en vérité, je ne boirai plus jamais du fruit de la vigne, jusqu’au jour où je le boirai nouveau dans le royaume de Dieu.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 26-31: cf. (Mt 26:30-35. Lu 22:39. Jn 18:1.) (Lu 22:31-38. Jn 13:36-38.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Après avoir chanté les cantiques, ils se rendirent à la montagne des oliviers. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 26:31
      metadata:
        usfm: MAT.26.31
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 16:32
      metadata:
        usfm: JHN.16.32
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Jésus leur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Vous serez tous scandalisés; car il est écrit:'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Za 13:7
      metadata:
        usfm: ZEC.13.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je frapperai le berger, et les brebis seront dispersées.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 26:32
      metadata:
        usfm: MAT.26.32
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 28:10
      metadata:
        usfm: MAT.28.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 16:7
      metadata:
        usfm: MRK.16.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais, après que je serai ressuscité, je vous précéderai en Galilée.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Pierre lui dit: Quand tous seraient scandalisés, je ne serai pas scandalisé. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 26:34
      metadata:
        usfm: MAT.26.34
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 22:34
      metadata:
        usfm: LUK.22.34
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 13:38
      metadata:
        usfm: JHN.13.38
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Et Jésus lui dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je te le dis en vérité, toi, aujourd’hui, cette nuit même, avant que le coq chante deux fois, tu me renieras trois fois.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 13:37
      metadata:
        usfm: JHN.13.37
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Mais Pierre reprit plus fortement: Quand il me faudrait mourir avec toi, je ne te renierai pas. Et tous dirent la même chose.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Gethsémané
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 32-42: cf. (Mt 26:36-46. Lu 22:40-46.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 26:36
      metadata:
        usfm: MAT.26.36
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 22:39
      metadata:
        usfm: LUK.22.39
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 18:1
      metadata:
        usfm: JHN.18.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ils allèrent ensuite dans un lieu appelé Gethsémané, et Jésus dit à ses disciples: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Asseyez-vous ici, pendant que je prierai.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Il prit avec lui Pierre, Jacques et Jean, et il commença à éprouver de la frayeur et des angoisses. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Il leur dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 12:27
      metadata:
        usfm: JHN.12.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mon âme est triste jusqu’à la mort; restez ici, et veillez.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 22:41
      metadata:
        usfm: LUK.22.41
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Puis, ayant fait quelques pas en avant, il se jeta contre terre, et pria que, s’il était possible, cette heure s’éloignât de lui. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Il disait: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Abba, Père, toutes choses te sont possibles, éloigne de moi cette coupe!
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 6:38
      metadata:
        usfm: JHN.6.38
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Toutefois, non pas ce que je veux, mais ce que tu veux.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 26:40
      metadata:
        usfm: MAT.26.40
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 22:45
      metadata:
        usfm: LUK.22.45
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Et il vint vers les disciples, qu’il trouva endormis, et il dit à Pierre: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Simon, tu dors! Tu n’as pu veiller une heure!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Veillez et priez, afin que vous ne tombiez pas en tentation;
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 5:17
      metadata:
        usfm: GAL.5.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: l’esprit est bien disposé, mais la chair est faible.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Il s’éloigna de nouveau, et fit la même prière. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Il revint, et les trouva encore endormis; car leurs yeux étaient appesantis. Ils ne surent que lui répondre. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Il revint pour la troisième fois, et leur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Dormez maintenant, et reposez-vous! C’est assez! L’heure est venue; voici, le Fils de l’homme est livré aux mains des pécheurs.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Levez-vous, allons; voici, celui qui me livre s’approche.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Arrestation de Jésus
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 43-52: cf. (Mt 26:47-56. Lu 22:47-53. Jn 18:2-12.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' '
  - type: usfm
