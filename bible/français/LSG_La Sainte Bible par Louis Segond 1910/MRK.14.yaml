      metadata:
        usfm: JHN.18.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Et aussitôt, comme il parlait encore, arriva Judas l’un des douze, et avec lui une foule armée d’épées et de bâtons, envoyée par les principaux sacrificateurs, par les scribes et par les anciens. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Celui qui le livrait leur avait donné ce signe: Celui que je baiserai, c’est lui; saisissez-le, et emmenez-le sûrement. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Dès qu’il fut arrivé, il s’approcha de Jésus, disant: Rabbi! '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 S 20:9
      metadata:
        usfm: 2SA.20.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Et il le baisa. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Alors ces gens mirent la main sur Jésus, et le saisirent. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Un de ceux qui étaient là, tirant l’épée, frappa le serviteur du souverain sacrificateur, et lui emporta l’oreille. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Jésus, prenant la parole, leur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Vous êtes venus, comme après un brigand, avec des épées et des bâtons, pour vous emparer de moi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: J’étais tous les jours parmi vous, enseignant dans le temple, et vous ne m’avez pas saisi.
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 22:7
      metadata:
        usfm: PSA.22.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 69:10
      metadata:
        usfm: PSA.69.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 24:25
      metadata:
        usfm: LUK.24.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais c’est afin que les Écritures soient accomplies.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 19:13
      metadata:
        usfm: JOB.19.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 88:9
      metadata:
        usfm: PSA.88.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Alors tous l’abandonnèrent, et prirent la fuite. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Un jeune homme le suivait, n’ayant sur le corps qu’un drap. On se saisit de lui; '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: mais il lâcha son vêtement, et se sauva tout nu.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus devant le sanhédrin présidé par Caïphe. Condamnation
  marker-yv: yv-h
- type: usfm
