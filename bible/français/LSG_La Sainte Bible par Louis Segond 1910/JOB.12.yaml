document_id: JOB.12,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Réponse de Job à Tsophar
  - type: heading
    content: 'V. 1-12: cf. (Job 13:1-5. Ps 123:3, 4.) (Ps 19:2-5. Ro 1:19, 20.)'
  - type: text
    content: 'Job prit la parole et dit:'
  '10':
  - type: text
    content: Il tient dans sa main l’âme de tout ce qui vit,
  - type: text
    content: Le souffle de toute chair d’homme.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Job 6:30; 34:3.
  - type: text
    content: L’oreille ne discerne-t-elle pas les paroles,
  - type: text
    content: Comme le palais savoure les aliments?
  '12':
  - type: text
    content: Dans les vieillards se trouve la sagesse,
  - type: text
    content: Et dans une longue vie l’intelligence.
  - type: heading
    content: 'V. 13-25: cf. Job 9:4-13; 5:9-16; 42:2.'
  '13':
  - type: text
    content: En Dieu résident la sagesse et la puissance.
  - type: text
    content: Le conseil et l’intelligence lui appartiennent.
  '14':
  - type: text
    content: Ce qu’il renverse ne sera point rebâti,
  - type: note
    content: Job 9:12; 11:10. Ap 3:7.
  - type: text
    content: Celui qu’il enferme ne sera point délivré.
  '15':
  - type: text
    content: Il retient les eaux et tout se dessèche;
  - type: text
    content: Il les lâche, et la terre en est dévastée.
  '16':
  - type: text
    content: Il possède la force et la prudence;
  - type: text
    content: Il maîtrise celui qui s’égare ou fait égarer les autres.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 2 S 15:31; 17:14, 23. És 19:12; 29:14. 1 Co 1:19.
  - type: text
    content: Il emmène captifs les conseillers;
  - type: note
    content: 2 S 15:31.
  - type: text
    content: Il trouble la raison des juges.
  '18':
  - type: text
    content: Il délie la ceinture des rois,
  - type: text
    content: Il met une corde autour de leurs reins.
  '19':
  - type: text
    content: Il emmène captifs les sacrificateurs;
  - type: text
    content: Il fait tomber les puissants.
  '2':
  - type: text
    content: On dirait, en vérité, que le genre humain c’est vous,
  - type: text
    content: Et qu’avec vous doit mourir la sagesse.
  '20':
  - type: text
    content: ' '
  - type: note
    content: Job 32:9. És 3:2, 3.
  - type: text
    content: Il ôte la parole à ceux qui ont de l’assurance;
  - type: text
    content: Il prive de jugement les vieillards.
  '21':
  - type: text
    content: ' '
  - type: note
    content: Ps 107:40.
  - type: text
    content: Il verse le mépris sur les grands;
  - type: text
    content: Il relâche la ceinture des forts.
  '22':
  - type: text
    content: Il met à découvert ce qui est caché dans les ténèbres,
  - type: note
    content: Mt 10:26. 1 Co 4:5.
  - type: text
    content: Il produit à la lumière l’ombre de la mort.
  '23':
  - type: text
    content: ' '
  - type: note
    content: Ps 107:38.
  - type: text
    content: Il donne de l’accroissement aux nations, et il les anéantit;
  - type: text
    content: Il les étend au loin, et il les ramène dans leurs limites.
  '24':
  - type: text
    content: Il enlève l’intelligence aux chefs des peuples,
  - type: note
    content: Ps 107:4, 40.
  - type: text
    content: Il les fait errer dans les déserts sans chemin;
  '25':
  - type: text
    content: Ils tâtonnent dans les ténèbres, et ne voient pas clair;
  - type: text
    content: Il les fait errer comme des gens ivres.
  '3':
  - type: text
    content: J’ai tout aussi bien que vous de l’intelligence, moi,
  - type: text
    content: Je ne vous suis point inférieur;
  - type: text
    content: Et qui ne sait les choses que vous dites?
  '4':
  - type: text
    content: ' '
  - type: note
    content: Job 16:10; 17:2; 21:3; 30:1.
  - type: text
    content: Je suis pour mes amis un objet de raillerie,
  - type: text
    content: Quand j’implore le secours de Dieu;
  - type: note
    content: Pr 14:2.
  - type: text
    content: Le juste, l’innocent, un objet de raillerie!
  '5':
  - type: text
    content: Au malheur le mépris! C’est la devise des heureux;
  - type: text
    content: A celui dont le pied chancelle est réservé le mépris.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Job 21:7. Ps 73:11, 12. Jé 12:1. Ha 1:3, 4.
  - type: text
    content: Il y a paix sous la tente des pillards,
  - type: text
    content: Sécurité pour ceux qui offensent Dieu,
  - type: text
    content: Pour quiconque se fait un dieu de sa force.
  '7':
  - type: text
    content: Interroge les bêtes, elles t’instruiront,
  - type: text
    content: Les oiseaux du ciel, ils te l’apprendront;
  '8':
  - type: text
    content: Parle à la terre, elle t’instruira;
  - type: text
    content: Et les poissons de la mer te le raconteront.
  '9':
  - type: text
    content: Qui ne reconnaît chez eux la preuve
  - type: text
    content: Que la main de l’Éternel a fait toutes choses?
