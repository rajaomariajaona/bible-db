document_id: JOB.12
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Réponse de Job à Tsophar
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-12: cf. (Job 13:1-5. Ps 123:3, 4.) (Ps 19:2-5. Ro 1:19, 20.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Job prit la parole et dit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: On dirait, en vérité, que le genre humain c’est vous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qu’avec vous doit mourir la sagesse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: J’ai tout aussi bien que vous de l’intelligence, moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je ne vous suis point inférieur;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui ne sait les choses que vous dites?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 16:10
      metadata:
        usfm: JOB.16.10
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 17:2
      metadata:
        usfm: JOB.17.2
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 21:3
      metadata:
        usfm: JOB.21.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 30:1
      metadata:
        usfm: JOB.30.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Je suis pour mes amis un objet de raillerie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand j’implore le secours de Dieu;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 14:2
      metadata:
        usfm: PRO.14.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Le juste, l’innocent, un objet de raillerie!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Au malheur le mépris! C’est la devise des heureux;
- type: usfm
  marker: q1
  children:
  - type: text
    text: A celui dont le pied chancelle est réservé le mépris.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 21:7
      metadata:
        usfm: JOB.21.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 73:11
      metadata:
        usfm: PSA.73.11
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '12'
      metadata:
        usfm: PSA.73.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 12:1
      metadata:
        usfm: JER.12.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ha 1:3
      metadata:
        usfm: HAB.1.3
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '4'
      metadata:
        usfm: HAB.1.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il y a paix sous la tente des pillards,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sécurité pour ceux qui offensent Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour quiconque se fait un dieu de sa force.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Interroge les bêtes, elles t’instruiront,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les oiseaux du ciel, ils te l’apprendront;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Parle à la terre, elle t’instruira;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les poissons de la mer te le raconteront.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Qui ne reconnaît chez eux la preuve
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que la main de l’Éternel a fait toutes choses?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Il tient dans sa main l’âme de tout ce qui vit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le souffle de toute chair d’homme.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 6:30
      metadata:
        usfm: JOB.6.30
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 34:3
      metadata:
        usfm: JOB.34.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: L’oreille ne discerne-t-elle pas les paroles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme le palais savoure les aliments?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Dans les vieillards se trouve la sagesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et dans une longue vie l’intelligence.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 13-25: cf. Job 9:4-13; 5:9-16; 42:2.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: En Dieu résident la sagesse et la puissance.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le conseil et l’intelligence lui appartiennent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ce qu’il renverse ne sera point rebâti,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 9:12
      metadata:
        usfm: JOB.9.12
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 11:10
      metadata:
        usfm: JOB.11.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 3:7
      metadata:
        usfm: REV.3.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Celui qu’il enferme ne sera point délivré.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Il retient les eaux et tout se dessèche;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il les lâche, et la terre en est dévastée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Il possède la force et la prudence;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il maîtrise celui qui s’égare ou fait égarer les autres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 S 15:31
      metadata:
        usfm: 2SA.15.31
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 17:14
      metadata:
        usfm: 2SA.17.14
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '23'
      metadata:
        usfm: 2SA.17.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 19:12
      metadata:
        usfm: ISA.19.12
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 29:14
      metadata:
        usfm: ISA.29.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 1:19
      metadata:
        usfm: 1CO.1.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il emmène captifs les conseillers;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 S 15:31
      metadata:
        usfm: 2SA.15.31
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il trouble la raison des juges.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Il délie la ceinture des rois,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il met une corde autour de leurs reins.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Il emmène captifs les sacrificateurs;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il fait tomber les puissants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 32:9
      metadata:
        usfm: JOB.32.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 3:2
      metadata:
        usfm: ISA.3.2
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '3'
      metadata:
        usfm: ISA.3.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il ôte la parole à ceux qui ont de l’assurance;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il prive de jugement les vieillards.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 107:40
      metadata:
        usfm: PSA.107.40
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il verse le mépris sur les grands;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il relâche la ceinture des forts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Il met à découvert ce qui est caché dans les ténèbres,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 10:26
      metadata:
        usfm: MAT.10.26
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 4:5
      metadata:
        usfm: 1CO.4.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il produit à la lumière l’ombre de la mort.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 107:38
      metadata:
        usfm: PSA.107.38
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il donne de l’accroissement aux nations, et il les anéantit;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il les étend au loin, et il les ramène dans leurs limites.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Il enlève l’intelligence aux chefs des peuples,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 107:4
      metadata:
        usfm: PSA.107.4
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '40'
      metadata:
        usfm: PSA.107.40
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il les fait errer dans les déserts sans chemin;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ils tâtonnent dans les ténèbres, et ne voient pas clair;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il les fait errer comme des gens ivres.
