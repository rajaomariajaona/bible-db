document_id: LUK.23
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus devant Pilate, gouverneur romain
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-5: cf. (Mt 27:2, 11-14. Mc 15:2-5. Jn 18:28-38.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 27:2
      metadata:
        usfm: MAT.27.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 15:1
      metadata:
        usfm: MRK.15.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 18:28
      metadata:
        usfm: JHN.18.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ils se levèrent tous, et ils conduisirent Jésus devant Pilate. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ils se mirent à l’accuser, disant: Nous avons trouvé cet homme excitant notre nation à la révolte, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 17:25
      metadata:
        usfm: MAT.17.25
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 22:21
      metadata:
        usfm: MAT.22.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 12:17
      metadata:
        usfm: MRK.12.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 20:25
      metadata:
        usfm: LUK.20.25
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 13:7
      metadata:
        usfm: ROM.13.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'empêchant de payer le tribut à César, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 17:7
      metadata:
        usfm: ACT.17.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'se disant lui-même Christ, roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 27:11
      metadata:
        usfm: MAT.27.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 15:2
      metadata:
        usfm: MRK.15.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 18:33
      metadata:
        usfm: JHN.18.33
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Pilate l’interrogea, en ces termes: Es-tu le roi des Juifs? Jésus lui répondit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Tu le dis.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Pilate dit aux principaux sacrificateurs et à la foule: Je ne trouve rien de coupable en cet homme. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mais ils insistèrent, et dirent: Il soulève le peuple, en enseignant par toute la Judée, depuis la Galilée, où il a commencé, jusqu’ici.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus devant Hérode. Jésus renvoyé par Hérode à Pilate
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 6-12: cf. Ps 2:1-3. Ac 4:25-28.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Quand Pilate entendit parler de la Galilée, il demanda si cet homme était Galiléen; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 3:1
      metadata:
        usfm: LUK.3.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et, ayant appris qu’il était de la juridiction d’Hérode, il le renvoya à Hérode, qui se trouvait aussi à Jérusalem en ces jours-là. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 9:7
      metadata:
        usfm: LUK.9.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Lorsque Hérode vit Jésus, il en eut une grande joie; car depuis longtemps, il désirait le voir, à cause de ce qu’il avait entendu dire de lui, et il espérait qu’il le verrait faire quelque miracle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il lui adressa beaucoup de questions; mais Jésus ne lui répondit rien. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Les principaux sacrificateurs et les scribes étaient là, et l’accusaient avec violence. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Hérode, avec ses gardes, le traita avec mépris; et, après s’être moqué de lui et l’avoir revêtu d’un habit éclatant, il le renvoya à Pilate. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 4:27
      metadata:
        usfm: ACT.4.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ce jour même, Pilate et Hérode devinrent amis, d’ennemis qu’ils étaient auparavant.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sentence de mort confirmée
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 13-25: cf. (Mt 27:15-30. Mc 15:6-19. Jn 18:39 à 19:16.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 27:23
      metadata:
        usfm: MAT.27.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 15:14
      metadata:
        usfm: MRK.15.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 18:38
      metadata:
        usfm: JHN.18.38
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 19:4
      metadata:
        usfm: JHN.19.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Pilate, ayant assemblé les principaux sacrificateurs, les magistrats, et le peuple, leur dit: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Vous m’avez amené cet homme comme excitant le peuple à la révolte. Et voici, je l’ai interrogé devant vous, et je ne l’ai trouvé coupable d’aucune des choses dont vous l’accusez; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Hérode non plus, car il nous l’a renvoyé, et voici, cet homme n’a rien fait qui soit digne de mort. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Je le relâcherai donc, après l’avoir fait battre de verges. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 27:15
      metadata:
        usfm: MAT.27.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 15:6
      metadata:
        usfm: MRK.15.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 18:39
      metadata:
        usfm: JHN.18.39
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'A chaque fête, il était obligé de leur relâcher un prisonnier. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ils s’écrièrent tous ensemble: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 3:14
      metadata:
        usfm: ACT.3.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Fais mourir celui-ci, et relâche-nous Barabbas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Cet homme avait été mis en prison pour une sédition qui avait eu lieu dans la ville, et pour un meurtre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Pilate leur parla de nouveau, dans l’intention de relâcher Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Et ils crièrent: Crucifie, crucifie-le! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Pilate leur dit pour la troisième fois: Quel mal a-t-il fait? Je n’ai rien trouvé en lui qui mérite la mort. Je le relâcherai donc, après l’avoir fait battre de verges. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Mais ils insistèrent à grands cris, demandant qu’il fût crucifié. Et leurs cris l’emportèrent: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 27:26
      metadata:
        usfm: MAT.27.26
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 15:15
      metadata:
        usfm: MRK.15.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 19:16
      metadata:
        usfm: JHN.19.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Pilate prononça que ce qu’ils demandaient serait fait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Il relâcha celui qui avait été mis en prison pour sédition et pour meurtre, et qu’ils réclamaient; et il livra Jésus à leur volonté.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus crucifié
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 26-34: cf. (Mt 27:31-38. Mc 15:20-28. Jn 19:16-24.) Ga 3:13.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 27:32
      metadata:
        usfm: MAT.27.32
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 15:21
      metadata:
        usfm: MRK.15.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Comme ils l’emmenaient, ils prirent un certain Simon de Cyrène, qui revenait des champs, et ils le chargèrent de la croix, pour qu’il la porte derrière Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Il était suivi d’une grande multitude des gens du peuple, et de femmes qui se frappaient la poitrine et se lamentaient sur lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Jésus se tourna vers elles, et dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Filles de Jérusalem, ne pleurez pas sur moi; mais pleurez sur vous et sur vos enfants.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Car voici, des jours viendront où l’on dira: Heureuses les stériles, heureuses les entrailles qui n’ont point enfanté, et les mamelles qui n’ont point allaité!'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Alors ils se mettront à dire aux montagnes:'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 2:19
      metadata:
        usfm: ISA.2.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Os 10:8
      metadata:
        usfm: HOS.10.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 6:16
      metadata:
        usfm: REV.6.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 9:6
      metadata:
        usfm: REV.9.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Tombez sur nous! Et aux collines: Couvrez-nous!'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 25:29
      metadata:
        usfm: JER.25.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 4:17
      metadata:
        usfm: 1PE.4.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Car, si l’on fait ces choses au bois vert, qu’arrivera-t-il au bois sec?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 19:18
      metadata:
        usfm: JHN.19.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'On conduisait en même temps deux malfaiteurs, qui devaient être mis à mort avec Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 27:33
      metadata:
        usfm: MAT.27.33
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '38'
      metadata:
        usfm: MAT.27.38
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 15:22
      metadata:
        usfm: MRK.15.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 19:18
      metadata:
        usfm: JHN.19.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Lorsqu’ils furent arrivés au lieu appelé Crâne, ils le crucifièrent là, ainsi que les deux malfaiteurs, l’un à droite, l’autre à gauche. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Jésus dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 7:60
      metadata:
        usfm: ACT.7.60
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 4:12
      metadata:
        usfm: 1CO.4.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Père, pardonne-leur, car ils ne savent ce qu’ils font.
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 22:19
      metadata:
        usfm: PSA.22.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 27:35
      metadata:
        usfm: MAT.27.35
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 15:24
      metadata:
        usfm: MRK.15.24
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 19:23
      metadata:
        usfm: JHN.19.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ils se partagèrent ses vêtements, en tirant au sort.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 35-43: cf. (Mt 27:39-44. Mc 15:29-32. Jn 19:25-27.) Ps 22:7-18.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Le peuple se tenait là, et regardait. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 27:39
      metadata:
        usfm: MAT.27.39
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 15:29
      metadata:
        usfm: MRK.15.29
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Les magistrats se moquaient de Jésus, disant: Il a sauvé les autres; qu’il se sauve lui-même, s’il est le Christ, l’élu de Dieu! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Les soldats aussi se moquaient de lui; s’approchant et lui présentant du vinaigre, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'ils disaient: Si tu es le roi des Juifs, sauve-toi toi-même! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 27:37
      metadata:
        usfm: MAT.27.37
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 15:26
      metadata:
        usfm: MRK.15.26
    - type: text
      text: '. '
    - type: usfm
      marker: ref
