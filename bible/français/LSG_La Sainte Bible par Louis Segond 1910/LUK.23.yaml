        text: Mc 15:38
      metadata:
        usfm: MRK.15.38
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et le voile du temple se déchira par le milieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Jésus s’écria d’une voix forte: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 31:6
      metadata:
        usfm: PSA.31.6
    - type: text
      text: '. '
    - type: usfm
