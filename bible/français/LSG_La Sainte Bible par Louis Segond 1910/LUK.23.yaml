    marker-yv: yv-n
  - type: text
    text: 'Il y avait au-dessus de lui cette inscription: Celui-ci est le roi des Juifs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'L’un des malfaiteurs crucifiés l’injuriait, disant: N’es-tu pas le Christ? Sauve-toi toi-même, et sauve-nous! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Mais l’autre le reprenait, et disait: Ne crains-tu pas Dieu, toi qui subis la même condamnation? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Pour nous, c’est justice, car nous recevons ce qu’ont mérité nos crimes; mais celui-ci n’a rien fait de mal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Et il dit à Jésus: Souviens-toi de moi, quand tu viendras dans ton règne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Jésus lui répondit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je te le dis en vérité, aujourd’hui tu seras avec moi dans le paradis.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 44-49: cf. (Mt 27:47-56. Mc 15:33-41. Jn 19:28-37.) És 53:5-12. Jn 1:29. Ro 5:6-8. 1 Pi 2:24. Ap 1:5.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
