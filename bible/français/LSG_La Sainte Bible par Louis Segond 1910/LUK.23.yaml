  - type: text
    text: 'Il y avait un conseiller, nommé Joseph, homme bon et juste, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'qui n’avait point participé à la décision et aux actes des autres; il était d’Arimathée, ville des Juifs, et il attendait le royaume de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Cet homme se rendit vers Pilate, et demanda le corps de Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Il le descendit de la croix, l’enveloppa d’un linceul, '
  - type: usfm
    marker: x
    children:
