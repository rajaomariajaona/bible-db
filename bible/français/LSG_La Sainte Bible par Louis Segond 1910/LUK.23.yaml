  - type: usfm
    marker: wj
    children:
    - type: text
      text: Père, je remets mon esprit entre tes mains.
  - type: text
    text: ' Et, en disant ces paroles, il expira. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: usfm
    marker: x
    children:
    - type: usfm
