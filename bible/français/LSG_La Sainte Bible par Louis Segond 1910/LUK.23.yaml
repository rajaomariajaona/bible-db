document_id: LUK.23,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus devant Pilate, gouverneur romain
  - type: heading
    content: 'V. 1-5: cf. (Mt 27:2, 11-14. Mc 15:2-5. Jn 18:28-38.)'
  - type: text
    content: ' '
  - type: note
    content: Mt 27:2. Mc 15:1. Jn 18:28.
  - type: text
    content: 'Ils se levèrent tous, et ils conduisirent Jésus devant Pilate. '
  '10':
  - type: text
    content: 'Les principaux sacrificateurs et les scribes étaient là, et l’accusaient avec violence. '
  '11':
  - type: text
    content: 'Hérode, avec ses gardes, le traita avec mépris; et, après s’être moqué de lui et l’avoir revêtu d’un habit éclatant, il le renvoya à Pilate. '
  '12':
  - type: note
    content: Ac 4:27.
  - type: text
    content: Ce jour même, Pilate et Hérode devinrent amis, d’ennemis qu’ils étaient auparavant.
  - type: heading
    content: Sentence de mort confirmée
  - type: heading
    content: 'V. 13-25: cf. (Mt 27:15-30. Mc 15:6-19. Jn 18:39 à 19:16.)'
  '13':
  - type: text
    content: ' '
  - type: note
    content: Mt 27:23. Mc 15:14. Jn 18:38; 19:4.
  - type: text
    content: 'Pilate, ayant assemblé les principaux sacrificateurs, les magistrats, et le peuple, leur dit: '
  '14':
  - type: text
    content: 'Vous m’avez amené cet homme comme excitant le peuple à la révolte. Et voici, je l’ai interrogé devant vous, et je ne l’ai trouvé coupable d’aucune des choses dont vous l’accusez; '
  '15':
  - type: text
    content: 'Hérode non plus, car il nous l’a renvoyé, et voici, cet homme n’a rien fait qui soit digne de mort. '
  '16':
  - type: text
    content: 'Je le relâcherai donc, après l’avoir fait battre de verges. '
  '17':
  - type: note
    content: Mt 27:15. Mc 15:6. Jn 18:39.
  - type: text
    content: 'A chaque fête, il était obligé de leur relâcher un prisonnier. '
  '18':
  - type: text
    content: 'Ils s’écrièrent tous ensemble: '
  - type: note
    content: Ac 3:14.
  - type: text
    content: 'Fais mourir celui-ci, et relâche-nous Barabbas. '
  '19':
  - type: text
    content: 'Cet homme avait été mis en prison pour une sédition qui avait eu lieu dans la ville, et pour un meurtre. '
  '2':
  - type: text
    content: 'Ils se mirent à l’accuser, disant: Nous avons trouvé cet homme excitant notre nation à la révolte, '
  - type: note
    content: Mt 17:25; 22:21. Mc 12:17. Lu 20:25. Ro 13:7.
  - type: text
    content: 'empêchant de payer le tribut à César, et '
  - type: note
    content: Ac 17:7.
  - type: text
    content: 'se disant lui-même Christ, roi. '
  '20':
  - type: text
    content: 'Pilate leur parla de nouveau, dans l’intention de relâcher Jésus. '
  '21':
  - type: text
    content: 'Et ils crièrent: Crucifie, crucifie-le! '
  '22':
  - type: text
    content: 'Pilate leur dit pour la troisième fois: Quel mal a-t-il fait? Je n’ai rien trouvé en lui qui mérite la mort. Je le relâcherai donc, après l’avoir fait battre de verges. '
  '23':
  - type: text
    content: 'Mais ils insistèrent à grands cris, demandant qu’il fût crucifié. Et leurs cris l’emportèrent: '
  '24':
  - type: note
    content: Mt 27:26. Mc 15:15. Jn 19:16.
  - type: text
    content: 'Pilate prononça que ce qu’ils demandaient serait fait. '
  '25':
  - type: text
    content: Il relâcha celui qui avait été mis en prison pour sédition et pour meurtre, et qu’ils réclamaient; et il livra Jésus à leur volonté.
  - type: heading
    content: Jésus crucifié
  - type: heading
    content: 'V. 26-34: cf. (Mt 27:31-38. Mc 15:20-28. Jn 19:16-24.) Ga 3:13.'
  '26':
  - type: text
    content: ' '
  - type: note
    content: Mt 27:32. Mc 15:21.
  - type: text
    content: 'Comme ils l’emmenaient, ils prirent un certain Simon de Cyrène, qui revenait des champs, et ils le chargèrent de la croix, pour qu’il la porte derrière Jésus. '
  '27':
  - type: text
    content: 'Il était suivi d’une grande multitude des gens du peuple, et de femmes qui se frappaient la poitrine et se lamentaient sur lui. '
  '28':
  - type: text
    content: 'Jésus se tourna vers elles, et dit: '
  - type: text
    content: Filles de Jérusalem, ne pleurez pas sur moi; mais pleurez sur vous et sur vos enfants.
  '29':
  - type: text
    content: ' '
  - type: text
    content: 'Car voici, des jours viendront où l’on dira: Heureuses les stériles, heureuses les entrailles qui n’ont point enfanté, et les mamelles qui n’ont point allaité!'
  - type: text
    content: ' '
  '3':
  - type: note
    content: Mt 27:11. Mc 15:2. Jn 18:33.
  - type: text
    content: 'Pilate l’interrogea, en ces termes: Es-tu le roi des Juifs? Jésus lui répondit: '
  - type: text
    content: Tu le dis.
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'Alors ils se mettront à dire aux montagnes:'
  - type: text
    content: ' '
  - type: note
    content: És 2:19. Os 10:8. Ap 6:16; 9:6.
  - type: text
    content: 'Tombez sur nous! Et aux collines: Couvrez-nous!'
  - type: text
    content: ' '
  '31':
  - type: note
    content: Jé 25:29. 1 Pi 4:17.
  - type: text
    content: Car, si l’on fait ces choses au bois vert, qu’arrivera-t-il au bois sec?
  - type: text
    content: ' '
  '32':
  - type: note
    content: Jn 19:18.
  - type: text
    content: 'On conduisait en même temps deux malfaiteurs, qui devaient être mis à mort avec Jésus. '
  '33':
  - type: note
    content: Mt 27:33, 38. Mc 15:22. Jn 19:18.
  - type: text
    content: 'Lorsqu’ils furent arrivés au lieu appelé Crâne, ils le crucifièrent là, ainsi que les deux malfaiteurs, l’un à droite, l’autre à gauche. '
  '34':
  - type: text
    content: 'Jésus dit: '
  - type: note
    content: Ac 7:60. 1 Co 4:12.
  - type: text
    content: Père, pardonne-leur, car ils ne savent ce qu’ils font.
  - type: text
    content: ' '
  - type: note
    content: Ps 22:19. Mt 27:35. Mc 15:24. Jn 19:23.
  - type: text
    content: Ils se partagèrent ses vêtements, en tirant au sort.
  - type: heading
    content: 'V. 35-43: cf. (Mt 27:39-44. Mc 15:29-32. Jn 19:25-27.) Ps 22:7-18.'
  '35':
  - type: text
    content: 'Le peuple se tenait là, et regardait. '
  - type: note
    content: Mt 27:39. Mc 15:29.
  - type: text
    content: 'Les magistrats se moquaient de Jésus, disant: Il a sauvé les autres; qu’il se sauve lui-même, s’il est le Christ, l’élu de Dieu! '
  '36':
  - type: text
    content: 'Les soldats aussi se moquaient de lui; s’approchant et lui présentant du vinaigre, '
  '37':
  - type: text
    content: 'ils disaient: Si tu es le roi des Juifs, sauve-toi toi-même! '
  '38':
  - type: note
    content: Mt 27:37. Mc 15:26. Jn 19:19.
  - type: text
    content: 'Il y avait au-dessus de lui cette inscription: Celui-ci est le roi des Juifs. '
  '39':
  - type: text
    content: 'L’un des malfaiteurs crucifiés l’injuriait, disant: N’es-tu pas le Christ? Sauve-toi toi-même, et sauve-nous! '
  '4':
  - type: text
    content: 'Pilate dit aux principaux sacrificateurs et à la foule: Je ne trouve rien de coupable en cet homme. '
  '40':
  - type: text
    content: 'Mais l’autre le reprenait, et disait: Ne crains-tu pas Dieu, toi qui subis la même condamnation? '
  '41':
  - type: text
    content: 'Pour nous, c’est justice, car nous recevons ce qu’ont mérité nos crimes; mais celui-ci n’a rien fait de mal. '
  '42':
  - type: text
    content: 'Et il dit à Jésus: Souviens-toi de moi, quand tu viendras dans ton règne. '
  '43':
  - type: text
    content: 'Jésus lui répondit: '
  - type: text
    content: Je te le dis en vérité, aujourd’hui tu seras avec moi dans le paradis.
  - type: heading
    content: 'V. 44-49: cf. (Mt 27:47-56. Mc 15:33-41. Jn 19:28-37.) És 53:5-12. Jn 1:29. Ro 5:6-8. 1 Pi 2:24. Ap 1:5.'
  '44':
  - type: text
    content: ' '
  - type: note
    content: Mt 27:45. Mc 15:33.
  - type: text
    content: 'Il était déjà environ la sixième heure, et il y eut des ténèbres sur toute la terre, jusqu’à la neuvième heure. '
  '45':
  - type: text
    content: 'Le soleil s’obscurcit, '
  - type: note
    content: Mt 27:51. Mc 15:38.
  - type: text
    content: 'et le voile du temple se déchira par le milieu. '
  '46':
  - type: text
    content: 'Jésus s’écria d’une voix forte: '
  - type: note
    content: Ps 31:6. Mt 27:50. Mc 15:37. Jn 19:30. Ac 7:59.
  - type: text
    content: Père, je remets mon esprit entre tes mains.
  - type: text
    content: ' Et, en disant ces paroles, il expira. '
  '47':
  - type: note
    content: Mt 27:54. Mc 15:39.
  - type: text
    content: 'Le centenier, voyant ce qui était arrivé, glorifia Dieu, et dit: Certainement, cet homme était juste. '
  '48':
  - type: text
    content: 'Et tous ceux qui assistaient en foule à ce spectacle, après avoir vu ce qui était arrivé, s’en retournèrent, se frappant la poitrine. '
  '49':
  - type: text
    content: Tous ceux de la connaissance de Jésus, et les femmes qui l’avaient accompagné depuis la Galilée, se tenaient dans l’éloignement et regardaient ce qui se passait.
  - type: heading
    content: Le corps de Jésus mis dans un sépulcre
  - type: heading
    content: 'V. 50-56: cf. (Mt 27:57-61. Mc 15:42-47. Jn 19:38-42.)'
  '5':
  - type: text
    content: 'Mais ils insistèrent, et dirent: Il soulève le peuple, en enseignant par toute la Judée, depuis la Galilée, où il a commencé, jusqu’ici.'
  - type: heading
    content: Jésus devant Hérode. Jésus renvoyé par Hérode à Pilate
  - type: heading
    content: 'V. 6-12: cf. Ps 2:1-3. Ac 4:25-28.'
  '50':
  - type: text
    content: ' '
  - type: note
    content: Mt 27:57. Mc 15:43. Jn 19:38.
  - type: text
    content: 'Il y avait un conseiller, nommé Joseph, homme bon et juste, '
  '51':
  - type: text
    content: 'qui n’avait point participé à la décision et aux actes des autres; il était d’Arimathée, ville des Juifs, et il attendait le royaume de Dieu. '
  '52':
  - type: text
    content: 'Cet homme se rendit vers Pilate, et demanda le corps de Jésus. '
  '53':
  - type: text
    content: 'Il le descendit de la croix, l’enveloppa d’un linceul, '
  - type: note
    content: Mt 12:40; 26:12; 27:59. Mc 15:46.
  - type: text
    content: 'et le déposa dans un sépulcre taillé dans le roc, où personne n’avait encore été mis. '
  '54':
  - type: text
    content: 'C’était le jour de la préparation, et le sabbat allait commencer. '
  '55':
  - type: text
    content: 'Les femmes '
  - type: note
    content: Lu 8:2.
  - type: text
    content: 'qui étaient venues de la Galilée avec Jésus accompagnèrent Joseph, virent le sépulcre et la manière dont le corps de Jésus y fut déposé, '
  '56':
  - type: text
    content: et, s’en étant retournées, elles préparèrent des aromates et des parfums. Puis elles se reposèrent le jour du sabbat, selon la loi.
  '6':
  - type: text
    content: 'Quand Pilate entendit parler de la Galilée, il demanda si cet homme était Galiléen; '
  '7':
  - type: note
    content: Lu 3:1.
  - type: text
    content: 'et, ayant appris qu’il était de la juridiction d’Hérode, il le renvoya à Hérode, qui se trouvait aussi à Jérusalem en ces jours-là. '
  '8':
  - type: note
    content: Lu 9:7.
  - type: text
    content: 'Lorsque Hérode vit Jésus, il en eut une grande joie; car depuis longtemps, il désirait le voir, à cause de ce qu’il avait entendu dire de lui, et il espérait qu’il le verrait faire quelque miracle. '
  '9':
  - type: text
    content: 'Il lui adressa beaucoup de questions; mais Jésus ne lui répondit rien. '
