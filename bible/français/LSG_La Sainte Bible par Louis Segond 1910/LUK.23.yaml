      metadata:
        usfm: MAT.26.12
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 27:59
      metadata:
        usfm: MAT.27.59
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 15:46
      metadata:
        usfm: MRK.15.46
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et le déposa dans un sépulcre taillé dans le roc, où personne n’avait encore été mis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'C’était le jour de la préparation, et le sabbat allait commencer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Les femmes '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 8:2
      metadata:
        usfm: LUK.8.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qui étaient venues de la Galilée avec Jésus accompagnèrent Joseph, virent le sépulcre et la manière dont le corps de Jésus y fut déposé, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: et, s’en étant retournées, elles préparèrent des aromates et des parfums. Puis elles se reposèrent le jour du sabbat, selon la loi.
