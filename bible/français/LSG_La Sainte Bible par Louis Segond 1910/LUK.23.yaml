      metadata:
        usfm: MRK.15.39
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Le centenier, voyant ce qui était arrivé, glorifia Dieu, et dit: Certainement, cet homme était juste. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Et tous ceux qui assistaient en foule à ce spectacle, après avoir vu ce qui était arrivé, s’en retournèrent, se frappant la poitrine. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Tous ceux de la connaissance de Jésus, et les femmes qui l’avaient accompagné depuis la Galilée, se tenaient dans l’éloignement et regardaient ce qui se passait.
- type: usfm
  marker: s1
