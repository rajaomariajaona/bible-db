    marker-yv: yv-n
  - type: text
    text: 'Il était déjà environ la sixième heure, et il y eut des ténèbres sur toute la terre, jusqu’à la neuvième heure. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Le soleil s’obscurcit, '
  - type: usfm
