document_id: 2KI.8
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Famine de sept ans; départ et retour de la Sunamite
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-6: cf. 2 R 4:8-37. Ps 34:9-11. És 28:29.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Élisée dit à la femme dont il avait fait revivre le '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 4:34
      metadata:
        usfm: 2KI.4.34
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'fils: Lève-toi, va t’en, toi et ta maison, et séjourne où tu pourras; car l’Éternel appelle la famine, et même elle vient sur le pays pour sept années. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'La femme se leva, et elle fit selon la parole de l’homme de Dieu: elle s’en alla, elle et sa maison, et séjourna sept ans au pays des Philistins. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Au bout des sept ans, la femme revint du pays des Philistins, et elle alla implorer le roi au sujet de sa maison et de son champ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Le roi s’entretenait avec Guéhazi, serviteur de l’homme de Dieu, et il disait: Raconte-moi, je te prie, toutes les grandes choses qu’Élisée a faites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Et pendant qu’il racontait au roi comment Élisée avait rendu la vie à un mort, la femme dont Élisée avait fait revivre le fils vint implorer le roi au sujet de sa maison et de son champ. Guéhazi dit: O roi, mon seigneur, voici la femme, et voici son fils qu’Élisée a fait revivre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Le roi interrogea la femme, et elle lui fit le récit. Puis le roi lui donna un eunuque, auquel il dit: Fais restituer tout ce qui appartient à cette femme, avec tous les revenus du champ, depuis le jour où elle a quitté le pays jusqu’à maintenant.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hazaël sur le trône de Syrie
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 7-15: cf. 1 R 19:15-17. (2 R 8:28-29; 10:32-33; 13:3, 7.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Élisée se rendit à Damas. Ben-Hadad, roi de Syrie, était malade; et on l’avertit, en disant: L’homme de Dieu est arrivé ici. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Le roi dit à Hazaël: Prends avec toi un présent, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 14:2
      metadata:
        usfm: 1KI.14.2
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '3'
      metadata:
        usfm: 1KI.14.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 1:2
      metadata:
        usfm: 2KI.1.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'va au-devant de l’homme de Dieu; consulte par lui l’Éternel, en disant: Guérirai-je de cette maladie? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Hazaël alla au-devant d’Élisée, prenant avec lui un présent, tout ce qu’il y avait de meilleur à Damas, la charge de quarante chameaux. Lorsqu’il fut arrivé, il se présenta à lui, et dit: Ton fils Ben-Hadad, roi de Syrie, m’envoie vers toi pour dire: Guérirai-je de cette maladie? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Élisée lui répondit: Va, dis-lui: Tu guériras! Mais l’Éternel m’a révélé qu’il mourra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'L’homme de Dieu arrêta son regard sur Hazaël, et le fixa longtemps, puis il pleura. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Hazaël dit: Pourquoi mon seigneur pleure-t-il? Et Élisée répondit: Parce que je sais '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 10:32
      metadata:
        usfm: 2KI.10.32
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 12:17
      metadata:
        usfm: 2KI.12.17
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 13:7
      metadata:
        usfm: 2KI.13.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'le mal que tu feras aux enfants d’Israël; tu mettras le feu à leurs villes fortes, tu tueras avec l’épée leurs jeunes gens, tu écraseras leurs petits enfants, et tu fendras le ventre de leurs femmes enceintes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Hazaël dit: Mais qu’est-ce que ton serviteur, ce chien, pour faire de si grandes choses? Et Élisée dit: L’Éternel m’a révélé que tu seras roi de Syrie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Hazaël quitta Élisée, et revint auprès de son maître, qui lui dit: Que t’a dit Élisée? Et il répondit: Il m’a dit: Tu guériras! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Le lendemain, Hazaël prit une couverture, qu’il plongea dans l’eau, et il l’étendit sur le visage du roi, qui mourut. Et Hazaël régna à sa place.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 16-24: cf. 2 Ch 21. Os 8:7.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 21:4
      metadata:
        usfm: 2CH.21.4
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '5'
      metadata:
        usfm: 2CH.21.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'La cinquième année de Joram, fils d’Achab, roi d’Israël, Joram, fils de Josaphat, roi de Juda, régna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il avait trente-deux ans lorsqu’il devint roi, et il régna huit ans à Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Il marcha dans la voie des rois d’Israël, comme avait fait la maison d’Achab, car il avait pour femme une fille d’Achab, et il fit ce qui est mal aux yeux de l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Mais l’Éternel ne voulut point détruire Juda, à cause de David, son serviteur, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 S 7:13
      metadata:
        usfm: 2SA.7.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 11:36
      metadata:
        usfm: 1KI.11.36
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 15:4
      metadata:
        usfm: 1KI.15.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 132:17
      metadata:
        usfm: PSA.132.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'selon la promesse qu’il lui avait faite de lui donner toujours une lampe parmi ses fils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 27:40
      metadata:
        usfm: GEN.27.40
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 21:8
      metadata:
        usfm: 2CH.21.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'De son temps, Édom se révolta contre l’autorité de Juda, et se donna un roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Joram passa à Tsaïr, avec tous ses chars; s’étant levé de nuit, il battit les Édomites, qui l’entouraient et les chefs des chars, et le peuple s’enfuit dans ses tentes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'La rébellion d’Édom contre l’autorité de Juda a duré jusqu’à ce jour. Libna se révolta aussi dans le même temps. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Le reste des actions de Joram, et tout ce qu’il a fait, cela n’est-il pas écrit dans le livre des Chroniques des rois de Juda? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 21:19
      metadata:
        usfm: 2CH.21.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Joram se coucha avec ses pères, et il fut enterré avec ses pères dans la ville de David. Et Achazia, son fils, régna à sa place.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 25-29: cf. 2 Ch 22:1-6. Pr 2:18.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'La douzième année de Joram, fils d’Achab, roi d’Israël, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 22:1
      metadata:
        usfm: 2CH.22.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Achazia, fils de Joram, roi de Juda, régna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Achazia avait vingt-deux ans lorsqu’il devint roi, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 22:2
      metadata:
        usfm: 2CH.22.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'il régna un an à Jérusalem. Sa mère s’appelait Athalie, fille d’Omri, roi d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Il marcha dans la voie de la maison d’Achab, et il fit ce qui est mal aux yeux de l’Éternel, comme la maison d’Achab, car il était allié par mariage à la maison d’Achab. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Il alla avec Joram, fils d’Achab, à la guerre contre Hazaël, roi de Syrie, à Ramoth en Galaad. Et les Syriens blessèrent Joram. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 9:15
      metadata:
        usfm: 2KI.9.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Le roi Joram s’en retourna pour se faire guérir à Jizreel des blessures que les Syriens lui avaient faites à Rama, lorsqu’il se battait contre Hazaël, roi de Syrie. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 22:6
      metadata:
        usfm: 2CH.22.6
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '7'
      metadata:
        usfm: 2CH.22.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Achazia, fils de Joram, roi de Juda, descendit pour voir Joram, fils d’Achab, à Jizreel, parce qu’il était malade.
