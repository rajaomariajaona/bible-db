document_id: DEU.25,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Les querelles
  - type: heading
    content: 'V. 1-4: cf. 2 Co 11:24. 1 Co 9:9-11.'
  - type: text
    content: 'Lorsque des hommes, ayant entre eux une querelle, se présenteront en justice pour être jugés, on absoudra l’innocent, et l’on condamnera le coupable. '
  '10':
  - type: text
    content: 'Et sa maison sera appelée en Israël la maison du déchaussé. '
  '11':
  - type: text
    content: 'Lorsque des hommes se querelleront ensemble, l’un avec l’autre, si la femme de l’un s’approche pour délivrer son mari de la main de celui qui le frappe, si elle avance la main et saisit ce dernier par les parties honteuses, '
  '12':
  - type: text
    content: tu lui couperas la main, tu ne jetteras sur elle aucun regard de pitié.
  - type: heading
    content: Les poids et les mesures
  - type: heading
    content: 'V. 13-16: cf. (Lé 19:35, 36. Mi 6:10, 11.) (És 11:9. Za 5:5-11.)'
  '13':
  - type: text
    content: 'Tu n’auras point dans ton sac deux sortes de poids, un gros et un petit. '
  '14':
  - type: text
    content: 'Tu n’auras point dans ta maison deux sortes d’épha, un grand et un petit. '
  '15':
  - type: text
    content: 'Tu auras un poids exact et juste, tu auras un épha exact et juste, afin que tes jours se prolongent dans le pays que l’Éternel, ton Dieu, te donne. '
  '16':
  - type: text
    content: 'Car quiconque fait ces choses, quiconque commet une iniquité, est en '
  - type: note
    content: Pr 11:1.
  - type: text
    content: abomination à l’Éternel, ton Dieu.
  - type: heading
    content: La destruction des Amalécites
  - type: heading
    content: 'V. 17-19: cf. (Ex 17:8-16. 1 S 15.) (De 32:43. Ps 9:13, 14.)'
  '17':
  - type: text
    content: 'Souviens-toi de ce que te fit '
  - type: note
    content: Ex 17:8.
  - type: text
    content: 'Amalek pendant la route, lors de votre sortie d’Égypte, '
  '18':
  - type: text
    content: 'comment il te rencontra dans le chemin, et, sans aucune crainte de Dieu, tomba sur toi par derrière, sur tous ceux qui se traînaient les derniers, pendant que tu étais las et épuisé toi-même. '
  '19':
  - type: text
    content: 'Lorsque l’Éternel, ton Dieu, après t’avoir délivré de tous les ennemis qui t’entourent, t’accordera du repos dans le pays que l’Éternel, ton Dieu, te donne en héritage et en propriété, tu effaceras la mémoire d’Amalek de dessous les cieux: ne l’oublie point.'
  '2':
  - type: text
    content: 'Si le coupable mérite d’être battu, le juge le fera étendre par terre et frapper en sa présence d’un nombre de coups proportionné à la gravité de sa faute. '
  '3':
  - type: text
    content: 'Il ne lui fera pas donner plus de '
  - type: note
    content: 2 Co 11:24.
  - type: text
    content: 'quarante coups, de peur que, si l’on continuait à le frapper en allant beaucoup au-delà, ton frère ne fût avili à tes yeux. '
  '4':
  - type: text
    content: 'Tu '
  - type: note
    content: 1 Co 9:9. 1 Ti 5:18.
  - type: text
    content: n’emmuselleras point le bœuf, quand il foulera le grain.
  - type: heading
    content: Le mariage entre beau-frère et belle-sœur
  - type: heading
    content: 'V. 5-12: cf. (Ge 38:7-11. Ru 4:1-10.)'
  '5':
  - type: text
    content: 'Lorsque des frères demeureront ensemble, et que l’un d’eux mourra sans laisser de fils, la femme du défunt ne se mariera point au-dehors avec un étranger, mais '
  - type: note
    content: Mt 22:24. Mc 12:19. Lu 20:28.
  - type: text
    content: 'son beau-frère ira vers elle, la prendra pour femme, et l’épousera comme beau-frère. '
  '6':
  - type: text
    content: 'Le premier-né qu’elle enfantera succédera au frère mort et portera son nom, afin que ce nom ne soit pas effacé d’Israël. '
  '7':
  - type: text
    content: 'Si cet homme ne veut pas prendre sa belle-sœur, elle montera à la porte vers les anciens, et dira: '
  - type: note
    content: Ru 4:7.
  - type: text
    content: 'Mon beau-frère refuse de relever en Israël le nom de son frère, il ne veut pas m’épouser par droit de beau-frère. '
  '8':
  - type: text
    content: 'Les anciens de la ville l’appelleront, et lui parleront. S’il persiste, et dit: Je ne veux pas la prendre, '
  '9':
  - type: text
    content: 'alors sa belle-sœur s’approchera de lui en présence des anciens, lui ôtera son soulier du pied, et lui crachera au visage. Et prenant la parole, elle dira: Ainsi sera fait à l’homme qui ne relève pas la maison de son frère. '
