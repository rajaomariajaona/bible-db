document_id: DEU.25
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les querelles
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-4: cf. 2 Co 11:24. 1 Co 9:9-11.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Lorsque des hommes, ayant entre eux une querelle, se présenteront en justice pour être jugés, on absoudra l’innocent, et l’on condamnera le coupable. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Si le coupable mérite d’être battu, le juge le fera étendre par terre et frapper en sa présence d’un nombre de coups proportionné à la gravité de sa faute. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il ne lui fera pas donner plus de '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 11:24
      metadata:
        usfm: 2CO.11.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'quarante coups, de peur que, si l’on continuait à le frapper en allant beaucoup au-delà, ton frère ne fût avili à tes yeux. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tu '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 9:9
      metadata:
        usfm: 1CO.9.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 5:18
      metadata:
        usfm: 1TI.5.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: n’emmuselleras point le bœuf, quand il foulera le grain.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le mariage entre beau-frère et belle-sœur
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 5-12: cf. (Ge 38:7-11. Ru 4:1-10.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Lorsque des frères demeureront ensemble, et que l’un d’eux mourra sans laisser de fils, la femme du défunt ne se mariera point au-dehors avec un étranger, mais '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 22:24
      metadata:
        usfm: MAT.22.24
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 12:19
      metadata:
        usfm: MRK.12.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 20:28
      metadata:
        usfm: LUK.20.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'son beau-frère ira vers elle, la prendra pour femme, et l’épousera comme beau-frère. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Le premier-né qu’elle enfantera succédera au frère mort et portera son nom, afin que ce nom ne soit pas effacé d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Si cet homme ne veut pas prendre sa belle-sœur, elle montera à la porte vers les anciens, et dira: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ru 4:7
      metadata:
        usfm: RUT.4.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Mon beau-frère refuse de relever en Israël le nom de son frère, il ne veut pas m’épouser par droit de beau-frère. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Les anciens de la ville l’appelleront, et lui parleront. S’il persiste, et dit: Je ne veux pas la prendre, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'alors sa belle-sœur s’approchera de lui en présence des anciens, lui ôtera son soulier du pied, et lui crachera au visage. Et prenant la parole, elle dira: Ainsi sera fait à l’homme qui ne relève pas la maison de son frère. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Et sa maison sera appelée en Israël la maison du déchaussé. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Lorsque des hommes se querelleront ensemble, l’un avec l’autre, si la femme de l’un s’approche pour délivrer son mari de la main de celui qui le frappe, si elle avance la main et saisit ce dernier par les parties honteuses, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: tu lui couperas la main, tu ne jetteras sur elle aucun regard de pitié.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les poids et les mesures
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 13-16: cf. (Lé 19:35, 36. Mi 6:10, 11.) (És 11:9. Za 5:5-11.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tu n’auras point dans ton sac deux sortes de poids, un gros et un petit. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Tu n’auras point dans ta maison deux sortes d’épha, un grand et un petit. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tu auras un poids exact et juste, tu auras un épha exact et juste, afin que tes jours se prolongent dans le pays que l’Éternel, ton Dieu, te donne. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Car quiconque fait ces choses, quiconque commet une iniquité, est en '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 11:1
      metadata:
        usfm: PRO.11.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: abomination à l’Éternel, ton Dieu.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La destruction des Amalécites
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 17-19: cf. (Ex 17:8-16. 1 S 15.) (De 32:43. Ps 9:13, 14.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Souviens-toi de ce que te fit '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 17:8
      metadata:
        usfm: EXO.17.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Amalek pendant la route, lors de votre sortie d’Égypte, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'comment il te rencontra dans le chemin, et, sans aucune crainte de Dieu, tomba sur toi par derrière, sur tous ceux qui se traînaient les derniers, pendant que tu étais las et épuisé toi-même. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Lorsque l’Éternel, ton Dieu, après t’avoir délivré de tous les ennemis qui t’entourent, t’accordera du repos dans le pays que l’Éternel, ton Dieu, te donne en héritage et en propriété, tu effaceras la mémoire d’Amalek de dessous les cieux: ne l’oublie point.'
