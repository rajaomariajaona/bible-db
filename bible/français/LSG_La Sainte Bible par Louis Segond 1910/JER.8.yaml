document_id: JER.8,93
type_code: fra
verses:
  '1':
  - type: heading
    content: L’aveuglement du peuple
  - type: heading
    content: 'V. 1-3: cf. Jé 7:32-34. Lé 26:30-39.'
  - type: text
    content: 'En ce temps-là, dit l’Éternel, on tirera de leurs sépulcres les os des rois de Juda, les os de ses chefs, les os des sacrificateurs, les os des prophètes, et les os des habitants de Jérusalem. '
  '10':
  - type: text
    content: 'C’est pourquoi je donnerai '
  - type: note
    content: Jé 6:12.
  - type: text
    content: leurs femmes à d’autres,
  - type: text
    content: Et leurs champs à ceux qui les déposséderont.
  - type: text
    content: 'Car '
  - type: note
    content: Jé 6:13, 14, 15.
  - type: text
    content: depuis le plus petit jusqu’au plus grand,
  - type: text
    content: Tous sont avides de gain;
  - type: text
    content: Depuis le prophète jusqu’au sacrificateur,
  - type: note
    content: És 56:11.
  - type: text
    content: Tous usent de tromperie.
  '11':
  - type: text
    content: 'Ils pansent à la légère la plaie de la fille de mon peuple:'
  - type: text
    content: Paix! Paix! Disent-ils.
  - type: text
    content: Et il n’y a point de paix.
  '12':
  - type: text
    content: Ils seront confus, car ils commettent des abominations;
  - type: text
    content: Ils ne rougissent pas, ils ne connaissent pas la honte;
  - type: text
    content: C’est pourquoi ils tomberont avec ceux qui tombent,
  - type: text
    content: Ils seront renversés quand je les châtierai,
  - type: text
    content: Dit l’Éternel.
  '13':
  - type: text
    content: Je veux en finir avec eux, dit l’Éternel;
  - type: text
    content: 'Il n’y aura plus de raisins à la '
  - type: note
    content: És 5:1, etc.
  - type: text
    content: vigne,
  - type: text
    content: 'Plus de figues au '
  - type: note
    content: Mt 21:19. Lu 13:6, etc.
  - type: text
    content: figuier,
  - type: text
    content: Et les feuilles se flétriront;
  - type: text
    content: Ce que je leur avais donné leur échappera.
  - type: heading
    content: 'V. 14-17: cf. Jé 4:5-18.'
  '14':
  - type: text
    content: Pourquoi restons-nous assis?
  - type: note
    content: Jé 4:5.
  - type: text
    content: Rassemblez-vous, et allons dans les villes fortes,
  - type: text
    content: Pour y périr!
  - type: text
    content: Car l’Éternel, notre Dieu, nous destine à la mort,
  - type: text
    content: 'Il nous fait boire '
  - type: note
    content: Jé 9:15; 23:15.
  - type: text
    content: des eaux empoisonnées,
  - type: text
    content: Parce que nous avons péché contre l’Éternel.
  '15':
  - type: text
    content: ' '
  - type: note
    content: Jé 14:19.
  - type: text
    content: Nous espérions la paix, et il n’arrive rien d’heureux;
  - type: text
    content: Un temps de guérison, et voici la terreur!
  '16':
  - type: text
    content: ' '
  - type: note
    content: Jé 4:15.
  - type: text
    content: Le hennissement de ses chevaux se fait entendre du côté de Dan,
  - type: text
    content: Et au bruit de leur hennissement toute la terre tremble;
  - type: text
    content: Ils viennent, ils dévorent le pays et ce qu’il renferme,
  - type: text
    content: La ville et ceux qui l’habitent.
  '17':
  - type: text
    content: Car j’envoie parmi vous des serpents, des basilics,
  - type: text
    content: 'Contre lesquels il n’y a point '
  - type: note
    content: Ps 58:5, 6.
  - type: text
    content: d’enchantement;
  - type: text
    content: Ils vous mordront, dit l’Éternel.
  - type: heading
    content: 'V. 18-22: cf. Jé 4:19, 20; 9:1.'
  '18':
  - type: text
    content: Je voudrais soulager ma douleur;
  - type: text
    content: Mon cœur souffre au-dedans de moi.
  '19':
  - type: text
    content: Voici les cris de la fille de mon peuple
  - type: text
    content: 'Retentissent sur la terre lointaine:'
  - type: text
    content: L’Éternel n’est-il plus à Sion?
  - type: text
    content: N’a-t-elle plus son roi au milieu d’elle?
  - type: text
    content: Pourquoi m’ont-ils irrité par leurs images taillées,
  - type: text
    content: Par des idoles étrangères?
  '2':
  - type: text
    content: 'On les étendra devant le soleil, devant la lune, et devant toute l’armée des cieux, qu’ils ont aimés, qu’ils ont '
  - type: note
    content: Jé 7:18; 19:13.
  - type: text
    content: 'servis, qu’ils ont suivis, qu’ils ont recherchés, et devant lesquels ils se sont prosternés; on ne les recueillera point, on ne les enterrera point, et ils seront comme du fumier sur la terre. '
  '20':
  - type: text
    content: La moisson est passée, l’été est fini,
  - type: text
    content: Et nous ne sommes pas sauvés!
  '21':
  - type: text
    content: Je suis brisé par la douleur de la fille de mon peuple,
  - type: text
    content: Je suis dans la tristesse, l’épouvante me saisit.
  '22':
  - type: text
    content: 'N’y a-t-il point de '
  - type: note
    content: Ge 37:25. Jé 46:11; 51:8.
  - type: text
    content: baume en Galaad?
  - type: text
    content: N’y a-t-il point de médecin?
  - type: text
    content: Pourquoi donc la guérison de la fille de mon peuple ne s’opère-t-elle pas?
  '3':
  - type: text
    content: La mort sera préférable à la vie pour tous ceux qui resteront de cette race méchante, dans tous les lieux où je les aurai chassés, dit l’Éternel des armées.
  - type: heading
    content: 'V. 4-13: cf. Jé 5:1-9; 6:9-15.'
  '4':
  - type: text
    content: 'Dis-leur: Ainsi parle l’Éternel:'
  - type: text
    content: Est-ce que l’on tombe sans se relever?
  - type: text
    content: Ou se détourne-t-on sans revenir?
  '5':
  - type: text
    content: Pourquoi donc ce peuple de Jérusalem s’abandonne-t-il
  - type: text
    content: A de perpétuels égarements?
  - type: text
    content: Ils persistent dans la tromperie,
  - type: text
    content: Ils refusent de se convertir.
  '6':
  - type: text
    content: 'Je suis attentif, et j’écoute:'
  - type: text
    content: Ils ne parlent pas comme ils devraient;
  - type: text
    content: Aucun ne se repent de sa méchanceté,
  - type: text
    content: 'Et ne dit: Qu’ai-je fait?'
  - type: text
    content: Tous reprennent leur course,
  - type: text
    content: Comme un cheval qui s’élance au combat.
  '7':
  - type: text
    content: Même la cigogne connaît dans les cieux sa saison;
  - type: text
    content: La tourterelle, l’hirondelle et la grue
  - type: text
    content: Observent le temps de leur arrivée;
  - type: text
    content: 'Mais mon peuple '
  - type: note
    content: Jé 5:4, 5.
  - type: text
    content: ne connaît pas la loi de l’Éternel.
  '8':
  - type: text
    content: 'Comment pouvez-vous dire: Nous sommes sages,'
  - type: text
    content: La loi de l’Éternel est avec nous?
  - type: text
    content: C’est bien en vain que s’est mise à l’œuvre
  - type: text
    content: La plume mensongère des scribes.
  '9':
  - type: text
    content: Les sages sont confondus,
  - type: text
    content: Ils sont consternés, ils sont pris;
  - type: text
    content: Voici, ils ont méprisé la parole de l’Éternel,
  - type: text
    content: Et quelle sagesse ont-ils?
