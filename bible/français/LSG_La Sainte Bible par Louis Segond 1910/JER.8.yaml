document_id: JER.8
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’aveuglement du peuple
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-3: cf. Jé 7:32-34. Lé 26:30-39.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'En ce temps-là, dit l’Éternel, on tirera de leurs sépulcres les os des rois de Juda, les os de ses chefs, les os des sacrificateurs, les os des prophètes, et les os des habitants de Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'On les étendra devant le soleil, devant la lune, et devant toute l’armée des cieux, qu’ils ont aimés, qu’ils ont '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 7:18
      metadata:
        usfm: JER.7.18
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 19:13
      metadata:
        usfm: JER.19.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'servis, qu’ils ont suivis, qu’ils ont recherchés, et devant lesquels ils se sont prosternés; on ne les recueillera point, on ne les enterrera point, et ils seront comme du fumier sur la terre. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: La mort sera préférable à la vie pour tous ceux qui resteront de cette race méchante, dans tous les lieux où je les aurai chassés, dit l’Éternel des armées.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 4-13: cf. Jé 5:1-9; 6:9-15.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dis-leur: Ainsi parle l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Est-ce que l’on tombe sans se relever?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ou se détourne-t-on sans revenir?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Pourquoi donc ce peuple de Jérusalem s’abandonne-t-il
- type: usfm
  marker: q1
  children:
  - type: text
    text: A de perpétuels égarements?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils persistent dans la tromperie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils refusent de se convertir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Je suis attentif, et j’écoute:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ne parlent pas comme ils devraient;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aucun ne se repent de sa méchanceté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et ne dit: Qu’ai-je fait?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous reprennent leur course,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme un cheval qui s’élance au combat.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Même la cigogne connaît dans les cieux sa saison;
- type: usfm
  marker: q1
  children:
  - type: text
    text: La tourterelle, l’hirondelle et la grue
- type: usfm
  marker: q1
  children:
  - type: text
    text: Observent le temps de leur arrivée;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Mais mon peuple '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 5:4
      metadata:
        usfm: JER.5.4
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '5'
      metadata:
        usfm: JER.5.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: ne connaît pas la loi de l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Comment pouvez-vous dire: Nous sommes sages,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: La loi de l’Éternel est avec nous?
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est bien en vain que s’est mise à l’œuvre
- type: usfm
  marker: q1
  children:
  - type: text
    text: La plume mensongère des scribes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Les sages sont confondus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils sont consternés, ils sont pris;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voici, ils ont méprisé la parole de l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et quelle sagesse ont-ils?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'C’est pourquoi je donnerai '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 6:12
      metadata:
        usfm: JER.6.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: leurs femmes à d’autres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et leurs champs à ceux qui les déposséderont.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Car '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 6:13
      metadata:
        usfm: JER.6.13
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '14'
      metadata:
        usfm: JER.6.14
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '15'
      metadata:
        usfm: JER.6.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: depuis le plus petit jusqu’au plus grand,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous sont avides de gain;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Depuis le prophète jusqu’au sacrificateur,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 56:11
      metadata:
        usfm: ISA.56.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Tous usent de tromperie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ils pansent à la légère la plaie de la fille de mon peuple:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Paix! Paix! Disent-ils.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il n’y a point de paix.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ils seront confus, car ils commettent des abominations;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ne rougissent pas, ils ne connaissent pas la honte;
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est pourquoi ils tomberont avec ceux qui tombent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils seront renversés quand je les châtierai,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Je veux en finir avec eux, dit l’Éternel;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Il n’y aura plus de raisins à la '
  - type: usfm
    marker: x
    children:
    - type: text
      text: És 5:1, etc.
    marker-yv: yv-n
  - type: text
    text: vigne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Plus de figues au '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 21:19
      metadata:
        usfm: MAT.21.19
    - type: text
      text: . Lu 13:6, etc.
    marker-yv: yv-n
  - type: text
    text: figuier,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les feuilles se flétriront;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce que je leur avais donné leur échappera.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 14-17: cf. Jé 4:5-18.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Pourquoi restons-nous assis?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 4:5
      metadata:
        usfm: JER.4.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Rassemblez-vous, et allons dans les villes fortes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour y périr!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car l’Éternel, notre Dieu, nous destine à la mort,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Il nous fait boire '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 9:15
      metadata:
        usfm: JER.9.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 23:15
      metadata:
        usfm: JER.23.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: des eaux empoisonnées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parce que nous avons péché contre l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 14:19
      metadata:
        usfm: JER.14.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Nous espérions la paix, et il n’arrive rien d’heureux;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Un temps de guérison, et voici la terreur!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 4:15
      metadata:
        usfm: JER.4.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Le hennissement de ses chevaux se fait entendre du côté de Dan,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et au bruit de leur hennissement toute la terre tremble;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils viennent, ils dévorent le pays et ce qu’il renferme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La ville et ceux qui l’habitent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Car j’envoie parmi vous des serpents, des basilics,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Contre lesquels il n’y a point '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 58:5
      metadata:
        usfm: PSA.58.5
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '6'
      metadata:
        usfm: PSA.58.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: d’enchantement;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils vous mordront, dit l’Éternel.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 18-22: cf. Jé 4:19, 20; 9:1.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Je voudrais soulager ma douleur;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon cœur souffre au-dedans de moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Voici les cris de la fille de mon peuple
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Retentissent sur la terre lointaine:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’Éternel n’est-il plus à Sion?
- type: usfm
  marker: q1
  children:
  - type: text
    text: N’a-t-elle plus son roi au milieu d’elle?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi m’ont-ils irrité par leurs images taillées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Par des idoles étrangères?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: La moisson est passée, l’été est fini,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et nous ne sommes pas sauvés!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Je suis brisé par la douleur de la fille de mon peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je suis dans la tristesse, l’épouvante me saisit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'N’y a-t-il point de '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 37:25
      metadata:
        usfm: GEN.37.25
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 46:11
      metadata:
        usfm: JER.46.11
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 51:8
      metadata:
        usfm: JER.51.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: baume en Galaad?
- type: usfm
  marker: q1
  children:
  - type: text
    text: N’y a-t-il point de médecin?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi donc la guérison de la fille de mon peuple ne s’opère-t-elle pas?
