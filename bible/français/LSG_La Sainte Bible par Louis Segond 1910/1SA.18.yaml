document_id: 1SA.18,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Amitié de Jonathan pour David
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-5: cf. (1 S 19:1-7; 20; 23:16-18. 2 S 1:26.) Pr 18:24.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'David avait achevé de parler à Saül. Et dès lors l’âme de Jonathan fut attachée à l’âme de David, et Jonathan l’aima comme son âme. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Le lendemain, le mauvais esprit de Dieu saisit Saül, qui eut des transports au milieu de la maison. David jouait, comme les autres jours, et Saül avait sa lance à la main. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Saül leva sa lance, disant en lui-même: Je frapperai David contre la paroi. Mais David se détourna de lui deux fois. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Saül craignait la présence de David, parce que l’Éternel était avec David et s’était retiré de lui. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Il l’éloigna de sa personne, et il l’établit chef de mille hommes. David sortait et rentrait à la tête du peuple; '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'il réussissait dans toutes ses entreprises, et l’Éternel était avec lui. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Saül, voyant qu’il réussissait toujours, avait peur de lui; '
  '16':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: mais tout Israël et Juda aimaient David, parce qu’il sortait et rentrait à leur tête.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David gendre du roi
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 17-30: cf. 1 S 17:25. Pr 26:24-27.'
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Saül dit à David: Voici, je te donnerai pour femme ma fille aînée Mérab; sers-moi seulement avec vaillance, et soutiens les guerres de l’Éternel. Or Saül se disait: Je ne veux pas mettre la main sur lui, mais que la main des Philistins soit sur lui. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'David répondit à Saül: Qui suis-je, et qu’est-ce que ma vie, qu’est-ce que la famille de mon père en Israël, pour que je devienne le gendre du roi? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Lorsque arriva le temps où Mérab, fille de Saül, devait être donnée à David, elle fut donnée pour femme à Adriel, de Mehola. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ce même jour Saül retint David, et ne le laissa pas retourner dans la maison de son père. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Mical, fille de Saül, aima David. On en informa Saül, et la chose lui convint. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Il se disait: Je la lui donnerai, afin qu’elle soit un piège pour lui, et qu’il tombe sous la main des Philistins. Et Saül dit à David pour la seconde fois: Tu vas aujourd’hui devenir mon gendre. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Saül donna cet ordre à ses serviteurs: Parlez en confidence à David, et dites-lui: Voici, le roi est bien disposé pour toi, et tous ses serviteurs t’aiment; sois maintenant le gendre du roi. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Les serviteurs de Saül répétèrent ces paroles aux oreilles de David. Et David répondit: Croyez-vous qu’il soit facile de devenir le gendre du roi? Moi, je suis un homme pauvre et de peu d’importance. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Les serviteurs de Saül lui rapportèrent ce qu’avait répondu David. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Saül dit: Vous parlerez ainsi à David: Le roi ne demande point de dot; mais il désire cent prépuces de Philistins, pour être vengé de ses ennemis. Saül avait le dessein de faire tomber David entre les mains des Philistins. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Les serviteurs de Saül rapportèrent ces paroles à David, et David agréa ce qui lui était demandé pour qu’il devînt gendre du roi. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Avant le terme fixé, David se leva, partit avec ses gens, et tua deux cents hommes parmi les Philistins; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 3:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'il apporta leurs prépuces, et en livra au roi le nombre complet, afin de devenir gendre du roi. Alors Saül lui donna pour femme Mical, sa fille. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Saül vit et comprit que l’Éternel était avec David; et Mical, sa fille, aimait David. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Saül craignit de plus en plus David, et il fut toute sa vie son ennemi. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Jonathan fit alliance avec David, parce qu’il l’aimait comme son âme. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Les princes des Philistins faisaient des excursions; et chaque fois qu’ils sortaient, David avait plus de succès que tous les serviteurs de Saül, et son nom devint très célèbre.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Il ôta le manteau qu’il portait, pour le donner à David; et il lui donna ses vêtements, même son épée, son arc et sa ceinture. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: David allait et réussissait partout où l’envoyait Saül; il fut mis par Saül à la tête des gens de guerre, et il plaisait à tout le peuple, même aux serviteurs de Saül.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Chant de triomphe des femmes d’Israël. Haine de Saül contre David
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 6-16: cf. Pr 27:4. (1 S 16:14-23; 19:8-10.)'
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Comme ils revenaient, lors du retour de David après qu’il eut tué le Philistin, les femmes sortirent de toutes les villes d’Israël au-devant du roi Saül, en chantant et en dansant, au son des tambourins et des triangles, et en poussant des cris de joie. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 15:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Les femmes qui chantaient se répondaient les unes aux autres, et disaient:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 21:11
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 29:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Saül a frappé ses mille,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et David ses dix mille.
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Saül fut très irrité, et cela lui déplut. Il dit: On en donne dix mille à David, et c’est à moi que l’on donne les mille! Il ne lui manque plus que la royauté. '
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Et Saül regarda David d’un mauvais œil, à partir de ce jour et dans la suite. '
