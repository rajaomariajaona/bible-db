document_id: 2CO.4,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-6: cf. 1 Th 2:1-6. 2 Co 2:14-17.'
  - type: text
    content: 'C’est pourquoi, ayant ce ministère, selon la miséricorde qui nous a été faite, nous ne perdons pas courage. '
  '10':
  - type: note
    content: Ro 8:17. Ga 6:17. Ph 3:10. 2 Ti 2:11, 12. 1 Pi 4:13.
  - type: text
    content: 'portant toujours avec nous dans notre corps la mort de Jésus, afin que la vie de Jésus soit aussi manifestée dans notre corps. '
  '11':
  - type: note
    content: Ps 44:23. Mt 5:11. Ro 8:36. 1 Co 4:9.
  - type: text
    content: 'Car nous qui vivons, nous sommes sans cesse livrés à la mort à cause de Jésus, '
  - type: note
    content: 1 Co 15:49. Col 3:4.
  - type: text
    content: 'afin que la vie de Jésus soit aussi manifestée dans notre chair mortelle. '
  '12':
  - type: text
    content: 'Ainsi la mort agit en nous, et la vie agit en vous. '
  '13':
  - type: text
    content: 'Et, comme nous avons le même esprit de foi qui est exprimé dans cette parole de l’Écriture: '
  - type: note
    content: Ps 116:10.
  - type: text
    content: 'J’ai cru, c’est pourquoi j’ai parlé! Nous aussi nous croyons, et c’est pour cela que nous parlons, '
  '14':
  - type: note
    content: Ro 8:11. 1 Co 6:14.
  - type: text
    content: 'sachant que celui qui a ressuscité le Seigneur Jésus nous ressuscitera aussi avec Jésus, et nous fera paraître avec vous en sa présence. '
  '15':
  - type: text
    content: 'Car tout cela arrive à cause de vous, '
  - type: note
    content: 2 Co 1:11.
  - type: text
    content: afin que la grâce en se multipliant, fasse abonder, à la gloire de Dieu, les actions de grâces d’un plus grand nombre.
  - type: heading
    content: '4 v. 16 à 5 v. 10: cf. (Ro 8:17, 18. 1 Pi 1:6, 9.) (Ro 8:23-25. Ph 1:23.) 1 Jn 3:2, 3. Hé 12:28, 29. Ac 24:15, 16.'
  '16':
  - type: text
    content: 'C’est pourquoi nous ne perdons pas courage. Et lors même que notre homme extérieur se détruit, notre homme intérieur se renouvelle de jour en jour. '
  '17':
  - type: note
    content: Ps 30:6. Mt 5:12. Ro 8:18. 1 Jn 3:2.
  - type: text
    content: 'Car nos légères afflictions du moment présent produisent pour nous, au-delà de toute mesure, un poids éternel de gloire, '
  '18':
  - type: text
    content: parce que nous regardons, non point aux choses visibles, mais à celles qui sont invisibles; car les choses visibles sont passagères, et les invisibles sont éternelles.
  '2':
  - type: text
    content: 'Nous rejetons les choses honteuses qui se font en secret, '
  - type: note
    content: 2 Co 2:17.
  - type: text
    content: 'nous n’avons point une conduite astucieuse, et nous n’altérons point la parole de Dieu. Mais, en publiant la vérité, '
  - type: note
    content: 2 Co 6:4.
  - type: text
    content: 'nous nous recommandons à toute conscience d’homme devant Dieu. '
  '3':
  - type: text
    content: 'Si notre Évangile est encore voilé, il est voilé pour ceux '
  - type: note
    content: 2 Co 2:15. 2 Th 2:10.
  - type: text
    content: 'qui périssent; '
  '4':
  - type: text
    content: 'pour les incrédules dont le dieu de ce siècle '
  - type: note
    content: És 6:10. Jn 12:40.
  - type: text
    content: 'a aveuglé l’intelligence, afin qu’ils ne vissent pas briller la splendeur de l’Évangile de la gloire de Christ, '
  - type: note
    content: Jn 14:9. Ph 2:6. Col 1:15. Hé 1:3.
  - type: text
    content: 'qui est l’image de Dieu. '
  '5':
  - type: text
    content: 'Nous ne nous prêchons pas nous-mêmes; c’est Jésus-Christ le Seigneur que nous prêchons, et nous nous disons vos serviteurs à cause de Jésus. '
  '6':
  - type: text
    content: 'Car Dieu, '
  - type: note
    content: Ge 1:3.
  - type: text
    content: 'qui a dit: La lumière brillera du sein des ténèbres! '
  - type: note
    content: 2 Pi 1:19.
  - type: text
    content: a fait briller la lumière dans nos cœurs pour faire resplendir la connaissance de la gloire de Dieu sur la face de Christ.
  - type: heading
    content: 'V. 7-15: cf. (2 Co 6:3-10; 1:5-11.) 2 Ti 2:8-11.'
  '7':
  - type: text
    content: 'Nous portons ce trésor '
  - type: note
    content: 2 Co 5:1.
  - type: text
    content: 'dans des vases de terre, afin que cette grande puissance soit attribuée à '
  - type: note
    content: 1 Co 2:5.
  - type: text
    content: 'Dieu, et non pas à nous. '
  '8':
  - type: text
    content: 'Nous sommes pressés de toute manière, mais non réduits à l’extrémité; dans la détresse, mais non dans le désespoir; '
  '9':
  - type: text
    content: 'persécutés, mais non abandonnés; abattus, mais non perdus; '
