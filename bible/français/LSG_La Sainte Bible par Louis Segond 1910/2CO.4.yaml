document_id: 2CO.4
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-6: cf. 1 Th 2:1-6. 2 Co 2:14-17.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'C’est pourquoi, ayant ce ministère, selon la miséricorde qui nous a été faite, nous ne perdons pas courage. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nous rejetons les choses honteuses qui se font en secret, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 2:17
      metadata:
        usfm: 2CO.2.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'nous n’avons point une conduite astucieuse, et nous n’altérons point la parole de Dieu. Mais, en publiant la vérité, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 6:4
      metadata:
        usfm: 2CO.6.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'nous nous recommandons à toute conscience d’homme devant Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Si notre Évangile est encore voilé, il est voilé pour ceux '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 2:15
      metadata:
        usfm: 2CO.2.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Th 2:10
      metadata:
        usfm: 2TH.2.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qui périssent; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'pour les incrédules dont le dieu de ce siècle '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 6:10
      metadata:
        usfm: ISA.6.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 12:40
      metadata:
        usfm: JHN.12.40
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'a aveuglé l’intelligence, afin qu’ils ne vissent pas briller la splendeur de l’Évangile de la gloire de Christ, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 14:9
      metadata:
        usfm: JHN.14.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 2:6
      metadata:
        usfm: PHP.2.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 1:15
      metadata:
        usfm: COL.1.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 1:3
      metadata:
        usfm: HEB.1.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qui est l’image de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Nous ne nous prêchons pas nous-mêmes; c’est Jésus-Christ le Seigneur que nous prêchons, et nous nous disons vos serviteurs à cause de Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Car Dieu, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 1:3
      metadata:
        usfm: GEN.1.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qui a dit: La lumière brillera du sein des ténèbres! '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Pi 1:19
      metadata:
        usfm: 2PE.1.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: a fait briller la lumière dans nos cœurs pour faire resplendir la connaissance de la gloire de Dieu sur la face de Christ.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 7-15: cf. (2 Co 6:3-10; 1:5-11.) 2 Ti 2:8-11.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nous portons ce trésor '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 5:1
      metadata:
        usfm: 2CO.5.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'dans des vases de terre, afin que cette grande puissance soit attribuée à '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 2:5
      metadata:
        usfm: 1CO.2.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Dieu, et non pas à nous. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nous sommes pressés de toute manière, mais non réduits à l’extrémité; dans la détresse, mais non dans le désespoir; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'persécutés, mais non abandonnés; abattus, mais non perdus; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 8:17
      metadata:
        usfm: ROM.8.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 6:17
      metadata:
        usfm: GAL.6.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 3:10
      metadata:
        usfm: PHP.3.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ti 2:11
      metadata:
        usfm: 2TI.2.11
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '12'
      metadata:
        usfm: 2TI.2.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 4:13
      metadata:
        usfm: 1PE.4.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'portant toujours avec nous dans notre corps la mort de Jésus, afin que la vie de Jésus soit aussi manifestée dans notre corps. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 44:23
      metadata:
        usfm: PSA.44.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 5:11
      metadata:
        usfm: MAT.5.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 8:36
      metadata:
        usfm: ROM.8.36
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 4:9
      metadata:
        usfm: 1CO.4.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Car nous qui vivons, nous sommes sans cesse livrés à la mort à cause de Jésus, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 15:49
      metadata:
        usfm: 1CO.15.49
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 3:4
      metadata:
        usfm: COL.3.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'afin que la vie de Jésus soit aussi manifestée dans notre chair mortelle. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ainsi la mort agit en nous, et la vie agit en vous. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Et, comme nous avons le même esprit de foi qui est exprimé dans cette parole de l’Écriture: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 116:10
      metadata:
        usfm: PSA.116.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'J’ai cru, c’est pourquoi j’ai parlé! Nous aussi nous croyons, et c’est pour cela que nous parlons, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 8:11
      metadata:
        usfm: ROM.8.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 6:14
      metadata:
        usfm: 1CO.6.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'sachant que celui qui a ressuscité le Seigneur Jésus nous ressuscitera aussi avec Jésus, et nous fera paraître avec vous en sa présence. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Car tout cela arrive à cause de vous, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 1:11
      metadata:
        usfm: 2CO.1.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: afin que la grâce en se multipliant, fasse abonder, à la gloire de Dieu, les actions de grâces d’un plus grand nombre.
- type: usfm
  marker: r
  children:
  - type: text
    text: '4 v. 16 à 5 v. 10: cf. (Ro 8:17, 18. 1 Pi 1:6, 9.) (Ro 8:23-25. Ph 1:23.) 1 Jn 3:2, 3. Hé 12:28, 29. Ac 24:15, 16.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'C’est pourquoi nous ne perdons pas courage. Et lors même que notre homme extérieur se détruit, notre homme intérieur se renouvelle de jour en jour. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 30:6
      metadata:
        usfm: PSA.30.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 5:12
      metadata:
        usfm: MAT.5.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 8:18
      metadata:
        usfm: ROM.8.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 3:2
      metadata:
        usfm: 1JN.3.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Car nos légères afflictions du moment présent produisent pour nous, au-delà de toute mesure, un poids éternel de gloire, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: parce que nous regardons, non point aux choses visibles, mais à celles qui sont invisibles; car les choses visibles sont passagères, et les invisibles sont éternelles.
