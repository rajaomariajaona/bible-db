document_id: 2CH.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Construction du temple
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-14: cf. 1 R 6. Ag 2:7-9.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Salomon commença à bâtir la maison de l’Éternel à Jérusalem, sur la montagne de Morija, qui '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 21:24
      metadata:
        usfm: 1CH.21.24
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '26'
      metadata:
        usfm: 1CH.21.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'avait été indiquée à David, son père, dans le lieu préparé par David sur l’aire d’Ornan, le Jébusien. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 6:1
      metadata:
        usfm: 1KI.6.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'commença à bâtir le second jour du second mois de la quatrième année de son règne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Voici sur quels fondements Salomon bâtit la maison de Dieu. La longueur en coudées de l’ancienne mesure était de soixante coudées, et la largeur de vingt coudées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Le portique sur le devant avait vingt coudées de longueur, répondant à la largeur de la maison, et cent vingt de hauteur; Salomon le couvrit intérieurement d’or pur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il revêtit de bois de cyprès la grande maison, la couvrit d’or pur, et y fit sculpter des palmes et des chaînettes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il couvrit la maison de pierres précieuses comme ornement; et l’or était de l’or de Parvaïm. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il couvrit d’or la maison, les poutres, les seuils, les parois et les battants des portes, et il fit sculpter des chérubins sur les parois. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Il fit la maison du lieu très saint; elle avait vingt coudées de longueur répondant à la largeur de la maison, et vingt coudées de largeur. Il la couvrit d’or pur, pour une valeur de six cents talents; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'et le poids de l’or pour les clous montait à cinquante sicles. Il couvrit aussi d’or les chambres hautes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il fit dans la maison du lieu très saint deux chérubins sculptés, et on les couvrit d’or. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Les ailes des chérubins avaient vingt coudées de longueur. L’aile du premier, longue de cinq coudées, touchait au mur de la maison; et l’autre aile, longue de cinq coudées, touchait à l’aile du second chérubin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'L’aile du second chérubin, longue de cinq coudées, touchait au mur de la maison; et l’autre aile, longue de cinq coudées, joignait l’aile du premier chérubin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Les ailes de ces chérubins, déployées, avaient vingt coudées. Ils étaient debout sur leurs pieds, la face tournée vers la maison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il fit '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 27:51
      metadata:
        usfm: MAT.27.51
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: le voile bleu, pourpre et cramoisi, et de byssus, et il y représenta des chérubins.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les deux colonnes d’airain, l’autel d’airain, la mer d’airain, les bassins, et les divers ustensiles pour le temple
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 15-17: cf. 1 R 7:15-22.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Il fit devant la maison '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 7:15
      metadata:
        usfm: 1KI.7.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 52:21
      metadata:
        usfm: JER.52.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'deux colonnes de trente-cinq coudées de hauteur, avec un chapiteau de cinq coudées sur leur sommet. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il fit des chaînettes comme celles qui étaient dans le sanctuaire, et les plaça sur le sommet des colonnes, et il fit cent grenades qu’il mit dans les chaînettes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Il dressa les colonnes sur le devant du temple, l’une à droite et l’autre à gauche; il nomma celle de droite Jakin, et celle de gauche Boaz.
