document_id: 2CH.3,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Construction du temple
  - type: heading
    content: 'V. 1-14: cf. 1 R 6. Ag 2:7-9.'
  - type: text
    content: 'Salomon commença à bâtir la maison de l’Éternel à Jérusalem, sur la montagne de Morija, qui '
  - type: note
    content: 1 Ch 21:24, 26.
  - type: text
    content: 'avait été indiquée à David, son père, dans le lieu préparé par David sur l’aire d’Ornan, le Jébusien. '
  '10':
  - type: text
    content: 'Il fit dans la maison du lieu très saint deux chérubins sculptés, et on les couvrit d’or. '
  '11':
  - type: text
    content: 'Les ailes des chérubins avaient vingt coudées de longueur. L’aile du premier, longue de cinq coudées, touchait au mur de la maison; et l’autre aile, longue de cinq coudées, touchait à l’aile du second chérubin. '
  '12':
  - type: text
    content: 'L’aile du second chérubin, longue de cinq coudées, touchait au mur de la maison; et l’autre aile, longue de cinq coudées, joignait l’aile du premier chérubin. '
  '13':
  - type: text
    content: 'Les ailes de ces chérubins, déployées, avaient vingt coudées. Ils étaient debout sur leurs pieds, la face tournée vers la maison. '
  '14':
  - type: text
    content: 'Il fit '
  - type: note
    content: Mt 27:51.
  - type: text
    content: le voile bleu, pourpre et cramoisi, et de byssus, et il y représenta des chérubins.
  - type: heading
    content: Les deux colonnes d’airain, l’autel d’airain, la mer d’airain, les bassins, et les divers ustensiles pour le temple
  - type: heading
    content: 'V. 15-17: cf. 1 R 7:15-22.'
  '15':
  - type: text
    content: 'Il fit devant la maison '
  - type: note
    content: 1 R 7:15. Jé 52:21.
  - type: text
    content: 'deux colonnes de trente-cinq coudées de hauteur, avec un chapiteau de cinq coudées sur leur sommet. '
  '16':
  - type: text
    content: 'Il fit des chaînettes comme celles qui étaient dans le sanctuaire, et les plaça sur le sommet des colonnes, et il fit cent grenades qu’il mit dans les chaînettes. '
  '17':
  - type: text
    content: Il dressa les colonnes sur le devant du temple, l’une à droite et l’autre à gauche; il nomma celle de droite Jakin, et celle de gauche Boaz.
  '2':
  - type: text
    content: 'Il '
  - type: note
    content: 1 R 6:1.
  - type: text
    content: 'commença à bâtir le second jour du second mois de la quatrième année de son règne. '
  '3':
  - type: text
    content: 'Voici sur quels fondements Salomon bâtit la maison de Dieu. La longueur en coudées de l’ancienne mesure était de soixante coudées, et la largeur de vingt coudées. '
  '4':
  - type: text
    content: 'Le portique sur le devant avait vingt coudées de longueur, répondant à la largeur de la maison, et cent vingt de hauteur; Salomon le couvrit intérieurement d’or pur. '
  '5':
  - type: text
    content: 'Il revêtit de bois de cyprès la grande maison, la couvrit d’or pur, et y fit sculpter des palmes et des chaînettes. '
  '6':
  - type: text
    content: 'Il couvrit la maison de pierres précieuses comme ornement; et l’or était de l’or de Parvaïm. '
  '7':
  - type: text
    content: 'Il couvrit d’or la maison, les poutres, les seuils, les parois et les battants des portes, et il fit sculpter des chérubins sur les parois. '
  '8':
  - type: text
    content: 'Il fit la maison du lieu très saint; elle avait vingt coudées de longueur répondant à la largeur de la maison, et vingt coudées de largeur. Il la couvrit d’or pur, pour une valeur de six cents talents; '
  '9':
  - type: text
    content: 'et le poids de l’or pour les clous montait à cinquante sicles. Il couvrit aussi d’or les chambres hautes. '
