document_id: MIC.6,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Procès de l’Éternel avec son peuple. La miséricorde de l’Éternel
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-5: cf. Jé 2:4-7. 1 S 12:7-12.'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Écoutez donc ce que dit l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lève-toi, plaide devant les montagnes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que les collines entendent ta voix!…
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Y a-t-il encore dans la maison du méchant
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des trésors iniques,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et un épha trop petit, objet de malédiction?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Est-on pur avec des '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Os 12:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: balances fausses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et avec de faux poids dans le sac?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses riches sont pleins de violence,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses habitants profèrent le mensonge,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et leur langue n’est que '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 9:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: tromperie dans leur bouche.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est pourquoi je te frapperai par la souffrance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je te ravagerai à cause de tes péchés.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tu '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Os 4:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: mangeras sans te rassasier,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la faim sera au-dedans de toi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu mettras en réserve et tu ne sauveras pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ce que tu sauveras, je le livrerai à l’épée.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tu '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 28:38
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ag 1:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: sèmeras, et tu ne moissonneras pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu presseras l’olive, et tu ne feras pas d’onctions avec l’huile,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu presseras le moût, et tu ne boiras pas le vin.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'On observe les coutumes '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 16:25
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '26'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: d’Omri
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et toute la manière d’agir de la maison '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 R 16:30, etc.
      marker-yv: yv-n
    - type: text
      text: d’Achab,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et vous marchez d’après leurs conseils;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est pourquoi je te livrerai à la destruction,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ferai de tes habitants un sujet de raillerie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et vous porterez l’opprobre de mon peuple.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Écoutez, montagnes, le procès de l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et vous, solides fondements de la terre!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Os 4:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: l’Éternel a un procès avec son peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il veut plaider avec Israël.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon peuple, que t’ai-je fait?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En quoi t’ai-je fatigué?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Réponds-moi!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car je t’ai fait monter du pays '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 12:51
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14:30
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: d’Égypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je t’ai délivré de la maison de servitude,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et j’ai envoyé devant toi Moïse, Aaron et Marie.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mon peuple, rappelle-toi ce que projetait '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 22:5
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 23:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Balak, roi de Moab,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ce que lui répondit Balaam, fils de Beor,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'De '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 25
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Sittim à '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Guilgal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afin que tu reconnaisses les bienfaits de l’Éternel.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 6-8: cf. Ps 50:7, etc.; 51:18, 19. És 1:11-19. Os 6:6.'
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avec quoi me présenterai-je devant l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour m’humilier devant le Dieu Très-Haut?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Me présenterai-je avec des holocaustes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avec des veaux d’un an?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel agréera-t-il des milliers de béliers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des myriades de torrents d’huile?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Donnerai-je pour mes transgressions mon premier-né,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour le péché de mon âme le fruit de mes entrailles?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On t’a fait connaître, ô homme, ce qui est bien;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 10:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Et ce que l’Éternel demande de toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est que tu pratiques la justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que tu aimes la miséricorde,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que tu marches humblement avec ton Dieu.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 9-16: cf. (Am 8:4-8; 5:11-13.) 1 R 9:6-9.'
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La voix de l’Éternel crie à la ville,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et celui qui est sage craindra ton nom.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Entendez la verge et celui qui l’envoie!
