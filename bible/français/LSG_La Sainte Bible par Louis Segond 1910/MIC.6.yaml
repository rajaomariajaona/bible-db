document_id: MIC.6,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Procès de l’Éternel avec son peuple. La miséricorde de l’Éternel
  - type: heading
    content: 'V. 1-5: cf. Jé 2:4-7. 1 S 12:7-12.'
  - type: text
    content: 'Écoutez donc ce que dit l’Éternel:'
  - type: text
    content: Lève-toi, plaide devant les montagnes,
  - type: text
    content: Et que les collines entendent ta voix!…
  '10':
  - type: text
    content: Y a-t-il encore dans la maison du méchant
  - type: text
    content: Des trésors iniques,
  - type: text
    content: Et un épha trop petit, objet de malédiction?
  '11':
  - type: text
    content: 'Est-on pur avec des '
  - type: note
    content: Os 12:8.
  - type: text
    content: balances fausses,
  - type: text
    content: Et avec de faux poids dans le sac?
  '12':
  - type: text
    content: Ses riches sont pleins de violence,
  - type: text
    content: Ses habitants profèrent le mensonge,
  - type: text
    content: 'Et leur langue n’est que '
  - type: note
    content: Jé 9:8.
  - type: text
    content: tromperie dans leur bouche.
  '13':
  - type: text
    content: C’est pourquoi je te frapperai par la souffrance,
  - type: text
    content: Je te ravagerai à cause de tes péchés.
  '14':
  - type: text
    content: 'Tu '
  - type: note
    content: Os 4:10.
  - type: text
    content: mangeras sans te rassasier,
  - type: text
    content: Et la faim sera au-dedans de toi;
  - type: text
    content: Tu mettras en réserve et tu ne sauveras pas,
  - type: text
    content: Et ce que tu sauveras, je le livrerai à l’épée.
  '15':
  - type: text
    content: 'Tu '
  - type: note
    content: De 28:38. Ag 1:6.
  - type: text
    content: sèmeras, et tu ne moissonneras pas,
  - type: text
    content: Tu presseras l’olive, et tu ne feras pas d’onctions avec l’huile,
  - type: text
    content: Tu presseras le moût, et tu ne boiras pas le vin.
  '16':
  - type: text
    content: 'On observe les coutumes '
  - type: note
    content: 1 R 16:25, 26.
  - type: text
    content: d’Omri
  - type: text
    content: 'Et toute la manière d’agir de la maison '
  - type: note
    content: 1 R 16:30, etc.
  - type: text
    content: d’Achab,
  - type: text
    content: Et vous marchez d’après leurs conseils;
  - type: text
    content: C’est pourquoi je te livrerai à la destruction,
  - type: text
    content: Je ferai de tes habitants un sujet de raillerie,
  - type: text
    content: Et vous porterez l’opprobre de mon peuple.
  '2':
  - type: text
    content: Écoutez, montagnes, le procès de l’Éternel,
  - type: text
    content: Et vous, solides fondements de la terre!
  - type: text
    content: 'Car '
  - type: note
    content: Os 4:1.
  - type: text
    content: l’Éternel a un procès avec son peuple,
  - type: text
    content: Il veut plaider avec Israël.
  '3':
  - type: text
    content: Mon peuple, que t’ai-je fait?
  - type: text
    content: En quoi t’ai-je fatigué?
  - type: text
    content: Réponds-moi!
  '4':
  - type: text
    content: 'Car je t’ai fait monter du pays '
  - type: note
    content: Ex 12:51; 14:30.
  - type: text
    content: d’Égypte,
  - type: text
    content: Je t’ai délivré de la maison de servitude,
  - type: text
    content: Et j’ai envoyé devant toi Moïse, Aaron et Marie.
  '5':
  - type: text
    content: 'Mon peuple, rappelle-toi ce que projetait '
  - type: note
    content: No 22:5; 23:7.
  - type: text
    content: Balak, roi de Moab,
  - type: text
    content: Et ce que lui répondit Balaam, fils de Beor,
  - type: text
    content: 'De '
  - type: note
    content: No 25.
  - type: text
    content: 'Sittim à '
  - type: note
    content: Jos 5.
  - type: text
    content: Guilgal,
  - type: text
    content: Afin que tu reconnaisses les bienfaits de l’Éternel.
  - type: heading
    content: 'V. 6-8: cf. Ps 50:7, etc.; 51:18, 19. És 1:11-19. Os 6:6.'
  '6':
  - type: text
    content: Avec quoi me présenterai-je devant l’Éternel,
  - type: text
    content: Pour m’humilier devant le Dieu Très-Haut?
  - type: text
    content: Me présenterai-je avec des holocaustes,
  - type: text
    content: Avec des veaux d’un an?
  '7':
  - type: text
    content: L’Éternel agréera-t-il des milliers de béliers,
  - type: text
    content: Des myriades de torrents d’huile?
  - type: text
    content: Donnerai-je pour mes transgressions mon premier-né,
  - type: text
    content: Pour le péché de mon âme le fruit de mes entrailles?
  '8':
  - type: text
    content: On t’a fait connaître, ô homme, ce qui est bien;
  - type: note
    content: De 10:12.
  - type: text
    content: Et ce que l’Éternel demande de toi,
  - type: text
    content: C’est que tu pratiques la justice,
  - type: text
    content: Que tu aimes la miséricorde,
  - type: text
    content: Et que tu marches humblement avec ton Dieu.
  - type: heading
    content: 'V. 9-16: cf. (Am 8:4-8; 5:11-13.) 1 R 9:6-9.'
  '9':
  - type: text
    content: La voix de l’Éternel crie à la ville,
  - type: text
    content: Et celui qui est sage craindra ton nom.
  - type: text
    content: Entendez la verge et celui qui l’envoie!
