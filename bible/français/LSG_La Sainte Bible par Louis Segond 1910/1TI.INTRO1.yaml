type_code: fra
verses:
  '1':
  - type: text
    content: INTRODUCTION À LA PREMIÈRE ÉPÎTRE À TIMOTHÉE
  - type: text
    content: (Ac 20:28.)
  - type: text
    content: 'Dans l’introduction générale au Nouveau Testament, 13 des 21 épîtres ont été attribuées à l’apôtre Paul. Parmi elles, 4 sont adressées à des individus: 1 et 2 Timothée, Tite et Philémon.'
  - type: text
    content: En dehors de l’épître à Philémon qui traite d’une question particulière (voir l’introduction à cette épître), les deux épîtres à Timothée et celle à Tite offrent un caractère commun. Elles sont qualifiées de pastorales. Cette dénomination devenue traditionnelle depuis le XVIII
  - type: text
    content: e
  - type: text
    content: ' siècle en souligne la caractéristique d’écrits qui contiennent des directives relatives au ministère du pasteur.'
  - type: text
    content: 'Voici la structure de 1 Timothée:'
  - type: text
    content: '1. Adresse et salutations '
  - type: text
    content: 1:1-2
  - type: text
    content: '2. Mise en garde contre les fausses doctrines '
  - type: text
    content: 1:3-20
  - type: text
    content: '3. Instruction concernant la prière et les devoirs des femmes '
  - type: text
    content: 2:1-15
  - type: text
    content: '4. Les devoirs des évêques et des diacres '
  - type: text
    content: 3:1–5:2
  - type: text
    content: '5. Les devoirs envers les fidèles: veuves, anciens, serviteurs '
  - type: text
    content: 5:3–6:16
  - type: text
    content: '6. Recommandations conclusives '
  - type: text
    content: 6:17-21
  - type: text
    content: L’auteur, l’apôtre Paul, instruit Timothée (comme ailleurs Tite), qu’il considère comme son fils dans la foi (1 Tim 1:2, idem pour Tite 1:4), sur la direction à encourager dans les communautés chrétiennes dont il a la charge pastorale.
  - type: text
    content: Une parenté littéraire et théologique indéniable entre les trois épîtres y fait ressortir le soucis de l’auteur d’emmener ses ex-disciples, futurs pasteurs et chefs d’Églises, à assumer leur charge dans la pureté doctrinale et la droiture morale en se présentant comme modèles de chrétiens dans leurs communautés respectives. Paul s’y érige aussi contre les fausses doctrines et les faux docteurs gnostiques (1 Tim 4:1-10, voir 2 Tim 2:14-21 et Tite 3:8-11) et le libertinage (1 Tim 6:3-10, voir 2 Tim 3:1-9 et Tite 1:10-16).
  - type: text
    content: Timothée est né à Lystres, en Asie Mineure de père grec mais païen et de mère juive mais chrétienne (Act 16:16). Il choisit la voie de sa mère, et les chrétiens de Lystre rendaient de lui un bon témoignage. Paul se prit donc rapidement d’affection pour lui et le circoncit à cause des Juifs (Act 16:1-4). Il en fit d’abord un disciple, puis un collaborateur, voire son représentant dans diverses missions (Act 16:3; 20:4; Rom 16:21; 2 Cor 1:1; Col 1:1; Phm 1; 1 Th 1:1).
  - type: text
    content: 'La particularité de 1 Timothée réside dans sa longueur: 6 chapitres (4 pour 2 Timothée et 3 pour Tite). Comme ses proches, elle traite des problèmes de communauté en général liés au ministère pastoral. Toutefois elles se distinguent l’une de l’autre, ce qui justifie leur présence dans le Nouveau Testament.'
  - type: text
    content: '1 Timothée comporte des consignes adressées à un pasteur et relatives à la conduite à tenir dans une communauté menacée par des fausses doctrines et leur propagateurs. De là, les rôles que doivent jouer les différents protagonistes de l’Église: les apôtres et leurs délégués (évêques, anciens ou surveillants), les diacres, les presbytres: '
  - type: text
    content: «Déclare ces choses, et enseigne-les. Que personne ne méprise ta jeunesse, mais sois un modèle pour les fidèles, en parole, en conduite, en amour, en foi, en pureté»
  - type: text
    content: ' (voir 1 Tim 4:11-22).'
  - type: text
    content: La question de l’auteur de cette épître et des autres pastorales se pose. Est-ce l’apôtre Paul comme l’indiquent les titres? Il est difficile de répondre positivement à cette question en regard des autres épîtres telles celles aux Romains, aux Corinthiens, aux Galates, dont l’authenticité paulinienne est incontestée. Le ton, le style littéraire, le vocabulaire et le souci de l’accent y font apparaître un prédicateur bondissant et retentissant, doué dans les démonstrations poignantes et courageuses, capable de tenir tête même au plus puissant des apôtres sortis de l’entourage immédiat de Jésus vivant (voir Gal 2:11-21).
  - type: text
    content: Dans 1 Timothée et les autres épîtres pastorales par contre, on découvre un auteur qui se montre soucieux d’ordre et de respect, un auteur qui s’exprime par des formules stéréotypées et liturgiques qui trahissent l’image d’un ressortissant d’une Église établie sur des bases institutionnelles.
  - type: text
    content: Dès lors, il paraît probable que l’auteur des pastorales soit un disciple de Paul qui, plus tard, a voulu préserver et honorer sa mémoire en actualisant son œuvre sous la forme d’un écrit pastoral au sein de communautés établies.
