document_id: JDG.20
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La tribu de Benjamin presque détruite par une guerre civile
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-18: cf. Jg 19:15-30. Jos 22:11, etc. Lé 18:20, 24-30.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tous les enfants d’Israël sortirent, depuis Dan jusqu’à Beer-Schéba et au pays de Galaad, et l’assemblée se réunit comme un seul homme devant l’Éternel, à Mitspa. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Les chefs de tout le peuple, toutes les tribus d’Israël, se présentèrent dans l’assemblée du peuple de Dieu: quatre cent mille hommes de pied, tirant l’épée. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Et les fils de Benjamin apprirent que les enfants d’Israël étaient montés à Mitspa. Les enfants d’Israël dirent: Parlez, comment ce crime a-t-il été commis? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Alors le Lévite, le mari de la femme qui avait été tuée, prit la parole, et dit: J’étais arrivé, avec ma concubine, à Guibea de Benjamin, pour y passer la nuit. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Les habitants de Guibea se sont soulevés contre moi, et ont entouré pendant la nuit la maison où j’étais. Ils avaient l’intention de me tuer, et ils ont fait violence à ma concubine, et elle est morte. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'J’ai saisi ma concubine, et je l’ai coupée en morceaux, que j’ai envoyés dans tout le territoire de l’héritage d’Israël; car ils ont commis un crime et une infamie en Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Vous voici tous, enfants d’Israël; consultez-vous, et prenez ici une décision! '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tout le peuple se leva comme un seul homme, en disant: Nul de nous n’ira dans sa tente, et personne ne retournera dans sa maison. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Voici maintenant ce que nous ferons à Guibea: Nous marcherons contre elle d’après le sort. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nous prendrons dans toutes les tribus d’Israël dix hommes sur cent, cent sur mille, et mille sur dix mille; ils iront chercher des vivres pour le peuple, afin qu’à leur retour on traite Guibea de Benjamin selon toute l’infamie qu’elle a commise en Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ainsi tous les hommes d’Israël s’assemblèrent contre la ville, unis comme un seul homme. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Les tribus d’Israël envoyèrent des hommes vers toutes les familles de Benjamin, pour dire: Qu’est-ce que ce crime qui s’est commis parmi vous? '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Livrez maintenant '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jg 19:22
      metadata:
        usfm: JDG.19.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'les gens pervers qui sont à Guibea, afin que nous les fassions mourir et que nous ôtions le mal du milieu d’Israël. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Os 9:9
      metadata:
        usfm: HOS.9.9
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 10:9
      metadata:
        usfm: HOS.10.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Mais les Benjamites ne voulurent point écouter la voix de leurs frères, les enfants d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Les Benjamites sortirent de leurs villes, et s’assemblèrent à Guibea, pour combattre les enfants d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Le dénombrement que l’on fit en ce jour des Benjamites sortis des villes fut de vingt-six mille hommes, tirant l’épée, sans compter les habitants de Guibea formant sept cents hommes d’élite. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Parmi tout ce peuple, il y avait sept cents hommes d’élite '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jg 3:15
      metadata:
        usfm: JDG.3.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qui ne se servaient pas de la main droite; tous ceux-là pouvaient, en lançant une pierre avec la fronde, viser à un cheveu sans le manquer. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'On fit aussi le dénombrement des hommes d’Israël, non compris ceux de Benjamin, et l’on en trouva quatre cent mille tirant l’épée, tous gens de guerre. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Et les enfants d’Israël se levèrent, montèrent à Béthel, et consultèrent Dieu, en disant: Qui de nous montera le premier pour combattre les fils de Benjamin? L’Éternel répondit: Juda montera le premier.'
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 19-48: cf. De 13:12-18. Jos 8:1-29.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dès le matin, les enfants d’Israël se mirent en marche, et ils campèrent près de Guibea. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Et les hommes d’Israël s’avancèrent pour combattre ceux de Benjamin, et ils se rangèrent en bataille contre eux devant Guibea. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Les fils de Benjamin sortirent de Guibea, et ils étendirent sur le sol ce jour-là vingt-deux mille hommes d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Le peuple, les hommes d’Israël reprirent courage, et ils se rangèrent de nouveau en bataille dans le lieu où ils s’étaient placés le premier jour. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Et les enfants d’Israël montèrent, et ils pleurèrent devant l’Éternel jusqu’au soir; ils consultèrent l’Éternel, en disant: Dois-je m’avancer encore pour combattre les fils de Benjamin, mon frère? L’Éternel répondit: Montez contre lui. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Les enfants d’Israël s’avancèrent contre les fils de Benjamin, le second jour. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Et ce même jour, les Benjamites sortirent de Guibea à leur rencontre, et ils étendirent encore sur le sol dix-huit mille hommes des enfants d’Israël, tous tirant l’épée. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Tous les enfants d’Israël et tout le peuple montèrent et vinrent à Béthel; ils pleurèrent et restèrent là devant l’Éternel, ils jeûnèrent en ce jour jusqu’au soir, et ils offrirent des holocaustes et des sacrifices d’actions de grâces devant l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Et les enfants d’Israël consultèrent l’Éternel, c’était là que se trouvait alors l’arche de l’alliance de Dieu, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'et c’était Phinées, fils d’Éléazar, fils d’Aaron, qui se tenait à cette époque en présence de Dieu, et ils dirent: Dois-je marcher encore pour combattre les fils de Benjamin, mon frère, ou dois-je m’en abstenir? L’Éternel répondit: Montez, car demain je les livrerai entre vos mains. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Alors Israël plaça '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 8:4
      metadata:
        usfm: JOS.8.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'une embuscade autour de Guibea. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Les enfants d’Israël montèrent contre les fils de Benjamin, le troisième jour, et ils se rangèrent en bataille devant Guibea, comme les autres fois. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Et les fils de Benjamin sortirent à la rencontre du peuple, et ils se laissèrent attirer loin de la ville. Ils commencèrent à frapper à mort parmi le peuple comme les autres fois, sur les routes dont l’une monte à Béthel et l’autre à Guibea par la campagne, et ils tuèrent environ trente hommes d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Les fils de Benjamin disaient: Les voilà battus devant nous comme auparavant! Mais les enfants d’Israël disaient: Fuyons, et attirons-les loin de la ville dans les chemins. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Tous les hommes d’Israël quittèrent leur position, et se rangèrent à Baal-Thamar; et l’embuscade d’Israël s’élança du lieu où elle était, de Maaré-Guibea. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Dix mille hommes choisis sur tout Israël arrivèrent devant Guibea. Le combat fut rude, et les Benjamites ne se doutaient pas du désastre qu’ils allaient éprouver. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'L’Éternel battit Benjamin devant Israël, et les enfants d’Israël tuèrent ce jour-là vingt-cinq mille et cent hommes de Benjamin, tous tirant l’épée. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Les fils de Benjamin regardaient comme battus les hommes d’Israël, qui cédaient du terrain à Benjamin et se reposaient sur l’embuscade qu’ils avaient placée contre Guibea. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Les gens en embuscade se jetèrent promptement sur Guibea, ils se portèrent en avant et frappèrent toute la ville du tranchant de l’épée. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Suivant un signal convenu avec les hommes d’Israël, ceux de l’embuscade devaient faire monter de la ville une épaisse fumée. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Les hommes d’Israël firent alors volte-face dans la bataille. Les Benjamites leur avaient tué déjà environ trente hommes, et ils disaient: Certainement les voilà battus devant nous comme dans le premier combat! '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Cependant une épaisse colonne de fumée commençait à s’élever de la ville. Les Benjamites regardèrent derrière eux; et voici, de la ville entière les flammes montaient vers le ciel. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Les hommes d’Israël avaient fait volte-face; et ceux de Benjamin furent épouvantés, en voyant le désastre qui allait les atteindre. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ils tournèrent le dos devant les hommes d’Israël, et s’enfuirent par le chemin du désert. Mais les assaillants s’attachèrent à leurs pas, et ils détruisirent pendant le trajet ceux qui étaient sortis des villes. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Ils enveloppèrent Benjamin, le poursuivirent, l’écrasèrent dès qu’il voulait se reposer, jusqu’en face de Guibea du côté du soleil levant. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Il tomba dix-huit mille hommes de Benjamin, tous vaillants. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Parmi ceux qui tournèrent le dos pour s’enfuir vers le désert au rocher de Rimmon, les hommes d’Israël en firent périr cinq mille sur les routes; ils les poursuivirent jusqu’à Guideom, et ils en tuèrent deux mille. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Le nombre total des Benjamites qui périrent ce jour-là fut de vingt-cinq mille hommes tirant l’épée, tous vaillants. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Six cents hommes, qui avaient tourné le dos et qui s’étaient enfuis vers le désert au '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jg 21:13
      metadata:
        usfm: JDG.21.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'rocher de Rimmon, demeurèrent là pendant quatre mois. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: Les hommes d’Israël revinrent vers les fils de Benjamin, et ils les frappèrent du tranchant de l’épée, depuis les hommes des villes jusqu’au bétail, et tout ce que l’on trouva. Ils mirent aussi le feu à toutes les villes qui existaient.
