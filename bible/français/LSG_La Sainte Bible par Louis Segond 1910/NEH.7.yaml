document_id: NEH.7
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dénombrement des Israélites qui revinrent au pays de Juda sous la conduite de Zorobabel
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-73: cf. Esd 2. Ps 123:1-4.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Lorsque la muraille fut rebâtie et que j’eus posé les battants des portes, on établit dans leurs fonctions les portiers, les chantres et les Lévites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Je donnai mes ordres à Hanani, mon frère, et à Hanania, chef de la citadelle de Jérusalem, homme supérieur au grand nombre par sa fidélité et par sa crainte de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Je leur dis: Les portes de Jérusalem ne s’ouvriront pas avant que la chaleur du soleil soit venue, et l’on fermera les battants aux verrous en votre présence; les habitants de Jérusalem feront la garde, chacun à son poste devant sa maison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'La ville était spacieuse et grande, mais peu peuplée, et les maisons n’étaient pas bâties. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mon Dieu me mit au cœur d’assembler les grands, les magistrats et le peuple, pour en faire le dénombrement. Je trouvai un registre généalogique de ceux qui étaient montés les premiers, et j’y vis écrit ce qui suit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Esd 2:1, etc.
    marker-yv: yv-n
  - type: text
    text: 'Voici ceux de la province qui revinrent de l’exil, ceux que Nebucadnetsar, roi de Babylone, avait emmenés captifs, et qui retournèrent à Jérusalem et en Juda, chacun dans sa ville. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ils partirent avec Zorobabel, Josué, Néhémie, Azaria, Raamia, Nachamani, Mardochée, Bilschan, Mispéreth, Bigvaï, Nehum, Baana. Nombre des hommes du peuple d’Israël: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'les fils de Pareosch, deux mille cent soixante-douze; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'les fils de Schephathia, trois cent soixante-douze; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'les fils d’Arach, six cent cinquante-deux; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'les fils de Pachath-Moab, des fils de Josué et de Joab, deux mille huit cent dix-huit; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'les fils d’Élam, mille deux cent cinquante-quatre; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'les fils de Zatthu, huit cent quarante-cinq; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'les fils de Zaccaï, sept cent soixante; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'les fils de Binnuï, six cent quarante-huit; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'les fils de Bébaï, six cent vingt-huit; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'les fils d’Azgad, deux mille trois cent vingt-deux; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'les fils d’Adonikam, six cent soixante-sept; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'les fils de Bigvaï, deux mille soixante-sept; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'les fils d’Adin, six cent cinquante-cinq; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'les fils d’Ather, de la famille d’Ézéchias, quatre-vingt-dix-huit; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'les fils de Haschum, trois cent vingt-huit; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'les fils de Betsaï, trois cent vingt-quatre; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'les fils de Hariph, cent douze; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'les fils de Gabaon, quatre-vingt-quinze; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'les gens de Bethléhem et de Netopha, cent quatre-vingt-huit; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'les gens d’Anathoth, cent vingt-huit; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'les gens de Beth-Azmaveth, quarante-deux; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'les gens de Kirjath-Jearim, de Kephira et de Beéroth, sept cent quarante-trois; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'les gens de Rama et de Guéba, six cent vingt et un; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'les gens de Micmas, cent vingt-deux; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'les gens de Béthel et d’Aï, cent vingt-trois; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'les gens de l’autre Nebo, cinquante-deux; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'les fils de l’autre Élam, mille deux cent cinquante-quatre; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'les fils de Harim, trois cent vingt; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'les fils de Jéricho, trois cent quarante-cinq; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'les fils de Lod, de Hadid et d’Ono, sept cent vingt et un; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'les fils de Senaa, trois mille neuf cent trente. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Sacrificateurs: les fils de Jedaeja, de la maison de Josué, neuf cent soixante-treize; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'les fils d’Immer, mille cinquante-deux; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'les fils de Paschhur, mille deux cent quarante-sept; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'les fils de Harim, mille dix-sept. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Lévites: les fils de Josué et de Kadmiel, des fils d’Hodva, soixante-quatorze. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Chantres: les fils d’Asaph, cent quarante-huit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Portiers: les fils de Schallum, les fils d’Ather, les fils de Thalmon, les fils d’Akkub, les fils de Hathitha, les fils de Schobaï, cent trente-huit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Néthiniens: les fils de Tsicha, les fils de Hasupha, les fils de Thabbaoth, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'les fils de Kéros, les fils de Sia, les fils de Padon, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'les fils de Lebana, les fils de Hagaba, les fils de Salmaï, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'les fils de Hanan, les fils de Guiddel, les fils de Gachar, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'les fils de Reaja, les fils de Retsin, les fils de Nekoda, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'les fils de Gazzam, les fils d’Uzza, les fils de Paséach, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'les fils de Bésaï, les fils de Mehunim, les fils de Nephischsim, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'les fils de Bakbuk, les fils de Hakupha, les fils de Harhur, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'les fils de Batslith, les fils de Mehida, les fils de Harscha, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'les fils de Barkos, les fils de Sisera, les fils de Thamach, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'les fils de Netsiach, les fils de Hathipha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Fils des serviteurs de Salomon: les fils de Sothaï, les fils de Sophéreth, les fils de Perida, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'les fils de Jaala, les fils de Darkon, les fils de Guiddel, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'les fils de Schephathia, les fils de Hatthil, les fils de Pokéreth-Hatsebaïm, les fils d’Amon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'Total des Néthiniens et des fils des serviteurs de Salomon: trois cent quatre-vingt-douze. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'Voici ceux qui partirent de Thel-Mélach, de Thel-Harscha, de Kerub-Addon, et d’Immer, et qui ne purent pas faire connaître leur maison paternelle et leur race, pour prouver qu’ils étaient d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'Les fils de Delaja, les fils de Tobija, les fils de Nekoda, six cent quarante-deux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'Et parmi les sacrificateurs: les fils de Hobaja, les fils d’Hakkots, les fils de Barzillaï, qui avait pris pour femme une des filles de Barzillaï, le Galaadite, et fut appelé de leur nom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'Ils cherchèrent leurs titres généalogiques, mais ils ne les trouvèrent point. On les exclut du sacerdoce, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: 'et le gouverneur leur dit de ne pas manger des choses très saintes jusqu’à ce qu’un sacrificateur eût consulté l’urim et le thummim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: 'L’assemblée tout entière était de quarante-deux mille trois cent soixante personnes, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: 'sans compter leurs serviteurs et leurs servantes, au nombre de sept mille trois cent trente-sept. Parmi eux se trouvaient deux cent quarante-cinq chantres et chanteuses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: text
    text: 'Ils avaient sept cent trente-six chevaux, deux cent quarante-cinq mulets, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '69'
  - type: text
    text: 'quatre cent trente-cinq chameaux, et six mille sept cent vingt ânes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '70'
  - type: text
    text: 'Plusieurs des chefs de famille firent des dons pour l’œuvre. Le gouverneur donna au trésor mille dariques d’or, cinquante coupes, cinq cent trente tuniques sacerdotales. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '71'
  - type: text
    text: 'Les chefs de familles donnèrent au trésor de l’œuvre vingt mille dariques d’or et deux mille deux cents mines d’argent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '72'
  - type: text
    text: 'Le reste du peuple donna vingt mille dariques d’or, deux mille mines d’argent, et soixante-sept tuniques sacerdotales. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '73'
  - type: text
    text: Les sacrificateurs et les Lévites, les portiers, les chantres, les gens du peuple, les Néthiniens et tout Israël s’établirent dans leurs villes.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Lecture solennelle de la loi
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-8: cf. De 31:9-13. 2 Ti 2:2.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: Le septième mois arriva, et les enfants d’Israël étaient dans leurs villes.
