document_id: NEH.7,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Dénombrement des Israélites qui revinrent au pays de Juda sous la conduite de Zorobabel
  - type: heading
    content: 'V. 1-73: cf. Esd 2. Ps 123:1-4.'
  - type: text
    content: 'Lorsque la muraille fut rebâtie et que j’eus posé les battants des portes, on établit dans leurs fonctions les portiers, les chantres et les Lévites. '
  '10':
  - type: text
    content: 'les fils d’Arach, six cent cinquante-deux; '
  '11':
  - type: text
    content: 'les fils de Pachath-Moab, des fils de Josué et de Joab, deux mille huit cent dix-huit; '
  '12':
  - type: text
    content: 'les fils d’Élam, mille deux cent cinquante-quatre; '
  '13':
  - type: text
    content: 'les fils de Zatthu, huit cent quarante-cinq; '
  '14':
  - type: text
    content: 'les fils de Zaccaï, sept cent soixante; '
  '15':
  - type: text
    content: 'les fils de Binnuï, six cent quarante-huit; '
  '16':
  - type: text
    content: 'les fils de Bébaï, six cent vingt-huit; '
  '17':
  - type: text
    content: 'les fils d’Azgad, deux mille trois cent vingt-deux; '
  '18':
  - type: text
    content: 'les fils d’Adonikam, six cent soixante-sept; '
  '19':
  - type: text
    content: 'les fils de Bigvaï, deux mille soixante-sept; '
  '2':
  - type: text
    content: 'Je donnai mes ordres à Hanani, mon frère, et à Hanania, chef de la citadelle de Jérusalem, homme supérieur au grand nombre par sa fidélité et par sa crainte de Dieu. '
  '20':
  - type: text
    content: 'les fils d’Adin, six cent cinquante-cinq; '
  '21':
  - type: text
    content: 'les fils d’Ather, de la famille d’Ézéchias, quatre-vingt-dix-huit; '
  '22':
  - type: text
    content: 'les fils de Haschum, trois cent vingt-huit; '
  '23':
  - type: text
    content: 'les fils de Betsaï, trois cent vingt-quatre; '
  '24':
  - type: text
    content: 'les fils de Hariph, cent douze; '
  '25':
  - type: text
    content: 'les fils de Gabaon, quatre-vingt-quinze; '
  '26':
  - type: text
    content: 'les gens de Bethléhem et de Netopha, cent quatre-vingt-huit; '
  '27':
  - type: text
    content: 'les gens d’Anathoth, cent vingt-huit; '
  '28':
  - type: text
    content: 'les gens de Beth-Azmaveth, quarante-deux; '
  '29':
  - type: text
    content: 'les gens de Kirjath-Jearim, de Kephira et de Beéroth, sept cent quarante-trois; '
  '3':
  - type: text
    content: 'Je leur dis: Les portes de Jérusalem ne s’ouvriront pas avant que la chaleur du soleil soit venue, et l’on fermera les battants aux verrous en votre présence; les habitants de Jérusalem feront la garde, chacun à son poste devant sa maison. '
  '30':
  - type: text
    content: 'les gens de Rama et de Guéba, six cent vingt et un; '
  '31':
  - type: text
    content: 'les gens de Micmas, cent vingt-deux; '
  '32':
  - type: text
    content: 'les gens de Béthel et d’Aï, cent vingt-trois; '
  '33':
  - type: text
    content: 'les gens de l’autre Nebo, cinquante-deux; '
  '34':
  - type: text
    content: 'les fils de l’autre Élam, mille deux cent cinquante-quatre; '
  '35':
  - type: text
    content: 'les fils de Harim, trois cent vingt; '
  '36':
  - type: text
    content: 'les fils de Jéricho, trois cent quarante-cinq; '
  '37':
  - type: text
    content: 'les fils de Lod, de Hadid et d’Ono, sept cent vingt et un; '
  '38':
  - type: text
    content: 'les fils de Senaa, trois mille neuf cent trente. '
  '39':
  - type: text
    content: 'Sacrificateurs: les fils de Jedaeja, de la maison de Josué, neuf cent soixante-treize; '
  '4':
  - type: text
    content: 'La ville était spacieuse et grande, mais peu peuplée, et les maisons n’étaient pas bâties. '
  '40':
  - type: text
    content: 'les fils d’Immer, mille cinquante-deux; '
  '41':
  - type: text
    content: 'les fils de Paschhur, mille deux cent quarante-sept; '
  '42':
  - type: text
    content: 'les fils de Harim, mille dix-sept. '
  '43':
  - type: text
    content: 'Lévites: les fils de Josué et de Kadmiel, des fils d’Hodva, soixante-quatorze. '
  '44':
  - type: text
    content: 'Chantres: les fils d’Asaph, cent quarante-huit. '
  '45':
  - type: text
    content: 'Portiers: les fils de Schallum, les fils d’Ather, les fils de Thalmon, les fils d’Akkub, les fils de Hathitha, les fils de Schobaï, cent trente-huit. '
  '46':
  - type: text
    content: 'Néthiniens: les fils de Tsicha, les fils de Hasupha, les fils de Thabbaoth, '
  '47':
  - type: text
    content: 'les fils de Kéros, les fils de Sia, les fils de Padon, '
  '48':
  - type: text
    content: 'les fils de Lebana, les fils de Hagaba, les fils de Salmaï, '
  '49':
  - type: text
    content: 'les fils de Hanan, les fils de Guiddel, les fils de Gachar, '
  '5':
  - type: text
    content: 'Mon Dieu me mit au cœur d’assembler les grands, les magistrats et le peuple, pour en faire le dénombrement. Je trouvai un registre généalogique de ceux qui étaient montés les premiers, et j’y vis écrit ce qui suit. '
  '50':
  - type: text
    content: 'les fils de Reaja, les fils de Retsin, les fils de Nekoda, '
  '51':
  - type: text
    content: 'les fils de Gazzam, les fils d’Uzza, les fils de Paséach, '
  '52':
  - type: text
    content: 'les fils de Bésaï, les fils de Mehunim, les fils de Nephischsim, '
  '53':
  - type: text
    content: 'les fils de Bakbuk, les fils de Hakupha, les fils de Harhur, '
  '54':
  - type: text
    content: 'les fils de Batslith, les fils de Mehida, les fils de Harscha, '
  '55':
  - type: text
    content: 'les fils de Barkos, les fils de Sisera, les fils de Thamach, '
  '56':
  - type: text
    content: 'les fils de Netsiach, les fils de Hathipha. '
  '57':
  - type: text
    content: 'Fils des serviteurs de Salomon: les fils de Sothaï, les fils de Sophéreth, les fils de Perida, '
  '58':
  - type: text
    content: 'les fils de Jaala, les fils de Darkon, les fils de Guiddel, '
  '59':
  - type: text
    content: 'les fils de Schephathia, les fils de Hatthil, les fils de Pokéreth-Hatsebaïm, les fils d’Amon. '
  '6':
  - type: note
    content: Esd 2:1, etc.
  - type: text
    content: 'Voici ceux de la province qui revinrent de l’exil, ceux que Nebucadnetsar, roi de Babylone, avait emmenés captifs, et qui retournèrent à Jérusalem et en Juda, chacun dans sa ville. '
  '60':
  - type: text
    content: 'Total des Néthiniens et des fils des serviteurs de Salomon: trois cent quatre-vingt-douze. '
  '61':
  - type: text
    content: 'Voici ceux qui partirent de Thel-Mélach, de Thel-Harscha, de Kerub-Addon, et d’Immer, et qui ne purent pas faire connaître leur maison paternelle et leur race, pour prouver qu’ils étaient d’Israël. '
  '62':
  - type: text
    content: 'Les fils de Delaja, les fils de Tobija, les fils de Nekoda, six cent quarante-deux. '
  '63':
  - type: text
    content: 'Et parmi les sacrificateurs: les fils de Hobaja, les fils d’Hakkots, les fils de Barzillaï, qui avait pris pour femme une des filles de Barzillaï, le Galaadite, et fut appelé de leur nom. '
  '64':
  - type: text
    content: 'Ils cherchèrent leurs titres généalogiques, mais ils ne les trouvèrent point. On les exclut du sacerdoce, '
  '65':
  - type: text
    content: 'et le gouverneur leur dit de ne pas manger des choses très saintes jusqu’à ce qu’un sacrificateur eût consulté l’urim et le thummim. '
  '66':
  - type: text
    content: 'L’assemblée tout entière était de quarante-deux mille trois cent soixante personnes, '
  '67':
  - type: text
    content: 'sans compter leurs serviteurs et leurs servantes, au nombre de sept mille trois cent trente-sept. Parmi eux se trouvaient deux cent quarante-cinq chantres et chanteuses. '
  '68':
  - type: text
    content: 'Ils avaient sept cent trente-six chevaux, deux cent quarante-cinq mulets, '
  '69':
  - type: text
    content: 'quatre cent trente-cinq chameaux, et six mille sept cent vingt ânes. '
  '7':
  - type: text
    content: 'Ils partirent avec Zorobabel, Josué, Néhémie, Azaria, Raamia, Nachamani, Mardochée, Bilschan, Mispéreth, Bigvaï, Nehum, Baana. Nombre des hommes du peuple d’Israël: '
  '70':
  - type: text
    content: 'Plusieurs des chefs de famille firent des dons pour l’œuvre. Le gouverneur donna au trésor mille dariques d’or, cinquante coupes, cinq cent trente tuniques sacerdotales. '
  '71':
  - type: text
    content: 'Les chefs de familles donnèrent au trésor de l’œuvre vingt mille dariques d’or et deux mille deux cents mines d’argent. '
  '72':
  - type: text
    content: 'Le reste du peuple donna vingt mille dariques d’or, deux mille mines d’argent, et soixante-sept tuniques sacerdotales. '
  '73':
  - type: text
    content: Les sacrificateurs et les Lévites, les portiers, les chantres, les gens du peuple, les Néthiniens et tout Israël s’établirent dans leurs villes.
  - type: heading
    content: Lecture solennelle de la loi
  - type: heading
    content: 'V. 1-8: cf. De 31:9-13. 2 Ti 2:2.'
  - type: text
    content: Le septième mois arriva, et les enfants d’Israël étaient dans leurs villes.
  '8':
  - type: text
    content: 'les fils de Pareosch, deux mille cent soixante-douze; '
  '9':
  - type: text
    content: 'les fils de Schephathia, trois cent soixante-douze; '
