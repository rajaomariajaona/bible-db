document_id: ACT.6,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Institution des diacres
  - type: heading
    content: 'V. 1-6: cf. Ex 18:13-26. 1 Ti 3:8-13.'
  - type: text
    content: 'En ce temps-là, le nombre des disciples augmentant, les Hellénistes murmurèrent contre les Hébreux, parce que leurs veuves étaient négligées dans la distribution qui se faisait chaque jour. '
  '10':
  - type: note
    content: Ex 4:12. És 54:17. Lu 21:15.
  - type: text
    content: 'mais ils ne pouvaient résister à sa sagesse et à l’Esprit par lequel il parlait. '
  '11':
  - type: note
    content: Mt 26:59.
  - type: text
    content: 'Alors ils subornèrent des hommes qui dirent: Nous l’avons entendu proférer des paroles blasphématoires contre Moïse et contre Dieu. '
  '12':
  - type: text
    content: 'Ils émurent le peuple, les anciens et les scribes, et, se jetant sur lui, ils le saisirent, et l’emmenèrent au sanhédrin. '
  '13':
  - type: text
    content: 'Ils produisirent de faux témoins, qui dirent: Cet homme ne cesse de proférer des paroles contre le lieu saint et contre la loi; '
  '14':
  - type: text
    content: 'car nous l’avons entendu dire que Jésus, ce Nazaréen, détruira ce lieu, et changera les coutumes que Moïse nous a données. '
  '15':
  - type: text
    content: Tous ceux qui siégeaient au sanhédrin ayant fixé les regards sur Étienne, son visage leur parut comme celui d’un ange.
  '2':
  - type: text
    content: 'Les douze convoquèrent la multitude des disciples, et dirent: '
  - type: note
    content: Ex 18:17.
  - type: text
    content: 'Il n’est pas convenable que nous laissions la parole de Dieu pour servir aux tables. '
  '3':
  - type: note
    content: De 1:13. Ac 1:21; 16:2. 1 Ti 3:7.
  - type: text
    content: 'C’est pourquoi, frères, choisissez parmi vous sept hommes, de qui l’on rende un bon témoignage, qui soient pleins d’Esprit-Saint et de sagesse, et que nous chargerons de cet emploi. '
  '4':
  - type: text
    content: 'Et nous, nous continuerons à nous appliquer à la prière et au ministère de la parole. '
  '5':
  - type: text
    content: 'Cette proposition plut à toute l’assemblée. Ils élurent Étienne, homme '
  - type: note
    content: Ac 11:24.
  - type: text
    content: 'plein de foi et d’Esprit-Saint, '
  - type: note
    content: Ac 21:8.
  - type: text
    content: 'Philippe, Prochore, Nicanor, Timon, Parménas, et Nicolas, prosélyte d’Antioche. '
  '6':
  - type: text
    content: 'Ils les présentèrent '
  - type: note
    content: Ac 1:23.
  - type: text
    content: 'aux apôtres, qui, après avoir prié, '
  - type: note
    content: Ac 8:17; 13:3. 1 Ti 4:14; 5:22. 2 Ti 1:6.
  - type: text
    content: leur imposèrent les mains.
  - type: heading
    content: Étienne accusé de blasphème, traduit devant le sanhédrin, et lapidé par les Juifs
  - type: heading
    content: 'V. 7-15: cf. Hé 2:4. Lu 21:14, 15. Jn 15:18-21.'
  '7':
  - type: text
    content: ' '
  - type: note
    content: Ac 19:20.
  - type: text
    content: 'La parole de Dieu se répandait de plus en plus, le nombre des disciples augmentait beaucoup à Jérusalem, et une grande foule de sacrificateurs obéissaient à la foi. '
  '8':
  - type: text
    content: 'Étienne, plein de grâce et de puissance, faisait des prodiges et de grands miracles parmi le peuple. '
  '9':
  - type: text
    content: 'Quelques membres de la synagogue dite des Affranchis, de celle des Cyrénéens et de celle des Alexandrins, avec des Juifs de Cilicie et d’Asie, se mirent à discuter avec lui; '
