document_id: 1TH.2,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Comment Paul a exercé son ministère parmi les Thessaloniciens
  - type: heading
    content: 'V. 1-12: cf. Ac 20:18-21, 31-35. (2 Co 4:1, 2, 5; 6:3-10; 12:12-15.)'
  - type: text
    content: ' '
  - type: note
    content: 1 Th 1:5, 9.
  - type: text
    content: 'Vous savez vous-mêmes, frères, que notre arrivée chez vous n’a pas été sans résultat. '
  '10':
  - type: text
    content: 'Vous êtes témoins, et Dieu l’est aussi, que nous avons eu envers vous qui croyez une conduite sainte, juste et irréprochable. '
  '11':
  - type: text
    content: 'Vous savez aussi que nous avons été pour chacun de vous ce qu’un père est pour ses enfants, '
  '12':
  - type: text
    content: 'vous exhortant, vous consolant, '
  - type: note
    content: Ge 17:1. 1 Co 7:20. Ép 4:1. Ph 1:27. Col 1:10.
  - type: text
    content: vous conjurant de marcher d’une manière digne de Dieu, qui vous appelle à son royaume et à sa gloire.
  - type: heading
    content: 'V. 13-16: cf. (1 Th 1:6-10. 2 Th 1:4, 5.) Mt 23:29-38.'
  '13':
  - type: text
    content: 'C’est pourquoi nous rendons continuellement grâces à Dieu de ce qu’en recevant la parole de Dieu, que nous vous avons fait entendre, vous l’avez reçue, non comme la parole des hommes, mais, ainsi qu’elle l’est véritablement, comme la parole de Dieu, qui agit en vous qui croyez. '
  '14':
  - type: text
    content: 'Car vous, frères, vous êtes devenus les imitateurs des Églises de Dieu qui sont en Jésus-Christ dans la Judée, parce que vous aussi, vous avez souffert de la part de vos '
  - type: note
    content: Ac 17:5, 13.
  - type: text
    content: 'propres compatriotes les mêmes maux qu’elles ont soufferts de la part des Juifs. '
  '15':
  - type: note
    content: Ac 7:52.
  - type: text
    content: 'Ce sont ces Juifs qui ont fait mourir le Seigneur Jésus '
  - type: note
    content: Mt 23:37. Lu 13:34.
  - type: text
    content: 'et les prophètes, qui nous ont persécutés, qui ne plaisent point à Dieu, et qui sont ennemis de tous les hommes, '
  '16':
  - type: note
    content: Ac 17:13.
  - type: text
    content: nous empêchant de parler aux païens pour qu’ils soient sauvés, en sorte qu’ils ne cessent de mettre le comble à leurs péchés. Mais la colère a fini par les atteindre.
  - type: heading
    content: Désir qu’éprouve l’apôtre de revoir les Thessaloniciens
  - type: heading
    content: '2 v. 17 à 3 v. 5: cf. (Ro 1:9-13. 1 Th 3:9-11.) Ac 17:14-16; 14:22. Jn 16:1-4, 33.'
  '17':
  - type: text
    content: 'Pour nous, frères, après avoir été quelque temps séparés de vous, de corps mais non de cœur, nous avons eu d’autant plus ardemment le vif désir de vous voir. '
  '18':
  - type: note
    content: Ro 1:13; 15:22.
  - type: text
    content: 'Aussi voulions-nous aller vers vous, du moins moi Paul, une et même deux fois; mais Satan nous en a empêchés. '
  '19':
  - type: note
    content: 2 Co 1:14. Ph 2:16; 4:1.
  - type: text
    content: 'Qui est, en effet, notre espérance, ou notre joie, ou notre couronne de gloire? N’est-ce pas vous aussi, devant notre Seigneur Jésus, lors de son avènement? '
  '2':
  - type: text
    content: 'Après avoir souffert et reçu des outrages '
  - type: note
    content: Ac 16:22.
  - type: text
    content: 'à Philippes, comme vous le savez, nous prîmes de l’assurance en notre Dieu, pour '
  - type: note
    content: Ac 17:2.
  - type: text
    content: 'vous annoncer l’Évangile de Dieu, au milieu de bien des combats. '
  '20':
  - type: text
    content: Oui, vous êtes notre gloire et notre joie.
  '3':
  - type: text
    content: 'Car notre prédication ne repose ni sur l’erreur, ni sur des motifs impurs, ni sur la fraude; '
  '4':
  - type: text
    content: 'mais, selon que Dieu nous a jugés dignes de nous confier l’Évangile, ainsi nous parlons, '
  - type: note
    content: Ga 1:10.
  - type: text
    content: 'non comme pour plaire à des hommes, mais pour plaire à Dieu, qui sonde nos cœurs. '
  '5':
  - type: text
    content: 'Jamais, en effet, nous n’avons usé de paroles flatteuses, comme vous le savez; jamais nous n’avons eu la cupidité pour mobile, '
  - type: note
    content: Ro 1:9; 9:1. 2 Co 1:23; 11:31. Ga 1:20. Ph 1:8. 1 Ti 5:21. 2 Ti 4:1.
  - type: text
    content: 'Dieu en est témoin. '
  '6':
  - type: text
    content: 'Nous n’avons point cherché la gloire qui vient des hommes, ni de vous ni des autres; '
  - type: note
    content: 1 Co 9:3. 2 Th 3:9.
  - type: text
    content: 'nous aurions pu nous produire avec autorité comme apôtres de Christ, '
  '7':
  - type: text
    content: 'mais nous avons été pleins de douceur au milieu de vous. De même qu’une nourrice prend un tendre soin de ses enfants, '
  '8':
  - type: text
    content: 'nous aurions voulu, dans notre vive affection pour vous, non seulement vous donner l’Évangile de Dieu, mais encore nos propres vies, tant vous nous étiez devenus chers. '
  '9':
  - type: note
    content: Ac 18:3; 20:34. 1 Co 4:12. 2 Co 11:9; 12:13. 2 Th 3:8.
  - type: text
    content: 'Vous vous rappelez, frères, notre travail et notre peine: nuit et jour à l’œuvre, pour n’être à charge à aucun de vous, nous vous avons prêché l’Évangile de Dieu. '
