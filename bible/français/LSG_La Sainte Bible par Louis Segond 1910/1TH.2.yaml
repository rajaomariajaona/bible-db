document_id: 1TH.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Comment Paul a exercé son ministère parmi les Thessaloniciens
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-12: cf. Ac 20:18-21, 31-35. (2 Co 4:1, 2, 5; 6:3-10; 12:12-15.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 1:5
      metadata:
        usfm: 1TH.1.5
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '9'
      metadata:
        usfm: 1TH.1.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Vous savez vous-mêmes, frères, que notre arrivée chez vous n’a pas été sans résultat. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Après avoir souffert et reçu des outrages '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 16:22
      metadata:
        usfm: ACT.16.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'à Philippes, comme vous le savez, nous prîmes de l’assurance en notre Dieu, pour '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 17:2
      metadata:
        usfm: ACT.17.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'vous annoncer l’Évangile de Dieu, au milieu de bien des combats. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Car notre prédication ne repose ni sur l’erreur, ni sur des motifs impurs, ni sur la fraude; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'mais, selon que Dieu nous a jugés dignes de nous confier l’Évangile, ainsi nous parlons, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 1:10
      metadata:
        usfm: GAL.1.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'non comme pour plaire à des hommes, mais pour plaire à Dieu, qui sonde nos cœurs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Jamais, en effet, nous n’avons usé de paroles flatteuses, comme vous le savez; jamais nous n’avons eu la cupidité pour mobile, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 1:9
      metadata:
        usfm: ROM.1.9
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 9:1
      metadata:
        usfm: ROM.9.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 1:23
      metadata:
        usfm: 2CO.1.23
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 11:31
      metadata:
        usfm: 2CO.11.31
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 1:20
      metadata:
        usfm: GAL.1.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 1:8
      metadata:
        usfm: PHP.1.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 5:21
      metadata:
        usfm: 1TI.5.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ti 4:1
      metadata:
        usfm: 2TI.4.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Dieu en est témoin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nous n’avons point cherché la gloire qui vient des hommes, ni de vous ni des autres; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 9:3
      metadata:
        usfm: 1CO.9.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Th 3:9
      metadata:
        usfm: 2TH.3.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'nous aurions pu nous produire avec autorité comme apôtres de Christ, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'mais nous avons été pleins de douceur au milieu de vous. De même qu’une nourrice prend un tendre soin de ses enfants, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'nous aurions voulu, dans notre vive affection pour vous, non seulement vous donner l’Évangile de Dieu, mais encore nos propres vies, tant vous nous étiez devenus chers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 18:3
      metadata:
        usfm: ACT.18.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 20:34
      metadata:
        usfm: ACT.20.34
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 4:12
      metadata:
        usfm: 1CO.4.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 11:9
      metadata:
        usfm: 2CO.11.9
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 12:13
      metadata:
        usfm: 2CO.12.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Th 3:8
      metadata:
        usfm: 2TH.3.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Vous vous rappelez, frères, notre travail et notre peine: nuit et jour à l’œuvre, pour n’être à charge à aucun de vous, nous vous avons prêché l’Évangile de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Vous êtes témoins, et Dieu l’est aussi, que nous avons eu envers vous qui croyez une conduite sainte, juste et irréprochable. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Vous savez aussi que nous avons été pour chacun de vous ce qu’un père est pour ses enfants, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'vous exhortant, vous consolant, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 17:1
      metadata:
        usfm: GEN.17.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 7:20
      metadata:
        usfm: 1CO.7.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 4:1
      metadata:
        usfm: EPH.4.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 1:27
      metadata:
        usfm: PHP.1.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 1:10
      metadata:
        usfm: COL.1.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: vous conjurant de marcher d’une manière digne de Dieu, qui vous appelle à son royaume et à sa gloire.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 13-16: cf. (1 Th 1:6-10. 2 Th 1:4, 5.) Mt 23:29-38.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'C’est pourquoi nous rendons continuellement grâces à Dieu de ce qu’en recevant la parole de Dieu, que nous vous avons fait entendre, vous l’avez reçue, non comme la parole des hommes, mais, ainsi qu’elle l’est véritablement, comme la parole de Dieu, qui agit en vous qui croyez. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Car vous, frères, vous êtes devenus les imitateurs des Églises de Dieu qui sont en Jésus-Christ dans la Judée, parce que vous aussi, vous avez souffert de la part de vos '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 17:5
      metadata:
        usfm: ACT.17.5
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '13'
      metadata:
        usfm: ACT.17.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'propres compatriotes les mêmes maux qu’elles ont soufferts de la part des Juifs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 7:52
      metadata:
        usfm: ACT.7.52
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ce sont ces Juifs qui ont fait mourir le Seigneur Jésus '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 23:37
      metadata:
        usfm: MAT.23.37
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 13:34
      metadata:
        usfm: LUK.13.34
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et les prophètes, qui nous ont persécutés, qui ne plaisent point à Dieu, et qui sont ennemis de tous les hommes, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 17:13
      metadata:
        usfm: ACT.17.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: nous empêchant de parler aux païens pour qu’ils soient sauvés, en sorte qu’ils ne cessent de mettre le comble à leurs péchés. Mais la colère a fini par les atteindre.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Désir qu’éprouve l’apôtre de revoir les Thessaloniciens
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: '2 v. 17 à 3 v. 5: cf. (Ro 1:9-13. 1 Th 3:9-11.) Ac 17:14-16; 14:22. Jn 16:1-4, 33.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Pour nous, frères, après avoir été quelque temps séparés de vous, de corps mais non de cœur, nous avons eu d’autant plus ardemment le vif désir de vous voir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 1:13
      metadata:
        usfm: ROM.1.13
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 15:22
      metadata:
        usfm: ROM.15.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Aussi voulions-nous aller vers vous, du moins moi Paul, une et même deux fois; mais Satan nous en a empêchés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 1:14
      metadata:
        usfm: 2CO.1.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 2:16
      metadata:
        usfm: PHP.2.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 4:1
      metadata:
        usfm: PHP.4.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Qui est, en effet, notre espérance, ou notre joie, ou notre couronne de gloire? N’est-ce pas vous aussi, devant notre Seigneur Jésus, lors de son avènement? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Oui, vous êtes notre gloire et notre joie.
