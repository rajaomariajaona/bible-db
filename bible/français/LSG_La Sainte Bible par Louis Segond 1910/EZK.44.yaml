document_id: EZK.44
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-3: cf. (Éz 43:1-4; 46:1-3.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Il me ramena vers la porte extérieure du sanctuaire, du côté de l’orient. Mais elle était fermée. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Et l’Éternel me dit: Cette porte sera fermée, elle ne s’ouvrira point, et personne n’y passera; car l’Éternel, le Dieu d’Israël est entré par là. Elle restera fermée. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Pour ce qui concerne le prince, le prince pourra s’y asseoir, pour manger le pain devant l’Éternel; il entrera par le chemin du vestibule de la porte, et il sortira par le même chemin.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le personnel du sanctuaire
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 4-14: cf. Éz 43:5-11. (Éz 22:26. 2 R 23:8, 9.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il me conduisit vers la porte du septentrion, devant la maison. Je regardai, et voici, la gloire de l’Éternel remplissait la maison de l’Éternel. Et je tombai sur ma face. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'L’Éternel me dit: Fils de l’homme, sois attentif, et regarde de tes yeux! Écoute de tes oreilles tout ce que je te dirai au sujet de toutes les ordonnances de la maison de l’Éternel et de toutes ses lois; considère attentivement l’entrée de la maison et toutes les issues du sanctuaire. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tu diras aux rebelles, à la maison d’Israël: Ainsi parle le Seigneur, l’Éternel: Assez de toutes vos abominations, maison d’Israël! '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Vous avez introduit dans mon sanctuaire des étrangers incirconcis de cœur et incirconcis de chair, pour profaner ma maison; vous avez offert mon pain, la graisse et le sang à toutes vos abominations, vous avez rompu mon alliance. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Vous n’avez pas fait le service de mon sanctuaire, mais vous les avez mis à votre place pour faire le service dans mon sanctuaire. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ainsi parle le Seigneur, l’Éternel: Aucun étranger, incirconcis de cœur et incirconcis de chair, n’entrera dans mon sanctuaire, aucun des étrangers qui seront au milieu des enfants d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'De plus, les Lévites qui se sont éloignés de moi, quand Israël s’égarait et se détournait de moi pour suivre ses idoles, porteront la peine de leur iniquité. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ils seront dans mon sanctuaire comme serviteurs, ils auront la garde des portes de la maison; et feront le service de la maison; ils égorgeront pour le peuple les victimes destinées aux holocaustes et aux autres sacrifices, et ils se tiendront devant lui pour être à son service. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Parce qu’ils l’ont servi devant ses idoles, et qu’ils ont fait tomber dans le péché la maison d’Israël, je lève ma main sur eux, dit le Seigneur, l’Éternel, pour qu’ils portent la peine de leur iniquité. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ils ne s’approcheront pas de moi pour être à mon service dans le sacerdoce, ils ne s’approcheront pas de mes sanctuaires, de mes lieux très saints; ils porteront la peine de leur ignominie et des abominations qu’ils ont commises. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Je leur donnerai la garde de la maison, et ils en feront tout le service et tout ce qui doit s’y faire.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 15-31: cf. 1 S 2:35. (Lé 6:3, 4; 10:8-11; 21.) No 18:8-20.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Mais les sacrificateurs, les Lévites, fils de Tsadok, qui ont fait le service de mon sanctuaire quand les enfants d’Israël s’égaraient loin de moi, ceux-là s’approcheront de moi pour me servir, et se tiendront devant moi pour m’offrir la graisse et le sang, dit le Seigneur, l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ils entreront dans mon sanctuaire, ils s’approcheront de ma table pour me servir, ils seront à mon service. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Lorsqu’ils franchiront les portes du parvis intérieur, ils revêtiront des habits de lin; ils n’auront sur eux rien qui soit en laine, quand ils feront le service aux portes du parvis intérieur et dans la maison. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ils auront des tiares de lin sur la tête, et des caleçons de lin sur leurs reins; ils ne se ceindront point de manière à exciter la sueur. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Lorsqu’ils sortiront pour aller dans le parvis extérieur, dans le parvis extérieur vers le peuple, ils ôteront les vêtements avec lesquels ils font le service, et les déposeront dans les chambres du sanctuaire; ils en mettront d’autres, afin de ne pas sanctifier le peuple par leurs vêtements. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ils ne se raseront pas la tête, et ne laisseront pas non plus croître leurs cheveux; mais ils devront couper leur chevelure. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Aucun sacrificateur ne boira du vin lorsqu’il entrera dans le parvis intérieur. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ils ne prendront pour femme ni une '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 21:13
      metadata:
        usfm: LEV.21.13
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '14'
      metadata:
        usfm: LEV.21.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'veuve, ni une femme répudiée, mais ils prendront des vierges de la race de la maison d’Israël; ils pourront aussi prendre la veuve d’un sacrificateur. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ils enseigneront à mon peuple à distinguer ce qui est saint de ce qui est profane, ils lui feront connaître la différence entre ce qui est impur et ce qui est pur. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ils seront juges dans les contestations, et ils jugeront d’après mes lois. Ils observeront aussi mes lois et mes ordonnances dans toutes mes fêtes, et ils sanctifieront mes sabbats. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Un sacrificateur n’ira pas vers un mort, de peur de se rendre impur; il ne pourra se rendre impur que pour un père, pour une mère, pour un fils, pour une fille, pour un frère, et pour une sœur qui n’était pas mariée. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Après sa purification, on lui comptera sept jours. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Le jour où il entrera dans le sanctuaire, dans le parvis intérieur, pour faire le service dans le sanctuaire, il offrira son sacrifice d’expiation, dit le Seigneur, l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Voici l’héritage qu’ils auront: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 18:20
      metadata:
        usfm: NUM.18.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 18:1
      metadata:
        usfm: DEU.18.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'c’est moi qui serai leur héritage. Vous ne leur donnerez point de possession en Israël: je serai leur possession. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ils se nourriront des offrandes, des sacrifices d’expiation et de culpabilité; et tout ce qui sera dévoué par interdit en Israël sera pour eux. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 13:2
      metadata:
        usfm: EXO.13.2
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 22:29
      metadata:
        usfm: EXO.22.29
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '30'
      metadata:
        usfm: EXO.22.30
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 18:11
      metadata:
        usfm: NUM.18.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Les prémices de tous les fruits, et toutes les offrandes que vous présenterez par élévation, appartiendront aux sacrificateurs; vous donnerez aux sacrificateurs les prémices de votre pâte, afin que la bénédiction repose sur votre maison. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 22:8
      metadata:
        usfm: LEV.22.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Les sacrificateurs ne mangeront d’aucun oiseau et d’aucun animal mort ou déchiré.
