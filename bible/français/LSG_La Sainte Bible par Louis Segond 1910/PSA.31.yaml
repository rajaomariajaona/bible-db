document_id: PSA.31,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 1 S 23:14-28. (Ps 56; 71; 25.)
  - type: text
    content: Au chef des chantres. Psaume de David.
  '10':
  - type: text
    content: Aie pitié de moi, Éternel! Car je suis dans la détresse;
  - type: text
    content: J’ai le visage, l’âme et le corps usés par le chagrin.
  '11':
  - type: text
    content: Ma vie se consume dans la douleur,
  - type: text
    content: Et mes années dans les soupirs;
  - type: text
    content: Ma force est épuisée à cause de mon iniquité,
  - type: text
    content: Et mes os dépérissent.
  '12':
  - type: text
    content: ' '
  - type: note
    content: Job 19:13. Ps 38:12.
  - type: text
    content: Tous mes adversaires m’ont rendu un objet d’opprobre,
  - type: text
    content: De grand opprobre pour mes voisins, et de terreur pour mes amis;
  - type: text
    content: Ceux qui me voient dehors s’enfuient loin de moi.
  '13':
  - type: text
    content: Je suis oublié des cœurs comme un mort,
  - type: text
    content: Je suis comme un vase brisé.
  '14':
  - type: text
    content: J’apprends les mauvais propos de plusieurs,
  - type: text
    content: L’épouvante qui règne à l’entour,
  - type: text
    content: 'Quand ils se concertent ensemble contre moi:'
  - type: text
    content: Ils complotent de m’ôter la vie.
  '15':
  - type: text
    content: Mais en toi je me confie, ô Éternel!
  - type: text
    content: 'Je dis: Tu es mon Dieu!'
  '16':
  - type: text
    content: Mes destinées sont dans ta main;
  - type: text
    content: Délivre-moi de mes ennemis et de mes persécuteurs!
  '17':
  - type: text
    content: Fais luire ta face sur ton serviteur,
  - type: text
    content: Sauve-moi par ta grâce!
  '18':
  - type: text
    content: Éternel, que je ne sois pas confondu quand je t’invoque.
  - type: text
    content: Que les méchants soient confondus,
  - type: text
    content: Qu’ils descendent en silence au séjour des morts!
  '19':
  - type: text
    content: Qu’elles deviennent muettes, les lèvres menteuses,
  - type: text
    content: Qui parlent avec audace contre le juste,
  - type: text
    content: Avec arrogance et dédain!
  '2':
  - type: text
    content: 'Éternel! '
  - type: note
    content: Ps 22:6; 25:2, 3; 71:1, 2. És 49:23.
  - type: text
    content: 'je cherche en toi mon refuge:'
  - type: text
    content: Que jamais je ne sois confondu!
  - type: text
    content: Délivre-moi dans ta justice!
  '20':
  - type: text
    content: ' '
  - type: note
    content: És 64:4. 1 Co 2:9.
  - type: text
    content: Oh! Combien est grande ta bonté,
  - type: text
    content: Que tu tiens en réserve pour ceux qui te craignent,
  - type: text
    content: Que tu témoignes à ceux qui cherchent en toi leur refuge,
  - type: text
    content: A la vue des fils de l’homme!
  '21':
  - type: text
    content: Tu les protèges sous l’abri de ta face contre ceux qui les persécutent,
  - type: text
    content: Tu les protèges dans ta tente contre les langues qui les attaquent.
  '22':
  - type: text
    content: Béni soit l’Éternel!
  - type: text
    content: Car il a signalé sa grâce envers moi,
  - type: text
    content: Comme si j’avais été dans une ville forte.
  '23':
  - type: text
    content: 'Je disais dans ma précipitation:'
  - type: text
    content: Je suis chassé loin de ton regard!
  - type: text
    content: Mais tu as entendu la voix de mes supplications,
  - type: text
    content: Quand j’ai crié vers toi.
  '24':
  - type: text
    content: Aimez l’Éternel, vous qui avez de la piété!
  - type: text
    content: L’Éternel garde les fidèles,
  - type: text
    content: Et il punit sévèrement les orgueilleux.
  '25':
  - type: text
    content: ' '
  - type: note
    content: Ps 27:14.
  - type: text
    content: Fortifiez-vous et que votre cœur s’affermisse,
  - type: text
    content: Vous tous qui espérez en l’Éternel!
  '3':
  - type: text
    content: Incline vers moi ton oreille, hâte-toi de me secourir!
  - type: text
    content: Sois pour moi un rocher protecteur, une forteresse,
  - type: text
    content: Où je trouve mon salut!
  '4':
  - type: text
    content: Car tu es mon rocher, ma forteresse;
  - type: text
    content: Et à cause de ton nom tu me conduiras, tu me dirigeras.
  '5':
  - type: text
    content: Tu me feras sortir du filet qu’ils m’ont tendu;
  - type: text
    content: Car tu es mon protecteur.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Lu 23:46.
  - type: text
    content: Je remets mon esprit entre tes mains;
  - type: text
    content: Tu me délivreras, Éternel, Dieu de vérité!
  '7':
  - type: text
    content: Je hais ceux qui s’attachent à de vaines idoles,
  - type: text
    content: Et je me confie en l’Éternel.
  '8':
  - type: text
    content: Je serai par ta grâce dans l’allégresse et dans la joie;
  - type: text
    content: Car tu vois ma misère, tu sais les angoisses de mon âme,
  '9':
  - type: text
    content: Et tu ne me livreras pas aux mains de l’ennemi,
  - type: text
    content: Tu mettras mes pieds au large.
