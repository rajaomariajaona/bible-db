  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef des chantres. Psaume de David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Éternel! '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 22:6
      metadata:
        usfm: PSA.22.6
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 25:2
      metadata:
        usfm: PSA.25.2
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '3'
      metadata:
        usfm: PSA.25.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 71:1
      metadata:
        usfm: PSA.71.1
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '2'
      metadata:
        usfm: PSA.71.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 49:23
      metadata:
        usfm: ISA.49.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'je cherche en toi mon refuge:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que jamais je ne sois confondu!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Délivre-moi dans ta justice!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Incline vers moi ton oreille, hâte-toi de me secourir!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sois pour moi un rocher protecteur, une forteresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Où je trouve mon salut!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Car tu es mon rocher, ma forteresse;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et à cause de ton nom tu me conduiras, tu me dirigeras.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tu me feras sortir du filet qu’ils m’ont tendu;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car tu es mon protecteur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 23:46
      metadata:
        usfm: LUK.23.46
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Je remets mon esprit entre tes mains;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu me délivreras, Éternel, Dieu de vérité!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Je hais ceux qui s’attachent à de vaines idoles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je me confie en l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Je serai par ta grâce dans l’allégresse et dans la joie;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car tu vois ma misère, tu sais les angoisses de mon âme,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Et tu ne me livreras pas aux mains de l’ennemi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu mettras mes pieds au large.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Aie pitié de moi, Éternel! Car je suis dans la détresse;
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’ai le visage, l’âme et le corps usés par le chagrin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ma vie se consume dans la douleur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et mes années dans les soupirs;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ma force est épuisée à cause de mon iniquité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et mes os dépérissent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 19:13
      metadata:
        usfm: JOB.19.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 38:12
      metadata:
        usfm: PSA.38.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Tous mes adversaires m’ont rendu un objet d’opprobre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De grand opprobre pour mes voisins, et de terreur pour mes amis;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ceux qui me voient dehors s’enfuient loin de moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Je suis oublié des cœurs comme un mort,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je suis comme un vase brisé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: J’apprends les mauvais propos de plusieurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’épouvante qui règne à l’entour,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Quand ils se concertent ensemble contre moi:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils complotent de m’ôter la vie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Mais en toi je me confie, ô Éternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Je dis: Tu es mon Dieu!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Mes destinées sont dans ta main;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Délivre-moi de mes ennemis et de mes persécuteurs!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fais luire ta face sur ton serviteur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sauve-moi par ta grâce!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Éternel, que je ne sois pas confondu quand je t’invoque.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que les méchants soient confondus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’ils descendent en silence au séjour des morts!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Qu’elles deviennent muettes, les lèvres menteuses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui parlent avec audace contre le juste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avec arrogance et dédain!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 64:4
      metadata:
        usfm: ISA.64.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 2:9
      metadata:
        usfm: 1CO.2.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Oh! Combien est grande ta bonté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que tu tiens en réserve pour ceux qui te craignent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que tu témoignes à ceux qui cherchent en toi leur refuge,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A la vue des fils de l’homme!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Tu les protèges sous l’abri de ta face contre ceux qui les persécutent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu les protèges dans ta tente contre les langues qui les attaquent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Béni soit l’Éternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car il a signalé sa grâce envers moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme si j’avais été dans une ville forte.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Je disais dans ma précipitation:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je suis chassé loin de ton regard!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais tu as entendu la voix de mes supplications,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand j’ai crié vers toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Aimez l’Éternel, vous qui avez de la piété!
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’Éternel garde les fidèles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il punit sévèrement les orgueilleux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 27:14
      metadata:
        usfm: PSA.27.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Fortifiez-vous et que votre cœur s’affermisse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous tous qui espérez en l’Éternel!
