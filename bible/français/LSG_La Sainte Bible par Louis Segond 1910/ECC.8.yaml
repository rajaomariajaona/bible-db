document_id: ECC.8,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-8: cf. Ro 13:1-7.'
  - type: text
    content: 'Qui est comme le sage, et qui connaît l’explication des choses? La sagesse d’un homme fait briller son visage, et la sévérité de sa face est changée. '
  '10':
  - type: text
    content: 'Alors j’ai vu des méchants recevoir la sépulture et entrer dans leur repos, et ceux qui avaient agi avec droiture s’en aller loin du lieu saint et être oubliés dans la ville. C’est encore là une vanité. '
  '11':
  - type: text
    content: 'Parce qu’une sentence contre les mauvaises actions ne s’exécute pas promptement, le cœur des fils de l’homme se remplit en eux du désir de faire le mal. '
  '12':
  - type: text
    content: 'Cependant, quoique le pécheur fasse cent fois le mal et qu’il y persévère longtemps, '
  - type: note
    content: Ps 37:9, 10, 11, 12, 18, 19, 20. Pr 1:33. És 3:10.
  - type: text
    content: 'je sais aussi que le bonheur est pour ceux qui craignent Dieu, parce qu’ils ont de la crainte devant lui. '
  '13':
  - type: text
    content: 'Mais le bonheur n’est pas pour le méchant, et il ne prolongera point ses jours, pas plus que l’ombre, parce qu’il n’a pas de la crainte devant Dieu. '
  '14':
  - type: text
    content: 'Il est une vanité qui a lieu sur la terre: c’est qu’il y a des justes auxquels il arrive selon l’œuvre des méchants, et des méchants auxquels il arrive selon l’œuvre des justes. Je dis que c’est encore là une vanité. '
  '15':
  - type: text
    content: 'J’ai donc loué la joie, parce qu’il n’y a de bonheur pour '
  - type: note
    content: Ec 2:24; 3:12, 22; 5:18; 9:7.
  - type: text
    content: 'l’homme sous le soleil qu’à manger et à boire et à se réjouir; c’est là ce qui doit l’accompagner au milieu de son travail, pendant les jours de vie que Dieu lui donne sous le soleil. '
  '16':
  - type: text
    content: 'Lorsque j’ai appliqué mon cœur à connaître la sagesse et à considérer les choses qui se passent sur la terre, car les yeux de l’homme ne goûtent le sommeil ni jour ni nuit, '
  '17':
  - type: text
    content: j’ai vu toute l’œuvre de Dieu, j’ai vu que l’homme ne peut pas trouver ce qui se fait sous le soleil; il a beau se fatiguer à chercher, il ne trouve pas; et même si le sage veut connaître, il ne peut pas trouver.
  '2':
  - type: note
    content: Pr 24:21.
  - type: text
    content: 'Je te dis: Observe les ordres du roi, et cela à cause du serment fait à Dieu. '
  '3':
  - type: text
    content: 'Ne te hâte pas de t’éloigner de lui, et ne persiste pas dans une chose mauvaise: car il peut faire tout ce qui lui plaît, '
  '4':
  - type: text
    content: 'parce que la parole du roi est puissante; et qui lui dira: Que fais-tu? '
  '5':
  - type: note
    content: Ro 13:3.
  - type: text
    content: 'Celui qui observe le commandement ne connaît point de chose mauvaise, et le cœur du sage connaît le temps et le jugement. '
  '6':
  - type: text
    content: 'Car il y a pour toute chose un temps et un jugement, quand le malheur accable l’homme. '
  '7':
  - type: text
    content: 'Mais il ne sait point ce qui arrivera, et '
  - type: note
    content: Ec 6:12.
  - type: text
    content: 'qui lui dira comment cela arrivera? '
  '8':
  - type: note
    content: Job 14:5. Ps 39:6.
  - type: text
    content: L’homme n’est pas maître de son souffle pour pouvoir le retenir, et il n’a aucune puissance sur le jour de la mort; il n’y a point de délivrance dans ce combat, et la méchanceté ne saurait sauver les méchants.
  - type: heading
    content: 'V. 9-17: cf. (Mal 3:13-18; 4:1, 2.) Ps 73.'
  '9':
  - type: text
    content: 'J’ai vu tout cela, et j’ai appliqué mon cœur à tout ce qui se fait sous le soleil. Il y a un temps où l’homme domine sur l’homme pour le rendre malheureux. '
