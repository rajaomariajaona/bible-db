document_id: ECC.8
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-8: cf. Ro 13:1-7.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Qui est comme le sage, et qui connaît l’explication des choses? La sagesse d’un homme fait briller son visage, et la sévérité de sa face est changée. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 24:21
      metadata:
        usfm: PRO.24.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Je te dis: Observe les ordres du roi, et cela à cause du serment fait à Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ne te hâte pas de t’éloigner de lui, et ne persiste pas dans une chose mauvaise: car il peut faire tout ce qui lui plaît, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'parce que la parole du roi est puissante; et qui lui dira: Que fais-tu? '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 13:3
      metadata:
        usfm: ROM.13.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Celui qui observe le commandement ne connaît point de chose mauvaise, et le cœur du sage connaît le temps et le jugement. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Car il y a pour toute chose un temps et un jugement, quand le malheur accable l’homme. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mais il ne sait point ce qui arrivera, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ec 6:12
      metadata:
        usfm: ECC.6.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qui lui dira comment cela arrivera? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 14:5
      metadata:
        usfm: JOB.14.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 39:6
      metadata:
        usfm: PSA.39.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: L’homme n’est pas maître de son souffle pour pouvoir le retenir, et il n’a aucune puissance sur le jour de la mort; il n’y a point de délivrance dans ce combat, et la méchanceté ne saurait sauver les méchants.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 9-17: cf. (Mal 3:13-18; 4:1, 2.) Ps 73.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'J’ai vu tout cela, et j’ai appliqué mon cœur à tout ce qui se fait sous le soleil. Il y a un temps où l’homme domine sur l’homme pour le rendre malheureux. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Alors j’ai vu des méchants recevoir la sépulture et entrer dans leur repos, et ceux qui avaient agi avec droiture s’en aller loin du lieu saint et être oubliés dans la ville. C’est encore là une vanité. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Parce qu’une sentence contre les mauvaises actions ne s’exécute pas promptement, le cœur des fils de l’homme se remplit en eux du désir de faire le mal. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Cependant, quoique le pécheur fasse cent fois le mal et qu’il y persévère longtemps, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 37:9
      metadata:
        usfm: PSA.37.9
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '10'
      metadata:
        usfm: PSA.37.10
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '11'
      metadata:
        usfm: PSA.37.11
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '12'
      metadata:
        usfm: PSA.37.12
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '18'
      metadata:
        usfm: PSA.37.18
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '19'
      metadata:
        usfm: PSA.37.19
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '20'
      metadata:
        usfm: PSA.37.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 1:33
      metadata:
        usfm: PRO.1.33
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 3:10
      metadata:
        usfm: ISA.3.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'je sais aussi que le bonheur est pour ceux qui craignent Dieu, parce qu’ils ont de la crainte devant lui. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mais le bonheur n’est pas pour le méchant, et il ne prolongera point ses jours, pas plus que l’ombre, parce qu’il n’a pas de la crainte devant Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il est une vanité qui a lieu sur la terre: c’est qu’il y a des justes auxquels il arrive selon l’œuvre des méchants, et des méchants auxquels il arrive selon l’œuvre des justes. Je dis que c’est encore là une vanité. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'J’ai donc loué la joie, parce qu’il n’y a de bonheur pour '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ec 2:24
      metadata:
        usfm: ECC.2.24
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 3:12
      metadata:
        usfm: ECC.3.12
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '22'
      metadata:
        usfm: ECC.3.22
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 5:18
      metadata:
        usfm: ECC.5.18
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 9:7
      metadata:
        usfm: ECC.9.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'l’homme sous le soleil qu’à manger et à boire et à se réjouir; c’est là ce qui doit l’accompagner au milieu de son travail, pendant les jours de vie que Dieu lui donne sous le soleil. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Lorsque j’ai appliqué mon cœur à connaître la sagesse et à considérer les choses qui se passent sur la terre, car les yeux de l’homme ne goûtent le sommeil ni jour ni nuit, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: j’ai vu toute l’œuvre de Dieu, j’ai vu que l’homme ne peut pas trouver ce qui se fait sous le soleil; il a beau se fatiguer à chercher, il ne trouve pas; et même si le sage veut connaître, il ne peut pas trouver.
