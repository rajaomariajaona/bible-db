document_id: 1KI.10,93
type_code: fra
verses:
  '1':
  - type: heading
    content: La reine de Séba à Jérusalem
  - type: heading
    content: 'V. 1-13: cf. 2 Ch 9:1-12. Lu 11:31. Pr 13:20.'
  - type: text
    content: 'La reine de Séba apprit la renommée que possédait Salomon, à la gloire de l’Éternel, et elle vint pour l’éprouver par des énigmes. '
  '10':
  - type: text
    content: 'Elle donna au roi cent vingt talents d’or, une très grande quantité d’aromates, et des pierres précieuses. Il ne vint plus autant d’aromates que la reine de Séba en donna au roi Salomon. '
  '11':
  - type: text
    content: 'Les navires de Hiram, qui apportèrent de l’or d’Ophir, amenèrent aussi d’Ophir une grande quantité de bois de sandal et des pierres précieuses. '
  '12':
  - type: note
    content: 2 Ch 9:11.
  - type: text
    content: 'Le roi fit avec le bois de sandal des balustrades pour la maison de l’Éternel et pour la maison du roi, et des harpes et des luths pour les chantres. Il ne vint plus de ce bois de sandal, et on n’en a plus vu jusqu’à ce jour. '
  '13':
  - type: text
    content: Le roi Salomon donna à la reine de Séba tout ce qu’elle désira, ce qu’elle demanda, et lui fit en outre des présents dignes d’un roi tel que Salomon. Puis elle s’en retourna et alla dans son pays, elle et ses serviteurs.
  - type: heading
    content: Richesses de Salomon
  - type: heading
    content: 'V. 14-29: cf. 2 Ch 9:13-29; 1:11-17. (Mt 6:29.) (Ps 62:11. Ec 5:12.)'
  '14':
  - type: text
    content: 'Le poids de l’or qui arrivait à Salomon chaque année était de six cent soixante-six talents d’or, '
  '15':
  - type: text
    content: 'outre ce qu’il retirait des négociants et du trafic des marchands, de tous les rois d’Arabie, et des gouverneurs du pays. '
  '16':
  - type: note
    content: 1 R 14:26.
  - type: text
    content: 'Le roi Salomon fit deux cents grands boucliers d’or battu, pour chacun desquels il employa six cents sicles d’or, '
  '17':
  - type: text
    content: 'et trois cents autres boucliers d’or battu, pour chacun desquels il employa trois mines d’or; '
  - type: note
    content: 1 R 7:2.
  - type: text
    content: 'et le roi les mit dans la maison de la forêt du Liban. '
  '18':
  - type: note
    content: 2 Ch 9:17.
  - type: text
    content: 'Le roi fit un grand trône d’ivoire, et le couvrit d’or pur. '
  '19':
  - type: text
    content: 'Ce trône avait six degrés, et la partie supérieure en était arrondie par derrière; il y avait des bras de chaque côté du siège; deux lions étaient près des bras, '
  '2':
  - type: note
    content: 2 Ch 9:1. Mt 12:42. Lu 11:31.
  - type: text
    content: 'Elle arriva à Jérusalem avec une suite fort nombreuse, et avec des chameaux portant des aromates, de l’or en très grande quantité, et des pierres précieuses. Elle se rendit auprès de Salomon, et elle lui dit tout ce qu’elle avait dans le cœur. '
  '20':
  - type: text
    content: 'et douze lions sur les six degrés de part et d’autre. Il ne s’est rien fait de pareil pour aucun royaume. '
  '21':
  - type: text
    content: 'Toutes les coupes du roi Salomon étaient d’or, et toute la vaisselle de la maison de la forêt du Liban était d’or pur. Rien n’était d’argent: on n’en faisait aucun cas du temps de Salomon. '
  '22':
  - type: text
    content: 'Car le roi avait en mer des navires de Tarsis avec ceux de Hiram; et tous les trois ans arrivaient les navires de Tarsis, apportant de l’or et de l’argent, de l’ivoire, des singes et des paons. '
  '23':
  - type: text
    content: 'Le roi Salomon fut plus grand que tous les rois de la terre '
  - type: note
    content: 1 R 3:12, 13.
  - type: text
    content: 'par les richesses et par la sagesse. '
  '24':
  - type: text
    content: 'Tout le monde cherchait à voir Salomon, pour entendre la sagesse que Dieu avait mise dans son cœur. '
  '25':
  - type: text
    content: 'Et chacun apportait son présent, des objets d’argent et des objets d’or, des vêtements, des armes, des aromates, des chevaux et des mulets; et il en était ainsi chaque année. '
  '26':
  - type: note
    content: 1 R 4:26. 2 Ch 1:14; 9:25.
  - type: text
    content: 'Salomon rassembla des chars et de la cavalerie; il avait quatorze cents chars et douze mille cavaliers, qu’il plaça dans les villes où il tenait ses chars et à Jérusalem près du roi. '
  '27':
  - type: note
    content: 2 Ch 1:15; 9:27.
  - type: text
    content: 'Le roi rendit l’argent aussi commun à Jérusalem que les pierres, et les cèdres aussi nombreux que les sycomores qui croissent dans la plaine. '
  '28':
  - type: note
    content: 2 Ch 9:28.
  - type: text
    content: 'C’était de l’Égypte que Salomon tirait ses chevaux; '
  - type: note
    content: 2 Ch 1:16.
  - type: text
    content: 'une caravane de marchands du roi les allait chercher par troupes à un prix fixe: '
  '29':
  - type: text
    content: un char montait et sortait d’Égypte pour six cents sicles d’argent, et un cheval pour cent cinquante sicles. Ils en amenaient de même avec eux pour tous les rois des Héthiens et pour les rois de Syrie.
  '3':
  - type: text
    content: 'Salomon répondit à toutes ses questions, et il n’y eut rien que le roi ne sût lui expliquer. '
  '4':
  - type: text
    content: 'La reine de Séba vit toute la sagesse de Salomon, et la maison qu’il avait bâtie, '
  '5':
  - type: text
    content: 'et les mets de sa table, et la demeure de ses serviteurs, et les fonctions et les vêtements de ceux qui le servaient, et ses échansons, et ses holocaustes qu’il offrait dans la maison de l’Éternel. '
  '6':
  - type: text
    content: 'Hors d’elle même, elle dit au roi: C’était donc vrai ce que j’ai appris dans mon pays au sujet de ta position et de ta sagesse! '
  '7':
  - type: text
    content: 'Je ne le croyais pas, avant d’être venue et d’avoir vu de mes yeux. Et voici, on ne m’en a pas dit la moitié. Tu as plus de sagesse et de prospérité que la renommée ne me l’a fait connaître. '
  '8':
  - type: text
    content: 'Heureux tes gens, heureux tes serviteurs qui sont continuellement devant toi, qui entendent ta sagesse! '
  '9':
  - type: text
    content: 'Béni soit l’Éternel, ton Dieu, qui t’a accordé la faveur de te placer sur le trône d’Israël! C’est parce que l’Éternel aime à toujours Israël, qu’il t’a établi roi pour que tu fasses droit et justice. '
