    marker-yv: yv-n
  - type: text
    text: 'Voici les fils d’Israël. Ruben, Siméon, Lévi, Juda, Issacar, Zabulon, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dan, Joseph, Benjamin, Nephthali, Gad et Aser. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 38:3
      metadata:
        usfm: GEN.38.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 46:12
      metadata:
        usfm: GEN.46.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 26:19
      metadata:
        usfm: NUM.26.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Fils de Juda: Er, Onan, Schéla; ces trois lui naquirent de la fille de Schua, la Cananéenne. Er, premier-né de Juda, était méchant aux yeux de l’Éternel, qui le fit mourir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 38:28
      metadata:
        usfm: GEN.38.28
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '29'
      metadata:
        usfm: GEN.38.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 1:3
      metadata:
        usfm: MAT.1.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tamar, belle-fille de Juda, lui enfanta Pérets et Zérach. Total des fils de Juda: cinq. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 46:12
      metadata:
        usfm: GEN.46.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Fils de Pérets: Hetsron et Hamul. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fils de Zérach: Zimri, Éthan, Héman, Calcol et Dara. En tout: cinq. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fils de Carmi: Acar, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 7:25
      metadata:
        usfm: JOS.7.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qui troubla Israël lorsqu’il commit une infidélité au sujet des choses dévouées par interdit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fils d’Éthan: Azaria. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fils qui naquirent à Hetsron: Jerachmeel, Ram et Kelubaï. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ram '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ru 4:19
      metadata:
        usfm: RUT.4.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 1:3
      metadata:
        usfm: MAT.1.3
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '4'
      metadata:
        usfm: MAT.1.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'engendra Amminadab. Amminadab engendra Nachschon, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 1:7
      metadata:
        usfm: NUM.1.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2:3
      metadata:
        usfm: NUM.2.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'prince des fils de Juda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nachschon engendra Salma. Salma engendra Boaz. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Boaz engendra Obed. Obed engendra Isaï. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Isaï engendra Éliab, son premier-né, Abinadab le second, Schimea le troisième, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nethaneel le quatrième, Raddaï le cinquième, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Otsem le sixième, David le septième. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Leurs sœurs étaient: Tseruja et Abigaïl. Fils de Tseruja: Abischaï, Joab et Asaël, trois. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Abigaïl enfanta Amasa; le père d’Amasa fut Jéther, l’Ismaélite.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 18-55: cf. Ex 31:1-5. No 32:41, 42. Jé 35.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Caleb, fils de Hetsron, eut des enfants d’Azuba, sa femme, et de Jerioth. Voici les fils qu’il eut d’Azuba: Jéscher, Schobab et Ardon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Azuba mourut; et Caleb prit Éphrath, qui lui enfanta Hur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Hur engendra Uri, et Uri engendra '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 31:2
      metadata:
        usfm: EXO.31.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Betsaleel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ensuite, Hetsron alla vers la fille de Makir, père de Galaad, et il avait soixante ans lorsqu’il la prit; elle lui enfanta Segub. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Segub engendra Jaïr, qui eut vingt-trois villes dans le pays de Galaad. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Les Gueschuriens et les Syriens leur prirent les bourgs de Jaïr avec Kenath et les villes de son ressort, soixante villes. Tous ceux-là étaient fils de Makir, père de Galaad. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Après la mort de Hetsron à Caleb-Éphratha, Abija, femme de Hetsron, lui enfanta Aschchur, père de Tekoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Les fils de Jerachmeel, premier-né de Hetsron, furent: Ram, le premier-né, Buna, Oren et Otsem, nés d’Achija. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Jerachmeel eut une autre femme, nommée Athara, qui fut mère d’Onam. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Les fils de Ram, premier-né de Jerachmeel, furent: Maats, Jamin et Éker. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Les fils d’Onam furent: Schammaï et Jada. Fils de Schammaï: Nadab et Abischur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Le nom de la femme d’Abischur était Abichaïl, et elle lui enfanta Achban et Molid. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Fils de Nadab: Séled et Appaïm. Séled mourut sans fils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Fils d’Appaïm: Jischeï. Fils de Jischeï: Schéschan. Fils de Schéschan: Achlaï. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Fils de Jada, frère de Schammaï: Jéther et Jonathan. Jéther mourut sans fils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Fils de Jonathan: Péleth et Zara. Ce sont là les fils de Jerachmeel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Schéschan n’eut point de fils, mais il eut des filles. Schéschan avait un esclave égyptien nommé Jarcha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Et Schéschan donna sa fille pour femme à Jarcha, son esclave, à qui elle enfanta Attaï. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Attaï engendra Nathan; Nathan engendra Zabad; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Zabad engendra Éphlal; Éphlal engendra Obed; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Obed engendra Jéhu; Jéhu engendra Azaria; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Azaria engendra Halets; Halets engendra Élasa; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Élasa engendra Sismaï; Sismaï engendra Schallum; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Schallum engendra Jekamja; Jekamja engendra Élischama. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Fils de Caleb, frère de Jerachmeel: Méscha, son premier-né, qui fut père de Ziph, et les fils de Maréscha, père d’Hébron. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Fils d’Hébron: Koré, Thappuach, Rékem et Schéma. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Schéma engendra Racham, père de Jorkeam. Rékem engendra Schammaï. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Fils de Schammaï: Maon; et Maon, père de Beth-Tsur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Épha, concubine de Caleb, enfanta Haran, Motsa et Gazez. Haran engendra Gazez. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Fils de Jahdaï: Réguem, Jotham, Guéschan, Péleth, Épha et Schaaph. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Maaca, concubine de Caleb, enfanta Schéber et Tirchana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Elle enfanta encore Schaaph, père de Madmanna, et Scheva, père de Macbéna et père de Guibea. La fille de Caleb était Acsa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Ceux-ci furent fils de Caleb: Schobal, fils de Hur, premier-né d’Éphrata, et père de Kirjath-Jearim; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Salma, père de Bethléhem; Hareph, père de Beth-Gader. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Les fils de Schobal, père de Kirjath-Jearim, furent: Haroé, Hatsi-Hammenuhoth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Les familles de Kirjath-Jearim furent: les Jéthriens, les Puthiens, les Schumathiens et les Mischraïens; de ces familles sont sortis les Tsoreathiens et les Eschthaoliens. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Fils de Salma: Bethléhem et les Nethophatiens, Athroth-Beth-Joab, Hatsi-Hammanachthi, les Tsoreïens; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: et les familles des scribes demeurant à Jaebets, les Thireathiens, les Schimeathiens et les Sucathiens. Ce sont les Kéniens, issus de Hamath, père de la maison de Récab.
