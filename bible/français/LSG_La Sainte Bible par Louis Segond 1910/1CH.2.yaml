document_id: 1CH.2,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Les douze fils de Jacob et les descendants de Juda
  - type: heading
    content: 'V. 1-17: cf. Ge 46:8-27. (Ru 4:18-22. Mt 1:3-6. 1 S 16:5-13. Hé 7:14.)'
  - type: text
    content: ' '
  - type: note
    content: Ge 29:32; 30:5; 35:18, 22; 36:8.
  - type: text
    content: 'Voici les fils d’Israël. Ruben, Siméon, Lévi, Juda, Issacar, Zabulon, '
  '10':
  - type: text
    content: 'Ram '
  - type: note
    content: Ru 4:19. Mt 1:3, 4.
  - type: text
    content: 'engendra Amminadab. Amminadab engendra Nachschon, '
  - type: note
    content: No 1:7; 2:3.
  - type: text
    content: 'prince des fils de Juda. '
  '11':
  - type: text
    content: 'Nachschon engendra Salma. Salma engendra Boaz. '
  '12':
  - type: text
    content: 'Boaz engendra Obed. Obed engendra Isaï. '
  '13':
  - type: text
    content: 'Isaï engendra Éliab, son premier-né, Abinadab le second, Schimea le troisième, '
  '14':
  - type: text
    content: 'Nethaneel le quatrième, Raddaï le cinquième, '
  '15':
  - type: text
    content: 'Otsem le sixième, David le septième. '
  '16':
  - type: text
    content: 'Leurs sœurs étaient: Tseruja et Abigaïl. Fils de Tseruja: Abischaï, Joab et Asaël, trois. '
  '17':
  - type: text
    content: Abigaïl enfanta Amasa; le père d’Amasa fut Jéther, l’Ismaélite.
  - type: heading
    content: 'V. 18-55: cf. Ex 31:1-5. No 32:41, 42. Jé 35.'
  '18':
  - type: text
    content: 'Caleb, fils de Hetsron, eut des enfants d’Azuba, sa femme, et de Jerioth. Voici les fils qu’il eut d’Azuba: Jéscher, Schobab et Ardon. '
  '19':
  - type: text
    content: 'Azuba mourut; et Caleb prit Éphrath, qui lui enfanta Hur. '
  '2':
  - type: text
    content: 'Dan, Joseph, Benjamin, Nephthali, Gad et Aser. '
  '20':
  - type: text
    content: 'Hur engendra Uri, et Uri engendra '
  - type: note
    content: Ex 31:2.
  - type: text
    content: 'Betsaleel. '
  '21':
  - type: text
    content: 'Ensuite, Hetsron alla vers la fille de Makir, père de Galaad, et il avait soixante ans lorsqu’il la prit; elle lui enfanta Segub. '
  '22':
  - type: text
    content: 'Segub engendra Jaïr, qui eut vingt-trois villes dans le pays de Galaad. '
  '23':
  - type: text
    content: 'Les Gueschuriens et les Syriens leur prirent les bourgs de Jaïr avec Kenath et les villes de son ressort, soixante villes. Tous ceux-là étaient fils de Makir, père de Galaad. '
  '24':
  - type: text
    content: 'Après la mort de Hetsron à Caleb-Éphratha, Abija, femme de Hetsron, lui enfanta Aschchur, père de Tekoa. '
  '25':
  - type: text
    content: 'Les fils de Jerachmeel, premier-né de Hetsron, furent: Ram, le premier-né, Buna, Oren et Otsem, nés d’Achija. '
  '26':
  - type: text
    content: 'Jerachmeel eut une autre femme, nommée Athara, qui fut mère d’Onam. '
  '27':
  - type: text
    content: 'Les fils de Ram, premier-né de Jerachmeel, furent: Maats, Jamin et Éker. '
  '28':
  - type: text
    content: 'Les fils d’Onam furent: Schammaï et Jada. Fils de Schammaï: Nadab et Abischur. '
  '29':
  - type: text
    content: 'Le nom de la femme d’Abischur était Abichaïl, et elle lui enfanta Achban et Molid. '
  '3':
  - type: note
    content: Ge 38:3; 46:12. No 26:19.
  - type: text
    content: 'Fils de Juda: Er, Onan, Schéla; ces trois lui naquirent de la fille de Schua, la Cananéenne. Er, premier-né de Juda, était méchant aux yeux de l’Éternel, qui le fit mourir. '
  '30':
  - type: text
    content: 'Fils de Nadab: Séled et Appaïm. Séled mourut sans fils. '
  '31':
  - type: text
    content: 'Fils d’Appaïm: Jischeï. Fils de Jischeï: Schéschan. Fils de Schéschan: Achlaï. '
  '32':
  - type: text
    content: 'Fils de Jada, frère de Schammaï: Jéther et Jonathan. Jéther mourut sans fils. '
  '33':
  - type: text
    content: 'Fils de Jonathan: Péleth et Zara. Ce sont là les fils de Jerachmeel. '
  '34':
  - type: text
    content: 'Schéschan n’eut point de fils, mais il eut des filles. Schéschan avait un esclave égyptien nommé Jarcha. '
  '35':
  - type: text
    content: 'Et Schéschan donna sa fille pour femme à Jarcha, son esclave, à qui elle enfanta Attaï. '
  '36':
  - type: text
    content: 'Attaï engendra Nathan; Nathan engendra Zabad; '
  '37':
  - type: text
    content: 'Zabad engendra Éphlal; Éphlal engendra Obed; '
  '38':
  - type: text
    content: 'Obed engendra Jéhu; Jéhu engendra Azaria; '
  '39':
  - type: text
    content: 'Azaria engendra Halets; Halets engendra Élasa; '
  '4':
  - type: note
    content: Ge 38:28, 29. Mt 1:3.
  - type: text
    content: 'Tamar, belle-fille de Juda, lui enfanta Pérets et Zérach. Total des fils de Juda: cinq. '
  '40':
  - type: text
    content: 'Élasa engendra Sismaï; Sismaï engendra Schallum; '
  '41':
  - type: text
    content: 'Schallum engendra Jekamja; Jekamja engendra Élischama. '
  '42':
  - type: text
    content: 'Fils de Caleb, frère de Jerachmeel: Méscha, son premier-né, qui fut père de Ziph, et les fils de Maréscha, père d’Hébron. '
  '43':
  - type: text
    content: 'Fils d’Hébron: Koré, Thappuach, Rékem et Schéma. '
  '44':
  - type: text
    content: 'Schéma engendra Racham, père de Jorkeam. Rékem engendra Schammaï. '
  '45':
  - type: text
    content: 'Fils de Schammaï: Maon; et Maon, père de Beth-Tsur. '
  '46':
  - type: text
    content: 'Épha, concubine de Caleb, enfanta Haran, Motsa et Gazez. Haran engendra Gazez. '
  '47':
  - type: text
    content: 'Fils de Jahdaï: Réguem, Jotham, Guéschan, Péleth, Épha et Schaaph. '
  '48':
  - type: text
    content: 'Maaca, concubine de Caleb, enfanta Schéber et Tirchana. '
  '49':
  - type: text
    content: 'Elle enfanta encore Schaaph, père de Madmanna, et Scheva, père de Macbéna et père de Guibea. La fille de Caleb était Acsa. '
  '5':
  - type: note
    content: Ge 46:12.
  - type: text
    content: 'Fils de Pérets: Hetsron et Hamul. '
  '50':
  - type: text
    content: 'Ceux-ci furent fils de Caleb: Schobal, fils de Hur, premier-né d’Éphrata, et père de Kirjath-Jearim; '
  '51':
  - type: text
    content: 'Salma, père de Bethléhem; Hareph, père de Beth-Gader. '
  '52':
  - type: text
    content: 'Les fils de Schobal, père de Kirjath-Jearim, furent: Haroé, Hatsi-Hammenuhoth. '
  '53':
  - type: text
    content: 'Les familles de Kirjath-Jearim furent: les Jéthriens, les Puthiens, les Schumathiens et les Mischraïens; de ces familles sont sortis les Tsoreathiens et les Eschthaoliens. '
  '54':
  - type: text
    content: 'Fils de Salma: Bethléhem et les Nethophatiens, Athroth-Beth-Joab, Hatsi-Hammanachthi, les Tsoreïens; '
  '55':
  - type: text
    content: et les familles des scribes demeurant à Jaebets, les Thireathiens, les Schimeathiens et les Sucathiens. Ce sont les Kéniens, issus de Hamath, père de la maison de Récab.
  '6':
  - type: text
    content: 'Fils de Zérach: Zimri, Éthan, Héman, Calcol et Dara. En tout: cinq. '
  '7':
  - type: text
    content: 'Fils de Carmi: Acar, '
  - type: note
    content: Jos 7:25.
  - type: text
    content: 'qui troubla Israël lorsqu’il commit une infidélité au sujet des choses dévouées par interdit. '
  '8':
  - type: text
    content: 'Fils d’Éthan: Azaria. '
  '9':
  - type: text
    content: 'Fils qui naquirent à Hetsron: Jerachmeel, Ram et Kelubaï. '
