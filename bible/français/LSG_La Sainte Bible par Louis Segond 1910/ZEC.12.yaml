document_id: ZEC.12,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Délivrance de Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-9: cf. Za 10:3-7. Joë 3:9-16.'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oracle, parole de l’Éternel sur Israël.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi parle l’Éternel, qui a étendu les cieux et fondé la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et qui a formé l’esprit de l’homme au-dedans de lui:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Alors je '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 39:29
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Joë 2:28
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: répandrai sur la maison de David et sur les habitants de Jérusalem
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un esprit de grâce et de supplication,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et ils tourneront les '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 19:37
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 1:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: regards vers moi, celui qu’ils ont percé.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils pleureront sur lui comme on pleure sur un fils unique,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils pleureront amèrement sur lui comme on pleure sur un premier-né.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En ce jour-là, le deuil sera grand à Jérusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Comme le deuil d’Hadadrimmon dans la vallée de '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 23:29
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 35:22
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '24'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Meguiddon.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Le pays sera dans le deuil, chaque famille séparément:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La famille de la maison de David séparément, et les femmes à part;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La famille de la maison de Nathan séparément, et les femmes à part;
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La famille de la maison de Lévi séparément, et les femmes à part;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La famille de Schimeï séparément, et les femmes à part;
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toutes les autres familles, chaque famille séparément,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les femmes à part.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, je ferai de Jérusalem une coupe d’étourdissement
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour tous les peuples d’alentour,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et aussi pour Juda dans le siège de Jérusalem.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En ce jour-là, je ferai de Jérusalem une pierre pesante pour tous les peuples;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous ceux qui la soulèveront seront meurtris;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et toutes les nations de la terre s’assembleront contre elle.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En ce jour-là, dit l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je frapperai d’étourdissement tous les chevaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et de délire ceux qui les monteront;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais j’aurai les yeux ouverts sur la maison de Juda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand je frapperai d’aveuglement tous les chevaux des peuples.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Les chefs de Juda diront en leur cœur:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les habitants de Jérusalem sont notre force,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par l’Éternel des armées, leur Dieu.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En ce jour-là, je ferai des chefs de Juda
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme un foyer ardent parmi du bois,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme une torche enflammée parmi des gerbes;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils dévoreront à droite et à gauche tous les peuples d’alentour,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et Jérusalem restera à sa place, à Jérusalem.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel sauvera d’abord les tentes de Juda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afin que la gloire de la maison de David,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La gloire des habitants de Jérusalem ne s’élève pas au-dessus de Juda.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En ce jour-là, l’Éternel protégera les habitants de Jérusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le faible parmi eux sera dans ce jour comme David;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La maison de David sera comme Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme l’ange de l’Éternel devant eux.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En ce jour-là,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je m’efforcerai de détruire toutes les nations
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui viendront contre Jérusalem.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 10-14: cf. Ac 2. (Éz 36:26, 27. 2 Co 3:14-16; 7:10.)'
    marker-yv: yv-h
