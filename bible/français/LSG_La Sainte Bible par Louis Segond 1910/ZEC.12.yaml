document_id: ZEC.12,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Délivrance de Jérusalem
  - type: heading
    content: 'V. 1-9: cf. Za 10:3-7. Joë 3:9-16.'
  - type: text
    content: Oracle, parole de l’Éternel sur Israël.
  - type: text
    content: Ainsi parle l’Éternel, qui a étendu les cieux et fondé la terre,
  - type: text
    content: 'Et qui a formé l’esprit de l’homme au-dedans de lui:'
  '10':
  - type: text
    content: 'Alors je '
  - type: note
    content: Éz 39:29. Joë 2:28.
  - type: text
    content: répandrai sur la maison de David et sur les habitants de Jérusalem
  - type: text
    content: Un esprit de grâce et de supplication,
  - type: text
    content: 'Et ils tourneront les '
  - type: note
    content: Jn 19:37. Ap 1:7.
  - type: text
    content: regards vers moi, celui qu’ils ont percé.
  - type: text
    content: Ils pleureront sur lui comme on pleure sur un fils unique,
  - type: text
    content: Ils pleureront amèrement sur lui comme on pleure sur un premier-né.
  '11':
  - type: text
    content: En ce jour-là, le deuil sera grand à Jérusalem,
  - type: text
    content: 'Comme le deuil d’Hadadrimmon dans la vallée de '
  - type: note
    content: 2 R 23:29. 2 Ch 35:22, 24.
  - type: text
    content: Meguiddon.
  '12':
  - type: text
    content: 'Le pays sera dans le deuil, chaque famille séparément:'
  - type: text
    content: La famille de la maison de David séparément, et les femmes à part;
  - type: text
    content: La famille de la maison de Nathan séparément, et les femmes à part;
  '13':
  - type: text
    content: La famille de la maison de Lévi séparément, et les femmes à part;
  - type: text
    content: La famille de Schimeï séparément, et les femmes à part;
  '14':
  - type: text
    content: Toutes les autres familles, chaque famille séparément,
  - type: text
    content: Et les femmes à part.
  '2':
  - type: text
    content: Voici, je ferai de Jérusalem une coupe d’étourdissement
  - type: text
    content: Pour tous les peuples d’alentour,
  - type: text
    content: Et aussi pour Juda dans le siège de Jérusalem.
  '3':
  - type: text
    content: En ce jour-là, je ferai de Jérusalem une pierre pesante pour tous les peuples;
  - type: text
    content: Tous ceux qui la soulèveront seront meurtris;
  - type: text
    content: Et toutes les nations de la terre s’assembleront contre elle.
  '4':
  - type: text
    content: En ce jour-là, dit l’Éternel,
  - type: text
    content: Je frapperai d’étourdissement tous les chevaux,
  - type: text
    content: Et de délire ceux qui les monteront;
  - type: text
    content: Mais j’aurai les yeux ouverts sur la maison de Juda,
  - type: text
    content: Quand je frapperai d’aveuglement tous les chevaux des peuples.
  '5':
  - type: text
    content: 'Les chefs de Juda diront en leur cœur:'
  - type: text
    content: Les habitants de Jérusalem sont notre force,
  - type: text
    content: Par l’Éternel des armées, leur Dieu.
  '6':
  - type: text
    content: En ce jour-là, je ferai des chefs de Juda
  - type: text
    content: Comme un foyer ardent parmi du bois,
  - type: text
    content: Comme une torche enflammée parmi des gerbes;
  - type: text
    content: Ils dévoreront à droite et à gauche tous les peuples d’alentour,
  - type: text
    content: Et Jérusalem restera à sa place, à Jérusalem.
  '7':
  - type: text
    content: L’Éternel sauvera d’abord les tentes de Juda,
  - type: text
    content: Afin que la gloire de la maison de David,
  - type: text
    content: La gloire des habitants de Jérusalem ne s’élève pas au-dessus de Juda.
  '8':
  - type: text
    content: En ce jour-là, l’Éternel protégera les habitants de Jérusalem,
  - type: text
    content: Et le faible parmi eux sera dans ce jour comme David;
  - type: text
    content: La maison de David sera comme Dieu,
  - type: text
    content: Comme l’ange de l’Éternel devant eux.
  '9':
  - type: text
    content: En ce jour-là,
  - type: text
    content: Je m’efforcerai de détruire toutes les nations
  - type: text
    content: Qui viendront contre Jérusalem.
  - type: heading
    content: 'V. 10-14: cf. Ac 2. (Éz 36:26, 27. 2 Co 3:14-16; 7:10.)'
