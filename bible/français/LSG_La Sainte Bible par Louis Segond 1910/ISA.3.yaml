document_id: ISA.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jugement de Dieu contre le peuple de Jérusalem et de Juda
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-7: cf. És 2:6-22. Ps 9:21. (2 Ch 28:5-7, 19.) Pr 11:11.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Le Seigneur, l’Éternel des armées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Va ôter de Jérusalem et de Juda
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tout appui et toute ressource,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toute ressource de pain
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et toute ressource d’eau,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Le héros et l’homme de guerre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le juge et le prophète, le devin et l’ancien,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Le chef de cinquante et le magistrat,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le conseiller, l’artisan distingué et l’habile enchanteur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Je leur donnerai des jeunes gens pour chefs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et des enfants domineront sur eux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Il y aura réciprocité d’oppression parmi le peuple;
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’un opprimera l’autre, chacun son prochain;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le jeune homme attaquera le vieillard,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et l’homme de rien celui qui est honoré.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'On ira jusqu’à saisir son frère dans la maison paternelle:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu as un habit, sois notre chef!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Prends ces ruines sous ta main!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ce jour-là même il répondra: Je ne saurais être un médecin,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et dans ma maison il n’y a ni pain ni vêtement;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne m’établissez pas chef du peuple!
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 8-15: cf. És 5:18, 19. Mi 3:1-12. Ga 6:7-9. Pr 11:21, 31. Mi 6:1, 2, 9, etc.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Jérusalem chancelle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et Juda s’écroule,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parce que leurs paroles et leurs œuvres sont contre l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Bravant les regards de sa majesté.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: L’aspect de leur visage témoigne contre eux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et, comme Sodome, ils publient leur crime, sans dissimuler.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Malheur à leur âme!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car ils se préparent des maux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Dites que le juste prospérera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car il jouira du fruit de ses œuvres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Malheur au méchant! Il sera dans l’infortune,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car il recueillera le produit de ses mains.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mon peuple a pour oppresseurs des enfants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et des femmes dominent sur lui;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon peuple, ceux qui te conduisent t’égarent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils corrompent la voie dans laquelle tu marches.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: L’Éternel se présente pour plaider,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est debout pour juger les peuples.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: L’Éternel entre en jugement
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Avec les anciens de son peuple et avec ses chefs:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous avez brouté la vigne!
- type: usfm
  marker: q1
  children:
  - type: text
    text: La dépouille du pauvre est dans vos maisons!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: De quel droit foulez-vous mon peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et écrasez-vous la face des pauvres?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit le Seigneur, l’Éternel des armées.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jugement de Dieu contre les femmes de Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: '3 v. 16 à 4 v. 1: cf. És 32:9-14.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'L’Éternel dit: Parce que les filles de Sion sont orgueilleuses,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qu’elles marchent le cou tendu
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les regards effrontés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parce qu’elles vont à petits pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qu’elles font résonner les boucles de leurs pieds,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Le Seigneur rendra chauve le sommet de la tête des filles de Sion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’Éternel découvrira leur nudité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: En ce jour, le Seigneur ôtera les boucles qui servent d’ornement à leurs pieds,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les filets et les croissants;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Les pendants d’oreilles, les bracelets et les voiles;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Les diadèmes, les chaînettes des pieds et les ceintures,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les boîtes de senteur et les amulettes;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Les bagues et les anneaux du nez;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Les vêtements précieux et les larges tuniques,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les manteaux et les gibecières;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Les miroirs et les chemises fines,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les turbans et les surtouts légers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Au lieu de parfum, il y aura de l’infection;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au lieu de ceinture, une corde;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au lieu de cheveux bouclés, une tête chauve;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au lieu d’un large manteau, un sac étroit;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Une marque flétrissante, au lieu de beauté.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Tes hommes tomberont sous le glaive,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tes héros dans le combat.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Les portes de Sion gémiront et seront dans le deuil;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dépouillée, elle s’assiéra par terre.
