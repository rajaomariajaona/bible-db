document_id: ISA.3,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Jugement de Dieu contre le peuple de Jérusalem et de Juda
  - type: heading
    content: 'V. 1-7: cf. És 2:6-22. Ps 9:21. (2 Ch 28:5-7, 19.) Pr 11:11.'
  - type: text
    content: Le Seigneur, l’Éternel des armées,
  - type: text
    content: Va ôter de Jérusalem et de Juda
  - type: text
    content: Tout appui et toute ressource,
  - type: text
    content: Toute ressource de pain
  - type: text
    content: Et toute ressource d’eau,
  '10':
  - type: text
    content: Dites que le juste prospérera,
  - type: text
    content: Car il jouira du fruit de ses œuvres.
  '11':
  - type: text
    content: Malheur au méchant! Il sera dans l’infortune,
  - type: text
    content: Car il recueillera le produit de ses mains.
  '12':
  - type: text
    content: Mon peuple a pour oppresseurs des enfants,
  - type: text
    content: Et des femmes dominent sur lui;
  - type: text
    content: Mon peuple, ceux qui te conduisent t’égarent,
  - type: text
    content: Et ils corrompent la voie dans laquelle tu marches.
  '13':
  - type: text
    content: L’Éternel se présente pour plaider,
  - type: text
    content: Il est debout pour juger les peuples.
  '14':
  - type: text
    content: L’Éternel entre en jugement
  - type: text
    content: 'Avec les anciens de son peuple et avec ses chefs:'
  - type: text
    content: Vous avez brouté la vigne!
  - type: text
    content: La dépouille du pauvre est dans vos maisons!
  '15':
  - type: text
    content: De quel droit foulez-vous mon peuple,
  - type: text
    content: Et écrasez-vous la face des pauvres?
  - type: text
    content: Dit le Seigneur, l’Éternel des armées.
  - type: heading
    content: Jugement de Dieu contre les femmes de Jérusalem
  - type: heading
    content: '3 v. 16 à 4 v. 1: cf. És 32:9-14.'
  '16':
  - type: text
    content: 'L’Éternel dit: Parce que les filles de Sion sont orgueilleuses,'
  - type: text
    content: Et qu’elles marchent le cou tendu
  - type: text
    content: Et les regards effrontés,
  - type: text
    content: Parce qu’elles vont à petits pas,
  - type: text
    content: Et qu’elles font résonner les boucles de leurs pieds,
  '17':
  - type: text
    content: Le Seigneur rendra chauve le sommet de la tête des filles de Sion,
  - type: text
    content: L’Éternel découvrira leur nudité.
  '18':
  - type: text
    content: En ce jour, le Seigneur ôtera les boucles qui servent d’ornement à leurs pieds,
  - type: text
    content: Et les filets et les croissants;
  '19':
  - type: text
    content: Les pendants d’oreilles, les bracelets et les voiles;
  '2':
  - type: text
    content: Le héros et l’homme de guerre,
  - type: text
    content: Le juge et le prophète, le devin et l’ancien,
  '20':
  - type: text
    content: Les diadèmes, les chaînettes des pieds et les ceintures,
  - type: text
    content: Les boîtes de senteur et les amulettes;
  '21':
  - type: text
    content: Les bagues et les anneaux du nez;
  '22':
  - type: text
    content: Les vêtements précieux et les larges tuniques,
  - type: text
    content: Les manteaux et les gibecières;
  '23':
  - type: text
    content: Les miroirs et les chemises fines,
  - type: text
    content: Les turbans et les surtouts légers.
  '24':
  - type: text
    content: Au lieu de parfum, il y aura de l’infection;
  - type: text
    content: Au lieu de ceinture, une corde;
  - type: text
    content: Au lieu de cheveux bouclés, une tête chauve;
  - type: text
    content: Au lieu d’un large manteau, un sac étroit;
  - type: text
    content: Une marque flétrissante, au lieu de beauté.
  '25':
  - type: text
    content: Tes hommes tomberont sous le glaive,
  - type: text
    content: Et tes héros dans le combat.
  '26':
  - type: text
    content: Les portes de Sion gémiront et seront dans le deuil;
  - type: text
    content: Dépouillée, elle s’assiéra par terre.
  '3':
  - type: text
    content: Le chef de cinquante et le magistrat,
  - type: text
    content: Le conseiller, l’artisan distingué et l’habile enchanteur.
  '4':
  - type: text
    content: Je leur donnerai des jeunes gens pour chefs,
  - type: text
    content: Et des enfants domineront sur eux.
  '5':
  - type: text
    content: Il y aura réciprocité d’oppression parmi le peuple;
  - type: text
    content: L’un opprimera l’autre, chacun son prochain;
  - type: text
    content: Le jeune homme attaquera le vieillard,
  - type: text
    content: Et l’homme de rien celui qui est honoré.
  '6':
  - type: text
    content: 'On ira jusqu’à saisir son frère dans la maison paternelle:'
  - type: text
    content: Tu as un habit, sois notre chef!
  - type: text
    content: Prends ces ruines sous ta main!
  '7':
  - type: text
    content: 'Ce jour-là même il répondra: Je ne saurais être un médecin,'
  - type: text
    content: Et dans ma maison il n’y a ni pain ni vêtement;
  - type: text
    content: Ne m’établissez pas chef du peuple!
  - type: heading
    content: 'V. 8-15: cf. És 5:18, 19. Mi 3:1-12. Ga 6:7-9. Pr 11:21, 31. Mi 6:1, 2, 9, etc.'
  '8':
  - type: text
    content: Jérusalem chancelle,
  - type: text
    content: Et Juda s’écroule,
  - type: text
    content: Parce que leurs paroles et leurs œuvres sont contre l’Éternel,
  - type: text
    content: Bravant les regards de sa majesté.
  '9':
  - type: text
    content: L’aspect de leur visage témoigne contre eux,
  - type: text
    content: Et, comme Sodome, ils publient leur crime, sans dissimuler.
  - type: text
    content: Malheur à leur âme!
  - type: text
    content: Car ils se préparent des maux.
