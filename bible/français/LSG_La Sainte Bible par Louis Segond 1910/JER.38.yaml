document_id: JER.38
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jérémie dans une citerne
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-6: cf. Jé 32:1-5; 37:11, etc.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Schephathia, fils de Matthan, Guedalia, fils de Paschhur, Jucal, fils de Schélémia, et Paschhur, fils de Malkija, entendirent les paroles que Jérémie adressait à tout le peuple, en disant: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ainsi parle l’Éternel: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 21:9
      metadata:
        usfm: JER.21.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Celui qui restera dans cette ville mourra par l’épée, par la famine ou par la peste; mais celui qui sortira pour se rendre aux Chaldéens, aura la vie sauve, sa vie sera son butin, et il vivra. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ainsi parle l’Éternel: Cette ville sera livrée à l’armée du roi de Babylone, qui la prendra. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Et les chefs dirent au roi: Que cet homme soit mis à mort! Car il décourage les hommes de guerre qui restent dans cette ville, et tout le peuple, en leur tenant de pareils discours; cet homme ne cherche pas le bien de ce peuple, il ne veut que son malheur. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Le roi Sédécias répondit: Voici, il est entre vos mains; car le roi ne peut rien contre vous. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Alors ils prirent Jérémie, et le jetèrent dans la citerne de Malkija, fils du roi, laquelle se trouvait dans la cour de la prison; ils descendirent Jérémie avec des cordes. Il n’y avait point d’eau dans la citerne, mais il y avait de la boue; et Jérémie enfonça dans la boue.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 7-13: cf. Jé 39:16-18. 2 Ti 1:16-18. Mt 25:40.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ébed-Mélec, l’Éthiopien, eunuque qui était dans la maison du roi, apprit qu’on avait mis Jérémie dans la citerne. Le roi était assis à la porte de Benjamin. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ébed-Mélec sortit de la maison du roi, et parla ainsi au roi: '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'O roi, mon seigneur, ces hommes ont mal agi en traitant de la sorte Jérémie, le prophète, en le jetant dans la citerne; il mourra de faim là où il est, car il n’y a plus de pain dans la ville. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Le roi donna cet ordre à Ébed-Mélec, l’Éthiopien: Prends ici trente hommes avec toi, et tu retireras de la citerne Jérémie, le prophète, avant qu’il ne meure. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ébed-Mélec prit avec lui les hommes, et se rendit à la maison du roi, dans un lieu au-dessous du trésor; il en sortit des lambeaux usés et de vieux haillons, et les descendit à Jérémie dans la citerne, avec des cordes. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ébed-Mélec, l’Éthiopien, dit à Jérémie: Mets ces lambeaux usés et ces haillons sous tes aisselles, sous les cordes. Et Jérémie fit ainsi. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ils tirèrent Jérémie avec les cordes, et le firent monter hors de la citerne. Jérémie resta dans la cour de la prison.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Entrevue de Sédécias et du prophète
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 14-28: cf. Jé 21:1-12; 34:1-6.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Le roi Sédécias envoya chercher Jérémie, le prophète, et le fit venir auprès de lui dans la troisième entrée de la maison de l’Éternel. Et le roi dit à Jérémie: J’ai une chose à te demander; ne me cache rien. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Jérémie répondit à Sédécias: Si je te la dis, ne me feras-tu pas mourir? Et si je te donne un conseil, tu ne m’écouteras pas. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Le roi Sédécias jura secrètement à Jérémie, en disant: L’Éternel est vivant, lui qui nous a donné la '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 57:16
      metadata:
        usfm: ISA.57.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'vie! Je ne te ferai pas mourir, et je ne te livrerai pas entre les mains de ces hommes qui en veulent à ta vie. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Jérémie dit alors à Sédécias: Ainsi parle l’Éternel, le Dieu des armées, le Dieu d’Israël: Si tu vas te rendre aux chefs du roi de Babylone, tu auras la vie sauve, et cette ville ne sera pas brûlée par le feu; tu vivras, toi et ta maison. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Mais si tu ne te rends pas aux chefs du roi de Babylone, cette ville sera livrée entre les mains des Chaldéens, qui la brûleront par le feu; et toi, tu n’échapperas pas à leurs mains. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Le roi Sédécias dit à Jérémie: Je crains les Juifs qui ont passé aux Chaldéens; je crains qu’on ne me livre entre leurs mains, et qu’ils ne m’outragent. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Jérémie répondit: On ne te livrera pas. Écoute la voix de l’Éternel dans ce que je te dis; tu t’en trouveras bien, et tu auras la vie sauve. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Mais si tu refuses de sortir, voici ce que l’Éternel m’a révélé: '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Toutes les femmes qui restent dans la maison du roi de Juda seront menées aux chefs du roi de Babylone, et elles diront: Tu as été trompé, dominé, par ceux qui t’annonçaient la paix; et quand tes pieds sont enfoncés dans la boue, ils se retirent. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Toutes tes femmes et tes enfants seront menés aux Chaldéens; et toi, tu n’échapperas pas à leurs mains, tu seras saisi par la main du roi de Babylone, et cette ville sera brûlée par le feu. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Sédécias dit à Jérémie: Que personne ne sache rien de ces discours, et tu ne mourras pas. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Si les chefs apprennent que je t’ai parlé, et s’ils viennent te dire: Rapporte-nous ce que tu as dit au roi, et ce que le roi t’a dit, ne nous cache rien, et nous ne te ferons pas mourir, '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'tu leur répondras: J’ai supplié le roi de ne pas me renvoyer dans la maison de Jonathan, de peur que je n’y meure. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Tous les chefs vinrent auprès de Jérémie et le questionnèrent. Il leur répondit entièrement comme le roi l’avait ordonné. Ils gardèrent alors le silence et se retirèrent, car la chose ne s’était pas répandue. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Jérémie resta dans la cour de la prison jusqu’au jour de la prise de Jérusalem.
