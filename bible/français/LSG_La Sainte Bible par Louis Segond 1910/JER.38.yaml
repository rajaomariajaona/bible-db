document_id: JER.38,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Jérémie dans une citerne
  - type: heading
    content: 'V. 1-6: cf. Jé 32:1-5; 37:11, etc.'
  - type: text
    content: 'Schephathia, fils de Matthan, Guedalia, fils de Paschhur, Jucal, fils de Schélémia, et Paschhur, fils de Malkija, entendirent les paroles que Jérémie adressait à tout le peuple, en disant: '
  '10':
  - type: text
    content: 'Le roi donna cet ordre à Ébed-Mélec, l’Éthiopien: Prends ici trente hommes avec toi, et tu retireras de la citerne Jérémie, le prophète, avant qu’il ne meure. '
  '11':
  - type: text
    content: 'Ébed-Mélec prit avec lui les hommes, et se rendit à la maison du roi, dans un lieu au-dessous du trésor; il en sortit des lambeaux usés et de vieux haillons, et les descendit à Jérémie dans la citerne, avec des cordes. '
  '12':
  - type: text
    content: 'Ébed-Mélec, l’Éthiopien, dit à Jérémie: Mets ces lambeaux usés et ces haillons sous tes aisselles, sous les cordes. Et Jérémie fit ainsi. '
  '13':
  - type: text
    content: Ils tirèrent Jérémie avec les cordes, et le firent monter hors de la citerne. Jérémie resta dans la cour de la prison.
  - type: heading
    content: Entrevue de Sédécias et du prophète
  - type: heading
    content: 'V. 14-28: cf. Jé 21:1-12; 34:1-6.'
  '14':
  - type: text
    content: 'Le roi Sédécias envoya chercher Jérémie, le prophète, et le fit venir auprès de lui dans la troisième entrée de la maison de l’Éternel. Et le roi dit à Jérémie: J’ai une chose à te demander; ne me cache rien. '
  '15':
  - type: text
    content: 'Jérémie répondit à Sédécias: Si je te la dis, ne me feras-tu pas mourir? Et si je te donne un conseil, tu ne m’écouteras pas. '
  '16':
  - type: text
    content: 'Le roi Sédécias jura secrètement à Jérémie, en disant: L’Éternel est vivant, lui qui nous a donné la '
  - type: note
    content: És 57:16.
  - type: text
    content: 'vie! Je ne te ferai pas mourir, et je ne te livrerai pas entre les mains de ces hommes qui en veulent à ta vie. '
  '17':
  - type: text
    content: 'Jérémie dit alors à Sédécias: Ainsi parle l’Éternel, le Dieu des armées, le Dieu d’Israël: Si tu vas te rendre aux chefs du roi de Babylone, tu auras la vie sauve, et cette ville ne sera pas brûlée par le feu; tu vivras, toi et ta maison. '
  '18':
  - type: text
    content: 'Mais si tu ne te rends pas aux chefs du roi de Babylone, cette ville sera livrée entre les mains des Chaldéens, qui la brûleront par le feu; et toi, tu n’échapperas pas à leurs mains. '
  '19':
  - type: text
    content: 'Le roi Sédécias dit à Jérémie: Je crains les Juifs qui ont passé aux Chaldéens; je crains qu’on ne me livre entre leurs mains, et qu’ils ne m’outragent. '
  '2':
  - type: text
    content: 'Ainsi parle l’Éternel: '
  - type: note
    content: Jé 21:9.
  - type: text
    content: 'Celui qui restera dans cette ville mourra par l’épée, par la famine ou par la peste; mais celui qui sortira pour se rendre aux Chaldéens, aura la vie sauve, sa vie sera son butin, et il vivra. '
  '20':
  - type: text
    content: 'Jérémie répondit: On ne te livrera pas. Écoute la voix de l’Éternel dans ce que je te dis; tu t’en trouveras bien, et tu auras la vie sauve. '
  '21':
  - type: text
    content: 'Mais si tu refuses de sortir, voici ce que l’Éternel m’a révélé: '
  '22':
  - type: text
    content: 'Toutes les femmes qui restent dans la maison du roi de Juda seront menées aux chefs du roi de Babylone, et elles diront: Tu as été trompé, dominé, par ceux qui t’annonçaient la paix; et quand tes pieds sont enfoncés dans la boue, ils se retirent. '
  '23':
  - type: text
    content: 'Toutes tes femmes et tes enfants seront menés aux Chaldéens; et toi, tu n’échapperas pas à leurs mains, tu seras saisi par la main du roi de Babylone, et cette ville sera brûlée par le feu. '
  '24':
  - type: text
    content: 'Sédécias dit à Jérémie: Que personne ne sache rien de ces discours, et tu ne mourras pas. '
  '25':
  - type: text
    content: 'Si les chefs apprennent que je t’ai parlé, et s’ils viennent te dire: Rapporte-nous ce que tu as dit au roi, et ce que le roi t’a dit, ne nous cache rien, et nous ne te ferons pas mourir, '
  '26':
  - type: text
    content: 'tu leur répondras: J’ai supplié le roi de ne pas me renvoyer dans la maison de Jonathan, de peur que je n’y meure. '
  '27':
  - type: text
    content: 'Tous les chefs vinrent auprès de Jérémie et le questionnèrent. Il leur répondit entièrement comme le roi l’avait ordonné. Ils gardèrent alors le silence et se retirèrent, car la chose ne s’était pas répandue. '
  '28':
  - type: text
    content: Jérémie resta dans la cour de la prison jusqu’au jour de la prise de Jérusalem.
  '3':
  - type: text
    content: 'Ainsi parle l’Éternel: Cette ville sera livrée à l’armée du roi de Babylone, qui la prendra. '
  '4':
  - type: text
    content: 'Et les chefs dirent au roi: Que cet homme soit mis à mort! Car il décourage les hommes de guerre qui restent dans cette ville, et tout le peuple, en leur tenant de pareils discours; cet homme ne cherche pas le bien de ce peuple, il ne veut que son malheur. '
  '5':
  - type: text
    content: 'Le roi Sédécias répondit: Voici, il est entre vos mains; car le roi ne peut rien contre vous. '
  '6':
  - type: text
    content: Alors ils prirent Jérémie, et le jetèrent dans la citerne de Malkija, fils du roi, laquelle se trouvait dans la cour de la prison; ils descendirent Jérémie avec des cordes. Il n’y avait point d’eau dans la citerne, mais il y avait de la boue; et Jérémie enfonça dans la boue.
  - type: heading
    content: 'V. 7-13: cf. Jé 39:16-18. 2 Ti 1:16-18. Mt 25:40.'
  '7':
  - type: text
    content: 'Ébed-Mélec, l’Éthiopien, eunuque qui était dans la maison du roi, apprit qu’on avait mis Jérémie dans la citerne. Le roi était assis à la porte de Benjamin. '
  '8':
  - type: text
    content: 'Ébed-Mélec sortit de la maison du roi, et parla ainsi au roi: '
  '9':
  - type: text
    content: 'O roi, mon seigneur, ces hommes ont mal agi en traitant de la sorte Jérémie, le prophète, en le jetant dans la citerne; il mourra de faim là où il est, car il n’y a plus de pain dans la ville. '
