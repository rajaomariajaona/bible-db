document_id: EST.1,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Festin d’Assuérus
  - type: heading
    content: 'V. 1-9: cf. Da 5:1-4. Mc 6:21-23.'
  - type: text
    content: 'C’était du temps d’Assuérus, de cet Assuérus qui régnait depuis l’Inde jusqu’en Éthiopie sur cent vingt-sept provinces; '
  '10':
  - type: text
    content: 'Le septième jour, comme le cœur du roi était réjoui par le vin, il ordonna à Mehuman, Biztha, Harbona, Bigtha, Abagtha, Zéthar et Carcas, les sept eunuques qui servaient devant le roi Assuérus, '
  '11':
  - type: text
    content: 'd’amener en sa présence la reine Vasthi, avec la couronne royale, pour montrer sa beauté aux peuples et aux grands, car elle était belle de figure. '
  '12':
  - type: text
    content: 'Mais la reine Vasthi refusa de venir, quand elle reçut par les eunuques l’ordre du roi. Et le roi fut très irrité, il fut enflammé de colère. '
  '13':
  - type: text
    content: 'Alors le roi s’adressa aux sages qui avaient la connaissance des temps. Car ainsi se traitaient les affaires du roi, devant tous ceux qui connaissaient les lois et le droit. '
  '14':
  - type: text
    content: 'Il avait auprès de lui Carschena, Schéthar, Admatha, Tarsis, Mérès, Marsena, Memucan, sept princes de Perse et de Médie, qui voyaient la face du roi et qui occupaient le premier rang dans le royaume. '
  '15':
  - type: text
    content: 'Quelle loi, dit-il, faut-il appliquer à la reine Vasthi, pour n’avoir point exécuté ce que le roi Assuérus lui a ordonné par les eunuques? '
  '16':
  - type: text
    content: 'Memucan répondit devant le roi et les princes: Ce n’est pas seulement à l’égard du roi que la reine Vasthi a mal agi; c’est aussi envers tous les princes et tous les peuples qui sont dans toutes les provinces du roi Assuérus. '
  '17':
  - type: text
    content: 'Car l’action de la reine parviendra à la connaissance de toutes les femmes, et les portera à mépriser leurs maris; elles diront: Le roi Assuérus avait ordonné qu’on amenât en sa présence la reine Vasthi, et elle n’y est pas allée. '
  '18':
  - type: text
    content: 'Et dès ce jour les princesses de Perse et de Médie qui auront appris l’action de la reine la rapporteront à tous les chefs du roi; de là beaucoup de mépris et de colère. '
  '19':
  - type: text
    content: 'Si le roi le trouve bon, qu’on publie de sa part et qu’on inscrive parmi les lois des Perses et des Mèdes, avec défense de la transgresser, une ordonnance royale d’après laquelle Vasthi ne paraîtra plus devant le roi Assuérus et le roi donnera la dignité de reine à une autre qui soit meilleure qu’elle. '
  '2':
  - type: text
    content: 'et le roi Assuérus était alors assis sur son trône royal à Suse, dans la capitale. '
  '20':
  - type: text
    content: 'L’édit du roi sera connu dans tout son royaume, quelque grand qu’il soit, et toutes les femmes rendront honneur à leurs maris, depuis le plus grand jusqu’au plus petit. '
  '21':
  - type: text
    content: 'Cet avis fut approuvé du roi et des princes, et le roi agit d’après la parole de Memucan. '
  '22':
  - type: text
    content: Il envoya des lettres à toutes les provinces du royaume, à chaque province selon son écriture et à chaque peuple selon sa langue; elles portaient que tout homme devait être le maître dans sa maison, et qu’il parlerait la langue de son peuple.
  '3':
  - type: text
    content: 'La troisième année de son règne, il fit un festin à tous ses princes et à ses serviteurs; les commandants de l’armée des Perses et des Mèdes, les grands et les chefs des provinces furent réunis en sa présence. '
  '4':
  - type: text
    content: 'Il montra la splendide richesse de son royaume et l’éclatante magnificence de sa grandeur pendant nombre de jours, pendant cent quatre-vingts jours. '
  '5':
  - type: text
    content: 'Lorsque ces jours furent écoulés, le roi fit pour tout le peuple qui se trouvait à Suse, la capitale, depuis le plus grand jusqu’au plus petit, un festin qui dura sept jours, dans la cour du jardin de la maison royale. '
  '6':
  - type: text
    content: 'Des tentures blanches, vertes et bleues, étaient attachées par des cordons de byssus et de pourpre à des anneaux d’argent et à des colonnes de marbre. Des lits d’or et d’argent reposaient sur un pavé de porphyre, de marbre, de nacre et de pierres noires. '
  '7':
  - type: text
    content: 'On servait à boire dans des vases d’or, de différentes espèces, et il y avait abondance de vin royal, grâce à la libéralité du roi. '
  '8':
  - type: text
    content: 'Mais on ne forçait personne à boire, car le roi avait ordonné à tous les gens de sa maison de se conformer à la volonté de chacun. '
  '9':
  - type: text
    content: La reine Vasthi fit aussi un festin pour les femmes dans la maison royale du roi Assuérus.
  - type: heading
    content: Désobéissance et disgrâce de la reine Vasthi
  - type: heading
    content: 'V. 10-22: cf. Ge 3:16. 1 Pi 3:1-7. Ép 5:33.'
