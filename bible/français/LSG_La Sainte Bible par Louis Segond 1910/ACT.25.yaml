document_id: ACT.25,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Festus, étant arrivé dans la province, monta trois jours après de Césarée à Jérusalem. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Paul dit: C’est devant le tribunal de César que je comparais, c’est là que je dois être jugé. Je n’ai fait aucun tort aux Juifs, comme tu le sais fort bien. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 18:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Si j’ai commis quelque injustice, ou quelque crime digne de mort, je ne refuse pas de mourir; mais, si les choses dont ils m’accusent sont fausses, personne n’a le droit de me livrer à eux. J’en appelle à César. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Festus, après avoir délibéré avec le conseil, répondit: Tu en as appelé à César; tu iras devant César.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le roi Agrippa en visite à Césarée
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 13-27: cf. Ac 25:1-12; 9:15.'
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quelques jours après, le roi Agrippa et Bérénice arrivèrent à Césarée, pour saluer Festus. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Comme ils passèrent là plusieurs jours, Festus exposa au roi l’affaire de Paul, et dit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 24:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Félix a laissé prisonnier un homme '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'contre lequel, lorsque j’étais à Jérusalem, les principaux sacrificateurs et les anciens des Juifs ont porté plainte, en demandant sa condamnation. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je leur ai répondu que ce n’est pas la coutume des Romains de livrer '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 17:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'un homme avant que l’inculpé ait été mis en présence de ses accusateurs, et qu’il ait eu la faculté de se défendre sur les choses dont on l’accuse. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils sont donc venus ici, et, sans différer, je m’assis le lendemain sur mon tribunal, et je donnai l’ordre qu’on amenât cet homme. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les accusateurs, s’étant présentés, ne lui imputèrent rien de ce que je supposais; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ils avaient avec lui des discussions relatives à leur religion particulière, et à un certain Jésus qui est mort, et que Paul affirmait être vivant. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les principaux sacrificateurs et les principaux d’entre les Juifs lui portèrent plainte contre Paul. Ils firent des instances auprès de lui, et, dans des vues hostiles, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ne sachant quel parti prendre dans ce débat, je lui demandai s’il voulait aller à Jérusalem, et y être jugé sur ces choses. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Paul en ayant appelé, pour que sa cause fût réservée à la connaissance de l’empereur, j’ai ordonné qu’on le gardât jusqu’à ce que je l’envoyasse à César. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Agrippa dit à Festus: Je voudrais aussi entendre cet homme. Demain, répondit Festus, tu l’entendras. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le lendemain donc, Agrippa et Bérénice vinrent en grande pompe, et entrèrent dans le lieu de l’audience avec les tribuns et les principaux de la ville. Sur l’ordre de Festus, Paul fut amené. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Festus dit: Roi Agrippa, et vous tous qui êtes présents avec nous, vous voyez cet homme au sujet duquel toute la multitude des Juifs s’est adressée à moi, soit à Jérusalem, soit ici, en s’écriant qu’il ne devait plus vivre. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pour moi, ayant reconnu '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 23:9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 26:31
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'qu’il n’a rien fait qui mérite la mort, et lui-même en ayant appelé à l’empereur, j’ai résolu de le faire partir. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je n’ai rien de certain à écrire à l’empereur sur son compte; c’est pourquoi je l’ai fait paraître devant vous, et surtout devant toi, roi Agrippa, afin de savoir qu’écrire, après qu’il aura été examiné. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Car il me semble absurde d’envoyer un prisonnier sans indiquer de quoi on l’accuse.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'lui demandèrent comme une faveur qu’il le fît venir à Jérusalem. Ils préparaient un guet-apens, pour le tuer en chemin. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Festus répondit que Paul était gardé à Césarée, et que lui-même devait partir sous peu. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Que les principaux d’entre vous descendent avec moi, dit-il, et s’il y a quelque chose de coupable en cet homme, qu’ils l’accusent. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Festus ne passa que huit à dix jours parmi eux, puis il descendit à Césarée. Le lendemain, s’étant assis sur son tribunal, il donna l’ordre qu’on amenât Paul. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand il fut arrivé, les Juifs qui étaient venus de Jérusalem l’entourèrent, et portèrent contre lui de nombreuses et graves accusations, qu’ils n’étaient pas en état de prouver. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Paul entreprit sa défense, en disant: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 24:12
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 28:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Je n’ai rien fait de coupable, ni contre la loi des Juifs, ni contre le temple, ni contre César. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Festus, désirant plaire aux Juifs, répondit à Paul: Veux-tu monter à Jérusalem, et y être jugé sur ces choses en ma présence? '
