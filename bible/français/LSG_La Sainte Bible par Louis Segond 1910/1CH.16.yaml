document_id: 1CH.16,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-43: cf. 1 Ch 15:16-28. (Ps 105; 96; 106.) Ép 5:19, 20. 2 S 6:17-19.'
  - type: text
    content: ' '
  - type: note
    content: 2 S 6:17.
  - type: text
    content: 'Après qu’on eut amené l’arche de Dieu, on la plaça au milieu de la tente que David avait dressée pour elle, et l’on offrit devant Dieu des holocaustes et des sacrifices d’actions de grâces. '
  '10':
  - type: text
    content: Glorifiez-vous de son saint nom!
  - type: text
    content: Que le cœur de ceux qui cherchent l’Éternel se réjouisse!
  '11':
  - type: text
    content: Ayez recours à l’Éternel et à son appui,
  - type: text
    content: Cherchez continuellement sa face!
  '12':
  - type: text
    content: Souvenez-vous des prodiges qu’il a faits,
  - type: text
    content: De ses miracles et des jugements de sa bouche,
  '13':
  - type: text
    content: Race d’Israël, son serviteur,
  - type: text
    content: Enfants de Jacob, ses élus!
  '14':
  - type: text
    content: L’Éternel est notre Dieu;
  - type: text
    content: Ses jugements s’exercent sur toute la terre.
  '15':
  - type: text
    content: ' '
  - type: note
    content: Ge 17:9.
  - type: text
    content: Rappelez-vous à toujours son alliance,
  - type: text
    content: Ses promesses pour mille générations,
  '16':
  - type: text
    content: ' '
  - type: note
    content: Ge 26:3.
  - type: text
    content: L’alliance qu’il a traitée avec Abraham,
  - type: text
    content: Et le serment qu’il a fait à Isaac;
  '17':
  - type: text
    content: ' '
  - type: note
    content: Ge 28:13; 35:11.
  - type: text
    content: Il l’a érigée pour Jacob en loi,
  - type: text
    content: Pour Israël en alliance éternelle,
  '18':
  - type: text
    content: 'Disant: Je te donnerai le pays de Canaan'
  - type: text
    content: Comme l’héritage qui vous est échu.
  '19':
  - type: text
    content: Ils étaient alors peu nombreux,
  - type: text
    content: Très peu nombreux, et étrangers dans le pays,
  '2':
  - type: text
    content: 'Quand David eut achevé d’offrir les holocaustes et les sacrifices d’actions de grâces, il bénit le peuple au nom de l’Éternel. '
  '20':
  - type: text
    content: Et ils allaient d’une nation à l’autre
  - type: text
    content: Et d’un royaume vers un autre peuple;
  '21':
  - type: text
    content: ' '
  - type: note
    content: Ge 12:20. Ex 7:8, 9, 10, 11.
  - type: text
    content: Mais il ne permit à personne de les opprimer,
  - type: text
    content: 'Et il châtia des rois à cause d’eux:'
  '22':
  - type: text
    content: Ne touchez pas à mes oints,
  - type: text
    content: Et ne faites pas de mal à mes prophètes!
  '23':
  - type: text
    content: Chantez à l’Éternel, vous tous habitants de la terre!
  - type: text
    content: Annoncez de jour en jour son salut;
  '24':
  - type: text
    content: Racontez parmi les nations sa gloire,
  - type: text
    content: Parmi tous les peuples ses merveilles!
  '25':
  - type: text
    content: Car l’Éternel est grand et très digne de louange,
  - type: text
    content: Il est redoutable par-dessus tous les dieux;
  '26':
  - type: text
    content: Car tous les dieux des peuples sont des idoles,
  - type: text
    content: Et l’Éternel a fait les cieux.
  '27':
  - type: text
    content: La majesté et la splendeur sont devant sa face,
  - type: text
    content: La force et la joie sont dans sa demeure.
  '28':
  - type: text
    content: Familles des peuples, rendez à l’Éternel,
  - type: text
    content: Rendez à l’Éternel gloire et honneur!
  '29':
  - type: text
    content: Rendez à l’Éternel gloire pour son nom!
  - type: text
    content: Apportez des offrandes et venez en sa présence,
  - type: text
    content: Prosternez-vous devant l’Éternel avec de saints ornements!
  '3':
  - type: note
    content: 2 S 6:19.
  - type: text
    content: 'Puis il distribua à tous ceux d’Israël, hommes et femmes, à chacun un pain, une portion de viande et un gâteau de raisins. '
  '30':
  - type: text
    content: Tremblez devant lui, vous tous habitants de la terre!
  - type: text
    content: Le monde est affermi, il ne chancelle point.
  '31':
  - type: text
    content: Que les cieux se réjouissent, et que la terre soit dans l’allégresse!
  - type: text
    content: 'Que l’on dise parmi les nations:'
  - type: text
    content: L’Éternel règne!
  '32':
  - type: text
    content: Que la mer retentisse avec tout ce qu’elle contient!
  - type: text
    content: Que la campagne s’égaie avec tout ce qu’elle renferme!
  '33':
  - type: text
    content: Que les arbres des forêts poussent des cris de joie
  - type: text
    content: Devant l’Éternel! Car il vient pour juger la terre.
  '34':
  - type: text
    content: ' '
  - type: note
    content: Ps 107:1; 118:1; 136:1.
  - type: text
    content: Louez l’Éternel, car il est bon,
  - type: note
    content: Ps 136:1, etc.
  - type: text
    content: Car sa miséricorde dure à toujours!
  '35':
  - type: text
    content: 'Dites: Sauve-nous, Dieu de notre salut,'
  - type: text
    content: Rassemble-nous, et retire-nous du milieu des nations,
  - type: text
    content: Afin que nous célébrions ton saint nom
  - type: text
    content: Et que nous mettions notre gloire à te louer!
  '36':
  - type: text
    content: Béni soit l’Éternel, le Dieu d’Israël,
  - type: text
    content: D’éternité en éternité!
  - type: text
    content: 'Et que tout le peuple dise: Amen!'
  - type: text
    content: Louez l’Éternel!
  '37':
  - type: text
    content: 'David laissa là, devant l’arche de l’alliance de l’Éternel, Asaph et ses frères, afin qu’ils fussent continuellement de service devant l’arche, remplissant leur tâche jour par jour. '
  '38':
  - type: text
    content: 'Il laissa Obed-Édom et Hosa avec leurs frères, au nombre de soixante-huit, Obed-Édom, fils de Jeduthun, et Hosa, comme portiers. '
  '39':
  - type: text
    content: 'Il établit le sacrificateur Tsadok et les sacrificateurs, ses frères, devant le tabernacle de l’Éternel, sur le haut lieu qui était à Gabaon, '
  '4':
  - type: text
    content: 'Il remit à des Lévites la charge de faire le service devant l’arche de l’Éternel, d’invoquer, de louer et de célébrer l’Éternel, le Dieu d’Israël. '
  '40':
  - type: text
    content: 'pour qu’ils offrissent continuellement à l’Éternel des holocaustes, matin et soir, sur l’autel des holocaustes, et qu’ils accomplissent tout ce qui est écrit dans la loi de l’Éternel, imposée par l’Éternel à Israël. '
  '41':
  - type: text
    content: 'Auprès d’eux étaient Héman et Jeduthun, et les autres qui avaient été choisis et désignés par leurs noms pour louer l’Éternel. Car sa miséricorde dure à toujours. '
  '42':
  - type: text
    content: 'Auprès d’eux étaient Héman et Jeduthun, avec des trompettes et des cymbales pour ceux qui les faisaient retentir, et avec des instruments pour les cantiques en l’honneur de Dieu. Les fils de Jeduthun étaient portiers. '
  '43':
  - type: text
    content: Tout le peuple s’en alla chacun dans sa maison, et David s’en retourna pour bénir sa maison.
  '5':
  - type: text
    content: 'C’étaient: Asaph, le chef; Zacharie, le second après lui, Jeïel, Schemiramoth, Jehiel, Matthithia, Éliab, Benaja, Obed-Édom et Jeïel. Ils avaient des instruments de musique, des luths et des harpes; et Asaph faisait retentir les cymbales. '
  '6':
  - type: text
    content: 'Les sacrificateurs Benaja et Jachaziel sonnaient continuellement des trompettes devant l’arche de l’alliance de Dieu. '
  '7':
  - type: text
    content: Ce fut en ce jour que David chargea pour la première fois Asaph et ses frères de célébrer les louanges de l’Éternel.
  '8':
  - type: text
    content: Louez l’Éternel, invoquez son nom!
  - type: text
    content: Faites connaître parmi les peuples ses hauts faits!
  '9':
  - type: text
    content: Chantez, chantez en son honneur!
  - type: text
    content: Parlez de toutes ses merveilles!
