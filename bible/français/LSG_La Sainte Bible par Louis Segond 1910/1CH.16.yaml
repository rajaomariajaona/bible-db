document_id: 1CH.16
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-43: cf. 1 Ch 15:16-28. (Ps 105; 96; 106.) Ép 5:19, 20. 2 S 6:17-19.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 S 6:17
      metadata:
        usfm: 2SA.6.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Après qu’on eut amené l’arche de Dieu, on la plaça au milieu de la tente que David avait dressée pour elle, et l’on offrit devant Dieu des holocaustes et des sacrifices d’actions de grâces. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Quand David eut achevé d’offrir les holocaustes et les sacrifices d’actions de grâces, il bénit le peuple au nom de l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 S 6:19
      metadata:
        usfm: 2SA.6.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Puis il distribua à tous ceux d’Israël, hommes et femmes, à chacun un pain, une portion de viande et un gâteau de raisins. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il remit à des Lévites la charge de faire le service devant l’arche de l’Éternel, d’invoquer, de louer et de célébrer l’Éternel, le Dieu d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'C’étaient: Asaph, le chef; Zacharie, le second après lui, Jeïel, Schemiramoth, Jehiel, Matthithia, Éliab, Benaja, Obed-Édom et Jeïel. Ils avaient des instruments de musique, des luths et des harpes; et Asaph faisait retentir les cymbales. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Les sacrificateurs Benaja et Jachaziel sonnaient continuellement des trompettes devant l’arche de l’alliance de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ce fut en ce jour que David chargea pour la première fois Asaph et ses frères de célébrer les louanges de l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Louez l’Éternel, invoquez son nom!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Faites connaître parmi les peuples ses hauts faits!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Chantez, chantez en son honneur!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parlez de toutes ses merveilles!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Glorifiez-vous de son saint nom!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que le cœur de ceux qui cherchent l’Éternel se réjouisse!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ayez recours à l’Éternel et à son appui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cherchez continuellement sa face!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Souvenez-vous des prodiges qu’il a faits,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De ses miracles et des jugements de sa bouche,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Race d’Israël, son serviteur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Enfants de Jacob, ses élus!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: L’Éternel est notre Dieu;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses jugements s’exercent sur toute la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 17:9
      metadata:
        usfm: GEN.17.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Rappelez-vous à toujours son alliance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses promesses pour mille générations,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 26:3
      metadata:
        usfm: GEN.26.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: L’alliance qu’il a traitée avec Abraham,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le serment qu’il a fait à Isaac;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 28:13
      metadata:
        usfm: GEN.28.13
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 35:11
      metadata:
        usfm: GEN.35.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il l’a érigée pour Jacob en loi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour Israël en alliance éternelle,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Disant: Je te donnerai le pays de Canaan'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme l’héritage qui vous est échu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ils étaient alors peu nombreux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Très peu nombreux, et étrangers dans le pays,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Et ils allaient d’une nation à l’autre
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et d’un royaume vers un autre peuple;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 12:20
      metadata:
        usfm: GEN.12.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 7:8
      metadata:
        usfm: EXO.7.8
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '9'
      metadata:
        usfm: EXO.7.9
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '10'
      metadata:
        usfm: EXO.7.10
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '11'
      metadata:
        usfm: EXO.7.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Mais il ne permit à personne de les opprimer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et il châtia des rois à cause d’eux:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ne touchez pas à mes oints,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ne faites pas de mal à mes prophètes!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Chantez à l’Éternel, vous tous habitants de la terre!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Annoncez de jour en jour son salut;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Racontez parmi les nations sa gloire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parmi tous les peuples ses merveilles!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Car l’Éternel est grand et très digne de louange,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est redoutable par-dessus tous les dieux;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Car tous les dieux des peuples sont des idoles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et l’Éternel a fait les cieux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: La majesté et la splendeur sont devant sa face,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La force et la joie sont dans sa demeure.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Familles des peuples, rendez à l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rendez à l’Éternel gloire et honneur!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Rendez à l’Éternel gloire pour son nom!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Apportez des offrandes et venez en sa présence,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Prosternez-vous devant l’Éternel avec de saints ornements!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Tremblez devant lui, vous tous habitants de la terre!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le monde est affermi, il ne chancelle point.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Que les cieux se réjouissent, et que la terre soit dans l’allégresse!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Que l’on dise parmi les nations:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’Éternel règne!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Que la mer retentisse avec tout ce qu’elle contient!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que la campagne s’égaie avec tout ce qu’elle renferme!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Que les arbres des forêts poussent des cris de joie
- type: usfm
  marker: q1
  children:
  - type: text
    text: Devant l’Éternel! Car il vient pour juger la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 107:1
      metadata:
        usfm: PSA.107.1
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 118:1
      metadata:
        usfm: PSA.118.1
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 136:1
      metadata:
        usfm: PSA.136.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Louez l’Éternel, car il est bon,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps 136:1, etc.
    marker-yv: yv-n
  - type: text
    text: Car sa miséricorde dure à toujours!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Dites: Sauve-nous, Dieu de notre salut,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rassemble-nous, et retire-nous du milieu des nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afin que nous célébrions ton saint nom
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que nous mettions notre gloire à te louer!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Béni soit l’Éternel, le Dieu d’Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: D’éternité en éternité!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et que tout le peuple dise: Amen!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Louez l’Éternel!
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'David laissa là, devant l’arche de l’alliance de l’Éternel, Asaph et ses frères, afin qu’ils fussent continuellement de service devant l’arche, remplissant leur tâche jour par jour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Il laissa Obed-Édom et Hosa avec leurs frères, au nombre de soixante-huit, Obed-Édom, fils de Jeduthun, et Hosa, comme portiers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Il établit le sacrificateur Tsadok et les sacrificateurs, ses frères, devant le tabernacle de l’Éternel, sur le haut lieu qui était à Gabaon, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'pour qu’ils offrissent continuellement à l’Éternel des holocaustes, matin et soir, sur l’autel des holocaustes, et qu’ils accomplissent tout ce qui est écrit dans la loi de l’Éternel, imposée par l’Éternel à Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Auprès d’eux étaient Héman et Jeduthun, et les autres qui avaient été choisis et désignés par leurs noms pour louer l’Éternel. Car sa miséricorde dure à toujours. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Auprès d’eux étaient Héman et Jeduthun, avec des trompettes et des cymbales pour ceux qui les faisaient retentir, et avec des instruments pour les cantiques en l’honneur de Dieu. Les fils de Jeduthun étaient portiers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Tout le peuple s’en alla chacun dans sa maison, et David s’en retourna pour bénir sa maison.
