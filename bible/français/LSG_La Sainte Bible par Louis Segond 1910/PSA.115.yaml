document_id: PSA.115,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: Ps 135.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Non pas à nous, Éternel, non pas à nous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais à ton nom donne gloire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause de ta bonté, à cause de ta fidélité!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maison d’Aaron, confie-toi en l’Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est leur secours et leur bouclier.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous qui craignez l’Éternel, confiez-vous en l’Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est leur secours et leur bouclier.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'L’Éternel se souvient de nous: il bénira,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il bénira la maison d’Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il bénira la maison d’Aaron,
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il bénira ceux qui craignent l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les petits et les grands;
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel vous multipliera ses faveurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A vous et à vos enfants.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Soyez bénis par l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui a fait les cieux et la terre!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les cieux sont les cieux de l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais il a donné la terre aux fils de l’homme.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce ne sont pas les morts qui célèbrent l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce n’est aucun de ceux qui descendent dans le lieu du silence;
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais nous, nous bénirons l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dès maintenant et à jamais.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Louez l’Éternel!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Pourquoi les nations diraient-elles:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Où donc est leur Dieu?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Notre Dieu est au ciel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il fait tout ce qu’il veut.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leurs idoles sont de l’argent et de l’or,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles sont l’ouvrage de la main des hommes.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 4:28
      - type: text
        text: . Jé 10:3, 4, 5, 9, etc.
      marker-yv: yv-n
    - type: text
      text: Elles ont une bouche et ne parlent point,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles ont des yeux et ne voient point,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles ont des oreilles et n’entendent point,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles ont un nez et ne sentent point,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles ont des mains et ne touchent point,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des pieds et ne marchent point,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles ne produisent aucun son dans leur gosier.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils leur ressemblent, ceux qui les fabriquent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous ceux qui se confient en elles.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Israël, confie-toi en l’Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est leur secours et leur bouclier.
