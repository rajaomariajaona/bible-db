document_id: PSA.115,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ps 135.
  - type: text
    content: Non pas à nous, Éternel, non pas à nous,
  - type: text
    content: Mais à ton nom donne gloire,
  - type: text
    content: A cause de ta bonté, à cause de ta fidélité!
  '10':
  - type: text
    content: Maison d’Aaron, confie-toi en l’Éternel!
  - type: text
    content: Il est leur secours et leur bouclier.
  '11':
  - type: text
    content: Vous qui craignez l’Éternel, confiez-vous en l’Éternel!
  - type: text
    content: Il est leur secours et leur bouclier.
  '12':
  - type: text
    content: 'L’Éternel se souvient de nous: il bénira,'
  - type: text
    content: Il bénira la maison d’Israël,
  - type: text
    content: Il bénira la maison d’Aaron,
  '13':
  - type: text
    content: Il bénira ceux qui craignent l’Éternel,
  - type: text
    content: Les petits et les grands;
  '14':
  - type: text
    content: L’Éternel vous multipliera ses faveurs,
  - type: text
    content: A vous et à vos enfants.
  '15':
  - type: text
    content: Soyez bénis par l’Éternel,
  - type: text
    content: Qui a fait les cieux et la terre!
  '16':
  - type: text
    content: Les cieux sont les cieux de l’Éternel,
  - type: text
    content: Mais il a donné la terre aux fils de l’homme.
  '17':
  - type: text
    content: Ce ne sont pas les morts qui célèbrent l’Éternel,
  - type: text
    content: Ce n’est aucun de ceux qui descendent dans le lieu du silence;
  '18':
  - type: text
    content: Mais nous, nous bénirons l’Éternel,
  - type: text
    content: Dès maintenant et à jamais.
  - type: text
    content: Louez l’Éternel!
  '2':
  - type: text
    content: 'Pourquoi les nations diraient-elles:'
  - type: text
    content: Où donc est leur Dieu?
  '3':
  - type: text
    content: Notre Dieu est au ciel,
  - type: text
    content: Il fait tout ce qu’il veut.
  '4':
  - type: text
    content: Leurs idoles sont de l’argent et de l’or,
  - type: text
    content: Elles sont l’ouvrage de la main des hommes.
  '5':
  - type: text
    content: ' '
  - type: note
    content: De 4:28. Jé 10:3, 4, 5, 9, etc.
  - type: text
    content: Elles ont une bouche et ne parlent point,
  - type: text
    content: Elles ont des yeux et ne voient point,
  '6':
  - type: text
    content: Elles ont des oreilles et n’entendent point,
  - type: text
    content: Elles ont un nez et ne sentent point,
  '7':
  - type: text
    content: Elles ont des mains et ne touchent point,
  - type: text
    content: Des pieds et ne marchent point,
  - type: text
    content: Elles ne produisent aucun son dans leur gosier.
  '8':
  - type: text
    content: Ils leur ressemblent, ceux qui les fabriquent,
  - type: text
    content: Tous ceux qui se confient en elles.
  '9':
  - type: text
    content: Israël, confie-toi en l’Éternel!
  - type: text
    content: Il est leur secours et leur bouclier.
