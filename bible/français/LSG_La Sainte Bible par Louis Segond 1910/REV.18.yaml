document_id: REV.18,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-8: cf. Ap 17:1-6. (És 13; 47. Jé 50; 51.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après cela, je vis descendre du ciel un autre ange, qui avait une grande autorité; et la terre fut éclairée de sa gloire. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Se tenant éloignés, dans la crainte de son tourment, ils diront: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 21:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 51:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 14:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Malheur! Malheur! La grande ville, Babylone, la ville puissante! En une seule heure est venu ton jugement! '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et les marchands de la terre pleurent et sont dans le deuil à cause d’elle, parce que personne n’achète plus leur cargaison, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'cargaison d’or, d’argent, de pierres précieuses, de perles, de fin lin, de pourpre, de soie, d’écarlate, de toute espèce de bois de senteur, de toute espèce d’objets d’ivoire, de toute espèce d’objets en bois très précieux, en airain, en fer et en marbre, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'de cinnamome, d’aromates, de parfums, de myrrhe, d’encens, de vin, d’huile, de fine farine, de blé, de bœufs, de brebis, de chevaux, de chars, de corps et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 27:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'd’âmes d’hommes. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les fruits que désirait ton âme sont allés loin de toi; et toutes les choses délicates et magnifiques sont perdues pour toi, et tu ne les retrouveras plus. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les marchands de ces choses, qui se sont enrichis par elle, se tiendront éloignés, dans la crainte de son tourment; ils pleureront et seront dans le deuil, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et diront: Malheur! Malheur! La grande ville, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 17:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'qui était vêtue de fin lin, de pourpre et d’écarlate, et parée d’or, de pierres précieuses et de perles! En une seule heure tant de richesses ont été détruites! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et tous les pilotes, tous ceux qui naviguent vers ce lieu, les marins, et tous ceux qui exploitent la mer, se tenaient éloignés, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et ils s’écriaient, en voyant '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 34:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 18:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'la fumée de son embrasement: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 13:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Quelle ville était semblable à la grande ville? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et ils jetaient de la poussière sur leurs têtes, ils pleuraient et ils étaient dans le deuil, ils criaient et disaient: Malheur! Malheur! La grande ville, où se sont enrichis par son opulence tous ceux qui ont des navires sur la mer, en une seule heure elle a été détruite!'
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 20-24: cf. Ap 19:1-5. És 14:3-23.'
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il cria d’une voix forte, disant: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 21:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 51:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 14:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Elle est tombée, elle est tombée, Babylone la grande! Elle est devenue '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 13:21
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 34:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 50:39
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'une habitation de démons, un repaire de tout esprit impur, un repaire de tout '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 34:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'oiseau impur et odieux, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ciel, réjouis-toi sur elle! Et vous, les saints, les apôtres, et les prophètes, réjouissez-vous aussi! Car Dieu vous a fait justice en '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 19:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'la jugeant. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors un ange puissant prit une pierre semblable à une grande meule, et il la jeta dans la mer, en disant: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 51:64
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Ainsi sera précipitée avec violence Babylone, la grande ville, et elle ne sera plus trouvée. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 25:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 26:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Et l’on n’entendra plus chez toi les sons des joueurs de harpe, des musiciens, des joueurs de flûte et des joueurs de trompette, on ne trouvera plus chez toi aucun artisan d’un métier quelconque, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 25:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'on n’entendra plus chez toi le bruit de la meule, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'la lumière de la lampe ne brillera plus chez toi, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 7:34
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 25:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'et la voix de l’époux et de l’épouse ne sera plus entendue chez toi, parce que tes marchands étaient les grands de la terre, parce que toutes les nations ont été séduites par tes enchantements, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et parce qu’on a trouvé chez elle '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 17:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: le sang des prophètes et des saints et de tous ceux qui ont été égorgés sur la terre.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'parce que toutes les nations ont bu '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 14:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'du vin de la fureur de son impudicité, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 17:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'et que les rois de la terre se sont livrés avec elle à l’impudicité, et que les marchands de la terre se sont enrichis par la puissance de son luxe. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et j’entendis du ciel une autre voix qui disait: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 19:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 48:20
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 52:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 51:6
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '45'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 6:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Sortez du milieu d’elle, mon peuple, afin que vous ne participiez point à ses péchés, et que vous n’ayez point de part à ses fléaux. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car ses péchés se sont accumulés jusqu’au ciel, et Dieu '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 16:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 's’est souvenu de ses iniquités. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Payez-la comme elle a payé, et rendez-lui au double selon ses œuvres. Dans la coupe '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 14:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'où elle a versé, versez-lui au double. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Autant elle s’est glorifiée et plongée dans le luxe, autant donnez-lui de tourment et de deuil. Parce qu’elle dit en son cœur: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 47:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Je suis assise en reine, je ne suis point veuve, et je ne verrai point de deuil! '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Th 2:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'A cause de cela, en un même jour, ses fléaux arriveront, la mort, le deuil et la famine, et elle sera consumée '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 17:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: par le feu. Car il est puissant, le Seigneur Dieu qui l’a jugée.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 9-19: cf. Éz 26:15-21; 27.'
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 17:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Et tous les rois de la terre, qui se sont livrés avec elle à l’impudicité et au luxe, pleureront et se lamenteront à cause d’elle, quand ils verront '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 18:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'la fumée de son embrasement. '
