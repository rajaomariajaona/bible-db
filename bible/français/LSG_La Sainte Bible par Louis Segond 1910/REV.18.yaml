document_id: REV.18,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-8: cf. Ap 17:1-6. (És 13; 47. Jé 50; 51.)'
  - type: text
    content: 'Après cela, je vis descendre du ciel un autre ange, qui avait une grande autorité; et la terre fut éclairée de sa gloire. '
  '10':
  - type: text
    content: 'Se tenant éloignés, dans la crainte de son tourment, ils diront: '
  - type: note
    content: És 21:9. Jé 51:8. Ap 14:8.
  - type: text
    content: 'Malheur! Malheur! La grande ville, Babylone, la ville puissante! En une seule heure est venu ton jugement! '
  '11':
  - type: text
    content: 'Et les marchands de la terre pleurent et sont dans le deuil à cause d’elle, parce que personne n’achète plus leur cargaison, '
  '12':
  - type: text
    content: 'cargaison d’or, d’argent, de pierres précieuses, de perles, de fin lin, de pourpre, de soie, d’écarlate, de toute espèce de bois de senteur, de toute espèce d’objets d’ivoire, de toute espèce d’objets en bois très précieux, en airain, en fer et en marbre, '
  '13':
  - type: text
    content: 'de cinnamome, d’aromates, de parfums, de myrrhe, d’encens, de vin, d’huile, de fine farine, de blé, de bœufs, de brebis, de chevaux, de chars, de corps et '
  - type: note
    content: Éz 27:13.
  - type: text
    content: 'd’âmes d’hommes. '
  '14':
  - type: text
    content: 'Les fruits que désirait ton âme sont allés loin de toi; et toutes les choses délicates et magnifiques sont perdues pour toi, et tu ne les retrouveras plus. '
  '15':
  - type: text
    content: 'Les marchands de ces choses, qui se sont enrichis par elle, se tiendront éloignés, dans la crainte de son tourment; ils pleureront et seront dans le deuil, '
  '16':
  - type: text
    content: 'et diront: Malheur! Malheur! La grande ville, '
  - type: note
    content: Ap 17:4.
  - type: text
    content: 'qui était vêtue de fin lin, de pourpre et d’écarlate, et parée d’or, de pierres précieuses et de perles! En une seule heure tant de richesses ont été détruites! '
  '17':
  - type: text
    content: 'Et tous les pilotes, tous ceux qui naviguent vers ce lieu, les marins, et tous ceux qui exploitent la mer, se tenaient éloignés, '
  '18':
  - type: text
    content: 'et ils s’écriaient, en voyant '
  - type: note
    content: És 34:10. Ap 18:9.
  - type: text
    content: 'la fumée de son embrasement: '
  - type: note
    content: Ap 13:4.
  - type: text
    content: 'Quelle ville était semblable à la grande ville? '
  '19':
  - type: text
    content: 'Et ils jetaient de la poussière sur leurs têtes, ils pleuraient et ils étaient dans le deuil, ils criaient et disaient: Malheur! Malheur! La grande ville, où se sont enrichis par son opulence tous ceux qui ont des navires sur la mer, en une seule heure elle a été détruite!'
  - type: heading
    content: 'V. 20-24: cf. Ap 19:1-5. És 14:3-23.'
  '2':
  - type: text
    content: 'Il cria d’une voix forte, disant: '
  - type: note
    content: És 21:9. Jé 51:8. Ap 14:8.
  - type: text
    content: 'Elle est tombée, elle est tombée, Babylone la grande! Elle est devenue '
  - type: note
    content: És 13:21; 34:14. Jé 50:39.
  - type: text
    content: 'une habitation de démons, un repaire de tout esprit impur, un repaire de tout '
  - type: note
    content: És 34:11.
  - type: text
    content: 'oiseau impur et odieux, '
  '20':
  - type: text
    content: 'Ciel, réjouis-toi sur elle! Et vous, les saints, les apôtres, et les prophètes, réjouissez-vous aussi! Car Dieu vous a fait justice en '
  - type: note
    content: Ap 19:2.
  - type: text
    content: 'la jugeant. '
  '21':
  - type: text
    content: 'Alors un ange puissant prit une pierre semblable à une grande meule, et il la jeta dans la mer, en disant: '
  - type: note
    content: Jé 51:64.
  - type: text
    content: 'Ainsi sera précipitée avec violence Babylone, la grande ville, et elle ne sera plus trouvée. '
  '22':
  - type: note
    content: Jé 25:10. Éz 26:13.
  - type: text
    content: 'Et l’on n’entendra plus chez toi les sons des joueurs de harpe, des musiciens, des joueurs de flûte et des joueurs de trompette, on ne trouvera plus chez toi aucun artisan d’un métier quelconque, '
  - type: note
    content: Jé 25:10.
  - type: text
    content: 'on n’entendra plus chez toi le bruit de la meule, '
  '23':
  - type: text
    content: 'la lumière de la lampe ne brillera plus chez toi, '
  - type: note
    content: Jé 7:34; 16:9; 25:10.
  - type: text
    content: 'et la voix de l’époux et de l’épouse ne sera plus entendue chez toi, parce que tes marchands étaient les grands de la terre, parce que toutes les nations ont été séduites par tes enchantements, '
  '24':
  - type: text
    content: 'et parce qu’on a trouvé chez elle '
  - type: note
    content: Ap 17:6.
  - type: text
    content: le sang des prophètes et des saints et de tous ceux qui ont été égorgés sur la terre.
  '3':
  - type: text
    content: 'parce que toutes les nations ont bu '
  - type: note
    content: Ap 14:8.
  - type: text
    content: 'du vin de la fureur de son impudicité, '
  - type: note
    content: Ap 17:2.
  - type: text
    content: 'et que les rois de la terre se sont livrés avec elle à l’impudicité, et que les marchands de la terre se sont enrichis par la puissance de son luxe. '
  '4':
  - type: text
    content: 'Et j’entendis du ciel une autre voix qui disait: '
  - type: note
    content: Ge 19:12. És 48:20; 52:11. Jé 51:6, 45. 2 Co 6:17.
  - type: text
    content: 'Sortez du milieu d’elle, mon peuple, afin que vous ne participiez point à ses péchés, et que vous n’ayez point de part à ses fléaux. '
  '5':
  - type: text
    content: 'Car ses péchés se sont accumulés jusqu’au ciel, et Dieu '
  - type: note
    content: Ap 16:19.
  - type: text
    content: 's’est souvenu de ses iniquités. '
  '6':
  - type: text
    content: 'Payez-la comme elle a payé, et rendez-lui au double selon ses œuvres. Dans la coupe '
  - type: note
    content: Ap 14:10.
  - type: text
    content: 'où elle a versé, versez-lui au double. '
  '7':
  - type: text
    content: 'Autant elle s’est glorifiée et plongée dans le luxe, autant donnez-lui de tourment et de deuil. Parce qu’elle dit en son cœur: '
  - type: note
    content: És 47:8.
  - type: text
    content: 'Je suis assise en reine, je ne suis point veuve, et je ne verrai point de deuil! '
  '8':
  - type: note
    content: 2 Th 2:8.
  - type: text
    content: 'A cause de cela, en un même jour, ses fléaux arriveront, la mort, le deuil et la famine, et elle sera consumée '
  - type: note
    content: Ap 17:16.
  - type: text
    content: par le feu. Car il est puissant, le Seigneur Dieu qui l’a jugée.
  - type: heading
    content: 'V. 9-19: cf. Éz 26:15-21; 27.'
  '9':
  - type: text
    content: ' '
  - type: note
    content: Ap 17:2; 18:3.
  - type: text
    content: 'Et tous les rois de la terre, qui se sont livrés avec elle à l’impudicité et au luxe, pleureront et se lamenteront à cause d’elle, quand ils verront '
  - type: note
    content: Ap 18:18.
  - type: text
    content: 'la fumée de son embrasement. '
