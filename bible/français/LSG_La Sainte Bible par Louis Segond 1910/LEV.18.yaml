  marker: r
  children:
  - type: text
    text: 'V. 1-30: cf. Lé 20. De 18:9. (1 Th 4:3-7. 1 Pi 2:11, 12.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Éternel parla à Moïse, et dit: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Parle aux enfants d’Israël, et tu leur diras: Je suis l’Éternel, votre Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Vous ne ferez point ce qui se fait dans le pays d’Égypte où vous avez habité, et vous ne ferez point ce qui se fait dans le pays de Canaan où je vous mène: vous ne suivrez point leurs usages. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Vous pratiquerez mes ordonnances, et vous observerez mes lois: vous les suivrez. Je suis l’Éternel, votre Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Vous observerez mes lois et mes ordonnances: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 20:11
      metadata:
        usfm: EZK.20.11
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '13'
      metadata:
        usfm: EZK.20.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 10:5
      metadata:
        usfm: ROM.10.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 3:12
      metadata:
        usfm: GAL.3.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'l’homme qui les mettra en pratique vivra par elles. Je suis l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nul de vous ne s’approchera de sa parente, pour découvrir sa nudité. Je suis l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tu ne découvriras point la nudité de ton père, ni la nudité de ta mère. C’est ta mère: tu ne découvriras point sa nudité. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 20:11
      metadata:
        usfm: LEV.20.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 5:1
      metadata:
        usfm: 1CO.5.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu ne découvriras point la nudité de la femme de ton père. C’est la nudité de ton père. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Tu ne découvriras point la nudité de ta sœur, fille de ton père ou fille de ta mère, née dans la maison ou née hors de la maison. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tu ne découvriras point la nudité de la fille de ton fils ou de la fille de ta fille. Car c’est ta nudité. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 20:17
      metadata:
        usfm: LEV.20.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu ne découvriras point la nudité de la fille de la femme de ton père, née de ton père. C’est ta sœur. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 20:19
      metadata:
        usfm: LEV.20.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu ne découvriras point la nudité de la sœur de ton père. C’est la proche parente de ton père. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tu ne découvriras point la nudité de la sœur de ta mère. Car c’est la proche parente de ta mère. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 20:20
      metadata:
        usfm: LEV.20.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 22:11
      metadata:
        usfm: EZK.22.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu ne découvriras point la nudité du frère de ton père. Tu ne t’approcheras point de sa femme. C’est ta tante. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 20:12
      metadata:
        usfm: LEV.20.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu ne découvriras point la nudité de ta belle-fille. C’est la femme de ton fils: tu ne découvriras point sa nudité. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 20:21
      metadata:
        usfm: LEV.20.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu ne découvriras point la nudité de la femme de ton frère. C’est la nudité de ton frère. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 20:14
      metadata:
        usfm: LEV.20.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu ne découvriras point la nudité d’une femme et de sa fille. Tu ne prendras point la fille de son fils, ni la fille de sa fille, pour découvrir leur nudité. Ce sont tes proches parentes: c’est un crime. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tu ne prendras point la sœur de ta femme, pour exciter une rivalité, en découvrant sa nudité à côté de ta femme pendant sa vie. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 20:18
      metadata:
        usfm: LEV.20.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu ne t’approcheras point d’une femme pendant son impureté menstruelle, pour découvrir sa nudité. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 20:10
      metadata:
        usfm: LEV.20.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu n’auras point commerce avec la femme de ton prochain, pour te souiller avec elle. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 20:2
      metadata:
        usfm: LEV.20.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 18:10
      metadata:
        usfm: DEU.18.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 17:17
      metadata:
        usfm: 2KI.17.17
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 23:10
      metadata:
        usfm: 2KI.23.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu ne livreras aucun de tes enfants pour le faire passer à Moloc, et tu ne profaneras point le nom de ton Dieu. Je suis l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 20:13
      metadata:
        usfm: LEV.20.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu ne coucheras point avec un homme comme on couche avec une femme. C’est une abomination. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 20:15
      metadata:
        usfm: LEV.20.15
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '16'
      metadata:
        usfm: LEV.20.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu ne coucheras point avec une bête, pour te souiller avec elle. La femme ne s’approchera point d’une bête, pour se prostituer à elle. C’est une confusion. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ne vous souillez par aucune de ces choses, car c’est par toutes ces choses que se sont souillées les nations que je vais chasser devant vous. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Le pays en a été souillé; je punirai son iniquité, et le pays vomira ses habitants. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 20:22
      metadata:
        usfm: LEV.20.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Vous observerez donc mes lois et mes ordonnances, et vous ne commettrez aucune de ces abominations, ni l’indigène, ni l’étranger qui séjourne au milieu de vous. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Car ce sont là toutes les abominations qu’ont commises les hommes du pays, qui y ont été avant vous; et le pays en a été souillé. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Prenez garde que le pays ne vous vomisse, si vous le souillez, comme il aura vomi les nations qui y étaient avant vous. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Car tous ceux qui commettront quelqu’une de ces abominations seront retranchés du milieu de leur peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Vous observerez mes commandements, et vous ne pratiquerez aucun des usages abominables qui se pratiquaient avant vous, vous ne vous en souillerez pas. Je suis l’Éternel, votre Dieu.
