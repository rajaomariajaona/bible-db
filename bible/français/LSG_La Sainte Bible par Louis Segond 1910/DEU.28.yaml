document_id: DEU.28,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Les bénédictions
  - type: heading
    content: 'V. 1-14: cf. Lé 26:3-13. (Ps 112; 128.) 2 Ch 15:7. Ro 2:6, 7, 10. Ps 103:17, 18.'
  - type: text
    content: ' '
  - type: note
    content: Lé 26:3.
  - type: text
    content: 'Si tu obéis à la voix de l’Éternel, ton Dieu, en observant et en mettant en pratique tous ses commandements que je te prescris aujourd’hui, l’Éternel, ton Dieu, te donnera la supériorité sur toutes les nations de la terre. '
  '10':
  - type: text
    content: 'Tous les peuples verront que tu es appelé du nom de l’Éternel, et ils te craindront. '
  '11':
  - type: note
    content: De 30:9.
  - type: text
    content: 'L’Éternel te comblera de biens, en multipliant le fruit de tes entrailles, le fruit de tes troupeaux et le fruit de ton sol, dans le pays que l’Éternel a juré à tes pères de te donner. '
  '12':
  - type: text
    content: 'L’Éternel t’ouvrira son bon trésor, le ciel, pour envoyer à ton pays la pluie en son temps et pour bénir tout le travail de tes mains; tu '
  - type: note
    content: De 15:6.
  - type: text
    content: 'prêteras à beaucoup de nations, et tu n’emprunteras point. '
  '13':
  - type: text
    content: 'L’Éternel fera de toi la tête et non la queue, tu seras toujours en haut et tu ne seras jamais en bas, lorsque tu obéiras aux commandements de l’Éternel, ton Dieu, que je te prescris aujourd’hui, lorsque tu les observeras et les mettras en pratique, '
  '14':
  - type: text
    content: et que tu ne te détourneras ni à droite ni à gauche de tous les commandements que je vous donne aujourd’hui, pour aller après d’autres dieux et pour les servir.
  - type: heading
    content: Les malédictions
  - type: heading
    content: 'V. 15-68: cf. Lé 26:14-39. (Jg 2:11-15. 2 R 17:6-23. 2 Ch 36:11-21.) Lu 21:20-24; 19:27. Ga 6:7, 8. Ro 2:6, 8, 9.'
  '15':
  - type: text
    content: 'Mais si tu n’obéis point à la voix de l’Éternel, ton Dieu, '
  - type: note
    content: Lé 26:14. La 2:17. Da 9:11, 13. Mal 2:2.
  - type: text
    content: 'si tu n’observes pas et ne mets pas en pratique tous ses commandements et toutes ses lois que je te prescris aujourd’hui, voici toutes les malédictions qui viendront sur toi et qui seront ton partage: '
  '16':
  - type: text
    content: 'Tu seras maudit dans la ville, et tu seras maudit dans les champs. '
  '17':
  - type: text
    content: 'Ta corbeille et ta huche seront maudites. '
  '18':
  - type: text
    content: 'Le fruit de tes entrailles, le fruit de ton sol, les portées de ton gros et de ton menu bétail, toutes ces choses seront maudites. '
  '19':
  - type: text
    content: 'Tu seras maudit à ton arrivée, et tu seras maudit à ton départ. '
  '2':
  - type: text
    content: 'Voici toutes les bénédictions qui se répandront sur toi et qui seront ton partage, lorsque tu obéiras à la voix de l’Éternel, ton Dieu: '
  '20':
  - type: text
    content: 'L’Éternel enverra contre toi la malédiction, le trouble et la menace, au milieu de toutes les entreprises que tu feras, jusqu’à ce que tu sois détruit, jusqu’à ce que tu périsses promptement, à cause de la méchanceté de tes actions, qui t’aura porté à m’abandonner. '
  '21':
  - type: text
    content: 'L’Éternel attachera à toi la peste, jusqu’à ce qu’elle te consume dans le pays dont tu vas entrer en possession. '
  '22':
  - type: note
    content: Lé 26:16.
  - type: text
    content: 'L’Éternel te frappera de consomption, de fièvre, d’inflammation, de chaleur brûlante, de desséchement, de jaunisse et de gangrène, qui te poursuivront jusqu’à ce que tu périsses. '
  '23':
  - type: note
    content: Lé 26:19.
  - type: text
    content: 'Le ciel sur ta tête sera d’airain, et la terre sous toi sera de fer. '
  '24':
  - type: text
    content: 'L’Éternel enverra pour pluie à ton pays de la poussière et de la poudre; il en descendra du ciel sur toi jusqu’à ce que tu sois détruit. '
  '25':
  - type: text
    content: 'L’Éternel te fera battre par tes ennemis; tu sortiras contre eux par un seul chemin, et tu t’enfuiras devant eux par sept chemins; et tu seras un objet d’effroi pour tous les royaumes de la terre. '
  '26':
  - type: text
    content: 'Ton cadavre sera la pâture de tous les oiseaux du ciel et des bêtes de la terre; et il n’y aura personne pour les troubler. '
  '27':
  - type: text
    content: 'L’Éternel te frappera '
  - type: note
    content: Ex 9:9.
  - type: text
    content: 'de l’ulcère d’Égypte, d’hémorrhoïdes, de gale et de teigne, dont tu ne pourras guérir. '
  '28':
  - type: text
    content: 'L’Éternel te frappera de délire, d’aveuglement, d’égarement d’esprit, '
  '29':
  - type: text
    content: 'et tu tâtonneras en plein midi comme l’aveugle dans l’obscurité, tu n’auras point de succès dans tes entreprises, et tu seras tous les jours opprimé, dépouillé, et il n’y aura personne pour venir à ton secours. '
  '3':
  - type: text
    content: 'Tu seras béni dans la ville, et tu seras béni dans les champs. '
  '30':
  - type: text
    content: 'Tu auras une fiancée, et un autre homme couchera avec elle; tu bâtiras une maison, et tu ne l’habiteras pas; tu planteras une vigne, et tu n’en jouiras pas. '
  '31':
  - type: text
    content: 'Ton bœuf sera égorgé sous tes yeux, et tu n’en mangeras pas; ton âne sera enlevé devant toi, et on ne te le rendra pas; tes brebis seront données à tes ennemis, et il n’y aura personne pour venir à ton secours. '
  '32':
  - type: text
    content: 'Tes fils et tes filles seront livrés à un autre peuple, tes yeux le verront et languiront tout le jour après eux, et ta main sera sans force. '
  '33':
  - type: text
    content: 'Un peuple que tu n’auras point connu mangera le fruit de ton sol et tout le produit de ton travail, et tu seras tous les jours opprimé et écrasé. '
  '34':
  - type: text
    content: 'Le spectacle que tu auras sous les yeux te jettera dans le délire. '
  '35':
  - type: text
    content: 'L’Éternel te frappera aux genoux et aux cuisses d’un ulcère malin dont tu ne pourras guérir, il te frappera depuis la plante du pied jusqu’au sommet de la tête. '
  '36':
  - type: text
    content: 'L’Éternel te fera marcher, toi et ton roi que tu auras établi sur toi, vers une nation que tu n’auras point connue, ni toi ni tes pères. Et là, tu serviras d’autres dieux, du bois et de la pierre. '
  '37':
  - type: text
    content: 'Et tu seras un sujet d’étonnement, de sarcasme et de raillerie, parmi tous les peuples chez qui l’Éternel te mènera. '
  '38':
  - type: note
    content: Mi 6:15. Ag 1:6.
  - type: text
    content: 'Tu transporteras sur ton champ beaucoup de semence; et tu feras une faible récolte, car les sauterelles la dévoreront. '
  '39':
  - type: text
    content: 'Tu planteras des vignes et tu les cultiveras; et tu ne boiras pas de vin et tu ne feras pas de récolte, car les vers la mangeront. '
  '4':
  - type: text
    content: 'Le fruit de tes entrailles, le fruit de ton sol, le fruit de tes troupeaux, les portées de ton gros et de ton menu bétail, toutes ces choses seront bénies. '
  '40':
  - type: text
    content: 'Tu auras des oliviers dans toute l’étendue de ton pays; et tu ne t’oindras pas d’huile, car tes olives tomberont. '
  '41':
  - type: text
    content: 'Tu engendreras des fils et des filles; et ils ne seront pas à toi, car ils iront en captivité. '
  '42':
  - type: text
    content: 'Les insectes prendront possession de tous tes arbres et du fruit de ton sol. '
  '43':
  - type: text
    content: 'L’étranger qui sera au milieu de toi s’élèvera toujours plus au-dessus de toi, et toi, tu descendras toujours plus bas; '
  '44':
  - type: text
    content: 'il te prêtera, et tu ne lui prêteras pas; il sera la tête, et tu seras la queue. '
  '45':
  - type: text
    content: 'Toutes ces malédictions viendront sur toi, elles te poursuivront et seront ton partage jusqu’à ce que tu sois détruit, parce que tu n’auras pas obéi à la voix de l’Éternel, ton Dieu, parce que tu n’auras pas observé ses commandements et ses lois qu’il te prescrit. '
  '46':
  - type: text
    content: 'Elles seront à jamais pour toi et pour tes descendants comme des signes et des prodiges. '
  '47':
  - type: text
    content: 'Pour n’avoir pas, au milieu de l’abondance de toutes choses, servi l’Éternel, ton Dieu, avec joie et de bon cœur, '
  '48':
  - type: text
    content: 'tu serviras, au milieu de la faim, de la soif, de la nudité et de la disette de toutes choses, tes ennemis que l’Éternel enverra contre toi. Il mettra un joug de fer sur ton cou, jusqu’à ce qu’il t’ait détruit. '
  '49':
  - type: text
    content: 'L’Éternel fera partir de loin, des extrémités de la terre, une nation qui fondra sur toi d’un vol d’aigle, une nation dont tu n’entendras point la langue, '
  '5':
  - type: text
    content: 'Ta corbeille et ta huche seront bénies. '
  '50':
  - type: text
    content: 'une nation au visage farouche, et qui n’aura ni respect pour le vieillard ni pitié pour l’enfant. '
  '51':
  - type: text
    content: 'Elle mangera le fruit de tes troupeaux et le fruit de ton sol, jusqu’à ce que tu sois détruit; elle ne te laissera ni blé, ni moût, ni huile, ni portées de ton gros et de ton menu bétail, jusqu’à ce qu’elle t’ait fait périr. '
  '52':
  - type: text
    content: 'Elle t’assiégera dans toutes tes portes, jusqu’à ce que tes murailles tombent, ces hautes et fortes murailles sur lesquelles tu auras placé ta confiance dans toute l’étendue de ton pays; elle t’assiégera dans toutes tes portes, dans tout le pays que l’Éternel, ton Dieu, te donne. '
  '53':
  - type: note
    content: Lé 26:29. 2 R 6:29. La 4:10.
  - type: text
    content: 'Au milieu de l’angoisse et de la détresse où te réduira ton ennemi, tu mangeras le fruit de tes entrailles, la chair de tes fils et de tes filles que l’Éternel, ton Dieu, t’aura donnés. '
  '54':
  - type: text
    content: 'L’homme d’entre vous le plus délicat et le plus habitué à la mollesse aura un œil sans pitié pour son frère, pour la femme qui repose sur son sein, pour ceux de ses enfants qu’il a épargnés; '
  '55':
  - type: text
    content: 'il ne donnera à aucun d’eux de la chair de ses enfants dont il fait sa nourriture, parce qu’il ne lui reste plus rien au milieu de l’angoisse et de la détresse où te réduira ton ennemi dans toutes tes portes. '
  '56':
  - type: text
    content: 'La femme d’entre vous la plus délicate et la plus habituée à la mollesse, qui par mollesse et par délicatesse n’essayait pas de poser à terre la plante de son pied, aura un œil sans pitié pour le mari qui repose sur son sein, pour son fils et pour sa fille; '
  '57':
  - type: text
    content: 'elle ne leur donnera rien de l’arrière-faix sorti d’entre ses pieds et des enfants qu’elle mettra au monde, car, manquant de tout, elle en fera secrètement sa nourriture au milieu de l’angoisse et de la détresse où te réduira ton ennemi dans tes portes. '
  '58':
  - type: text
    content: 'Si tu n’observes pas et ne mets pas en pratique toutes les paroles de cette loi, écrites dans ce livre, si tu ne crains pas ce nom glorieux et redoutable de l’Éternel, ton Dieu, '
  '59':
  - type: text
    content: 'l’Éternel te frappera miraculeusement, toi et ta postérité, par des plaies grandes et de longue durée, par des maladies graves et opiniâtres. '
  '6':
  - type: text
    content: 'Tu seras béni à ton arrivée, et tu seras béni à ton départ. '
  '60':
  - type: text
    content: 'Il amènera sur toi toutes les maladies d’Égypte, devant lesquelles tu tremblais; et elles s’attacheront à toi. '
  '61':
  - type: text
    content: 'Et même, l’Éternel fera venir sur toi, jusqu’à ce que tu sois détruit, toutes sortes de maladies et de plaies qui ne sont point mentionnées dans le livre de cette loi. '
  '62':
  - type: text
    content: 'Après avoir été aussi nombreux que les '
  - type: note
    content: De 10:22.
  - type: text
    content: 'étoiles du ciel, vous ne resterez qu’un petit nombre, parce que tu n’auras point obéi à la voix de l’Éternel, ton Dieu. '
  '63':
  - type: note
    content: És 1:24.
  - type: text
    content: 'De même que l’Éternel prenait plaisir à vous faire du bien et à vous multiplier, de même l’Éternel prendra plaisir à vous faire périr et à vous détruire; et vous serez arrachés du pays dont tu vas entrer en possession. '
  '64':
  - type: text
    content: 'L’Éternel te '
  - type: note
    content: De 4:27. Né 1:8.
  - type: text
    content: 'dispersera parmi tous les peuples, d’une extrémité de la terre à l’autre; et là, tu serviras d’autres dieux que n’ont connus ni toi, ni tes pères, du bois et de la pierre. '
  '65':
  - type: text
    content: 'Parmi ces nations, tu ne seras pas tranquille, et tu n’auras pas un lieu de repos pour la plante de tes pieds. L’Éternel rendra ton cœur agité, tes yeux languissants, ton âme souffrante. '
  '66':
  - type: text
    content: 'Ta vie sera comme en suspens devant toi, tu trembleras la nuit et le jour, tu douteras de ton existence. '
  '67':
  - type: text
    content: 'Dans l’effroi qui remplira ton cœur et en présence de ce que tes yeux verront, tu diras le matin: Puisse le soir être là! Et tu diras le soir: Puisse le matin être là! '
  '68':
  - type: text
    content: 'Et l’Éternel te ramènera sur des navires en Égypte, et tu feras ce chemin dont je t’avais dit: Tu ne le reverras plus! Là, vous vous offrirez en vente à vos ennemis, comme esclaves et comme servantes; et il n’y aura personne pour vous acheter.'
  '7':
  - type: text
    content: 'L’Éternel te donnera la victoire sur tes ennemis qui s’élèveront contre toi; ils sortiront contre toi par un seul chemin, et ils s’enfuiront devant toi par sept chemins. '
  '8':
  - type: text
    content: 'L’Éternel ordonnera à la bénédiction d’être avec toi dans tes greniers et dans toutes tes entreprises. Il te bénira dans le pays que l’Éternel, ton Dieu, te donne. '
  '9':
  - type: text
    content: 'Tu seras pour l’Éternel '
  - type: note
    content: De 7:6.
  - type: text
    content: 'un peuple saint, comme il te l’a juré, lorsque tu observeras les commandements de l’Éternel, ton Dieu, et que tu marcheras dans ses voies. '
