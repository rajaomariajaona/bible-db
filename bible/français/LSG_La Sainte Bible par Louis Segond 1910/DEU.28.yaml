document_id: DEU.28
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les bénédictions
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-14: cf. Lé 26:3-13. (Ps 112; 128.) 2 Ch 15:7. Ro 2:6, 7, 10. Ps 103:17, 18.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 26:3
      metadata:
        usfm: LEV.26.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Si tu obéis à la voix de l’Éternel, ton Dieu, en observant et en mettant en pratique tous ses commandements que je te prescris aujourd’hui, l’Éternel, ton Dieu, te donnera la supériorité sur toutes les nations de la terre. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Voici toutes les bénédictions qui se répandront sur toi et qui seront ton partage, lorsque tu obéiras à la voix de l’Éternel, ton Dieu: '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tu seras béni dans la ville, et tu seras béni dans les champs. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Le fruit de tes entrailles, le fruit de ton sol, le fruit de tes troupeaux, les portées de ton gros et de ton menu bétail, toutes ces choses seront bénies. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ta corbeille et ta huche seront bénies. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tu seras béni à ton arrivée, et tu seras béni à ton départ. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'L’Éternel te donnera la victoire sur tes ennemis qui s’élèveront contre toi; ils sortiront contre toi par un seul chemin, et ils s’enfuiront devant toi par sept chemins. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'L’Éternel ordonnera à la bénédiction d’être avec toi dans tes greniers et dans toutes tes entreprises. Il te bénira dans le pays que l’Éternel, ton Dieu, te donne. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Tu seras pour l’Éternel '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 7:6
      metadata:
        usfm: DEU.7.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'un peuple saint, comme il te l’a juré, lorsque tu observeras les commandements de l’Éternel, ton Dieu, et que tu marcheras dans ses voies. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tous les peuples verront que tu es appelé du nom de l’Éternel, et ils te craindront. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 30:9
      metadata:
        usfm: DEU.30.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'L’Éternel te comblera de biens, en multipliant le fruit de tes entrailles, le fruit de tes troupeaux et le fruit de ton sol, dans le pays que l’Éternel a juré à tes pères de te donner. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'L’Éternel t’ouvrira son bon trésor, le ciel, pour envoyer à ton pays la pluie en son temps et pour bénir tout le travail de tes mains; tu '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 15:6
      metadata:
        usfm: DEU.15.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'prêteras à beaucoup de nations, et tu n’emprunteras point. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'L’Éternel fera de toi la tête et non la queue, tu seras toujours en haut et tu ne seras jamais en bas, lorsque tu obéiras aux commandements de l’Éternel, ton Dieu, que je te prescris aujourd’hui, lorsque tu les observeras et les mettras en pratique, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: et que tu ne te détourneras ni à droite ni à gauche de tous les commandements que je vous donne aujourd’hui, pour aller après d’autres dieux et pour les servir.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les malédictions
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 15-68: cf. Lé 26:14-39. (Jg 2:11-15. 2 R 17:6-23. 2 Ch 36:11-21.) Lu 21:20-24; 19:27. Ga 6:7, 8. Ro 2:6, 8, 9.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Mais si tu n’obéis point à la voix de l’Éternel, ton Dieu, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 26:14
      metadata:
        usfm: LEV.26.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: La 2:17
      metadata:
        usfm: LAM.2.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Da 9:11
      metadata:
        usfm: DAN.9.11
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '13'
      metadata:
        usfm: DAN.9.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mal 2:2
      metadata:
        usfm: MAL.2.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'si tu n’observes pas et ne mets pas en pratique tous ses commandements et toutes ses lois que je te prescris aujourd’hui, voici toutes les malédictions qui viendront sur toi et qui seront ton partage: '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Tu seras maudit dans la ville, et tu seras maudit dans les champs. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ta corbeille et ta huche seront maudites. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Le fruit de tes entrailles, le fruit de ton sol, les portées de ton gros et de ton menu bétail, toutes ces choses seront maudites. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tu seras maudit à ton arrivée, et tu seras maudit à ton départ. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'L’Éternel enverra contre toi la malédiction, le trouble et la menace, au milieu de toutes les entreprises que tu feras, jusqu’à ce que tu sois détruit, jusqu’à ce que tu périsses promptement, à cause de la méchanceté de tes actions, qui t’aura porté à m’abandonner. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'L’Éternel attachera à toi la peste, jusqu’à ce qu’elle te consume dans le pays dont tu vas entrer en possession. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 26:16
      metadata:
        usfm: LEV.26.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'L’Éternel te frappera de consomption, de fièvre, d’inflammation, de chaleur brûlante, de desséchement, de jaunisse et de gangrène, qui te poursuivront jusqu’à ce que tu périsses. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 26:19
      metadata:
        usfm: LEV.26.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Le ciel sur ta tête sera d’airain, et la terre sous toi sera de fer. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'L’Éternel enverra pour pluie à ton pays de la poussière et de la poudre; il en descendra du ciel sur toi jusqu’à ce que tu sois détruit. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'L’Éternel te fera battre par tes ennemis; tu sortiras contre eux par un seul chemin, et tu t’enfuiras devant eux par sept chemins; et tu seras un objet d’effroi pour tous les royaumes de la terre. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ton cadavre sera la pâture de tous les oiseaux du ciel et des bêtes de la terre; et il n’y aura personne pour les troubler. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'L’Éternel te frappera '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 9:9
      metadata:
        usfm: EXO.9.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'de l’ulcère d’Égypte, d’hémorrhoïdes, de gale et de teigne, dont tu ne pourras guérir. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'L’Éternel te frappera de délire, d’aveuglement, d’égarement d’esprit, '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'et tu tâtonneras en plein midi comme l’aveugle dans l’obscurité, tu n’auras point de succès dans tes entreprises, et tu seras tous les jours opprimé, dépouillé, et il n’y aura personne pour venir à ton secours. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Tu auras une fiancée, et un autre homme couchera avec elle; tu bâtiras une maison, et tu ne l’habiteras pas; tu planteras une vigne, et tu n’en jouiras pas. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ton bœuf sera égorgé sous tes yeux, et tu n’en mangeras pas; ton âne sera enlevé devant toi, et on ne te le rendra pas; tes brebis seront données à tes ennemis, et il n’y aura personne pour venir à ton secours. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Tes fils et tes filles seront livrés à un autre peuple, tes yeux le verront et languiront tout le jour après eux, et ta main sera sans force. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Un peuple que tu n’auras point connu mangera le fruit de ton sol et tout le produit de ton travail, et tu seras tous les jours opprimé et écrasé. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Le spectacle que tu auras sous les yeux te jettera dans le délire. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'L’Éternel te frappera aux genoux et aux cuisses d’un ulcère malin dont tu ne pourras guérir, il te frappera depuis la plante du pied jusqu’au sommet de la tête. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'L’Éternel te fera marcher, toi et ton roi que tu auras établi sur toi, vers une nation que tu n’auras point connue, ni toi ni tes pères. Et là, tu serviras d’autres dieux, du bois et de la pierre. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Et tu seras un sujet d’étonnement, de sarcasme et de raillerie, parmi tous les peuples chez qui l’Éternel te mènera. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mi 6:15
      metadata:
        usfm: MIC.6.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ag 1:6
      metadata:
        usfm: HAG.1.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu transporteras sur ton champ beaucoup de semence; et tu feras une faible récolte, car les sauterelles la dévoreront. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Tu planteras des vignes et tu les cultiveras; et tu ne boiras pas de vin et tu ne feras pas de récolte, car les vers la mangeront. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Tu auras des oliviers dans toute l’étendue de ton pays; et tu ne t’oindras pas d’huile, car tes olives tomberont. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Tu engendreras des fils et des filles; et ils ne seront pas à toi, car ils iront en captivité. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Les insectes prendront possession de tous tes arbres et du fruit de ton sol. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'L’étranger qui sera au milieu de toi s’élèvera toujours plus au-dessus de toi, et toi, tu descendras toujours plus bas; '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'il te prêtera, et tu ne lui prêteras pas; il sera la tête, et tu seras la queue. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Toutes ces malédictions viendront sur toi, elles te poursuivront et seront ton partage jusqu’à ce que tu sois détruit, parce que tu n’auras pas obéi à la voix de l’Éternel, ton Dieu, parce que tu n’auras pas observé ses commandements et ses lois qu’il te prescrit. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Elles seront à jamais pour toi et pour tes descendants comme des signes et des prodiges. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Pour n’avoir pas, au milieu de l’abondance de toutes choses, servi l’Éternel, ton Dieu, avec joie et de bon cœur, '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'tu serviras, au milieu de la faim, de la soif, de la nudité et de la disette de toutes choses, tes ennemis que l’Éternel enverra contre toi. Il mettra un joug de fer sur ton cou, jusqu’à ce qu’il t’ait détruit. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'L’Éternel fera partir de loin, des extrémités de la terre, une nation qui fondra sur toi d’un vol d’aigle, une nation dont tu n’entendras point la langue, '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'une nation au visage farouche, et qui n’aura ni respect pour le vieillard ni pitié pour l’enfant. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Elle mangera le fruit de tes troupeaux et le fruit de ton sol, jusqu’à ce que tu sois détruit; elle ne te laissera ni blé, ni moût, ni huile, ni portées de ton gros et de ton menu bétail, jusqu’à ce qu’elle t’ait fait périr. '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Elle t’assiégera dans toutes tes portes, jusqu’à ce que tes murailles tombent, ces hautes et fortes murailles sur lesquelles tu auras placé ta confiance dans toute l’étendue de ton pays; elle t’assiégera dans toutes tes portes, dans tout le pays que l’Éternel, ton Dieu, te donne. '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 26:29
      metadata:
        usfm: LEV.26.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 6:29
      metadata:
        usfm: 2KI.6.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: La 4:10
      metadata:
        usfm: LAM.4.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Au milieu de l’angoisse et de la détresse où te réduira ton ennemi, tu mangeras le fruit de tes entrailles, la chair de tes fils et de tes filles que l’Éternel, ton Dieu, t’aura donnés. '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'L’homme d’entre vous le plus délicat et le plus habitué à la mollesse aura un œil sans pitié pour son frère, pour la femme qui repose sur son sein, pour ceux de ses enfants qu’il a épargnés; '
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'il ne donnera à aucun d’eux de la chair de ses enfants dont il fait sa nourriture, parce qu’il ne lui reste plus rien au milieu de l’angoisse et de la détresse où te réduira ton ennemi dans toutes tes portes. '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'La femme d’entre vous la plus délicate et la plus habituée à la mollesse, qui par mollesse et par délicatesse n’essayait pas de poser à terre la plante de son pied, aura un œil sans pitié pour le mari qui repose sur son sein, pour son fils et pour sa fille; '
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'elle ne leur donnera rien de l’arrière-faix sorti d’entre ses pieds et des enfants qu’elle mettra au monde, car, manquant de tout, elle en fera secrètement sa nourriture au milieu de l’angoisse et de la détresse où te réduira ton ennemi dans tes portes. '
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'Si tu n’observes pas et ne mets pas en pratique toutes les paroles de cette loi, écrites dans ce livre, si tu ne crains pas ce nom glorieux et redoutable de l’Éternel, ton Dieu, '
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'l’Éternel te frappera miraculeusement, toi et ta postérité, par des plaies grandes et de longue durée, par des maladies graves et opiniâtres. '
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'Il amènera sur toi toutes les maladies d’Égypte, devant lesquelles tu tremblais; et elles s’attacheront à toi. '
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'Et même, l’Éternel fera venir sur toi, jusqu’à ce que tu sois détruit, toutes sortes de maladies et de plaies qui ne sont point mentionnées dans le livre de cette loi. '
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'Après avoir été aussi nombreux que les '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 10:22
      metadata:
        usfm: DEU.10.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'étoiles du ciel, vous ne resterez qu’un petit nombre, parce que tu n’auras point obéi à la voix de l’Éternel, ton Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 1:24
      metadata:
        usfm: ISA.1.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'De même que l’Éternel prenait plaisir à vous faire du bien et à vous multiplier, de même l’Éternel prendra plaisir à vous faire périr et à vous détruire; et vous serez arrachés du pays dont tu vas entrer en possession. '
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'L’Éternel te '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 4:27
      metadata:
        usfm: DEU.4.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Né 1:8
      metadata:
        usfm: NEH.1.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'dispersera parmi tous les peuples, d’une extrémité de la terre à l’autre; et là, tu serviras d’autres dieux que n’ont connus ni toi, ni tes pères, du bois et de la pierre. '
  - type: usfm
    marker: v
    metadata:
      v: '65'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: 'Parmi ces nations, tu ne seras pas tranquille, et tu n’auras pas un lieu de repos pour la plante de tes pieds. L’Éternel rendra ton cœur agité, tes yeux languissants, ton âme souffrante. '
  - type: usfm
    marker: v
    metadata:
      v: '66'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: 'Ta vie sera comme en suspens devant toi, tu trembleras la nuit et le jour, tu douteras de ton existence. '
  - type: usfm
    marker: v
    metadata:
      v: '67'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: 'Dans l’effroi qui remplira ton cœur et en présence de ce que tes yeux verront, tu diras le matin: Puisse le soir être là! Et tu diras le soir: Puisse le matin être là! '
  - type: usfm
    marker: v
    metadata:
      v: '68'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: text
    text: 'Et l’Éternel te ramènera sur des navires en Égypte, et tu feras ce chemin dont je t’avais dit: Tu ne le reverras plus! Là, vous vous offrirez en vente à vos ennemis, comme esclaves et comme servantes; et il n’y aura personne pour vous acheter.'
