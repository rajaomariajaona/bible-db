document_id: LEV.17
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Lieu destiné aux sacrifices
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-9: cf. De 12:1-18. 1 Co 10:31.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Éternel parla à Moïse, et dit: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Parle à Aaron et à ses fils, et à tous les enfants d’Israël, et tu leur diras: Voici ce que l’Éternel a ordonné. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Si un homme de la maison d’Israël égorge dans le camp ou hors du camp un bœuf, un agneau ou une chèvre, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'et ne l’amène pas à l’entrée de la tente d’assignation, pour en faire une offrande à l’Éternel devant le tabernacle de l’Éternel, le sang sera imputé à cet homme; il a répandu le sang, cet homme-là sera retranché du milieu de son peuple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'C’est afin que les enfants d’Israël, au lieu de sacrifier leurs victimes dans les champs, les amènent au sacrificateur, devant l’Éternel, à l’entrée de la tente d’assignation, et qu’ils les offrent à l’Éternel en sacrifices d’actions de grâces. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Le sacrificateur en répandra le sang sur l’autel de l’Éternel, à l’entrée de la tente d’assignation; et il brûlera la graisse, qui sera '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 29:18
      metadata:
        usfm: EXO.29.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 4:31
      metadata:
        usfm: LEV.4.31
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'd’une agréable odeur à l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ils n’offriront plus leurs sacrifices aux boucs, avec lesquels ils se prostituent. Ce sera une loi perpétuelle pour eux et pour leurs descendants. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tu leur diras donc: Si un homme de la maison d’Israël ou des étrangers qui séjournent au milieu d’eux offre un holocauste ou une victime, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: et ne l’amène pas à l’entrée de la tente d’assignation, pour l’offrir en sacrifice à l’Éternel, cet homme-là sera retranché de son peuple.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Défense de manger du sang
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 10-16: cf. (Ge 9:4. Lé 7:26, 27. De 12:23-25.) (Hé 9:22.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Si un homme de la maison d’Israël ou des étrangers qui séjournent au milieu d’eux '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 9:4
      metadata:
        usfm: GEN.9.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 3:17
      metadata:
        usfm: LEV.3.17
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 7:27
      metadata:
        usfm: LEV.7.27
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 19:26
      metadata:
        usfm: LEV.19.26
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 12:16
      metadata:
        usfm: DEU.12.16
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '23'
      metadata:
        usfm: DEU.12.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 14:33
      metadata:
        usfm: 1SA.14.33
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'mange du sang d’une espèce quelconque, je tournerai ma face contre celui qui mange le sang, et je le retrancherai du milieu de son peuple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Car l’âme de la chair est dans le sang. Je vous l’ai donné sur l’autel, afin qu’il servît d’expiation pour vos âmes, car c’est par l’âme que le sang fait l’expiation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'C’est pourquoi j’ai dit aux enfants d’Israël: Personne d’entre vous ne mangera du sang, et l’étranger qui séjourne au milieu de vous ne mangera pas du sang. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Si quelqu’un des enfants d’Israël ou des étrangers qui séjournent au milieu d’eux prend à la chasse un animal ou un oiseau qui se mange, il en versera le sang et le couvrira de poussière. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Car l’âme de toute chair, c’est son sang, qui est en elle. C’est pourquoi j’ai dit aux enfants d’Israël: Vous ne mangerez le sang d’aucune chair; car l’âme de toute chair, c’est son sang: quiconque en mangera sera retranché. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 22:31
      metadata:
        usfm: EXO.22.31
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 11:40
      metadata:
        usfm: LEV.11.40
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 44:31
      metadata:
        usfm: EZK.44.31
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Toute personne, indigène ou étrangère, qui mangera d’une bête morte ou déchirée, lavera ses vêtements, se lavera dans l’eau, et sera impure jusqu’au soir; puis elle sera pure. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Si elle ne lave pas ses vêtements, et ne lave pas son corps, elle portera la peine de sa faute.
