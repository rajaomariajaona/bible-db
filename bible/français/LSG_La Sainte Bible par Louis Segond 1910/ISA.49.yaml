document_id: ISA.49,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Le serviteur de l’Éternel, lumière des nations
  - type: heading
    content: 'V. 1-7: cf. (És 42:1-7; 53:1-3; 52:13-15.) (Lu 1:31; 2:30-32. Ac 13:46, 47.)'
  - type: text
    content: Iles, écoutez-moi!
  - type: text
    content: Peuples lointains, soyez attentifs!
  - type: text
    content: L’Éternel m’a appelé dès ma naissance,
  - type: text
    content: Il m’a nommé dès ma sortie des entrailles maternelles.
  '10':
  - type: text
    content: 'Ils n’auront pas '
  - type: note
    content: Ap 7:16.
  - type: text
    content: faim et ils n’auront pas soif;
  - type: text
    content: Le mirage et le soleil ne les feront point souffrir;
  - type: text
    content: Car celui qui a pitié d’eux sera leur guide,
  - type: text
    content: Et il les conduira vers des sources d’eaux.
  '11':
  - type: text
    content: Je changerai toutes mes montagnes en chemins,
  - type: text
    content: Et mes routes seront frayées.
  '12':
  - type: text
    content: Les voici, ils viennent de loin,
  - type: text
    content: Les uns du septentrion et de l’occident,
  - type: text
    content: Les autres du pays de Sinim.
  '13':
  - type: text
    content: Cieux, réjouissez-vous!
  - type: text
    content: Terre, sois dans l’allégresse!
  - type: text
    content: Montagnes, éclatez en cris de joie!
  - type: text
    content: Car l’Éternel console son peuple,
  - type: text
    content: Il a pitié de ses malheureux.
  - type: heading
    content: 'V. 14-23: cf. 1 S 12:22. Ro 11. És 60:1-16.'
  '14':
  - type: text
    content: 'Sion disait: L’Éternel m’abandonne,'
  - type: text
    content: Le Seigneur m’oublie!
  '15':
  - type: text
    content: Une femme oublie-t-elle l’enfant qu’elle allaite?
  - type: text
    content: N’a-t-elle pas pitié du fruit de ses entrailles?
  - type: text
    content: Quand elle l’oublierait,
  - type: text
    content: Moi je ne t’oublierai point.
  '16':
  - type: text
    content: Voici, je t’ai gravée sur mes mains;
  - type: text
    content: Tes murs sont toujours devant mes yeux.
  '17':
  - type: text
    content: Tes fils accourent;
  - type: text
    content: Ceux qui t’avaient détruite et ravagée
  - type: text
    content: Sortiront du milieu de toi.
  '18':
  - type: text
    content: ' '
  - type: note
    content: És 60:4.
  - type: text
    content: 'Porte tes yeux alentour, et regarde:'
  - type: text
    content: Tous ils s’assemblent, ils viennent vers toi.
  - type: text
    content: Je suis vivant! Dit l’Éternel,
  - type: text
    content: Tu les revêtiras tous comme une parure,
  - type: text
    content: Tu t’en ceindras comme une fiancée.
  '19':
  - type: text
    content: Dans tes places ravagées et désertes,
  - type: text
    content: Dans ton pays ruiné,
  - type: text
    content: Tes habitants seront désormais à l’étroit;
  - type: text
    content: Et ceux qui te dévoraient s’éloigneront.
  '2':
  - type: text
    content: Il a rendu ma bouche semblable à un glaive tranchant,
  - type: text
    content: Il m’a couvert de l’ombre de sa main;
  - type: text
    content: Il a fait de moi une flèche aiguë,
  - type: text
    content: Il m’a caché dans son carquois.
  '20':
  - type: text
    content: Ils répéteront à tes oreilles,
  - type: text
    content: 'Ces fils dont tu fus privée:'
  - type: text
    content: L’espace est trop étroit pour moi;
  - type: text
    content: Fais-moi de la place, pour que je puisse m’établir.
  '21':
  - type: text
    content: 'Et tu diras en ton cœur: Qui me les a engendrés?'
  - type: text
    content: Car j’étais sans enfants, j’étais stérile.
  - type: text
    content: 'J’étais exilée, répudiée: qui les a élevés?'
  - type: text
    content: 'J’étais restée seule: ceux-ci, où étaient-ils?'
  '22':
  - type: text
    content: 'Ainsi a parlé le Seigneur, l’Éternel:'
  - type: text
    content: 'Voici: Je lèverai ma main vers les nations,'
  - type: text
    content: Je dresserai ma bannière vers les peuples;
  - type: text
    content: Et ils ramèneront tes fils entre leurs bras,
  - type: text
    content: Ils porteront tes filles sur les épaules.
  '23':
  - type: text
    content: Des rois seront tes nourriciers, et leurs princesses tes nourrices;
  - type: text
    content: Ils se prosterneront devant toi la face contre terre,
  - type: text
    content: Et ils lécheront la poussière de tes pieds,
  - type: text
    content: Et tu sauras que je suis l’Éternel,
  - type: text
    content: Et que ceux qui espèrent en moi ne seront point confus.
  - type: heading
    content: 'V. 24-26: cf. Jé 30:10-18. Hé 2:14, 15.'
  '24':
  - type: text
    content: ' '
  - type: note
    content: Mt 12:29.
  - type: text
    content: Le butin du puissant lui sera-t-il enlevé?
  - type: text
    content: Et la capture faite sur le juste échappera-t-elle?
  '25':
  - type: text
    content: Oui, dit l’Éternel, la capture du puissant lui sera enlevée,
  - type: text
    content: Et le butin du tyran lui échappera;
  - type: text
    content: Je combattrai tes ennemis,
  - type: text
    content: Et je sauverai tes fils.
  '26':
  - type: text
    content: Je ferai manger à tes oppresseurs leur propre chair;
  - type: note
    content: Ap 16:6.
  - type: text
    content: Ils s’enivreront de leur sang comme du moût;
  - type: text
    content: Et toute chair saura que je suis l’Éternel, ton sauveur,
  - type: text
    content: Ton rédempteur, le puissant de Jacob.
  '3':
  - type: text
    content: 'Et il m’a dit: Tu es mon serviteur,'
  - type: text
    content: Israël en qui je me glorifierai.
  '4':
  - type: text
    content: 'Et moi j’ai dit: C’est en vain que j’ai travaillé,'
  - type: text
    content: C’est pour le vide et le néant que j’ai consumé ma force;
  - type: text
    content: Mais mon droit est auprès de l’Éternel,
  - type: text
    content: Et ma récompense auprès de mon Dieu.
  '5':
  - type: text
    content: Maintenant, l’Éternel parle,
  - type: text
    content: Lui qui m’a formé dès ma naissance
  - type: text
    content: Pour être son serviteur,
  - type: text
    content: Pour ramener à lui Jacob,
  - type: text
    content: Et Israël encore dispersé;
  - type: text
    content: Car je suis honoré aux yeux de l’Éternel,
  - type: text
    content: Et mon Dieu est ma force.
  '6':
  - type: text
    content: 'Il dit: C’est peu que tu sois mon serviteur'
  - type: text
    content: Pour relever les tribus de Jacob
  - type: text
    content: 'Et pour ramener les restes d’Israël:'
  - type: text
    content: Je t’établis pour être la lumière des nations,
  - type: text
    content: Pour porter mon salut jusqu’aux extrémités de la terre.
  '7':
  - type: text
    content: Ainsi parle l’Éternel, le rédempteur, le Saint d’Israël,
  - type: text
    content: A celui qu’on méprise, qui est en horreur au peuple,
  - type: text
    content: 'A l’esclave des puissants:'
  - type: text
    content: Des rois le verront, et ils se lèveront,
  - type: text
    content: Des princes, et ils se prosterneront,
  - type: text
    content: A cause de l’Éternel, qui est fidèle,
  - type: text
    content: Du Saint d’Israël, qui t’a choisi.
  - type: heading
    content: Le rétablissement d’Israël
  - type: heading
    content: 'V. 8-13: cf. (És 61:1-4; 42:6, 7; 11:10-12.) Ap 7:13-17.'
  '8':
  - type: text
    content: 'Ainsi parle l’Éternel:'
  - type: note
    content: 2 Co 6:2.
  - type: text
    content: Au temps de la grâce je t’exaucerai,
  - type: text
    content: Et au jour du salut je te secourrai;
  - type: text
    content: Je te garderai, et je t’établirai pour traiter alliance avec le peuple,
  - type: text
    content: Pour relever le pays,
  - type: text
    content: Et pour distribuer les héritages désolés;
  '9':
  - type: text
    content: 'Pour dire aux captifs: Sortez!'
  - type: text
    content: 'Et à ceux qui sont dans les ténèbres: Paraissez!'
  - type: text
    content: Ils paîtront sur les chemins,
  - type: text
    content: Et ils trouveront des pâturages sur tous les coteaux.
