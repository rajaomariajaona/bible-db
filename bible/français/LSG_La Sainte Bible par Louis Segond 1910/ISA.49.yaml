document_id: ISA.49,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le serviteur de l’Éternel, lumière des nations
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-7: cf. (És 42:1-7; 53:1-3; 52:13-15.) (Lu 1:31; 2:30-32. Ac 13:46, 47.)'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iles, écoutez-moi!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Peuples lointains, soyez attentifs!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel m’a appelé dès ma naissance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il m’a nommé dès ma sortie des entrailles maternelles.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ils n’auront pas '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 7:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: faim et ils n’auront pas soif;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le mirage et le soleil ne les feront point souffrir;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car celui qui a pitié d’eux sera leur guide,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il les conduira vers des sources d’eaux.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je changerai toutes mes montagnes en chemins,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et mes routes seront frayées.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les voici, ils viennent de loin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les uns du septentrion et de l’occident,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les autres du pays de Sinim.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cieux, réjouissez-vous!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Terre, sois dans l’allégresse!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Montagnes, éclatez en cris de joie!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car l’Éternel console son peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a pitié de ses malheureux.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 14-23: cf. 1 S 12:22. Ro 11. És 60:1-16.'
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Sion disait: L’Éternel m’abandonne,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le Seigneur m’oublie!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Une femme oublie-t-elle l’enfant qu’elle allaite?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N’a-t-elle pas pitié du fruit de ses entrailles?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand elle l’oublierait,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moi je ne t’oublierai point.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, je t’ai gravée sur mes mains;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes murs sont toujours devant mes yeux.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes fils accourent;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux qui t’avaient détruite et ravagée
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sortiront du milieu de toi.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 60:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Porte tes yeux alentour, et regarde:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous ils s’assemblent, ils viennent vers toi.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis vivant! Dit l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu les revêtiras tous comme une parure,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu t’en ceindras comme une fiancée.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans tes places ravagées et désertes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans ton pays ruiné,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes habitants seront désormais à l’étroit;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ceux qui te dévoraient s’éloigneront.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a rendu ma bouche semblable à un glaive tranchant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il m’a couvert de l’ombre de sa main;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a fait de moi une flèche aiguë,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il m’a caché dans son carquois.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils répéteront à tes oreilles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ces fils dont tu fus privée:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’espace est trop étroit pour moi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fais-moi de la place, pour que je puisse m’établir.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et tu diras en ton cœur: Qui me les a engendrés?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car j’étais sans enfants, j’étais stérile.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'J’étais exilée, répudiée: qui les a élevés?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'J’étais restée seule: ceux-ci, où étaient-ils?'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ainsi a parlé le Seigneur, l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici: Je lèverai ma main vers les nations,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je dresserai ma bannière vers les peuples;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils ramèneront tes fils entre leurs bras,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils porteront tes filles sur les épaules.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des rois seront tes nourriciers, et leurs princesses tes nourrices;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils se prosterneront devant toi la face contre terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils lécheront la poussière de tes pieds,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tu sauras que je suis l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que ceux qui espèrent en moi ne seront point confus.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 24-26: cf. Jé 30:10-18. Hé 2:14, 15.'
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 12:29
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Le butin du puissant lui sera-t-il enlevé?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la capture faite sur le juste échappera-t-elle?
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, dit l’Éternel, la capture du puissant lui sera enlevée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le butin du tyran lui échappera;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je combattrai tes ennemis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je sauverai tes fils.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ferai manger à tes oppresseurs leur propre chair;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 16:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ils s’enivreront de leur sang comme du moût;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et toute chair saura que je suis l’Éternel, ton sauveur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ton rédempteur, le puissant de Jacob.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et il m’a dit: Tu es mon serviteur,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Israël en qui je me glorifierai.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et moi j’ai dit: C’est en vain que j’ai travaillé,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est pour le vide et le néant que j’ai consumé ma force;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais mon droit est auprès de l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ma récompense auprès de mon Dieu.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maintenant, l’Éternel parle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lui qui m’a formé dès ma naissance
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour être son serviteur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour ramener à lui Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et Israël encore dispersé;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car je suis honoré aux yeux de l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et mon Dieu est ma force.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Il dit: C’est peu que tu sois mon serviteur'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour relever les tribus de Jacob
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et pour ramener les restes d’Israël:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je t’établis pour être la lumière des nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour porter mon salut jusqu’aux extrémités de la terre.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi parle l’Éternel, le rédempteur, le Saint d’Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A celui qu’on méprise, qui est en horreur au peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A l’esclave des puissants:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des rois le verront, et ils se lèveront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des princes, et ils se prosterneront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause de l’Éternel, qui est fidèle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Du Saint d’Israël, qui t’a choisi.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le rétablissement d’Israël
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 8-13: cf. (És 61:1-4; 42:6, 7; 11:10-12.) Ap 7:13-17.'
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ainsi parle l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 6:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Au temps de la grâce je t’exaucerai,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et au jour du salut je te secourrai;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je te garderai, et je t’établirai pour traiter alliance avec le peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour relever le pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et pour distribuer les héritages désolés;
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Pour dire aux captifs: Sortez!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et à ceux qui sont dans les ténèbres: Paraissez!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils paîtront sur les chemins,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils trouveront des pâturages sur tous les coteaux.
