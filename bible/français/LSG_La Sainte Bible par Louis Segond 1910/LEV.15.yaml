document_id: LEV.15,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Loi sur les impuretés de l’homme et de la femme
  - type: heading
    content: 'V. 1-18: cf. No 5:1-4. (Mc 7:20-23. 2 Co 7:1.)'
  - type: text
    content: 'L’Éternel parla à Moïse et à Aaron, et dit: '
  '10':
  - type: text
    content: 'Celui qui touchera une chose quelconque qui a été sous lui sera impur jusqu’au soir; et celui qui la portera lavera ses vêtements, se lavera dans l’eau, et sera impur jusqu’au soir. '
  '11':
  - type: text
    content: 'Celui qui sera touché par lui, et qui ne se sera pas lavé les mains dans l’eau, lavera ses vêtements, se lavera dans l’eau, et sera impur jusqu’au soir. '
  '12':
  - type: note
    content: Lé 6:28; 11:33.
  - type: text
    content: 'Tout vase de terre qui sera touché par lui sera brisé, et tout vase de bois sera lavé dans l’eau. '
  '13':
  - type: text
    content: 'Lorsqu’il sera purifié de son flux, il comptera sept jours pour sa purification; il lavera ses vêtements, il lavera sa chair avec de l’eau vive, et il sera pur. '
  '14':
  - type: text
    content: 'Le huitième jour, il prendra deux tourterelles ou deux jeunes pigeons, il ira devant l’Éternel, à l’entrée de la tente d’assignation, et il les donnera au sacrificateur. '
  '15':
  - type: text
    content: 'Le sacrificateur les offrira, l’un en sacrifice d’expiation, et l’autre en holocauste; et le sacrificateur fera pour lui l’expiation devant l’Éternel, à cause de son flux. '
  '16':
  - type: text
    content: 'L’homme qui aura une pollution lavera tout son corps dans l’eau, et sera impur jusqu’au soir. '
  '17':
  - type: text
    content: 'Tout vêtement et toute peau qui en seront atteints seront lavés dans l’eau, et seront impurs jusqu’au soir. '
  '18':
  - type: text
    content: Si une femme a couché avec un tel homme, ils se laveront l’un et l’autre, et seront impurs jusqu’au soir.
  - type: heading
    content: 'V. 19-33: cf. (Lé 12:2-8; 20:18.) Mc 5:25-34.'
  '19':
  - type: text
    content: 'La femme qui aura un flux, un flux de sang en sa chair, restera sept jours dans son impureté. Quiconque la touchera sera impur jusqu’au soir. '
  '2':
  - type: text
    content: 'Parlez aux enfants d’Israël, et dites-leur: Tout homme qui a une gonorrhée est par là même impur. '
  '20':
  - type: text
    content: 'Tout lit sur lequel elle couchera pendant son impureté sera impur, et tout objet sur lequel elle s’assiéra sera impur. '
  '21':
  - type: text
    content: 'Quiconque touchera son lit lavera ses vêtements, se lavera dans l’eau, et sera impur jusqu’au soir. '
  '22':
  - type: text
    content: 'Quiconque touchera un objet sur lequel elle s’est assise lavera ses vêtements, se lavera dans l’eau, et sera impur jusqu’au soir. '
  '23':
  - type: text
    content: 'S’il y a quelque chose sur le lit ou sur l’objet sur lequel elle s’est assise, celui qui la touchera sera impur jusqu’au soir. '
  '24':
  - type: note
    content: Lé 18:19.
  - type: text
    content: 'Si un homme couche avec elle et que l’impureté de cette femme vienne sur lui, il sera impur pendant sept jours, et tout lit sur lequel il couchera sera impur. '
  '25':
  - type: note
    content: Mt 9:20.
  - type: text
    content: 'La femme qui aura un flux de sang pendant plusieurs jours hors de ses époques régulières, ou dont le flux durera plus qu’à l’ordinaire, sera impure tout le temps de son flux, comme au temps de son indisposition menstruelle. '
  '26':
  - type: text
    content: 'Tout lit sur lequel elle couchera pendant la durée de ce flux sera comme le lit de son flux menstruel, et tout objet sur lequel elle s’assiéra sera impur comme lors de son flux menstruel. '
  '27':
  - type: text
    content: 'Quiconque les touchera sera souillé; il lavera ses vêtements, se lavera dans l’eau, et sera impur jusqu’au soir. '
  '28':
  - type: text
    content: 'Lorsqu’elle sera purifiée de son flux, elle comptera sept jours, après lesquels elle sera pure. '
  '29':
  - type: text
    content: 'Le huitième jour, elle prendra deux tourterelles ou deux jeunes pigeons, et elle les apportera au sacrificateur, à l’entrée de la tente d’assignation. '
  '3':
  - type: text
    content: 'C’est à cause de sa gonorrhée qu’il est impur: que sa chair laisse couler son flux, ou qu’elle le retienne, il est impur. '
  '30':
  - type: text
    content: 'Le sacrificateur offrira l’un en sacrifice d’expiation, et l’autre en holocauste; et le sacrificateur fera pour elle l’expiation devant l’Éternel, à cause du flux qui la rendait impure. '
  '31':
  - type: text
    content: 'Vous éloignerez les enfants d’Israël de leurs impuretés, de peur qu’ils ne meurent à cause de leurs impuretés, s’ils souillent mon tabernacle qui est au milieu d’eux. '
  '32':
  - type: text
    content: 'Telle est la loi pour celui qui a une gonorrhée ou qui est souillé par une pollution, '
  '33':
  - type: text
    content: pour celle qui a son flux menstruel, pour l’homme ou la femme qui a un flux, et pour l’homme qui couche avec une femme impure.
  '4':
  - type: text
    content: 'Tout lit sur lequel il couchera sera impur, et tout objet sur lequel il s’assiéra sera impur. '
  '5':
  - type: text
    content: 'Celui qui touchera son lit lavera ses vêtements, se lavera dans l’eau, et sera impur jusqu’au soir. '
  '6':
  - type: text
    content: 'Celui qui s’assiéra sur l’objet sur lequel il s’est assis lavera ses vêtements, se lavera dans l’eau, et sera impur jusqu’au soir. '
  '7':
  - type: text
    content: 'Celui qui touchera sa chair lavera ses vêtements, se lavera dans l’eau, et sera impur jusqu’au soir. '
  '8':
  - type: text
    content: 'S’il crache sur un homme pur, cet homme lavera ses vêtements, se lavera dans l’eau, et sera impur jusqu’au soir. '
  '9':
  - type: text
    content: 'Toute monture sur laquelle il s’assiéra sera impure. '
