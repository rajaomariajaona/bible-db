document_id: LEV.15,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Loi sur les impuretés de l’homme et de la femme
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-18: cf. No 5:1-4. (Mc 7:20-23. 2 Co 7:1.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Éternel parla à Moïse et à Aaron, et dit: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Celui qui touchera une chose quelconque qui a été sous lui sera impur jusqu’au soir; et celui qui la portera lavera ses vêtements, se lavera dans l’eau, et sera impur jusqu’au soir. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Celui qui sera touché par lui, et qui ne se sera pas lavé les mains dans l’eau, lavera ses vêtements, se lavera dans l’eau, et sera impur jusqu’au soir. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Lé 6:28; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 11:33
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Tout vase de terre qui sera touché par lui sera brisé, et tout vase de bois sera lavé dans l’eau. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsqu’il sera purifié de son flux, il comptera sept jours pour sa purification; il lavera ses vêtements, il lavera sa chair avec de l’eau vive, et il sera pur. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le huitième jour, il prendra deux tourterelles ou deux jeunes pigeons, il ira devant l’Éternel, à l’entrée de la tente d’assignation, et il les donnera au sacrificateur. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le sacrificateur les offrira, l’un en sacrifice d’expiation, et l’autre en holocauste; et le sacrificateur fera pour lui l’expiation devant l’Éternel, à cause de son flux. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’homme qui aura une pollution lavera tout son corps dans l’eau, et sera impur jusqu’au soir. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tout vêtement et toute peau qui en seront atteints seront lavés dans l’eau, et seront impurs jusqu’au soir. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si une femme a couché avec un tel homme, ils se laveront l’un et l’autre, et seront impurs jusqu’au soir.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 19-33: cf. (Lé 12:2-8; 20:18.) Mc 5:25-34.'
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La femme qui aura un flux, un flux de sang en sa chair, restera sept jours dans son impureté. Quiconque la touchera sera impur jusqu’au soir. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Parlez aux enfants d’Israël, et dites-leur: Tout homme qui a une gonorrhée est par là même impur. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tout lit sur lequel elle couchera pendant son impureté sera impur, et tout objet sur lequel elle s’assiéra sera impur. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quiconque touchera son lit lavera ses vêtements, se lavera dans l’eau, et sera impur jusqu’au soir. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quiconque touchera un objet sur lequel elle s’est assise lavera ses vêtements, se lavera dans l’eau, et sera impur jusqu’au soir. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'S’il y a quelque chose sur le lit ou sur l’objet sur lequel elle s’est assise, celui qui la touchera sera impur jusqu’au soir. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 18:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Si un homme couche avec elle et que l’impureté de cette femme vienne sur lui, il sera impur pendant sept jours, et tout lit sur lequel il couchera sera impur. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 9:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'La femme qui aura un flux de sang pendant plusieurs jours hors de ses époques régulières, ou dont le flux durera plus qu’à l’ordinaire, sera impure tout le temps de son flux, comme au temps de son indisposition menstruelle. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tout lit sur lequel elle couchera pendant la durée de ce flux sera comme le lit de son flux menstruel, et tout objet sur lequel elle s’assiéra sera impur comme lors de son flux menstruel. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quiconque les touchera sera souillé; il lavera ses vêtements, se lavera dans l’eau, et sera impur jusqu’au soir. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsqu’elle sera purifiée de son flux, elle comptera sept jours, après lesquels elle sera pure. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le huitième jour, elle prendra deux tourterelles ou deux jeunes pigeons, et elle les apportera au sacrificateur, à l’entrée de la tente d’assignation. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est à cause de sa gonorrhée qu’il est impur: que sa chair laisse couler son flux, ou qu’elle le retienne, il est impur. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le sacrificateur offrira l’un en sacrifice d’expiation, et l’autre en holocauste; et le sacrificateur fera pour elle l’expiation devant l’Éternel, à cause du flux qui la rendait impure. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous éloignerez les enfants d’Israël de leurs impuretés, de peur qu’ils ne meurent à cause de leurs impuretés, s’ils souillent mon tabernacle qui est au milieu d’eux. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Telle est la loi pour celui qui a une gonorrhée ou qui est souillé par une pollution, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: pour celle qui a son flux menstruel, pour l’homme ou la femme qui a un flux, et pour l’homme qui couche avec une femme impure.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tout lit sur lequel il couchera sera impur, et tout objet sur lequel il s’assiéra sera impur. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Celui qui touchera son lit lavera ses vêtements, se lavera dans l’eau, et sera impur jusqu’au soir. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Celui qui s’assiéra sur l’objet sur lequel il s’est assis lavera ses vêtements, se lavera dans l’eau, et sera impur jusqu’au soir. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Celui qui touchera sa chair lavera ses vêtements, se lavera dans l’eau, et sera impur jusqu’au soir. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'S’il crache sur un homme pur, cet homme lavera ses vêtements, se lavera dans l’eau, et sera impur jusqu’au soir. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toute monture sur laquelle il s’assiéra sera impure. '
