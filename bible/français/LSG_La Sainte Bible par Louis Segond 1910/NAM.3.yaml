document_id: NAM.3,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-19: cf. So 2:13-15. Éz 31:3-17. Jg 5:31.'
  - type: text
    content: Malheur à la ville sanguinaire,
  - type: text
    content: Pleine de mensonge, pleine de violence,
  - type: text
    content: Et qui ne cesse de se livrer à la rapine!…
  '10':
  - type: text
    content: Et cependant elle est partie pour l’exil, elle s’en est allée captive;
  - type: text
    content: Ses enfants ont été écrasés au coin de toutes les rues;
  - type: text
    content: On a jeté le sort sur ses nobles,
  - type: text
    content: Et tous ses grands ont été chargés de chaînes.
  '11':
  - type: text
    content: Toi aussi, tu seras enivrée, tu te cacheras;
  - type: text
    content: Toi aussi, tu chercheras un refuge contre l’ennemi.
  '12':
  - type: text
    content: Toutes tes forteresses
  - type: text
    content: Sont des figuiers avec les primeurs;
  - type: text
    content: Quand on les secoue,
  - type: text
    content: Elles tombent dans la bouche de qui veut les manger.
  '13':
  - type: text
    content: Voici, ton peuple, ce sont des femmes au milieu de toi;
  - type: text
    content: Les portes de ton pays s’ouvrent à tes ennemis;
  - type: text
    content: Le feu consume tes verrous.
  '14':
  - type: text
    content: Puise de l’eau pour le siège!
  - type: text
    content: Répare tes forteresses!
  - type: text
    content: Entre dans la boue, foule l’argile!
  - type: text
    content: Rétablis le four à briques!
  '15':
  - type: text
    content: Là, le feu te dévorera,
  - type: text
    content: L’épée t’exterminera,
  - type: text
    content: Te dévorera comme des sauterelles.
  - type: text
    content: Entasse-toi comme les sauterelles!
  - type: text
    content: Entasse-toi comme les sauterelles!
  '16':
  - type: text
    content: Tes marchands, plus nombreux
  - type: text
    content: Que les étoiles du ciel,
  - type: text
    content: Sont comme la sauterelle qui ouvre les ailes et s’envole.
  '17':
  - type: text
    content: Tes princes sont comme les sauterelles,
  - type: text
    content: Tes chefs comme une multitude de sauterelles,
  - type: text
    content: 'Qui se posent sur les haies au temps de la froidure:'
  - type: text
    content: Le soleil paraît, elles s’envolent,
  - type: text
    content: Et l’on ne connaît plus le lieu où elles étaient.
  '18':
  - type: text
    content: Tes bergers sommeillent, roi d’Assyrie,
  - type: text
    content: Tes vaillants hommes reposent;
  - type: text
    content: Ton peuple est dispersé sur les montagnes,
  - type: text
    content: Et nul ne le rassemble.
  '19':
  - type: text
    content: Il n’y a point de remède à ta blessure,
  - type: text
    content: Ta plaie est mortelle.
  - type: text
    content: Tous ceux qui entendront parler de toi
  - type: text
    content: Battront des mains sur toi;
  - type: text
    content: Car quel est celui que ta méchanceté n’a pas atteint?
  '2':
  - type: text
    content: On entend le bruit du fouet,
  - type: text
    content: Le bruit des roues,
  - type: text
    content: Le galop des chevaux,
  - type: text
    content: Le roulement des chars.
  '3':
  - type: text
    content: Les cavaliers s’élancent, l’épée étincelle, la lance brille…
  - type: text
    content: Une multitude de blessés!… une foule de cadavres!…
  - type: text
    content: Des morts à l’infini!…
  - type: text
    content: On tombe sur les morts!…
  '4':
  - type: text
    content: C’est à cause des nombreuses prostitutions de la prostituée,
  - type: text
    content: Pleine d’attraits, habile enchanteresse,
  - type: text
    content: Qui vendait les nations par ses prostitutions
  - type: text
    content: Et les peuples par ses enchantements.
  '5':
  - type: text
    content: Voici, j’en veux à toi, dit l’Éternel des armées,
  - type: text
    content: Je relèverai tes pans jusque sur ton visage,
  - type: text
    content: Je montrerai ta nudité aux nations,
  - type: text
    content: Et ta honte aux royaumes.
  '6':
  - type: text
    content: Je jetterai sur toi des impuretés, je t’avilirai,
  - type: text
    content: Et je te donnerai en spectacle.
  '7':
  - type: text
    content: Tous ceux qui te verront fuiront loin de toi,
  - type: text
    content: 'Et l’on dira: Ninive est détruite!'
  - type: text
    content: Qui la plaindra?
  - type: text
    content: Où te chercherai-je des consolateurs?
  '8':
  - type: text
    content: Es-tu meilleure que No-Amon,
  - type: text
    content: Qui était assise au milieu des fleuves,
  - type: text
    content: Entourée par les eaux,
  - type: text
    content: Ayant la mer pour rempart,
  - type: text
    content: La mer pour murailles?
  '9':
  - type: text
    content: L’Éthiopie et les Égyptiens innombrables faisaient sa force,
  - type: text
    content: Puth et les Libyens étaient ses auxiliaires.
