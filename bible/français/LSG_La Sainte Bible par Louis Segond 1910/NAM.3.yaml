document_id: NAM.3
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-19: cf. So 2:13-15. Éz 31:3-17. Jg 5:31.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Malheur à la ville sanguinaire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pleine de mensonge, pleine de violence,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui ne cesse de se livrer à la rapine!…
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: On entend le bruit du fouet,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le bruit des roues,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le galop des chevaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le roulement des chars.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Les cavaliers s’élancent, l’épée étincelle, la lance brille…
- type: usfm
  marker: q1
  children:
  - type: text
    text: Une multitude de blessés!… une foule de cadavres!…
- type: usfm
  marker: q1
  children:
  - type: text
    text: Des morts à l’infini!…
- type: usfm
  marker: q1
  children:
  - type: text
    text: On tombe sur les morts!…
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: C’est à cause des nombreuses prostitutions de la prostituée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pleine d’attraits, habile enchanteresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui vendait les nations par ses prostitutions
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les peuples par ses enchantements.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Voici, j’en veux à toi, dit l’Éternel des armées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je relèverai tes pans jusque sur ton visage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je montrerai ta nudité aux nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ta honte aux royaumes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Je jetterai sur toi des impuretés, je t’avilirai,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je te donnerai en spectacle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tous ceux qui te verront fuiront loin de toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et l’on dira: Ninive est détruite!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui la plaindra?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Où te chercherai-je des consolateurs?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Es-tu meilleure que No-Amon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui était assise au milieu des fleuves,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Entourée par les eaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ayant la mer pour rempart,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La mer pour murailles?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: L’Éthiopie et les Égyptiens innombrables faisaient sa force,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Puth et les Libyens étaient ses auxiliaires.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Et cependant elle est partie pour l’exil, elle s’en est allée captive;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses enfants ont été écrasés au coin de toutes les rues;
- type: usfm
  marker: q1
  children:
  - type: text
    text: On a jeté le sort sur ses nobles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tous ses grands ont été chargés de chaînes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Toi aussi, tu seras enivrée, tu te cacheras;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toi aussi, tu chercheras un refuge contre l’ennemi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Toutes tes forteresses
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sont des figuiers avec les primeurs;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand on les secoue,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elles tombent dans la bouche de qui veut les manger.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Voici, ton peuple, ce sont des femmes au milieu de toi;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les portes de ton pays s’ouvrent à tes ennemis;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le feu consume tes verrous.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Puise de l’eau pour le siège!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Répare tes forteresses!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Entre dans la boue, foule l’argile!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rétablis le four à briques!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Là, le feu te dévorera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’épée t’exterminera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Te dévorera comme des sauterelles.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Entasse-toi comme les sauterelles!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Entasse-toi comme les sauterelles!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Tes marchands, plus nombreux
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que les étoiles du ciel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sont comme la sauterelle qui ouvre les ailes et s’envole.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Tes princes sont comme les sauterelles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tes chefs comme une multitude de sauterelles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Qui se posent sur les haies au temps de la froidure:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le soleil paraît, elles s’envolent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et l’on ne connaît plus le lieu où elles étaient.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Tes bergers sommeillent, roi d’Assyrie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tes vaillants hommes reposent;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ton peuple est dispersé sur les montagnes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et nul ne le rassemble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Il n’y a point de remède à ta blessure,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ta plaie est mortelle.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous ceux qui entendront parler de toi
- type: usfm
  marker: q1
  children:
  - type: text
    text: Battront des mains sur toi;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car quel est celui que ta méchanceté n’a pas atteint?
