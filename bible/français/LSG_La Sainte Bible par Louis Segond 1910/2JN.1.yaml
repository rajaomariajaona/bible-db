document_id: 2JN.1,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Adresse et salutation
  - type: heading
    content: 'V. 1-3: cf. 3 Jn 1. 2 Pi 1:1, 2.'
  - type: text
    content: 'L’ancien, à Kyria l’élue et à ses enfants, que j’aime dans la vérité, et ce n’est pas moi seul qui les aime, mais aussi tous ceux qui ont connu la vérité, '
  '10':
  - type: note
    content: Ro 16:17. 2 Ti 3:5. Tit 3:10.
  - type: text
    content: 'Si quelqu’un vient à vous et n’apporte pas cette doctrine, ne le recevez pas dans votre maison, et ne lui dites pas: Salut! '
  '11':
  - type: text
    content: 'car celui qui lui dit: Salut! Participe à ses mauvaises œuvres. '
  '12':
  - type: text
    content: 'Quoique j’eusse beaucoup de choses à vous écrire, je n’ai pas voulu le faire avec le papier et l’encre; mais j’espère aller chez vous, et vous parler bouche à bouche, afin que notre joie soit parfaite. '
  '13':
  - type: text
    content: Les enfants de ta sœur l’élue te saluent.
  '2':
  - type: text
    content: 'à cause de la vérité qui demeure en nous, et qui sera avec nous pour l’éternité: '
  '3':
  - type: text
    content: que la grâce, la miséricorde et la paix soient avec vous de la part de Dieu le Père et de la part de Jésus-Christ, le Fils du Père, dans la vérité et la charité!
  - type: heading
    content: L’amour fraternel
  - type: heading
    content: 'V. 4-6: cf. 3 Jn 3, 4. (Jn 13:34, 35. 1 Jn 5:1-3.)'
  '4':
  - type: text
    content: 'J’ai été fort réjoui de trouver de tes enfants qui marchent dans la vérité, selon le commandement que nous avons reçu du Père. '
  '5':
  - type: text
    content: 'Et maintenant, ce que je te demande, Kyria, '
  - type: note
    content: 1 Jn 2:7.
  - type: text
    content: 'non comme te prescrivant un commandement nouveau, mais celui que nous avons eu dès le commencement, '
  - type: note
    content: Jn 13:34; 15:12. Ép 5:2. 1 Th 4:9. 1 Pi 4:8. 1 Jn 3:23; 4:21.
  - type: text
    content: 'c’est que nous nous aimions les uns les autres. '
  '6':
  - type: note
    content: Jn 15:10.
  - type: text
    content: Et l’amour consiste à marcher selon ses commandements. C’est là le commandement dans lequel vous devez marcher, comme vous l’avez appris dès le commencement.
  - type: heading
    content: Les faux docteurs
  - type: heading
    content: 'V. 7-13: cf. 1 Jn 4:1-6; 2:18-23.'
  '7':
  - type: text
    content: ' '
  - type: note
    content: Mt 24:5, 24. 2 Pi 2:1. 1 Jn 4:1.
  - type: text
    content: 'Car plusieurs séducteurs sont entrés dans le monde, qui ne confessent point que Jésus-Christ est venu en chair. Celui qui est tel, c’est le séducteur et l’antéchrist. '
  '8':
  - type: text
    content: 'Prenez garde à vous-mêmes, afin que vous ne perdiez pas le fruit de votre travail, mais que vous receviez une pleine récompense. '
  '9':
  - type: text
    content: 'Quiconque va plus loin et ne demeure pas dans la doctrine de Christ n’a point Dieu; celui qui demeure dans cette doctrine a le Père et le Fils. '
