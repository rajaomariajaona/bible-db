document_id: 2JN.1
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Adresse et salutation
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-3: cf. 3 Jn 1. 2 Pi 1:1, 2.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’ancien, à Kyria l’élue et à ses enfants, que j’aime dans la vérité, et ce n’est pas moi seul qui les aime, mais aussi tous ceux qui ont connu la vérité, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'à cause de la vérité qui demeure en nous, et qui sera avec nous pour l’éternité: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: que la grâce, la miséricorde et la paix soient avec vous de la part de Dieu le Père et de la part de Jésus-Christ, le Fils du Père, dans la vérité et la charité!
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’amour fraternel
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 4-6: cf. 3 Jn 3, 4. (Jn 13:34, 35. 1 Jn 5:1-3.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'J’ai été fort réjoui de trouver de tes enfants qui marchent dans la vérité, selon le commandement que nous avons reçu du Père. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Et maintenant, ce que je te demande, Kyria, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 2:7
      metadata:
        usfm: 1JN.2.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'non comme te prescrivant un commandement nouveau, mais celui que nous avons eu dès le commencement, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 13:34
      metadata:
        usfm: JHN.13.34
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 15:12
      metadata:
        usfm: JHN.15.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 5:2
      metadata:
        usfm: EPH.5.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 4:9
      metadata:
        usfm: 1TH.4.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 4:8
      metadata:
        usfm: 1PE.4.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 3:23
      metadata:
        usfm: 1JN.3.23
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 4:21
      metadata:
        usfm: 1JN.4.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'c’est que nous nous aimions les uns les autres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 15:10
      metadata:
        usfm: JHN.15.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et l’amour consiste à marcher selon ses commandements. C’est là le commandement dans lequel vous devez marcher, comme vous l’avez appris dès le commencement.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les faux docteurs
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 7-13: cf. 1 Jn 4:1-6; 2:18-23.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 24:5
      metadata:
        usfm: MAT.24.5
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '24'
      metadata:
        usfm: MAT.24.24
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Pi 2:1
      metadata:
        usfm: 2PE.2.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 4:1
      metadata:
        usfm: 1JN.4.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Car plusieurs séducteurs sont entrés dans le monde, qui ne confessent point que Jésus-Christ est venu en chair. Celui qui est tel, c’est le séducteur et l’antéchrist. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Prenez garde à vous-mêmes, afin que vous ne perdiez pas le fruit de votre travail, mais que vous receviez une pleine récompense. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Quiconque va plus loin et ne demeure pas dans la doctrine de Christ n’a point Dieu; celui qui demeure dans cette doctrine a le Père et le Fils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 16:17
      metadata:
        usfm: ROM.16.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ti 3:5
      metadata:
        usfm: 2TI.3.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Tit 3:10
      metadata:
        usfm: TIT.3.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Si quelqu’un vient à vous et n’apporte pas cette doctrine, ne le recevez pas dans votre maison, et ne lui dites pas: Salut! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'car celui qui lui dit: Salut! Participe à ses mauvaises œuvres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Quoique j’eusse beaucoup de choses à vous écrire, je n’ai pas voulu le faire avec le papier et l’encre; mais j’espère aller chez vous, et vous parler bouche à bouche, afin que notre joie soit parfaite. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Les enfants de ta sœur l’élue te saluent.
