document_id: MAT.9,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Guérison d’un paralytique
  - type: heading
    content: 'V. 1-8: cf. (Mc 2:1-12. Lu 5:17-26.)'
  - type: text
    content: 'Jésus, étant monté dans une barque, traversa la mer, et alla dans sa ville. '
  '10':
  - type: text
    content: 'Comme Jésus était à table dans la maison, voici, beaucoup de publicains et de gens de mauvaise vie vinrent se mettre à table avec lui et avec ses disciples. '
  '11':
  - type: text
    content: 'Les pharisiens virent cela, et ils dirent à ses disciples: Pourquoi votre maître mange-t-il avec les publicains et les gens de mauvaise vie? '
  '12':
  - type: text
    content: 'Ce que Jésus ayant entendu, il dit: '
  - type: text
    content: Ce ne sont pas ceux qui se portent bien qui ont besoin de médecin, mais les malades.
  '13':
  - type: text
    content: ' '
  - type: text
    content: 'Allez, et apprenez ce que signifie:'
  - type: text
    content: ' '
  - type: note
    content: Os 6:6. Mi 6:8. Mt 12:7.
  - type: text
    content: Je prends plaisir à la miséricorde, et non aux sacrifices.
  - type: text
    content: ' '
  - type: note
    content: Mc 2:17. Lu 5:32; 19:10. 1 Ti 1:15.
  - type: text
    content: Car je ne suis pas venu appeler des justes, mais des pécheurs.
  - type: heading
    content: Question des disciples de Jean-Baptiste sur le jeûne
  - type: heading
    content: 'V. 14-17: cf. (Mc 2:18-22. Lu 5:33-39.)'
  '14':
  - type: text
    content: ' '
  - type: note
    content: Mc 2:18. Lu 5:33.
  - type: text
    content: 'Alors les disciples de Jean vinrent auprès de Jésus, et dirent: Pourquoi nous et les pharisiens jeûnons-nous, tandis que tes disciples ne jeûnent point? '
  '15':
  - type: text
    content: 'Jésus leur répondit: '
  - type: note
    content: 2 Co 11:2.
  - type: text
    content: Les amis de l’époux peuvent-ils s’affliger pendant que l’époux est avec eux? Les jours viendront où l’époux leur sera enlevé, et alors ils jeûneront.
  '16':
  - type: text
    content: ' '
  - type: text
    content: Personne ne met une pièce de drap neuf à un vieil habit; car elle emporterait une partie de l’habit, et la déchirure serait pire.
  - type: text
    content: ' '
  '17':
  - type: note
    content: Mc 2:22.
  - type: text
    content: On ne met pas non plus du vin nouveau dans de vieilles outres; autrement, les outres se rompent, le vin se répand, et les outres sont perdues; mais on met le vin nouveau dans des outres neuves, et le vin et les outres se conservent.
  - type: heading
    content: Résurrection de la fille de Jaïrus, et guérison d’une femme malade depuis douze ans
  - type: heading
    content: 'V. 18-26: cf. (Mc 5:22-43. Lu 8:41-56.) Jn 5:21, 28.'
  '18':
  - type: text
    content: 'Tandis qu’il leur adressait ces paroles, '
  - type: note
    content: Mc 5:22. Lu 8:41.
  - type: text
    content: 'voici, un chef arriva, se prosterna devant lui, et dit: Ma fille est morte il y a un instant; mais viens, impose-lui les mains, et elle vivra. '
  '19':
  - type: text
    content: 'Jésus se leva, et le suivit avec ses disciples. '
  '2':
  - type: note
    content: Mc 2:3. Lu 5:18. Ac 9:33.
  - type: text
    content: 'Et voici, on lui amena un paralytique couché sur un lit. Jésus, voyant leur foi, dit au paralytique: '
  - type: text
    content: Prends courage, mon enfant, tes péchés te sont pardonnés.
  - type: text
    content: ' '
  '20':
  - type: note
    content: Lé 15:25. Mc 5:25. Lu 8:43.
  - type: text
    content: 'Et voici, une femme atteinte d’une perte de sang depuis douze ans s’approcha par derrière, et toucha le bord de son vêtement. '
  '21':
  - type: text
    content: 'Car elle disait en elle-même: Si je puis seulement toucher son vêtement, je serai guérie. '
  '22':
  - type: text
    content: 'Jésus se retourna, et dit, en la voyant: '
  - type: note
    content: Mc 5:34. Lu 8:48.
  - type: text
    content: Prends courage, ma fille, ta foi t’a guérie.
  - type: text
    content: ' Et cette femme fut guérie à l’heure même. '
  '23':
  - type: note
    content: Mc 5:38. Lu 8:51.
  - type: text
    content: 'Lorsque Jésus fut arrivé à la maison du chef, et qu’il vit les joueurs de flûte et la foule bruyante, '
  '24':
  - type: text
    content: 'il leur dit: '
  - type: text
    content: Retirez-vous; car la jeune fille n’est pas morte, mais elle
  - type: text
    content: ' '
  - type: note
    content: Jn 11:11.
  - type: text
    content: dort.
  - type: text
    content: ' Et ils se moquaient de lui. '
  '25':
  - type: text
    content: 'Quand la foule eut été renvoyée, il entra, prit la main de la jeune fille, et la jeune fille se leva. '
  '26':
  - type: text
    content: Le bruit s’en répandit dans toute la contrée.
  - type: heading
    content: Diverses guérisons
  - type: heading
    content: 'V. 27-31: cf. Mc 8:22-26; 10:46-53. És 35:5.'
  '27':
  - type: text
    content: 'Étant parti de là, Jésus fut suivi par deux aveugles, qui criaient: Aie pitié de nous, Fils de David! '
  '28':
  - type: text
    content: 'Lorsqu’il fut arrivé à la maison, les aveugles s’approchèrent de lui, et Jésus leur dit: '
  - type: text
    content: Croyez-vous que je puisse faire cela?
  - type: text
    content: ' Oui, Seigneur, lui répondirent-ils. '
  '29':
  - type: text
    content: 'Alors il leur toucha les yeux, en disant: '
  - type: text
    content: Qu’il vous soit fait selon votre foi.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Sur quoi, quelques scribes dirent au-dedans d’eux: '
  - type: note
    content: Ps 32:5. És 43:25.
  - type: text
    content: 'Cet homme blasphème. '
  '30':
  - type: text
    content: 'Et leurs yeux s’ouvrirent. '
  - type: note
    content: Mt 12:16. Lu 5:14.
  - type: text
    content: 'Jésus leur fit cette recommandation sévère: '
  - type: text
    content: Prenez garde que personne ne le sache.
  - type: text
    content: ' '
  '31':
  - type: note
    content: Mc 7:36.
  - type: text
    content: Mais, dès qu’ils furent sortis, ils répandirent sa renommée dans tout le pays.
  - type: heading
    content: 'V. 32-34: cf. Mt 12:22-37. És 35:6.'
  '32':
  - type: text
    content: ' '
  - type: note
    content: Mt 12:22. Lu 11:14.
  - type: text
    content: 'Comme ils s’en allaient, voici, on amena à Jésus un démoniaque muet. '
  '33':
  - type: text
    content: 'Le démon ayant été chassé, le muet parla. Et la foule étonnée disait: Jamais pareille chose ne s’est vue en Israël. '
  '34':
  - type: text
    content: 'Mais les pharisiens dirent: '
  - type: note
    content: Mt 12:24. Mc 3:22. Lu 11:15.
  - type: text
    content: C’est par le prince des démons qu’il chasse les démons.
  - type: heading
    content: Mission des douze apôtres
  - type: heading
    content: 'V. 35-38: cf. Mc 6:34. (Mt 4:23-25. Ac 10:38.)'
  '35':
  - type: text
    content: ' '
  - type: note
    content: Mc 6:6. Lu 13:22.
  - type: text
    content: 'Jésus parcourait toutes les villes et les villages, enseignant dans les synagogues, prêchant la bonne nouvelle du royaume, et guérissant toute maladie et toute infirmité. '
  '36':
  - type: note
    content: Mc 6:34.
  - type: text
    content: 'Voyant la foule, il fut ému de compassion pour elle, parce qu’elle était languissante et abattue, '
  - type: note
    content: Jé 23:1. Éz 34:2.
  - type: text
    content: 'comme des brebis qui n’ont point de berger. '
  '37':
  - type: text
    content: 'Alors il dit à ses disciples: '
  - type: text
    content: La moisson est grande, mais il y a peu d’ouvriers.
  '38':
  - type: text
    content: ' '
  - type: note
    content: 2 Th 3:1.
  - type: text
    content: Priez donc le maître de la moisson d’envoyer des ouvriers dans sa moisson.
  '4':
  - type: text
    content: 'Et Jésus, connaissant leurs pensées, dit: '
  - type: text
    content: Pourquoi avez-vous de mauvaises pensées dans vos cœurs?
  '5':
  - type: text
    content: ' '
  - type: text
    content: 'Car, lequel est le plus aisé, de dire: Tes péchés sont pardonnés, ou de dire: Lève-toi, et marche?'
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'Or, afin que vous sachiez que le Fils de l’homme a sur la terre le pouvoir de pardonner les péchés: Lève-toi,'
  - type: text
    content: ' dit-il au paralytique, '
  - type: text
    content: prends ton lit, et va dans ta maison.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'Et il se leva, et s’en alla dans sa maison. '
  '8':
  - type: text
    content: Quand la foule vit cela, elle fut saisie de crainte, et elle glorifia Dieu, qui a donné aux hommes un tel pouvoir.
  - type: heading
    content: Vocation de Matthieu
  - type: heading
    content: 'V. 9-13: cf. (Mc 2:13-17. Lu 5:27-32.) Mt 4:18-22. Ps 113:7.'
  '9':
  - type: text
    content: ' '
  - type: note
    content: Mc 2:14. Lu 5:27.
  - type: text
    content: 'De là étant allé plus loin, Jésus vit un homme assis au lieu des péages, et qui s’appelait Matthieu. Il lui dit: '
  - type: text
    content: Suis-moi.
  - type: text
    content: ' Cet homme se leva, et le suivit. '
