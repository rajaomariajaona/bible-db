document_id: MAT.9
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Guérison d’un paralytique
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-8: cf. (Mc 2:1-12. Lu 5:17-26.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jésus, étant monté dans une barque, traversa la mer, et alla dans sa ville. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 2:3
      metadata:
        usfm: MRK.2.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 5:18
      metadata:
        usfm: LUK.5.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 9:33
      metadata:
        usfm: ACT.9.33
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Et voici, on lui amena un paralytique couché sur un lit. Jésus, voyant leur foi, dit au paralytique: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Prends courage, mon enfant, tes péchés te sont pardonnés.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Sur quoi, quelques scribes dirent au-dedans d’eux: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 32:5
      metadata:
        usfm: PSA.32.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 43:25
      metadata:
        usfm: ISA.43.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Cet homme blasphème. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Et Jésus, connaissant leurs pensées, dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Pourquoi avez-vous de mauvaises pensées dans vos cœurs?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Car, lequel est le plus aisé, de dire: Tes péchés sont pardonnés, ou de dire: Lève-toi, et marche?'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Or, afin que vous sachiez que le Fils de l’homme a sur la terre le pouvoir de pardonner les péchés: Lève-toi,'
  - type: text
    text: ' dit-il au paralytique, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: prends ton lit, et va dans ta maison.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Et il se leva, et s’en alla dans sa maison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Quand la foule vit cela, elle fut saisie de crainte, et elle glorifia Dieu, qui a donné aux hommes un tel pouvoir.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vocation de Matthieu
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 9-13: cf. (Mc 2:13-17. Lu 5:27-32.) Mt 4:18-22. Ps 113:7.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 2:14
      metadata:
        usfm: MRK.2.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 5:27
      metadata:
        usfm: LUK.5.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'De là étant allé plus loin, Jésus vit un homme assis au lieu des péages, et qui s’appelait Matthieu. Il lui dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Suis-moi.
  - type: text
    text: ' Cet homme se leva, et le suivit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Comme Jésus était à table dans la maison, voici, beaucoup de publicains et de gens de mauvaise vie vinrent se mettre à table avec lui et avec ses disciples. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Les pharisiens virent cela, et ils dirent à ses disciples: Pourquoi votre maître mange-t-il avec les publicains et les gens de mauvaise vie? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ce que Jésus ayant entendu, il dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ce ne sont pas ceux qui se portent bien qui ont besoin de médecin, mais les malades.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Allez, et apprenez ce que signifie:'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Os 6:6
      metadata:
        usfm: HOS.6.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mi 6:8
      metadata:
        usfm: MIC.6.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 12:7
      metadata:
        usfm: MAT.12.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je prends plaisir à la miséricorde, et non aux sacrifices.
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 2:17
      metadata:
        usfm: MRK.2.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 5:32
      metadata:
        usfm: LUK.5.32
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 19:10
      metadata:
        usfm: LUK.19.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 1:15
      metadata:
        usfm: 1TI.1.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Car je ne suis pas venu appeler des justes, mais des pécheurs.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Question des disciples de Jean-Baptiste sur le jeûne
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 14-17: cf. (Mc 2:18-22. Lu 5:33-39.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 2:18
      metadata:
        usfm: MRK.2.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 5:33
      metadata:
        usfm: LUK.5.33
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Alors les disciples de Jean vinrent auprès de Jésus, et dirent: Pourquoi nous et les pharisiens jeûnons-nous, tandis que tes disciples ne jeûnent point? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Jésus leur répondit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 11:2
      metadata:
        usfm: 2CO.11.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Les amis de l’époux peuvent-ils s’affliger pendant que l’époux est avec eux? Les jours viendront où l’époux leur sera enlevé, et alors ils jeûneront.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Personne ne met une pièce de drap neuf à un vieil habit; car elle emporterait une partie de l’habit, et la déchirure serait pire.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 2:22
      metadata:
        usfm: MRK.2.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: On ne met pas non plus du vin nouveau dans de vieilles outres; autrement, les outres se rompent, le vin se répand, et les outres sont perdues; mais on met le vin nouveau dans des outres neuves, et le vin et les outres se conservent.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Résurrection de la fille de Jaïrus, et guérison d’une femme malade depuis douze ans
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 18-26: cf. (Mc 5:22-43. Lu 8:41-56.) Jn 5:21, 28.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tandis qu’il leur adressait ces paroles, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 5:22
      metadata:
        usfm: MRK.5.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 8:41
      metadata:
        usfm: LUK.8.41
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'voici, un chef arriva, se prosterna devant lui, et dit: Ma fille est morte il y a un instant; mais viens, impose-lui les mains, et elle vivra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Jésus se leva, et le suivit avec ses disciples. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 15:25
      metadata:
        usfm: LEV.15.25
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 5:25
      metadata:
        usfm: MRK.5.25
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 8:43
      metadata:
        usfm: LUK.8.43
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Et voici, une femme atteinte d’une perte de sang depuis douze ans s’approcha par derrière, et toucha le bord de son vêtement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Car elle disait en elle-même: Si je puis seulement toucher son vêtement, je serai guérie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Jésus se retourna, et dit, en la voyant: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 5:34
      metadata:
        usfm: MRK.5.34
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 8:48
      metadata:
        usfm: LUK.8.48
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Prends courage, ma fille, ta foi t’a guérie.
  - type: text
    text: ' Et cette femme fut guérie à l’heure même. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 5:38
      metadata:
        usfm: MRK.5.38
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 8:51
      metadata:
        usfm: LUK.8.51
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Lorsque Jésus fut arrivé à la maison du chef, et qu’il vit les joueurs de flûte et la foule bruyante, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'il leur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Retirez-vous; car la jeune fille n’est pas morte, mais elle
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 11:11
      metadata:
        usfm: JHN.11.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: dort.
  - type: text
    text: ' Et ils se moquaient de lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Quand la foule eut été renvoyée, il entra, prit la main de la jeune fille, et la jeune fille se leva. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Le bruit s’en répandit dans toute la contrée.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Diverses guérisons
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 27-31: cf. Mc 8:22-26; 10:46-53. És 35:5.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Étant parti de là, Jésus fut suivi par deux aveugles, qui criaient: Aie pitié de nous, Fils de David! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Lorsqu’il fut arrivé à la maison, les aveugles s’approchèrent de lui, et Jésus leur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Croyez-vous que je puisse faire cela?
  - type: text
    text: ' Oui, Seigneur, lui répondirent-ils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Alors il leur toucha les yeux, en disant: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Qu’il vous soit fait selon votre foi.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Et leurs yeux s’ouvrirent. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 12:16
      metadata:
        usfm: MAT.12.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 5:14
      metadata:
        usfm: LUK.5.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Jésus leur fit cette recommandation sévère: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Prenez garde que personne ne le sache.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 7:36
      metadata:
        usfm: MRK.7.36
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Mais, dès qu’ils furent sortis, ils répandirent sa renommée dans tout le pays.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 32-34: cf. Mt 12:22-37. És 35:6.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 12:22
      metadata:
        usfm: MAT.12.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 11:14
      metadata:
        usfm: LUK.11.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Comme ils s’en allaient, voici, on amena à Jésus un démoniaque muet. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Le démon ayant été chassé, le muet parla. Et la foule étonnée disait: Jamais pareille chose ne s’est vue en Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Mais les pharisiens dirent: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 12:24
      metadata:
        usfm: MAT.12.24
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 3:22
      metadata:
        usfm: MRK.3.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 11:15
      metadata:
        usfm: LUK.11.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: C’est par le prince des démons qu’il chasse les démons.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mission des douze apôtres
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 35-38: cf. Mc 6:34. (Mt 4:23-25. Ac 10:38.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 6:6
      metadata:
        usfm: MRK.6.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 13:22
      metadata:
        usfm: LUK.13.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Jésus parcourait toutes les villes et les villages, enseignant dans les synagogues, prêchant la bonne nouvelle du royaume, et guérissant toute maladie et toute infirmité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
