document_id: GEN.40,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-23: cf. Ge 39:20-23; 41:1-32. Jg 7:13, 14.'
  - type: text
    content: 'Après ces choses, il arriva que l’échanson et le panetier du roi d’Égypte, offensèrent leur maître, le roi d’Égypte. '
  '10':
  - type: text
    content: 'Ce cep avait trois sarments. Quand il eut poussé, sa fleur se développa et ses grappes donnèrent des raisins mûrs. '
  '11':
  - type: text
    content: 'La coupe de Pharaon était dans ma main. Je pris les raisins, je les pressai dans la coupe de Pharaon, et je mis la coupe dans la main de Pharaon. '
  '12':
  - type: text
    content: 'Joseph lui dit: En voici l’explication. Les trois sarments sont trois jours. '
  '13':
  - type: text
    content: 'Encore trois jours, et Pharaon relèvera ta tête et te rétablira dans ta charge; tu mettras la coupe dans la main de Pharaon, comme tu en avais l’habitude lorsque tu étais son échanson. '
  '14':
  - type: text
    content: 'Mais souviens-toi de moi, quand tu seras heureux, et montre, je te prie, de la bonté à mon égard; parle en ma faveur à Pharaon, et fais-moi sortir de cette maison. '
  '15':
  - type: text
    content: 'Car j’ai été enlevé du pays des Hébreux, et ici même je n’ai rien fait pour être mis en prison. '
  '16':
  - type: text
    content: 'Le chef des panetiers, voyant que Joseph avait donné une explication favorable, dit: Voici, il y avait aussi, dans mon songe, trois corbeilles de pain blanc sur ma tête. '
  '17':
  - type: text
    content: 'Dans la corbeille la plus élevée il y avait pour Pharaon des mets de toute espèce, cuits au four; et les oiseaux les mangeaient dans la corbeille au-dessus de ma tête. '
  '18':
  - type: text
    content: 'Joseph répondit, et dit: En voici l’explication. Les trois corbeilles sont trois jours. '
  '19':
  - type: text
    content: 'Encore trois jours, et Pharaon enlèvera ta tête de dessus toi, te fera pendre à un bois, et les oiseaux mangeront ta chair. '
  '2':
  - type: text
    content: 'Pharaon fut irrité contre ses deux officiers, le chef des échansons et le chef des panetiers. '
  '20':
  - type: text
    content: 'Le troisième jour, jour de la naissance de Pharaon, il fit un festin à tous ses serviteurs; et il éleva la tête du chef des échansons et la tête du chef des panetiers, au milieu de ses serviteurs: '
  '21':
  - type: text
    content: 'il rétablit le chef des échansons dans sa charge d’échanson, pour qu’il mît la coupe dans la main de Pharaon; '
  '22':
  - type: text
    content: 'mais il fit pendre le chef des panetiers, selon l’explication que Joseph leur avait donnée. '
  '23':
  - type: text
    content: Le chef des échansons ne pensa plus à Joseph. Il l’oublia.
  '3':
  - type: text
    content: 'Et il les fit mettre dans la maison du chef des gardes, dans la prison, dans le lieu où Joseph était enfermé. '
  '4':
  - type: text
    content: 'Le chef des gardes les plaça sous la surveillance de Joseph, qui faisait le service auprès d’eux; et ils passèrent un certain temps en prison. '
  '5':
  - type: text
    content: 'Pendant une même nuit, l’échanson et le panetier du roi d’Égypte, qui étaient enfermés dans la prison, eurent tous les deux un songe, chacun le sien, pouvant recevoir une explication distincte. '
  '6':
  - type: text
    content: 'Joseph, étant venu le matin vers eux, les regarda; et voici, ils étaient tristes. '
  '7':
  - type: text
    content: 'Alors il questionna les officiers de Pharaon, qui étaient avec lui dans la prison de son maître, et il leur dit: Pourquoi avez-vous mauvais visage aujourd’hui? '
  '8':
  - type: text
    content: 'Ils lui répondirent: Nous avons eu un songe, et il n’y a personne pour l’expliquer. Joseph leur dit: N’est-ce pas à Dieu qu’appartiennent les explications? Racontez-moi donc votre songe. '
  '9':
  - type: text
    content: 'Le chef des échansons raconta son songe à Joseph, et lui dit: Dans mon songe, voici, il y avait un cep devant moi. '
