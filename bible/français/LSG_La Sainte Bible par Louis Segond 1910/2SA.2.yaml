document_id: 2SA.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: David, roi de Juda à Hébron. — Isch-Boscheth, fils de Saül, roi d’Israël à Mahanaïm. — Guerre civile
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-7: cf. (1 S 16:1-13. 2 S 5:1-5.) 1 S 31:11-13.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Après cela, David consulta l’Éternel, en disant: Monterai-je dans une des villes de Juda? L’Éternel lui répondit: Monte. David dit: Où monterai-je? Et l’Éternel répondit: A Hébron. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'David y monta, avec ses deux femmes, Achinoam de Jizreel, et Abigaïl de Carmel, femme de Nabal. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'David fit aussi monter les gens qui étaient auprès de lui, chacun avec sa maison; et ils habitèrent dans les villes d’Hébron. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Les hommes de Juda vinrent, et là ils oignirent David pour roi sur la maison de Juda. On informa David que c’étaient les gens de Jabès en Galaad qui avaient enterré Saül. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'David envoya des messagers aux gens de Jabès en Galaad, pour leur dire: Soyez bénis de l’Éternel, puisque vous avez ainsi montré de la bienveillance envers Saül, votre maître, et que vous l’avez enterré. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Et maintenant, que l’Éternel use envers vous de bonté et de fidélité. Moi aussi je vous ferai du bien, parce que vous avez agi de la sorte. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Que vos mains se fortifient, et soyez de vaillants hommes; car votre maître Saül est mort, et c’est moi que la maison de Juda a oint pour roi sur elle.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 8-11: cf. (1 S 13:13, 14; 15:28, 29.) Lu 19:14. Job 9:4. Ps 2:1-6.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Cependant Abner, fils de Ner, chef de l’armée de Saül, prit Isch-Boscheth, fils de Saül, et le fit passer à Mahanaïm. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il l’établit roi sur Galaad, sur les Gueschuriens, sur Jizreel, sur Éphraïm, sur Benjamin, sur tout Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Isch-Boscheth, fils de Saül, était âgé de quarante ans, lorsqu’il devint roi d’Israël, et il régna deux ans. Il n’y eut que la maison de Juda qui resta attachée à David. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 S 5:5
      metadata:
        usfm: 2SA.5.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 2:11
      metadata:
        usfm: 1KI.2.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Le temps pendant lequel David régna à Hébron sur la maison de Juda fut de sept ans et six mois.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 12-32: cf. 2 S 3:1, 6, 23-27. Pr 17:14.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Abner, fils de Ner, et les gens d’Isch-Boscheth, fils de Saül, sortirent de Mahanaïm pour marcher sur Gabaon. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Joab, fils de Tseruja, et les gens de David, se mirent aussi en marche. Ils se rencontrèrent près de l’étang de Gabaon, et ils s’arrêtèrent les uns en deçà de l’étang, et les autres au-delà. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Abner dit à Joab: Que ces jeunes gens se lèvent, et qu’ils se battent devant nous! Joab répondit: Qu’ils se lèvent! '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ils se levèrent et s’avancèrent en nombre égal, douze pour Benjamin et pour Isch-Boscheth, fils de Saül, et douze des gens de David. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Chacun saisissant son adversaire par la tête lui enfonça son épée dans le flanc, et ils tombèrent tous ensemble. Et l’on donna à ce lieu, qui est près de Gabaon, le nom de Helkath-Hatsurim. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il y eut en ce jour un combat très rude, dans lequel Abner et les hommes d’Israël furent battus par les gens de David. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Là se trouvaient les trois fils de Tseruja: Joab, Abischaï et Asaël. Asaël avait les pieds légers comme une gazelle des champs: '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'il poursuivit Abner, sans se détourner de lui pour aller à droite ou à gauche. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Abner regarda derrière lui, et dit: Est-ce toi, Asaël? Et il répondit: C’est moi. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Abner lui dit: Tire à droite ou à gauche; saisis-toi de l’un de ces jeunes gens, et prends sa dépouille. Mais Asaël ne voulut point se détourner de lui. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Abner dit encore à Asaël: Détourne-toi de moi; pourquoi te frapperais-je et t’abattrais-je en terre? Comment ensuite lèverais-je le visage devant ton frère Joab? '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Et Asaël refusa de se détourner. Sur quoi Abner le frappa au ventre avec l’extrémité inférieure de sa lance, et la lance sortit par derrière. Il tomba et mourut sur place. Tous ceux qui arrivaient au lieu où Asaël était tombé mort, s’y arrêtaient. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Joab et Abischaï poursuivirent Abner, et le soleil se couchait quand ils arrivèrent au coteau d’Amma, qui est en face de Guiach, sur le chemin du désert de Gabaon. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Les fils de Benjamin se rallièrent à la suite d’Abner et formèrent un corps, et ils s’arrêtèrent au sommet d’une colline. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Abner appela Joab, et dit: L’épée dévorera-t-elle toujours? Ne sais-tu pas qu’il y aura de l’amertume à la fin? Jusques à quand tarderas-tu à dire au peuple de ne plus poursuivre ses frères? '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Joab répondit: Dieu est vivant! Si tu n’eusses parlé, le peuple n’aurait pas cessé avant le matin de poursuivre ses frères. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Et Joab sonna de la trompette, et tout le peuple s’arrêta; ils ne poursuivirent plus Israël, et ils ne continuèrent pas à se battre. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Abner et ses gens marchèrent toute la nuit dans la plaine; ils passèrent le Jourdain, traversèrent en entier le Bithron, et arrivèrent à Mahanaïm. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Joab revint de la poursuite d’Abner, et rassembla tout le peuple; il manquait dix-neuf hommes des gens de David, et Asaël. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Mais les gens de David avaient frappé à mort trois cent soixante hommes parmi ceux de Benjamin et d’Abner. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ils emportèrent Asaël, et l’enterrèrent dans le sépulcre de son père à Bethléhem. Joab et ses gens marchèrent toute la nuit, et le jour paraissait quand ils furent à Hébron.
