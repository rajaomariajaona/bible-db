document_id: 2SA.2,93
type_code: fra
verses:
  '1':
  - type: heading
    content: David, roi de Juda à Hébron. — Isch-Boscheth, fils de Saül, roi d’Israël à Mahanaïm. — Guerre civile
  - type: heading
    content: 'V. 1-7: cf. (1 S 16:1-13. 2 S 5:1-5.) 1 S 31:11-13.'
  - type: text
    content: 'Après cela, David consulta l’Éternel, en disant: Monterai-je dans une des villes de Juda? L’Éternel lui répondit: Monte. David dit: Où monterai-je? Et l’Éternel répondit: A Hébron. '
  '10':
  - type: text
    content: 'Isch-Boscheth, fils de Saül, était âgé de quarante ans, lorsqu’il devint roi d’Israël, et il régna deux ans. Il n’y eut que la maison de Juda qui resta attachée à David. '
  '11':
  - type: note
    content: 2 S 5:5. 1 R 2:11.
  - type: text
    content: Le temps pendant lequel David régna à Hébron sur la maison de Juda fut de sept ans et six mois.
  - type: heading
    content: 'V. 12-32: cf. 2 S 3:1, 6, 23-27. Pr 17:14.'
  '12':
  - type: text
    content: 'Abner, fils de Ner, et les gens d’Isch-Boscheth, fils de Saül, sortirent de Mahanaïm pour marcher sur Gabaon. '
  '13':
  - type: text
    content: 'Joab, fils de Tseruja, et les gens de David, se mirent aussi en marche. Ils se rencontrèrent près de l’étang de Gabaon, et ils s’arrêtèrent les uns en deçà de l’étang, et les autres au-delà. '
  '14':
  - type: text
    content: 'Abner dit à Joab: Que ces jeunes gens se lèvent, et qu’ils se battent devant nous! Joab répondit: Qu’ils se lèvent! '
  '15':
  - type: text
    content: 'Ils se levèrent et s’avancèrent en nombre égal, douze pour Benjamin et pour Isch-Boscheth, fils de Saül, et douze des gens de David. '
  '16':
  - type: text
    content: 'Chacun saisissant son adversaire par la tête lui enfonça son épée dans le flanc, et ils tombèrent tous ensemble. Et l’on donna à ce lieu, qui est près de Gabaon, le nom de Helkath-Hatsurim. '
  '17':
  - type: text
    content: 'Il y eut en ce jour un combat très rude, dans lequel Abner et les hommes d’Israël furent battus par les gens de David. '
  '18':
  - type: text
    content: 'Là se trouvaient les trois fils de Tseruja: Joab, Abischaï et Asaël. Asaël avait les pieds légers comme une gazelle des champs: '
  '19':
  - type: text
    content: 'il poursuivit Abner, sans se détourner de lui pour aller à droite ou à gauche. '
  '2':
  - type: text
    content: 'David y monta, avec ses deux femmes, Achinoam de Jizreel, et Abigaïl de Carmel, femme de Nabal. '
  '20':
  - type: text
    content: 'Abner regarda derrière lui, et dit: Est-ce toi, Asaël? Et il répondit: C’est moi. '
  '21':
  - type: text
    content: 'Abner lui dit: Tire à droite ou à gauche; saisis-toi de l’un de ces jeunes gens, et prends sa dépouille. Mais Asaël ne voulut point se détourner de lui. '
  '22':
  - type: text
    content: 'Abner dit encore à Asaël: Détourne-toi de moi; pourquoi te frapperais-je et t’abattrais-je en terre? Comment ensuite lèverais-je le visage devant ton frère Joab? '
  '23':
  - type: text
    content: 'Et Asaël refusa de se détourner. Sur quoi Abner le frappa au ventre avec l’extrémité inférieure de sa lance, et la lance sortit par derrière. Il tomba et mourut sur place. Tous ceux qui arrivaient au lieu où Asaël était tombé mort, s’y arrêtaient. '
  '24':
  - type: text
    content: 'Joab et Abischaï poursuivirent Abner, et le soleil se couchait quand ils arrivèrent au coteau d’Amma, qui est en face de Guiach, sur le chemin du désert de Gabaon. '
  '25':
  - type: text
    content: 'Les fils de Benjamin se rallièrent à la suite d’Abner et formèrent un corps, et ils s’arrêtèrent au sommet d’une colline. '
  '26':
  - type: text
    content: 'Abner appela Joab, et dit: L’épée dévorera-t-elle toujours? Ne sais-tu pas qu’il y aura de l’amertume à la fin? Jusques à quand tarderas-tu à dire au peuple de ne plus poursuivre ses frères? '
  '27':
  - type: text
    content: 'Joab répondit: Dieu est vivant! Si tu n’eusses parlé, le peuple n’aurait pas cessé avant le matin de poursuivre ses frères. '
  '28':
  - type: text
    content: 'Et Joab sonna de la trompette, et tout le peuple s’arrêta; ils ne poursuivirent plus Israël, et ils ne continuèrent pas à se battre. '
  '29':
  - type: text
    content: 'Abner et ses gens marchèrent toute la nuit dans la plaine; ils passèrent le Jourdain, traversèrent en entier le Bithron, et arrivèrent à Mahanaïm. '
  '3':
  - type: text
    content: 'David fit aussi monter les gens qui étaient auprès de lui, chacun avec sa maison; et ils habitèrent dans les villes d’Hébron. '
  '30':
  - type: text
    content: 'Joab revint de la poursuite d’Abner, et rassembla tout le peuple; il manquait dix-neuf hommes des gens de David, et Asaël. '
  '31':
  - type: text
    content: 'Mais les gens de David avaient frappé à mort trois cent soixante hommes parmi ceux de Benjamin et d’Abner. '
  '32':
  - type: text
    content: Ils emportèrent Asaël, et l’enterrèrent dans le sépulcre de son père à Bethléhem. Joab et ses gens marchèrent toute la nuit, et le jour paraissait quand ils furent à Hébron.
  '4':
  - type: text
    content: 'Les hommes de Juda vinrent, et là ils oignirent David pour roi sur la maison de Juda. On informa David que c’étaient les gens de Jabès en Galaad qui avaient enterré Saül. '
  '5':
  - type: text
    content: 'David envoya des messagers aux gens de Jabès en Galaad, pour leur dire: Soyez bénis de l’Éternel, puisque vous avez ainsi montré de la bienveillance envers Saül, votre maître, et que vous l’avez enterré. '
  '6':
  - type: text
    content: 'Et maintenant, que l’Éternel use envers vous de bonté et de fidélité. Moi aussi je vous ferai du bien, parce que vous avez agi de la sorte. '
  '7':
  - type: text
    content: Que vos mains se fortifient, et soyez de vaillants hommes; car votre maître Saül est mort, et c’est moi que la maison de Juda a oint pour roi sur elle.
  - type: heading
    content: 'V. 8-11: cf. (1 S 13:13, 14; 15:28, 29.) Lu 19:14. Job 9:4. Ps 2:1-6.'
  '8':
  - type: text
    content: 'Cependant Abner, fils de Ner, chef de l’armée de Saül, prit Isch-Boscheth, fils de Saül, et le fit passer à Mahanaïm. '
  '9':
  - type: text
    content: 'Il l’établit roi sur Galaad, sur les Gueschuriens, sur Jizreel, sur Éphraïm, sur Benjamin, sur tout Israël. '
