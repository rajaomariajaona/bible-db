document_id: EXO.28,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Description des vêtements sacerdotaux
  - type: heading
    content: 'V. 1-5: cf. Lé 8:1-13. Ps 132:9, 16.'
  - type: text
    content: 'Fais approcher de toi Aaron, ton frère, et ses fils, et prends-les parmi les enfants d’Israël pour les consacrer à mon service dans le sacerdoce: '
  - type: note
    content: Hé 5:4.
  - type: text
    content: 'Aaron et les fils d’Aaron, Nadab, Abihu, Éléazar et Ithamar. '
  '10':
  - type: text
    content: 'six de leurs noms sur une pierre, et les six autres sur la seconde pierre, d’après l’ordre des naissances. '
  '11':
  - type: text
    content: 'Tu graveras sur les deux pierres les noms des fils d’Israël, comme on grave les pierres et les cachets; tu les entoureras de montures d’or. '
  '12':
  - type: text
    content: 'Tu mettras les deux pierres sur les épaulettes de l’éphod, en souvenir des fils d’Israël; et c’est comme souvenir qu’Aaron portera leurs noms devant l’Éternel sur ses deux épaules. '
  '13':
  - type: text
    content: 'Tu feras des montures d’or, '
  '14':
  - type: text
    content: et deux chaînettes d’or pur, que tu tresseras en forme de cordons; et tu fixeras aux montures les chaînettes ainsi tressées.
  - type: heading
    content: 'V. 15-30: cf. Ex 39:8-21. No 27:21.'
  '15':
  - type: text
    content: ' '
  - type: note
    content: Ex 39:8.
  - type: text
    content: 'Tu feras le pectoral du jugement, artistement travaillé; tu le feras du même travail que l’éphod, tu le feras d’or, de fil bleu, pourpre et cramoisi, et de fin lin retors. '
  '16':
  - type: text
    content: 'Il sera carré et double; sa longueur sera d’un empan, et sa largeur d’un empan. '
  '17':
  - type: text
    content: 'Tu y enchâsseras une garniture de pierres, quatre rangées de pierres: première rangée, une sardoine, une topaze, une émeraude; '
  '18':
  - type: text
    content: 'seconde rangée, une escarboucle, un saphir, un diamant; '
  '19':
  - type: text
    content: 'troisième rangée, une opale, une agate, une améthyste; '
  '2':
  - type: text
    content: 'Tu feras à Aaron, ton frère, des vêtements sacrés, pour marquer sa dignité et pour lui servir de parure. '
  '20':
  - type: text
    content: 'quatrième rangée, une chrysolithe, un onyx, un jaspe. Ces pierres seront enchâssées dans leurs montures d’or. '
  '21':
  - type: text
    content: 'Il y en aura douze, d’après les noms des fils d’Israël; elles seront gravées comme des cachets, chacune avec le nom de l’une des douze tribus. '
  '22':
  - type: text
    content: 'Tu feras sur le pectoral des chaînettes d’or pur, tressées en forme de cordons. '
  '23':
  - type: text
    content: 'Tu feras sur le pectoral deux anneaux d’or, et tu mettras ces deux anneaux aux deux extrémités du pectoral. '
  '24':
  - type: text
    content: 'Tu passeras les deux cordons d’or dans les deux anneaux aux deux extrémités du pectoral; '
  '25':
  - type: text
    content: 'et tu arrêteras par devant les bouts des deux cordons aux deux montures placées sur les épaulettes de l’éphod. '
  '26':
  - type: text
    content: 'Tu feras encore deux anneaux d’or, que tu mettras aux deux extrémités du pectoral, sur le bord intérieur appliqué contre l’éphod. '
  '27':
  - type: text
    content: 'Et tu feras deux autres anneaux d’or, que tu mettras au bas des deux épaulettes de l’éphod, sur le devant, près de la jointure, au-dessus de la ceinture de l’éphod. '
  '28':
  - type: text
    content: 'On attachera le pectoral par ses anneaux aux anneaux de l’éphod avec un cordon bleu, afin que le pectoral soit au-dessus de la ceinture de l’éphod et qu’il ne puisse pas se séparer de l’éphod. '
  '29':
  - type: text
    content: 'Lorsque Aaron entrera dans le sanctuaire, il portera sur son cœur les noms des fils d’Israël, gravés sur le pectoral du jugement, pour en conserver à toujours le souvenir devant l’Éternel. '
  '3':
  - type: text
    content: 'Tu parleras à tous ceux qui sont habiles, à qui j’ai donné un esprit plein d’intelligence; et ils feront les vêtements d’Aaron, afin qu’il soit consacré et qu’il exerce mon sacerdoce. '
  '30':
  - type: text
    content: Tu joindras au pectoral du jugement l’urim et le thummim, et ils seront sur le cœur d’Aaron, lorsqu’il se présentera devant l’Éternel. Ainsi, Aaron portera constamment sur son cœur le jugement des enfants d’Israël, lorsqu’il se présentera devant l’Éternel.
  - type: heading
    content: 'V. 31-35: cf. Ex 39:22-26. (Hé 13:15, 16.)'
  '31':
  - type: text
    content: 'Tu feras '
  - type: note
    content: Ex 39:22.
  - type: text
    content: 'la robe de l’éphod entièrement d’étoffe bleue. '
  '32':
  - type: text
    content: 'Il y aura, au milieu, une ouverture pour la tête; et cette ouverture aura tout autour un bord tissé, comme l’ouverture d’une cotte de mailles, afin que la robe ne se déchire pas. '
  '33':
  - type: text
    content: 'Tu mettras autour de la bordure, en bas, des grenades de couleur bleue, pourpre et cramoisi, entremêlées de clochettes d’or: '
  '34':
  - type: text
    content: 'une clochette d’or et une grenade, une clochette d’or et une grenade, sur tout le tour de la bordure de la robe. '
  '35':
  - type: text
    content: Aaron s’en revêtira pour faire le service; quand il entrera dans le sanctuaire devant l’Éternel, et quand il en sortira, on entendra le son des clochettes, et il ne mourra point.
  - type: heading
    content: 'V. 36-43: cf. Ex 39:27-31. Hé 7:26-28.'
  '36':
  - type: text
    content: 'Tu feras '
  - type: note
    content: Ex 39:30.
  - type: text
    content: 'une lame d’or pur, et tu y graveras, comme on grave un cachet: Sainteté à l’Éternel. '
  '37':
  - type: text
    content: 'Tu l’attacheras avec un cordon bleu sur la tiare, sur le devant de la tiare. '
  '38':
  - type: text
    content: 'Elle sera sur le front d’Aaron; et Aaron sera chargé des iniquités commises par les enfants d’Israël en faisant toutes leurs saintes offrandes; elle sera constamment sur son front devant l’Éternel, pour qu’il leur soit favorable. '
  '39':
  - type: text
    content: 'Tu feras '
  - type: note
    content: v. 4.
  - type: text
    content: 'la tunique de fin lin; tu feras une tiare de fin lin, et tu feras une ceinture brodée. '
  '4':
  - type: text
    content: 'Voici les vêtements qu’ils feront: un pectoral, un éphod, une robe, une tunique brodée, une tiare, et une ceinture. Ils feront des vêtements sacrés à Aaron, ton frère, et à ses fils, afin qu’ils exercent mon sacerdoce. '
  '40':
  - type: text
    content: 'Pour les fils d’Aaron tu feras des tuniques, tu leur feras des ceintures, et tu leur feras des bonnets, pour marquer leur dignité et pour leur servir de parure. '
  '41':
  - type: text
    content: 'Tu en revêtiras Aaron, ton frère, et ses fils avec lui. Tu les oindras, tu les consacreras, tu les sanctifieras, et ils seront à mon service dans le sacerdoce. '
  '42':
  - type: text
    content: 'Fais-leur des caleçons de lin, pour couvrir leur nudité; ils iront depuis les reins jusqu’aux cuisses. '
  '43':
  - type: text
    content: Aaron et ses fils les porteront, quand ils entreront dans la tente d’assignation, ou quand ils s’approcheront de l’autel, pour faire le service dans le sanctuaire; ainsi ils ne se rendront point coupables, et ne mourront point. C’est une loi perpétuelle pour Aaron et pour ses descendants après lui.
  '5':
  - type: text
    content: Ils emploieront de l’or, des étoffes teintes en bleu, en pourpre, en cramoisi, et de fin lin.
  - type: heading
    content: 'V. 6-14: cf. Ex 39:2-7.'
  '6':
  - type: text
    content: ' '
  - type: note
    content: Ex 39:2.
  - type: text
    content: 'Ils feront l’éphod d’or, de fil bleu, pourpre et cramoisi, et de fin lin retors; il sera artistement travaillé. '
  '7':
  - type: text
    content: 'On y fera deux épaulettes, qui le joindront par ses deux extrémités; et c’est ainsi qu’il sera joint. '
  '8':
  - type: text
    content: 'La ceinture sera du même travail que l’éphod et fixée sur lui; elle sera d’or, de fil bleu, pourpre et cramoisi, et de fin lin retors. '
  '9':
  - type: text
    content: 'Tu prendras deux pierres d’onyx, et tu y graveras les noms des fils d’Israël, '
