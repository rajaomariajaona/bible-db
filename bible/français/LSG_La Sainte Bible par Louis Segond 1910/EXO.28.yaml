document_id: EXO.28
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Description des vêtements sacerdotaux
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-5: cf. Lé 8:1-13. Ps 132:9, 16.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Fais approcher de toi Aaron, ton frère, et ses fils, et prends-les parmi les enfants d’Israël pour les consacrer à mon service dans le sacerdoce: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 5:4
      metadata:
        usfm: HEB.5.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Aaron et les fils d’Aaron, Nadab, Abihu, Éléazar et Ithamar. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Tu feras à Aaron, ton frère, des vêtements sacrés, pour marquer sa dignité et pour lui servir de parure. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tu parleras à tous ceux qui sont habiles, à qui j’ai donné un esprit plein d’intelligence; et ils feront les vêtements d’Aaron, afin qu’il soit consacré et qu’il exerce mon sacerdoce. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Voici les vêtements qu’ils feront: un pectoral, un éphod, une robe, une tunique brodée, une tiare, et une ceinture. Ils feront des vêtements sacrés à Aaron, ton frère, et à ses fils, afin qu’ils exercent mon sacerdoce. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ils emploieront de l’or, des étoffes teintes en bleu, en pourpre, en cramoisi, et de fin lin.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 6-14: cf. Ex 39:2-7.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 39:2
      metadata:
        usfm: EXO.39.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ils feront l’éphod d’or, de fil bleu, pourpre et cramoisi, et de fin lin retors; il sera artistement travaillé. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'On y fera deux épaulettes, qui le joindront par ses deux extrémités; et c’est ainsi qu’il sera joint. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'La ceinture sera du même travail que l’éphod et fixée sur lui; elle sera d’or, de fil bleu, pourpre et cramoisi, et de fin lin retors. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Tu prendras deux pierres d’onyx, et tu y graveras les noms des fils d’Israël, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'six de leurs noms sur une pierre, et les six autres sur la seconde pierre, d’après l’ordre des naissances. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tu graveras sur les deux pierres les noms des fils d’Israël, comme on grave les pierres et les cachets; tu les entoureras de montures d’or. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tu mettras les deux pierres sur les épaulettes de l’éphod, en souvenir des fils d’Israël; et c’est comme souvenir qu’Aaron portera leurs noms devant l’Éternel sur ses deux épaules. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tu feras des montures d’or, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: et deux chaînettes d’or pur, que tu tresseras en forme de cordons; et tu fixeras aux montures les chaînettes ainsi tressées.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 15-30: cf. Ex 39:8-21. No 27:21.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 39:8
      metadata:
        usfm: EXO.39.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu feras le pectoral du jugement, artistement travaillé; tu le feras du même travail que l’éphod, tu le feras d’or, de fil bleu, pourpre et cramoisi, et de fin lin retors. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il sera carré et double; sa longueur sera d’un empan, et sa largeur d’un empan. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Tu y enchâsseras une garniture de pierres, quatre rangées de pierres: première rangée, une sardoine, une topaze, une émeraude; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'seconde rangée, une escarboucle, un saphir, un diamant; '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'troisième rangée, une opale, une agate, une améthyste; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'quatrième rangée, une chrysolithe, un onyx, un jaspe. Ces pierres seront enchâssées dans leurs montures d’or. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Il y en aura douze, d’après les noms des fils d’Israël; elles seront gravées comme des cachets, chacune avec le nom de l’une des douze tribus. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Tu feras sur le pectoral des chaînettes d’or pur, tressées en forme de cordons. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Tu feras sur le pectoral deux anneaux d’or, et tu mettras ces deux anneaux aux deux extrémités du pectoral. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Tu passeras les deux cordons d’or dans les deux anneaux aux deux extrémités du pectoral; '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'et tu arrêteras par devant les bouts des deux cordons aux deux montures placées sur les épaulettes de l’éphod. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Tu feras encore deux anneaux d’or, que tu mettras aux deux extrémités du pectoral, sur le bord intérieur appliqué contre l’éphod. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Et tu feras deux autres anneaux d’or, que tu mettras au bas des deux épaulettes de l’éphod, sur le devant, près de la jointure, au-dessus de la ceinture de l’éphod. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'On attachera le pectoral par ses anneaux aux anneaux de l’éphod avec un cordon bleu, afin que le pectoral soit au-dessus de la ceinture de l’éphod et qu’il ne puisse pas se séparer de l’éphod. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Lorsque Aaron entrera dans le sanctuaire, il portera sur son cœur les noms des fils d’Israël, gravés sur le pectoral du jugement, pour en conserver à toujours le souvenir devant l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Tu joindras au pectoral du jugement l’urim et le thummim, et ils seront sur le cœur d’Aaron, lorsqu’il se présentera devant l’Éternel. Ainsi, Aaron portera constamment sur son cœur le jugement des enfants d’Israël, lorsqu’il se présentera devant l’Éternel.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 31-35: cf. Ex 39:22-26. (Hé 13:15, 16.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Tu feras '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 39:22
      metadata:
        usfm: EXO.39.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'la robe de l’éphod entièrement d’étoffe bleue. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Il y aura, au milieu, une ouverture pour la tête; et cette ouverture aura tout autour un bord tissé, comme l’ouverture d’une cotte de mailles, afin que la robe ne se déchire pas. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Tu mettras autour de la bordure, en bas, des grenades de couleur bleue, pourpre et cramoisi, entremêlées de clochettes d’or: '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'une clochette d’or et une grenade, une clochette d’or et une grenade, sur tout le tour de la bordure de la robe. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Aaron s’en revêtira pour faire le service; quand il entrera dans le sanctuaire devant l’Éternel, et quand il en sortira, on entendra le son des clochettes, et il ne mourra point.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 36-43: cf. Ex 39:27-31. Hé 7:26-28.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Tu feras '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 39:30
      metadata:
        usfm: EXO.39.30
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'une lame d’or pur, et tu y graveras, comme on grave un cachet: Sainteté à l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Tu l’attacheras avec un cordon bleu sur la tiare, sur le devant de la tiare. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Elle sera sur le front d’Aaron; et Aaron sera chargé des iniquités commises par les enfants d’Israël en faisant toutes leurs saintes offrandes; elle sera constamment sur son front devant l’Éternel, pour qu’il leur soit favorable. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Tu feras '
  - type: usfm
    marker: x
    children:
    - type: text
      text: v. 4.
    marker-yv: yv-n
  - type: text
    text: 'la tunique de fin lin; tu feras une tiare de fin lin, et tu feras une ceinture brodée. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Pour les fils d’Aaron tu feras des tuniques, tu leur feras des ceintures, et tu leur feras des bonnets, pour marquer leur dignité et pour leur servir de parure. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Tu en revêtiras Aaron, ton frère, et ses fils avec lui. Tu les oindras, tu les consacreras, tu les sanctifieras, et ils seront à mon service dans le sacerdoce. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Fais-leur des caleçons de lin, pour couvrir leur nudité; ils iront depuis les reins jusqu’aux cuisses. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Aaron et ses fils les porteront, quand ils entreront dans la tente d’assignation, ou quand ils s’approcheront de l’autel, pour faire le service dans le sanctuaire; ainsi ils ne se rendront point coupables, et ne mourront point. C’est une loi perpétuelle pour Aaron et pour ses descendants après lui.
