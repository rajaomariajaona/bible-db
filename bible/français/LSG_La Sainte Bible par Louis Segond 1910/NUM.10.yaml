document_id: NUM.10
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les deux trompettes d’argent
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-10: cf. Ps 81:4-6. (Joë 2:1, 15. 2 Ch 13:12-16; 29:26-28.) Ps 89:16.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Éternel parla à Moïse, et dit: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fais-toi deux trompettes d’argent; tu les feras d’argent battu. Elles te serviront pour la convocation de l’assemblée et pour le départ des camps. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Quand on en sonnera, toute l’assemblée se réunira auprès de toi, à l’entrée de la tente d’assignation. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Si l’on ne sonne que d’une trompette, les princes, les chefs des milliers d’Israël, se réuniront auprès de toi. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Quand vous sonnerez avec éclat, ceux qui campent à l’orient partiront; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'quand vous sonnerez avec éclat pour la seconde fois, ceux qui campent au midi partiront: on sonnera avec éclat pour leur départ. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Vous sonnerez aussi pour convoquer l’assemblée, mais vous ne sonnerez pas avec éclat. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Les fils d’Aaron, les sacrificateurs, sonneront des trompettes. Ce sera une loi perpétuelle pour vous et pour vos descendants. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Lorsque, dans votre pays, vous irez à la guerre contre l’ennemi qui vous combattra, vous sonnerez des trompettes avec éclat, et vous serez présents au souvenir de l’Éternel, votre Dieu, et vous serez délivrés de vos ennemis. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Dans vos jours de joie, dans vos fêtes, et à vos nouvelles lunes, vous sonnerez des trompettes, en offrant vos holocaustes et vos sacrifices d’actions de grâces, et elles vous mettront en souvenir devant votre Dieu. Je suis l’Éternel, votre Dieu.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Départ du Sinaï
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 11-28: cf. (No 9:17-23; 2:1, etc.) De 1:6-8. (1 Co 14:40.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Le vingtième jour du second mois de la seconde année, la nuée s’éleva de dessus le tabernacle du témoignage. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Et les enfants d’Israël partirent du désert de Sinaï, selon l’ordre fixé pour leur marche. La nuée s’arrêta dans le désert de Paran. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ils firent ce premier départ sur l’ordre de l’Éternel par Moïse. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'La bannière du camp des fils de Juda partit la première, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 2:3
      metadata:
        usfm: NUM.2.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'avec ses corps d’armée. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 1:7
      metadata:
        usfm: NUM.1.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Le corps d’armée de Juda était commandé par Nachschon, fils d’Amminadab; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'le corps d’armée de la tribu des fils d’Issacar, par Nethaneel, fils de Tsuar; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'le corps d’armée de la tribu des fils de Zabulon, par Éliab, fils de Hélon. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Le tabernacle fut démonté; et les fils de Guerschon et les fils de Merari partirent, portant le tabernacle. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'La bannière du camp de Ruben partit, avec ses corps d’armée. Le corps d’armée de Ruben était commandé par Élitsur, fils de Schedéur; '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'le corps d’armée de la tribu des fils de Siméon, par Schelumiel, fils de Tsurischaddaï; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'le corps d’armée de la tribu des fils de Gad, par Éliasaph, fils de Déuel. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Les Kehathites partirent, portant '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 4:4
      metadata:
        usfm: NUM.4.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'le sanctuaire; et l’on dressait le tabernacle en attendant leur arrivée. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'La bannière du camp des fils d’Éphraïm partit, avec ses corps d’armée. Le corps d’armée d’Éphraïm était commandé par Élischama, fils d’Ammihud; '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'le corps d’armée de la tribu des fils de Manassé, par Gamliel, fils de Pedahtsur; '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'le corps d’armée de la tribu des fils de Benjamin, par Abidan, fils de Guideoni. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'La bannière du camp des fils de Dan partit, avec ses corps d’armée: elle formait l’arrière-garde de tous les camps. Le corps d’armée de Dan était commandé par Ahiézer, fils d’Ammischaddaï; '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'le corps d’armée de la tribu des fils d’Aser, par Paguiel, fils d’Ocran; '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'le corps d’armée de la tribu des fils de Nephthali, par Ahira, fils d’Énan. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Tel fut l’ordre d’après lequel les enfants d’Israël se mirent en marche selon leurs corps d’armée; et c’est ainsi qu’ils partirent.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 29-36: cf. (Ex 18. Jg 1:16.) (Ex 40:36-38.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Moïse dit à Hobab, fils de Réuel, le Madianite, beau-père de Moïse: Nous partons pour le lieu dont l’Éternel a dit: Je vous le donnerai. Viens avec nous, et nous te ferons du bien, car l’Éternel a promis de faire du bien à Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Hobab lui répondit: Je n’irai point; mais j’irai dans mon pays et dans ma patrie. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Et Moïse dit: Ne nous quitte pas, je te prie; puisque tu connais les lieux où nous campons dans le désert, tu nous serviras de guide. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Et si tu viens avec nous, nous te ferons jouir du bien que l’Éternel nous fera. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ils partirent de la montagne de l’Éternel, et marchèrent trois jours; l’arche de l’alliance de l’Éternel partit devant eux, et fit une marche de trois jours, pour leur chercher un lieu de repos. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'La nuée de l’Éternel était au-dessus d’eux pendant le jour, lorsqu’ils partaient du camp. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Quand l’arche partait, Moïse disait: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 68:2
      metadata:
        usfm: PSA.68.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Lève-toi, Éternel! Et que tes ennemis soient dispersés! Que ceux qui te haïssent fuient devant ta face! '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Et quand on la posait, il disait: Reviens, Éternel, aux myriades des milliers d’Israël!'
