document_id: NUM.10,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Les deux trompettes d’argent
  - type: heading
    content: 'V. 1-10: cf. Ps 81:4-6. (Joë 2:1, 15. 2 Ch 13:12-16; 29:26-28.) Ps 89:16.'
  - type: text
    content: 'L’Éternel parla à Moïse, et dit: '
  '10':
  - type: text
    content: Dans vos jours de joie, dans vos fêtes, et à vos nouvelles lunes, vous sonnerez des trompettes, en offrant vos holocaustes et vos sacrifices d’actions de grâces, et elles vous mettront en souvenir devant votre Dieu. Je suis l’Éternel, votre Dieu.
  - type: heading
    content: Départ du Sinaï
  - type: heading
    content: 'V. 11-28: cf. (No 9:17-23; 2:1, etc.) De 1:6-8. (1 Co 14:40.)'
  '11':
  - type: text
    content: 'Le vingtième jour du second mois de la seconde année, la nuée s’éleva de dessus le tabernacle du témoignage. '
  '12':
  - type: text
    content: 'Et les enfants d’Israël partirent du désert de Sinaï, selon l’ordre fixé pour leur marche. La nuée s’arrêta dans le désert de Paran. '
  '13':
  - type: text
    content: 'Ils firent ce premier départ sur l’ordre de l’Éternel par Moïse. '
  '14':
  - type: text
    content: 'La bannière du camp des fils de Juda partit la première, '
  - type: note
    content: No 2:3.
  - type: text
    content: 'avec ses corps d’armée. '
  - type: note
    content: No 1:7.
  - type: text
    content: 'Le corps d’armée de Juda était commandé par Nachschon, fils d’Amminadab; '
  '15':
  - type: text
    content: 'le corps d’armée de la tribu des fils d’Issacar, par Nethaneel, fils de Tsuar; '
  '16':
  - type: text
    content: 'le corps d’armée de la tribu des fils de Zabulon, par Éliab, fils de Hélon. '
  '17':
  - type: text
    content: 'Le tabernacle fut démonté; et les fils de Guerschon et les fils de Merari partirent, portant le tabernacle. '
  '18':
  - type: text
    content: 'La bannière du camp de Ruben partit, avec ses corps d’armée. Le corps d’armée de Ruben était commandé par Élitsur, fils de Schedéur; '
  '19':
  - type: text
    content: 'le corps d’armée de la tribu des fils de Siméon, par Schelumiel, fils de Tsurischaddaï; '
  '2':
  - type: text
    content: 'Fais-toi deux trompettes d’argent; tu les feras d’argent battu. Elles te serviront pour la convocation de l’assemblée et pour le départ des camps. '
  '20':
  - type: text
    content: 'le corps d’armée de la tribu des fils de Gad, par Éliasaph, fils de Déuel. '
  '21':
  - type: text
    content: 'Les Kehathites partirent, portant '
  - type: note
    content: No 4:4.
  - type: text
    content: 'le sanctuaire; et l’on dressait le tabernacle en attendant leur arrivée. '
  '22':
  - type: text
    content: 'La bannière du camp des fils d’Éphraïm partit, avec ses corps d’armée. Le corps d’armée d’Éphraïm était commandé par Élischama, fils d’Ammihud; '
  '23':
  - type: text
    content: 'le corps d’armée de la tribu des fils de Manassé, par Gamliel, fils de Pedahtsur; '
  '24':
  - type: text
    content: 'le corps d’armée de la tribu des fils de Benjamin, par Abidan, fils de Guideoni. '
  '25':
  - type: text
    content: 'La bannière du camp des fils de Dan partit, avec ses corps d’armée: elle formait l’arrière-garde de tous les camps. Le corps d’armée de Dan était commandé par Ahiézer, fils d’Ammischaddaï; '
  '26':
  - type: text
    content: 'le corps d’armée de la tribu des fils d’Aser, par Paguiel, fils d’Ocran; '
  '27':
  - type: text
    content: 'le corps d’armée de la tribu des fils de Nephthali, par Ahira, fils d’Énan. '
  '28':
  - type: text
    content: Tel fut l’ordre d’après lequel les enfants d’Israël se mirent en marche selon leurs corps d’armée; et c’est ainsi qu’ils partirent.
  - type: heading
    content: 'V. 29-36: cf. (Ex 18. Jg 1:16.) (Ex 40:36-38.)'
  '29':
  - type: text
    content: 'Moïse dit à Hobab, fils de Réuel, le Madianite, beau-père de Moïse: Nous partons pour le lieu dont l’Éternel a dit: Je vous le donnerai. Viens avec nous, et nous te ferons du bien, car l’Éternel a promis de faire du bien à Israël. '
  '3':
  - type: text
    content: 'Quand on en sonnera, toute l’assemblée se réunira auprès de toi, à l’entrée de la tente d’assignation. '
  '30':
  - type: text
    content: 'Hobab lui répondit: Je n’irai point; mais j’irai dans mon pays et dans ma patrie. '
  '31':
  - type: text
    content: 'Et Moïse dit: Ne nous quitte pas, je te prie; puisque tu connais les lieux où nous campons dans le désert, tu nous serviras de guide. '
  '32':
  - type: text
    content: 'Et si tu viens avec nous, nous te ferons jouir du bien que l’Éternel nous fera. '
  '33':
  - type: text
    content: 'Ils partirent de la montagne de l’Éternel, et marchèrent trois jours; l’arche de l’alliance de l’Éternel partit devant eux, et fit une marche de trois jours, pour leur chercher un lieu de repos. '
  '34':
  - type: text
    content: 'La nuée de l’Éternel était au-dessus d’eux pendant le jour, lorsqu’ils partaient du camp. '
  '35':
  - type: text
    content: 'Quand l’arche partait, Moïse disait: '
  - type: note
    content: Ps 68:2.
  - type: text
    content: 'Lève-toi, Éternel! Et que tes ennemis soient dispersés! Que ceux qui te haïssent fuient devant ta face! '
  '36':
  - type: text
    content: 'Et quand on la posait, il disait: Reviens, Éternel, aux myriades des milliers d’Israël!'
  '4':
  - type: text
    content: 'Si l’on ne sonne que d’une trompette, les princes, les chefs des milliers d’Israël, se réuniront auprès de toi. '
  '5':
  - type: text
    content: 'Quand vous sonnerez avec éclat, ceux qui campent à l’orient partiront; '
  '6':
  - type: text
    content: 'quand vous sonnerez avec éclat pour la seconde fois, ceux qui campent au midi partiront: on sonnera avec éclat pour leur départ. '
  '7':
  - type: text
    content: 'Vous sonnerez aussi pour convoquer l’assemblée, mais vous ne sonnerez pas avec éclat. '
  '8':
  - type: text
    content: 'Les fils d’Aaron, les sacrificateurs, sonneront des trompettes. Ce sera une loi perpétuelle pour vous et pour vos descendants. '
  '9':
  - type: text
    content: 'Lorsque, dans votre pays, vous irez à la guerre contre l’ennemi qui vous combattra, vous sonnerez des trompettes avec éclat, et vous serez présents au souvenir de l’Éternel, votre Dieu, et vous serez délivrés de vos ennemis. '
