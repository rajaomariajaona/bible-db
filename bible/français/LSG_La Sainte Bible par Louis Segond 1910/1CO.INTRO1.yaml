    - type: text
      text: INTRODUCTION À LA PREMIÈRE ÉPÎTRE AUX CORINTHIENS
  - type: usfm
    marker: imt3
    children:
    - type: text
      text: (Ac 18:1-18; 20:3.) (1 Ti 3:14-16.)
  - type: usfm
    marker: ip
    children:
    - type: text
      text: La ville de Corinthe est située sur l’isthme qui porte le même nom, entre la Grèce continentale et le Péloponnèse. Au milieu du premier siècle, cette ville était cosmopolite avec des activités économiques et commerciales très développées.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: C’est à cette époque que l’apôtre Paul y fonda l’Église, au cours de son deuxième voyage missionnaire. Selon Act 18:1-18, il y aurait séjourné pendant environ un an et demi.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: La communauté chrétienne que Paul créa à Corinthe était composée en majorité de païens de conditions sociales assez modestes. Mais ce n’est pas de ce sujet qu’il traite. Paul adressa plusieurs épîtres à l’Église de Corinthe. Le Nouveau Testament ne nous en présente que deux, mais tout porte à croire qu’il y en a eu plus. Une lecture attentive de celles qui sont disponibles montre que Paul avait écrit plus de deux lettres. Il est donc probable que certaines soient perdues, ou se retrouvent fusionnées avec les deux existantes.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Dans la première épître qui nous concerne ici, Paul traite de questions diverses. On en distingue de trois sources:'
  - type: usfm
    marker: io1
    children:
    - type: text
      text: '1. Questions relevant des informations reçues des gens de Chloé '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 1:10–6:20
  - type: usfm
    marker: io2
    children:
    - type: text
      text: '- Appel à l’union contre les divisions dans l’Église '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 1:10–4:21
  - type: usfm
    marker: io2
    children:
    - type: text
      text: '- État moral de l’Église et censure des désordres '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 5:1–6:20
  - type: usfm
    marker: io1
    children:
    - type: text
      text: '2. Questions relevant des informations reçues par écrit '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 7:1–11:1
  - type: usfm
    marker: io2
    children:
    - type: text
      text: '- Sur le mariage '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 7:1-40
  - type: usfm
    marker: io2
    children:
    - type: text
      text: '- Sur les viandes sacrifiées aux idoles '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 8:1–11:1
  - type: usfm
    marker: io1
    children:
    - type: text
      text: '3. Questions relevant enfin de lui personnellement: Paul profite de sa réponse aux Corinthiens pour aborder d’autres problèmes de vie chrétienne.'
  - type: usfm
    marker: io2
    children:
    - type: text
      text: '- La tenue des femmes dans les assemblées religieuses '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 11:2-16
  - type: usfm
    marker: io2
    children:
    - type: text
      text: '- La célébration du repas du Seigneur '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 11:17-34
  - type: usfm
    marker: io2
    children:
    - type: text
      text: '- Les dons spirituels '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 12:1-31
  - type: usfm
    marker: io2
    children:
    - type: text
      text: '- La charité '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 13:1-13
  - type: usfm
    marker: io2
    children:
    - type: text
      text: '- Don des langues et don de prophétie '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 14:1-40
  - type: usfm
    marker: io2
    children:
    - type: text
      text: '- La résurrection '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 15:1-58
  - type: usfm
    marker: io2
    children:
    - type: text
      text: '- Collecte pour les chrétiens de Jérusalem, projet de voyage et informations diverses '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 16:1-12
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Le caractère épistolaire de l’écrit ressort au début par les adresses et les salutations (1:1-9); et à la fin par des exhortations (16:13-24).
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 1 Corinthiens n’a pas un message précis. Cette épître répond plutôt à plusieurs problèmes de communauté, en particulier les divisions provoquées par les coteries résultant des préférences portées sur tel ou tel prédicateur (Paul, Apollos, Céphas, etc.). Paul souligne que tous les prédicateurs sont des serviteurs du Christ, à qui seul revient la gloire. C’est dans cette même perspective qu’il apporte des réponses aux diverses questions qui se posaient dans l’Église de Corinthe (voir ci-dessus).
  - type: usfm
    marker: ip
    children:
    - type: text
      text: '1 Corinthiens rapporte sous une forme catéchétique la substance de la Bonne Nouvelle que Paul confirme avoir reçue et qu’il transmet en 15:1-4. Le condensé de cette Bonne Nouvelle, le voici: '
    - type: usfm
      marker: it
      children:
      - type: text
        text: «Christ est mort pour nos péchés… Il a été enseveli… Il est ressuscité… Il est apparu à Céphas… aux douze… à plus de cinq cents frères… ensuite à Jacques… à tous les apôtres. Après eux tous, il m’est aussi apparu à moi…»
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Sachant que Paul aurait écrit cette épître à Éphèse (16:8) entre 56 et 57, c’est-à-dire avant la rédaction des évangiles, on peut conclure que son Évangile est de la source orale, à savoir la tradition des premiers chrétiens relative à la personne et l’œuvre de Jésus-Christ, qu’ils se transmettaient de bouche à oreille, de communauté en communauté, de génération en génération.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: La mort et la résurrection de Jésus-Christ constituaient donc le cœur de la Bonne Nouvelle et partant, le centre de la foi chrétienne. C’est autour de ces événements que les premiers chrétiens vont bâtir les affirmations fondamentales de la proclamation évangélique à partir desquelles ils combattaient les erreurs et les hérésies de ceux qui niaient la résurrection des morts. C’est tout à fait ce que Paul fait dans cette épître (voir chapitre 15).
