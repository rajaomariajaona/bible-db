type_code: fra
verses:
  '1':
  - type: text
    content: INTRODUCTION À LA PREMIÈRE ÉPÎTRE AUX CORINTHIENS
  - type: text
    content: (Ac 18:1-18; 20:3.) (1 Ti 3:14-16.)
  - type: text
    content: La ville de Corinthe est située sur l’isthme qui porte le même nom, entre la Grèce continentale et le Péloponnèse. Au milieu du premier siècle, cette ville était cosmopolite avec des activités économiques et commerciales très développées.
  - type: text
    content: C’est à cette époque que l’apôtre Paul y fonda l’Église, au cours de son deuxième voyage missionnaire. Selon Act 18:1-18, il y aurait séjourné pendant environ un an et demi.
  - type: text
    content: La communauté chrétienne que Paul créa à Corinthe était composée en majorité de païens de conditions sociales assez modestes. Mais ce n’est pas de ce sujet qu’il traite. Paul adressa plusieurs épîtres à l’Église de Corinthe. Le Nouveau Testament ne nous en présente que deux, mais tout porte à croire qu’il y en a eu plus. Une lecture attentive de celles qui sont disponibles montre que Paul avait écrit plus de deux lettres. Il est donc probable que certaines soient perdues, ou se retrouvent fusionnées avec les deux existantes.
  - type: text
    content: 'Dans la première épître qui nous concerne ici, Paul traite de questions diverses. On en distingue de trois sources:'
  - type: text
    content: '1. Questions relevant des informations reçues des gens de Chloé '
  - type: text
    content: 1:10–6:20
  - type: text
    content: '- Appel à l’union contre les divisions dans l’Église '
  - type: text
    content: 1:10–4:21
  - type: text
    content: '- État moral de l’Église et censure des désordres '
  - type: text
    content: 5:1–6:20
  - type: text
    content: '2. Questions relevant des informations reçues par écrit '
  - type: text
    content: 7:1–11:1
  - type: text
    content: '- Sur le mariage '
  - type: text
    content: 7:1-40
  - type: text
    content: '- Sur les viandes sacrifiées aux idoles '
  - type: text
    content: 8:1–11:1
  - type: text
    content: '3. Questions relevant enfin de lui personnellement: Paul profite de sa réponse aux Corinthiens pour aborder d’autres problèmes de vie chrétienne.'
  - type: text
    content: '- La tenue des femmes dans les assemblées religieuses '
  - type: text
    content: 11:2-16
  - type: text
    content: '- La célébration du repas du Seigneur '
  - type: text
    content: 11:17-34
  - type: text
    content: '- Les dons spirituels '
  - type: text
    content: 12:1-31
  - type: text
    content: '- La charité '
  - type: text
    content: 13:1-13
  - type: text
    content: '- Don des langues et don de prophétie '
  - type: text
    content: 14:1-40
  - type: text
    content: '- La résurrection '
  - type: text
    content: 15:1-58
  - type: text
    content: '- Collecte pour les chrétiens de Jérusalem, projet de voyage et informations diverses '
  - type: text
    content: 16:1-12
  - type: text
    content: Le caractère épistolaire de l’écrit ressort au début par les adresses et les salutations (1:1-9); et à la fin par des exhortations (16:13-24).
  - type: text
    content: 1 Corinthiens n’a pas un message précis. Cette épître répond plutôt à plusieurs problèmes de communauté, en particulier les divisions provoquées par les coteries résultant des préférences portées sur tel ou tel prédicateur (Paul, Apollos, Céphas, etc.). Paul souligne que tous les prédicateurs sont des serviteurs du Christ, à qui seul revient la gloire. C’est dans cette même perspective qu’il apporte des réponses aux diverses questions qui se posaient dans l’Église de Corinthe (voir ci-dessus).
  - type: text
    content: '1 Corinthiens rapporte sous une forme catéchétique la substance de la Bonne Nouvelle que Paul confirme avoir reçue et qu’il transmet en 15:1-4. Le condensé de cette Bonne Nouvelle, le voici: '
  - type: text
    content: «Christ est mort pour nos péchés… Il a été enseveli… Il est ressuscité… Il est apparu à Céphas… aux douze… à plus de cinq cents frères… ensuite à Jacques… à tous les apôtres. Après eux tous, il m’est aussi apparu à moi…»
  - type: text
    content: Sachant que Paul aurait écrit cette épître à Éphèse (16:8) entre 56 et 57, c’est-à-dire avant la rédaction des évangiles, on peut conclure que son Évangile est de la source orale, à savoir la tradition des premiers chrétiens relative à la personne et l’œuvre de Jésus-Christ, qu’ils se transmettaient de bouche à oreille, de communauté en communauté, de génération en génération.
  - type: text
    content: La mort et la résurrection de Jésus-Christ constituaient donc le cœur de la Bonne Nouvelle et partant, le centre de la foi chrétienne. C’est autour de ces événements que les premiers chrétiens vont bâtir les affirmations fondamentales de la proclamation évangélique à partir desquelles ils combattaient les erreurs et les hérésies de ceux qui niaient la résurrection des morts. C’est tout à fait ce que Paul fait dans cette épître (voir chapitre 15).
