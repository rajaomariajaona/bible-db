document_id: LEV.20,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Peines contre divers crimes
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-27: cf. De 17:2-7. (Lé 18. De 27:16, 20-23.) 2 Co 6:15 à 7:1.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Éternel parla à Moïse, et dit: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 18:20
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 22:22
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 8:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Si un homme commet un adultère avec une femme mariée, s’il commet un adultère avec la femme de son prochain, l’homme et la femme adultères seront punis de mort. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 18:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Si un homme couche avec la femme de son père, et découvre ainsi la nudité de son père, cet homme et cette femme seront punis de mort: leur sang retombera sur eux. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 18:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Si un homme couche avec sa belle-fille, ils seront tous deux punis de mort; ils ont fait une confusion: leur sang retombera sur eux. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 18:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Si un homme couche avec un homme comme on couche avec une femme, ils ont fait tous deux une chose abominable; ils seront punis de mort: leur sang retombera sur eux. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 18:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Si un homme prend pour femmes la fille et la mère, c’est un crime: on les brûlera au feu, lui et elles, afin que ce crime n’existe pas au milieu de vous. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 18:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Si un homme couche avec une bête, il sera puni de mort; et vous tuerez la bête. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si une femme s’approche d’une bête, pour se prostituer à elle, tu tueras la femme et la bête; elles seront mises à mort: leur sang retombera sur elles. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 18:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Si un homme prend sa sœur, fille de son père ou fille de sa mère, s’il voit sa nudité et qu’elle voie la sienne, c’est une infamie; ils seront retranchés sous les yeux des enfants de leur peuple: il a découvert la nudité de sa sœur, il portera la peine de son péché. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 18:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Si un homme couche avec une femme qui a son indisposition, et découvre sa nudité, s’il découvre son flux, et qu’elle découvre le flux de son sang, ils seront tous deux retranchés du milieu de leur peuple. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 18:12
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '13'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Tu ne découvriras point la nudité de la sœur de ta mère, ni de la sœur de ton père, car c’est découvrir sa proche parente: ils porteront la peine de leur péché. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu diras aux enfants d’Israël: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 18:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Si un homme des enfants d’Israël ou des étrangers qui séjournent en Israël livre à Moloc l’un de ses enfants, il sera puni de mort: le peuple du pays le lapidera. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 18:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Si un homme couche avec sa tante, il a découvert la nudité de son oncle; ils porteront la peine de leur péché, ils mourront sans enfant. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 18:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Si un homme prend la femme de son frère, c’est une impureté; il a découvert la nudité de son frère: ils seront sans enfant. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 18:26
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Vous observerez toutes mes lois et toutes mes ordonnances, et vous les mettrez en pratique, afin que le pays où je vous mène pour vous y établir ne vous vomisse point. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 18:3
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '30'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Vous ne suivrez point les usages des nations que je vais chasser devant vous; car elles ont fait toutes ces choses, et je les ai en abomination. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je vous ai dit: C’est vous qui posséderez leur pays; je vous en donnerai la possession: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 3:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'c’est un pays où coulent le lait et le miel. Je suis l’Éternel, votre Dieu, qui vous ai séparés des peuples. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 11:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 14:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Vous observerez la distinction entre les animaux purs et impurs, entre les oiseaux purs et impurs, afin de ne pas rendre vos personnes abominables par des animaux, par des oiseaux, par tous les reptiles de la terre, que je vous ai appris à distinguer comme impurs. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous serez saints pour moi, car je suis saint, moi, l’Éternel; je vous ai séparés des peuples, afin que vous soyez à moi. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 18:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 28:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Si un homme ou une femme ont en eux l’esprit d’un mort ou un esprit de divination, ils seront punis de mort; on les lapidera: leur sang retombera sur eux.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et moi, je tournerai ma face contre cet homme, et je le retrancherai du milieu de son peuple, parce qu’il a livré de ses enfants à Moloc, souillé mon sanctuaire et profané mon saint nom. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si le peuple du pays détourne ses regards de cet homme, qui livre de ses enfants à Moloc, et s’il ne le fait pas mourir, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'je tournerai, moi, ma face contre cet homme et contre sa famille, et je le retrancherai du milieu de son peuple, avec tous ceux qui se prostituent comme lui en se prostituant à Moloc. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si quelqu’un s’adresse '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 19:31
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'aux morts et aux esprits, pour se prostituer après eux, je tournerai ma face contre cet homme, je le retrancherai du milieu de son peuple. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 11:44
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 19:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 1:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Vous vous sanctifierez et vous serez saints, car je suis l’Éternel, votre Dieu. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous observerez mes lois, et vous les mettrez en pratique. Je suis l’Éternel, qui vous sanctifie. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 21:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 20:20
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 15:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Si un homme quelconque maudit son père ou sa mère, il sera puni de mort; il a maudit son père ou sa mère: son sang retombera sur lui. '
