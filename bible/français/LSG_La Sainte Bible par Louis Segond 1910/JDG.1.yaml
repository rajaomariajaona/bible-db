document_id: JDG.1
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nouvelles conquêtes par les tribus
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-7: cf. Ge 49:8, 9. (Lé 24:19-21. Ja 2:13.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Après la mort de Josué, les enfants d’Israël consultèrent l’Éternel, en disant: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jg 20:18
      metadata:
        usfm: JDG.20.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Qui de nous montera le premier contre les Cananéens, pour les attaquer? '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'L’Éternel répondit: Juda montera, voici, j’ai livré le pays entre ses mains. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Et Juda dit à Siméon, son frère: Monte avec moi dans le pays qui m’est échu par le sort, et nous combattrons les Cananéens; j’irai aussi avec toi dans celui qui t’est tombé en partage. Et Siméon alla avec lui. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Juda monta, et l’Éternel livra entre leurs mains les Cananéens et les Phéréziens; ils battirent dix mille hommes à Bézek. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ils trouvèrent Adoni-Bézek à Bézek; ils l’attaquèrent, et ils battirent les Cananéens et les Phéréziens. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Adoni-Bézek prit la fuite; mais ils le poursuivirent et le saisirent, et ils lui coupèrent les pouces des mains et des pieds. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Adoni-Bézek dit: Soixante-dix rois, ayant les pouces des mains et des pieds coupés, ramassaient sous ma table; Dieu me rend ce que j’ai fait. On l’emmena à Jérusalem, et il y mourut.'
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 8-20: cf. (Jos 14:13-15; 15:13-19.) Jg 3:9-11.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Les fils de Juda attaquèrent Jérusalem et la prirent, ils la frappèrent du tranchant de l’épée et mirent le feu à la ville. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 10:36
      metadata:
        usfm: JOS.10.36
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 11:21
      metadata:
        usfm: JOS.11.21
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 15:13
      metadata:
        usfm: JOS.15.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Les fils de Juda descendirent ensuite, pour combattre les Cananéens qui habitaient la montagne, la contrée du midi et la plaine. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 15:14
      metadata:
        usfm: JOS.15.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Juda marcha contre les Cananéens qui habitaient à Hébron, appelée autrefois Kirjath-Arba; et il battit Schéschaï, Ahiman et Talmaï. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'De là il marcha contre les habitants de '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jos 15:15, etc.
    marker-yv: yv-n
  - type: text
    text: 'Debir: Debir s’appelait autrefois Kirjath-Sépher. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Caleb dit: Je donnerai ma fille Acsa pour femme à celui qui battra Kirjath-Sépher et qui la prendra. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Othniel, fils de Kenaz, frère cadet de Caleb, s’en empara; et Caleb lui donna pour femme sa fille Acsa. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Lorsqu’elle fut entrée chez Othniel, elle le sollicita de demander à son père un champ. Elle descendit de dessus son âne; et Caleb lui dit: Qu’as-tu? '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Elle lui répondit: Fais-moi un présent, car tu m’as donné une terre du midi; donne-moi aussi des sources d’eau. Et Caleb lui donna les sources supérieures et les sources inférieures. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Les fils du Kénien, beau-père de Moïse, montèrent de la ville des palmiers, avec les fils de Juda, dans le désert de Juda au midi d’Arad, et ils allèrent s’établir parmi le peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Juda se mit en marche avec Siméon, son frère, et ils battirent les Cananéens qui habitaient à Tsephath; ils dévouèrent la ville par interdit, et on l’appela Horma. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Juda s’empara encore de Gaza et de son territoire, d’Askalon et de son territoire, et d’Ékron et de son territoire. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'L’Éternel fut avec Juda; et Juda se rendit maître de la montagne, mais il ne put chasser les habitants de la plaine, parce qu’ils avaient des chars de fer. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'On donna Hébron à Caleb, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 14:24
      metadata:
        usfm: NUM.14.24
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 14:13
      metadata:
        usfm: JOS.14.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: comme l’avait dit Moïse; et il en chassa les trois fils d’Anak.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Cananéens épargnés
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 21-36: cf. (Jos 17:11-18. Jg 2:20-23; 3:1-6.) 2 Ch 8:7, 8.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Les fils de Benjamin ne chassèrent point les Jébusiens qui habitaient à Jérusalem; et les Jébusiens ont habité jusqu’à ce jour dans Jérusalem avec les fils de Benjamin. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'La maison de Joseph monta aussi contre Béthel, et l’Éternel fut avec eux. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'La maison de Joseph fit explorer Béthel, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 28:19
      metadata:
        usfm: GEN.28.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qui s’appelait autrefois Luz. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Les gardes virent un homme qui sortait de la ville, et ils lui dirent: Montre-nous par où nous pourrons entrer dans la ville, et nous te ferons grâce. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Il leur montra par où ils pourraient entrer dans la ville. Et ils frappèrent la ville du tranchant de l’épée; mais ils laissèrent aller cet homme et toute sa famille. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Cet homme se rendit dans le pays des Héthiens; il bâtit une ville, et lui donna le nom de Luz, nom qu’elle a porté jusqu’à ce jour. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 17:11
      metadata:
        usfm: JOS.17.11
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '12'
      metadata:
        usfm: JOS.17.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Manassé ne chassa point les habitants de Beth-Schean et des villes de son ressort, de Thaanac et des villes de son ressort, de Dor et des villes de son ressort, de Jibleam et des villes de son ressort, de Meguiddo et des villes de son ressort; et les Cananéens voulurent rester dans ce pays. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Lorsqu’Israël fut assez fort, il assujettit les Cananéens à un tribut, mais il ne les chassa point. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 16:10
      metadata:
        usfm: JOS.16.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Éphraïm ne chassa point les Cananéens qui habitaient à Guézer, et les Cananéens habitèrent au milieu d’Éphraïm à Guézer. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Zabulon ne chassa point les habitants de Kitron, ni les habitants de Nahalol; et les Cananéens habitèrent au milieu de Zabulon, mais ils furent assujettis à un tribut. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Aser ne chassa point les habitants d’Acco, ni les habitants de Sidon, ni ceux d’Achlal, d’Aczib, de Helba, d’Aphik et de Rehob; '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'et les Asérites habitèrent au milieu des Cananéens, habitants du pays, car ils ne les chassèrent point. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Nephthali ne chassa point les habitants de Beth-Schémesch, ni les habitants de Beth-Anath, et il habita au milieu des Cananéens, habitants du pays, mais les habitants de Beth-Schémesch et de Beth-Anath furent assujettis à un tribut. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Les Amoréens repoussèrent dans la montagne les fils de Dan, et ne les laissèrent pas descendre dans la plaine. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Les Amoréens voulurent rester à Har-Hérès, à Ajalon et à Schaalbim; mais la main de la maison de Joseph s’appesantit sur eux, et ils furent assujettis à un tribut. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Le territoire des Amoréens s’étendait depuis la montée d’Akrabbim, depuis Séla, et en dessus.
