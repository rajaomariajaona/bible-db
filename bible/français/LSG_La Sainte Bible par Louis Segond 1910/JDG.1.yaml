document_id: JDG.1,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Nouvelles conquêtes par les tribus
  - type: heading
    content: 'V. 1-7: cf. Ge 49:8, 9. (Lé 24:19-21. Ja 2:13.)'
  - type: text
    content: 'Après la mort de Josué, les enfants d’Israël consultèrent l’Éternel, en disant: '
  - type: note
    content: Jg 20:18.
  - type: text
    content: 'Qui de nous montera le premier contre les Cananéens, pour les attaquer? '
  '10':
  - type: note
    content: Jos 15:14.
  - type: text
    content: 'Juda marcha contre les Cananéens qui habitaient à Hébron, appelée autrefois Kirjath-Arba; et il battit Schéschaï, Ahiman et Talmaï. '
  '11':
  - type: text
    content: 'De là il marcha contre les habitants de '
  - type: note
    content: Jos 15:15, etc.
  - type: text
    content: 'Debir: Debir s’appelait autrefois Kirjath-Sépher. '
  '12':
  - type: text
    content: 'Caleb dit: Je donnerai ma fille Acsa pour femme à celui qui battra Kirjath-Sépher et qui la prendra. '
  '13':
  - type: text
    content: 'Othniel, fils de Kenaz, frère cadet de Caleb, s’en empara; et Caleb lui donna pour femme sa fille Acsa. '
  '14':
  - type: text
    content: 'Lorsqu’elle fut entrée chez Othniel, elle le sollicita de demander à son père un champ. Elle descendit de dessus son âne; et Caleb lui dit: Qu’as-tu? '
  '15':
  - type: text
    content: 'Elle lui répondit: Fais-moi un présent, car tu m’as donné une terre du midi; donne-moi aussi des sources d’eau. Et Caleb lui donna les sources supérieures et les sources inférieures. '
  '16':
  - type: text
    content: 'Les fils du Kénien, beau-père de Moïse, montèrent de la ville des palmiers, avec les fils de Juda, dans le désert de Juda au midi d’Arad, et ils allèrent s’établir parmi le peuple. '
  '17':
  - type: text
    content: 'Juda se mit en marche avec Siméon, son frère, et ils battirent les Cananéens qui habitaient à Tsephath; ils dévouèrent la ville par interdit, et on l’appela Horma. '
  '18':
  - type: text
    content: 'Juda s’empara encore de Gaza et de son territoire, d’Askalon et de son territoire, et d’Ékron et de son territoire. '
  '19':
  - type: text
    content: 'L’Éternel fut avec Juda; et Juda se rendit maître de la montagne, mais il ne put chasser les habitants de la plaine, parce qu’ils avaient des chars de fer. '
  '2':
  - type: text
    content: 'L’Éternel répondit: Juda montera, voici, j’ai livré le pays entre ses mains. '
  '20':
  - type: text
    content: 'On donna Hébron à Caleb, '
  - type: note
    content: No 14:24. Jos 14:13.
  - type: text
    content: comme l’avait dit Moïse; et il en chassa les trois fils d’Anak.
  - type: heading
    content: Cananéens épargnés
  - type: heading
    content: 'V. 21-36: cf. (Jos 17:11-18. Jg 2:20-23; 3:1-6.) 2 Ch 8:7, 8.'
  '21':
  - type: text
    content: 'Les fils de Benjamin ne chassèrent point les Jébusiens qui habitaient à Jérusalem; et les Jébusiens ont habité jusqu’à ce jour dans Jérusalem avec les fils de Benjamin. '
  '22':
  - type: text
    content: 'La maison de Joseph monta aussi contre Béthel, et l’Éternel fut avec eux. '
  '23':
  - type: text
    content: 'La maison de Joseph fit explorer Béthel, '
  - type: note
    content: Ge 28:19.
  - type: text
    content: 'qui s’appelait autrefois Luz. '
  '24':
  - type: text
    content: 'Les gardes virent un homme qui sortait de la ville, et ils lui dirent: Montre-nous par où nous pourrons entrer dans la ville, et nous te ferons grâce. '
  '25':
  - type: text
    content: 'Il leur montra par où ils pourraient entrer dans la ville. Et ils frappèrent la ville du tranchant de l’épée; mais ils laissèrent aller cet homme et toute sa famille. '
  '26':
  - type: text
    content: 'Cet homme se rendit dans le pays des Héthiens; il bâtit une ville, et lui donna le nom de Luz, nom qu’elle a porté jusqu’à ce jour. '
  '27':
  - type: note
    content: Jos 17:11, 12.
  - type: text
    content: 'Manassé ne chassa point les habitants de Beth-Schean et des villes de son ressort, de Thaanac et des villes de son ressort, de Dor et des villes de son ressort, de Jibleam et des villes de son ressort, de Meguiddo et des villes de son ressort; et les Cananéens voulurent rester dans ce pays. '
  '28':
  - type: text
    content: 'Lorsqu’Israël fut assez fort, il assujettit les Cananéens à un tribut, mais il ne les chassa point. '
  '29':
  - type: note
    content: Jos 16:10.
  - type: text
    content: 'Éphraïm ne chassa point les Cananéens qui habitaient à Guézer, et les Cananéens habitèrent au milieu d’Éphraïm à Guézer. '
  '3':
  - type: text
    content: 'Et Juda dit à Siméon, son frère: Monte avec moi dans le pays qui m’est échu par le sort, et nous combattrons les Cananéens; j’irai aussi avec toi dans celui qui t’est tombé en partage. Et Siméon alla avec lui. '
  '30':
  - type: text
    content: 'Zabulon ne chassa point les habitants de Kitron, ni les habitants de Nahalol; et les Cananéens habitèrent au milieu de Zabulon, mais ils furent assujettis à un tribut. '
  '31':
  - type: text
    content: 'Aser ne chassa point les habitants d’Acco, ni les habitants de Sidon, ni ceux d’Achlal, d’Aczib, de Helba, d’Aphik et de Rehob; '
  '32':
  - type: text
    content: 'et les Asérites habitèrent au milieu des Cananéens, habitants du pays, car ils ne les chassèrent point. '
  '33':
  - type: text
    content: 'Nephthali ne chassa point les habitants de Beth-Schémesch, ni les habitants de Beth-Anath, et il habita au milieu des Cananéens, habitants du pays, mais les habitants de Beth-Schémesch et de Beth-Anath furent assujettis à un tribut. '
  '34':
  - type: text
    content: 'Les Amoréens repoussèrent dans la montagne les fils de Dan, et ne les laissèrent pas descendre dans la plaine. '
  '35':
  - type: text
    content: 'Les Amoréens voulurent rester à Har-Hérès, à Ajalon et à Schaalbim; mais la main de la maison de Joseph s’appesantit sur eux, et ils furent assujettis à un tribut. '
  '36':
  - type: text
    content: Le territoire des Amoréens s’étendait depuis la montée d’Akrabbim, depuis Séla, et en dessus.
  '4':
  - type: text
    content: 'Juda monta, et l’Éternel livra entre leurs mains les Cananéens et les Phéréziens; ils battirent dix mille hommes à Bézek. '
  '5':
  - type: text
    content: 'Ils trouvèrent Adoni-Bézek à Bézek; ils l’attaquèrent, et ils battirent les Cananéens et les Phéréziens. '
  '6':
  - type: text
    content: 'Adoni-Bézek prit la fuite; mais ils le poursuivirent et le saisirent, et ils lui coupèrent les pouces des mains et des pieds. '
  '7':
  - type: text
    content: 'Adoni-Bézek dit: Soixante-dix rois, ayant les pouces des mains et des pieds coupés, ramassaient sous ma table; Dieu me rend ce que j’ai fait. On l’emmena à Jérusalem, et il y mourut.'
  - type: heading
    content: 'V. 8-20: cf. (Jos 14:13-15; 15:13-19.) Jg 3:9-11.'
  '8':
  - type: text
    content: 'Les fils de Juda attaquèrent Jérusalem et la prirent, ils la frappèrent du tranchant de l’épée et mirent le feu à la ville. '
  '9':
  - type: note
    content: Jos 10:36; 11:21; 15:13.
  - type: text
    content: 'Les fils de Juda descendirent ensuite, pour combattre les Cananéens qui habitaient la montagne, la contrée du midi et la plaine. '
