document_id: PRO.12
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Celui qui aime la correction aime la science;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celui qui hait la réprimande est stupide.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: L’homme de bien obtient la faveur de l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais l’Éternel condamne celui qui est plein de malice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: L’homme ne s’affermit pas par la méchanceté,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 10:25
      metadata:
        usfm: PRO.10.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Mais la racine des justes ne sera point ébranlée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 11:7
      metadata:
        usfm: 1CO.11.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Une femme vertueuse est la couronne de son mari,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais celle qui fait honte est comme la carie dans ses os.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Les pensées des justes ne sont qu’équité;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les desseins des méchants ne sont que fraude.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 1:11
      metadata:
        usfm: PRO.1.11
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '18'
      metadata:
        usfm: PRO.1.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Les paroles des méchants sont des embûches '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 11:9
      metadata:
        usfm: PRO.11.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: pour verser le sang,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais la bouche des hommes droits est une délivrance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Ps 37:36, etc. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 11:12
      metadata:
        usfm: PRO.11.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Renversés, les méchants ne sont plus;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la maison des justes reste debout.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Un homme est estimé en raison de son intelligence,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et celui qui a le cœur pervers est l’objet du mépris.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Mieux vaut être '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 13:7
      metadata:
        usfm: PRO.13.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: d’une condition humble et avoir un serviteur
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que de faire le glorieux et de manquer de pain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Le juste '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 25:4
      metadata:
        usfm: DEU.25.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: prend soin de son bétail,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais les entrailles des méchants sont cruelles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 28:19
      metadata:
        usfm: PRO.28.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Celui qui cultive son champ est rassasié de pain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais celui qui poursuit des choses vaines est dépourvu de sens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Le méchant convoite ce que prennent les méchants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais la racine des justes donne du fruit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 10:14
      metadata:
        usfm: PRO.10.14
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 18:7
      metadata:
        usfm: PRO.18.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il y a dans le péché des lèvres un piège pernicieux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais le juste se tire de la détresse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 13:2
      metadata:
        usfm: PRO.13.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Par le fruit de la bouche on est rassasié de biens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et chacun reçoit selon l’œuvre de ses mains.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 3:7
      metadata:
        usfm: PRO.3.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: La voie de l’insensé est droite à ses yeux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais celui qui écoute les conseils est sage.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: L’insensé laisse voir à l’instant sa colère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais celui qui cache un outrage est un homme prudent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 14:5
      metadata:
        usfm: PRO.14.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Celui qui dit la vérité proclame la justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le faux témoin la tromperie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 57:5
      metadata:
        usfm: PSA.57.5
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 59:8
      metadata:
        usfm: PSA.59.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 16:27
      metadata:
        usfm: PRO.16.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Tel, qui parle légèrement, blesse comme un glaive;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais la langue des sages apporte la guérison.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: La lèvre véridique est affermie pour toujours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais la langue fausse ne subsiste qu’un instant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: La tromperie est dans le cœur de ceux qui méditent le mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais la joie est pour ceux qui conseillent la paix.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Aucun malheur n’arrive au juste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais les méchants sont accablés de maux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Les lèvres fausses sont en horreur à l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais ceux qui agissent avec vérité lui sont agréables.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 13:16
      metadata:
        usfm: PRO.13.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 15:2
      metadata:
        usfm: PRO.15.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: L’homme prudent cache sa science,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais le cœur des insensés proclame la folie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 10:4
      metadata:
        usfm: PRO.10.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: La main des diligents dominera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais la main lâche sera tributaire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 15:13
      metadata:
        usfm: PRO.15.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: L’inquiétude dans le cœur de l’homme l’abat,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais une bonne parole le réjouit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Le juste montre à son ami la bonne voie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais la voie des méchants les égare.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Le paresseux ne rôtit pas son gibier;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais le précieux trésor d’un homme, c’est l’activité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: La vie est dans le sentier de la justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La mort n’est pas dans le chemin qu’elle trace.
