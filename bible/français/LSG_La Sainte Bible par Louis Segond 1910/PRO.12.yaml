document_id: PRO.12,93
type_code: fra
verses:
  '1':
  - type: text
    content: Celui qui aime la correction aime la science;
  - type: text
    content: Celui qui hait la réprimande est stupide.
  '10':
  - type: text
    content: 'Le juste '
  - type: note
    content: De 25:4.
  - type: text
    content: prend soin de son bétail,
  - type: text
    content: Mais les entrailles des méchants sont cruelles.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Pr 28:19.
  - type: text
    content: Celui qui cultive son champ est rassasié de pain,
  - type: text
    content: Mais celui qui poursuit des choses vaines est dépourvu de sens.
  '12':
  - type: text
    content: Le méchant convoite ce que prennent les méchants,
  - type: text
    content: Mais la racine des justes donne du fruit.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Pr 10:14; 18:7.
  - type: text
    content: Il y a dans le péché des lèvres un piège pernicieux,
  - type: text
    content: Mais le juste se tire de la détresse.
  '14':
  - type: text
    content: ' '
  - type: note
    content: Pr 13:2.
  - type: text
    content: Par le fruit de la bouche on est rassasié de biens,
  - type: text
    content: Et chacun reçoit selon l’œuvre de ses mains.
  '15':
  - type: text
    content: ' '
  - type: note
    content: Pr 3:7.
  - type: text
    content: La voie de l’insensé est droite à ses yeux,
  - type: text
    content: Mais celui qui écoute les conseils est sage.
  '16':
  - type: text
    content: L’insensé laisse voir à l’instant sa colère,
  - type: text
    content: Mais celui qui cache un outrage est un homme prudent.
  '17':
  - type: text
    content: ' '
  - type: note
    content: Pr 14:5.
  - type: text
    content: Celui qui dit la vérité proclame la justice,
  - type: text
    content: Et le faux témoin la tromperie.
  '18':
  - type: text
    content: ' '
  - type: note
    content: Ps 57:5; 59:8. Pr 16:27.
  - type: text
    content: Tel, qui parle légèrement, blesse comme un glaive;
  - type: text
    content: Mais la langue des sages apporte la guérison.
  '19':
  - type: text
    content: La lèvre véridique est affermie pour toujours,
  - type: text
    content: Mais la langue fausse ne subsiste qu’un instant.
  '2':
  - type: text
    content: L’homme de bien obtient la faveur de l’Éternel,
  - type: text
    content: Mais l’Éternel condamne celui qui est plein de malice.
  '20':
  - type: text
    content: La tromperie est dans le cœur de ceux qui méditent le mal,
  - type: text
    content: Mais la joie est pour ceux qui conseillent la paix.
  '21':
  - type: text
    content: Aucun malheur n’arrive au juste,
  - type: text
    content: Mais les méchants sont accablés de maux.
  '22':
  - type: text
    content: Les lèvres fausses sont en horreur à l’Éternel,
  - type: text
    content: Mais ceux qui agissent avec vérité lui sont agréables.
  '23':
  - type: text
    content: ' '
  - type: note
    content: Pr 13:16; 15:2.
  - type: text
    content: L’homme prudent cache sa science,
  - type: text
    content: Mais le cœur des insensés proclame la folie.
  '24':
  - type: text
    content: ' '
  - type: note
    content: Pr 10:4.
  - type: text
    content: La main des diligents dominera,
  - type: text
    content: Mais la main lâche sera tributaire.
  '25':
  - type: text
    content: ' '
  - type: note
    content: Pr 15:13.
  - type: text
    content: L’inquiétude dans le cœur de l’homme l’abat,
  - type: text
    content: Mais une bonne parole le réjouit.
  '26':
  - type: text
    content: Le juste montre à son ami la bonne voie,
  - type: text
    content: Mais la voie des méchants les égare.
  '27':
  - type: text
    content: Le paresseux ne rôtit pas son gibier;
  - type: text
    content: Mais le précieux trésor d’un homme, c’est l’activité.
  '28':
  - type: text
    content: La vie est dans le sentier de la justice,
  - type: text
    content: La mort n’est pas dans le chemin qu’elle trace.
  '3':
  - type: text
    content: L’homme ne s’affermit pas par la méchanceté,
  - type: note
    content: Pr 10:25.
  - type: text
    content: Mais la racine des justes ne sera point ébranlée.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 1 Co 11:7.
  - type: text
    content: Une femme vertueuse est la couronne de son mari,
  - type: text
    content: Mais celle qui fait honte est comme la carie dans ses os.
  '5':
  - type: text
    content: Les pensées des justes ne sont qu’équité;
  - type: text
    content: Les desseins des méchants ne sont que fraude.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Pr 1:11, 18.
  - type: text
    content: 'Les paroles des méchants sont des embûches '
  - type: note
    content: Pr 11:9.
  - type: text
    content: pour verser le sang,
  - type: text
    content: Mais la bouche des hommes droits est une délivrance.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Ps 37:36, etc. Pr 11:12.
  - type: text
    content: Renversés, les méchants ne sont plus;
  - type: text
    content: Et la maison des justes reste debout.
  '8':
  - type: text
    content: Un homme est estimé en raison de son intelligence,
  - type: text
    content: Et celui qui a le cœur pervers est l’objet du mépris.
  '9':
  - type: text
    content: 'Mieux vaut être '
  - type: note
    content: Pr 13:7.
  - type: text
    content: d’une condition humble et avoir un serviteur
  - type: text
    content: Que de faire le glorieux et de manquer de pain.
