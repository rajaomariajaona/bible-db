document_id: JOB.4,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Discours d’Éliphaz à Job
  - type: heading
    content: 'V. 1-11: cf. (Ps 30:7, 8. Hé 12:5, 12.) Ga 6:7, 8.'
  - type: text
    content: 'Éliphaz de Théman prit la parole et dit:'
  '10':
  - type: text
    content: Le rugissement des lions prend fin,
  - type: text
    content: Les dents des lionceaux sont brisées;
  '11':
  - type: text
    content: Le lion périt faute de proie,
  - type: text
    content: Et les petits de la lionne se dispersent.
  - type: heading
    content: 'V. 12-21: cf. Job 33:14-18. (Job 25:4-6; 15:14-16.)'
  '12':
  - type: text
    content: Une parole est arrivée furtivement jusqu’à moi,
  - type: text
    content: Et mon oreille en a recueilli les sons légers.
  '13':
  - type: text
    content: Au moment où les visions de la nuit agitent la pensée,
  - type: text
    content: Quand les hommes sont livrés à un profond sommeil,
  '14':
  - type: text
    content: Je fus saisi de frayeur et d’épouvante,
  - type: text
    content: Et tous mes os tremblèrent.
  '15':
  - type: text
    content: Un esprit passa près de moi…
  - type: text
    content: Tous mes cheveux se hérissèrent…
  '16':
  - type: text
    content: Une figure d’un aspect inconnu était devant mes yeux,
  - type: text
    content: 'Et j’entendis une voix qui murmurait doucement:'
  '17':
  - type: text
    content: L’homme serait-il juste devant Dieu?
  - type: text
    content: Serait-il pur devant celui qui l’a fait?
  '18':
  - type: text
    content: ' '
  - type: note
    content: Job 15:15. 2 Pi 2:4.
  - type: text
    content: Si Dieu n’a pas confiance en ses serviteurs,
  - type: text
    content: S’il trouve de la folie chez ses anges,
  '19':
  - type: text
    content: Combien plus chez ceux qui habitent des maisons d’argile,
  - type: text
    content: Qui tirent leur origine de la poussière,
  - type: text
    content: Et qui peuvent être écrasés comme un vermisseau!
  '2':
  - type: text
    content: Si nous osons ouvrir la bouche, en seras-tu peiné?
  - type: text
    content: Mais qui pourrait garder le silence?
  '20':
  - type: text
    content: Du matin au soir ils sont brisés,
  - type: text
    content: Ils périssent pour toujours, et nul n’y prend garde;
  '21':
  - type: text
    content: Le fil de leur vie est coupé,
  - type: text
    content: Ils meurent, et ils n’ont pas acquis la sagesse.
  '3':
  - type: text
    content: Voici, tu as souvent enseigné les autres,
  - type: text
    content: Tu as fortifié les mains languissantes,
  '4':
  - type: text
    content: Tes paroles ont relevé ceux qui chancelaient,
  - type: text
    content: Tu as affermi les genoux qui pliaient.
  '5':
  - type: text
    content: Et maintenant qu’il s’agit de toi, tu faiblis!
  - type: text
    content: Maintenant que tu es atteint, tu te troubles!
  '6':
  - type: text
    content: Ta crainte de Dieu n’est-elle pas ton soutien?
  - type: text
    content: Ton espérance, n’est-ce pas ton intégrité?
  '7':
  - type: text
    content: 'Cherche dans ton souvenir: quel est l’innocent qui a péri?'
  - type: text
    content: Quels sont les justes qui ont été exterminés?
  '8':
  - type: text
    content: 'Pour moi, je l’ai vu, '
  - type: note
    content: Job 15:35. Ps 7:15. Pr 22:8. És 59:4. Os 10:13. Ga 6:7, 8.
  - type: text
    content: ceux qui labourent l’iniquité
  - type: text
    content: Et qui sèment l’injustice en moissonnent les fruits;
  '9':
  - type: text
    content: ' '
  - type: note
    content: És 11:4.
  - type: text
    content: Ils périssent par le souffle de Dieu,
  - type: text
    content: Ils sont consumés par le vent de sa colère,
