document_id: JOB.4
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Discours d’Éliphaz à Job
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-11: cf. (Ps 30:7, 8. Hé 12:5, 12.) Ga 6:7, 8.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Éliphaz de Théman prit la parole et dit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Si nous osons ouvrir la bouche, en seras-tu peiné?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais qui pourrait garder le silence?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Voici, tu as souvent enseigné les autres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu as fortifié les mains languissantes,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tes paroles ont relevé ceux qui chancelaient,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu as affermi les genoux qui pliaient.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Et maintenant qu’il s’agit de toi, tu faiblis!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Maintenant que tu es atteint, tu te troubles!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ta crainte de Dieu n’est-elle pas ton soutien?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ton espérance, n’est-ce pas ton intégrité?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Cherche dans ton souvenir: quel est l’innocent qui a péri?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quels sont les justes qui ont été exterminés?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Pour moi, je l’ai vu, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 15:35
      metadata:
        usfm: JOB.15.35
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 7:15
      metadata:
        usfm: PSA.7.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 22:8
      metadata:
        usfm: PRO.22.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 59:4
      metadata:
        usfm: ISA.59.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Os 10:13
      metadata:
        usfm: HOS.10.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 6:7
      metadata:
        usfm: GAL.6.7
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '8'
      metadata:
        usfm: GAL.6.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: ceux qui labourent l’iniquité
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui sèment l’injustice en moissonnent les fruits;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 11:4
      metadata:
        usfm: ISA.11.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ils périssent par le souffle de Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils sont consumés par le vent de sa colère,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Le rugissement des lions prend fin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les dents des lionceaux sont brisées;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Le lion périt faute de proie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les petits de la lionne se dispersent.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 12-21: cf. Job 33:14-18. (Job 25:4-6; 15:14-16.)'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Une parole est arrivée furtivement jusqu’à moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et mon oreille en a recueilli les sons légers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Au moment où les visions de la nuit agitent la pensée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand les hommes sont livrés à un profond sommeil,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Je fus saisi de frayeur et d’épouvante,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tous mes os tremblèrent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Un esprit passa près de moi…
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous mes cheveux se hérissèrent…
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Une figure d’un aspect inconnu était devant mes yeux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et j’entendis une voix qui murmurait doucement:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: L’homme serait-il juste devant Dieu?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Serait-il pur devant celui qui l’a fait?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 15:15
      metadata:
        usfm: JOB.15.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Pi 2:4
      metadata:
        usfm: 2PE.2.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Si Dieu n’a pas confiance en ses serviteurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: S’il trouve de la folie chez ses anges,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Combien plus chez ceux qui habitent des maisons d’argile,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui tirent leur origine de la poussière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui peuvent être écrasés comme un vermisseau!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Du matin au soir ils sont brisés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils périssent pour toujours, et nul n’y prend garde;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Le fil de leur vie est coupé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils meurent, et ils n’ont pas acquis la sagesse.
