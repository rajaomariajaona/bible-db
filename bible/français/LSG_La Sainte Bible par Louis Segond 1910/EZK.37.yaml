document_id: EZK.37,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le retour en Israël, et la réunion des deux royaumes. Vision des ossements
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-14: cf. (De 32:39. Ps 85:7. Ro 11:15.) De 30:1-5.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La main de l’Éternel fut sur moi, et l’Éternel me transporta en esprit, et me déposa dans le milieu d’une vallée remplie d’ossements. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je prophétisai, selon l’ordre qu’il m’avait donné. Et l’esprit entra en eux, et ils reprirent vie, et ils se tinrent sur leurs pieds: c’était une armée nombreuse, très nombreuse. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il me dit: Fils de l’homme, ces os, c’est toute la maison d’Israël. Voici, ils disent: Nos os sont desséchés, notre espérance est détruite, nous sommes perdus! '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Prophétise donc, et dis-leur: Ainsi parle le Seigneur, l’Éternel: Voici, j’ouvrirai vos sépulcres, je vous ferai sortir de vos sépulcres, ô mon peuple, et je vous ramènerai dans le pays d’Israël. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et vous saurez que je suis l’Éternel, lorsque j’ouvrirai vos sépulcres, et que je vous ferai sortir de vos sépulcres, ô mon peuple! '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je mettrai mon esprit en vous, et vous vivrez; je vous rétablirai dans votre pays, et vous saurez que moi, l’Éternel, j’ai parlé et agi, dit l’Éternel.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 15-28: cf. Éz 36:24-38; 34:23-31. Jé 23:3-6. Lu 1:31-33.'
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La parole de l’Éternel me fut adressée, en ces mots: '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et toi, fils de l’homme, prends une pièce de bois, et écris dessus: Pour Juda et pour les enfants d’Israël qui lui sont associés. Prends une autre pièce de bois, et écris dessus: Pour Joseph, bois d’Éphraïm et de toute la maison d’Israël qui lui est associée. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rapproche-les l’une et l’autre pour en former une seule pièce, en sorte qu’elles soient unies dans ta main. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et lorsque les enfants de ton peuple te diront: Ne nous expliqueras-tu pas ce que cela signifie? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'réponds-leur: Ainsi parle le Seigneur, l’Éternel: Voici, je prendrai le bois de Joseph qui est dans la main d’Éphraïm, et les tribus d’Israël qui lui sont associées; je les joindrai au bois de Juda, et j’en formerai un seul bois, en sorte qu’ils ne soient qu’un dans ma main. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il me fit passer auprès d’eux, tout autour; et voici, ils étaient fort nombreux, à la surface de la vallée, et ils étaient complètement secs. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les bois sur lesquels tu écriras seront dans ta main, sous leurs yeux. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et tu leur diras: Ainsi parle le Seigneur, l’Éternel: Voici, je prendrai les enfants d’Israël du milieu des nations où ils sont allés, je les rassemblerai de toutes parts, et je les ramènerai dans leur pays. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je ferai d’eux une seule nation dans le pays, dans les montagnes d’Israël; ils auront tous '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 10:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'un même roi, ils ne formeront plus deux nations, et ne seront plus divisés en deux royaumes. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils ne se souilleront plus par leurs idoles, par leurs abominations, et par toutes leurs transgressions; je les retirerai de tous les lieux qu’ils ont habités et où ils ont péché, et je les purifierai; ils seront mon peuple, et je serai leur Dieu. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 40:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 30:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 34:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Mon serviteur David sera leur roi, et ils auront tous un seul pasteur. Ils suivront mes ordonnances, ils observeront mes lois et les mettront en pratique. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils habiteront le pays que j’ai donné à mon serviteur Jacob, et qu’ont habité vos pères; ils y habiteront, eux, leurs enfants, et les enfants de leurs enfants, à perpétuité; et mon serviteur David sera leur prince pour toujours. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je traiterai avec eux une '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 89:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 34:25
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'alliance de paix, et il y aura une alliance éternelle avec eux; je les établirai, je les multiplierai, et je placerai mon '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 6:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'sanctuaire au milieu d’eux pour toujours. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ma demeure sera parmi eux; je serai leur '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 11:20
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Dieu, et ils seront mon peuple. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et les nations sauront que je suis l’Éternel, qui sanctifie Israël, lorsque mon sanctuaire sera pour toujours au milieu d’eux.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il me dit: Fils de l’homme, ces os pourront-ils revivre? Je répondis: Seigneur Éternel, tu le sais. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il me dit: Prophétise sur ces os, et dis-leur: Ossements desséchés, écoutez la parole de l’Éternel! '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi parle le Seigneur, l’Éternel, à ces os: Voici, je vais faire entrer en vous un esprit, et vous vivrez; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'je vous donnerai des nerfs, je ferai croître sur vous de la chair, je vous couvrirai de peau, je mettrai en vous un esprit, et vous vivrez. Et vous saurez que je suis l’Éternel. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je prophétisai, selon l’ordre que j’avais reçu. Et comme je prophétisais, il y eut un bruit, et voici, il se fit un mouvement, et les os s’approchèrent les uns des autres. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je regardai, et voici, il leur vint des nerfs, la chair crût, et la peau les couvrit par-dessus; mais il n’y avait point en eux d’esprit. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il me dit: Prophétise, et parle à l’esprit! Prophétise, fils de l’homme, et dis à l’esprit: Ainsi parle le Seigneur, l’Éternel: Esprit, viens des quatre vents, souffle sur ces morts, et qu’ils revivent! '
