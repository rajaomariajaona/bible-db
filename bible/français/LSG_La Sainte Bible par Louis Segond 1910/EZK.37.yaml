document_id: EZK.37,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Le retour en Israël, et la réunion des deux royaumes. Vision des ossements
  - type: heading
    content: 'V. 1-14: cf. (De 32:39. Ps 85:7. Ro 11:15.) De 30:1-5.'
  - type: text
    content: 'La main de l’Éternel fut sur moi, et l’Éternel me transporta en esprit, et me déposa dans le milieu d’une vallée remplie d’ossements. '
  '10':
  - type: text
    content: 'Je prophétisai, selon l’ordre qu’il m’avait donné. Et l’esprit entra en eux, et ils reprirent vie, et ils se tinrent sur leurs pieds: c’était une armée nombreuse, très nombreuse. '
  '11':
  - type: text
    content: 'Il me dit: Fils de l’homme, ces os, c’est toute la maison d’Israël. Voici, ils disent: Nos os sont desséchés, notre espérance est détruite, nous sommes perdus! '
  '12':
  - type: text
    content: 'Prophétise donc, et dis-leur: Ainsi parle le Seigneur, l’Éternel: Voici, j’ouvrirai vos sépulcres, je vous ferai sortir de vos sépulcres, ô mon peuple, et je vous ramènerai dans le pays d’Israël. '
  '13':
  - type: text
    content: 'Et vous saurez que je suis l’Éternel, lorsque j’ouvrirai vos sépulcres, et que je vous ferai sortir de vos sépulcres, ô mon peuple! '
  '14':
  - type: text
    content: Je mettrai mon esprit en vous, et vous vivrez; je vous rétablirai dans votre pays, et vous saurez que moi, l’Éternel, j’ai parlé et agi, dit l’Éternel.
  - type: heading
    content: 'V. 15-28: cf. Éz 36:24-38; 34:23-31. Jé 23:3-6. Lu 1:31-33.'
  '15':
  - type: text
    content: 'La parole de l’Éternel me fut adressée, en ces mots: '
  '16':
  - type: text
    content: 'Et toi, fils de l’homme, prends une pièce de bois, et écris dessus: Pour Juda et pour les enfants d’Israël qui lui sont associés. Prends une autre pièce de bois, et écris dessus: Pour Joseph, bois d’Éphraïm et de toute la maison d’Israël qui lui est associée. '
  '17':
  - type: text
    content: 'Rapproche-les l’une et l’autre pour en former une seule pièce, en sorte qu’elles soient unies dans ta main. '
  '18':
  - type: text
    content: 'Et lorsque les enfants de ton peuple te diront: Ne nous expliqueras-tu pas ce que cela signifie? '
  '19':
  - type: text
    content: 'réponds-leur: Ainsi parle le Seigneur, l’Éternel: Voici, je prendrai le bois de Joseph qui est dans la main d’Éphraïm, et les tribus d’Israël qui lui sont associées; je les joindrai au bois de Juda, et j’en formerai un seul bois, en sorte qu’ils ne soient qu’un dans ma main. '
  '2':
  - type: text
    content: 'Il me fit passer auprès d’eux, tout autour; et voici, ils étaient fort nombreux, à la surface de la vallée, et ils étaient complètement secs. '
  '20':
  - type: text
    content: 'Les bois sur lesquels tu écriras seront dans ta main, sous leurs yeux. '
  '21':
  - type: text
    content: 'Et tu leur diras: Ainsi parle le Seigneur, l’Éternel: Voici, je prendrai les enfants d’Israël du milieu des nations où ils sont allés, je les rassemblerai de toutes parts, et je les ramènerai dans leur pays. '
  '22':
  - type: text
    content: 'Je ferai d’eux une seule nation dans le pays, dans les montagnes d’Israël; ils auront tous '
  - type: note
    content: Jn 10:16.
  - type: text
    content: 'un même roi, ils ne formeront plus deux nations, et ne seront plus divisés en deux royaumes. '
  '23':
  - type: text
    content: 'Ils ne se souilleront plus par leurs idoles, par leurs abominations, et par toutes leurs transgressions; je les retirerai de tous les lieux qu’ils ont habités et où ils ont péché, et je les purifierai; ils seront mon peuple, et je serai leur Dieu. '
  '24':
  - type: note
    content: És 40:11. Jé 30:9. Éz 34:23.
  - type: text
    content: 'Mon serviteur David sera leur roi, et ils auront tous un seul pasteur. Ils suivront mes ordonnances, ils observeront mes lois et les mettront en pratique. '
  '25':
  - type: text
    content: 'Ils habiteront le pays que j’ai donné à mon serviteur Jacob, et qu’ont habité vos pères; ils y habiteront, eux, leurs enfants, et les enfants de leurs enfants, à perpétuité; et mon serviteur David sera leur prince pour toujours. '
  '26':
  - type: text
    content: 'Je traiterai avec eux une '
  - type: note
    content: Ps 89:4. Éz 34:25.
  - type: text
    content: 'alliance de paix, et il y aura une alliance éternelle avec eux; je les établirai, je les multiplierai, et je placerai mon '
  - type: note
    content: 2 Co 6:16.
  - type: text
    content: 'sanctuaire au milieu d’eux pour toujours. '
  '27':
  - type: text
    content: 'Ma demeure sera parmi eux; je serai leur '
  - type: note
    content: Éz 11:20; 14:11.
  - type: text
    content: 'Dieu, et ils seront mon peuple. '
  '28':
  - type: text
    content: Et les nations sauront que je suis l’Éternel, qui sanctifie Israël, lorsque mon sanctuaire sera pour toujours au milieu d’eux.
  '3':
  - type: text
    content: 'Il me dit: Fils de l’homme, ces os pourront-ils revivre? Je répondis: Seigneur Éternel, tu le sais. '
  '4':
  - type: text
    content: 'Il me dit: Prophétise sur ces os, et dis-leur: Ossements desséchés, écoutez la parole de l’Éternel! '
  '5':
  - type: text
    content: 'Ainsi parle le Seigneur, l’Éternel, à ces os: Voici, je vais faire entrer en vous un esprit, et vous vivrez; '
  '6':
  - type: text
    content: 'je vous donnerai des nerfs, je ferai croître sur vous de la chair, je vous couvrirai de peau, je mettrai en vous un esprit, et vous vivrez. Et vous saurez que je suis l’Éternel. '
  '7':
  - type: text
    content: 'Je prophétisai, selon l’ordre que j’avais reçu. Et comme je prophétisais, il y eut un bruit, et voici, il se fit un mouvement, et les os s’approchèrent les uns des autres. '
  '8':
  - type: text
    content: 'Je regardai, et voici, il leur vint des nerfs, la chair crût, et la peau les couvrit par-dessus; mais il n’y avait point en eux d’esprit. '
  '9':
  - type: text
    content: 'Il me dit: Prophétise, et parle à l’esprit! Prophétise, fils de l’homme, et dis à l’esprit: Ainsi parle le Seigneur, l’Éternel: Esprit, viens des quatre vents, souffle sur ces morts, et qu’ils revivent! '
