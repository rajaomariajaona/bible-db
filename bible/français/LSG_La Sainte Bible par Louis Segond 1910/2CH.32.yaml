document_id: 2CH.32,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Invasion de Sanchérib, roi d’Assyrie, et destruction de son armée
  - type: heading
    content: 'V. 1-8: cf. (2 R 18:13-16. És 36:1.) (És 10:5, etc.; 22:1-14.) Ps 118:6-9.'
  - type: text
    content: 'Après ces choses et ces actes de fidélité, '
  - type: note
    content: 2 R 18:13. És 36:1.
  - type: text
    content: 'parut Sanchérib, roi d’Assyrie, qui pénétra en Juda, et assiégea les villes fortes, dans l’intention de s’en emparer. '
  '10':
  - type: text
    content: 'Ainsi parle Sanchérib, roi d’Assyrie: Sur quoi repose votre confiance, pour que vous restiez à Jérusalem dans la détresse? '
  '11':
  - type: note
    content: 2 R 18:30.
  - type: text
    content: 'Ézéchias ne vous abuse-t-il pas pour vous livrer à la mort par la famine et par la soif, quand il dit: L’Éternel, notre Dieu, nous sauvera de la main du roi d’Assyrie? '
  '12':
  - type: note
    content: 2 R 18:22.
  - type: text
    content: 'N’est-ce pas lui, Ézéchias, qui a fait disparaître les hauts lieux et les autels de l’Éternel, et qui a donné cet ordre à Juda et à Jérusalem: Vous vous prosternerez devant un seul autel, et vous y offrirez les parfums? '
  '13':
  - type: text
    content: 'Ne savez-vous pas ce que nous avons fait, moi et mes pères, à tous les peuples des autres pays? Les dieux des nations de ces pays ont-ils pu délivrer leurs pays de ma main? '
  '14':
  - type: text
    content: 'Parmi tous les dieux de ces nations que mes pères ont exterminées, quel est celui qui a pu délivrer son peuple de ma main, pour que votre Dieu puisse vous délivrer de ma main? '
  '15':
  - type: note
    content: 2 R 18:30.
  - type: text
    content: 'Qu’Ézéchias ne vous séduise donc point et qu’il ne vous abuse point ainsi; ne vous fiez pas à lui! Car aucun dieu d’aucune nation ni d’aucun royaume n’a pu délivrer son peuple de ma main et de la main de mes pères: combien moins votre Dieu vous délivrera-t-il de ma main? '
  '16':
  - type: note
    content: 2 R 19:10.
  - type: text
    content: 'Les serviteurs de Sanchérib parlèrent encore contre l’Éternel Dieu, et contre Ézéchias, son serviteur. '
  '17':
  - type: note
    content: 2 R 19:14.
  - type: text
    content: 'Et il envoya une lettre '
  - type: note
    content: 2 R 19:16.
  - type: text
    content: 'insultante pour l’Éternel, le Dieu d’Israël, en s’exprimant ainsi contre lui: De même que les dieux des nations des autres pays n’ont pu délivrer leur peuple de ma main, de même le Dieu d’Ézéchias ne délivrera pas son peuple de ma main. '
  '18':
  - type: text
    content: 'Les serviteurs de Sanchérib crièrent à haute voix '
  - type: note
    content: 2 R 18:26, 28.
  - type: text
    content: 'en langue judaïque, afin de jeter l’effroi et l’épouvante parmi le peuple de Jérusalem qui était sur la muraille, et de pouvoir ainsi s’emparer de la ville. '
  '19':
  - type: text
    content: Ils parlèrent du Dieu de Jérusalem comme des dieux des peuples de la terre, ouvrages de mains d’homme.
  - type: heading
    content: 'V. 20-23: cf. (2 R 19. És 37.) Ps 18:51; 76:2, etc.'
  '2':
  - type: text
    content: 'Ézéchias, voyant que Sanchérib était venu et qu’il se proposait d’attaquer Jérusalem, '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 2 R 19:15.
  - type: text
    content: 'Le roi Ézéchias et le prophète Ésaïe, fils d’Amots, se mirent à prier à ce sujet, et ils crièrent au ciel. '
  '21':
  - type: note
    content: 2 R 19:35.
  - type: text
    content: 'Alors l’Éternel envoya un ange, qui extermina dans le camp du roi d’Assyrie tous les vaillants hommes, les princes et les chefs. Et le roi confus retourna dans son pays. '
  - type: note
    content: 2 R 19:37.
  - type: text
    content: 'Il entra dans la maison de son dieu, et là ceux qui étaient sortis de ses entrailles le firent tomber par l’épée. '
  '22':
  - type: text
    content: 'Ainsi l’Éternel sauva Ézéchias et les habitants de Jérusalem de la main de Sanchérib, roi d’Assyrie, et de la main de tous, et il les protégea contre ceux qui les entouraient. '
  '23':
  - type: text
    content: Beaucoup de gens apportèrent dans Jérusalem des offrandes à l’Éternel, et de riches présents à Ézéchias, roi de Juda, qui depuis lors fut élevé aux yeux de toutes les nations.
  - type: heading
    content: 'V. 24-33: cf. (2 R 20. És 38; 39.)'
  '24':
  - type: text
    content: ' '
  - type: note
    content: 2 R 20:1. És 38:1.
  - type: text
    content: 'En ce temps-là, Ézéchias fut malade à la mort. Il fit une prière à l’Éternel; et l’Éternel lui adressa la parole, et lui accorda un prodige. '
  '25':
  - type: text
    content: 'Mais Ézéchias ne répondit point au bienfait qu’il avait reçu, car son cœur s’éleva; et la colère de l’Éternel fut sur lui, sur Juda et sur Jérusalem. '
  '26':
  - type: note
    content: 2 R 20:19.
  - type: text
    content: 'Alors Ézéchias, du sein de son orgueil, s’humilia avec les habitants de Jérusalem, et la colère de l’Éternel ne vint pas sur eux pendant la vie d’Ézéchias. '
  '27':
  - type: text
    content: 'Ézéchias eut beaucoup de richesses et de gloire. Il se fit des trésors d’argent, d’or, de pierres précieuses, d’aromates, de boucliers et de tous les objets qu’on peut désirer; '
  '28':
  - type: text
    content: 'des magasins pour les produits en blé, en moût et en huile, des crèches pour toute espèce de bétail, et des étables pour les troupeaux. '
  '29':
  - type: text
    content: 'Il se bâtit des villes, et il eut en abondance des troupeaux de menu et de gros bétail; car Dieu lui avait donné des biens considérables. '
  '3':
  - type: text
    content: 'tint conseil avec ses chefs et ses hommes vaillants, afin de boucher les sources d’eau qui étaient hors de la ville; et ils furent de son avis. '
  '30':
  - type: text
    content: 'Ce fut aussi lui, Ézéchias, qui boucha l’issue supérieure des eaux de Guihon, et les conduisit en bas vers l’occident de la cité de David. Ézéchias réussit dans toutes ses entreprises. '
  '31':
  - type: text
    content: 'Cependant, lorsque les chefs de Babylone envoyèrent des messagers auprès de lui pour s’informer du prodige qui avait eu lieu dans le pays, Dieu l’abandonna pour l’éprouver, afin de connaître tout ce qui était dans son cœur. '
  '32':
  - type: text
    content: 'Le reste des actions d’Ézéchias, et ses œuvres de piété, cela est écrit dans la vision du prophète Ésaïe, fils d’Amots, dans le livre des rois de Juda et d’Israël. '
  '33':
  - type: note
    content: 2 R 20:21.
  - type: text
    content: Ézéchias se coucha avec ses pères, et on l’enterra dans le lieu le plus élevé des sépulcres des fils de David; tout Juda et les habitants de Jérusalem lui rendirent honneur à sa mort. Et Manassé, son fils, régna à sa place.
  '4':
  - type: text
    content: 'Une foule de gens se rassemblèrent, et ils bouchèrent toutes les sources et le ruisseau qui coule au milieu de la contrée. Pourquoi, disaient-ils, les rois d’Assyrie trouveraient-ils à leur arrivée des eaux en abondance? '
  '5':
  - type: text
    content: 'Ézéchias prit courage; il reconstruisit la muraille qui était en ruine et l’éleva jusqu’aux tours, bâtit un autre mur en dehors, fortifia Millo dans la cité de David, et prépara une quantité d’armes et de boucliers. '
  '6':
  - type: text
    content: 'Il donna des chefs militaires au peuple, et les réunit auprès de lui sur la place de la porte de la ville. S’adressant à leur cœur, il dit: '
  '7':
  - type: text
    content: 'Fortifiez-vous et ayez du courage! Ne craignez point et ne soyez point effrayés devant le roi d’Assyrie et devant toute la multitude qui est avec lui; '
  - type: note
    content: 2 R 6:16.
  - type: text
    content: 'car avec nous il y a plus qu’avec lui. '
  '8':
  - type: text
    content: 'Avec lui est '
  - type: note
    content: Jé 17:5. 1 Jn 4:4.
  - type: text
    content: un bras de chair, et avec nous l’Éternel, notre Dieu, qui nous aidera et qui combattra pour nous. Le peuple eut confiance dans les paroles d’Ézéchias, roi de Juda.
  - type: heading
    content: 'V. 9-19: cf. (2 R 18:17, etc. És 36:2, etc.) Ps 42:11, 12.'
  '9':
  - type: text
    content: ' '
  - type: note
    content: 2 R 18:17.
  - type: text
    content: 'Après cela, Sanchérib, roi d’Assyrie, envoya ses serviteurs à Jérusalem, pendant qu’il était devant Lakis avec toutes ses forces; il les envoya vers Ézéchias, roi de Juda, et vers tous ceux de Juda qui étaient à Jérusalem, pour leur dire: '
