  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Celui qui vaincra sera revêtu ainsi de vêtements blancs; je n’effacerai point son nom
  - type: text
    text: ' '
