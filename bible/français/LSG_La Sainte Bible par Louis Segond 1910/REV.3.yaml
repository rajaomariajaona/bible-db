document_id: REV.3,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Cinquième lettre: à l’Église de Sardes'
  - type: heading
    content: 'V. 1-6: cf. (Ja 2:14-26. Mt 7:21-23; 24:42-51.) Ap 7:9, 13-17.'
  - type: text
    content: ' '
  - type: text
    content: 'Écris à l’ange de l’Église de Sardes:'
  - type: text
    content: Voici ce que dit celui qui
  - type: text
    content: ' '
  - type: note
    content: Ap 1:4.
  - type: text
    content: a les sept esprits de Dieu et
  - type: text
    content: ' '
  - type: note
    content: Ap 1:16.
  - type: text
    content: 'les sept étoiles: Je connais tes œuvres. Je sais que tu passes pour être vivant, et tu es mort.'
  - type: text
    content: ' '
  '10':
  - type: text
    content: Parce que tu as gardé la parole de la persévérance en moi, je te garderai aussi à l’heure de la tentation qui va venir sur le monde entier, pour éprouver les habitants de la terre.
  - type: text
    content: ' '
  '11':
  - type: text
    content: Je viens bientôt.
  - type: text
    content: ' '
  - type: note
    content: Ap 2:25.
  - type: text
    content: Retiens ce que tu as, afin que personne ne prenne ta couronne.
  - type: text
    content: ' '
  '12':
  - type: text
    content: Celui qui vaincra, je ferai de lui
  - type: text
    content: ' '
  - type: note
    content: 1 R 7:21.
  - type: text
    content: une colonne dans le temple de mon Dieu, et il n’en sortira plus; j’écrirai sur lui
  - type: text
    content: ' '
  - type: note
    content: Ap 22:4.
  - type: text
    content: le nom de mon Dieu, et le nom de la ville de mon Dieu,
  - type: text
    content: ' '
  - type: note
    content: Ap 21:2, 10.
  - type: text
    content: de la nouvelle Jérusalem qui descend du ciel d’auprès de mon Dieu, et mon nom nouveau.
  - type: text
    content: ' '
  '13':
  - type: text
    content: Que celui qui a des oreilles entende ce que l’Esprit dit aux Églises!
  - type: heading
    content: 'Septième lettre: à l’Église de Laodicée'
  - type: heading
    content: 'V. 14-22: cf. Lu 14:34, 35.'
  '14':
  - type: text
    content: ' '
  - type: text
    content: 'Écris à l’ange de l’Église de Laodicée:'
  - type: text
    content: Voici ce que dit
  - type: text
    content: ' '
  - type: note
    content: Ap 1:5, 6.
  - type: text
    content: l’Amen, le témoin fidèle et véritable,
  - type: text
    content: ' '
  - type: note
    content: Col 1:15.
  - type: text
    content: 'le commencement de la création de Dieu:'
  - type: text
    content: ' '
  '15':
  - type: text
    content: Je connais tes œuvres. Je sais que tu n’es ni froid ni bouillant. Puisses-tu être froid ou bouillant!
  - type: text
    content: ' '
  '16':
  - type: text
    content: Ainsi, parce que tu es tiède, et que tu n’es ni froid ni bouillant, je te vomirai de ma bouche.
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'Parce que tu dis: Je suis riche, je me suis enrichi, et je n’ai besoin de rien, et parce que tu ne sais pas que tu es malheureux, misérable, pauvre, aveugle et nu,'
  - type: text
    content: ' '
  '18':
  - type: text
    content: je te conseille d’acheter de moi de l’or éprouvé par le feu, afin que tu deviennes riche, et
  - type: text
    content: ' '
  - type: note
    content: 2 Co 5:3. Ap 7:13; 16:15; 19:8.
  - type: text
    content: des vêtements blancs, afin que tu sois vêtu et que la honte de ta nudité ne paraisse pas, et un collyre pour oindre tes yeux, afin que tu voies.
  - type: text
    content: ' '
  '19':
  - type: note
    content: Job 5:17. Pr 3:12. Hé 12:5.
  - type: text
    content: Moi, je reprends et je châtie tous ceux que j’aime. Aie donc du zèle, et repens-toi.
  - type: text
    content: ' '
  '2':
  - type: text
    content: Sois vigilant, et affermis le reste qui est près de mourir; car je n’ai pas trouvé tes œuvres parfaites devant mon Dieu.
  - type: text
    content: ' '
  '20':
  - type: text
    content: Voici, je me tiens à la porte, et je frappe. Si quelqu’un entend ma voix et ouvre la porte, j’entrerai chez lui, je souperai avec lui, et lui avec moi.
  - type: text
    content: ' '
  '21':
  - type: text
    content: Celui qui vaincra, je le
  - type: text
    content: ' '
  - type: note
    content: Mt 19:28. 1 Co 6:2.
  - type: text
    content: ferai asseoir avec moi sur mon trône, comme moi j’ai vaincu et me suis assis avec mon Père sur son trône.
  - type: text
    content: ' '
  '22':
  - type: text
    content: Que celui qui a des oreilles entende ce que l’Esprit dit aux Églises!
  '3':
  - type: text
    content: Rappelle-toi donc comment tu as reçu et entendu, et garde, et
  - type: text
    content: ' '
  - type: note
    content: Ap 3:19.
  - type: text
    content: repens-toi. Si tu ne veilles pas, je viendrai
  - type: text
    content: ' '
  - type: note
    content: Mt 24:43. 1 Th 5:2. 2 Pi 3:10. Ap 16:15.
  - type: text
    content: comme un voleur, et tu ne sauras pas à quelle heure je viendrai sur toi.
  - type: text
    content: ' '
  '4':
  - type: text
    content: Cependant tu as à Sardes quelques hommes qui n’ont pas souillé leurs vêtements; ils marcheront avec moi en vêtements blancs, parce qu’ils en sont dignes.
  - type: text
    content: ' '
  '5':
  - type: text
    content: Celui qui vaincra sera revêtu ainsi de vêtements blancs; je n’effacerai point son nom
  - type: text
    content: ' '
  - type: note
    content: Ex 32:32. Ps 69:29. Ph 4:3. Ap 20:12; 21:27.
  - type: text
    content: du livre de vie, et
  - type: text
    content: ' '
  - type: note
    content: Mt 10:32. Lu 12:8.
  - type: text
    content: je confesserai son nom devant mon Père et devant ses anges.
  - type: text
    content: ' '
  '6':
  - type: text
    content: Que celui qui a des oreilles entende ce que l’Esprit dit aux Églises!
  - type: heading
    content: 'Sixième lettre: à l’Église de Philadelphie'
  - type: heading
    content: 'V. 7-13: cf. (Ph 1:3-6. Col 2:5.) 2 Pi 2:9; 1:10, 11.'
  '7':
  - type: text
    content: ' '
  - type: text
    content: 'Écris à l’ange de l’Église de Philadelphie:'
  - type: text
    content: Voici ce que dit le Saint,
  - type: text
    content: ' '
  - type: note
    content: Ap 3:14.
  - type: text
    content: le Véritable,
  - type: text
    content: ' '
  - type: note
    content: Job 12:14. És 22:22. Ap 1:18.
  - type: text
    content: 'celui qui a la clef de David, celui qui ouvre, et personne ne fermera, celui qui ferme, et personne n’ouvrira:'
  - type: text
    content: ' '
  '8':
  - type: text
    content: Je connais tes œuvres. Voici, parce que tu as peu de puissance, et que tu as gardé ma parole, et que tu n’as pas renié mon nom, j’ai mis devant toi une porte ouverte, que personne ne peut fermer.
  - type: text
    content: ' '
  '9':
  - type: text
    content: Voici, je te donne de ceux
  - type: text
    content: ' '
  - type: note
    content: Ap 2:9.
  - type: text
    content: de la synagogue de Satan, qui se disent Juifs et ne le sont pas, mais qui mentent; voici, je les ferai venir, se prosterner à tes pieds, et connaître que je t’ai aimé.
  - type: text
    content: ' '
