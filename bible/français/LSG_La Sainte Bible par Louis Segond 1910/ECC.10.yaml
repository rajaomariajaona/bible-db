document_id: ECC.10,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-15: cf. (Ec 2:12-14; 8:1-6.) Mt 12:34-37.'
  - type: text
    content: 'Les mouches mortes infectent et font fermenter l’huile du parfumeur; un peu de folie l’emporte sur la sagesse et sur la gloire. '
  '10':
  - type: text
    content: 'S’il a émoussé le fer, et s’il n’en a pas aiguisé le tranchant, il devra redoubler de force; mais la sagesse a l’avantage du succès. '
  '11':
  - type: text
    content: 'Si le serpent mord faute d’enchantement, il n’y a point d’avantage pour l’enchanteur. '
  '12':
  - type: text
    content: 'Les paroles de la bouche du sage sont pleines de grâce; mais les lèvres de l’insensé causent sa perte. '
  '13':
  - type: text
    content: 'Le commencement des paroles de sa bouche est folie, et la fin de son discours est une méchante folie. '
  '14':
  - type: text
    content: 'L’insensé multiplie les paroles. L’homme ne sait point ce qui arrivera, et qui lui dira ce qui sera après lui? '
  '15':
  - type: text
    content: Le travail de l’insensé le fatigue, parce qu’il ne sait pas aller à la ville.
  - type: heading
    content: 'V. 16-20: cf. Pr 31:4-7. 1 Pi 2:17.'
  '16':
  - type: text
    content: ' '
  - type: note
    content: És 3:4, 12. Os 13:11.
  - type: text
    content: 'Malheur à toi, pays dont le roi est un enfant, et '
  - type: note
    content: És 5:11. Am 6:4.
  - type: text
    content: 'dont les princes mangent dès le matin! '
  '17':
  - type: text
    content: 'Heureux toi, pays dont le roi est de race illustre, et dont les princes mangent au temps convenable, pour soutenir leurs forces, et non pour se livrer à la boisson! '
  '18':
  - type: text
    content: 'Quand les mains sont paresseuses, la charpente s’affaisse; et quand les mains sont lâches, la maison a des gouttières. '
  '19':
  - type: text
    content: 'On fait des repas pour se divertir, le vin rend la vie joyeuse, et l’argent répond à tout. '
  '2':
  - type: text
    content: 'Le cœur du sage est à sa droite, et le cœur de l’insensé à sa gauche. '
  '20':
  - type: note
    content: Ex 22:28.
  - type: text
    content: Ne maudis pas le roi, même dans ta pensée, et ne maudis pas le riche dans la chambre où tu couches; car l’oiseau du ciel emporterait ta voix, l’animal ailé publierait tes paroles.
  '3':
  - type: text
    content: 'Quand l’insensé marche dans un chemin, le sens lui manque, et il dit de chacun: Voilà un fou! '
  '4':
  - type: text
    content: 'Si l’esprit de celui qui domine s’élève contre toi, ne quitte point ta place; car le calme prévient de grands péchés. '
  '5':
  - type: text
    content: 'Il est un mal que j’ai vu sous le soleil, comme une erreur provenant de celui qui gouverne: '
  '6':
  - type: text
    content: 'la folie occupe des postes très élevés, et des riches sont assis dans l’abaissement. '
  '7':
  - type: text
    content: 'J’ai vu des esclaves sur des chevaux, et des princes marchant sur terre comme des esclaves. '
  '8':
  - type: text
    content: 'Celui '
  - type: note
    content: Pr 26:27.
  - type: text
    content: 'qui creuse une fosse y tombera, et celui qui renverse une muraille sera mordu par un serpent. '
  '9':
  - type: text
    content: 'Celui qui remue des pierres en sera blessé, et celui qui fend du bois en éprouvera du danger. '
