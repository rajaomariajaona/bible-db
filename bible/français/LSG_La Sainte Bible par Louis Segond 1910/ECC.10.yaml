document_id: ECC.10,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-15: cf. (Ec 2:12-14; 8:1-6.) Mt 12:34-37.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Les mouches mortes infectent et font fermenter l’huile du parfumeur; un peu de folie l’emporte sur la sagesse et sur la gloire. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'S’il a émoussé le fer, et s’il n’en a pas aiguisé le tranchant, il devra redoubler de force; mais la sagesse a l’avantage du succès. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Si le serpent mord faute d’enchantement, il n’y a point d’avantage pour l’enchanteur. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Les paroles de la bouche du sage sont pleines de grâce; mais les lèvres de l’insensé causent sa perte. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Le commencement des paroles de sa bouche est folie, et la fin de son discours est une méchante folie. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'L’insensé multiplie les paroles. L’homme ne sait point ce qui arrivera, et qui lui dira ce qui sera après lui? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Le travail de l’insensé le fatigue, parce qu’il ne sait pas aller à la ville.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 16-20: cf. Pr 31:4-7. 1 Pi 2:17.'
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 3:4
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '12'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Os 13:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Malheur à toi, pays dont le roi est un enfant, et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 5:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Am 6:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'dont les princes mangent dès le matin! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Heureux toi, pays dont le roi est de race illustre, et dont les princes mangent au temps convenable, pour soutenir leurs forces, et non pour se livrer à la boisson! '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Quand les mains sont paresseuses, la charpente s’affaisse; et quand les mains sont lâches, la maison a des gouttières. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'On fait des repas pour se divertir, le vin rend la vie joyeuse, et l’argent répond à tout. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Le cœur du sage est à sa droite, et le cœur de l’insensé à sa gauche. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 22:28
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ne maudis pas le roi, même dans ta pensée, et ne maudis pas le riche dans la chambre où tu couches; car l’oiseau du ciel emporterait ta voix, l’animal ailé publierait tes paroles.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Quand l’insensé marche dans un chemin, le sens lui manque, et il dit de chacun: Voilà un fou! '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Si l’esprit de celui qui domine s’élève contre toi, ne quitte point ta place; car le calme prévient de grands péchés. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Il est un mal que j’ai vu sous le soleil, comme une erreur provenant de celui qui gouverne: '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'la folie occupe des postes très élevés, et des riches sont assis dans l’abaissement. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'J’ai vu des esclaves sur des chevaux, et des princes marchant sur terre comme des esclaves. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Celui '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 26:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'qui creuse une fosse y tombera, et celui qui renverse une muraille sera mordu par un serpent. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Celui qui remue des pierres en sera blessé, et celui qui fend du bois en éprouvera du danger. '
