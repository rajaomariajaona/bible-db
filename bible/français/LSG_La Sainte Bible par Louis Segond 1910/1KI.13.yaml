document_id: 1KI.13,93
type_code: fra
verses:
  '1':
  - type: heading
    content: L’autel de Béthel et la main de Jéroboam
  - type: heading
    content: 'V. 1-10: cf. 2 R 23:15-20. Ps 105:14, 15.'
  - type: text
    content: 'Voici, un homme de Dieu arriva de Juda à Béthel, par la parole de l’Éternel, pendant que Jéroboam se tenait à l’autel pour brûler des parfums. '
  '10':
  - type: text
    content: Et il s’en alla par un autre chemin, il ne prit pas à son retour le chemin par lequel il était venu à Béthel.
  - type: heading
    content: Un prophète tué par un lion
  - type: heading
    content: 'V. 11-32: cf. 1 R 20:35, 36. Ga 1:6-8.'
  '11':
  - type: text
    content: 'Or il y avait un vieux prophète qui demeurait à Béthel. Ses fils vinrent lui raconter toutes les choses que l’homme de Dieu avait faites à Béthel ce jour-là, et les paroles qu’il avait dites au roi. Lorsqu’ils en eurent fait le récit à leur père, '
  '12':
  - type: text
    content: 'il leur dit: Par quel chemin s’en est-il allé? Ses fils avaient vu par quel chemin s’en était allé l’homme de Dieu qui était venu de Juda. '
  '13':
  - type: text
    content: 'Et il dit à ses fils: Sellez-moi l’âne. Ils lui sellèrent l’âne, et il monta dessus. '
  '14':
  - type: text
    content: 'Il alla après l’homme de Dieu, et il le trouva assis sous un térébinthe. Il lui dit: Es-tu l’homme de Dieu qui est venu de Juda? Il répondit: Je le suis. '
  '15':
  - type: text
    content: 'Alors il lui dit: Viens avec moi à la maison, et tu prendras quelque nourriture. '
  '16':
  - type: text
    content: 'Mais il répondit: Je ne puis ni retourner avec toi, ni entrer chez toi. Je ne mangerai point de pain, je ne boirai point d’eau avec toi en ce lieu-ci; '
  '17':
  - type: text
    content: 'car il m’a été dit, par la parole de l’Éternel: Tu n’y mangeras point de pain et tu n’y boiras point d’eau, et tu ne prendras pas à ton retour le chemin par lequel tu seras allé. '
  '18':
  - type: text
    content: 'Et il lui dit: '
  - type: note
    content: Ga 1:8.
  - type: text
    content: 'Moi aussi, je suis prophète comme toi; et un ange m’a parlé de la part de l’Éternel, et m’a dit: Ramène-le avec toi dans ta maison, et qu’il mange du pain et boive de l’eau. Il lui mentait. '
  '19':
  - type: text
    content: 'L’homme de Dieu retourna avec lui, et il mangea du pain et but de l’eau dans sa maison. '
  '2':
  - type: text
    content: 'Il cria contre l’autel, par la parole de l’Éternel, et il dit: Autel! Autel! Ainsi parle l’Éternel: '
  - type: note
    content: 2 R 23:15, 16, 17, etc.
  - type: text
    content: 'Voici, il naîtra un fils à la maison de David; son nom sera Josias; il immolera sur toi les prêtres des hauts lieux qui brûlent sur toi des parfums, et l’on brûlera sur toi des ossements d’hommes! '
  '20':
  - type: text
    content: 'Comme ils étaient assis à table, la parole de l’Éternel fut adressée au prophète qui l’avait ramené. '
  '21':
  - type: text
    content: 'Et il cria à l’homme de Dieu qui était venu de Juda: Ainsi parle l’Éternel: Parce que tu as été rebelle à l’ordre de l’Éternel, et que tu n’as pas observé le commandement que l’Éternel, ton Dieu, t’avait donné; '
  '22':
  - type: text
    content: 'parce que tu es retourné, et que tu as mangé du pain et bu de l’eau dans le lieu dont il t’avait dit: Tu n’y mangeras point de pain et tu n’y boiras point d’eau, ton cadavre n’entrera pas dans le sépulcre de tes pères. '
  '23':
  - type: text
    content: 'Et quand le prophète qu’il avait ramené eut mangé du pain et qu’il eut bu de l’eau, il sella l’âne pour lui. '
  '24':
  - type: text
    content: 'L’homme de Dieu s’en alla: et '
  - type: note
    content: 1 R 20:36.
  - type: text
    content: 'il fut rencontré dans le chemin par un lion qui le tua. Son cadavre était étendu dans le chemin; l’âne resta près de lui, et le lion se tint à côté du cadavre. '
  '25':
  - type: text
    content: 'Et voici, des gens qui passaient virent le cadavre étendu dans le chemin et le lion se tenant à côté du cadavre; et ils en parlèrent à leur arrivée dans la ville où demeurait le vieux prophète. '
  '26':
  - type: text
    content: 'Lorsque le prophète qui avait ramené du chemin l’homme de Dieu l’eut appris, il dit: C’est l’homme de Dieu qui a été rebelle à l’ordre de l’Éternel, et l’Éternel l’a livré au lion, qui l’a déchiré et l’a fait mourir, selon la parole que l’Éternel lui avait dite. '
  '27':
  - type: text
    content: 'Puis, s’adressant à ses fils, il dit: Sellez-moi l’âne. Ils le sellèrent, '
  '28':
  - type: text
    content: 'et il partit. Il trouva le cadavre étendu dans le chemin, et l’âne et le lion qui se tenaient à côté du cadavre. Le lion n’avait pas dévoré le cadavre et n’avait pas déchiré l’âne. '
  '29':
  - type: text
    content: 'Le prophète releva le cadavre de l’homme de Dieu, le plaça sur l’âne, et le ramena; et le vieux prophète rentra dans la ville pour le pleurer et pour l’enterrer. '
  '3':
  - type: text
    content: 'Et le même jour il donna un signe, en disant: C’est ici le signe que l’Éternel a parlé: Voici, l’autel se fendra, et la cendre qui est dessus sera répandue. '
  '30':
  - type: text
    content: 'Il mit son cadavre dans le sépulcre, et l’on pleura sur lui, en disant: Hélas, mon frère! '
  '31':
  - type: text
    content: 'Après l’avoir enterré, il dit à ses fils: Quand je serai mort, vous m’enterrerez dans le sépulcre où est enterré l’homme de Dieu, vous déposerez mes os à côté de ses os. '
  '32':
  - type: text
    content: 'Car elle s’accomplira, la parole '
  - type: note
    content: 2 R 23:16.
  - type: text
    content: qu’il a criée, de la part de l’Éternel, contre l’autel de Béthel et contre toutes les maisons des hauts lieux qui sont dans les villes de Samarie.
  - type: heading
    content: 'V. 33-34: cf. 1 R 14:7-10; 15:25-30. Pr 1:24, etc.'
  '33':
  - type: text
    content: 'Après cet événement, Jéroboam ne se détourna point de sa mauvaise voie. '
  - type: note
    content: 1 R 12:31, 32.
  - type: text
    content: 'Il créa de nouveau des prêtres des hauts lieux pris parmi tout le peuple; quiconque en avait le désir, il le consacrait prêtre des hauts lieux. '
  '34':
  - type: text
    content: Ce fut là une occasion de péché pour la maison de Jéroboam, et c’est pour cela qu’elle a été exterminée et détruite de dessus la face de la terre.
  '4':
  - type: text
    content: 'Lorsque le roi entendit la parole que l’homme de Dieu avait criée contre l’autel de Béthel, il avança la main de dessus l’autel, en disant: Saisissez-le! Et la main que Jéroboam avait étendue contre lui devint sèche, et il ne put la ramener à soi. '
  '5':
  - type: text
    content: 'L’autel se fendit, et la cendre qui était dessus fut répandue, selon le signe qu’avait donné l’homme de Dieu, par la parole de l’Éternel. '
  '6':
  - type: text
    content: 'Alors le roi prit la parole, et dit à l’homme de Dieu: '
  - type: note
    content: Ex 8:8; 9:28; 10:17. No 21:7. Ac 8:24.
  - type: text
    content: 'Implore l’Éternel, ton Dieu, et prie pour moi, afin que je puisse retirer ma main. L’homme de Dieu implora l’Éternel, et le roi put retirer sa main, qui fut comme auparavant. '
  '7':
  - type: text
    content: 'Le roi dit à l’homme de Dieu: Entre avec moi dans la maison, tu prendras quelque nourriture, et je te donnerai un présent. '
  '8':
  - type: text
    content: 'L’homme de Dieu dit au roi: '
  - type: note
    content: No 22:18.
  - type: text
    content: 'Quand tu me donnerais la moitié de ta maison, je n’entrerais pas avec toi. Je ne mangerai point de pain, et je ne boirai point d’eau dans ce lieu-ci; '
  '9':
  - type: text
    content: 'car cet ordre m’a été donné, par la parole de l’Éternel: Tu ne mangeras point de pain et tu ne boiras point d’eau, et tu ne prendras pas à ton retour le chemin par lequel tu seras allé. '
