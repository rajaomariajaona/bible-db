document_id: 1KI.13
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’autel de Béthel et la main de Jéroboam
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-10: cf. 2 R 23:15-20. Ps 105:14, 15.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Voici, un homme de Dieu arriva de Juda à Béthel, par la parole de l’Éternel, pendant que Jéroboam se tenait à l’autel pour brûler des parfums. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il cria contre l’autel, par la parole de l’Éternel, et il dit: Autel! Autel! Ainsi parle l’Éternel: '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 R 23:15, 16, 17, etc.
    marker-yv: yv-n
  - type: text
    text: 'Voici, il naîtra un fils à la maison de David; son nom sera Josias; il immolera sur toi les prêtres des hauts lieux qui brûlent sur toi des parfums, et l’on brûlera sur toi des ossements d’hommes! '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Et le même jour il donna un signe, en disant: C’est ici le signe que l’Éternel a parlé: Voici, l’autel se fendra, et la cendre qui est dessus sera répandue. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Lorsque le roi entendit la parole que l’homme de Dieu avait criée contre l’autel de Béthel, il avança la main de dessus l’autel, en disant: Saisissez-le! Et la main que Jéroboam avait étendue contre lui devint sèche, et il ne put la ramener à soi. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'L’autel se fendit, et la cendre qui était dessus fut répandue, selon le signe qu’avait donné l’homme de Dieu, par la parole de l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Alors le roi prit la parole, et dit à l’homme de Dieu: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 8:8
      metadata:
        usfm: EXO.8.8
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 9:28
      metadata:
        usfm: EXO.9.28
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 10:17
      metadata:
        usfm: EXO.10.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 21:7
      metadata:
        usfm: NUM.21.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 8:24
      metadata:
        usfm: ACT.8.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Implore l’Éternel, ton Dieu, et prie pour moi, afin que je puisse retirer ma main. L’homme de Dieu implora l’Éternel, et le roi put retirer sa main, qui fut comme auparavant. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Le roi dit à l’homme de Dieu: Entre avec moi dans la maison, tu prendras quelque nourriture, et je te donnerai un présent. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'L’homme de Dieu dit au roi: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 22:18
      metadata:
        usfm: NUM.22.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Quand tu me donnerais la moitié de ta maison, je n’entrerais pas avec toi. Je ne mangerai point de pain, et je ne boirai point d’eau dans ce lieu-ci; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'car cet ordre m’a été donné, par la parole de l’Éternel: Tu ne mangeras point de pain et tu ne boiras point d’eau, et tu ne prendras pas à ton retour le chemin par lequel tu seras allé. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Et il s’en alla par un autre chemin, il ne prit pas à son retour le chemin par lequel il était venu à Béthel.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Un prophète tué par un lion
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 11-32: cf. 1 R 20:35, 36. Ga 1:6-8.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Or il y avait un vieux prophète qui demeurait à Béthel. Ses fils vinrent lui raconter toutes les choses que l’homme de Dieu avait faites à Béthel ce jour-là, et les paroles qu’il avait dites au roi. Lorsqu’ils en eurent fait le récit à leur père, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'il leur dit: Par quel chemin s’en est-il allé? Ses fils avaient vu par quel chemin s’en était allé l’homme de Dieu qui était venu de Juda. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Et il dit à ses fils: Sellez-moi l’âne. Ils lui sellèrent l’âne, et il monta dessus. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il alla après l’homme de Dieu, et il le trouva assis sous un térébinthe. Il lui dit: Es-tu l’homme de Dieu qui est venu de Juda? Il répondit: Je le suis. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Alors il lui dit: Viens avec moi à la maison, et tu prendras quelque nourriture. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Mais il répondit: Je ne puis ni retourner avec toi, ni entrer chez toi. Je ne mangerai point de pain, je ne boirai point d’eau avec toi en ce lieu-ci; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'car il m’a été dit, par la parole de l’Éternel: Tu n’y mangeras point de pain et tu n’y boiras point d’eau, et tu ne prendras pas à ton retour le chemin par lequel tu seras allé. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Et il lui dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 1:8
      metadata:
        usfm: GAL.1.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Moi aussi, je suis prophète comme toi; et un ange m’a parlé de la part de l’Éternel, et m’a dit: Ramène-le avec toi dans ta maison, et qu’il mange du pain et boive de l’eau. Il lui mentait. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'L’homme de Dieu retourna avec lui, et il mangea du pain et but de l’eau dans sa maison. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Comme ils étaient assis à table, la parole de l’Éternel fut adressée au prophète qui l’avait ramené. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Et il cria à l’homme de Dieu qui était venu de Juda: Ainsi parle l’Éternel: Parce que tu as été rebelle à l’ordre de l’Éternel, et que tu n’as pas observé le commandement que l’Éternel, ton Dieu, t’avait donné; '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'parce que tu es retourné, et que tu as mangé du pain et bu de l’eau dans le lieu dont il t’avait dit: Tu n’y mangeras point de pain et tu n’y boiras point d’eau, ton cadavre n’entrera pas dans le sépulcre de tes pères. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Et quand le prophète qu’il avait ramené eut mangé du pain et qu’il eut bu de l’eau, il sella l’âne pour lui. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'L’homme de Dieu s’en alla: et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 20:36
      metadata:
        usfm: 1KI.20.36
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'il fut rencontré dans le chemin par un lion qui le tua. Son cadavre était étendu dans le chemin; l’âne resta près de lui, et le lion se tint à côté du cadavre. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Et voici, des gens qui passaient virent le cadavre étendu dans le chemin et le lion se tenant à côté du cadavre; et ils en parlèrent à leur arrivée dans la ville où demeurait le vieux prophète. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Lorsque le prophète qui avait ramené du chemin l’homme de Dieu l’eut appris, il dit: C’est l’homme de Dieu qui a été rebelle à l’ordre de l’Éternel, et l’Éternel l’a livré au lion, qui l’a déchiré et l’a fait mourir, selon la parole que l’Éternel lui avait dite. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Puis, s’adressant à ses fils, il dit: Sellez-moi l’âne. Ils le sellèrent, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'et il partit. Il trouva le cadavre étendu dans le chemin, et l’âne et le lion qui se tenaient à côté du cadavre. Le lion n’avait pas dévoré le cadavre et n’avait pas déchiré l’âne. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Le prophète releva le cadavre de l’homme de Dieu, le plaça sur l’âne, et le ramena; et le vieux prophète rentra dans la ville pour le pleurer et pour l’enterrer. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Il mit son cadavre dans le sépulcre, et l’on pleura sur lui, en disant: Hélas, mon frère! '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Après l’avoir enterré, il dit à ses fils: Quand je serai mort, vous m’enterrerez dans le sépulcre où est enterré l’homme de Dieu, vous déposerez mes os à côté de ses os. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Car elle s’accomplira, la parole '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 23:16
      metadata:
        usfm: 2KI.23.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: qu’il a criée, de la part de l’Éternel, contre l’autel de Béthel et contre toutes les maisons des hauts lieux qui sont dans les villes de Samarie.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 33-34: cf. 1 R 14:7-10; 15:25-30. Pr 1:24, etc.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Après cet événement, Jéroboam ne se détourna point de sa mauvaise voie. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 12:31
      metadata:
        usfm: 1KI.12.31
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '32'
      metadata:
        usfm: 1KI.12.32
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il créa de nouveau des prêtres des hauts lieux pris parmi tout le peuple; quiconque en avait le désir, il le consacrait prêtre des hauts lieux. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ce fut là une occasion de péché pour la maison de Jéroboam, et c’est pour cela qu’elle a été exterminée et détruite de dessus la face de la terre.
