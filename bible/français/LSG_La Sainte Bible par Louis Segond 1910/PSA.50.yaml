document_id: PSA.50
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: És 1:2, 10-20. 1 S 15:22. Jé 7:21-23. Mi 6:1-8.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Psaume d’Asaph.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dieu, Dieu, l’Éternel, parle, et convoque la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Depuis le soleil levant jusqu’au soleil couchant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: De Sion, beauté parfaite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dieu resplendit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Il vient, notre Dieu, il ne reste pas en silence;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Devant lui est un feu dévorant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Autour de lui une violente tempête.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Il crie vers les cieux en haut,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et vers la terre, pour juger son peuple:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Rassemblez-moi mes fidèles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui ont fait alliance avec moi par le sacrifice!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Et les cieux publieront sa justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Car c’est Dieu qui est juge. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: — Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Écoute, mon peuple! Et je parlerai;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Israël! Et je t’avertirai.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je suis Dieu, ton Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ce n’est pas pour tes sacrifices que je te fais des reproches;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tes holocaustes sont constamment devant moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Je ne prendrai pas de taureau dans ta maison,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ni de bouc dans tes bergeries.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Car tous les animaux des forêts sont à moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toutes les bêtes des montagnes par milliers;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Je connais tous les oiseaux des montagnes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tout ce qui se meut dans les champs m’appartient.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Si j’avais faim, je ne te le dirais pas,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 19:5
      metadata:
        usfm: EXO.19.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 10:14
      metadata:
        usfm: DEU.10.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 41:2
      metadata:
        usfm: JOB.41.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 24:1
      metadata:
        usfm: PSA.24.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 10:26
      metadata:
        usfm: 1CO.10.26
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '28'
      metadata:
        usfm: 1CO.10.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Car le monde est à moi et tout ce qu’il renferme.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Est-ce que je mange la chair des taureaux?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Est-ce que je bois le sang des boucs?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Offre pour sacrifice à Dieu des actions de grâces,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 23:23
      metadata:
        usfm: DEU.23.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 22:27
      metadata:
        usfm: JOB.22.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 76:12
      metadata:
        usfm: PSA.76.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ec 5:3
      metadata:
        usfm: ECC.5.3
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '4'
      metadata:
        usfm: ECC.5.4
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '5'
      metadata:
        usfm: ECC.5.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et accomplis tes vœux envers le Très-Haut.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Et invoque-moi au jour de la détresse;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je te délivrerai, et tu me glorifieras.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Et Dieu dit au méchant:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quoi donc! Tu énumères mes lois,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tu as mon alliance à la bouche,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Toi qui hais les avis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui jettes mes paroles derrière toi!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Si tu vois un voleur, tu te plais avec lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ta part est avec les adultères.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tu livres ta bouche au mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ta langue est un tissu de tromperies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tu t’assieds, et tu parles contre ton frère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu diffames le fils de ta mère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Voilà ce que tu as fait, et je me suis tu.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu t’es imaginé que je te ressemblais;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais je vais te reprendre, et tout mettre sous tes yeux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Prenez-y donc garde, vous qui oubliez Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De peur que je ne déchire, sans que personne délivre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Celui qui offre pour sacrifice des actions de grâces me glorifie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et à celui qui veille sur sa voie
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je ferai voir le salut de Dieu.
