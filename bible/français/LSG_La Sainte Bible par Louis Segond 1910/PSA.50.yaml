document_id: PSA.50,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: És 1:2, 10-20. 1 S 15:22. Jé 7:21-23. Mi 6:1-8.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Psaume d’Asaph.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu, Dieu, l’Éternel, parle, et convoque la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Depuis le soleil levant jusqu’au soleil couchant.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car tous les animaux des forêts sont à moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toutes les bêtes des montagnes par milliers;
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je connais tous les oiseaux des montagnes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tout ce qui se meut dans les champs m’appartient.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si j’avais faim, je ne te le dirais pas,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 19:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 10:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 41:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 24:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 10:26
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '28'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Car le monde est à moi et tout ce qu’il renferme.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Est-ce que je mange la chair des taureaux?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Est-ce que je bois le sang des boucs?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Offre pour sacrifice à Dieu des actions de grâces,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 23:23
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 22:27
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 76:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ec 5:3
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '4'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '5'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Et accomplis tes vœux envers le Très-Haut.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et invoque-moi au jour de la détresse;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je te délivrerai, et tu me glorifieras.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et Dieu dit au méchant:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quoi donc! Tu énumères mes lois,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tu as mon alliance à la bouche,
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toi qui hais les avis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qui jettes mes paroles derrière toi!
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si tu vois un voleur, tu te plais avec lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ta part est avec les adultères.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu livres ta bouche au mal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ta langue est un tissu de tromperies.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De Sion, beauté parfaite,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu resplendit.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu t’assieds, et tu parles contre ton frère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu diffames le fils de ta mère.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voilà ce que tu as fait, et je me suis tu.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu t’es imaginé que je te ressemblais;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais je vais te reprendre, et tout mettre sous tes yeux.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prenez-y donc garde, vous qui oubliez Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De peur que je ne déchire, sans que personne délivre.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui offre pour sacrifice des actions de grâces me glorifie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et à celui qui veille sur sa voie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ferai voir le salut de Dieu.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il vient, notre Dieu, il ne reste pas en silence;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Devant lui est un feu dévorant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Autour de lui une violente tempête.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il crie vers les cieux en haut,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et vers la terre, pour juger son peuple:'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rassemblez-moi mes fidèles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui ont fait alliance avec moi par le sacrifice!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les cieux publieront sa justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car c’est Dieu qui est juge. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: — Pause.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Écoute, mon peuple! Et je parlerai;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Israël! Et je t’avertirai.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis Dieu, ton Dieu.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce n’est pas pour tes sacrifices que je te fais des reproches;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes holocaustes sont constamment devant moi.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ne prendrai pas de taureau dans ta maison,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ni de bouc dans tes bergeries.
