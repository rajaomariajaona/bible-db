document_id: PSA.50,93
type_code: fra
verses:
  '1':
  - type: heading
    content: És 1:2, 10-20. 1 S 15:22. Jé 7:21-23. Mi 6:1-8.
  - type: text
    content: Psaume d’Asaph.
  - type: text
    content: Dieu, Dieu, l’Éternel, parle, et convoque la terre,
  - type: text
    content: Depuis le soleil levant jusqu’au soleil couchant.
  '10':
  - type: text
    content: Car tous les animaux des forêts sont à moi,
  - type: text
    content: Toutes les bêtes des montagnes par milliers;
  '11':
  - type: text
    content: Je connais tous les oiseaux des montagnes,
  - type: text
    content: Et tout ce qui se meut dans les champs m’appartient.
  '12':
  - type: text
    content: Si j’avais faim, je ne te le dirais pas,
  - type: note
    content: Ex 19:5. De 10:14. Job 41:2. Ps 24:1. 1 Co 10:26, 28.
  - type: text
    content: Car le monde est à moi et tout ce qu’il renferme.
  '13':
  - type: text
    content: Est-ce que je mange la chair des taureaux?
  - type: text
    content: Est-ce que je bois le sang des boucs?
  '14':
  - type: text
    content: Offre pour sacrifice à Dieu des actions de grâces,
  - type: note
    content: De 23:23. Job 22:27. Ps 76:12. Ec 5:3, 4, 5.
  - type: text
    content: Et accomplis tes vœux envers le Très-Haut.
  '15':
  - type: text
    content: Et invoque-moi au jour de la détresse;
  - type: text
    content: Je te délivrerai, et tu me glorifieras.
  '16':
  - type: text
    content: 'Et Dieu dit au méchant:'
  - type: text
    content: Quoi donc! Tu énumères mes lois,
  - type: text
    content: Et tu as mon alliance à la bouche,
  '17':
  - type: text
    content: Toi qui hais les avis,
  - type: text
    content: Et qui jettes mes paroles derrière toi!
  '18':
  - type: text
    content: Si tu vois un voleur, tu te plais avec lui,
  - type: text
    content: Et ta part est avec les adultères.
  '19':
  - type: text
    content: Tu livres ta bouche au mal,
  - type: text
    content: Et ta langue est un tissu de tromperies.
  '2':
  - type: text
    content: De Sion, beauté parfaite,
  - type: text
    content: Dieu resplendit.
  '20':
  - type: text
    content: Tu t’assieds, et tu parles contre ton frère,
  - type: text
    content: Tu diffames le fils de ta mère.
  '21':
  - type: text
    content: Voilà ce que tu as fait, et je me suis tu.
  - type: text
    content: Tu t’es imaginé que je te ressemblais;
  - type: text
    content: Mais je vais te reprendre, et tout mettre sous tes yeux.
  '22':
  - type: text
    content: Prenez-y donc garde, vous qui oubliez Dieu,
  - type: text
    content: De peur que je ne déchire, sans que personne délivre.
  '23':
  - type: text
    content: Celui qui offre pour sacrifice des actions de grâces me glorifie,
  - type: text
    content: Et à celui qui veille sur sa voie
  - type: text
    content: Je ferai voir le salut de Dieu.
  '3':
  - type: text
    content: Il vient, notre Dieu, il ne reste pas en silence;
  - type: text
    content: Devant lui est un feu dévorant,
  - type: text
    content: Autour de lui une violente tempête.
  '4':
  - type: text
    content: Il crie vers les cieux en haut,
  - type: text
    content: 'Et vers la terre, pour juger son peuple:'
  '5':
  - type: text
    content: Rassemblez-moi mes fidèles,
  - type: text
    content: Qui ont fait alliance avec moi par le sacrifice!
  '6':
  - type: text
    content: Et les cieux publieront sa justice,
  - type: text
    content: 'Car c’est Dieu qui est juge. '
  - type: text
    content: — Pause.
  '7':
  - type: text
    content: Écoute, mon peuple! Et je parlerai;
  - type: text
    content: Israël! Et je t’avertirai.
  - type: text
    content: Je suis Dieu, ton Dieu.
  '8':
  - type: text
    content: Ce n’est pas pour tes sacrifices que je te fais des reproches;
  - type: text
    content: Tes holocaustes sont constamment devant moi.
  '9':
  - type: text
    content: Je ne prendrai pas de taureau dans ta maison,
  - type: text
    content: Ni de bouc dans tes bergeries.
