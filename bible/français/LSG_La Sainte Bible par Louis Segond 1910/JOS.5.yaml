document_id: JOS.5
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La circoncision et la Pâque dans les plaines de Jéricho
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-8: cf. Ge 17:9-14, 23-27. (Col 2:11, 12.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Lorsque tous les rois des Amoréens à l’occident du Jourdain et tous les rois des Cananéens près de la mer apprirent que l’Éternel avait mis à sec les eaux du Jourdain devant les enfants d’Israël jusqu’à ce que nous eussions passé, ils perdirent courage et furent consternés à l’aspect des enfants d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'En ce temps-là, l’Éternel dit à Josué: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 4:25
      metadata:
        usfm: EXO.4.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Fais-toi des couteaux de pierre, et circoncis de nouveau les enfants d’Israël, une seconde fois. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Josué se fit des couteaux de pierre, et il circoncit les enfants d’Israël sur la colline d’Araloth. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Voici la raison pour laquelle Josué les circoncit. Tout le peuple sorti d’Égypte, les mâles, tous les hommes de guerre, étaient morts dans le désert, pendant la route, après leur sortie d’Égypte. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tout ce peuple sorti d’Égypte était circoncis; mais tout le peuple né dans le désert, pendant la route, après la sortie d’Égypte, n’avait point été circoncis. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Car les enfants d’Israël avaient marché quarante ans dans le désert jusqu’à la destruction de toute la nation des hommes de guerre qui étaient sortis d’Égypte et qui n’avaient point écouté la voix de l’Éternel; l’Éternel leur jura de ne pas '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 14:23
      metadata:
        usfm: NUM.14.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'leur faire voir le pays qu’il avait juré à leurs pères de nous donner, pays où coulent le lait et le miel. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ce sont leurs enfants qu’il établit à leur place; et Josué les circoncit, car ils étaient incirconcis, parce qu’on ne les avait point circoncis pendant la route. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Lorsqu’on eut achevé de circoncire toute la nation, ils restèrent à leur place dans le camp jusqu’à leur guérison.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 9-12: cf. (Ex 12:1-28. No 9:1-14.) (Ph 4:19.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'L’Éternel dit à Josué: Aujourd’hui, j’ai roulé de dessus vous l’opprobre de l’Égypte. Et ce lieu fut appelé du nom de Guilgal jusqu’à ce jour. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Les enfants d’Israël campèrent à Guilgal; et ils célébrèrent la Pâque '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 12:6
      metadata:
        usfm: EXO.12.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'le quatorzième jour du mois, sur le soir, dans les plaines de Jéricho. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ils mangèrent du blé du pays le lendemain de la Pâque, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 12:39
      metadata:
        usfm: EXO.12.39
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 2:14
      metadata:
        usfm: LEV.2.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'des pains sans levain et du grain rôti; ils en mangèrent ce même jour. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: La manne cessa le lendemain de la Pâque, quand ils mangèrent du blé du pays; les enfants d’Israël n’eurent plus de manne, et ils mangèrent des produits du pays de Canaan cette année-là.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 13-15: cf. Ex 3:1-10; 23:20-23. (Lu 22:43.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Comme Josué était près de Jéricho, il leva les yeux, et regarda. Voici, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: És 23:23.
    marker-yv: yv-n
  - type: text
    text: 'un homme se tenait debout devant lui, son épée nue dans la main. Il alla vers lui, et lui dit: Es-tu des nôtres ou de nos ennemis? '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il répondit: Non, mais je suis le chef de l’armée de l’Éternel, j’arrive maintenant. Josué tomba le visage contre terre, se prosterna, et lui dit: Qu’est-ce que mon seigneur dit à son serviteur? '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Et le chef de l’armée de l’Éternel dit à Josué: Ote tes souliers de tes pieds, car le lieu sur lequel tu te tiens est saint. Et Josué fit ainsi.'
