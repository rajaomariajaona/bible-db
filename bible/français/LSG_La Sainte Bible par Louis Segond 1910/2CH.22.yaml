document_id: 2CH.22
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Achazia, roi de Juda
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-9: cf. 2 R 8:24-29; 9:1-29.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 R 8:24, 25, etc.
    marker-yv: yv-n
  - type: text
    text: 'Les habitants de Jérusalem firent régner à sa place Achazia, son plus jeune fils; car la troupe venue au camp avec les Arabes avait tué tous les plus âgés. Ainsi régna Achazia, fils de Joram, roi de Juda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Achazia avait quarante-deux ans lorsqu’il devint roi, et il régna un an à Jérusalem. Sa mère s’appelait Athalie, fille d’Omri. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il marcha dans les voies de la maison d’Achab, car sa mère lui donnait des conseils impies. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il fit ce qui est mal aux yeux de l’Éternel, comme la maison d’Achab, où il eut après la mort de son père des conseillers pour sa perte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Entraîné par leur conseil, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 8:26
      metadata:
        usfm: 2KI.8.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'il alla avec Joram, fils d’Achab, roi d’Israël, à la guerre contre Hazaël, roi de Syrie, à Ramoth en Galaad. Et les Syriens blessèrent Joram. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Joram s’en retourna pour se faire guérir à Jizreel des blessures que les Syriens lui avaient faites à Rama, lorsqu’il se battait contre Hazaël, roi de Syrie. Azaria, fils de Joram, roi de Juda, descendit pour voir Joram, fils d’Achab, à Jizreel, parce qu’il était malade. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Par la volonté de Dieu, ce fut pour sa ruine qu’Achazia se rendit auprès de Joram. Lorsqu’il fut arrivé, il sortit avec Joram pour aller au-devant de Jéhu, fils de Nimschi, que l’Éternel avait oint pour exterminer la maison d’Achab. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Et comme Jéhu faisait justice de la maison d’Achab, il trouva les chefs de Juda et les fils des frères d’Achazia, qui étaient au service d’Achazia, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 10:14
      metadata:
        usfm: 2KI.10.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et il les tua. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 9:27
      metadata:
        usfm: 2KI.9.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il chercha Achazia, et on le saisit dans Samarie, où il s’était caché. On l’amena auprès de Jéhu, et on le fit mourir. Puis ils l’enterrèrent, car ils disaient: C’est le fils de Josaphat, qui cherchait l’Éternel de tout son cœur. Et il ne resta personne de la maison d’Achazia qui fût en état de régner.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Athalie, reine de Juda
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 10-12: cf. 2 R 11:1-3. Pr 28:28. És 8:17.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Athalie, mère d’Achazia, voyant que son fils était mort, se leva et fit périr toute la race royale de la maison de Juda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mais Joschabeath, fille du roi, prit Joas, fils d’Achazia, et l’enleva du milieu des fils du roi, quand on les fit mourir: elle le mit avec sa nourrice dans la chambre des lits. Ainsi Joschabeath, fille du roi Joram, femme du sacrificateur Jehojada, et sœur d’Achazia, le déroba aux regards d’Athalie, qui ne le fit point mourir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Il resta six ans caché avec eux dans la maison de Dieu. Et c’était Athalie qui régnait dans le pays.
