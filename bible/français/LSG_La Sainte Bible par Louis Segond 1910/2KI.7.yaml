document_id: 2KI.7,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Délivrance de Samarie, assiégée par les Syriens
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-20: cf. (Ps 53:6; 68:13. 2 Ch 20:14-25.) Hé 3:17-19. Jn 11:40.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Élisée dit: Écoutez la parole de l’Éternel! Ainsi parle l’Éternel: Demain, à cette heure, on aura une mesure de fleur de farine pour un sicle et deux mesures d’orge pour un sicle, à la porte de Samarie. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ils partirent, et ils appelèrent les gardes de la porte de la ville, auxquels ils firent ce rapport: Nous sommes entrés dans le camp des Syriens, et voici, il n’y a personne, on n’y entend aucune voix d’homme; il n’y a que des chevaux attachés et des ânes attachés, et les tentes comme elles étaient. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Les gardes de la porte crièrent, et ils transmirent ce rapport à l’intérieur de la maison du roi. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Le roi se leva de nuit, et il dit à ses serviteurs: Je veux vous communiquer ce que nous font les Syriens. Comme ils savent que nous sommes affamés, ils ont quitté le camp pour se cacher dans les champs, et ils se sont dit: Quand ils sortiront de la ville, nous les saisirons vivants, et nous entrerons dans la ville. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'L’un des serviteurs du roi répondit: Que l’on prenne cinq des chevaux qui restent encore dans la ville, ils sont comme toute la multitude d’Israël qui y est restée, ils sont comme toute la multitude d’Israël qui dépérit, et envoyons voir ce qui se passe. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'On prit deux chars avec les chevaux, et le roi envoya des messagers sur les traces de l’armée des Syriens, en disant: Allez et voyez. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ils allèrent après eux jusqu’au Jourdain; et voici, toute la route était pleine de vêtements et d’objets que les Syriens avaient jetés dans leur précipitation. Les messagers revinrent, et le rapportèrent au roi. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Le peuple sortit, et pilla le camp des Syriens. Et l’on eut une mesure de fleur de farine pour un sicle et deux mesures d’orge pour un sicle, selon la parole de l’Éternel. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Le roi avait remis la garde de la porte à l’officier sur la main duquel il s’appuyait; mais cet officier fut écrasé à la porte par le peuple et il mourut, selon la parole qu’avait prononcée l’homme de Dieu quand le roi était descendu vers lui. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'L’homme de Dieu avait dit alors au roi: On aura deux mesures d’orge pour un sicle et une mesure de fleur de farine pour un sicle, demain, à cette heure, à la porte de Samarie. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Et l’officier avait répondu à l’homme de Dieu: Quand l’Éternel ferait des fenêtres au ciel, pareille chose arriverait-elle? Et Élisée avait dit: Tu le verras de tes yeux; mais tu n’en mangeras point. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'L’officier sur la main duquel s’appuyait le roi répondit à l’homme de Dieu: Quand l’Éternel ferait des fenêtres au ciel, pareille chose arriverait-elle? Et Élisée dit: Tu le verras de tes yeux; mais tu n’en mangeras point. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'C’est en effet ce qui lui arriva: il fut écrasé à la porte par le peuple, et il mourut.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Il y avait '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 13:46
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'à l’entrée de la porte quatre lépreux, qui se dirent l’un à l’autre: Quoi! Resterons-nous ici jusqu’à ce que nous mourions? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Si nous songeons à entrer dans la ville, la famine est dans la ville, et nous y mourrons; et si nous restons ici, nous mourrons également. Allons nous jeter dans le camp des Syriens; s’ils nous laissent vivre, nous vivrons et s’ils nous font mourir, nous mourrons. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ils partirent donc au crépuscule, pour se rendre au camp des Syriens; et lorsqu’ils furent arrivés à l’entrée du camp des Syriens, voici, il n’y avait personne. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Le Seigneur avait fait entendre dans le camp des Syriens '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 13:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'un bruit de chars et un bruit de chevaux, le bruit d’une grande armée, et ils s’étaient dit l’un à l’autre: Voici, le roi d’Israël a pris à sa solde contre nous les rois des Héthiens et les rois des Égyptiens pour venir nous attaquer. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Et ils se levèrent et prirent la fuite au crépuscule, abandonnant leurs tentes, leurs chevaux et leurs ânes, le camp tel qu’il était, et ils s’enfuirent pour sauver leur vie. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Les lépreux, étant arrivés à l’entrée du camp, pénétrèrent dans une tente, mangèrent et burent, et en emportèrent de l’argent, de l’or, et des vêtements, qu’ils allèrent cacher. Ils revinrent, pénétrèrent dans une autre tente, et en emportèrent des objets qu’ils allèrent cacher. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Puis ils se dirent l’un à l’autre: Nous n’agissons pas bien! Cette journée est une journée de bonne nouvelle; si nous gardons le silence et si nous attendons jusqu’à la lumière du matin, le châtiment nous atteindra. Venez maintenant, et allons informer la maison du roi. '
