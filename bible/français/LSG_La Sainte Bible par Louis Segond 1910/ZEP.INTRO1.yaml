- type: usfm
  marker: imt1
  children:
  - type: text
    text: INTRODUCTION AU LIVRE DE SOPHONIE
- type: usfm
  marker: imt3
  children:
  - type: text
    text: (Lu 19:41-44. De 30:1-10. Ha 3:18.)
- type: usfm
  marker: ip
  children:
  - type: text
    text: Ce livre est intitulé «Sophonie» (Dieu le protège), du nom du prophète inspiré à l’époque où Josias, fils d’Amon, était roi de Juda. Sophonie était fils de Cuschi et arrière-petit-fils d’Ézéchias. La question ici est celle de savoir si Dieu s’intéresse vraiment aux hommes et mène encore l’histoire. Le prophète répond à cette double interrogation à un moment dramatique de l’histoire de Juda.
- type: usfm
  marker: ip
  children:
  - type: text
    text: Les chapitres 1:1 à 2:3 annonçaient que Dieu viendrait juger les habitants de Jérusalem en particulier, et de Juda en général. Les autres êtres vivants et même l’environnement en seraient concernés. Le châtiment divin toucherait toutes les catégories sociales de Juda. Elles s’étaient détournées de Dieu.
- type: usfm
  marker: ip
  children:
  - type: text
    text: Jérusalem ne cherchait pas le Seigneur (1:6; 3:6). C’était là son péché. Il en résulta de multiples compromissions religieuses telles l’idolâtrie (1:4, 8), une suffisance orgueilleuse (3:11), une confiance futile dans les richesses (1:11, 18) et l’incrédulité (1:12). Les responsables du peuple devinrent des traîtres par rapport à la mission initiale.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le chapitre 2:4-15 montre que Dieu allait détruire aussi les nations voisines de Juda. Les raisons étaient multiples: arrogance, outrage, agression et oppression du peuple de Dieu. Étaient concernés: Gaza, Askalon, Ékron, Canaan, Moab, Ammon, l’Éthiopie, l’Assyrie entre autres.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Au chapitre 3, le Dieu restaurateur fait savoir qu’il laissera un peuple humble dans le pays. Certes Jérusalem n’avait pas écouté l’appel de Dieu (3:1-8). Cependant, les humbles déjà appelés (2:1-8) se convertiront (3:9-10) et constitueront le reste d’Israël (3:11-13). Enfin, Dieu restaurera Jérusalem. Il résuma sa volonté en ces termes: '
  - type: usfm
    marker: it
    children:
    - type: text
      text: «Je ferai de vous un sujet de louange et de gloire…»
  - type: text
    text: ' (3:19-20). Il s’agit bien des humbles du pays (2:3; 3:12).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Sophonie annonce aux humbles de tous les temps la tendresse divine dont ils sont l’objet. L’Éternel s’en prend à tous ceux qui font passer leurs intérêts personnels avant ses exigences.
