document_id: PSA.149,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Ps 47; 48.) Za 9:9, 12-17. Ap 2:26, 27.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Louez l’Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Chantez à l’Éternel un cantique nouveau!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Chantez ses louanges dans l’assemblée des fidèles!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Qu’Israël se réjouisse en '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 100:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: celui qui l’a créé!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que les fils de Sion soient dans l’allégresse à cause de leur roi!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 81:3
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '4'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Qu’ils louent son nom avec des danses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’ils le célèbrent avec le tambourin et la harpe!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car l’Éternel prend plaisir à son peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il glorifie les malheureux en les sauvant.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que les fidèles triomphent dans la gloire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’ils poussent des cris de joie sur leur couche!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que les louanges de Dieu soient dans leur bouche,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Th 2:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 4:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 1:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Et le glaive à deux tranchants dans leur main,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour exercer la vengeance sur les nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour châtier les peuples,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 18:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Pour lier leurs rois avec des chaînes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et leurs grands avec des ceps de fer,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour exécuter contre eux le jugement qui est écrit!
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 4:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: C’est une gloire pour tous ses fidèles.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Louez l’Éternel!
