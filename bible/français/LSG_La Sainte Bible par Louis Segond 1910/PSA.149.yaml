document_id: PSA.149,93
type_code: fra
verses:
  '1':
  - type: heading
    content: (Ps 47; 48.) Za 9:9, 12-17. Ap 2:26, 27.
  - type: text
    content: Louez l’Éternel!
  - type: text
    content: Chantez à l’Éternel un cantique nouveau!
  - type: text
    content: Chantez ses louanges dans l’assemblée des fidèles!
  '2':
  - type: text
    content: 'Qu’Israël se réjouisse en '
  - type: note
    content: Ps 100:3.
  - type: text
    content: celui qui l’a créé!
  - type: text
    content: Que les fils de Sion soient dans l’allégresse à cause de leur roi!
  '3':
  - type: text
    content: ' '
  - type: note
    content: Ps 81:3, 4.
  - type: text
    content: Qu’ils louent son nom avec des danses,
  - type: text
    content: Qu’ils le célèbrent avec le tambourin et la harpe!
  '4':
  - type: text
    content: Car l’Éternel prend plaisir à son peuple,
  - type: text
    content: Il glorifie les malheureux en les sauvant.
  '5':
  - type: text
    content: Que les fidèles triomphent dans la gloire,
  - type: text
    content: Qu’ils poussent des cris de joie sur leur couche!
  '6':
  - type: text
    content: Que les louanges de Dieu soient dans leur bouche,
  - type: note
    content: 2 Th 2:8. Hé 4:12. Ap 1:16.
  - type: text
    content: Et le glaive à deux tranchants dans leur main,
  '7':
  - type: text
    content: Pour exercer la vengeance sur les nations,
  - type: text
    content: Pour châtier les peuples,
  '8':
  - type: text
    content: ' '
  - type: note
    content: Mt 18:18.
  - type: text
    content: Pour lier leurs rois avec des chaînes
  - type: text
    content: Et leurs grands avec des ceps de fer,
  '9':
  - type: text
    content: Pour exécuter contre eux le jugement qui est écrit!
  - type: note
    content: De 4:6.
  - type: text
    content: C’est une gloire pour tous ses fidèles.
  - type: text
    content: Louez l’Éternel!
