document_id: ROM.3,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-8: cf. Ro 9:4-21. Mt 3:8-10.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quel est donc l’avantage des Juifs, ou quelle est l’utilité de la circoncision? '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'selon qu’il est écrit:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 14:3
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 53:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il n’y a point de juste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pas même un seul;
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nul n’est intelligent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nul ne cherche Dieu;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous sont égarés, tous sont pervertis;
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n’en est aucun qui fasse le bien,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pas même un seul;
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 5:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Leur gosier est un sépulcre ouvert;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils se servent de leurs langues pour tromper;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 140:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ils ont sous leurs lèvres un venin d’aspic;
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 10:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Leur bouche est pleine de malédiction et d’amertume;
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 1:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 59:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ils ont les pieds légers pour répandre le sang;
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La destruction et le malheur sont sur leur route;
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ne connaissent pas le chemin de la paix;
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 36:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: La crainte de Dieu n’est pas devant leurs yeux.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or, nous savons que tout ce que dit la loi, elle le dit à ceux qui sont sous la loi, afin que toute bouche soit fermée, et que tout le monde soit reconnu coupable devant Dieu. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il est grand de toute manière, et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 147:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 9:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'tout d’abord en ce que les oracles de Dieu leur ont été confiés. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 2:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Car nul ne sera justifié devant lui par les œuvres de la loi, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 7:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 7:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: puisque c’est par la loi que vient la connaissance du péché.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La justification par la foi en Jésus-Christ
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 21-30: cf. És 53:11. Ac 10:43. 2 Co 5:21. Ga 2:15, 16; 3:8-14, 22-29. Ép 2:7-9.'
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais maintenant, sans la loi est manifestée '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 1:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ph 3:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'la justice de Dieu, à laquelle rendent témoignage la loi et les prophètes, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'justice de Dieu par la foi en Jésus-Christ pour tous ceux qui croient. Il n’y a point de distinction. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car tous ont péché et sont privés de la gloire de Dieu; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 53:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'et ils sont gratuitement justifiés par sa grâce, par le moyen de la rédemption qui est en Jésus-Christ. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 5:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 1:20
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 4:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Jn 4:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'C’est lui que Dieu a destiné, par son sang, à être, pour ceux qui croiraient, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 25:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'victime propitiatoire, afin de montrer sa justice, parce qu’il avait laissé impunis les péchés commis auparavant, au temps de sa patience, afin, dis-je, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'de montrer sa justice dans le temps présent, de manière à être juste tout en justifiant celui qui a la foi en Jésus. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Où donc est le sujet de se glorifier? Il est exclu. Par quelle loi? Par la loi des œuvres? Non, mais par la loi de la foi. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 13:38
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 8:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 2:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 7:25
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Car nous pensons que l’homme est justifié par la foi, sans les œuvres de la loi. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ou bien Dieu est-il seulement le Dieu des Juifs? Ne l’est-il pas aussi des païens? Oui, il l’est aussi des païens, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eh quoi! Si quelques-uns n’ont pas cru, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 23:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 9:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ti 2:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'leur incrédulité anéantira-t-elle la fidélité de Dieu? '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: puisqu’il y a un seul Dieu, qui justifiera par la foi les circoncis, et par la foi les incirconcis.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'La justification par la foi d’accord avec l’Écriture: exemple d’Abraham'
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: '3 v. 31 à 4 v. 12: cf. (Ge 15:5, 6; 17:9, etc.) Ga 3:6-9, 29. Ps 32.'
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Anéantissons-nous donc la loi par la foi? Loin de là! Au contraire, nous confirmons la loi.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Loin de là! '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 3:33
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Que Dieu, au contraire, soit reconnu pour vrai, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 116:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'et tout homme pour menteur, selon qu’il est écrit:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 51:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Afin que tu sois trouvé juste dans tes paroles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et que tu triomphes lorsqu’on te juge. '
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mais si notre injustice établit la justice de Dieu, que dirons-nous? Dieu est-il injuste quand il déchaîne sa colère? (Je parle à la manière des hommes.) '
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Loin de là! Autrement, comment Dieu jugerait-il le monde? '
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et si, par mon mensonge, la vérité de Dieu éclate davantage pour sa gloire, pourquoi suis-je moi-même encore jugé comme pécheur? '
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et pourquoi ne ferions-nous pas le mal afin qu’il en arrive du bien, comme quelques-uns, qui nous calomnient, prétendent que nous le disons? La condamnation de ces gens est juste.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 9-20: cf. (Ec 7:20. Job 15:14-16. Ge 6:5, 11, 12. Ps 14:1-3.) Ga 3:22.'
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quoi donc! Sommes-nous plus excellents? Nullement. Car nous avons déjà prouvé que tous, Juifs et Grecs, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 3:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'sont sous l’empire du péché, '
