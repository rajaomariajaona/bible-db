document_id: ROM.3,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-8: cf. Ro 9:4-21. Mt 3:8-10.'
  - type: text
    content: 'Quel est donc l’avantage des Juifs, ou quelle est l’utilité de la circoncision? '
  '10':
  - type: text
    content: 'selon qu’il est écrit:'
  - type: note
    content: Ps 14:3; 53:4.
  - type: text
    content: Il n’y a point de juste,
  - type: text
    content: Pas même un seul;
  '11':
  - type: text
    content: Nul n’est intelligent,
  - type: text
    content: Nul ne cherche Dieu;
  - type: text
    content: Tous sont égarés, tous sont pervertis;
  '12':
  - type: text
    content: Il n’en est aucun qui fasse le bien,
  - type: text
    content: Pas même un seul;
  '13':
  - type: text
    content: ' '
  - type: note
    content: Ps 5:10.
  - type: text
    content: Leur gosier est un sépulcre ouvert;
  - type: text
    content: Ils se servent de leurs langues pour tromper;
  - type: note
    content: Ps 140:4.
  - type: text
    content: Ils ont sous leurs lèvres un venin d’aspic;
  '14':
  - type: text
    content: ' '
  - type: note
    content: Ps 10:7.
  - type: text
    content: Leur bouche est pleine de malédiction et d’amertume;
  '15':
  - type: text
    content: ' '
  - type: note
    content: Pr 1:16. És 59:7.
  - type: text
    content: Ils ont les pieds légers pour répandre le sang;
  '16':
  - type: text
    content: La destruction et le malheur sont sur leur route;
  '17':
  - type: text
    content: Ils ne connaissent pas le chemin de la paix;
  '18':
  - type: text
    content: ' '
  - type: note
    content: Ps 36:2.
  - type: text
    content: La crainte de Dieu n’est pas devant leurs yeux.
  '19':
  - type: text
    content: 'Or, nous savons que tout ce que dit la loi, elle le dit à ceux qui sont sous la loi, afin que toute bouche soit fermée, et que tout le monde soit reconnu coupable devant Dieu. '
  '2':
  - type: text
    content: 'Il est grand de toute manière, et '
  - type: note
    content: Ps 147:19. Ro 9:4.
  - type: text
    content: 'tout d’abord en ce que les oracles de Dieu leur ont été confiés. '
  '20':
  - type: note
    content: Ga 2:16.
  - type: text
    content: 'Car nul ne sera justifié devant lui par les œuvres de la loi, '
  - type: note
    content: Ro 7:7. Hé 7:18.
  - type: text
    content: puisque c’est par la loi que vient la connaissance du péché.
  - type: heading
    content: La justification par la foi en Jésus-Christ
  - type: heading
    content: 'V. 21-30: cf. És 53:11. Ac 10:43. 2 Co 5:21. Ga 2:15, 16; 3:8-14, 22-29. Ép 2:7-9.'
  '21':
  - type: text
    content: 'Mais maintenant, sans la loi est manifestée '
  - type: note
    content: Ro 1:17. Ph 3:9.
  - type: text
    content: 'la justice de Dieu, à laquelle rendent témoignage la loi et les prophètes, '
  '22':
  - type: text
    content: 'justice de Dieu par la foi en Jésus-Christ pour tous ceux qui croient. Il n’y a point de distinction. '
  '23':
  - type: text
    content: 'Car tous ont péché et sont privés de la gloire de Dieu; '
  '24':
  - type: note
    content: És 53:5.
  - type: text
    content: 'et ils sont gratuitement justifiés par sa grâce, par le moyen de la rédemption qui est en Jésus-Christ. '
  '25':
  - type: note
    content: 2 Co 5:19. Col 1:20. Hé 4:16. 1 Jn 4:10.
  - type: text
    content: 'C’est lui que Dieu a destiné, par son sang, à être, pour ceux qui croiraient, '
  - type: note
    content: Ex 25:17.
  - type: text
    content: 'victime propitiatoire, afin de montrer sa justice, parce qu’il avait laissé impunis les péchés commis auparavant, au temps de sa patience, afin, dis-je, '
  '26':
  - type: text
    content: 'de montrer sa justice dans le temps présent, de manière à être juste tout en justifiant celui qui a la foi en Jésus. '
  '27':
  - type: text
    content: 'Où donc est le sujet de se glorifier? Il est exclu. Par quelle loi? Par la loi des œuvres? Non, mais par la loi de la foi. '
  '28':
  - type: note
    content: Ac 13:38. Ro 8:3. Ga 2:16. Hé 7:25.
  - type: text
    content: 'Car nous pensons que l’homme est justifié par la foi, sans les œuvres de la loi. '
  '29':
  - type: text
    content: 'Ou bien Dieu est-il seulement le Dieu des Juifs? Ne l’est-il pas aussi des païens? Oui, il l’est aussi des païens, '
  '3':
  - type: text
    content: 'Eh quoi! Si quelques-uns n’ont pas cru, '
  - type: note
    content: No 23:19. Ro 9:6. 2 Ti 2:13.
  - type: text
    content: 'leur incrédulité anéantira-t-elle la fidélité de Dieu? '
  '30':
  - type: text
    content: puisqu’il y a un seul Dieu, qui justifiera par la foi les circoncis, et par la foi les incirconcis.
  - type: heading
    content: 'La justification par la foi d’accord avec l’Écriture: exemple d’Abraham'
  - type: heading
    content: '3 v. 31 à 4 v. 12: cf. (Ge 15:5, 6; 17:9, etc.) Ga 3:6-9, 29. Ps 32.'
  '31':
  - type: text
    content: Anéantissons-nous donc la loi par la foi? Loin de là! Au contraire, nous confirmons la loi.
  '4':
  - type: text
    content: 'Loin de là! '
  - type: note
    content: Jn 3:33.
  - type: text
    content: 'Que Dieu, au contraire, soit reconnu pour vrai, '
  - type: note
    content: Ps 116:11.
  - type: text
    content: 'et tout homme pour menteur, selon qu’il est écrit:'
  - type: note
    content: Ps 51:6.
  - type: text
    content: Afin que tu sois trouvé juste dans tes paroles,
  - type: text
    content: 'Et que tu triomphes lorsqu’on te juge. '
  '5':
  - type: text
    content: 'Mais si notre injustice établit la justice de Dieu, que dirons-nous? Dieu est-il injuste quand il déchaîne sa colère? (Je parle à la manière des hommes.) '
  '6':
  - type: text
    content: 'Loin de là! Autrement, comment Dieu jugerait-il le monde? '
  '7':
  - type: text
    content: 'Et si, par mon mensonge, la vérité de Dieu éclate davantage pour sa gloire, pourquoi suis-je moi-même encore jugé comme pécheur? '
  '8':
  - type: text
    content: Et pourquoi ne ferions-nous pas le mal afin qu’il en arrive du bien, comme quelques-uns, qui nous calomnient, prétendent que nous le disons? La condamnation de ces gens est juste.
  - type: heading
    content: 'V. 9-20: cf. (Ec 7:20. Job 15:14-16. Ge 6:5, 11, 12. Ps 14:1-3.) Ga 3:22.'
  '9':
  - type: text
    content: 'Quoi donc! Sommes-nous plus excellents? Nullement. Car nous avons déjà prouvé que tous, Juifs et Grecs, '
  - type: note
    content: Ga 3:22.
  - type: text
    content: 'sont sous l’empire du péché, '
