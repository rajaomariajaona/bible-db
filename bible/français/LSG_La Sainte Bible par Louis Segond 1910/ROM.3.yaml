document_id: ROM.3
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-8: cf. Ro 9:4-21. Mt 3:8-10.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Quel est donc l’avantage des Juifs, ou quelle est l’utilité de la circoncision? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il est grand de toute manière, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 147:19
      metadata:
        usfm: PSA.147.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 9:4
      metadata:
        usfm: ROM.9.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'tout d’abord en ce que les oracles de Dieu leur ont été confiés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Eh quoi! Si quelques-uns n’ont pas cru, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 23:19
      metadata:
        usfm: NUM.23.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 9:6
      metadata:
        usfm: ROM.9.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ti 2:13
      metadata:
        usfm: 2TI.2.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'leur incrédulité anéantira-t-elle la fidélité de Dieu? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Loin de là! '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 3:33
      metadata:
        usfm: JHN.3.33
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Que Dieu, au contraire, soit reconnu pour vrai, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 116:11
      metadata:
        usfm: PSA.116.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et tout homme pour menteur, selon qu’il est écrit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 51:6
      metadata:
        usfm: PSA.51.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Afin que tu sois trouvé juste dans tes paroles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et que tu triomphes lorsqu’on te juge. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mais si notre injustice établit la justice de Dieu, que dirons-nous? Dieu est-il injuste quand il déchaîne sa colère? (Je parle à la manière des hommes.) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Loin de là! Autrement, comment Dieu jugerait-il le monde? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Et si, par mon mensonge, la vérité de Dieu éclate davantage pour sa gloire, pourquoi suis-je moi-même encore jugé comme pécheur? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Et pourquoi ne ferions-nous pas le mal afin qu’il en arrive du bien, comme quelques-uns, qui nous calomnient, prétendent que nous le disons? La condamnation de ces gens est juste.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 9-20: cf. (Ec 7:20. Job 15:14-16. Ge 6:5, 11, 12. Ps 14:1-3.) Ga 3:22.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Quoi donc! Sommes-nous plus excellents? Nullement. Car nous avons déjà prouvé que tous, Juifs et Grecs, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 3:22
      metadata:
        usfm: GAL.3.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'sont sous l’empire du péché, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'selon qu’il est écrit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 14:3
      metadata:
        usfm: PSA.14.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 53:4
      metadata:
        usfm: PSA.53.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il n’y a point de juste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pas même un seul;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Nul n’est intelligent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nul ne cherche Dieu;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous sont égarés, tous sont pervertis;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Il n’en est aucun qui fasse le bien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pas même un seul;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 5:10
      metadata:
        usfm: PSA.5.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Leur gosier est un sépulcre ouvert;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils se servent de leurs langues pour tromper;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 140:4
      metadata:
        usfm: PSA.140.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ils ont sous leurs lèvres un venin d’aspic;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 10:7
      metadata:
        usfm: PSA.10.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Leur bouche est pleine de malédiction et d’amertume;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 1:16
      metadata:
        usfm: PRO.1.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 59:7
      metadata:
        usfm: ISA.59.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ils ont les pieds légers pour répandre le sang;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: La destruction et le malheur sont sur leur route;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ils ne connaissent pas le chemin de la paix;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 36:2
      metadata:
        usfm: PSA.36.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: La crainte de Dieu n’est pas devant leurs yeux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Or, nous savons que tout ce que dit la loi, elle le dit à ceux qui sont sous la loi, afin que toute bouche soit fermée, et que tout le monde soit reconnu coupable devant Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 2:16
      metadata:
        usfm: GAL.2.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Car nul ne sera justifié devant lui par les œuvres de la loi, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 7:7
      metadata:
        usfm: ROM.7.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 7:18
      metadata:
        usfm: HEB.7.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: puisque c’est par la loi que vient la connaissance du péché.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La justification par la foi en Jésus-Christ
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 21-30: cf. És 53:11. Ac 10:43. 2 Co 5:21. Ga 2:15, 16; 3:8-14, 22-29. Ép 2:7-9.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Mais maintenant, sans la loi est manifestée '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 1:17
      metadata:
        usfm: ROM.1.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 3:9
      metadata:
        usfm: PHP.3.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'la justice de Dieu, à laquelle rendent témoignage la loi et les prophètes, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'justice de Dieu par la foi en Jésus-Christ pour tous ceux qui croient. Il n’y a point de distinction. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Car tous ont péché et sont privés de la gloire de Dieu; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 53:5
      metadata:
        usfm: ISA.53.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et ils sont gratuitement justifiés par sa grâce, par le moyen de la rédemption qui est en Jésus-Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 5:19
      metadata:
        usfm: 2CO.5.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 1:20
      metadata:
        usfm: COL.1.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 4:16
      metadata:
        usfm: HEB.4.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 4:10
      metadata:
        usfm: 1JN.4.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'C’est lui que Dieu a destiné, par son sang, à être, pour ceux qui croiraient, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 25:17
      metadata:
        usfm: EXO.25.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'victime propitiatoire, afin de montrer sa justice, parce qu’il avait laissé impunis les péchés commis auparavant, au temps de sa patience, afin, dis-je, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'de montrer sa justice dans le temps présent, de manière à être juste tout en justifiant celui qui a la foi en Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Où donc est le sujet de se glorifier? Il est exclu. Par quelle loi? Par la loi des œuvres? Non, mais par la loi de la foi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 13:38
      metadata:
        usfm: ACT.13.38
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 8:3
      metadata:
        usfm: ROM.8.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 2:16
      metadata:
        usfm: GAL.2.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 7:25
      metadata:
        usfm: HEB.7.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Car nous pensons que l’homme est justifié par la foi, sans les œuvres de la loi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ou bien Dieu est-il seulement le Dieu des Juifs? Ne l’est-il pas aussi des païens? Oui, il l’est aussi des païens, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: puisqu’il y a un seul Dieu, qui justifiera par la foi les circoncis, et par la foi les incirconcis.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'La justification par la foi d’accord avec l’Écriture: exemple d’Abraham'
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: '3 v. 31 à 4 v. 12: cf. (Ge 15:5, 6; 17:9, etc.) Ga 3:6-9, 29. Ps 32.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Anéantissons-nous donc la loi par la foi? Loin de là! Au contraire, nous confirmons la loi.
