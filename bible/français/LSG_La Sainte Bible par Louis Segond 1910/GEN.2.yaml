document_id: GEN.2
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-3: cf. (Ex 20:8-11. És 58:13, 14.) Mc 2:27.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ainsi furent achevés les cieux et la terre, et toute leur armée. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Ex 20:11, 31, 17. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 5:14
      metadata:
        usfm: DEU.5.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 4:4
      metadata:
        usfm: HEB.4.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Dieu acheva au septième jour son œuvre, qu’il avait faite: et il se reposa au septième jour de toute son œuvre, qu’il avait faite. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Dieu bénit le septième jour, et il le sanctifia, parce qu’en ce jour il se reposa de toute son œuvre qu’il avait créée en la faisant.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Formation de l’homme et de la femme
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 4-7: cf. Ge 1:26-28. 1 Co 15:45-49.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Voici les origines des cieux et de la terre, quand ils furent créés. Lorsque l’Éternel Dieu fit une terre et des cieux, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'aucun arbuste des champs n’était encore sur la terre, et aucune herbe des champs ne germait encore: car l’Éternel Dieu n’avait pas fait pleuvoir sur la terre, et il n’y avait point d’homme pour cultiver le sol. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Mais une vapeur s’éleva de la terre, et arrosa toute la surface du sol. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'L’Éternel Dieu forma l’homme de '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 15:47
      metadata:
        usfm: 1CO.15.47
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'la poussière de la terre, il souffla dans ses narines un souffle de vie et l’homme devint '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 15:45
      metadata:
        usfm: 1CO.15.45
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: un être vivant.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 8-17: cf. Ap 22:1, 2; 2:7.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Puis l’Éternel Dieu planta un jardin en Éden, du côté de l’orient, et il y mit l’homme qu’il avait formé. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'L’Éternel Dieu fit pousser du sol des arbres de toute espèce, agréables à voir et bons à manger, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 2:7
      metadata:
        usfm: REV.2.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'l’arbre de la vie au milieu du jardin, et l’arbre de la connaissance du bien et du mal. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Un fleuve sortait d’Éden pour arroser le jardin, et de là il se divisait en quatre bras. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Le nom du premier est Pischon; c’est celui qui entoure tout le pays de Havila, où se trouve l’or. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'L’or de ce pays est pur; on y trouve aussi le bdellium et la pierre d’onyx. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Le nom du second fleuve est Guihon; c’est celui qui entoure tout le pays de Cusch. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Le nom du troisième est Hiddékel; c’est celui qui coule à l’orient de l’Assyrie. Le quatrième fleuve, c’est l’Euphrate. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'L’Éternel Dieu prit l’homme, et le plaça dans le jardin d’Éden pour le cultiver et pour le garder. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'L’Éternel Dieu donna cet ordre à l’homme: Tu pourras manger de tous les arbres du jardin; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: mais tu ne mangeras pas de l’arbre de la connaissance du bien et du mal, car le jour où tu en mangeras, tu mourras.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 18-24: cf. (1 Co 11:7-10. 1 Ti 2:11-13.) (Ép 5:22-33. Mt 19:3-9.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'L’Éternel Dieu dit: Il n’est pas bon que l’homme soit seul; je lui ferai une aide semblable à lui. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'L’Éternel Dieu forma de la terre tous les animaux des champs et tous les oiseaux du ciel, et il les fit venir vers l’homme, pour voir comment il les appellerait, et afin que tout être vivant portât le nom que lui donnerait l’homme. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Et l’homme donna des noms à tout le bétail, aux oiseaux du ciel et à tous les animaux des champs; mais, pour l’homme, il ne trouva point d’aide semblable à lui. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Alors l’Éternel Dieu fit tomber un profond sommeil sur l’homme, qui s’endormit; il prit une de ses côtes, et referma la chair à sa place. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'L’Éternel Dieu forma une femme de la côte qu’il avait prise '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 11:8
      metadata:
        usfm: 1CO.11.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'de l’homme, et il l’amena vers l’homme. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Et l’homme dit: Voici cette fois celle qui est '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mal 2:14
      metadata:
        usfm: MAL.2.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 5:30
      metadata:
        usfm: EPH.5.30
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '31'
      metadata:
        usfm: EPH.5.31
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'os de mes os et chair de ma chair! On l’appellera femme, parce qu’elle a été prise de l’homme. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 19:5
      metadata:
        usfm: MAT.19.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 10:7
      metadata:
        usfm: MRK.10.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 5:31
      metadata:
        usfm: EPH.5.31
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'C’est pourquoi l’homme quittera son père et sa mère, et s’attachera à sa femme, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 6:16
      metadata:
        usfm: 1CO.6.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 5:28
      metadata:
        usfm: EPH.5.28
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '29'
      metadata:
        usfm: EPH.5.29
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: et ils deviendront une seule chair.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le jardin d’Éden, et le péché d’Adam
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: '2 v. 25 à 3 v. 6: cf. Mt 4:1-11. (2 Co 11:3. 1 Ti 2:14.) Mt 6:13.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'L’homme et sa femme étaient tous deux '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 3:7
      metadata:
        usfm: GEN.3.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: nus, et ils n’en avaient point honte.
