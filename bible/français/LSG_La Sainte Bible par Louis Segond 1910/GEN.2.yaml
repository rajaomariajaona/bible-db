document_id: GEN.2,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-3: cf. (Ex 20:8-11. És 58:13, 14.) Mc 2:27.'
  - type: text
    content: 'Ainsi furent achevés les cieux et la terre, et toute leur armée. '
  '10':
  - type: text
    content: 'Un fleuve sortait d’Éden pour arroser le jardin, et de là il se divisait en quatre bras. '
  '11':
  - type: text
    content: 'Le nom du premier est Pischon; c’est celui qui entoure tout le pays de Havila, où se trouve l’or. '
  '12':
  - type: text
    content: 'L’or de ce pays est pur; on y trouve aussi le bdellium et la pierre d’onyx. '
  '13':
  - type: text
    content: 'Le nom du second fleuve est Guihon; c’est celui qui entoure tout le pays de Cusch. '
  '14':
  - type: text
    content: 'Le nom du troisième est Hiddékel; c’est celui qui coule à l’orient de l’Assyrie. Le quatrième fleuve, c’est l’Euphrate. '
  '15':
  - type: text
    content: 'L’Éternel Dieu prit l’homme, et le plaça dans le jardin d’Éden pour le cultiver et pour le garder. '
  '16':
  - type: text
    content: 'L’Éternel Dieu donna cet ordre à l’homme: Tu pourras manger de tous les arbres du jardin; '
  '17':
  - type: text
    content: mais tu ne mangeras pas de l’arbre de la connaissance du bien et du mal, car le jour où tu en mangeras, tu mourras.
  - type: heading
    content: 'V. 18-24: cf. (1 Co 11:7-10. 1 Ti 2:11-13.) (Ép 5:22-33. Mt 19:3-9.)'
  '18':
  - type: text
    content: 'L’Éternel Dieu dit: Il n’est pas bon que l’homme soit seul; je lui ferai une aide semblable à lui. '
  '19':
  - type: text
    content: 'L’Éternel Dieu forma de la terre tous les animaux des champs et tous les oiseaux du ciel, et il les fit venir vers l’homme, pour voir comment il les appellerait, et afin que tout être vivant portât le nom que lui donnerait l’homme. '
  '2':
  - type: note
    content: Ex 20:11, 31, 17. De 5:14. Hé 4:4.
  - type: text
    content: 'Dieu acheva au septième jour son œuvre, qu’il avait faite: et il se reposa au septième jour de toute son œuvre, qu’il avait faite. '
  '20':
  - type: text
    content: 'Et l’homme donna des noms à tout le bétail, aux oiseaux du ciel et à tous les animaux des champs; mais, pour l’homme, il ne trouva point d’aide semblable à lui. '
  '21':
  - type: text
    content: 'Alors l’Éternel Dieu fit tomber un profond sommeil sur l’homme, qui s’endormit; il prit une de ses côtes, et referma la chair à sa place. '
  '22':
  - type: text
    content: 'L’Éternel Dieu forma une femme de la côte qu’il avait prise '
  - type: note
    content: 1 Co 11:8.
  - type: text
    content: 'de l’homme, et il l’amena vers l’homme. '
  '23':
  - type: text
    content: 'Et l’homme dit: Voici cette fois celle qui est '
  - type: note
    content: Mal 2:14. Ép 5:30, 31.
  - type: text
    content: 'os de mes os et chair de ma chair! On l’appellera femme, parce qu’elle a été prise de l’homme. '
  '24':
  - type: note
    content: Mt 19:5. Mc 10:7. Ép 5:31.
  - type: text
    content: 'C’est pourquoi l’homme quittera son père et sa mère, et s’attachera à sa femme, '
  - type: note
    content: 1 Co 6:16. Ép 5:28, 29.
  - type: text
    content: et ils deviendront une seule chair.
  - type: heading
    content: Le jardin d’Éden, et le péché d’Adam
  - type: heading
    content: '2 v. 25 à 3 v. 6: cf. Mt 4:1-11. (2 Co 11:3. 1 Ti 2:14.) Mt 6:13.'
  '25':
  - type: text
    content: 'L’homme et sa femme étaient tous deux '
  - type: note
    content: Ge 3:7.
  - type: text
    content: nus, et ils n’en avaient point honte.
  '3':
  - type: text
    content: Dieu bénit le septième jour, et il le sanctifia, parce qu’en ce jour il se reposa de toute son œuvre qu’il avait créée en la faisant.
  - type: heading
    content: Formation de l’homme et de la femme
  - type: heading
    content: 'V. 4-7: cf. Ge 1:26-28. 1 Co 15:45-49.'
  '4':
  - type: text
    content: 'Voici les origines des cieux et de la terre, quand ils furent créés. Lorsque l’Éternel Dieu fit une terre et des cieux, '
  '5':
  - type: text
    content: 'aucun arbuste des champs n’était encore sur la terre, et aucune herbe des champs ne germait encore: car l’Éternel Dieu n’avait pas fait pleuvoir sur la terre, et il n’y avait point d’homme pour cultiver le sol. '
  '6':
  - type: text
    content: 'Mais une vapeur s’éleva de la terre, et arrosa toute la surface du sol. '
  '7':
  - type: text
    content: 'L’Éternel Dieu forma l’homme de '
  - type: note
    content: 1 Co 15:47.
  - type: text
    content: 'la poussière de la terre, il souffla dans ses narines un souffle de vie et l’homme devint '
  - type: note
    content: 1 Co 15:45.
  - type: text
    content: un être vivant.
  - type: heading
    content: 'V. 8-17: cf. Ap 22:1, 2; 2:7.'
  '8':
  - type: text
    content: 'Puis l’Éternel Dieu planta un jardin en Éden, du côté de l’orient, et il y mit l’homme qu’il avait formé. '
  '9':
  - type: text
    content: 'L’Éternel Dieu fit pousser du sol des arbres de toute espèce, agréables à voir et bons à manger, et '
  - type: note
    content: Ap 2:7.
  - type: text
    content: 'l’arbre de la vie au milieu du jardin, et l’arbre de la connaissance du bien et du mal. '
