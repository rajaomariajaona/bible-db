document_id: RUT.4,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mariage de Ruth avec Boaz
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-12: cf. Jé 32:8-12. De 25:5-10. Ph 2:14, 15.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Boaz monta à la porte, et s’y arrêta. Or voici, celui qui avait droit de rachat, et dont Boaz avait parlé, vint à passer. Boaz lui dit: Approche, reste ici, toi un tel. Et il s’approcha, et s’arrêta. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et que je me suis également acquis pour femme Ruth la Moabite, femme de Machlon, pour relever le nom du défunt dans son héritage, et afin que le nom du défunt ne soit point retranché d’entre ses frères et de la porte de son lieu. Vous en êtes témoins aujourd’hui! '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tout le peuple qui était à la porte et les anciens dirent: Nous en sommes témoins! Que l’Éternel rende la femme qui entre dans ta maison semblable à '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Ge 29:32, etc.; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 30:24
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '25'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 35:17
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '18'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Rachel et à Léa, qui toutes les deux ont bâti la maison d’Israël! Manifeste ta force dans Éphrata, et fais-toi un nom dans Bethléhem! '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puisse la postérité que l’Éternel te donnera par cette jeune femme rendre ta maison semblable à la maison de '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 38:29
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 2:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 1:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Pérets, qui fut enfanté à Juda par Tamar!
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 13-17: cf. Ps 128. Lu 1:57-63.'
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Boaz prit Ruth, qui devint sa femme, et il alla vers elle. L’Éternel permit à Ruth de concevoir, et elle enfanta un fils. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les femmes dirent à Naomi: Béni soit l’Éternel, qui ne t’a point laissé manquer aujourd’hui d’un homme ayant droit de rachat, et dont le nom sera célébré en Israël! '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cet enfant restaurera ton âme, et sera le soutien de ta vieillesse; car ta belle-fille, qui t’aime, l’a enfanté, elle qui vaut mieux pour toi que sept fils. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Naomi prit l’enfant et le mit sur son sein, et elle fut sa garde. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les voisines lui donnèrent un nom, en disant: Un fils est né à Naomi! Et elles l’appelèrent Obed. Ce fut le père d’Isaï père de David.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Généalogie de David
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 18-22: cf. 1 Ch 2:3-15. Mt 1:3-6.'
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici la postérité de Pérets. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 2:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 1:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Pérets engendra Hetsron; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hetsron engendra Ram; Ram engendra Amminadab; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Boaz prit alors dix hommes parmi les anciens de la ville, et il dit: Asseyez-vous ici. Et ils s’assirent. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amminadab engendra Nachschon; Nachschon engendra Salmon; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Salmon engendra Boaz; Boaz engendra Obed; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Obed engendra Isaï; et Isaï engendra David.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis il dit à celui qui avait le droit de rachat: Naomi, revenue du pays de Moab, a vendu la pièce de terre qui appartenait à notre frère Élimélec. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’ai cru devoir t’en informer, et te dire: Acquiers-la, en présence des habitants et en présence des anciens de mon peuple. Si tu veux racheter, rachète; mais si tu ne veux pas, déclare-le-moi, afin que je le sache. Car il n’y a personne avant toi qui ait le droit de rachat, et je l’ai après toi. Et il répondit: je rachèterai. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Boaz dit: Le jour où tu acquerras le champ de la main de Naomi, tu l’acquerras en même temps de Ruth la Moabite, femme du défunt, pour relever le nom du défunt dans son héritage. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et celui qui avait le droit de rachat répondit: Je ne puis pas racheter pour mon compte, crainte de détruire mon héritage; prends pour toi mon droit de rachat, car je ne puis pas racheter. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 25:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Autrefois en Israël, pour valider une affaire quelconque relative à un rachat ou à un échange, l’un ôtait son soulier et le donnait à l’autre: cela servait de témoignage en Israël. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Celui qui avait le droit de rachat dit donc à Boaz: Acquiers pour ton compte! Et il ôta son soulier. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Boaz dit aux anciens et à tout le peuple: Vous êtes témoins aujourd’hui que j’ai acquis de la main de Naomi tout ce qui appartenait à Élimélec, à Kiljon et à Machlon, '
