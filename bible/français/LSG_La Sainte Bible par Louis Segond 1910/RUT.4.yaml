document_id: RUT.4,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Mariage de Ruth avec Boaz
  - type: heading
    content: 'V. 1-12: cf. Jé 32:8-12. De 25:5-10. Ph 2:14, 15.'
  - type: text
    content: 'Boaz monta à la porte, et s’y arrêta. Or voici, celui qui avait droit de rachat, et dont Boaz avait parlé, vint à passer. Boaz lui dit: Approche, reste ici, toi un tel. Et il s’approcha, et s’arrêta. '
  '10':
  - type: text
    content: 'et que je me suis également acquis pour femme Ruth la Moabite, femme de Machlon, pour relever le nom du défunt dans son héritage, et afin que le nom du défunt ne soit point retranché d’entre ses frères et de la porte de son lieu. Vous en êtes témoins aujourd’hui! '
  '11':
  - type: text
    content: 'Tout le peuple qui était à la porte et les anciens dirent: Nous en sommes témoins! Que l’Éternel rende la femme qui entre dans ta maison semblable à '
  - type: note
    content: Ge 29:32, etc.; 30:24, 25; 35:17, 18.
  - type: text
    content: 'Rachel et à Léa, qui toutes les deux ont bâti la maison d’Israël! Manifeste ta force dans Éphrata, et fais-toi un nom dans Bethléhem! '
  '12':
  - type: text
    content: 'Puisse la postérité que l’Éternel te donnera par cette jeune femme rendre ta maison semblable à la maison de '
  - type: note
    content: Ge 38:29. 1 Ch 2:4. Mt 1:3.
  - type: text
    content: Pérets, qui fut enfanté à Juda par Tamar!
  - type: heading
    content: 'V. 13-17: cf. Ps 128. Lu 1:57-63.'
  '13':
  - type: text
    content: 'Boaz prit Ruth, qui devint sa femme, et il alla vers elle. L’Éternel permit à Ruth de concevoir, et elle enfanta un fils. '
  '14':
  - type: text
    content: 'Les femmes dirent à Naomi: Béni soit l’Éternel, qui ne t’a point laissé manquer aujourd’hui d’un homme ayant droit de rachat, et dont le nom sera célébré en Israël! '
  '15':
  - type: text
    content: 'Cet enfant restaurera ton âme, et sera le soutien de ta vieillesse; car ta belle-fille, qui t’aime, l’a enfanté, elle qui vaut mieux pour toi que sept fils. '
  '16':
  - type: text
    content: 'Naomi prit l’enfant et le mit sur son sein, et elle fut sa garde. '
  '17':
  - type: text
    content: 'Les voisines lui donnèrent un nom, en disant: Un fils est né à Naomi! Et elles l’appelèrent Obed. Ce fut le père d’Isaï père de David.'
  - type: heading
    content: Généalogie de David
  - type: heading
    content: 'V. 18-22: cf. 1 Ch 2:3-15. Mt 1:3-6.'
  '18':
  - type: text
    content: 'Voici la postérité de Pérets. '
  - type: note
    content: 1 Ch 2:5. Mt 1:3.
  - type: text
    content: 'Pérets engendra Hetsron; '
  '19':
  - type: text
    content: 'Hetsron engendra Ram; Ram engendra Amminadab; '
  '2':
  - type: text
    content: 'Boaz prit alors dix hommes parmi les anciens de la ville, et il dit: Asseyez-vous ici. Et ils s’assirent. '
  '20':
  - type: text
    content: 'Amminadab engendra Nachschon; Nachschon engendra Salmon; '
  '21':
  - type: text
    content: 'Salmon engendra Boaz; Boaz engendra Obed; '
  '22':
  - type: text
    content: Obed engendra Isaï; et Isaï engendra David.
  '3':
  - type: text
    content: 'Puis il dit à celui qui avait le droit de rachat: Naomi, revenue du pays de Moab, a vendu la pièce de terre qui appartenait à notre frère Élimélec. '
  '4':
  - type: text
    content: 'J’ai cru devoir t’en informer, et te dire: Acquiers-la, en présence des habitants et en présence des anciens de mon peuple. Si tu veux racheter, rachète; mais si tu ne veux pas, déclare-le-moi, afin que je le sache. Car il n’y a personne avant toi qui ait le droit de rachat, et je l’ai après toi. Et il répondit: je rachèterai. '
  '5':
  - type: text
    content: 'Boaz dit: Le jour où tu acquerras le champ de la main de Naomi, tu l’acquerras en même temps de Ruth la Moabite, femme du défunt, pour relever le nom du défunt dans son héritage. '
  '6':
  - type: text
    content: 'Et celui qui avait le droit de rachat répondit: Je ne puis pas racheter pour mon compte, crainte de détruire mon héritage; prends pour toi mon droit de rachat, car je ne puis pas racheter. '
  '7':
  - type: note
    content: De 25:7.
  - type: text
    content: 'Autrefois en Israël, pour valider une affaire quelconque relative à un rachat ou à un échange, l’un ôtait son soulier et le donnait à l’autre: cela servait de témoignage en Israël. '
  '8':
  - type: text
    content: 'Celui qui avait le droit de rachat dit donc à Boaz: Acquiers pour ton compte! Et il ôta son soulier. '
  '9':
  - type: text
    content: 'Alors Boaz dit aux anciens et à tout le peuple: Vous êtes témoins aujourd’hui que j’ai acquis de la main de Naomi tout ce qui appartenait à Élimélec, à Kiljon et à Machlon, '
