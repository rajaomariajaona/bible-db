document_id: PSA.11,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 1 S 19:1, 2. (Ps 3. És 3:10, 11.) Ps 5.
  - type: text
    content: Au chef des chantres. De David.
  - type: text
    content: C’est en l’Éternel que je cherche un refuge.
  - type: text
    content: 'Comment pouvez-vous me dire:'
  - type: text
    content: Fuis dans vos montagnes, comme un oiseau?
  '2':
  - type: text
    content: Car voici, les méchants bandent l’arc,
  - type: text
    content: Ils ajustent leur flèche sur la corde,
  - type: text
    content: Pour tirer dans l’ombre sur ceux dont le cœur est droit.
  '3':
  - type: text
    content: Quand les fondements sont renversés,
  - type: text
    content: Le juste, que ferait-il?
  '4':
  - type: text
    content: L’Éternel est dans son saint temple,
  - type: text
    content: L’Éternel a son trône dans les cieux;
  - type: text
    content: Ses yeux regardent,
  - type: text
    content: Ses paupières sondent les fils de l’homme.
  '5':
  - type: text
    content: L’Éternel sonde le juste;
  - type: text
    content: Il hait le méchant et celui qui se plaît à la violence.
  '6':
  - type: text
    content: Il fait pleuvoir sur les méchants
  - type: text
    content: Des charbons, du feu et du soufre;
  - type: text
    content: Un vent brûlant, c’est le calice qu’ils ont en partage.
  '7':
  - type: text
    content: Car l’Éternel est juste, il aime la justice;
  - type: text
    content: Les hommes droits contemplent sa face.
