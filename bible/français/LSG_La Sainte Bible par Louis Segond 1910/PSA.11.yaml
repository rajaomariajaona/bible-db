document_id: PSA.11,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 1 S 19:1, 2. (Ps 3. És 3:10, 11.) Ps 5.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au chef des chantres. De David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est en l’Éternel que je cherche un refuge.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Comment pouvez-vous me dire:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fuis dans vos montagnes, comme un oiseau?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car voici, les méchants bandent l’arc,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ajustent leur flèche sur la corde,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour tirer dans l’ombre sur ceux dont le cœur est droit.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand les fondements sont renversés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le juste, que ferait-il?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel est dans son saint temple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel a son trône dans les cieux;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses yeux regardent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses paupières sondent les fils de l’homme.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel sonde le juste;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il hait le méchant et celui qui se plaît à la violence.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il fait pleuvoir sur les méchants
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des charbons, du feu et du soufre;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un vent brûlant, c’est le calice qu’ils ont en partage.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car l’Éternel est juste, il aime la justice;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les hommes droits contemplent sa face.
