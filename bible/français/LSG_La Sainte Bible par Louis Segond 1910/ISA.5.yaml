document_id: ISA.5,93
type_code: fra
verses:
  '1':
  - type: heading
    content: La vigne de l’Éternel
  - type: heading
    content: 'V. 1-7: cf. (Ps 80:9-17. Jé 2:21.) Mt 21:33-44.'
  - type: text
    content: Je chanterai à mon bien-aimé
  - type: text
    content: Le cantique de mon bien-aimé sur sa vigne.
  - type: text
    content: Mon bien-aimé avait une vigne,
  - type: text
    content: Sur un coteau fertile.
  '10':
  - type: text
    content: Même dix arpents de vigne ne produiront qu’un bath,
  - type: text
    content: Et un homer de semence ne produira qu’un épha.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Pr 23:29, 30.
  - type: text
    content: Malheur à ceux qui de bon matin
  - type: text
    content: Courent après les boissons enivrantes,
  - type: text
    content: Et qui bien avant dans la nuit
  - type: text
    content: Sont échauffés par le vin!
  '12':
  - type: text
    content: La harpe et le luth, le tambourin, la flûte et le vin, animent leurs festins;
  - type: text
    content: Mais ils ne prennent point garde à l’œuvre de l’Éternel,
  - type: text
    content: Et ils ne voient point le travail de ses mains.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Am 6:7.
  - type: text
    content: C’est pourquoi mon peuple sera soudain emmené captif;
  - type: text
    content: Sa noblesse mourra de faim,
  - type: text
    content: Et sa multitude sera desséchée par la soif.
  '14':
  - type: text
    content: C’est pourquoi le séjour des morts ouvre sa bouche,
  - type: text
    content: Élargit sa gueule outre mesure;
  - type: text
    content: Alors descendent la magnificence et la richesse de Sion,
  - type: text
    content: Et sa foule bruyante et joyeuse.
  '15':
  - type: text
    content: Les petits seront abattus, les grands seront humiliés,
  - type: text
    content: Et les regards des hautains seront abaissés.
  '16':
  - type: text
    content: L’Éternel des armées sera élevé par le jugement,
  - type: text
    content: Et le Dieu saint sera sanctifié par la justice.
  '17':
  - type: text
    content: ' '
  - type: note
    content: És 14:30.
  - type: text
    content: Des brebis paîtront comme sur leur pâturage,
  - type: text
    content: Et des étrangers dévoreront les possessions ruinées des riches.
  '18':
  - type: text
    content: Malheur à ceux qui tirent l’iniquité avec les cordes du vice,
  - type: text
    content: Et le péché comme avec les traits d’un char,
  '19':
  - type: text
    content: 'Et qui disent: Qu’il hâte, qu’il accélère son œuvre,'
  - type: text
    content: Afin que nous la voyions!
  - type: text
    content: Que le décret du Saint d’Israël arrive et s’exécute,
  - type: text
    content: Afin que nous le connaissions!
  '2':
  - type: text
    content: Il en remua le sol, ôta les pierres, et y mit un plant délicieux;
  - type: text
    content: Il bâtit une tour au milieu d’elle,
  - type: text
    content: Et il y creusa aussi une cuve.
  - type: text
    content: Puis il espéra qu’elle produirait de bons raisins,
  - type: text
    content: Mais elle en a produit de mauvais.
  '20':
  - type: text
    content: Malheur à ceux qui appellent le mal bien, et le bien mal,
  - type: text
    content: Qui changent les ténèbres en lumière, et la lumière en ténèbres,
  - type: text
    content: Qui changent l’amertume en douceur, et la douceur en amertume!
  '21':
  - type: text
    content: ' '
  - type: note
    content: Pr 3:7. Ro 12:16.
  - type: text
    content: Malheur à ceux qui sont sages à leurs yeux,
  - type: text
    content: Et qui se croient intelligents!
  '22':
  - type: text
    content: Malheur à ceux qui ont de la bravoure pour boire du vin,
  - type: text
    content: Et de la vaillance pour mêler des liqueurs fortes;
  '23':
  - type: text
    content: Qui justifient le coupable pour un présent,
  - type: note
    content: Pr 17:15; 24:24.
  - type: text
    content: Et enlèvent aux innocents leurs droits!
  '24':
  - type: text
    content: 'C’est pourquoi, '
  - type: note
    content: Ex 15:7. És 9:18.
  - type: text
    content: comme une langue de feu dévore le chaume,
  - type: text
    content: Et comme la flamme consume l’herbe sèche,
  - type: text
    content: Ainsi leur racine sera comme de la pourriture,
  - type: text
    content: Et leur fleur se dissipera comme de la poussière;
  - type: text
    content: Car ils ont dédaigné la loi de l’Éternel des armées,
  - type: text
    content: Et ils ont méprisé la parole du Saint d’Israël.
  '25':
  - type: text
    content: C’est pourquoi la colère de l’Éternel s’enflamme contre son peuple,
  - type: text
    content: Il étend sa main sur lui, et il le frappe;
  - type: text
    content: Les montagnes s’ébranlent;
  - type: text
    content: 'Et les cadavres sont '
  - type: note
    content: És 10:6.
  - type: text
    content: comme des balayures au milieu des rues.
  - type: note
    content: És 9:11, 16, 20; 10:4.
  - type: text
    content: Malgré tout cela, sa colère ne s’apaise point,
  - type: text
    content: Et sa main est encore étendue.
  - type: heading
    content: 'V. 26-30: cf. Jé 5:15-17; 6:22-26.'
  '26':
  - type: text
    content: Il élève une bannière pour les peuples lointains,
  - type: text
    content: 'Et il en siffle un des extrémités de la terre:'
  - type: text
    content: Et voici, il arrive avec promptitude et légèreté.
  '27':
  - type: text
    content: Nul n’est fatigué, nul ne chancelle de lassitude,
  - type: text
    content: Personne ne sommeille, ni ne dort;
  - type: text
    content: Aucun n’a la ceinture de ses reins détachée,
  - type: text
    content: Ni la courroie de ses souliers rompue.
  '28':
  - type: text
    content: Ses flèches sont aiguës,
  - type: text
    content: Et tous ses arcs tendus;
  - type: text
    content: Les sabots de ses chevaux ressemblent à des cailloux,
  - type: text
    content: Et les roues de ses chars à un tourbillon.
  '29':
  - type: text
    content: Son rugissement est comme celui d’une lionne;
  - type: text
    content: Il rugit comme des lionceaux, il gronde, et saisit la proie,
  - type: text
    content: Il l’emporte, et personne ne vient au secours.
  '3':
  - type: text
    content: Maintenant donc, habitants de Jérusalem et hommes de Juda,
  - type: text
    content: Soyez juges entre moi et ma vigne!
  '30':
  - type: text
    content: En ce jour, il y aura près de lui un mugissement,
  - type: text
    content: Comme celui d’une tempête sur mer;
  - type: note
    content: És 8:22.
  - type: text
    content: En regardant la terre, on ne verra que ténèbres,
  - type: text
    content: Avec des alternatives d’angoisse et d’espérance;
  - type: text
    content: Au ciel, l’obscurité régnera.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Jé 2:5. Mi 6:3, 8.
  - type: text
    content: Qu’y avait-il encore à faire à ma vigne,
  - type: text
    content: Que je n’aie pas fait pour elle?
  - type: text
    content: Pourquoi, quand j’ai espéré qu’elle produirait de bons raisins,
  - type: text
    content: En a-t-elle produit de mauvais?
  '5':
  - type: text
    content: Je vous dirai maintenant
  - type: text
    content: Ce que je vais faire à ma vigne.
  - type: note
    content: Ps 80:13.
  - type: text
    content: J’en arracherai la haie, pour qu’elle soit broutée;
  - type: text
    content: J’en abattrai la clôture, pour qu’elle soit foulée aux pieds.
  '6':
  - type: text
    content: Je la réduirai en ruine; elle ne sera plus taillée, ni cultivée;
  - type: text
    content: Les ronces et les épines y croîtront;
  - type: text
    content: Et je donnerai mes ordres aux nuées,
  - type: text
    content: Afin qu’elles ne laissent plus tomber la pluie sur elle.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Ps 80:9.
  - type: text
    content: La vigne de l’Éternel des armées, c’est la maison d’Israël,
  - type: text
    content: Et les hommes de Juda, c’est le plant qu’il chérissait.
  - type: text
    content: Il avait espéré de la droiture, et voici du sang versé!
  - type: text
    content: De la justice, et voici des cris de détresse!
  - type: heading
    content: Malheur aux iniques!
  - type: heading
    content: 'V. 8-25: cf. Mi 2:1-5. Am 6. És 3:8-15; 30:8-14.'
  '8':
  - type: text
    content: ' '
  - type: note
    content: Mi 2:2.
  - type: text
    content: Malheur à ceux qui ajoutent maison à maison,
  - type: text
    content: Et qui joignent champ à champ,
  - type: text
    content: Jusqu’à ce qu’il n’y ait plus d’espace,
  - type: text
    content: Et qu’ils habitent seuls au milieu du pays!
  '9':
  - type: text
    content: 'Voici ce que m’a révélé l’Éternel des armées:'
  - type: text
    content: Certainement, ces maisons nombreuses seront dévastées,
  - type: text
    content: Ces grandes et belles maisons n’auront plus d’habitants.
