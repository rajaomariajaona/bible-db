document_id: ISA.5
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La vigne de l’Éternel
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-7: cf. (Ps 80:9-17. Jé 2:21.) Mt 21:33-44.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Je chanterai à mon bien-aimé
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le cantique de mon bien-aimé sur sa vigne.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon bien-aimé avait une vigne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sur un coteau fertile.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Il en remua le sol, ôta les pierres, et y mit un plant délicieux;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il bâtit une tour au milieu d’elle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il y creusa aussi une cuve.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Puis il espéra qu’elle produirait de bons raisins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais elle en a produit de mauvais.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Maintenant donc, habitants de Jérusalem et hommes de Juda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Soyez juges entre moi et ma vigne!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 2:5
      metadata:
        usfm: JER.2.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mi 6:3
      metadata:
        usfm: MIC.6.3
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '8'
      metadata:
        usfm: MIC.6.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Qu’y avait-il encore à faire à ma vigne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que je n’aie pas fait pour elle?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi, quand j’ai espéré qu’elle produirait de bons raisins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: En a-t-elle produit de mauvais?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Je vous dirai maintenant
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce que je vais faire à ma vigne.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 80:13
      metadata:
        usfm: PSA.80.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: J’en arracherai la haie, pour qu’elle soit broutée;
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’en abattrai la clôture, pour qu’elle soit foulée aux pieds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Je la réduirai en ruine; elle ne sera plus taillée, ni cultivée;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les ronces et les épines y croîtront;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je donnerai mes ordres aux nuées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afin qu’elles ne laissent plus tomber la pluie sur elle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 80:9
      metadata:
        usfm: PSA.80.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: La vigne de l’Éternel des armées, c’est la maison d’Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les hommes de Juda, c’est le plant qu’il chérissait.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il avait espéré de la droiture, et voici du sang versé!
- type: usfm
  marker: q1
  children:
  - type: text
    text: De la justice, et voici des cris de détresse!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Malheur aux iniques!
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 8-25: cf. Mi 2:1-5. Am 6. És 3:8-15; 30:8-14.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mi 2:2
      metadata:
        usfm: MIC.2.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Malheur à ceux qui ajoutent maison à maison,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui joignent champ à champ,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jusqu’à ce qu’il n’y ait plus d’espace,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qu’ils habitent seuls au milieu du pays!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Voici ce que m’a révélé l’Éternel des armées:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Certainement, ces maisons nombreuses seront dévastées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ces grandes et belles maisons n’auront plus d’habitants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Même dix arpents de vigne ne produiront qu’un bath,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et un homer de semence ne produira qu’un épha.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 23:29
      metadata:
        usfm: PRO.23.29
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '30'
      metadata:
        usfm: PRO.23.30
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Malheur à ceux qui de bon matin
- type: usfm
  marker: q1
  children:
  - type: text
    text: Courent après les boissons enivrantes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui bien avant dans la nuit
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sont échauffés par le vin!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: La harpe et le luth, le tambourin, la flûte et le vin, animent leurs festins;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais ils ne prennent point garde à l’œuvre de l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils ne voient point le travail de ses mains.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Am 6:7
      metadata:
        usfm: AMO.6.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: C’est pourquoi mon peuple sera soudain emmené captif;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sa noblesse mourra de faim,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et sa multitude sera desséchée par la soif.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: C’est pourquoi le séjour des morts ouvre sa bouche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Élargit sa gueule outre mesure;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Alors descendent la magnificence et la richesse de Sion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et sa foule bruyante et joyeuse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Les petits seront abattus, les grands seront humiliés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les regards des hautains seront abaissés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: L’Éternel des armées sera élevé par le jugement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le Dieu saint sera sanctifié par la justice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 14:30
      metadata:
        usfm: ISA.14.30
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Des brebis paîtront comme sur leur pâturage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et des étrangers dévoreront les possessions ruinées des riches.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Malheur à ceux qui tirent l’iniquité avec les cordes du vice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le péché comme avec les traits d’un char,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Et qui disent: Qu’il hâte, qu’il accélère son œuvre,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afin que nous la voyions!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que le décret du Saint d’Israël arrive et s’exécute,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afin que nous le connaissions!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Malheur à ceux qui appellent le mal bien, et le bien mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui changent les ténèbres en lumière, et la lumière en ténèbres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui changent l’amertume en douceur, et la douceur en amertume!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 3:7
      metadata:
        usfm: PRO.3.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 12:16
      metadata:
        usfm: ROM.12.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Malheur à ceux qui sont sages à leurs yeux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui se croient intelligents!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Malheur à ceux qui ont de la bravoure pour boire du vin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et de la vaillance pour mêler des liqueurs fortes;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Qui justifient le coupable pour un présent,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 17:15
      metadata:
        usfm: PRO.17.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 24:24
      metadata:
        usfm: PRO.24.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et enlèvent aux innocents leurs droits!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'C’est pourquoi, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 15:7
      metadata:
        usfm: EXO.15.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 9:18
      metadata:
        usfm: ISA.9.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: comme une langue de feu dévore le chaume,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et comme la flamme consume l’herbe sèche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ainsi leur racine sera comme de la pourriture,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et leur fleur se dissipera comme de la poussière;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car ils ont dédaigné la loi de l’Éternel des armées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils ont méprisé la parole du Saint d’Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: C’est pourquoi la colère de l’Éternel s’enflamme contre son peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il étend sa main sur lui, et il le frappe;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les montagnes s’ébranlent;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et les cadavres sont '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 10:6
      metadata:
        usfm: ISA.10.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: comme des balayures au milieu des rues.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 9:11
      metadata:
        usfm: ISA.9.11
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '16'
      metadata:
        usfm: ISA.9.16
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '20'
      metadata:
        usfm: ISA.9.20
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 10:4
      metadata:
        usfm: ISA.10.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Malgré tout cela, sa colère ne s’apaise point,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et sa main est encore étendue.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 26-30: cf. Jé 5:15-17; 6:22-26.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Il élève une bannière pour les peuples lointains,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et il en siffle un des extrémités de la terre:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et voici, il arrive avec promptitude et légèreté.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Nul n’est fatigué, nul ne chancelle de lassitude,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Personne ne sommeille, ni ne dort;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aucun n’a la ceinture de ses reins détachée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ni la courroie de ses souliers rompue.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ses flèches sont aiguës,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tous ses arcs tendus;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les sabots de ses chevaux ressemblent à des cailloux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les roues de ses chars à un tourbillon.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Son rugissement est comme celui d’une lionne;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il rugit comme des lionceaux, il gronde, et saisit la proie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il l’emporte, et personne ne vient au secours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: En ce jour, il y aura près de lui un mugissement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme celui d’une tempête sur mer;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 8:22
      metadata:
        usfm: ISA.8.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: En regardant la terre, on ne verra que ténèbres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avec des alternatives d’angoisse et d’espérance;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au ciel, l’obscurité régnera.
