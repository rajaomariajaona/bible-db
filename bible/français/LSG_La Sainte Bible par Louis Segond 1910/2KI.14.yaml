document_id: 2KI.14
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Amatsia, roi de Juda
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-22: cf. (2 Ch 25; 26:1-2.) Ps 75:5-8.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La seconde année de Joas, fils de Joachaz, roi d’Israël, Amatsia, fils de Joas, roi de Juda, régna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 25:1
      metadata:
        usfm: 2CH.25.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il avait vingt-cinq ans lorsqu’il devint roi, et il régna vingt-neuf ans à Jérusalem. Sa mère s’appelait Joaddan, de Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il fit ce qui est droit aux yeux de l’Éternel, non pas toutefois comme David, son père; il agit entièrement comme avait agi Joas, son père. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Seulement, les hauts lieux ne disparurent point; le peuple offrait encore des sacrifices et des parfums sur les hauts lieux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Lorsque la royauté fut affermie entre ses mains, il frappa ses serviteurs qui avaient tué le roi, son père. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Mais il ne fit pas mourir les fils des meurtriers, selon ce qui est écrit dans le livre de la loi de Moïse, où l’Éternel donne ce commandement: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 24:16
      metadata:
        usfm: DEU.24.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 18:20
      metadata:
        usfm: EZK.18.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'On ne fera point mourir les pères pour les enfants, et l’on ne fera point mourir les enfants pour les pères; mais on fera mourir chacun pour son péché. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il battit dix mille Édomites dans la vallée du sel; et durant la guerre, il prit Séla, et l’appela Joktheel, nom qu’elle a conservé jusqu’à ce jour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Alors Amatsia envoya des messagers à Joas, fils de Joachaz, fils de Jéhu, roi d’Israël, pour lui dire: Viens, voyons-nous en face! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Et Joas, roi d’Israël, fit dire à Amatsia, roi de Juda: L’épine du Liban envoya dire au cèdre du Liban: Donne ta fille pour femme à mon fils! Et les bêtes sauvages qui sont au Liban passèrent et foulèrent l’épine. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tu as battu les Édomites, et ton cœur s’élève. Jouis de ta gloire, et reste chez toi. Pourquoi t’engager dans une malheureuse entreprise, qui amènerait ta ruine et celle de Juda? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mais Amatsia ne l’écouta pas. Et Joas, roi d’Israël, monta; et ils se virent en face, lui et Amatsia, roi de Juda, à Beth-Schémesch, qui est à Juda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Juda fut battu par Israël, et chacun s’enfuit dans sa tente. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Joas, roi d’Israël, prit à Beth-Schémesch Amatsia, roi de Juda, fils de Joas, fils d’Achazia. Il vint à Jérusalem, et fit une brèche de quatre cents coudées dans la muraille de Jérusalem, depuis la porte d’Éphraïm jusqu’à la porte de l’angle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il prit tout l’or et l’argent et tous les vases qui se trouvaient dans la maison de l’Éternel et dans les trésors de la maison du roi; il prit aussi des otages, et il retourna à Samarie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Le reste des actions de Joas, ce qu’il a fait, ses exploits, et la guerre qu’il eut avec Amatsia, roi de Juda, cela n’est-il pas écrit dans le livre des Chroniques des rois d’Israël? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Joas se coucha avec ses pères, et il fut enterré à Samarie avec les rois d’Israël. Et Jéroboam, son fils, régna à sa place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Amatsia, fils de Joas, roi de Juda, vécut quinze ans après la mort de Joas, fils de Joachaz, roi d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Le reste des actions d’Amatsia, cela n’est-il pas écrit dans le livre des Chroniques des rois de Juda? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 25:27
      metadata:
        usfm: 2KI.25.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'On forma contre lui une conspiration à Jérusalem, et il s’enfuit à Lakis; mais on le poursuivit à Lakis, où on le fit mourir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'On le transporta sur des chevaux, et il fut enterré à Jérusalem avec ses pères, dans la ville de David. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 26:1
      metadata:
        usfm: 2CH.26.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Et tout le peuple de Juda prit Azaria, âgé de seize ans, et l’établit roi à la place de son père Amatsia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Azaria rebâtit Élath et la fit rentrer sous la puissance de Juda, après que le roi fut couché avec ses pères.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jéroboam II, roi d’Israël
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 23-29: cf. Am 1-7. Jon 1-4. Os 1-3.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'La quinzième année d’Amatsia, fils de Joas, roi de Juda, Jéroboam, fils de Joas, roi d’Israël, régna à Samarie. Il régna quarante et un ans. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Il fit ce qui est mal aux yeux de l’Éternel; il ne se détourna d’aucun des péchés de Jéroboam, fils de Nebath, qui avait fait pécher Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Il rétablit les limites d’Israël depuis l’entrée de Hamath jusqu’à la mer de la plaine, selon la parole que l’Éternel, le Dieu d’Israël, avait prononcée par son serviteur '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jon 1:1
      metadata:
        usfm: JON.1.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 12:39
      metadata:
        usfm: MAT.12.39
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '40'
      metadata:
        usfm: MAT.12.40
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Jonas, le prophète, fils d’Amitthaï, de Gath-Hépher. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Car l’Éternel vit l’affliction d’Israël à son comble et l’extrémité à laquelle se trouvaient réduits esclaves et hommes libres, sans qu’il y eût personne pour venir au secours d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Or l’Éternel n’avait point résolu d’effacer le nom d’Israël de dessous les cieux, et il les délivra par Jéroboam, fils de Joas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Le reste des actions de Jéroboam, tout ce qu’il a fait, ses exploits à la guerre, et comment il fit rentrer sous la puissance d’Israël Damas et Hamath qui avaient appartenu à Juda, cela n’est-il pas écrit dans le livre des Chroniques des rois d’Israël? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Jéroboam se coucha avec ses pères, avec les rois d’Israël. Et Zacharie, son fils, régna à sa place.
