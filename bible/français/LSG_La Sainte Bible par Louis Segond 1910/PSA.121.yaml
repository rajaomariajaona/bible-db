document_id: PSA.121
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: Ps 91. De 33:27. 1 S 2:9. És 27:3.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Cantique des degrés.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je lève mes yeux vers les montagnes…
- type: usfm
  marker: q1
  children:
  - type: text
    text: D’où me viendra le secours?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Le secours me vient de l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui a fait les cieux et la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Il ne permettra point que ton pied chancelle;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celui qui te garde ne sommeillera point.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Voici, il ne sommeille ni ne dort,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celui qui garde Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: L’Éternel est celui qui te garde,
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’Éternel est ton ombre à ta main droite.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Pendant le jour le soleil ne te frappera point,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ni la lune pendant la nuit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: L’Éternel te gardera de tout mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il gardera ton âme;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: L’Éternel gardera ton départ et ton arrivée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dès maintenant et à jamais.
