document_id: PSA.121,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ps 91. De 33:27. 1 S 2:9. És 27:3.
  - type: text
    content: Cantique des degrés.
  - type: text
    content: Je lève mes yeux vers les montagnes…
  - type: text
    content: D’où me viendra le secours?
  '2':
  - type: text
    content: Le secours me vient de l’Éternel,
  - type: text
    content: Qui a fait les cieux et la terre.
  '3':
  - type: text
    content: Il ne permettra point que ton pied chancelle;
  - type: text
    content: Celui qui te garde ne sommeillera point.
  '4':
  - type: text
    content: Voici, il ne sommeille ni ne dort,
  - type: text
    content: Celui qui garde Israël.
  '5':
  - type: text
    content: L’Éternel est celui qui te garde,
  - type: text
    content: L’Éternel est ton ombre à ta main droite.
  '6':
  - type: text
    content: Pendant le jour le soleil ne te frappera point,
  - type: text
    content: Ni la lune pendant la nuit.
  '7':
  - type: text
    content: L’Éternel te gardera de tout mal,
  - type: text
    content: Il gardera ton âme;
  '8':
  - type: text
    content: L’Éternel gardera ton départ et ton arrivée,
  - type: text
    content: Dès maintenant et à jamais.
