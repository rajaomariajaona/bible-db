document_id: EXO.7,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les dix plaies
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-7: cf. Ex 6:6-13; 4:10-17; 3:18-20.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Éternel dit à Moïse: Vois, je te fais Dieu pour Pharaon: et Aaron, ton frère, sera ton prophète. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse et Aaron allèrent auprès de Pharaon, et ils firent ce que l’Éternel avait ordonné. Aaron jeta sa verge devant Pharaon et devant ses serviteurs; et elle devint un serpent. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Pharaon appela des sages et des enchanteurs; et les magiciens d’Égypte, eux aussi, en firent autant par leurs enchantements. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils jetèrent tous leurs verges, et elles devinrent des serpents. Et la verge d’Aaron engloutit leurs verges. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le cœur de Pharaon s’endurcit, et il n’écouta point Moïse et Aaron '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 7:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: selon ce que l’Éternel avait dit.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 14-25: cf. (Ps 105:26, 27, 29; 78:44.) (Ap 8:8, 9; 16:3-6.) Jn 2:7-11.'
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Éternel dit à Moïse: Pharaon a le cœur endurci; il refuse de laisser aller le peuple. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Va vers Pharaon dès le matin; il sortira pour aller près de l’eau, et tu te présenteras devant lui au bord du fleuve. Tu prendras à ta main la verge qui a été changée en serpent, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et tu diras à Pharaon: L’Éternel, le Dieu des Hébreux, m’a envoyé auprès de toi, pour te dire: Laisse aller mon peuple, afin qu’il me serve dans le désert. Et voici, jusqu’à présent tu n’as point écouté. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi parle l’Éternel: A ceci tu connaîtras que je suis l’Éternel. Je vais frapper les eaux du fleuve avec la verge qui est dans ma main; et elles seront changées en sang. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les poissons qui sont dans le fleuve périront, le fleuve se corrompra, et les Égyptiens s’efforceront en vain de boire l’eau du fleuve. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Éternel dit à Moïse: Dis à Aaron: Prends ta verge, et étends ta main sur les eaux des Égyptiens, sur leurs rivières, sur leurs ruisseaux, sur leurs étangs, et sur tous leurs amas d’eaux. Elles deviendront du sang: et il y aura du sang dans tout le pays d’Égypte, dans les vases de bois et dans les vases de pierre. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toi, tu diras tout ce que je t’ordonnerai; et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 4:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Aaron, ton frère, parlera à Pharaon, pour qu’il laisse aller les enfants d’Israël hors de son pays. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse et Aaron firent ce que l’Éternel avait ordonné. Aaron leva la verge, et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 17:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'il frappa les eaux qui étaient dans le fleuve, sous les yeux de Pharaon et sous les yeux de ses serviteurs; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 78:44
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 105:29
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'et toutes les eaux du fleuve furent changées en sang. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les poissons qui étaient dans le fleuve périrent, le fleuve se corrompit, les Égyptiens ne pouvaient plus boire l’eau du fleuve, et il y eut du sang dans tout le pays d’Égypte. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais les magiciens d’Égypte en firent autant par leurs enchantements. Le cœur de Pharaon s’endurcit, et il n’écouta point Moïse et Aaron, selon ce que l’Éternel avait dit. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pharaon s’en retourna, et alla dans sa maison; et il ne prit pas même à cœur ces choses. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tous les Égyptiens creusèrent aux environs du fleuve, pour trouver de l’eau à boire; car ils ne pouvaient boire de l’eau du fleuve. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il s’écoula sept jours, après que l’Éternel eut frappé le fleuve.
  - type: usfm
    marker: r
    children:
    - type: text
      text: '7 v. 26-8:11: cf. Ps 78:45; 105:30. (Ap 16:13.)'
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Éternel dit à Moïse: Va vers Pharaon, et tu lui diras: Ainsi parle l’Éternel: Laisse aller mon peuple, afin qu’il me serve. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si tu refuses de le laisser aller, je vais frapper par des grenouilles toute l’étendue de ton pays. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le fleuve fourmillera de grenouilles; elles monteront, et elles entreront dans ta maison, dans ta chambre à coucher et dans ton lit, dans la maison de tes serviteurs et dans celles de ton peuple, dans tes fours et dans tes pétrins. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les grenouilles monteront sur toi, sur ton peuple, et sur tous tes serviteurs.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et moi, j’endurcirai le cœur de Pharaon, et je multiplierai mes signes et mes miracles dans le pays d’Égypte. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pharaon ne vous écoutera point. Je mettrai ma main sur l’Égypte, et je ferai sortir du pays d’Égypte mes armées, mon peuple, les enfants d’Israël, par de grands jugements. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les Égyptiens connaîtront que je suis l’Éternel, lorsque j’étendrai ma main sur l’Égypte, et que je ferai sortir du milieu d’eux les enfants d’Israël. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse et Aaron firent ce que l’Éternel leur avait ordonné; ils firent ainsi. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Moïse était âgé de quatre-vingts ans, et Aaron de quatre-vingt-trois ans, lorsqu’ils parlèrent à Pharaon.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 8-13: cf. Ex 4:1-9. 2 Ti 3:8, 9.'
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Éternel dit à Moïse et à Aaron: '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si Pharaon vous parle, et vous dit: Faites un miracle! Tu diras à Aaron: Prends ta verge, et jette-la devant Pharaon. Elle deviendra un serpent. '
