document_id: PSA.70,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ps 40:14-18. (Ps 13; 35:19-28.)
  - type: text
    content: Au chef des chantres. De David. Pour souvenir.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Ps 40:14, etc.
  - type: text
    content: O Dieu, hâte-toi de me délivrer!
  - type: text
    content: Éternel, hâte-toi de me secourir!
  '3':
  - type: text
    content: ' '
  - type: note
    content: Ps 35:4, 26; 71:13.
  - type: text
    content: Qu’ils soient honteux et confus, ceux qui en veulent à ma vie!
  - type: text
    content: Qu’ils reculent et rougissent, ceux qui désirent ma perte!
  '4':
  - type: text
    content: Qu’ils retournent en arrière par l’effet de leur honte,
  - type: text
    content: 'Ceux qui disent: Ah! Ah!'
  '5':
  - type: text
    content: Que tous ceux qui te cherchent
  - type: text
    content: Soient dans l’allégresse et se réjouissent en toi!
  - type: text
    content: Que ceux qui aiment ton salut
  - type: text
    content: 'Disent sans cesse: Exalté soit Dieu!'
  '6':
  - type: text
    content: 'Moi, je suis pauvre et indigent:'
  - type: text
    content: O Dieu, hâte-toi en ma faveur!
  - type: text
    content: 'Tu es mon aide et mon libérateur:'
  - type: text
    content: Éternel, ne tarde pas!
