    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef des chantres. De David. Pour souvenir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps 40:14, etc.
    marker-yv: yv-n
  - type: text
    text: O Dieu, hâte-toi de me délivrer!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Éternel, hâte-toi de me secourir!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 35:4
      metadata:
        usfm: PSA.35.4
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '26'
      metadata:
        usfm: PSA.35.26
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 71:13
      metadata:
        usfm: PSA.71.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Qu’ils soient honteux et confus, ceux qui en veulent à ma vie!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’ils reculent et rougissent, ceux qui désirent ma perte!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Qu’ils retournent en arrière par l’effet de leur honte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ceux qui disent: Ah! Ah!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Que tous ceux qui te cherchent
- type: usfm
  marker: q1
  children:
  - type: text
    text: Soient dans l’allégresse et se réjouissent en toi!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que ceux qui aiment ton salut
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Disent sans cesse: Exalté soit Dieu!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Moi, je suis pauvre et indigent:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: O Dieu, hâte-toi en ma faveur!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tu es mon aide et mon libérateur:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Éternel, ne tarde pas!
