document_id: DEU.16
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La célébration des fêtes
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-8: cf. (Ex 12:1-28. Lé 23:4-14. No 28:16-25.) (Ps 105:5; 114:1.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Observe le mois des épis, et célèbre la '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 12:2
      metadata:
        usfm: EXO.12.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 23:5
      metadata:
        usfm: LEV.23.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 9:1
      metadata:
        usfm: NUM.9.1
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 28:16
      metadata:
        usfm: NUM.28.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Pâque en l’honneur de l’Éternel, ton Dieu; car c’est dans le mois des épis que l’Éternel, ton Dieu, t’a fait sortir d’Égypte, pendant la nuit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Tu sacrifieras la Pâque à l’Éternel, ton Dieu, tes victimes de menu et de gros bétail, dans le lieu que l’Éternel choisira pour y faire résider son nom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Pendant la fête, tu '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 12:19
      metadata:
        usfm: EXO.12.19
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 34:18
      metadata:
        usfm: EXO.34.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ne mangeras pas du pain levé, mais tu mangeras sept jours des pains sans levain, du pain d’affliction, car c’est avec précipitation que tu es sorti du pays d’Égypte: il en sera ainsi, afin que tu te souviennes toute ta vie du jour où tu es sorti du pays d’Égypte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'On ne verra point chez toi de levain, dans toute l’étendue de ton pays, pendant sept jours; et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 12:10
      metadata:
        usfm: EXO.12.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'aucune partie des victimes que tu sacrifieras le soir du premier jour ne sera gardée pendant la nuit jusqu’au matin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tu ne pourras point sacrifier la Pâque dans l’un quelconque des lieux que l’Éternel, ton Dieu, te donne pour demeure; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'mais c’est dans le lieu que choisira l’Éternel, ton Dieu, pour y faire résider son nom, que tu sacrifieras la Pâque, le soir, au coucher du soleil, à l’époque de ta sortie d’Égypte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tu feras cuire la victime, et tu la mangeras dans le lieu que choisira l’Éternel, ton Dieu. Et le matin, tu pourras t’en retourner et t’en aller vers tes tentes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Pendant six jours, tu mangeras des pains sans levain; et le septième jour, il y aura une assemblée solennelle en l’honneur de l’Éternel, ton Dieu: tu ne feras aucun ouvrage.'
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 9-12: cf. (Lé 23:15-21. No 28:26-31.) (Ps 103:2; 144:13-15.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 23:16
      metadata:
        usfm: EXO.23.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 23:15
      metadata:
        usfm: LEV.23.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 28:26
      metadata:
        usfm: NUM.28.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu compteras sept semaines; dès que la faucille sera mise dans les blés, tu commenceras à compter sept semaines. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Puis tu célébreras la fête des semaines, et tu feras des offrandes volontaires, selon les bénédictions que l’Éternel, ton Dieu, t’aura accordées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tu te réjouiras devant l’Éternel, ton Dieu, dans le lieu que l’Éternel, ton Dieu, choisira pour y faire résider son nom, toi, ton fils et ta fille, ton serviteur et ta servante, le Lévite qui sera dans tes portes, et l’étranger, l’orphelin et la veuve qui seront au milieu de toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tu te souviendras que tu as été esclave en Égypte, et tu observeras et mettras ces lois en pratique.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 13-17: cf. (Lé 23:33-43. Né 8:13-18.) (Ps 116:12-14. Jn 4:36.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 23:16
      metadata:
        usfm: EXO.23.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 23:34
      metadata:
        usfm: LEV.23.34
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu célébreras la fête des tabernacles pendant sept jours, quand tu recueilleras le produit de ton aire et de ton pressoir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Tu te réjouiras à cette fête, toi, ton fils et ta fille, ton serviteur et ta servante, et le Lévite, l’étranger, l’orphelin et la veuve qui seront dans tes portes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tu célébreras la fête pendant sept jours en l’honneur de l’Éternel, ton Dieu, dans le lieu que choisira l’Éternel; car l’Éternel, ton Dieu, te bénira dans toutes tes récoltes et dans tout le travail de tes mains, et tu te livreras entièrement à la joie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 23:17
      metadata:
        usfm: EXO.23.17
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 34:23
      metadata:
        usfm: EXO.34.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Trois fois par année, tous les mâles d’entre vous se présenteront devant l’Éternel, ton Dieu, dans le lieu qu’il choisira: à la fête des pains sans levain, à la fête des semaines, et à la fête des tabernacles. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 23:15
      metadata:
        usfm: EXO.23.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'On ne paraîtra point devant l’Éternel les mains vides. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Chacun donnera ce qu’il pourra, selon les bénédictions que l’Éternel, ton Dieu, lui aura accordées.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’établissement des juges
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 18-20: cf. 2 Ch 19:5-11. Pr 14:34. Ps 82; 101.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tu établiras des juges et des magistrats dans toutes les villes que l’Éternel, ton Dieu, te donne, selon tes tribus; et ils jugeront le peuple avec justice. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tu ne porteras atteinte à aucun droit, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 19:15
      metadata:
        usfm: LEV.19.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 1:17
      metadata:
        usfm: DEU.1.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'tu n’auras point égard à l’apparence des personnes, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 23:8
      metadata:
        usfm: EXO.23.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'tu ne recevras point de présent, car les présents aveuglent les yeux des sages et corrompent les paroles des justes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tu suivras ponctuellement la justice, afin que tu vives et que tu possèdes le pays que l’Éternel, ton Dieu, te donne.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les idoles et les statues
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 21-22: cf. Ex 20:4-6. Jn 4:24.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Tu ne fixeras aucune idole de bois à côté de l’autel que tu élèveras à l’Éternel, ton Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Tu ne dresseras point des statues, qui sont en aversion à l’Éternel, ton Dieu.
