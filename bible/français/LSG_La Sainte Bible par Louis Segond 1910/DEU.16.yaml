document_id: DEU.16,93
type_code: fra
verses:
  '1':
  - type: heading
    content: La célébration des fêtes
  - type: heading
    content: 'V. 1-8: cf. (Ex 12:1-28. Lé 23:4-14. No 28:16-25.) (Ps 105:5; 114:1.)'
  - type: text
    content: 'Observe le mois des épis, et célèbre la '
  - type: note
    content: Ex 12:2. Lé 23:5. No 9:1; 28:16.
  - type: text
    content: 'Pâque en l’honneur de l’Éternel, ton Dieu; car c’est dans le mois des épis que l’Éternel, ton Dieu, t’a fait sortir d’Égypte, pendant la nuit. '
  '10':
  - type: text
    content: 'Puis tu célébreras la fête des semaines, et tu feras des offrandes volontaires, selon les bénédictions que l’Éternel, ton Dieu, t’aura accordées. '
  '11':
  - type: text
    content: 'Tu te réjouiras devant l’Éternel, ton Dieu, dans le lieu que l’Éternel, ton Dieu, choisira pour y faire résider son nom, toi, ton fils et ta fille, ton serviteur et ta servante, le Lévite qui sera dans tes portes, et l’étranger, l’orphelin et la veuve qui seront au milieu de toi. '
  '12':
  - type: text
    content: Tu te souviendras que tu as été esclave en Égypte, et tu observeras et mettras ces lois en pratique.
  - type: heading
    content: 'V. 13-17: cf. (Lé 23:33-43. Né 8:13-18.) (Ps 116:12-14. Jn 4:36.)'
  '13':
  - type: text
    content: ' '
  - type: note
    content: Ex 23:16. Lé 23:34.
  - type: text
    content: 'Tu célébreras la fête des tabernacles pendant sept jours, quand tu recueilleras le produit de ton aire et de ton pressoir. '
  '14':
  - type: text
    content: 'Tu te réjouiras à cette fête, toi, ton fils et ta fille, ton serviteur et ta servante, et le Lévite, l’étranger, l’orphelin et la veuve qui seront dans tes portes. '
  '15':
  - type: text
    content: 'Tu célébreras la fête pendant sept jours en l’honneur de l’Éternel, ton Dieu, dans le lieu que choisira l’Éternel; car l’Éternel, ton Dieu, te bénira dans toutes tes récoltes et dans tout le travail de tes mains, et tu te livreras entièrement à la joie. '
  '16':
  - type: note
    content: Ex 23:17; 34:23.
  - type: text
    content: 'Trois fois par année, tous les mâles d’entre vous se présenteront devant l’Éternel, ton Dieu, dans le lieu qu’il choisira: à la fête des pains sans levain, à la fête des semaines, et à la fête des tabernacles. '
  - type: note
    content: Ex 23:15.
  - type: text
    content: 'On ne paraîtra point devant l’Éternel les mains vides. '
  '17':
  - type: text
    content: Chacun donnera ce qu’il pourra, selon les bénédictions que l’Éternel, ton Dieu, lui aura accordées.
  - type: heading
    content: L’établissement des juges
  - type: heading
    content: 'V. 18-20: cf. 2 Ch 19:5-11. Pr 14:34. Ps 82; 101.'
  '18':
  - type: text
    content: 'Tu établiras des juges et des magistrats dans toutes les villes que l’Éternel, ton Dieu, te donne, selon tes tribus; et ils jugeront le peuple avec justice. '
  '19':
  - type: text
    content: 'Tu ne porteras atteinte à aucun droit, '
  - type: note
    content: Lé 19:15. De 1:17.
  - type: text
    content: 'tu n’auras point égard à l’apparence des personnes, et '
  - type: note
    content: Ex 23:8.
  - type: text
    content: 'tu ne recevras point de présent, car les présents aveuglent les yeux des sages et corrompent les paroles des justes. '
  '2':
  - type: text
    content: 'Tu sacrifieras la Pâque à l’Éternel, ton Dieu, tes victimes de menu et de gros bétail, dans le lieu que l’Éternel choisira pour y faire résider son nom. '
  '20':
  - type: text
    content: Tu suivras ponctuellement la justice, afin que tu vives et que tu possèdes le pays que l’Éternel, ton Dieu, te donne.
  - type: heading
    content: Les idoles et les statues
  - type: heading
    content: 'V. 21-22: cf. Ex 20:4-6. Jn 4:24.'
  '21':
  - type: text
    content: 'Tu ne fixeras aucune idole de bois à côté de l’autel que tu élèveras à l’Éternel, ton Dieu. '
  '22':
  - type: text
    content: Tu ne dresseras point des statues, qui sont en aversion à l’Éternel, ton Dieu.
  '3':
  - type: text
    content: 'Pendant la fête, tu '
  - type: note
    content: Ex 12:19; 34:18.
  - type: text
    content: 'ne mangeras pas du pain levé, mais tu mangeras sept jours des pains sans levain, du pain d’affliction, car c’est avec précipitation que tu es sorti du pays d’Égypte: il en sera ainsi, afin que tu te souviennes toute ta vie du jour où tu es sorti du pays d’Égypte. '
  '4':
  - type: text
    content: 'On ne verra point chez toi de levain, dans toute l’étendue de ton pays, pendant sept jours; et '
  - type: note
    content: Ex 12:10.
  - type: text
    content: 'aucune partie des victimes que tu sacrifieras le soir du premier jour ne sera gardée pendant la nuit jusqu’au matin. '
  '5':
  - type: text
    content: 'Tu ne pourras point sacrifier la Pâque dans l’un quelconque des lieux que l’Éternel, ton Dieu, te donne pour demeure; '
  '6':
  - type: text
    content: 'mais c’est dans le lieu que choisira l’Éternel, ton Dieu, pour y faire résider son nom, que tu sacrifieras la Pâque, le soir, au coucher du soleil, à l’époque de ta sortie d’Égypte. '
  '7':
  - type: text
    content: 'Tu feras cuire la victime, et tu la mangeras dans le lieu que choisira l’Éternel, ton Dieu. Et le matin, tu pourras t’en retourner et t’en aller vers tes tentes. '
  '8':
  - type: text
    content: 'Pendant six jours, tu mangeras des pains sans levain; et le septième jour, il y aura une assemblée solennelle en l’honneur de l’Éternel, ton Dieu: tu ne feras aucun ouvrage.'
  - type: heading
    content: 'V. 9-12: cf. (Lé 23:15-21. No 28:26-31.) (Ps 103:2; 144:13-15.)'
  '9':
  - type: text
    content: ' '
  - type: note
    content: Ex 23:16. Lé 23:15. No 28:26.
  - type: text
    content: 'Tu compteras sept semaines; dès que la faucille sera mise dans les blés, tu commenceras à compter sept semaines. '
