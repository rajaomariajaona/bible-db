  - type: text
    content: INTRODUCTION À LA PREMIÈRE ÉPÎTRE DE PIERRE
  - type: text
    content: (Lu 22:32.)
  - type: text
    content: 'Les indications épistolaires données au début (1:1-2) et à la fin (5:12-14) de 1 Pierre justifient l’appellation d’épître qu’on lui reconnaît. Le corps du texte présente lui aussi les caractéristiques d’un écrit didactique. En effet, 1 Pierre est un traité de catéchisme dans lequel alternent des développements doctrinaux et des applications parénétiques comme:'
  - type: text
    content: '- des interpellations familières telles: les bien-aimés (2:11; 4:12);'
  - type: text
    content: '- des exhortations pleines de ferveur pastorale (1:6-9; 3:15; 5:6).'
  - type: text
    content: 'Les destinataires de la lettre sont présentés dans la formule introductive: «ceux qui sont étrangers et dispersés dans le Pont, la Galatie, la Cappadoce, l’Asie, et la Bithynie…» Cette présentation justifie le classement de ce document parmi les épîtres catholiques (voir l’introduction à l’épître de Jacques). Voici du reste la structure de cette épître:'
  - type: text
    content: '1. Adresse et salutations '
  - type: text
    content: 1:1-2
  - type: text
    content: '2. Actions de grâces et exhortations à la sainteté '
  - type: text
    content: 1:3–3:17
  - type: text
    content: '3. Conduite à tenir comme exemple de Jésus-Christ '
  - type: text
    content: 3:18–4:19
  - type: text
    content: '4. Exhortations aux anciens, vœux et salutations '
  - type: text
    content: 5:1-14
  - type: text
    content: 'L’auteur se présente d’entrée de jeu: «Pierre, apôtre de Jésus-Christ» (1:1). Il s’agit certainement de Simon Pierre, le frère d’André, que Jésus appela au début de son ministère (Mc 1:16-20; Mt 4:18-19; Lc 5:1-11). Mais l’absence de souvenirs explicites de la vie de Jésus dans une épître émanant du plus puissant et du plus représentatif de ses disciples étonne les lecteurs. Toutefois Marc, disciple de Pierre, étant l’auteur de l’évangile qui porte son nom (voir l’introduction à cet évangile), cette absence s’estompe du fait que Pierre sait que son disciple Marc en avait déjà parlé dans son évangile dont lui-même serait une source orale.'
  - type: text
    content: Le nom symbolique de Babylone en 5:13 associé aux salutations de Marc, «fils» spirituel de Pierre, suggère que l’épître fut écrite de Rome en Italie à l’approche de la persécution des chrétiens sous l’empereur Néron. En effet la situation politique de l’époque justifierait de donner à la ville de Rome, capitale de l’Empire, l’appellation symbolique de «Babylone» (Apoc 17:1-6, 9-19).
  - type: text
    content: La première épître de Pierre porte le message de l’espérance que le chrétien doit préserver en son salut en Jésus-Christ, dont la résurrection constitue son héritage incorruptible. De cette foi résulte la joie de vivre, même dans les épreuves du moment (voir 1:3-9).
  - type: text
    content: 'Cette raison d’espérer doit aussi pousser à une vie de sainteté: '
  - type: text
    content: «Ce n’est pas par des choses périssables, par de l’argent ou de l’or, que vous avez été rachetés… mais par le sang précieux de Christ»
  - type: text
    content: ' (voir 1:18-23). Dans ce processus de sanctification, le chrétien doit s’inspirer de l’exemple de Christ lui-même: '
  - type: text
    content: «Lui qui n’a point commis de péché, et dans la bouche duquel il ne s’est point trouvé de fraude; l ui qui, injurié, ne rendrait point d’injures, maltraité, ne faisait point de menaces, mais s’en remettait à celui qui juge justement»
  - type: text
    content: ' (voir 2:22-25).'
  - type: text
    content: On peut faire des rapprochements entre la première épître de Pierre et l’Évangile de Matthieu (surtout le sermon sur la montagne), et avec de nombreuses citations de l’Ancien Testament.
