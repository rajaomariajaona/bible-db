document_id: 1PE.INTRO1,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: INTRODUCTION À LA PREMIÈRE ÉPÎTRE DE PIERRE
  - type: usfm
    marker: imt3
    children:
    - type: text
      text: (Lu 22:32.)
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Les indications épistolaires données au début (1:1-2) et à la fin (5:12-14) de 1 Pierre justifient l’appellation d’épître qu’on lui reconnaît. Le corps du texte présente lui aussi les caractéristiques d’un écrit didactique. En effet, 1 Pierre est un traité de catéchisme dans lequel alternent des développements doctrinaux et des applications parénétiques comme:'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: '- des interpellations familières telles: les bien-aimés (2:11; 4:12);'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: '- des exhortations pleines de ferveur pastorale (1:6-9; 3:15; 5:6).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Les destinataires de la lettre sont présentés dans la formule introductive: «ceux qui sont étrangers et dispersés dans le Pont, la Galatie, la Cappadoce, l’Asie, et la Bithynie…» Cette présentation justifie le classement de ce document parmi les épîtres catholiques (voir l’introduction à l’épître de Jacques). Voici du reste la structure de cette épître:'
  - type: usfm
    marker: io1
    children:
    - type: text
      text: '1. Adresse et salutations '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 1:1-2
  - type: usfm
    marker: io1
    children:
    - type: text
      text: '2. Actions de grâces et exhortations à la sainteté '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 1:3–3:17
  - type: usfm
    marker: io1
    children:
    - type: text
      text: '3. Conduite à tenir comme exemple de Jésus-Christ '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 3:18–4:19
  - type: usfm
    marker: io1
    children:
    - type: text
      text: '4. Exhortations aux anciens, vœux et salutations '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 5:1-14
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'L’auteur se présente d’entrée de jeu: «Pierre, apôtre de Jésus-Christ» (1:1). Il s’agit certainement de Simon Pierre, le frère d’André, que Jésus appela au début de son ministère (Mc 1:16-20; Mt 4:18-19; Lc 5:1-11). Mais l’absence de souvenirs explicites de la vie de Jésus dans une épître émanant du plus puissant et du plus représentatif de ses disciples étonne les lecteurs. Toutefois Marc, disciple de Pierre, étant l’auteur de l’évangile qui porte son nom (voir l’introduction à cet évangile), cette absence s’estompe du fait que Pierre sait que son disciple Marc en avait déjà parlé dans son évangile dont lui-même serait une source orale.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Le nom symbolique de Babylone en 5:13 associé aux salutations de Marc, «fils» spirituel de Pierre, suggère que l’épître fut écrite de Rome en Italie à l’approche de la persécution des chrétiens sous l’empereur Néron. En effet la situation politique de l’époque justifierait de donner à la ville de Rome, capitale de l’Empire, l’appellation symbolique de «Babylone» (Apoc 17:1-6, 9-19).
  - type: usfm
    marker: ip
    children:
    - type: text
      text: La première épître de Pierre porte le message de l’espérance que le chrétien doit préserver en son salut en Jésus-Christ, dont la résurrection constitue son héritage incorruptible. De cette foi résulte la joie de vivre, même dans les épreuves du moment (voir 1:3-9).
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Cette raison d’espérer doit aussi pousser à une vie de sainteté: '
    - type: usfm
      marker: it
      children:
      - type: text
        text: «Ce n’est pas par des choses périssables, par de l’argent ou de l’or, que vous avez été rachetés… mais par le sang précieux de Christ»
    - type: text
      text: ' (voir 1:18-23). Dans ce processus de sanctification, le chrétien doit s’inspirer de l’exemple de Christ lui-même: '
    - type: usfm
      marker: it
      children:
      - type: text
        text: «Lui qui n’a point commis de péché, et dans la bouche duquel il ne s’est point trouvé de fraude; l ui qui, injurié, ne rendrait point d’injures, maltraité, ne faisait point de menaces, mais s’en remettait à celui qui juge justement»
    - type: text
      text: ' (voir 2:22-25).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: On peut faire des rapprochements entre la première épître de Pierre et l’Évangile de Matthieu (surtout le sermon sur la montagne), et avec de nombreuses citations de l’Ancien Testament.
  - type: text
    text: 1 Pierre:Matthieu:1:46:19-211:76:92:125:162:19,145:101 Pierre:Ésaïe:1:24s40:62:628:162:78:12s2:943:202:2253:62:3Ps 34
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Autres rapprochements avec les thèmes de l’Ancien Testament: l’exode, l’exil et la diaspora juive (1 Pi 1:1; 2:9, 11); le sacrifice (1 Pi 1:2, 8; 2:5, 21; 3:18); le juste persécuté (1 Pi 3:9; 5:9).'
