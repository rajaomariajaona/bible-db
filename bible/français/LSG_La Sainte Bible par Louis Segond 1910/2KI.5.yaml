document_id: 2KI.5
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Naaman, le Syrien, guéri de la lèpre
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-19: cf. (Lu 4:27; 17:11-19.) Job 33:14-30.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Naaman, chef de l’armée du roi de Syrie, jouissait de la faveur de son maître et d’une grande considération; car c’était par lui que l’Éternel avait délivré les Syriens. Mais cet homme fort et vaillant était lépreux. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Or les Syriens étaient sortis par troupes, et ils avaient emmené captive une petite fille du pays d’Israël, qui était au service de la femme de Naaman. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Et elle dit à sa maîtresse: Oh! Si mon seigneur était auprès du prophète qui est à Samarie, le prophète le guérirait de sa lèpre! '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Naaman alla dire à son maître: La jeune fille du pays d’Israël a parlé de telle et telle manière. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Et le roi de Syrie dit: Va, rends-toi à Samarie, et j’enverrai une lettre au roi d’Israël. Il partit, prenant avec lui dix talents d’argent, six mille sicles d’or, et dix vêtements de rechange. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il porta au roi d’Israël la lettre, où il était dit: Maintenant, quand cette lettre te sera parvenue, tu sauras que je t’envoie Naaman, mon serviteur, afin que tu le guérisses de sa lèpre. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Après avoir lu la lettre, le roi d’Israël déchira ses vêtements, et dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 32:39
      metadata:
        usfm: DEU.32.39
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 2:6
      metadata:
        usfm: 1SA.2.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Suis-je un dieu, pour faire mourir et pour faire vivre, qu’il s’adresse à moi afin que je guérisse un homme de sa lèpre? Sachez donc et comprenez qu’il cherche une occasion de dispute avec moi. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Lorsqu’Élisée, homme de Dieu, apprit que le roi d’Israël avait déchiré ses vêtements, il envoya dire au roi: Pourquoi as-tu déchiré tes vêtements? Laisse-le venir à moi, et il saura qu’il y a un prophète en Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Naaman vint avec ses chevaux et son char, et il s’arrêta à la porte de la maison d’Élisée. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Élisée lui fit dire par un messager: Va, et lave-toi sept fois dans le Jourdain; ta chair redeviendra saine, et tu seras pur. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Naaman fut irrité, et il s’en alla, en disant: Voici, je me disais: Il sortira vers moi, il se présentera lui-même, il invoquera le nom de l’Éternel, son Dieu, il agitera sa main sur la place et guérira le lépreux. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Les fleuves de Damas, l’Abana et le Parpar, ne valent-ils pas mieux que toutes les eaux d’Israël? Ne pourrais-je pas m’y laver et devenir pur? Et il s’en retournait et partait avec fureur. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mais ses serviteurs s’approchèrent pour lui parler, et ils dirent: Mon père, si le prophète t’eût demandé quelque chose de difficile, ne l’aurais-tu pas fait? Combien plus dois-tu faire ce qu’il t’a dit: Lave-toi, et tu seras pur! '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il descendit alors et se plongea sept fois dans le Jourdain, selon la parole de l’homme de Dieu; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 4:27
      metadata:
        usfm: LUK.4.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et sa chair redevint comme la chair d’un jeune enfant, et il fut pur. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Naaman retourna vers l’homme de Dieu, avec toute sa suite. Lorsqu’il fut arrivé, il se présenta devant lui, et dit: Voici, je reconnais qu’il n’y a point de Dieu sur toute la terre, si ce n’est en Israël. Et maintenant, accepte, je te prie, un présent de la part de ton serviteur. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Élisée répondit: L’Éternel, dont je suis le serviteur, est vivant! Je n’accepterai pas. Naaman le pressa d’accepter, mais il refusa. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Alors Naaman dit: Puisque tu refuses, permets que l’on donne de la terre à ton serviteur, une charge de deux mulets; car ton serviteur ne veut plus offrir à d’autres dieux ni holocauste ni sacrifice, il n’en offrira qu’à l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Voici toutefois ce que je prie l’Éternel de pardonner à ton serviteur. Quand mon maître entre dans la maison de Rimmon pour s’y prosterner et qu’il s’appuie sur ma main, je me prosterne aussi dans la maison de Rimmon: veuille l’Éternel pardonner à ton serviteur, lorsque je me prosternerai dans la maison de Rimmon! '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Élisée lui dit: Va en paix.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Guéhazi, serviteur d’Élisée, frappé de la lèpre
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 19-27: cf. 1 Ti 6:9-10. Ac 5:1-11.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Lorsque Naaman eut quitté Élisée et qu’il fut à une certaine distance, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Guéhazi, serviteur d’Élisée, homme de Dieu, se dit en lui-même: Voici, mon maître a ménagé Naaman, ce Syrien, en n’acceptant pas de sa main ce qu’il avait apporté; l’Éternel est vivant! Je vais courir après lui, et j’en obtiendrai quelque chose. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Et Guéhazi courut après Naaman. Naaman, le voyant courir après lui, descendit de son char pour aller à sa rencontre, et dit: Tout va-t-il bien? '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Il répondit: Tout va bien. Mon maître m’envoie te dire: Voici, il vient d’arriver chez moi deux jeunes gens de la montagne d’Éphraïm, d’entre les fils des prophètes; donne pour eux, je te prie, un talent d’argent et deux vêtements de rechange. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Naaman dit: Consens à prendre deux talents. Il le pressa, et il serra deux talents d’argent dans deux sacs, donna deux habits de rechange, et les fit porter devant Guéhazi par deux de ses serviteurs. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Arrivé à la colline, Guéhazi les prit de leurs mains et les déposa dans la maison, et il renvoya ces gens qui partirent. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Puis il alla se présenter à son maître. Élisée lui dit: D’où viens-tu, Guéhazi? Il répondit: Ton serviteur n’est allé ni d’un côté ni d’un autre. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Mais Élisée lui dit: Mon esprit n’était pas absent, lorsque cet homme a quitté son char pour venir à ta rencontre. Est-ce le temps de prendre de l’argent et de prendre des vêtements, puis des oliviers, des vignes, des brebis, des bœufs, des serviteurs et des servantes? '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'La lèpre de Naaman s’attachera à toi et à ta postérité pour toujours. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 12:10
      metadata:
        usfm: NUM.12.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 26:19
      metadata:
        usfm: 2CH.26.19
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '20'
      metadata:
        usfm: 2CH.26.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et Guéhazi sortit de la présence d’Élisée avec une lèpre comme la neige.
