document_id: 1JN.5
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La foi en Jésus, et ses conséquences
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-13: cf. 2 Jn 5, 6. Hé 11. Jn 1:29-34; 3:16, 36; 20:31.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 1:12
      metadata:
        usfm: JHN.1.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Quiconque croit que Jésus est le Christ, est né de Dieu, et quiconque aime celui qui l’a engendré aime aussi celui qui est né de lui. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nous connaissons que nous aimons les enfants de Dieu, lorsque nous aimons Dieu, et que nous pratiquons ses commandements. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 14:15
      metadata:
        usfm: JHN.14.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 15:10
      metadata:
        usfm: JHN.15.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Car l’amour de Dieu consiste à garder ses commandements. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 11:29
      metadata:
        usfm: MAT.11.29
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '30'
      metadata:
        usfm: MAT.11.30
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Et ses commandements ne sont pas pénibles, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'parce que tout ce qui est né de Dieu triomphe du monde; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 16:33
      metadata:
        usfm: JHN.16.33
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et la victoire qui triomphe du monde, c’est notre foi. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 15:57
      metadata:
        usfm: 1CO.15.57
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Qui est celui qui a triomphé du monde, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 4:15
      metadata:
        usfm: 1JN.4.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'sinon celui qui croit que Jésus est le Fils de Dieu? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'C’est lui, Jésus-Christ, qui est venu avec de l’eau et du sang; non avec l’eau seulement, mais avec l’eau et avec le sang; et c’est l’Esprit qui rend témoignage, parce que l’Esprit est la vérité. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Car il y en a trois qui rendent témoignage: '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'l’Esprit, l’eau et le sang, et les trois sont d’accord. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 5:37
      metadata:
        usfm: JHN.5.37
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Si nous recevons le témoignage des hommes, le témoignage de Dieu est plus grand; car le témoignage de Dieu consiste en ce qu’il a rendu témoignage à son Fils. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 3:36
      metadata:
        usfm: JHN.3.36
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 8:16
      metadata:
        usfm: ROM.8.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 4:6
      metadata:
        usfm: GAL.4.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Celui qui croit au Fils de Dieu a ce témoignage en lui-même; celui qui ne croit pas Dieu le fait menteur, puisqu’il ne croit pas au témoignage que Dieu a rendu à son Fils. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Et voici ce témoignage, c’est que Dieu nous a donné la vie éternelle, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 1:4
      metadata:
        usfm: JHN.1.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'que cette vie est dans son Fils. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Celui qui a le Fils a la vie; celui qui n’a pas le Fils de Dieu n’a pas la vie. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 20:31
      metadata:
        usfm: JHN.20.31
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Je vous ai écrit ces choses, afin que vous sachiez que vous avez la vie éternelle, vous qui croyez au nom du Fils de Dieu.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Efficacité de la prière
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 14-21: cf. Jn 15:7. Mc 11:24. Ja 5:14-16.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nous avons auprès de lui cette assurance, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 29:12
      metadata:
        usfm: JER.29.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 7:8
      metadata:
        usfm: MAT.7.8
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 21:22
      metadata:
        usfm: MAT.21.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 11:24
      metadata:
        usfm: MRK.11.24
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 11:9
      metadata:
        usfm: LUK.11.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 14:13
      metadata:
        usfm: JHN.14.13
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 15:7
      metadata:
        usfm: JHN.15.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 16:24
      metadata:
        usfm: JHN.16.24
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ja 1:5
      metadata:
        usfm: JAS.1.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 3:22
      metadata:
        usfm: 1JN.3.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'que si nous demandons quelque chose selon sa volonté, il nous écoute. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Et si nous savons qu’il nous écoute, quelque chose que nous demandions, nous savons que nous possédons la chose que nous lui avons demandée. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Si quelqu’un voit son frère commettre un péché qui ne mène point à la mort, qu’il prie, et Dieu donnera la vie à ce frère, il la donnera à ceux qui commettent un péché qui ne mène point à la mort. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 15:30
      metadata:
        usfm: NUM.15.30
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 2:25
      metadata:
        usfm: 1SA.2.25
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 12:31
      metadata:
        usfm: MAT.12.31
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 3:29
      metadata:
        usfm: MRK.3.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 12:10
      metadata:
        usfm: LUK.12.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 6:4
      metadata:
        usfm: HEB.6.4
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 10:26
      metadata:
        usfm: HEB.10.26
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Pi 2:20
      metadata:
        usfm: 2PE.2.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il y a un péché qui mène à la mort; ce n’est pas pour ce péché-là que je dis de prier. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 3:4
      metadata:
        usfm: 1JN.3.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Toute iniquité est un péché, et il y a tel péché qui ne mène pas à la mort. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 3:9
      metadata:
        usfm: 1JN.3.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Nous savons que quiconque est né de Dieu ne pèche point; mais celui qui est né de Dieu se garde lui-même, et le malin ne le touche pas. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Nous savons que nous sommes de Dieu, et que le monde entier est sous la puissance du malin. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Nous savons aussi que le Fils de Dieu est venu, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 24:45
      metadata:
        usfm: LUK.24.45
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et qu’il nous a donné l’intelligence pour connaître le Véritable; et nous sommes dans le Véritable, en son Fils Jésus-Christ. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 9:5
      metadata:
        usfm: ISA.9.5
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 44:6
      metadata:
        usfm: ISA.44.6
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 54:5
      metadata:
        usfm: ISA.54.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 20:28
      metadata:
        usfm: JHN.20.28
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 9:5
      metadata:
        usfm: ROM.9.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 3:16
      metadata:
        usfm: 1TI.3.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'C’est lui qui est le Dieu véritable, et la vie éternelle. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Petits enfants, gardez-vous des idoles.
