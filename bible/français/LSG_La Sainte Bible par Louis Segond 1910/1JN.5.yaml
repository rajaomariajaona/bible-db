document_id: 1JN.5,93
type_code: fra
verses:
  '1':
  - type: heading
    content: La foi en Jésus, et ses conséquences
  - type: heading
    content: 'V. 1-13: cf. 2 Jn 5, 6. Hé 11. Jn 1:29-34; 3:16, 36; 20:31.'
  - type: text
    content: ' '
  - type: note
    content: Jn 1:12.
  - type: text
    content: 'Quiconque croit que Jésus est le Christ, est né de Dieu, et quiconque aime celui qui l’a engendré aime aussi celui qui est né de lui. '
  '10':
  - type: note
    content: Jn 3:36. Ro 8:16. Ga 4:6.
  - type: text
    content: 'Celui qui croit au Fils de Dieu a ce témoignage en lui-même; celui qui ne croit pas Dieu le fait menteur, puisqu’il ne croit pas au témoignage que Dieu a rendu à son Fils. '
  '11':
  - type: text
    content: 'Et voici ce témoignage, c’est que Dieu nous a donné la vie éternelle, et '
  - type: note
    content: Jn 1:4.
  - type: text
    content: 'que cette vie est dans son Fils. '
  '12':
  - type: text
    content: 'Celui qui a le Fils a la vie; celui qui n’a pas le Fils de Dieu n’a pas la vie. '
  '13':
  - type: note
    content: Jn 20:31.
  - type: text
    content: Je vous ai écrit ces choses, afin que vous sachiez que vous avez la vie éternelle, vous qui croyez au nom du Fils de Dieu.
  - type: heading
    content: Efficacité de la prière
  - type: heading
    content: 'V. 14-21: cf. Jn 15:7. Mc 11:24. Ja 5:14-16.'
  '14':
  - type: text
    content: 'Nous avons auprès de lui cette assurance, '
  - type: note
    content: Jé 29:12. Mt 7:8; 21:22. Mc 11:24. Lu 11:9. Jn 14:13; 15:7; 16:24. Ja 1:5. 1 Jn 3:22.
  - type: text
    content: 'que si nous demandons quelque chose selon sa volonté, il nous écoute. '
  '15':
  - type: text
    content: 'Et si nous savons qu’il nous écoute, quelque chose que nous demandions, nous savons que nous possédons la chose que nous lui avons demandée. '
  '16':
  - type: text
    content: 'Si quelqu’un voit son frère commettre un péché qui ne mène point à la mort, qu’il prie, et Dieu donnera la vie à ce frère, il la donnera à ceux qui commettent un péché qui ne mène point à la mort. '
  - type: note
    content: No 15:30. 1 S 2:25. Mt 12:31. Mc 3:29. Lu 12:10. Hé 6:4; 10:26. 2 Pi 2:20.
  - type: text
    content: 'Il y a un péché qui mène à la mort; ce n’est pas pour ce péché-là que je dis de prier. '
  '17':
  - type: note
    content: 1 Jn 3:4.
  - type: text
    content: 'Toute iniquité est un péché, et il y a tel péché qui ne mène pas à la mort. '
  '18':
  - type: note
    content: 1 Jn 3:9.
  - type: text
    content: 'Nous savons que quiconque est né de Dieu ne pèche point; mais celui qui est né de Dieu se garde lui-même, et le malin ne le touche pas. '
  '19':
  - type: text
    content: 'Nous savons que nous sommes de Dieu, et que le monde entier est sous la puissance du malin. '
  '2':
  - type: text
    content: 'Nous connaissons que nous aimons les enfants de Dieu, lorsque nous aimons Dieu, et que nous pratiquons ses commandements. '
  '20':
  - type: text
    content: 'Nous savons aussi que le Fils de Dieu est venu, '
  - type: note
    content: Lu 24:45.
  - type: text
    content: 'et qu’il nous a donné l’intelligence pour connaître le Véritable; et nous sommes dans le Véritable, en son Fils Jésus-Christ. '
  - type: note
    content: És 9:5; 44:6; 54:5. Jn 20:28. Ro 9:5. 1 Ti 3:16.
  - type: text
    content: 'C’est lui qui est le Dieu véritable, et la vie éternelle. '
  '21':
  - type: text
    content: Petits enfants, gardez-vous des idoles.
  '3':
  - type: note
    content: Jn 14:15; 15:10.
  - type: text
    content: 'Car l’amour de Dieu consiste à garder ses commandements. '
  - type: note
    content: Mt 11:29, 30.
  - type: text
    content: 'Et ses commandements ne sont pas pénibles, '
  '4':
  - type: text
    content: 'parce que tout ce qui est né de Dieu triomphe du monde; '
  - type: note
    content: Jn 16:33.
  - type: text
    content: 'et la victoire qui triomphe du monde, c’est notre foi. '
  '5':
  - type: note
    content: 1 Co 15:57.
  - type: text
    content: 'Qui est celui qui a triomphé du monde, '
  - type: note
    content: 1 Jn 4:15.
  - type: text
    content: 'sinon celui qui croit que Jésus est le Fils de Dieu? '
  '6':
  - type: text
    content: 'C’est lui, Jésus-Christ, qui est venu avec de l’eau et du sang; non avec l’eau seulement, mais avec l’eau et avec le sang; et c’est l’Esprit qui rend témoignage, parce que l’Esprit est la vérité. '
  '7':
  - type: text
    content: 'Car il y en a trois qui rendent témoignage: '
  '8':
  - type: text
    content: 'l’Esprit, l’eau et le sang, et les trois sont d’accord. '
  '9':
  - type: note
    content: Jn 5:37.
  - type: text
    content: 'Si nous recevons le témoignage des hommes, le témoignage de Dieu est plus grand; car le témoignage de Dieu consiste en ce qu’il a rendu témoignage à son Fils. '
