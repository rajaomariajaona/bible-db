document_id: MAT.14
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mort de Jean-Baptiste
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-12: cf. (Mc 6:14-29. Lu 9:7-9.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 6:14
      metadata:
        usfm: MRK.6.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 9:7
      metadata:
        usfm: LUK.9.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'En ce temps-là, Hérode le tétrarque, ayant entendu parler de Jésus, dit à ses serviteurs: C’est Jean-Baptiste! '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il est ressuscité des morts, et c’est pour cela qu’il se fait par lui des miracles. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 6:17
      metadata:
        usfm: MRK.6.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 3:19
      metadata:
        usfm: LUK.3.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Car Hérode, qui avait fait arrêter Jean, l’avait lié et mis en prison, à cause d’Hérodias, femme de Philippe, son frère, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'parce que Jean lui disait: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 18:16
      metadata:
        usfm: LEV.18.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il ne t’est pas permis de l’avoir pour femme. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il voulait le faire mourir, mais il craignait la foule, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 21:26
      metadata:
        usfm: MAT.21.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'parce qu’elle regardait Jean comme un prophète. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Or, lorsqu’on célébra '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 40:20
      metadata:
        usfm: GEN.40.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 6:21
      metadata:
        usfm: MRK.6.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'l’anniversaire de la naissance d’Hérode, la fille d’Hérodias dansa au milieu des convives, et plut à Hérode, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jg 11:30
      metadata:
        usfm: JDG.11.30
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'de sorte qu’il promit avec serment de lui donner ce qu’elle demanderait. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'A l’instigation de sa mère, elle dit: Donne-moi ici, sur un plat, la tête de Jean-Baptiste. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Le roi fut attristé; mais, à cause de ses serments et des convives, il commanda qu’on la lui donne, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'et il envoya décapiter Jean dans la prison. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Sa tête fut apportée sur un plat, et donnée à la jeune fille, qui la porta à sa mère. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Les disciples de Jean vinrent prendre son corps, et l’ensevelirent. Et ils allèrent l’annoncer à Jésus.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Multiplication des pains
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 13-21: cf. (Mc 6:30-44. Lu 9:10-17. Jn 6:1-14.) Ph 4:19.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 12:15
      metadata:
        usfm: MAT.12.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 6:31
      metadata:
        usfm: MRK.6.31
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 9:10
      metadata:
        usfm: LUK.9.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'A cette nouvelle, Jésus partit de là dans une barque, pour se retirer à l’écart dans un lieu désert; et la foule, l’ayant su, sortit des villes et le suivit à pied. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 6:5
      metadata:
        usfm: JHN.6.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Quand il sortit de la barque, il vit une grande foule, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 9:36
      metadata:
        usfm: MAT.9.36
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'fut ému de compassion pour elle, et il guérit les malades. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 6:35
      metadata:
        usfm: MRK.6.35
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 9:12
      metadata:
        usfm: LUK.9.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Le soir étant venu, les disciples s’approchèrent de lui, et dirent: Ce lieu est désert, et l’heure est déjà avancée; renvoie la foule, afin qu’elle aille dans les villages, pour s’acheter des vivres. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Jésus leur répondit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ils n’ont pas besoin de s’en aller; donnez-leur vous-mêmes à manger.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Mais ils lui dirent: Nous n’avons ici que cinq pains et deux poissons. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Et il dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Apportez-les-moi.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Il fit asseoir la foule sur l’herbe, prit les cinq pains et les deux poissons, et, levant les yeux vers le ciel, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 9:13
      metadata:
        usfm: 1SA.9.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'il rendit grâces. Puis, il rompit les pains et les donna aux disciples, qui les distribuèrent à la foule. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tous mangèrent et furent rassasiés, et l’on emporta douze paniers pleins des morceaux qui restaient. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ceux qui avaient mangé étaient environ cinq mille hommes, sans les femmes et les enfants.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus marche sur les eaux. Guérisons à Génésareth
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 22-36: cf. (Mc 6:45-56. Jn 6:15-21.) Mt 8:23-27.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 6:45
      metadata:
        usfm: MRK.6.45
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 6:17
      metadata:
        usfm: JHN.6.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Aussitôt après, il obligea les disciples à monter dans la barque et à passer avant lui de l’autre côté, pendant qu’il renverrait la foule. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 6:46
      metadata:
        usfm: MRK.6.46
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 6:15
      metadata:
        usfm: JHN.6.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Quand il l’eut renvoyée, il monta sur la montagne, pour prier à l’écart; et, comme le soir était venu, il était là seul. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'La barque, déjà au milieu de la mer, était battue par les flots; car le vent était contraire. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'A la quatrième veille de la nuit, Jésus alla vers eux, marchant sur la mer. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Quand les disciples le virent marcher sur la mer, ils furent troublés, et dirent: C’est un fantôme! Et, dans leur frayeur, ils poussèrent des cris. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Jésus leur dit aussitôt: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Rassurez-vous, c’est moi; n’ayez pas peur!
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Pierre lui répondit: Seigneur, si c’est toi, ordonne que j’aille vers toi sur les eaux. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Et il dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Viens!
  - type: text
    text: ' Pierre sortit de la barque, et marcha sur les eaux, pour aller vers Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Mais, voyant que le vent était fort, il eut peur; et, comme il commençait à enfoncer, il s’écria: Seigneur, sauve-moi! '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Aussitôt Jésus étendit la main, le saisit, et lui dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Homme de peu de foi, pourquoi as-tu douté?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Et ils montèrent dans la barque, et le vent cessa. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ceux qui étaient dans la barque vinrent se prosterner devant Jésus, et dirent: Tu es véritablement le Fils de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 6:53
      metadata:
        usfm: MRK.6.53
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Après avoir traversé la mer, ils vinrent dans le pays de Génésareth. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Les gens de ce lieu, ayant reconnu Jésus, envoyèrent des messagers dans tous les environs, et on lui amena tous les malades. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Ils le prièrent de leur permettre seulement de toucher le bord de son vêtement. Et tous ceux qui le touchèrent furent guéris.
