document_id: MAT.14,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Mort de Jean-Baptiste
  - type: heading
    content: 'V. 1-12: cf. (Mc 6:14-29. Lu 9:7-9.)'
  - type: text
    content: ' '
  - type: note
    content: Mc 6:14. Lu 9:7.
  - type: text
    content: 'En ce temps-là, Hérode le tétrarque, ayant entendu parler de Jésus, dit à ses serviteurs: C’est Jean-Baptiste! '
  '10':
  - type: text
    content: 'et il envoya décapiter Jean dans la prison. '
  '11':
  - type: text
    content: 'Sa tête fut apportée sur un plat, et donnée à la jeune fille, qui la porta à sa mère. '
  '12':
  - type: text
    content: Les disciples de Jean vinrent prendre son corps, et l’ensevelirent. Et ils allèrent l’annoncer à Jésus.
  - type: heading
    content: Multiplication des pains
  - type: heading
    content: 'V. 13-21: cf. (Mc 6:30-44. Lu 9:10-17. Jn 6:1-14.) Ph 4:19.'
  '13':
  - type: text
    content: ' '
  - type: note
    content: Mt 12:15. Mc 6:31. Lu 9:10.
  - type: text
    content: 'A cette nouvelle, Jésus partit de là dans une barque, pour se retirer à l’écart dans un lieu désert; et la foule, l’ayant su, sortit des villes et le suivit à pied. '
  '14':
  - type: note
    content: Jn 6:5.
  - type: text
    content: 'Quand il sortit de la barque, il vit une grande foule, et '
  - type: note
    content: Mt 9:36.
  - type: text
    content: 'fut ému de compassion pour elle, et il guérit les malades. '
  '15':
  - type: note
    content: Mc 6:35. Lu 9:12.
  - type: text
    content: 'Le soir étant venu, les disciples s’approchèrent de lui, et dirent: Ce lieu est désert, et l’heure est déjà avancée; renvoie la foule, afin qu’elle aille dans les villages, pour s’acheter des vivres. '
  '16':
  - type: text
    content: 'Jésus leur répondit: '
  - type: text
    content: Ils n’ont pas besoin de s’en aller; donnez-leur vous-mêmes à manger.
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'Mais ils lui dirent: Nous n’avons ici que cinq pains et deux poissons. '
  '18':
  - type: text
    content: 'Et il dit: '
  - type: text
    content: Apportez-les-moi.
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'Il fit asseoir la foule sur l’herbe, prit les cinq pains et les deux poissons, et, levant les yeux vers le ciel, '
  - type: note
    content: 1 S 9:13.
  - type: text
    content: 'il rendit grâces. Puis, il rompit les pains et les donna aux disciples, qui les distribuèrent à la foule. '
  '2':
  - type: text
    content: 'Il est ressuscité des morts, et c’est pour cela qu’il se fait par lui des miracles. '
  '20':
  - type: text
    content: 'Tous mangèrent et furent rassasiés, et l’on emporta douze paniers pleins des morceaux qui restaient. '
  '21':
  - type: text
    content: Ceux qui avaient mangé étaient environ cinq mille hommes, sans les femmes et les enfants.
  - type: heading
    content: Jésus marche sur les eaux. Guérisons à Génésareth
  - type: heading
    content: 'V. 22-36: cf. (Mc 6:45-56. Jn 6:15-21.) Mt 8:23-27.'
  '22':
  - type: text
    content: ' '
  - type: note
    content: Mc 6:45. Jn 6:17.
  - type: text
    content: 'Aussitôt après, il obligea les disciples à monter dans la barque et à passer avant lui de l’autre côté, pendant qu’il renverrait la foule. '
  '23':
  - type: note
    content: Mc 6:46. Jn 6:15.
  - type: text
    content: 'Quand il l’eut renvoyée, il monta sur la montagne, pour prier à l’écart; et, comme le soir était venu, il était là seul. '
  '24':
  - type: text
    content: 'La barque, déjà au milieu de la mer, était battue par les flots; car le vent était contraire. '
  '25':
  - type: text
    content: 'A la quatrième veille de la nuit, Jésus alla vers eux, marchant sur la mer. '
  '26':
  - type: text
    content: 'Quand les disciples le virent marcher sur la mer, ils furent troublés, et dirent: C’est un fantôme! Et, dans leur frayeur, ils poussèrent des cris. '
  '27':
  - type: text
    content: 'Jésus leur dit aussitôt: '
  - type: text
    content: Rassurez-vous, c’est moi; n’ayez pas peur!
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'Pierre lui répondit: Seigneur, si c’est toi, ordonne que j’aille vers toi sur les eaux. '
  '29':
  - type: text
    content: 'Et il dit: '
  - type: text
    content: Viens!
  - type: text
    content: ' Pierre sortit de la barque, et marcha sur les eaux, pour aller vers Jésus. '
  '3':
  - type: note
    content: Mc 6:17. Lu 3:19.
  - type: text
    content: 'Car Hérode, qui avait fait arrêter Jean, l’avait lié et mis en prison, à cause d’Hérodias, femme de Philippe, son frère, '
  '30':
  - type: text
    content: 'Mais, voyant que le vent était fort, il eut peur; et, comme il commençait à enfoncer, il s’écria: Seigneur, sauve-moi! '
  '31':
  - type: text
    content: 'Aussitôt Jésus étendit la main, le saisit, et lui dit: '
  - type: text
    content: Homme de peu de foi, pourquoi as-tu douté?
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'Et ils montèrent dans la barque, et le vent cessa. '
  '33':
  - type: text
    content: 'Ceux qui étaient dans la barque vinrent se prosterner devant Jésus, et dirent: Tu es véritablement le Fils de Dieu. '
  '34':
  - type: note
    content: Mc 6:53.
  - type: text
    content: 'Après avoir traversé la mer, ils vinrent dans le pays de Génésareth. '
  '35':
  - type: text
    content: 'Les gens de ce lieu, ayant reconnu Jésus, envoyèrent des messagers dans tous les environs, et on lui amena tous les malades. '
  '36':
  - type: text
    content: Ils le prièrent de leur permettre seulement de toucher le bord de son vêtement. Et tous ceux qui le touchèrent furent guéris.
  '4':
  - type: text
    content: 'parce que Jean lui disait: '
  - type: note
    content: Lé 18:16.
  - type: text
    content: 'Il ne t’est pas permis de l’avoir pour femme. '
  '5':
  - type: text
    content: 'Il voulait le faire mourir, mais il craignait la foule, '
  - type: note
    content: Mt 21:26.
  - type: text
    content: 'parce qu’elle regardait Jean comme un prophète. '
  '6':
  - type: text
    content: 'Or, lorsqu’on célébra '
  - type: note
    content: Ge 40:20. Mc 6:21.
  - type: text
    content: 'l’anniversaire de la naissance d’Hérode, la fille d’Hérodias dansa au milieu des convives, et plut à Hérode, '
  '7':
  - type: note
    content: Jg 11:30.
  - type: text
    content: 'de sorte qu’il promit avec serment de lui donner ce qu’elle demanderait. '
  '8':
  - type: text
    content: 'A l’instigation de sa mère, elle dit: Donne-moi ici, sur un plat, la tête de Jean-Baptiste. '
  '9':
  - type: text
    content: 'Le roi fut attristé; mais, à cause de ses serments et des convives, il commanda qu’on la lui donne, '
