document_id: REV.10,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Avant le son de la septième trompette: un livre apporté du ciel par un ange; les deux témoins'
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-11: cf. Da 12:7-9. (Éz 2:8-10; 3:1-4.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je vis un autre ange puissant, qui descendait du ciel, enveloppé d’une nuée; au-dessus de sa tête était l’arc-en-ciel, et son visage était comme '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 17:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'le soleil, et ses pieds comme '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 1:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'des colonnes de feu. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je pris le petit livre de la main de l’ange, et je l’avalai; il fut dans ma bouche doux comme du miel, mais quand je l’eus avalé, mes entrailles furent remplies d’amertume. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis on me dit: Il faut que tu prophétises de nouveau sur beaucoup de peuples, de nations, de langues, et de rois.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il tenait dans sa main un petit livre ouvert. Il posa son pied droit sur la mer, et son pied gauche sur la terre; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et il cria d’une voix forte, comme rugit un lion. Quand il cria, les sept tonnerres firent entendre leurs voix. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et quand les sept tonnerres eurent fait entendre leurs voix, j’allais écrire; et j’entendis du ciel une voix qui disait: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Da 8:26
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 12:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Scelle ce qu’ont dit les sept tonnerres, et ne l’écris pas. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Da 12:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Et l’ange, que je voyais debout sur la mer et sur la terre, leva sa main droite vers le ciel, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et jura par celui qui vit aux siècles des siècles, qui a créé le ciel et les choses qui y sont, la terre et les choses qui y sont, et la mer et les choses qui y sont, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 11:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'qu’il n’y aurait plus de temps, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mais qu’aux jours de la voix du septième ange, quand il sonnerait de la trompette, le mystère de Dieu s’accomplirait, comme il l’a annoncé à ses serviteurs, les prophètes. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et la voix, que j’avais entendue du ciel, me parla de nouveau, et dit: Va, prends le petit livre ouvert dans la main de l’ange qui se tient debout sur la mer et sur la terre. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et j’allai vers l’ange, en lui disant de me donner le petit livre. Et il me dit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 3:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Prends-le, et avale-le; il sera amer à tes entrailles, mais dans ta bouche il sera doux comme du miel. '
