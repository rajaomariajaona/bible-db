  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ses vierges ne furent pas célébrées;
  '64':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '64'
    - type: text
      text: ' '
    - type: usfm
      marker: x
