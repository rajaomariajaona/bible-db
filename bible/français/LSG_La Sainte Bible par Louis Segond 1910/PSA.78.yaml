  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et fit habiter dans leurs tentes les tribus d’Israël.
  '56':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '56'
