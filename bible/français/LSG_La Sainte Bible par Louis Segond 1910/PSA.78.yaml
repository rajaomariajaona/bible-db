document_id: PSA.78,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: Ps 105; 106. Né 9:9-28.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Cantique d’Asaph.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon peuple, écoute mes instructions!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prêtez l’oreille aux paroles de ma bouche!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ils ne gardèrent point l’alliance de Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils refusèrent de marcher selon sa loi.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ils mirent en oubli ses œuvres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses merveilles qu’il leur avait fait voir.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Devant leurs pères il avait fait des prodiges,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au pays d’Égypte, dans les campagnes de Tsoan.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 14:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il fendit la mer et leur ouvrit un passage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il fit dresser les eaux comme une muraille.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 13:21
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 105:39
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il les conduisit le jour par la nuée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et toute la nuit par un feu éclatant.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 17:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 20:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 105:41
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 10:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il fendit des rochers dans le désert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il donna à boire comme des flots abondants;
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Du rocher il fit jaillir des sources,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et couler des eaux comme des fleuves.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Mais ils continuèrent à pécher contre lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A se révolter contre le Très-Haut dans le désert.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ils tentèrent Dieu dans leur cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En demandant de la nourriture selon leur désir.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 11:1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '4'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ils parlèrent contre Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ils dirent: Dieu pourrait-il'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dresser une table dans le désert?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 49:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 13:35
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: J’ouvre la bouche par des sentences,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je publie la sagesse des temps anciens.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 17:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 20:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Voici, il a frappé le rocher, et des eaux ont coulé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et des torrents se sont répandus;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourra-t-il aussi donner du pain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ou fournir de la viande à son peuple?
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: No 11:1, etc.
      marker-yv: yv-n
    - type: text
      text: L’Éternel entendit, et il fut irrité;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un feu s’alluma contre Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la colère s’éleva contre Israël,
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Parce qu’ils ne crurent pas en Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce qu’ils n’eurent pas confiance dans son secours.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Il commanda aux nuages d’en haut,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il ouvrit les portes des cieux;
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 16:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il fit pleuvoir sur eux la manne pour nourriture,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il leur donna le blé du ciel.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 6:31
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 10:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ils mangèrent tous le pain des grands,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il leur envoya de la nourriture à satiété.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 11:31
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il fit souffler dans les cieux le vent d’orient,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il amena par sa puissance le vent du midi;
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Il fit pleuvoir sur eux la viande comme de la poussière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et comme le sable des mers les oiseaux ailés;
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Il les fit tomber au milieu de leur camp,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tout autour de leurs demeures.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Ils mangèrent et se rassasièrent abondamment:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu leur donna ce qu’ils avaient désiré.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ce que nous avons entendu, ce que nous savons,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce que nos pères nous ont raconté,
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Ils n’avaient pas satisfait leur désir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils avaient encore leur nourriture dans la bouche,
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 11:33
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 10:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Lorsque la colère de Dieu s’éleva contre eux;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il frappa de mort les plus vigoureux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il abattit les jeunes hommes d’Israël.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Malgré tout cela, ils continuèrent à pécher,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ne crurent point à ses prodiges.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Il consuma leurs jours par la vanité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et leurs années par une fin soudaine.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Quand il les frappait de mort, ils le cherchaient,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils revenaient et se tournaient vers Dieu;
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Ils se souvenaient que Dieu était leur rocher,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que le Dieu Très-Haut était leur libérateur.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Mais ils le trompaient de la bouche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils lui mentaient de la langue;
  '37':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Leur cœur n’était pas ferme envers lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils n’étaient pas fidèles à son alliance.
  '38':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Toutefois, dans sa miséricorde, il pardonne l’iniquité et ne détruit pas;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il retient souvent sa colère et ne se livre pas à toute sa fureur.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: Il se souvint qu’ils n’étaient que chair,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un souffle qui s’en va et ne revient pas.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Nous ne le cacherons point à leurs enfants;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous dirons à la génération future les louanges de l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et sa puissance, et les prodiges qu’il a opérés.
  '40':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Que de fois ils se révoltèrent contre lui dans le désert!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que de fois ils l’irritèrent dans la solitude!
  '41':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: Ils ne cessèrent de tenter Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et de provoquer le Saint d’Israël.
  '42':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: Ils ne se souvinrent pas de sa puissance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Du jour où il les délivra de l’ennemi,
  '43':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: Des miracles qu’il accomplit en Égypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et de ses prodiges dans les campagnes de Tsoan.
  '44':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 7:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il changea leurs fleuves en sang,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils ne purent en boire les eaux.
  '45':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 8:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il envoya contre eux des mouches venimeuses qui les dévorèrent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et des '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 8:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: grenouilles qui les détruisirent.
  '46':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 10:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il livra leurs récoltes aux sauterelles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le produit de leur travail aux sauterelles.
  '47':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 9:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il fit périr leurs vignes par la grêle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et leurs sycomores par la gelée.
  '48':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: Il abandonna leur bétail à la grêle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et leurs troupeaux au feu du ciel.
  '49':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: Il lança contre eux son ardente colère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La fureur, la rage et la détresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Une troupe de messagers de malheur.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
