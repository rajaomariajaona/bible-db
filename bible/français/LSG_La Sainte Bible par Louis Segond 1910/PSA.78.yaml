document_id: PSA.78,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ps 105; 106. Né 9:9-28.
  - type: text
    content: Cantique d’Asaph.
  - type: text
    content: Mon peuple, écoute mes instructions!
  - type: text
    content: Prêtez l’oreille aux paroles de ma bouche!
  '10':
  - type: text
    content: Ils ne gardèrent point l’alliance de Dieu,
  - type: text
    content: Et ils refusèrent de marcher selon sa loi.
  '11':
  - type: text
    content: Ils mirent en oubli ses œuvres,
  - type: text
    content: Ses merveilles qu’il leur avait fait voir.
  '12':
  - type: text
    content: Devant leurs pères il avait fait des prodiges,
  - type: text
    content: Au pays d’Égypte, dans les campagnes de Tsoan.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Ex 14:21.
  - type: text
    content: Il fendit la mer et leur ouvrit un passage,
  - type: text
    content: Il fit dresser les eaux comme une muraille.
  '14':
  - type: text
    content: ' '
  - type: note
    content: Ex 13:21. Ps 105:39.
  - type: text
    content: Il les conduisit le jour par la nuée,
  - type: text
    content: Et toute la nuit par un feu éclatant.
  '15':
  - type: text
    content: ' '
  - type: note
    content: Ex 17:5. No 20:11. Ps 105:41. 1 Co 10:4.
  - type: text
    content: Il fendit des rochers dans le désert,
  - type: text
    content: Et il donna à boire comme des flots abondants;
  '16':
  - type: text
    content: Du rocher il fit jaillir des sources,
  - type: text
    content: Et couler des eaux comme des fleuves.
  '17':
  - type: text
    content: Mais ils continuèrent à pécher contre lui,
  - type: text
    content: A se révolter contre le Très-Haut dans le désert.
  '18':
  - type: text
    content: Ils tentèrent Dieu dans leur cœur,
  - type: text
    content: En demandant de la nourriture selon leur désir.
  '19':
  - type: text
    content: ' '
  - type: note
    content: No 11:1, 4.
  - type: text
    content: Ils parlèrent contre Dieu,
  - type: text
    content: 'Ils dirent: Dieu pourrait-il'
  - type: text
    content: Dresser une table dans le désert?
  '2':
  - type: text
    content: ' '
  - type: note
    content: Ps 49:5. Mt 13:35.
  - type: text
    content: J’ouvre la bouche par des sentences,
  - type: text
    content: Je publie la sagesse des temps anciens.
  '20':
  - type: text
    content: ' '
  - type: note
    content: Ex 17:6. No 20:11.
  - type: text
    content: Voici, il a frappé le rocher, et des eaux ont coulé,
  - type: text
    content: Et des torrents se sont répandus;
  - type: text
    content: Pourra-t-il aussi donner du pain,
  - type: text
    content: Ou fournir de la viande à son peuple?
  '21':
  - type: text
    content: ' '
  - type: note
    content: No 11:1, etc.
  - type: text
    content: L’Éternel entendit, et il fut irrité;
  - type: text
    content: Un feu s’alluma contre Jacob,
  - type: text
    content: Et la colère s’éleva contre Israël,
  '22':
  - type: text
    content: Parce qu’ils ne crurent pas en Dieu,
  - type: text
    content: Parce qu’ils n’eurent pas confiance dans son secours.
  '23':
  - type: text
    content: Il commanda aux nuages d’en haut,
  - type: text
    content: Et il ouvrit les portes des cieux;
  '24':
  - type: text
    content: ' '
  - type: note
    content: Ex 16:14.
  - type: text
    content: Il fit pleuvoir sur eux la manne pour nourriture,
  - type: text
    content: Il leur donna le blé du ciel.
  '25':
  - type: text
    content: ' '
  - type: note
    content: Jn 6:31. 1 Co 10:3.
  - type: text
    content: Ils mangèrent tous le pain des grands,
  - type: text
    content: Il leur envoya de la nourriture à satiété.
  '26':
  - type: text
    content: ' '
  - type: note
    content: No 11:31.
  - type: text
    content: Il fit souffler dans les cieux le vent d’orient,
  - type: text
    content: Et il amena par sa puissance le vent du midi;
  '27':
  - type: text
    content: Il fit pleuvoir sur eux la viande comme de la poussière,
  - type: text
    content: Et comme le sable des mers les oiseaux ailés;
  '28':
  - type: text
    content: Il les fit tomber au milieu de leur camp,
  - type: text
    content: Tout autour de leurs demeures.
  '29':
  - type: text
    content: 'Ils mangèrent et se rassasièrent abondamment:'
  - type: text
    content: Dieu leur donna ce qu’ils avaient désiré.
  '3':
  - type: text
    content: Ce que nous avons entendu, ce que nous savons,
  - type: text
    content: Ce que nos pères nous ont raconté,
  '30':
  - type: text
    content: Ils n’avaient pas satisfait leur désir,
  - type: text
    content: Ils avaient encore leur nourriture dans la bouche,
  '31':
  - type: text
    content: ' '
  - type: note
    content: No 11:33. 1 Co 10:5.
  - type: text
    content: Lorsque la colère de Dieu s’éleva contre eux;
  - type: text
    content: Il frappa de mort les plus vigoureux,
  - type: text
    content: Il abattit les jeunes hommes d’Israël.
  '32':
  - type: text
    content: Malgré tout cela, ils continuèrent à pécher,
  - type: text
    content: Et ne crurent point à ses prodiges.
  '33':
  - type: text
    content: Il consuma leurs jours par la vanité,
  - type: text
    content: Et leurs années par une fin soudaine.
  '34':
  - type: text
    content: Quand il les frappait de mort, ils le cherchaient,
  - type: text
    content: Ils revenaient et se tournaient vers Dieu;
  '35':
  - type: text
    content: Ils se souvenaient que Dieu était leur rocher,
  - type: text
    content: Que le Dieu Très-Haut était leur libérateur.
  '36':
  - type: text
    content: Mais ils le trompaient de la bouche,
  - type: text
    content: Et ils lui mentaient de la langue;
  '37':
  - type: text
    content: Leur cœur n’était pas ferme envers lui,
  - type: text
    content: Et ils n’étaient pas fidèles à son alliance.
  '38':
  - type: text
    content: Toutefois, dans sa miséricorde, il pardonne l’iniquité et ne détruit pas;
  - type: text
    content: Il retient souvent sa colère et ne se livre pas à toute sa fureur.
  '39':
  - type: text
    content: Il se souvint qu’ils n’étaient que chair,
  - type: text
    content: Un souffle qui s’en va et ne revient pas.
  '4':
  - type: text
    content: Nous ne le cacherons point à leurs enfants;
  - type: text
    content: Nous dirons à la génération future les louanges de l’Éternel,
  - type: text
    content: Et sa puissance, et les prodiges qu’il a opérés.
  '40':
  - type: text
    content: Que de fois ils se révoltèrent contre lui dans le désert!
  - type: text
    content: Que de fois ils l’irritèrent dans la solitude!
  '41':
  - type: text
    content: Ils ne cessèrent de tenter Dieu,
  - type: text
    content: Et de provoquer le Saint d’Israël.
  '42':
  - type: text
    content: Ils ne se souvinrent pas de sa puissance,
  - type: text
    content: Du jour où il les délivra de l’ennemi,
  '43':
  - type: text
    content: Des miracles qu’il accomplit en Égypte,
  - type: text
    content: Et de ses prodiges dans les campagnes de Tsoan.
  '44':
  - type: text
    content: ' '
  - type: note
    content: Ex 7:20.
  - type: text
    content: Il changea leurs fleuves en sang,
  - type: text
    content: Et ils ne purent en boire les eaux.
  '45':
  - type: text
    content: ' '
  - type: note
    content: Ex 8:24.
  - type: text
    content: Il envoya contre eux des mouches venimeuses qui les dévorèrent,
  - type: text
    content: 'Et des '
  - type: note
    content: Ex 8:6.
  - type: text
    content: grenouilles qui les détruisirent.
  '46':
  - type: text
    content: ' '
  - type: note
    content: Ex 10:13.
  - type: text
    content: Il livra leurs récoltes aux sauterelles,
  - type: text
    content: Le produit de leur travail aux sauterelles.
  '47':
  - type: text
    content: ' '
  - type: note
    content: Ex 9:23.
  - type: text
    content: Il fit périr leurs vignes par la grêle,
  - type: text
    content: Et leurs sycomores par la gelée.
  '48':
  - type: text
    content: Il abandonna leur bétail à la grêle,
  - type: text
    content: Et leurs troupeaux au feu du ciel.
  '49':
  - type: text
    content: Il lança contre eux son ardente colère,
  - type: text
    content: La fureur, la rage et la détresse,
  - type: text
    content: Une troupe de messagers de malheur.
  '5':
  - type: text
    content: ' '
  - type: note
    content: De 4:9; 6:7.
  - type: text
    content: Il a établi un témoignage en Jacob,
  - type: text
    content: Il a mis une loi en Israël,
  - type: text
    content: Et il a ordonné à nos pères de l’enseigner à leurs enfants,
  '50':
  - type: text
    content: Il donna libre cours à sa colère,
  - type: text
    content: Il ne sauva pas leur âme de la mort,
  - type: note
    content: Ex 9:6.
  - type: text
    content: Il livra leur vie à la mortalité;
  '51':
  - type: text
    content: ' '
  - type: note
    content: Ex 12:29.
  - type: text
    content: Il frappa tous les premiers-nés en Égypte,
  - type: text
    content: Les prémices de la force sous les tentes de Cham.
  '52':
  - type: text
    content: Il fit partir son peuple comme des brebis,
  - type: text
    content: Il les conduisit comme un troupeau dans le désert.
  '53':
  - type: text
    content: Il les dirigea sûrement, pour qu’ils fussent sans crainte,
  - type: note
    content: Ex 14:27, 28; 15:10.
  - type: text
    content: Et la mer couvrit leurs ennemis.
  '54':
  - type: text
    content: Il les amena vers sa frontière sainte,
  - type: text
    content: Vers cette montagne que sa droite a acquise.
  '55':
  - type: text
    content: Il chassa devant eux les nations,
  - type: note
    content: Jos 13:7. Ps 136:21, 22.
  - type: text
    content: Leur distribua le pays en héritage,
  - type: text
    content: Et fit habiter dans leurs tentes les tribus d’Israël.
  '56':
  - type: text
    content: Mais ils tentèrent le Dieu Très-Haut et se révoltèrent contre lui,
  - type: text
    content: Et ils n’observèrent point ses ordonnances.
  '57':
  - type: text
    content: Ils s’éloignèrent et furent infidèles, comme leurs pères,
  - type: text
    content: Ils tournèrent, comme un arc trompeur.
  '58':
  - type: text
    content: Ils l’irritèrent par leurs hauts lieux,
  - type: note
    content: De 32:16, 21.
  - type: text
    content: Et ils excitèrent sa jalousie par leurs idoles.
  '59':
  - type: text
    content: Dieu entendit, et il fut irrité;
  - type: text
    content: Il repoussa fortement Israël.
  '6':
  - type: text
    content: Pour qu’elle fût connue de la génération future,
  - type: text
    content: Des enfants qui naîtraient,
  - type: text
    content: Et que, devenus grands, ils en parlassent à leurs enfants,
  '60':
  - type: text
    content: Il abandonna la demeure de Silo,
  - type: text
    content: La tente où il habitait parmi les hommes;
  '61':
  - type: text
    content: ' '
  - type: note
    content: 1 S 4:10, 11.
  - type: text
    content: Il livra sa gloire à la captivité,
  - type: text
    content: Et sa majesté entre les mains de l’ennemi.
  '62':
  - type: text
    content: Il mit son peuple à la merci du glaive,
  - type: text
    content: Et il s’indigna contre son héritage.
  '63':
  - type: text
    content: Le feu dévora ses jeunes hommes,
  - type: text
    content: Et ses vierges ne furent pas célébrées;
  '64':
  - type: text
    content: ' '
  - type: note
    content: 1 S 4:11, 18, 19.
  - type: text
    content: Ses sacrificateurs tombèrent par l’épée,
  - type: text
    content: Et ses veuves ne pleurèrent pas.
  '65':
  - type: text
    content: Le Seigneur s’éveilla comme celui qui a dormi,
  - type: text
    content: Comme un héros qu’a subjugué le vin.
  '66':
  - type: text
    content: ' '
  - type: note
    content: 1 S 5:6; 6:4.
  - type: text
    content: Il frappa ses adversaires en fuite,
  - type: text
    content: Il les couvrit d’un opprobre éternel.
  '67':
  - type: text
    content: Cependant il rejeta la tente de Joseph,
  - type: text
    content: Et il ne choisit point la tribu d’Éphraïm;
  '68':
  - type: text
    content: Il préféra la tribu de Juda,
  - type: text
    content: La montagne de Sion qu’il aimait.
  '69':
  - type: text
    content: Et il bâtit son sanctuaire comme les lieux élevés,
  - type: text
    content: Comme la terre qu’il a fondée pour toujours.
  '7':
  - type: text
    content: Afin qu’ils missent en Dieu leur confiance,
  - type: text
    content: Qu’ils n’oubliassent pas les œuvres de Dieu,
  - type: text
    content: Et qu’ils observassent ses commandements,
  '70':
  - type: text
    content: ' '
  - type: note
    content: 1 S 16:11. 2 S 7:8.
  - type: text
    content: Il choisit David, son serviteur,
  - type: text
    content: Et il le tira des bergeries;
  '71':
  - type: text
    content: Il le prit derrière les brebis qui allaitent,
  - type: note
    content: 2 S 5:2. 1 Ch 11:2.
  - type: text
    content: Pour lui faire paître Jacob, son peuple,
  - type: text
    content: Et Israël, son héritage.
  '72':
  - type: text
    content: Et David les dirigea avec un cœur intègre,
  - type: text
    content: Et les conduisit avec des mains intelligentes.
  '8':
  - type: text
    content: Afin qu’ils ne fussent pas, comme leurs pères,
  - type: note
    content: Ex 32:9; 33:3, 5; 34:9. De 9:6, 13; 31:27.
  - type: text
    content: Une race indocile et rebelle,
  - type: text
    content: Une race dont le cœur n’était pas ferme,
  - type: text
    content: Et dont l’esprit n’était pas fidèle à Dieu.
  '9':
  - type: text
    content: Les fils d’Éphraïm, armés et tirant de l’arc,
  - type: text
    content: Tournèrent le dos le jour du combat.
