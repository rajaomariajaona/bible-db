      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 32:16
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '21'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Et ils excitèrent sa jalousie par leurs idoles.
  '59':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '59'
    - type: text
      text: Dieu entendit, et il fut irrité;
  - type: usfm
    marker: q1
    children:
    - type: text
