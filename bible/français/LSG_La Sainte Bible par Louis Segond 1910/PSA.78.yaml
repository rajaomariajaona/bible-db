        - type: text
          text: 6:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il a établi un témoignage en Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a mis une loi en Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il a ordonné à nos pères de l’enseigner à leurs enfants,
  '50':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: Il donna libre cours à sa colère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne sauva pas leur âme de la mort,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 9:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il livra leur vie à la mortalité;
  '51':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 12:29
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il frappa tous les premiers-nés en Égypte,
  - type: usfm
    marker: q1
    children:
    - type: text
