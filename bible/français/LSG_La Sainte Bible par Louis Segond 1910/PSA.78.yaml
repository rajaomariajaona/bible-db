  '57':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '57'
    - type: text
      text: Ils s’éloignèrent et furent infidèles, comme leurs pères,
  - type: usfm
    marker: q1
    children:
    - type: text
