      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Cantique d’Asaph.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon peuple, écoute mes instructions!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Prêtez l’oreille aux paroles de ma bouche!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 49:5
      metadata:
        usfm: PSA.49.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 13:35
      metadata:
        usfm: MAT.13.35
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: J’ouvre la bouche par des sentences,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je publie la sagesse des temps anciens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ce que nous avons entendu, ce que nous savons,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce que nos pères nous ont raconté,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Nous ne le cacherons point à leurs enfants;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous dirons à la génération future les louanges de l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et sa puissance, et les prodiges qu’il a opérés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 4:9
      metadata:
        usfm: DEU.4.9
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 6:7
      metadata:
        usfm: DEU.6.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il a établi un témoignage en Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a mis une loi en Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il a ordonné à nos pères de l’enseigner à leurs enfants,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Pour qu’elle fût connue de la génération future,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Des enfants qui naîtraient,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que, devenus grands, ils en parlassent à leurs enfants,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Afin qu’ils missent en Dieu leur confiance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’ils n’oubliassent pas les œuvres de Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qu’ils observassent ses commandements,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Afin qu’ils ne fussent pas, comme leurs pères,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 32:9
      metadata:
        usfm: EXO.32.9
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 33:3
      metadata:
        usfm: EXO.33.3
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '5'
      metadata:
        usfm: EXO.33.5
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 34:9
      metadata:
        usfm: EXO.34.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 9:6
      metadata:
        usfm: DEU.9.6
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '13'
      metadata:
        usfm: DEU.9.13
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 31:27
      metadata:
        usfm: DEU.31.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Une race indocile et rebelle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Une race dont le cœur n’était pas ferme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et dont l’esprit n’était pas fidèle à Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Les fils d’Éphraïm, armés et tirant de l’arc,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tournèrent le dos le jour du combat.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ils ne gardèrent point l’alliance de Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils refusèrent de marcher selon sa loi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ils mirent en oubli ses œuvres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses merveilles qu’il leur avait fait voir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Devant leurs pères il avait fait des prodiges,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au pays d’Égypte, dans les campagnes de Tsoan.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 14:21
      metadata:
        usfm: EXO.14.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il fendit la mer et leur ouvrit un passage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il fit dresser les eaux comme une muraille.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 13:21
      metadata:
        usfm: EXO.13.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 105:39
      metadata:
        usfm: PSA.105.39
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il les conduisit le jour par la nuée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et toute la nuit par un feu éclatant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 17:5
      metadata:
        usfm: EXO.17.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 20:11
      metadata:
        usfm: NUM.20.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 105:41
      metadata:
        usfm: PSA.105.41
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 10:4
      metadata:
        usfm: 1CO.10.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il fendit des rochers dans le désert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il donna à boire comme des flots abondants;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Du rocher il fit jaillir des sources,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et couler des eaux comme des fleuves.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Mais ils continuèrent à pécher contre lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A se révolter contre le Très-Haut dans le désert.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ils tentèrent Dieu dans leur cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: En demandant de la nourriture selon leur désir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 11:1
      metadata:
        usfm: NUM.11.1
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '4'
      metadata:
        usfm: NUM.11.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ils parlèrent contre Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ils dirent: Dieu pourrait-il'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dresser une table dans le désert?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 17:6
      metadata:
        usfm: EXO.17.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 20:11
      metadata:
        usfm: NUM.20.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Voici, il a frappé le rocher, et des eaux ont coulé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et des torrents se sont répandus;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourra-t-il aussi donner du pain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ou fournir de la viande à son peuple?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: No 11:1, etc.
    marker-yv: yv-n
  - type: text
    text: L’Éternel entendit, et il fut irrité;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Un feu s’alluma contre Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la colère s’éleva contre Israël,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Parce qu’ils ne crurent pas en Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parce qu’ils n’eurent pas confiance dans son secours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Il commanda aux nuages d’en haut,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il ouvrit les portes des cieux;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 16:14
      metadata:
        usfm: EXO.16.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il fit pleuvoir sur eux la manne pour nourriture,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il leur donna le blé du ciel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 6:31
      metadata:
        usfm: JHN.6.31
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 10:3
      metadata:
        usfm: 1CO.10.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ils mangèrent tous le pain des grands,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il leur envoya de la nourriture à satiété.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 11:31
      metadata:
        usfm: NUM.11.31
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il fit souffler dans les cieux le vent d’orient,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il amena par sa puissance le vent du midi;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Il fit pleuvoir sur eux la viande comme de la poussière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et comme le sable des mers les oiseaux ailés;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Il les fit tomber au milieu de leur camp,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tout autour de leurs demeures.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ils mangèrent et se rassasièrent abondamment:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dieu leur donna ce qu’ils avaient désiré.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ils n’avaient pas satisfait leur désir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils avaient encore leur nourriture dans la bouche,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 11:33
      metadata:
        usfm: NUM.11.33
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 10:5
      metadata:
        usfm: 1CO.10.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Lorsque la colère de Dieu s’éleva contre eux;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il frappa de mort les plus vigoureux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il abattit les jeunes hommes d’Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Malgré tout cela, ils continuèrent à pécher,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ne crurent point à ses prodiges.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Il consuma leurs jours par la vanité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et leurs années par une fin soudaine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Quand il les frappait de mort, ils le cherchaient,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils revenaient et se tournaient vers Dieu;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Ils se souvenaient que Dieu était leur rocher,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que le Dieu Très-Haut était leur libérateur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Mais ils le trompaient de la bouche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils lui mentaient de la langue;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Leur cœur n’était pas ferme envers lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils n’étaient pas fidèles à son alliance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Toutefois, dans sa miséricorde, il pardonne l’iniquité et ne détruit pas;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il retient souvent sa colère et ne se livre pas à toute sa fureur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Il se souvint qu’ils n’étaient que chair,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Un souffle qui s’en va et ne revient pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Que de fois ils se révoltèrent contre lui dans le désert!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que de fois ils l’irritèrent dans la solitude!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Ils ne cessèrent de tenter Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et de provoquer le Saint d’Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Ils ne se souvinrent pas de sa puissance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Du jour où il les délivra de l’ennemi,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Des miracles qu’il accomplit en Égypte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et de ses prodiges dans les campagnes de Tsoan.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 7:20
      metadata:
        usfm: EXO.7.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il changea leurs fleuves en sang,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils ne purent en boire les eaux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 8:24
      metadata:
        usfm: EXO.8.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il envoya contre eux des mouches venimeuses qui les dévorèrent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et des '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 8:6
      metadata:
        usfm: EXO.8.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: grenouilles qui les détruisirent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 10:13
      metadata:
        usfm: EXO.10.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il livra leurs récoltes aux sauterelles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le produit de leur travail aux sauterelles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 9:23
      metadata:
        usfm: EXO.9.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il fit périr leurs vignes par la grêle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et leurs sycomores par la gelée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: Il abandonna leur bétail à la grêle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et leurs troupeaux au feu du ciel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Il lança contre eux son ardente colère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La fureur, la rage et la détresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Une troupe de messagers de malheur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: Il donna libre cours à sa colère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il ne sauva pas leur âme de la mort,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 9:6
      metadata:
        usfm: EXO.9.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il livra leur vie à la mortalité;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 12:29
      metadata:
        usfm: EXO.12.29
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il frappa tous les premiers-nés en Égypte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les prémices de la force sous les tentes de Cham.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: Il fit partir son peuple comme des brebis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il les conduisit comme un troupeau dans le désert.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: Il les dirigea sûrement, pour qu’ils fussent sans crainte,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 14:27
      metadata:
        usfm: EXO.14.27
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '28'
      metadata:
        usfm: EXO.14.28
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 15:10
      metadata:
        usfm: EXO.15.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et la mer couvrit leurs ennemis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: Il les amena vers sa frontière sainte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vers cette montagne que sa droite a acquise.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: Il chassa devant eux les nations,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 13:7
      metadata:
        usfm: JOS.13.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 136:21
      metadata:
        usfm: PSA.136.21
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '22'
      metadata:
        usfm: PSA.136.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Leur distribua le pays en héritage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et fit habiter dans leurs tentes les tribus d’Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: Mais ils tentèrent le Dieu Très-Haut et se révoltèrent contre lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils n’observèrent point ses ordonnances.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: Ils s’éloignèrent et furent infidèles, comme leurs pères,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils tournèrent, comme un arc trompeur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: Ils l’irritèrent par leurs hauts lieux,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 32:16
      metadata:
        usfm: DEU.32.16
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '21'
      metadata:
        usfm: DEU.32.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et ils excitèrent sa jalousie par leurs idoles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: Dieu entendit, et il fut irrité;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il repoussa fortement Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: Il abandonna la demeure de Silo,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La tente où il habitait parmi les hommes;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 4:10
      metadata:
        usfm: 1SA.4.10
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '11'
      metadata:
        usfm: 1SA.4.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il livra sa gloire à la captivité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et sa majesté entre les mains de l’ennemi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: Il mit son peuple à la merci du glaive,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il s’indigna contre son héritage.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: Le feu dévora ses jeunes hommes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ses vierges ne furent pas célébrées;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 4:11
      metadata:
        usfm: 1SA.4.11
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '18'
      metadata:
        usfm: 1SA.4.18
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '19'
      metadata:
        usfm: 1SA.4.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ses sacrificateurs tombèrent par l’épée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ses veuves ne pleurèrent pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '65'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: Le Seigneur s’éveilla comme celui qui a dormi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme un héros qu’a subjugué le vin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '66'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 5:6
      metadata:
        usfm: 1SA.5.6
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 6:4
      metadata:
        usfm: 1SA.6.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il frappa ses adversaires en fuite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il les couvrit d’un opprobre éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '67'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: Cependant il rejeta la tente de Joseph,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il ne choisit point la tribu d’Éphraïm;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '68'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: text
    text: Il préféra la tribu de Juda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La montagne de Sion qu’il aimait.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '69'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '69'
  - type: text
    text: Et il bâtit son sanctuaire comme les lieux élevés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme la terre qu’il a fondée pour toujours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '70'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '70'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 16:11
      metadata:
        usfm: 1SA.16.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 S 7:8
      metadata:
        usfm: 2SA.7.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il choisit David, son serviteur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il le tira des bergeries;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '71'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '71'
  - type: text
    text: Il le prit derrière les brebis qui allaitent,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 S 5:2
      metadata:
        usfm: 2SA.5.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 11:2
      metadata:
        usfm: 1CH.11.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Pour lui faire paître Jacob, son peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et Israël, son héritage.
- type: usfm
