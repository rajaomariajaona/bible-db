  '52':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: Il fit partir son peuple comme des brebis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il les conduisit comme un troupeau dans le désert.
  '53':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: Il les dirigea sûrement, pour qu’ils fussent sans crainte,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
