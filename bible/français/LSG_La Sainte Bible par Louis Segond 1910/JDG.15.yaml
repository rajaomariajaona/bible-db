document_id: JDG.15,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Exploits contre les Philistins
  - type: heading
    content: 'V. 1-8: cf. Jg 14:20; 15:4.'
  - type: text
    content: 'Quelque temps après, à l’époque de la moisson des blés, Samson alla voir sa femme, et lui porta un chevreau. Il dit: Je veux entrer vers ma femme dans sa chambre. Mais le père de sa femme ne lui permit pas d’entrer. '
  '10':
  - type: text
    content: 'Les hommes de Juda dirent: Pourquoi êtes-vous montés contre nous? Ils répondirent: Nous sommes montés pour lier Samson, afin de le traiter comme il nous a traités. '
  '11':
  - type: text
    content: 'Sur quoi trois mille hommes de Juda descendirent à la caverne du rocher d’Étam, et dirent à Samson: Ne sais-tu pas que les Philistins dominent sur nous? Que nous as-tu donc fait? Il leur répondit: Je les ai traités comme ils m’ont traité. '
  '12':
  - type: text
    content: 'Ils lui dirent: Nous sommes descendus pour te lier, afin de te livrer entre les mains des Philistins. Samson leur dit: Jurez-moi que vous ne me tuerez pas. '
  '13':
  - type: text
    content: 'Ils lui répondirent: Non; nous voulons seulement te lier et te livrer entre leurs mains, mais nous ne te ferons pas mourir. Et ils le lièrent avec deux cordes neuves, et le firent sortir du rocher. '
  '14':
  - type: text
    content: 'Lorsqu’il arriva à Léchi, les Philistins poussèrent des cris à sa rencontre. Alors l’esprit de l’Éternel le saisit. Les cordes qu’il avait aux bras devinrent comme du lin brûlé par le feu, et ses liens tombèrent de ses mains. '
  '15':
  - type: text
    content: 'Il trouva une mâchoire d’âne fraîche, il étendit sa main pour la prendre, et il en tua mille hommes. '
  '16':
  - type: text
    content: 'Et Samson dit:'
  - type: text
    content: Avec une mâchoire d’âne, un monceau, deux monceaux;
  - type: text
    content: Avec une mâchoire d’âne, j’ai tué mille hommes.
  '17':
  - type: text
    content: Quand il eut achevé de parler, il jeta de sa main la mâchoire. Et l’on appela ce lieu Ramath-Léchi.
  - type: heading
    content: 'V. 18-20: cf. Ex 17:3-6. Ps 94:17, 18. És 41:17, 18.'
  '18':
  - type: text
    content: 'Pressé par la soif, il invoqua l’Éternel, et dit: C’est toi qui as permis par la main de ton serviteur cette grande délivrance; et maintenant mourrais-je de soif, et tomberais-je entre les mains des '
  - type: note
    content: 1 S 17:26, 36. 2 S 1:20.
  - type: text
    content: 'incirconcis? '
  '19':
  - type: text
    content: 'Dieu fendit la cavité du rocher qui est à Léchi, et il en sortit de l’eau. Samson but, son esprit se ranima, et il reprit vie. C’est de là qu’on a appelé cette source En-Hakkoré; elle existe encore aujourd’hui à Léchi. '
  '2':
  - type: text
    content: 'J’ai pensé dit-il, que tu avais pour elle de la haine, et je l’ai donnée à ton compagnon. Est-ce que sa jeune sœur n’est pas plus belle qu’elle? Prends-la donc à sa place. '
  '20':
  - type: text
    content: Samson fut juge en Israël, au temps des Philistins, pendant vingt ans.
  '3':
  - type: text
    content: 'Samson leur dit: Cette fois je ne serai pas coupable envers les Philistins, si je leur fais du mal. '
  '4':
  - type: text
    content: 'Samson s’en alla. Il attrapa trois cents renards, et prit des flambeaux; puis il tourna queue contre queue, et mit un flambeau entre deux queues, au milieu. '
  '5':
  - type: text
    content: 'Il alluma les flambeaux, lâcha les renards dans les blés des Philistins, et embrasa les tas de gerbes, le blé sur pied, et jusqu’aux plantations d’oliviers. '
  '6':
  - type: text
    content: 'Les Philistins dirent: Qui a fait cela? On répondit: Samson, le gendre du Thimnien, parce que celui-ci lui a pris sa femme et l’a donnée à son compagnon. Et les Philistins montèrent, et ils la brûlèrent, elle et son père. '
  '7':
  - type: text
    content: 'Samson leur dit: Est-ce ainsi que vous agissez? Je ne cesserai qu’après m’être vengé de vous. '
  '8':
  - type: text
    content: Il les battit rudement, dos et ventre; puis il descendit, et se retira dans la caverne du rocher d’Étam.
  - type: heading
    content: 'V. 9-17: cf. (Jg 16:4-12; 3:31.) Ps 9:11.'
  '9':
  - type: text
    content: 'Alors les Philistins se mirent en marche, campèrent en Juda, et s’étendirent jusqu’à Léchi. '
