document_id: ISA.29,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prophétie contre Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-8: cf. És 36:1, 2; 37:33-37; 41:11, 12.'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Malheur à Ariel, à Ariel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cité dont David fit sa demeure!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ajoutez année à année,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Laissez les fêtes accomplir leur cycle.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Car l’Éternel a répandu sur vous '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 11:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: un esprit d’assoupissement;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a fermé vos yeux (les prophètes),
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a voilé vos têtes (les voyants).
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Toute la révélation est pour vous comme les mots d’un livre cacheté
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Que l’on donne à un homme qui sait lire, en disant:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lis donc cela!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et qui répond: Je ne le puis,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car il est cacheté;
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ou comme un livre que l’on donne
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A un homme qui ne sait pas lire, en disant:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lis donc cela!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et qui répond: Je ne sais pas lire.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Le Seigneur dit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 15:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 7:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Quand ce peuple s’approche de moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il m’honore de la bouche et des lèvres;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais son cœur est éloigné de moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la crainte qu’il a de moi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N’est qu’un précepte de tradition humaine.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: C’est pourquoi je frapperai encore ce peuple
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par des prodiges et des miracles;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 49:7
      - type: text
        text: '. Ab v. 8. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 11:25
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 1:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Et la sagesse de ses sages périra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’intelligence de ses hommes intelligents disparaîtra.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Malheur à ceux qui cachent leurs desseins
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour les dérober à l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui font leurs œuvres dans les ténèbres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et qui disent: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 94:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Qui nous voit et qui nous connaît?
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Quelle perversité est la vôtre!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le potier doit-il être considéré comme de l’argile,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 45:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Pour que l’ouvrage dise de l’ouvrier:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne m’a point fait?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Pour que le vase dise du potier:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n’a point d’intelligence?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Temps messianique
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 17-24: cf. És 32:15-17. 2 Co 3:13-16.'
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Encore un peu de temps,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le Liban se changera en verger,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le verger sera considéré comme une forêt.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'En ce jour-là, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 11:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: les sourds entendront les paroles du livre;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et, délivrés de l’obscurité et des ténèbres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les yeux des aveugles verront.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Les malheureux se réjouiront de plus en plus en l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les pauvres feront du Saint d’Israël le sujet de leur allégresse.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Puis j’assiégerai Ariel;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il y aura des plaintes et des gémissements;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la ville sera pour moi comme un Ariel.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Car le violent ne sera plus, le moqueur aura fini,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tous ceux qui veillaient pour l’iniquité seront exterminés,
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ceux qui condamnaient les autres en justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tendaient des pièges à qui défendait sa cause à la porte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et violaient par la fraude les droits de l’innocent.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: C’est pourquoi ainsi parle l’Éternel à la maison de Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Lui qui a racheté Abraham:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maintenant Jacob ne rougira plus,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maintenant son visage ne pâlira plus.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Car, lorsque ses enfants verront au milieu d’eux l’œuvre de mes mains,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils sanctifieront mon nom;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils sanctifieront le Saint de Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils craindront le Dieu d’Israël;
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Ceux dont l’esprit s’égarait acquerront de l’intelligence,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ceux qui murmuraient recevront instruction.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 6:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 17:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Je t’investirai de toutes parts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je te cernerai par des postes armés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’élèverai contre toi des retranchements.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Tu seras abaissée, ta parole viendra de terre,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 8:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Et les sons en seront étouffés par la poussière;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ta voix sortira de terre comme celle d’un spectre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et c’est de la poussière que tu murmureras tes discours.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: La multitude de tes ennemis sera comme une fine poussière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Cette multitude de guerriers sera '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 21:18
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 1:4
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 35:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 17:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: comme la balle qui vole,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 30:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Et cela tout à coup, en un instant.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: C’est de l’Éternel des armées que viendra le châtiment,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avec des tonnerres, des tremblements de terre et un bruit formidable,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avec l’ouragan et la tempête,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et avec la flamme d’un feu dévorant.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Et, comme il en est d’un songe, d’une vision nocturne,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi en sera-t-il de la multitude des nations qui combattront Ariel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De tous ceux qui l’attaqueront, elle et sa forteresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qui la serreront de près.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Comme celui qui a faim rêve qu’il mange,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Puis s’éveille, l’estomac vide,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et comme celui qui a soif rêve qu’il boit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Puis s’éveille, épuisé et languissant;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi en sera-t-il de la multitude des nations
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui viendront attaquer la montagne de Sion.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 9-16: cf. (És 6:9-12. Ac 28:25-27.) Mc 7:6-13.'
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Soyez stupéfaits et étonnés!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fermez les yeux et devenez aveugles!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils sont ivres, mais ce n’est pas de vin;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils chancellent, mais ce n’est pas l’effet des liqueurs fortes.
