document_id: ISA.29,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Prophétie contre Jérusalem
  - type: heading
    content: 'V. 1-8: cf. És 36:1, 2; 37:33-37; 41:11, 12.'
  - type: text
    content: Malheur à Ariel, à Ariel,
  - type: text
    content: Cité dont David fit sa demeure!
  - type: text
    content: Ajoutez année à année,
  - type: text
    content: Laissez les fêtes accomplir leur cycle.
  '10':
  - type: text
    content: 'Car l’Éternel a répandu sur vous '
  - type: note
    content: Ro 11:8.
  - type: text
    content: un esprit d’assoupissement;
  - type: text
    content: Il a fermé vos yeux (les prophètes),
  - type: text
    content: Il a voilé vos têtes (les voyants).
  '11':
  - type: text
    content: Toute la révélation est pour vous comme les mots d’un livre cacheté
  - type: text
    content: 'Que l’on donne à un homme qui sait lire, en disant:'
  - type: text
    content: Lis donc cela!
  - type: text
    content: 'Et qui répond: Je ne le puis,'
  - type: text
    content: Car il est cacheté;
  '12':
  - type: text
    content: Ou comme un livre que l’on donne
  - type: text
    content: 'A un homme qui ne sait pas lire, en disant:'
  - type: text
    content: Lis donc cela!
  - type: text
    content: 'Et qui répond: Je ne sais pas lire.'
  '13':
  - type: text
    content: 'Le Seigneur dit: '
  - type: note
    content: Mt 15:8. Mc 7:6.
  - type: text
    content: Quand ce peuple s’approche de moi,
  - type: text
    content: Il m’honore de la bouche et des lèvres;
  - type: text
    content: Mais son cœur est éloigné de moi,
  - type: text
    content: Et la crainte qu’il a de moi
  - type: text
    content: N’est qu’un précepte de tradition humaine.
  '14':
  - type: text
    content: C’est pourquoi je frapperai encore ce peuple
  - type: text
    content: Par des prodiges et des miracles;
  - type: note
    content: Jé 49:7. Ab v. 8. Mt 11:25. 1 Co 1:19.
  - type: text
    content: Et la sagesse de ses sages périra,
  - type: text
    content: Et l’intelligence de ses hommes intelligents disparaîtra.
  '15':
  - type: text
    content: Malheur à ceux qui cachent leurs desseins
  - type: text
    content: Pour les dérober à l’Éternel,
  - type: text
    content: Qui font leurs œuvres dans les ténèbres,
  - type: text
    content: 'Et qui disent: '
  - type: note
    content: Ps 94:7.
  - type: text
    content: Qui nous voit et qui nous connaît?
  '16':
  - type: text
    content: Quelle perversité est la vôtre!
  - type: text
    content: Le potier doit-il être considéré comme de l’argile,
  - type: note
    content: És 45:9.
  - type: text
    content: 'Pour que l’ouvrage dise de l’ouvrier:'
  - type: text
    content: Il ne m’a point fait?
  - type: text
    content: 'Pour que le vase dise du potier:'
  - type: text
    content: Il n’a point d’intelligence?
  - type: heading
    content: Temps messianique
  - type: heading
    content: 'V. 17-24: cf. És 32:15-17. 2 Co 3:13-16.'
  '17':
  - type: text
    content: Encore un peu de temps,
  - type: text
    content: Et le Liban se changera en verger,
  - type: text
    content: Et le verger sera considéré comme une forêt.
  '18':
  - type: text
    content: 'En ce jour-là, '
  - type: note
    content: Mt 11:5.
  - type: text
    content: les sourds entendront les paroles du livre;
  - type: text
    content: Et, délivrés de l’obscurité et des ténèbres,
  - type: text
    content: Les yeux des aveugles verront.
  '19':
  - type: text
    content: Les malheureux se réjouiront de plus en plus en l’Éternel,
  - type: text
    content: Et les pauvres feront du Saint d’Israël le sujet de leur allégresse.
  '2':
  - type: text
    content: Puis j’assiégerai Ariel;
  - type: text
    content: Il y aura des plaintes et des gémissements;
  - type: text
    content: Et la ville sera pour moi comme un Ariel.
  '20':
  - type: text
    content: Car le violent ne sera plus, le moqueur aura fini,
  - type: text
    content: Et tous ceux qui veillaient pour l’iniquité seront exterminés,
  '21':
  - type: text
    content: Ceux qui condamnaient les autres en justice,
  - type: text
    content: Tendaient des pièges à qui défendait sa cause à la porte,
  - type: text
    content: Et violaient par la fraude les droits de l’innocent.
  '22':
  - type: text
    content: C’est pourquoi ainsi parle l’Éternel à la maison de Jacob,
  - type: text
    content: 'Lui qui a racheté Abraham:'
  - type: text
    content: Maintenant Jacob ne rougira plus,
  - type: text
    content: Maintenant son visage ne pâlira plus.
  '23':
  - type: text
    content: Car, lorsque ses enfants verront au milieu d’eux l’œuvre de mes mains,
  - type: text
    content: Ils sanctifieront mon nom;
  - type: text
    content: Ils sanctifieront le Saint de Jacob,
  - type: text
    content: Et ils craindront le Dieu d’Israël;
  '24':
  - type: text
    content: Ceux dont l’esprit s’égarait acquerront de l’intelligence,
  - type: text
    content: Et ceux qui murmuraient recevront instruction.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Jé 6:3. Éz 17:17.
  - type: text
    content: Je t’investirai de toutes parts,
  - type: text
    content: Je te cernerai par des postes armés,
  - type: text
    content: J’élèverai contre toi des retranchements.
  '4':
  - type: text
    content: Tu seras abaissée, ta parole viendra de terre,
  - type: note
    content: És 8:19.
  - type: text
    content: Et les sons en seront étouffés par la poussière;
  - type: text
    content: Ta voix sortira de terre comme celle d’un spectre,
  - type: text
    content: Et c’est de la poussière que tu murmureras tes discours.
  '5':
  - type: text
    content: La multitude de tes ennemis sera comme une fine poussière,
  - type: text
    content: 'Cette multitude de guerriers sera '
  - type: note
    content: Job 21:18. Ps 1:4; 35:5. És 17:13.
  - type: text
    content: comme la balle qui vole,
  - type: note
    content: És 30:13.
  - type: text
    content: Et cela tout à coup, en un instant.
  '6':
  - type: text
    content: C’est de l’Éternel des armées que viendra le châtiment,
  - type: text
    content: Avec des tonnerres, des tremblements de terre et un bruit formidable,
  - type: text
    content: Avec l’ouragan et la tempête,
  - type: text
    content: Et avec la flamme d’un feu dévorant.
  '7':
  - type: text
    content: Et, comme il en est d’un songe, d’une vision nocturne,
  - type: text
    content: Ainsi en sera-t-il de la multitude des nations qui combattront Ariel,
  - type: text
    content: De tous ceux qui l’attaqueront, elle et sa forteresse,
  - type: text
    content: Et qui la serreront de près.
  '8':
  - type: text
    content: Comme celui qui a faim rêve qu’il mange,
  - type: text
    content: Puis s’éveille, l’estomac vide,
  - type: text
    content: Et comme celui qui a soif rêve qu’il boit,
  - type: text
    content: Puis s’éveille, épuisé et languissant;
  - type: text
    content: Ainsi en sera-t-il de la multitude des nations
  - type: text
    content: Qui viendront attaquer la montagne de Sion.
  - type: heading
    content: 'V. 9-16: cf. (És 6:9-12. Ac 28:25-27.) Mc 7:6-13.'
  '9':
  - type: text
    content: Soyez stupéfaits et étonnés!
  - type: text
    content: Fermez les yeux et devenez aveugles!
  - type: text
    content: Ils sont ivres, mais ce n’est pas de vin;
  - type: text
    content: Ils chancellent, mais ce n’est pas l’effet des liqueurs fortes.
