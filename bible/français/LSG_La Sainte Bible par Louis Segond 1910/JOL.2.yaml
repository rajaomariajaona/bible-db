document_id: JOL.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le jour de l’Éternel
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-11: cf. Joë 1. Ap 9:2-11.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Sonnez de la trompette en Sion!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Faites-la retentir sur ma montagne sainte!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que tous les habitants du pays tremblent!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Car '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Joë 1:15
      metadata:
        usfm: JOL.1.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: So 1:14
      metadata:
        usfm: ZEP.1.14
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '15'
      metadata:
        usfm: ZEP.1.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: le jour de l’Éternel vient, car il est proche,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Jour de ténèbres et d’obscurité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jour de nuées et de brouillards,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il vient comme l’aurore se répand sur les montagnes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voici un peuple nombreux et puissant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tel qu’il n’y en a jamais eu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qu’il n’y en aura jamais dans la suite des âges.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Devant lui est un feu dévorant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et derrière lui une flamme brûlante;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le pays était auparavant comme un jardin d’Éden,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et depuis, c’est un désert affreux:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rien ne lui échappe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: A les voir, on dirait des chevaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils courent comme des cavaliers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: A les entendre, on dirait un bruit de chars
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sur le sommet des montagnes où ils bondissent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: On dirait un pétillement de la flamme du feu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand elle consume le chaume.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est comme une armée puissante
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui se prépare au combat.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Devant eux les peuples tremblent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous les visages pâlissent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ils s’élancent comme des guerriers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils escaladent les murs comme des gens de guerre;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Chacun va son chemin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sans s’écarter de sa route.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ils ne se pressent point les uns les autres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Chacun garde son rang;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils se précipitent au travers des traits
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sans arrêter leur marche.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ils se répandent dans la ville,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Courent sur les murailles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Montent sur les maisons,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Entrent par les fenêtres comme un voleur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 13:10
      metadata:
        usfm: ISA.13.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 32:7
      metadata:
        usfm: EZK.32.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Devant eux la terre tremble,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les cieux sont ébranlés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le soleil et la lune s’obscurcissent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les étoiles retirent leur éclat.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: L’Éternel fait entendre sa voix devant son armée;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car son camp est immense,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et l’exécuteur de sa parole est puissant;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Car '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 30:7
      metadata:
        usfm: JER.30.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Am 5:18
      metadata:
        usfm: AMO.5.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: So 1:15
      metadata:
        usfm: ZEP.1.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'le jour de l’Éternel est grand, il est terrible:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui pourra le soutenir?
- type: usfm
  marker: s1
  children:
  - type: text
    text: Appel à la repentance
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 12-17: cf. 1 R 8:37-40. (1 S 7:3-13. Jon 3.)'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Maintenant encore, dit l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 4:1
      metadata:
        usfm: JER.4.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Revenez à moi de tout votre cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avec des jeûnes, avec des pleurs et des lamentations!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Déchirez vos cœurs et non vos vêtements,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et revenez à l’Éternel, votre Dieu;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Car il est '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 34:6
      metadata:
        usfm: EXO.34.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 86:15
      metadata:
        usfm: PSA.86.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jon 4:2
      metadata:
        usfm: JON.4.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: compatissant et miséricordieux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lent à la colère et riche en bonté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il se repent des maux qu’il envoie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jon 3:9
      metadata:
        usfm: JON.3.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Qui sait s’il ne reviendra pas et ne se repentira pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et s’il ne laissera pas après lui la bénédiction,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Des offrandes et des libations pour l’Éternel, votre Dieu?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Sonnez de la trompette en Sion!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Joë 1:14
      metadata:
        usfm: JOL.1.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Publiez un jeûne, une convocation solennelle!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Assemblez le peuple, formez une sainte réunion!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Assemblez les vieillards,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Assemblez les enfants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Même les nourrissons à la mamelle!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que l’époux sorte de sa demeure,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et l’épouse de sa chambre!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Qu’entre le portique et l’autel
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pleurent les sacrificateurs, Serviteurs de l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et qu’ils disent: Éternel, épargne ton peuple!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne livre pas ton héritage à l’opprobre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aux railleries des nations!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Pourquoi dirait-on parmi les peuples:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 42:11
      metadata:
        usfm: PSA.42.11
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 79:10
      metadata:
        usfm: PSA.79.10
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 115:2
      metadata:
        usfm: PSA.115.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Où est leur Dieu?
- type: usfm
  marker: s1
  children:
  - type: text
    text: Promesses
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 18-27: cf. Éz 36:6, etc. Ps 65:10, etc.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: L’Éternel est ému de jalousie pour son pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il épargne son peuple.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'L’Éternel répond, il dit à son peuple:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voici, je vous enverrai du blé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Du moût et de l’huile,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et vous en serez rassasiés;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je ne vous livrerai plus à l’opprobre parmi les nations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: J’éloignerai de vous l’ennemi du nord,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je le chasserai vers une terre aride et déserte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Son avant-garde dans la mer orientale,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Son arrière-garde dans la mer occidentale;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et son infection se répandra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sa puanteur s’élèvera dans les airs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parce qu’il a fait de grandes choses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Terre, ne crains pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sois dans l’allégresse et réjouis-toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car l’Éternel fait de grandes choses!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Bêtes des champs, ne craignez pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car les plaines du désert reverdiront,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car les arbres porteront leurs fruits,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le figuier et la vigne donneront leurs richesses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Et vous, enfants de Sion, soyez dans l’allégresse et réjouissez-vous
- type: usfm
  marker: q1
  children:
  - type: text
    text: En l’Éternel, votre Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car il vous donnera la pluie en son temps,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il vous enverra la pluie de la première et de l’arrière-saison,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme autrefois.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Les aires se rempliront de blé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les cuves regorgeront de moût et d’huile.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Je vous remplacerai les années
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Qu’ont dévorées la '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Joë 1:14
      metadata:
        usfm: JOL.1.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: sauterelle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le jélek, le hasil et le gazam,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ma grande armée que j’avais envoyée contre vous.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Vous mangerez et vous vous rassasierez,
- type: usfm
  marker: q1
  children:
  - type: text
