document_id: JOL.2,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le jour de l’Éternel
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-11: cf. Joë 1. Ap 9:2-11.'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Sonnez de la trompette en Sion!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Faites-la retentir sur ma montagne sainte!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que tous les habitants du pays tremblent!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Joë 1:15
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: So 1:14
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '15'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: le jour de l’Éternel vient, car il est proche,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 13:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 32:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Devant eux la terre tremble,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les cieux sont ébranlés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le soleil et la lune s’obscurcissent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les étoiles retirent leur éclat.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: L’Éternel fait entendre sa voix devant son armée;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car son camp est immense,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’exécuteur de sa parole est puissant;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 30:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Am 5:18
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: So 1:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'le jour de l’Éternel est grand, il est terrible:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui pourra le soutenir?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Appel à la repentance
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 12-17: cf. 1 R 8:37-40. (1 S 7:3-13. Jon 3.)'
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Maintenant encore, dit l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 4:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Revenez à moi de tout votre cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avec des jeûnes, avec des pleurs et des lamentations!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Déchirez vos cœurs et non vos vêtements,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et revenez à l’Éternel, votre Dieu;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car il est '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 34:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 86:15
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jon 4:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: compatissant et miséricordieux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lent à la colère et riche en bonté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il se repent des maux qu’il envoie.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jon 3:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Qui sait s’il ne reviendra pas et ne se repentira pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et s’il ne laissera pas après lui la bénédiction,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des offrandes et des libations pour l’Éternel, votre Dieu?
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Sonnez de la trompette en Sion!
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Joë 1:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Publiez un jeûne, une convocation solennelle!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Assemblez le peuple, formez une sainte réunion!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Assemblez les vieillards,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Assemblez les enfants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Même les nourrissons à la mamelle!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que l’époux sorte de sa demeure,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’épouse de sa chambre!
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Qu’entre le portique et l’autel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pleurent les sacrificateurs, Serviteurs de l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et qu’ils disent: Éternel, épargne ton peuple!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne livre pas ton héritage à l’opprobre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aux railleries des nations!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Pourquoi dirait-on parmi les peuples:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 42:11
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 79:10
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 115:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Où est leur Dieu?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Promesses
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 18-27: cf. Éz 36:6, etc. Ps 65:10, etc.'
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: L’Éternel est ému de jalousie pour son pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il épargne son peuple.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'L’Éternel répond, il dit à son peuple:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, je vous enverrai du blé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Du moût et de l’huile,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et vous en serez rassasiés;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je ne vous livrerai plus à l’opprobre parmi les nations.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Jour de ténèbres et d’obscurité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jour de nuées et de brouillards,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il vient comme l’aurore se répand sur les montagnes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici un peuple nombreux et puissant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tel qu’il n’y en a jamais eu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qu’il n’y en aura jamais dans la suite des âges.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: J’éloignerai de vous l’ennemi du nord,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je le chasserai vers une terre aride et déserte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Son avant-garde dans la mer orientale,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Son arrière-garde dans la mer occidentale;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et son infection se répandra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sa puanteur s’élèvera dans les airs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce qu’il a fait de grandes choses.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Terre, ne crains pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sois dans l’allégresse et réjouis-toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car l’Éternel fait de grandes choses!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Bêtes des champs, ne craignez pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car les plaines du désert reverdiront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car les arbres porteront leurs fruits,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le figuier et la vigne donneront leurs richesses.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Et vous, enfants de Sion, soyez dans l’allégresse et réjouissez-vous
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En l’Éternel, votre Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car il vous donnera la pluie en son temps,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il vous enverra la pluie de la première et de l’arrière-saison,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme autrefois.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Les aires se rempliront de blé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les cuves regorgeront de moût et d’huile.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Je vous remplacerai les années
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Qu’ont dévorées la '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Joë 1:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: sauterelle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le jélek, le hasil et le gazam,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ma grande armée que j’avais envoyée contre vous.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Vous mangerez et vous vous rassasierez,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et vous célébrerez le nom de l’Éternel, votre Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui aura fait pour vous des prodiges;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et mon peuple ne sera plus jamais dans la confusion.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Et vous saurez que je suis au milieu d’Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que je suis l’Éternel, votre Dieu, et qu’il n’y en a point d’autre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et mon peuple ne sera plus jamais dans la confusion.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 28-32: cf. Ac 2:1-21. Lu 21:25-28.'
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Après cela, je répandrai mon '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 44:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 39:29
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 2:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: esprit sur toute chair;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vos fils et vos filles prophétiseront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vos vieillards auront des songes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et vos jeunes gens des visions.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Même sur les serviteurs et sur les servantes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans ces jours-là, je répandrai mon esprit.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Devant lui est un feu dévorant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et derrière lui une flamme brûlante;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le pays était auparavant comme un jardin d’Éden,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et depuis, c’est un désert affreux:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rien ne lui échappe.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Je ferai paraître des prodiges dans les cieux et sur la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Du sang, du feu, et des colonnes de fumée;
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Joë 3:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Le soleil se changera en ténèbres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la lune en sang,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avant l’arrivée du jour de l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De ce jour grand et terrible.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 10:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Alors quiconque invoquera le nom de l’Éternel sera sauvé;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Le salut sera sur la '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ab v. 17.
      marker-yv: yv-n
    - type: text
      text: montagne de Sion et à Jérusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme a dit l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et parmi les réchappés que l’Éternel appellera.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: A les voir, on dirait des chevaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils courent comme des cavaliers.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
