document_id: JOL.2,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Le jour de l’Éternel
  - type: heading
    content: 'V. 1-11: cf. Joë 1. Ap 9:2-11.'
  - type: text
    content: Sonnez de la trompette en Sion!
  - type: text
    content: Faites-la retentir sur ma montagne sainte!
  - type: text
    content: Que tous les habitants du pays tremblent!
  - type: text
    content: 'Car '
  - type: note
    content: Joë 1:15. So 1:14, 15.
  - type: text
    content: le jour de l’Éternel vient, car il est proche,
  '10':
  - type: text
    content: ' '
  - type: note
    content: És 13:10. Éz 32:7.
  - type: text
    content: Devant eux la terre tremble,
  - type: text
    content: Les cieux sont ébranlés,
  - type: text
    content: Le soleil et la lune s’obscurcissent,
  - type: text
    content: Et les étoiles retirent leur éclat.
  '11':
  - type: text
    content: L’Éternel fait entendre sa voix devant son armée;
  - type: text
    content: Car son camp est immense,
  - type: text
    content: Et l’exécuteur de sa parole est puissant;
  - type: text
    content: 'Car '
  - type: note
    content: Jé 30:7. Am 5:18. So 1:15.
  - type: text
    content: 'le jour de l’Éternel est grand, il est terrible:'
  - type: text
    content: Qui pourra le soutenir?
  - type: heading
    content: Appel à la repentance
  - type: heading
    content: 'V. 12-17: cf. 1 R 8:37-40. (1 S 7:3-13. Jon 3.)'
  '12':
  - type: text
    content: Maintenant encore, dit l’Éternel,
  - type: note
    content: Jé 4:1.
  - type: text
    content: Revenez à moi de tout votre cœur,
  - type: text
    content: Avec des jeûnes, avec des pleurs et des lamentations!
  '13':
  - type: text
    content: Déchirez vos cœurs et non vos vêtements,
  - type: text
    content: Et revenez à l’Éternel, votre Dieu;
  - type: text
    content: 'Car il est '
  - type: note
    content: Ex 34:6. Ps 86:15. Jon 4:2.
  - type: text
    content: compatissant et miséricordieux,
  - type: text
    content: Lent à la colère et riche en bonté,
  - type: text
    content: Et il se repent des maux qu’il envoie.
  '14':
  - type: text
    content: ' '
  - type: note
    content: Jon 3:9.
  - type: text
    content: Qui sait s’il ne reviendra pas et ne se repentira pas,
  - type: text
    content: Et s’il ne laissera pas après lui la bénédiction,
  - type: text
    content: Des offrandes et des libations pour l’Éternel, votre Dieu?
  '15':
  - type: text
    content: Sonnez de la trompette en Sion!
  - type: note
    content: Joë 1:14.
  - type: text
    content: Publiez un jeûne, une convocation solennelle!
  '16':
  - type: text
    content: Assemblez le peuple, formez une sainte réunion!
  - type: text
    content: Assemblez les vieillards,
  - type: text
    content: Assemblez les enfants,
  - type: text
    content: Même les nourrissons à la mamelle!
  - type: text
    content: Que l’époux sorte de sa demeure,
  - type: text
    content: Et l’épouse de sa chambre!
  '17':
  - type: text
    content: Qu’entre le portique et l’autel
  - type: text
    content: Pleurent les sacrificateurs, Serviteurs de l’Éternel,
  - type: text
    content: 'Et qu’ils disent: Éternel, épargne ton peuple!'
  - type: text
    content: Ne livre pas ton héritage à l’opprobre,
  - type: text
    content: Aux railleries des nations!
  - type: text
    content: 'Pourquoi dirait-on parmi les peuples:'
  - type: note
    content: Ps 42:11; 79:10; 115:2.
  - type: text
    content: Où est leur Dieu?
  - type: heading
    content: Promesses
  - type: heading
    content: 'V. 18-27: cf. Éz 36:6, etc. Ps 65:10, etc.'
  '18':
  - type: text
    content: L’Éternel est ému de jalousie pour son pays,
  - type: text
    content: Et il épargne son peuple.
  '19':
  - type: text
    content: 'L’Éternel répond, il dit à son peuple:'
  - type: text
    content: Voici, je vous enverrai du blé,
  - type: text
    content: Du moût et de l’huile,
  - type: text
    content: Et vous en serez rassasiés;
  - type: text
    content: Et je ne vous livrerai plus à l’opprobre parmi les nations.
  '2':
  - type: text
    content: Jour de ténèbres et d’obscurité,
  - type: text
    content: Jour de nuées et de brouillards,
  - type: text
    content: Il vient comme l’aurore se répand sur les montagnes.
  - type: text
    content: Voici un peuple nombreux et puissant,
  - type: text
    content: Tel qu’il n’y en a jamais eu,
  - type: text
    content: Et qu’il n’y en aura jamais dans la suite des âges.
  '20':
  - type: text
    content: J’éloignerai de vous l’ennemi du nord,
  - type: text
    content: Je le chasserai vers une terre aride et déserte,
  - type: text
    content: Son avant-garde dans la mer orientale,
  - type: text
    content: Son arrière-garde dans la mer occidentale;
  - type: text
    content: Et son infection se répandra,
  - type: text
    content: Sa puanteur s’élèvera dans les airs,
  - type: text
    content: Parce qu’il a fait de grandes choses.
  '21':
  - type: text
    content: Terre, ne crains pas,
  - type: text
    content: Sois dans l’allégresse et réjouis-toi,
  - type: text
    content: Car l’Éternel fait de grandes choses!
  '22':
  - type: text
    content: Bêtes des champs, ne craignez pas,
  - type: text
    content: Car les plaines du désert reverdiront,
  - type: text
    content: Car les arbres porteront leurs fruits,
  - type: text
    content: Le figuier et la vigne donneront leurs richesses.
  '23':
  - type: text
    content: Et vous, enfants de Sion, soyez dans l’allégresse et réjouissez-vous
  - type: text
    content: En l’Éternel, votre Dieu,
  - type: text
    content: Car il vous donnera la pluie en son temps,
  - type: text
    content: Il vous enverra la pluie de la première et de l’arrière-saison,
  - type: text
    content: Comme autrefois.
  '24':
  - type: text
    content: Les aires se rempliront de blé,
  - type: text
    content: Et les cuves regorgeront de moût et d’huile.
  '25':
  - type: text
    content: Je vous remplacerai les années
  - type: text
    content: 'Qu’ont dévorées la '
  - type: note
    content: Joë 1:14.
  - type: text
    content: sauterelle,
  - type: text
    content: Le jélek, le hasil et le gazam,
  - type: text
    content: Ma grande armée que j’avais envoyée contre vous.
  '26':
  - type: text
    content: Vous mangerez et vous vous rassasierez,
  - type: text
    content: Et vous célébrerez le nom de l’Éternel, votre Dieu,
  - type: text
    content: Qui aura fait pour vous des prodiges;
  - type: text
    content: Et mon peuple ne sera plus jamais dans la confusion.
  '27':
  - type: text
    content: Et vous saurez que je suis au milieu d’Israël,
  - type: text
    content: Que je suis l’Éternel, votre Dieu, et qu’il n’y en a point d’autre,
  - type: text
    content: Et mon peuple ne sera plus jamais dans la confusion.
  - type: heading
    content: 'V. 28-32: cf. Ac 2:1-21. Lu 21:25-28.'
  '28':
  - type: text
    content: 'Après cela, je répandrai mon '
  - type: note
    content: És 44:3. Éz 39:29. Ac 2:17.
  - type: text
    content: esprit sur toute chair;
  - type: text
    content: Vos fils et vos filles prophétiseront,
  - type: text
    content: Vos vieillards auront des songes,
  - type: text
    content: Et vos jeunes gens des visions.
  '29':
  - type: text
    content: Même sur les serviteurs et sur les servantes,
  - type: text
    content: Dans ces jours-là, je répandrai mon esprit.
  '3':
  - type: text
    content: Devant lui est un feu dévorant,
  - type: text
    content: Et derrière lui une flamme brûlante;
  - type: text
    content: Le pays était auparavant comme un jardin d’Éden,
  - type: text
    content: 'Et depuis, c’est un désert affreux:'
  - type: text
    content: Rien ne lui échappe.
  '30':
  - type: text
    content: Je ferai paraître des prodiges dans les cieux et sur la terre,
  - type: text
    content: Du sang, du feu, et des colonnes de fumée;
  '31':
  - type: text
    content: ' '
  - type: note
    content: Joë 3:15.
  - type: text
    content: Le soleil se changera en ténèbres,
  - type: text
    content: Et la lune en sang,
  - type: text
    content: Avant l’arrivée du jour de l’Éternel,
  - type: text
    content: De ce jour grand et terrible.
  '32':
  - type: text
    content: ' '
  - type: note
    content: Ro 10:13.
  - type: text
    content: Alors quiconque invoquera le nom de l’Éternel sera sauvé;
  - type: text
    content: 'Le salut sera sur la '
  - type: note
    content: Ab v. 17.
  - type: text
    content: montagne de Sion et à Jérusalem,
  - type: text
    content: Comme a dit l’Éternel,
  - type: text
    content: Et parmi les réchappés que l’Éternel appellera.
  '4':
  - type: text
    content: A les voir, on dirait des chevaux,
  - type: text
    content: Et ils courent comme des cavaliers.
  '5':
  - type: text
    content: A les entendre, on dirait un bruit de chars
  - type: text
    content: Sur le sommet des montagnes où ils bondissent,
  - type: text
    content: On dirait un pétillement de la flamme du feu,
  - type: text
    content: Quand elle consume le chaume.
  - type: text
    content: C’est comme une armée puissante
  - type: text
    content: Qui se prépare au combat.
  '6':
  - type: text
    content: Devant eux les peuples tremblent,
  - type: text
    content: Tous les visages pâlissent.
  '7':
  - type: text
    content: Ils s’élancent comme des guerriers,
  - type: text
    content: Ils escaladent les murs comme des gens de guerre;
  - type: text
    content: Chacun va son chemin,
  - type: text
    content: Sans s’écarter de sa route.
  '8':
  - type: text
    content: Ils ne se pressent point les uns les autres,
  - type: text
    content: Chacun garde son rang;
  - type: text
    content: Ils se précipitent au travers des traits
  - type: text
    content: Sans arrêter leur marche.
  '9':
  - type: text
    content: Ils se répandent dans la ville,
  - type: text
    content: Courent sur les murailles,
  - type: text
    content: Montent sur les maisons,
  - type: text
    content: Entrent par les fenêtres comme un voleur.
