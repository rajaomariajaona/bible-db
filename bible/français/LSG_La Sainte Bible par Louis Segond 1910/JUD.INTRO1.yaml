document_id: JUD.INTRO1,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: INTRODUCTION À L’ÉPÎTRE DE JUDE
  - type: usfm
    marker: imt3
    children:
    - type: text
      text: (2 Pi 2. Ap 2:14, 20.)
  - type: usfm
    marker: ip
    children:
    - type: text
      text: L’Épître de Jude est un billet de circonstance comprenant un chapitre unique de 25 versets. Son auteur se nomme Jude et se présente comme le frère de Jacques. Elle serait donc l’œuvre d’un autre frère de Jésus qui, selon Marc (6:3), portait effectivement ce nom. Ces frères semblent avoir hésité au début à croire en lui (Jn 7:1-9). Mais ils se sont par la suite convertis au christianisme, à nous en tenir à leurs écrits qui ont été préservés, et sont devenus des serviteurs de Jésus-Christ (Ja 1:1; Ju 1).
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Les destinataires sont présentés comme: '
    - type: usfm
      marker: it
      children:
      - type: text
        text: «Ceux qui ont été appelés, qui sont aimés en Dieu le Père, et gardés pour Jésus-Christ»
    - type: text
      text: ' (1). Cette formule donne à cette correspondance un caractère catholique classique (voir celle de Jacques et des deux de Pierre). Cette brève épître a trois parties, qui sont:'
  - type: usfm
    marker: io1
    children:
    - type: text
      text: '1. Adresse et salutations '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 1-2
  - type: usfm
    marker: io1
    children:
    - type: text
      text: '2. Contre les impies '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 3-19
  - type: usfm
    marker: io1
    children:
    - type: text
      text: '3. Exhortations et doxologie finale '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 20-25
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'L’Épître de Jude apparaît comme une doublure de la deuxième épître de Pierre, surtout le chapitre 2:1-22. Elle ne s’en distingue que par la citation de deux livres apocryphes de l’Ancien Testament: '
    - type: usfm
      marker: it
      children:
      - type: text
        text: «Or, l’archange Michel, lorsqu’il contestait avec le diable et lui disputait le corps de Moïse…»
    - type: text
      text: ' (9) et: '
    - type: usfm
      marker: it
      children:
      - type: text
        text: '«C’est aussi pour eux qu’Énoch, le septième depuis Adam, a prophétisé en ces termes: Voici, le Seigneur est venu…»'
    - type: text
      text: ' (14) (voir l’introduction à 2 Pierre). Cette citation de livres apocryphes a d’ailleurs rendu difficile son admission dans le canon. Les discussions à ce sujet ont persisté jusqu’au 5'
    - type: usfm
      marker: ord
      children:
      - type: text
        text: e
    - type: text
      text: ' siècle apr. J.-C.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'L’épître de Jude, comme la deuxième épître de Pierre, adresse une mise en garde contre les impies. Il s’agirait, non pas simplement de gens qui manifestent de l’indifférence à l’égard de la foi chrétienne, mais de ceux dont la condamnation est déjà écrite, eux qui changent la grâce de Dieu en dissolution; qui renient ostentatoirement Jésus-Christ (3-4): '
    - type: usfm
      marker: it
      children:
      - type: text
        text: «Mais vous, bien-aimés, souvenez-vous des choses annoncées d’avance par les apôtres de notre Seigneur Jésus-Christ. Ils vous disaient qu’au dernier temps il y aura des moqueurs, marchant selon leurs convoitises impies…»
    - type: text
      text: ' (17-19).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: La date de rédaction de l’Épître de Jude tient compte de la citation du livre d’Énoch (14) comme un passage des Écritures Saintes. En effet, ce livre a été éliminé du canon de l’Ancien Testament au Synode de Jamnia en 90. L’Épître de Jude daterait de ce fait d’avant la tenue de ce Synode.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: La position de cette épître après les trois à Jean ne cadre pas avec le rapport étroit qui la lie à la seconde épître de Pierre. En effet, si les trois épîtres font bien partie de la littérature johannique, alors la place de Jude se trouverait convenablement après 2 Pierre.
