document_id: DEU.1,93
type_code: fra
verses:
  '1':
  - type: heading
    content: SOUVENIRS ET EXHORTATIONS
  - type: heading
    content: Ch. 1 à 11. De 8:2, 3.
  - type: heading
    content: D’Horeb a Kadès-Barnéa
  - type: heading
    content: 'V. 1-8: cf. (No 10:11, etc.; 11:34, 35; 12:16.)'
  - type: text
    content: 'Voici les paroles que Moïse adressa à tout Israël, de l’autre côté du Jourdain, dans le désert, dans la plaine, vis-à-vis de Suph, entre Paran, Tophel, Laban, Hatséroth et Di-Zahab. '
  '10':
  - type: text
    content: 'L’Éternel, votre Dieu, vous a multipliés, et vous êtes aujourd’hui aussi nombreux que les étoiles du ciel. '
  '11':
  - type: text
    content: 'Que l’Éternel, le Dieu de vos pères, vous augmente mille fois autant, et qu’il vous bénisse comme il vous l’a promis! '
  '12':
  - type: text
    content: 'Comment porterais-je, à moi seul, votre charge, votre fardeau et vos contestations? '
  '13':
  - type: text
    content: 'Prenez dans vos tribus des hommes sages, intelligents et connus, et je les mettrai à votre tête. '
  '14':
  - type: text
    content: 'Vous me répondîtes, en disant: Ce que tu proposes de faire est une bonne chose. '
  '15':
  - type: text
    content: 'Je pris alors les chefs de vos tribus, des hommes sages et connus, et je les mis à votre tête comme chefs de mille, chefs de cent, chefs de cinquante, et chefs de dix, et comme ayant autorité dans vos tribus. '
  '16':
  - type: text
    content: 'Je donnai, dans le même temps, cet ordre à vos juges: Écoutez vos frères, et '
  - type: note
    content: Jn 7:24.
  - type: text
    content: 'jugez selon la justice les différends de chacun avec son frère ou avec l’étranger. '
  '17':
  - type: note
    content: Lé 19:15. 1 S 16:7. Pr 24:23. Ja 2:1.
  - type: text
    content: 'Vous n’aurez point égard à l’apparence des personnes dans vos jugements; vous écouterez le petit comme le grand; vous ne craindrez aucun homme, car c’est Dieu qui rend la justice. Et lorsque vous trouverez une cause trop difficile, vous la porterez devant moi, pour que je l’entende. '
  '18':
  - type: text
    content: C’est ainsi que je vous prescrivis, dans ce temps-là, tout ce que vous aviez à faire.
  - type: heading
    content: 'V. 19-46: cf. No 13; 14. Ps 106:24-26.'
  '19':
  - type: text
    content: 'Nous partîmes d’Horeb, et nous parcourûmes en entier ce grand et affreux désert que vous avez vu; nous prîmes le chemin de la montagne des Amoréens, comme l’Éternel, notre Dieu, nous l’avait ordonné, et nous arrivâmes à Kadès-Barnéa. '
  '2':
  - type: text
    content: 'Il y a onze journées depuis Horeb, par le chemin de la montagne de Séir, jusqu’à Kadès-Barnéa. '
  '20':
  - type: text
    content: 'Je vous dis: Vous êtes arrivés à la montagne des Amoréens, que l’Éternel, notre Dieu, nous donne. '
  '21':
  - type: text
    content: 'Vois, l’Éternel, ton Dieu, met le pays devant toi; monte, prends-en possession, comme te l’a dit l’Éternel, le Dieu de tes pères; ne crains point, et ne t’effraie point. '
  '22':
  - type: text
    content: 'Vous vous approchâtes tous de moi, et vous dîtes: Envoyons des hommes devant nous, pour explorer le pays, et pour nous faire un rapport sur le chemin par lequel nous y monterons et sur les villes où nous arriverons. '
  '23':
  - type: text
    content: 'Cet avis me parut bon; et je pris douze hommes parmi vous, '
  - type: note
    content: No 13:2, 3, etc.
  - type: text
    content: 'un homme par tribu. '
  '24':
  - type: note
    content: No 13:23.
  - type: text
    content: 'Ils partirent, traversèrent la montagne, et arrivèrent jusqu’à la vallée d’Eschcol, qu’ils explorèrent. '
  '25':
  - type: text
    content: 'Ils prirent dans leurs mains des fruits du pays, et nous les présentèrent; ils nous firent un rapport, et dirent: C’est un bon pays, que l’Éternel, notre Dieu, nous donne. '
  '26':
  - type: note
    content: No 14:2.
  - type: text
    content: 'Mais vous ne voulûtes point y monter, et vous fûtes rebelles à l’ordre de l’Éternel, votre Dieu. '
  '27':
  - type: text
    content: 'Vous murmurâtes dans vos tentes, et vous dîtes: C’est parce que l’Éternel nous hait, qu’il nous a fait sortir du pays d’Égypte, afin de nous livrer entre les mains des Amoréens et de nous détruire. '
  '28':
  - type: text
    content: 'Où monterions-nous? Nos frères nous ont fait perdre courage, en disant: C’est un peuple plus grand et de plus haute taille que nous; ce sont des villes grandes et fortifiées jusqu’au ciel; nous y avons même vu '
  - type: note
    content: No 13:28.
  - type: text
    content: 'des enfants d’Anak. '
  '29':
  - type: text
    content: 'Je vous dis: Ne vous épouvantez pas, et n’ayez pas peur d’eux. '
  '3':
  - type: text
    content: 'Dans la quarantième année, au onzième mois, le premier du mois, Moïse parla aux enfants d’Israël selon tout ce que l’Éternel lui avait ordonné de leur dire. '
  '30':
  - type: text
    content: 'L’Éternel, votre Dieu, qui marche devant vous, combattra lui-même pour vous, selon tout ce qu’il a fait pour vous sous vos yeux en Égypte, '
  '31':
  - type: text
    content: 'puis au désert, où tu as vu que l’Éternel, ton Dieu, t’a porté comme un homme porte son fils, pendant toute la route que vous avez faite jusqu’à votre arrivée en ce lieu. '
  '32':
  - type: text
    content: 'Malgré cela, vous n’eûtes point confiance en l’Éternel, votre Dieu, '
  '33':
  - type: text
    content: 'qui allait devant vous sur la route '
  - type: note
    content: Ex 13:21.
  - type: text
    content: 'pour vous chercher un lieu de campement, la nuit dans un feu afin de vous montrer le chemin où vous deviez marcher, et le jour dans une nuée. '
  '34':
  - type: text
    content: 'L’Éternel entendit le bruit de vos paroles. Il s’irrita, et jura, en disant: '
  '35':
  - type: text
    content: 'Aucun des hommes de cette génération méchante '
  - type: note
    content: No 14:22, 23. Ps 95:11.
  - type: text
    content: 'ne verra le bon pays que j’ai juré de donner à vos pères, '
  '36':
  - type: text
    content: 'excepté Caleb, fils de Jephunné; il le verra, lui, et je donnerai à lui et à ses enfants le pays sur lequel il a marché, parce qu’il a pleinement suivi la voie de l’Éternel. '
  '37':
  - type: text
    content: 'L’Éternel s’irrita aussi contre moi, à cause de vous, et il dit: '
  - type: note
    content: No 20:12; 27:14. De 3:26; 4:21; 34:4.
  - type: text
    content: 'Toi non plus, tu n’y entreras point. '
  '38':
  - type: text
    content: 'Josué, fils de Nun, ton serviteur, y entrera; fortifie-le, car c’est lui qui mettra Israël en possession de ce pays. '
  '39':
  - type: text
    content: 'Et vos petits enfants, dont vous avez dit: Ils deviendront une proie! Et vos fils, qui ne connaissent aujourd’hui ni le bien ni le mal, ce sont eux qui y entreront, c’est à eux que je le donnerai, et ce sont eux qui le posséderont. '
  '4':
  - type: note
    content: No 21:24, 33.
  - type: text
    content: 'C’était après qu’il eut battu Sihon, roi des Amoréens, qui habitait à Hesbon, et Og, roi de Basan, qui habitait à Aschtaroth et à Édréï. '
  '40':
  - type: text
    content: 'Mais vous, tournez-vous, et partez pour le désert, dans la direction de la mer Rouge. '
  '41':
  - type: text
    content: 'Vous répondîtes, en me disant: Nous avons péché contre l’Éternel; nous monterons et nous combattrons, comme l’Éternel, notre Dieu, nous l’a ordonné. Et vous ceignîtes chacun vos armes, et vous fîtes le projet téméraire de monter à la montagne. '
  '42':
  - type: text
    content: 'L’Éternel me dit: Dis-leur: Ne montez pas et ne combattez pas, car je ne suis pas au milieu de vous; ne vous faites pas battre par vos ennemis. '
  '43':
  - type: text
    content: 'Je vous parlai, mais vous n’écoutâtes point; vous fûtes rebelles à l’ordre de l’Éternel, et vous montâtes audacieusement à la montagne. '
  '44':
  - type: text
    content: 'Alors les Amoréens, qui habitent cette montagne, sortirent à votre rencontre, et vous poursuivirent comme font les abeilles; ils vous battirent en Séir, jusqu’à Horma. '
  '45':
  - type: text
    content: 'A votre retour, vous pleurâtes devant l’Éternel; mais l’Éternel n’écouta point votre voix, et ne vous prêta point l’oreille. '
  '46':
  - type: text
    content: Vous restâtes à Kadès, où le temps que vous y avez passé fut de longue durée.
  '5':
  - type: text
    content: 'De l’autre côté du Jourdain, dans le pays de Moab, Moïse commença à expliquer cette loi, et dit: '
  '6':
  - type: text
    content: 'L’Éternel, notre Dieu, nous a parlé à Horeb, en disant: Vous avez assez demeuré dans cette montagne. '
  '7':
  - type: text
    content: 'Tournez-vous, et partez; allez à la montagne des Amoréens et dans tout le voisinage, dans la plaine, sur la montagne, dans la vallée, dans le midi, sur la côte de la mer, au pays des Cananéens et au Liban, jusqu’au grand fleuve, au fleuve d’Euphrate. '
  '8':
  - type: text
    content: 'Voyez, j’ai mis le pays devant vous; allez, et prenez possession du pays que l’Éternel a juré à vos pères, '
  - type: note
    content: Ge 15:18; 17:7, 8.
  - type: text
    content: Abraham, Isaac et Jacob, de donner à eux et à leur postérité après eux.
  - type: heading
    content: 'V. 9-18: cf. Ex 18:13-26. 2 Ch 19:5-11.'
  '9':
  - type: text
    content: 'Dans ce temps-là, je vous dis: '
  - type: note
    content: Ex 18:18.
  - type: text
    content: 'Je ne puis pas, à moi seul, vous porter. '
