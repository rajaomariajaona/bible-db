document_id: ECC.4,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-3: cf. Job 3:11-22.'
  - type: text
    content: 'J’ai considéré ensuite toutes les oppressions qui se commettent sous le soleil; et voici, les opprimés sont dans les larmes, et personne qui les console! Ils sont en butte à la violence de leurs oppresseurs, et personne qui les console! '
  '10':
  - type: text
    content: 'Car, s’ils tombent, l’un relève son compagnon; mais malheur à celui qui est seul et qui tombe, sans avoir un second pour le relever! '
  '11':
  - type: text
    content: 'De même, si deux couchent ensemble, ils auront chaud; mais celui qui est seul, comment aura-t-il chaud? '
  '12':
  - type: text
    content: 'Et si quelqu’un est plus fort qu’un seul, les deux peuvent lui résister; et la corde à trois fils ne se rompt pas facilement. '
  '13':
  - type: text
    content: 'Mieux vaut un enfant pauvre et sage qu’un roi vieux et insensé qui ne sait plus écouter les avis; '
  '14':
  - type: text
    content: 'car il peut sortir de prison pour régner, et même être né pauvre dans son royaume. '
  '15':
  - type: text
    content: 'J’ai vu tous les vivants qui marchent sous le soleil entourer l’enfant qui devait succéder au roi et régner à sa place. '
  '16':
  - type: text
    content: Il n’y avait point de fin à tout ce peuple, à tous ceux à la tête desquels il était. Et toutefois, ceux qui viendront après ne se réjouiront pas à son sujet. Car c’est encore là une vanité et la poursuite du vent.
  - type: heading
    content: '4 v. 17 à 5 v. 6: cf. (1 S 15:22. Jé 7:21-23.) De 23:21-23.'
  '17':
  - type: text
    content: Prends garde à ton pied, lorsque tu entres dans la maison de Dieu; approche-toi pour écouter, plutôt que pour offrir le sacrifice des insensés, car ils ne savent pas qu’ils font mal.
  '2':
  - type: text
    content: 'Et j’ai trouvé les morts qui sont déjà morts plus heureux que les vivants qui sont encore vivants, '
  '3':
  - type: text
    content: et plus heureux que les uns et les autres celui qui n’a point encore existé et qui n’a pas vu les mauvaises actions qui se commettent sous le soleil.
  - type: heading
    content: 'V. 4-16: cf. Pr 26:13-16. Lu 12:15-21.'
  '4':
  - type: text
    content: 'J’ai vu que tout travail et toute habileté dans le travail n’est que jalousie de l’homme à l’égard de son prochain. C’est encore là une vanité et la poursuite du vent. '
  '5':
  - type: note
    content: Pr 6:10; 24:33.
  - type: text
    content: 'L’insensé se croise les mains, et mange sa propre chair. '
  '6':
  - type: text
    content: 'Mieux vaut une main pleine avec repos, que les deux mains pleines avec travail et poursuite du vent. '
  '7':
  - type: text
    content: 'J’ai considéré une autre vanité sous le soleil. '
  '8':
  - type: text
    content: 'Tel homme est seul et sans personne qui lui tienne de près, il n’a ni fils ni frère, et pourtant son travail n’a point de fin et ses yeux ne sont jamais rassasiés de richesses. Pour qui donc est-ce que je travaille, et que je prive mon âme de jouissances? C’est encore là une vanité et une chose mauvaise. '
  '9':
  - type: text
    content: 'Deux valent mieux qu’un, parce qu’ils retirent un bon salaire de leur travail. '
