document_id: NUM.1,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dénombrement des Israélites dans le désert de Sinaï
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-46: cf. No 2; 26:1-51. (Ap 7:4-8.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'L’Éternel parla à Moïse dans le désert de Sinaï, dans la tente d’assignation, le premier jour du second mois, la seconde année après leur sortie du pays d’Égypte. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'pour les fils de Joseph, pour Éphraïm: Élischama, fils d’Ammihud; pour Manassé: Gamliel, fils de Pedahtsur; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'pour Benjamin: Abidan, fils de Guideoni; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'pour Dan: Ahiézer, fils d’Ammischaddaï; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'pour Aser: Paguiel, fils d’Ocran; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'pour Gad: Éliasaph, fils de Déuel; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'pour Nephthali: Ahira, fils d’Énan. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Tels sont ceux qui furent convoqués à l’assemblée, princes des tribus de leurs pères, chefs des milliers d’Israël. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Moïse et Aaron prirent ces hommes, qui avaient été désignés par leurs noms, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'et ils convoquèrent toute l’assemblée, le premier jour du second mois. On les enregistra selon leurs familles, selon les maisons de leurs pères, en comptant par tête les noms depuis l’âge de vingt ans et au-dessus. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Moïse en fit le dénombrement dans le désert de Sinaï, comme l’Éternel le lui avait ordonné. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Il dit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 30:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Faites le dénombrement de toute l’assemblée des enfants d’Israël, selon leurs familles, selon les maisons de leurs pères, en comptant par tête les noms de tous les mâles, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'On enregistra les fils de Ruben, premier-né d’Israël, selon leurs familles, selon les maisons de leurs pères, en comptant par tête les noms de tous les mâles, depuis l’âge de vingt ans et au-dessus, tous ceux en état de porter les armes: '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'les hommes de la tribu de Ruben dont on fit le dénombrement furent quarante-six mille cinq cents. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'On enregistra les fils de Siméon, selon leurs familles, selon les maisons de leurs pères; on en fit le dénombrement, en comptant par tête les noms de tous les mâles depuis l’âge de vingt ans et au-dessus, tous ceux en état de porter les armes: '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'les hommes de la tribu de Siméon dont on fit le dénombrement furent cinquante-neuf mille trois cents. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'On enregistra les fils de Gad, selon leurs familles, selon les maisons de leurs pères, en comptant les noms depuis l’âge de vingt ans et au-dessus, tous ceux en état de porter les armes: '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'les hommes de la tribu de Gad dont on fit le dénombrement furent quarante-cinq mille six cent cinquante. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'On enregistra les fils de Juda, selon leurs familles, selon les maisons de leurs pères, en comptant les noms depuis l’âge de vingt ans et au-dessus, tous ceux en état de porter les armes: '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'les hommes de la tribu de Juda dont on fit le dénombrement furent soixante-quatorze mille six cents. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'On enregistra les fils d’Issacar, selon leurs familles, selon les maisons de leurs pères, en comptant les noms depuis l’âge de vingt ans et au-dessus, tous ceux en état de porter les armes: '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'les hommes de la tribu d’Issacar dont on fit le dénombrement furent cinquante-quatre mille quatre cents. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'depuis l’âge de vingt ans et au-dessus, tous ceux d’Israël en état de porter les armes; vous en ferez le dénombrement selon leurs divisions, toi et Aaron. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'On enregistra les fils de Zabulon, selon leurs familles, selon les maisons de leurs pères, en comptant les noms depuis l’âge de vingt ans et au-dessus, tous ceux en état de porter les armes: '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'les hommes de la tribu de Zabulon dont on fit le dénombrement furent cinquante-sept mille quatre cents. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'On enregistra, d’entre les fils de Joseph, les fils d’Éphraïm, selon leurs familles, selon les maisons de leurs pères, en comptant les noms depuis l’âge de vingt ans et au-dessus, tous ceux en état de porter les armes: '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'les hommes de la tribu d’Éphraïm dont on fit le dénombrement furent quarante mille cinq cents. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'On enregistra les fils de Manassé, selon leurs familles, selon les maisons de leurs pères, en comptant les noms depuis l’âge de vingt ans et au-dessus, tous ceux en état de porter les armes: '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'les hommes de la tribu de Manassé dont on fit le dénombrement furent trente-deux mille deux cents. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'On enregistra les fils de Benjamin, selon leurs familles, selon les maisons de leurs pères, en comptant les noms depuis l’âge de vingt ans et au-dessus, tous ceux en état de porter les armes: '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'les hommes de la tribu de Benjamin dont on fit le dénombrement furent trente-cinq mille quatre cents. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'On enregistra les fils de Dan, selon leurs familles, selon les maisons de leurs pères, en comptant les noms depuis l’âge de vingt ans et au-dessus, tous ceux en état de porter les armes: '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'les hommes de la tribu de Dan dont on fit le dénombrement furent soixante-deux mille sept cents. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Il y aura avec vous un homme par tribu, chef de la maison de ses pères. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'On enregistra les fils d’Aser, selon leurs familles, selon les maisons de leurs pères, en comptant les noms depuis l’âge de vingt ans et au-dessus, tous ceux en état de porter les armes: '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'les hommes de la tribu d’Aser dont on fit le dénombrement furent quarante et un mille cinq cents. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'On enregistra les fils de Nephthali, selon leurs familles, selon les maisons de leurs pères, en comptant les noms depuis l’âge de vingt ans et au-dessus, tous ceux en état de porter les armes: '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'les hommes de la tribu de Nephthali dont on fit le dénombrement furent cinquante-trois mille quatre cents. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Tels sont ceux dont le dénombrement fut fait par Moïse et Aaron, et par les douze hommes, princes d’Israël; il y avait un homme pour chacune des maisons de leurs pères. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Tous ceux des enfants d’Israël dont on fit le dénombrement, selon les maisons de leurs pères, depuis l’âge de vingt ans et au-dessus, tous ceux d’Israël en état de porter les armes, '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'tous ceux dont on fit le dénombrement furent '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 38:26
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: six cent trois mille cinq cent cinquante.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 47-54: cf. No 3; 4. (Ex 32:26-29.)'
    marker-yv: yv-h
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'Les Lévites, selon la tribu de leurs pères, ne firent point partie de ce dénombrement. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'L’Éternel parla à Moïse, et dit: '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'Tu ne feras point le dénombrement de la tribu de Lévi, et tu n’en compteras point les têtes au milieu des enfants d’Israël. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Voici les noms des hommes qui se tiendront avec vous. Pour Ruben: Élitsur, fils de Schedéur; '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'Remets aux soins des Lévites le tabernacle du témoignage, tous ses ustensiles et tout ce qui lui appartient. Ils porteront le tabernacle et tous ses ustensiles, ils en feront le service, et ils camperont autour du tabernacle. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'Quand le tabernacle partira, les Lévites le démonteront; quand le tabernacle campera, les Lévites le dresseront; et l’étranger qui en approchera sera puni de mort. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: 'Les enfants d’Israël camperont chacun dans son camp, chacun près de sa bannière, selon leurs divisions. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: 'Mais les Lévites camperont autour du tabernacle du témoignage, afin que ma colère n’éclate point sur l’assemblée des enfants d’Israël; et les Lévites auront la garde du tabernacle du témoignage. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: Les enfants d’Israël se conformèrent à tous les ordres que l’Éternel avait donnés à Moïse; ils firent ainsi.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'pour Siméon: Schelumiel, fils de Tsurischaddaï; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'pour Juda: Nachschon, fils d’Amminadab; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'pour Issacar: Nethaneel, fils de Tsuar; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'pour Zabulon: Éliab, fils de Hélon; '
