document_id: PSA.40
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: Hé 10:1-14. Ps 70.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef des chantres. De David. Psaume.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: J’avais mis en l’Éternel mon espérance;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il s’est incliné vers moi, il a écouté mes cris.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Il m’a retiré de la fosse de destruction,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Du fond de la boue;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il a dressé mes pieds sur le roc,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a affermi mes pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Il a mis dans ma bouche un cantique nouveau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Une louange à notre Dieu;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Beaucoup l’ont vu, et ont eu de la crainte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils se sont confiés en l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Heureux l’homme qui place en l’Éternel sa confiance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui ne se tourne pas vers les hautains et les menteurs!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tu as multiplié, Éternel, mon Dieu!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tes merveilles et tes desseins en notre faveur;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nul n’est comparable à toi;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je voudrais les publier et les proclamer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais leur nombre est trop grand pour que je les raconte.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 10:5
      metadata:
        usfm: HEB.10.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Tu ne désires ni sacrifice ni offrande,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu m’as ouvert les oreilles;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu ne demandes ni holocauste ni victime expiatoire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Alors je dis: Voici, je viens'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avec le rouleau du livre écrit pour moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Je veux faire ta volonté, mon Dieu!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 37:31
      metadata:
        usfm: PSA.37.31
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 51:7
      metadata:
        usfm: ISA.51.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et ta loi est au fond de mon cœur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'J’annonce la justice dans la '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 35:18
      metadata:
        usfm: PSA.35.18
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 111:1
      metadata:
        usfm: PSA.111.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: grande assemblée;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voici, je ne ferme pas mes lèvres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Éternel, tu le sais!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Je ne retiens pas dans mon cœur ta justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je publie ta vérité et ton salut;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je ne cache pas ta bonté et ta fidélité
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans la grande assemblée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Toi, Éternel! Tu ne me refuseras pas tes compassions;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ta bonté et ta fidélité me garderont toujours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Car des maux sans nombre m’environnent;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les châtiments de mes iniquités m’atteignent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je ne puis en supporter la vue;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils sont plus nombreux que les cheveux de ma tête,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et mon courage m’abandonne.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Veuille me délivrer, ô Éternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Éternel, viens en hâte à mon secours!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 35:4
      metadata:
        usfm: PSA.35.4
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '26'
      metadata:
        usfm: PSA.35.26
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 70:3
      metadata:
        usfm: PSA.70.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 71:13
      metadata:
        usfm: PSA.71.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Que tous ensemble ils soient honteux et confus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ceux qui en veulent à ma vie pour l’enlever!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’ils reculent et rougissent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ceux qui désirent ma perte!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Qu’ils soient dans la stupeur par l’effet de leur honte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ceux qui me disent: Ah! Ah!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Que tous ceux qui te cherchent
- type: usfm
  marker: q1
  children:
  - type: text
    text: Soient dans l’allégresse et se réjouissent en toi!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que ceux qui aiment ton salut
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Disent sans cesse: Exalté soit l’Éternel!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Moi, je suis pauvre et indigent;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais le Seigneur pense à moi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tu es mon aide et mon libérateur:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon Dieu, ne tarde pas!
