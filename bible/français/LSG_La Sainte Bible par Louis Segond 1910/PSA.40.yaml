document_id: PSA.40,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Hé 10:1-14. Ps 70.
  - type: text
    content: Au chef des chantres. De David. Psaume.
  '10':
  - type: text
    content: 'J’annonce la justice dans la '
  - type: note
    content: Ps 35:18; 111:1.
  - type: text
    content: grande assemblée;
  - type: text
    content: Voici, je ne ferme pas mes lèvres,
  - type: text
    content: Éternel, tu le sais!
  '11':
  - type: text
    content: Je ne retiens pas dans mon cœur ta justice,
  - type: text
    content: Je publie ta vérité et ton salut;
  - type: text
    content: Je ne cache pas ta bonté et ta fidélité
  - type: text
    content: Dans la grande assemblée.
  '12':
  - type: text
    content: Toi, Éternel! Tu ne me refuseras pas tes compassions;
  - type: text
    content: Ta bonté et ta fidélité me garderont toujours.
  '13':
  - type: text
    content: Car des maux sans nombre m’environnent;
  - type: text
    content: Les châtiments de mes iniquités m’atteignent,
  - type: text
    content: Et je ne puis en supporter la vue;
  - type: text
    content: Ils sont plus nombreux que les cheveux de ma tête,
  - type: text
    content: Et mon courage m’abandonne.
  '14':
  - type: text
    content: Veuille me délivrer, ô Éternel!
  - type: text
    content: Éternel, viens en hâte à mon secours!
  '15':
  - type: text
    content: ' '
  - type: note
    content: Ps 35:4, 26; 70:3; 71:13.
  - type: text
    content: Que tous ensemble ils soient honteux et confus,
  - type: text
    content: Ceux qui en veulent à ma vie pour l’enlever!
  - type: text
    content: Qu’ils reculent et rougissent,
  - type: text
    content: Ceux qui désirent ma perte!
  '16':
  - type: text
    content: Qu’ils soient dans la stupeur par l’effet de leur honte,
  - type: text
    content: 'Ceux qui me disent: Ah! Ah!'
  '17':
  - type: text
    content: Que tous ceux qui te cherchent
  - type: text
    content: Soient dans l’allégresse et se réjouissent en toi!
  - type: text
    content: Que ceux qui aiment ton salut
  - type: text
    content: 'Disent sans cesse: Exalté soit l’Éternel!'
  '18':
  - type: text
    content: Moi, je suis pauvre et indigent;
  - type: text
    content: Mais le Seigneur pense à moi.
  - type: text
    content: 'Tu es mon aide et mon libérateur:'
  - type: text
    content: Mon Dieu, ne tarde pas!
  '2':
  - type: text
    content: J’avais mis en l’Éternel mon espérance;
  - type: text
    content: Et il s’est incliné vers moi, il a écouté mes cris.
  '3':
  - type: text
    content: Il m’a retiré de la fosse de destruction,
  - type: text
    content: Du fond de la boue;
  - type: text
    content: Et il a dressé mes pieds sur le roc,
  - type: text
    content: Il a affermi mes pas.
  '4':
  - type: text
    content: Il a mis dans ma bouche un cantique nouveau,
  - type: text
    content: Une louange à notre Dieu;
  - type: text
    content: Beaucoup l’ont vu, et ont eu de la crainte,
  - type: text
    content: Et ils se sont confiés en l’Éternel.
  '5':
  - type: text
    content: Heureux l’homme qui place en l’Éternel sa confiance,
  - type: text
    content: Et qui ne se tourne pas vers les hautains et les menteurs!
  '6':
  - type: text
    content: Tu as multiplié, Éternel, mon Dieu!
  - type: text
    content: Tes merveilles et tes desseins en notre faveur;
  - type: text
    content: Nul n’est comparable à toi;
  - type: text
    content: Je voudrais les publier et les proclamer,
  - type: text
    content: Mais leur nombre est trop grand pour que je les raconte.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Hé 10:5.
  - type: text
    content: Tu ne désires ni sacrifice ni offrande,
  - type: text
    content: Tu m’as ouvert les oreilles;
  - type: text
    content: Tu ne demandes ni holocauste ni victime expiatoire.
  '8':
  - type: text
    content: 'Alors je dis: Voici, je viens'
  - type: text
    content: Avec le rouleau du livre écrit pour moi.
  '9':
  - type: text
    content: Je veux faire ta volonté, mon Dieu!
  - type: note
    content: Ps 37:31. És 51:7.
  - type: text
    content: Et ta loi est au fond de mon cœur.
