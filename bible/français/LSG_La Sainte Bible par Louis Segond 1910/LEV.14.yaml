document_id: LEV.14,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Loi sur la purification de la lèpre
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-32: cf. Mc 1:40-44. Lé 8:22-30. (Ps 51:9. Tit 3:4-6.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Éternel parla à Moïse, et dit: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le huitième jour, il prendra deux agneaux sans défaut et une brebis d’un an sans défaut, trois dixièmes d’un épha de fleur de farine en offrande pétrie à l’huile, et un log d’huile. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le sacrificateur qui fait la purification présentera l’homme qui se purifie et toutes ces choses devant l’Éternel, à l’entrée de la tente d’assignation. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le sacrificateur prendra l’un des agneaux, et il l’offrira en sacrifice de culpabilité, avec le log d’huile; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 29:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'il les agitera de côté et d’autre devant l’Éternel. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il égorgera l’agneau dans le lieu où l’on égorge les victimes expiatoires et les holocaustes, dans le lieu saint; car, dans le sacrifice de culpabilité, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 7:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'comme dans le sacrifice d’expiation, la victime est pour le sacrificateur; c’est une chose très sainte. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le sacrificateur prendra du sang de la victime de culpabilité; il en mettra sur le lobe de l’oreille droite de celui qui se purifie, sur le pouce de sa main droite et sur le gros orteil de son pied droit. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le sacrificateur prendra du log d’huile, et il en versera dans le creux de sa main gauche. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le sacrificateur trempera le doigt de sa main droite dans l’huile qui est dans le creux de sa main gauche, et il fera avec le doigt sept fois l’aspersion de l’huile devant l’Éternel. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le sacrificateur mettra de l’huile qui lui reste dans la main sur le lobe de l’oreille droite de celui qui se purifie, sur le pouce de sa main droite et sur le gros orteil de son pied droit, par-dessus le sang de la victime de culpabilité. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le sacrificateur mettra ce qui lui reste d’huile dans la main sur la tête de celui qui se purifie; et le sacrificateur fera pour lui l’expiation devant l’Éternel. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis le sacrificateur offrira le sacrifice d’expiation; et il fera l’expiation pour celui qui se purifie de sa souillure. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici quelle sera la loi sur le lépreux, pour le jour de sa purification. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 8:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 1:44
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 5:14
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 17:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'On l’amènera devant le sacrificateur. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ensuite il égorgera l’holocauste. Le sacrificateur offrira sur l’autel l’holocauste et l’offrande; et il fera pour cet homme l’expiation, et il sera pur. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'S’il est pauvre et que ses ressources soient insuffisantes, il prendra un seul agneau, qui sera offert en sacrifice de culpabilité, après avoir été agité de côté et d’autre, et avec lequel on fera pour lui l’expiation. Il prendra un seul dixième de fleur de farine pétrie à l’huile pour l’offrande, et un log d’huile. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il prendra aussi deux tourterelles ou deux jeunes pigeons, selon ses ressources, l’un pour le sacrifice d’expiation, l’autre pour l’holocauste. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le huitième jour, il apportera pour sa purification toutes ces choses au sacrificateur, à l’entrée de la tente d’assignation, devant l’Éternel. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le sacrificateur prendra l’agneau pour le sacrifice de culpabilité, et le log d’huile; et il les agitera de côté et d’autre devant l’Éternel. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il égorgera l’agneau du sacrifice de culpabilité. Le sacrificateur prendra du sang de la victime de culpabilité; il en mettra sur le lobe de l’oreille droite de celui qui se purifie, sur le pouce de sa main droite et sur le gros orteil de son pied droit. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le sacrificateur versera de l’huile dans le creux de sa main gauche. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le sacrificateur fera avec le doigt de sa main droite sept fois l’aspersion de l’huile qui est dans sa main gauche, devant l’Éternel. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le sacrificateur mettra de l’huile qui est dans sa main sur le lobe de l’oreille droite de celui qui se purifie, sur le pouce de sa main droite et sur le gros orteil de son pied droit, à la place où il a mis du sang de la victime de culpabilité. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le sacrificateur mettra ce qui lui reste d’huile dans la main sur la tête de celui qui se purifie, afin de faire pour lui l’expiation devant l’Éternel. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le sacrificateur sortira du camp, et il examinera le lépreux. Si le lépreux est guéri de la plaie de la lèpre, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis il offrira l’une des tourterelles ou l’un des jeunes pigeons qu’il a pu se procurer, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'l’un en sacrifice d’expiation, l’autre en holocauste, avec l’offrande; et le sacrificateur fera pour celui qui se purifie l’expiation devant l’Éternel. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Telle est la loi pour la purification de celui qui a une plaie de lèpre, et dont les ressources sont insuffisantes.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 33-57: cf. Lé 13:47-59. (És 32:18. Ap 18:2.)'
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Éternel parla à Moïse et à Aaron, et dit: '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque vous serez entrés dans le pays de Canaan, dont je vous donne la possession; si je mets une plaie de lèpre sur une maison du pays que vous posséderez, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'celui à qui appartiendra la maison ira le déclarer au sacrificateur, et dira: J’aperçois comme une plaie dans ma maison. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le sacrificateur, avant d’y entrer pour examiner la plaie, ordonnera qu’on vide la maison, afin que tout ce qui y est ne devienne pas impur. Après cela, le sacrificateur entrera pour examiner la maison. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le sacrificateur examinera la plaie. S’il voit qu’elle offre sur les murs de la maison des cavités verdâtres ou rougeâtres, paraissant plus enfoncées que le mur, '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'il sortira de la maison, et, quand il sera à la porte, il fera fermer la maison pour sept jours. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le sacrificateur y retournera le septième jour. S’il voit que la plaie s’est étendue sur les murs de la maison, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le sacrificateur ordonnera que l’on prenne, pour celui qui doit être purifié, deux oiseaux vivants et purs, du bois de cèdre, du cramoisi et de l’hysope. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'il ordonnera qu’on ôte les pierres attaquées de la plaie, et qu’on les jette hors de la ville, dans un lieu impur. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il fera râcler tout l’intérieur de la maison; et l’on jettera hors de la ville, dans un lieu impur, la poussière qu’on aura râclée. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On prendra d’autres pierres, que l’on mettra à la place des premières; et l’on prendra d’autre mortier, pour recrépir la maison. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si la plaie revient et fait éruption dans la maison, après qu’on a ôté les pierres, râclé et recrépi la maison, '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le sacrificateur y retournera. S’il voit que la plaie s’est étendue dans la maison, c’est une lèpre invétérée dans la maison: elle est impure. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On abattra la maison, les pierres, le bois, et tout le mortier de la maison; et l’on portera ces choses hors de la ville dans un lieu impur. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Celui qui sera entré dans la maison pendant tout le temps qu’elle était fermée sera impur jusqu’au soir. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Celui qui aura couché dans la maison lavera ses vêtements. Celui qui aura mangé dans la maison lavera aussi ses vêtements. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si le sacrificateur, qui est retourné dans la maison, voit que la plaie ne s’est pas étendue, après que la maison a été recrépie, il déclarera la maison pure, car la plaie est guérie. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il prendra, pour purifier la maison, deux oiseaux, du bois de cèdre, du cramoisi et de l’hysope. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le sacrificateur ordonnera qu’on égorge l’un des oiseaux sur un vase de terre, sur de l’eau vive. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il égorgera l’un des oiseaux sur un vase de terre, sur de l’eau vive. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il prendra le bois de cèdre, l’hysope, le cramoisi et l’oiseau vivant; il les trempera dans le sang de l’oiseau égorgé et dans l’eau vive, et il en fera sept fois l’aspersion sur la maison. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il purifiera la maison avec le sang de l’oiseau, avec de l’eau vive, avec l’oiseau vivant, avec le bois de cèdre, l’hysope et le cramoisi. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il lâchera l’oiseau vivant hors de la ville, dans les champs. C’est ainsi qu’il fera pour la maison l’expiation, et elle sera pure. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Telle est la loi pour toute plaie de lèpre et pour la teigne, '
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'pour la lèpre des vêtements et des maisons, '
  '56':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'pour les tumeurs, les dartres et les taches: '
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: elle enseigne quand une chose est impure, et quand elle est pure. Telle est la loi sur la lèpre.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il prendra l’oiseau vivant, le bois de cèdre, le cramoisi et l’hysope; et il les trempera, avec l’oiseau vivant, dans le sang de l’oiseau égorgé sur l’eau vive. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il en fera sept fois l’aspersion sur celui qui doit être purifié de la lèpre. Puis il le déclarera pur, et il lâchera dans les champs l’oiseau vivant. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Celui qui se purifie lavera ses vêtements, rasera tout son poil, et se baignera dans l’eau; et il sera pur. Ensuite il pourra entrer dans le camp, mais il restera sept jours hors de sa tente. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le septième jour, il rasera tout son poil, sa tête, sa barbe, ses sourcils, il rasera tout son poil; il lavera ses vêtements, et baignera son corps dans l’eau, et il sera pur. '
