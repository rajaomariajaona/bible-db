document_id: 1SA.21
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Fuite de David: à Nob, vers le sacrificateur Achimélec; à Gath, chez le roi Akisch; dans la caverne d’Adullam; à Mitspé, chez le roi de Moab; dans la forêt de Héreth'
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-9: cf. Mt 12:1-8. 1 S 22:9, etc.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'David se rendit à Nob, vers le sacrificateur Achimélec, qui accourut effrayé au-devant de lui et lui dit: Pourquoi es-tu seul et n’y a-t-il personne avec toi? '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'David répondit au sacrificateur Achimélec: Le roi m’a donné un ordre et m’a dit: Que personne ne sache rien de l’affaire pour laquelle je t’envoie et de l’ordre que je t’ai donné. J’ai fixé un rendez-vous à mes gens. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Maintenant qu’as-tu sous la main? Donne-moi cinq pains, ou ce qui se trouvera. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Le sacrificateur répondit à David: Je n’ai pas de pain ordinaire sous la main, mais il y a du pain consacré; si du moins tes gens se sont abstenus de femmes! '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'David répondit au sacrificateur: Nous nous sommes abstenus de femmes depuis trois jours que je suis parti, et tous mes gens sont purs: d’ailleurs, si c’est là un acte profane, il sera certainement aujourd’hui sanctifié par celui qui en sera l’instrument. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Alors le sacrificateur lui '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 12:3
      metadata:
        usfm: MAT.12.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 2:25
      metadata:
        usfm: MRK.2.25
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 6:3
      metadata:
        usfm: LUK.6.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'donna du pain consacré, car il n’y avait là d’autre pain que du pain de proposition, qu’on avait ôté de devant l’Éternel pour le remplacer par du pain chaud au moment où on l’avait pris. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Là, ce même jour, un homme d’entre les serviteurs de Saül se trouvait enfermé devant l’Éternel; c’était un Édomite, nommé Doëg, chef des bergers de Saül. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'David dit à Achimélec: N’as-tu pas sous la main une lance ou une épée? Car je n’ai pris avec moi ni mon épée ni mes armes, parce que l’ordre du roi était pressant. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Le sacrificateur répondit: Voici l’épée de Goliath, le Philistin, que tu as tué dans la vallée des térébinthes; elle est enveloppée dans un drap, derrière l’éphod; si tu veux la prendre, prends-la, car il n’y en a pas d’autre ici. Et David dit: Il n’y en a point de pareille; donne-la-moi.'
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 10-15: cf. 1 S 27. (Ps 34; 56.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'David se leva et s’enfuit le même jour loin de Saül. Il arriva chez Akisch, roi de Gath. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Les serviteurs d’Akisch lui dirent: N’est-ce pas là David, roi du pays? N’est-ce pas celui pour qui l’on chantait en dansant:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 18:7
      metadata:
        usfm: 1SA.18.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Saül a frappé ses mille,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et David ses dix mille?
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'David prit à cœur ces paroles, et il eut une grande crainte d’Akisch, roi de Gath. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il se montra comme fou à leurs yeux, et fit devant eux des extravagances; il faisait des marques sur les battants des portes, et il laissait couler sa salive sur sa barbe. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Akisch dit à ses serviteurs: Vous voyez bien que cet homme a perdu la raison; pourquoi me l’amenez-vous? '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Est-ce que je manque de fous, pour que vous m’ameniez celui-ci et me rendiez témoin de ses extravagances? Faut-il qu’il entre dans ma maison?
