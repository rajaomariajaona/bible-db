document_id: JDG.7,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Victoire sur les Madianites
  - type: heading
    content: 'V. 1-25: cf. 1 S 14:1-23. Ps 60:14.'
  - type: text
    content: 'Jerubbaal, qui est Gédéon, et tout le peuple qui était avec lui, se levèrent de bon matin, et campèrent près de la source de Harod. Le camp de Madian était au nord de Gédéon, vers la colline de Moré, dans la vallée. '
  '10':
  - type: text
    content: 'Si tu crains de descendre, descends-y avec Pura, ton serviteur. '
  '11':
  - type: text
    content: 'Tu écouteras ce qu’ils diront, et après cela tes mains seront fortifiées: descends donc au camp. Il descendit avec Pura, son serviteur, jusqu’aux avant-postes du camp. '
  '12':
  - type: note
    content: Jg 6:3, 5, 33.
  - type: text
    content: 'Madian, Amalek, et tous les fils de l’Orient, étaient répandus dans la vallée comme une multitude de sauterelles, et leurs chameaux étaient innombrables comme le sable qui est sur le bord de la mer. '
  '13':
  - type: text
    content: 'Gédéon arriva; et voici, un homme racontait à son camarade un songe. Il disait: J’ai eu un songe; et voici, un gâteau de pain d’orge roulait dans le camp de Madian; il est venu heurter jusqu’à la tente, et elle est tombée; il l’a retournée sens dessus dessous, et elle a été renversée. '
  '14':
  - type: text
    content: 'Son camarade répondit, et dit: Ce n’est pas autre chose que l’épée de Gédéon, fils de Joas, homme d’Israël; Dieu a livré entre ses mains Madian et tout le camp. '
  '15':
  - type: text
    content: 'Lorsque Gédéon eut entendu le récit du songe et son explication, il se prosterna, revint au camp d’Israël, et dit: Levez-vous, car l’Éternel a livré entre vos mains le camp de Madian. '
  '16':
  - type: text
    content: 'Il divisa en trois corps les trois cents hommes, et il leur remit à tous des trompettes et des cruches vides, avec des flambeaux dans les cruches. '
  '17':
  - type: text
    content: 'Il leur dit: Vous me regarderez et vous ferez comme moi. Dès que j’aborderai le camp, vous ferez ce que je ferai; '
  '18':
  - type: text
    content: 'et quand je sonnerai de la trompette, moi et tous ceux qui seront avec moi, vous sonnerez aussi de la trompette tout autour du camp, et vous direz: Pour l’Éternel et pour Gédéon! '
  '19':
  - type: text
    content: 'Gédéon et les cent hommes qui étaient avec lui arrivèrent aux abords du camp au commencement de la veille du milieu, comme on venait de placer les gardes. Ils sonnèrent de la trompette, et brisèrent les cruches qu’ils avaient à la main. '
  '2':
  - type: text
    content: 'L’Éternel dit à Gédéon: Le peuple que tu as avec toi est trop nombreux pour que je livre Madian entre ses mains; il pourrait en tirer gloire contre moi, et dire: C’est ma main qui m’a délivré. '
  '20':
  - type: text
    content: 'Les trois corps sonnèrent de la trompette, et brisèrent les cruches; ils saisirent de la main gauche les flambeaux et de la main droite les trompettes pour sonner, et ils s’écrièrent: Épée pour l’Éternel et pour Gédéon! '
  '21':
  - type: text
    content: 'Ils restèrent chacun à sa place autour du camp, et tout le camp se mit à courir, à pousser des cris, et à prendre la fuite. '
  '22':
  - type: text
    content: 'Les trois cents hommes sonnèrent encore de la trompette; et, dans tout le camp, '
  - type: note
    content: Ps 83:10.
  - type: text
    content: 'l’Éternel leur fit tourner l’épée les uns contre les autres. Le camp s’enfuit jusqu’à Beth-Schitta vers Tseréra, jusqu’au bord d’Abel-Mehola près de Tabbath. '
  '23':
  - type: text
    content: 'Les hommes d’Israël se rassemblèrent, ceux de Nephthali, d’Aser et de tout Manassé, et ils poursuivirent Madian. '
  '24':
  - type: text
    content: 'Gédéon envoya des messagers dans toute la montagne d’Éphraïm, pour dire: Descendez à la rencontre de Madian, et coupez-leur le passage des eaux jusqu’à Beth-Bara et celui du Jourdain. Tous les hommes d’Éphraïm se rassemblèrent et ils s’emparèrent du passage des eaux jusqu’à Beth-Bara et de celui du Jourdain. '
  '25':
  - type: note
    content: Ps 83:12. És 10:26.
  - type: text
    content: Ils saisirent deux chefs de Madian, Oreb et Zeeb; ils tuèrent Oreb au rocher d’Oreb, et ils tuèrent Zeeb au pressoir de Zeeb. Ils poursuivirent Madian, et ils apportèrent les têtes d’Oreb et de Zeeb à Gédéon de l’autre côté du Jourdain.
  '3':
  - type: text
    content: 'Publie donc ceci aux oreilles du peuple: '
  - type: note
    content: De 20:8.
  - type: text
    content: 'Que celui qui est craintif et qui a peur s’en retourne et s’éloigne de la montagne de Galaad. Vingt-deux mille hommes parmi le peuple s’en retournèrent, et il en resta dix mille. '
  '4':
  - type: text
    content: 'L’Éternel dit à Gédéon: Le peuple est encore trop nombreux. Fais-les descendre vers l’eau, et là je t’en ferai le triage; celui dont je te dirai: Que celui-ci aille avec toi, ira avec toi; et celui dont je te dirai: Que celui-ci n’aille pas avec toi, n’ira pas avec toi. '
  '5':
  - type: text
    content: 'Gédéon fit descendre le peuple vers l’eau, et l’Éternel dit à Gédéon: Tous ceux qui laperont l’eau avec la langue comme lape le chien, tu les sépareras de tous ceux qui se mettront à genoux pour boire. '
  '6':
  - type: text
    content: 'Ceux qui lapèrent l’eau en la portant à la bouche avec leur main furent au nombre de trois cents hommes, et tout le reste du peuple se mit à genoux pour boire. '
  '7':
  - type: text
    content: 'Et l’Éternel dit à Gédéon: C’est par les trois cents hommes qui ont lapé, que je vous sauverai et que je livrerai Madian entre tes mains. Que tout le reste du peuple s’en aille chacun chez soi. '
  '8':
  - type: text
    content: 'On prit les vivres du peuple et ses trompettes. Puis Gédéon renvoya tous les hommes d’Israël chacun dans sa tente, et il retint les trois cents hommes. Le camp de Madian était au-dessous de lui dans la vallée. '
  '9':
  - type: text
    content: 'L’Éternel dit à Gédéon pendant la nuit: Lève-toi, descends au camp, car je l’ai livré entre tes mains. '
