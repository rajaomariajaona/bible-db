document_id: JDG.7
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Victoire sur les Madianites
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-25: cf. 1 S 14:1-23. Ps 60:14.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jerubbaal, qui est Gédéon, et tout le peuple qui était avec lui, se levèrent de bon matin, et campèrent près de la source de Harod. Le camp de Madian était au nord de Gédéon, vers la colline de Moré, dans la vallée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'L’Éternel dit à Gédéon: Le peuple que tu as avec toi est trop nombreux pour que je livre Madian entre ses mains; il pourrait en tirer gloire contre moi, et dire: C’est ma main qui m’a délivré. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Publie donc ceci aux oreilles du peuple: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 20:8
      metadata:
        usfm: DEU.20.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Que celui qui est craintif et qui a peur s’en retourne et s’éloigne de la montagne de Galaad. Vingt-deux mille hommes parmi le peuple s’en retournèrent, et il en resta dix mille. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'L’Éternel dit à Gédéon: Le peuple est encore trop nombreux. Fais-les descendre vers l’eau, et là je t’en ferai le triage; celui dont je te dirai: Que celui-ci aille avec toi, ira avec toi; et celui dont je te dirai: Que celui-ci n’aille pas avec toi, n’ira pas avec toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Gédéon fit descendre le peuple vers l’eau, et l’Éternel dit à Gédéon: Tous ceux qui laperont l’eau avec la langue comme lape le chien, tu les sépareras de tous ceux qui se mettront à genoux pour boire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ceux qui lapèrent l’eau en la portant à la bouche avec leur main furent au nombre de trois cents hommes, et tout le reste du peuple se mit à genoux pour boire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Et l’Éternel dit à Gédéon: C’est par les trois cents hommes qui ont lapé, que je vous sauverai et que je livrerai Madian entre tes mains. Que tout le reste du peuple s’en aille chacun chez soi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'On prit les vivres du peuple et ses trompettes. Puis Gédéon renvoya tous les hommes d’Israël chacun dans sa tente, et il retint les trois cents hommes. Le camp de Madian était au-dessous de lui dans la vallée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'L’Éternel dit à Gédéon pendant la nuit: Lève-toi, descends au camp, car je l’ai livré entre tes mains. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Si tu crains de descendre, descends-y avec Pura, ton serviteur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tu écouteras ce qu’ils diront, et après cela tes mains seront fortifiées: descends donc au camp. Il descendit avec Pura, son serviteur, jusqu’aux avant-postes du camp. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jg 6:3
      metadata:
        usfm: JDG.6.3
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '5'
      metadata:
        usfm: JDG.6.5
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '33'
      metadata:
        usfm: JDG.6.33
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Madian, Amalek, et tous les fils de l’Orient, étaient répandus dans la vallée comme une multitude de sauterelles, et leurs chameaux étaient innombrables comme le sable qui est sur le bord de la mer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Gédéon arriva; et voici, un homme racontait à son camarade un songe. Il disait: J’ai eu un songe; et voici, un gâteau de pain d’orge roulait dans le camp de Madian; il est venu heurter jusqu’à la tente, et elle est tombée; il l’a retournée sens dessus dessous, et elle a été renversée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Son camarade répondit, et dit: Ce n’est pas autre chose que l’épée de Gédéon, fils de Joas, homme d’Israël; Dieu a livré entre ses mains Madian et tout le camp. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Lorsque Gédéon eut entendu le récit du songe et son explication, il se prosterna, revint au camp d’Israël, et dit: Levez-vous, car l’Éternel a livré entre vos mains le camp de Madian. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il divisa en trois corps les trois cents hommes, et il leur remit à tous des trompettes et des cruches vides, avec des flambeaux dans les cruches. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il leur dit: Vous me regarderez et vous ferez comme moi. Dès que j’aborderai le camp, vous ferez ce que je ferai; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'et quand je sonnerai de la trompette, moi et tous ceux qui seront avec moi, vous sonnerez aussi de la trompette tout autour du camp, et vous direz: Pour l’Éternel et pour Gédéon! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Gédéon et les cent hommes qui étaient avec lui arrivèrent aux abords du camp au commencement de la veille du milieu, comme on venait de placer les gardes. Ils sonnèrent de la trompette, et brisèrent les cruches qu’ils avaient à la main. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Les trois corps sonnèrent de la trompette, et brisèrent les cruches; ils saisirent de la main gauche les flambeaux et de la main droite les trompettes pour sonner, et ils s’écrièrent: Épée pour l’Éternel et pour Gédéon! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ils restèrent chacun à sa place autour du camp, et tout le camp se mit à courir, à pousser des cris, et à prendre la fuite. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Les trois cents hommes sonnèrent encore de la trompette; et, dans tout le camp, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 83:10
      metadata:
        usfm: PSA.83.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'l’Éternel leur fit tourner l’épée les uns contre les autres. Le camp s’enfuit jusqu’à Beth-Schitta vers Tseréra, jusqu’au bord d’Abel-Mehola près de Tabbath. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Les hommes d’Israël se rassemblèrent, ceux de Nephthali, d’Aser et de tout Manassé, et ils poursuivirent Madian. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Gédéon envoya des messagers dans toute la montagne d’Éphraïm, pour dire: Descendez à la rencontre de Madian, et coupez-leur le passage des eaux jusqu’à Beth-Bara et celui du Jourdain. Tous les hommes d’Éphraïm se rassemblèrent et ils s’emparèrent du passage des eaux jusqu’à Beth-Bara et de celui du Jourdain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 83:12
      metadata:
        usfm: PSA.83.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 10:26
      metadata:
        usfm: ISA.10.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ils saisirent deux chefs de Madian, Oreb et Zeeb; ils tuèrent Oreb au rocher d’Oreb, et ils tuèrent Zeeb au pressoir de Zeeb. Ils poursuivirent Madian, et ils apportèrent les têtes d’Oreb et de Zeeb à Gédéon de l’autre côté du Jourdain.
