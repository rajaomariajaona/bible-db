document_id: 1JN.3
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Voyez '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Jn 1:12.
    marker-yv: yv-n
  - type: text
    text: 'quel amour le Père nous a témoigné, pour que nous soyons appelés enfants de Dieu! Et nous le sommes. Si le monde ne nous connaît pas, c’est qu’il ne l’a pas connu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Bien-aimés, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 56:5
      metadata:
        usfm: ISA.56.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 1:12
      metadata:
        usfm: JHN.1.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 8:15
      metadata:
        usfm: ROM.8.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 3:26
      metadata:
        usfm: GAL.3.26
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 4:6
      metadata:
        usfm: GAL.4.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'nous sommes maintenant enfants de Dieu, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 5:12
      metadata:
        usfm: MAT.5.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 8:18
      metadata:
        usfm: ROM.8.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 4:17
      metadata:
        usfm: 2CO.4.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et ce que nous serons n’a pas encore été manifesté; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 3:21
      metadata:
        usfm: PHP.3.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 3:4
      metadata:
        usfm: COL.3.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'mais nous savons que, lorsque cela sera manifesté, nous serons semblables à lui, parce que nous le verrons tel qu’il est. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Quiconque a cette espérance en lui se purifie, comme lui-même est pur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Quiconque pèche transgresse la loi, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 5:17
      metadata:
        usfm: 1JN.5.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'le péché est la transgression de la loi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 53:12
      metadata:
        usfm: ISA.53.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 1:15
      metadata:
        usfm: 1TI.1.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Or, vous le savez, Jésus a paru pour ôter les péchés, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 53:9
      metadata:
        usfm: ISA.53.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 5:21
      metadata:
        usfm: 2CO.5.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 2:22
      metadata:
        usfm: 1PE.2.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'il n’y a point en lui de péché. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Quiconque demeure en lui ne pèche point; quiconque pèche ne l’a pas vu, et ne l’a pas connu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Petits enfants, que personne ne vous séduise. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jn 2:29.
    marker-yv: yv-n
  - type: text
    text: 'Celui qui pratique la justice est juste, comme lui-même est juste. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Celui qui pèche est du diable, car le diable pèche dès le commencement. Le Fils de Dieu a paru afin de détruire les œuvres du diable. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 5:18
      metadata:
        usfm: 1JN.5.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Quiconque est né de Dieu ne pratique pas le péché, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 1:23
      metadata:
        usfm: 1PE.1.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'parce que la semence de Dieu demeure en lui; et il ne peut pécher, parce qu’il est né de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: C’est par là que se font reconnaître les enfants de Dieu et les enfants du diable. Quiconque ne pratique pas la justice n’est pas de Dieu, non plus que celui qui n’aime pas son frère.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 11-24: cf. Jn 13:34, 35; 15:12-21. 1 Jn 4:7, 8, 16-21.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Car ce qui vous a été annoncé et ce que vous avez entendu dès le commencement, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 13:34
      metadata:
        usfm: JHN.13.34
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 15:12
      metadata:
        usfm: JHN.15.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 3:23
      metadata:
        usfm: 1JN.3.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'c’est que nous devons nous aimer les uns les autres, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'et ne pas ressembler à '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 4:8
      metadata:
        usfm: GEN.4.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Caïn, qui était du malin, et qui tua son frère. Et pourquoi le tua-t-il? '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 11:4
      metadata:
        usfm: HEB.11.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'parce que ses œuvres étaient mauvaises, et que celles de son frère étaient justes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 15:18
      metadata:
        usfm: JHN.15.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ne vous étonnez pas, frères, si le monde vous hait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 2:10
      metadata:
        usfm: 1JN.2.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Nous savons que nous sommes passés de la mort à la vie, parce que nous aimons les frères. Celui qui n’aime pas demeure dans la mort. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Quiconque hait son frère est un meurtrier, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 5:21
      metadata:
        usfm: MAT.5.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 5:21
      metadata:
        usfm: GAL.5.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'vous savez qu’aucun meurtrier n’a la vie éternelle demeurant en lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 15:13
      metadata:
        usfm: JHN.15.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 5:2
      metadata:
        usfm: EPH.5.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Nous avons connu l’amour, en ce qu’il a donné sa vie pour nous; nous aussi, nous devons donner notre vie pour les frères. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 15:7
      metadata:
        usfm: DEU.15.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 3:11
      metadata:
        usfm: LUK.3.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ja 2:15
      metadata:
        usfm: JAS.2.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Si quelqu’un possède les biens du monde, et que, voyant son frère dans le besoin, il lui ferme ses entrailles, comment l’amour de Dieu demeure-t-il en lui? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Petits enfants, n’aimons pas en paroles et avec la langue, mais en actions et avec vérité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Par là nous connaîtrons que nous sommes de la vérité, et nous rassurerons nos cœurs devant lui; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'car si notre cœur nous condamne, Dieu est plus grand que notre cœur, et il connaît toutes choses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Bien-aimés, si notre cœur ne nous condamne pas, nous avons de l’assurance devant Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 29:12
      metadata:
        usfm: JER.29.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 7:8
      metadata:
        usfm: MAT.7.8
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 21:22
      metadata:
        usfm: MAT.21.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 11:24
      metadata:
        usfm: MRK.11.24
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 11:9
      metadata:
        usfm: LUK.11.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 14:13
      metadata:
        usfm: JHN.14.13
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 16:24
      metadata:
        usfm: JHN.16.24
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ja 1:5
      metadata:
        usfm: JAS.1.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 5:14
      metadata:
        usfm: 1JN.5.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Quoi que ce soit que nous demandions, nous le recevons de lui, parce que nous gardons ses commandements et que nous faisons ce qui lui est agréable. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 6:29
      metadata:
        usfm: JHN.6.29
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 17:3
      metadata:
        usfm: JHN.17.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Et c’est ici son commandement: que nous croyions au nom de son Fils Jésus-Christ, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 19:18
      metadata:
        usfm: LEV.19.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 22:39
      metadata:
        usfm: MAT.22.39
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 13:34
      metadata:
        usfm: JHN.13.34
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 15:12
      metadata:
        usfm: JHN.15.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 5:2
      metadata:
        usfm: EPH.5.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 4:9
      metadata:
        usfm: 1TH.4.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 4:8
      metadata:
        usfm: 1PE.4.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 4:21
      metadata:
        usfm: 1JN.4.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'que nous nous aimions les uns les autres, selon le commandement qu’il nous a donné. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 14:23
      metadata:
        usfm: JHN.14.23
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 15:10
      metadata:
        usfm: JHN.15.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 4:12
      metadata:
        usfm: 1JN.4.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Celui qui garde ses commandements demeure en Dieu, et Dieu en lui; et nous connaissons qu’il demeure en nous par l’Esprit qu’il nous a donné.
