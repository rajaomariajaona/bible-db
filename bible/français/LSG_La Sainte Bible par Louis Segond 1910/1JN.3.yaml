document_id: 1JN.3,93
type_code: fra
verses:
  '1':
  - type: text
    content: 'Voyez '
  - type: note
    content: 1 Jn 1:12.
  - type: text
    content: 'quel amour le Père nous a témoigné, pour que nous soyons appelés enfants de Dieu! Et nous le sommes. Si le monde ne nous connaît pas, c’est qu’il ne l’a pas connu. '
  '10':
  - type: text
    content: C’est par là que se font reconnaître les enfants de Dieu et les enfants du diable. Quiconque ne pratique pas la justice n’est pas de Dieu, non plus que celui qui n’aime pas son frère.
  - type: heading
    content: 'V. 11-24: cf. Jn 13:34, 35; 15:12-21. 1 Jn 4:7, 8, 16-21.'
  '11':
  - type: text
    content: 'Car ce qui vous a été annoncé et ce que vous avez entendu dès le commencement, '
  - type: note
    content: Jn 13:34; 15:12. 1 Jn 3:23.
  - type: text
    content: 'c’est que nous devons nous aimer les uns les autres, '
  '12':
  - type: text
    content: 'et ne pas ressembler à '
  - type: note
    content: Ge 4:8.
  - type: text
    content: 'Caïn, qui était du malin, et qui tua son frère. Et pourquoi le tua-t-il? '
  - type: note
    content: Hé 11:4.
  - type: text
    content: 'parce que ses œuvres étaient mauvaises, et que celles de son frère étaient justes. '
  '13':
  - type: note
    content: Jn 15:18.
  - type: text
    content: 'Ne vous étonnez pas, frères, si le monde vous hait. '
  '14':
  - type: note
    content: 1 Jn 2:10.
  - type: text
    content: 'Nous savons que nous sommes passés de la mort à la vie, parce que nous aimons les frères. Celui qui n’aime pas demeure dans la mort. '
  '15':
  - type: text
    content: 'Quiconque hait son frère est un meurtrier, et '
  - type: note
    content: Mt 5:21. Ga 5:21.
  - type: text
    content: 'vous savez qu’aucun meurtrier n’a la vie éternelle demeurant en lui. '
  '16':
  - type: note
    content: Jn 15:13. Ép 5:2.
  - type: text
    content: 'Nous avons connu l’amour, en ce qu’il a donné sa vie pour nous; nous aussi, nous devons donner notre vie pour les frères. '
  '17':
  - type: note
    content: De 15:7. Lu 3:11. Ja 2:15.
  - type: text
    content: 'Si quelqu’un possède les biens du monde, et que, voyant son frère dans le besoin, il lui ferme ses entrailles, comment l’amour de Dieu demeure-t-il en lui? '
  '18':
  - type: text
    content: 'Petits enfants, n’aimons pas en paroles et avec la langue, mais en actions et avec vérité. '
  '19':
  - type: text
    content: 'Par là nous connaîtrons que nous sommes de la vérité, et nous rassurerons nos cœurs devant lui; '
  '2':
  - type: text
    content: 'Bien-aimés, '
  - type: note
    content: És 56:5. Jn 1:12. Ro 8:15. Ga 3:26; 4:6.
  - type: text
    content: 'nous sommes maintenant enfants de Dieu, '
  - type: note
    content: Mt 5:12. Ro 8:18. 2 Co 4:17.
  - type: text
    content: 'et ce que nous serons n’a pas encore été manifesté; '
  - type: note
    content: Ph 3:21. Col 3:4.
  - type: text
    content: 'mais nous savons que, lorsque cela sera manifesté, nous serons semblables à lui, parce que nous le verrons tel qu’il est. '
  '20':
  - type: text
    content: 'car si notre cœur nous condamne, Dieu est plus grand que notre cœur, et il connaît toutes choses. '
  '21':
  - type: text
    content: 'Bien-aimés, si notre cœur ne nous condamne pas, nous avons de l’assurance devant Dieu. '
  '22':
  - type: note
    content: Jé 29:12. Mt 7:8; 21:22. Mc 11:24. Lu 11:9. Jn 14:13; 16:24. Ja 1:5. 1 Jn 5:14.
  - type: text
    content: 'Quoi que ce soit que nous demandions, nous le recevons de lui, parce que nous gardons ses commandements et que nous faisons ce qui lui est agréable. '
  '23':
  - type: note
    content: Jn 6:29; 17:3.
  - type: text
    content: 'Et c’est ici son commandement: que nous croyions au nom de son Fils Jésus-Christ, et '
  - type: note
    content: Lé 19:18. Mt 22:39. Jn 13:34; 15:12. Ép 5:2. 1 Th 4:9. 1 Pi 4:8. 1 Jn 4:21.
  - type: text
    content: 'que nous nous aimions les uns les autres, selon le commandement qu’il nous a donné. '
  '24':
  - type: note
    content: Jn 14:23; 15:10. 1 Jn 4:12.
  - type: text
    content: Celui qui garde ses commandements demeure en Dieu, et Dieu en lui; et nous connaissons qu’il demeure en nous par l’Esprit qu’il nous a donné.
  '3':
  - type: text
    content: 'Quiconque a cette espérance en lui se purifie, comme lui-même est pur. '
  '4':
  - type: text
    content: 'Quiconque pèche transgresse la loi, et '
  - type: note
    content: 1 Jn 5:17.
  - type: text
    content: 'le péché est la transgression de la loi. '
  '5':
  - type: note
    content: És 53:12. 1 Ti 1:15.
  - type: text
    content: 'Or, vous le savez, Jésus a paru pour ôter les péchés, et '
  - type: note
    content: És 53:9. 2 Co 5:21. 1 Pi 2:22.
  - type: text
    content: 'il n’y a point en lui de péché. '
  '6':
  - type: text
    content: 'Quiconque demeure en lui ne pèche point; quiconque pèche ne l’a pas vu, et ne l’a pas connu. '
  '7':
  - type: text
    content: 'Petits enfants, que personne ne vous séduise. '
  - type: note
    content: Jn 2:29.
  - type: text
    content: 'Celui qui pratique la justice est juste, comme lui-même est juste. '
  '8':
  - type: text
    content: 'Celui qui pèche est du diable, car le diable pèche dès le commencement. Le Fils de Dieu a paru afin de détruire les œuvres du diable. '
  '9':
  - type: note
    content: 1 Jn 5:18.
  - type: text
    content: 'Quiconque est né de Dieu ne pratique pas le péché, '
  - type: note
    content: 1 Pi 1:23.
  - type: text
    content: 'parce que la semence de Dieu demeure en lui; et il ne peut pécher, parce qu’il est né de Dieu. '
