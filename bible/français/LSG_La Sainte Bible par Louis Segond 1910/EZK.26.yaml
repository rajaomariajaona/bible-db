document_id: EZK.26
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prophétie contre Tyr et Sidon
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-21: cf. (Éz 27; 28:1-19. És 23.) Pr 16:18.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La onzième année, le premier jour du mois, la parole de l’Éternel me fut adressée, en ces mots:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fils de l’homme, parce que Tyr a dit sur Jérusalem: Ah! Ah!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle est brisée, la porte des peuples!
- type: usfm
  marker: q1
  children:
  - type: text
    text: On se tourne vers moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je me remplirai, elle est déserte!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'A cause de cela, ainsi parle le Seigneur, l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voici, j’en veux à toi, Tyr!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je ferai monter contre toi des nations nombreuses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme la mer fait monter ses flots.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Elles détruiront les murs de Tyr,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elles abattront ses tours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et j’en raclerai la poussière;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je ferai d’elle un rocher nu;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Elle sera dans la mer un lieu où l’on étendra les filets;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car j’ai parlé, dit le Seigneur, l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle sera la proie des nations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ses filles sur son territoire
- type: usfm
  marker: q1
  children:
  - type: text
    text: Seront tuées par l’épée.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils sauront que je suis l’Éternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Car ainsi parle le Seigneur, l’Éternel: Voici, j’amène du septentrion contre Tyr Nebucadnetsar, roi de Babylone, le roi des rois, avec des chevaux, des chars, des cavaliers, et une grande multitude de peuples. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Il tuera par l’épée tes filles sur ton territoire; il fera contre toi des retranchements, il élèvera contre toi des terrasses, et il dressera contre toi le bouclier. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il dirigera les coups de son bélier contre tes murs, et il renversera tes tours avec ses machines. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'La multitude de ses chevaux te couvrira de poussière; tes murs trembleront au bruit des cavaliers, des roues et des chars, lorsqu’il entrera dans tes portes comme on entre dans une ville conquise. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il foulera toutes tes rues avec les '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 5:28
      metadata:
        usfm: ISA.5.28
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 47:3
      metadata:
        usfm: JER.47.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'sabots de ses chevaux, il tuera ton peuple par l’épée, et les monuments de ton orgueil tomberont à terre. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'On enlèvera tes richesses, on pillera tes marchandises, on abattra tes murs, on renversera tes maisons de plaisance, et l’on jettera au milieu des eaux tes pierres, ton bois, et ta poussière. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Je ferai cesser le '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 24:7
      metadata:
        usfm: ISA.24.7
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '8'
      metadata:
        usfm: ISA.24.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 7:34
      metadata:
        usfm: JER.7.34
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 16:9
      metadata:
        usfm: JER.16.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'bruit de tes chants, et l’on n’entendra plus le son de tes harpes. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Je ferai de toi un rocher nu; tu seras un lieu où l’on étendra les filets; tu ne seras plus rebâtie. Car moi, l’Éternel, j’ai parlé, dit le Seigneur, l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ainsi parle à Tyr le Seigneur, l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au bruit de ta chute,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand les mourants gémissent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand le carnage est dans ton sein,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les îles tremblent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Tous les princes de la mer descendent de leurs trônes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ôtent leurs manteaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et quittent leurs vêtements brodés;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils s’enveloppent de frayeur, et s’asseyent sur la terre;
- type: usfm
  marker: q1
  children:
  - type: text
    text: A chaque instant l’épouvante les saisit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils sont consternés à cause de toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ils prononcent sur toi une '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ap 18:9, etc.
    marker-yv: yv-n
  - type: text
    text: 'complainte, et te disent:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eh quoi! Tu es détruite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toi que peuplaient ceux qui parcourent les mers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ville célèbre, qui étais puissante sur la mer!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle est détruite avec ses habitants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui inspiraient la terreur à tous ceux d’alentour!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Maintenant les îles tremblent au jour de ta chute,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les îles de la mer sont épouvantées de ta fin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Car ainsi parle le Seigneur, l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand je ferai de toi une ville déserte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme les villes qui n’ont point d’habitants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand je ferai monter contre toi l’abîme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que les grandes eaux te couvriront,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Je te précipiterai avec ceux qui sont descendus dans la fosse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vers le peuple d’autrefois,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je te placerai dans les profondeurs de la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans les solitudes éternelles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Près de ceux qui sont descendus dans la fosse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afin que tu ne sois plus habitée;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je réserverai la gloire pour le pays des vivants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Je te réduirai au néant, et tu ne seras plus;
- type: usfm
  marker: q1
  children:
  - type: text
    text: On te cherchera, et l’on ne te trouvera plus jamais,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit le Seigneur, l’Éternel.
