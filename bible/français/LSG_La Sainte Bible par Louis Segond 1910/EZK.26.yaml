document_id: EZK.26,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Prophétie contre Tyr et Sidon
  - type: heading
    content: 'V. 1-21: cf. (Éz 27; 28:1-19. És 23.) Pr 16:18.'
  - type: text
    content: 'La onzième année, le premier jour du mois, la parole de l’Éternel me fut adressée, en ces mots:'
  '10':
  - type: text
    content: 'La multitude de ses chevaux te couvrira de poussière; tes murs trembleront au bruit des cavaliers, des roues et des chars, lorsqu’il entrera dans tes portes comme on entre dans une ville conquise. '
  '11':
  - type: text
    content: 'Il foulera toutes tes rues avec les '
  - type: note
    content: És 5:28. Jé 47:3.
  - type: text
    content: 'sabots de ses chevaux, il tuera ton peuple par l’épée, et les monuments de ton orgueil tomberont à terre. '
  '12':
  - type: text
    content: 'On enlèvera tes richesses, on pillera tes marchandises, on abattra tes murs, on renversera tes maisons de plaisance, et l’on jettera au milieu des eaux tes pierres, ton bois, et ta poussière. '
  '13':
  - type: text
    content: 'Je ferai cesser le '
  - type: note
    content: És 24:7, 8. Jé 7:34; 16:9.
  - type: text
    content: 'bruit de tes chants, et l’on n’entendra plus le son de tes harpes. '
  '14':
  - type: text
    content: Je ferai de toi un rocher nu; tu seras un lieu où l’on étendra les filets; tu ne seras plus rebâtie. Car moi, l’Éternel, j’ai parlé, dit le Seigneur, l’Éternel.
  '15':
  - type: text
    content: 'Ainsi parle à Tyr le Seigneur, l’Éternel:'
  - type: text
    content: Au bruit de ta chute,
  - type: text
    content: Quand les mourants gémissent,
  - type: text
    content: Quand le carnage est dans ton sein,
  - type: text
    content: Les îles tremblent.
  '16':
  - type: text
    content: Tous les princes de la mer descendent de leurs trônes,
  - type: text
    content: Ils ôtent leurs manteaux,
  - type: text
    content: Et quittent leurs vêtements brodés;
  - type: text
    content: Ils s’enveloppent de frayeur, et s’asseyent sur la terre;
  - type: text
    content: A chaque instant l’épouvante les saisit,
  - type: text
    content: Et ils sont consternés à cause de toi.
  '17':
  - type: text
    content: 'Ils prononcent sur toi une '
  - type: note
    content: Ap 18:9, etc.
  - type: text
    content: 'complainte, et te disent:'
  - type: text
    content: Eh quoi! Tu es détruite,
  - type: text
    content: Toi que peuplaient ceux qui parcourent les mers,
  - type: text
    content: Ville célèbre, qui étais puissante sur la mer!
  - type: text
    content: Elle est détruite avec ses habitants,
  - type: text
    content: Qui inspiraient la terreur à tous ceux d’alentour!
  '18':
  - type: text
    content: Maintenant les îles tremblent au jour de ta chute,
  - type: text
    content: Les îles de la mer sont épouvantées de ta fin.
  '19':
  - type: text
    content: 'Car ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: Quand je ferai de toi une ville déserte,
  - type: text
    content: Comme les villes qui n’ont point d’habitants,
  - type: text
    content: Quand je ferai monter contre toi l’abîme,
  - type: text
    content: Et que les grandes eaux te couvriront,
  '2':
  - type: text
    content: 'Fils de l’homme, parce que Tyr a dit sur Jérusalem: Ah! Ah!'
  - type: text
    content: Elle est brisée, la porte des peuples!
  - type: text
    content: On se tourne vers moi,
  - type: text
    content: Je me remplirai, elle est déserte!
  '20':
  - type: text
    content: Je te précipiterai avec ceux qui sont descendus dans la fosse,
  - type: text
    content: Vers le peuple d’autrefois,
  - type: text
    content: Je te placerai dans les profondeurs de la terre,
  - type: text
    content: Dans les solitudes éternelles,
  - type: text
    content: Près de ceux qui sont descendus dans la fosse,
  - type: text
    content: Afin que tu ne sois plus habitée;
  - type: text
    content: Et je réserverai la gloire pour le pays des vivants.
  '21':
  - type: text
    content: Je te réduirai au néant, et tu ne seras plus;
  - type: text
    content: On te cherchera, et l’on ne te trouvera plus jamais,
  - type: text
    content: Dit le Seigneur, l’Éternel.
  '3':
  - type: text
    content: 'A cause de cela, ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: Voici, j’en veux à toi, Tyr!
  - type: text
    content: Je ferai monter contre toi des nations nombreuses,
  - type: text
    content: Comme la mer fait monter ses flots.
  '4':
  - type: text
    content: Elles détruiront les murs de Tyr,
  - type: text
    content: Elles abattront ses tours,
  - type: text
    content: Et j’en raclerai la poussière;
  - type: text
    content: Je ferai d’elle un rocher nu;
  '5':
  - type: text
    content: Elle sera dans la mer un lieu où l’on étendra les filets;
  - type: text
    content: Car j’ai parlé, dit le Seigneur, l’Éternel.
  - type: text
    content: Elle sera la proie des nations.
  '6':
  - type: text
    content: Ses filles sur son territoire
  - type: text
    content: Seront tuées par l’épée.
  - type: text
    content: Et ils sauront que je suis l’Éternel.
  '7':
  - type: text
    content: 'Car ainsi parle le Seigneur, l’Éternel: Voici, j’amène du septentrion contre Tyr Nebucadnetsar, roi de Babylone, le roi des rois, avec des chevaux, des chars, des cavaliers, et une grande multitude de peuples. '
  '8':
  - type: text
    content: 'Il tuera par l’épée tes filles sur ton territoire; il fera contre toi des retranchements, il élèvera contre toi des terrasses, et il dressera contre toi le bouclier. '
  '9':
  - type: text
    content: 'Il dirigera les coups de son bélier contre tes murs, et il renversera tes tours avec ses machines. '
