document_id: JAS.5
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Aux mauvais riches
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-6: cf. Job 20:5, etc. Am 6:1-8; 5:11, 12. Mal 3:5; 4:1.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 11:28
      metadata:
        usfm: PRO.11.28
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Am 6:1
      metadata:
        usfm: AMO.6.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 6:24
      metadata:
        usfm: LUK.6.24
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 6:9
      metadata:
        usfm: 1TI.6.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'A vous maintenant, riches! Pleurez et gémissez, à cause des malheurs qui viendront sur vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Vos richesses sont pourries, et vos vêtements sont rongés par les teignes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Votre or et votre argent sont rouillés; et leur rouille s’élèvera en témoignage contre vous, et dévorera vos chairs comme un feu. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 6:19
      metadata:
        usfm: MAT.6.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 2:5
      metadata:
        usfm: ROM.2.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Vous avez amassé des trésors dans les derniers jours! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Voici, le '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 19:13
      metadata:
        usfm: LEV.19.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 24:14
      metadata:
        usfm: DEU.24.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'salaire des ouvriers qui ont moissonné vos champs, et dont vous les avez frustrés, crie, et les cris des moissonneurs sont parvenus jusqu’aux oreilles du Seigneur des armées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 21:13
      metadata:
        usfm: JOB.21.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 16:19
      metadata:
        usfm: LUK.16.19
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '25'
      metadata:
        usfm: LUK.16.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Vous avez vécu sur la terre dans les voluptés et dans les délices, vous avez rassasié vos cœurs au jour du carnage. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Vous avez condamné, vous avez tué le juste, qui ne vous a pas résisté.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Exhortations diverses: la patience, le serment, la prière, la conversion des pécheurs'
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 7-12: cf. Hé 10:35-37; 6:12. 1 Pi 2:19-23; 4:12-19. Ja 1:12. Mt 5:33-37.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Soyez donc patients, frères jusqu’à l’avènement du Seigneur. Voici, le laboureur attend le précieux fruit de la terre, prenant patience à son égard, jusqu’à ce qu’il ait reçu les pluies de la première et de l’arrière-saison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Vous aussi, soyez patients, affermissez vos cœurs, car l’avènement du Seigneur est proche. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ne vous plaignez pas les uns des autres, frères, afin que vous ne soyez pas jugés: voici, le juge est à la porte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Prenez, mes frères, pour modèles de souffrance et de patience les prophètes qui ont parlé au nom du Seigneur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Voici, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 5:11
      metadata:
        usfm: MAT.5.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'nous disons bienheureux ceux qui ont souffert patiemment. Vous avez entendu parler de la '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 1:21
      metadata:
        usfm: JOB.1.21
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '22'
      metadata:
        usfm: JOB.1.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'patience de Job, et vous avez vu la fin que le Seigneur lui accorda, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 14:18
      metadata:
        usfm: NUM.14.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 103:8
      metadata:
        usfm: PSA.103.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'car le Seigneur est plein de miséricorde et de compassion. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Avant toutes choses, mes frères, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 5:34
      metadata:
        usfm: MAT.5.34
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 1:17
      metadata:
        usfm: 2CO.1.17
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '18'
      metadata:
        usfm: 2CO.1.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: ne jurez ni par le ciel, ni par la terre, ni par aucun autre serment. Mais que votre oui soit oui, et que votre non soit non, afin que vous ne tombiez pas sous le jugement.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 13-20: cf. (Ps 50:15. Mc 11:24.) (No 14:11-20. 1 R 17; 18.) Da 12:3.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Quelqu’un parmi vous est-il dans la souffrance? Qu’il prie. Quelqu’un est-il dans la joie? '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 5:19
      metadata:
        usfm: EPH.5.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 3:16
      metadata:
        usfm: COL.3.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Qu’il chante des cantiques. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Quelqu’un parmi vous est-il malade? Qu’il appelle les anciens de l’Église, et que les anciens prient pour lui, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 6:13
      metadata:
        usfm: MRK.6.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'en l’oignant d’huile au nom du Seigneur; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'la prière de la foi sauvera le malade, et le Seigneur le relèvera; et s’il a commis des péchés, il lui sera pardonné. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Confessez donc vos péchés les uns aux autres, et priez les uns pour les autres, afin que vous soyez guéris. La prière fervente du juste a une grande efficace. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 17:1
      metadata:
        usfm: 1KI.17.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 4:25
      metadata:
        usfm: LUK.4.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Élie était un homme de la même nature que nous: il pria avec instance pour qu’il ne plût point, et il ne tomba point de pluie sur la terre pendant trois ans et six mois. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 18:45
      metadata:
        usfm: 1KI.18.45
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Puis il pria de nouveau, et le ciel donna de la pluie, et la terre produisit son fruit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Mes frères, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 18:15
      metadata:
        usfm: MAT.18.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'si quelqu’un parmi vous s’est égaré loin de la vérité, et qu’un autre l’y ramène, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'qu’il sache que celui qui ramènera un pécheur de la voie où il s’était égaré sauvera une âme de la mort et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 10:12
      metadata:
        usfm: PRO.10.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 4:8
      metadata:
        usfm: 1PE.4.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: couvrira une multitude de péchés.
