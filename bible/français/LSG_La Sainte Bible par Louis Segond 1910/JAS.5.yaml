document_id: JAS.5,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Aux mauvais riches
  - type: heading
    content: 'V. 1-6: cf. Job 20:5, etc. Am 6:1-8; 5:11, 12. Mal 3:5; 4:1.'
  - type: text
    content: ' '
  - type: note
    content: Pr 11:28. Am 6:1. Lu 6:24. 1 Ti 6:9.
  - type: text
    content: 'A vous maintenant, riches! Pleurez et gémissez, à cause des malheurs qui viendront sur vous. '
  '10':
  - type: text
    content: 'Prenez, mes frères, pour modèles de souffrance et de patience les prophètes qui ont parlé au nom du Seigneur. '
  '11':
  - type: text
    content: 'Voici, '
  - type: note
    content: Mt 5:11.
  - type: text
    content: 'nous disons bienheureux ceux qui ont souffert patiemment. Vous avez entendu parler de la '
  - type: note
    content: Job 1:21, 22.
  - type: text
    content: 'patience de Job, et vous avez vu la fin que le Seigneur lui accorda, '
  - type: note
    content: No 14:18. Ps 103:8.
  - type: text
    content: 'car le Seigneur est plein de miséricorde et de compassion. '
  '12':
  - type: text
    content: 'Avant toutes choses, mes frères, '
  - type: note
    content: Mt 5:34. 2 Co 1:17, 18.
  - type: text
    content: ne jurez ni par le ciel, ni par la terre, ni par aucun autre serment. Mais que votre oui soit oui, et que votre non soit non, afin que vous ne tombiez pas sous le jugement.
  - type: heading
    content: 'V. 13-20: cf. (Ps 50:15. Mc 11:24.) (No 14:11-20. 1 R 17; 18.) Da 12:3.'
  '13':
  - type: text
    content: 'Quelqu’un parmi vous est-il dans la souffrance? Qu’il prie. Quelqu’un est-il dans la joie? '
  - type: note
    content: Ép 5:19. Col 3:16.
  - type: text
    content: 'Qu’il chante des cantiques. '
  '14':
  - type: text
    content: 'Quelqu’un parmi vous est-il malade? Qu’il appelle les anciens de l’Église, et que les anciens prient pour lui, '
  - type: note
    content: Mc 6:13.
  - type: text
    content: 'en l’oignant d’huile au nom du Seigneur; '
  '15':
  - type: text
    content: 'la prière de la foi sauvera le malade, et le Seigneur le relèvera; et s’il a commis des péchés, il lui sera pardonné. '
  '16':
  - type: text
    content: 'Confessez donc vos péchés les uns aux autres, et priez les uns pour les autres, afin que vous soyez guéris. La prière fervente du juste a une grande efficace. '
  '17':
  - type: note
    content: 1 R 17:1. Lu 4:25.
  - type: text
    content: 'Élie était un homme de la même nature que nous: il pria avec instance pour qu’il ne plût point, et il ne tomba point de pluie sur la terre pendant trois ans et six mois. '
  '18':
  - type: note
    content: 1 R 18:45.
  - type: text
    content: 'Puis il pria de nouveau, et le ciel donna de la pluie, et la terre produisit son fruit. '
  '19':
  - type: text
    content: 'Mes frères, '
  - type: note
    content: Mt 18:15.
  - type: text
    content: 'si quelqu’un parmi vous s’est égaré loin de la vérité, et qu’un autre l’y ramène, '
  '2':
  - type: text
    content: 'Vos richesses sont pourries, et vos vêtements sont rongés par les teignes. '
  '20':
  - type: text
    content: 'qu’il sache que celui qui ramènera un pécheur de la voie où il s’était égaré sauvera une âme de la mort et '
  - type: note
    content: Pr 10:12. 1 Pi 4:8.
  - type: text
    content: couvrira une multitude de péchés.
  '3':
  - type: text
    content: 'Votre or et votre argent sont rouillés; et leur rouille s’élèvera en témoignage contre vous, et dévorera vos chairs comme un feu. '
  - type: note
    content: Mt 6:19. Ro 2:5.
  - type: text
    content: 'Vous avez amassé des trésors dans les derniers jours! '
  '4':
  - type: text
    content: 'Voici, le '
  - type: note
    content: Lé 19:13. De 24:14.
  - type: text
    content: 'salaire des ouvriers qui ont moissonné vos champs, et dont vous les avez frustrés, crie, et les cris des moissonneurs sont parvenus jusqu’aux oreilles du Seigneur des armées. '
  '5':
  - type: note
    content: Job 21:13. Lu 16:19, 25.
  - type: text
    content: 'Vous avez vécu sur la terre dans les voluptés et dans les délices, vous avez rassasié vos cœurs au jour du carnage. '
  '6':
  - type: text
    content: Vous avez condamné, vous avez tué le juste, qui ne vous a pas résisté.
  - type: heading
    content: 'Exhortations diverses: la patience, le serment, la prière, la conversion des pécheurs'
  - type: heading
    content: 'V. 7-12: cf. Hé 10:35-37; 6:12. 1 Pi 2:19-23; 4:12-19. Ja 1:12. Mt 5:33-37.'
  '7':
  - type: text
    content: 'Soyez donc patients, frères jusqu’à l’avènement du Seigneur. Voici, le laboureur attend le précieux fruit de la terre, prenant patience à son égard, jusqu’à ce qu’il ait reçu les pluies de la première et de l’arrière-saison. '
  '8':
  - type: text
    content: 'Vous aussi, soyez patients, affermissez vos cœurs, car l’avènement du Seigneur est proche. '
  '9':
  - type: text
    content: 'Ne vous plaignez pas les uns des autres, frères, afin que vous ne soyez pas jugés: voici, le juge est à la porte. '
