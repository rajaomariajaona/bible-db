document_id: 2JN.INTRO1,93
type_code: fra
verses:
  '1':
  - type: text
    content: INTRODUCTION À LA DEUXIÈME ÉPÎTRE DE JEAN
  - type: text
    content: (Ép 4:15; 5:8, 9.)
  - type: text
    content: La deuxième épître de Jean est un billet de circonstance d’un seul chapitre de treize versets qui, selon l’indication introductrice, a pour auteur l’ancien et pour destinataire Kyria l’élue (1).
  - type: text
    content: «L’ancien» est un titre que l’auteur se donne. Il utilise dans la correspondance probablement celui qu’on lui donnait dans les Églises comme celles auxquelles il se présente (voir aussi 3 Jn 1). Le mot grec ainsi traduit indiquait un membre du sanhédrin chez les Juifs (Matt 16:21, Lc 22:52), mais il s’appliqua aux anciens dans l’Église (1 Tim 5:17; 1 Pi 5:5).
  - type: text
    content: '«Kyria l’élue» au féminin, rappelle son masculin, Seigneur. Dans ce sens, le terme évoque l’Église, l’épouse du Seigneur. Les destinataires sont par conséquent une Église locale composée de chrétiens considérés comme les membres du peuple de la Nouvelle Alliance avec Dieu: l’Église universelle (1 Pi 2:9).'
  - type: text
    content: 'Voici par ailleurs la structure de cette épître:'
  - type: text
    content: '1. Adresse et salutations '
  - type: text
    content: 1-3
  - type: text
    content: '2. L’amour fraternel; contre les faux docteurs '
  - type: text
    content: 4-11
  - type: text
    content: '3. Vœux et salutations de conclusion '
  - type: text
    content: 12-13
  - type: text
    content: Par sa teneur, 2 Jean confirme dans les grandes lignes le contenu théologique et pastoral largement développé dans 1 Jean. On l’a déjà souligné (voir introduction à 1 Jean), la différence entre les deux réside dans le caractère épistolaire classique de 2 Jean absent de 1 Jean.
  - type: text
    content: 'Le message de la seconde comme de la troisième épître de Jean, toutes deux de véritables billets d’un seul chapitre, est plus développé dans la première épître de Jean. Il a trait à l’amour fraternel et à la mise en garde contre les séducteurs. Que la seconde épître soit adressée à Kyria et à ses enfants suppose que ces préoccupations étaient les leurs d’une manière qui leur était propre. Ainsi certaines des préoccupations auxquelles correspondent les thèmes abordés dans les trois épîtres étaient particulièrement ressenties ici. En particulier:'
  - type: text
    content: '- L’amour du prochain: '
  - type: text
    content: «Et maintenant, ce que je te demande Kyria… c’est que nous nous aimions les uns les autres. Et l’amour consiste à marcher selon ses commandements.»
  - type: text
    content: ' 5-6'
  - type: text
    content: '- La polémique contre ceux qui nient l’incarnation effective: '
  - type: text
    content: '«Car plusieurs séducteurs sont entrés dans le monde, qui ne confessent point que Jésus-Christ est venu en chair… Prenez garde à vous- mêmes… Quiconque va plus loin et ne demeure pas dans la doctrine de Christ n’a point Dieu… Si quelqu’un vient à vous et n’apporte pas cette doctrine, ne le recevez pas dans votre maison…» '
  - type: text
    content: 7-10.
