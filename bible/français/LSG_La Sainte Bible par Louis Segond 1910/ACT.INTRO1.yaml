  - type: text
    text: INTRODUCTION AU LIVRE DES ACTES DES APÔTRES
- type: usfm
  marker: imt3
  children:
  - type: text
    text: (Lu 24:47. Jn 14:12. És 49:6.)
- type: usfm
  marker: ip
  children:
  - type: text
    text: Le livre des Actes des Apôtres est la deuxième partie d’un ouvrage unique dont la première partie est l’Évangile de Luc (voir introduction à cet évangile), comme permet de le constater la lecture de Luc 1:1-4, et Actes 1:1-2. Ces deux livres ont le même auteur, et le même destinataire, Théophile.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'L’auteur rapporte dans cette partie de son livre les actes des apôtres de Jésus-Christ, autrement dit, ce que les apôtres à la suite de leur Maître ont fait de la mission qu’il leur a confiée avant de les quitter. En voici la trame:'
- type: usfm
  marker: io1
  children:
  - type: text
    text: '1. Introduction: Ascension de Jésus, retour des apôtres à Jérusalem et remplacement de Judas '
  - type: usfm
    marker: ior
    children:
    - type: text
      text: 1:1-26
- type: usfm
  marker: io1
  children:
  - type: text
    text: '2. Effusion du Saint-Esprit: les premiers chrétiens '
  - type: usfm
    marker: ior
    children:
    - type: text
      text: 2:1-47
- type: usfm
  marker: io1
  children:
  - type: text
    text: '3. Actes des apôtres Pierre et Jean: de Jérusalem en Samarie, jusqu’aux extrémités du monde '
  - type: usfm
    marker: ior
    children:
    - type: text
      text: 3:1–8:40
- type: usfm
  marker: io1
  children:
  - type: text
    text: '4. Conversion et entrée en scène de Paul dans le ministère des apôtres '
  - type: usfm
    marker: ior
    children:
    - type: text
      text: 9:1–12:25
- type: usfm
  marker: io1
  children:
  - type: text
    text: '5. Actes de l’apôtre Paul: voyages missionnaires et fondation des Églises '
  - type: usfm
    marker: ior
    children:
    - type: text
      text: 13:1–21:16
- type: usfm
  marker: io1
  children:
  - type: text
    text: '6. Paul à Jérusalem, arrestation à Jérusalem et captivité à Césarée puis à Rome '
  - type: usfm
    marker: ior
    children:
    - type: text
      text: 21:17–28:16
- type: usfm
  marker: io1
  children:
  - type: text
    text: '7. Captivité et prédication de Paul à Rome pendant deux ans '
  - type: usfm
    marker: ior
    children:
    - type: text
      text: 28:17-31
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'On le voit, les apôtres Pierre et Jean du groupe des douze sont d’abord les principaux acteurs (1:1 à 8:40); puis l’apôtre Paul occupe pratiquement les 2/3 du livre (9 à 28). Les disciples de Jésus qui, au début, étaient des Juifs vont se heurter à leurs chefs religieux. Puis, ils iront un peu partout: partant de Jérusalem, de la Judée, de la Samarie jusqu’aux extrémités de la terre. La Bonne Nouvelle de Jésus-Christ passera ainsi des Juifs aux non Juifs.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le livre des Actes des Apôtres résume la formation et l’organisation de l’Église et du christianisme. L’auteur souligne qu’il y a une continuité entre l’activité de Jésus et celle de ses apôtres après lui. On comprend donc que c’est dans cette partie de son écrit qu’il fait appeler les partisans de Jésus-Christ pour la première fois les «chrétiens», ce qui veut dire: «ceux du Christ» ou «ceux appartenant au Christ» (Act 11:26; 26:28). Ainsi naît l''Église et l''identité chrétienne.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'L’auteur du livre des Actes des Apôtres, le même que celui de l’Évangile de Luc, continue et achève l’histoire du salut en Jésus-Christ dans cette seconde partie de son écrit. Le christianisme est désormais répandu dans presque tout l’Empire romain. Ce livre montre le processus de cette expansion. Il ne s’agit pas d’une rupture avec le judaïsme mais précisément d’un changement d’héritage. L’humanité qui était représentée par les Juifs est désormais entièrement impliquée dans l’histoire du salut de Dieu comme acteur. Ceci résulte de la bonté et de l’amour de Dieu dont Luc avait commencé la présentation dans son évangile. Soulignons que ce sont des Juifs précisément que Dieu a choisis pour prêcher cette Bonne Nouvelle aux non Juifs: Pierre, Jean, et surtout Paul, l’apôtre des païens dont l’œuvre missionnaire traduit la bonté de Dieu pour cette catégorie de personnes (Gal 1:15-16;­ Ro 11:13; Act 9:15).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'La principale préoccupation de l’auteur du livre est donc d’expliquer comment on devient chrétien et membre de l’Église naissante. C’est de ce point de vue qu’il rapporte les récits en démontrant que l’Esprit de Dieu est à l’œuvre dans les paroles et les actes des apôtres de Jésus. Voici quelques-uns de ces actes, jalons importants pour ce livre:'
- type: usfm
  marker: is1
  children:
  - type: text
    text: 'Les prédications apostoliques:'
- type: text
  text: De Pierre:devant une foule2:14-36dans le temple de Jérusalem3:11-26devant le sanhédrin4:8-12chez Corneille10:34-43De Paul:à Antioche de Pisidie13:13-41à Athènes17:19-34aux anciens d’Éphèse20:17-38après son arrestation dans le temple de Jérusalem22:1-21devant le sanhédrin23:1-11devant le gouverneur Félix24:1-11devant le gouverneur Agrippa26:1-32D’Étienne:après son arrestation7:1-53De Philippe:en Samarie8:5-23sur le chemin de Jérusalem8:26-40
- type: usfm
  marker: is1
  children:
  - type: text
    text: 'Les miracles apostoliques:'
