  - type: text
    content: INTRODUCTION AU LIVRE DES ACTES DES APÔTRES
  - type: text
    content: (Lu 24:47. Jn 14:12. És 49:6.)
  - type: text
    content: Le livre des Actes des Apôtres est la deuxième partie d’un ouvrage unique dont la première partie est l’Évangile de Luc (voir introduction à cet évangile), comme permet de le constater la lecture de Luc 1:1-4, et Actes 1:1-2. Ces deux livres ont le même auteur, et le même destinataire, Théophile.
  - type: text
    content: 'L’auteur rapporte dans cette partie de son livre les actes des apôtres de Jésus-Christ, autrement dit, ce que les apôtres à la suite de leur Maître ont fait de la mission qu’il leur a confiée avant de les quitter. En voici la trame:'
  - type: text
    content: '1. Introduction: Ascension de Jésus, retour des apôtres à Jérusalem et remplacement de Judas '
  - type: text
    content: 1:1-26
  - type: text
    content: '2. Effusion du Saint-Esprit: les premiers chrétiens '
  - type: text
    content: 2:1-47
  - type: text
    content: '3. Actes des apôtres Pierre et Jean: de Jérusalem en Samarie, jusqu’aux extrémités du monde '
  - type: text
    content: 3:1–8:40
  - type: text
    content: '4. Conversion et entrée en scène de Paul dans le ministère des apôtres '
  - type: text
    content: 9:1–12:25
  - type: text
    content: '5. Actes de l’apôtre Paul: voyages missionnaires et fondation des Églises '
  - type: text
    content: 13:1–21:16
  - type: text
    content: '6. Paul à Jérusalem, arrestation à Jérusalem et captivité à Césarée puis à Rome '
  - type: text
    content: 21:17–28:16
  - type: text
    content: '7. Captivité et prédication de Paul à Rome pendant deux ans '
  - type: text
    content: 28:17-31
  - type: text
    content: 'On le voit, les apôtres Pierre et Jean du groupe des douze sont d’abord les principaux acteurs (1:1 à 8:40); puis l’apôtre Paul occupe pratiquement les 2/3 du livre (9 à 28). Les disciples de Jésus qui, au début, étaient des Juifs vont se heurter à leurs chefs religieux. Puis, ils iront un peu partout: partant de Jérusalem, de la Judée, de la Samarie jusqu’aux extrémités de la terre. La Bonne Nouvelle de Jésus-Christ passera ainsi des Juifs aux non Juifs.'
  - type: text
    content: 'Le livre des Actes des Apôtres résume la formation et l’organisation de l’Église et du christianisme. L’auteur souligne qu’il y a une continuité entre l’activité de Jésus et celle de ses apôtres après lui. On comprend donc que c’est dans cette partie de son écrit qu’il fait appeler les partisans de Jésus-Christ pour la première fois les «chrétiens», ce qui veut dire: «ceux du Christ» ou «ceux appartenant au Christ» (Act 11:26; 26:28). Ainsi naît l''Église et l''identité chrétienne.'
  - type: text
    content: 'L’auteur du livre des Actes des Apôtres, le même que celui de l’Évangile de Luc, continue et achève l’histoire du salut en Jésus-Christ dans cette seconde partie de son écrit. Le christianisme est désormais répandu dans presque tout l’Empire romain. Ce livre montre le processus de cette expansion. Il ne s’agit pas d’une rupture avec le judaïsme mais précisément d’un changement d’héritage. L’humanité qui était représentée par les Juifs est désormais entièrement impliquée dans l’histoire du salut de Dieu comme acteur. Ceci résulte de la bonté et de l’amour de Dieu dont Luc avait commencé la présentation dans son évangile. Soulignons que ce sont des Juifs précisément que Dieu a choisis pour prêcher cette Bonne Nouvelle aux non Juifs: Pierre, Jean, et surtout Paul, l’apôtre des païens dont l’œuvre missionnaire traduit la bonté de Dieu pour cette catégorie de personnes (Gal 1:15-16;­ Ro 11:13; Act 9:15).'
  - type: text
    content: 'La principale préoccupation de l’auteur du livre est donc d’expliquer comment on devient chrétien et membre de l’Église naissante. C’est de ce point de vue qu’il rapporte les récits en démontrant que l’Esprit de Dieu est à l’œuvre dans les paroles et les actes des apôtres de Jésus. Voici quelques-uns de ces actes, jalons importants pour ce livre:'
