document_id: DEU.19,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Les villes de refuge
  - type: heading
    content: 'V. 1-13: cf. (No 35:9, etc. Jos 20.) Ps 72:14.'
  - type: text
    content: 'Lorsque l’Éternel, ton Dieu, aura exterminé les nations dont l’Éternel, ton Dieu, te donne le pays, lorsque tu les auras chassées et que tu habiteras dans leurs villes et dans leurs maisons, '
  '10':
  - type: text
    content: 'afin que le sang innocent ne soit pas répandu au milieu du pays que l’Éternel, ton Dieu, te donne pour héritage, et que tu ne sois pas coupable de meurtre. '
  '11':
  - type: text
    content: 'Mais '
  - type: note
    content: Ge 9:6. Ex 21:12, 14. Lé 24:17. No 35:16.
  - type: text
    content: 'si un homme s’enfuit dans une de ces villes, après avoir dressé des embûches à son prochain par inimitié contre lui, après l’avoir attaqué et frappé de manière à causer sa mort, '
  '12':
  - type: text
    content: 'les anciens de sa ville l’enverront saisir et le livreront entre les mains du vengeur du sang, afin qu’il meure. '
  '13':
  - type: text
    content: Tu ne jetteras pas sur lui un regard de pitié, tu feras disparaître d’Israël le sang innocent, et tu seras heureux.
  - type: heading
    content: Le déplacement des bornes. Les faux témoins
  - type: heading
    content: 'V. 14-21: cf. De 27:17. (Ex 23:1. Pr 19:5, 9.) Ps 101:8.'
  '14':
  - type: text
    content: ' '
  - type: note
    content: Pr 22:28.
  - type: text
    content: 'Tu ne reculeras point les bornes de ton prochain, posées par tes ancêtres, dans l’héritage que tu auras au pays dont l’Éternel, ton Dieu, te donne la possession. '
  '15':
  - type: note
    content: No 35:50. De 17:6. Mt 18:16.
  - type: text
    content: 'Un seul témoin ne suffira pas contre un homme pour constater un crime ou un péché, quel qu’il soit; un fait ne pourra s’établir que '
  - type: note
    content: De 17:5. Jn 8:17. 2 Co 13:1. Hé 10:28.
  - type: text
    content: 'sur la déposition de deux ou de trois témoins. '
  '16':
  - type: text
    content: 'Lorsqu’un faux témoin s’élèvera contre quelqu’un pour l’accuser d’un crime, '
  '17':
  - type: text
    content: 'les deux hommes en contestation comparaîtront devant l’Éternel, devant les sacrificateurs et les juges alors en fonction. '
  '18':
  - type: text
    content: 'Les juges feront avec soin des recherches. Le témoin est-il un faux témoin, a-t-il fait contre son frère une fausse déposition, '
  '19':
  - type: note
    content: Pr 19:5.
  - type: text
    content: 'alors vous le traiterez comme il avait dessein de traiter son frère. Tu ôteras ainsi le mal du milieu de toi. '
  '2':
  - type: note
    content: Ex 21:13. No 35:9, etc. Jos 20:2.
  - type: text
    content: 'tu sépareras trois villes au milieu du pays dont l’Éternel, ton Dieu, te donne la possession. '
  '20':
  - type: text
    content: 'Les autres entendront et craindront, et l’on ne commettra plus un acte aussi criminel au milieu de toi. '
  '21':
  - type: text
    content: 'Tu ne jetteras aucun regard de pitié: '
  - type: note
    content: Ex 21:23. Lé 24:20. Mt 5:38.
  - type: text
    content: œil pour œil, dent pour dent, main pour main, pied pour pied.
  '3':
  - type: text
    content: 'Tu établiras des routes, et tu diviseras en trois parties le territoire du pays que l’Éternel, ton Dieu, va te donner en héritage. Il en sera ainsi afin que tout meurtrier puisse s’enfuir dans ces villes. '
  '4':
  - type: text
    content: 'Cette loi s’appliquera au meurtrier qui s’enfuira là pour sauver sa vie, '
  - type: note
    content: Ex 21:13. De 4:41, 42.
  - type: text
    content: 'lorsqu’il aura involontairement tué son prochain, sans avoir été auparavant son ennemi. '
  '5':
  - type: text
    content: 'Un homme, par exemple, va couper du bois dans la forêt avec un autre homme; la hache en main, il s’élance pour abattre un arbre; le fer échappe du manche, atteint le compagnon de cet homme, et lui donne la mort. Alors il s’enfuira dans l’une de ces villes pour sauver sa vie, '
  '6':
  - type: text
    content: 'de peur que le vengeur du sang, échauffé par la colère et poursuivant le meurtrier, ne finisse par l’atteindre s’il y avait à faire beaucoup de chemin, et ne frappe mortellement celui qui ne mérite pas la mort, puisqu’il n’était point auparavant l’ennemi de son prochain. '
  '7':
  - type: text
    content: 'C’est pourquoi je te donne cet ordre: Tu sépareras trois villes. '
  '8':
  - type: text
    content: 'Lorsque l’Éternel, ton Dieu, aura élargi tes frontières, comme il l’a juré à tes pères, et qu’il t’aura donné tout le pays qu’il a '
  - type: note
    content: Ge 28:13. De 12:20.
  - type: text
    content: 'promis à tes pères de te donner, '
  '9':
  - type: text
    content: 'pourvu que tu observes et mettes en pratique tous ces commandements que je te prescris aujourd’hui, en sorte que tu aimes l’Éternel, ton Dieu, et que tu marches toujours dans ses voies, tu ajouteras '
  - type: note
    content: Jos 20:7.
  - type: text
    content: 'encore trois villes à ces trois-là, '
