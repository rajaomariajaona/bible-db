document_id: DEU.19
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les villes de refuge
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-13: cf. (No 35:9, etc. Jos 20.) Ps 72:14.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Lorsque l’Éternel, ton Dieu, aura exterminé les nations dont l’Éternel, ton Dieu, te donne le pays, lorsque tu les auras chassées et que tu habiteras dans leurs villes et dans leurs maisons, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 21:13
      metadata:
        usfm: EXO.21.13
    - type: text
      text: '. No 35:9, etc. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 20:2
      metadata:
        usfm: JOS.20.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'tu sépareras trois villes au milieu du pays dont l’Éternel, ton Dieu, te donne la possession. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tu établiras des routes, et tu diviseras en trois parties le territoire du pays que l’Éternel, ton Dieu, va te donner en héritage. Il en sera ainsi afin que tout meurtrier puisse s’enfuir dans ces villes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Cette loi s’appliquera au meurtrier qui s’enfuira là pour sauver sa vie, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 21:13
      metadata:
        usfm: EXO.21.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 4:41
      metadata:
        usfm: DEU.4.41
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '42'
      metadata:
        usfm: DEU.4.42
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'lorsqu’il aura involontairement tué son prochain, sans avoir été auparavant son ennemi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Un homme, par exemple, va couper du bois dans la forêt avec un autre homme; la hache en main, il s’élance pour abattre un arbre; le fer échappe du manche, atteint le compagnon de cet homme, et lui donne la mort. Alors il s’enfuira dans l’une de ces villes pour sauver sa vie, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'de peur que le vengeur du sang, échauffé par la colère et poursuivant le meurtrier, ne finisse par l’atteindre s’il y avait à faire beaucoup de chemin, et ne frappe mortellement celui qui ne mérite pas la mort, puisqu’il n’était point auparavant l’ennemi de son prochain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'C’est pourquoi je te donne cet ordre: Tu sépareras trois villes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Lorsque l’Éternel, ton Dieu, aura élargi tes frontières, comme il l’a juré à tes pères, et qu’il t’aura donné tout le pays qu’il a '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 28:13
      metadata:
        usfm: GEN.28.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 12:20
      metadata:
        usfm: DEU.12.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'promis à tes pères de te donner, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'pourvu que tu observes et mettes en pratique tous ces commandements que je te prescris aujourd’hui, en sorte que tu aimes l’Éternel, ton Dieu, et que tu marches toujours dans ses voies, tu ajouteras '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 20:7
      metadata:
        usfm: JOS.20.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'encore trois villes à ces trois-là, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'afin que le sang innocent ne soit pas répandu au milieu du pays que l’Éternel, ton Dieu, te donne pour héritage, et que tu ne sois pas coupable de meurtre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mais '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 9:6
      metadata:
        usfm: GEN.9.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 21:12
      metadata:
        usfm: EXO.21.12
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '14'
      metadata:
        usfm: EXO.21.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 24:17
      metadata:
        usfm: LEV.24.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 35:16
      metadata:
        usfm: NUM.35.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'si un homme s’enfuit dans une de ces villes, après avoir dressé des embûches à son prochain par inimitié contre lui, après l’avoir attaqué et frappé de manière à causer sa mort, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'les anciens de sa ville l’enverront saisir et le livreront entre les mains du vengeur du sang, afin qu’il meure. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tu ne jetteras pas sur lui un regard de pitié, tu feras disparaître d’Israël le sang innocent, et tu seras heureux.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le déplacement des bornes. Les faux témoins
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 14-21: cf. De 27:17. (Ex 23:1. Pr 19:5, 9.) Ps 101:8.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 22:28
      metadata:
        usfm: PRO.22.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu ne reculeras point les bornes de ton prochain, posées par tes ancêtres, dans l’héritage que tu auras au pays dont l’Éternel, ton Dieu, te donne la possession. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'No 35:50. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 17:6
      metadata:
        usfm: DEU.17.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 18:16
      metadata:
        usfm: MAT.18.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Un seul témoin ne suffira pas contre un homme pour constater un crime ou un péché, quel qu’il soit; un fait ne pourra s’établir que '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 17:5
      metadata:
        usfm: DEU.17.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 8:17
      metadata:
        usfm: JHN.8.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 13:1
      metadata:
        usfm: 2CO.13.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 10:28
      metadata:
        usfm: HEB.10.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'sur la déposition de deux ou de trois témoins. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Lorsqu’un faux témoin s’élèvera contre quelqu’un pour l’accuser d’un crime, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'les deux hommes en contestation comparaîtront devant l’Éternel, devant les sacrificateurs et les juges alors en fonction. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Les juges feront avec soin des recherches. Le témoin est-il un faux témoin, a-t-il fait contre son frère une fausse déposition, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 19:5
      metadata:
        usfm: PRO.19.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'alors vous le traiterez comme il avait dessein de traiter son frère. Tu ôteras ainsi le mal du milieu de toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Les autres entendront et craindront, et l’on ne commettra plus un acte aussi criminel au milieu de toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Tu ne jetteras aucun regard de pitié: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 21:23
      metadata:
        usfm: EXO.21.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 24:20
      metadata:
        usfm: LEV.24.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 5:38
      metadata:
        usfm: MAT.5.38
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: œil pour œil, dent pour dent, main pour main, pied pour pied.
