document_id: NUM.22,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Balaam
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-14: cf. (De 23:3, 4. Jos 24:9, 10.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Les enfants d’Israël partirent, et ils campèrent dans les plaines de Moab, au-delà du Jourdain, vis-à-vis de Jéricho. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Balaam répondit à Dieu: Balak, fils de Tsippor, roi de Moab, les a envoyés pour me dire: '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Voici, un peuple est sorti d’Égypte, et il couvre la surface de la terre; viens donc, maudis-le; peut-être ainsi pourrai-je le combattre, et le chasserai-je. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Dieu dit à Balaam: Tu n’iras point avec eux; tu ne maudiras point ce peuple, car il est béni. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Balaam se leva le matin, et il dit aux chefs de Balak: Allez dans votre pays, car l’Éternel refuse de me laisser aller avec vous. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Et les princes de Moab se levèrent, retournèrent auprès de Balak, et dirent: Balaam a refusé de venir avec nous.'
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 15-35: cf. (1 Ti 6:9, 10. 2 Pi 2:15, 16. Pr 28:18, 20.) 1 Jn 1:6. Lu 11:34, 35.'
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Balak envoya de nouveau des chefs en plus grand nombre et plus considérés que les précédents. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ils arrivèrent auprès de Balaam, et lui dirent: Ainsi parle Balak, fils de Tsippor: Que l’on ne t’empêche donc pas de venir vers moi; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'car je te rendrai beaucoup d’honneurs, et je ferai tout ce que tu me diras; viens, je te prie, maudis-moi ce peuple. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Balaam répondit et dit aux serviteurs de Balak: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 24:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Quand Balak me donnerait sa maison pleine d’argent et d’or, je ne pourrais faire aucune chose, ni petite ni grande, contre l’ordre de l’Éternel, mon Dieu. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Maintenant, je vous prie, restez ici cette nuit, et je saurai ce que l’Éternel me dira encore. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Balak, fils de Tsippor, vit tout ce qu’Israël avait fait aux Amoréens. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Dieu vint à Balaam pendant la nuit, et lui dit: Puisque ces hommes sont venus pour t’appeler, lève-toi, va avec eux; mais tu feras ce que je te dirai. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Balaam se leva le matin, sella son ânesse, et partit avec les chefs de Moab. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'La colère de Dieu s’enflamma, parce qu’il était parti; et l’ange de l’Éternel se plaça sur le chemin, pour lui résister. Balaam était monté sur son ânesse, et ses deux serviteurs étaient avec lui. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Pi 2:16
      - type: text
        text: . Jud v. 11.
      marker-yv: yv-n
    - type: text
      text: 'L’ânesse vit l’ange de l’Éternel qui se tenait sur le chemin, son épée nue dans la main; elle se détourna du chemin et alla dans les champs. Balaam frappa l’ânesse pour la ramener dans le chemin. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'L’ange de l’Éternel se plaça dans un sentier entre les vignes; il y avait un mur de chaque côté. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'L’ânesse vit l’ange de l’Éternel; elle se serra contre le mur, et pressa le pied de Balaam contre le mur. Balaam la frappa de nouveau. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'L’ange de l’Éternel passa plus loin, et se plaça dans un lieu où il n’y avait point d’espace pour se détourner à droite ou à gauche. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'L’ânesse vit l’ange de l’Éternel, et elle s’abattit sous Balaam. La colère de Balaam s’enflamma, et il frappa l’ânesse avec un bâton. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Pi 2:16
      - type: text
        text: . Jud v. 11.
      marker-yv: yv-n
    - type: text
      text: 'L’Éternel ouvrit la bouche de l’ânesse, et elle dit à Balaam: Que t’ai-je fait, pour que tu m’aies frappée déjà trois fois? '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Balaam répondit à l’ânesse: C’est parce que tu t’es moquée de moi; si j’avais une épée dans la main, je te tuerais à l’instant. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Et Moab fut très effrayé en face d’un peuple aussi nombreux, il fut saisi de terreur en face des enfants d’Israël. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'L’ânesse dit à Balaam: Ne suis-je pas ton ânesse, que tu as de tout temps montée jusqu’à ce jour? Ai-je l’habitude de te faire ainsi? Et il répondit: Non. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'L’Éternel ouvrit les yeux de Balaam, et Balaam vit l’ange de l’Éternel qui se tenait sur le chemin, son épée nue dans la main; et il s’inclina, et se prosterna sur son visage. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'L’ange de l’Éternel lui dit: Pourquoi as-tu frappé ton ânesse déjà trois fois? Voici, je suis sorti pour te résister, car c’est '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Pi 2:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'un chemin de perdition qui est devant moi. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'L’ânesse m’a vu, et elle s’est détournée devant moi déjà trois fois; si elle ne se fût pas détournée de moi, je t’aurais même tué, et je lui aurais laissé la vie. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Balaam dit à l’ange de l’Éternel: J’ai péché, car je ne savais pas que tu te fusses placé au-devant de moi sur le chemin; et maintenant, si tu me désapprouves, je m’en retournerai. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'L’ange de l’Éternel dit à Balaam: Va avec ces hommes; mais tu ne feras que répéter les paroles que je te dirai. Et Balaam alla avec les chefs de Balak.'
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 36-41: cf. No 24:10-13.'
    marker-yv: yv-h
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Balak apprit que Balaam arrivait, et il sortit à sa rencontre jusqu’à la ville de Moab qui est sur la limite de l’Arnon, à l’extrême frontière. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Balak dit à Balaam: N’ai-je pas envoyé auprès de toi pour t’appeler? Pourquoi n’es-tu pas venu vers moi? Ne puis-je donc pas te traiter avec honneur? '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Balaam dit à Balak: Voici, je suis venu vers toi; maintenant, me sera-t-il permis de dire quoi que ce soit? Je dirai les paroles que Dieu mettra dans ma bouche. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Balaam alla avec Balak, et ils arrivèrent à Kirjath-Hutsoth. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Moab dit aux anciens de Madian: Cette multitude va dévorer tout ce qui nous entoure, comme le bœuf broute la verdure des champs. Balak, fils de Tsippor, était alors roi de Moab. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Balak sacrifia des bœufs et des brebis, et il en envoya à Balaam et aux chefs qui étaient avec lui. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: Le matin, Balak prit Balaam, et le fit monter à Bamoth-Baal, d’où Balaam vit une partie du peuple.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Il envoya des messagers auprès de '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 24:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Balaam, fils de Beor, à Pethor sur le fleuve, dans le pays des fils de son peuple, afin de l’appeler et de lui dire: Voici, un peuple est sorti d’Égypte, il couvre la surface de la terre, et il habite vis-à-vis de moi. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Viens, je te prie, maudis-moi ce peuple, car il est plus puissant que moi; peut-être ainsi pourrai-je le battre et le chasserai-je du pays, car je sais que celui que tu bénis est béni, et que celui que tu maudis est maudit. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Les anciens de Moab et les anciens de Madian partirent, ayant avec eux des présents pour le devin. Ils arrivèrent auprès de Balaam, et lui rapportèrent les paroles de Balak. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Balaam leur dit: Passez ici la nuit, et je vous donnerai réponse, d’après ce que l’Éternel me dira. Et les chefs de Moab restèrent chez Balaam. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Dieu vint à Balaam, et dit: Qui sont ces hommes que tu as chez toi? '
