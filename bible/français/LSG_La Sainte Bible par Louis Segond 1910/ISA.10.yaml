document_id: ISA.10,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Malheur aux magistrats injustes!
  - type: heading
    content: 'V. 1-4: cf. Am 5:11, 12. Mi 3:1-4. Jé 5:9, 29. Ja 2:13.'
  - type: text
    content: Malheur à ceux qui prononcent des ordonnances iniques,
  - type: text
    content: Et à ceux qui transcrivent des arrêts injustes,
  '10':
  - type: text
    content: De même que ma main a atteint les royaumes des idoles,
  - type: text
    content: Où il y avait plus d’images qu’à Jérusalem et à Samarie,
  '11':
  - type: text
    content: Ce que j’ai fait à Samarie et à ses idoles,
  - type: text
    content: Ne le ferai-je pas à Jérusalem et à ses images?
  '12':
  - type: text
    content: Mais, quand le Seigneur aura accompli toute son œuvre
  - type: text
    content: Sur la montagne de Sion et à Jérusalem,
  - type: text
    content: Je punirai le roi d’Assyrie pour le fruit de son cœur orgueilleux,
  - type: text
    content: Et pour l’arrogance de ses regards hautains.
  '13':
  - type: text
    content: 'Car il dit: C’est par la force de ma main que j’ai agi,'
  - type: text
    content: C’est par ma sagesse, car je suis intelligent;
  - type: text
    content: J’ai reculé les limites des peuples, et pillé leurs trésors,
  - type: text
    content: Et, comme un héros, j’ai renversé ceux qui siégeaient sur des trônes;
  '14':
  - type: text
    content: J’ai mis la main sur les richesses des peuples, comme sur un nid,
  - type: text
    content: Et, comme on ramasse des œufs abandonnés,
  - type: text
    content: 'J’ai ramassé toute la terre:'
  - type: text
    content: Nul n’a remué l’aile,
  - type: text
    content: Ni ouvert le bec, ni poussé un cri.
  '15':
  - type: text
    content: La hache se glorifie-t-elle envers celui qui s’en sert?
  - type: text
    content: Ou la scie est-elle arrogante envers celui qui la manie?
  - type: text
    content: Comme si la verge faisait mouvoir celui qui la lève,
  - type: text
    content: Comme si le bâton soulevait celui qui n’est pas du bois!
  '16':
  - type: text
    content: C’est pourquoi le Seigneur, le Seigneur des armées, enverra
  - type: text
    content: Le dépérissement parmi ses robustes guerriers;
  - type: text
    content: 'Et, sous sa magnificence, '
  - type: note
    content: És 24:6.
  - type: text
    content: éclatera un embrasement,
  - type: text
    content: Comme l’embrasement d’un feu.
  '17':
  - type: text
    content: La lumière d’Israël deviendra un feu,
  - type: text
    content: Et son Saint une flamme,
  - type: text
    content: Qui consumera et dévorera ses épines et ses ronces,
  - type: text
    content: En un seul jour;
  '18':
  - type: text
    content: Qui consumera, corps et âme,
  - type: text
    content: La magnificence de sa forêt et de ses campagnes.
  - type: text
    content: Il en sera comme d’un malade, qui tombe en défaillance.
  '19':
  - type: text
    content: Le reste des arbres de sa forêt pourra être compté,
  - type: text
    content: Et un enfant en écrirait le nombre.
  '2':
  - type: text
    content: Pour refuser justice aux pauvres,
  - type: text
    content: Et ravir leur droit aux malheureux de mon peuple,
  - type: text
    content: Pour faire des veuves leur proie,
  - type: text
    content: Et des orphelins leur butin!
  '20':
  - type: text
    content: En ce jour-là,
  - type: text
    content: Le reste d’Israël et les réchappés de la maison de Jacob,
  - type: text
    content: Cesseront de s’appuyer sur celui qui les frappait;
  - type: text
    content: Ils s’appuieront avec confiance sur l’Éternel, le Saint d’Israël.
  '21':
  - type: text
    content: Le reste reviendra, le reste de Jacob,
  - type: text
    content: Au Dieu puissant.
  '22':
  - type: text
    content: ' '
  - type: note
    content: Ro 9:27, 28.
  - type: text
    content: Quand ton peuple, ô Israël, serait comme le sable de la mer,
  - type: text
    content: Un reste seulement reviendra;
  - type: text
    content: La destruction est résolue, elle fera déborder la justice.
  '23':
  - type: text
    content: ' '
  - type: note
    content: És 28:22.
  - type: text
    content: Et cette destruction qui a été résolue,
  - type: text
    content: Le Seigneur, l’Éternel des armées, l’accomplira dans tout le pays.
  '24':
  - type: text
    content: 'Cependant, ainsi parle le Seigneur, l’Éternel des armées:'
  - type: text
    content: O mon peuple, qui habites en Sion, ne crains pas l’Assyrien!
  - type: text
    content: Il te frappe de la verge,
  - type: text
    content: Et il lève son bâton sur toi, comme faisaient les Égyptiens.
  '25':
  - type: text
    content: Mais, encore un peu de temps,
  - type: text
    content: Et le châtiment cessera,
  - type: text
    content: Puis ma colère se tournera contre lui pour l’anéantir.
  '26':
  - type: text
    content: L’Éternel des armées agitera le fouet contre lui,
  - type: text
    content: Comme il frappa Madian au rocher d’Oreb;
  - type: text
    content: 'Et, '
  - type: note
    content: Ex 14:27.
  - type: text
    content: de même qu’il leva son bâton sur la mer,
  - type: text
    content: Il le lèvera encore, comme en Égypte.
  '27':
  - type: text
    content: En ce jour, son fardeau sera ôté de dessus ton épaule,
  - type: text
    content: Et son joug de dessus ton cou;
  - type: text
    content: Et la graisse fera éclater le joug.
  '28':
  - type: text
    content: Il marche sur Ajjath, traverse Migron,
  - type: text
    content: Laisse ses bagages à Micmasch.
  '29':
  - type: text
    content: Ils passent le défilé,
  - type: text
    content: Ils couchent à Guéba;
  - type: text
    content: Rama tremble, Guibea de Saül prend la fuite.
  '3':
  - type: text
    content: Que ferez-vous au jour du châtiment,
  - type: text
    content: Et de la ruine qui du lointain fondra sur vous?
  - type: text
    content: Vers qui fuirez-vous, pour avoir du secours,
  - type: text
    content: Et où laisserez-vous votre gloire?
  '30':
  - type: text
    content: Fais éclater ta voix, fille de Gallim!
  - type: text
    content: Prends garde, Laïs! Malheur à toi, Anathoth!
  '31':
  - type: text
    content: Madména se disperse,
  - type: text
    content: Les habitants de Guébim sont en fuite.
  '32':
  - type: text
    content: Encore un jour de halte à Nob,
  - type: text
    content: Et il menace de sa main la montagne de la fille de Sion,
  - type: text
    content: La colline de Jérusalem.
  '33':
  - type: text
    content: Voici, le Seigneur, l’Éternel des armées,
  - type: text
    content: 'Brise les rameaux avec violence:'
  - type: text
    content: Les plus grands sont coupés,
  - type: text
    content: Les plus élevés sont abattus.
  '34':
  - type: text
    content: Il renverse avec le fer les taillis de la forêt,
  - type: text
    content: Et le Liban tombe sous le Puissant.
  '4':
  - type: text
    content: Les uns seront courbés parmi les captifs,
  - type: text
    content: Les autres tomberont parmi les morts.
  - type: text
    content: Malgré tout cela, sa colère ne s’apaise point,
  - type: text
    content: Et sa main est encore étendue.
  - type: heading
    content: Humiliation de l’Assyrie
  - type: heading
    content: 'V. 5-34: cf. (2 R 18:9, etc.; 19.) És 14:24-27. Na 1 à 3.'
  '5':
  - type: text
    content: ' '
  - type: note
    content: És 36:1. Jé 25:9. Éz 21:9.
  - type: text
    content: Malheur à l’Assyrien, verge de ma colère!
  - type: text
    content: La verge dans sa main, c’est l’instrument de ma fureur.
  '6':
  - type: text
    content: Je l’ai lâché contre une nation impie,
  - type: text
    content: Je l’ai fait marcher contre le peuple de mon courroux,
  - type: text
    content: Pour qu’il se livre au pillage et fasse du butin,
  - type: text
    content: 'Pour qu’il le foule aux pieds '
  - type: note
    content: És 5:25.
  - type: text
    content: comme la boue des rues.
  '7':
  - type: text
    content: Mais il n’en juge pas ainsi,
  - type: text
    content: Et ce n’est pas là la pensée de son cœur;
  - type: text
    content: Il ne songe qu’à détruire,
  - type: text
    content: Qu’à exterminer les nations en foule.
  '8':
  - type: text
    content: 'Car il dit:'
  - type: text
    content: Mes princes ne sont-ils pas autant de rois?
  '9':
  - type: text
    content: N’en a-t-il pas été de Calno comme de Carkemisch?
  - type: text
    content: N’en a-t-il pas été de Hamath comme d’Arpad?
  - type: text
    content: N’en a-t-il pas été de Samarie comme de Damas?
