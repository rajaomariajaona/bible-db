document_id: ISA.10,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Malheur aux magistrats injustes!
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-4: cf. Am 5:11, 12. Mi 3:1-4. Jé 5:9, 29. Ja 2:13.'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Malheur à ceux qui prononcent des ordonnances iniques,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et à ceux qui transcrivent des arrêts injustes,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De même que ma main a atteint les royaumes des idoles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Où il y avait plus d’images qu’à Jérusalem et à Samarie,
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce que j’ai fait à Samarie et à ses idoles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne le ferai-je pas à Jérusalem et à ses images?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais, quand le Seigneur aura accompli toute son œuvre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur la montagne de Sion et à Jérusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je punirai le roi d’Assyrie pour le fruit de son cœur orgueilleux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et pour l’arrogance de ses regards hautains.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car il dit: C’est par la force de ma main que j’ai agi,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est par ma sagesse, car je suis intelligent;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai reculé les limites des peuples, et pillé leurs trésors,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et, comme un héros, j’ai renversé ceux qui siégeaient sur des trônes;
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai mis la main sur les richesses des peuples, comme sur un nid,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et, comme on ramasse des œufs abandonnés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'J’ai ramassé toute la terre:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nul n’a remué l’aile,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ni ouvert le bec, ni poussé un cri.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La hache se glorifie-t-elle envers celui qui s’en sert?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ou la scie est-elle arrogante envers celui qui la manie?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme si la verge faisait mouvoir celui qui la lève,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme si le bâton soulevait celui qui n’est pas du bois!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est pourquoi le Seigneur, le Seigneur des armées, enverra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le dépérissement parmi ses robustes guerriers;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et, sous sa magnificence, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 24:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: éclatera un embrasement,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme l’embrasement d’un feu.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La lumière d’Israël deviendra un feu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et son Saint une flamme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui consumera et dévorera ses épines et ses ronces,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En un seul jour;
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui consumera, corps et âme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La magnificence de sa forêt et de ses campagnes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il en sera comme d’un malade, qui tombe en défaillance.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le reste des arbres de sa forêt pourra être compté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et un enfant en écrirait le nombre.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour refuser justice aux pauvres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ravir leur droit aux malheureux de mon peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour faire des veuves leur proie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et des orphelins leur butin!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En ce jour-là,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le reste d’Israël et les réchappés de la maison de Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cesseront de s’appuyer sur celui qui les frappait;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils s’appuieront avec confiance sur l’Éternel, le Saint d’Israël.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le reste reviendra, le reste de Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au Dieu puissant.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 9:27
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '28'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Quand ton peuple, ô Israël, serait comme le sable de la mer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un reste seulement reviendra;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La destruction est résolue, elle fera déborder la justice.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 28:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Et cette destruction qui a été résolue,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le Seigneur, l’Éternel des armées, l’accomplira dans tout le pays.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Cependant, ainsi parle le Seigneur, l’Éternel des armées:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O mon peuple, qui habites en Sion, ne crains pas l’Assyrien!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il te frappe de la verge,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il lève son bâton sur toi, comme faisaient les Égyptiens.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais, encore un peu de temps,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le châtiment cessera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Puis ma colère se tournera contre lui pour l’anéantir.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel des armées agitera le fouet contre lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme il frappa Madian au rocher d’Oreb;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 14:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: de même qu’il leva son bâton sur la mer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il le lèvera encore, comme en Égypte.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En ce jour, son fardeau sera ôté de dessus ton épaule,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et son joug de dessus ton cou;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la graisse fera éclater le joug.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il marche sur Ajjath, traverse Migron,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Laisse ses bagages à Micmasch.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils passent le défilé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils couchent à Guéba;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rama tremble, Guibea de Saül prend la fuite.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que ferez-vous au jour du châtiment,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et de la ruine qui du lointain fondra sur vous?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vers qui fuirez-vous, pour avoir du secours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et où laisserez-vous votre gloire?
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fais éclater ta voix, fille de Gallim!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prends garde, Laïs! Malheur à toi, Anathoth!
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Madména se disperse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les habitants de Guébim sont en fuite.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Encore un jour de halte à Nob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il menace de sa main la montagne de la fille de Sion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La colline de Jérusalem.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, le Seigneur, l’Éternel des armées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Brise les rameaux avec violence:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les plus grands sont coupés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les plus élevés sont abattus.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il renverse avec le fer les taillis de la forêt,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le Liban tombe sous le Puissant.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les uns seront courbés parmi les captifs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les autres tomberont parmi les morts.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Malgré tout cela, sa colère ne s’apaise point,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et sa main est encore étendue.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Humiliation de l’Assyrie
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 5-34: cf. (2 R 18:9, etc.; 19.) És 14:24-27. Na 1 à 3.'
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 36:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 25:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 21:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Malheur à l’Assyrien, verge de ma colère!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La verge dans sa main, c’est l’instrument de ma fureur.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je l’ai lâché contre une nation impie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je l’ai fait marcher contre le peuple de mon courroux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour qu’il se livre au pillage et fasse du butin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Pour qu’il le foule aux pieds '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 5:25
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: comme la boue des rues.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais il n’en juge pas ainsi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ce n’est pas là la pensée de son cœur;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne songe qu’à détruire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’à exterminer les nations en foule.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car il dit:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes princes ne sont-ils pas autant de rois?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N’en a-t-il pas été de Calno comme de Carkemisch?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N’en a-t-il pas été de Hamath comme d’Arpad?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N’en a-t-il pas été de Samarie comme de Damas?
