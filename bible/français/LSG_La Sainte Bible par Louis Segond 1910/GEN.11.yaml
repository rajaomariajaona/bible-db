document_id: GEN.11
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La tour de Babel
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-9: cf. (Ps 33:10, 11. Lu 1:51.) (De 32:8. Ac 17:26.) Ac 2:1-11.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Toute la terre avait une seule langue et les mêmes mots. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Comme ils étaient partis de l’orient, ils trouvèrent une plaine au pays de '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 10:10
      metadata:
        usfm: GEN.10.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Schinear, et ils y habitèrent. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ils se dirent l’un à l’autre: Allons! Faisons des briques, et cuisons-les au feu. Et la brique leur servit de pierre, et le bitume leur servit de ciment. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ils dirent encore: Allons! Bâtissons-nous une ville et une tour dont le sommet touche au ciel, et faisons-nous un nom, afin que nous ne soyons pas dispersés sur la face de toute la terre. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'L’Éternel descendit pour voir la ville et la tour que bâtissaient les fils des hommes. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Et l’Éternel dit: Voici, ils forment un seul peuple et ont tous une même langue, et c’est là ce qu’ils ont entrepris; maintenant rien ne les empêcherait de faire tout ce qu’ils auraient projeté. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Allons! Descendons, et là confondons leur langage, afin qu’ils n’entendent plus la langue, les uns des autres. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 32:8
      metadata:
        usfm: DEU.32.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 17:26
      metadata:
        usfm: ACT.17.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'l’Éternel les dispersa loin de là sur la face de toute la terre; et ils cessèrent de bâtir la ville. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: C’est pourquoi on l’appela du nom de Babel, car c’est là que l’Éternel confondit le langage de toute la terre, et c’est de là que l’Éternel les dispersa sur la face de toute la terre.
- type: usfm
  marker: ms1
  children:
  - type: text
    text: LES ANCÊTRES DU PEUPLE D’ISRAËL
  marker-yv: yv-h
- type: usfm
  marker: ms2
  children:
  - type: text
    text: DEPUIS ABRAHAM JUSQU’À JOSEPH
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: Ch. 11:10 à 50. (És 51:1, 2. Hé 11:13-16, 39, 40.)
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Postérité de Sem
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 10-32: cf. 1 Ch 1:17-27. Lu 3:34-36.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ge 10:22, etc. 1 Ch 1:17, etc.
    marker-yv: yv-n
  - type: text
    text: 'Voici la postérité de Sem. Sem, âgé de cent ans, engendra Arpacschad, deux ans après le déluge. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Sem vécut, après la naissance d’Arpacschad, cinq cents ans; et il engendra des fils et des filles. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Arpacschad, âgé de trente-cinq ans, engendra Schélach. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Arpacschad vécut, après la naissance de Schélach, quatre cent trois ans; et il engendra des fils et des filles. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Schélach, âgé de trente ans, engendra Héber. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Schélach vécut, après la naissance d’Héber, quatre cent trois ans; et il engendra des fils et des filles. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Héber, âgé de trente-quatre ans, engendra Péleg. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Héber vécut, après la naissance de Péleg, quatre cent trente ans; et il engendra des fils et des filles. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 1:25
      metadata:
        usfm: 1CH.1.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Péleg, âgé de trente ans, engendra Rehu. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Péleg vécut, après la naissance de Rehu, deux cent neuf ans; et il engendra des fils et des filles. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Rehu, âgé de trente-deux ans, engendra Serug. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Rehu vécut, après la naissance de Serug, deux cent sept ans; et il engendra des fils et des filles. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Serug, âgé de trente ans, engendra Nachor. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Serug vécut, après la naissance de Nachor, deux cents ans; et il engendra des fils et des filles. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Nachor, âgé de vingt-neuf ans, engendra Térach. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Nachor vécut, après la naissance de Térach, cent dix-neuf ans; et il engendra des fils et des filles. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Térach, âgé de soixante-dix ans, engendra Abram, Nachor et Haran. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 24:2
      metadata:
        usfm: JOS.24.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 1:26
      metadata:
        usfm: 1CH.1.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Voici la postérité de Térach. Térach engendra Abram, Nachor et Haran. Haran engendra Lot. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Et Haran mourut en présence de Térach, son père, au pays de sa naissance, à Ur en Chaldée. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Abram et Nachor prirent des femmes: le nom de la femme d’Abram était Saraï, et le nom de la femme de Nachor était '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 22:20
      metadata:
        usfm: GEN.22.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Milca, fille d’Haran, père de Milca et père de Jisca. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 16:1
      metadata:
        usfm: GEN.16.1
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '2'
      metadata:
        usfm: GEN.16.2
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 18:11
      metadata:
        usfm: GEN.18.11
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '12'
      metadata:
        usfm: GEN.18.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Saraï était stérile: elle n’avait point d’enfants. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 24:2
      metadata:
        usfm: JOS.24.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Né 9:7
      metadata:
        usfm: NEH.9.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 7:4
      metadata:
        usfm: ACT.7.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Térach prit Abram, son fils, et Lot, fils d’Haran, fils de son fils, et Saraï, sa belle-fille, femme d’Abram, son fils. Ils sortirent ensemble d’Ur en Chaldée, pour aller au pays de Canaan. Ils vinrent jusqu’à Charan, et ils y habitèrent. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Les jours de Térach furent de deux cent cinq ans; et Térach mourut à Charan.
