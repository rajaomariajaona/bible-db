document_id: GEN.11,93
type_code: fra
verses:
  '1':
  - type: heading
    content: La tour de Babel
  - type: heading
    content: 'V. 1-9: cf. (Ps 33:10, 11. Lu 1:51.) (De 32:8. Ac 17:26.) Ac 2:1-11.'
  - type: text
    content: 'Toute la terre avait une seule langue et les mêmes mots. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: Ge 10:22, etc. 1 Ch 1:17, etc.
  - type: text
    content: 'Voici la postérité de Sem. Sem, âgé de cent ans, engendra Arpacschad, deux ans après le déluge. '
  '11':
  - type: text
    content: 'Sem vécut, après la naissance d’Arpacschad, cinq cents ans; et il engendra des fils et des filles. '
  '12':
  - type: text
    content: 'Arpacschad, âgé de trente-cinq ans, engendra Schélach. '
  '13':
  - type: text
    content: 'Arpacschad vécut, après la naissance de Schélach, quatre cent trois ans; et il engendra des fils et des filles. '
  '14':
  - type: text
    content: 'Schélach, âgé de trente ans, engendra Héber. '
  '15':
  - type: text
    content: 'Schélach vécut, après la naissance d’Héber, quatre cent trois ans; et il engendra des fils et des filles. '
  '16':
  - type: text
    content: 'Héber, âgé de trente-quatre ans, engendra Péleg. '
  '17':
  - type: text
    content: 'Héber vécut, après la naissance de Péleg, quatre cent trente ans; et il engendra des fils et des filles. '
  '18':
  - type: note
    content: 1 Ch 1:25.
  - type: text
    content: 'Péleg, âgé de trente ans, engendra Rehu. '
  '19':
  - type: text
    content: 'Péleg vécut, après la naissance de Rehu, deux cent neuf ans; et il engendra des fils et des filles. '
  '2':
  - type: text
    content: 'Comme ils étaient partis de l’orient, ils trouvèrent une plaine au pays de '
  - type: note
    content: Ge 10:10.
  - type: text
    content: 'Schinear, et ils y habitèrent. '
  '20':
  - type: text
    content: 'Rehu, âgé de trente-deux ans, engendra Serug. '
  '21':
  - type: text
    content: 'Rehu vécut, après la naissance de Serug, deux cent sept ans; et il engendra des fils et des filles. '
  '22':
  - type: text
    content: 'Serug, âgé de trente ans, engendra Nachor. '
  '23':
  - type: text
    content: 'Serug vécut, après la naissance de Nachor, deux cents ans; et il engendra des fils et des filles. '
  '24':
  - type: text
    content: 'Nachor, âgé de vingt-neuf ans, engendra Térach. '
  '25':
  - type: text
    content: 'Nachor vécut, après la naissance de Térach, cent dix-neuf ans; et il engendra des fils et des filles. '
  '26':
  - type: text
    content: 'Térach, âgé de soixante-dix ans, engendra Abram, Nachor et Haran. '
  '27':
  - type: note
    content: Jos 24:2. 1 Ch 1:26.
  - type: text
    content: 'Voici la postérité de Térach. Térach engendra Abram, Nachor et Haran. Haran engendra Lot. '
  '28':
  - type: text
    content: 'Et Haran mourut en présence de Térach, son père, au pays de sa naissance, à Ur en Chaldée. '
  '29':
  - type: text
    content: 'Abram et Nachor prirent des femmes: le nom de la femme d’Abram était Saraï, et le nom de la femme de Nachor était '
  - type: note
    content: Ge 22:20.
  - type: text
    content: 'Milca, fille d’Haran, père de Milca et père de Jisca. '
  '3':
  - type: text
    content: 'Ils se dirent l’un à l’autre: Allons! Faisons des briques, et cuisons-les au feu. Et la brique leur servit de pierre, et le bitume leur servit de ciment. '
  '30':
  - type: note
    content: Ge 16:1, 2; 18:11, 12.
  - type: text
    content: 'Saraï était stérile: elle n’avait point d’enfants. '
  '31':
  - type: note
    content: Jos 24:2. Né 9:7. Ac 7:4.
  - type: text
    content: 'Térach prit Abram, son fils, et Lot, fils d’Haran, fils de son fils, et Saraï, sa belle-fille, femme d’Abram, son fils. Ils sortirent ensemble d’Ur en Chaldée, pour aller au pays de Canaan. Ils vinrent jusqu’à Charan, et ils y habitèrent. '
  '32':
  - type: text
    content: Les jours de Térach furent de deux cent cinq ans; et Térach mourut à Charan.
  '4':
  - type: text
    content: 'Ils dirent encore: Allons! Bâtissons-nous une ville et une tour dont le sommet touche au ciel, et faisons-nous un nom, afin que nous ne soyons pas dispersés sur la face de toute la terre. '
  '5':
  - type: text
    content: 'L’Éternel descendit pour voir la ville et la tour que bâtissaient les fils des hommes. '
  '6':
  - type: text
    content: 'Et l’Éternel dit: Voici, ils forment un seul peuple et ont tous une même langue, et c’est là ce qu’ils ont entrepris; maintenant rien ne les empêcherait de faire tout ce qu’ils auraient projeté. '
  '7':
  - type: text
    content: 'Allons! Descendons, et là confondons leur langage, afin qu’ils n’entendent plus la langue, les uns des autres. '
  '8':
  - type: text
    content: 'Et '
  - type: note
    content: De 32:8. Ac 17:26.
  - type: text
    content: 'l’Éternel les dispersa loin de là sur la face de toute la terre; et ils cessèrent de bâtir la ville. '
  '9':
  - type: text
    content: C’est pourquoi on l’appela du nom de Babel, car c’est là que l’Éternel confondit le langage de toute la terre, et c’est de là que l’Éternel les dispersa sur la face de toute la terre.
  - type: heading
    content: LES ANCÊTRES DU PEUPLE D’ISRAËL
  - type: heading
    content: DEPUIS ABRAHAM JUSQU’À JOSEPH
  - type: heading
    content: Ch. 11:10 à 50. (És 51:1, 2. Hé 11:13-16, 39, 40.)
  - type: heading
    content: Postérité de Sem
  - type: heading
    content: 'V. 10-32: cf. 1 Ch 1:17-27. Lu 3:34-36.'
