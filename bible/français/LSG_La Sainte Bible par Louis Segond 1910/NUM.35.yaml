document_id: NUM.35,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Villes lévitiques
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-8: cf. Jos 21. De 12, 19.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'L’Éternel parla à Moïse, dans les plaines de Moab, près du Jourdain, vis-à-vis de Jéricho. Il dit: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Parle aux enfants d’Israël, et dis-leur: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 19:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 20:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Lorsque vous aurez passé le Jourdain et que vous serez entrés dans le pays de Canaan, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'vous vous établirez des villes qui soient pour vous des villes de refuge, où pourra s’enfuir le meurtrier qui aura tué quelqu’un involontairement. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ces villes vous serviront de refuge contre le vengeur du sang, afin que le meurtrier ne soit point mis à mort avant d’avoir comparu devant l’assemblée pour être jugé. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Des villes que vous donnerez, six seront pour vous des villes de refuge. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 4:41
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 20:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Vous donnerez trois villes au-delà du Jourdain, et vous donnerez trois villes dans le pays de Canaan: ce seront des villes de refuge. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ces six villes serviront de refuge aux enfants d’Israël, à l’étranger et à celui qui demeure au milieu de vous: là pourra s’enfuir tout homme qui aura tué quelqu’un involontairement. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Si un homme frappe son prochain avec un instrument de fer, et que la mort en soit la suite, c’est un meurtrier: le meurtrier sera puni de mort. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'S’il le frappe, tenant à la main une pierre qui puisse causer la mort, et que la mort en soit la suite, c’est un meurtrier: le meurtrier sera puni de mort. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'S’il le frappe, tenant à la main un instrument de bois qui puisse causer la mort, et que la mort en soit la suite, c’est un meurtrier: le meurtrier sera puni de mort. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Le vengeur du sang fera mourir le meurtrier; quand il le rencontrera, il le tuera. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 21:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Ordonne aux enfants d’Israël d’accorder aux Lévites, sur l’héritage qu’ils posséderont, des villes où ils puissent habiter. Vous donnerez aussi aux Lévites une banlieue autour de ces villes. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 19:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Si un homme pousse son prochain par un mouvement de haine, ou s’il jette quelque chose sur lui avec préméditation, et que la mort en soit la suite, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'ou s’il le frappe de sa main par inimitié, et que la mort en soit la suite, celui qui a frappé sera puni de mort, c’est un meurtrier: le vengeur du sang tuera le meurtrier, quand il le rencontrera. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Mais si un homme pousse son prochain subitement et non par inimitié, ou s’il jette quelque chose sur lui sans préméditation, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'ou s’il fait tomber sur lui par mégarde une pierre qui puisse causer la mort, et que la mort en soit la suite, sans qu’il ait de la haine contre lui et qu’il lui cherche du mal, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'voici les lois d’après lesquelles l’assemblée jugera entre celui qui a frappé et le vengeur du sang. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'L’assemblée délivrera le meurtrier de la main du vengeur du sang, et le fera retourner dans la ville de refuge où il s’était enfui. Il y demeurera jusqu’à la mort du souverain sacrificateur qu’on a oint de l’huile sainte. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Si le meurtrier sort du territoire de la ville de refuge où il s’est enfui, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'et si le vengeur du sang le rencontre hors du territoire de la ville de refuge et qu’il tue le meurtrier, il ne sera point coupable de meurtre. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Car le meurtrier doit demeurer dans sa ville de refuge jusqu’à la mort du souverain sacrificateur; et après la mort du souverain sacrificateur, il pourra retourner dans sa propriété. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Voici des ordonnances de droit pour vous et pour vos descendants, dans tous les lieux où vous habiterez.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 30-34: cf. (Ge 9:5, 6. Ex 21:12-14.) 2 S 21:1-14.'
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ils auront les villes pour y habiter; et les banlieues seront pour leur bétail, pour leurs biens et pour tous leurs animaux. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Si un homme tue quelqu’un, on ôtera la vie au meurtrier, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 17:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 19:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'sur la déposition de témoins. Un seul témoin ne suffira pas pour faire condamner une personne à mort. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Vous n’accepterez point de rançon pour la vie d’un meurtrier qui mérite la mort, car il sera puni de mort. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Vous n’accepterez point de rançon, qui lui permette de s’enfuir dans sa ville de refuge, et de retourner habiter dans le pays après la mort du sacrificateur. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Vous ne souillerez point le pays où vous serez, car le sang souille le pays; et il ne sera fait pour le pays aucune expiation du sang qui y sera répandu que par le sang de celui qui l’aura répandu. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Vous ne souillerez point le pays où vous allez demeurer, et au milieu duquel j’habiterai; car je suis l’Éternel, qui habite au milieu des enfants d’Israël.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Les banlieues des villes que vous donnerez aux Lévites auront, à partir du mur de la ville et au-dehors, mille coudées tout autour. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Vous mesurerez, en dehors de la ville, deux mille coudées pour le côté oriental, deux mille coudées pour le côté méridional, deux mille coudées pour le côté occidental, et deux mille coudées pour le côté septentrional. La ville sera au milieu. Telles seront les banlieues de leurs villes. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 21:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Parmi les villes que vous donnerez aux Lévites, il y aura six villes de refuge où pourra s’enfuir le meurtrier, et quarante-deux autres villes. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Total des villes que vous donnerez aux Lévites: quarante-huit villes, avec leurs banlieues. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Les villes que vous donnerez sur les propriétés des enfants d’Israël seront livrées en plus grand nombre par ceux qui en ont le plus, et en plus petit nombre par ceux qui en ont moins; chacun donnera de ses villes aux Lévites à proportion de l’héritage qu’il possédera.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Villes de refuge. Le vengeur du sang
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 9-29: cf. (De 4:41-43; 19:1-13.) Jos 20. Ex 21:12-14. (Ps 11:1.)'
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'L’Éternel parla à Moïse, et dit: '
