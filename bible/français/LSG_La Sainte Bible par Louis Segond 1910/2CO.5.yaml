document_id: 2CO.5,93
type_code: fra
verses:
  '1':
  - type: text
    content: 'Nous savons, en effet, que, si cette '
  - type: note
    content: 2 Co 4:7.
  - type: text
    content: 'tente où nous habitons sur la terre est détruite, nous avons dans le ciel un édifice qui est l’ouvrage de Dieu, une demeure éternelle qui n’a pas été faite de main d’homme. '
  '10':
  - type: note
    content: Mt 25:32. Ro 14:10.
  - type: text
    content: 'Car il nous faut tous comparaître devant le tribunal de Christ, '
  - type: note
    content: Ps 62:13. Jé 17:10; 32:19. Mt 16:27. Ro 2:6; 14:12. 1 Co 3:8. Ga 6:5. Ap 2:23; 22:12.
  - type: text
    content: afin que chacun reçoive selon le bien ou le mal qu’il aura fait, étant dans son corps.
  - type: heading
    content: 'V. 11-21: cf. Ac 17:30, 31. (Ro 5:8; 6:2-13. 1 Co 6:19, 20. Ép 4:20-24.) Lu 24:47. 2 Co 6:1, 2.'
  '11':
  - type: text
    content: 'Connaissant donc la crainte du Seigneur, nous cherchons à convaincre les hommes; Dieu nous connaît, et j’espère que dans vos consciences vous nous connaissez aussi. '
  '12':
  - type: note
    content: 2 Co 3:1; 10:8.
  - type: text
    content: 'Nous ne nous recommandons pas de nouveau nous-mêmes auprès de vous; mais nous vous donnons occasion de vous glorifier à notre sujet, afin que vous puissiez répondre à ceux qui tirent gloire de ce qui est dans les apparences et non dans le cœur. '
  '13':
  - type: text
    content: 'En effet, si je suis hors de sens, c’est pour Dieu; si je suis de bon sens, c’est pour vous. '
  '14':
  - type: text
    content: 'Car l’amour de Christ nous presse, parce que nous estimons que, si un seul est mort pour tous, tous donc sont morts; '
  '15':
  - type: text
    content: 'et qu’il est mort pour tous, '
  - type: note
    content: Ro 14:7. Ga 2:20. 1 Th 5:10. 1 Pi 4:2.
  - type: text
    content: 'afin que ceux qui vivent ne vivent plus pour eux-mêmes, mais pour celui qui est mort et ressuscité pour eux. '
  '16':
  - type: note
    content: Mt 12:50. Jn 15:14. Ga 5:6; 6:15. Col 3:11.
  - type: text
    content: 'Ainsi, dès maintenant, nous ne connaissons personne selon la chair; et si nous avons connu Christ selon la chair, maintenant nous ne le connaissons plus de cette manière. '
  '17':
  - type: text
    content: 'Si quelqu’un est en Christ, il est une nouvelle créature. '
  - type: note
    content: És 43:18. Ap 21:5.
  - type: text
    content: 'Les choses anciennes sont passées; voici, toutes choses sont devenues nouvelles. '
  '18':
  - type: text
    content: 'Et tout cela vient de Dieu, '
  - type: note
    content: Col 1:20. 1 Jn 2:2; 4:10.
  - type: text
    content: 'qui nous a réconciliés avec lui par Christ, et qui nous a donné le ministère de la réconciliation. '
  '19':
  - type: note
    content: Ro 3:24, 25. Col 1:20.
  - type: text
    content: 'Car Dieu était en Christ, réconciliant le monde avec lui-même, en n’imputant point aux hommes leurs offenses, et il a mis en nous la parole de la réconciliation. '
  '2':
  - type: note
    content: Ro 8:23.
  - type: text
    content: 'Aussi nous gémissons dans cette tente, désirant revêtir notre domicile céleste, '
  '20':
  - type: text
    content: 'Nous faisons donc les fonctions '
  - type: note
    content: 2 Co 3:6.
  - type: text
    content: 'd’ambassadeurs pour Christ, comme si Dieu exhortait par nous; nous vous en supplions au nom de Christ: Soyez réconciliés avec Dieu! '
  '21':
  - type: note
    content: És 53:9. 1 Pi 2:22. 1 Jn 3:5.
  - type: text
    content: 'Celui qui n’a point connu le péché, '
  - type: note
    content: És 53:12. Ro 8:3. Ga 3:13.
  - type: text
    content: il l’a fait devenir péché pour nous, afin que nous devenions en lui justice de Dieu.
  '3':
  - type: note
    content: Ap 3:18; 16:15.
  - type: text
    content: 'si du moins nous sommes trouvés vêtus et non pas nus. '
  '4':
  - type: text
    content: 'Car tandis que nous sommes dans cette tente, nous gémissons, accablés, parce que nous voulons, non pas nous dépouiller, mais nous revêtir, '
  - type: note
    content: Ro 8:11. 1 Co 15:53.
  - type: text
    content: 'afin que ce qui est mortel soit englouti par la vie. '
  '5':
  - type: text
    content: 'Et celui qui nous a formés pour cela, c’est Dieu, '
  - type: note
    content: Ro 8:16. 2 Co 1:22. Ép 1:13; 4:30.
  - type: text
    content: 'qui nous a donné les arrhes de l’Esprit. '
  '6':
  - type: text
    content: 'Nous sommes donc toujours pleins de confiance, et nous savons qu’en demeurant dans ce corps nous demeurons loin du Seigneur, '
  '7':
  - type: note
    content: 1 Co 13:12. 2 Co 3:18.
  - type: text
    content: 'car nous marchons par la foi et non par la vue, '
  '8':
  - type: text
    content: 'nous sommes pleins de confiance, et nous aimons mieux quitter ce corps et demeurer auprès du Seigneur. '
  '9':
  - type: text
    content: 'C’est pour cela aussi que nous nous efforçons de lui être agréables, soit que nous demeurions dans ce corps, soit que nous le quittions. '
