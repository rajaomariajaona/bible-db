document_id: 2CO.5,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous savons, en effet, que, si cette '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 4:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'tente où nous habitons sur la terre est détruite, nous avons dans le ciel un édifice qui est l’ouvrage de Dieu, une demeure éternelle qui n’a pas été faite de main d’homme. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 25:32
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 14:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Car il nous faut tous comparaître devant le tribunal de Christ, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 62:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 17:10
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 32:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 16:27
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 2:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 3:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 6:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 2:23
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 22:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: afin que chacun reçoive selon le bien ou le mal qu’il aura fait, étant dans son corps.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 11-21: cf. Ac 17:30, 31. (Ro 5:8; 6:2-13. 1 Co 6:19, 20. Ép 4:20-24.) Lu 24:47. 2 Co 6:1, 2.'
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Connaissant donc la crainte du Seigneur, nous cherchons à convaincre les hommes; Dieu nous connaît, et j’espère que dans vos consciences vous nous connaissez aussi. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 3:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Nous ne nous recommandons pas de nouveau nous-mêmes auprès de vous; mais nous vous donnons occasion de vous glorifier à notre sujet, afin que vous puissiez répondre à ceux qui tirent gloire de ce qui est dans les apparences et non dans le cœur. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, si je suis hors de sens, c’est pour Dieu; si je suis de bon sens, c’est pour vous. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car l’amour de Christ nous presse, parce que nous estimons que, si un seul est mort pour tous, tous donc sont morts; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et qu’il est mort pour tous, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 14:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 2:20
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Th 5:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 4:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'afin que ceux qui vivent ne vivent plus pour eux-mêmes, mais pour celui qui est mort et ressuscité pour eux. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 12:50
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 15:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 5:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:15
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 3:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Ainsi, dès maintenant, nous ne connaissons personne selon la chair; et si nous avons connu Christ selon la chair, maintenant nous ne le connaissons plus de cette manière. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si quelqu’un est en Christ, il est une nouvelle créature. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 43:18
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 21:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Les choses anciennes sont passées; voici, toutes choses sont devenues nouvelles. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et tout cela vient de Dieu, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 1:20
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Jn 2:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 4:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'qui nous a réconciliés avec lui par Christ, et qui nous a donné le ministère de la réconciliation. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 3:24
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '25'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 1:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Car Dieu était en Christ, réconciliant le monde avec lui-même, en n’imputant point aux hommes leurs offenses, et il a mis en nous la parole de la réconciliation. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 8:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Aussi nous gémissons dans cette tente, désirant revêtir notre domicile céleste, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous faisons donc les fonctions '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 3:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'd’ambassadeurs pour Christ, comme si Dieu exhortait par nous; nous vous en supplions au nom de Christ: Soyez réconciliés avec Dieu! '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 53:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 2:22
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Jn 3:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Celui qui n’a point connu le péché, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 53:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 8:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 3:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: il l’a fait devenir péché pour nous, afin que nous devenions en lui justice de Dieu.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 3:18
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'si du moins nous sommes trouvés vêtus et non pas nus. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car tandis que nous sommes dans cette tente, nous gémissons, accablés, parce que nous voulons, non pas nous dépouiller, mais nous revêtir, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 8:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 15:53
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'afin que ce qui est mortel soit englouti par la vie. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et celui qui nous a formés pour cela, c’est Dieu, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 8:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 1:22
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 1:13
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 4:30
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'qui nous a donné les arrhes de l’Esprit. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous sommes donc toujours pleins de confiance, et nous savons qu’en demeurant dans ce corps nous demeurons loin du Seigneur, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 13:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 3:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'car nous marchons par la foi et non par la vue, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'nous sommes pleins de confiance, et nous aimons mieux quitter ce corps et demeurer auprès du Seigneur. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est pour cela aussi que nous nous efforçons de lui être agréables, soit que nous demeurions dans ce corps, soit que nous le quittions. '
