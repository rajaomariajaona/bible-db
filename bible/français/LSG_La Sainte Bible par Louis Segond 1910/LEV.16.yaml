document_id: LEV.16
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Loi sur la fête annuelle des expiations
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-19: cf. (Hé 9:1-12; 10:1-22.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Éternel parla à Moïse, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 10:1
      metadata:
        usfm: LEV.10.1
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '2'
      metadata:
        usfm: LEV.10.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'après la mort des deux fils d’Aaron, qui moururent en se présentant devant l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'L’Éternel dit à Moïse: Parle à ton frère Aaron, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 30:10
      metadata:
        usfm: EXO.30.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 9:7
      metadata:
        usfm: HEB.9.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'afin qu’il n’entre pas en tout temps dans le sanctuaire, au dedans du voile, devant le propitiatoire qui est sur l’arche, de peur qu’il ne meure; car j’apparaîtrai dans la nuée sur le propitiatoire. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Voici de quelle manière Aaron entrera dans le sanctuaire. Il prendra un jeune taureau pour le sacrifice d’expiation et un bélier pour l’holocauste. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il se revêtira de la tunique sacrée de lin, et portera sur son corps des caleçons de lin; il se ceindra d’une ceinture de lin, et il se couvrira la tête d’une tiare de lin: ce sont les vêtements sacrés, dont il se revêtira après avoir lavé son corps dans l’eau. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il recevra de l’assemblée des enfants d’Israël deux boucs pour le sacrifice d’expiation et un bélier pour l’holocauste. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Aaron offrira son taureau expiatoire, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 7:27
      metadata:
        usfm: HEB.7.27
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '28'
      metadata:
        usfm: HEB.7.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'il fera l’expiation pour lui et pour sa maison. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il prendra les deux boucs, et il les placera devant l’Éternel, à l’entrée de la tente d’assignation. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Aaron jettera le sort sur les deux boucs, un sort pour l’Éternel et un sort pour Azazel. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Aaron fera approcher le bouc sur lequel est tombé le sort pour l’Éternel, et il l’offrira en sacrifice d’expiation. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Et le bouc sur lequel est tombé le sort pour Azazel sera placé vivant devant l’Éternel, afin qu’il serve à faire l’expiation et qu’il soit lâché dans le désert pour Azazel. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Aaron offrira son taureau expiatoire, et il fera l’expiation pour lui et pour sa maison. Il égorgera son taureau expiatoire. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il prendra un brasier plein de charbons ardents ôtés de dessus l’autel devant l’Éternel, et de deux poignées de parfum odoriférant en poudre; il portera ces choses au-delà du voile; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'il mettra le parfum sur le feu devant l’Éternel, afin que la nuée du parfum couvre le propitiatoire qui est sur le témoignage, et il ne mourra point. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 4:6
      metadata:
        usfm: LEV.4.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 9:25
      metadata:
        usfm: HEB.9.25
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 10:4
      metadata:
        usfm: HEB.10.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il prendra du sang du taureau, et il fera l’aspersion avec son doigt sur le devant du propitiatoire vers l’orient; il fera avec son doigt sept fois l’aspersion du sang devant le propitiatoire. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Il égorgera le bouc expiatoire pour le peuple, et il en portera le sang au-delà du voile. Il fera avec ce sang comme il a fait avec le sang du taureau, il en fera l’aspersion sur le propitiatoire et devant le propitiatoire. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'C’est ainsi qu’il fera l’expiation pour le sanctuaire à cause des impuretés des enfants d’Israël et de toutes les transgressions par lesquelles ils ont péché. Il fera de même pour la tente d’assignation, qui est avec eux au milieu de leurs impuretés. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il n’y aura personne dans la tente d’assignation lorsqu’il entrera pour faire l’expiation dans le sanctuaire, jusqu’à ce qu’il en sorte. Il fera l’expiation pour lui et pour sa maison, et pour toute l’assemblée d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'En sortant, il ira vers l’autel qui est devant l’Éternel, et il fera l’expiation pour l’autel; il prendra du sang du taureau et du bouc, et il en mettra sur les cornes de l’autel tout autour. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Il fera avec son doigt sept fois l’aspersion du sang sur l’autel; il le purifiera et le sanctifiera, à cause des impuretés des enfants d’Israël.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 20-28: cf. (És 53:6, 11. 2 Co 5:21. Jn 1:29. Ps 103:12.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Lorsqu’il aura achevé de faire l’expiation pour le sanctuaire, pour la tente d’assignation et pour l’autel, il fera approcher le bouc vivant. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Aaron posera ses deux mains sur la tête du bouc vivant, et il confessera sur lui toutes les iniquités des enfants d’Israël et toutes les transgressions par lesquelles ils ont péché; il les mettra sur la tête du bouc, puis il le chassera dans le désert, à l’aide d’un homme qui aura cette charge. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Le bouc emportera sur lui toutes leurs iniquités dans une terre désolée; il sera chassé dans le désert. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Aaron entrera dans la tente d’assignation; il quittera les vêtements de lin qu’il avait mis en entrant dans le sanctuaire, et il les déposera là. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Il lavera son corps avec de l’eau dans un lieu saint, et reprendra ses vêtements. Puis il sortira, offrira son holocauste et l’holocauste du peuple, et fera l’expiation pour lui et pour le peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Il brûlera sur l’autel la graisse de la victime expiatoire. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Celui qui aura chassé le bouc pour Azazel lavera ses vêtements, et lavera son corps dans l’eau; après cela, il rentrera dans le camp. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Lé 6:30. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 13:11
      metadata:
        usfm: HEB.13.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'On emportera hors du camp le taureau expiatoire et le bouc expiatoire dont on a porté le sang dans le sanctuaire pour faire l’expiation, et l’on brûlera au feu leurs peaux, leur chair et leurs excréments. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Celui qui les brûlera lavera ses vêtements, et lavera son corps dans l’eau; après cela, il rentrera dans le camp.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 29-34: cf. Lé 23:26-32.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'C’est ici pour vous une loi perpétuelle: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 23:27
      metadata:
        usfm: LEV.23.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'au septième mois, le dixième jour du mois, vous humilierez vos âmes, vous ne ferez aucun ouvrage, ni l’indigène, ni l’étranger qui séjourne au milieu de vous. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Car en ce jour on fera l’expiation pour vous, afin de vous purifier: vous serez purifiés de tous vos péchés devant l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ce sera pour vous un sabbat, un jour de repos, et vous humilierez vos âmes. C’est une loi perpétuelle. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'L’expiation sera faite par le sacrificateur qui a reçu l’onction et qui a été consacré pour succéder à son père dans le sacerdoce; il se revêtira des vêtements de lin, des vêtements sacrés. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Il fera l’expiation pour le sanctuaire de sainteté, il fera l’expiation pour la tente d’assignation et pour l’autel, et il fera l’expiation pour les sacrificateurs et pour tout le peuple de l’assemblée. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ce sera pour vous une loi perpétuelle: il se fera '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 30:10
      metadata:
        usfm: EXO.30.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 9:7
      metadata:
        usfm: HEB.9.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: une fois chaque année l’expiation pour les enfants d’Israël, à cause de leurs péchés. On fit ce que l’Éternel avait ordonné à Moïse.
