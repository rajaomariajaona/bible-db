document_id: LEV.16,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Loi sur la fête annuelle des expiations
  - type: heading
    content: 'V. 1-19: cf. (Hé 9:1-12; 10:1-22.)'
  - type: text
    content: 'L’Éternel parla à Moïse, '
  - type: note
    content: Lé 10:1, 2.
  - type: text
    content: 'après la mort des deux fils d’Aaron, qui moururent en se présentant devant l’Éternel. '
  '10':
  - type: text
    content: 'Et le bouc sur lequel est tombé le sort pour Azazel sera placé vivant devant l’Éternel, afin qu’il serve à faire l’expiation et qu’il soit lâché dans le désert pour Azazel. '
  '11':
  - type: text
    content: 'Aaron offrira son taureau expiatoire, et il fera l’expiation pour lui et pour sa maison. Il égorgera son taureau expiatoire. '
  '12':
  - type: text
    content: 'Il prendra un brasier plein de charbons ardents ôtés de dessus l’autel devant l’Éternel, et de deux poignées de parfum odoriférant en poudre; il portera ces choses au-delà du voile; '
  '13':
  - type: text
    content: 'il mettra le parfum sur le feu devant l’Éternel, afin que la nuée du parfum couvre le propitiatoire qui est sur le témoignage, et il ne mourra point. '
  '14':
  - type: note
    content: Lé 4:6. Hé 9:25; 10:4.
  - type: text
    content: 'Il prendra du sang du taureau, et il fera l’aspersion avec son doigt sur le devant du propitiatoire vers l’orient; il fera avec son doigt sept fois l’aspersion du sang devant le propitiatoire. '
  '15':
  - type: text
    content: 'Il égorgera le bouc expiatoire pour le peuple, et il en portera le sang au-delà du voile. Il fera avec ce sang comme il a fait avec le sang du taureau, il en fera l’aspersion sur le propitiatoire et devant le propitiatoire. '
  '16':
  - type: text
    content: 'C’est ainsi qu’il fera l’expiation pour le sanctuaire à cause des impuretés des enfants d’Israël et de toutes les transgressions par lesquelles ils ont péché. Il fera de même pour la tente d’assignation, qui est avec eux au milieu de leurs impuretés. '
  '17':
  - type: text
    content: 'Il n’y aura personne dans la tente d’assignation lorsqu’il entrera pour faire l’expiation dans le sanctuaire, jusqu’à ce qu’il en sorte. Il fera l’expiation pour lui et pour sa maison, et pour toute l’assemblée d’Israël. '
  '18':
  - type: text
    content: 'En sortant, il ira vers l’autel qui est devant l’Éternel, et il fera l’expiation pour l’autel; il prendra du sang du taureau et du bouc, et il en mettra sur les cornes de l’autel tout autour. '
  '19':
  - type: text
    content: Il fera avec son doigt sept fois l’aspersion du sang sur l’autel; il le purifiera et le sanctifiera, à cause des impuretés des enfants d’Israël.
  - type: heading
    content: 'V. 20-28: cf. (És 53:6, 11. 2 Co 5:21. Jn 1:29. Ps 103:12.)'
  '2':
  - type: text
    content: 'L’Éternel dit à Moïse: Parle à ton frère Aaron, '
  - type: note
    content: Ex 30:10. Hé 9:7.
  - type: text
    content: 'afin qu’il n’entre pas en tout temps dans le sanctuaire, au dedans du voile, devant le propitiatoire qui est sur l’arche, de peur qu’il ne meure; car j’apparaîtrai dans la nuée sur le propitiatoire. '
  '20':
  - type: text
    content: 'Lorsqu’il aura achevé de faire l’expiation pour le sanctuaire, pour la tente d’assignation et pour l’autel, il fera approcher le bouc vivant. '
  '21':
  - type: text
    content: 'Aaron posera ses deux mains sur la tête du bouc vivant, et il confessera sur lui toutes les iniquités des enfants d’Israël et toutes les transgressions par lesquelles ils ont péché; il les mettra sur la tête du bouc, puis il le chassera dans le désert, à l’aide d’un homme qui aura cette charge. '
  '22':
  - type: text
    content: 'Le bouc emportera sur lui toutes leurs iniquités dans une terre désolée; il sera chassé dans le désert. '
  '23':
  - type: text
    content: 'Aaron entrera dans la tente d’assignation; il quittera les vêtements de lin qu’il avait mis en entrant dans le sanctuaire, et il les déposera là. '
  '24':
  - type: text
    content: 'Il lavera son corps avec de l’eau dans un lieu saint, et reprendra ses vêtements. Puis il sortira, offrira son holocauste et l’holocauste du peuple, et fera l’expiation pour lui et pour le peuple. '
  '25':
  - type: text
    content: 'Il brûlera sur l’autel la graisse de la victime expiatoire. '
  '26':
  - type: text
    content: 'Celui qui aura chassé le bouc pour Azazel lavera ses vêtements, et lavera son corps dans l’eau; après cela, il rentrera dans le camp. '
  '27':
  - type: note
    content: Lé 6:30. Hé 13:11.
  - type: text
    content: 'On emportera hors du camp le taureau expiatoire et le bouc expiatoire dont on a porté le sang dans le sanctuaire pour faire l’expiation, et l’on brûlera au feu leurs peaux, leur chair et leurs excréments. '
  '28':
  - type: text
    content: Celui qui les brûlera lavera ses vêtements, et lavera son corps dans l’eau; après cela, il rentrera dans le camp.
  - type: heading
    content: 'V. 29-34: cf. Lé 23:26-32.'
  '29':
  - type: text
    content: 'C’est ici pour vous une loi perpétuelle: '
  - type: note
    content: Lé 23:27.
  - type: text
    content: 'au septième mois, le dixième jour du mois, vous humilierez vos âmes, vous ne ferez aucun ouvrage, ni l’indigène, ni l’étranger qui séjourne au milieu de vous. '
  '3':
  - type: text
    content: 'Voici de quelle manière Aaron entrera dans le sanctuaire. Il prendra un jeune taureau pour le sacrifice d’expiation et un bélier pour l’holocauste. '
  '30':
  - type: text
    content: 'Car en ce jour on fera l’expiation pour vous, afin de vous purifier: vous serez purifiés de tous vos péchés devant l’Éternel. '
  '31':
  - type: text
    content: 'Ce sera pour vous un sabbat, un jour de repos, et vous humilierez vos âmes. C’est une loi perpétuelle. '
  '32':
  - type: text
    content: 'L’expiation sera faite par le sacrificateur qui a reçu l’onction et qui a été consacré pour succéder à son père dans le sacerdoce; il se revêtira des vêtements de lin, des vêtements sacrés. '
  '33':
  - type: text
    content: 'Il fera l’expiation pour le sanctuaire de sainteté, il fera l’expiation pour la tente d’assignation et pour l’autel, et il fera l’expiation pour les sacrificateurs et pour tout le peuple de l’assemblée. '
  '34':
  - type: text
    content: 'Ce sera pour vous une loi perpétuelle: il se fera '
  - type: note
    content: Ex 30:10. Hé 9:7.
  - type: text
    content: une fois chaque année l’expiation pour les enfants d’Israël, à cause de leurs péchés. On fit ce que l’Éternel avait ordonné à Moïse.
  '4':
  - type: text
    content: 'Il se revêtira de la tunique sacrée de lin, et portera sur son corps des caleçons de lin; il se ceindra d’une ceinture de lin, et il se couvrira la tête d’une tiare de lin: ce sont les vêtements sacrés, dont il se revêtira après avoir lavé son corps dans l’eau. '
  '5':
  - type: text
    content: 'Il recevra de l’assemblée des enfants d’Israël deux boucs pour le sacrifice d’expiation et un bélier pour l’holocauste. '
  '6':
  - type: text
    content: 'Aaron offrira son taureau expiatoire, et '
  - type: note
    content: Hé 7:27, 28.
  - type: text
    content: 'il fera l’expiation pour lui et pour sa maison. '
  '7':
  - type: text
    content: 'Il prendra les deux boucs, et il les placera devant l’Éternel, à l’entrée de la tente d’assignation. '
  '8':
  - type: text
    content: 'Aaron jettera le sort sur les deux boucs, un sort pour l’Éternel et un sort pour Azazel. '
  '9':
  - type: text
    content: 'Aaron fera approcher le bouc sur lequel est tombé le sort pour l’Éternel, et il l’offrira en sacrifice d’expiation. '
