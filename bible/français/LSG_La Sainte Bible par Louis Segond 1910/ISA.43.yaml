document_id: ISA.43,93
type_code: fra
verses:
  '1':
  - type: heading
    content: C’est l’Éternel seul qui rachète Israël
  - type: heading
    content: 'V. 1-7: cf. (De 7:6-9. 1 S 12:22.) (És 48:20; 51:10-11. Jé 32:36-38.)'
  - type: text
    content: Ainsi parle maintenant l’Éternel, qui t’a créé, ô Jacob!
  - type: text
    content: Celui qui t’a formé, ô Israël!
  - type: text
    content: Ne crains rien, car je te rachète,
  - type: text
    content: 'Je t’appelle par ton nom: tu es à moi!'
  '10':
  - type: text
    content: Vous êtes mes témoins, dit l’Éternel,
  - type: text
    content: Vous, et mon serviteur que j’ai choisi,
  - type: text
    content: Afin que vous le sachiez,
  - type: text
    content: 'Que vous me croyiez et compreniez que c’est moi:'
  - type: note
    content: És 41:4; 44:8; 45:21. Os 13:4.
  - type: text
    content: Avant moi il n’a point été formé de Dieu,
  - type: text
    content: Et après moi il n’y en aura point.
  '11':
  - type: text
    content: C’est moi, moi qui suis l’Éternel,
  - type: text
    content: Et hors moi il n’y a point de sauveur.
  '12':
  - type: text
    content: C’est moi qui ai annoncé, sauvé, prédit,
  - type: text
    content: Ce n’est point parmi vous un dieu étranger;
  - type: text
    content: Vous êtes mes témoins, dit l’Éternel,
  - type: text
    content: C’est moi qui suis Dieu.
  '13':
  - type: text
    content: Je le suis dès le commencement,
  - type: text
    content: Et nul ne délivre de ma main;
  - type: text
    content: 'J’agirai: '
  - type: note
    content: És 14:27.
  - type: text
    content: qui s’y opposera?
  - type: heading
    content: 'V. 14-21: cf. Ex 14. És 48:14, 20, 21. Jé 23:7, 8.'
  '14':
  - type: text
    content: Ainsi parle l’Éternel,
  - type: text
    content: 'Votre rédempteur, le Saint d’Israël:'
  - type: text
    content: A cause de vous, j’envoie l’ennemi contre Babylone,
  - type: text
    content: Et je fais descendre tous les fuyards,
  - type: text
    content: Même les Chaldéens, sur les navires dont ils tiraient gloire.
  '15':
  - type: text
    content: Je suis l’Éternel, votre Saint,
  - type: text
    content: Le créateur d’Israël, votre roi.
  '16':
  - type: text
    content: Ainsi parle l’Éternel,
  - type: text
    content: Qui fraya dans la mer un chemin,
  - type: text
    content: Et dans les eaux puissantes un sentier,
  '17':
  - type: text
    content: Qui mit en campagne des chars et des chevaux,
  - type: text
    content: Une armée et de vaillants guerriers,
  - type: text
    content: Soudain couchés ensemble, pour ne plus se relever,
  - type: text
    content: 'Anéantis, éteints comme une mèche:'
  '18':
  - type: text
    content: Ne pensez plus aux événements passés,
  - type: text
    content: Et ne considérez plus ce qui est ancien.
  '19':
  - type: text
    content: 'Voici, je vais faire '
  - type: note
    content: Ap 21:5.
  - type: text
    content: 'une chose nouvelle, sur le point d’arriver:'
  - type: text
    content: Ne la connaîtrez-vous pas?
  - type: text
    content: Je mettrai un chemin dans le désert,
  - type: text
    content: Et des fleuves dans la solitude.
  '2':
  - type: text
    content: 'Si tu traverses '
  - type: note
    content: Ps 66:12.
  - type: text
    content: les eaux, je serai avec toi;
  - type: text
    content: Et les fleuves, ils ne te submergeront point;
  - type: text
    content: Si tu marches dans le feu, tu ne te brûleras pas,
  - type: text
    content: Et la flamme ne t’embrasera pas.
  '20':
  - type: text
    content: Les bêtes des champs me glorifieront,
  - type: text
    content: Les chacals et les autruches,
  - type: text
    content: Parce que j’aurai mis des eaux dans le désert,
  - type: text
    content: Des fleuves dans la solitude,
  - type: text
    content: Pour abreuver mon peuple, mon élu.
  '21':
  - type: text
    content: ' '
  - type: note
    content: Lu 1:74, 75.
  - type: text
    content: Le peuple que je me suis formé
  - type: text
    content: Publiera mes louanges.
  - type: heading
    content: 'V. 22-28: cf. Éz 36:17-24. 2 Ch 36:14-17.'
  '22':
  - type: text
    content: Et tu ne m’as pas invoqué, ô Jacob!
  - type: text
    content: Car tu t’es lassé de moi, ô Israël!
  '23':
  - type: text
    content: Tu ne m’as pas offert tes brebis en holocauste,
  - type: text
    content: Et tu ne m’as pas honoré par tes sacrifices;
  - type: text
    content: Je ne t’ai point tourmenté pour des offrandes,
  - type: text
    content: Et je ne t’ai point fatigué pour de l’encens.
  '24':
  - type: text
    content: Tu n’as pas à prix d’argent acheté pour moi des aromates,
  - type: text
    content: Et tu ne m’as pas rassasié de la graisse de tes sacrifices;
  - type: text
    content: Mais tu m’as tourmenté par tes péchés,
  - type: text
    content: Tu m’as fatigué par tes iniquités.
  '25':
  - type: text
    content: 'C’est moi, moi qui efface tes transgressions '
  - type: note
    content: Éz 36:22, etc.
  - type: text
    content: pour l’amour de moi,
  - type: text
    content: Et je ne me souviendrai plus de tes péchés.
  '26':
  - type: text
    content: 'Réveille ma mémoire, '
  - type: note
    content: És 1:18.
  - type: text
    content: plaidons ensemble,
  - type: text
    content: Parle toi-même, pour te justifier.
  '27':
  - type: text
    content: Ton premier père a péché,
  - type: text
    content: Et tes interprètes se sont rebellés contre moi.
  '28':
  - type: text
    content: C’est pourquoi j’ai traité en profanes les chefs du sanctuaire,
  - type: text
    content: J’ai livré Jacob à la destruction,
  - type: text
    content: Et Israël aux outrages.
  '3':
  - type: text
    content: Car je suis l’Éternel, ton Dieu,
  - type: text
    content: Le Saint d’Israël, ton sauveur;
  - type: text
    content: Je donne l’Égypte pour ta rançon,
  - type: text
    content: L’Éthiopie et Saba à ta place.
  '4':
  - type: text
    content: Parce que tu as du prix à mes yeux,
  - type: text
    content: Parce que tu es honoré et que je t’aime,
  - type: text
    content: Je donne des hommes à ta place,
  - type: text
    content: Et des peuples pour ta vie.
  '5':
  - type: text
    content: ' '
  - type: note
    content: És 44:2. Jé 30:10; 46:27.
  - type: text
    content: Ne crains rien, car je suis avec toi;
  - type: text
    content: Je ramènerai de l’orient ta race,
  - type: text
    content: Et je te rassemblerai de l’occident.
  '6':
  - type: text
    content: 'Je dirai au septentrion: Donne!'
  - type: text
    content: 'Et au midi: Ne retiens point!'
  - type: text
    content: Fais venir mes fils des pays lointains,
  - type: text
    content: Et mes filles de l’extrémité de la terre,
  '7':
  - type: text
    content: Tous ceux qui s’appellent de mon nom,
  - type: text
    content: Et que j’ai créés pour ma gloire,
  - type: text
    content: Que j’ai formés et que j’ai faits.
  - type: heading
    content: 'V. 8-13: cf. És 41:21-29.'
  '8':
  - type: text
    content: Qu’on fasse sortir le peuple aveugle, qui a des yeux,
  - type: text
    content: Et les sourds, qui ont des oreilles.
  '9':
  - type: text
    content: Que toutes les nations se rassemblent,
  - type: text
    content: Et que les peuples se réunissent.
  - type: text
    content: Qui d’entre eux a annoncé ces choses?
  - type: text
    content: Lesquels nous ont fait entendre les premières prédictions?
  - type: text
    content: Qu’ils produisent leurs témoins et établissent leur droit;
  - type: text
    content: 'Qu’on écoute et qu’on dise: C’est vrai!'
