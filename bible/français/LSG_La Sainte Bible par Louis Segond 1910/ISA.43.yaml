document_id: ISA.43,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: C’est l’Éternel seul qui rachète Israël
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-7: cf. (De 7:6-9. 1 S 12:22.) (És 48:20; 51:10-11. Jé 32:36-38.)'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi parle maintenant l’Éternel, qui t’a créé, ô Jacob!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui t’a formé, ô Israël!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne crains rien, car je te rachète,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je t’appelle par ton nom: tu es à moi!'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous êtes mes témoins, dit l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous, et mon serviteur que j’ai choisi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afin que vous le sachiez,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Que vous me croyiez et compreniez que c’est moi:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 41:4
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 44:8
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 45:21
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Os 13:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Avant moi il n’a point été formé de Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et après moi il n’y en aura point.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est moi, moi qui suis l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et hors moi il n’y a point de sauveur.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est moi qui ai annoncé, sauvé, prédit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce n’est point parmi vous un dieu étranger;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous êtes mes témoins, dit l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est moi qui suis Dieu.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je le suis dès le commencement,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et nul ne délivre de ma main;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'J’agirai: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 14:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: qui s’y opposera?
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 14-21: cf. Ex 14. És 48:14, 20, 21. Jé 23:7, 8.'
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi parle l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Votre rédempteur, le Saint d’Israël:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause de vous, j’envoie l’ennemi contre Babylone,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je fais descendre tous les fuyards,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Même les Chaldéens, sur les navires dont ils tiraient gloire.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis l’Éternel, votre Saint,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le créateur d’Israël, votre roi.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi parle l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui fraya dans la mer un chemin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et dans les eaux puissantes un sentier,
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui mit en campagne des chars et des chevaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Une armée et de vaillants guerriers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Soudain couchés ensemble, pour ne plus se relever,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Anéantis, éteints comme une mèche:'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne pensez plus aux événements passés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ne considérez plus ce qui est ancien.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici, je vais faire '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 21:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'une chose nouvelle, sur le point d’arriver:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne la connaîtrez-vous pas?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je mettrai un chemin dans le désert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et des fleuves dans la solitude.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Si tu traverses '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 66:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: les eaux, je serai avec toi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les fleuves, ils ne te submergeront point;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si tu marches dans le feu, tu ne te brûleras pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la flamme ne t’embrasera pas.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les bêtes des champs me glorifieront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les chacals et les autruches,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce que j’aurai mis des eaux dans le désert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des fleuves dans la solitude,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour abreuver mon peuple, mon élu.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 1:74
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '75'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Le peuple que je me suis formé
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Publiera mes louanges.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 22-28: cf. Éz 36:17-24. 2 Ch 36:14-17.'
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tu ne m’as pas invoqué, ô Jacob!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car tu t’es lassé de moi, ô Israël!
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu ne m’as pas offert tes brebis en holocauste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tu ne m’as pas honoré par tes sacrifices;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ne t’ai point tourmenté pour des offrandes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je ne t’ai point fatigué pour de l’encens.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu n’as pas à prix d’argent acheté pour moi des aromates,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tu ne m’as pas rassasié de la graisse de tes sacrifices;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais tu m’as tourmenté par tes péchés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu m’as fatigué par tes iniquités.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'C’est moi, moi qui efface tes transgressions '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Éz 36:22, etc.
      marker-yv: yv-n
    - type: text
      text: pour l’amour de moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je ne me souviendrai plus de tes péchés.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Réveille ma mémoire, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 1:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: plaidons ensemble,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parle toi-même, pour te justifier.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ton premier père a péché,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tes interprètes se sont rebellés contre moi.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est pourquoi j’ai traité en profanes les chefs du sanctuaire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai livré Jacob à la destruction,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et Israël aux outrages.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car je suis l’Éternel, ton Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le Saint d’Israël, ton sauveur;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je donne l’Égypte pour ta rançon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éthiopie et Saba à ta place.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce que tu as du prix à mes yeux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce que tu es honoré et que je t’aime,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je donne des hommes à ta place,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et des peuples pour ta vie.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 44:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 30:10
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 46:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ne crains rien, car je suis avec toi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ramènerai de l’orient ta race,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je te rassemblerai de l’occident.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je dirai au septentrion: Donne!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et au midi: Ne retiens point!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fais venir mes fils des pays lointains,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et mes filles de l’extrémité de la terre,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous ceux qui s’appellent de mon nom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que j’ai créés pour ma gloire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que j’ai formés et que j’ai faits.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 8-13: cf. És 41:21-29.'
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’on fasse sortir le peuple aveugle, qui a des yeux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les sourds, qui ont des oreilles.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que toutes les nations se rassemblent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que les peuples se réunissent.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui d’entre eux a annoncé ces choses?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lesquels nous ont fait entendre les premières prédictions?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’ils produisent leurs témoins et établissent leur droit;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Qu’on écoute et qu’on dise: C’est vrai!'
