document_id: JER.13,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La captivité prédite, sous l’emblème d’une ceinture de lin
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-11: cf. Jé 19.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi m’a parlé l’Éternel: Va, achète-toi une ceinture de lin, et mets-la sur tes reins; mais ne la trempe pas dans l’eau. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce méchant peuple, qui refuse d’écouter mes paroles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui suit les penchants de son cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qui va après d’autres dieux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour les servir et se prosterner devant eux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’il devienne comme cette ceinture,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui n’est plus bonne à rien!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car comme on attache la ceinture aux reins d’un homme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi je m’étais attaché toute la maison d’Israël
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et toute la maison de Juda, dit l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afin qu’elles fussent mon peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon nom, ma louange, et ma gloire.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais ils ne m’ont point écouté.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les vases brisés
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 12-14: cf. Jé 25:15-18, 27.'
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tu leur diras cette parole:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ainsi parle l’Éternel, le Dieu d’Israël:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous les vases seront remplis de vin.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et ils te diront: Ne savons-nous pas'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que tous les vases seront remplis de vin?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Alors dis-leur: Ainsi parle l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, je remplirai tous les habitants de ce pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les rois qui sont assis sur le trône de David,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les sacrificateurs, les prophètes, et tous les habitants de Jérusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je les remplirai d’ivresse.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je les briserai les uns contre les autres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les pères et les fils ensemble, dit l’Éternel;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je n’épargnerai pas, je n’aurai point de pitié, point de miséricorde,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rien ne m’empêchera de les détruire.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Avertissements et menaces
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 15-27: cf. (2 R 24:8-16. Jé 22:24-30.) Jé 16:10-13.'
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Écoutez et prêtez l’oreille!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne soyez point orgueilleux!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car l’Éternel parle.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rendez gloire à l’Éternel, votre Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avant qu’il fasse venir les ténèbres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avant que vos pieds heurtent contre les montagnes de la nuit;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Vous attendrez la '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 59:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: lumière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et il la changera en '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 44:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: ombre de la mort,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il la réduira en obscurité profonde.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si vous n’écoutez pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je pleurerai en secret, à cause de votre orgueil;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: La 1:2
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '16'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Mes yeux fondront en larmes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce que le troupeau de l’Éternel sera emmené captif.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dis au roi et à la reine:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Asseyez-vous à terre!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car il est tombé de vos têtes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le diadème qui vous servait d’ornement.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les villes du midi sont fermées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n’y a personne pour ouvrir;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tout Juda est emmené captif,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est emmené tout entier captif.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’achetai la ceinture, selon la parole de l’Éternel, et je la mis sur mes reins. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lève tes yeux et regarde
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux qui viennent du septentrion.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Où est le troupeau qui t’avait été donné,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le troupeau qui faisait ta gloire?
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que diras-tu de ce qu’il te châtie?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est toi-même qui leur as appris à te traiter en maîtres.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les douleurs ne te saisiront-elles pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Comme elles saisissent '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 6:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: une femme en travail?
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Si tu dis en ton cœur:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 5:19
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Pourquoi cela m’arrive-t-il?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est à cause de la multitude de tes iniquités
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Que '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 47:2
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: les pans de tes habits sont relevés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que tes talons sont violemment mis à nu.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un Éthiopien peut-il changer sa peau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et un léopard ses taches?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De même, pourriez-vous faire le bien,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous qui êtes accoutumés à faire le mal?
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je les disperserai, comme la paille emportée
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par le vent du désert.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voilà ton sort, la part que je te mesure,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce que tu m’as oublié,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que tu as mis ta confiance dans le mensonge.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je relèverai tes pans jusque sur ton visage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afin qu’on voie ta honte.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai vu tes adultères et tes hennissements,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes criminelles prostitutions sur les collines et dans les champs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai vu tes abominations.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Malheur à toi, Jérusalem!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jusques à quand tarderas-tu à te purifier?
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La parole de l’Éternel me fut adressée une seconde fois, en ces mots: '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Prends la ceinture que tu as achetée, et qui est sur tes reins; lève-toi, va vers l’Euphrate, et là, cache-la dans la fente d’un rocher. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’allai, et je la cachai près de l’Euphrate, comme l’Éternel me l’avait ordonné. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Plusieurs jours après, l’Éternel me dit: Lève-toi, va vers l’Euphrate, et là, prends la ceinture que je t’avais ordonné d’y cacher. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’allai vers l’Euphrate, je fouillai, et je pris la ceinture dans le lieu où je l’avais cachée; mais voici, la ceinture était gâtée, elle n’était plus bonne à rien. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La parole de l’Éternel me fut adressée, en ces mots:'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ainsi parle l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est ainsi que je détruirai l’orgueil de Juda
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’orgueil immense de Jérusalem.
