document_id: JER.13,93
type_code: fra
verses:
  '1':
  - type: heading
    content: La captivité prédite, sous l’emblème d’une ceinture de lin
  - type: heading
    content: 'V. 1-11: cf. Jé 19.'
  - type: text
    content: 'Ainsi m’a parlé l’Éternel: Va, achète-toi une ceinture de lin, et mets-la sur tes reins; mais ne la trempe pas dans l’eau. '
  '10':
  - type: text
    content: Ce méchant peuple, qui refuse d’écouter mes paroles,
  - type: text
    content: Qui suit les penchants de son cœur,
  - type: text
    content: Et qui va après d’autres dieux,
  - type: text
    content: Pour les servir et se prosterner devant eux,
  - type: text
    content: Qu’il devienne comme cette ceinture,
  - type: text
    content: Qui n’est plus bonne à rien!
  '11':
  - type: text
    content: Car comme on attache la ceinture aux reins d’un homme,
  - type: text
    content: Ainsi je m’étais attaché toute la maison d’Israël
  - type: text
    content: Et toute la maison de Juda, dit l’Éternel,
  - type: text
    content: Afin qu’elles fussent mon peuple,
  - type: text
    content: Mon nom, ma louange, et ma gloire.
  - type: text
    content: Mais ils ne m’ont point écouté.
  - type: heading
    content: Les vases brisés
  - type: heading
    content: 'V. 12-14: cf. Jé 25:15-18, 27.'
  '12':
  - type: text
    content: 'Tu leur diras cette parole:'
  - type: text
    content: 'Ainsi parle l’Éternel, le Dieu d’Israël:'
  - type: text
    content: Tous les vases seront remplis de vin.
  - type: text
    content: 'Et ils te diront: Ne savons-nous pas'
  - type: text
    content: Que tous les vases seront remplis de vin?
  '13':
  - type: text
    content: 'Alors dis-leur: Ainsi parle l’Éternel:'
  - type: text
    content: Voici, je remplirai tous les habitants de ce pays,
  - type: text
    content: Les rois qui sont assis sur le trône de David,
  - type: text
    content: Les sacrificateurs, les prophètes, et tous les habitants de Jérusalem,
  - type: text
    content: Je les remplirai d’ivresse.
  '14':
  - type: text
    content: Je les briserai les uns contre les autres,
  - type: text
    content: Les pères et les fils ensemble, dit l’Éternel;
  - type: text
    content: Je n’épargnerai pas, je n’aurai point de pitié, point de miséricorde,
  - type: text
    content: Rien ne m’empêchera de les détruire.
  - type: heading
    content: Avertissements et menaces
  - type: heading
    content: 'V. 15-27: cf. (2 R 24:8-16. Jé 22:24-30.) Jé 16:10-13.'
  '15':
  - type: text
    content: Écoutez et prêtez l’oreille!
  - type: text
    content: Ne soyez point orgueilleux!
  - type: text
    content: Car l’Éternel parle.
  '16':
  - type: text
    content: Rendez gloire à l’Éternel, votre Dieu,
  - type: text
    content: Avant qu’il fasse venir les ténèbres,
  - type: text
    content: Avant que vos pieds heurtent contre les montagnes de la nuit;
  - type: text
    content: 'Vous attendrez la '
  - type: note
    content: És 59:9.
  - type: text
    content: lumière,
  - type: text
    content: 'Et il la changera en '
  - type: note
    content: Ps 44:20.
  - type: text
    content: ombre de la mort,
  - type: text
    content: Il la réduira en obscurité profonde.
  '17':
  - type: text
    content: Si vous n’écoutez pas,
  - type: text
    content: Je pleurerai en secret, à cause de votre orgueil;
  - type: note
    content: La 1:2, 16.
  - type: text
    content: Mes yeux fondront en larmes,
  - type: text
    content: Parce que le troupeau de l’Éternel sera emmené captif.
  '18':
  - type: text
    content: 'Dis au roi et à la reine:'
  - type: text
    content: Asseyez-vous à terre!
  - type: text
    content: Car il est tombé de vos têtes,
  - type: text
    content: Le diadème qui vous servait d’ornement.
  '19':
  - type: text
    content: Les villes du midi sont fermées,
  - type: text
    content: Il n’y a personne pour ouvrir;
  - type: text
    content: Tout Juda est emmené captif,
  - type: text
    content: Il est emmené tout entier captif.
  '2':
  - type: text
    content: 'J’achetai la ceinture, selon la parole de l’Éternel, et je la mis sur mes reins. '
  '20':
  - type: text
    content: Lève tes yeux et regarde
  - type: text
    content: Ceux qui viennent du septentrion.
  - type: text
    content: Où est le troupeau qui t’avait été donné,
  - type: text
    content: Le troupeau qui faisait ta gloire?
  '21':
  - type: text
    content: Que diras-tu de ce qu’il te châtie?
  - type: text
    content: C’est toi-même qui leur as appris à te traiter en maîtres.
  - type: text
    content: Les douleurs ne te saisiront-elles pas,
  - type: text
    content: 'Comme elles saisissent '
  - type: note
    content: Jé 6:24.
  - type: text
    content: une femme en travail?
  '22':
  - type: text
    content: 'Si tu dis en ton cœur:'
  - type: note
    content: Jé 5:19; 16:10.
  - type: text
    content: Pourquoi cela m’arrive-t-il?
  - type: text
    content: C’est à cause de la multitude de tes iniquités
  - type: text
    content: 'Que '
  - type: note
    content: És 47:2, 3.
  - type: text
    content: les pans de tes habits sont relevés,
  - type: text
    content: Et que tes talons sont violemment mis à nu.
  '23':
  - type: text
    content: Un Éthiopien peut-il changer sa peau,
  - type: text
    content: Et un léopard ses taches?
  - type: text
    content: De même, pourriez-vous faire le bien,
  - type: text
    content: Vous qui êtes accoutumés à faire le mal?
  '24':
  - type: text
    content: Je les disperserai, comme la paille emportée
  - type: text
    content: Par le vent du désert.
  '25':
  - type: text
    content: Voilà ton sort, la part que je te mesure,
  - type: text
    content: Dit l’Éternel,
  - type: text
    content: Parce que tu m’as oublié,
  - type: text
    content: Et que tu as mis ta confiance dans le mensonge.
  '26':
  - type: text
    content: Je relèverai tes pans jusque sur ton visage,
  - type: text
    content: Afin qu’on voie ta honte.
  '27':
  - type: text
    content: J’ai vu tes adultères et tes hennissements,
  - type: text
    content: Tes criminelles prostitutions sur les collines et dans les champs,
  - type: text
    content: J’ai vu tes abominations.
  - type: text
    content: Malheur à toi, Jérusalem!
  - type: text
    content: Jusques à quand tarderas-tu à te purifier?
  '3':
  - type: text
    content: 'La parole de l’Éternel me fut adressée une seconde fois, en ces mots: '
  '4':
  - type: text
    content: 'Prends la ceinture que tu as achetée, et qui est sur tes reins; lève-toi, va vers l’Euphrate, et là, cache-la dans la fente d’un rocher. '
  '5':
  - type: text
    content: 'J’allai, et je la cachai près de l’Euphrate, comme l’Éternel me l’avait ordonné. '
  '6':
  - type: text
    content: 'Plusieurs jours après, l’Éternel me dit: Lève-toi, va vers l’Euphrate, et là, prends la ceinture que je t’avais ordonné d’y cacher. '
  '7':
  - type: text
    content: 'J’allai vers l’Euphrate, je fouillai, et je pris la ceinture dans le lieu où je l’avais cachée; mais voici, la ceinture était gâtée, elle n’était plus bonne à rien. '
  '8':
  - type: text
    content: 'La parole de l’Éternel me fut adressée, en ces mots:'
  '9':
  - type: text
    content: 'Ainsi parle l’Éternel:'
  - type: text
    content: C’est ainsi que je détruirai l’orgueil de Juda
  - type: text
    content: Et l’orgueil immense de Jérusalem.
