document_id: GEN.10,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Postérité des trois fils de Noé
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-5: cf. 1 Ch 1:4-7. Ge 9:27.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici la postérité des fils de '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 1:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Noé, Sem, Cham et Japhet. Il leur naquit des fils après le déluge. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il régna d’abord sur Babel, Érec, Accad et Calné, au pays de Schinear. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De ce pays-là sortit Assur; il bâtit Ninive, Rehoboth Hir, Calach, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et Résen entre Ninive et Calach; c’est la grande ville. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mitsraïm engendra les Ludim, les Anamim, les Lehabim, les Naphtuhim, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'les Patrusim, les Casluhim, d’où sont sortis les Philistins, et les Caphtorim. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Canaan engendra Sidon, son premier-né, et Heth; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et les Jébusiens, les Amoréens, les Guirgasiens, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'les Héviens, les Arkiens, les Siniens, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'les Arvadiens, les Tsemariens, les Hamathiens. Ensuite, les familles des Cananéens se dispersèrent. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les limites des Cananéens allèrent depuis Sidon, du côté de Guérar, jusqu’à Gaza, et du côté de Sodome, de Gomorrhe, d’Adma et de Tseboïm, jusqu’à Léscha. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 1:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'fils de Japhet furent: Gomer, Magog, Madaï, Javan, Tubal, Méschec et Tiras. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ce sont là les fils de Cham, selon leurs familles, selon leurs langues, selon leurs pays, selon leurs nations.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 21-32: cf. 1 Ch 1:17-27. Ge 9:26; 11:10-32.'
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il naquit aussi des fils à Sem, père de tous les fils d’Héber, et frère de Japhet l’aîné. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 1:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Les fils de Sem furent: Élam, Assur, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 11:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Arpacschad, Lud et Aram. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les fils d’Aram: Uts, Hul, Guéter et Masch. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 1:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Arpacschad engendra Schélach; et Schélach engendra Héber. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il naquit à Héber deux fils: le nom de l’un était Péleg, parce que de son temps la terre fut partagée, et le nom de son frère était Jokthan. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jokthan engendra Almodad, Schéleph, Hatsarmaveth, Jérach, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hadoram, Uzal, Dikla, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Obal, Abimaël, Séba, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ophir, Havila et Jobab. Tous ceux-là furent fils de Jokthan. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les fils de Gomer: Aschkenaz, Riphat et Togarma. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils habitèrent depuis Méscha, du côté de Sephar, jusqu’à la montagne de l’orient. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce sont là les fils de Sem, selon leurs familles, selon leurs langues, selon leurs pays, selon leurs nations. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Telles sont les familles des fils de Noé, selon leurs générations, selon leurs nations. Et c’est d’eux que sont sorties les nations qui se sont répandues sur la terre après le déluge.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les fils de Javan: Élischa, Tarsis, Kittim et Dodanim. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: C’est par eux qu’ont été peuplées les îles des nations selon leurs terres, selon la langue de chacun, selon leurs familles, selon leurs nations.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 6-20: cf. 1 Ch 1:8-16. Ge 9:22-25.'
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 1:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'fils de Cham furent: Cusch, Mitsraïm, Puth et Canaan. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les fils de Cusch: Saba, Havila, Sabta, Raema et Sabteca. Les fils de Raema: Séba et Dedan. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 1:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Cusch engendra aussi Nimrod; c’est lui qui commença à être puissant sur la terre. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il fut un vaillant chasseur devant l’Éternel; c’est pourquoi l’on dit: Comme Nimrod, vaillant chasseur devant l’Éternel. '
