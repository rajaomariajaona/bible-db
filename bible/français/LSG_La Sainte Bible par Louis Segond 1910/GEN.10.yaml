document_id: GEN.10,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Postérité des trois fils de Noé
  - type: heading
    content: 'V. 1-5: cf. 1 Ch 1:4-7. Ge 9:27.'
  - type: text
    content: 'Voici la postérité des fils de '
  - type: note
    content: 1 Ch 1:4.
  - type: text
    content: 'Noé, Sem, Cham et Japhet. Il leur naquit des fils après le déluge. '
  '10':
  - type: text
    content: 'Il régna d’abord sur Babel, Érec, Accad et Calné, au pays de Schinear. '
  '11':
  - type: text
    content: 'De ce pays-là sortit Assur; il bâtit Ninive, Rehoboth Hir, Calach, '
  '12':
  - type: text
    content: 'et Résen entre Ninive et Calach; c’est la grande ville. '
  '13':
  - type: text
    content: 'Mitsraïm engendra les Ludim, les Anamim, les Lehabim, les Naphtuhim, '
  '14':
  - type: text
    content: 'les Patrusim, les Casluhim, d’où sont sortis les Philistins, et les Caphtorim. '
  '15':
  - type: text
    content: 'Canaan engendra Sidon, son premier-né, et Heth; '
  '16':
  - type: text
    content: 'et les Jébusiens, les Amoréens, les Guirgasiens, '
  '17':
  - type: text
    content: 'les Héviens, les Arkiens, les Siniens, '
  '18':
  - type: text
    content: 'les Arvadiens, les Tsemariens, les Hamathiens. Ensuite, les familles des Cananéens se dispersèrent. '
  '19':
  - type: text
    content: 'Les limites des Cananéens allèrent depuis Sidon, du côté de Guérar, jusqu’à Gaza, et du côté de Sodome, de Gomorrhe, d’Adma et de Tseboïm, jusqu’à Léscha. '
  '2':
  - type: text
    content: 'Les '
  - type: note
    content: 1 Ch 1:5.
  - type: text
    content: 'fils de Japhet furent: Gomer, Magog, Madaï, Javan, Tubal, Méschec et Tiras. '
  '20':
  - type: text
    content: Ce sont là les fils de Cham, selon leurs familles, selon leurs langues, selon leurs pays, selon leurs nations.
  - type: heading
    content: 'V. 21-32: cf. 1 Ch 1:17-27. Ge 9:26; 11:10-32.'
  '21':
  - type: text
    content: 'Il naquit aussi des fils à Sem, père de tous les fils d’Héber, et frère de Japhet l’aîné. '
  '22':
  - type: note
    content: 1 Ch 1:17.
  - type: text
    content: 'Les fils de Sem furent: Élam, Assur, '
  - type: note
    content: Ge 11:10.
  - type: text
    content: 'Arpacschad, Lud et Aram. '
  '23':
  - type: text
    content: 'Les fils d’Aram: Uts, Hul, Guéter et Masch. '
  '24':
  - type: note
    content: 1 Ch 1:18.
  - type: text
    content: 'Arpacschad engendra Schélach; et Schélach engendra Héber. '
  '25':
  - type: text
    content: 'Il naquit à Héber deux fils: le nom de l’un était Péleg, parce que de son temps la terre fut partagée, et le nom de son frère était Jokthan. '
  '26':
  - type: text
    content: 'Jokthan engendra Almodad, Schéleph, Hatsarmaveth, Jérach, '
  '27':
  - type: text
    content: 'Hadoram, Uzal, Dikla, '
  '28':
  - type: text
    content: 'Obal, Abimaël, Séba, '
  '29':
  - type: text
    content: 'Ophir, Havila et Jobab. Tous ceux-là furent fils de Jokthan. '
  '3':
  - type: text
    content: 'Les fils de Gomer: Aschkenaz, Riphat et Togarma. '
  '30':
  - type: text
    content: 'Ils habitèrent depuis Méscha, du côté de Sephar, jusqu’à la montagne de l’orient. '
  '31':
  - type: text
    content: 'Ce sont là les fils de Sem, selon leurs familles, selon leurs langues, selon leurs pays, selon leurs nations. '
  '32':
  - type: text
    content: Telles sont les familles des fils de Noé, selon leurs générations, selon leurs nations. Et c’est d’eux que sont sorties les nations qui se sont répandues sur la terre après le déluge.
  '4':
  - type: text
    content: 'Les fils de Javan: Élischa, Tarsis, Kittim et Dodanim. '
  '5':
  - type: text
    content: C’est par eux qu’ont été peuplées les îles des nations selon leurs terres, selon la langue de chacun, selon leurs familles, selon leurs nations.
  - type: heading
    content: 'V. 6-20: cf. 1 Ch 1:8-16. Ge 9:22-25.'
  '6':
  - type: text
    content: 'Les '
  - type: note
    content: 1 Ch 1:8.
  - type: text
    content: 'fils de Cham furent: Cusch, Mitsraïm, Puth et Canaan. '
  '7':
  - type: text
    content: 'Les fils de Cusch: Saba, Havila, Sabta, Raema et Sabteca. Les fils de Raema: Séba et Dedan. '
  '8':
  - type: note
    content: 1 Ch 1:10.
  - type: text
    content: 'Cusch engendra aussi Nimrod; c’est lui qui commença à être puissant sur la terre. '
  '9':
  - type: text
    content: 'Il fut un vaillant chasseur devant l’Éternel; c’est pourquoi l’on dit: Comme Nimrod, vaillant chasseur devant l’Éternel. '
