document_id: GEN.10
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Postérité des trois fils de Noé
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-5: cf. 1 Ch 1:4-7. Ge 9:27.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Voici la postérité des fils de '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 1:4
      metadata:
        usfm: 1CH.1.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Noé, Sem, Cham et Japhet. Il leur naquit des fils après le déluge. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Les '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 1:5
      metadata:
        usfm: 1CH.1.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'fils de Japhet furent: Gomer, Magog, Madaï, Javan, Tubal, Méschec et Tiras. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Les fils de Gomer: Aschkenaz, Riphat et Togarma. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Les fils de Javan: Élischa, Tarsis, Kittim et Dodanim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: C’est par eux qu’ont été peuplées les îles des nations selon leurs terres, selon la langue de chacun, selon leurs familles, selon leurs nations.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 6-20: cf. 1 Ch 1:8-16. Ge 9:22-25.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Les '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 1:8
      metadata:
        usfm: 1CH.1.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'fils de Cham furent: Cusch, Mitsraïm, Puth et Canaan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Les fils de Cusch: Saba, Havila, Sabta, Raema et Sabteca. Les fils de Raema: Séba et Dedan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 1:10
      metadata:
        usfm: 1CH.1.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Cusch engendra aussi Nimrod; c’est lui qui commença à être puissant sur la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il fut un vaillant chasseur devant l’Éternel; c’est pourquoi l’on dit: Comme Nimrod, vaillant chasseur devant l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il régna d’abord sur Babel, Érec, Accad et Calné, au pays de Schinear. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'De ce pays-là sortit Assur; il bâtit Ninive, Rehoboth Hir, Calach, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'et Résen entre Ninive et Calach; c’est la grande ville. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mitsraïm engendra les Ludim, les Anamim, les Lehabim, les Naphtuhim, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'les Patrusim, les Casluhim, d’où sont sortis les Philistins, et les Caphtorim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Canaan engendra Sidon, son premier-né, et Heth; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'et les Jébusiens, les Amoréens, les Guirgasiens, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'les Héviens, les Arkiens, les Siniens, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'les Arvadiens, les Tsemariens, les Hamathiens. Ensuite, les familles des Cananéens se dispersèrent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Les limites des Cananéens allèrent depuis Sidon, du côté de Guérar, jusqu’à Gaza, et du côté de Sodome, de Gomorrhe, d’Adma et de Tseboïm, jusqu’à Léscha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ce sont là les fils de Cham, selon leurs familles, selon leurs langues, selon leurs pays, selon leurs nations.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 21-32: cf. 1 Ch 1:17-27. Ge 9:26; 11:10-32.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Il naquit aussi des fils à Sem, père de tous les fils d’Héber, et frère de Japhet l’aîné. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 1:17
      metadata:
        usfm: 1CH.1.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Les fils de Sem furent: Élam, Assur, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 11:10
      metadata:
        usfm: GEN.11.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Arpacschad, Lud et Aram. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Les fils d’Aram: Uts, Hul, Guéter et Masch. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 1:18
      metadata:
        usfm: 1CH.1.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Arpacschad engendra Schélach; et Schélach engendra Héber. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Il naquit à Héber deux fils: le nom de l’un était Péleg, parce que de son temps la terre fut partagée, et le nom de son frère était Jokthan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Jokthan engendra Almodad, Schéleph, Hatsarmaveth, Jérach, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Hadoram, Uzal, Dikla, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Obal, Abimaël, Séba, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ophir, Havila et Jobab. Tous ceux-là furent fils de Jokthan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ils habitèrent depuis Méscha, du côté de Sephar, jusqu’à la montagne de l’orient. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ce sont là les fils de Sem, selon leurs familles, selon leurs langues, selon leurs pays, selon leurs nations. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Telles sont les familles des fils de Noé, selon leurs générations, selon leurs nations. Et c’est d’eux que sont sorties les nations qui se sont répandues sur la terre après le déluge.
