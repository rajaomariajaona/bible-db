document_id: EST.9
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vengeance des Juifs
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-16: cf. (Est 3:5-15; 8:7-17.) Ps 21:9-12.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Au douzième mois, qui est le mois d’Adar, le treizième jour du mois, jour où devaient s’exécuter l’ordre et l’édit du roi, et où les ennemis des Juifs avaient espéré dominer sur eux, ce fut le contraire qui arriva, et les Juifs dominèrent sur leurs ennemis. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Les Juifs se rassemblèrent dans leurs villes, dans toutes les provinces du roi Assuérus, pour mettre la main sur ceux qui cherchaient leur perte; et personne ne put leur résister, car la crainte qu’on avait d’eux s’était emparée de tous les peuples. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Et tous les chefs des provinces, les satrapes, les gouverneurs, les fonctionnaires du roi, soutinrent les Juifs, à cause de l’effroi que leur inspirait Mardochée. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Car Mardochée était puissant dans la maison du roi, et sa renommée se répandait dans toutes les provinces, parce qu’il devenait de plus en plus puissant. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Les Juifs frappèrent à coups d’épée tous leurs ennemis, ils les tuèrent et les firent périr; ils traitèrent comme il leur plut ceux qui leur étaient hostiles. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dans Suse, la capitale, les Juifs tuèrent et firent périr cinq cents hommes, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'et ils égorgèrent Parschandatha, Dalphon, Aspatha, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Poratha, Adalia, Aridatha, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Parmaschtha, Arizaï, Aridaï et Vajezatha, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'les dix fils d’Haman, fils d’Hammedatha, l’ennemi des Juifs. Mais ils ne mirent pas la main au pillage. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ce jour-là, le nombre de ceux qui avaient été tués dans Suse, la capitale, parvint à la connaissance du roi. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Et le roi dit à la reine Esther: Les Juifs ont tué et fait périr dans Suse, la capitale, cinq cents hommes et les dix fils d’Haman; qu’auront-ils fait dans le reste des provinces du roi? Quelle est ta demande? Elle te sera accordée. Que désires-tu encore? Tu l’obtiendras. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Esther répondit: Si le roi le trouve bon, qu’il soit permis aux Juifs qui sont à Suse d’agir encore demain selon le décret d’aujourd’hui, et que l’on pende au bois les dix fils d’Haman. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Et le roi ordonna de faire ainsi. L’édit fut publié dans Suse. On pendit les dix fils d’Haman; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'et les Juifs qui se trouvaient à Suse se rassemblèrent de nouveau le quatorzième jour du mois d’Adar et tuèrent dans Suse trois cents hommes. Mais ils ne mirent pas la main au pillage. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Les autres Juifs qui étaient dans les provinces du roi se rassemblèrent et défendirent leur vie; ils se procurèrent du repos en se délivrant de leurs ennemis, et ils tuèrent soixante-quinze mille de ceux qui leur étaient hostiles. Mais ils ne mirent pas la main au pillage.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fête des Purim
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 17-32: cf. (Ex 12:14, 17, 24-27. Ps 78:1-8.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ces choses arrivèrent le treizième jour du mois d’Adar. Les Juifs se reposèrent le quatorzième, et ils en firent un jour de festin et de joie. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ceux qui se trouvaient à Suse, s’étant rassemblés le treizième jour et le quatorzième jour, se reposèrent le quinzième, et ils en firent un jour de festin et de joie. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'C’est pourquoi les Juifs de la campagne, qui habitent des villes sans murailles, font du quatorzième jour du mois d’Adar un jour de joie, de festin et de fête, où l’on s’envoie des portions les uns aux autres. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Mardochée écrivit ces choses, et il envoya des lettres à tous les Juifs qui étaient dans toutes les provinces du roi Assuérus, auprès et au loin. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Il leur prescrivait de célébrer chaque année le quatorzième jour et le quinzième jour du mois d’Adar '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'comme les jours où ils avaient obtenu du repos en se délivrant de leurs ennemis, de célébrer le mois où leur tristesse avait été changée en joie et leur désolation en jour de fête, et de faire de ces jours des jours de festin et de joie où l’on s’envoie des portions les uns aux autres et où l’on distribue des dons aux indigents. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Les Juifs s’engagèrent à faire ce qu’ils avaient déjà commencé et ce que Mardochée leur écrivit. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Car Haman, fils d’Hammedatha, l’Agaguite, ennemi de tous les Juifs, avait formé le projet de les faire périr, et il avait jeté le pur, c’est-à-dire le sort, afin de les tuer et de les détruire; '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'mais Esther s’étant présentée devant le roi, le roi ordonna '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Est 8:8
      metadata:
        usfm: EST.8.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'par écrit de faire retomber sur la tête d’Haman le méchant projet qu’il avait formé contre les Juifs, et de le pendre au bois, lui et ses fils. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'C’est pourquoi on appela ces jours Purim, du nom de pur. D’après tout le contenu de cette lettre, d’après ce qu’ils avaient eux-mêmes vu et ce qui leur était arrivé, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'les Juifs prirent pour eux, pour leur postérité, et pour tous ceux qui s’attacheraient à eux, la résolution et l’engagement irrévocables de célébrer chaque année ces deux jours, selon le mode prescrit et au temps fixé. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ces jours devaient être rappelés et célébrés de génération en génération, dans chaque famille, dans chaque province et dans chaque ville; et ces jours de Purim ne devaient jamais être abolis au milieu des Juifs, ni le souvenir s’en effacer parmi leurs descendants. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'La reine Esther, fille d’Abichaïl, et le Juif Mardochée écrivirent d’une manière pressante une seconde fois pour confirmer la lettre sur les Purim. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'On envoya des lettres à tous les Juifs, dans les cent vingt-sept provinces du roi Assuérus. Elles contenaient des paroles de paix et de fidélité, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'pour prescrire ces jours de Purim au temps fixé, comme le Juif Mardochée et la reine Esther les avaient établis pour eux, et comme ils les avaient établis pour eux-mêmes et pour leur postérité, à l’occasion de leur jeûne et de leurs cris. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ainsi l’ordre d’Esther confirma l’institution des Purim, et cela fut écrit dans le livre.
