document_id: PSA.102
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: Da 9. Ps 137. (És 51; 52:1-10.) Ps 97:2.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Prière d’un malheureux, lorsqu’il est abattu et qu’il répand sa plainte devant l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Éternel, écoute ma prière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que mon cri parvienne jusqu’à toi!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ne me cache pas ta face au jour de ma détresse!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Incline vers moi ton oreille quand je crie!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hâte-toi de m’exaucer!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Car mes jours s’évanouissent '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 37:20
      metadata:
        usfm: PSA.37.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: en fumée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et mes os sont enflammés comme un tison.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mon cœur est frappé et se dessèche comme l’herbe;
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’oublie même de manger mon pain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mes gémissements sont tels
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que mes os s’attachent à ma chair.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Je ressemble au pélican du désert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je suis comme le chat-huant des ruines;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Je n’ai plus de sommeil, et je suis
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme l’oiseau solitaire sur un toit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Chaque jour mes ennemis m’outragent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et c’est par moi que jurent mes adversaires en fureur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Je mange la poussière au lieu de pain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je mêle des larmes à ma boisson,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: A cause de ta colère et de ta fureur;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car tu m’as soulevé et jeté au loin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mes jours sont comme l’ombre à son déclin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je me dessèche comme l’herbe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mais toi, Éternel! Tu règnes à perpétuité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ta mémoire dure de génération en génération.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Tu te lèveras, tu auras pitié de Sion;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car le temps d’avoir pitié d’elle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le temps fixé est à son terme;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Car tes serviteurs en aiment les pierres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils en chérissent la poussière.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Alors les nations craindront le nom de l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tous les rois de la terre ta gloire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Oui, l’Éternel rebâtira Sion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il se montrera dans sa gloire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Il est attentif à la prière du misérable,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il ne dédaigne pas sa prière.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Que cela soit écrit pour la génération future,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que le peuple qui sera créé célèbre l’Éternel!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Car il regarde du lieu élevé de sa sainteté;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Du haut des cieux l’Éternel regarde sur la terre,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Pour écouter les gémissements des captifs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour délivrer ceux qui vont périr,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Afin qu’ils publient dans Sion le nom de l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ses louanges dans Jérusalem,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Quand tous les peuples s’assembleront,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tous les royaumes, pour servir l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Il a brisé ma force dans la route,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a abrégé mes jours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Je dis: Mon Dieu, ne m’enlève pas au milieu de mes jours,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toi, dont les années durent éternellement!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Tu as anciennement fondé la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les cieux sont l’ouvrage de tes mains.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ils périront, mais tu subsisteras;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils s’useront tous comme un vêtement;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 1:12
      metadata:
        usfm: HEB.1.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Tu les changeras comme un habit, et ils seront changés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Mais toi, tu restes le même,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tes années ne finiront point.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Les fils de tes serviteurs habiteront leur pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et leur postérité s’affermira devant toi.
