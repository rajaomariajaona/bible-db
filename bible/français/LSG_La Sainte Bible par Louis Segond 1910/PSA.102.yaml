document_id: PSA.102,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Da 9. Ps 137. (És 51; 52:1-10.) Ps 97:2.
  - type: text
    content: Prière d’un malheureux, lorsqu’il est abattu et qu’il répand sa plainte devant l’Éternel.
  '10':
  - type: text
    content: Je mange la poussière au lieu de pain,
  - type: text
    content: Et je mêle des larmes à ma boisson,
  '11':
  - type: text
    content: A cause de ta colère et de ta fureur;
  - type: text
    content: Car tu m’as soulevé et jeté au loin.
  '12':
  - type: text
    content: Mes jours sont comme l’ombre à son déclin,
  - type: text
    content: Et je me dessèche comme l’herbe.
  '13':
  - type: text
    content: Mais toi, Éternel! Tu règnes à perpétuité,
  - type: text
    content: Et ta mémoire dure de génération en génération.
  '14':
  - type: text
    content: Tu te lèveras, tu auras pitié de Sion;
  - type: text
    content: Car le temps d’avoir pitié d’elle,
  - type: text
    content: Le temps fixé est à son terme;
  '15':
  - type: text
    content: Car tes serviteurs en aiment les pierres,
  - type: text
    content: Ils en chérissent la poussière.
  '16':
  - type: text
    content: Alors les nations craindront le nom de l’Éternel,
  - type: text
    content: Et tous les rois de la terre ta gloire.
  '17':
  - type: text
    content: Oui, l’Éternel rebâtira Sion,
  - type: text
    content: Il se montrera dans sa gloire.
  '18':
  - type: text
    content: Il est attentif à la prière du misérable,
  - type: text
    content: Il ne dédaigne pas sa prière.
  '19':
  - type: text
    content: Que cela soit écrit pour la génération future,
  - type: text
    content: Et que le peuple qui sera créé célèbre l’Éternel!
  '2':
  - type: text
    content: Éternel, écoute ma prière,
  - type: text
    content: Et que mon cri parvienne jusqu’à toi!
  '20':
  - type: text
    content: Car il regarde du lieu élevé de sa sainteté;
  - type: text
    content: Du haut des cieux l’Éternel regarde sur la terre,
  '21':
  - type: text
    content: Pour écouter les gémissements des captifs,
  - type: text
    content: Pour délivrer ceux qui vont périr,
  '22':
  - type: text
    content: Afin qu’ils publient dans Sion le nom de l’Éternel,
  - type: text
    content: Et ses louanges dans Jérusalem,
  '23':
  - type: text
    content: Quand tous les peuples s’assembleront,
  - type: text
    content: Et tous les royaumes, pour servir l’Éternel.
  '24':
  - type: text
    content: Il a brisé ma force dans la route,
  - type: text
    content: Il a abrégé mes jours.
  '25':
  - type: text
    content: 'Je dis: Mon Dieu, ne m’enlève pas au milieu de mes jours,'
  - type: text
    content: Toi, dont les années durent éternellement!
  '26':
  - type: text
    content: Tu as anciennement fondé la terre,
  - type: text
    content: Et les cieux sont l’ouvrage de tes mains.
  '27':
  - type: text
    content: Ils périront, mais tu subsisteras;
  - type: text
    content: Ils s’useront tous comme un vêtement;
  - type: note
    content: Hé 1:12.
  - type: text
    content: Tu les changeras comme un habit, et ils seront changés.
  '28':
  - type: text
    content: Mais toi, tu restes le même,
  - type: text
    content: Et tes années ne finiront point.
  '29':
  - type: text
    content: Les fils de tes serviteurs habiteront leur pays,
  - type: text
    content: Et leur postérité s’affermira devant toi.
  '3':
  - type: text
    content: Ne me cache pas ta face au jour de ma détresse!
  - type: text
    content: Incline vers moi ton oreille quand je crie!
  - type: text
    content: Hâte-toi de m’exaucer!
  '4':
  - type: text
    content: 'Car mes jours s’évanouissent '
  - type: note
    content: Ps 37:20.
  - type: text
    content: en fumée,
  - type: text
    content: Et mes os sont enflammés comme un tison.
  '5':
  - type: text
    content: Mon cœur est frappé et se dessèche comme l’herbe;
  - type: text
    content: J’oublie même de manger mon pain.
  '6':
  - type: text
    content: Mes gémissements sont tels
  - type: text
    content: Que mes os s’attachent à ma chair.
  '7':
  - type: text
    content: Je ressemble au pélican du désert,
  - type: text
    content: Je suis comme le chat-huant des ruines;
  '8':
  - type: text
    content: Je n’ai plus de sommeil, et je suis
  - type: text
    content: Comme l’oiseau solitaire sur un toit.
  '9':
  - type: text
    content: Chaque jour mes ennemis m’outragent,
  - type: text
    content: Et c’est par moi que jurent mes adversaires en fureur.
