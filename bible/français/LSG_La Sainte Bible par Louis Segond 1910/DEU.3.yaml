document_id: DEU.3,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Conquête du pays d’Og, roi de Basan
  - type: heading
    content: 'V. 1-11: cf. No 21:33-35. Jos 12:1-6. Ps 136:20-22.'
  - type: text
    content: ' '
  - type: note
    content: No 21:33. De 29:7.
  - type: text
    content: 'Nous nous tournâmes, et nous montâmes par le chemin de Basan. Og, roi de Basan, sortit à notre rencontre, avec tout son peuple, pour nous combattre à Édréï. '
  '10':
  - type: text
    content: 'toutes les villes de la plaine, tout Galaad et tout Basan jusqu’à Salca et Édréï, villes du royaume d’Og en Basan. '
  '11':
  - type: text
    content: (Og, roi de Basan, était resté seul de la race des Rephaïm. Voici, son lit, un lit de fer, n’est-il pas à Rabbath, ville des enfants d’Ammon? Sa longueur est de neuf coudées, et sa largeur de quatre coudées, en coudées d’homme.)
  - type: heading
    content: Le territoire conquis distribué aux Rubénites, aux Gadites, et à la moitié de la tribu de Manassé
  - type: heading
    content: 'V. 12-22: cf. (No 32:33-42. Jos 13:8-32.)'
  '12':
  - type: text
    content: ' '
  - type: note
    content: No 32:33.
  - type: text
    content: 'Nous prîmes alors possession de ce pays. Je donnai aux Rubénites et aux Gadites le territoire à partir d’Aroër sur le torrent de l’Arnon et la moitié de la montagne de Galaad avec ses villes. '
  '13':
  - type: text
    content: 'Je donnai à la moitié de la tribu de Manassé le reste de Galaad et tout le royaume d’Og en Basan: toute la contrée d’Argob, avec tout Basan, c’est ce qu’on appelait le pays des Rephaïm. '
  '14':
  - type: text
    content: 'Jaïr, fils de Manassé, prit toute la contrée d’Argob jusqu’à la frontière des Gueschuriens et des Maacathiens, et il donna son nom aux bourgs de Basan, appelés encore aujourd’hui bourgs de Jaïr. '
  '15':
  - type: text
    content: 'Je donnai Galaad à Makir. '
  '16':
  - type: text
    content: 'Aux Rubénites et aux Gadites je donnai une partie de Galaad jusqu’au torrent de l’Arnon, dont le milieu sert de limite, et jusqu’au torrent de Jabbok, frontière des enfants d’Ammon; '
  '17':
  - type: text
    content: 'je leur donnai encore la plaine, limitée par le Jourdain, depuis Kinnéreth jusqu’à la mer de la plaine, la mer Salée, au pied du Pisga vers l’orient. '
  '18':
  - type: text
    content: 'En ce temps-là, je vous donnai cet ordre. L’Éternel, votre Dieu, '
  - type: note
    content: No 32:20.
  - type: text
    content: 'vous livre ce pays, pour que vous le possédiez. Vous tous, soldats, vous marcherez en armes devant les enfants d’Israël. '
  '19':
  - type: text
    content: 'Vos femmes seulement, vos petits enfants et vos troupeaux, je sais que vous avez de nombreux troupeaux, resteront dans les villes que je vous ai données, '
  '2':
  - type: text
    content: 'L’Éternel me dit: Ne le crains point; car je le livre entre tes mains, lui et tout son peuple, et son pays; tu le traiteras '
  - type: note
    content: No 21:34.
  - type: text
    content: 'comme tu as traité Sihon, roi des Amoréens, qui habitait à Hesbon. '
  '20':
  - type: text
    content: 'jusqu’à ce que l’Éternel ait accordé du repos à vos frères comme à vous, et qu’ils possèdent, eux aussi, le pays que l’Éternel, votre Dieu, leur donne de l’autre côté du Jourdain. Et vous retournerez chacun dans l’héritage que je vous ai donné. '
  '21':
  - type: text
    content: 'En ce temps-là, je '
  - type: note
    content: No 27:18.
  - type: text
    content: 'donnai des ordres à Josué, et je dis: Tes yeux ont vu tout ce que l’Éternel, votre Dieu, a fait à ces deux rois: ainsi fera l’Éternel à tous les royaumes contre lesquels tu vas marcher. '
  '22':
  - type: text
    content: Ne les craignez point; car l’Éternel, votre Dieu, combattra lui-même pour vous.
  - type: heading
    content: 'V. 23-29: cf. De 32:48-52; 34:1-9. Ps 99:8.'
  '23':
  - type: text
    content: 'En ce temps-là, j’implorai la miséricorde de l’Éternel, en disant: '
  '24':
  - type: text
    content: 'Seigneur Éternel, tu as commencé à montrer à ton serviteur ta grandeur et ta main puissante; car '
  - type: note
    content: 1 S 2:2.
  - type: text
    content: 'quel dieu y a-t-il, au ciel et sur la terre, qui puisse imiter tes œuvres et tes hauts faits? '
  '25':
  - type: text
    content: 'Laisse-moi passer, je te prie, laisse-moi voir ce bon pays de l’autre côté du Jourdain, ces belles montagnes et le Liban. '
  '26':
  - type: note
    content: De 1:37; 31:2; 34:4.
  - type: text
    content: 'Mais l’Éternel s’irrita contre moi, à cause de vous, et il ne m’écouta point. L’Éternel me dit: C’est assez, ne me parle plus de cette affaire. '
  '27':
  - type: text
    content: 'Monte au sommet du Pisga, porte tes regards à l’occident, au nord, au midi et à l’orient, et contemple de tes yeux; car tu ne passeras pas ce Jourdain. '
  '28':
  - type: text
    content: 'Donne des ordres à Josué, fortifie-le et affermis-le; car c’est lui qui marchera devant ce peuple et qui le mettra en possession du pays que tu verras. '
  '29':
  - type: text
    content: Nous demeurâmes dans la vallée, vis-à-vis de Beth-Peor.
  '3':
  - type: text
    content: 'Et l’Éternel, notre Dieu, livra encore entre nos mains Og, roi de Basan, avec tout son peuple; nous le battîmes, sans laisser échapper aucun de ses gens. '
  '4':
  - type: text
    content: 'Nous prîmes alors toutes ses villes, et il n’y en eut pas une qui ne tombât en notre pouvoir: soixante villes, toute la contrée d’Argob, le royaume d’Og en Basan. '
  '5':
  - type: text
    content: 'Toutes ces villes étaient fortifiées, avec de hautes murailles, des portes et des barres; il y avait aussi des villes sans murailles en très grand nombre. '
  '6':
  - type: text
    content: 'Nous les dévouâmes par interdit, comme nous l’avions fait à Sihon, roi de Hesbon; nous dévouâmes toutes les villes par interdit, hommes, femmes et petits enfants. '
  '7':
  - type: text
    content: 'Mais nous pillâmes pour nous tout le bétail et le butin des villes. '
  '8':
  - type: text
    content: 'C’est ainsi que, dans ce temps-là, nous conquîmes sur les deux rois des Amoréens le pays de l’autre côté du Jourdain, depuis le torrent de l’Arnon jusqu’à la montagne de l’Hermon '
  '9':
  - type: text
    content: '(les Sidoniens donnent à l’Hermon le nom de Sirion, et les Amoréens celui de Senir,) '
