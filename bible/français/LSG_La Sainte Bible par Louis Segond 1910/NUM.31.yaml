document_id: NUM.31,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Victoire sur les Madianites
  - type: heading
    content: 'V. 1-18: cf. (No 25. Ap 2:14. Jos 13:21, 22.) De 20:1-15.'
  - type: text
    content: 'L’Éternel parla à Moïse, et dit: '
  '10':
  - type: text
    content: 'Ils incendièrent toutes les villes qu’ils habitaient et tous leurs enclos. '
  '11':
  - type: note
    content: De 20:14.
  - type: text
    content: 'Ils prirent toutes les dépouilles et tout le butin, personnes et bestiaux; '
  '12':
  - type: text
    content: 'et ils amenèrent les captifs, le butin et les dépouilles, à Moïse, au sacrificateur Éléazar, et à l’assemblée des enfants d’Israël, campés dans les plaines de Moab, près du Jourdain, vis-à-vis de Jéricho. '
  '13':
  - type: text
    content: 'Moïse, le sacrificateur Éléazar, et tous les princes de l’assemblée, sortirent au-devant d’eux, hors du camp. '
  '14':
  - type: text
    content: 'Et Moïse s’irrita contre les commandants de l’armée, les chefs de milliers et les chefs de centaines, qui revenaient de l’expédition. '
  '15':
  - type: text
    content: 'Il leur dit: Avez-vous laissé la vie à toutes les femmes? '
  '16':
  - type: text
    content: 'Voici, ce sont elles qui, '
  - type: note
    content: No 25:1, 2, 18. 2 Pi 2:15. Ap 2:14.
  - type: text
    content: 'sur la parole de Balaam, ont entraîné les enfants d’Israël à l’infidélité envers l’Éternel, dans l’affaire de Peor; et alors éclata la plaie dans l’assemblée de l’Éternel. '
  '17':
  - type: note
    content: Jg 21:11.
  - type: text
    content: 'Maintenant, tuez tout mâle parmi les petits enfants, et tuez toute femme qui a connu un homme en couchant avec lui; '
  '18':
  - type: text
    content: mais laissez en vie pour vous toutes les filles qui n’ont point connu la couche d’un homme.
  - type: heading
    content: 'V. 19-24: cf. No 19:11-22.'
  '19':
  - type: text
    content: 'Et vous, campez pendant sept jours hors du camp; tous ceux d’entre vous qui ont tué quelqu’un, et tous ceux qui ont touché un mort, se purifieront le troisième et le septième jour, eux et vos prisonniers. '
  '2':
  - type: note
    content: No 25:17.
  - type: text
    content: 'Venge les enfants d’Israël sur les Madianites; '
  - type: note
    content: No 27:13.
  - type: text
    content: 'tu seras ensuite recueilli auprès de ton peuple. '
  '20':
  - type: text
    content: 'Vous purifierez aussi tout vêtement, tout objet de peau, tout ouvrage de poil de chèvre et tout ustensile de bois. '
  '21':
  - type: text
    content: 'Le sacrificateur Éléazar dit aux soldats qui étaient allés à la guerre: Voici ce qui est ordonné par la loi que l’Éternel a prescrite à Moïse. '
  '22':
  - type: text
    content: 'L’or, l’argent, l’airain, le fer, l’étain et le plomb, '
  '23':
  - type: text
    content: 'tout objet qui peut aller au feu, vous le ferez passer par le feu pour le rendre pur. Mais c’est '
  - type: note
    content: No 19:9.
  - type: text
    content: 'par l’eau de purification que sera purifié tout ce qui ne peut aller au feu; vous le ferez passer dans l’eau. '
  '24':
  - type: text
    content: Vous laverez vos vêtements le septième jour, et vous serez purs; ensuite, vous pourrez entrer dans le camp.
  - type: heading
    content: 'V. 25-54: cf. (1 S 30:18, etc. Ge 14:20.) Ps 116:12-14. Pr 3:9.'
  '25':
  - type: text
    content: 'L’Éternel dit à Moïse: '
  '26':
  - type: text
    content: 'Fais, avec le sacrificateur Éléazar et les chefs de maison de l’assemblée, le compte du butin, de ce qui a été pris, personnes et bestiaux. '
  '27':
  - type: note
    content: 1 S 30:24.
  - type: text
    content: 'Partage le butin entre les combattants qui sont allés à l’armée et toute l’assemblée. '
  '28':
  - type: text
    content: 'Tu prélèveras sur la portion des soldats qui sont allés à l’armée un tribut pour l’Éternel, savoir: un sur cinq cents, tant des personnes que des bœufs, des ânes et des brebis. '
  '29':
  - type: text
    content: 'Vous le prendrez sur leur moitié, et tu le donneras au sacrificateur Éléazar comme une offrande à l’Éternel. '
  '3':
  - type: text
    content: 'Moïse parla au peuple, et dit: Équipez d’entre vous des hommes pour l’armée, et qu’ils marchent contre Madian, afin d’exécuter la vengeance de l’Éternel sur Madian. '
  '30':
  - type: text
    content: 'Et sur la moitié qui revient aux enfants d’Israël tu prendras un sur cinquante, tant des personnes que des bœufs, des ânes et des brebis, de tout animal; et tu le donneras aux Lévites, qui ont la garde du tabernacle de l’Éternel. '
  '31':
  - type: text
    content: 'Moïse et le sacrificateur Éléazar firent ce que l’Éternel avait ordonné à Moïse. '
  '32':
  - type: text
    content: 'Le butin, reste du pillage de ceux qui avaient fait partie de l’armée, était de six cent soixante-quinze mille brebis, '
  '33':
  - type: text
    content: 'soixante-douze mille bœufs, '
  '34':
  - type: text
    content: 'soixante et un mille ânes, '
  '35':
  - type: text
    content: 'et trente-deux mille personnes ou femmes qui n’avaient point connu la couche d’un homme. '
  '36':
  - type: text
    content: 'La moitié, formant la part de ceux qui étaient allés à l’armée, fut de trois cent trente-sept mille cinq cents brebis, '
  '37':
  - type: text
    content: 'dont six cent soixante-quinze pour le tribut à l’Éternel; '
  '38':
  - type: text
    content: 'trente-six mille bœufs, dont soixante-douze pour le tribut à l’Éternel; '
  '39':
  - type: text
    content: 'trente mille cinq cents ânes, dont soixante et un pour le tribut à l’Éternel; '
  '4':
  - type: text
    content: 'Vous enverrez à l’armée mille hommes par tribu, de toutes les tribus d’Israël. '
  '40':
  - type: text
    content: 'et seize mille personnes, dont trente-deux pour le tribut à l’Éternel. '
  '41':
  - type: note
    content: No 18:8, 19.
  - type: text
    content: 'Moïse donna au sacrificateur Éléazar le tribut réservé comme offrande à l’Éternel, selon ce que l’Éternel lui avait ordonné. '
  '42':
  - type: text
    content: 'La moitié qui revenait aux enfants d’Israël, séparée par Moïse de celle des hommes de l’armée, '
  '43':
  - type: text
    content: 'et formant la part de l’assemblée, fut de trois cent trente-sept mille cinq cents brebis, '
  '44':
  - type: text
    content: 'trente-six mille bœufs, '
  '45':
  - type: text
    content: 'trente mille cinq cents ânes, '
  '46':
  - type: text
    content: 'et seize mille personnes. '
  '47':
  - type: text
    content: 'Sur cette moitié qui revenait aux enfants d’Israël, Moïse prit un sur cinquante, tant des personnes que des animaux; et il le donna aux Lévites, qui ont la garde du tabernacle de l’Éternel, selon ce que l’Éternel lui avait ordonné. '
  '48':
  - type: text
    content: 'Les commandants des milliers de l’armée, les chefs de milliers et les chefs de centaines, s’approchèrent de Moïse, '
  '49':
  - type: text
    content: 'et lui dirent: Tes serviteurs ont fait le compte des soldats qui étaient sous nos ordres, et il ne manque pas un homme d’entre nous. '
  '5':
  - type: text
    content: 'On leva d’entre les milliers d’Israël mille hommes par tribu, soit douze mille hommes équipés pour l’armée. '
  '50':
  - type: text
    content: 'Nous apportons, comme offrande à l’Éternel, chacun les objets d’or que nous avons trouvés, chaînettes, bracelets, anneaux, pendants d’oreilles, et colliers, afin de faire pour nos personnes l’expiation devant l’Éternel. '
  '51':
  - type: text
    content: 'Moïse et le sacrificateur Éléazar reçurent d’eux tous ces objets travaillés en or. '
  '52':
  - type: text
    content: 'Tout l’or, que les chefs de milliers et les chefs de centaines présentèrent à l’Éternel en offrande par élévation, pesait seize mille sept cent cinquante sicles. '
  '53':
  - type: text
    content: 'Les hommes de l’armée '
  - type: note
    content: De 20:14.
  - type: text
    content: 'gardèrent chacun le butin qu’ils avaient fait. '
  '54':
  - type: text
    content: Moïse et le sacrificateur Éléazar prirent l’or des chefs de milliers et des chefs de centaines, et l’apportèrent à la tente d’assignation, comme souvenir pour les enfants d’Israël devant l’Éternel.
  '6':
  - type: text
    content: 'Moïse envoya à l’armée ces mille hommes par tribu, et avec eux le fils du sacrificateur Éléazar, Phinées, qui portait les instruments sacrés et les trompettes retentissantes. '
  '7':
  - type: text
    content: 'Ils s’avancèrent contre Madian, selon l’ordre que l’Éternel avait donné à Moïse; et ils tuèrent tous les mâles. '
  '8':
  - type: text
    content: 'Ils tuèrent les rois de Madian avec tous les autres, '
  - type: note
    content: Jos 13:21, 22.
  - type: text
    content: 'Évi, Rékem, Tsur, Hur et Réba, cinq rois de Madian; ils tuèrent aussi par l’épée Balaam, fils de Beor. '
  '9':
  - type: text
    content: 'Les enfants d’Israël firent prisonnières les femmes des Madianites avec leurs petits enfants, et ils pillèrent tout leur bétail, tous leurs troupeaux et toutes leurs richesses. '
