document_id: EXO.35,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Offrandes pour la construction du tabernacle
  - type: heading
    content: 'V. 1-3: cf. Ex 31:12-17.'
  - type: text
    content: 'Moïse '
  - type: note
    content: Ex 34:32.
  - type: text
    content: 'convoqua toute l’assemblée des enfants d’Israël, et leur dit: Voici les choses que l’Éternel ordonne de faire. '
  '10':
  - type: text
    content: 'Que tous ceux d’entre vous qui ont de l’habileté viennent et exécutent tout ce que l’Éternel a ordonné: '
  '11':
  - type: note
    content: Ex 26:26.
  - type: text
    content: 'le tabernacle, sa tente et sa couverture, ses agrafes, ses planches, ses barres, ses colonnes et ses bases; '
  '12':
  - type: text
    content: 'l’arche et ses barres, le propitiatoire, et le voile pour couvrir l’arche; '
  '13':
  - type: note
    content: Ex 25:23.
  - type: text
    content: 'la table et ses barres, et tous ses ustensiles, et '
  - type: note
    content: Ex 25:30.
  - type: text
    content: 'les pains de proposition; '
  '14':
  - type: text
    content: 'le chandelier et ses ustensiles, ses lampes, et l’huile pour le chandelier; '
  '15':
  - type: note
    content: Ex 30:1.
  - type: text
    content: 'l’autel des parfums et ses barres, l’huile d’onction et '
  - type: note
    content: Ex 31:11.
  - type: text
    content: 'le parfum odoriférant, et '
  - type: note
    content: Ex 26:36.
  - type: text
    content: 'le rideau de la porte pour l’entrée du tabernacle; '
  '16':
  - type: note
    content: Ex 27:4.
  - type: text
    content: 'l’autel des holocaustes, sa grille d’airain, ses barres, et tous ses ustensiles; '
  - type: note
    content: Ex 30:18.
  - type: text
    content: 'la cuve avec sa base; '
  '17':
  - type: note
    content: Ex 27:9.
  - type: text
    content: 'les toiles du parvis, ses colonnes, ses bases, et '
  - type: note
    content: Ex 27:16.
  - type: text
    content: 'le rideau de la porte du parvis; '
  '18':
  - type: note
    content: Ex 27:19.
  - type: text
    content: 'les pieux du tabernacle, les pieux du parvis, et leurs cordages; les vêtements d’office pour le service dans le sanctuaire, '
  '19':
  - type: text
    content: 'les vêtements sacrés pour le sacrificateur Aaron, et les vêtements de ses '
  - type: note
    content: Ex 31:10. Ex 28.
  - type: text
    content: 'fils pour les fonctions du sacerdoce. '
  '2':
  - type: note
    content: Ex 20:8; 31:15. Lé 23:2. De 5:12. Lu 13:14.
  - type: text
    content: 'On travaillera six jours; mais le septième jour sera pour vous une chose sainte; c’est le sabbat, le jour du repos, consacré à l’Éternel. Celui qui fera quelque ouvrage ce jour-là, sera puni de mort. '
  '20':
  - type: text
    content: 'Toute l’assemblée des enfants d’Israël sortit de la présence de Moïse. '
  '21':
  - type: text
    content: 'Tous ceux qui furent entraînés par le cœur et animés de bonne volonté vinrent et apportèrent une offrande à l’Éternel pour l’œuvre de la tente d’assignation, pour tout son service, et pour les vêtements sacrés. '
  '22':
  - type: text
    content: 'Les hommes vinrent aussi bien que les femmes; tous ceux dont le cœur était bien disposé apportèrent des boucles, des anneaux, des bagues, des bracelets, toutes sortes d’objets d’or; chacun présenta l’offrande d’or qu’il avait consacrée à l’Éternel. '
  '23':
  - type: text
    content: 'Tous ceux qui avaient des étoffes teintes en bleu, en pourpre, en cramoisi, du fin lin et du poil de chèvre, des peaux de béliers teintes en rouge et des peaux de dauphins, les apportèrent. '
  '24':
  - type: text
    content: 'Tous ceux qui présentèrent par élévation une offrande d’argent et d’airain apportèrent l’offrande à l’Éternel. Tous ceux qui avaient du bois d’acacia pour les ouvrages destinés au service, l’apportèrent. '
  '25':
  - type: note
    content: Pr 31:19.
  - type: text
    content: 'Toutes les femmes qui avaient de l’habileté filèrent de leurs mains, et elles apportèrent leur ouvrage, des fils teints en bleu, en pourpre, en cramoisi, et du fin lin. '
  '26':
  - type: text
    content: 'Toutes les femmes dont le cœur était bien disposé, et qui avaient de l’habileté, filèrent du poil de chèvre. '
  '27':
  - type: text
    content: 'Les principaux du peuple apportèrent des pierres d’onyx et d’autres pierres pour la garniture de l’éphod et du pectoral; '
  '28':
  - type: text
    content: 'des aromates et de l’huile '
  - type: note
    content: Ex 25:6.
  - type: text
    content: 'pour le chandelier, pour l’huile d’onction et '
  - type: note
    content: Ex 25:6.
  - type: text
    content: 'pour le parfum odoriférant. '
  '29':
  - type: text
    content: Tous les enfants d’Israël, hommes et femmes, dont le cœur était disposé à contribuer pour l’œuvre que l’Éternel avait ordonnée par Moïse, apportèrent des offrandes volontaires à l’Éternel.
  - type: heading
    content: 'V. 30-35: cf. Ex 31:1-11.'
  '3':
  - type: note
    content: Ex 16:23.
  - type: text
    content: Vous n’allumerez point de feu, dans aucune de vos demeures, le jour du sabbat.
  - type: heading
    content: 'V. 4-29: cf. Ex 25:1-9. 1 Ch 29:1-19.'
  '30':
  - type: text
    content: 'Moïse dit aux enfants d’Israël: Sachez '
  - type: note
    content: Ex 31:2.
  - type: text
    content: 'que l’Éternel a choisi Betsaleel, fils d’Uri, fils de Hur, de la tribu de Juda. '
  '31':
  - type: note
    content: Ex 31:3.
  - type: text
    content: 'Il l’a rempli de l’Esprit de Dieu, de sagesse, d’intelligence, et de savoir pour toutes sortes d’ouvrages. '
  '32':
  - type: note
    content: Ex 31:4.
  - type: text
    content: 'Il l’a rendu capable de faire des inventions, de travailler l’or, l’argent et l’airain, '
  '33':
  - type: note
    content: Ex 31:5.
  - type: text
    content: 'de graver les pierres à enchâsser, de travailler le bois, et d’exécuter toutes sortes d’ouvrages d’art. '
  '34':
  - type: text
    content: 'Il lui a accordé aussi le don d’enseigner, de même qu’à Oholiab, fils d’Ahisamac, de la tribu de Dan. '
  '35':
  - type: note
    content: Ex 26:1.
  - type: text
    content: Il les a remplis d’intelligence, pour exécuter tous les ouvrages de sculpture et d’art, pour broder et tisser les étoffes teintes en bleu, en pourpre, en cramoisi, et le fin lin, pour faire toute espèce de travaux et d’inventions.
  '4':
  - type: text
    content: 'Moïse parla à toute l’assemblée des enfants d’Israël, et dit: Voici ce que l’Éternel a ordonné. '
  '5':
  - type: note
    content: Ex 25:2.
  - type: text
    content: 'Prenez sur ce qui vous appartient une offrande pour l’Éternel. Tout homme dont le cœur est bien disposé apportera en offrande à l’Éternel: de l’or, de l’argent et de l’airain; '
  '6':
  - type: note
    content: Ex 25:4.
  - type: text
    content: 'des étoffes teintes en bleu, en pourpre, en cramoisi, du fin lin et du poil de chèvre; '
  '7':
  - type: note
    content: Ex 25:5.
  - type: text
    content: 'des peaux de béliers teintes en rouge et des peaux de dauphins; du bois d’acacia; '
  '8':
  - type: note
    content: Ex 25:6.
  - type: text
    content: 'de l’huile pour le chandelier, des aromates pour l’huile d’onction et pour le parfum odoriférant; '
  '9':
  - type: note
    content: Ex 25:7; 28:17, 20.
  - type: text
    content: 'des pierres d’onyx et d’autres pierres pour la garniture de l’éphod et du pectoral. '
