document_id: EXO.35
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Offrandes pour la construction du tabernacle
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-3: cf. Ex 31:12-17.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Moïse '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 34:32
      metadata:
        usfm: EXO.34.32
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'convoqua toute l’assemblée des enfants d’Israël, et leur dit: Voici les choses que l’Éternel ordonne de faire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 20:8
      metadata:
        usfm: EXO.20.8
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 31:15
      metadata:
        usfm: EXO.31.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 23:2
      metadata:
        usfm: LEV.23.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 5:12
      metadata:
        usfm: DEU.5.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 13:14
      metadata:
        usfm: LUK.13.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'On travaillera six jours; mais le septième jour sera pour vous une chose sainte; c’est le sabbat, le jour du repos, consacré à l’Éternel. Celui qui fera quelque ouvrage ce jour-là, sera puni de mort. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 16:23
      metadata:
        usfm: EXO.16.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Vous n’allumerez point de feu, dans aucune de vos demeures, le jour du sabbat.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 4-29: cf. Ex 25:1-9. 1 Ch 29:1-19.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Moïse parla à toute l’assemblée des enfants d’Israël, et dit: Voici ce que l’Éternel a ordonné. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 25:2
      metadata:
        usfm: EXO.25.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Prenez sur ce qui vous appartient une offrande pour l’Éternel. Tout homme dont le cœur est bien disposé apportera en offrande à l’Éternel: de l’or, de l’argent et de l’airain; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 25:4
      metadata:
        usfm: EXO.25.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'des étoffes teintes en bleu, en pourpre, en cramoisi, du fin lin et du poil de chèvre; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 25:5
      metadata:
        usfm: EXO.25.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'des peaux de béliers teintes en rouge et des peaux de dauphins; du bois d’acacia; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 25:6
      metadata:
        usfm: EXO.25.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'de l’huile pour le chandelier, des aromates pour l’huile d’onction et pour le parfum odoriférant; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 25:7
      metadata:
        usfm: EXO.25.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 28:17
      metadata:
        usfm: EXO.28.17
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '20'
      metadata:
        usfm: EXO.28.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'des pierres d’onyx et d’autres pierres pour la garniture de l’éphod et du pectoral. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Que tous ceux d’entre vous qui ont de l’habileté viennent et exécutent tout ce que l’Éternel a ordonné: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 26:26
      metadata:
        usfm: EXO.26.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'le tabernacle, sa tente et sa couverture, ses agrafes, ses planches, ses barres, ses colonnes et ses bases; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'l’arche et ses barres, le propitiatoire, et le voile pour couvrir l’arche; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 25:23
      metadata:
        usfm: EXO.25.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'la table et ses barres, et tous ses ustensiles, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 25:30
      metadata:
        usfm: EXO.25.30
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'les pains de proposition; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'le chandelier et ses ustensiles, ses lampes, et l’huile pour le chandelier; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 30:1
      metadata:
        usfm: EXO.30.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'l’autel des parfums et ses barres, l’huile d’onction et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 31:11
      metadata:
        usfm: EXO.31.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'le parfum odoriférant, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 26:36
      metadata:
        usfm: EXO.26.36
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'le rideau de la porte pour l’entrée du tabernacle; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 27:4
      metadata:
        usfm: EXO.27.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'l’autel des holocaustes, sa grille d’airain, ses barres, et tous ses ustensiles; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 30:18
      metadata:
        usfm: EXO.30.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'la cuve avec sa base; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 27:9
      metadata:
        usfm: EXO.27.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'les toiles du parvis, ses colonnes, ses bases, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 27:16
      metadata:
        usfm: EXO.27.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'le rideau de la porte du parvis; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 27:19
      metadata:
        usfm: EXO.27.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'les pieux du tabernacle, les pieux du parvis, et leurs cordages; les vêtements d’office pour le service dans le sanctuaire, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'les vêtements sacrés pour le sacrificateur Aaron, et les vêtements de ses '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 31:10
      metadata:
        usfm: EXO.31.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 28
      metadata:
        usfm: EXO.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'fils pour les fonctions du sacerdoce. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Toute l’assemblée des enfants d’Israël sortit de la présence de Moïse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Tous ceux qui furent entraînés par le cœur et animés de bonne volonté vinrent et apportèrent une offrande à l’Éternel pour l’œuvre de la tente d’assignation, pour tout son service, et pour les vêtements sacrés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Les hommes vinrent aussi bien que les femmes; tous ceux dont le cœur était bien disposé apportèrent des boucles, des anneaux, des bagues, des bracelets, toutes sortes d’objets d’or; chacun présenta l’offrande d’or qu’il avait consacrée à l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Tous ceux qui avaient des étoffes teintes en bleu, en pourpre, en cramoisi, du fin lin et du poil de chèvre, des peaux de béliers teintes en rouge et des peaux de dauphins, les apportèrent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Tous ceux qui présentèrent par élévation une offrande d’argent et d’airain apportèrent l’offrande à l’Éternel. Tous ceux qui avaient du bois d’acacia pour les ouvrages destinés au service, l’apportèrent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 31:19
      metadata:
        usfm: PRO.31.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Toutes les femmes qui avaient de l’habileté filèrent de leurs mains, et elles apportèrent leur ouvrage, des fils teints en bleu, en pourpre, en cramoisi, et du fin lin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Toutes les femmes dont le cœur était bien disposé, et qui avaient de l’habileté, filèrent du poil de chèvre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Les principaux du peuple apportèrent des pierres d’onyx et d’autres pierres pour la garniture de l’éphod et du pectoral; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'des aromates et de l’huile '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 25:6
      metadata:
        usfm: EXO.25.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'pour le chandelier, pour l’huile d’onction et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 25:6
      metadata:
        usfm: EXO.25.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'pour le parfum odoriférant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Tous les enfants d’Israël, hommes et femmes, dont le cœur était disposé à contribuer pour l’œuvre que l’Éternel avait ordonnée par Moïse, apportèrent des offrandes volontaires à l’Éternel.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 30-35: cf. Ex 31:1-11.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Moïse dit aux enfants d’Israël: Sachez '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 31:2
      metadata:
        usfm: EXO.31.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'que l’Éternel a choisi Betsaleel, fils d’Uri, fils de Hur, de la tribu de Juda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 31:3
      metadata:
        usfm: EXO.31.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il l’a rempli de l’Esprit de Dieu, de sagesse, d’intelligence, et de savoir pour toutes sortes d’ouvrages. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 31:4
      metadata:
        usfm: EXO.31.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il l’a rendu capable de faire des inventions, de travailler l’or, l’argent et l’airain, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 31:5
      metadata:
        usfm: EXO.31.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'de graver les pierres à enchâsser, de travailler le bois, et d’exécuter toutes sortes d’ouvrages d’art. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Il lui a accordé aussi le don d’enseigner, de même qu’à Oholiab, fils d’Ahisamac, de la tribu de Dan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 26:1
      metadata:
        usfm: EXO.26.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il les a remplis d’intelligence, pour exécuter tous les ouvrages de sculpture et d’art, pour broder et tisser les étoffes teintes en bleu, en pourpre, en cramoisi, et le fin lin, pour faire toute espèce de travaux et d’inventions.
