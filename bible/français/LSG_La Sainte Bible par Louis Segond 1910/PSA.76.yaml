document_id: PSA.76,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 2 R 19:19-37. (Ps 75; 46.)
  - type: text
    content: Au chef des chantres. Avec instruments à cordes. Psaume d’Asaph. Cantique.
  '10':
  - type: text
    content: Lorsque Dieu s’est levé pour faire justice,
  - type: text
    content: 'Pour sauver tous les malheureux de la terre. '
  - type: text
    content: — Pause.
  '11':
  - type: text
    content: L’homme te célèbre même dans sa fureur,
  - type: text
    content: Quand tu te revêts de tout ton courroux.
  '12':
  - type: text
    content: Faites des vœux à l’Éternel, votre Dieu, et accomplissez-les!
  - type: text
    content: Que tous ceux qui l’environnent apportent des dons au Dieu terrible!
  '13':
  - type: text
    content: Il abat l’orgueil des princes,
  - type: text
    content: Il est redoutable aux rois de la terre.
  '2':
  - type: text
    content: Dieu est connu en Juda,
  - type: text
    content: Son nom est grand en Israël.
  '3':
  - type: text
    content: Sa tente est à Salem,
  - type: text
    content: Et sa demeure à Sion.
  '4':
  - type: text
    content: C’est là qu’il a brisé les flèches,
  - type: text
    content: 'Le bouclier, l’épée et les armes de guerre. '
  - type: text
    content: — Pause.
  '5':
  - type: text
    content: Tu es plus majestueux, plus puissant
  - type: text
    content: Que les montagnes des ravisseurs.
  '6':
  - type: text
    content: Ils ont été dépouillés, ces héros pleins de courage,
  - type: text
    content: Ils se sont endormis de leur dernier sommeil;
  - type: text
    content: Ils n’ont pas su se défendre, tous ces vaillants hommes.
  '7':
  - type: text
    content: A ta menace, Dieu de Jacob!
  - type: text
    content: Ils se sont endormis, cavaliers et chevaux.
  '8':
  - type: text
    content: Tu es redoutable, ô toi!
  - type: text
    content: Qui peut te résister, quand ta colère éclate?
  '9':
  - type: text
    content: Du haut des cieux tu as proclamé la sentence;
  - type: text
    content: La terre effrayée s’est tenue tranquille,
