document_id: PSA.76
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 2 R 19:19-37. (Ps 75; 46.)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef des chantres. Avec instruments à cordes. Psaume d’Asaph. Cantique.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Dieu est connu en Juda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Son nom est grand en Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Sa tente est à Salem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et sa demeure à Sion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: C’est là qu’il a brisé les flèches,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Le bouclier, l’épée et les armes de guerre. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: — Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tu es plus majestueux, plus puissant
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que les montagnes des ravisseurs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ils ont été dépouillés, ces héros pleins de courage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils se sont endormis de leur dernier sommeil;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils n’ont pas su se défendre, tous ces vaillants hommes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: A ta menace, Dieu de Jacob!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils se sont endormis, cavaliers et chevaux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tu es redoutable, ô toi!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui peut te résister, quand ta colère éclate?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Du haut des cieux tu as proclamé la sentence;
- type: usfm
  marker: q1
  children:
  - type: text
    text: La terre effrayée s’est tenue tranquille,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Lorsque Dieu s’est levé pour faire justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Pour sauver tous les malheureux de la terre. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: — Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: L’homme te célèbre même dans sa fureur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand tu te revêts de tout ton courroux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Faites des vœux à l’Éternel, votre Dieu, et accomplissez-les!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que tous ceux qui l’environnent apportent des dons au Dieu terrible!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Il abat l’orgueil des princes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est redoutable aux rois de la terre.
