  children:
  - type: text
    text: Ch. 1 à 9. (Ac 17:26.)
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les dix patriarches d’Adam à Noé
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-4: cf. Ge 5. Ac 17:26.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Adam, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 5:3
      metadata:
        usfm: GEN.5.3
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '4'
      metadata:
        usfm: GEN.5.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Seth, Énosch, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Kénan, Mahalaleel, Jéred, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Hénoc, Metuschélah, Lémec, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Noé.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les fils de Noé et leurs descendants
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 5-16: cf. Ge 10:1-20.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Sem, Cham et Japhet. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ge 10:2, etc.
    marker-yv: yv-n
  - type: text
    text: 'Fils de Japhet: Gomer, Magog, Madaï, Javan, Tubal, Méschec et Tiras. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fils de Gomer: Aschkenaz, Diphat et Togarma. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fils de Javan: Élischa, Tarsisa, Kittim et Rodanim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fils de '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ge 10:6, etc.
    marker-yv: yv-n
  - type: text
    text: 'Cham: Cusch, Mitsraïm, Puth et Canaan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fils de Cusch: Saba, Havila, Sabta, Raema et Sabteca. Fils de Raema: Séba et Dedan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Cusch engendra Nimrod; c’est lui qui commença à être puissant sur la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mitsraïm engendra les Ludim, les Ananim, les Lehabim, les Naphtuhim, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'les Patrusim, les Casluhim, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 10:14
      metadata:
        usfm: GEN.10.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'd’où sont sortis les Philistins, et les Caphtorim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Canaan engendra Sidon, son premier-né, et Heth, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'et les Jébusiens, les Amoréens, les Guirgasiens, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'les Héviens, les Arkiens, les Siniens, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: les Arvadiens, les Tsemariens, les Hamathiens.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 17-23: cf. Ge 10:21-31; 11:10-19.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ge 10:22, etc.
    marker-yv: yv-n
  - type: text
    text: 'Fils de Sem: Élam, Assur, Arpacschad, Lud et Aram; Uts, Hul, Guéter et Méschec. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Arpacschad engendra Schélach; et Schélach engendra Héber. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Il naquit à Héber deux fils: le nom de l’un était Péleg, parce que de son temps la terre fut partagée, et le nom de son frère était Jokthan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Jokthan engendra Almodad, Schéleph, Hatsarmaveth, Jérach, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Hadoram, Uzal, Dikla, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ébal, Abimaël, Séba, Ophir, Havila et Jobab. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Tous ceux-là furent fils de Jokthan.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les dix patriarches de Sem à Abraham
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 24-33: cf. Ge 11:10-27; 25:12-18, 1-6.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Ge 11:10, etc. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 3:36
      metadata:
        usfm: LUK.3.36
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Sem, Arpacschad, Schélach, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Héber, Péleg, Rehu, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Serug, Nachor, Térach, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Abram, qui est Abraham.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les fils d’Abraham et leurs descendants
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 16:15
      metadata:
        usfm: GEN.16.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 21:2
      metadata:
        usfm: GEN.21.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Fils d’Abraham: Isaac et Ismaël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Voici leur postérité. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ge 25:13, etc.
    marker-yv: yv-n
  - type: text
    text: 'Nebajoth, premier-né d’Ismaël, Kédar, Adbeel, Mibsam, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Mischma, Duma, Massa, Hadad, Téma, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Jethur, Naphisch et Kedma. Ce sont là les fils d’Ismaël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 25:2
      metadata:
        usfm: GEN.25.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Fils de Ketura, concubine d’Abraham. Elle enfanta Zimran, Jokschan, Medan, Madian, Jischbak et Schuach. Fils de Jokschan: Séba et Dedan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Fils de Madian: Épha, Épher, Hénoc, Abida et Eldaa. Ce sont là tous les fils de Ketura.'
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 34-42: cf. Ge 25:19-26; 36:1-28.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Abraham engendra Isaac. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ge 25:21, 24, etc.
    marker-yv: yv-n
  - type: text
    text: 'Fils d’Isaac: Ésaü et Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 36:10
      metadata:
        usfm: GEN.36.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Fils d’Ésaü: Éliphaz, Reuel, Jeusch, Jaelam et Koré. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Fils d’Éliphaz: Théman, Omar, Tsephi, Gaetham, Kenaz, Thimna et Amalek. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Fils de Reuel: Nahath, Zérach, Schamma et Mizza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Fils de Séir: Lothan, Schobal, Tsibeon, Ana, Dischon, Étser et Dischan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Fils de Lothan: Hori et Homam. Sœur de Lothan: Thimna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Fils de Schobal: Aljan, Manahath, Ébal, Schephi et Onam. Fils de Tsibeon: Ajja et Ana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Fils d’Ana: Dischon. Fils de Dischon: Hamran, Eschban, Jithran et Keran. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Fils d’Étser: Bilhan, Zaavan et Jaakan. Fils de Dischan: Uts et Aran.'
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 43-54: cf. Ge 36:31-43. Ec 1:4.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Voici les rois qui ont régné dans le pays d’Édom, avant qu’un roi régnât sur les enfants d’Israël. Béla, fils de Beor; et le nom de sa ville était Dinhaba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Béla mourut; et Jobab, fils de Zérach, de Botsra, régna à sa place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Jobab mourut; et Huscham, du pays des Thémanites, régna à sa place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Huscham mourut; et Hadad, fils de Bedad, régna à sa place. C’est lui qui frappa Madian dans les champs de Moab. Le nom de sa ville était Avith. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Hadad mourut; et Samla, de Masréka, régna à sa place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Samla mourut; et Saül, de Rehoboth sur le fleuve, régna à sa place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Saül mourut; et Baal-Hanan, fils d’Acbor, régna à sa place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Baal-Hanan mourut; et Hadad régna à sa place. Le nom de sa ville était Pahi; et le nom de sa femme Mehéthabeel, fille de Mathred, fille de Mézahab. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Hadad mourut. Les chefs d’Édom furent: le chef Thimna, le chef Alja, le chef Jetheth, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'le chef Oholibama, le chef Éla, le chef Pinon, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'le chef Kenaz, le chef Théman, le chef Mibtsar, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: le chef Magdiel, le chef Iram. Ce sont là des chefs d’Édom.
