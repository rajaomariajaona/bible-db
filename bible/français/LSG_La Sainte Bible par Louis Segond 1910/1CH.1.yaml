document_id: 1CH.1,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: TABLES GÉNÉALOGIQUES
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: Ch. 1 à 9. (Ac 17:26.)
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les dix patriarches d’Adam à Noé
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-4: cf. Ge 5. Ac 17:26.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Adam, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 5:3
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '4'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Seth, Énosch, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cusch engendra Nimrod; c’est lui qui commença à être puissant sur la terre. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mitsraïm engendra les Ludim, les Ananim, les Lehabim, les Naphtuhim, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'les Patrusim, les Casluhim, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 10:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'd’où sont sortis les Philistins, et les Caphtorim. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Canaan engendra Sidon, son premier-né, et Heth, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et les Jébusiens, les Amoréens, les Guirgasiens, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'les Héviens, les Arkiens, les Siniens, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: les Arvadiens, les Tsemariens, les Hamathiens.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 17-23: cf. Ge 10:21-31; 11:10-19.'
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ge 10:22, etc.
      marker-yv: yv-n
    - type: text
      text: 'Fils de Sem: Élam, Assur, Arpacschad, Lud et Aram; Uts, Hul, Guéter et Méschec. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Arpacschad engendra Schélach; et Schélach engendra Héber. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il naquit à Héber deux fils: le nom de l’un était Péleg, parce que de son temps la terre fut partagée, et le nom de son frère était Jokthan. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kénan, Mahalaleel, Jéred, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jokthan engendra Almodad, Schéleph, Hatsarmaveth, Jérach, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hadoram, Uzal, Dikla, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ébal, Abimaël, Séba, Ophir, Havila et Jobab. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tous ceux-là furent fils de Jokthan.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les dix patriarches de Sem à Abraham
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 24-33: cf. Ge 11:10-27; 25:12-18, 1-6.'
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Ge 11:10, etc. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 3:36
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Sem, Arpacschad, Schélach, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Héber, Péleg, Rehu, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Serug, Nachor, Térach, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Abram, qui est Abraham.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les fils d’Abraham et leurs descendants
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 16:15
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 21:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Fils d’Abraham: Isaac et Ismaël. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici leur postérité. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ge 25:13, etc.
      marker-yv: yv-n
    - type: text
      text: 'Nebajoth, premier-né d’Ismaël, Kédar, Adbeel, Mibsam, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hénoc, Metuschélah, Lémec, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mischma, Duma, Massa, Hadad, Téma, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jethur, Naphisch et Kedma. Ce sont là les fils d’Ismaël. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 25:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Fils de Ketura, concubine d’Abraham. Elle enfanta Zimran, Jokschan, Medan, Madian, Jischbak et Schuach. Fils de Jokschan: Séba et Dedan. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de Madian: Épha, Épher, Hénoc, Abida et Eldaa. Ce sont là tous les fils de Ketura.'
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 34-42: cf. Ge 25:19-26; 36:1-28.'
    marker-yv: yv-h
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abraham engendra Isaac. '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ge 25:21, 24, etc.
      marker-yv: yv-n
    - type: text
      text: 'Fils d’Isaac: Ésaü et Israël. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 36:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Fils d’Ésaü: Éliphaz, Reuel, Jeusch, Jaelam et Koré. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils d’Éliphaz: Théman, Omar, Tsephi, Gaetham, Kenaz, Thimna et Amalek. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de Reuel: Nahath, Zérach, Schamma et Mizza. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de Séir: Lothan, Schobal, Tsibeon, Ana, Dischon, Étser et Dischan. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de Lothan: Hori et Homam. Sœur de Lothan: Thimna. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Noé.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les fils de Noé et leurs descendants
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 5-16: cf. Ge 10:1-20.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sem, Cham et Japhet. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de Schobal: Aljan, Manahath, Ébal, Schephi et Onam. Fils de Tsibeon: Ajja et Ana. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils d’Ana: Dischon. Fils de Dischon: Hamran, Eschban, Jithran et Keran. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils d’Étser: Bilhan, Zaavan et Jaakan. Fils de Dischan: Uts et Aran.'
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 43-54: cf. Ge 36:31-43. Ec 1:4.'
    marker-yv: yv-h
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici les rois qui ont régné dans le pays d’Édom, avant qu’un roi régnât sur les enfants d’Israël. Béla, fils de Beor; et le nom de sa ville était Dinhaba. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Béla mourut; et Jobab, fils de Zérach, de Botsra, régna à sa place. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jobab mourut; et Huscham, du pays des Thémanites, régna à sa place. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Huscham mourut; et Hadad, fils de Bedad, régna à sa place. C’est lui qui frappa Madian dans les champs de Moab. Le nom de sa ville était Avith. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hadad mourut; et Samla, de Masréka, régna à sa place. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samla mourut; et Saül, de Rehoboth sur le fleuve, régna à sa place. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saül mourut; et Baal-Hanan, fils d’Acbor, régna à sa place. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ge 10:2, etc.
      marker-yv: yv-n
    - type: text
      text: 'Fils de Japhet: Gomer, Magog, Madaï, Javan, Tubal, Méschec et Tiras. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Baal-Hanan mourut; et Hadad régna à sa place. Le nom de sa ville était Pahi; et le nom de sa femme Mehéthabeel, fille de Mathred, fille de Mézahab. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hadad mourut. Les chefs d’Édom furent: le chef Thimna, le chef Alja, le chef Jetheth, '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le chef Oholibama, le chef Éla, le chef Pinon, '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le chef Kenaz, le chef Théman, le chef Mibtsar, '
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: le chef Magdiel, le chef Iram. Ce sont là des chefs d’Édom.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de Gomer: Aschkenaz, Diphat et Togarma. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de Javan: Élischa, Tarsisa, Kittim et Rodanim. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ge 10:6, etc.
      marker-yv: yv-n
    - type: text
      text: 'Cham: Cusch, Mitsraïm, Puth et Canaan. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de Cusch: Saba, Havila, Sabta, Raema et Sabteca. Fils de Raema: Séba et Dedan. '
