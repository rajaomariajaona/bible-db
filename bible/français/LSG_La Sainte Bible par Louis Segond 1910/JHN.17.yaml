    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: j’ai achevé l’œuvre que tu m’as donnée à faire.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Et maintenant toi, Père, glorifie-moi auprès de toi-même de la gloire
  - type: text
    text: ' '
  - type: usfm
    marker: x
