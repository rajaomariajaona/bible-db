document_id: JHN.17,93
type_code: fra
verses:
  '1':
  - type: heading
    content: La prière sacerdotale
  - type: heading
    content: 'V. 1-26: cf. Jn 13:1. (Ro 8:34. Hé 7:24-28; 4:14-16.)'
  - type: text
    content: 'Après avoir ainsi parlé, Jésus leva les yeux au ciel, et dit: '
  - type: text
    content: Père,
  - type: text
    content: ' '
  - type: note
    content: Jn 13:23; 13:32.
  - type: text
    content: l’heure est venue! Glorifie ton Fils, afin que ton Fils te glorifie,
  '10':
  - type: text
    content: et
  - type: text
    content: ' '
  - type: note
    content: Jn 16:15.
  - type: text
    content: tout ce qui est à moi est à toi, et ce qui est à toi est à moi; et je suis glorifié en eux.
  - type: text
    content: ' '
  '11':
  - type: text
    content: Je ne suis plus dans le monde, et ils sont dans le monde, et je vais à toi. Père saint, garde en ton nom ceux que tu m’as donnés, afin qu’ils soient un comme nous.
  - type: text
    content: ' '
  '12':
  - type: note
    content: Jn 6:39; 10:28; 18:9.
  - type: text
    content: Lorsque j’étais avec eux dans le monde, je les gardais en ton nom.
  - type: text
    content: ' '
  - type: note
    content: És 8:18. Hé 2:13.
  - type: text
    content: J’ai gardé ceux que tu m’as donnés, et aucun d’eux ne s’est perdu, sinon le fils de perdition,
  - type: text
    content: ' '
  - type: note
    content: Ps 109:8.
  - type: text
    content: afin que l’Écriture fût accomplie.
  - type: text
    content: ' '
  '13':
  - type: text
    content: Et maintenant je vais à toi, et je dis ces choses dans le monde, afin qu’ils aient en eux ma joie parfaite.
  - type: text
    content: ' '
  '14':
  - type: text
    content: Je leur ai donné ta parole;
  - type: text
    content: ' '
  - type: note
    content: Jn 15:19.
  - type: text
    content: et le monde les a haïs, parce qu’ils ne sont pas du monde, comme moi je ne suis pas du monde.
  - type: text
    content: ' '
  '15':
  - type: text
    content: Je ne te prie pas de les ôter du monde, mais de les préserver du mal.
  - type: text
    content: ' '
  '16':
  - type: text
    content: Ils ne sont pas du monde, comme moi je ne suis pas du monde.
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'Sanctifie-les par ta vérité:'
  - type: text
    content: ' '
  - type: note
    content: Jn 8:40.
  - type: text
    content: ta parole est la vérité.
  - type: text
    content: ' '
  '18':
  - type: note
    content: Jn 20:21.
  - type: text
    content: Comme tu m’as envoyé dans le monde, je les ai aussi envoyés dans le monde.
  - type: text
    content: ' '
  '19':
  - type: note
    content: 1 Co 1:2, 30. 1 Th 4:7.
  - type: text
    content: Et je me sanctifie moi-même pour eux, afin qu’eux aussi soient sanctifiés par la vérité.
  - type: text
    content: ' '
  '2':
  - type: text
    content: ' '
  - type: note
    content: Ps 8:7. Mt 11:27; 28:18. Lu 10:22. Jn 3:35; 5:27. 1 Co 15:25. Ph 2:10. Hé 2:8.
  - type: text
    content: selon que tu lui as donné pouvoir sur toute chair, afin qu’il accorde la vie éternelle à tous ceux que tu lui as donnés.
  - type: text
    content: ' '
  '20':
  - type: text
    content: Ce n’est pas pour eux seulement que je prie, mais encore pour ceux qui croiront en moi par leur parole,
  - type: text
    content: ' '
  '21':
  - type: note
    content: Jn 10:38; 14:11. Ga 3:28.
  - type: text
    content: afin que tous soient un, comme toi, Père, tu es en moi, et comme je suis en toi, afin qu’eux aussi soient un en nous, pour que le monde croie que tu m’as envoyé.
  - type: text
    content: ' '
  '22':
  - type: text
    content: Je leur ai donné la gloire que tu m’as donnée, afin qu’ils soient un comme nous sommes un,
  - type: text
    content: ' '
  '23':
  - type: text
    content: moi en eux, et toi en moi, afin qu’ils soient parfaitement un, et que le monde connaisse que tu m’as envoyé et que tu les as aimés comme tu m’as aimé.
  - type: text
    content: ' '
  '24':
  - type: note
    content: Jn 12:26; 14:3.
  - type: text
    content: Père, je veux que là où je suis ceux que tu m’as donnés soient aussi avec moi, afin qu’ils voient ma gloire, la gloire que tu m’as donnée, parce que tu m’as aimé avant la fondation du monde.
  - type: text
    content: ' '
  '25':
  - type: text
    content: Père juste,
  - type: text
    content: ' '
  - type: note
    content: Jn 15:21; 16:3.
  - type: text
    content: le monde ne t’a point connu; mais moi je t’ai connu,
  - type: text
    content: ' '
  - type: note
    content: Jn 16:27; 17:8.
  - type: text
    content: et ceux-ci ont connu que tu m’as envoyé.
  - type: text
    content: ' '
  '26':
  - type: text
    content: Je leur ai fait connaître ton nom, et je le leur ferai connaître, afin que l’amour dont tu m’as aimé soit en eux, et que je sois en eux.
  '3':
  - type: text
    content: Or,
  - type: text
    content: ' '
  - type: note
    content: És 53:11. Jé 9:23.
  - type: text
    content: la vie éternelle, c’est qu’ils te connaissent, toi, le seul vrai Dieu, et celui que tu as envoyé, Jésus-Christ.
  - type: text
    content: ' '
  '4':
  - type: note
    content: Jn 13:32; 14:13.
  - type: text
    content: Je t’ai glorifié sur la terre,
  - type: text
    content: ' '
  - type: note
    content: Jn 4:34; 19:30.
  - type: text
    content: j’ai achevé l’œuvre que tu m’as donnée à faire.
  - type: text
    content: ' '
  '5':
  - type: text
    content: Et maintenant toi, Père, glorifie-moi auprès de toi-même de la gloire
  - type: text
    content: ' '
  - type: note
    content: Jn 1:1, 2; 10:30; 14:9.
  - type: text
    content: que j’avais auprès de toi avant que le monde fût.
  - type: text
    content: ' '
  '6':
  - type: text
    content: J’ai fait connaître ton nom aux hommes que tu m’as donnés du milieu du monde. Ils étaient à toi, et tu me les as donnés; et ils ont gardé ta parole.
  - type: text
    content: ' '
  '7':
  - type: text
    content: Maintenant ils ont connu que tout ce que tu m’as donné vient de toi.
  - type: text
    content: ' '
  '8':
  - type: text
    content: Car je leur ai donné les paroles que tu m’as données; et ils les ont reçues,
  - type: text
    content: ' '
  - type: note
    content: Jn 16:27.
  - type: text
    content: et ils ont vraiment connu que je suis sorti de toi, et ils ont cru que tu m’as envoyé.
  - type: text
    content: ' '
  '9':
  - type: text
    content: C’est pour eux que je prie. Je ne prie pas pour le monde, mais pour ceux que tu m’as donnés, parce qu’ils sont à toi;
  - type: text
    content: ' '
