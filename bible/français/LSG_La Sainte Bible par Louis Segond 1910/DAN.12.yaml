document_id: DAN.12,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Les temps messianiques
  - type: heading
    content: 'V. 1-4: cf. Mt 24:21, etc. (Jn 5:28, 29. Mt 13:38-43.) (Ph 3:20, 21. 1 Co 15:35, etc.)'
  - type: text
    content: 'En ce temps-là se lèvera Micaël, le grand chef, le défenseur des enfants de ton peuple; et ce sera une époque de détresse, telle qu’il n’y en a point eu de semblable depuis que les nations existent jusqu’à cette époque. En ce temps-là, ceux de ton peuple qui seront trouvés inscrits dans le livre seront sauvés. '
  '10':
  - type: text
    content: 'Plusieurs seront purifiés, blanchis et épurés; les méchants feront le mal et aucun des méchants ne comprendra, mais ceux qui auront de l’intelligence comprendront. '
  '11':
  - type: text
    content: 'Depuis le temps où cessera le sacrifice perpétuel, et où sera dressée l’abomination du dévastateur, il y aura mille deux cent quatre-vingt-dix jours. '
  '12':
  - type: text
    content: 'Heureux celui qui attendra, et qui arrivera jusqu’à mille trois cent trente-cinq jours! '
  '13':
  - type: text
    content: Et toi, marche vers ta fin; tu te reposeras, et tu seras debout pour ton héritage à la fin des jours.
  '2':
  - type: text
    content: 'Plusieurs de ceux qui dorment dans la poussière de la terre se réveilleront, '
  - type: note
    content: Mt 25:46. Jn 5:29.
  - type: text
    content: 'les uns pour la vie éternelle, et les autres pour l’opprobre, pour la honte éternelle. '
  '3':
  - type: text
    content: 'Ceux qui auront été intelligents '
  - type: note
    content: Mt 13:43.
  - type: text
    content: 'brilleront comme la splendeur du ciel, et ceux qui auront enseigné la justice, à la multitude brilleront comme les étoiles, à toujours et à perpétuité. '
  '4':
  - type: text
    content: Toi, Daniel, tiens secrètes ces paroles, et scelle le livre jusqu’au temps de la fin. Plusieurs alors le liront, et la connaissance augmentera.
  - type: heading
    content: 'V. 5-13: cf. Da 7:24-27.'
  '5':
  - type: text
    content: 'Et moi, Daniel, je regardai, et voici, deux autres hommes se tenaient debout, l’un en deçà du bord du fleuve, et l’autre au-delà du bord du fleuve. '
  '6':
  - type: text
    content: 'L’un d’eux dit à l’homme '
  - type: note
    content: Da 10:5.
  - type: text
    content: 'vêtu de lin, qui se tenait au-dessus des eaux du fleuve: Quand sera la fin de ces prodiges? '
  '7':
  - type: text
    content: 'Et '
  - type: note
    content: Ap 10:5, 6.
  - type: text
    content: 'j’entendis l’homme vêtu de lin, qui se tenait au-dessus des eaux du fleuve; il leva vers les cieux sa main droite et sa main gauche, et il jura par celui qui vit éternellement que ce sera dans un temps, des temps, et la moitié d’un temps, et que toutes ces choses finiront quand la force du peuple saint sera entièrement brisée. '
  '8':
  - type: text
    content: 'J’entendis, mais je ne compris pas; et je dis: Mon seigneur, quelle sera l’issue de ces choses? '
  '9':
  - type: text
    content: 'Il répondit: Va, Daniel, car ces paroles seront tenues secrètes et scellées jusqu’au temps de la fin. '
