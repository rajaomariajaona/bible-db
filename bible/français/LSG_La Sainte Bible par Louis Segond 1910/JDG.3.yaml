document_id: JDG.3
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-6: cf. (Jos 13:1-6. Jg 2:1-3, 20-23.) 1 Co 15:33.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Voici les nations que l’Éternel laissa pour éprouver par elles Israël, tous ceux qui n’avaient pas connu toutes les guerres de Canaan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il voulait seulement que les générations des enfants d’Israël connussent et apprissent la guerre, ceux qui ne l’avaient pas connue auparavant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ces nations étaient: les cinq princes des Philistins, tous les Cananéens, les Sidoniens, et les Héviens qui habitaient la montagne du Liban, depuis la montagne de Baal-Hermon jusqu’à l’entrée de Hamath. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ces nations servirent à mettre Israël à l’épreuve, afin que l’Éternel sût s’ils obéiraient aux commandements qu’il avait prescrits à leurs pères par Moïse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Et les enfants d’Israël habitèrent au milieu des Cananéens, des Héthiens, des Amoréens, des Phéréziens, des Héviens et des Jébusiens; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ils prirent leurs filles pour femmes, ils donnèrent à leurs fils leurs propres filles, et ils servirent leurs dieux.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Othniel, Éhud, Schamgar, juges en Israël
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 7-11: cf. (Jg 2:10-16. Ps 106:34-45.) Ap 3:19.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Les enfants d’Israël firent ce qui déplaît à l’Éternel, ils oublièrent l’Éternel, et ils servirent les Baals et les idoles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'La colère de l’Éternel s’enflamma contre Israël, et il les vendit entre les mains de Cuschan-Rischeathaïm, roi de Mésopotamie. Et les enfants d’Israël furent asservis huit ans à Cuschan-Rischeathaïm. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Les enfants d’Israël crièrent à l’Éternel, et l’Éternel leur suscita un libérateur qui les délivra, Othniel, fils de Kenaz, frère cadet de Caleb. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'L’esprit de l’Éternel fut sur lui. Il devint juge en Israël, et il partit pour la guerre. L’Éternel livra entre ses mains Cuschan-Rischeathaïm, roi de Mésopotamie, et sa main fut puissante contre Cuschan-Rischeathaïm. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Le pays fut en repos pendant quarante ans. Et Othniel, fils de Kenaz, mourut.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 12-30: cf. Jg 2:17-19; 4:17-22. Hé 12:6-11.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Les enfants d’Israël firent encore ce qui déplaît à l’Éternel; et l’Éternel fortifia Églon, roi de Moab, contre Israël, parce qu’ils avaient fait ce qui déplaît à l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Églon réunit à lui les fils d’Ammon et les Amalécites, et il se mit en marche. Il battit Israël, et ils s’emparèrent de la ville des palmiers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Et les enfants d’Israël furent asservis dix-huit ans à Églon, roi de Moab. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Les enfants d’Israël crièrent à l’Éternel, et l’Éternel leur suscita un libérateur, Éhud, fils de Guéra, Benjamite, qui ne se servait pas de la main droite. Les enfants d’Israël envoyèrent par lui un présent à Églon, roi de Moab. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Éhud se fit une épée à deux tranchants, longue d’une coudée, et il la ceignit sous ses vêtements, au côté droit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il offrit le présent à Églon, roi de Moab: or Églon était un homme très gras. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Lorsqu’il eut achevé d’offrir le présent, il renvoya les gens qui l’avaient apporté. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Il revint lui-même depuis les carrières près de Guilgal, et il dit: O roi! J’ai quelque chose de secret à te dire. Le roi dit: Silence! Et tous ceux qui étaient auprès de lui sortirent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Éhud l’aborda comme il était assis seul dans sa chambre d’été, et il dit: J’ai une parole de Dieu pour toi. Églon se leva de son siège. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Alors Éhud avança la main gauche, tira l’épée de son côté droit, et la lui enfonça dans le ventre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'La poignée même entra après la lame, et la graisse se referma autour de la lame; car il ne retira pas du ventre l’épée, qui sortit par derrière. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Éhud sortit par le portique, ferma sur lui les portes de la chambre haute, et tira le verrou. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Quand il fut sorti, les serviteurs du roi vinrent et regardèrent; et voici, les portes de la chambre haute étaient fermées au verrou. Ils dirent: Sans doute il se couvre les pieds dans la chambre d’été. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ils attendirent longtemps; et comme il n’ouvrait pas les portes de la chambre haute, ils prirent la clé et ouvrirent, et voici, leur maître était mort, étendu par terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Pendant leurs délais, Éhud prit la fuite, dépassa les carrières, et se sauva à Seïra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dès qu’il fut arrivé, il sonna de la trompette dans la montagne d’Éphraïm. Les enfants d’Israël descendirent avec lui de la montagne, et il se mit à leur tête. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Il leur dit: Suivez-moi, car l’Éternel a livré entre vos mains les Moabites, vos ennemis. Ils descendirent après lui, s’emparèrent des gués du Jourdain vis-à-vis de Moab, et ne laissèrent passer personne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ils battirent dans ce temps-là environ dix mille hommes de Moab, tous robustes, tous vaillants, et pas un n’échappa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: En ce jour, Moab fut humilié sous la main d’Israël. Et le pays fut en repos pendant quatre-vingts ans.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 31: cf. Jg 5:6-8. Am 7:14, 15.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Après lui, il y eut Schamgar, fils d’Anath. Il battit six cents hommes des Philistins avec un aiguillon à bœufs. Et lui aussi fut un libérateur d’Israël.
