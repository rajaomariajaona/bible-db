document_id: JDG.3,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-6: cf. (Jos 13:1-6. Jg 2:1-3, 20-23.) 1 Co 15:33.'
  - type: text
    content: 'Voici les nations que l’Éternel laissa pour éprouver par elles Israël, tous ceux qui n’avaient pas connu toutes les guerres de Canaan. '
  '10':
  - type: text
    content: 'L’esprit de l’Éternel fut sur lui. Il devint juge en Israël, et il partit pour la guerre. L’Éternel livra entre ses mains Cuschan-Rischeathaïm, roi de Mésopotamie, et sa main fut puissante contre Cuschan-Rischeathaïm. '
  '11':
  - type: text
    content: Le pays fut en repos pendant quarante ans. Et Othniel, fils de Kenaz, mourut.
  - type: heading
    content: 'V. 12-30: cf. Jg 2:17-19; 4:17-22. Hé 12:6-11.'
  '12':
  - type: text
    content: 'Les enfants d’Israël firent encore ce qui déplaît à l’Éternel; et l’Éternel fortifia Églon, roi de Moab, contre Israël, parce qu’ils avaient fait ce qui déplaît à l’Éternel. '
  '13':
  - type: text
    content: 'Églon réunit à lui les fils d’Ammon et les Amalécites, et il se mit en marche. Il battit Israël, et ils s’emparèrent de la ville des palmiers. '
  '14':
  - type: text
    content: 'Et les enfants d’Israël furent asservis dix-huit ans à Églon, roi de Moab. '
  '15':
  - type: text
    content: 'Les enfants d’Israël crièrent à l’Éternel, et l’Éternel leur suscita un libérateur, Éhud, fils de Guéra, Benjamite, qui ne se servait pas de la main droite. Les enfants d’Israël envoyèrent par lui un présent à Églon, roi de Moab. '
  '16':
  - type: text
    content: 'Éhud se fit une épée à deux tranchants, longue d’une coudée, et il la ceignit sous ses vêtements, au côté droit. '
  '17':
  - type: text
    content: 'Il offrit le présent à Églon, roi de Moab: or Églon était un homme très gras. '
  '18':
  - type: text
    content: 'Lorsqu’il eut achevé d’offrir le présent, il renvoya les gens qui l’avaient apporté. '
  '19':
  - type: text
    content: 'Il revint lui-même depuis les carrières près de Guilgal, et il dit: O roi! J’ai quelque chose de secret à te dire. Le roi dit: Silence! Et tous ceux qui étaient auprès de lui sortirent. '
  '2':
  - type: text
    content: 'Il voulait seulement que les générations des enfants d’Israël connussent et apprissent la guerre, ceux qui ne l’avaient pas connue auparavant. '
  '20':
  - type: text
    content: 'Éhud l’aborda comme il était assis seul dans sa chambre d’été, et il dit: J’ai une parole de Dieu pour toi. Églon se leva de son siège. '
  '21':
  - type: text
    content: 'Alors Éhud avança la main gauche, tira l’épée de son côté droit, et la lui enfonça dans le ventre. '
  '22':
  - type: text
    content: 'La poignée même entra après la lame, et la graisse se referma autour de la lame; car il ne retira pas du ventre l’épée, qui sortit par derrière. '
  '23':
  - type: text
    content: 'Éhud sortit par le portique, ferma sur lui les portes de la chambre haute, et tira le verrou. '
  '24':
  - type: text
    content: 'Quand il fut sorti, les serviteurs du roi vinrent et regardèrent; et voici, les portes de la chambre haute étaient fermées au verrou. Ils dirent: Sans doute il se couvre les pieds dans la chambre d’été. '
  '25':
  - type: text
    content: 'Ils attendirent longtemps; et comme il n’ouvrait pas les portes de la chambre haute, ils prirent la clé et ouvrirent, et voici, leur maître était mort, étendu par terre. '
  '26':
  - type: text
    content: 'Pendant leurs délais, Éhud prit la fuite, dépassa les carrières, et se sauva à Seïra. '
  '27':
  - type: text
    content: 'Dès qu’il fut arrivé, il sonna de la trompette dans la montagne d’Éphraïm. Les enfants d’Israël descendirent avec lui de la montagne, et il se mit à leur tête. '
  '28':
  - type: text
    content: 'Il leur dit: Suivez-moi, car l’Éternel a livré entre vos mains les Moabites, vos ennemis. Ils descendirent après lui, s’emparèrent des gués du Jourdain vis-à-vis de Moab, et ne laissèrent passer personne. '
  '29':
  - type: text
    content: 'Ils battirent dans ce temps-là environ dix mille hommes de Moab, tous robustes, tous vaillants, et pas un n’échappa. '
  '3':
  - type: text
    content: 'Ces nations étaient: les cinq princes des Philistins, tous les Cananéens, les Sidoniens, et les Héviens qui habitaient la montagne du Liban, depuis la montagne de Baal-Hermon jusqu’à l’entrée de Hamath. '
  '30':
  - type: text
    content: En ce jour, Moab fut humilié sous la main d’Israël. Et le pays fut en repos pendant quatre-vingts ans.
  - type: heading
    content: 'V. 31: cf. Jg 5:6-8. Am 7:14, 15.'
  '31':
  - type: text
    content: Après lui, il y eut Schamgar, fils d’Anath. Il battit six cents hommes des Philistins avec un aiguillon à bœufs. Et lui aussi fut un libérateur d’Israël.
  '4':
  - type: text
    content: 'Ces nations servirent à mettre Israël à l’épreuve, afin que l’Éternel sût s’ils obéiraient aux commandements qu’il avait prescrits à leurs pères par Moïse. '
  '5':
  - type: text
    content: 'Et les enfants d’Israël habitèrent au milieu des Cananéens, des Héthiens, des Amoréens, des Phéréziens, des Héviens et des Jébusiens; '
  '6':
  - type: text
    content: ils prirent leurs filles pour femmes, ils donnèrent à leurs fils leurs propres filles, et ils servirent leurs dieux.
  - type: heading
    content: Othniel, Éhud, Schamgar, juges en Israël
  - type: heading
    content: 'V. 7-11: cf. (Jg 2:10-16. Ps 106:34-45.) Ap 3:19.'
  '7':
  - type: text
    content: 'Les enfants d’Israël firent ce qui déplaît à l’Éternel, ils oublièrent l’Éternel, et ils servirent les Baals et les idoles. '
  '8':
  - type: text
    content: 'La colère de l’Éternel s’enflamma contre Israël, et il les vendit entre les mains de Cuschan-Rischeathaïm, roi de Mésopotamie. Et les enfants d’Israël furent asservis huit ans à Cuschan-Rischeathaïm. '
  '9':
  - type: text
    content: 'Les enfants d’Israël crièrent à l’Éternel, et l’Éternel leur suscita un libérateur qui les délivra, Othniel, fils de Kenaz, frère cadet de Caleb. '
