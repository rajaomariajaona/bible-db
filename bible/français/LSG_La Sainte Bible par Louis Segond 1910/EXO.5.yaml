document_id: EXO.5,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Moïse et Aaron devant le roi d’Égypte
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-4: cf. Ex 3:18, 19. 2 Ch 32:13-19.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Moïse et Aaron se rendirent ensuite auprès de Pharaon, et lui dirent: Ainsi parle l’Éternel, le Dieu d’Israël: Laisse aller mon peuple, pour qu’il célèbre au désert une fête en mon honneur. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Les inspecteurs du peuple et les commissaires vinrent dire au peuple: Ainsi parle Pharaon: Je ne vous donne plus de paille; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'allez vous-mêmes vous procurer de la paille où vous en trouverez, car l’on ne retranche rien de votre travail. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Le peuple se répandit dans tout le pays d’Égypte, pour ramasser du chaume au lieu de paille. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Les inspecteurs les pressaient, en disant: Achevez votre tâche, jour par jour, comme quand il y avait de la paille. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'On battit même les commissaires des enfants d’Israël, établis sur eux par les inspecteurs de Pharaon: Pourquoi, disait-on, n’avez-vous pas achevé hier et aujourd’hui, comme auparavant, la quantité de briques qui vous avait été fixée? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Les commissaires des enfants d’Israël allèrent se plaindre à Pharaon, et lui dirent: Pourquoi traites-tu ainsi tes serviteurs? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'On ne donne point de paille à tes serviteurs, et l’on nous dit: Faites des briques! Et voici, tes serviteurs sont battus, comme si ton peuple était coupable. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Pharaon répondit: Vous êtes des paresseux, des paresseux! Voilà pourquoi vous dites: Allons offrir des sacrifices à l’Éternel! '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Maintenant, allez travailler; on ne vous donnera point de paille, et vous livrerez la même quantité de briques.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 19-23: cf. Ex 6:9, 12. (2 Co 5:7.)'
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Les commissaires des enfants d’Israël virent qu’on les rendait malheureux, en disant: Vous ne retrancherez rien de vos briques; chaque jour la tâche du jour. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Pharaon répondit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 21:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Qui est l’Éternel, pour que j’obéisse à sa voix, en laissant aller Israël? '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 3:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Je ne connais point l’Éternel, et je ne laisserai point aller Israël. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'En sortant de chez Pharaon, ils rencontrèrent Moïse et Aaron qui les attendaient. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ils leur dirent: Que l’Éternel vous regarde, et qu’il juge! Vous nous avez rendus odieux à Pharaon et à ses serviteurs, vous avez mis une épée dans leurs mains pour nous faire périr. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Moïse retourna vers l’Éternel, et dit: Seigneur, pourquoi as-tu fait du mal à ce peuple? Pourquoi m’as-tu envoyé? '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Depuis que je suis allé vers Pharaon pour parler en ton nom, il fait du mal à ce peuple, et tu n’as point délivré ton peuple.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ils dirent: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 3:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Le Dieu des Hébreux nous est apparu. Permets-nous de faire trois journées de marche dans le désert, pour offrir des sacrifices à l’Éternel, afin qu’il ne nous frappe pas de la peste ou de l’épée. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Et le roi d’Égypte leur dit: Moïse et Aaron, pourquoi détournez-vous le peuple de son ouvrage? Allez à vos travaux.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les charges du peuple d’Israël augmentées par ordre de Pharaon
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 5-18: cf. Ex 1:8-14. (Ec 4:1. Ha 1:13.) Ac 14:22.'
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Pharaon dit: Voici, ce peuple est maintenant nombreux dans le pays, et vous lui feriez interrompre ses travaux! '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Et ce jour même, Pharaon donna cet ordre aux inspecteurs du peuple et aux commissaires: '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Vous ne donnerez plus comme auparavant de la paille au peuple pour faire des briques; qu’ils aillent eux-mêmes se ramasser de la paille. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Vous leur imposerez néanmoins la quantité de briques qu’ils faisaient auparavant, vous n’en retrancherez rien; car ce sont des paresseux; voilà pourquoi ils crient, en disant: Allons offrir des sacrifices à notre Dieu! '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Que l’on charge de travail ces gens, qu’ils s’en occupent, et ils ne prendront plus garde à des paroles de mensonge. '
