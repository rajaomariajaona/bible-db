document_id: EZR.5,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La construction du temple reprise
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-17: cf. (Ag 1; 2. Za 1 à 6.) (Ph 1:28. 1 Pi 3:12-15.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ag 1:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Za 1:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Aggée, le prophète, et Zacharie, fils d’Iddo, le prophète, prophétisèrent aux Juifs qui étaient en Juda et à Jérusalem, au nom du Dieu d’Israël. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Nous leur avons aussi demandé leurs noms pour te les faire connaître, et nous avons mis par écrit les noms des hommes qui sont à leur tête.
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Voici la réponse qu’ils nous ont faite: Nous sommes les serviteurs du Dieu des cieux et de la terre, et nous rebâtissons la maison qui avait été construite il y a bien des années; un grand roi d’Israël l’avait bâtie et achevée.'
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Mais
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Ch 36:16, 17, etc.
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: après que nos pères eurent irrité le Dieu des cieux, il les livra entre les mains de Nebucadnetsar, roi de Babylone, le Chaldéen, qui détruisit cette maison et emmena le peuple captif à Babylone.
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 Ch 36:22, etc. Esd 1, etc.
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Toutefois, la première année de Cyrus, roi de Babylone, le roi Cyrus donna l’ordre de rebâtir cette maison de Dieu.
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Et même le roi Cyrus ôta du temple de Babylone les ustensiles d’or et d’argent de la maison de Dieu, que Nebucadnetsar avait enlevés du temple de Jérusalem et transportés dans le temple de Babylone, il les fit
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Esd 1:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: remettre au nommé Scheschbatsar, qu’il établit gouverneur,
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'et il lui dit: Prends ces ustensiles, va les déposer dans le temple de Jérusalem, et que la maison de Dieu soit rebâtie sur le lieu où elle était.'
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ce Scheschbatsar est donc venu, et il a posé les fondements de la maison de Dieu à Jérusalem; depuis lors jusqu’à présent elle se construit, et elle n’est pas achevée.
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Maintenant, si le roi le trouve bon, que l’on fasse des recherches dans la maison des trésors du roi à Babylone, pour voir s’il y a eu de la part du roi Cyrus un ordre donné pour la construction de cette maison de Dieu à Jérusalem. Puis, que le roi nous transmette sa volonté sur cet objet.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Zorobabel, fils de Schealthiel, et Josué, fils de Jotsadak, se levèrent et commencèrent à bâtir la maison de Dieu à Jérusalem. Et avec eux étaient les prophètes de Dieu, qui les assistaient. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dans ce même temps, Thathnaï, gouverneur de ce côté du fleuve, Schethar-Boznaï, et leurs collègues, vinrent auprès d’eux et leur parlèrent ainsi: Qui vous a donné l’autorisation de bâtir cette maison et de relever ces murs? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils leur dirent encore: Quels sont les noms des hommes qui construisent cet édifice? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais l’œil de Dieu veillait sur les anciens des Juifs. Et on laissa continuer les travaux pendant l’envoi d’un rapport à Darius et jusqu’à la réception d’une lettre sur cet objet. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Copie de la lettre envoyée au roi Darius par Thathnaï, gouverneur de ce côté du fleuve. Schethar-Boznaï, et leurs collègues d’Apharsac, demeurant de ce côté du fleuve. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils lui adressèrent un rapport ainsi conçu:'
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Au roi Darius, salut!
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Que le roi sache que nous sommes allés dans la province de Juda, à la maison du grand Dieu. Elle se construit en pierres de taille, et le bois se pose dans les murs; le travail marche rapidement et réussit entre leurs mains.
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Nous avons interrogé les anciens, et nous leur avons ainsi parlé: Qui vous a donné l’autorisation de bâtir cette maison et de relever ces murs?'
    - type: text
      text: ' '
