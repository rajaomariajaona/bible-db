document_id: 2TH.3,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Exhortation à prier pour les progrès de l’Évangile, à s’éloigner de ceux qui vivent dans le désordre, et à travailler paisiblement
  - type: heading
    content: 'V. 1-5: cf. (Col 4:3, 4. Ro 15:30-32.) 1 Co 1:8, 9. Ja 5:7, 8.'
  - type: text
    content: 'Au reste, frères, '
  - type: note
    content: Mt 9:38. Ép 6:19. Col 4:3.
  - type: text
    content: 'priez pour nous, afin que la parole du Seigneur se répande et soit glorifiée comme elle l’est chez-vous, '
  '10':
  - type: text
    content: 'Car, lorsque nous étions chez vous, nous vous disions expressément: Si quelqu’un ne veut pas travailler, qu’il ne mange pas non plus. '
  '11':
  - type: text
    content: 'Nous apprenons, cependant, qu’il y en a parmi vous quelques-uns qui vivent dans le désordre, qui ne travaillent pas, mais qui s’occupent de futilités. '
  '12':
  - type: note
    content: 1 Th 4:11.
  - type: text
    content: 'Nous invitons ces gens-là, et nous les exhortons par le Seigneur Jésus-Christ, à manger leur propre pain, '
  - type: note
    content: Ép 4:28.
  - type: text
    content: 'en travaillant paisiblement. '
  '13':
  - type: text
    content: 'Pour vous, frères, '
  - type: note
    content: Ga 6:9.
  - type: text
    content: 'ne vous lassez pas de faire le bien. '
  '14':
  - type: text
    content: 'Et si quelqu’un n’obéit pas à ce que nous disons par cette lettre, notez-le, '
  - type: note
    content: Mt 18:17. 1 Co 5:9. 2 Th 3:6.
  - type: text
    content: 'et n’ayez point de communication avec lui, afin qu’il éprouve de la honte. '
  '15':
  - type: text
    content: Ne le regardez pas comme un ennemi, mais avertissez-le comme un frère.
  - type: heading
    content: Salutation
  - type: heading
    content: 'V. 16-18: cf. 2 Co 13:11-13.'
  '16':
  - type: text
    content: ' '
  - type: note
    content: Ro 15:33; 16:20. 1 Co 14:33. 2 Co 13:11. Ph 4:9. 1 Th 5:23.
  - type: text
    content: 'Que le Seigneur de la paix vous donne lui-même la paix en tout temps, de toute manière! Que le Seigneur soit avec vous tous! '
  '17':
  - type: note
    content: 1 Co 16:21. Col 4:18.
  - type: text
    content: 'Je vous salue, moi Paul, de ma propre main. C’est là ma signature dans toutes mes lettres; c’est ainsi que j’écris. '
  '18':
  - type: text
    content: Que la grâce de notre Seigneur Jésus-Christ soit avec vous tous!
  '2':
  - type: note
    content: Ro 15:31.
  - type: text
    content: 'et afin que nous soyons délivrés des hommes méchants et pervers; '
  - type: note
    content: Jn 6:44.
  - type: text
    content: 'car tous n’ont pas la foi. '
  '3':
  - type: note
    content: 1 Th 5:24.
  - type: text
    content: 'Le Seigneur est fidèle, il vous affermira '
  - type: note
    content: Jn 17:15.
  - type: text
    content: 'et vous préservera du malin. '
  '4':
  - type: text
    content: 'Nous avons à votre égard cette confiance dans le Seigneur que vous faites et que vous ferez les choses que nous recommandons. '
  '5':
  - type: text
    content: Que le Seigneur dirige vos cœurs vers l’amour de Dieu et vers la patience de Christ!
  - type: heading
    content: 'V. 6-15: cf. 1 Th 2:9, 10; 4:1, 11, 12.'
  '6':
  - type: text
    content: ' '
  - type: note
    content: 1 Co 5:11. 2 Th 3:14. Tit 3:10.
  - type: text
    content: 'nous vous recommandons, frères, au nom de notre Seigneur Jésus-Christ, de vous éloigner de tout frère qui vit dans le désordre, et non selon '
  - type: note
    content: 2 Th 2:15.
  - type: text
    content: 'les instructions que vous avez reçues de nous. '
  '7':
  - type: text
    content: 'Vous savez vous-mêmes '
  - type: note
    content: 1 Co 11:1. 1 Th 1:6, 7.
  - type: text
    content: 'comment il faut nous imiter, '
  - type: note
    content: 1 Th 2:10.
  - type: text
    content: 'car nous n’avons pas vécu parmi vous dans le désordre. '
  '8':
  - type: note
    content: Ac 18:3; 20:34. 1 Co 4:12. 2 Co 11:9; 12:13. 1 Th 2:9.
  - type: text
    content: 'Nous n’avons mangé gratuitement le pain de personne; mais, dans le travail et dans la peine, nous avons été nuit et jour à l’œuvre, pour n’être à charge à aucun de vous. '
  '9':
  - type: note
    content: 1 Co 9:3, 6. 1 Th 2:9.
  - type: text
    content: 'Ce n’est pas que nous n’en eussions le droit, mais nous avons voulu vous donner en nous-mêmes '
  - type: note
    content: 1 Co 4:16; 11:1. Ph 3:17. 1 Th 1:6.
  - type: text
    content: 'un modèle à imiter. '
