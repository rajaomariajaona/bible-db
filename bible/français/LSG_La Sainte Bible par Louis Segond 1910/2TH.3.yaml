document_id: 2TH.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Exhortation à prier pour les progrès de l’Évangile, à s’éloigner de ceux qui vivent dans le désordre, et à travailler paisiblement
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-5: cf. (Col 4:3, 4. Ro 15:30-32.) 1 Co 1:8, 9. Ja 5:7, 8.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Au reste, frères, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 9:38
      metadata:
        usfm: MAT.9.38
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 6:19
      metadata:
        usfm: EPH.6.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 4:3
      metadata:
        usfm: COL.4.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'priez pour nous, afin que la parole du Seigneur se répande et soit glorifiée comme elle l’est chez-vous, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 15:31
      metadata:
        usfm: ROM.15.31
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et afin que nous soyons délivrés des hommes méchants et pervers; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 6:44
      metadata:
        usfm: JHN.6.44
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'car tous n’ont pas la foi. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 5:24
      metadata:
        usfm: 1TH.5.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Le Seigneur est fidèle, il vous affermira '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 17:15
      metadata:
        usfm: JHN.17.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et vous préservera du malin. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nous avons à votre égard cette confiance dans le Seigneur que vous faites et que vous ferez les choses que nous recommandons. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Que le Seigneur dirige vos cœurs vers l’amour de Dieu et vers la patience de Christ!
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 6-15: cf. 1 Th 2:9, 10; 4:1, 11, 12.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 5:11
      metadata:
        usfm: 1CO.5.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Th 3:14
      metadata:
        usfm: 2TH.3.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Tit 3:10
      metadata:
        usfm: TIT.3.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'nous vous recommandons, frères, au nom de notre Seigneur Jésus-Christ, de vous éloigner de tout frère qui vit dans le désordre, et non selon '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Th 2:15
      metadata:
        usfm: 2TH.2.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'les instructions que vous avez reçues de nous. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Vous savez vous-mêmes '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 11:1
      metadata:
        usfm: 1CO.11.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 1:6
      metadata:
        usfm: 1TH.1.6
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '7'
      metadata:
        usfm: 1TH.1.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'comment il faut nous imiter, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 2:10
      metadata:
        usfm: 1TH.2.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'car nous n’avons pas vécu parmi vous dans le désordre. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 18:3
      metadata:
        usfm: ACT.18.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 20:34
      metadata:
        usfm: ACT.20.34
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 4:12
      metadata:
        usfm: 1CO.4.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 11:9
      metadata:
        usfm: 2CO.11.9
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 12:13
      metadata:
        usfm: 2CO.12.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 2:9
      metadata:
        usfm: 1TH.2.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Nous n’avons mangé gratuitement le pain de personne; mais, dans le travail et dans la peine, nous avons été nuit et jour à l’œuvre, pour n’être à charge à aucun de vous. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 9:3
      metadata:
        usfm: 1CO.9.3
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '6'
      metadata:
        usfm: 1CO.9.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 2:9
      metadata:
        usfm: 1TH.2.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ce n’est pas que nous n’en eussions le droit, mais nous avons voulu vous donner en nous-mêmes '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 4:16
      metadata:
        usfm: 1CO.4.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 11:1
      metadata:
        usfm: 1CO.11.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 3:17
      metadata:
        usfm: PHP.3.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 1:6
      metadata:
        usfm: 1TH.1.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'un modèle à imiter. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Car, lorsque nous étions chez vous, nous vous disions expressément: Si quelqu’un ne veut pas travailler, qu’il ne mange pas non plus. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nous apprenons, cependant, qu’il y en a parmi vous quelques-uns qui vivent dans le désordre, qui ne travaillent pas, mais qui s’occupent de futilités. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 4:11
      metadata:
        usfm: 1TH.4.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Nous invitons ces gens-là, et nous les exhortons par le Seigneur Jésus-Christ, à manger leur propre pain, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 4:28
      metadata:
        usfm: EPH.4.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'en travaillant paisiblement. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Pour vous, frères, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 6:9
      metadata:
        usfm: GAL.6.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ne vous lassez pas de faire le bien. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Et si quelqu’un n’obéit pas à ce que nous disons par cette lettre, notez-le, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 18:17
      metadata:
        usfm: MAT.18.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 5:9
      metadata:
        usfm: 1CO.5.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Th 3:6
      metadata:
        usfm: 2TH.3.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et n’ayez point de communication avec lui, afin qu’il éprouve de la honte. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ne le regardez pas comme un ennemi, mais avertissez-le comme un frère.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Salutation
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 16-18: cf. 2 Co 13:11-13.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 15:33
      metadata:
        usfm: ROM.15.33
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 16:20
      metadata:
        usfm: ROM.16.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 14:33
      metadata:
        usfm: 1CO.14.33
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 13:11
      metadata:
        usfm: 2CO.13.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 4:9
      metadata:
        usfm: PHP.4.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 5:23
      metadata:
        usfm: 1TH.5.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Que le Seigneur de la paix vous donne lui-même la paix en tout temps, de toute manière! Que le Seigneur soit avec vous tous! '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 16:21
      metadata:
        usfm: 1CO.16.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 4:18
      metadata:
        usfm: COL.4.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Je vous salue, moi Paul, de ma propre main. C’est là ma signature dans toutes mes lettres; c’est ainsi que j’écris. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Que la grâce de notre Seigneur Jésus-Christ soit avec vous tous!
