document_id: JOS.6
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prise de Jéricho
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-25: cf. Hé 11:30. (De 7:16, 24-26; 20:16-18.) (Jos 2. Hé 11:31.) So 1:16.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jéricho était fermée et barricadée devant les enfants d’Israël. Personne ne sortait, et personne n’entrait. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'L’Éternel dit à Josué: Vois, je livre entre tes mains Jéricho et son roi, ses vaillants soldats. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Faites le tour de la ville, vous tous les hommes de guerre, faites une fois le tour de la ville. Tu feras ainsi pendant six jours. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Sept sacrificateurs porteront devant l’arche sept trompettes retentissantes; le septième jour, vous ferez sept fois le tour de la ville; et les sacrificateurs sonneront des trompettes. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Quand ils sonneront de la corne retentissante, quand vous entendrez le son de la trompette, tout le peuple poussera de grands cris. Alors la muraille de la ville s’écroulera, et le peuple montera, chacun devant soi. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Josué, fils de Nun, appela les sacrificateurs, et leur dit: Portez l’arche de l’alliance, et que sept sacrificateurs portent sept trompettes retentissantes devant l’arche de l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Et il dit au peuple: Marchez, faites le tour de la ville, et que les hommes armés passent devant l’arche de l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Lorsque Josué eut parlé au peuple, les sept sacrificateurs qui portaient devant l’Éternel les sept trompettes retentissantes se mirent en marche et sonnèrent des trompettes. L’arche de l’alliance de l’Éternel allait derrière eux. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Les hommes armés marchaient devant les sacrificateurs qui sonnaient des trompettes, et l’arrière-garde suivait l’arche; pendant la marche, on sonnait des trompettes. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Josué avait donné cet ordre au peuple: Vous ne crierez point, vous ne ferez point entendre votre voix, et il ne sortira pas un mot de votre bouche jusqu’au jour où je vous dirai: Poussez des cris! Alors vous pousserez des cris. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'L’arche de l’Éternel fit le tour de la ville, elle fit une fois le tour; puis on rentra dans le camp, et l’on y passa la nuit. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Josué se leva de bon matin, et les sacrificateurs portèrent l’arche de l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Les sept sacrificateurs qui portaient les sept trompettes retentissantes devant l’arche de l’Éternel se mirent en marche et sonnèrent des trompettes. Les hommes armés marchaient devant eux, et l’arrière-garde suivait l’arche de l’Éternel; pendant la marche, on sonnait des trompettes. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ils firent une fois le tour de la ville, le second jour; puis ils retournèrent dans le camp. Ils firent de même pendant six jours. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Le septième jour, ils se levèrent de bon matin, dès l’aurore, et ils firent de la même manière sept fois le tour de la ville; ce fut le seul jour où ils firent sept fois le tour de la ville. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'A la septième fois, comme les sacrificateurs sonnaient des trompettes, Josué dit au peuple: Poussez des cris, car l’Éternel vous a livré la ville! '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'La ville sera dévouée à l’Éternel par interdit, elle et tout ce qui s’y trouve; mais on laissera la vie à Rahab la prostituée et à tous ceux qui seront avec elle dans la maison, parce qu’elle a caché les messagers que nous avions envoyés. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Gardez-vous seulement de ce qui sera dévoué par interdit; car si vous preniez de ce que vous aurez dévoué par interdit, vous mettriez le camp d’Israël en interdit et vous y jetteriez le trouble. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 31:54
      metadata:
        usfm: NUM.31.54
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tout l’argent et tout l’or, tous les objets d’airain et de fer, seront consacrés à l’Éternel, et entreront dans le trésor de l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Le peuple poussa des cris, et les sacrificateurs sonnèrent des trompettes. Lorsque le peuple entendit le son de la trompette, il poussa de grands cris, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 11:30
      metadata:
        usfm: HEB.11.30
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et la muraille s’écroula; le peuple monta dans la ville, chacun devant soi. Ils s’emparèrent de la ville, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'et ils dévouèrent par interdit, au fil de l’épée, tout ce qui était dans la ville, hommes et femmes, enfants et vieillards, jusqu’aux bœufs, aux brebis et aux ânes. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Josué dit aux deux hommes qui avaient exploré le pays: Entrez dans la maison de la femme prostituée, et faites-en sortir cette femme et tous ceux qui lui appartiennent, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 2:14
      metadata:
        usfm: JOS.2.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 11:31
      metadata:
        usfm: HEB.11.31
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'comme vous le lui avez juré. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Les jeunes gens, les espions, entrèrent et firent sortir Rahab, son père, sa mère, ses frères, et tous ceux qui lui appartenaient; ils firent sortir tous les gens de sa famille, et ils les déposèrent hors du camp d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ils brûlèrent la ville et tout ce qui s’y trouvait; seulement ils mirent dans le trésor de la maison de l’Éternel l’argent, l’or et tous les objets d’airain et de fer. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Josué laissa la vie à Rahab la prostituée, à la maison de son père, et à tous ceux qui lui appartenaient; elle a habité au milieu d’Israël jusqu’à ce jour, parce qu’elle avait caché les messagers que Josué avait envoyés pour explorer Jéricho.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 26-27: cf. 1 R 16:34. (Ps 37:22. És 55:11.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ce fut alors que Josué jura, en disant: Maudit soit devant l’Éternel l’homme qui se lèvera pour rebâtir cette ville de Jéricho! Il en jettera les fondements au prix de son premier-né, et il en posera les portes au prix de son plus jeune fils. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: L’Éternel fut avec Josué, dont la renommée se répandit dans tout le pays.
