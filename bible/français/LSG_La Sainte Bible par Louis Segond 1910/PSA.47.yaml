document_id: PSA.47,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ps 68; 98.
  - type: text
    content: Au chef des chantres. Des fils de Koré. Psaume.
  '10':
  - type: text
    content: Les princes des peuples se réunissent
  - type: text
    content: Au peuple du Dieu d’Abraham;
  - type: text
    content: 'Car à Dieu sont les boucliers de la terre:'
  - type: text
    content: Il est souverainement élevé.
  '2':
  - type: text
    content: Vous tous, peuples, battez des mains!
  - type: text
    content: Poussez vers Dieu des cris de joie!
  '3':
  - type: text
    content: Car l’Éternel, le Très-Haut, est redoutable,
  - type: text
    content: Il est un grand roi sur toute la terre.
  '4':
  - type: text
    content: Il nous assujettit des peuples,
  - type: text
    content: Il met des nations sous nos pieds;
  '5':
  - type: text
    content: Il nous choisit notre héritage,
  - type: text
    content: 'La gloire de Jacob qu’il aime. '
  - type: text
    content: — Pause.
  '6':
  - type: text
    content: Dieu monte au milieu des cris de triomphe,
  - type: text
    content: L’Éternel s’avance au son de la trompette.
  '7':
  - type: text
    content: Chantez à Dieu, chantez!
  - type: text
    content: Chantez à notre roi, chantez!
  '8':
  - type: text
    content: 'Car Dieu est roi de toute la terre:'
  - type: text
    content: Chantez un cantique!
  '9':
  - type: text
    content: Dieu règne sur les nations,
  - type: text
    content: Dieu a pour siège son saint trône.
