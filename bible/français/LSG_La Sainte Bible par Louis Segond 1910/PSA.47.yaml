document_id: PSA.47,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: Ps 68; 98.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au chef des chantres. Des fils de Koré. Psaume.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les princes des peuples se réunissent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au peuple du Dieu d’Abraham;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car à Dieu sont les boucliers de la terre:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est souverainement élevé.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous tous, peuples, battez des mains!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Poussez vers Dieu des cris de joie!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car l’Éternel, le Très-Haut, est redoutable,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est un grand roi sur toute la terre.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il nous assujettit des peuples,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il met des nations sous nos pieds;
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il nous choisit notre héritage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'La gloire de Jacob qu’il aime. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: — Pause.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu monte au milieu des cris de triomphe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel s’avance au son de la trompette.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Chantez à Dieu, chantez!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Chantez à notre roi, chantez!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car Dieu est roi de toute la terre:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Chantez un cantique!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu règne sur les nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu a pour siège son saint trône.
