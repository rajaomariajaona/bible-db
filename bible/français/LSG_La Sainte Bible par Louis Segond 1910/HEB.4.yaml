document_id: HEB.4,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-13: cf. Hé 3:6-19; 10:35-39. És 26:3. Jé 23:29.'
  - type: text
    content: 'Craignons donc, tandis que la promesse d’entrer dans son repos subsiste encore, qu’aucun de vous ne paraisse être venu trop tard. '
  '10':
  - type: text
    content: 'Car celui qui entre dans le repos de Dieu se repose de ses œuvres, comme Dieu s’est reposé des siennes. '
  '11':
  - type: text
    content: 'Efforçons-nous donc d’entrer dans ce repos, afin que personne ne tombe en donnant le même exemple de désobéissance. '
  '12':
  - type: text
    content: 'Car la parole de Dieu est vivante et efficace, plus tranchante '
  - type: note
    content: Ec 12:11. És 49:2. Ép 6:17.
  - type: text
    content: 'qu’une épée quelconque à deux tranchants, pénétrante jusqu’à partager âme et esprit, jointures et mœlles; elle juge les sentiments et les pensées du cœur. '
  '13':
  - type: note
    content: Ps 33:13.
  - type: text
    content: Nulle créature n’est cachée devant lui, mais tout est à nu et à découvert aux yeux de celui à qui nous devons rendre compte.
  - type: heading
    content: Jésus est un souverain sacrificateur supérieur à ceux de l’ancienne alliance. Son sacerdoce, semblable à celui de Melchisédek, subsiste éternellement et implique l’abolition du sacerdoce lévitique
  - type: heading
    content: 'V. 14-16: cf. Hé 9:11, 12, 24; 10:21-23; 2:17, 18.'
  '14':
  - type: text
    content: ' '
  - type: note
    content: Hé 3:1; 6:20; 8:1; 9:11.
  - type: text
    content: 'Ainsi, puisque nous avons un grand souverain sacrificateur qui a traversé les cieux, Jésus, le Fils de Dieu, demeurons fermes dans la foi que nous professons. '
  '15':
  - type: note
    content: Hé 2:18.
  - type: text
    content: 'Car nous n’avons pas un souverain sacrificateur qui ne puisse compatir à nos faiblesses; '
  - type: note
    content: Ph 2:7.
  - type: text
    content: 'au contraire, il a été tenté comme nous en toutes choses, '
  - type: note
    content: És 53:9. 2 Co 5:21. 1 Pi 2:22. 1 Jn 3:5.
  - type: text
    content: 'sans commettre de péché. '
  '16':
  - type: text
    content: 'Approchons-nous donc avec assurance '
  - type: note
    content: Ro 3:25.
  - type: text
    content: du trône de la grâce, afin d’obtenir miséricorde et de trouver grâce, pour être secourus dans nos besoins.
  '2':
  - type: text
    content: 'Car cette bonne nouvelle nous a été annoncée aussi bien qu’à eux; mais la parole qui leur fut annoncée ne leur servit de rien, parce qu’elle ne trouva pas de la foi chez ceux qui l’entendirent. '
  '3':
  - type: text
    content: 'Pour nous qui avons cru, nous entrons dans le repos, selon qu’il dit:'
  - type: note
    content: Ps 25:11.
  - type: text
    content: 'Je jurai dans ma colère:'
  - type: text
    content: Ils n’entreront pas dans mon repos!
  - type: text
    content: 'Il dit cela, quoique ses œuvres eussent été achevées depuis la création du monde. '
  '4':
  - type: text
    content: 'Car il a parlé quelque part ainsi du septième jour: '
  - type: note
    content: Ge 2:2. Ex 20:11; 31:17.
  - type: text
    content: 'Et Dieu se reposa de toutes ses œuvres le septième jour. '
  '5':
  - type: text
    content: 'Et ici encore:'
  - type: text
    content: 'Ils n’entreront pas dans mon repos! '
  '6':
  - type: text
    content: 'Or, puisqu’il est encore réservé à quelques-uns d’y entrer, et que ceux à qui d’abord la promesse a été faite n’y sont pas entrés à cause de leur désobéissance, '
  '7':
  - type: text
    content: 'Dieu fixe de nouveau un jour, aujourd’hui, en disant dans David si longtemps après, comme il est dit plus haut:'
  - type: note
    content: Ps 95:7. Hé 3:7.
  - type: text
    content: Aujourd’hui, si vous entendez sa voix,
  - type: text
    content: 'N’endurcissez pas vos cœurs. '
  '8':
  - type: text
    content: 'Car, si Josué leur eût donné le repos, il ne parlerait pas après cela d’un autre jour. '
  '9':
  - type: text
    content: 'Il y a donc un repos de sabbat réservé au peuple de Dieu. '
