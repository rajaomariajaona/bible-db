document_id: HEB.4
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-13: cf. Hé 3:6-19; 10:35-39. És 26:3. Jé 23:29.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Craignons donc, tandis que la promesse d’entrer dans son repos subsiste encore, qu’aucun de vous ne paraisse être venu trop tard. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Car cette bonne nouvelle nous a été annoncée aussi bien qu’à eux; mais la parole qui leur fut annoncée ne leur servit de rien, parce qu’elle ne trouva pas de la foi chez ceux qui l’entendirent. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Pour nous qui avons cru, nous entrons dans le repos, selon qu’il dit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 25:11
      metadata:
        usfm: PSA.25.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Je jurai dans ma colère:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils n’entreront pas dans mon repos!
- type: usfm
  marker: m
  children:
  - type: text
    text: 'Il dit cela, quoique ses œuvres eussent été achevées depuis la création du monde. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Car il a parlé quelque part ainsi du septième jour: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 2:2
      metadata:
        usfm: GEN.2.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 20:11
      metadata:
        usfm: EXO.20.11
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 31:17
      metadata:
        usfm: EXO.31.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Et Dieu se reposa de toutes ses œuvres le septième jour. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Et ici encore:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ils n’entreront pas dans mon repos! '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Or, puisqu’il est encore réservé à quelques-uns d’y entrer, et que ceux à qui d’abord la promesse a été faite n’y sont pas entrés à cause de leur désobéissance, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dieu fixe de nouveau un jour, aujourd’hui, en disant dans David si longtemps après, comme il est dit plus haut:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 95:7
      metadata:
        usfm: PSA.95.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 3:7
      metadata:
        usfm: HEB.3.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Aujourd’hui, si vous entendez sa voix,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'N’endurcissez pas vos cœurs. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Car, si Josué leur eût donné le repos, il ne parlerait pas après cela d’un autre jour. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il y a donc un repos de sabbat réservé au peuple de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Car celui qui entre dans le repos de Dieu se repose de ses œuvres, comme Dieu s’est reposé des siennes. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Efforçons-nous donc d’entrer dans ce repos, afin que personne ne tombe en donnant le même exemple de désobéissance. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Car la parole de Dieu est vivante et efficace, plus tranchante '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ec 12:11
      metadata:
        usfm: ECC.12.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 49:2
      metadata:
        usfm: ISA.49.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 6:17
      metadata:
        usfm: EPH.6.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qu’une épée quelconque à deux tranchants, pénétrante jusqu’à partager âme et esprit, jointures et mœlles; elle juge les sentiments et les pensées du cœur. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 33:13
      metadata:
        usfm: PSA.33.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Nulle créature n’est cachée devant lui, mais tout est à nu et à découvert aux yeux de celui à qui nous devons rendre compte.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus est un souverain sacrificateur supérieur à ceux de l’ancienne alliance. Son sacerdoce, semblable à celui de Melchisédek, subsiste éternellement et implique l’abolition du sacerdoce lévitique
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 14-16: cf. Hé 9:11, 12, 24; 10:21-23; 2:17, 18.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 3:1
      metadata:
        usfm: HEB.3.1
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 6:20
      metadata:
        usfm: HEB.6.20
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 8:1
      metadata:
        usfm: HEB.8.1
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 9:11
      metadata:
        usfm: HEB.9.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ainsi, puisque nous avons un grand souverain sacrificateur qui a traversé les cieux, Jésus, le Fils de Dieu, demeurons fermes dans la foi que nous professons. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 2:18
      metadata:
        usfm: HEB.2.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Car nous n’avons pas un souverain sacrificateur qui ne puisse compatir à nos faiblesses; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 2:7
      metadata:
        usfm: PHP.2.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'au contraire, il a été tenté comme nous en toutes choses, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 53:9
      metadata:
        usfm: ISA.53.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 5:21
      metadata:
        usfm: 2CO.5.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 2:22
      metadata:
        usfm: 1PE.2.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 3:5
      metadata:
        usfm: 1JN.3.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'sans commettre de péché. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Approchons-nous donc avec assurance '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 3:25
      metadata:
        usfm: ROM.3.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: du trône de la grâce, afin d’obtenir miséricorde et de trouver grâce, pour être secourus dans nos besoins.
