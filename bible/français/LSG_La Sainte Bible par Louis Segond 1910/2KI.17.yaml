document_id: 2KI.17,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Osée, dernier roi d’Israël. — Siège et prise de Samarie par Salmanasar, roi d’Assyrie. — Les habitants du royaume d’Israël emmenés en captivité
  - type: heading
    content: 'V. 1-6: cf. 2 R 18:9-12. 2 Ch 30:6-11. Os 8:7, 9; 9:3.'
  - type: text
    content: 'La douzième année d’Achaz, roi de Juda, Osée, fils d’Éla, régna sur Israël à Samarie. Il régna neuf ans. '
  '10':
  - type: text
    content: 'Ils se dressèrent des statues et des idoles sur toute colline élevée et sous tout arbre vert. '
  '11':
  - type: text
    content: 'Et là ils brûlèrent des parfums sur tous les hauts lieux, comme les nations que l’Éternel avait chassées devant eux, et ils firent des choses mauvaises, par lesquelles ils irritèrent l’Éternel. '
  '12':
  - type: text
    content: 'Ils servirent les idoles dont l’Éternel leur avait dit: '
  - type: note
    content: Ex 20:3, 4, 5. De 5:7, 8, 9.
  - type: text
    content: 'Vous ne ferez pas cela. '
  '13':
  - type: text
    content: 'L’Éternel fit avertir Israël et Juda par tous ses prophètes, par tous les voyants, et leur dit: '
  - type: note
    content: Jé 18:11; 25:5; 35:15.
  - type: text
    content: 'Revenez de vos mauvaises voies, et observez mes commandements et mes ordonnances, en suivant entièrement la loi que j’ai prescrite à vos pères et que je vous ai envoyée par mes serviteurs les prophètes. '
  '14':
  - type: text
    content: 'Mais ils n’écoutèrent point, et ils '
  - type: note
    content: De 31:27. Mal 3:7.
  - type: text
    content: 'roidirent leur cou, comme leurs pères, qui n’avaient pas cru en l’Éternel, leur Dieu. '
  '15':
  - type: text
    content: 'Ils rejetèrent ses lois, l’alliance qu’il avait faite avec leurs pères, et les avertissements qu’il leur avait adressés. Ils allèrent après des choses de néant et ne furent eux-mêmes que néant, et après les nations qui les entouraient et que l’Éternel leur avait défendu d’imiter. '
  '16':
  - type: text
    content: 'Ils abandonnèrent tous les commandements de l’Éternel, leur Dieu, '
  - type: note
    content: Ex 32:8. 1 R 12:28.
  - type: text
    content: 'ils se firent deux veaux en fonte, ils fabriquèrent des idoles d’Astarté, ils se prosternèrent devant toute l’armée des cieux, et ils servirent Baal. '
  '17':
  - type: note
    content: Lé 20:3, 4. De 18:10. 2 R 16:3.
  - type: text
    content: 'Ils firent passer par le feu leurs fils et leurs filles, ils se livrèrent à la divination et aux enchantements, et ils se vendirent pour faire ce qui est mal aux yeux de l’Éternel, afin de l’irriter. '
  '18':
  - type: text
    content: 'Aussi l’Éternel s’est-il fortement irrité contre Israël, et '
  - type: note
    content: Os 1:6.
  - type: text
    content: 'les a-t-il éloignés de sa face. Il n’est resté que la seule tribu de Juda. '
  '19':
  - type: text
    content: 'Juda même n’avait pas gardé les commandements de l’Éternel, son Dieu, et '
  - type: note
    content: Lé 18:3.
  - type: text
    content: 'ils avaient suivi les coutumes établies par Israël. '
  '2':
  - type: text
    content: 'Il fit ce qui est mal aux yeux de l’Éternel, non pas toutefois comme les rois d’Israël qui avaient été avant lui. '
  '20':
  - type: text
    content: 'L’Éternel a rejeté toute la race d’Israël; il les a humiliés, il les a livrés entre les mains des pillards, et il a fini par les chasser loin de sa face. '
  '21':
  - type: text
    content: 'Car Israël s’était '
  - type: note
    content: 1 R 12:16, 17, 26.
  - type: text
    content: 'détaché de la maison de David, et ils avaient fait roi Jéroboam, fils de Nebath, qui les avait détournés de l’Éternel, et avait fait commettre à Israël un grand péché. '
  '22':
  - type: text
    content: 'Les enfants d’Israël s’étaient livrés à tous les péchés que Jéroboam avait commis; ils ne s’en détournèrent point, '
  '23':
  - type: text
    content: jusqu’à ce que l’Éternel eût chassé Israël loin de sa face, comme il l’avait annoncé par tous ses serviteurs les prophètes. Et Israël a été emmené captif loin de son pays en Assyrie, où il est resté jusqu’à ce jour.
  - type: heading
    content: Les Samaritains
  - type: heading
    content: 'V. 24-41: cf. Esd 4. Jn 4.'
  '24':
  - type: text
    content: 'Le roi d’Assyrie fit venir des gens de Babylone, de Cutha, d’Avva, de Hamath et de Sepharvaïm, et les établit dans les villes de Samarie à la place des enfants d’Israël. Ils prirent possession de Samarie, et ils habitèrent dans ses villes. '
  '25':
  - type: text
    content: 'Lorsqu’ils commencèrent à y habiter, ils ne craignaient pas l’Éternel, et l’Éternel envoya contre eux des lions qui les tuaient. '
  '26':
  - type: text
    content: 'On dit au roi d’Assyrie: Les nations que tu as transportées et établies dans les villes de Samarie ne connaissent pas la manière de servir le dieu du pays, et il a envoyé contre elles des lions qui les font mourir, parce qu’elles ne connaissent pas la manière de servir le dieu du pays. '
  '27':
  - type: text
    content: 'Le roi d’Assyrie donna cet ordre: Faites-y aller l’un des prêtres que vous avez emmenés de là en captivité; qu’il parte pour s’y établir, et qu’il leur enseigne la manière de servir le dieu du pays. '
  '28':
  - type: text
    content: 'Un des prêtres qui avaient été emmenés captifs de Samarie vint s’établir à Béthel, et leur enseigna comment ils devaient craindre l’Éternel. '
  '29':
  - type: text
    content: 'Mais les nations firent chacune leurs dieux dans les villes qu’elles habitaient, et les placèrent dans les maisons des hauts lieux bâties par les Samaritains. '
  '3':
  - type: text
    content: 'Salmanasar, roi d’Assyrie, monta contre lui; et Osée lui fut assujetti, et lui paya un tribut. '
  '30':
  - type: text
    content: 'Les gens de Babylone firent Succoth-Benoth, les gens de Cuth firent Nergal, les gens de Hamath firent Aschima, '
  '31':
  - type: text
    content: 'ceux d’Avva firent Nibchaz et Tharthak; ceux de Sepharvaïm brûlaient leurs enfants par le feu en l’honneur d’Adrammélec et d’Anammélec, dieux de Sepharvaïm. '
  '32':
  - type: text
    content: 'Ils craignaient aussi l’Éternel, et '
  - type: note
    content: 1 R 12:31.
  - type: text
    content: 'ils se créèrent des prêtres des hauts lieux pris parmi tout le peuple: ces prêtres offraient pour eux des sacrifices dans les maisons des hauts lieux. '
  '33':
  - type: note
    content: So 1:5.
  - type: text
    content: 'Ainsi ils craignaient l’Éternel, et ils servaient en même temps leurs dieux d’après la coutume des nations d’où on les avait transportés. '
  '34':
  - type: text
    content: 'Ils suivent encore aujourd’hui leurs premiers usages: ils ne craignent point l’Éternel, et ils ne se conforment ni à leurs lois et à leurs ordonnances, ni à la loi et aux commandements prescrits par l’Éternel aux enfants de Jacob '
  - type: note
    content: Ge 32:28; 35:10. 1 R 18:31.
  - type: text
    content: 'qu’il appela du nom d’Israël. '
  '35':
  - type: text
    content: 'L’Éternel avait fait alliance avec eux, et leur avait donné cet ordre: '
  - type: note
    content: Jg 6:10.
  - type: text
    content: 'Vous ne craindrez point d’autres dieux; vous ne vous prosternerez point devant eux, vous ne les servirez point, et vous ne leur offrirez point de sacrifices. '
  '36':
  - type: text
    content: 'Mais vous craindrez l’Éternel, qui vous a fait monter du pays d’Égypte avec une grande puissance et à bras étendu; c’est devant lui que vous vous prosternerez, et c’est à lui que vous offrirez des sacrifices. '
  '37':
  - type: text
    content: 'Vous observerez et mettrez toujours en pratique les préceptes, les ordonnances, la loi et les commandements, qu’il a écrits pour vous, et vous ne craindrez point d’autres dieux. '
  '38':
  - type: text
    content: 'Vous n’oublierez pas l’alliance que j’ai faite avec vous, et vous ne craindrez point d’autres dieux. '
  '39':
  - type: text
    content: 'Mais vous craindrez l’Éternel, votre Dieu; et il vous délivrera de la main de tous vos ennemis. '
  '4':
  - type: text
    content: 'Mais le roi d’Assyrie découvrit une conspiration chez Osée, qui avait envoyé des messagers à So, roi d’Égypte, et qui ne payait plus annuellement le tribut au roi d’Assyrie. Le roi d’Assyrie le fit enfermer et enchaîner dans une prison. '
  '40':
  - type: text
    content: 'Et ils n’ont point obéi, et ils ont suivi leurs premiers usages. '
  '41':
  - type: text
    content: Ces nations craignaient l’Éternel et servaient leurs images; et leurs enfants et les enfants de leurs enfants font jusqu’à ce jour ce que leurs pères ont fait.
  '5':
  - type: text
    content: 'Et '
  - type: note
    content: 2 R 18:9.
  - type: text
    content: 'le roi d’Assyrie parcourut tout le pays, et monta contre Samarie, qu’il assiégea pendant trois ans. '
  '6':
  - type: note
    content: 2 Ch 18:10. És 8:4.
  - type: text
    content: La neuvième année d’Osée, le roi d’Assyrie prit Samarie, et emmena Israël captif en Assyrie. Il les fit habiter à Chalach, et sur le Chabor, fleuve de Gozan, et dans les villes des Mèdes.
  - type: heading
    content: 'V. 7-23: cf. (De 12:29-32; 18:9-14.) (De 4:23-28; 29:16, etc.) Mt 7:26-27. Hé 6:8.'
  '7':
  - type: text
    content: 'Cela arriva parce que les enfants d’Israël péchèrent contre l’Éternel, leur Dieu, qui les avait fait monter du pays d’Égypte, de dessous la main de Pharaon, roi d’Égypte, et parce qu’ils craignirent d’autres dieux. '
  '8':
  - type: note
    content: Lé 18:3.
  - type: text
    content: 'Ils suivirent les coutumes des nations que l’Éternel avait chassées devant les enfants d’Israël, et celles que les rois d’Israël avaient établies. '
  '9':
  - type: text
    content: 'Les enfants d’Israël firent en secret contre l’Éternel, leur Dieu, des choses qui ne sont pas bien. Ils se bâtirent des hauts lieux dans toutes leurs villes, depuis les tours des gardes jusqu’aux villes fortes. '
