document_id: 2KI.17
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Osée, dernier roi d’Israël. — Siège et prise de Samarie par Salmanasar, roi d’Assyrie. — Les habitants du royaume d’Israël emmenés en captivité
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-6: cf. 2 R 18:9-12. 2 Ch 30:6-11. Os 8:7, 9; 9:3.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La douzième année d’Achaz, roi de Juda, Osée, fils d’Éla, régna sur Israël à Samarie. Il régna neuf ans. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il fit ce qui est mal aux yeux de l’Éternel, non pas toutefois comme les rois d’Israël qui avaient été avant lui. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Salmanasar, roi d’Assyrie, monta contre lui; et Osée lui fut assujetti, et lui paya un tribut. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Mais le roi d’Assyrie découvrit une conspiration chez Osée, qui avait envoyé des messagers à So, roi d’Égypte, et qui ne payait plus annuellement le tribut au roi d’Assyrie. Le roi d’Assyrie le fit enfermer et enchaîner dans une prison. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 18:9
      metadata:
        usfm: 2KI.18.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'le roi d’Assyrie parcourut tout le pays, et monta contre Samarie, qu’il assiégea pendant trois ans. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 18:10
      metadata:
        usfm: 2CH.18.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 8:4
      metadata:
        usfm: ISA.8.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: La neuvième année d’Osée, le roi d’Assyrie prit Samarie, et emmena Israël captif en Assyrie. Il les fit habiter à Chalach, et sur le Chabor, fleuve de Gozan, et dans les villes des Mèdes.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 7-23: cf. (De 12:29-32; 18:9-14.) (De 4:23-28; 29:16, etc.) Mt 7:26-27. Hé 6:8.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Cela arriva parce que les enfants d’Israël péchèrent contre l’Éternel, leur Dieu, qui les avait fait monter du pays d’Égypte, de dessous la main de Pharaon, roi d’Égypte, et parce qu’ils craignirent d’autres dieux. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 18:3
      metadata:
        usfm: LEV.18.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ils suivirent les coutumes des nations que l’Éternel avait chassées devant les enfants d’Israël, et celles que les rois d’Israël avaient établies. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Les enfants d’Israël firent en secret contre l’Éternel, leur Dieu, des choses qui ne sont pas bien. Ils se bâtirent des hauts lieux dans toutes leurs villes, depuis les tours des gardes jusqu’aux villes fortes. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ils se dressèrent des statues et des idoles sur toute colline élevée et sous tout arbre vert. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Et là ils brûlèrent des parfums sur tous les hauts lieux, comme les nations que l’Éternel avait chassées devant eux, et ils firent des choses mauvaises, par lesquelles ils irritèrent l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ils servirent les idoles dont l’Éternel leur avait dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 20:3
      metadata:
        usfm: EXO.20.3
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '4'
      metadata:
        usfm: EXO.20.4
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '5'
      metadata:
        usfm: EXO.20.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 5:7
      metadata:
        usfm: DEU.5.7
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '8'
      metadata:
        usfm: DEU.5.8
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '9'
      metadata:
        usfm: DEU.5.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Vous ne ferez pas cela. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'L’Éternel fit avertir Israël et Juda par tous ses prophètes, par tous les voyants, et leur dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 18:11
      metadata:
        usfm: JER.18.11
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 25:5
      metadata:
        usfm: JER.25.5
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 35:15
      metadata:
        usfm: JER.35.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Revenez de vos mauvaises voies, et observez mes commandements et mes ordonnances, en suivant entièrement la loi que j’ai prescrite à vos pères et que je vous ai envoyée par mes serviteurs les prophètes. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Mais ils n’écoutèrent point, et ils '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 31:27
      metadata:
        usfm: DEU.31.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mal 3:7
      metadata:
        usfm: MAL.3.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'roidirent leur cou, comme leurs pères, qui n’avaient pas cru en l’Éternel, leur Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ils rejetèrent ses lois, l’alliance qu’il avait faite avec leurs pères, et les avertissements qu’il leur avait adressés. Ils allèrent après des choses de néant et ne furent eux-mêmes que néant, et après les nations qui les entouraient et que l’Éternel leur avait défendu d’imiter. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ils abandonnèrent tous les commandements de l’Éternel, leur Dieu, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 32:8
      metadata:
        usfm: EXO.32.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 12:28
      metadata:
        usfm: 1KI.12.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ils se firent deux veaux en fonte, ils fabriquèrent des idoles d’Astarté, ils se prosternèrent devant toute l’armée des cieux, et ils servirent Baal. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 20:3
      metadata:
        usfm: LEV.20.3
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '4'
      metadata:
        usfm: LEV.20.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 18:10
      metadata:
        usfm: DEU.18.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 16:3
      metadata:
        usfm: 2KI.16.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ils firent passer par le feu leurs fils et leurs filles, ils se livrèrent à la divination et aux enchantements, et ils se vendirent pour faire ce qui est mal aux yeux de l’Éternel, afin de l’irriter. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Aussi l’Éternel s’est-il fortement irrité contre Israël, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Os 1:6
      metadata:
        usfm: HOS.1.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'les a-t-il éloignés de sa face. Il n’est resté que la seule tribu de Juda. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Juda même n’avait pas gardé les commandements de l’Éternel, son Dieu, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 18:3
      metadata:
        usfm: LEV.18.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ils avaient suivi les coutumes établies par Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'L’Éternel a rejeté toute la race d’Israël; il les a humiliés, il les a livrés entre les mains des pillards, et il a fini par les chasser loin de sa face. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Car Israël s’était '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 12:16
      metadata:
        usfm: 1KI.12.16
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '17'
      metadata:
        usfm: 1KI.12.17
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '26'
      metadata:
        usfm: 1KI.12.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'détaché de la maison de David, et ils avaient fait roi Jéroboam, fils de Nebath, qui les avait détournés de l’Éternel, et avait fait commettre à Israël un grand péché. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Les enfants d’Israël s’étaient livrés à tous les péchés que Jéroboam avait commis; ils ne s’en détournèrent point, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: jusqu’à ce que l’Éternel eût chassé Israël loin de sa face, comme il l’avait annoncé par tous ses serviteurs les prophètes. Et Israël a été emmené captif loin de son pays en Assyrie, où il est resté jusqu’à ce jour.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les Samaritains
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 24-41: cf. Esd 4. Jn 4.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Le roi d’Assyrie fit venir des gens de Babylone, de Cutha, d’Avva, de Hamath et de Sepharvaïm, et les établit dans les villes de Samarie à la place des enfants d’Israël. Ils prirent possession de Samarie, et ils habitèrent dans ses villes. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Lorsqu’ils commencèrent à y habiter, ils ne craignaient pas l’Éternel, et l’Éternel envoya contre eux des lions qui les tuaient. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'On dit au roi d’Assyrie: Les nations que tu as transportées et établies dans les villes de Samarie ne connaissent pas la manière de servir le dieu du pays, et il a envoyé contre elles des lions qui les font mourir, parce qu’elles ne connaissent pas la manière de servir le dieu du pays. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Le roi d’Assyrie donna cet ordre: Faites-y aller l’un des prêtres que vous avez emmenés de là en captivité; qu’il parte pour s’y établir, et qu’il leur enseigne la manière de servir le dieu du pays. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Un des prêtres qui avaient été emmenés captifs de Samarie vint s’établir à Béthel, et leur enseigna comment ils devaient craindre l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Mais les nations firent chacune leurs dieux dans les villes qu’elles habitaient, et les placèrent dans les maisons des hauts lieux bâties par les Samaritains. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Les gens de Babylone firent Succoth-Benoth, les gens de Cuth firent Nergal, les gens de Hamath firent Aschima, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'ceux d’Avva firent Nibchaz et Tharthak; ceux de Sepharvaïm brûlaient leurs enfants par le feu en l’honneur d’Adrammélec et d’Anammélec, dieux de Sepharvaïm. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ils craignaient aussi l’Éternel, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 12:31
      metadata:
        usfm: 1KI.12.31
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ils se créèrent des prêtres des hauts lieux pris parmi tout le peuple: ces prêtres offraient pour eux des sacrifices dans les maisons des hauts lieux. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: So 1:5
      metadata:
        usfm: ZEP.1.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ainsi ils craignaient l’Éternel, et ils servaient en même temps leurs dieux d’après la coutume des nations d’où on les avait transportés. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ils suivent encore aujourd’hui leurs premiers usages: ils ne craignent point l’Éternel, et ils ne se conforment ni à leurs lois et à leurs ordonnances, ni à la loi et aux commandements prescrits par l’Éternel aux enfants de Jacob '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 32:28
      metadata:
        usfm: GEN.32.28
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 35:10
      metadata:
        usfm: GEN.35.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 18:31
      metadata:
        usfm: 1KI.18.31
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qu’il appela du nom d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'L’Éternel avait fait alliance avec eux, et leur avait donné cet ordre: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jg 6:10
      metadata:
        usfm: JDG.6.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Vous ne craindrez point d’autres dieux; vous ne vous prosternerez point devant eux, vous ne les servirez point, et vous ne leur offrirez point de sacrifices. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Mais vous craindrez l’Éternel, qui vous a fait monter du pays d’Égypte avec une grande puissance et à bras étendu; c’est devant lui que vous vous prosternerez, et c’est à lui que vous offrirez des sacrifices. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Vous observerez et mettrez toujours en pratique les préceptes, les ordonnances, la loi et les commandements, qu’il a écrits pour vous, et vous ne craindrez point d’autres dieux. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Vous n’oublierez pas l’alliance que j’ai faite avec vous, et vous ne craindrez point d’autres dieux. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Mais vous craindrez l’Éternel, votre Dieu; et il vous délivrera de la main de tous vos ennemis. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Et ils n’ont point obéi, et ils ont suivi leurs premiers usages. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Ces nations craignaient l’Éternel et servaient leurs images; et leurs enfants et les enfants de leurs enfants font jusqu’à ce jour ce que leurs pères ont fait.
