document_id: ACT.22
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-21: cf. Ac 9:1-30; 26:9-21. 1 Ti 1:12-17.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Hommes frères et pères, écoutez ce que j’ai maintenant à vous dire pour ma défense! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Lorsqu’ils entendirent qu’il leur parlait en langue hébraïque, ils redoublèrent de silence. Et Paul dit: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 9:11
      metadata:
        usfm: ACT.9.11
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 21:39
      metadata:
        usfm: ACT.21.39
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 11:22
      metadata:
        usfm: 2CO.11.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'je suis Juif, né à Tarse en Cilicie; mais j’ai été élevé dans cette ville-ci, et instruit aux pieds de '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 5:34
      metadata:
        usfm: ACT.5.34
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Gamaliel dans la connaissance exacte de la loi de nos pères, étant plein de zèle pour Dieu, comme vous l’êtes tous aujourd’hui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 8:3
      metadata:
        usfm: ACT.8.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 9:1
      metadata:
        usfm: ACT.9.1
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 26:9
      metadata:
        usfm: ACT.26.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 15:9
      metadata:
        usfm: 1CO.15.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 1:13
      metadata:
        usfm: GAL.1.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 1:13
      metadata:
        usfm: 1TI.1.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'J’ai persécuté à mort cette doctrine, liant et mettant en prison hommes et femmes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Le souverain sacrificateur et tout le collège des anciens m’en sont témoins. J’ai même reçu d’eux des lettres pour les frères de Damas, où je me rendis afin d’amener liés à Jérusalem ceux qui se trouvaient là et de les faire punir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 9:3
      metadata:
        usfm: ACT.9.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Comme j’étais en chemin, et que j’approchais de Damas, tout à coup, vers midi, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 15:8
      metadata:
        usfm: 1CO.15.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 12:2
      metadata:
        usfm: 2CO.12.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'une grande lumière venant du ciel resplendit autour de moi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Je tombai par terre, et j’entendis une voix qui me disait: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Saul, Saul, pourquoi me persécutes-tu?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Je répondis: Qui es-tu, Seigneur? Et il me dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je suis Jésus de Nazareth, que tu persécutes.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Da 10:7
      metadata:
        usfm: DAN.10.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ceux qui étaient avec moi virent bien la lumière, mais ils n’entendirent pas la voix de celui qui parlait. Alors je dis: Que ferai-je, Seigneur? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Et le Seigneur me dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Lève-toi, va à Damas, et là on te dira tout ce que tu dois faire.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Comme je ne voyais rien, à cause de l’éclat de cette lumière, ceux qui étaient avec moi me prirent par la main, et j’arrivai à Damas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 9:17
      metadata:
        usfm: ACT.9.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Or, un nommé Ananias, homme pieux selon la loi, et de qui tous les Juifs demeurant à Damas rendaient un bon témoignage, vint se présenter à moi, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'et me dit: Saul, mon frère, recouvre la vue. Au même instant, je recouvrai la vue et je le regardai. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il dit: Le Dieu de nos pères t’a destiné à connaître sa volonté, à voir le Juste, et à entendre les paroles de sa bouche; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'car tu lui serviras de témoin, auprès de tous les hommes, des choses que tu as vues et entendues. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Et maintenant, que tardes-tu? Lève-toi, sois baptisé, et lavé de tes péchés, en invoquant le nom du Seigneur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 9:28
      metadata:
        usfm: ACT.9.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'De retour à Jérusalem, comme je priais dans le temple, je fus ravi en extase, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'et je vis le Seigneur qui me disait: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 10:14
      metadata:
        usfm: MAT.10.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Hâte-toi, et sors promptement de Jérusalem, parce qu’ils ne recevront pas ton témoignage sur moi.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Et je dis: Seigneur, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 22:4
      metadata:
        usfm: ACT.22.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ils savent eux-mêmes que je faisais mettre en prison et battre de verges dans les synagogues ceux qui croyaient en toi, et que, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 7:58
      metadata:
        usfm: ACT.7.58
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 8:1
      metadata:
        usfm: ACT.8.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'lorsqu’on répandit le sang d’Étienne, ton témoin, j’étais moi-même présent, joignant mon approbation à celle des autres, et gardant les vêtements de ceux qui le faisaient mourir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Alors il me dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Va,
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 9:15
      metadata:
        usfm: ACT.9.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 13:2
      metadata:
        usfm: ACT.13.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 1:15
      metadata:
        usfm: GAL.1.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2:8
      metadata:
        usfm: GAL.2.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 3:8
      metadata:
        usfm: EPH.3.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 2:7
      metadata:
        usfm: 1TI.2.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ti 1:11
      metadata:
        usfm: 2TI.1.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: je t’enverrai au loin vers les nations…
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nouveau tumulte. Sur le point d’être battu de verges, Paul se déclare citoyen romain
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 22-29: cf. Ac 16:22, 23, 35-39; 25:16.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ils l’écoutèrent jusqu’à cette parole. Mais alors ils élevèrent la voix, disant: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 21:36
      metadata:
        usfm: ACT.21.36
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ote de la terre un pareil homme! Il n’est pas digne de vivre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Et ils poussaient des cris, jetaient leurs vêtements, lançaient de la poussière en l’air. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Le tribun commanda de faire entrer Paul dans la forteresse, et de lui donner la question par le fouet, afin de savoir pour quel motif ils criaient ainsi contre lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Lorsqu’on l’eut exposé au fouet, Paul dit au centenier qui était présent: Vous est-il permis de battre de verges un citoyen romain, qui n’est pas même condamné? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'A ces mots, le centenier alla vers le tribun pour l’avertir, disant: Que vas-tu faire? Cet homme est Romain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Et le tribun, étant venu, dit à Paul: Dis-moi, es-tu Romain? Oui, répondit-il. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Le tribun reprit: C’est avec beaucoup d’argent que j’ai acquis ce droit de citoyen. Et moi, dit Paul, je l’ai par ma naissance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Aussitôt ceux qui devaient lui donner la question se retirèrent, et le tribun, voyant que Paul était Romain, fut dans la crainte parce qu’il l’avait fait lier.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul comparaît devant le sanhédrin
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: '22 v. 30 à 23 v. 11: cf. Ac 23:28. (Mt 23:27, 28; 10:16.) (Ps 37:32, 33. Jos 1:9.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Le lendemain, voulant savoir avec certitude de quoi les Juifs l’accusaient, le tribun lui fit ôter ses liens, et donna l’ordre aux principaux sacrificateurs et à tout le sanhédrin de se réunir; puis, faisant descendre Paul, il le plaça au milieu d’eux.
