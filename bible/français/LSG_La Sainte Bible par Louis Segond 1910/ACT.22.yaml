document_id: ACT.22,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-21: cf. Ac 9:1-30; 26:9-21. 1 Ti 1:12-17.'
  - type: text
    content: 'Hommes frères et pères, écoutez ce que j’ai maintenant à vous dire pour ma défense! '
  '10':
  - type: text
    content: 'Et le Seigneur me dit: '
  - type: text
    content: Lève-toi, va à Damas, et là on te dira tout ce que tu dois faire.
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'Comme je ne voyais rien, à cause de l’éclat de cette lumière, ceux qui étaient avec moi me prirent par la main, et j’arrivai à Damas. '
  '12':
  - type: note
    content: Ac 9:17.
  - type: text
    content: 'Or, un nommé Ananias, homme pieux selon la loi, et de qui tous les Juifs demeurant à Damas rendaient un bon témoignage, vint se présenter à moi, '
  '13':
  - type: text
    content: 'et me dit: Saul, mon frère, recouvre la vue. Au même instant, je recouvrai la vue et je le regardai. '
  '14':
  - type: text
    content: 'Il dit: Le Dieu de nos pères t’a destiné à connaître sa volonté, à voir le Juste, et à entendre les paroles de sa bouche; '
  '15':
  - type: text
    content: 'car tu lui serviras de témoin, auprès de tous les hommes, des choses que tu as vues et entendues. '
  '16':
  - type: text
    content: 'Et maintenant, que tardes-tu? Lève-toi, sois baptisé, et lavé de tes péchés, en invoquant le nom du Seigneur. '
  '17':
  - type: note
    content: Ac 9:28.
  - type: text
    content: 'De retour à Jérusalem, comme je priais dans le temple, je fus ravi en extase, '
  '18':
  - type: text
    content: 'et je vis le Seigneur qui me disait: '
  - type: note
    content: Mt 10:14.
  - type: text
    content: Hâte-toi, et sors promptement de Jérusalem, parce qu’ils ne recevront pas ton témoignage sur moi.
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'Et je dis: Seigneur, '
  - type: note
    content: Ac 22:4.
  - type: text
    content: 'ils savent eux-mêmes que je faisais mettre en prison et battre de verges dans les synagogues ceux qui croyaient en toi, et que, '
  '2':
  - type: text
    content: 'Lorsqu’ils entendirent qu’il leur parlait en langue hébraïque, ils redoublèrent de silence. Et Paul dit: '
  '20':
  - type: note
    content: Ac 7:58; 8:1.
  - type: text
    content: 'lorsqu’on répandit le sang d’Étienne, ton témoin, j’étais moi-même présent, joignant mon approbation à celle des autres, et gardant les vêtements de ceux qui le faisaient mourir. '
  '21':
  - type: text
    content: 'Alors il me dit: '
  - type: text
    content: Va,
  - type: text
    content: ' '
  - type: note
    content: Ac 9:15; 13:2. Ga 1:15; 2:8. Ép 3:8. 1 Ti 2:7. 2 Ti 1:11.
  - type: text
    content: je t’enverrai au loin vers les nations…
  - type: heading
    content: Nouveau tumulte. Sur le point d’être battu de verges, Paul se déclare citoyen romain
  - type: heading
    content: 'V. 22-29: cf. Ac 16:22, 23, 35-39; 25:16.'
  '22':
  - type: text
    content: 'Ils l’écoutèrent jusqu’à cette parole. Mais alors ils élevèrent la voix, disant: '
  - type: note
    content: Ac 21:36.
  - type: text
    content: 'Ote de la terre un pareil homme! Il n’est pas digne de vivre. '
  '23':
  - type: text
    content: 'Et ils poussaient des cris, jetaient leurs vêtements, lançaient de la poussière en l’air. '
  '24':
  - type: text
    content: 'Le tribun commanda de faire entrer Paul dans la forteresse, et de lui donner la question par le fouet, afin de savoir pour quel motif ils criaient ainsi contre lui. '
  '25':
  - type: text
    content: 'Lorsqu’on l’eut exposé au fouet, Paul dit au centenier qui était présent: Vous est-il permis de battre de verges un citoyen romain, qui n’est pas même condamné? '
  '26':
  - type: text
    content: 'A ces mots, le centenier alla vers le tribun pour l’avertir, disant: Que vas-tu faire? Cet homme est Romain. '
  '27':
  - type: text
    content: 'Et le tribun, étant venu, dit à Paul: Dis-moi, es-tu Romain? Oui, répondit-il. '
  '28':
  - type: text
    content: 'Le tribun reprit: C’est avec beaucoup d’argent que j’ai acquis ce droit de citoyen. Et moi, dit Paul, je l’ai par ma naissance. '
  '29':
  - type: text
    content: Aussitôt ceux qui devaient lui donner la question se retirèrent, et le tribun, voyant que Paul était Romain, fut dans la crainte parce qu’il l’avait fait lier.
  - type: heading
    content: Paul comparaît devant le sanhédrin
  - type: heading
    content: '22 v. 30 à 23 v. 11: cf. Ac 23:28. (Mt 23:27, 28; 10:16.) (Ps 37:32, 33. Jos 1:9.)'
  '3':
  - type: note
    content: Ac 9:11; 21:39. 2 Co 11:22.
  - type: text
    content: 'je suis Juif, né à Tarse en Cilicie; mais j’ai été élevé dans cette ville-ci, et instruit aux pieds de '
  - type: note
    content: Ac 5:34.
  - type: text
    content: 'Gamaliel dans la connaissance exacte de la loi de nos pères, étant plein de zèle pour Dieu, comme vous l’êtes tous aujourd’hui. '
  '30':
  - type: text
    content: Le lendemain, voulant savoir avec certitude de quoi les Juifs l’accusaient, le tribun lui fit ôter ses liens, et donna l’ordre aux principaux sacrificateurs et à tout le sanhédrin de se réunir; puis, faisant descendre Paul, il le plaça au milieu d’eux.
  '4':
  - type: note
    content: Ac 8:3; 9:1; 26:9. 1 Co 15:9. Ga 1:13. 1 Ti 1:13.
  - type: text
    content: 'J’ai persécuté à mort cette doctrine, liant et mettant en prison hommes et femmes. '
  '5':
  - type: text
    content: 'Le souverain sacrificateur et tout le collège des anciens m’en sont témoins. J’ai même reçu d’eux des lettres pour les frères de Damas, où je me rendis afin d’amener liés à Jérusalem ceux qui se trouvaient là et de les faire punir. '
  '6':
  - type: note
    content: Ac 9:3.
  - type: text
    content: 'Comme j’étais en chemin, et que j’approchais de Damas, tout à coup, vers midi, '
  - type: note
    content: 1 Co 15:8. 2 Co 12:2.
  - type: text
    content: 'une grande lumière venant du ciel resplendit autour de moi. '
  '7':
  - type: text
    content: 'Je tombai par terre, et j’entendis une voix qui me disait: '
  - type: text
    content: Saul, Saul, pourquoi me persécutes-tu?
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'Je répondis: Qui es-tu, Seigneur? Et il me dit: '
  - type: text
    content: Je suis Jésus de Nazareth, que tu persécutes.
  - type: text
    content: ' '
  '9':
  - type: note
    content: Da 10:7.
  - type: text
    content: 'Ceux qui étaient avec moi virent bien la lumière, mais ils n’entendirent pas la voix de celui qui parlait. Alors je dis: Que ferai-je, Seigneur? '
