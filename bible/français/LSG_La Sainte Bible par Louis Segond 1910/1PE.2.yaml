document_id: 1PE.2,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-10: cf. Ja 1:21. (Ép 2:20-22. Ac 4:11, 12.) (És 28:16. Mt 21:42-44. Ro 9:30-33.) Ap 1:6. Ro 9:24-26.'
  - type: text
    content: ' '
  - type: note
    content: Mt 18:3. Ro 6:4. 1 Co 14:20. Ép 4:23. Col 3:8. Hé 12:2.
  - type: text
    content: 'Rejetant donc toute malice et toute ruse, la dissimulation, l’envie, et toute médisance, '
  '10':
  - type: note
    content: Os 1:10; 2:22. Ro 9:26.
  - type: text
    content: vous qui autrefois n’étiez pas un peuple, et qui maintenant êtes le peuple de Dieu, vous qui n’aviez pas obtenu miséricorde, et qui maintenant avez obtenu miséricorde.
  - type: heading
    content: 'Exhortations diverses: la bonne conduite au milieu des païens, la soumission aux autorités, les devoirs des serviteurs, les devoirs des femmes et des maris, le support et la paix, la patience dans les épreuves'
  - type: heading
    content: 'V. 11-17: cf. (Ép 4:1. Mt 5:11, 16.) Ro 13:1-8.'
  '11':
  - type: text
    content: 'Bien-aimés, je vous exhorte, comme étrangers et voyageurs sur la terre, '
  - type: note
    content: Ro 13:14. Ga 5:16.
  - type: text
    content: 'à vous abstenir des convoitises charnelles qui font la guerre à l’âme. '
  '12':
  - type: note
    content: Ro 12:17. 2 Co 8:21. Ph 2:15.
  - type: text
    content: 'Ayez au milieu des païens une bonne conduite, '
  - type: note
    content: Tit 2:8. 1 Pi 3:16.
  - type: text
    content: 'afin que, là même où ils vous calomnient comme si vous étiez des malfaiteurs, '
  - type: note
    content: Mt 5:16.
  - type: text
    content: 'ils remarquent vos bonnes œuvres, et glorifient Dieu, '
  - type: note
    content: Lu 1:68; 19:44.
  - type: text
    content: 'au jour où il les visitera. '
  '13':
  - type: note
    content: Ro 13:1. Tit 3:1.
  - type: text
    content: 'Soyez soumis, à cause du Seigneur, à toute autorité établie parmi les hommes, soit au roi comme souverain, '
  '14':
  - type: text
    content: 'soit aux gouverneurs comme envoyés par lui pour punir les malfaiteurs et pour approuver les gens de bien. '
  '15':
  - type: text
    content: 'Car c’est la volonté de Dieu '
  - type: note
    content: Tit 2:8.
  - type: text
    content: 'qu’en pratiquant le bien vous réduisiez au silence les hommes ignorants et insensés, '
  '16':
  - type: note
    content: Jn 8:32. Ro 6:18. Ga 5:1.
  - type: text
    content: 'étant libres, sans faire de la liberté un voile qui couvre la méchanceté, mais agissant comme des serviteurs de Dieu. '
  '17':
  - type: note
    content: Ro 12:10. 1 Pi 5:5.
  - type: text
    content: 'Honorez tout le monde; '
  - type: note
    content: Ro 12:10. Ép 4:3. Hé 13:1. 1 Pi 1:22.
  - type: text
    content: 'aimez les frères; craignez Dieu; '
  - type: note
    content: Mt 22:21.
  - type: text
    content: honorez le roi.
  - type: heading
    content: 'V. 18-25: cf. (Ép 6:5-8. Tit 2:9, 10.) (1 Pi 3:14-18. És 53:3-12. Mt 16:24.)'
  '18':
  - type: text
    content: ' '
  - type: note
    content: Ép 6:5. Col 3:22. 1 Ti 6:1. Tit 2:9.
  - type: text
    content: 'Serviteurs, soyez soumis en toute crainte à vos maîtres, non seulement à ceux qui sont bons et doux, mais aussi à ceux qui sont d’un caractère difficile. '
  '19':
  - type: note
    content: Mt 5:10.
  - type: text
    content: 'Car c’est une grâce que de supporter des afflictions par motif de conscience envers Dieu, quand on souffre injustement. '
  '2':
  - type: text
    content: 'désirez, comme des enfants nouveau-nés, le lait spirituel et pur, afin que par lui vous croissiez pour le salut, '
  '20':
  - type: text
    content: 'En effet, quelle gloire y a-t-il à supporter de mauvais traitements pour avoir commis des fautes? '
  - type: note
    content: 1 Pi 3:14; 4:14.
  - type: text
    content: 'Mais si vous supportez la souffrance lorsque vous faites ce qui est bien, c’est une grâce devant Dieu. '
  '21':
  - type: text
    content: 'Et c’est à cela que vous avez été appelés, parce que Christ aussi a souffert pour vous, '
  - type: note
    content: Jn 13:15. Ph 2:5. 1 Jn 2:6.
  - type: text
    content: 'vous laissant un exemple, afin que vous suiviez ses traces, '
  '22':
  - type: note
    content: És 53:9. 2 Co 5:21. 1 Jn 3:5.
  - type: text
    content: 'Lui qui n’a point commis de péché, et dans la bouche duquel il ne s’est point trouvé de fraude; '
  '23':
  - type: note
    content: Mt 27:39. Jn 8:48, 49.
  - type: text
    content: 'lui qui, injurié, ne rendait point d’injures, maltraité, ne faisait point de menaces, mais s’en remettait à celui qui juge justement; '
  '24':
  - type: note
    content: És 53:4. Mt 8:17.
  - type: text
    content: 'lui qui a porté lui-même nos péchés en son corps sur le bois, '
  - type: note
    content: Ro 6:11.
  - type: text
    content: 'afin que morts aux péchés nous vivions pour la justice; lui par les meurtrissures duquel vous avez été guéris. '
  '25':
  - type: text
    content: 'Car vous étiez '
  - type: note
    content: És 53:6. Éz 34:6. Lu 15:4.
  - type: text
    content: comme des brebis errantes. Mais maintenant vous êtes retournés vers le pasteur et le gardien de vos âmes.
  '3':
  - type: text
    content: 'si vous avez '
  - type: note
    content: Ps 34:9.
  - type: text
    content: 'goûté que le Seigneur est bon. '
  '4':
  - type: note
    content: Ép 2:20.
  - type: text
    content: 'Approchez-vous de lui, pierre vivante, rejetée par les hommes, mais choisie et précieuse devant Dieu; '
  '5':
  - type: text
    content: 'et vous-mêmes, comme des pierres vivantes, édifiez-vous pour former '
  - type: note
    content: Hé 3:6.
  - type: text
    content: 'une maison spirituelle, '
  - type: note
    content: Ap 1:6; 5:10.
  - type: text
    content: 'un saint sacerdoce, afin '
  - type: note
    content: Ro 12:1. Hé 12:28.
  - type: text
    content: 'd’offrir des victimes spirituelles, agréables à Dieu par Jésus-Christ. '
  '6':
  - type: text
    content: 'Car il est dit dans l’Écriture:'
  - type: note
    content: És 28:16.
  - type: text
    content: Voici, je mets en Sion une pierre angulaire, choisie, précieuse;
  - type: text
    content: et celui qui croit en elle ne sera point confus.
  '7':
  - type: text
    content: L’honneur est donc pour vous, qui croyez. Mais, pour les incrédules,
  - type: note
    content: Ps 118:22. Mt 21:42. Ac 4:11.
  - type: text
    content: La pierre qu’ont rejetée ceux qui bâtissaient
  - type: text
    content: Est devenue la principale de l’angle,
  - type: note
    content: És 8:14. Ro 9:33.
  - type: text
    content: Et une pierre d’achoppement
  - type: text
    content: Et un rocher de scandale;
  '8':
  - type: text
    content: 'ils s’y heurtent pour n’avoir pas cru à la parole, et c’est à cela qu’ils sont destinés. '
  '9':
  - type: note
    content: Ex 19:5. De 7:6; 14:2; 26:18. Ép 1:14.
  - type: text
    content: 'Vous, au contraire, vous êtes une race élue, '
  - type: note
    content: Ap 1:6; 5:10.
  - type: text
    content: 'un sacerdoce royal, une nation sainte, un peuple acquis, afin que vous annonciez les vertus de celui qui vous a appelés des ténèbres à son admirable lumière, '
