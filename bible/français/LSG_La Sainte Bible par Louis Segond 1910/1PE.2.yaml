      marker: ref
      children:
      - type: text
        text: Col 3:8
      metadata:
        usfm: COL.3.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 12:2
      metadata:
        usfm: HEB.12.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Rejetant donc toute malice et toute ruse, la dissimulation, l’envie, et toute médisance, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'désirez, comme des enfants nouveau-nés, le lait spirituel et pur, afin que par lui vous croissiez pour le salut, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'si vous avez '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 34:9
      metadata:
        usfm: PSA.34.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'goûté que le Seigneur est bon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 2:20
      metadata:
        usfm: EPH.2.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Approchez-vous de lui, pierre vivante, rejetée par les hommes, mais choisie et précieuse devant Dieu; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'et vous-mêmes, comme des pierres vivantes, édifiez-vous pour former '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 3:6
      metadata:
        usfm: HEB.3.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'une maison spirituelle, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 1:6
      metadata:
        usfm: REV.1.6
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 5:10
      metadata:
        usfm: REV.5.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'un saint sacerdoce, afin '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 12:1
      metadata:
        usfm: ROM.12.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 12:28
      metadata:
        usfm: HEB.12.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'd’offrir des victimes spirituelles, agréables à Dieu par Jésus-Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Car il est dit dans l’Écriture:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 28:16
      metadata:
        usfm: ISA.28.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Voici, je mets en Sion une pierre angulaire, choisie, précieuse;
- type: usfm
  marker: q1
  children:
  - type: text
    text: et celui qui croit en elle ne sera point confus.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: L’honneur est donc pour vous, qui croyez. Mais, pour les incrédules,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 118:22
      metadata:
        usfm: PSA.118.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 21:42
      metadata:
        usfm: MAT.21.42
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 4:11
      metadata:
        usfm: ACT.4.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: La pierre qu’ont rejetée ceux qui bâtissaient
- type: usfm
  marker: q1
  children:
  - type: text
    text: Est devenue la principale de l’angle,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 8:14
      metadata:
        usfm: ISA.8.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 9:33
      metadata:
        usfm: ROM.9.33
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et une pierre d’achoppement
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et un rocher de scandale;
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'ils s’y heurtent pour n’avoir pas cru à la parole, et c’est à cela qu’ils sont destinés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 19:5
      metadata:
        usfm: EXO.19.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 7:6
      metadata:
        usfm: DEU.7.6
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 14:2
      metadata:
        usfm: DEU.14.2
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 26:18
      metadata:
        usfm: DEU.26.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 1:14
      metadata:
        usfm: EPH.1.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Vous, au contraire, vous êtes une race élue, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 1:6
      metadata:
        usfm: REV.1.6
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 5:10
      metadata:
        usfm: REV.5.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'un sacerdoce royal, une nation sainte, un peuple acquis, afin que vous annonciez les vertus de celui qui vous a appelés des ténèbres à son admirable lumière, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Os 1:10; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2:22
      metadata:
        usfm: HOS.2.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 9:26
      metadata:
        usfm: ROM.9.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: vous qui autrefois n’étiez pas un peuple, et qui maintenant êtes le peuple de Dieu, vous qui n’aviez pas obtenu miséricorde, et qui maintenant avez obtenu miséricorde.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Exhortations diverses: la bonne conduite au milieu des païens, la soumission aux autorités, les devoirs des serviteurs, les devoirs des femmes et des maris, le support et la paix, la patience dans les épreuves'
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 11-17: cf. (Ép 4:1. Mt 5:11, 16.) Ro 13:1-8.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Bien-aimés, je vous exhorte, comme étrangers et voyageurs sur la terre, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 13:14
      metadata:
        usfm: ROM.13.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 5:16
      metadata:
        usfm: GAL.5.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'à vous abstenir des convoitises charnelles qui font la guerre à l’âme. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 12:17
      metadata:
        usfm: ROM.12.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 8:21
      metadata:
        usfm: 2CO.8.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 2:15
      metadata:
        usfm: PHP.2.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ayez au milieu des païens une bonne conduite, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Tit 2:8
      metadata:
        usfm: TIT.2.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 3:16
      metadata:
        usfm: 1PE.3.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'afin que, là même où ils vous calomnient comme si vous étiez des malfaiteurs, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 5:16
      metadata:
        usfm: MAT.5.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ils remarquent vos bonnes œuvres, et glorifient Dieu, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 1:68
      metadata:
        usfm: LUK.1.68
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 19:44
      metadata:
        usfm: LUK.19.44
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'au jour où il les visitera. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 13:1
      metadata:
        usfm: ROM.13.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Tit 3:1
      metadata:
        usfm: TIT.3.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Soyez soumis, à cause du Seigneur, à toute autorité établie parmi les hommes, soit au roi comme souverain, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'soit aux gouverneurs comme envoyés par lui pour punir les malfaiteurs et pour approuver les gens de bien. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Car c’est la volonté de Dieu '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Tit 2:8
      metadata:
        usfm: TIT.2.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qu’en pratiquant le bien vous réduisiez au silence les hommes ignorants et insensés, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 8:32
      metadata:
        usfm: JHN.8.32
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 6:18
      metadata:
        usfm: ROM.6.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 5:1
      metadata:
        usfm: GAL.5.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'étant libres, sans faire de la liberté un voile qui couvre la méchanceté, mais agissant comme des serviteurs de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 12:10
      metadata:
        usfm: ROM.12.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 5:5
      metadata:
        usfm: 1PE.5.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Honorez tout le monde; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 12:10
      metadata:
        usfm: ROM.12.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 4:3
      metadata:
        usfm: EPH.4.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 13:1
      metadata:
        usfm: HEB.13.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 1:22
      metadata:
        usfm: 1PE.1.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'aimez les frères; craignez Dieu; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 22:21
      metadata:
        usfm: MAT.22.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: honorez le roi.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 18-25: cf. (Ép 6:5-8. Tit 2:9, 10.) (1 Pi 3:14-18. És 53:3-12. Mt 16:24.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 6:5
      metadata:
        usfm: EPH.6.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 3:22
      metadata:
        usfm: COL.3.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 6:1
      metadata:
        usfm: 1TI.6.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Tit 2:9
      metadata:
        usfm: TIT.2.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Serviteurs, soyez soumis en toute crainte à vos maîtres, non seulement à ceux qui sont bons et doux, mais aussi à ceux qui sont d’un caractère difficile. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 5:10
      metadata:
        usfm: MAT.5.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Car c’est une grâce que de supporter des afflictions par motif de conscience envers Dieu, quand on souffre injustement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'En effet, quelle gloire y a-t-il à supporter de mauvais traitements pour avoir commis des fautes? '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 3:14
      metadata:
        usfm: 1PE.3.14
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 4:14
      metadata:
        usfm: 1PE.4.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Mais si vous supportez la souffrance lorsque vous faites ce qui est bien, c’est une grâce devant Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Et c’est à cela que vous avez été appelés, parce que Christ aussi a souffert pour vous, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 13:15
      metadata:
        usfm: JHN.13.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 2:5
      metadata:
        usfm: PHP.2.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 2:6
      metadata:
        usfm: 1JN.2.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'vous laissant un exemple, afin que vous suiviez ses traces, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 53:9
      metadata:
        usfm: ISA.53.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 5:21
      metadata:
        usfm: 2CO.5.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 3:5
      metadata:
        usfm: 1JN.3.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Lui qui n’a point commis de péché, et dans la bouche duquel il ne s’est point trouvé de fraude; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 27:39
      metadata:
        usfm: MAT.27.39
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
