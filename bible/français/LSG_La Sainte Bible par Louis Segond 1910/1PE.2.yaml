  children:
  - type: text
    text: 'V. 1-10: cf. Ja 1:21. (Ép 2:20-22. Ac 4:11, 12.) (És 28:16. Mt 21:42-44. Ro 9:30-33.) Ap 1:6. Ro 9:24-26.'
  marker-yv: yv-h
- type: usfm
  marker: p
