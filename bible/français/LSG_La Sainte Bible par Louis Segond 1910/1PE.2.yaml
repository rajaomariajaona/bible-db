document_id: 1PE.2,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-10: cf. Ja 1:21. (Ép 2:20-22. Ac 4:11, 12.) (És 28:16. Mt 21:42-44. Ro 9:30-33.) Ap 1:6. Ro 9:24-26.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 18:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 6:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 14:20
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 4:23
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 3:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 12:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Rejetant donc toute malice et toute ruse, la dissimulation, l’envie, et toute médisance, '
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Os 1:10; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2:22
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 9:26
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: vous qui autrefois n’étiez pas un peuple, et qui maintenant êtes le peuple de Dieu, vous qui n’aviez pas obtenu miséricorde, et qui maintenant avez obtenu miséricorde.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Exhortations diverses: la bonne conduite au milieu des païens, la soumission aux autorités, les devoirs des serviteurs, les devoirs des femmes et des maris, le support et la paix, la patience dans les épreuves'
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 11-17: cf. (Ép 4:1. Mt 5:11, 16.) Ro 13:1-8.'
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Bien-aimés, je vous exhorte, comme étrangers et voyageurs sur la terre, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 13:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 5:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'à vous abstenir des convoitises charnelles qui font la guerre à l’âme. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 12:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 8:21
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ph 2:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Ayez au milieu des païens une bonne conduite, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Tit 2:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 3:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'afin que, là même où ils vous calomnient comme si vous étiez des malfaiteurs, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 5:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'ils remarquent vos bonnes œuvres, et glorifient Dieu, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 1:68
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 19:44
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'au jour où il les visitera. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 13:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Tit 3:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Soyez soumis, à cause du Seigneur, à toute autorité établie parmi les hommes, soit au roi comme souverain, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'soit aux gouverneurs comme envoyés par lui pour punir les malfaiteurs et pour approuver les gens de bien. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car c’est la volonté de Dieu '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Tit 2:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'qu’en pratiquant le bien vous réduisiez au silence les hommes ignorants et insensés, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 8:32
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 6:18
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 5:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'étant libres, sans faire de la liberté un voile qui couvre la méchanceté, mais agissant comme des serviteurs de Dieu. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 12:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 5:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Honorez tout le monde; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 12:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 4:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 13:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 1:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'aimez les frères; craignez Dieu; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 22:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: honorez le roi.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 18-25: cf. (Ép 6:5-8. Tit 2:9, 10.) (1 Pi 3:14-18. És 53:3-12. Mt 16:24.)'
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 6:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 3:22
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ti 6:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Tit 2:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Serviteurs, soyez soumis en toute crainte à vos maîtres, non seulement à ceux qui sont bons et doux, mais aussi à ceux qui sont d’un caractère difficile. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 5:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Car c’est une grâce que de supporter des afflictions par motif de conscience envers Dieu, quand on souffre injustement. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'désirez, comme des enfants nouveau-nés, le lait spirituel et pur, afin que par lui vous croissiez pour le salut, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, quelle gloire y a-t-il à supporter de mauvais traitements pour avoir commis des fautes? '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 3:14
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 4:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Mais si vous supportez la souffrance lorsque vous faites ce qui est bien, c’est une grâce devant Dieu. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et c’est à cela que vous avez été appelés, parce que Christ aussi a souffert pour vous, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 13:15
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ph 2:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Jn 2:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'vous laissant un exemple, afin que vous suiviez ses traces, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 53:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 5:21
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Jn 3:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Lui qui n’a point commis de péché, et dans la bouche duquel il ne s’est point trouvé de fraude; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 27:39
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 8:48
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '49'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'lui qui, injurié, ne rendait point d’injures, maltraité, ne faisait point de menaces, mais s’en remettait à celui qui juge justement; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 53:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 8:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'lui qui a porté lui-même nos péchés en son corps sur le bois, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 6:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'afin que morts aux péchés nous vivions pour la justice; lui par les meurtrissures duquel vous avez été guéris. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car vous étiez '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 53:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 34:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 15:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: comme des brebis errantes. Mais maintenant vous êtes retournés vers le pasteur et le gardien de vos âmes.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'si vous avez '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 34:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'goûté que le Seigneur est bon. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 2:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Approchez-vous de lui, pierre vivante, rejetée par les hommes, mais choisie et précieuse devant Dieu; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et vous-mêmes, comme des pierres vivantes, édifiez-vous pour former '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 3:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'une maison spirituelle, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 1:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'un saint sacerdoce, afin '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 12:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 12:28
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'd’offrir des victimes spirituelles, agréables à Dieu par Jésus-Christ. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car il est dit dans l’Écriture:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 28:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Voici, je mets en Sion une pierre angulaire, choisie, précieuse;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et celui qui croit en elle ne sera point confus.
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: L’honneur est donc pour vous, qui croyez. Mais, pour les incrédules,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 118:22
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 21:42
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 4:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: La pierre qu’ont rejetée ceux qui bâtissaient
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Est devenue la principale de l’angle,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 8:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 9:33
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Et une pierre d’achoppement
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et un rocher de scandale;
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'ils s’y heurtent pour n’avoir pas cru à la parole, et c’est à cela qu’ils sont destinés. '
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 19:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 7:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 26:18
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 1:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Vous, au contraire, vous êtes une race élue, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 1:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'un sacerdoce royal, une nation sainte, un peuple acquis, afin que vous annonciez les vertus de celui qui vous a appelés des ténèbres à son admirable lumière, '
