document_id: 1KI.5,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Alliance de Salomon avec Hiram, roi de Tyr. — Préparatifs pour la construction du temple
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-18: cf. 2 Ch 2. Esd 3:7. Ag 1:8.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Hiram, roi de Tyr, envoya ses serviteurs vers Salomon, car il apprit qu’on l’avait oint pour roi à la place de son père, et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 5:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 14:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'il avait toujours aimé David. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Hiram donna à Salomon des bois de cèdre et des bois de cyprès autant qu’il en voulut. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Et Salomon donna à Hiram vingt mille cors de froment pour l’entretien de sa maison et vingt cors d’huile d’olives concassées; c’est ce que Salomon donna chaque année à Hiram. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'L’Éternel donna de la sagesse à Salomon, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 3:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'comme il le lui avait promis. Et il y eut paix entre Hiram et Salomon, et ils firent alliance ensemble. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Le roi Salomon leva sur tout Israël des hommes de corvée; ils étaient au nombre de trente mille. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Il les envoya au Liban, dix mille par mois alternativement; ils étaient un mois au Liban, et deux mois chez eux. Adoniram était préposé sur les hommes de corvée. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Salomon avait encore soixante-dix mille hommes qui portaient les fardeaux et quatre-vingt mille qui taillaient les pierres dans la montagne, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'sans compter les chefs, au nombre de trois mille trois cents, préposés par Salomon sur les travaux et chargés de surveiller les ouvriers. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Le roi ordonna d’extraire de grandes et magnifiques pierres de taille pour les fondements de la maison. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Les ouvriers de Salomon, ceux de Hiram, et les Guibliens, les taillèrent, et ils préparèrent les bois et les pierres pour bâtir la maison.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Salomon fit dire à Hiram: '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 28:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Tu sais que David, mon père, n’a pas pu bâtir une maison à l’Éternel, son Dieu, à cause des guerres dont ses ennemis l’ont enveloppé jusqu’à ce que l’Éternel les eût mis sous la plante de ses pieds. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Maintenant l’Éternel, mon Dieu, m’a donné du repos de toutes parts; plus d’adversaires, plus de calamités! '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Voici, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 2:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'j’ai l’intention de bâtir une maison au nom de l’Éternel, mon Dieu, comme l’Éternel l’a déclaré à David, mon père, en disant: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 7:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 22:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Ton fils que je mettrai à ta place sur ton trône, ce sera lui qui bâtira une maison à mon nom. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ordonne maintenant que l’on coupe pour moi des cèdres du Liban. Mes serviteurs seront avec les tiens, et je te paierai le salaire de tes serviteurs tel que tu l’auras fixé; car tu sais qu’il n’y a personne parmi nous qui s’entende à couper les bois comme les Sidoniens. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Lorsqu’il entendit les paroles de Salomon, Hiram eut une grande joie, et il dit: Béni soit aujourd’hui l’Éternel, qui a donné à David un fils sage pour chef de ce grand peuple! '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Et Hiram fit répondre à Salomon: J’ai entendu ce que tu m’as envoyé dire. Je ferai tout ce qui te plaira au sujet des bois de cèdre et des bois de cyprès. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Mes serviteurs les descendront du Liban à la mer, et je les expédierai par mer en radeaux jusqu’au lieu que tu m’indiqueras; là, je les ferai délier, et tu les prendras. Ce que je désire en retour, c’est que tu fournisses des vivres à ma maison. '
