document_id: JOB.11,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Discours de Tsophar à Job
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-12: cf. Job 32:2, 3. (Job 12. Ro 11:33-36. Ps 94:8-11.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Tsophar de Naama prit la parole et dit:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: S’il passe, s’il saisit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: S’il traîne à son tribunal, qui s’y opposera?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 10:11
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 35:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Car il connaît les vicieux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il voit facilement les coupables.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 5:8
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 22:21
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ec 3:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: L’homme, au contraire, a l’intelligence d’un fou,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est né comme le petit d’un âne sauvage.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 13-20: cf. Job 22:21-30. És 55:6, 7.'
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Pour toi, dirige ton cœur vers Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Étends vers lui tes mains,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Éloigne-toi de l’iniquité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ne laisse pas habiter l’injustice sous ta tente.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Alors tu lèveras ton front sans tache,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu seras ferme et sans crainte;
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Tu oublieras tes souffrances,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu t’en souviendras comme des eaux écoulées.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Tes jours auront plus d’éclat que le soleil à son midi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tes ténèbres seront comme '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 37:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 112:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: la lumière du matin,
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Tu seras plein de confiance, et ton attente ne sera plus vaine;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tu regarderas autour de toi, et tu reposeras '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 26:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: en sûreté.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 26:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 3:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 4:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 3:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Tu te coucheras sans que personne ne te trouble,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et plusieurs caresseront ton visage.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Cette multitude de paroles ne trouvera-t-elle point de réponse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et suffira-t-il d’être un discoureur pour avoir raison?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Mais '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 8:13
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: les yeux des méchants seront consumés;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour eux point de refuge;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La mort, voilà leur espérance!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Tes vains propos feront-ils taire les gens?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Te moqueras-tu, sans que personne te confonde?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Tu dis: Ma manière de voir est juste,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je suis pur à tes yeux.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Oh! Si Dieu voulait parler,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: S’il ouvrait les lèvres pour te répondre,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Et s’il te révélait les secrets de sa sagesse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De son immense sagesse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu verrais alors qu’il ne te traite pas selon ton iniquité.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Prétends-tu sonder les pensées de Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parvenir à la connaissance parfaite du Tout-Puissant?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Elle est aussi haute que les cieux: que feras-tu?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Plus profonde que le séjour des morts: que sauras-tu?'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: La mesure en est plus longue que la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle est plus large que la mer.
