document_id: JOB.11,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Discours de Tsophar à Job
  - type: heading
    content: 'V. 1-12: cf. Job 32:2, 3. (Job 12. Ro 11:33-36. Ps 94:8-11.)'
  - type: text
    content: 'Tsophar de Naama prit la parole et dit:'
  '10':
  - type: text
    content: S’il passe, s’il saisit,
  - type: text
    content: S’il traîne à son tribunal, qui s’y opposera?
  '11':
  - type: text
    content: ' '
  - type: note
    content: Ps 10:11, 14; 35:22.
  - type: text
    content: Car il connaît les vicieux,
  - type: text
    content: Il voit facilement les coupables.
  '12':
  - type: text
    content: ' '
  - type: note
    content: Job 5:8; 22:21. Ec 3:18.
  - type: text
    content: L’homme, au contraire, a l’intelligence d’un fou,
  - type: text
    content: Il est né comme le petit d’un âne sauvage.
  - type: heading
    content: 'V. 13-20: cf. Job 22:21-30. És 55:6, 7.'
  '13':
  - type: text
    content: Pour toi, dirige ton cœur vers Dieu,
  - type: text
    content: Étends vers lui tes mains,
  '14':
  - type: text
    content: Éloigne-toi de l’iniquité,
  - type: text
    content: Et ne laisse pas habiter l’injustice sous ta tente.
  '15':
  - type: text
    content: Alors tu lèveras ton front sans tache,
  - type: text
    content: Tu seras ferme et sans crainte;
  '16':
  - type: text
    content: Tu oublieras tes souffrances,
  - type: text
    content: Tu t’en souviendras comme des eaux écoulées.
  '17':
  - type: text
    content: Tes jours auront plus d’éclat que le soleil à son midi,
  - type: text
    content: 'Tes ténèbres seront comme '
  - type: note
    content: Ps 37:6; 112:4.
  - type: text
    content: la lumière du matin,
  '18':
  - type: text
    content: Tu seras plein de confiance, et ton attente ne sera plus vaine;
  - type: text
    content: 'Tu regarderas autour de toi, et tu reposeras '
  - type: note
    content: Lé 26:5.
  - type: text
    content: en sûreté.
  '19':
  - type: text
    content: ' '
  - type: note
    content: Lé 26:6. Ps 3:6; 4:9. Pr 3:24.
  - type: text
    content: Tu te coucheras sans que personne ne te trouble,
  - type: text
    content: Et plusieurs caresseront ton visage.
  '2':
  - type: text
    content: Cette multitude de paroles ne trouvera-t-elle point de réponse,
  - type: text
    content: Et suffira-t-il d’être un discoureur pour avoir raison?
  '20':
  - type: text
    content: 'Mais '
  - type: note
    content: Job 8:13, 14; 18:14.
  - type: text
    content: les yeux des méchants seront consumés;
  - type: text
    content: Pour eux point de refuge;
  - type: text
    content: La mort, voilà leur espérance!
  '3':
  - type: text
    content: Tes vains propos feront-ils taire les gens?
  - type: text
    content: Te moqueras-tu, sans que personne te confonde?
  '4':
  - type: text
    content: 'Tu dis: Ma manière de voir est juste,'
  - type: text
    content: Et je suis pur à tes yeux.
  '5':
  - type: text
    content: Oh! Si Dieu voulait parler,
  - type: text
    content: S’il ouvrait les lèvres pour te répondre,
  '6':
  - type: text
    content: Et s’il te révélait les secrets de sa sagesse,
  - type: text
    content: De son immense sagesse,
  - type: text
    content: Tu verrais alors qu’il ne te traite pas selon ton iniquité.
  '7':
  - type: text
    content: Prétends-tu sonder les pensées de Dieu,
  - type: text
    content: Parvenir à la connaissance parfaite du Tout-Puissant?
  '8':
  - type: text
    content: 'Elle est aussi haute que les cieux: que feras-tu?'
  - type: text
    content: 'Plus profonde que le séjour des morts: que sauras-tu?'
  '9':
  - type: text
    content: La mesure en est plus longue que la terre,
  - type: text
    content: Elle est plus large que la mer.
