document_id: 1CH.27,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les chefs de l’armée
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-15: cf. 1 Ch 11:10-47.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Enfants d’Israël selon leur nombre, chefs de maisons paternelles, chefs de milliers et de centaines, et officiers au service du roi pour tout ce qui concernait les divisions, leur arrivée et leur départ, mois par mois, pendant tous les mois de l’année, chaque division étant de vingt-quatre mille hommes. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Le septième, pour le septième mois, était Hélets, le Pelonite, des fils d’Éphraïm; et il avait une division de vingt-quatre mille hommes. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Le huitième, pour le huitième mois, était Sibbecaï, le Huschatite, de la famille des Zérachites; et il avait une division de vingt-quatre mille hommes. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Le neuvième, pour le neuvième mois, était Abiézer, d’Anathoth, des Benjamites; et il avait une division de vingt-quatre mille hommes. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Le dixième, pour le dixième mois, était Maharaï, de Nethopha, de la famille des Zérachites; et il avait une division de vingt-quatre mille hommes. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Le onzième, pour le onzième mois, était Benaja, de Pirathon, des fils d’Éphraïm; et il avait une division de vingt-quatre mille hommes. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Le douzième, pour le douzième mois, était Heldaï, de Nethopha, de la famille d’Othniel; et il avait une division de vingt-quatre mille hommes.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 16-24: cf. No 2.'
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Voici les chefs des tribus d’Israël. Chef des Rubénites: Éliézer, fils de Zicri; des Siméonites: Schephathia, fils de Maaca; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'des Lévites: Haschabia, fils de Kemuel; de la famille d’Aaron: Tsadok; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'de Juda: Élihu, des frères de David; d’Issacar: Omri, fils de Micaël; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'de Zabulon: Jischemaeja, fils d’Abdias; de Nephthali: Jerimoth, fils d’Azriel; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'A la tête de la première division, pour le premier mois, était Jaschobeam, fils de Zabdiel; et il avait une division de vingt-quatre mille hommes. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'des fils d’Éphraïm: Hosée, fils d’Azazia; de la demi-tribu de Manassé: Joël, fils de Pedaja; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'de la demi-tribu de Manassé en Galaad: Jiddo, fils de Zacharie; de Benjamin: Jaasiel, fils d’Abner; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'de Dan: Azareel, fils de Jerocham. Ce sont là les chefs des tribus d’Israël. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'David ne fit point le dénombrement de ceux d’Israël qui étaient âgés de vingt ans et au-dessous, car l’Éternel avait promis de multiplier Israël comme les étoiles du ciel. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Joab, fils de Tseruja, avait commencé le dénombrement, mais il ne l’acheva pas, l’Éternel s’étant irrité contre Israël à cause de ce dénombrement, qui ne fut point porté parmi ceux des Chroniques du roi David.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Autres fonctionnaires de David
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 25-34: cf. 2 Ch 26:10. 2 S 8:15-18.'
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Azmaveth, fils d’Adiel, était préposé sur les trésors du roi; Jonathan, fils d’Ozias, sur les provisions dans les champs, les villes, les villages et les tours; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ezri, fils de Kelub, sur les ouvriers de la campagne qui cultivaient la terre; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Schimeï, de Rama, sur les vignes; Zabdi, de Schepham, sur les provisions de vin dans les vignes; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Baal-Hanan, de Guéder, sur les oliviers et les sycomores dans la plaine; Joasch, sur les provisions d’huile; '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Schithraï, de Saron, sur les bœufs qui paissaient en Saron; Schaphath, fils d’Adlaï, sur les bœufs dans les vallées; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Il était des fils de Pérets, et il commandait tous les chefs des troupes du premier mois. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Obil, l’Ismaélite, sur les chameaux; Jechdia, de Méronoth, sur les ânesses; '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Jaziz, l’Hagarénien, sur les brebis. Tous ceux-là étaient intendants des biens du roi David. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Jonathan, oncle de David, était conseiller, homme de sens et de savoir; Jehiel, fils de Hacmoni, était auprès des fils du roi; '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Achitophel était conseiller du roi; Huschaï, l’Arkien, était ami du roi; '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: après Achitophel, Jehojada, fils de Benaja, et Abiathar, furent conseillers; Joab était chef de l’armée du roi.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'A la tête de la division du second mois était Dodaï, l’Achochite; Mikloth était l’un des chefs de sa division; et il avait une division de vingt-quatre mille hommes. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Le chef de la troisième division, pour le troisième mois, était Benaja, fils du sacrificateur Jehojada, chef; et il avait une division de vingt-quatre mille hommes. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ce Benaja était un héros parmi les trente et à la tête des trente; et Ammizadab, son fils, était l’un des chefs de sa division. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Le quatrième, pour le quatrième mois, était Asaël, frère de Joab, et, après lui, Zebadia, son fils; et il avait une division de vingt-quatre mille hommes. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Le cinquième, pour le cinquième mois, était le chef Schamehuth, le Jizrachite; et il avait une division de vingt-quatre mille hommes. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Le sixième, pour le sixième mois, était Ira, fils d’Ikkesch, le Tekoïte; et il avait une division de vingt-quatre mille hommes. '
