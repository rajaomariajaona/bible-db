document_id: 2CH.9,93
type_code: fra
verses:
  '1':
  - type: heading
    content: La reine de Séba à Jérusalem
  - type: heading
    content: 'V. 1-12: cf. 1 R 10:1-13. Mt 12:42. Ps 72:10, 15.'
  - type: text
    content: ' '
  - type: note
    content: 1 R 10:1, etc. Mt 12:42. Lu 11:31.
  - type: text
    content: 'La reine de Séba apprit la renommée de Salomon, et elle vint à Jérusalem pour l’éprouver par des énigmes. Elle avait une suite fort nombreuse, et des chameaux portant des aromates, de l’or en grande quantité et des pierres précieuses. Elle se rendit auprès de Salomon, et elle lui dit tout ce qu’elle avait dans le cœur. '
  '10':
  - type: text
    content: 'Les serviteurs de Huram et les serviteurs de Salomon, qui apportèrent de l’or d’Ophir, amenèrent aussi du bois de sandal et des pierres précieuses. '
  '11':
  - type: note
    content: 1 R 10:12.
  - type: text
    content: 'Le roi fit avec le bois de sandal des escaliers pour la maison de l’Éternel et pour la maison du roi, et des harpes et des luths pour les chantres. On n’en avait pas vu de semblable auparavant dans le pays de Juda. '
  '12':
  - type: text
    content: Le roi Salomon donna à la reine de Séba tout ce qu’elle désira, ce qu’elle demanda, plus qu’elle n’avait apporté au roi. Puis elle s’en retourna et alla dans son pays, elle et ses serviteurs.
  - type: heading
    content: Richesse de Salomon
  - type: heading
    content: 'V. 13-28: cf. (1 R 10:14-29; 4:21-34.)'
  '13':
  - type: text
    content: 'Le poids de l’or qui arrivait chaque année à Salomon était de six cent soixante-six talents d’or, '
  '14':
  - type: text
    content: 'outre ce qu’il retirait des négociants et des marchands qui en apportaient, de tous les rois d’Arabie et des gouverneurs du pays, qui apportaient de l’or et de l’argent à Salomon. '
  '15':
  - type: text
    content: 'Le roi Salomon fit deux cents grands boucliers d’or battu, pour chacun desquels il employa six cents sicles d’or battu, '
  '16':
  - type: text
    content: 'et trois cents autres boucliers d’or battu, pour chacun desquels il employa trois cents sicles d’or; et le roi les mit dans la maison de la forêt du Liban. '
  '17':
  - type: text
    content: 'Le roi fit un grand trône d’ivoire, et le couvrit d’or pur. '
  '18':
  - type: text
    content: 'Ce trône avait six degrés, et un marchepied d’or attenant au trône; il y avait des bras de chaque côté du siège; deux lions étaient près des bras, '
  '19':
  - type: text
    content: 'et douze lions sur les six degrés de part et d’autre. Il ne s’est rien fait de pareil pour aucun royaume. '
  '2':
  - type: text
    content: 'Salomon répondit à toutes ses questions, et il n’y eut rien que Salomon ne sût lui expliquer. '
  '20':
  - type: text
    content: 'Toutes les coupes du roi Salomon étaient d’or, et toute la vaisselle de la maison de la forêt du Liban était d’or pur. Rien n’était d’argent: on n’en faisait aucun cas du temps de Salomon. '
  '21':
  - type: text
    content: 'Car le roi avait des navires de Tarsis naviguant avec les serviteurs de Huram; et tous les trois ans arrivaient les navires de Tarsis, apportant de l’or et de l’argent, de l’ivoire, des singes et des paons. '
  '22':
  - type: text
    content: 'Le roi Salomon fut plus grand que tous les rois de la terre par les richesses et par la sagesse. '
  '23':
  - type: text
    content: 'Tous les rois de la terre cherchaient à voir Salomon, pour entendre la sagesse que Dieu avait mise dans son cœur. '
  '24':
  - type: text
    content: 'Et chacun d’eux apportait son présent, des objets d’argent et des objets d’or, des vêtements, des armes, des aromates, des chevaux et des mulets; et il en était ainsi chaque année. '
  '25':
  - type: note
    content: 1 R 4:26; 10:26. 2 Ch 1:14.
  - type: text
    content: 'Salomon avait quatre mille crèches pour les chevaux destinés à ses chars, et douze mille cavaliers qu’il plaça dans les villes où il tenait ses chars et à Jérusalem près du roi. '
  '26':
  - type: text
    content: 'Il dominait sur tous les rois, depuis le fleuve jusqu’au pays des Philistins et jusqu’à la frontière d’Égypte. '
  '27':
  - type: note
    content: 2 Ch 1:15.
  - type: text
    content: 'Le roi rendit l’argent aussi commun à Jérusalem que les pierres, et les cèdres aussi nombreux que les sycomores qui croissent dans la plaine. '
  '28':
  - type: text
    content: C’était de l’Égypte et de tous les pays que l’on tirait des chevaux pour Salomon.
  - type: heading
    content: Sa mort
  - type: heading
    content: 'V. 29-31: cf. 1 R 11:41-43.'
  '29':
  - type: text
    content: 'Le reste '
  - type: note
    content: 1 R 11:41.
  - type: text
    content: 'des actions de Salomon, les premières et les dernières, cela n’est-il pas écrit dans le livre de Nathan, le prophète, dans la prophétie d’Achija de Silo, et dans les révélations de Jéedo, le prophète sur Jéroboam, fils de Nebath? '
  '3':
  - type: text
    content: 'La reine de Séba vit la sagesse de Salomon, et la maison qu’il avait bâtie, '
  '30':
  - type: text
    content: 'Salomon régna quarante ans à Jérusalem sur tout Israël. '
  '31':
  - type: text
    content: Puis Salomon se coucha avec ses pères, et on l’enterra dans la ville de David, son père. Et Roboam, son fils, régna à sa place.
  '4':
  - type: text
    content: 'et les mets de sa table, et la demeure de ses serviteurs, et les fonctions et les vêtements de ceux qui le servaient, et ses échansons et leurs vêtements, et les degrés par lesquels on montait à la maison de l’Éternel. '
  '5':
  - type: text
    content: 'Hors d’elle-même, elle dit au roi: C’était donc vrai ce que j’ai appris dans mon pays au sujet de ta position et de ta sagesse! '
  '6':
  - type: text
    content: 'Je ne croyais pas ce qu’on en disait, avant d’être venue et d’avoir vu de mes yeux. Et voici, on ne m’a pas raconté la moitié de la grandeur de ta sagesse. Tu surpasses ce que la renommée m’a fait connaître. '
  '7':
  - type: text
    content: 'Heureux tes gens, heureux tes serviteurs, qui sont continuellement devant toi et qui entendent ta sagesse! '
  '8':
  - type: text
    content: 'Béni soit l’Éternel, ton Dieu, qui t’a accordé la faveur de te placer sur son trône comme roi pour l’Éternel, ton Dieu! C’est parce que ton Dieu aime Israël et veut le faire subsister à toujours, qu’il t’a établi roi sur lui pour que tu fasses droit et justice. '
  '9':
  - type: text
    content: 'Elle donna au roi cent vingt talents d’or, une très grande quantité d’aromates et des pierres précieuses. Il n’y eut plus d’aromates tels que ceux donnés au roi Salomon par la reine de Séba. '
