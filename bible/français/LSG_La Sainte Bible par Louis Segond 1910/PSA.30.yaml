document_id: PSA.30,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 2 S 5:11, 12. (És 38:16-20. Ps 66; 107; 17-22.)
  - type: text
    content: Psaume. Cantique pour la dédicace de la maison. De David.
  '10':
  - type: text
    content: Que gagnes-tu à verser mon sang,
  - type: text
    content: A me faire descendre dans la fosse?
  - type: text
    content: La poussière a-t-elle pour toi des louanges?
  - type: text
    content: Raconte-t-elle ta fidélité?
  '11':
  - type: text
    content: Écoute, Éternel, aie pitié de moi!
  - type: text
    content: Éternel, secours-moi!
  '12':
  - type: text
    content: Et tu as changé mes lamentations en allégresse,
  - type: text
    content: Tu as délié mon sac, et tu m’as ceint de joie,
  '13':
  - type: text
    content: Afin que mon cœur te chante et ne soit pas muet.
  - type: text
    content: Éternel, mon Dieu! Je te louerai toujours.
  '2':
  - type: text
    content: Je t’exalte, ô Éternel, car tu m’as relevé,
  - type: text
    content: Tu n’as pas voulu que mes ennemis se réjouissent à mon sujet.
  '3':
  - type: text
    content: Éternel, mon Dieu!
  - type: text
    content: J’ai crié à toi, et tu m’as guéri.
  '4':
  - type: text
    content: Éternel! Tu as fait remonter mon âme du séjour des morts,
  - type: text
    content: Tu m’as fait revivre loin de ceux qui descendent dans la fosse.
  '5':
  - type: text
    content: Chantez à l’Éternel, vous qui l’aimez,
  - type: note
    content: Ps 97:12.
  - type: text
    content: Célébrez par vos louanges sa sainteté!
  '6':
  - type: text
    content: Car sa colère dure un instant,
  - type: text
    content: Mais sa grâce toute la vie;
  - type: text
    content: Le soir arrivent les pleurs,
  - type: text
    content: Et le matin l’allégresse.
  '7':
  - type: text
    content: 'Je disais dans ma sécurité:'
  - type: text
    content: Je ne chancellerai jamais!
  '8':
  - type: text
    content: Éternel! Par ta grâce tu avais affermi ma montagne…
  - type: text
    content: Tu cachas ta face, et je fus troublé.
  '9':
  - type: text
    content: Éternel! J’ai crié à toi,
  - type: text
    content: 'J’ai imploré l’Éternel:'
