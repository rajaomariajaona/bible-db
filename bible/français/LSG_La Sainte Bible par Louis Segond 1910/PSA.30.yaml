document_id: PSA.30
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 2 S 5:11, 12. (És 38:16-20. Ps 66; 107; 17-22.)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Psaume. Cantique pour la dédicace de la maison. De David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Je t’exalte, ô Éternel, car tu m’as relevé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu n’as pas voulu que mes ennemis se réjouissent à mon sujet.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Éternel, mon Dieu!
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’ai crié à toi, et tu m’as guéri.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Éternel! Tu as fait remonter mon âme du séjour des morts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu m’as fait revivre loin de ceux qui descendent dans la fosse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Chantez à l’Éternel, vous qui l’aimez,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 97:12
      metadata:
        usfm: PSA.97.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Célébrez par vos louanges sa sainteté!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Car sa colère dure un instant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais sa grâce toute la vie;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le soir arrivent les pleurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le matin l’allégresse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Je disais dans ma sécurité:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je ne chancellerai jamais!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Éternel! Par ta grâce tu avais affermi ma montagne…
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu cachas ta face, et je fus troublé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Éternel! J’ai crié à toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'J’ai imploré l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Que gagnes-tu à verser mon sang,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A me faire descendre dans la fosse?
- type: usfm
  marker: q1
  children:
  - type: text
    text: La poussière a-t-elle pour toi des louanges?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raconte-t-elle ta fidélité?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Écoute, Éternel, aie pitié de moi!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Éternel, secours-moi!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Et tu as changé mes lamentations en allégresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu as délié mon sac, et tu m’as ceint de joie,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Afin que mon cœur te chante et ne soit pas muet.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Éternel, mon Dieu! Je te louerai toujours.
