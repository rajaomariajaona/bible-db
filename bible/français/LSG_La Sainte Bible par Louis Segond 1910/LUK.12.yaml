document_id: LUK.12,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Instructions de Jésus sur: — l’hypocrisie, — la crainte des hommes, — le blasphème contre le Saint-Esprit, — l’avarice, — la confiance dans les richesses (parabole de l’homme riche), — les inquiétudes, — l’aumône, — la vigilance, — les signes des temps, — la réconciliation'
  - type: heading
    content: 'V. 1-12: cf. Mt 16:6-12; 10:16-39.'
  - type: text
    content: 'Sur ces entrefaites, les gens s’étant rassemblés '
  - type: note
    content: Mt 16:6. Mc 8:15.
  - type: text
    content: 'par milliers, au point de se fouler les uns les autres, Jésus se mit à dire à ses disciples: '
  - type: text
    content: Avant tout, gardez-vous du levain des pharisiens, qui est l’hypocrisie.
  '10':
  - type: text
    content: Et quiconque parlera contre le Fils de l’homme, il lui sera pardonné;
  - type: text
    content: ' '
  - type: note
    content: 1 Jn 5:16.
  - type: text
    content: mais à celui qui blasphémera contre le Saint-Esprit il ne sera point pardonné.
  - type: text
    content: ' '
  '11':
  - type: note
    content: Mt 10:19. Mc 13:11. Lu 21:14.
  - type: text
    content: Quand on vous mènera devant les synagogues, les magistrats et les autorités, ne vous inquiétez pas de la manière dont vous vous défendrez ni de ce que vous direz;
  - type: text
    content: ' '
  '12':
  - type: text
    content: car le Saint-Esprit vous enseignera à l’heure même ce qu’il faudra dire.
  - type: heading
    content: 'V. 13-21: cf. (Ps 49; 73.) Mt 16:26. Lu 16:19-26. Jé 9:23. Ec 8:8; 9:12.'
  '13':
  - type: text
    content: 'Quelqu’un dit à Jésus, du milieu de la foule: Maître, dis à mon frère de partager avec moi notre héritage. '
  '14':
  - type: text
    content: 'Jésus lui répondit: '
  - type: text
    content: O homme, qui m’a établi pour être votre juge, ou pour faire vos partages?
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'Puis il leur dit: '
  - type: text
    content: Gardez-vous avec soin
  - type: text
    content: ' '
  - type: note
    content: 1 Ti 6:7.
  - type: text
    content: de toute avarice; car la vie d’un homme ne dépend pas de ses biens, fût-il dans l’abondance.
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'Et il leur dit cette parabole: '
  - type: text
    content: Les terres d’un homme riche avaient beaucoup rapporté.
  '17':
  - type: text
    content: ' '
  - type: text
    content: 'Et il raisonnait en lui-même, disant: Que ferai-je? Car je n’ai pas de place pour serrer ma récolte.'
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'Voici, dit-il, ce que je ferai: j’abattrai mes greniers, j’en bâtirai de plus grands, j’y amasserai toute ma récolte et tous mes biens;'
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'et je dirai à mon âme:'
  - type: text
    content: ' '
  - type: note
    content: Ec 11:9. 1 Co 15:32. Ja 5:5.
  - type: text
    content: Mon âme, tu as beaucoup de biens en réserve pour plusieurs années; repose-toi, mange, bois, et réjouis-toi.
  - type: text
    content: ' '
  '2':
  - type: text
    content: ' '
  - type: note
    content: Job 12:22. Mt 10:26. Mc 4:22. Lu 8:17.
  - type: text
    content: Il n’y a rien de caché qui ne doive être découvert, ni de secret qui ne doive être connu.
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'Mais Dieu lui dit:'
  - type: text
    content: ' '
  - type: note
    content: Ps 52:7. Jé 17:11.
  - type: text
    content: Insensé! Cette nuit même ton âme te sera redemandée; et ce que tu as préparé,
  - type: text
    content: ' '
  - type: note
    content: Ps 39:7.
  - type: text
    content: pour qui cela sera-t-il?
  - type: text
    content: ' '
  '21':
  - type: text
    content: Il en est ainsi de celui qui amasse des trésors pour lui-même, et qui n’est pas riche pour Dieu.
  - type: heading
    content: 'V. 22-34: cf. Mt 6:19-34. (1 Ti 6:6-8. Hé 13:5.)'
  '22':
  - type: text
    content: 'Jésus dit ensuite à ses disciples: '
  - type: note
    content: Ps 55:23. Mt 6:25. Ph 4:6. 1 Ti 6:8. 1 Pi 5:7.
  - type: text
    content: 'C’est pourquoi je vous dis: Ne vous inquiétez pas pour votre vie de ce que vous mangerez, ni pour votre corps de quoi vous serez vêtus.'
  '23':
  - type: text
    content: ' '
  - type: text
    content: La vie est plus que la nourriture, et le corps plus que le vêtement.
  - type: text
    content: ' '
  '24':
  - type: note
    content: Job 39:3. Ps 147:9.
  - type: text
    content: 'Considérez les corbeaux: ils ne sèment ni ne moissonnent, ils n’ont ni cellier ni grenier; et Dieu les nourrit. Combien ne valez-vous pas plus que les oiseaux!'
  - type: text
    content: ' '
  '25':
  - type: note
    content: Mt 6:27.
  - type: text
    content: Qui de vous, par ses inquiétudes, peut ajouter une coudée à la durée de sa vie?
  - type: text
    content: ' '
  '26':
  - type: text
    content: Si donc vous ne pouvez pas même la moindre chose, pourquoi vous inquiétez-vous du reste?
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'Considérez comment croissent les lis: ils ne travaillent ni ne filent; cependant je vous dis que Salomon même, dans toute sa gloire, n’a pas été vêtu comme l’un d’eux.'
  - type: text
    content: ' '
  '28':
  - type: text
    content: Si Dieu revêt ainsi l’herbe qui est aujourd’hui dans les champs et qui demain sera jetée au four, à combien plus forte raison ne vous vêtira-t-il pas, gens de peu de foi?
  - type: text
    content: ' '
  '29':
  - type: text
    content: Et vous, ne cherchez pas ce que vous mangerez et ce que vous boirez, et ne soyez pas inquiets.
  - type: text
    content: ' '
  '3':
  - type: text
    content: C’est pourquoi tout ce que vous aurez dit dans les ténèbres sera entendu dans la lumière, et ce que vous aurez dit à l’oreille dans les chambres sera prêché sur les toits.
  - type: text
    content: ' '
  '30':
  - type: text
    content: Car toutes ces choses, ce sont les païens du monde qui les recherchent. Votre Père sait que vous en avez besoin.
  - type: text
    content: ' '
  '31':
  - type: note
    content: 1 R 3:13. Ps 37:25.
  - type: text
    content: Cherchez plutôt le royaume de Dieu; et toutes ces choses vous seront données par-dessus.
  - type: text
    content: ' '
  '32':
  - type: text
    content: Ne crains point, petit troupeau; car votre Père a trouvé bon de vous donner le royaume.
  - type: text
    content: ' '
  '33':
  - type: note
    content: Mt 19:21. Lu 16:9.
  - type: text
    content: Vendez ce que vous possédez, et donnez-le en aumônes.
  - type: text
    content: ' '
  - type: note
    content: Mt 6:20; 19:21. Lu 16:9. 1 Ti 6:19.
  - type: text
    content: Faites-vous des bourses qui ne s’usent point, un trésor inépuisable dans les cieux, où le voleur n’approche point, et où la teigne ne détruit point.
  - type: text
    content: ' '
  '34':
  - type: text
    content: Car là où est votre trésor, là aussi sera votre cœur.
  - type: heading
    content: 'V. 35-40: cf. Mc 13:33-37. Mt 24:42-44; 25:1-13.'
  '35':
  - type: text
    content: ' '
  - type: note
    content: Ép 6:14. 1 Pi 1:13.
  - type: text
    content: Que vos reins soient ceints, et vos lampes allumées.
  - type: text
    content: ' '
  '36':
  - type: text
    content: Et vous, soyez semblables à des hommes qui attendent que leur maître revienne des noces, afin de lui ouvrir dès qu’il arrivera et frappera.
  - type: text
    content: ' '
  '37':
  - type: text
    content: Heureux ces serviteurs que le maître, à son arrivée, trouvera veillant! Je vous le dis en vérité, il se ceindra, les fera mettre à table, et s’approchera pour les servir.
  - type: text
    content: ' '
  '38':
  - type: note
    content: Mt 24:42.
  - type: text
    content: Qu’il arrive à la deuxième ou à la troisième veille, heureux ces serviteurs, s’il les trouve veillant!
  - type: text
    content: ' '
  '39':
  - type: note
    content: Mt 24:43. 1 Th 5:2. 2 Pi 3:10. Ap 3:3; 16:15.
  - type: text
    content: Sachez-le bien, si le maître de la maison savait à quelle heure le voleur doit venir, il veillerait et ne laisserait pas percer sa maison.
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'Je vous dis, à vous qui êtes mes amis:'
  - type: text
    content: ' '
  - type: note
    content: És 51:7. Jé 1:8. Mt 10:28.
  - type: text
    content: Ne craignez pas ceux qui tuent le corps et qui, après cela, ne peuvent rien faire de plus.
  - type: text
    content: ' '
  '40':
  - type: note
    content: Mt 24:44; 25:13. Mc 13:33. Lu 21:34. 1 Th 5:6.
  - type: text
    content: Vous aussi, tenez-vous prêts, car le Fils de l’homme viendra à l’heure où vous n’y penserez pas.
  - type: heading
    content: 'V. 41-48: cf. Mt 24:45-51; 25:14-30.'
  '41':
  - type: text
    content: 'Pierre lui dit: Seigneur, est-ce à nous, ou à tous, que tu adresses cette parabole? '
  '42':
  - type: text
    content: 'Et le Seigneur dit: '
  - type: note
    content: Mt 24:45; 25:21. 1 Co 4:2.
  - type: text
    content: Quel est donc l’économe fidèle et prudent que le maître établira sur ses gens, pour leur donner la nourriture au temps convenable?
  '43':
  - type: text
    content: ' '
  - type: text
    content: Heureux ce serviteur, que son maître, à son arrivée, trouvera faisant ainsi!
  - type: text
    content: ' '
  '44':
  - type: text
    content: Je vous le dis en vérité, il l’établira sur tous ses biens.
  - type: text
    content: ' '
  '45':
  - type: text
    content: 'Mais, si ce serviteur dit en lui-même: Mon maître tarde à venir; s’il se met à battre les serviteurs et les servantes, à manger, à boire et à s’enivrer,'
  - type: text
    content: ' '
  '46':
  - type: text
    content: le maître de ce serviteur viendra le jour où il ne s’y attend pas et à l’heure qu’il ne connaît pas, il le mettra en pièces, et lui donnera sa part avec les infidèles.
  - type: text
    content: ' '
  '47':
  - type: note
    content: Ja 4:17.
  - type: text
    content: Le serviteur qui, ayant connu la volonté de son maître, n’a rien préparé et n’a pas agi selon sa volonté, sera battu d’un grand nombre de coups.
  - type: text
    content: ' '
  '48':
  - type: text
    content: Mais celui qui, ne l’ayant pas connue, a fait des choses dignes de châtiment, sera battu de peu de coups. On demandera beaucoup à qui l’on a beaucoup donné, et on exigera davantage de celui à qui l’on a beaucoup confié.
  - type: heading
    content: 'V. 49-53: cf. Mt 10:34-36.'
  '49':
  - type: text
    content: ' '
  - type: text
    content: Je suis venu jeter un feu sur la terre, et qu’ai-je à désirer, s’il est déjà allumé?
  - type: text
    content: ' '
  '5':
  - type: text
    content: Je vous montrerai qui vous devez craindre. Craignez celui qui, après avoir tué, a le pouvoir de jeter dans la géhenne; oui, je vous le dis, c’est lui que vous devez craindre.
  - type: text
    content: ' '
  '50':
  - type: note
    content: Mt 20:22. Mc 10:38.
  - type: text
    content: Il est un baptême dont je dois être baptisé, et combien il me tarde qu’il soit accompli!
  - type: text
    content: ' '
  '51':
  - type: note
    content: Mt 10:34.
  - type: text
    content: Pensez-vous que je sois venu apporter la paix sur la terre? Non, vous dis-je,
  - type: text
    content: ' '
  - type: note
    content: Mi 7:6.
  - type: text
    content: mais la division.
  - type: text
    content: ' '
  '52':
  - type: text
    content: Car désormais cinq dans une maison seront divisés, trois contre deux, et deux contre trois;
  - type: text
    content: ' '
  '53':
  - type: text
    content: le père contre le fils et le fils contre le père, la mère contre la fille et la fille contre la mère, la belle-mère contre la belle-fille et la belle-fille contre la belle-mère.
  - type: heading
    content: 'V. 54-59: cf. (Mt 16:1-3; 5:25, 26.)'
  '54':
  - type: text
    content: 'Il dit encore aux foules: '
  - type: note
    content: Mt 16:2.
  - type: text
    content: 'Quand vous voyez un nuage se lever à l’occident, vous dites aussitôt: La pluie vient. Et il arrive ainsi.'
  '55':
  - type: text
    content: ' '
  - type: text
    content: 'Et quand vous voyez souffler le vent du midi, vous dites: Il fera chaud. Et cela arrive.'
  - type: text
    content: ' '
  '56':
  - type: text
    content: Hypocrites! Vous savez discerner l’aspect de la terre et du ciel; comment ne discernez-vous pas ce temps-ci?
  - type: text
    content: ' '
  '57':
  - type: text
    content: Et pourquoi ne discernez-vous pas de vous-mêmes ce qui est juste?
  - type: text
    content: ' '
  '58':
  - type: note
    content: Pr 25:8. Mt 5:25.
  - type: text
    content: Lorsque tu vas avec ton adversaire devant le magistrat, tâche en chemin de te dégager de lui, de peur qu’il ne te traîne devant le juge, que le juge ne te livre à l’officier de justice, et que celui-ci ne te mette en prison.
  - type: text
    content: ' '
  '59':
  - type: text
    content: Je te le dis, tu ne sortiras pas de là que tu n’aies payé jusqu’à la dernière pite.
  '6':
  - type: note
    content: Mt 10:29.
  - type: text
    content: Ne vend-on pas cinq passereaux pour deux sous? Cependant, aucun d’eux n’est oublié devant Dieu.
  - type: text
    content: ' '
  '7':
  - type: note
    content: 1 S 14:45. 2 S 14:11. 1 R 1:52. Lu 21:18.
  - type: text
    content: 'Et même les cheveux de votre tête sont tous comptés. Ne craignez donc point: vous valez plus que beaucoup de passereaux.'
  - type: text
    content: ' '
  '8':
  - type: note
    content: Mt 10:32.
  - type: text
    content: Je vous le dis, quiconque me confessera devant les hommes, le Fils de l’homme le confessera aussi devant les anges de Dieu;
  - type: text
    content: ' '
  '9':
  - type: note
    content: Mt 10:33. Mc 8:38. Lu 9:26. 2 Ti 2:12. 1 Jn 2:23.
  - type: text
    content: mais celui qui me reniera devant les hommes sera renié devant les anges de Dieu.
  - type: text
    content: ' '
