document_id: PSA.109,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: Ps 35; 69. Ac 1:16-20.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au chef des chantres. De David. Psaume.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu de ma louange, ne te tais point!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que ses enfants soient vagabonds et qu’ils mendient,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’ils cherchent du pain loin de leur demeure en ruines!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que le créancier s’empare de tout ce qui est à lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que les étrangers pillent le fruit de son travail!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que nul ne conserve pour lui de l’affection,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que personne n’ait pitié de ses orphelins!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que ses descendants soient exterminés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que leur nom s’éteigne dans la génération suivante!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que l’iniquité de ses pères reste en souvenir devant l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que le péché de sa mère ne soit point effacé!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’ils soient toujours présents devant l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 18:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 34:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Et qu’il retranche de la terre leur mémoire,
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce qu’il ne s’est pas souvenu d’exercer la miséricorde,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce qu’il a persécuté le malheureux et l’indigent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jusqu’à faire mourir l’homme au cœur brisé!
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Il aimait la malédiction: qu’elle tombe sur lui!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Il ne se plaisait pas à la bénédiction: qu’elle s’éloigne de lui!'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’il revête la malédiction comme son vêtement,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’elle pénètre comme de l’eau dans son intérieur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme de l’huile dans ses os!
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’elle lui serve de vêtement pour se couvrir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De ceinture dont il soit toujours ceint!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car ils ouvrent contre moi une bouche méchante et trompeuse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils me parlent avec une langue mensongère,
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tel soit, de la part de l’Éternel, le salaire de mes ennemis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et de ceux qui parlent méchamment de moi!
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et toi, Éternel, Seigneur! Agis en ma faveur à cause de ton nom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car ta bonté est grande; délivre-moi!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis malheureux et indigent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et mon cœur est blessé au-dedans de moi.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je m’en vais comme l’ombre à son déclin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis chassé comme la sauterelle.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes genoux sont affaiblis par le jeûne,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et mon corps est épuisé de maigreur.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis pour eux un objet d’opprobre;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils me regardent, et secouent la tête.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Secours-moi, Éternel, mon Dieu!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sauve-moi par ta bonté!
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qu’ils sachent que c’est ta main,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que c’est toi, Éternel, qui l’as fait!
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: S’ils maudissent, toi tu béniras;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: S’ils se lèvent, ils seront confus,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ton serviteur se réjouira.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que mes adversaires revêtent l’ignominie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’ils se couvrent de leur honte comme d’un manteau!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils m’environnent de discours haineux
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 69:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Et ils me font la guerre sans cause.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je louerai de ma bouche hautement l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je le célébrerai au milieu de la multitude;
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car il se tient à la droite du pauvre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour le délivrer de ceux qui le condamnent.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tandis que je les aime, ils sont mes adversaires;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais moi je recours à la prière.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils me rendent le mal pour le bien,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et de la haine pour mon amour.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Place-le sous l’autorité d’un méchant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qu’un accusateur se tienne à sa droite!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand on le jugera, qu’il soit déclaré coupable,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 15:8
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 28:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Et que sa prière passe pour un péché!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que ses jours soient peu nombreux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’un autre prenne sa charge!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que ses enfants deviennent orphelins,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et sa femme veuve!
