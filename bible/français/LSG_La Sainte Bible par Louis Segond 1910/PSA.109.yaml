document_id: PSA.109,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ps 35; 69. Ac 1:16-20.
  - type: text
    content: Au chef des chantres. De David. Psaume.
  - type: text
    content: Dieu de ma louange, ne te tais point!
  '10':
  - type: text
    content: Que ses enfants soient vagabonds et qu’ils mendient,
  - type: text
    content: Qu’ils cherchent du pain loin de leur demeure en ruines!
  '11':
  - type: text
    content: Que le créancier s’empare de tout ce qui est à lui,
  - type: text
    content: Et que les étrangers pillent le fruit de son travail!
  '12':
  - type: text
    content: Que nul ne conserve pour lui de l’affection,
  - type: text
    content: Et que personne n’ait pitié de ses orphelins!
  '13':
  - type: text
    content: Que ses descendants soient exterminés,
  - type: text
    content: Et que leur nom s’éteigne dans la génération suivante!
  '14':
  - type: text
    content: Que l’iniquité de ses pères reste en souvenir devant l’Éternel,
  - type: text
    content: Et que le péché de sa mère ne soit point effacé!
  '15':
  - type: text
    content: Qu’ils soient toujours présents devant l’Éternel,
  - type: note
    content: Job 18:17. Ps 34:17.
  - type: text
    content: Et qu’il retranche de la terre leur mémoire,
  '16':
  - type: text
    content: Parce qu’il ne s’est pas souvenu d’exercer la miséricorde,
  - type: text
    content: Parce qu’il a persécuté le malheureux et l’indigent,
  - type: text
    content: Jusqu’à faire mourir l’homme au cœur brisé!
  '17':
  - type: text
    content: 'Il aimait la malédiction: qu’elle tombe sur lui!'
  - type: text
    content: 'Il ne se plaisait pas à la bénédiction: qu’elle s’éloigne de lui!'
  '18':
  - type: text
    content: Qu’il revête la malédiction comme son vêtement,
  - type: text
    content: Qu’elle pénètre comme de l’eau dans son intérieur,
  - type: text
    content: Comme de l’huile dans ses os!
  '19':
  - type: text
    content: Qu’elle lui serve de vêtement pour se couvrir,
  - type: text
    content: De ceinture dont il soit toujours ceint!
  '2':
  - type: text
    content: Car ils ouvrent contre moi une bouche méchante et trompeuse,
  - type: text
    content: Ils me parlent avec une langue mensongère,
  '20':
  - type: text
    content: Tel soit, de la part de l’Éternel, le salaire de mes ennemis,
  - type: text
    content: Et de ceux qui parlent méchamment de moi!
  '21':
  - type: text
    content: Et toi, Éternel, Seigneur! Agis en ma faveur à cause de ton nom,
  - type: text
    content: Car ta bonté est grande; délivre-moi!
  '22':
  - type: text
    content: Je suis malheureux et indigent,
  - type: text
    content: Et mon cœur est blessé au-dedans de moi.
  '23':
  - type: text
    content: Je m’en vais comme l’ombre à son déclin,
  - type: text
    content: Je suis chassé comme la sauterelle.
  '24':
  - type: text
    content: Mes genoux sont affaiblis par le jeûne,
  - type: text
    content: Et mon corps est épuisé de maigreur.
  '25':
  - type: text
    content: Je suis pour eux un objet d’opprobre;
  - type: text
    content: Ils me regardent, et secouent la tête.
  '26':
  - type: text
    content: Secours-moi, Éternel, mon Dieu!
  - type: text
    content: Sauve-moi par ta bonté!
  '27':
  - type: text
    content: Et qu’ils sachent que c’est ta main,
  - type: text
    content: Que c’est toi, Éternel, qui l’as fait!
  '28':
  - type: text
    content: S’ils maudissent, toi tu béniras;
  - type: text
    content: S’ils se lèvent, ils seront confus,
  - type: text
    content: Et ton serviteur se réjouira.
  '29':
  - type: text
    content: Que mes adversaires revêtent l’ignominie,
  - type: text
    content: Qu’ils se couvrent de leur honte comme d’un manteau!
  '3':
  - type: text
    content: Ils m’environnent de discours haineux
  - type: note
    content: Ps 69:5.
  - type: text
    content: Et ils me font la guerre sans cause.
  '30':
  - type: text
    content: Je louerai de ma bouche hautement l’Éternel,
  - type: text
    content: Je le célébrerai au milieu de la multitude;
  '31':
  - type: text
    content: Car il se tient à la droite du pauvre,
  - type: text
    content: Pour le délivrer de ceux qui le condamnent.
  '4':
  - type: text
    content: Tandis que je les aime, ils sont mes adversaires;
  - type: text
    content: Mais moi je recours à la prière.
  '5':
  - type: text
    content: Ils me rendent le mal pour le bien,
  - type: text
    content: Et de la haine pour mon amour.
  '6':
  - type: text
    content: Place-le sous l’autorité d’un méchant,
  - type: text
    content: Et qu’un accusateur se tienne à sa droite!
  '7':
  - type: text
    content: Quand on le jugera, qu’il soit déclaré coupable,
  - type: note
    content: Pr 15:8; 28:9.
  - type: text
    content: Et que sa prière passe pour un péché!
  '8':
  - type: text
    content: Que ses jours soient peu nombreux,
  - type: text
    content: Qu’un autre prenne sa charge!
  '9':
  - type: text
    content: Que ses enfants deviennent orphelins,
  - type: text
    content: Et sa femme veuve!
