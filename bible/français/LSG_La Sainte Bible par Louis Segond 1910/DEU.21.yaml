document_id: DEU.21,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les meurtres dont les auteurs sont inconnus
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-9: cf. (No 35:30-34. 2 R 24:4.) Ps 101:3; 139:19, 23. 1 Co 4:4.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si, dans le pays dont l’Éternel, ton Dieu, te donne la possession, l’on trouve étendu au milieu d’un champ un homme tué, sans que l’on sache qui l’a frappé, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque tu iras à la guerre contre tes ennemis, si l’Éternel les livre entre tes mains, et que tu leur fasses des prisonniers, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'peut-être verras-tu parmi les captives une femme belle de figure, et auras-tu le désir de la prendre pour femme. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors tu l’amèneras dans l’intérieur de ta maison. Elle se rasera la tête et se fera les ongles, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'elle quittera les vêtements qu’elle portait quand elle a été prise, elle demeurera dans ta maison, et elle pleurera son père et sa mère pendant un mois. Après cela, tu iras vers elle, tu l’auras en ta possession, et elle sera ta femme. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si elle cesse de te plaire, tu la laisseras aller où elle voudra, tu ne pourras pas la vendre pour de l’argent ni la traiter comme esclave, parce que tu l’auras humiliée. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si un homme, qui a deux femmes, aime l’une et n’aime pas l’autre, et s’il en a des fils dont le premier-né soit de la femme qu’il n’aime pas, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'il ne pourra point, quand il partagera son bien entre ses fils, reconnaître comme premier-né le fils de celle qu’il aime, à la place du fils de celle qu’il n’aime pas, et qui est le premier-né. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais il reconnaîtra pour premier-né le fils de celle qu’il n’aime pas, et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 5:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'lui donnera sur son bien une portion double; car ce fils est '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 49:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: les prémices de sa vigueur, le droit d’aînesse lui appartient.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les enfants rebelles
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 18-21: cf. (Ex 20:12; 21:15, 17. Pr 23:19-22; 30:17.) (2 S 18:14, 15, 33.)'
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si un homme a un fils indocile et rebelle, n’écoutant ni la voix de son père, ni la voix de sa mère, et ne leur obéissant pas même après qu’ils l’ont châtié, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le père et la mère le prendront, et le mèneront vers les anciens de sa ville et à la porte du lieu qu’il habite. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tes anciens et tes juges iront mesurer les distances à partir du cadavre jusqu’aux villes des environs. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils diront aux anciens de sa ville: Voici notre fils qui est indocile et rebelle, qui n’écoute pas notre voix, et qui se livre à des excès et à l’ivrognerie. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et tous les hommes de sa ville le lapideront, et il mourra. Tu ôteras ainsi le mal du milieu de toi, afin que tout Israël entende et craigne.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les cadavres des pendus
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 22-23: cf. (No 25:4. Jos 8:29.) Ga 3:13.'
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si l’on fait mourir un homme qui a commis un crime digne de mort, et que tu l’aies pendu à un bois, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'son cadavre ne passera point la nuit sur le bois; mais tu l’enterreras le jour même, car celui qui est pendu est un objet de malédiction auprès de '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 3:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Dieu, et tu ne souilleras point le pays que l’Éternel, ton Dieu, te donne pour héritage.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand on aura déterminé la ville la plus rapprochée du cadavre, les anciens de cette ville prendront une génisse qui n’ait point servi au travail et qui n’ait point tiré au joug. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils feront descendre cette génisse vers un torrent qui jamais ne tarisse et où il n’y ait ni culture ni semence; et là, ils briseront la nuque à la génisse, dans le torrent. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors s’approcheront les sacrificateurs, fils de Lévi; car l’Éternel, ton Dieu, les a choisis pour qu’ils le servent et qu’ils bénissent au nom de l’Éternel, et ce sont eux qui doivent prononcer sur toute contestation et sur toute blessure. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tous les anciens de cette ville la plus rapprochée du cadavre laveront leurs mains sur la génisse à laquelle on a brisé la nuque dans le torrent. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et prenant la parole, ils diront: Nos mains n’ont point répandu ce sang et nos yeux ne l’ont point vu répandre. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pardonne, ô Éternel! À ton peuple d’Israël, que tu as racheté; n’impute pas le sang innocent à ton peuple d’Israël, et ce sang ne lui sera point imputé. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ainsi, tu dois faire disparaître du milieu de toi le sang innocent, en faisant ce qui est droit aux yeux de l’Éternel.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les prisonnières de guerre. Les droits des premiers-nés
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 10-17: cf. De 20:10-14. Ex 21:7-11.'
    marker-yv: yv-h
