document_id: JAS.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’acception de personnes condamnée
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-13: cf. (Lé 19:15. De 25:13-15. Ps 82. Ac 10:34, 35.) (Ro 13:8-10. Mt 5:7, 19; 7:1, 2, 12.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Mes frères, que votre foi en notre glorieux Seigneur Jésus-Christ soit exempte '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 19:15
      metadata:
        usfm: LEV.19.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 16:19
      metadata:
        usfm: DEU.16.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 24:23
      metadata:
        usfm: PRO.24.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 22:16
      metadata:
        usfm: MAT.22.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'de toute acception de personnes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Supposez, en effet, qu’il entre dans votre assemblée un homme avec un anneau d’or et un habit magnifique, et qu’il y entre aussi un pauvre misérablement vêtu; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'si, tournant vos regards vers celui qui porte l’habit magnifique, vous lui dites: Toi, assieds-toi ici à cette place d’honneur! Et si vous dites au pauvre: Toi, tiens-toi là debout! Ou bien: Assieds-toi au-dessous de mon marchepied! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'ne faites-vous pas en vous-mêmes une distinction, et ne jugez-vous pas sous l’inspiration de pensées mauvaises? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 7:48
      metadata:
        usfm: JHN.7.48
    - type: text
      text: . 1 Co 1:26, etc.
    marker-yv: yv-n
  - type: text
    text: 'Écoutez, mes frères bien-aimés: Dieu n’a-t-il pas choisi les pauvres aux yeux du monde, pour qu’ils soient riches en la foi, et héritiers du royaume qu’il a '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 20:6
      metadata:
        usfm: EXO.20.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 2:30
      metadata:
        usfm: 1SA.2.30
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 8:17
      metadata:
        usfm: PRO.8.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 5:3
      metadata:
        usfm: MAT.5.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'promis à ceux qui l’aiment? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Et vous, vous avilissez le pauvre! Ne sont-ce pas les riches qui vous oppriment, et qui vous traînent devant les tribunaux? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ne sont-ce pas eux qui outragent le beau nom que vous portez? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Si vous accomplissez la loi royale, selon l’Écriture: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 19:18
      metadata:
        usfm: LEV.19.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 22:39
      metadata:
        usfm: MAT.22.39
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 12:31
      metadata:
        usfm: MRK.12.31
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 13:9
      metadata:
        usfm: ROM.13.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 5:14
      metadata:
        usfm: GAL.5.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 5:2
      metadata:
        usfm: EPH.5.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 4:9
      metadata:
        usfm: 1TH.4.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu aimeras ton prochain comme toi-même, vous faites bien. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Mais si vous faites acception de personnes, vous commettez un péché, vous êtes condamnés par la loi comme des transgresseurs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 27:26
      metadata:
        usfm: DEU.27.26
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 5:19
      metadata:
        usfm: MAT.5.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 3:10
      metadata:
        usfm: GAL.3.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Car quiconque observe toute la loi, mais pèche contre un seul commandement, devient coupable de tous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'En effet, celui qui a dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 20:14
      metadata:
        usfm: EXO.20.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 5:27
      metadata:
        usfm: MAT.5.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu ne commettras point d’adultère, a dit aussi: Tu ne tueras point. Or, si tu ne commets point d’adultère, mais que tu commettes un meurtre, tu deviens transgresseur de la loi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Parlez et agissez comme devant être jugés par une loi de liberté, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 6:15
      metadata:
        usfm: MAT.6.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 18:35
      metadata:
        usfm: MAT.18.35
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 11:25
      metadata:
        usfm: MRK.11.25
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 16:25
      metadata:
        usfm: LUK.16.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: car le jugement est sans miséricorde pour qui n’a pas fait miséricorde. La miséricorde triomphe du jugement.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La foi sans les œuvres
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 14-26: cf. (Ga 5:6. Ja 1:22-27. Mt 7:21-27.) Hé 11:17-19, 31. 1 Jn 2:3-6.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 7:26
      metadata:
        usfm: MAT.7.26
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ja 1:23
      metadata:
        usfm: JAS.1.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Mes frères, que sert-il à quelqu’un de dire qu’il a la foi, s’il n’a pas les œuvres? La foi peut-elle le sauver? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 3:11
      metadata:
        usfm: LUK.3.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 3:17
      metadata:
        usfm: 1JN.3.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Si un frère ou une sœur sont nus et manquent de la nourriture de chaque jour, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'et que l’un d’entre vous leur dise: Allez en paix, chauffez-vous et vous rassasiez! Et que vous ne leur donniez pas ce qui est nécessaire au corps, à quoi cela sert-il? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il en est ainsi de la foi: si elle n’a pas les œuvres, elle est morte en elle-même. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Mais quelqu’un dira: Toi, tu as la foi; et moi, j’ai les œuvres. Montre-moi ta foi sans les œuvres, et moi, je te montrerai la foi par mes œuvres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tu crois qu’il y a un seul Dieu, tu fais bien; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 1:24
      metadata:
        usfm: MRK.1.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'les démons le croient aussi, et ils tremblent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Veux-tu savoir, ô homme vain, que la foi sans les œuvres est inutile? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Abraham, notre père, ne fut-il pas justifié par les œuvres, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 22:10
      metadata:
        usfm: GEN.22.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'lorsqu’il offrit son fils Isaac sur l’autel? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Tu vois que la foi agissait avec ses œuvres, et que par les œuvres la foi fut rendue parfaite. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ainsi s’accomplit ce que dit l’Écriture: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 15:6
      metadata:
        usfm: GEN.15.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 4:3
      metadata:
        usfm: ROM.4.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 3:6
      metadata:
        usfm: GAL.3.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Abraham crut à Dieu, et cela lui fut imputé à justice; et il fut appelé ami de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Vous voyez que l’homme est justifié par les œuvres, et non par la foi seulement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 2:1
      metadata:
        usfm: JOS.2.1
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 6:23
      metadata:
        usfm: JOS.6.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 11:31
      metadata:
        usfm: HEB.11.31
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Rahab la prostituée ne fut-elle pas également justifiée par les œuvres, lorsqu’elle reçut les messagers et qu’elle les fit partir par un autre chemin? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Comme le corps sans âme est mort, de même la foi sans les œuvres est morte.
