document_id: JAS.2,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’acception de personnes condamnée
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-13: cf. (Lé 19:15. De 25:13-15. Ps 82. Ac 10:34, 35.) (Ro 13:8-10. Mt 5:7, 19; 7:1, 2, 12.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mes frères, que votre foi en notre glorieux Seigneur Jésus-Christ soit exempte '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 19:15
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 16:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 24:23
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 22:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'de toute acception de personnes. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 27:26
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 5:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 3:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Car quiconque observe toute la loi, mais pèche contre un seul commandement, devient coupable de tous. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, celui qui a dit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 20:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 5:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Tu ne commettras point d’adultère, a dit aussi: Tu ne tueras point. Or, si tu ne commets point d’adultère, mais que tu commettes un meurtre, tu deviens transgresseur de la loi. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Parlez et agissez comme devant être jugés par une loi de liberté, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 6:15
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18:35
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 11:25
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 16:25
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: car le jugement est sans miséricorde pour qui n’a pas fait miséricorde. La miséricorde triomphe du jugement.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La foi sans les œuvres
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 14-26: cf. (Ga 5:6. Ja 1:22-27. Mt 7:21-27.) Hé 11:17-19, 31. 1 Jn 2:3-6.'
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 7:26
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ja 1:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Mes frères, que sert-il à quelqu’un de dire qu’il a la foi, s’il n’a pas les œuvres? La foi peut-elle le sauver? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 3:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Jn 3:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Si un frère ou une sœur sont nus et manquent de la nourriture de chaque jour, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et que l’un d’entre vous leur dise: Allez en paix, chauffez-vous et vous rassasiez! Et que vous ne leur donniez pas ce qui est nécessaire au corps, à quoi cela sert-il? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il en est ainsi de la foi: si elle n’a pas les œuvres, elle est morte en elle-même. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais quelqu’un dira: Toi, tu as la foi; et moi, j’ai les œuvres. Montre-moi ta foi sans les œuvres, et moi, je te montrerai la foi par mes œuvres. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu crois qu’il y a un seul Dieu, tu fais bien; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 1:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'les démons le croient aussi, et ils tremblent. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Supposez, en effet, qu’il entre dans votre assemblée un homme avec un anneau d’or et un habit magnifique, et qu’il y entre aussi un pauvre misérablement vêtu; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Veux-tu savoir, ô homme vain, que la foi sans les œuvres est inutile? '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abraham, notre père, ne fut-il pas justifié par les œuvres, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 22:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'lorsqu’il offrit son fils Isaac sur l’autel? '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu vois que la foi agissait avec ses œuvres, et que par les œuvres la foi fut rendue parfaite. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi s’accomplit ce que dit l’Écriture: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 15:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 4:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 3:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Abraham crut à Dieu, et cela lui fut imputé à justice; et il fut appelé ami de Dieu. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous voyez que l’homme est justifié par les œuvres, et non par la foi seulement. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 2:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:23
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 11:31
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Rahab la prostituée ne fut-elle pas également justifiée par les œuvres, lorsqu’elle reçut les messagers et qu’elle les fit partir par un autre chemin? '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Comme le corps sans âme est mort, de même la foi sans les œuvres est morte.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'si, tournant vos regards vers celui qui porte l’habit magnifique, vous lui dites: Toi, assieds-toi ici à cette place d’honneur! Et si vous dites au pauvre: Toi, tiens-toi là debout! Ou bien: Assieds-toi au-dessous de mon marchepied! '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ne faites-vous pas en vous-mêmes une distinction, et ne jugez-vous pas sous l’inspiration de pensées mauvaises? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 7:48
      - type: text
        text: . 1 Co 1:26, etc.
      marker-yv: yv-n
    - type: text
      text: 'Écoutez, mes frères bien-aimés: Dieu n’a-t-il pas choisi les pauvres aux yeux du monde, pour qu’ils soient riches en la foi, et héritiers du royaume qu’il a '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 20:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 2:30
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 8:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 5:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'promis à ceux qui l’aiment? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et vous, vous avilissez le pauvre! Ne sont-ce pas les riches qui vous oppriment, et qui vous traînent devant les tribunaux? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ne sont-ce pas eux qui outragent le beau nom que vous portez? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si vous accomplissez la loi royale, selon l’Écriture: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 19:18
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 22:39
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 12:31
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 13:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 5:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 5:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Th 4:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Tu aimeras ton prochain comme toi-même, vous faites bien. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais si vous faites acception de personnes, vous commettez un péché, vous êtes condamnés par la loi comme des transgresseurs. '
