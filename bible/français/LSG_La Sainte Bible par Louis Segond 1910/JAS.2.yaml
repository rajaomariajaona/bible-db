document_id: JAS.2,93
type_code: fra
verses:
  '1':
  - type: heading
    content: L’acception de personnes condamnée
  - type: heading
    content: 'V. 1-13: cf. (Lé 19:15. De 25:13-15. Ps 82. Ac 10:34, 35.) (Ro 13:8-10. Mt 5:7, 19; 7:1, 2, 12.)'
  - type: text
    content: 'Mes frères, que votre foi en notre glorieux Seigneur Jésus-Christ soit exempte '
  - type: note
    content: Lé 19:15. De 16:19. Pr 24:23. Mt 22:16.
  - type: text
    content: 'de toute acception de personnes. '
  '10':
  - type: note
    content: De 27:26. Mt 5:19. Ga 3:10.
  - type: text
    content: 'Car quiconque observe toute la loi, mais pèche contre un seul commandement, devient coupable de tous. '
  '11':
  - type: text
    content: 'En effet, celui qui a dit: '
  - type: note
    content: Ex 20:14. Mt 5:27.
  - type: text
    content: 'Tu ne commettras point d’adultère, a dit aussi: Tu ne tueras point. Or, si tu ne commets point d’adultère, mais que tu commettes un meurtre, tu deviens transgresseur de la loi. '
  '12':
  - type: text
    content: 'Parlez et agissez comme devant être jugés par une loi de liberté, '
  '13':
  - type: note
    content: Mt 6:15; 18:35. Mc 11:25. Lu 16:25.
  - type: text
    content: car le jugement est sans miséricorde pour qui n’a pas fait miséricorde. La miséricorde triomphe du jugement.
  - type: heading
    content: La foi sans les œuvres
  - type: heading
    content: 'V. 14-26: cf. (Ga 5:6. Ja 1:22-27. Mt 7:21-27.) Hé 11:17-19, 31. 1 Jn 2:3-6.'
  '14':
  - type: text
    content: ' '
  - type: note
    content: Mt 7:26. Ja 1:23.
  - type: text
    content: 'Mes frères, que sert-il à quelqu’un de dire qu’il a la foi, s’il n’a pas les œuvres? La foi peut-elle le sauver? '
  '15':
  - type: note
    content: Lu 3:11. 1 Jn 3:17.
  - type: text
    content: 'Si un frère ou une sœur sont nus et manquent de la nourriture de chaque jour, '
  '16':
  - type: text
    content: 'et que l’un d’entre vous leur dise: Allez en paix, chauffez-vous et vous rassasiez! Et que vous ne leur donniez pas ce qui est nécessaire au corps, à quoi cela sert-il? '
  '17':
  - type: text
    content: 'Il en est ainsi de la foi: si elle n’a pas les œuvres, elle est morte en elle-même. '
  '18':
  - type: text
    content: 'Mais quelqu’un dira: Toi, tu as la foi; et moi, j’ai les œuvres. Montre-moi ta foi sans les œuvres, et moi, je te montrerai la foi par mes œuvres. '
  '19':
  - type: text
    content: 'Tu crois qu’il y a un seul Dieu, tu fais bien; '
  - type: note
    content: Mc 1:24.
  - type: text
    content: 'les démons le croient aussi, et ils tremblent. '
  '2':
  - type: text
    content: 'Supposez, en effet, qu’il entre dans votre assemblée un homme avec un anneau d’or et un habit magnifique, et qu’il y entre aussi un pauvre misérablement vêtu; '
  '20':
  - type: text
    content: 'Veux-tu savoir, ô homme vain, que la foi sans les œuvres est inutile? '
  '21':
  - type: text
    content: 'Abraham, notre père, ne fut-il pas justifié par les œuvres, '
  - type: note
    content: Ge 22:10.
  - type: text
    content: 'lorsqu’il offrit son fils Isaac sur l’autel? '
  '22':
  - type: text
    content: 'Tu vois que la foi agissait avec ses œuvres, et que par les œuvres la foi fut rendue parfaite. '
  '23':
  - type: text
    content: 'Ainsi s’accomplit ce que dit l’Écriture: '
  - type: note
    content: Ge 15:6. Ro 4:3. Ga 3:6.
  - type: text
    content: 'Abraham crut à Dieu, et cela lui fut imputé à justice; et il fut appelé ami de Dieu. '
  '24':
  - type: text
    content: 'Vous voyez que l’homme est justifié par les œuvres, et non par la foi seulement. '
  '25':
  - type: note
    content: Jos 2:1; 6:23. Hé 11:31.
  - type: text
    content: 'Rahab la prostituée ne fut-elle pas également justifiée par les œuvres, lorsqu’elle reçut les messagers et qu’elle les fit partir par un autre chemin? '
  '26':
  - type: text
    content: Comme le corps sans âme est mort, de même la foi sans les œuvres est morte.
  '3':
  - type: text
    content: 'si, tournant vos regards vers celui qui porte l’habit magnifique, vous lui dites: Toi, assieds-toi ici à cette place d’honneur! Et si vous dites au pauvre: Toi, tiens-toi là debout! Ou bien: Assieds-toi au-dessous de mon marchepied! '
  '4':
  - type: text
    content: 'ne faites-vous pas en vous-mêmes une distinction, et ne jugez-vous pas sous l’inspiration de pensées mauvaises? '
  '5':
  - type: note
    content: Jn 7:48. 1 Co 1:26, etc.
  - type: text
    content: 'Écoutez, mes frères bien-aimés: Dieu n’a-t-il pas choisi les pauvres aux yeux du monde, pour qu’ils soient riches en la foi, et héritiers du royaume qu’il a '
  - type: note
    content: Ex 20:6. 1 S 2:30. Pr 8:17. Mt 5:3.
  - type: text
    content: 'promis à ceux qui l’aiment? '
  '6':
  - type: text
    content: 'Et vous, vous avilissez le pauvre! Ne sont-ce pas les riches qui vous oppriment, et qui vous traînent devant les tribunaux? '
  '7':
  - type: text
    content: 'Ne sont-ce pas eux qui outragent le beau nom que vous portez? '
  '8':
  - type: text
    content: 'Si vous accomplissez la loi royale, selon l’Écriture: '
  - type: note
    content: Lé 19:18. Mt 22:39. Mc 12:31. Ro 13:9. Ga 5:14. Ép 5:2. 1 Th 4:9.
  - type: text
    content: 'Tu aimeras ton prochain comme toi-même, vous faites bien. '
  '9':
  - type: text
    content: 'Mais si vous faites acception de personnes, vous commettez un péché, vous êtes condamnés par la loi comme des transgresseurs. '
