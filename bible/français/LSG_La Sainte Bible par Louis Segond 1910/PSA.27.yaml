document_id: PSA.27,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ps 3; 4. Ro 8:31, etc.
  - type: text
    content: De David.
  - type: note
    content: És 10:17; 60:19, 20. Mi 7:8. Lu 1:79. Jn 1:4; 8:12. Ap 21:23.
  - type: text
    content: 'L’Éternel est ma lumière et mon salut:'
  - type: note
    content: Ps 118:6.
  - type: text
    content: De qui aurais-je crainte?
  - type: text
    content: 'L’Éternel est le soutien de ma vie:'
  - type: text
    content: De qui aurais-je peur?
  '10':
  - type: text
    content: Car mon père et ma mère m’abandonnent,
  - type: text
    content: Mais l’Éternel me recueillera.
  '11':
  - type: text
    content: 'Éternel! '
  - type: note
    content: Ps 25:4; 86:11; 119.
  - type: text
    content: enseigne-moi ta voie,
  - type: text
    content: Conduis-moi dans le sentier de la droiture,
  - type: text
    content: A cause de mes ennemis.
  '12':
  - type: text
    content: Ne me livre pas au bon plaisir de mes adversaires,
  - type: text
    content: Car il s’élève contre moi de faux témoins
  - type: text
    content: Et des gens qui ne respirent que la violence.
  '13':
  - type: text
    content: Oh! Si je n’étais pas sûr de voir la bonté de l’Éternel
  - type: text
    content: Sur la terre des vivants!…
  '14':
  - type: text
    content: ' '
  - type: note
    content: És 25:9; 33:2. Ha 2:3.
  - type: text
    content: Espère en l’Éternel!
  - type: text
    content: Fortifie-toi et que ton cœur s’affermisse!
  - type: text
    content: Espère en l’Éternel!
  '2':
  - type: text
    content: Quand des méchants s’avancent contre moi,
  - type: text
    content: Pour dévorer ma chair,
  - type: text
    content: Ce sont mes persécuteurs et mes ennemis
  - type: text
    content: Qui chancellent et tombent.
  '3':
  - type: text
    content: Si une armée se campait contre moi,
  - type: text
    content: Mon cœur n’aurait aucune crainte;
  - type: text
    content: Si une guerre s’élevait contre moi,
  - type: text
    content: Je serais malgré cela plein de confiance.
  '4':
  - type: text
    content: 'Je demande à l’Éternel une chose, que je désire ardemment:'
  - type: text
    content: Je voudrais habiter toute ma vie dans la maison de l’Éternel,
  - type: text
    content: Pour contempler la magnificence de l’Éternel
  - type: text
    content: Et pour admirer son temple.
  '5':
  - type: text
    content: Car il me protégera dans son tabernacle au jour du malheur,
  - type: text
    content: Il me cachera sous l’abri de sa tente;
  - type: text
    content: Il m’élèvera sur un rocher.
  '6':
  - type: text
    content: Et déjà ma tête s’élève sur mes ennemis qui m’entourent;
  - type: text
    content: J’offrirai des sacrifices dans sa tente, au son de la trompette;
  - type: text
    content: Je chanterai, je célébrerai l’Éternel.
  '7':
  - type: text
    content: 'Éternel! Écoute ma voix, je t’invoque:'
  - type: text
    content: Aie pitié de moi et exauce-moi!
  '8':
  - type: text
    content: 'Mon cœur dit de ta part: Cherchez ma face!'
  - type: text
    content: Je cherche ta face, ô Éternel!
  '9':
  - type: text
    content: Ne me cache point ta face,
  - type: text
    content: Ne repousse pas avec colère ton serviteur!
  - type: text
    content: Tu es mon secours, ne me laisse pas, ne m’abandonne pas,
  - type: text
    content: Dieu de mon salut!
