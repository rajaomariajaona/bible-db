  - type: text
    text: 'L’Éternel est ma lumière et mon salut:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 118:6
      metadata:
        usfm: PSA.118.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: De qui aurais-je crainte?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'L’Éternel est le soutien de ma vie:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: De qui aurais-je peur?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Quand des méchants s’avancent contre moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour dévorer ma chair,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce sont mes persécuteurs et mes ennemis
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui chancellent et tombent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Si une armée se campait contre moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon cœur n’aurait aucune crainte;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si une guerre s’élevait contre moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je serais malgré cela plein de confiance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Je demande à l’Éternel une chose, que je désire ardemment:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je voudrais habiter toute ma vie dans la maison de l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour contempler la magnificence de l’Éternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et pour admirer son temple.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Car il me protégera dans son tabernacle au jour du malheur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il me cachera sous l’abri de sa tente;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il m’élèvera sur un rocher.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Et déjà ma tête s’élève sur mes ennemis qui m’entourent;
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’offrirai des sacrifices dans sa tente, au son de la trompette;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je chanterai, je célébrerai l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Éternel! Écoute ma voix, je t’invoque:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aie pitié de moi et exauce-moi!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mon cœur dit de ta part: Cherchez ma face!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je cherche ta face, ô Éternel!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ne me cache point ta face,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne repousse pas avec colère ton serviteur!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu es mon secours, ne me laisse pas, ne m’abandonne pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dieu de mon salut!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Car mon père et ma mère m’abandonnent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais l’Éternel me recueillera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Éternel! '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 25:4
      metadata:
        usfm: PSA.25.4
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 86:11
      metadata:
        usfm: PSA.86.11
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '119'
      metadata:
        usfm: PSA.119
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: enseigne-moi ta voie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Conduis-moi dans le sentier de la droiture,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A cause de mes ennemis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ne me livre pas au bon plaisir de mes adversaires,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car il s’élève contre moi de faux témoins
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et des gens qui ne respirent que la violence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Oh! Si je n’étais pas sûr de voir la bonté de l’Éternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sur la terre des vivants!…
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 25:9
      metadata:
        usfm: ISA.25.9
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 33:2
      metadata:
        usfm: ISA.33.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ha 2:3
      metadata:
        usfm: HAB.2.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Espère en l’Éternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fortifie-toi et que ton cœur s’affermisse!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Espère en l’Éternel!
