document_id: ECC.11,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-6: cf. (Pr 11:24, 25. 2 Co 9:6, etc. Ga 6:9, 10.)'
  - type: text
    content: 'Jette ton pain sur la face des eaux, car avec le temps tu le retrouveras; '
  '2':
  - type: note
    content: 2 Co 9:10.
  - type: text
    content: 'donnes-en une part à sept et même à huit, car tu ne sais pas quel malheur peut arriver sur la terre. '
  '3':
  - type: text
    content: 'Quand les nuages sont pleins de pluie, ils la répandent sur la terre; et si un arbre tombe, au midi ou au nord, il reste à la place où il est tombé. '
  '4':
  - type: text
    content: 'Celui qui observe le vent ne sèmera point, et celui qui regarde les nuages ne moissonnera point. '
  '5':
  - type: note
    content: Jn 3:8.
  - type: text
    content: 'Comme tu ne sais pas quel est le chemin du vent, ni comment se forment '
  - type: note
    content: Ps 139:15, 16.
  - type: text
    content: 'les os dans le ventre de la femme enceinte, tu ne connais pas non plus l’œuvre de Dieu qui fait tout. '
  '6':
  - type: text
    content: Dès le matin sème ta semence, et le soir ne laisse pas reposer ta main; car tu ne sais point ce qui réussira, ceci ou cela, ou si l’un et l’autre sont également bons.
  - type: heading
    content: 'V. 7-8: cf. Ec 9:7-10.'
  '7':
  - type: text
    content: 'La lumière est douce, et il est agréable aux yeux de voir le soleil. '
  '8':
  - type: text
    content: Si donc un homme vit beaucoup d’années, qu’il se réjouisse pendant toutes ces années, et qu’il pense aux jours de ténèbres qui seront nombreux; tout ce qui arrivera est vanité.
