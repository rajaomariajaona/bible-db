document_id: ECC.11,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-6: cf. (Pr 11:24, 25. 2 Co 9:6, etc. Ga 6:9, 10.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Jette ton pain sur la face des eaux, car avec le temps tu le retrouveras; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 9:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'donnes-en une part à sept et même à huit, car tu ne sais pas quel malheur peut arriver sur la terre. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Quand les nuages sont pleins de pluie, ils la répandent sur la terre; et si un arbre tombe, au midi ou au nord, il reste à la place où il est tombé. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Celui qui observe le vent ne sèmera point, et celui qui regarde les nuages ne moissonnera point. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 3:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Comme tu ne sais pas quel est le chemin du vent, ni comment se forment '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 139:15
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '16'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'les os dans le ventre de la femme enceinte, tu ne connais pas non plus l’œuvre de Dieu qui fait tout. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Dès le matin sème ta semence, et le soir ne laisse pas reposer ta main; car tu ne sais point ce qui réussira, ceci ou cela, ou si l’un et l’autre sont également bons.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 7-8: cf. Ec 9:7-10.'
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'La lumière est douce, et il est agréable aux yeux de voir le soleil. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Si donc un homme vit beaucoup d’années, qu’il se réjouisse pendant toutes ces années, et qu’il pense aux jours de ténèbres qui seront nombreux; tout ce qui arrivera est vanité.
