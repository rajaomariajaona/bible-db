document_id: JOB.3,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Plaintes de Job
  - type: heading
    content: 'V. 1-26: cf. Jé 20:14-18.'
  - type: text
    content: 'Après cela, Job ouvrit la bouche et '
  - type: note
    content: Jé 15:10; 20:14.
  - type: text
    content: 'maudit le jour de sa naissance. '
  '10':
  - type: text
    content: Car elle n’a pas fermé le sein qui me conçut,
  - type: text
    content: Ni dérobé la souffrance à mes regards.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Job 10:18.
  - type: text
    content: Pourquoi ne suis-je pas mort dans le ventre de ma mère?
  - type: text
    content: Pourquoi n’ai-je pas expiré au sortir de ses entrailles?
  '12':
  - type: text
    content: Pourquoi ai-je trouvé des genoux pour me recevoir,
  - type: text
    content: Et des mamelles pour m’allaiter?
  '13':
  - type: text
    content: Je serais couché maintenant, je serais tranquille,
  - type: text
    content: Je dormirais, je reposerais,
  '14':
  - type: text
    content: Avec les rois et les grands de la terre,
  - type: text
    content: Qui se bâtirent des mausolées,
  '15':
  - type: text
    content: Avec les princes qui avaient de l’or,
  - type: text
    content: Et qui remplirent d’argent leurs demeures.
  '16':
  - type: text
    content: Ou je n’existerais pas, je serais comme un avorton caché,
  - type: text
    content: Comme des enfants qui n’ont pas vu la lumière.
  '17':
  - type: text
    content: Là ne s’agitent plus les méchants,
  - type: text
    content: Et là se reposent ceux qui sont fatigués et sans force;
  '18':
  - type: text
    content: Les captifs sont tous en paix,
  - type: text
    content: Ils n’entendent pas la voix de l’oppresseur;
  '19':
  - type: text
    content: Le petit et le grand sont là,
  - type: text
    content: Et l’esclave n’est plus soumis à son maître.
  '2':
  - type: text
    content: 'Il prit la parole et dit:'
  '20':
  - type: text
    content: Pourquoi donne-t-il la lumière à celui qui souffre,
  - type: text
    content: Et la vie à ceux qui ont l’amertume dans l’âme,
  '21':
  - type: text
    content: Qui espèrent en vain la mort,
  - type: text
    content: Et qui la convoitent plus qu’un trésor,
  '22':
  - type: text
    content: Qui seraient transportés de joie
  - type: text
    content: Et saisis d’allégresse, s’ils trouvaient le tombeau?
  '23':
  - type: text
    content: A l’homme qui ne sait où aller,
  - type: note
    content: Job 19:8.
  - type: text
    content: Et que Dieu cerne de toutes parts?
  '24':
  - type: text
    content: Mes soupirs sont ma nourriture,
  - type: text
    content: Et mes cris se répandent comme l’eau.
  '25':
  - type: text
    content: Ce que je crains, c’est ce qui m’arrive;
  - type: text
    content: Ce que je redoute, c’est ce qui m’atteint.
  '26':
  - type: text
    content: Je n’ai ni tranquillité, ni paix, ni repos,
  - type: text
    content: Et le trouble s’est emparé de moi.
  '3':
  - type: text
    content: Périsse le jour où je suis né,
  - type: text
    content: 'Et la nuit qui dit: Un enfant mâle est conçu!'
  '4':
  - type: text
    content: Ce jour! Qu’il se change en ténèbres,
  - type: text
    content: Que Dieu n’en ait point souci dans le ciel,
  - type: text
    content: Et que la lumière ne rayonne plus sur lui!
  '5':
  - type: text
    content: Que l’obscurité et l’ombre de la mort s’en emparent,
  - type: text
    content: Que des nuées établissent leur demeure au-dessus de lui,
  - type: text
    content: Et que de noirs phénomènes l’épouvantent!
  '6':
  - type: text
    content: Cette nuit! Que les ténèbres en fassent leur proie,
  - type: text
    content: Qu’elle disparaisse de l’année,
  - type: text
    content: Qu’elle ne soit plus comptée parmi les mois!
  '7':
  - type: text
    content: Que cette nuit devienne stérile,
  - type: text
    content: Que l’allégresse en soit bannie!
  '8':
  - type: text
    content: Qu’elle soit maudite par ceux qui maudissent les jours,
  - type: text
    content: Par ceux qui savent exciter le léviathan!
  '9':
  - type: text
    content: Que les étoiles de son crépuscule s’obscurcissent,
  - type: text
    content: Qu’elle attende en vain la lumière,
  - type: text
    content: Et qu’elle ne voie point les paupières de l’aurore!
