document_id: JOB.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Plaintes de Job
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-26: cf. Jé 20:14-18.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Après cela, Job ouvrit la bouche et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 15:10
      metadata:
        usfm: JER.15.10
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 20:14
      metadata:
        usfm: JER.20.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'maudit le jour de sa naissance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il prit la parole et dit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Périsse le jour où je suis né,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et la nuit qui dit: Un enfant mâle est conçu!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ce jour! Qu’il se change en ténèbres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que Dieu n’en ait point souci dans le ciel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que la lumière ne rayonne plus sur lui!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Que l’obscurité et l’ombre de la mort s’en emparent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que des nuées établissent leur demeure au-dessus de lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que de noirs phénomènes l’épouvantent!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Cette nuit! Que les ténèbres en fassent leur proie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’elle disparaisse de l’année,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’elle ne soit plus comptée parmi les mois!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Que cette nuit devienne stérile,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que l’allégresse en soit bannie!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Qu’elle soit maudite par ceux qui maudissent les jours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Par ceux qui savent exciter le léviathan!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Que les étoiles de son crépuscule s’obscurcissent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’elle attende en vain la lumière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qu’elle ne voie point les paupières de l’aurore!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Car elle n’a pas fermé le sein qui me conçut,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ni dérobé la souffrance à mes regards.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 10:18
      metadata:
        usfm: JOB.10.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Pourquoi ne suis-je pas mort dans le ventre de ma mère?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi n’ai-je pas expiré au sortir de ses entrailles?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Pourquoi ai-je trouvé des genoux pour me recevoir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et des mamelles pour m’allaiter?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Je serais couché maintenant, je serais tranquille,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je dormirais, je reposerais,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Avec les rois et les grands de la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui se bâtirent des mausolées,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Avec les princes qui avaient de l’or,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui remplirent d’argent leurs demeures.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ou je n’existerais pas, je serais comme un avorton caché,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme des enfants qui n’ont pas vu la lumière.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Là ne s’agitent plus les méchants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et là se reposent ceux qui sont fatigués et sans force;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Les captifs sont tous en paix,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils n’entendent pas la voix de l’oppresseur;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Le petit et le grand sont là,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et l’esclave n’est plus soumis à son maître.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Pourquoi donne-t-il la lumière à celui qui souffre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la vie à ceux qui ont l’amertume dans l’âme,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Qui espèrent en vain la mort,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui la convoitent plus qu’un trésor,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Qui seraient transportés de joie
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et saisis d’allégresse, s’ils trouvaient le tombeau?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: A l’homme qui ne sait où aller,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 19:8
      metadata:
        usfm: JOB.19.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et que Dieu cerne de toutes parts?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Mes soupirs sont ma nourriture,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et mes cris se répandent comme l’eau.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ce que je crains, c’est ce qui m’arrive;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce que je redoute, c’est ce qui m’atteint.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Je n’ai ni tranquillité, ni paix, ni repos,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le trouble s’est emparé de moi.
