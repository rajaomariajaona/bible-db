document_id: EXO.39,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Confection des vêtements sacerdotaux
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-7: cf. Ex 28:2-14.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 31:10
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 35:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Avec les étoffes teintes en bleu, en pourpre et en cramoisi, on fit les vêtements d’office pour le service dans le sanctuaire, et on fit les vêtements sacrés pour Aaron, comme l’Éternel l’avait ordonné à Moïse. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 28:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'On le garnit de quatre rangées de pierres: première rangée, une sardoine, une topaze, une émeraude; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 28:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'seconde rangée, une escarboucle, un saphir, un diamant; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'troisième rangée, une opale, une agate, une améthyste; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'quatrième rangée, une chrysolithe, un onyx, un jaspe. Ces pierres étaient enchâssées dans leurs montures d’or. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Il y en avait douze, d’après les noms des fils d’Israël; elles étaient gravées comme des cachets, chacune avec le nom de l’une des douze tribus. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'On fit sur le pectoral des chaînettes d’or pur, tressées en forme de cordons. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'On fit deux montures d’or et deux anneaux d’or, et on mit les deux anneaux aux deux extrémités du pectoral. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'On passa les deux cordons d’or dans les deux anneaux aux deux extrémités du pectoral; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'on arrêta par devant les bouts des deux cordons aux deux montures placées sur les épaulettes de l’éphod. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'On fit encore deux anneaux d’or, que l’on mit aux deux extrémités du pectoral, sur le bord intérieur appliqué contre l’éphod. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 28:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'On fit l’éphod d’or, de fil bleu, pourpre et cramoisi, et de fin lin retors. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'On fit deux autres anneaux d’or, que l’on mit au bas des deux épaulettes de l’éphod, sur le devant, près de la jointure, au-dessus de la ceinture de l’éphod. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: On attacha le pectoral par ses anneaux aux anneaux de l’éphod avec un cordon bleu, afin que le pectoral fût au-dessus de la ceinture de l’éphod et qu’il ne pût pas se séparer de l’éphod, comme l’Éternel l’avait ordonné à Moïse.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 22-26: cf. Ex 28:31-35.'
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'On fit la robe de l’éphod, tissée entièrement d’étoffe bleue. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Il y avait, au milieu de la robe, une ouverture comme l’ouverture d’une cotte de mailles, et cette ouverture était bordée tout autour, afin que la robe ne se déchirât pas. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'On mit sur la bordure de la robe des grenades de couleur bleue, pourpre et cramoisi, en fil retors; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'on fit des clochettes d’or pur, et on mit les clochettes entre les grenades, sur tout le tour de la bordure de la robe, entre les grenades: '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: une clochette et une grenade, une clochette et une grenade, sur tout le tour de la bordure de la robe, pour le service, comme l’Éternel l’avait ordonné à Moïse.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 27-31: cf. Ex 28:36-43.'
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 28:39
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'On fit les tuniques de fin lin, tissées, pour Aaron et pour ses fils; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'la tiare de fin lin, et les bonnets de fin lin servant de parure; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 44:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'les caleçons de lin, de fin lin retors; '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'la ceinture de fin lin retors, brodée, et de couleur bleue, pourpre et cramoisi, comme l’Éternel l’avait ordonné à Moïse. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 28:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'On étendit des lames d’or, et on les coupa en fils, que l’on entrelaça dans les étoffes teintes en bleu, en pourpre et en cramoisi, et dans le fin lin; il était artistement travaillé. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 28:36
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 29:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'On fit d’or pur la lame, diadème sacré, et l’on y écrivit, comme on grave un cachet: Sainteté à l’Éternel. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 28:37
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: On l’attacha avec un cordon bleu à la tiare, en haut, comme l’Éternel l’avait ordonné à Moïse.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le tabernacle dressé
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 32-43: cf. Ex 36 à 39.'
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Ainsi furent achevés tous les ouvrages du tabernacle, de la tente d’assignation. Les enfants d’Israël firent tout ce que l’Éternel avait ordonné à Moïse; ils firent ainsi. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 35:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'On amena le tabernacle à Moïse: la tente et tout ce qui en dépendait, les agrafes, les planches, les barres, les colonnes et les bases; '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'la couverture de peaux de béliers teintes en rouge, la couverture de peaux de dauphins, et le voile de séparation; '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'l’arche du témoignage et ses barres, et le propitiatoire; '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 31:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'la table, tous ses ustensiles, et les pains de proposition; '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'le chandelier d’or pur, ses lampes, les lampes préparées, tous ses ustensiles, et l’huile pour le chandelier; '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'l’autel d’or, l’huile d’onction et le parfum odoriférant, et le rideau de l’entrée de la tente; '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'l’autel d’airain, sa grille d’airain, ses barres, et tous ses ustensiles; la cuve avec sa base; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'On y fit des épaulettes qui le joignaient, et c’est ainsi qu’il était joint par ses deux extrémités. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'les toiles du parvis, ses colonnes, ses bases, et le rideau de la porte du parvis, ses cordages, ses pieux, et tous les ustensiles pour le service du tabernacle, pour la tente d’assignation; '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'les vêtements d’office pour le sanctuaire, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 31:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'les vêtements sacrés pour le sacrificateur Aaron, et les vêtements de ses fils pour les fonctions du sacerdoce. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Les enfants d’Israël firent tous ces ouvrages, en se conformant à tous les ordres que l’Éternel avait donnés à Moïse. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: Moïse examina tout le travail; et voici, ils l’avaient fait comme l’Éternel l’avait ordonné, ils l’avaient fait ainsi. Et Moïse les bénit.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 28:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'La ceinture était du même travail que l’éphod et fixée sur lui; elle était d’or, de fil bleu, pourpre et cramoisi, et de fin lin retors, comme l’Éternel l’avait ordonné à Moïse. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'On entoura de montures d’or '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 28:9
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '11'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'des pierres d’onyx, sur lesquelles on grava les noms des fils d’Israël, comme on grave les cachets. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 28:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: On les mit sur les épaulettes de l’éphod, en souvenir des fils d’Israël, comme l’Éternel l’avait ordonné à Moïse.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 8-21: cf. Ex 28:15-30.'
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 28:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'On fit le pectoral, artistement travaillé, du même travail que l’éphod, d’or, de fil bleu, pourpre et cramoisi, et de fin lin retors. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 28:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Il était carré; on fit le pectoral double: sa longueur était d’un empan, et sa largeur d’un empan; il était double. '
