document_id: EXO.39,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Confection des vêtements sacerdotaux
  - type: heading
    content: 'V. 1-7: cf. Ex 28:2-14.'
  - type: text
    content: ' '
  - type: note
    content: Ex 31:10; 35:19.
  - type: text
    content: 'Avec les étoffes teintes en bleu, en pourpre et en cramoisi, on fit les vêtements d’office pour le service dans le sanctuaire, et on fit les vêtements sacrés pour Aaron, comme l’Éternel l’avait ordonné à Moïse. '
  '10':
  - type: note
    content: Ex 28:17.
  - type: text
    content: 'On le garnit de quatre rangées de pierres: première rangée, une sardoine, une topaze, une émeraude; '
  '11':
  - type: note
    content: Ex 28:18.
  - type: text
    content: 'seconde rangée, une escarboucle, un saphir, un diamant; '
  '12':
  - type: text
    content: 'troisième rangée, une opale, une agate, une améthyste; '
  '13':
  - type: text
    content: 'quatrième rangée, une chrysolithe, un onyx, un jaspe. Ces pierres étaient enchâssées dans leurs montures d’or. '
  '14':
  - type: text
    content: 'Il y en avait douze, d’après les noms des fils d’Israël; elles étaient gravées comme des cachets, chacune avec le nom de l’une des douze tribus. '
  '15':
  - type: text
    content: 'On fit sur le pectoral des chaînettes d’or pur, tressées en forme de cordons. '
  '16':
  - type: text
    content: 'On fit deux montures d’or et deux anneaux d’or, et on mit les deux anneaux aux deux extrémités du pectoral. '
  '17':
  - type: text
    content: 'On passa les deux cordons d’or dans les deux anneaux aux deux extrémités du pectoral; '
  '18':
  - type: text
    content: 'on arrêta par devant les bouts des deux cordons aux deux montures placées sur les épaulettes de l’éphod. '
  '19':
  - type: text
    content: 'On fit encore deux anneaux d’or, que l’on mit aux deux extrémités du pectoral, sur le bord intérieur appliqué contre l’éphod. '
  '2':
  - type: note
    content: Ex 28:6.
  - type: text
    content: 'On fit l’éphod d’or, de fil bleu, pourpre et cramoisi, et de fin lin retors. '
  '20':
  - type: text
    content: 'On fit deux autres anneaux d’or, que l’on mit au bas des deux épaulettes de l’éphod, sur le devant, près de la jointure, au-dessus de la ceinture de l’éphod. '
  '21':
  - type: text
    content: On attacha le pectoral par ses anneaux aux anneaux de l’éphod avec un cordon bleu, afin que le pectoral fût au-dessus de la ceinture de l’éphod et qu’il ne pût pas se séparer de l’éphod, comme l’Éternel l’avait ordonné à Moïse.
  - type: heading
    content: 'V. 22-26: cf. Ex 28:31-35.'
  '22':
  - type: text
    content: 'On fit la robe de l’éphod, tissée entièrement d’étoffe bleue. '
  '23':
  - type: text
    content: 'Il y avait, au milieu de la robe, une ouverture comme l’ouverture d’une cotte de mailles, et cette ouverture était bordée tout autour, afin que la robe ne se déchirât pas. '
  '24':
  - type: text
    content: 'On mit sur la bordure de la robe des grenades de couleur bleue, pourpre et cramoisi, en fil retors; '
  '25':
  - type: text
    content: 'on fit des clochettes d’or pur, et on mit les clochettes entre les grenades, sur tout le tour de la bordure de la robe, entre les grenades: '
  '26':
  - type: text
    content: une clochette et une grenade, une clochette et une grenade, sur tout le tour de la bordure de la robe, pour le service, comme l’Éternel l’avait ordonné à Moïse.
  - type: heading
    content: 'V. 27-31: cf. Ex 28:36-43.'
  '27':
  - type: text
    content: ' '
  - type: note
    content: Ex 28:39.
  - type: text
    content: 'On fit les tuniques de fin lin, tissées, pour Aaron et pour ses fils; '
  '28':
  - type: text
    content: 'la tiare de fin lin, et les bonnets de fin lin servant de parure; '
  - type: note
    content: Éz 44:18.
  - type: text
    content: 'les caleçons de lin, de fin lin retors; '
  '29':
  - type: text
    content: 'la ceinture de fin lin retors, brodée, et de couleur bleue, pourpre et cramoisi, comme l’Éternel l’avait ordonné à Moïse. '
  '3':
  - type: note
    content: Ex 28:6.
  - type: text
    content: 'On étendit des lames d’or, et on les coupa en fils, que l’on entrelaça dans les étoffes teintes en bleu, en pourpre et en cramoisi, et dans le fin lin; il était artistement travaillé. '
  '30':
  - type: note
    content: Ex 28:36; 29:6.
  - type: text
    content: 'On fit d’or pur la lame, diadème sacré, et l’on y écrivit, comme on grave un cachet: Sainteté à l’Éternel. '
  '31':
  - type: note
    content: Ex 28:37.
  - type: text
    content: On l’attacha avec un cordon bleu à la tiare, en haut, comme l’Éternel l’avait ordonné à Moïse.
  - type: heading
    content: Le tabernacle dressé
  - type: heading
    content: 'V. 32-43: cf. Ex 36 à 39.'
  '32':
  - type: text
    content: 'Ainsi furent achevés tous les ouvrages du tabernacle, de la tente d’assignation. Les enfants d’Israël firent tout ce que l’Éternel avait ordonné à Moïse; ils firent ainsi. '
  '33':
  - type: note
    content: Ex 35:11.
  - type: text
    content: 'On amena le tabernacle à Moïse: la tente et tout ce qui en dépendait, les agrafes, les planches, les barres, les colonnes et les bases; '
  '34':
  - type: text
    content: 'la couverture de peaux de béliers teintes en rouge, la couverture de peaux de dauphins, et le voile de séparation; '
  '35':
  - type: text
    content: 'l’arche du témoignage et ses barres, et le propitiatoire; '
  '36':
  - type: note
    content: Ex 31:8.
  - type: text
    content: 'la table, tous ses ustensiles, et les pains de proposition; '
  '37':
  - type: text
    content: 'le chandelier d’or pur, ses lampes, les lampes préparées, tous ses ustensiles, et l’huile pour le chandelier; '
  '38':
  - type: text
    content: 'l’autel d’or, l’huile d’onction et le parfum odoriférant, et le rideau de l’entrée de la tente; '
  '39':
  - type: text
    content: 'l’autel d’airain, sa grille d’airain, ses barres, et tous ses ustensiles; la cuve avec sa base; '
  '4':
  - type: text
    content: 'On y fit des épaulettes qui le joignaient, et c’est ainsi qu’il était joint par ses deux extrémités. '
  '40':
  - type: text
    content: 'les toiles du parvis, ses colonnes, ses bases, et le rideau de la porte du parvis, ses cordages, ses pieux, et tous les ustensiles pour le service du tabernacle, pour la tente d’assignation; '
  '41':
  - type: text
    content: 'les vêtements d’office pour le sanctuaire, '
  - type: note
    content: Ex 31:10.
  - type: text
    content: 'les vêtements sacrés pour le sacrificateur Aaron, et les vêtements de ses fils pour les fonctions du sacerdoce. '
  '42':
  - type: text
    content: 'Les enfants d’Israël firent tous ces ouvrages, en se conformant à tous les ordres que l’Éternel avait donnés à Moïse. '
  '43':
  - type: text
    content: Moïse examina tout le travail; et voici, ils l’avaient fait comme l’Éternel l’avait ordonné, ils l’avaient fait ainsi. Et Moïse les bénit.
  '5':
  - type: note
    content: Ex 28:8.
  - type: text
    content: 'La ceinture était du même travail que l’éphod et fixée sur lui; elle était d’or, de fil bleu, pourpre et cramoisi, et de fin lin retors, comme l’Éternel l’avait ordonné à Moïse. '
  '6':
  - type: text
    content: 'On entoura de montures d’or '
  - type: note
    content: Ex 28:9, 10, 11.
  - type: text
    content: 'des pierres d’onyx, sur lesquelles on grava les noms des fils d’Israël, comme on grave les cachets. '
  '7':
  - type: note
    content: Ex 28:12.
  - type: text
    content: On les mit sur les épaulettes de l’éphod, en souvenir des fils d’Israël, comme l’Éternel l’avait ordonné à Moïse.
  - type: heading
    content: 'V. 8-21: cf. Ex 28:15-30.'
  '8':
  - type: text
    content: ' '
  - type: note
    content: Ex 28:15.
  - type: text
    content: 'On fit le pectoral, artistement travaillé, du même travail que l’éphod, d’or, de fil bleu, pourpre et cramoisi, et de fin lin retors. '
  '9':
  - type: note
    content: Ex 28:16.
  - type: text
    content: 'Il était carré; on fit le pectoral double: sa longueur était d’un empan, et sa largeur d’un empan; il était double. '
