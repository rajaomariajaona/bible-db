document_id: 2SA.18,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Bataille entre l’armée d’Absalom et celle de David. — Absalom tué par Joab dans la forêt d’Éphraïm
  - type: heading
    content: 'V. 1-18: cf. (Pr 24:21, 22; 20:20.) (Job 20:5. Ps 37:32-40.)'
  - type: text
    content: 'David passa en revue le peuple qui était avec lui, et il établit sur eux des chefs de milliers et des chefs de centaines. '
  '10':
  - type: text
    content: 'Un homme ayant vu cela vint dire à Joab: Voici, j’ai vu Absalom suspendu à un térébinthe. '
  '11':
  - type: text
    content: 'Et Joab dit à l’homme qui lui apporta cette nouvelle: Tu l’as vu! Pourquoi donc ne l’as-tu pas abattu sur place? Je t’aurais donné dix sicles d’argent et une ceinture. '
  '12':
  - type: text
    content: 'Mais cet homme dit à Joab: Quand je pèserais dans ma main mille sicles d’argent, je ne mettrais pas la main sur le fils du roi; car nous avons entendu cet ordre que le roi t’a donné, à toi, à Abischaï et à Ittaï: Prenez garde chacun au jeune Absalom! '
  '13':
  - type: text
    content: 'Et si j’eusse attenté perfidement à sa vie, rien n’aurait été caché au roi, et tu aurais été toi-même contre moi. '
  '14':
  - type: text
    content: 'Joab dit: Je ne m’arrêterai pas auprès de toi! Et il prit en main trois javelots, et les enfonça dans le cœur d’Absalom encore plein de vie au milieu du térébinthe. '
  '15':
  - type: text
    content: 'Dix jeunes gens, qui portaient les armes de Joab, entourèrent Absalom, le frappèrent et le firent mourir. '
  '16':
  - type: text
    content: 'Joab fit sonner de la trompette; et le peuple revint, cessant ainsi de poursuivre Israël, parce que Joab l’en empêcha. '
  '17':
  - type: text
    content: 'Ils prirent Absalom, le jetèrent dans une grande fosse au milieu de la forêt, et mirent sur lui un très grand monceau de pierres. Tout Israël s’enfuit, chacun dans sa tente. '
  '18':
  - type: text
    content: 'De son vivant, Absalom s’était fait ériger un monument dans la vallée du roi; car il disait: Je n’ai point de fils par qui le souvenir de mon nom puisse être conservé. Et il donna son propre nom au monument, qu’on appelle encore aujourd’hui monument d’Absalom.'
  - type: heading
    content: 'V. 19-33: cf. 2 S 19:1-8.'
  '19':
  - type: text
    content: 'Achimaats, fils de Tsadok, dit: Laisse-moi courir, et porter au roi la bonne nouvelle que l’Éternel lui a rendu justice en le délivrant de la main de ses ennemis. '
  '2':
  - type: text
    content: 'Il plaça le tiers du peuple sous le commandement de Joab, le tiers sous celui d’Abischaï, fils de Tseruja, frère de Joab, et le tiers sous celui d’Ittaï, de Gath. Et le roi dit au peuple: Moi aussi, je veux sortir avec vous. '
  '20':
  - type: text
    content: 'Joab lui dit: Ce n’est pas toi qui dois porter aujourd’hui les nouvelles; tu les porteras un autre jour, mais non aujourd’hui, puisque le fils du roi est mort. '
  '21':
  - type: text
    content: 'Et Joab dit à Cuschi: Va, et annonce au roi ce que tu as vu. Cuschi se prosterna devant Joab, et courut. '
  '22':
  - type: text
    content: 'Achimaats, fils de Tsadok, dit encore à Joab: Quoi qu’il arrive, laisse-moi courir après Cuschi. Et Joab dit: Pourquoi veux-tu courir, mon fils? Ce n’est pas un message qui te sera profitable. '
  '23':
  - type: text
    content: 'Quoi qu’il arrive, je veux courir, reprit Achimaats. Et Joab lui dit: Cours! Achimaats courut par le chemin de la plaine, et il devança Cuschi. '
  '24':
  - type: text
    content: 'David était assis entre les deux portes. La sentinelle alla sur le toit de la porte vers la muraille; elle leva les yeux et regarda. Et voici, un homme courait tout seul. '
  '25':
  - type: text
    content: 'La sentinelle cria, et avertit le roi. Le roi dit: S’il est seul, il apporte des nouvelles. Et cet homme arrivait toujours plus près. '
  '26':
  - type: text
    content: 'La sentinelle vit un autre homme qui courait; elle cria au portier: Voici un homme qui court tout seul. Le roi dit: Il apporte aussi des nouvelles. '
  '27':
  - type: text
    content: 'La sentinelle dit: La manière de courir du premier me paraît celle d’Achimaats, fils de Tsadok. Et le roi dit: C’est un homme de bien, et il apporte de bonnes nouvelles. '
  '28':
  - type: text
    content: 'Achimaats cria, et il dit au roi: Tout va bien! Il se prosterna devant le roi la face contre terre, et dit: Béni soit l’Éternel, ton Dieu, qui a livré les hommes qui levaient la main contre le roi mon seigneur! '
  '29':
  - type: text
    content: 'Le roi dit: Le jeune Absalom est-il en bonne santé? Achimaats répondit: J’ai aperçu un grand tumulte au moment où Joab envoya le serviteur du roi et moi ton serviteur; mais je ne sais ce que c’était. '
  '3':
  - type: text
    content: 'Mais le peuple dit: Tu ne sortiras point! Car si nous prenons la fuite, ce n’est pas sur nous que l’attention se portera; et quand la moitié d’entre nous succomberait, on n’y ferait pas attention; mais toi, tu es comme dix mille de nous, et maintenant il vaut mieux que de la ville tu puisses venir à notre secours. '
  '30':
  - type: text
    content: 'Et le roi dit: Mets-toi là de côté. Et Achimaats se tint de côté. '
  '31':
  - type: text
    content: 'Aussitôt arriva Cuschi. Et il dit: Que le roi mon seigneur apprenne la bonne nouvelle! Aujourd’hui l’Éternel t’a rendu justice en te délivrant de la main de tous ceux qui s’élevaient contre toi. '
  '32':
  - type: text
    content: 'Le roi dit à Cuschi: Le jeune homme Absalom est-il en bonne santé? Cuschi répondit: Qu’ils soient comme ce jeune homme, les ennemis du roi mon seigneur et tous ceux qui s’élèvent contre toi pour te faire du mal! '
  '33':
  - type: text
    content: 'Alors le roi, saisi d’émotion, monta dans la chambre au-dessus de la porte et pleura. Il disait en marchant: Mon fils Absalom! Mon fils, mon fils Absalom! Que ne suis-je mort à ta place! Absalom, mon fils, mon fils!'
  '4':
  - type: text
    content: 'Le roi leur répondit: Je ferai ce qui vous paraît bon. Et le roi se tint à côté de la porte, pendant que tout le peuple sortait par centaines et par milliers. '
  '5':
  - type: text
    content: 'Le roi donna cet ordre à Joab, à Abischaï et à Ittaï: Pour l’amour de moi, doucement avec le jeune Absalom! Et tout le peuple entendit l’ordre du roi à tous les chefs au sujet d’Absalom. '
  '6':
  - type: text
    content: 'Le peuple sortit dans les champs à la rencontre d’Israël, et la bataille eut lieu dans la forêt d’Éphraïm. '
  '7':
  - type: text
    content: 'Là, le peuple d’Israël fut battu par les serviteurs de David, et il y eut en ce jour une grande défaite de vingt mille hommes. '
  '8':
  - type: text
    content: 'Le combat s’étendit sur toute la contrée, et la forêt dévora plus de peuple ce jour-là que l’épée n’en dévora. '
  '9':
  - type: text
    content: 'Absalom se trouva en présence des gens de David. Il était monté sur un mulet. Le mulet pénétra sous les branches entrelacées d’un grand térébinthe, et la tête d’Absalom fut prise au térébinthe; il demeura suspendu entre le ciel et la terre, et le mulet qui était sous lui passa outre. '
