document_id: PSA.129,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: Ps 124; 122:6-9. La 3:59-66.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cantique des degrés.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils m’ont assez opprimé dès ma jeunesse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’Israël le dise!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils m’ont assez opprimé dès ma jeunesse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais ils ne m’ont pas vaincu.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des laboureurs ont labouré mon dos,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils y ont tracé de longs sillons.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'L’Éternel est juste:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a coupé les cordes des méchants.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’ils soient confondus et qu’ils reculent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous ceux qui haïssent Sion!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 8:12
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 40:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Qu’ils soient comme l’herbe des toits,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui sèche avant qu’on l’arrache!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le moissonneur n’en remplit point sa main,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui lie les gerbes n’en charge point son bras,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et les passants ne disent point:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que la bénédiction de l’Éternel soit sur vous!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous vous bénissons au nom de l’Éternel!
