document_id: PSA.129,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ps 124; 122:6-9. La 3:59-66.
  - type: text
    content: Cantique des degrés.
  - type: text
    content: Ils m’ont assez opprimé dès ma jeunesse,
  - type: text
    content: Qu’Israël le dise!
  '2':
  - type: text
    content: Ils m’ont assez opprimé dès ma jeunesse,
  - type: text
    content: Mais ils ne m’ont pas vaincu.
  '3':
  - type: text
    content: Des laboureurs ont labouré mon dos,
  - type: text
    content: Ils y ont tracé de longs sillons.
  '4':
  - type: text
    content: 'L’Éternel est juste:'
  - type: text
    content: Il a coupé les cordes des méchants.
  '5':
  - type: text
    content: Qu’ils soient confondus et qu’ils reculent,
  - type: text
    content: Tous ceux qui haïssent Sion!
  '6':
  - type: text
    content: ' '
  - type: note
    content: Job 8:12; 40:10.
  - type: text
    content: Qu’ils soient comme l’herbe des toits,
  - type: text
    content: Qui sèche avant qu’on l’arrache!
  '7':
  - type: text
    content: Le moissonneur n’en remplit point sa main,
  - type: text
    content: Celui qui lie les gerbes n’en charge point son bras,
  '8':
  - type: text
    content: 'Et les passants ne disent point:'
  - type: text
    content: Que la bénédiction de l’Éternel soit sur vous!
  - type: text
    content: Nous vous bénissons au nom de l’Éternel!
