document_id: PSA.119,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Ps 1; 19:8, etc.) (Mt 5:17-19. 2 Ti 3:15-17. Ec 12:15.) És 42:21. Ac 24:16. 1 Jn 5:3.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Heureux ceux qui sont intègres dans leur voie,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 1:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Qui marchent selon la loi de l’Éternel!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je te cherche de tout mon cœur:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne me laisse pas égarer loin de tes commandements!
  '100':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai plus d’intelligence que les vieillards,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car j’observe tes ordonnances.
  '101':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je retiens mon pied loin de tout mauvais chemin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afin de garder ta parole.
  '102':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ne m’écarte pas de tes lois,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car c’est toi qui m’enseignes.
  '103':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 19:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 8:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Que tes paroles sont douces à mon palais,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Plus que le miel à ma bouche!
  '104':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par tes ordonnances je deviens intelligent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aussi je hais toute voie de mensonge.
  '105':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ta parole est une lampe à mes pieds,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et une lumière sur mon sentier.
  '106':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Né 10:29
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Je jure, et je le tiendrai,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: D’observer les lois de ta justice.
  '107':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je suis bien humilié:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Éternel, rends-moi la vie selon ta parole!
  '108':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Agrée, ô Éternel! Les sentiments que ma bouche exprime,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et enseigne-moi tes lois!
  '109':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ma vie est continuellement exposée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je n’oublie point ta loi.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je serre ta parole dans mon cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afin de ne pas pécher contre toi.
  '110':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des méchants me tendent des pièges,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je ne m’égare pas loin de tes ordonnances.
  '111':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes préceptes sont pour toujours mon héritage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car ils sont la joie de mon cœur.
  '112':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’incline mon cœur à pratiquer tes statuts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toujours, jusqu’à la fin.
  '113':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je hais les hommes indécis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et j’aime ta loi.
  '114':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu es mon asile et mon bouclier;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’espère en ta promesse.
  '115':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Éloignez-vous de moi, méchants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afin que j’observe les commandements de mon Dieu!
  '116':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Soutiens-moi selon ta promesse, afin que je vive,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ne me rends point confus dans mon espérance!
  '117':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sois mon appui, pour que je sois sauvé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que je m’occupe sans cesse de tes statuts!
  '118':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu méprises tous ceux qui s’écartent de tes statuts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car leur tromperie est sans effet.
  '119':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu enlèves comme de l’écume tous les méchants de la terre;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est pourquoi j’aime tes préceptes.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Béni sois-tu, ô Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Enseigne-moi tes statuts!
  '120':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ma chair frissonne de l’effroi que tu m’inspires,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je crains tes jugements.
  '121':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'J’observe la loi et la justice:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne m’abandonne pas à mes oppresseurs!
  '122':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prends sous ta garantie le bien de ton serviteur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne me laisse pas opprimer par des orgueilleux!
  '123':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes yeux languissent après ton salut,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et après la promesse de ta justice.
  '124':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Agis envers ton serviteur selon ta bonté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et enseigne-moi tes statuts!
  '125':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je suis ton serviteur: donne-moi l’intelligence,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour que je connaisse tes préceptes!
  '126':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Il est temps que l’Éternel agisse:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils transgressent ta loi.
  '127':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est pourquoi j’aime tes commandements,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Plus que l’or et que l’or fin;
  '128':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est pourquoi je trouve justes toutes tes ordonnances,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je hais toute voie de mensonge.
  '129':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tes préceptes sont admirables:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aussi mon âme les observe.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De mes lèvres j’énumère
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toutes les sentences de ta bouche.
  '130':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 19:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: La révélation de tes paroles éclaire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle donne de l’intelligence aux simples.
  '131':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ouvre la bouche et je soupire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car je suis avide de tes commandements.
  '132':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tourne vers moi ta face, et aie pitié de moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Selon ta coutume à l’égard de ceux qui aiment ton nom!
  '133':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Affermis mes pas dans ta parole,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ne laisse aucune iniquité dominer sur moi!
  '134':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Délivre-moi de l’oppression des hommes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afin que je garde tes ordonnances!
  '135':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 4:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Fais luire ta face sur ton serviteur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et enseigne-moi tes statuts!
  '136':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes yeux répandent des torrents d’eaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce qu’on n’observe point ta loi.
  '137':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu es juste, ô Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tes jugements sont équitables;
  '138':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu fondes tes préceptes sur la justice
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et sur la plus grande fidélité.
  '139':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon zèle me consume,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce que mes adversaires oublient tes paroles.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je me réjouis en suivant tes préceptes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme si je possédais tous les trésors.
  '140':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 22:31
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 12:7
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18:31
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 30:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ta parole est entièrement éprouvée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ton serviteur l’aime.
  '141':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis petit et méprisé;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je n’oublie point tes ordonnances.
  '142':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ta justice est une justice éternelle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ta loi est la vérité.
  '143':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'La détresse et l’angoisse m’atteignent:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes commandements font mes délices.
  '144':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tes préceptes sont éternellement justes:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Donne-moi l’intelligence, pour que je vive!
  '145':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je t’invoque de tout mon cœur: exauce-moi, Éternel,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afin que je garde tes statuts!
  '146':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je t’invoque: sauve-moi,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afin que j’observe tes préceptes!
  '147':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 5:4
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 88:14
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 130:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Je devance l’aurore et je crie;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’espère en tes promesses.
  '148':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 63:2
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '7'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 90:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Je devance les veilles et j’ouvre les yeux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour méditer ta parole.
  '149':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Écoute ma voix selon ta bonté!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rends-moi la vie selon ton jugement!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je médite tes ordonnances,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai tes sentiers sous les yeux.
  '150':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils s’approchent, ceux qui poursuivent le crime,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils s’éloignent de la loi.
  '151':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu es proche, ô Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tous tes commandements sont la vérité.
  '152':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dès longtemps je sais par tes préceptes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que tu les as établis pour toujours.
  '153':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vois ma misère, et délivre-moi!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car je n’oublie point ta loi.
  '154':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Défends ma cause, et rachète-moi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rends-moi la vie selon ta promesse!
  '155':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le salut est loin des méchants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car ils ne recherchent pas tes statuts.
  '156':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes compassions sont grandes, ô Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rends-moi la vie selon tes jugements!
  '157':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes persécuteurs et mes adversaires sont nombreux;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ne m’écarte point de tes préceptes,
  '158':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je vois avec dégoût des traîtres
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui n’observent pas ta parole.
  '159':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Considère que j’aime tes ordonnances:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Éternel, rends-moi la vie selon ta bonté!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je fais mes délices de tes statuts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je n’oublie point ta parole.
  '160':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le fondement de ta parole est la vérité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et toutes les lois de ta justice sont éternelles.
  '161':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des princes me persécutent sans cause;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais mon cœur ne tremble qu’à tes paroles.
  '162':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je me réjouis de ta parole,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme celui qui trouve un grand butin.
  '163':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je hais, je déteste le mensonge;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’aime ta loi.
  '164':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sept fois le jour je te célèbre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause des lois de ta justice.
  '165':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il y a beaucoup de paix pour ceux qui aiment ta loi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il ne leur arrive aucun malheur.
  '166':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’espère en ton salut, ô Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je pratique tes commandements.
  '167':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon âme observe tes préceptes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je les aime beaucoup.
  '168':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je garde tes ordonnances et tes préceptes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car toutes mes voies sont devant toi.
  '169':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que mon cri parvienne jusqu’à toi, ô Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Donne-moi l’intelligence, selon ta promesse!
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 103:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 116:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Fais du bien à ton serviteur, pour que je vive
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que j’observe ta parole!
  '170':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que ma supplication arrive jusqu’à toi!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Délivre-moi, selon ta promesse!
  '171':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que mes lèvres publient ta louange!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car tu m’enseignes tes statuts.
  '172':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que ma langue chante ta parole!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car tous tes commandements sont justes.
  '173':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que ta main me soit en aide!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car j’ai choisi tes ordonnances.
  '174':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je soupire après ton salut, ô Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ta loi fait mes délices.
  '175':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que mon âme vive et qu’elle te loue!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que tes jugements me soutiennent!
  '176':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 53:6
      - type: text
        text: . Lu 15:4, etc.
      marker-yv: yv-n
    - type: text
      text: 'Je suis errant comme une brebis perdue: cherche ton serviteur,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car je n’oublie point tes commandements.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ouvre mes yeux, pour que je contemple
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les merveilles de ta loi!
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 47:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 29:15
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 39:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 11:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Je suis un étranger sur la terre:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne me cache pas tes commandements!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Heureux ceux qui gardent ses préceptes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui le cherchent de tout leur cœur,
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon âme est brisée par le désir
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui toujours la porte vers tes lois.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu menaces les orgueilleux, ces maudits,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui s’égarent loin de tes commandements.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Décharge-moi de l’opprobre et du mépris!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car j’observe tes préceptes.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des princes ont beau s’asseoir et parler contre moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ton serviteur médite tes statuts.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 43:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Tes préceptes font mes délices,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce sont mes conseillers.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mon âme est attachée à la poussière:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rends-moi la vie selon ta parole!
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je raconte mes voies, et tu m’exauces:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 25:4
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 27:11
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 86:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Enseigne-moi tes statuts!
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fais-moi comprendre la voie de tes ordonnances,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je méditerai sur tes merveilles!
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mon âme pleure de chagrin:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Relève-moi selon ta parole!
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Éloigne de moi la voie du mensonge,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et accorde-moi la grâce de suivre ta loi!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui ne commettent point d’iniquité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qui marchent dans ses voies!
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je choisis la voie de la vérité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je place tes lois sous mes yeux.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je m’attache à tes préceptes:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Éternel, ne me rends point confus!
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je cours dans la voie de tes commandements,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car tu élargis mon cœur.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Enseigne-moi, Éternel, la voie de tes statuts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour que je la retienne jusqu’à la fin!
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Donne-moi l’intelligence, pour que je garde ta loi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que je l’observe de tout mon cœur!
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Conduis-moi dans le sentier de tes commandements!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car je l’aime.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Incline mon cœur vers tes préceptes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et non vers le gain!
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Détourne mes yeux de la vue des choses vaines,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fais-moi vivre dans ta voie!
  '38':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Accomplis envers ton serviteur ta promesse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui est pour ceux qui te craignent!
  '39':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Éloigne de moi l’opprobre que je redoute!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car tes jugements sont pleins de bonté.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as prescrit tes ordonnances,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour qu’on les observe avec soin.
  '40':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici, je désire pratiquer tes ordonnances:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fais-moi vivre dans ta justice!
  '41':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Éternel, que ta miséricorde vienne sur moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ton salut selon ta promesse!
  '42':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je pourrai répondre à celui qui m’outrage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car je me confie en ta parole.
  '43':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N’ôte pas entièrement de ma bouche la parole de la vérité!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car j’espère en tes jugements.
  '44':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je garderai ta loi constamment,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A toujours et à perpétuité.
  '45':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je marcherai au large,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car je recherche tes ordonnances.
  '46':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je parlerai de tes préceptes devant les rois,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je ne rougirai point.
  '47':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je fais mes délices de tes commandements.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je les aime.
  '48':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je lève mes mains vers tes commandements que j’aime,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je veux méditer tes statuts.
  '49':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Souviens-toi de ta promesse à ton serviteur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Puisque tu m’as donné l’espérance!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Puissent mes actions être bien réglées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afin que je garde tes statuts!
  '50':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est ma consolation dans ma misère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car ta promesse me rend la vie.
  '51':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des orgueilleux me chargent de railleries;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ne m’écarte point de ta loi.
  '52':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je pense à tes jugements d’autrefois, ô Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je me console.
  '53':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Une colère ardente me saisit à la vue des méchants
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui abandonnent ta loi.
  '54':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes statuts sont le sujet de mes cantiques,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans la maison où je suis étranger.
  '55':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 16:7
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 42:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: La nuit je me rappelle ton nom, ô Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je garde ta loi.
  '56':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est là ce qui m’est propre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car j’observe tes ordonnances.
  '57':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ma part, ô Éternel! Je le dis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est de garder tes paroles.
  '58':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je t’implore de tout mon cœur:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aie pitié de moi, selon ta promesse!
  '59':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je réfléchis à mes voies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je dirige mes pieds vers tes préceptes.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors je ne rougirai point,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A la vue de tous tes commandements.
  '60':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je me hâte, je ne diffère point
  - type: usfm
    marker: q1
    children:
    - type: text
      text: D’observer tes commandements.
  '61':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les pièges des méchants m’environnent;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je n’oublie point ta loi.
  '62':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au milieu de la nuit je me lève pour te louer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause des jugements de ta justice.
  '63':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis l’ami de tous ceux qui te craignent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et de ceux qui gardent tes ordonnances.
  '64':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La terre, ô Éternel! Est pleine de ta bonté;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Enseigne-moi tes statuts!
  '65':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu fais du bien à ton serviteur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Éternel! Selon ta promesse.
  '66':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Enseigne-moi le bon sens et l’intelligence!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car je crois à tes commandements.
  '67':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avant d’avoir été humilié, je m’égarais;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maintenant j’observe ta parole.
  '68':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu es bon et bienfaisant;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Enseigne-moi tes statuts!
  '69':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des orgueilleux imaginent contre moi des faussetés;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moi, je garde de tout mon cœur tes ordonnances.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je te louerai dans la droiture de mon cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En apprenant les lois de ta justice.
  '70':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leur cœur est insensible comme la graisse;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moi, je fais mes délices de ta loi.
  '71':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il m’est bon d’être humilié,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afin que j’apprenne tes statuts.
  '72':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mieux vaut pour moi la loi de ta bouche
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 19:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Que mille objets d’or et d’argent.
  '73':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 10:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 139:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Tes mains m’ont créé, elles m’ont formé;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Donne-moi l’intelligence, pour que j’apprenne tes commandements!
  '74':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux qui te craignent me voient et se réjouissent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car j’espère en tes promesses.
  '75':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je sais, ô Éternel! Que tes jugements sont justes;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est par fidélité que tu m’as humilié.
  '76':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que ta bonté soit ma consolation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme tu l’as promis à ton serviteur!
  '77':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que tes compassions viennent sur moi, pour que je vive!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car ta loi fait mes délices.
  '78':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’ils soient confondus, les orgueilleux qui m’oppriment sans cause!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moi, je médite sur tes ordonnances.
  '79':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’ils reviennent à moi, ceux qui te craignent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ceux qui connaissent tes préceptes!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je veux garder tes statuts:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne m’abandonne pas entièrement!
  '80':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que mon cœur soit sincère dans tes statuts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afin que je ne sois pas couvert de honte!
  '81':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon âme languit après ton salut;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’espère en ta promesse.
  '82':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes yeux languissent après ta promesse;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je dis: Quand me consoleras-tu?'
  '83':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car je suis comme une outre dans la fumée;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je n’oublie point tes statuts.
  '84':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quel est le nombre des jours de ton serviteur?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand feras-tu justice de ceux qui me persécutent?
  '85':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des orgueilleux creusent des fosses devant moi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils n’agissent point selon ta loi.
  '86':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous tes commandements ne sont que fidélité;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ils me persécutent sans cause: secours-moi!'
  '87':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ont failli me terrasser et m’anéantir;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et moi, je n’abandonne point tes ordonnances.
  '88':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rends-moi la vie selon ta bonté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afin que j’observe les préceptes de ta bouche!
  '89':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A toujours, ô Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ta parole subsiste dans les cieux.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comment le jeune homme rendra-t-il pur son sentier?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En se dirigeant d’après ta parole.
  '90':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ec 1:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: De génération en génération ta fidélité subsiste;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as fondé la terre, et elle demeure ferme.
  '91':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est d’après tes lois que tout subsiste aujourd’hui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car toutes choses te sont assujetties.
  '92':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si ta loi n’eût fait mes délices,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’eusse alors péri dans ma misère.
  '93':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je n’oublierai jamais tes ordonnances,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car c’est par elles que tu me rends la vie.
  '94':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je suis à toi: sauve-moi!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car je recherche tes ordonnances.
  '95':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des méchants m’attendent pour me faire périr;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis attentif à tes préceptes.
  '96':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je vois des bornes à tout ce qui est parfait:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes commandements n’ont point de limite.
  '97':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Combien j’aime ta loi!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle est tout le jour l’objet de ma méditation.
  '98':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes commandements me rendent plus sage que mes ennemis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car je les ai toujours avec moi.
  '99':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis plus instruit que tous mes maîtres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car tes préceptes sont l’objet de ma méditation.
