document_id: PSA.119,93
type_code: fra
verses:
  '1':
  - type: heading
    content: (Ps 1; 19:8, etc.) (Mt 5:17-19. 2 Ti 3:15-17. Ec 12:15.) És 42:21. Ac 24:16. 1 Jn 5:3.
  - type: text
    content: Heureux ceux qui sont intègres dans leur voie,
  - type: note
    content: Ps 1:1.
  - type: text
    content: Qui marchent selon la loi de l’Éternel!
  '10':
  - type: text
    content: 'Je te cherche de tout mon cœur:'
  - type: text
    content: Ne me laisse pas égarer loin de tes commandements!
  '100':
  - type: text
    content: J’ai plus d’intelligence que les vieillards,
  - type: text
    content: Car j’observe tes ordonnances.
  '101':
  - type: text
    content: Je retiens mon pied loin de tout mauvais chemin,
  - type: text
    content: Afin de garder ta parole.
  '102':
  - type: text
    content: Je ne m’écarte pas de tes lois,
  - type: text
    content: Car c’est toi qui m’enseignes.
  '103':
  - type: text
    content: ' '
  - type: note
    content: Ps 19:11. Pr 8:11.
  - type: text
    content: Que tes paroles sont douces à mon palais,
  - type: text
    content: Plus que le miel à ma bouche!
  '104':
  - type: text
    content: Par tes ordonnances je deviens intelligent,
  - type: text
    content: Aussi je hais toute voie de mensonge.
  '105':
  - type: text
    content: Ta parole est une lampe à mes pieds,
  - type: text
    content: Et une lumière sur mon sentier.
  '106':
  - type: text
    content: ' '
  - type: note
    content: Né 10:29.
  - type: text
    content: Je jure, et je le tiendrai,
  - type: text
    content: D’observer les lois de ta justice.
  '107':
  - type: text
    content: 'Je suis bien humilié:'
  - type: text
    content: Éternel, rends-moi la vie selon ta parole!
  '108':
  - type: text
    content: Agrée, ô Éternel! Les sentiments que ma bouche exprime,
  - type: text
    content: Et enseigne-moi tes lois!
  '109':
  - type: text
    content: Ma vie est continuellement exposée,
  - type: text
    content: Et je n’oublie point ta loi.
  '11':
  - type: text
    content: Je serre ta parole dans mon cœur,
  - type: text
    content: Afin de ne pas pécher contre toi.
  '110':
  - type: text
    content: Des méchants me tendent des pièges,
  - type: text
    content: Et je ne m’égare pas loin de tes ordonnances.
  '111':
  - type: text
    content: Tes préceptes sont pour toujours mon héritage,
  - type: text
    content: Car ils sont la joie de mon cœur.
  '112':
  - type: text
    content: J’incline mon cœur à pratiquer tes statuts,
  - type: text
    content: Toujours, jusqu’à la fin.
  '113':
  - type: text
    content: Je hais les hommes indécis,
  - type: text
    content: Et j’aime ta loi.
  '114':
  - type: text
    content: Tu es mon asile et mon bouclier;
  - type: text
    content: J’espère en ta promesse.
  '115':
  - type: text
    content: Éloignez-vous de moi, méchants,
  - type: text
    content: Afin que j’observe les commandements de mon Dieu!
  '116':
  - type: text
    content: Soutiens-moi selon ta promesse, afin que je vive,
  - type: text
    content: Et ne me rends point confus dans mon espérance!
  '117':
  - type: text
    content: Sois mon appui, pour que je sois sauvé,
  - type: text
    content: Et que je m’occupe sans cesse de tes statuts!
  '118':
  - type: text
    content: Tu méprises tous ceux qui s’écartent de tes statuts,
  - type: text
    content: Car leur tromperie est sans effet.
  '119':
  - type: text
    content: Tu enlèves comme de l’écume tous les méchants de la terre;
  - type: text
    content: C’est pourquoi j’aime tes préceptes.
  '12':
  - type: text
    content: Béni sois-tu, ô Éternel!
  - type: text
    content: Enseigne-moi tes statuts!
  '120':
  - type: text
    content: Ma chair frissonne de l’effroi que tu m’inspires,
  - type: text
    content: Et je crains tes jugements.
  '121':
  - type: text
    content: 'J’observe la loi et la justice:'
  - type: text
    content: Ne m’abandonne pas à mes oppresseurs!
  '122':
  - type: text
    content: Prends sous ta garantie le bien de ton serviteur,
  - type: text
    content: Ne me laisse pas opprimer par des orgueilleux!
  '123':
  - type: text
    content: Mes yeux languissent après ton salut,
  - type: text
    content: Et après la promesse de ta justice.
  '124':
  - type: text
    content: Agis envers ton serviteur selon ta bonté,
  - type: text
    content: Et enseigne-moi tes statuts!
  '125':
  - type: text
    content: 'Je suis ton serviteur: donne-moi l’intelligence,'
  - type: text
    content: Pour que je connaisse tes préceptes!
  '126':
  - type: text
    content: 'Il est temps que l’Éternel agisse:'
  - type: text
    content: Ils transgressent ta loi.
  '127':
  - type: text
    content: C’est pourquoi j’aime tes commandements,
  - type: text
    content: Plus que l’or et que l’or fin;
  '128':
  - type: text
    content: C’est pourquoi je trouve justes toutes tes ordonnances,
  - type: text
    content: Je hais toute voie de mensonge.
  '129':
  - type: text
    content: 'Tes préceptes sont admirables:'
  - type: text
    content: Aussi mon âme les observe.
  '13':
  - type: text
    content: De mes lèvres j’énumère
  - type: text
    content: Toutes les sentences de ta bouche.
  '130':
  - type: text
    content: ' '
  - type: note
    content: Ps 19:9.
  - type: text
    content: La révélation de tes paroles éclaire,
  - type: text
    content: Elle donne de l’intelligence aux simples.
  '131':
  - type: text
    content: J’ouvre la bouche et je soupire,
  - type: text
    content: Car je suis avide de tes commandements.
  '132':
  - type: text
    content: Tourne vers moi ta face, et aie pitié de moi,
  - type: text
    content: Selon ta coutume à l’égard de ceux qui aiment ton nom!
  '133':
  - type: text
    content: Affermis mes pas dans ta parole,
  - type: text
    content: Et ne laisse aucune iniquité dominer sur moi!
  '134':
  - type: text
    content: Délivre-moi de l’oppression des hommes,
  - type: text
    content: Afin que je garde tes ordonnances!
  '135':
  - type: text
    content: ' '
  - type: note
    content: Ps 4:7.
  - type: text
    content: Fais luire ta face sur ton serviteur,
  - type: text
    content: Et enseigne-moi tes statuts!
  '136':
  - type: text
    content: Mes yeux répandent des torrents d’eaux,
  - type: text
    content: Parce qu’on n’observe point ta loi.
  '137':
  - type: text
    content: Tu es juste, ô Éternel!
  - type: text
    content: Et tes jugements sont équitables;
  '138':
  - type: text
    content: Tu fondes tes préceptes sur la justice
  - type: text
    content: Et sur la plus grande fidélité.
  '139':
  - type: text
    content: Mon zèle me consume,
  - type: text
    content: Parce que mes adversaires oublient tes paroles.
  '14':
  - type: text
    content: Je me réjouis en suivant tes préceptes,
  - type: text
    content: Comme si je possédais tous les trésors.
  '140':
  - type: text
    content: ' '
  - type: note
    content: 2 S 22:31. Ps 12:7; 18:31. Pr 30:5.
  - type: text
    content: Ta parole est entièrement éprouvée,
  - type: text
    content: Et ton serviteur l’aime.
  '141':
  - type: text
    content: Je suis petit et méprisé;
  - type: text
    content: Je n’oublie point tes ordonnances.
  '142':
  - type: text
    content: Ta justice est une justice éternelle,
  - type: text
    content: Et ta loi est la vérité.
  '143':
  - type: text
    content: 'La détresse et l’angoisse m’atteignent:'
  - type: text
    content: Tes commandements font mes délices.
  '144':
  - type: text
    content: 'Tes préceptes sont éternellement justes:'
  - type: text
    content: Donne-moi l’intelligence, pour que je vive!
  '145':
  - type: text
    content: 'Je t’invoque de tout mon cœur: exauce-moi, Éternel,'
  - type: text
    content: Afin que je garde tes statuts!
  '146':
  - type: text
    content: 'Je t’invoque: sauve-moi,'
  - type: text
    content: Afin que j’observe tes préceptes!
  '147':
  - type: text
    content: ' '
  - type: note
    content: Ps 5:4; 88:14; 130:6.
  - type: text
    content: Je devance l’aurore et je crie;
  - type: text
    content: J’espère en tes promesses.
  '148':
  - type: text
    content: ' '
  - type: note
    content: Ps 63:2, 7; 90:4.
  - type: text
    content: Je devance les veilles et j’ouvre les yeux,
  - type: text
    content: Pour méditer ta parole.
  '149':
  - type: text
    content: Écoute ma voix selon ta bonté!
  - type: text
    content: Rends-moi la vie selon ton jugement!
  '15':
  - type: text
    content: Je médite tes ordonnances,
  - type: text
    content: J’ai tes sentiers sous les yeux.
  '150':
  - type: text
    content: Ils s’approchent, ceux qui poursuivent le crime,
  - type: text
    content: Ils s’éloignent de la loi.
  '151':
  - type: text
    content: Tu es proche, ô Éternel!
  - type: text
    content: Et tous tes commandements sont la vérité.
  '152':
  - type: text
    content: Dès longtemps je sais par tes préceptes
  - type: text
    content: Que tu les as établis pour toujours.
  '153':
  - type: text
    content: Vois ma misère, et délivre-moi!
  - type: text
    content: Car je n’oublie point ta loi.
  '154':
  - type: text
    content: Défends ma cause, et rachète-moi;
  - type: text
    content: Rends-moi la vie selon ta promesse!
  '155':
  - type: text
    content: Le salut est loin des méchants,
  - type: text
    content: Car ils ne recherchent pas tes statuts.
  '156':
  - type: text
    content: Tes compassions sont grandes, ô Éternel!
  - type: text
    content: Rends-moi la vie selon tes jugements!
  '157':
  - type: text
    content: Mes persécuteurs et mes adversaires sont nombreux;
  - type: text
    content: Je ne m’écarte point de tes préceptes,
  '158':
  - type: text
    content: Je vois avec dégoût des traîtres
  - type: text
    content: Qui n’observent pas ta parole.
  '159':
  - type: text
    content: 'Considère que j’aime tes ordonnances:'
  - type: text
    content: Éternel, rends-moi la vie selon ta bonté!
  '16':
  - type: text
    content: Je fais mes délices de tes statuts,
  - type: text
    content: Je n’oublie point ta parole.
  '160':
  - type: text
    content: Le fondement de ta parole est la vérité,
  - type: text
    content: Et toutes les lois de ta justice sont éternelles.
  '161':
  - type: text
    content: Des princes me persécutent sans cause;
  - type: text
    content: Mais mon cœur ne tremble qu’à tes paroles.
  '162':
  - type: text
    content: Je me réjouis de ta parole,
  - type: text
    content: Comme celui qui trouve un grand butin.
  '163':
  - type: text
    content: Je hais, je déteste le mensonge;
  - type: text
    content: J’aime ta loi.
  '164':
  - type: text
    content: Sept fois le jour je te célèbre,
  - type: text
    content: A cause des lois de ta justice.
  '165':
  - type: text
    content: Il y a beaucoup de paix pour ceux qui aiment ta loi,
  - type: text
    content: Et il ne leur arrive aucun malheur.
  '166':
  - type: text
    content: J’espère en ton salut, ô Éternel!
  - type: text
    content: Et je pratique tes commandements.
  '167':
  - type: text
    content: Mon âme observe tes préceptes,
  - type: text
    content: Et je les aime beaucoup.
  '168':
  - type: text
    content: Je garde tes ordonnances et tes préceptes,
  - type: text
    content: Car toutes mes voies sont devant toi.
  '169':
  - type: text
    content: Que mon cri parvienne jusqu’à toi, ô Éternel!
  - type: text
    content: Donne-moi l’intelligence, selon ta promesse!
  '17':
  - type: text
    content: ' '
  - type: note
    content: Ps 103:2; 116:7.
  - type: text
    content: Fais du bien à ton serviteur, pour que je vive
  - type: text
    content: Et que j’observe ta parole!
  '170':
  - type: text
    content: Que ma supplication arrive jusqu’à toi!
  - type: text
    content: Délivre-moi, selon ta promesse!
  '171':
  - type: text
    content: Que mes lèvres publient ta louange!
  - type: text
    content: Car tu m’enseignes tes statuts.
  '172':
  - type: text
    content: Que ma langue chante ta parole!
  - type: text
    content: Car tous tes commandements sont justes.
  '173':
  - type: text
    content: Que ta main me soit en aide!
  - type: text
    content: Car j’ai choisi tes ordonnances.
  '174':
  - type: text
    content: Je soupire après ton salut, ô Éternel!
  - type: text
    content: Et ta loi fait mes délices.
  '175':
  - type: text
    content: Que mon âme vive et qu’elle te loue!
  - type: text
    content: Et que tes jugements me soutiennent!
  '176':
  - type: text
    content: ' '
  - type: note
    content: És 53:6. Lu 15:4, etc.
  - type: text
    content: 'Je suis errant comme une brebis perdue: cherche ton serviteur,'
  - type: text
    content: Car je n’oublie point tes commandements.
  '18':
  - type: text
    content: Ouvre mes yeux, pour que je contemple
  - type: text
    content: Les merveilles de ta loi!
  '19':
  - type: text
    content: ' '
  - type: note
    content: Ge 47:9. 1 Ch 29:15. Ps 39:13. Hé 11:13.
  - type: text
    content: 'Je suis un étranger sur la terre:'
  - type: text
    content: Ne me cache pas tes commandements!
  '2':
  - type: text
    content: Heureux ceux qui gardent ses préceptes,
  - type: text
    content: Qui le cherchent de tout leur cœur,
  '20':
  - type: text
    content: Mon âme est brisée par le désir
  - type: text
    content: Qui toujours la porte vers tes lois.
  '21':
  - type: text
    content: Tu menaces les orgueilleux, ces maudits,
  - type: text
    content: Qui s’égarent loin de tes commandements.
  '22':
  - type: text
    content: Décharge-moi de l’opprobre et du mépris!
  - type: text
    content: Car j’observe tes préceptes.
  '23':
  - type: text
    content: Des princes ont beau s’asseoir et parler contre moi,
  - type: text
    content: Ton serviteur médite tes statuts.
  '24':
  - type: text
    content: ' '
  - type: note
    content: Ps 43:4.
  - type: text
    content: Tes préceptes font mes délices,
  - type: text
    content: Ce sont mes conseillers.
  '25':
  - type: text
    content: 'Mon âme est attachée à la poussière:'
  - type: text
    content: Rends-moi la vie selon ta parole!
  '26':
  - type: text
    content: 'Je raconte mes voies, et tu m’exauces:'
  - type: note
    content: Ps 25:4; 27:11; 86:11.
  - type: text
    content: Enseigne-moi tes statuts!
  '27':
  - type: text
    content: Fais-moi comprendre la voie de tes ordonnances,
  - type: text
    content: Et je méditerai sur tes merveilles!
  '28':
  - type: text
    content: 'Mon âme pleure de chagrin:'
  - type: text
    content: Relève-moi selon ta parole!
  '29':
  - type: text
    content: Éloigne de moi la voie du mensonge,
  - type: text
    content: Et accorde-moi la grâce de suivre ta loi!
  '3':
  - type: text
    content: Qui ne commettent point d’iniquité,
  - type: text
    content: Et qui marchent dans ses voies!
  '30':
  - type: text
    content: Je choisis la voie de la vérité,
  - type: text
    content: Je place tes lois sous mes yeux.
  '31':
  - type: text
    content: 'Je m’attache à tes préceptes:'
  - type: text
    content: Éternel, ne me rends point confus!
  '32':
  - type: text
    content: Je cours dans la voie de tes commandements,
  - type: text
    content: Car tu élargis mon cœur.
  '33':
  - type: text
    content: Enseigne-moi, Éternel, la voie de tes statuts,
  - type: text
    content: Pour que je la retienne jusqu’à la fin!
  '34':
  - type: text
    content: Donne-moi l’intelligence, pour que je garde ta loi
  - type: text
    content: Et que je l’observe de tout mon cœur!
  '35':
  - type: text
    content: Conduis-moi dans le sentier de tes commandements!
  - type: text
    content: Car je l’aime.
  '36':
  - type: text
    content: Incline mon cœur vers tes préceptes,
  - type: text
    content: Et non vers le gain!
  '37':
  - type: text
    content: Détourne mes yeux de la vue des choses vaines,
  - type: text
    content: Fais-moi vivre dans ta voie!
  '38':
  - type: text
    content: Accomplis envers ton serviteur ta promesse,
  - type: text
    content: Qui est pour ceux qui te craignent!
  '39':
  - type: text
    content: Éloigne de moi l’opprobre que je redoute!
  - type: text
    content: Car tes jugements sont pleins de bonté.
  '4':
  - type: text
    content: Tu as prescrit tes ordonnances,
  - type: text
    content: Pour qu’on les observe avec soin.
  '40':
  - type: text
    content: 'Voici, je désire pratiquer tes ordonnances:'
  - type: text
    content: Fais-moi vivre dans ta justice!
  '41':
  - type: text
    content: Éternel, que ta miséricorde vienne sur moi,
  - type: text
    content: Ton salut selon ta promesse!
  '42':
  - type: text
    content: Et je pourrai répondre à celui qui m’outrage,
  - type: text
    content: Car je me confie en ta parole.
  '43':
  - type: text
    content: N’ôte pas entièrement de ma bouche la parole de la vérité!
  - type: text
    content: Car j’espère en tes jugements.
  '44':
  - type: text
    content: Je garderai ta loi constamment,
  - type: text
    content: A toujours et à perpétuité.
  '45':
  - type: text
    content: Je marcherai au large,
  - type: text
    content: Car je recherche tes ordonnances.
  '46':
  - type: text
    content: Je parlerai de tes préceptes devant les rois,
  - type: text
    content: Et je ne rougirai point.
  '47':
  - type: text
    content: Je fais mes délices de tes commandements.
  - type: text
    content: Je les aime.
  '48':
  - type: text
    content: Je lève mes mains vers tes commandements que j’aime,
  - type: text
    content: Et je veux méditer tes statuts.
  '49':
  - type: text
    content: Souviens-toi de ta promesse à ton serviteur,
  - type: text
    content: Puisque tu m’as donné l’espérance!
  '5':
  - type: text
    content: Puissent mes actions être bien réglées,
  - type: text
    content: Afin que je garde tes statuts!
  '50':
  - type: text
    content: C’est ma consolation dans ma misère,
  - type: text
    content: Car ta promesse me rend la vie.
  '51':
  - type: text
    content: Des orgueilleux me chargent de railleries;
  - type: text
    content: Je ne m’écarte point de ta loi.
  '52':
  - type: text
    content: Je pense à tes jugements d’autrefois, ô Éternel!
  - type: text
    content: Et je me console.
  '53':
  - type: text
    content: Une colère ardente me saisit à la vue des méchants
  - type: text
    content: Qui abandonnent ta loi.
  '54':
  - type: text
    content: Tes statuts sont le sujet de mes cantiques,
  - type: text
    content: Dans la maison où je suis étranger.
  '55':
  - type: text
    content: ' '
  - type: note
    content: Ps 16:7; 42:9.
  - type: text
    content: La nuit je me rappelle ton nom, ô Éternel!
  - type: text
    content: Et je garde ta loi.
  '56':
  - type: text
    content: C’est là ce qui m’est propre,
  - type: text
    content: Car j’observe tes ordonnances.
  '57':
  - type: text
    content: Ma part, ô Éternel! Je le dis,
  - type: text
    content: C’est de garder tes paroles.
  '58':
  - type: text
    content: 'Je t’implore de tout mon cœur:'
  - type: text
    content: Aie pitié de moi, selon ta promesse!
  '59':
  - type: text
    content: Je réfléchis à mes voies,
  - type: text
    content: Et je dirige mes pieds vers tes préceptes.
  '6':
  - type: text
    content: Alors je ne rougirai point,
  - type: text
    content: A la vue de tous tes commandements.
  '60':
  - type: text
    content: Je me hâte, je ne diffère point
  - type: text
    content: D’observer tes commandements.
  '61':
  - type: text
    content: Les pièges des méchants m’environnent;
  - type: text
    content: Je n’oublie point ta loi.
  '62':
  - type: text
    content: Au milieu de la nuit je me lève pour te louer,
  - type: text
    content: A cause des jugements de ta justice.
  '63':
  - type: text
    content: Je suis l’ami de tous ceux qui te craignent,
  - type: text
    content: Et de ceux qui gardent tes ordonnances.
  '64':
  - type: text
    content: La terre, ô Éternel! Est pleine de ta bonté;
  - type: text
    content: Enseigne-moi tes statuts!
  '65':
  - type: text
    content: Tu fais du bien à ton serviteur,
  - type: text
    content: O Éternel! Selon ta promesse.
  '66':
  - type: text
    content: Enseigne-moi le bon sens et l’intelligence!
  - type: text
    content: Car je crois à tes commandements.
  '67':
  - type: text
    content: Avant d’avoir été humilié, je m’égarais;
  - type: text
    content: Maintenant j’observe ta parole.
  '68':
  - type: text
    content: Tu es bon et bienfaisant;
  - type: text
    content: Enseigne-moi tes statuts!
  '69':
  - type: text
    content: Des orgueilleux imaginent contre moi des faussetés;
  - type: text
    content: Moi, je garde de tout mon cœur tes ordonnances.
  '7':
  - type: text
    content: Je te louerai dans la droiture de mon cœur,
  - type: text
    content: En apprenant les lois de ta justice.
  '70':
  - type: text
    content: Leur cœur est insensible comme la graisse;
  - type: text
    content: Moi, je fais mes délices de ta loi.
  '71':
  - type: text
    content: Il m’est bon d’être humilié,
  - type: text
    content: Afin que j’apprenne tes statuts.
  '72':
  - type: text
    content: Mieux vaut pour moi la loi de ta bouche
  - type: note
    content: Ps 19:11.
  - type: text
    content: Que mille objets d’or et d’argent.
  '73':
  - type: text
    content: ' '
  - type: note
    content: Job 10:9. Ps 139:13.
  - type: text
    content: Tes mains m’ont créé, elles m’ont formé;
  - type: text
    content: Donne-moi l’intelligence, pour que j’apprenne tes commandements!
  '74':
  - type: text
    content: Ceux qui te craignent me voient et se réjouissent,
  - type: text
    content: Car j’espère en tes promesses.
  '75':
  - type: text
    content: Je sais, ô Éternel! Que tes jugements sont justes;
  - type: text
    content: C’est par fidélité que tu m’as humilié.
  '76':
  - type: text
    content: Que ta bonté soit ma consolation,
  - type: text
    content: Comme tu l’as promis à ton serviteur!
  '77':
  - type: text
    content: Que tes compassions viennent sur moi, pour que je vive!
  - type: text
    content: Car ta loi fait mes délices.
  '78':
  - type: text
    content: Qu’ils soient confondus, les orgueilleux qui m’oppriment sans cause!
  - type: text
    content: Moi, je médite sur tes ordonnances.
  '79':
  - type: text
    content: Qu’ils reviennent à moi, ceux qui te craignent,
  - type: text
    content: Et ceux qui connaissent tes préceptes!
  '8':
  - type: text
    content: 'Je veux garder tes statuts:'
  - type: text
    content: Ne m’abandonne pas entièrement!
  '80':
  - type: text
    content: Que mon cœur soit sincère dans tes statuts,
  - type: text
    content: Afin que je ne sois pas couvert de honte!
  '81':
  - type: text
    content: Mon âme languit après ton salut;
  - type: text
    content: J’espère en ta promesse.
  '82':
  - type: text
    content: Mes yeux languissent après ta promesse;
  - type: text
    content: 'Je dis: Quand me consoleras-tu?'
  '83':
  - type: text
    content: Car je suis comme une outre dans la fumée;
  - type: text
    content: Je n’oublie point tes statuts.
  '84':
  - type: text
    content: Quel est le nombre des jours de ton serviteur?
  - type: text
    content: Quand feras-tu justice de ceux qui me persécutent?
  '85':
  - type: text
    content: Des orgueilleux creusent des fosses devant moi;
  - type: text
    content: Ils n’agissent point selon ta loi.
  '86':
  - type: text
    content: Tous tes commandements ne sont que fidélité;
  - type: text
    content: 'Ils me persécutent sans cause: secours-moi!'
  '87':
  - type: text
    content: Ils ont failli me terrasser et m’anéantir;
  - type: text
    content: Et moi, je n’abandonne point tes ordonnances.
  '88':
  - type: text
    content: Rends-moi la vie selon ta bonté,
  - type: text
    content: Afin que j’observe les préceptes de ta bouche!
  '89':
  - type: text
    content: A toujours, ô Éternel!
  - type: text
    content: Ta parole subsiste dans les cieux.
  '9':
  - type: text
    content: Comment le jeune homme rendra-t-il pur son sentier?
  - type: text
    content: En se dirigeant d’après ta parole.
  '90':
  - type: text
    content: ' '
  - type: note
    content: Ec 1:4.
  - type: text
    content: De génération en génération ta fidélité subsiste;
  - type: text
    content: Tu as fondé la terre, et elle demeure ferme.
  '91':
  - type: text
    content: C’est d’après tes lois que tout subsiste aujourd’hui,
  - type: text
    content: Car toutes choses te sont assujetties.
  '92':
  - type: text
    content: Si ta loi n’eût fait mes délices,
  - type: text
    content: J’eusse alors péri dans ma misère.
  '93':
  - type: text
    content: Je n’oublierai jamais tes ordonnances,
  - type: text
    content: Car c’est par elles que tu me rends la vie.
  '94':
  - type: text
    content: 'Je suis à toi: sauve-moi!'
  - type: text
    content: Car je recherche tes ordonnances.
  '95':
  - type: text
    content: Des méchants m’attendent pour me faire périr;
  - type: text
    content: Je suis attentif à tes préceptes.
  '96':
  - type: text
    content: 'Je vois des bornes à tout ce qui est parfait:'
  - type: text
    content: Tes commandements n’ont point de limite.
  '97':
  - type: text
    content: Combien j’aime ta loi!
  - type: text
    content: Elle est tout le jour l’objet de ma méditation.
  '98':
  - type: text
    content: Tes commandements me rendent plus sage que mes ennemis,
  - type: text
    content: Car je les ai toujours avec moi.
  '99':
  - type: text
    content: Je suis plus instruit que tous mes maîtres,
  - type: text
    content: Car tes préceptes sont l’objet de ma méditation.
