document_id: LUK.24,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Résurrection de Jésus-Christ
  - type: heading
    content: 'V. 1-8: cf. (Mt 28:1-7. Mc 16:1-7. Jn 20:1, 2.) (Ps 16:8-10. Ac 2:23-32.) (1 Co 15:1-28. Ac 17:31.) Ro 4:24, 25. 1 Pi 1:3, 4.'
  - type: text
    content: ' '
  - type: note
    content: Mt 28:1. Mc 16:1. Jn 20:1.
  - type: text
    content: 'Le premier jour de la semaine, elles se rendirent au sépulcre de grand matin, portant les aromates qu’elles avaient préparés. '
  '10':
  - type: text
    content: 'Celles qui dirent ces choses aux apôtres étaient Marie de Magdala, Jeanne, Marie, mère de Jacques, et les autres qui étaient avec elles. '
  '11':
  - type: text
    content: 'Ils tinrent ces discours pour des rêveries, et ils ne crurent pas ces femmes. '
  '12':
  - type: note
    content: Jn 20:3, 6.
  - type: text
    content: Mais Pierre se leva, et courut au sépulcre. S’étant baissé, il ne vit que les linges qui étaient à terre; puis il s’en alla chez lui, dans l’étonnement de ce qui était arrivé.
  - type: heading
    content: Sur le chemin d’Emmaüs
  - type: heading
    content: 'V. 13-35: cf. Mc 16:12, 13. Mal 3:16.'
  '13':
  - type: text
    content: ' '
  - type: note
    content: Mc 16:12.
  - type: text
    content: 'Et voici, ce même jour, deux disciples allaient à un village nommé Émmaüs, éloigné de Jérusalem de soixante stades; '
  '14':
  - type: text
    content: 'et ils s’entretenaient de tout ce qui s’était passé. '
  '15':
  - type: text
    content: 'Pendant qu’ils parlaient et discutaient, '
  - type: note
    content: Mt 18:20. Lu 24:36.
  - type: text
    content: 'Jésus s’approcha, et fit route avec eux. '
  '16':
  - type: text
    content: 'Mais leurs yeux étaient empêchés de le reconnaître. '
  '17':
  - type: text
    content: 'Il leur dit: '
  - type: text
    content: De quoi vous entretenez-vous en marchant, pour que vous soyez tout tristes?
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'L’un d’eux, nommé Cléopas, lui répondit: Es-tu le seul qui, séjournant à Jérusalem ne sache pas ce qui y est arrivé ces jours-ci?'
  '19':
  - type: text
    content: ' '
  - type: text
    content: Quoi?
  - type: text
    content: ' leur dit-il. Et ils lui répondirent: Ce qui est arrivé au sujet de Jésus de Nazareth, '
  - type: note
    content: Lu 7:16. Jn 4:19; 6:14.
  - type: text
    content: 'qui était un prophète puissant en œuvres et en paroles devant Dieu et devant tout le peuple, '
  '2':
  - type: text
    content: 'Elles trouvèrent que la pierre avait été roulée de devant le sépulcre; '
  '20':
  - type: text
    content: 'et comment les principaux sacrificateurs et nos magistrats l’ont livré pour le faire condamner à mort et l’ont crucifié. '
  '21':
  - type: text
    content: 'Nous espérions que ce serait lui '
  - type: note
    content: Lu 1:68; 2:38. Ac 1:6.
  - type: text
    content: 'qui délivrerait Israël; mais avec tout cela, voici le troisième jour que ces choses se sont passées. '
  '22':
  - type: text
    content: 'Il est vrai que '
  - type: note
    content: Mt 28:8. Mc 16:10. Jn 20:18.
  - type: text
    content: 'quelques femmes d’entre nous nous ont fort étonnés; s’étant rendues de grand matin au sépulcre '
  '23':
  - type: text
    content: 'et n’ayant pas trouvé son corps, elles sont venues dire que des anges leur sont apparus et ont annoncé qu’il est vivant. '
  '24':
  - type: text
    content: 'Quelques-uns de ceux qui étaient avec nous sont allés au sépulcre, et ils ont trouvé les choses comme les femmes l’avaient dit; mais lui, ils ne l’ont point vu. '
  '25':
  - type: text
    content: 'Alors Jésus leur dit: '
  - type: text
    content: O hommes sans intelligence, et dont le cœur est lent à croire tout ce qu’ont dit les prophètes!
  '26':
  - type: text
    content: ' '
  - type: note
    content: És 50:6; 53:5. Ph 2:7. Hé 12:2. 1 Pi 1:11.
  - type: text
    content: Ne fallait-il pas que le Christ souffrît ces choses, et qu’il entrât dans sa gloire?
  - type: text
    content: ' '
  '27':
  - type: note
    content: Ge 3:15; 22:18; 26:4; 49:10. De 18:15.
  - type: text
    content: 'Et, commençant par Moïse et '
  - type: note
    content: Ps 132:11. És 7:14; 9:5; 40:10. Jé 23:5; 33:14. Éz 34:33; 37:25. Da 9:24. Mi 7:20.
  - type: text
    content: 'par tous les prophètes, il leur expliqua dans toutes les Écritures ce qui le concernait. '
  '28':
  - type: text
    content: 'Lorsqu’ils furent près du village où ils allaient, il parut vouloir aller plus loin. '
  '29':
  - type: note
    content: Ge 19:3.
  - type: text
    content: 'Mais ils le pressèrent, en disant: '
  - type: note
    content: Ac 16:15. Hé 13:2.
  - type: text
    content: 'Reste avec nous, car le soir approche, le jour est sur son déclin. Et il entra, pour rester avec eux. '
  '3':
  - type: text
    content: 'et, étant entrées, elles ne trouvèrent pas le corps du Seigneur Jésus. '
  '30':
  - type: text
    content: 'Pendant qu’il était à table avec eux, il prit le pain; et, après avoir rendu grâces, il le rompit, et le leur donna. '
  '31':
  - type: text
    content: 'Alors leurs yeux s’ouvrirent, et ils le reconnurent; mais il disparut de devant eux. '
  '32':
  - type: text
    content: 'Et ils se dirent l’un à l’autre: Notre cœur ne brûlait-il pas au-dedans de nous, lorsqu’il nous parlait en chemin et nous expliquait les Écritures? '
  '33':
  - type: text
    content: 'Se levant à l’heure même, ils retournèrent à Jérusalem, et ils trouvèrent les onze, et ceux qui étaient avec eux, assemblés '
  '34':
  - type: text
    content: 'et disant: Le Seigneur est réellement ressuscité, '
  - type: note
    content: 1 Co 15:5.
  - type: text
    content: 'et il est apparu à Simon. '
  '35':
  - type: text
    content: Et ils racontèrent ce qui leur était arrivé en chemin, et comment ils l’avaient reconnu au moment où il rompit le pain.
  - type: heading
    content: 'V. 36-49: cf. (Mc 16:14-18. Jn 20:19-23, 24-29.) Mt 28:16-20. Ac 1:2, 3. 1 Co 15:5.'
  '36':
  - type: text
    content: ' '
  - type: note
    content: Mc 16:14. Jn 20:19. 1 Co 15:5.
  - type: text
    content: 'Tandis qu’ils parlaient de la sorte, lui-même se présenta au milieu d’eux, et leur dit: '
  - type: text
    content: La paix soit avec vous!
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'Saisis de frayeur et d’épouvante, ils croyaient voir un esprit. '
  '38':
  - type: text
    content: 'Mais il leur dit: '
  - type: text
    content: Pourquoi êtes-vous troublés, et pourquoi pareilles pensées s’élèvent-elles dans vos cœurs?
  '39':
  - type: text
    content: ' '
  - type: text
    content: 'Voyez mes mains et mes pieds, c’est bien moi; touchez-moi et voyez: un esprit n’a ni chair ni os, comme vous voyez que j’ai.'
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'Comme elles ne savaient que penser de cela, voici, deux hommes leur apparurent, en habits resplendissants. '
  '40':
  - type: text
    content: 'Et en disant cela, il leur montra ses mains et ses pieds. '
  '41':
  - type: text
    content: 'Comme, dans leur joie, ils ne croyaient point encore, et qu’ils étaient dans l’étonnement, il leur dit: '
  - type: note
    content: Jn 21:10.
  - type: text
    content: Avez-vous ici quelque chose à manger?
  - type: text
    content: ' '
  '42':
  - type: text
    content: 'Ils lui présentèrent du poisson rôti et un rayon de miel. '
  '43':
  - type: text
    content: 'Il en prit, et il mangea devant eux. '
  '44':
  - type: text
    content: 'Puis il leur dit: '
  - type: note
    content: Mt 16:21; 17:22; 20:18. Mc 8:31; 9:31; 10:33. Lu 9:22; 18:31; 24:6.
  - type: text
    content: C’est là ce que je vous disais lorsque j’étais encore avec vous, qu’il fallait que s’accomplît tout ce qui est écrit de moi dans la loi de Moïse, dans les prophètes, et dans les psaumes.
  - type: text
    content: ' '
  '45':
  - type: text
    content: 'Alors il leur ouvrit l’esprit, afin qu’ils comprissent les Écritures. '
  '46':
  - type: text
    content: 'Et il leur dit: '
  - type: note
    content: Ps 22:7. Ac 17:3.
  - type: text
    content: Ainsi il est écrit que le Christ souffrirait, et qu’il ressusciterait des morts le troisième jour,
  '47':
  - type: text
    content: ' '
  - type: text
    content: et que la repentance et le
  - type: text
    content: ' '
  - type: note
    content: Ac 13:38. 1 Jn 2:12.
  - type: text
    content: pardon des péchés seraient prêchés en son nom à toutes les nations,
  - type: text
    content: ' '
  - type: note
    content: Ac 2:4.
  - type: text
    content: à commencer par Jérusalem.
  - type: text
    content: ' '
  '48':
  - type: text
    content: Vous êtes témoins de ces choses.
  - type: text
    content: ' '
  '49':
  - type: note
    content: Jn 14:26; 15:26; 16:7. Ac 1:4.
  - type: text
    content: Et voici, j’enverrai sur vous ce que mon Père a promis;
  - type: text
    content: ' '
  - type: note
    content: Ac 1:4.
  - type: text
    content: mais vous, restez dans la ville jusqu’à ce que vous soyez revêtus de la puissance d’en haut.
  - type: heading
    content: L’ascension
  - type: heading
    content: 'V. 50-53: cf. (Mc 16:19, 20. Ac 1:4-12.) (Ép 1:19-23. Hé 9:11, 12, 24; 10:12, 13.)'
  '5':
  - type: text
    content: 'Saisies de frayeur, elles baissèrent le visage contre terre; mais ils leur dirent: Pourquoi cherchez-vous parmi les morts celui qui est vivant? '
  '50':
  - type: text
    content: ' '
  - type: note
    content: Ac 1:12.
  - type: text
    content: 'Il les conduisit jusque vers Béthanie, et, ayant levé les mains, il les bénit. '
  '51':
  - type: note
    content: Mc 16:19. Ac 1:9.
  - type: text
    content: 'Pendant qu’il les bénissait, il se sépara d’eux, et fut enlevé au ciel. '
  '52':
  - type: text
    content: 'Pour eux, après l’avoir adoré, ils retournèrent à Jérusalem avec une grande joie; '
  '53':
  - type: text
    content: et ils étaient continuellement dans le temple, louant et bénissant Dieu.
  '6':
  - type: text
    content: 'Il n’est point ici, mais il est ressuscité. '
  - type: note
    content: Mt 16:21; 17:22; 20:18. Mc 8:31; 10:33. Lu 9:22; 18:31.
  - type: text
    content: 'Souvenez-vous de quelle manière il vous a parlé, lorsqu’il était encore en Galilée, '
  '7':
  - type: text
    content: 'et qu’il disait: '
  - type: text
    content: Il faut que le Fils de l’homme soit livré entre les mains des pécheurs, qu’il soit crucifié, et qu’il ressuscite le troisième jour.
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'Et elles '
  - type: note
    content: Jn 2:22.
  - type: text
    content: se ressouvinrent des paroles de Jésus.
  - type: heading
    content: 'V. 9-12: cf. (Mt 28:8-10. Mc 16:8-11. Jn 20:3-11.)'
  '9':
  - type: text
    content: ' '
  - type: note
    content: Mt 28:8. Mc 16:10.
  - type: text
    content: 'A leur retour du sépulcre, elles annoncèrent toutes ces choses aux onze, et à tous les autres. '
