document_id: LUK.24
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Résurrection de Jésus-Christ
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-8: cf. (Mt 28:1-7. Mc 16:1-7. Jn 20:1, 2.) (Ps 16:8-10. Ac 2:23-32.) (1 Co 15:1-28. Ac 17:31.) Ro 4:24, 25. 1 Pi 1:3, 4.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 28:1
      metadata:
        usfm: MAT.28.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 16:1
      metadata:
        usfm: MRK.16.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 20:1
      metadata:
        usfm: JHN.20.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Le premier jour de la semaine, elles se rendirent au sépulcre de grand matin, portant les aromates qu’elles avaient préparés. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Elles trouvèrent que la pierre avait été roulée de devant le sépulcre; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'et, étant entrées, elles ne trouvèrent pas le corps du Seigneur Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Comme elles ne savaient que penser de cela, voici, deux hommes leur apparurent, en habits resplendissants. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Saisies de frayeur, elles baissèrent le visage contre terre; mais ils leur dirent: Pourquoi cherchez-vous parmi les morts celui qui est vivant? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il n’est point ici, mais il est ressuscité. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 16:21
      metadata:
        usfm: MAT.16.21
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 17:22
      metadata:
        usfm: MAT.17.22
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 20:18
      metadata:
        usfm: MAT.20.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 8:31
      metadata:
        usfm: MRK.8.31
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 10:33
      metadata:
        usfm: MRK.10.33
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 9:22
      metadata:
        usfm: LUK.9.22
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 18:31
      metadata:
        usfm: LUK.18.31
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Souvenez-vous de quelle manière il vous a parlé, lorsqu’il était encore en Galilée, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'et qu’il disait: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Il faut que le Fils de l’homme soit livré entre les mains des pécheurs, qu’il soit crucifié, et qu’il ressuscite le troisième jour.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Et elles '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 2:22
      metadata:
        usfm: JHN.2.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: se ressouvinrent des paroles de Jésus.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 9-12: cf. (Mt 28:8-10. Mc 16:8-11. Jn 20:3-11.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 28:8
      metadata:
        usfm: MAT.28.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 16:10
      metadata:
        usfm: MRK.16.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'A leur retour du sépulcre, elles annoncèrent toutes ces choses aux onze, et à tous les autres. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Celles qui dirent ces choses aux apôtres étaient Marie de Magdala, Jeanne, Marie, mère de Jacques, et les autres qui étaient avec elles. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ils tinrent ces discours pour des rêveries, et ils ne crurent pas ces femmes. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 20:3
      metadata:
        usfm: JHN.20.3
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '6'
      metadata:
        usfm: JHN.20.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Mais Pierre se leva, et courut au sépulcre. S’étant baissé, il ne vit que les linges qui étaient à terre; puis il s’en alla chez lui, dans l’étonnement de ce qui était arrivé.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sur le chemin d’Emmaüs
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 13-35: cf. Mc 16:12, 13. Mal 3:16.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 16:12
      metadata:
        usfm: MRK.16.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Et voici, ce même jour, deux disciples allaient à un village nommé Émmaüs, éloigné de Jérusalem de soixante stades; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'et ils s’entretenaient de tout ce qui s’était passé. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Pendant qu’ils parlaient et discutaient, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 18:20
      metadata:
        usfm: MAT.18.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 24:36
      metadata:
        usfm: LUK.24.36
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Jésus s’approcha, et fit route avec eux. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Mais leurs yeux étaient empêchés de le reconnaître. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il leur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: De quoi vous entretenez-vous en marchant, pour que vous soyez tout tristes?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'L’un d’eux, nommé Cléopas, lui répondit: Es-tu le seul qui, séjournant à Jérusalem ne sache pas ce qui y est arrivé ces jours-ci?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Quoi?
  - type: text
    text: ' leur dit-il. Et ils lui répondirent: Ce qui est arrivé au sujet de Jésus de Nazareth, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 7:16
      metadata:
        usfm: LUK.7.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 4:19
      metadata:
        usfm: JHN.4.19
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 6:14
      metadata:
        usfm: JHN.6.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qui était un prophète puissant en œuvres et en paroles devant Dieu et devant tout le peuple, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'et comment les principaux sacrificateurs et nos magistrats l’ont livré pour le faire condamner à mort et l’ont crucifié. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Nous espérions que ce serait lui '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 1:68
      metadata:
        usfm: LUK.1.68
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2:38
      metadata:
        usfm: LUK.2.38
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 1:6
      metadata:
        usfm: ACT.1.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qui délivrerait Israël; mais avec tout cela, voici le troisième jour que ces choses se sont passées. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Il est vrai que '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 28:8
      metadata:
        usfm: MAT.28.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 16:10
      metadata:
        usfm: MRK.16.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 20:18
      metadata:
        usfm: JHN.20.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'quelques femmes d’entre nous nous ont fort étonnés; s’étant rendues de grand matin au sépulcre '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'et n’ayant pas trouvé son corps, elles sont venues dire que des anges leur sont apparus et ont annoncé qu’il est vivant. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Quelques-uns de ceux qui étaient avec nous sont allés au sépulcre, et ils ont trouvé les choses comme les femmes l’avaient dit; mais lui, ils ne l’ont point vu. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Alors Jésus leur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: O hommes sans intelligence, et dont le cœur est lent à croire tout ce qu’ont dit les prophètes!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 50:6
      metadata:
        usfm: ISA.50.6
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 53:5
      metadata:
        usfm: ISA.53.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 2:7
      metadata:
        usfm: PHP.2.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 12:2
      metadata:
        usfm: HEB.12.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 1:11
      metadata:
        usfm: 1PE.1.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ne fallait-il pas que le Christ souffrît ces choses, et qu’il entrât dans sa gloire?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 3:15
      metadata:
        usfm: GEN.3.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 22:18
      metadata:
        usfm: GEN.22.18
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 26:4
      metadata:
        usfm: GEN.26.4
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 49:10
      metadata:
        usfm: GEN.49.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 18:15
      metadata:
        usfm: DEU.18.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Et, commençant par Moïse et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 132:11
      metadata:
        usfm: PSA.132.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 7:14
      metadata:
        usfm: ISA.7.14
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 9:5
      metadata:
        usfm: ISA.9.5
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 40:10
      metadata:
        usfm: ISA.40.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 23:5
      metadata:
        usfm: JER.23.5
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 33:14
      metadata:
        usfm: JER.33.14
    - type: text
      text: '. Éz 34:33; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 37:25
      metadata:
        usfm: EZK.37.25
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Da 9:24
      metadata:
        usfm: DAN.9.24
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mi 7:20
      metadata:
        usfm: MIC.7.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'par tous les prophètes, il leur expliqua dans toutes les Écritures ce qui le concernait. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Lorsqu’ils furent près du village où ils allaient, il parut vouloir aller plus loin. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 19:3
      metadata:
        usfm: GEN.19.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Mais ils le pressèrent, en disant: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 16:15
      metadata:
        usfm: ACT.16.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 13:2
      metadata:
        usfm: HEB.13.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Reste avec nous, car le soir approche, le jour est sur son déclin. Et il entra, pour rester avec eux. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Pendant qu’il était à table avec eux, il prit le pain; et, après avoir rendu grâces, il le rompit, et le leur donna. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Alors leurs yeux s’ouvrirent, et ils le reconnurent; mais il disparut de devant eux. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Et ils se dirent l’un à l’autre: Notre cœur ne brûlait-il pas au-dedans de nous, lorsqu’il nous parlait en chemin et nous expliquait les Écritures? '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
