document_id: LUK.24,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Résurrection de Jésus-Christ
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-8: cf. (Mt 28:1-7. Mc 16:1-7. Jn 20:1, 2.) (Ps 16:8-10. Ac 2:23-32.) (1 Co 15:1-28. Ac 17:31.) Ro 4:24, 25. 1 Pi 1:3, 4.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 28:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 16:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 20:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Le premier jour de la semaine, elles se rendirent au sépulcre de grand matin, portant les aromates qu’elles avaient préparés. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Celles qui dirent ces choses aux apôtres étaient Marie de Magdala, Jeanne, Marie, mère de Jacques, et les autres qui étaient avec elles. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils tinrent ces discours pour des rêveries, et ils ne crurent pas ces femmes. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 20:3
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Mais Pierre se leva, et courut au sépulcre. S’étant baissé, il ne vit que les linges qui étaient à terre; puis il s’en alla chez lui, dans l’étonnement de ce qui était arrivé.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sur le chemin d’Emmaüs
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 13-35: cf. Mc 16:12, 13. Mal 3:16.'
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 16:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Et voici, ce même jour, deux disciples allaient à un village nommé Émmaüs, éloigné de Jérusalem de soixante stades; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et ils s’entretenaient de tout ce qui s’était passé. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pendant qu’ils parlaient et discutaient, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 18:20
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 24:36
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Jésus s’approcha, et fit route avec eux. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais leurs yeux étaient empêchés de le reconnaître. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il leur dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: De quoi vous entretenez-vous en marchant, pour que vous soyez tout tristes?
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’un d’eux, nommé Cléopas, lui répondit: Es-tu le seul qui, séjournant à Jérusalem ne sache pas ce qui y est arrivé ces jours-ci?'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Quoi?
    - type: text
      text: ' leur dit-il. Et ils lui répondirent: Ce qui est arrivé au sujet de Jésus de Nazareth, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 7:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 4:19
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'qui était un prophète puissant en œuvres et en paroles devant Dieu et devant tout le peuple, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elles trouvèrent que la pierre avait été roulée de devant le sépulcre; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et comment les principaux sacrificateurs et nos magistrats l’ont livré pour le faire condamner à mort et l’ont crucifié. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous espérions que ce serait lui '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 1:68
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2:38
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 1:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'qui délivrerait Israël; mais avec tout cela, voici le troisième jour que ces choses se sont passées. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il est vrai que '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 28:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 16:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 20:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'quelques femmes d’entre nous nous ont fort étonnés; s’étant rendues de grand matin au sépulcre '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et n’ayant pas trouvé son corps, elles sont venues dire que des anges leur sont apparus et ont annoncé qu’il est vivant. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quelques-uns de ceux qui étaient avec nous sont allés au sépulcre, et ils ont trouvé les choses comme les femmes l’avaient dit; mais lui, ils ne l’ont point vu. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Jésus leur dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: O hommes sans intelligence, et dont le cœur est lent à croire tout ce qu’ont dit les prophètes!
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 50:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 53:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ph 2:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 12:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 1:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ne fallait-il pas que le Christ souffrît ces choses, et qu’il entrât dans sa gloire?
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 3:15
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 22:18
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 26:4
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 49:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 18:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Et, commençant par Moïse et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 132:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 7:14
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:5
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 40:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 23:5
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 33:14
      - type: text
        text: '. Éz 34:33; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 37:25
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Da 9:24
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mi 7:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'par tous les prophètes, il leur expliqua dans toutes les Écritures ce qui le concernait. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsqu’ils furent près du village où ils allaient, il parut vouloir aller plus loin. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 19:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Mais ils le pressèrent, en disant: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 16:15
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 13:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Reste avec nous, car le soir approche, le jour est sur son déclin. Et il entra, pour rester avec eux. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et, étant entrées, elles ne trouvèrent pas le corps du Seigneur Jésus. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pendant qu’il était à table avec eux, il prit le pain; et, après avoir rendu grâces, il le rompit, et le leur donna. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors leurs yeux s’ouvrirent, et ils le reconnurent; mais il disparut de devant eux. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et ils se dirent l’un à l’autre: Notre cœur ne brûlait-il pas au-dedans de nous, lorsqu’il nous parlait en chemin et nous expliquait les Écritures? '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Se levant à l’heure même, ils retournèrent à Jérusalem, et ils trouvèrent les onze, et ceux qui étaient avec eux, assemblés '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et disant: Le Seigneur est réellement ressuscité, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 15:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'et il est apparu à Simon. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et ils racontèrent ce qui leur était arrivé en chemin, et comment ils l’avaient reconnu au moment où il rompit le pain.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 36-49: cf. (Mc 16:14-18. Jn 20:19-23, 24-29.) Mt 28:16-20. Ac 1:2, 3. 1 Co 15:5.'
    marker-yv: yv-h
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 16:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 20:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 15:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Tandis qu’ils parlaient de la sorte, lui-même se présenta au milieu d’eux, et leur dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: La paix soit avec vous!
    - type: text
      text: ' '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saisis de frayeur et d’épouvante, ils croyaient voir un esprit. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais il leur dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Pourquoi êtes-vous troublés, et pourquoi pareilles pensées s’élèvent-elles dans vos cœurs?
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Voyez mes mains et mes pieds, c’est bien moi; touchez-moi et voyez: un esprit n’a ni chair ni os, comme vous voyez que j’ai.'
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Comme elles ne savaient que penser de cela, voici, deux hommes leur apparurent, en habits resplendissants. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et en disant cela, il leur montra ses mains et ses pieds. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Comme, dans leur joie, ils ne croyaient point encore, et qu’ils étaient dans l’étonnement, il leur dit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 21:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Avez-vous ici quelque chose à manger?
    - type: text
      text: ' '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils lui présentèrent du poisson rôti et un rayon de miel. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il en prit, et il mangea devant eux. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis il leur dit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 16:21
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 17:22
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 20:18
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 8:31
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:31
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10:33
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 9:22
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18:31
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 24:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: C’est là ce que je vous disais lorsque j’étais encore avec vous, qu’il fallait que s’accomplît tout ce qui est écrit de moi dans la loi de Moïse, dans les prophètes, et dans les psaumes.
    - type: text
      text: ' '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors il leur ouvrit l’esprit, afin qu’ils comprissent les Écritures. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et il leur dit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 22:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 17:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ainsi il est écrit que le Christ souffrirait, et qu’il ressusciterait des morts le troisième jour,
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: et que la repentance et le
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 13:38
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Jn 2:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: pardon des péchés seraient prêchés en son nom à toutes les nations,
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 2:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: à commencer par Jérusalem.
    - type: text
      text: ' '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Vous êtes témoins de ces choses.
    - type: text
      text: ' '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 14:26
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:26
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 1:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Et voici, j’enverrai sur vous ce que mon Père a promis;
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 1:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
