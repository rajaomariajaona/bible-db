document_id: MAT.23,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Les scribes et les pharisiens censurés par Jésus
  - type: heading
    content: 'V. 1-12: cf. (Mc 12:38, 39. Lu 20:45-47; 11:43, 46.) (Mt 6:1-5, 16. Lu 14:7-11.)'
  - type: text
    content: 'Alors Jésus, parlant à la foule et à ses disciples, dit:'
  '10':
  - type: text
    content: Ne vous faites pas appeler directeurs; car un seul est votre Directeur, le Christ.
  - type: text
    content: ' '
  '11':
  - type: note
    content: Mt 20:26.
  - type: text
    content: Le plus grand parmi vous sera votre serviteur.
  - type: text
    content: ' '
  '12':
  - type: note
    content: Job 22:29. Pr 29:23. Lu 14:11; 18:14. Ja 4:6, 10. 1 Pi 5:5.
  - type: text
    content: Quiconque s’élèvera sera abaissé, et quiconque s’abaissera sera élevé.
  - type: heading
    content: 'V. 13-36: cf. (Mc 12:40. Lu 11:38-52.)'
  '13':
  - type: text
    content: ' '
  - type: note
    content: Lu 11:52.
  - type: text
    content: Malheur à vous, scribes et pharisiens hypocrites! Parce que vous fermez aux hommes le royaume des cieux; vous n’y entrez pas vous-mêmes, et vous n’y laissez pas entrer ceux qui veulent entrer.
  - type: text
    content: ' '
  '14':
  - type: note
    content: Mc 12:40. Lu 20:47. 2 Ti 3:6. Tit 1:11.
  - type: text
    content: Malheur à vous, scribes et pharisiens hypocrites! Parce que vous dévorez les maisons des veuves, et que vous faites pour l’apparence de longues prières; à cause de cela, vous serez jugés plus sévèrement.
  - type: text
    content: ' '
  '15':
  - type: text
    content: Malheur à vous, scribes et pharisiens hypocrites! Parce que vous courez la mer et la terre pour faire un prosélyte; et, quand il l’est devenu, vous en faites un fils de la géhenne deux fois plus que vous.
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'Malheur à vous, conducteurs aveugles! Qui dites: Si quelqu’un jure par le temple, ce n’est rien; mais, si quelqu’un jure par l’or du temple, il est engagé.'
  - type: text
    content: ' '
  '17':
  - type: text
    content: Insensés et aveugles! Lequel est le plus grand, l’or, ou le temple qui sanctifie l’or?
  - type: text
    content: ' '
  '18':
  - type: text
    content: Si quelqu’un, dites-vous encore, jure par l’autel, ce n’est rien; mais, si quelqu’un jure par l’offrande qui est sur l’autel, il est engagé.
  - type: text
    content: ' '
  '19':
  - type: text
    content: Aveugles! Lequel est le plus grand, l’offrande, ou
  - type: text
    content: ' '
  - type: note
    content: Ex 29:37.
  - type: text
    content: l’autel qui sanctifie l’offrande?
  - type: text
    content: ' '
  '2':
  - type: text
    content: ' '
  - type: note
    content: Né 8:4.
  - type: text
    content: Les scribes et les pharisiens sont assis dans la chaire de Moïse.
  - type: text
    content: ' '
  '20':
  - type: text
    content: Celui qui jure par l’autel jure par l’autel et par tout ce qui est dessus;
  - type: text
    content: ' '
  '21':
  - type: note
    content: 1 R 8:13. 2 Ch 6:1, 2.
  - type: text
    content: celui qui jure par le temple jure par le temple et par celui qui l’habite;
  - type: text
    content: ' '
  '22':
  - type: note
    content: 2 Ch 8:33. És 66:1. Mt 5:34. Ac 7:49.
  - type: text
    content: et celui qui jure par le ciel jure par le trône de Dieu et par celui qui y est assis.
  - type: text
    content: ' '
  '23':
  - type: note
    content: Lu 11:42.
  - type: text
    content: Malheur à vous, scribes et pharisiens hypocrites! Parce que vous payez la dîme de la menthe, de l’aneth et du cumin,
  - type: text
    content: ' '
  - type: note
    content: 1 S 15:22. Os 6:6. Mi 6:8.
  - type: text
    content: 'et que vous laissez ce qui est plus important dans la loi, la justice, la miséricorde et la fidélité:'
  - type: text
    content: ' '
  - type: note
    content: Mt 9:13; 12:7.
  - type: text
    content: c’est là ce qu’il fallait pratiquer, sans négliger les autres choses.
  - type: text
    content: ' '
  '24':
  - type: text
    content: Conducteurs aveugles! Qui coulez le moucheron, et qui avalez le chameau.
  - type: text
    content: ' '
  '25':
  - type: note
    content: Lu 11:39.
  - type: text
    content: Malheur à vous, scribes et pharisiens hypocrites! Parce que vous nettoyez le dehors de la coupe et du plat, et qu’au dedans ils sont pleins de rapine et d’intempérance.
  - type: text
    content: ' '
  '26':
  - type: text
    content: Pharisien aveugle! Nettoie premièrement
  - type: text
    content: ' '
  - type: note
    content: Tit 1:15.
  - type: text
    content: l’intérieur de la coupe et du plat, afin que l’extérieur aussi devienne net.
  - type: text
    content: ' '
  '27':
  - type: text
    content: Malheur à vous, scribes et pharisiens hypocrites! Parce que vous ressemblez à
  - type: text
    content: ' '
  - type: note
    content: Ac 23:3.
  - type: text
    content: des sépulcres blanchis, qui paraissent beaux au-dehors, et qui, au-dedans, sont pleins d’ossements de morts et de toute espèce d’impuretés.
  - type: text
    content: ' '
  '28':
  - type: text
    content: Vous de même, au-dehors, vous paraissez justes aux hommes, mais, au-dedans, vous êtes pleins d’hypocrisie et d’iniquité.
  - type: text
    content: ' '
  '29':
  - type: note
    content: Lu 11:47.
  - type: text
    content: Malheur à vous, scribes et pharisiens hypocrites! Parce que vous bâtissez les tombeaux des prophètes et ornez les sépulcres des justes,
  - type: text
    content: ' '
  '3':
  - type: note
    content: De 17:19. Mal 2:6.
  - type: text
    content: Faites donc et observez tout ce qu’ils vous disent; mais n’agissez pas selon leurs œuvres.
  - type: text
    content: ' '
  - type: note
    content: Ro 2:19.
  - type: text
    content: Car ils disent, et ne font pas.
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'et que vous dites: Si nous avions vécu du temps de nos pères, nous ne nous serions pas joints à eux pour répandre le sang des prophètes.'
  - type: text
    content: ' '
  '31':
  - type: text
    content: Vous témoignez ainsi contre vous-mêmes
  - type: text
    content: ' '
  - type: note
    content: Ac 7:51. 1 Th 2:15.
  - type: text
    content: que vous êtes les fils de ceux qui ont tué les prophètes.
  - type: text
    content: ' '
  '32':
  - type: text
    content: Comblez donc la mesure de vos pères.
  - type: text
    content: ' '
  '33':
  - type: note
    content: Mt 3:7.
  - type: text
    content: Serpents, race de vipères! Comment échapperez-vous au châtiment de la géhenne?
  - type: text
    content: ' '
  '34':
  - type: note
    content: Lu 11:49.
  - type: text
    content: C’est pourquoi, voici,
  - type: text
    content: ' '
  - type: note
    content: Mt 10:16. Lu 10:3. Jn 16:2. Ac 7:52.
  - type: text
    content: je vous envoie des prophètes, des sages et des scribes. Vous tuerez et crucifierez les uns,
  - type: text
    content: ' '
  - type: note
    content: Mt 10:17. Ac 5:40.
  - type: text
    content: vous battrez de verges les autres dans vos synagogues, et vous les persécuterez de ville en ville,
  - type: text
    content: ' '
  '35':
  - type: text
    content: afin que retombe sur vous tout le sang innocent répandu sur la terre,
  - type: text
    content: ' '
  - type: note
    content: Ge 4:8. Hé 11:4.
  - type: text
    content: depuis le sang d’Abel le juste jusqu’au
  - type: text
    content: ' '
  - type: note
    content: 2 Ch 24:21.
  - type: text
    content: sang de Zacharie, fils de Barachie, que vous avez tué entre le temple et l’autel.
  - type: text
    content: ' '
  '36':
  - type: text
    content: Je vous le dis en vérité, tout cela retombera sur cette génération.
  - type: heading
    content: Crimes et châtiment de Jérusalem
  - type: heading
    content: 'V. 37-39: cf. Lu 13:33-35; 19:41-44. Éz 24:6-14.'
  '37':
  - type: text
    content: ' '
  - type: note
    content: Lu 13:34.
  - type: text
    content: Jérusalem, Jérusalem, qui tues les prophètes et qui
  - type: text
    content: ' '
  - type: note
    content: Mt 21:35, 36.
  - type: text
    content: lapides ceux qui te sont envoyés,
  - type: text
    content: ' '
  - type: note
    content: Ps 17:8; 91:4.
  - type: text
    content: combien de fois ai-je voulu rassembler tes enfants, comme une poule rassemble ses poussins sous ses ailes, et vous ne l’avez pas voulu!
  - type: text
    content: ' '
  '38':
  - type: note
    content: Ps 69:26. És 1:7. Jé 7:34. Mi 3:12. Ac 1:20.
  - type: text
    content: Voici, votre maison vous sera laissée déserte;
  - type: text
    content: ' '
  '39':
  - type: text
    content: 'car, je vous le dis, vous ne me verrez plus désormais, jusqu’à ce que vous disiez:'
  - type: text
    content: ' '
  - type: note
    content: Ps 118:26.
  - type: text
    content: Béni soit celui qui vient au nom du Seigneur!
  '4':
  - type: note
    content: És 10:1. Lu 11:46. Ac 15:10.
  - type: text
    content: Ils lient des fardeaux pesants, et les mettent sur les épaules des hommes, mais ils ne veulent pas les remuer du doigt.
  - type: text
    content: ' '
  '5':
  - type: text
    content: Ils font toutes leurs actions
  - type: text
    content: ' '
  - type: note
    content: Mt 6:5.
  - type: text
    content: pour être vus des hommes. Ainsi, ils portent de
  - type: text
    content: ' '
  - type: note
    content: De 6:8; 22:12.
  - type: text
    content: larges phylactères, et ils ont de longues franges à leurs vêtements;
  - type: text
    content: ' '
  '6':
  - type: note
    content: Mc 12:38, 39. Lu 11:43; 20:46.
  - type: text
    content: ils aiment la première place dans les festins, et les premiers sièges dans les synagogues;
  - type: text
    content: ' '
  '7':
  - type: text
    content: ils aiment à être salués dans les places publiques, et à être
  - type: text
    content: ' '
  - type: note
    content: Ja 3:1.
  - type: text
    content: appelés par les hommes Rabbi, Rabbi.
  - type: text
    content: ' '
  '8':
  - type: text
    content: Mais vous, ne vous faites pas appeler Rabbi; car un seul est votre Maître, et vous êtes tous frères.
  - type: text
    content: ' '
  '9':
  - type: text
    content: Et n’appelez personne sur la terre votre père;
  - type: text
    content: ' '
  - type: note
    content: Mal 1:6.
  - type: text
    content: car un seul est votre Père, celui qui est dans les cieux.
  - type: text
    content: ' '
