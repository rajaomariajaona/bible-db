document_id: LUK.4,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Tentation de Jésus-Christ
  - type: heading
    content: 'V. 1-13: cf. (Mt 4:1-11. Mc 1:12, 13.) Ge 3:1-6.'
  - type: text
    content: ' '
  - type: note
    content: Mt 4:1. Mc 1:12.
  - type: text
    content: 'Jésus, rempli du Saint-Esprit, revint du Jourdain, et il fut conduit par l’Esprit dans le désert, '
  '10':
  - type: note
    content: Ps 91:11.
  - type: text
    content: Il donnera des ordres à ses anges à ton sujet,
  - type: text
    content: Afin qu’ils te gardent;
  '11':
  - type: text
    content: 'et:'
  - type: text
    content: Ils te porteront sur les mains,
  - type: text
    content: De peur que ton pied ne heurte contre une pierre.
  '12':
  - type: text
    content: 'Jésus lui répondit: '
  - type: text
    content: 'Il est dit:'
  - type: note
    content: De 6:16.
  - type: text
    content: Tu ne tenteras point le Seigneur, ton Dieu.
  '13':
  - type: text
    content: Après l’avoir tenté de toutes ces manières, le diable s’éloigna de lui jusqu’à un moment favorable.
  - type: heading
    content: Ministère de Jésus en Galilée
  - type: heading
    content: 'V. 14-15: cf. (Mt 4:12, 17. Mc 1:14, 15.) Jn 4.'
  '14':
  - type: text
    content: ' '
  - type: note
    content: Mt 4:12. Mc 1:14. Jn 4:43. Ac 10:37.
  - type: text
    content: 'Jésus, revêtu de la puissance de l’Esprit, retourna en Galilée, et sa renommée se répandit dans tout le pays d’alentour. '
  '15':
  - type: text
    content: Il enseignait dans les synagogues, et il était glorifié par tous.
  - type: heading
    content: Prédication à Nazareth. Hostilité des habitants
  - type: heading
    content: 'V. 16-30: cf. És 61:1-3. Mc 6:1-6. Jn 1:11. Lu 19:42.'
  '16':
  - type: text
    content: ' '
  - type: note
    content: Mt 13:54. Mc 6:1. Jn 4:43.
  - type: text
    content: 'Il se rendit à Nazareth, où il avait été élevé, et, selon sa coutume, il entra dans la synagogue le jour du sabbat. '
  - type: note
    content: Né 8:5, 6.
  - type: text
    content: 'Il se leva pour faire la lecture, '
  '17':
  - type: text
    content: 'et on lui remit le livre du prophète Ésaïe. L’ayant déroulé, il trouva l’endroit où il était écrit:'
  '18':
  - type: text
    content: ' '
  - type: note
    content: És 61:6.
  - type: text
    content: L’Esprit du Seigneur est sur moi,
  - type: text
    content: Parce qu’il m’a oint
  - type: text
    content: ' '
  - type: note
    content: Mt 11:5.
  - type: text
    content: pour annoncer une bonne nouvelle aux pauvres;
  - type: text
    content: Il m’a envoyé pour guérir ceux qui ont le cœur brisé,
  - type: text
    content: Pour proclamer aux captifs la délivrance,
  - type: text
    content: Et aux aveugles le recouvrement de la vue,
  - type: text
    content: Pour renvoyer libres les opprimés,
  '19':
  - type: text
    content: ' '
  - type: note
    content: És 42:7; 61:1, 2.
  - type: text
    content: Pour publier une année de grâce du Seigneur.
  '2':
  - type: text
    content: 'où il fut tenté par le diable pendant quarante jours. '
  - type: note
    content: Ex 34:28. 1 R 19:8.
  - type: text
    content: 'Il ne mangea rien durant ces jours-là, et, après qu’ils furent écoulés, il eut faim. '
  '20':
  - type: text
    content: 'Ensuite, il roula le livre, le remit au serviteur, et s’assit. Tous ceux qui se trouvaient dans la synagogue avaient les regards fixés sur lui. '
  '21':
  - type: text
    content: 'Alors il commença à leur dire: '
  - type: text
    content: Aujourd’hui cette parole de l’Écriture, que vous venez d’entendre, est accomplie.
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'Et tous lui rendaient témoignage; '
  - type: note
    content: És 50:4. Mt 13:54. Mc 6:2. Lu 2:47.
  - type: text
    content: 'ils étaient étonnés des paroles de grâce qui sortaient de sa bouche, et ils disaient: '
  - type: note
    content: Jn 6:42.
  - type: text
    content: 'N’est-ce pas le fils de Joseph? '
  '23':
  - type: text
    content: 'Jésus leur dit: '
  - type: text
    content: 'Sans doute vous m’appliquerez ce proverbe: Médecin, guéris-toi toi-même; et vous me direz: Fais ici, dans ta patrie, tout ce que nous avons appris'
  - type: text
    content: ' '
  - type: note
    content: Mt 4:13.
  - type: text
    content: que tu as fait à Capernaüm.
  '24':
  - type: text
    content: ' '
  - type: text
    content: Mais,
  - type: text
    content: ' ajouta-t-il, '
  - type: text
    content: je vous le dis en vérité,
  - type: text
    content: ' '
  - type: note
    content: Mt 13:57. Mc 6:4. Jn 4:44.
  - type: text
    content: aucun prophète n’est bien reçu dans sa patrie.
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'Je vous le dis en vérité: il y avait'
  - type: text
    content: ' '
  - type: note
    content: 1 R 17:7. Ja 5:17.
  - type: text
    content: plusieurs veuves en Israël du temps d’Élie, lorsque le ciel fut fermé trois ans et six mois et qu’il y eut une grande famine sur toute la terre;
  - type: text
    content: ' '
  '26':
  - type: text
    content: et cependant Élie ne fut envoyé vers aucune d’elles, si ce n’est vers une femme veuve, à Sarepta, dans le pays de Sidon.
  - type: text
    content: ' '
  '27':
  - type: text
    content: Il y avait aussi
  - type: text
    content: ' '
  - type: note
    content: 2 R 5:14.
  - type: text
    content: plusieurs lépreux en Israël du temps d’Élisée, le prophète; et cependant aucun d’eux ne fut purifié, si ce n’est Naaman le Syrien.
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'Ils furent tous remplis de colère dans la synagogue, lorsqu’ils entendirent ces choses. '
  '29':
  - type: text
    content: 'Et s’étant levés, ils le chassèrent de la ville, et le menèrent jusqu’au sommet de la montagne sur laquelle leur ville était bâtie, afin de le précipiter en bas. '
  '3':
  - type: text
    content: 'Le diable lui dit: Si tu es Fils de Dieu, ordonne à cette pierre qu’elle devienne du pain. '
  '30':
  - type: text
    content: Mais Jésus, passant au milieu d’eux, s’en alla.
  - type: heading
    content: Jésus à Capernaüm. Enseignement dans la synagogue. Guérison d’un démoniaque, de la belle-mère de Pierre et de plusieurs malades. Jésus en divers lieux de la Galilée
  - type: heading
    content: 'V. 31-37: cf. Mt 4:13-16. Mc 1:21-28.'
  '31':
  - type: text
    content: ' '
  - type: note
    content: Mt 4:13. Mc 1:21.
  - type: text
    content: 'Il descendit à Capernaüm, ville de la Galilée; et il enseignait, le jour du sabbat. '
  '32':
  - type: note
    content: Mt 7:29. Mc 1:22.
  - type: text
    content: 'On était frappé de sa doctrine; car il parlait avec autorité. '
  '33':
  - type: note
    content: Mc 1:23.
  - type: text
    content: 'Il se trouva dans la synagogue un homme qui avait un esprit de démon impur, et qui s’écria d’une voix forte: '
  '34':
  - type: text
    content: 'Ah! Qu’y a-t-il entre nous et toi, Jésus de Nazareth? Tu es venu pour nous perdre. Je sais qui tu es: le Saint de Dieu. '
  '35':
  - type: text
    content: 'Jésus le menaça, disant: '
  - type: text
    content: Tais-toi, et sors de cet homme.
  - type: text
    content: ' Et le démon le jeta au milieu de l’assemblée, et sortit de lui, sans lui faire aucun mal. '
  '36':
  - type: text
    content: 'Tous furent saisis de stupeur, et ils se disaient les uns aux autres: Quelle est cette parole? Il commande avec autorité et puissance aux esprits impurs, et ils sortent! '
  '37':
  - type: text
    content: Et sa renommée se répandit dans tous les lieux d’alentour.
  - type: heading
    content: 'V. 38-39: cf. (Mt 8:14, 15. Mc 1:29-31.)'
  '38':
  - type: text
    content: ' '
  - type: note
    content: Mt 8:14. Mc 1:29.
  - type: text
    content: 'En sortant de la synagogue, il se rendit à la maison de Simon. La belle-mère de Simon avait une violente fièvre, et ils le prièrent en sa faveur. '
  '39':
  - type: text
    content: S’étant penché sur elle, il menaça la fièvre, et la fièvre la quitta. A l’instant elle se leva, et les servit.
  - type: heading
    content: 'V. 40-44: cf. (Mt 8:16, 17. Mc 1:32-39.)'
  '4':
  - type: text
    content: 'Jésus lui répondit: '
  - type: note
    content: De 8:3. Mt 4:4.
  - type: text
    content: 'Il est écrit:'
  - type: text
    content: L’Homme ne vivra pas de pain seulement.
  '40':
  - type: text
    content: ' '
  - type: note
    content: Mt 8:16. Mc 1:32.
  - type: text
    content: 'Après le coucher du soleil, tous ceux qui avaient des malades atteints de diverses maladies les lui amenèrent. '
  - type: note
    content: Mc 7:32; 8:23, 25.
  - type: text
    content: 'Il imposa les mains à chacun d’eux, et il les guérit. '
  '41':
  - type: note
    content: Mc 1:34; 3:11.
  - type: text
    content: 'Des démons aussi sortirent de beaucoup de personnes, en criant et en disant: Tu es le Fils de Dieu. Mais il les menaçait et ne leur permettait pas de parler, parce qu’ils savaient qu’il était le Christ. '
  '42':
  - type: note
    content: Mc 1:35.
  - type: text
    content: 'Dès que le jour parut, il sortit et alla dans un lieu désert. Une foule de gens se mirent à sa recherche, et arrivèrent jusqu’à lui; ils voulaient le retenir, afin qu’il ne les quittât point. '
  '43':
  - type: text
    content: 'Mais il leur dit: '
  - type: text
    content: Il faut aussi que j’annonce aux autres villes la bonne nouvelle du royaume de Dieu; car c’est pour cela que j’ai été envoyé.
  - type: text
    content: ' '
  '44':
  - type: text
    content: Et il prêchait dans les synagogues de la Galilée.
  '5':
  - type: text
    content: 'Le diable, l’ayant élevé, lui montra en un instant tous les royaumes de la terre, '
  '6':
  - type: text
    content: 'et lui dit: Je te donnerai toute cette puissance, et la gloire de ces royaumes; car elle m’a été donnée, et je la donne à qui je veux. '
  '7':
  - type: text
    content: 'Si donc tu te prosternes devant moi, elle sera toute à toi. '
  '8':
  - type: text
    content: 'Jésus lui répondit: '
  - type: text
    content: 'Il est écrit:'
  - type: note
    content: De 6:13; 10:20. 1 S 7:3.
  - type: text
    content: Tu adoreras le Seigneur, ton Dieu, et tu le serviras lui seul.
  '9':
  - type: text
    content: 'Le diable le conduisit encore à Jérusalem, le plaça sur le haut du temple, et lui dit: Si tu es Fils de Dieu, jette-toi d’ici en bas; car il est écrit: '
