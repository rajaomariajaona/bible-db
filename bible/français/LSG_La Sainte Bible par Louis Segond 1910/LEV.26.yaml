document_id: LEV.26
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Bénédictions et malédictions
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-13: cf. (De 11:8-15; 28:1-14.) És 3:10. Mal 3:18.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Vous '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 20:4
      metadata:
        usfm: EXO.20.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 5:8
      metadata:
        usfm: DEU.5.8
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 16:22
      metadata:
        usfm: DEU.16.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 97:7
      metadata:
        usfm: PSA.97.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ne vous ferez point d’idoles, vous ne vous élèverez ni image taillée ni statue, et vous ne placerez dans votre pays aucune pierre ornée de figures, pour vous prosterner devant elle; car je suis l’Éternel, votre Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Vous observerez mes sabbats, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 19:30
      metadata:
        usfm: LEV.19.30
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et vous révérerez mon sanctuaire. Je suis l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: text
      text: De 28:1, etc.
    marker-yv: yv-n
  - type: text
    text: 'Si vous suivez mes lois, si vous gardez mes commandements et les mettez en pratique, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'je vous enverrai des pluies en leur saison, la terre donnera ses produits, et les arbres des champs donneront leurs fruits. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'A peine aurez-vous battu le blé que vous toucherez à la vendange, et la vendange atteindra les semailles; vous mangerez votre pain '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 25:19
      metadata:
        usfm: LEV.25.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'à satiété, et vous habiterez en sécurité dans votre pays. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Je mettrai la paix dans le pays, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 11:18
      metadata:
        usfm: JOB.11.18
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '19'
      metadata:
        usfm: JOB.11.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et personne ne troublera votre sommeil; je ferai disparaître du pays les bêtes féroces, et l’épée ne passera point par votre pays. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Vous poursuivrez vos ennemis, et ils tomberont devant vous par l’épée. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 23:10
      metadata:
        usfm: JOS.23.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Cinq d’entre vous en poursuivront cent, et cent d’entre vous en poursuivront dix mille, et vos ennemis tomberont devant vous par l’épée. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Je me tournerai vers vous, je vous rendrai féconds et je vous multiplierai, et je maintiendrai mon alliance avec vous. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Vous mangerez des anciennes récoltes, et vous sortirez les vieilles pour faire place aux nouvelles. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 37:26
      metadata:
        usfm: EZK.37.26
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 6:16
      metadata:
        usfm: 2CO.6.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'J’établirai ma demeure au milieu de vous, et mon âme ne vous aura point en horreur. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Je marcherai au milieu de vous, je serai votre Dieu, et vous serez mon peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Je suis l’Éternel, votre Dieu, qui vous ai fait sortir du pays d’Égypte, qui vous ai tirés de la servitude; j’ai brisé les liens de votre joug, et je vous ai fait marcher la tête levée.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 14-39: cf. (De 28:15-68; 29:22-29.) És 3:11. Lu 19:27. Mt 7:26, 27. Hé 2:2, 3.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 28:15
      metadata:
        usfm: DEU.28.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: La 2:17
      metadata:
        usfm: LAM.2.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mal 2:2
      metadata:
        usfm: MAL.2.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Mais si vous ne m’écoutez point et ne mettez point en pratique tous ces commandements, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'si vous méprisez mes lois, et si votre âme a en horreur mes ordonnances, en sorte que vous ne pratiquiez point tous mes commandements et que vous rompiez mon alliance, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'voici alors ce que je vous ferai. J’enverrai sur vous la terreur, la consomption et la fièvre, qui rendront vos yeux languissants et votre âme souffrante; et vous sèmerez en vain vos semences: vos ennemis les dévoreront. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Je tournerai ma face contre vous, et vous serez battus devant vos ennemis; ceux qui vous haïssent domineront sur vous, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 28:1
      metadata:
        usfm: PRO.28.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'vous fuirez sans que l’on vous poursuive. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Si, malgré cela, vous ne m’écoutez point, je vous châtierai sept fois plus pour vos péchés. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Je briserai l’orgueil de votre force, je rendrai votre ciel comme du fer, et votre terre comme de l’airain. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Votre force s’épuisera inutilement, votre terre ne donnera pas ses produits, et les arbres de la terre ne donneront pas leurs fruits. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Si vous me résistez et ne voulez point m’écouter, je vous frapperai sept fois plus selon vos péchés. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'J’enverrai contre vous les animaux des champs, qui vous priveront de vos enfants, qui détruiront votre bétail, et qui vous réduiront à un petit nombre; et vos chemins seront déserts. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Si ces châtiments ne vous corrigent point et si vous me résistez, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'je '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 S 22:27
      metadata:
        usfm: 2SA.22.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 18:27
      metadata:
        usfm: PSA.18.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'vous résisterai aussi et je vous frapperai sept fois plus pour vos péchés. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Je ferai venir contre vous l’épée, qui vengera mon alliance; quand vous vous rassemblerez dans vos villes, j’enverrai la peste au milieu de vous, et vous serez livrés aux mains de l’ennemi. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Lorsque je vous briserai le bâton du pain, dix femmes cuiront votre pain dans un seul four et rapporteront votre pain au poids; vous mangerez, et vous ne serez point rassasiés. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Si, malgré cela, vous ne m’écoutez point et si vous me résistez, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'je vous résisterai aussi avec fureur et je vous châtierai sept fois plus pour vos péchés. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 28:53
      metadata:
        usfm: DEU.28.53
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 6:28
      metadata:
        usfm: 2KI.6.28
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: La 4:10
      metadata:
        usfm: LAM.4.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Vous mangerez la chair de vos fils, et vous mangerez la chair de vos filles. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Je détruirai vos hauts lieux, j’abattrai '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 34:7
      metadata:
        usfm: 2CH.34.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'vos statues consacrées au soleil, je mettrai vos cadavres sur les cadavres de vos idoles, et mon âme vous aura en horreur. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Je réduirai vos villes en déserts, je ravagerai vos sanctuaires, et je ne respirerai plus l’odeur agréable de vos parfums. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Je dévasterai le pays, et vos ennemis qui l’habiteront en seront stupéfaits. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Je vous disperserai parmi les nations et je tirerai l’épée après vous. Votre pays sera dévasté, et vos villes seront désertes. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Alors le pays jouira de ses '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 25:2
      metadata:
        usfm: LEV.25.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'sabbats, tout le temps qu’il sera dévasté et que vous serez dans le pays de vos ennemis; alors le pays se reposera, et jouira de ses sabbats. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Tout le temps qu’il sera dévasté, il aura le repos qu’il n’avait pas eu dans vos sabbats, tandis que vous l’habitiez. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Je rendrai pusillanime le cœur de ceux d’entre vous qui survivront, dans les pays de leurs ennemis; le bruit d’une feuille agitée les poursuivra; ils fuiront comme on fuit devant l’épée, et ils tomberont sans qu’on les poursuive. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ils se renverseront les uns sur les autres comme devant l’épée, sans qu’on les poursuive. Vous ne subsisterez point en présence de vos ennemis; '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'vous périrez parmi les nations, et le pays de vos ennemis vous dévorera. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Ceux d’entre vous qui survivront seront frappés de langueur pour leurs iniquités, dans les pays de leurs ennemis; ils seront aussi frappés de langueur pour les iniquités de leurs pères.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 40-46: cf. (De 30:1-7. 1 R 8:46-51.) Za 1:3. 1 Jn 1:9.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ils confesseront leurs iniquités et les iniquités de leurs pères, les transgressions qu’ils ont commises envers moi, et la résistance qu’ils m’ont opposée, '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'péchés à cause desquels moi aussi je leur résisterai et les mènerai dans le pays de leurs ennemis. Et alors leur cœur incirconcis s’humiliera, et ils paieront la dette de leurs iniquités. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Je me souviendrai de mon alliance avec Jacob, je me souviendrai de mon alliance avec Isaac et de mon alliance avec Abraham, et je me souviendrai du pays. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Le pays sera abandonné par eux, et il jouira de ses sabbats pendant qu’il restera dévasté loin d’eux; et ils paieront la dette de leurs iniquités, parce qu’ils ont méprisé mes ordonnances et que leur âme a eu mes lois en horreur. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Mais, lorsqu’ils seront dans le pays de leurs ennemis, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 4:31
      metadata:
        usfm: DEU.4.31
    - type: text
      text: . Ro 11:1, 26, etc.
    marker-yv: yv-n
  - type: text
    text: 'je ne les rejetterai pourtant point, et je ne les aurai point en horreur jusqu’à les exterminer, jusqu’à rompre mon alliance avec eux; car je suis l’Éternel, leur Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Je me souviendrai en leur faveur de l’ancienne alliance, par laquelle je les ai fait sortir du pays d’Égypte, aux yeux des nations, pour être leur Dieu. Je suis l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Tels sont les statuts, les ordonnances et les lois, que l’Éternel établit entre lui et les enfants d’Israël, sur la montagne de Sinaï, par Moïse.
