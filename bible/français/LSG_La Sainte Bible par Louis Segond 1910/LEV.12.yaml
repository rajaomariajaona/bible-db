document_id: LEV.12,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-8: cf. Ps 51:7. Lu 2:21-24.'
  - type: text
    content: 'L’Éternel parla à Moïse, et dit: '
  '2':
  - type: text
    content: 'Parle aux enfants d’Israël, et dis: Lorsqu’une femme deviendra enceinte, et qu’elle enfantera un mâle, elle sera impure pendant sept jours; elle sera impure comme au temps de son indisposition menstruelle. '
  '3':
  - type: note
    content: Ge 17:12. Lu 1:59; 2:21. Jn 7:22.
  - type: text
    content: 'Le huitième jour, l’enfant sera circoncis. '
  '4':
  - type: text
    content: 'Elle restera encore trente-trois jours à se purifier de son sang; elle ne touchera aucune chose sainte, et elle n’ira point au sanctuaire, jusqu’à ce que les jours de sa purification soient accomplis. '
  '5':
  - type: text
    content: 'Si elle enfante une fille, elle sera impure pendant deux semaines, comme au temps de son indisposition menstruelle; elle restera soixante-six jours à se purifier de son sang. '
  '6':
  - type: text
    content: 'Lorsque les jours de sa purification seront accomplis, pour un fils ou pour une fille, elle apportera au sacrificateur, à l’entrée de la tente d’assignation, un agneau d’un an pour l’holocauste, et un jeune pigeon ou une tourterelle pour le sacrifice d’expiation. '
  '7':
  - type: text
    content: 'Le sacrificateur les sacrifiera devant l’Éternel, et fera pour elle l’expiation; et elle sera purifiée du flux de son sang. Telle est la loi pour la femme qui enfante un fils ou une fille. '
  '8':
  - type: text
    content: Si elle n’a pas de quoi se procurer un agneau, elle prendra deux tourterelles ou deux jeunes pigeons, l’un pour l’holocauste, l’autre pour le sacrifice d’expiation. Le sacrificateur fera pour elle l’expiation, et elle sera pure.
