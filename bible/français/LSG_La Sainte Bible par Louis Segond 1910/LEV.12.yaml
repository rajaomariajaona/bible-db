document_id: LEV.12
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-8: cf. Ps 51:7. Lu 2:21-24.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Éternel parla à Moïse, et dit: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Parle aux enfants d’Israël, et dis: Lorsqu’une femme deviendra enceinte, et qu’elle enfantera un mâle, elle sera impure pendant sept jours; elle sera impure comme au temps de son indisposition menstruelle. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 17:12
      metadata:
        usfm: GEN.17.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 1:59
      metadata:
        usfm: LUK.1.59
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2:21
      metadata:
        usfm: LUK.2.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 7:22
      metadata:
        usfm: JHN.7.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Le huitième jour, l’enfant sera circoncis. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Elle restera encore trente-trois jours à se purifier de son sang; elle ne touchera aucune chose sainte, et elle n’ira point au sanctuaire, jusqu’à ce que les jours de sa purification soient accomplis. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Si elle enfante une fille, elle sera impure pendant deux semaines, comme au temps de son indisposition menstruelle; elle restera soixante-six jours à se purifier de son sang. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Lorsque les jours de sa purification seront accomplis, pour un fils ou pour une fille, elle apportera au sacrificateur, à l’entrée de la tente d’assignation, un agneau d’un an pour l’holocauste, et un jeune pigeon ou une tourterelle pour le sacrifice d’expiation. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Le sacrificateur les sacrifiera devant l’Éternel, et fera pour elle l’expiation; et elle sera purifiée du flux de son sang. Telle est la loi pour la femme qui enfante un fils ou une fille. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Si elle n’a pas de quoi se procurer un agneau, elle prendra deux tourterelles ou deux jeunes pigeons, l’un pour l’holocauste, l’autre pour le sacrifice d’expiation. Le sacrificateur fera pour elle l’expiation, et elle sera pure.
