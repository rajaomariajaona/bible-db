document_id: HEB.7,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-10: cf. Ge 14:17-20.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'En effet, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 14:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'ce Melchisédek, roi de Salem, sacrificateur du Dieu Très-Haut, qui alla au-devant d’Abraham lorsqu’il revenait de la défaite des rois, qui le bénit, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: car il était encore dans les reins de son père, lorsque Melchisédek alla au-devant d’Abraham.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 11-28: cf. Ps 110:4. Hé 8; 9:6-12; 10:10-14.'
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 2:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Si donc la perfection avait été possible par le sacerdoce Lévitique, car c’est sur ce sacerdoce que repose la loi donnée au peuple, qu’était-il encore besoin qu’il parût un autre sacrificateur selon l’ordre de Melchisédek, et non selon l’ordre d’Aaron? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Car, le sacerdoce étant changé, nécessairement aussi il y a un changement de loi. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'En effet, celui de qui ces choses sont dites appartient à une autre tribu, dont aucun membre n’a fait le service de l’autel; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'car il est notoire '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 11:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 1:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'que notre Seigneur est sorti de Juda, tribu dont Moïse n’a rien dit pour ce qui concerne le sacerdoce. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Cela devient plus évident encore, quand il paraît un autre sacrificateur à la ressemblance de Melchisédek, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'institué, non d’après la loi d’une ordonnance charnelle, mais selon la puissance d’une vie impérissable; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'car ce témoignage lui est rendu:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 110:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 5:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Tu es sacrificateur pour toujours Selon l’ordre de Melchisédek.
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Il y a ainsi abolition d’une ordonnance antérieure, à cause de son impuissance et de son inutilité, '
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 13:39
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 3:28
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 2:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'car la loi n’a rien amené à la perfection, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 1:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 3:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'et introduction d’une meilleure espérance, par laquelle nous nous approchons de Dieu. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'et à qui Abraham donna la dîme de tout, qui est d’abord roi de justice, d’après la signification de son nom, ensuite roi de Salem, c’est-à-dire roi de paix, '
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Et, comme cela n’a pas eu lieu sans serment, '
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'car, tandis que les Lévites sont devenus sacrificateurs sans serment, Jésus l’est devenu avec serment par celui qui lui a dit:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 110:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Le Seigneur a juré, et il ne se repentira pas:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu es sacrificateur pour toujours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Selon l’ordre de Melchisédek.
  '22':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Jésus est par cela même le garant d’une alliance plus excellente. '
  '23':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'De plus, il y a eu des sacrificateurs en grand nombre, parce que la mort les empêchait d’être permanents. '
  '24':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Mais lui, parce qu’il demeure éternellement, possède un sacerdoce qui n’est pas transmissible. '
  '25':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'C’est aussi pour cela qu’il peut sauver parfaitement ceux qui s’approchent de Dieu par lui, étant toujours vivant '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ti 2:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Jn 2:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'pour intercéder en leur faveur. '
  '26':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Il nous convenait, en effet, d’avoir un souverain sacrificateur comme lui, saint, innocent, sans tache, séparé des pécheurs, et plus élevé que les cieux, '
  '27':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'qui n’a pas besoin, comme les souverains sacrificateurs, d’offrir chaque jour des sacrifices, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 9:7
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 5:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'd’abord pour ses propres péchés, ensuite pour ceux du peuple, car ceci, il l’a fait une fois pour toutes en s’offrant lui-même. '
  '28':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: En effet, la loi établit souverains sacrificateurs des hommes sujets à la faiblesse; mais la parole du serment qui a été fait après la loi établit le Fils, qui est parfait pour l’éternité.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'qui est sans père, sans mère, sans généalogie, qui n’a ni commencement de jours ni fin de vie, mais qui est rendu semblable au Fils de Dieu, ce Melchisédek demeure sacrificateur à perpétuité. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Considérez combien est grand celui auquel le patriarche Abraham donna la dîme du butin. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ceux des fils de Lévi qui exercent le sacerdoce ont, d’après la loi, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 18:21
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 18:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 14:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 31:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'l’ordre de lever la dîme sur le peuple, c’est-à-dire, sur leurs frères, qui cependant sont issus des reins d’Abraham; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'et lui, qui ne tirait pas d’eux son origine, il leva la dîme '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 14:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'sur Abraham, et il bénit celui qui avait les promesses. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Or c’est sans contredit l’inférieur qui est béni par le supérieur. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Et ici, ceux qui perçoivent la dîme sont des hommes mortels; mais là, c’est celui dont il est attesté qu’il est vivant. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'De plus, Lévi, qui perçoit la dîme, l’a payée, pour ainsi dire, par Abraham; '
