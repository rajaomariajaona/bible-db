document_id: HEB.7,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-10: cf. Ge 14:17-20.'
  - type: text
    content: 'En effet, '
  - type: note
    content: Ge 14:18.
  - type: text
    content: 'ce Melchisédek, roi de Salem, sacrificateur du Dieu Très-Haut, qui alla au-devant d’Abraham lorsqu’il revenait de la défaite des rois, qui le bénit, '
  '10':
  - type: text
    content: car il était encore dans les reins de son père, lorsque Melchisédek alla au-devant d’Abraham.
  - type: heading
    content: 'V. 11-28: cf. Ps 110:4. Hé 8; 9:6-12; 10:10-14.'
  '11':
  - type: text
    content: ' '
  - type: note
    content: Ga 2:21.
  - type: text
    content: 'Si donc la perfection avait été possible par le sacerdoce Lévitique, car c’est sur ce sacerdoce que repose la loi donnée au peuple, qu’était-il encore besoin qu’il parût un autre sacrificateur selon l’ordre de Melchisédek, et non selon l’ordre d’Aaron? '
  '12':
  - type: text
    content: 'Car, le sacerdoce étant changé, nécessairement aussi il y a un changement de loi. '
  '13':
  - type: text
    content: 'En effet, celui de qui ces choses sont dites appartient à une autre tribu, dont aucun membre n’a fait le service de l’autel; '
  '14':
  - type: text
    content: 'car il est notoire '
  - type: note
    content: És 11:1. Mt 1:3.
  - type: text
    content: 'que notre Seigneur est sorti de Juda, tribu dont Moïse n’a rien dit pour ce qui concerne le sacerdoce. '
  '15':
  - type: text
    content: 'Cela devient plus évident encore, quand il paraît un autre sacrificateur à la ressemblance de Melchisédek, '
  '16':
  - type: text
    content: 'institué, non d’après la loi d’une ordonnance charnelle, mais selon la puissance d’une vie impérissable; '
  '17':
  - type: text
    content: 'car ce témoignage lui est rendu:'
  - type: note
    content: Ps 110:4. Hé 5:6.
  - type: text
    content: Tu es sacrificateur pour toujours Selon l’ordre de Melchisédek.
  '18':
  - type: text
    content: 'Il y a ainsi abolition d’une ordonnance antérieure, à cause de son impuissance et de son inutilité, '
  '19':
  - type: note
    content: Ac 13:39. Ro 3:28; 8:3. Ga 2:16.
  - type: text
    content: 'car la loi n’a rien amené à la perfection, '
  - type: note
    content: Jn 1:17. Ro 3:21.
  - type: text
    content: 'et introduction d’une meilleure espérance, par laquelle nous nous approchons de Dieu. '
  '2':
  - type: text
    content: 'et à qui Abraham donna la dîme de tout, qui est d’abord roi de justice, d’après la signification de son nom, ensuite roi de Salem, c’est-à-dire roi de paix, '
  '20':
  - type: text
    content: 'Et, comme cela n’a pas eu lieu sans serment, '
  '21':
  - type: text
    content: 'car, tandis que les Lévites sont devenus sacrificateurs sans serment, Jésus l’est devenu avec serment par celui qui lui a dit:'
  - type: note
    content: Ps 110:4.
  - type: text
    content: 'Le Seigneur a juré, et il ne se repentira pas:'
  - type: text
    content: Tu es sacrificateur pour toujours,
  - type: text
    content: Selon l’ordre de Melchisédek.
  '22':
  - type: text
    content: 'Jésus est par cela même le garant d’une alliance plus excellente. '
  '23':
  - type: text
    content: 'De plus, il y a eu des sacrificateurs en grand nombre, parce que la mort les empêchait d’être permanents. '
  '24':
  - type: text
    content: 'Mais lui, parce qu’il demeure éternellement, possède un sacerdoce qui n’est pas transmissible. '
  '25':
  - type: text
    content: 'C’est aussi pour cela qu’il peut sauver parfaitement ceux qui s’approchent de Dieu par lui, étant toujours vivant '
  - type: note
    content: 1 Ti 2:5. 1 Jn 2:1.
  - type: text
    content: 'pour intercéder en leur faveur. '
  '26':
  - type: text
    content: 'Il nous convenait, en effet, d’avoir un souverain sacrificateur comme lui, saint, innocent, sans tache, séparé des pécheurs, et plus élevé que les cieux, '
  '27':
  - type: text
    content: 'qui n’a pas besoin, comme les souverains sacrificateurs, d’offrir chaque jour des sacrifices, '
  - type: note
    content: Lé 9:7; 16:6. Hé 5:3.
  - type: text
    content: 'd’abord pour ses propres péchés, ensuite pour ceux du peuple, car ceci, il l’a fait une fois pour toutes en s’offrant lui-même. '
  '28':
  - type: text
    content: En effet, la loi établit souverains sacrificateurs des hommes sujets à la faiblesse; mais la parole du serment qui a été fait après la loi établit le Fils, qui est parfait pour l’éternité.
  '3':
  - type: text
    content: 'qui est sans père, sans mère, sans généalogie, qui n’a ni commencement de jours ni fin de vie, mais qui est rendu semblable au Fils de Dieu, ce Melchisédek demeure sacrificateur à perpétuité. '
  '4':
  - type: text
    content: 'Considérez combien est grand celui auquel le patriarche Abraham donna la dîme du butin. '
  '5':
  - type: text
    content: 'Ceux des fils de Lévi qui exercent le sacerdoce ont, d’après la loi, '
  - type: note
    content: No 18:21. De 18:1. Jos 14:4. 2 Ch 31:5.
  - type: text
    content: 'l’ordre de lever la dîme sur le peuple, c’est-à-dire, sur leurs frères, qui cependant sont issus des reins d’Abraham; '
  '6':
  - type: text
    content: 'et lui, qui ne tirait pas d’eux son origine, il leva la dîme '
  - type: note
    content: Ge 14:20.
  - type: text
    content: 'sur Abraham, et il bénit celui qui avait les promesses. '
  '7':
  - type: text
    content: 'Or c’est sans contredit l’inférieur qui est béni par le supérieur. '
  '8':
  - type: text
    content: 'Et ici, ceux qui perçoivent la dîme sont des hommes mortels; mais là, c’est celui dont il est attesté qu’il est vivant. '
  '9':
  - type: text
    content: 'De plus, Lévi, qui perçoit la dîme, l’a payée, pour ainsi dire, par Abraham; '
