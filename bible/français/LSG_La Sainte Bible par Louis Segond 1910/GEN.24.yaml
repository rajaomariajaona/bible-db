document_id: GEN.24,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Rebecca demandée en mariage pour Isaac
  - type: heading
    content: 'V. 1-67: cf. (Ge 28:1-10; 29:1-20.)'
  - type: text
    content: 'Abraham était vieux, avancé en âge; et l’Éternel avait béni Abraham en toute chose. '
  '10':
  - type: text
    content: 'Le serviteur prit dix chameaux parmi les chameaux de son seigneur, et il partit, ayant à sa disposition tous les biens de son seigneur. Il se leva, et alla en Mésopotamie, à la ville de Nachor. '
  '11':
  - type: text
    content: 'Il fit reposer les chameaux sur leurs genoux hors de la ville, près d’un puits, au temps du soir, au temps où sortent celles qui vont puiser de l’eau. '
  '12':
  - type: text
    content: 'Et il dit: Éternel, Dieu de mon seigneur Abraham, fais-moi, je te prie, rencontrer aujourd’hui ce que je désire, et use de bonté envers mon seigneur Abraham! '
  '13':
  - type: text
    content: 'Voici, je me tiens près de la source d’eau, et les filles des gens de la ville vont sortir pour puiser de l’eau. '
  '14':
  - type: text
    content: 'Que la jeune fille à laquelle je dirai: Penche ta cruche, je te prie, pour que je boive, et qui répondra: Bois, et je donnerai aussi à boire à tes chameaux, soit celle que tu as destinée à ton serviteur Isaac! Et par là je connaîtrai que tu uses de bonté envers mon seigneur. '
  '15':
  - type: text
    content: 'Il n’avait pas encore fini de parler que sortit, sa cruche sur l’épaule, Rebecca, '
  - type: note
    content: Ge 22:23.
  - type: text
    content: 'née de Bethuel, fils de Milca, femme de Nachor, frère d’Abraham. '
  '16':
  - type: text
    content: 'C’était une jeune fille très belle de figure; elle était vierge, et aucun homme ne l’avait connue. Elle descendit à la source, remplit sa cruche, et remonta. '
  '17':
  - type: text
    content: 'Le serviteur courut au-devant d’elle, et dit: Laisse-moi boire, je te prie, un peu d’eau de ta cruche. '
  '18':
  - type: text
    content: 'Elle répondit: Bois, mon seigneur. Et elle s’empressa d’abaisser sa cruche sur sa main, et de lui donner à boire. '
  '19':
  - type: text
    content: 'Quand elle eut achevé de lui donner à boire, elle dit: Je puiserai aussi pour tes chameaux, jusqu’à ce qu’ils aient assez bu. '
  '2':
  - type: text
    content: 'Abraham dit à son serviteur, le plus ancien de sa maison, l’intendant de tous ses biens: '
  - type: note
    content: Ge 47:29.
  - type: text
    content: 'Mets, je te prie, ta main sous ma cuisse; '
  '20':
  - type: text
    content: 'Et elle s’empressa de vider sa cruche dans l’abreuvoir, et courut encore au puits pour puiser; et elle puisa pour tous les chameaux. '
  '21':
  - type: text
    content: 'L’homme la regardait avec étonnement et sans rien dire, pour voir si l’Éternel faisait réussir son voyage, ou non. '
  '22':
  - type: text
    content: 'Quand les chameaux eurent fini de boire, l’homme prit un anneau d’or, du poids d’un demi-sicle, et deux bracelets, du poids de dix sicles d’or. '
  '23':
  - type: text
    content: 'Et il dit: De qui es-tu fille? Dis-le moi, je te prie. Y a-t-il dans la maison de ton père de la place pour passer la nuit? '
  '24':
  - type: text
    content: 'Elle répondit: '
  - type: note
    content: Ge 22:23.
  - type: text
    content: 'Je suis fille de Bethuel, fils de Milca et de Nachor. '
  '25':
  - type: text
    content: 'Elle lui dit encore: Il y a chez nous de la paille et du fourrage en abondance, et aussi de la place pour passer la nuit. '
  '26':
  - type: text
    content: 'Alors l’homme s’inclina et se prosterna devant l’Éternel, '
  '27':
  - type: text
    content: 'en disant: Béni soit l’Éternel, le Dieu de mon seigneur Abraham, qui n’a pas renoncé à sa miséricorde et à sa fidélité envers mon seigneur! Moi-même, l’Éternel m’a conduit à la maison des frères de mon seigneur. '
  '28':
  - type: text
    content: 'La jeune fille courut raconter ces choses à la maison de sa mère. '
  '29':
  - type: text
    content: 'Rebecca avait un frère, nommé Laban. Et Laban courut dehors vers l’homme, près de la source. '
  '3':
  - type: text
    content: 'et je te ferai jurer par l’Éternel, le Dieu du ciel et le Dieu de la terre, '
  - type: note
    content: Ge 28:1.
  - type: text
    content: 'de ne pas prendre pour mon fils une femme parmi les filles des Cananéens au milieu desquels j’habite, '
  '30':
  - type: text
    content: 'Il avait vu l’anneau et les bracelets aux mains de sa sœur, et il avait entendu les paroles de Rebecca, sa sœur, disant: Ainsi m’a parlé l’homme. Il vint donc à cet homme qui se tenait auprès des chameaux, vers la source, '
  '31':
  - type: text
    content: 'et il dit: Viens, béni de l’Éternel! Pourquoi resterais-tu dehors? J’ai préparé la maison, et une place pour les chameaux. '
  '32':
  - type: text
    content: 'L’homme arriva à la maison. Laban fit décharger les chameaux, et il donna de la paille et du fourrage aux chameaux, et de l’eau pour laver les pieds de l’homme et les pieds des gens qui étaient avec lui. '
  '33':
  - type: text
    content: 'Puis, il lui servit à manger. Mais il dit: Je ne mangerai point, avant d’avoir dit ce que j’ai à dire. Parle! Dit Laban. '
  '34':
  - type: text
    content: 'Alors il dit: Je suis serviteur d’Abraham. '
  '35':
  - type: text
    content: 'L’Éternel a comblé de bénédictions mon seigneur, qui est devenu puissant. Il lui a donné des brebis et des bœufs, de l’argent et de l’or, des serviteurs et des servantes, des chameaux et des ânes. '
  '36':
  - type: text
    content: 'Sara, la femme de mon seigneur, a enfanté dans sa vieillesse un fils à mon seigneur; et il lui a donné tout ce qu’il possède. '
  '37':
  - type: text
    content: 'Mon seigneur m’a fait jurer, en disant: Tu ne prendras pas pour mon fils une femme parmi les filles des Cananéens, dans le pays desquels j’habite; '
  '38':
  - type: text
    content: 'mais tu iras dans la maison de mon père et de ma famille prendre une femme pour mon fils. '
  '39':
  - type: text
    content: 'J’ai dit à mon seigneur: Peut-être la femme ne voudra-t-elle pas me suivre. '
  '4':
  - type: text
    content: 'mais d’aller dans mon pays et dans ma patrie prendre une femme pour mon fils Isaac. '
  '40':
  - type: text
    content: 'Et il m’a répondu: L’Éternel, devant qui j’ai marché, enverra son ange avec toi, et fera réussir ton voyage; et tu prendras pour mon fils une femme de la famille et de la maison de mon père. '
  '41':
  - type: text
    content: 'Tu seras dégagé du serment que tu me fais, quand tu auras été vers ma famille; si on ne te l’accorde pas, tu seras dégagé du serment que tu me fais. '
  '42':
  - type: text
    content: 'Je suis arrivé aujourd’hui à la source, et j’ai dit: Éternel, Dieu de mon seigneur Abraham, si tu daignes faire réussir le voyage que j’accomplis, '
  '43':
  - type: text
    content: 'voici, je me tiens près de la source d’eau, et que la jeune fille qui sortira pour puiser, à qui je dirai: Laisse-moi boire, je te prie, un peu d’eau de ta cruche, et qui me répondra: '
  '44':
  - type: text
    content: 'Bois toi-même, et je puiserai aussi pour tes chameaux, que cette jeune fille soit la femme que l’Éternel a destinée au fils de mon seigneur! '
  '45':
  - type: text
    content: 'Avant que j’eusse fini de parler en mon cœur, voici, Rebecca est sortie, sa cruche sur l’épaule; elle est descendue à la source, et a puisé. Je lui ai dit: Donne-moi à boire, je te prie. '
  '46':
  - type: text
    content: 'Elle s’est empressée d’abaisser sa cruche de dessus son épaule, et elle a dit: Bois, et je donnerai aussi à boire à tes chameaux. J’ai bu, et elle a aussi donné à boire à mes chameaux. '
  '47':
  - type: text
    content: 'Je l’ai interrogée, et j’ai dit: De qui es-tu fille? Elle a répondu: Je suis fille de Bethuel, fils de Nachor et de Milca. J’ai mis l’anneau à son nez, et les bracelets à ses mains. '
  '48':
  - type: text
    content: 'Puis je me suis incliné et prosterné devant l’Éternel, et j’ai béni l’Éternel, le Dieu de mon seigneur Abraham, qui m’a conduit fidèlement, afin que je prisse la fille du frère de mon seigneur pour son fils. '
  '49':
  - type: text
    content: 'Maintenant, si vous voulez user de bienveillance et de fidélité envers mon seigneur, déclarez-le-moi; sinon, déclarez-le-moi, et je me tournerai à droite ou à gauche. '
  '5':
  - type: text
    content: 'Le serviteur lui répondit: Peut-être la femme ne voudra-t-elle pas me suivre dans ce pays-ci; devrai-je mener ton fils dans le pays d’où tu es sorti? '
  '50':
  - type: text
    content: 'Laban et Bethuel répondirent, et dirent: C’est de l’Éternel que la chose vient; nous ne pouvons te parler ni en mal ni en bien. '
  '51':
  - type: text
    content: 'Voici Rebecca devant toi; prends et va, et qu’elle soit la femme du fils de ton seigneur, comme l’Éternel l’a dit. '
  '52':
  - type: text
    content: 'Lorsque le serviteur d’Abraham eut entendu leurs paroles, il se prosterna en terre devant l’Éternel. '
  '53':
  - type: text
    content: 'Et le serviteur sortit des objets d’argent, des objets d’or, et des vêtements, qu’il donna à Rebecca; il fit aussi de riches présents à son frère et à sa mère. '
  '54':
  - type: text
    content: 'Après quoi, ils mangèrent et burent, lui et les gens qui étaient avec lui, et ils passèrent la nuit. Le matin, quand ils furent levés, le serviteur dit: Laissez-moi retourner vers mon seigneur. '
  '55':
  - type: text
    content: 'Le frère et la mère dirent: Que la jeune fille reste avec nous quelque temps encore, une dizaine de jours; ensuite, tu partiras. '
  '56':
  - type: text
    content: 'Il leur répondit: Ne me retardez pas, puisque l’Éternel a fait réussir mon voyage; laissez-moi partir, et que j’aille vers mon seigneur. '
  '57':
  - type: text
    content: 'Alors ils répondirent: Appelons la jeune fille et consultons-la. '
  '58':
  - type: text
    content: 'Ils appelèrent donc Rebecca, et lui dirent: Veux-tu aller avec cet homme? Elle répondit: J’irai. '
  '59':
  - type: text
    content: 'Et ils laissèrent partir Rebecca, leur sœur, et sa nourrice, avec le serviteur d’Abraham et ses gens. '
  '6':
  - type: text
    content: 'Abraham lui dit: Garde-toi d’y mener mon fils! '
  '60':
  - type: text
    content: 'Ils bénirent Rebecca, et lui dirent: O notre sœur, puisses-tu devenir des milliers de myriades, et que ta postérité possède la porte de ses ennemis! '
  '61':
  - type: text
    content: 'Rebecca se leva, avec ses servantes; elles montèrent sur les chameaux, et suivirent l’homme. Et le serviteur emmena Rebecca, et partit. '
  '62':
  - type: text
    content: 'Cependant Isaac était revenu du '
  - type: note
    content: Ge 16:14; 25:11.
  - type: text
    content: 'puits de Lachaï-roï, et il habitait dans le pays du midi. '
  '63':
  - type: text
    content: 'Un soir qu’Isaac était sorti pour méditer dans les champs, il leva les yeux, et regarda; et voici, des chameaux arrivaient. '
  '64':
  - type: text
    content: 'Rebecca leva aussi les yeux, vit Isaac, et descendit de son chameau. '
  '65':
  - type: text
    content: 'Elle dit au serviteur: Qui est cet homme, qui vient dans les champs à notre rencontre? Et le serviteur répondit: C’est mon seigneur. Alors elle prit son voile, et se couvrit. '
  '66':
  - type: text
    content: 'Le serviteur raconta à Isaac toutes les choses qu’il avait faites. '
  '67':
  - type: text
    content: Isaac conduisit Rebecca dans la tente de Sara, sa mère; il prit Rebecca, qui devint sa femme, et il l’aima. Ainsi fut consolé Isaac, après avoir perdu sa mère.
  '7':
  - type: note
    content: Ge 12:1.
  - type: text
    content: 'L’Éternel, le Dieu du ciel, qui m’a fait sortir de la maison de mon père et de ma patrie, qui m’a parlé et qui m’a juré, en disant: '
  - type: note
    content: Ge 12:7; 13:15; 15:18; 26:4. Ex 32:13. De 34:4. Ac 7:5.
  - type: text
    content: 'Je donnerai ce pays à ta postérité, lui-même enverra son ange devant toi; et c’est de là que tu prendras une femme pour mon fils. '
  '8':
  - type: text
    content: 'Si la femme ne veut pas te suivre, tu seras dégagé de ce serment que je te fais faire. Seulement, tu n’y mèneras pas mon fils. '
  '9':
  - type: text
    content: 'Le serviteur mit sa main sous la cuisse d’Abraham, son seigneur, et lui jura d’observer ces choses. '
