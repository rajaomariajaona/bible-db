document_id: EZK.48
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-7: cf. Éz 47:13-23. (Jos 15 à 17; 19:24, etc.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Voici les noms des tribus. Depuis l’extrémité septentrionale, le long du chemin de Hethlon à Hamath, Hatsar-Énon, la frontière de Damas au nord vers Hamath, de l’orient à l’occident: Dan, une tribu. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Sur la limite de Dan, de l’orient à l’occident: Aser, une tribu. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Sur la limite d’Aser, de l’orient à l’occident: Nephthali, une tribu. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Sur la limite de Nephthali, de l’orient à l’occident: Manassé, une tribu. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Sur la limite de Manassé, de l’orient à l’occident: Éphraïm, une tribu. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Sur la limite d’Éphraïm, de l’orient à l’occident: Ruben, une tribu. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Sur la limite de Ruben, de l’orient à l’occident: Juda, une tribu.'
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 8-22: cf. Éz 45:1-8.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Sur la frontière de Juda, de l’orient à l’occident, sera la portion que vous prélèverez, large de vingt-cinq mille cannes et longue comme l’une des parts de l’orient à l’occident; et le sanctuaire sera au milieu. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'La portion que vous prélèverez pour l’Éternel aura vingt-cinq mille cannes de longueur et dix mille de largeur. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'C’est aux sacrificateurs qu’appartiendra cette portion sainte: vingt-cinq mille cannes au septentrion, dix mille en largeur à l’occident, dix mille en largeur à l’orient, et vingt-cinq mille en longueur au midi; et le sanctuaire de l’Éternel sera au milieu. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Elle appartiendra aux sacrificateurs consacrés, aux fils de Tsadok, qui ont fait le service de mon sanctuaire, qui ne se sont point égarés, lorsque les enfants d’Israël s’égaraient, comme s’égaraient les Lévites. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Elle leur appartiendra comme portion très sainte, prélevée sur la portion du pays qui aura été prélevée, à côté de la limite des Lévites. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Les Lévites auront, parallèlement à la limite des sacrificateurs, vingt-cinq mille cannes en longueur et dix mille en largeur, vingt-cinq mille pour toute la longueur et dix mille pour la largeur. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ils n’en pourront rien vendre ni échanger; et les prémices du pays ne seront point aliénées, car elles sont consacrées à l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Les cinq mille cannes qui resteront en largeur sur les vingt-cinq mille seront destinées à la ville, pour les habitations et la banlieue; et la ville sera au milieu. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'En voici les mesures: du côté septentrional quatre mille cinq cents, du côté méridional quatre mille cinq cents, du côté oriental quatre mille cinq cents, et du côté occidental quatre mille cinq cents. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'La ville aura une banlieue de deux cent cinquante au nord, de deux cent cinquante au midi, de deux cent cinquante à l’orient, et de deux cent cinquante à l’occident. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Le reste sur la longueur, parallèlement à la portion sainte, dix mille à l’orient et dix mille à l’occident, parallèlement à la portion sainte, formera les revenus destinés à l’entretien de ceux qui travailleront pour la ville. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Le sol en sera cultivé par ceux de toutes les tribus d’Israël qui travailleront pour la ville. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Toute la portion prélevée sera de vingt-cinq mille cannes en longueur sur vingt-cinq mille en largeur; vous en séparerez un carré pour la propriété de la ville. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ce qui restera sera pour le prince, aux deux côtés de la portion sainte et de la propriété de la ville, le long des vingt-cinq mille cannes de la portion sainte jusqu’à la limite de l’orient, et à l’occident le long des vingt-cinq mille cannes vers la limite de l’occident, parallèlement aux parts. C’est là ce qui appartiendra au prince; et la portion sainte et le sanctuaire de la maison seront au milieu. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ainsi ce qui appartiendra au prince sera l’espace compris depuis la propriété des Lévites et depuis la propriété de la ville; ce qui sera entre la limite de Juda et la limite de Benjamin appartiendra au prince.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 23-29: cf. Jos 18:21-28; 19:1-23.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Voici les autres tribus. De l’orient à l’occident: Benjamin, une tribu. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Sur la limite de Benjamin, de l’orient à l’occident: Siméon, une tribu. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Sur la limite de Siméon, de l’orient à l’occident: Issacar, une tribu. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Sur la limite d’Issacar, de l’orient à l’occident: Zabulon, une tribu. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Sur la limite de Zabulon, de l’orient à l’occident: Gad, une tribu. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Sur la limite de Gad, du côté méridional, au midi, la frontière ira depuis Thamar, jusqu’aux eaux de Meriba à Kadès, jusqu’au torrent vers la grande mer. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Tel est le pays que vous diviserez en héritage par le sort pour les tribus d’Israël et telles sont leurs parts, dit le Seigneur, l’Éternel.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 30-35: cf. Ap 21:9-27.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Voici les issues de la ville. Du côté septentrional quatre mille cinq cents cannes. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'et les portes de la ville d’après les noms des tribus d’Israël, trois portes au nord: la porte de Ruben, une, la porte de Juda, une, la porte de Lévi, une. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Du côté oriental quatre mille cinq cents cannes, et trois portes: la porte de Joseph, une, la porte de Benjamin, une, la porte de Dan, une. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Du côté méridional quatre mille cinq cents cannes, et trois portes: la porte de Siméon, une, la porte d’Issacar, une, la porte de Zabulon, une. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Du côté occidental quatre mille cinq cents cannes, et trois portes: la porte de Gad, une, la porte d’Aser, une, la porte de Nephthali, une. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Circuit: dix-huit mille cannes. Et, dès ce jour, le nom de la ville sera: l’Éternel est ici.'
