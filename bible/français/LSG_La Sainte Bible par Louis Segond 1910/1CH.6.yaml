    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-15: cf. Ex 6:16-25. Esd 7:1-5. Hé 7:23.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 46:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 6:15
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 26:57
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 23:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Fils de Lévi: Guerschom, Kehath et Merari. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Jochanan engendra Azaria, qui exerça le sacerdoce dans la maison que Salomon bâtit à Jérusalem; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Azaria engendra Amaria; Amaria engendra Achithub; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Achithub engendra Tsadok; Tsadok engendra Schallum; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Schallum engendra Hilkija; Hilkija engendra Azaria; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'et Azaria engendra Seraja; Seraja engendra Jehotsadak, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Jehotsadak s’en alla quand l’Éternel emmena en captivité Juda et Jérusalem par Nebucadnetsar.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 16-30: cf. No 3:17, etc.; 18:6. 1 Ch 23:6-23.'
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Fils de Lévi: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 6:16
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '17'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Guerschom, Kehath et Merari. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Voici les noms des fils de Guerschom: Libni et Schimeï. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Fils de Kehath: Amram, Jitsehar, Hébron et Uziel. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Fils de Merari: Machli et Muschi. Ce sont là les familles de Lévi, selon leurs pères. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Fils de Kehath: Amram, Jitsehar, Hébron et Uziel. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'De Guerschom: Libni, son fils; Jachath, son fils; Zimma, son fils; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Joach, son fils; Iddo, son fils; Zérach, son fils; Jeathraï, son fils. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Fils de Kehath: Amminadab, son fils; Koré, son fils; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 6:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Assir, son fils; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Elkana, son fils; Ebjasaph, son fils; Assir, son fils; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Thachath, son fils; Uriel, son fils; Ozias, son fils; Saül, son fils. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Fils d’Elkana: Amasaï et Achimoth; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Elkana, son fils; Elkana Tsophaï, son fils; Nachath, son fils; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Éliab, son fils; Jerocham, son fils; Elkana, son fils; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'et les fils de Samuel, le premier-né Vaschni et Abija. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Fils de Merari: Machli; Libni, son fils; Schimeï, son fils; Uzza, son fils; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Fils d’Amram: Aaron et Moïse; et Marie. Fils d’Aaron: Nadab, Abihu, Éléazar et Ithamar. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Schimea, son fils; Hagguija, son fils; Asaja, son fils.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 31-47: cf. 1 Ch 15:16-21; 16; 25. Ps 81:2-5; 134:1; 135:1-3.'
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Voici ceux que David établit pour la direction du chant dans la maison de l’Éternel, depuis que l’arche eut un lieu de repos: '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'ils remplirent les fonctions de chantres devant le tabernacle, devant la tente d’assignation, jusqu’à ce que Salomon eût bâti la maison de l’Éternel à Jérusalem, et ils faisaient leur service d’après la règle qui leur était prescrite. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Voici ceux qui officiaient avec leurs fils. D’entre les fils des Kehathites: Héman, le chantre, fils de Joël, fils de Samuel, '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'fils d’Elkana, fils de Jerocham, fils d’Éliel, fils de Thoach, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'fils de Tsuph, fils d’Elkana, fils de Machath, fils d’Amasaï, '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'fils d’Elkana, fils de Joël, fils d’Azaria, fils de Sophonie, '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'fils de Thachath, fils d’Assir, fils d’Ebjasaph, fils de Koré, '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'fils de Jitsehar, fils de Kehath, fils de Lévi, fils d’Israël. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Son frère Asaph, qui se tenait à sa droite, Asaph, fils de Bérékia, fils de Schimea, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Éléazar engendra Phinées; Phinées engendra Abischua; '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'fils de Micaël, fils de Baaséja, fils de Malkija, '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'fils d’Éthni, fils de Zérach, fils d’Adaja, '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'fils d’Éthan, fils de Zimma, fils de Schimeï, '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'fils de Jachath, fils de Guerschom, fils de Lévi. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Fils de Merari, leurs frères, à la gauche; Éthan, fils de Kischi, fils d’Abdi, fils de Malluc, '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'fils de Haschabia, fils d’Amatsia, fils de Hilkija, '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'fils d’Amtsi, fils de Bani, fils de Schémer, '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: fils de Machli, fils de Muschi, fils de Merari, fils de Lévi.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 48-53: cf. De 33:10. 1 Ch 24:1-19.'
    marker-yv: yv-h
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Leurs frères, les Lévites, étaient chargés de tout le service du tabernacle, de la maison de Dieu. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 30:7
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 4:16
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:10
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Aaron et ses fils offraient les sacrifices sur l’autel des holocaustes et l’encens sur l’autel des parfums, ils remplissaient toutes les fonctions dans le lieu très saint, et faisaient l’expiation pour Israël, selon tout ce qu’avait ordonné Moïse, serviteur de Dieu. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Abischua engendra Bukki; Bukki engendra Uzzi; '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'Voici les fils d’Aaron: Éléazar, son fils; Phinées, son fils: Abischua, son fils; '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'Bukki, son fils; Uzzi, son fils; Zerachja, son fils; '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: 'Merajoth, son fils; Amaria, son fils; Achithub, son fils; '
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: Tsadok, son fils; Achimaats, son fils.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 54-81: cf. Jos 21.'
    marker-yv: yv-h
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: 'Voici leurs habitations, selon leurs enclos, dans les limites qui leur furent assignées. Aux fils d’Aaron de la famille des Kehathites, indiqués les premiers par le sort, '
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: 'on donna Hébron, dans le pays de Juda, et la banlieue qui l’entoure; '
  '56':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '56'
    - type: text
      text: 'mais le territoire de la ville et ses villages '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 21:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'furent accordés à Caleb, fils de Jephunné. '
  '57':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '57'
    - type: text
      text: 'Aux fils d’Aaron on donna la ville de refuge Hébron, Libna et sa banlieue, Jatthir, Eschthemoa et sa banlieue, '
  '58':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '58'
    - type: text
      text: 'Hilen et sa banlieue, Debir et sa banlieue, '
  '59':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '59'
    - type: text
      text: 'Aschan et sa banlieue, Beth-Schémesch et sa banlieue; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Uzzi engendra Zerachja; Zerachja engendra Merajoth; '
  '60':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '60'
    - type: text
      text: 'et de la tribu de Benjamin, Guéba et sa banlieue, Allémeth et sa banlieue, Anathoth et sa banlieue. Total de leurs villes: treize villes, d’après leurs familles. '
  '61':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '61'
    - type: text
      text: 'Les autres fils de Kehath eurent par le sort dix villes des familles de la tribu d’Éphraïm, de la tribu de Dan et de la demi-tribu de Manassé. '
  '62':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '62'
    - type: text
      text: 'Les fils de Guerschom, d’après leurs familles, eurent treize villes de la tribu d’Issacar, de la tribu d’Aser, de la tribu de Nephthali et de la tribu de Manassé en Basan. '
  '63':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '63'
    - type: text
      text: 'Les fils de Merari, d’après leurs familles, eurent par le sort douze villes de la tribu de Ruben, de la tribu de Gad et de la tribu de Zabulon. '
  '64':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '64'
    - type: text
      text: 'Les enfants d’Israël donnèrent aux Lévites les villes et leurs banlieues. '
  '65':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '65'
    - type: text
      text: 'Ils donnèrent par le sort, de la tribu des fils de Juda, de la tribu des fils de Siméon et de la tribu des fils de Benjamin, ces villes qu’ils désignèrent nominativement. '
  '66':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '66'
    - type: text
      text: 'Et pour les autres familles des fils de Kehath les villes de leur territoire furent de la tribu d’Éphraïm. '
  '67':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '67'
    - type: text
      text: 'Ils leur donnèrent la ville de refuge Sichem et sa banlieue, dans la montagne d’Éphraïm, Guézer et sa banlieue, '
  '68':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '68'
    - type: text
      text: 'Jokmeam et sa banlieue, Beth-Horon et sa banlieue, '
  '69':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
