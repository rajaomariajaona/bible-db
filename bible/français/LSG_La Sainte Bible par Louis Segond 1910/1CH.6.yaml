  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Voici les noms des fils de Guerschom: Libni et Schimeï. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fils de Kehath: Amram, Jitsehar, Hébron et Uziel. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fils de Merari: Machli et Muschi. Ce sont là les familles de Lévi, selon leurs pères. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'De Guerschom: Libni, son fils; Jachath, son fils; Zimma, son fils; '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Joach, son fils; Iddo, son fils; Zérach, son fils; Jeathraï, son fils. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fils de Kehath: Amminadab, son fils; Koré, son fils; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 6:23
      metadata:
        usfm: EXO.6.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Assir, son fils; '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Elkana, son fils; Ebjasaph, son fils; Assir, son fils; '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Thachath, son fils; Uriel, son fils; Ozias, son fils; Saül, son fils. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fils d’Elkana: Amasaï et Achimoth; '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Elkana, son fils; Elkana Tsophaï, son fils; Nachath, son fils; '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Éliab, son fils; Jerocham, son fils; Elkana, son fils; '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'et les fils de Samuel, le premier-né Vaschni et Abija. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Fils de Merari: Machli; Libni, son fils; Schimeï, son fils; Uzza, son fils; '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Schimea, son fils; Hagguija, son fils; Asaja, son fils.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 31-47: cf. 1 Ch 15:16-21; 16; 25. Ps 81:2-5; 134:1; 135:1-3.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Voici ceux que David établit pour la direction du chant dans la maison de l’Éternel, depuis que l’arche eut un lieu de repos: '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'ils remplirent les fonctions de chantres devant le tabernacle, devant la tente d’assignation, jusqu’à ce que Salomon eût bâti la maison de l’Éternel à Jérusalem, et ils faisaient leur service d’après la règle qui leur était prescrite. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Voici ceux qui officiaient avec leurs fils. D’entre les fils des Kehathites: Héman, le chantre, fils de Joël, fils de Samuel, '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'fils d’Elkana, fils de Jerocham, fils d’Éliel, fils de Thoach, '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'fils de Tsuph, fils d’Elkana, fils de Machath, fils d’Amasaï, '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'fils d’Elkana, fils de Joël, fils d’Azaria, fils de Sophonie, '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'fils de Thachath, fils d’Assir, fils d’Ebjasaph, fils de Koré, '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'fils de Jitsehar, fils de Kehath, fils de Lévi, fils d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Son frère Asaph, qui se tenait à sa droite, Asaph, fils de Bérékia, fils de Schimea, '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'fils de Micaël, fils de Baaséja, fils de Malkija, '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'fils d’Éthni, fils de Zérach, fils d’Adaja, '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'fils d’Éthan, fils de Zimma, fils de Schimeï, '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'fils de Jachath, fils de Guerschom, fils de Lévi. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Fils de Merari, leurs frères, à la gauche; Éthan, fils de Kischi, fils d’Abdi, fils de Malluc, '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'fils de Haschabia, fils d’Amatsia, fils de Hilkija, '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'fils d’Amtsi, fils de Bani, fils de Schémer, '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: fils de Machli, fils de Muschi, fils de Merari, fils de Lévi.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 48-53: cf. De 33:10. 1 Ch 24:1-19.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Leurs frères, les Lévites, étaient chargés de tout le service du tabernacle, de la maison de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
