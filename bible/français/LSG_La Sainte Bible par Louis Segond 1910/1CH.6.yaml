  - type: text
    text: 'Aaron et ses fils offraient les sacrifices sur l’autel des holocaustes et l’encens sur l’autel des parfums, ils remplissaient toutes les fonctions dans le lieu très saint, et faisaient l’expiation pour Israël, selon tout ce qu’avait ordonné Moïse, serviteur de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Voici les fils d’Aaron: Éléazar, son fils; Phinées, son fils: Abischua, son fils; '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Bukki, son fils; Uzzi, son fils; Zerachja, son fils; '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Merajoth, son fils; Amaria, son fils; Achithub, son fils; '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: Tsadok, son fils; Achimaats, son fils.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 54-81: cf. Jos 21.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Voici leurs habitations, selon leurs enclos, dans les limites qui leur furent assignées. Aux fils d’Aaron de la famille des Kehathites, indiqués les premiers par le sort, '
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'on donna Hébron, dans le pays de Juda, et la banlieue qui l’entoure; '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'mais le territoire de la ville et ses villages '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 21:12
      metadata:
        usfm: JOS.21.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'furent accordés à Caleb, fils de Jephunné. '
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Aux fils d’Aaron on donna la ville de refuge Hébron, Libna et sa banlieue, Jatthir, Eschthemoa et sa banlieue, '
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'Hilen et sa banlieue, Debir et sa banlieue, '
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'Aschan et sa banlieue, Beth-Schémesch et sa banlieue; '
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'et de la tribu de Benjamin, Guéba et sa banlieue, Allémeth et sa banlieue, Anathoth et sa banlieue. Total de leurs villes: treize villes, d’après leurs familles. '
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'Les autres fils de Kehath eurent par le sort dix villes des familles de la tribu d’Éphraïm, de la tribu de Dan et de la demi-tribu de Manassé. '
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'Les fils de Guerschom, d’après leurs familles, eurent treize villes de la tribu d’Issacar, de la tribu d’Aser, de la tribu de Nephthali et de la tribu de Manassé en Basan. '
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'Les fils de Merari, d’après leurs familles, eurent par le sort douze villes de la tribu de Ruben, de la tribu de Gad et de la tribu de Zabulon. '
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'Les enfants d’Israël donnèrent aux Lévites les villes et leurs banlieues. '
  - type: usfm
    marker: v
    metadata:
      v: '65'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: 'Ils donnèrent par le sort, de la tribu des fils de Juda, de la tribu des fils de Siméon et de la tribu des fils de Benjamin, ces villes qu’ils désignèrent nominativement. '
  - type: usfm
    marker: v
    metadata:
      v: '66'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: 'Et pour les autres familles des fils de Kehath les villes de leur territoire furent de la tribu d’Éphraïm. '
  - type: usfm
    marker: v
    metadata:
      v: '67'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: 'Ils leur donnèrent la ville de refuge Sichem et sa banlieue, dans la montagne d’Éphraïm, Guézer et sa banlieue, '
  - type: usfm
    marker: v
    metadata:
      v: '68'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: text
    text: 'Jokmeam et sa banlieue, Beth-Horon et sa banlieue, '
  - type: usfm
    marker: v
    metadata:
      v: '69'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '69'
  - type: text
    text: 'Ajalon et sa banlieue, et Gath-Rimmon et sa banlieue; '
  - type: usfm
    marker: v
    metadata:
      v: '70'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '70'
  - type: text
    text: 'et de la demi-tribu de Manassé, Aner et sa banlieue, et Bileam et sa banlieue, pour la famille des autres fils de Kehath. '
  - type: usfm
    marker: v
    metadata:
      v: '71'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '71'
  - type: text
    text: 'On donna aux fils de Guerschom: de la famille de la demi-tribu de Manassé, Golan en Basan et sa banlieue, et Aschtaroth et sa banlieue; '
  - type: usfm
    marker: v
    metadata:
      v: '72'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '72'
  - type: text
    text: 'de la tribu d’Issacar, Kédesch et sa banlieue, Dobrath et sa banlieue, '
  - type: usfm
    marker: v
    metadata:
      v: '73'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '73'
  - type: text
    text: 'Ramoth et sa banlieue, et Anem et sa banlieue; '
  - type: usfm
    marker: v
    metadata:
      v: '74'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '74'
  - type: text
    text: 'de la tribu d’Aser, Maschal et sa banlieue, Abdon et sa banlieue, '
  - type: usfm
    marker: v
    metadata:
      v: '75'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '75'
  - type: text
    text: 'Hukok et sa banlieue, et Rehob et sa banlieue; '
  - type: usfm
    marker: v
    metadata:
      v: '76'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '76'
  - type: text
    text: 'et de la tribu de Nephthali, Kédesch en Galilée et sa banlieue, Hammon et sa banlieue, et Kirjathaïm et sa banlieue. '
  - type: usfm
    marker: v
    metadata:
      v: '77'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '77'
  - type: text
    text: 'On donna au reste des Lévites, aux fils de Merari: de la tribu de Zabulon, Rimmono et sa banlieue, et Thabor et sa banlieue; '
  - type: usfm
    marker: v
    metadata:
      v: '78'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '78'
  - type: text
    text: 'et de l’autre côté du Jourdain, vis-à-vis de Jéricho, à l’orient du Jourdain: de la tribu de Ruben, Betser au désert et sa banlieue, Jahtsa et sa banlieue, '
  - type: usfm
    marker: v
    metadata:
      v: '79'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '79'
  - type: text
    text: 'Kedémoth et sa banlieue, et Méphaath et sa banlieue; '
  - type: usfm
    marker: v
    metadata:
      v: '80'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '80'
  - type: text
    text: 'et de la tribu de Gad, Ramoth en Galaad et sa banlieue, Mahanaïm et sa banlieue, '
  - type: usfm
    marker: v
    metadata:
      v: '81'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '81'
  - type: text
    text: Hesbon et sa banlieue, et Jaezer et sa banlieue.
