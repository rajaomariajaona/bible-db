  - type: text
    text: 'Fils de Lévi: Guerschom, Kehath et Merari. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fils de Kehath: Amram, Jitsehar, Hébron et Uziel. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fils d’Amram: Aaron et Moïse; et Marie. Fils d’Aaron: Nadab, Abihu, Éléazar et Ithamar. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
