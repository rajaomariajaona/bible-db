document_id: 1CH.6,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Descendants de Lévi
  - type: heading
    content: 'V. 1-15: cf. Ex 6:16-25. Esd 7:1-5. Hé 7:23.'
  - type: text
    content: ' '
  - type: note
    content: Ge 46:11. Ex 6:15. No 26:57. 1 Ch 23:6.
  - type: text
    content: 'Fils de Lévi: Guerschom, Kehath et Merari. '
  '10':
  - type: text
    content: 'Jochanan engendra Azaria, qui exerça le sacerdoce dans la maison que Salomon bâtit à Jérusalem; '
  '11':
  - type: text
    content: 'Azaria engendra Amaria; Amaria engendra Achithub; '
  '12':
  - type: text
    content: 'Achithub engendra Tsadok; Tsadok engendra Schallum; '
  '13':
  - type: text
    content: 'Schallum engendra Hilkija; Hilkija engendra Azaria; '
  '14':
  - type: text
    content: 'et Azaria engendra Seraja; Seraja engendra Jehotsadak, '
  '15':
  - type: text
    content: Jehotsadak s’en alla quand l’Éternel emmena en captivité Juda et Jérusalem par Nebucadnetsar.
  - type: heading
    content: 'V. 16-30: cf. No 3:17, etc.; 18:6. 1 Ch 23:6-23.'
  '16':
  - type: text
    content: 'Fils de Lévi: '
  - type: note
    content: Ex 6:16, 17.
  - type: text
    content: 'Guerschom, Kehath et Merari. '
  '17':
  - type: text
    content: 'Voici les noms des fils de Guerschom: Libni et Schimeï. '
  '18':
  - type: text
    content: 'Fils de Kehath: Amram, Jitsehar, Hébron et Uziel. '
  '19':
  - type: text
    content: 'Fils de Merari: Machli et Muschi. Ce sont là les familles de Lévi, selon leurs pères. '
  '2':
  - type: text
    content: 'Fils de Kehath: Amram, Jitsehar, Hébron et Uziel. '
  '20':
  - type: text
    content: 'De Guerschom: Libni, son fils; Jachath, son fils; Zimma, son fils; '
  '21':
  - type: text
    content: 'Joach, son fils; Iddo, son fils; Zérach, son fils; Jeathraï, son fils. '
  '22':
  - type: text
    content: 'Fils de Kehath: Amminadab, son fils; Koré, son fils; '
  - type: note
    content: Ex 6:23.
  - type: text
    content: 'Assir, son fils; '
  '23':
  - type: text
    content: 'Elkana, son fils; Ebjasaph, son fils; Assir, son fils; '
  '24':
  - type: text
    content: 'Thachath, son fils; Uriel, son fils; Ozias, son fils; Saül, son fils. '
  '25':
  - type: text
    content: 'Fils d’Elkana: Amasaï et Achimoth; '
  '26':
  - type: text
    content: 'Elkana, son fils; Elkana Tsophaï, son fils; Nachath, son fils; '
  '27':
  - type: text
    content: 'Éliab, son fils; Jerocham, son fils; Elkana, son fils; '
  '28':
  - type: text
    content: 'et les fils de Samuel, le premier-né Vaschni et Abija. '
  '29':
  - type: text
    content: 'Fils de Merari: Machli; Libni, son fils; Schimeï, son fils; Uzza, son fils; '
  '3':
  - type: text
    content: 'Fils d’Amram: Aaron et Moïse; et Marie. Fils d’Aaron: Nadab, Abihu, Éléazar et Ithamar. '
  '30':
  - type: text
    content: Schimea, son fils; Hagguija, son fils; Asaja, son fils.
  - type: heading
    content: 'V. 31-47: cf. 1 Ch 15:16-21; 16; 25. Ps 81:2-5; 134:1; 135:1-3.'
  '31':
  - type: text
    content: 'Voici ceux que David établit pour la direction du chant dans la maison de l’Éternel, depuis que l’arche eut un lieu de repos: '
  '32':
  - type: text
    content: 'ils remplirent les fonctions de chantres devant le tabernacle, devant la tente d’assignation, jusqu’à ce que Salomon eût bâti la maison de l’Éternel à Jérusalem, et ils faisaient leur service d’après la règle qui leur était prescrite. '
  '33':
  - type: text
    content: 'Voici ceux qui officiaient avec leurs fils. D’entre les fils des Kehathites: Héman, le chantre, fils de Joël, fils de Samuel, '
  '34':
  - type: text
    content: 'fils d’Elkana, fils de Jerocham, fils d’Éliel, fils de Thoach, '
  '35':
  - type: text
    content: 'fils de Tsuph, fils d’Elkana, fils de Machath, fils d’Amasaï, '
  '36':
  - type: text
    content: 'fils d’Elkana, fils de Joël, fils d’Azaria, fils de Sophonie, '
  '37':
  - type: text
    content: 'fils de Thachath, fils d’Assir, fils d’Ebjasaph, fils de Koré, '
  '38':
  - type: text
    content: 'fils de Jitsehar, fils de Kehath, fils de Lévi, fils d’Israël. '
  '39':
  - type: text
    content: 'Son frère Asaph, qui se tenait à sa droite, Asaph, fils de Bérékia, fils de Schimea, '
  '4':
  - type: text
    content: 'Éléazar engendra Phinées; Phinées engendra Abischua; '
  '40':
  - type: text
    content: 'fils de Micaël, fils de Baaséja, fils de Malkija, '
  '41':
  - type: text
    content: 'fils d’Éthni, fils de Zérach, fils d’Adaja, '
  '42':
  - type: text
    content: 'fils d’Éthan, fils de Zimma, fils de Schimeï, '
  '43':
  - type: text
    content: 'fils de Jachath, fils de Guerschom, fils de Lévi. '
  '44':
  - type: text
    content: 'Fils de Merari, leurs frères, à la gauche; Éthan, fils de Kischi, fils d’Abdi, fils de Malluc, '
  '45':
  - type: text
    content: 'fils de Haschabia, fils d’Amatsia, fils de Hilkija, '
  '46':
  - type: text
    content: 'fils d’Amtsi, fils de Bani, fils de Schémer, '
  '47':
  - type: text
    content: fils de Machli, fils de Muschi, fils de Merari, fils de Lévi.
  - type: heading
    content: 'V. 48-53: cf. De 33:10. 1 Ch 24:1-19.'
  '48':
  - type: text
    content: 'Leurs frères, les Lévites, étaient chargés de tout le service du tabernacle, de la maison de Dieu. '
  '49':
  - type: note
    content: Ex 30:7, 8, 10. No 4:16; 7:10; 18:1.
  - type: text
    content: 'Aaron et ses fils offraient les sacrifices sur l’autel des holocaustes et l’encens sur l’autel des parfums, ils remplissaient toutes les fonctions dans le lieu très saint, et faisaient l’expiation pour Israël, selon tout ce qu’avait ordonné Moïse, serviteur de Dieu. '
  '5':
  - type: text
    content: 'Abischua engendra Bukki; Bukki engendra Uzzi; '
  '50':
  - type: text
    content: 'Voici les fils d’Aaron: Éléazar, son fils; Phinées, son fils: Abischua, son fils; '
  '51':
  - type: text
    content: 'Bukki, son fils; Uzzi, son fils; Zerachja, son fils; '
  '52':
  - type: text
    content: 'Merajoth, son fils; Amaria, son fils; Achithub, son fils; '
  '53':
  - type: text
    content: Tsadok, son fils; Achimaats, son fils.
  - type: heading
    content: 'V. 54-81: cf. Jos 21.'
  '54':
  - type: text
    content: 'Voici leurs habitations, selon leurs enclos, dans les limites qui leur furent assignées. Aux fils d’Aaron de la famille des Kehathites, indiqués les premiers par le sort, '
  '55':
  - type: text
    content: 'on donna Hébron, dans le pays de Juda, et la banlieue qui l’entoure; '
  '56':
  - type: text
    content: 'mais le territoire de la ville et ses villages '
  - type: note
    content: Jos 21:12.
  - type: text
    content: 'furent accordés à Caleb, fils de Jephunné. '
  '57':
  - type: text
    content: 'Aux fils d’Aaron on donna la ville de refuge Hébron, Libna et sa banlieue, Jatthir, Eschthemoa et sa banlieue, '
  '58':
  - type: text
    content: 'Hilen et sa banlieue, Debir et sa banlieue, '
  '59':
  - type: text
    content: 'Aschan et sa banlieue, Beth-Schémesch et sa banlieue; '
  '6':
  - type: text
    content: 'Uzzi engendra Zerachja; Zerachja engendra Merajoth; '
  '60':
  - type: text
    content: 'et de la tribu de Benjamin, Guéba et sa banlieue, Allémeth et sa banlieue, Anathoth et sa banlieue. Total de leurs villes: treize villes, d’après leurs familles. '
  '61':
  - type: text
    content: 'Les autres fils de Kehath eurent par le sort dix villes des familles de la tribu d’Éphraïm, de la tribu de Dan et de la demi-tribu de Manassé. '
  '62':
  - type: text
    content: 'Les fils de Guerschom, d’après leurs familles, eurent treize villes de la tribu d’Issacar, de la tribu d’Aser, de la tribu de Nephthali et de la tribu de Manassé en Basan. '
  '63':
  - type: text
    content: 'Les fils de Merari, d’après leurs familles, eurent par le sort douze villes de la tribu de Ruben, de la tribu de Gad et de la tribu de Zabulon. '
  '64':
  - type: text
    content: 'Les enfants d’Israël donnèrent aux Lévites les villes et leurs banlieues. '
  '65':
  - type: text
    content: 'Ils donnèrent par le sort, de la tribu des fils de Juda, de la tribu des fils de Siméon et de la tribu des fils de Benjamin, ces villes qu’ils désignèrent nominativement. '
  '66':
  - type: text
    content: 'Et pour les autres familles des fils de Kehath les villes de leur territoire furent de la tribu d’Éphraïm. '
  '67':
  - type: text
    content: 'Ils leur donnèrent la ville de refuge Sichem et sa banlieue, dans la montagne d’Éphraïm, Guézer et sa banlieue, '
  '68':
  - type: text
    content: 'Jokmeam et sa banlieue, Beth-Horon et sa banlieue, '
  '69':
  - type: text
    content: 'Ajalon et sa banlieue, et Gath-Rimmon et sa banlieue; '
  '7':
  - type: text
    content: 'Merajoth engendra Amaria; Amaria engendra Achithub; '
  '70':
  - type: text
    content: 'et de la demi-tribu de Manassé, Aner et sa banlieue, et Bileam et sa banlieue, pour la famille des autres fils de Kehath. '
  '71':
  - type: text
    content: 'On donna aux fils de Guerschom: de la famille de la demi-tribu de Manassé, Golan en Basan et sa banlieue, et Aschtaroth et sa banlieue; '
  '72':
  - type: text
    content: 'de la tribu d’Issacar, Kédesch et sa banlieue, Dobrath et sa banlieue, '
  '73':
  - type: text
    content: 'Ramoth et sa banlieue, et Anem et sa banlieue; '
  '74':
  - type: text
    content: 'de la tribu d’Aser, Maschal et sa banlieue, Abdon et sa banlieue, '
  '75':
  - type: text
    content: 'Hukok et sa banlieue, et Rehob et sa banlieue; '
  '76':
  - type: text
    content: 'et de la tribu de Nephthali, Kédesch en Galilée et sa banlieue, Hammon et sa banlieue, et Kirjathaïm et sa banlieue. '
  '77':
  - type: text
    content: 'On donna au reste des Lévites, aux fils de Merari: de la tribu de Zabulon, Rimmono et sa banlieue, et Thabor et sa banlieue; '
  '78':
  - type: text
    content: 'et de l’autre côté du Jourdain, vis-à-vis de Jéricho, à l’orient du Jourdain: de la tribu de Ruben, Betser au désert et sa banlieue, Jahtsa et sa banlieue, '
  '79':
  - type: text
    content: 'Kedémoth et sa banlieue, et Méphaath et sa banlieue; '
  '8':
  - type: text
    content: 'Achithub engendra '
  - type: note
    content: 2 S 8:17; 15:27.
  - type: text
    content: 'Tsadok; Tsadok engendra Achimaats; '
  '80':
  - type: text
    content: 'et de la tribu de Gad, Ramoth en Galaad et sa banlieue, Mahanaïm et sa banlieue, '
  '81':
  - type: text
    content: Hesbon et sa banlieue, et Jaezer et sa banlieue.
  '9':
  - type: text
    content: 'Achimaats engendra Azaria; Azaria engendra Jochanan; '
