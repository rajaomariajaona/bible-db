document_id: PSA.38,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: Ps 6; 39; 70.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Psaume de David. Pour souvenir.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Seigneur! Tous mes désirs sont devant toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et mes soupirs ne te sont point cachés.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon cœur est agité, ma force m’abandonne,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la lumière de mes yeux n’est plus même avec moi.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes amis et mes connaissances s’éloignent de ma plaie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et mes proches se tiennent à l’écart.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux qui en veulent à ma vie tendent leurs pièges;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux qui cherchent mon malheur disent des méchancetés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et méditent tout le jour des tromperies.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et moi, je suis comme un sourd, je n’entends pas;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis comme un muet, qui n’ouvre pas la bouche.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis comme un homme qui n’entend pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et dans la bouche duquel il n’y a point de réplique.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Éternel! C’est en toi que j’espère;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu répondras, Seigneur, mon Dieu!
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car je dis: Ne permets pas qu’ils se réjouissent à mon sujet,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’ils s’élèvent contre moi, si mon pied chancelle!
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car je suis près de tomber,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ma douleur est toujours devant moi.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 32:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Car je reconnais mon iniquité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis dans la crainte à cause de mon péché.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 6:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Éternel! Ne me punis pas dans ta colère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ne me châtie pas dans ta fureur.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et mes ennemis sont pleins de vie, pleins de force;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux qui me haïssent sans cause sont nombreux.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils me rendent le mal pour le bien;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils sont mes adversaires, parce que je recherche le bien.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne m’abandonne pas, Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon Dieu, ne t’éloigne pas de moi!
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Viens en hâte à mon secours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Seigneur, mon salut!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car tes flèches m’ont atteint,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ta main s’est appesantie sur moi.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n’y a rien de sain dans ma chair à cause de ta colère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n’y a plus de vigueur dans mes os à cause de mon péché.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car mes iniquités s’élèvent au-dessus de ma tête;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme un lourd fardeau, elles sont trop pesantes pour moi.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes plaies sont infectes et purulentes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par l’effet de ma folie.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis courbé, abattu au dernier point;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 42:10
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 43:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Tout le jour je marche dans la tristesse.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car un mal brûlant dévore mes entrailles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il n’y a rien de sain dans ma chair.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis sans force, entièrement brisé;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le trouble de mon cœur m’arrache des gémissements.
