document_id: PSA.38
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: Ps 6; 39; 70.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Psaume de David. Pour souvenir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 6:2
      metadata:
        usfm: PSA.6.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Éternel! Ne me punis pas dans ta colère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ne me châtie pas dans ta fureur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Car tes flèches m’ont atteint,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ta main s’est appesantie sur moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Il n’y a rien de sain dans ma chair à cause de ta colère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il n’y a plus de vigueur dans mes os à cause de mon péché.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Car mes iniquités s’élèvent au-dessus de ma tête;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme un lourd fardeau, elles sont trop pesantes pour moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mes plaies sont infectes et purulentes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Par l’effet de ma folie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Je suis courbé, abattu au dernier point;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 42:10
      metadata:
        usfm: PSA.42.10
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 43:2
      metadata:
        usfm: PSA.43.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Tout le jour je marche dans la tristesse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Car un mal brûlant dévore mes entrailles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il n’y a rien de sain dans ma chair.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Je suis sans force, entièrement brisé;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le trouble de mon cœur m’arrache des gémissements.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Seigneur! Tous mes désirs sont devant toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et mes soupirs ne te sont point cachés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mon cœur est agité, ma force m’abandonne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la lumière de mes yeux n’est plus même avec moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mes amis et mes connaissances s’éloignent de ma plaie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et mes proches se tiennent à l’écart.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ceux qui en veulent à ma vie tendent leurs pièges;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ceux qui cherchent mon malheur disent des méchancetés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et méditent tout le jour des tromperies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Et moi, je suis comme un sourd, je n’entends pas;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je suis comme un muet, qui n’ouvre pas la bouche.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Je suis comme un homme qui n’entend pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et dans la bouche duquel il n’y a point de réplique.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Éternel! C’est en toi que j’espère;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu répondras, Seigneur, mon Dieu!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Car je dis: Ne permets pas qu’ils se réjouissent à mon sujet,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’ils s’élèvent contre moi, si mon pied chancelle!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Car je suis près de tomber,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ma douleur est toujours devant moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 32:5
      metadata:
        usfm: PSA.32.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Car je reconnais mon iniquité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je suis dans la crainte à cause de mon péché.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Et mes ennemis sont pleins de vie, pleins de force;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ceux qui me haïssent sans cause sont nombreux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ils me rendent le mal pour le bien;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils sont mes adversaires, parce que je recherche le bien.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ne m’abandonne pas, Éternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon Dieu, ne t’éloigne pas de moi!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Viens en hâte à mon secours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Seigneur, mon salut!
