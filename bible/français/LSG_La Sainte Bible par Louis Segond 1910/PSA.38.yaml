document_id: PSA.38,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ps 6; 39; 70.
  - type: text
    content: Psaume de David. Pour souvenir.
  '10':
  - type: text
    content: Seigneur! Tous mes désirs sont devant toi,
  - type: text
    content: Et mes soupirs ne te sont point cachés.
  '11':
  - type: text
    content: Mon cœur est agité, ma force m’abandonne,
  - type: text
    content: Et la lumière de mes yeux n’est plus même avec moi.
  '12':
  - type: text
    content: Mes amis et mes connaissances s’éloignent de ma plaie,
  - type: text
    content: Et mes proches se tiennent à l’écart.
  '13':
  - type: text
    content: Ceux qui en veulent à ma vie tendent leurs pièges;
  - type: text
    content: Ceux qui cherchent mon malheur disent des méchancetés,
  - type: text
    content: Et méditent tout le jour des tromperies.
  '14':
  - type: text
    content: Et moi, je suis comme un sourd, je n’entends pas;
  - type: text
    content: Je suis comme un muet, qui n’ouvre pas la bouche.
  '15':
  - type: text
    content: Je suis comme un homme qui n’entend pas,
  - type: text
    content: Et dans la bouche duquel il n’y a point de réplique.
  '16':
  - type: text
    content: Éternel! C’est en toi que j’espère;
  - type: text
    content: Tu répondras, Seigneur, mon Dieu!
  '17':
  - type: text
    content: 'Car je dis: Ne permets pas qu’ils se réjouissent à mon sujet,'
  - type: text
    content: Qu’ils s’élèvent contre moi, si mon pied chancelle!
  '18':
  - type: text
    content: Car je suis près de tomber,
  - type: text
    content: Et ma douleur est toujours devant moi.
  '19':
  - type: text
    content: ' '
  - type: note
    content: Ps 32:5.
  - type: text
    content: Car je reconnais mon iniquité,
  - type: text
    content: Je suis dans la crainte à cause de mon péché.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Ps 6:2.
  - type: text
    content: Éternel! Ne me punis pas dans ta colère,
  - type: text
    content: Et ne me châtie pas dans ta fureur.
  '20':
  - type: text
    content: Et mes ennemis sont pleins de vie, pleins de force;
  - type: text
    content: Ceux qui me haïssent sans cause sont nombreux.
  '21':
  - type: text
    content: Ils me rendent le mal pour le bien;
  - type: text
    content: Ils sont mes adversaires, parce que je recherche le bien.
  '22':
  - type: text
    content: Ne m’abandonne pas, Éternel!
  - type: text
    content: Mon Dieu, ne t’éloigne pas de moi!
  '23':
  - type: text
    content: Viens en hâte à mon secours,
  - type: text
    content: Seigneur, mon salut!
  '3':
  - type: text
    content: Car tes flèches m’ont atteint,
  - type: text
    content: Et ta main s’est appesantie sur moi.
  '4':
  - type: text
    content: Il n’y a rien de sain dans ma chair à cause de ta colère,
  - type: text
    content: Il n’y a plus de vigueur dans mes os à cause de mon péché.
  '5':
  - type: text
    content: Car mes iniquités s’élèvent au-dessus de ma tête;
  - type: text
    content: Comme un lourd fardeau, elles sont trop pesantes pour moi.
  '6':
  - type: text
    content: Mes plaies sont infectes et purulentes,
  - type: text
    content: Par l’effet de ma folie.
  '7':
  - type: text
    content: Je suis courbé, abattu au dernier point;
  - type: note
    content: Ps 42:10; 43:2.
  - type: text
    content: Tout le jour je marche dans la tristesse.
  '8':
  - type: text
    content: Car un mal brûlant dévore mes entrailles,
  - type: text
    content: Et il n’y a rien de sain dans ma chair.
  '9':
  - type: text
    content: Je suis sans force, entièrement brisé;
  - type: text
    content: Le trouble de mon cœur m’arrache des gémissements.
