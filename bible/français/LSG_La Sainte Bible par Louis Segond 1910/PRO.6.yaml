document_id: PRO.6,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-5: cf. Pr 11:15; 22:26, 27; 20:25.'
  - type: text
    content: Mon fils, si tu as cautionné ton prochain,
  - type: text
    content: Si tu t’es engagé pour autrui,
  '10':
  - type: text
    content: Un peu de sommeil, un peu d’assoupissement,
  - type: text
    content: Un peu croiser les mains pour dormir!…
  '11':
  - type: text
    content: Et la pauvreté te surprendra, comme un rôdeur,
  - type: text
    content: Et la disette, comme un homme en armes.
  - type: heading
    content: 'V. 12-19: cf. Ps 36:2-5; 5:5-7.'
  '12':
  - type: text
    content: L’homme pervers, l’homme inique,
  - type: text
    content: Marche la fausseté dans la bouche;
  '13':
  - type: text
    content: Il cligne des yeux, parle du pied,
  - type: text
    content: Fait des signes avec les doigts;
  '14':
  - type: text
    content: La perversité est dans son cœur,
  - type: text
    content: Il médite le mal en tout temps,
  - type: text
    content: Il excite des querelles.
  '15':
  - type: text
    content: Aussi sa ruine arrivera-t-elle subitement;
  - type: text
    content: Il sera brisé tout d’un coup, et sans remède.
  '16':
  - type: text
    content: Il y a six choses que hait l’Éternel,
  - type: text
    content: Et même sept qu’il a en horreur;
  '17':
  - type: text
    content: ' '
  - type: note
    content: Pr 30:13.
  - type: text
    content: Les yeux hautains, la langue menteuse,
  - type: text
    content: Les mains qui répandent le sang innocent,
  '18':
  - type: text
    content: Le cœur qui médite des projets iniques,
  - type: note
    content: Ro 3:15.
  - type: text
    content: Les pieds qui se hâtent de courir au mal,
  '19':
  - type: text
    content: Le faux témoin qui dit des mensonges,
  - type: text
    content: Et celui qui excite des querelles entre frères.
  - type: heading
    content: 'V. 20-35: cf. Pr 5; 7.'
  '2':
  - type: text
    content: Si tu es enlacé par les paroles de ta bouche,
  - type: text
    content: Si tu es pris par les paroles de ta bouche,
  '20':
  - type: text
    content: 'Mon fils, '
  - type: note
    content: Pr 1:8.
  - type: text
    content: garde les préceptes de ton père,
  - type: text
    content: Et ne rejette pas l’enseignement de ta mère.
  '21':
  - type: text
    content: 'Lie-les constamment sur ton '
  - type: note
    content: Pr 3:3.
  - type: text
    content: cœur,
  - type: text
    content: Attache-les à ton cou.
  '22':
  - type: text
    content: ' '
  - type: note
    content: Pr 3:23, 24.
  - type: text
    content: Ils te dirigeront dans ta marche,
  - type: text
    content: Ils te garderont sur ta couche,
  - type: text
    content: Ils te parleront à ton réveil.
  '23':
  - type: text
    content: 'Car le '
  - type: note
    content: Ps 19:9; 119:105.
  - type: text
    content: précepte est une lampe, et l’enseignement une lumière,
  - type: text
    content: 'Et les avertissements de la correction sont le chemin de la vie:'
  '24':
  - type: text
    content: Ils te préserveront de la femme corrompue,
  - type: note
    content: Pr 2:16; 5:3; 7:5.
  - type: text
    content: De la langue doucereuse de l’étrangère.
  '25':
  - type: text
    content: Ne la convoite pas dans ton cœur pour sa beauté,
  - type: text
    content: Et ne te laisse pas séduire par ses paupières.
  '26':
  - type: text
    content: Car pour la femme prostituée on se réduit à un morceau de pain,
  - type: text
    content: Et la femme mariée tend un piège à la vie précieuse.
  '27':
  - type: text
    content: Quelqu’un mettra-t-il du feu dans son sein,
  - type: text
    content: Sans que ses vêtements s’enflamment?
  '28':
  - type: text
    content: Quelqu’un marchera-t-il sur des charbons ardents,
  - type: text
    content: Sans que ses pieds soient brûlés?
  '29':
  - type: text
    content: 'Il en est de même pour celui qui va vers la femme de son prochain:'
  - type: text
    content: Quiconque la touche ne restera pas impuni.
  '3':
  - type: text
    content: Fais donc ceci, mon fils, dégage-toi,
  - type: text
    content: Puisque tu es tombé au pouvoir de ton prochain;
  - type: text
    content: Va, prosterne-toi, et fais des instances auprès de lui;
  '30':
  - type: text
    content: On ne tient pas pour innocent le voleur qui dérobe
  - type: text
    content: Pour satisfaire son appétit, quand il a faim;
  '31':
  - type: text
    content: 'Si on le trouve, il fera une restitution au '
  - type: note
    content: Ex 22:1, 4.
  - type: text
    content: septuple,
  - type: text
    content: Il donnera tout ce qu’il a dans sa maison.
  '32':
  - type: text
    content: Mais celui qui commet un adultère avec une femme est dépourvu de sens,
  - type: text
    content: Celui qui veut se perdre agit de la sorte;
  '33':
  - type: text
    content: Il n’aura que plaie et ignominie,
  - type: text
    content: Et son opprobre ne s’effacera point.
  '34':
  - type: text
    content: Car la jalousie met un homme en fureur,
  - type: text
    content: Et il est sans pitié au jour de la vengeance;
  '35':
  - type: text
    content: Il n’a égard à aucune rançon,
  - type: text
    content: Et il est inflexible, quand même tu multiplierais les dons.
  '4':
  - type: text
    content: Ne donne ni sommeil à tes yeux,
  - type: text
    content: Ni assoupissement à tes paupières;
  '5':
  - type: text
    content: Dégage-toi comme la gazelle de la main du chasseur,
  - type: text
    content: Comme l’oiseau de la main de l’oiseleur.
  - type: heading
    content: 'V. 6-11: cf. Pr 26:13-16; 24:30-34.'
  '6':
  - type: text
    content: Va vers la fourmi, paresseux;
  - type: text
    content: Considère ses voies, et deviens sage.
  '7':
  - type: text
    content: Elle n’a ni chef,
  - type: text
    content: Ni inspecteur, ni maître;
  '8':
  - type: text
    content: Elle prépare en été sa nourriture,
  - type: text
    content: Elle amasse pendant la moisson de quoi manger.
  '9':
  - type: text
    content: ' '
  - type: note
    content: Pr 13:4; 20:4; 24:33, 34.
  - type: text
    content: Paresseux, jusqu’à quand seras-tu couché?
  - type: text
    content: Quand te lèveras-tu de ton sommeil?
