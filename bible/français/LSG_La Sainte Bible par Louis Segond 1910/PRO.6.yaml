document_id: PRO.6,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-5: cf. Pr 11:15; 22:26, 27; 20:25.'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon fils, si tu as cautionné ton prochain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si tu t’es engagé pour autrui,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un peu de sommeil, un peu d’assoupissement,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un peu croiser les mains pour dormir!…
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la pauvreté te surprendra, comme un rôdeur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la disette, comme un homme en armes.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 12-19: cf. Ps 36:2-5; 5:5-7.'
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’homme pervers, l’homme inique,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Marche la fausseté dans la bouche;
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il cligne des yeux, parle du pied,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fait des signes avec les doigts;
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La perversité est dans son cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il médite le mal en tout temps,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il excite des querelles.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aussi sa ruine arrivera-t-elle subitement;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il sera brisé tout d’un coup, et sans remède.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il y a six choses que hait l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et même sept qu’il a en horreur;
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 30:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Les yeux hautains, la langue menteuse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les mains qui répandent le sang innocent,
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le cœur qui médite des projets iniques,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 3:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Les pieds qui se hâtent de courir au mal,
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le faux témoin qui dit des mensonges,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et celui qui excite des querelles entre frères.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 20-35: cf. Pr 5; 7.'
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si tu es enlacé par les paroles de ta bouche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si tu es pris par les paroles de ta bouche,
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mon fils, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 1:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: garde les préceptes de ton père,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ne rejette pas l’enseignement de ta mère.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Lie-les constamment sur ton '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 3:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Attache-les à ton cou.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 3:23
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '24'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ils te dirigeront dans ta marche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils te garderont sur ta couche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils te parleront à ton réveil.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car le '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 19:9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 119:105
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: précepte est une lampe, et l’enseignement une lumière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et les avertissements de la correction sont le chemin de la vie:'
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils te préserveront de la femme corrompue,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 2:16
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:3
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: De la langue doucereuse de l’étrangère.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne la convoite pas dans ton cœur pour sa beauté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ne te laisse pas séduire par ses paupières.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car pour la femme prostituée on se réduit à un morceau de pain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la femme mariée tend un piège à la vie précieuse.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quelqu’un mettra-t-il du feu dans son sein,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sans que ses vêtements s’enflamment?
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quelqu’un marchera-t-il sur des charbons ardents,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sans que ses pieds soient brûlés?
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Il en est de même pour celui qui va vers la femme de son prochain:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quiconque la touche ne restera pas impuni.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fais donc ceci, mon fils, dégage-toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Puisque tu es tombé au pouvoir de ton prochain;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Va, prosterne-toi, et fais des instances auprès de lui;
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On ne tient pas pour innocent le voleur qui dérobe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour satisfaire son appétit, quand il a faim;
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Si on le trouve, il fera une restitution au '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 22:1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '4'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: septuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il donnera tout ce qu’il a dans sa maison.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais celui qui commet un adultère avec une femme est dépourvu de sens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui veut se perdre agit de la sorte;
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n’aura que plaie et ignominie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et son opprobre ne s’effacera point.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car la jalousie met un homme en fureur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il est sans pitié au jour de la vengeance;
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n’a égard à aucune rançon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il est inflexible, quand même tu multiplierais les dons.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne donne ni sommeil à tes yeux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ni assoupissement à tes paupières;
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dégage-toi comme la gazelle de la main du chasseur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme l’oiseau de la main de l’oiseleur.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 6-11: cf. Pr 26:13-16; 24:30-34.'
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Va vers la fourmi, paresseux;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Considère ses voies, et deviens sage.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle n’a ni chef,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ni inspecteur, ni maître;
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle prépare en été sa nourriture,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle amasse pendant la moisson de quoi manger.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 13:4
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 20:4
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 24:33
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '34'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Paresseux, jusqu’à quand seras-tu couché?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand te lèveras-tu de ton sommeil?
