document_id: PRO.6
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-5: cf. Pr 11:15; 22:26, 27; 20:25.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Mon fils, si tu as cautionné ton prochain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si tu t’es engagé pour autrui,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Si tu es enlacé par les paroles de ta bouche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si tu es pris par les paroles de ta bouche,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fais donc ceci, mon fils, dégage-toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Puisque tu es tombé au pouvoir de ton prochain;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Va, prosterne-toi, et fais des instances auprès de lui;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ne donne ni sommeil à tes yeux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ni assoupissement à tes paupières;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Dégage-toi comme la gazelle de la main du chasseur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme l’oiseau de la main de l’oiseleur.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 6-11: cf. Pr 26:13-16; 24:30-34.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Va vers la fourmi, paresseux;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Considère ses voies, et deviens sage.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Elle n’a ni chef,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ni inspecteur, ni maître;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Elle prépare en été sa nourriture,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle amasse pendant la moisson de quoi manger.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 13:4
      metadata:
        usfm: PRO.13.4
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 20:4
      metadata:
        usfm: PRO.20.4
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 24:33
      metadata:
        usfm: PRO.24.33
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '34'
      metadata:
        usfm: PRO.24.34
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Paresseux, jusqu’à quand seras-tu couché?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand te lèveras-tu de ton sommeil?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Un peu de sommeil, un peu d’assoupissement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Un peu croiser les mains pour dormir!…
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Et la pauvreté te surprendra, comme un rôdeur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la disette, comme un homme en armes.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 12-19: cf. Ps 36:2-5; 5:5-7.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: L’homme pervers, l’homme inique,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Marche la fausseté dans la bouche;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Il cligne des yeux, parle du pied,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fait des signes avec les doigts;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: La perversité est dans son cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il médite le mal en tout temps,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il excite des querelles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Aussi sa ruine arrivera-t-elle subitement;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il sera brisé tout d’un coup, et sans remède.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Il y a six choses que hait l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et même sept qu’il a en horreur;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 30:13
      metadata:
        usfm: PRO.30.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Les yeux hautains, la langue menteuse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les mains qui répandent le sang innocent,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Le cœur qui médite des projets iniques,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 3:15
      metadata:
        usfm: ROM.3.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Les pieds qui se hâtent de courir au mal,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Le faux témoin qui dit des mensonges,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et celui qui excite des querelles entre frères.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 20-35: cf. Pr 5; 7.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Mon fils, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 1:8
      metadata:
        usfm: PRO.1.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: garde les préceptes de ton père,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ne rejette pas l’enseignement de ta mère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Lie-les constamment sur ton '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 3:3
      metadata:
        usfm: PRO.3.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Attache-les à ton cou.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 3:23
      metadata:
        usfm: PRO.3.23
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '24'
      metadata:
        usfm: PRO.3.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ils te dirigeront dans ta marche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils te garderont sur ta couche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils te parleront à ton réveil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Car le '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 19:9
      metadata:
        usfm: PSA.19.9
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 119:105
      metadata:
        usfm: PSA.119.105
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: précepte est une lampe, et l’enseignement une lumière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et les avertissements de la correction sont le chemin de la vie:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ils te préserveront de la femme corrompue,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 2:16
      metadata:
        usfm: PRO.2.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 5:3
      metadata:
        usfm: PRO.5.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 7:5
      metadata:
        usfm: PRO.7.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: De la langue doucereuse de l’étrangère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ne la convoite pas dans ton cœur pour sa beauté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ne te laisse pas séduire par ses paupières.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Car pour la femme prostituée on se réduit à un morceau de pain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la femme mariée tend un piège à la vie précieuse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Quelqu’un mettra-t-il du feu dans son sein,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sans que ses vêtements s’enflamment?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Quelqu’un marchera-t-il sur des charbons ardents,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sans que ses pieds soient brûlés?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Il en est de même pour celui qui va vers la femme de son prochain:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quiconque la touche ne restera pas impuni.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: On ne tient pas pour innocent le voleur qui dérobe
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour satisfaire son appétit, quand il a faim;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Si on le trouve, il fera une restitution au '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 22:1
      metadata:
        usfm: EXO.22.1
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '4'
      metadata:
        usfm: EXO.22.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: septuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il donnera tout ce qu’il a dans sa maison.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Mais celui qui commet un adultère avec une femme est dépourvu de sens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celui qui veut se perdre agit de la sorte;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Il n’aura que plaie et ignominie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et son opprobre ne s’effacera point.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Car la jalousie met un homme en fureur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il est sans pitié au jour de la vengeance;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Il n’a égard à aucune rançon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il est inflexible, quand même tu multiplierais les dons.
