document_id: 2CO.7,93
type_code: fra
verses:
  '1':
  - type: text
    content: Ayant donc de telles promesses, bien-aimés, purifions-nous de toute souillure de la chair et de l’esprit, en achevant notre sanctification dans la crainte de Dieu.
  - type: heading
    content: 'V. 2-16: cf. 2 Co 6:11-13; 2:1-13. 1 Th 3:5-9. Pr 25:25. Hé 13:17.'
  '10':
  - type: note
    content: 2 S 12:13. Mt 26:75. Lu 18:13.
  - type: text
    content: 'En effet, la tristesse selon Dieu produit une repentance à salut dont on ne se repent jamais, tandis que la tristesse du monde produit la mort. '
  '11':
  - type: text
    content: 'Et voici, cette même tristesse selon Dieu, quel empressement n’a-t-elle pas produit en vous! Quelle justification, quelle indignation, quelle crainte, quel désir ardent, quel zèle, quelle punition! Vous avez montré à tous égards que vous étiez purs dans cette affaire. '
  '12':
  - type: text
    content: 'Si donc je vous ai écrit, ce n’était ni à cause de celui qui a fait l’injure, ni à cause de celui qui l’a reçue; c’était afin que votre empressement pour nous fût manifesté parmi vous devant Dieu. '
  '13':
  - type: text
    content: 'C’est pourquoi nous avons été consolés. Mais, outre notre consolation, nous avons été réjouis beaucoup plus encore par la joie de Tite, dont l’esprit a été tranquillisé par vous tous. '
  '14':
  - type: text
    content: 'Et si devant lui je me suis un peu glorifié à votre sujet, je n’en ai point eu de confusion; mais, comme nous vous avons toujours parlé selon la vérité, ce dont nous nous sommes glorifiés auprès de Tite s’est trouvé être aussi la vérité. '
  '15':
  - type: text
    content: 'Il éprouve pour vous un redoublement d’affection, au souvenir de votre obéissance à tous, et de l’accueil que vous lui avez fait avec crainte et tremblement. '
  '16':
  - type: text
    content: Je me réjouis de pouvoir en toutes choses me confier en vous.
  '2':
  - type: text
    content: 'Donnez-nous une place dans vos cœurs! Nous n’avons fait tort à personne, nous n’avons ruiné personne, nous n’avons tiré du profit de personne. '
  '3':
  - type: text
    content: 'Ce n’est pas pour vous condamner que je parle de la sorte; '
  - type: note
    content: 2 Co 6:11, 12, 13.
  - type: text
    content: 'car j’ai déjà dit que vous êtes dans nos cœurs à la vie et à la mort. '
  '4':
  - type: text
    content: 'J’ai une grande confiance en vous, j’ai tout sujet de me glorifier de vous; '
  - type: note
    content: Mt 5:12. Ac 5:41. Ph 2:17. Col 1:24.
  - type: text
    content: 'je suis rempli de consolation, je suis comblé de joie au milieu de toutes nos tribulations. '
  '5':
  - type: text
    content: 'Car, depuis notre arrivée en Macédoine, notre chair n’eut aucun repos; '
  - type: note
    content: Ac 16:19, 23.
  - type: text
    content: 'nous étions affligés de toute manière: luttes au-dehors, craintes au-dedans. '
  '6':
  - type: note
    content: 2 Co 1:4.
  - type: text
    content: 'Mais Dieu, qui console ceux qui sont abattus, nous a consolés par l’arrivée de Tite, '
  '7':
  - type: text
    content: 'et non seulement par son arrivée, mais encore par la consolation que Tite lui-même ressentait à votre sujet: il nous a raconté votre ardent désir, vos larmes, votre zèle pour moi, en sorte que ma joie a été d’autant plus grande. '
  '8':
  - type: text
    content: 'Quoique je vous aie attristés par ma lettre, je ne m’en repens pas. Et, si je m’en suis repenti, car je vois que cette lettre vous a attristés, bien que momentanément, '
  '9':
  - type: text
    content: 'je me réjouis à cette heure, non pas de ce que vous avez été attristés, mais de ce que votre tristesse vous a portés à la repentance; car vous avez été attristés selon Dieu, afin de ne recevoir de notre part aucun dommage. '
