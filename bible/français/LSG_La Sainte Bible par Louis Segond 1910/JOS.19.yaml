document_id: JOS.19,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-9: cf. 1 Ch 4:24-33. Jos 15:21-32. Ge 49:7.'
  - type: text
    content: 'La seconde part échut par le sort à Siméon, à la tribu des fils de Siméon, selon leurs familles. Leur héritage était au milieu de l’héritage des fils de Juda. '
  '10':
  - type: text
    content: 'La troisième part échut par le sort aux fils de Zabulon, selon leurs familles. '
  '11':
  - type: text
    content: 'La limite de leur héritage s’étendait jusqu’à Sarid. Elle montait à l’occident vers Mareala, et touchait à Dabbéscheth, puis au torrent qui coule devant Jokneam. '
  '12':
  - type: text
    content: 'De Sarid elle tournait à l’orient, vers le soleil levant, jusqu’à la frontière de Kisloth-Thabor, continuait à Dabrath, et montait à Japhia. '
  '13':
  - type: text
    content: 'De là elle passait à l’orient par Guittha-Hépher, par Ittha-Katsin, continuait à Rimmon, et se prolongeait jusqu’à Néa. '
  '14':
  - type: text
    content: 'Elle tournait ensuite du côté du nord vers Hannathon, et aboutissait à la vallée de Jiphthach-El. '
  '15':
  - type: text
    content: 'De plus, Katthath, Nahalal, Schimron, Jideala, Bethléhem. Douze villes, et leurs villages. '
  '16':
  - type: text
    content: Tel fut l’héritage des fils de Zabulon, selon leurs familles, ces villes-là et leurs villages.
  - type: heading
    content: 'V. 17-23: cf. (Ge 49:14, 15. De 33:18, 19.)'
  '17':
  - type: text
    content: 'La quatrième part échut par le sort à Issacar, aux fils d’Issacar, selon leurs familles. '
  '18':
  - type: text
    content: 'Leur limite passait par Jizreel, Kesulloth, Sunem, '
  '19':
  - type: text
    content: 'Hapharaïm, Schion, Anacharath, '
  '2':
  - type: text
    content: 'Ils eurent dans leur héritage: Beer-Schéba, Schéba, Molada, '
  '20':
  - type: text
    content: 'Rabbith, Kischjon, Abets, '
  '21':
  - type: text
    content: 'Rémeth, En-Gannim, En-Hadda, et Beth-Patsets; '
  '22':
  - type: text
    content: 'elle touchait à Thabor, à Schachatsima, à Beth-Schémesch, et aboutissait au Jourdain. Seize villes, et leurs villages. '
  '23':
  - type: text
    content: Tel fut l’héritage de la tribu des fils d’Issacar, selon leurs familles, ces villes-là et leurs villages.
  - type: heading
    content: 'V. 24-31: cf. (Ge 49:20. De 33:24, 25.)'
  '24':
  - type: text
    content: 'La cinquième part échut par le sort à la tribu des fils d’Aser, selon leurs familles. '
  '25':
  - type: text
    content: 'Leur limite passait par Helkath, Hali, Béthen, Acschaph, '
  '26':
  - type: text
    content: 'Allammélec, Amead et Mischeal; elle touchait, vers l’occident, au Carmel et au Schichor-Libnath; '
  '27':
  - type: text
    content: 'puis elle tournait du côté de l’orient à Beth-Dagon, atteignait Zabulon et la vallée de Jiphthach-El au nord de Beth-Émek et de Neïel, et se prolongeait vers Cabul, à gauche, '
  '28':
  - type: text
    content: 'et vers Ébron, Rehob, Hammon et Kana, jusqu’à Sidon la grande. '
  '29':
  - type: text
    content: 'Elle tournait ensuite vers Rama jusqu’à la ville forte de Tyr, et vers Hosa, pour aboutir à la mer, par la contrée d’Aczib. '
  '3':
  - type: text
    content: 'Hatsar-Schual, Bala, Atsem, '
  '30':
  - type: text
    content: 'De plus, Umma, Aphek et Rehob. Vingt-deux villes, et leurs villages. '
  '31':
  - type: text
    content: Tel fut l’héritage de la tribu des fils d’Aser, selon leurs familles, ces villes-là et leurs villages.
  - type: heading
    content: 'V. 32-39: cf. (De 33:23.)'
  '32':
  - type: text
    content: 'La sixième part échut par le sort aux fils de Nephthali, selon leurs familles. '
  '33':
  - type: text
    content: 'Leur limite s’étendait depuis Héleph, depuis Allon, par Tsaanannim, Adami-Nékeb et Jabneel, jusqu’à Lakkum, et elle aboutissait au Jourdain. '
  '34':
  - type: text
    content: 'Elle tournait vers l’occident à Aznoth-Thabor, et de là continuait à Hukkok; elle touchait à Zabulon du côté du midi, à Aser du côté de l’occident, et à Juda; le Jourdain était du côté de l’orient. '
  '35':
  - type: text
    content: 'Les villes fortes étaient: Tsiddim, Tser, Hammath, Rakkath, Kinnéreth, '
  '36':
  - type: text
    content: 'Adama, Rama, Hatsor, '
  '37':
  - type: text
    content: 'Kédesch, Édréï, En-Hatsor, '
  '38':
  - type: text
    content: 'Jireon, Migdal-El, Horem, Beth-Anath et Beth-Schémesch. Dix-neuf villes, et leurs villages. '
  '39':
  - type: text
    content: Tel fut l’héritage de la tribu des fils de Nephthali, selon leurs familles, ces villes-là et leurs villages.
  - type: heading
    content: 'V. 40-48: cf. (Ge 49:16, 17. De 33:22.) Jg 18.'
  '4':
  - type: text
    content: 'Eltholad, Bethul, Horma, '
  '40':
  - type: text
    content: 'La septième part échut par le sort à la tribu des fils de Dan, selon leurs familles. '
  '41':
  - type: text
    content: 'La limite de leur héritage comprenait Tsorea, Eschthaol, Ir-Schémesch, '
  '42':
  - type: text
    content: 'Schaalabbin, Ajalon, Jithla, '
  '43':
  - type: text
    content: 'Élon, Thimnatha, Ékron, '
  '44':
  - type: text
    content: 'Eltheké, Guibbethon, Baalath, '
  '45':
  - type: text
    content: 'Jehud, Bené-Berak, Gath-Rimmon, '
  '46':
  - type: text
    content: 'Mé-Jarkon et Rakkon, avec le territoire vis-à-vis de Japho. '
  '47':
  - type: text
    content: 'Le territoire des fils de Dan s’étendait hors de chez eux. Les fils de Dan montèrent et combattirent contre Léschem; ils s’en emparèrent et la frappèrent du tranchant de l’épée; ils en prirent possession, s’y établirent, et l’appelèrent Dan, du nom de Dan, leur père. '
  '48':
  - type: text
    content: Tel fut l’héritage de la tribu des fils de Dan, selon leurs familles, ces villes-là et leurs villages.
  - type: heading
    content: La ville de Thimnath-Sérach accordée à Josué
  - type: heading
    content: 'V. 49-51: cf. Jos 14:6-15. Éz 45:7, 8.'
  '49':
  - type: text
    content: 'Lorsqu’ils eurent achevé de faire le partage du pays, d’après ses limites, les enfants d’Israël donnèrent à Josué, fils de Nun, une possession au milieu d’eux. '
  '5':
  - type: text
    content: 'Tsiklag, Beth-Marcaboth, Hatsar-Susa, '
  '50':
  - type: text
    content: 'Selon l’ordre de l’Éternel, ils lui donnèrent la ville qu’il demanda, Thimnath-Sérach, dans la montagne d’Éphraïm. Il rebâtit la ville, et y fit sa demeure. '
  '51':
  - type: text
    content: Tels sont les héritages que le sacrificateur Éléazar, Josué, fils de Nun, et les chefs de famille des tribus des enfants d’Israël, distribuèrent par le sort devant l’Éternel à Silo, à l’entrée de la tente d’assignation. Ils achevèrent ainsi le partage du pays.
  '6':
  - type: text
    content: 'Beth-Lebaoth et Scharuchen, treize villes, et leurs villages; '
  '7':
  - type: text
    content: 'Aïn, Rimmon, Éther, et Aschan, quatre villes, et leurs villages; '
  '8':
  - type: text
    content: 'et tous les villages aux environs de ces villes, jusqu’à Baalath-Beer, qui est Ramath du midi. Tel fut l’héritage de la tribu des fils de Siméon, selon leurs familles. '
  '9':
  - type: text
    content: L’héritage des fils de Siméon fut pris sur la portion des fils de Juda; car la portion des fils de Juda était trop grande pour eux, et c’est au milieu de leur héritage que les fils de Siméon reçurent le leur.
  - type: heading
    content: 'V. 10-16: cf. (Ge 49:13. De 33:18, 19.)'
