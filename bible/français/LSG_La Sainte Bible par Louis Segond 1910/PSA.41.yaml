document_id: PSA.41,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Mt 5:7. Ps 112.) Ps 55.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Au chef des chantres. Psaume de David.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Celui-là même avec qui j’étais en paix,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Qui avait ma confiance et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 13:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: qui mangeait mon pain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lève le talon contre moi.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Toi, Éternel, aie pitié de moi et rétablis-moi!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je leur rendrai ce qui leur est dû.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Je connaîtrai que tu m’aimes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si mon ennemi ne triomphe pas de moi.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Tu m’as soutenu à cause de mon intégrité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tu m’as placé pour toujours en ta présence.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Béni soit l’Éternel, le Dieu d’Israël, d’éternité en éternité! Amen! Amen!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Heureux celui qui s’intéresse au pauvre!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au jour du malheur l’Éternel le délivre;
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: L’Éternel le garde et lui conserve la vie.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est heureux sur la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tu ne le livres pas au bon plaisir de ses ennemis.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: L’Éternel le soutient sur son lit de douleur;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu le soulages dans toutes ses maladies.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Je dis: Éternel, aie pitié de moi!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Guéris mon âme! Car j’ai péché contre toi.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Mes ennemis disent méchamment de moi:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand mourra-t-il? Quand périra son nom?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Si quelqu’un vient me voir, il prend un langage faux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il recueille des sujets de médire;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il s’en va, et il parle au-dehors.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Tous mes ennemis chuchotent entre eux contre moi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ils pensent que mon malheur causera ma ruine:'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Il est dangereusement atteint,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le voilà couché, il ne se relèvera pas!
