document_id: PSA.41,93
type_code: fra
verses:
  '1':
  - type: heading
    content: (Mt 5:7. Ps 112.) Ps 55.
  - type: text
    content: Au chef des chantres. Psaume de David.
  '10':
  - type: text
    content: Celui-là même avec qui j’étais en paix,
  - type: text
    content: 'Qui avait ma confiance et '
  - type: note
    content: Jn 13:18.
  - type: text
    content: qui mangeait mon pain,
  - type: text
    content: Lève le talon contre moi.
  '11':
  - type: text
    content: Toi, Éternel, aie pitié de moi et rétablis-moi!
  - type: text
    content: Et je leur rendrai ce qui leur est dû.
  '12':
  - type: text
    content: Je connaîtrai que tu m’aimes,
  - type: text
    content: Si mon ennemi ne triomphe pas de moi.
  '13':
  - type: text
    content: Tu m’as soutenu à cause de mon intégrité,
  - type: text
    content: Et tu m’as placé pour toujours en ta présence.
  '14':
  - type: text
    content: Béni soit l’Éternel, le Dieu d’Israël, d’éternité en éternité! Amen! Amen!
  '2':
  - type: text
    content: Heureux celui qui s’intéresse au pauvre!
  - type: text
    content: Au jour du malheur l’Éternel le délivre;
  '3':
  - type: text
    content: L’Éternel le garde et lui conserve la vie.
  - type: text
    content: Il est heureux sur la terre,
  - type: text
    content: Et tu ne le livres pas au bon plaisir de ses ennemis.
  '4':
  - type: text
    content: L’Éternel le soutient sur son lit de douleur;
  - type: text
    content: Tu le soulages dans toutes ses maladies.
  '5':
  - type: text
    content: 'Je dis: Éternel, aie pitié de moi!'
  - type: text
    content: Guéris mon âme! Car j’ai péché contre toi.
  '6':
  - type: text
    content: 'Mes ennemis disent méchamment de moi:'
  - type: text
    content: Quand mourra-t-il? Quand périra son nom?
  '7':
  - type: text
    content: Si quelqu’un vient me voir, il prend un langage faux,
  - type: text
    content: Il recueille des sujets de médire;
  - type: text
    content: Il s’en va, et il parle au-dehors.
  '8':
  - type: text
    content: Tous mes ennemis chuchotent entre eux contre moi;
  - type: text
    content: 'Ils pensent que mon malheur causera ma ruine:'
  '9':
  - type: text
    content: Il est dangereusement atteint,
  - type: text
    content: Le voilà couché, il ne se relèvera pas!
