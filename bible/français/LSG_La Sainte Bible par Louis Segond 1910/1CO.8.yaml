document_id: 1CO.8,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Réponse aux questions des Corinthiens sur les viandes sacrifiées aux idoles
  - type: heading
    content: 'V. 1-13: cf. 1 Co 10:19-33. Ro 14:13-23.'
  - type: text
    content: 'Pour ce qui concerne les viandes sacrifiées aux idoles, nous savons que nous avons tous la connaissance. La connaissance enfle, mais la charité édifie. '
  '10':
  - type: text
    content: 'Car, si quelqu’un te voit, toi qui as de la connaissance, assis à table dans un temple d’idoles, sa conscience, à lui qui est faible, ne le portera-t-elle pas à manger des viandes sacrifiées aux idoles? '
  '11':
  - type: note
    content: Ro 14:15.
  - type: text
    content: 'Et ainsi le faible périra par ta connaissance, le frère pour lequel Christ est mort! '
  '12':
  - type: text
    content: 'En péchant de la sorte contre les frères, et en blessant leur conscience faible, vous péchez contre Christ. '
  '13':
  - type: note
    content: Ro 14:21. 2 Co 11:29.
  - type: text
    content: C’est pourquoi, si un aliment scandalise mon frère, je ne mangerai jamais de viande, afin de ne pas scandaliser mon frère.
  '2':
  - type: text
    content: 'Si quelqu’un croit savoir quelque chose, il n’a pas encore connu comme il faut connaître. '
  '3':
  - type: text
    content: 'Mais si quelqu’un aime Dieu, celui-là est connu de lui. '
  '4':
  - type: note
    content: Ro 14:4.
  - type: text
    content: 'Pour ce qui est donc de manger des viandes sacrifiées aux idoles, nous savons '
  - type: note
    content: 1 Co 10:19.
  - type: text
    content: 'qu’il n’y a point d’idole dans le monde, '
  - type: note
    content: De 4:39. Ép 4:6.
  - type: text
    content: 'et qu’il n’y a qu’un seul Dieu. '
  '5':
  - type: text
    content: 'Car, s’il est des êtres qui sont appelés dieux, soit dans le ciel, soit sur la terre, comme il existe réellement plusieurs dieux et plusieurs seigneurs, '
  '6':
  - type: note
    content: Mal 2:10. Ép 4:6.
  - type: text
    content: 'néanmoins pour nous il n’y a qu’un seul Dieu, le Père, '
  - type: note
    content: Ro 11:36.
  - type: text
    content: 'de qui viennent toutes choses et pour qui nous sommes, '
  - type: note
    content: Jn 13:13. 1 Co 12:3. Ph 2:11.
  - type: text
    content: 'et un seul Seigneur, Jésus-Christ, par qui sont toutes choses et par qui nous sommes. '
  '7':
  - type: text
    content: 'Mais cette connaissance n’est pas chez tous. '
  - type: note
    content: 1 Co 10:28.
  - type: text
    content: 'Quelques-uns, d’après la manière dont ils envisagent encore l’idole, mangent de ces viandes comme étant sacrifiées aux idoles, et leur conscience, qui est faible, en est souillée. '
  '8':
  - type: note
    content: Ro 14:17.
  - type: text
    content: 'Ce n’est pas un aliment qui nous rapproche de Dieu: si nous en mangeons, nous n’avons rien de plus; si nous n’en mangeons pas, nous n’avons rien de moins. '
  '9':
  - type: note
    content: Ga 5:13.
  - type: text
    content: 'Prenez garde, toutefois, que votre liberté ne devienne une pierre d’achoppement pour les faibles. '
