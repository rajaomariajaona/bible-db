document_id: 1CO.8
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Réponse aux questions des Corinthiens sur les viandes sacrifiées aux idoles
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-13: cf. 1 Co 10:19-33. Ro 14:13-23.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Pour ce qui concerne les viandes sacrifiées aux idoles, nous savons que nous avons tous la connaissance. La connaissance enfle, mais la charité édifie. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Si quelqu’un croit savoir quelque chose, il n’a pas encore connu comme il faut connaître. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mais si quelqu’un aime Dieu, celui-là est connu de lui. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 14:4
      metadata:
        usfm: ROM.14.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Pour ce qui est donc de manger des viandes sacrifiées aux idoles, nous savons '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 10:19
      metadata:
        usfm: 1CO.10.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qu’il n’y a point d’idole dans le monde, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 4:39
      metadata:
        usfm: DEU.4.39
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 4:6
      metadata:
        usfm: EPH.4.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et qu’il n’y a qu’un seul Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Car, s’il est des êtres qui sont appelés dieux, soit dans le ciel, soit sur la terre, comme il existe réellement plusieurs dieux et plusieurs seigneurs, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mal 2:10
      metadata:
        usfm: MAL.2.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 4:6
      metadata:
        usfm: EPH.4.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'néanmoins pour nous il n’y a qu’un seul Dieu, le Père, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 11:36
      metadata:
        usfm: ROM.11.36
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'de qui viennent toutes choses et pour qui nous sommes, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 13:13
      metadata:
        usfm: JHN.13.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 12:3
      metadata:
        usfm: 1CO.12.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 2:11
      metadata:
        usfm: PHP.2.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et un seul Seigneur, Jésus-Christ, par qui sont toutes choses et par qui nous sommes. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mais cette connaissance n’est pas chez tous. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 10:28
      metadata:
        usfm: 1CO.10.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Quelques-uns, d’après la manière dont ils envisagent encore l’idole, mangent de ces viandes comme étant sacrifiées aux idoles, et leur conscience, qui est faible, en est souillée. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 14:17
      metadata:
        usfm: ROM.14.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ce n’est pas un aliment qui nous rapproche de Dieu: si nous en mangeons, nous n’avons rien de plus; si nous n’en mangeons pas, nous n’avons rien de moins. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 5:13
      metadata:
        usfm: GAL.5.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Prenez garde, toutefois, que votre liberté ne devienne une pierre d’achoppement pour les faibles. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Car, si quelqu’un te voit, toi qui as de la connaissance, assis à table dans un temple d’idoles, sa conscience, à lui qui est faible, ne le portera-t-elle pas à manger des viandes sacrifiées aux idoles? '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 14:15
      metadata:
        usfm: ROM.14.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Et ainsi le faible périra par ta connaissance, le frère pour lequel Christ est mort! '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'En péchant de la sorte contre les frères, et en blessant leur conscience faible, vous péchez contre Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 14:21
      metadata:
        usfm: ROM.14.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 11:29
      metadata:
        usfm: 2CO.11.29
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: C’est pourquoi, si un aliment scandalise mon frère, je ne mangerai jamais de viande, afin de ne pas scandaliser mon frère.
