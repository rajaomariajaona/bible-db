document_id: GEN.1,93
type_code: fra
verses:
  '1':
  - type: heading
    content: LES TEMPS ANCIENS
  - type: heading
    content: DEPUIS LA CRÉATION JUSQU’À ABRAHAM
  - type: heading
    content: 'Ch. 1 à 11: 9. (Ac 17:24-28.)'
  - type: heading
    content: Création du monde
  - type: heading
    content: 'V. 1: cf. Né 9:6. (Ps 124:8. Jé 32:17; 10:12.) Ro 1:20. Ap 4:11. Jn 1:1-3.'
  - type: text
    content: 'Au '
  - type: note
    content: Job 38:4. Ps 33:6; 89:12; 136:5. Ac 14:15; 17:24. Hé 11:3.
  - type: text
    content: commencement, Dieu créa les cieux et la terre.
  - type: heading
    content: 'V. 2-5: cf. Ps 104:2. És 45:7. 2 Co 4:6.'
  '10':
  - type: text
    content: 'Dieu appela le sec terre, et il appela l’amas des eaux mers. Dieu vit que cela était bon. '
  '11':
  - type: text
    content: 'Puis Dieu dit: Que la terre produise de la verdure, de l’herbe portant de la semence, des arbres fruitiers donnant du fruit selon leur espèce et ayant en eux leur semence sur la terre. Et cela fut ainsi. '
  '12':
  - type: text
    content: 'La terre produisit de la verdure, de l’herbe portant de la semence selon son espèce, et des arbres donnant du fruit et ayant en eux leur semence selon leur espèce. Dieu vit que cela était bon. '
  '13':
  - type: text
    content: 'Ainsi, il y eut un soir, et il y eut un matin: ce fut le troisième jour.'
  - type: heading
    content: 'V. 14-19: cf. Ps 104:19; 136:7-9; 148:3, 5, 6.'
  '14':
  - type: text
    content: 'Dieu dit: '
  - type: note
    content: Ps 136:7.
  - type: text
    content: 'Qu’il y ait des luminaires dans l’étendue du ciel, pour séparer le jour d’avec la nuit; que ce soient des signes pour marquer les époques, les jours et les années; '
  '15':
  - type: text
    content: 'et '
  - type: note
    content: De 4:19. Jé 31:35.
  - type: text
    content: 'qu’ils servent de luminaires dans l’étendue du ciel, pour éclairer la terre. Et cela fut ainsi. '
  '16':
  - type: text
    content: 'Dieu fit les deux grands luminaires, le plus grand luminaire pour présider au jour, et le plus petit luminaire pour présider à la nuit; il fit aussi les étoiles. '
  '17':
  - type: text
    content: 'Dieu les plaça dans l’étendue du ciel, pour éclairer la terre, '
  '18':
  - type: text
    content: 'pour présider au jour et à la nuit, et pour séparer la lumière d’avec les ténèbres. Dieu vit que cela était bon. '
  '19':
  - type: text
    content: 'Ainsi, il y eut un soir, et il y eut un matin: ce fut le quatrième jour.'
  - type: heading
    content: 'V. 20-23: cf. Ps 104:24-26; 148:7, 10.'
  '2':
  - type: text
    content: 'La terre était informe et vide: il y avait des ténèbres à la surface de l’abîme, et l’esprit de Dieu se mouvait au-dessus des eaux. '
  '20':
  - type: text
    content: 'Dieu dit: Que les eaux produisent en abondance des animaux vivants, et que des oiseaux volent sur la terre vers l’étendue du ciel. '
  '21':
  - type: text
    content: 'Dieu créa les grands poissons et tous les animaux vivants qui se meuvent, et que les eaux produisirent en abondance selon leur espèce; il créa aussi tout oiseau ailé selon son espèce. Dieu vit que cela était bon. '
  '22':
  - type: text
    content: 'Dieu les bénit, en disant: '
  - type: note
    content: Ge 8:17.
  - type: text
    content: 'Soyez féconds, multipliez, et remplissez les eaux des mers; et que les oiseaux multiplient sur la terre. '
  '23':
  - type: text
    content: 'Ainsi, il y eut un soir, et il y eut un matin: ce fut le cinquième jour.'
  - type: heading
    content: 'V. 24-31: cf. Ge 2:19, 20. (Ge 5:1, 2; 2:7, 21-23.) Ps 8:5-9. (Ec 7:29. Ép 4:24.)'
  '24':
  - type: text
    content: 'Dieu dit: Que la terre produise des animaux vivants selon leur espèce, du bétail, des reptiles et des animaux terrestres, selon leur espèce. Et cela fut ainsi. '
  '25':
  - type: text
    content: 'Dieu fit les animaux de la terre selon leur espèce, le bétail selon son espèce, et tous les reptiles de la terre selon leur espèce. Dieu vit que cela était bon. '
  '26':
  - type: text
    content: 'Puis Dieu dit: Faisons l’homme à notre image, selon notre ressemblance, et qu’il domine sur les poissons de la mer, sur les oiseaux du ciel, sur le bétail, sur toute la terre, et sur tous les reptiles qui rampent sur la terre. '
  '27':
  - type: text
    content: 'Dieu créa l’homme '
  - type: note
    content: Ge 5:1; 9:6. 1 Co 11:7. Ép 4:24. Col 3:10.
  - type: text
    content: 'à son image, il le créa à l’image de Dieu, il créa '
  - type: note
    content: Mt 19:4.
  - type: text
    content: 'l’homme et la femme. '
  '28':
  - type: text
    content: 'Dieu les bénit, et Dieu leur dit: '
  - type: note
    content: Ge 8:17; 9:1, 2, 7.
  - type: text
    content: 'Soyez féconds, multipliez, remplissez la terre, et l’assujettissez; et dominez sur les poissons de la mer, sur les oiseaux du ciel, et sur tout animal qui se meut sur la terre. '
  '29':
  - type: text
    content: 'Et Dieu dit: Voici, '
  - type: note
    content: Ge 9:3. Ps 104:14, 15.
  - type: text
    content: 'je vous donne toute herbe portant de la semence et qui est à la surface de toute la terre, et tout arbre ayant en lui du fruit d’arbre et portant de la semence: ce sera votre nourriture. '
  '3':
  - type: text
    content: 'Dieu dit: '
  - type: note
    content: 2 Co 4:6.
  - type: text
    content: 'Que la lumière soit! Et la lumière fut. '
  '30':
  - type: note
    content: Ps 104:14.
  - type: text
    content: 'Et à tout animal de la terre, à tout oiseau du ciel, et à tout ce qui se meut sur la terre, ayant en soi un souffle de vie, je donne toute herbe verte pour nourriture. Et cela fut ainsi. '
  '31':
  - type: text
    content: 'Dieu vit tout ce qu’il avait fait et voici, '
  - type: note
    content: De 32:4. Mc 7:37.
  - type: text
    content: 'cela était très bon. Ainsi, il y eut un soir, et il y eut un matin: ce fut le sixième jour.'
  '4':
  - type: text
    content: 'Dieu vit que la lumière était bonne; et Dieu sépara la lumière d’avec les ténèbres. '
  '5':
  - type: text
    content: 'Dieu appela la lumière jour, et il appela les ténèbres nuit. Ainsi, il y eut un soir, et il y eut un matin: ce fut le premier jour.'
  - type: heading
    content: 'V. 6-8: cf. Ps 104:2, 3; 19:2.'
  '6':
  - type: text
    content: ' '
  - type: note
    content: Ps 33:6; 104:2; 136:5. Pr 8:28. És 42:5. Jé 10:12; 51:15.
  - type: text
    content: 'Dieu dit: Qu’il y ait une étendue entre les eaux, et qu’elle sépare les eaux d’avec les eaux. '
  '7':
  - type: text
    content: 'Et Dieu fit l’étendue, et il sépara les eaux qui sont '
  - type: note
    content: Ps 33:7; 136:6. Pr 8:24.
  - type: text
    content: 'au-dessous de l’étendue d’avec les eaux qui sont '
  - type: note
    content: Ps 148:4.
  - type: text
    content: 'au-dessus de l’étendue. Et cela fut ainsi. '
  '8':
  - type: text
    content: 'Dieu appela l’étendue ciel. Ainsi, il y eut un soir, et il y eut un matin: ce fut le second jour.'
  - type: heading
    content: 'V. 9-13: cf. Job 38:8-11. Ps 104:6-9, 14-16.'
  '9':
  - type: text
    content: 'Dieu dit: '
  - type: note
    content: Job 26:10; 38:8. Ps 24:2; 33:7; 136:6.
  - type: text
    content: 'Que les eaux qui sont au-dessous du ciel se rassemblent en un seul lieu, et que le sec paraisse. Et cela fut ainsi. '
