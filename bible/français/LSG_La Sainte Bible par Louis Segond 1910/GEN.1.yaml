    children:
    - type: text
      text: DEPUIS LA CRÉATION JUSQU’À ABRAHAM
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: 'Ch. 1 à 11: 9. (Ac 17:24-28.)'
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Création du monde
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1: cf. Né 9:6. (Ps 124:8. Jé 32:17; 10:12.) Ro 1:20. Ap 4:11. Jn 1:1-3.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Au '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 38:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 33:6
      - type: text
        text: '; '
