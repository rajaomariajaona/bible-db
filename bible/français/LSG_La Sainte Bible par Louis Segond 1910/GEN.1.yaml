        - type: text
          text: Hé 11:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: commencement, Dieu créa les cieux et la terre.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 2-5: cf. Ps 104:2. És 45:7. 2 Co 4:6.'
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu appela le sec terre, et il appela l’amas des eaux mers. Dieu vit que cela était bon. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis Dieu dit: Que la terre produise de la verdure, de l’herbe portant de la semence, des arbres fruitiers donnant du fruit selon leur espèce et ayant en eux leur semence sur la terre. Et cela fut ainsi. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La terre produisit de la verdure, de l’herbe portant de la semence selon son espèce, et des arbres donnant du fruit et ayant en eux leur semence selon leur espèce. Dieu vit que cela était bon. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi, il y eut un soir, et il y eut un matin: ce fut le troisième jour.'
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 14-19: cf. Ps 104:19; 136:7-9; 148:3, 5, 6.'
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu dit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 136:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Qu’il y ait des luminaires dans l’étendue du ciel, pour séparer le jour d’avec la nuit; que ce soient des signes pour marquer les époques, les jours et les années; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 4:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 31:35
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'qu’ils servent de luminaires dans l’étendue du ciel, pour éclairer la terre. Et cela fut ainsi. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu fit les deux grands luminaires, le plus grand luminaire pour présider au jour, et le plus petit luminaire pour présider à la nuit; il fit aussi les étoiles. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu les plaça dans l’étendue du ciel, pour éclairer la terre, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'pour présider au jour et à la nuit, et pour séparer la lumière d’avec les ténèbres. Dieu vit que cela était bon. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi, il y eut un soir, et il y eut un matin: ce fut le quatrième jour.'
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 20-23: cf. Ps 104:24-26; 148:7, 10.'
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La terre était informe et vide: il y avait des ténèbres à la surface de l’abîme, et l’esprit de Dieu se mouvait au-dessus des eaux. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu dit: Que les eaux produisent en abondance des animaux vivants, et que des oiseaux volent sur la terre vers l’étendue du ciel. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu créa les grands poissons et tous les animaux vivants qui se meuvent, et que les eaux produisirent en abondance selon leur espèce; il créa aussi tout oiseau ailé selon son espèce. Dieu vit que cela était bon. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu les bénit, en disant: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 8:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Soyez féconds, multipliez, et remplissez les eaux des mers; et que les oiseaux multiplient sur la terre. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi, il y eut un soir, et il y eut un matin: ce fut le cinquième jour.'
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 24-31: cf. Ge 2:19, 20. (Ge 5:1, 2; 2:7, 21-23.) Ps 8:5-9. (Ec 7:29. Ép 4:24.)'
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu dit: Que la terre produise des animaux vivants selon leur espèce, du bétail, des reptiles et des animaux terrestres, selon leur espèce. Et cela fut ainsi. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu fit les animaux de la terre selon leur espèce, le bétail selon son espèce, et tous les reptiles de la terre selon leur espèce. Dieu vit que cela était bon. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis Dieu dit: Faisons l’homme à notre image, selon notre ressemblance, et qu’il domine sur les poissons de la mer, sur les oiseaux du ciel, sur le bétail, sur toute la terre, et sur tous les reptiles qui rampent sur la terre. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu créa l’homme '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 5:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 11:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 4:24
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 3:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'à son image, il le créa à l’image de Dieu, il créa '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 19:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'l’homme et la femme. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu les bénit, et Dieu leur dit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 8:17
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '7'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Soyez féconds, multipliez, remplissez la terre, et l’assujettissez; et dominez sur les poissons de la mer, sur les oiseaux du ciel, et sur tout animal qui se meut sur la terre. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et Dieu dit: Voici, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 9:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 104:14
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '15'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'je vous donne toute herbe portant de la semence et qui est à la surface de toute la terre, et tout arbre ayant en lui du fruit d’arbre et portant de la semence: ce sera votre nourriture. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu dit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 4:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Que la lumière soit! Et la lumière fut. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 104:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Et à tout animal de la terre, à tout oiseau du ciel, et à tout ce qui se meut sur la terre, ayant en soi un souffle de vie, je donne toute herbe verte pour nourriture. Et cela fut ainsi. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu vit tout ce qu’il avait fait et voici, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 32:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 7:37
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'cela était très bon. Ainsi, il y eut un soir, et il y eut un matin: ce fut le sixième jour.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu vit que la lumière était bonne; et Dieu sépara la lumière d’avec les ténèbres. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu appela la lumière jour, et il appela les ténèbres nuit. Ainsi, il y eut un soir, et il y eut un matin: ce fut le premier jour.'
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 6-8: cf. Ps 104:2, 3; 19:2.'
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 33:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 104:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 136:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 8:28
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 42:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 10:12
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 51:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Dieu dit: Qu’il y ait une étendue entre les eaux, et qu’elle sépare les eaux d’avec les eaux. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et Dieu fit l’étendue, et il sépara les eaux qui sont '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 33:7
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 136:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 8:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'au-dessous de l’étendue d’avec les eaux qui sont '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 148:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'au-dessus de l’étendue. Et cela fut ainsi. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu appela l’étendue ciel. Ainsi, il y eut un soir, et il y eut un matin: ce fut le second jour.'
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 9-13: cf. Job 38:8-11. Ps 104:6-9, 14-16.'
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu dit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 26:10
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 38:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 24:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 33:7
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 136:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Que les eaux qui sont au-dessous du ciel se rassemblent en un seul lieu, et que le sec paraisse. Et cela fut ainsi. '
