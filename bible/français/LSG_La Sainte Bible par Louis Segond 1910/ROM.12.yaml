document_id: ROM.12,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Exhortations. Consécration à Dieu. Humilité et fidélité dans l’exercice des dons et fonctions
  - type: heading
    content: 'V. 1-8: cf. 1 Co 6:19, 20. (1 Co 12. Ép 4:1-16. 1 Pi 4:10, 11.)'
  - type: text
    content: 'Je vous exhorte donc, frères, par les compassions de Dieu, '
  - type: note
    content: 1 Pi 2:5.
  - type: text
    content: 'à offrir vos corps '
  - type: note
    content: Ro 6:13, 16.
  - type: text
    content: 'comme un sacrifice vivant, saint, agréable à Dieu, ce qui sera de votre part un culte raisonnable. '
  '10':
  - type: note
    content: Ép 4:2. Hé 13:1. 1 Pi 1:22; 2:17.
  - type: text
    content: 'Par amour fraternel, '
  - type: note
    content: Ph 2:3. 1 Pi 5:5.
  - type: text
    content: 'soyez pleins d’affection les uns pour les autres; par honneur, usez de prévenances réciproques. '
  '11':
  - type: text
    content: 'Ayez du zèle, et non de la paresse. Soyez fervents d’esprit. Servez le Seigneur. '
  '12':
  - type: note
    content: Ro 15:13. 1 Th 5:16.
  - type: text
    content: 'Réjouissez-vous en espérance. '
  - type: note
    content: Hé 10:36; 12:1. Ja 5:7.
  - type: text
    content: 'Soyez patients dans l’affliction. '
  - type: note
    content: Lu 18:1. Ép 6:18. Col 4:2. 1 Th 5:17.
  - type: text
    content: 'Persévérez dans la prière. '
  '13':
  - type: note
    content: 1 Co 16:1.
  - type: text
    content: 'Pourvoyez aux besoins des saints. '
  - type: note
    content: Hé 13:2. 1 Pi 4:9.
  - type: text
    content: 'Exercez l’hospitalité. '
  '14':
  - type: note
    content: Mt 5:44. 1 Co 4:12.
  - type: text
    content: 'Bénissez ceux qui vous persécutent, bénissez et ne maudissez pas. '
  '15':
  - type: text
    content: 'Réjouissez-vous avec ceux qui se réjouissent; pleurez avec ceux qui pleurent. '
  '16':
  - type: note
    content: Ro 15:5. 1 Co 1:10. Ph 2:2; 3:16. 1 Pi 3:8.
  - type: text
    content: 'Ayez les mêmes sentiments les uns envers les autres. '
  - type: note
    content: Pr 3:7. És 5:21.
  - type: text
    content: N’aspirez pas à ce qui est élevé, mais laissez-vous attirer par ce qui est humble. Ne soyez point sages à vos propres yeux.
  - type: heading
    content: 'V. 17-21: cf. Mt 5:38-48. Pr 25:21, 22.'
  '17':
  - type: text
    content: ' '
  - type: note
    content: Pr 20:22. Mt 5:39. 1 Co 6:7. 1 Th 5:15.
  - type: text
    content: 'Ne rendez à personne le mal pour le mal. '
  - type: note
    content: 2 Co 8:21. 1 Pi 2:12.
  - type: text
    content: 'Recherchez ce qui est bien devant tous les hommes. '
  '18':
  - type: note
    content: Mc 9:50. Hé 12:14.
  - type: text
    content: 'S’il est possible, autant que cela dépende de vous, soyez en paix avec tous les hommes. '
  '19':
  - type: note
    content: Mt 5:39. Lu 6:29.
  - type: text
    content: 'Ne vous vengez point vous-mêmes, bien-aimés, mais laissez agir la colère; car il est écrit: '
  - type: note
    content: De 32:35. Hé 10:30.
  - type: text
    content: 'A moi la vengeance, à moi la rétribution, dit le Seigneur. '
  '2':
  - type: note
    content: 1 Jn 2:15.
  - type: text
    content: 'Ne vous conformez pas au siècle présent, mais soyez transformés par le renouvellement de l’intelligence, '
  - type: note
    content: Ép 5:17. 1 Th 4:3.
  - type: text
    content: 'afin que vous discerniez quelle est la volonté de Dieu, ce qui est bon, agréable et parfait. '
  '20':
  - type: note
    content: Pr 25:21. Mt 5:44.
  - type: text
    content: 'Mais si ton ennemi a faim, donne-lui à manger; s’il a soif, donne-lui à boire; car en agissant ainsi, ce sont des charbons ardents que tu amasseras sur sa tête. '
  '21':
  - type: text
    content: Ne te laisse pas vaincre par le mal, mais surmonte le mal par le bien.
  '3':
  - type: text
    content: 'Par la grâce '
  - type: note
    content: Ro 1:5.
  - type: text
    content: 'qui m’a été donnée, je dis à chacun de vous '
  - type: note
    content: Ép 4:7.
  - type: text
    content: 'de n’avoir pas de lui-même une trop haute opinion, mais de revêtir des sentiments modestes, selon la mesure de foi que '
  - type: note
    content: 1 Co 12:11. Ép 4:7.
  - type: text
    content: 'Dieu a départie à chacun. '
  '4':
  - type: text
    content: 'Car, '
  - type: note
    content: 1 Co 12:27. Ép 1:23; 4:16; 5:23. Col 1:24.
  - type: text
    content: 'comme nous avons plusieurs membres dans un seul corps, et que tous les membres n’ont pas la même fonction, '
  '5':
  - type: note
    content: 1 Co 12:4. 2 Co 10:13. 1 Pi 4:10.
  - type: text
    content: 'ainsi, nous qui sommes plusieurs, nous formons un seul corps en Christ, et nous sommes tous membres les uns des autres. '
  '6':
  - type: text
    content: 'Puisque nous avons '
  - type: note
    content: 1 Co 12:4.
  - type: text
    content: 'des dons différents, selon la grâce qui nous a été accordée, que celui qui a le don '
  - type: note
    content: 1 Co 12:10.
  - type: text
    content: 'de prophétie l’exerce selon l’analogie de la foi; '
  '7':
  - type: text
    content: 'que celui qui est appelé '
  - type: note
    content: 1 Pi 4:10, 11.
  - type: text
    content: 'au ministère s’attache à son ministère; que celui qui enseigne s’attache à son enseignement, '
  '8':
  - type: text
    content: 'et celui qui exhorte à l’exhortation. Que celui qui donne le fasse '
  - type: note
    content: Mt 6:1, 2, 3.
  - type: text
    content: 'avec libéralité; que celui qui préside le fasse avec zèle; que celui qui pratique la miséricorde le fasse '
  - type: note
    content: De 15:7. 2 Co 9:7.
  - type: text
    content: avec joie.
  - type: heading
    content: Applications diverses de la charité
  - type: heading
    content: 'V. 9-16: cf. 1 Pi 3:8-12; 4:7-9; 5:5. Hé 13:1-3, 16.'
  '9':
  - type: text
    content: 'Que la charité soit sans hypocrisie. '
  - type: note
    content: Ps 97:10. Am 5:15.
  - type: text
    content: 'Ayez le mal en horreur; attachez-vous fortement au bien. '
