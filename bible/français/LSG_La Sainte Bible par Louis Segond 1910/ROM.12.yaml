document_id: ROM.12
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Exhortations. Consécration à Dieu. Humilité et fidélité dans l’exercice des dons et fonctions
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-8: cf. 1 Co 6:19, 20. (1 Co 12. Ép 4:1-16. 1 Pi 4:10, 11.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Je vous exhorte donc, frères, par les compassions de Dieu, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 2:5
      metadata:
        usfm: 1PE.2.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'à offrir vos corps '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 6:13
      metadata:
        usfm: ROM.6.13
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '16'
      metadata:
        usfm: ROM.6.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'comme un sacrifice vivant, saint, agréable à Dieu, ce qui sera de votre part un culte raisonnable. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 2:15
      metadata:
        usfm: 1JN.2.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ne vous conformez pas au siècle présent, mais soyez transformés par le renouvellement de l’intelligence, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 5:17
      metadata:
        usfm: EPH.5.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 4:3
      metadata:
        usfm: 1TH.4.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'afin que vous discerniez quelle est la volonté de Dieu, ce qui est bon, agréable et parfait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Par la grâce '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 1:5
      metadata:
        usfm: ROM.1.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qui m’a été donnée, je dis à chacun de vous '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 4:7
      metadata:
        usfm: EPH.4.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'de n’avoir pas de lui-même une trop haute opinion, mais de revêtir des sentiments modestes, selon la mesure de foi que '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 12:11
      metadata:
        usfm: 1CO.12.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 4:7
      metadata:
        usfm: EPH.4.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Dieu a départie à chacun. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Car, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 12:27
      metadata:
        usfm: 1CO.12.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 1:23
      metadata:
        usfm: EPH.1.23
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 4:16
      metadata:
        usfm: EPH.4.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 5:23
      metadata:
        usfm: EPH.5.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 1:24
      metadata:
        usfm: COL.1.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'comme nous avons plusieurs membres dans un seul corps, et que tous les membres n’ont pas la même fonction, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 12:4
      metadata:
        usfm: 1CO.12.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 10:13
      metadata:
        usfm: 2CO.10.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 4:10
      metadata:
        usfm: 1PE.4.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ainsi, nous qui sommes plusieurs, nous formons un seul corps en Christ, et nous sommes tous membres les uns des autres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Puisque nous avons '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 12:4
      metadata:
        usfm: 1CO.12.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'des dons différents, selon la grâce qui nous a été accordée, que celui qui a le don '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 12:10
      metadata:
        usfm: 1CO.12.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'de prophétie l’exerce selon l’analogie de la foi; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'que celui qui est appelé '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 4:10
      metadata:
        usfm: 1PE.4.10
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '11'
      metadata:
        usfm: 1PE.4.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'au ministère s’attache à son ministère; que celui qui enseigne s’attache à son enseignement, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'et celui qui exhorte à l’exhortation. Que celui qui donne le fasse '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 6:1
      metadata:
        usfm: MAT.6.1
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '2'
      metadata:
        usfm: MAT.6.2
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '3'
      metadata:
        usfm: MAT.6.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'avec libéralité; que celui qui préside le fasse avec zèle; que celui qui pratique la miséricorde le fasse '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 15:7
      metadata:
        usfm: DEU.15.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 9:7
      metadata:
        usfm: 2CO.9.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: avec joie.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Applications diverses de la charité
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 9-16: cf. 1 Pi 3:8-12; 4:7-9; 5:5. Hé 13:1-3, 16.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Que la charité soit sans hypocrisie. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 97:10
      metadata:
        usfm: PSA.97.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Am 5:15
      metadata:
        usfm: AMO.5.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ayez le mal en horreur; attachez-vous fortement au bien. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 4:2
      metadata:
        usfm: EPH.4.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 13:1
      metadata:
        usfm: HEB.13.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 1:22
      metadata:
        usfm: 1PE.1.22
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2:17
      metadata:
        usfm: 1PE.2.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Par amour fraternel, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 2:3
      metadata:
        usfm: PHP.2.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 5:5
      metadata:
        usfm: 1PE.5.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'soyez pleins d’affection les uns pour les autres; par honneur, usez de prévenances réciproques. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ayez du zèle, et non de la paresse. Soyez fervents d’esprit. Servez le Seigneur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 15:13
      metadata:
        usfm: ROM.15.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 5:16
      metadata:
        usfm: 1TH.5.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Réjouissez-vous en espérance. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 10:36
      metadata:
        usfm: HEB.10.36
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 12:1
      metadata:
        usfm: HEB.12.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ja 5:7
      metadata:
        usfm: JAS.5.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Soyez patients dans l’affliction. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 18:1
      metadata:
        usfm: LUK.18.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 6:18
      metadata:
        usfm: EPH.6.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 4:2
      metadata:
        usfm: COL.4.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 5:17
      metadata:
        usfm: 1TH.5.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Persévérez dans la prière. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 16:1
      metadata:
        usfm: 1CO.16.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Pourvoyez aux besoins des saints. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 13:2
      metadata:
        usfm: HEB.13.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 4:9
      metadata:
        usfm: 1PE.4.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Exercez l’hospitalité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 5:44
      metadata:
        usfm: MAT.5.44
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 4:12
      metadata:
        usfm: 1CO.4.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Bénissez ceux qui vous persécutent, bénissez et ne maudissez pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Réjouissez-vous avec ceux qui se réjouissent; pleurez avec ceux qui pleurent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 15:5
      metadata:
        usfm: ROM.15.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 1:10
      metadata:
        usfm: 1CO.1.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 2:2
      metadata:
        usfm: PHP.2.2
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 3:16
      metadata:
        usfm: PHP.3.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 3:8
      metadata:
        usfm: 1PE.3.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ayez les mêmes sentiments les uns envers les autres. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 3:7
      metadata:
        usfm: PRO.3.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 5:21
      metadata:
        usfm: ISA.5.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: N’aspirez pas à ce qui est élevé, mais laissez-vous attirer par ce qui est humble. Ne soyez point sages à vos propres yeux.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 17-21: cf. Mt 5:38-48. Pr 25:21, 22.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 20:22
      metadata:
        usfm: PRO.20.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 5:39
      metadata:
        usfm: MAT.5.39
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 6:7
      metadata:
        usfm: 1CO.6.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 5:15
      metadata:
        usfm: 1TH.5.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ne rendez à personne le mal pour le mal. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 8:21
      metadata:
        usfm: 2CO.8.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 2:12
      metadata:
        usfm: 1PE.2.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Recherchez ce qui est bien devant tous les hommes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 9:50
      metadata:
        usfm: MRK.9.50
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 12:14
      metadata:
        usfm: HEB.12.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'S’il est possible, autant que cela dépende de vous, soyez en paix avec tous les hommes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 5:39
      metadata:
        usfm: MAT.5.39
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 6:29
      metadata:
        usfm: LUK.6.29
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ne vous vengez point vous-mêmes, bien-aimés, mais laissez agir la colère; car il est écrit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 32:35
      metadata:
        usfm: DEU.32.35
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 10:30
      metadata:
        usfm: HEB.10.30
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'A moi la vengeance, à moi la rétribution, dit le Seigneur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 25:21
      metadata:
        usfm: PRO.25.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 5:44
      metadata:
        usfm: MAT.5.44
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Mais si ton ennemi a faim, donne-lui à manger; s’il a soif, donne-lui à boire; car en agissant ainsi, ce sont des charbons ardents que tu amasseras sur sa tête. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ne te laisse pas vaincre par le mal, mais surmonte le mal par le bien.
