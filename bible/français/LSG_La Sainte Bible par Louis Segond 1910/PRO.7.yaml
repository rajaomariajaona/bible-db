document_id: PRO.7,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-27: cf. (Pr 5; 6:20-35.) Jg 16:1-21.'
  - type: text
    content: Mon fils, retiens mes paroles,
  - type: text
    content: Et garde avec toi mes préceptes.
  '10':
  - type: text
    content: Et voici, il fut abordé par une femme
  - type: text
    content: Ayant la mise d’une prostituée et la ruse dans le cœur.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Pr 9:13.
  - type: text
    content: Elle était bruyante et rétive;
  - type: text
    content: Ses pieds ne restaient point dans sa maison;
  '12':
  - type: text
    content: Tantôt dans la rue, tantôt sur les places,
  - type: text
    content: Et près de tous les angles, elle était aux aguets.
  '13':
  - type: text
    content: Elle le saisit et l’embrassa,
  - type: text
    content: 'Et d’un air effronté lui dit:'
  '14':
  - type: text
    content: Je devais un sacrifice d’actions de grâces,
  - type: text
    content: Aujourd’hui j’ai accompli mes vœux.
  '15':
  - type: text
    content: C’est pourquoi je suis sortie au-devant de toi
  - type: text
    content: Pour te chercher, et je t’ai trouvé.
  '16':
  - type: text
    content: J’ai orné mon lit de couvertures,
  - type: text
    content: De tapis de fil d’Égypte;
  '17':
  - type: text
    content: J’ai parfumé ma couche
  - type: text
    content: De myrrhe, d’aloès et de cinnamome.
  '18':
  - type: text
    content: Viens, enivrons-nous d’amour jusqu’au matin,
  - type: text
    content: Livrons-nous joyeusement à la volupté.
  '19':
  - type: text
    content: Car mon mari n’est pas à la maison,
  - type: text
    content: Il est parti pour un voyage lointain;
  '2':
  - type: text
    content: ' '
  - type: note
    content: Lé 18:5. Pr 4:4.
  - type: text
    content: Observe mes préceptes, et tu vivras;
  - type: text
    content: Garde mes enseignements comme la prunelle de tes yeux.
  '20':
  - type: text
    content: Il a pris avec lui le sac de l’argent,
  - type: text
    content: Il ne reviendra à la maison qu’à la nouvelle lune.
  '21':
  - type: text
    content: Elle le séduisit à force de paroles,
  - type: text
    content: Elle l’entraîna par ses lèvres doucereuses.
  '22':
  - type: text
    content: Il se mit tout à coup à la suivre,
  - type: text
    content: Comme le bœuf qui va à la boucherie,
  - type: text
    content: Comme un fou qu’on lie pour le châtier,
  '23':
  - type: text
    content: Jusqu’à ce qu’une flèche lui perce le foie,
  - type: note
    content: Pr 1:17.
  - type: text
    content: Comme l’oiseau qui se précipite dans le filet,
  - type: text
    content: Sans savoir que c’est au prix de sa vie.
  '24':
  - type: text
    content: Et maintenant, mes fils, écoutez-moi,
  - type: text
    content: Et soyez attentifs aux paroles de ma bouche.
  '25':
  - type: text
    content: Que ton cœur ne se détourne pas vers les voies d’une telle femme,
  - type: text
    content: Ne t’égare pas dans ses sentiers.
  '26':
  - type: text
    content: Car elle a fait tomber beaucoup de victimes,
  - type: text
    content: Et ils sont nombreux, tous ceux qu’elle a tués.
  '27':
  - type: text
    content: ' '
  - type: note
    content: Pr 2:18; 5:5.
  - type: text
    content: Sa maison, c’est le chemin du séjour des morts;
  - type: text
    content: Il descend vers les demeures de la mort.
  '3':
  - type: text
    content: ' '
  - type: note
    content: De 6:8; 11:18.
  - type: text
    content: Lie-les sur tes doigts,
  - type: text
    content: Écris-les sur la table de ton cœur.
  '4':
  - type: text
    content: 'Dis à la sagesse: Tu es ma sœur!'
  - type: text
    content: Et appelle l’intelligence ton amie,
  '5':
  - type: text
    content: ' '
  - type: note
    content: Pr 5:3.
  - type: text
    content: Pour qu’elles te préservent de la femme étrangère,
  - type: text
    content: De l’étrangère qui emploie des paroles doucereuses.
  '6':
  - type: text
    content: J’étais à la fenêtre de ma maison,
  - type: text
    content: Et je regardais à travers mon treillis.
  '7':
  - type: text
    content: J’aperçus parmi les stupides,
  - type: text
    content: Je remarquai parmi les jeunes gens un garçon dépourvu de sens.
  '8':
  - type: text
    content: Il passait dans la rue, près de l’angle où se tenait une de ces étrangères,
  - type: text
    content: 'Et il se dirigeait lentement du côté de sa demeure:'
  '9':
  - type: text
    content: C’était au crépuscule, pendant la soirée,
  - type: text
    content: Au milieu de la nuit et de l’obscurité.
