document_id: PRO.7
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-27: cf. (Pr 5; 6:20-35.) Jg 16:1-21.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Mon fils, retiens mes paroles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et garde avec toi mes préceptes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 18:5
      metadata:
        usfm: LEV.18.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 4:4
      metadata:
        usfm: PRO.4.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Observe mes préceptes, et tu vivras;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Garde mes enseignements comme la prunelle de tes yeux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 6:8
      metadata:
        usfm: DEU.6.8
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 11:18
      metadata:
        usfm: DEU.11.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Lie-les sur tes doigts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Écris-les sur la table de ton cœur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dis à la sagesse: Tu es ma sœur!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et appelle l’intelligence ton amie,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 5:3
      metadata:
        usfm: PRO.5.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Pour qu’elles te préservent de la femme étrangère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De l’étrangère qui emploie des paroles doucereuses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: J’étais à la fenêtre de ma maison,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je regardais à travers mon treillis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: J’aperçus parmi les stupides,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je remarquai parmi les jeunes gens un garçon dépourvu de sens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Il passait dans la rue, près de l’angle où se tenait une de ces étrangères,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et il se dirigeait lentement du côté de sa demeure:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: C’était au crépuscule, pendant la soirée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au milieu de la nuit et de l’obscurité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Et voici, il fut abordé par une femme
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ayant la mise d’une prostituée et la ruse dans le cœur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 9:13
      metadata:
        usfm: PRO.9.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Elle était bruyante et rétive;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses pieds ne restaient point dans sa maison;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tantôt dans la rue, tantôt sur les places,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et près de tous les angles, elle était aux aguets.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Elle le saisit et l’embrassa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et d’un air effronté lui dit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Je devais un sacrifice d’actions de grâces,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aujourd’hui j’ai accompli mes vœux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: C’est pourquoi je suis sortie au-devant de toi
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour te chercher, et je t’ai trouvé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: J’ai orné mon lit de couvertures,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De tapis de fil d’Égypte;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: J’ai parfumé ma couche
- type: usfm
  marker: q1
  children:
  - type: text
    text: De myrrhe, d’aloès et de cinnamome.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Viens, enivrons-nous d’amour jusqu’au matin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Livrons-nous joyeusement à la volupté.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Car mon mari n’est pas à la maison,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est parti pour un voyage lointain;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Il a pris avec lui le sac de l’argent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il ne reviendra à la maison qu’à la nouvelle lune.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Elle le séduisit à force de paroles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle l’entraîna par ses lèvres doucereuses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Il se mit tout à coup à la suivre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme le bœuf qui va à la boucherie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme un fou qu’on lie pour le châtier,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Jusqu’à ce qu’une flèche lui perce le foie,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 1:17
      metadata:
        usfm: PRO.1.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Comme l’oiseau qui se précipite dans le filet,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sans savoir que c’est au prix de sa vie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Et maintenant, mes fils, écoutez-moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et soyez attentifs aux paroles de ma bouche.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Que ton cœur ne se détourne pas vers les voies d’une telle femme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne t’égare pas dans ses sentiers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Car elle a fait tomber beaucoup de victimes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils sont nombreux, tous ceux qu’elle a tués.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 2:18
      metadata:
        usfm: PRO.2.18
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 5:5
      metadata:
        usfm: PRO.5.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Sa maison, c’est le chemin du séjour des morts;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il descend vers les demeures de la mort.
