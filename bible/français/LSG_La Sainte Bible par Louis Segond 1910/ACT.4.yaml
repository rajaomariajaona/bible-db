document_id: ACT.4
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Pierre et Jean arrêtés et traduits devant le sanhédrin
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-22: cf. Ac 3:1-16. Mt 10:17-20, 26-33. Jn 15:20, 21. 1 Pi 3:14, 15.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tandis que Pierre et Jean parlaient au peuple, survinrent les sacrificateurs, le commandant du temple, et les sadducéens, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'mécontents de ce qu’ils enseignaient le peuple, et annonçaient en la personne de Jésus la résurrection des morts. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ils mirent les mains sur eux, et ils les jetèrent en prison jusqu’au lendemain; car c’était déjà le soir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Cependant, beaucoup de ceux qui avaient entendu la parole crurent, et le nombre des hommes s’éleva à environ cinq mille. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Le lendemain, les chefs du peuple, les anciens et les scribes, s’assemblèrent à Jérusalem, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'avec Anne, le souverain sacrificateur, Caïphe, Jean, Alexandre, et tous ceux qui étaient de la race des principaux sacrificateurs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ils firent placer au milieu d’eux Pierre et Jean, et leur demandèrent: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 2:14
      metadata:
        usfm: EXO.2.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 21:23
      metadata:
        usfm: MAT.21.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 7:27
      metadata:
        usfm: ACT.7.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Par quel pouvoir, ou au nom de qui avez-vous fait cela? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Alors Pierre, rempli du Saint-Esprit, leur dit: Chefs du peuple, et anciens d’Israël, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'puisque nous sommes interrogés aujourd’hui sur un bienfait accordé à un homme malade, afin que nous disions comment il a été guéri, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'sachez-le tous, et que tout le peuple d’Israël le sache! C’est par le nom de Jésus-Christ de Nazareth, que vous avez crucifié, et que Dieu a ressuscité des morts, c’est par lui que cet homme se présente en pleine santé devant vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Jésus est
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 118:22
      metadata:
        usfm: PSA.118.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 28:16
      metadata:
        usfm: ISA.28.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 21:42
      metadata:
        usfm: MAT.21.42
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 12:10
      metadata:
        usfm: MRK.12.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 20:17
      metadata:
        usfm: LUK.20.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 9:33
      metadata:
        usfm: ROM.9.33
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 2:7
      metadata:
        usfm: 1PE.2.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: La pierre rejetée par vous qui bâtissez,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et qui est devenue la principale de l’angle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 1:21
      metadata:
        usfm: MAT.1.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 10:43
      metadata:
        usfm: ACT.10.43
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 2:5
      metadata:
        usfm: 1TI.2.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il n’y a de salut en aucun autre; car il n’y a sous le ciel aucun autre nom qui ait été donné parmi les hommes, par lequel nous devions être sauvés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Lorsqu’ils virent l’assurance de Pierre et de Jean, ils furent étonnés, sachant que c’étaient des hommes du peuple sans instruction; et ils les reconnurent pour avoir été avec Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Mais comme ils voyaient là près d’eux l’homme qui avait été guéri, ils n’avaient rien à répliquer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ils leur ordonnèrent de sortir du sanhédrin, et ils délibérèrent entre eux, disant: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 11:47
      metadata:
        usfm: JHN.11.47
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Que ferons-nous à ces hommes? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Car il est manifeste pour tous les habitants de Jérusalem qu’un miracle signalé a été accompli par eux, et nous ne pouvons pas le nier. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Mais, afin que la chose ne se répande pas davantage parmi le peuple, défendons-leur avec menaces de parler désormais à qui que ce soit en ce nom-là. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Et les ayant appelés, ils leur défendirent absolument de parler et d’enseigner au nom de Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Pierre et Jean leur répondirent: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 5:29
      metadata:
        usfm: ACT.5.29
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Jugez s’il est juste, devant Dieu, de vous obéir plutôt qu’à Dieu; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'car nous ne pouvons pas ne pas parler de ce que nous avons vu et entendu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ils leur firent de nouvelles menaces, et les relâchèrent, ne sachant comment les punir, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 5:26
      metadata:
        usfm: ACT.5.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'à cause du peuple, parce que tous glorifiaient Dieu '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 3:7
      metadata:
        usfm: ACT.3.7
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '8'
      metadata:
        usfm: ACT.3.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'de ce qui était arrivé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Car l’homme qui avait été l’objet de cette guérison miraculeuse était âgé de plus de quarante ans.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 23-31: cf. Ps 2:1-4. (2 R 19:14-19. Mt 18:19, 20.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Après avoir été relâchés, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 12:12
      metadata:
        usfm: ACT.12.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ils allèrent vers les leurs, et racontèrent tout ce que les principaux sacrificateurs et les anciens leur avaient dit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Lorsqu’ils l’eurent entendu, ils élevèrent à Dieu la voix tous ensemble, et dirent: Seigneur, toi qui as fait le ciel, la terre, la mer, et tout ce qui s’y trouve, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'c’est toi qui as dit par le Saint-Esprit, par la bouche de notre père, ton serviteur David:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 2:1
      metadata:
        usfm: PSA.2.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Pourquoi ce tumulte parmi les nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ces vaines pensées parmi les peuples?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Les rois de la terre se sont soulevés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les princes se sont ligués
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Contre le Seigneur et contre son Oint. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 26:3
      metadata:
        usfm: MAT.26.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 14:1
      metadata:
        usfm: MRK.14.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 22:2
      metadata:
        usfm: LUK.22.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 11:47
      metadata:
        usfm: JHN.11.47
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'En effet, contre ton saint serviteur Jésus, que tu as oint, Hérode et Ponce Pilate se sont ligués dans cette ville avec les nations et avec les peuples d’Israël, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'pour faire tout ce que ta main et ton conseil avaient arrêté d’avance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Et maintenant, Seigneur, vois leurs menaces, et donne à tes serviteurs d’annoncer ta parole avec une pleine assurance, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 16:17
      metadata:
        usfm: MRK.16.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'en étendant ta main, pour qu’il se fasse des guérisons, des miracles et des prodiges, par le nom de ton saint serviteur Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Quand ils eurent prié, le lieu où ils étaient assemblés '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 16:26
      metadata:
        usfm: ACT.16.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: trembla; ils furent tous remplis du Saint-Esprit, et ils annonçaient la parole de Dieu avec assurance.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Union et charité des croyants
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 32-37: cf. Ac 2:44-47. 1 Jn 3:16-19. Lu 12:33. 2 Co 8:13-15; 9:9.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'La multitude de ceux qui avaient cru n’était '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 2:44
      metadata:
        usfm: ACT.2.44
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 3:8
      metadata:
        usfm: 1PE.3.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qu’un cœur et qu’une âme. Nul ne disait que ses biens lui appartinssent en propre, mais tout était commun entre eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Les apôtres rendaient avec beaucoup de force témoignage de la résurrection du Seigneur Jésus. Et une grande grâce reposait sur eux tous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Car il n’y avait parmi eux aucun indigent: tous ceux qui possédaient des champs ou des maisons les vendaient, apportaient le prix de ce qu’ils avaient vendu, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'et le déposaient aux pieds des apôtres; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 58:7
      metadata:
        usfm: ISA.58.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et l’on faisait des distributions à chacun selon qu’il en avait besoin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Joseph, surnommé par les apôtres Barnabas, ce qui signifie fils d’exhortation, Lévite, originaire de Chypre, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: vendit un champ qu’il possédait, apporta l’argent, et le déposa aux pieds des apôtres.
