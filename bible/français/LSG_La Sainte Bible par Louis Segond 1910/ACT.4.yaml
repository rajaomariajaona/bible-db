document_id: ACT.4,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Pierre et Jean arrêtés et traduits devant le sanhédrin
  - type: heading
    content: 'V. 1-22: cf. Ac 3:1-16. Mt 10:17-20, 26-33. Jn 15:20, 21. 1 Pi 3:14, 15.'
  - type: text
    content: 'Tandis que Pierre et Jean parlaient au peuple, survinrent les sacrificateurs, le commandant du temple, et les sadducéens, '
  '10':
  - type: text
    content: 'sachez-le tous, et que tout le peuple d’Israël le sache! C’est par le nom de Jésus-Christ de Nazareth, que vous avez crucifié, et que Dieu a ressuscité des morts, c’est par lui que cet homme se présente en pleine santé devant vous. '
  '11':
  - type: text
    content: Jésus est
  - type: note
    content: Ps 118:22. És 28:16. Mt 21:42. Mc 12:10. Lu 20:17. Ro 9:33. 1 Pi 2:7.
  - type: text
    content: La pierre rejetée par vous qui bâtissez,
  - type: text
    content: 'Et qui est devenue la principale de l’angle. '
  '12':
  - type: note
    content: Mt 1:21. Ac 10:43. 1 Ti 2:5.
  - type: text
    content: 'Il n’y a de salut en aucun autre; car il n’y a sous le ciel aucun autre nom qui ait été donné parmi les hommes, par lequel nous devions être sauvés. '
  '13':
  - type: text
    content: 'Lorsqu’ils virent l’assurance de Pierre et de Jean, ils furent étonnés, sachant que c’étaient des hommes du peuple sans instruction; et ils les reconnurent pour avoir été avec Jésus. '
  '14':
  - type: text
    content: 'Mais comme ils voyaient là près d’eux l’homme qui avait été guéri, ils n’avaient rien à répliquer. '
  '15':
  - type: text
    content: 'Ils leur ordonnèrent de sortir du sanhédrin, et ils délibérèrent entre eux, disant: '
  - type: note
    content: Jn 11:47.
  - type: text
    content: 'Que ferons-nous à ces hommes? '
  '16':
  - type: text
    content: 'Car il est manifeste pour tous les habitants de Jérusalem qu’un miracle signalé a été accompli par eux, et nous ne pouvons pas le nier. '
  '17':
  - type: text
    content: 'Mais, afin que la chose ne se répande pas davantage parmi le peuple, défendons-leur avec menaces de parler désormais à qui que ce soit en ce nom-là. '
  '18':
  - type: text
    content: 'Et les ayant appelés, ils leur défendirent absolument de parler et d’enseigner au nom de Jésus. '
  '19':
  - type: text
    content: 'Pierre et Jean leur répondirent: '
  - type: note
    content: Ac 5:29.
  - type: text
    content: 'Jugez s’il est juste, devant Dieu, de vous obéir plutôt qu’à Dieu; '
  '2':
  - type: text
    content: 'mécontents de ce qu’ils enseignaient le peuple, et annonçaient en la personne de Jésus la résurrection des morts. '
  '20':
  - type: text
    content: 'car nous ne pouvons pas ne pas parler de ce que nous avons vu et entendu. '
  '21':
  - type: text
    content: 'Ils leur firent de nouvelles menaces, et les relâchèrent, ne sachant comment les punir, '
  - type: note
    content: Ac 5:26.
  - type: text
    content: 'à cause du peuple, parce que tous glorifiaient Dieu '
  - type: note
    content: Ac 3:7, 8.
  - type: text
    content: 'de ce qui était arrivé. '
  '22':
  - type: text
    content: Car l’homme qui avait été l’objet de cette guérison miraculeuse était âgé de plus de quarante ans.
  - type: heading
    content: 'V. 23-31: cf. Ps 2:1-4. (2 R 19:14-19. Mt 18:19, 20.)'
  '23':
  - type: text
    content: 'Après avoir été relâchés, '
  - type: note
    content: Ac 12:12.
  - type: text
    content: 'ils allèrent vers les leurs, et racontèrent tout ce que les principaux sacrificateurs et les anciens leur avaient dit. '
  '24':
  - type: text
    content: 'Lorsqu’ils l’eurent entendu, ils élevèrent à Dieu la voix tous ensemble, et dirent: Seigneur, toi qui as fait le ciel, la terre, la mer, et tout ce qui s’y trouve, '
  '25':
  - type: text
    content: 'c’est toi qui as dit par le Saint-Esprit, par la bouche de notre père, ton serviteur David:'
  - type: note
    content: Ps 2:1.
  - type: text
    content: Pourquoi ce tumulte parmi les nations,
  - type: text
    content: Et ces vaines pensées parmi les peuples?
  '26':
  - type: text
    content: Les rois de la terre se sont soulevés,
  - type: text
    content: Et les princes se sont ligués
  - type: text
    content: 'Contre le Seigneur et contre son Oint. '
  '27':
  - type: note
    content: Mt 26:3. Mc 14:1. Lu 22:2. Jn 11:47.
  - type: text
    content: 'En effet, contre ton saint serviteur Jésus, que tu as oint, Hérode et Ponce Pilate se sont ligués dans cette ville avec les nations et avec les peuples d’Israël, '
  '28':
  - type: text
    content: 'pour faire tout ce que ta main et ton conseil avaient arrêté d’avance. '
  '29':
  - type: text
    content: 'Et maintenant, Seigneur, vois leurs menaces, et donne à tes serviteurs d’annoncer ta parole avec une pleine assurance, '
  '3':
  - type: text
    content: 'Ils mirent les mains sur eux, et ils les jetèrent en prison jusqu’au lendemain; car c’était déjà le soir. '
  '30':
  - type: note
    content: Mc 16:17.
  - type: text
    content: 'en étendant ta main, pour qu’il se fasse des guérisons, des miracles et des prodiges, par le nom de ton saint serviteur Jésus. '
  '31':
  - type: text
    content: 'Quand ils eurent prié, le lieu où ils étaient assemblés '
  - type: note
    content: Ac 16:26.
  - type: text
    content: trembla; ils furent tous remplis du Saint-Esprit, et ils annonçaient la parole de Dieu avec assurance.
  - type: heading
    content: Union et charité des croyants
  - type: heading
    content: 'V. 32-37: cf. Ac 2:44-47. 1 Jn 3:16-19. Lu 12:33. 2 Co 8:13-15; 9:9.'
  '32':
  - type: text
    content: 'La multitude de ceux qui avaient cru n’était '
  - type: note
    content: Ac 2:44. 1 Pi 3:8.
  - type: text
    content: 'qu’un cœur et qu’une âme. Nul ne disait que ses biens lui appartinssent en propre, mais tout était commun entre eux. '
  '33':
  - type: text
    content: 'Les apôtres rendaient avec beaucoup de force témoignage de la résurrection du Seigneur Jésus. Et une grande grâce reposait sur eux tous. '
  '34':
  - type: text
    content: 'Car il n’y avait parmi eux aucun indigent: tous ceux qui possédaient des champs ou des maisons les vendaient, apportaient le prix de ce qu’ils avaient vendu, '
  '35':
  - type: text
    content: 'et le déposaient aux pieds des apôtres; '
  - type: note
    content: És 58:7.
  - type: text
    content: 'et l’on faisait des distributions à chacun selon qu’il en avait besoin. '
  '36':
  - type: text
    content: 'Joseph, surnommé par les apôtres Barnabas, ce qui signifie fils d’exhortation, Lévite, originaire de Chypre, '
  '37':
  - type: text
    content: vendit un champ qu’il possédait, apporta l’argent, et le déposa aux pieds des apôtres.
  '4':
  - type: text
    content: 'Cependant, beaucoup de ceux qui avaient entendu la parole crurent, et le nombre des hommes s’éleva à environ cinq mille. '
  '5':
  - type: text
    content: 'Le lendemain, les chefs du peuple, les anciens et les scribes, s’assemblèrent à Jérusalem, '
  '6':
  - type: text
    content: 'avec Anne, le souverain sacrificateur, Caïphe, Jean, Alexandre, et tous ceux qui étaient de la race des principaux sacrificateurs. '
  '7':
  - type: text
    content: 'Ils firent placer au milieu d’eux Pierre et Jean, et leur demandèrent: '
  - type: note
    content: Ex 2:14. Mt 21:23. Ac 7:27.
  - type: text
    content: 'Par quel pouvoir, ou au nom de qui avez-vous fait cela? '
  '8':
  - type: text
    content: 'Alors Pierre, rempli du Saint-Esprit, leur dit: Chefs du peuple, et anciens d’Israël, '
  '9':
  - type: text
    content: 'puisque nous sommes interrogés aujourd’hui sur un bienfait accordé à un homme malade, afin que nous disions comment il a été guéri, '
