document_id: ZEP.1,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Menaces contre Juda et Jérusalem
  - type: heading
    content: 'V. 1-6: cf. 2 Ch 34. (Jé 4:23, etc.; 7:8-20.)'
  - type: text
    content: La parole de l’Éternel qui fut adressée à Sophonie, fils de Cuschi, fils de Guedalia, fils d’Amaria, fils d’Ézéchias, au temps de Josias, fils d’Amon, roi de Juda.
  '10':
  - type: text
    content: En ce jour-là, dit l’Éternel,
  - type: text
    content: Il y aura des cris à la porte des poissons,
  - type: text
    content: Des lamentations dans l’autre quartier de la ville,
  - type: text
    content: Et un grand désastre sur les collines.
  '11':
  - type: text
    content: Gémissez, habitants de Macthesch!
  - type: text
    content: Car tous ceux qui trafiquent sont détruits,
  - type: text
    content: Tous les hommes chargés d’argent sont exterminés.
  '12':
  - type: text
    content: En ce temps-là, je fouillerai Jérusalem avec des lampes,
  - type: text
    content: Et je châtierai les hommes qui reposent sur leurs lies,
  - type: text
    content: 'Et qui disent dans leur cœur: L’Éternel ne fait ni bien ni mal.'
  '13':
  - type: text
    content: Leurs biens seront au pillage,
  - type: text
    content: Et leurs maisons seront dévastées;
  - type: text
    content: Ils auront bâti des maisons, qu’ils n’habiteront plus,
  - type: text
    content: Ils auront planté des vignes, dont ils ne boiront plus le vin.
  - type: heading
    content: 'V. 14-18: cf. Éz 7. Joë 2:1-11. Lu 21:22, 34-36.'
  '14':
  - type: text
    content: Le grand jour de l’Éternel est proche,
  - type: text
    content: Il est proche, il arrive en toute hâte;
  - type: text
    content: Le jour de l’Éternel fait entendre sa voix,
  - type: text
    content: Et le héros pousse des cris amers.
  '15':
  - type: text
    content: ' '
  - type: note
    content: Joë 2:1, 2.
  - type: text
    content: Ce jour est un jour de fureur,
  - type: text
    content: Un jour de détresse et d’angoisse,
  - type: text
    content: Un jour de ravage et de destruction,
  - type: text
    content: Un jour de ténèbres et d’obscurité,
  - type: text
    content: Un jour de nuées et de brouillards,
  '16':
  - type: text
    content: Un jour où retentiront la trompette et les cris de guerre
  - type: text
    content: Contre les villes fortes et les tours élevées.
  '17':
  - type: text
    content: Je mettrai les hommes dans la détresse,
  - type: text
    content: Et ils marcheront comme des aveugles,
  - type: text
    content: Parce qu’ils ont péché contre l’Éternel;
  - type: text
    content: Je répandrai leur sang comme de la poussière,
  - type: text
    content: Et leur chair comme de l’ordure.
  '18':
  - type: text
    content: 'Ni leur '
  - type: note
    content: Pr 11:4. Éz 7:19.
  - type: text
    content: argent ni leur or ne pourront les délivrer,
  - type: note
    content: v. 14, 15, 16.
  - type: text
    content: Au jour de la fureur de l’Éternel;
  - type: text
    content: Par le feu de sa jalousie tout le pays sera consumé;
  - type: text
    content: Car il détruira soudain tous les habitants du pays.
  '2':
  - type: text
    content: Je détruirai tout sur la face de la terre,
  - type: text
    content: Dit l’Éternel.
  '3':
  - type: text
    content: Je détruirai les hommes et les bêtes,
  - type: text
    content: Les oiseaux du ciel et les poissons de la mer,
  - type: text
    content: Les objets de scandale, et les méchants avec eux;
  - type: text
    content: J’exterminerai les hommes de la face de la terre,
  - type: text
    content: Dit l’Éternel.
  '4':
  - type: text
    content: J’étendrai ma main sur Juda,
  - type: text
    content: Et sur tous les habitants de Jérusalem;
  - type: text
    content: J’exterminerai de ce lieu les restes de Baal,
  - type: text
    content: Le nom de ses ministres et les prêtres avec eux,
  '5':
  - type: text
    content: Ceux qui se prosternent sur les toits devant l’armée des cieux,
  - type: text
    content: Ceux qui se prosternent en jurant par l’Éternel
  - type: text
    content: Et en jurant par leur roi,
  '6':
  - type: text
    content: ' '
  - type: note
    content: És 1:4; 59:13. Jé 15:6.
  - type: text
    content: Ceux qui se sont détournés de l’Éternel,
  - type: text
    content: Et ceux qui ne cherchent pas l’Éternel,
  - type: text
    content: Qui ne le consultent pas.
  - type: heading
    content: Le jour de l’Éternel
  - type: heading
    content: 'V. 7-13: cf. Am 8:2-8. Jé 5:15-17, 26-29. Mi 6:9-16.'
  '7':
  - type: text
    content: Silence devant le Seigneur, l’Éternel!
  - type: text
    content: Car le jour de l’Éternel est proche,
  - type: text
    content: Car l’Éternel a préparé le sacrifice,
  - type: text
    content: Il a choisi ses conviés.
  '8':
  - type: text
    content: Au jour du sacrifice de l’Éternel,
  - type: text
    content: Je châtierai les princes et les fils du roi,
  - type: text
    content: Et tous ceux qui portent des vêtements étrangers.
  '9':
  - type: text
    content: En ce jour-là, je châtierai tous ceux qui sautent par-dessus le seuil,
  - type: text
    content: Ceux qui remplissent de violence et de fraude la maison de leur maître.
