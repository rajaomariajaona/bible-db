document_id: ZEP.1,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Menaces contre Juda et Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-6: cf. 2 Ch 34. (Jé 4:23, etc.; 7:8-20.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: La parole de l’Éternel qui fut adressée à Sophonie, fils de Cuschi, fils de Guedalia, fils d’Amaria, fils d’Ézéchias, au temps de Josias, fils d’Amon, roi de Juda.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: En ce jour-là, dit l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il y aura des cris à la porte des poissons,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des lamentations dans l’autre quartier de la ville,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et un grand désastre sur les collines.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Gémissez, habitants de Macthesch!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car tous ceux qui trafiquent sont détruits,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous les hommes chargés d’argent sont exterminés.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: En ce temps-là, je fouillerai Jérusalem avec des lampes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je châtierai les hommes qui reposent sur leurs lies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et qui disent dans leur cœur: L’Éternel ne fait ni bien ni mal.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Leurs biens seront au pillage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et leurs maisons seront dévastées;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils auront bâti des maisons, qu’ils n’habiteront plus,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils auront planté des vignes, dont ils ne boiront plus le vin.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 14-18: cf. Éz 7. Joë 2:1-11. Lu 21:22, 34-36.'
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Le grand jour de l’Éternel est proche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est proche, il arrive en toute hâte;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le jour de l’Éternel fait entendre sa voix,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le héros pousse des cris amers.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Joë 2:1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ce jour est un jour de fureur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un jour de détresse et d’angoisse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un jour de ravage et de destruction,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un jour de ténèbres et d’obscurité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un jour de nuées et de brouillards,
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Un jour où retentiront la trompette et les cris de guerre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Contre les villes fortes et les tours élevées.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Je mettrai les hommes dans la détresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils marcheront comme des aveugles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce qu’ils ont péché contre l’Éternel;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je répandrai leur sang comme de la poussière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et leur chair comme de l’ordure.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ni leur '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 11:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 7:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: argent ni leur or ne pourront les délivrer,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: v. 14, 15, 16.
      marker-yv: yv-n
    - type: text
      text: Au jour de la fureur de l’Éternel;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par le feu de sa jalousie tout le pays sera consumé;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car il détruira soudain tous les habitants du pays.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Je détruirai tout sur la face de la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit l’Éternel.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Je détruirai les hommes et les bêtes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les oiseaux du ciel et les poissons de la mer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les objets de scandale, et les méchants avec eux;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’exterminerai les hommes de la face de la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit l’Éternel.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: J’étendrai ma main sur Juda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et sur tous les habitants de Jérusalem;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’exterminerai de ce lieu les restes de Baal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le nom de ses ministres et les prêtres avec eux,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ceux qui se prosternent sur les toits devant l’armée des cieux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux qui se prosternent en jurant par l’Éternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et en jurant par leur roi,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 1:4
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 59:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 15:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ceux qui se sont détournés de l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ceux qui ne cherchent pas l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui ne le consultent pas.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le jour de l’Éternel
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 7-13: cf. Am 8:2-8. Jé 5:15-17, 26-29. Mi 6:9-16.'
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Silence devant le Seigneur, l’Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car le jour de l’Éternel est proche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car l’Éternel a préparé le sacrifice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a choisi ses conviés.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Au jour du sacrifice de l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je châtierai les princes et les fils du roi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tous ceux qui portent des vêtements étrangers.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: En ce jour-là, je châtierai tous ceux qui sautent par-dessus le seuil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux qui remplissent de violence et de fraude la maison de leur maître.
