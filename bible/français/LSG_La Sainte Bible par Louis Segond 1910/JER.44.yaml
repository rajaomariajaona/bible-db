document_id: JER.44,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Censures contre les Juifs retirés en Égypte
  - type: heading
    content: 'V. 1-30: cf. (Jé 42; 43.) Jé 7:17, etc. Mt 23:37. Job 15:20-26.'
  - type: text
    content: 'La parole fut adressée à Jérémie sur tous les Juifs demeurant au pays d’Égypte, demeurant à Migdol, à Tachpanès, à Noph et au pays de Pathros, en ces mots: '
  '10':
  - type: text
    content: 'Ils ne se sont point humiliés jusqu’à ce jour, ils n’ont point eu de crainte, ils n’ont point suivi ma loi et mes commandements, que j’ai mis devant vous et devant vos pères. '
  '11':
  - type: text
    content: 'C’est pourquoi ainsi parle l’Éternel des armées, le Dieu d’Israël: Voici, '
  - type: note
    content: Jé 21:10. Am 9:4.
  - type: text
    content: 'je tourne ma face contre vous pour faire du mal, et pour exterminer tout Juda. '
  '12':
  - type: text
    content: 'Je prendrai les restes de Juda qui ont tourné le visage pour aller au pays d’Égypte, afin d’y demeurer; ils seront tous consumés, ils tomberont dans le pays d’Égypte; ils seront consumés par '
  - type: note
    content: Jé 42:15, 16, 17, 22.
  - type: text
    content: 'l’épée, par la famine, depuis le plus petit jusqu’au plus grand; ils périront par l’épée et par la famine; et ils seront un sujet d’exécration, d’épouvante, de malédiction et d’opprobre. '
  '13':
  - type: text
    content: 'Je châtierai ceux qui demeurent au pays d’Égypte, comme j’ai châtié Jérusalem, par l’épée, par la famine et par la peste. '
  '14':
  - type: text
    content: 'Nul n’échappera, ne fuira, parmi les restes de Juda qui sont venus pour demeurer au pays d’Égypte, avec l’intention de retourner dans le pays de Juda, où ils ont le désir de retourner s’établir; car ils n’y retourneront pas, sinon quelques réchappés. '
  '15':
  - type: text
    content: 'Tous les hommes qui savaient que leurs femmes offraient de l’encens à d’autres dieux, toutes les femmes qui se trouvaient là en grand nombre, et tout le peuple qui demeurait au pays d’Égypte, à Pathros, répondirent ainsi à Jérémie: '
  '16':
  - type: text
    content: 'Nous ne t’obéirons en rien de ce que tu nous as dit au nom de l’Éternel. '
  '17':
  - type: text
    content: 'Mais nous voulons agir comme l’a déclaré notre bouche, offrir de l’encens à la '
  - type: note
    content: Jé 7:18.
  - type: text
    content: 'reine du ciel, et lui faire des libations, comme nous l’avons fait, nous et nos pères, nos rois et nos chefs, dans les villes de Juda et dans les rues de Jérusalem. Alors nous avions du pain pour nous rassasier, nous étions heureux, et nous n’éprouvions point de malheur. '
  '18':
  - type: text
    content: 'Et depuis que nous avons cessé d’offrir de l’encens à la reine du ciel et de lui faire des libations, nous avons manqué de tout, et nous avons été consumés par l’épée et par la famine… '
  '19':
  - type: text
    content: 'D’ailleurs, lorsque nous offrons de l’encens à la reine du ciel et que nous lui faisons des libations, est-ce sans la volonté de nos maris que nous lui préparons des gâteaux pour l’honorer et que nous lui faisons des libations? '
  '2':
  - type: text
    content: 'Ainsi parle l’Éternel des armées, le Dieu d’Israël: Vous avez vu tous les malheurs que j’ai fait venir sur Jérusalem et sur toutes les villes de Juda; voici, elles ne sont plus aujourd’hui que des ruines, et il n’y a plus d’habitants, '
  '20':
  - type: text
    content: 'Jérémie dit alors à tout le peuple, aux hommes, aux femmes, à tous ceux qui lui avaient fait cette réponse: '
  '21':
  - type: text
    content: 'L’Éternel ne s’est-il pas rappelé, n’a-t-il pas eu à la pensée l’encens que vous avez brûlé dans les villes de Juda et dans les rues de Jérusalem, vous et vos pères, vos rois et vos chefs, et le peuple du pays? '
  '22':
  - type: text
    content: 'L’Éternel n’a pas pu le supporter davantage, à cause de la méchanceté de vos actions, à cause des abominations que vous avez commises; et votre pays est devenu une ruine, un désert, un objet de malédiction, comme on le voit aujourd’hui. '
  '23':
  - type: text
    content: 'C’est parce que vous avez brûlé de l’encens et péché contre l’Éternel, parce que vous n’avez pas écouté la voix de l’Éternel, et que vous n’avez pas observé sa loi, ses ordonnances, et ses préceptes, c’est pour cela que ces malheurs vous sont arrivés, comme on le voit aujourd’hui. '
  '24':
  - type: text
    content: 'Jérémie dit encore à tout le peuple et à toutes les femmes: Écoutez la parole de l’Éternel, vous tous de Juda, qui êtes au pays d’Égypte! '
  '25':
  - type: text
    content: 'Ainsi parle l’Éternel des armées, le Dieu d’Israël: Vous et vos femmes, vous avez déclaré de vos bouches et exécuté de vos mains ce que vous dites: Nous voulons accomplir les vœux que nous avons faits, offrir de l’encens à la reine du ciel, et lui faire des libations. Maintenant que vous avez accompli vos vœux, exécuté vos promesses, '
  '26':
  - type: text
    content: 'écoutez la parole de l’Éternel, vous tous de Juda, qui demeurez au pays d’Égypte! Voici, je le jure par mon grand nom, dit l’Éternel, mon nom ne sera plus invoqué par la bouche d’aucun homme de Juda, et dans tout le pays d’Égypte aucun ne dira: Le Seigneur, l’Éternel est vivant! '
  '27':
  - type: text
    content: 'Voici, '
  - type: note
    content: Jé 31:28.
  - type: text
    content: 'je veillerai sur eux pour faire du mal et non du bien; et tous les hommes de Juda qui sont dans le pays d’Égypte seront consumés par l’épée et par la famine, jusqu’à ce qu’ils soient anéantis. '
  '28':
  - type: text
    content: 'Ceux, en petit nombre, qui échapperont à l’épée, retourneront du pays d’Égypte au pays de Juda. Mais tout le reste de Juda, tous ceux qui sont venus au pays d’Égypte pour y demeurer, sauront si ce sera ma parole ou la leur qui s’accomplira. '
  '29':
  - type: text
    content: 'Et voici, dit l’Éternel, un signe auquel vous connaîtrez que je vous châtierai dans ce lieu, afin que vous sachiez que mes paroles s’accompliront sur vous pour votre malheur. '
  '3':
  - type: text
    content: 'à cause de la méchanceté avec laquelle ils ont agi pour m’irriter, en allant encenser et servir d’autres dieux, inconnus à eux, à vous et à vos pères. '
  '30':
  - type: text
    content: 'Ainsi parle l’Éternel: Voici, je livrerai Pharaon Hophra, roi d’Égypte, entre les mains de ses ennemis, entre les mains de ceux qui en veulent à sa vie, comme j’ai livré Sédécias, roi de Juda, entre les mains de Nebucadnetsar, roi de Babylone, son ennemi, qui en voulait à sa vie.'
  '4':
  - type: text
    content: 'Je vous ai envoyé tous mes serviteurs, les prophètes, je les ai envoyés dès le matin, pour vous dire: Ne faites pas ces abominations, que je hais. '
  '5':
  - type: text
    content: 'Mais ils n’ont pas écouté, ils n’ont pas prêté l’oreille, ils ne sont pas revenus de leur méchanceté, et ils n’ont pas cessé d’offrir de l’encens à d’autres dieux. '
  '6':
  - type: text
    content: 'Ma colère et ma fureur se sont '
  - type: note
    content: Jé 7:20; 42:18.
  - type: text
    content: 'répandues, et ont embrasé les villes de Juda et les rues de Jérusalem, qui ne sont plus que des ruines et un désert, comme on le voit aujourd’hui. '
  '7':
  - type: text
    content: 'Maintenant ainsi parle l’Éternel, le Dieu des armées, le Dieu d’Israël: Pourquoi vous faites-vous à vous-mêmes un si grand mal, que de faire exterminer du milieu de Juda hommes, femmes, enfants et nourrissons, en sorte qu’il n’y ait plus de vous aucun reste? '
  '8':
  - type: text
    content: 'Pourquoi m’irritez-vous par les œuvres de vos mains, en offrant de l’encens aux autres dieux du pays d’Égypte, où vous êtes venus pour y demeurer, afin de vous faire exterminer et d’être un objet de malédiction et d’opprobre parmi toutes les nations de la terre? '
  '9':
  - type: text
    content: 'Avez-vous oublié les crimes de vos pères, les crimes des rois de Juda, les crimes de leurs femmes, vos crimes et les crimes de vos femmes, commis dans le pays de Juda et dans les rues de Jérusalem? '
