document_id: JER.44
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Censures contre les Juifs retirés en Égypte
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-30: cf. (Jé 42; 43.) Jé 7:17, etc. Mt 23:37. Job 15:20-26.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La parole fut adressée à Jérémie sur tous les Juifs demeurant au pays d’Égypte, demeurant à Migdol, à Tachpanès, à Noph et au pays de Pathros, en ces mots: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ainsi parle l’Éternel des armées, le Dieu d’Israël: Vous avez vu tous les malheurs que j’ai fait venir sur Jérusalem et sur toutes les villes de Juda; voici, elles ne sont plus aujourd’hui que des ruines, et il n’y a plus d’habitants, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'à cause de la méchanceté avec laquelle ils ont agi pour m’irriter, en allant encenser et servir d’autres dieux, inconnus à eux, à vous et à vos pères. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Je vous ai envoyé tous mes serviteurs, les prophètes, je les ai envoyés dès le matin, pour vous dire: Ne faites pas ces abominations, que je hais. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mais ils n’ont pas écouté, ils n’ont pas prêté l’oreille, ils ne sont pas revenus de leur méchanceté, et ils n’ont pas cessé d’offrir de l’encens à d’autres dieux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ma colère et ma fureur se sont '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 7:20
      metadata:
        usfm: JER.7.20
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 42:18
      metadata:
        usfm: JER.42.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'répandues, et ont embrasé les villes de Juda et les rues de Jérusalem, qui ne sont plus que des ruines et un désert, comme on le voit aujourd’hui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Maintenant ainsi parle l’Éternel, le Dieu des armées, le Dieu d’Israël: Pourquoi vous faites-vous à vous-mêmes un si grand mal, que de faire exterminer du milieu de Juda hommes, femmes, enfants et nourrissons, en sorte qu’il n’y ait plus de vous aucun reste? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Pourquoi m’irritez-vous par les œuvres de vos mains, en offrant de l’encens aux autres dieux du pays d’Égypte, où vous êtes venus pour y demeurer, afin de vous faire exterminer et d’être un objet de malédiction et d’opprobre parmi toutes les nations de la terre? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Avez-vous oublié les crimes de vos pères, les crimes des rois de Juda, les crimes de leurs femmes, vos crimes et les crimes de vos femmes, commis dans le pays de Juda et dans les rues de Jérusalem? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ils ne se sont point humiliés jusqu’à ce jour, ils n’ont point eu de crainte, ils n’ont point suivi ma loi et mes commandements, que j’ai mis devant vous et devant vos pères. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'C’est pourquoi ainsi parle l’Éternel des armées, le Dieu d’Israël: Voici, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 21:10
      metadata:
        usfm: JER.21.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Am 9:4
      metadata:
        usfm: AMO.9.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'je tourne ma face contre vous pour faire du mal, et pour exterminer tout Juda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Je prendrai les restes de Juda qui ont tourné le visage pour aller au pays d’Égypte, afin d’y demeurer; ils seront tous consumés, ils tomberont dans le pays d’Égypte; ils seront consumés par '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 42:15
      metadata:
        usfm: JER.42.15
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '16'
      metadata:
        usfm: JER.42.16
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '17'
      metadata:
        usfm: JER.42.17
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '22'
      metadata:
        usfm: JER.42.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'l’épée, par la famine, depuis le plus petit jusqu’au plus grand; ils périront par l’épée et par la famine; et ils seront un sujet d’exécration, d’épouvante, de malédiction et d’opprobre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Je châtierai ceux qui demeurent au pays d’Égypte, comme j’ai châtié Jérusalem, par l’épée, par la famine et par la peste. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nul n’échappera, ne fuira, parmi les restes de Juda qui sont venus pour demeurer au pays d’Égypte, avec l’intention de retourner dans le pays de Juda, où ils ont le désir de retourner s’établir; car ils n’y retourneront pas, sinon quelques réchappés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tous les hommes qui savaient que leurs femmes offraient de l’encens à d’autres dieux, toutes les femmes qui se trouvaient là en grand nombre, et tout le peuple qui demeurait au pays d’Égypte, à Pathros, répondirent ainsi à Jérémie: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Nous ne t’obéirons en rien de ce que tu nous as dit au nom de l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Mais nous voulons agir comme l’a déclaré notre bouche, offrir de l’encens à la '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 7:18
      metadata:
        usfm: JER.7.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'reine du ciel, et lui faire des libations, comme nous l’avons fait, nous et nos pères, nos rois et nos chefs, dans les villes de Juda et dans les rues de Jérusalem. Alors nous avions du pain pour nous rassasier, nous étions heureux, et nous n’éprouvions point de malheur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Et depuis que nous avons cessé d’offrir de l’encens à la reine du ciel et de lui faire des libations, nous avons manqué de tout, et nous avons été consumés par l’épée et par la famine… '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'D’ailleurs, lorsque nous offrons de l’encens à la reine du ciel et que nous lui faisons des libations, est-ce sans la volonté de nos maris que nous lui préparons des gâteaux pour l’honorer et que nous lui faisons des libations? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Jérémie dit alors à tout le peuple, aux hommes, aux femmes, à tous ceux qui lui avaient fait cette réponse: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'L’Éternel ne s’est-il pas rappelé, n’a-t-il pas eu à la pensée l’encens que vous avez brûlé dans les villes de Juda et dans les rues de Jérusalem, vous et vos pères, vos rois et vos chefs, et le peuple du pays? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'L’Éternel n’a pas pu le supporter davantage, à cause de la méchanceté de vos actions, à cause des abominations que vous avez commises; et votre pays est devenu une ruine, un désert, un objet de malédiction, comme on le voit aujourd’hui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'C’est parce que vous avez brûlé de l’encens et péché contre l’Éternel, parce que vous n’avez pas écouté la voix de l’Éternel, et que vous n’avez pas observé sa loi, ses ordonnances, et ses préceptes, c’est pour cela que ces malheurs vous sont arrivés, comme on le voit aujourd’hui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Jérémie dit encore à tout le peuple et à toutes les femmes: Écoutez la parole de l’Éternel, vous tous de Juda, qui êtes au pays d’Égypte! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ainsi parle l’Éternel des armées, le Dieu d’Israël: Vous et vos femmes, vous avez déclaré de vos bouches et exécuté de vos mains ce que vous dites: Nous voulons accomplir les vœux que nous avons faits, offrir de l’encens à la reine du ciel, et lui faire des libations. Maintenant que vous avez accompli vos vœux, exécuté vos promesses, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'écoutez la parole de l’Éternel, vous tous de Juda, qui demeurez au pays d’Égypte! Voici, je le jure par mon grand nom, dit l’Éternel, mon nom ne sera plus invoqué par la bouche d’aucun homme de Juda, et dans tout le pays d’Égypte aucun ne dira: Le Seigneur, l’Éternel est vivant! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Voici, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 31:28
      metadata:
        usfm: JER.31.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'je veillerai sur eux pour faire du mal et non du bien; et tous les hommes de Juda qui sont dans le pays d’Égypte seront consumés par l’épée et par la famine, jusqu’à ce qu’ils soient anéantis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ceux, en petit nombre, qui échapperont à l’épée, retourneront du pays d’Égypte au pays de Juda. Mais tout le reste de Juda, tous ceux qui sont venus au pays d’Égypte pour y demeurer, sauront si ce sera ma parole ou la leur qui s’accomplira. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Et voici, dit l’Éternel, un signe auquel vous connaîtrez que je vous châtierai dans ce lieu, afin que vous sachiez que mes paroles s’accompliront sur vous pour votre malheur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ainsi parle l’Éternel: Voici, je livrerai Pharaon Hophra, roi d’Égypte, entre les mains de ses ennemis, entre les mains de ceux qui en veulent à sa vie, comme j’ai livré Sédécias, roi de Juda, entre les mains de Nebucadnetsar, roi de Babylone, son ennemi, qui en voulait à sa vie.'
