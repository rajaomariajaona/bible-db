document_id: 2CH.27,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jotham, roi de Juda
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-9: cf. 2 R 15:32-38. Pr 21:29. 3 Jn 12.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Jotham '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 2 R 15:33, etc.
      marker-yv: yv-n
    - type: text
      text: 'avait vingt-cinq ans lorsqu’il devint roi, et il régna seize ans à Jérusalem. Sa mère s’appelait Jeruscha, fille de Tsadok. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Il fit ce qui est droit aux yeux de l’Éternel, entièrement comme avait fait Ozias, son père. Seulement, il n’entra point dans le temple de l’Éternel. Toutefois, le peuple se corrompait encore. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Jotham bâtit la porte supérieure de la maison de l’Éternel, et il fit beaucoup de constructions sur les murs de la colline. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Il bâtit des villes dans la montagne de Juda, et des châteaux et des tours dans les bois. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Il fut en guerre avec le roi des fils d’Ammon, et il l’emporta sur eux. Les fils d’Ammon lui donnèrent cette année-là cent talents d’argent, dix mille cors de froment, et dix mille d’orge; et ils lui en payèrent autant la seconde année et la troisième. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Jotham devint puissant, parce qu’il affermit ses voies devant l’Éternel, son Dieu. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Le reste des actions de Jotham, toutes ses guerres, et tout ce qu’il a fait, cela est écrit dans le livre des rois d’Israël et de Juda. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Il avait vingt-cinq ans lorsqu’il devint roi, et il régna seize ans à Jérusalem. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Jotham se coucha avec ses pères, et on l’enterra dans la ville de David. Et Achaz, son fils, régna à sa place.
