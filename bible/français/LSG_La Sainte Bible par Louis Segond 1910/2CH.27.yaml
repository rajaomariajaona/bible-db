document_id: 2CH.27,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Jotham, roi de Juda
  - type: heading
    content: 'V. 1-9: cf. 2 R 15:32-38. Pr 21:29. 3 Jn 12.'
  - type: text
    content: 'Jotham '
  - type: note
    content: 2 R 15:33, etc.
  - type: text
    content: 'avait vingt-cinq ans lorsqu’il devint roi, et il régna seize ans à Jérusalem. Sa mère s’appelait Jeruscha, fille de Tsadok. '
  '2':
  - type: text
    content: 'Il fit ce qui est droit aux yeux de l’Éternel, entièrement comme avait fait Ozias, son père. Seulement, il n’entra point dans le temple de l’Éternel. Toutefois, le peuple se corrompait encore. '
  '3':
  - type: text
    content: 'Jotham bâtit la porte supérieure de la maison de l’Éternel, et il fit beaucoup de constructions sur les murs de la colline. '
  '4':
  - type: text
    content: 'Il bâtit des villes dans la montagne de Juda, et des châteaux et des tours dans les bois. '
  '5':
  - type: text
    content: 'Il fut en guerre avec le roi des fils d’Ammon, et il l’emporta sur eux. Les fils d’Ammon lui donnèrent cette année-là cent talents d’argent, dix mille cors de froment, et dix mille d’orge; et ils lui en payèrent autant la seconde année et la troisième. '
  '6':
  - type: text
    content: 'Jotham devint puissant, parce qu’il affermit ses voies devant l’Éternel, son Dieu. '
  '7':
  - type: text
    content: 'Le reste des actions de Jotham, toutes ses guerres, et tout ce qu’il a fait, cela est écrit dans le livre des rois d’Israël et de Juda. '
  '8':
  - type: text
    content: 'Il avait vingt-cinq ans lorsqu’il devint roi, et il régna seize ans à Jérusalem. '
  '9':
  - type: text
    content: Jotham se coucha avec ses pères, et on l’enterra dans la ville de David. Et Achaz, son fils, régna à sa place.
