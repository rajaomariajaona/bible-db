document_id: PSA.74,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ps 79. És 64:8, etc. (2 Ch 36:19, 20. Jé 39:10.) La 1 à 4.
  - type: text
    content: Cantique d’Asaph.
  - type: text
    content: Pourquoi, ô Dieu! Rejettes-tu pour toujours?
  - type: text
    content: Pourquoi t’irrites-tu contre le troupeau de ton pâturage?
  '10':
  - type: text
    content: Jusqu’à quand, ô Dieu! L’oppresseur outragera-t-il,
  - type: text
    content: L’ennemi méprisera-t-il sans cesse ton nom?
  '11':
  - type: text
    content: Pourquoi retires-tu ta main et ta droite?
  - type: text
    content: Sors-la de ton sein! Détruis!
  '12':
  - type: text
    content: Dieu est mon roi dès les temps anciens,
  - type: text
    content: Lui qui opère des délivrances au milieu de la terre.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Ex 14:21, etc.
  - type: text
    content: Tu as fendu la mer par ta puissance,
  - type: text
    content: Tu as brisé les têtes des monstres sur les eaux;
  '14':
  - type: text
    content: Tu as écrasé la tête du crocodile,
  - type: text
    content: Tu l’as donné pour nourriture au peuple du désert.
  '15':
  - type: text
    content: ' '
  - type: note
    content: Ex 17:5, 6. No 20:11. Ps 105:41. És 48:21.
  - type: text
    content: Tu as fait jaillir des sources et des torrents.
  - type: note
    content: Jos 3:13, etc.
  - type: text
    content: Tu as mis à sec des fleuves qui ne tarissent point.
  '16':
  - type: text
    content: A toi est le jour, à toi est la nuit;
  - type: note
    content: Ge 1:14, etc.
  - type: text
    content: Tu as créé la lumière et le soleil.
  '17':
  - type: text
    content: Tu as fixé toutes les limites de la terre,
  - type: text
    content: Tu as établi l’été et l’hiver.
  '18':
  - type: text
    content: Souviens-toi que l’ennemi outrage l’Éternel,
  - type: text
    content: Et qu’un peuple insensé méprise ton nom!
  '19':
  - type: text
    content: Ne livre pas aux bêtes l’âme de ta tourterelle,
  - type: text
    content: N’oublie pas à toujours la vie de tes malheureux!
  '2':
  - type: text
    content: Souviens-toi de ton peuple que tu as acquis autrefois,
  - type: text
    content: Que tu as racheté comme la tribu de ton héritage!
  - type: text
    content: Souviens-toi de la montagne de Sion, où tu faisais ta résidence;
  '20':
  - type: text
    content: Aie égard à l’alliance!
  - type: text
    content: Car les lieux sombres du pays sont pleins de repaires de brigands.
  '21':
  - type: text
    content: Que l’opprimé ne retourne pas confus!
  - type: text
    content: Que le malheureux et le pauvre célèbrent ton nom!
  '22':
  - type: text
    content: Lève-toi, ô Dieu! Défends ta cause!
  - type: text
    content: Souviens-toi des outrages que te fait chaque jour l’insensé!
  '23':
  - type: text
    content: N’oublie pas les clameurs de tes adversaires,
  - type: text
    content: Le tumulte sans cesse croissant de ceux qui s’élèvent contre toi!
  '3':
  - type: text
    content: Porte tes pas vers ces lieux constamment dévastés!
  - type: text
    content: L’ennemi a tout ravagé dans le sanctuaire.
  '4':
  - type: text
    content: Tes adversaires ont rugi au milieu de ton temple;
  - type: text
    content: Ils ont établi pour signes leurs signes.
  '5':
  - type: text
    content: On les a vus, pareils à celui qui lève
  - type: text
    content: La cognée dans une épaisse forêt;
  '6':
  - type: text
    content: Et bientôt ils ont brisé toutes les sculptures,
  - type: text
    content: A coups de haches et de marteaux.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 2 R 25:9.
  - type: text
    content: Ils ont mis le feu à ton sanctuaire;
  - type: text
    content: Ils ont abattu, profané la demeure de ton nom.
  '8':
  - type: text
    content: 'Ils disaient en leur cœur: Traitons-les tous avec violence!'
  - type: text
    content: Ils ont brûlé dans le pays tous les lieux saints.
  '9':
  - type: text
    content: Nous ne voyons plus nos signes;
  - type: text
    content: Il n’y a plus de prophète,
  - type: text
    content: Et personne parmi nous qui sache jusqu’à quand…
