document_id: PSA.74
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: Ps 79. És 64:8, etc. (2 Ch 36:19, 20. Jé 39:10.) La 1 à 4.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Cantique d’Asaph.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi, ô Dieu! Rejettes-tu pour toujours?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi t’irrites-tu contre le troupeau de ton pâturage?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Souviens-toi de ton peuple que tu as acquis autrefois,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que tu as racheté comme la tribu de ton héritage!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Souviens-toi de la montagne de Sion, où tu faisais ta résidence;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Porte tes pas vers ces lieux constamment dévastés!
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’ennemi a tout ravagé dans le sanctuaire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tes adversaires ont rugi au milieu de ton temple;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ont établi pour signes leurs signes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: On les a vus, pareils à celui qui lève
- type: usfm
  marker: q1
  children:
  - type: text
    text: La cognée dans une épaisse forêt;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Et bientôt ils ont brisé toutes les sculptures,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A coups de haches et de marteaux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 25:9
      metadata:
        usfm: 2KI.25.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ils ont mis le feu à ton sanctuaire;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ont abattu, profané la demeure de ton nom.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ils disaient en leur cœur: Traitons-les tous avec violence!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ont brûlé dans le pays tous les lieux saints.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Nous ne voyons plus nos signes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il n’y a plus de prophète,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et personne parmi nous qui sache jusqu’à quand…
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Jusqu’à quand, ô Dieu! L’oppresseur outragera-t-il,
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’ennemi méprisera-t-il sans cesse ton nom?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Pourquoi retires-tu ta main et ta droite?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sors-la de ton sein! Détruis!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Dieu est mon roi dès les temps anciens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lui qui opère des délivrances au milieu de la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ex 14:21, etc.
    marker-yv: yv-n
  - type: text
    text: Tu as fendu la mer par ta puissance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu as brisé les têtes des monstres sur les eaux;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Tu as écrasé la tête du crocodile,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu l’as donné pour nourriture au peuple du désert.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 17:5
      metadata:
        usfm: EXO.17.5
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '6'
      metadata:
        usfm: EXO.17.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 20:11
      metadata:
        usfm: NUM.20.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 105:41
      metadata:
        usfm: PSA.105.41
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 48:21
      metadata:
        usfm: ISA.48.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Tu as fait jaillir des sources et des torrents.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jos 3:13, etc.
    marker-yv: yv-n
  - type: text
    text: Tu as mis à sec des fleuves qui ne tarissent point.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: A toi est le jour, à toi est la nuit;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ge 1:14, etc.
    marker-yv: yv-n
  - type: text
    text: Tu as créé la lumière et le soleil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Tu as fixé toutes les limites de la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu as établi l’été et l’hiver.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Souviens-toi que l’ennemi outrage l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qu’un peuple insensé méprise ton nom!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ne livre pas aux bêtes l’âme de ta tourterelle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: N’oublie pas à toujours la vie de tes malheureux!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Aie égard à l’alliance!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car les lieux sombres du pays sont pleins de repaires de brigands.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Que l’opprimé ne retourne pas confus!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que le malheureux et le pauvre célèbrent ton nom!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Lève-toi, ô Dieu! Défends ta cause!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Souviens-toi des outrages que te fait chaque jour l’insensé!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: N’oublie pas les clameurs de tes adversaires,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le tumulte sans cesse croissant de ceux qui s’élèvent contre toi!
