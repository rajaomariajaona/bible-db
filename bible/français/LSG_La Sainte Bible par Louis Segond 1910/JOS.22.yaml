document_id: JOS.22
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Autel bâti sur le Jourdain par les tribus de Ruben et de Gad et par la demi-tribu de Manassé
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-9: cf. (No 32. Jos 1:12-18.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Alors Josué appela les Rubénites, les Gadites et la demi-tribu de Manassé. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il leur dit: Vous avez observé tout ce que vous a prescrit Moïse, serviteur de l’Éternel, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 32:20
      metadata:
        usfm: NUM.32.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 3:18
      metadata:
        usfm: DEU.3.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'vous avez obéi à ma voix dans tout ce que je vous ai ordonné. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Vous n’avez point abandonné vos frères, depuis un long espace de temps jusqu’à ce jour; et vous avez gardé les ordres, les commandements de l’Éternel, votre Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Maintenant que l’Éternel, votre Dieu, a accordé du repos à vos frères, comme il le leur avait dit, retournez et allez vers vos tentes, dans le pays qui vous appartient, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 32:33
      metadata:
        usfm: NUM.32.33
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 3:13
      metadata:
        usfm: DEU.3.13
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 29:8
      metadata:
        usfm: DEU.29.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 13:8
      metadata:
        usfm: JOS.13.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'que Moïse, serviteur de l’Éternel, vous a donné de l’autre côté du Jourdain. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ayez soin seulement d’observer et de mettre en pratique les ordonnances et les lois que vous a prescrites Moïse, serviteur de l’Éternel: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 10:12
      metadata:
        usfm: DEU.10.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'aimez l’Éternel, votre Dieu, marchez dans toutes ses voies, gardez ses commandements, attachez-vous à lui, et servez-le de tout votre cœur et de toute votre âme. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Et Josué les bénit et les renvoya, et ils s’en allèrent vers leurs tentes. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Moïse avait donné à une moitié de la tribu de Manassé un héritage en Basan, et Josué donna à l’autre moitié un héritage auprès de ses frères en deçà du Jourdain, à l’occident. Lorsque Josué les renvoya vers leurs tentes, il les bénit, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'et leur dit: Vous retournez à vos tentes avec de grandes richesses, avec des troupeaux fort nombreux, et avec une quantité considérable d’argent, d’or, d’airain, de fer, et de vêtements. Partagez avec vos frères le butin de vos ennemis. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Les fils de Ruben, les fils de Gad, et la demi-tribu de Manassé, s’en retournèrent, après avoir quitté les enfants d’Israël à Silo, dans le pays de Canaan, pour aller dans le pays de Galaad, qui était leur propriété et où ils s’étaient établis comme l’Éternel l’avait ordonné par Moïse.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 10-20: cf. De 13:12, etc. Jg 20:1-13. (Lé 17:1-9. De 12:4-14.) Ga 6:1.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 18:7
      metadata:
        usfm: JOS.18.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Quand ils furent arrivés aux districts du Jourdain qui appartiennent au pays de Canaan, les fils de Ruben, les fils de Gad et la demi-tribu de Manassé, y bâtirent un autel sur le Jourdain, un autel dont la grandeur frappait les regards. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Les enfants d’Israël apprirent que l’on disait: Voici, les fils de Ruben, les fils de Gad et la demi-tribu de Manassé, ont bâti un autel en face du pays de Canaan, dans les districts du Jourdain, du côté des enfants d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Lorsque les enfants d’Israël eurent appris cela, toute l’assemblée des enfants d’Israël se réunit à Silo, pour monter contre eux et leur faire la guerre. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Les enfants d’Israël envoyèrent auprès des fils de Ruben, des fils de Gad et de la demi-tribu de Manassé, au pays de Galaad, Phinées, fils du sacrificateur Éléazar, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'et dix princes avec lui, un prince par maison paternelle pour chacune des tribus d’Israël; tous étaient chefs de maison paternelle parmi les milliers d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ils se rendirent auprès des fils de Ruben, des fils de Gad et de la demi-tribu de Manassé, au pays de Galaad, et ils leur adressèrent la parole, en disant: '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ainsi parle toute l’assemblée de l’Éternel: Que signifie cette infidélité que vous avez commise envers le Dieu d’Israël, et pourquoi vous détournez-vous maintenant de l’Éternel, en vous bâtissant un autel pour vous révolter aujourd’hui contre l’Éternel? '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 25:3
      metadata:
        usfm: NUM.25.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 4:3
      metadata:
        usfm: DEU.4.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Regardons-nous comme peu de chose le crime de Peor, dont nous n’avons pas jusqu’à présent enlevé la tache de dessus nous, malgré la plaie qu’il attira sur l’assemblée de l’Éternel? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Et vous vous détournez aujourd’hui de l’Éternel! Si vous vous révoltez aujourd’hui contre l’Éternel, demain il s’irritera contre toute l’assemblée d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Si vous tenez pour impur le pays qui est votre propriété, passez dans le pays qui est la propriété de l’Éternel, où est fixée la demeure de l’Éternel, et établissez-vous au milieu de nous; mais ne vous révoltez pas contre l’Éternel et ne vous séparez pas de nous, en vous bâtissant un autel, outre l’autel de l’Éternel, notre Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Acan, fils de Zérach, ne commit-il pas une infidélité au sujet des choses dévouées par interdit, et la colère de l’Éternel ne s’enflamma-t-elle pas contre toute l’assemblée d’Israël? Il ne fut pas le seul qui périt à cause de son crime.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 21-34: cf. 1 R 12:27-30. (Ge 31:44-55. Jos 24:26, 27.) 2 Co 1:12. (2 Co 7:11.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Les fils de Ruben, les fils de Gad et la demi-tribu de Manassé, répondirent ainsi aux chefs des milliers d’Israël: '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 50:1
      metadata:
        usfm: PSA.50.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Dieu, Dieu, l’Éternel, Dieu, Dieu, l’Éternel le sait, et Israël le saura! Si c’est par rébellion et par infidélité envers l’Éternel, ne viens point à notre aide en ce jour! '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Si nous nous sommes bâti un autel pour nous détourner de l’Éternel, si c’est pour y présenter des holocaustes et des offrandes, et si c’est pour y faire des sacrifices d’actions de grâces, que l’Éternel en demande compte! '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'C’est bien plutôt par une sorte d’inquiétude que nous avons fait cela, en pensant que vos fils diraient un jour à nos fils: Qu’y a-t-il de commun entre vous et l’Éternel, le Dieu d’Israël? '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'L’Éternel a mis le Jourdain pour limite entre nous et vous, fils de Ruben et fils de Gad; vous n’avez point de part à l’Éternel! Et vos fils seraient ainsi cause que nos fils cesseraient de craindre l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'C’est pourquoi nous avons dit: Bâtissons-nous donc un autel, non pour des holocaustes et pour des sacrifices, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'mais '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 31:48
      metadata:
        usfm: GEN.31.48
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 24:27
      metadata:
        usfm: JOS.24.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'comme un témoin entre nous et vous, entre nos descendants et les vôtres, que nous voulons servir l’Éternel devant sa face par nos holocaustes et par nos sacrifices d’expiation et d’actions de grâces, afin que vos fils ne disent pas un jour à nos fils: Vous n’avez point de part à l’Éternel! '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Nous avons dit: S’ils tiennent dans l’avenir ce langage à nous ou à nos descendants, nous répondrons: Voyez la forme de l’autel de l’Éternel, qu’ont fait nos pères, non pour des holocaustes et pour des sacrifices, mais comme témoin entre nous et vous. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Loin de nous la pensée de nous révolter contre l’Éternel et de nous détourner aujourd’hui de l’Éternel, en bâtissant un autel pour des holocaustes, pour des offrandes et pour des sacrifices, outre l’autel de l’Éternel, notre Dieu, qui est devant sa demeure! '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Lorsque le sacrificateur Phinées, et les princes de l’assemblée, les chefs des milliers d’Israël, qui étaient avec lui, eurent entendu les paroles que prononcèrent les fils de Ruben, les fils de Gad et les fils de Manassé, ils furent satisfaits. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Et Phinées, fils du sacrificateur Éléazar, dit aux fils de Ruben, aux fils de Gad, et aux fils de Manassé: Nous reconnaissons maintenant que l’Éternel est au milieu de nous, puisque vous n’avez point commis cette infidélité contre l’Éternel; vous avez ainsi délivré les enfants d’Israël de la main de l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Phinées, fils du sacrificateur Éléazar, et les princes, quittèrent les fils de Ruben et les fils de Gad, et revinrent du pays de Galaad dans le pays de Canaan, auprès des enfants d’Israël, auxquels ils firent un rapport. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Les enfants d’Israël furent satisfaits; ils bénirent Dieu, et ne parlèrent plus de monter en armes pour ravager le pays qu’habitaient les fils de Ruben et les fils de Gad. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Les fils de Ruben et les fils de Gad appelèrent l’autel Ed, car, dirent-ils, il est témoin entre nous que l’Éternel est Dieu.
