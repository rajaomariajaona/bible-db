document_id: GEN.17
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le nom d’Abram changé en celui d’Abraham
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-8: cf. Ps 105:8-11. Ro 4:13, etc.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Lorsque Abram fut âgé de quatre-vingt-dix-neuf ans, l’Éternel apparut à Abram, et lui dit: Je suis le Dieu tout-puissant. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 5:22
      metadata:
        usfm: GEN.5.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Marche devant ma face, et sois intègre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 15:18
      metadata:
        usfm: GEN.15.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 2:24
      metadata:
        usfm: EXO.2.24
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 6:4
      metadata:
        usfm: EXO.6.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 26:42
      metadata:
        usfm: LEV.26.42
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'J’établirai mon alliance entre moi et toi, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 12:2
      metadata:
        usfm: GEN.12.2
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 13:16
      metadata:
        usfm: GEN.13.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 15:5
      metadata:
        usfm: GEN.15.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et je te multiplierai à l’infini. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Abram tomba sur sa face; et Dieu lui parla, en disant: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Voici mon alliance, que je fais avec toi. Tu deviendras '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 4:17
      metadata:
        usfm: ROM.4.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'père d’une multitude de nations. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'On ne t’appellera plus Abram; mais ton nom sera Abraham, car je te rends père d’une multitude de nations. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Je te rendrai fécond à l’infini, je ferai de toi des nations; et '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Mt 1:6, etc.
    marker-yv: yv-n
  - type: text
    text: 'des rois sortiront de toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'J’établirai mon alliance entre moi et toi, et tes descendants après toi, selon leurs générations: ce sera '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 13:15
      metadata:
        usfm: GEN.13.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'une alliance perpétuelle, en vertu de laquelle je serai ton Dieu et celui de ta postérité après toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 15:18
      metadata:
        usfm: GEN.15.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 1:8
      metadata:
        usfm: DEU.1.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Je te donnerai, et à tes descendants après toi, le pays que tu habites comme étranger, tout le pays de Canaan, en possession perpétuelle, et je serai leur Dieu.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La circoncision instituée
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 9-14: cf. Ac 7:8. Ro 4:11, 12.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dieu dit à Abraham: Toi, tu garderas mon alliance, toi et tes descendants après toi, selon leurs générations. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'C’est ici mon alliance, que vous garderez entre moi et vous, et ta postérité après toi: tout mâle parmi vous sera circoncis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Vous vous circoncirez; et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 7:8
      metadata:
        usfm: ACT.7.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 4:11
      metadata:
        usfm: ROM.4.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ce sera un signe d’alliance entre moi et vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 12:3
      metadata:
        usfm: LEV.12.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 2:21
      metadata:
        usfm: LUK.2.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'A l’âge de huit jours, tout mâle parmi vous sera circoncis, selon vos générations, qu’il soit né dans la maison, ou qu’il soit acquis à prix d’argent de tout fils d’étranger, sans appartenir à ta race. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'On devra circoncire celui qui est né dans la maison et celui qui est acquis à prix d’argent; et mon alliance sera dans votre chair une alliance perpétuelle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Un mâle incirconcis, qui n’aura pas été circoncis dans sa chair, sera exterminé du milieu de son peuple: il aura violé mon alliance.'
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 15-22: cf. Ge 18:9-15; 21:1-7.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dieu dit à Abraham: Tu ne donneras plus à Saraï, ta femme, le nom de Saraï; mais son nom sera Sara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Je la bénirai, et je te donnerai d’elle un fils; je la bénirai, et elle deviendra des nations; des rois de peuples sortiront d’elle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Abraham tomba sur sa face; il rit, et dit en son cœur: Naîtrait-il un fils à un homme de cent ans? Et Sara, âgée de quatre-vingt-dix ans, enfanterait-elle? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Et Abraham dit à Dieu: Oh! Qu’Ismaël vive devant ta face! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dieu dit: Certainement '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 18:10
      metadata:
        usfm: GEN.18.10
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 21:2
      metadata:
        usfm: GEN.21.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Sara, ta femme, t’enfantera un fils; et tu l’appelleras du nom d’Isaac. J’établirai mon alliance avec lui comme une alliance perpétuelle pour sa postérité après lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'A l’égard d’Ismaël, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 16:10
      metadata:
        usfm: GEN.16.10
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 25:12
      metadata:
        usfm: GEN.25.12
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '16'
      metadata:
        usfm: GEN.25.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'je t’ai exaucé. Voici, je le bénirai, je le rendrai fécond, et je le multiplierai à l’infini; il engendrera douze princes, et je ferai de lui une grande nation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'J’établirai mon alliance avec Isaac, que Sara t’enfantera '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 21:2
      metadata:
        usfm: GEN.21.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'à cette époque-ci de l’année prochaine. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Lorsqu’il eut achevé de lui parler, Dieu s’éleva au-dessus d’Abraham.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 23-27: cf. Ps 119:60. Jos 5:2-9.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Abraham prit Ismaël, son fils, tous ceux qui étaient nés dans sa maison et tous ceux qu’il avait acquis à prix d’argent, tous les mâles parmi les gens de la maison d’Abraham; et il les circoncit ce même jour, selon l’ordre que Dieu lui avait donné. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Abraham était âgé de quatre-vingt-dix-neuf ans, lorsqu’il fut circoncis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ismaël, son fils, était âgé de treize ans lorsqu’il fut circoncis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ce même jour, Abraham fut circoncis, ainsi qu’Ismaël, son fils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Et tous les gens de sa maison, nés dans sa maison, ou acquis à prix d’argent des étrangers, furent circoncis avec lui.
