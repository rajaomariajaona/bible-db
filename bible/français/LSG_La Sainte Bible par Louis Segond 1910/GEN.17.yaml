document_id: GEN.17,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Le nom d’Abram changé en celui d’Abraham
  - type: heading
    content: 'V. 1-8: cf. Ps 105:8-11. Ro 4:13, etc.'
  - type: text
    content: 'Lorsque Abram fut âgé de quatre-vingt-dix-neuf ans, l’Éternel apparut à Abram, et lui dit: Je suis le Dieu tout-puissant. '
  - type: note
    content: Ge 5:22.
  - type: text
    content: 'Marche devant ma face, et sois intègre. '
  '10':
  - type: text
    content: 'C’est ici mon alliance, que vous garderez entre moi et vous, et ta postérité après toi: tout mâle parmi vous sera circoncis. '
  '11':
  - type: text
    content: 'Vous vous circoncirez; et '
  - type: note
    content: Ac 7:8. Ro 4:11.
  - type: text
    content: 'ce sera un signe d’alliance entre moi et vous. '
  '12':
  - type: note
    content: Lé 12:3. Lu 2:21.
  - type: text
    content: 'A l’âge de huit jours, tout mâle parmi vous sera circoncis, selon vos générations, qu’il soit né dans la maison, ou qu’il soit acquis à prix d’argent de tout fils d’étranger, sans appartenir à ta race. '
  '13':
  - type: text
    content: 'On devra circoncire celui qui est né dans la maison et celui qui est acquis à prix d’argent; et mon alliance sera dans votre chair une alliance perpétuelle. '
  '14':
  - type: text
    content: 'Un mâle incirconcis, qui n’aura pas été circoncis dans sa chair, sera exterminé du milieu de son peuple: il aura violé mon alliance.'
  - type: heading
    content: 'V. 15-22: cf. Ge 18:9-15; 21:1-7.'
  '15':
  - type: text
    content: 'Dieu dit à Abraham: Tu ne donneras plus à Saraï, ta femme, le nom de Saraï; mais son nom sera Sara. '
  '16':
  - type: text
    content: 'Je la bénirai, et je te donnerai d’elle un fils; je la bénirai, et elle deviendra des nations; des rois de peuples sortiront d’elle. '
  '17':
  - type: text
    content: 'Abraham tomba sur sa face; il rit, et dit en son cœur: Naîtrait-il un fils à un homme de cent ans? Et Sara, âgée de quatre-vingt-dix ans, enfanterait-elle? '
  '18':
  - type: text
    content: 'Et Abraham dit à Dieu: Oh! Qu’Ismaël vive devant ta face! '
  '19':
  - type: text
    content: 'Dieu dit: Certainement '
  - type: note
    content: Ge 18:10; 21:2.
  - type: text
    content: 'Sara, ta femme, t’enfantera un fils; et tu l’appelleras du nom d’Isaac. J’établirai mon alliance avec lui comme une alliance perpétuelle pour sa postérité après lui. '
  '2':
  - type: note
    content: Ge 15:18. Ex 2:24; 6:4. Lé 26:42.
  - type: text
    content: 'J’établirai mon alliance entre moi et toi, '
  - type: note
    content: Ge 12:2; 13:16; 15:5.
  - type: text
    content: 'et je te multiplierai à l’infini. '
  '20':
  - type: text
    content: 'A l’égard d’Ismaël, '
  - type: note
    content: Ge 16:10; 25:12, 16.
  - type: text
    content: 'je t’ai exaucé. Voici, je le bénirai, je le rendrai fécond, et je le multiplierai à l’infini; il engendrera douze princes, et je ferai de lui une grande nation. '
  '21':
  - type: text
    content: 'J’établirai mon alliance avec Isaac, que Sara t’enfantera '
  - type: note
    content: Ge 21:2.
  - type: text
    content: 'à cette époque-ci de l’année prochaine. '
  '22':
  - type: text
    content: Lorsqu’il eut achevé de lui parler, Dieu s’éleva au-dessus d’Abraham.
  - type: heading
    content: 'V. 23-27: cf. Ps 119:60. Jos 5:2-9.'
  '23':
  - type: text
    content: 'Abraham prit Ismaël, son fils, tous ceux qui étaient nés dans sa maison et tous ceux qu’il avait acquis à prix d’argent, tous les mâles parmi les gens de la maison d’Abraham; et il les circoncit ce même jour, selon l’ordre que Dieu lui avait donné. '
  '24':
  - type: text
    content: 'Abraham était âgé de quatre-vingt-dix-neuf ans, lorsqu’il fut circoncis. '
  '25':
  - type: text
    content: 'Ismaël, son fils, était âgé de treize ans lorsqu’il fut circoncis. '
  '26':
  - type: text
    content: 'Ce même jour, Abraham fut circoncis, ainsi qu’Ismaël, son fils. '
  '27':
  - type: text
    content: Et tous les gens de sa maison, nés dans sa maison, ou acquis à prix d’argent des étrangers, furent circoncis avec lui.
  '3':
  - type: text
    content: 'Abram tomba sur sa face; et Dieu lui parla, en disant: '
  '4':
  - type: text
    content: 'Voici mon alliance, que je fais avec toi. Tu deviendras '
  - type: note
    content: Ro 4:17.
  - type: text
    content: 'père d’une multitude de nations. '
  '5':
  - type: text
    content: 'On ne t’appellera plus Abram; mais ton nom sera Abraham, car je te rends père d’une multitude de nations. '
  '6':
  - type: text
    content: 'Je te rendrai fécond à l’infini, je ferai de toi des nations; et '
  - type: note
    content: Mt 1:6, etc.
  - type: text
    content: 'des rois sortiront de toi. '
  '7':
  - type: text
    content: 'J’établirai mon alliance entre moi et toi, et tes descendants après toi, selon leurs générations: ce sera '
  - type: note
    content: Ge 13:15.
  - type: text
    content: 'une alliance perpétuelle, en vertu de laquelle je serai ton Dieu et celui de ta postérité après toi. '
  '8':
  - type: note
    content: Ge 15:18. De 1:8.
  - type: text
    content: Je te donnerai, et à tes descendants après toi, le pays que tu habites comme étranger, tout le pays de Canaan, en possession perpétuelle, et je serai leur Dieu.
  - type: heading
    content: La circoncision instituée
  - type: heading
    content: 'V. 9-14: cf. Ac 7:8. Ro 4:11, 12.'
  '9':
  - type: text
    content: 'Dieu dit à Abraham: Toi, tu garderas mon alliance, toi et tes descendants après toi, selon leurs générations. '
