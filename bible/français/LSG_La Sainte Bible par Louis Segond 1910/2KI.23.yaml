document_id: 2KI.23
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Destruction de l’idolâtrie par Josias
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-15: cf. 2 Ch 34:29-33; 15:8-17. 1 S 7:3-4. Ac 19:18-19. Ja 1:25.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 34:29
      metadata:
        usfm: 2CH.34.29
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Le roi Josias fit assembler auprès de lui tous les anciens de Juda et de Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Puis il monta à la maison de l’Éternel, avec tous les hommes de Juda et tous les habitants de Jérusalem, les sacrificateurs, les prophètes, et tout le peuple, depuis le plus petit jusqu’au plus grand. Il lut devant eux toutes les paroles du livre de l’alliance, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 22:8
      metadata:
        usfm: 2CH.22.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qu’on avait trouvé dans la maison de l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Le roi se tenait sur l’estrade, et il traita alliance devant l’Éternel, s’engageant à suivre l’Éternel, et à observer ses ordonnances, ses préceptes et ses lois, de tout son cœur et de toute son âme, afin de mettre en pratique les paroles de cette alliance, écrites dans ce livre. Et tout le peuple entra dans l’alliance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Le roi ordonna à Hilkija, le souverain sacrificateur, aux sacrificateurs du second ordre, et à ceux qui gardaient le seuil, de sortir du temple de l’Éternel tous les ustensiles qui avaient été faits pour Baal, pour Astarté, et pour toute l’armée des cieux; et il les brûla hors de Jérusalem, dans les champs du Cédron, et en fit porter la poussière à Béthel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il chassa les prêtres des idoles, établis par les rois de Juda pour brûler des parfums sur les hauts lieux dans les villes de Juda et aux environs de Jérusalem, et ceux qui offraient des parfums à Baal, au soleil, à la lune, au zodiaque et à toute l’armée des cieux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il sortit de la maison de l’Éternel l’idole d’Astarté, qu’il transporta hors de Jérusalem vers le torrent de Cédron; il la brûla au torrent de Cédron et la réduisit en poussière, et il en jeta la poussière sur les sépulcres des enfants du peuple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il abattit les maisons des prostitués qui étaient dans la maison de l’Éternel, et où les femmes tissaient des tentes pour Astarté. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Il fit venir tous les prêtres des villes de Juda; il souilla les hauts lieux où les prêtres brûlaient des parfums, depuis Guéba jusqu’à Beer-Schéba; et il renversa les hauts lieux des portes, celui qui était à l’entrée de la porte de Josué, chef de la ville, et celui qui était à gauche de la porte de la ville. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Toutefois les prêtres des hauts lieux ne montaient pas à l’autel de l’Éternel à Jérusalem, mais ils mangeaient des pains sans levain au milieu de leurs frères. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Le roi souilla Topheth dans la vallée des fils de Hinnom, afin que personne ne fît plus passer son fils ou sa fille par le feu en l’honneur de Moloc. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il fit disparaître de l’entrée de la maison de l’Éternel les chevaux que les rois de Juda avaient consacrés au soleil, près de la chambre de l’eunuque Nethan-Mélec, qui demeurait dans le faubourg; et il brûla au feu les chars du soleil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Le roi démolit les autels qui étaient sur le toit de la chambre haute d’Achaz et que les rois de Juda avaient faits, et les autels qu’avait faits '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 21:5
      metadata:
        usfm: 2CH.21.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Manassé dans les deux parvis de la maison de l’Éternel; après les avoir brisés et enlevés de là, il en jeta la poussière dans le torrent de Cédron. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Le roi souilla les hauts lieux qui étaient en face de Jérusalem, sur la droite de la montagne de perdition, et que Salomon, roi d’Israël, avait bâtis à Astarté, l’abomination des Sidoniens, à Kemosch, l’abomination de Moab, et à Milcom, l’abomination des fils d’Ammon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il brisa '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 23:24
      metadata:
        usfm: EXO.23.24
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 34:13
      metadata:
        usfm: EXO.34.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 33:52
      metadata:
        usfm: NUM.33.52
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 7:5
      metadata:
        usfm: DEU.7.5
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '25'
      metadata:
        usfm: DEU.7.25
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 12:3
      metadata:
        usfm: DEU.12.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'les statues et abattit les idoles, et il remplit d’ossements d’hommes la place qu’elles occupaient. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Il renversa aussi '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 12:32
      metadata:
        usfm: 1KI.12.32
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '33'
      metadata:
        usfm: 1KI.12.33
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: l’autel qui était à Béthel, et le haut lieu qu’avait fait Jéroboam, fils de Nebath, qui avait fait pécher Israël; il brûla le haut lieu et le réduisit en poussière, et il brûla l’idole.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 16-20: cf. 1 R 13:1-2, 29-32. Ps 69:10.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Josias, s’étant tourné et ayant vu les sépulcres qui étaient là dans la montagne, envoya prendre les ossements des sépulcres, et il les brûla sur l’autel et le souilla, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 13:2
      metadata:
        usfm: 1KI.13.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'selon la parole de l’Éternel prononcée par l’homme de Dieu qui avait annoncé ces choses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il dit: Quel est ce monument que je vois? Les gens de la ville lui répondirent: C’est le sépulcre de l’homme de Dieu, qui est venu de Juda, et qui a crié contre l’autel de Béthel ces choses que tu as accomplies. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Et il dit: Laissez-le; que personne ne remue ses os! On conserva ainsi ses os avec les os du prophète qui était venu de Samarie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Josias fit encore disparaître toutes les maisons des hauts lieux, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 34:6
      metadata:
        usfm: 2CH.34.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qui étaient dans les villes de Samarie, et qu’avaient faites les rois d’Israël pour irriter l’Éternel; il fit à leur égard entièrement comme il avait fait à Béthel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Il immola sur les autels tous les prêtres des hauts lieux, qui étaient là, et il y brûla des ossements d’hommes. Puis il retourna à Jérusalem.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Célébration de la Pâque
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 21-30: cf. 2 Ch 35.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Le roi donna cet ordre à tout le peuple: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 35:1
      metadata:
        usfm: 2CH.35.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Célébrez la Pâque en l’honneur de l’Éternel, votre Dieu, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 12:3
      metadata:
        usfm: EXO.12.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 16:1
      metadata:
        usfm: DEU.16.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'comme il est écrit dans ce livre de l’alliance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Aucune Pâque pareille à celle-ci n’avait été célébrée depuis le temps où les juges jugeaient Israël et pendant tous les jours des rois d’Israël et des rois de Juda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ce fut la dix-huitième année du roi Josias qu’on célébra cette Pâque en l’honneur de l’Éternel à Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'De plus, Josias fit '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 19:31
      metadata:
        usfm: LEV.19.31
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 20:27
      metadata:
        usfm: LEV.20.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 18:11
      metadata:
        usfm: DEU.18.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 8:19
      metadata:
        usfm: ISA.8.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'disparaître ceux qui évoquaient les esprits et ceux qui prédisaient l’avenir, et les théraphim, et les idoles, et toutes les abominations qui se voyaient dans le pays de Juda et à Jérusalem, afin de mettre en pratique les paroles de la loi, écrites dans le livre que le sacrificateur Hilkija avait trouvé dans la maison de l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Avant Josias, il n’y eut point de roi qui, comme lui, revînt à l’Éternel de tout son cœur, de toute son âme et de toute sa force, selon toute la loi de Moïse; et après lui, il n’en a point paru de semblable. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Toutefois l’Éternel ne se désista point de l’ardeur de sa grande colère dont il était enflammé contre Juda, à cause de tout ce qu’avait fait Manassé pour l’irriter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Et l’Éternel dit: J’ôterai aussi Juda de devant ma face '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 17:18
      metadata:
        usfm: 2KI.17.18
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '20'
      metadata:
        usfm: 2KI.17.20
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 24:3
      metadata:
        usfm: 2KI.24.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'comme j’ai ôté Israël, et je rejetterai cette ville de Jérusalem que j’avais choisie, et la maison de laquelle j’avais dit: Là sera mon nom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Le reste des actions de Josias, et tout ce qu’il a fait, cela n’est-il pas écrit dans le livre des Chroniques des rois de Juda? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'De son temps, Pharaon Néco, roi d’Égypte, monta contre le roi d’Assyrie, vers le fleuve de l’Euphrate. Le roi Josias marcha à sa rencontre; et Pharaon le tua à Meguiddo, dès qu’il le vit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ses serviteurs l’emportèrent mort sur un char; ils l’amenèrent de Meguiddo à Jérusalem, et ils l’enterrèrent dans son sépulcre. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 36:1
      metadata:
        usfm: 2CH.36.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et le peuple du pays prit Joachaz, fils de Josias; ils l’oignirent, et le firent roi à la place de son père.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Joachaz, Jojakim, Jojakin, rois de Juda
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 31-35: cf. 2 Ch 36:1-4. Jé 22:10-12.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Joachaz avait vingt-trois ans lorsqu’il devint roi, et il régna trois mois à Jérusalem. Sa mère s’appelait Hamuthal, fille de Jérémie, de Libna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Il fit ce qui est mal aux yeux de l’Éternel, entièrement comme avaient fait ses pères. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Pharaon Néco l’enchaîna à Ribla, dans le pays de Hamath, pour qu’il ne régnât plus à Jérusalem; et il mit sur le pays une contribution de cent talents d’argent et d’un talent d’or. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Et Pharaon Néco établit roi Éliakim, fils de Josias, à la place de Josias, son père, et il changea son nom en celui de '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 1:11
      metadata:
        usfm: MAT.1.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Jojakim. Il prit Joachaz, qui alla en Égypte et y mourut. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Jojakim donna à Pharaon l’argent et l’or; mais il taxa le pays pour fournir cet argent, d’après l’ordre de Pharaon; il détermina la part de chacun et exigea du peuple du pays l’argent et l’or qu’il devait livrer à Pharaon Néco.
- type: usfm
  marker: r
  children:
  - type: text
    text: '23 v. 36 à 24 v. 7: cf. 2 Ch 36:5-8. Éz 19:5-9. (Da 1:1-7.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Jojakim avait vingt-cinq ans lorsqu’il devint roi, et il régna onze ans à Jérusalem. Sa mère s’appelait Zebudda, fille de Pedaja, de Ruma. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Il fit ce qui est mal aux yeux de l’Éternel, entièrement comme avaient fait ses pères.
