document_id: NUM.28,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Temps fixés pour les sacrifices
  - type: heading
    content: 'V. 1-8: cf. Ex 29:38-42. Éz 46:13-15.'
  - type: text
    content: 'L’Éternel parla à Moïse, et dit: Donne cet ordre aux enfants d’Israël, et dis-leur: '
  '10':
  - type: text
    content: 'C’est l’holocauste du sabbat, pour chaque sabbat, outre l’holocauste perpétuel et la libation. '
  '11':
  - type: text
    content: 'Au commencement de vos mois, vous offrirez en holocauste à l’Éternel deux jeunes taureaux, un bélier, et sept agneaux d’un an sans défaut; '
  '12':
  - type: text
    content: 'et, comme offrande pour chaque taureau, trois dixièmes de fleur de farine pétrie à l’huile; comme offrande pour le bélier, deux dixièmes de fleur de farine pétrie à l’huile; '
  '13':
  - type: text
    content: 'comme offrande pour chaque agneau, un dixième de fleur de farine pétrie à l’huile. C’est un holocauste, un sacrifice consumé par le feu, d’une agréable odeur à l’Éternel. '
  '14':
  - type: text
    content: 'Les libations seront d’un demi-hin de vin pour un taureau, d’un tiers de hin pour un bélier, et d’un quart de hin pour un agneau. C’est l’holocauste du commencement du mois, pour chaque mois, pour tous les mois de l’année. '
  '15':
  - type: text
    content: On offrira à l’Éternel un bouc, en sacrifice d’expiation, outre l’holocauste perpétuel et la libation.
  - type: heading
    content: 'V. 16-25: cf. (Ex 12:1-28. Lé 23:5-14. De 16:1-8.) 2 Ch 35:1-19. (Jn 2:13; 6:4; 13:1.)'
  '16':
  - type: text
    content: ' '
  - type: note
    content: Ex 12:18; 23:15. Lé 23:5.
  - type: text
    content: 'Le premier mois, le quatorzième jour du mois, ce sera la Pâque de l’Éternel. '
  '17':
  - type: text
    content: 'Le quinzième jour de ce mois sera un jour de fête. On mangera pendant sept jours des pains sans levain. '
  '18':
  - type: note
    content: Lé 23:7.
  - type: text
    content: 'Le premier jour, il y aura une sainte convocation: vous ne ferez aucune œuvre servile. '
  '19':
  - type: text
    content: 'Vous offrirez en holocauste à l’Éternel un sacrifice consumé par le feu: deux jeunes taureaux, un bélier, et sept agneaux d’un an sans défaut. '
  '2':
  - type: text
    content: 'Vous aurez soin de me présenter, au temps fixé, mon offrande, l’aliment de mes sacrifices consumés par le feu, et qui me sont d’une agréable odeur. '
  '20':
  - type: text
    content: 'Vous y joindrez l’offrande de fleur de farine pétrie à l’huile, trois dixièmes pour un taureau, deux dixièmes pour un bélier, '
  '21':
  - type: text
    content: 'et un dixième pour chacun des sept agneaux. '
  '22':
  - type: text
    content: 'Vous offrirez un bouc en sacrifice d’expiation, afin de faire pour vous l’expiation. '
  '23':
  - type: text
    content: 'Vous offrirez ces sacrifices, outre l’holocauste du matin, qui est un holocauste perpétuel. '
  '24':
  - type: text
    content: 'Vous les offrirez chaque jour, pendant sept jours, comme l’aliment d’un sacrifice consumé par le feu, d’une agréable odeur à l’Éternel. On les offrira, outre l’holocauste perpétuel et la libation. '
  '25':
  - type: text
    content: 'Le septième jour, vous aurez une sainte convocation: vous ne ferez aucune œuvre servile.'
  - type: heading
    content: 'V. 26-31: cf. (Lé 23:15-21. De 16:9-12.)'
  '26':
  - type: text
    content: 'Le jour des prémices, où vous présenterez à l’Éternel une offrande, à votre fête des semaines, vous aurez une sainte convocation: vous ne ferez aucune œuvre servile. '
  '27':
  - type: text
    content: 'Vous offrirez en holocauste, d’une agréable odeur à l’Éternel, deux jeunes taureaux, un bélier, et sept agneaux d’un an. '
  '28':
  - type: text
    content: 'Vous y joindrez l’offrande de fleur de farine pétrie à l’huile, trois dixièmes pour chaque taureau, deux dixièmes pour le bélier, '
  '29':
  - type: text
    content: 'et un dixième pour chacun des sept agneaux. '
  '3':
  - type: text
    content: 'Tu leur diras: Voici le sacrifice consumé par le feu que vous offrirez à l’Éternel: chaque jour, '
  - type: note
    content: Ex 29:38.
  - type: text
    content: 'deux agneaux d’un an sans défaut, comme holocauste perpétuel. '
  '30':
  - type: text
    content: 'Vous offrirez un bouc, afin de faire pour vous l’expiation. '
  '31':
  - type: text
    content: Vous offrirez ces sacrifices, outre l’holocauste perpétuel et l’offrande. Vous aurez des agneaux sans défaut, et vous joindrez les libations.
  '4':
  - type: text
    content: 'Tu offriras l’un des agneaux le matin, et l’autre agneau entre les deux soirs, '
  '5':
  - type: text
    content: 'et, '
  - type: note
    content: Ex 16:36.
  - type: text
    content: 'pour l’offrande, '
  - type: note
    content: Lé 2:1.
  - type: text
    content: 'un dixième d’épha de fleur de farine pétrie dans un quart de '
  - type: note
    content: Ex 29:40.
  - type: text
    content: 'hin d’huile d’olives concassées. '
  '6':
  - type: text
    content: 'C’est l’holocauste perpétuel, qui a été offert à la montagne de Sinaï; c’est un sacrifice consumé par le feu, d’une agréable odeur à l’Éternel. '
  '7':
  - type: text
    content: 'La libation sera d’un quart de hin pour chaque agneau: c’est dans le lieu saint que tu feras la libation de vin à l’Éternel. '
  '8':
  - type: text
    content: Tu offriras le second agneau entre les deux soirs, avec une offrande et une libation semblables à celles du matin; c’est un sacrifice consumé par le feu, d’une agréable odeur à l’Éternel.
  - type: heading
    content: 'V. 9-15: cf. (1 Ch 23:31. No 10:10.) Éz 46:4-7.'
  '9':
  - type: text
    content: 'Le jour du sabbat, vous offrirez deux agneaux d’un an sans défaut, et, pour l’offrande, deux dixièmes de fleur de farine pétrie à l’huile, avec la libation. '
