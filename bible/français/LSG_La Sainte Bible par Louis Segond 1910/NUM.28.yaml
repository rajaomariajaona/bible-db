document_id: NUM.28
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Temps fixés pour les sacrifices
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-8: cf. Ex 29:38-42. Éz 46:13-15.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Éternel parla à Moïse, et dit: Donne cet ordre aux enfants d’Israël, et dis-leur: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Vous aurez soin de me présenter, au temps fixé, mon offrande, l’aliment de mes sacrifices consumés par le feu, et qui me sont d’une agréable odeur. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tu leur diras: Voici le sacrifice consumé par le feu que vous offrirez à l’Éternel: chaque jour, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 29:38
      metadata:
        usfm: EXO.29.38
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'deux agneaux d’un an sans défaut, comme holocauste perpétuel. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tu offriras l’un des agneaux le matin, et l’autre agneau entre les deux soirs, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'et, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 16:36
      metadata:
        usfm: EXO.16.36
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'pour l’offrande, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 2:1
      metadata:
        usfm: LEV.2.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'un dixième d’épha de fleur de farine pétrie dans un quart de '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 29:40
      metadata:
        usfm: EXO.29.40
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'hin d’huile d’olives concassées. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'C’est l’holocauste perpétuel, qui a été offert à la montagne de Sinaï; c’est un sacrifice consumé par le feu, d’une agréable odeur à l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'La libation sera d’un quart de hin pour chaque agneau: c’est dans le lieu saint que tu feras la libation de vin à l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tu offriras le second agneau entre les deux soirs, avec une offrande et une libation semblables à celles du matin; c’est un sacrifice consumé par le feu, d’une agréable odeur à l’Éternel.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 9-15: cf. (1 Ch 23:31. No 10:10.) Éz 46:4-7.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Le jour du sabbat, vous offrirez deux agneaux d’un an sans défaut, et, pour l’offrande, deux dixièmes de fleur de farine pétrie à l’huile, avec la libation. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'C’est l’holocauste du sabbat, pour chaque sabbat, outre l’holocauste perpétuel et la libation. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Au commencement de vos mois, vous offrirez en holocauste à l’Éternel deux jeunes taureaux, un bélier, et sept agneaux d’un an sans défaut; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'et, comme offrande pour chaque taureau, trois dixièmes de fleur de farine pétrie à l’huile; comme offrande pour le bélier, deux dixièmes de fleur de farine pétrie à l’huile; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'comme offrande pour chaque agneau, un dixième de fleur de farine pétrie à l’huile. C’est un holocauste, un sacrifice consumé par le feu, d’une agréable odeur à l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Les libations seront d’un demi-hin de vin pour un taureau, d’un tiers de hin pour un bélier, et d’un quart de hin pour un agneau. C’est l’holocauste du commencement du mois, pour chaque mois, pour tous les mois de l’année. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: On offrira à l’Éternel un bouc, en sacrifice d’expiation, outre l’holocauste perpétuel et la libation.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 16-25: cf. (Ex 12:1-28. Lé 23:5-14. De 16:1-8.) 2 Ch 35:1-19. (Jn 2:13; 6:4; 13:1.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 12:18
      metadata:
        usfm: EXO.12.18
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 23:15
      metadata:
        usfm: EXO.23.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 23:5
      metadata:
        usfm: LEV.23.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Le premier mois, le quatorzième jour du mois, ce sera la Pâque de l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Le quinzième jour de ce mois sera un jour de fête. On mangera pendant sept jours des pains sans levain. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 23:7
      metadata:
        usfm: LEV.23.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Le premier jour, il y aura une sainte convocation: vous ne ferez aucune œuvre servile. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Vous offrirez en holocauste à l’Éternel un sacrifice consumé par le feu: deux jeunes taureaux, un bélier, et sept agneaux d’un an sans défaut. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Vous y joindrez l’offrande de fleur de farine pétrie à l’huile, trois dixièmes pour un taureau, deux dixièmes pour un bélier, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'et un dixième pour chacun des sept agneaux. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Vous offrirez un bouc en sacrifice d’expiation, afin de faire pour vous l’expiation. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Vous offrirez ces sacrifices, outre l’holocauste du matin, qui est un holocauste perpétuel. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Vous les offrirez chaque jour, pendant sept jours, comme l’aliment d’un sacrifice consumé par le feu, d’une agréable odeur à l’Éternel. On les offrira, outre l’holocauste perpétuel et la libation. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Le septième jour, vous aurez une sainte convocation: vous ne ferez aucune œuvre servile.'
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 26-31: cf. (Lé 23:15-21. De 16:9-12.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Le jour des prémices, où vous présenterez à l’Éternel une offrande, à votre fête des semaines, vous aurez une sainte convocation: vous ne ferez aucune œuvre servile. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Vous offrirez en holocauste, d’une agréable odeur à l’Éternel, deux jeunes taureaux, un bélier, et sept agneaux d’un an. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Vous y joindrez l’offrande de fleur de farine pétrie à l’huile, trois dixièmes pour chaque taureau, deux dixièmes pour le bélier, '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'et un dixième pour chacun des sept agneaux. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Vous offrirez un bouc, afin de faire pour vous l’expiation. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Vous offrirez ces sacrifices, outre l’holocauste perpétuel et l’offrande. Vous aurez des agneaux sans défaut, et vous joindrez les libations.
