document_id: DEU.6,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’observation des commandements de l’Éternel
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-9: cf. (De 5:27-33. Ps 119:1-4.) Mc 12:28-34. (De 11:18-21. Ps 78:1-8.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici les commandements, les lois et les ordonnances que l’Éternel, votre Dieu, a commandé de vous enseigner, afin que vous les mettiez en pratique dans le pays dont vous allez prendre possession; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Éternel, ton Dieu, te fera entrer dans le pays qu’il a juré à tes pères, à Abraham, à Isaac et à Jacob, de te donner. Tu posséderas de grandes et bonnes villes que tu n’as point bâties, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'des maisons qui sont pleines de toutes sortes de biens et que tu n’as point remplies, des citernes creusées que tu n’as point creusées, des vignes et des oliviers que tu n’as point plantés. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 8:9
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Lorsque tu mangeras et te rassasieras, garde-toi d’oublier l’Éternel, qui t’a fait sortir du pays d’Égypte, de la maison de servitude. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 10:20
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 4:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 4:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'craindras l’Éternel, ton Dieu, tu le serviras, et tu jureras par son nom. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous n’irez point après d’autres dieux, d’entre les dieux des peuples qui sont autour de vous; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'car l’Éternel, ton Dieu, est un Dieu jaloux au milieu de toi. La colère de l’Éternel, ton Dieu, s’enflammerait contre toi, et il t’exterminerait de dessus la terre. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 4:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 4:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'ne tenterez point l’Éternel, votre Dieu, comme vous l’avez tenté à '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 17:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 20:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Massa. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais vous observerez les commandements de l’Éternel, votre Dieu, ses ordonnances et ses lois qu’il vous a prescrites. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu feras ce qui est droit et ce qui est bien aux yeux de l’Éternel, afin que tu sois heureux, et que tu entres en possession du bon pays que l’Éternel a juré à tes pères de te donner, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'après qu’il aura chassé tous tes ennemis devant toi, comme l’Éternel l’a dit. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'afin que tu craignes l’Éternel, ton Dieu, en observant, tous les jours de ta vie, toi, ton fils, et le fils de ton fils, toutes ses lois et tous ses commandements que je te prescris, et afin que tes jours soient prolongés. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque ton fils te demandera un jour: Que signifient ces préceptes, ces lois et ces ordonnances, que l’Éternel, notre Dieu, vous a prescrits? '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tu diras à ton fils: Nous étions esclaves de Pharaon en Égypte, et l’Éternel nous a fait sortir de l’Égypte par sa main puissante. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Éternel a opéré, sous nos yeux, des miracles et des prodiges, grands et désastreux, contre l’Égypte, contre Pharaon et contre toute sa maison; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et il nous a fait sortir de là, pour nous amener dans le pays qu’il avait juré à nos pères de nous donner. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Éternel nous a commandé de mettre en pratique toutes ces lois, et de craindre l’Éternel, notre Dieu, afin que nous fussions toujours heureux, et qu’il nous conservât la vie, comme il le fait aujourd’hui. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nous aurons la justice en partage, si nous mettons soigneusement en pratique tous ces commandements devant l’Éternel, notre Dieu, comme il nous l’a ordonné.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu les écouteras donc, Israël, et tu auras soin de les mettre en pratique, afin que tu sois heureux et que vous multipliiez beaucoup, comme te l’a dit l’Éternel, le Dieu de tes pères, en te promettant un pays où coulent le lait et le miel. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 4:35
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 12:29
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 17:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 8:4
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Écoute, Israël! L’Éternel, notre Dieu, est le seul Éternel. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 10:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 22:37
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 10:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'aimeras l’Éternel, ton Dieu, de tout ton cœur, de toute ton âme et de toute ta force. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et ces commandements, que je te donne aujourd’hui, seront dans ton cœur. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu les inculqueras à '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 4:9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 11:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'tes enfants, et tu en parleras quand tu seras dans ta maison, quand tu iras en voyage, quand tu te coucheras et quand tu te lèveras. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu les lieras comme un signe sur tes mains, et ils seront comme des fronteaux entre tes yeux. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tu les écriras sur les poteaux de ta maison et sur tes portes.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 10-25: cf. (De 8:6-20; 11:13-17, 22-28.) De 32:15-18. 1 Ti 6:17.'
    marker-yv: yv-h
