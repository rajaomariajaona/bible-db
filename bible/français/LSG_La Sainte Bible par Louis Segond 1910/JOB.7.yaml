document_id: JOB.7,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-21: cf. Job 14. (Ps 102:1-12. És 38:10-15.) Ps 39.'
  - type: text
    content: Le sort de l’homme sur la terre est celui d’un soldat,
  - type: text
    content: Et ses jours sont ceux d’un mercenaire.
  '10':
  - type: text
    content: Il ne reviendra plus dans sa maison,
  - type: text
    content: Et le lieu qu’il habitait ne le connaîtra plus.
  '11':
  - type: text
    content: C’est pourquoi je ne retiendrai point ma bouche,
  - type: text
    content: Je parlerai dans l’angoisse de mon cœur,
  - type: text
    content: Je me plaindrai dans l’amertume de mon âme.
  '12':
  - type: text
    content: Suis-je une mer, ou un monstre marin,
  - type: text
    content: Pour que tu établisses des gardes autour de moi?
  '13':
  - type: text
    content: 'Quand je dis: Mon lit me soulagera,'
  - type: text
    content: Ma couche calmera mes douleurs,
  '14':
  - type: text
    content: C’est alors que tu m’effraies par des songes,
  - type: text
    content: Que tu m’épouvantes par des visions.
  '15':
  - type: text
    content: Ah! Je voudrais être étranglé!
  - type: text
    content: Je voudrais la mort plutôt que ces os!
  '16':
  - type: text
    content: Je les méprise!… je ne vivrai pas toujours…
  - type: text
    content: 'Laisse-moi, '
  - type: note
    content: Ps 62:10; 144:4.
  - type: text
    content: car ma vie n’est qu’un souffle.
  '17':
  - type: text
    content: ' '
  - type: note
    content: Ps 8:5; 144:3. Hé 2:6.
  - type: text
    content: Qu’est-ce que l’homme, pour que tu en fasses tant de cas,
  - type: text
    content: Pour que tu daignes prendre garde à lui,
  '18':
  - type: text
    content: Pour que tu le visites tous les matins,
  - type: text
    content: Pour que tu l’éprouves à tous les instants?
  '19':
  - type: text
    content: Quand cesseras-tu d’avoir le regard sur moi?
  - type: text
    content: Quand me laisseras-tu le temps d’avaler ma salive?
  '2':
  - type: text
    content: Comme l’esclave soupire après l’ombre,
  - type: text
    content: Comme l’ouvrier attend son salaire,
  '20':
  - type: text
    content: Si j’ai péché, qu’ai-je pu te faire, gardien des hommes?
  - type: text
    content: Pourquoi me mettre en butte à tes traits?
  - type: text
    content: Pourquoi me rendre à charge à moi-même?
  '21':
  - type: text
    content: Que ne pardonnes-tu mon péché,
  - type: text
    content: Et que n’oublies-tu mon iniquité?
  - type: text
    content: Car je vais me coucher dans la poussière;
  - type: text
    content: Tu me chercheras, et je ne serai plus.
  '3':
  - type: text
    content: Ainsi j’ai pour partage des mois de douleur,
  - type: text
    content: J’ai pour mon lot des nuits de souffrance.
  '4':
  - type: text
    content: 'Je me couche, et je dis: Quand me lèverai-je? Quand finira la nuit?'
  - type: text
    content: Et je suis rassasié d’agitations jusqu’au point du jour.
  '5':
  - type: text
    content: Mon corps se couvre de vers et d’une croûte terreuse,
  - type: text
    content: Ma peau se crevasse et se dissout.
  '6':
  - type: text
    content: Mes jours sont plus rapides que la navette du tisserand,
  - type: text
    content: 'Ils s’évanouissent: plus d’espérance!'
  '7':
  - type: text
    content: 'Souviens-toi que ma vie est '
  - type: note
    content: Job 8:9; 14:1, 2, 3; 16:22. Ps 90:5, 6, 9; 102:12; 103:15; 144:4; És 40:6. Ja 4:14. 1 Pi 1:24.
  - type: text
    content: un souffle!
  - type: text
    content: Mes yeux ne reverront pas le bonheur.
  '8':
  - type: text
    content: L’œil qui me regarde ne me regardera plus;
  - type: text
    content: Ton œil me cherchera, et je ne serai plus.
  '9':
  - type: text
    content: Comme la nuée se dissipe et s’en va,
  - type: text
    content: Celui qui descend au séjour des morts ne remontera pas;
