- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-21: cf. Job 14. (Ps 102:1-12. És 38:10-15.) Ps 39.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Le sort de l’homme sur la terre est celui d’un soldat,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ses jours sont ceux d’un mercenaire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Comme l’esclave soupire après l’ombre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme l’ouvrier attend son salaire,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ainsi j’ai pour partage des mois de douleur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’ai pour mon lot des nuits de souffrance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Je me couche, et je dis: Quand me lèverai-je? Quand finira la nuit?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je suis rassasié d’agitations jusqu’au point du jour.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mon corps se couvre de vers et d’une croûte terreuse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ma peau se crevasse et se dissout.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mes jours sont plus rapides que la navette du tisserand,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ils s’évanouissent: plus d’espérance!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Souviens-toi que ma vie est '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 8:9
      metadata:
