  - type: text
    text: un souffle!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mes yeux ne reverront pas le bonheur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: L’œil qui me regarde ne me regardera plus;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ton œil me cherchera, et je ne serai plus.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Comme la nuée se dissipe et s’en va,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celui qui descend au séjour des morts ne remontera pas;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Il ne reviendra plus dans sa maison,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le lieu qu’il habitait ne le connaîtra plus.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: C’est pourquoi je ne retiendrai point ma bouche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je parlerai dans l’angoisse de mon cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je me plaindrai dans l’amertume de mon âme.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Suis-je une mer, ou un monstre marin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour que tu établisses des gardes autour de moi?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Quand je dis: Mon lit me soulagera,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ma couche calmera mes douleurs,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: C’est alors que tu m’effraies par des songes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que tu m’épouvantes par des visions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ah! Je voudrais être étranglé!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je voudrais la mort plutôt que ces os!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Je les méprise!… je ne vivrai pas toujours…
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Laisse-moi, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 62:10
      metadata:
        usfm: PSA.62.10
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 144:4
      metadata:
        usfm: PSA.144.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: car ma vie n’est qu’un souffle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 8:5
      metadata:
        usfm: PSA.8.5
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 144:3
      metadata:
        usfm: PSA.144.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 2:6
      metadata:
        usfm: HEB.2.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Qu’est-ce que l’homme, pour que tu en fasses tant de cas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour que tu daignes prendre garde à lui,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Pour que tu le visites tous les matins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour que tu l’éprouves à tous les instants?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Quand cesseras-tu d’avoir le regard sur moi?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand me laisseras-tu le temps d’avaler ma salive?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Si j’ai péché, qu’ai-je pu te faire, gardien des hommes?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi me mettre en butte à tes traits?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi me rendre à charge à moi-même?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Que ne pardonnes-tu mon péché,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que n’oublies-tu mon iniquité?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car je vais me coucher dans la poussière;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu me chercheras, et je ne serai plus.
