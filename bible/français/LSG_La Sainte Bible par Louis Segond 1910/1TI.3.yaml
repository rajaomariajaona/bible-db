document_id: 1TI.3,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Les devoirs des évêques et des diacres
  - type: heading
    content: 'V. 1-7: cf. Tit 1:5-9. 1 Pi 5:1-4.'
  - type: text
    content: 'Cette parole est certaine: Si quelqu’un aspire à la charge d’évêque, il désire une œuvre excellente. '
  '10':
  - type: text
    content: 'Qu’on les éprouve d’abord, et qu’ils exercent ensuite leur ministère, s’ils sont sans reproche. '
  '11':
  - type: text
    content: 'Les femmes, de même, doivent être honnêtes, non médisantes, sobres, fidèles en toutes choses. '
  '12':
  - type: text
    content: 'Les diacres doivent être maris d’une seule femme, et diriger bien leurs enfants et leurs propres maisons; '
  '13':
  - type: note
    content: Mt 25:21.
  - type: text
    content: car ceux qui remplissent convenablement leur ministère s’acquièrent un rang honorable, et une grande assurance dans la foi en Jésus-Christ.
  - type: heading
    content: 'V. 14-16: cf. Ép 2:19-22. (Jn 1:1, 14. Ro 1:4; 16:25, 26.)'
  '14':
  - type: text
    content: 'Je t’écris ces choses, avec l’espérance d’aller bientôt vers toi, '
  '15':
  - type: text
    content: 'mais afin que tu saches, si je tarde, comment il faut se conduire '
  - type: note
    content: 2 Ti 2:20.
  - type: text
    content: 'dans la maison de Dieu, qui est l’Église du Dieu vivant, la colonne et l’appui de la vérité. '
  '16':
  - type: text
    content: 'Et, sans contredit, le mystère de la piété est grand: '
  - type: note
    content: Jn 1:14.
  - type: text
    content: 'celui qui a été manifesté en chair, justifié par l’Esprit, vu des anges, '
  - type: note
    content: Ép 3:5, 6.
  - type: text
    content: 'prêché aux Gentils, cru dans le monde, '
  - type: note
    content: Mc 16:19. Lu 9:51. Ac 1:2.
  - type: text
    content: élevé dans la gloire.
  '2':
  - type: note
    content: Tit 1:6.
  - type: text
    content: 'Il faut donc que l’évêque soit irréprochable, mari d’une seule femme, sobre, modéré, réglé dans sa conduite, hospitalier, '
  - type: note
    content: 2 Ti 2:24.
  - type: text
    content: 'propre à l’enseignement. '
  '3':
  - type: text
    content: 'Il faut qu’il ne soit ni adonné au vin, ni violent, mais indulgent, pacifique, désintéressé. '
  '4':
  - type: text
    content: 'Il faut qu’il dirige bien sa propre maison, et qu’il tienne ses enfants dans la soumission et dans une parfaite honnêteté; '
  '5':
  - type: text
    content: 'car si quelqu’un ne sait pas diriger sa propre maison, comment prendra-t-il soin de l’Église de Dieu? '
  '6':
  - type: text
    content: 'Il ne faut pas qu’il soit un nouveau converti, de peur qu’enflé d’orgueil il ne tombe sous le jugement du diable. '
  '7':
  - type: text
    content: Il faut aussi qu’il reçoive un bon témoignage de ceux du dehors, afin de ne pas tomber dans l’opprobre et dans les pièges du diable.
  - type: heading
    content: 'V. 8-13: cf. Ac 6:1-6. 1 Co 4:2.'
  '8':
  - type: text
    content: ' '
  - type: note
    content: Ac 6:3.
  - type: text
    content: 'Les diacres aussi doivent être honnêtes, éloignés de la duplicité, des excès du vin, d’un gain sordide, '
  '9':
  - type: note
    content: 1 Ti 1:19.
  - type: text
    content: 'conservant le mystère de la foi dans une conscience pure. '
