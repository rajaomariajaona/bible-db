document_id: 1TI.3,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les devoirs des évêques et des diacres
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-7: cf. Tit 1:5-9. 1 Pi 5:1-4.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cette parole est certaine: Si quelqu’un aspire à la charge d’évêque, il désire une œuvre excellente. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Qu’on les éprouve d’abord, et qu’ils exercent ensuite leur ministère, s’ils sont sans reproche. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les femmes, de même, doivent être honnêtes, non médisantes, sobres, fidèles en toutes choses. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les diacres doivent être maris d’une seule femme, et diriger bien leurs enfants et leurs propres maisons; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 25:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: car ceux qui remplissent convenablement leur ministère s’acquièrent un rang honorable, et une grande assurance dans la foi en Jésus-Christ.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 14-16: cf. Ép 2:19-22. (Jn 1:1, 14. Ro 1:4; 16:25, 26.)'
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je t’écris ces choses, avec l’espérance d’aller bientôt vers toi, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mais afin que tu saches, si je tarde, comment il faut se conduire '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ti 2:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'dans la maison de Dieu, qui est l’Église du Dieu vivant, la colonne et l’appui de la vérité. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et, sans contredit, le mystère de la piété est grand: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 1:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'celui qui a été manifesté en chair, justifié par l’Esprit, vu des anges, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 3:5
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'prêché aux Gentils, cru dans le monde, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 16:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 9:51
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 1:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: élevé dans la gloire.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Tit 1:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Il faut donc que l’évêque soit irréprochable, mari d’une seule femme, sobre, modéré, réglé dans sa conduite, hospitalier, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ti 2:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'propre à l’enseignement. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il faut qu’il ne soit ni adonné au vin, ni violent, mais indulgent, pacifique, désintéressé. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il faut qu’il dirige bien sa propre maison, et qu’il tienne ses enfants dans la soumission et dans une parfaite honnêteté; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'car si quelqu’un ne sait pas diriger sa propre maison, comment prendra-t-il soin de l’Église de Dieu? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il ne faut pas qu’il soit un nouveau converti, de peur qu’enflé d’orgueil il ne tombe sous le jugement du diable. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il faut aussi qu’il reçoive un bon témoignage de ceux du dehors, afin de ne pas tomber dans l’opprobre et dans les pièges du diable.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 8-13: cf. Ac 6:1-6. 1 Co 4:2.'
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 6:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Les diacres aussi doivent être honnêtes, éloignés de la duplicité, des excès du vin, d’un gain sordide, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ti 1:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'conservant le mystère de la foi dans une conscience pure. '
