document_id: JER.21,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prophétie sur la prise de Jérusalem par Nebucadnetsar
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-10: cf. Jé 37:1-10; 27:12, etc.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La parole qui fut adressée à Jérémie de la part de l’Éternel, lorsque le roi Sédécias lui envoya Paschhur, fils de Malkija, et Sophonie, fils de Maaséja, le sacrificateur, pour lui dire: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Car je dirige mes regards contre cette ville pour faire du mal et non du bien, dit l’Éternel; elle sera livrée entre les mains du roi de Babylone, qui la brûlera par le feu.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 11-14: cf. Jé 22:1-9.'
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et tu diras à la maison du roi de Juda: Écoutez la parole de l’Éternel!'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Maison de David! Ainsi parle l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 22:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Rendez la justice dès le matin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et délivrez l’opprimé des mains de l’oppresseur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De peur que ma colère n’éclate comme un feu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ne s’enflamme, sans qu’on puisse l’éteindre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause de la méchanceté de vos actions.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, j’en veux à toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ville assise dans la vallée, sur le rocher de la plaine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A vous qui dites: Qui descendra contre nous?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui entrera dans nos demeures?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je vous châtierai selon le fruit de vos œuvres, dit l’Éternel;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je mettrai le '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 17:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: feu à votre forêt,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il en dévorera tous les alentours.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Consulte pour nous l’Éternel; car Nebucadnetsar, roi de Babylone, nous fait la guerre; peut-être l’Éternel fera-t-il en notre faveur quelqu’un de ses miracles, afin qu’il s’éloigne de nous. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jérémie leur répondit: Vous direz à Sédécias: '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi parle l’Éternel, le Dieu d’Israël: Voici, je vais détourner les armes de guerre qui sont dans vos mains, et avec lesquelles vous combattez en dehors des murailles le roi de Babylone et les Chaldéens qui vous assiègent, et je les rassemblerai au milieu de cette ville. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis je combattrai contre vous, la main étendue et le bras fort, avec colère, avec fureur, avec une grande irritation. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je frapperai les habitants de cette ville, les hommes et les bêtes; ils mourront d’une peste affreuse. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après cela, dit l’Éternel, je livrerai Sédécias, roi de Juda, ses serviteurs, le peuple, et ceux qui dans cette ville échapperont à la peste, à l’épée et à la famine, je les livrerai entre les mains de Nebucadnetsar, roi de Babylone, entre les mains de leurs ennemis, entre les mains de ceux qui en veulent à leur vie; et Nebucadnetsar les frappera du tranchant de l’épée, il ne les épargnera pas, il n’aura point de pitié, point de compassion. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu diras à ce peuple: Ainsi parle l’Éternel: Voici, je mets devant vous le chemin de la vie et le chemin de la mort. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Celui qui '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 38:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'restera dans cette ville mourra par l’épée, par la famine ou par la peste; mais celui qui sortira pour se rendre aux Chaldéens qui vous assiègent aura la vie sauve, et sa vie sera son butin. '
