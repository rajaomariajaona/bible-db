document_id: JER.21,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Prophétie sur la prise de Jérusalem par Nebucadnetsar
  - type: heading
    content: 'V. 1-10: cf. Jé 37:1-10; 27:12, etc.'
  - type: text
    content: 'La parole qui fut adressée à Jérémie de la part de l’Éternel, lorsque le roi Sédécias lui envoya Paschhur, fils de Malkija, et Sophonie, fils de Maaséja, le sacrificateur, pour lui dire: '
  '10':
  - type: text
    content: Car je dirige mes regards contre cette ville pour faire du mal et non du bien, dit l’Éternel; elle sera livrée entre les mains du roi de Babylone, qui la brûlera par le feu.
  - type: heading
    content: 'V. 11-14: cf. Jé 22:1-9.'
  '11':
  - type: text
    content: 'Et tu diras à la maison du roi de Juda: Écoutez la parole de l’Éternel!'
  '12':
  - type: text
    content: 'Maison de David! Ainsi parle l’Éternel:'
  - type: note
    content: Jé 22:3.
  - type: text
    content: Rendez la justice dès le matin,
  - type: text
    content: Et délivrez l’opprimé des mains de l’oppresseur,
  - type: text
    content: De peur que ma colère n’éclate comme un feu,
  - type: text
    content: Et ne s’enflamme, sans qu’on puisse l’éteindre,
  - type: text
    content: A cause de la méchanceté de vos actions.
  '13':
  - type: text
    content: Voici, j’en veux à toi,
  - type: text
    content: Ville assise dans la vallée, sur le rocher de la plaine,
  - type: text
    content: Dit l’Éternel,
  - type: text
    content: 'A vous qui dites: Qui descendra contre nous?'
  - type: text
    content: Qui entrera dans nos demeures?
  '14':
  - type: text
    content: Je vous châtierai selon le fruit de vos œuvres, dit l’Éternel;
  - type: text
    content: 'Je mettrai le '
  - type: note
    content: Jé 17:27.
  - type: text
    content: feu à votre forêt,
  - type: text
    content: Et il en dévorera tous les alentours.
  '2':
  - type: text
    content: 'Consulte pour nous l’Éternel; car Nebucadnetsar, roi de Babylone, nous fait la guerre; peut-être l’Éternel fera-t-il en notre faveur quelqu’un de ses miracles, afin qu’il s’éloigne de nous. '
  '3':
  - type: text
    content: 'Jérémie leur répondit: Vous direz à Sédécias: '
  '4':
  - type: text
    content: 'Ainsi parle l’Éternel, le Dieu d’Israël: Voici, je vais détourner les armes de guerre qui sont dans vos mains, et avec lesquelles vous combattez en dehors des murailles le roi de Babylone et les Chaldéens qui vous assiègent, et je les rassemblerai au milieu de cette ville. '
  '5':
  - type: text
    content: 'Puis je combattrai contre vous, la main étendue et le bras fort, avec colère, avec fureur, avec une grande irritation. '
  '6':
  - type: text
    content: 'Je frapperai les habitants de cette ville, les hommes et les bêtes; ils mourront d’une peste affreuse. '
  '7':
  - type: text
    content: 'Après cela, dit l’Éternel, je livrerai Sédécias, roi de Juda, ses serviteurs, le peuple, et ceux qui dans cette ville échapperont à la peste, à l’épée et à la famine, je les livrerai entre les mains de Nebucadnetsar, roi de Babylone, entre les mains de leurs ennemis, entre les mains de ceux qui en veulent à leur vie; et Nebucadnetsar les frappera du tranchant de l’épée, il ne les épargnera pas, il n’aura point de pitié, point de compassion. '
  '8':
  - type: text
    content: 'Tu diras à ce peuple: Ainsi parle l’Éternel: Voici, je mets devant vous le chemin de la vie et le chemin de la mort. '
  '9':
  - type: text
    content: 'Celui qui '
  - type: note
    content: Jé 38:2.
  - type: text
    content: 'restera dans cette ville mourra par l’épée, par la famine ou par la peste; mais celui qui sortira pour se rendre aux Chaldéens qui vous assiègent aura la vie sauve, et sa vie sera son butin. '
