document_id: 1CH.7,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Descendants d’Issacar, de Benjamin, de Nephthali, de Manassé, d’Éphraïm et d’Aser
  - type: heading
    content: 'V. 1-5: cf. 2 S 24:1-9. No 26:23-25. Ge 49:14.'
  - type: text
    content: ' '
  - type: note
    content: Ge 46:13. No 26:23.
  - type: text
    content: 'Fils d’Issacar: Thola, Pua, Jaschub et Schimron, quatre. '
  '10':
  - type: text
    content: 'Fils de Jediaël: Bilhan. Fils de Bilhan: Jeusch, Benjamin, Éhud, Kenaana, Zéthan, Tarsis et Achischachar, '
  '11':
  - type: text
    content: 'tous ceux-là fils de Jediaël, chefs des maisons de leurs pères, hommes vaillants au nombre de dix-sept mille deux cents, en état de porter les armes et d’aller à la guerre. '
  '12':
  - type: text
    content: 'Schuppim et Huppim, fils d’Ir; Huschim, fils d’Acher. '
  '13':
  - type: text
    content: 'Fils de Nephthali: Jahtsiel, Guni, Jetser et Schallum, fils de Bilha.'
  - type: heading
    content: 'V. 14-29: cf. No 26:28-37. De 33:17.'
  '14':
  - type: text
    content: 'Fils de Manassé: Asriel, qu’enfanta sa concubine syrienne; elle enfanta Makir, père de Galaad. '
  '15':
  - type: text
    content: 'Makir prit une femme de Huppim et de Schuppim. Le nom de sa sœur était Maaca. Le nom du second fils était Tselophchad; et Tselophchad eut des filles. '
  '16':
  - type: text
    content: 'Maaca, femme de Makir, enfanta un fils, et l’appela du nom de Péresch; le nom de son frère était Schéresch, et ses fils étaient Ulam et Rékem. '
  '17':
  - type: text
    content: 'Fils d’Ulam: Bedan. Ce sont là les fils de Galaad, fils de Makir, fils de Manassé. '
  '18':
  - type: text
    content: 'Sa sœur Hammoléketh enfanta Ischhod, Abiézer et Machla. '
  '19':
  - type: text
    content: 'Les fils de Schemida étaient: Achjan, Sichem, Likchi et Aniam. '
  '2':
  - type: text
    content: 'Fils de Thola: Uzzi, Rephaja, Jeriel, Jachmaï, Jibsam et Samuel, chefs des maisons de leurs pères, de Thola, vaillants hommes dans leurs générations; leur nombre, du temps de David, était de vingt-deux mille six cents. '
  '20':
  - type: note
    content: No 26:35.
  - type: text
    content: 'Fils d’Éphraïm: Schutélach; Béred, son fils; Thachath, son fils; Éleada, son fils; Thachath, son fils; '
  '21':
  - type: text
    content: 'Zabad, son fils; Schutélach, son fils; Ézer et Élead. Les hommes de Gath, nés dans le pays, les tuèrent, parce qu’ils étaient descendus pour prendre leurs troupeaux. '
  '22':
  - type: text
    content: 'Éphraïm, leur père, fut longtemps dans le deuil, et ses frères vinrent pour le consoler. '
  '23':
  - type: text
    content: 'Puis il alla vers sa femme, et elle conçut et enfanta un fils; il l’appela du nom de Beria, parce que le malheur était dans sa maison. '
  '24':
  - type: text
    content: 'Il eut pour fille Schééra, qui bâtit Beth-Horon la basse et Beth-Horon la haute, et Uzzen-Schééra. '
  '25':
  - type: text
    content: 'Réphach, son fils, et Réscheph; Thélach, son fils; Thachan, son fils; '
  '26':
  - type: text
    content: 'Laedan, son fils; Ammihud, son fils; Élischama, son fils; '
  '27':
  - type: text
    content: 'Nun, son fils; Josué, son fils. '
  '28':
  - type: note
    content: Jos 16:1.
  - type: text
    content: 'Ils avaient en propriété et pour habitations Béthel et les villes de son ressort; à l’orient, Naaran; à l’occident, Guézer et les villes de son ressort, Sichem et les villes de son ressort, jusqu’à Gaza et aux villes de son ressort. '
  '29':
  - type: text
    content: Les fils de Manassé possédaient Beth-Schean et les villes de son ressort, Thaanac et les villes de son ressort, Meguiddo et les villes de son ressort, Dor et les villes de son ressort. Ce fut dans ces villes qu’habitèrent les fils de Joseph, fils d’Israël.
  - type: heading
    content: 'V. 30-40: cf. No 26:44-47. De 33:24, 25.'
  '3':
  - type: text
    content: 'Fils d’Uzzi: Jizrachja. Fils de Jizrachja: Micaël, Abdias, Joël, Jischija, en tout cinq chefs; '
  '30':
  - type: text
    content: ' '
  - type: note
    content: Ge 46:17. No 26:44.
  - type: text
    content: 'Fils d’Aser: Jimna, Jischva, Jischvi et Beria; et Sérach, leur sœur. '
  '31':
  - type: text
    content: 'Fils de Beria: Héber et Malkiel. Malkiel fut père de Birzavith. '
  '32':
  - type: text
    content: 'Et Héber engendra Japhleth, Schomer et Hotham, et Schua, leur sœur. '
  '33':
  - type: text
    content: 'Fils de Japhleth: Pasac, Bimhal et Aschvath. Ce sont là les fils de Japhleth. '
  '34':
  - type: text
    content: 'Fils de Schamer: Achi, Rohega, Hubba et Aram. '
  '35':
  - type: text
    content: 'Fils d’Hélem, son frère: Tsophach, Jimna, Schélesch et Amal. '
  '36':
  - type: text
    content: 'Fils de Tsophach: Suach, Harnépher, Schual, Béri, Jimra, '
  '37':
  - type: text
    content: 'Betser, Hod, Schamma, Schilscha, Jithran et Beéra. '
  '38':
  - type: text
    content: 'Fils de Jéther: Jephunné, Pispa et Ara. '
  '39':
  - type: text
    content: 'Fils d’Ulla: Arach, Hanniel et Ritsja. '
  '4':
  - type: text
    content: 'ils avaient avec eux, selon leurs générations, selon les maisons de leurs pères, trente-six mille hommes de troupes armées pour la guerre, car ils avaient beaucoup de femmes et de fils. '
  '40':
  - type: text
    content: Tous ceux-là étaient fils d’Aser, chefs des maisons de leurs pères, hommes d’élite et vaillants, chefs des princes, enregistrés au nombre de vingt-six mille hommes, en état de porter les armes et d’aller à la guerre.
  '5':
  - type: text
    content: Leurs frères, d’après toutes les familles d’Issacar, hommes vaillants, formaient un total de quatre-vingt-sept mille, enregistrés dans les généalogies.
  - type: heading
    content: 'V. 6-13: cf. No 26:38-41, 48-50. 1 Ch 8. Ge 49:27.'
  '6':
  - type: text
    content: ' '
  - type: note
    content: Ge 46:21. No 26:38. 1 Ch 8:1.
  - type: text
    content: 'Fils de Benjamin: Béla, Béker et Jediaël, trois. '
  '7':
  - type: text
    content: 'Fils de Béla: Etsbon, Uzzi, Uziel, Jerimoth et Iri, cinq chefs des maisons de leurs pères, hommes vaillants, et enregistrés dans les généalogies au nombre de vingt-deux mille trente-quatre. '
  '8':
  - type: text
    content: 'Fils de Béker: Zemira, Joasch, Éliézer, Éljoénaï, Omri, Jerémoth, Abija, Anathoth et Alameth, tous ceux-là fils de Béker, '
  '9':
  - type: text
    content: 'et enregistrés dans les généalogies, selon leurs générations, comme chefs des maisons de leurs pères, hommes vaillants au nombre de vingt mille deux cents. '
