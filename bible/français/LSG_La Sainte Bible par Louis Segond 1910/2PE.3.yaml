document_id: 2PE.3,93
type_code: fra
verses:
  '1':
  - type: heading
    content: L’avènement du Seigneur
  - type: heading
    content: 'V. 1-10: cf. Jud v. 14-19. (Mt 24:37-39. 2 Th 1:7-10.) (És 51:6. Ap 20:11.)'
  - type: text
    content: 'Voici déjà, bien-aimés, la seconde lettre que je vous écris. Dans l’une et dans l’autre je cherche à éveiller '
  - type: note
    content: 2 Pi 1:13.
  - type: text
    content: 'par des avertissements votre saine intelligence, '
  '10':
  - type: text
    content: 'Le jour du Seigneur viendra '
  - type: note
    content: Mt 24:43, 44. 1 Th 5:2. Ap 3:3; 16:15.
  - type: text
    content: comme un voleur; en ce jour, les cieux passeront avec fracas, les éléments embrasés se dissoudront, et la terre avec les œuvres qu’elle renferme sera consumée.
  - type: heading
    content: 'V. 11-18: cf. (Lu 21:34-36. 1 Th 5:1-10. 1 Pi 1:13-16.) (És 65:17. Ap 21:1-5.) Ép 4:14, 15.'
  '11':
  - type: text
    content: 'Puisque donc toutes ces choses doivent se dissoudre, quelles ne doivent pas être la sainteté de votre conduite et votre piété, '
  '12':
  - type: text
    content: 'tandis que vous attendez et hâtez l’avènement du jour de Dieu, '
  - type: note
    content: Ps 50:3. 2 Th 1:8.
  - type: text
    content: 'à cause duquel les cieux enflammés se dissoudront et les éléments embrasés se fondront! '
  '13':
  - type: text
    content: 'Mais nous attendons, '
  - type: note
    content: És 65:17; 66:22. Ap 21:1.
  - type: text
    content: 'selon sa promesse, de nouveaux cieux et une nouvelle terre, où la justice habitera. '
  '14':
  - type: text
    content: 'C’est pourquoi, bien-aimés, en attendant ces choses, appliquez-vous à être trouvés par lui sans tache et irrépréhensibles dans la paix. '
  '15':
  - type: note
    content: Ro 2:4.
  - type: text
    content: 'Croyez que la patience de notre Seigneur est votre salut, comme notre bien-aimé frère Paul vous l’a aussi écrit, selon la sagesse qui lui a été donnée. '
  '16':
  - type: text
    content: 'C’est ce qu’il fait '
  - type: note
    content: Ro 8:19. 1 Co 15:24. 1 Th 4:15.
  - type: text
    content: 'dans toutes les lettres, où il parle de ces choses, dans lesquelles il y a des points difficiles à comprendre, dont les personnes ignorantes et mal affermies tordent le sens, comme celui des autres Écritures, pour leur propre ruine. '
  '17':
  - type: text
    content: 'Vous donc, bien-aimés, qui êtes avertis, mettez-vous sur vos gardes, de peur qu’entraînés par l’égarement des impies, vous ne veniez à déchoir de votre fermeté. '
  '18':
  - type: text
    content: Mais croissez dans la grâce et dans la connaissance de notre Seigneur et Sauveur Jésus-Christ. A lui soit la gloire, maintenant et pour l’éternité! Amen!
  '2':
  - type: text
    content: 'afin que vous vous souveniez des choses annoncées d’avance par les saints prophètes, et du commandement du Seigneur et Sauveur, enseigné par vos apôtres, '
  '3':
  - type: note
    content: 1 Ti 4:1. 2 Ti 3:1. Jud v. 18.
  - type: text
    content: 'sachant avant tout que, dans les derniers jours, il viendra des moqueurs avec leurs railleries, marchant selon leurs propres convoitises, '
  '4':
  - type: text
    content: 'et disant: '
  - type: note
    content: Éz 12:22.
  - type: text
    content: 'Où est la promesse de son avènement? Car, depuis que les pères sont morts, tout demeure comme dès le commencement de la création. '
  '5':
  - type: text
    content: 'Ils veulent ignorer, en effet, que des cieux existèrent autrefois par la parole de Dieu, de même '
  - type: note
    content: Ge 1:9. Ps 24:2.
  - type: text
    content: 'qu’une terre tirée de l’eau et formée au moyen de l’eau, '
  '6':
  - type: text
    content: 'et que '
  - type: note
    content: Ge 7:10, 21.
  - type: text
    content: 'par ces choses le monde d’alors périt, submergé par l’eau, '
  '7':
  - type: text
    content: 'tandis que, par la même parole, '
  - type: note
    content: Ps 102:27. És 51:6. Hé 1:11. 2 Pi 3:10.
  - type: text
    content: 'les cieux et la terre d’à présent sont '
  - type: note
    content: 2 Th 1:8.
  - type: text
    content: 'gardés et réservés pour le feu, pour le jour du jugement et de la ruine des hommes impies. '
  '8':
  - type: text
    content: 'Mais il est une chose, bien-aimés, que vous ne devez pas ignorer, c’est que, devant le Seigneur, '
  - type: note
    content: Ps 90:4.
  - type: text
    content: 'un jour est comme mille ans, et mille ans sont comme un jour. '
  '9':
  - type: note
    content: Ha 2:3.
  - type: text
    content: 'Le Seigneur ne tarde pas dans l’accomplissement de la promesse, '
  - type: note
    content: 1 Pi 3:20. 2 Pi 3:15.
  - type: text
    content: 'comme quelques-uns le croient; '
  - type: note
    content: És 30:18. Ro 2:4.
  - type: text
    content: 'mais il use de patience envers vous, '
  - type: note
    content: Éz 18:32; 33:11. 1 Ti 2:4.
  - type: text
    content: 'ne voulant pas qu’aucun périsse, mais voulant que tous arrivent à la repentance. '
