document_id: 2PE.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’avènement du Seigneur
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-10: cf. Jud v. 14-19. (Mt 24:37-39. 2 Th 1:7-10.) (És 51:6. Ap 20:11.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Voici déjà, bien-aimés, la seconde lettre que je vous écris. Dans l’une et dans l’autre je cherche à éveiller '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Pi 1:13
      metadata:
        usfm: 2PE.1.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'par des avertissements votre saine intelligence, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'afin que vous vous souveniez des choses annoncées d’avance par les saints prophètes, et du commandement du Seigneur et Sauveur, enseigné par vos apôtres, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 4:1
      metadata:
        usfm: 1TI.4.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ti 3:1
      metadata:
        usfm: 2TI.3.1
    - type: text
      text: . Jud v. 18.
    marker-yv: yv-n
  - type: text
    text: 'sachant avant tout que, dans les derniers jours, il viendra des moqueurs avec leurs railleries, marchant selon leurs propres convoitises, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'et disant: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 12:22
      metadata:
        usfm: EZK.12.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Où est la promesse de son avènement? Car, depuis que les pères sont morts, tout demeure comme dès le commencement de la création. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ils veulent ignorer, en effet, que des cieux existèrent autrefois par la parole de Dieu, de même '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 1:9
      metadata:
        usfm: GEN.1.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 24:2
      metadata:
        usfm: PSA.24.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qu’une terre tirée de l’eau et formée au moyen de l’eau, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'et que '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 7:10
      metadata:
        usfm: GEN.7.10
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '21'
      metadata:
        usfm: GEN.7.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'par ces choses le monde d’alors périt, submergé par l’eau, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'tandis que, par la même parole, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 102:27
      metadata:
        usfm: PSA.102.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 51:6
      metadata:
        usfm: ISA.51.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 1:11
      metadata:
        usfm: HEB.1.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Pi 3:10
      metadata:
        usfm: 2PE.3.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'les cieux et la terre d’à présent sont '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Th 1:8
      metadata:
        usfm: 2TH.1.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'gardés et réservés pour le feu, pour le jour du jugement et de la ruine des hommes impies. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mais il est une chose, bien-aimés, que vous ne devez pas ignorer, c’est que, devant le Seigneur, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 90:4
      metadata:
        usfm: PSA.90.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'un jour est comme mille ans, et mille ans sont comme un jour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ha 2:3
      metadata:
        usfm: HAB.2.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Le Seigneur ne tarde pas dans l’accomplissement de la promesse, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 3:20
      metadata:
        usfm: 1PE.3.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Pi 3:15
      metadata:
        usfm: 2PE.3.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'comme quelques-uns le croient; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 30:18
      metadata:
        usfm: ISA.30.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 2:4
      metadata:
        usfm: ROM.2.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'mais il use de patience envers vous, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 18:32
      metadata:
        usfm: EZK.18.32
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 33:11
      metadata:
        usfm: EZK.33.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 2:4
      metadata:
        usfm: 1TI.2.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ne voulant pas qu’aucun périsse, mais voulant que tous arrivent à la repentance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Le jour du Seigneur viendra '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 24:43
      metadata:
        usfm: MAT.24.43
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '44'
      metadata:
        usfm: MAT.24.44
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 5:2
      metadata:
        usfm: 1TH.5.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 3:3
      metadata:
        usfm: REV.3.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 16:15
      metadata:
        usfm: REV.16.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: comme un voleur; en ce jour, les cieux passeront avec fracas, les éléments embrasés se dissoudront, et la terre avec les œuvres qu’elle renferme sera consumée.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 11-18: cf. (Lu 21:34-36. 1 Th 5:1-10. 1 Pi 1:13-16.) (És 65:17. Ap 21:1-5.) Ép 4:14, 15.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Puisque donc toutes ces choses doivent se dissoudre, quelles ne doivent pas être la sainteté de votre conduite et votre piété, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'tandis que vous attendez et hâtez l’avènement du jour de Dieu, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 50:3
      metadata:
        usfm: PSA.50.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Th 1:8
      metadata:
        usfm: 2TH.1.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'à cause duquel les cieux enflammés se dissoudront et les éléments embrasés se fondront! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mais nous attendons, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 65:17
      metadata:
        usfm: ISA.65.17
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 66:22
      metadata:
        usfm: ISA.66.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 21:1
      metadata:
        usfm: REV.21.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'selon sa promesse, de nouveaux cieux et une nouvelle terre, où la justice habitera. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'C’est pourquoi, bien-aimés, en attendant ces choses, appliquez-vous à être trouvés par lui sans tache et irrépréhensibles dans la paix. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 2:4
      metadata:
        usfm: ROM.2.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Croyez que la patience de notre Seigneur est votre salut, comme notre bien-aimé frère Paul vous l’a aussi écrit, selon la sagesse qui lui a été donnée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'C’est ce qu’il fait '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 8:19
      metadata:
        usfm: ROM.8.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 15:24
      metadata:
        usfm: 1CO.15.24
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 4:15
      metadata:
        usfm: 1TH.4.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'dans toutes les lettres, où il parle de ces choses, dans lesquelles il y a des points difficiles à comprendre, dont les personnes ignorantes et mal affermies tordent le sens, comme celui des autres Écritures, pour leur propre ruine. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Vous donc, bien-aimés, qui êtes avertis, mettez-vous sur vos gardes, de peur qu’entraînés par l’égarement des impies, vous ne veniez à déchoir de votre fermeté. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Mais croissez dans la grâce et dans la connaissance de notre Seigneur et Sauveur Jésus-Christ. A lui soit la gloire, maintenant et pour l’éternité! Amen!
