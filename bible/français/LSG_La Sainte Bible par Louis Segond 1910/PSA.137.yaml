document_id: PSA.137,93
type_code: fra
verses:
  '1':
  - type: heading
    content: (La 1; 2.) Éz 25:12-14. Jé 50; 51.
  - type: text
    content: Sur les bords des fleuves de Babylone,
  - type: text
    content: Nous étions assis et nous pleurions,
  - type: text
    content: En nous souvenant de Sion.
  '2':
  - type: text
    content: Aux saules de la contrée
  - type: text
    content: Nous avions suspendu nos harpes.
  '3':
  - type: text
    content: Là, nos vainqueurs nous demandaient des chants,
  - type: note
    content: Ps 79:1.
  - type: text
    content: 'Et nos oppresseurs de la joie:'
  - type: text
    content: Chantez-nous quelques-uns des cantiques de Sion!
  '4':
  - type: text
    content: Comment chanterions-nous les cantiques de l’Éternel
  - type: text
    content: Sur une terre étrangère?
  '5':
  - type: text
    content: Si je t’oublie, Jérusalem,
  - type: text
    content: Que ma droite m’oublie!
  '6':
  - type: text
    content: Que ma langue s’attache à mon palais,
  - type: text
    content: Si je ne me souviens de toi,
  - type: text
    content: Si je ne fais de Jérusalem
  - type: text
    content: Le principal sujet de ma joie!
  '7':
  - type: text
    content: 'Éternel, '
  - type: note
    content: Jé 49:7. Éz 25:12.
  - type: text
    content: souviens-toi des enfants d’Édom,
  - type: text
    content: Qui, dans la journée de Jérusalem,
  - type: text
    content: 'Disaient: Rasez, rasez'
  - type: text
    content: Jusqu’à ses fondements!
  '8':
  - type: text
    content: Fille de Babylone, la dévastée,
  - type: note
    content: Jé 50:15, 29. Ap 18:6.
  - type: text
    content: Heureux qui te rend la pareille,
  - type: text
    content: Le mal que tu nous as fait!
  '9':
  - type: text
    content: Heureux qui saisit tes enfants,
  - type: text
    content: Et les écrase sur le roc!
