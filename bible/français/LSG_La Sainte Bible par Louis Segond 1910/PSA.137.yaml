document_id: PSA.137,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: (La 1; 2.) Éz 25:12-14. Jé 50; 51.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur les bords des fleuves de Babylone,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous étions assis et nous pleurions,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En nous souvenant de Sion.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aux saules de la contrée
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous avions suspendu nos harpes.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Là, nos vainqueurs nous demandaient des chants,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 79:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Et nos oppresseurs de la joie:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Chantez-nous quelques-uns des cantiques de Sion!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comment chanterions-nous les cantiques de l’Éternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur une terre étrangère?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si je t’oublie, Jérusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que ma droite m’oublie!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que ma langue s’attache à mon palais,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si je ne me souviens de toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si je ne fais de Jérusalem
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le principal sujet de ma joie!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Éternel, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 49:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 25:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: souviens-toi des enfants d’Édom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui, dans la journée de Jérusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Disaient: Rasez, rasez'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jusqu’à ses fondements!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fille de Babylone, la dévastée,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 50:15
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '29'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 18:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Heureux qui te rend la pareille,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le mal que tu nous as fait!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Heureux qui saisit tes enfants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les écrase sur le roc!
