document_id: HOS.9,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Déportation d’Israël
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-6: cf. Os 2:10-15. És 32:10-14. (Os 8:13; 11:5.)'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Israël, ne te livre pas à la joie, à l’allégresse, comme les peuples,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De ce que tu t’es prostitué en abandonnant l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De ce que tu as aimé un salaire impur dans toutes les aires à blé!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai trouvé Israël comme des raisins dans le désert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai vu vos pères comme les premiers fruits d’un figuier;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mais ils sont allés '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 25:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 106:28
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: vers Baal-Peor,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils se sont consacrés à l’infâme idole,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils sont devenus abominables comme l’objet de leur amour.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'La gloire d’Éphraïm s’envolera comme un oiseau:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Plus de naissance, plus de grossesse, plus de conception.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: S’ils élèvent leurs enfants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je les en priverai avant qu’ils soient des hommes;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et malheur à eux, quand je les abandonnerai!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Éphraïm, aussi loin que portent mes regards du côté de Tyr,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Est planté dans un lieu agréable;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais Éphraïm mènera ses enfants vers celui qui les tuera.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Donne-leur, ô Éternel!… Que leur donneras-tu?…
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Donne-leur un '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 23:29
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: sein qui avorte et des mamelles desséchées!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Toute leur méchanceté se montre à '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Os 4:15
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 12:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Guilgal;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est là que je les ai pris en aversion.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause de la malice de leurs œuvres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je les chasserai de ma maison.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ne les aimerai plus;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tous leurs '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 1:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: chefs sont des rebelles.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Éphraïm est frappé, sa racine est devenue sèche;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ne porteront plus de fruit;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et s’ils ont des enfants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ferai périr les objets de leur tendresse.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon Dieu les rejettera, parce qu’ils ne l’ont pas écouté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils seront errants parmi les nations.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’aire et le pressoir ne les nourriront pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le moût leur fera défaut.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ne resteront pas dans le pays de l’Éternel;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Éphraïm retournera en Égypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils mangeront en Assyrie des aliments impurs.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ils ne feront pas à l’Éternel des libations de vin:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles ne lui seraient point agréables.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leurs sacrifices seront pour eux comme un pain de deuil;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous ceux qui en mangeront se rendront impurs;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car leur pain ne sera que pour eux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n’entrera point dans la maison de l’Éternel.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que ferez-vous aux jours solennels,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aux jours des fêtes de l’Éternel?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car voici, ils partent à cause de la dévastation;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Égypte les recueillera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moph leur donnera des sépulcres;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce qu’ils ont de précieux, leur argent, sera la proie des ronces,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les épines croîtront dans leurs tentes.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 7-9: cf. Jé 20:7-18.'
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils arrivent, les jours du châtiment,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ils arrivent, les jours de la rétribution:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Israël va l’éprouver!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le prophète est fou, l’homme inspiré a le délire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause de la grandeur de tes iniquités et de tes rébellions.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Éphraïm est une sentinelle contre mon Dieu;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le prophète… un filet d’oiseleur est sur toutes ses voies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un ennemi dans la maison de son Dieu.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils sont plongés dans la corruption, comme aux jours de Guibea;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel se souviendra de leur iniquité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il punira leurs péchés.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 10-17: cf. Jé 2:2-7, 14-19. De 4:25-27.'
    marker-yv: yv-h
