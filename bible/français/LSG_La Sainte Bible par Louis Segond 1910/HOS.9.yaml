document_id: HOS.9,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Déportation d’Israël
  - type: heading
    content: 'V. 1-6: cf. Os 2:10-15. És 32:10-14. (Os 8:13; 11:5.)'
  - type: text
    content: Israël, ne te livre pas à la joie, à l’allégresse, comme les peuples,
  - type: text
    content: De ce que tu t’es prostitué en abandonnant l’Éternel,
  - type: text
    content: De ce que tu as aimé un salaire impur dans toutes les aires à blé!
  '10':
  - type: text
    content: J’ai trouvé Israël comme des raisins dans le désert,
  - type: text
    content: J’ai vu vos pères comme les premiers fruits d’un figuier;
  - type: text
    content: 'Mais ils sont allés '
  - type: note
    content: No 25:3. Ps 106:28.
  - type: text
    content: vers Baal-Peor,
  - type: text
    content: Ils se sont consacrés à l’infâme idole,
  - type: text
    content: Et ils sont devenus abominables comme l’objet de leur amour.
  '11':
  - type: text
    content: 'La gloire d’Éphraïm s’envolera comme un oiseau:'
  - type: text
    content: Plus de naissance, plus de grossesse, plus de conception.
  '12':
  - type: text
    content: S’ils élèvent leurs enfants,
  - type: text
    content: Je les en priverai avant qu’ils soient des hommes;
  - type: text
    content: Et malheur à eux, quand je les abandonnerai!
  '13':
  - type: text
    content: Éphraïm, aussi loin que portent mes regards du côté de Tyr,
  - type: text
    content: Est planté dans un lieu agréable;
  - type: text
    content: Mais Éphraïm mènera ses enfants vers celui qui les tuera.
  '14':
  - type: text
    content: Donne-leur, ô Éternel!… Que leur donneras-tu?…
  - type: text
    content: 'Donne-leur un '
  - type: note
    content: Lu 23:29.
  - type: text
    content: sein qui avorte et des mamelles desséchées!
  '15':
  - type: text
    content: 'Toute leur méchanceté se montre à '
  - type: note
    content: Os 4:15; 12:12.
  - type: text
    content: Guilgal;
  - type: text
    content: C’est là que je les ai pris en aversion.
  - type: text
    content: A cause de la malice de leurs œuvres,
  - type: text
    content: Je les chasserai de ma maison.
  - type: text
    content: Je ne les aimerai plus;
  - type: text
    content: 'Tous leurs '
  - type: note
    content: És 1:23.
  - type: text
    content: chefs sont des rebelles.
  '16':
  - type: text
    content: Éphraïm est frappé, sa racine est devenue sèche;
  - type: text
    content: Ils ne porteront plus de fruit;
  - type: text
    content: Et s’ils ont des enfants,
  - type: text
    content: Je ferai périr les objets de leur tendresse.
  '17':
  - type: text
    content: Mon Dieu les rejettera, parce qu’ils ne l’ont pas écouté,
  - type: text
    content: Et ils seront errants parmi les nations.
  '2':
  - type: text
    content: L’aire et le pressoir ne les nourriront pas,
  - type: text
    content: Et le moût leur fera défaut.
  '3':
  - type: text
    content: Ils ne resteront pas dans le pays de l’Éternel;
  - type: text
    content: Éphraïm retournera en Égypte,
  - type: text
    content: Et ils mangeront en Assyrie des aliments impurs.
  '4':
  - type: text
    content: 'Ils ne feront pas à l’Éternel des libations de vin:'
  - type: text
    content: Elles ne lui seraient point agréables.
  - type: text
    content: Leurs sacrifices seront pour eux comme un pain de deuil;
  - type: text
    content: Tous ceux qui en mangeront se rendront impurs;
  - type: text
    content: Car leur pain ne sera que pour eux,
  - type: text
    content: Il n’entrera point dans la maison de l’Éternel.
  '5':
  - type: text
    content: Que ferez-vous aux jours solennels,
  - type: text
    content: Aux jours des fêtes de l’Éternel?
  '6':
  - type: text
    content: Car voici, ils partent à cause de la dévastation;
  - type: text
    content: L’Égypte les recueillera,
  - type: text
    content: Moph leur donnera des sépulcres;
  - type: text
    content: Ce qu’ils ont de précieux, leur argent, sera la proie des ronces,
  - type: text
    content: Et les épines croîtront dans leurs tentes.
  - type: heading
    content: 'V. 7-9: cf. Jé 20:7-18.'
  '7':
  - type: text
    content: Ils arrivent, les jours du châtiment,
  - type: text
    content: 'Ils arrivent, les jours de la rétribution:'
  - type: text
    content: Israël va l’éprouver!
  - type: text
    content: Le prophète est fou, l’homme inspiré a le délire,
  - type: text
    content: A cause de la grandeur de tes iniquités et de tes rébellions.
  '8':
  - type: text
    content: Éphraïm est une sentinelle contre mon Dieu;
  - type: text
    content: Le prophète… un filet d’oiseleur est sur toutes ses voies,
  - type: text
    content: Un ennemi dans la maison de son Dieu.
  '9':
  - type: text
    content: Ils sont plongés dans la corruption, comme aux jours de Guibea;
  - type: text
    content: L’Éternel se souviendra de leur iniquité,
  - type: text
    content: Il punira leurs péchés.
  - type: heading
    content: 'V. 10-17: cf. Jé 2:2-7, 14-19. De 4:25-27.'
