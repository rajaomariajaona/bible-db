document_id: PRO.26,93
type_code: fra
verses:
  '1':
  - type: text
    content: Comme la neige en été, et la pluie pendant la moisson,
  - type: text
    content: Ainsi la gloire ne convient pas à un insensé.
  '10':
  - type: text
    content: Comme un archer qui blesse tout le monde,
  - type: text
    content: Ainsi est celui qui prend à gage les insensés et les premiers venus.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 2 Pi 2:22.
  - type: text
    content: Comme un chien qui retourne à ce qu’il a vomi,
  - type: text
    content: Ainsi est un insensé qui revient à sa folie.
  '12':
  - type: text
    content: Si tu vois un homme qui se croit sage,
  - type: note
    content: Pr 29:20.
  - type: text
    content: Il y a plus à espérer d’un insensé que de lui.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Pr 22:13.
  - type: text
    content: 'Le paresseux dit: Il y a un lion sur le chemin,'
  - type: text
    content: Il y a un lion dans les rues!
  '14':
  - type: text
    content: La porte tourne sur ses gonds,
  - type: text
    content: Et le paresseux sur son lit.
  '15':
  - type: text
    content: ' '
  - type: note
    content: Pr 19:24.
  - type: text
    content: Le paresseux plonge sa main dans le plat,
  - type: text
    content: Et il trouve pénible de la ramener à sa bouche.
  '16':
  - type: text
    content: Le paresseux se croit plus sage
  - type: text
    content: Que sept hommes qui répondent avec bon sens.
  '17':
  - type: text
    content: Comme celui qui saisit un chien par les oreilles,
  - type: text
    content: Ainsi est un passant qui s’irrite pour une querelle où il n’a que faire.
  '18':
  - type: text
    content: Comme un furieux qui lance des flammes,
  - type: text
    content: Des flèches et la mort,
  '19':
  - type: text
    content: Ainsi est un homme qui trompe son prochain,
  - type: text
    content: 'Et qui dit: N’était-ce pas pour plaisanter?'
  '2':
  - type: text
    content: Comme l’oiseau s’échappe, comme l’hirondelle s’envole,
  - type: text
    content: Ainsi la malédiction sans cause n’a point d’effet.
  '20':
  - type: text
    content: Faute de bois, le feu s’éteint;
  - type: note
    content: Pr 22:10.
  - type: text
    content: Et quand il n’y a point de rapporteur, la querelle s’apaise.
  '21':
  - type: text
    content: Le charbon produit un brasier, et le bois du feu;
  - type: text
    content: 'Ainsi '
  - type: note
    content: Pr 15:18; 29:22.
  - type: text
    content: un homme querelleur échauffe une dispute.
  '22':
  - type: text
    content: ' '
  - type: note
    content: Pr 18:8.
  - type: text
    content: Les paroles du rapporteur sont comme des friandises,
  - type: text
    content: Elles descendent jusqu’au fond des entrailles.
  '23':
  - type: text
    content: Comme des scories d’argent appliquées sur un vase de terre,
  - type: text
    content: Ainsi sont des lèvres brûlantes et un cœur mauvais.
  '24':
  - type: text
    content: Par ses lèvres celui qui hait se déguise,
  - type: text
    content: Et il met au-dedans de lui la tromperie.
  '25':
  - type: text
    content: Lorsqu’il prend une voix douce, ne le crois pas,
  - type: text
    content: Car il y a sept abominations dans son cœur.
  '26':
  - type: text
    content: S’il cache sa haine sous la dissimulation,
  - type: text
    content: Sa méchanceté se révélera dans l’assemblée.
  '27':
  - type: text
    content: ' '
  - type: note
    content: Ps 7:16; 9:16; 10:2; 57:7. Ec 10:8.
  - type: text
    content: Celui qui creuse une fosse y tombe,
  - type: text
    content: Et la pierre revient sur celui qui la roule.
  '28':
  - type: text
    content: La langue fausse hait ceux qu’elle écrase,
  - type: text
    content: Et la bouche flatteuse prépare la ruine.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Ps 32:9, 10.
  - type: text
    content: Le fouet est pour le cheval, le mors pour l’âne,
  - type: note
    content: Pr 10:13.
  - type: text
    content: Et la verge pour le dos des insensés.
  '4':
  - type: text
    content: Ne réponds pas à l’insensé selon sa folie,
  - type: text
    content: De peur que tu ne lui ressembles toi-même.
  '5':
  - type: text
    content: Réponds à l’insensé selon sa folie,
  - type: text
    content: Afin qu’il ne se regarde pas comme sage.
  '6':
  - type: text
    content: Il se coupe les pieds, il boit l’injustice,
  - type: text
    content: Celui qui donne des messages à un insensé.
  '7':
  - type: text
    content: Comme les jambes du boiteux sont faibles,
  - type: text
    content: Ainsi est une sentence dans la bouche des insensés.
  '8':
  - type: text
    content: C’est attacher une pierre à la fronde,
  - type: text
    content: Que d’accorder des honneurs à un insensé.
  '9':
  - type: text
    content: Comme une épine qui se dresse dans la main d’un homme ivre,
  - type: text
    content: Ainsi est une sentence dans la bouche des insensés.
