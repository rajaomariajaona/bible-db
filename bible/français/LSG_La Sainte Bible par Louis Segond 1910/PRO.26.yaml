document_id: PRO.26
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Comme la neige en été, et la pluie pendant la moisson,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ainsi la gloire ne convient pas à un insensé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Comme l’oiseau s’échappe, comme l’hirondelle s’envole,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ainsi la malédiction sans cause n’a point d’effet.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 32:9
      metadata:
        usfm: PSA.32.9
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '10'
      metadata:
        usfm: PSA.32.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Le fouet est pour le cheval, le mors pour l’âne,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 10:13
      metadata:
        usfm: PRO.10.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et la verge pour le dos des insensés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ne réponds pas à l’insensé selon sa folie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De peur que tu ne lui ressembles toi-même.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Réponds à l’insensé selon sa folie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afin qu’il ne se regarde pas comme sage.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Il se coupe les pieds, il boit l’injustice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celui qui donne des messages à un insensé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Comme les jambes du boiteux sont faibles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ainsi est une sentence dans la bouche des insensés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: C’est attacher une pierre à la fronde,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que d’accorder des honneurs à un insensé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Comme une épine qui se dresse dans la main d’un homme ivre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ainsi est une sentence dans la bouche des insensés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Comme un archer qui blesse tout le monde,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ainsi est celui qui prend à gage les insensés et les premiers venus.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Pi 2:22
      metadata:
        usfm: 2PE.2.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Comme un chien qui retourne à ce qu’il a vomi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ainsi est un insensé qui revient à sa folie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Si tu vois un homme qui se croit sage,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 29:20
      metadata:
        usfm: PRO.29.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il y a plus à espérer d’un insensé que de lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 22:13
      metadata:
        usfm: PRO.22.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Le paresseux dit: Il y a un lion sur le chemin,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il y a un lion dans les rues!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: La porte tourne sur ses gonds,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le paresseux sur son lit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 19:24
      metadata:
        usfm: PRO.19.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Le paresseux plonge sa main dans le plat,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il trouve pénible de la ramener à sa bouche.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Le paresseux se croit plus sage
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que sept hommes qui répondent avec bon sens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Comme celui qui saisit un chien par les oreilles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ainsi est un passant qui s’irrite pour une querelle où il n’a que faire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Comme un furieux qui lance des flammes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Des flèches et la mort,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ainsi est un homme qui trompe son prochain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et qui dit: N’était-ce pas pour plaisanter?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Faute de bois, le feu s’éteint;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 22:10
      metadata:
        usfm: PRO.22.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et quand il n’y a point de rapporteur, la querelle s’apaise.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Le charbon produit un brasier, et le bois du feu;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ainsi '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 15:18
      metadata:
        usfm: PRO.15.18
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 29:22
      metadata:
        usfm: PRO.29.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: un homme querelleur échauffe une dispute.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 18:8
      metadata:
        usfm: PRO.18.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Les paroles du rapporteur sont comme des friandises,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elles descendent jusqu’au fond des entrailles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Comme des scories d’argent appliquées sur un vase de terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ainsi sont des lèvres brûlantes et un cœur mauvais.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Par ses lèvres celui qui hait se déguise,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il met au-dedans de lui la tromperie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Lorsqu’il prend une voix douce, ne le crois pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car il y a sept abominations dans son cœur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: S’il cache sa haine sous la dissimulation,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sa méchanceté se révélera dans l’assemblée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 7:16
      metadata:
        usfm: PSA.7.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 9:16
      metadata:
        usfm: PSA.9.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 10:2
      metadata:
        usfm: PSA.10.2
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 57:7
      metadata:
        usfm: PSA.57.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ec 10:8
      metadata:
        usfm: ECC.10.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Celui qui creuse une fosse y tombe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la pierre revient sur celui qui la roule.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: La langue fausse hait ceux qu’elle écrase,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la bouche flatteuse prépare la ruine.
