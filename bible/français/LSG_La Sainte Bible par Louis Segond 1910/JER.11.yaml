document_id: JER.11,93
type_code: fra
verses:
  '1':
  - type: heading
    content: L’alliance violée
  - type: heading
    content: 'V. 1-17: cf. 2 Ch 34:29, etc. Jé 7; 31:32.'
  - type: text
    content: 'La parole qui fut adressée à Jérémie de la part de l’Éternel, en ces mots:'
  '10':
  - type: text
    content: Ils sont retournés aux iniquités de leurs premiers pères,
  - type: text
    content: Qui ont refusé d’écouter mes paroles,
  - type: text
    content: Et ils sont allés après d’autres dieux, pour les servir.
  - type: text
    content: La maison d’Israël et la maison de Juda ont violé mon alliance,
  - type: text
    content: Que j’avais faite avec leurs pères.
  '11':
  - type: text
    content: 'C’est pourquoi ainsi parle l’Éternel:'
  - type: text
    content: Voici, je vais faire venir sur eux des malheurs
  - type: text
    content: Dont ils ne pourront se délivrer.
  - type: note
    content: Pr 1:28. És 1:15. Jé 14:12. Éz 8:18. Mi 3:4.
  - type: text
    content: Ils crieront vers moi,
  - type: text
    content: Et je ne les écouterai pas.
  '12':
  - type: text
    content: Les villes de Juda et les habitants de Jérusalem
  - type: text
    content: Iront invoquer les dieux auxquels ils offrent de l’encens,
  - type: text
    content: Mais ils ne les sauveront pas au temps de leur malheur.
  '13':
  - type: text
    content: 'Car tu as autant de dieux '
  - type: note
    content: Jé 2:28.
  - type: text
    content: que de villes, ô Juda!
  - type: text
    content: Et autant Jérusalem a de rues,
  - type: text
    content: Autant vous avez dressé d’autels aux idoles,
  - type: text
    content: D’autels pour offrir de l’encens à Baal…
  '14':
  - type: text
    content: 'Et toi, '
  - type: note
    content: Jé 7:16; 14:11.
  - type: text
    content: n’intercède pas en faveur de ce peuple,
  - type: text
    content: N’élève pour eux ni supplications ni prières;
  - type: text
    content: Car je ne les écouterai pas,
  - type: text
    content: Quand ils m’invoqueront à cause de leur malheur.
  '15':
  - type: text
    content: Que ferait mon bien-aimé dans ma maison?
  - type: text
    content: Il s’y commet une foule de crimes.
  - type: text
    content: La chair sacrée disparaîtra devant toi.
  - type: text
    content: Quand tu fais le mal, c’est alors que tu triomphes!
  '16':
  - type: text
    content: Olivier verdoyant, remarquable par la beauté de son fruit,
  - type: text
    content: Tel est le nom que t’avait donné l’Éternel;
  - type: text
    content: Au bruit d’un grand fracas, il l’embrase par le feu,
  - type: text
    content: Et ses rameaux sont brisés.
  '17':
  - type: text
    content: 'L’Éternel des armées, qui t’a '
  - type: note
    content: Jé 2:21.
  - type: text
    content: planté,
  - type: text
    content: Appelle sur toi le malheur,
  - type: text
    content: A cause de la méchanceté de la maison d’Israël et de la maison de Juda,
  - type: text
    content: Qui ont agi pour m’irriter, en offrant de l’encens à Baal.
  - type: heading
    content: Complot contre Jérémie
  - type: heading
    content: 'V. 18-23: cf. (Jé 18:18-23; 20:1-12.) Am 7:10-17.'
  '18':
  - type: text
    content: L’Éternel m’en a informé, et je l’ai su;
  - type: text
    content: Alors tu m’as fait voir leurs œuvres.
  '19':
  - type: text
    content: J’étais comme un agneau familier qu’on mène à la boucherie,
  - type: text
    content: 'Et j’ignorais les mauvais desseins qu’ils méditaient contre moi:'
  - type: text
    content: Détruisons l’arbre avec son fruit!
  - type: text
    content: Retranchons-le de la terre des vivants,
  - type: text
    content: Et qu’on ne se souvienne plus de son nom!
  '2':
  - type: text
    content: Écoutez les paroles de cette alliance,
  - type: text
    content: Et parlez aux hommes de Juda et aux habitants de Jérusalem!
  '20':
  - type: text
    content: Mais l’Éternel des armées est un juste juge,
  - type: note
    content: 1 S 16:17. 1 Ch 28:9. Ps 7:10; 26:2. Ap 2:23.
  - type: text
    content: Qui sonde les reins et les cœurs.
  - type: text
    content: Je verrai ta vengeance s’exercer contre eux,
  - type: text
    content: Car c’est à toi que je confie ma cause.
  '21':
  - type: text
    content: C’est pourquoi ainsi parle l’Éternel contre les gens d’Anathoth,
  - type: text
    content: 'Qui en veulent à ta vie, et qui disent:'
  - type: text
    content: Ne prophétise pas au nom de l’Éternel,
  - type: text
    content: Ou tu mourras de notre main!
  '22':
  - type: text
    content: 'C’est pourquoi ainsi parle l’Éternel des armées:'
  - type: text
    content: Voici, je vais les châtier;
  - type: text
    content: Les jeunes hommes mourront par l’épée,
  - type: text
    content: Leurs fils et leurs filles mourront par la famine.
  '23':
  - type: text
    content: Aucun d’eux n’échappera;
  - type: text
    content: Car je ferai venir le malheur sur les gens d’Anathoth,
  - type: text
    content: L’année où je les châtierai.
  '3':
  - type: text
    content: 'Dis-leur: Ainsi parle l’Éternel, le Dieu d’Israël:'
  - type: note
    content: De 27:26. Ga 3:10.
  - type: text
    content: Maudit soit l’homme qui n’écoute point les paroles de cette alliance,
  '4':
  - type: text
    content: Que j’ai prescrite à vos pères,
  - type: text
    content: Le jour où je les ai fait sortir du pays d’Égypte,
  - type: note
    content: De 4:20.
  - type: text
    content: 'De la fournaise de fer, en disant:'
  - type: note
    content: Lé 26:3, 12.
  - type: text
    content: Écoutez ma voix, et faites tout ce que je vous ordonnerai;
  - type: text
    content: Alors vous serez mon peuple,
  - type: text
    content: Je serai votre Dieu,
  '5':
  - type: text
    content: 'Et j’accomplirai le '
  - type: note
    content: De 7:12.
  - type: text
    content: serment que j’ai fait à vos pères,
  - type: text
    content: De leur donner un pays où coulent le lait et le miel,
  - type: text
    content: Comme vous le voyez aujourd’hui.
  - type: text
    content: 'Et je répondis: Amen, Éternel!'
  '6':
  - type: text
    content: 'L’Éternel me dit:'
  - type: text
    content: Publie toutes ces paroles dans les villes de Juda
  - type: text
    content: 'Et dans les rues de Jérusalem, en disant:'
  - type: text
    content: Écoutez les paroles de cette alliance,
  - type: text
    content: Et mettez-les en pratique!
  '7':
  - type: text
    content: Car j’ai averti vos pères,
  - type: text
    content: Depuis le jour où je les ai fait monter du pays d’Égypte
  - type: text
    content: Jusqu’à ce jour,
  - type: text
    content: 'Je les ai avertis '
  - type: note
    content: Jé 7:13, 25.
  - type: text
    content: 'tous les matins, en disant:'
  - type: text
    content: Écoutez ma voix!
  '8':
  - type: text
    content: 'Mais ils n’ont pas écouté, ils n’ont pas '
  - type: note
    content: Jé 7:26.
  - type: text
    content: prêté l’oreille,
  - type: text
    content: 'Ils ont suivi chacun '
  - type: note
    content: Jé 3:17; 7:24; 9:14.
  - type: text
    content: les penchants de leur mauvais cœur;
  - type: text
    content: Alors j’ai accompli sur eux toutes les paroles de cette alliance,
  - type: text
    content: Que je leur avais ordonné d’observer et qu’ils n’ont point observée.
  '9':
  - type: text
    content: 'L’Éternel me dit:'
  - type: text
    content: Il y a une conjuration entre les hommes de Juda
  - type: text
    content: Et les habitants de Jérusalem.
