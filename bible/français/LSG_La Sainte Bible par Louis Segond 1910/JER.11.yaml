document_id: JER.11
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’alliance violée
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-17: cf. 2 Ch 34:29, etc. Jé 7; 31:32.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La parole qui fut adressée à Jérémie de la part de l’Éternel, en ces mots:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Écoutez les paroles de cette alliance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et parlez aux hommes de Juda et aux habitants de Jérusalem!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dis-leur: Ainsi parle l’Éternel, le Dieu d’Israël:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 27:26
      metadata:
        usfm: DEU.27.26
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 3:10
      metadata:
        usfm: GAL.3.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Maudit soit l’homme qui n’écoute point les paroles de cette alliance,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Que j’ai prescrite à vos pères,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le jour où je les ai fait sortir du pays d’Égypte,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 4:20
      metadata:
        usfm: DEU.4.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'De la fournaise de fer, en disant:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 26:3
      metadata:
        usfm: LEV.26.3
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '12'
      metadata:
        usfm: LEV.26.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Écoutez ma voix, et faites tout ce que je vous ordonnerai;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Alors vous serez mon peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je serai votre Dieu,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Et j’accomplirai le '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 7:12
      metadata:
        usfm: DEU.7.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: serment que j’ai fait à vos pères,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De leur donner un pays où coulent le lait et le miel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme vous le voyez aujourd’hui.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et je répondis: Amen, Éternel!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'L’Éternel me dit:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Publie toutes ces paroles dans les villes de Juda
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et dans les rues de Jérusalem, en disant:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Écoutez les paroles de cette alliance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et mettez-les en pratique!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Car j’ai averti vos pères,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Depuis le jour où je les ai fait monter du pays d’Égypte
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jusqu’à ce jour,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Je les ai avertis '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 7:13
      metadata:
        usfm: JER.7.13
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '25'
      metadata:
        usfm: JER.7.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'tous les matins, en disant:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Écoutez ma voix!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mais ils n’ont pas écouté, ils n’ont pas '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 7:26
      metadata:
        usfm: JER.7.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: prêté l’oreille,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ils ont suivi chacun '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 3:17
      metadata:
        usfm: JER.3.17
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 7:24
      metadata:
        usfm: JER.7.24
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 9:14
      metadata:
        usfm: JER.9.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: les penchants de leur mauvais cœur;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Alors j’ai accompli sur eux toutes les paroles de cette alliance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que je leur avais ordonné d’observer et qu’ils n’ont point observée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'L’Éternel me dit:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il y a une conjuration entre les hommes de Juda
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les habitants de Jérusalem.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ils sont retournés aux iniquités de leurs premiers pères,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui ont refusé d’écouter mes paroles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils sont allés après d’autres dieux, pour les servir.
- type: usfm
  marker: q1
  children:
  - type: text
    text: La maison d’Israël et la maison de Juda ont violé mon alliance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que j’avais faite avec leurs pères.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'C’est pourquoi ainsi parle l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voici, je vais faire venir sur eux des malheurs
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dont ils ne pourront se délivrer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 1:28
      metadata:
        usfm: PRO.1.28
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 1:15
      metadata:
        usfm: ISA.1.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 14:12
      metadata:
        usfm: JER.14.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 8:18
      metadata:
        usfm: EZK.8.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mi 3:4
      metadata:
        usfm: MIC.3.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ils crieront vers moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je ne les écouterai pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Les villes de Juda et les habitants de Jérusalem
- type: usfm
  marker: q1
  children:
  - type: text
    text: Iront invoquer les dieux auxquels ils offrent de l’encens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais ils ne les sauveront pas au temps de leur malheur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Car tu as autant de dieux '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 2:28
      metadata:
        usfm: JER.2.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: que de villes, ô Juda!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et autant Jérusalem a de rues,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Autant vous avez dressé d’autels aux idoles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: D’autels pour offrir de l’encens à Baal…
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Et toi, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 7:16
      metadata:
        usfm: JER.7.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 14:11
      metadata:
        usfm: JER.14.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: n’intercède pas en faveur de ce peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: N’élève pour eux ni supplications ni prières;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car je ne les écouterai pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand ils m’invoqueront à cause de leur malheur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Que ferait mon bien-aimé dans ma maison?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il s’y commet une foule de crimes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: La chair sacrée disparaîtra devant toi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand tu fais le mal, c’est alors que tu triomphes!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Olivier verdoyant, remarquable par la beauté de son fruit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tel est le nom que t’avait donné l’Éternel;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au bruit d’un grand fracas, il l’embrase par le feu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ses rameaux sont brisés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'L’Éternel des armées, qui t’a '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 2:21
      metadata:
        usfm: JER.2.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: planté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Appelle sur toi le malheur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A cause de la méchanceté de la maison d’Israël et de la maison de Juda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui ont agi pour m’irriter, en offrant de l’encens à Baal.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Complot contre Jérémie
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 18-23: cf. (Jé 18:18-23; 20:1-12.) Am 7:10-17.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: L’Éternel m’en a informé, et je l’ai su;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Alors tu m’as fait voir leurs œuvres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: J’étais comme un agneau familier qu’on mène à la boucherie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et j’ignorais les mauvais desseins qu’ils méditaient contre moi:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Détruisons l’arbre avec son fruit!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Retranchons-le de la terre des vivants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qu’on ne se souvienne plus de son nom!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Mais l’Éternel des armées est un juste juge,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 16:17
      metadata:
        usfm: 1SA.16.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 28:9
      metadata:
        usfm: 1CH.28.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 7:10
      metadata:
        usfm: PSA.7.10
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 26:2
      metadata:
        usfm: PSA.26.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 2:23
      metadata:
        usfm: REV.2.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Qui sonde les reins et les cœurs.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je verrai ta vengeance s’exercer contre eux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car c’est à toi que je confie ma cause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: C’est pourquoi ainsi parle l’Éternel contre les gens d’Anathoth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Qui en veulent à ta vie, et qui disent:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne prophétise pas au nom de l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ou tu mourras de notre main!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'C’est pourquoi ainsi parle l’Éternel des armées:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voici, je vais les châtier;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les jeunes hommes mourront par l’épée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leurs fils et leurs filles mourront par la famine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Aucun d’eux n’échappera;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car je ferai venir le malheur sur les gens d’Anathoth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’année où je les châtierai.
