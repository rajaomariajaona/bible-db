document_id: EPH.INTRO1
type_code: fra
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: INTRODUCTION À L’ÉPÎTRE AUX ÉPHÉSIENS
- type: usfm
  marker: imt3
  children:
  - type: text
    text: (Jn 1:16. Col 2:9,10.)
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'L’Épître aux Éphésiens fut écrite quand Paul était en prison à cause de l’Évangile (3:1; 4:1; 6:20). Elle peut être divisée en deux grandes parties:'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'La première partie se concentre sur l’Église, que Paul présente comme le corps du Christ. En elle, Christ détruisit le mur de la haine et de la séparation de manière que tous ceux qui croient en lui, Juifs ou non Juifs, deviennent unis et frères (Éph 1:1–4:16). Voici la structure de cette partie:'
- type: usfm
  marker: io1
  children:
  - type: text
    text: '1. Adresse et salutations '
  - type: usfm
    marker: ior
    children:
    - type: text
      text: 1:1-2
- type: usfm
  marker: io1
  children:
  - type: text
    text: '2. Bénédictions de Dieu en Jésus-Christ, auteur de notre rédemption et chef de l’Église '
  - type: usfm
    marker: ior
    children:
    - type: text
      text: 1:3-23
- type: usfm
  marker: io1
  children:
  - type: text
    text: '3. Le salut par la grâce, où païens et Juifs sont unis par la croix du Christ '
  - type: usfm
    marker: ior
    children:
    - type: text
      text: 2:1-22
- type: usfm
  marker: io1
  children:
  - type: text
    text: '4. Mystère de la vocation des païens et unité de la foi '
  - type: usfm
    marker: ior
    children:
    - type: text
      text: 3:1–4:16
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'La deuxième partie (Éph 4:17–6:24) est un ensemble d’exhortations qui appellent tous les membres de l’Église à vivre dans la paix, l’unité et la fraternité, en gardant la foi en Jésus-Christ. En voici la structure:'
- type: usfm
  marker: io1
  children:
  - type: text
    text: '5. Sainteté chrétienne opposée aux mœurs corrompues des païens '
  - type: usfm
    marker: ior
    children:
    - type: text
      text: 4:17–5:21
- type: usfm
  marker: io1
  children:
  - type: text
    text: '6. Les devoirs domestiques '
  - type: usfm
    marker: ior
    children:
    - type: text
      text: 5:22–6:9
- type: usfm
  marker: io1
  children:
  - type: text
    text: '7. Les armes spirituelles du chrétien '
  - type: usfm
    marker: ior
    children:
    - type: text
      text: 6:10-20
- type: usfm
  marker: io1
  children:
  - type: text
    text: '8. Recommandations et salutations finales '
  - type: usfm
    marker: ior
    children:
    - type: text
      text: 6:21-24
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Dans cette partie, l’auteur insiste particulièrement sur les relations dans les familles chrétiennes:'
- type: usfm
  marker: ip
  children:
  - type: text
    text: a. que les femmes soient soumises à leurs maris et que les maris, eux, aiment leurs femmes;
- type: usfm
  marker: ip
  children:
  - type: text
    text: b. que les enfants obéissent à leurs parents et que les parents, eux, n’irritent pas leurs enfants;
- type: usfm
  marker: ip
  children:
  - type: text
    text: c. que les serviteurs obéissent à leurs maîtres et que ceux-ci sachent qu’ils ont avec leurs serviteurs le même Seigneur, qui ne fait pas acception de personnes.
- type: usfm
  marker: ip
  children:
  - type: text
    text: Paul séjourna trois ans à Éphèse (Act 19:1–20:1). Il est donc possible que l’épître soit plutôt une circulaire destinée à être lue de communauté en communauté tout comme celle aux Colossiens (4:16).
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le message central de l’Épître aux Éphésiens est ecclésial: le thème dont traite l’auteur porte sur l’Église de Jésus-Christ, qui en est le chef suprême (Éph 1:22-23), d’où les images des rapports de la tête avec le corps, et de l’époux avec l’épouse, pour caractériser cette réalité. Cette unité de l’Église, corps, affirme l’offre gracieuse du salut à tous, Juifs et non Juifs (païens).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'L’autre message important de l’Épître aux Éphésiens a trait à la vie nouvelle en Christ. La vocation de l’Église et de ses membres est l’unité dans la foi en Christ et la vie de sainteté sur le plan individuel et sur le plan communautaire. Pour y parvenir, l’auteur indique les armes dont les chrétiens peuvent se servir: '
  - type: usfm
    marker: it
    children:
    - type: text
      text: «Revêtez-vous de toutes les armes de Dieu, afin de pouvoir tenir ferme contre les ruses du diable… la vérité, la justice, le zèle, la foi, la Parole de Dieu et la prière…»
  - type: text
    text: ' (Éph 6:11-20).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Certains manuscrits anciens omettent les mots «à Éphèse» qui se trouvent en 1:1. La question s’est donc posée de savoir si l’épître s’adresse effectivement aux Éphésiens. Vers 140, l’hérétique Marcion rapprochait l''Épître aux Éphésiens et celle aux Laodicéens qu’évoque l’épître aux Colossiens en ces termes: '
  - type: usfm
    marker: it
    children:
    - type: text
      text: «Lorsque cette lettre aura été lue chez vous, faites en sorte qu’elle soit aussi lue dans l’Église des Laodicéens et que vous lisiez également à votre tour celle qui vous arrivera de Laodicée»
  - type: text
    text: ' (4:16).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Ainsi, ces épîtres (aux Éphésiens, aux Colossiens, aux Laodicéens) apparaissent bien comme des circulaires destinées à être lues d’une communauté à une autre. Par contre, en nous en tenant aux épîtres aux Éphésiens et aux Colossiens, entre lesquelles il existe une parenté littéraire, on pourrait bien conclure de l’absence des mots «à Éphèse» que celle qui nous concerne serait celle provenant de Laodicée.
