document_id: 2PE.INTRO1
type_code: fra
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: INTRODUCTION À LA DEUXIÈME ÉPÎTRE DE PIERRE
- type: usfm
  marker: imt3
  children:
  - type: text
    text: (Lu 22:32. Ap 3:2.) (Jn 17:3.) (Jud 3-19.)
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'La seconde épître de Pierre se rapproche plus de l’épître de Jude que de la première de Pierre: si l’auteur présumé de 1 et 2 Pierre est l’apôtre du même nom, la formule catholique suivante: «à ceux qui ont reçu en partage une foi du même prix que la nôtre…» (1 Pi 1:1) ayant trait aux destinataires s’apparente plutôt à: «à ceux qui ont été appelés, qui sont aimés en Dieu le Père et gardés pour Jésus-Christ…» (Jud 1), se rapportant aux destinataires de l’épître de Jude. Voici par ailleurs la structure de 2 Pierre:'
- type: usfm
  marker: io1
  children:
  - type: text
    text: '1. Adresse et salutations '
  - type: usfm
    marker: ior
    children:
    - type: text
      text: 1:1-2
- type: usfm
  marker: io1
  children:
  - type: text
    text: '2. La pratique des vertus chrétiennes '
  - type: usfm
    marker: ior
    children:
    - type: text
      text: 1:3-21
- type: usfm
  marker: io1
  children:
  - type: text
    text: '3. Les faux docteurs '
  - type: usfm
    marker: ior
    children:
    - type: text
      text: 2:1-22
- type: usfm
  marker: io1
  children:
  - type: text
    text: '4. L’avènement du Seigneur '
  - type: usfm
    marker: ior
    children:
    - type: text
      text: 3:1-18
- type: usfm
  marker: ip
  children:
  - type: text
    text: La teneur de 2 Pierre et celle de Jude présentent des similitudes frappantes, si bien que l’on peut facilement faire une lecture comparée des deux textes. En effet, le second chapitre de 2 Pierre relatif aux faux docteurs, et l’unique chapitre de Jude présentent des ressemblances nombreuses et surtout précises, qui frisent le mot à mot. On en a conclu que les deux auteurs se sont mutuellement utilisés, ou que l’un des deux a utilisé l’autre.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Toutefois, un aspect important de l''épître de Jude manque dans 2 Pierre: son auteur cite deux apocryphes de l’Ancien Testament aux versets 9 et 14 (voir l’introduction à l’épître de Jude).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Le message de la seconde épître de Pierre comporte trois volets. Le premier a trait à la pratique des vertus chrétiennes. Il s’agit de joindre à la foi la vertu, la connaissance, la maîtrise de soi, la persévérance, la pitié, la fraternité et l’amour. Leur présence dans la vie du chrétien ne permet pas l’oisiveté pour la connaissance du Seigneur Jésus-Christ (1:5-11).
- type: usfm
  marker: ip
  children:
  - type: text
    text: Le second consiste en une mise en garde contre les faux prophètes et les faux docteurs, auteurs de sectes pernicieuses. Ceux qui abandonneront la foi pour les suivre s’apparentent à des chiens qui se retournent vers ce qu’ils ont vomi (2:1-3, 20-22).
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le dernier porte l’attention sur le jour du Seigneur qui sera marqué d’avance par la venue des moqueurs et des railleurs avec des paroles de découragement telles: '
  - type: usfm
    marker: it
    children:
    - type: text
      text: «Où est la promesse de son avènement? Car, depuis que les pères sont morts, tout demeure comme dès le commencement de la création»
  - type: text
    text: ' (voir 3:1-4).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: L’apôtre Pierre apparaît comme l’auteur de cette épître, comme en témoignent l’insistance en 1:1 et surtout le texte de 1:16-18 où l’auteur affirme avoir été témoin de la transfiguration du Seigneur.
- type: usfm
  marker: ip
  children:
  - type: text
    text: Écrite probablement après la constitution du corpus paulinien, si l’on s’en tient à la déclaration de 3:16 au sujet des épîtres de l’apôtre Paul, il reste à savoir si l’apôtre Pierre, alors encore vivant, était en mesure de rédiger personnellement une telle correspondance. Cela semblerait improbable.
