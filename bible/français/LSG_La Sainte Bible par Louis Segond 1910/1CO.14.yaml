document_id: 1CO.14,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Comparaison entre le don des langues et le don de prophétie
  - type: heading
    content: 'V. 1-40: cf. 1 Co 12:4-7, 27-31. Ro 14:19. 1 Pi 4:10, 11.'
  - type: text
    content: 'Recherchez la charité. Aspirez aussi aux dons spirituels, mais surtout à celui de prophétie. '
  '10':
  - type: text
    content: 'Quelque nombreuses que puissent être dans le monde les diverses langues, il n’en est aucune qui ne soit une langue intelligible; '
  '11':
  - type: text
    content: 'si donc je ne connais pas le sens de la langue, je serai un barbare pour celui qui parle, et celui qui parle sera un barbare pour moi. '
  '12':
  - type: text
    content: 'De même vous, puisque vous aspirez aux dons spirituels, que ce soit pour l’édification de l’Église que vous cherchiez à en posséder abondamment. '
  '13':
  - type: text
    content: 'C’est pourquoi, que celui qui parle en langue prie pour avoir le don d’interpréter. '
  '14':
  - type: text
    content: 'Car si je prie en langue, mon esprit est en prière, mais mon intelligence demeure stérile. '
  '15':
  - type: text
    content: 'Que faire donc? Je prierai par l’esprit, mais je prierai aussi avec l’intelligence; '
  - type: note
    content: Ép 5:19. Col 3:16.
  - type: text
    content: 'je chanterai par l’esprit, mais je chanterai aussi avec l’intelligence. '
  '16':
  - type: text
    content: 'Autrement, si tu rends grâces par l’esprit, comment celui qui est dans les rangs de l’homme du peuple répondra-t-il Amen! À ton action de grâces, puisqu’il ne sait pas ce que tu dis? '
  '17':
  - type: text
    content: 'Tu rends, il est vrai, d’excellentes actions de grâces, mais l’autre n’est pas édifié. '
  '18':
  - type: text
    content: 'Je rends grâces à Dieu de ce que je parle en langue plus que vous tous; '
  '19':
  - type: text
    content: 'mais, dans l’Église, j’aime mieux dire cinq paroles avec mon intelligence, afin d’instruire aussi les autres, que dix mille paroles en langue. '
  '2':
  - type: text
    content: 'En effet, celui qui parle en langue ne parle pas aux hommes, mais à Dieu, car personne ne le comprend, et c’est en esprit qu’il dit des mystères. '
  '20':
  - type: note
    content: Mt 18:3; 19:14. Ép 4:14. 1 Pi 2:1, 2.
  - type: text
    content: 'Frères, ne soyez pas des enfants sous le rapport du jugement; mais pour la malice, soyez enfants, et, à l’égard du jugement, soyez des hommes faits. '
  '21':
  - type: note
    content: De 28:49. És 28:11.
  - type: text
    content: 'Il est écrit dans la loi:'
  - type: text
    content: C’est par des hommes d’une autre langue
  - type: text
    content: Et par des lèvres d’étrangers
  - type: text
    content: Que je parlerai à ce peuple,
  - type: text
    content: Et ils ne m’écouteront pas même ainsi,
  - type: text
    content: dit le Seigneur.
  '22':
  - type: text
    content: 'Par conséquent, les langues sont un signe, non pour les croyants, mais pour les non-croyants; la prophétie, au contraire, est un signe, non pour les non-croyants, mais pour les croyants. '
  '23':
  - type: text
    content: 'Si donc, dans une assemblée de l’Église entière, tous parlent en langues, et qu’il survienne des hommes du peuple ou des non-croyants, ne diront-ils pas que vous êtes fous? '
  '24':
  - type: text
    content: 'Mais si tous prophétisent, et qu’il survienne quelque non-croyant ou un homme du peuple, il est convaincu par tous, il est jugé par tous, '
  '25':
  - type: text
    content: 'les secrets de son cœur sont dévoilés, de telle sorte que, tombant sur sa face, il adorera Dieu, et publiera que Dieu est réellement au milieu de vous. '
  '26':
  - type: text
    content: 'Que faire donc, frères? Lorsque vous vous assemblez, les uns ou les autres parmi vous ont-ils un cantique, une instruction, une révélation, une langue, une interprétation, que tout se fasse pour l’édification. '
  '27':
  - type: text
    content: 'En est-il qui parlent en langue, que deux ou trois au plus parlent, chacun à son tour, et que quelqu’un interprète; '
  '28':
  - type: text
    content: 's’il n’y a point d’interprète, qu’on se taise dans l’Église, et qu’on parle à soi-même et à Dieu. '
  '29':
  - type: text
    content: 'Pour ce qui est des prophètes, que deux ou trois parlent, et que les autres jugent; '
  '3':
  - type: text
    content: 'Celui qui prophétise, au contraire, parle aux hommes, les édifie, les exhorte, les console. '
  '30':
  - type: text
    content: 'et si un autre qui est assis a une révélation, que le premier se taise. '
  '31':
  - type: text
    content: 'Car vous pouvez tous prophétiser successivement, afin que tous soient instruits et que tous soient exhortés. '
  '32':
  - type: text
    content: 'Les esprits des prophètes sont soumis aux prophètes; '
  '33':
  - type: text
    content: 'car Dieu n’est pas un Dieu de désordre, mais de paix. Comme dans toutes les Églises des saints, '
  '34':
  - type: note
    content: 1 Ti 2:12.
  - type: text
    content: 'que les femmes se taisent dans les assemblées, car il ne leur est pas permis d’y parler; mais qu’elles soient soumises, selon que le dit aussi '
  - type: note
    content: Ge 3:16. Ép 5:22. Col 3:18. Tit 2:5. 1 Pi 3:1.
  - type: text
    content: 'la loi. '
  '35':
  - type: text
    content: 'Si elles veulent s’instruire sur quelque chose, qu’elles interrogent leurs maris à la maison; car il est malséant à une femme de parler dans l’Église. '
  '36':
  - type: text
    content: 'Est-ce de chez vous que la parole de Dieu est sortie? Ou est-ce à vous seuls qu’elle est parvenue? '
  '37':
  - type: text
    content: 'Si quelqu’un croit être prophète ou inspiré, qu’il reconnaisse que ce que je vous écris est un commandement du Seigneur. '
  '38':
  - type: text
    content: 'Et si quelqu’un l’ignore, qu’il l’ignore. '
  '39':
  - type: text
    content: 'Ainsi donc, frères, aspirez au don de prophétie, et n’empêchez pas de parler en langues. '
  '4':
  - type: text
    content: 'Celui qui parle en langue s’édifie lui-même; celui qui prophétise édifie l’Église. '
  '40':
  - type: text
    content: Mais que tout se fasse avec bienséance et avec ordre.
  '5':
  - type: text
    content: 'Je désire que vous parliez tous en langues, mais encore plus que vous prophétisiez. Celui qui prophétise est plus grand que celui qui parle en langues, à moins que ce dernier n’interprète, pour que l’Église en reçoive de l’édification. '
  '6':
  - type: text
    content: 'Et maintenant, frères, de quelle utilité vous serais-je, si je venais à vous parlant en langues, et si je ne vous parlais pas par révélation, ou par connaissance, ou par prophétie, ou par doctrine? '
  '7':
  - type: text
    content: 'Si les objets inanimés qui rendent un son, comme une flûte ou une harpe, ne rendent pas des sons distincts, comment reconnaîtra-t-on ce qui est joué sur la flûte ou sur la harpe? '
  '8':
  - type: text
    content: 'Et si la trompette rend un son confus, qui se préparera au combat? '
  '9':
  - type: text
    content: 'De même vous, si par la langue vous ne donnez pas une parole distincte, comment saura-t-on ce que vous dites? Car vous parlerez en l’air. '
