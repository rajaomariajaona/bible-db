document_id: 1CO.14
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Comparaison entre le don des langues et le don de prophétie
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-40: cf. 1 Co 12:4-7, 27-31. Ro 14:19. 1 Pi 4:10, 11.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Recherchez la charité. Aspirez aussi aux dons spirituels, mais surtout à celui de prophétie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'En effet, celui qui parle en langue ne parle pas aux hommes, mais à Dieu, car personne ne le comprend, et c’est en esprit qu’il dit des mystères. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Celui qui prophétise, au contraire, parle aux hommes, les édifie, les exhorte, les console. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Celui qui parle en langue s’édifie lui-même; celui qui prophétise édifie l’Église. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Je désire que vous parliez tous en langues, mais encore plus que vous prophétisiez. Celui qui prophétise est plus grand que celui qui parle en langues, à moins que ce dernier n’interprète, pour que l’Église en reçoive de l’édification. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Et maintenant, frères, de quelle utilité vous serais-je, si je venais à vous parlant en langues, et si je ne vous parlais pas par révélation, ou par connaissance, ou par prophétie, ou par doctrine? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Si les objets inanimés qui rendent un son, comme une flûte ou une harpe, ne rendent pas des sons distincts, comment reconnaîtra-t-on ce qui est joué sur la flûte ou sur la harpe? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Et si la trompette rend un son confus, qui se préparera au combat? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'De même vous, si par la langue vous ne donnez pas une parole distincte, comment saura-t-on ce que vous dites? Car vous parlerez en l’air. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Quelque nombreuses que puissent être dans le monde les diverses langues, il n’en est aucune qui ne soit une langue intelligible; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'si donc je ne connais pas le sens de la langue, je serai un barbare pour celui qui parle, et celui qui parle sera un barbare pour moi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'De même vous, puisque vous aspirez aux dons spirituels, que ce soit pour l’édification de l’Église que vous cherchiez à en posséder abondamment. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'C’est pourquoi, que celui qui parle en langue prie pour avoir le don d’interpréter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Car si je prie en langue, mon esprit est en prière, mais mon intelligence demeure stérile. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Que faire donc? Je prierai par l’esprit, mais je prierai aussi avec l’intelligence; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 5:19
      metadata:
        usfm: EPH.5.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 3:16
      metadata:
        usfm: COL.3.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'je chanterai par l’esprit, mais je chanterai aussi avec l’intelligence. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Autrement, si tu rends grâces par l’esprit, comment celui qui est dans les rangs de l’homme du peuple répondra-t-il Amen! À ton action de grâces, puisqu’il ne sait pas ce que tu dis? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Tu rends, il est vrai, d’excellentes actions de grâces, mais l’autre n’est pas édifié. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Je rends grâces à Dieu de ce que je parle en langue plus que vous tous; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'mais, dans l’Église, j’aime mieux dire cinq paroles avec mon intelligence, afin d’instruire aussi les autres, que dix mille paroles en langue. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 18:3
      metadata:
        usfm: MAT.18.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 19:14
      metadata:
        usfm: MAT.19.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 4:14
      metadata:
        usfm: EPH.4.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 2:1
      metadata:
        usfm: 1PE.2.1
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '2'
      metadata:
        usfm: 1PE.2.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Frères, ne soyez pas des enfants sous le rapport du jugement; mais pour la malice, soyez enfants, et, à l’égard du jugement, soyez des hommes faits. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 28:49
      metadata:
        usfm: DEU.28.49
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 28:11
      metadata:
        usfm: ISA.28.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il est écrit dans la loi:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est par des hommes d’une autre langue
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et par des lèvres d’étrangers
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que je parlerai à ce peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils ne m’écouteront pas même ainsi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dit le Seigneur.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Par conséquent, les langues sont un signe, non pour les croyants, mais pour les non-croyants; la prophétie, au contraire, est un signe, non pour les non-croyants, mais pour les croyants. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Si donc, dans une assemblée de l’Église entière, tous parlent en langues, et qu’il survienne des hommes du peuple ou des non-croyants, ne diront-ils pas que vous êtes fous? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Mais si tous prophétisent, et qu’il survienne quelque non-croyant ou un homme du peuple, il est convaincu par tous, il est jugé par tous, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'les secrets de son cœur sont dévoilés, de telle sorte que, tombant sur sa face, il adorera Dieu, et publiera que Dieu est réellement au milieu de vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Que faire donc, frères? Lorsque vous vous assemblez, les uns ou les autres parmi vous ont-ils un cantique, une instruction, une révélation, une langue, une interprétation, que tout se fasse pour l’édification. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'En est-il qui parlent en langue, que deux ou trois au plus parlent, chacun à son tour, et que quelqu’un interprète; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 's’il n’y a point d’interprète, qu’on se taise dans l’Église, et qu’on parle à soi-même et à Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Pour ce qui est des prophètes, que deux ou trois parlent, et que les autres jugent; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'et si un autre qui est assis a une révélation, que le premier se taise. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Car vous pouvez tous prophétiser successivement, afin que tous soient instruits et que tous soient exhortés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Les esprits des prophètes sont soumis aux prophètes; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'car Dieu n’est pas un Dieu de désordre, mais de paix. Comme dans toutes les Églises des saints, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 2:12
      metadata:
        usfm: 1TI.2.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'que les femmes se taisent dans les assemblées, car il ne leur est pas permis d’y parler; mais qu’elles soient soumises, selon que le dit aussi '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 3:16
      metadata:
        usfm: GEN.3.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 5:22
      metadata:
        usfm: EPH.5.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 3:18
      metadata:
        usfm: COL.3.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Tit 2:5
      metadata:
        usfm: TIT.2.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 3:1
      metadata:
        usfm: 1PE.3.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'la loi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Si elles veulent s’instruire sur quelque chose, qu’elles interrogent leurs maris à la maison; car il est malséant à une femme de parler dans l’Église. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Est-ce de chez vous que la parole de Dieu est sortie? Ou est-ce à vous seuls qu’elle est parvenue? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Si quelqu’un croit être prophète ou inspiré, qu’il reconnaisse que ce que je vous écris est un commandement du Seigneur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Et si quelqu’un l’ignore, qu’il l’ignore. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ainsi donc, frères, aspirez au don de prophétie, et n’empêchez pas de parler en langues. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Mais que tout se fasse avec bienséance et avec ordre.
