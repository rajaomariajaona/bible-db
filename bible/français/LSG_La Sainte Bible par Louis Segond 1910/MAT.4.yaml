document_id: MAT.4,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Tentation de Jésus-Christ
  - type: heading
    content: 'V. 1-11: cf. (Mc 1:12, 13. Lu 4:1-13.) Ge 3:1-6. (Ps 27:2. Hé 4:15.)'
  - type: text
    content: 'Alors Jésus '
  - type: note
    content: Mc 1:12. Lu 4:1.
  - type: text
    content: 'fut emmené par l’Esprit dans le désert, pour être tenté par le diable. '
  '10':
  - type: text
    content: 'Jésus lui dit: '
  - type: text
    content: 'Retire-toi, Satan! Car il est écrit:'
  - type: note
    content: De 6:13; 10:20.
  - type: text
    content: Tu adoreras le Seigneur, ton Dieu, et tu le serviras lui seul.
  '11':
  - type: text
    content: Alors le diable le laissa. Et voici, des anges vinrent auprès de Jésus, et le servaient.
  - type: heading
    content: Jésus à Capernaüm
  - type: heading
    content: 'V. 12-16: cf. (Mc 1:14, 15. Lu 4:14, 15.) És 8:23; 9:1.'
  '12':
  - type: text
    content: 'Jésus, ayant appris que '
  - type: note
    content: Mc 1:14. Lu 4:14.
  - type: text
    content: 'Jean avait été livré, se retira '
  - type: note
    content: Lu 4:16, 31. Jn 4:43.
  - type: text
    content: 'dans la Galilée. '
  '13':
  - type: text
    content: 'Il quitta Nazareth, et vint demeurer à Capernaüm, située près de la mer, dans le territoire de Zabulon et de Nephthali, '
  '14':
  - type: text
    content: 'afin que s’accomplît ce qui avait été annoncé par Ésaïe, le prophète:'
  '15':
  - type: text
    content: ' '
  - type: note
    content: És 8:23; 9:1.
  - type: text
    content: Le peuple de Zabulon et de Nephthali,
  - type: text
    content: De la contrée voisine de la mer, du pays au delà du Jourdain,
  - type: text
    content: Et de la Galilée des Gentils,
  '16':
  - type: text
    content: Ce peuple, assis dans les ténèbres,
  - type: text
    content: A vu une grande lumière;
  - type: text
    content: Et sur ceux qui étaient assis dans la région et l’ombre de la mort
  - type: text
    content: La lumière s’est levée.
  - type: heading
    content: Commencement du ministère de Jésus. Vocation de quatre disciples
  - type: heading
    content: 'V. 17-22: cf. (Mc 1:16-20. Lu 5:1-11.) 1 R 19:19-21.'
  '17':
  - type: text
    content: 'Dès ce moment Jésus commença à prêcher, et à dire: '
  - type: note
    content: Mc 1:15.
  - type: text
    content: Repentez-vous, car le royaume des cieux est proche.
  - type: text
    content: ' '
  '18':
  - type: note
    content: Mc 1:16.
  - type: text
    content: 'Comme il marchait le long de la mer de Galilée, il vit deux frères, Simon, appelé Pierre, et André, son frère, qui jetaient un filet dans la mer; car ils étaient pêcheurs. '
  '19':
  - type: text
    content: 'Il leur dit: '
  - type: text
    content: Suivez-moi, et je vous ferai pêcheurs d’hommes.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Après avoir jeûné quarante jours et quarante nuits, il eut faim. '
  '20':
  - type: text
    content: 'Aussitôt, ils laissèrent les filets, et le suivirent. '
  '21':
  - type: text
    content: 'De là étant allé plus loin, il vit deux autres frères, Jacques, fils de Zébédée, et Jean, son frère, qui étaient dans une barque avec Zébédée, leur père, et qui réparaient leurs filets. '
  '22':
  - type: text
    content: Il les appela, et aussitôt ils laissèrent la barque et leur père, et le suivirent.
  - type: heading
    content: 'V. 23-25: cf. Mt 9:35; 8:16, 17. Mc 1:32-39. Lu 4:43, 44; 6:17-20.'
  '23':
  - type: text
    content: 'Jésus parcourait toute la Galilée, enseignant dans les synagogues, prêchant la bonne nouvelle du royaume, et guérissant toute maladie et toute infirmité parmi le peuple. '
  '24':
  - type: text
    content: 'Sa renommée se répandit dans toute la Syrie, et on lui amenait tous ceux qui souffraient de maladies et de douleurs de divers genres, des démoniaques, des lunatiques, des paralytiques; et il les guérissait. '
  '25':
  - type: text
    content: Une grande foule le suivit, de la Galilée, de la Décapole, de Jérusalem, de la Judée, et d’au delà du Jourdain.
  '3':
  - type: text
    content: 'Le tentateur, s’étant approché, lui dit: Si tu es Fils de Dieu, ordonne que ces pierres deviennent des pains. '
  '4':
  - type: text
    content: 'Jésus répondit: '
  - type: text
    content: 'Il est écrit:'
  - type: note
    content: De 8:3.
  - type: text
    content: L’homme ne vivra pas de pain seulement, mais de toute parole qui sort de la bouche de Dieu.
  '5':
  - type: text
    content: 'Le diable le transporta dans la ville sainte, le plaça sur le haut du temple, '
  '6':
  - type: text
    content: 'et lui dit: Si tu es Fils de Dieu, jette-toi en bas; car il est écrit:'
  - type: note
    content: Ps 91:11, 12.
  - type: text
    content: Il donnera des ordres à ses anges à ton sujet;
  - type: text
    content: Et ils te porteront sur les mains,
  - type: text
    content: De peur que ton pied ne heurte contre une pierre.
  '7':
  - type: text
    content: 'Jésus lui dit: '
  - type: text
    content: 'Il est aussi écrit:'
  - type: note
    content: De 6:16.
  - type: text
    content: Tu ne tenteras point le Seigneur, ton Dieu.
  '8':
  - type: text
    content: 'Le diable le transporta encore sur une montagne très élevée, lui montra tous les royaumes du monde et leur gloire, '
  '9':
  - type: text
    content: 'et lui dit: Je te donnerai toutes ces choses, si tu te prosternes et m’adores. '
