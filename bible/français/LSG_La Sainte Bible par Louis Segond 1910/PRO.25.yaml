document_id: PRO.25,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici encore des Proverbes de Salomon, recueillis par les gens d’Ézéchias, roi de Juda.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De peur qu’en l’apprenant il ne te couvre de honte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que ta mauvaise renommée ne s’efface pas.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme des pommes d’or sur des ciselures d’argent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi est une parole dite à propos.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme un anneau d’or et une parure d’or fin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi pour une oreille docile est le sage qui réprimande.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 13:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Comme la fraîcheur de la neige au temps de la moisson,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi est un messager fidèle pour celui qui l’envoie; Il restaure l’âme de son maître.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme des nuages et du vent sans pluie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi est un homme se glorifiant à tort de ses libéralités.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 15:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Par la lenteur à la colère on fléchit un prince,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et une langue douce peut briser des os.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si tu trouves du miel, n’en mange que ce qui te suffit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De peur que tu n’en sois rassasié et que tu ne le vomisses.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mets rarement le pied dans la maison de ton prochain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De peur qu’il ne soit rassasié de toi et qu’il ne te haïsse.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Comme '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 11:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 57:5
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 59:8
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 120:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 12:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: une massue, une épée et une flèche aiguë,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi est un homme qui porte un faux témoignage contre son prochain.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme une dent cassée et un pied qui chancelle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi est la confiance en un perfide au jour de la détresse.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'La gloire de Dieu, c’est de cacher '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 11:33
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: les choses;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La gloire des rois, c’est de sonder les choses.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oter son vêtement dans un jour froid,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Répandre du vinaigre sur du nitre,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 12:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: C’est dire des chansons à un cœur attristé.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 12:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Si ton '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 23:4
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '5'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: ennemi a faim, donne-lui du pain à manger;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: S’il a soif, donne-lui de l’eau à boire.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car ce sont des charbons ardents que tu amasses sur sa tête,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’Éternel te récompensera.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le vent du nord enfante la pluie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la langue mystérieuse un visage irrité.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 21:9
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '19'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Mieux vaut habiter à l’angle d’un toit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que de partager la demeure d’une femme querelleuse.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme de l’eau fraîche pour une personne fatiguée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi est une bonne nouvelle venant d’une terre lointaine.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme une fontaine troublée et une source corrompue,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi est le juste qui chancelle devant le méchant.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n’est pas bon de manger beaucoup de miel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais rechercher la gloire des autres est un honneur.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 16:32
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Comme une ville forcée et sans murailles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi est l’homme qui n’est pas maître de lui-même.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les cieux dans leur hauteur, la terre dans sa profondeur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le cœur des rois, sont impénétrables.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ote de l’argent les scories,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il en sortira un vase pour le fondeur.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 20:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ote le méchant de devant le roi,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 20:28
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Et son trône s’affermira par la justice.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne t’élève pas devant le roi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ne prends pas la place des grands;
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car il vaut mieux qu’on te dise: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lu 14:7, 8, 9, etc.
      marker-yv: yv-n
    - type: text
      text: Monte-ici!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que si l’on t’abaisse devant le prince que tes yeux voient.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 18:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ne te hâte pas d’entrer en contestation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De peur qu’à la fin tu ne saches que faire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lorsque ton prochain t’aura outragé.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Défends ta cause contre ton prochain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais ne révèle pas le secret d’un autre,
