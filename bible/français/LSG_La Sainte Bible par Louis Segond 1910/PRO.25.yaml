document_id: PRO.25,93
type_code: fra
verses:
  '1':
  - type: text
    content: Voici encore des Proverbes de Salomon, recueillis par les gens d’Ézéchias, roi de Juda.
  '10':
  - type: text
    content: De peur qu’en l’apprenant il ne te couvre de honte,
  - type: text
    content: Et que ta mauvaise renommée ne s’efface pas.
  '11':
  - type: text
    content: Comme des pommes d’or sur des ciselures d’argent,
  - type: text
    content: Ainsi est une parole dite à propos.
  '12':
  - type: text
    content: Comme un anneau d’or et une parure d’or fin,
  - type: text
    content: Ainsi pour une oreille docile est le sage qui réprimande.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Pr 13:17.
  - type: text
    content: Comme la fraîcheur de la neige au temps de la moisson,
  - type: text
    content: Ainsi est un messager fidèle pour celui qui l’envoie; Il restaure l’âme de son maître.
  '14':
  - type: text
    content: Comme des nuages et du vent sans pluie,
  - type: text
    content: Ainsi est un homme se glorifiant à tort de ses libéralités.
  '15':
  - type: text
    content: ' '
  - type: note
    content: Pr 15:1; 16:14.
  - type: text
    content: Par la lenteur à la colère on fléchit un prince,
  - type: text
    content: Et une langue douce peut briser des os.
  '16':
  - type: text
    content: Si tu trouves du miel, n’en mange que ce qui te suffit,
  - type: text
    content: De peur que tu n’en sois rassasié et que tu ne le vomisses.
  '17':
  - type: text
    content: Mets rarement le pied dans la maison de ton prochain,
  - type: text
    content: De peur qu’il ne soit rassasié de toi et qu’il ne te haïsse.
  '18':
  - type: text
    content: 'Comme '
  - type: note
    content: Ps 11:2; 57:5; 59:8; 120:4. Pr 12:18.
  - type: text
    content: une massue, une épée et une flèche aiguë,
  - type: text
    content: Ainsi est un homme qui porte un faux témoignage contre son prochain.
  '19':
  - type: text
    content: Comme une dent cassée et un pied qui chancelle,
  - type: text
    content: Ainsi est la confiance en un perfide au jour de la détresse.
  '2':
  - type: text
    content: 'La gloire de Dieu, c’est de cacher '
  - type: note
    content: Ro 11:33.
  - type: text
    content: les choses;
  - type: text
    content: La gloire des rois, c’est de sonder les choses.
  '20':
  - type: text
    content: Oter son vêtement dans un jour froid,
  - type: text
    content: Répandre du vinaigre sur du nitre,
  - type: note
    content: Ro 12:15.
  - type: text
    content: C’est dire des chansons à un cœur attristé.
  '21':
  - type: text
    content: ' '
  - type: note
    content: Ro 12:20.
  - type: text
    content: 'Si ton '
  - type: note
    content: Ex 23:4, 5.
  - type: text
    content: ennemi a faim, donne-lui du pain à manger;
  - type: text
    content: S’il a soif, donne-lui de l’eau à boire.
  '22':
  - type: text
    content: Car ce sont des charbons ardents que tu amasses sur sa tête,
  - type: text
    content: Et l’Éternel te récompensera.
  '23':
  - type: text
    content: Le vent du nord enfante la pluie,
  - type: text
    content: Et la langue mystérieuse un visage irrité.
  '24':
  - type: text
    content: ' '
  - type: note
    content: Pr 21:9, 19.
  - type: text
    content: Mieux vaut habiter à l’angle d’un toit,
  - type: text
    content: Que de partager la demeure d’une femme querelleuse.
  '25':
  - type: text
    content: Comme de l’eau fraîche pour une personne fatiguée,
  - type: text
    content: Ainsi est une bonne nouvelle venant d’une terre lointaine.
  '26':
  - type: text
    content: Comme une fontaine troublée et une source corrompue,
  - type: text
    content: Ainsi est le juste qui chancelle devant le méchant.
  '27':
  - type: text
    content: Il n’est pas bon de manger beaucoup de miel,
  - type: text
    content: Mais rechercher la gloire des autres est un honneur.
  '28':
  - type: text
    content: ' '
  - type: note
    content: Pr 16:32.
  - type: text
    content: Comme une ville forcée et sans murailles,
  - type: text
    content: Ainsi est l’homme qui n’est pas maître de lui-même.
  '3':
  - type: text
    content: Les cieux dans leur hauteur, la terre dans sa profondeur,
  - type: text
    content: Et le cœur des rois, sont impénétrables.
  '4':
  - type: text
    content: Ote de l’argent les scories,
  - type: text
    content: Et il en sortira un vase pour le fondeur.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Pr 20:8.
  - type: text
    content: Ote le méchant de devant le roi,
  - type: note
    content: Pr 20:28.
  - type: text
    content: Et son trône s’affermira par la justice.
  '6':
  - type: text
    content: Ne t’élève pas devant le roi,
  - type: text
    content: Et ne prends pas la place des grands;
  '7':
  - type: text
    content: 'Car il vaut mieux qu’on te dise: '
  - type: note
    content: Lu 14:7, 8, 9, etc.
  - type: text
    content: Monte-ici!
  - type: text
    content: Que si l’on t’abaisse devant le prince que tes yeux voient.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Pr 18:17.
  - type: text
    content: Ne te hâte pas d’entrer en contestation,
  - type: text
    content: De peur qu’à la fin tu ne saches que faire,
  - type: text
    content: Lorsque ton prochain t’aura outragé.
  '9':
  - type: text
    content: Défends ta cause contre ton prochain,
  - type: text
    content: Mais ne révèle pas le secret d’un autre,
