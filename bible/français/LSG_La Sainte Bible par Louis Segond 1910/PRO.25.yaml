document_id: PRO.25
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Voici encore des Proverbes de Salomon, recueillis par les gens d’Ézéchias, roi de Juda.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'La gloire de Dieu, c’est de cacher '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 11:33
      metadata:
        usfm: ROM.11.33
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: les choses;
- type: usfm
  marker: q1
  children:
  - type: text
    text: La gloire des rois, c’est de sonder les choses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Les cieux dans leur hauteur, la terre dans sa profondeur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le cœur des rois, sont impénétrables.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ote de l’argent les scories,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il en sortira un vase pour le fondeur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 20:8
      metadata:
        usfm: PRO.20.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ote le méchant de devant le roi,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 20:28
      metadata:
        usfm: PRO.20.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et son trône s’affermira par la justice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ne t’élève pas devant le roi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ne prends pas la place des grands;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Car il vaut mieux qu’on te dise: '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Lu 14:7, 8, 9, etc.
    marker-yv: yv-n
  - type: text
    text: Monte-ici!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que si l’on t’abaisse devant le prince que tes yeux voient.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 18:17
      metadata:
        usfm: PRO.18.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ne te hâte pas d’entrer en contestation,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De peur qu’à la fin tu ne saches que faire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lorsque ton prochain t’aura outragé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Défends ta cause contre ton prochain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais ne révèle pas le secret d’un autre,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: De peur qu’en l’apprenant il ne te couvre de honte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que ta mauvaise renommée ne s’efface pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Comme des pommes d’or sur des ciselures d’argent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ainsi est une parole dite à propos.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Comme un anneau d’or et une parure d’or fin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ainsi pour une oreille docile est le sage qui réprimande.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 13:17
      metadata:
        usfm: PRO.13.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Comme la fraîcheur de la neige au temps de la moisson,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ainsi est un messager fidèle pour celui qui l’envoie; Il restaure l’âme de son maître.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Comme des nuages et du vent sans pluie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ainsi est un homme se glorifiant à tort de ses libéralités.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 15:1
      metadata:
        usfm: PRO.15.1
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 16:14
      metadata:
        usfm: PRO.16.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Par la lenteur à la colère on fléchit un prince,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et une langue douce peut briser des os.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Si tu trouves du miel, n’en mange que ce qui te suffit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De peur que tu n’en sois rassasié et que tu ne le vomisses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Mets rarement le pied dans la maison de ton prochain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De peur qu’il ne soit rassasié de toi et qu’il ne te haïsse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Comme '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 11:2
      metadata:
        usfm: PSA.11.2
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 57:5
      metadata:
        usfm: PSA.57.5
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 59:8
      metadata:
        usfm: PSA.59.8
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 120:4
      metadata:
        usfm: PSA.120.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 12:18
      metadata:
        usfm: PRO.12.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: une massue, une épée et une flèche aiguë,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ainsi est un homme qui porte un faux témoignage contre son prochain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Comme une dent cassée et un pied qui chancelle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ainsi est la confiance en un perfide au jour de la détresse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Oter son vêtement dans un jour froid,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Répandre du vinaigre sur du nitre,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 12:15
      metadata:
        usfm: ROM.12.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: C’est dire des chansons à un cœur attristé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 12:20
      metadata:
        usfm: ROM.12.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Si ton '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 23:4
      metadata:
        usfm: EXO.23.4
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '5'
      metadata:
        usfm: EXO.23.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: ennemi a faim, donne-lui du pain à manger;
- type: usfm
  marker: q1
  children:
  - type: text
    text: S’il a soif, donne-lui de l’eau à boire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Car ce sont des charbons ardents que tu amasses sur sa tête,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et l’Éternel te récompensera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Le vent du nord enfante la pluie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la langue mystérieuse un visage irrité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 21:9
      metadata:
        usfm: PRO.21.9
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '19'
      metadata:
        usfm: PRO.21.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Mieux vaut habiter à l’angle d’un toit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que de partager la demeure d’une femme querelleuse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Comme de l’eau fraîche pour une personne fatiguée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ainsi est une bonne nouvelle venant d’une terre lointaine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Comme une fontaine troublée et une source corrompue,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ainsi est le juste qui chancelle devant le méchant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Il n’est pas bon de manger beaucoup de miel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais rechercher la gloire des autres est un honneur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 16:32
      metadata:
        usfm: PRO.16.32
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Comme une ville forcée et sans murailles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ainsi est l’homme qui n’est pas maître de lui-même.
