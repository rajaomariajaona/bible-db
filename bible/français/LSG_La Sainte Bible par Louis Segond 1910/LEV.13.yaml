document_id: LEV.13
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Loi sur la lèpre
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-46: cf. De 24:8. (No 12:10-15. 2 Ch 26:19-21.) (És 64:5. Ap 21:27.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Éternel parla à Moïse et à Aaron, et dit: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Lorsqu’un homme aura sur la peau de son corps une tumeur, une dartre, ou une tache blanche, qui ressemblera à une plaie de lèpre sur la peau de son corps, on l’amènera au sacrificateur Aaron, ou à l’un de ses fils qui sont sacrificateurs. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Le sacrificateur examinera la plaie qui est sur la peau du corps. Si le poil de la plaie est devenu blanc, et que la plaie paraisse plus profonde que la peau du corps, c’est une plaie de lèpre: le sacrificateur qui aura fait l’examen déclarera cet homme impur. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'S’il y a sur la peau du corps une tache blanche qui ne paraisse pas plus profonde que la peau, et que le poil ne soit pas devenu blanc, le sacrificateur enfermera pendant sept jours celui qui a la plaie. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Le sacrificateur l’examinera le septième jour. Si la plaie lui paraît ne pas avoir fait de progrès et ne pas s’être étendue sur la peau, le sacrificateur l’enfermera une seconde fois pendant sept jours. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Le sacrificateur l’examinera une seconde fois le septième jour. Si la plaie est devenue pâle et ne s’est pas étendue sur la peau, le sacrificateur déclarera cet homme pur: c’est une dartre; il lavera ses vêtements, et il sera pur. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mais si la dartre s’est étendue sur la peau, après qu’il s’est montré au sacrificateur pour être déclaré pur, il se fera examiner une seconde fois par le sacrificateur. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Le sacrificateur l’examinera. Si la dartre s’est étendue sur la peau, le sacrificateur le déclarera impur; c’est la lèpre. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Lorsqu’il y aura sur un homme une plaie de lèpre, on l’amènera au sacrificateur. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Le sacrificateur l’examinera. S’il y a sur la peau une tumeur blanche, si cette tumeur a fait blanchir le poil, et qu’il y ait une trace de chair vive dans la tumeur, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'c’est une lèpre invétérée dans la peau du corps de cet homme: le sacrificateur le déclarera impur; il ne l’enfermera pas, car il est impur. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Si la lèpre fait une éruption sur la peau et couvre toute la peau de celui qui a la plaie, depuis la tête jusqu’aux pieds, partout où le sacrificateur portera ses regards, le sacrificateur l’examinera; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'et quand il aura vu que la lèpre couvre tout le corps, il déclarera pur celui qui a la plaie: comme il est entièrement devenu blanc, il est pur. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Mais le jour où l’on apercevra en lui de la chair vive, il sera impur; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'quand le sacrificateur aura vu la chair vive, il le déclarera impur: la chair vive est impure, c’est la lèpre. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Si la chair vive change et devient blanche, il ira vers le sacrificateur; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'le sacrificateur l’examinera, et si la plaie est devenue blanche, le sacrificateur déclarera pur celui qui a la plaie: il est pur. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Lorsqu’un homme aura eu sur la peau de son corps un ulcère qui a été guéri, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'et qu’il se manifestera, à la place où était l’ulcère, une tumeur blanche ou une tache d’un blanc rougeâtre, cet homme se montrera au sacrificateur. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Le sacrificateur l’examinera. Si la tache paraît plus enfoncée que la peau, et que le poil soit devenu blanc, le sacrificateur le déclarera impur: c’est une plaie de lèpre, qui a fait éruption dans l’ulcère. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Si le sacrificateur voit qu’il n’y a point de poil blanc dans la tache, qu’elle n’est pas plus enfoncée que la peau, et qu’elle est devenue pâle, il enfermera cet homme pendant sept jours. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Si la tache s’est étendue sur la peau, le sacrificateur le déclarera impur: c’est une plaie de lèpre. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Mais si la tache est restée à la même place et ne s’est pas étendue, c’est une cicatrice de l’ulcère: le sacrificateur le déclarera pur. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Lorsqu’un homme aura eu sur la peau de son corps une brûlure par le feu, et qu’il se manifestera sur la trace de la brûlure une tache blanche ou d’un blanc rougeâtre, le sacrificateur l’examinera. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Si le poil est devenu blanc dans la tache, et qu’elle paraisse plus profonde que la peau, c’est la lèpre, qui a fait éruption dans la brûlure; le sacrificateur déclarera cet homme impur: c’est une plaie de lèpre. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Si le sacrificateur voit qu’il n’y a point de poil blanc dans la tache, qu’elle n’est pas plus enfoncée que la peau, et qu’elle est devenue pâle, il enfermera cet homme pendant sept jours. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Le sacrificateur l’examinera le septième jour. Si la tache s’est étendue sur la peau, le sacrificateur le déclarera impur: c’est une plaie de lèpre. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Mais si la tache est restée à la même place, ne s’est pas étendue sur la peau, et est devenue pâle, c’est la tumeur de la brûlure; le sacrificateur le déclarera pur, car c’est la cicatrice de la brûlure. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Lorsqu’un homme ou une femme aura une plaie à la tête ou à la barbe, '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'le sacrificateur examinera la plaie. Si elle paraît plus profonde que la peau, et qu’il y ait du poil jaunâtre et mince, le sacrificateur déclarera cet homme impur: c’est la teigne, c’est la lèpre de la tête ou de la barbe. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Si le sacrificateur voit que la plaie de la teigne ne paraît pas plus profonde que la peau, et qu’il n’y a point de poil noir, il enfermera pendant sept jours celui qui a la plaie de la teigne. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Le sacrificateur examinera la plaie le septième jour. Si la teigne ne s’est pas étendue, s’il n’y a point de poil jaunâtre, et si elle ne paraît pas plus profonde que la peau, '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'celui qui a la teigne se rasera, mais il ne rasera point la place où est la teigne; et le sacrificateur l’enfermera une seconde fois pendant sept jours. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Le sacrificateur examinera la teigne le septième jour. Si la teigne ne s’est pas étendue sur la peau, et si elle ne paraît pas plus profonde que la peau, le sacrificateur le déclarera pur; il lavera ses vêtements, et il sera pur. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Mais si la teigne s’est étendue sur la peau, après qu’il a été déclaré pur, le sacrificateur l’examinera. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Et si la teigne s’est étendue sur la peau, le sacrificateur n’aura pas à rechercher s’il y a du poil jaunâtre: il est impur. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Si la teigne lui paraît ne pas avoir fait de progrès, et qu’il y ait crû du poil noir, la teigne est guérie: il est pur, et le sacrificateur le déclarera pur. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Lorsqu’un homme ou une femme aura sur la peau de son corps des taches, des taches blanches, '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'le sacrificateur l’examinera. S’il y a sur la peau de son corps des taches d’un blanc pâle, ce ne sont que des taches qui ont fait éruption sur la peau: il est pur. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Lorsqu’un homme aura la tête dépouillée de cheveux, c’est un chauve: il est pur. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'S’il a la tête dépouillée de cheveux du côté de la face, c’est un chauve par-devant: il est pur. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Mais s’il y a dans la partie chauve de devant ou de derrière une plaie d’un blanc rougeâtre, c’est la lèpre qui a fait éruption dans la partie chauve de derrière ou de devant. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Le sacrificateur l’examinera. S’il y a une tumeur de plaie d’un blanc rougeâtre dans la partie chauve de derrière ou de devant, semblable à la lèpre sur la peau du corps, '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'c’est un homme lépreux, il est impur: le sacrificateur le déclarera impur; c’est à la tête qu’est sa plaie. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Le lépreux, atteint de la plaie, portera ses vêtements déchirés, et aura la tête nue; il se couvrira la barbe, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: La 4:15
      metadata:
        usfm: LAM.4.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'criera: Impur! Impur! '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Aussi longtemps qu’il aura la plaie, il sera impur: il est impur. Il habitera seul; sa demeure sera hors du camp.'
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 47-59: cf. Lé 14:33-38.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Lorsqu’il y aura sur un vêtement une plaie de lèpre, sur un vêtement de laine ou sur un vêtement de lin, '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'à la chaîne ou à la trame de lin, ou de laine, sur une peau ou sur quelque ouvrage de peau, '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'et que la plaie sera verdâtre ou rougeâtre sur le vêtement ou sur la peau, à la chaîne ou à la trame, ou sur un objet quelconque de peau, c’est une plaie de lèpre, et elle sera montrée au sacrificateur. '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Le sacrificateur examinera la plaie, et il enfermera pendant sept jours ce qui en est attaqué. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Il examinera la plaie le septième jour. Si la plaie s’est étendue sur le vêtement, à la chaîne ou à la trame, sur la peau ou sur l’ouvrage quelconque fait de peau, c’est une plaie de lèpre invétérée: l’objet est impur. '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Il brûlera le vêtement, la chaîne ou la trame de laine ou de lin, l’objet quelconque de peau sur lequel se trouve la plaie, car c’est une lèpre invétérée: il sera brûlé au feu. '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Mais si le sacrificateur voit que la plaie ne s’est pas étendue sur le vêtement, sur la chaîne ou sur la trame, sur l’objet quelconque de peau, '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'il ordonnera qu’on lave ce qui est attaqué de la plaie, et il l’enfermera une seconde fois pendant sept jours. '
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Le sacrificateur examinera la plaie, après qu’elle aura été lavée. Si la plaie n’a pas changé d’aspect et ne s’est pas étendue, l’objet est impur: il sera brûlé au feu; c’est une partie de l’endroit ou de l’envers qui a été rongée. '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'Si le sacrificateur voit que la plaie est devenue pâle, après avoir été lavée, il l’arrachera du vêtement ou de la peau, de la chaîne ou de la trame. '
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Si elle paraît encore sur le vêtement, à la chaîne ou à la trame, ou sur l’objet quelconque de peau, c’est une éruption de lèpre: ce qui est attaqué de la plaie sera brûlé au feu. '
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'Le vêtement, la chaîne ou la trame, l’objet quelconque de peau, qui a été lavé, et d’où la plaie a disparu, sera lavé une seconde fois, et il sera pur. '
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: Telle est la loi sur la plaie de la lèpre, lorsqu’elle attaque les vêtements de laine ou de lin, la chaîne ou la trame, ou un objet quelconque de peau, et d’après laquelle ils seront déclarés purs ou impurs.
