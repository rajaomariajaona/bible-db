document_id: PSA.26,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ps 7; 17; 35.
  - type: text
    content: De David.
  - type: note
    content: Ps 7:9.
  - type: text
    content: Rends-moi justice, Éternel!
  - type: text
    content: Car je marche dans l’intégrité,
  - type: text
    content: Je me confie en l’Éternel, je ne chancelle pas.
  '10':
  - type: text
    content: Dont les mains sont criminelles
  - type: text
    content: Et la droite pleine de présents!
  '11':
  - type: text
    content: Moi, je marche dans l’intégrité;
  - type: text
    content: Délivre-moi et aie pitié de moi!
  '12':
  - type: text
    content: 'Mon pied est ferme dans la droiture:'
  - type: text
    content: Je bénirai l’Éternel dans les assemblées.
  '2':
  - type: text
    content: Sonde-moi, Éternel! Éprouve-moi,
  - type: text
    content: Fais passer au creuset mes reins et mon cœur;
  '3':
  - type: text
    content: Car ta grâce est devant mes yeux,
  - type: text
    content: Et je marche dans ta vérité.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Job 31:5. Ps 1:1.
  - type: text
    content: Je ne m’assieds pas avec les hommes faux,
  - type: text
    content: Je ne vais pas avec les gens dissimulés;
  '5':
  - type: text
    content: Je hais l’assemblée de ceux qui font le mal,
  - type: text
    content: Je ne m’assieds pas avec les méchants.
  '6':
  - type: text
    content: Je lave mes mains dans l’innocence,
  - type: text
    content: Et je vais autour de ton autel, ô Éternel!
  '7':
  - type: text
    content: Pour éclater en actions de grâces,
  - type: text
    content: Et raconter toutes tes merveilles.
  '8':
  - type: text
    content: Éternel! J’aime le séjour de ta maison,
  - type: text
    content: Le lieu où ta gloire habite.
  '9':
  - type: text
    content: N’enlève pas mon âme avec les pécheurs,
  - type: text
    content: Ma vie avec les hommes de sang,
