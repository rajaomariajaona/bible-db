document_id: PSA.26,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: Ps 7; 17; 35.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: De David.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 7:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Rends-moi justice, Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car je marche dans l’intégrité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je me confie en l’Éternel, je ne chancelle pas.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Dont les mains sont criminelles
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la droite pleine de présents!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Moi, je marche dans l’intégrité;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Délivre-moi et aie pitié de moi!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Mon pied est ferme dans la droiture:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je bénirai l’Éternel dans les assemblées.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Sonde-moi, Éternel! Éprouve-moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fais passer au creuset mes reins et mon cœur;
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Car ta grâce est devant mes yeux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je marche dans ta vérité.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 31:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 1:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Je ne m’assieds pas avec les hommes faux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ne vais pas avec les gens dissimulés;
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Je hais l’assemblée de ceux qui font le mal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ne m’assieds pas avec les méchants.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Je lave mes mains dans l’innocence,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je vais autour de ton autel, ô Éternel!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Pour éclater en actions de grâces,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et raconter toutes tes merveilles.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Éternel! J’aime le séjour de ta maison,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le lieu où ta gloire habite.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: N’enlève pas mon âme avec les pécheurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ma vie avec les hommes de sang,
