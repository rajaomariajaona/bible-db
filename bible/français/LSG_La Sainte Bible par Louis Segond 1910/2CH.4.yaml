document_id: 2CH.4
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-6: cf. 1 R 7:23-29. Ex 38:1-8.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Il fit un autel d’airain, long de vingt coudées, large de vingt coudées, et haut de dix coudées. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il fit la mer de fonte. Elle avait dix coudées d’un bord à l’autre, une forme entièrement ronde, cinq coudées de hauteur, et une circonférence que mesurait un cordon de trente coudées. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Des figures de bœufs l’entouraient au-dessous de son bord, dix par coudée, faisant tout le tour de la mer; les bœufs, disposés sur deux rangs, étaient fondus avec elle en une seule pièce. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Elle était posée sur douze bœufs, dont trois tournés vers le nord, trois tournés vers l’occident, trois tournés vers le midi, et trois tournés vers l’orient; la mer était sur eux, et toute la partie postérieure de leur corps était en dedans. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Son épaisseur était d’un palme; et son bord, semblable au bord d’une coupe, était façonné en fleur de lis. Elle pouvait contenir trois mille baths. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il fit dix bassins, et il en plaça cinq à droite et cinq à gauche, pour qu’ils servissent aux purifications: on y lavait les diverses parties des holocaustes. La mer était destinée aux ablutions des sacrificateurs.'
- type: usfm
  marker: r
  children:
  - type: text
    text: '4 v. 7 à 5 v. 1: cf. 1 R 7:40-51.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il fit '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 7:48
      metadata:
        usfm: 1KI.7.48
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '49'
      metadata:
        usfm: 1KI.7.49
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'dix chandeliers d’or, selon l’ordonnance qui les concernait, et il les plaça dans le temple, cinq à droite et cinq à gauche. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Il fit dix tables, et il les plaça dans le temple, cinq à droite et cinq à gauche. Il fit cent coupes d’or. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il fit le parvis des sacrificateurs, et le grand parvis avec ses portes, dont il couvrit d’airain les battants. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il plaça la mer du côté droit, au sud-est. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Huram fit les cendriers, les pelles et les coupes. Ainsi Huram acheva l’ouvrage que le roi Salomon lui fit faire pour la maison de Dieu: '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'deux colonnes, avec les deux chapiteaux et leurs bourrelets sur le sommet des colonnes; les deux treillis, pour couvrir les deux bourrelets des chapiteaux sur le sommet des colonnes; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'les quatre cents grenades pour les deux treillis, deux rangées de grenades par treillis, pour couvrir les deux bourrelets des chapiteaux sur le sommet des colonnes; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'les dix bases, et les dix bassins sur les bases; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'la mer, et les douze bœufs sous elle; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'les cendriers, les pelles et les fourchettes. Tous ces ustensiles que le roi Salomon fit faire à Huram-Abi pour la maison de l’Éternel étaient d’airain poli. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Le roi les fit fondre dans la plaine du Jourdain, dans un sol argileux, entre Succoth et Tseréda. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Salomon fit tous ces ustensiles en si grande quantité que l’on ne vérifia pas le poids de l’airain. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 7:48
      metadata:
        usfm: 1KI.7.48
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Salomon fit encore tous les autres ustensiles pour la maison de Dieu: l’autel d’or; les tables sur lesquelles on mettait les pains de proposition; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'les chandeliers et leurs lampes d’or pur, qu’on devait allumer selon l’ordonnance devant le sanctuaire, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'les fleurs, les lampes et les mouchettes d’or, d’or très pur; '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: les couteaux, les coupes, les tasses et les brasiers d’or pur; et les battants d’or pour la porte de l’intérieur de la maison à l’entrée du lieu très saint, et pour la porte de la maison à l’entrée du temple.
