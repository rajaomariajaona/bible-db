      metadata:
        usfm: DAN.9.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'soixante-dix ans seront accomplis, je châtierai le roi de Babylone et cette nation, dit l’Éternel, à cause de leurs iniquités; je punirai le pays des Chaldéens, et j’en ferai des ruines éternelles. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Je ferai venir sur ce pays toutes les choses que j’ai annoncées sur lui, tout ce qui est écrit dans ce livre, ce que Jérémie a prophétisé sur toutes les nations. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 27:7
      metadata:
        usfm: JER.27.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Car des nations puissantes et de grands rois les asserviront, eux aussi, et je leur rendrai selon leurs œuvres et selon l’ouvrage de leurs mains.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 15-31: cf. Jé 27:1-8; 46 à 49. Éz 25 à 30.'
