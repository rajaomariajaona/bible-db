  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ils boiront, et ils chancelleront et seront comme fous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A la vue du glaive que j’enverrai au milieu d’eux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Et je pris la coupe de la main de l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je la fis boire à toutes les nations
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Vers lesquelles l’Éternel m’envoyait:'
- type: usfm
