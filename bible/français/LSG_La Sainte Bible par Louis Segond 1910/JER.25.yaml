  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: A tous les rois du septentrion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Proches ou éloignés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aux uns et aux autres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et à tous les royaumes du monde
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui sont sur la face de la terre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le roi de Schéschac boira après eux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Tu leur diras:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ainsi parle l’Éternel des armées, le Dieu d’Israël:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Buvez, enivrez-vous, et vomissez,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tombez sans vous relever,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A la vue du glaive que j’enverrai au milieu de vous!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Et s’ils refusent de prendre de ta main la coupe pour boire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dis-leur: Ainsi parle l’Éternel des armées: Vous boirez!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
