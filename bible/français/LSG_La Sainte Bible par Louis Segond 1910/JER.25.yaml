document_id: JER.25,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Les soixante et dix années de captivité. Babylone et toutes les nations châtiées
  - type: heading
    content: 'V. 1-14: cf. Jé 7. (Da 1:1-6; 9:1, 2. 2 Ch 36:20-23.)'
  - type: text
    content: 'La parole fut adressée à Jérémie sur tout le peuple de Juda, la quatrième année de Jojakim, fils de Josias, roi de Juda, c’était la première année de Nebucadnetsar, roi de Babylone, '
  '10':
  - type: text
    content: 'Je ferai cesser parmi eux '
  - type: note
    content: És 24:7. Jé 7:34; 16:9. Éz 26:13.
  - type: text
    content: 'les cris de réjouissance et les cris d’allégresse, les chants du fiancé et les chants de la fiancée, le bruit de la meule et la lumière de la lampe. '
  '11':
  - type: text
    content: 'Tout ce pays deviendra une ruine, un désert, et ces nations seront asservies au roi de Babylone pendant soixante-dix ans. '
  '12':
  - type: text
    content: 'Mais lorsque ces '
  - type: note
    content: 2 Ch 36:22. Esd 1:1. Jé 29:10. Da 9:2.
  - type: text
    content: 'soixante-dix ans seront accomplis, je châtierai le roi de Babylone et cette nation, dit l’Éternel, à cause de leurs iniquités; je punirai le pays des Chaldéens, et j’en ferai des ruines éternelles. '
  '13':
  - type: text
    content: 'Je ferai venir sur ce pays toutes les choses que j’ai annoncées sur lui, tout ce qui est écrit dans ce livre, ce que Jérémie a prophétisé sur toutes les nations. '
  '14':
  - type: note
    content: Jé 27:7.
  - type: text
    content: Car des nations puissantes et de grands rois les asserviront, eux aussi, et je leur rendrai selon leurs œuvres et selon l’ouvrage de leurs mains.
  - type: heading
    content: 'V. 15-31: cf. Jé 27:1-8; 46 à 49. Éz 25 à 30.'
  '15':
  - type: text
    content: 'Car ainsi m’a parlé l’Éternel, le Dieu d’Israël:'
  - type: text
    content: 'Prends de ma main cette coupe remplie '
  - type: note
    content: Jé 13:12.
  - type: text
    content: du vin de ma colère,
  - type: text
    content: Et fais-la boire à toutes les nations
  - type: text
    content: Vers lesquelles je t’enverrai.
  '16':
  - type: text
    content: Ils boiront, et ils chancelleront et seront comme fous,
  - type: text
    content: A la vue du glaive que j’enverrai au milieu d’eux.
  '17':
  - type: text
    content: Et je pris la coupe de la main de l’Éternel,
  - type: text
    content: Et je la fis boire à toutes les nations
  - type: text
    content: 'Vers lesquelles l’Éternel m’envoyait:'
  '18':
  - type: text
    content: A Jérusalem et aux villes de Juda,
  - type: text
    content: A ses rois et à ses chefs,
  - type: text
    content: Pour en faire une ruine,
  - type: text
    content: Un objet de désolation, de moquerie et de malédiction,
  - type: text
    content: Comme cela se voit aujourd’hui;
  '19':
  - type: text
    content: 'A Pharaon, roi '
  - type: note
    content: Jé 46.
  - type: text
    content: d’Égypte,
  - type: text
    content: A ses serviteurs, à ses chefs, et à tout son peuple;
  '2':
  - type: text
    content: 'parole que Jérémie prononça devant tout le peuple de Juda et devant tous les habitants de Jérusalem, en disant: '
  '20':
  - type: text
    content: A toute l’Arabie, à tous les rois du pays d’Uts,
  - type: text
    content: 'A tous les rois du pays des '
  - type: note
    content: Jé 47:4, etc.
  - type: text
    content: Philistins,
  - type: text
    content: A Askalon, à Gaza, à Ékron, et à ce qui reste d’Asdod;
  '21':
  - type: text
    content: 'A '
  - type: note
    content: Jé 49:7, etc.
  - type: text
    content: 'Édom, A '
  - type: note
    content: Jé 48.
  - type: text
    content: 'Moab, et aux enfants '
  - type: note
    content: Jé 49:1, etc.
  - type: text
    content: d’Ammon;
  '22':
  - type: text
    content: 'A tous les rois de '
  - type: note
    content: Jé 47:4.
  - type: text
    content: Tyr, à tous les rois de Sidon,
  - type: text
    content: Et aux rois des îles qui sont au-delà de la mer;
  '23':
  - type: text
    content: 'A '
  - type: note
    content: Jé 49:8.
  - type: text
    content: Dedan, à Théma, à Buz,
  - type: text
    content: 'Et à tous ceux '
  - type: note
    content: Jé 9:26.
  - type: text
    content: qui se rasent les coins de la barbe;
  '24':
  - type: text
    content: A tous les rois d’Arabie,
  - type: text
    content: 'Et à '
  - type: note
    content: Jé 49:31.
  - type: text
    content: tous les rois des Arabes qui habitent dans le désert;
  '25':
  - type: text
    content: A tous les rois de Zimri,
  - type: text
    content: 'A tous les rois '
  - type: note
    content: Jé 49:34.
  - type: text
    content: d’Élam,
  - type: text
    content: Et à tous les rois de Médie;
  '26':
  - type: text
    content: A tous les rois du septentrion,
  - type: text
    content: Proches ou éloignés,
  - type: text
    content: Aux uns et aux autres,
  - type: text
    content: Et à tous les royaumes du monde
  - type: text
    content: Qui sont sur la face de la terre.
  - type: text
    content: Et le roi de Schéschac boira après eux.
  '27':
  - type: text
    content: 'Tu leur diras:'
  - type: text
    content: 'Ainsi parle l’Éternel des armées, le Dieu d’Israël:'
  - type: text
    content: Buvez, enivrez-vous, et vomissez,
  - type: text
    content: Et tombez sans vous relever,
  - type: text
    content: A la vue du glaive que j’enverrai au milieu de vous!
  '28':
  - type: text
    content: Et s’ils refusent de prendre de ta main la coupe pour boire,
  - type: text
    content: 'Dis-leur: Ainsi parle l’Éternel des armées: Vous boirez!'
  '29':
  - type: text
    content: 'Car voici, dans la '
  - type: note
    content: 1 Pi 4:17.
  - type: text
    content: ville sur laquelle mon nom est invoqué
  - type: text
    content: Je commence à faire du mal;
  - type: text
    content: Et vous, vous resteriez impunis!
  - type: text
    content: Vous ne resterez pas impunis;
  - type: text
    content: Car j’appellerai le glaive sur tous les habitants de la terre,
  - type: text
    content: Dit l’Éternel des armées.
  '3':
  - type: text
    content: 'Depuis la treizième année de Josias, fils d’Amon, roi de Juda, il y a vingt-trois ans que la parole de l’Éternel m’a été adressée; je vous ai parlé, je vous ai parlé dès le matin, et vous n’avez pas écouté. '
  '30':
  - type: text
    content: Et toi, tu leur prophétiseras toutes ces choses,
  - type: text
    content: 'Et tu leur diras: L’Éternel '
  - type: note
    content: Joë 3:16. Am 1:2.
  - type: text
    content: rugira d’en haut;
  - type: text
    content: De sa demeure sainte il fera retentir sa voix;
  - type: text
    content: Il rugira contre le lieu de sa résidence;
  - type: text
    content: Il poussera des cris, comme ceux qui foulent au pressoir,
  - type: text
    content: Contre tous les habitants de la terre.
  '31':
  - type: text
    content: Le bruit parvient jusqu’à l’extrémité de la terre;
  - type: text
    content: Car l’Éternel est en dispute avec les nations,
  - type: text
    content: Il entre en jugement contre toute chair;
  - type: text
    content: Il livre les méchants au glaive, dit l’Éternel.
  - type: heading
    content: 'V. 32-38: cf. So 1:7, etc.; 3:8.'
  '32':
  - type: text
    content: 'Ainsi parle l’Éternel des armées:'
  - type: text
    content: Voici, la calamité va de nation en nation,
  - type: text
    content: Et une grande tempête s’élève des extrémités de la terre.
  '33':
  - type: text
    content: Ceux que tuera l’Éternel en ce jour seront étendus
  - type: text
    content: D’un bout à l’autre de la terre;
  - type: text
    content: 'Ils ne seront ni '
  - type: note
    content: Jé 16:4.
  - type: text
    content: pleurés, ni recueillis, ni enterrés,
  - type: text
    content: Ils seront comme du fumier sur la terre.
  '34':
  - type: text
    content: ' '
  - type: note
    content: Jé 4:8; 6:26.
  - type: text
    content: Gémissez, pasteurs, et criez!
  - type: text
    content: Roulez-vous dans la cendre, conducteurs de troupeaux!
  - type: text
    content: 'Car les jours sont venus où vous allez être '
  - type: note
    content: És 65:12. Jé 12:3.
  - type: text
    content: égorgés.
  - type: text
    content: 'Je vous '
  - type: note
    content: Jé 9:16; 13:14, 24; 18:17.
  - type: text
    content: briserai, et vous tomberez comme un vase de prix.
  '35':
  - type: text
    content: Plus de refuge pour les pasteurs!
  - type: text
    content: Plus de salut pour les conducteurs de troupeaux!
  '36':
  - type: text
    content: On entend les cris des pasteurs,
  - type: text
    content: Les gémissements des conducteurs de troupeaux;
  - type: text
    content: Car l’Éternel ravage leur pâturage.
  '37':
  - type: text
    content: Les habitations paisibles sont détruites
  - type: text
    content: Par la colère ardente de l’Éternel.
  '38':
  - type: text
    content: Il a abandonné sa demeure comme un lionceau sa tanière;
  - type: text
    content: Car leur pays est réduit en désert
  - type: text
    content: Par la fureur du destructeur
  - type: text
    content: Et par son ardente colère.
  '4':
  - type: text
    content: 'L’Éternel vous a envoyé tous ses serviteurs, les prophètes, il les a envoyés '
  - type: note
    content: Jé 7:13, 25; 11:7.
  - type: text
    content: 'dès le matin; et vous '
  - type: note
    content: Jé 11:7, 8, 10; 13:10, 11; 16:12; 17:23; 18:12; 19:15; 22:21.
  - type: text
    content: 'n’avez pas écouté, vous n’avez pas prêté l’oreille pour écouter. '
  '5':
  - type: text
    content: 'Ils ont dit: '
  - type: note
    content: 2 R 17:13. Jé 18:11; 35:15. Jon 3:8.
  - type: text
    content: 'Revenez chacun de votre mauvaise voie et de la méchanceté de vos actions, et vous resterez dans le pays que j’ai donné à vous et à vos pères, d’éternité en éternité; '
  '6':
  - type: text
    content: 'n’allez pas après d’autres dieux, pour les servir et pour vous prosterner devant eux, ne m’irritez pas par l’ouvrage de vos mains, et je ne vous ferai aucun mal. '
  '7':
  - type: text
    content: 'Mais vous ne m’avez pas écouté, dit l’Éternel, afin de m’irriter par l’ouvrage de vos mains, pour votre malheur. '
  '8':
  - type: text
    content: 'C’est pourquoi ainsi parle l’Éternel des armées: Parce que vous n’avez point écouté mes paroles, '
  '9':
  - type: text
    content: 'j’enverrai chercher tous les peuples du septentrion, dit l’Éternel, et j’enverrai auprès de Nebucadnetsar, roi de Babylone, mon serviteur; je le ferai venir contre ce pays et contre ses habitants, et contre toutes ces nations à l’entour, afin de les dévouer par interdit, et d’en faire un objet de désolation et de '
  - type: note
    content: Jé 19:8.
  - type: text
    content: 'moquerie, des ruines éternelles. '
