- type: usfm
  marker: q1
  children:
  - type: text
    text: A ses rois et à ses chefs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour en faire une ruine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Un objet de désolation, de moquerie et de malédiction,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme cela se voit aujourd’hui;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
