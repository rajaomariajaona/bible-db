      metadata:
        usfm: EZK.26.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'les cris de réjouissance et les cris d’allégresse, les chants du fiancé et les chants de la fiancée, le bruit de la meule et la lumière de la lampe. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tout ce pays deviendra une ruine, un désert, et ces nations seront asservies au roi de Babylone pendant soixante-dix ans. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mais lorsque ces '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 36:22
      metadata:
        usfm: 2CH.36.22
    - type: text
