    marker-yv: yv-n
  - type: text
    text: Dedan, à Théma, à Buz,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et à tous ceux '
  - type: usfm
    marker: x
    children:
    - type: usfm
