    marker-yv: yv-n
  - type: text
    text: 'Revenez chacun de votre mauvaise voie et de la méchanceté de vos actions, et vous resterez dans le pays que j’ai donné à vous et à vos pères, d’éternité en éternité; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'n’allez pas après d’autres dieux, pour les servir et pour vous prosterner devant eux, ne m’irritez pas par l’ouvrage de vos mains, et je ne vous ferai aucun mal. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mais vous ne m’avez pas écouté, dit l’Éternel, afin de m’irriter par l’ouvrage de vos mains, pour votre malheur. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'C’est pourquoi ainsi parle l’Éternel des armées: Parce que vous n’avez point écouté mes paroles, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'j’enverrai chercher tous les peuples du septentrion, dit l’Éternel, et j’enverrai auprès de Nebucadnetsar, roi de Babylone, mon serviteur; je le ferai venir contre ce pays et contre ses habitants, et contre toutes ces nations à l’entour, afin de les dévouer par interdit, et d’en faire un objet de désolation et de '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 19:8
      metadata:
        usfm: JER.19.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'moquerie, des ruines éternelles. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Je ferai cesser parmi eux '
  - type: usfm
    marker: x
    children:
