    - type: text
      text: '1'
  - type: text
    text: 'La parole fut adressée à Jérémie sur tout le peuple de Juda, la quatrième année de Jojakim, fils de Josias, roi de Juda, c’était la première année de Nebucadnetsar, roi de Babylone, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'parole que Jérémie prononça devant tout le peuple de Juda et devant tous les habitants de Jérusalem, en disant: '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Depuis la treizième année de Josias, fils d’Amon, roi de Juda, il y a vingt-trois ans que la parole de l’Éternel m’a été adressée; je vous ai parlé, je vous ai parlé dès le matin, et vous n’avez pas écouté. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'L’Éternel vous a envoyé tous ses serviteurs, les prophètes, il les a envoyés '
