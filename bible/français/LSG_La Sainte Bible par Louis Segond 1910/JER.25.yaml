- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: A tous les rois d’Arabie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et à '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 49:31
      metadata:
        usfm: JER.49.31
    - type: text
