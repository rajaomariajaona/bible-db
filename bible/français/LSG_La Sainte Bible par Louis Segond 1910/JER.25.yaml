- type: usfm
  marker: q1
  children:
  - type: text
    text: Et fais-la boire à toutes les nations
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vers lesquelles je t’enverrai.
- type: usfm
  marker: q1
  children:
  - type: usfm
