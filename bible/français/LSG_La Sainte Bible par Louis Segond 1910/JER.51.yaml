document_id: JER.51,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ainsi parle l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, je fais lever contre Babylone,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et contre les habitants de la Chaldée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Un '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 4:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: vent destructeur.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel manifeste la justice de notre cause;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Venez, et racontons dans Sion
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’œuvre de l’Éternel, notre Dieu.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 46:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Aiguisez les flèches, saisissez les boucliers!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel a excité l’esprit des rois de Médie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce qu’il veut détruire Babylone;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car c’est la vengeance de l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'La '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 50:28
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: vengeance de son temple.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Élevez une bannière contre les murs de Babylone!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fortifiez les postes, placez des gardes, dressez des embuscades!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car l’Éternel a pris une résolution,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il exécute ce qu’il a prononcé contre les habitants de Babylone.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toi qui habites près des grandes eaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qui as d’immenses trésors,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ta fin est venue, ta cupidité est à son terme!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Am 6:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'L’Éternel des armées l’a juré par lui-même:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, je te remplirai d’hommes comme de sauterelles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils pousseront contre toi des cris de guerre.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Il a crée la '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 1:1
      - type: text
        text: . Jé 10:12, etc.
      marker-yv: yv-n
    - type: text
      text: terre par sa puissance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a fondé le monde par sa sagesse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Il a '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 9:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 104:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 40:22
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 44:24
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 51:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 10:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: étendu les cieux par son intelligence.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A sa voix, les eaux mugissent dans les cieux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il fait monter les nuages des extrémités de la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il produit les éclairs et la pluie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il tire le vent de ses trésors.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tout homme devient stupide par sa science,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tout orfèvre est honteux de son image taillée;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car ses idoles ne sont que mensonge,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n’y a point en elles de souffle.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles sont une chose de néant, une œuvre de tromperie;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles périront, quand viendra le châtiment.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Celui qui est '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 10:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: la part de Jacob n’est pas comme elles;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car c’est lui qui a tout formé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et Israël est la tribu de son héritage.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel des armées est son nom.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'J’envoie contre Babylone des '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 4:11
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: vanneurs qui la vanneront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui videront son pays;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils fondront de toutes parts sur elle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au jour du malheur.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tu as été pour moi '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 50:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: un marteau, un instrument de guerre.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai brisé par toi des nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par toi j’ai détruit des royaumes.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par toi j’ai brisé le cheval et son cavalier;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par toi j’ai brisé le char et celui qui était dessus.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par toi j’ai brisé l’homme et la femme;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par toi j’ai brisé le vieillard et l’enfant;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par toi j’ai brisé le jeune homme et la jeune fille.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par toi j’ai brisé le berger et son troupeau;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par toi j’ai brisé le laboureur et ses bœufs;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par toi j’ai brisé les gouverneurs et les chefs.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je rendrai à Babylone et à tous les habitants de la Chaldée
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tout le mal qu’ils ont fait à Sion sous vos yeux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit l’Éternel.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, j’en veux à toi, montagne de destruction, dit l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A toi qui détruisais toute la terre!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’étendrai ma main sur toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je te roulerai du haut des rochers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je ferai de toi une montagne embrasée.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On ne tirera de toi ni pierres angulaires, ni pierres pour fondements;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car tu seras à jamais une ruine, dit l’Éternel…
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Élevez une bannière dans le pays!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sonnez de la trompette parmi les nations!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Préparez les nations contre elle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Appelez contre elle les royaumes d’Ararat, de Minni et d’Aschkenaz!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Établissez contre elle des chefs!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Faites avancer des chevaux comme des sauterelles hérissées!
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Préparez contre elle les nations, les rois de Médie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses gouverneurs et tous ses chefs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tout le pays sous leur domination!
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La terre s’ébranle, elle tremble;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car le dessein de l’Éternel contre Babylone s’accomplit;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il va faire du pays de Babylone un désert sans habitants.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’on tende l’arc contre celui qui tend son arc,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Contre celui qui est fier dans sa cuirasse!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N’épargnez pas ses jeunes hommes!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Exterminez toute son armée!
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les guerriers de Babylone cessent de combattre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils se tiennent dans les forteresses;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Leur force est épuisée, ils sont '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 50:37
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: comme des femmes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On met le feu aux habitations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On brise les barres.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les courriers se rencontrent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les messagers se croisent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour annoncer au roi de Babylone
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que sa ville est prise par tous les côtés,
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que les passages sont envahis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les marais embrasés par le feu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les hommes de guerre consternés.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car ainsi parle l’Éternel des armées, le Dieu d’Israël:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La fille de Babylone est comme une aire dans le temps où on la foule;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Encore un instant, et le moment de la moisson sera venu pour elle.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nebucadnetsar, roi de Babylone, m’a dévorée, m’a détruite;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a fait de moi un vase vide;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tel un dragon, il m’a engloutie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a rempli son ventre de ce que j’avais de précieux;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il m’a chassée.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que la violence envers moi et ma chair déchirée retombent sur Babylone!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit l’habitante de Sion.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que mon sang retombe sur les habitants de la Chaldée!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit Jérusalem.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'C’est pourquoi ainsi parle l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, je défendrai ta cause,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je te vengerai!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je mettrai à sec la '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 50:38
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: mer de Babylone,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je ferai tarir sa source.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Babylone sera un monceau de ruines, un repaire de chacals,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un objet de désolation et de moquerie;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n’y aura plus d’habitants.
  '38':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils rugiront ensemble comme des lions,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils pousseront des cris comme des lionceaux.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand ils seront échauffés, je les ferai boire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je les enivrerai, pour qu’ils se livrent à la gaîté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Puis s’endorment d’un sommeil éternel, et ne se réveillent plus,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit l’Éternel.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’ils tombent blessés à mort dans le pays des Chaldéens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Percés de coups dans les '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 49:26
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: rues de Babylone!
  '40':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je les ferai descendre comme des agneaux à la tuerie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme des béliers et des boucs.
  '41':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Eh quoi! '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 25:26
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Schéschac est prise!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Celle dont la '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 13:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: gloire remplissait toute la terre est conquise!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eh quoi! Babylone est détruite au milieu des nations!
  '42':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'La mer est montée sur Babylone:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Babylone a été couverte par la multitude de ses flots.
  '43':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses villes sont ravagées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La terre est aride et déserte;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est un pays où personne n’habite,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Où ne passe aucun homme.
  '44':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je châtierai Bel à Babylone,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’arracherai de sa bouche ce qu’il a englouti,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les nations n’afflueront plus vers lui.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La muraille même de Babylone est tombée!
  '45':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sortez du milieu d’elle, mon peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que chacun sauve sa vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En échappant à la colère ardente de l’Éternel!
  '46':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que votre cœur ne se trouble point, et ne vous effrayez pas
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des bruits qui se répandront dans le pays;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car cette année surviendra un bruit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’année suivante un autre bruit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La violence régnera dans le pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et un dominateur s’élèvera contre un autre dominateur.
  '47':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est pourquoi voici, les jours viennent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Où je châtierai les idoles de Babylone,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tout son pays sera couvert de honte;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous ses morts tomberont au milieu d’elle.
  '48':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur Babylone retentiront les cris de joie des cieux et de la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et de tout ce qu’ils renferment;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car du septentrion les dévastateurs fondront sur elle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit l’Éternel.
  '49':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Babylone aussi tombera, ô morts d’Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme elle a fait tomber les morts de tout le pays.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car Israël et Juda ne sont point abandonnés de leur Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De l’Éternel des armées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le pays des Chaldéens est rempli de crimes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Contre le Saint d’Israël.
  '50':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous qui avez échappé au glaive, partez, ne tardez pas!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De la terre lointaine, pensez à l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que Jérusalem soit présente à vos cœurs!
  '51':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous étions confus, quand nous entendions l’insulte;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La honte couvrait nos visages,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand des étrangers sont venus
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans le sanctuaire de la maison de l’Éternel.
  '52':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est pourquoi voici, les jours viennent, dit l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Où je châtierai ses idoles;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et dans tout son pays les blessés gémiront.
  '53':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand Babylone s’élèverait jusqu’aux cieux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand elle rendrait inaccessibles ses hautes forteresses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’enverrai contre elle les dévastateurs, dit l’Éternel…
  '54':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des cris s’échappent de Babylone,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le désastre est grand dans le pays des Chaldéens.
  '55':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car l’Éternel ravage Babylone,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il en fait cesser les cris retentissants;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les flots des dévastateurs mugissent comme de grandes eaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dont le bruit tumultueux se fait entendre.
  '56':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, le dévastateur fond sur elle, sur Babylone;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les guerriers de Babylone sont pris,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leurs arcs sont brisés.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car l’Éternel est un Dieu qui rend à chacun selon ses œuvres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui paie à chacun son salaire.
  '57':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’enivrerai ses princes et ses sages,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses gouverneurs, ses chefs et ses guerriers;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils s’endormiront d’un sommeil éternel, et ne se réveilleront plus,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit le roi, dont l’Éternel des armées est le nom.
  '58':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ainsi parle l’Éternel des armées:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les larges murailles de Babylone seront renversées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses hautes portes seront brûlées par le feu;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi les peuples auront travaillé en vain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les nations se seront fatiguées pour le feu.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 59-64: cf. Ap 18:21-24.'
    marker-yv: yv-h
  '59':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ordre donné par Jérémie, le prophète, à Seraja, fils de Nérija, fils de Machséja, lorsqu’il se rendit à Babylone avec Sédécias, roi de Juda, la quatrième année du règne de Sédécias. Or, Seraja était premier chambellan. '
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 50:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 18:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Fuyez de Babylone, et que chacun sauve sa vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De peur que vous ne périssiez dans sa ruine!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car c’est un temps de '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 50:15
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '28'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: vengeance pour l’Éternel;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il va lui rendre selon ses œuvres.
  '60':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jérémie écrivit dans un livre tous les malheurs qui devaient arriver à Babylone, toutes ces paroles qui sont écrites sur Babylone. '
  '61':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jérémie dit à Seraja: Lorsque tu seras arrivé à Babylone, tu auras soin de lire toutes ces paroles, '
  '62':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et tu diras: Éternel, c’est toi qui as déclaré que ce lieu serait détruit, et qu’il ne serait plus habité ni par les hommes ni par les bêtes, mais qu’il deviendrait un désert pour toujours. '
  '63':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et quand tu auras achevé la lecture de ce livre, tu y attacheras une pierre, et tu le jetteras dans l’Euphrate, '
  '64':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et tu diras: Ainsi Babylone sera submergée, elle ne se relèvera pas des malheurs que j’amènerai sur elle; ils tomberont épuisés.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jusqu’ici sont les paroles de Jérémie.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Babylone était dans la main de l’Éternel une coupe d’or,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui enivrait toute la terre;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Les nations ont bu de son vin:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est pourquoi les nations ont été comme en délire.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Soudain Babylone '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 21:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 14:8
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: tombe, elle est brisée!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Gémissez sur elle, prenez du '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 8:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'baume pour sa plaie:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Peut-être guérira-t-elle.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous avons voulu guérir Babylone, mais elle n’a pas guéri.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 46:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Abandonnons-la, et allons chacun dans son pays;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car son châtiment atteint jusqu’aux cieux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et s’élève jusqu’aux nues.
