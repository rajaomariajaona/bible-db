    text: vanneurs qui la vanneront,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui videront son pays;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils fondront de toutes parts sur elle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au jour du malheur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Qu’on tende l’arc contre celui qui tend son arc,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Contre celui qui est fier dans sa cuirasse!
- type: usfm
  marker: q1
  children:
  - type: text
    text: N’épargnez pas ses jeunes hommes!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Exterminez toute son armée!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Qu’ils tombent blessés à mort dans le pays des Chaldéens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Percés de coups dans les '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 49:26
      metadata:
        usfm: JER.49.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: rues de Babylone!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Car Israël et Juda ne sont point abandonnés de leur Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De l’Éternel des armées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le pays des Chaldéens est rempli de crimes
- type: usfm
  marker: q1
  children:
  - type: text
    text: Contre le Saint d’Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 50:8
      metadata:
        usfm: JER.50.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
