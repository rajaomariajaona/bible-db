document_id: JER.51,93
type_code: fra
verses:
  '1':
  - type: text
    content: 'Ainsi parle l’Éternel:'
  - type: text
    content: Voici, je fais lever contre Babylone,
  - type: text
    content: Et contre les habitants de la Chaldée,
  - type: text
    content: 'Un '
  - type: note
    content: Jé 4:11.
  - type: text
    content: vent destructeur.
  '10':
  - type: text
    content: L’Éternel manifeste la justice de notre cause;
  - type: text
    content: Venez, et racontons dans Sion
  - type: text
    content: L’œuvre de l’Éternel, notre Dieu.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Jé 46:4.
  - type: text
    content: Aiguisez les flèches, saisissez les boucliers!
  - type: text
    content: L’Éternel a excité l’esprit des rois de Médie,
  - type: text
    content: Parce qu’il veut détruire Babylone;
  - type: text
    content: Car c’est la vengeance de l’Éternel,
  - type: text
    content: 'La '
  - type: note
    content: Jé 50:28.
  - type: text
    content: vengeance de son temple.
  '12':
  - type: text
    content: Élevez une bannière contre les murs de Babylone!
  - type: text
    content: Fortifiez les postes, placez des gardes, dressez des embuscades!
  - type: text
    content: Car l’Éternel a pris une résolution,
  - type: text
    content: Et il exécute ce qu’il a prononcé contre les habitants de Babylone.
  '13':
  - type: text
    content: Toi qui habites près des grandes eaux,
  - type: text
    content: Et qui as d’immenses trésors,
  - type: text
    content: Ta fin est venue, ta cupidité est à son terme!
  '14':
  - type: text
    content: ' '
  - type: note
    content: Am 6:8.
  - type: text
    content: 'L’Éternel des armées l’a juré par lui-même:'
  - type: text
    content: Oui, je te remplirai d’hommes comme de sauterelles,
  - type: text
    content: Et ils pousseront contre toi des cris de guerre.
  '15':
  - type: text
    content: 'Il a crée la '
  - type: note
    content: Ge 1:1. Jé 10:12, etc.
  - type: text
    content: terre par sa puissance,
  - type: text
    content: Il a fondé le monde par sa sagesse,
  - type: text
    content: 'Il a '
  - type: note
    content: Job 9:8. Ps 104:2. És 40:22; 44:24; 51:13. Jé 10:12.
  - type: text
    content: étendu les cieux par son intelligence.
  '16':
  - type: text
    content: A sa voix, les eaux mugissent dans les cieux,
  - type: text
    content: Il fait monter les nuages des extrémités de la terre,
  - type: text
    content: Il produit les éclairs et la pluie,
  - type: text
    content: Il tire le vent de ses trésors.
  '17':
  - type: text
    content: Tout homme devient stupide par sa science,
  - type: text
    content: Tout orfèvre est honteux de son image taillée;
  - type: text
    content: Car ses idoles ne sont que mensonge,
  - type: text
    content: Il n’y a point en elles de souffle.
  '18':
  - type: text
    content: Elles sont une chose de néant, une œuvre de tromperie;
  - type: text
    content: Elles périront, quand viendra le châtiment.
  '19':
  - type: text
    content: 'Celui qui est '
  - type: note
    content: Jé 10:16.
  - type: text
    content: la part de Jacob n’est pas comme elles;
  - type: text
    content: Car c’est lui qui a tout formé,
  - type: text
    content: Et Israël est la tribu de son héritage.
  - type: text
    content: L’Éternel des armées est son nom.
  '2':
  - type: text
    content: 'J’envoie contre Babylone des '
  - type: note
    content: Jé 4:11; 15:7.
  - type: text
    content: vanneurs qui la vanneront,
  - type: text
    content: Qui videront son pays;
  - type: text
    content: Ils fondront de toutes parts sur elle,
  - type: text
    content: Au jour du malheur.
  '20':
  - type: text
    content: 'Tu as été pour moi '
  - type: note
    content: Jé 50:23.
  - type: text
    content: un marteau, un instrument de guerre.
  - type: text
    content: J’ai brisé par toi des nations,
  - type: text
    content: Par toi j’ai détruit des royaumes.
  '21':
  - type: text
    content: Par toi j’ai brisé le cheval et son cavalier;
  - type: text
    content: Par toi j’ai brisé le char et celui qui était dessus.
  '22':
  - type: text
    content: Par toi j’ai brisé l’homme et la femme;
  - type: text
    content: Par toi j’ai brisé le vieillard et l’enfant;
  - type: text
    content: Par toi j’ai brisé le jeune homme et la jeune fille.
  '23':
  - type: text
    content: Par toi j’ai brisé le berger et son troupeau;
  - type: text
    content: Par toi j’ai brisé le laboureur et ses bœufs;
  - type: text
    content: Par toi j’ai brisé les gouverneurs et les chefs.
  '24':
  - type: text
    content: Je rendrai à Babylone et à tous les habitants de la Chaldée
  - type: text
    content: Tout le mal qu’ils ont fait à Sion sous vos yeux,
  - type: text
    content: Dit l’Éternel.
  '25':
  - type: text
    content: Voici, j’en veux à toi, montagne de destruction, dit l’Éternel,
  - type: text
    content: A toi qui détruisais toute la terre!
  - type: text
    content: J’étendrai ma main sur toi,
  - type: text
    content: Je te roulerai du haut des rochers,
  - type: text
    content: Et je ferai de toi une montagne embrasée.
  '26':
  - type: text
    content: On ne tirera de toi ni pierres angulaires, ni pierres pour fondements;
  - type: text
    content: Car tu seras à jamais une ruine, dit l’Éternel…
  '27':
  - type: text
    content: Élevez une bannière dans le pays!
  - type: text
    content: Sonnez de la trompette parmi les nations!
  - type: text
    content: Préparez les nations contre elle,
  - type: text
    content: Appelez contre elle les royaumes d’Ararat, de Minni et d’Aschkenaz!
  - type: text
    content: Établissez contre elle des chefs!
  - type: text
    content: Faites avancer des chevaux comme des sauterelles hérissées!
  '28':
  - type: text
    content: Préparez contre elle les nations, les rois de Médie,
  - type: text
    content: Ses gouverneurs et tous ses chefs,
  - type: text
    content: Et tout le pays sous leur domination!
  '29':
  - type: text
    content: La terre s’ébranle, elle tremble;
  - type: text
    content: Car le dessein de l’Éternel contre Babylone s’accomplit;
  - type: text
    content: Il va faire du pays de Babylone un désert sans habitants.
  '3':
  - type: text
    content: Qu’on tende l’arc contre celui qui tend son arc,
  - type: text
    content: Contre celui qui est fier dans sa cuirasse!
  - type: text
    content: N’épargnez pas ses jeunes hommes!
  - type: text
    content: Exterminez toute son armée!
  '30':
  - type: text
    content: Les guerriers de Babylone cessent de combattre,
  - type: text
    content: Ils se tiennent dans les forteresses;
  - type: text
    content: 'Leur force est épuisée, ils sont '
  - type: note
    content: Jé 50:37.
  - type: text
    content: comme des femmes.
  - type: text
    content: On met le feu aux habitations,
  - type: text
    content: On brise les barres.
  '31':
  - type: text
    content: Les courriers se rencontrent,
  - type: text
    content: Les messagers se croisent,
  - type: text
    content: Pour annoncer au roi de Babylone
  - type: text
    content: Que sa ville est prise par tous les côtés,
  '32':
  - type: text
    content: Que les passages sont envahis,
  - type: text
    content: Les marais embrasés par le feu,
  - type: text
    content: Et les hommes de guerre consternés.
  '33':
  - type: text
    content: 'Car ainsi parle l’Éternel des armées, le Dieu d’Israël:'
  - type: text
    content: La fille de Babylone est comme une aire dans le temps où on la foule;
  - type: text
    content: Encore un instant, et le moment de la moisson sera venu pour elle.
  '34':
  - type: text
    content: Nebucadnetsar, roi de Babylone, m’a dévorée, m’a détruite;
  - type: text
    content: Il a fait de moi un vase vide;
  - type: text
    content: Tel un dragon, il m’a engloutie,
  - type: text
    content: Il a rempli son ventre de ce que j’avais de précieux;
  - type: text
    content: Il m’a chassée.
  '35':
  - type: text
    content: Que la violence envers moi et ma chair déchirée retombent sur Babylone!
  - type: text
    content: Dit l’habitante de Sion.
  - type: text
    content: Que mon sang retombe sur les habitants de la Chaldée!
  - type: text
    content: Dit Jérusalem.
  '36':
  - type: text
    content: 'C’est pourquoi ainsi parle l’Éternel:'
  - type: text
    content: Voici, je défendrai ta cause,
  - type: text
    content: Je te vengerai!
  - type: text
    content: 'Je mettrai à sec la '
  - type: note
    content: Jé 50:38.
  - type: text
    content: mer de Babylone,
  - type: text
    content: Et je ferai tarir sa source.
  '37':
  - type: text
    content: Babylone sera un monceau de ruines, un repaire de chacals,
  - type: text
    content: Un objet de désolation et de moquerie;
  - type: text
    content: Il n’y aura plus d’habitants.
  '38':
  - type: text
    content: Ils rugiront ensemble comme des lions,
  - type: text
    content: Ils pousseront des cris comme des lionceaux.
  '39':
  - type: text
    content: Quand ils seront échauffés, je les ferai boire,
  - type: text
    content: Et je les enivrerai, pour qu’ils se livrent à la gaîté,
  - type: text
    content: Puis s’endorment d’un sommeil éternel, et ne se réveillent plus,
  - type: text
    content: Dit l’Éternel.
  '4':
  - type: text
    content: Qu’ils tombent blessés à mort dans le pays des Chaldéens,
  - type: text
    content: 'Percés de coups dans les '
  - type: note
    content: Jé 49:26.
  - type: text
    content: rues de Babylone!
  '40':
  - type: text
    content: Je les ferai descendre comme des agneaux à la tuerie,
  - type: text
    content: Comme des béliers et des boucs.
  '41':
  - type: text
    content: 'Eh quoi! '
  - type: note
    content: Jé 25:26.
  - type: text
    content: Schéschac est prise!
  - type: text
    content: 'Celle dont la '
  - type: note
    content: Jé 13:19.
  - type: text
    content: gloire remplissait toute la terre est conquise!
  - type: text
    content: Eh quoi! Babylone est détruite au milieu des nations!
  '42':
  - type: text
    content: 'La mer est montée sur Babylone:'
  - type: text
    content: Babylone a été couverte par la multitude de ses flots.
  '43':
  - type: text
    content: Ses villes sont ravagées,
  - type: text
    content: La terre est aride et déserte;
  - type: text
    content: C’est un pays où personne n’habite,
  - type: text
    content: Où ne passe aucun homme.
  '44':
  - type: text
    content: Je châtierai Bel à Babylone,
  - type: text
    content: J’arracherai de sa bouche ce qu’il a englouti,
  - type: text
    content: Et les nations n’afflueront plus vers lui.
  - type: text
    content: La muraille même de Babylone est tombée!
  '45':
  - type: text
    content: Sortez du milieu d’elle, mon peuple,
  - type: text
    content: Et que chacun sauve sa vie,
  - type: text
    content: En échappant à la colère ardente de l’Éternel!
  '46':
  - type: text
    content: Que votre cœur ne se trouble point, et ne vous effrayez pas
  - type: text
    content: Des bruits qui se répandront dans le pays;
  - type: text
    content: Car cette année surviendra un bruit,
  - type: text
    content: Et l’année suivante un autre bruit,
  - type: text
    content: La violence régnera dans le pays,
  - type: text
    content: Et un dominateur s’élèvera contre un autre dominateur.
  '47':
  - type: text
    content: C’est pourquoi voici, les jours viennent
  - type: text
    content: Où je châtierai les idoles de Babylone,
  - type: text
    content: Et tout son pays sera couvert de honte;
  - type: text
    content: Tous ses morts tomberont au milieu d’elle.
  '48':
  - type: text
    content: Sur Babylone retentiront les cris de joie des cieux et de la terre,
  - type: text
    content: Et de tout ce qu’ils renferment;
  - type: text
    content: Car du septentrion les dévastateurs fondront sur elle,
  - type: text
    content: Dit l’Éternel.
  '49':
  - type: text
    content: Babylone aussi tombera, ô morts d’Israël,
  - type: text
    content: Comme elle a fait tomber les morts de tout le pays.
  '5':
  - type: text
    content: Car Israël et Juda ne sont point abandonnés de leur Dieu,
  - type: text
    content: De l’Éternel des armées,
  - type: text
    content: Et le pays des Chaldéens est rempli de crimes
  - type: text
    content: Contre le Saint d’Israël.
  '50':
  - type: text
    content: Vous qui avez échappé au glaive, partez, ne tardez pas!
  - type: text
    content: De la terre lointaine, pensez à l’Éternel,
  - type: text
    content: Et que Jérusalem soit présente à vos cœurs!
  '51':
  - type: text
    content: Nous étions confus, quand nous entendions l’insulte;
  - type: text
    content: La honte couvrait nos visages,
  - type: text
    content: Quand des étrangers sont venus
  - type: text
    content: Dans le sanctuaire de la maison de l’Éternel.
  '52':
  - type: text
    content: C’est pourquoi voici, les jours viennent, dit l’Éternel,
  - type: text
    content: Où je châtierai ses idoles;
  - type: text
    content: Et dans tout son pays les blessés gémiront.
  '53':
  - type: text
    content: Quand Babylone s’élèverait jusqu’aux cieux,
  - type: text
    content: Quand elle rendrait inaccessibles ses hautes forteresses,
  - type: text
    content: J’enverrai contre elle les dévastateurs, dit l’Éternel…
  '54':
  - type: text
    content: Des cris s’échappent de Babylone,
  - type: text
    content: Et le désastre est grand dans le pays des Chaldéens.
  '55':
  - type: text
    content: Car l’Éternel ravage Babylone,
  - type: text
    content: Il en fait cesser les cris retentissants;
  - type: text
    content: Les flots des dévastateurs mugissent comme de grandes eaux,
  - type: text
    content: Dont le bruit tumultueux se fait entendre.
  '56':
  - type: text
    content: Oui, le dévastateur fond sur elle, sur Babylone;
  - type: text
    content: Les guerriers de Babylone sont pris,
  - type: text
    content: Leurs arcs sont brisés.
  - type: text
    content: Car l’Éternel est un Dieu qui rend à chacun selon ses œuvres,
  - type: text
    content: Qui paie à chacun son salaire.
  '57':
  - type: text
    content: J’enivrerai ses princes et ses sages,
  - type: text
    content: Ses gouverneurs, ses chefs et ses guerriers;
  - type: text
    content: Ils s’endormiront d’un sommeil éternel, et ne se réveilleront plus,
  - type: text
    content: Dit le roi, dont l’Éternel des armées est le nom.
  '58':
  - type: text
    content: 'Ainsi parle l’Éternel des armées:'
  - type: text
    content: Les larges murailles de Babylone seront renversées,
  - type: text
    content: Ses hautes portes seront brûlées par le feu;
  - type: text
    content: Ainsi les peuples auront travaillé en vain,
  - type: text
    content: Les nations se seront fatiguées pour le feu.
  - type: heading
    content: 'V. 59-64: cf. Ap 18:21-24.'
  '59':
  - type: text
    content: 'Ordre donné par Jérémie, le prophète, à Seraja, fils de Nérija, fils de Machséja, lorsqu’il se rendit à Babylone avec Sédécias, roi de Juda, la quatrième année du règne de Sédécias. Or, Seraja était premier chambellan. '
  '6':
  - type: text
    content: ' '
  - type: note
    content: Jé 50:8. Ap 18:4.
  - type: text
    content: Fuyez de Babylone, et que chacun sauve sa vie,
  - type: text
    content: De peur que vous ne périssiez dans sa ruine!
  - type: text
    content: 'Car c’est un temps de '
  - type: note
    content: Jé 50:15, 28.
  - type: text
    content: vengeance pour l’Éternel;
  - type: text
    content: Il va lui rendre selon ses œuvres.
  '60':
  - type: text
    content: 'Jérémie écrivit dans un livre tous les malheurs qui devaient arriver à Babylone, toutes ces paroles qui sont écrites sur Babylone. '
  '61':
  - type: text
    content: 'Jérémie dit à Seraja: Lorsque tu seras arrivé à Babylone, tu auras soin de lire toutes ces paroles, '
  '62':
  - type: text
    content: 'et tu diras: Éternel, c’est toi qui as déclaré que ce lieu serait détruit, et qu’il ne serait plus habité ni par les hommes ni par les bêtes, mais qu’il deviendrait un désert pour toujours. '
  '63':
  - type: text
    content: 'Et quand tu auras achevé la lecture de ce livre, tu y attacheras une pierre, et tu le jetteras dans l’Euphrate, '
  '64':
  - type: text
    content: 'et tu diras: Ainsi Babylone sera submergée, elle ne se relèvera pas des malheurs que j’amènerai sur elle; ils tomberont épuisés.'
  - type: text
    content: Jusqu’ici sont les paroles de Jérémie.
  '7':
  - type: text
    content: Babylone était dans la main de l’Éternel une coupe d’or,
  - type: text
    content: Qui enivrait toute la terre;
  - type: text
    content: 'Les nations ont bu de son vin:'
  - type: text
    content: C’est pourquoi les nations ont été comme en délire.
  '8':
  - type: text
    content: 'Soudain Babylone '
  - type: note
    content: És 21:9. Ap 14:8; 18:2.
  - type: text
    content: tombe, elle est brisée!
  - type: text
    content: 'Gémissez sur elle, prenez du '
  - type: note
    content: Jé 8:22.
  - type: text
    content: 'baume pour sa plaie:'
  - type: text
    content: Peut-être guérira-t-elle.
  '9':
  - type: text
    content: Nous avons voulu guérir Babylone, mais elle n’a pas guéri.
  - type: note
    content: Jé 46:11.
  - type: text
    content: Abandonnons-la, et allons chacun dans son pays;
  - type: text
    content: Car son châtiment atteint jusqu’aux cieux,
  - type: text
    content: Et s’élève jusqu’aux nues.
