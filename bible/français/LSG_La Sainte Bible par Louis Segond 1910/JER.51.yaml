        text: Ap 18:4
      metadata:
        usfm: REV.18.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Fuyez de Babylone, et que chacun sauve sa vie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De peur que vous ne périssiez dans sa ruine!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Car c’est un temps de '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 50:15
      metadata:
        usfm: JER.50.15
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '28'
      metadata:
        usfm: JER.50.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: vengeance pour l’Éternel;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il va lui rendre selon ses œuvres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Babylone était dans la main de l’Éternel une coupe d’or,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui enivrait toute la terre;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Les nations ont bu de son vin:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est pourquoi les nations ont été comme en délire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Soudain Babylone '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 21:9
      metadata:
        usfm: ISA.21.9
    - type: text
      text: '. '
