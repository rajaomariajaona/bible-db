document_id: NUM.9,93
type_code: fra
verses:
  '1':
  - type: heading
    content: La Pâque célébrée au désert de Sinaï
  - type: heading
    content: 'V. 1-14: cf. (Jos 5:10, 11. 2 Ch 30; 35:1-19. Esd 6:19-22.)'
  - type: text
    content: 'L’Éternel parla à Moïse, dans le désert de Sinaï, le premier mois de la seconde année après leur sortie du pays d’Égypte. '
  '10':
  - type: text
    content: 'Parle aux enfants d’Israël, et dis-leur: Si quelqu’un d’entre vous ou de vos descendants est impur à cause d’un mort, ou est en voyage dans le lointain, il célébrera la Pâque en l’honneur de l’Éternel. '
  '11':
  - type: text
    content: 'C’est au second mois qu’ils la célébreront, le quatorzième jour, entre les deux soirs; ils la mangeront avec des pains sans levain et des herbes amères. '
  '12':
  - type: note
    content: Ex 12:46. Jn 19:33, 36.
  - type: text
    content: 'Ils n’en laisseront rien jusqu’au matin, et ils n’en briseront aucun os. Ils la célébreront selon toutes les ordonnances de la Pâque. '
  '13':
  - type: text
    content: 'Si celui qui est pur et qui n’est pas en voyage s’abstient de célébrer la Pâque, celui-là sera retranché de son peuple; parce qu’il n’a pas présenté l’offrande de l’Éternel au temps fixé, cet homme-là portera la peine de son péché. '
  '14':
  - type: text
    content: 'Si un étranger en séjour chez vous célèbre la Pâque de l’Éternel, il se conformera aux lois et aux ordonnances de la Pâque. '
  - type: note
    content: Ex 12:49.
  - type: text
    content: Il y aura une même loi parmi vous, pour l’étranger comme pour l’indigène.
  - type: heading
    content: La nuée
  - type: heading
    content: 'V. 15-23: cf. (Ex 40:34-38. No 10:11-36.) (Jn 10:4, 27.) (Mt 6:10.)'
  '15':
  - type: text
    content: ' '
  - type: note
    content: Ex 40:34.
  - type: text
    content: 'Le jour où le tabernacle fut dressé, la nuée couvrit le tabernacle, la tente d’assignation; et, depuis le soir jusqu’au matin, elle eut sur le tabernacle l’apparence d’un feu. '
  '16':
  - type: text
    content: 'Il en fut continuellement ainsi: la nuée couvrait le tabernacle, et elle avait de nuit l’apparence d’un feu. '
  '17':
  - type: text
    content: 'Quand la nuée s’élevait de dessus la tente, les enfants d’Israël partaient; et les enfants d’Israël campaient dans le lieu où s’arrêtait la nuée. '
  '18':
  - type: text
    content: 'Les enfants d’Israël partaient sur l’ordre de l’Éternel, '
  - type: note
    content: 1 Co 10:1.
  - type: text
    content: 'et ils campaient sur l’ordre de l’Éternel; ils campaient aussi longtemps que la nuée restait sur le tabernacle. '
  '19':
  - type: text
    content: 'Quand la nuée restait longtemps sur le tabernacle, les enfants d’Israël obéissaient au commandement de l’Éternel, et ne partaient point. '
  '2':
  - type: text
    content: 'Il dit: Que les enfants d’Israël célèbrent la '
  - type: note
    content: Ex 12:1, etc. Lé 23:5. No 28:16. De 16:2.
  - type: text
    content: 'Pâque au temps fixé. '
  '20':
  - type: text
    content: 'Quand la nuée restait peu de jours sur le tabernacle, ils campaient sur l’ordre de l’Éternel, et ils partaient sur l’ordre de l’Éternel. '
  '21':
  - type: text
    content: 'Si la nuée s’arrêtait du soir au matin, et s’élevait le matin, ils partaient. Si la nuée s’élevait après un jour et une nuit, ils partaient. '
  '22':
  - type: text
    content: 'Si la nuée s’arrêtait sur le tabernacle deux jours, ou un mois, ou une année, '
  - type: note
    content: Ex 40:36, 37.
  - type: text
    content: 'les enfants d’Israël restaient campés, et ne partaient point; et quand elle s’élevait, ils partaient. '
  '23':
  - type: text
    content: Ils campaient sur l’ordre de l’Éternel, et ils partaient sur l’ordre de l’Éternel; ils obéissaient au commandement de l’Éternel, sur l’ordre de l’Éternel par Moïse.
  '3':
  - type: text
    content: 'Vous la célébrerez au temps fixé, le quatorzième jour de ce mois, entre les deux soirs; vous la célébrerez selon toutes les lois et toutes les ordonnances qui s’y rapportent. '
  '4':
  - type: text
    content: 'Moïse parla aux enfants d’Israël, afin qu’ils célébrassent la Pâque. '
  '5':
  - type: text
    content: 'Et ils célébrèrent la Pâque le quatorzième jour du premier mois, entre les deux soirs, dans le désert de Sinaï; les enfants d’Israël se conformèrent à tous les ordres que l’Éternel avait donnés à Moïse. '
  '6':
  - type: text
    content: 'Il y eut des hommes qui, se trouvant impurs à cause d’un mort, ne pouvaient pas célébrer la Pâque ce jour-là. Ils se présentèrent le même jour devant Moïse et Aaron; '
  '7':
  - type: text
    content: 'et ces hommes dirent à Moïse: Nous sommes impurs à cause d’un mort; pourquoi serions-nous privés de présenter au temps fixé l’offrande de l’Éternel au milieu des enfants d’Israël? '
  '8':
  - type: text
    content: 'Moïse leur dit: Attendez que je sache ce que l’Éternel vous ordonne. '
  '9':
  - type: text
    content: 'Et l’Éternel parla à Moïse, et dit: '
