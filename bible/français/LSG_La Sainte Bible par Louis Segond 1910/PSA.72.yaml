document_id: PSA.72
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: (1 R 3:5-14; 4:20-25.) (És 9:5, 6; 11:1, etc. Jé 23:5, 6. Za 9:9, 10. Lu 1:31-33, 68-75. És 65:16-25.)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: De Salomon.
- type: usfm
  marker: q1
  children:
  - type: text
    text: O Dieu, donne tes jugements au roi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ta justice au fils du roi!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Il jugera ton peuple avec justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tes malheureux avec équité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Les montagnes porteront la paix pour le peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les collines aussi, par l’effet de ta justice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Il fera droit aux malheureux du peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il sauvera les enfants du pauvre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il écrasera l’oppresseur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: On te craindra, tant que subsistera le soleil,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 89:37
      metadata:
        usfm: PSA.89.37
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '38'
      metadata:
        usfm: PSA.89.38
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Tant que paraîtra la lune, de génération en génération.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il sera comme une '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 S 23:4
      metadata:
        usfm: 2SA.23.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: pluie qui tombe sur un terrain fauché,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme des ondées qui arrosent la campagne.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: En ses jours le juste fleurira,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la paix sera grande jusqu’à ce qu’il n’y ait plus de lune.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Il dominera d’une mer à l’autre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et du fleuve aux extrémités de la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Devant lui, les habitants du désert fléchiront le genou,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ses ennemis lécheront la poussière.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Les rois de Tarsis et des îles paieront des tributs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les rois de Séba et de Saba offriront des présents.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tous les rois se prosterneront devant lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toutes les nations le serviront.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 29:12
      metadata:
        usfm: JOB.29.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Car il délivrera le pauvre qui crie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le malheureux qui n’a point d’aide.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Il aura pitié du misérable et de l’indigent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il sauvera la vie des pauvres;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Il les affranchira de l’oppression et de la violence,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et leur sang aura du prix à ses yeux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ils vivront, et lui donneront de l’or de Séba;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils prieront pour lui sans cesse, ils le béniront chaque jour.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Les blés abonderont dans le pays, au sommet des montagnes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et leurs épis s’agiteront comme les arbres du Liban;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les hommes fleuriront dans les villes comme l’herbe de la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Son nom subsistera toujours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aussi longtemps que le soleil, son nom se perpétuera;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Par lui on se bénira mutuellement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et toutes les nations le diront heureux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Béni soit l’Éternel Dieu, le Dieu d’Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui seul fait des prodiges!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Béni soit à jamais son nom glorieux!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que toute la terre soit remplie de sa gloire! Amen! Amen!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Fin des prières de David, fils d’Isaï.
