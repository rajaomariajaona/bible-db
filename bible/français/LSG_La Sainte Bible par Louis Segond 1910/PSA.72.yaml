document_id: PSA.72,93
type_code: fra
verses:
  '1':
  - type: heading
    content: (1 R 3:5-14; 4:20-25.) (És 9:5, 6; 11:1, etc. Jé 23:5, 6. Za 9:9, 10. Lu 1:31-33, 68-75. És 65:16-25.)
  - type: text
    content: De Salomon.
  - type: text
    content: O Dieu, donne tes jugements au roi,
  - type: text
    content: Et ta justice au fils du roi!
  '10':
  - type: text
    content: Les rois de Tarsis et des îles paieront des tributs,
  - type: text
    content: Les rois de Séba et de Saba offriront des présents.
  '11':
  - type: text
    content: Tous les rois se prosterneront devant lui,
  - type: text
    content: Toutes les nations le serviront.
  '12':
  - type: text
    content: ' '
  - type: note
    content: Job 29:12.
  - type: text
    content: Car il délivrera le pauvre qui crie,
  - type: text
    content: Et le malheureux qui n’a point d’aide.
  '13':
  - type: text
    content: Il aura pitié du misérable et de l’indigent,
  - type: text
    content: Et il sauvera la vie des pauvres;
  '14':
  - type: text
    content: Il les affranchira de l’oppression et de la violence,
  - type: text
    content: Et leur sang aura du prix à ses yeux.
  '15':
  - type: text
    content: Ils vivront, et lui donneront de l’or de Séba;
  - type: text
    content: Ils prieront pour lui sans cesse, ils le béniront chaque jour.
  '16':
  - type: text
    content: Les blés abonderont dans le pays, au sommet des montagnes,
  - type: text
    content: Et leurs épis s’agiteront comme les arbres du Liban;
  - type: text
    content: Les hommes fleuriront dans les villes comme l’herbe de la terre.
  '17':
  - type: text
    content: Son nom subsistera toujours,
  - type: text
    content: Aussi longtemps que le soleil, son nom se perpétuera;
  - type: text
    content: Par lui on se bénira mutuellement,
  - type: text
    content: Et toutes les nations le diront heureux.
  '18':
  - type: text
    content: Béni soit l’Éternel Dieu, le Dieu d’Israël,
  - type: text
    content: Qui seul fait des prodiges!
  '19':
  - type: text
    content: Béni soit à jamais son nom glorieux!
  - type: text
    content: Que toute la terre soit remplie de sa gloire! Amen! Amen!
  '2':
  - type: text
    content: Il jugera ton peuple avec justice,
  - type: text
    content: Et tes malheureux avec équité.
  '20':
  - type: text
    content: Fin des prières de David, fils d’Isaï.
  '3':
  - type: text
    content: Les montagnes porteront la paix pour le peuple,
  - type: text
    content: Et les collines aussi, par l’effet de ta justice.
  '4':
  - type: text
    content: Il fera droit aux malheureux du peuple,
  - type: text
    content: Il sauvera les enfants du pauvre,
  - type: text
    content: Et il écrasera l’oppresseur.
  '5':
  - type: text
    content: On te craindra, tant que subsistera le soleil,
  - type: note
    content: Ps 89:37, 38.
  - type: text
    content: Tant que paraîtra la lune, de génération en génération.
  '6':
  - type: text
    content: 'Il sera comme une '
  - type: note
    content: 2 S 23:4.
  - type: text
    content: pluie qui tombe sur un terrain fauché,
  - type: text
    content: Comme des ondées qui arrosent la campagne.
  '7':
  - type: text
    content: En ses jours le juste fleurira,
  - type: text
    content: Et la paix sera grande jusqu’à ce qu’il n’y ait plus de lune.
  '8':
  - type: text
    content: Il dominera d’une mer à l’autre,
  - type: text
    content: Et du fleuve aux extrémités de la terre.
  '9':
  - type: text
    content: Devant lui, les habitants du désert fléchiront le genou,
  - type: text
    content: Et ses ennemis lécheront la poussière.
