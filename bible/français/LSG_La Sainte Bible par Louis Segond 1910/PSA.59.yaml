document_id: PSA.59,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 1 S 19:11, etc. (Ps 28; 56; 64; 140.)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Au chef des chantres. “Ne détruis pas.” Hymne de David. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 19:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Lorsque Saül envoya cerner la maison, pour le faire mourir.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quelle que soit leur force, c’est en toi que j’espère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car Dieu est ma haute retraite.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon Dieu vient au-devant de moi dans sa bonté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu me fait contempler avec joie ceux qui me persécutent.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne les tue pas, de peur que mon peuple ne l’oublie;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fais-les errer par ta puissance, et précipite-les,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Seigneur, notre bouclier!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Leur bouche pèche à chaque parole de leurs lèvres:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’ils soient pris dans leur propre orgueil!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ne profèrent que malédictions et mensonges.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Détruis-les, dans ta fureur, détruis-les, et qu’ils ne soient plus!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’ils sachent que Dieu règne sur Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Jusqu’aux extrémités de la terre! '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: — Pause.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils reviennent chaque soir, ils hurlent comme des chiens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils font le tour de la ville.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils errent çà et là, cherchant leur nourriture,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils passent la nuit sans être rassasiés.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et moi, je chanterai ta force;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dès le matin, je célébrerai ta bonté.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car tu es pour moi une haute retraite,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un refuge au jour de ma détresse.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O ma force! C’est toi que je célébrerai,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car Dieu, mon Dieu tout bon, est ma haute retraite.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon Dieu! Délivre-moi de mes ennemis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Protège-moi contre mes adversaires!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Délivre-moi des malfaiteurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et sauve-moi des hommes de sang!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car voici, ils sont aux aguets pour m’ôter la vie;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des hommes violents complotent contre moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sans que je sois coupable, sans que j’aie péché, ô Éternel!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Malgré mon innocence, ils courent, ils se préparent:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Réveille-toi, viens à ma rencontre, et regarde!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toi, Éternel, Dieu des armées, Dieu d’Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lève-toi, pour châtier toutes les nations!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'N’aie pitié d’aucun de ces méchants infidèles! '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: — Pause.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils reviennent chaque soir, ils hurlent comme des chiens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils font le tour de la ville.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, de leur bouche ils font jaillir le mal,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 55:22
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 57:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Des glaives sont sur leurs lèvres;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 10:11
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 94:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Car, qui est-ce qui entend?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et toi, Éternel, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 2:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: tu te ris d’eux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu te moques de toutes les nations.
