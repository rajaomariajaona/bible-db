document_id: PSA.59,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 1 S 19:11, etc. (Ps 28; 56; 64; 140.)
  - type: text
    content: 'Au chef des chantres. “Ne détruis pas.” Hymne de David. '
  - type: note
    content: 1 S 19:11.
  - type: text
    content: Lorsque Saül envoya cerner la maison, pour le faire mourir.
  '10':
  - type: text
    content: Quelle que soit leur force, c’est en toi que j’espère,
  - type: text
    content: Car Dieu est ma haute retraite.
  '11':
  - type: text
    content: Mon Dieu vient au-devant de moi dans sa bonté,
  - type: text
    content: Dieu me fait contempler avec joie ceux qui me persécutent.
  '12':
  - type: text
    content: Ne les tue pas, de peur que mon peuple ne l’oublie;
  - type: text
    content: Fais-les errer par ta puissance, et précipite-les,
  - type: text
    content: Seigneur, notre bouclier!
  '13':
  - type: text
    content: 'Leur bouche pèche à chaque parole de leurs lèvres:'
  - type: text
    content: Qu’ils soient pris dans leur propre orgueil!
  - type: text
    content: Ils ne profèrent que malédictions et mensonges.
  '14':
  - type: text
    content: Détruis-les, dans ta fureur, détruis-les, et qu’ils ne soient plus!
  - type: text
    content: Qu’ils sachent que Dieu règne sur Jacob,
  - type: text
    content: 'Jusqu’aux extrémités de la terre! '
  - type: text
    content: — Pause.
  '15':
  - type: text
    content: Ils reviennent chaque soir, ils hurlent comme des chiens,
  - type: text
    content: Ils font le tour de la ville.
  '16':
  - type: text
    content: Ils errent çà et là, cherchant leur nourriture,
  - type: text
    content: Et ils passent la nuit sans être rassasiés.
  '17':
  - type: text
    content: Et moi, je chanterai ta force;
  - type: text
    content: Dès le matin, je célébrerai ta bonté.
  - type: text
    content: Car tu es pour moi une haute retraite,
  - type: text
    content: Un refuge au jour de ma détresse.
  '18':
  - type: text
    content: O ma force! C’est toi que je célébrerai,
  - type: text
    content: Car Dieu, mon Dieu tout bon, est ma haute retraite.
  '2':
  - type: text
    content: Mon Dieu! Délivre-moi de mes ennemis,
  - type: text
    content: Protège-moi contre mes adversaires!
  '3':
  - type: text
    content: Délivre-moi des malfaiteurs,
  - type: text
    content: Et sauve-moi des hommes de sang!
  '4':
  - type: text
    content: Car voici, ils sont aux aguets pour m’ôter la vie;
  - type: text
    content: Des hommes violents complotent contre moi,
  - type: text
    content: Sans que je sois coupable, sans que j’aie péché, ô Éternel!
  '5':
  - type: text
    content: 'Malgré mon innocence, ils courent, ils se préparent:'
  - type: text
    content: Réveille-toi, viens à ma rencontre, et regarde!
  '6':
  - type: text
    content: Toi, Éternel, Dieu des armées, Dieu d’Israël,
  - type: text
    content: Lève-toi, pour châtier toutes les nations!
  - type: text
    content: 'N’aie pitié d’aucun de ces méchants infidèles! '
  - type: text
    content: — Pause.
  '7':
  - type: text
    content: Ils reviennent chaque soir, ils hurlent comme des chiens,
  - type: text
    content: Ils font le tour de la ville.
  '8':
  - type: text
    content: Voici, de leur bouche ils font jaillir le mal,
  - type: note
    content: Ps 55:22; 57:5.
  - type: text
    content: Des glaives sont sur leurs lèvres;
  - type: note
    content: Ps 10:11; 94:7.
  - type: text
    content: Car, qui est-ce qui entend?
  '9':
  - type: text
    content: 'Et toi, Éternel, '
  - type: note
    content: Ps 2:4.
  - type: text
    content: tu te ris d’eux,
  - type: text
    content: Tu te moques de toutes les nations.
