document_id: PSA.59
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 1 S 19:11, etc. (Ps 28; 56; 64; 140.)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Au chef des chantres. “Ne détruis pas.” Hymne de David. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 19:11
      metadata:
        usfm: 1SA.19.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Lorsque Saül envoya cerner la maison, pour le faire mourir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mon Dieu! Délivre-moi de mes ennemis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Protège-moi contre mes adversaires!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Délivre-moi des malfaiteurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et sauve-moi des hommes de sang!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Car voici, ils sont aux aguets pour m’ôter la vie;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Des hommes violents complotent contre moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sans que je sois coupable, sans que j’aie péché, ô Éternel!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Malgré mon innocence, ils courent, ils se préparent:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Réveille-toi, viens à ma rencontre, et regarde!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Toi, Éternel, Dieu des armées, Dieu d’Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lève-toi, pour châtier toutes les nations!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'N’aie pitié d’aucun de ces méchants infidèles! '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: — Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ils reviennent chaque soir, ils hurlent comme des chiens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils font le tour de la ville.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Voici, de leur bouche ils font jaillir le mal,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 55:22
      metadata:
        usfm: PSA.55.22
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 57:5
      metadata:
        usfm: PSA.57.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Des glaives sont sur leurs lèvres;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 10:11
      metadata:
        usfm: PSA.10.11
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 94:7
      metadata:
        usfm: PSA.94.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Car, qui est-ce qui entend?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Et toi, Éternel, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 2:4
      metadata:
        usfm: PSA.2.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: tu te ris d’eux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu te moques de toutes les nations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Quelle que soit leur force, c’est en toi que j’espère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car Dieu est ma haute retraite.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mon Dieu vient au-devant de moi dans sa bonté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dieu me fait contempler avec joie ceux qui me persécutent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ne les tue pas, de peur que mon peuple ne l’oublie;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fais-les errer par ta puissance, et précipite-les,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Seigneur, notre bouclier!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Leur bouche pèche à chaque parole de leurs lèvres:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’ils soient pris dans leur propre orgueil!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ne profèrent que malédictions et mensonges.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Détruis-les, dans ta fureur, détruis-les, et qu’ils ne soient plus!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’ils sachent que Dieu règne sur Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Jusqu’aux extrémités de la terre! '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: — Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ils reviennent chaque soir, ils hurlent comme des chiens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils font le tour de la ville.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ils errent çà et là, cherchant leur nourriture,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils passent la nuit sans être rassasiés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Et moi, je chanterai ta force;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dès le matin, je célébrerai ta bonté.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car tu es pour moi une haute retraite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Un refuge au jour de ma détresse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: O ma force! C’est toi que je célébrerai,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car Dieu, mon Dieu tout bon, est ma haute retraite.
