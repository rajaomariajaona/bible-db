document_id: EXO.34,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Alliance de l’Éternel. Les nouvelles tables
  - type: heading
    content: 'V. 1-7: cf. De 10:1, 2. (Ex 33:18-23. No 14:17, 18.) De 32:1-3. Jn 17:6, 26.'
  - type: text
    content: ' '
  - type: note
    content: De 10:1.
  - type: text
    content: 'L’Éternel dit à Moïse: Taille deux tables de pierre comme les premières, et j’y écrirai les paroles qui étaient sur les premières tables que tu as brisées. '
  '10':
  - type: text
    content: 'L’Éternel répondit: Voici, '
  - type: note
    content: De 5:2.
  - type: text
    content: 'je traite une alliance. '
  - type: note
    content: Jos 10:12, 13.
  - type: text
    content: 'Je ferai, en présence de tout ton peuple, des prodiges qui n’ont eu lieu dans aucun pays et chez aucune nation; tout le peuple qui t’environne verra l’œuvre de l’Éternel, et c’est par toi que j’accomplirai des choses terribles. '
  '11':
  - type: text
    content: 'Prends garde à ce que je t’ordonne aujourd’hui. Voici, je chasserai devant toi les Amoréens, les Cananéens, les Héthiens, les Phéréziens, les Héviens et les Jébusiens. '
  '12':
  - type: note
    content: Ex 23:32. No 33:51. De 7:2.
  - type: text
    content: 'Garde-toi de faire alliance avec les habitants du pays où tu dois entrer, de peur qu’ils ne soient un piège pour toi. '
  '13':
  - type: text
    content: 'Au contraire, vous renverserez leurs autels, vous briserez leurs statues, et vous abattrez leurs idoles. '
  '14':
  - type: note
    content: Ex 20:5.
  - type: text
    content: 'Tu ne te prosterneras point devant un autre dieu; car l’Éternel porte le nom de jaloux, il est un Dieu jaloux. '
  '15':
  - type: text
    content: 'Garde-toi de faire alliance avec les habitants du pays, de peur que, se prostituant à leurs dieux et leur offrant des sacrifices, ils ne t’invitent, et que tu ne manges de leurs victimes; '
  '16':
  - type: text
    content: 'de peur que tu ne prennes de leurs filles pour tes fils, '
  - type: note
    content: 1 R 11:2.
  - type: text
    content: 'et que leurs filles, se prostituant à leurs dieux, n’entraînent tes fils à se prostituer à leurs dieux. '
  '17':
  - type: text
    content: Tu ne te feras point de dieu en fonte.
  - type: heading
    content: 'V. 18-28: cf. Ex 13:1-16. (Ex 23:12-19. Lé 23. De 16:1-17.)'
  '18':
  - type: text
    content: 'Tu observeras la fête des pains sans levain; pendant sept jours, '
  - type: note
    content: Ex 12:15; 23:15.
  - type: text
    content: 'au temps fixé dans le mois des épis, tu mangeras des pains sans levain, comme je t’en ai donné l’ordre, car c’est dans le mois des épis que tu es sorti d’Égypte. '
  '19':
  - type: note
    content: Ex 13:2; 22:29. Éz 44:30.
  - type: text
    content: 'Tout premier-né m’appartient, même tout mâle premier-né dans les troupeaux de gros et de menu bétail. '
  '2':
  - type: text
    content: 'Sois prêt de bonne heure, et tu monteras dès le matin sur la montagne de Sinaï; tu te tiendras là devant moi, sur le sommet de la montagne. '
  '20':
  - type: note
    content: Ex 13:13.
  - type: text
    content: 'Tu rachèteras avec un agneau le premier-né de l’âne; et si tu ne le rachètes pas, tu lui briseras la nuque. Tu rachèteras tout premier-né de tes fils; '
  - type: note
    content: Ex 23:15. De 16:16.
  - type: text
    content: 'et l’on ne se présentera point à vide devant ma face. '
  '21':
  - type: note
    content: Ex 20:9.
  - type: text
    content: 'Tu travailleras six jours, et tu te reposeras le septième jour; tu te reposeras, même au temps du labourage et de la moisson. '
  '22':
  - type: note
    content: Ex 23:16.
  - type: text
    content: 'Tu célébreras la fête des semaines, des prémices de la moisson du froment, et la fête de la récolte, à la fin de l’année. '
  '23':
  - type: note
    content: Ex 23:17. De 16:16.
  - type: text
    content: 'Trois fois par an, tous les mâles se présenteront devant le Seigneur, l’Éternel, Dieu d’Israël. '
  '24':
  - type: text
    content: 'Car je chasserai les nations devant toi, et j’étendrai tes frontières; et personne ne convoitera ton pays, pendant que tu monteras pour te présenter devant l’Éternel, ton Dieu, trois fois par an. '
  '25':
  - type: note
    content: Ex 23:18.
  - type: text
    content: 'Tu n’offriras point avec du pain levé le sang de la victime immolée en mon honneur; et le sacrifice de la fête de Pâque ne sera point gardé pendant la nuit jusqu’au matin. '
  '26':
  - type: text
    content: 'Tu apporteras à la maison de L’Éternel, ton Dieu, '
  - type: note
    content: Ex 23:19. De 26:2.
  - type: text
    content: 'les prémices des premiers fruits de la terre. '
  - type: note
    content: Ex 23:19. Lé 22:27. De 14:21.
  - type: text
    content: 'Tu ne feras point cuire un chevreau dans le lait de sa mère. '
  '27':
  - type: text
    content: 'L’Éternel dit à Moïse: Écris ces paroles; car c’est conformément à ces paroles que je traite alliance avec toi et avec Israël. '
  '28':
  - type: note
    content: Ex 24:18. De 9:9.
  - type: text
    content: 'Moïse fut là avec l’Éternel quarante jours et quarante nuits. Il ne mangea point de pain, et il ne but point d’eau. '
  - type: note
    content: Ex 31:18; 34:1. De 4:13.
  - type: text
    content: Et l’Éternel écrivit sur les tables les paroles de l’alliance, les dix paroles.
  - type: heading
    content: 'V. 29-35: cf. 2 Co 3:7-18.'
  '29':
  - type: text
    content: 'Moïse descendit de la montagne de Sinaï, ayant les deux tables du témoignage dans sa main, en descendant de la montagne; et il ne savait pas que la peau de son visage '
  - type: note
    content: 2 Co 3:7.
  - type: text
    content: 'rayonnait, parce qu’il avait parlé avec l’Éternel. '
  '3':
  - type: note
    content: Ex 19:12.
  - type: text
    content: 'Que personne ne monte avec toi, et que personne ne paraisse sur toute la montagne; '
  - type: note
    content: Ex 19:13.
  - type: text
    content: 'et même que ni brebis ni bœufs ne paissent près de cette montagne. '
  '30':
  - type: text
    content: 'Aaron et tous les enfants d’Israël regardèrent Moïse, et voici la peau de son visage rayonnait; et ils craignaient de s’approcher de lui. '
  '31':
  - type: text
    content: 'Moïse les appela; Aaron et tous les principaux de l’assemblée vinrent auprès de lui, et il leur parla. '
  '32':
  - type: text
    content: 'Après cela, tous les enfants d’Israël s’approchèrent, et il leur donna tous les ordres qu’il avait reçus de l’Éternel, sur la montagne de Sinaï. '
  '33':
  - type: text
    content: 'Lorsque Moïse eut achevé de leur parler, '
  - type: note
    content: 2 Co 3:7, 13.
  - type: text
    content: 'il mit un voile sur son visage. '
  '34':
  - type: text
    content: 'Quand Moïse entrait devant l’Éternel, pour lui parler, il ôtait le voile, jusqu’à ce qu’il sortît; et quand il sortait, il disait aux enfants d’Israël ce qui lui avait été ordonné. '
  '35':
  - type: text
    content: Les enfants d’Israël regardaient le visage de Moïse, et voyaient que la peau de son visage rayonnait; et Moïse remettait le voile sur son visage jusqu’à ce qu’il entrât, pour parler avec l’Éternel.
  '4':
  - type: text
    content: 'Moïse tailla deux tables de pierre comme les premières; il se leva de bon matin, et monta sur la montagne de Sinaï, selon l’ordre que l’Éternel lui avait donné, et il prit dans sa main les deux tables de pierre. '
  '5':
  - type: text
    content: 'L’Éternel descendit dans une nuée, se tint là auprès de lui, et proclama le nom de l’Éternel. '
  '6':
  - type: note
    content: Ex 33:19.
  - type: text
    content: 'Et l’Éternel passa devant lui, et s’écria: L’Éternel, l’Éternel, Dieu miséricordieux et compatissant, lent à la colère, riche en bonté et en fidélité, '
  '7':
  - type: note
    content: Ex 20:6. No 14:18. De 5:10. Ps 86:15; 103:8; 145:8.
  - type: text
    content: 'qui conserve son amour jusqu’à mille générations, qui pardonne l’iniquité, la rébellion et le péché, mais qui ne tient point le coupable pour innocent, et '
  - type: note
    content: Jé 32:18.
  - type: text
    content: qui punit l’iniquité des pères sur les enfants et sur les enfants des enfants jusqu’à la troisième et à la quatrième génération!
  - type: heading
    content: 'V. 8-17: cf. Ex 33:12-17. (De 4:32-40, 23, 24; 7:1-6, 17-26.)'
  '8':
  - type: text
    content: 'Aussitôt Moïse s’inclina à terre et se prosterna. '
  '9':
  - type: text
    content: 'Il dit: Seigneur, si j’ai trouvé grâce à tes yeux, que le Seigneur marche au milieu de nous, car c’est un peuple au cou roide; pardonne nos iniquités et nos péchés, et prends-nous pour '
  - type: note
    content: Lé 25:38. Ps 28:9; 33:12. Za 2:12.
  - type: text
    content: 'ta possession. '
