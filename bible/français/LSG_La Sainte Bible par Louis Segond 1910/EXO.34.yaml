document_id: EXO.34
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Alliance de l’Éternel. Les nouvelles tables
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-7: cf. De 10:1, 2. (Ex 33:18-23. No 14:17, 18.) De 32:1-3. Jn 17:6, 26.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 10:1
      metadata:
        usfm: DEU.10.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'L’Éternel dit à Moïse: Taille deux tables de pierre comme les premières, et j’y écrirai les paroles qui étaient sur les premières tables que tu as brisées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Sois prêt de bonne heure, et tu monteras dès le matin sur la montagne de Sinaï; tu te tiendras là devant moi, sur le sommet de la montagne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 19:12
      metadata:
        usfm: EXO.19.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Que personne ne monte avec toi, et que personne ne paraisse sur toute la montagne; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 19:13
      metadata:
        usfm: EXO.19.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et même que ni brebis ni bœufs ne paissent près de cette montagne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Moïse tailla deux tables de pierre comme les premières; il se leva de bon matin, et monta sur la montagne de Sinaï, selon l’ordre que l’Éternel lui avait donné, et il prit dans sa main les deux tables de pierre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'L’Éternel descendit dans une nuée, se tint là auprès de lui, et proclama le nom de l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 33:19
      metadata:
        usfm: EXO.33.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Et l’Éternel passa devant lui, et s’écria: L’Éternel, l’Éternel, Dieu miséricordieux et compatissant, lent à la colère, riche en bonté et en fidélité, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 20:6
      metadata:
        usfm: EXO.20.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 14:18
      metadata:
        usfm: NUM.14.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 5:10
      metadata:
        usfm: DEU.5.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 86:15
      metadata:
        usfm: PSA.86.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 103:8
      metadata:
        usfm: PSA.103.8
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 145:8
      metadata:
        usfm: PSA.145.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qui conserve son amour jusqu’à mille générations, qui pardonne l’iniquité, la rébellion et le péché, mais qui ne tient point le coupable pour innocent, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 32:18
      metadata:
        usfm: JER.32.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: qui punit l’iniquité des pères sur les enfants et sur les enfants des enfants jusqu’à la troisième et à la quatrième génération!
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 8-17: cf. Ex 33:12-17. (De 4:32-40, 23, 24; 7:1-6, 17-26.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Aussitôt Moïse s’inclina à terre et se prosterna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il dit: Seigneur, si j’ai trouvé grâce à tes yeux, que le Seigneur marche au milieu de nous, car c’est un peuple au cou roide; pardonne nos iniquités et nos péchés, et prends-nous pour '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 25:38
      metadata:
        usfm: LEV.25.38
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 28:9
      metadata:
        usfm: PSA.28.9
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 33:12
      metadata:
        usfm: PSA.33.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Za 2:12
      metadata:
        usfm: ZEC.2.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ta possession. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'L’Éternel répondit: Voici, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 5:2
      metadata:
        usfm: DEU.5.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'je traite une alliance. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 10:12
      metadata:
        usfm: JOS.10.12
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '13'
      metadata:
        usfm: JOS.10.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Je ferai, en présence de tout ton peuple, des prodiges qui n’ont eu lieu dans aucun pays et chez aucune nation; tout le peuple qui t’environne verra l’œuvre de l’Éternel, et c’est par toi que j’accomplirai des choses terribles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Prends garde à ce que je t’ordonne aujourd’hui. Voici, je chasserai devant toi les Amoréens, les Cananéens, les Héthiens, les Phéréziens, les Héviens et les Jébusiens. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 23:32
      metadata:
        usfm: EXO.23.32
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 33:51
      metadata:
        usfm: NUM.33.51
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 7:2
      metadata:
        usfm: DEU.7.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Garde-toi de faire alliance avec les habitants du pays où tu dois entrer, de peur qu’ils ne soient un piège pour toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Au contraire, vous renverserez leurs autels, vous briserez leurs statues, et vous abattrez leurs idoles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 20:5
      metadata:
        usfm: EXO.20.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu ne te prosterneras point devant un autre dieu; car l’Éternel porte le nom de jaloux, il est un Dieu jaloux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Garde-toi de faire alliance avec les habitants du pays, de peur que, se prostituant à leurs dieux et leur offrant des sacrifices, ils ne t’invitent, et que tu ne manges de leurs victimes; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'de peur que tu ne prennes de leurs filles pour tes fils, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 11:2
      metadata:
        usfm: 1KI.11.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et que leurs filles, se prostituant à leurs dieux, n’entraînent tes fils à se prostituer à leurs dieux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Tu ne te feras point de dieu en fonte.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 18-28: cf. Ex 13:1-16. (Ex 23:12-19. Lé 23. De 16:1-17.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tu observeras la fête des pains sans levain; pendant sept jours, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 12:15
      metadata:
        usfm: EXO.12.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 23:15
      metadata:
        usfm: EXO.23.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'au temps fixé dans le mois des épis, tu mangeras des pains sans levain, comme je t’en ai donné l’ordre, car c’est dans le mois des épis que tu es sorti d’Égypte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 13:2
      metadata:
        usfm: EXO.13.2
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 22:29
      metadata:
        usfm: EXO.22.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 44:30
      metadata:
        usfm: EZK.44.30
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tout premier-né m’appartient, même tout mâle premier-né dans les troupeaux de gros et de menu bétail. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 13:13
      metadata:
        usfm: EXO.13.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu rachèteras avec un agneau le premier-né de l’âne; et si tu ne le rachètes pas, tu lui briseras la nuque. Tu rachèteras tout premier-né de tes fils; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 23:15
      metadata:
        usfm: EXO.23.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 16:16
      metadata:
        usfm: DEU.16.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et l’on ne se présentera point à vide devant ma face. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 20:9
      metadata:
        usfm: EXO.20.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu travailleras six jours, et tu te reposeras le septième jour; tu te reposeras, même au temps du labourage et de la moisson. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 23:16
      metadata:
        usfm: EXO.23.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu célébreras la fête des semaines, des prémices de la moisson du froment, et la fête de la récolte, à la fin de l’année. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 23:17
      metadata:
        usfm: EXO.23.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 16:16
      metadata:
        usfm: DEU.16.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Trois fois par an, tous les mâles se présenteront devant le Seigneur, l’Éternel, Dieu d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Car je chasserai les nations devant toi, et j’étendrai tes frontières; et personne ne convoitera ton pays, pendant que tu monteras pour te présenter devant l’Éternel, ton Dieu, trois fois par an. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 23:18
      metadata:
        usfm: EXO.23.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu n’offriras point avec du pain levé le sang de la victime immolée en mon honneur; et le sacrifice de la fête de Pâque ne sera point gardé pendant la nuit jusqu’au matin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Tu apporteras à la maison de L’Éternel, ton Dieu, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 23:19
      metadata:
        usfm: EXO.23.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 26:2
      metadata:
        usfm: DEU.26.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'les prémices des premiers fruits de la terre. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 23:19
      metadata:
        usfm: EXO.23.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 22:27
      metadata:
        usfm: LEV.22.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 14:21
      metadata:
        usfm: DEU.14.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu ne feras point cuire un chevreau dans le lait de sa mère. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'L’Éternel dit à Moïse: Écris ces paroles; car c’est conformément à ces paroles que je traite alliance avec toi et avec Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 24:18
      metadata:
        usfm: EXO.24.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 9:9
      metadata:
        usfm: DEU.9.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Moïse fut là avec l’Éternel quarante jours et quarante nuits. Il ne mangea point de pain, et il ne but point d’eau. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 31:18
      metadata:
        usfm: EXO.31.18
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 34:1
      metadata:
        usfm: EXO.34.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 4:13
      metadata:
        usfm: DEU.4.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et l’Éternel écrivit sur les tables les paroles de l’alliance, les dix paroles.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 29-35: cf. 2 Co 3:7-18.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Moïse descendit de la montagne de Sinaï, ayant les deux tables du témoignage dans sa main, en descendant de la montagne; et il ne savait pas que la peau de son visage '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 3:7
      metadata:
        usfm: 2CO.3.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'rayonnait, parce qu’il avait parlé avec l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Aaron et tous les enfants d’Israël regardèrent Moïse, et voici la peau de son visage rayonnait; et ils craignaient de s’approcher de lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Moïse les appela; Aaron et tous les principaux de l’assemblée vinrent auprès de lui, et il leur parla. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Après cela, tous les enfants d’Israël s’approchèrent, et il leur donna tous les ordres qu’il avait reçus de l’Éternel, sur la montagne de Sinaï. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Lorsque Moïse eut achevé de leur parler, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 3:7
      metadata:
        usfm: 2CO.3.7
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '13'
      metadata:
        usfm: 2CO.3.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'il mit un voile sur son visage. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Quand Moïse entrait devant l’Éternel, pour lui parler, il ôtait le voile, jusqu’à ce qu’il sortît; et quand il sortait, il disait aux enfants d’Israël ce qui lui avait été ordonné. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Les enfants d’Israël regardaient le visage de Moïse, et voyaient que la peau de son visage rayonnait; et Moïse remettait le voile sur son visage jusqu’à ce qu’il entrât, pour parler avec l’Éternel.
