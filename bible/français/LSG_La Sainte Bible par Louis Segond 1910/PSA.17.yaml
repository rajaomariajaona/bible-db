document_id: PSA.17,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ps 7; 26; 35. (1 S 23:25, 26.)
  - type: text
    content: Prière de David.
  - type: text
    content: Éternel! Écoute la droiture, sois attentif à mes cris,
  - type: text
    content: Prête l’oreille à ma prière faite avec des lèvres sans tromperie!
  '10':
  - type: text
    content: Ils ferment leurs entrailles,
  - type: text
    content: Ils ont à la bouche des paroles hautaines.
  '11':
  - type: text
    content: Ils sont sur nos pas, déjà ils nous entourent,
  - type: text
    content: Ils nous épient pour nous terrasser.
  '12':
  - type: text
    content: On dirait un lion avide de déchirer,
  - type: text
    content: Un lionceau aux aguets dans son repaire.
  '13':
  - type: text
    content: Lève-toi, Éternel, marche à sa rencontre, renverse-le!
  - type: text
    content: Délivre-moi du méchant par ton glaive!
  '14':
  - type: text
    content: Délivre-moi des hommes par ta main, Éternel, des hommes de ce monde!
  - type: text
    content: Leur part est dans la vie,
  - type: text
    content: Et tu remplis leur ventre de tes biens;
  - type: text
    content: Leurs enfants sont rassasiés,
  - type: text
    content: Et ils laissent leur superflu à leurs petits-enfants.
  '15':
  - type: text
    content: Pour moi, dans mon innocence, je verrai ta face;
  - type: text
    content: Dès le réveil, je me rassasierai de ton image.
  '2':
  - type: text
    content: Que ma justice paraisse devant ta face,
  - type: text
    content: Que tes yeux contemplent mon intégrité!
  '3':
  - type: text
    content: Si tu sondes mon cœur, si tu le visites la nuit,
  - type: text
    content: 'Si tu m’éprouves, tu ne trouveras rien:'
  - type: text
    content: Ma pensée n’est pas autre que ce qui sort de ma bouche.
  '4':
  - type: text
    content: A la vue des actions des hommes, fidèle à la parole de tes lèvres,
  - type: text
    content: Je me tiens en garde contre la voie des violents;
  '5':
  - type: text
    content: Mes pas sont fermes dans tes sentiers,
  - type: text
    content: Mes pieds ne chancellent point.
  '6':
  - type: text
    content: Je t’invoque, car tu m’exauces, ô Dieu!
  - type: text
    content: Incline vers moi ton oreille, écoute ma parole!
  '7':
  - type: text
    content: Signale ta bonté, toi qui sauves ceux qui cherchent un refuge,
  - type: text
    content: Et qui par ta droite les délivres de leurs adversaires!
  '8':
  - type: text
    content: Garde-moi comme la prunelle de l’œil;
  - type: text
    content: Protège-moi, à l’ombre de tes ailes,
  '9':
  - type: text
    content: Contre les méchants qui me persécutent,
  - type: text
    content: Contre mes ennemis acharnés qui m’enveloppent.
