document_id: PSA.17
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: Ps 7; 26; 35. (1 S 23:25, 26.)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Prière de David.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Éternel! Écoute la droiture, sois attentif à mes cris,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Prête l’oreille à ma prière faite avec des lèvres sans tromperie!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Que ma justice paraisse devant ta face,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que tes yeux contemplent mon intégrité!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Si tu sondes mon cœur, si tu le visites la nuit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Si tu m’éprouves, tu ne trouveras rien:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ma pensée n’est pas autre que ce qui sort de ma bouche.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: A la vue des actions des hommes, fidèle à la parole de tes lèvres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je me tiens en garde contre la voie des violents;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mes pas sont fermes dans tes sentiers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mes pieds ne chancellent point.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Je t’invoque, car tu m’exauces, ô Dieu!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Incline vers moi ton oreille, écoute ma parole!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Signale ta bonté, toi qui sauves ceux qui cherchent un refuge,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui par ta droite les délivres de leurs adversaires!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Garde-moi comme la prunelle de l’œil;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Protège-moi, à l’ombre de tes ailes,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Contre les méchants qui me persécutent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Contre mes ennemis acharnés qui m’enveloppent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ils ferment leurs entrailles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ont à la bouche des paroles hautaines.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ils sont sur nos pas, déjà ils nous entourent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils nous épient pour nous terrasser.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: On dirait un lion avide de déchirer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Un lionceau aux aguets dans son repaire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Lève-toi, Éternel, marche à sa rencontre, renverse-le!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Délivre-moi du méchant par ton glaive!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Délivre-moi des hommes par ta main, Éternel, des hommes de ce monde!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leur part est dans la vie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tu remplis leur ventre de tes biens;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leurs enfants sont rassasiés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils laissent leur superflu à leurs petits-enfants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Pour moi, dans mon innocence, je verrai ta face;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dès le réveil, je me rassasierai de ton image.
