document_id: PSA.17,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: Ps 7; 26; 35. (1 S 23:25, 26.)
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prière de David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Éternel! Écoute la droiture, sois attentif à mes cris,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prête l’oreille à ma prière faite avec des lèvres sans tromperie!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ferment leurs entrailles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ont à la bouche des paroles hautaines.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils sont sur nos pas, déjà ils nous entourent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils nous épient pour nous terrasser.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On dirait un lion avide de déchirer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un lionceau aux aguets dans son repaire.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lève-toi, Éternel, marche à sa rencontre, renverse-le!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Délivre-moi du méchant par ton glaive!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Délivre-moi des hommes par ta main, Éternel, des hommes de ce monde!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leur part est dans la vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tu remplis leur ventre de tes biens;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leurs enfants sont rassasiés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils laissent leur superflu à leurs petits-enfants.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour moi, dans mon innocence, je verrai ta face;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dès le réveil, je me rassasierai de ton image.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que ma justice paraisse devant ta face,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que tes yeux contemplent mon intégrité!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si tu sondes mon cœur, si tu le visites la nuit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Si tu m’éprouves, tu ne trouveras rien:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ma pensée n’est pas autre que ce qui sort de ma bouche.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A la vue des actions des hommes, fidèle à la parole de tes lèvres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je me tiens en garde contre la voie des violents;
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes pas sont fermes dans tes sentiers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes pieds ne chancellent point.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je t’invoque, car tu m’exauces, ô Dieu!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Incline vers moi ton oreille, écoute ma parole!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Signale ta bonté, toi qui sauves ceux qui cherchent un refuge,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qui par ta droite les délivres de leurs adversaires!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Garde-moi comme la prunelle de l’œil;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Protège-moi, à l’ombre de tes ailes,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Contre les méchants qui me persécutent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Contre mes ennemis acharnés qui m’enveloppent.
