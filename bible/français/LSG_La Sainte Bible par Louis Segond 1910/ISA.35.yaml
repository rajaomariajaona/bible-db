document_id: ISA.35,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Temps messianique
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-10: cf. (És 41:17-20; 40:1-10.) (Mt 11:2-5. Lu 4:16-22.) (És 51:9-11. Jé 31:7-14.)'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Le désert et le pays aride se réjouiront;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La solitude s’égaiera, et fleurira comme un narcisse;
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Les rachetés de l’Éternel retourneront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils iront à Sion avec chants de triomphe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et une joie éternelle couronnera leur tête;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 21:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: L’allégresse et la joie s’approcheront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La douleur et les gémissements s’enfuiront.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Elle se couvrira de fleurs, et tressaillira de joie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avec chants d’allégresse et cris de triomphe;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La gloire du Liban lui sera donnée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La magnificence du Carmel et de Saron.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils verront la gloire de l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La magnificence de notre Dieu.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 12:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Fortifiez les mains languissantes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et affermissez les genoux qui chancellent;
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Dites à ceux qui ont le cœur troublé:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prenez courage, ne craignez point;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici votre Dieu, la vengeance viendra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La rétribution de Dieu;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il viendra lui-même, et vous sauvera.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Alors s’ouvriront '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 9:27
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 11:5
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 12:22
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 20:30
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 21:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 9:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: les yeux des aveugles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'S’ouvriront '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 11:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 7:32
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: les oreilles des sourds;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Alors '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 11:5
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:30
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 21:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 5:8
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '9'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 3:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:7
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: le boiteux sautera comme un cerf,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 9:32
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 12:22
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:30
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: la langue du muet éclatera de joie.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 7:38
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '39'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: des eaux jailliront dans le désert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et des ruisseaux dans la solitude;
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Le mirage se changera en étang
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la terre desséchée en sources d’eaux;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans le repaire qui servait de gîte aux chacals,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Croîtront des roseaux et des joncs.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Il y aura là un chemin frayé, une route,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’on appellera la voie sainte;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nul impur n’y passera; elle sera pour eux seuls;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux qui la suivront, même les insensés, ne pourront s’égarer.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Sur cette route, point de lion;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nulle bête féroce ne la prendra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nulle ne s’y rencontrera;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les délivrés y marcheront.
