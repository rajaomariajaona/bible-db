document_id: ISA.35,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Temps messianique
  - type: heading
    content: 'V. 1-10: cf. (És 41:17-20; 40:1-10.) (Mt 11:2-5. Lu 4:16-22.) (És 51:9-11. Jé 31:7-14.)'
  - type: text
    content: Le désert et le pays aride se réjouiront;
  - type: text
    content: La solitude s’égaiera, et fleurira comme un narcisse;
  '10':
  - type: text
    content: Les rachetés de l’Éternel retourneront,
  - type: text
    content: Ils iront à Sion avec chants de triomphe,
  - type: text
    content: Et une joie éternelle couronnera leur tête;
  - type: note
    content: Ap 21:4.
  - type: text
    content: L’allégresse et la joie s’approcheront,
  - type: text
    content: La douleur et les gémissements s’enfuiront.
  '2':
  - type: text
    content: Elle se couvrira de fleurs, et tressaillira de joie,
  - type: text
    content: Avec chants d’allégresse et cris de triomphe;
  - type: text
    content: La gloire du Liban lui sera donnée,
  - type: text
    content: La magnificence du Carmel et de Saron.
  - type: text
    content: Ils verront la gloire de l’Éternel,
  - type: text
    content: La magnificence de notre Dieu.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Hé 12:12.
  - type: text
    content: Fortifiez les mains languissantes,
  - type: text
    content: Et affermissez les genoux qui chancellent;
  '4':
  - type: text
    content: 'Dites à ceux qui ont le cœur troublé:'
  - type: text
    content: Prenez courage, ne craignez point;
  - type: text
    content: Voici votre Dieu, la vengeance viendra,
  - type: text
    content: La rétribution de Dieu;
  - type: text
    content: Il viendra lui-même, et vous sauvera.
  '5':
  - type: text
    content: 'Alors s’ouvriront '
  - type: note
    content: Mt 9:27; 11:5; 12:22; 20:30; 21:14. Jn 9:6.
  - type: text
    content: les yeux des aveugles,
  - type: text
    content: 'S’ouvriront '
  - type: note
    content: Mt 11:5. Mc 7:32.
  - type: text
    content: les oreilles des sourds;
  '6':
  - type: text
    content: 'Alors '
  - type: note
    content: Mt 11:5; 15:30; 21:14. Jn 5:8, 9. Ac 3:2; 8:7; 14:8.
  - type: text
    content: le boiteux sautera comme un cerf,
  - type: text
    content: 'Et '
  - type: note
    content: Mt 9:32; 12:22; 15:30.
  - type: text
    content: la langue du muet éclatera de joie.
  - type: text
    content: 'Car '
  - type: note
    content: Jn 7:38, 39.
  - type: text
    content: des eaux jailliront dans le désert,
  - type: text
    content: Et des ruisseaux dans la solitude;
  '7':
  - type: text
    content: Le mirage se changera en étang
  - type: text
    content: Et la terre desséchée en sources d’eaux;
  - type: text
    content: Dans le repaire qui servait de gîte aux chacals,
  - type: text
    content: Croîtront des roseaux et des joncs.
  '8':
  - type: text
    content: Il y aura là un chemin frayé, une route,
  - type: text
    content: Qu’on appellera la voie sainte;
  - type: text
    content: Nul impur n’y passera; elle sera pour eux seuls;
  - type: text
    content: Ceux qui la suivront, même les insensés, ne pourront s’égarer.
  '9':
  - type: text
    content: Sur cette route, point de lion;
  - type: text
    content: Nulle bête féroce ne la prendra,
  - type: text
    content: Nulle ne s’y rencontrera;
  - type: text
    content: Les délivrés y marcheront.
