document_id: ISA.24
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le pays de Juda ravagé, Babylone détruite, et Jérusalem restaurée
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-13: cf. Lé 26:14-33. 2 R 21:12-15.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Voici, l’Éternel dévaste le pays et le rend désert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il en bouleverse la face et en disperse les habitants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Et il en est du sacrificateur comme du peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Du maître comme du serviteur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De la maîtresse comme de la servante,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 7:12
      metadata:
        usfm: EZK.7.12
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '13'
      metadata:
        usfm: EZK.7.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Du vendeur comme de l’acheteur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Du prêteur comme de l’emprunteur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Du créancier comme du débiteur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Le pays est dévasté, livré au pillage;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car l’Éternel l’a décrété.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Le pays est triste, épuisé;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les habitants sont abattus, languissants;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les chefs du peuple sont sans force.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Le pays était profané par ses habitants;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car ils transgressaient les lois, violaient les ordonnances,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils rompaient l’alliance éternelle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: C’est pourquoi la malédiction dévore le pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ses habitants portent la peine de leurs crimes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'C’est pourquoi les habitants du pays sont '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 9:18
      metadata:
        usfm: ISA.9.18
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 10:16
      metadata:
        usfm: ISA.10.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: consumés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il n’en reste qu’un petit nombre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Le moût est triste, la vigne est flétrie;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous ceux qui avaient le cœur joyeux soupirent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 7:34
      metadata:
        usfm: JER.7.34
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 16:9
      metadata:
        usfm: JER.16.9
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 25:10
      metadata:
        usfm: JER.25.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 26:13
      metadata:
        usfm: EZK.26.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Os 2:10
      metadata:
        usfm: HOS.2.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: La joie des tambourins a cessé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La gaîté bruyante a pris fin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La joie de la harpe a cessé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'On ne boit plus de vin '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 16:10
      metadata:
        usfm: ISA.16.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: en chantant;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les liqueurs fortes sont amères au buveur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: La ville déserte est en ruines;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toutes les maisons sont fermées, on n’y entre plus.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: On crie dans les rues, parce que le vin manque;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toute réjouissance a disparu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’allégresse est bannie du pays.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: La dévastation est restée dans la ville,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les portes abattues sont en ruines.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Car il en est dans le pays, au milieu des peuples,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 17:6
      metadata:
        usfm: ISA.17.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Comme quand on secoue l’olivier,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme quand on grappille après la vendange.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 14-20: cf. Jé 51:10, 29, 54-57.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ils élèvent leur voix, ils poussent des cris d’allégresse;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Des bords de la mer, ils célèbrent la majesté de l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Glorifiez donc l’Éternel dans les lieux où brille la lumière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le nom de l’Éternel, Dieu d’Israël, dans les îles de la mer!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'De l’extrémité de la terre nous entendons chanter: Gloire au juste!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Mais moi je dis: Je suis perdu! Je suis perdu! Malheur à moi!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les pillards pillent, et les pillards s’acharnent au pillage.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 48:43
      metadata:
        usfm: JER.48.43
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: La terreur, la fosse, et le filet,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sont sur toi, habitant du pays!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Celui qui fuit devant les cris de terreur '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 48:44
      metadata:
        usfm: JER.48.44
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Am 5:19
      metadata:
        usfm: AMO.5.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: tombe dans la fosse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et celui qui remonte de la fosse se prend au filet;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car les écluses d’en haut s’ouvrent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les fondements de la terre sont ébranlés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: La terre est déchirée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La terre se brise,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La terre chancelle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'La terre chancelle '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 19:14
      metadata:
        usfm: ISA.19.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: comme un homme ivre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Elle vacille '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 27:18
      metadata:
        usfm: JOB.27.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 1:8
      metadata:
        usfm: ISA.1.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: comme une cabane;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Son péché pèse sur elle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle tombe, et ne se relève plus.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 21-23: cf. Éz 38 et 39. Ap 11:15, etc.; 12:7-12.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: En ce temps-là, l’Éternel châtiera dans le ciel l’armée d’en haut,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et sur la terre les rois de la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ils seront assemblés captifs dans une prison,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils seront enfermés dans des cachots,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et, après un grand nombre de jours, ils seront châtiés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 13:10
      metadata:
        usfm: ISA.13.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 32:7
      metadata:
        usfm: EZK.32.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Joë 2:31
      metadata:
        usfm: JOL.2.31
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 3:15
      metadata:
        usfm: JOL.3.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: La lune sera couverte de honte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le soleil de confusion;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car l’Éternel des armées régnera
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sur la montagne de Sion et à Jérusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Resplendissant de gloire en présence de ses anciens.
