document_id: ISA.24,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Le pays de Juda ravagé, Babylone détruite, et Jérusalem restaurée
  - type: heading
    content: 'V. 1-13: cf. Lé 26:14-33. 2 R 21:12-15.'
  - type: text
    content: Voici, l’Éternel dévaste le pays et le rend désert,
  - type: text
    content: Il en bouleverse la face et en disperse les habitants.
  '10':
  - type: text
    content: La ville déserte est en ruines;
  - type: text
    content: Toutes les maisons sont fermées, on n’y entre plus.
  '11':
  - type: text
    content: On crie dans les rues, parce que le vin manque;
  - type: text
    content: Toute réjouissance a disparu,
  - type: text
    content: L’allégresse est bannie du pays.
  '12':
  - type: text
    content: La dévastation est restée dans la ville,
  - type: text
    content: Et les portes abattues sont en ruines.
  '13':
  - type: text
    content: Car il en est dans le pays, au milieu des peuples,
  - type: note
    content: És 17:6.
  - type: text
    content: Comme quand on secoue l’olivier,
  - type: text
    content: Comme quand on grappille après la vendange.
  - type: heading
    content: 'V. 14-20: cf. Jé 51:10, 29, 54-57.'
  '14':
  - type: text
    content: Ils élèvent leur voix, ils poussent des cris d’allégresse;
  - type: text
    content: Des bords de la mer, ils célèbrent la majesté de l’Éternel.
  '15':
  - type: text
    content: Glorifiez donc l’Éternel dans les lieux où brille la lumière,
  - type: text
    content: Le nom de l’Éternel, Dieu d’Israël, dans les îles de la mer!
  '16':
  - type: text
    content: 'De l’extrémité de la terre nous entendons chanter: Gloire au juste!'
  - type: text
    content: 'Mais moi je dis: Je suis perdu! Je suis perdu! Malheur à moi!'
  - type: text
    content: Les pillards pillent, et les pillards s’acharnent au pillage.
  '17':
  - type: text
    content: ' '
  - type: note
    content: Jé 48:43.
  - type: text
    content: La terreur, la fosse, et le filet,
  - type: text
    content: Sont sur toi, habitant du pays!
  '18':
  - type: text
    content: 'Celui qui fuit devant les cris de terreur '
  - type: note
    content: Jé 48:44. Am 5:19.
  - type: text
    content: tombe dans la fosse,
  - type: text
    content: Et celui qui remonte de la fosse se prend au filet;
  - type: text
    content: Car les écluses d’en haut s’ouvrent,
  - type: text
    content: Et les fondements de la terre sont ébranlés.
  '19':
  - type: text
    content: La terre est déchirée,
  - type: text
    content: La terre se brise,
  - type: text
    content: La terre chancelle.
  '2':
  - type: text
    content: Et il en est du sacrificateur comme du peuple,
  - type: text
    content: Du maître comme du serviteur,
  - type: text
    content: De la maîtresse comme de la servante,
  - type: note
    content: Éz 7:12, 13.
  - type: text
    content: Du vendeur comme de l’acheteur,
  - type: text
    content: Du prêteur comme de l’emprunteur,
  - type: text
    content: Du créancier comme du débiteur.
  '20':
  - type: text
    content: 'La terre chancelle '
  - type: note
    content: És 19:14.
  - type: text
    content: comme un homme ivre,
  - type: text
    content: 'Elle vacille '
  - type: note
    content: Job 27:18. És 1:8.
  - type: text
    content: comme une cabane;
  - type: text
    content: Son péché pèse sur elle,
  - type: text
    content: Elle tombe, et ne se relève plus.
  - type: heading
    content: 'V. 21-23: cf. Éz 38 et 39. Ap 11:15, etc.; 12:7-12.'
  '21':
  - type: text
    content: En ce temps-là, l’Éternel châtiera dans le ciel l’armée d’en haut,
  - type: text
    content: Et sur la terre les rois de la terre.
  '22':
  - type: text
    content: Ils seront assemblés captifs dans une prison,
  - type: text
    content: Ils seront enfermés dans des cachots,
  - type: text
    content: Et, après un grand nombre de jours, ils seront châtiés.
  '23':
  - type: text
    content: ' '
  - type: note
    content: És 13:10. Éz 32:7. Joë 2:31; 3:15.
  - type: text
    content: La lune sera couverte de honte,
  - type: text
    content: Et le soleil de confusion;
  - type: text
    content: Car l’Éternel des armées régnera
  - type: text
    content: Sur la montagne de Sion et à Jérusalem,
  - type: text
    content: Resplendissant de gloire en présence de ses anciens.
  '3':
  - type: text
    content: Le pays est dévasté, livré au pillage;
  - type: text
    content: Car l’Éternel l’a décrété.
  '4':
  - type: text
    content: Le pays est triste, épuisé;
  - type: text
    content: Les habitants sont abattus, languissants;
  - type: text
    content: Les chefs du peuple sont sans force.
  '5':
  - type: text
    content: Le pays était profané par ses habitants;
  - type: text
    content: Car ils transgressaient les lois, violaient les ordonnances,
  - type: text
    content: Ils rompaient l’alliance éternelle.
  '6':
  - type: text
    content: C’est pourquoi la malédiction dévore le pays,
  - type: text
    content: Et ses habitants portent la peine de leurs crimes;
  - type: text
    content: 'C’est pourquoi les habitants du pays sont '
  - type: note
    content: És 9:18; 10:16.
  - type: text
    content: consumés,
  - type: text
    content: Et il n’en reste qu’un petit nombre.
  '7':
  - type: text
    content: Le moût est triste, la vigne est flétrie;
  - type: text
    content: Tous ceux qui avaient le cœur joyeux soupirent.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Jé 7:34; 16:9; 25:10. Éz 26:13. Os 2:10.
  - type: text
    content: La joie des tambourins a cessé,
  - type: text
    content: La gaîté bruyante a pris fin,
  - type: text
    content: La joie de la harpe a cessé.
  '9':
  - type: text
    content: 'On ne boit plus de vin '
  - type: note
    content: És 16:10.
  - type: text
    content: en chantant;
  - type: text
    content: Les liqueurs fortes sont amères au buveur.
