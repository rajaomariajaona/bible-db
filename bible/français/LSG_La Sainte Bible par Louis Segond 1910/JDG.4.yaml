document_id: JDG.4
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Débora la prophétesse, juge en Israël. Cantique de Débora
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-16: cf. 1 S 12:9-11. Jg 5:1-23.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Les enfants d’Israël firent encore ce qui déplaît à l’Éternel, après qu’Éhud fut mort. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Et l’Éternel les vendit entre les mains de Jabin, roi de Canaan, qui régnait à Hatsor. Le chef de son armée était '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 12:9
      metadata:
        usfm: 1SA.12.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Sisera, et habitait à Haroscheth-Goïm. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Les enfants d’Israël crièrent à l’Éternel, car Jabin avait neuf cents chars de fer, et il opprimait avec violence les enfants d’Israël depuis vingt ans. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dans ce temps-là, Débora, prophétesse, femme de Lappidoth, était juge en Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Elle siégeait sous le palmier de Débora, entre Rama et Béthel, dans la montagne d’Éphraïm; et les enfants d’Israël montaient vers elle pour être jugés. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Elle envoya appeler '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 11:32
      metadata:
        usfm: HEB.11.32
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Barak, fils d’Abinoam, de Kédesch-Nephthali, et elle lui dit: N’est-ce pas l’ordre qu’a donné l’Éternel, le Dieu d’Israël? Va, dirige-toi sur le mont Thabor, et prends avec toi dix mille hommes des enfants de Nephthali et des enfants de Zabulon; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'j’attirerai vers toi, au torrent de '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 83:10
      metadata:
        usfm: PSA.83.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Kison, Sisera, chef de l’armée de Jabin, avec ses chars et ses troupes, et je le livrerai entre tes mains. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Barak lui dit: Si tu viens avec moi, j’irai; mais si tu ne viens pas avec moi, je n’irai pas. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Elle répondit: J’irai bien avec toi; mais tu n’auras point de gloire sur la voie où tu marches, car l’Éternel livrera Sisera entre les mains d’une femme. Et Débora se leva, et elle se rendit avec Barak à Kédesch. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Barak convoqua Zabulon et Nephthali à Kédesch; dix mille hommes marchèrent à sa suite, et Débora partit avec lui. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Héber, le Kénien, s’était séparé des Kéniens, des fils '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 10:29
      metadata:
        usfm: NUM.10.29
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'de Hobab, beau-père de Moïse, et il avait dressé sa tente jusqu’au chêne de Tsaannaïm, près de Kédesch. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'On informa Sisera que Barak, fils d’Abinoam, s’était dirigé sur le mont Thabor. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Et, depuis Haroscheth-Goïm, Sisera rassembla vers le torrent de Kison tous ses chars, neuf cents chars de fer, et tout le peuple qui était avec lui. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Alors Débora dit à Barak: Lève-toi, car voici le jour où l’Éternel livre Sisera entre tes mains. L’Éternel ne marche-t-il pas devant toi? Et Barak descendit du mont Thabor, ayant dix mille hommes à sa suite. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 83:10
      metadata:
        usfm: PSA.83.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'L’Éternel mit en déroute devant Barak, par le tranchant de l’épée, Sisera, tous ses chars et tout le camp. Sisera descendit de son char, et s’enfuit à pied. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Barak poursuivit les chars et l’armée jusqu’à Haroscheth-Goïm; et toute l’armée de Sisera tomba sous le tranchant de l’épée, sans qu’il en restât un seul homme.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 17-24: cf. Jg 5:24-31; 3:16-22.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Sisera se réfugia à pied dans la tente de Jaël, femme de Héber, le Kénien; car il y avait paix entre Jabin, roi de Hatsor, et la maison de Héber, le Kénien. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Jaël sortit au-devant de Sisera, et lui dit: Entre, mon seigneur, entre chez moi, ne crains point. Il entra chez elle dans la tente, et elle le cacha sous une couverture. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jg 5:25
      metadata:
        usfm: JDG.5.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il lui dit: Donne-moi, je te prie, un peu d’eau à boire, car j’ai soif. Elle ouvrit l’outre du lait, lui donna à boire, et le couvrit. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Il lui dit encore: Tiens-toi à l’entrée de la tente, et si l’on vient t’interroger en disant: Y a-t-il ici quelqu’un? Tu répondras: Non. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Jaël, femme de Héber, saisit un pieu de la tente, prit en main le marteau, s’approcha de lui doucement, et lui enfonça dans la tempe le pieu, qui pénétra en terre. Il était profondément endormi et accablé de fatigue; et il mourut. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Comme Barak poursuivait Sisera, Jaël sortit à sa rencontre et lui dit: Viens, et je te montrerai l’homme que tu cherches. Il entra chez elle, et voici, Sisera était étendu mort, le pieu dans la tempe. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'En ce jour, Dieu humilia Jabin, roi de Canaan, devant les enfants d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Et la main des enfants d’Israël s’appesantit de plus en plus sur Jabin, roi de Canaan, jusqu’à ce qu’ils eussent exterminé Jabin, roi de Canaan.
