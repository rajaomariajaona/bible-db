document_id: PSA.36,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ps 14; 10; 125; 37.
  - type: text
    content: Au chef des chantres. Du serviteur de l’Éternel, de David.
  '10':
  - type: text
    content: Car auprès de toi est la source de la vie;
  - type: text
    content: Par ta lumière nous voyons la lumière.
  '11':
  - type: text
    content: Étends ta bonté sur ceux qui te connaissent,
  - type: text
    content: Et ta justice sur ceux dont le cœur est droit!
  '12':
  - type: text
    content: Que le pied de l’orgueil ne m’atteigne pas,
  - type: text
    content: Et que la main des méchants ne me fasse pas fuir!
  '13':
  - type: text
    content: Déjà tombent ceux qui commettent l’iniquité;
  - type: text
    content: Ils sont renversés, et ils ne peuvent se relever.
  '2':
  - type: text
    content: La parole impie du méchant est au fond de son cœur;
  - type: text
    content: La crainte de Dieu n’est pas devant ses yeux.
  '3':
  - type: text
    content: Car il se flatte à ses propres yeux,
  - type: text
    content: Pour consommer son iniquité,
  - type: text
    content: Pour assouvir sa haine.
  '4':
  - type: text
    content: Les paroles de sa bouche sont fausses et trompeuses;
  - type: text
    content: Il renonce à agir avec sagesse, à faire le bien.
  '5':
  - type: text
    content: Il médite l’injustice sur sa couche,
  - type: text
    content: Il se tient sur une voie qui n’est pas bonne,
  - type: text
    content: Il ne repousse pas le mal.
  '6':
  - type: text
    content: Éternel! Ta bonté atteint jusqu’aux cieux,
  - type: note
    content: Ps 57:11; 108:5.
  - type: text
    content: Ta fidélité jusqu’aux nues.
  '7':
  - type: text
    content: Ta justice est comme les montagnes de Dieu,
  - type: text
    content: Tes jugements sont comme le grand abîme.
  - type: text
    content: Éternel! Tu soutiens les hommes et les bêtes.
  '8':
  - type: text
    content: Combien est précieuse ta bonté, ô Dieu!
  - type: text
    content: A l’ombre de tes ailes les fils de l’homme cherchent un refuge.
  '9':
  - type: text
    content: Ils se rassasient de l’abondance de ta maison,
  - type: text
    content: Et tu les abreuves au torrent de tes délices.
