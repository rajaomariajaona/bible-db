document_id: PSA.36
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: Ps 14; 10; 125; 37.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef des chantres. Du serviteur de l’Éternel, de David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: La parole impie du méchant est au fond de son cœur;
- type: usfm
  marker: q1
  children:
  - type: text
    text: La crainte de Dieu n’est pas devant ses yeux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Car il se flatte à ses propres yeux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour consommer son iniquité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour assouvir sa haine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Les paroles de sa bouche sont fausses et trompeuses;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il renonce à agir avec sagesse, à faire le bien.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Il médite l’injustice sur sa couche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il se tient sur une voie qui n’est pas bonne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il ne repousse pas le mal.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Éternel! Ta bonté atteint jusqu’aux cieux,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 57:11
      metadata:
        usfm: PSA.57.11
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 108:5
      metadata:
        usfm: PSA.108.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ta fidélité jusqu’aux nues.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ta justice est comme les montagnes de Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tes jugements sont comme le grand abîme.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Éternel! Tu soutiens les hommes et les bêtes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Combien est précieuse ta bonté, ô Dieu!
- type: usfm
  marker: q1
  children:
  - type: text
    text: A l’ombre de tes ailes les fils de l’homme cherchent un refuge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ils se rassasient de l’abondance de ta maison,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tu les abreuves au torrent de tes délices.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Car auprès de toi est la source de la vie;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Par ta lumière nous voyons la lumière.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Étends ta bonté sur ceux qui te connaissent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ta justice sur ceux dont le cœur est droit!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Que le pied de l’orgueil ne m’atteigne pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que la main des méchants ne me fasse pas fuir!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Déjà tombent ceux qui commettent l’iniquité;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils sont renversés, et ils ne peuvent se relever.
