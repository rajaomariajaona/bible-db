document_id: PSA.83,93
type_code: fra
verses:
  '1':
  - type: heading
    content: (2 Ch 20. Ps 48.)
  - type: text
    content: Cantique. Psaume d’Asaph.
  '10':
  - type: text
    content: Traite-les comme Madian,
  - type: text
    content: Comme Sisera, comme Jabin au torrent de Kison!
  '11':
  - type: text
    content: Ils ont été détruits à En-Dor,
  - type: text
    content: Ils sont devenus du fumier pour la terre.
  '12':
  - type: text
    content: Traite leurs chefs comme Oreb et Zeeb,
  - type: text
    content: Et tous leurs princes comme Zébach et Tsalmunna!
  '13':
  - type: text
    content: 'Car ils disent: Emparons-nous'
  - type: text
    content: Des demeures de Dieu!
  '14':
  - type: text
    content: Mon Dieu! Rends-les semblables au tourbillon,
  - type: text
    content: Au chaume qu’emporte le vent,
  '15':
  - type: text
    content: Au feu qui brûle la forêt,
  - type: text
    content: A la flamme qui embrase les montagnes!
  '16':
  - type: text
    content: Poursuis-les ainsi de ta tempête,
  - type: text
    content: Et fais-les trembler par ton ouragan!
  '17':
  - type: text
    content: Couvre leur face d’ignominie,
  - type: text
    content: Afin qu’ils cherchent ton nom, ô Éternel!
  '18':
  - type: text
    content: Qu’ils soient confus et épouvantés pour toujours,
  - type: text
    content: Qu’ils soient honteux et qu’ils périssent!
  '19':
  - type: text
    content: Qu’ils sachent que toi seul, dont le nom est l’Éternel,
  - type: text
    content: Tu es le Très-Haut sur toute la terre!
  '2':
  - type: text
    content: O Dieu, ne reste pas dans le silence!
  - type: text
    content: Ne te tais pas, et ne te repose pas, ô Dieu!
  '3':
  - type: text
    content: Car voici, tes ennemis s’agitent,
  - type: text
    content: Ceux qui te haïssent lèvent la tête.
  '4':
  - type: text
    content: Ils forment contre ton peuple des projets pleins de ruse,
  - type: text
    content: Et ils délibèrent contre ceux que tu protèges.
  '5':
  - type: text
    content: Venez, disent-ils, exterminons-les du milieu des nations,
  - type: text
    content: Et qu’on ne se souvienne plus du nom d’Israël!
  '6':
  - type: text
    content: Ils se concertent tous d’un même cœur,
  - type: text
    content: Ils font une alliance contre toi;
  '7':
  - type: text
    content: Les tentes d’Édom et les Ismaélites,
  - type: text
    content: Moab et les Hagaréniens,
  '8':
  - type: text
    content: Guebal, Ammon, Amalek,
  - type: text
    content: Les Philistins avec les habitants de Tyr;
  '9':
  - type: text
    content: L’Assyrie aussi se joint à eux,
  - type: text
    content: 'Elle prête son bras aux enfants de Lot. '
  - type: text
    content: — Pause.
