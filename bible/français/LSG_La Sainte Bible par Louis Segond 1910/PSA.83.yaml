document_id: PSA.83,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 Ch 20. Ps 48.)
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cantique. Psaume d’Asaph.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Traite-les comme Madian,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme Sisera, comme Jabin au torrent de Kison!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ont été détruits à En-Dor,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils sont devenus du fumier pour la terre.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Traite leurs chefs comme Oreb et Zeeb,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tous leurs princes comme Zébach et Tsalmunna!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car ils disent: Emparons-nous'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des demeures de Dieu!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon Dieu! Rends-les semblables au tourbillon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au chaume qu’emporte le vent,
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au feu qui brûle la forêt,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A la flamme qui embrase les montagnes!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Poursuis-les ainsi de ta tempête,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et fais-les trembler par ton ouragan!
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Couvre leur face d’ignominie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afin qu’ils cherchent ton nom, ô Éternel!
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’ils soient confus et épouvantés pour toujours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’ils soient honteux et qu’ils périssent!
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’ils sachent que toi seul, dont le nom est l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu es le Très-Haut sur toute la terre!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Dieu, ne reste pas dans le silence!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne te tais pas, et ne te repose pas, ô Dieu!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car voici, tes ennemis s’agitent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux qui te haïssent lèvent la tête.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils forment contre ton peuple des projets pleins de ruse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils délibèrent contre ceux que tu protèges.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Venez, disent-ils, exterminons-les du milieu des nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qu’on ne se souvienne plus du nom d’Israël!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils se concertent tous d’un même cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils font une alliance contre toi;
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les tentes d’Édom et les Ismaélites,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moab et les Hagaréniens,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Guebal, Ammon, Amalek,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les Philistins avec les habitants de Tyr;
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Assyrie aussi se joint à eux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Elle prête son bras aux enfants de Lot. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: — Pause.
