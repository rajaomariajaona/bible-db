document_id: PSA.83
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: (2 Ch 20. Ps 48.)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Cantique. Psaume d’Asaph.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: O Dieu, ne reste pas dans le silence!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne te tais pas, et ne te repose pas, ô Dieu!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Car voici, tes ennemis s’agitent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ceux qui te haïssent lèvent la tête.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ils forment contre ton peuple des projets pleins de ruse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils délibèrent contre ceux que tu protèges.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Venez, disent-ils, exterminons-les du milieu des nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qu’on ne se souvienne plus du nom d’Israël!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ils se concertent tous d’un même cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils font une alliance contre toi;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Les tentes d’Édom et les Ismaélites,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moab et les Hagaréniens,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Guebal, Ammon, Amalek,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les Philistins avec les habitants de Tyr;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: L’Assyrie aussi se joint à eux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Elle prête son bras aux enfants de Lot. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: — Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Traite-les comme Madian,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme Sisera, comme Jabin au torrent de Kison!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ils ont été détruits à En-Dor,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils sont devenus du fumier pour la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Traite leurs chefs comme Oreb et Zeeb,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tous leurs princes comme Zébach et Tsalmunna!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Car ils disent: Emparons-nous'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Des demeures de Dieu!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Mon Dieu! Rends-les semblables au tourbillon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au chaume qu’emporte le vent,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Au feu qui brûle la forêt,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A la flamme qui embrase les montagnes!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Poursuis-les ainsi de ta tempête,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et fais-les trembler par ton ouragan!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Couvre leur face d’ignominie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afin qu’ils cherchent ton nom, ô Éternel!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Qu’ils soient confus et épouvantés pour toujours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’ils soient honteux et qu’ils périssent!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Qu’ils sachent que toi seul, dont le nom est l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu es le Très-Haut sur toute la terre!
