document_id: NUM.5,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Lois sur la pureté, le vol, la jalousie et le naziréat
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-4: cf. Lé 13:45, 46. No 12:10-15. (Ap 21:27. Ps 5:5.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'L’Éternel parla à Moïse, et dit: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 10:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Les choses qu’on aura consacrées lui appartiendront, ce qu’on lui aura remis lui appartiendra.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 11-31: cf. Mal 3:5. Hé 13:4. Ps 26:2.'
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'L’Éternel parla à Moïse, et dit: '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Parle aux enfants d’Israël, et tu leur diras: Si une femme se détourne de son mari, et lui devient infidèle; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'si un autre a commerce avec elle, et que la chose soit cachée aux yeux de son mari; si elle s’est souillée en secret, sans qu’il y ait de témoin contre elle, et sans qu’elle ait été prise sur le fait; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'et si le mari est saisi d’un esprit de jalousie et a des soupçons sur sa femme, qui s’est souillée, ou bien s’il est saisi d’un esprit de jalousie et a des soupçons sur sa femme, qui ne s’est point souillée; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'cet homme amènera sa femme au sacrificateur, et apportera en offrande pour elle un dixième d’épha de farine d’orge; il n’y répandra point d’huile, et n’y mettra point d’encens, car c’est une offrande de jalousie, une offrande de souvenir, qui rappelle une iniquité. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Le sacrificateur la fera approcher, et la fera tenir debout devant l’Éternel. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Le sacrificateur prendra de l’eau sainte dans un vase de terre; il prendra de la poussière sur le sol du tabernacle, et la mettra dans l’eau. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Le sacrificateur fera tenir la femme debout devant l’Éternel; il découvrira la tête de la femme, et lui posera sur les mains l’offrande de souvenir, l’offrande de jalousie; le sacrificateur aura dans sa main les eaux amères qui apportent la malédiction. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Le sacrificateur fera jurer la femme, et lui dira: Si aucun homme n’a couché avec toi, et si, étant sous la puissance de ton mari, tu ne t’en es point détournée pour te souiller, ces eaux amères qui apportent la malédiction ne te seront point funestes. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ordonne aux enfants d’Israël de '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 13:3
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '46'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'renvoyer du camp tout lépreux, et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 15:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'quiconque a une gonorrhée ou est souillé par '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 21:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'un mort. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Mais si, étant sous la puissance de ton mari, tu t’en es détournée et que tu te sois souillée, et si un autre homme que ton mari a couché avec toi, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'et le sacrificateur fera jurer la femme avec un serment d’imprécation, et lui dira: Que l’Éternel te livre à la malédiction et à l’exécration au milieu de ton peuple, en faisant dessécher ta cuisse et enfler ton ventre, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'et que ces eaux qui apportent la malédiction entrent dans tes entrailles pour te faire enfler le ventre et dessécher la cuisse! Et la femme dira: Amen! Amen! '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Le sacrificateur écrira ces imprécations dans un livre, puis les effacera avec les eaux amères. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Et il fera boire à la femme les eaux amères qui apportent la malédiction, et les eaux qui apportent la malédiction entreront en elle pour produire l’amertume. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Le sacrificateur prendra des mains de la femme l’offrande de jalousie, il agitera l’offrande de côté et d’autre devant l’Éternel, et il l’offrira sur l’autel; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'le sacrificateur prendra une poignée de cette offrande comme souvenir, et il la brûlera sur l’autel. C’est après cela qu’il fera boire les eaux à la femme. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Quand il aura fait boire les eaux, il arrivera, si elle s’est souillée et a été infidèle à son mari, que les eaux qui apportent la malédiction entreront en elle pour produire l’amertume; son ventre s’enflera, sa cuisse se desséchera, et cette femme sera en malédiction au milieu de son peuple. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Mais si la femme ne s’est point souillée et qu’elle soit pure, elle sera reconnue innocente et aura des enfants. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Telle est la loi sur la jalousie, pour le cas où une femme sous la puissance de son mari se détourne et se souille, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Hommes ou femmes, vous les renverrez, vous les renverrez hors du camp, afin qu’ils ne souillent pas le camp au milieu duquel j’ai ma demeure. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'et pour le cas où un mari saisi d’un esprit de jalousie a des soupçons sur sa femme: le sacrificateur la fera tenir debout devant l’Éternel, et lui appliquera cette loi dans son entier. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Le mari sera exempt de faute, mais la femme portera la peine de son iniquité.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Les enfants d’Israël firent ainsi, et ils les renvoyèrent hors du camp; comme l’Éternel l’avait ordonné à Moïse, ainsi firent les enfants d’Israël.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 5-10: cf. (Lé 5:20-26. No 18:8-20.) Lu 19:8.'
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'L’Éternel parla à Moïse, et dit: '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 6:1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Parle aux enfants d’Israël: Lorsqu’un homme ou une femme péchera contre son prochain en commettant une infidélité à l’égard de l’Éternel, et qu’il se rendra ainsi coupable, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'il confessera son péché, et il restituera '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 6:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'dans son entier l’objet mal acquis, en y ajoutant un cinquième; il le remettra à celui envers qui il s’est rendu coupable. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'S’il n’y a personne qui ait droit à la restitution de l’objet mal acquis, cet objet revient à l’Éternel, au sacrificateur, outre le bélier expiatoire avec lequel on fera l’expiation pour le coupable. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Toute offrande de choses consacrées par les enfants d’Israël appartiendra au sacrificateur à qui elles seront présentées. '
