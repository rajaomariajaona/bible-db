document_id: HOS.8,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Dispersion d’Israël parmi les nations
  - type: heading
    content: 'V. 1-7: cf. És 24:5, 6. Os 10:1-6; 13:1-3. Ga 6:7.'
  - type: text
    content: Embouche la trompette!
  - type: text
    content: 'L’ennemi fond comme un '
  - type: note
    content: De 28:49.
  - type: text
    content: aigle sur la maison de l’Éternel,
  - type: text
    content: 'Parce qu’ils ont violé mon '
  - type: note
    content: Os 6:7.
  - type: text
    content: alliance,
  - type: text
    content: Et transgressé ma loi.
  '10':
  - type: text
    content: Quand même ils font des présents parmi les nations,
  - type: text
    content: Je vais maintenant les rassembler,
  - type: text
    content: Et bientôt ils souffriront sous le fardeau du roi des princes.
  '11':
  - type: text
    content: Éphraïm a multiplié les autels pour pécher,
  - type: text
    content: Et ces autels l’ont fait tomber dans le péché.
  '12':
  - type: text
    content: Que j’écrive pour lui toutes les ordonnances de ma loi,
  - type: text
    content: Elles sont regardées comme quelque chose d’étranger.
  '13':
  - type: text
    content: Ils immolent des victimes qu’ils m’offrent,
  - type: text
    content: 'Et ils en mangent la chair:'
  - type: text
    content: L’Éternel n’y prend point de plaisir.
  - type: text
    content: Maintenant l’Éternel se souvient de leur iniquité,
  - type: text
    content: 'Et il punira leurs péchés:'
  - type: text
    content: Ils retourneront en Égypte.
  '14':
  - type: text
    content: Israël a oublié celui qui l’a fait,
  - type: text
    content: Et a bâti des palais,
  - type: text
    content: Et Juda a multiplié les villes fortes;
  - type: text
    content: Mais j’enverrai le feu dans leurs villes,
  - type: text
    content: Et il en dévorera les palais.
  '2':
  - type: text
    content: 'Ils crieront vers moi:'
  - type: text
    content: Mon Dieu, nous te connaissons, nous Israël!
  '3':
  - type: text
    content: Israël a rejeté le bien;
  - type: text
    content: L’ennemi le poursuivra.
  '4':
  - type: text
    content: Ils ont établi des rois sans mon ordre,
  - type: text
    content: Et des chefs à mon insu;
  - type: text
    content: Ils ont fait des idoles avec leur argent et leur or;
  - type: text
    content: C’est pourquoi ils seront anéantis.
  '5':
  - type: text
    content: L’Éternel a rejeté ton veau, Samarie!
  - type: text
    content: Ma colère s’est enflammée contre eux.
  - type: text
    content: Jusques à quand refuseront-ils de se purifier?
  '6':
  - type: text
    content: Il vient d’Israël, un ouvrier l’a fabriqué,
  - type: text
    content: Et ce n’est pas un Dieu;
  - type: text
    content: C’est pourquoi le veau de Samarie sera mis en pièces.
  '7':
  - type: text
    content: Puisqu’ils ont semé du vent, ils moissonneront la tempête;
  - type: text
    content: Ils n’auront pas un épi de blé;
  - type: text
    content: Ce qui poussera ne donnera point de farine,
  - type: text
    content: Et s’il y en avait, des étrangers la dévoreraient.
  - type: heading
    content: 'V. 8-14: cf. Os 7:11, etc.; 5:6, 7.'
  '8':
  - type: text
    content: Israël est anéanti!
  - type: text
    content: Ils sont maintenant parmi les nations
  - type: text
    content: Comme un vase qui n’a pas de prix.
  '9':
  - type: text
    content: Car ils sont allés en Assyrie,
  - type: text
    content: Comme un âne sauvage qui se tient à l’écart;
  - type: text
    content: Éphraïm a fait des présents pour avoir des amis.
