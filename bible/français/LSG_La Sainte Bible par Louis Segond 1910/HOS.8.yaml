document_id: HOS.8,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dispersion d’Israël parmi les nations
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-7: cf. És 24:5, 6. Os 10:1-6; 13:1-3. Ga 6:7.'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Embouche la trompette!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'L’ennemi fond comme un '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 28:49
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: aigle sur la maison de l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Parce qu’ils ont violé mon '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Os 6:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: alliance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et transgressé ma loi.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand même ils font des présents parmi les nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je vais maintenant les rassembler,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et bientôt ils souffriront sous le fardeau du roi des princes.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Éphraïm a multiplié les autels pour pécher,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ces autels l’ont fait tomber dans le péché.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que j’écrive pour lui toutes les ordonnances de ma loi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles sont regardées comme quelque chose d’étranger.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils immolent des victimes qu’ils m’offrent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et ils en mangent la chair:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel n’y prend point de plaisir.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maintenant l’Éternel se souvient de leur iniquité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et il punira leurs péchés:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils retourneront en Égypte.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Israël a oublié celui qui l’a fait,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et a bâti des palais,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et Juda a multiplié les villes fortes;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais j’enverrai le feu dans leurs villes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il en dévorera les palais.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ils crieront vers moi:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon Dieu, nous te connaissons, nous Israël!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Israël a rejeté le bien;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’ennemi le poursuivra.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ont établi des rois sans mon ordre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et des chefs à mon insu;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ont fait des idoles avec leur argent et leur or;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est pourquoi ils seront anéantis.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel a rejeté ton veau, Samarie!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ma colère s’est enflammée contre eux.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jusques à quand refuseront-ils de se purifier?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il vient d’Israël, un ouvrier l’a fabriqué,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ce n’est pas un Dieu;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est pourquoi le veau de Samarie sera mis en pièces.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Puisqu’ils ont semé du vent, ils moissonneront la tempête;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils n’auront pas un épi de blé;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce qui poussera ne donnera point de farine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et s’il y en avait, des étrangers la dévoreraient.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 8-14: cf. Os 7:11, etc.; 5:6, 7.'
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Israël est anéanti!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils sont maintenant parmi les nations
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme un vase qui n’a pas de prix.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car ils sont allés en Assyrie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme un âne sauvage qui se tient à l’écart;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Éphraïm a fait des présents pour avoir des amis.
