document_id: TIT.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Comment Tite doit exhorter les vieillards, les femmes, les jeunes hommes, les serviteurs, et quel exemple il doit donner lui-même
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-10: cf. (1 Ti 2:9-15. 1 Pi 3:1-6.) Ps 119:9. (Ép 6:5-8. 1 Pi 2:18-20.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Pour toi, dis les choses qui sont conformes à la saine doctrine. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dis que les vieillards doivent être sobres, honnêtes, modérés, sains dans la foi, dans la charité, dans la patience. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dis que les femmes âgées '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 2:9
      metadata:
        usfm: 1TI.2.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 3:3
      metadata:
        usfm: 1PE.3.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'doivent aussi avoir l’extérieur qui convient à la sainteté, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 5:13
      metadata:
        usfm: 1TI.5.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'n’être ni médisantes, ni adonnées au vin; qu’elles doivent donner de bonnes instructions, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'dans le but d’apprendre aux jeunes femmes à aimer leurs maris et leurs enfants, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'à être retenues, chastes, occupées aux soins domestiques, bonnes, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 3:16
      metadata:
        usfm: GEN.3.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 14:34
      metadata:
        usfm: 1CO.14.34
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 5:22
      metadata:
        usfm: EPH.5.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 3:18
      metadata:
        usfm: COL.3.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 3:1
      metadata:
        usfm: 1PE.3.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'soumises à leurs maris, afin que la parole de Dieu ne soit pas blasphémée. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Exhorte de même les jeunes gens à être modérés, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 4:12
      metadata:
        usfm: 1TI.4.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 5:3
      metadata:
        usfm: 1PE.5.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'te montrant toi-même à tous égards un modèle de bonnes œuvres, et donnant un enseignement pur, digne, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'une parole saine, irréprochable, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 2:12
      metadata:
        usfm: 1PE.2.12
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '15'
      metadata:
        usfm: 1PE.2.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 3:16
      metadata:
        usfm: 1PE.3.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'afin que l’adversaire soit confus, n’ayant aucun mal à dire de nous. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 6:5
      metadata:
        usfm: EPH.6.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 3:22
      metadata:
        usfm: COL.3.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 6:1
      metadata:
        usfm: 1TI.6.1
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '2'
      metadata:
        usfm: 1TI.6.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 2:18
      metadata:
        usfm: 1PE.2.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Exhorte les serviteurs à être soumis à leurs maîtres, à leur plaire en toutes choses, à n’être point contredisants, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: à ne rien dérober, mais à montrer toujours une parfaite fidélité, afin de faire honorer en tout la doctrine de Dieu notre Sauveur.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'La grâce de Dieu manifestée: ce qu’elle enseigne, et ce que Tite doit enseigner'
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 11-15: cf. 1 Pi 1:10-21. (Ro 12:1, 2. 1 Co 6:20. 1 Jn 3:1-3.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Car la grâce de Dieu, source de salut pour tous les hommes, a été manifestée. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Elle nous enseigne à renoncer à '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 1:4
      metadata:
        usfm: EPH.1.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 1:22
      metadata:
        usfm: COL.1.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ti 1:9
      metadata:
        usfm: 2TI.1.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'l’impiété et aux '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 2:16
      metadata:
        usfm: 1JN.2.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'convoitises mondaines, et à vivre dans le siècle présent selon la sagesse, la justice et la piété, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 1:7
      metadata:
        usfm: 1CO.1.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 3:20
      metadata:
        usfm: PHP.3.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'en attendant la bienheureuse espérance, et la manifestation de la gloire du grand Dieu et de notre Sauveur Jésus-Christ, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 1:4
      metadata:
        usfm: GAL.1.4
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2:20
      metadata:
        usfm: GAL.2.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 5:2
      metadata:
        usfm: EPH.5.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 9:14
      metadata:
        usfm: HEB.9.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qui s’est donné lui-même pour nous, afin de nous racheter de toute iniquité, et de se faire un peuple qui lui appartienne, purifié par lui et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 2:10
      metadata:
        usfm: EPH.2.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'zélé pour les bonnes œuvres. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dis ces choses, exhorte, et reprends, avec une pleine autorité. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 4:12
      metadata:
        usfm: 1TI.4.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Que personne ne te méprise.
