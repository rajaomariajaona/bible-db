document_id: TIT.2,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Comment Tite doit exhorter les vieillards, les femmes, les jeunes hommes, les serviteurs, et quel exemple il doit donner lui-même
  - type: heading
    content: 'V. 1-10: cf. (1 Ti 2:9-15. 1 Pi 3:1-6.) Ps 119:9. (Ép 6:5-8. 1 Pi 2:18-20.)'
  - type: text
    content: 'Pour toi, dis les choses qui sont conformes à la saine doctrine. '
  '10':
  - type: text
    content: à ne rien dérober, mais à montrer toujours une parfaite fidélité, afin de faire honorer en tout la doctrine de Dieu notre Sauveur.
  - type: heading
    content: 'La grâce de Dieu manifestée: ce qu’elle enseigne, et ce que Tite doit enseigner'
  - type: heading
    content: 'V. 11-15: cf. 1 Pi 1:10-21. (Ro 12:1, 2. 1 Co 6:20. 1 Jn 3:1-3.)'
  '11':
  - type: text
    content: 'Car la grâce de Dieu, source de salut pour tous les hommes, a été manifestée. '
  '12':
  - type: text
    content: 'Elle nous enseigne à renoncer à '
  - type: note
    content: Ép 1:4. Col 1:22. 2 Ti 1:9.
  - type: text
    content: 'l’impiété et aux '
  - type: note
    content: 1 Jn 2:16.
  - type: text
    content: 'convoitises mondaines, et à vivre dans le siècle présent selon la sagesse, la justice et la piété, '
  '13':
  - type: note
    content: 1 Co 1:7. Ph 3:20.
  - type: text
    content: 'en attendant la bienheureuse espérance, et la manifestation de la gloire du grand Dieu et de notre Sauveur Jésus-Christ, '
  '14':
  - type: note
    content: Ga 1:4; 2:20. Ép 5:2. Hé 9:14.
  - type: text
    content: 'qui s’est donné lui-même pour nous, afin de nous racheter de toute iniquité, et de se faire un peuple qui lui appartienne, purifié par lui et '
  - type: note
    content: Ép 2:10.
  - type: text
    content: 'zélé pour les bonnes œuvres. '
  '15':
  - type: text
    content: 'Dis ces choses, exhorte, et reprends, avec une pleine autorité. '
  - type: note
    content: 1 Ti 4:12.
  - type: text
    content: Que personne ne te méprise.
  '2':
  - type: text
    content: 'Dis que les vieillards doivent être sobres, honnêtes, modérés, sains dans la foi, dans la charité, dans la patience. '
  '3':
  - type: text
    content: 'Dis que les femmes âgées '
  - type: note
    content: 1 Ti 2:9. 1 Pi 3:3.
  - type: text
    content: 'doivent aussi avoir l’extérieur qui convient à la sainteté, '
  - type: note
    content: 1 Ti 5:13.
  - type: text
    content: 'n’être ni médisantes, ni adonnées au vin; qu’elles doivent donner de bonnes instructions, '
  '4':
  - type: text
    content: 'dans le but d’apprendre aux jeunes femmes à aimer leurs maris et leurs enfants, '
  '5':
  - type: text
    content: 'à être retenues, chastes, occupées aux soins domestiques, bonnes, '
  - type: note
    content: Ge 3:16. 1 Co 14:34. Ép 5:22. Col 3:18. 1 Pi 3:1.
  - type: text
    content: 'soumises à leurs maris, afin que la parole de Dieu ne soit pas blasphémée. '
  '6':
  - type: text
    content: 'Exhorte de même les jeunes gens à être modérés, '
  '7':
  - type: note
    content: 1 Ti 4:12. 1 Pi 5:3.
  - type: text
    content: 'te montrant toi-même à tous égards un modèle de bonnes œuvres, et donnant un enseignement pur, digne, '
  '8':
  - type: text
    content: 'une parole saine, irréprochable, '
  - type: note
    content: 1 Pi 2:12, 15; 3:16.
  - type: text
    content: 'afin que l’adversaire soit confus, n’ayant aucun mal à dire de nous. '
  '9':
  - type: note
    content: Ép 6:5. Col 3:22. 1 Ti 6:1, 2. 1 Pi 2:18.
  - type: text
    content: 'Exhorte les serviteurs à être soumis à leurs maîtres, à leur plaire en toutes choses, à n’être point contredisants, '
