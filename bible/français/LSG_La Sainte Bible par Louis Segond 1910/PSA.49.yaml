document_id: PSA.49,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Ps 73; 37.) Lu 12:15-20.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au chef des chantres. Des fils de Koré. Psaume.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ne vivront pas toujours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils n’éviteront pas la vue de la fosse.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car ils la verront: les sages meurent,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’insensé et le stupide périssent également,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils laissent à d’autres leurs biens.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils s’imaginent que leurs maisons seront éternelles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que leurs demeures subsisteront d’âge en âge,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eux dont les noms sont honorés sur la terre.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais l’homme qui est en honneur n’a point de durée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est semblable aux bêtes que l’on égorge.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Telle est leur voie, leur folie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et ceux qui les suivent se plaisent à leurs discours. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: — Pause.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme un troupeau, ils sont mis dans le séjour des morts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La mort en fait sa pâture;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et bientôt les hommes droits les foulent aux pieds,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leur beauté s’évanouit, le séjour des morts est leur demeure.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais Dieu sauvera mon âme du séjour des morts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car il me prendra sous sa protection. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: — Pause.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne sois pas dans la crainte parce qu’un homme s’enrichit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce que les trésors de sa maison se multiplient;
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car il n’emporte rien en mourant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses trésors ne descendent point après lui.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il aura beau s’estimer heureux pendant sa vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On aura beau te louer des jouissances que tu te donnes,
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Écoutez ceci, vous tous, peuples,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prêtez l’oreille, vous tous, habitants du monde,
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu iras néanmoins au séjour de tes pères,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui jamais ne reverront la lumière.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’homme qui est en honneur, et qui n’a pas d’intelligence,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Est semblable aux bêtes que l’on égorge.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Petits et grands,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Riches et pauvres!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ma bouche va faire entendre des paroles sages,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et mon cœur a des pensées pleines de sens.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 78:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 15:35
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Je prête l’oreille aux sentences qui me sont inspirées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ouvre mon chant au son de la harpe.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi craindrais-je aux jours du malheur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lorsque l’iniquité de mes adversaires m’enveloppe?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ont confiance en leurs biens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et se glorifient de leur grande richesse.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ne peuvent se racheter l’un l’autre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ni donner à Dieu le prix du rachat.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le rachat de leur âme est cher,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et n’aura jamais lieu;
