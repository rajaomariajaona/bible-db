document_id: PSA.49,93
type_code: fra
verses:
  '1':
  - type: heading
    content: (Ps 73; 37.) Lu 12:15-20.
  - type: text
    content: Au chef des chantres. Des fils de Koré. Psaume.
  '10':
  - type: text
    content: Ils ne vivront pas toujours,
  - type: text
    content: Ils n’éviteront pas la vue de la fosse.
  '11':
  - type: text
    content: 'Car ils la verront: les sages meurent,'
  - type: text
    content: L’insensé et le stupide périssent également,
  - type: text
    content: Et ils laissent à d’autres leurs biens.
  '12':
  - type: text
    content: Ils s’imaginent que leurs maisons seront éternelles,
  - type: text
    content: Que leurs demeures subsisteront d’âge en âge,
  - type: text
    content: Eux dont les noms sont honorés sur la terre.
  '13':
  - type: text
    content: Mais l’homme qui est en honneur n’a point de durée,
  - type: text
    content: Il est semblable aux bêtes que l’on égorge.
  '14':
  - type: text
    content: Telle est leur voie, leur folie,
  - type: text
    content: 'Et ceux qui les suivent se plaisent à leurs discours. '
  - type: text
    content: — Pause.
  '15':
  - type: text
    content: Comme un troupeau, ils sont mis dans le séjour des morts,
  - type: text
    content: La mort en fait sa pâture;
  - type: text
    content: Et bientôt les hommes droits les foulent aux pieds,
  - type: text
    content: Leur beauté s’évanouit, le séjour des morts est leur demeure.
  '16':
  - type: text
    content: Mais Dieu sauvera mon âme du séjour des morts,
  - type: text
    content: 'Car il me prendra sous sa protection. '
  - type: text
    content: — Pause.
  '17':
  - type: text
    content: Ne sois pas dans la crainte parce qu’un homme s’enrichit,
  - type: text
    content: Parce que les trésors de sa maison se multiplient;
  '18':
  - type: text
    content: Car il n’emporte rien en mourant,
  - type: text
    content: Ses trésors ne descendent point après lui.
  '19':
  - type: text
    content: Il aura beau s’estimer heureux pendant sa vie,
  - type: text
    content: On aura beau te louer des jouissances que tu te donnes,
  '2':
  - type: text
    content: Écoutez ceci, vous tous, peuples,
  - type: text
    content: Prêtez l’oreille, vous tous, habitants du monde,
  '20':
  - type: text
    content: Tu iras néanmoins au séjour de tes pères,
  - type: text
    content: Qui jamais ne reverront la lumière.
  '21':
  - type: text
    content: L’homme qui est en honneur, et qui n’a pas d’intelligence,
  - type: text
    content: Est semblable aux bêtes que l’on égorge.
  '3':
  - type: text
    content: Petits et grands,
  - type: text
    content: Riches et pauvres!
  '4':
  - type: text
    content: Ma bouche va faire entendre des paroles sages,
  - type: text
    content: Et mon cœur a des pensées pleines de sens.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Ps 78:2. Mt 15:35.
  - type: text
    content: Je prête l’oreille aux sentences qui me sont inspirées,
  - type: text
    content: J’ouvre mon chant au son de la harpe.
  '6':
  - type: text
    content: Pourquoi craindrais-je aux jours du malheur,
  - type: text
    content: Lorsque l’iniquité de mes adversaires m’enveloppe?
  '7':
  - type: text
    content: Ils ont confiance en leurs biens,
  - type: text
    content: Et se glorifient de leur grande richesse.
  '8':
  - type: text
    content: Ils ne peuvent se racheter l’un l’autre,
  - type: text
    content: Ni donner à Dieu le prix du rachat.
  '9':
  - type: text
    content: Le rachat de leur âme est cher,
  - type: text
    content: Et n’aura jamais lieu;
