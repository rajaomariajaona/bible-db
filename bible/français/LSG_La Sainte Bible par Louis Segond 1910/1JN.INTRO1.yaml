document_id: 1JN.INTRO1,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: INTRODUCTION À LA PREMIÈRE ÉPÎTRE DE JEAN
  - type: usfm
    marker: imt3
    children:
    - type: text
      text: (Jn 1:4; 17:11, 26. Ép 5:8.)
  - type: usfm
    marker: ip
    children:
    - type: text
      text: La tradition chrétienne attribue trois épîtres (1, 2, et 3 Jean) à l’apôtre Jean, l’un des disciples de Jésus de la première heure. Frère de Jacques et fils de Zébédée, il fut identifié par l’auteur du quatrième évangile comme le disciple que Jésus aimait le plus (Jn 21:24).
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Les destinataires de cette épître ne sont pas les mêmes que ceux des deux autres. L’épître qui nous intéresse diffère des autres par l’absence notable de la formule d’appel épistolaire classique avec un auteur s’adressant à des destinataires précis, aussi bien au début qu’à la fin. Cette lacune est probablement due à ce qu’il s’agit d’une épître pastorale que Jean destinait à différentes communautés chrétiennes. Voici la structure de la première épître de Jean:'
  - type: usfm
    marker: io1
    children:
    - type: text
      text: '1. Prologue sur la Parole de vie '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 1:1-4 (voir le prologue de l’évangile de Jn 1:1-18)
  - type: usfm
    marker: io1
    children:
    - type: text
      text: '2. Dieu est lumière:'
  - type: usfm
    marker: io2
    children:
    - type: text
      text: '- Marcher dans la lumière à la différence des antéchrists '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 1:5–2:27
  - type: usfm
    marker: io2
    children:
    - type: text
      text: '- Vivre en enfant de Dieu à la différence des faux docteurs '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 2:28–4:6
  - type: usfm
    marker: io1
    children:
    - type: text
      text: 3. Dieu est amour
  - type: usfm
    marker: io2
    children:
    - type: text
      text: '- Aimer Dieu et aimer ses frères '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 4:7-21
  - type: usfm
    marker: io1
    children:
    - type: text
      text: '4. La foi de Jésus-Christ et l’efficacité de la prière '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 5:1-21
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Par sa teneur, cette épître se différencie également des deux autres du point de vue de la longueur, avec cinq chapitres, alors que celles-ci sont petites et circonstanciées avec un seul chapitre chacune. Au plan théologique, 1 Jean développe, à elle seule, le contenu des trois lettres. Les deux autres quant à elles ne semblent pas présenter d’originalité. Elles confirmeraient simplement ce qui est rapporté dans la première.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Le message de 1 Jean varie selon qu’on la considère comme épître à une communauté particulière avec ses problèmes propres, ou comme une épître destinée à tout chrétien. Dans cette dernière hypothèse, il s’agirait d’un simple traité de vie chrétienne, abordant essentiellement de la foi et l’amour en Jésus-Christ. Ce dernier thème est abondamment traité: '
    - type: usfm
      marker: it
      children:
      - type: text
        text: '«Nous devons nous aimer les uns les autres» '
    - type: text
      text: '(3:11-18) ou encore: '
    - type: usfm
      marker: it
      children:
      - type: text
        text: «N’aimez point le monde, ni les choses qui sont dans le monde»
    - type: text
      text: ' (2:15).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: En réalité, ces thèmes sont évoqués en fonction d’événements et de problèmes de communauté précis (voir 2:18-27), et par rapport à l’œuvre de faux frères qui se comportent en antéchrist. L’épître apparaît donc comme une mise en garde contre ces faux docteurs (4:1-6). Les membres de l’Église sont de Dieu. Dieu est amour. Cet amour doit avoir pour conséquence l'amour des frères (4:7-8).
  - type: usfm
    marker: ip
    children:
    - type: text
      text: À cet égard, par rapport à l’Évangile de Jean, les ressemblances sont importantes. Toutefois, ce caractère de polémique distingue l’épître de l’évangile. Les «antéchrists» sont combattus avec une violence marquée. L’auteur réagit contre les menteurs qui nient que Jésus est le Christ. Mais qui sont ces menteurs?
  - type: usfm
    marker: ip
    children:
    - type: text
      text: On peut penser, avec Irénée de Lyon, que ceux visés seraient des adeptes de l'hérésiarque de Corinthe au premier siècle. Déjà, Jean aurait écrit son évangile contre eux. Pour ces hérétiques, Jésus serait né de Joseph et de Marie sans être le Christ, et le Christ, être divin, serait descendu sur lui sous la forme d’une colombe après le baptême. Dès lors, Jésus aurait prêché et fait des miracles. Mais, avant sa mort, le Christ divin aurait quitté Jésus, qui aurait vécu seul la mort, le Christ divin et spirituel ayant échappé à la souffrance.
