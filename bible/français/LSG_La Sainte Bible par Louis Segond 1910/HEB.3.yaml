document_id: HEB.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus est supérieur à Moïse. Ne pas imiter l’endurcissement et l’incrédulité des anciens Israélites, mais entrer dans le repos de Dieu
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-6: cf. (No 12:7. De 4:5.) (Hé 1:2. Mt 21:33-38.) Za 6:12, 13.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'C’est pourquoi, frères saints, qui avez part à la vocation céleste, considérez l’apôtre et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 4:14
      metadata:
        usfm: HEB.4.14
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 6:20
      metadata:
        usfm: HEB.6.20
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 8:1
      metadata:
        usfm: HEB.8.1
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 9:11
      metadata:
        usfm: HEB.9.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'le souverain sacrificateur de la foi que nous professons, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Jésus, qui a été fidèle à celui qui l’a établi, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 12:7
      metadata:
        usfm: NUM.12.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'comme le fut Moïse dans toute sa maison. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Car il a été jugé digne d’une gloire d’autant supérieure à celle de Moïse que celui qui a construit une maison a plus d’honneur que la maison même. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Chaque maison est construite par quelqu’un, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 5:17
      metadata:
        usfm: 2CO.5.17
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '18'
      metadata:
        usfm: 2CO.5.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 2:10
      metadata:
        usfm: EPH.2.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'mais celui qui a construit toutes choses, c’est Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Pour Moïse, il a été fidèle dans toute la maison de Dieu, comme serviteur, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 18:15
      metadata:
        usfm: DEU.18.15
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '18'
      metadata:
        usfm: DEU.18.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'pour rendre témoignage de ce qui devait être annoncé; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'mais Christ l’est comme Fils sur sa maison; et sa maison, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 3:16
      metadata:
        usfm: 1CO.3.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 6:19
      metadata:
        usfm: 1CO.6.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 6:16
      metadata:
        usfm: 2CO.6.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 2:5
      metadata:
        usfm: 1PE.2.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'c’est nous, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 5:2
      metadata:
        usfm: ROM.5.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: pourvu que nous retenions jusqu’à la fin la ferme confiance et l’espérance dont nous nous glorifions.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 7-19: cf. Ps 95:8-11. (No 14. Ps 78. 1 Co 10:1-12.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'C’est pourquoi, selon ce que dit le Saint-Esprit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 95:7
      metadata:
        usfm: PSA.95.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 4:7
      metadata:
        usfm: HEB.4.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Aujourd’hui, si vous entendez sa voix,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'N’endurcissez pas vos cœurs, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 17:2
      metadata:
        usfm: EXO.17.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: comme lors de la révolte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le jour de la tentation dans le désert,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Où vos pères me tentèrent
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour m’éprouver, et ils virent mes œuvres
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pendant quarante ans.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Aussi je fus irrité contre cette génération, et je dis:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ont toujours un cœur qui s’égare.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils n’ont pas connu mes voies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 14:21
      metadata:
        usfm: NUM.14.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 1:34
      metadata:
        usfm: DEU.1.34
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Je jurai donc dans ma colère:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils n’entreront pas dans mon repos!
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Prenez garde, frères, que quelqu’un de vous n’ait un cœur mauvais et incrédule, au point de se détourner du Dieu vivant. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mais exhortez-vous les uns les autres chaque jour, aussi longtemps qu’on peut dire: Aujourd’hui! Afin qu’aucun de vous ne s’endurcisse par la séduction du péché. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Car nous sommes devenus participants de Christ, pourvu que nous retenions fermement jusqu’à la fin l’assurance que nous avions au commencement, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'pendant qu’il est dit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 3:7
      metadata:
        usfm: HEB.3.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Aujourd’hui, si vous entendez sa voix,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'N’endurcissez pas vos cœurs, comme lors de la révolte. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Qui furent, en effet, ceux qui se révoltèrent après l’avoir entendue, sinon tous ceux qui étaient sortis d’Égypte sous la conduite de Moïse? '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Et contre qui Dieu fut-il irrité pendant quarante ans, sinon contre ceux qui péchaient, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 14:36
      metadata:
        usfm: NUM.14.36
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 106:26
      metadata:
        usfm: PSA.106.26
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 10:10
      metadata:
        usfm: 1CO.10.10
    - type: text
      text: . Jud v. 5.
    marker-yv: yv-n
  - type: text
    text: 'et dont les cadavres tombèrent dans le désert? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 1:34
      metadata:
        usfm: DEU.1.34
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Et à qui jura-t-il qu’ils n’entreraient pas dans son repos, sinon à ceux qui avaient désobéi? '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Aussi voyons-nous qu’ils ne purent y entrer à cause de leur incrédulité.
