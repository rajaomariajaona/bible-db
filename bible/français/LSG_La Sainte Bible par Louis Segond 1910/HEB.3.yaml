document_id: HEB.3,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus est supérieur à Moïse. Ne pas imiter l’endurcissement et l’incrédulité des anciens Israélites, mais entrer dans le repos de Dieu
  - type: heading
    content: 'V. 1-6: cf. (No 12:7. De 4:5.) (Hé 1:2. Mt 21:33-38.) Za 6:12, 13.'
  - type: text
    content: 'C’est pourquoi, frères saints, qui avez part à la vocation céleste, considérez l’apôtre et '
  - type: note
    content: Hé 4:14; 6:20; 8:1; 9:11.
  - type: text
    content: 'le souverain sacrificateur de la foi que nous professons, '
  '10':
  - type: text
    content: 'Aussi je fus irrité contre cette génération, et je dis:'
  - type: text
    content: Ils ont toujours un cœur qui s’égare.
  - type: text
    content: Ils n’ont pas connu mes voies.
  '11':
  - type: text
    content: ' '
  - type: note
    content: No 14:21. De 1:34.
  - type: text
    content: 'Je jurai donc dans ma colère:'
  - type: text
    content: Ils n’entreront pas dans mon repos!
  '12':
  - type: text
    content: 'Prenez garde, frères, que quelqu’un de vous n’ait un cœur mauvais et incrédule, au point de se détourner du Dieu vivant. '
  '13':
  - type: text
    content: 'Mais exhortez-vous les uns les autres chaque jour, aussi longtemps qu’on peut dire: Aujourd’hui! Afin qu’aucun de vous ne s’endurcisse par la séduction du péché. '
  '14':
  - type: text
    content: 'Car nous sommes devenus participants de Christ, pourvu que nous retenions fermement jusqu’à la fin l’assurance que nous avions au commencement, '
  '15':
  - type: text
    content: 'pendant qu’il est dit:'
  - type: note
    content: Hé 3:7.
  - type: text
    content: Aujourd’hui, si vous entendez sa voix,
  - type: text
    content: 'N’endurcissez pas vos cœurs, comme lors de la révolte. '
  '16':
  - type: text
    content: 'Qui furent, en effet, ceux qui se révoltèrent après l’avoir entendue, sinon tous ceux qui étaient sortis d’Égypte sous la conduite de Moïse? '
  '17':
  - type: text
    content: 'Et contre qui Dieu fut-il irrité pendant quarante ans, sinon contre ceux qui péchaient, '
  - type: note
    content: No 14:36. Ps 106:26. 1 Co 10:10. Jud v. 5.
  - type: text
    content: 'et dont les cadavres tombèrent dans le désert? '
  '18':
  - type: note
    content: De 1:34.
  - type: text
    content: 'Et à qui jura-t-il qu’ils n’entreraient pas dans son repos, sinon à ceux qui avaient désobéi? '
  '19':
  - type: text
    content: Aussi voyons-nous qu’ils ne purent y entrer à cause de leur incrédulité.
  '2':
  - type: text
    content: 'Jésus, qui a été fidèle à celui qui l’a établi, '
  - type: note
    content: No 12:7.
  - type: text
    content: 'comme le fut Moïse dans toute sa maison. '
  '3':
  - type: text
    content: 'Car il a été jugé digne d’une gloire d’autant supérieure à celle de Moïse que celui qui a construit une maison a plus d’honneur que la maison même. '
  '4':
  - type: text
    content: 'Chaque maison est construite par quelqu’un, '
  - type: note
    content: 2 Co 5:17, 18. Ép 2:10.
  - type: text
    content: 'mais celui qui a construit toutes choses, c’est Dieu. '
  '5':
  - type: text
    content: 'Pour Moïse, il a été fidèle dans toute la maison de Dieu, comme serviteur, '
  - type: note
    content: De 18:15, 18.
  - type: text
    content: 'pour rendre témoignage de ce qui devait être annoncé; '
  '6':
  - type: text
    content: 'mais Christ l’est comme Fils sur sa maison; et sa maison, '
  - type: note
    content: 1 Co 3:16; 6:19. 2 Co 6:16. 1 Pi 2:5.
  - type: text
    content: 'c’est nous, '
  - type: note
    content: Ro 5:2.
  - type: text
    content: pourvu que nous retenions jusqu’à la fin la ferme confiance et l’espérance dont nous nous glorifions.
  - type: heading
    content: 'V. 7-19: cf. Ps 95:8-11. (No 14. Ps 78. 1 Co 10:1-12.)'
  '7':
  - type: text
    content: 'C’est pourquoi, selon ce que dit le Saint-Esprit:'
  - type: note
    content: Ps 95:7. Hé 4:7.
  - type: text
    content: Aujourd’hui, si vous entendez sa voix,
  '8':
  - type: text
    content: 'N’endurcissez pas vos cœurs, '
  - type: note
    content: Ex 17:2.
  - type: text
    content: comme lors de la révolte,
  - type: text
    content: Le jour de la tentation dans le désert,
  '9':
  - type: text
    content: Où vos pères me tentèrent
  - type: text
    content: Pour m’éprouver, et ils virent mes œuvres
  - type: text
    content: Pendant quarante ans.
