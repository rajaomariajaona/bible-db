document_id: 1CO.12
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sur les dons spirituels
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-11: cf. Ép 4:4-12.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Pour ce qui concerne les dons spirituels, je ne veux pas, frères, que vous soyez dans l’ignorance. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Vous savez que, lorsque vous étiez païens, vous vous laissiez entraîner vers les idoles muettes, selon que vous étiez conduits. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'C’est pourquoi je vous déclare '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 9:39
      metadata:
        usfm: MRK.9.39
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'que nul, s’il parle par l’Esprit de Dieu, ne dit: Jésus est anathème! Et que nul ne peut dire: Jésus est le '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 13:13
      metadata:
        usfm: JHN.13.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 8:6
      metadata:
        usfm: 1CO.8.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Seigneur! Si ce n’est par le Saint-Esprit. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 12:6
      metadata:
        usfm: ROM.12.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 4:10
      metadata:
        usfm: 1PE.4.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il y a diversité de dons, mais le même Esprit; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'diversité de ministères, mais le même Seigneur; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'diversité d’opérations, mais le même Dieu qui opère tout en tous. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Or, à chacun la manifestation de l’Esprit est donnée pour l’utilité commune. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'En effet, à l’un est donnée par l’Esprit une parole de sagesse; à un autre, une parole de connaissance, selon le même Esprit; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'à un autre, la foi, par le même Esprit; à un autre, le don des guérisons, par le même Esprit; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'à un autre, le don d’opérer des miracles; à un autre, la prophétie; à un autre, le discernement des esprits; à un autre, la diversité des langues; à un autre, l’interprétation des langues. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Un seul et même Esprit '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 12:3
      metadata:
        usfm: ROM.12.3
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '6'
      metadata:
        usfm: ROM.12.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 4:7
      metadata:
        usfm: EPH.4.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'opère toutes ces choses, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 7:7
      metadata:
        usfm: 1CO.7.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 10:13
      metadata:
        usfm: 2CO.10.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: les distribuant à chacun en particulier comme il veut.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 12-31: cf. (Ro 12:3-8. Ép 4:4-16. 1 Pi 4:10, 11.) (Ga 6:2. Ph 2:1-4.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 12:4
      metadata:
        usfm: ROM.12.4
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '5'
      metadata:
        usfm: ROM.12.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 4:16
      metadata:
        usfm: EPH.4.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Car, comme le corps est un et a plusieurs membres, et comme tous les membres du corps, malgré leur nombre, ne forment qu’un seul corps, ainsi en est-il de Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nous avons tous, en effet, été baptisés dans un seul Esprit, pour former un seul corps, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 3:28
      metadata:
        usfm: GAL.3.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'soit Juifs, soit Grecs, soit esclaves, soit libres, et nous avons tous été abreuvés d’un seul Esprit. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ainsi le corps n’est pas un seul membre, mais il est formé de plusieurs membres. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Si le pied disait: Parce que je ne suis pas une main, je ne suis pas du corps, ne serait-il pas du corps pour cela? '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Et si l’oreille disait: Parce que je ne suis pas un œil, je ne suis pas du corps, ne serait-elle pas du corps pour cela? '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Si tout le corps était œil, où serait l’ouïe? S’il était tout ouïe, où serait l’odorat? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Maintenant Dieu a placé chacun des membres dans le corps comme il a voulu. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Si tous étaient un seul membre, où serait le corps? '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Maintenant donc il y a plusieurs membres, et un seul corps. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'L’œil ne peut pas dire à la main: Je n’ai pas besoin de toi; ni la tête dire aux pieds: Je n’ai pas besoin de vous. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Mais bien plutôt, les membres du corps qui paraissent être les plus faibles sont nécessaires; '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'et ceux que nous estimons être les moins honorables du corps, nous les entourons d’un plus grand honneur. Ainsi nos membres les moins honnêtes reçoivent le plus d’honneur, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'tandis que ceux qui sont honnêtes n’en ont pas besoin. Dieu a disposé le corps de manière à donner plus d’honneur à ce qui en manquait, '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'afin qu’il n’y ait pas de division dans le corps, mais que les membres aient également soin les uns des autres. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Et si un membre souffre, tous les membres souffrent avec lui; si un membre est honoré, tous les membres se réjouissent avec lui. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 12:5
      metadata:
        usfm: ROM.12.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 1:23
      metadata:
        usfm: EPH.1.23
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 4:12
      metadata:
        usfm: EPH.4.12
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 5:23
      metadata:
        usfm: EPH.5.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 1:24
      metadata:
        usfm: COL.1.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Vous êtes le corps de Christ, et vous êtes ses membres, chacun pour sa part. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Et Dieu a établi dans l’Église '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 4:11
      metadata:
        usfm: EPH.4.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'premièrement des apôtres, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 2:20
      metadata:
        usfm: EPH.2.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'secondement des prophètes, troisièmement des docteurs, ensuite ceux qui ont le don des miracles, puis ceux qui ont les dons de guérir, de secourir, de gouverner, de parler diverses langues. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Tous sont-ils apôtres? Tous sont-ils prophètes? Tous sont-ils docteurs? '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Tous ont-ils le don des miracles? Tous ont-ils le don des guérisons? Tous parlent-ils en langues? Tous interprètent-ils? '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Aspirez aux dons les meilleurs. Et je vais encore vous montrer une voie par excellence.
