document_id: 1CO.12,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Sur les dons spirituels
  - type: heading
    content: 'V. 1-11: cf. Ép 4:4-12.'
  - type: text
    content: 'Pour ce qui concerne les dons spirituels, je ne veux pas, frères, que vous soyez dans l’ignorance. '
  '10':
  - type: text
    content: 'à un autre, le don d’opérer des miracles; à un autre, la prophétie; à un autre, le discernement des esprits; à un autre, la diversité des langues; à un autre, l’interprétation des langues. '
  '11':
  - type: text
    content: 'Un seul et même Esprit '
  - type: note
    content: Ro 12:3, 6. Ép 4:7.
  - type: text
    content: 'opère toutes ces choses, '
  - type: note
    content: 1 Co 7:7. 2 Co 10:13.
  - type: text
    content: les distribuant à chacun en particulier comme il veut.
  - type: heading
    content: 'V. 12-31: cf. (Ro 12:3-8. Ép 4:4-16. 1 Pi 4:10, 11.) (Ga 6:2. Ph 2:1-4.)'
  '12':
  - type: text
    content: ' '
  - type: note
    content: Ro 12:4, 5. Ép 4:16.
  - type: text
    content: 'Car, comme le corps est un et a plusieurs membres, et comme tous les membres du corps, malgré leur nombre, ne forment qu’un seul corps, ainsi en est-il de Christ. '
  '13':
  - type: text
    content: 'Nous avons tous, en effet, été baptisés dans un seul Esprit, pour former un seul corps, '
  - type: note
    content: Ga 3:28.
  - type: text
    content: 'soit Juifs, soit Grecs, soit esclaves, soit libres, et nous avons tous été abreuvés d’un seul Esprit. '
  '14':
  - type: text
    content: 'Ainsi le corps n’est pas un seul membre, mais il est formé de plusieurs membres. '
  '15':
  - type: text
    content: 'Si le pied disait: Parce que je ne suis pas une main, je ne suis pas du corps, ne serait-il pas du corps pour cela? '
  '16':
  - type: text
    content: 'Et si l’oreille disait: Parce que je ne suis pas un œil, je ne suis pas du corps, ne serait-elle pas du corps pour cela? '
  '17':
  - type: text
    content: 'Si tout le corps était œil, où serait l’ouïe? S’il était tout ouïe, où serait l’odorat? '
  '18':
  - type: text
    content: 'Maintenant Dieu a placé chacun des membres dans le corps comme il a voulu. '
  '19':
  - type: text
    content: 'Si tous étaient un seul membre, où serait le corps? '
  '2':
  - type: text
    content: 'Vous savez que, lorsque vous étiez païens, vous vous laissiez entraîner vers les idoles muettes, selon que vous étiez conduits. '
  '20':
  - type: text
    content: 'Maintenant donc il y a plusieurs membres, et un seul corps. '
  '21':
  - type: text
    content: 'L’œil ne peut pas dire à la main: Je n’ai pas besoin de toi; ni la tête dire aux pieds: Je n’ai pas besoin de vous. '
  '22':
  - type: text
    content: 'Mais bien plutôt, les membres du corps qui paraissent être les plus faibles sont nécessaires; '
  '23':
  - type: text
    content: 'et ceux que nous estimons être les moins honorables du corps, nous les entourons d’un plus grand honneur. Ainsi nos membres les moins honnêtes reçoivent le plus d’honneur, '
  '24':
  - type: text
    content: 'tandis que ceux qui sont honnêtes n’en ont pas besoin. Dieu a disposé le corps de manière à donner plus d’honneur à ce qui en manquait, '
  '25':
  - type: text
    content: 'afin qu’il n’y ait pas de division dans le corps, mais que les membres aient également soin les uns des autres. '
  '26':
  - type: text
    content: 'Et si un membre souffre, tous les membres souffrent avec lui; si un membre est honoré, tous les membres se réjouissent avec lui. '
  '27':
  - type: note
    content: Ro 12:5. Ép 1:23; 4:12; 5:23. Col 1:24.
  - type: text
    content: 'Vous êtes le corps de Christ, et vous êtes ses membres, chacun pour sa part. '
  '28':
  - type: text
    content: 'Et Dieu a établi dans l’Église '
  - type: note
    content: Ép 4:11.
  - type: text
    content: 'premièrement des apôtres, '
  - type: note
    content: Ép 2:20.
  - type: text
    content: 'secondement des prophètes, troisièmement des docteurs, ensuite ceux qui ont le don des miracles, puis ceux qui ont les dons de guérir, de secourir, de gouverner, de parler diverses langues. '
  '29':
  - type: text
    content: 'Tous sont-ils apôtres? Tous sont-ils prophètes? Tous sont-ils docteurs? '
  '3':
  - type: text
    content: 'C’est pourquoi je vous déclare '
  - type: note
    content: Mc 9:39.
  - type: text
    content: 'que nul, s’il parle par l’Esprit de Dieu, ne dit: Jésus est anathème! Et que nul ne peut dire: Jésus est le '
  - type: note
    content: Jn 13:13. 1 Co 8:6.
  - type: text
    content: 'Seigneur! Si ce n’est par le Saint-Esprit. '
  '30':
  - type: text
    content: 'Tous ont-ils le don des miracles? Tous ont-ils le don des guérisons? Tous parlent-ils en langues? Tous interprètent-ils? '
  '31':
  - type: text
    content: Aspirez aux dons les meilleurs. Et je vais encore vous montrer une voie par excellence.
  '4':
  - type: note
    content: Ro 12:6. 1 Pi 4:10.
  - type: text
    content: 'Il y a diversité de dons, mais le même Esprit; '
  '5':
  - type: text
    content: 'diversité de ministères, mais le même Seigneur; '
  '6':
  - type: text
    content: 'diversité d’opérations, mais le même Dieu qui opère tout en tous. '
  '7':
  - type: text
    content: 'Or, à chacun la manifestation de l’Esprit est donnée pour l’utilité commune. '
  '8':
  - type: text
    content: 'En effet, à l’un est donnée par l’Esprit une parole de sagesse; à un autre, une parole de connaissance, selon le même Esprit; '
  '9':
  - type: text
    content: 'à un autre, la foi, par le même Esprit; à un autre, le don des guérisons, par le même Esprit; '
