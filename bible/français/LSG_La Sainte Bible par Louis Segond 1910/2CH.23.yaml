document_id: 2CH.23,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Athalie détrônée et mise à mort
  - type: heading
    content: 'V. 1-21: cf. 2 R 11:4-20. 2 Pi 2:9.'
  - type: text
    content: 'La septième année, Jehojada s’anima de courage, et traita alliance avec les chefs de centaines, Azaria, fils de Jerocham, Ismaël, fils de Jochanan, Azaria, fils d’Obed, Maaséja, fils d’Adaja, et Élischaphath, fils de Zicri. '
  '10':
  - type: text
    content: 'Il fit entourer le roi en plaçant tout le peuple, chacun les armes à la main, depuis le côté droit jusqu’au côté gauche de la maison, près de l’autel et près de la maison. '
  '11':
  - type: text
    content: 'On fit avancer le fils du roi, on mit sur lui le diadème et le témoignage, et on l’établit roi. Et Jehojada et ses fils l’oignirent, et ils dirent: Vive le roi! '
  '12':
  - type: text
    content: 'Athalie entendit le bruit du peuple accourant et célébrant le roi, et elle vint vers le peuple à la maison de l’Éternel. '
  '13':
  - type: text
    content: 'Elle regarda. Et voici, le roi se tenait sur son estrade à l’entrée; les chefs et les trompettes étaient près du roi; tout le peuple du pays était dans la joie, et l’on sonnait des trompettes, et les chantres avec les instruments de musique dirigeaient les chants de louanges. Athalie déchira ses vêtements, et dit: Conspiration! Conspiration! '
  '14':
  - type: text
    content: 'Alors le sacrificateur Jehojada, faisant approcher les chefs de centaines qui étaient à la tête de l’armée, leur dit: Faites-la sortir en dehors des rangs, et que l’on tue par l’épée quiconque la suivra. Car le sacrificateur avait dit: Ne la mettez pas à mort dans la maison de l’Éternel. '
  '15':
  - type: text
    content: 'On lui fit place, et elle se rendit à la maison du roi par l’entrée de la porte des chevaux: c’est là qu’ils lui donnèrent la mort. '
  '16':
  - type: text
    content: 'Jehojada traita entre lui, tout le peuple et le roi, une alliance par laquelle ils devaient être le peuple de l’Éternel. '
  '17':
  - type: note
    content: 2 R 11:18.
  - type: text
    content: 'Tout le peuple entra dans la maison de Baal, et ils la démolirent; ils brisèrent ses autels et ses images, et '
  - type: note
    content: De 13:9.
  - type: text
    content: 'ils tuèrent devant les autels Matthan, prêtre de Baal. '
  '18':
  - type: text
    content: 'Jehojada remit les fonctions de la maison de l’Éternel entre les mains des sacrificateurs, des Lévites, '
  - type: note
    content: 1 Ch 23:24, 25, 26.
  - type: text
    content: 'que David avait distribués dans la maison de l’Éternel pour qu’ils offrissent des holocaustes à l’Éternel, comme il est écrit dans la '
  - type: note
    content: Lé 1:3.
  - type: text
    content: 'loi de Moïse, au milieu des réjouissances et des chants, d’après les ordonnances de David. '
  '19':
  - type: text
    content: 'Il plaça les portiers aux portes de la maison de l’Éternel, afin qu’il n’entrât aucune personne souillée de quelque manière que ce fût. '
  '2':
  - type: text
    content: 'Ils parcoururent Juda, et ils rassemblèrent les Lévites de toutes les villes de Juda et les chefs de famille d’Israël; et ils vinrent à Jérusalem. '
  '20':
  - type: text
    content: 'Il prit les chefs de centaines, les hommes considérés, ceux qui avaient autorité parmi le peuple, et tout le peuple du pays, et il fit descendre le roi de la maison de l’Éternel. Ils entrèrent dans la maison du roi par la porte supérieure, et ils firent asseoir le roi sur le trône royal. '
  '21':
  - type: text
    content: Tout le peuple du pays se réjouissait, et la ville était tranquille. On avait fait mourir Athalie par l’épée.
  '3':
  - type: text
    content: 'Toute l’assemblée traita alliance avec le roi dans la maison de Dieu. Et Jehojada leur dit: Voici, le fils du roi régnera, '
  - type: note
    content: 2 S 7:13. 2 Ch 21:7.
  - type: text
    content: 'comme l’Éternel l’a déclaré à l’égard des fils de David. '
  '4':
  - type: note
    content: 2 R 11:5, etc.
  - type: text
    content: 'Voici ce que vous ferez. Le tiers qui parmi vous entre en service le jour du sabbat, sacrificateurs et Lévites, fera la garde des seuils, '
  '5':
  - type: text
    content: 'un autre tiers se tiendra dans la maison du roi, et un tiers à la porte de Jesod. Tout le peuple sera dans les parvis de la maison de l’Éternel. '
  '6':
  - type: text
    content: 'Que personne n’entre dans la maison de l’Éternel, excepté les sacrificateurs et les Lévites de service: ils entreront, car ils sont saints. Et tout le peuple fera la garde de l’Éternel. '
  '7':
  - type: text
    content: 'Les Lévites entoureront le roi de toutes parts, chacun les armes à la main, et l’on donnera la mort à quiconque entrera dans la maison: vous serez près du roi quand il entrera et quand il sortira. '
  '8':
  - type: text
    content: 'Les Lévites et tout Juda exécutèrent tous les ordres qu’avait donnés le sacrificateur Jehojada. Ils prirent chacun leurs gens, ceux qui entraient en service et ceux qui sortaient de service le jour du sabbat; car le sacrificateur Jehojada n’avait exempté aucune des divisions. '
  '9':
  - type: text
    content: 'Le sacrificateur Jehojada remit aux chefs de centaines les lances et les boucliers, grands et petits, qui provenaient du roi David, et qui se trouvaient dans la maison de Dieu. '
