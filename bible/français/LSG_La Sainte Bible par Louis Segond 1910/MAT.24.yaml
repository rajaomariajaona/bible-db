  - type: usfm
    marker: wj
    children:
    - type: text
      text: Alors le signe du Fils de l’homme paraîtra dans le ciel, toutes les tribus de la terre
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 1:7
      metadata:
        usfm: REV.1.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: se lamenteront, et elles verront le Fils de l’homme venant sur les nuées du ciel avec puissance et une grande gloire.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Il enverra ses anges avec
  - type: text
    text: ' '
