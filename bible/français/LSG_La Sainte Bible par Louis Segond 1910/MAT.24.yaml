      children:
      - type: text
        text: 1 Th 4:16
      metadata:
        usfm: 1TH.4.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: la trompette retentissante, et ils rassembleront ses élus des quatre vents, depuis une extrémité des cieux jusqu’à l’autre.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
