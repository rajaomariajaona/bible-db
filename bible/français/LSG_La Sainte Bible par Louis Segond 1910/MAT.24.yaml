document_id: MAT.24,93
type_code: fra
verses:
  '1':
  - type: heading
    content: La destruction de Jérusalem et l’avènement du Fils de l’homme
  - type: heading
    content: 'V. 1-14: cf. (Mc 13:1-13. Lu 21:5-19.)'
  - type: text
    content: ' '
  - type: note
    content: Mc 13:1. Lu 21:5.
  - type: text
    content: 'Comme Jésus s’en allait, au sortir du temple, ses disciples s’approchèrent pour lui en faire remarquer les constructions. '
  '10':
  - type: text
    content: Alors aussi plusieurs succomberont, et ils se trahiront, se haïront les uns les autres.
  - type: text
    content: ' '
  '11':
  - type: note
    content: 2 Pi 2:1.
  - type: text
    content: Plusieurs faux prophètes s’élèveront, et ils séduiront beaucoup de gens.
  - type: text
    content: ' '
  '12':
  - type: text
    content: Et,
  - type: text
    content: ' '
  - type: note
    content: 2 Ti 3:1, etc.
  - type: text
    content: parce que l’iniquité se sera accrue, la charité du plus grand nombre se refroidira.
  - type: text
    content: ' '
  '13':
  - type: note
    content: Mt 10:22. Mc 13:13. Lu 21:19. Ap 2:7, 10; 3:10.
  - type: text
    content: Mais celui qui persévérera jusqu’à la fin sera sauvé.
  - type: text
    content: ' '
  '14':
  - type: text
    content: Cette bonne nouvelle du royaume sera prêchée dans le monde entier, pour servir de témoignage à toutes les nations. Alors viendra la fin.
  - type: heading
    content: 'V. 15-35: cf. (Mc 13:14-31. Lu 21:20-33; 17:22-25, 31, 37.)'
  '15':
  - type: text
    content: ' '
  - type: note
    content: Mc 13:14. Lu 21:20.
  - type: text
    content: C’est pourquoi, lorsque vous verrez l’abomination de la désolation, dont a parlé le prophète
  - type: text
    content: ' '
  - type: note
    content: Da 9:27.
  - type: text
    content: Daniel, établie en lieu saint, que celui qui lit fasse attention!
  - type: text
    content: ' '
  '16':
  - type: text
    content: alors, que ceux qui seront en Judée fuient dans les montagnes;
  - type: text
    content: ' '
  '17':
  - type: text
    content: que celui qui sera sur le toit ne descende pas pour prendre ce qui est dans sa maison;
  - type: text
    content: ' '
  '18':
  - type: text
    content: et que celui qui sera dans les champs ne retourne pas en arrière pour prendre son manteau.
  - type: text
    content: ' '
  '19':
  - type: text
    content: Malheur aux femmes qui seront enceintes et à celles qui allaiteront en ces jours-là!
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Mais il leur dit: '
  - type: text
    content: Voyez-vous tout cela? Je vous le dis en vérité,
  - type: text
    content: ' '
  - type: note
    content: 1 R 9:7, 8. Mi 3:12. Lu 19:44.
  - type: text
    content: il ne restera pas ici pierre sur pierre qui ne soit renversée.
  - type: text
    content: ' '
  '20':
  - type: text
    content: Priez pour que votre fuite n’arrive pas en hiver, ni un jour de
  - type: text
    content: ' '
  - type: note
    content: Ac 1:12.
  - type: text
    content: sabbat.
  - type: text
    content: ' '
  '21':
  - type: note
    content: Da 12:1.
  - type: text
    content: Car alors, la détresse sera si grande qu’il n’y en a point eu de pareille depuis le commencement du monde jusqu’à présent, et qu’il n’y en aura jamais.
  - type: text
    content: ' '
  '22':
  - type: text
    content: Et, si ces jours n’étaient abrégés, personne ne serait sauvé; mais, à cause des élus, ces jours seront abrégés.
  - type: text
    content: ' '
  '23':
  - type: text
    content: 'Si quelqu’un vous dit alors:'
  - type: text
    content: ' '
  - type: note
    content: Mc 13:21. Lu 21:8.
  - type: text
    content: 'Le Christ est ici, ou: Il est là, ne le croyez pas.'
  - type: text
    content: ' '
  '24':
  - type: note
    content: De 13:1. 2 Th 2:11.
  - type: text
    content: Car il s’élèvera de faux Christs et de faux prophètes; ils feront de grands prodiges et des miracles, au point de séduire, s’il était possible, même les élus.
  - type: text
    content: ' '
  '25':
  - type: text
    content: Voici, je vous l’ai annoncé d’avance.
  - type: text
    content: ' '
  '26':
  - type: note
    content: Lu 17:23.
  - type: text
    content: 'Si donc on vous dit: Voici, il est dans le désert, n’y allez pas; voici, il est dans les chambres, ne le croyez pas.'
  - type: text
    content: ' '
  '27':
  - type: text
    content: Car, comme l’éclair part de l’orient et se montre jusqu’en occident, ainsi sera l’avènement du Fils de l’homme.
  - type: text
    content: ' '
  '28':
  - type: note
    content: Job 39:33. Lu 17:37.
  - type: text
    content: En quelque lieu que soit le cadavre, là s’assembleront les aigles.
  - type: text
    content: ' '
  '29':
  - type: note
    content: És 13:10. Éz 32:7. Joë 2:31; 3:15. Mc 13:24. Lu 21:25.
  - type: text
    content: Aussitôt après ces jours de détresse, le soleil s’obscurcira, la lune ne donnera plus sa lumière, les étoiles tomberont du ciel, et les puissances des cieux seront ébranlées.
  - type: text
    content: ' '
  '3':
  - type: note
    content: Mc 13:1, 3. Lu 21:7.
  - type: text
    content: 'Il s’assit sur la montagne des oliviers. Et les disciples vinrent en particulier lui faire cette question: '
  - type: note
    content: Ac 1:6.
  - type: text
    content: 'Dis-nous, quand cela arrivera-t-il, et quel sera le signe de ton avènement et de la fin du monde? '
  '30':
  - type: note
    content: Da 7:10. Mt 16:27; 25:31; 26:64. Mc 13:26; 14:62. Lu 21:27. Ac 1:11. 2 Th 1:10. Ap 1:7.
  - type: text
    content: Alors le signe du Fils de l’homme paraîtra dans le ciel, toutes les tribus de la terre
  - type: text
    content: ' '
  - type: note
    content: Ap 1:7.
  - type: text
    content: se lamenteront, et elles verront le Fils de l’homme venant sur les nuées du ciel avec puissance et une grande gloire.
  - type: text
    content: ' '
  '31':
  - type: text
    content: Il enverra ses anges avec
  - type: text
    content: ' '
  - type: note
    content: 1 Co 15:52. 1 Th 4:16.
  - type: text
    content: la trompette retentissante, et ils rassembleront ses élus des quatre vents, depuis une extrémité des cieux jusqu’à l’autre.
  - type: text
    content: ' '
  '32':
  - type: note
    content: Mc 13:28. Lu 21:29.
  - type: text
    content: Instruisez-vous par une comparaison tirée du figuier. Dès que ses branches deviennent tendres, et que les feuilles poussent, vous connaissez que l’été est proche.
  - type: text
    content: ' '
  '33':
  - type: text
    content: De même, quand vous verrez toutes ces choses, sachez que le Fils de l’homme est proche, à la porte.
  - type: text
    content: ' '
  '34':
  - type: text
    content: Je vous le dis en vérité, cette génération ne passera point, que tout cela n’arrive.
  - type: text
    content: ' '
  '35':
  - type: note
    content: Ps 102:27. És 51:6. Mc 13:31. Hé 1:11.
  - type: text
    content: Le ciel et la terre passeront, mais mes paroles ne passeront point.
  - type: heading
    content: Exhortation à la vigilance
  - type: heading
    content: 'V. 36-51: cf. (Mc 13:32-37. Lu 21:34-36; 17:26-30, 34-36.)'
  '36':
  - type: text
    content: ' '
  - type: note
    content: Mc 13:32. Ac 1:7.
  - type: text
    content: Pour ce qui est du jour et de l’heure, personne ne le sait, ni les anges des cieux, ni le Fils, mais le Père seul.
  - type: text
    content: ' '
  '37':
  - type: note
    content: Ge 6:2. Lu 17:26. 1 Pi 3:20. 2 Pi 2:5.
  - type: text
    content: Ce qui arriva du temps de Noé arrivera de même à l’avènement du Fils de l’homme.
  - type: text
    content: ' '
  '38':
  - type: text
    content: Car, dans les jours qui précédèrent le déluge, les hommes mangeaient et buvaient, se mariaient et mariaient leurs enfants,
  - type: text
    content: ' '
  - type: note
    content: Ge 7:7.
  - type: text
    content: jusqu’au jour où Noé entra dans l’arche;
  - type: text
    content: ' '
  '39':
  - type: text
    content: 'et ils ne se doutèrent de rien, jusqu’à ce que le déluge vînt et les emportât tous: il en sera de même à l’avènement du Fils de l’homme.'
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'Jésus leur répondit: '
  - type: note
    content: Jé 29:8. Ép 5:6. Col 2:18. 2 Th 2:3. 1 Jn 4:1.
  - type: text
    content: Prenez garde que personne ne vous séduise.
  '40':
  - type: note
    content: Lu 17:34. 1 Th 4:17.
  - type: text
    content: Alors, de deux hommes qui seront dans un champ, l’un sera pris et l’autre laissé;
  - type: text
    content: ' '
  '41':
  - type: text
    content: de deux femmes qui moudront à la meule, l’une sera prise et l’autre laissée.
  - type: text
    content: ' '
  '42':
  - type: note
    content: Mt 25:13. Mc 13:33. Lu 12:40; 21:36.
  - type: text
    content: Veillez donc, puisque vous ne savez pas quel jour votre Seigneur viendra.
  - type: text
    content: ' '
  '43':
  - type: note
    content: Lu 12:39. 1 Th 5:2. 2 Pi 3:10. Ap 3:3; 16:15.
  - type: text
    content: Sachez-le bien, si le maître de la maison savait à quelle veille de la nuit le voleur doit venir, il veillerait et ne laisserait pas percer sa maison.
  - type: text
    content: ' '
  '44':
  - type: text
    content: C’est pourquoi, vous aussi, tenez-vous prêts, car le Fils de l’homme viendra à l’heure où vous n’y penserez pas.
  - type: text
    content: ' '
  '45':
  - type: note
    content: Mt 25:21. Lu 12:42.
  - type: text
    content: Quel est donc le serviteur fidèle et prudent, que son maître a établi sur ses gens, pour leur donner la nourriture au temps convenable?
  - type: text
    content: ' '
  '46':
  - type: text
    content: Heureux ce serviteur, que son maître, à son arrivée, trouvera faisant ainsi!
  - type: text
    content: ' '
  '47':
  - type: text
    content: Je vous le dis en vérité, il l’établira sur tous ses biens.
  - type: text
    content: ' '
  '48':
  - type: text
    content: 'Mais, si c’est un méchant serviteur, qui dise en lui-même: Mon maître tarde à venir,'
  - type: text
    content: ' '
  '49':
  - type: text
    content: s’il se met à battre ses compagnons, s’il mange et boit avec les ivrognes,
  - type: text
    content: ' '
  '5':
  - type: text
    content: ' '
  - type: note
    content: Jé 14:14; 23:25. Jn 5:43.
  - type: text
    content: 'Car plusieurs viendront sous mon nom, disant: C’est moi qui suis le Christ. Et ils séduiront beaucoup de gens.'
  - type: text
    content: ' '
  '50':
  - type: text
    content: le maître de ce serviteur viendra le jour où il ne s’y attend pas et à l’heure qu’il ne connaît pas,
  - type: text
    content: ' '
  '51':
  - type: text
    content: 'il le mettra en pièces, et lui donnera sa part avec les hypocrites:'
  - type: text
    content: ' '
  - type: note
    content: Mt 8:12; 13:42; 22:13; 25:30. Lu 13:28.
  - type: text
    content: c’est là qu’il y aura des pleurs et des grincements de dents.
  '6':
  - type: text
    content: 'Vous entendrez parler de guerres et de bruits de guerres: gardez-vous d’être troublés, car il faut que ces choses arrivent. Mais ce ne sera pas encore la fin.'
  - type: text
    content: ' '
  '7':
  - type: note
    content: És 19:2.
  - type: text
    content: Une nation s’élèvera contre une nation, et un royaume contre un royaume, et il y aura, en divers lieux, des famines et des tremblements de terre.
  - type: text
    content: ' '
  '8':
  - type: text
    content: Tout cela ne sera que le commencement des douleurs.
  - type: text
    content: ' '
  '9':
  - type: note
    content: Mt 10:17. Lu 21:11, 12. Jn 15:20; 16:2. Ap 2:10.
  - type: text
    content: Alors on vous livrera aux tourments, et l’on vous fera mourir; et vous serez haïs de toutes les nations, à cause de mon nom.
  - type: text
    content: ' '
