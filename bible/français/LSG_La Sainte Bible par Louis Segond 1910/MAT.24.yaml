    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Sachez-le bien, si le maître de la maison savait à quelle veille de la nuit le voleur doit venir, il veillerait et ne laisserait pas percer sa maison.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: C’est pourquoi, vous aussi, tenez-vous prêts, car le Fils de l’homme viendra à l’heure où vous n’y penserez pas.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
