    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ce qui arriva du temps de Noé arrivera de même à l’avènement du Fils de l’homme.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Car, dans les jours qui précédèrent le déluge, les hommes mangeaient et buvaient, se mariaient et mariaient leurs enfants,
  - type: text
    text: ' '
  - type: usfm
    marker: x
