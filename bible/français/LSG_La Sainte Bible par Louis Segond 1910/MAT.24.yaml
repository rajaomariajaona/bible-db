document_id: MAT.24
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La destruction de Jérusalem et l’avènement du Fils de l’homme
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-14: cf. (Mc 13:1-13. Lu 21:5-19.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 13:1
      metadata:
        usfm: MRK.13.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 21:5
      metadata:
        usfm: LUK.21.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Comme Jésus s’en allait, au sortir du temple, ses disciples s’approchèrent pour lui en faire remarquer les constructions. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mais il leur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Voyez-vous tout cela? Je vous le dis en vérité,
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 9:7
      metadata:
        usfm: 1KI.9.7
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '8'
      metadata:
        usfm: 1KI.9.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mi 3:12
      metadata:
        usfm: MIC.3.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 19:44
      metadata:
        usfm: LUK.19.44
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: il ne restera pas ici pierre sur pierre qui ne soit renversée.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 13:1
      metadata:
        usfm: MRK.13.1
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '3'
      metadata:
        usfm: MRK.13.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 21:7
      metadata:
        usfm: LUK.21.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il s’assit sur la montagne des oliviers. Et les disciples vinrent en particulier lui faire cette question: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 1:6
      metadata:
        usfm: ACT.1.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Dis-nous, quand cela arrivera-t-il, et quel sera le signe de ton avènement et de la fin du monde? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Jésus leur répondit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 29:8
      metadata:
        usfm: JER.29.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 5:6
      metadata:
        usfm: EPH.5.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 2:18
      metadata:
        usfm: COL.2.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Th 2:3
      metadata:
        usfm: 2TH.2.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 4:1
      metadata:
        usfm: 1JN.4.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Prenez garde que personne ne vous séduise.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 14:14
      metadata:
        usfm: JER.14.14
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 23:25
      metadata:
        usfm: JER.23.25
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 5:43
      metadata:
        usfm: JHN.5.43
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Car plusieurs viendront sous mon nom, disant: C’est moi qui suis le Christ. Et ils séduiront beaucoup de gens.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Vous entendrez parler de guerres et de bruits de guerres: gardez-vous d’être troublés, car il faut que ces choses arrivent. Mais ce ne sera pas encore la fin.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 19:2
      metadata:
        usfm: ISA.19.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Une nation s’élèvera contre une nation, et un royaume contre un royaume, et il y aura, en divers lieux, des famines et des tremblements de terre.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Tout cela ne sera que le commencement des douleurs.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 10:17
      metadata:
        usfm: MAT.10.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 21:11
      metadata:
        usfm: LUK.21.11
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '12'
      metadata:
        usfm: LUK.21.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 15:20
      metadata:
        usfm: JHN.15.20
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 16:2
      metadata:
        usfm: JHN.16.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 2:10
      metadata:
        usfm: REV.2.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Alors on vous livrera aux tourments, et l’on vous fera mourir; et vous serez haïs de toutes les nations, à cause de mon nom.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Alors aussi plusieurs succomberont, et ils se trahiront, se haïront les uns les autres.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Pi 2:1
      metadata:
        usfm: 2PE.2.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Plusieurs faux prophètes s’élèveront, et ils séduiront beaucoup de gens.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Et,
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Ti 3:1, etc.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: parce que l’iniquité se sera accrue, la charité du plus grand nombre se refroidira.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 10:22
      metadata:
        usfm: MAT.10.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 13:13
      metadata:
        usfm: MRK.13.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 21:19
      metadata:
        usfm: LUK.21.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 2:7
      metadata:
        usfm: REV.2.7
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '10'
      metadata:
        usfm: REV.2.10
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 3:10
      metadata:
        usfm: REV.3.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais celui qui persévérera jusqu’à la fin sera sauvé.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Cette bonne nouvelle du royaume sera prêchée dans le monde entier, pour servir de témoignage à toutes les nations. Alors viendra la fin.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 15-35: cf. (Mc 13:14-31. Lu 21:20-33; 17:22-25, 31, 37.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 13:14
      metadata:
        usfm: MRK.13.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 21:20
      metadata:
        usfm: LUK.21.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: C’est pourquoi, lorsque vous verrez l’abomination de la désolation, dont a parlé le prophète
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Da 9:27
      metadata:
        usfm: DAN.9.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Daniel, établie en lieu saint, que celui qui lit fasse attention!
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: alors, que ceux qui seront en Judée fuient dans les montagnes;
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: que celui qui sera sur le toit ne descende pas pour prendre ce qui est dans sa maison;
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: et que celui qui sera dans les champs ne retourne pas en arrière pour prendre son manteau.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Malheur aux femmes qui seront enceintes et à celles qui allaiteront en ces jours-là!
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Priez pour que votre fuite n’arrive pas en hiver, ni un jour de
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 1:12
      metadata:
        usfm: ACT.1.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: sabbat.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Da 12:1
      metadata:
        usfm: DAN.12.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Car alors, la détresse sera si grande qu’il n’y en a point eu de pareille depuis le commencement du monde jusqu’à présent, et qu’il n’y en aura jamais.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Et, si ces jours n’étaient abrégés, personne ne serait sauvé; mais, à cause des élus, ces jours seront abrégés.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Si quelqu’un vous dit alors:'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 13:21
      metadata:
        usfm: MRK.13.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 21:8
      metadata:
        usfm: LUK.21.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Le Christ est ici, ou: Il est là, ne le croyez pas.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 13:1
      metadata:
        usfm: DEU.13.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Th 2:11
      metadata:
        usfm: 2TH.2.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Car il s’élèvera de faux Christs et de faux prophètes; ils feront de grands prodiges et des miracles, au point de séduire, s’il était possible, même les élus.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Voici, je vous l’ai annoncé d’avance.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 17:23
      metadata:
        usfm: LUK.17.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Si donc on vous dit: Voici, il est dans le désert, n’y allez pas; voici, il est dans les chambres, ne le croyez pas.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Car, comme l’éclair part de l’orient et se montre jusqu’en occident, ainsi sera l’avènement du Fils de l’homme.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 39:33
      metadata:
        usfm: JOB.39.33
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 17:37
      metadata:
        usfm: LUK.17.37
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: En quelque lieu que soit le cadavre, là s’assembleront les aigles.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 13:10
      metadata:
        usfm: ISA.13.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 32:7
      metadata:
        usfm: EZK.32.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Joë 2:31
      metadata:
        usfm: JOL.2.31
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 3:15
      metadata:
        usfm: JOL.3.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 13:24
      metadata:
        usfm: MRK.13.24
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 21:25
      metadata:
        usfm: LUK.21.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Aussitôt après ces jours de détresse, le soleil s’obscurcira, la lune ne donnera plus sa lumière, les étoiles tomberont du ciel, et les puissances des cieux seront ébranlées.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Da 7:10
      metadata:
        usfm: DAN.7.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 16:27
      metadata:
        usfm: MAT.16.27
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 25:31
      metadata:
        usfm: MAT.25.31
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 26:64
      metadata:
        usfm: MAT.26.64
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 13:26
      metadata:
        usfm: MRK.13.26
    - type: text
