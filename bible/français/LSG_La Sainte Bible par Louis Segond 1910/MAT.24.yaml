    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Instruisez-vous par une comparaison tirée du figuier. Dès que ses branches deviennent tendres, et que les feuilles poussent, vous connaissez que l’été est proche.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: De même, quand vous verrez toutes ces choses, sachez que le Fils de l’homme est proche, à la porte.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je vous le dis en vérité, cette génération ne passera point, que tout cela n’arrive.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
