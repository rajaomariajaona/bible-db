    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: de deux femmes qui moudront à la meule, l’une sera prise et l’autre laissée.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
