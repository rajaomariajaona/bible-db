    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Quel est donc le serviteur fidèle et prudent, que son maître a établi sur ses gens, pour leur donner la nourriture au temps convenable?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Heureux ce serviteur, que son maître, à son arrivée, trouvera faisant ainsi!
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je vous le dis en vérité, il l’établira sur tous ses biens.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Mais, si c’est un méchant serviteur, qui dise en lui-même: Mon maître tarde à venir,'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: s’il se met à battre ses compagnons, s’il mange et boit avec les ivrognes,
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: le maître de ce serviteur viendra le jour où il ne s’y attend pas et à l’heure qu’il ne connaît pas,
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'il le mettra en pièces, et lui donnera sa part avec les hypocrites:'
  - type: text
