document_id: 2SA.24
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dénombrement et peste
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-9: cf. (1 Ch 21:1-6; 27:23, 24.) (2 R 20:12, etc. 2 Ch 32:25, 26.) Ps 81:13.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Ch 21:1, etc.
    marker-yv: yv-n
  - type: text
    text: 'La colère de l’Éternel s’enflamma de nouveau contre Israël, et il excita David contre eux, en disant: Va, fais le dénombrement d’Israël et de Juda. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Et le roi dit à Joab, qui était chef de l’armée et qui se trouvait près de lui: Parcours toutes les tribus d’Israël, depuis Dan jusqu’à Beer-Schéba; qu’on fasse le dénombrement du peuple, et que je sache à combien il s’élève. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Joab dit au roi: Que l’Éternel, ton Dieu, rende le peuple cent fois plus nombreux, et que les yeux du roi mon seigneur le voient! Mais pourquoi le roi mon seigneur veut-il faire cela? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Le roi persista dans l’ordre qu’il donnait à Joab et aux chefs de l’armée; et Joab et les chefs de l’armée quittèrent le roi pour faire le dénombrement du peuple d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ils passèrent le Jourdain, et ils campèrent à Aroër, à droite de la ville qui est au milieu de la vallée de Gad, et près de Jaezer. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ils allèrent en Galaad et dans le pays de Thachthim-Hodschi. Ils allèrent à Dan-Jaan, et aux environs de Sidon. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ils allèrent à la forteresse de Tyr, et dans toutes les villes des Héviens et des Cananéens. Ils terminèrent par le midi de Juda, à Beer-Schéba. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ils parcoururent ainsi tout le pays, et ils arrivèrent à Jérusalem au bout de neuf mois et vingt jours. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Joab remit au roi le rôle du dénombrement du peuple: il y avait en Israël huit cent mille hommes de guerre tirant l’épée, et en Juda cinq cent mille hommes.'
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 10-25: cf. (1 Ch 21:7-30. 2 Ch 3:1.) Ps 38. Joë 2:14.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'David sentit battre son cœur, après qu’il eut ainsi fait le dénombrement du peuple. Et il dit à l’Éternel: J’ai commis un grand péché en faisant cela! Maintenant, ô Éternel, daigne pardonner l’iniquité de ton serviteur, car j’ai complètement agi en insensé! '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Le lendemain, quand David se leva, la parole de l’Éternel fut ainsi adressée à Gad le prophète, le voyant de David: '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Va dire à David: Ainsi parle l’Éternel: Je te propose trois fléaux; choisis-en un, et je t’en frapperai. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Gad alla vers David, et lui fit connaître la chose, en disant: Veux-tu sept années de famine dans ton pays, ou bien trois mois de fuite devant tes ennemis qui te poursuivront, ou bien trois jours de peste dans ton pays? Maintenant choisis, et vois ce que je dois répondre à celui qui m’envoie. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'David répondit à Gad: Je suis dans une grande angoisse! Oh! Tombons entre les mains de l’Éternel, car ses compassions sont immenses; mais que je ne tombe pas entre les mains des hommes! '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'L’Éternel envoya la peste en Israël, depuis le matin jusqu’au temps fixé; et, de Dan à Beer-Schéba, il mourut soixante-dix mille hommes parmi le peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Comme l’ange étendait la main sur Jérusalem pour la détruire, l’Éternel se repentit de ce mal, et il dit à l’ange qui faisait périr le peuple: Assez! Retire maintenant ta main. L’ange de l’Éternel était près de l’aire d’Aravna, le Jébusien. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'David, voyant l’ange qui frappait parmi le peuple, dit à l’Éternel: Voici, j’ai péché! C’est moi qui suis coupable; mais ces brebis, qu’ont-elles fait? Que ta main soit donc sur moi et sur la maison de mon père! '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ce jour-là, Gad vint auprès de David, et lui dit: Monte, élève un autel à l’Éternel dans l’aire d’Aravna, le Jébusien. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'David monta, selon la parole de Gad, comme l’Éternel l’avait ordonné. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Aravna regarda, et il vit le roi et ses serviteurs qui se dirigeaient vers lui; et Aravna sortit, et se prosterna devant le roi, le visage contre terre. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Aravna dit: Pourquoi mon seigneur le roi vient-il vers son serviteur? Et David répondit: Pour acheter de toi l’aire et pour y bâtir un autel à l’Éternel, afin que la plaie se retire de dessus le peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Aravna dit à David: Que mon seigneur le roi prenne l’aire, et qu’il y offre les sacrifices qu’il lui plaira; vois, les bœufs seront pour l’holocauste, et les chars avec l’attelage serviront de bois. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Aravna donna le tout au roi. Et Aravna dit au roi: Que l’Éternel, ton Dieu, te soit favorable! '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Mais le roi dit à Aravna: Non! Je veux l’acheter de toi à prix d’argent, et je n’offrirai point à l’Éternel, mon Dieu, des holocaustes qui ne me coûtent rien. Et David acheta l’aire et les bœufs pour cinquante sicles d’argent. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: David bâtit là un autel à l’Éternel, et il offrit des holocaustes et des sacrifices d’actions de grâces. Alors l’Éternel fut apaisé envers le pays, et la plaie se retira d’Israël.
