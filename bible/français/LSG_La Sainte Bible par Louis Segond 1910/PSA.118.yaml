document_id: PSA.118
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: Esd 3:10, 11; 6:16. (Ps 68; 110.) (Mt 21:9, 42. Ac 4:11, 12. 1 Pi 2:4-7.)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Louez l’Éternel, car il est bon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car sa miséricorde dure à toujours!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Qu’Israël dise:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car sa miséricorde dure à toujours!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Que la maison d’Aaron dise:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car sa miséricorde dure à toujours!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Que ceux qui craignent l’Éternel disent:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car sa miséricorde dure à toujours!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Du sein de la détresse j’ai invoqué l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’Éternel m’a exaucé, m’a mis au large.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 8:31
      metadata:
        usfm: ROM.8.31
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'L’Éternel est pour moi, je ne crains rien:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que peuvent me faire des hommes?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: L’Éternel est mon secours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je me réjouis à la vue de mes ennemis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 62:9
      metadata:
        usfm: PSA.62.9
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '10'
      metadata:
        usfm: PSA.62.10
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 146:3
      metadata:
        usfm: PSA.146.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 17:5
      metadata:
        usfm: JER.17.5
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '7'
      metadata:
        usfm: JER.17.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Mieux vaut chercher un refuge en l’Éternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que de se confier à l’homme;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mieux vaut chercher un refuge en l’Éternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que de se confier aux grands.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Toutes les nations m’environnaient:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au nom de l’Éternel, je les taille en pièces.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Elles m’environnaient, m’enveloppaient:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au nom de l’Éternel, je les taille en pièces.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Elles m’environnaient comme des abeilles;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elles s’éteignent comme un feu d’épines;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au nom de l’Éternel, je les taille en pièces.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tu me poussais pour me faire tomber;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais l’Éternel m’a secouru.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: L’Éternel est ma force et le sujet de mes louanges;
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est lui qui m’a sauvé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Des cris de triomphe et de salut s’élèvent dans les tentes des justes:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: La droite de l’Éternel manifeste sa puissance!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: La droite de l’Éternel est élevée!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 1:51
      metadata:
        usfm: LUK.1.51
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: La droite de l’Éternel manifeste sa puissance!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Je ne mourrai pas, je vivrai,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je raconterai les œuvres de l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: L’Éternel m’a châtié,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais il ne m’a pas livré à la mort.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ouvrez-moi les portes de la justice:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’entrerai, je louerai l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Voici la porte de l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est par elle qu’entrent les justes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Je te loue, parce que tu m’as exaucé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parce que tu m’as sauvé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 8:14
      metadata:
        usfm: ISA.8.14
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 28:16
      metadata:
        usfm: ISA.28.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 21:42
      metadata:
        usfm: MAT.21.42
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 12:10
      metadata:
        usfm: MRK.12.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 20:17
      metadata:
        usfm: LUK.20.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 4:11
      metadata:
        usfm: ACT.4.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 9:33
      metadata:
        usfm: ROM.9.33
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 2:20
      metadata:
        usfm: EPH.2.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 2:1
      metadata:
        usfm: 1PE.2.1
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '7'
      metadata:
        usfm: 1PE.2.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: La pierre qu’ont rejetée ceux qui bâtissaient
- type: usfm
  marker: q1
  children:
  - type: text
    text: Est devenue la principale de l’angle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'C’est de l’Éternel que cela est venu:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est un prodige à nos yeux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'C’est ici la journée que l’Éternel a faite:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’elle soit pour nous un sujet d’allégresse et de joie!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: O Éternel, accorde le salut!
- type: usfm
  marker: q1
  children:
  - type: text
    text: O Éternel, donne la prospérité!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Béni soit celui qui vient au nom de l’Éternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous vous bénissons de la maison de l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: L’Éternel est Dieu, et il nous éclaire.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Attachez la victime avec des liens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amenez-la jusqu’aux cornes de l’autel!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Tu es mon Dieu, et je te louerai;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon Dieu! Je t’exalterai.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Louez l’Éternel, car il est bon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car sa miséricorde dure à toujours!
