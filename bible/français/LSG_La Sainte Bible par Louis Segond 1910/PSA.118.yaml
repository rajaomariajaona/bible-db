        text: .
      marker-yv: yv-n
    - type: text
      text: La pierre qu’ont rejetée ceux qui bâtissaient
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Est devenue la principale de l’angle.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'C’est de l’Éternel que cela est venu:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est un prodige à nos yeux.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'C’est ici la journée que l’Éternel a faite:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’elle soit pour nous un sujet d’allégresse et de joie!
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Éternel, accorde le salut!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Éternel, donne la prospérité!
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Béni soit celui qui vient au nom de l’Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous vous bénissons de la maison de l’Éternel.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel est Dieu, et il nous éclaire.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Attachez la victime avec des liens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amenez-la jusqu’aux cornes de l’autel!
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu es mon Dieu, et je te louerai;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon Dieu! Je t’exalterai.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Louez l’Éternel, car il est bon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car sa miséricorde dure à toujours!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Que la maison d’Aaron dise:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car sa miséricorde dure à toujours!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Que ceux qui craignent l’Éternel disent:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car sa miséricorde dure à toujours!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Du sein de la détresse j’ai invoqué l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel m’a exaucé, m’a mis au large.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 8:31
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'L’Éternel est pour moi, je ne crains rien:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que peuvent me faire des hommes?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel est mon secours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je me réjouis à la vue de mes ennemis.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
