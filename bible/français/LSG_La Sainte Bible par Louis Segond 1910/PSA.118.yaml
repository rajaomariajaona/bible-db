document_id: PSA.118,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: Esd 3:10, 11; 6:16. (Ps 68; 110.) (Mt 21:9, 42. Ac 4:11, 12. 1 Pi 2:4-7.)
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Louez l’Éternel, car il est bon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car sa miséricorde dure à toujours!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Toutes les nations m’environnaient:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au nom de l’Éternel, je les taille en pièces.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Elles m’environnaient, m’enveloppaient:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au nom de l’Éternel, je les taille en pièces.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles m’environnaient comme des abeilles;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles s’éteignent comme un feu d’épines;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au nom de l’Éternel, je les taille en pièces.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu me poussais pour me faire tomber;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais l’Éternel m’a secouru.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel est ma force et le sujet de mes louanges;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est lui qui m’a sauvé.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Des cris de triomphe et de salut s’élèvent dans les tentes des justes:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La droite de l’Éternel manifeste sa puissance!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La droite de l’Éternel est élevée!
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 1:51
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: La droite de l’Éternel manifeste sa puissance!
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ne mourrai pas, je vivrai,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je raconterai les œuvres de l’Éternel.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel m’a châtié,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais il ne m’a pas livré à la mort.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ouvrez-moi les portes de la justice:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’entrerai, je louerai l’Éternel.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Qu’Israël dise:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car sa miséricorde dure à toujours!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici la porte de l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est par elle qu’entrent les justes.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je te loue, parce que tu m’as exaucé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce que tu m’as sauvé.
