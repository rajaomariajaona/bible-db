          text: '7'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Mieux vaut chercher un refuge en l’Éternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que de se confier à l’homme;
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mieux vaut chercher un refuge en l’Éternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que de se confier aux grands.
