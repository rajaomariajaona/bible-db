document_id: PSA.118,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Esd 3:10, 11; 6:16. (Ps 68; 110.) (Mt 21:9, 42. Ac 4:11, 12. 1 Pi 2:4-7.)
  - type: text
    content: Louez l’Éternel, car il est bon,
  - type: text
    content: Car sa miséricorde dure à toujours!
  '10':
  - type: text
    content: 'Toutes les nations m’environnaient:'
  - type: text
    content: Au nom de l’Éternel, je les taille en pièces.
  '11':
  - type: text
    content: 'Elles m’environnaient, m’enveloppaient:'
  - type: text
    content: Au nom de l’Éternel, je les taille en pièces.
  '12':
  - type: text
    content: Elles m’environnaient comme des abeilles;
  - type: text
    content: Elles s’éteignent comme un feu d’épines;
  - type: text
    content: Au nom de l’Éternel, je les taille en pièces.
  '13':
  - type: text
    content: Tu me poussais pour me faire tomber;
  - type: text
    content: Mais l’Éternel m’a secouru.
  '14':
  - type: text
    content: L’Éternel est ma force et le sujet de mes louanges;
  - type: text
    content: C’est lui qui m’a sauvé.
  '15':
  - type: text
    content: 'Des cris de triomphe et de salut s’élèvent dans les tentes des justes:'
  - type: text
    content: La droite de l’Éternel manifeste sa puissance!
  '16':
  - type: text
    content: La droite de l’Éternel est élevée!
  - type: note
    content: Lu 1:51.
  - type: text
    content: La droite de l’Éternel manifeste sa puissance!
  '17':
  - type: text
    content: Je ne mourrai pas, je vivrai,
  - type: text
    content: Et je raconterai les œuvres de l’Éternel.
  '18':
  - type: text
    content: L’Éternel m’a châtié,
  - type: text
    content: Mais il ne m’a pas livré à la mort.
  '19':
  - type: text
    content: 'Ouvrez-moi les portes de la justice:'
  - type: text
    content: J’entrerai, je louerai l’Éternel.
  '2':
  - type: text
    content: 'Qu’Israël dise:'
  - type: text
    content: Car sa miséricorde dure à toujours!
  '20':
  - type: text
    content: 'Voici la porte de l’Éternel:'
  - type: text
    content: C’est par elle qu’entrent les justes.
  '21':
  - type: text
    content: Je te loue, parce que tu m’as exaucé,
  - type: text
    content: Parce que tu m’as sauvé.
  '22':
  - type: text
    content: ' '
  - type: note
    content: És 8:14; 28:16. Mt 21:42. Mc 12:10. Lu 20:17. Ac 4:11. Ro 9:33. Ép 2:20. 1 Pi 2:1, 7.
  - type: text
    content: La pierre qu’ont rejetée ceux qui bâtissaient
  - type: text
    content: Est devenue la principale de l’angle.
  '23':
  - type: text
    content: 'C’est de l’Éternel que cela est venu:'
  - type: text
    content: C’est un prodige à nos yeux.
  '24':
  - type: text
    content: 'C’est ici la journée que l’Éternel a faite:'
  - type: text
    content: Qu’elle soit pour nous un sujet d’allégresse et de joie!
  '25':
  - type: text
    content: O Éternel, accorde le salut!
  - type: text
    content: O Éternel, donne la prospérité!
  '26':
  - type: text
    content: Béni soit celui qui vient au nom de l’Éternel!
  - type: text
    content: Nous vous bénissons de la maison de l’Éternel.
  '27':
  - type: text
    content: L’Éternel est Dieu, et il nous éclaire.
  - type: text
    content: Attachez la victime avec des liens,
  - type: text
    content: Amenez-la jusqu’aux cornes de l’autel!
  '28':
  - type: text
    content: Tu es mon Dieu, et je te louerai;
  - type: text
    content: Mon Dieu! Je t’exalterai.
  '29':
  - type: text
    content: Louez l’Éternel, car il est bon,
  - type: text
    content: Car sa miséricorde dure à toujours!
  '3':
  - type: text
    content: 'Que la maison d’Aaron dise:'
  - type: text
    content: Car sa miséricorde dure à toujours!
  '4':
  - type: text
    content: 'Que ceux qui craignent l’Éternel disent:'
  - type: text
    content: Car sa miséricorde dure à toujours!
  '5':
  - type: text
    content: 'Du sein de la détresse j’ai invoqué l’Éternel:'
  - type: text
    content: L’Éternel m’a exaucé, m’a mis au large.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Ro 8:31.
  - type: text
    content: 'L’Éternel est pour moi, je ne crains rien:'
  - type: text
    content: Que peuvent me faire des hommes?
  '7':
  - type: text
    content: L’Éternel est mon secours,
  - type: text
    content: Et je me réjouis à la vue de mes ennemis.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Ps 62:9, 10; 146:3. Jé 17:5, 7.
  - type: text
    content: Mieux vaut chercher un refuge en l’Éternel
  - type: text
    content: Que de se confier à l’homme;
  '9':
  - type: text
    content: Mieux vaut chercher un refuge en l’Éternel
  - type: text
    content: Que de se confier aux grands.
