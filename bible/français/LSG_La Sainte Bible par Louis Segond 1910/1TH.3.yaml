document_id: 1TH.3,93
type_code: fra
verses:
  '1':
  - type: text
    content: 'C’est pourquoi, impatients que nous étions, et nous décidant à rester seuls à Athènes, '
  '10':
  - type: note
    content: Ro 1:10, 11; 5:23. 2 Ti 1:4.
  - type: text
    content: 'Nuit et jour, nous le prions avec une extrême ardeur de nous permettre de vous voir, et de compléter ce qui manque à votre foi. '
  '11':
  - type: text
    content: 'Que Dieu lui-même, notre Père, et notre Seigneur Jésus, aplanissent notre route pour que nous allions à vous! '
  '12':
  - type: text
    content: 'Que le Seigneur augmente de plus en plus parmi vous, et à l’égard de tous, cette charité que nous avons nous-mêmes pour vous, '
  '13':
  - type: note
    content: 1 Co 1:8. 1 Th 5:23. 2 Th 2:17.
  - type: text
    content: afin d’affermir vos cœurs pour qu’ils soient irréprochables dans la sainteté devant Dieu notre Père, lors de l’avènement de notre Seigneur Jésus avec tous ses saints!
  '2':
  - type: text
    content: 'nous envoyâmes '
  - type: note
    content: Ac 16:1. Ro 16:21. Ph 2:19.
  - type: text
    content: 'Timothée, notre frère, ministre de Dieu dans l’Évangile de Christ, pour vous affermir et vous exhorter au sujet de votre foi, '
  '3':
  - type: note
    content: Ép 3:13. Ph 1:14.
  - type: text
    content: 'afin que personne ne fût ébranlé au milieu des tribulations présentes; car vous savez vous-mêmes '
  - type: note
    content: Ac 14:22. 2 Ti 3:12.
  - type: text
    content: 'que nous sommes destinés à cela. '
  '4':
  - type: text
    content: 'Et lorsque nous étions auprès de vous, nous vous annoncions d’avance que nous serions exposés à des tribulations, comme cela est arrivé, et comme vous le savez. '
  '5':
  - type: text
    content: Ainsi, dans mon impatience, j’envoyai m’informer de votre foi, dans la crainte que le tentateur ne vous eût tentés, et que nous n’eussions travaillé en vain.
  - type: heading
    content: Joie et vœux de l’apôtre à l’occasion des nouvelles apportées par Timothée
  - type: heading
    content: 'V. 6-13: cf. Ac 18:5. (2 Co 7:4-7. 3 Jn 3, 4.) Ph 1:8-10.'
  '6':
  - type: text
    content: 'Mais Timothée, récemment arrivé ici de chez vous, nous a donné de bonnes nouvelles de votre foi et de votre charité, et nous a dit que vous avez toujours de nous un bon souvenir, désirant nous voir comme nous désirons aussi vous voir. '
  '7':
  - type: text
    content: 'En conséquence, frères, au milieu de toutes nos calamités et de nos tribulations, nous avons été consolés à votre sujet, à cause de votre foi. '
  '8':
  - type: text
    content: 'Car maintenant nous vivons, puisque vous demeurez fermes dans le Seigneur. '
  '9':
  - type: text
    content: 'Quelles actions de grâces, en effet, nous pouvons rendre à Dieu à votre sujet, pour toute la joie que nous éprouvons à cause de vous, devant notre Dieu! '
