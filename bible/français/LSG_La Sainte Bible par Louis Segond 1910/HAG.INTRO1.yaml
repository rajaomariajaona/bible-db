document_id: HAG.INTRO1
type_code: fra
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: INTRODUCTION AU LIVRE D’AGGÉE
- type: usfm
  marker: imt3
  children:
  - type: text
    text: (Mt 6:33. Mal 3:10.)
- type: usfm
  marker: ip
  children:
  - type: text
    text: Ce livre a pour titre «Aggée» (nom qui signifie en fête), d’après le nom du prophète inspiré pour encourager les Juifs de retour de l’exil de Babylone à reconstruire le temple de Jérusalem. Il prophétisa la deuxième année du règne de Darius, le premier jour du sixième mois (1:1).
- type: usfm
  marker: ip
  children:
  - type: text
    text: Aggée dénonça le manque de passion spirituelle du peuple de Dieu, cause de récoltes désastreuses. Malgré cet état de faillite, après dix-sept ans de négligence, le temps était venu de rebâtir le temple.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le chapitre 1 traite du moment de rebâtir le temple. Les Juifs revenus d’exil étaient découragés au regard de l’état de ruine du temple, en particulier, et du pays en général. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: «Le temps n’est pas venu, le temps de rebâtir la maison de l’Éternel»
  - type: text
    text: ' (1:2). Cependant chacun poursuivait assidûment ses activités. L’Éternel adressa alors la parole à Aggée (1:1), qui par son message réveilla l’esprit du gouverneur Zorobabel et du souverain sacrificateur Josué. Tout le peuple se mobilisa alors pour la reconstruction du temple.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Le chapitre 2 insiste sur la splendeur du nouveau temple, appréciée par le peuple, et décrit la réaction de Dieu, qui encouragea les responsables et le peuple au travail. Il leur annonça que le nouveau temple serait rempli de gloire et plus grand que le premier (2:1-9). Le peuple en état d’impureté devait donc se purifier, être désormais attentif à Dieu et recevoir la bénédiction perpétuelle (2:10-19). Des promesses spéciales furent faites à Zorobabel (2:20-23). Ce fut un heureux dénouement.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Aggée nous révèle une grande vérité: ajourner sans cesse une œuvre éventuelle de l’Éternel et réaliser exclusivement des projets personnels au détriment de ceux de l’Éternel peuvent être des causes réelles de graves crises dans tous les domaines de la vie du peuple de Dieu ou d’une nation.'
