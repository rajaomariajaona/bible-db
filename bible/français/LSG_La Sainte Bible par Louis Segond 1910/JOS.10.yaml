document_id: JOS.10,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Grande bataille près de Gabaon; conquêtes dans le midi
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-11: cf. Jos 11:1-9. (És 30:30. Ps 18:7-15.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Adoni-Tsédek, roi de Jérusalem, apprit que Josué s’était emparé d’Aï et l’avait dévouée par interdit, qu’il avait traité Aï et son roi comme il avait traité '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 6:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Jéricho et son roi, et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 9:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'que les habitants de Gabaon avaient fait la paix avec Israël et étaient au milieu d’eux. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Éternel les mit en déroute devant Israël; et Israël leur fit éprouver une grande défaite près de Gabaon, les poursuivit sur le chemin qui monte à Beth-Horon, et les battit jusqu’à Azéka et à Makkéda. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Comme ils fuyaient devant Israël, et qu’ils étaient à la descente de Beth-Horon, l’Éternel fit tomber du ciel sur eux de grosses pierres jusqu’à Azéka, et ils périrent; ceux qui moururent par les pierres de grêle furent plus nombreux que ceux qui furent tués avec l’épée par les enfants d’Israël.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 12-15: cf. (Ha 3:11. Mc 11:22-24.) (És 40:26-28. Lu 1:37.) Job 9:7, 10. Ro 8:31.'
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Josué parla à l’Éternel, le jour où l’Éternel livra les Amoréens aux enfants d’Israël, et il dit en présence d’Israël: Soleil, arrête-toi sur Gabaon, Et toi, lune, sur la vallée d’Ajalon! '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et le soleil s’arrêta, et la lune suspendit sa course, Jusqu’à ce que la nation eût tiré vengeance de ses ennemis. Cela n’est-il pas écrit dans le livre du Juste? Le soleil s’arrêta au milieu du ciel, et ne se hâta point de se coucher, presque tout un jour. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il n’y a point eu de jour comme celui-là, ni avant ni après, où l’Éternel ait écouté la voix d’un homme; car l’Éternel combattait pour Israël. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et Josué, et tout Israël avec lui, retourna au camp à Guilgal.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 16-27: cf. Mal 4:3. 1 S 15:32, 33. (Jos 8:29. De 21:22-23.) Ro 8:37.'
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les cinq rois s’enfuirent, et se cachèrent dans une caverne à Makkéda. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On le rapporta à Josué, en disant: Les cinq rois se trouvent cachés dans une caverne à Makkéda. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Josué dit: Roulez de grosses pierres à l’entrée de la caverne, et mettez-y des hommes pour les garder. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et vous, ne vous arrêtez pas, poursuivez vos ennemis, et attaquez-les par derrière; ne les laissez pas entrer dans leurs villes, car l’Éternel, votre Dieu, les a livrés entre vos mains. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il eut alors une forte crainte; car Gabaon était une grande ville, comme une des villes royales, plus grande même qu’Aï, et tous ses hommes étaient vaillants. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après que Josué et les enfants d’Israël leur eurent fait éprouver une très grande défaite, et les eurent complètement battus, ceux qui purent échapper se sauvèrent dans les villes fortifiées, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et tout le peuple revint tranquillement au camp vers Josué à Makkéda, sans que personne remuât sa langue contre les enfants d’Israël. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Josué dit alors: Ouvrez l’entrée de la caverne, faites-en sortir ces cinq rois, et amenez-les-moi. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils firent ainsi, et lui amenèrent les cinq rois qu’ils avaient fait sortir de la caverne, le roi de Jérusalem, le roi d’Hébron, le roi de Jarmuth, le roi de Lakis, le roi d’Églon. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsqu’ils eurent amené ces rois devant Josué, Josué appela tous les hommes d’Israël, et dit aux chefs des gens de guerre qui avaient marché avec lui: Approchez-vous, mettez vos pieds sur les cous de ces rois. Ils s’approchèrent, et ils mirent les pieds sur leurs cous. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Josué leur dit: Ne craignez point et ne vous effrayez point, fortifiez-vous et ayez du courage, car c’est ainsi que l’Éternel traitera tous vos ennemis contre lesquels vous combattez. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après cela, Josué les frappa et les fit mourir; il les pendit à cinq arbres, et ils restèrent pendus aux arbres '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 21:23
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 8:29
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'jusqu’au soir. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vers le coucher du soleil, Josué ordonna qu’on les descendît des arbres, on les jeta dans la caverne où ils s’étaient cachés, et l’on mit à l’entrée de la caverne de grosses pierres, qui y sont demeurées jusqu’à ce jour.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 28-43: cf. (De 7:1-6; 20:16-18.) Ps 72:9-11. 2 Co 2:14.'
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Josué prit Makkéda le même jour, et la frappa du tranchant de l’épée; il dévoua par interdit le roi, la ville et tous ceux qui s’y trouvaient; il n’en laissa échapper aucun, et il traita le roi de Makkéda comme il avait traité le roi de Jéricho. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Josué, et tout Israël avec lui, passa de Makkéda à Libna, et il attaqua Libna. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Adoni-Tsédek, roi de Jérusalem, fit dire à Hoham, roi d’Hébron, à Piream, roi de Jarmuth, à Japhia, roi de Lakis, et à Debir, roi d’Églon: '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Éternel la livra aussi, avec son roi, entre les mains d’Israël, et la frappa du tranchant de l’épée, elle et tous ceux qui s’y trouvaient; il n’en laissa échapper aucun, et il traita son roi comme il avait traité le roi de Jéricho. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Josué, et tout Israël avec lui, passa de Libna à Lakis; il campa devant elle, et il l’attaqua. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Éternel livra Lakis entre les mains d’Israël, qui la prit le second jour, et la frappa du tranchant de l’épée, elle et tous ceux qui s’y trouvaient, comme il avait traité Libna. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Horam, roi de Guézer, monta pour secourir Lakis. Josué le battit, lui et son peuple, sans laisser échapper personne. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Josué, et tout Israël avec lui, passa de Lakis à Églon; ils campèrent devant elle, et ils l’attaquèrent. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils la prirent le même jour, et la frappèrent du tranchant de l’épée, elle et tous ceux qui s’y trouvaient; Josué la dévoua par interdit le jour même, comme il avait traité Lakis. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Josué, et tout Israël avec lui, monta d’Églon à Hébron, et ils l’attaquèrent. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils la prirent, et la frappèrent du tranchant de l’épée, elle, son roi, toutes les villes qui en dépendaient, et tous ceux qui s’y trouvaient; Josué n’en laissa échapper aucun, comme il avait fait à Églon, et il la dévoua par interdit avec tous ceux qui s’y trouvaient. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Josué, et tout Israël avec lui, se dirigea sur Debir, et il l’attaqua. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il la prit, elle, son roi, et toutes les villes qui en dépendaient; ils les frappèrent du tranchant de l’épée, et ils dévouèrent par interdit tous ceux qui s’y trouvaient, sans en laisser échapper aucun; Josué traita Debir et son roi comme il avait traité Hébron et comme il avait traité Libna et son roi. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Montez vers moi, et aidez-moi, afin que nous frappions Gabaon, car elle a fait la paix avec Josué et avec les enfants d’Israël. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Josué battit tout le pays, la montagne, le midi, la plaine et les coteaux, et il en battit tous les rois; il ne laissa échapper personne, et il dévoua par interdit tout ce qui respirait, comme l’avait '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 7:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 20:16
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '17'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 8:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'ordonné l’Éternel, le Dieu d’Israël. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Josué les battit de Kadès-Barnéa à Gaza, il battit tout le pays de Gosen jusqu’à Gabaon. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Josué prit en même temps tous ces rois et leur pays, car l’Éternel, le Dieu d’Israël, combattait pour Israël. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et Josué, et tout Israël avec lui, retourna au camp à Guilgal.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cinq rois des Amoréens, le roi de Jérusalem, le roi d’Hébron, le roi de Jarmuth, le roi de Lakis, le roi d’Églon, se réunirent ainsi et montèrent avec toutes leurs armées; ils vinrent camper près de Gabaon, et l’attaquèrent. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les gens de Gabaon envoyèrent dire à Josué, au camp de Guilgal: N’abandonne pas tes serviteurs, monte vers nous en hâte, délivre-nous, donne-nous du secours; car tous les rois des Amoréens, qui habitent la montagne, se sont réunis contre nous. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Josué monta de Guilgal, lui et tous les gens de guerre avec lui, et tous les vaillants hommes. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Éternel dit à Josué: Ne les crains point, car je les livre entre tes mains, et aucun d’eux ne tiendra devant toi. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Josué arriva subitement sur eux, après avoir marché toute la nuit depuis Guilgal. '
