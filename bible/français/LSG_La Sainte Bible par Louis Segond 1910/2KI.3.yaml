document_id: 2KI.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Joram, roi d’Israël. Guerre contre les Moabites
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-27: cf. 2 R 1:17. 2 Ch 18:1-8. Ps 107:4-6, 35.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Joram, fils d’Achab, régna sur Israël à Samarie, la dix-huitième année de Josaphat, roi de Juda. Il régna douze ans. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il fit ce qui est mal aux yeux de l’Éternel, non pas toutefois comme son père et sa mère. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 16:32
      metadata:
        usfm: 1KI.16.32
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il renversa les statues de Baal que son père avait faites; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'mais il se livra aux péchés de Jéroboam, fils de Nebath, qui avait fait pécher Israël, et il ne s’en détourna point. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Méscha, roi de Moab, possédait des troupeaux, et il payait au roi d’Israël un tribut de cent mille agneaux et de cent mille béliers avec leur laine. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'A la mort d’Achab, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 1:1
      metadata:
        usfm: 2KI.1.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'le roi de Moab se révolta contre le roi d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Le roi Joram sortit alors de Samarie, et passa en revue tout Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il se mit en marche, et il fit dire à Josaphat, roi de Juda: Le roi de Moab s’est révolté contre moi; veux-tu venir avec moi attaquer Moab? Josaphat répondit: J’irai, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 22:4
      metadata:
        usfm: 1KI.22.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'moi comme toi, mon peuple comme ton peuple, mes chevaux comme tes chevaux. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Et il dit: Par quel chemin monterons-nous? Joram dit: Par le chemin du désert d’Édom. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Le roi d’Israël, le roi de Juda et le roi d’Édom, partirent; et après une marche de sept jours, ils manquèrent d’eau pour l’armée et pour les bêtes qui la suivaient. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Alors le roi d’Israël dit: Hélas! L’Éternel a appelé ces trois rois pour les livrer entre les mains de Moab. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mais Josaphat dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 22:7
      metadata:
        usfm: 1KI.22.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'N’y a-t-il ici aucun prophète de l’Éternel, par qui nous puissions consulter l’Éternel? L’un des serviteurs du roi d’Israël répondit: Il y a ici Élisée, fils de Schaphath, qui versait l’eau sur les mains d’Élie. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Et Josaphat dit: La parole de l’Éternel est avec lui. Le roi d’Israël, Josaphat et le roi d’Édom, descendirent auprès de lui. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Élisée dit au roi d’Israël: Qu’y a-t-il entre moi et toi? '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 18:19
      metadata:
        usfm: 1KI.18.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Va vers les prophètes de ton père et vers les prophètes de ta mère. Et le roi d’Israël lui dit: Non! Car l’Éternel a appelé ces trois rois pour les livrer entre les mains de Moab. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Élisée dit: L’Éternel des armées, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 17:1
      metadata:
        usfm: 1KI.17.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'dont je suis le serviteur, est vivant! Si je n’avais égard à Josaphat, roi de Juda, je ne ferais aucune attention à toi et je ne te regarderais pas. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Maintenant, amenez-moi un joueur de harpe. Et comme le joueur de harpe jouait, la main de l’Éternel fut sur Élisée. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Et il dit: Ainsi parle l’Éternel: Faites dans cette vallée des fosses, des fosses! '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Car ainsi parle l’Éternel: Vous n’apercevrez point de vent et vous ne verrez point de pluie, et cette vallée se remplira d’eau, et vous boirez, vous, vos troupeaux et votre bétail. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Mais cela est peu de chose aux yeux de l’Éternel. Il livrera Moab entre vos mains; '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'vous frapperez toutes les villes fortes et toutes les villes d’élite, vous abattrez tous les bons arbres, vous boucherez toutes les sources d’eau, et vous ruinerez avec des pierres tous les meilleurs champs. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Or le matin, au moment de la présentation de l’offrande, voici, l’eau arriva du chemin d’Édom, et le pays fut rempli d’eau. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Cependant, tous les Moabites ayant appris que les rois montaient pour les attaquer, on convoqua tous ceux en âge de porter les armes et même au-dessus, et ils se tinrent sur la frontière. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ils se levèrent de bon matin, et quand le soleil brilla sur les eaux, les Moabites virent en face d’eux les eaux rouges comme du sang. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ils dirent: C’est du sang! Les rois ont tiré l’épée entre eux, ils se sont frappés les uns les autres; maintenant, Moabites, au pillage! '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Et ils marchèrent contre le camp d’Israël. Mais Israël se leva, et frappa Moab, qui prit la fuite devant eux. Ils pénétrèrent dans le pays, et frappèrent Moab. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ils renversèrent les villes, ils jetèrent chacun des pierres dans tous les meilleurs champs et les en remplirent, ils bouchèrent toutes les sources d’eau, et ils abattirent tous les bons arbres; et les frondeurs enveloppèrent et battirent Kir-Haréseth, dont on ne laissa que les pierres. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Le roi de Moab, voyant qu’il avait le dessous dans le combat, prit avec lui sept cents hommes tirant l’épée pour se frayer un passage jusqu’au roi d’Édom; mais ils ne purent pas. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Il prit alors son fils premier-né, qui devait régner à sa place, et il l’offrit en holocauste sur la muraille. Et une grande indignation s’empara d’Israël, qui s’éloigna du roi de Moab et retourna dans son pays.
