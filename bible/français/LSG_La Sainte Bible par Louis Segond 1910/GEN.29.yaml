document_id: GEN.29
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jacob chez Laban
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-14: cf. Ge 24:10-32. Ex 2:15-21.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jacob se mit en marche, et s’en alla au pays des fils de l’Orient. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il regarda. Et voici, il y avait un puits dans les champs; et voici, il y avait à côté trois troupeaux de brebis qui se reposaient, car c’était à ce puits qu’on abreuvait les troupeaux. Et la pierre sur l’ouverture du puits était grande. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tous les troupeaux se rassemblaient là; on roulait la pierre de dessus l’ouverture du puits, on abreuvait les troupeaux, et l’on remettait la pierre à sa place sur l’ouverture du puits. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Jacob dit aux bergers: Mes frères, d’où êtes-vous? Ils répondirent: Nous sommes de Charan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il leur dit: Connaissez-vous Laban, fils de Nachor? Ils répondirent: Nous le connaissons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il leur dit: Est-il en bonne santé? Ils répondirent: Il est en bonne santé; et voici Rachel, sa fille, qui vient avec le troupeau. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il dit: Voici, il est encore grand jour, et il n’est pas temps de rassembler les troupeaux; abreuvez les brebis, puis allez, et faites-les paître. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ils répondirent: Nous ne le pouvons pas, jusqu’à ce que tous les troupeaux soient rassemblés; c’est alors qu’on roule la pierre de dessus l’ouverture du puits, et qu’on abreuve les brebis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Comme il leur parlait encore, survint Rachel avec le troupeau de son père; car elle était bergère. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Lorsque Jacob vit Rachel, fille de Laban, frère de sa mère, et le troupeau de Laban, frère de sa mère, il s’approcha, roula la pierre de dessus l’ouverture du puits, et abreuva le troupeau de Laban, frère de sa mère. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Et Jacob baisa Rachel, il éleva la voix et pleura. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Jacob apprit à Rachel qu’il était parent de son père, qu’il était fils de Rebecca. Et elle courut l’annoncer à son père. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dès que Laban eut entendu parler de Jacob, fils de sa sœur, il courut au-devant de lui, il l’embrassa et le baisa, et il le fit venir dans sa maison. Jacob raconta à Laban toutes ces choses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Et Laban lui dit: Certainement, tu es mon os et ma chair.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Léa et Rachel
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 15-30: cf. Os 12:13. Jg 14:10-13.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Jacob demeura un mois chez Laban. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Puis Laban dit à Jacob: Parce que tu es mon parent, me serviras-tu pour rien? Dis-moi quel sera ton salaire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Or, Laban avait deux filles: l’aînée s’appelait Léa, et la cadette Rachel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Léa avait les yeux délicats; mais Rachel était belle de taille et belle de figure. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Jacob aimait Rachel, et il dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Os 12:13
      metadata:
        usfm: HOS.12.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Je te servirai sept ans pour Rachel, ta fille cadette. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Et Laban dit: J’aime mieux te la donner que de la donner à un autre homme. Reste chez moi! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ainsi Jacob servit sept années pour Rachel: et elles furent à ses yeux comme quelques jours, parce qu’il l’aimait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ensuite Jacob dit à Laban: Donne-moi ma femme, car mon temps est accompli: et j’irai vers elle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Laban réunit tous les gens du lieu, et fit un festin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Le soir, il prit Léa, sa fille, et l’amena vers Jacob, qui s’approcha d’elle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Et Laban donna pour servante à Léa, sa fille, Zilpa, sa servante. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Le lendemain matin, voilà que c’était Léa. Alors Jacob dit à Laban: Qu’est-ce que tu m’as fait? N’est-ce pas pour Rachel que j’ai servi chez toi? Pourquoi m’as-tu trompé? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Laban dit: Ce n’est point la coutume dans ce lieu de donner la cadette avant l’aînée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Achève la semaine avec celle-ci, et nous te donnerons aussi l’autre pour le service que tu feras encore chez moi pendant sept nouvelles années. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Jacob fit ainsi, et il acheva la semaine avec Léa; puis Laban lui donna pour femme Rachel, sa fille. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Et Laban donna pour servante à Rachel, sa fille, Bilha, sa servante. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Jacob alla aussi vers Rachel, qu’il aimait plus que Léa; et il servit encore chez Laban pendant sept nouvelles années.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les enfants de Jacob
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 31-35: cf. Ps 127:3. Ge 49:1-12.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'L’Éternel vit que Léa n’était pas aimée; et il la rendit féconde, tandis que Rachel était stérile. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Léa devint enceinte, et enfanta un fils, à qui elle donna le nom de Ruben; car elle dit: L’Éternel a vu mon humiliation, et maintenant mon mari m’aimera. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Elle devint encore enceinte, et enfanta un fils, et elle dit: L’Éternel a entendu que je n’étais pas aimée, et il m’a aussi accordé celui-ci. Et elle lui donna le nom de Siméon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Elle devint encore enceinte, et enfanta un fils, et elle dit: Pour cette fois, mon mari s’attachera à moi; car je lui ai enfanté trois fils. C’est pourquoi on lui donna le nom de Lévi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Elle devint encore enceinte, et enfanta un fils, et elle dit: Cette fois, je louerai l’Éternel. C’est pourquoi elle lui donna le nom de Juda. Et elle cessa d’enfanter.'
