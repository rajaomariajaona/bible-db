document_id: GEN.29,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Jacob chez Laban
  - type: heading
    content: 'V. 1-14: cf. Ge 24:10-32. Ex 2:15-21.'
  - type: text
    content: 'Jacob se mit en marche, et s’en alla au pays des fils de l’Orient. '
  '10':
  - type: text
    content: 'Lorsque Jacob vit Rachel, fille de Laban, frère de sa mère, et le troupeau de Laban, frère de sa mère, il s’approcha, roula la pierre de dessus l’ouverture du puits, et abreuva le troupeau de Laban, frère de sa mère. '
  '11':
  - type: text
    content: 'Et Jacob baisa Rachel, il éleva la voix et pleura. '
  '12':
  - type: text
    content: 'Jacob apprit à Rachel qu’il était parent de son père, qu’il était fils de Rebecca. Et elle courut l’annoncer à son père. '
  '13':
  - type: text
    content: 'Dès que Laban eut entendu parler de Jacob, fils de sa sœur, il courut au-devant de lui, il l’embrassa et le baisa, et il le fit venir dans sa maison. Jacob raconta à Laban toutes ces choses. '
  '14':
  - type: text
    content: 'Et Laban lui dit: Certainement, tu es mon os et ma chair.'
  - type: heading
    content: Léa et Rachel
  - type: heading
    content: 'V. 15-30: cf. Os 12:13. Jg 14:10-13.'
  - type: text
    content: 'Jacob demeura un mois chez Laban. '
  '15':
  - type: text
    content: 'Puis Laban dit à Jacob: Parce que tu es mon parent, me serviras-tu pour rien? Dis-moi quel sera ton salaire. '
  '16':
  - type: text
    content: 'Or, Laban avait deux filles: l’aînée s’appelait Léa, et la cadette Rachel. '
  '17':
  - type: text
    content: 'Léa avait les yeux délicats; mais Rachel était belle de taille et belle de figure. '
  '18':
  - type: text
    content: 'Jacob aimait Rachel, et il dit: '
  - type: note
    content: Os 12:13.
  - type: text
    content: 'Je te servirai sept ans pour Rachel, ta fille cadette. '
  '19':
  - type: text
    content: 'Et Laban dit: J’aime mieux te la donner que de la donner à un autre homme. Reste chez moi! '
  '2':
  - type: text
    content: 'Il regarda. Et voici, il y avait un puits dans les champs; et voici, il y avait à côté trois troupeaux de brebis qui se reposaient, car c’était à ce puits qu’on abreuvait les troupeaux. Et la pierre sur l’ouverture du puits était grande. '
  '20':
  - type: text
    content: 'Ainsi Jacob servit sept années pour Rachel: et elles furent à ses yeux comme quelques jours, parce qu’il l’aimait. '
  '21':
  - type: text
    content: 'Ensuite Jacob dit à Laban: Donne-moi ma femme, car mon temps est accompli: et j’irai vers elle. '
  '22':
  - type: text
    content: 'Laban réunit tous les gens du lieu, et fit un festin. '
  '23':
  - type: text
    content: 'Le soir, il prit Léa, sa fille, et l’amena vers Jacob, qui s’approcha d’elle. '
  '24':
  - type: text
    content: 'Et Laban donna pour servante à Léa, sa fille, Zilpa, sa servante. '
  '25':
  - type: text
    content: 'Le lendemain matin, voilà que c’était Léa. Alors Jacob dit à Laban: Qu’est-ce que tu m’as fait? N’est-ce pas pour Rachel que j’ai servi chez toi? Pourquoi m’as-tu trompé? '
  '26':
  - type: text
    content: 'Laban dit: Ce n’est point la coutume dans ce lieu de donner la cadette avant l’aînée. '
  '27':
  - type: text
    content: 'Achève la semaine avec celle-ci, et nous te donnerons aussi l’autre pour le service que tu feras encore chez moi pendant sept nouvelles années. '
  '28':
  - type: text
    content: 'Jacob fit ainsi, et il acheva la semaine avec Léa; puis Laban lui donna pour femme Rachel, sa fille. '
  '29':
  - type: text
    content: 'Et Laban donna pour servante à Rachel, sa fille, Bilha, sa servante. '
  '3':
  - type: text
    content: 'Tous les troupeaux se rassemblaient là; on roulait la pierre de dessus l’ouverture du puits, on abreuvait les troupeaux, et l’on remettait la pierre à sa place sur l’ouverture du puits. '
  '30':
  - type: text
    content: Jacob alla aussi vers Rachel, qu’il aimait plus que Léa; et il servit encore chez Laban pendant sept nouvelles années.
  - type: heading
    content: Les enfants de Jacob
  - type: heading
    content: 'V. 31-35: cf. Ps 127:3. Ge 49:1-12.'
  '31':
  - type: text
    content: 'L’Éternel vit que Léa n’était pas aimée; et il la rendit féconde, tandis que Rachel était stérile. '
  '32':
  - type: text
    content: 'Léa devint enceinte, et enfanta un fils, à qui elle donna le nom de Ruben; car elle dit: L’Éternel a vu mon humiliation, et maintenant mon mari m’aimera. '
  '33':
  - type: text
    content: 'Elle devint encore enceinte, et enfanta un fils, et elle dit: L’Éternel a entendu que je n’étais pas aimée, et il m’a aussi accordé celui-ci. Et elle lui donna le nom de Siméon. '
  '34':
  - type: text
    content: 'Elle devint encore enceinte, et enfanta un fils, et elle dit: Pour cette fois, mon mari s’attachera à moi; car je lui ai enfanté trois fils. C’est pourquoi on lui donna le nom de Lévi. '
  '35':
  - type: text
    content: 'Elle devint encore enceinte, et enfanta un fils, et elle dit: Cette fois, je louerai l’Éternel. C’est pourquoi elle lui donna le nom de Juda. Et elle cessa d’enfanter.'
  '4':
  - type: text
    content: 'Jacob dit aux bergers: Mes frères, d’où êtes-vous? Ils répondirent: Nous sommes de Charan. '
  '5':
  - type: text
    content: 'Il leur dit: Connaissez-vous Laban, fils de Nachor? Ils répondirent: Nous le connaissons. '
  '6':
  - type: text
    content: 'Il leur dit: Est-il en bonne santé? Ils répondirent: Il est en bonne santé; et voici Rachel, sa fille, qui vient avec le troupeau. '
  '7':
  - type: text
    content: 'Il dit: Voici, il est encore grand jour, et il n’est pas temps de rassembler les troupeaux; abreuvez les brebis, puis allez, et faites-les paître. '
  '8':
  - type: text
    content: 'Ils répondirent: Nous ne le pouvons pas, jusqu’à ce que tous les troupeaux soient rassemblés; c’est alors qu’on roule la pierre de dessus l’ouverture du puits, et qu’on abreuve les brebis. '
  '9':
  - type: text
    content: 'Comme il leur parlait encore, survint Rachel avec le troupeau de son père; car elle était bergère. '
