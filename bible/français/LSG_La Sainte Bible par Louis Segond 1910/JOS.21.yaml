document_id: JOS.21
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les quarante-huit villes des Lévites
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-8: cf. (Ge 49:5-7. De 33:8-11.) No 35:1-8.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Les chefs de famille des Lévites '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 Ch 6:54, etc.
    marker-yv: yv-n
  - type: text
    text: 's’approchèrent du sacrificateur Éléazar, de Josué, fils de Nun, et des chefs de famille des tribus des enfants d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ils leur parlèrent à Silo, dans le pays de Canaan, et dirent: L’Éternel a ordonné par Moïse '
  - type: usfm
    marker: x
    children:
    - type: text
      text: No 35:2, etc.
    marker-yv: yv-n
  - type: text
    text: 'qu’on nous donnât des villes pour habitation, et leurs banlieues pour notre bétail. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Les enfants d’Israël donnèrent alors aux Lévites, sur leur héritage, les villes suivantes et leurs banlieues, d’après l’ordre de l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'On tira le sort pour les familles des Kehathites; et les Lévites, fils du sacrificateur Aaron, eurent par le sort treize villes de la tribu de Juda, de la tribu de Siméon et de la tribu de Benjamin; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'les autres fils de Kehath eurent par le sort dix villes des familles de la tribu d’Éphraïm, de la tribu de Dan et de la demi-tribu de Manassé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Les fils de Guerschon eurent par le sort treize villes des familles de la tribu d’Issacar, de la tribu d’Aser, de la tribu de Nephthali et de la demi-tribu de Manassé en Basan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Les fils de Merari, selon leurs familles, eurent douze villes de la tribu de Ruben, de la tribu de Gad et de la tribu de Zabulon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Les enfants d’Israël donnèrent aux Lévites, par le sort, ces villes et leurs banlieues, comme l’Éternel l’avait ordonné par Moïse.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 9-26: cf. 1 Ch 6:50-60.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ils donnèrent de la tribu des fils de Juda et de la tribu des fils de Siméon les villes qui vont être nominativement désignées, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'et qui furent pour les fils d’Aaron d’entre les familles des Kehathites et des fils de Lévi, car le sort les avait indiqués les premiers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ils leur donnèrent Kirjath-Arba, qui est Hébron, dans la montagne de Juda, et la banlieue qui l’entoure: Arba était le père d’Anak. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Le territoire de la ville et ses villages furent accordés à Caleb, fils de Jephunné, pour sa possession. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ils donnèrent donc aux fils du sacrificateur Aaron la ville de refuge pour les meurtriers, Hébron et sa banlieue, Libna et sa banlieue, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Jatthir et sa banlieue, Eschthemoa et sa banlieue, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Holon et sa banlieue, Debir et sa banlieue, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Aïn et sa banlieue, Jutta et sa banlieue, et Beth-Schémesch et sa banlieue, neuf villes de ces deux tribus; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'et de la tribu de Benjamin, Gabaon et sa banlieue, Guéba et sa banlieue, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Anathoth et sa banlieue, et Almon et sa banlieue, quatre villes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Total des villes des sacrificateurs, fils d’Aaron: treize villes, et leurs banlieues. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Les Lévites appartenant aux familles des autres fils de Kehath eurent par le sort des villes de la tribu d’Éphraïm. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'On leur donna la ville de refuge pour les meurtriers, Sichem et sa banlieue, dans la montagne d’Éphraïm, Guézer et sa banlieue, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Kibtsaïm et sa banlieue, et Beth-Horon et sa banlieue, quatre villes; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'de la tribu de Dan, Eltheké et sa banlieue, Guibbethon et sa banlieue, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ajalon et sa banlieue, et Gath-Rimmon et sa banlieue, quatre villes; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'et de la demi-tribu de Manassé, Thaanac et sa banlieue, et Gath-Rimmon et sa banlieue, deux villes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Total des villes: dix, et leurs banlieues, pour les familles des autres fils de Kehath.'
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 27-42: cf. 1 Ch 6:66-81.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'On donna aux fils de Guerschon, d’entre les familles des Lévites: de la demi-tribu de Manassé, la ville de refuge pour les meurtriers, Golan en Basan et sa banlieue, et Beeschthra et sa banlieue, deux villes; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'de la tribu d’Issacar, Kischjon et sa banlieue, Dabrath et sa banlieue, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Jarmuth et sa banlieue, et En-Gannim et sa banlieue, quatre villes; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'de la tribu d’Aser, Mischeal et sa banlieue, Abdon et sa banlieue, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Helkath et sa banlieue, et Rehob et sa banlieue, quatre villes; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'et de la tribu de Nephthali, la ville de refuge pour les meurtriers, Kédesch en Galilée et sa banlieue, Hammoth-Dor et sa banlieue, et Karthan et sa banlieue, trois villes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Total des villes des Guerschonites, selon leurs familles: treize villes et leurs banlieues. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'On donna au reste des Lévites, qui appartenaient aux familles des fils de Merari: de la tribu de Zabulon, Jokneam et sa banlieue, Kartha et sa banlieue, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Dimna et sa banlieue, et Nahalal et sa banlieue, quatre villes; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'de la tribu de Ruben, Betser et sa banlieue, Jahtsa et sa banlieue, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Kedémoth et sa banlieue, et Méphaath et sa banlieue, quatre villes; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'et de la tribu de Gad, la ville de refuge pour les meurtriers, Ramoth en Galaad et sa banlieue, Mahanaïm et sa banlieue, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Hesbon et sa banlieue, et Jaezer et sa banlieue, en tout quatre villes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Total des villes qui échurent par le sort aux fils de Merari, selon leurs familles, formant le reste des familles des Lévites: douze villes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Total des villes des Lévites au milieu des propriétés des enfants d’Israël: quarante-huit villes, et leurs banlieues. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Chacune de ces villes avait sa banlieue qui l’entourait; il en était de même pour toutes ces villes.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 43-45: cf. Ge 15:18-21. (Né 9:8, 22-25. Ps 105:8-11, 42-45.) Jos 23.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'C’est ainsi que l’Éternel donna à Israël tout le pays qu’il avait juré de donner à leurs pères; ils en prirent possession et s’y établirent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'L’Éternel leur accorda du repos tout alentour, comme il l’avait juré à leurs pères; aucun de leurs ennemis ne put leur résister, et l’Éternel les livra tous entre leurs mains. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'De toutes les bonnes paroles que l’Éternel avait dites à la maison d’Israël, aucune ne resta sans effet: toutes s’accomplirent.'
