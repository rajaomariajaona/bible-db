document_id: MAT.6,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Préceptes sur: — l’aumône, — la prière, — le pardon des offenses, — le jeûne, — les trésors sur la terre et dans le ciel, — l’impossibilité de servir deux maîtres, — les soucis et les inquiétudes'
  - type: heading
    content: 'V. 1-6: cf. Lu 12:1, 2. Col 3:23, 24.'
  - type: text
    content: ' '
  - type: text
    content: Gardez-vous de pratiquer votre justice devant les hommes, pour en être vus; autrement, vous n’aurez point de récompense auprès de votre Père qui est dans les cieux.
  - type: text
    content: ' '
  '10':
  - type: text
    content: que ton règne vienne; que ta volonté soit faite sur la terre comme au ciel.
  - type: text
    content: ' '
  '11':
  - type: text
    content: Donne-nous aujourd’hui notre pain quotidien;
  - type: text
    content: ' '
  '12':
  - type: text
    content: pardonne-nous nos offenses, comme nous aussi nous pardonnons à ceux qui nous ont offensés;
  - type: text
    content: ' '
  '13':
  - type: text
    content: ne nous induis pas en tentation, mais délivre-nous du
  - type: text
    content: ' '
  - type: note
    content: Mt 13:19.
  - type: text
    content: malin. Car c’est à toi qu’appartiennent, dans tous les siècles, le règne, la puissance et la gloire. Amen!
  - type: text
    content: ' '
  '14':
  - type: note
    content: Mc 11:25. Col 3:13.
  - type: text
    content: Si vous pardonnez aux hommes leurs offenses, votre Père céleste vous pardonnera aussi;
  - type: text
    content: ' '
  '15':
  - type: note
    content: Mt 18:35. Ja 2:13.
  - type: text
    content: mais si vous ne pardonnez pas aux hommes, votre Père ne vous pardonnera pas non plus vos offenses.
  - type: heading
    content: 'V. 16-18: cf. És 58:3-8.'
  '16':
  - type: text
    content: ' '
  - type: note
    content: És 58:3. Mt 9:14. Mc 2:18. Lu 5:33.
  - type: text
    content: Lorsque vous jeûnez, ne prenez pas un air triste, comme les hypocrites, qui se rendent le visage tout défait, pour montrer aux hommes qu’ils jeûnent. Je vous le dis en vérité, ils reçoivent leur récompense.
  - type: text
    content: ' '
  '17':
  - type: text
    content: Mais quand tu jeûnes, parfume ta tête et lave ton visage,
  - type: text
    content: ' '
  '18':
  - type: text
    content: afin de ne pas montrer aux hommes que tu jeûnes, mais à ton Père qui est là dans le lieu secret; et ton Père, qui voit dans le secret, te le rendra.
  - type: heading
    content: 'V. 19-34: cf. (Lu 11:34-36; 12:15-34.) 1 Ti 6:9, 10.'
  '19':
  - type: text
    content: ' '
  - type: text
    content: Ne vous amassez pas des
  - type: text
    content: ' '
  - type: note
    content: Pr 23:4. Hé 13:5. Ja 5:1.
  - type: text
    content: trésors sur la terre, où la teigne et la rouille détruisent, et où les voleurs percent et dérobent;
  - type: text
    content: ' '
  '2':
  - type: note
    content: Ro 12:8.
  - type: text
    content: Lors donc que tu fais l’aumône, ne sonne pas de la trompette devant toi, comme font les hypocrites dans les synagogues et dans les rues, afin d’être glorifiés par les hommes. Je vous le dis en vérité, ils reçoivent leur récompense.
  - type: text
    content: ' '
  '20':
  - type: text
    content: mais
  - type: text
    content: ' '
  - type: note
    content: Lu 12:33. 1 Ti 6:19.
  - type: text
    content: amassez-vous des trésors dans le ciel, où la teigne et la rouille ne détruisent point, et où les voleurs ne percent ni ne dérobent.
  - type: text
    content: ' '
  '21':
  - type: text
    content: Car là où est ton trésor, là aussi sera ton cœur.
  - type: text
    content: ' '
  '22':
  - type: note
    content: Lu 11:34.
  - type: text
    content: L’œil est la lampe du corps. Si ton œil est en bon état, tout ton corps sera éclairé;
  - type: text
    content: ' '
  '23':
  - type: text
    content: mais si ton œil est en mauvais état, tout ton corps sera dans les ténèbres. Si donc la lumière qui est en toi est ténèbres, combien seront grandes ces ténèbres!
  - type: text
    content: ' '
  '24':
  - type: note
    content: Lu 16:13.
  - type: text
    content: Nul ne peut servir deux maîtres. Car, ou il haïra l’un, et aimera l’autre; ou il s’attachera à l’un, et méprisera l’autre. Vous ne pouvez servir Dieu et Mamon.
  - type: text
    content: ' '
  '25':
  - type: note
    content: Ps 37:5; 55:23. Lu 12:22. Ph 4:6. 1 Ti 6:8. 1 Pi 5:7.
  - type: text
    content: 'C’est pourquoi je vous dis: Ne vous inquiétez pas pour votre vie de ce que vous mangerez, ni pour votre corps, de quoi vous serez vêtus. La vie n’est-elle pas plus que la nourriture, et le corps plus que le vêtement?'
  - type: text
    content: ' '
  '26':
  - type: note
    content: Job 39:3. Ps 147:9.
  - type: text
    content: 'Regardez les oiseaux du ciel: ils ne sèment ni ne moissonnent, et ils n’amassent rien dans des greniers; et votre Père céleste les nourrit. Ne valez-vous pas beaucoup plus qu’eux?'
  - type: text
    content: ' '
  '27':
  - type: text
    content: Qui de vous, par ses inquiétudes, peut ajouter une coudée à la durée de sa vie?
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'Et pourquoi vous inquiéter au sujet du vêtement? Considérez comment croissent les lis des champs: ils ne travaillent ni ne filent;'
  - type: text
    content: ' '
  '29':
  - type: text
    content: cependant je vous dis que Salomon même, dans toute sa gloire, n’a pas été vêtu comme l’un d’eux.
  - type: text
    content: ' '
  '3':
  - type: text
    content: Mais quand tu fais l’aumône, que ta main gauche ne sache pas ce que fait ta droite,
  - type: text
    content: ' '
  '30':
  - type: text
    content: Si Dieu revêt ainsi l’herbe des champs, qui existe aujourd’hui et qui demain sera jetée au four, ne vous vêtira-t-il pas à plus forte raison, gens de peu de foi?
  - type: text
    content: ' '
  '31':
  - type: text
    content: 'Ne vous inquiétez donc point, et ne dites pas: Que mangerons-nous? Que boirons-nous? De quoi serons-nous vêtus?'
  - type: text
    content: ' '
  '32':
  - type: text
    content: Car toutes ces choses, ce sont les païens qui les recherchent. Votre Père céleste sait que vous en avez besoin.
  - type: text
    content: ' '
  '33':
  - type: note
    content: 1 R 3:13. Ps 37:25; 55:23.
  - type: text
    content: Cherchez premièrement le royaume et la justice de Dieu; et toutes ces choses vous seront données par-dessus.
  - type: text
    content: ' '
  '34':
  - type: text
    content: Ne vous inquiétez donc pas du lendemain; car le lendemain aura soin de lui-même. A chaque jour suffit sa peine.
  '4':
  - type: text
    content: afin que ton aumône se fasse en secret; et ton Père, qui voit dans le secret, te le
  - type: text
    content: ' '
  - type: note
    content: Lu 14:14.
  - type: text
    content: rendra.
  - type: text
    content: ' '
  '5':
  - type: text
    content: Lorsque vous priez, ne soyez pas comme les hypocrites, qui aiment à prier debout dans les synagogues et aux coins des rues, pour être vus des hommes. Je vous le dis en vérité, ils reçoivent leur récompense.
  - type: text
    content: ' '
  '6':
  - type: text
    content: Mais quand tu pries,
  - type: text
    content: ' '
  - type: note
    content: 2 R 4:33. Ac 10:4.
  - type: text
    content: entre dans ta chambre, ferme ta porte, et prie ton Père qui est là dans le lieu secret; et ton Père, qui voit dans le secret, te le rendra.
  - type: heading
    content: 'V. 7-15: cf. Lu 11:1-5. Mt 18:21-35.'
  '7':
  - type: text
    content: ' '
  - type: text
    content: En priant,
  - type: text
    content: ' '
  - type: note
    content: 1 R 18:28. És 1:15.
  - type: text
    content: ne multipliez pas de vaines paroles, comme les païens, qui s’imaginent qu’à force de paroles ils seront exaucés.
  - type: text
    content: ' '
  '8':
  - type: text
    content: Ne leur ressemblez pas; car votre Père sait de quoi vous avez besoin, avant que vous le lui demandiez.
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'Voici donc comment vous devez prier:'
  - type: text
    content: ' '
  - type: note
    content: Lu 11:2.
  - type: text
    content: Notre Père qui es aux cieux! Que ton nom soit sanctifié;
  - type: text
    content: ' '
