document_id: LUK.16,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Parabole de l’économe infidèle
  - type: heading
    content: 'V. 1-13: cf. (1 Ti 6:17-19. Lu 12:33.) Mt 25:14-30; 6:19, 20, 24.'
  - type: text
    content: 'Jésus dit aussi à ses disciples: '
  - type: text
    content: Un homme riche avait un économe, qui lui fut dénoncé comme dissipant ses biens.
  '10':
  - type: text
    content: Celui qui est fidèle dans les moindres choses l’est aussi dans les grandes, et celui qui est injuste dans les moindres choses l’est aussi dans les grandes.
  - type: text
    content: ' '
  '11':
  - type: text
    content: Si donc vous n’avez pas été fidèles dans les richesses injustes, qui vous confiera les véritables?
  - type: text
    content: ' '
  '12':
  - type: text
    content: Et si vous n’avez pas été fidèles dans ce qui est à autrui, qui vous donnera ce qui est à vous?
  - type: text
    content: ' '
  '13':
  - type: note
    content: Mt 6:24.
  - type: text
    content: Nul serviteur ne peut servir deux maîtres. Car, ou il haïra l’un et aimera l’autre; ou il s’attachera à l’un et méprisera l’autre. Vous ne pouvez servir Dieu et Mamon.
  - type: heading
    content: Reproches aux pharisiens
  - type: heading
    content: 'V. 14-18: cf. Mt 23:23-28; 5:17-20, 31, 32.'
  '14':
  - type: text
    content: 'Les pharisiens, '
  - type: note
    content: Mt 23:14.
  - type: text
    content: 'qui étaient avares, écoutaient aussi tout cela, et ils se moquaient de lui. '
  '15':
  - type: text
    content: 'Jésus leur dit: '
  - type: text
    content: Vous, vous cherchez à paraître justes devant les hommes, mais
  - type: text
    content: ' '
  - type: note
    content: Ps 17:10.
  - type: text
    content: Dieu connaît vos cœurs;
  - type: text
    content: ' '
  - type: note
    content: 1 S 16:7.
  - type: text
    content: car ce qui est élevé parmi les hommes est une abomination devant Dieu.
  '16':
  - type: text
    content: ' '
  - type: note
    content: Mt 11:12, 13.
  - type: text
    content: La loi et les prophètes ont subsisté jusqu’à Jean; depuis lors, le royaume de Dieu est annoncé, et chacun use de violence pour y entrer.
  - type: text
    content: ' '
  '17':
  - type: note
    content: Ps 102:27. És 40:8; 51:6. Mt 5:18.
  - type: text
    content: Il est plus facile que le ciel et la terre passent, qu’il ne l’est qu’un seul trait de lettre de la loi vienne à tomber.
  - type: text
    content: ' '
  '18':
  - type: note
    content: Mt 5:32; 19:9. Mc 10:11. 1 Co 7:10.
  - type: text
    content: Quiconque répudie sa femme et en épouse une autre commet un adultère, et quiconque épouse une femme répudiée par son mari commet un adultère.
  - type: heading
    content: Parabole du mauvais riche et du pauvre Lazare
  - type: heading
    content: 'V. 19-31: cf. Lu 16:9-12. Ps 49; 73. Pr 19:6, 7. (Lu 12:15-21; 6:20, 21, 24, 25.)'
  '19':
  - type: text
    content: ' '
  - type: text
    content: Il y avait un homme riche, qui était vêtu de pourpre et de fin lin, et qui chaque jour menait joyeuse et brillante vie.
  - type: text
    content: ' '
  '2':
  - type: text
    content: ' '
  - type: text
    content: 'Il l’appela, et lui dit: Qu’est-ce que j’entends dire de toi? Rends compte de ton administration, car tu ne pourras plus administrer mes biens.'
  - type: text
    content: ' '
  '20':
  - type: text
    content: Un pauvre, nommé Lazare, était couché à sa porte, couvert d’ulcères,
  - type: text
    content: ' '
  '21':
  - type: text
    content: et désireux de se rassasier des miettes qui tombaient de la table du riche; et même les chiens venaient encore lécher ses ulcères.
  - type: text
    content: ' '
  '22':
  - type: text
    content: Le pauvre mourut, et il fut porté par les anges dans le sein d’Abraham. Le riche mourut aussi, et il fut enseveli.
  - type: text
    content: ' '
  '23':
  - type: text
    content: Dans le séjour des morts, il leva les yeux; et, tandis qu’il était en proie aux tourments, il vit de loin Abraham, et Lazare dans son sein.
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'Il s’écria: Père Abraham, aie pitié de moi, et envoie Lazare, pour qu’il trempe le bout de son doigt dans l’eau et me rafraîchisse la langue;'
  - type: text
    content: ' '
  - type: note
    content: És 66:24. Mc 9:44.
  - type: text
    content: car je souffre cruellement dans cette flamme.
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'Abraham répondit:'
  - type: text
    content: ' '
  - type: note
    content: Job 21:13.
  - type: text
    content: Mon enfant, souviens-toi que tu as reçu tes biens pendant ta vie, et que Lazare a eu les maux pendant la sienne; maintenant il est ici consolé, et toi, tu souffres.
  - type: text
    content: ' '
  '26':
  - type: text
    content: D’ailleurs, il y a entre nous et vous un grand abîme, afin que ceux qui voudraient passer d’ici vers vous, ou de là vers nous, ne puissent le faire.
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'Le riche dit: Je te prie donc, père Abraham, d’envoyer Lazare dans la maison de mon père; car j’ai cinq frères.'
  - type: text
    content: ' '
  '28':
  - type: text
    content: C’est pour qu’il leur atteste ces choses, afin qu’ils ne viennent pas aussi dans ce lieu de tourments.
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'Abraham répondit:'
  - type: text
    content: ' '
  - type: note
    content: És 8:20; 34:16. Jn 5:39. Ac 17:11.
  - type: text
    content: Ils ont Moïse et les prophètes; qu’ils les écoutent.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'L’économe dit en lui-même: Que ferai-je, puisque mon maître m’ôte l’administration de ses biens? Travailler à la terre? Je ne le puis. Mendier? J’en ai honte.'
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'Et il dit: Non, père Abraham, mais si quelqu’un des morts va vers eux, ils se repentiront.'
  - type: text
    content: ' '
  '31':
  - type: text
    content: 'Et Abraham lui dit: S’ils n’écoutent pas Moïse et les prophètes, ils ne se laisseront pas persuader quand même quelqu’un des morts ressusciterait.'
  '4':
  - type: text
    content: Je sais ce que je ferai, pour qu’il y ait des gens qui me reçoivent dans leurs maisons quand je serai destitué de mon emploi.
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'Et, faisant venir chacun des débiteurs de son maître, il dit au premier: Combien dois-tu à mon maître?'
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'Cent mesures d’huile, répondit-il. Et il lui dit: Prends ton billet, assieds-toi vite, et écris cinquante.'
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'Il dit ensuite à un autre: Et toi, combien dois-tu? Cent mesures de blé, répondit-il. Et il lui dit: Prends ton billet, et écris quatre-vingts.'
  - type: text
    content: ' '
  '8':
  - type: text
    content: Le maître loua l’économe infidèle de ce qu’il avait agi prudemment. Car les enfants de ce siècle sont plus prudents à l’égard de leurs semblables que ne le sont
  - type: text
    content: ' '
  - type: note
    content: Ép 5:8. 1 Th 5:5.
  - type: text
    content: les enfants de lumière.
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'Et moi, je vous dis:'
  - type: text
    content: ' '
  - type: note
    content: Mt 6:19; 19:21. 1 Ti 6:19.
  - type: text
    content: Faites-vous des amis avec les richesses injustes, pour qu’ils vous reçoivent dans les tabernacles éternels, quand elles viendront à vous manquer.
  - type: text
    content: ' '
