document_id: LUK.16
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Parabole de l’économe infidèle
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-13: cf. (1 Ti 6:17-19. Lu 12:33.) Mt 25:14-30; 6:19, 20, 24.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jésus dit aussi à ses disciples: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Un homme riche avait un économe, qui lui fut dénoncé comme dissipant ses biens.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Il l’appela, et lui dit: Qu’est-ce que j’entends dire de toi? Rends compte de ton administration, car tu ne pourras plus administrer mes biens.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'L’économe dit en lui-même: Que ferai-je, puisque mon maître m’ôte l’administration de ses biens? Travailler à la terre? Je ne le puis. Mendier? J’en ai honte.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je sais ce que je ferai, pour qu’il y ait des gens qui me reçoivent dans leurs maisons quand je serai destitué de mon emploi.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Et, faisant venir chacun des débiteurs de son maître, il dit au premier: Combien dois-tu à mon maître?'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Cent mesures d’huile, répondit-il. Et il lui dit: Prends ton billet, assieds-toi vite, et écris cinquante.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Il dit ensuite à un autre: Et toi, combien dois-tu? Cent mesures de blé, répondit-il. Et il lui dit: Prends ton billet, et écris quatre-vingts.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Le maître loua l’économe infidèle de ce qu’il avait agi prudemment. Car les enfants de ce siècle sont plus prudents à l’égard de leurs semblables que ne le sont
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 5:8
      metadata:
        usfm: EPH.5.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 5:5
      metadata:
        usfm: 1TH.5.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: les enfants de lumière.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Et moi, je vous dis:'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 6:19
      metadata:
        usfm: MAT.6.19
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 19:21
      metadata:
        usfm: MAT.19.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 6:19
      metadata:
        usfm: 1TI.6.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Faites-vous des amis avec les richesses injustes, pour qu’ils vous reçoivent dans les tabernacles éternels, quand elles viendront à vous manquer.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Celui qui est fidèle dans les moindres choses l’est aussi dans les grandes, et celui qui est injuste dans les moindres choses l’est aussi dans les grandes.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Si donc vous n’avez pas été fidèles dans les richesses injustes, qui vous confiera les véritables?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Et si vous n’avez pas été fidèles dans ce qui est à autrui, qui vous donnera ce qui est à vous?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 6:24
      metadata:
        usfm: MAT.6.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Nul serviteur ne peut servir deux maîtres. Car, ou il haïra l’un et aimera l’autre; ou il s’attachera à l’un et méprisera l’autre. Vous ne pouvez servir Dieu et Mamon.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Reproches aux pharisiens
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 14-18: cf. Mt 23:23-28; 5:17-20, 31, 32.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Les pharisiens, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 23:14
      metadata:
        usfm: MAT.23.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qui étaient avares, écoutaient aussi tout cela, et ils se moquaient de lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Jésus leur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Vous, vous cherchez à paraître justes devant les hommes, mais
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 17:10
      metadata:
        usfm: PSA.17.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Dieu connaît vos cœurs;
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 16:7
      metadata:
        usfm: 1SA.16.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: car ce qui est élevé parmi les hommes est une abomination devant Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 11:12
      metadata:
        usfm: MAT.11.12
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '13'
      metadata:
        usfm: MAT.11.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: La loi et les prophètes ont subsisté jusqu’à Jean; depuis lors, le royaume de Dieu est annoncé, et chacun use de violence pour y entrer.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 102:27
      metadata:
        usfm: PSA.102.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 40:8
      metadata:
        usfm: ISA.40.8
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 51:6
      metadata:
        usfm: ISA.51.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 5:18
      metadata:
        usfm: MAT.5.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Il est plus facile que le ciel et la terre passent, qu’il ne l’est qu’un seul trait de lettre de la loi vienne à tomber.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 5:32
      metadata:
        usfm: MAT.5.32
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 19:9
      metadata:
        usfm: MAT.19.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 10:11
      metadata:
        usfm: MRK.10.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 7:10
      metadata:
        usfm: 1CO.7.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Quiconque répudie sa femme et en épouse une autre commet un adultère, et quiconque épouse une femme répudiée par son mari commet un adultère.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Parabole du mauvais riche et du pauvre Lazare
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 19-31: cf. Lu 16:9-12. Ps 49; 73. Pr 19:6, 7. (Lu 12:15-21; 6:20, 21, 24, 25.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Il y avait un homme riche, qui était vêtu de pourpre et de fin lin, et qui chaque jour menait joyeuse et brillante vie.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Un pauvre, nommé Lazare, était couché à sa porte, couvert d’ulcères,
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: et désireux de se rassasier des miettes qui tombaient de la table du riche; et même les chiens venaient encore lécher ses ulcères.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Le pauvre mourut, et il fut porté par les anges dans le sein d’Abraham. Le riche mourut aussi, et il fut enseveli.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Dans le séjour des morts, il leva les yeux; et, tandis qu’il était en proie aux tourments, il vit de loin Abraham, et Lazare dans son sein.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Il s’écria: Père Abraham, aie pitié de moi, et envoie Lazare, pour qu’il trempe le bout de son doigt dans l’eau et me rafraîchisse la langue;'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 66:24
      metadata:
        usfm: ISA.66.24
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 9:44
      metadata:
        usfm: MRK.9.44
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: car je souffre cruellement dans cette flamme.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Abraham répondit:'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 21:13
      metadata:
        usfm: JOB.21.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mon enfant, souviens-toi que tu as reçu tes biens pendant ta vie, et que Lazare a eu les maux pendant la sienne; maintenant il est ici consolé, et toi, tu souffres.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: D’ailleurs, il y a entre nous et vous un grand abîme, afin que ceux qui voudraient passer d’ici vers vous, ou de là vers nous, ne puissent le faire.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Le riche dit: Je te prie donc, père Abraham, d’envoyer Lazare dans la maison de mon père; car j’ai cinq frères.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: C’est pour qu’il leur atteste ces choses, afin qu’ils ne viennent pas aussi dans ce lieu de tourments.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Abraham répondit:'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 8:20
      metadata:
        usfm: ISA.8.20
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 34:16
      metadata:
        usfm: ISA.34.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 5:39
      metadata:
        usfm: JHN.5.39
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 17:11
      metadata:
        usfm: ACT.17.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ils ont Moïse et les prophètes; qu’ils les écoutent.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Et il dit: Non, père Abraham, mais si quelqu’un des morts va vers eux, ils se repentiront.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Et Abraham lui dit: S’ils n’écoutent pas Moïse et les prophètes, ils ne se laisseront pas persuader quand même quelqu’un des morts ressusciterait.'
