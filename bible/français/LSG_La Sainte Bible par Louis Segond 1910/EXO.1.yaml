document_id: EXO.1,93
type_code: fra
verses:
  '1':
  - type: heading
    content: LE PEUPLE D’ISRAËL EN ÉGYPTE
  - type: heading
    content: Ch. 1 à 15:21. (Ge 15:13, 14. Ps 105:23-39; 106:7-12. Ac 7:17-36.)
  - type: heading
    content: Souffrances des Israélites en Égypte
  - type: heading
    content: 'V. 1-7: cf. Ge 46:8-27. Ac 7:14-17.'
  - type: text
    content: 'Voici les noms des fils d’Israël, '
  - type: note
    content: Ge 46:8. Ex 6:13.
  - type: text
    content: 'venus en Égypte avec Jacob et la famille de chacun d’eux: '
  '10':
  - type: note
    content: Ac 7:19.
  - type: text
    content: 'Allons! Montrons-nous habiles à son égard; empêchons qu’il ne s’accroisse, et que, s’il survient une guerre, il ne se joigne à nos ennemis, pour nous combattre et sortir ensuite du pays. '
  '11':
  - type: text
    content: 'Et l’on établit sur lui des chefs de corvées, afin de l’accabler de travaux pénibles. C’est ainsi qu’il bâtit les villes de Pithom et de Ramsès, pour servir de magasins à Pharaon. '
  '12':
  - type: text
    content: 'Mais '
  - type: note
    content: Ps 105:24.
  - type: text
    content: 'plus on l’accablait, plus il multipliait et s’accroissait; et l’on prit en aversion les enfants d’Israël. '
  '13':
  - type: text
    content: 'Alors les Égyptiens réduisirent les enfants d’Israël à une dure servitude. '
  '14':
  - type: text
    content: 'Ils leur rendirent la vie amère par de rudes travaux en argile et en briques, et par tous les ouvrages des champs: et c’était avec cruauté qu’ils leur imposaient toutes ces charges. '
  '15':
  - type: text
    content: 'Le roi d’Égypte parla aussi aux sages-femmes des Hébreux, nommées l’une Schiphra, et l’autre Pua. '
  '16':
  - type: text
    content: 'Il leur dit: Quand vous accoucherez les femmes des Hébreux et que vous les verrez sur les sièges, si c’est un garçon, faites-le mourir; si c’est une fille, laissez-la vivre. '
  '17':
  - type: text
    content: 'Mais les sages-femmes craignirent Dieu, et ne firent point ce que leur avait dit le roi d’Égypte; elles laissèrent vivre les enfants. '
  '18':
  - type: text
    content: 'Le roi d’Égypte appela les sages-femmes, et leur dit: Pourquoi avez-vous agi ainsi, et avez-vous laissé vivre les enfants? '
  '19':
  - type: text
    content: 'Les sages-femmes répondirent à Pharaon: C’est que les femmes des Hébreux ne sont pas comme les Égyptiennes; elles sont vigoureuses et elles accouchent avant l’arrivée de la sage-femme. '
  '2':
  - type: text
    content: 'Ruben, Siméon, Lévi, Juda, '
  '20':
  - type: text
    content: 'Dieu fit du bien aux sages-femmes; et le peuple multiplia et devint très nombreux. '
  '21':
  - type: text
    content: 'Parce que les sages-femmes avaient eu la crainte de Dieu, Dieu fit prospérer leurs maisons. '
  '22':
  - type: note
    content: Ac 7:19.
  - type: text
    content: 'Alors Pharaon donna cet ordre à tout son peuple: Vous jetterez dans le fleuve tout garçon qui naîtra, et vous laisserez vivre toutes les filles.'
  '3':
  - type: text
    content: 'Issacar, Zabulon, Benjamin, '
  '4':
  - type: text
    content: 'Dan, Nephthali, Gad et Aser. '
  '5':
  - type: note
    content: Ge 46:27. De 10:22. Ac 7:14.
  - type: text
    content: 'Les personnes issues de Jacob étaient au nombre de soixante-dix en tout. Joseph était alors en Égypte. '
  '6':
  - type: note
    content: Ge 50:26.
  - type: text
    content: 'Joseph mourut, ainsi que tous ses frères et toute cette génération-là. '
  '7':
  - type: text
    content: 'Les enfants d’Israël furent féconds '
  - type: note
    content: De 26:5. Ac 7:17.
  - type: text
    content: et multiplièrent, ils s’accrurent et devinrent de plus en plus puissants. Et le pays en fut rempli.
  - type: heading
    content: 'V. 8-22: cf. De 26:5, 6. Ps 105:24, 25. Ac 7:18, 19. Pr 28:15.'
  '8':
  - type: text
    content: ' '
  - type: note
    content: Ac 7:18.
  - type: text
    content: 'Il s’éleva sur l’Égypte un nouveau roi, qui n’avait point connu Joseph. '
  '9':
  - type: text
    content: 'Il dit à son peuple: Voilà les enfants d’Israël qui forment un peuple plus nombreux et plus puissant que nous. '
