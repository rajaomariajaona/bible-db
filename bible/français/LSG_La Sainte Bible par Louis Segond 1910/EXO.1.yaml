document_id: EXO.1
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: LE PEUPLE D’ISRAËL EN ÉGYPTE
  marker-yv: yv-h
- type: usfm
  marker: ms2
  children:
  - type: text
    text: Ch. 1 à 15:21. (Ge 15:13, 14. Ps 105:23-39; 106:7-12. Ac 7:17-36.)
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Souffrances des Israélites en Égypte
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-7: cf. Ge 46:8-27. Ac 7:14-17.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Voici les noms des fils d’Israël, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 46:8
      metadata:
        usfm: GEN.46.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 6:13
      metadata:
        usfm: EXO.6.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'venus en Égypte avec Jacob et la famille de chacun d’eux: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ruben, Siméon, Lévi, Juda, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Issacar, Zabulon, Benjamin, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dan, Nephthali, Gad et Aser. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 46:27
      metadata:
        usfm: GEN.46.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 10:22
      metadata:
        usfm: DEU.10.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 7:14
      metadata:
        usfm: ACT.7.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Les personnes issues de Jacob étaient au nombre de soixante-dix en tout. Joseph était alors en Égypte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 50:26
      metadata:
        usfm: GEN.50.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Joseph mourut, ainsi que tous ses frères et toute cette génération-là. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Les enfants d’Israël furent féconds '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 26:5
      metadata:
        usfm: DEU.26.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 7:17
      metadata:
        usfm: ACT.7.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: et multiplièrent, ils s’accrurent et devinrent de plus en plus puissants. Et le pays en fut rempli.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 8-22: cf. De 26:5, 6. Ps 105:24, 25. Ac 7:18, 19. Pr 28:15.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 7:18
      metadata:
        usfm: ACT.7.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il s’éleva sur l’Égypte un nouveau roi, qui n’avait point connu Joseph. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il dit à son peuple: Voilà les enfants d’Israël qui forment un peuple plus nombreux et plus puissant que nous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 7:19
      metadata:
        usfm: ACT.7.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Allons! Montrons-nous habiles à son égard; empêchons qu’il ne s’accroisse, et que, s’il survient une guerre, il ne se joigne à nos ennemis, pour nous combattre et sortir ensuite du pays. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Et l’on établit sur lui des chefs de corvées, afin de l’accabler de travaux pénibles. C’est ainsi qu’il bâtit les villes de Pithom et de Ramsès, pour servir de magasins à Pharaon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mais '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 105:24
      metadata:
        usfm: PSA.105.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'plus on l’accablait, plus il multipliait et s’accroissait; et l’on prit en aversion les enfants d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Alors les Égyptiens réduisirent les enfants d’Israël à une dure servitude. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ils leur rendirent la vie amère par de rudes travaux en argile et en briques, et par tous les ouvrages des champs: et c’était avec cruauté qu’ils leur imposaient toutes ces charges. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Le roi d’Égypte parla aussi aux sages-femmes des Hébreux, nommées l’une Schiphra, et l’autre Pua. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il leur dit: Quand vous accoucherez les femmes des Hébreux et que vous les verrez sur les sièges, si c’est un garçon, faites-le mourir; si c’est une fille, laissez-la vivre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Mais les sages-femmes craignirent Dieu, et ne firent point ce que leur avait dit le roi d’Égypte; elles laissèrent vivre les enfants. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Le roi d’Égypte appela les sages-femmes, et leur dit: Pourquoi avez-vous agi ainsi, et avez-vous laissé vivre les enfants? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Les sages-femmes répondirent à Pharaon: C’est que les femmes des Hébreux ne sont pas comme les Égyptiennes; elles sont vigoureuses et elles accouchent avant l’arrivée de la sage-femme. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dieu fit du bien aux sages-femmes; et le peuple multiplia et devint très nombreux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Parce que les sages-femmes avaient eu la crainte de Dieu, Dieu fit prospérer leurs maisons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 7:19
      metadata:
        usfm: ACT.7.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Alors Pharaon donna cet ordre à tout son peuple: Vous jetterez dans le fleuve tout garçon qui naîtra, et vous laisserez vivre toutes les filles.'
