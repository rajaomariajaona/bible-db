document_id: ACT.20,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Paul en Macédoine et en Grèce. Départ pour Jérusalem, par la Macédoine
  - type: heading
    content: 'V. 1-6: cf. 1 Co 16:1-7. 2 Co 7:5. Ro 15:25-27.'
  - type: text
    content: 'Lorsque le tumulte eut cessé, Paul réunit les disciples, et, après les avoir exhortés, prit congé d’eux, et '
  - type: note
    content: 1 Ti 1:3.
  - type: text
    content: 'partit pour aller en Macédoine. '
  '10':
  - type: text
    content: 'Mais Paul, étant descendu, '
  - type: note
    content: 1 R 17:21. 2 R 4:34.
  - type: text
    content: 'se pencha sur lui et le prit dans ses bras, en disant: Ne vous troublez pas, car son âme est en lui. '
  '11':
  - type: text
    content: 'Quand il fut remonté, il rompit le pain et mangea, et il parla longtemps encore jusqu’au jour. Après quoi il partit. '
  '12':
  - type: text
    content: Le jeune homme fut ramené vivant, et ce fut le sujet d’une grande consolation.
  - type: heading
    content: 'V. 13-16: cf. Ac 18:18-21.'
  '13':
  - type: text
    content: 'Pour nous, nous précédâmes Paul sur le navire, et nous fîmes voile pour Assos, où nous étions convenus de le reprendre, parce qu’il devait faire la route à pied. '
  '14':
  - type: text
    content: 'Lorsqu’il nous eut rejoints à Assos, nous le prîmes à bord, et nous allâmes à Mytilène. '
  '15':
  - type: text
    content: 'De là, continuant par mer, nous arrivâmes le lendemain vis-à-vis de Chios. Le jour suivant, nous cinglâmes vers Samos, et le jour d’après nous vînmes à Milet. '
  '16':
  - type: text
    content: 'Paul avait résolu de passer devant Éphèse sans s’y arrêter, afin de ne pas perdre de temps en Asie; '
  - type: note
    content: Ac 21:4, 12.
  - type: text
    content: car il se hâtait pour se trouver, si cela lui était possible, à Jérusalem le jour de la Pentecôte.
  - type: heading
    content: 'À Milet: discours d’adieu aux anciens d’Éphèse. À Tyr: adieux aux disciples'
  - type: heading
    content: 'V. 17-38: cf. (1 Th 2:1-12. 1 Pi 5:1-4.) (Mt 7:15-20. 2 Pi 2:1-3. Tit 1:9-14.)'
  '17':
  - type: text
    content: 'Cependant, de Milet Paul envoya chercher à Éphèse les anciens de l’Église. '
  '18':
  - type: text
    content: 'Lorsqu’ils furent arrivés vers lui, il leur dit: Vous savez de quelle manière, '
  - type: note
    content: Ac 19:10.
  - type: text
    content: 'depuis le premier jour où je suis entré en Asie, je me suis sans cesse conduit avec vous, '
  '19':
  - type: text
    content: 'servant le Seigneur en toute humilité, avec larmes, et au milieu des épreuves que me suscitaient les embûches des Juifs. '
  '2':
  - type: text
    content: 'Il parcourut cette contrée, en adressant aux disciples de nombreuses exhortations. '
  '20':
  - type: text
    content: 'Vous savez que je n’ai rien caché de ce qui vous était utile, et que je n’ai pas craint de vous prêcher et de vous enseigner publiquement et dans les maisons, '
  '21':
  - type: text
    content: 'annonçant aux Juifs et aux Grecs '
  - type: note
    content: Mt 3:2. Mc 1:15. Lu 24:47.
  - type: text
    content: 'la repentance envers Dieu et la foi en notre Seigneur Jésus-Christ. '
  '22':
  - type: text
    content: 'Et maintenant voici, lié par l’Esprit, je vais à Jérusalem, ne sachant pas ce qui m’y arrivera; '
  '23':
  - type: text
    content: 'seulement, de ville en ville, l’Esprit-Saint m’avertit que des liens et des tribulations m’attendent. '
  '24':
  - type: note
    content: Ac 21:13.
  - type: text
    content: 'Mais je ne fais pour moi-même aucun cas de ma vie, comme si elle m’était précieuse, pourvu que j’accomplisse ma course avec joie, et le ministère que j’ai reçu '
  - type: note
    content: Ga 1:1. Tit 3.
  - type: text
    content: 'du Seigneur Jésus, d’annoncer la bonne nouvelle de la grâce de Dieu. '
  '25':
  - type: text
    content: 'Et maintenant voici, je sais que vous ne verrez plus mon visage, vous tous au milieu desquels j’ai passé en prêchant le royaume de Dieu. '
  '26':
  - type: text
    content: 'C’est pourquoi je vous déclare aujourd’hui que je suis pur du sang de vous tous, '
  '27':
  - type: text
    content: 'car je vous ai annoncé tout le conseil de Dieu, sans en rien cacher. '
  '28':
  - type: note
    content: 1 Pi 5:2.
  - type: text
    content: 'Prenez donc garde à vous-mêmes, et à tout le troupeau sur lequel le Saint-Esprit vous a établis évêques, pour paître l’Église du Seigneur, qu’il s’est '
  - type: note
    content: Ép 1:7. Col 1:14. 1 Pi 1:19. Ap 5:9.
  - type: text
    content: 'acquise par son propre sang. '
  '29':
  - type: text
    content: 'Je sais qu’il s’introduira parmi vous, après mon départ, '
  - type: note
    content: 2 Pi 2:1.
  - type: text
    content: 'des loups cruels qui n’épargneront pas le troupeau, '
  '3':
  - type: text
    content: 'Puis il se rendit en Grèce, où il séjourna trois mois. Il était sur le point de s’embarquer pour la Syrie, quand les Juifs lui dressèrent des embûches. Alors il se décida à reprendre la route de la Macédoine. '
  '30':
  - type: note
    content: Ps 41:10. Mt 26:21. Ac 1:17. 1 Jn 2:19.
  - type: text
    content: 'et qu’il s’élèvera du milieu de vous des hommes qui enseigneront des choses pernicieuses, pour entraîner les disciples après eux. '
  '31':
  - type: text
    content: 'Veillez donc, vous souvenant que, durant trois années, je n’ai cessé nuit et jour d’exhorter avec larmes chacun de vous. '
  '32':
  - type: text
    content: 'Et maintenant je vous recommande à Dieu et à la parole de sa grâce, à celui qui peut édifier et donner l’héritage avec tous les sanctifiés. '
  '33':
  - type: note
    content: 1 Co 9:12. 2 Co 11:9; 12:13.
  - type: text
    content: 'Je n’ai désiré ni l’argent, ni l’or, ni les vêtements de personne. '
  '34':
  - type: text
    content: 'Vous savez vous-mêmes que '
  - type: note
    content: Ac 18:3. 1 Co 4:12. 1 Th 2:9. 2 Th 3:8.
  - type: text
    content: 'ces mains ont pourvu à mes besoins et à ceux des personnes qui étaient avec moi. '
  '35':
  - type: text
    content: 'Je vous ai montré de toutes manières que c’est en travaillant ainsi qu’il faut soutenir les faibles, et se rappeler les paroles du Seigneur, qui a dit lui-même: '
  - type: text
    content: Il y a plus de bonheur à donner qu’à recevoir.
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'Après avoir ainsi parlé, '
  - type: note
    content: Ac 21:5.
  - type: text
    content: 'il se mit à genoux, et il pria avec eux tous. '
  '37':
  - type: text
    content: 'Et tous fondirent en larmes, et, se jetant au cou de Paul, '
  '38':
  - type: text
    content: ils l’embrassaient, affligés surtout de ce qu’il avait dit qu’ils ne verraient plus son visage. Et ils l’accompagnèrent jusqu’au navire.
  '4':
  - type: text
    content: 'Il avait pour l’accompagner jusqu’en Asie: Sopater de Bérée, fils de Pyrrhus, '
  - type: note
    content: Ac 19:29; 27:2. Col 4:10.
  - type: text
    content: 'Aristarque et Second de Thessalonique, '
  - type: note
    content: Ac 19:29. 1 Co 1:14.
  - type: text
    content: 'Gaïus de Derbe, '
  - type: note
    content: Ac 16:1.
  - type: text
    content: 'Timothée, ainsi que '
  - type: note
    content: Ép 6:21. Col 4:7. 2 Ti 4:12. Tit 3:12.
  - type: text
    content: 'Tychique et '
  - type: note
    content: Ac 21:29. 2 Ti 4:20.
  - type: text
    content: 'Trophime, originaires d’Asie. '
  '5':
  - type: text
    content: 'Ceux-ci prirent les devants, et nous attendirent à Troas. '
  '6':
  - type: text
    content: Pour nous, après les jours des pains sans levain, nous nous embarquâmes à Philippes, et, au bout de cinq jours, nous les rejoignîmes à Troas, où nous passâmes sept jours.
  - type: heading
    content: 'À Troas: résurrection d’Eutychus'
  - type: heading
    content: 'V. 7-12: cf. (Ac 9:36-42. 1 R 17:17-24. 2 R 4:32-37.) 2 Co 1:3, 4.'
  '7':
  - type: text
    content: 'Le premier jour de la semaine, nous étions réunis pour rompre le pain. Paul, qui devait partir le lendemain, s’entretenait avec les disciples, et il prolongea son discours jusqu’à minuit. '
  '8':
  - type: text
    content: 'Il y avait beaucoup de lampes dans la chambre haute où nous étions assemblés. '
  '9':
  - type: text
    content: 'Or, un jeune homme nommé Eutychus, qui était assis sur la fenêtre, s’endormit profondément pendant le long discours de Paul; entraîné par le sommeil, il tomba du troisième étage en bas, et il fut relevé mort. '
