document_id: ACT.20
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul en Macédoine et en Grèce. Départ pour Jérusalem, par la Macédoine
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-6: cf. 1 Co 16:1-7. 2 Co 7:5. Ro 15:25-27.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Lorsque le tumulte eut cessé, Paul réunit les disciples, et, après les avoir exhortés, prit congé d’eux, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 1:3
      metadata:
        usfm: 1TI.1.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'partit pour aller en Macédoine. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il parcourut cette contrée, en adressant aux disciples de nombreuses exhortations. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Puis il se rendit en Grèce, où il séjourna trois mois. Il était sur le point de s’embarquer pour la Syrie, quand les Juifs lui dressèrent des embûches. Alors il se décida à reprendre la route de la Macédoine. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il avait pour l’accompagner jusqu’en Asie: Sopater de Bérée, fils de Pyrrhus, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 19:29
      metadata:
        usfm: ACT.19.29
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 27:2
      metadata:
        usfm: ACT.27.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 4:10
      metadata:
        usfm: COL.4.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Aristarque et Second de Thessalonique, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 19:29
      metadata:
        usfm: ACT.19.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 1:14
      metadata:
        usfm: 1CO.1.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Gaïus de Derbe, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 16:1
      metadata:
        usfm: ACT.16.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Timothée, ainsi que '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 6:21
      metadata:
        usfm: EPH.6.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 4:7
      metadata:
        usfm: COL.4.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ti 4:12
      metadata:
        usfm: 2TI.4.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Tit 3:12
      metadata:
        usfm: TIT.3.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tychique et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 21:29
      metadata:
        usfm: ACT.21.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ti 4:20
      metadata:
        usfm: 2TI.4.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Trophime, originaires d’Asie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ceux-ci prirent les devants, et nous attendirent à Troas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Pour nous, après les jours des pains sans levain, nous nous embarquâmes à Philippes, et, au bout de cinq jours, nous les rejoignîmes à Troas, où nous passâmes sept jours.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'À Troas: résurrection d’Eutychus'
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 7-12: cf. (Ac 9:36-42. 1 R 17:17-24. 2 R 4:32-37.) 2 Co 1:3, 4.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Le premier jour de la semaine, nous étions réunis pour rompre le pain. Paul, qui devait partir le lendemain, s’entretenait avec les disciples, et il prolongea son discours jusqu’à minuit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Il y avait beaucoup de lampes dans la chambre haute où nous étions assemblés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Or, un jeune homme nommé Eutychus, qui était assis sur la fenêtre, s’endormit profondément pendant le long discours de Paul; entraîné par le sommeil, il tomba du troisième étage en bas, et il fut relevé mort. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Mais Paul, étant descendu, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 17:21
      metadata:
        usfm: 1KI.17.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 4:34
      metadata:
        usfm: 2KI.4.34
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'se pencha sur lui et le prit dans ses bras, en disant: Ne vous troublez pas, car son âme est en lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Quand il fut remonté, il rompit le pain et mangea, et il parla longtemps encore jusqu’au jour. Après quoi il partit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Le jeune homme fut ramené vivant, et ce fut le sujet d’une grande consolation.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 13-16: cf. Ac 18:18-21.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Pour nous, nous précédâmes Paul sur le navire, et nous fîmes voile pour Assos, où nous étions convenus de le reprendre, parce qu’il devait faire la route à pied. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Lorsqu’il nous eut rejoints à Assos, nous le prîmes à bord, et nous allâmes à Mytilène. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'De là, continuant par mer, nous arrivâmes le lendemain vis-à-vis de Chios. Le jour suivant, nous cinglâmes vers Samos, et le jour d’après nous vînmes à Milet. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Paul avait résolu de passer devant Éphèse sans s’y arrêter, afin de ne pas perdre de temps en Asie; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 21:4
      metadata:
        usfm: ACT.21.4
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '12'
      metadata:
        usfm: ACT.21.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: car il se hâtait pour se trouver, si cela lui était possible, à Jérusalem le jour de la Pentecôte.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'À Milet: discours d’adieu aux anciens d’Éphèse. À Tyr: adieux aux disciples'
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 17-38: cf. (1 Th 2:1-12. 1 Pi 5:1-4.) (Mt 7:15-20. 2 Pi 2:1-3. Tit 1:9-14.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Cependant, de Milet Paul envoya chercher à Éphèse les anciens de l’Église. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Lorsqu’ils furent arrivés vers lui, il leur dit: Vous savez de quelle manière, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 19:10
      metadata:
        usfm: ACT.19.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'depuis le premier jour où je suis entré en Asie, je me suis sans cesse conduit avec vous, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'servant le Seigneur en toute humilité, avec larmes, et au milieu des épreuves que me suscitaient les embûches des Juifs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Vous savez que je n’ai rien caché de ce qui vous était utile, et que je n’ai pas craint de vous prêcher et de vous enseigner publiquement et dans les maisons, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'annonçant aux Juifs et aux Grecs '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 3:2
      metadata:
        usfm: MAT.3.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 1:15
      metadata:
        usfm: MRK.1.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 24:47
      metadata:
        usfm: LUK.24.47
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'la repentance envers Dieu et la foi en notre Seigneur Jésus-Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Et maintenant voici, lié par l’Esprit, je vais à Jérusalem, ne sachant pas ce qui m’y arrivera; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'seulement, de ville en ville, l’Esprit-Saint m’avertit que des liens et des tribulations m’attendent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 21:13
      metadata:
        usfm: ACT.21.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Mais je ne fais pour moi-même aucun cas de ma vie, comme si elle m’était précieuse, pourvu que j’accomplisse ma course avec joie, et le ministère que j’ai reçu '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 1:1
      metadata:
        usfm: GAL.1.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Tit 3
      metadata:
        usfm: TIT.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'du Seigneur Jésus, d’annoncer la bonne nouvelle de la grâce de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Et maintenant voici, je sais que vous ne verrez plus mon visage, vous tous au milieu desquels j’ai passé en prêchant le royaume de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'C’est pourquoi je vous déclare aujourd’hui que je suis pur du sang de vous tous, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'car je vous ai annoncé tout le conseil de Dieu, sans en rien cacher. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 5:2
      metadata:
        usfm: 1PE.5.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Prenez donc garde à vous-mêmes, et à tout le troupeau sur lequel le Saint-Esprit vous a établis évêques, pour paître l’Église du Seigneur, qu’il s’est '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 1:7
      metadata:
        usfm: EPH.1.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 1:14
      metadata:
        usfm: COL.1.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 1:19
      metadata:
        usfm: 1PE.1.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 5:9
      metadata:
        usfm: REV.5.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'acquise par son propre sang. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Je sais qu’il s’introduira parmi vous, après mon départ, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Pi 2:1
      metadata:
        usfm: 2PE.2.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'des loups cruels qui n’épargneront pas le troupeau, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 41:10
      metadata:
        usfm: PSA.41.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 26:21
      metadata:
        usfm: MAT.26.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 1:17
      metadata:
        usfm: ACT.1.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 2:19
      metadata:
        usfm: 1JN.2.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et qu’il s’élèvera du milieu de vous des hommes qui enseigneront des choses pernicieuses, pour entraîner les disciples après eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Veillez donc, vous souvenant que, durant trois années, je n’ai cessé nuit et jour d’exhorter avec larmes chacun de vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Et maintenant je vous recommande à Dieu et à la parole de sa grâce, à celui qui peut édifier et donner l’héritage avec tous les sanctifiés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 9:12
      metadata:
        usfm: 1CO.9.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 11:9
      metadata:
        usfm: 2CO.11.9
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 12:13
      metadata:
        usfm: 2CO.12.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Je n’ai désiré ni l’argent, ni l’or, ni les vêtements de personne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Vous savez vous-mêmes que '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 18:3
      metadata:
        usfm: ACT.18.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 4:12
      metadata:
        usfm: 1CO.4.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 2:9
      metadata:
        usfm: 1TH.2.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Th 3:8
      metadata:
        usfm: 2TH.3.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ces mains ont pourvu à mes besoins et à ceux des personnes qui étaient avec moi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Je vous ai montré de toutes manières que c’est en travaillant ainsi qu’il faut soutenir les faibles, et se rappeler les paroles du Seigneur, qui a dit lui-même: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Il y a plus de bonheur à donner qu’à recevoir.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Après avoir ainsi parlé, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 21:5
      metadata:
        usfm: ACT.21.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'il se mit à genoux, et il pria avec eux tous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Et tous fondirent en larmes, et, se jetant au cou de Paul, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ils l’embrassaient, affligés surtout de ce qu’il avait dit qu’ils ne verraient plus son visage. Et ils l’accompagnèrent jusqu’au navire.
