document_id: 1CH.25,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les chantres distribués en vingt-quatre classes
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-31: cf. (1 Ch 15:16-21; 16:4, etc.) Ps 150. Col 3:16.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David et les chefs de l’armée mirent à part pour le service ceux des fils d’Asaph, d’Héman et de Jeduthun qui prophétisaient en s’accompagnant de la harpe, du luth et des cymbales. Et voici le nombre de ceux qui avaient des fonctions à remplir. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le troisième, à Zaccur, ses fils et ses frères, douze; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le quatrième, à Jitseri, ses fils et ses frères, douze; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le cinquième, à Nethania, ses fils et ses frères, douze; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le sixième, à Bukkija, ses fils et ses frères, douze; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le septième, à Jesareéla, ses fils et ses frères, douze; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le huitième, à Ésaïe, ses fils et ses frères, douze; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le neuvième, à Matthania, ses fils et ses frères, douze; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le dixième, à Schimeï, ses fils et ses frères, douze; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le onzième, à Azareel, ses fils et ses frères, douze; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le douzième, à Haschabia, ses fils et ses frères, douze; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Des fils d’Asaph: Zaccur, Joseph, Nethania et Aschareéla, fils d’Asaph, sous la direction d’Asaph qui prophétisait suivant les ordres du roi. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le treizième, à Schubaël, ses fils et ses frères, douze; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le quatorzième, à Matthithia, ses fils et ses frères, douze; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le quinzième, à Jerémoth, ses fils et ses frères, douze; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le seizième, à Hanania, ses fils et ses frères, douze; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le dix-septième, à Joschbekascha, ses fils et ses frères, douze; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le dix-huitième, à Hanani, ses fils et ses frères, douze; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le dix-neuvième, à Mallothi, ses fils et ses frères, douze; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le vingtième, à Élijatha, ses fils et ses frères, douze; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le vingt et unième, à Hothir, ses fils et ses frères, douze; '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le vingt-deuxième, à Guiddalthi, ses fils et ses frères, douze; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De Jeduthun, les fils de Jeduthun: Guedalia, Tseri, Ésaïe, Haschabia, Matthithia et Schimeï, six, sous la direction de leur père Jeduthun qui prophétisait avec la harpe pour louer et célébrer l’Éternel. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le vingt-troisième, à Machazioth, ses fils et ses frères, douze; '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: le vingt-quatrième, à Romamthi-Ézer, ses fils et ses frères, douze.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'D’Héman, les fils d’Héman: Bukkija, Matthania, Uziel, Schebuel, Jerimoth, Hanania, Hanani, Éliatha, Guiddalthi, Romamthi-Ézer, Joschbekascha, Mallothi, Hothir, Machazioth, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tous fils d’Héman, qui était voyant du roi pour révéler les paroles de Dieu et pour exalter sa puissance; Dieu avait donné à Héman quatorze fils et trois filles. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tous ceux-là étaient sous la direction de leurs pères, pour le chant de la maison de l’Éternel, et avaient des cymbales, des luths et des harpes pour le service de la maison de Dieu. Asaph, Jeduthun et Héman recevaient les ordres du roi. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils étaient au nombre de deux cent quatre-vingt-huit, y compris leurs frères exercés au chant de l’Éternel, tous ceux qui étaient habiles. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils tirèrent au sort pour leurs fonctions, petits et grands, maîtres et disciples. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le premier sort échut, pour Asaph, à Joseph; le second, à Guedalia, lui, ses frères et ses fils, douze; '
