document_id: 1CH.25,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Les chantres distribués en vingt-quatre classes
  - type: heading
    content: 'V. 1-31: cf. (1 Ch 15:16-21; 16:4, etc.) Ps 150. Col 3:16.'
  - type: text
    content: 'David et les chefs de l’armée mirent à part pour le service ceux des fils d’Asaph, d’Héman et de Jeduthun qui prophétisaient en s’accompagnant de la harpe, du luth et des cymbales. Et voici le nombre de ceux qui avaient des fonctions à remplir. '
  '10':
  - type: text
    content: 'le troisième, à Zaccur, ses fils et ses frères, douze; '
  '11':
  - type: text
    content: 'le quatrième, à Jitseri, ses fils et ses frères, douze; '
  '12':
  - type: text
    content: 'le cinquième, à Nethania, ses fils et ses frères, douze; '
  '13':
  - type: text
    content: 'le sixième, à Bukkija, ses fils et ses frères, douze; '
  '14':
  - type: text
    content: 'le septième, à Jesareéla, ses fils et ses frères, douze; '
  '15':
  - type: text
    content: 'le huitième, à Ésaïe, ses fils et ses frères, douze; '
  '16':
  - type: text
    content: 'le neuvième, à Matthania, ses fils et ses frères, douze; '
  '17':
  - type: text
    content: 'le dixième, à Schimeï, ses fils et ses frères, douze; '
  '18':
  - type: text
    content: 'le onzième, à Azareel, ses fils et ses frères, douze; '
  '19':
  - type: text
    content: 'le douzième, à Haschabia, ses fils et ses frères, douze; '
  '2':
  - type: text
    content: 'Des fils d’Asaph: Zaccur, Joseph, Nethania et Aschareéla, fils d’Asaph, sous la direction d’Asaph qui prophétisait suivant les ordres du roi. '
  '20':
  - type: text
    content: 'le treizième, à Schubaël, ses fils et ses frères, douze; '
  '21':
  - type: text
    content: 'le quatorzième, à Matthithia, ses fils et ses frères, douze; '
  '22':
  - type: text
    content: 'le quinzième, à Jerémoth, ses fils et ses frères, douze; '
  '23':
  - type: text
    content: 'le seizième, à Hanania, ses fils et ses frères, douze; '
  '24':
  - type: text
    content: 'le dix-septième, à Joschbekascha, ses fils et ses frères, douze; '
  '25':
  - type: text
    content: 'le dix-huitième, à Hanani, ses fils et ses frères, douze; '
  '26':
  - type: text
    content: 'le dix-neuvième, à Mallothi, ses fils et ses frères, douze; '
  '27':
  - type: text
    content: 'le vingtième, à Élijatha, ses fils et ses frères, douze; '
  '28':
  - type: text
    content: 'le vingt et unième, à Hothir, ses fils et ses frères, douze; '
  '29':
  - type: text
    content: 'le vingt-deuxième, à Guiddalthi, ses fils et ses frères, douze; '
  '3':
  - type: text
    content: 'De Jeduthun, les fils de Jeduthun: Guedalia, Tseri, Ésaïe, Haschabia, Matthithia et Schimeï, six, sous la direction de leur père Jeduthun qui prophétisait avec la harpe pour louer et célébrer l’Éternel. '
  '30':
  - type: text
    content: 'le vingt-troisième, à Machazioth, ses fils et ses frères, douze; '
  '31':
  - type: text
    content: le vingt-quatrième, à Romamthi-Ézer, ses fils et ses frères, douze.
  '4':
  - type: text
    content: 'D’Héman, les fils d’Héman: Bukkija, Matthania, Uziel, Schebuel, Jerimoth, Hanania, Hanani, Éliatha, Guiddalthi, Romamthi-Ézer, Joschbekascha, Mallothi, Hothir, Machazioth, '
  '5':
  - type: text
    content: 'tous fils d’Héman, qui était voyant du roi pour révéler les paroles de Dieu et pour exalter sa puissance; Dieu avait donné à Héman quatorze fils et trois filles. '
  '6':
  - type: text
    content: 'Tous ceux-là étaient sous la direction de leurs pères, pour le chant de la maison de l’Éternel, et avaient des cymbales, des luths et des harpes pour le service de la maison de Dieu. Asaph, Jeduthun et Héman recevaient les ordres du roi. '
  '7':
  - type: text
    content: 'Ils étaient au nombre de deux cent quatre-vingt-huit, y compris leurs frères exercés au chant de l’Éternel, tous ceux qui étaient habiles. '
  '8':
  - type: text
    content: 'Ils tirèrent au sort pour leurs fonctions, petits et grands, maîtres et disciples. '
  '9':
  - type: text
    content: 'Le premier sort échut, pour Asaph, à Joseph; le second, à Guedalia, lui, ses frères et ses fils, douze; '
