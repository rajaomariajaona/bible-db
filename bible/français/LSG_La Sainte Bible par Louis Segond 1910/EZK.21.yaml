document_id: EZK.21,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Contre Jérusalem et contre les Ammonites
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-5: cf. Éz 15.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La parole de l’Éternel me fut adressée, en ces mots:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et toute chair saura
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que moi, l’Éternel, j’ai tiré mon épée de son fourreau.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle n’y rentrera plus.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et toi, fils de l’homme, gémis!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les reins brisés et l’amertume dans l’âme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Gémis sous leurs regards!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et s’ils te disent: Pourquoi gémis-tu?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tu répondras: Parce qu’il arrive une nouvelle…'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tous les cœurs '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 49:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: s’alarmeront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Toutes les mains deviendront '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 6:24
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 7:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: faibles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tous les esprits seront '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 4:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: abattus,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tous les '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 7:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: genoux se fondront en eau…
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, elle arrive, elle est là!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit le Seigneur, l’Éternel.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'La parole de l’Éternel me fut adressée, en ces mots:'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Fils de l’homme, prophétise, et dis:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi parle l’Éternel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dis: L’épée! L’épée!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle est aiguisée, elle est polie.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est pour massacrer qu’elle est aiguisée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est pour étinceler qu’elle est polie…
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous réjouirons-nous?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le sceptre de mon fils méprise tout bois…
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On l’a donnée à polir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour que la main la saisisse;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle est aiguisée, l’épée, elle est polie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour armer la main de celui qui massacre.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Crie et gémis, fils de l’homme!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car elle est tirée contre mon peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Contre tous les princes d’Israël;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 7:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ils sont livrés à l’épée avec mon peuple.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 6:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Frappe donc sur ta cuisse!
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Oui, l’épreuve '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 1:5
      - type: text
        text: . Jé 6:28, etc.
      marker-yv: yv-n
    - type: text
      text: sera faite;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que sera-ce, si ce sceptre qui méprise tout est anéanti?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit le Seigneur, l’Éternel.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et toi, fils de l’homme, prophétise,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et frappe des mains!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que les coups de l’épée soient doublés, soient triplés!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est l’épée du carnage, l’épée du grand carnage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’épée qui doit les poursuivre.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fils de l’homme, tourne ta face vers le midi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et parle contre le midi!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prophétise contre la forêt des champs du midi!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour jeter l’effroi dans les cœurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour multiplier les victimes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A toutes leurs portes je les menacerai de l’épée.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ah! '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 21:33
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: elle est faite pour étinceler,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle est aiguisée pour massacrer.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rassemble tes forces, tourne-toi à droite!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Place-toi, tourne-toi à gauche!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dirige de tous côtés ton tranchant!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et moi aussi, je frapperai des mains,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et j’assouvirai ma fureur.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est moi, l’Éternel, qui parle.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 23-32: cf. (Jé 52:1-15. 2 Ch 36:11-20.) Pr 16:1, 33.'
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La parole de l’Éternel me fut adressée, en ces mots: '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de l’homme, trace deux chemins pour servir de passage à l’épée du roi de Babylone; tous les deux doivent sortir du même pays; marque un signe, marque-le à l’entrée du chemin qui conduit à une ville. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu traceras l’un des chemins pour que l’épée arrive à Rabbath, ville des enfants d’Ammon, et l’autre pour qu’elle arrive en Juda, à Jérusalem, ville fortifiée. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car le roi de Babylone se tient au carrefour, à l’entrée des deux chemins, pour tirer des présages; il secoue les flèches, il interroge les théraphim, il examine le foie. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le sort, qui est dans sa droite, désigne Jérusalem, où l’on devra dresser des béliers, commander le carnage, et pousser des cris de guerre; on dressera des béliers contre les portes, on élèvera des '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 4:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 17:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'terrasses, on formera des retranchements. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils ne voient là que de vaines divinations, eux qui ont fait des serments. Mais lui, il se souvient de leur iniquité, en sorte qu’ils seront pris. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est pourquoi ainsi parle le Seigneur, l’Éternel: Parce que vous rappelez le souvenir de votre iniquité, en mettant à nu vos transgressions, en manifestant vos péchés dans toutes vos actions; parce que vous en rappelez le souvenir, vous serez saisis par sa main. '
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tu diras à la forêt du midi:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Écoute la parole de l’Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ainsi parle le Seigneur, l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je vais allumer un feu au-dedans de toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et il dévorera tout '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 23:31
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: arbre vert et tout arbre sec;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La flamme ardente ne s’éteindra point,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tout visage en sera brûlé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Du midi au septentrion.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et toi, profane, méchant, prince d’Israël, dont le jour arrive au temps où l’iniquité est à son terme! '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi parle le Seigneur, l’Éternel: La tiare sera ôtée, le diadème sera enlevé. Les choses vont changer. Ce qui est abaissé sera élevé, et ce qui est élevé sera abaissé. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: J’en ferai une ruine, une ruine, une ruine. Mais cela n’aua lieu qu’à la venue de celui à qui appartient le jugement et à qui je le remettrai.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 33-37: cf. Éz 25:1-7. Jé 49:1-6.'
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et toi, fils de l’homme, prophétise, et dis: Ainsi parle le Seigneur, l’Éternel, sur les enfants d’Ammon et sur leur opprobre. Dis: L’épée, l’épée est tirée, elle est polie, pour massacrer, pour dévorer, pour étinceler! '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Au milieu de tes visions vaines et de tes oracles menteurs, elle te fera tomber parmi les cadavres des méchants, dont le jour arrive au temps où l’iniquité est à son terme. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Remets ton épée dans le fourreau. Je te jugerai dans le lieu où tu as été créé, dans le pays de ta naissance. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je répandrai sur toi ma colère, je soufflerai contre toi avec le feu de ma fureur, et je te livrerai entre les mains d’hommes qui dévorent, qui ne travaillent qu’à détruire. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tu seras consumé par le feu; ton sang coulera au milieu du pays; on ne se souviendra plus de toi. Car moi, l’Éternel, j’ai parlé.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et toute chair verra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que moi, l’Éternel, je l’ai allumé.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne s’éteindra point.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je dis: Ah! Seigneur Éternel! Ils disent de moi: N’est-ce pas un faiseur de paraboles?'
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 6-22: cf. De 32:41, 42. Éz 7.'
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et la parole de l’Éternel me fut adressée, en ces mots:'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fils de l’homme, tourne ta face vers Jérusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et parle contre les lieux saints!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prophétise contre le pays d’Israël!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tu diras au pays d’Israël:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ainsi parle l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, j’en veux à toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je tirerai mon épée de son fourreau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et j’exterminerai du milieu de toi le juste et le méchant.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce que je veux exterminer du milieu de toi le juste et le méchant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon épée sortira de son fourreau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour frapper toute chair,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Du midi au septentrion.
