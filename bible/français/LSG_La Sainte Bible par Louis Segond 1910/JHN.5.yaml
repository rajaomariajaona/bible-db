document_id: JHN.5
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus à Jérusalem. Guérison d’un malade à la piscine de Béthesda
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-16: cf. Jn 7:19-24; 9:1-17.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Après cela, il y eut une '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 23:2
      metadata:
        usfm: LEV.23.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 16:1
      metadata:
        usfm: DEU.16.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'fête des Juifs, et Jésus monta à Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Or, à Jérusalem, près de la porte des brebis, il y a une piscine qui s’appelle en hébreu Béthesda, et qui a cinq portiques. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Sous ces portiques étaient couchés en grand nombre des malades, des aveugles, des boiteux, des paralytiques, qui attendaient le mouvement de l’eau; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'car un ange descendait de temps en temps dans la piscine, et agitait l’eau; et celui qui y descendait le premier après que l’eau avait été agitée était guéri, quelle que fût sa maladie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Là se trouvait un homme malade depuis trente-huit ans. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Jésus, l’ayant vu couché, et sachant qu’il était malade depuis longtemps, lui dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Veux-tu être guéri?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Le malade lui répondit: Seigneur, je n’ai personne pour me jeter dans la piscine quand l’eau est agitée, et, pendant que j’y vais, un autre descend avant moi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 9:6
      metadata:
        usfm: MAT.9.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 2:11
      metadata:
        usfm: MRK.2.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 5:24
      metadata:
        usfm: LUK.5.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Lève-toi,
  - type: text
    text: ' lui dit Jésus, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: prends ton lit, et marche.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Aussitôt cet homme fut guéri; il prit son lit, et marcha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 9:14
      metadata:
        usfm: JHN.9.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'C’était un jour de sabbat. Les Juifs dirent donc à celui qui avait été guéri: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 20:10
      metadata:
        usfm: EXO.20.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 5:13
      metadata:
        usfm: DEU.5.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 17:21
      metadata:
        usfm: JER.17.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 12:2
      metadata:
        usfm: MAT.12.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 2:24
      metadata:
        usfm: MRK.2.24
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 6:2
      metadata:
        usfm: LUK.6.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'C’est le sabbat; il ne t’est pas permis d’emporter ton lit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il leur répondit: Celui qui m’a guéri m’a dit: Prends ton lit, et marche. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ils lui demandèrent: Qui est l’homme qui t’a dit: Prends ton lit, et marche? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mais celui qui avait été guéri ne savait pas qui c’était; car Jésus avait disparu de la foule qui était en ce lieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Depuis, Jésus le trouva dans le temple, et lui dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Voici, tu as été guéri;
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 12:45
      metadata:
        usfm: MAT.12.45
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 8:11
      metadata:
        usfm: JHN.8.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ne pèche plus, de peur qu’il ne t’arrive quelque chose de pire.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Cet homme s’en alla, et annonça aux Juifs que c’était Jésus qui l’avait guéri. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: C’est pourquoi les Juifs poursuivaient Jésus, parce qu’il faisait ces choses le jour du sabbat.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Accusations des Juifs, et réponses de Jésus
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 17-30: cf. Mc 2:28. Jn 10:30-38. Col 2:9. (Jn 11:25, 26. Ac 17:31. 2 Co 5:10. Ap 20:4-6, 11-15.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Mais Jésus leur répondit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 14:10
      metadata:
        usfm: JHN.14.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mon Père agit jusqu’à présent; moi aussi, j’agis.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 7:19
      metadata:
        usfm: JHN.7.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'A cause de cela, les Juifs cherchaient encore plus à le faire mourir, non seulement parce qu’il violait le sabbat, mais parce qu’il appelait Dieu son propre Père, se faisant lui-même égal à Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Jésus reprit donc la parole, et leur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: En vérité, en vérité, je vous le dis,
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 5:30
      metadata:
        usfm: JHN.5.30
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 8:38
      metadata:
        usfm: JHN.8.38
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 9:4
      metadata:
        usfm: JHN.9.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: le Fils ne peut rien faire de lui-même, il ne fait que ce qu’il voit faire au Père;
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 54:5
      metadata:
        usfm: ISA.54.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 10:30
      metadata:
        usfm: JHN.10.30
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 14:9
      metadata:
        usfm: JHN.14.9
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 17:5
      metadata:
        usfm: JHN.17.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: et tout ce que le Père fait, le Fils aussi le fait pareillement.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Car le Père aime le Fils, et
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 1:2
      metadata:
        usfm: JHN.1.2
    - type: text
      text: '; 2:35; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 7:16
      metadata:
        usfm: JHN.7.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 8:28
      metadata:
        usfm: JHN.8.28
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 14:24
      metadata:
        usfm: JHN.14.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: lui montre tout ce qu’il fait; et il lui montrera des œuvres plus grandes que celles-ci, afin que vous soyez dans l’étonnement.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Car, comme le Père ressuscite les morts et donne la vie, ainsi le Fils donne la vie à qui il veut.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Le Père ne juge personne,
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 11:27
      metadata:
        usfm: MAT.11.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 3:35
      metadata:
        usfm: JHN.3.35
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: mais il a remis tout jugement au Fils,
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: afin que tous honorent le Fils comme ils honorent le Père.
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 2:23
      metadata:
        usfm: 1JN.2.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Celui qui n’honore pas le Fils n’honore pas le Père qui l’a envoyé.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 3:18
      metadata:
        usfm: JHN.3.18
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 6:40
      metadata:
        usfm: JHN.6.40
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '47'
      metadata:
        usfm: JHN.6.47
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 8:51
      metadata:
        usfm: JHN.8.51
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: En vérité, en vérité, je vous le dis, celui qui écoute ma parole, et qui croit à celui qui m’a envoyé, a la vie éternelle et
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 23:43
      metadata:
        usfm: LUK.23.43
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ne vient point en jugement, mais il est passé de la mort à la vie.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: En vérité, en vérité, je vous le dis, l’heure vient, et elle est déjà venue,
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 2:1
      metadata:
        usfm: EPH.2.1
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '5'
      metadata:
        usfm: EPH.2.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 5:6
      metadata:
        usfm: 1TI.5.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: où les morts entendront la voix du Fils de Dieu; et ceux qui l’auront entendue vivront.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Car, comme le Père a la vie en lui-même, ainsi il a donné au Fils d’avoir la vie en lui-même.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Et il lui a donné le pouvoir de juger, parce qu’il est Fils de l’homme.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ne vous étonnez pas de cela; car l’heure vient
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 4:16
      metadata:
        usfm: 1TH.4.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: où tous ceux qui sont dans les sépulcres entendront sa voix, et en sortiront.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Da 12:2
      metadata:
        usfm: DAN.12.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 25:34
      metadata:
        usfm: MAT.25.34
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '46'
      metadata:
        usfm: MAT.25.46
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ceux qui auront fait le bien ressusciteront pour la vie, mais ceux qui auront fait le mal ressusciteront pour le jugement.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Je ne puis rien faire de moi-même: selon que j’entends, je juge; et mon jugement est juste,'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 6:38
      metadata:
        usfm: JHN.6.38
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: parce que je ne cherche pas ma volonté, mais la volonté de celui qui m’a envoyé.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 31-47: cf. Jn 1:19-34. (Lu 7:21-23. Jn 10:37, 38.) Mt 3:16, 17. (Ac 3:22, 24. Jn 3:19.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 8:14
      metadata:
        usfm: JHN.8.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Si c’est moi qui rends témoignage de moi-même, mon témoignage n’est pas vrai.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 42:1
      metadata:
        usfm: ISA.42.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 3:17
      metadata:
        usfm: MAT.3.17
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 17:5
      metadata:
        usfm: MAT.17.5
    - type: text
