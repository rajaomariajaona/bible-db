document_id: JHN.5,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus à Jérusalem. Guérison d’un malade à la piscine de Béthesda
  - type: heading
    content: 'V. 1-16: cf. Jn 7:19-24; 9:1-17.'
  - type: text
    content: 'Après cela, il y eut une '
  - type: note
    content: Lé 23:2. De 16:1.
  - type: text
    content: 'fête des Juifs, et Jésus monta à Jérusalem. '
  '10':
  - type: note
    content: Jn 9:14.
  - type: text
    content: 'C’était un jour de sabbat. Les Juifs dirent donc à celui qui avait été guéri: '
  - type: note
    content: Ex 20:10. De 5:13. Jé 17:21. Mt 12:2. Mc 2:24. Lu 6:2.
  - type: text
    content: 'C’est le sabbat; il ne t’est pas permis d’emporter ton lit. '
  '11':
  - type: text
    content: 'Il leur répondit: Celui qui m’a guéri m’a dit: Prends ton lit, et marche. '
  '12':
  - type: text
    content: 'Ils lui demandèrent: Qui est l’homme qui t’a dit: Prends ton lit, et marche? '
  '13':
  - type: text
    content: 'Mais celui qui avait été guéri ne savait pas qui c’était; car Jésus avait disparu de la foule qui était en ce lieu. '
  '14':
  - type: text
    content: 'Depuis, Jésus le trouva dans le temple, et lui dit: '
  - type: text
    content: Voici, tu as été guéri;
  - type: text
    content: ' '
  - type: note
    content: Mt 12:45. Jn 8:11.
  - type: text
    content: ne pèche plus, de peur qu’il ne t’arrive quelque chose de pire.
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'Cet homme s’en alla, et annonça aux Juifs que c’était Jésus qui l’avait guéri. '
  '16':
  - type: text
    content: C’est pourquoi les Juifs poursuivaient Jésus, parce qu’il faisait ces choses le jour du sabbat.
  - type: heading
    content: Accusations des Juifs, et réponses de Jésus
  - type: heading
    content: 'V. 17-30: cf. Mc 2:28. Jn 10:30-38. Col 2:9. (Jn 11:25, 26. Ac 17:31. 2 Co 5:10. Ap 20:4-6, 11-15.)'
  '17':
  - type: text
    content: 'Mais Jésus leur répondit: '
  - type: note
    content: Jn 14:10.
  - type: text
    content: Mon Père agit jusqu’à présent; moi aussi, j’agis.
  - type: text
    content: ' '
  '18':
  - type: note
    content: Jn 7:19.
  - type: text
    content: 'A cause de cela, les Juifs cherchaient encore plus à le faire mourir, non seulement parce qu’il violait le sabbat, mais parce qu’il appelait Dieu son propre Père, se faisant lui-même égal à Dieu. '
  '19':
  - type: text
    content: 'Jésus reprit donc la parole, et leur dit: '
  - type: text
    content: En vérité, en vérité, je vous le dis,
  - type: text
    content: ' '
  - type: note
    content: Jn 5:30; 8:38; 9:4.
  - type: text
    content: le Fils ne peut rien faire de lui-même, il ne fait que ce qu’il voit faire au Père;
  - type: text
    content: ' '
  - type: note
    content: És 54:5. Jn 10:30; 14:9; 17:5.
  - type: text
    content: et tout ce que le Père fait, le Fils aussi le fait pareillement.
  '2':
  - type: text
    content: 'Or, à Jérusalem, près de la porte des brebis, il y a une piscine qui s’appelle en hébreu Béthesda, et qui a cinq portiques. '
  '20':
  - type: text
    content: ' '
  - type: text
    content: Car le Père aime le Fils, et
  - type: text
    content: ' '
  - type: note
    content: Jn 1:2; 2:35; 7:16; 8:28; 14:24.
  - type: text
    content: lui montre tout ce qu’il fait; et il lui montrera des œuvres plus grandes que celles-ci, afin que vous soyez dans l’étonnement.
  - type: text
    content: ' '
  '21':
  - type: text
    content: Car, comme le Père ressuscite les morts et donne la vie, ainsi le Fils donne la vie à qui il veut.
  - type: text
    content: ' '
  '22':
  - type: text
    content: Le Père ne juge personne,
  - type: text
    content: ' '
  - type: note
    content: Mt 11:27. Jn 3:35.
  - type: text
    content: mais il a remis tout jugement au Fils,
  - type: text
    content: ' '
  '23':
  - type: text
    content: afin que tous honorent le Fils comme ils honorent le Père.
  - type: text
    content: ' '
  - type: note
    content: 1 Jn 2:23.
  - type: text
    content: Celui qui n’honore pas le Fils n’honore pas le Père qui l’a envoyé.
  - type: text
    content: ' '
  '24':
  - type: note
    content: Jn 3:18; 6:40, 47; 8:51.
  - type: text
    content: En vérité, en vérité, je vous le dis, celui qui écoute ma parole, et qui croit à celui qui m’a envoyé, a la vie éternelle et
  - type: text
    content: ' '
  - type: note
    content: Lu 23:43.
  - type: text
    content: ne vient point en jugement, mais il est passé de la mort à la vie.
  - type: text
    content: ' '
  '25':
  - type: text
    content: En vérité, en vérité, je vous le dis, l’heure vient, et elle est déjà venue,
  - type: text
    content: ' '
  - type: note
    content: Ép 2:1, 5. 1 Ti 5:6.
  - type: text
    content: où les morts entendront la voix du Fils de Dieu; et ceux qui l’auront entendue vivront.
  - type: text
    content: ' '
  '26':
  - type: text
    content: Car, comme le Père a la vie en lui-même, ainsi il a donné au Fils d’avoir la vie en lui-même.
  - type: text
    content: ' '
  '27':
  - type: text
    content: Et il lui a donné le pouvoir de juger, parce qu’il est Fils de l’homme.
  - type: text
    content: ' '
  '28':
  - type: text
    content: Ne vous étonnez pas de cela; car l’heure vient
  - type: text
    content: ' '
  - type: note
    content: 1 Th 4:16.
  - type: text
    content: où tous ceux qui sont dans les sépulcres entendront sa voix, et en sortiront.
  - type: text
    content: ' '
  '29':
  - type: note
    content: Da 12:2. Mt 25:34, 46.
  - type: text
    content: Ceux qui auront fait le bien ressusciteront pour la vie, mais ceux qui auront fait le mal ressusciteront pour le jugement.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Sous ces portiques étaient couchés en grand nombre des malades, des aveugles, des boiteux, des paralytiques, qui attendaient le mouvement de l’eau; '
  '30':
  - type: text
    content: 'Je ne puis rien faire de moi-même: selon que j’entends, je juge; et mon jugement est juste,'
  - type: text
    content: ' '
  - type: note
    content: Jn 6:38.
  - type: text
    content: parce que je ne cherche pas ma volonté, mais la volonté de celui qui m’a envoyé.
  - type: heading
    content: 'V. 31-47: cf. Jn 1:19-34. (Lu 7:21-23. Jn 10:37, 38.) Mt 3:16, 17. (Ac 3:22, 24. Jn 3:19.)'
  '31':
  - type: text
    content: ' '
  - type: note
    content: Jn 8:14.
  - type: text
    content: Si c’est moi qui rends témoignage de moi-même, mon témoignage n’est pas vrai.
  - type: text
    content: ' '
  '32':
  - type: note
    content: És 42:1. Mt 3:17; 17:5.
  - type: text
    content: Il y en a un autre qui rend témoignage de moi, et je sais que le témoignage qu’il rend de moi est vrai.
  - type: text
    content: ' '
  '33':
  - type: note
    content: Jn 1:15, 19, 27.
  - type: text
    content: Vous avez envoyé vers Jean, et il a rendu témoignage à la vérité.
  - type: text
    content: ' '
  '34':
  - type: text
    content: Pour moi ce n’est pas d’un homme que je reçois le témoignage; mais je dis ceci, afin que vous soyez sauvés.
  - type: text
    content: ' '
  '35':
  - type: text
    content: Jean était la lampe qui brûle et qui luit, et vous avez voulu vous réjouir une heure à sa lumière.
  - type: text
    content: ' '
  '36':
  - type: note
    content: 1 Jn 5:9.
  - type: text
    content: Moi, j’ai un témoignage plus grand que celui de Jean;
  - type: text
    content: ' '
  - type: note
    content: Jn 10:25.
  - type: text
    content: car les œuvres que le Père m’a donné d’accomplir, ces œuvres mêmes que je fais, témoignent de moi que c’est le Père qui m’a envoyé.
  - type: text
    content: ' '
  '37':
  - type: note
    content: Mt 3:17; 17:5. Mc 1:11; 9:7. Lu 3:22; 9:35. Jn 1:33; 6:27; 8:18. 2 Pi 1:17.
  - type: text
    content: Et le Père qui m’a envoyé a rendu lui-même témoignage de moi. Vous n’avez jamais entendu sa voix,
  - type: text
    content: ' '
  - type: note
    content: Ex 33:20. De 4:12. 1 Ti 6:16. 1 Jn 4:12.
  - type: text
    content: vous n’avez point vu sa face,
  - type: text
    content: ' '
  '38':
  - type: text
    content: et sa parole ne demeure point en vous, parce que vous ne croyez pas à celui qu’il a envoyé.
  - type: text
    content: ' '
  '39':
  - type: note
    content: És 34:16. Lu 16:29. Ac 17:11.
  - type: text
    content: 'Vous sondez les Écritures, parce que vous pensez avoir en elles la vie éternelle:'
  - type: text
    content: ' '
  - type: note
    content: De 18:18. Lu 24:27. Jn 1:46.
  - type: text
    content: ce sont elles qui rendent témoignage de moi.
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'car un ange descendait de temps en temps dans la piscine, et agitait l’eau; et celui qui y descendait le premier après que l’eau avait été agitée était guéri, quelle que fût sa maladie. '
  '40':
  - type: text
    content: Et vous ne voulez pas venir à moi pour avoir la vie!
  - type: text
    content: ' '
  '41':
  - type: text
    content: Je ne tire pas ma gloire des hommes.
  - type: text
    content: ' '
  '42':
  - type: text
    content: Mais je sais que vous n’avez point en vous l’amour de Dieu.
  - type: text
    content: ' '
  '43':
  - type: text
    content: Je suis venu au nom de mon Père, et vous ne me recevez pas; si un autre vient en son propre nom, vous le recevrez.
  - type: text
    content: ' '
  '44':
  - type: note
    content: Jn 12:43.
  - type: text
    content: Comment pouvez-vous croire, vous qui tirez votre gloire les uns des autres, et qui ne cherchez point la gloire qui vient de Dieu seul?
  - type: text
    content: ' '
  '45':
  - type: text
    content: Ne pensez pas que moi je vous accuserai devant le Père; celui qui vous accuse, c’est Moïse, en qui vous avez mis votre espérance.
  - type: text
    content: ' '
  '46':
  - type: text
    content: Car si vous croyiez Moïse, vous me croiriez aussi,
  - type: text
    content: ' '
  - type: note
    content: Ge 3:15; 22:18; 26:4; 28:14. De 18:18.
  - type: text
    content: parce qu’il a écrit de moi.
  - type: text
    content: ' '
  '47':
  - type: text
    content: Mais si vous ne croyez pas à ses écrits, comment croirez-vous à mes paroles?
  '5':
  - type: text
    content: 'Là se trouvait un homme malade depuis trente-huit ans. '
  '6':
  - type: text
    content: 'Jésus, l’ayant vu couché, et sachant qu’il était malade depuis longtemps, lui dit: '
  - type: text
    content: Veux-tu être guéri?
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'Le malade lui répondit: Seigneur, je n’ai personne pour me jeter dans la piscine quand l’eau est agitée, et, pendant que j’y vais, un autre descend avant moi.'
  '8':
  - type: text
    content: ' '
  - type: note
    content: Mt 9:6. Mc 2:11. Lu 5:24.
  - type: text
    content: Lève-toi,
  - type: text
    content: ' lui dit Jésus, '
  - type: text
    content: prends ton lit, et marche.
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'Aussitôt cet homme fut guéri; il prit son lit, et marcha. '
