document_id: LEV.10,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Deux fils d’Aaron consumés par le feu de l’Éternel
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-7: cf. (No 3:2-4. 2 S 6:2-9. Hé 12:28, 29.) Lé 21:10-12.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les fils d’Aaron, Nadab et Abihu, prirent chacun un brasier, y mirent du feu, et posèrent du parfum dessus; ils apportèrent devant l’Éternel du feu étranger, ce qu’il ne leur avait point ordonné. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'afin que vous puissiez distinguer ce qui est saint de ce qui est profane, ce qui est impur de ce qui est pur, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et enseigner aux enfants d’Israël toutes les lois que l’Éternel leur a données par Moïse. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse dit à Aaron, à Éléazar et à Ithamar, les deux fils qui restaient à Aaron: Prenez ce qui reste de l’offrande parmi les sacrifices consumés par le feu devant l’Éternel, et mangez-le sans levain près de l’autel: car c’est une chose très sainte. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous le mangerez dans un lieu saint; c’est ton droit et le droit de tes fils sur les offrandes consumées par le feu devant l’Éternel; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 2:3
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'car c’est là ce qui m’a été ordonné. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous mangerez aussi dans un lieu pur, toi, tes fils et tes filles avec toi, la poitrine qu’on a agitée de côté et d’autre et l’épaule qui a été présentée par élévation; car elles vous sont données, comme ton droit et le droit de tes fils, dans les sacrifices d’actions de grâces des enfants d’Israël. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils apporteront, avec les graisses destinées à être consumées par le feu, l’épaule que l’on présente par élévation et la poitrine que l’on agite de côté et d’autre devant l’Éternel: elles seront pour toi et pour tes fils avec toi, par une loi perpétuelle, comme l’Éternel l’a ordonné. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse chercha le bouc expiatoire; et voici, il avait été brûlé. Alors il s’irrita contre Éléazar et Ithamar, les fils qui restaient à Aaron, et il dit: '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pourquoi n’avez-vous pas mangé la victime expiatoire dans le lieu saint? C’est une chose très sainte; et l’Éternel vous l’a donnée, afin que vous portiez l’iniquité de l’assemblée, afin que vous fassiez pour elle l’expiation devant l’Éternel. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici, le sang de la victime n’a point été porté dans l’intérieur du sanctuaire; vous deviez la manger dans le sanctuaire, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 4:5
      - type: text
        text: '; 6:26; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'comme cela m’avait été ordonné. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aaron dit à Moïse: Voici, ils ont offert aujourd’hui leur sacrifice d’expiation et leur holocauste devant l’Éternel; et, après ce qui m’est arrivé, si j’eusse mangé aujourd’hui la victime expiatoire, cela aurait-il été bien aux yeux de l’Éternel? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors le feu sortit de devant l’Éternel, et les consuma: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 3:4
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 26:61
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 24:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'ils moururent devant l’Éternel. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Moïse entendit et approuva ces paroles.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse dit à Aaron: C’est ce que l’Éternel a déclaré, lorsqu’il a dit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 8:35
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Je serai sanctifié par ceux qui s’approchent de moi, et je serai glorifié en présence de tout le peuple. Aaron garda le silence. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et Moïse appela Mischaël et Eltsaphan, fils d’Uziel, oncle d’Aaron, et il leur dit: Approchez-vous, emportez vos frères loin du sanctuaire, hors du camp. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils s’approchèrent, et ils les emportèrent dans leurs tuniques hors du camp, comme Moïse l’avait dit. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse dit à Aaron, à Éléazar et à Ithamar, fils d’Aaron: Vous ne découvrirez point vos têtes, et vous ne déchirerez point vos vêtements, de peur que vous ne mouriez, et que l’Éternel ne s’irrite contre toute l’assemblée. Laissez vos frères, toute la maison d’Israël, pleurer sur l’embrasement que l’Éternel a allumé. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 21:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Vous ne sortirez point de l’entrée de la tente d’assignation, de peur que vous ne mouriez; car l’huile de l’onction de l’Éternel est sur vous. Ils firent ce que Moïse avait dit.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Défense à Aaron et à ses fils de boire du vin avant d’entrer dans le tabernacle. Portions des offrandes et des victimes qui leur sont réservées
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 8-20: cf. (Éz 44:21, 23, 24. Ép 5:18.) Lé 6:14-18, 26-30.'
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Éternel parla à Aaron, et dit: '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu ne boiras ni vin, ni boisson enivrante, toi et tes fils avec toi, lorsque vous entrerez dans la tente d’assignation, de peur que vous ne mouriez: ce sera une loi perpétuelle parmi vos descendants, '
