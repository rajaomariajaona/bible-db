document_id: MAT.19,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus en Pérée. Le divorce et le célibat
  - type: heading
    content: 'V. 1-12: cf. Mc 10:1-12. (De 24:1-4. Mt 5:31, 32. 1 Co 7.)'
  - type: text
    content: ' '
  - type: note
    content: Mc 10:1.
  - type: text
    content: 'Lorsque Jésus eut achevé ces discours, il quitta la Galilée, et alla dans le territoire de la Judée, au-delà du Jourdain. '
  '10':
  - type: text
    content: 'Ses disciples lui dirent: Si telle est la condition de l’homme à l’égard de la femme, il n’est pas avantageux de se marier. '
  '11':
  - type: text
    content: 'Il leur répondit: '
  - type: note
    content: 1 Co 7:7, 17.
  - type: text
    content: Tous ne comprennent pas cette parole, mais seulement ceux à qui cela est donné.
  '12':
  - type: text
    content: ' '
  - type: text
    content: Car il y a des eunuques qui le sont dès le ventre de leur mère; il y en a qui le sont devenus par les hommes; et il y en a qui se sont rendus tels eux-mêmes, à cause du royaume des cieux. Que celui qui peut comprendre comprenne.
  - type: heading
    content: Les petits enfants
  - type: heading
    content: 'V. 13-15: cf. (Mc 10:13-16. Lu 18:15-17.)'
  '13':
  - type: text
    content: ' '
  - type: note
    content: Mc 10:13. Lu 18:15.
  - type: text
    content: 'Alors on lui amena des petits enfants, afin qu’il leur imposât les mains et priât pour eux. Mais les disciples les repoussèrent. '
  '14':
  - type: text
    content: 'Et Jésus dit: '
  - type: note
    content: Mc 18:3. 1 Co 14:20. 1 Pi 2:2.
  - type: text
    content: Laissez les petits enfants, et ne les empêchez pas de venir à moi; car le royaume des cieux est pour ceux qui leur ressemblent.
  - type: text
    content: ' '
  '15':
  - type: text
    content: Il leur imposa les mains, et il partit de là.
  - type: heading
    content: Le jeune homme riche
  - type: heading
    content: 'V. 16-26: cf. (Mc 10:17-27. Lu 18:18-27.) 1 Ti 6:9, 10, 17-19.'
  '16':
  - type: text
    content: ' '
  - type: note
    content: Mc 10:17. Lu 18:18.
  - type: text
    content: 'Et voici, un homme s’approcha, et dit à Jésus: Maître, que dois-je faire de bon pour avoir la vie éternelle? '
  '17':
  - type: text
    content: 'Il lui répondit: '
  - type: text
    content: Pourquoi m’interroges-tu sur ce qui est bon? Un seul est le bon. Si tu veux entrer dans la vie, observe les commandements.
  - type: text
    content: ' Lesquels? Lui dit-il. '
  '18':
  - type: text
    content: 'Et Jésus répondit: '
  - type: note
    content: Ex 20:12. De 5:17. Ro 13:9.
  - type: text
    content: Tu ne tueras point; tu ne commettras point d’adultère; tu ne déroberas point; tu ne diras point de faux témoignage;
  '19':
  - type: text
    content: ' '
  - type: text
    content: 'honore ton père et ta mère; et:'
  - type: text
    content: ' '
  - type: note
    content: Lé 19:17. Mt 22:39. Mc 12:31. Ga 5:14. Ja 2:8.
  - type: text
    content: tu aimeras ton prochain comme toi-même.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Une grande foule le suivit, et là il guérit les malades. '
  '20':
  - type: text
    content: 'Le jeune homme lui dit: J’ai observé toutes ces choses; que me manque-t-il encore? '
  '21':
  - type: text
    content: 'Jésus lui dit: '
  - type: text
    content: Si tu veux être parfait,
  - type: text
    content: ' '
  - type: note
    content: Lu 12:33; 16:9.
  - type: text
    content: va, vends ce que tu possèdes,
  - type: text
    content: ' '
  - type: note
    content: Mt 6:19. 1 Ti 6:19.
  - type: text
    content: donne-le aux pauvres, et tu auras un trésor dans le ciel. Puis viens, et suis-moi.
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'Après avoir entendu ces paroles, le jeune homme s’en alla tout triste; car il avait de grands biens. '
  '23':
  - type: text
    content: 'Jésus dit à ses disciples: '
  - type: text
    content: Je vous le dis en vérité,
  - type: text
    content: ' '
  - type: note
    content: Pr 11:28. Mc 10:23. Lu 18:24.
  - type: text
    content: un riche entrera difficilement dans le royaume des cieux.
  '24':
  - type: text
    content: ' '
  - type: text
    content: Je vous le dis encore, il est plus facile à un chameau de passer par le trou d’une aiguille qu’à un riche d’entrer dans le royaume de Dieu.
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'Les disciples, ayant entendu cela, furent très étonnés, et dirent: Qui peut donc être sauvé? '
  '26':
  - type: text
    content: 'Jésus les regarda, et leur dit: '
  - type: text
    content: Aux hommes cela est impossible,
  - type: text
    content: ' '
  - type: note
    content: Job 42:2. Jé 32:17. Za 8:6. Lu 1:37; 18:27.
  - type: text
    content: mais à Dieu tout est possible.
  - type: heading
    content: L’héritage de la vie éternelle
  - type: heading
    content: 'V. 27-30: cf. (Mc 10:28-31. Lu 18:28-30.)'
  '27':
  - type: text
    content: ' '
  - type: note
    content: Mt 4:20. Mc 10:28. Lu 5:11; 18:28.
  - type: text
    content: 'Pierre, prenant alors la parole, lui dit: Voici, nous avons tout quitté, et nous t’avons suivi; qu’en sera-t-il pour nous? '
  '28':
  - type: text
    content: 'Jésus leur répondit: '
  - type: text
    content: Je vous le dis en vérité, quand le Fils de l’homme, au renouvellement de toutes choses, sera assis sur le trône de sa gloire, vous qui m’avez suivi,
  - type: text
    content: ' '
  - type: note
    content: Lu 22:30.
  - type: text
    content: vous serez de même assis sur douze trônes, et vous jugerez les douze tribus d’Israël.
  '29':
  - type: text
    content: ' '
  - type: note
    content: De 33:9.
  - type: text
    content: Et quiconque aura quitté, à cause de mon nom, ses frères, ou ses sœurs, ou son père, ou sa mère, ou sa femme, ou ses enfants, ou ses terres, ou ses maisons,
  - type: text
    content: ' '
  - type: note
    content: Job 42:12.
  - type: text
    content: recevra le centuple, et héritera la vie éternelle.
  - type: text
    content: ' '
  '3':
  - type: note
    content: Mc 10:2.
  - type: text
    content: 'Les pharisiens l’abordèrent, et dirent, pour l’éprouver: Est-il permis à un homme de répudier sa femme pour un motif quelconque? '
  '30':
  - type: note
    content: Mc 10:31. Lu 13:30.
  - type: text
    content: Plusieurs des premiers seront les derniers, et plusieurs des derniers seront les premiers.
  '4':
  - type: text
    content: 'Il répondit: '
  - type: text
    content: N’avez-vous pas lu que le créateur,
  - type: text
    content: ' '
  - type: note
    content: Ge 1:27.
  - type: text
    content: au commencement, fit l’homme et la femme
  '5':
  - type: text
    content: ' '
  - type: note
    content: Ge 2:24. Ép 5:31.
  - type: text
    content: 'et qu’il dit: C’est pourquoi l’homme quittera son père et sa mère, et s’attachera à sa femme, et'
  - type: text
    content: ' '
  - type: note
    content: 1 Co 6:16.
  - type: text
    content: les deux deviendront une seule chair?
  - type: text
    content: ' '
  '6':
  - type: text
    content: Ainsi ils ne sont plus deux, mais ils sont une seule chair.
  - type: text
    content: ' '
  - type: note
    content: 1 Co 7:10.
  - type: text
    content: Que l’homme donc ne sépare pas ce que Dieu a joint.
  - type: text
    content: ' '
  '7':
  - type: note
    content: De 24:1. Jé 3:1.
  - type: text
    content: 'Pourquoi donc, lui dirent-ils, Moïse a-t-il prescrit de donner à la femme une lettre de divorce et de la répudier? '
  '8':
  - type: text
    content: 'Il leur répondit: '
  - type: text
    content: C’est à cause de la dureté de votre cœur que Moïse vous a permis de répudier vos femmes; au commencement, il n’en était pas ainsi.
  '9':
  - type: text
    content: ' '
  - type: note
    content: Mt 5:32. Mc 10:11. Lu 16:18. 1 Co 7:10.
  - type: text
    content: Mais je vous dis que celui qui répudie sa femme, sauf pour infidélité, et qui en épouse une autre, commet un adultère.
  - type: text
    content: ' '
