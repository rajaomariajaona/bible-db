document_id: MAT.19,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus en Pérée. Le divorce et le célibat
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-12: cf. Mc 10:1-12. (De 24:1-4. Mt 5:31, 32. 1 Co 7.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 10:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Lorsque Jésus eut achevé ces discours, il quitta la Galilée, et alla dans le territoire de la Judée, au-delà du Jourdain. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ses disciples lui dirent: Si telle est la condition de l’homme à l’égard de la femme, il n’est pas avantageux de se marier. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il leur répondit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 7:7
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '17'
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Tous ne comprennent pas cette parole, mais seulement ceux à qui cela est donné.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Car il y a des eunuques qui le sont dès le ventre de leur mère; il y en a qui le sont devenus par les hommes; et il y en a qui se sont rendus tels eux-mêmes, à cause du royaume des cieux. Que celui qui peut comprendre comprenne.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les petits enfants
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 13-15: cf. (Mc 10:13-16. Lu 18:15-17.)'
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 10:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 18:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Alors on lui amena des petits enfants, afin qu’il leur imposât les mains et priât pour eux. Mais les disciples les repoussèrent. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et Jésus dit: '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Mc 18:3. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 14:20
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 2:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Laissez les petits enfants, et ne les empêchez pas de venir à moi; car le royaume des cieux est pour ceux qui leur ressemblent.
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il leur imposa les mains, et il partit de là.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le jeune homme riche
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 16-26: cf. (Mc 10:17-27. Lu 18:18-27.) 1 Ti 6:9, 10, 17-19.'
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 10:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 18:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Et voici, un homme s’approcha, et dit à Jésus: Maître, que dois-je faire de bon pour avoir la vie éternelle? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il lui répondit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Pourquoi m’interroges-tu sur ce qui est bon? Un seul est le bon. Si tu veux entrer dans la vie, observe les commandements.
    - type: text
      text: ' Lesquels? Lui dit-il. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et Jésus répondit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 20:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 5:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 13:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Tu ne tueras point; tu ne commettras point d’adultère; tu ne déroberas point; tu ne diras point de faux témoignage;
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'honore ton père et ta mère; et:'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 19:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 22:39
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 12:31
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 5:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ja 2:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: tu aimeras ton prochain comme toi-même.
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Une grande foule le suivit, et là il guérit les malades. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le jeune homme lui dit: J’ai observé toutes ces choses; que me manque-t-il encore? '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus lui dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Si tu veux être parfait,
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 12:33
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: va, vends ce que tu possèdes,
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 6:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ti 6:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: donne-le aux pauvres, et tu auras un trésor dans le ciel. Puis viens, et suis-moi.
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après avoir entendu ces paroles, le jeune homme s’en alla tout triste; car il avait de grands biens. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus dit à ses disciples: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Je vous le dis en vérité,
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 11:28
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 10:23
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 18:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: un riche entrera difficilement dans le royaume des cieux.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Je vous le dis encore, il est plus facile à un chameau de passer par le trou d’une aiguille qu’à un riche d’entrer dans le royaume de Dieu.
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les disciples, ayant entendu cela, furent très étonnés, et dirent: Qui peut donc être sauvé? '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus les regarda, et leur dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Aux hommes cela est impossible,
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 42:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 32:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Za 8:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 1:37
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: mais à Dieu tout est possible.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’héritage de la vie éternelle
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 27-30: cf. (Mc 10:28-31. Lu 18:28-30.)'
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 4:20
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 10:28
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 5:11
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18:28
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Pierre, prenant alors la parole, lui dit: Voici, nous avons tout quitté, et nous t’avons suivi; qu’en sera-t-il pour nous? '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus leur répondit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Je vous le dis en vérité, quand le Fils de l’homme, au renouvellement de toutes choses, sera assis sur le trône de sa gloire, vous qui m’avez suivi,
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 22:30
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: vous serez de même assis sur douze trônes, et vous jugerez les douze tribus d’Israël.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 33:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Et quiconque aura quitté, à cause de mon nom, ses frères, ou ses sœurs, ou son père, ou sa mère, ou sa femme, ou ses enfants, ou ses terres, ou ses maisons,
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 42:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: recevra le centuple, et héritera la vie éternelle.
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 10:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Les pharisiens l’abordèrent, et dirent, pour l’éprouver: Est-il permis à un homme de répudier sa femme pour un motif quelconque? '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 10:31
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 13:30
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Plusieurs des premiers seront les derniers, et plusieurs des derniers seront les premiers.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il répondit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: N’avez-vous pas lu que le créateur,
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 1:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: au commencement, fit l’homme et la femme
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 2:24
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 5:31
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'et qu’il dit: C’est pourquoi l’homme quittera son père et sa mère, et s’attachera à sa femme, et'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 6:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: les deux deviendront une seule chair?
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ainsi ils ne sont plus deux, mais ils sont une seule chair.
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 7:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Que l’homme donc ne sépare pas ce que Dieu a joint.
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 24:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 3:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Pourquoi donc, lui dirent-ils, Moïse a-t-il prescrit de donner à la femme une lettre de divorce et de la répudier? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il leur répondit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: C’est à cause de la dureté de votre cœur que Moïse vous a permis de répudier vos femmes; au commencement, il n’en était pas ainsi.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 5:32
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 10:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 16:18
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 7:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Mais je vous dis que celui qui répudie sa femme, sauf pour infidélité, et qui en épouse une autre, commet un adultère.
    - type: text
      text: ' '
