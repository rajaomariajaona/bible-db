document_id: GEN.31,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Départ de Jacob pour Canaan
  - type: heading
    content: 'V. 1-21: cf. Ge 30:25-43; 32:9-12.'
  - type: text
    content: 'Jacob entendit les propos des fils de Laban, qui disaient: Jacob a pris tout ce qui était à notre père, et c’est avec le bien de notre père qu’il s’est acquis toute cette richesse. '
  '10':
  - type: text
    content: 'Au temps où les brebis entraient en chaleur, je levai les yeux, et je vis en songe que les boucs qui couvraient les brebis étaient rayés, tachetés et marquetés. '
  '11':
  - type: text
    content: 'Et l’ange de Dieu me dit en songe: Jacob! Je répondis: Me voici! '
  '12':
  - type: text
    content: 'Il dit: Lève les yeux, et regarde: tous les boucs qui couvrent les brebis sont rayés, tachetés et marquetés; car j’ai vu tout ce que te fait Laban. '
  '13':
  - type: text
    content: 'Je suis le Dieu de Béthel, '
  - type: note
    content: Ge 28:13, 14, 15, etc.
  - type: text
    content: 'où tu as oint un monument, où tu m’as fait un vœu. Maintenant, lève-toi, sors de ce pays, et retourne au pays de ta naissance. '
  '14':
  - type: text
    content: 'Rachel et Léa répondirent, et lui dirent: Avons-nous encore une part et un héritage dans la maison de notre père? '
  '15':
  - type: text
    content: 'Ne sommes-nous pas regardées par lui comme des étrangères, puisqu’il nous a vendues, et qu’il a mangé notre argent? '
  '16':
  - type: text
    content: 'Toute la richesse que Dieu a ôtée à notre père appartient à nous et à nos enfants. Fais maintenant tout ce que Dieu t’a dit. '
  '17':
  - type: text
    content: 'Jacob se leva, et il fit monter ses enfants et ses femmes sur les chameaux. '
  '18':
  - type: text
    content: 'Il emmena tout son troupeau et tous les biens qu’il possédait, le troupeau qui lui appartenait, qu’il avait acquis à Paddan-Aram; et il s’en alla vers Isaac, son père, au pays de Canaan. '
  '19':
  - type: text
    content: 'Tandis que Laban était allé tondre ses brebis, Rachel déroba les théraphim de son père; '
  '2':
  - type: text
    content: 'Jacob remarqua aussi le visage de Laban; et voici, il n’était plus envers lui comme auparavant. '
  '20':
  - type: text
    content: 'et Jacob trompa Laban, l’Araméen, en ne l’avertissant pas de sa fuite. '
  '21':
  - type: text
    content: Il s’enfuit, avec tout ce qui lui appartenait; il se leva, traversa le fleuve, et se dirigea vers la montagne de Galaad.
  - type: heading
    content: Poursuite de Laban
  - type: heading
    content: 'V. 22-55: cf. (Job 33:14-17. Ps 105:13-15.) (Ps 124. Ge 26:26-31.)'
  '22':
  - type: text
    content: 'Le troisième jour, on annonça à Laban que Jacob s’était enfui. '
  '23':
  - type: text
    content: 'Il prit avec lui ses frères, le poursuivit sept journées de marche, et l’atteignit à la montagne de Galaad. '
  '24':
  - type: text
    content: 'Mais Dieu apparut la nuit en songe à Laban, l’Araméen, et lui dit: Garde-toi de parler à Jacob ni en bien ni en mal! '
  '25':
  - type: text
    content: 'Laban atteignit donc Jacob. Jacob avait dressé sa tente sur la montagne; Laban dressa aussi la sienne, avec ses frères, sur la montagne de Galaad. '
  '26':
  - type: text
    content: 'Alors Laban dit à Jacob: Qu’as-tu fait? Pourquoi m’as-tu trompé, et emmènes-tu mes filles comme des captives par l’épée? '
  '27':
  - type: text
    content: 'Pourquoi as-tu pris la fuite en cachette, m’as-tu trompé, et ne m’as-tu point averti? Je t’aurais laissé partir au milieu des réjouissances et des chants, au son du tambourin et de la harpe. '
  '28':
  - type: text
    content: 'Tu ne m’as pas permis d’embrasser mes fils et mes filles! C’est en insensé que tu as agi. '
  '29':
  - type: text
    content: 'Ma main est assez forte pour vous faire du mal; mais le Dieu de votre père m’a dit hier: Garde-toi de parler à Jacob ni en bien ni en mal! '
  '3':
  - type: text
    content: 'Alors l’Éternel dit à Jacob: Retourne au pays de tes pères et dans ton lieu de naissance, et je serai avec toi. '
  '30':
  - type: text
    content: 'Maintenant que tu es parti, parce que tu languissais après la maison de ton père, pourquoi as-tu dérobé mes dieux? '
  '31':
  - type: text
    content: 'Jacob répondit, et dit à Laban: J’avais de la crainte à la pensée que tu m’enlèverais peut-être tes filles. '
  '32':
  - type: text
    content: 'Mais périsse celui auprès duquel tu trouveras tes dieux! En présence de nos frères, examine ce qui t’appartient chez moi, et prends-le. Jacob ne savait pas que Rachel les eût dérobés. '
  '33':
  - type: text
    content: 'Laban entra dans la tente de Jacob, dans la tente de Léa, dans la tente des deux servantes, et il ne trouva rien. Il sortit de la tente de Léa, et entra dans la tente de Rachel. '
  '34':
  - type: text
    content: 'Rachel avait pris les théraphim, les avait mis sous le bât du chameau, et s’était assise dessus. Laban fouilla toute la tente, et ne trouva rien. '
  '35':
  - type: text
    content: 'Elle dit à son père: Que mon seigneur ne se fâche point, si je ne puis me lever devant toi, car j’ai ce qui est ordinaire aux femmes. Il chercha, et ne trouva point les théraphim. '
  '36':
  - type: text
    content: 'Jacob s’irrita, et querella Laban. Il reprit la parole, et lui dit: Quel est mon crime, quel est mon péché, que tu me poursuives avec tant d’ardeur? '
  '37':
  - type: text
    content: 'Quand tu as fouillé tous mes effets, qu’as-tu trouvé des effets de ta maison? Produis-le ici devant mes frères et tes frères, et qu’ils prononcent entre nous deux. '
  '38':
  - type: text
    content: 'Voilà vingt ans que j’ai passés chez toi; tes brebis et tes chèvres n’ont point avorté, et je n’ai point mangé les béliers de ton troupeau. '
  '39':
  - type: text
    content: 'Je ne t’ai point rapporté de bêtes déchirées, j’en ai payé le dommage; tu me redemandais ce qu’on me volait de jour et ce qu’on me volait de nuit. '
  '4':
  - type: text
    content: 'Jacob fit appeler Rachel et Léa, qui étaient aux champs vers son troupeau. '
  '40':
  - type: text
    content: 'La chaleur me dévorait pendant le jour, et le froid pendant la nuit, et le sommeil fuyait de mes yeux. '
  '41':
  - type: text
    content: 'Voilà vingt ans que j’ai passés dans ta maison; je t’ai servi quatorze ans pour tes deux filles, et six ans pour ton troupeau, et tu as changé dix fois mon salaire. '
  '42':
  - type: text
    content: 'Si je n’eusse pas eu pour moi le Dieu de mon père, le Dieu d’Abraham, celui que craint Isaac, tu m’aurais maintenant renvoyé à vide. Dieu a vu ma souffrance et le travail de mes mains, et hier il a prononcé son jugement. '
  '43':
  - type: text
    content: 'Laban répondit, et dit à Jacob: Ces filles sont mes filles, ces enfants sont mes enfants, ce troupeau est mon troupeau, et tout ce que tu vois est à moi. Et que puis-je faire aujourd’hui pour mes filles, ou pour leurs enfants qu’elles ont mis au monde? '
  '44':
  - type: text
    content: 'Viens, faisons alliance, moi et toi, et que cela serve de témoignage entre moi et toi! '
  '45':
  - type: text
    content: 'Jacob prit une pierre, et il la dressa pour monument. '
  '46':
  - type: text
    content: 'Jacob dit à ses frères: Ramassez des pierres. Ils prirent des pierres, et firent un monceau; et ils mangèrent là sur le monceau. '
  '47':
  - type: text
    content: 'Laban l’appela Jegar-Sahadutha, et Jacob l’appela Galed. '
  '48':
  - type: text
    content: 'Laban dit: Que ce monceau serve aujourd’hui de témoignage entre moi et toi! C’est pourquoi on lui a donné le nom de Galed. '
  '49':
  - type: text
    content: 'On l’appelle aussi Mitspa, parce que Laban dit: Que l’Éternel veille sur toi et sur moi, quand nous nous serons l’un et l’autre perdus de vue. '
  '5':
  - type: text
    content: 'Il leur dit: Je vois, au visage de votre père, qu’il n’est plus envers moi comme auparavant; mais le Dieu de mon père a été avec moi. '
  '50':
  - type: text
    content: 'Si tu maltraites mes filles, et si tu prends encore d’autres femmes, ce n’est pas un homme qui sera avec nous, prends-y garde, c’est Dieu qui sera témoin entre moi et toi. '
  '51':
  - type: text
    content: 'Laban dit à Jacob: Voici ce monceau, et voici ce monument que j’ai élevé entre moi et toi. '
  '52':
  - type: text
    content: 'Que ce monceau soit témoin et que ce monument soit témoin que je n’irai point vers toi au-delà de ce monceau, et que tu ne viendras point vers moi au-delà de ce monceau et de ce monument, pour agir méchamment. '
  '53':
  - type: text
    content: 'Que le Dieu d’Abraham et de Nachor, que le Dieu de leur père soit juge entre nous. Jacob jura par celui que craignait Isaac. '
  '54':
  - type: text
    content: 'Jacob offrit un sacrifice sur la montagne, et il invita ses frères à manger; ils mangèrent donc, et passèrent la nuit sur la montagne. '
  '55':
  - type: text
    content: Laban se leva de bon matin, baisa ses fils et ses filles, et les bénit. Ensuite il partit pour retourner dans sa demeure.
  '6':
  - type: text
    content: 'Vous savez vous-mêmes que j’ai servi votre père de tout mon pouvoir. '
  '7':
  - type: text
    content: 'Et votre père s’est joué de moi, et a changé dix fois mon salaire; mais Dieu ne lui a pas permis de me faire du mal. '
  '8':
  - type: text
    content: 'Quand il disait: Les tachetées seront ton salaire, toutes les brebis faisaient des petits tachetés. Et quand il disait: Les rayées seront ton salaire, toutes les brebis faisaient des petits rayés. '
  '9':
  - type: text
    content: 'Dieu a pris à votre père son troupeau, et me l’a donné. '
