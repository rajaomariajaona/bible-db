document_id: GEN.31,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Départ de Jacob pour Canaan
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-21: cf. Ge 30:25-43; 32:9-12.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Jacob entendit les propos des fils de Laban, qui disaient: Jacob a pris tout ce qui était à notre père, et c’est avec le bien de notre père qu’il s’est acquis toute cette richesse. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Au temps où les brebis entraient en chaleur, je levai les yeux, et je vis en songe que les boucs qui couvraient les brebis étaient rayés, tachetés et marquetés. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Et l’ange de Dieu me dit en songe: Jacob! Je répondis: Me voici! '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Il dit: Lève les yeux, et regarde: tous les boucs qui couvrent les brebis sont rayés, tachetés et marquetés; car j’ai vu tout ce que te fait Laban. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Je suis le Dieu de Béthel, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ge 28:13, 14, 15, etc.
      marker-yv: yv-n
    - type: text
      text: 'où tu as oint un monument, où tu m’as fait un vœu. Maintenant, lève-toi, sors de ce pays, et retourne au pays de ta naissance. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Rachel et Léa répondirent, et lui dirent: Avons-nous encore une part et un héritage dans la maison de notre père? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ne sommes-nous pas regardées par lui comme des étrangères, puisqu’il nous a vendues, et qu’il a mangé notre argent? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Toute la richesse que Dieu a ôtée à notre père appartient à nous et à nos enfants. Fais maintenant tout ce que Dieu t’a dit. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Jacob se leva, et il fit monter ses enfants et ses femmes sur les chameaux. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Il emmena tout son troupeau et tous les biens qu’il possédait, le troupeau qui lui appartenait, qu’il avait acquis à Paddan-Aram; et il s’en alla vers Isaac, son père, au pays de Canaan. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Tandis que Laban était allé tondre ses brebis, Rachel déroba les théraphim de son père; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Jacob remarqua aussi le visage de Laban; et voici, il n’était plus envers lui comme auparavant. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'et Jacob trompa Laban, l’Araméen, en ne l’avertissant pas de sa fuite. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Il s’enfuit, avec tout ce qui lui appartenait; il se leva, traversa le fleuve, et se dirigea vers la montagne de Galaad.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Poursuite de Laban
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 22-55: cf. (Job 33:14-17. Ps 105:13-15.) (Ps 124. Ge 26:26-31.)'
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Le troisième jour, on annonça à Laban que Jacob s’était enfui. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Il prit avec lui ses frères, le poursuivit sept journées de marche, et l’atteignit à la montagne de Galaad. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Mais Dieu apparut la nuit en songe à Laban, l’Araméen, et lui dit: Garde-toi de parler à Jacob ni en bien ni en mal! '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Laban atteignit donc Jacob. Jacob avait dressé sa tente sur la montagne; Laban dressa aussi la sienne, avec ses frères, sur la montagne de Galaad. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Alors Laban dit à Jacob: Qu’as-tu fait? Pourquoi m’as-tu trompé, et emmènes-tu mes filles comme des captives par l’épée? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Pourquoi as-tu pris la fuite en cachette, m’as-tu trompé, et ne m’as-tu point averti? Je t’aurais laissé partir au milieu des réjouissances et des chants, au son du tambourin et de la harpe. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Tu ne m’as pas permis d’embrasser mes fils et mes filles! C’est en insensé que tu as agi. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Ma main est assez forte pour vous faire du mal; mais le Dieu de votre père m’a dit hier: Garde-toi de parler à Jacob ni en bien ni en mal! '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Alors l’Éternel dit à Jacob: Retourne au pays de tes pères et dans ton lieu de naissance, et je serai avec toi. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Maintenant que tu es parti, parce que tu languissais après la maison de ton père, pourquoi as-tu dérobé mes dieux? '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Jacob répondit, et dit à Laban: J’avais de la crainte à la pensée que tu m’enlèverais peut-être tes filles. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Mais périsse celui auprès duquel tu trouveras tes dieux! En présence de nos frères, examine ce qui t’appartient chez moi, et prends-le. Jacob ne savait pas que Rachel les eût dérobés. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Laban entra dans la tente de Jacob, dans la tente de Léa, dans la tente des deux servantes, et il ne trouva rien. Il sortit de la tente de Léa, et entra dans la tente de Rachel. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Rachel avait pris les théraphim, les avait mis sous le bât du chameau, et s’était assise dessus. Laban fouilla toute la tente, et ne trouva rien. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Elle dit à son père: Que mon seigneur ne se fâche point, si je ne puis me lever devant toi, car j’ai ce qui est ordinaire aux femmes. Il chercha, et ne trouva point les théraphim. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Jacob s’irrita, et querella Laban. Il reprit la parole, et lui dit: Quel est mon crime, quel est mon péché, que tu me poursuives avec tant d’ardeur? '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Quand tu as fouillé tous mes effets, qu’as-tu trouvé des effets de ta maison? Produis-le ici devant mes frères et tes frères, et qu’ils prononcent entre nous deux. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Voilà vingt ans que j’ai passés chez toi; tes brebis et tes chèvres n’ont point avorté, et je n’ai point mangé les béliers de ton troupeau. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Je ne t’ai point rapporté de bêtes déchirées, j’en ai payé le dommage; tu me redemandais ce qu’on me volait de jour et ce qu’on me volait de nuit. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Jacob fit appeler Rachel et Léa, qui étaient aux champs vers son troupeau. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'La chaleur me dévorait pendant le jour, et le froid pendant la nuit, et le sommeil fuyait de mes yeux. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Voilà vingt ans que j’ai passés dans ta maison; je t’ai servi quatorze ans pour tes deux filles, et six ans pour ton troupeau, et tu as changé dix fois mon salaire. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Si je n’eusse pas eu pour moi le Dieu de mon père, le Dieu d’Abraham, celui que craint Isaac, tu m’aurais maintenant renvoyé à vide. Dieu a vu ma souffrance et le travail de mes mains, et hier il a prononcé son jugement. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Laban répondit, et dit à Jacob: Ces filles sont mes filles, ces enfants sont mes enfants, ce troupeau est mon troupeau, et tout ce que tu vois est à moi. Et que puis-je faire aujourd’hui pour mes filles, ou pour leurs enfants qu’elles ont mis au monde? '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Viens, faisons alliance, moi et toi, et que cela serve de témoignage entre moi et toi! '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Jacob prit une pierre, et il la dressa pour monument. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'Jacob dit à ses frères: Ramassez des pierres. Ils prirent des pierres, et firent un monceau; et ils mangèrent là sur le monceau. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'Laban l’appela Jegar-Sahadutha, et Jacob l’appela Galed. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Laban dit: Que ce monceau serve aujourd’hui de témoignage entre moi et toi! C’est pourquoi on lui a donné le nom de Galed. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'On l’appelle aussi Mitspa, parce que Laban dit: Que l’Éternel veille sur toi et sur moi, quand nous nous serons l’un et l’autre perdus de vue. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Il leur dit: Je vois, au visage de votre père, qu’il n’est plus envers moi comme auparavant; mais le Dieu de mon père a été avec moi. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'Si tu maltraites mes filles, et si tu prends encore d’autres femmes, ce n’est pas un homme qui sera avec nous, prends-y garde, c’est Dieu qui sera témoin entre moi et toi. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'Laban dit à Jacob: Voici ce monceau, et voici ce monument que j’ai élevé entre moi et toi. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: 'Que ce monceau soit témoin et que ce monument soit témoin que je n’irai point vers toi au-delà de ce monceau, et que tu ne viendras point vers moi au-delà de ce monceau et de ce monument, pour agir méchamment. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: 'Que le Dieu d’Abraham et de Nachor, que le Dieu de leur père soit juge entre nous. Jacob jura par celui que craignait Isaac. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: 'Jacob offrit un sacrifice sur la montagne, et il invita ses frères à manger; ils mangèrent donc, et passèrent la nuit sur la montagne. '
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: Laban se leva de bon matin, baisa ses fils et ses filles, et les bénit. Ensuite il partit pour retourner dans sa demeure.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Vous savez vous-mêmes que j’ai servi votre père de tout mon pouvoir. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Et votre père s’est joué de moi, et a changé dix fois mon salaire; mais Dieu ne lui a pas permis de me faire du mal. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Quand il disait: Les tachetées seront ton salaire, toutes les brebis faisaient des petits tachetés. Et quand il disait: Les rayées seront ton salaire, toutes les brebis faisaient des petits rayés. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Dieu a pris à votre père son troupeau, et me l’a donné. '
