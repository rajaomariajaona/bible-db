document_id: 2CH.30
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Célébration solennelle de la Pâque sous Ézéchias
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-27: cf. (Za 1:3-6. És 55:6, 7.) (No 9:1-14. Ex 12:1-29. 2 Ch 35:1-19.) 1 Co 5:8. Ph 3:1.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ézéchias envoya des messagers dans tout Israël et Juda, et il écrivit aussi des lettres à Éphraïm et à Manassé, pour qu’ils vinssent à la maison de l’Éternel à Jérusalem célébrer la Pâque en l’honneur de l’Éternel, le Dieu d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Le roi, ses chefs, et toute l’assemblée avaient tenu conseil à Jérusalem, afin que la Pâque fût célébrée au '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 9:10
      metadata:
        usfm: NUM.9.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'second mois; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'car on ne pouvait la faire en son temps, parce que les sacrificateurs ne s’étaient pas sanctifiés en assez grand nombre et que le peuple n’était pas rassemblé à Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'La chose ayant eu l’approbation du roi et de toute l’assemblée, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'ils décidèrent de faire une publication dans tout Israël, depuis Beer-Schéba jusqu’à Dan, pour que l’on vînt à Jérusalem célébrer la Pâque en l’honneur de l’Éternel, le Dieu d’Israël. Car elle n’était plus célébrée par la multitude comme il est écrit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Les coureurs allèrent avec les lettres du roi et de ses chefs dans tout Israël et Juda. Et, d’après l’ordre du roi, ils dirent: Enfants d’Israël, revenez à l’Éternel, le Dieu d’Abraham, d’Isaac et d’Israël, afin qu’il revienne à vous, reste échappé de la main des rois d’Assyrie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ne soyez pas comme vos pères et comme vos frères, qui ont péché contre l’Éternel, le Dieu de leurs pères, et qu’il a livrés à la désolation, comme vous le voyez. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ne raidissez donc pas votre cou, comme vos pères; donnez la main à l’Éternel, venez à son sanctuaire qu’il a sanctifié pour toujours, et servez l’Éternel, votre Dieu, pour que sa colère ardente se détourne de vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Si vous revenez à l’Éternel, vos frères et vos fils trouveront miséricorde auprès de ceux qui les ont emmenés captifs, et ils reviendront dans ce pays; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 34:6
      metadata:
        usfm: EXO.34.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'car l’Éternel, votre Dieu, est compatissant et miséricordieux, et il ne détournera pas sa face de vous, si vous revenez à lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Les coureurs allèrent ainsi de ville en ville dans le pays d’Éphraïm et de Manassé, et jusqu’à Zabulon. Mais on se riait et l’on se moquait d’eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Cependant quelques hommes d’Aser, de Manassé et de Zabulon s’humilièrent et vinrent à Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dans Juda aussi la main de Dieu se déploya pour leur donner un même cœur et leur faire exécuter l’ordre du roi et des chefs, selon la parole de l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Un peuple nombreux se réunit à Jérusalem pour célébrer la fête des pains sans levain au second mois: ce fut une immense assemblée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ils se levèrent, et ils firent disparaître les autels sur lesquels on sacrifiait dans Jérusalem et tous ceux sur lesquels on offrait des parfums, et ils les jetèrent dans le torrent de Cédron. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ils immolèrent ensuite la Pâque le quatorzième jour du second mois. Les sacrificateurs et les Lévites, saisis de confusion, s’étaient sanctifiés, et ils offrirent des holocaustes dans la maison de l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ils occupaient leur place ordinaire, conformément à la loi de Moïse, homme de Dieu, et les sacrificateurs répandaient le sang, qu’ils recevaient de la main des Lévites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Comme il y avait dans l’assemblée beaucoup de gens qui ne s’étaient pas sanctifiés, les Lévites se chargèrent d’immoler les victimes de la Pâque pour tous ceux qui n’étaient pas purs, afin de les consacrer à l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Car une grande partie du peuple, beaucoup de ceux d’Éphraïm, de Manassé, d’Issacar et de Zabulon, ne s’étaient pas purifiés, et ils mangèrent la Pâque sans se conformer à ce qui est écrit. Mais Ézéchias pria pour eux, en disant: Veuille l’Éternel, qui est bon, pardonner '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'à tous ceux qui ont appliqué leur cœur à chercher Dieu, l’Éternel, le Dieu de leurs pères, quoiqu’ils n’aient pas pratiqué la sainte purification! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'L’Éternel exauça Ézéchias, et il pardonna au peuple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ainsi les enfants d’Israël qui se trouvèrent à Jérusalem célébrèrent la fête des pains sans levain, pendant sept jours, avec une grande joie; et chaque jour les Lévites et les sacrificateurs louaient l’Éternel avec les instruments qui retentissaient en son honneur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ézéchias parla au cœur de tous les Lévites, qui montraient une grande intelligence pour le service de l’Éternel. Ils mangèrent les victimes pendant sept jours, offrant des sacrifices d’actions de grâces, et louant l’Éternel, le Dieu de leurs pères. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Toute l’assemblée fut d’avis de célébrer sept autres jours. Et ils célébrèrent joyeusement ces sept jours; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'car '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 35:7
      metadata:
        usfm: 2CH.35.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ézéchias, roi de Juda, avait donné à l’assemblée mille taureaux et sept mille brebis, et les chefs lui donnèrent mille taureaux et dix mille brebis, et des sacrificateurs en grand nombre s’étaient sanctifiés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Toute l’assemblée de Juda, et les sacrificateurs et les Lévites, et tout le peuple venu d’Israël, et les étrangers venus du pays d’Israël ou établis en Juda, se livrèrent à la joie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Il y eut à Jérusalem de grandes réjouissances; et depuis le temps de Salomon, fils de David, roi d’Israël, rien de semblable n’avait eu lieu dans Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Les sacrificateurs et les Lévites se levèrent et bénirent le peuple; et leur voix fut entendue, et leur prière parvint jusqu’aux cieux, jusqu’à la sainte demeure de l’Éternel.
