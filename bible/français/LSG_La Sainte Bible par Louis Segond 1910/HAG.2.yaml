document_id: HAG.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La gloire du second temple
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-9: cf. (Ag 1:12-15. Za 4:6-10.) Hé 12:25-27. És 60.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Le vingt et unième jour du septième mois, la parole de l’Éternel se révéla par Aggée, le prophète, en ces mots: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Parle à Zorobabel, fils de Schealthiel, gouverneur de Juda, à Josué, fils de Jotsadak, le souverain sacrificateur, et au reste du peuple, et dis-leur:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Quel est parmi vous le survivant
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui ait vu cette maison dans sa gloire première?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et comment la voyez-vous maintenant?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Telle qu’elle est, ne paraît-elle pas comme rien à vos yeux?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Maintenant fortifie-toi, Zorobabel! Dit l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fortifie-toi, Josué, fils de Jotsadak, souverain sacrificateur!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fortifie-toi, peuple entier du pays! Dit l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et travaillez!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car je suis avec vous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit l’Éternel des armées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Je reste fidèle à l’alliance que j’ai faite avec vous
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand vous sortîtes de l’Égypte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et mon esprit est au milieu de vous;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne craignez pas!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Car ainsi parle l’Éternel des armées:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Encore un peu de temps,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et j’ébranlerai les cieux et la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La mer et le sec;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: J’ébranlerai toutes les nations;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les trésors de toutes les nations viendront,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je remplirai de gloire cette maison,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit l’Éternel des armées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: L’argent est à moi, et l’or est à moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit l’Éternel des armées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: La gloire de cette dernière maison sera plus grande
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que celle de la première,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit l’Éternel des armées;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et c’est dans ce lieu que je donnerai la paix,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit l’Éternel des armées.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Bénédiction promise
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 10-19: cf. Ag 1:2-11. Za 8; 9:17.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Le vingt-quatrième jour du neuvième mois, la seconde année de Darius, la parole de l’Éternel se révéla par Aggée, le prophète, en ces mots: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ainsi parle l’Éternel des armées: Propose aux sacrificateurs cette question sur la loi: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Si quelqu’un porte dans le pan de son vêtement de la chair consacrée, et qu’il touche avec son vêtement du pain, des mets, du vin, de l’huile, ou un aliment quelconque, ces choses seront-elles sanctifiées? Les sacrificateurs répondirent: Non! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Et Aggée dit: Si quelqu’un souillé par le contact d’un cadavre touche toutes ces choses, seront-elles souillées? Les sacrificateurs répondirent: Elles seront souillées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Alors Aggée, reprenant la parole, dit:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tel est ce peuple, telle est cette nation devant moi, dit l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Telles sont toutes les œuvres de leurs mains;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce qu’ils m’offrent là est souillé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Considérez donc attentivement
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce qui s’est passé jusqu’à ce jour,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avant qu’on eût mis pierre sur pierre au temple de l’Éternel!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Alors, quand on venait à un tas de vingt mesures,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il n’y en avait que dix;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand on venait à la cuve pour puiser cinquante mesures,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il n’y en avait que vingt.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Je vous ai frappés par la rouille et par la nielle, et par la grêle;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'J’ai frappé '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ag 1:11
      metadata:
        usfm: HAG.1.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: tout le travail de vos mains.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Malgré cela, vous n’êtes pas revenus à moi, dit l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Considérez attentivement
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce qui s’est passé jusqu’à ce jour,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jusqu’au vingt-quatrième jour du neuvième mois,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Depuis le jour où le temple de l’Éternel a été fondé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Considérez-le attentivement!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Y avait-il encore de la semence dans les greniers?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Même la vigne, le figuier, le grenadier et l’olivier,
- type: usfm
  marker: q1
  children:
  - type: text
    text: N’ont rien rapporté.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais dès ce jour je répandrai ma bénédiction.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Destruction des ennemis, et élévation de Zorobabel
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 20-23: cf. Joë 2:30-32. Za 4:6, etc.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'La parole de l’Éternel fut adressée pour la seconde fois à Aggée, le vingt-quatrième jour du mois, en ces mots:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Parle à Zorobabel, gouverneur de Juda, et dis:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’ébranlerai les cieux et la terre;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Je renverserai le trône des royaumes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je détruirai la force des royaumes des nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je renverserai les chars et ceux qui les montent;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les chevaux et leurs cavaliers seront abattus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’un par l’épée de l’autre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: En ce jour-là, dit l’Éternel des armées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je te prendrai, Zorobabel, fils de Schealthiel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon serviteur, dit l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je te garderai comme un sceau;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car je t’ai choisi, dit l’Éternel des armées.
