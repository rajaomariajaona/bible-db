document_id: HAG.2,93
type_code: fra
verses:
  '1':
  - type: heading
    content: La gloire du second temple
  - type: heading
    content: 'V. 1-9: cf. (Ag 1:12-15. Za 4:6-10.) Hé 12:25-27. És 60.'
  - type: text
    content: 'Le vingt et unième jour du septième mois, la parole de l’Éternel se révéla par Aggée, le prophète, en ces mots: '
  '10':
  - type: text
    content: 'Le vingt-quatrième jour du neuvième mois, la seconde année de Darius, la parole de l’Éternel se révéla par Aggée, le prophète, en ces mots: '
  '11':
  - type: text
    content: 'Ainsi parle l’Éternel des armées: Propose aux sacrificateurs cette question sur la loi: '
  '12':
  - type: text
    content: 'Si quelqu’un porte dans le pan de son vêtement de la chair consacrée, et qu’il touche avec son vêtement du pain, des mets, du vin, de l’huile, ou un aliment quelconque, ces choses seront-elles sanctifiées? Les sacrificateurs répondirent: Non! '
  '13':
  - type: text
    content: 'Et Aggée dit: Si quelqu’un souillé par le contact d’un cadavre touche toutes ces choses, seront-elles souillées? Les sacrificateurs répondirent: Elles seront souillées. '
  '14':
  - type: text
    content: 'Alors Aggée, reprenant la parole, dit:'
  - type: text
    content: Tel est ce peuple, telle est cette nation devant moi, dit l’Éternel,
  - type: text
    content: Telles sont toutes les œuvres de leurs mains;
  - type: text
    content: Ce qu’ils m’offrent là est souillé.
  '15':
  - type: text
    content: Considérez donc attentivement
  - type: text
    content: Ce qui s’est passé jusqu’à ce jour,
  - type: text
    content: Avant qu’on eût mis pierre sur pierre au temple de l’Éternel!
  '16':
  - type: text
    content: Alors, quand on venait à un tas de vingt mesures,
  - type: text
    content: Il n’y en avait que dix;
  - type: text
    content: Quand on venait à la cuve pour puiser cinquante mesures,
  - type: text
    content: Il n’y en avait que vingt.
  '17':
  - type: text
    content: Je vous ai frappés par la rouille et par la nielle, et par la grêle;
  - type: text
    content: 'J’ai frappé '
  - type: note
    content: Ag 1:11.
  - type: text
    content: tout le travail de vos mains.
  - type: text
    content: Malgré cela, vous n’êtes pas revenus à moi, dit l’Éternel.
  '18':
  - type: text
    content: Considérez attentivement
  - type: text
    content: Ce qui s’est passé jusqu’à ce jour,
  - type: text
    content: Jusqu’au vingt-quatrième jour du neuvième mois,
  - type: text
    content: Depuis le jour où le temple de l’Éternel a été fondé,
  - type: text
    content: Considérez-le attentivement!
  '19':
  - type: text
    content: Y avait-il encore de la semence dans les greniers?
  - type: text
    content: Même la vigne, le figuier, le grenadier et l’olivier,
  - type: text
    content: N’ont rien rapporté.
  - type: text
    content: Mais dès ce jour je répandrai ma bénédiction.
  - type: heading
    content: Destruction des ennemis, et élévation de Zorobabel
  - type: heading
    content: 'V. 20-23: cf. Joë 2:30-32. Za 4:6, etc.'
  '2':
  - type: text
    content: 'Parle à Zorobabel, fils de Schealthiel, gouverneur de Juda, à Josué, fils de Jotsadak, le souverain sacrificateur, et au reste du peuple, et dis-leur:'
  '20':
  - type: text
    content: 'La parole de l’Éternel fut adressée pour la seconde fois à Aggée, le vingt-quatrième jour du mois, en ces mots:'
  '21':
  - type: text
    content: 'Parle à Zorobabel, gouverneur de Juda, et dis:'
  - type: text
    content: J’ébranlerai les cieux et la terre;
  '22':
  - type: text
    content: Je renverserai le trône des royaumes,
  - type: text
    content: Je détruirai la force des royaumes des nations,
  - type: text
    content: Je renverserai les chars et ceux qui les montent;
  - type: text
    content: Les chevaux et leurs cavaliers seront abattus,
  - type: text
    content: L’un par l’épée de l’autre.
  '23':
  - type: text
    content: En ce jour-là, dit l’Éternel des armées,
  - type: text
    content: Je te prendrai, Zorobabel, fils de Schealthiel,
  - type: text
    content: Mon serviteur, dit l’Éternel,
  - type: text
    content: Et je te garderai comme un sceau;
  - type: text
    content: Car je t’ai choisi, dit l’Éternel des armées.
  '3':
  - type: text
    content: Quel est parmi vous le survivant
  - type: text
    content: Qui ait vu cette maison dans sa gloire première?
  - type: text
    content: Et comment la voyez-vous maintenant?
  - type: text
    content: Telle qu’elle est, ne paraît-elle pas comme rien à vos yeux?
  '4':
  - type: text
    content: Maintenant fortifie-toi, Zorobabel! Dit l’Éternel.
  - type: text
    content: Fortifie-toi, Josué, fils de Jotsadak, souverain sacrificateur!
  - type: text
    content: Fortifie-toi, peuple entier du pays! Dit l’Éternel.
  - type: text
    content: Et travaillez!
  - type: text
    content: Car je suis avec vous,
  - type: text
    content: Dit l’Éternel des armées.
  '5':
  - type: text
    content: Je reste fidèle à l’alliance que j’ai faite avec vous
  - type: text
    content: Quand vous sortîtes de l’Égypte,
  - type: text
    content: Et mon esprit est au milieu de vous;
  - type: text
    content: Ne craignez pas!
  '6':
  - type: text
    content: 'Car ainsi parle l’Éternel des armées:'
  - type: text
    content: Encore un peu de temps,
  - type: text
    content: Et j’ébranlerai les cieux et la terre,
  - type: text
    content: La mer et le sec;
  '7':
  - type: text
    content: J’ébranlerai toutes les nations;
  - type: text
    content: Les trésors de toutes les nations viendront,
  - type: text
    content: Et je remplirai de gloire cette maison,
  - type: text
    content: Dit l’Éternel des armées.
  '8':
  - type: text
    content: L’argent est à moi, et l’or est à moi,
  - type: text
    content: Dit l’Éternel des armées.
  '9':
  - type: text
    content: La gloire de cette dernière maison sera plus grande
  - type: text
    content: Que celle de la première,
  - type: text
    content: Dit l’Éternel des armées;
  - type: text
    content: Et c’est dans ce lieu que je donnerai la paix,
  - type: text
    content: Dit l’Éternel des armées.
  - type: heading
    content: Bénédiction promise
  - type: heading
    content: 'V. 10-19: cf. Ag 1:2-11. Za 8; 9:17.'
