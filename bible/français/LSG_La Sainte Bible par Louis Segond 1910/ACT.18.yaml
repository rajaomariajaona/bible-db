document_id: ACT.18,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Paul à Corinthe: rencontre d’Aquilas et de Priscille. Séjour d’un an et demi'
  - type: heading
    content: 'V. 1-11: cf. 1 Co 1:1-9; 2:1-5; 4:12. 2 Co 11:5-12; 12:12, 13.'
  - type: text
    content: 'Après cela, Paul partit d’Athènes, et se rendit à Corinthe. '
  '10':
  - type: text
    content: ' '
  - type: text
    content: 'Car je suis avec toi, et personne ne mettra la main sur toi pour te faire du mal: parle, car j’ai un peuple nombreux dans cette ville.'
  - type: text
    content: ' '
  '11':
  - type: text
    content: Il y demeura un an et six mois, enseignant parmi les Corinthiens la parole de Dieu.
  - type: heading
    content: 'V. 12-17: cf. Ac 25:15-21. Ro 13:3, 4.'
  '12':
  - type: text
    content: 'Du temps que Gallion était proconsul de l’Achaïe, les Juifs se soulevèrent unanimement contre Paul, et le menèrent devant le tribunal, '
  '13':
  - type: text
    content: 'en disant: Cet homme excite les gens à servir Dieu d’une manière contraire à la loi. '
  '14':
  - type: text
    content: 'Paul allait ouvrir la bouche, lorsque Gallion dit aux Juifs: '
  - type: note
    content: Ac 25:11.
  - type: text
    content: 'S’il s’agissait de quelque injustice ou de quelque méchante action, je vous écouterais comme de raison, ô Juifs; '
  '15':
  - type: text
    content: 'mais, s’il s’agit de discussions sur une parole, sur des noms, et sur votre loi, cela vous regarde: je ne veux pas être juge de ces choses. '
  '16':
  - type: text
    content: 'Et il les renvoya du tribunal. '
  '17':
  - type: text
    content: Alors tous, se saisissant de Sosthène, le chef de la synagogue, le battirent devant le tribunal, sans que Gallion s’en mît en peine.
  - type: heading
    content: Voyage de Paul à Jérusalem, par Éphèse. Retour à Antioche
  - type: heading
    content: 'V. 18-22: cf. Ac 21:23-36; 20:16; 14:26.'
  '18':
  - type: text
    content: 'Paul resta encore assez longtemps à Corinthe. Ensuite il prit congé des frères, et s’embarqua pour la Syrie, avec Priscille et Aquilas, après s’être fait '
  - type: note
    content: No 6:18. Ac 21:23.
  - type: text
    content: 'raser la tête à Cenchrées, car il avait fait un vœu. '
  '19':
  - type: text
    content: 'Ils arrivèrent à Éphèse, et Paul y laissa ses compagnons. Étant entré dans la synagogue, il s’entretint avec les Juifs, '
  '2':
  - type: text
    content: 'Il y trouva un Juif nommé '
  - type: note
    content: Ro 16:3. 1 Co 16:19. 2 Ti 4:19.
  - type: text
    content: 'Aquilas, originaire du Pont, récemment arrivé d’Italie avec sa femme Priscille, parce que Claude avait ordonné à tous les Juifs de sortir de Rome. Il se lia avec eux; '
  '20':
  - type: text
    content: 'qui le prièrent de prolonger son séjour. '
  '21':
  - type: text
    content: 'Mais il n’y consentit point, et il prit congé d’eux, en disant: Il faut absolument que je célèbre la fête prochaine à Jérusalem. Je reviendrai vers vous, '
  - type: note
    content: 1 Co 4:19. Hé 6:3. Ja 4:15.
  - type: text
    content: 'si Dieu le veut. Et il partit d’Éphèse. '
  '22':
  - type: text
    content: Étant débarqué à Césarée, il monta à Jérusalem, et, après avoir salué l’Église, il descendit à Antioche.
  - type: heading
    content: Troisième voyage missionnaire de Paul. Départ d’Antioche pour les provinces d’Asie. Apollos à Éphèse et à Corinthe
  - type: heading
    content: 'V. 23-28: cf. Ac 15:41; 16:4-6. Mt 13:12. 1 Co 3:4-8.'
  '23':
  - type: text
    content: 'Lorsqu’il eut passé quelque temps à Antioche, Paul se mit en route, et parcourut successivement la Galatie et la Phrygie, fortifiant tous les disciples. '
  '24':
  - type: text
    content: 'Un Juif nommé '
  - type: note
    content: 1 Co 1:12.
  - type: text
    content: 'Apollos, originaire d’Alexandrie, homme éloquent et versé dans les Écritures, vint à Éphèse. '
  '25':
  - type: text
    content: 'Il était instruit dans la voie du Seigneur, et, fervent d’esprit, il annonçait et enseignait avec exactitude ce qui concerne Jésus, bien qu’il ne connût que le baptême de Jean. '
  '26':
  - type: text
    content: 'Il se mit à parler librement dans la synagogue. Aquilas et Priscille, l’ayant entendu, le prirent avec eux, et lui exposèrent plus exactement la voie de Dieu. '
  '27':
  - type: text
    content: 'Comme il voulait passer en Achaïe, les frères l’y encouragèrent, et écrivirent aux disciples de le bien recevoir. Quand il fut arrivé, '
  - type: note
    content: 1 Co 3:6.
  - type: text
    content: 'il se rendit, par la grâce de Dieu, très utile à ceux qui avaient cru; '
  '28':
  - type: text
    content: Car il réfutait vivement les Juifs en public, démontrant par les Écritures que Jésus est le Christ.
  '3':
  - type: text
    content: 'et, comme il avait le même métier, il demeura chez eux et '
  - type: note
    content: Ac 20:34. 1 Co 4:12. 2 Co 11:9; 12:13. 1 Th 2:9. 2 Th 3:8.
  - type: text
    content: 'y travailla: ils étaient faiseurs de tentes. '
  '4':
  - type: text
    content: 'Paul discourait dans la synagogue chaque sabbat, et il persuadait des Juifs et des Grecs. '
  '5':
  - type: text
    content: 'Mais quand Silas et Timothée furent arrivés '
  - type: note
    content: Ac 17:15.
  - type: text
    content: 'de la Macédoine, il se donna tout entier à la parole, attestant aux Juifs que Jésus était le Christ. '
  '6':
  - type: text
    content: 'Les Juifs faisant alors de l’opposition et se livrant à des injures, Paul secoua '
  - type: note
    content: Mt 10:14. Ac 13:51.
  - type: text
    content: 'ses vêtements, et leur dit: Que votre sang retombe sur votre tête! J’en suis pur. Dès maintenant, j’irai vers les païens. '
  '7':
  - type: text
    content: 'Et sortant de là, il entra chez un nommé Justus, homme craignant Dieu, et dont la maison était contiguë à la synagogue. '
  '8':
  - type: note
    content: 1 Co 1:14.
  - type: text
    content: 'Cependant Crispus, le chef de la synagogue, crut au Seigneur avec toute sa famille. Et plusieurs Corinthiens, qui avaient entendu Paul, crurent aussi, et furent baptisés. '
  '9':
  - type: note
    content: Ac 23:11.
  - type: text
    content: 'Le Seigneur dit à Paul en vision pendant la nuit: '
  - type: text
    content: Ne crains point; mais parle, et ne te tais point,
