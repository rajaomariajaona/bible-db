document_id: ACT.18
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Paul à Corinthe: rencontre d’Aquilas et de Priscille. Séjour d’un an et demi'
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-11: cf. 1 Co 1:1-9; 2:1-5; 4:12. 2 Co 11:5-12; 12:12, 13.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Après cela, Paul partit d’Athènes, et se rendit à Corinthe. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il y trouva un Juif nommé '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 16:3
      metadata:
        usfm: ROM.16.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 16:19
      metadata:
        usfm: 1CO.16.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ti 4:19
      metadata:
        usfm: 2TI.4.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Aquilas, originaire du Pont, récemment arrivé d’Italie avec sa femme Priscille, parce que Claude avait ordonné à tous les Juifs de sortir de Rome. Il se lia avec eux; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'et, comme il avait le même métier, il demeura chez eux et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 20:34
      metadata:
        usfm: ACT.20.34
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 4:12
      metadata:
        usfm: 1CO.4.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 11:9
      metadata:
        usfm: 2CO.11.9
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 12:13
      metadata:
        usfm: 2CO.12.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 2:9
      metadata:
        usfm: 1TH.2.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Th 3:8
      metadata:
        usfm: 2TH.3.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'y travailla: ils étaient faiseurs de tentes. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Paul discourait dans la synagogue chaque sabbat, et il persuadait des Juifs et des Grecs. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mais quand Silas et Timothée furent arrivés '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 17:15
      metadata:
        usfm: ACT.17.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'de la Macédoine, il se donna tout entier à la parole, attestant aux Juifs que Jésus était le Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Les Juifs faisant alors de l’opposition et se livrant à des injures, Paul secoua '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 10:14
      metadata:
        usfm: MAT.10.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 13:51
      metadata:
        usfm: ACT.13.51
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ses vêtements, et leur dit: Que votre sang retombe sur votre tête! J’en suis pur. Dès maintenant, j’irai vers les païens. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Et sortant de là, il entra chez un nommé Justus, homme craignant Dieu, et dont la maison était contiguë à la synagogue. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 1:14
      metadata:
        usfm: 1CO.1.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Cependant Crispus, le chef de la synagogue, crut au Seigneur avec toute sa famille. Et plusieurs Corinthiens, qui avaient entendu Paul, crurent aussi, et furent baptisés. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 23:11
      metadata:
        usfm: ACT.23.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Le Seigneur dit à Paul en vision pendant la nuit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ne crains point; mais parle, et ne te tais point,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Car je suis avec toi, et personne ne mettra la main sur toi pour te faire du mal: parle, car j’ai un peuple nombreux dans cette ville.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Il y demeura un an et six mois, enseignant parmi les Corinthiens la parole de Dieu.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 12-17: cf. Ac 25:15-21. Ro 13:3, 4.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Du temps que Gallion était proconsul de l’Achaïe, les Juifs se soulevèrent unanimement contre Paul, et le menèrent devant le tribunal, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'en disant: Cet homme excite les gens à servir Dieu d’une manière contraire à la loi. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Paul allait ouvrir la bouche, lorsque Gallion dit aux Juifs: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 25:11
      metadata:
        usfm: ACT.25.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'S’il s’agissait de quelque injustice ou de quelque méchante action, je vous écouterais comme de raison, ô Juifs; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'mais, s’il s’agit de discussions sur une parole, sur des noms, et sur votre loi, cela vous regarde: je ne veux pas être juge de ces choses. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Et il les renvoya du tribunal. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Alors tous, se saisissant de Sosthène, le chef de la synagogue, le battirent devant le tribunal, sans que Gallion s’en mît en peine.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Voyage de Paul à Jérusalem, par Éphèse. Retour à Antioche
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 18-22: cf. Ac 21:23-36; 20:16; 14:26.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Paul resta encore assez longtemps à Corinthe. Ensuite il prit congé des frères, et s’embarqua pour la Syrie, avec Priscille et Aquilas, après s’être fait '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 6:18
      metadata:
        usfm: NUM.6.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 21:23
      metadata:
        usfm: ACT.21.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'raser la tête à Cenchrées, car il avait fait un vœu. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ils arrivèrent à Éphèse, et Paul y laissa ses compagnons. Étant entré dans la synagogue, il s’entretint avec les Juifs, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'qui le prièrent de prolonger son séjour. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Mais il n’y consentit point, et il prit congé d’eux, en disant: Il faut absolument que je célèbre la fête prochaine à Jérusalem. Je reviendrai vers vous, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 4:19
      metadata:
        usfm: 1CO.4.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 6:3
      metadata:
        usfm: HEB.6.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ja 4:15
      metadata:
        usfm: JAS.4.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'si Dieu le veut. Et il partit d’Éphèse. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Étant débarqué à Césarée, il monta à Jérusalem, et, après avoir salué l’Église, il descendit à Antioche.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Troisième voyage missionnaire de Paul. Départ d’Antioche pour les provinces d’Asie. Apollos à Éphèse et à Corinthe
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 23-28: cf. Ac 15:41; 16:4-6. Mt 13:12. 1 Co 3:4-8.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Lorsqu’il eut passé quelque temps à Antioche, Paul se mit en route, et parcourut successivement la Galatie et la Phrygie, fortifiant tous les disciples. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Un Juif nommé '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 1:12
      metadata:
        usfm: 1CO.1.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Apollos, originaire d’Alexandrie, homme éloquent et versé dans les Écritures, vint à Éphèse. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Il était instruit dans la voie du Seigneur, et, fervent d’esprit, il annonçait et enseignait avec exactitude ce qui concerne Jésus, bien qu’il ne connût que le baptême de Jean. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Il se mit à parler librement dans la synagogue. Aquilas et Priscille, l’ayant entendu, le prirent avec eux, et lui exposèrent plus exactement la voie de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Comme il voulait passer en Achaïe, les frères l’y encouragèrent, et écrivirent aux disciples de le bien recevoir. Quand il fut arrivé, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 3:6
      metadata:
        usfm: 1CO.3.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'il se rendit, par la grâce de Dieu, très utile à ceux qui avaient cru; '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Car il réfutait vivement les Juifs en public, démontrant par les Écritures que Jésus est le Christ.
