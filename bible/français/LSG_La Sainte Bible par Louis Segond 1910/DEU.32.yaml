document_id: DEU.32
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Cantique de Moïse
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-6: cf. De 31:16-22, 28-30. Job 36:2, 3.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Cieux! Prêtez l’oreille, et je parlerai;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Terre! Écoute les paroles de ma bouche.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Que mes instructions se répandent comme la pluie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que ma parole tombe comme la rosée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme des ondées sur la verdure,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme des gouttes d’eau sur l’herbe!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Car je proclamerai le nom de l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rendez gloire à notre Dieu!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Il est le rocher; ses œuvres sont parfaites,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car toutes ses voies sont justes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est un Dieu fidèle et sans iniquité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est juste et droit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: S’ils se sont corrompus, à lui n’est point la faute;
- type: usfm
  marker: q1
  children:
  - type: text
    text: La honte est à ses enfants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Race fausse et perverse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Est-ce l’Éternel que vous en rendrez responsable,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Peuple insensé et dépourvu de sagesse?
- type: usfm
  marker: q1
  children:
  - type: text
    text: N’est-il pas ton père, ton créateur?
- type: usfm
  marker: q1
  children:
  - type: text
    text: N’est-ce pas lui qui t’a formé, et qui t’a affermi?
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 7-33: cf. (Né 9:7-31. Ps 105; 106. Da 9:4-14.) Ap 3:17-19.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Rappelle à ton souvenir les anciens jours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Passe en revue les années, génération par génération,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Interroge ton père, et il te l’apprendra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tes vieillards, et ils te le diront.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Quand le Très-Haut donna un héritage aux nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand il sépara les enfants des hommes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il fixa les limites des peuples
- type: usfm
  marker: q1
  children:
  - type: text
    text: D’après le nombre des enfants d’Israël,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Car la portion de l’Éternel, c’est son peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jacob est la part de son héritage.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Il l’a trouvé dans une contrée déserte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans une solitude aux effroyables hurlements;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il l’a entouré, il en a pris soin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il l’a gardé comme la prunelle de son œil,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Pareil à l’aigle qui éveille sa couvée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voltige sur ses petits,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Déploie ses ailes, les prend,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les porte sur ses plumes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: L’Éternel seul a conduit son peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il n’y avait avec lui aucun dieu étranger.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Il l’a fait monter sur les hauteurs du pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et Israël a mangé les fruits des champs;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il lui a fait sucer le miel du rocher,
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’huile qui sort du rocher le plus dur,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: La crème des vaches et le lait des brebis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avec la graisse des agneaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Des béliers de Basan et des boucs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avec la fleur du froment;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tu as bu le sang du raisin, le vin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Israël est devenu gras, et il a regimbé;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu es devenu gras, épais et replet!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il a abandonné Dieu, son créateur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a méprisé le rocher de son salut,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ils ont excité sa jalousie par des dieux étrangers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils l’ont irrité par des abominations;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ils ont sacrifié à des idoles qui ne sont pas Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A des dieux qu’ils ne connaissaient point,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nouveaux, venus depuis peu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que vos pères n’avaient pas craints.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Tu as abandonné le rocher qui t’a fait naître,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tu as oublié le Dieu qui t’a engendré.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: L’Éternel l’a vu, et il a été irrité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Indigné contre ses fils et ses filles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Il a dit: Je leur cacherai ma face,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je verrai quelle sera leur fin;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car c’est une race perverse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce sont des enfants infidèles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 10:19
      metadata:
        usfm: ROM.10.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ils ont excité ma jalousie par ce qui n’est point Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils m’ont irrité par leurs vaines idoles;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et moi, j’exciterai leur jalousie par ce qui n’est point un peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je les irriterai par une nation insensée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Car '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 15:14
      metadata:
        usfm: JER.15.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: le feu de ma colère s’est allumé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il brûlera jusqu’au fond du séjour des morts;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il dévorera la terre et ses produits,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il embrasera les fondements des montagnes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: J’accumulerai sur eux les maux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’épuiserai mes traits contre eux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ils seront desséchés par la faim, consumés par la fièvre
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et par des maladies violentes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’enverrai parmi eux la dent des bêtes féroces
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le venin des serpents.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Au-dehors, on périra par l’épée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et au-dedans, par d’effrayantes calamités:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il en sera du jeune homme comme de la jeune fille,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De l’enfant à la mamelle comme du vieillard.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Je voudrais dire: Je les emporterai d’un souffle,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je ferai disparaître leur mémoire d’entre les hommes!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Mais je crains les insultes de l’ennemi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je crains que leurs adversaires ne se méprennent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et qu’ils ne disent: Notre main a été puissante,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ce n’est pas l’Éternel qui a fait toutes ces choses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: C’est une nation qui a perdu le bon sens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il n’y a point en eux d’intelligence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: S’ils étaient sages, voici ce qu’ils comprendraient,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils penseraient à ce qui leur arrivera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Comment un seul en poursuivrait-il mille,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et deux en mettraient-ils dix mille en fuite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si leur Rocher ne les avait vendus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si l’Éternel ne les avait livrés?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Car leur rocher n’est pas comme notre Rocher,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nos ennemis en sont juges.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Mais leur vigne est du plant de Sodome
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et du terroir de Gomorrhe;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leurs raisins sont des raisins empoisonnés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leurs grappes sont amères;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Leur vin, c’est le venin des serpents,
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est le poison cruel des aspics.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 34-43: cf. (Jé 50; 51; 30:16, etc.) (És 30:18, 19; 60.)'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Cela n’est-il pas caché près de moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Scellé dans mes trésors?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 12:19
      metadata:
        usfm: ROM.12.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 10:30
      metadata:
        usfm: HEB.10.30
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 2:23
      metadata:
        usfm: 1PE.2.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: A moi la vengeance et la rétribution,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand leur pied chancellera!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car le jour de leur malheur est proche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ce qui les attend ne tardera pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: L’Éternel jugera son peuple;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais il aura pitié de ses serviteurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: En voyant que leur force est épuisée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qu’il n’y a plus ni esclave ni homme libre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Il dira: Où sont leurs dieux,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le rocher qui leur servait de refuge,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Ces dieux qui mangeaient la graisse de leurs victimes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui buvaient le vin de leurs libations?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’ils se lèvent, qu’ils vous secourent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’ils vous couvrent de leur protection!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Sachez donc que c’est moi qui suis Dieu,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 4:35
      metadata:
        usfm: DEU.4.35
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 45:5
      metadata:
        usfm: ISA.45.5
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '18'
      metadata:
        usfm: ISA.45.18
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '22'
      metadata:
        usfm: ISA.45.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et qu’il n’y a point de dieu près de moi;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 2:6
      metadata:
        usfm: 1SA.2.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Je fais vivre et je fais mourir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je blesse et je guéris,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et personne ne délivre de ma main.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Car je lève ma main vers le ciel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et je dis: Je vis Éternellement!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Si j’aiguise l’éclair de mon épée
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et si ma main saisit la justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je me vengerai de mes adversaires
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je punirai ceux qui me haïssent;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Mon épée dévorera leur chair,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et j’enivrerai mes flèches de sang,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Du sang des blessés et des captifs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De la tête des chefs de l’ennemi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 15:10
      metadata:
        usfm: ROM.15.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Nations, chantez les louanges de son peuple!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car l’Éternel venge le sang de ses serviteurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il se venge de ses adversaires,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il fait l’expiation pour son pays, pour son peuple.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 44-47: cf. (De 31:28-30; 30:15-20.) 1 Th 2:11, 12.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Moïse vint et prononça toutes les paroles de ce cantique en présence du peuple; Josué, fils de Nun, était avec lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Lorsque Moïse eut achevé de prononcer toutes ces paroles devant tout Israël, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'il leur dit: Prenez à cœur toutes les paroles que je vous conjure aujourd’hui de recommander à vos enfants, afin qu’ils observent et mettent en pratique toutes les paroles de cette loi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Car ce n’est pas une chose sans importance pour vous; c’est votre vie, et c’est par là que vous prolongerez vos jours dans le pays dont vous aurez la possession, après avoir passé le Jourdain.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 48-52: cf. De 34:1-6. No 20:23-29. Ps 99:8, 9.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Ce même jour, l’Éternel parla à Moïse, et dit: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 27:12
      metadata:
        usfm: NUM.27.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Monte sur cette montagne d’Abarim, sur le mont Nebo, au pays de Moab, vis-à-vis de Jéricho; et regarde le pays de Canaan que je donne en propriété aux enfants d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Tu mourras sur la montagne où tu vas monter, et tu seras recueilli auprès de ton peuple, comme Aaron, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 27:13
      metadata:
        usfm: NUM.27.13
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 33:38
      metadata:
        usfm: NUM.33.38
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ton frère, est mort sur la montagne de Hor et a été recueilli auprès de son peuple, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'parce que vous avez '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 20:12
      metadata:
        usfm: NUM.20.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'péché contre moi au milieu des enfants d’Israël, près des eaux de Meriba, à Kadès, dans le désert de Tsin, et que vous ne m’avez point sanctifié au milieu des enfants d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: Tu verras le pays devant toi; mais tu n’entreras point dans le pays que je donne aux enfants d’Israël.
