document_id: DEU.32,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Cantique de Moïse
  - type: heading
    content: 'V. 1-6: cf. De 31:16-22, 28-30. Job 36:2, 3.'
  - type: text
    content: Cieux! Prêtez l’oreille, et je parlerai;
  - type: text
    content: Terre! Écoute les paroles de ma bouche.
  '10':
  - type: text
    content: Il l’a trouvé dans une contrée déserte,
  - type: text
    content: Dans une solitude aux effroyables hurlements;
  - type: text
    content: Il l’a entouré, il en a pris soin,
  - type: text
    content: Il l’a gardé comme la prunelle de son œil,
  '11':
  - type: text
    content: Pareil à l’aigle qui éveille sa couvée,
  - type: text
    content: Voltige sur ses petits,
  - type: text
    content: Déploie ses ailes, les prend,
  - type: text
    content: Les porte sur ses plumes.
  '12':
  - type: text
    content: L’Éternel seul a conduit son peuple,
  - type: text
    content: Et il n’y avait avec lui aucun dieu étranger.
  '13':
  - type: text
    content: Il l’a fait monter sur les hauteurs du pays,
  - type: text
    content: Et Israël a mangé les fruits des champs;
  - type: text
    content: Il lui a fait sucer le miel du rocher,
  - type: text
    content: L’huile qui sort du rocher le plus dur,
  '14':
  - type: text
    content: La crème des vaches et le lait des brebis,
  - type: text
    content: Avec la graisse des agneaux,
  - type: text
    content: Des béliers de Basan et des boucs,
  - type: text
    content: Avec la fleur du froment;
  - type: text
    content: Et tu as bu le sang du raisin, le vin.
  '15':
  - type: text
    content: Israël est devenu gras, et il a regimbé;
  - type: text
    content: Tu es devenu gras, épais et replet!
  - type: text
    content: Et il a abandonné Dieu, son créateur,
  - type: text
    content: Il a méprisé le rocher de son salut,
  '16':
  - type: text
    content: Ils ont excité sa jalousie par des dieux étrangers,
  - type: text
    content: Ils l’ont irrité par des abominations;
  '17':
  - type: text
    content: Ils ont sacrifié à des idoles qui ne sont pas Dieu,
  - type: text
    content: A des dieux qu’ils ne connaissaient point,
  - type: text
    content: Nouveaux, venus depuis peu,
  - type: text
    content: Et que vos pères n’avaient pas craints.
  '18':
  - type: text
    content: Tu as abandonné le rocher qui t’a fait naître,
  - type: text
    content: Et tu as oublié le Dieu qui t’a engendré.
  '19':
  - type: text
    content: L’Éternel l’a vu, et il a été irrité,
  - type: text
    content: Indigné contre ses fils et ses filles.
  '2':
  - type: text
    content: Que mes instructions se répandent comme la pluie,
  - type: text
    content: Que ma parole tombe comme la rosée,
  - type: text
    content: Comme des ondées sur la verdure,
  - type: text
    content: Comme des gouttes d’eau sur l’herbe!
  '20':
  - type: text
    content: 'Il a dit: Je leur cacherai ma face,'
  - type: text
    content: Je verrai quelle sera leur fin;
  - type: text
    content: Car c’est une race perverse,
  - type: text
    content: Ce sont des enfants infidèles.
  '21':
  - type: text
    content: ' '
  - type: note
    content: Ro 10:19.
  - type: text
    content: Ils ont excité ma jalousie par ce qui n’est point Dieu,
  - type: text
    content: Ils m’ont irrité par leurs vaines idoles;
  - type: text
    content: Et moi, j’exciterai leur jalousie par ce qui n’est point un peuple,
  - type: text
    content: Je les irriterai par une nation insensée.
  '22':
  - type: text
    content: 'Car '
  - type: note
    content: Jé 15:14.
  - type: text
    content: le feu de ma colère s’est allumé,
  - type: text
    content: Et il brûlera jusqu’au fond du séjour des morts;
  - type: text
    content: Il dévorera la terre et ses produits,
  - type: text
    content: Il embrasera les fondements des montagnes.
  '23':
  - type: text
    content: J’accumulerai sur eux les maux,
  - type: text
    content: J’épuiserai mes traits contre eux.
  '24':
  - type: text
    content: Ils seront desséchés par la faim, consumés par la fièvre
  - type: text
    content: Et par des maladies violentes;
  - type: text
    content: J’enverrai parmi eux la dent des bêtes féroces
  - type: text
    content: Et le venin des serpents.
  '25':
  - type: text
    content: Au-dehors, on périra par l’épée,
  - type: text
    content: 'Et au-dedans, par d’effrayantes calamités:'
  - type: text
    content: Il en sera du jeune homme comme de la jeune fille,
  - type: text
    content: De l’enfant à la mamelle comme du vieillard.
  '26':
  - type: text
    content: 'Je voudrais dire: Je les emporterai d’un souffle,'
  - type: text
    content: Je ferai disparaître leur mémoire d’entre les hommes!
  '27':
  - type: text
    content: Mais je crains les insultes de l’ennemi,
  - type: text
    content: Je crains que leurs adversaires ne se méprennent,
  - type: text
    content: 'Et qu’ils ne disent: Notre main a été puissante,'
  - type: text
    content: Et ce n’est pas l’Éternel qui a fait toutes ces choses.
  '28':
  - type: text
    content: C’est une nation qui a perdu le bon sens,
  - type: text
    content: Et il n’y a point en eux d’intelligence.
  '29':
  - type: text
    content: S’ils étaient sages, voici ce qu’ils comprendraient,
  - type: text
    content: Et ils penseraient à ce qui leur arrivera.
  '3':
  - type: text
    content: Car je proclamerai le nom de l’Éternel.
  - type: text
    content: Rendez gloire à notre Dieu!
  '30':
  - type: text
    content: Comment un seul en poursuivrait-il mille,
  - type: text
    content: Et deux en mettraient-ils dix mille en fuite,
  - type: text
    content: Si leur Rocher ne les avait vendus,
  - type: text
    content: Si l’Éternel ne les avait livrés?
  '31':
  - type: text
    content: Car leur rocher n’est pas comme notre Rocher,
  - type: text
    content: Nos ennemis en sont juges.
  '32':
  - type: text
    content: Mais leur vigne est du plant de Sodome
  - type: text
    content: Et du terroir de Gomorrhe;
  - type: text
    content: Leurs raisins sont des raisins empoisonnés,
  - type: text
    content: Leurs grappes sont amères;
  '33':
  - type: text
    content: Leur vin, c’est le venin des serpents,
  - type: text
    content: C’est le poison cruel des aspics.
  - type: heading
    content: 'V. 34-43: cf. (Jé 50; 51; 30:16, etc.) (És 30:18, 19; 60.)'
  '34':
  - type: text
    content: Cela n’est-il pas caché près de moi,
  - type: text
    content: Scellé dans mes trésors?
  '35':
  - type: text
    content: ' '
  - type: note
    content: Ro 12:19. Hé 10:30. 1 Pi 2:23.
  - type: text
    content: A moi la vengeance et la rétribution,
  - type: text
    content: Quand leur pied chancellera!
  - type: text
    content: Car le jour de leur malheur est proche,
  - type: text
    content: Et ce qui les attend ne tardera pas.
  '36':
  - type: text
    content: L’Éternel jugera son peuple;
  - type: text
    content: Mais il aura pitié de ses serviteurs,
  - type: text
    content: En voyant que leur force est épuisée,
  - type: text
    content: Et qu’il n’y a plus ni esclave ni homme libre.
  '37':
  - type: text
    content: 'Il dira: Où sont leurs dieux,'
  - type: text
    content: Le rocher qui leur servait de refuge,
  '38':
  - type: text
    content: Ces dieux qui mangeaient la graisse de leurs victimes,
  - type: text
    content: Qui buvaient le vin de leurs libations?
  - type: text
    content: Qu’ils se lèvent, qu’ils vous secourent,
  - type: text
    content: Qu’ils vous couvrent de leur protection!
  '39':
  - type: text
    content: Sachez donc que c’est moi qui suis Dieu,
  - type: note
    content: De 4:35. És 45:5, 18, 22.
  - type: text
    content: Et qu’il n’y a point de dieu près de moi;
  - type: note
    content: 1 S 2:6.
  - type: text
    content: Je fais vivre et je fais mourir,
  - type: text
    content: Je blesse et je guéris,
  - type: text
    content: Et personne ne délivre de ma main.
  '4':
  - type: text
    content: Il est le rocher; ses œuvres sont parfaites,
  - type: text
    content: Car toutes ses voies sont justes;
  - type: text
    content: C’est un Dieu fidèle et sans iniquité,
  - type: text
    content: Il est juste et droit.
  '40':
  - type: text
    content: Car je lève ma main vers le ciel,
  - type: text
    content: 'Et je dis: Je vis Éternellement!'
  '41':
  - type: text
    content: Si j’aiguise l’éclair de mon épée
  - type: text
    content: Et si ma main saisit la justice,
  - type: text
    content: Je me vengerai de mes adversaires
  - type: text
    content: Et je punirai ceux qui me haïssent;
  '42':
  - type: text
    content: Mon épée dévorera leur chair,
  - type: text
    content: Et j’enivrerai mes flèches de sang,
  - type: text
    content: Du sang des blessés et des captifs,
  - type: text
    content: De la tête des chefs de l’ennemi.
  '43':
  - type: text
    content: ' '
  - type: note
    content: Ro 15:10.
  - type: text
    content: Nations, chantez les louanges de son peuple!
  - type: text
    content: Car l’Éternel venge le sang de ses serviteurs,
  - type: text
    content: Il se venge de ses adversaires,
  - type: text
    content: Et il fait l’expiation pour son pays, pour son peuple.
  - type: heading
    content: 'V. 44-47: cf. (De 31:28-30; 30:15-20.) 1 Th 2:11, 12.'
  '44':
  - type: text
    content: 'Moïse vint et prononça toutes les paroles de ce cantique en présence du peuple; Josué, fils de Nun, était avec lui. '
  '45':
  - type: text
    content: 'Lorsque Moïse eut achevé de prononcer toutes ces paroles devant tout Israël, '
  '46':
  - type: text
    content: 'il leur dit: Prenez à cœur toutes les paroles que je vous conjure aujourd’hui de recommander à vos enfants, afin qu’ils observent et mettent en pratique toutes les paroles de cette loi. '
  '47':
  - type: text
    content: Car ce n’est pas une chose sans importance pour vous; c’est votre vie, et c’est par là que vous prolongerez vos jours dans le pays dont vous aurez la possession, après avoir passé le Jourdain.
  - type: heading
    content: 'V. 48-52: cf. De 34:1-6. No 20:23-29. Ps 99:8, 9.'
  '48':
  - type: text
    content: 'Ce même jour, l’Éternel parla à Moïse, et dit: '
  '49':
  - type: note
    content: No 27:12.
  - type: text
    content: 'Monte sur cette montagne d’Abarim, sur le mont Nebo, au pays de Moab, vis-à-vis de Jéricho; et regarde le pays de Canaan que je donne en propriété aux enfants d’Israël. '
  '5':
  - type: text
    content: S’ils se sont corrompus, à lui n’est point la faute;
  - type: text
    content: La honte est à ses enfants,
  - type: text
    content: Race fausse et perverse.
  '50':
  - type: text
    content: 'Tu mourras sur la montagne où tu vas monter, et tu seras recueilli auprès de ton peuple, comme Aaron, '
  - type: note
    content: No 27:13; 33:38.
  - type: text
    content: 'ton frère, est mort sur la montagne de Hor et a été recueilli auprès de son peuple, '
  '51':
  - type: text
    content: 'parce que vous avez '
  - type: note
    content: No 20:12.
  - type: text
    content: 'péché contre moi au milieu des enfants d’Israël, près des eaux de Meriba, à Kadès, dans le désert de Tsin, et que vous ne m’avez point sanctifié au milieu des enfants d’Israël. '
  '52':
  - type: text
    content: Tu verras le pays devant toi; mais tu n’entreras point dans le pays que je donne aux enfants d’Israël.
  '6':
  - type: text
    content: Est-ce l’Éternel que vous en rendrez responsable,
  - type: text
    content: Peuple insensé et dépourvu de sagesse?
  - type: text
    content: N’est-il pas ton père, ton créateur?
  - type: text
    content: N’est-ce pas lui qui t’a formé, et qui t’a affermi?
  - type: heading
    content: 'V. 7-33: cf. (Né 9:7-31. Ps 105; 106. Da 9:4-14.) Ap 3:17-19.'
  '7':
  - type: text
    content: Rappelle à ton souvenir les anciens jours,
  - type: text
    content: Passe en revue les années, génération par génération,
  - type: text
    content: Interroge ton père, et il te l’apprendra,
  - type: text
    content: Tes vieillards, et ils te le diront.
  '8':
  - type: text
    content: Quand le Très-Haut donna un héritage aux nations,
  - type: text
    content: Quand il sépara les enfants des hommes,
  - type: text
    content: Il fixa les limites des peuples
  - type: text
    content: D’après le nombre des enfants d’Israël,
  '9':
  - type: text
    content: Car la portion de l’Éternel, c’est son peuple,
  - type: text
    content: Jacob est la part de son héritage.
