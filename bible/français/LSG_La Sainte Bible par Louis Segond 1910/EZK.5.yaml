document_id: EZK.5
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Jugement de Jérusalem: la famine, la peste, l’épée'
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-17: cf. Jé 15:1-7. Lé 26:23-38. 1 R 9:6-9.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Et toi, fils de l’homme, prends un instrument tranchant, un rasoir de barbier; prends-le, et passe-le sur ta tête et sur ta barbe. Prends ensuite une balance à peser, et partage les cheveux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Brûles-en un tiers dans le feu, au milieu de la ville, lorsque les jours du siège seront accomplis; prends-en un tiers, et frappe-le avec le rasoir tout autour de la ville; disperses-en un tiers au vent, et je tirerai l’épée derrière eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tu en prendras une petite quantité, que tu serreras dans les bords de ton vêtement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Et de ceux-là tu en prendras encore quelques-uns, que tu jetteras au feu et que tu brûleras dans le feu. De là sortira un feu contre toute la maison d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ainsi parle le Seigneur, l’Éternel: C’est là cette Jérusalem que j’avais placée au milieu des nations et des pays d’alentour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Elle a violé mes lois et mes ordonnances, et s’est rendue plus coupable que les nations et les pays d’alentour; car elle a méprisé mes lois, elle n’a pas suivi mes ordonnances. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'C’est pourquoi ainsi parle le Seigneur, l’Éternel: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 18:24
      metadata:
        usfm: LEV.18.24
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '28'
      metadata:
        usfm: LEV.18.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Parce que vous avez été plus rebelles que les nations qui vous entourent, parce que vous n’avez pas suivi mes ordonnances et pratiqué mes lois, et que vous n’avez pas agi selon les lois des nations qui vous entourent; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'à cause de cela, ainsi parle le Seigneur, l’Éternel: Voici, j’en veux à toi, et j’exécuterai au milieu de toi mes jugements sous les yeux des nations. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'A cause de toutes tes abominations, je te ferai ce que je n’ai point encore fait, ce que je ne ferai jamais. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'C’est pourquoi des pères mangeront leurs '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 26:29
      metadata:
        usfm: LEV.26.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 28:53
      metadata:
        usfm: DEU.28.53
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 6:29
      metadata:
        usfm: 2KI.6.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: La 4:10
      metadata:
        usfm: LAM.4.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'enfants au milieu de toi, et des enfants mangeront leurs pères; j’exercerai mes jugements contre toi, et je disperserai à '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 49:32
      metadata:
        usfm: JER.49.32
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '36'
      metadata:
        usfm: JER.49.36
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'tous les vents tout ce qui restera de toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'C’est pourquoi, je suis vivant! Dit le Seigneur, l’Éternel, parce que tu as souillé mon sanctuaire par toutes tes idoles et toutes tes abominations, moi aussi je retirerai mon œil, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 7:4
      metadata:
        usfm: EZK.7.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'mon œil sera sans pitié, moi aussi je n’aurai point de miséricorde. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 15:2
      metadata:
        usfm: JER.15.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Un tiers de tes habitants mourra de la peste et sera consumé par la famine au milieu de toi; un tiers tombera par l’épée autour de toi; et j’en disperserai un tiers à tous les vents, et je tirerai l’épée derrière eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'J’assouvirai ainsi ma colère, je ferai reposer ma fureur sur eux, je me donnerai satisfaction; et ils sauront que moi, l’Éternel, j’ai parlé dans ma colère, en répandant sur eux ma fureur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Je ferai de toi un désert, un sujet d’opprobre parmi les nations qui t’entourent, aux yeux de tous les passants. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tu seras un sujet '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 28:27
      metadata:
        usfm: DEU.28.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'd’opprobre et de honte, un exemple et un objet d’effroi pour les nations qui t’entourent, quand j’exécuterai contre toi mes jugements, avec colère, avec fureur, et par des châtiments rigoureux, c’est moi, l’Éternel, qui parle, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'quand je lancerai sur eux les flèches pernicieuses de la famine, qui donnent la mort, et que j’enverrai pour vous détruire; car j’ajouterai la '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 6:25
      metadata:
        usfm: 2KI.6.25
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 3:1
      metadata:
        usfm: ISA.3.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 4:16
      metadata:
        usfm: EZK.4.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 14:13
      metadata:
        usfm: EZK.14.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'famine à vos maux, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 26:36
      metadata:
        usfm: LEV.26.36
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 4:16
      metadata:
        usfm: EZK.4.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 14:13
      metadata:
        usfm: EZK.14.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'je briserai pour vous le bâton du pain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'J’enverrai contre vous la famine et les '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 26:22
      metadata:
        usfm: LEV.26.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: bêtes féroces, qui te priveront d’enfants; la peste et le sang passeront au milieu de toi; je ferai venir l’épée sur toi. C’est moi, l’Éternel, qui parle.
