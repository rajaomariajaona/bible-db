document_id: 1KI.17
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le prophète Élie. — Annonce d’une sécheresse. — Élie près du torrent de Kerith
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-7: cf. (Ja 5:16, 17. Ap 11:6.) (Ps 37:18, 19. De 8:3. Ph 4:19.) (És 45:5-8. Jé 10:5-16.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Élie, le Thischbite, l’un des habitants de Galaad, dit à Achab: L’Éternel est vivant, le Dieu d’Israël, dont je suis le serviteur! '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ja 5:17
      metadata:
        usfm: JAS.5.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'il n’y aura ces années-ci ni rosée ni pluie, sinon à ma parole. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Et la parole de l’Éternel fut adressée à Élie, en ces mots: '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Pars d’ici, dirige-toi vers l’orient, et cache-toi près du torrent de Kerith, qui est en face du Jourdain. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tu boiras de l’eau du torrent, et j’ai ordonné aux corbeaux de te nourrir là. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il partit et fit selon la parole de l’Éternel, et il alla s’établir près du torrent de Kerith, qui est en face du Jourdain. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Les corbeaux lui apportaient du pain et de la viande le matin, et du pain et de la viande le soir, et il buvait de l’eau du torrent. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mais au bout d’un certain temps le torrent fut à sec, car il n’était point tombé de pluie dans le pays.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Élie chez la veuve de Sarepta
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 8-16: cf. (Lu 4:25, 26. Mt 10:40-42.) 2 R 4:1-7, 42-44. 2 Co 9:8-10.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Alors la parole de l’Éternel lui fut adressée en ces mots: '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Lève-toi, va '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 4:25
      metadata:
        usfm: LUK.4.25
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '26'
      metadata:
        usfm: LUK.4.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'à Sarepta, qui appartient à Sidon, et demeure là. Voici, j’y ai ordonné à une femme veuve de te nourrir. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il se leva, et il alla à Sarepta. Comme il arrivait à l’entrée de la ville, voici, il y avait là une femme veuve qui ramassait du bois. Il l’appela, et dit: Va me chercher, je te prie, un peu d’eau dans un vase, afin que je boive. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Et elle alla en chercher. Il l’appela de nouveau, et dit: Apporte-moi, je te prie, un morceau de pain dans ta main. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Et elle répondit: L’Éternel, ton Dieu, est vivant! Je n’ai rien de cuit, je n’ai qu’une poignée de farine dans un pot et un peu d’huile dans une cruche. Et voici, je ramasse deux morceaux de bois, puis je rentrerai et je préparerai cela pour moi et pour mon fils; nous mangerons, après quoi nous mourrons. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Élie lui dit: Ne crains point, rentre, fais comme tu as dit. Seulement, prépare-moi d’abord avec cela un petit gâteau, et tu me l’apporteras; tu en feras ensuite pour toi et pour ton fils. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Car ainsi parle l’Éternel, le Dieu d’Israël: La farine qui est dans le pot ne manquera point et l’huile qui est dans la cruche ne diminuera point, jusqu’au jour où l’Éternel fera tomber de la pluie sur la face du sol. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Elle alla, et elle fit selon la parole d’Élie. Et pendant longtemps elle eut de quoi manger, elle et sa famille, aussi bien qu’Élie. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: La farine qui était dans le pot ne manqua point, et l’huile qui était dans la cruche ne diminua point, selon la parole que l’Éternel avait prononcée par Élie.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 17-24: cf. 2 R 4:8-37. Ac 9:36-42. Hé 6:10.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Après ces choses, le fils de la femme, maîtresse de la maison, devint malade, et sa maladie fut si violente qu’il ne resta plus en lui de respiration. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Cette femme dit alors à Élie: Qu’y a-t-il entre moi et toi, homme de Dieu? Es-tu venu chez moi pour rappeler le souvenir de mon iniquité, et pour faire mourir mon fils? '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Il lui répondit: Donne-moi ton fils. Et il le prit du sein de la femme, le monta dans la chambre haute où il demeurait, et le coucha sur son lit. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Puis il invoqua l’Éternel, et dit: Éternel, mon Dieu, est-ce que tu affligerais, au point de faire mourir son fils, même cette veuve chez qui j’ai été reçu comme un hôte? '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Et il s’étendit trois fois sur l’enfant, invoqua l’Éternel, et dit: Éternel, mon Dieu, je t’en prie, que l’âme de cet enfant revienne au-dedans de lui! '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'L’Éternel écouta la voix d’Élie, et l’âme de l’enfant revint au-dedans de lui, et il fut rendu à la vie. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Élie prit l’enfant, le descendit de la chambre haute dans la maison, et le donna à sa mère. Et Élie dit: Vois, ton fils est vivant. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Et la femme dit à Élie: Je reconnais maintenant que tu es un homme de Dieu, et que la parole de l’Éternel dans ta bouche est vérité.'
