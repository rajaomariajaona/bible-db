    marker-yv: yv-n
  - type: text
    text: 'Les dix, ayant entendu cela, commencèrent à s’indigner contre Jacques et Jean. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Jésus les appela, et leur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Vous savez
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 20:25
      metadata:
        usfm: MAT.20.25
    - type: text
