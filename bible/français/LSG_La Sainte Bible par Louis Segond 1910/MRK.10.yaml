document_id: MRK.10
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus en Pérée. Le divorce
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-12: cf. Mt 19:1-12. (De 24:1-4. Mt 5:31, 32.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 19:1
      metadata:
        usfm: MAT.19.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Jésus, étant parti de là, se rendit dans le territoire de la Judée au-delà du Jourdain. La foule s’assembla de nouveau près de lui, et selon sa coutume, il se mit encore à l’enseigner. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Les pharisiens l’abordèrent; et, pour l’éprouver, ils lui demandèrent s’il est permis à un homme de répudier sa femme. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il leur répondit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Que vous a prescrit Moïse?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 24:1
      metadata:
        usfm: DEU.24.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 3:1
      metadata:
        usfm: JER.3.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 5:31
      metadata:
        usfm: MAT.5.31
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Moïse, dirent-ils, a permis d’écrire une lettre de divorce et de répudier. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Et Jésus leur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: C’est à cause de la dureté de votre cœur que Moïse vous a donné ce précepte.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 1:27
      metadata:
        usfm: GEN.1.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 19:4
      metadata:
        usfm: MAT.19.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais au commencement de la création, Dieu fit l’homme et la femme;
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 2:24
      metadata:
        usfm: GEN.2.24
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 6:16
      metadata:
        usfm: 1CO.6.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 5:31
      metadata:
        usfm: EPH.5.31
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: c’est pourquoi l’homme quittera son père et sa mère, et s’attachera à sa femme,
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: et les deux deviendront une seule chair. Ainsi ils ne sont plus deux, mais ils sont une seule chair.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 7:10
      metadata:
        usfm: 1CO.7.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Que l’homme donc ne sépare pas ce que Dieu a joint.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Lorsqu’ils furent dans la maison, les disciples l’interrogèrent encore là-dessus. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 5:32
      metadata:
        usfm: MAT.5.32
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 19:9
      metadata:
        usfm: MAT.19.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 16:18
      metadata:
        usfm: LUK.16.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 7:10
      metadata:
        usfm: 1CO.7.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il leur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Celui qui répudie sa femme et qui en épouse une autre, commet un adultère à son égard;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: et si une femme quitte son mari et en épouse un autre, elle commet un adultère.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les petits enfants
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 13-16: cf. (Mt 19:13-15. Lu 18:15-17.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 9:13
      metadata:
        usfm: MAT.9.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 18:15
      metadata:
        usfm: LUK.18.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'On lui amena des petits enfants, afin qu’il les touchât. Mais les disciples reprirent ceux qui les amenaient. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Jésus, voyant cela, fut indigné, et leur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Laissez venir à moi les petits enfants, et ne les en empêchez pas;
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 18:3
      metadata:
        usfm: MAT.18.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 19:14
      metadata:
        usfm: MAT.19.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 14:20
      metadata:
        usfm: 1CO.14.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 2:2
      metadata:
        usfm: 1PE.2.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: car le royaume de Dieu est pour ceux qui leur ressemblent.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je vous le dis en vérité, quiconque ne recevra pas le royaume de Dieu comme un petit enfant n’y entrera point.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 19:15
      metadata:
        usfm: MAT.19.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 9:36
      metadata:
        usfm: MRK.9.36
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Puis il les prit dans ses bras, et les bénit, en leur imposant les mains.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le jeune homme riche
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 17-27: cf. (Mt 19:16-26. Lu 18:18-27.) Mt 6:19-21, 24. Mc 9:43, etc. Ro 10:3.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 19:16
      metadata:
        usfm: MAT.19.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 18:18
      metadata:
        usfm: LUK.18.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Comme Jésus se mettait en chemin, un homme accourut, et se jetant à genoux devant lui: Bon maître, lui demanda-t-il, que dois-je faire pour hériter la vie éternelle? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Jésus lui dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Pourquoi m’appelles-tu bon? Il n’y a de bon que Dieu seul.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Tu connais les commandements:'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 20:13
      metadata:
        usfm: EXO.20.13
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 21:12
      metadata:
        usfm: EXO.21.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 5:17
      metadata:
        usfm: DEU.5.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 13:9
      metadata:
        usfm: ROM.13.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Tu ne commettras point d’adultère; tu ne tueras point; tu ne déroberas point; tu ne diras point de faux témoignage; tu ne feras tort à personne; honore ton père et ta mère.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Il lui répondit: Maître, j’ai observé toutes ces choses dès ma jeunesse. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Jésus, l’ayant regardé, l’aima, et lui dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 6:19
      metadata:
        usfm: MAT.6.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 12:33
      metadata:
        usfm: LUK.12.33
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 16:9
      metadata:
        usfm: LUK.16.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 6:17
      metadata:
        usfm: 1TI.6.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Il te manque une chose; va, vends tout ce que tu as, donne-le aux pauvres, et tu auras un trésor dans le ciel. Puis viens, et suis-moi.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Mais, affligé de cette parole, cet homme s’en alla tout triste; car il avait de grands biens. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Jésus, regardant autour de lui, dit à ses disciples: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 11:28
      metadata:
        usfm: PRO.11.28
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 19:23
      metadata:
        usfm: MAT.19.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 18:24
      metadata:
        usfm: LUK.18.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Qu’il sera difficile à ceux qui ont des richesses d’entrer dans le royaume de Dieu!
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Les disciples furent étonnés de ce que Jésus parlait ainsi. Et, reprenant, il leur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mes enfants, qu’il est difficile à ceux qui se confient dans les richesses d’entrer dans le royaume de Dieu!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Il est plus facile à un chameau de passer par le trou d’une aiguille qu’à un riche d’entrer dans le royaume de Dieu.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Les disciples furent encore plus étonnés, et ils se dirent les uns aux autres; Et qui peut être sauvé? '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Jésus les regarda, et dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Cela est impossible aux hommes, mais non à Dieu:'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 42:2
      metadata:
        usfm: JOB.42.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 32:17
      metadata:
        usfm: JER.32.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Za 8:6
      metadata:
        usfm: ZEC.8.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 1:37
      metadata:
        usfm: LUK.1.37
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: car tout est possible à Dieu.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’héritage de la vie éternelle
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 28-31: cf. (Mt 19:27-30. Lu 18:28-30.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 4:20
      metadata:
        usfm: MAT.4.20
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 19:27
      metadata:
        usfm: MAT.19.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 5:11
      metadata:
        usfm: LUK.5.11
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 18:28
      metadata:
        usfm: LUK.18.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Pierre se mit à lui dire; Voici, nous avons tout quitté, et nous t’avons suivi. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Jésus répondit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je vous le dis en vérité, il n’est personne qui, ayant quitté, à cause de moi et à cause de la bonne nouvelle, sa maison, ou ses frères, ou ses sœurs, ou sa mère, ou son père, ou ses enfants, ou ses terres,
- type: usfm
  marker: p
