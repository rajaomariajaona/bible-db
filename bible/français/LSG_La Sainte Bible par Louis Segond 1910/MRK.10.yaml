        text: Lu 22:25
      metadata:
        usfm: LUK.22.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: que ceux qu’on regarde comme les chefs des nations les tyrannisent, et que les grands les dominent.
