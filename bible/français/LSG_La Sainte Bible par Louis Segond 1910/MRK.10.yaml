document_id: MRK.10,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus en Pérée. Le divorce
  - type: heading
    content: 'V. 1-12: cf. Mt 19:1-12. (De 24:1-4. Mt 5:31, 32.)'
  - type: text
    content: ' '
  - type: note
    content: Mt 19:1.
  - type: text
    content: 'Jésus, étant parti de là, se rendit dans le territoire de la Judée au-delà du Jourdain. La foule s’assembla de nouveau près de lui, et selon sa coutume, il se mit encore à l’enseigner. '
  '10':
  - type: text
    content: 'Lorsqu’ils furent dans la maison, les disciples l’interrogèrent encore là-dessus. '
  '11':
  - type: note
    content: Mt 5:32; 19:9. Lu 16:18. 1 Co 7:10.
  - type: text
    content: 'Il leur dit: '
  - type: text
    content: Celui qui répudie sa femme et qui en épouse une autre, commet un adultère à son égard;
  '12':
  - type: text
    content: ' '
  - type: text
    content: et si une femme quitte son mari et en épouse un autre, elle commet un adultère.
  - type: heading
    content: Les petits enfants
  - type: heading
    content: 'V. 13-16: cf. (Mt 19:13-15. Lu 18:15-17.)'
  '13':
  - type: text
    content: ' '
  - type: note
    content: Mt 9:13. Lu 18:15.
  - type: text
    content: 'On lui amena des petits enfants, afin qu’il les touchât. Mais les disciples reprirent ceux qui les amenaient. '
  '14':
  - type: text
    content: 'Jésus, voyant cela, fut indigné, et leur dit: '
  - type: text
    content: Laissez venir à moi les petits enfants, et ne les en empêchez pas;
  - type: text
    content: ' '
  - type: note
    content: Mt 18:3; 19:14. 1 Co 14:20. 1 Pi 2:2.
  - type: text
    content: car le royaume de Dieu est pour ceux qui leur ressemblent.
  '15':
  - type: text
    content: ' '
  - type: text
    content: Je vous le dis en vérité, quiconque ne recevra pas le royaume de Dieu comme un petit enfant n’y entrera point.
  - type: text
    content: ' '
  '16':
  - type: note
    content: Mt 19:15. Mc 9:36.
  - type: text
    content: Puis il les prit dans ses bras, et les bénit, en leur imposant les mains.
  - type: heading
    content: Le jeune homme riche
  - type: heading
    content: 'V. 17-27: cf. (Mt 19:16-26. Lu 18:18-27.) Mt 6:19-21, 24. Mc 9:43, etc. Ro 10:3.'
  '17':
  - type: text
    content: ' '
  - type: note
    content: Mt 19:16. Lu 18:18.
  - type: text
    content: 'Comme Jésus se mettait en chemin, un homme accourut, et se jetant à genoux devant lui: Bon maître, lui demanda-t-il, que dois-je faire pour hériter la vie éternelle? '
  '18':
  - type: text
    content: 'Jésus lui dit: '
  - type: text
    content: Pourquoi m’appelles-tu bon? Il n’y a de bon que Dieu seul.
  '19':
  - type: text
    content: ' '
  - type: text
    content: 'Tu connais les commandements:'
  - type: text
    content: ' '
  - type: note
    content: Ex 20:13; 21:12. De 5:17. Ro 13:9.
  - type: text
    content: Tu ne commettras point d’adultère; tu ne tueras point; tu ne déroberas point; tu ne diras point de faux témoignage; tu ne feras tort à personne; honore ton père et ta mère.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Les pharisiens l’abordèrent; et, pour l’éprouver, ils lui demandèrent s’il est permis à un homme de répudier sa femme. '
  '20':
  - type: text
    content: 'Il lui répondit: Maître, j’ai observé toutes ces choses dès ma jeunesse. '
  '21':
  - type: text
    content: 'Jésus, l’ayant regardé, l’aima, et lui dit: '
  - type: note
    content: Mt 6:19. Lu 12:33; 16:9. 1 Ti 6:17.
  - type: text
    content: Il te manque une chose; va, vends tout ce que tu as, donne-le aux pauvres, et tu auras un trésor dans le ciel. Puis viens, et suis-moi.
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'Mais, affligé de cette parole, cet homme s’en alla tout triste; car il avait de grands biens. '
  '23':
  - type: text
    content: 'Jésus, regardant autour de lui, dit à ses disciples: '
  - type: note
    content: Pr 11:28. Mt 19:23. Lu 18:24.
  - type: text
    content: Qu’il sera difficile à ceux qui ont des richesses d’entrer dans le royaume de Dieu!
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'Les disciples furent étonnés de ce que Jésus parlait ainsi. Et, reprenant, il leur dit: '
  - type: text
    content: Mes enfants, qu’il est difficile à ceux qui se confient dans les richesses d’entrer dans le royaume de Dieu!
  '25':
  - type: text
    content: ' '
  - type: text
    content: Il est plus facile à un chameau de passer par le trou d’une aiguille qu’à un riche d’entrer dans le royaume de Dieu.
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'Les disciples furent encore plus étonnés, et ils se dirent les uns aux autres; Et qui peut être sauvé? '
  '27':
  - type: text
    content: 'Jésus les regarda, et dit: '
  - type: text
    content: 'Cela est impossible aux hommes, mais non à Dieu:'
  - type: text
    content: ' '
  - type: note
    content: Job 42:2. Jé 32:17. Za 8:6. Lu 1:37.
  - type: text
    content: car tout est possible à Dieu.
  - type: heading
    content: L’héritage de la vie éternelle
  - type: heading
    content: 'V. 28-31: cf. (Mt 19:27-30. Lu 18:28-30.)'
  '28':
  - type: text
    content: ' '
  - type: note
    content: Mt 4:20; 19:27. Lu 5:11; 18:28.
  - type: text
    content: 'Pierre se mit à lui dire; Voici, nous avons tout quitté, et nous t’avons suivi. '
  '29':
  - type: text
    content: 'Jésus répondit: '
  - type: text
    content: Je vous le dis en vérité, il n’est personne qui, ayant quitté, à cause de moi et à cause de la bonne nouvelle, sa maison, ou ses frères, ou ses sœurs, ou sa mère, ou son père, ou ses enfants, ou ses terres,
  '3':
  - type: text
    content: 'Il leur répondit: '
  - type: text
    content: Que vous a prescrit Moïse?
  - type: text
    content: ' '
  '30':
  - type: text
    content: ' '
  - type: text
    content: ne reçoive au centuple, présentement dans ce siècle-ci, des maisons, des frères, des sœurs, des mères, des enfants, et des terres, avec des persécutions, et, dans le siècle à venir, la vie éternelle.
  - type: text
    content: ' '
  '31':
  - type: note
    content: Mt 19:30; 20:16. Lu 13:30.
  - type: text
    content: Plusieurs des premiers seront les derniers, et plusieurs des derniers seront les premiers.
  - type: heading
    content: Jésus annonce sa mort et sa résurrection
  - type: heading
    content: 'V. 32-34: cf. (Mt 20:17-19. Lu 18:31-34.) Mc 8:31-33.'
  '32':
  - type: text
    content: ' '
  - type: note
    content: Mt 16:21; 17:22; 20:18. Mc 8:31; 9:31. Lu 9:22; 18:31; 24:7.
  - type: text
    content: 'Ils étaient en chemin pour monter à Jérusalem, et Jésus allait devant eux. Les disciples étaient troublés, et le suivaient avec crainte. Et Jésus prit de nouveau les douze auprès de lui, et commença à leur dire ce qui devait lui arriver:'
  '33':
  - type: text
    content: ' '
  - type: text
    content: Voici, nous montons à Jérusalem, et le Fils de l’homme sera livré aux principaux sacrificateurs et aux scribes. Ils le condamneront à mort, et ils le livreront aux païens,
  - type: text
    content: ' '
  '34':
  - type: text
    content: qui se moqueront de lui, cracheront sur lui, le battront de verges, et le feront mourir; et, trois jours après, il ressuscitera.
  - type: heading
    content: Demande des fils de Zébédée
  - type: heading
    content: 'V. 35-45: cf. Mt 20:20-28. (Lu 22:24-27. Jn 13:3-17.)'
  '35':
  - type: text
    content: ' '
  - type: note
    content: Mt 20:20.
  - type: text
    content: 'Les fils de Zébédée, Jacques et Jean, s’approchèrent de Jésus, et lui dirent: Maître, nous voudrions que tu fisses pour nous ce que nous te demanderons. '
  '36':
  - type: text
    content: 'Il leur dit: '
  - type: text
    content: Que voulez-vous que je fasse pour vous?
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'Accorde-nous, lui dirent-ils, d’être assis l’un à ta droite et l’autre à ta gauche, quand tu seras dans ta gloire. '
  '38':
  - type: text
    content: 'Jésus leur répondit: '
  - type: text
    content: Vous ne savez ce que vous demandez. Pouvez-vous boire la coupe que je dois boire, ou être baptisés du baptême
  - type: text
    content: ' '
  - type: note
    content: Mt 20:22. Lu 12:50.
  - type: text
    content: dont je dois être baptisé?
  - type: text
    content: ' Nous le pouvons, dirent-ils. '
  '39':
  - type: text
    content: 'Et Jésus leur répondit: '
  - type: text
    content: Il est vrai que vous boirez la coupe que je dois boire, et que vous serez baptisés du baptême dont je dois être baptisé;
  '4':
  - type: note
    content: De 24:1. Jé 3:1. Mt 5:31.
  - type: text
    content: 'Moïse, dirent-ils, a permis d’écrire une lettre de divorce et de répudier. '
  '40':
  - type: text
    content: ' '
  - type: note
    content: Mt 20:25.
  - type: text
    content: mais pour ce qui est d’être assis à ma droite ou à ma gauche, cela ne dépend pas de moi, et ne sera donné qu’à ceux à qui cela est réservé.
  - type: text
    content: ' '
  '41':
  - type: note
    content: Mt 20:24.
  - type: text
    content: 'Les dix, ayant entendu cela, commencèrent à s’indigner contre Jacques et Jean. '
  '42':
  - type: text
    content: 'Jésus les appela, et leur dit: '
  - type: text
    content: Vous savez
  - type: text
    content: ' '
  - type: note
    content: Mt 20:25. Lu 22:25.
  - type: text
    content: que ceux qu’on regarde comme les chefs des nations les tyrannisent, et que les grands les dominent.
  '43':
  - type: text
    content: ' '
  - type: note
    content: 1 Pi 5:3.
  - type: text
    content: Il n’en est pas de même au milieu de vous. Mais quiconque veut être grand parmi vous, qu’il soit votre serviteur;
  - type: text
    content: ' '
  '44':
  - type: text
    content: et quiconque veut être le premier parmi vous, qu’il soit l’esclave de tous.
  - type: text
    content: ' '
  '45':
  - type: text
    content: Car le Fils de l’homme est venu,
  - type: text
    content: ' '
  - type: note
    content: Jn 13:14. Ph 2:7.
  - type: text
    content: non pour être servi, mais pour servir et
  - type: text
    content: ' '
  - type: note
    content: Ép 1:7. Col 1:14. 1 Ti 2:6. Tit 2:14.
  - type: text
    content: donner sa vie comme la rançon de plusieurs.
  - type: heading
    content: L’aveugle Bartimée guéri à Jéricho
  - type: heading
    content: 'V. 46-53: cf. (Mt 20:29-34. Lu 18:35-43.) Ps 146:8.'
  '46':
  - type: text
    content: ' '
  - type: note
    content: Mt 20:29. Lu 18:35.
  - type: text
    content: 'Ils arrivèrent à Jéricho. Et, lorsque Jésus en sortit, avec ses disciples et une assez grande foule, le fils de Timée, Bartimée, mendiant aveugle, était assis au bord du chemin. '
  '47':
  - type: text
    content: 'Il entendit que c’était Jésus de Nazareth, et il se mit à crier; Fils de David, Jésus aie pitié de moi! '
  '48':
  - type: text
    content: 'Plusieurs le reprenaient, pour le faire taire; mais il criait beaucoup plus fort; Fils de David, aie pitié de moi! '
  '49':
  - type: text
    content: 'Jésus s’arrêta, et dit: '
  - type: text
    content: Appelez-le.
  - type: text
    content: ' Ils appelèrent l’aveugle, en lui disant: Prends courage, lève-toi, il t’appelle. '
  '5':
  - type: text
    content: 'Et Jésus leur dit: '
  - type: text
    content: C’est à cause de la dureté de votre cœur que Moïse vous a donné ce précepte.
  '50':
  - type: text
    content: 'L’aveugle jeta son manteau, et, se levant d’un bond, vint vers Jésus. '
  '51':
  - type: text
    content: 'Jésus, prenant la parole, lui dit: '
  - type: text
    content: Que veux-tu que je te fasse?
  - type: text
    content: ' Rabbouni, lui répondit l’aveugle, que je recouvre la vue. '
  '52':
  - type: text
    content: 'Et Jésus lui dit: '
  - type: text
    content: Va,
  - type: text
    content: ' '
  - type: note
    content: Mt 9:22. Mc 5:34.
  - type: text
    content: ta foi t’a sauvé.
  - type: text
    content: ' '
  '53':
  - type: text
    content: Aussitôt il recouvra la vue, et suivit Jésus dans le chemin.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Ge 1:27. Mt 19:4.
  - type: text
    content: Mais au commencement de la création, Dieu fit l’homme et la femme;
  - type: text
    content: ' '
  '7':
  - type: note
    content: Ge 2:24. 1 Co 6:16. Ép 5:31.
  - type: text
    content: c’est pourquoi l’homme quittera son père et sa mère, et s’attachera à sa femme,
  - type: text
    content: ' '
  '8':
  - type: text
    content: et les deux deviendront une seule chair. Ainsi ils ne sont plus deux, mais ils sont une seule chair.
  - type: text
    content: ' '
  '9':
  - type: note
    content: 1 Co 7:10.
  - type: text
    content: Que l’homme donc ne sépare pas ce que Dieu a joint.
  - type: text
    content: ' '
