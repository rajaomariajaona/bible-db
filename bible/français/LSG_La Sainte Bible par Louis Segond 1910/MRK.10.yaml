    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: mais pour ce qui est d’être assis à ma droite ou à ma gauche, cela ne dépend pas de moi, et ne sera donné qu’à ceux à qui cela est réservé.
  - type: text
    text: ' '
  - type: usfm
