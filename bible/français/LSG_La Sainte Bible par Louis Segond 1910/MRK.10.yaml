    marker-yv: yv-n
  - type: text
    text: 'Ils arrivèrent à Jéricho. Et, lorsque Jésus en sortit, avec ses disciples et une assez grande foule, le fils de Timée, Bartimée, mendiant aveugle, était assis au bord du chemin. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Il entendit que c’était Jésus de Nazareth, et il se mit à crier; Fils de David, Jésus aie pitié de moi! '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Plusieurs le reprenaient, pour le faire taire; mais il criait beaucoup plus fort; Fils de David, aie pitié de moi! '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Jésus s’arrêta, et dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Appelez-le.
  - type: text
    text: ' Ils appelèrent l’aveugle, en lui disant: Prends courage, lève-toi, il t’appelle. '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'L’aveugle jeta son manteau, et, se levant d’un bond, vint vers Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Jésus, prenant la parole, lui dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Que veux-tu que je te fasse?
  - type: text
    text: ' Rabbouni, lui répondit l’aveugle, que je recouvre la vue. '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Et Jésus lui dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Va,
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 9:22
      metadata:
        usfm: MAT.9.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 5:34
      metadata:
        usfm: MRK.5.34
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ta foi t’a sauvé.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: Aussitôt il recouvra la vue, et suivit Jésus dans le chemin.
