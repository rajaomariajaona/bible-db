document_id: 1CH.10,93
type_code: fra
verses:
  '1':
  - type: heading
    content: HISTOIRE DE DAVID
  - type: heading
    content: Ch. 10 à 29. (2 S 23:3-5.)
  - type: heading
    content: Mort de Saül
  - type: heading
    content: 'V. 1-14: cf. (1 S 31. 2 S 1.) Mt 25:30. Ps 73:27.'
  - type: text
    content: 'Les Philistins livrèrent bataille à Israël, et les hommes d’Israël prirent la fuite devant les Philistins et tombèrent morts sur la montagne de Guilboa. '
  '10':
  - type: note
    content: 1 S 31:10.
  - type: text
    content: 'Ils mirent les armes de Saül dans la maison de leur dieu, et ils attachèrent son crâne dans le temple de Dagon. '
  '11':
  - type: text
    content: 'Tout Jabès en Galaad ayant appris tout ce que les Philistins avaient fait à Saül, '
  '12':
  - type: text
    content: 'tous les hommes vaillants se levèrent, prirent le corps de Saül et ceux de ses fils, et les transportèrent à Jabès. Ils enterrèrent leurs os sous le térébinthe, à Jabès, et ils jeûnèrent sept jours. '
  '13':
  - type: text
    content: 'Saül mourut, parce qu’il se rendit coupable d’infidélité envers l’Éternel, dont il n’observa point la parole, et '
  - type: note
    content: 1 S 28:8.
  - type: text
    content: 'parce qu’il interrogea et consulta ceux qui évoquent les morts. '
  '14':
  - type: text
    content: Il ne consulta point l’Éternel; alors l’Éternel le fit mourir, et transféra la royauté à David, fils d’Isaï.
  '2':
  - type: text
    content: 'Les Philistins poursuivirent Saül et ses fils, et tuèrent Jonathan, Abinadab et Malki-Schua, fils de Saül. '
  '3':
  - type: text
    content: 'L’effort du combat porta sur Saül; les archers l’atteignirent et le blessèrent. '
  '4':
  - type: text
    content: 'Saül dit alors à celui qui portait ses armes: Tire ton épée, et transperce-m’en, de peur que ces incirconcis ne viennent me faire subir leurs outrages. Celui qui portait ses armes ne voulut pas, car il était saisi de crainte. Et Saül prit son épée, et se jeta dessus. '
  '5':
  - type: text
    content: 'Celui qui portait les armes de Saül, le voyant mort, se jeta aussi sur son épée, et mourut. '
  '6':
  - type: text
    content: 'Ainsi périrent Saül et ses trois fils, et toute sa maison périt en même temps. '
  '7':
  - type: text
    content: 'Tous ceux d’Israël qui étaient dans la vallée, ayant vu qu’on avait fui et que Saül et ses fils étaient morts, abandonnèrent leurs villes pour prendre aussi la fuite. Et les Philistins allèrent s’y établir. '
  '8':
  - type: text
    content: 'Le lendemain, les Philistins vinrent pour dépouiller les morts, et ils trouvèrent Saül et ses fils tombés sur la montagne de Guilboa. '
  '9':
  - type: text
    content: 'Ils le dépouillèrent, et emportèrent sa tête et ses armes. Puis ils firent annoncer ces bonnes nouvelles par tout le pays des Philistins à leurs idoles et au peuple. '
