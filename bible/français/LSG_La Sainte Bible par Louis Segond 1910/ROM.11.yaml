document_id: ROM.11,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-10: cf. 1 S 12:22-25. 1 R 19:9-18. És 6:9-13.'
  - type: text
    content: 'Je dis donc: '
  - type: note
    content: Jé 31:37.
  - type: text
    content: 'Dieu a-t-il rejeté son peuple? Loin de là! '
  - type: note
    content: 2 Co 11:22. Ph 3:5.
  - type: text
    content: 'Car moi aussi je suis Israélite, de la postérité d’Abraham, de la tribu de Benjamin. '
  '10':
  - type: text
    content: Que leurs yeux soient obscurcis pour ne point voir,
  - type: text
    content: Et tiens leur dos continuellement courbé!
  - type: heading
    content: 'V. 11-24: cf. (Mt 21:40-43. Ép 2:7-13.) (1 Co 4:7; 10:11, 12.) Za 1:17; 8:13.'
  '11':
  - type: text
    content: 'Je dis donc: Est-ce pour tomber qu’ils ont bronché? Loin de là! Mais, par leur chute, le salut est devenu accessible aux païens, afin qu’ils fussent excités à la jalousie. '
  '12':
  - type: text
    content: 'Or, si leur chute a été la richesse du monde, et leur amoindrissement la richesse des païens, combien plus en sera-t-il ainsi quand ils se convertiront tous. '
  '13':
  - type: text
    content: 'Je vous le dis à vous, païens: '
  - type: note
    content: Ac 9:15; 13:2; 22:21. Ga 1:16; 2:8. Ép 3:8. 1 Ti 2:7. 2 Ti 1:11.
  - type: text
    content: 'en tant qu’apôtre des païens je suis, je glorifie mon ministère, '
  '14':
  - type: text
    content: 'afin, s’il est possible, d’exciter la jalousie de ceux de ma race, et d’en sauver quelques-uns. '
  '15':
  - type: text
    content: 'Car si leur rejet a été la réconciliation du monde, que sera leur réintégration, sinon une vie d’entre les morts? '
  '16':
  - type: text
    content: 'Or, si les prémices sont saintes, la masse l’est aussi; et si la racine est sainte, les branches le sont aussi. '
  '17':
  - type: text
    content: 'Mais si quelques-unes des branches ont été retranchées, et si toi, qui étais un olivier sauvage, tu as été enté à leur place, et rendu participant de la racine et de la graisse '
  - type: note
    content: Jé 11:16.
  - type: text
    content: 'de l’olivier, '
  '18':
  - type: text
    content: 'ne te glorifie pas aux dépens de ces branches. Si tu te glorifies, sache que ce n’est pas toi qui portes la racine, mais que c’est la racine qui te porte. '
  '19':
  - type: text
    content: 'Tu diras donc: Les branches ont été retranchées, afin que moi je fusse enté. '
  '2':
  - type: text
    content: 'Dieu n’a point rejeté son peuple, qu’il a connu d’avance. Ne savez-vous pas ce que l’Écriture rapporte d’Élie, comment il adresse à Dieu cette plainte contre Israël: '
  '20':
  - type: text
    content: 'Cela est vrai; elles ont été retranchées pour cause d’incrédulité, et toi, tu subsistes par la foi. Ne t’abandonne pas à l’orgueil, mais crains; '
  '21':
  - type: text
    content: 'car si Dieu n’a pas épargné les branches naturelles, il ne t’épargnera pas non plus. '
  '22':
  - type: text
    content: 'Considère donc la bonté et la sévérité de Dieu: sévérité envers ceux qui sont tombés, et bonté de Dieu envers toi, si tu demeures ferme dans cette bonté; autrement, tu seras aussi retranché. '
  '23':
  - type: note
    content: 2 Co 3:16.
  - type: text
    content: 'Eux de même, s’ils ne persistent pas dans l’incrédulité, ils seront entés; car Dieu est puissant pour les enter de nouveau. '
  '24':
  - type: text
    content: Si toi, tu as été coupé de l’olivier naturellement sauvage, et enté contrairement à ta nature sur l’olivier franc, à plus forte raison eux seront-ils entés selon leur nature sur leur propre olivier.
  - type: heading
    content: 'V. 25-36: cf. És 59:19-21. Jé 31:31-40. Éz 36:23, etc.; 37. Os 3:4, 5. És 54:7-10.'
  '25':
  - type: text
    content: 'Car je ne veux pas, frères, que vous ignoriez ce mystère, afin que vous ne vous regardiez point comme sages, c’est qu’une partie d’Israël est tombée dans l’endurcissement, '
  - type: note
    content: Lu 21:24.
  - type: text
    content: 'jusqu’à ce que la totalité des païens soit entrée. '
  '26':
  - type: text
    content: 'Et ainsi tout Israël sera sauvé, '
  - type: note
    content: Ps 14:7. És 27:9; 59:20. Jé 31:31, 32, 33, 34. 2 Co 3:16. Hé 8:8; 10:16.
  - type: text
    content: 'selon qu’il est écrit:'
  - type: text
    content: Le libérateur viendra de Sion,
  - type: text
    content: 'Et il détournera de Jacob les impiétés; '
  '27':
  - type: text
    content: Et ce sera mon alliance avec eux,
  - type: text
    content: Lorsque j’ôterai leurs péchés.
  '28':
  - type: text
    content: 'En ce qui concerne l’Évangile, ils sont ennemis à cause de vous; mais en ce qui concerne l’élection, ils sont aimés à cause de leurs pères. '
  '29':
  - type: text
    content: 'Car Dieu ne se repent pas de ses dons et de son appel. '
  '3':
  - type: note
    content: 1 R 19:10.
  - type: text
    content: 'Seigneur, ils ont tué tes prophètes, ils ont renversé tes autels; je suis resté moi seul, et ils cherchent à m’ôter la vie? '
  '30':
  - type: text
    content: 'De même que vous avez autrefois désobéi à Dieu et que par leur désobéissance vous avez maintenant obtenu miséricorde, '
  '31':
  - type: text
    content: 'de même ils ont maintenant désobéi, afin que, par la miséricorde qui vous a été faite, ils obtiennent aussi miséricorde. '
  '32':
  - type: note
    content: Ga 3:22.
  - type: text
    content: 'Car Dieu a renfermé tous les hommes dans la désobéissance, pour faire miséricorde à tous. '
  '33':
  - type: text
    content: 'O profondeur de la richesse, de la sagesse et de la science de Dieu! '
  - type: note
    content: Ps 36:7.
  - type: text
    content: Que ses jugements sont insondables, et ses voies incompréhensibles! Car
  '34':
  - type: text
    content: ' '
  - type: note
    content: És 40:13. 1 Co 2:16.
  - type: text
    content: Qui a connu la pensée du Seigneur,
  - type: text
    content: Ou qui a été son conseiller?
  '35':
  - type: text
    content: ' '
  - type: note
    content: Job 41:2.
  - type: text
    content: Qui lui a donné le premier, pour qu’il ait à recevoir en retour?
  '36':
  - type: text
    content: ' '
  - type: note
    content: Pr 16:4. 1 Co 8:6.
  - type: text
    content: C’est de lui, par lui, et pour lui que sont toutes choses. A lui la gloire dans tous les siècles! Amen!
  '4':
  - type: text
    content: 'Mais quelle réponse Dieu lui fait-il? '
  - type: note
    content: 1 R 19:18.
  - type: text
    content: 'Je me suis réservé sept mille hommes, qui n’ont point fléchi le genou devant Baal. '
  '5':
  - type: note
    content: Ro 9:27.
  - type: text
    content: 'De même aussi dans le temps présent il y a un reste, selon l’élection de la grâce. '
  '6':
  - type: note
    content: De 9:4.
  - type: text
    content: 'Or, si c’est par grâce, ce n’est plus par les œuvres; autrement la grâce n’est plus une grâce. Et si c’est par les œuvres, ce n’est plus une grâce; autrement l’œuvre n’est plus une œuvre. '
  '7':
  - type: note
    content: Ro 9:31.
  - type: text
    content: 'Quoi donc? Ce qu’Israël cherche, il ne l’a pas obtenu, mais l’élection l’a obtenu, tandis que les autres ont été endurcis, '
  '8':
  - type: text
    content: 'selon qu’il est écrit:'
  - type: note
    content: És 29:10.
  - type: text
    content: Dieu leur a donné un esprit d’assoupissement,
  - type: note
    content: És 6:9. Éz 12:2. Mt 13:14. Mc 4:12. Lu 8:10. Jn 12:40. Ac 28:26.
  - type: text
    content: Des yeux pour ne point voir,
  - type: text
    content: Et des oreilles pour ne point entendre,
  - type: text
    content: Jusqu’à ce jour.
  - type: text
    content: 'Et David dit:'
  '9':
  - type: text
    content: ' '
  - type: note
    content: Ps 69:23.
  - type: text
    content: Que leur table soit pour eux un piège,
  - type: text
    content: Un filet, une occasion de chute, et une rétribution!
