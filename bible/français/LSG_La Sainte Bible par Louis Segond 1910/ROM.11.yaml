document_id: ROM.11,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-10: cf. 1 S 12:22-25. 1 R 19:9-18. És 6:9-13.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Je dis donc: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 31:37
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Dieu a-t-il rejeté son peuple? Loin de là! '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 11:22
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ph 3:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Car moi aussi je suis Israélite, de la postérité d’Abraham, de la tribu de Benjamin. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Que leurs yeux soient obscurcis pour ne point voir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tiens leur dos continuellement courbé!
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 11-24: cf. (Mt 21:40-43. Ép 2:7-13.) (1 Co 4:7; 10:11, 12.) Za 1:17; 8:13.'
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Je dis donc: Est-ce pour tomber qu’ils ont bronché? Loin de là! Mais, par leur chute, le salut est devenu accessible aux païens, afin qu’ils fussent excités à la jalousie. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Or, si leur chute a été la richesse du monde, et leur amoindrissement la richesse des païens, combien plus en sera-t-il ainsi quand ils se convertiront tous. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Je vous le dis à vous, païens: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 9:15
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 13:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 22:21
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 1:16
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 3:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ti 2:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ti 1:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'en tant qu’apôtre des païens je suis, je glorifie mon ministère, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'afin, s’il est possible, d’exciter la jalousie de ceux de ma race, et d’en sauver quelques-uns. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Car si leur rejet a été la réconciliation du monde, que sera leur réintégration, sinon une vie d’entre les morts? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Or, si les prémices sont saintes, la masse l’est aussi; et si la racine est sainte, les branches le sont aussi. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Mais si quelques-unes des branches ont été retranchées, et si toi, qui étais un olivier sauvage, tu as été enté à leur place, et rendu participant de la racine et de la graisse '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 11:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'de l’olivier, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'ne te glorifie pas aux dépens de ces branches. Si tu te glorifies, sache que ce n’est pas toi qui portes la racine, mais que c’est la racine qui te porte. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Tu diras donc: Les branches ont été retranchées, afin que moi je fusse enté. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Dieu n’a point rejeté son peuple, qu’il a connu d’avance. Ne savez-vous pas ce que l’Écriture rapporte d’Élie, comment il adresse à Dieu cette plainte contre Israël: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Cela est vrai; elles ont été retranchées pour cause d’incrédulité, et toi, tu subsistes par la foi. Ne t’abandonne pas à l’orgueil, mais crains; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'car si Dieu n’a pas épargné les branches naturelles, il ne t’épargnera pas non plus. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Considère donc la bonté et la sévérité de Dieu: sévérité envers ceux qui sont tombés, et bonté de Dieu envers toi, si tu demeures ferme dans cette bonté; autrement, tu seras aussi retranché. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 3:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Eux de même, s’ils ne persistent pas dans l’incrédulité, ils seront entés; car Dieu est puissant pour les enter de nouveau. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Si toi, tu as été coupé de l’olivier naturellement sauvage, et enté contrairement à ta nature sur l’olivier franc, à plus forte raison eux seront-ils entés selon leur nature sur leur propre olivier.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 25-36: cf. És 59:19-21. Jé 31:31-40. Éz 36:23, etc.; 37. Os 3:4, 5. És 54:7-10.'
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Car je ne veux pas, frères, que vous ignoriez ce mystère, afin que vous ne vous regardiez point comme sages, c’est qu’une partie d’Israël est tombée dans l’endurcissement, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 21:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'jusqu’à ce que la totalité des païens soit entrée. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Et ainsi tout Israël sera sauvé, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 14:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 27:9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 59:20
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 31:31
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '32'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '33'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '34'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 3:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 8:8
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'selon qu’il est écrit:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le libérateur viendra de Sion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et il détournera de Jacob les impiétés; '
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Et ce sera mon alliance avec eux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lorsque j’ôterai leurs péchés.
  '28':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'En ce qui concerne l’Évangile, ils sont ennemis à cause de vous; mais en ce qui concerne l’élection, ils sont aimés à cause de leurs pères. '
  '29':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Car Dieu ne se repent pas de ses dons et de son appel. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 19:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Seigneur, ils ont tué tes prophètes, ils ont renversé tes autels; je suis resté moi seul, et ils cherchent à m’ôter la vie? '
  '30':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'De même que vous avez autrefois désobéi à Dieu et que par leur désobéissance vous avez maintenant obtenu miséricorde, '
  '31':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'de même ils ont maintenant désobéi, afin que, par la miséricorde qui vous a été faite, ils obtiennent aussi miséricorde. '
  '32':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 3:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Car Dieu a renfermé tous les hommes dans la désobéissance, pour faire miséricorde à tous. '
  '33':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'O profondeur de la richesse, de la sagesse et de la science de Dieu! '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 36:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Que ses jugements sont insondables, et ses voies incompréhensibles! Car
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 40:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 2:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Qui a connu la pensée du Seigneur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ou qui a été son conseiller?
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 41:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Qui lui a donné le premier, pour qu’il ait à recevoir en retour?
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 16:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 8:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: C’est de lui, par lui, et pour lui que sont toutes choses. A lui la gloire dans tous les siècles! Amen!
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Mais quelle réponse Dieu lui fait-il? '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 19:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Je me suis réservé sept mille hommes, qui n’ont point fléchi le genou devant Baal. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 9:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'De même aussi dans le temps présent il y a un reste, selon l’élection de la grâce. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 9:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Or, si c’est par grâce, ce n’est plus par les œuvres; autrement la grâce n’est plus une grâce. Et si c’est par les œuvres, ce n’est plus une grâce; autrement l’œuvre n’est plus une œuvre. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 9:31
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Quoi donc? Ce qu’Israël cherche, il ne l’a pas obtenu, mais l’élection l’a obtenu, tandis que les autres ont été endurcis, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'selon qu’il est écrit:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 29:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Dieu leur a donné un esprit d’assoupissement,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 6:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 12:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 13:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 4:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 8:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 12:40
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 28:26
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Des yeux pour ne point voir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et des oreilles pour ne point entendre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jusqu’à ce jour.
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Et David dit:'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 69:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Que leur table soit pour eux un piège,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un filet, une occasion de chute, et une rétribution!
