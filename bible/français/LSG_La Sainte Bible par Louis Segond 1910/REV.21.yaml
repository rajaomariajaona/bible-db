document_id: REV.21,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Les nouveaux cieux et la nouvelle terre
  - type: heading
    content: 'V. 1-8: cf. (És 65:17-19. 2 Pi 3:13-14.) (Ap 19:7-9; 7:13-17. Ro 8:17, 18.)'
  - type: text
    content: ' '
  - type: note
    content: És 65:17; 66:22. 2 Pi 3:13.
  - type: text
    content: 'Puis je vis un nouveau ciel et une nouvelle terre; car le premier ciel et la première terre avaient disparu, et la mer n’était plus. '
  '10':
  - type: text
    content: 'Et il me transporta '
  - type: note
    content: Ap 1:10.
  - type: text
    content: 'en esprit sur une grande et haute montagne. Et il me montra '
  - type: note
    content: Hé 12:22. Ap 21:2.
  - type: text
    content: 'la ville sainte, Jérusalem, qui descendait du ciel d’auprès de Dieu, ayant la gloire de Dieu. '
  '11':
  - type: text
    content: 'Son éclat était semblable à celui d’une pierre très précieuse, d’une pierre de jaspe transparente comme du cristal. '
  '12':
  - type: text
    content: 'Elle avait une grande et haute muraille. Elle avait douze portes, et sur les portes douze anges, et des noms écrits, ceux des douze tribus des fils d’Israël: '
  '13':
  - type: text
    content: 'à l’orient trois portes, au nord trois portes, au midi trois portes, et à l’occident trois portes. '
  '14':
  - type: note
    content: Ép 2:20.
  - type: text
    content: 'La muraille de la ville avait douze fondements, et sur eux les douze noms des douze apôtres de l’agneau. '
  '15':
  - type: text
    content: 'Celui qui me parlait '
  - type: note
    content: Éz 40:3. Za 2:1.
  - type: text
    content: 'avait pour mesure un roseau d’or, afin de mesurer la ville, ses portes et sa muraille. '
  '16':
  - type: text
    content: 'La ville avait la forme d’un carré, et sa longueur était égale à sa largeur. Il mesura la ville avec le roseau, et trouva douze mille stades; la longueur, la largeur et la hauteur en étaient égales. '
  '17':
  - type: text
    content: 'Il mesura la muraille, et trouva cent quarante-quatre coudées, mesure d’homme, qui était celle de l’ange. '
  '18':
  - type: text
    content: 'La muraille était construite en jaspe, et la ville était d’or pur, semblable à du verre pur. '
  '19':
  - type: text
    content: 'Les fondements de la muraille de la ville étaient ornés de pierres précieuses de toute espèce: le premier fondement était de jaspe, le second de saphir, le troisième de calcédoine, le quatrième d’émeraude, '
  '2':
  - type: text
    content: 'Et je vis descendre du ciel, d’auprès de Dieu, '
  - type: note
    content: Ap 3:12; 21:10.
  - type: text
    content: 'la ville sainte, la nouvelle Jérusalem, préparée comme une épouse qui s’est parée pour son époux. '
  '20':
  - type: text
    content: 'le cinquième de sardonyx, le sixième de sardoine, le septième de chrysolithe, le huitième de béryl, le neuvième de topaze, le dixième de chrysoprase, le onzième d’hyacinthe, le douzième d’améthyste. '
  '21':
  - type: text
    content: 'Les douze portes étaient douze perles; chaque porte était d’une seule perle. La place de la ville était d’or pur, comme du verre transparent. '
  '22':
  - type: text
    content: 'Je ne vis point de temple dans la ville; car le Seigneur Dieu tout-puissant est son temple, ainsi que l’agneau. '
  '23':
  - type: note
    content: És 60:19. Za 14:7.
  - type: text
    content: 'La ville n’a besoin ni du soleil ni de la lune pour l’éclairer; car la gloire de Dieu l’éclaire, '
  - type: note
    content: Ap 22:5.
  - type: text
    content: 'et l’agneau est son flambeau. '
  '24':
  - type: note
    content: És 60:3.
  - type: text
    content: 'Les nations marcheront à sa lumière, et les rois de la terre y apporteront leur gloire. '
  '25':
  - type: note
    content: És 60:11.
  - type: text
    content: 'Ses portes ne se fermeront point le jour, '
  - type: note
    content: Ap 22:5.
  - type: text
    content: 'car là il n’y aura point de nuit. '
  '26':
  - type: text
    content: 'On y apportera la gloire et l’honneur des nations. '
  '27':
  - type: text
    content: 'Il n’entrera chez elle rien de souillé, ni personne qui se livre à l’abomination et au mensonge; il n’entrera que ceux qui sont écrits '
  - type: note
    content: Ex 32:32. Ps 69:29. Ph 4:3. Ap 3:5; 20:12.
  - type: text
    content: dans le livre de vie de l’agneau.
  '3':
  - type: text
    content: 'Et j’entendis du trône une forte voix qui disait: '
  - type: note
    content: Éz 43:7.
  - type: text
    content: 'Voici le tabernacle de Dieu avec les hommes! Il habitera avec eux, et ils seront son peuple, et Dieu lui-même sera avec eux. '
  '4':
  - type: note
    content: És 25:8. Ap 7:17.
  - type: text
    content: 'Il essuiera toute larme de leurs yeux, et la mort ne sera plus, et il n’y aura plus ni deuil, ni cri, ni douleur, car les premières choses ont disparu. '
  '5':
  - type: note
    content: Ap 4:2; 20:11.
  - type: text
    content: 'Et celui qui était assis sur le trône dit: Voici, '
  - type: note
    content: És 43:19. 2 Co 5:17.
  - type: text
    content: 'je fais toutes choses nouvelles. Et il dit: Écris; car ces paroles '
  - type: note
    content: Ap 19:9.
  - type: text
    content: 'sont certaines et véritables. '
  '6':
  - type: text
    content: 'Et il me dit: '
  - type: note
    content: Ap 16:17.
  - type: text
    content: 'C’est fait! '
  - type: note
    content: És 41:4; 44:6. Ap 1:8; 22:13.
  - type: text
    content: 'Je suis l’alpha et l’oméga, le commencement et la fin. '
  - type: note
    content: És 55:1.
  - type: text
    content: 'A celui qui a soif je donnerai de la source de l’eau de la vie, gratuitement. '
  '7':
  - type: text
    content: 'Celui qui vaincra héritera ces choses; '
  - type: note
    content: Za 8:8. Hé 8:10.
  - type: text
    content: 'je serai son Dieu, et il sera mon fils. '
  '8':
  - type: text
    content: 'Mais pour '
  - type: note
    content: Ap 22:15.
  - type: text
    content: 'les lâches, les incrédules, les abominables, les meurtriers, les impudiques, les enchanteurs, les idolâtres, et tous les menteurs, leur part sera dans l’étang '
  - type: note
    content: Ap 20:14, 15.
  - type: text
    content: ardent de feu et de soufre, ce qui est la seconde mort.
  - type: heading
    content: La nouvelle Jérusalem
  - type: heading
    content: 'V. 9-27: cf. És 60. (Éz 40:2; 48:30-35.) Hé 11:10, 16.'
  '9':
  - type: text
    content: 'Puis un des sept anges '
  - type: note
    content: Ap 15:6, 7.
  - type: text
    content: 'qui tenaient les sept coupes remplies des sept derniers fléaux vint, et il m’adressa la parole, en disant: Viens, je te montrerai l’épouse, la femme de l’agneau. '
