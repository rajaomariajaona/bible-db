document_id: NUM.15,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Règles sur les sacrifices. Punition d’un homme violant le sabbat
  - type: heading
    content: 'V. 1-16: cf. No 28:3-14.'
  - type: text
    content: 'L’Éternel parla à Moïse, et dit: '
  '10':
  - type: text
    content: 'et tu feras une libation d’un demi-hin de vin: c’est un sacrifice consumé par le feu, d’une agréable odeur à l’Éternel. '
  '11':
  - type: text
    content: 'On fera ainsi pour chaque bœuf, pour chaque bélier, pour chaque petit des brebis ou des chèvres. '
  '12':
  - type: text
    content: 'Suivant le nombre des victimes, vous ferez ainsi pour chacune, d’après leur nombre. '
  '13':
  - type: text
    content: 'Tout indigène fera ces choses ainsi, lorsqu’il offrira un sacrifice consumé par le feu, d’une agréable odeur à l’Éternel. '
  '14':
  - type: text
    content: 'Si un étranger séjournant chez vous, ou se trouvant à l’avenir au milieu de vous, offre un sacrifice consumé par le feu, d’une agréable odeur à l’Éternel, il l’offrira de la même manière que vous. '
  '15':
  - type: text
    content: 'Il y aura une seule loi pour toute l’assemblée, pour vous et '
  - type: note
    content: Ex 12:49. No 9:14.
  - type: text
    content: 'pour l’étranger en séjour au milieu de vous; ce sera une loi perpétuelle parmi vos descendants: il en sera de l’étranger comme de vous, devant l’Éternel. '
  '16':
  - type: text
    content: Il y aura une seule loi et une seule ordonnance pour vous et pour l’étranger en séjour parmi vous.
  - type: heading
    content: 'V. 17-21: cf. Lé 23:15-20. De 26:1-11.'
  '17':
  - type: text
    content: 'L’Éternel parla à Moïse, et dit: '
  '18':
  - type: text
    content: 'Parle aux enfants d’Israël, et dis-leur: Quand vous serez arrivés dans le pays où je vous ferai entrer, '
  '19':
  - type: text
    content: 'et que vous mangerez du pain de ce pays, vous prélèverez une offrande pour l’Éternel. '
  '2':
  - type: text
    content: 'Parle aux enfants d’Israël, et dis-leur: Quand vous serez entrés dans le pays que je vous donne pour y établir vos demeures, '
  '20':
  - type: text
    content: 'Vous présenterez par élévation un gâteau, les prémices de votre pâte; vous le présenterez comme l’offrande qu’on prélève de l’aire. '
  '21':
  - type: text
    content: Vous prélèverez pour l’Éternel une offrande des prémices de votre pâte, dans les temps à venir.
  - type: heading
    content: 'V. 22-31: cf. Lé 4. Ps 19:13, 14. 1 Jn 5:16, 17.'
  '22':
  - type: text
    content: 'Si vous péchez involontairement, en n’observant pas tous ces commandements que l’Éternel a fait connaître à Moïse, '
  '23':
  - type: text
    content: 'tout ce que l’Éternel vous a ordonné par Moïse, depuis le jour où l’Éternel a donné des commandements et plus tard dans les temps à venir; '
  '24':
  - type: text
    content: 'si l’on a péché involontairement, sans que l’assemblée s’en soit aperçue, toute l’assemblée offrira un jeune taureau en holocauste d’une agréable odeur à l’Éternel, avec l’offrande et la libation, d’après les règles établies; elle offrira encore un bouc en sacrifice d’expiation. '
  '25':
  - type: text
    content: 'Le sacrificateur fera l’expiation pour toute l’assemblée des enfants d’Israël, et il leur sera pardonné; car ils ont péché involontairement, et ils ont apporté leur offrande, un sacrifice consumé par le feu en l’honneur de l’Éternel et une victime expiatoire devant l’Éternel, à cause du péché qu’ils ont involontairement commis. '
  '26':
  - type: text
    content: 'Il sera pardonné à toute l’assemblée des enfants d’Israël et à l’étranger en séjour au milieu d’eux, car c’est involontairement que tout le peuple a péché. '
  '27':
  - type: note
    content: Lé 4:27.
  - type: text
    content: 'Si c’est une seule personne qui a péché involontairement, elle offrira une chèvre d’un an en sacrifice pour le péché. '
  '28':
  - type: text
    content: 'Le sacrificateur fera l’expiation pour la personne qui a péché involontairement devant l’Éternel: quand il aura fait l’expiation pour elle, il lui sera pardonné. '
  '29':
  - type: text
    content: 'Pour l’indigène parmi les enfants d’Israël et pour l’étranger en séjour au milieu d’eux, il y aura pour vous une même loi, quand on péchera involontairement. '
  '3':
  - type: text
    content: 'et que vous offrirez à l’Éternel un sacrifice consumé par le feu, soit un holocauste, soit un sacrifice '
  - type: note
    content: Lé 22:21.
  - type: text
    content: 'en accomplissement d’un vœu ou en offrande volontaire, ou bien dans vos fêtes, pour produire avec votre gros ou votre menu bétail '
  - type: note
    content: Ex 29:18.
  - type: text
    content: 'une agréable odeur à l’Éternel, '
  '30':
  - type: text
    content: 'Mais si quelqu’un, indigène ou étranger, agit la main levée, il outrage l’Éternel; celui-là sera retranché du milieu de son peuple. '
  '31':
  - type: text
    content: 'Il a méprisé la parole de l’Éternel, et il a violé son commandement: celui-là sera retranché, il portera la peine de son iniquité.'
  - type: heading
    content: 'V. 32-36: cf. (Ex 31:12-17; 35:1-3.)'
  '32':
  - type: text
    content: 'Comme les enfants d’Israël étaient dans le désert, on trouva un homme qui ramassait du bois le jour du sabbat. '
  '33':
  - type: text
    content: 'Ceux qui l’avaient trouvé ramassant du bois l’amenèrent à Moïse, à Aaron, et à toute l’assemblée. '
  '34':
  - type: text
    content: 'On le mit en '
  - type: note
    content: Lé 24:12.
  - type: text
    content: 'prison, car ce qu’on devait lui faire n’avait pas été déclaré. '
  '35':
  - type: text
    content: 'L’Éternel dit à Moïse: Cet homme sera puni de mort, toute l’assemblée le lapidera hors du camp. '
  '36':
  - type: text
    content: Toute l’assemblée le fit sortir du camp et le lapida, et il mourut, comme l’Éternel l’avait ordonné à Moïse.
  - type: heading
    content: 'V. 37-41: cf. De 6:6-9. Mt 23:5.'
  '37':
  - type: text
    content: 'L’Éternel dit à Moïse: '
  '38':
  - type: text
    content: 'Parle aux enfants d’Israël, et dis-leur qu’ils se fassent, de génération en génération, '
  - type: note
    content: De 22:12. Mt 23:5.
  - type: text
    content: 'une frange au bord de leurs vêtements, et qu’ils mettent un cordon bleu sur cette frange du bord de leurs vêtements. '
  '39':
  - type: text
    content: 'Quand vous aurez cette frange, vous la regarderez, et vous vous souviendrez de tous les commandements de l’Éternel pour les mettre en pratique, et vous ne suivrez pas les désirs de vos cœurs et de vos yeux pour vous laisser entraîner à l’infidélité. '
  '4':
  - type: text
    content: 'celui qui fera '
  - type: note
    content: Lé 2:1; 6:14.
  - type: text
    content: 'son offrande à l’Éternel présentera en offrande un dixième de fleur de farine pétrie dans un quart de hin d’huile, '
  '40':
  - type: text
    content: 'Vous vous souviendrez ainsi de mes commandements, vous les mettrez en pratique, et vous serez saints pour votre Dieu. '
  '41':
  - type: text
    content: Je suis l’Éternel, votre Dieu, qui vous ai fait sortir du pays d’Égypte, pour être votre Dieu. Je suis l’Éternel, votre Dieu.
  '5':
  - type: text
    content: 'et tu feras une libation d’un quart de hin de vin, avec l’holocauste ou le sacrifice, pour chaque agneau. '
  '6':
  - type: text
    content: 'Pour un bélier, tu présenteras en offrande deux dixièmes de fleur de farine pétrie dans un tiers de hin d’huile, '
  '7':
  - type: text
    content: 'et tu feras une libation d’un tiers de hin de vin, comme offrande d’une agréable odeur à l’Éternel. '
  '8':
  - type: text
    content: 'Si tu offres un veau, soit comme holocauste, soit comme sacrifice en accomplissement d’un vœu, ou comme sacrifice d’actions de grâces à l’Éternel, '
  '9':
  - type: text
    content: 'on présentera en offrande, avec le veau, trois dixièmes de fleur de farine pétrie dans un demi-hin d’huile, '
