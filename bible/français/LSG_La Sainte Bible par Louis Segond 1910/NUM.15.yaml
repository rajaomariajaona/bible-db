document_id: NUM.15
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Règles sur les sacrifices. Punition d’un homme violant le sabbat
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-16: cf. No 28:3-14.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Éternel parla à Moïse, et dit: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Parle aux enfants d’Israël, et dis-leur: Quand vous serez entrés dans le pays que je vous donne pour y établir vos demeures, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'et que vous offrirez à l’Éternel un sacrifice consumé par le feu, soit un holocauste, soit un sacrifice '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 22:21
      metadata:
        usfm: LEV.22.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'en accomplissement d’un vœu ou en offrande volontaire, ou bien dans vos fêtes, pour produire avec votre gros ou votre menu bétail '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 29:18
      metadata:
        usfm: EXO.29.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'une agréable odeur à l’Éternel, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'celui qui fera '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 2:1
      metadata:
        usfm: LEV.2.1
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 6:14
      metadata:
        usfm: LEV.6.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'son offrande à l’Éternel présentera en offrande un dixième de fleur de farine pétrie dans un quart de hin d’huile, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'et tu feras une libation d’un quart de hin de vin, avec l’holocauste ou le sacrifice, pour chaque agneau. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Pour un bélier, tu présenteras en offrande deux dixièmes de fleur de farine pétrie dans un tiers de hin d’huile, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'et tu feras une libation d’un tiers de hin de vin, comme offrande d’une agréable odeur à l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Si tu offres un veau, soit comme holocauste, soit comme sacrifice en accomplissement d’un vœu, ou comme sacrifice d’actions de grâces à l’Éternel, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'on présentera en offrande, avec le veau, trois dixièmes de fleur de farine pétrie dans un demi-hin d’huile, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'et tu feras une libation d’un demi-hin de vin: c’est un sacrifice consumé par le feu, d’une agréable odeur à l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'On fera ainsi pour chaque bœuf, pour chaque bélier, pour chaque petit des brebis ou des chèvres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Suivant le nombre des victimes, vous ferez ainsi pour chacune, d’après leur nombre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tout indigène fera ces choses ainsi, lorsqu’il offrira un sacrifice consumé par le feu, d’une agréable odeur à l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Si un étranger séjournant chez vous, ou se trouvant à l’avenir au milieu de vous, offre un sacrifice consumé par le feu, d’une agréable odeur à l’Éternel, il l’offrira de la même manière que vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Il y aura une seule loi pour toute l’assemblée, pour vous et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 12:49
      metadata:
        usfm: EXO.12.49
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 9:14
      metadata:
        usfm: NUM.9.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'pour l’étranger en séjour au milieu de vous; ce sera une loi perpétuelle parmi vos descendants: il en sera de l’étranger comme de vous, devant l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Il y aura une seule loi et une seule ordonnance pour vous et pour l’étranger en séjour parmi vous.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 17-21: cf. Lé 23:15-20. De 26:1-11.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'L’Éternel parla à Moïse, et dit: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Parle aux enfants d’Israël, et dis-leur: Quand vous serez arrivés dans le pays où je vous ferai entrer, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'et que vous mangerez du pain de ce pays, vous prélèverez une offrande pour l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Vous présenterez par élévation un gâteau, les prémices de votre pâte; vous le présenterez comme l’offrande qu’on prélève de l’aire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Vous prélèverez pour l’Éternel une offrande des prémices de votre pâte, dans les temps à venir.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 22-31: cf. Lé 4. Ps 19:13, 14. 1 Jn 5:16, 17.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Si vous péchez involontairement, en n’observant pas tous ces commandements que l’Éternel a fait connaître à Moïse, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'tout ce que l’Éternel vous a ordonné par Moïse, depuis le jour où l’Éternel a donné des commandements et plus tard dans les temps à venir; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'si l’on a péché involontairement, sans que l’assemblée s’en soit aperçue, toute l’assemblée offrira un jeune taureau en holocauste d’une agréable odeur à l’Éternel, avec l’offrande et la libation, d’après les règles établies; elle offrira encore un bouc en sacrifice d’expiation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Le sacrificateur fera l’expiation pour toute l’assemblée des enfants d’Israël, et il leur sera pardonné; car ils ont péché involontairement, et ils ont apporté leur offrande, un sacrifice consumé par le feu en l’honneur de l’Éternel et une victime expiatoire devant l’Éternel, à cause du péché qu’ils ont involontairement commis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Il sera pardonné à toute l’assemblée des enfants d’Israël et à l’étranger en séjour au milieu d’eux, car c’est involontairement que tout le peuple a péché. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 4:27
      metadata:
        usfm: LEV.4.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Si c’est une seule personne qui a péché involontairement, elle offrira une chèvre d’un an en sacrifice pour le péché. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Le sacrificateur fera l’expiation pour la personne qui a péché involontairement devant l’Éternel: quand il aura fait l’expiation pour elle, il lui sera pardonné. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Pour l’indigène parmi les enfants d’Israël et pour l’étranger en séjour au milieu d’eux, il y aura pour vous une même loi, quand on péchera involontairement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Mais si quelqu’un, indigène ou étranger, agit la main levée, il outrage l’Éternel; celui-là sera retranché du milieu de son peuple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Il a méprisé la parole de l’Éternel, et il a violé son commandement: celui-là sera retranché, il portera la peine de son iniquité.'
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 32-36: cf. (Ex 31:12-17; 35:1-3.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Comme les enfants d’Israël étaient dans le désert, on trouva un homme qui ramassait du bois le jour du sabbat. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ceux qui l’avaient trouvé ramassant du bois l’amenèrent à Moïse, à Aaron, et à toute l’assemblée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'On le mit en '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 24:12
      metadata:
        usfm: LEV.24.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'prison, car ce qu’on devait lui faire n’avait pas été déclaré. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'L’Éternel dit à Moïse: Cet homme sera puni de mort, toute l’assemblée le lapidera hors du camp. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Toute l’assemblée le fit sortir du camp et le lapida, et il mourut, comme l’Éternel l’avait ordonné à Moïse.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 37-41: cf. De 6:6-9. Mt 23:5.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'L’Éternel dit à Moïse: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Parle aux enfants d’Israël, et dis-leur qu’ils se fassent, de génération en génération, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 22:12
      metadata:
        usfm: DEU.22.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 23:5
      metadata:
        usfm: MAT.23.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'une frange au bord de leurs vêtements, et qu’ils mettent un cordon bleu sur cette frange du bord de leurs vêtements. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Quand vous aurez cette frange, vous la regarderez, et vous vous souviendrez de tous les commandements de l’Éternel pour les mettre en pratique, et vous ne suivrez pas les désirs de vos cœurs et de vos yeux pour vous laisser entraîner à l’infidélité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Vous vous souviendrez ainsi de mes commandements, vous les mettrez en pratique, et vous serez saints pour votre Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Je suis l’Éternel, votre Dieu, qui vous ai fait sortir du pays d’Égypte, pour être votre Dieu. Je suis l’Éternel, votre Dieu.
