document_id: ISA.58
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le vrai jeûne
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-14: cf. És 1:10-20. (Mt 6:16-18. Jon 3:5-10.) (Mi 6:8. Mt 3:8.) (És 56:2-7. Jé 17:19, etc.)'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Crie à plein gosier, ne te retiens pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Élève ta voix comme une trompette,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et annonce à mon peuple ses iniquités,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A la maison de Jacob ses péchés!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tous les jours ils me cherchent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils veulent connaître mes voies;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme une nation qui aurait pratiqué la justice
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et n’aurait pas abandonné la loi de son Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils me demandent des arrêts de justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils désirent l’approche de Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Que nous sert de jeûner, si tu ne le vois pas?
- type: usfm
  marker: q1
  children:
  - type: text
    text: De mortifier notre âme, si tu n’y as point égard?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voici, le jour de votre jeûne, vous vous livrez à vos penchants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et vous traitez durement tous vos mercenaires.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Voici, vous jeûnez pour disputer et vous quereller,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour frapper méchamment du poing;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous ne jeûnez pas comme le veut ce jour,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour que votre voix soit entendue en haut.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Za 7:5
      metadata:
        usfm: ZEC.7.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Est-ce là le jeûne auquel je prends plaisir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Un jour où l’homme humilie son âme?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Courber la tête comme un jonc,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et se coucher sur le sac et la cendre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Est-ce là ce que tu appelleras un jeûne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Un jour agréable à l’Éternel?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Voici le jeûne auquel je prends plaisir:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Détache les chaînes de la méchanceté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dénoue les liens de la servitude,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Renvoie libres les opprimés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que l’on rompe toute espèce de joug;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 18:7
      metadata:
        usfm: EZK.18.7
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '16'
      metadata:
        usfm: EZK.18.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 25:35
      metadata:
        usfm: MAT.25.35
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Partage ton pain avec celui qui a faim,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et fais entrer dans ta maison les malheureux sans asile;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si tu vois un homme nu, couvre-le,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ne te détourne pas de ton semblable.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Alors ta lumière poindra comme l’aurore,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ta guérison germera promptement;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ta justice marchera devant toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la gloire de l’Éternel t’accompagnera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Alors tu appelleras, et l’Éternel répondra;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tu crieras, et il dira: Me voici!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si tu éloignes du milieu de toi le joug,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les gestes menaçants et les discours injurieux,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Si tu donnes ta propre subsistance à celui qui a faim,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si tu rassasies l’âme indigente,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ta lumière se lèvera sur l’obscurité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tes ténèbres seront comme le midi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: L’Éternel sera toujours ton guide,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il rassasiera ton âme dans les lieux arides,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il redonnera de la vigueur à tes membres;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu seras comme un jardin arrosé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme une source dont les eaux ne tarissent pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Les tiens rebâtiront sur d’anciennes ruines,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu relèveras des fondements antiques;
- type: usfm
  marker: q1
  children:
  - type: text
    text: On t’appellera réparateur des brèches,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celui qui restaure les chemins, qui rend le pays habitable.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Si tu retiens ton pied pendant le sabbat,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour ne pas faire ta volonté en mon saint jour,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si tu fais du sabbat tes délices,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour sanctifier l’Éternel en le glorifiant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et si tu l’honores en ne suivant point tes voies,
- type: usfm
  marker: q1
  children:
  - type: text
    text: En ne te livrant pas à tes penchants et à de vains discours,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Alors tu mettras ton plaisir en l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je te ferai monter sur les hauteurs du pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je te ferai jouir de l’héritage de Jacob, ton père;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car la bouche de l’Éternel a parlé.
