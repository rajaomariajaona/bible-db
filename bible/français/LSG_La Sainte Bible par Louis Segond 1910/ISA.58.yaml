document_id: ISA.58,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Le vrai jeûne
  - type: heading
    content: 'V. 1-14: cf. És 1:10-20. (Mt 6:16-18. Jon 3:5-10.) (Mi 6:8. Mt 3:8.) (És 56:2-7. Jé 17:19, etc.)'
  - type: text
    content: Crie à plein gosier, ne te retiens pas,
  - type: text
    content: Élève ta voix comme une trompette,
  - type: text
    content: Et annonce à mon peuple ses iniquités,
  - type: text
    content: A la maison de Jacob ses péchés!
  '10':
  - type: text
    content: Si tu donnes ta propre subsistance à celui qui a faim,
  - type: text
    content: Si tu rassasies l’âme indigente,
  - type: text
    content: Ta lumière se lèvera sur l’obscurité,
  - type: text
    content: Et tes ténèbres seront comme le midi.
  '11':
  - type: text
    content: L’Éternel sera toujours ton guide,
  - type: text
    content: Il rassasiera ton âme dans les lieux arides,
  - type: text
    content: Et il redonnera de la vigueur à tes membres;
  - type: text
    content: Tu seras comme un jardin arrosé,
  - type: text
    content: Comme une source dont les eaux ne tarissent pas.
  '12':
  - type: text
    content: Les tiens rebâtiront sur d’anciennes ruines,
  - type: text
    content: Tu relèveras des fondements antiques;
  - type: text
    content: On t’appellera réparateur des brèches,
  - type: text
    content: Celui qui restaure les chemins, qui rend le pays habitable.
  '13':
  - type: text
    content: Si tu retiens ton pied pendant le sabbat,
  - type: text
    content: Pour ne pas faire ta volonté en mon saint jour,
  - type: text
    content: Si tu fais du sabbat tes délices,
  - type: text
    content: Pour sanctifier l’Éternel en le glorifiant,
  - type: text
    content: Et si tu l’honores en ne suivant point tes voies,
  - type: text
    content: En ne te livrant pas à tes penchants et à de vains discours,
  '14':
  - type: text
    content: Alors tu mettras ton plaisir en l’Éternel,
  - type: text
    content: Et je te ferai monter sur les hauteurs du pays,
  - type: text
    content: Je te ferai jouir de l’héritage de Jacob, ton père;
  - type: text
    content: Car la bouche de l’Éternel a parlé.
  '2':
  - type: text
    content: Tous les jours ils me cherchent,
  - type: text
    content: Ils veulent connaître mes voies;
  - type: text
    content: Comme une nation qui aurait pratiqué la justice
  - type: text
    content: Et n’aurait pas abandonné la loi de son Dieu,
  - type: text
    content: Ils me demandent des arrêts de justice,
  - type: text
    content: Ils désirent l’approche de Dieu.
  '3':
  - type: text
    content: Que nous sert de jeûner, si tu ne le vois pas?
  - type: text
    content: De mortifier notre âme, si tu n’y as point égard?
  - type: text
    content: Voici, le jour de votre jeûne, vous vous livrez à vos penchants,
  - type: text
    content: Et vous traitez durement tous vos mercenaires.
  '4':
  - type: text
    content: Voici, vous jeûnez pour disputer et vous quereller,
  - type: text
    content: Pour frapper méchamment du poing;
  - type: text
    content: Vous ne jeûnez pas comme le veut ce jour,
  - type: text
    content: Pour que votre voix soit entendue en haut.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Za 7:5.
  - type: text
    content: Est-ce là le jeûne auquel je prends plaisir,
  - type: text
    content: Un jour où l’homme humilie son âme?
  - type: text
    content: Courber la tête comme un jonc,
  - type: text
    content: Et se coucher sur le sac et la cendre,
  - type: text
    content: Est-ce là ce que tu appelleras un jeûne,
  - type: text
    content: Un jour agréable à l’Éternel?
  '6':
  - type: text
    content: 'Voici le jeûne auquel je prends plaisir:'
  - type: text
    content: Détache les chaînes de la méchanceté,
  - type: text
    content: Dénoue les liens de la servitude,
  - type: text
    content: Renvoie libres les opprimés,
  - type: text
    content: Et que l’on rompe toute espèce de joug;
  '7':
  - type: text
    content: ' '
  - type: note
    content: Éz 18:7, 16. Mt 25:35.
  - type: text
    content: Partage ton pain avec celui qui a faim,
  - type: text
    content: Et fais entrer dans ta maison les malheureux sans asile;
  - type: text
    content: Si tu vois un homme nu, couvre-le,
  - type: text
    content: Et ne te détourne pas de ton semblable.
  '8':
  - type: text
    content: Alors ta lumière poindra comme l’aurore,
  - type: text
    content: Et ta guérison germera promptement;
  - type: text
    content: Ta justice marchera devant toi,
  - type: text
    content: Et la gloire de l’Éternel t’accompagnera.
  '9':
  - type: text
    content: Alors tu appelleras, et l’Éternel répondra;
  - type: text
    content: 'Tu crieras, et il dira: Me voici!'
  - type: text
    content: Si tu éloignes du milieu de toi le joug,
  - type: text
    content: Les gestes menaçants et les discours injurieux,
