document_id: AMO.1,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Contre Damas, Gaza, Tyr, Édom, Ammon, Moab; contre Juda et Israël
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-2: cf. 2 Ch 26. 2 R 14:23-29.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Paroles d’Amos, l’un des bergers de Tekoa, visions qu’il eut sur Israël, au temps d’Ozias, roi de Juda, et au temps de Jéroboam, fils de Joas, roi d’Israël, deux ans avant le '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Za 14:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: tremblement de terre.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: J’enverrai le feu dans les murs de Tyr,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il en dévorera les palais.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 11-12: cf. Ab 1. Éz 25:12-14; 35.'
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ainsi parle l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause de trois crimes d’Édom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Même de quatre, je ne révoque pas mon arrêt,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce qu’il a poursuivi ses frères avec l’épée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En étouffant sa compassion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce que sa colère déchire toujours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qu’il garde éternellement sa fureur.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: J’enverrai le feu dans Théman,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il dévorera les palais de Botsra.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 13-15: cf. Jé 49:1-6. Éz 25:1-7. So 2:8, 9.'
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ainsi parle l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause de trois crimes des enfants d’Ammon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Même de quatre, je ne révoque pas mon arrêt,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce qu’ils ont fendu le ventre des femmes enceintes de Galaad,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afin d’agrandir leur territoire.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: J’allumerai le feu dans les murs de Rabba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il en dévorera les palais,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au milieu des cris de guerre au jour du combat,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au milieu de l’ouragan au jour de la tempête;
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Et leur roi s’en ira en captivité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lui, et ses chefs avec lui, dit l’Éternel.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Il dit:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'De Sion l’Éternel '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 25:30
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Joë 3:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: rugit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De Jérusalem il fait entendre sa voix.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les pâturages des bergers sont dans le deuil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le sommet du Carmel est desséché.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 3-5: cf. És 8:4; 17:1, 3. 2 R 16:7-9. Jé 49:23-27.'
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ainsi parle l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause de trois crimes de Damas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Même de quatre, je ne révoque pas mon arrêt,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce qu’ils ont foulé Galaad sous des traîneaux de fer.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: J’enverrai le feu dans la maison de Hazaël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il dévorera les palais de Ben-Hadad.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Je '
    - type: usfm
      marker: x
      children:
      - type: text
        text: És 17:1, etc. Jé 49:23, etc.
      marker-yv: yv-n
    - type: text
      text: briserai les verrous de Damas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’exterminerai de Bikath-Aven les habitants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et de Beth-Éden celui qui tient le sceptre;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et le peuple de Syrie sera mené captif à '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 16:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Kir, dit l’Éternel.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 6-8: cf. Jé 47. So 2:4-7.'
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ainsi parle l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A cause de trois crimes de '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 21:16
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '17'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 28:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Gaza,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Même de quatre, je ne révoque pas mon arrêt,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce qu’ils ont fait une foule de captifs pour les livrer à Édom.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: J’enverrai le feu dans les murs de Gaza,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il en dévorera les palais.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: J’exterminerai d’Asdod les habitants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et d’Askalon celui qui tient le sceptre;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je tournerai ma main contre Ékron,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le reste des Philistins périra, dit le Seigneur, l’Éternel.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 9-10: cf. Éz 26 à 28. Joë 3:4.'
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ainsi parle l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause de trois crimes de Tyr,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Même de quatre, je ne révoque pas mon arrêt,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce qu’ils ont livré à Édom une foule de captifs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sans se souvenir de l’alliance fraternelle.
