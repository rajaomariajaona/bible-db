document_id: AMO.1,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Contre Damas, Gaza, Tyr, Édom, Ammon, Moab; contre Juda et Israël
  - type: heading
    content: 'V. 1-2: cf. 2 Ch 26. 2 R 14:23-29.'
  - type: text
    content: 'Paroles d’Amos, l’un des bergers de Tekoa, visions qu’il eut sur Israël, au temps d’Ozias, roi de Juda, et au temps de Jéroboam, fils de Joas, roi d’Israël, deux ans avant le '
  - type: note
    content: Za 14:5.
  - type: text
    content: tremblement de terre.
  '10':
  - type: text
    content: J’enverrai le feu dans les murs de Tyr,
  - type: text
    content: Et il en dévorera les palais.
  - type: heading
    content: 'V. 11-12: cf. Ab 1. Éz 25:12-14; 35.'
  '11':
  - type: text
    content: 'Ainsi parle l’Éternel:'
  - type: text
    content: A cause de trois crimes d’Édom,
  - type: text
    content: Même de quatre, je ne révoque pas mon arrêt,
  - type: text
    content: Parce qu’il a poursuivi ses frères avec l’épée,
  - type: text
    content: En étouffant sa compassion,
  - type: text
    content: Parce que sa colère déchire toujours,
  - type: text
    content: Et qu’il garde éternellement sa fureur.
  '12':
  - type: text
    content: J’enverrai le feu dans Théman,
  - type: text
    content: Et il dévorera les palais de Botsra.
  - type: heading
    content: 'V. 13-15: cf. Jé 49:1-6. Éz 25:1-7. So 2:8, 9.'
  '13':
  - type: text
    content: 'Ainsi parle l’Éternel:'
  - type: text
    content: A cause de trois crimes des enfants d’Ammon,
  - type: text
    content: Même de quatre, je ne révoque pas mon arrêt,
  - type: text
    content: Parce qu’ils ont fendu le ventre des femmes enceintes de Galaad,
  - type: text
    content: Afin d’agrandir leur territoire.
  '14':
  - type: text
    content: J’allumerai le feu dans les murs de Rabba,
  - type: text
    content: Et il en dévorera les palais,
  - type: text
    content: Au milieu des cris de guerre au jour du combat,
  - type: text
    content: Au milieu de l’ouragan au jour de la tempête;
  '15':
  - type: text
    content: Et leur roi s’en ira en captivité,
  - type: text
    content: Lui, et ses chefs avec lui, dit l’Éternel.
  '2':
  - type: text
    content: 'Il dit:'
  - type: text
    content: 'De Sion l’Éternel '
  - type: note
    content: Jé 25:30. Joë 3:16.
  - type: text
    content: rugit,
  - type: text
    content: De Jérusalem il fait entendre sa voix.
  - type: text
    content: Les pâturages des bergers sont dans le deuil,
  - type: text
    content: Et le sommet du Carmel est desséché.
  - type: heading
    content: 'V. 3-5: cf. És 8:4; 17:1, 3. 2 R 16:7-9. Jé 49:23-27.'
  '3':
  - type: text
    content: 'Ainsi parle l’Éternel:'
  - type: text
    content: A cause de trois crimes de Damas,
  - type: text
    content: Même de quatre, je ne révoque pas mon arrêt,
  - type: text
    content: Parce qu’ils ont foulé Galaad sous des traîneaux de fer.
  '4':
  - type: text
    content: J’enverrai le feu dans la maison de Hazaël,
  - type: text
    content: Et il dévorera les palais de Ben-Hadad.
  '5':
  - type: text
    content: 'Je '
  - type: note
    content: És 17:1, etc. Jé 49:23, etc.
  - type: text
    content: briserai les verrous de Damas,
  - type: text
    content: J’exterminerai de Bikath-Aven les habitants,
  - type: text
    content: Et de Beth-Éden celui qui tient le sceptre;
  - type: text
    content: 'Et le peuple de Syrie sera mené captif à '
  - type: note
    content: 2 R 16:9.
  - type: text
    content: Kir, dit l’Éternel.
  - type: heading
    content: 'V. 6-8: cf. Jé 47. So 2:4-7.'
  '6':
  - type: text
    content: 'Ainsi parle l’Éternel:'
  - type: text
    content: 'A cause de trois crimes de '
  - type: note
    content: 2 Ch 21:16, 17; 28:18.
  - type: text
    content: Gaza,
  - type: text
    content: Même de quatre, je ne révoque pas mon arrêt,
  - type: text
    content: Parce qu’ils ont fait une foule de captifs pour les livrer à Édom.
  '7':
  - type: text
    content: J’enverrai le feu dans les murs de Gaza,
  - type: text
    content: Et il en dévorera les palais.
  '8':
  - type: text
    content: J’exterminerai d’Asdod les habitants,
  - type: text
    content: Et d’Askalon celui qui tient le sceptre;
  - type: text
    content: Je tournerai ma main contre Ékron,
  - type: text
    content: Et le reste des Philistins périra, dit le Seigneur, l’Éternel.
  - type: heading
    content: 'V. 9-10: cf. Éz 26 à 28. Joë 3:4.'
  '9':
  - type: text
    content: 'Ainsi parle l’Éternel:'
  - type: text
    content: A cause de trois crimes de Tyr,
  - type: text
    content: Même de quatre, je ne révoque pas mon arrêt,
  - type: text
    content: Parce qu’ils ont livré à Édom une foule de captifs,
  - type: text
    content: Sans se souvenir de l’alliance fraternelle.
