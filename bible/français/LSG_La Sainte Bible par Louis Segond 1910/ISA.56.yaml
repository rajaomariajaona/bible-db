document_id: ISA.56,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Tous les peuples appelés
  - type: heading
    content: 'V. 1-8: cf. (Mi 6:8. És 58:13, 14.) 1 R 8:41-43. Ac 10:34, 35. Lu 13:29.'
  - type: text
    content: 'Ainsi parle l’Éternel:'
  - type: text
    content: Observez ce qui est droit, et pratiquez ce qui est juste;
  - type: text
    content: Car mon salut ne tardera pas à venir,
  - type: text
    content: Et ma justice à se manifester.
  '10':
  - type: text
    content: Ses gardiens sont tous aveugles, sans intelligence;
  - type: text
    content: Ils sont tous des chiens muets, incapables d’aboyer;
  - type: text
    content: Ils ont des rêveries, se tiennent couchés,
  - type: text
    content: Aiment à sommeiller.
  '11':
  - type: text
    content: Et ce sont des chiens voraces, insatiables;
  - type: text
    content: Ce sont des bergers qui ne savent rien comprendre;
  - type: text
    content: Tous suivent leur propre voie,
  - type: text
    content: 'Chacun selon son intérêt, jusqu’au dernier:'
  '12':
  - type: text
    content: Venez, je vais chercher du vin,
  - type: text
    content: Et nous boirons des liqueurs fortes!
  - type: text
    content: Nous en ferons autant demain,
  - type: text
    content: Et beaucoup plus encore!
  '2':
  - type: text
    content: Heureux l’homme qui fait cela,
  - type: text
    content: Et le fils de l’homme qui y demeure ferme,
  - type: text
    content: Gardant le sabbat, pour ne point le profaner,
  - type: text
    content: Et veillant sur sa main, pour ne commettre aucun mal!
  '3':
  - type: text
    content: 'Que l’étranger qui s’attache à l’Éternel ne dise pas:'
  - type: text
    content: L’Éternel me séparera de son peuple!
  - type: text
    content: 'Et que l’eunuque ne dise pas:'
  - type: text
    content: Voici, je suis un arbre sec!
  '4':
  - type: text
    content: 'Car ainsi parle l’Éternel:'
  - type: text
    content: Aux eunuques qui garderont mes sabbats,
  - type: text
    content: Qui choisiront ce qui m’est agréable,
  - type: text
    content: Et qui persévéreront dans mon alliance,
  '5':
  - type: text
    content: Je donnerai dans ma maison et dans mes murs une place et un nom
  - type: text
    content: Préférables à des fils et à des filles;
  - type: text
    content: Je leur donnerai un nom éternel,
  - type: text
    content: Qui ne périra pas.
  '6':
  - type: text
    content: Et les étrangers qui s’attacheront à l’Éternel pour le servir,
  - type: text
    content: Pour aimer le nom de l’Éternel,
  - type: text
    content: Pour être ses serviteurs,
  - type: text
    content: Tous ceux qui garderont le sabbat, pour ne point le profaner,
  - type: text
    content: Et qui persévéreront dans mon alliance,
  '7':
  - type: text
    content: Je les amènerai sur ma montagne sainte,
  - type: text
    content: Et je les réjouirai dans ma maison de prière;
  - type: text
    content: Leurs holocaustes et leurs sacrifices seront agréés sur mon autel;
  - type: note
    content: Mt 21:13. Mc 11:17. Lu 19:46.
  - type: text
    content: Car ma maison sera appelée une maison de prière pour tous les peuples.
  '8':
  - type: text
    content: Le Seigneur, l’Éternel, parle,
  - type: text
    content: 'Lui qui rassemble les exilés d’Israël:'
  - type: text
    content: Je réunirai d’autres peuples à lui, aux siens déjà rassemblés.
  - type: heading
    content: Reproches aux chefs infidèles et aux idolâtres
  - type: heading
    content: '56 v. 9 à 57 v. 2: cf. (Éz 3:17, 18. Mi 3:5, 11. Jé 6:13-15; 23:9-15.) (No 23:10. Ap 14:13.)'
  '9':
  - type: text
    content: Vous toutes, bêtes des champs,
  - type: text
    content: Venez pour manger, vous toutes, bêtes de la forêt!
