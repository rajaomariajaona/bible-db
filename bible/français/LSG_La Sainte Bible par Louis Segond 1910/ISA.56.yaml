document_id: ISA.56
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tous les peuples appelés
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-8: cf. (Mi 6:8. És 58:13, 14.) 1 R 8:41-43. Ac 10:34, 35. Lu 13:29.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ainsi parle l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Observez ce qui est droit, et pratiquez ce qui est juste;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car mon salut ne tardera pas à venir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ma justice à se manifester.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Heureux l’homme qui fait cela,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le fils de l’homme qui y demeure ferme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Gardant le sabbat, pour ne point le profaner,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et veillant sur sa main, pour ne commettre aucun mal!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Que l’étranger qui s’attache à l’Éternel ne dise pas:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’Éternel me séparera de son peuple!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et que l’eunuque ne dise pas:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voici, je suis un arbre sec!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Car ainsi parle l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aux eunuques qui garderont mes sabbats,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui choisiront ce qui m’est agréable,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui persévéreront dans mon alliance,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Je donnerai dans ma maison et dans mes murs une place et un nom
- type: usfm
  marker: q1
  children:
  - type: text
    text: Préférables à des fils et à des filles;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je leur donnerai un nom éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui ne périra pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Et les étrangers qui s’attacheront à l’Éternel pour le servir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour aimer le nom de l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour être ses serviteurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous ceux qui garderont le sabbat, pour ne point le profaner,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui persévéreront dans mon alliance,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Je les amènerai sur ma montagne sainte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je les réjouirai dans ma maison de prière;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leurs holocaustes et leurs sacrifices seront agréés sur mon autel;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 21:13
      metadata:
        usfm: MAT.21.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 11:17
      metadata:
        usfm: MRK.11.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 19:46
      metadata:
        usfm: LUK.19.46
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Car ma maison sera appelée une maison de prière pour tous les peuples.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Le Seigneur, l’Éternel, parle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Lui qui rassemble les exilés d’Israël:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je réunirai d’autres peuples à lui, aux siens déjà rassemblés.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Reproches aux chefs infidèles et aux idolâtres
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: '56 v. 9 à 57 v. 2: cf. (Éz 3:17, 18. Mi 3:5, 11. Jé 6:13-15; 23:9-15.) (No 23:10. Ap 14:13.)'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Vous toutes, bêtes des champs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Venez pour manger, vous toutes, bêtes de la forêt!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ses gardiens sont tous aveugles, sans intelligence;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils sont tous des chiens muets, incapables d’aboyer;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ont des rêveries, se tiennent couchés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aiment à sommeiller.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Et ce sont des chiens voraces, insatiables;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce sont des bergers qui ne savent rien comprendre;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous suivent leur propre voie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Chacun selon son intérêt, jusqu’au dernier:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Venez, je vais chercher du vin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et nous boirons des liqueurs fortes!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous en ferons autant demain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et beaucoup plus encore!
