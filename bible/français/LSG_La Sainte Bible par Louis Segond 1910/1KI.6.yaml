document_id: 1KI.6,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Construction du temple
  - type: heading
    content: 'V. 1-38: cf. 1 Ch 28:10-12, 20. 2 Ch 3. Ac 7:47.'
  - type: text
    content: 'Ce fut la '
  - type: note
    content: 2 Ch 3:2.
  - type: text
    content: 'quatre cent quatre-vingtième année après la sortie des enfants d’Israël du pays d’Égypte que Salomon bâtit '
  - type: note
    content: Ac 7:47.
  - type: text
    content: 'la maison à l’Éternel, la quatrième année de son règne sur Israël, au mois de Ziv, qui est le second mois. '
  '10':
  - type: text
    content: 'Il donna cinq coudées de hauteur à chacun des étages qui entouraient toute la maison, et il les lia à la maison par des bois de cèdre. '
  '11':
  - type: text
    content: 'L’Éternel adressa la parole à Salomon, et lui dit: Tu bâtis cette maison! '
  '12':
  - type: note
    content: 1 R 2:4; 9:4.
  - type: text
    content: 'Si tu marches selon mes lois, si tu pratiques mes ordonnances, si tu observes et suis tous mes commandements, j’accomplirai à ton égard la promesse '
  - type: note
    content: 2 S 7:13. 1 Ch 22:10, 19.
  - type: text
    content: 'que j’ai faite à David, ton père, '
  '13':
  - type: text
    content: 'j’habiterai au milieu des enfants d’Israël, et je n’abandonnerai point mon peuple d’Israël. '
  '14':
  - type: text
    content: 'Après avoir achevé de bâtir la maison, '
  '15':
  - type: text
    content: 'Salomon en revêtit intérieurement les murs de planches de cèdre, depuis le sol jusqu’au plafond; il revêtit ainsi de bois l’intérieur, et il couvrit le sol de la maison de planches de cyprès. '
  '16':
  - type: text
    content: 'Il revêtit de planches de cèdre les vingt coudées du fond de la maison, depuis le sol jusqu’au haut des murs, et il réserva cet espace pour en faire le sanctuaire, le lieu très saint. '
  '17':
  - type: text
    content: 'Les quarante coudées sur le devant formaient la maison, c’est-à-dire le temple. '
  '18':
  - type: text
    content: 'Le bois de cèdre à l’intérieur de la maison offrait des sculptures de coloquintes et de fleurs épanouies; tout était de cèdre, on ne voyait aucune pierre. '
  '19':
  - type: text
    content: 'Salomon établit le sanctuaire intérieurement au milieu de la maison, pour y placer l’arche de l’alliance de l’Éternel. '
  '2':
  - type: text
    content: 'La maison que le roi Salomon bâtit à l’Éternel avait soixante coudées de longueur, vingt de largeur, et trente de hauteur. '
  '20':
  - type: text
    content: 'Le sanctuaire avait vingt coudées de longueur, vingt coudées de largeur, et vingt coudées de hauteur. Salomon le couvrit d’or pur. Il fit devant le sanctuaire un autel de bois de cèdre et le couvrit d’or. '
  '21':
  - type: text
    content: 'Il couvrit d’or pur l’intérieur de la maison, et il fit passer le voile dans des chaînettes d’or devant le sanctuaire, qu’il couvrit d’or. '
  '22':
  - type: text
    content: 'Il couvrit d’or toute la maison, la maison tout entière, et il couvrit d’or tout l’autel qui était devant le sanctuaire. '
  '23':
  - type: note
    content: Ex 25:18.
  - type: text
    content: 'Il fit dans le sanctuaire deux chérubins de bois d’olivier sauvage, ayant dix coudées de hauteur. '
  '24':
  - type: text
    content: 'Chacune des deux ailes de l’un des chérubins avait cinq coudées, ce qui faisait dix coudées de l’extrémité d’une de ses ailes à l’extrémité de l’autre. '
  '25':
  - type: text
    content: 'Le second chérubin avait aussi dix coudées. La mesure et la forme étaient les mêmes pour les deux chérubins. '
  '26':
  - type: text
    content: 'La hauteur de chacun des deux chérubins était de dix coudées. '
  '27':
  - type: text
    content: 'Salomon plaça les chérubins au milieu de la maison, dans l’intérieur. '
  - type: note
    content: Ex 25:20.
  - type: text
    content: 'Leurs ailes étaient déployées: l’aile du premier touchait à l’un des murs, et l’aile du second touchait à l’autre mur; et leurs autres ailes se rencontraient par l’extrémité au milieu de la maison. '
  '28':
  - type: text
    content: 'Salomon couvrit d’or les chérubins. '
  '29':
  - type: text
    content: 'Il fit sculpter sur tout le pourtour des murs de la maison, à l’intérieur et à l’extérieur, des chérubins, des palmes et des fleurs épanouies. '
  '3':
  - type: text
    content: 'Le portique devant '
  - type: note
    content: Jn 10:23. Ac 3:11; 5:12.
  - type: text
    content: 'le temple de la maison avait vingt coudées de longueur répondant à la largeur de la maison, et dix coudées de profondeur sur la face de la maison. '
  '30':
  - type: text
    content: 'Il couvrit d’or le sol de la maison, à l’intérieur et à l’extérieur. '
  '31':
  - type: text
    content: 'Il fit à l’entrée du sanctuaire une porte à deux battants, de bois d’olivier sauvage; l’encadrement avec les poteaux équivalait à un cinquième du mur. '
  '32':
  - type: text
    content: 'Les deux battants étaient de bois d’olivier sauvage. Il y fit sculpter des chérubins, des palmes et des fleurs épanouies, et il les couvrit d’or; il étendit aussi l’or sur les chérubins et sur les palmes. '
  '33':
  - type: text
    content: 'Il fit de même, pour la porte du temple, des poteaux de bois d’olivier sauvage, ayant le quart de la dimension du mur, et deux battants de bois de cyprès; '
  '34':
  - type: text
    content: 'chacun des battants était formé de deux planches brisées. '
  '35':
  - type: text
    content: 'Il y fit sculpter des chérubins, des palmes et des fleurs épanouies, et il les couvrit d’or, qu’il étendit sur la sculpture. '
  '36':
  - type: text
    content: 'Il bâtit le parvis intérieur de trois rangées de pierres de taille et d’une rangée de poutres de cèdre. '
  '37':
  - type: text
    content: 'La quatrième année, au mois de Ziv, les fondements de la maison de l’Éternel furent posés; '
  '38':
  - type: text
    content: et la onzième année, au mois de Bul, qui est le huitième mois, la maison fut achevée dans toutes ses parties et telle qu’elle devait être. Salomon la construisit dans l’espace de sept ans.
  '4':
  - type: text
    content: 'Le roi fit à la maison des fenêtres solidement grillées. '
  '5':
  - type: text
    content: 'Il bâtit contre le mur de la maison des étages circulaires, qui entouraient les murs de la maison, le temple et le sanctuaire; et il fit des chambres latérales tout autour. '
  '6':
  - type: text
    content: 'L’étage inférieur était large de cinq coudées, celui du milieu de six coudées, et le troisième de sept coudées; car il ménagea des retraites à la maison tout autour en dehors, afin que la charpente n’entrât pas dans les murs de la maison. '
  '7':
  - type: text
    content: 'Lorsqu’on bâtit la maison, on se servit de pierres toutes taillées, et ni marteau, ni hache, ni aucun instrument de fer, ne furent entendus dans la maison pendant qu’on la construisait. '
  '8':
  - type: text
    content: 'L’entrée des chambres de l’étage inférieur était au côté droit de la maison; on montait à l’étage du milieu par un escalier tournant, et de l’étage du milieu au troisième. '
  '9':
  - type: text
    content: 'Après avoir achevé de bâtir la maison, Salomon la couvrit de planches et de poutres de cèdre. '
