document_id: 1KI.6
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Construction du temple
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-38: cf. 1 Ch 28:10-12, 20. 2 Ch 3. Ac 7:47.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ce fut la '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 3:2
      metadata:
        usfm: 2CH.3.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'quatre cent quatre-vingtième année après la sortie des enfants d’Israël du pays d’Égypte que Salomon bâtit '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 7:47
      metadata:
        usfm: ACT.7.47
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'la maison à l’Éternel, la quatrième année de son règne sur Israël, au mois de Ziv, qui est le second mois. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'La maison que le roi Salomon bâtit à l’Éternel avait soixante coudées de longueur, vingt de largeur, et trente de hauteur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Le portique devant '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 10:23
      metadata:
        usfm: JHN.10.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 3:11
      metadata:
        usfm: ACT.3.11
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 5:12
      metadata:
        usfm: ACT.5.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'le temple de la maison avait vingt coudées de longueur répondant à la largeur de la maison, et dix coudées de profondeur sur la face de la maison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Le roi fit à la maison des fenêtres solidement grillées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il bâtit contre le mur de la maison des étages circulaires, qui entouraient les murs de la maison, le temple et le sanctuaire; et il fit des chambres latérales tout autour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'L’étage inférieur était large de cinq coudées, celui du milieu de six coudées, et le troisième de sept coudées; car il ménagea des retraites à la maison tout autour en dehors, afin que la charpente n’entrât pas dans les murs de la maison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Lorsqu’on bâtit la maison, on se servit de pierres toutes taillées, et ni marteau, ni hache, ni aucun instrument de fer, ne furent entendus dans la maison pendant qu’on la construisait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'L’entrée des chambres de l’étage inférieur était au côté droit de la maison; on montait à l’étage du milieu par un escalier tournant, et de l’étage du milieu au troisième. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Après avoir achevé de bâtir la maison, Salomon la couvrit de planches et de poutres de cèdre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il donna cinq coudées de hauteur à chacun des étages qui entouraient toute la maison, et il les lia à la maison par des bois de cèdre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'L’Éternel adressa la parole à Salomon, et lui dit: Tu bâtis cette maison! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 2:4
      metadata:
        usfm: 1KI.2.4
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 9:4
      metadata:
        usfm: 1KI.9.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Si tu marches selon mes lois, si tu pratiques mes ordonnances, si tu observes et suis tous mes commandements, j’accomplirai à ton égard la promesse '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 S 7:13
      metadata:
        usfm: 2SA.7.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 22:10
      metadata:
        usfm: 1CH.22.10
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '19'
      metadata:
        usfm: 1CH.22.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'que j’ai faite à David, ton père, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'j’habiterai au milieu des enfants d’Israël, et je n’abandonnerai point mon peuple d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Après avoir achevé de bâtir la maison, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Salomon en revêtit intérieurement les murs de planches de cèdre, depuis le sol jusqu’au plafond; il revêtit ainsi de bois l’intérieur, et il couvrit le sol de la maison de planches de cyprès. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il revêtit de planches de cèdre les vingt coudées du fond de la maison, depuis le sol jusqu’au haut des murs, et il réserva cet espace pour en faire le sanctuaire, le lieu très saint. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Les quarante coudées sur le devant formaient la maison, c’est-à-dire le temple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Le bois de cèdre à l’intérieur de la maison offrait des sculptures de coloquintes et de fleurs épanouies; tout était de cèdre, on ne voyait aucune pierre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Salomon établit le sanctuaire intérieurement au milieu de la maison, pour y placer l’arche de l’alliance de l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Le sanctuaire avait vingt coudées de longueur, vingt coudées de largeur, et vingt coudées de hauteur. Salomon le couvrit d’or pur. Il fit devant le sanctuaire un autel de bois de cèdre et le couvrit d’or. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Il couvrit d’or pur l’intérieur de la maison, et il fit passer le voile dans des chaînettes d’or devant le sanctuaire, qu’il couvrit d’or. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Il couvrit d’or toute la maison, la maison tout entière, et il couvrit d’or tout l’autel qui était devant le sanctuaire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 25:18
      metadata:
        usfm: EXO.25.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il fit dans le sanctuaire deux chérubins de bois d’olivier sauvage, ayant dix coudées de hauteur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Chacune des deux ailes de l’un des chérubins avait cinq coudées, ce qui faisait dix coudées de l’extrémité d’une de ses ailes à l’extrémité de l’autre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Le second chérubin avait aussi dix coudées. La mesure et la forme étaient les mêmes pour les deux chérubins. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'La hauteur de chacun des deux chérubins était de dix coudées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Salomon plaça les chérubins au milieu de la maison, dans l’intérieur. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 25:20
      metadata:
        usfm: EXO.25.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Leurs ailes étaient déployées: l’aile du premier touchait à l’un des murs, et l’aile du second touchait à l’autre mur; et leurs autres ailes se rencontraient par l’extrémité au milieu de la maison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Salomon couvrit d’or les chérubins. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Il fit sculpter sur tout le pourtour des murs de la maison, à l’intérieur et à l’extérieur, des chérubins, des palmes et des fleurs épanouies. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Il couvrit d’or le sol de la maison, à l’intérieur et à l’extérieur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Il fit à l’entrée du sanctuaire une porte à deux battants, de bois d’olivier sauvage; l’encadrement avec les poteaux équivalait à un cinquième du mur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Les deux battants étaient de bois d’olivier sauvage. Il y fit sculpter des chérubins, des palmes et des fleurs épanouies, et il les couvrit d’or; il étendit aussi l’or sur les chérubins et sur les palmes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Il fit de même, pour la porte du temple, des poteaux de bois d’olivier sauvage, ayant le quart de la dimension du mur, et deux battants de bois de cyprès; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'chacun des battants était formé de deux planches brisées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Il y fit sculpter des chérubins, des palmes et des fleurs épanouies, et il les couvrit d’or, qu’il étendit sur la sculpture. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Il bâtit le parvis intérieur de trois rangées de pierres de taille et d’une rangée de poutres de cèdre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'La quatrième année, au mois de Ziv, les fondements de la maison de l’Éternel furent posés; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: et la onzième année, au mois de Bul, qui est le huitième mois, la maison fut achevée dans toutes ses parties et telle qu’elle devait être. Salomon la construisit dans l’espace de sept ans.
