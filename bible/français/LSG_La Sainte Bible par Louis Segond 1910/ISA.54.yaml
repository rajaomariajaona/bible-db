document_id: ISA.54,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Le bonheur qui attend Israël
  - type: heading
    content: 'V. 1-10: cf. (Ga 4:22-27. És 49:14-23.) (Jé 29:10-14; 32:36-42.)'
  - type: text
    content: ' '
  - type: note
    content: Ga 4:27.
  - type: text
    content: Réjouis-toi, stérile, toi qui n’enfantes plus!
  - type: text
    content: Fais éclater ton allégresse et ta joie, toi qui n’as plus de douleurs!
  - type: text
    content: Car les fils de la délaissée seront plus nombreux
  - type: text
    content: Que les fils de celle qui est mariée, dit l’Éternel.
  '10':
  - type: text
    content: Quand les montagnes s’éloigneraient,
  - type: text
    content: Quand les collines chancelleraient,
  - type: text
    content: Mon amour ne s’éloignera point de toi,
  - type: text
    content: Et mon alliance de paix ne chancellera point,
  - type: text
    content: Dit l’Éternel, qui a compassion de toi.
  - type: heading
    content: 'V. 11-17: cf. És 60:17, etc. Ap 21:10, etc. Ro 8:31, 33, 37.'
  '11':
  - type: text
    content: Malheureuse, battue de la tempête, et que nul ne console!
  - type: text
    content: Voici, je garnirai tes pierres d’antimoine,
  - type: text
    content: Et je te donnerai des fondements de saphir;
  '12':
  - type: text
    content: Je ferai tes créneaux de rubis,
  - type: text
    content: Tes portes d’escarboucles,
  - type: text
    content: Et toute ton enceinte de pierres précieuses.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Jn 6:45.
  - type: text
    content: Tous tes fils seront disciples de l’Éternel,
  - type: text
    content: Et grande sera la prospérité de tes fils.
  '14':
  - type: text
    content: Tu seras affermie par la justice;
  - type: text
    content: Bannis l’inquiétude, car tu n’as rien à craindre,
  - type: text
    content: Et la frayeur, car elle n’approchera pas de toi.
  '15':
  - type: text
    content: Si l’on forme des complots, cela ne viendra pas de moi;
  - type: text
    content: Quiconque se liguera contre toi tombera sous ton pouvoir.
  '16':
  - type: text
    content: Voici, j’ai créé l’ouvrier qui souffle le charbon au feu,
  - type: text
    content: Et qui fabrique une arme par son travail;
  - type: text
    content: Mais j’ai créé aussi le destructeur pour la briser.
  '17':
  - type: text
    content: Toute arme forgée contre toi sera sans effet;
  - type: text
    content: Et toute langue qui s’élèvera en justice contre toi,
  - type: text
    content: Tu la condamneras.
  - type: text
    content: Tel est l’héritage des serviteurs de l’Éternel,
  - type: text
    content: Tel est le salut qui leur viendra de moi,
  - type: text
    content: Dit l’Éternel.
  '2':
  - type: text
    content: Élargis l’espace de ta tente;
  - type: text
    content: 'Qu’on déploie les couvertures de ta demeure:'
  - type: text
    content: Ne retiens pas!
  - type: text
    content: Allonge tes cordages,
  - type: text
    content: Et affermis tes pieux!
  '3':
  - type: text
    content: Car tu te répandras à droite et à gauche;
  - type: text
    content: Ta postérité envahira des nations,
  - type: text
    content: Et peuplera des villes désertes.
  '4':
  - type: text
    content: Ne crains pas, car tu ne seras point confondue;
  - type: text
    content: Ne rougis pas, car tu ne seras pas déshonorée;
  - type: text
    content: Mais tu oublieras la honte de ta jeunesse,
  - type: text
    content: Et tu ne te souviendras plus de l’opprobre de ton veuvage.
  '5':
  - type: text
    content: 'Car ton créateur est ton époux:'
  - type: text
    content: L’Éternel des armées est son nom;
  - type: text
    content: 'Et ton rédempteur est le Saint d’Israël:'
  - type: text
    content: Il se nomme Dieu de toute la terre;
  '6':
  - type: text
    content: Car l’Éternel te rappelle comme une femme délaissée et au cœur attristé,
  - type: text
    content: Comme une épouse de la jeunesse qui a été répudiée, dit ton Dieu.
  '7':
  - type: text
    content: Quelques instants je t’avais abandonnée,
  - type: text
    content: Mais avec une grande affection je t’accueillerai;
  '8':
  - type: text
    content: Dans un instant de colère, je t’avais un moment dérobé ma face,
  - type: text
    content: Mais avec un amour éternel j’aurai compassion de toi,
  - type: text
    content: Dit ton rédempteur, l’Éternel.
  '9':
  - type: text
    content: 'Il en sera pour moi comme des eaux de Noé:'
  - type: note
    content: Ge 9:11.
  - type: text
    content: J’avais juré que les eaux de Noé ne se répandraient plus sur la terre;
  - type: text
    content: Je jure de même de ne plus m’irriter contre toi
  - type: text
    content: Et de ne plus te menacer.
