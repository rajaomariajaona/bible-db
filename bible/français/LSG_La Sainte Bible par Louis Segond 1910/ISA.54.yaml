document_id: ISA.54,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le bonheur qui attend Israël
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-10: cf. (Ga 4:22-27. És 49:14-23.) (Jé 29:10-14; 32:36-42.)'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 4:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Réjouis-toi, stérile, toi qui n’enfantes plus!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fais éclater ton allégresse et ta joie, toi qui n’as plus de douleurs!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car les fils de la délaissée seront plus nombreux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que les fils de celle qui est mariée, dit l’Éternel.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Quand les montagnes s’éloigneraient,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand les collines chancelleraient,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon amour ne s’éloignera point de toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et mon alliance de paix ne chancellera point,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit l’Éternel, qui a compassion de toi.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 11-17: cf. És 60:17, etc. Ap 21:10, etc. Ro 8:31, 33, 37.'
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Malheureuse, battue de la tempête, et que nul ne console!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, je garnirai tes pierres d’antimoine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je te donnerai des fondements de saphir;
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Je ferai tes créneaux de rubis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes portes d’escarboucles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et toute ton enceinte de pierres précieuses.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 6:45
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Tous tes fils seront disciples de l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et grande sera la prospérité de tes fils.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Tu seras affermie par la justice;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bannis l’inquiétude, car tu n’as rien à craindre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la frayeur, car elle n’approchera pas de toi.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Si l’on forme des complots, cela ne viendra pas de moi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quiconque se liguera contre toi tombera sous ton pouvoir.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Voici, j’ai créé l’ouvrier qui souffle le charbon au feu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qui fabrique une arme par son travail;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais j’ai créé aussi le destructeur pour la briser.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Toute arme forgée contre toi sera sans effet;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et toute langue qui s’élèvera en justice contre toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu la condamneras.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tel est l’héritage des serviteurs de l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tel est le salut qui leur viendra de moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit l’Éternel.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Élargis l’espace de ta tente;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Qu’on déploie les couvertures de ta demeure:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne retiens pas!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Allonge tes cordages,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et affermis tes pieux!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Car tu te répandras à droite et à gauche;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ta postérité envahira des nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et peuplera des villes désertes.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ne crains pas, car tu ne seras point confondue;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne rougis pas, car tu ne seras pas déshonorée;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais tu oublieras la honte de ta jeunesse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tu ne te souviendras plus de l’opprobre de ton veuvage.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Car ton créateur est ton époux:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel des armées est son nom;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et ton rédempteur est le Saint d’Israël:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il se nomme Dieu de toute la terre;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Car l’Éternel te rappelle comme une femme délaissée et au cœur attristé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme une épouse de la jeunesse qui a été répudiée, dit ton Dieu.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Quelques instants je t’avais abandonnée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais avec une grande affection je t’accueillerai;
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Dans un instant de colère, je t’avais un moment dérobé ma face,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais avec un amour éternel j’aurai compassion de toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit ton rédempteur, l’Éternel.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Il en sera pour moi comme des eaux de Noé:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 9:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: J’avais juré que les eaux de Noé ne se répandraient plus sur la terre;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je jure de même de ne plus m’irriter contre toi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et de ne plus te menacer.
