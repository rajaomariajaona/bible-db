document_id: MAT.11,93
type_code: fra
verses:
  '1':
  - type: text
    content: Lorsque Jésus eut achevé de donner ses instructions à ses douze disciples, il partit de là, pour enseigner et prêcher dans les villes du pays.
  - type: heading
    content: Message de Jean-Baptiste à Jésus
  - type: heading
    content: 'V. 2-6: cf. Lu 7:18-23. (Jn 5:36. És 35:4-6; 61:1-3.)'
  '10':
  - type: text
    content: 'Car c’est celui dont il est écrit:'
  - type: note
    content: Mal 3:1. Mc 1:2. Lu 7:27.
  - type: text
    content: Voici, j’envoie mon messager devant ta face,
  - type: text
    content: Pour préparer ton chemin devant toi.
  '11':
  - type: text
    content: ' '
  - type: text
    content: Je vous le dis en vérité, parmi ceux qui sont nés de femmes, il n’en a point paru de plus grand que Jean-Baptiste. Cependant, le plus petit dans le royaume des cieux est plus grand que lui.
  - type: text
    content: ' '
  '12':
  - type: note
    content: Lu 16:16.
  - type: text
    content: Depuis le temps de Jean-Baptiste jusqu’à présent, le royaume des cieux est forcé, et ce sont les violents qui s’en emparent.
  - type: text
    content: ' '
  '13':
  - type: text
    content: Car tous les prophètes et la loi ont prophétisé jusqu’à Jean;
  - type: text
    content: ' '
  '14':
  - type: note
    content: Mal 4:5. Lu 1:17.
  - type: text
    content: et, si vous voulez le comprendre, c’est lui qui est l’Élie qui devait venir.
  - type: text
    content: ' '
  '15':
  - type: text
    content: Que celui qui a des oreilles pour entendre entende.
  - type: text
    content: ' '
  '16':
  - type: text
    content: A qui comparerai-je cette génération?
  - type: text
    content: ' '
  - type: note
    content: Lu 7:31.
  - type: text
    content: Elle ressemble à des enfants assis dans des places publiques, et qui, s’adressant à d’autres enfants,
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'disent: Nous vous avons joué de la flûte, et vous n’avez pas dansé; nous avons chanté des complaintes, et vous ne vous êtes pas lamentés.'
  - type: text
    content: ' '
  '18':
  - type: note
    content: Mt 3:4. Mc 1:6.
  - type: text
    content: 'Car Jean est venu, ne mangeant ni ne buvant, et ils disent: Il a un démon.'
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'Le Fils de l’homme est venu, mangeant et buvant, et ils disent: C’est un mangeur et un buveur, un ami des publicains et des gens de mauvaise vie. Mais la sagesse a été justifiée par ses œuvres.'
  - type: heading
    content: Reproches aux villes impénitentes
  - type: heading
    content: 'V. 20-24: cf. Lu 10:10-16; 12:47, 48.'
  '2':
  - type: text
    content: ' '
  - type: note
    content: Lu 7:18.
  - type: text
    content: 'Jean, ayant entendu parler dans sa prison des œuvres du Christ, lui fit dire par ses disciples: '
  '20':
  - type: text
    content: ' '
  - type: note
    content: Lu 10:13.
  - type: text
    content: Alors il se mit à faire des reproches aux villes dans lesquelles avaient eu lieu la plupart de ses miracles, parce qu’elles ne s’étaient pas repenties.
  '21':
  - type: text
    content: ' '
  - type: text
    content: Malheur à toi, Chorazin! Malheur à toi, Bethsaïda! Car, si les miracles qui ont été faits au milieu de vous avaient été faits dans Tyr et dans Sidon, il y a longtemps qu’elles se seraient repenties, en prenant
  - type: text
    content: ' '
  - type: note
    content: 2 S 13:19. 2 R 6:30; 19:1.
  - type: text
    content: le sac et la cendre.
  - type: text
    content: ' '
  '22':
  - type: note
    content: Mt 10:15.
  - type: text
    content: 'C’est pourquoi je vous le dis: au jour du jugement, Tyr et Sidon seront traitées moins rigoureusement que vous.'
  - type: text
    content: ' '
  '23':
  - type: text
    content: Et toi, Capernaüm, seras-tu élevée jusqu’au ciel? Non. Tu seras abaissée jusqu’au séjour des morts; car, si les miracles qui ont été faits au milieu de toi avaient été faits dans Sodome, elle subsisterait encore aujourd’hui.
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'C’est pourquoi je vous le dis:'
  - type: text
    content: ' '
  - type: note
    content: Mt 10:15.
  - type: text
    content: au jour du jugement, le pays de Sodome sera traité moins rigoureusement que toi.
  - type: heading
    content: Les choses révélées aux enfants. Aller à Jésus et accepter son joug
  - type: heading
    content: 'V. 25-30: cf. Lu 10:17-22; 1:51-53. 1 Co 1:26-29. És 55:1-3.'
  '25':
  - type: text
    content: ' '
  - type: note
    content: Lu 10:21.
  - type: text
    content: 'En ce temps-là, Jésus prit la parole, et dit: '
  - type: text
    content: Je te loue, Père, Seigneur du ciel et de la terre,
  - type: text
    content: ' '
  - type: note
    content: Jn 5:12. És 29:14. Lu 10:21. 1 Co 1:19; 2:7, 8.
  - type: text
    content: de ce que tu as caché ces choses aux sages et aux intelligents, et de ce que tu les as révélées aux enfants.
  '26':
  - type: text
    content: ' '
  - type: text
    content: Oui, Père, je te loue de ce que tu l’as voulu ainsi.
  - type: text
    content: ' '
  '27':
  - type: note
    content: Mt 28:18. Lu 10:22. Jn 3:35.
  - type: text
    content: Toutes choses m’ont été données par mon Père, et
  - type: text
    content: ' '
  - type: note
    content: Jn 1:18; 6:46.
  - type: text
    content: personne ne connaît le Fils, si ce n’est le Père; personne non plus ne connaît le Père, si ce n’est le Fils et celui à qui le Fils veut le révéler.
  - type: text
    content: ' '
  '28':
  - type: text
    content: Venez à moi, vous tous qui êtes fatigués et chargés, et je vous donnerai du repos.
  - type: text
    content: ' '
  '29':
  - type: text
    content: Prenez mon joug sur vous et recevez mes instructions, car je suis
  - type: text
    content: ' '
  - type: note
    content: Ps 45:5.
  - type: text
    content: doux et humble de cœur;
  - type: text
    content: ' '
  - type: note
    content: Jé 6:16.
  - type: text
    content: et vous trouverez du repos pour vos âmes.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Es-tu celui qui doit venir, ou devons-nous en attendre un autre? '
  '30':
  - type: note
    content: 1 Jn 5:3.
  - type: text
    content: Car mon joug est doux, et mon fardeau léger.
  '4':
  - type: text
    content: 'Jésus leur répondit: '
  - type: text
    content: 'Allez rapporter à Jean ce que vous entendez et ce que vous voyez:'
  - type: text
    content: ' '
  '5':
  - type: note
    content: És 29:18; 35:5; 61:1. Lu 4:18.
  - type: text
    content: les aveugles voient, les boiteux marchent, les lépreux sont purifiés, les sourds entendent, les morts ressuscitent, et la bonne nouvelle est annoncée aux pauvres.
  - type: text
    content: ' '
  '6':
  - type: text
    content: Heureux celui pour qui je ne serai pas une occasion de chute!
  - type: heading
    content: Témoignage sur Jean-Baptiste
  - type: heading
    content: 'V. 7-19: cf. Lu 7:24-35.'
  '7':
  - type: text
    content: ' '
  - type: note
    content: Lu 7:24.
  - type: text
    content: 'Comme ils s’en allaient, Jésus se mit à dire à la foule, au sujet de Jean: '
  - type: text
    content: Qu’êtes-vous allés voir au désert? Un roseau agité par le vent?
  '8':
  - type: text
    content: ' '
  - type: text
    content: Mais, qu’êtes-vous allés voir? Un homme vêtu d’habits précieux? Voici, ceux qui portent des habits précieux sont dans les maisons des rois.
  - type: text
    content: ' '
  '9':
  - type: text
    content: Qu’êtes-vous donc allés voir? Un prophète? Oui, vous dis-je, et plus qu’un prophète.
  - type: text
    content: ' '
