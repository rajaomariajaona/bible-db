document_id: DEU.24,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le divorce
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-4: cf. (Mt 5:31, 32; 19:3-9.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Lorsqu’un homme aura pris et épousé une femme qui viendrait à ne pas trouver grâce à ses yeux, parce qu’il a découvert en elle quelque chose de honteux, il écrira pour elle '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 5:31
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 19:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 10:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'une lettre de divorce, et, après la lui avoir remise en main, il la renverra de sa maison. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Si tu fais à ton prochain un prêt quelconque, tu n’entreras point dans sa maison pour te saisir de son gage; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'tu resteras dehors, et celui à qui tu fais le prêt t’apportera le gage dehors. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Si cet homme est pauvre, tu ne te coucheras point, en retenant son gage; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'tu le lui '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 22:26
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'rendras au coucher du soleil, afin qu’il couche dans son vêtement et qu’il te bénisse; et cela te sera imputé à justice devant l’Éternel, ton Dieu. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Tu '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 19:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ja 5:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'n’opprimeras point le mercenaire, pauvre et indigent, qu’il soit l’un de tes frères, ou l’un des étrangers demeurant dans ton pays, dans tes portes. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Tu lui donneras le salaire de sa journée avant le coucher du soleil; car il est pauvre, et il lui tarde de le recevoir. Sans cela, il crierait à l’Éternel contre toi, et tu te chargerais d’un péché. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'On ne fera point mourir les pères '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 14:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 25:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 31:30
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 18:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'pour les enfants, et l’on ne fera point mourir les enfants pour les pères; on fera mourir chacun pour son péché. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Tu ne porteras point atteinte au droit de '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 22:21
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '22'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 22:22
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 1:23
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 5:28
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 22:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 22:29
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Za 7:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'l’étranger et de l’orphelin, et tu ne prendras point en gage le vêtement de la veuve. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Tu te souviendras que tu as été esclave en Égypte, et que l’Éternel, ton Dieu, t’a racheté; c’est pourquoi je te donne ces commandements à mettre en pratique.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 19-22: cf. Lé 19:9, 10. Ps 68:6.'
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Quand tu '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 19:9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 23:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'moissonneras ton champ, et que tu auras oublié une gerbe dans le champ, tu ne retourneras point la prendre: elle sera pour l’étranger, pour l’orphelin et pour la veuve, afin que l’Éternel, ton Dieu, te bénisse dans tout le travail de tes mains. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Elle sortira de chez lui, s’en ira, et pourra devenir la femme d’un autre homme. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Quand tu secoueras tes oliviers, tu ne cueilleras point ensuite les fruits restés aux branches: ils seront pour l’étranger, pour l’orphelin et pour la veuve. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Quand tu vendangeras ta vigne, tu ne cueilleras point ensuite les grappes qui y seront restées: elles seront pour l’étranger, pour l’orphelin et pour la veuve. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Tu te souviendras que tu as été esclave dans le pays d’Égypte; c’est pourquoi je te donne ces commandements à mettre en pratique.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Si ce dernier homme la prend en aversion, écrit pour elle une lettre de divorce, et, après la lui avoir remise en main, la renvoie de sa maison; ou bien, si ce dernier homme qui l’a prise pour femme vient à mourir, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: alors le premier mari qui l’avait renvoyée ne pourra pas la reprendre pour femme après qu’elle a été souillée, car c’est une abomination devant l’Éternel, et tu ne chargeras point de péché le pays que l’Éternel, ton Dieu, te donne pour héritage.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le nouveau marié exempté du service militaire. Les prêts sur gages. Le vol d’un homme. Les lépreux
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 5-9: cf. De 20:7. Ex 21:16. (Lé 13; 14.)'
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Lorsqu’un homme sera nouvellement '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 20:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'marié, il n’ira point à l’armée, et on ne lui imposera aucune charge; il sera exempté par raison de famille pendant un an, et il réjouira la femme qu’il a prise. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'On ne prendra point pour gage les deux meules, ni la meule de dessus; car ce serait prendre pour gage la vie même. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Si l’on trouve un homme qui ait '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 21:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'dérobé l’un de ses frères, l’un des enfants d’Israël, qui en ait fait son esclave ou qui l’ait vendu, ce voleur sera puni de mort. Tu ôteras ainsi le mal du milieu de toi. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Prends garde à la plaie de la lèpre, afin de bien observer et de faire tout ce que vous enseigneront les sacrificateurs, les Lévites; vous aurez soin d’agir d’après les ordres '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 13:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'que je leur ai donnés. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Souviens-toi de ce que l’Éternel, ton Dieu, fit à '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 12:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Marie pendant la route, lors de votre sortie d’Égypte.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les mercenaires. Les droits de l’étranger, de l’orphelin et de la veuve
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 10-18: cf. Ex 22:26, 27, 21-24. (Lé 19:13. Ja 5:4. Mal 3:5.) Ps 146:7, 9.'
    marker-yv: yv-h
