document_id: DAN.10
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vision de l’ange annonçant les événements derniers
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: '10 v. 1 à 11 v. 20: cf. Ap 1:12-18.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La troisième année de Cyrus, roi de Perse, une parole fut révélée à Daniel, qu’on nommait Beltschatsar. Cette parole, qui est véritable, annonce une grande calamité. Il fut attentif à cette parole, et il eut l’intelligence de la vision. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'En ce temps-là, moi, Daniel, je fus trois semaines dans le deuil. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Je ne mangeai aucun mets délicat, il n’entra ni viande ni vin dans ma bouche, et je ne m’oignis point jusqu’à ce que les trois semaines fussent accomplies. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Le vingt-quatrième jour du premier mois, j’étais au bord du grand fleuve qui est '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 2:14
      metadata:
        usfm: GEN.2.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Hiddékel. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Je levai les yeux, je regardai, et voici, il y avait un homme vêtu de lin, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 1:13
      metadata:
        usfm: REV.1.13
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '14'
      metadata:
        usfm: REV.1.14
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '15'
      metadata:
        usfm: REV.1.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ayant sur les reins une ceinture d’or d’Uphaz. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Son corps était comme de chrysolithe, son visage brillait comme l’éclair, ses yeux étaient comme des flammes de feu, ses bras et ses pieds ressemblaient à de l’airain poli, et le son de sa voix était comme le bruit d’une multitude. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Moi, Daniel, je vis seul la vision, et les hommes qui étaient avec moi ne la virent point, mais ils furent saisis d’une grande frayeur, et ils prirent la fuite pour se cacher. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Je restai seul, et je vis cette grande vision; les forces me manquèrent, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Da 7:28
      metadata:
        usfm: DAN.7.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'mon visage changea de couleur et fut décomposé, et je perdis toute vigueur. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'J’entendis le son de ses paroles; et comme j’entendais le son de ses paroles, je tombai frappé d’étourdissement, la face contre terre. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Et voici, une main me toucha, et secoua mes genoux et mes mains. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Puis il me dit: Daniel, homme bien-aimé, sois attentif aux paroles que je vais te dire, et tiens-toi debout à la place où tu es; car je suis maintenant envoyé vers toi. Lorsqu’il m’eut ainsi parlé, je me tins debout en tremblant. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il me dit: Daniel, ne crains rien; car dès le premier jour où tu as eu à cœur de comprendre, et de t’humilier devant ton Dieu, tes paroles ont été entendues, et c’est à cause de tes paroles que je viens. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Le chef du royaume de Perse m’a résisté vingt et un jours; mais voici, Micaël, l’un des principaux chefs, est venu à mon secours, et je suis demeuré là auprès des rois de Perse. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Je viens maintenant pour te faire connaître ce qui doit arriver à ton peuple dans la suite des temps; car la vision concerne encore ces temps-là. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tandis qu’il m’adressait ces paroles, je dirigeai mes regards vers la terre, et je gardai le silence. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Et voici, quelqu’un qui avait l’apparence des fils de l’homme toucha mes lèvres. J’ouvris la bouche, je parlai, et je dis à celui qui se tenait devant moi: Mon seigneur, la vision m’a rempli d’effroi, et j’ai perdu toute vigueur. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Comment le serviteur de mon seigneur pourrait-il parler à mon seigneur? Maintenant les forces me manquent, et je n’ai plus de souffle. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Alors celui qui avait l’apparence d’un homme me toucha de nouveau, et me fortifia. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Puis il me dit: Ne crains rien, homme bien-aimé, que la paix soit avec toi! Courage, courage! Et comme il me parlait, je repris des forces, et je dis: Que mon seigneur parle, car tu m’as fortifié. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Il me dit: Sais-tu pourquoi je suis venu vers toi? Maintenant je m’en retourne pour combattre le chef de la Perse; et quand je partirai, voici, le chef de Javan viendra. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Mais je veux te faire connaître ce qui est écrit dans le livre de la vérité. Personne ne m’aide contre ceux-là, excepté Micaël, votre chef.
