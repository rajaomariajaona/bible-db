document_id: JAS.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La modération dans l’usage de la parole
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-12: cf. (Pr 10:19; 13:3; 18:21. Ro 3:13, 14.) (Mt 15:18-20; 12:33-37.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Mes frères, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 23:8
      metadata:
        usfm: MAT.23.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qu’il n’y ait pas parmi vous un grand nombre de personnes qui se mettent à enseigner, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 7:1
      metadata:
        usfm: MAT.7.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 6:37
      metadata:
        usfm: LUK.6.37
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'car vous savez que nous serons jugés plus sévèrement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nous bronchons tous de plusieurs manières. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 34:14
      metadata:
        usfm: PSA.34.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ja 1:26
      metadata:
        usfm: JAS.1.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Si quelqu’un ne bronche point en paroles, c’est un homme parfait, capable de tenir tout son corps en bride. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Si nous mettons le mors dans la bouche des chevaux pour qu’ils nous obéissent, nous dirigeons aussi leur corps tout entier. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Voici, même les navires, qui sont si grands et que poussent des vents impétueux, sont dirigés par un très petit gouvernail, au gré du pilote. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 12:18
      metadata:
        usfm: PRO.12.18
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 15:2
      metadata:
        usfm: PRO.15.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'De même, la langue est un petit membre, et elle se vante de grandes choses. Voici, comme un petit feu peut embraser une grande forêt! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'La langue aussi est un feu; c’est le monde de l’iniquité. La langue est placée parmi nos membres, souillant tout le corps, et enflammant le cours de la vie, étant elle-même enflammée par la géhenne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Toutes les espèces de bêtes et d’oiseaux, de reptiles et d’animaux marins, sont domptés et ont été domptés par la nature humaine; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'mais la langue, aucun homme ne peut la dompter; c’est un mal qu’on ne peut réprimer; elle est pleine d’un venin mortel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Par elle nous bénissons le Seigneur notre Père, et par elle nous maudissons les hommes '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 1:27
      metadata:
        usfm: GEN.1.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'faits à l’image de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'De la même bouche sortent la bénédiction et la malédiction. Il ne faut pas, mes frères, qu’il en soit ainsi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'La source fait-elle jaillir par la même ouverture l’eau douce et l’eau amère? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Un figuier, mes frères, peut-il produire des olives, ou une vigne des figues? De l’eau salée ne peut pas non plus produire de l’eau douce.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La sagesse qui vient d’en haut
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 13-18: cf. Ép 4:1-3. 1 Co 3:3. (1 Pi 3:4, 8-12. Ro 14:19.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Lequel d’entre vous est sage et intelligent? '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 5:8
      metadata:
        usfm: EPH.5.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Qu’il montre ses œuvres par une bonne conduite avec la douceur de la sagesse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 13:13
      metadata:
        usfm: ROM.13.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Mais si vous avez dans votre cœur un zèle amer et un esprit de dispute, ne vous glorifiez pas et ne mentez pas contre la vérité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 2:6
      metadata:
        usfm: 1CO.2.6
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '7'
      metadata:
        usfm: 1CO.2.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Cette sagesse n’est point celle qui vient d’en haut; mais elle est terrestre, charnelle, diabolique. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 3:3
      metadata:
        usfm: 1CO.3.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 5:20
      metadata:
        usfm: GAL.5.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Car là où il y a un zèle amer et un esprit de dispute, il y a du désordre et toutes sortes de mauvaises actions. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'La sagesse d’en haut est premièrement pure, ensuite pacifique, modérée, conciliante, pleine de miséricorde et de bons fruits, exempte de duplicité, d’hypocrisie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Le fruit de la justice est semé dans la paix par ceux qui recherchent la paix.
