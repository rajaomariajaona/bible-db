document_id: JAS.3,93
type_code: fra
verses:
  '1':
  - type: heading
    content: La modération dans l’usage de la parole
  - type: heading
    content: 'V. 1-12: cf. (Pr 10:19; 13:3; 18:21. Ro 3:13, 14.) (Mt 15:18-20; 12:33-37.)'
  - type: text
    content: 'Mes frères, '
  - type: note
    content: Mt 23:8.
  - type: text
    content: 'qu’il n’y ait pas parmi vous un grand nombre de personnes qui se mettent à enseigner, '
  - type: note
    content: Mt 7:1. Lu 6:37.
  - type: text
    content: 'car vous savez que nous serons jugés plus sévèrement. '
  '10':
  - type: text
    content: 'De la même bouche sortent la bénédiction et la malédiction. Il ne faut pas, mes frères, qu’il en soit ainsi. '
  '11':
  - type: text
    content: 'La source fait-elle jaillir par la même ouverture l’eau douce et l’eau amère? '
  '12':
  - type: text
    content: Un figuier, mes frères, peut-il produire des olives, ou une vigne des figues? De l’eau salée ne peut pas non plus produire de l’eau douce.
  - type: heading
    content: La sagesse qui vient d’en haut
  - type: heading
    content: 'V. 13-18: cf. Ép 4:1-3. 1 Co 3:3. (1 Pi 3:4, 8-12. Ro 14:19.)'
  '13':
  - type: text
    content: 'Lequel d’entre vous est sage et intelligent? '
  - type: note
    content: Ép 5:8.
  - type: text
    content: 'Qu’il montre ses œuvres par une bonne conduite avec la douceur de la sagesse. '
  '14':
  - type: note
    content: Ro 13:13.
  - type: text
    content: 'Mais si vous avez dans votre cœur un zèle amer et un esprit de dispute, ne vous glorifiez pas et ne mentez pas contre la vérité. '
  '15':
  - type: note
    content: 1 Co 2:6, 7.
  - type: text
    content: 'Cette sagesse n’est point celle qui vient d’en haut; mais elle est terrestre, charnelle, diabolique. '
  '16':
  - type: note
    content: 1 Co 3:3. Ga 5:20.
  - type: text
    content: 'Car là où il y a un zèle amer et un esprit de dispute, il y a du désordre et toutes sortes de mauvaises actions. '
  '17':
  - type: text
    content: 'La sagesse d’en haut est premièrement pure, ensuite pacifique, modérée, conciliante, pleine de miséricorde et de bons fruits, exempte de duplicité, d’hypocrisie. '
  '18':
  - type: text
    content: Le fruit de la justice est semé dans la paix par ceux qui recherchent la paix.
  '2':
  - type: text
    content: 'Nous bronchons tous de plusieurs manières. '
  - type: note
    content: Ps 34:14. Ja 1:26.
  - type: text
    content: 'Si quelqu’un ne bronche point en paroles, c’est un homme parfait, capable de tenir tout son corps en bride. '
  '3':
  - type: text
    content: 'Si nous mettons le mors dans la bouche des chevaux pour qu’ils nous obéissent, nous dirigeons aussi leur corps tout entier. '
  '4':
  - type: text
    content: 'Voici, même les navires, qui sont si grands et que poussent des vents impétueux, sont dirigés par un très petit gouvernail, au gré du pilote. '
  '5':
  - type: note
    content: Pr 12:18; 15:2.
  - type: text
    content: 'De même, la langue est un petit membre, et elle se vante de grandes choses. Voici, comme un petit feu peut embraser une grande forêt! '
  '6':
  - type: text
    content: 'La langue aussi est un feu; c’est le monde de l’iniquité. La langue est placée parmi nos membres, souillant tout le corps, et enflammant le cours de la vie, étant elle-même enflammée par la géhenne. '
  '7':
  - type: text
    content: 'Toutes les espèces de bêtes et d’oiseaux, de reptiles et d’animaux marins, sont domptés et ont été domptés par la nature humaine; '
  '8':
  - type: text
    content: 'mais la langue, aucun homme ne peut la dompter; c’est un mal qu’on ne peut réprimer; elle est pleine d’un venin mortel. '
  '9':
  - type: text
    content: 'Par elle nous bénissons le Seigneur notre Père, et par elle nous maudissons les hommes '
  - type: note
    content: Ge 1:27.
  - type: text
    content: 'faits à l’image de Dieu. '
