document_id: SNG.5,93
type_code: fra
verses:
  '1':
  - type: text
    content: J’entre dans mon jardin, ma sœur, ma fiancée;
  - type: text
    content: Je cueille ma myrrhe avec mes aromates,
  - type: text
    content: Je mange mon rayon de miel avec mon miel,
  - type: text
    content: Je bois mon vin avec mon lait…
  - type: text
    content: 'Mangez, '
  - type: note
    content: És 41:8. Ja 2:23.
  - type: text
    content: amis, buvez, enivrez-vous d’amour!
  - type: heading
    content: '5 v. 2 à 6 v. 3: cf. (Ap 3:20. 2 Co 7:10.) Ca 3:1-4.'
  '10':
  - type: text
    content: Mon bien-aimé est blanc et vermeil;
  - type: text
    content: Il se distingue entre dix mille.
  '11':
  - type: text
    content: Sa tête est de l’or pur;
  - type: text
    content: Ses boucles sont flottantes,
  - type: text
    content: Noires comme le corbeau.
  '12':
  - type: text
    content: ' '
  - type: note
    content: Ca 1:15; 4:1.
  - type: text
    content: Ses yeux sont comme des colombes au bord des ruisseaux,
  - type: text
    content: Se baignant dans le lait,
  - type: text
    content: Reposant au sein de l’abondance.
  '13':
  - type: text
    content: Ses joues sont comme un parterre d’aromates,
  - type: text
    content: Une couche de plantes odorantes;
  - type: text
    content: Ses lèvres sont des lis,
  - type: text
    content: D’où découle la myrrhe.
  '14':
  - type: text
    content: Ses mains sont des anneaux d’or,
  - type: text
    content: Garnis de chrysolithes;
  - type: text
    content: Son corps est de l’ivoire poli,
  - type: text
    content: Couvert de saphirs;
  '15':
  - type: text
    content: Ses jambes sont des colonnes de marbre blanc,
  - type: text
    content: Posées sur des bases d’or pur.
  - type: text
    content: Son aspect est comme le Liban,
  - type: text
    content: Distingué comme les cèdres.
  '16':
  - type: text
    content: Son palais n’est que douceur,
  - type: text
    content: Et toute sa personne est pleine de charme.
  - type: text
    content: Tel est mon bien-aimé, tel est mon ami,
  - type: text
    content: Filles de Jérusalem!
  '2':
  - type: text
    content: J’étais endormie, mais mon cœur veillait…
  - type: text
    content: 'C’est la voix de mon bien-aimé, qui frappe:'
  - type: text
    content: Ouvre-moi, ma sœur, mon amie,
  - type: text
    content: Ma colombe, ma parfaite!
  - type: text
    content: Car ma tête est couverte de rosée,
  - type: text
    content: Mes boucles sont pleines des gouttes de la nuit.
  '3':
  - type: text
    content: J’ai ôté ma tunique; comment la remettrais-je?
  - type: text
    content: J’ai lavé mes pieds; comment les salirais-je?
  '4':
  - type: text
    content: Mon bien-aimé a passé la main par la fenêtre,
  - type: text
    content: Et mes entrailles se sont émues pour lui.
  '5':
  - type: text
    content: Je me suis levée pour ouvrir à mon bien-aimé;
  - type: text
    content: Et de mes mains a dégoutté la myrrhe,
  - type: text
    content: De mes doigts, la myrrhe répandue
  - type: text
    content: Sur la poignée du verrou.
  '6':
  - type: text
    content: J’ai ouvert à mon bien-aimé;
  - type: text
    content: Mais mon bien-aimé s’en était allé, il avait disparu.
  - type: text
    content: J’étais hors de moi, quand il me parlait.
  - type: note
    content: Ca 3:1.
  - type: text
    content: Je l’ai cherché, et je ne l’ai point trouvé;
  - type: text
    content: Je l’ai appelé, et il ne m’a point répondu.
  '7':
  - type: text
    content: Les gardes qui font la ronde dans la ville m’ont rencontrée;
  - type: text
    content: Ils m’ont frappée, ils m’ont blessée;
  - type: text
    content: Ils m’ont enlevé mon voile, les gardes des murs.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Ca 3:5.
  - type: text
    content: Je vous en conjure, filles de Jérusalem,
  - type: text
    content: Si vous trouvez mon bien-aimé,
  - type: text
    content: Que lui direz-vous?…
  - type: text
    content: Que je suis malade d’amour.
  '9':
  - type: text
    content: Qu’a ton bien-aimé de plus qu’un autre,
  - type: text
    content: O la plus belle des femmes?
  - type: text
    content: Qu’a ton bien-aimé de plus qu’un autre,
  - type: text
    content: Pour que tu nous conjures ainsi?
