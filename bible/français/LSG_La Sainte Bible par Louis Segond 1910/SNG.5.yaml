document_id: SNG.5,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: J’entre dans mon jardin, ma sœur, ma fiancée;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je cueille ma myrrhe avec mes aromates,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je mange mon rayon de miel avec mon miel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je bois mon vin avec mon lait…
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mangez, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 41:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ja 2:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: amis, buvez, enivrez-vous d’amour!
  - type: usfm
    marker: r
    children:
    - type: text
      text: '5 v. 2 à 6 v. 3: cf. (Ap 3:20. 2 Co 7:10.) Ca 3:1-4.'
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Mon bien-aimé est blanc et vermeil;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il se distingue entre dix mille.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Sa tête est de l’or pur;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses boucles sont flottantes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Noires comme le corbeau.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ca 1:15
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 4:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ses yeux sont comme des colombes au bord des ruisseaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Se baignant dans le lait,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Reposant au sein de l’abondance.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ses joues sont comme un parterre d’aromates,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Une couche de plantes odorantes;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses lèvres sont des lis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: D’où découle la myrrhe.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ses mains sont des anneaux d’or,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Garnis de chrysolithes;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Son corps est de l’ivoire poli,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Couvert de saphirs;
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ses jambes sont des colonnes de marbre blanc,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Posées sur des bases d’or pur.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Son aspect est comme le Liban,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Distingué comme les cèdres.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Son palais n’est que douceur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et toute sa personne est pleine de charme.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tel est mon bien-aimé, tel est mon ami,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Filles de Jérusalem!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: J’étais endormie, mais mon cœur veillait…
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'C’est la voix de mon bien-aimé, qui frappe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ouvre-moi, ma sœur, mon amie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ma colombe, ma parfaite!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car ma tête est couverte de rosée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes boucles sont pleines des gouttes de la nuit.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: J’ai ôté ma tunique; comment la remettrais-je?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai lavé mes pieds; comment les salirais-je?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Mon bien-aimé a passé la main par la fenêtre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et mes entrailles se sont émues pour lui.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Je me suis levée pour ouvrir à mon bien-aimé;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et de mes mains a dégoutté la myrrhe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De mes doigts, la myrrhe répandue
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur la poignée du verrou.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: J’ai ouvert à mon bien-aimé;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais mon bien-aimé s’en était allé, il avait disparu.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’étais hors de moi, quand il me parlait.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ca 3:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Je l’ai cherché, et je ne l’ai point trouvé;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je l’ai appelé, et il ne m’a point répondu.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Les gardes qui font la ronde dans la ville m’ont rencontrée;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils m’ont frappée, ils m’ont blessée;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils m’ont enlevé mon voile, les gardes des murs.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ca 3:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Je vous en conjure, filles de Jérusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si vous trouvez mon bien-aimé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que lui direz-vous?…
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que je suis malade d’amour.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Qu’a ton bien-aimé de plus qu’un autre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O la plus belle des femmes?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’a ton bien-aimé de plus qu’un autre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour que tu nous conjures ainsi?
