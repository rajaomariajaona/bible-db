document_id: MIC.4
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Promesses de restauration
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-5: cf. És 2:2-5; 60:1, etc.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Il arrivera, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: És 2:2, etc.
    marker-yv: yv-n
  - type: text
    text: dans la suite des temps,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que la montagne de la maison de l’Éternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sera fondée sur le sommet des montagnes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’elle s’élèvera par-dessus les collines,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que les peuples y afflueront.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Des nations s’y rendront en foule, et diront:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Venez, et montons à la montagne de l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A la maison du Dieu de Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afin qu’il nous enseigne ses voies,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que nous marchions dans ses sentiers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car de Sion sortira la loi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et de Jérusalem la parole de l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Il sera le juge d’un grand nombre de peuples,
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’arbitre de nations puissantes, lointaines.
- type: usfm
  marker: q1
  children:
  - type: text
    text: De leurs glaives ils forgeront des hoyaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et de leurs lances des serpes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Une nation ne tirera plus l’épée contre une autre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et l’on n’apprendra plus la guerre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ils habiteront chacun sous sa '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 4:25
      metadata:
        usfm: 1KI.4.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: vigne et sous son figuier,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il n’y aura personne pour les troubler;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car la bouche de l’Éternel des armées a parlé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tandis que tous les peuples marchent, chacun au nom de son dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous marcherons, nous, au nom de l’Éternel, notre Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A toujours et à perpétuité.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 6-8: cf. (Jé 30:18-22. Éz 34:12-16.) Za 9:9, 10.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'En ce jour-là, dit l’Éternel, je '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 30:3
      metadata:
        usfm: DEU.30.3
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '4'
      metadata:
        usfm: DEU.30.4
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '5'
      metadata:
        usfm: DEU.30.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: recueillerai les boiteux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je rassemblerai ceux qui étaient chassés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ceux que j’avais maltraités.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: So 3:19
      metadata:
        usfm: ZEP.3.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Des boiteux je ferai un reste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De ceux qui étaient chassés une nation puissante;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et l’Éternel '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Da 7:14
      metadata:
        usfm: DAN.7.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 1:33
      metadata:
        usfm: LUK.1.33
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: régnera sur eux, à la montagne de Sion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dès lors et pour toujours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Et toi, tour du troupeau, colline de la fille de Sion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A toi viendra, à toi arrivera l’ancienne domination,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le royaume de la fille de Jérusalem.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Captivité et délivrance
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 9-14: cf. Jé 29:10-14. Za 12:2-6.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Pourquoi maintenant pousses-tu des cris?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'N’as-tu point de '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 8:19
      metadata:
        usfm: JER.8.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: roi, plus de conseiller,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour que la douleur te saisisse comme une femme qui accouche?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fille de Sion, souffre et gémis comme une femme qui accouche!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car maintenant tu sortiras de la ville et tu habiteras dans les champs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tu iras jusqu’à Babylone;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Là tu seras délivrée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est là que l’Éternel te rachètera de la main de tes ennemis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Maintenant plusieurs nations se sont rassemblées contre toi:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’elle soit profanée, disent-elles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que nos yeux se rassasient dans Sion!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mais elles ne connaissent pas les pensées de l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elles ne comprennent pas ses desseins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Elles ignorent qu’il les a rassemblées comme des gerbes dans '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 51:33
      metadata:
        usfm: JER.51.33
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: l’aire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Fille de Sion, lève-toi et foule!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je te ferai une corne de fer et des ongles d’airain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tu broieras des peuples nombreux;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu consacreras leurs biens à l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Leurs richesses au '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Za 4:14
      metadata:
        usfm: ZEC.4.14
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 6:5
      metadata:
        usfm: ZEC.6.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Seigneur de toute la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Maintenant, fille de troupes, rassemble tes troupes!
- type: usfm
  marker: q1
  children:
  - type: text
    text: On nous assiège;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avec la verge on frappe sur la joue le juge d’Israël.
