document_id: MIC.4,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Promesses de restauration
  - type: heading
    content: 'V. 1-5: cf. És 2:2-5; 60:1, etc.'
  - type: text
    content: 'Il arrivera, '
  - type: note
    content: És 2:2, etc.
  - type: text
    content: dans la suite des temps,
  - type: text
    content: Que la montagne de la maison de l’Éternel
  - type: text
    content: Sera fondée sur le sommet des montagnes,
  - type: text
    content: Qu’elle s’élèvera par-dessus les collines,
  - type: text
    content: Et que les peuples y afflueront.
  '10':
  - type: text
    content: Fille de Sion, souffre et gémis comme une femme qui accouche!
  - type: text
    content: Car maintenant tu sortiras de la ville et tu habiteras dans les champs,
  - type: text
    content: Et tu iras jusqu’à Babylone;
  - type: text
    content: Là tu seras délivrée,
  - type: text
    content: C’est là que l’Éternel te rachètera de la main de tes ennemis.
  '11':
  - type: text
    content: 'Maintenant plusieurs nations se sont rassemblées contre toi:'
  - type: text
    content: Qu’elle soit profanée, disent-elles,
  - type: text
    content: Et que nos yeux se rassasient dans Sion!
  '12':
  - type: text
    content: Mais elles ne connaissent pas les pensées de l’Éternel,
  - type: text
    content: Elles ne comprennent pas ses desseins,
  - type: text
    content: 'Elles ignorent qu’il les a rassemblées comme des gerbes dans '
  - type: note
    content: Jé 51:33.
  - type: text
    content: l’aire.
  '13':
  - type: text
    content: Fille de Sion, lève-toi et foule!
  - type: text
    content: Je te ferai une corne de fer et des ongles d’airain,
  - type: text
    content: Et tu broieras des peuples nombreux;
  - type: text
    content: Tu consacreras leurs biens à l’Éternel,
  - type: text
    content: 'Leurs richesses au '
  - type: note
    content: Za 4:14; 6:5.
  - type: text
    content: Seigneur de toute la terre.
  '14':
  - type: text
    content: Maintenant, fille de troupes, rassemble tes troupes!
  - type: text
    content: On nous assiège;
  - type: text
    content: Avec la verge on frappe sur la joue le juge d’Israël.
  '2':
  - type: text
    content: 'Des nations s’y rendront en foule, et diront:'
  - type: text
    content: Venez, et montons à la montagne de l’Éternel,
  - type: text
    content: A la maison du Dieu de Jacob,
  - type: text
    content: Afin qu’il nous enseigne ses voies,
  - type: text
    content: Et que nous marchions dans ses sentiers.
  - type: text
    content: Car de Sion sortira la loi,
  - type: text
    content: Et de Jérusalem la parole de l’Éternel.
  '3':
  - type: text
    content: Il sera le juge d’un grand nombre de peuples,
  - type: text
    content: L’arbitre de nations puissantes, lointaines.
  - type: text
    content: De leurs glaives ils forgeront des hoyaux,
  - type: text
    content: Et de leurs lances des serpes;
  - type: text
    content: Une nation ne tirera plus l’épée contre une autre,
  - type: text
    content: Et l’on n’apprendra plus la guerre.
  '4':
  - type: text
    content: 'Ils habiteront chacun sous sa '
  - type: note
    content: 1 R 4:25.
  - type: text
    content: vigne et sous son figuier,
  - type: text
    content: Et il n’y aura personne pour les troubler;
  - type: text
    content: Car la bouche de l’Éternel des armées a parlé.
  '5':
  - type: text
    content: Tandis que tous les peuples marchent, chacun au nom de son dieu,
  - type: text
    content: Nous marcherons, nous, au nom de l’Éternel, notre Dieu,
  - type: text
    content: A toujours et à perpétuité.
  - type: heading
    content: 'V. 6-8: cf. (Jé 30:18-22. Éz 34:12-16.) Za 9:9, 10.'
  '6':
  - type: text
    content: 'En ce jour-là, dit l’Éternel, je '
  - type: note
    content: De 30:3, 4, 5.
  - type: text
    content: recueillerai les boiteux,
  - type: text
    content: Je rassemblerai ceux qui étaient chassés,
  - type: text
    content: Ceux que j’avais maltraités.
  '7':
  - type: text
    content: ' '
  - type: note
    content: So 3:19.
  - type: text
    content: Des boiteux je ferai un reste,
  - type: text
    content: De ceux qui étaient chassés une nation puissante;
  - type: text
    content: 'Et l’Éternel '
  - type: note
    content: Da 7:14. Lu 1:33.
  - type: text
    content: régnera sur eux, à la montagne de Sion,
  - type: text
    content: Dès lors et pour toujours.
  '8':
  - type: text
    content: Et toi, tour du troupeau, colline de la fille de Sion,
  - type: text
    content: A toi viendra, à toi arrivera l’ancienne domination,
  - type: text
    content: Le royaume de la fille de Jérusalem.
  - type: heading
    content: Captivité et délivrance
  - type: heading
    content: 'V. 9-14: cf. Jé 29:10-14. Za 12:2-6.'
  '9':
  - type: text
    content: Pourquoi maintenant pousses-tu des cris?
  - type: text
    content: 'N’as-tu point de '
  - type: note
    content: Jé 8:19.
  - type: text
    content: roi, plus de conseiller,
  - type: text
    content: Pour que la douleur te saisisse comme une femme qui accouche?
