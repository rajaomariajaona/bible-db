document_id: DEU.11,93
type_code: fra
verses:
  '1':
  - type: heading
    content: La bénédiction et la malédiction
  - type: heading
    content: 'V. 1-17: cf. De 8; 28:1-24.'
  - type: text
    content: 'Tu aimeras l’Éternel, ton Dieu, et tu observeras toujours ses préceptes, ses lois, ses ordonnances et ses commandements. '
  '10':
  - type: text
    content: 'Car le pays dont tu vas entrer en possession, n’est pas comme le pays d’Égypte, d’où vous êtes sortis, où tu jetais dans les champs ta semence et les arrosais avec ton pied comme un jardin potager. '
  '11':
  - type: text
    content: 'Le pays que vous allez posséder est un pays de montagnes et de vallées, et qui boit les eaux de la pluie du ciel; '
  '12':
  - type: text
    content: 'c’est un pays dont l’Éternel, ton Dieu, prend soin, et sur lequel l’Éternel, ton Dieu, a continuellement les yeux, du commencement à la fin de l’année. '
  '13':
  - type: text
    content: 'Si vous obéissez à mes commandements que je vous prescris aujourd’hui, si vous aimez l’Éternel, votre Dieu, et si vous le servez de tout votre cœur et de toute votre âme, '
  '14':
  - type: text
    content: 'je donnerai à votre pays la pluie en son temps, la pluie de la première et de l’arrière-saison, et tu recueilleras ton blé, ton moût et ton huile; '
  '15':
  - type: text
    content: 'je mettrai aussi dans tes champs de l’herbe pour ton bétail, et tu mangeras et te rassasieras. '
  '16':
  - type: text
    content: 'Gardez-vous de laisser séduire votre cœur, de vous '
  - type: note
    content: De 8:19.
  - type: text
    content: 'détourner, de servir d’autres dieux et de vous prosterner devant eux. '
  '17':
  - type: text
    content: La colère de l’Éternel s’enflammerait alors contre vous; il fermerait les cieux, et il n’y aurait point de pluie; la terre ne donnerait plus ses produits, et vous péririez promptement dans le bon pays que l’Éternel vous donne.
  - type: heading
    content: 'V. 18-25: cf. De 6:4-9. Ex 23:22-33.'
  '18':
  - type: text
    content: ' '
  - type: note
    content: De 6:6, 8.
  - type: text
    content: 'Mettez dans votre cœur et dans votre âme ces paroles que je vous dis. Vous les lierez comme un signe sur vos mains, et elles seront comme des fronteaux entre vos yeux. '
  '19':
  - type: note
    content: De 4:9; 6:7.
  - type: text
    content: 'Vous les enseignerez à vos enfants, et vous leur en parlerez quand tu seras dans ta maison, quand tu iras en voyage, quand tu te coucheras et quand tu te lèveras. '
  '2':
  - type: text
    content: 'Reconnaissez aujourd’hui – ce que n’ont pu connaître et voir vos enfants – les châtiments de l’Éternel, votre Dieu, sa grandeur, sa main forte et son bras étendu, '
  '20':
  - type: text
    content: 'Tu les écriras sur les poteaux de ta maison et sur tes portes. '
  '21':
  - type: text
    content: 'Et alors vos jours et les jours de vos enfants, dans le pays que l’Éternel a juré à vos pères de leur donner, seront aussi nombreux que les jours des cieux le seront au-dessus de la terre. '
  '22':
  - type: text
    content: 'Car si vous observez tous ces commandements que je vous prescris, et si vous les mettez en pratique pour aimer l’Éternel, votre Dieu, pour marcher dans toutes ses voies et pour vous attacher à lui, '
  '23':
  - type: text
    content: 'l’Éternel chassera devant vous toutes ces nations, et vous vous rendrez maîtres de nations plus grandes et plus puissantes que vous. '
  '24':
  - type: text
    content: 'Tout lieu '
  - type: note
    content: Jos 1:3; 14:9.
  - type: text
    content: 'que foulera la plante de votre pied sera à vous: votre frontière s’étendra du désert au Liban, et du fleuve de l’Euphrate jusqu’à la mer occidentale. '
  '25':
  - type: text
    content: 'Nul ne tiendra contre vous. L’Éternel, votre Dieu, répandra, '
  - type: note
    content: Ex 23:27.
  - type: text
    content: comme il vous l’a dit, la frayeur et la crainte de toi sur tout le pays où vous marcherez.
  - type: heading
    content: 'V. 26-32: cf. De 27:11-26; 30:15-20. Mt 7:24-27.'
  '26':
  - type: text
    content: 'Vois, je mets aujourd’hui devant vous la bénédiction et la malédiction: '
  '27':
  - type: text
    content: 'la bénédiction, si vous obéissez aux commandements de l’Éternel, votre Dieu, que je vous prescris en ce jour; '
  '28':
  - type: text
    content: 'la malédiction, si vous n’obéissez pas aux commandements de l’Éternel, votre Dieu, et si vous vous détournez de la voie que je vous prescris en ce jour, pour aller après d’autres dieux que vous ne connaissez point. '
  '29':
  - type: text
    content: 'Et lorsque l’Éternel, ton Dieu, t’aura fait entrer dans le pays dont tu vas prendre possession, '
  - type: note
    content: De 27:12. Jos 8:33.
  - type: text
    content: 'tu prononceras la bénédiction sur la montagne de Garizim, et '
  - type: note
    content: De 27:13.
  - type: text
    content: 'la malédiction sur la montagne d’Ébal. '
  '3':
  - type: text
    content: 'ses signes et ses actes qu’il a accomplis au milieu de l’Égypte contre Pharaon, roi d’Égypte, et contre tout son pays. '
  '30':
  - type: text
    content: 'Ces montagnes ne sont-elles pas de l’autre côté du Jourdain, derrière le chemin de l’occident, au pays des Cananéens qui habitent dans la plaine vis-à-vis de Guilgal, près des chênes de Moré? '
  '31':
  - type: text
    content: 'Car vous allez passer le Jourdain pour entrer en possession du pays que l’Éternel, votre Dieu, vous donne; vous le posséderez, et vous y habiterez. '
  '32':
  - type: text
    content: Vous observerez et vous mettrez en pratique toutes les lois et les ordonnances que je vous prescris aujourd’hui.
  '4':
  - type: text
    content: 'Reconnaissez ce qu’il a fait à l’armée d’Égypte, à ses chevaux et à ses chars, comment il a fait couler sur eux les eaux de la mer Rouge, lorsqu’ils vous poursuivaient, et les a détruits pour toujours; '
  '5':
  - type: text
    content: 'ce qu’il vous a fait dans le désert, jusqu’à votre arrivée en ce lieu; '
  '6':
  - type: text
    content: 'ce qu’il a fait '
  - type: note
    content: No 16:31; 27:3. Ps 106:17.
  - type: text
    content: 'à Dathan et à Abiram, fils d’Éliab, fils de Ruben, comment la terre ouvrit sa bouche et les engloutit, avec leurs maisons et leurs tentes et tout ce qui était à leur suite, au milieu de tout Israël. '
  '7':
  - type: text
    content: 'Car vos yeux ont vu toutes les grandes choses que l’Éternel a faites. '
  '8':
  - type: text
    content: 'Ainsi, vous observerez tous les commandements que je vous prescris aujourd’hui, afin que vous ayez la force de vous emparer du pays où vous allez passer pour en prendre possession, '
  '9':
  - type: text
    content: 'et afin que vous prolongiez vos jours dans le pays que l’Éternel a juré à vos pères de leur donner, à eux et à leur postérité, pays où coulent le lait et le miel. '
