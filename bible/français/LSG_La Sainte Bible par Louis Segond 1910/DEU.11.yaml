document_id: DEU.11
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La bénédiction et la malédiction
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-17: cf. De 8; 28:1-24.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tu aimeras l’Éternel, ton Dieu, et tu observeras toujours ses préceptes, ses lois, ses ordonnances et ses commandements. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Reconnaissez aujourd’hui – ce que n’ont pu connaître et voir vos enfants – les châtiments de l’Éternel, votre Dieu, sa grandeur, sa main forte et son bras étendu, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ses signes et ses actes qu’il a accomplis au milieu de l’Égypte contre Pharaon, roi d’Égypte, et contre tout son pays. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Reconnaissez ce qu’il a fait à l’armée d’Égypte, à ses chevaux et à ses chars, comment il a fait couler sur eux les eaux de la mer Rouge, lorsqu’ils vous poursuivaient, et les a détruits pour toujours; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'ce qu’il vous a fait dans le désert, jusqu’à votre arrivée en ce lieu; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'ce qu’il a fait '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 16:31
      metadata:
        usfm: NUM.16.31
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 27:3
      metadata:
        usfm: NUM.27.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 106:17
      metadata:
        usfm: PSA.106.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'à Dathan et à Abiram, fils d’Éliab, fils de Ruben, comment la terre ouvrit sa bouche et les engloutit, avec leurs maisons et leurs tentes et tout ce qui était à leur suite, au milieu de tout Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Car vos yeux ont vu toutes les grandes choses que l’Éternel a faites. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ainsi, vous observerez tous les commandements que je vous prescris aujourd’hui, afin que vous ayez la force de vous emparer du pays où vous allez passer pour en prendre possession, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'et afin que vous prolongiez vos jours dans le pays que l’Éternel a juré à vos pères de leur donner, à eux et à leur postérité, pays où coulent le lait et le miel. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Car le pays dont tu vas entrer en possession, n’est pas comme le pays d’Égypte, d’où vous êtes sortis, où tu jetais dans les champs ta semence et les arrosais avec ton pied comme un jardin potager. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Le pays que vous allez posséder est un pays de montagnes et de vallées, et qui boit les eaux de la pluie du ciel; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'c’est un pays dont l’Éternel, ton Dieu, prend soin, et sur lequel l’Éternel, ton Dieu, a continuellement les yeux, du commencement à la fin de l’année. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Si vous obéissez à mes commandements que je vous prescris aujourd’hui, si vous aimez l’Éternel, votre Dieu, et si vous le servez de tout votre cœur et de toute votre âme, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'je donnerai à votre pays la pluie en son temps, la pluie de la première et de l’arrière-saison, et tu recueilleras ton blé, ton moût et ton huile; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'je mettrai aussi dans tes champs de l’herbe pour ton bétail, et tu mangeras et te rassasieras. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Gardez-vous de laisser séduire votre cœur, de vous '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 8:19
      metadata:
        usfm: DEU.8.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'détourner, de servir d’autres dieux et de vous prosterner devant eux. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: La colère de l’Éternel s’enflammerait alors contre vous; il fermerait les cieux, et il n’y aurait point de pluie; la terre ne donnerait plus ses produits, et vous péririez promptement dans le bon pays que l’Éternel vous donne.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 18-25: cf. De 6:4-9. Ex 23:22-33.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 6:6
      metadata:
        usfm: DEU.6.6
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '8'
      metadata:
        usfm: DEU.6.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Mettez dans votre cœur et dans votre âme ces paroles que je vous dis. Vous les lierez comme un signe sur vos mains, et elles seront comme des fronteaux entre vos yeux. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 4:9
      metadata:
        usfm: DEU.4.9
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 6:7
      metadata:
        usfm: DEU.6.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Vous les enseignerez à vos enfants, et vous leur en parlerez quand tu seras dans ta maison, quand tu iras en voyage, quand tu te coucheras et quand tu te lèveras. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tu les écriras sur les poteaux de ta maison et sur tes portes. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Et alors vos jours et les jours de vos enfants, dans le pays que l’Éternel a juré à vos pères de leur donner, seront aussi nombreux que les jours des cieux le seront au-dessus de la terre. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Car si vous observez tous ces commandements que je vous prescris, et si vous les mettez en pratique pour aimer l’Éternel, votre Dieu, pour marcher dans toutes ses voies et pour vous attacher à lui, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'l’Éternel chassera devant vous toutes ces nations, et vous vous rendrez maîtres de nations plus grandes et plus puissantes que vous. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Tout lieu '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 1:3
      metadata:
        usfm: JOS.1.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 14:9
      metadata:
        usfm: JOS.14.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'que foulera la plante de votre pied sera à vous: votre frontière s’étendra du désert au Liban, et du fleuve de l’Euphrate jusqu’à la mer occidentale. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Nul ne tiendra contre vous. L’Éternel, votre Dieu, répandra, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 23:27
      metadata:
        usfm: EXO.23.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: comme il vous l’a dit, la frayeur et la crainte de toi sur tout le pays où vous marcherez.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 26-32: cf. De 27:11-26; 30:15-20. Mt 7:24-27.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Vois, je mets aujourd’hui devant vous la bénédiction et la malédiction: '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'la bénédiction, si vous obéissez aux commandements de l’Éternel, votre Dieu, que je vous prescris en ce jour; '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'la malédiction, si vous n’obéissez pas aux commandements de l’Éternel, votre Dieu, et si vous vous détournez de la voie que je vous prescris en ce jour, pour aller après d’autres dieux que vous ne connaissez point. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Et lorsque l’Éternel, ton Dieu, t’aura fait entrer dans le pays dont tu vas prendre possession, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 27:12
      metadata:
        usfm: DEU.27.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 8:33
      metadata:
        usfm: JOS.8.33
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'tu prononceras la bénédiction sur la montagne de Garizim, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 27:13
      metadata:
        usfm: DEU.27.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'la malédiction sur la montagne d’Ébal. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ces montagnes ne sont-elles pas de l’autre côté du Jourdain, derrière le chemin de l’occident, au pays des Cananéens qui habitent dans la plaine vis-à-vis de Guilgal, près des chênes de Moré? '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Car vous allez passer le Jourdain pour entrer en possession du pays que l’Éternel, votre Dieu, vous donne; vous le posséderez, et vous y habiterez. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Vous observerez et vous mettrez en pratique toutes les lois et les ordonnances que je vous prescris aujourd’hui.
