document_id: PHP.2,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-11: cf. Ro 12:10, 16; 15:1-7. (Mt 20:26-28. 2 Co 8:9. Ép 5:2.) (Col 1:15-20. Hé 1:1-4.)'
  - type: text
    content: 'Si donc il y a quelque consolation en Christ, s’il y a quelque soulagement dans la charité, s’il y a quelque union d’esprit, s’il y a quelque compassion et quelque miséricorde, '
  '10':
  - type: note
    content: És 45:23. Ro 14:11.
  - type: text
    content: 'afin qu’au nom de Jésus tout genou fléchisse dans les cieux, sur la terre et sous la terre, '
  '11':
  - type: note
    content: Jn 13:13. 1 Co 8:6; 12:3.
  - type: text
    content: et que toute langue confesse que Jésus-Christ est Seigneur, à la gloire de Dieu le Père.
  - type: heading
    content: 'V. 12-18: cf. 2 Pi 1:5-11. (1 Pi 2:9. Mt 5:14-16, 48.)'
  '12':
  - type: text
    content: 'Ainsi, mes bien-aimés, comme vous avez toujours obéi, travaillez à votre salut avec crainte et tremblement, non seulement comme en ma présence, mais bien plus encore maintenant que je suis absent; '
  '13':
  - type: note
    content: 2 Co 3:5.
  - type: text
    content: 'car c’est Dieu qui produit en vous le vouloir et le faire, selon son bon plaisir. '
  '14':
  - type: note
    content: Ro 12:17. 1 Pi 2:12.
  - type: text
    content: 'Faites toutes choses '
  - type: note
    content: 1 Pi 4:9.
  - type: text
    content: 'sans murmures ni hésitations, '
  '15':
  - type: text
    content: 'afin que vous soyez irréprochables et purs, des enfants de Dieu irrépréhensibles au milieu d’une génération perverse et corrompue, '
  - type: note
    content: Pr 4:18. Mt 5:14.
  - type: text
    content: 'parmi laquelle vous brillez comme des flambeaux dans le monde, '
  '16':
  - type: text
    content: 'portant la parole de vie; '
  - type: note
    content: 2 Co 1:14. 1 Th 2:19.
  - type: text
    content: 'et je pourrai me glorifier, au jour de Christ, de n’avoir pas couru en vain ni travaillé en vain. '
  '17':
  - type: text
    content: 'Et même si je sers de libation pour le sacrifice et pour le service de votre foi, '
  - type: note
    content: 2 Co 7:4.
  - type: text
    content: 'je m’en réjouis, et je me réjouis avec vous tous. '
  '18':
  - type: text
    content: Vous aussi, réjouissez-vous de même, et réjouissez-vous avec moi.
  - type: heading
    content: Éloge de Timothée et d’Épaphrodite, que Paul se propose d’envoyer aux Philippiens
  - type: heading
    content: 'V. 19-24: cf. 1 Th 3:1-11.'
  '19':
  - type: text
    content: ' '
  - type: note
    content: Ac 16:1. Ro 16:21. 1 Th 3:2.
  - type: text
    content: 'J’espère dans le Seigneur Jésus vous envoyer bientôt Timothée, afin d’être encouragé moi-même en apprenant ce qui vous concerne. '
  '2':
  - type: text
    content: 'rendez ma joie parfaite, ayant '
  - type: note
    content: Ro 12:16; 15:5. 1 Co 1:10. Ph 3:16. 1 Pi 3:8.
  - type: text
    content: 'un même sentiment, un même amour, une même âme, une même pensée. '
  '20':
  - type: text
    content: 'Car je n’ai personne ici qui partage mes sentiments, pour prendre sincèrement à cœur votre situation; '
  '21':
  - type: note
    content: 1 Co 10:24; 13:5.
  - type: text
    content: 'tous, en effet, cherchent leurs propres intérêts, et non ceux de Jésus-Christ. '
  '22':
  - type: text
    content: 'Vous savez qu’il a été mis à l’épreuve, en se consacrant au service de l’Évangile avec moi, comme un enfant avec son père. '
  '23':
  - type: text
    content: 'J’espère donc vous l’envoyer dès que j’apercevrai l’issue de l’état où je suis; '
  '24':
  - type: text
    content: et j’ai cette confiance dans le Seigneur que moi-même aussi j’irai bientôt.
  - type: heading
    content: 'V. 25-30: cf. Ph 4:10, 18. 1 Co 16:15-18.'
  '25':
  - type: text
    content: 'J’ai estimé nécessaire de vous envoyer mon frère Épaphrodite, mon compagnon d’œuvre et de combat, par qui vous m’avez fait parvenir de quoi pourvoir à mes besoins. '
  '26':
  - type: text
    content: 'Car il désirait vous voir tous, et il était fort en peine de ce que vous aviez appris sa maladie. '
  '27':
  - type: text
    content: 'Il a été malade, en effet, et tout près de la mort; mais Dieu a eu pitié de lui, et non seulement de lui, mais aussi de moi, afin que je n’eusse pas tristesse sur tristesse. '
  '28':
  - type: text
    content: 'Je l’ai donc envoyé avec d’autant plus d’empressement, afin que vous vous réjouissiez de le revoir, et que je sois moi-même moins triste. '
  '29':
  - type: text
    content: 'Recevez-le donc dans le Seigneur avec une joie entière, '
  - type: note
    content: 1 Co 9:14. Ga 6:6. 1 Th 5:12. 1 Ti 5:17. Hé 13:17.
  - type: text
    content: 'et honorez de tels hommes. '
  '3':
  - type: text
    content: 'Ne faites rien par esprit de parti ou par vaine gloire, '
  - type: note
    content: Ro 12:10. 1 Pi 5:5.
  - type: text
    content: 'mais que l’humilité vous fasse regarder les autres comme étant au-dessus de vous-mêmes. '
  '30':
  - type: text
    content: Car c’est pour l’œuvre de Christ qu’il a été près de la mort, ayant exposé sa vie afin de suppléer à votre absence dans le service que vous me rendiez.
  '4':
  - type: note
    content: 1 Co 10:24; 13:5.
  - type: text
    content: 'Que chacun de vous, au lieu de considérer ses propres intérêts, considère aussi ceux des autres. '
  '5':
  - type: note
    content: Mt 11:29. Jn 13:15. 1 Pi 2:21. 1 Jn 2:6.
  - type: text
    content: 'Ayez en vous les sentiments qui étaient en Jésus-Christ, '
  '6':
  - type: note
    content: 2 Co 4:4. Col 1:15. Hé 1:3.
  - type: text
    content: 'lequel, existant en forme de Dieu, n’a point regardé comme une proie à arracher d’être égal avec Dieu, '
  '7':
  - type: note
    content: Ps 8:6.
  - type: text
    content: 'mais s’est dépouillé lui-même, '
  - type: note
    content: Mt 20:28. Jn 13:14.
  - type: text
    content: 'en prenant une forme de serviteur, en devenant semblable aux hommes; '
  - type: note
    content: Hé 2:14, 17; 4:15.
  - type: text
    content: 'et ayant paru comme un simple homme, '
  '8':
  - type: note
    content: Hé 2:9; 12:2.
  - type: text
    content: 'il s’est humilié lui-même, se rendant obéissant jusqu’à la mort, même jusqu’à la mort de la croix. '
  '9':
  - type: note
    content: Ac 2:33.
  - type: text
    content: 'C’est pourquoi aussi Dieu l’a souverainement élevé, et lui a donné '
  - type: note
    content: Hé 1:4.
  - type: text
    content: 'le nom qui est au-dessus de tout nom, '
