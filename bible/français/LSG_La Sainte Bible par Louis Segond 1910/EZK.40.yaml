document_id: EZK.40
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vision du nouveau temple
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-49: cf. Ap 21:10. (Ex 38:9-20, 1-8. 2 Ch 4:9; 3:4, 14-17.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La vingt-cinquième année de notre captivité, au commencement de l’année, le dixième jour du mois, quatorze ans après '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 33:21
      metadata:
        usfm: EZK.33.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'la ruine de la ville, en ce même jour, la main de l’Éternel fut sur moi, et il me transporta dans le pays d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il m’y transporta, dans des visions divines, et me déposa sur une montagne très élevée, où se trouvait au midi comme une ville construite. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il me conduisit là; et voici, il y avait un homme dont l’aspect était comme l’aspect de l’airain; il avait dans la main un cordeau de lin et une canne pour mesurer, et il se tenait à la porte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Cet homme me dit: Fils de l’homme, regarde de tes yeux, et écoute de tes oreilles! Applique ton attention à toutes les choses que je te montrerai, car tu as été amené ici afin que je te les montre. Fais connaître à la maison d’Israël tout ce que tu verras. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Voici, un mur extérieur entourait la maison de tous côtés. Dans la main de l’homme était une canne de six coudées pour mesurer, chaque coudée ayant un palme de plus que la coudée ordinaire. Il mesura la largeur du mur, qui était d’une canne, et la hauteur, qui était d’une canne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il alla vers la porte orientale, et il en monta les degrés. Il mesura le seuil de la porte, qui avait une canne en largeur, et l’autre seuil, qui avait une canne en largeur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Chaque chambre était longue d’une canne, et large d’une canne. Il y avait entre les chambres un espace de cinq coudées. Le seuil de la porte, près du vestibule de la porte, à l’intérieur, avait une canne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Il mesura le vestibule de la porte, à l’intérieur; il avait une canne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il mesura le vestibule de la porte; il avait huit coudées, et ses poteaux en avaient deux; le vestibule de la porte était en dedans. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Les chambres de la porte orientale étaient au nombre de trois d’un côté et de trois de l’autre; toutes les trois avaient la même mesure, et les poteaux de chaque côté avaient aussi la même mesure. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il mesura la largeur de l’ouverture de la porte, qui était de dix coudées, et la hauteur de la porte, qui était de treize coudées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il y avait devant les chambres un espace d’une coudée de chaque côté et d’autre; chaque chambre avait six coudées d’un côté, et six coudées de l’autre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il mesura la porte depuis le toit d’une chambre jusqu’au toit de l’autre; il y avait une largeur de vingt-cinq coudées entre les deux ouvertures opposées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il compta soixante coudées pour les poteaux, près desquels était une cour, autour de la porte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'L’espace entre la porte d’entrée et le vestibule de la porte intérieure était de cinquante coudées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il y avait des fenêtres grillées aux chambres et à leurs poteaux à l’intérieur de la porte tout autour; il y avait aussi des fenêtres dans les vestibules tout autour intérieurement; des palmes étaient sculptées sur les poteaux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il me conduisit dans le parvis extérieur, où se trouvaient des chambres et un pavé tout autour; il y avait trente chambres sur ce pavé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Le pavé était au côté des portes, et répondait à la longueur des portes; c’était le pavé inférieur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Il mesura la largeur depuis la porte d’en bas jusqu’au parvis intérieur en dehors; il y avait cent coudées, à l’orient et au septentrion. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Il mesura la longueur et la largeur de la porte septentrionale du parvis extérieur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ses chambres, au nombre de trois d’un côté et de trois de l’autre, ses poteaux et ses vestibules, avaient la même mesure que la première porte, cinquante coudées en longueur et vingt-cinq coudées en largeur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ses fenêtres, son vestibule, ses palmes, avaient la même mesure que la porte orientale; on y montait par sept degrés, devant lesquels était son vestibule. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Il y avait une porte au parvis intérieur, vis-à-vis de la porte septentrionale et vis-à-vis de la porte orientale; il mesura d’une porte à l’autre cent coudées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Il me conduisit du côté du midi, où se trouvait la porte méridionale. Il en mesura les poteaux et les vestibules, qui avaient la même mesure. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Cette porte et ses vestibules avaient des fenêtres tout autour, comme les autres fenêtres, cinquante coudées en longueur et vingt-cinq coudées en largeur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'On y montait par sept degrés, devant lesquels était son vestibule; il y avait de chaque côté des palmes sur ses poteaux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Le parvis intérieur avait une porte du côté du midi; il mesura d’une porte à l’autre au midi cent coudées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Il me conduisit dans le parvis intérieur, par la porte du midi. Il mesura la porte du midi, qui avait la même mesure. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ses chambres, ses poteaux et ses vestibules, avaient la même mesure. Cette porte et ses vestibules avaient des fenêtres tout autour, cinquante coudées en longueur et vingt-cinq coudées en largeur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Il y avait tout autour des vestibules de vingt-cinq coudées de longueur et de cinq de largeur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Les vestibules de la porte aboutissaient au parvis extérieur; il y avait des palmes sur ses poteaux, et huit degrés pour y monter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Il me conduisit dans le parvis intérieur, par l’entrée orientale. Il mesura la porte, qui avait la même mesure. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ses chambres, ses poteaux et ses vestibules, avaient la même mesure. Cette porte et ses vestibules avaient des fenêtres tout autour, cinquante coudées en longueur et vingt-cinq coudées en largeur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ses vestibules aboutissaient au parvis extérieur; il y avait de chaque côté des palmes sur ses poteaux, et huit degrés pour y monter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Il me conduisit vers la porte septentrionale. Il la mesura, et trouva la même mesure, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'ainsi qu’à ses chambres, à ses poteaux et à ses vestibules; elle avait des fenêtres tout autour; cinquante coudées en longueur et vingt-cinq coudées en largeur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ses vestibules aboutissaient au parvis extérieur; il y avait de chaque côté des palmes sur ses poteaux, et huit degrés pour y monter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Il y avait une chambre qui s’ouvrait vers les poteaux des portes, et où l’on devait laver les holocaustes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Dans le vestibule de la porte se trouvaient de chaque côté deux tables, sur lesquelles on devait égorger l’holocauste, le sacrifice d’expiation et le sacrifice de culpabilité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'A l’un des côtés extérieurs par où l’on montait, à l’entrée de la porte septentrionale, il y avait deux tables; et à l’autre côté, vers le vestibule de la porte, il y avait deux tables. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Il se trouvait ainsi, aux côtés de la porte, quatre tables d’une part et quatre tables de l’autre, en tout huit tables, sur lesquelles on devait égorger les victimes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Il y avait encore pour les holocaustes quatre tables en pierres de taille, longues d’une coudée et demie, larges d’une coudée et demie, et hautes d’une coudée; on devait mettre sur ces tables les instruments avec lesquels on égorgeait les victimes pour les holocaustes et pour les autres sacrifices. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Des rebords de quatre doigts étaient adaptés à la maison tout autour; et la chair des sacrifices devait être mise sur les tables. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'En dehors de la porte intérieure il y avait des chambres pour les chantres, dans le parvis intérieur: l’une était à côté de la porte septentrionale et avait la face au midi, l’autre était à côté de la porte orientale et avait la face au septentrion. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Il me dit: Cette chambre, dont la face est au midi, est pour les sacrificateurs qui ont la garde de la maison; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'et la chambre dont la face est au septentrion est pour les sacrificateurs qui ont la garde de l’autel. Ce sont les fils de Tsadok, qui, parmi les fils de Lévi, s’approchent de l’Éternel pour le servir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Il mesura le parvis, qui avait cent coudées de longueur et cent coudées de largeur, en carré. L’autel était devant la maison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Il me conduisit dans le vestibule de la maison. Il mesura les poteaux du vestibule, et trouva cinq coudées d’un côté et cinq coudées de l’autre. La largeur de la porte était de trois coudées d’un côté et de trois coudées de l’autre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Le vestibule avait une longueur de vingt coudées et une largeur de onze coudées; on y montait par des degrés. Il y avait des colonnes près des poteaux, l’une d’un côté, et l’autre de l’autre.
