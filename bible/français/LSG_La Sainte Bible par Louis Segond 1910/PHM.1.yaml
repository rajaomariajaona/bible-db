document_id: PHM.1,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Adresse et salutation
  - type: heading
    content: 'V. 1-3: cf. Col 1:1, 2. 3 Jn 1.'
  - type: text
    content: 'Paul, '
  - type: note
    content: Ép 3:1; 4:1.
  - type: text
    content: 'prisonnier de Jésus-Christ, et le frère Timothée, à Philémon, notre bien-aimé et notre compagnon d’œuvre, '
  '10':
  - type: note
    content: Col 4:9.
  - type: text
    content: 'Je te prie pour mon enfant, '
  - type: note
    content: 1 Co 4:15. Ga 4:19.
  - type: text
    content: 'que j’ai engendré étant dans les chaînes, Onésime, '
  '11':
  - type: text
    content: 'qui autrefois t’a été inutile, mais qui maintenant est utile, et à toi et à moi. '
  '12':
  - type: text
    content: 'Je te le renvoie lui, mes propres entrailles. '
  '13':
  - type: text
    content: 'J’aurais désiré le retenir auprès de moi, pour qu’il me servît à ta place, pendant que je suis dans les chaînes pour l’Évangile. '
  '14':
  - type: text
    content: 'Toutefois, je n’ai rien voulu faire sans ton avis, afin que ton bienfait ne soit pas comme forcé, mais qu’il soit volontaire. '
  '15':
  - type: text
    content: 'Peut-être a-t-il été séparé de toi pour un temps, afin que tu le recouvres pour l’éternité, '
  '16':
  - type: text
    content: 'non plus comme un esclave, mais comme supérieur à un esclave, comme un frère bien-aimé, de moi particulièrement, et de toi à plus forte raison, soit dans la chair, soit dans le Seigneur. '
  '17':
  - type: text
    content: 'Si donc tu me tiens pour ton ami, reçois-le comme moi-même. '
  '18':
  - type: text
    content: 'Et s’il t’a fait quelque tort, ou s’il te doit quelque chose, mets-le sur mon compte. '
  '19':
  - type: text
    content: 'Moi Paul, je l’écris de ma propre main, je paierai, pour ne pas te dire que tu te dois toi-même à moi. '
  '2':
  - type: text
    content: 'à la sœur Apphia, à '
  - type: note
    content: Col 4:17.
  - type: text
    content: 'Archippe, notre compagnon de combat, et à l’Église '
  - type: note
    content: Ro 16:5. 1 Co 16:19. Col 4:15.
  - type: text
    content: 'qui est dans ta maison: '
  '20':
  - type: text
    content: 'Oui, frère, que j’obtienne de toi cet avantage, dans le Seigneur; tranquillise mon cœur en Christ. '
  '21':
  - type: text
    content: C’est en comptant sur ton obéissance que je t’écris, sachant que tu feras même au-delà de ce que je dis.
  - type: heading
    content: Communication personnelle. Salutation
  - type: heading
    content: 'V. 22-25: cf. Col 4:10-18.'
  '22':
  - type: text
    content: 'En même temps, prépare-moi '
  - type: note
    content: Hé 13:2.
  - type: text
    content: 'un logement, '
  - type: note
    content: Ph 1:25.
  - type: text
    content: 'car j’espère vous être rendu, grâce à vos prières. '
  '23':
  - type: note
    content: Col 1:7; 4:12.
  - type: text
    content: 'Épaphras, mon compagnon de captivité en Jésus-Christ, '
  '24':
  - type: text
    content: 'te salue, ainsi que '
  - type: note
    content: Ac 12:12, 25; 15:37. Col 4:10. 2 Ti 4:11. 1 Pi 5:13.
  - type: text
    content: 'Marc, '
  - type: note
    content: Ac 19:29; 20:4; 27:2. Col 4:10.
  - type: text
    content: 'Aristarque, '
  - type: note
    content: Col 4:14. 2 Ti 4:10.
  - type: text
    content: 'Démas, '
  - type: note
    content: Col 4:14. 2 Ti 4:11.
  - type: text
    content: 'Luc, mes compagnons d’œuvre. '
  '25':
  - type: text
    content: Que la grâce de notre Seigneur Jésus-Christ soit avec votre esprit!
  '3':
  - type: text
    content: que la grâce et la paix vous soient données de la part de Dieu notre Père et du Seigneur Jésus-Christ!
  - type: heading
    content: Actions de grâces au sujet de la foi et de la charité de Philémon
  - type: heading
    content: 'V. 4-7: cf. Col 1:3-8. 2 Ti 1:3-5. 3 Jn 2-6.'
  '4':
  - type: text
    content: ' '
  - type: note
    content: 1 Th 1:2. 2 Th 1:3.
  - type: text
    content: 'Je rends continuellement grâces à mon Dieu, faisant mention de toi dans mes prières, '
  '5':
  - type: text
    content: 'parce que je suis informé de la foi que tu as au Seigneur Jésus et de ta charité pour tous les saints. '
  '6':
  - type: text
    content: 'Je lui demande que ta participation à la foi soit efficace pour la cause de Christ, en faisant reconnaître en nous toute espèce de bien. '
  '7':
  - type: text
    content: J’ai, en effet, éprouvé beaucoup de joie et de consolation au sujet de ta charité; car par toi, frère, le cœur des saints a été tranquillisé.
  - type: heading
    content: Intercession de Paul pour l’esclave Onésime, qui s’était enfui de chez Philémon son maître
  - type: heading
    content: 'V. 8-21: cf. (Col 4:7-9. 1 Co 4:15.) (1 Co 13:4-7. Ga 6:9, 10.)'
  '8':
  - type: text
    content: 'C’est pourquoi, bien que j’aie en Christ toute liberté de te prescrire ce qui est convenable, '
  '9':
  - type: text
    content: 'c’est de préférence au nom de la charité que je t’adresse une prière, étant ce que je suis, Paul, vieillard, et de plus maintenant prisonnier de Jésus-Christ. '
