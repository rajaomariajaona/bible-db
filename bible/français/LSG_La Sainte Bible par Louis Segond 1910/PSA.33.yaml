document_id: PSA.33,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Ps 104; 135; 147.)
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Justes, réjouissez-vous en l’Éternel!
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 147:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: La louange sied aux hommes droits.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 19:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: L’Éternel renverse les desseins des nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il anéantit les projets des peuples;
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 19:21
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 21:30
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 46:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Les desseins de l’Éternel subsistent à toujours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les projets de son cœur, de génération en génération.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 65:5
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 144:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Heureuse la nation dont l’Éternel est le Dieu!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Heureux le peuple qu’il choisit pour son héritage!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel regarde du haut des cieux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il voit tous les fils de l’homme;
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Du lieu de sa demeure il observe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous les habitants de la terre,
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lui qui forme leur cœur à tous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui est attentif à toutes leurs actions.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce n’est pas une grande armée qui sauve le roi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce n’est pas une grande force qui délivre le héros;
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le cheval est impuissant pour assurer le salut,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et toute sa vigueur ne donne pas la délivrance.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 36:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 34:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 3:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: l’œil de l’Éternel est sur ceux qui le craignent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur ceux qui espèrent en sa bonté,
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afin d’arracher leur âme à la mort
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et de les faire vivre au milieu de la famine.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Célébrez l’Éternel avec la harpe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Célébrez-le sur le luth à dix cordes.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Notre âme espère en l’Éternel;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est notre secours et notre bouclier.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car notre cœur met en lui sa joie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car nous avons confiance en son saint nom.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Éternel! Que ta grâce soit sur nous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme nous espérons en toi!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 40:4
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 96:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 98:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 144:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 42:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 5:9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Chantez-lui un cantique nouveau!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Faites retentir vos instruments et vos voix!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car la parole de l’Éternel est droite,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et toutes ses œuvres s’accomplissent avec fidélité;
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 45:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 1:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il aime la justice et la droiture;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 119:64
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: La bonté de l’Éternel remplit la terre.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 1:6
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '7'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Les cieux ont été faits par la parole de l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et toute leur armée par le souffle de sa bouche.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il amoncelle en un tas les eaux de la mer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il met dans des réservoirs les abîmes.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que toute la terre craigne l’Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que tous les habitants du monde tremblent devant lui!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car il dit, et la chose arrive;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ordonne, et elle existe.
