document_id: PSA.33,93
type_code: fra
verses:
  '1':
  - type: heading
    content: (Ps 104; 135; 147.)
  - type: text
    content: Justes, réjouissez-vous en l’Éternel!
  - type: note
    content: Ps 147:1.
  - type: text
    content: La louange sied aux hommes droits.
  '10':
  - type: text
    content: ' '
  - type: note
    content: És 19:3.
  - type: text
    content: L’Éternel renverse les desseins des nations,
  - type: text
    content: Il anéantit les projets des peuples;
  '11':
  - type: text
    content: ' '
  - type: note
    content: Pr 19:21; 21:30. És 46:10.
  - type: text
    content: Les desseins de l’Éternel subsistent à toujours,
  - type: text
    content: Et les projets de son cœur, de génération en génération.
  '12':
  - type: text
    content: ' '
  - type: note
    content: Ps 65:5; 144:15.
  - type: text
    content: Heureuse la nation dont l’Éternel est le Dieu!
  - type: text
    content: Heureux le peuple qu’il choisit pour son héritage!
  '13':
  - type: text
    content: L’Éternel regarde du haut des cieux,
  - type: text
    content: Il voit tous les fils de l’homme;
  '14':
  - type: text
    content: Du lieu de sa demeure il observe
  - type: text
    content: Tous les habitants de la terre,
  '15':
  - type: text
    content: Lui qui forme leur cœur à tous,
  - type: text
    content: Qui est attentif à toutes leurs actions.
  '16':
  - type: text
    content: Ce n’est pas une grande armée qui sauve le roi,
  - type: text
    content: Ce n’est pas une grande force qui délivre le héros;
  '17':
  - type: text
    content: Le cheval est impuissant pour assurer le salut,
  - type: text
    content: Et toute sa vigueur ne donne pas la délivrance.
  '18':
  - type: text
    content: 'Voici, '
  - type: note
    content: Job 36:7. Ps 34:16. 1 Pi 3:12.
  - type: text
    content: l’œil de l’Éternel est sur ceux qui le craignent,
  - type: text
    content: Sur ceux qui espèrent en sa bonté,
  '19':
  - type: text
    content: Afin d’arracher leur âme à la mort
  - type: text
    content: Et de les faire vivre au milieu de la famine.
  '2':
  - type: text
    content: Célébrez l’Éternel avec la harpe,
  - type: text
    content: Célébrez-le sur le luth à dix cordes.
  '20':
  - type: text
    content: Notre âme espère en l’Éternel;
  - type: text
    content: Il est notre secours et notre bouclier.
  '21':
  - type: text
    content: Car notre cœur met en lui sa joie,
  - type: text
    content: Car nous avons confiance en son saint nom.
  '22':
  - type: text
    content: Éternel! Que ta grâce soit sur nous,
  - type: text
    content: Comme nous espérons en toi!
  '3':
  - type: text
    content: ' '
  - type: note
    content: Ps 40:4; 96:1; 98:1; 144:9. És 42:10. Ap 5:9; 14:3.
  - type: text
    content: Chantez-lui un cantique nouveau!
  - type: text
    content: Faites retentir vos instruments et vos voix!
  '4':
  - type: text
    content: Car la parole de l’Éternel est droite,
  - type: text
    content: Et toutes ses œuvres s’accomplissent avec fidélité;
  '5':
  - type: text
    content: ' '
  - type: note
    content: Ps 45:8. Hé 1:9.
  - type: text
    content: Il aime la justice et la droiture;
  - type: note
    content: Ps 119:64.
  - type: text
    content: La bonté de l’Éternel remplit la terre.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Ge 1:6, 7.
  - type: text
    content: Les cieux ont été faits par la parole de l’Éternel,
  - type: text
    content: Et toute leur armée par le souffle de sa bouche.
  '7':
  - type: text
    content: Il amoncelle en un tas les eaux de la mer,
  - type: text
    content: Il met dans des réservoirs les abîmes.
  '8':
  - type: text
    content: Que toute la terre craigne l’Éternel!
  - type: text
    content: Que tous les habitants du monde tremblent devant lui!
  '9':
  - type: text
    content: Car il dit, et la chose arrive;
  - type: text
    content: Il ordonne, et elle existe.
