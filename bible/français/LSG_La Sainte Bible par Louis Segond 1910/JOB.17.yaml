document_id: JOB.17
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Mon souffle se perd,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mes jours s’éteignent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le sépulcre m’attend.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Je suis environné de moqueurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et mon œil doit contempler leurs insultes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Sois auprès de toi-même ma caution;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Autrement, qui répondrait pour moi?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Car tu as fermé leur cœur à l’intelligence;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aussi ne les laisseras-tu pas triompher.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: On invite ses amis au partage du butin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et l’on a des enfants dont les yeux se consument.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 30:5
      metadata:
        usfm: JOB.30.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il m’a rendu la fable des peuples,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ma personne est un objet de mépris.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mon œil est obscurci par la douleur;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous mes membres sont comme une ombre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Les hommes droits en sont stupéfaits,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et l’innocent se soulève contre l’impie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Le juste néanmoins demeure ferme dans sa voie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celui qui a les mains pures se fortifie de plus en plus.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 10-16: cf. (Job 10:20-22; 19:10.)'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 6:29
      metadata:
        usfm: JOB.6.29
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Mais vous tous, revenez à vos mêmes discours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je ne trouverai pas un sage parmi vous.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 7:6
      metadata:
        usfm: JOB.7.6
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 9:25
      metadata:
        usfm: JOB.9.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Quoi! Mes jours sont passés, mes projets sont anéantis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les projets qui remplissaient mon cœur…
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Et ils prétendent que la nuit c’est le jour,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que la lumière est proche quand les ténèbres sont là!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: C’est le séjour des morts que j’attends pour demeure,
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est dans les ténèbres que je dresserai ma couche;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Je crie à la fosse: Tu es mon père!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et aux vers: Vous êtes ma mère et ma sœur!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Mon espérance, où donc est-elle?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon espérance, qui peut la voir?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Elle descendra vers les portes du séjour des morts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Quand nous irons ensemble reposer '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 3:17
      metadata:
        usfm: JOB.3.17
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '18'
      metadata:
        usfm: JOB.3.18
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '19'
      metadata:
        usfm: JOB.3.19
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 30:23
      metadata:
        usfm: JOB.30.23
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '24'
      metadata:
        usfm: JOB.30.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: dans la poussière.
