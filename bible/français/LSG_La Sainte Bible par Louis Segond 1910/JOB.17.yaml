document_id: JOB.17,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon souffle se perd,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes jours s’éteignent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le sépulcre m’attend.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 6:29
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Mais vous tous, revenez à vos mêmes discours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je ne trouverai pas un sage parmi vous.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 7:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:25
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Quoi! Mes jours sont passés, mes projets sont anéantis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les projets qui remplissaient mon cœur…
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils prétendent que la nuit c’est le jour,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que la lumière est proche quand les ténèbres sont là!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est le séjour des morts que j’attends pour demeure,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est dans les ténèbres que je dresserai ma couche;
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je crie à la fosse: Tu es mon père!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et aux vers: Vous êtes ma mère et ma sœur!'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon espérance, où donc est-elle?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon espérance, qui peut la voir?
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle descendra vers les portes du séjour des morts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Quand nous irons ensemble reposer '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 3:17
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '18'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '19'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 30:23
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '24'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: dans la poussière.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis environné de moqueurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et mon œil doit contempler leurs insultes.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sois auprès de toi-même ma caution;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Autrement, qui répondrait pour moi?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car tu as fermé leur cœur à l’intelligence;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aussi ne les laisseras-tu pas triompher.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On invite ses amis au partage du butin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’on a des enfants dont les yeux se consument.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 30:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il m’a rendu la fable des peuples,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ma personne est un objet de mépris.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon œil est obscurci par la douleur;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous mes membres sont comme une ombre.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les hommes droits en sont stupéfaits,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’innocent se soulève contre l’impie.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le juste néanmoins demeure ferme dans sa voie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui a les mains pures se fortifie de plus en plus.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 10-16: cf. (Job 10:20-22; 19:10.)'
    marker-yv: yv-h
