document_id: JOB.17,93
type_code: fra
verses:
  '1':
  - type: text
    content: Mon souffle se perd,
  - type: text
    content: Mes jours s’éteignent,
  - type: text
    content: Le sépulcre m’attend.
  '10':
  - type: text
    content: ' '
  - type: note
    content: Job 6:29.
  - type: text
    content: Mais vous tous, revenez à vos mêmes discours,
  - type: text
    content: Et je ne trouverai pas un sage parmi vous.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Job 7:6; 9:25.
  - type: text
    content: Quoi! Mes jours sont passés, mes projets sont anéantis,
  - type: text
    content: Les projets qui remplissaient mon cœur…
  '12':
  - type: text
    content: Et ils prétendent que la nuit c’est le jour,
  - type: text
    content: Que la lumière est proche quand les ténèbres sont là!
  '13':
  - type: text
    content: C’est le séjour des morts que j’attends pour demeure,
  - type: text
    content: C’est dans les ténèbres que je dresserai ma couche;
  '14':
  - type: text
    content: 'Je crie à la fosse: Tu es mon père!'
  - type: text
    content: 'Et aux vers: Vous êtes ma mère et ma sœur!'
  '15':
  - type: text
    content: Mon espérance, où donc est-elle?
  - type: text
    content: Mon espérance, qui peut la voir?
  '16':
  - type: text
    content: Elle descendra vers les portes du séjour des morts,
  - type: text
    content: 'Quand nous irons ensemble reposer '
  - type: note
    content: Job 3:17, 18, 19; 30:23, 24.
  - type: text
    content: dans la poussière.
  '2':
  - type: text
    content: Je suis environné de moqueurs,
  - type: text
    content: Et mon œil doit contempler leurs insultes.
  '3':
  - type: text
    content: Sois auprès de toi-même ma caution;
  - type: text
    content: Autrement, qui répondrait pour moi?
  '4':
  - type: text
    content: Car tu as fermé leur cœur à l’intelligence;
  - type: text
    content: Aussi ne les laisseras-tu pas triompher.
  '5':
  - type: text
    content: On invite ses amis au partage du butin,
  - type: text
    content: Et l’on a des enfants dont les yeux se consument.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Job 30:5.
  - type: text
    content: Il m’a rendu la fable des peuples,
  - type: text
    content: Et ma personne est un objet de mépris.
  '7':
  - type: text
    content: Mon œil est obscurci par la douleur;
  - type: text
    content: Tous mes membres sont comme une ombre.
  '8':
  - type: text
    content: Les hommes droits en sont stupéfaits,
  - type: text
    content: Et l’innocent se soulève contre l’impie.
  '9':
  - type: text
    content: Le juste néanmoins demeure ferme dans sa voie,
  - type: text
    content: Celui qui a les mains pures se fortifie de plus en plus.
  - type: heading
    content: 'V. 10-16: cf. (Job 10:20-22; 19:10.)'
