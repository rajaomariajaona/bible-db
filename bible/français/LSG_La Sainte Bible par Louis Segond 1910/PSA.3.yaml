  - type: text
    text: 'Psaume de David. A l’occasion de sa '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 S 15:16
      metadata:
        usfm: 2SA.15.16
    - type: text
