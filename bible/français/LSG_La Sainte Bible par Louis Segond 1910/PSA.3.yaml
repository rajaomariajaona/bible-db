      metadata:
        usfm: REV.19.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Le salut est auprès de l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Que ta bénédiction soit sur ton peuple! '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: — Pause.
