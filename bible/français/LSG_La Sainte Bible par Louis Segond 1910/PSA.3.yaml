document_id: PSA.3,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 2 S 15; 16. Ps 4; 5; 27:1-3, 6; 56:3-5.
  - type: text
    content: 'Psaume de David. A l’occasion de sa '
  - type: note
    content: 2 S 15:16, 17, 18.
  - type: text
    content: fuite devant Absalom, son fils.
  '2':
  - type: text
    content: O Éternel, que mes ennemis sont nombreux!
  - type: text
    content: Quelle multitude se lève contre moi!
  '3':
  - type: text
    content: 'Combien qui disent à mon sujet:'
  - type: text
    content: 'Plus de salut pour lui auprès de Dieu! '
  - type: text
    content: — Pause.
  '4':
  - type: text
    content: Mais toi, ô Éternel! Tu es mon bouclier,
  - type: text
    content: Tu es ma gloire, et tu relèves ma tête.
  '5':
  - type: text
    content: De ma voix je crie à l’Éternel,
  - type: text
    content: 'Et il me répond de sa montagne sainte. '
  - type: text
    content: — Pause.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Ps 4:9.
  - type: text
    content: Je me couche, et je m’endors;
  - type: text
    content: Je me réveille, car l’Éternel est mon soutien.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Ps 27:3.
  - type: text
    content: Je ne crains pas les myriades de peuples
  - type: text
    content: Qui m’assiègent de toutes parts.
  '8':
  - type: text
    content: Lève-toi, Éternel! Sauve-moi, mon Dieu!
  - type: text
    content: Car tu frappes à la joue tous mes ennemis,
  - type: text
    content: Tu brises les dents des méchants.
  '9':
  - type: text
    content: ' '
  - type: note
    content: Pr 21:31. És 43:11. Jé 2:23. Os 13:4. Ap 7:10; 19:1.
  - type: text
    content: 'Le salut est auprès de l’Éternel:'
  - type: text
    content: 'Que ta bénédiction soit sur ton peuple! '
  - type: text
    content: — Pause.
