document_id: 2SA.14,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-20: cf. 2 S 13:23-39. (2 S 12:1-7. 1 R 20:38-42.) Éz 18:23.'
  - type: text
    content: 'Joab, fils de Tseruja, s’aperçut que le cœur du roi était porté pour Absalom. '
  '10':
  - type: text
    content: 'Le roi dit: Si quelqu’un parle contre toi, amène-le-moi, et il ne lui arrivera plus de te toucher. '
  '11':
  - type: text
    content: 'Elle dit: Que le roi se souvienne de l’Éternel, ton Dieu, afin que le vengeur du sang n’augmente pas la ruine, et qu’on ne détruise pas mon fils! Et il dit: L’Éternel est vivant! Il ne tombera pas à terre un cheveu de ton fils. '
  '12':
  - type: text
    content: 'La femme dit: Permets que ta servante dise un mot à mon seigneur le roi. Et il dit: Parle! '
  '13':
  - type: text
    content: 'La femme dit: Pourquoi penses-tu de la sorte à l’égard du peuple de Dieu, puisqu’il résulte des paroles mêmes du roi que le roi est comme coupable en ne rappelant pas celui qu’il a proscrit? '
  '14':
  - type: text
    content: 'Il nous faut certainement mourir, et nous serons comme des eaux répandues à terre et qui ne se rassemblent plus; Dieu n’ôte pas la vie, mais il désire que le fugitif ne reste pas banni de sa présence. '
  '15':
  - type: text
    content: 'Maintenant, si je suis venue dire ces choses au roi mon seigneur, c’est que le peuple m’a effrayée. Et ta servante a dit: Je veux parler au roi; peut-être le roi fera-t-il ce que dira sa servante. '
  '16':
  - type: text
    content: 'Oui, le roi écoutera sa servante, pour la délivrer de la main de ceux qui cherchent à nous exterminer, moi et mon fils, de l’héritage de Dieu. '
  '17':
  - type: text
    content: 'Ta servante a dit: Que la parole de mon seigneur le roi me donne le repos. Car mon seigneur le roi est comme un ange de Dieu, prêt à entendre le bien et le mal. Et que l’Éternel, ton Dieu, soit avec toi! '
  '18':
  - type: text
    content: 'Le roi répondit, et dit à la femme: Ne me cache pas ce que je vais te demander. Et la femme dit: Que mon seigneur le roi parle! '
  '19':
  - type: text
    content: 'Le roi dit alors: La main de Joab n’est-elle pas avec toi dans tout ceci? Et la femme répondit: Aussi vrai que ton âme est vivante, ô roi mon seigneur, il n’y a rien à droite ni à gauche de tout ce que dit mon seigneur le roi. C’est, en effet, ton serviteur Joab qui m’a donné des ordres, et qui a mis dans la bouche de ta servante toutes ces paroles. '
  '2':
  - type: text
    content: 'Il envoya chercher à Tekoa une femme habile, et il lui dit: Montre-toi désolée, et revêts des habits de deuil; ne t’oins pas d’huile, et sois comme une femme qui depuis longtemps pleure un mort. '
  '20':
  - type: text
    content: C’est pour donner à la chose une autre tournure que ton serviteur Joab a fait cela. Mais mon seigneur est aussi sage qu’un ange de Dieu, pour connaître tout ce qui se passe sur la terre.
  - type: heading
    content: 'V. 21-33: cf. 2 S 13:37-39.'
  '21':
  - type: text
    content: 'Le roi dit à Joab: Voici, je veux bien faire cela; va donc, ramène le jeune homme Absalom. '
  '22':
  - type: text
    content: 'Joab tomba la face contre terre et se prosterna, et il bénit le roi. Puis il dit: Ton serviteur connaît aujourd’hui que j’ai trouvé grâce à tes yeux, ô roi mon seigneur, puisque le roi agit selon la parole de son serviteur. '
  '23':
  - type: text
    content: 'Et Joab se leva et partit pour Gueschur, et il ramena Absalom à Jérusalem. '
  '24':
  - type: text
    content: 'Mais le roi dit: Qu’il se retire dans sa maison, et qu’il ne voie point ma face. Et Absalom se retira dans sa maison, et il ne vit point la face du roi. '
  '25':
  - type: text
    content: 'Il n’y avait pas un homme dans tout Israël aussi renommé qu’Absalom pour sa beauté; depuis la plante du pied jusqu’au sommet de la tête, il n’y avait point en lui de défaut. '
  '26':
  - type: text
    content: 'Lorsqu’il se rasait la tête, c’était chaque année qu’il se la rasait, parce que sa chevelure lui pesait, le poids des cheveux de sa tête était de deux cents sicles, poids du roi. '
  '27':
  - type: text
    content: 'Il naquit à Absalom trois fils, et une fille nommée Tamar, qui était une femme belle de figure. '
  '28':
  - type: text
    content: 'Absalom demeura deux ans à Jérusalem, sans voir la face du roi. '
  '29':
  - type: text
    content: 'Il fit demander Joab, pour l’envoyer vers le roi; mais Joab ne voulut point venir auprès de lui. Il le fit demander une seconde fois; et Joab ne voulut point venir. '
  '3':
  - type: text
    content: 'Tu iras ainsi vers le roi, et tu lui parleras de cette manière. Et Joab lui mit dans la bouche ce qu’elle devait dire. '
  '30':
  - type: text
    content: 'Absalom dit alors à ses serviteurs: Voyez, le champ de Joab est à côté du mien; il y a de l’orge; allez et mettez-y le feu. Et les serviteurs d’Absalom mirent le feu au champ. '
  '31':
  - type: text
    content: 'Joab se leva et se rendit auprès d’Absalom, dans sa maison. Il lui dit: Pourquoi tes serviteurs ont-ils mis le feu au champ qui m’appartient? '
  '32':
  - type: text
    content: 'Absalom répondit à Joab: Voici, je t’ai fait dire: Viens ici, et je t’enverrai vers le roi, afin que tu lui dises: Pourquoi suis-je revenu de Gueschur? Il vaudrait mieux pour moi que j’y fusse encore. Je désire maintenant voir la face du roi; et s’il y a quelque crime en moi, qu’il me fasse mourir. '
  '33':
  - type: text
    content: Joab alla vers le roi, et lui rapporta cela. Et le roi appela Absalom, qui vint auprès de lui et se prosterna la face contre terre en sa présence. Le roi baisa Absalom.
  '4':
  - type: text
    content: 'La femme de Tekoa alla parler au roi. Elle tomba la face contre terre et se prosterna, et elle dit: O roi, sauve-moi! '
  '5':
  - type: text
    content: 'Le roi lui dit: Qu’as-tu? Elle répondit: Oui, je suis veuve, mon mari est mort! '
  '6':
  - type: text
    content: 'Ta servante avait deux fils; ils se sont tous deux querellés dans les champs, et il n’y avait personne pour les séparer; l’un a frappé l’autre, et l’a tué. '
  '7':
  - type: text
    content: 'Et voici, toute la famille s’est levée contre ta servante, en disant: Livre le meurtrier de son frère! Nous voulons le faire mourir, pour la vie de son frère qu’il a tué; nous voulons détruire même l’héritier! Ils éteindraient ainsi le tison qui me reste, pour ne laisser à mon mari ni nom ni survivant sur la face de la terre. '
  '8':
  - type: text
    content: 'Le roi dit à la femme: Va dans ta maison. Je donnerai des ordres à ton sujet. '
  '9':
  - type: text
    content: 'La femme de Tekoa dit au roi: C’est sur moi, ô roi mon seigneur, et sur la maison de mon père, que le châtiment va tomber; le roi et son trône n’auront pas à en souffrir. '
