document_id: 2SA.14
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-20: cf. 2 S 13:23-39. (2 S 12:1-7. 1 R 20:38-42.) Éz 18:23.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Joab, fils de Tseruja, s’aperçut que le cœur du roi était porté pour Absalom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il envoya chercher à Tekoa une femme habile, et il lui dit: Montre-toi désolée, et revêts des habits de deuil; ne t’oins pas d’huile, et sois comme une femme qui depuis longtemps pleure un mort. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tu iras ainsi vers le roi, et tu lui parleras de cette manière. Et Joab lui mit dans la bouche ce qu’elle devait dire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'La femme de Tekoa alla parler au roi. Elle tomba la face contre terre et se prosterna, et elle dit: O roi, sauve-moi! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Le roi lui dit: Qu’as-tu? Elle répondit: Oui, je suis veuve, mon mari est mort! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ta servante avait deux fils; ils se sont tous deux querellés dans les champs, et il n’y avait personne pour les séparer; l’un a frappé l’autre, et l’a tué. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Et voici, toute la famille s’est levée contre ta servante, en disant: Livre le meurtrier de son frère! Nous voulons le faire mourir, pour la vie de son frère qu’il a tué; nous voulons détruire même l’héritier! Ils éteindraient ainsi le tison qui me reste, pour ne laisser à mon mari ni nom ni survivant sur la face de la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Le roi dit à la femme: Va dans ta maison. Je donnerai des ordres à ton sujet. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'La femme de Tekoa dit au roi: C’est sur moi, ô roi mon seigneur, et sur la maison de mon père, que le châtiment va tomber; le roi et son trône n’auront pas à en souffrir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Le roi dit: Si quelqu’un parle contre toi, amène-le-moi, et il ne lui arrivera plus de te toucher. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Elle dit: Que le roi se souvienne de l’Éternel, ton Dieu, afin que le vengeur du sang n’augmente pas la ruine, et qu’on ne détruise pas mon fils! Et il dit: L’Éternel est vivant! Il ne tombera pas à terre un cheveu de ton fils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'La femme dit: Permets que ta servante dise un mot à mon seigneur le roi. Et il dit: Parle! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'La femme dit: Pourquoi penses-tu de la sorte à l’égard du peuple de Dieu, puisqu’il résulte des paroles mêmes du roi que le roi est comme coupable en ne rappelant pas celui qu’il a proscrit? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il nous faut certainement mourir, et nous serons comme des eaux répandues à terre et qui ne se rassemblent plus; Dieu n’ôte pas la vie, mais il désire que le fugitif ne reste pas banni de sa présence. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Maintenant, si je suis venue dire ces choses au roi mon seigneur, c’est que le peuple m’a effrayée. Et ta servante a dit: Je veux parler au roi; peut-être le roi fera-t-il ce que dira sa servante. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Oui, le roi écoutera sa servante, pour la délivrer de la main de ceux qui cherchent à nous exterminer, moi et mon fils, de l’héritage de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ta servante a dit: Que la parole de mon seigneur le roi me donne le repos. Car mon seigneur le roi est comme un ange de Dieu, prêt à entendre le bien et le mal. Et que l’Éternel, ton Dieu, soit avec toi! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Le roi répondit, et dit à la femme: Ne me cache pas ce que je vais te demander. Et la femme dit: Que mon seigneur le roi parle! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Le roi dit alors: La main de Joab n’est-elle pas avec toi dans tout ceci? Et la femme répondit: Aussi vrai que ton âme est vivante, ô roi mon seigneur, il n’y a rien à droite ni à gauche de tout ce que dit mon seigneur le roi. C’est, en effet, ton serviteur Joab qui m’a donné des ordres, et qui a mis dans la bouche de ta servante toutes ces paroles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: C’est pour donner à la chose une autre tournure que ton serviteur Joab a fait cela. Mais mon seigneur est aussi sage qu’un ange de Dieu, pour connaître tout ce qui se passe sur la terre.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 21-33: cf. 2 S 13:37-39.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Le roi dit à Joab: Voici, je veux bien faire cela; va donc, ramène le jeune homme Absalom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Joab tomba la face contre terre et se prosterna, et il bénit le roi. Puis il dit: Ton serviteur connaît aujourd’hui que j’ai trouvé grâce à tes yeux, ô roi mon seigneur, puisque le roi agit selon la parole de son serviteur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Et Joab se leva et partit pour Gueschur, et il ramena Absalom à Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Mais le roi dit: Qu’il se retire dans sa maison, et qu’il ne voie point ma face. Et Absalom se retira dans sa maison, et il ne vit point la face du roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Il n’y avait pas un homme dans tout Israël aussi renommé qu’Absalom pour sa beauté; depuis la plante du pied jusqu’au sommet de la tête, il n’y avait point en lui de défaut. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Lorsqu’il se rasait la tête, c’était chaque année qu’il se la rasait, parce que sa chevelure lui pesait, le poids des cheveux de sa tête était de deux cents sicles, poids du roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Il naquit à Absalom trois fils, et une fille nommée Tamar, qui était une femme belle de figure. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Absalom demeura deux ans à Jérusalem, sans voir la face du roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Il fit demander Joab, pour l’envoyer vers le roi; mais Joab ne voulut point venir auprès de lui. Il le fit demander une seconde fois; et Joab ne voulut point venir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Absalom dit alors à ses serviteurs: Voyez, le champ de Joab est à côté du mien; il y a de l’orge; allez et mettez-y le feu. Et les serviteurs d’Absalom mirent le feu au champ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Joab se leva et se rendit auprès d’Absalom, dans sa maison. Il lui dit: Pourquoi tes serviteurs ont-ils mis le feu au champ qui m’appartient? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Absalom répondit à Joab: Voici, je t’ai fait dire: Viens ici, et je t’enverrai vers le roi, afin que tu lui dises: Pourquoi suis-je revenu de Gueschur? Il vaudrait mieux pour moi que j’y fusse encore. Je désire maintenant voir la face du roi; et s’il y a quelque crime en moi, qu’il me fasse mourir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Joab alla vers le roi, et lui rapporta cela. Et le roi appela Absalom, qui vint auprès de lui et se prosterna la face contre terre en sa présence. Le roi baisa Absalom.
