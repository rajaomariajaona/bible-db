document_id: JER.49,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Prophétie contre les Ammonites
  - type: heading
    content: 'V. 1-6: cf. (Éz 25:1-7. Am 1:13-15. So 2:8-11.) 1 Pi 4:18.'
  - type: text
    content: Sur les enfants d’Ammon.
  - type: text
    content: 'Ainsi parle l’Éternel:'
  - type: text
    content: Israël n’a-t-il point de fils?
  - type: text
    content: N’a-t-il point d’héritier?
  - type: text
    content: 'Pourquoi Malcom possède-t-il '
  - type: note
    content: Am 1:13.
  - type: text
    content: Gad,
  - type: text
    content: Et son peuple habite-t-il ses villes?
  '10':
  - type: text
    content: Mais moi, je dépouillerai Ésaü,
  - type: text
    content: Je découvrirai ses retraites,
  - type: text
    content: Il ne pourra se cacher;
  - type: text
    content: Ses enfants, ses frères, ses voisins, périront,
  - type: text
    content: Et il ne sera plus.
  '11':
  - type: text
    content: Laisse tes orphelins, je les ferai vivre,
  - type: text
    content: Et que tes veuves se confient en moi!
  '12':
  - type: text
    content: 'Car ainsi parle l’Éternel:'
  - type: text
    content: Voici, ceux qui ne devaient pas boire la coupe la boiront;
  - type: text
    content: Et toi, tu resterais impuni!
  - type: text
    content: Tu ne resteras pas impuni,
  - type: text
    content: Tu la boiras.
  '13':
  - type: text
    content: Car je le jure par moi-même, dit l’Éternel,
  - type: text
    content: Botsra sera un objet de désolation, d’opprobre,
  - type: text
    content: De dévastation et de malédiction,
  - type: text
    content: Et toutes ses villes deviendront des ruines éternelles.
  '14':
  - type: text
    content: 'J’ai appris de l’Éternel une '
  - type: note
    content: Ab v. 1.
  - type: text
    content: nouvelle,
  - type: text
    content: 'Et un messager a été envoyé parmi les nations:'
  - type: text
    content: Assemblez-vous, et marchez contre elle!
  - type: text
    content: Levez-vous pour la guerre!
  '15':
  - type: text
    content: Car voici, je te rendrai petit parmi les nations,
  - type: text
    content: Méprisé parmi les hommes.
  '16':
  - type: text
    content: 'Ta présomption, '
  - type: note
    content: Jé 48:29.
  - type: text
    content: l’orgueil de ton cœur t’a égaré,
  - type: text
    content: Toi qui habites le creux des rochers,
  - type: text
    content: Et qui occupes le sommet des collines.
  - type: text
    content: 'Quand tu placerais ton '
  - type: note
    content: Ab v. 4.
  - type: text
    content: nid aussi haut que celui de l’aigle,
  - type: text
    content: Je t’en précipiterai, dit l’Éternel.
  '17':
  - type: text
    content: Édom sera un objet de désolation;
  - type: note
    content: Jé 50:13.
  - type: text
    content: Tous ceux qui passeront près de lui
  - type: text
    content: Seront dans l’étonnement et siffleront sur toutes ses plaies.
  '18':
  - type: text
    content: ' '
  - type: note
    content: Ge 19:25. Jé 50:40. Am 4:11.
  - type: text
    content: Comme Sodome et Gomorrhe et les villes voisines, qui furent détruites,
  - type: text
    content: Dit l’Éternel,
  - type: text
    content: Il ne sera plus habité,
  - type: text
    content: Il ne sera le séjour d’aucun homme…
  '19':
  - type: text
    content: ' '
  - type: note
    content: Jé 50:44, etc.
  - type: text
    content: 'Voici, tel qu’un lion, il monte des '
  - type: note
    content: Jé 12:5.
  - type: text
    content: rives orgueilleuses du Jourdain
  - type: text
    content: Contre la demeure forte;
  - type: text
    content: Soudain j’en ferai fuir Édom,
  - type: text
    content: Et j’établirai sur elle celui que j’ai choisi.
  - type: text
    content: 'Car qui est semblable à moi? '
  - type: note
    content: Job 41:1. Jé 50:44, 45.
  - type: text
    content: qui me donnera des ordres?
  - type: text
    content: Et quel est le chef qui me résistera?
  '2':
  - type: text
    content: C’est pourquoi voici, les jours viennent, dit l’Éternel,
  - type: text
    content: 'Où je ferai retentir le cri de guerre contre '
  - type: note
    content: Am 1:14.
  - type: text
    content: Rabbath des enfants d’Ammon;
  - type: text
    content: Elle deviendra un monceau de ruines,
  - type: text
    content: Et les villes de son ressort seront consumées par le feu;
  - type: text
    content: Alors Israël chassera ceux qui l’avaient chassé, dit l’Éternel.
  '20':
  - type: text
    content: C’est pourquoi écoutez la résolution que l’Éternel a prise contre Édom,
  - type: text
    content: Et les desseins qu’il a conçus contre les habitants de Théman!
  - type: text
    content: Certainement on les traînera comme de faibles brebis,
  - type: text
    content: Certainement on ravagera leur demeure.
  '21':
  - type: text
    content: Au bruit de leur chute, la terre tremble;
  - type: text
    content: Leur cri se fait entendre jusqu’à la mer Rouge…
  '22':
  - type: text
    content: 'Voici, '
  - type: note
    content: Jé 48:40.
  - type: text
    content: comme l’aigle il s’avance, il vole,
  - type: text
    content: Il étend ses ailes sur Botsra,
  - type: text
    content: Et le cœur des héros d’Édom est en ce jour
  - type: text
    content: 'Comme le cœur d’une '
  - type: note
    content: Jé 48:41.
  - type: text
    content: femme en travail.
  - type: heading
    content: Prophétie contre Damas
  - type: heading
    content: 'V. 23-27: cf. (És 17:1-3. Am 1:3-5.) És 33:1.'
  '23':
  - type: text
    content: 'Sur '
  - type: note
    content: És 17:1.
  - type: text
    content: Damas.
  - type: text
    content: Hamath et Arpad sont confuses,
  - type: text
    content: Car elles ont appris une mauvaise nouvelle, elles tremblent;
  - type: text
    content: C’est une mer en tourmente,
  - type: text
    content: Qui ne peut se calmer.
  '24':
  - type: text
    content: Damas est défaillante, elle se tourne pour fuir,
  - type: text
    content: Et l’effroi s’empare d’elle;
  - type: text
    content: L’angoisse et les douleurs la saisissent,
  - type: text
    content: 'Comme une '
  - type: note
    content: Jé 4:31; 6:24; 30:6.
  - type: text
    content: femme en travail.
  '25':
  - type: text
    content: Ah! Elle n’est pas abandonnée, la ville glorieuse,
  - type: text
    content: La ville qui fait ma joie!
  '26':
  - type: text
    content: C’est pourquoi ses jeunes gens tomberont dans les rues,
  - type: text
    content: Et tous ses hommes de guerre périront en ce jour,
  - type: text
    content: Dit l’Éternel des armées.
  '27':
  - type: text
    content: 'Je mettrai le '
  - type: note
    content: Am 1:4, 14.
  - type: text
    content: feu aux murs de Damas,
  - type: text
    content: Et il dévorera les palais de Ben-Hadad.
  - type: heading
    content: Prophétie contre Kédar et Élam
  - type: heading
    content: 'V. 28-33: cf. (Jé 25:23, 24. És 21:13-17.) 1 Th 5:3.'
  '28':
  - type: text
    content: Sur Kédar et les royaumes de Hatsor, que battit Nebucadnetsar, roi de Babylone.
  - type: text
    content: 'Ainsi parle l’Éternel:'
  - type: text
    content: Levez-vous, montez contre Kédar,
  - type: text
    content: Et détruisez les fils de l’Orient!
  '29':
  - type: text
    content: On prendra leurs tentes et leurs troupeaux,
  - type: text
    content: On enlèvera leurs pavillons, tous leurs bagages et leurs chameaux,
  - type: text
    content: Et l’on jettera de toutes parts contre eux des cris d’épouvante.
  '3':
  - type: text
    content: Pousse des gémissements, Hesbon, car Aï est ravagée!
  - type: text
    content: Poussez des cris, filles de Rabba, revêtez-vous de sacs,
  - type: note
    content: És 32:12. Jé 4:8; 6:26.
  - type: text
    content: Lamentez-vous, et courez çà et là le long des murailles!
  - type: text
    content: Car Malcom s’en va en captivité,
  - type: text
    content: 'Avec ses '
  - type: note
    content: Jé 48:7.
  - type: text
    content: prêtres et avec ses chefs.
  '30':
  - type: text
    content: Fuyez, fuyez de toutes vos forces, cherchez à l’écart une demeure,
  - type: text
    content: Habitants de Hatsor! Dit l’Éternel;
  - type: text
    content: Car Nebucadnetsar, roi de Babylone, a pris une résolution contre vous,
  - type: text
    content: Il a conçu un projet contre vous.
  '31':
  - type: text
    content: Levez-vous, montez contre une nation tranquille,
  - type: text
    content: En sécurité dans sa demeure, dit l’Éternel;
  - type: text
    content: Elle n’a ni portes, ni barres,
  - type: text
    content: Elle habite solitaire.
  '32':
  - type: text
    content: Leurs chameaux seront au pillage,
  - type: text
    content: Et la multitude de leurs troupeaux sera une proie;
  - type: text
    content: 'Je les disperserai à tous les vents, ceux qui se rasent '
  - type: note
    content: Jé 9:26; 25:23.
  - type: text
    content: les coins de la barbe,
  - type: text
    content: Et je ferai venir leur ruine de tous les côtés, dit l’Éternel.
  '33':
  - type: text
    content: 'Hatsor sera le repaire des '
  - type: note
    content: Jé 9:11; 10:22.
  - type: text
    content: chacals, un désert pour toujours;
  - type: text
    content: Personne n’y habitera, aucun homme n’y séjournera.
  - type: heading
    content: 'V. 34-39: cf. (Jé 25:15, 25. Éz 32:24, 25.) Ps 75:3, etc.'
  '34':
  - type: text
    content: 'La parole de l’Éternel qui fut adressée à Jérémie, le prophète, sur Élam, au commencement du règne de Sédécias, roi de Juda, en ces mots:'
  '35':
  - type: text
    content: 'Ainsi parle l’Éternel des armées:'
  - type: text
    content: Voici, je vais briser l’arc d’Élam,
  - type: text
    content: Sa principale force.
  '36':
  - type: text
    content: Je ferai venir sur Élam quatre vents des quatre extrémités du ciel,
  - type: text
    content: Je les disperserai par tous ces vents,
  - type: text
    content: Et il n’y aura pas une nation
  - type: text
    content: Où n’arrivent des fugitifs d’Élam.
  '37':
  - type: text
    content: Je ferai trembler les habitants d’Élam devant leurs ennemis
  - type: text
    content: Et devant ceux qui en veulent à leur vie,
  - type: text
    content: J’amènerai sur eux des malheurs,
  - type: text
    content: Mon ardente colère, dit l’Éternel,
  - type: text
    content: Et je les poursuivrai par l’épée,
  - type: text
    content: Jusqu’à ce que je les aie anéantis.
  '38':
  - type: text
    content: Je placerai mon trône dans Élam,
  - type: text
    content: Et j’en détruirai le roi et les chefs,
  - type: text
    content: Dit l’Éternel.
  '39':
  - type: text
    content: 'Mais dans la suite des temps, je ramènerai les '
  - type: note
    content: Jé 48:47.
  - type: text
    content: captifs d’Élam,
  - type: text
    content: Dit l’Éternel.
  '4':
  - type: text
    content: Pourquoi te glorifies-tu de tes vallées?
  - type: text
    content: Ta vallée se fond, fille rebelle,
  - type: text
    content: 'Qui te confiais dans tes '
  - type: note
    content: Jé 48:7.
  - type: text
    content: 'trésors:'
  - type: note
    content: Jé 21:13.
  - type: text
    content: Qui viendra contre moi?
  '5':
  - type: text
    content: Voici, je fais venir sur toi la terreur,
  - type: text
    content: Dit le Seigneur, l’Éternel des armées,
  - type: text
    content: Elle viendra de tous tes alentours;
  - type: text
    content: Chacun de vous sera chassé devant soi,
  - type: text
    content: Et nul ne ralliera les fuyards.
  '6':
  - type: text
    content: Mais après cela, je ramènerai les captifs des enfants d’Ammon,
  - type: text
    content: Dit l’Éternel.
  - type: heading
    content: Prophétie contre Édom
  - type: heading
    content: 'V. 7-22: cf. (Éz 25:12-14; 35. Am 1:11, 12. Ab 1, etc.) És 34. Ja 2:13.'
  '7':
  - type: text
    content: Sur Édom.
  - type: text
    content: 'Ainsi parle l’Éternel des armées:'
  - type: note
    content: Ab v. 8.
  - type: text
    content: N’y a-t-il plus de sagesse dans Théman?
  - type: text
    content: La prudence a-t-elle disparu chez les hommes intelligents?
  - type: text
    content: Leur sagesse s’est-elle évanouie?
  '8':
  - type: text
    content: Fuyez, tournez le dos, retirez-vous dans les cavernes,
  - type: text
    content: 'Habitants de '
  - type: note
    content: Jé 25:23.
  - type: text
    content: Dedan!
  - type: text
    content: Car je fais venir le malheur sur Ésaü,
  - type: text
    content: Le temps de son châtiment.
  '9':
  - type: text
    content: ' '
  - type: note
    content: Ab v. 5.
  - type: text
    content: Si des vendangeurs viennent chez toi,
  - type: text
    content: Ne laissent-ils rien à grappiller?
  - type: text
    content: Si des voleurs viennent de nuit,
  - type: text
    content: Ils ne dévastent que ce qu’ils peuvent.
