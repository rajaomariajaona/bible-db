document_id: JER.49,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prophétie contre les Ammonites
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-6: cf. (Éz 25:1-7. Am 1:13-15. So 2:8-11.) 1 Pi 4:18.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Sur les enfants d’Ammon.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ainsi parle l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Israël n’a-t-il point de fils?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N’a-t-il point d’héritier?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Pourquoi Malcom possède-t-il '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Am 1:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Gad,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et son peuple habite-t-il ses villes?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais moi, je dépouillerai Ésaü,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je découvrirai ses retraites,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne pourra se cacher;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses enfants, ses frères, ses voisins, périront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il ne sera plus.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Laisse tes orphelins, je les ferai vivre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que tes veuves se confient en moi!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car ainsi parle l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, ceux qui ne devaient pas boire la coupe la boiront;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et toi, tu resterais impuni!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu ne resteras pas impuni,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu la boiras.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car je le jure par moi-même, dit l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Botsra sera un objet de désolation, d’opprobre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De dévastation et de malédiction,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et toutes ses villes deviendront des ruines éternelles.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'J’ai appris de l’Éternel une '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ab v. 1.
      marker-yv: yv-n
    - type: text
      text: nouvelle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et un messager a été envoyé parmi les nations:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Assemblez-vous, et marchez contre elle!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Levez-vous pour la guerre!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car voici, je te rendrai petit parmi les nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Méprisé parmi les hommes.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ta présomption, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 48:29
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: l’orgueil de ton cœur t’a égaré,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toi qui habites le creux des rochers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qui occupes le sommet des collines.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Quand tu placerais ton '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ab v. 4.
      marker-yv: yv-n
    - type: text
      text: nid aussi haut que celui de l’aigle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je t’en précipiterai, dit l’Éternel.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Édom sera un objet de désolation;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 50:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Tous ceux qui passeront près de lui
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Seront dans l’étonnement et siffleront sur toutes ses plaies.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 19:25
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 50:40
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Am 4:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Comme Sodome et Gomorrhe et les villes voisines, qui furent détruites,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne sera plus habité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne sera le séjour d’aucun homme…
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Jé 50:44, etc.
      marker-yv: yv-n
    - type: text
      text: 'Voici, tel qu’un lion, il monte des '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 12:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: rives orgueilleuses du Jourdain
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Contre la demeure forte;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Soudain j’en ferai fuir Édom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et j’établirai sur elle celui que j’ai choisi.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car qui est semblable à moi? '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 41:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 50:44
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '45'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: qui me donnera des ordres?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et quel est le chef qui me résistera?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est pourquoi voici, les jours viennent, dit l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Où je ferai retentir le cri de guerre contre '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Am 1:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Rabbath des enfants d’Ammon;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle deviendra un monceau de ruines,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les villes de son ressort seront consumées par le feu;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors Israël chassera ceux qui l’avaient chassé, dit l’Éternel.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est pourquoi écoutez la résolution que l’Éternel a prise contre Édom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les desseins qu’il a conçus contre les habitants de Théman!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Certainement on les traînera comme de faibles brebis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Certainement on ravagera leur demeure.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au bruit de leur chute, la terre tremble;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leur cri se fait entendre jusqu’à la mer Rouge…
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 48:40
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: comme l’aigle il s’avance, il vole,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il étend ses ailes sur Botsra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le cœur des héros d’Édom est en ce jour
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Comme le cœur d’une '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 48:41
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: femme en travail.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prophétie contre Damas
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 23-27: cf. (És 17:1-3. Am 1:3-5.) És 33:1.'
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sur '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 17:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Damas.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hamath et Arpad sont confuses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car elles ont appris une mauvaise nouvelle, elles tremblent;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est une mer en tourmente,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui ne peut se calmer.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Damas est défaillante, elle se tourne pour fuir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’effroi s’empare d’elle;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’angoisse et les douleurs la saisissent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Comme une '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 4:31
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:24
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 30:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: femme en travail.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ah! Elle n’est pas abandonnée, la ville glorieuse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La ville qui fait ma joie!
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est pourquoi ses jeunes gens tomberont dans les rues,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tous ses hommes de guerre périront en ce jour,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit l’Éternel des armées.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je mettrai le '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Am 1:4
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: feu aux murs de Damas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il dévorera les palais de Ben-Hadad.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prophétie contre Kédar et Élam
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 28-33: cf. (Jé 25:23, 24. És 21:13-17.) 1 Th 5:3.'
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Sur Kédar et les royaumes de Hatsor, que battit Nebucadnetsar, roi de Babylone.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ainsi parle l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Levez-vous, montez contre Kédar,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et détruisez les fils de l’Orient!
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On prendra leurs tentes et leurs troupeaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On enlèvera leurs pavillons, tous leurs bagages et leurs chameaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’on jettera de toutes parts contre eux des cris d’épouvante.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pousse des gémissements, Hesbon, car Aï est ravagée!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Poussez des cris, filles de Rabba, revêtez-vous de sacs,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 32:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 4:8
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:26
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Lamentez-vous, et courez çà et là le long des murailles!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car Malcom s’en va en captivité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Avec ses '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 48:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: prêtres et avec ses chefs.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fuyez, fuyez de toutes vos forces, cherchez à l’écart une demeure,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Habitants de Hatsor! Dit l’Éternel;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car Nebucadnetsar, roi de Babylone, a pris une résolution contre vous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a conçu un projet contre vous.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Levez-vous, montez contre une nation tranquille,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En sécurité dans sa demeure, dit l’Éternel;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle n’a ni portes, ni barres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle habite solitaire.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leurs chameaux seront au pillage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la multitude de leurs troupeaux sera une proie;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je les disperserai à tous les vents, ceux qui se rasent '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 9:26
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 25:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: les coins de la barbe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je ferai venir leur ruine de tous les côtés, dit l’Éternel.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hatsor sera le repaire des '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 9:11
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: chacals, un désert pour toujours;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Personne n’y habitera, aucun homme n’y séjournera.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 34-39: cf. (Jé 25:15, 25. Éz 32:24, 25.) Ps 75:3, etc.'
    marker-yv: yv-h
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'La parole de l’Éternel qui fut adressée à Jérémie, le prophète, sur Élam, au commencement du règne de Sédécias, roi de Juda, en ces mots:'
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ainsi parle l’Éternel des armées:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, je vais briser l’arc d’Élam,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sa principale force.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ferai venir sur Élam quatre vents des quatre extrémités du ciel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je les disperserai par tous ces vents,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il n’y aura pas une nation
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Où n’arrivent des fugitifs d’Élam.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ferai trembler les habitants d’Élam devant leurs ennemis
  - type: usfm
    marker: q1
    children:
    - type: text
