type_code: fra
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: INTRODUCTION AU LIVRE DE RUTH
  - type: usfm
    marker: imt3
    children:
    - type: text
      text: (Ro 9:25, 26. Ac 10:35.) Ro 14:7. 1 Ti 5:4, 14. Ps 113:5-9.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Ce livre de la Bible a pour titre le nom d’une femme d’une loyauté exemplaire, une moabite, Ruth. Ce récit se déroule logiquement en quatre parties (1:6-18; 2:1-17; 3:1-5; 4:1-12) précédées d’une introduction (1:1-5) et suivies d’une conclusion (4:18-22); trois intermèdes servent de transitions (1:19-22; 2:18-23; 3:16-18).
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Chaque étape du récit met en évidence les qualités de cette jeune fille: dans l’adversité, elle ne se résout pas à abandonner Naomi, sa belle-mère (1); elle entreprend courageusement de glaner dans le champ de Boaz, un parent de Naomi, pour assurer leur survie à toutes les deux (2); elle met tout en œuvre pour demander le mariage (3), ce qui procurera subsistance et pérennité pour la famille (4). Ruth devint ainsi bisaïeule du roi David, dont la généalogie constitue l’épilogue de l’ouvrage.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Le chapitre 1:1-8 pourrait s’intituler: de Bethléhem de Juda au pays de Moab, récit d’un aller et retour. Une famille israélite composée du père Élimélec, de la mère Naomi, et de leurs fils Machlon et Kiljon, s’exile au pays de Moab suite à '
    - type: usfm
      marker: it
      children:
      - type: text
        text: «une famine dans le pays»
    - type: text
      text: ' (1:1).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Ayant perdu tous les membres de sa famille, Naomi décida à rentrer à Bethléhem. De ses deux belles-filles Orpa et Ruth, seule la dernière se décida à rentrer avec elle en lui disant: '
    - type: usfm
      marker: it
      children:
      - type: text
        text: «Où tu iras j’irai, où tu demeureras je demeurerai; ton peuple sera mon peuple, et ton Dieu sera mon Dieu; où tu mourras je mourrai, et j’y serai enterrée»
    - type: text
      text: ' (1:16).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Les chapitres 1 à 4 relatent le processus du mariage léviratique providentiellement conduit par le Dieu d’Israël, mariage entre Ruth et Boaz. Par ce mariage, Ruth, une étrangère, modèle de piété, aïeule du roi David, figure dans la généalogie du Messie selon Mt 1:5. C’est Naomi qui initie la rencontre de Ruth avec le riche et puissant Bethléhémite Boaz. Cette belle-mère a eu un but très louable pour sa belle-fille: '
    - type: usfm
      marker: it
      children:
      - type: text
        text: «Ma fille, je voudrais assurer ton repos, afin que tu fusses heureuse»
    - type: text
      text: ' (3:1).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Boaz procède sans ambages à ce mariage (4:1-12) et prend officiellement Ruth pour femme. De cette union naquit Obed, père d’Isaï, père de David (4:17). Tel fut donc le dénouement heureux et surtout la consolation pour Naomi et Ruth.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Ce qui compte pour le Dieu d’Israël c’est la foi en lui seul et l’observance de ses préceptes, non l’ethnie du fidèle. La fidélité persévérante est toujours récompensée.
