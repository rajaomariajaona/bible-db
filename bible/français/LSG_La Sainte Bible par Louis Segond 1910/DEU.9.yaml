document_id: DEU.9,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Souvenir des rébellions d’Israël
  - type: heading
    content: 'V. 1-29: cf. (Ps 44:2-4. Ge 15:16, 18. Lé 18:24, 25.) (Ps 78:1-55. Éz 20:5-22.) Ex 32.'
  - type: text
    content: 'Écoute, Israël! Tu vas aujourd’hui passer le Jourdain, pour te rendre maître de nations plus grandes et plus puissantes que toi, de villes grandes et fortifiées jusqu’au ciel, '
  '10':
  - type: text
    content: 'et l’Éternel me donna les deux tables de pierre écrites '
  - type: note
    content: Ex 31:18.
  - type: text
    content: 'du doigt de Dieu, et contenant toutes les paroles que l’Éternel vous avait dites sur la montagne, du milieu du feu, le jour de l’assemblée. '
  '11':
  - type: text
    content: 'Ce fut au bout des quarante jours et des quarante nuits que l’Éternel me donna les deux tables de pierre, les tables de l’alliance. '
  '12':
  - type: text
    content: 'L’Éternel me dit alors: Lève-toi, descends en hâte d’ici; car ton peuple, que tu as fait sortir d’Égypte, s’est corrompu. Ils se sont promptement écartés de la voie que je leur avais prescrite; ils se sont fait une image de fonte. '
  '13':
  - type: text
    content: 'L’Éternel me dit: Je vois que ce peuple est un peuple '
  - type: note
    content: Ex 32:9; 33:3; 34:9. De 10:16; 31:27. 2 R 17:14.
  - type: text
    content: 'au cou roide. '
  '14':
  - type: note
    content: Ex 32:10. Ps 106:23.
  - type: text
    content: 'Laisse-moi les détruire et effacer leur nom de dessous les cieux; et je ferai de toi une nation plus puissante et plus nombreuse que ce peuple. '
  '15':
  - type: text
    content: 'Je retournai et je descendis de la montagne toute en feu, les deux tables de l’alliance dans mes deux mains. '
  '16':
  - type: text
    content: 'Je regardai, et voici, vous aviez péché contre l’Éternel, votre Dieu, vous vous étiez fait un veau de fonte, vous vous étiez promptement écartés de la voie que vous avait prescrite l’Éternel. '
  '17':
  - type: text
    content: 'Je saisis les deux tables, je les jetai de mes mains, et je les brisai sous vos yeux. '
  '18':
  - type: text
    content: 'Je me prosternai devant l’Éternel, comme auparavant, quarante jours et quarante nuits, sans manger de pain et sans boire d’eau, à cause de tous les péchés que vous aviez commis en faisant ce qui est mal aux yeux de l’Éternel, pour l’irriter. '
  '19':
  - type: text
    content: 'Car j’étais effrayé à la vue de la colère et de la fureur dont l’Éternel était animé contre vous jusqu’à vouloir vous détruire. Mais l’Éternel m’exauça encore cette fois. '
  '2':
  - type: text
    content: 'd’un peuple grand et de haute taille, les enfants d’Anak, que tu connais, et '
  - type: note
    content: No 13:32, 33.
  - type: text
    content: 'dont tu as entendu dire: Qui pourra tenir contre les enfants d’Anak? '
  '20':
  - type: text
    content: 'L’Éternel était aussi très irrité contre Aaron, qu’il voulait faire périr, et pour qui j’intercédai encore dans ce temps-là. '
  '21':
  - type: note
    content: Ex 32:20.
  - type: text
    content: 'Je pris le veau que vous aviez fait, ce produit de votre péché, je le brûlai au feu, je le broyai jusqu’à ce qu’il fût réduit en poudre, et je jetai cette poudre dans le torrent qui descend de la montagne. '
  '22':
  - type: note
    content: No 11:1.
  - type: text
    content: 'A Tabeéra, '
  - type: note
    content: Ex 17:7.
  - type: text
    content: 'à Massa, et '
  - type: note
    content: No 11:4, 34.
  - type: text
    content: 'à Kibroth-Hattaava, vous excitâtes la colère de l’Éternel. '
  '23':
  - type: text
    content: 'Et lorsque l’Éternel vous envoya à Kadès-Barnéa, en disant: '
  - type: note
    content: No 13:3; 14:1.
  - type: text
    content: 'Montez, et prenez possession du pays que je vous donne! Vous fûtes rebelles à l’ordre de l’Éternel, votre Dieu, vous n’eûtes point foi en lui, et vous n’obéîtes point à sa voix. '
  '24':
  - type: text
    content: 'Vous avez été rebelles contre l’Éternel depuis que je vous connais. '
  '25':
  - type: text
    content: 'Je me prosternai devant l’Éternel, je me prosternai quarante jours et quarante nuits, parce que l’Éternel avait dit qu’il voulait vous détruire. '
  '26':
  - type: text
    content: 'Je priai l’Éternel, et je dis: '
  - type: note
    content: Ex 32:11. No 14:13.
  - type: text
    content: 'Seigneur Éternel, ne détruis pas ton peuple, ton héritage, que tu as racheté dans ta grandeur, que tu as fait sortir d’Égypte par ta main puissante. '
  '27':
  - type: text
    content: 'Souviens-toi de tes serviteurs, Abraham, Isaac et Jacob. Ne regarde point à l’opiniâtreté de ce peuple, à sa méchanceté et à son péché, '
  '28':
  - type: text
    content: 'de peur que le pays d’où tu nous as fait sortir '
  - type: note
    content: Ex 32:12. No 14:16.
  - type: text
    content: 'ne dise: C’est parce que l’Éternel n’avait pas le pouvoir de les mener dans le pays qu’il leur avait promis, et c’est parce qu’il les haïssait, qu’il les a fait sortir pour les faire mourir dans le désert. '
  '29':
  - type: text
    content: Ils sont pourtant ton peuple et ton héritage, que tu as fait sortir d’Égypte par ta grande puissance et par ton bras étendu.
  '3':
  - type: text
    content: 'Sache aujourd’hui que l’Éternel, ton Dieu, marchera lui-même devant toi comme '
  - type: note
    content: De 4:24. Hé 12:29.
  - type: text
    content: 'un feu dévorant, c’est lui qui les détruira, qui les humiliera devant toi; et tu les chasseras, tu les feras périr promptement, comme l’Éternel te l’a dit. '
  '4':
  - type: text
    content: 'Lorsque l’Éternel, ton Dieu, les chassera devant toi, ne dis pas en ton cœur: C’est à cause de ma justice que l’Éternel me fait entrer en possession de ce pays. Car c’est à cause de la méchanceté de ces nations que l’Éternel les chasse devant toi. '
  '5':
  - type: text
    content: 'Non, ce n’est point à cause de ta justice et de la droiture de ton cœur que tu entres en possession de leur pays; mais c’est à cause de la méchanceté de ces nations que l’Éternel, ton Dieu, les chasse devant toi, et c’est pour confirmer la parole que l’Éternel a '
  - type: note
    content: Ge 12:7; 13:15; 15:7; 17:8; 26:4; 28:13.
  - type: text
    content: 'jurée à tes pères, à Abraham, à Isaac et à Jacob. '
  '6':
  - type: text
    content: 'Sache donc que ce n’est point à cause de ta justice que l’Éternel, ton Dieu, te donne ce bon pays pour que tu le possèdes; car tu es un peuple au cou roide. '
  '7':
  - type: text
    content: 'Souviens-toi, n’oublie pas de quelle manière tu as '
  - type: note
    content: Ex 14:11; 16:2; 17:2. No 11:4.
  - type: text
    content: 'excité la colère de l’Éternel, ton Dieu, dans le désert. Depuis le jour où tu es sorti du pays d’Égypte jusqu’à votre arrivée dans ce lieu, vous avez été rebelles contre l’Éternel. '
  '8':
  - type: note
    content: Ex 32:4. Ps 106:19.
  - type: text
    content: 'A Horeb, vous excitâtes la colère de l’Éternel; et l’Éternel s’irrita contre vous, et eut la pensée de vous détruire. '
  '9':
  - type: text
    content: 'Lorsque je fus monté sur la montagne, pour prendre les tables de pierre, les tables de l’alliance que l’Éternel a traitée avec vous, '
  - type: note
    content: Ex 24:18; 34:28.
  - type: text
    content: 'je demeurai sur la montagne quarante jours et quarante nuits, sans manger de pain et sans boire d’eau; '
