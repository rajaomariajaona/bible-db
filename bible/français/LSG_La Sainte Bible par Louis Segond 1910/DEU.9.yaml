document_id: DEU.9,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Souvenir des rébellions d’Israël
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-29: cf. (Ps 44:2-4. Ge 15:16, 18. Lé 18:24, 25.) (Ps 78:1-55. Éz 20:5-22.) Ex 32.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Écoute, Israël! Tu vas aujourd’hui passer le Jourdain, pour te rendre maître de nations plus grandes et plus puissantes que toi, de villes grandes et fortifiées jusqu’au ciel, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'et l’Éternel me donna les deux tables de pierre écrites '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 31:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'du doigt de Dieu, et contenant toutes les paroles que l’Éternel vous avait dites sur la montagne, du milieu du feu, le jour de l’assemblée. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ce fut au bout des quarante jours et des quarante nuits que l’Éternel me donna les deux tables de pierre, les tables de l’alliance. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'L’Éternel me dit alors: Lève-toi, descends en hâte d’ici; car ton peuple, que tu as fait sortir d’Égypte, s’est corrompu. Ils se sont promptement écartés de la voie que je leur avais prescrite; ils se sont fait une image de fonte. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'L’Éternel me dit: Je vois que ce peuple est un peuple '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 32:9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 33:3
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 34:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 10:16
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 31:27
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 17:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'au cou roide. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 32:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 106:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Laisse-moi les détruire et effacer leur nom de dessous les cieux; et je ferai de toi une nation plus puissante et plus nombreuse que ce peuple. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Je retournai et je descendis de la montagne toute en feu, les deux tables de l’alliance dans mes deux mains. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Je regardai, et voici, vous aviez péché contre l’Éternel, votre Dieu, vous vous étiez fait un veau de fonte, vous vous étiez promptement écartés de la voie que vous avait prescrite l’Éternel. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Je saisis les deux tables, je les jetai de mes mains, et je les brisai sous vos yeux. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Je me prosternai devant l’Éternel, comme auparavant, quarante jours et quarante nuits, sans manger de pain et sans boire d’eau, à cause de tous les péchés que vous aviez commis en faisant ce qui est mal aux yeux de l’Éternel, pour l’irriter. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Car j’étais effrayé à la vue de la colère et de la fureur dont l’Éternel était animé contre vous jusqu’à vouloir vous détruire. Mais l’Éternel m’exauça encore cette fois. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'd’un peuple grand et de haute taille, les enfants d’Anak, que tu connais, et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 13:32
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '33'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'dont tu as entendu dire: Qui pourra tenir contre les enfants d’Anak? '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'L’Éternel était aussi très irrité contre Aaron, qu’il voulait faire périr, et pour qui j’intercédai encore dans ce temps-là. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 32:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Je pris le veau que vous aviez fait, ce produit de votre péché, je le brûlai au feu, je le broyai jusqu’à ce qu’il fût réduit en poudre, et je jetai cette poudre dans le torrent qui descend de la montagne. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 11:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'A Tabeéra, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 17:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'à Massa, et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 11:4
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '34'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'à Kibroth-Hattaava, vous excitâtes la colère de l’Éternel. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Et lorsque l’Éternel vous envoya à Kadès-Barnéa, en disant: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 13:3
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Montez, et prenez possession du pays que je vous donne! Vous fûtes rebelles à l’ordre de l’Éternel, votre Dieu, vous n’eûtes point foi en lui, et vous n’obéîtes point à sa voix. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Vous avez été rebelles contre l’Éternel depuis que je vous connais. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Je me prosternai devant l’Éternel, je me prosternai quarante jours et quarante nuits, parce que l’Éternel avait dit qu’il voulait vous détruire. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Je priai l’Éternel, et je dis: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 32:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 14:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Seigneur Éternel, ne détruis pas ton peuple, ton héritage, que tu as racheté dans ta grandeur, que tu as fait sortir d’Égypte par ta main puissante. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Souviens-toi de tes serviteurs, Abraham, Isaac et Jacob. Ne regarde point à l’opiniâtreté de ce peuple, à sa méchanceté et à son péché, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'de peur que le pays d’où tu nous as fait sortir '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 32:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 14:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'ne dise: C’est parce que l’Éternel n’avait pas le pouvoir de les mener dans le pays qu’il leur avait promis, et c’est parce qu’il les haïssait, qu’il les a fait sortir pour les faire mourir dans le désert. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Ils sont pourtant ton peuple et ton héritage, que tu as fait sortir d’Égypte par ta grande puissance et par ton bras étendu.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Sache aujourd’hui que l’Éternel, ton Dieu, marchera lui-même devant toi comme '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 4:24
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 12:29
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'un feu dévorant, c’est lui qui les détruira, qui les humiliera devant toi; et tu les chasseras, tu les feras périr promptement, comme l’Éternel te l’a dit. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Lorsque l’Éternel, ton Dieu, les chassera devant toi, ne dis pas en ton cœur: C’est à cause de ma justice que l’Éternel me fait entrer en possession de ce pays. Car c’est à cause de la méchanceté de ces nations que l’Éternel les chasse devant toi. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Non, ce n’est point à cause de ta justice et de la droiture de ton cœur que tu entres en possession de leur pays; mais c’est à cause de la méchanceté de ces nations que l’Éternel, ton Dieu, les chasse devant toi, et c’est pour confirmer la parole que l’Éternel a '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 12:7
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 13:15
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:7
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 17:8
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 26:4
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 28:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'jurée à tes pères, à Abraham, à Isaac et à Jacob. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Sache donc que ce n’est point à cause de ta justice que l’Éternel, ton Dieu, te donne ce bon pays pour que tu le possèdes; car tu es un peuple au cou roide. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Souviens-toi, n’oublie pas de quelle manière tu as '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 14:11
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 17:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 11:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'excité la colère de l’Éternel, ton Dieu, dans le désert. Depuis le jour où tu es sorti du pays d’Égypte jusqu’à votre arrivée dans ce lieu, vous avez été rebelles contre l’Éternel. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 32:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 106:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'A Horeb, vous excitâtes la colère de l’Éternel; et l’Éternel s’irrita contre vous, et eut la pensée de vous détruire. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Lorsque je fus monté sur la montagne, pour prendre les tables de pierre, les tables de l’alliance que l’Éternel a traitée avec vous, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 24:18
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 34:28
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'je demeurai sur la montagne quarante jours et quarante nuits, sans manger de pain et sans boire d’eau; '
