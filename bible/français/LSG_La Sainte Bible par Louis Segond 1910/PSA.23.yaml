      text: .
    marker-yv: yv-n
  - type: text
    text: Quand je marche dans la vallée de l’ombre de la mort,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Je ne crains aucun mal, car tu es avec moi:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ta houlette et ton bâton me rassurent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tu dresses devant moi une table,
- type: usfm
  marker: q1
  children:
  - type: text
    text: En face de mes adversaires;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu oins d’huile ma tête,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ma coupe déborde.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Oui, le bonheur et la grâce m’accompagneront
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous les jours de ma vie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et j’habiterai dans la maison de l’Éternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jusqu’à la fin de mes jours.
