    marker-yv: yv-n
  - type: text
    text: 'L’Éternel est mon berger: je ne manquerai de rien.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Il me fait reposer dans de verts pâturages,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il me dirige près des eaux paisibles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Il restaure mon âme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il me conduit dans les sentiers de la justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A cause de son nom.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
