      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 34:23
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 10:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 2:25
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 7:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'L’Éternel est mon berger: je ne manquerai de rien.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Il me fait reposer dans de verts pâturages,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il me dirige près des eaux paisibles.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Il restaure mon âme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il me conduit dans les sentiers de la justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause de son nom.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 3:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 118:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Quand je marche dans la vallée de l’ombre de la mort,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je ne crains aucun mal, car tu es avec moi:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ta houlette et ton bâton me rassurent.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Tu dresses devant moi une table,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En face de mes adversaires;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu oins d’huile ma tête,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ma coupe déborde.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Oui, le bonheur et la grâce m’accompagneront
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous les jours de ma vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et j’habiterai dans la maison de l’Éternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jusqu’à la fin de mes jours.
