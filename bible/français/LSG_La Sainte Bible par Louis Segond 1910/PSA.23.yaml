document_id: PSA.23,93
type_code: fra
verses:
  '1':
  - type: heading
    content: És 40:11. Éz 34:11-31. Jn 10:10-30. Ap 7:16, 17.
  - type: text
    content: Cantique de David.
  - type: note
    content: És 40:11. Jé 23:4. Éz 34:23. Jn 10:11. 1 Pi 2:25. Ap 7:17.
  - type: text
    content: 'L’Éternel est mon berger: je ne manquerai de rien.'
  '2':
  - type: text
    content: Il me fait reposer dans de verts pâturages,
  - type: text
    content: Il me dirige près des eaux paisibles.
  '3':
  - type: text
    content: Il restaure mon âme,
  - type: text
    content: Il me conduit dans les sentiers de la justice,
  - type: text
    content: A cause de son nom.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Ps 3:6; 118:6.
  - type: text
    content: Quand je marche dans la vallée de l’ombre de la mort,
  - type: text
    content: 'Je ne crains aucun mal, car tu es avec moi:'
  - type: text
    content: Ta houlette et ton bâton me rassurent.
  '5':
  - type: text
    content: Tu dresses devant moi une table,
  - type: text
    content: En face de mes adversaires;
  - type: text
    content: Tu oins d’huile ma tête,
  - type: text
    content: Et ma coupe déborde.
  '6':
  - type: text
    content: Oui, le bonheur et la grâce m’accompagneront
  - type: text
    content: Tous les jours de ma vie,
  - type: text
    content: Et j’habiterai dans la maison de l’Éternel
  - type: text
    content: Jusqu’à la fin de mes jours.
