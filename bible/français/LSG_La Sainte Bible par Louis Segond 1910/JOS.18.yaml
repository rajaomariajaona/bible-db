document_id: JOS.18,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Territoires échus aux sept tribus de Benjamin, de Siméon, de Zabulon, d’Issacar, d’Aser, de Nephthali, et de Dan
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-10: cf. Jos 14:1-5. No 33:53.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toute l’assemblée des enfants d’Israël se réunit à Silo, et ils y placèrent la tente d’assignation. Le pays était soumis devant eux. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Josué jeta pour eux le sort à Silo devant l’Éternel, et il fit le partage du pays entre les enfants d’Israël, en donnant à chacun sa portion.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 11-28: cf. De 33:12.'
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le sort tomba sur la tribu des fils de Benjamin, selon leurs familles, et la part qui leur échut par le sort avait ses limites entre les fils de Juda et les fils de Joseph. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Du côté septentrional, leur limite partait du Jourdain. Elle montait au nord de Jéricho, s’élevait dans la montagne vers l’occident, et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 7:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'aboutissait au désert de Beth-Aven. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elle passait de là par Luz, au midi de Luz, qui est Béthel, et elle descendait à Atharoth-Addar par-dessus la montagne qui est au midi de Beth-Horon la basse. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Du côté occidental, la limite se prolongeait et tournait au midi depuis la montagne qui est vis-à-vis de Beth-Horon; elle continuait vers le midi, et aboutissait à Kirjath-Baal, qui est Kirjath-Jearim, ville des fils de Juda. C’était le côté occidental. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le côté méridional commençait à l’extrémité de Kirjath-Jearim. La limite se prolongeait vers l’occident jusqu’à la source des eaux de Nephthoach. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elle descendait à l’extrémité de la montagne qui est vis-à-vis de la vallée de Ben-Hinnom, dans la vallée des Rephaïm au nord. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 15:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Elle descendait par la vallée de Hinnom, sur le côté méridional des Jébusiens, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 15:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'jusqu’à En-Roguel. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elle se dirigeait vers le nord à En-Schémesch, puis à Gueliloth, qui est vis-à-vis de la montée d’Adummim, et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 15:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'elle descendait à la pierre de Bohan, fils de Ruben. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elle passait sur le côté septentrional en face d’Araba, descendait à Araba, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et continuait sur le côté septentrional de Beth-Hogla, pour aboutir à la langue septentrionale de la mer Salée, vers l’embouchure du Jourdain au midi. C’était la limite méridionale. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il restait sept tribus des enfants d’Israël qui n’avaient pas encore reçu leur héritage. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Du côté oriental, le Jourdain formait la limite. Tel fut l’héritage des fils de Benjamin, selon leurs familles, avec ses limites de tous les côtés. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les villes de la tribu des fils de Benjamin, selon leurs familles, étaient: Jéricho, Beth-Hogla, Émek-Ketsits, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Beth-Araba, Tsemaraïm, Béthel, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avvim, Para, Ophra, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kephar-Ammonaï, Ophni et Guéba; douze villes, et leurs villages. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Gabaon, Rama, Beéroth, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mitspé, Kephira, Motsa, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rékem, Jirpeel, Thareala, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tséla, Éleph, Jebus, qui est Jérusalem, Guibeath, et Kirjath; quatorze villes, et leurs villages. Tel fut l’héritage des fils de Benjamin, selon leurs familles.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Josué dit aux enfants d’Israël: Jusques à quand négligerez-vous de prendre possession du pays que l’Éternel, le Dieu de vos pères, vous a donné? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Choisissez trois hommes par tribu, et je les ferai partir. Ils se lèveront, parcourront le pays, traceront un plan en vue du partage, et reviendront auprès de moi. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils le diviseront en sept parts; Juda restera dans ses limites au midi, et la maison de Joseph restera dans ses limites au nord. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous donc, vous tracerez un plan du pays en sept parts, et vous me l’apporterez ici. Je jetterai pour vous le sort devant l’Éternel, notre Dieu. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais il n’y aura point de part pour les Lévites au milieu de vous, car le sacerdoce de l’Éternel est leur héritage; et Gad, Ruben et la demi-tribu de Manassé ont reçu leur héritage, que Moïse, serviteur de l’Éternel, leur a donné de l’autre côté du Jourdain, à l’orient. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque ces hommes se levèrent et partirent pour tracer un plan du pays, Josué leur donna cet ordre: Allez, parcourez le pays, tracez-en un plan, et revenez auprès de moi; puis je jetterai pour vous le sort devant l’Éternel, à Silo. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ces hommes partirent, parcoururent le pays, et en tracèrent d’après les villes un plan en sept parts, dans un livre; et ils revinrent auprès de Josué dans le camp à Silo. '
