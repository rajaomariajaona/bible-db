document_id: PHM.INTRO1
type_code: fra
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: INTRODUCTION À L’ÉPÎTRE À PHILÉMON
- type: usfm
  marker: imt3
  children:
  - type: text
    text: (2 Co 8:21. Col 3:17.) (1 Th 2:7.)
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Comme celles à Timothée et à Tite, l’épître à Philémon est adressée à un individu à titre personnel. Elle est par ailleurs la dernière de la liste de celles attribuées à Paul. Il s’agit d’un billet d’un seul chapitre. Elle s’adresse en premier à Philémon. Mais Paul entend toucher à travers lui la sœur Apphia, Archippe et toute l’Église qui se réunit dans sa maison (1-3). En voici la structure:'
- type: usfm
  marker: io1
  children:
  - type: text
    text: '1. Adresse et salutations '
  - type: usfm
    marker: ior
    children:
    - type: text
      text: 1-3
- type: usfm
  marker: io1
  children:
  - type: text
    text: '2. Action de grâces au sujet de la foi et de la charité de Philémon '
  - type: usfm
    marker: ior
    children:
    - type: text
      text: 4-7
- type: usfm
  marker: io1
  children:
  - type: text
    text: '3. Intercession de Paul pour l’esclave Onésime '
  - type: usfm
    marker: ior
    children:
    - type: text
      text: 8-21
- type: usfm
  marker: io1
  children:
  - type: text
    text: '4. Communication personnelle et salutations finales '
  - type: usfm
    marker: ior
    children:
    - type: text
      text: 22-25
- type: usfm
  marker: ip
  children:
  - type: text
    text: L’information qui se dégage des trois premiers versets amène à comprendre que Philémon est un chrétien de Colosses, qu’il serait un personnage aisé qui avait mis sa maison à la disposition des réunions de l’Église. La sœur Apphia serait sa propre femme, et Archippe, son fils.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Après quelques mots d’action de grâce pour la foi et la charité ambiante, Paul aborde le sujet qui le préoccupe, à savoir son intervention pour l’esclave de Philémon: Onésime.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Celui-ci s’était rendu coupable en fuyant de chez son maître. Opportunément, il se retrouva en prison avec l’apôtre Paul qui réussit à le convertir à la foi chrétienne. Désormais les rapports d’Onésime avec Philémon étaient ceux d’un esclave chrétien à un maître chrétien. C’est pourquoi, lorsque Onésime bénéficia de la liberté, l’apôtre Paul le recommanda à Philémon. Paul invita alors Philémon à trouver désormais en Onésime, non plus un esclave coupable de délit de fuite, mais un frère en Jésus-Christ qu’il convenait de recevoir avec bienveillance.
- type: usfm
  marker: ip
  children:
  - type: text
    text: Le billet à Philémon traite donc des bonnes relations qui doivent exister entre les serviteurs et leurs maîtres, surtout lorsque ceux-ci sont l’un et l’autre chrétiens.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'L’auteur résume le message de cette épître en ces termes: '
  - type: usfm
    marker: it
    children:
    - type: text
      text: «Je te prie pour mon enfant, que j’ai engendré étant dans les chaînes, Onésime, qui autrefois t’a été inutile, mais qui maintenant est utile et à toi et à moi. Je te le renvoie lui, mes propres entrailles… Peut-être a-t-il été séparé de toi pour un temps, afin que tu le recouvres pour l’éternité, non plus comme un esclave, mais comme un frère bien-aimé… Si donc tu me tiens pour ton ami, reçois-le comme moi-même…»
  - type: text
    text: ' (voir 10-17).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Ce court billet de 25 versets fut probablement composé au même moment, et sans doute dans les mêmes circonstances, que les épîtres aux Colossiens, aux Éphésiens et aux Philippiens, avec lesquelles il forme les épîtres dites de la captivité, dans lesquelles l’auteur mentionne chaque fois qu’il se trouve dans les chaînes (Phm 9; Col 4:3; Éph 3:1; Phil 1:7).
- type: usfm
  marker: ip
  children:
  - type: text
    text: Onésime et Paul se sont retrouvés en prison, l’un comme malfrat, l’autre comme apôtre de la Bonne Nouvelle de Jésus-Christ. Sortis de prison, Onésime s’était réfugié chez Paul, comptant sur la protection de son autorité spirituelle. L’opportunité fut concluante puisque l’apôtre Paul tente un arrangement à l’amiable de la situation d’Onésime. Il renvoie le malfrat converti auprès de son maître en compagnie de Tychique, tous deux porteurs de cette courte mais magnifique correspondance destinée à régler un conflit.
