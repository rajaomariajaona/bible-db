document_id: PSA.99,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ps 97; 95.
  - type: text
    content: 'L’Éternel règne: les peuples tremblent;'
  - type: text
    content: 'Il est assis sur les chérubins: la terre chancelle.'
  '2':
  - type: text
    content: L’Éternel est grand dans Sion,
  - type: text
    content: Il est élevé au-dessus de tous les peuples.
  '3':
  - type: text
    content: Qu’on célèbre ton nom grand et redoutable!
  - type: text
    content: Il est saint!
  '4':
  - type: text
    content: Qu’on célèbre la force du roi qui aime la justice!
  - type: text
    content: Tu affermis la droiture,
  - type: text
    content: Tu exerces en Jacob la justice et l’équité.
  '5':
  - type: text
    content: Exaltez l’Éternel, notre Dieu,
  - type: text
    content: Et prosternez-vous devant son marchepied!
  - type: text
    content: Il est saint!
  '6':
  - type: text
    content: Moïse et Aaron parmi ses sacrificateurs,
  - type: text
    content: Et Samuel parmi ceux qui invoquaient son nom,
  - type: text
    content: Invoquèrent l’Éternel, et il les exauça.
  '7':
  - type: text
    content: Il leur parla dans la colonne de nuée;
  - type: text
    content: Ils observèrent ses commandements
  - type: text
    content: Et la loi qu’il leur donna.
  '8':
  - type: text
    content: Éternel, notre Dieu, tu les exauças,
  - type: text
    content: Tu fus pour eux un Dieu qui pardonne,
  - type: text
    content: Mais tu les as punis de leurs fautes.
  '9':
  - type: text
    content: Exaltez l’Éternel, notre Dieu,
  - type: text
    content: Et prosternez-vous sur sa montagne sainte!
  - type: text
    content: Car il est saint, l’Éternel, notre Dieu!
