document_id: PSA.99,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: Ps 97; 95.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'L’Éternel règne: les peuples tremblent;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Il est assis sur les chérubins: la terre chancelle.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: L’Éternel est grand dans Sion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est élevé au-dessus de tous les peuples.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Qu’on célèbre ton nom grand et redoutable!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est saint!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Qu’on célèbre la force du roi qui aime la justice!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu affermis la droiture,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu exerces en Jacob la justice et l’équité.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Exaltez l’Éternel, notre Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et prosternez-vous devant son marchepied!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est saint!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Moïse et Aaron parmi ses sacrificateurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et Samuel parmi ceux qui invoquaient son nom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Invoquèrent l’Éternel, et il les exauça.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Il leur parla dans la colonne de nuée;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils observèrent ses commandements
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la loi qu’il leur donna.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Éternel, notre Dieu, tu les exauças,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu fus pour eux un Dieu qui pardonne,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais tu les as punis de leurs fautes.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Exaltez l’Éternel, notre Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et prosternez-vous sur sa montagne sainte!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car il est saint, l’Éternel, notre Dieu!
