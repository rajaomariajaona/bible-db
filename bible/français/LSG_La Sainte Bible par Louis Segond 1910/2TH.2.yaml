document_id: 2TH.2,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Sur l’avènement du Seigneur
  - type: heading
    content: 'V. 1-12: cf. (1 Ti 4:1. 1 Jn 2:18; 4:1-3.) Ap 13; 17.'
  - type: text
    content: 'Pour ce qui concerne l’avènement de notre Seigneur Jésus-Christ et notre réunion avec lui, nous vous prions, frères, '
  '10':
  - type: text
    content: 'et avec toutes les séductions de l’iniquité '
  - type: note
    content: 2 Co 2:15; 4:3.
  - type: text
    content: 'pour ceux qui périssent parce qu’ils n’ont pas reçu l’amour de la vérité pour être sauvés. '
  '11':
  - type: note
    content: Ro 1:24.
  - type: text
    content: 'Aussi Dieu leur envoie une puissance d’égarement, '
  - type: note
    content: 1 Ti 4:1.
  - type: text
    content: 'pour qu’ils croient au mensonge, '
  '12':
  - type: text
    content: afin que tous ceux qui n’ont pas cru à la vérité, mais qui ont pris plaisir à l’injustice, soient condamnés.
  - type: heading
    content: 'V. 13-17: cf. 1 Pi 1:2-9; 5:10, 11.'
  '13':
  - type: text
    content: 'Pour nous, frères bien-aimés du Seigneur, nous devons à votre sujet rendre continuellement grâces à Dieu, parce que Dieu vous a choisis dès le commencement pour le salut, par la sanctification de l’Esprit et par la foi en la vérité. '
  '14':
  - type: text
    content: 'C’est à quoi il vous a appelés par notre Évangile, pour que vous possédiez la gloire de notre Seigneur Jésus-Christ. '
  '15':
  - type: text
    content: 'Ainsi donc, frères, demeurez fermes, '
  - type: note
    content: 2 Th 3:6.
  - type: text
    content: 'et retenez les instructions que vous avez reçues, soit par notre parole, soit par notre lettre. '
  '16':
  - type: text
    content: 'Que notre Seigneur Jésus-Christ lui-même, et Dieu notre Père, qui nous a aimés, et qui nous a donné par sa grâce une consolation éternelle et une bonne espérance, '
  '17':
  - type: text
    content: 'consolent vos cœurs, et vous '
  - type: note
    content: 1 Th 3:13.
  - type: text
    content: affermissent en toute bonne œuvre et en toute bonne parole!
  '2':
  - type: note
    content: Jé 29:8. Mt 24:4. Ép 5:6. Col 2:18. 1 Jn 4:1.
  - type: text
    content: 'de ne pas vous laisser facilement ébranler dans votre bon sens, et de ne pas vous laisser troubler, soit par quelque inspiration, soit par quelque parole, ou par quelque lettre qu’on dirait venir de nous, comme si le jour du Seigneur était déjà là. '
  '3':
  - type: text
    content: 'Que personne ne vous séduise d’aucune manière; car il faut '
  - type: note
    content: Mt 24:23. 1 Ti 4:1. 1 Jn 2:18.
  - type: text
    content: 'que l’apostasie soit arrivée auparavant, et qu’on ait vu paraître l’homme du péché, le fils de la perdition, '
  '4':
  - type: text
    content: 'l’adversaire qui s’élève au-dessus de tout ce qu’on appelle Dieu ou de ce qu’on adore, jusqu’à s’asseoir dans le temple de Dieu, '
  - type: note
    content: Da 11:36.
  - type: text
    content: 'se proclamant lui-même Dieu. '
  '5':
  - type: text
    content: 'Ne vous souvenez-vous pas que je vous disais ces choses, lorsque j’étais encore chez vous? '
  '6':
  - type: text
    content: 'Et maintenant vous savez ce qui le retient, afin qu’il ne paraisse qu’en son temps. '
  '7':
  - type: text
    content: 'Car le mystère de l’iniquité agit déjà; il faut seulement que celui qui le retient encore ait disparu. '
  '8':
  - type: text
    content: 'Et alors paraîtra l’impie, '
  - type: note
    content: Job 4:9. És 11:4.
  - type: text
    content: 'que le Seigneur Jésus détruira par le souffle de sa bouche, et qu’il anéantira par l’éclat de son avènement. '
  '9':
  - type: text
    content: 'L’apparition de cet impie se fera, '
  - type: note
    content: Jn 8:41. 2 Co 4:4. Ép 2:2.
  - type: text
    content: 'par la puissance de Satan, '
  - type: note
    content: De 13:1. Ap 13:13.
  - type: text
    content: 'avec toutes sortes de miracles, de signes et de prodiges mensongers, '
