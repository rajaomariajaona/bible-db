document_id: EZR.8,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Les compagnons d’Esdras
  - type: heading
    content: 'V. 1-36: cf. Esd 7; 2. (Ac 4:29, 30.)'
  - type: text
    content: 'Voici les chefs de familles et les généalogies de ceux qui montèrent avec moi de Babylone, sous le règne du roi Artaxerxès. '
  '10':
  - type: text
    content: 'des fils de Schelomith, le fils de Josiphia, et avec lui cent soixante mâles; '
  '11':
  - type: text
    content: 'des fils de Bébaï, Zacharie, fils de Bébaï, et avec lui vingt-huit mâles; '
  '12':
  - type: text
    content: 'des fils d’Azgad, Jochanan, fils d’Hakkathan, et avec lui cent dix mâles; '
  '13':
  - type: text
    content: 'des fils d’Adonikam, les derniers, dont voici les noms: Éliphéleth, Jeïel et Schemaeja, et avec eux soixante mâles; '
  '14':
  - type: text
    content: 'des fils de Bigvaï, Uthaï et Zabbud, et avec eux soixante-dix mâles. '
  '15':
  - type: text
    content: 'Je les rassemblai près du fleuve qui coule vers Ahava, et nous campâmes là trois jours. Je dirigeai mon attention sur le peuple et sur les sacrificateurs, et je ne trouvai là aucun des fils de Lévi. '
  '16':
  - type: text
    content: 'Alors je fis appeler les chefs Éliézer, Ariel, Schemaeja, Elnathan, Jarib, Elnathan, Nathan, Zacharie et Meschullam, et les docteurs Jojarib et Elnathan. '
  '17':
  - type: text
    content: 'Je les envoyai vers le chef Iddo, demeurant à Casiphia, et je mis dans leur bouche ce qu’ils devaient dire à Iddo et à ses frères les Néthiniens qui étaient à Casiphia, afin qu’ils nous amenassent des serviteurs pour la maison de notre Dieu. '
  '18':
  - type: text
    content: 'Et, comme la bonne main de notre Dieu était sur nous, ils nous amenèrent Schérébia, homme de sens, d’entre les fils de Machli, fils de Lévi, fils d’Israël, et avec lui ses fils et ses frères, au nombre de dix-huit; '
  '19':
  - type: text
    content: 'Haschabia, et avec lui Ésaïe, d’entre les fils de Merari, ses frères et leurs fils, au nombre de vingt; '
  '2':
  - type: text
    content: 'Des fils de Phinées, Guerschom; des fils d’Ithamar, Daniel; des fils de David, Hatthusch, des fils de Schecania; '
  '20':
  - type: text
    content: 'et d’entre les Néthiniens, que David et les chefs avaient mis au service des Lévites, deux cent vingt Néthiniens, tous désignés par leurs noms. '
  '21':
  - type: text
    content: 'Là, près du fleuve d’Ahava, je publiai un jeûne d’humiliation devant notre Dieu, afin d’implorer de lui un heureux voyage pour nous, pour nos enfants, et pour tout ce qui nous appartenait. '
  '22':
  - type: text
    content: 'J’aurais eu honte de demander au roi une escorte et des cavaliers pour nous protéger contre l’ennemi pendant la route, car nous avions dit au roi: La main de notre Dieu est pour leur bien sur tous ceux qui le cherchent, mais sa force et sa colère sont sur tous ceux qui l’abandonnent. '
  '23':
  - type: text
    content: 'C’est à cause de cela que nous jeûnâmes et que nous invoquâmes notre Dieu. Et il nous exauça. '
  '24':
  - type: text
    content: 'Je choisis douze chefs des sacrificateurs, Schérébia, Haschabia, et dix de leurs frères. '
  '25':
  - type: text
    content: 'Je pesai devant eux '
  - type: note
    content: Esd 7:14, 15.
  - type: text
    content: 'l’argent, l’or, et les ustensiles, donnés en offrande pour la maison de notre Dieu par le roi, ses conseillers et ses chefs, et par tous ceux d’Israël qu’on avait trouvés. '
  '26':
  - type: text
    content: 'Je remis entre leurs mains six cent cinquante talents d’argent, des ustensiles d’argent pour cent talents, cent talents d’or, '
  '27':
  - type: text
    content: 'vingt coupes d’or valant mille dariques, et deux vases d’un bel airain poli, aussi précieux que l’or. '
  '28':
  - type: text
    content: 'Puis je leur dis: Vous êtes consacrés à l’Éternel; ces ustensiles sont des choses saintes, et cet argent et cet or sont une offrande volontaire à l’Éternel, le Dieu de vos pères. '
  '29':
  - type: text
    content: 'Soyez vigilants, et prenez cela sous votre garde, jusqu’à ce que vous le pesiez devant les chefs des sacrificateurs et les Lévites, et devant les chefs de familles d’Israël, à Jérusalem, dans les chambres de la maison de l’Éternel. '
  '3':
  - type: text
    content: 'des fils de Pareosch, Zacharie, et avec lui cent cinquante mâles enregistrés; '
  '30':
  - type: text
    content: 'Et les sacrificateurs et les Lévites reçurent au poids l’argent, l’or et les ustensiles, pour les porter à Jérusalem, dans la maison de notre Dieu. '
  '31':
  - type: text
    content: 'Nous partîmes du fleuve d’Ahava pour nous rendre à Jérusalem, le douzième jour du premier mois. La main de notre Dieu fut sur nous et nous préserva des attaques de l’ennemi et de toute embûche pendant la route. '
  '32':
  - type: text
    content: 'Nous arrivâmes à Jérusalem, et nous nous y reposâmes trois jours. '
  '33':
  - type: text
    content: 'Le quatrième jour, nous pesâmes dans la maison de notre Dieu l’argent, l’or, et les ustensiles, que nous remîmes à Merémoth, fils d’Urie, le sacrificateur; il y avait avec lui Éléazar, fils de Phinées, et avec eux les Lévites Jozabad, fils de Josué, et Noadia, fils de Binnuï. '
  '34':
  - type: text
    content: 'Le tout ayant été vérifié, soit pour le nombre, soit pour le poids, on mit alors par écrit le poids du tout. '
  '35':
  - type: text
    content: 'Les fils de la captivité revenus de l’exil offrirent en holocauste au Dieu d’Israël douze taureaux pour tout Israël, quatre-vingt-seize béliers, soixante-dix-sept agneaux, et douze boucs comme victimes expiatoires, le tout en holocauste à l’Éternel. '
  '36':
  - type: text
    content: Ils transmirent les ordres du roi aux satrapes du roi et aux gouverneurs de ce côté du fleuve, lesquels honorèrent le peuple et la maison de Dieu.
  '4':
  - type: text
    content: 'des fils de Pachat-Moab, Éljoénaï, fils de Zerachja, et avec lui deux cents mâles; '
  '5':
  - type: text
    content: 'des fils de Schecania, le fils de Jachaziel, et avec lui trois cents mâles; '
  '6':
  - type: text
    content: 'des fils d’Adin, Ébed, fils de Jonathan, et avec lui cinquante mâles; '
  '7':
  - type: text
    content: 'des fils d’Élam, Ésaïe, fils d’Athalia, et avec lui soixante-dix mâles; '
  '8':
  - type: text
    content: 'des fils de Schephathia, Zebadia, fils de Micaël, et avec lui quatre-vingts mâles; '
  '9':
  - type: text
    content: 'des fils de Joab, Abdias, fils de Jehiel, et avec lui deux cent dix-huit mâles; '
