document_id: HEB.13,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-6: cf. (1 Pi 1:22. Ro 12:10, 13, 15.) (Mt 19:4-6. 1 Th 4:3-7.) 1 Ti 6:6-10.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Persévérez dans '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 12:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 4:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 1:22
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2:17
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 4:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'l’amour fraternel. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous avons un autel dont ceux qui font le service au tabernacle n’ont pas le pouvoir de manger. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 29:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 4:21
      - type: text
        text: '; 6:30; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:27
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 19:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Les corps des animaux, dont le sang est porté dans le sanctuaire par le souverain sacrificateur pour le péché, sont brûlés hors du camp. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est pour cela que Jésus aussi, afin de sanctifier le peuple par son propre sang, a souffert '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 19:17
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '18'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'hors de la porte. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sortons donc pour aller à lui, hors du camp, en portant son opprobre. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ph 3:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Car nous n’avons point ici-bas de cité permanente, mais nous cherchons celle qui est à venir. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Par lui, offrons sans cesse à Dieu un sacrifice de louange, c’est-à-dire '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Os 14:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'le fruit de lèvres qui confessent son nom. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et n’oubliez pas la bienfaisance et la libéralité, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ph 4:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'car c’est à de tels sacrifices que Dieu prend plaisir. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ph 2:29
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Th 5:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ti 5:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Obéissez à vos conducteurs et ayez pour eux de la déférence, car ils veillent sur vos âmes '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 3:18
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 33:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: comme devant en rendre compte; qu’il en soit ainsi, afin qu’ils le fassent avec joie, et non en gémissant, ce qui ne vous serait d’aucun avantage.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Vœux et salutations
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 18-21: cf. Ro 15:30-32. (Col 1:9-11. 1 Pi 5:10, 11.)'
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Priez pour nous; car nous croyons avoir une bonne conscience, voulant en toutes choses nous bien conduire. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est avec instance que je vous demande de le faire, afin que je vous sois rendu plus tôt. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 12:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 4:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'N’oubliez pas l’hospitalité; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 18:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 19:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'car, en l’exerçant, quelques-uns ont logé des anges, sans le savoir. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Que le Dieu de paix, qui a ramené d’entre les morts '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 40:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 34:23
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 10:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 5:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'le grand pasteur des brebis, par le sang d’une alliance éternelle, notre Seigneur Jésus, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 3:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ph 2:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: vous rende capables de toute bonne œuvre pour l’accomplissement de sa volonté, et fasse en vous ce qui lui est agréable, par Jésus-Christ, auquel soit la gloire aux siècles des siècles! Amen!
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 22-25: cf. Ph 4:21-23.'
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je vous prie, frères, de supporter ces paroles d’exhortation, car je vous ai écrit brièvement. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sachez que notre frère Timothée a été relâché; s’il vient bientôt, j’irai vous voir avec lui. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saluez tous vos conducteurs, et tous les saints. Ceux d’Italie vous saluent. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Que la grâce soit avec vous tous! Amen!
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 25:36
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Souvenez-vous des prisonniers, comme si vous étiez aussi prisonniers; de ceux qui sont maltraités, comme étant aussi vous-mêmes dans un corps. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Que le mariage soit honoré de tous, et le lit conjugal exempt de souillure, car Dieu jugera les impudiques et les adultères. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 23:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 16:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 15:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Ne vous livrez pas à l’amour de l’argent; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ph 4:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ti 6:6
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'contentez-vous de ce que vous avez; car Dieu lui-même a dit:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 31:6
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 1:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 28:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Je ne te délaisserai point, et je ne t’abandonnerai point.
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'C’est donc avec assurance que nous pouvons dire:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 56:5
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 118:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Le Seigneur est mon aide, je ne craindrai rien;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que peut me faire un homme?
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 7-17: cf. (Ph 3:17. Ps 37:37.) (Ép 4:14. Ga 5:1-5.) 1 Pi 4:12-16. (Ps 50:14, 23. Ph 4:18.) 1 Th 5:12, 13.'
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Souvenez-vous de vos '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 13:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'conducteurs qui vous ont annoncé la parole de Dieu; considérez quelle a été la fin de leur vie, et imitez leur foi. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus-Christ est le même hier, aujourd’hui, et éternellement. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 29:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 24:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 16:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 4:14
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 2:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Th 2:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ti 4:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Jn 4:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Ne vous laissez pas entraîner par des doctrines diverses et étrangères; car il est bon que le cœur soit affermi par la grâce, et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 6:27
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 14:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'non par des aliments qui n’ont servi de rien à ceux qui s’y sont attachés. '
