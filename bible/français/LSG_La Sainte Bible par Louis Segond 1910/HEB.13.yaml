  children:
  - type: text
    text: 'V. 1-6: cf. (1 Pi 1:22. Ro 12:10, 13, 15.) (Mt 19:4-6. 1 Th 4:3-7.) 1 Ti 6:6-10.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Persévérez dans '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 12:10
      metadata:
        usfm: ROM.12.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
