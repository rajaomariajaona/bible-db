      - type: text
        text: Ép 4:3
      metadata:
        usfm: EPH.4.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 1:22
      metadata:
        usfm: 1PE.1.22
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2:17
      metadata:
        usfm: 1PE.2.17
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 4:8
      metadata:
        usfm: 1PE.4.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'l’amour fraternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 12:13
      metadata:
        usfm: ROM.12.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 4:9
      metadata:
        usfm: 1PE.4.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'N’oubliez pas l’hospitalité; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 18:1
      metadata:
        usfm: GEN.18.1
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 19:1
      metadata:
        usfm: GEN.19.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'car, en l’exerçant, quelques-uns ont logé des anges, sans le savoir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 25:36
      metadata:
        usfm: MAT.25.36
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Souvenez-vous des prisonniers, comme si vous étiez aussi prisonniers; de ceux qui sont maltraités, comme étant aussi vous-mêmes dans un corps. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Que le mariage soit honoré de tous, et le lit conjugal exempt de souillure, car Dieu jugera les impudiques et les adultères. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 23:8
      metadata:
        usfm: EXO.23.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 16:19
      metadata:
        usfm: DEU.16.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 15:16
      metadata:
        usfm: PRO.15.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ne vous livrez pas à l’amour de l’argent; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 4:11
      metadata:
        usfm: PHP.4.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 6:6
      metadata:
        usfm: 1TI.6.6
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '8'
      metadata:
        usfm: 1TI.6.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'contentez-vous de ce que vous avez; car Dieu lui-même a dit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 31:6
      metadata:
        usfm: DEU.31.6
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '8'
      metadata:
        usfm: DEU.31.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 1:5
      metadata:
        usfm: JOS.1.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 28:20
      metadata:
        usfm: 1CH.28.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Je ne te délaisserai point, et je ne t’abandonnerai point.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'C’est donc avec assurance que nous pouvons dire:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 56:5
      metadata:
        usfm: PSA.56.5
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 118:6
      metadata:
        usfm: PSA.118.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Le Seigneur est mon aide, je ne craindrai rien;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que peut me faire un homme?
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 7-17: cf. (Ph 3:17. Ps 37:37.) (Ép 4:14. Ga 5:1-5.) 1 Pi 4:12-16. (Ps 50:14, 23. Ph 4:18.) 1 Th 5:12, 13.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Souvenez-vous de vos '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 13:17
      metadata:
        usfm: HEB.13.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'conducteurs qui vous ont annoncé la parole de Dieu; considérez quelle a été la fin de leur vie, et imitez leur foi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Jésus-Christ est le même hier, aujourd’hui, et éternellement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 29:8
      metadata:
        usfm: JER.29.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 24:4
      metadata:
        usfm: MAT.24.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 16:17
      metadata:
        usfm: ROM.16.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 4:14
      metadata:
        usfm: EPH.4.14
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 5:6
      metadata:
        usfm: EPH.5.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 2:16
      metadata:
        usfm: COL.2.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Th 2:2
      metadata:
        usfm: 2TH.2.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ti 4:3
      metadata:
        usfm: 2TI.4.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 4:1
      metadata:
        usfm: 1JN.4.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ne vous laissez pas entraîner par des doctrines diverses et étrangères; car il est bon que le cœur soit affermi par la grâce, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 6:27
      metadata:
        usfm: JHN.6.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 14:17
      metadata:
        usfm: ROM.14.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'non par des aliments qui n’ont servi de rien à ceux qui s’y sont attachés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nous avons un autel dont ceux qui font le service au tabernacle n’ont pas le pouvoir de manger. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 29:14
      metadata:
        usfm: EXO.29.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 4:21
      metadata:
        usfm: LEV.4.21
    - type: text
      text: '; 6:30; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 16:27
      metadata:
        usfm: LEV.16.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 19:3
      metadata:
        usfm: NUM.19.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Les corps des animaux, dont le sang est porté dans le sanctuaire par le souverain sacrificateur pour le péché, sont brûlés hors du camp. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'C’est pour cela que Jésus aussi, afin de sanctifier le peuple par son propre sang, a souffert '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 19:17
      metadata:
        usfm: JHN.19.17
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '18'
      metadata:
        usfm: JHN.19.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'hors de la porte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Sortons donc pour aller à lui, hors du camp, en portant son opprobre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 3:20
      metadata:
        usfm: PHP.3.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Car nous n’avons point ici-bas de cité permanente, mais nous cherchons celle qui est à venir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Par lui, offrons sans cesse à Dieu un sacrifice de louange, c’est-à-dire '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Os 14:3
      metadata:
        usfm: HOS.14.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'le fruit de lèvres qui confessent son nom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Et n’oubliez pas la bienfaisance et la libéralité, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 4:18
      metadata:
        usfm: PHP.4.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'car c’est à de tels sacrifices que Dieu prend plaisir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 2:29
      metadata:
        usfm: PHP.2.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 5:12
      metadata:
        usfm: 1TH.5.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 5:17
      metadata:
        usfm: 1TI.5.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Obéissez à vos conducteurs et ayez pour eux de la déférence, car ils veillent sur vos âmes '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 3:18
      metadata:
        usfm: EZK.3.18
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 33:8
      metadata:
        usfm: EZK.33.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: comme devant en rendre compte; qu’il en soit ainsi, afin qu’ils le fassent avec joie, et non en gémissant, ce qui ne vous serait d’aucun avantage.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vœux et salutations
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 18-21: cf. Ro 15:30-32. (Col 1:9-11. 1 Pi 5:10, 11.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Priez pour nous; car nous croyons avoir une bonne conscience, voulant en toutes choses nous bien conduire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'C’est avec instance que je vous demande de le faire, afin que je vous sois rendu plus tôt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Que le Dieu de paix, qui a ramené d’entre les morts '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 40:11
      metadata:
        usfm: ISA.40.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 34:23
      metadata:
        usfm: EZK.34.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 10:11
      metadata:
        usfm: JHN.10.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 5:4
      metadata:
        usfm: 1PE.5.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'le grand pasteur des brebis, par le sang d’une alliance éternelle, notre Seigneur Jésus, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 3:5
      metadata:
        usfm: 2CO.3.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 2:13
      metadata:
        usfm: PHP.2.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: vous rende capables de toute bonne œuvre pour l’accomplissement de sa volonté, et fasse en vous ce qui lui est agréable, par Jésus-Christ, auquel soit la gloire aux siècles des siècles! Amen!
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 22-25: cf. Ph 4:21-23.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Je vous prie, frères, de supporter ces paroles d’exhortation, car je vous ai écrit brièvement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Sachez que notre frère Timothée a été relâché; s’il vient bientôt, j’irai vous voir avec lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Saluez tous vos conducteurs, et tous les saints. Ceux d’Italie vous saluent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Que la grâce soit avec vous tous! Amen!
