document_id: HEB.13,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-6: cf. (1 Pi 1:22. Ro 12:10, 13, 15.) (Mt 19:4-6. 1 Th 4:3-7.) 1 Ti 6:6-10.'
  - type: text
    content: 'Persévérez dans '
  - type: note
    content: Ro 12:10. Ép 4:3. 1 Pi 1:22; 2:17; 4:8.
  - type: text
    content: 'l’amour fraternel. '
  '10':
  - type: text
    content: 'Nous avons un autel dont ceux qui font le service au tabernacle n’ont pas le pouvoir de manger. '
  '11':
  - type: note
    content: Ex 29:14. Lé 4:21; 6:30; 16:27. No 19:3.
  - type: text
    content: 'Les corps des animaux, dont le sang est porté dans le sanctuaire par le souverain sacrificateur pour le péché, sont brûlés hors du camp. '
  '12':
  - type: text
    content: 'C’est pour cela que Jésus aussi, afin de sanctifier le peuple par son propre sang, a souffert '
  - type: note
    content: Jn 19:17, 18.
  - type: text
    content: 'hors de la porte. '
  '13':
  - type: text
    content: 'Sortons donc pour aller à lui, hors du camp, en portant son opprobre. '
  '14':
  - type: note
    content: Ph 3:20.
  - type: text
    content: 'Car nous n’avons point ici-bas de cité permanente, mais nous cherchons celle qui est à venir. '
  '15':
  - type: text
    content: 'Par lui, offrons sans cesse à Dieu un sacrifice de louange, c’est-à-dire '
  - type: note
    content: Os 14:3.
  - type: text
    content: 'le fruit de lèvres qui confessent son nom. '
  '16':
  - type: text
    content: 'Et n’oubliez pas la bienfaisance et la libéralité, '
  - type: note
    content: Ph 4:18.
  - type: text
    content: 'car c’est à de tels sacrifices que Dieu prend plaisir. '
  '17':
  - type: note
    content: Ph 2:29. 1 Th 5:12. 1 Ti 5:17.
  - type: text
    content: 'Obéissez à vos conducteurs et ayez pour eux de la déférence, car ils veillent sur vos âmes '
  - type: note
    content: Éz 3:18; 33:8.
  - type: text
    content: comme devant en rendre compte; qu’il en soit ainsi, afin qu’ils le fassent avec joie, et non en gémissant, ce qui ne vous serait d’aucun avantage.
  - type: heading
    content: Vœux et salutations
  - type: heading
    content: 'V. 18-21: cf. Ro 15:30-32. (Col 1:9-11. 1 Pi 5:10, 11.)'
  '18':
  - type: text
    content: 'Priez pour nous; car nous croyons avoir une bonne conscience, voulant en toutes choses nous bien conduire. '
  '19':
  - type: text
    content: 'C’est avec instance que je vous demande de le faire, afin que je vous sois rendu plus tôt. '
  '2':
  - type: note
    content: Ro 12:13. 1 Pi 4:9.
  - type: text
    content: 'N’oubliez pas l’hospitalité; '
  - type: note
    content: Ge 18:1; 19:1.
  - type: text
    content: 'car, en l’exerçant, quelques-uns ont logé des anges, sans le savoir. '
  '20':
  - type: text
    content: 'Que le Dieu de paix, qui a ramené d’entre les morts '
  - type: note
    content: És 40:11. Éz 34:23. Jn 10:11. 1 Pi 5:4.
  - type: text
    content: 'le grand pasteur des brebis, par le sang d’une alliance éternelle, notre Seigneur Jésus, '
  '21':
  - type: note
    content: 2 Co 3:5. Ph 2:13.
  - type: text
    content: vous rende capables de toute bonne œuvre pour l’accomplissement de sa volonté, et fasse en vous ce qui lui est agréable, par Jésus-Christ, auquel soit la gloire aux siècles des siècles! Amen!
  - type: heading
    content: 'V. 22-25: cf. Ph 4:21-23.'
  '22':
  - type: text
    content: 'Je vous prie, frères, de supporter ces paroles d’exhortation, car je vous ai écrit brièvement. '
  '23':
  - type: text
    content: 'Sachez que notre frère Timothée a été relâché; s’il vient bientôt, j’irai vous voir avec lui. '
  '24':
  - type: text
    content: 'Saluez tous vos conducteurs, et tous les saints. Ceux d’Italie vous saluent. '
  '25':
  - type: text
    content: Que la grâce soit avec vous tous! Amen!
  '3':
  - type: note
    content: Mt 25:36.
  - type: text
    content: 'Souvenez-vous des prisonniers, comme si vous étiez aussi prisonniers; de ceux qui sont maltraités, comme étant aussi vous-mêmes dans un corps. '
  '4':
  - type: text
    content: 'Que le mariage soit honoré de tous, et le lit conjugal exempt de souillure, car Dieu jugera les impudiques et les adultères. '
  '5':
  - type: note
    content: Ex 23:8. De 16:19. Pr 15:16.
  - type: text
    content: 'Ne vous livrez pas à l’amour de l’argent; '
  - type: note
    content: Ph 4:11. 1 Ti 6:6, 8.
  - type: text
    content: 'contentez-vous de ce que vous avez; car Dieu lui-même a dit:'
  - type: note
    content: De 31:6, 8. Jos 1:5. 1 Ch 28:20.
  - type: text
    content: Je ne te délaisserai point, et je ne t’abandonnerai point.
  '6':
  - type: text
    content: 'C’est donc avec assurance que nous pouvons dire:'
  - type: note
    content: Ps 56:5; 118:6.
  - type: text
    content: Le Seigneur est mon aide, je ne craindrai rien;
  - type: text
    content: Que peut me faire un homme?
  - type: heading
    content: 'V. 7-17: cf. (Ph 3:17. Ps 37:37.) (Ép 4:14. Ga 5:1-5.) 1 Pi 4:12-16. (Ps 50:14, 23. Ph 4:18.) 1 Th 5:12, 13.'
  '7':
  - type: text
    content: 'Souvenez-vous de vos '
  - type: note
    content: Hé 13:17.
  - type: text
    content: 'conducteurs qui vous ont annoncé la parole de Dieu; considérez quelle a été la fin de leur vie, et imitez leur foi. '
  '8':
  - type: text
    content: 'Jésus-Christ est le même hier, aujourd’hui, et éternellement. '
  '9':
  - type: note
    content: Jé 29:8. Mt 24:4. Ro 16:17. Ép 4:14; 5:6. Col 2:16. 2 Th 2:2. 2 Ti 4:3. 1 Jn 4:1.
  - type: text
    content: 'Ne vous laissez pas entraîner par des doctrines diverses et étrangères; car il est bon que le cœur soit affermi par la grâce, et '
  - type: note
    content: Jn 6:27. Ro 14:17.
  - type: text
    content: 'non par des aliments qui n’ont servi de rien à ceux qui s’y sont attachés. '
