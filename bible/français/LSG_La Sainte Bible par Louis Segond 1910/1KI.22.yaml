document_id: 1KI.22
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Achab blessé à mort dans une expédition contre les Syriens
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-28: cf. 2 Ch 18:1-27. Jé 23:16, 17, 25-32. 2 Ti 4:3. 2 Th 2:11.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'On resta trois ans sans qu’il y eût guerre entre la Syrie et Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'La troisième année, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Ch 18:1, 2, etc.
    marker-yv: yv-n
  - type: text
    text: 'Josaphat, roi de Juda, descendit auprès du roi d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Le roi d’Israël dit à ses serviteurs: Savez-vous que Ramoth en Galaad est à nous? Et nous ne nous inquiétons pas de la reprendre des mains du roi de Syrie! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Et il dit à Josaphat: Veux-tu venir avec moi attaquer Ramoth en Galaad? Josaphat répondit au roi d’Israël: Nous irons, moi comme toi, mon peuple comme ton peuple, mes chevaux comme tes chevaux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Puis Josaphat dit au roi d’Israël: Consulte maintenant, je te prie, la parole de l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Le roi d’Israël assembla les prophètes, au nombre d’environ quatre cents, et leur dit: Irai-je attaquer Ramoth en Galaad, ou dois-je y renoncer? Et ils répondirent: Monte, et le Seigneur la livrera entre les mains du roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mais Josaphat dit: N’y a-t-il plus ici aucun prophète de l’Éternel, par qui nous puissions le consulter? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Le roi d’Israël répondit à Josaphat: Il y a encore un homme par qui l’on pourrait consulter l’Éternel; mais je le hais, car il ne me prophétise rien de bon, il ne prophétise que du mal: c’est Michée, fils de Jimla. Et Josaphat dit: Que le roi ne parle pas ainsi! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Alors le roi d’Israël appela un eunuque, et dit: Fais venir de suite Michée, fils de Jimla. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 18:9
      metadata:
        usfm: 2CH.18.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Le roi d’Israël et Josaphat, roi de Juda, étaient assis chacun sur son trône, revêtus de leurs habits royaux, dans la place à l’entrée de la porte de Samarie. Et tous les prophètes prophétisaient devant eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Sédécias, fils de Kenaana, s’était fait des cornes de fer, et il dit: Ainsi parle l’Éternel: Avec ces cornes tu frapperas les Syriens jusqu’à les détruire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Et tous les prophètes prophétisaient de même, en disant: Monte à Ramoth en Galaad! Tu auras du succès, et l’Éternel la livrera entre les mains du roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Le messager qui était allé appeler Michée lui parla ainsi: Voici, les prophètes, d’un commun accord, prophétisent du bien au roi; que ta parole soit donc comme la parole de chacun d’eux! Annonce du bien! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Michée répondit: L’Éternel est vivant! J’annoncerai ce que l’Éternel me dira. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Lorsqu’il fut arrivé auprès du roi, le roi lui dit: Michée, irons-nous attaquer Ramoth en Galaad, ou devons-nous y renoncer? Il lui répondit: Monte! Tu auras du succès, et l’Éternel la livrera entre les mains du roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Et le roi lui dit: Combien de fois me faudra-t-il te faire jurer de ne me dire que la vérité au nom de l’Éternel? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Michée répondit: Je vois tout Israël dispersé sur les montagnes, comme des brebis qui n’ont point de berger; et l’Éternel dit: Ces gens n’ont point de maître, que chacun retourne en paix dans sa maison! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Le roi d’Israël dit à Josaphat: Ne te l’ai-je pas dit? Il ne prophétise sur moi rien de bon, il ne prophétise que du mal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Et Michée dit: Écoute donc la parole de l’Éternel! '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 18:18
      metadata:
        usfm: 2CH.18.18
    - type: text
      text: '. Job 1:6, etc.; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2:1
      metadata:
        usfm: JOB.2.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'J’ai vu l’Éternel assis sur son trône, et toute l’armée des cieux se tenant auprès de lui, à sa droite et à sa gauche. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Et l’Éternel dit: Qui séduira Achab, pour qu’il monte à Ramoth en Galaad et qu’il y périsse? Ils répondirent l’un d’une manière, l’autre d’une autre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Et un esprit vint se présenter devant l’Éternel, et dit: Moi, je le séduirai. L’Éternel lui dit: Comment? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Je sortirai, répondit-il, et je serai un esprit de mensonge dans la bouche de tous ses prophètes. L’Éternel dit: Tu le séduiras, et tu en viendras à bout; sors, et fais ainsi! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Et maintenant, voici, l’Éternel a mis un esprit de mensonge dans la bouche de tous tes prophètes qui sont là. Et l’Éternel a prononcé du mal contre toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Alors Sédécias, fils de Kenaana, s’étant approché, frappa Michée sur la joue, et dit: Par où l’esprit de l’Éternel est-il sorti de moi pour te parler? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Michée répondit: Tu le verras au jour où tu iras de chambre en chambre pour te cacher. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Le roi d’Israël dit: Prends Michée, et emmène-le vers Amon, chef de la ville, et vers Joas, fils du roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Tu diras: Ainsi parle le roi: Mettez cet homme en prison, et nourrissez-le du pain et de l’eau d’affliction, jusqu’à ce que je revienne en paix. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Et Michée dit: Si tu reviens en paix, l’Éternel n’a point parlé par moi. Il dit encore: Vous tous, peuples, entendez!'
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 29-40: cf. 2 Ch 18:28, etc. (1 R 20:34, 42; 21:19.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Le roi d’Israël et Josaphat, roi de Juda, montèrent à Ramoth en Galaad. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Le roi d’Israël dit à Josaphat: Je veux me déguiser pour aller au combat; mais toi, revêts-toi de tes habits. Et le roi d’Israël se déguisa, et alla au combat. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Le roi de Syrie avait donné cet ordre aux trente-deux chefs de ses chars: Vous n’attaquerez ni petits ni grands, mais vous attaquerez seulement le roi d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Quand les chefs des chars aperçurent Josaphat, ils dirent: Certainement, c’est le roi d’Israël. Et ils s’approchèrent de lui pour l’attaquer. Josaphat poussa un cri. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Les chefs des chars, voyant que ce n’était pas le roi d’Israël, s’éloignèrent de lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Alors un homme tira de son arc au hasard, et frappa le roi d’Israël au défaut de la cuirasse. Le roi dit à celui qui dirigeait son char: Tourne, et fais-moi sortir du champ de bataille, car je suis blessé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Le combat devint acharné ce jour-là. Le roi fut retenu dans son char en face des Syriens, et il mourut le soir. Le sang de la blessure coula dans l’intérieur du char. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Au coucher du soleil, on cria par tout le camp: Chacun à sa ville et chacun dans son pays! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ainsi mourut le roi, qui fut ramené à Samarie; et on enterra le roi à Samarie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Lorsqu’on lava le char à l’étang de Samarie, les chiens léchèrent le sang d’Achab, et les prostituées s’y baignèrent, selon la parole que l’Éternel avait prononcée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Le reste des actions d’Achab, tout ce qu’il a fait, la maison d’ivoire qu’il construisit, et toutes les villes qu’il a bâties, cela n’est-il pas écrit dans le livre des Chroniques des rois d’Israël? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Achab se coucha avec ses pères. Et Achazia, son fils, régna à sa place.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Josaphat, roi de Juda
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 41-51: cf. (2 Ch 17; 19; 20.) Pr 13:1.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 20:31
      metadata:
        usfm: 2CH.20.31
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Josaphat, fils d’Asa, régna sur Juda, la quatrième année d’Achab, roi d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Josaphat avait trente-cinq ans lorsqu’il devint roi, et il régna vingt cinq ans à Jérusalem. Sa mère s’appelait Azuba, fille de Schilchi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Il marcha dans toute la voie d’Asa, son père, et ne s’en détourna point, faisant ce qui est droit aux yeux de l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Seulement, les hauts lieux ne disparurent point; le peuple offrait encore des sacrifices et des parfums sur les hauts lieux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Josaphat fut en paix avec le roi d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Le reste des actions de Josaphat, ses exploits et ses guerres, cela n’est-il pas écrit dans le livre des Chroniques des rois de Juda? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Il ôta du pays le reste des prostitués, qui s’y trouvaient encore depuis le temps d’Asa, son père. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Il n’y avait point de roi en Édom: c’était un intendant qui gouvernait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Josaphat construisit des navires de Tarsis pour aller à Ophir chercher de l’or; mais il n’y alla point, parce que les navires se brisèrent à Étsjon-Guéber. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Alors Achazia, fils d’Achab, dit à Josaphat: Veux-tu que mes serviteurs aillent avec les tiens sur des navires? Et Josaphat ne voulut pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: Josaphat se coucha avec ses pères, et il fut enterré avec ses pères dans la ville de David, son père. Et Joram, son fils, régna à sa place.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Achazia, roi d’Israël
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 52-54: cf. 2 R 1.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Achazia, fils d’Achab, régna sur Israël à Samarie, la dix-septième année de Josaphat, roi de Juda. Il régna deux ans sur Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Il fit ce qui est mal aux yeux de l’Éternel, et il marcha dans la voie de son père et dans la voie de sa mère, et dans la voie de Jéroboam, fils de Nebath, qui avait fait pécher Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: Il servit Baal et se prosterna devant lui, et il irrita l’Éternel, le Dieu d’Israël, comme avait fait son père.
