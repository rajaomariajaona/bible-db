document_id: 1KI.22,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Achab blessé à mort dans une expédition contre les Syriens
  - type: heading
    content: 'V. 1-28: cf. 2 Ch 18:1-27. Jé 23:16, 17, 25-32. 2 Ti 4:3. 2 Th 2:11.'
  - type: text
    content: 'On resta trois ans sans qu’il y eût guerre entre la Syrie et Israël. '
  '10':
  - type: note
    content: 2 Ch 18:9.
  - type: text
    content: 'Le roi d’Israël et Josaphat, roi de Juda, étaient assis chacun sur son trône, revêtus de leurs habits royaux, dans la place à l’entrée de la porte de Samarie. Et tous les prophètes prophétisaient devant eux. '
  '11':
  - type: text
    content: 'Sédécias, fils de Kenaana, s’était fait des cornes de fer, et il dit: Ainsi parle l’Éternel: Avec ces cornes tu frapperas les Syriens jusqu’à les détruire. '
  '12':
  - type: text
    content: 'Et tous les prophètes prophétisaient de même, en disant: Monte à Ramoth en Galaad! Tu auras du succès, et l’Éternel la livrera entre les mains du roi. '
  '13':
  - type: text
    content: 'Le messager qui était allé appeler Michée lui parla ainsi: Voici, les prophètes, d’un commun accord, prophétisent du bien au roi; que ta parole soit donc comme la parole de chacun d’eux! Annonce du bien! '
  '14':
  - type: text
    content: 'Michée répondit: L’Éternel est vivant! J’annoncerai ce que l’Éternel me dira. '
  '15':
  - type: text
    content: 'Lorsqu’il fut arrivé auprès du roi, le roi lui dit: Michée, irons-nous attaquer Ramoth en Galaad, ou devons-nous y renoncer? Il lui répondit: Monte! Tu auras du succès, et l’Éternel la livrera entre les mains du roi. '
  '16':
  - type: text
    content: 'Et le roi lui dit: Combien de fois me faudra-t-il te faire jurer de ne me dire que la vérité au nom de l’Éternel? '
  '17':
  - type: text
    content: 'Michée répondit: Je vois tout Israël dispersé sur les montagnes, comme des brebis qui n’ont point de berger; et l’Éternel dit: Ces gens n’ont point de maître, que chacun retourne en paix dans sa maison! '
  '18':
  - type: text
    content: 'Le roi d’Israël dit à Josaphat: Ne te l’ai-je pas dit? Il ne prophétise sur moi rien de bon, il ne prophétise que du mal. '
  '19':
  - type: text
    content: 'Et Michée dit: Écoute donc la parole de l’Éternel! '
  - type: note
    content: 2 Ch 18:18. Job 1:6, etc.; 2:1.
  - type: text
    content: 'J’ai vu l’Éternel assis sur son trône, et toute l’armée des cieux se tenant auprès de lui, à sa droite et à sa gauche. '
  '2':
  - type: text
    content: 'La troisième année, '
  - type: note
    content: 2 Ch 18:1, 2, etc.
  - type: text
    content: 'Josaphat, roi de Juda, descendit auprès du roi d’Israël. '
  '20':
  - type: text
    content: 'Et l’Éternel dit: Qui séduira Achab, pour qu’il monte à Ramoth en Galaad et qu’il y périsse? Ils répondirent l’un d’une manière, l’autre d’une autre. '
  '21':
  - type: text
    content: 'Et un esprit vint se présenter devant l’Éternel, et dit: Moi, je le séduirai. L’Éternel lui dit: Comment? '
  '22':
  - type: text
    content: 'Je sortirai, répondit-il, et je serai un esprit de mensonge dans la bouche de tous ses prophètes. L’Éternel dit: Tu le séduiras, et tu en viendras à bout; sors, et fais ainsi! '
  '23':
  - type: text
    content: 'Et maintenant, voici, l’Éternel a mis un esprit de mensonge dans la bouche de tous tes prophètes qui sont là. Et l’Éternel a prononcé du mal contre toi. '
  '24':
  - type: text
    content: 'Alors Sédécias, fils de Kenaana, s’étant approché, frappa Michée sur la joue, et dit: Par où l’esprit de l’Éternel est-il sorti de moi pour te parler? '
  '25':
  - type: text
    content: 'Michée répondit: Tu le verras au jour où tu iras de chambre en chambre pour te cacher. '
  '26':
  - type: text
    content: 'Le roi d’Israël dit: Prends Michée, et emmène-le vers Amon, chef de la ville, et vers Joas, fils du roi. '
  '27':
  - type: text
    content: 'Tu diras: Ainsi parle le roi: Mettez cet homme en prison, et nourrissez-le du pain et de l’eau d’affliction, jusqu’à ce que je revienne en paix. '
  '28':
  - type: text
    content: 'Et Michée dit: Si tu reviens en paix, l’Éternel n’a point parlé par moi. Il dit encore: Vous tous, peuples, entendez!'
  - type: heading
    content: 'V. 29-40: cf. 2 Ch 18:28, etc. (1 R 20:34, 42; 21:19.)'
  '29':
  - type: text
    content: 'Le roi d’Israël et Josaphat, roi de Juda, montèrent à Ramoth en Galaad. '
  '3':
  - type: text
    content: 'Le roi d’Israël dit à ses serviteurs: Savez-vous que Ramoth en Galaad est à nous? Et nous ne nous inquiétons pas de la reprendre des mains du roi de Syrie! '
  '30':
  - type: text
    content: 'Le roi d’Israël dit à Josaphat: Je veux me déguiser pour aller au combat; mais toi, revêts-toi de tes habits. Et le roi d’Israël se déguisa, et alla au combat. '
  '31':
  - type: text
    content: 'Le roi de Syrie avait donné cet ordre aux trente-deux chefs de ses chars: Vous n’attaquerez ni petits ni grands, mais vous attaquerez seulement le roi d’Israël. '
  '32':
  - type: text
    content: 'Quand les chefs des chars aperçurent Josaphat, ils dirent: Certainement, c’est le roi d’Israël. Et ils s’approchèrent de lui pour l’attaquer. Josaphat poussa un cri. '
  '33':
  - type: text
    content: 'Les chefs des chars, voyant que ce n’était pas le roi d’Israël, s’éloignèrent de lui. '
  '34':
  - type: text
    content: 'Alors un homme tira de son arc au hasard, et frappa le roi d’Israël au défaut de la cuirasse. Le roi dit à celui qui dirigeait son char: Tourne, et fais-moi sortir du champ de bataille, car je suis blessé. '
  '35':
  - type: text
    content: 'Le combat devint acharné ce jour-là. Le roi fut retenu dans son char en face des Syriens, et il mourut le soir. Le sang de la blessure coula dans l’intérieur du char. '
  '36':
  - type: text
    content: 'Au coucher du soleil, on cria par tout le camp: Chacun à sa ville et chacun dans son pays! '
  '37':
  - type: text
    content: 'Ainsi mourut le roi, qui fut ramené à Samarie; et on enterra le roi à Samarie. '
  '38':
  - type: text
    content: 'Lorsqu’on lava le char à l’étang de Samarie, les chiens léchèrent le sang d’Achab, et les prostituées s’y baignèrent, selon la parole que l’Éternel avait prononcée. '
  '39':
  - type: text
    content: 'Le reste des actions d’Achab, tout ce qu’il a fait, la maison d’ivoire qu’il construisit, et toutes les villes qu’il a bâties, cela n’est-il pas écrit dans le livre des Chroniques des rois d’Israël? '
  '4':
  - type: text
    content: 'Et il dit à Josaphat: Veux-tu venir avec moi attaquer Ramoth en Galaad? Josaphat répondit au roi d’Israël: Nous irons, moi comme toi, mon peuple comme ton peuple, mes chevaux comme tes chevaux. '
  '40':
  - type: text
    content: Achab se coucha avec ses pères. Et Achazia, son fils, régna à sa place.
  - type: heading
    content: Josaphat, roi de Juda
  - type: heading
    content: 'V. 41-51: cf. (2 Ch 17; 19; 20.) Pr 13:1.'
  '41':
  - type: text
    content: ' '
  - type: note
    content: 2 Ch 20:31.
  - type: text
    content: 'Josaphat, fils d’Asa, régna sur Juda, la quatrième année d’Achab, roi d’Israël. '
  '42':
  - type: text
    content: 'Josaphat avait trente-cinq ans lorsqu’il devint roi, et il régna vingt cinq ans à Jérusalem. Sa mère s’appelait Azuba, fille de Schilchi. '
  '43':
  - type: text
    content: 'Il marcha dans toute la voie d’Asa, son père, et ne s’en détourna point, faisant ce qui est droit aux yeux de l’Éternel. '
  '44':
  - type: text
    content: 'Seulement, les hauts lieux ne disparurent point; le peuple offrait encore des sacrifices et des parfums sur les hauts lieux. '
  '45':
  - type: text
    content: 'Josaphat fut en paix avec le roi d’Israël. '
  '46':
  - type: text
    content: 'Le reste des actions de Josaphat, ses exploits et ses guerres, cela n’est-il pas écrit dans le livre des Chroniques des rois de Juda? '
  '47':
  - type: text
    content: 'Il ôta du pays le reste des prostitués, qui s’y trouvaient encore depuis le temps d’Asa, son père. '
  '48':
  - type: text
    content: 'Il n’y avait point de roi en Édom: c’était un intendant qui gouvernait. '
  '49':
  - type: text
    content: 'Josaphat construisit des navires de Tarsis pour aller à Ophir chercher de l’or; mais il n’y alla point, parce que les navires se brisèrent à Étsjon-Guéber. '
  '5':
  - type: text
    content: 'Puis Josaphat dit au roi d’Israël: Consulte maintenant, je te prie, la parole de l’Éternel. '
  '50':
  - type: text
    content: 'Alors Achazia, fils d’Achab, dit à Josaphat: Veux-tu que mes serviteurs aillent avec les tiens sur des navires? Et Josaphat ne voulut pas. '
  '51':
  - type: text
    content: Josaphat se coucha avec ses pères, et il fut enterré avec ses pères dans la ville de David, son père. Et Joram, son fils, régna à sa place.
  - type: heading
    content: Achazia, roi d’Israël
  - type: heading
    content: 'V. 52-54: cf. 2 R 1.'
  '52':
  - type: text
    content: 'Achazia, fils d’Achab, régna sur Israël à Samarie, la dix-septième année de Josaphat, roi de Juda. Il régna deux ans sur Israël. '
  '53':
  - type: text
    content: 'Il fit ce qui est mal aux yeux de l’Éternel, et il marcha dans la voie de son père et dans la voie de sa mère, et dans la voie de Jéroboam, fils de Nebath, qui avait fait pécher Israël. '
  '54':
  - type: text
    content: Il servit Baal et se prosterna devant lui, et il irrita l’Éternel, le Dieu d’Israël, comme avait fait son père.
  '6':
  - type: text
    content: 'Le roi d’Israël assembla les prophètes, au nombre d’environ quatre cents, et leur dit: Irai-je attaquer Ramoth en Galaad, ou dois-je y renoncer? Et ils répondirent: Monte, et le Seigneur la livrera entre les mains du roi. '
  '7':
  - type: text
    content: 'Mais Josaphat dit: N’y a-t-il plus ici aucun prophète de l’Éternel, par qui nous puissions le consulter? '
  '8':
  - type: text
    content: 'Le roi d’Israël répondit à Josaphat: Il y a encore un homme par qui l’on pourrait consulter l’Éternel; mais je le hais, car il ne me prophétise rien de bon, il ne prophétise que du mal: c’est Michée, fils de Jimla. Et Josaphat dit: Que le roi ne parle pas ainsi! '
  '9':
  - type: text
    content: 'Alors le roi d’Israël appela un eunuque, et dit: Fais venir de suite Michée, fils de Jimla. '
