document_id: PSA.97
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: Ps 96; 99; 113.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 93:1
      metadata:
        usfm: PSA.93.1
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 96:10
      metadata:
        usfm: PSA.96.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'L’Éternel règne: que la terre soit dans l’allégresse,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que les îles nombreuses se réjouissent!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Les nuages et l’obscurité l’environnent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La justice et l’équité sont la base de son trône.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Le feu marche devant lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et embrase à l’entour ses adversaires.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 4:5
      metadata:
        usfm: REV.4.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 77:17
      metadata:
        usfm: PSA.77.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ses éclairs illuminent le monde,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La terre le voit et tremble;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Les montagnes se fondent comme la cire devant l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Devant le Seigneur de toute la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 19:2
      metadata:
        usfm: PSA.19.2
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 50:6
      metadata:
        usfm: PSA.50.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Les cieux publient sa justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tous les peuples voient sa gloire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ils sont confus, tous ceux qui servent les images,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui se font gloire des idoles.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous les dieux se prosternent devant lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Sion l’entend et se réjouit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les filles de Juda sont dans l’allégresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A cause de tes jugements, ô Éternel!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Car toi, Éternel! Tu es le Très-Haut sur toute la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu es souverainement élevé au-dessus de tous les dieux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Vous qui aimez l’Éternel, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Am 5:15
      metadata:
        usfm: AMO.5.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 12:9
      metadata:
        usfm: ROM.12.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: haïssez le mal!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il garde les âmes de ses fidèles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il les délivre de la main des méchants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: La lumière est semée pour le juste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la joie pour ceux dont le cœur est droit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Justes, réjouissez-vous en l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et célébrez par vos louanges sa sainteté!
