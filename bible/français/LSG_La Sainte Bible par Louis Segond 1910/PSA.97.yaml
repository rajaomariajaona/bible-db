document_id: PSA.97,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ps 96; 99; 113.
  - type: text
    content: ' '
  - type: note
    content: Ps 93:1; 96:10.
  - type: text
    content: 'L’Éternel règne: que la terre soit dans l’allégresse,'
  - type: text
    content: Que les îles nombreuses se réjouissent!
  '10':
  - type: text
    content: 'Vous qui aimez l’Éternel, '
  - type: note
    content: Am 5:15. Ro 12:9.
  - type: text
    content: haïssez le mal!
  - type: text
    content: Il garde les âmes de ses fidèles,
  - type: text
    content: Il les délivre de la main des méchants.
  '11':
  - type: text
    content: La lumière est semée pour le juste,
  - type: text
    content: Et la joie pour ceux dont le cœur est droit.
  '12':
  - type: text
    content: Justes, réjouissez-vous en l’Éternel,
  - type: text
    content: Et célébrez par vos louanges sa sainteté!
  '2':
  - type: text
    content: Les nuages et l’obscurité l’environnent,
  - type: text
    content: La justice et l’équité sont la base de son trône.
  '3':
  - type: text
    content: Le feu marche devant lui,
  - type: text
    content: Et embrase à l’entour ses adversaires.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Ap 4:5. Ps 77:17.
  - type: text
    content: Ses éclairs illuminent le monde,
  - type: text
    content: La terre le voit et tremble;
  '5':
  - type: text
    content: Les montagnes se fondent comme la cire devant l’Éternel,
  - type: text
    content: Devant le Seigneur de toute la terre.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Ps 19:2; 50:6.
  - type: text
    content: Les cieux publient sa justice,
  - type: text
    content: Et tous les peuples voient sa gloire.
  '7':
  - type: text
    content: Ils sont confus, tous ceux qui servent les images,
  - type: text
    content: Qui se font gloire des idoles.
  - type: text
    content: Tous les dieux se prosternent devant lui.
  '8':
  - type: text
    content: Sion l’entend et se réjouit,
  - type: text
    content: Les filles de Juda sont dans l’allégresse,
  - type: text
    content: A cause de tes jugements, ô Éternel!
  '9':
  - type: text
    content: Car toi, Éternel! Tu es le Très-Haut sur toute la terre,
  - type: text
    content: Tu es souverainement élevé au-dessus de tous les dieux.
