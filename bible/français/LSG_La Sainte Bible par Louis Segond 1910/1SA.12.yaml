document_id: 1SA.12,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Samuel dépose les fonctions de juge en Israël
  - type: heading
    content: 'V. 1-5: cf. Ac 20:33-35. Ps 15.'
  - type: text
    content: 'Samuel dit à tout Israël: Voici, j’ai écouté votre voix dans tout ce que vous m’avez dit, et j’ai établi un roi sur vous. '
  '10':
  - type: text
    content: 'Ils crièrent encore à l’Éternel, et dirent: Nous avons péché, car nous avons abandonné l’Éternel, et nous avons servi les Baals et les Astartés; délivre-nous maintenant de la main de nos ennemis, et nous te servirons. '
  '11':
  - type: text
    content: 'Et l’Éternel envoya '
  - type: note
    content: Jg 6:14.
  - type: text
    content: 'Jerubbaal, '
  - type: note
    content: Jg 10:3.
  - type: text
    content: 'Bedan, '
  - type: note
    content: Jg 11:15.
  - type: text
    content: 'Jephthé et Samuel, et il vous délivra de la main de vos ennemis qui vous entouraient, et vous demeurâtes en sécurité. '
  '12':
  - type: text
    content: 'Puis, voyant que Nachasch, roi des fils d’Ammon, marchait contre vous, '
  - type: note
    content: 1 S 8:5, 19.
  - type: text
    content: 'vous m’avez dit: Non! Mais un roi régnera sur nous. Et cependant l’Éternel, votre Dieu, était votre roi. '
  '13':
  - type: text
    content: 'Voici donc le roi que vous avez choisi, '
  - type: note
    content: 1 S 10:19.
  - type: text
    content: 'que vous avez demandé; voici, l’Éternel a mis sur vous un roi. '
  '14':
  - type: text
    content: 'Si '
  - type: note
    content: De 1:26.
  - type: text
    content: 'vous craignez l’Éternel, si vous le servez, si vous obéissez à sa voix, et si vous n’êtes point rebelles à la parole de l’Éternel, vous vous attacherez à l’Éternel, votre Dieu, vous et le roi qui règne sur vous. '
  '15':
  - type: text
    content: 'Mais si vous n’obéissez pas à la voix de l’Éternel, et si vous êtes rebelles à la parole de l’Éternel, la main de l’Éternel sera contre vous, comme elle a été contre vos pères. '
  '16':
  - type: text
    content: 'Attendez encore ici, et voyez le prodige que l’Éternel va opérer sous vos yeux. '
  '17':
  - type: text
    content: 'Ne sommes-nous pas à la moisson des blés? J’invoquerai l’Éternel, et il enverra du tonnerre et de la pluie. Sachez alors et voyez combien vous avez eu tort aux yeux de l’Éternel de demander pour vous un roi. '
  '18':
  - type: text
    content: 'Samuel invoqua l’Éternel, et l’Éternel envoya ce même jour du tonnerre et de la pluie. Tout le peuple eut une grande crainte de l’Éternel et de Samuel. '
  '19':
  - type: text
    content: 'Et tout le peuple dit à Samuel: Prie l’Éternel, ton Dieu, pour tes serviteurs, afin que nous ne mourions pas; car nous avons ajouté à tous nos péchés le tort de demander pour nous un roi. '
  '2':
  - type: text
    content: 'Et maintenant, voici le roi qui marchera devant vous. Pour moi, je suis vieux, j’ai blanchi, et mes fils sont avec vous; j’ai marché à votre tête, depuis ma jeunesse jusqu’à ce jour. '
  '20':
  - type: text
    content: 'Samuel dit au peuple: N’ayez point de crainte! Vous avez fait tout ce mal; mais ne vous détournez pas de l’Éternel, et servez l’Éternel de tout votre cœur. '
  '21':
  - type: text
    content: 'Ne vous en détournez pas; sinon, vous iriez après des choses de néant, qui n’apportent ni profit ni délivrance, parce que ce sont des choses de néant. '
  '22':
  - type: text
    content: 'L’Éternel n’abandonnera point son peuple, à cause de son grand nom, car l’Éternel a résolu de faire de vous son peuple. '
  '23':
  - type: text
    content: 'Loin de moi aussi de pécher contre l’Éternel, de cesser de prier pour vous! Je vous enseignerai le bon et le droit chemin. '
  '24':
  - type: text
    content: 'Craignez seulement l’Éternel, et servez-le fidèlement de tout votre cœur; car voyez quelle puissance il déploie parmi vous. '
  '25':
  - type: text
    content: Mais si vous faites le mal, vous périrez, vous et votre roi.
  '3':
  - type: text
    content: 'Me voici! Rendez témoignage contre moi, en présence de l’Éternel et en présence de son oint. De qui ai-je pris le bœuf et de qui ai-je pris l’âne? Qui ai-je opprimé, et qui ai-je traité durement? De qui ai-je reçu un présent, pour fermer les yeux sur lui? Je vous le rendrai. '
  '4':
  - type: text
    content: 'Ils répondirent: Tu ne nous as point opprimés, et tu ne nous as point traités durement, et tu n’as rien reçu de la main de personne. '
  '5':
  - type: text
    content: 'Il leur dit encore: L’Éternel est témoin contre vous, et son oint est témoin, en ce jour, que vous n’avez rien trouvé dans mes mains. Et ils répondirent: Ils en sont témoins.'
  - type: heading
    content: 'V. 6-25: cf. (Mi 6:1-5. Jé 2:4-8.) Jg 2:11-18. 1 S 8:4, etc. (De 30:15-20. Jos 23:14-16.)'
  '6':
  - type: text
    content: 'Alors Samuel dit au peuple: C’est l’Éternel qui a établi Moïse et Aaron, et qui a fait monter vos pères du pays d’Égypte. '
  '7':
  - type: text
    content: 'Maintenant, présentez-vous, et je vous jugerai devant l’Éternel sur tous les bienfaits que l’Éternel vous a accordés, à vous et à vos pères. '
  '8':
  - type: note
    content: Ge 46:5.
  - type: text
    content: 'Après que Jacob fut venu en Égypte, '
  - type: note
    content: Ex 2:23.
  - type: text
    content: 'vos pères crièrent à l’Éternel, et l’Éternel '
  - type: note
    content: Ex 3:10.
  - type: text
    content: 'envoya Moïse et Aaron, qui firent sortir vos pères d’Égypte et les firent habiter dans ce lieu. '
  '9':
  - type: text
    content: 'Mais ils oublièrent l’Éternel, leur Dieu; et il les vendit entre les mains de '
  - type: note
    content: Jg 4:2.
  - type: text
    content: 'Sisera, chef de l’armée de Hatsor, entre '
  - type: note
    content: Jg 10:7; 13:1.
  - type: text
    content: 'les mains des Philistins, et entre les mains du '
  - type: note
    content: Jg 3:12.
  - type: text
    content: 'roi de Moab, qui leur firent la guerre. '
