document_id: MRK.1,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Prédication de Jean-Baptiste
  - type: heading
    content: 'V. 1-8: cf. Mt 3:1-12. Lu 3:1-18.'
  - type: text
    content: 'Commencement de l’Évangile de Jésus-Christ, Fils de Dieu. '
  '10':
  - type: note
    content: Mt 3:16. Lu 3:21. Jn 1:32.
  - type: text
    content: 'Au moment où il sortait de l’eau, il vit les cieux s’ouvrir, et l’Esprit descendre sur lui comme une colombe. '
  '11':
  - type: text
    content: 'Et une voix fit entendre des cieux ces paroles: '
  - type: note
    content: Ps 2:7. És 42:1. Mt 3:17; 17:5. Mc 9:7. Lu 3:22; 9:35. Col 1:13. 2 Pi 1:17.
  - type: text
    content: 'Tu es mon Fils bien-aimé, en toi j’ai mis toute mon affection. '
  '12':
  - type: note
    content: Mt 4:1. Lu 4:1.
  - type: text
    content: 'Aussitôt, l’Esprit poussa Jésus dans le désert, '
  '13':
  - type: text
    content: où il passa quarante jours, tenté par Satan. Il était avec les bêtes sauvages, et les anges le servaient.
  - type: heading
    content: Commencement du ministère de Jésus-Christ
  - type: heading
    content: 'V. 14-15: cf. (Mt 4:12-17. Lu 4:14, 15.)'
  '14':
  - type: text
    content: ' '
  - type: note
    content: Mt 4:12. Lu 4:14. Jn 4:43.
  - type: text
    content: 'Après que Jean eut été livré, Jésus alla dans la Galilée, prêchant l’Évangile de Dieu. '
  '15':
  - type: text
    content: 'Il disait: '
  - type: text
    content: Le temps est accompli, et le royaume de Dieu est proche.
  - type: text
    content: ' '
  - type: note
    content: És 56:1.
  - type: text
    content: Repentez-vous, et croyez à la bonne nouvelle.
  - type: heading
    content: Vocation de quatre disciples
  - type: heading
    content: 'V. 16-20: cf. (Mt 4:18-22. Lu 5:1-11.) Jn 1:35-43.'
  '16':
  - type: text
    content: ' '
  - type: note
    content: Mt 4:18.
  - type: text
    content: 'Comme il passait le long de la mer de Galilée, il vit Simon et André, frère de Simon, qui jetaient un filet dans la mer; car ils étaient pêcheurs. '
  '17':
  - type: text
    content: 'Jésus leur dit: '
  - type: text
    content: Suivez-moi, et je vous ferai pêcheurs
  - type: text
    content: ' '
  - type: note
    content: És 16:16. Éz 47:10.
  - type: text
    content: d’hommes.
  - type: text
    content: ' '
  '18':
  - type: note
    content: Mt 19:27. Mc 10:28. Lu 5:11; 18:28.
  - type: text
    content: 'Aussitôt, ils laissèrent leurs filets, et le suivirent. '
  '19':
  - type: note
    content: Mt 4:21.
  - type: text
    content: 'Étant allé un peu plus loin, il vit Jacques, fils de Zébédée, et Jean, son frère, qui, eux aussi, étaient dans une barque et réparaient les filets. '
  '2':
  - type: text
    content: 'Selon ce qui est écrit dans Ésaïe, le prophète:'
  - type: note
    content: Mal 3:1. Mt 11:10. Lu 7:27.
  - type: text
    content: Voici, j’envoie devant toi mon messager,
  - type: text
    content: Qui préparera ton chemin;
  '20':
  - type: text
    content: Aussitôt, il les appela; et, laissant leur père Zébédée dans la barque avec les ouvriers, ils le suivirent.
  - type: heading
    content: Jésus à Capernaüm. Enseignement dans la synagogue. Guérison d’un démoniaque
  - type: heading
    content: 'V. 21-28: cf. Lu 4:31-37. (Mc 5:1-17. Ac 10:38.)'
  '21':
  - type: text
    content: ' '
  - type: note
    content: Mt 4:13. Lu 4:31.
  - type: text
    content: 'Ils se rendirent à Capernaüm. Et, le jour du sabbat, Jésus entra d’abord dans la synagogue, et il enseigna. '
  '22':
  - type: note
    content: Mt 7:28. Lu 4:32.
  - type: text
    content: 'Ils étaient frappés de sa doctrine; car il enseignait comme ayant autorité, et non pas comme les scribes. '
  '23':
  - type: note
    content: Lu 4:33.
  - type: text
    content: 'Il se trouva dans leur synagogue un homme qui avait un esprit impur, et qui s’écria: '
  '24':
  - type: text
    content: 'Qu’y a-t-il entre nous et toi, Jésus de Nazareth? Tu es venu pour nous perdre. Je sais qui tu es: le Saint de Dieu. '
  '25':
  - type: text
    content: 'Jésus le menaça, disant: '
  - type: text
    content: Tais-toi, et sors de cet homme.
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'Et l’esprit impur sortit de cet homme, en l’agitant avec violence, et en poussant un grand cri. '
  '27':
  - type: text
    content: 'Tous furent saisis de stupéfaction, de sorte qu’ils se demandaient les uns aux autres: Qu’est-ce que ceci? Une nouvelle doctrine! Il commande avec autorité même aux esprits impurs, et ils lui obéissent! '
  '28':
  - type: text
    content: Et sa renommée se répandit aussitôt dans tous les lieux environnants de la Galilée.
  - type: heading
    content: Guérison de la belle-mère de Pierre et de plusieurs malades. — Jésus en divers lieux de la Galilée
  - type: heading
    content: 'V. 29-31: cf. (Mt 8:14, 15. Lu 4:38, 39.)'
  '29':
  - type: text
    content: ' '
  - type: note
    content: Mt 8:14. Lu 4:38.
  - type: text
    content: 'En sortant de la synagogue, ils se rendirent avec Jacques et Jean à la maison de Simon et d’André. '
  '3':
  - type: text
    content: ' '
  - type: note
    content: És 40:3. Mt 3:3. Lu 3:4. Jn 1:23.
  - type: text
    content: 'C’est la voix de celui qui crie dans le désert:'
  - type: text
    content: Préparez le chemin du Seigneur,
  - type: text
    content: Aplanissez ses sentiers.
  '30':
  - type: text
    content: 'La belle-mère de Simon était couchée, ayant la fièvre; et aussitôt on parla d’elle à Jésus. '
  '31':
  - type: text
    content: S’étant approché, il la fit lever en lui prenant la main, et à l’instant la fièvre la quitta. Puis elle les servit.
  - type: heading
    content: 'V. 32-39: cf. (Mt 8:16, 17; 4:23-25. Lu 4:40-44.)'
  '32':
  - type: text
    content: ' '
  - type: note
    content: Mt 8:16. Lu 4:40.
  - type: text
    content: 'Le soir, après le coucher du soleil, on lui amena tous les malades et les démoniaques. '
  '33':
  - type: text
    content: 'Et toute la ville était rassemblée devant sa porte. '
  '34':
  - type: text
    content: 'Il guérit beaucoup de gens qui avaient diverses maladies; il chassa aussi beaucoup de démons, et il ne permettait pas aux démons de parler, parce qu’ils le connaissaient. '
  '35':
  - type: note
    content: Lu 4:12.
  - type: text
    content: 'Vers le matin, pendant qu’il faisait encore très sombre, il se leva, et sortit pour aller dans un lieu désert, '
  - type: note
    content: Mt 14:23.
  - type: text
    content: 'où il pria. '
  '36':
  - type: text
    content: 'Simon et ceux qui étaient avec lui se mirent à sa recherche; '
  '37':
  - type: text
    content: 'et, quand ils l’eurent trouvé, ils lui dirent: Tous te cherchent. '
  '38':
  - type: text
    content: 'Il leur répondit: '
  - type: note
    content: Lu 4:43.
  - type: text
    content: Allons ailleurs, dans les bourgades voisines, afin que j’y prêche aussi;
  - type: text
    content: ' '
  - type: note
    content: És 61:1. Lu 4:18.
  - type: text
    content: car c’est pour cela que je suis sorti.
  - type: text
    content: ' '
  '39':
  - type: text
    content: Et il alla prêcher dans les synagogues, par toute la Galilée, et il chassa les démons.
  - type: heading
    content: Guérison d’un lépreux
  - type: heading
    content: 'V. 40-45: cf. (Mt 8:2-4. Lu 5:12-16.) Lu 17:12-19.'
  '4':
  - type: text
    content: ' '
  - type: note
    content: Mt 3:1. Lu 3:3. Jn 3:23.
  - type: text
    content: 'Jean parut, baptisant dans le désert, et prêchant le baptême de repentance, pour la rémission des péchés. '
  '40':
  - type: text
    content: ' '
  - type: note
    content: Mt 8:2. Lu 5:12.
  - type: text
    content: 'Un lépreux vint à lui; et, se jetant à genoux, il lui dit d’un ton suppliant: Si tu le veux, tu peux me rendre pur. '
  '41':
  - type: text
    content: 'Jésus, ému de compassion, étendit la main, le toucha, et dit: '
  - type: text
    content: Je le veux, sois pur.
  - type: text
    content: ' '
  '42':
  - type: text
    content: 'Aussitôt la lèpre le quitta, et il fut purifié. '
  '43':
  - type: text
    content: 'Jésus le renvoya sur-le-champ, avec de sévères recommandations, '
  '44':
  - type: text
    content: 'et lui dit: '
  - type: text
    content: Garde-toi de rien dire à personne; mais va te montrer au sacrificateur, et offre pour ta purification ce que
  - type: text
    content: ' '
  - type: note
    content: Lé 13:2; 14:1.
  - type: text
    content: Moïse a prescrit, afin que cela leur serve de témoignage.
  - type: text
    content: ' '
  '45':
  - type: text
    content: Mais cet homme, s’en étant allé, se mit à publier hautement la chose et à la divulguer, de sorte que Jésus ne pouvait plus entrer publiquement dans une ville. Il se tenait dehors, dans des lieux déserts, et l’on venait à lui de toutes parts.
  '5':
  - type: note
    content: Mt 3:5. Lu 3:7.
  - type: text
    content: 'Tout le pays de Judée et tous les habitants de Jérusalem se rendaient auprès de lui; et, confessant leurs péchés, ils se faisaient baptiser par lui dans le fleuve du Jourdain. '
  '6':
  - type: note
    content: 2 R 1:8. Mt 3:4.
  - type: text
    content: 'Jean avait un vêtement de poils de chameau, et une ceinture de cuir autour des reins. Il se nourrissait de '
  - type: note
    content: Lé 11:22.
  - type: text
    content: 'sauterelles et de miel sauvage. '
  '7':
  - type: note
    content: Mt 3:11. Lu 3:16. Jn 1:27.
  - type: text
    content: 'Il prêchait, disant: Il vient après moi celui qui est plus puissant que moi, et je ne suis pas digne de délier, en me baissant, la courroie de ses souliers. '
  '8':
  - type: note
    content: Mt 3:11. Ac 1:5; 11:16; 19:4.
  - type: text
    content: 'Moi, je vous ai baptisés d’eau; lui, il vous baptisera '
  - type: note
    content: És 44:3. Joë 2:28. Ac 2:4; 11:15.
  - type: text
    content: du Saint-Esprit.
  - type: heading
    content: Baptême et tentation de Jésus-Christ
  - type: heading
    content: 'V. 9-13: cf. (Mt 3:13-17; 4:1-11. Lu 3:21-23; 4:1-13.)'
  '9':
  - type: text
    content: 'En ce temps-là, Jésus vint de Nazareth en Galilée, et il fut baptisé par Jean dans le Jourdain. '
