      metadata:
        usfm: LUK.4.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 4:43
      metadata:
        usfm: JHN.4.43
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Après que Jean eut été livré, Jésus alla dans la Galilée, prêchant l’Évangile de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Il disait: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Le temps est accompli, et le royaume de Dieu est proche.
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 56:1
      metadata:
        usfm: ISA.56.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Repentez-vous, et croyez à la bonne nouvelle.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vocation de quatre disciples
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 16-20: cf. (Mt 4:18-22. Lu 5:1-11.) Jn 1:35-43.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 4:18
      metadata:
        usfm: MAT.4.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Comme il passait le long de la mer de Galilée, il vit Simon et André, frère de Simon, qui jetaient un filet dans la mer; car ils étaient pêcheurs. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Jésus leur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Suivez-moi, et je vous ferai pêcheurs
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'És 16:16. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 47:10
      metadata:
        usfm: EZK.47.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: d’hommes.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 19:27
      metadata:
        usfm: MAT.19.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 10:28
      metadata:
        usfm: MRK.10.28
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 5:11
      metadata:
        usfm: LUK.5.11
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 18:28
      metadata:
        usfm: LUK.18.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Aussitôt, ils laissèrent leurs filets, et le suivirent. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 4:21
      metadata:
        usfm: MAT.4.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Étant allé un peu plus loin, il vit Jacques, fils de Zébédée, et Jean, son frère, qui, eux aussi, étaient dans une barque et réparaient les filets. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Aussitôt, il les appela; et, laissant leur père Zébédée dans la barque avec les ouvriers, ils le suivirent.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus à Capernaüm. Enseignement dans la synagogue. Guérison d’un démoniaque
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 21-28: cf. Lu 4:31-37. (Mc 5:1-17. Ac 10:38.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 4:13
      metadata:
        usfm: MAT.4.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 4:31
      metadata:
        usfm: LUK.4.31
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ils se rendirent à Capernaüm. Et, le jour du sabbat, Jésus entra d’abord dans la synagogue, et il enseigna. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 7:28
      metadata:
        usfm: MAT.7.28
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 4:32
      metadata:
        usfm: LUK.4.32
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ils étaient frappés de sa doctrine; car il enseignait comme ayant autorité, et non pas comme les scribes. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 4:33
      metadata:
        usfm: LUK.4.33
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il se trouva dans leur synagogue un homme qui avait un esprit impur, et qui s’écria: '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Qu’y a-t-il entre nous et toi, Jésus de Nazareth? Tu es venu pour nous perdre. Je sais qui tu es: le Saint de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Jésus le menaça, disant: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Tais-toi, et sors de cet homme.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Et l’esprit impur sortit de cet homme, en l’agitant avec violence, et en poussant un grand cri. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Tous furent saisis de stupéfaction, de sorte qu’ils se demandaient les uns aux autres: Qu’est-ce que ceci? Une nouvelle doctrine! Il commande avec autorité même aux esprits impurs, et ils lui obéissent! '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Et sa renommée se répandit aussitôt dans tous les lieux environnants de la Galilée.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Guérison de la belle-mère de Pierre et de plusieurs malades. — Jésus en divers lieux de la Galilée
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 29-31: cf. (Mt 8:14, 15. Lu 4:38, 39.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 8:14
      metadata:
        usfm: MAT.8.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 4:38
      metadata:
        usfm: LUK.4.38
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'En sortant de la synagogue, ils se rendirent avec Jacques et Jean à la maison de Simon et d’André. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'La belle-mère de Simon était couchée, ayant la fièvre; et aussitôt on parla d’elle à Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: S’étant approché, il la fit lever en lui prenant la main, et à l’instant la fièvre la quitta. Puis elle les servit.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 32-39: cf. (Mt 8:16, 17; 4:23-25. Lu 4:40-44.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 8:16
      metadata:
        usfm: MAT.8.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 4:40
      metadata:
        usfm: LUK.4.40
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Le soir, après le coucher du soleil, on lui amena tous les malades et les démoniaques. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Et toute la ville était rassemblée devant sa porte. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Il guérit beaucoup de gens qui avaient diverses maladies; il chassa aussi beaucoup de démons, et il ne permettait pas aux démons de parler, parce qu’ils le connaissaient. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 4:12
      metadata:
        usfm: LUK.4.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Vers le matin, pendant qu’il faisait encore très sombre, il se leva, et sortit pour aller dans un lieu désert, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 14:23
      metadata:
        usfm: MAT.14.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'où il pria. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Simon et ceux qui étaient avec lui se mirent à sa recherche; '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'et, quand ils l’eurent trouvé, ils lui dirent: Tous te cherchent. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Il leur répondit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 4:43
      metadata:
        usfm: LUK.4.43
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Allons ailleurs, dans les bourgades voisines, afin que j’y prêche aussi;
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 61:1
      metadata:
        usfm: ISA.61.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 4:18
      metadata:
        usfm: LUK.4.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: car c’est pour cela que je suis sorti.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Et il alla prêcher dans les synagogues, par toute la Galilée, et il chassa les démons.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Guérison d’un lépreux
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 40-45: cf. (Mt 8:2-4. Lu 5:12-16.) Lu 17:12-19.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 8:2
      metadata:
        usfm: MAT.8.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 5:12
      metadata:
        usfm: LUK.5.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Un lépreux vint à lui; et, se jetant à genoux, il lui dit d’un ton suppliant: Si tu le veux, tu peux me rendre pur. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Jésus, ému de compassion, étendit la main, le toucha, et dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je le veux, sois pur.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Aussitôt la lèpre le quitta, et il fut purifié. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Jésus le renvoya sur-le-champ, avec de sévères recommandations, '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'et lui dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Garde-toi de rien dire à personne; mais va te montrer au sacrificateur, et offre pour ta purification ce que
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 13:2
      metadata:
        usfm: LEV.13.2
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 14:1
      metadata:
        usfm: LEV.14.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Moïse a prescrit, afin que cela leur serve de témoignage.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Mais cet homme, s’en étant allé, se mit à publier hautement la chose et à la divulguer, de sorte que Jésus ne pouvait plus entrer publiquement dans une ville. Il se tenait dehors, dans des lieux déserts, et l’on venait à lui de toutes parts.
