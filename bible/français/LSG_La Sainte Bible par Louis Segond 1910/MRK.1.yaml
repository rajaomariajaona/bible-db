      metadata:
        usfm: JHN.3.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Jean parut, baptisant dans le désert, et prêchant le baptême de repentance, pour la rémission des péchés. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 3:5
      metadata:
        usfm: MAT.3.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 3:7
      metadata:
        usfm: LUK.3.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tout le pays de Judée et tous les habitants de Jérusalem se rendaient auprès de lui; et, confessant leurs péchés, ils se faisaient baptiser par lui dans le fleuve du Jourdain. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 1:8
      metadata:
        usfm: 2KI.1.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 3:4
      metadata:
        usfm: MAT.3.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Jean avait un vêtement de poils de chameau, et une ceinture de cuir autour des reins. Il se nourrissait de '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 11:22
      metadata:
        usfm: LEV.11.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'sauterelles et de miel sauvage. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 3:11
      metadata:
        usfm: MAT.3.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 3:16
      metadata:
        usfm: LUK.3.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 1:27
      metadata:
        usfm: JHN.1.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il prêchait, disant: Il vient après moi celui qui est plus puissant que moi, et je ne suis pas digne de délier, en me baissant, la courroie de ses souliers. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 3:11
      metadata:
        usfm: MAT.3.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 1:5
      metadata:
        usfm: ACT.1.5
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 11:16
      metadata:
        usfm: ACT.11.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 19:4
      metadata:
        usfm: ACT.19.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Moi, je vous ai baptisés d’eau; lui, il vous baptisera '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 44:3
      metadata:
        usfm: ISA.44.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Joë 2:28
      metadata:
        usfm: JOL.2.28
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 2:4
      metadata:
        usfm: ACT.2.4
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 11:15
      metadata:
        usfm: ACT.11.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: du Saint-Esprit.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Baptême et tentation de Jésus-Christ
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 9-13: cf. (Mt 3:13-17; 4:1-11. Lu 3:21-23; 4:1-13.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'En ce temps-là, Jésus vint de Nazareth en Galilée, et il fut baptisé par Jean dans le Jourdain. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 3:16
      metadata:
        usfm: MAT.3.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 3:21
      metadata:
        usfm: LUK.3.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 1:32
      metadata:
        usfm: JHN.1.32
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Au moment où il sortait de l’eau, il vit les cieux s’ouvrir, et l’Esprit descendre sur lui comme une colombe. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Et une voix fit entendre des cieux ces paroles: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 2:7
      metadata:
        usfm: PSA.2.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 42:1
      metadata:
        usfm: ISA.42.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 3:17
      metadata:
        usfm: MAT.3.17
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 17:5
      metadata:
        usfm: MAT.17.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 9:7
      metadata:
        usfm: MRK.9.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 3:22
      metadata:
        usfm: LUK.3.22
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 9:35
      metadata:
        usfm: LUK.9.35
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 1:13
      metadata:
        usfm: COL.1.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Pi 1:17
      metadata:
        usfm: 2PE.1.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu es mon Fils bien-aimé, en toi j’ai mis toute mon affection. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 4:1
      metadata:
        usfm: MAT.4.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 4:1
      metadata:
        usfm: LUK.4.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Aussitôt, l’Esprit poussa Jésus dans le désert, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: où il passa quarante jours, tenté par Satan. Il était avec les bêtes sauvages, et les anges le servaient.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Commencement du ministère de Jésus-Christ
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 14-15: cf. (Mt 4:12-17. Lu 4:14, 15.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 4:12
      metadata:
        usfm: MAT.4.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
