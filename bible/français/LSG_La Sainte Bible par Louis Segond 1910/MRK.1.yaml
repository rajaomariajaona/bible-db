document_id: MRK.1,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prédication de Jean-Baptiste
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-8: cf. Mt 3:1-12. Lu 3:1-18.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Commencement de l’Évangile de Jésus-Christ, Fils de Dieu. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 3:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 3:21
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 1:32
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Au moment où il sortait de l’eau, il vit les cieux s’ouvrir, et l’Esprit descendre sur lui comme une colombe. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et une voix fit entendre des cieux ces paroles: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 2:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 42:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 3:17
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 17:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 9:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 3:22
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:35
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 1:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Pi 1:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Tu es mon Fils bien-aimé, en toi j’ai mis toute mon affection. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 4:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 4:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Aussitôt, l’Esprit poussa Jésus dans le désert, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: où il passa quarante jours, tenté par Satan. Il était avec les bêtes sauvages, et les anges le servaient.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Commencement du ministère de Jésus-Christ
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 14-15: cf. (Mt 4:12-17. Lu 4:14, 15.)'
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 4:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 4:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 4:43
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Après que Jean eut été livré, Jésus alla dans la Galilée, prêchant l’Évangile de Dieu. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il disait: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Le temps est accompli, et le royaume de Dieu est proche.
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 56:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Repentez-vous, et croyez à la bonne nouvelle.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Vocation de quatre disciples
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 16-20: cf. (Mt 4:18-22. Lu 5:1-11.) Jn 1:35-43.'
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 4:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Comme il passait le long de la mer de Galilée, il vit Simon et André, frère de Simon, qui jetaient un filet dans la mer; car ils étaient pêcheurs. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus leur dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Suivez-moi, et je vous ferai pêcheurs
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'És 16:16. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 47:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: d’hommes.
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 19:27
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 10:28
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 5:11
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18:28
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Aussitôt, ils laissèrent leurs filets, et le suivirent. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 4:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Étant allé un peu plus loin, il vit Jacques, fils de Zébédée, et Jean, son frère, qui, eux aussi, étaient dans une barque et réparaient les filets. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Selon ce qui est écrit dans Ésaïe, le prophète:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mal 3:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 11:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 7:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Voici, j’envoie devant toi mon messager,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui préparera ton chemin;
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aussitôt, il les appela; et, laissant leur père Zébédée dans la barque avec les ouvriers, ils le suivirent.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus à Capernaüm. Enseignement dans la synagogue. Guérison d’un démoniaque
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 21-28: cf. Lu 4:31-37. (Mc 5:1-17. Ac 10:38.)'
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 4:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 4:31
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Ils se rendirent à Capernaüm. Et, le jour du sabbat, Jésus entra d’abord dans la synagogue, et il enseigna. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 7:28
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 4:32
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Ils étaient frappés de sa doctrine; car il enseignait comme ayant autorité, et non pas comme les scribes. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 4:33
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Il se trouva dans leur synagogue un homme qui avait un esprit impur, et qui s’écria: '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Qu’y a-t-il entre nous et toi, Jésus de Nazareth? Tu es venu pour nous perdre. Je sais qui tu es: le Saint de Dieu. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus le menaça, disant: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Tais-toi, et sors de cet homme.
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et l’esprit impur sortit de cet homme, en l’agitant avec violence, et en poussant un grand cri. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tous furent saisis de stupéfaction, de sorte qu’ils se demandaient les uns aux autres: Qu’est-ce que ceci? Une nouvelle doctrine! Il commande avec autorité même aux esprits impurs, et ils lui obéissent! '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et sa renommée se répandit aussitôt dans tous les lieux environnants de la Galilée.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Guérison de la belle-mère de Pierre et de plusieurs malades. — Jésus en divers lieux de la Galilée
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 29-31: cf. (Mt 8:14, 15. Lu 4:38, 39.)'
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 8:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 4:38
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'En sortant de la synagogue, ils se rendirent avec Jacques et Jean à la maison de Simon et d’André. '
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 40:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 3:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 3:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 1:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'C’est la voix de celui qui crie dans le désert:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Préparez le chemin du Seigneur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aplanissez ses sentiers.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La belle-mère de Simon était couchée, ayant la fièvre; et aussitôt on parla d’elle à Jésus. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: S’étant approché, il la fit lever en lui prenant la main, et à l’instant la fièvre la quitta. Puis elle les servit.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 32-39: cf. (Mt 8:16, 17; 4:23-25. Lu 4:40-44.)'
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 8:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 4:40
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Le soir, après le coucher du soleil, on lui amena tous les malades et les démoniaques. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et toute la ville était rassemblée devant sa porte. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il guérit beaucoup de gens qui avaient diverses maladies; il chassa aussi beaucoup de démons, et il ne permettait pas aux démons de parler, parce qu’ils le connaissaient. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 4:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Vers le matin, pendant qu’il faisait encore très sombre, il se leva, et sortit pour aller dans un lieu désert, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 14:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'où il pria. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Simon et ceux qui étaient avec lui se mirent à sa recherche; '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et, quand ils l’eurent trouvé, ils lui dirent: Tous te cherchent. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il leur répondit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 4:43
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Allons ailleurs, dans les bourgades voisines, afin que j’y prêche aussi;
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 61:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 4:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: car c’est pour cela que je suis sorti.
    - type: text
      text: ' '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et il alla prêcher dans les synagogues, par toute la Galilée, et il chassa les démons.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Guérison d’un lépreux
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 40-45: cf. (Mt 8:2-4. Lu 5:12-16.) Lu 17:12-19.'
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 3:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 3:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 3:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Jean parut, baptisant dans le désert, et prêchant le baptême de repentance, pour la rémission des péchés. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 8:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 5:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Un lépreux vint à lui; et, se jetant à genoux, il lui dit d’un ton suppliant: Si tu le veux, tu peux me rendre pur. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus, ému de compassion, étendit la main, le toucha, et dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Je le veux, sois pur.
    - type: text
      text: ' '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aussitôt la lèpre le quitta, et il fut purifié. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus le renvoya sur-le-champ, avec de sévères recommandations, '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et lui dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Garde-toi de rien dire à personne; mais va te montrer au sacrificateur, et offre pour ta purification ce que
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 13:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Moïse a prescrit, afin que cela leur serve de témoignage.
    - type: text
      text: ' '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais cet homme, s’en étant allé, se mit à publier hautement la chose et à la divulguer, de sorte que Jésus ne pouvait plus entrer publiquement dans une ville. Il se tenait dehors, dans des lieux déserts, et l’on venait à lui de toutes parts.
  '5':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 3:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 3:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Tout le pays de Judée et tous les habitants de Jérusalem se rendaient auprès de lui; et, confessant leurs péchés, ils se faisaient baptiser par lui dans le fleuve du Jourdain. '
  '6':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 1:8
      - type: text
        text: '. '
