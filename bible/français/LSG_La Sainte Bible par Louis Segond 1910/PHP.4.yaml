document_id: PHP.4,93
type_code: fra
verses:
  '1':
  - type: text
    content: 'C’est pourquoi, mes bien-aimés, et très chers frères, vous qui êtes ma joie et '
  - type: note
    content: 1 Th 2:19.
  - type: text
    content: ma couronne, demeurez ainsi fermes dans le Seigneur, mes bien-aimés!
  - type: heading
    content: Recommandations, exhortations diverses
  - type: heading
    content: 'V. 2-3: cf. Ph 2:1-3. Ro 16:1-4.'
  '10':
  - type: text
    content: 'J’ai éprouvé une grande joie dans le Seigneur de ce que vous avez pu enfin renouveler l’expression '
  - type: note
    content: 2 Co 11:9.
  - type: text
    content: 'de vos sentiments pour moi; vous y pensiez bien, mais l’occasion vous manquait. '
  '11':
  - type: text
    content: 'Ce n’est pas en vue de mes besoins que je dis cela, car j’ai appris '
  - type: note
    content: 1 Ti 6:6.
  - type: text
    content: 'à être content de l’état où je me trouve. '
  '12':
  - type: text
    content: 'Je sais '
  - type: note
    content: 1 Co 4:11. 2 Co 11:27.
  - type: text
    content: 'vivre dans l’humiliation, et je sais vivre dans l’abondance. En tout et partout j’ai appris à être rassasié et à avoir faim, à être dans l’abondance et à être dans la disette. '
  '13':
  - type: text
    content: 'Je puis tout par celui qui me fortifie. '
  '14':
  - type: text
    content: 'Cependant vous avez bien fait de prendre part à ma détresse. '
  '15':
  - type: note
    content: 2 Co 11:9.
  - type: text
    content: 'Vous le savez vous-mêmes, Philippiens, au commencement de la prédication de l’Évangile, lorsque je partis de la Macédoine, aucune Église n’entra en compte avec moi pour ce qu’elle donnait et recevait; '
  '16':
  - type: text
    content: 'vous fûtes les seuls à le faire, car vous m’envoyâtes déjà à Thessalonique, et à deux reprises, de quoi pourvoir à mes besoins. '
  '17':
  - type: text
    content: 'Ce n’est pas que je recherche les dons; mais je recherche le fruit qui abonde pour votre compte. '
  '18':
  - type: text
    content: 'J’ai tout reçu, et je suis dans l’abondance; j’ai été comblé de biens, en recevant par Épaphrodite ce qui vient de vous '
  - type: note
    content: Hé 13:16.
  - type: text
    content: 'comme un parfum de bonne odeur, un sacrifice que Dieu accepte, et qui lui est agréable. '
  '19':
  - type: text
    content: 'Et mon Dieu pourvoira à tous vos besoins selon sa richesse, avec gloire, en Jésus-Christ. '
  '2':
  - type: text
    content: 'J’exhorte Évodie et j’exhorte Syntyche à être d’un même sentiment dans le Seigneur. '
  '20':
  - type: text
    content: A notre Dieu et Père soit la gloire aux siècles des siècles! Amen!
  - type: heading
    content: 'V. 21-23: cf. 1 Co 16:20-24.'
  '21':
  - type: text
    content: 'Saluez tous les saints en Jésus-Christ. Les frères qui sont avec moi vous saluent. '
  '22':
  - type: text
    content: 'Tous les saints vous saluent, et principalement ceux de la maison de César. '
  '23':
  - type: text
    content: Que la grâce du Seigneur Jésus-Christ soit avec votre esprit!
  '3':
  - type: text
    content: 'Et toi aussi, fidèle collègue, oui, je te prie de les aider, elles qui ont combattu pour l’Évangile avec moi, et avec Clément et mes autres compagnons d’œuvre, '
  - type: note
    content: Ex 32:23. Ps 69:29. Ap 3:5; 20:12; 21:27.
  - type: text
    content: dont les noms sont dans le livre de vie.
  - type: heading
    content: 'V. 4-9: cf. 1 Th 5:16. Mt 11:29. (1 Pi 5:7. Col 4:2.) Ja 3:17, 18.'
  '4':
  - type: text
    content: 'Réjouissez-vous toujours dans le Seigneur; je le répète, réjouissez-vous. '
  '5':
  - type: text
    content: 'Que votre douceur soit connue de tous les hommes. '
  - type: note
    content: 1 Co 10:11. Hé 10:25.
  - type: text
    content: 'Le Seigneur est proche. '
  '6':
  - type: note
    content: Ps 55:23. Mt 6:25. 1 Ti 6:8, 17. 1 Pi 5:7.
  - type: text
    content: 'Ne vous inquiétez de rien; mais en toute chose faites connaître vos besoins à Dieu par des prières et des supplications, avec des actions de grâces. '
  '7':
  - type: note
    content: Jn 14:27. Ro 5:1. Ép 2:14.
  - type: text
    content: 'Et la paix de Dieu, qui surpasse toute intelligence, gardera vos cœurs et vos pensées en Jésus-Christ. '
  '8':
  - type: text
    content: 'Au reste, frères, que tout ce qui est vrai, '
  - type: note
    content: Ro 13:13.
  - type: text
    content: 'tout ce qui est honorable, tout ce qui est juste, tout ce qui est '
  - type: note
    content: 1 Th 4:3, 4, 5.
  - type: text
    content: 'pur, tout ce qui est aimable, tout ce qui mérite l’approbation, ce qui est vertueux et digne de louange, soit l’objet de vos pensées. '
  '9':
  - type: text
    content: Ce que vous avez appris, reçu et entendu de moi, et ce que vous avez vu en moi, pratiquez-le. Et le Dieu de paix sera avec vous.
  - type: heading
    content: Remerciements de Paul aux Philippiens pour les dons qu’il a reçus d’eux. Salutations
  - type: heading
    content: 'V. 10-20: cf. Hé 13:3, 5, 16. (Ph 1:7; 2:25.) (Ga 6:6, 9, 10. 2 Co 9:6-15.)'
