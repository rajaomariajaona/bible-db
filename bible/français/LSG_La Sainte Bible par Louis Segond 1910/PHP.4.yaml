document_id: PHP.4,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est pourquoi, mes bien-aimés, et très chers frères, vous qui êtes ma joie et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Th 2:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: ma couronne, demeurez ainsi fermes dans le Seigneur, mes bien-aimés!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Recommandations, exhortations diverses
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 2-3: cf. Ph 2:1-3. Ro 16:1-4.'
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’ai éprouvé une grande joie dans le Seigneur de ce que vous avez pu enfin renouveler l’expression '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 11:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'de vos sentiments pour moi; vous y pensiez bien, mais l’occasion vous manquait. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce n’est pas en vue de mes besoins que je dis cela, car j’ai appris '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ti 6:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'à être content de l’état où je me trouve. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je sais '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 4:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 11:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'vivre dans l’humiliation, et je sais vivre dans l’abondance. En tout et partout j’ai appris à être rassasié et à avoir faim, à être dans l’abondance et à être dans la disette. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je puis tout par celui qui me fortifie. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cependant vous avez bien fait de prendre part à ma détresse. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 11:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Vous le savez vous-mêmes, Philippiens, au commencement de la prédication de l’Évangile, lorsque je partis de la Macédoine, aucune Église n’entra en compte avec moi pour ce qu’elle donnait et recevait; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'vous fûtes les seuls à le faire, car vous m’envoyâtes déjà à Thessalonique, et à deux reprises, de quoi pourvoir à mes besoins. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce n’est pas que je recherche les dons; mais je recherche le fruit qui abonde pour votre compte. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’ai tout reçu, et je suis dans l’abondance; j’ai été comblé de biens, en recevant par Épaphrodite ce qui vient de vous '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 13:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'comme un parfum de bonne odeur, un sacrifice que Dieu accepte, et qui lui est agréable. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et mon Dieu pourvoira à tous vos besoins selon sa richesse, avec gloire, en Jésus-Christ. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’exhorte Évodie et j’exhorte Syntyche à être d’un même sentiment dans le Seigneur. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: A notre Dieu et Père soit la gloire aux siècles des siècles! Amen!
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 21-23: cf. 1 Co 16:20-24.'
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saluez tous les saints en Jésus-Christ. Les frères qui sont avec moi vous saluent. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tous les saints vous saluent, et principalement ceux de la maison de César. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Que la grâce du Seigneur Jésus-Christ soit avec votre esprit!
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et toi aussi, fidèle collègue, oui, je te prie de les aider, elles qui ont combattu pour l’Évangile avec moi, et avec Clément et mes autres compagnons d’œuvre, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 32:23
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 69:29
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 3:5
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 20:12
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 21:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: dont les noms sont dans le livre de vie.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 4-9: cf. 1 Th 5:16. Mt 11:29. (1 Pi 5:7. Col 4:2.) Ja 3:17, 18.'
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Réjouissez-vous toujours dans le Seigneur; je le répète, réjouissez-vous. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Que votre douceur soit connue de tous les hommes. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 10:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 10:25
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Le Seigneur est proche. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 55:23
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 6:25
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ti 6:8
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '17'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 5:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Ne vous inquiétez de rien; mais en toute chose faites connaître vos besoins à Dieu par des prières et des supplications, avec des actions de grâces. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 14:27
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 5:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 2:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Et la paix de Dieu, qui surpasse toute intelligence, gardera vos cœurs et vos pensées en Jésus-Christ. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Au reste, frères, que tout ce qui est vrai, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 13:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'tout ce qui est honorable, tout ce qui est juste, tout ce qui est '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Th 4:3
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '4'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '5'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'pur, tout ce qui est aimable, tout ce qui mérite l’approbation, ce qui est vertueux et digne de louange, soit l’objet de vos pensées. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ce que vous avez appris, reçu et entendu de moi, et ce que vous avez vu en moi, pratiquez-le. Et le Dieu de paix sera avec vous.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Remerciements de Paul aux Philippiens pour les dons qu’il a reçus d’eux. Salutations
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 10-20: cf. Hé 13:3, 5, 16. (Ph 1:7; 2:25.) (Ga 6:6, 9, 10. 2 Co 9:6-15.)'
    marker-yv: yv-h
