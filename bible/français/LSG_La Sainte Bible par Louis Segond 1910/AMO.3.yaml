document_id: AMO.3,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Reproches et menaces
  - type: heading
    content: 'V. 1-8: cf. Lu 12:47, 48. 2 Pi 1:21.'
  - type: text
    content: Écoutez cette parole que l’Éternel prononce contre vous, enfants d’Israël,
  - type: text
    content: Contre toute la famille que j’ai fait monter du pays d’Égypte!
  '10':
  - type: text
    content: Ils ne savent pas agir avec droiture, dit l’Éternel,
  - type: text
    content: Ils entassent dans leurs palais les produits de la violence et de la rapine.
  '11':
  - type: text
    content: 'C’est pourquoi ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: L’ennemi investira le pays,
  - type: text
    content: Il détruira ta force,
  - type: text
    content: Et tes palais seront pillés.
  '12':
  - type: text
    content: 'Ainsi parle l’Éternel:'
  - type: text
    content: Comme le berger arrache de la gueule du lion
  - type: text
    content: Deux jambes ou un bout d’oreille,
  - type: text
    content: Ainsi se sauveront les enfants d’Israël qui sont assis dans Samarie
  - type: text
    content: A l’angle d’un lit et sur des tapis de damas.
  '13':
  - type: text
    content: Écoutez, et déclarez ceci à la maison de Jacob!
  - type: text
    content: Dit le Seigneur, l’Éternel, le Dieu des armées.
  '14':
  - type: text
    content: Le jour où je punirai Israël pour ses transgressions,
  - type: text
    content: Je frapperai sur les autels de Béthel;
  - type: text
    content: Les cornes de l’autel seront brisées,
  - type: text
    content: Et tomberont à terre.
  '15':
  - type: text
    content: Je renverserai les maisons d’hiver et les maisons d’été;
  - type: text
    content: Les palais d’ivoire périront,
  - type: text
    content: Les maisons des grands disparaîtront, dit l’Éternel.
  '2':
  - type: text
    content: Je vous ai choisis, vous seuls parmi toutes les familles de la terre;
  - type: text
    content: C’est pourquoi je vous châtierai pour toutes vos iniquités.
  '3':
  - type: text
    content: Deux hommes marchent-ils ensemble,
  - type: text
    content: Sans en être convenus?
  '4':
  - type: text
    content: Le lion rugit-il dans la forêt,
  - type: text
    content: Sans avoir une proie?
  - type: text
    content: Le lionceau pousse-t-il des cris du fond de sa tanière,
  - type: text
    content: Sans avoir fait une capture?
  '5':
  - type: text
    content: L’oiseau tombe-t-il dans le filet qui est à terre,
  - type: text
    content: Sans qu’il y ait un piège?
  - type: text
    content: Le filet s’élève-t-il de terre,
  - type: text
    content: Sans qu’il y ait rien de pris?
  '6':
  - type: text
    content: Sonne-t-on de la trompette dans une ville,
  - type: text
    content: Sans que le peuple soit dans l’épouvante?
  - type: note
    content: És 45:7. La 3:37, 38.
  - type: text
    content: Arrive-t-il un malheur dans une ville,
  - type: text
    content: Sans que l’Éternel en soit l’auteur?
  '7':
  - type: text
    content: Car le Seigneur, l’Éternel, ne fait rien
  - type: text
    content: Sans avoir révélé son secret à ses serviteurs les prophètes.
  '8':
  - type: text
    content: 'Le lion rugit: qui ne serait effrayé?'
  - type: text
    content: 'Le Seigneur, l’Éternel, parle: qui ne prophétiserait?'
  - type: heading
    content: 'V. 9-15: cf. Am 4:1-3; 6.'
  '9':
  - type: text
    content: Faites retentir votre voix dans les palais d’Asdod
  - type: text
    content: Et dans les palais du pays d’Égypte,
  - type: text
    content: 'Et dites: Rassemblez-vous sur les montagnes de Samarie,'
  - type: text
    content: Et voyez quelle immense confusion au milieu d’elle,
  - type: text
    content: Quelles violences dans son sein!
