document_id: AMO.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Reproches et menaces
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-8: cf. Lu 12:47, 48. 2 Pi 1:21.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Écoutez cette parole que l’Éternel prononce contre vous, enfants d’Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Contre toute la famille que j’ai fait monter du pays d’Égypte!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Je vous ai choisis, vous seuls parmi toutes les familles de la terre;
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est pourquoi je vous châtierai pour toutes vos iniquités.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Deux hommes marchent-ils ensemble,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sans en être convenus?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Le lion rugit-il dans la forêt,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sans avoir une proie?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le lionceau pousse-t-il des cris du fond de sa tanière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sans avoir fait une capture?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: L’oiseau tombe-t-il dans le filet qui est à terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sans qu’il y ait un piège?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le filet s’élève-t-il de terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sans qu’il y ait rien de pris?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Sonne-t-on de la trompette dans une ville,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sans que le peuple soit dans l’épouvante?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 45:7
      metadata:
        usfm: ISA.45.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: La 3:37
      metadata:
        usfm: LAM.3.37
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '38'
      metadata:
        usfm: LAM.3.38
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Arrive-t-il un malheur dans une ville,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sans que l’Éternel en soit l’auteur?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Car le Seigneur, l’Éternel, ne fait rien
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sans avoir révélé son secret à ses serviteurs les prophètes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Le lion rugit: qui ne serait effrayé?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Le Seigneur, l’Éternel, parle: qui ne prophétiserait?'
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 9-15: cf. Am 4:1-3; 6.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Faites retentir votre voix dans les palais d’Asdod
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et dans les palais du pays d’Égypte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et dites: Rassemblez-vous sur les montagnes de Samarie,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et voyez quelle immense confusion au milieu d’elle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quelles violences dans son sein!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ils ne savent pas agir avec droiture, dit l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils entassent dans leurs palais les produits de la violence et de la rapine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'C’est pourquoi ainsi parle le Seigneur, l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’ennemi investira le pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il détruira ta force,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tes palais seront pillés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ainsi parle l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme le berger arrache de la gueule du lion
- type: usfm
  marker: q1
  children:
  - type: text
    text: Deux jambes ou un bout d’oreille,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ainsi se sauveront les enfants d’Israël qui sont assis dans Samarie
- type: usfm
  marker: q1
  children:
  - type: text
    text: A l’angle d’un lit et sur des tapis de damas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Écoutez, et déclarez ceci à la maison de Jacob!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit le Seigneur, l’Éternel, le Dieu des armées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Le jour où je punirai Israël pour ses transgressions,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je frapperai sur les autels de Béthel;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les cornes de l’autel seront brisées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tomberont à terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Je renverserai les maisons d’hiver et les maisons d’été;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les palais d’ivoire périront,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les maisons des grands disparaîtront, dit l’Éternel.
