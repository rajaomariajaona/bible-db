document_id: AMO.9,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dernière vision. Dernière menace
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-10: cf. Am 2:13-16. De 4:26-31.'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Je vis le Seigneur qui se tenait sur l’autel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et il dit: Frappe les chapiteaux et que les seuils s’ébranlent,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et brise-les sur leurs têtes à tous!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ferai périr le reste par l’épée.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aucun d’eux ne pourra se sauver en fuyant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aucun d’eux n’échappera.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Tous les pécheurs de mon peuple mourront par l’épée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ceux qui disent: Le malheur n’approchera pas, ne nous atteindra pas.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Promesse de restauration
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 11-15: cf. Ac 15:13-18. Joë 3:17-21.'
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 15:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: En ce temps-là, je relèverai de sa chute la maison de David,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’en réparerai les brèches, j’en redresserai les ruines,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je la rebâtirai comme elle était autrefois,
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Afin qu’ils possèdent le reste d’Édom et toutes les nations
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur lesquelles mon nom a été invoqué,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit l’Éternel, qui accomplira ces choses.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Voici, les jours viennent, dit l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Où le laboureur suivra de près le moissonneur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et celui qui foule le raisin celui qui répand la semence,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Où le '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Joë 3:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: moût ruissellera des montagnes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et coulera de toutes les collines.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Je ramènerai les captifs de mon peuple d’Israël;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils rebâtiront les villes dévastées et les habiteront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils planteront des vignes et en boiront le vin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils établiront des jardins et en mangeront les fruits.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Je les planterai '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 32:41
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: dans leur pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils ne seront plus arrachés du pays que je leur ai donné,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit L’Éternel, ton Dieu.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps 139:8, etc.
      marker-yv: yv-n
    - type: text
      text: S’ils pénètrent dans le séjour des morts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ma main les en arrachera;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: S’ils montent aux cieux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je les en ferai descendre.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: S’ils se cachent au sommet du Carmel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je les y chercherai et je les saisirai;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: S’ils se dérobent à mes regards dans le fond de la mer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Là j’ordonnerai au serpent de les mordre.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: S’ils vont en captivité devant leurs ennemis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Là j’ordonnerai à l’épée de les faire périr;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 44:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: dirigerai contre eux mes regards
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour faire du mal et non du bien.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Le Seigneur, l’Éternel des armées, touche la terre, et elle tremble,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tous ses habitants sont dans le deuil;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle monte tout entière comme le fleuve,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et elle s’affaisse comme le fleuve d’Égypte.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Il a bâti sa '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 104:3
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '13'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: demeure dans les cieux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et fondé sa voûte sur la terre;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Il appelle les '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Am 5:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: eaux de la mer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et les répand à la surface de la terre:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel est son nom.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: N’êtes-vous pas pour moi comme les enfants des Éthiopiens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Enfants d’Israël? Dit l’Éternel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N’ai-je pas fait sortir Israël du pays d’Égypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme les Philistins de Caphtor et les Syriens de Kir?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Voici, le Seigneur, l’Éternel, a les yeux sur le royaume coupable.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je le détruirai de dessus la face de la terre;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toutefois je ne détruirai pas entièrement la maison de Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit l’Éternel.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Car voici, je donnerai mes ordres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je secouerai la maison d’Israël parmi toutes les nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme on secoue avec le crible,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sans qu’il tombe à terre un seul grain.
