document_id: AMO.9,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Dernière vision. Dernière menace
  - type: heading
    content: 'V. 1-10: cf. Am 2:13-16. De 4:26-31.'
  - type: text
    content: Je vis le Seigneur qui se tenait sur l’autel.
  - type: text
    content: 'Et il dit: Frappe les chapiteaux et que les seuils s’ébranlent,'
  - type: text
    content: Et brise-les sur leurs têtes à tous!
  - type: text
    content: Je ferai périr le reste par l’épée.
  - type: text
    content: Aucun d’eux ne pourra se sauver en fuyant,
  - type: text
    content: Aucun d’eux n’échappera.
  '10':
  - type: text
    content: Tous les pécheurs de mon peuple mourront par l’épée,
  - type: text
    content: 'Ceux qui disent: Le malheur n’approchera pas, ne nous atteindra pas.'
  - type: heading
    content: Promesse de restauration
  - type: heading
    content: 'V. 11-15: cf. Ac 15:13-18. Joë 3:17-21.'
  '11':
  - type: text
    content: ' '
  - type: note
    content: Ac 15:16.
  - type: text
    content: En ce temps-là, je relèverai de sa chute la maison de David,
  - type: text
    content: J’en réparerai les brèches, j’en redresserai les ruines,
  - type: text
    content: Et je la rebâtirai comme elle était autrefois,
  '12':
  - type: text
    content: Afin qu’ils possèdent le reste d’Édom et toutes les nations
  - type: text
    content: Sur lesquelles mon nom a été invoqué,
  - type: text
    content: Dit l’Éternel, qui accomplira ces choses.
  '13':
  - type: text
    content: Voici, les jours viennent, dit l’Éternel,
  - type: text
    content: Où le laboureur suivra de près le moissonneur,
  - type: text
    content: Et celui qui foule le raisin celui qui répand la semence,
  - type: text
    content: 'Où le '
  - type: note
    content: Joë 3:18.
  - type: text
    content: moût ruissellera des montagnes
  - type: text
    content: Et coulera de toutes les collines.
  '14':
  - type: text
    content: Je ramènerai les captifs de mon peuple d’Israël;
  - type: text
    content: Ils rebâtiront les villes dévastées et les habiteront,
  - type: text
    content: Ils planteront des vignes et en boiront le vin,
  - type: text
    content: Ils établiront des jardins et en mangeront les fruits.
  '15':
  - type: text
    content: 'Je les planterai '
  - type: note
    content: Jé 32:41.
  - type: text
    content: dans leur pays,
  - type: text
    content: Et ils ne seront plus arrachés du pays que je leur ai donné,
  - type: text
    content: Dit L’Éternel, ton Dieu.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Ps 139:8, etc.
  - type: text
    content: S’ils pénètrent dans le séjour des morts,
  - type: text
    content: Ma main les en arrachera;
  - type: text
    content: S’ils montent aux cieux,
  - type: text
    content: Je les en ferai descendre.
  '3':
  - type: text
    content: S’ils se cachent au sommet du Carmel,
  - type: text
    content: Je les y chercherai et je les saisirai;
  - type: text
    content: S’ils se dérobent à mes regards dans le fond de la mer,
  - type: text
    content: Là j’ordonnerai au serpent de les mordre.
  '4':
  - type: text
    content: S’ils vont en captivité devant leurs ennemis,
  - type: text
    content: Là j’ordonnerai à l’épée de les faire périr;
  - type: text
    content: 'Je '
  - type: note
    content: Jé 44:11.
  - type: text
    content: dirigerai contre eux mes regards
  - type: text
    content: Pour faire du mal et non du bien.
  '5':
  - type: text
    content: Le Seigneur, l’Éternel des armées, touche la terre, et elle tremble,
  - type: text
    content: Et tous ses habitants sont dans le deuil;
  - type: text
    content: Elle monte tout entière comme le fleuve,
  - type: text
    content: Et elle s’affaisse comme le fleuve d’Égypte.
  '6':
  - type: text
    content: 'Il a bâti sa '
  - type: note
    content: Ps 104:3, 13.
  - type: text
    content: demeure dans les cieux,
  - type: text
    content: Et fondé sa voûte sur la terre;
  - type: text
    content: 'Il appelle les '
  - type: note
    content: Am 5:8.
  - type: text
    content: eaux de la mer,
  - type: text
    content: 'Et les répand à la surface de la terre:'
  - type: text
    content: L’Éternel est son nom.
  '7':
  - type: text
    content: N’êtes-vous pas pour moi comme les enfants des Éthiopiens,
  - type: text
    content: Enfants d’Israël? Dit l’Éternel.
  - type: text
    content: N’ai-je pas fait sortir Israël du pays d’Égypte,
  - type: text
    content: Comme les Philistins de Caphtor et les Syriens de Kir?
  '8':
  - type: text
    content: Voici, le Seigneur, l’Éternel, a les yeux sur le royaume coupable.
  - type: text
    content: Je le détruirai de dessus la face de la terre;
  - type: text
    content: Toutefois je ne détruirai pas entièrement la maison de Jacob,
  - type: text
    content: Dit l’Éternel.
  '9':
  - type: text
    content: Car voici, je donnerai mes ordres,
  - type: text
    content: Et je secouerai la maison d’Israël parmi toutes les nations,
  - type: text
    content: Comme on secoue avec le crible,
  - type: text
    content: Sans qu’il tombe à terre un seul grain.
