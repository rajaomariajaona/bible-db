document_id: LEV.2,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Les offrandes
  - type: heading
    content: 'V. 1-10: cf. Lé 6:7-11; 7:9-14. No 15:4-10.'
  - type: text
    content: 'Lorsque quelqu’un fera à l’Éternel une offrande '
  - type: note
    content: Ex 6:14; 9:17. No 15:4.
  - type: text
    content: 'en don, son offrande sera de fleur de farine; il versera de l’huile dessus, et il y ajoutera de l’encens. '
  '10':
  - type: text
    content: Ce qui restera de l’offrande sera pour Aaron et pour ses fils; c’est une chose très sainte parmi les offrandes consumées par le feu devant l’Éternel.
  - type: heading
    content: 'V. 11-13: cf. 1 Co 5:6-8. Mc 9:49-51.'
  '11':
  - type: text
    content: 'Aucune des offrandes que vous présenterez à l’Éternel ne sera faite avec du levain; car vous ne brûlerez rien qui contienne du levain ou du miel parmi les offrandes consumées par le feu devant l’Éternel. '
  '12':
  - type: text
    content: 'Vous pourrez en offrir à l’Éternel comme offrande des prémices; mais il n’en sera point présenté sur l’autel comme offrande d’une agréable odeur. '
  '13':
  - type: text
    content: 'Tu mettras du sel sur toutes tes offrandes; tu ne laisseras point ton offrande manquer de sel, signe de l’alliance de ton Dieu; '
  - type: note
    content: Mc 9:49.
  - type: text
    content: sur toutes tes offrandes tu mettras du sel.
  - type: heading
    content: 'V. 14-16: cf. Lé 23:10-14, 17.'
  '14':
  - type: text
    content: 'Si tu fais à l’Éternel une offrande des prémices, tu présenteras des épis nouveaux, rôtis au feu et broyés, comme offrande de tes prémices. '
  '15':
  - type: text
    content: 'Tu verseras de l’huile dessus, et tu y ajouteras de l’encens; c’est une offrande. '
  '16':
  - type: text
    content: Le sacrificateur brûlera comme souvenir une portion des épis broyés et de l’huile, avec tout l’encens. C’est une offrande consumée par le feu devant l’Éternel.
  '2':
  - type: text
    content: 'Il l’apportera aux sacrificateurs, fils d’Aaron; le sacrificateur prendra une poignée de cette fleur de farine, arrosée d’huile, avec tout l’encens, et '
  - type: note
    content: Lé 6:15.
  - type: text
    content: 'il brûlera cela sur l’autel comme souvenir. C’est une offrande d’une agréable odeur à l’Éternel. '
  '3':
  - type: text
    content: 'Ce qui restera '
  - type: note
    content: Lé 10:12.
  - type: text
    content: 'de l’offrande sera pour Aaron et pour ses fils; c’est une chose très sainte parmi les offrandes consumées par le feu devant l’Éternel. '
  '4':
  - type: text
    content: 'Si tu fais une offrande de ce qui est cuit au four, qu’on se serve de fleur de farine, et que ce soient des gâteaux sans levain pétris à l’huile et des galettes sans levain arrosées d’huile. '
  '5':
  - type: text
    content: 'Si ton offrande est un gâteau cuit à la poêle, il sera de fleur de farine pétrie à l’huile, sans levain. '
  '6':
  - type: text
    content: 'Tu le rompras en morceaux, et tu verseras de l’huile dessus; c’est une offrande. '
  '7':
  - type: text
    content: 'Si ton offrande est un gâteau cuit sur le gril, il sera fait de fleur de farine pétrie à l’huile. '
  '8':
  - type: text
    content: 'Tu apporteras l’offrande qui sera faite à l’Éternel avec ces choses-là; elle sera remise au sacrificateur, qui la présentera sur l’autel. '
  '9':
  - type: text
    content: 'Le sacrificateur en prélèvera ce qui doit être offert comme souvenir, et le brûlera sur l’autel. C’est une offrande d’une agréable odeur à l’Éternel. '
