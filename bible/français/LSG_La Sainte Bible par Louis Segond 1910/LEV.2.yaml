document_id: LEV.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les offrandes
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-10: cf. Lé 6:7-11; 7:9-14. No 15:4-10.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Lorsque quelqu’un fera à l’Éternel une offrande '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 6:14
      metadata:
        usfm: EXO.6.14
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 9:17
      metadata:
        usfm: EXO.9.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 15:4
      metadata:
        usfm: NUM.15.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'en don, son offrande sera de fleur de farine; il versera de l’huile dessus, et il y ajoutera de l’encens. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il l’apportera aux sacrificateurs, fils d’Aaron; le sacrificateur prendra une poignée de cette fleur de farine, arrosée d’huile, avec tout l’encens, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 6:15
      metadata:
        usfm: LEV.6.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'il brûlera cela sur l’autel comme souvenir. C’est une offrande d’une agréable odeur à l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ce qui restera '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 10:12
      metadata:
        usfm: LEV.10.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'de l’offrande sera pour Aaron et pour ses fils; c’est une chose très sainte parmi les offrandes consumées par le feu devant l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Si tu fais une offrande de ce qui est cuit au four, qu’on se serve de fleur de farine, et que ce soient des gâteaux sans levain pétris à l’huile et des galettes sans levain arrosées d’huile. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Si ton offrande est un gâteau cuit à la poêle, il sera de fleur de farine pétrie à l’huile, sans levain. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tu le rompras en morceaux, et tu verseras de l’huile dessus; c’est une offrande. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Si ton offrande est un gâteau cuit sur le gril, il sera fait de fleur de farine pétrie à l’huile. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tu apporteras l’offrande qui sera faite à l’Éternel avec ces choses-là; elle sera remise au sacrificateur, qui la présentera sur l’autel. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Le sacrificateur en prélèvera ce qui doit être offert comme souvenir, et le brûlera sur l’autel. C’est une offrande d’une agréable odeur à l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ce qui restera de l’offrande sera pour Aaron et pour ses fils; c’est une chose très sainte parmi les offrandes consumées par le feu devant l’Éternel.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 11-13: cf. 1 Co 5:6-8. Mc 9:49-51.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Aucune des offrandes que vous présenterez à l’Éternel ne sera faite avec du levain; car vous ne brûlerez rien qui contienne du levain ou du miel parmi les offrandes consumées par le feu devant l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Vous pourrez en offrir à l’Éternel comme offrande des prémices; mais il n’en sera point présenté sur l’autel comme offrande d’une agréable odeur. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tu mettras du sel sur toutes tes offrandes; tu ne laisseras point ton offrande manquer de sel, signe de l’alliance de ton Dieu; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 9:49
      metadata:
        usfm: MRK.9.49
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: sur toutes tes offrandes tu mettras du sel.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 14-16: cf. Lé 23:10-14, 17.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Si tu fais à l’Éternel une offrande des prémices, tu présenteras des épis nouveaux, rôtis au feu et broyés, comme offrande de tes prémices. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tu verseras de l’huile dessus, et tu y ajouteras de l’encens; c’est une offrande. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Le sacrificateur brûlera comme souvenir une portion des épis broyés et de l’huile, avec tout l’encens. C’est une offrande consumée par le feu devant l’Éternel.
