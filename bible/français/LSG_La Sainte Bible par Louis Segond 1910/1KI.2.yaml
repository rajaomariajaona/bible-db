document_id: 1KI.2,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Instructions de David mourant à Salomon, son fils. — Adonija, Joab et Schimeï mis à mort par Salomon; le sacrificateur Abiathar destitué de ses fonctions et éloigné de Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-12: cf. (De 31:7, 8. 1 Ch 22:6-13.) 2 S 23:1-7. 1 Ch 29:26-30. (Ps 15:4; 101:4, 6, 8.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'David approchait du moment de sa mort, et il donna ses ordres à Salomon, son fils, en disant: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'David se coucha avec ses pères, et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 2:29
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 13:36
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'il fut enterré dans la ville de David. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Le temps que David régna sur Israël fut de quarante ans: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 29:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'à Hébron il régna sept ans, et à Jérusalem il régna trente-trois ans. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 29:23
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 1:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Salomon s’assit sur le trône de David, son père, et son règne fut très affermi.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 13-25: cf. 1 R 1:1-10, 41-53. Ps 21:9, etc.'
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Adonija, fils de Haggith, alla vers Bath-Schéba, mère de Salomon. Elle lui dit: Viens-tu dans des intentions paisibles? Il répondit: Oui. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Et il ajouta: J’ai un mot à te dire. Elle dit: Parle! '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Et il dit: Tu sais que la royauté m’appartenait, et que tout Israël portait ses regards sur moi pour me faire régner. Mais la royauté a tourné, et elle est échue à mon frère, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 22:9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 28:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'parce que l’Éternel la lui a donnée. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Maintenant, je te demande une chose: ne me la refuse pas! Elle lui répondit: Parle! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Et il dit: Dis, je te prie, au roi Salomon – car il ne te le refusera pas – qu’il me donne pour femme Abischag, la Sunamite. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Bath-Schéba dit: Bien! Je parlerai pour toi au roi. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Bath-Schéba se rendit auprès du roi Salomon, pour lui parler en faveur d’Adonija. Le roi se leva pour aller à sa rencontre, il se prosterna devant elle, et il s’assit sur son trône. On plaça un siège pour la mère du roi, et elle s’assit à sa droite. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Je m’en vais par le chemin de toute la terre. Fortifie-toi, et sois un homme! '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Puis elle dit: J’ai une petite demande à te faire: ne me la refuse pas! Et le roi lui dit: Demande, ma mère, car je ne te refuserai pas. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Elle dit: Qu’Abischag, la Sunamite, soit donnée pour femme à Adonija, ton frère. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Le roi Salomon répondit à sa mère: Pourquoi demandes-tu Abischag, la Sunamite, pour Adonija? Demande donc la royauté pour lui, car il est mon frère aîné, pour lui, pour le sacrificateur Abiathar, et pour Joab, fils de Tseruja! '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Alors le roi Salomon jura par l’Éternel, en disant: Que Dieu me traite dans toute sa rigueur, si ce n’est pas au prix de sa vie qu’Adonija a prononcé cette parole! '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Maintenant, l’Éternel est vivant, lui qui m’a affermi et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 7:12
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '13'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'm’a fait asseoir sur le trône de David, mon père, et qui m’a fait une maison selon sa promesse! Aujourd’hui Adonija mourra. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Et le roi Salomon envoya Benaja, fils de Jehojada, qui le frappa; et Adonija mourut.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 26-27: cf. Pr 24:21, 22. 1 S 2:30-36. Mt 19:30; 24:13.'
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Le roi dit ensuite au sacrificateur Abiathar: Va-t’en à Anathoth dans tes terres, car tu mérites la mort; mais je ne te ferai pas mourir aujourd’hui, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: '1 S 22:20, etc. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 15:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'parce que tu as porté l’arche du Seigneur l’Éternel devant David, mon père, et parce que tu as eu part à toutes les souffrances de mon père. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Ainsi Salomon dépouilla Abiathar de ses fonctions de sacrificateur de l’Éternel, afin '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 S 2:31, etc.
      marker-yv: yv-n
    - type: text
      text: d’accomplir la parole que l’Éternel avait prononcée sur la maison d’Éli à Silo.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 28-35: cf. (2 S 3:23-39; 20:8-10. Ex 21:14.)'
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Le bruit en parvint à Joab, qui avait suivi le parti d’Adonija, quoiqu’il n’eût pas suivi le parti d’Absalom. Et Joab se réfugia vers la tente de l’Éternel, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 1:50
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'et saisit les cornes de l’autel. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'On annonça au roi Salomon que Joab s’était réfugié vers la tente de l’Éternel, et qu’il était auprès de l’autel. Et Salomon envoya Benaja, fils de Jehojada, en lui disant: Va, frappe-le. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Observe les commandements de l’Éternel, ton Dieu, en marchant dans ses voies, et en gardant ses lois, ses ordonnances, ses jugements et ses préceptes, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 17:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'selon ce qui est écrit dans la loi de Moïse, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 29:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 1:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'afin que tu réussisses dans tout ce que tu feras et partout où tu te tourneras, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Benaja arriva à la tente de l’Éternel, et dit à Joab: Sors! C’est le roi qui l’ordonne. Mais il répondit: Non! Je veux mourir ici. Benaja rapporta la chose au roi, en disant: C’est ainsi qu’a parlé Joab, et c’est ainsi qu’il m’a répondu. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Le roi dit à Benaja: Fais comme il a dit, frappe-le, et enterre-le; tu ôteras ainsi de dessus moi et de dessus la maison de mon père le sang que Joab a répandu sans cause. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'L’Éternel fera retomber son sang sur sa tête, parce qu’il a frappé deux hommes plus justes et meilleurs que lui et les a tués par l’épée, sans que mon père David le sût: Abner, fils de Ner, chef de l’armée d’Israël, et Amasa, fils de Jéther, chef de l’armée de Juda. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Leur sang retombera sur la tête de Joab et sur la tête de ses descendants à perpétuité; mais il y aura paix à toujours, de par l’Éternel, pour David, pour sa postérité, pour sa maison et pour son trône. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Benaja, fils de Jehojada, monta, frappa Joab, et le fit mourir. Il fut enterré dans sa maison, au désert. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Le roi mit à la tête de l’armée Benaja, fils de Jehojada, en remplacement de Joab, et il mit le sacrificateur '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 2:35
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Tsadok à la place d’Abiathar.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 36-46: cf. 2 S 16:5-13. Ps 109:17-20. No 32:23.'
    marker-yv: yv-h
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Le roi fit appeler Schimeï, et lui dit: Bâtis-toi une maison à Jérusalem; tu y demeureras, et tu n’en sortiras point pour aller de côté ou d’autre. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Sache bien que tu mourras le jour où tu sortiras et passeras le torrent de Cédron; ton sang sera sur ta tête. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Schimeï répondit au roi: C’est bien! Ton serviteur fera ce que dit mon seigneur le roi. Et Schimeï demeura longtemps à Jérusalem. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Au bout de trois ans, il arriva que deux serviteurs de Schimeï s’enfuirent chez Akisch, fils de Maaca, roi de Gath. On le rapporta à Schimeï, en disant: Voici, tes serviteurs sont à Gath. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'et afin que l’Éternel accomplisse cette parole qu’il a prononcée sur moi: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 7:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 132:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Si tes fils prennent garde à leur voie, en marchant avec fidélité devant moi, de tout leur cœur, et de toute leur âme, tu ne manqueras jamais d’un successeur sur le trône d’Israël. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Schimeï se leva, sella son âne, et s’en alla à Gath chez Akisch pour chercher ses serviteurs. Schimeï donc s’en alla, et il ramena de Gath ses serviteurs. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'On informa Salomon que Schimeï était allé de Jérusalem à Gath, et qu’il était de retour. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Le roi fit appeler Schimeï, et lui dit: Ne t’avais-je pas fait jurer par l’Éternel, et ne t’avais-je pas fait cette déclaration formelle: Sache bien que tu mourras le jour où tu sortiras pour aller de côté ou d’autre? Et ne m’as-tu pas répondu: C’est bien! J’ai entendu? '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Pourquoi donc n’as-tu pas observé le serment de l’Éternel et l’ordre que je t’avais donné? '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Et le roi dit à Schimeï: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 16:5
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '7'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Tu sais au-dedans de ton cœur tout le mal que tu as fait à David, mon père; l’Éternel fait retomber ta méchanceté sur ta tête. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Mais le roi Salomon sera béni, et le trône de David sera pour toujours affermi devant l’Éternel. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'Et le roi donna ses ordres à Benaja, fils de Jehojada, qui sortit et frappa Schimeï; et Schimeï mourut. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 1:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: La royauté fut ainsi affermie entre les mains de Salomon.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Tu sais ce que m’a fait Joab, fils de Tseruja, ce qu’il a fait à deux chefs de l’armée d’Israël, à '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 3:27
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 20:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Abner, fils de Ner, et à Amasa, fils de Jéther. Il les a tués; il a versé pendant la paix le sang de la guerre, et il a mis le sang de la guerre sur la ceinture qu’il avait aux reins et sur la chaussure qu’il avait aux pieds. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Tu agiras selon ta sagesse, et tu ne laisseras pas ses cheveux blancs descendre en paix dans le séjour des morts. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Tu traiteras avec bienveillance les fils de '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 17:27
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 19:31
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Barzillaï, le Galaadite, et ils seront de ceux qui se nourrissent de ta table; car ils ont agi de la même manière à mon égard, en venant au-devant de moi lorsque je fuyais Absalom, ton frère. '
