document_id: EZK.42,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-14: cf. Éz 41:10. Lé 6:7-19.'
  - type: text
    content: 'Il me fit sortir vers le parvis extérieur du côté du septentrion, et il me conduisit aux chambres qui étaient vis-à-vis de la place vide et vis-à-vis du bâtiment, au septentrion. '
  '10':
  - type: text
    content: 'Il y avait encore des chambres sur la largeur du mur du parvis du côté de l’orient, vis-à-vis de la place vide et vis-à-vis du bâtiment. '
  '11':
  - type: text
    content: 'Devant elles, il y avait une allée, comme devant les chambres qui étaient du côté du septentrion. La longueur et la largeur étaient les mêmes; leurs issues, leur disposition et leurs portes étaient semblables. '
  '12':
  - type: text
    content: 'Il en était de même pour les portes des chambres du côté du midi. Il y avait une porte à la tête de l’allée, de l’allée qui se trouvait droit devant le mur du côté de l’orient, par où l’on y entrait. '
  '13':
  - type: text
    content: 'Il me dit: Les chambres du septentrion et les chambres du midi, qui sont devant la place vide, ce sont les chambres saintes, où les sacrificateurs qui s’approchent de l’Éternel mangeront les choses très saintes; ils y déposeront les choses très saintes, les offrandes, les victimes présentées dans les sacrifices d’expiation et de culpabilité; car le lieu est saint. '
  '14':
  - type: text
    content: Quand les sacrificateurs seront entrés, ils ne sortiront pas du sanctuaire pour aller dans le parvis extérieur, mais ils déposeront là les vêtements avec lesquels ils font le service, car ces vêtements sont saints; ils en mettront d’autres pour s’approcher du peuple.
  - type: heading
    content: 'V. 15-20: cf. Éz 45:2. 2 Ch 4:9.'
  '15':
  - type: text
    content: 'Lorsqu’il eut achevé de mesurer la maison intérieure, il me fit sortir par la porte qui était du côté de l’orient, et il mesura l’enceinte tout autour. '
  '16':
  - type: text
    content: 'Il mesura le côté de l’orient avec la canne qui servait de mesure, et il y avait tout autour cinq cents cannes. '
  '17':
  - type: text
    content: 'Il mesura le côté du septentrion avec la canne qui servait de mesure, et il y avait tout autour cinq cents cannes. '
  '18':
  - type: text
    content: 'Il mesura le côté du midi avec la canne qui servait de mesure, et il y avait cinq cents cannes. '
  '19':
  - type: text
    content: 'Il se tourna du côté de l’occident, et mesura cinq cents cannes avec la canne qui servait de mesure. '
  '2':
  - type: text
    content: 'Sur la face, où se trouvait la porte septentrionale, il y avait une longueur de cent coudées; et la largeur était de cinquante coudées. '
  '20':
  - type: text
    content: Il mesura des quatre côtés le mur formant l’enceinte de la maison; la longueur était de cinq cents cannes, et la largeur de cinq cents cannes; ce mur marquait la séparation entre le saint et le profane.
  '3':
  - type: text
    content: 'C’était vis-à-vis des vingt coudées du parvis intérieur, et vis-à-vis du pavé du parvis extérieur, là où se trouvaient les galeries des trois étages. '
  '4':
  - type: text
    content: 'Devant les chambres, il y avait une allée large de dix coudées, et une voie d’une coudée; leurs portes donnaient au septentrion. '
  '5':
  - type: text
    content: 'Les chambres supérieures étaient plus étroites que les inférieures et que celles du milieu du bâtiment, parce que les galeries leur ôtaient de la place. '
  '6':
  - type: text
    content: 'Il y avait trois étages, mais il n’y avait point de colonnes, comme les colonnes des parvis; c’est pourquoi, à partir du sol, les chambres du haut étaient plus étroites que celles du bas et du milieu. '
  '7':
  - type: text
    content: 'Le mur extérieur parallèle aux chambres, du côté du parvis extérieur, devant les chambres, avait cinquante coudées de longueur; '
  '8':
  - type: text
    content: 'car la longueur des chambres du côté du parvis extérieur était de cinquante coudées. Mais sur la face du temple il y avait cent coudées. '
  '9':
  - type: text
    content: 'Au bas de ces chambres était l’entrée de l’orient, quand on y venait du parvis extérieur. '
