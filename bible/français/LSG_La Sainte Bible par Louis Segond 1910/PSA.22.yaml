document_id: PSA.22,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-22: cf. Ps 69. És 53. (Mt 27. Lu 23. Jn 19.)'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au chef des chantres. Sur “Biche de l’aurore”. Psaume de David.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, tu m’as fait sortir du sein maternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu m’as mis en sûreté sur les mamelles de ma mère;
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dès le sein maternel j’ai été sous ta garde,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dès le ventre de ma mère tu as été mon Dieu.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne t’éloigne pas de moi quand la détresse est proche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand personne ne vient à mon secours!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De nombreux taureaux sont autour de moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des taureaux de Basan m’environnent.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ouvrent contre moi leur gueule,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Semblables au lion qui déchire et rugit.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis comme de l’eau qui s’écoule,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tous mes os se séparent;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon cœur est comme de la cire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il se fond dans mes entrailles.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ma force se dessèche comme l’argile,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ma langue s’attache à mon palais;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu me réduis à la poussière de la mort.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car des chiens m’environnent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Une bande de scélérats rôdent autour de moi,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 27:35
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 15:24
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 23:33
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 19:23
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '37'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 20:25
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ils ont percé mes mains et mes pieds.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je pourrais compter tous mes os.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eux, ils observent, ils me regardent;
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 23:34
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 19:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ils se partagent mes vêtements,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils tirent au sort ma tunique.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 27:46
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 15:34
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Mon Dieu! Mon Dieu! Pourquoi m’as-tu abandonné,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et t’éloignes-tu sans me secourir, sans écouter mes plaintes?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et toi, Éternel, ne t’éloigne pas!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toi qui es ma force, viens en hâte à mon secours!
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Protège mon âme contre le glaive,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ma vie contre le pouvoir des chiens!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sauve-moi de la gueule du lion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Délivre-moi des cornes du buffle!
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 23-32: cf. Ps 21:2, etc. Hé 2:9-13. (És 52:13-15; 49:6. Lu 24:46, 47. Jn 12:32. Ap 11:15.)'
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 2:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Je publierai ton nom parmi mes frères,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je te célébrerai au milieu de l’assemblée.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous qui craignez l’Éternel, louez-le!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous tous, postérité de Jacob, glorifiez-le!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tremblez devant lui, vous tous, postérité d’Israël!
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car il n’a ni mépris ni dédain pour les peines du misérable,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il ne lui cache point sa face;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais il l’écoute quand il crie à lui.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu seras dans la grande assemblée l’objet de mes louanges;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’accomplirai mes vœux en présence de ceux qui te craignent.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les malheureux mangeront et se rassasieront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux qui cherchent l’Éternel le célébreront.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que votre cœur vive à toujours!
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 2:8
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 72:11
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 86:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Toutes les extrémités de la terre penseront à l’Éternel et se tourneront vers lui;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toutes les familles des nations se prosterneront devant ta face.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car à l’Éternel appartient le règne:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il domine sur les nations.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon Dieu! Je crie le jour, et tu ne réponds pas;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La nuit, et je n’ai point de repos.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous les puissants de la terre mangeront et se prosterneront aussi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Devant lui s’inclineront tous ceux qui descendent dans la poussière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux qui ne peuvent conserver leur vie.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La postérité le servira;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On parlera du Seigneur à la génération future.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 52:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Quand elle viendra, elle annoncera sa justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle annoncera son œuvre au peuple nouveau-né.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourtant tu es le Saint,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu sièges au milieu des louanges d’Israël.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En toi se confiaient nos pères;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils se confiaient, et tu les délivrais.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils criaient à toi, et ils étaient sauvés;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 25:3
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 31:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 49:23
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 9:33
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ils se confiaient en toi, et ils n’étaient point confus.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et moi, je suis un ver et non un homme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’opprobre des hommes et le méprisé du peuple.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tous ceux qui me voient '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 27:39
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: se moquent de moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ils ouvrent la bouche, secouent la tête:'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 27:43
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Recommande-toi à l’Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel le sauvera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il le délivrera, puisqu’il l’aime!
