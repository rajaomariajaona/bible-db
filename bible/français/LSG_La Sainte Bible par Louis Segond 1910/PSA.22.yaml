document_id: PSA.22,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-22: cf. Ps 69. És 53. (Mt 27. Lu 23. Jn 19.)'
  - type: text
    content: Au chef des chantres. Sur “Biche de l’aurore”. Psaume de David.
  '10':
  - type: text
    content: Oui, tu m’as fait sortir du sein maternel,
  - type: text
    content: Tu m’as mis en sûreté sur les mamelles de ma mère;
  '11':
  - type: text
    content: Dès le sein maternel j’ai été sous ta garde,
  - type: text
    content: Dès le ventre de ma mère tu as été mon Dieu.
  '12':
  - type: text
    content: Ne t’éloigne pas de moi quand la détresse est proche,
  - type: text
    content: Quand personne ne vient à mon secours!
  '13':
  - type: text
    content: De nombreux taureaux sont autour de moi,
  - type: text
    content: Des taureaux de Basan m’environnent.
  '14':
  - type: text
    content: Ils ouvrent contre moi leur gueule,
  - type: text
    content: Semblables au lion qui déchire et rugit.
  '15':
  - type: text
    content: Je suis comme de l’eau qui s’écoule,
  - type: text
    content: Et tous mes os se séparent;
  - type: text
    content: Mon cœur est comme de la cire,
  - type: text
    content: Il se fond dans mes entrailles.
  '16':
  - type: text
    content: Ma force se dessèche comme l’argile,
  - type: text
    content: Et ma langue s’attache à mon palais;
  - type: text
    content: Tu me réduis à la poussière de la mort.
  '17':
  - type: text
    content: Car des chiens m’environnent,
  - type: text
    content: Une bande de scélérats rôdent autour de moi,
  - type: note
    content: Mt 27:35. Mc 15:24. Lu 23:33. Jn 19:23, 37; 20:25.
  - type: text
    content: Ils ont percé mes mains et mes pieds.
  '18':
  - type: text
    content: Je pourrais compter tous mes os.
  - type: text
    content: Eux, ils observent, ils me regardent;
  '19':
  - type: text
    content: ' '
  - type: note
    content: Lu 23:34. Jn 19:24.
  - type: text
    content: Ils se partagent mes vêtements,
  - type: text
    content: Ils tirent au sort ma tunique.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Mt 27:46. Mc 15:34.
  - type: text
    content: Mon Dieu! Mon Dieu! Pourquoi m’as-tu abandonné,
  - type: text
    content: Et t’éloignes-tu sans me secourir, sans écouter mes plaintes?
  '20':
  - type: text
    content: Et toi, Éternel, ne t’éloigne pas!
  - type: text
    content: Toi qui es ma force, viens en hâte à mon secours!
  '21':
  - type: text
    content: Protège mon âme contre le glaive,
  - type: text
    content: Ma vie contre le pouvoir des chiens!
  '22':
  - type: text
    content: Sauve-moi de la gueule du lion,
  - type: text
    content: Délivre-moi des cornes du buffle!
  - type: heading
    content: 'V. 23-32: cf. Ps 21:2, etc. Hé 2:9-13. (És 52:13-15; 49:6. Lu 24:46, 47. Jn 12:32. Ap 11:15.)'
  '23':
  - type: text
    content: ' '
  - type: note
    content: Hé 2:12.
  - type: text
    content: Je publierai ton nom parmi mes frères,
  - type: text
    content: Je te célébrerai au milieu de l’assemblée.
  '24':
  - type: text
    content: Vous qui craignez l’Éternel, louez-le!
  - type: text
    content: Vous tous, postérité de Jacob, glorifiez-le!
  - type: text
    content: Tremblez devant lui, vous tous, postérité d’Israël!
  '25':
  - type: text
    content: Car il n’a ni mépris ni dédain pour les peines du misérable,
  - type: text
    content: Et il ne lui cache point sa face;
  - type: text
    content: Mais il l’écoute quand il crie à lui.
  '26':
  - type: text
    content: Tu seras dans la grande assemblée l’objet de mes louanges;
  - type: text
    content: J’accomplirai mes vœux en présence de ceux qui te craignent.
  '27':
  - type: text
    content: Les malheureux mangeront et se rassasieront,
  - type: text
    content: Ceux qui cherchent l’Éternel le célébreront.
  - type: text
    content: Que votre cœur vive à toujours!
  '28':
  - type: text
    content: ' '
  - type: note
    content: Ps 2:8; 72:11; 86:9.
  - type: text
    content: Toutes les extrémités de la terre penseront à l’Éternel et se tourneront vers lui;
  - type: text
    content: Toutes les familles des nations se prosterneront devant ta face.
  '29':
  - type: text
    content: 'Car à l’Éternel appartient le règne:'
  - type: text
    content: Il domine sur les nations.
  '3':
  - type: text
    content: Mon Dieu! Je crie le jour, et tu ne réponds pas;
  - type: text
    content: La nuit, et je n’ai point de repos.
  '30':
  - type: text
    content: Tous les puissants de la terre mangeront et se prosterneront aussi;
  - type: text
    content: Devant lui s’inclineront tous ceux qui descendent dans la poussière,
  - type: text
    content: Ceux qui ne peuvent conserver leur vie.
  '31':
  - type: text
    content: La postérité le servira;
  - type: text
    content: On parlera du Seigneur à la génération future.
  '32':
  - type: text
    content: ' '
  - type: note
    content: Ps 52:11.
  - type: text
    content: Quand elle viendra, elle annoncera sa justice,
  - type: text
    content: Elle annoncera son œuvre au peuple nouveau-né.
  '4':
  - type: text
    content: Pourtant tu es le Saint,
  - type: text
    content: Tu sièges au milieu des louanges d’Israël.
  '5':
  - type: text
    content: En toi se confiaient nos pères;
  - type: text
    content: Ils se confiaient, et tu les délivrais.
  '6':
  - type: text
    content: Ils criaient à toi, et ils étaient sauvés;
  - type: note
    content: Ps 25:3; 31:2. És 49:23. Ro 9:33.
  - type: text
    content: Ils se confiaient en toi, et ils n’étaient point confus.
  '7':
  - type: text
    content: Et moi, je suis un ver et non un homme,
  - type: text
    content: L’opprobre des hommes et le méprisé du peuple.
  '8':
  - type: text
    content: 'Tous ceux qui me voient '
  - type: note
    content: Mt 27:39.
  - type: text
    content: se moquent de moi,
  - type: text
    content: 'Ils ouvrent la bouche, secouent la tête:'
  '9':
  - type: text
    content: ' '
  - type: note
    content: Mt 27:43.
  - type: text
    content: Recommande-toi à l’Éternel!
  - type: text
    content: L’Éternel le sauvera,
  - type: text
    content: Il le délivrera, puisqu’il l’aime!
