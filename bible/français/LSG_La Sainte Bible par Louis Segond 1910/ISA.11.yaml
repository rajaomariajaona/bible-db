document_id: ISA.11,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Temps messianique
  - type: heading
    content: 'V. 1-10: cf. (És 42:1-4. Jé 23:5, 6.) És 65:17-25.'
  - type: text
    content: ' '
  - type: note
    content: És 4:2. Ac 13:22, 23.
  - type: text
    content: Puis un rameau sortira du tronc d’Isaï,
  - type: text
    content: Et un rejeton naîtra de ses racines.
  '10':
  - type: text
    content: 'En ce jour, '
  - type: note
    content: Ro 15:12.
  - type: text
    content: le rejeton d’Isaï
  - type: text
    content: Sera là comme une bannière pour les peuples;
  - type: text
    content: Les nations se tourneront vers lui,
  - type: text
    content: Et la gloire sera sa demeure.
  - type: heading
    content: 'V. 11-16: cf. (Ro 15:8-12; 11:25, 26.) (Jé 23:7, 8. Za 10:8-12.)'
  '11':
  - type: text
    content: Dans ce même temps, le Seigneur étendra une seconde fois sa main,
  - type: text
    content: Pour racheter le reste de son peuple,
  - type: text
    content: Dispersé en Assyrie et en Égypte,
  - type: text
    content: A Pathros et en Éthiopie,
  - type: text
    content: A Élam, à Schinear et à Hamath,
  - type: text
    content: Et dans les îles de la mer.
  '12':
  - type: text
    content: Il élèvera une bannière pour les nations,
  - type: text
    content: Il rassemblera les exilés d’Israël,
  - type: text
    content: Et il recueillera les dispersés de Juda,
  - type: text
    content: Des quatre extrémités de la terre.
  '13':
  - type: text
    content: La jalousie d’Éphraïm disparaîtra,
  - type: text
    content: Et ses ennemis en Juda seront anéantis;
  - type: text
    content: Éphraïm ne sera plus jaloux de Juda,
  - type: text
    content: Et Juda ne sera plus hostile à Éphraïm.
  '14':
  - type: text
    content: Ils voleront sur l’épaule des Philistins à l’occident,
  - type: text
    content: Ils pilleront ensemble les fils de l’Orient;
  - type: text
    content: Édom et Moab seront la proie de leurs mains,
  - type: text
    content: Et les fils d’Ammon leur seront assujettis.
  '15':
  - type: text
    content: L’Éternel desséchera la langue de la mer d’Égypte,
  - type: text
    content: 'Et il lèvera sa main sur le fleuve, en soufflant avec violence:'
  - type: text
    content: Il le partagera en sept canaux,
  - type: text
    content: Et on le traversera avec des souliers.
  '16':
  - type: text
    content: Et il y aura une route pour le reste de son peuple,
  - type: text
    content: Qui sera échappé de l’Assyrie,
  - type: text
    content: Comme il y en eut une pour Israël,
  - type: text
    content: 'Le jour où '
  - type: note
    content: Ex 14:29.
  - type: text
    content: il sortit du pays d’Égypte.
  '2':
  - type: text
    content: 'L’Esprit de l’Éternel reposera sur lui:'
  - type: text
    content: Esprit de sagesse et d’intelligence,
  - type: note
    content: És 9:5.
  - type: text
    content: Esprit de conseil et de force,
  - type: text
    content: Esprit de connaissance et de crainte de l’Éternel.
  '3':
  - type: text
    content: Il respirera la crainte de l’Éternel;
  - type: text
    content: Il ne jugera point sur l’apparence,
  - type: text
    content: Il ne prononcera point sur un ouï-dire.
  '4':
  - type: text
    content: Mais il jugera les pauvres avec équité,
  - type: text
    content: Et il prononcera avec droiture sur les malheureux de la terre;
  - type: text
    content: Il frappera la terre de sa parole comme d’une verge,
  - type: text
    content: Et du souffle de ses lèvres il fera mourir le méchant.
  '5':
  - type: text
    content: La justice sera la ceinture de ses flancs,
  - type: text
    content: Et la fidélité la ceinture de ses reins.
  '6':
  - type: text
    content: ' '
  - type: note
    content: És 65:26. Os 2:17.
  - type: text
    content: Le loup habitera avec l’agneau,
  - type: text
    content: Et la panthère se couchera avec le chevreau;
  - type: text
    content: Le veau, le lionceau, et le bétail qu’on engraisse, seront ensemble,
  - type: text
    content: Et un petit enfant les conduira.
  '7':
  - type: text
    content: La vache et l’ourse auront un même pâturage,
  - type: text
    content: Leurs petits un même gîte;
  - type: text
    content: Et le lion, comme le bœuf, mangera de la paille.
  '8':
  - type: text
    content: Le nourrisson s’ébattra sur l’antre de la vipère,
  - type: text
    content: Et l’enfant sevré mettra sa main dans la caverne du basilic.
  '9':
  - type: text
    content: Il ne se fera ni tort ni dommage
  - type: text
    content: Sur toute ma montagne sainte;
  - type: text
    content: Car la terre sera remplie de la connaissance de l’Éternel,
  - type: text
    content: Comme le fond de la mer par les eaux qui le couvrent.
