document_id: ISA.11,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Temps messianique
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-10: cf. (És 42:1-4. Jé 23:5, 6.) És 65:17-25.'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 4:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 13:22
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '23'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Puis un rameau sortira du tronc d’Isaï,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et un rejeton naîtra de ses racines.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'En ce jour, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 15:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: le rejeton d’Isaï
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sera là comme une bannière pour les peuples;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les nations se tourneront vers lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la gloire sera sa demeure.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 11-16: cf. (Ro 15:8-12; 11:25, 26.) (Jé 23:7, 8. Za 10:8-12.)'
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Dans ce même temps, le Seigneur étendra une seconde fois sa main,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour racheter le reste de son peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dispersé en Assyrie et en Égypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A Pathros et en Éthiopie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A Élam, à Schinear et à Hamath,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et dans les îles de la mer.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Il élèvera une bannière pour les nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il rassemblera les exilés d’Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il recueillera les dispersés de Juda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des quatre extrémités de la terre.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: La jalousie d’Éphraïm disparaîtra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ses ennemis en Juda seront anéantis;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Éphraïm ne sera plus jaloux de Juda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et Juda ne sera plus hostile à Éphraïm.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ils voleront sur l’épaule des Philistins à l’occident,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils pilleront ensemble les fils de l’Orient;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Édom et Moab seront la proie de leurs mains,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les fils d’Ammon leur seront assujettis.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: L’Éternel desséchera la langue de la mer d’Égypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et il lèvera sa main sur le fleuve, en soufflant avec violence:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il le partagera en sept canaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et on le traversera avec des souliers.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Et il y aura une route pour le reste de son peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui sera échappé de l’Assyrie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme il y en eut une pour Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Le jour où '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 14:29
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: il sortit du pays d’Égypte.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'L’Esprit de l’Éternel reposera sur lui:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Esprit de sagesse et d’intelligence,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 9:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Esprit de conseil et de force,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Esprit de connaissance et de crainte de l’Éternel.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Il respirera la crainte de l’Éternel;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne jugera point sur l’apparence,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne prononcera point sur un ouï-dire.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Mais il jugera les pauvres avec équité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il prononcera avec droiture sur les malheureux de la terre;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il frappera la terre de sa parole comme d’une verge,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et du souffle de ses lèvres il fera mourir le méchant.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: La justice sera la ceinture de ses flancs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la fidélité la ceinture de ses reins.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'És 65:26. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Os 2:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Le loup habitera avec l’agneau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la panthère se couchera avec le chevreau;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le veau, le lionceau, et le bétail qu’on engraisse, seront ensemble,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et un petit enfant les conduira.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: La vache et l’ourse auront un même pâturage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leurs petits un même gîte;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le lion, comme le bœuf, mangera de la paille.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Le nourrisson s’ébattra sur l’antre de la vipère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’enfant sevré mettra sa main dans la caverne du basilic.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Il ne se fera ni tort ni dommage
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur toute ma montagne sainte;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car la terre sera remplie de la connaissance de l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme le fond de la mer par les eaux qui le couvrent.
