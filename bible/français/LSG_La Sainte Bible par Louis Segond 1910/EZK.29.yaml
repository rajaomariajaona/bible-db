document_id: EZK.29,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prophétie contre l’Égypte
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-16: cf. Éz 30 à 32. És 2:11-17, 22; 31:3.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La dixième année, le douzième jour du dixième mois, la parole de l’Éternel me fut adressée, en ces mots:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est pourquoi voici, j’en veux à toi et à tes fleuves,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je ferai du pays d’Égypte un désert et une solitude,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Depuis Migdol jusqu’à Syène et aux frontières de l’Éthiopie.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nul pied d’homme n’y passera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nul pied d’animal n’y passera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il restera quarante ans sans être habité.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ferai du pays d’Égypte une solitude entre les pays dévastés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ses villes seront désertes entre les villes désertes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pendant quarante ans.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je répandrai les Égyptiens parmi les nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je les disperserai en divers pays.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ainsi parle le Seigneur, l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au bout de quarante ans je rassemblerai les Égyptiens
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Du milieu des peuples où ils auront été dispersés.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ramènerai les captifs de l’Égypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je les ramènerai dans le pays de Pathros,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans le pays de leur origine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et là ils formeront un faible royaume.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce sera le moindre des royaumes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il ne s’élèvera plus au-dessus des nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je les diminuerai, afin qu’ils ne dominent pas sur les nations.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce royaume ne sera plus pour la maison d’Israël un sujet de confiance;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Il lui rappellera son iniquité, quand elle se '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: La 4:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: tournait vers eux.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils sauront que je suis le Seigneur, l’Éternel.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 17-21: cf. Jé 43:8-13; 44:30.'
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La vingt-septième année, le premier jour du premier mois, la parole de l’Éternel me fut adressée, en ces mots:'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fils de l’homme, Nebucadnetsar, roi de Babylone,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A fait faire à son armée un service pénible contre Tyr;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toutes les têtes sont chauves, toutes les épaules sont écorchées;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il n’a retiré de Tyr aucun salaire, ni lui, ni son armée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour le service qu’il a fait contre elle.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'C’est pourquoi ainsi parle le Seigneur, l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, je donne à Nebucadnetsar, roi de Babylone,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le pays d’Égypte;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il en emportera les richesses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il en prendra les dépouilles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il en pillera le butin;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce sera un salaire pour son armée.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fils de l’homme, tourne ta face vers Pharaon, roi d’Égypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et prophétise contre lui et contre toute l’Égypte!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour prix du service qu’il a fait contre Tyr,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je lui donne le pays d’Égypte;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car ils ont travaillé pour moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit le Seigneur, l’Éternel.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En ce jour-là, je donnerai de la force à la maison d’Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je t’ouvrirai la bouche au milieu d’eux;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils sauront que je suis l’Éternel.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Parle, et tu diras: Ainsi parle le Seigneur, l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, j’en veux à toi, Pharaon, roi d’Égypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Grand '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 74:13
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 27:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 51:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: crocodile, qui te couches au milieu de tes fleuves,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et qui dis: Mon fleuve est à moi, c’est moi qui l’ai fait!'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je mettrai une boucle à tes mâchoires,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’attacherai à tes écailles les poissons de tes fleuves,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je te tirerai du milieu de tes fleuves,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avec tous les poissons qui s’y trouvent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qui seront attachés à tes écailles.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je te jetterai dans le désert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toi et tous les poissons de tes fleuves.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu tomberas sur la face des champs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu ne seras ni relevé ni ramassé;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aux bêtes de la terre et aux oiseaux du ciel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je te donnerai pour pâture.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tous les habitants de l’Égypte sauront que je suis l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Parce qu’ils ont été un '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 18:21
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 36:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: soutien de roseau pour la maison d’Israël.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lorsqu’ils t’ont pris dans la main, tu t’es rompu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tu leur as déchiré toute l’épaule;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lorsqu’ils se sont appuyés sur toi, tu t’es brisé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tu as rendu leurs reins immobiles.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'C’est pourquoi ainsi parle le Seigneur, l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, je ferai venir contre toi l’épée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et j’exterminerai du milieu de toi les hommes et les bêtes.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le pays d’Égypte deviendra une solitude et un désert.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils sauront que je suis l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Parce qu’il a dit: Le fleuve est à moi, c’est moi qui l’ai fait!'
