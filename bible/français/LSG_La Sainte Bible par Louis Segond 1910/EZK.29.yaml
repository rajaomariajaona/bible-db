document_id: EZK.29,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Prophétie contre l’Égypte
  - type: heading
    content: 'V. 1-16: cf. Éz 30 à 32. És 2:11-17, 22; 31:3.'
  - type: text
    content: 'La dixième année, le douzième jour du dixième mois, la parole de l’Éternel me fut adressée, en ces mots:'
  '10':
  - type: text
    content: C’est pourquoi voici, j’en veux à toi et à tes fleuves,
  - type: text
    content: Et je ferai du pays d’Égypte un désert et une solitude,
  - type: text
    content: Depuis Migdol jusqu’à Syène et aux frontières de l’Éthiopie.
  '11':
  - type: text
    content: Nul pied d’homme n’y passera,
  - type: text
    content: Nul pied d’animal n’y passera,
  - type: text
    content: Et il restera quarante ans sans être habité.
  '12':
  - type: text
    content: Je ferai du pays d’Égypte une solitude entre les pays dévastés,
  - type: text
    content: Et ses villes seront désertes entre les villes désertes,
  - type: text
    content: Pendant quarante ans.
  - type: text
    content: Je répandrai les Égyptiens parmi les nations,
  - type: text
    content: Je les disperserai en divers pays.
  '13':
  - type: text
    content: 'Ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: Au bout de quarante ans je rassemblerai les Égyptiens
  - type: text
    content: Du milieu des peuples où ils auront été dispersés.
  '14':
  - type: text
    content: Je ramènerai les captifs de l’Égypte,
  - type: text
    content: Je les ramènerai dans le pays de Pathros,
  - type: text
    content: Dans le pays de leur origine,
  - type: text
    content: Et là ils formeront un faible royaume.
  '15':
  - type: text
    content: Ce sera le moindre des royaumes,
  - type: text
    content: Et il ne s’élèvera plus au-dessus des nations,
  - type: text
    content: Je les diminuerai, afin qu’ils ne dominent pas sur les nations.
  '16':
  - type: text
    content: Ce royaume ne sera plus pour la maison d’Israël un sujet de confiance;
  - type: text
    content: 'Il lui rappellera son iniquité, quand elle se '
  - type: note
    content: La 4:17.
  - type: text
    content: tournait vers eux.
  - type: text
    content: Et ils sauront que je suis le Seigneur, l’Éternel.
  - type: heading
    content: 'V. 17-21: cf. Jé 43:8-13; 44:30.'
  '17':
  - type: text
    content: 'La vingt-septième année, le premier jour du premier mois, la parole de l’Éternel me fut adressée, en ces mots:'
  '18':
  - type: text
    content: Fils de l’homme, Nebucadnetsar, roi de Babylone,
  - type: text
    content: A fait faire à son armée un service pénible contre Tyr;
  - type: text
    content: Toutes les têtes sont chauves, toutes les épaules sont écorchées;
  - type: text
    content: Et il n’a retiré de Tyr aucun salaire, ni lui, ni son armée,
  - type: text
    content: Pour le service qu’il a fait contre elle.
  '19':
  - type: text
    content: 'C’est pourquoi ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: Voici, je donne à Nebucadnetsar, roi de Babylone,
  - type: text
    content: Le pays d’Égypte;
  - type: text
    content: Il en emportera les richesses,
  - type: text
    content: Il en prendra les dépouilles,
  - type: text
    content: Il en pillera le butin;
  - type: text
    content: Ce sera un salaire pour son armée.
  '2':
  - type: text
    content: Fils de l’homme, tourne ta face vers Pharaon, roi d’Égypte,
  - type: text
    content: Et prophétise contre lui et contre toute l’Égypte!
  '20':
  - type: text
    content: Pour prix du service qu’il a fait contre Tyr,
  - type: text
    content: Je lui donne le pays d’Égypte;
  - type: text
    content: Car ils ont travaillé pour moi,
  - type: text
    content: Dit le Seigneur, l’Éternel.
  '21':
  - type: text
    content: En ce jour-là, je donnerai de la force à la maison d’Israël,
  - type: text
    content: Et je t’ouvrirai la bouche au milieu d’eux;
  - type: text
    content: Et ils sauront que je suis l’Éternel.
  '3':
  - type: text
    content: 'Parle, et tu diras: Ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: Voici, j’en veux à toi, Pharaon, roi d’Égypte,
  - type: text
    content: 'Grand '
  - type: note
    content: Ps 74:13, 14. És 27:1; 51:9.
  - type: text
    content: crocodile, qui te couches au milieu de tes fleuves,
  - type: text
    content: 'Et qui dis: Mon fleuve est à moi, c’est moi qui l’ai fait!'
  '4':
  - type: text
    content: Je mettrai une boucle à tes mâchoires,
  - type: text
    content: J’attacherai à tes écailles les poissons de tes fleuves,
  - type: text
    content: Et je te tirerai du milieu de tes fleuves,
  - type: text
    content: Avec tous les poissons qui s’y trouvent
  - type: text
    content: Et qui seront attachés à tes écailles.
  '5':
  - type: text
    content: Je te jetterai dans le désert,
  - type: text
    content: Toi et tous les poissons de tes fleuves.
  - type: text
    content: Tu tomberas sur la face des champs,
  - type: text
    content: Tu ne seras ni relevé ni ramassé;
  - type: text
    content: Aux bêtes de la terre et aux oiseaux du ciel
  - type: text
    content: Je te donnerai pour pâture.
  '6':
  - type: text
    content: Et tous les habitants de l’Égypte sauront que je suis l’Éternel,
  - type: text
    content: 'Parce qu’ils ont été un '
  - type: note
    content: 2 R 18:21. És 36:6.
  - type: text
    content: soutien de roseau pour la maison d’Israël.
  '7':
  - type: text
    content: Lorsqu’ils t’ont pris dans la main, tu t’es rompu,
  - type: text
    content: Et tu leur as déchiré toute l’épaule;
  - type: text
    content: Lorsqu’ils se sont appuyés sur toi, tu t’es brisé,
  - type: text
    content: Et tu as rendu leurs reins immobiles.
  '8':
  - type: text
    content: 'C’est pourquoi ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: Voici, je ferai venir contre toi l’épée,
  - type: text
    content: Et j’exterminerai du milieu de toi les hommes et les bêtes.
  '9':
  - type: text
    content: Le pays d’Égypte deviendra une solitude et un désert.
  - type: text
    content: Et ils sauront que je suis l’Éternel,
  - type: text
    content: 'Parce qu’il a dit: Le fleuve est à moi, c’est moi qui l’ai fait!'
