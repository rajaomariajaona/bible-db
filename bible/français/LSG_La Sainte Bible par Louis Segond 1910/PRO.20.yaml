      metadata:
        usfm: 1JN.1.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Qui dira: J’ai purifié mon cœur,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je suis net de mon péché?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 25:13
      metadata:
        usfm: DEU.25.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 11:1
      metadata:
        usfm: PRO.11.1
    - type: text
      text: . v. 23.
    marker-yv: yv-n
  - type: text
    text: Deux sortes de poids, deux sortes d’épha,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sont l’un et l’autre en abomination à l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: L’enfant laisse déjà voir par ses actions
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si sa conduite sera pure et droite.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 4:11
      metadata:
        usfm: EXO.4.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 94:9
      metadata:
        usfm: PSA.94.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: L’oreille qui entend, et l’œil qui voit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est l’Éternel qui les a faits l’un et l’autre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 19:15
      metadata:
        usfm: PRO.19.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: N’aime pas le sommeil, de peur que tu ne deviennes pauvre;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ouvre les yeux, tu seras rassasié de pain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Mauvais! Mauvais! Dit l’acheteur;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et en s’en allant, il se félicite.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Il y a de l’or et beaucoup de perles;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 3:14
      metadata:
        usfm: PRO.3.14
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '15'
      metadata:
        usfm: PRO.3.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Mais les lèvres savantes sont un objet précieux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 11:15
      metadata:
        usfm: PRO.11.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 27:13
      metadata:
        usfm: PRO.27.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Prends son vêtement, car il a cautionné autrui;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Exige de lui des gages, à cause des étrangers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 9:17
      metadata:
        usfm: PRO.9.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Le pain du mensonge est doux à l’homme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et plus tard sa bouche est remplie de gravier.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Les projets s’affermissent par le conseil;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fais la guerre avec prudence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 11:13
      metadata:
        usfm: PRO.11.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Celui qui répand la calomnie dévoile les secrets;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne te mêle pas avec celui qui ouvre ses lèvres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 21:17
      metadata:
        usfm: EXO.21.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 20:9
      metadata:
        usfm: LEV.20.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 27:16
      metadata:
        usfm: DEU.27.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 15:4
      metadata:
        usfm: MAT.15.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Si quelqu’un maudit son père et sa mère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sa lampe s’éteindra au milieu des ténèbres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 13:11
      metadata:
        usfm: PRO.13.11
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 28:20
      metadata:
        usfm: PRO.28.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Un héritage promptement acquis dès l’origine
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne sera pas béni quand viendra la fin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 32:35
      metadata:
        usfm: DEU.32.35
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 17:13
      metadata:
        usfm: PRO.17.13
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 24:29
      metadata:
        usfm: PRO.24.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 12:17
      metadata:
        usfm: ROM.12.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 5:15
      metadata:
        usfm: 1TH.5.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 3:9
      metadata:
        usfm: 1PE.3.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ne dis pas: Je rendrai le mal.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Espère en l’Éternel, et il te délivrera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: v. 10.
    marker-yv: yv-n
  - type: text
    text: L’Éternel a en horreur deux sortes de poids,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la balance fausse n’est pas une chose bonne.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 31:4
      metadata:
        usfm: JOB.31.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 37:23
      metadata:
        usfm: PSA.37.23
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 139:2
      metadata:
        usfm: PSA.139.2
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '3'
      metadata:
        usfm: PSA.139.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 10:23
      metadata:
        usfm: JER.10.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: C’est l’Éternel qui dirige les pas de l’homme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais l’homme peut-il comprendre sa voie?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: C’est un piège pour l’homme que de prendre à la légère un engagement sacré,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et de ne réfléchir qu’après avoir fait un vœu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Un roi sage dissipe les méchants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et fait passer sur eux la roue.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Le souffle de l’homme est une lampe de l’Éternel;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il pénètre jusqu’au fond des entrailles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: La bonté et la fidélité gardent le roi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il soutient son trône par la bonté.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: La force est la gloire des jeunes gens,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 16:31
      metadata:
        usfm: PRO.16.31
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et les cheveux blancs sont l’ornement des vieillards.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Les plaies d’une blessure sont un remède pour le méchant;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'De même '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 10:13
      metadata:
        usfm: PRO.10.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: les coups qui pénètrent jusqu’au fond des entrailles.
