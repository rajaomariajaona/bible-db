document_id: PRO.20,93
type_code: fra
verses:
  '1':
  - type: text
    content: Le vin est moqueur, les boissons fortes sont tumultueuses;
  - type: text
    content: Quiconque en fait excès n’est pas sage.
  '10':
  - type: text
    content: ' '
  - type: note
    content: De 25:13. Pr 11:1. v. 23.
  - type: text
    content: Deux sortes de poids, deux sortes d’épha,
  - type: text
    content: Sont l’un et l’autre en abomination à l’Éternel.
  '11':
  - type: text
    content: L’enfant laisse déjà voir par ses actions
  - type: text
    content: Si sa conduite sera pure et droite.
  '12':
  - type: text
    content: ' '
  - type: note
    content: Ex 4:11. Ps 94:9.
  - type: text
    content: L’oreille qui entend, et l’œil qui voit,
  - type: text
    content: C’est l’Éternel qui les a faits l’un et l’autre.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Pr 19:15.
  - type: text
    content: N’aime pas le sommeil, de peur que tu ne deviennes pauvre;
  - type: text
    content: Ouvre les yeux, tu seras rassasié de pain.
  '14':
  - type: text
    content: Mauvais! Mauvais! Dit l’acheteur;
  - type: text
    content: Et en s’en allant, il se félicite.
  '15':
  - type: text
    content: Il y a de l’or et beaucoup de perles;
  - type: note
    content: Pr 3:14, 15.
  - type: text
    content: Mais les lèvres savantes sont un objet précieux.
  '16':
  - type: text
    content: ' '
  - type: note
    content: Pr 11:15; 27:13.
  - type: text
    content: Prends son vêtement, car il a cautionné autrui;
  - type: text
    content: Exige de lui des gages, à cause des étrangers.
  '17':
  - type: text
    content: ' '
  - type: note
    content: Pr 9:17.
  - type: text
    content: Le pain du mensonge est doux à l’homme,
  - type: text
    content: Et plus tard sa bouche est remplie de gravier.
  '18':
  - type: text
    content: Les projets s’affermissent par le conseil;
  - type: text
    content: Fais la guerre avec prudence.
  '19':
  - type: text
    content: ' '
  - type: note
    content: Pr 11:13.
  - type: text
    content: Celui qui répand la calomnie dévoile les secrets;
  - type: text
    content: Ne te mêle pas avec celui qui ouvre ses lèvres.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Pr 16:14; 19:12.
  - type: text
    content: La terreur qu’inspire le roi est comme le rugissement d’un lion;
  - type: text
    content: Celui qui l’irrite pèche contre lui-même.
  '20':
  - type: text
    content: ' '
  - type: note
    content: Ex 21:17. Lé 20:9. De 27:16. Mt 15:4.
  - type: text
    content: Si quelqu’un maudit son père et sa mère,
  - type: text
    content: Sa lampe s’éteindra au milieu des ténèbres.
  '21':
  - type: text
    content: ' '
  - type: note
    content: Pr 13:11; 28:20.
  - type: text
    content: Un héritage promptement acquis dès l’origine
  - type: text
    content: Ne sera pas béni quand viendra la fin.
  '22':
  - type: text
    content: ' '
  - type: note
    content: De 32:35. Pr 17:13; 24:29. Ro 12:17. 1 Th 5:15. 1 Pi 3:9.
  - type: text
    content: 'Ne dis pas: Je rendrai le mal.'
  - type: text
    content: Espère en l’Éternel, et il te délivrera.
  '23':
  - type: text
    content: ' '
  - type: note
    content: v. 10.
  - type: text
    content: L’Éternel a en horreur deux sortes de poids,
  - type: text
    content: Et la balance fausse n’est pas une chose bonne.
  '24':
  - type: text
    content: ' '
  - type: note
    content: Job 31:4. Ps 37:23; 139:2, 3. Jé 10:23.
  - type: text
    content: C’est l’Éternel qui dirige les pas de l’homme,
  - type: text
    content: Mais l’homme peut-il comprendre sa voie?
  '25':
  - type: text
    content: C’est un piège pour l’homme que de prendre à la légère un engagement sacré,
  - type: text
    content: Et de ne réfléchir qu’après avoir fait un vœu.
  '26':
  - type: text
    content: Un roi sage dissipe les méchants,
  - type: text
    content: Et fait passer sur eux la roue.
  '27':
  - type: text
    content: Le souffle de l’homme est une lampe de l’Éternel;
  - type: text
    content: Il pénètre jusqu’au fond des entrailles.
  '28':
  - type: text
    content: La bonté et la fidélité gardent le roi,
  - type: text
    content: Et il soutient son trône par la bonté.
  '29':
  - type: text
    content: La force est la gloire des jeunes gens,
  - type: note
    content: Pr 16:31.
  - type: text
    content: Et les cheveux blancs sont l’ornement des vieillards.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Pr 17:14.
  - type: text
    content: C’est une gloire pour l’homme de s’abstenir des querelles,
  - type: text
    content: Mais tout insensé se livre à l’emportement.
  '30':
  - type: text
    content: Les plaies d’une blessure sont un remède pour le méchant;
  - type: text
    content: 'De même '
  - type: note
    content: Pr 10:13.
  - type: text
    content: les coups qui pénètrent jusqu’au fond des entrailles.
  '4':
  - type: text
    content: A cause du froid, le paresseux ne laboure pas;
  - type: text
    content: A la moisson, il voudrait récolter, mais il n’y a rien.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Pr 18:4.
  - type: text
    content: Les desseins dans le cœur de l’homme sont des eaux profondes,
  - type: text
    content: Mais l’homme intelligent sait y puiser.
  '6':
  - type: text
    content: Beaucoup de gens proclament leur bonté;
  - type: text
    content: Mais un homme fidèle, qui le trouvera?
  '7':
  - type: text
    content: Le juste marche dans son intégrité;
  - type: text
    content: Heureux ses enfants après lui!
  '8':
  - type: text
    content: Le roi assis sur le trône de la justice
  - type: note
    content: v. 26.
  - type: text
    content: Dissipe tout mal par son regard.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 1 R 8:46. Job 14:4. Ps 51:7. Ec 7:20. 1 Jn 1:8.
  - type: text
    content: 'Qui dira: J’ai purifié mon cœur,'
  - type: text
    content: Je suis net de mon péché?
