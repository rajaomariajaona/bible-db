        - type: text
          text: 139:2
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 10:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: C’est l’Éternel qui dirige les pas de l’homme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais l’homme peut-il comprendre sa voie?
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est un piège pour l’homme que de prendre à la légère un engagement sacré,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et de ne réfléchir qu’après avoir fait un vœu.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un roi sage dissipe les méchants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et fait passer sur eux la roue.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le souffle de l’homme est une lampe de l’Éternel;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il pénètre jusqu’au fond des entrailles.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La bonté et la fidélité gardent le roi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il soutient son trône par la bonté.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La force est la gloire des jeunes gens,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 16:31
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Et les cheveux blancs sont l’ornement des vieillards.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 17:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: C’est une gloire pour l’homme de s’abstenir des querelles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais tout insensé se livre à l’emportement.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les plaies d’une blessure sont un remède pour le méchant;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'De même '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 10:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: les coups qui pénètrent jusqu’au fond des entrailles.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause du froid, le paresseux ne laboure pas;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A la moisson, il voudrait récolter, mais il n’y a rien.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 18:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Les desseins dans le cœur de l’homme sont des eaux profondes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais l’homme intelligent sait y puiser.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Beaucoup de gens proclament leur bonté;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais un homme fidèle, qui le trouvera?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le juste marche dans son intégrité;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Heureux ses enfants après lui!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le roi assis sur le trône de la justice
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: v. 26.
      marker-yv: yv-n
    - type: text
      text: Dissipe tout mal par son regard.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 8:46
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 14:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 51:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ec 7:20
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Jn 1:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Qui dira: J’ai purifié mon cœur,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis net de mon péché?
