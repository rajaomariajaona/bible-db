        - type: text
          text: 1 Th 5:15
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 3:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Ne dis pas: Je rendrai le mal.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Espère en l’Éternel, et il te délivrera.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: v. 10.
      marker-yv: yv-n
    - type: text
      text: L’Éternel a en horreur deux sortes de poids,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la balance fausse n’est pas une chose bonne.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 31:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 37:23
      - type: text
