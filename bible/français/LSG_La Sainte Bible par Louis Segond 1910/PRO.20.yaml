- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Le vin est moqueur, les boissons fortes sont tumultueuses;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quiconque en fait excès n’est pas sage.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 16:14
      metadata:
        usfm: PRO.16.14
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 19:12
      metadata:
        usfm: PRO.19.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: La terreur qu’inspire le roi est comme le rugissement d’un lion;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celui qui l’irrite pèche contre lui-même.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 17:14
      metadata:
        usfm: PRO.17.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: C’est une gloire pour l’homme de s’abstenir des querelles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais tout insensé se livre à l’emportement.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: A cause du froid, le paresseux ne laboure pas;
- type: usfm
  marker: q1
  children:
  - type: text
    text: A la moisson, il voudrait récolter, mais il n’y a rien.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 18:4
      metadata:
        usfm: PRO.18.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Les desseins dans le cœur de l’homme sont des eaux profondes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais l’homme intelligent sait y puiser.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Beaucoup de gens proclament leur bonté;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais un homme fidèle, qui le trouvera?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Le juste marche dans son intégrité;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Heureux ses enfants après lui!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Le roi assis sur le trône de la justice
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: text
      text: v. 26.
    marker-yv: yv-n
  - type: text
    text: Dissipe tout mal par son regard.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 8:46
      metadata:
        usfm: 1KI.8.46
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 14:4
      metadata:
        usfm: JOB.14.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 51:7
      metadata:
        usfm: PSA.51.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ec 7:20
      metadata:
        usfm: ECC.7.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
