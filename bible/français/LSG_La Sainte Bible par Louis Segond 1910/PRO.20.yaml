document_id: PRO.20,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le vin est moqueur, les boissons fortes sont tumultueuses;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quiconque en fait excès n’est pas sage.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 25:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 11:1
      - type: text
        text: . v. 23.
      marker-yv: yv-n
    - type: text
      text: Deux sortes de poids, deux sortes d’épha,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sont l’un et l’autre en abomination à l’Éternel.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’enfant laisse déjà voir par ses actions
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si sa conduite sera pure et droite.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 4:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 94:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: L’oreille qui entend, et l’œil qui voit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est l’Éternel qui les a faits l’un et l’autre.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 19:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: N’aime pas le sommeil, de peur que tu ne deviennes pauvre;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ouvre les yeux, tu seras rassasié de pain.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mauvais! Mauvais! Dit l’acheteur;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et en s’en allant, il se félicite.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il y a de l’or et beaucoup de perles;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 3:14
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '15'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Mais les lèvres savantes sont un objet précieux.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 11:15
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 27:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Prends son vêtement, car il a cautionné autrui;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Exige de lui des gages, à cause des étrangers.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 9:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Le pain du mensonge est doux à l’homme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et plus tard sa bouche est remplie de gravier.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les projets s’affermissent par le conseil;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fais la guerre avec prudence.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 11:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Celui qui répand la calomnie dévoile les secrets;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne te mêle pas avec celui qui ouvre ses lèvres.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 16:14
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 19:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: La terreur qu’inspire le roi est comme le rugissement d’un lion;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui l’irrite pèche contre lui-même.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 21:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 20:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 27:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 15:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Si quelqu’un maudit son père et sa mère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sa lampe s’éteindra au milieu des ténèbres.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 13:11
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 28:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Un héritage promptement acquis dès l’origine
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne sera pas béni quand viendra la fin.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 32:35
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 17:13
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 24:29
      - type: text
