document_id: 2SA.1,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: RÈGNE DE DAVID
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: (Ac 13:22.)
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Cantique funèbre de David sur la mort de Saül et de Jonathan
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-16: cf. 1 S 31:1-6. 2 S 4:5-12. Pr 24:17.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après la mort de Saül, David, qui avait battu les '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 30:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Amalécites, était depuis deux jours revenu à Tsiklag. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je m’approchai de lui, et je lui donnai la mort, sachant bien qu’il ne survivrait pas à sa défaite. J’ai enlevé le diadème qui était sur sa tête et le bracelet qu’il avait au bras, et je les apporte ici à mon seigneur. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 3:31
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 13:31
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'David saisit ses vêtements et les déchira, et tous les hommes qui étaient auprès de lui firent de même. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils furent dans le deuil, pleurèrent et jeûnèrent jusqu’au soir, à cause de Saül, de Jonathan, son fils, du peuple de l’Éternel, et de la maison d’Israël, parce qu’ils étaient tombés par l’épée. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David dit au jeune homme qui lui avait apporté ces nouvelles: D’où es-tu? Et il répondit: Je suis le fils d’un étranger, d’un Amalécite. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David lui dit: Comment n’as-tu pas craint de porter la main sur l’oint de l’Éternel et de lui donner la mort? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et David appela l’un de ses gens, et dit: Approche, et tue-le! Cet homme frappa l’Amalécite, qui mourut. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et David lui dit: Que ton sang retombe sur ta tête, car ta bouche a déposé contre toi, puisque tu as dit: J’ai donné la mort à l’oint de l’Éternel!'
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 17-27: cf. 2 S 3:33, 34. 2 Ch 35:25. Jé 9:1.'
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici le cantique funèbre que David composa sur Saül et sur Jonathan, son fils, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et qu’il ordonna d’enseigner aux enfants de Juda. C’est le cantique de l’arc: il est écrit dans le livre du '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 10:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Juste.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’élite d’Israël a succombé sur tes collines!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comment des héros sont-ils tombés?
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le troisième jour, un homme arriva du camp de Saül, les vêtements déchirés et la tête couverte de terre. Lorsqu’il fut en présence de David, il se jeta par terre et se prosterna. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mi 1:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ne l’annoncez point dans Gath,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N’en publiez point la nouvelle dans les rues d’Askalon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De peur que les filles des Philistins ne se réjouissent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De peur que les filles des incirconcis ne triomphent.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Montagnes de Guilboa!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’il n’y ait sur vous ni rosée ni pluie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ni champs qui donnent des prémices pour les offrandes!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car là ont été jetés les boucliers des héros,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le bouclier de Saül; L’huile a cessé de les oindre.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Devant le sang des blessés, devant la graisse des plus vaillants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’arc de Jonathan n’a jamais reculé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’épée de Saül ne retournait point à vide.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Saül et Jonathan, aimables et chéris pendant leur vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N’ont point été séparés dans leur mort;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils étaient plus légers que les aigles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils étaient plus forts que les lions.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Filles d’Israël! Pleurez sur Saül,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui vous revêtait magnifiquement de cramoisi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui mettait des ornements d’or sur vos habits.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comment des héros sont-ils tombés au milieu du combat?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comment Jonathan a-t-il succombé sur tes collines?
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis dans la douleur à cause de toi, Jonathan, mon frère!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu faisais tout mon plaisir;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ton amour pour moi était admirable,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au-dessus de l’amour des femmes.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comment des héros sont-ils tombés?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comment leurs armes se sont-elles perdues!
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David lui dit: D’où viens-tu? Et il lui répondit: Je me suis sauvé du camp d’Israël. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David lui dit: Que s’est-il passé? Dis-moi donc! Et il répondit: Le peuple s’est enfui du champ de bataille, et un grand nombre d’hommes sont tombés et ont péri; Saül même et Jonathan, son fils, sont morts. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David dit au jeune homme qui lui apportait ces nouvelles: Comment sais-tu que Saül et Jonathan, son fils, sont morts? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et le jeune homme qui lui apportait ces nouvelles répondit: Je me trouvais sur la montagne de Guilboa; et voici, Saül s’appuyait sur sa lance, et voici, les chars et les cavaliers étaient près de l’atteindre. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'S’étant retourné, il m’aperçut et m’appela. Je dis: Me voici! '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et il me dit: Qui es-tu? Je lui répondis: Je suis Amalécite. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et il dit: Approche donc, et donne-moi la mort; car je suis pris de vertige, quoique encore plein de vie. '
