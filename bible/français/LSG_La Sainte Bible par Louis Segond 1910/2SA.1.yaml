document_id: 2SA.1,93
type_code: fra
verses:
  '1':
  - type: heading
    content: RÈGNE DE DAVID
  - type: heading
    content: (Ac 13:22.)
  - type: heading
    content: Cantique funèbre de David sur la mort de Saül et de Jonathan
  - type: heading
    content: 'V. 1-16: cf. 1 S 31:1-6. 2 S 4:5-12. Pr 24:17.'
  - type: text
    content: 'Après la mort de Saül, David, qui avait battu les '
  - type: note
    content: 1 S 30:17.
  - type: text
    content: 'Amalécites, était depuis deux jours revenu à Tsiklag. '
  '10':
  - type: text
    content: 'Je m’approchai de lui, et je lui donnai la mort, sachant bien qu’il ne survivrait pas à sa défaite. J’ai enlevé le diadème qui était sur sa tête et le bracelet qu’il avait au bras, et je les apporte ici à mon seigneur. '
  '11':
  - type: note
    content: 2 S 3:31; 13:31.
  - type: text
    content: 'David saisit ses vêtements et les déchira, et tous les hommes qui étaient auprès de lui firent de même. '
  '12':
  - type: text
    content: 'Ils furent dans le deuil, pleurèrent et jeûnèrent jusqu’au soir, à cause de Saül, de Jonathan, son fils, du peuple de l’Éternel, et de la maison d’Israël, parce qu’ils étaient tombés par l’épée. '
  '13':
  - type: text
    content: 'David dit au jeune homme qui lui avait apporté ces nouvelles: D’où es-tu? Et il répondit: Je suis le fils d’un étranger, d’un Amalécite. '
  '14':
  - type: text
    content: 'David lui dit: Comment n’as-tu pas craint de porter la main sur l’oint de l’Éternel et de lui donner la mort? '
  '15':
  - type: text
    content: 'Et David appela l’un de ses gens, et dit: Approche, et tue-le! Cet homme frappa l’Amalécite, qui mourut. '
  '16':
  - type: text
    content: 'Et David lui dit: Que ton sang retombe sur ta tête, car ta bouche a déposé contre toi, puisque tu as dit: J’ai donné la mort à l’oint de l’Éternel!'
  - type: heading
    content: 'V. 17-27: cf. 2 S 3:33, 34. 2 Ch 35:25. Jé 9:1.'
  '17':
  - type: text
    content: 'Voici le cantique funèbre que David composa sur Saül et sur Jonathan, son fils, '
  '18':
  - type: text
    content: 'et qu’il ordonna d’enseigner aux enfants de Juda. C’est le cantique de l’arc: il est écrit dans le livre du '
  - type: note
    content: Jos 10:13.
  - type: text
    content: Juste.
  '19':
  - type: text
    content: L’élite d’Israël a succombé sur tes collines!
  - type: text
    content: Comment des héros sont-ils tombés?
  '2':
  - type: text
    content: 'Le troisième jour, un homme arriva du camp de Saül, les vêtements déchirés et la tête couverte de terre. Lorsqu’il fut en présence de David, il se jeta par terre et se prosterna. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: Mi 1:10.
  - type: text
    content: Ne l’annoncez point dans Gath,
  - type: text
    content: N’en publiez point la nouvelle dans les rues d’Askalon,
  - type: text
    content: De peur que les filles des Philistins ne se réjouissent,
  - type: text
    content: De peur que les filles des incirconcis ne triomphent.
  '21':
  - type: text
    content: Montagnes de Guilboa!
  - type: text
    content: Qu’il n’y ait sur vous ni rosée ni pluie,
  - type: text
    content: Ni champs qui donnent des prémices pour les offrandes!
  - type: text
    content: Car là ont été jetés les boucliers des héros,
  - type: text
    content: Le bouclier de Saül; L’huile a cessé de les oindre.
  '22':
  - type: text
    content: Devant le sang des blessés, devant la graisse des plus vaillants,
  - type: text
    content: L’arc de Jonathan n’a jamais reculé,
  - type: text
    content: Et l’épée de Saül ne retournait point à vide.
  '23':
  - type: text
    content: Saül et Jonathan, aimables et chéris pendant leur vie,
  - type: text
    content: N’ont point été séparés dans leur mort;
  - type: text
    content: Ils étaient plus légers que les aigles,
  - type: text
    content: Ils étaient plus forts que les lions.
  '24':
  - type: text
    content: Filles d’Israël! Pleurez sur Saül,
  - type: text
    content: Qui vous revêtait magnifiquement de cramoisi,
  - type: text
    content: Qui mettait des ornements d’or sur vos habits.
  '25':
  - type: text
    content: Comment des héros sont-ils tombés au milieu du combat?
  - type: text
    content: Comment Jonathan a-t-il succombé sur tes collines?
  '26':
  - type: text
    content: Je suis dans la douleur à cause de toi, Jonathan, mon frère!
  - type: text
    content: Tu faisais tout mon plaisir;
  - type: text
    content: Ton amour pour moi était admirable,
  - type: text
    content: Au-dessus de l’amour des femmes.
  '27':
  - type: text
    content: Comment des héros sont-ils tombés?
  - type: text
    content: Comment leurs armes se sont-elles perdues!
  '3':
  - type: text
    content: 'David lui dit: D’où viens-tu? Et il lui répondit: Je me suis sauvé du camp d’Israël. '
  '4':
  - type: text
    content: 'David lui dit: Que s’est-il passé? Dis-moi donc! Et il répondit: Le peuple s’est enfui du champ de bataille, et un grand nombre d’hommes sont tombés et ont péri; Saül même et Jonathan, son fils, sont morts. '
  '5':
  - type: text
    content: 'David dit au jeune homme qui lui apportait ces nouvelles: Comment sais-tu que Saül et Jonathan, son fils, sont morts? '
  '6':
  - type: text
    content: 'Et le jeune homme qui lui apportait ces nouvelles répondit: Je me trouvais sur la montagne de Guilboa; et voici, Saül s’appuyait sur sa lance, et voici, les chars et les cavaliers étaient près de l’atteindre. '
  '7':
  - type: text
    content: 'S’étant retourné, il m’aperçut et m’appela. Je dis: Me voici! '
  '8':
  - type: text
    content: 'Et il me dit: Qui es-tu? Je lui répondis: Je suis Amalécite. '
  '9':
  - type: text
    content: 'Et il dit: Approche donc, et donne-moi la mort; car je suis pris de vertige, quoique encore plein de vie. '
