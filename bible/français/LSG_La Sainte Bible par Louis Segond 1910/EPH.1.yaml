document_id: EPH.1,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Adresse et salutation
  - type: heading
    content: 'V. 1-2: cf. Ac 18:19-21; 19; 20:17, etc.'
  - type: text
    content: 'Paul, apôtre de Jésus-Christ par la volonté de Dieu, '
  - type: note
    content: Ro 1:7. 1 Co 1:2. 2 Co 1:1.
  - type: text
    content: 'aux saints qui sont à Éphèse et aux fidèles en Jésus-Christ: '
  '10':
  - type: text
    content: 'pour le mettre à exécution lorsque '
  - type: note
    content: Ge 49:10. Da 9:24. Ga 4:4.
  - type: text
    content: 'les temps seraient accomplis, de réunir toutes choses en Christ, celles qui sont dans les cieux et celles qui sont sur la terre. '
  '11':
  - type: text
    content: 'En lui nous sommes aussi devenus '
  - type: note
    content: Ro 8:17.
  - type: text
    content: 'héritiers, ayant été prédestinés suivant la résolution de celui qui opère toutes choses d’après le conseil de sa volonté, '
  '12':
  - type: text
    content: 'afin que nous servions à la louange de sa gloire, nous qui d’avance avons espéré en Christ. '
  '13':
  - type: text
    content: 'En lui vous aussi, après avoir entendu la parole de la vérité, l’Évangile de votre salut, en lui '
  - type: note
    content: Ro 8:15. 2 Co 1:22; 5:5. Ép 4:30.
  - type: text
    content: 'vous avez cru et vous avez été scellés du Saint-Esprit qui avait été promis, '
  '14':
  - type: text
    content: 'lequel est un gage de notre héritage, pour '
  - type: note
    content: Ex 19:5. De 7:6; 14:2; 26:18. Ro 8:23. 1 Pi 2:9.
  - type: text
    content: la rédemption de ceux que Dieu s’est acquis, à la louange de sa gloire.
  - type: heading
    content: 'V. 15-23: cf. (Col 1:3-6, 9-13. 1 Pi 1:3, 4.) (Ph 2:9-11. Col 1:18, 19. Ép 2:1-7.) Ph 3:10.'
  '15':
  - type: text
    content: ' '
  - type: note
    content: Ph 1:3. Col 1:3. 1 Th 1:2. 2 Th 1:3.
  - type: text
    content: 'C’est pourquoi moi aussi, ayant entendu parler de votre foi au Seigneur Jésus et de votre charité pour tous les saints, '
  '16':
  - type: text
    content: 'je ne cesse de rendre grâces pour vous, faisant mention de vous dans mes prières, '
  '17':
  - type: text
    content: 'afin que le Dieu de notre Seigneur Jésus-Christ, le Père de gloire, vous donne un esprit de sagesse et de révélation, dans sa connaissance, '
  '18':
  - type: text
    content: 'et qu’il illumine les yeux de votre cœur, pour que vous sachiez quelle est l’espérance qui s’attache à son appel, quelle est la richesse de la gloire de son héritage qu’il réserve aux saints, '
  '19':
  - type: text
    content: 'et quelle est envers nous qui croyons l’infinie grandeur de sa puissance, se manifestant '
  - type: note
    content: Col 2:12.
  - type: text
    content: 'avec efficacité par la vertu de sa force. '
  '2':
  - type: note
    content: Ga 1:3. 1 Pi 1:2.
  - type: text
    content: Que la grâce et la paix vous soient données de la part de Dieu notre Père et du Seigneur Jésus-Christ!
  - type: heading
    content: Bénédictions de Dieu en Jésus-Christ, auteur de notre rédemption et chef de l’Église
  - type: heading
    content: 'V. 3-14: cf. (1 Pi 1:1, 2. 2 Th 2:13, 14. 2 Ti 1:9, 10. Ro 8:28-30.) (Ga 3:13, 14. Ro 8:15-17.)'
  '20':
  - type: text
    content: 'Il l’a déployée en Christ, en le ressuscitant des morts, '
  - type: note
    content: Ps 110:1. Ac 2:34. 1 Co 15:25. Col 3:1. Hé 1:3; 10:12. 1 Pi 3:22.
  - type: text
    content: 'et en le faisant asseoir à sa droite dans les lieux célestes, '
  '21':
  - type: text
    content: 'au-dessus de toute domination, de toute autorité, de toute puissance, de toute dignité, et de tout nom qui se peut nommer, non seulement dans le siècle présent, mais encore dans le siècle à venir. '
  '22':
  - type: note
    content: Ps 8:7. Mt 28:18. 1 Co 15:27. Hé 2:8.
  - type: text
    content: 'Il a tout mis sous ses pieds, et il l’a donné pour chef suprême à l’Église, '
  '23':
  - type: note
    content: Ro 12:5. 1 Co 12:27. Ép 4:16; 5:23.
  - type: text
    content: qui est son corps, la plénitude de celui qui remplit tout en tous.
  '3':
  - type: text
    content: 'Béni soit '
  - type: note
    content: 2 Co 1:3. 1 Pi 1:3.
  - type: text
    content: 'Dieu, le Père de notre Seigneur Jésus-Christ, qui nous a bénis de toutes sortes de bénédictions spirituelles dans les lieux célestes en Christ! '
  '4':
  - type: note
    content: Jn 15:16. 2 Ti 1:9.
  - type: text
    content: 'En lui Dieu nous a élus avant la fondation du monde, '
  - type: note
    content: Lu 1:75. Ép 5:27. Col 1:22. 2 Ti 1:9. Tit 2:12.
  - type: text
    content: 'pour que nous soyons saints et irrépréhensibles devant lui, '
  '5':
  - type: text
    content: 'nous ayant prédestinés dans son amour à être ses enfants d’adoption par Jésus-Christ, selon le bon plaisir de sa volonté, '
  '6':
  - type: text
    content: 'à la louange de la gloire de sa grâce qu’il nous a accordée '
  - type: note
    content: Mt 3:17.
  - type: text
    content: 'en son bien-aimé. '
  '7':
  - type: note
    content: Ac 20:28. Col 1:14. Hé 9:12. 1 Pi 1:18.
  - type: text
    content: 'En lui nous avons la rédemption par son sang, la rémission des péchés, selon la richesse de sa grâce, '
  '8':
  - type: text
    content: 'que Dieu a répandue abondamment sur nous par toute espèce de sagesse et d’intelligence, '
  '9':
  - type: text
    content: 'nous faisant connaître '
  - type: note
    content: Ro 16:25. Ép 3:9. Col 1:26. 2 Ti 1:9. Tit 1:2. 1 Pi 1:20.
  - type: text
    content: 'le mystère de sa volonté, selon le bienveillant dessein qu’il avait formé en lui-même, '
