document_id: EPH.1
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Adresse et salutation
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-2: cf. Ac 18:19-21; 19; 20:17, etc.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Paul, apôtre de Jésus-Christ par la volonté de Dieu, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 1:7
      metadata:
        usfm: ROM.1.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 1:2
      metadata:
        usfm: 1CO.1.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 1:1
      metadata:
        usfm: 2CO.1.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'aux saints qui sont à Éphèse et aux fidèles en Jésus-Christ: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 1:3
      metadata:
        usfm: GAL.1.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 1:2
      metadata:
        usfm: 1PE.1.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Que la grâce et la paix vous soient données de la part de Dieu notre Père et du Seigneur Jésus-Christ!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Bénédictions de Dieu en Jésus-Christ, auteur de notre rédemption et chef de l’Église
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 3-14: cf. (1 Pi 1:1, 2. 2 Th 2:13, 14. 2 Ti 1:9, 10. Ro 8:28-30.) (Ga 3:13, 14. Ro 8:15-17.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Béni soit '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 1:3
      metadata:
        usfm: 2CO.1.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 1:3
      metadata:
        usfm: 1PE.1.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Dieu, le Père de notre Seigneur Jésus-Christ, qui nous a bénis de toutes sortes de bénédictions spirituelles dans les lieux célestes en Christ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 15:16
      metadata:
        usfm: JHN.15.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ti 1:9
      metadata:
        usfm: 2TI.1.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'En lui Dieu nous a élus avant la fondation du monde, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 1:75
      metadata:
        usfm: LUK.1.75
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 5:27
      metadata:
        usfm: EPH.5.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 1:22
      metadata:
        usfm: COL.1.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ti 1:9
      metadata:
        usfm: 2TI.1.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Tit 2:12
      metadata:
        usfm: TIT.2.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'pour que nous soyons saints et irrépréhensibles devant lui, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'nous ayant prédestinés dans son amour à être ses enfants d’adoption par Jésus-Christ, selon le bon plaisir de sa volonté, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'à la louange de la gloire de sa grâce qu’il nous a accordée '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 3:17
      metadata:
        usfm: MAT.3.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'en son bien-aimé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 20:28
      metadata:
        usfm: ACT.20.28
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 1:14
      metadata:
        usfm: COL.1.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 9:12
      metadata:
        usfm: HEB.9.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 1:18
      metadata:
        usfm: 1PE.1.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'En lui nous avons la rédemption par son sang, la rémission des péchés, selon la richesse de sa grâce, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'que Dieu a répandue abondamment sur nous par toute espèce de sagesse et d’intelligence, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'nous faisant connaître '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 16:25
      metadata:
        usfm: ROM.16.25
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 3:9
      metadata:
        usfm: EPH.3.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 1:26
      metadata:
        usfm: COL.1.26
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ti 1:9
      metadata:
        usfm: 2TI.1.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Tit 1:2
      metadata:
        usfm: TIT.1.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 1:20
      metadata:
        usfm: 1PE.1.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'le mystère de sa volonté, selon le bienveillant dessein qu’il avait formé en lui-même, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'pour le mettre à exécution lorsque '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 49:10
      metadata:
        usfm: GEN.49.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Da 9:24
      metadata:
        usfm: DAN.9.24
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 4:4
      metadata:
        usfm: GAL.4.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'les temps seraient accomplis, de réunir toutes choses en Christ, celles qui sont dans les cieux et celles qui sont sur la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'En lui nous sommes aussi devenus '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 8:17
      metadata:
        usfm: ROM.8.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'héritiers, ayant été prédestinés suivant la résolution de celui qui opère toutes choses d’après le conseil de sa volonté, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'afin que nous servions à la louange de sa gloire, nous qui d’avance avons espéré en Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'En lui vous aussi, après avoir entendu la parole de la vérité, l’Évangile de votre salut, en lui '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 8:15
      metadata:
        usfm: ROM.8.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 1:22
      metadata:
        usfm: 2CO.1.22
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 5:5
      metadata:
        usfm: 2CO.5.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 4:30
      metadata:
        usfm: EPH.4.30
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'vous avez cru et vous avez été scellés du Saint-Esprit qui avait été promis, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'lequel est un gage de notre héritage, pour '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 19:5
      metadata:
        usfm: EXO.19.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 7:6
      metadata:
        usfm: DEU.7.6
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 14:2
      metadata:
        usfm: DEU.14.2
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 26:18
      metadata:
        usfm: DEU.26.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 8:23
      metadata:
        usfm: ROM.8.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 2:9
      metadata:
        usfm: 1PE.2.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: la rédemption de ceux que Dieu s’est acquis, à la louange de sa gloire.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 15-23: cf. (Col 1:3-6, 9-13. 1 Pi 1:3, 4.) (Ph 2:9-11. Col 1:18, 19. Ép 2:1-7.) Ph 3:10.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 1:3
      metadata:
        usfm: PHP.1.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 1:3
      metadata:
        usfm: COL.1.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 1:2
      metadata:
        usfm: 1TH.1.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Th 1:3
      metadata:
        usfm: 2TH.1.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'C’est pourquoi moi aussi, ayant entendu parler de votre foi au Seigneur Jésus et de votre charité pour tous les saints, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'je ne cesse de rendre grâces pour vous, faisant mention de vous dans mes prières, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'afin que le Dieu de notre Seigneur Jésus-Christ, le Père de gloire, vous donne un esprit de sagesse et de révélation, dans sa connaissance, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'et qu’il illumine les yeux de votre cœur, pour que vous sachiez quelle est l’espérance qui s’attache à son appel, quelle est la richesse de la gloire de son héritage qu’il réserve aux saints, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'et quelle est envers nous qui croyons l’infinie grandeur de sa puissance, se manifestant '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 2:12
      metadata:
        usfm: COL.2.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'avec efficacité par la vertu de sa force. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Il l’a déployée en Christ, en le ressuscitant des morts, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 110:1
      metadata:
        usfm: PSA.110.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 2:34
      metadata:
        usfm: ACT.2.34
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 15:25
      metadata:
        usfm: 1CO.15.25
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 3:1
      metadata:
        usfm: COL.3.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 1:3
      metadata:
        usfm: HEB.1.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 10:12
      metadata:
        usfm: HEB.10.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 3:22
      metadata:
        usfm: 1PE.3.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et en le faisant asseoir à sa droite dans les lieux célestes, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'au-dessus de toute domination, de toute autorité, de toute puissance, de toute dignité, et de tout nom qui se peut nommer, non seulement dans le siècle présent, mais encore dans le siècle à venir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 8:7
      metadata:
        usfm: PSA.8.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 28:18
      metadata:
        usfm: MAT.28.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 15:27
      metadata:
        usfm: 1CO.15.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 2:8
      metadata:
        usfm: HEB.2.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il a tout mis sous ses pieds, et il l’a donné pour chef suprême à l’Église, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 12:5
      metadata:
        usfm: ROM.12.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 12:27
      metadata:
        usfm: 1CO.12.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 4:16
      metadata:
        usfm: EPH.4.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 5:23
      metadata:
        usfm: EPH.5.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: qui est son corps, la plénitude de celui qui remplit tout en tous.
