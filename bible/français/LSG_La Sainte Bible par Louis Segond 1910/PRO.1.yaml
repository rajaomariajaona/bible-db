document_id: PRO.1,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-9: cf. (1 R 4:29-32. Ec 12:11-13, 15.) (Pr 2:1-9; 4:1-9.)'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Proverbes de Salomon, fils de David, roi d’Israël,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Mon fils, si des pécheurs veulent te séduire,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 4:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ne te laisse pas gagner.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'S’ils disent: Viens avec nous! Dressons des embûches, versons du sang,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tendons des pièges à celui qui se repose en vain sur son innocence,
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Engloutissons-les tout vifs, comme le séjour des morts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tout entiers, comme ceux qui descendent dans la fosse;
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Nous trouverons toute sorte de biens précieux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous remplirons de butin nos maisons;
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Tu auras ta part avec nous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n’y aura qu’une bourse pour nous tous!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Mon fils, ne te mets pas en chemin avec eux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Détourne ton pied de leur sentier;
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Car leurs '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 59:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 3:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: pieds courent au mal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils ont hâte de répandre le sang.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Mais en vain jette-t-on le filet
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Devant les yeux de tout ce qui a des ailes;
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Et eux, c’est contre leur propre sang qu’ils dressent des embûches,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est à leur âme qu’ils tendent des pièges.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ainsi arrive-t-il à tout homme avide de gain;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La cupidité cause la perte de ceux qui s’y livrent.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 20-33: cf. Pr 8:1-21, 32-36. (Za 7:9-14. 2 Ch 36:15, etc.)'
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Pour connaître la sagesse et l’instruction,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour comprendre les paroles de l’intelligence;
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: La sagesse crie dans les rues,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Elle élève sa voix dans les places:'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Elle crie à l’entrée des lieux bruyants;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Aux portes, dans la ville, elle fait entendre ses paroles:'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Jusqu’à quand, stupides, aimerez-vous la stupidité?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jusqu’à quand les moqueurs se plairont-ils à la moquerie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les insensés haïront-ils la science?
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Tournez-vous pour écouter mes réprimandes!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, je répandrai sur vous mon esprit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je vous ferai connaître mes paroles…
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Puisque '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 6:12
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 66:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 13:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: j’appelle et que vous résistez,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Puisque j’étends ma main et que personne n’y prend garde,
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Puisque vous rejetez tous mes conseils,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que vous n’aimez pas mes réprimandes,
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Moi aussi, je rirai quand vous serez dans le malheur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je me moquerai quand la terreur vous saisira,
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 27:9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 35:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 1:15
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 11:11
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 8:18
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mi 3:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Quand la terreur vous saisira comme une tempête,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que le malheur vous enveloppera comme un tourbillon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand la détresse et l’angoisse fondront sur vous.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Alors ils m’appelleront, et je ne répondrai pas;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils me chercheront, et ils ne me trouveront pas.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Parce qu’ils ont haï la science,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qu’ils n’ont pas choisi la crainte de l’Éternel,
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Pour recevoir des leçons de bon sens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De justice, d’équité et de droiture;
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Parce qu’ils n’ont point aimé mes conseils,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qu’ils ont dédaigné toutes mes réprimandes,
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Ils se nourriront du fruit de leur voie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils se rassasieront de leurs propres conseils,
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Car la résistance des stupides les tue,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la sécurité des insensés les perd;
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Mais celui qui m’écoute reposera avec assurance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il vivra tranquille et sans craindre aucun mal.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Pour donner aux simples du discernement,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au jeune homme de la connaissance et de la réflexion.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Que le sage écoute, et il augmentera son savoir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et celui qui est intelligent acquerra de l’habileté,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Pour saisir le sens d’un proverbe ou d’une énigme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des paroles des sages et de leurs sentences.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 28:28
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 111:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 9:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ec 12:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: La crainte de l’Éternel est le commencement de la science;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les insensés méprisent la sagesse et l’instruction.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Écoute, mon fils, l’instruction de ton père,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ne rejette pas l’enseignement de ta mère;
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Car c’est une couronne de grâce pour ta tête,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et une parure pour ton cou.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 10-19: cf. Pr 4:14-17. Ps 7:15-17.'
    marker-yv: yv-h
