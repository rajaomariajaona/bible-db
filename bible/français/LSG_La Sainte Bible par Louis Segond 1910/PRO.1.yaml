document_id: PRO.1,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-9: cf. (1 R 4:29-32. Ec 12:11-13, 15.) (Pr 2:1-9; 4:1-9.)'
  - type: text
    content: Proverbes de Salomon, fils de David, roi d’Israël,
  '10':
  - type: text
    content: Mon fils, si des pécheurs veulent te séduire,
  - type: note
    content: Pr 4:14.
  - type: text
    content: Ne te laisse pas gagner.
  '11':
  - type: text
    content: 'S’ils disent: Viens avec nous! Dressons des embûches, versons du sang,'
  - type: text
    content: Tendons des pièges à celui qui se repose en vain sur son innocence,
  '12':
  - type: text
    content: Engloutissons-les tout vifs, comme le séjour des morts,
  - type: text
    content: Et tout entiers, comme ceux qui descendent dans la fosse;
  '13':
  - type: text
    content: Nous trouverons toute sorte de biens précieux,
  - type: text
    content: Nous remplirons de butin nos maisons;
  '14':
  - type: text
    content: Tu auras ta part avec nous,
  - type: text
    content: Il n’y aura qu’une bourse pour nous tous!
  '15':
  - type: text
    content: Mon fils, ne te mets pas en chemin avec eux,
  - type: text
    content: Détourne ton pied de leur sentier;
  '16':
  - type: text
    content: 'Car leurs '
  - type: note
    content: És 59:7. Ro 3:15.
  - type: text
    content: pieds courent au mal,
  - type: text
    content: Et ils ont hâte de répandre le sang.
  '17':
  - type: text
    content: Mais en vain jette-t-on le filet
  - type: text
    content: Devant les yeux de tout ce qui a des ailes;
  '18':
  - type: text
    content: Et eux, c’est contre leur propre sang qu’ils dressent des embûches,
  - type: text
    content: C’est à leur âme qu’ils tendent des pièges.
  '19':
  - type: text
    content: Ainsi arrive-t-il à tout homme avide de gain;
  - type: text
    content: La cupidité cause la perte de ceux qui s’y livrent.
  - type: heading
    content: 'V. 20-33: cf. Pr 8:1-21, 32-36. (Za 7:9-14. 2 Ch 36:15, etc.)'
  '2':
  - type: text
    content: Pour connaître la sagesse et l’instruction,
  - type: text
    content: Pour comprendre les paroles de l’intelligence;
  '20':
  - type: text
    content: La sagesse crie dans les rues,
  - type: text
    content: 'Elle élève sa voix dans les places:'
  '21':
  - type: text
    content: Elle crie à l’entrée des lieux bruyants;
  - type: text
    content: 'Aux portes, dans la ville, elle fait entendre ses paroles:'
  '22':
  - type: text
    content: Jusqu’à quand, stupides, aimerez-vous la stupidité?
  - type: text
    content: Jusqu’à quand les moqueurs se plairont-ils à la moquerie,
  - type: text
    content: Et les insensés haïront-ils la science?
  '23':
  - type: text
    content: Tournez-vous pour écouter mes réprimandes!
  - type: text
    content: Voici, je répandrai sur vous mon esprit,
  - type: text
    content: Je vous ferai connaître mes paroles…
  '24':
  - type: text
    content: 'Puisque '
  - type: note
    content: És 6:12; 66:4. Jé 13:10.
  - type: text
    content: j’appelle et que vous résistez,
  - type: text
    content: Puisque j’étends ma main et que personne n’y prend garde,
  '25':
  - type: text
    content: Puisque vous rejetez tous mes conseils,
  - type: text
    content: Et que vous n’aimez pas mes réprimandes,
  '26':
  - type: text
    content: Moi aussi, je rirai quand vous serez dans le malheur,
  - type: text
    content: Je me moquerai quand la terreur vous saisira,
  '27':
  - type: text
    content: ' '
  - type: note
    content: Job 27:9; 35:12. És 1:15. Jé 11:11; 14:12. Éz 8:18. Mi 3:4.
  - type: text
    content: Quand la terreur vous saisira comme une tempête,
  - type: text
    content: Et que le malheur vous enveloppera comme un tourbillon,
  - type: text
    content: Quand la détresse et l’angoisse fondront sur vous.
  '28':
  - type: text
    content: Alors ils m’appelleront, et je ne répondrai pas;
  - type: text
    content: Ils me chercheront, et ils ne me trouveront pas.
  '29':
  - type: text
    content: Parce qu’ils ont haï la science,
  - type: text
    content: Et qu’ils n’ont pas choisi la crainte de l’Éternel,
  '3':
  - type: text
    content: Pour recevoir des leçons de bon sens,
  - type: text
    content: De justice, d’équité et de droiture;
  '30':
  - type: text
    content: Parce qu’ils n’ont point aimé mes conseils,
  - type: text
    content: Et qu’ils ont dédaigné toutes mes réprimandes,
  '31':
  - type: text
    content: Ils se nourriront du fruit de leur voie,
  - type: text
    content: Et ils se rassasieront de leurs propres conseils,
  '32':
  - type: text
    content: Car la résistance des stupides les tue,
  - type: text
    content: Et la sécurité des insensés les perd;
  '33':
  - type: text
    content: Mais celui qui m’écoute reposera avec assurance,
  - type: text
    content: Il vivra tranquille et sans craindre aucun mal.
  '4':
  - type: text
    content: Pour donner aux simples du discernement,
  - type: text
    content: Au jeune homme de la connaissance et de la réflexion.
  '5':
  - type: text
    content: Que le sage écoute, et il augmentera son savoir,
  - type: text
    content: Et celui qui est intelligent acquerra de l’habileté,
  '6':
  - type: text
    content: Pour saisir le sens d’un proverbe ou d’une énigme,
  - type: text
    content: Des paroles des sages et de leurs sentences.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Job 28:28. Ps 111:10. Pr 9:10. Ec 12:13.
  - type: text
    content: La crainte de l’Éternel est le commencement de la science;
  - type: text
    content: Les insensés méprisent la sagesse et l’instruction.
  '8':
  - type: text
    content: Écoute, mon fils, l’instruction de ton père,
  - type: text
    content: Et ne rejette pas l’enseignement de ta mère;
  '9':
  - type: text
    content: Car c’est une couronne de grâce pour ta tête,
  - type: text
    content: Et une parure pour ton cou.
  - type: heading
    content: 'V. 10-19: cf. Pr 4:14-17. Ps 7:15-17.'
