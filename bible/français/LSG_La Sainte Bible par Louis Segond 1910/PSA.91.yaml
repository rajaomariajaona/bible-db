document_id: PSA.91,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Pr 18:10. Job 5:19-26. Ps 121.) Ps 34; 62. De 33:12, 28.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Celui qui demeure sous l’abri du Très-Haut
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Repose à l’ombre du Tout-Puissant.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Aucun malheur ne t’arrivera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aucun fléau n’approchera de ta tente.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 34:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 4:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 4:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Car il ordonnera à ses anges
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De te garder dans toutes tes voies;
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 4:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ils te porteront sur les mains,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De peur que ton pied ne heurte contre une pierre.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Tu marcheras sur le '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 5:22
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '23'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: lion et sur l’aspic,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu fouleras le lionceau et le dragon.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Puisqu’il m’aime, je le délivrerai;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je le protégerai, puisqu’il connaît mon nom.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Il m’invoquera, et je lui répondrai;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je serai avec lui dans la détresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je le délivrerai et je le glorifierai.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Je le rassasierai de longs jours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je lui ferai voir mon salut.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Je dis à l’Éternel: Mon refuge et ma forteresse,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon Dieu en qui je me confie!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 124:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Car c’est lui qui te délivre du filet de l’oiseleur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De la peste et de ses ravages.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 57:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il te couvrira de ses plumes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tu trouveras un refuge sous ses ailes;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sa fidélité est un bouclier et une cuirasse.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 5:19
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '20'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 3:25
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ca 3:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Tu ne craindras ni les terreurs de la nuit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ni la flèche qui vole de jour,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ni la peste qui marche dans les ténèbres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ni la contagion qui frappe en plein midi.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Que mille tombent à ton côté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et dix mille à ta droite,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu ne seras pas atteint;
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: De tes yeux seulement tu regarderas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tu verras la rétribution des méchants.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Car tu es mon refuge, ô Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu fais du Très-Haut ta retraite.
