document_id: PSA.91,93
type_code: fra
verses:
  '1':
  - type: heading
    content: (Pr 18:10. Job 5:19-26. Ps 121.) Ps 34; 62. De 33:12, 28.
  - type: text
    content: Celui qui demeure sous l’abri du Très-Haut
  - type: text
    content: Repose à l’ombre du Tout-Puissant.
  '10':
  - type: text
    content: Aucun malheur ne t’arrivera,
  - type: text
    content: Aucun fléau n’approchera de ta tente.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Ps 34:8. Mt 4:6. Lu 4:10.
  - type: text
    content: Car il ordonnera à ses anges
  - type: text
    content: De te garder dans toutes tes voies;
  '12':
  - type: text
    content: ' '
  - type: note
    content: Lu 4:11.
  - type: text
    content: Ils te porteront sur les mains,
  - type: text
    content: De peur que ton pied ne heurte contre une pierre.
  '13':
  - type: text
    content: 'Tu marcheras sur le '
  - type: note
    content: Job 5:22, 23.
  - type: text
    content: lion et sur l’aspic,
  - type: text
    content: Tu fouleras le lionceau et le dragon.
  '14':
  - type: text
    content: Puisqu’il m’aime, je le délivrerai;
  - type: text
    content: Je le protégerai, puisqu’il connaît mon nom.
  '15':
  - type: text
    content: Il m’invoquera, et je lui répondrai;
  - type: text
    content: Je serai avec lui dans la détresse,
  - type: text
    content: Je le délivrerai et je le glorifierai.
  '16':
  - type: text
    content: Je le rassasierai de longs jours,
  - type: text
    content: Et je lui ferai voir mon salut.
  '2':
  - type: text
    content: 'Je dis à l’Éternel: Mon refuge et ma forteresse,'
  - type: text
    content: Mon Dieu en qui je me confie!
  '3':
  - type: text
    content: ' '
  - type: note
    content: Ps 124:7.
  - type: text
    content: Car c’est lui qui te délivre du filet de l’oiseleur,
  - type: text
    content: De la peste et de ses ravages.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Ps 57:2.
  - type: text
    content: Il te couvrira de ses plumes,
  - type: text
    content: Et tu trouveras un refuge sous ses ailes;
  - type: text
    content: Sa fidélité est un bouclier et une cuirasse.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Job 5:19, 20. Pr 3:25. Ca 3:8.
  - type: text
    content: Tu ne craindras ni les terreurs de la nuit,
  - type: text
    content: Ni la flèche qui vole de jour,
  '6':
  - type: text
    content: Ni la peste qui marche dans les ténèbres,
  - type: text
    content: Ni la contagion qui frappe en plein midi.
  '7':
  - type: text
    content: Que mille tombent à ton côté,
  - type: text
    content: Et dix mille à ta droite,
  - type: text
    content: Tu ne seras pas atteint;
  '8':
  - type: text
    content: De tes yeux seulement tu regarderas,
  - type: text
    content: Et tu verras la rétribution des méchants.
  '9':
  - type: text
    content: Car tu es mon refuge, ô Éternel!
  - type: text
    content: Tu fais du Très-Haut ta retraite.
