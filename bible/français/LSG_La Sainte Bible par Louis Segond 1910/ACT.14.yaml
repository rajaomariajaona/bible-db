document_id: ACT.14,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Icone: succès et persécutions'
  - type: heading
    content: 'V. 1-7: cf. Ac 17:1-15. Mt 10:23. 2 Ti 3:11.'
  - type: text
    content: 'A Icone, Paul et Barnabas entrèrent ensemble dans la synagogue des Juifs, et ils parlèrent de telle manière qu’une grande multitude de Juifs et de Grecs crurent. '
  '10':
  - type: text
    content: 'dit d’une voix forte: Lève-toi droit sur tes pieds. '
  - type: note
    content: És 35:6.
  - type: text
    content: 'Et il se leva d’un bond et marcha. '
  '11':
  - type: text
    content: 'A la vue de ce que Paul avait fait, la foule éleva la voix, et dit en langue lycaonienne: '
  - type: note
    content: Ac 28:6.
  - type: text
    content: 'Les dieux sous une forme humaine sont descendus vers nous. '
  '12':
  - type: text
    content: 'Ils appelaient Barnabas Jupiter, et Paul Mercure, parce que c’était lui qui portait la parole. '
  '13':
  - type: text
    content: 'Le prêtre de Jupiter, dont le temple était à l’entrée de la ville, amena des taureaux avec des bandelettes vers les portes, et voulait, de même que la foule, offrir un sacrifice. '
  '14':
  - type: text
    content: 'Les apôtres Barnabas et Paul, ayant appris cela, déchirèrent leurs vêtements, et se précipitèrent au milieu de la foule, '
  '15':
  - type: text
    content: 'en s’écriant: O hommes, '
  - type: note
    content: Ac 10:26. Ap 19:10; 22:9.
  - type: text
    content: 'pourquoi agissez-vous de la sorte? Nous aussi, nous sommes des hommes de la même nature que vous; et, vous apportant une bonne nouvelle, nous vous exhortons à renoncer à ces choses vaines, pour vous tourner vers le Dieu vivant, '
  - type: note
    content: Ge 1:1. Ps 33:6; 124:8; 146:6. Ap 14:7.
  - type: text
    content: 'qui a fait le ciel, la terre, la mer, et tout ce qui s’y trouve. '
  '16':
  - type: note
    content: Ps 81:13.
  - type: text
    content: 'Ce Dieu, dans les âges passés, a laissé toutes les nations suivre leurs propres voies, '
  '17':
  - type: note
    content: Ro 1:19.
  - type: text
    content: 'quoiqu’il n’ait cessé de rendre témoignage de ce qu’il est, en faisant du bien, en vous dispensant du ciel les pluies et les saisons fertiles, en vous donnant la nourriture avec abondance et en remplissant vos cœurs de joie. '
  '18':
  - type: text
    content: A peine purent-ils, par ces paroles, empêcher la foule de leur offrir un sacrifice.
  - type: heading
    content: Derbe et autres lieux. Retour à Antioche
  - type: heading
    content: 'V. 19-28: cf. 2 Ti 3:11, 12. 2 Co 6:4-9. (Ac 13:1-3; 15:3, 4, 12.)'
  '19':
  - type: text
    content: 'Alors survinrent d’Antioche et d’Icone des Juifs qui gagnèrent la foule, et qui, après avoir '
  - type: note
    content: 2 Co 11:25.
  - type: text
    content: 'lapidé Paul, le traînèrent hors de la ville, pensant qu’il était mort. '
  '2':
  - type: text
    content: 'Mais ceux des Juifs qui ne crurent point excitèrent et aigrirent les esprits des païens contre les frères. '
  '20':
  - type: text
    content: 'Mais, les disciples l’ayant entouré, il se leva, et entra dans la ville. Le lendemain, il partit pour Derbe avec Barnabas. '
  '21':
  - type: text
    content: 'Quand ils eurent évangélisé cette ville et fait un certain nombre de disciples, ils retournèrent à Lystre, à Icone et à Antioche, '
  '22':
  - type: text
    content: 'fortifiant l’esprit des disciples, '
  - type: note
    content: Ac 11:23; 13:43.
  - type: text
    content: 'les exhortant à persévérer dans la foi, et disant '
  - type: note
    content: Mt 10:38; 16:24. Lu 24:26. 2 Ti 3:12.
  - type: text
    content: 'que c’est par beaucoup de tribulations qu’il nous faut entrer dans le royaume de Dieu. '
  '23':
  - type: text
    content: 'Ils firent nommer des anciens dans chaque Église, et, après avoir prié et jeûné, ils les recommandèrent au Seigneur, en qui ils avaient cru. '
  '24':
  - type: text
    content: 'Traversant ensuite la Pisidie, ils vinrent en Pamphylie, '
  '25':
  - type: text
    content: 'annoncèrent la parole à Perge, et descendirent à Attalie. '
  '26':
  - type: text
    content: 'De là ils s’embarquèrent '
  - type: note
    content: Ac 13:1.
  - type: text
    content: 'pour Antioche, d’où ils avaient été recommandés à la grâce de Dieu pour l’œuvre qu’ils venaient d’accomplir. '
  '27':
  - type: text
    content: 'Après leur arrivée, ils convoquèrent l’Église, et ils racontèrent tout ce que Dieu avait fait avec eux, et comment il avait ouvert aux nations la porte de la foi. '
  '28':
  - type: text
    content: Et ils demeurèrent assez longtemps avec les disciples.
  '3':
  - type: text
    content: 'Ils restèrent cependant assez longtemps à Icone, parlant avec assurance, appuyés sur le Seigneur, '
  - type: note
    content: Mc 16:20. Ac 19:11. Hé 2:4.
  - type: text
    content: 'qui rendait témoignage à la parole de sa grâce et permettait qu’il se fît par leurs mains des prodiges et des miracles. '
  '4':
  - type: text
    content: 'La population de la ville se divisa: les uns étaient pour les Juifs, les autres pour les apôtres. '
  '5':
  - type: text
    content: 'Et comme les païens et les Juifs, de concert avec leurs chefs, se mettaient en mouvement pour les outrager et les lapider, '
  '6':
  - type: text
    content: 'Paul et Barnabas, en ayant eu connaissance, '
  - type: note
    content: Mt 1:23. Ac 8:1.
  - type: text
    content: 'se réfugièrent dans les villes de la Lycaonie, à Lystre et à Derbe, et dans la contrée d’alentour. '
  '7':
  - type: text
    content: Et ils y annoncèrent la bonne nouvelle.
  - type: heading
    content: 'Lystre: guérison d’un impotent'
  - type: heading
    content: 'V. 8-18: cf. Ac 3:1-12; 17:22-31. Jé 10:3-16.'
  '8':
  - type: text
    content: 'A Lystre, se tenait assis un homme '
  - type: note
    content: Ac 3:2.
  - type: text
    content: 'impotent des pieds, boiteux de naissance, et qui n’avait jamais marché. '
  '9':
  - type: text
    content: 'Il écoutait parler Paul. Et Paul, fixant les regards sur lui et voyant qu’il avait la foi pour être guéri, '
