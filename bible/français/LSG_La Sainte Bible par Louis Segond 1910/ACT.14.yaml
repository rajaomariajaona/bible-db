document_id: ACT.14,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Icone: succès et persécutions'
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-7: cf. Ac 17:1-15. Mt 10:23. 2 Ti 3:11.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A Icone, Paul et Barnabas entrèrent ensemble dans la synagogue des Juifs, et ils parlèrent de telle manière qu’une grande multitude de Juifs et de Grecs crurent. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dit d’une voix forte: Lève-toi droit sur tes pieds. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 35:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Et il se leva d’un bond et marcha. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A la vue de ce que Paul avait fait, la foule éleva la voix, et dit en langue lycaonienne: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 28:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Les dieux sous une forme humaine sont descendus vers nous. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils appelaient Barnabas Jupiter, et Paul Mercure, parce que c’était lui qui portait la parole. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le prêtre de Jupiter, dont le temple était à l’entrée de la ville, amena des taureaux avec des bandelettes vers les portes, et voulait, de même que la foule, offrir un sacrifice. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les apôtres Barnabas et Paul, ayant appris cela, déchirèrent leurs vêtements, et se précipitèrent au milieu de la foule, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'en s’écriant: O hommes, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 10:26
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 19:10
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 22:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'pourquoi agissez-vous de la sorte? Nous aussi, nous sommes des hommes de la même nature que vous; et, vous apportant une bonne nouvelle, nous vous exhortons à renoncer à ces choses vaines, pour vous tourner vers le Dieu vivant, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 1:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 33:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 124:8
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 146:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 14:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'qui a fait le ciel, la terre, la mer, et tout ce qui s’y trouve. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 81:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Ce Dieu, dans les âges passés, a laissé toutes les nations suivre leurs propres voies, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 1:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'quoiqu’il n’ait cessé de rendre témoignage de ce qu’il est, en faisant du bien, en vous dispensant du ciel les pluies et les saisons fertiles, en vous donnant la nourriture avec abondance et en remplissant vos cœurs de joie. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: A peine purent-ils, par ces paroles, empêcher la foule de leur offrir un sacrifice.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Derbe et autres lieux. Retour à Antioche
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 19-28: cf. 2 Ti 3:11, 12. 2 Co 6:4-9. (Ac 13:1-3; 15:3, 4, 12.)'
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors survinrent d’Antioche et d’Icone des Juifs qui gagnèrent la foule, et qui, après avoir '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 11:25
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'lapidé Paul, le traînèrent hors de la ville, pensant qu’il était mort. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais ceux des Juifs qui ne crurent point excitèrent et aigrirent les esprits des païens contre les frères. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais, les disciples l’ayant entouré, il se leva, et entra dans la ville. Le lendemain, il partit pour Derbe avec Barnabas. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand ils eurent évangélisé cette ville et fait un certain nombre de disciples, ils retournèrent à Lystre, à Icone et à Antioche, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fortifiant l’esprit des disciples, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 11:23
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 13:43
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'les exhortant à persévérer dans la foi, et disant '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 10:38
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:24
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 24:26
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ti 3:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'que c’est par beaucoup de tribulations qu’il nous faut entrer dans le royaume de Dieu. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils firent nommer des anciens dans chaque Église, et, après avoir prié et jeûné, ils les recommandèrent au Seigneur, en qui ils avaient cru. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Traversant ensuite la Pisidie, ils vinrent en Pamphylie, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'annoncèrent la parole à Perge, et descendirent à Attalie. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De là ils s’embarquèrent '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 13:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'pour Antioche, d’où ils avaient été recommandés à la grâce de Dieu pour l’œuvre qu’ils venaient d’accomplir. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après leur arrivée, ils convoquèrent l’Église, et ils racontèrent tout ce que Dieu avait fait avec eux, et comment il avait ouvert aux nations la porte de la foi. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et ils demeurèrent assez longtemps avec les disciples.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils restèrent cependant assez longtemps à Icone, parlant avec assurance, appuyés sur le Seigneur, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 16:20
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 19:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 2:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'qui rendait témoignage à la parole de sa grâce et permettait qu’il se fît par leurs mains des prodiges et des miracles. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La population de la ville se divisa: les uns étaient pour les Juifs, les autres pour les apôtres. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et comme les païens et les Juifs, de concert avec leurs chefs, se mettaient en mouvement pour les outrager et les lapider, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Paul et Barnabas, en ayant eu connaissance, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 1:23
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 8:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'se réfugièrent dans les villes de la Lycaonie, à Lystre et à Derbe, et dans la contrée d’alentour. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et ils y annoncèrent la bonne nouvelle.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Lystre: guérison d’un impotent'
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 8-18: cf. Ac 3:1-12; 17:22-31. Jé 10:3-16.'
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A Lystre, se tenait assis un homme '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 3:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'impotent des pieds, boiteux de naissance, et qui n’avait jamais marché. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il écoutait parler Paul. Et Paul, fixant les regards sur lui et voyant qu’il avait la foi pour être guéri, '
