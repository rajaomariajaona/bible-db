document_id: PSA.4,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 2 S 17:15-29. Ps 3; 84:12, 13.
  - type: text
    content: Au chef des chantres. Avec instruments à cordes. Psaume de David.
  '2':
  - type: text
    content: Quand je crie, réponds-moi, Dieu de ma justice!
  - type: text
    content: Quand je suis dans la détresse, sauve-moi!
  - type: text
    content: Aie pitié de moi, écoute ma prière!
  '3':
  - type: text
    content: Fils des hommes, jusques à quand ma gloire sera-t-elle outragée?
  - type: text
    content: Jusques à quand aimerez-vous la vanité,
  - type: text
    content: 'Chercherez-vous le mensonge? '
  - type: text
    content: — Pause.
  '4':
  - type: text
    content: Sachez que l’Éternel s’est choisi un homme pieux;
  - type: text
    content: L’Éternel entend, quand je crie à lui.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Ép 4:26.
  - type: text
    content: Tremblez, et ne péchez point;
  - type: text
    content: 'Parlez en vos cœurs sur votre couche, puis taisez-vous. '
  - type: text
    content: — Pause.
  '6':
  - type: text
    content: 'Offrez '
  - type: note
    content: De 33:19. Ps 51:21.
  - type: text
    content: des sacrifices de justice,
  - type: text
    content: Et confiez-vous à l’Éternel.
  '7':
  - type: text
    content: 'Plusieurs disent: Qui nous fera voir le bonheur?'
  - type: text
    content: Fais lever sur nous la lumière de ta face, ô Éternel!
  '8':
  - type: text
    content: Tu mets dans mon cœur plus de joie qu’ils n’en ont
  - type: text
    content: Quand abondent leur froment et leur moût.
  '9':
  - type: text
    content: ' '
  - type: note
    content: Ps 3:6.
  - type: text
    content: Je me couche et je m’endors en paix,
  - type: text
    content: 'Car toi seul, ô Éternel! '
  - type: note
    content: Lé 26:5. De 12:10; 33:28.
  - type: text
    content: tu me donnes la sécurité dans ma demeure.
