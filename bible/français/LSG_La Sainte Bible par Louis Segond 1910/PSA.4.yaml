document_id: PSA.4,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2 S 17:15-29. Ps 3; 84:12, 13.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au chef des chantres. Avec instruments à cordes. Psaume de David.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand je crie, réponds-moi, Dieu de ma justice!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand je suis dans la détresse, sauve-moi!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aie pitié de moi, écoute ma prière!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fils des hommes, jusques à quand ma gloire sera-t-elle outragée?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jusques à quand aimerez-vous la vanité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Chercherez-vous le mensonge? '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: — Pause.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sachez que l’Éternel s’est choisi un homme pieux;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel entend, quand je crie à lui.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 4:26
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Tremblez, et ne péchez point;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Parlez en vos cœurs sur votre couche, puis taisez-vous. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: — Pause.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Offrez '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 33:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 51:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: des sacrifices de justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et confiez-vous à l’Éternel.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Plusieurs disent: Qui nous fera voir le bonheur?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fais lever sur nous la lumière de ta face, ô Éternel!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu mets dans mon cœur plus de joie qu’ils n’en ont
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand abondent leur froment et leur moût.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 3:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Je me couche et je m’endors en paix,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car toi seul, ô Éternel! '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 26:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 12:10
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 33:28
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: tu me donnes la sécurité dans ma demeure.
