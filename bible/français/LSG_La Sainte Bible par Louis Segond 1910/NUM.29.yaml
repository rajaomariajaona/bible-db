document_id: NUM.29,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-6: cf. (Lé 23:23-25. Né 8:2-12.)'
  - type: text
    content: 'Le septième mois, le premier jour du mois, vous aurez une sainte convocation: vous ne ferez aucune œuvre servile. '
  - type: note
    content: Lé 23:24.
  - type: text
    content: 'Ce jour sera publié parmi vous au son des trompettes. '
  '10':
  - type: text
    content: 'deux dixièmes pour le bélier, et un dixième pour chacun des sept agneaux. '
  '11':
  - type: text
    content: Vous offrirez un bouc en sacrifice d’expiation, outre le sacrifice des expiations, l’holocauste perpétuel et l’offrande, et les libations ordinaires.
  - type: heading
    content: '29 v. 12 à 30 v. 1: cf. (Lé 23:33-43. De 16:13-15.) Né 8:14-18. (Jn 7:2, 14, 37.)'
  '12':
  - type: text
    content: 'Le quinzième jour du septième mois, vous aurez une sainte convocation: vous ne ferez aucune œuvre servile. Vous célébrerez une fête en l’honneur de l’Éternel, pendant sept jours. '
  '13':
  - type: text
    content: 'Vous offrirez en holocauste un sacrifice consumé par le feu, d’une agréable odeur à l’Éternel: treize jeunes taureaux, deux béliers, et quatorze agneaux d’un an sans défaut. '
  '14':
  - type: text
    content: 'Vous y joindrez l’offrande de fleur de farine pétrie à l’huile, trois dixièmes pour chacun des treize taureaux, deux dixièmes pour chacun des deux béliers, '
  '15':
  - type: text
    content: 'et un dixième pour chacun des quatorze agneaux. '
  '16':
  - type: text
    content: 'Vous offrirez un bouc en sacrifice d’expiation, outre l’holocauste perpétuel, l’offrande et la libation. '
  '17':
  - type: text
    content: 'Le second jour, vous offrirez douze jeunes taureaux, deux béliers, et quatorze agneaux d’un an sans défaut, '
  '18':
  - type: text
    content: 'avec l’offrande et les libations pour les taureaux, les béliers et les agneaux, selon leur nombre, d’après les règles établies. '
  '19':
  - type: text
    content: 'Vous offrirez un bouc en sacrifice d’expiation, outre l’holocauste perpétuel, l’offrande et la libation. '
  '2':
  - type: text
    content: 'Vous offrirez en holocauste, d’une agréable odeur à l’Éternel, un jeune taureau, un bélier, et sept agneaux d’un an sans défaut. '
  '20':
  - type: text
    content: 'Le troisième jour, vous offrirez onze taureaux, deux béliers, et quatorze agneaux d’un an sans défaut, '
  '21':
  - type: text
    content: 'avec l’offrande et les libations pour les taureaux, les béliers et les agneaux, selon leur nombre, d’après les règles établies. '
  '22':
  - type: text
    content: 'Vous offrirez un bouc en sacrifice d’expiation, outre l’holocauste perpétuel, l’offrande et la libation. '
  '23':
  - type: text
    content: 'Le quatrième jour, vous offrirez dix taureaux, deux béliers, et quatorze agneaux d’un an sans défaut, '
  '24':
  - type: text
    content: 'avec l’offrande et les libations pour les taureaux, les béliers et les agneaux, selon leur nombre, d’après les règles établies. '
  '25':
  - type: text
    content: 'Vous offrirez un bouc en sacrifice d’expiation, outre l’holocauste perpétuel, l’offrande et la libation. '
  '26':
  - type: text
    content: 'Le cinquième jour, vous offrirez neuf taureaux, deux béliers, et quatorze agneaux d’un an sans défaut, '
  '27':
  - type: text
    content: 'avec l’offrande et les libations pour les taureaux, les béliers et les agneaux selon leur nombre, d’après les règles établies. '
  '28':
  - type: text
    content: 'Vous offrirez un bouc en sacrifice d’expiation, outre l’holocauste perpétuel, l’offrande et la libation. '
  '29':
  - type: text
    content: 'Le sixième jour, vous offrirez huit taureaux, deux béliers et quatorze agneaux d’un an sans défaut, '
  '3':
  - type: text
    content: 'Vous y joindrez l’offrande de fleur de farine pétrie à l’huile, trois dixièmes pour le taureau, deux dixièmes pour le bélier, '
  '30':
  - type: text
    content: 'avec l’offrande et les libations pour les taureaux, les béliers et les agneaux, selon leur nombre, d’après les règles établies. '
  '31':
  - type: text
    content: 'Vous offrirez un bouc en sacrifice d’expiation, outre l’holocauste perpétuel, l’offrande et la libation. '
  '32':
  - type: text
    content: 'Le septième jour, vous offrirez sept taureaux, deux béliers, et quatorze agneaux d’un an sans défaut, '
  '33':
  - type: text
    content: 'avec l’offrande et les libations pour les taureaux, les béliers et les agneaux, selon leur nombre, d’après les règles établies. '
  '34':
  - type: text
    content: 'Vous offrirez un bouc en sacrifice d’expiation, outre l’holocauste perpétuel, l’offrande et la libation. '
  '35':
  - type: text
    content: 'Le huitième jour, '
  - type: note
    content: Lé 23:36.
  - type: text
    content: 'vous aurez une assemblée solennelle: vous ne ferez aucune œuvre servile. '
  '36':
  - type: text
    content: 'Vous offrirez en holocauste un sacrifice consumé par le feu, d’une agréable odeur à l’Éternel: un taureau, un bélier, et sept agneaux d’un an sans défaut, '
  '37':
  - type: text
    content: 'avec l’offrande et les libations pour le taureau, le bélier et les agneaux, selon leur nombre, d’après les règles établies. '
  '38':
  - type: text
    content: 'Vous offrirez un bouc en sacrifice d’expiation, outre l’holocauste perpétuel, l’offrande et la libation. '
  '39':
  - type: text
    content: Tels sont les sacrifices que vous offrirez à l’Éternel dans vos fêtes, outre vos holocaustes, vos offrandes et vos libations, et vos sacrifices de prospérité, en accomplissement d’un vœu ou en offrandes volontaires.
  '4':
  - type: text
    content: 'et un dixième pour chacun des sept agneaux. '
  '5':
  - type: text
    content: 'Vous offrirez un bouc en sacrifice d’expiation, afin de faire pour vous l’expiation. '
  '6':
  - type: text
    content: Vous offrirez ces sacrifices, outre l’holocauste et l’offrande de chaque mois, l’holocauste perpétuel et l’offrande, et les libations qui s’y joignent, d’après les règles établies. Ce sont des sacrifices consumés par le feu, d’une agréable odeur à l’Éternel.
  - type: heading
    content: 'V. 7-11: cf. Lé 16; 23:26-32.'
  '7':
  - type: text
    content: 'Le dixième jour de ce septième mois, '
  - type: note
    content: Lé 16:29, 31; 23:27.
  - type: text
    content: 'vous aurez une sainte convocation, et vous humilierez vos âmes: vous ne ferez aucun ouvrage. '
  '8':
  - type: text
    content: 'Vous offrirez en holocauste, d’une agréable odeur à l’Éternel, un jeune taureau, un bélier, et sept agneaux d’un an '
  - type: note
    content: No 28:19.
  - type: text
    content: 'sans défaut. '
