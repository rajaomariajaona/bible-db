    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Vous offrirez en holocauste, d’une agréable odeur à l’Éternel, un jeune taureau, un bélier, et sept agneaux d’un an sans défaut. '
