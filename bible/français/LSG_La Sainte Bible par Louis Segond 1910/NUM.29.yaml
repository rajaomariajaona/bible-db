  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Le quinzième jour du septième mois, vous aurez une sainte convocation: vous ne ferez aucune œuvre servile. Vous célébrerez une fête en l’honneur de l’Éternel, pendant sept jours. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Vous offrirez en holocauste un sacrifice consumé par le feu, d’une agréable odeur à l’Éternel: treize jeunes taureaux, deux béliers, et quatorze agneaux d’un an sans défaut. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Vous y joindrez l’offrande de fleur de farine pétrie à l’huile, trois dixièmes pour chacun des treize taureaux, deux dixièmes pour chacun des deux béliers, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'et un dixième pour chacun des quatorze agneaux. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Vous offrirez un bouc en sacrifice d’expiation, outre l’holocauste perpétuel, l’offrande et la libation. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Le second jour, vous offrirez douze jeunes taureaux, deux béliers, et quatorze agneaux d’un an sans défaut, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'avec l’offrande et les libations pour les taureaux, les béliers et les agneaux, selon leur nombre, d’après les règles établies. '
  - type: usfm
