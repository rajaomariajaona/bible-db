    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Le septième mois, le premier jour du mois, vous aurez une sainte convocation: vous ne ferez aucune œuvre servile. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 23:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Ce jour sera publié parmi vous au son des trompettes. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'deux dixièmes pour le bélier, et un dixième pour chacun des sept agneaux. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Vous offrirez un bouc en sacrifice d’expiation, outre le sacrifice des expiations, l’holocauste perpétuel et l’offrande, et les libations ordinaires.
  - type: usfm
    marker: r
    children:
    - type: text
      text: '29 v. 12 à 30 v. 1: cf. (Lé 23:33-43. De 16:13-15.) Né 8:14-18. (Jn 7:2, 14, 37.)'
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Le quinzième jour du septième mois, vous aurez une sainte convocation: vous ne ferez aucune œuvre servile. Vous célébrerez une fête en l’honneur de l’Éternel, pendant sept jours. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Vous offrirez en holocauste un sacrifice consumé par le feu, d’une agréable odeur à l’Éternel: treize jeunes taureaux, deux béliers, et quatorze agneaux d’un an sans défaut. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Vous y joindrez l’offrande de fleur de farine pétrie à l’huile, trois dixièmes pour chacun des treize taureaux, deux dixièmes pour chacun des deux béliers, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'et un dixième pour chacun des quatorze agneaux. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Vous offrirez un bouc en sacrifice d’expiation, outre l’holocauste perpétuel, l’offrande et la libation. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Le second jour, vous offrirez douze jeunes taureaux, deux béliers, et quatorze agneaux d’un an sans défaut, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'avec l’offrande et les libations pour les taureaux, les béliers et les agneaux, selon leur nombre, d’après les règles établies. '
