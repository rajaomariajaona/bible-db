    children:
    - type: text
      text: '1'
  - type: text
    text: 'Le septième mois, le premier jour du mois, vous aurez une sainte convocation: vous ne ferez aucune œuvre servile. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 23:24
      metadata:
        usfm: LEV.23.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ce jour sera publié parmi vous au son des trompettes. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Vous offrirez en holocauste, d’une agréable odeur à l’Éternel, un jeune taureau, un bélier, et sept agneaux d’un an sans défaut. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Vous y joindrez l’offrande de fleur de farine pétrie à l’huile, trois dixièmes pour le taureau, deux dixièmes pour le bélier, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'et un dixième pour chacun des sept agneaux. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Vous offrirez un bouc en sacrifice d’expiation, afin de faire pour vous l’expiation. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Vous offrirez ces sacrifices, outre l’holocauste et l’offrande de chaque mois, l’holocauste perpétuel et l’offrande, et les libations qui s’y joignent, d’après les règles établies. Ce sont des sacrifices consumés par le feu, d’une agréable odeur à l’Éternel.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 7-11: cf. Lé 16; 23:26-32.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Le dixième jour de ce septième mois, '
