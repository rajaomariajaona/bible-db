document_id: 2TH.INTRO1,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: INTRODUCTION À LA DEUXIÈME ÉPÎTRE AUX THESSALONICIENS
  - type: usfm
    marker: imt3
    children:
    - type: text
      text: (2 Pi 1:12.)
  - type: usfm
    marker: ip
    children:
    - type: text
      text: En raison des points communs entre les deux épîtres aux Thessaloniciens, il est recommandé au lecteur de se référer à l’introduction de 1 Thessaloniciens pour complément d’information, surtout pour ce qui concerne les questions d’auteur et de destinataire.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'La question fondamentale à l’origine de la rédaction de ces deux épîtres a trait à leur intérêt pour le retour glorieux de Jésus-Christ et ses conséquences, à savoir:'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: '- le jugement prévu pour le jour de sa venue, et'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: '- le sort alors réservé aux méchants et aux justes.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Dans la deuxième épître aux Thessaloniciens, l’intérêt porte, d’entrée de jeu, sur trois grands thèmes: la foi, l’amour et la persévérance au milieu des épreuves et des tribulations (1:3-5). Ces thèmes touchent étroitement le développement des questions que les Thessaloniciens se posent. En effet, les souffrances pour le Royaume de Dieu, et à cause de ce Royaume, produiront un jugement favorable au jour de la venue du Christ pour ceux qui les auront supportées. Voici du reste les grandes articulations de l’épître:'
  - type: usfm
    marker: io1
    children:
    - type: text
      text: '1. Adresse et salutations '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 1:1-2
  - type: usfm
    marker: io1
    children:
    - type: text
      text: '2. Le progrès des Thessaloniciens dans la foi, l’amour et la persévérance '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 1:3-12
  - type: usfm
    marker: io1
    children:
    - type: text
      text: '3. Sur l’avènement du Seigneur '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 2:1-17
  - type: usfm
    marker: io1
    children:
    - type: text
      text: '4. Exhortation à la prière pour le progrès de l’Évangile '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 3:1-15
  - type: usfm
    marker: io1
    children:
    - type: text
      text: '5. Doxologie et salutations finales '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 3:16-18
  - type: usfm
    marker: ip
    children:
    - type: text
      text: L’auteur évite de fixer une date précise pour la fin des temps. Il donne plutôt un éclairage qui permet aux chrétiens de s’y retrouver et de faire preuve de persévérance dans leurs souffrances.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Le message de 2 Thessaloniciens est la suite logique de celui de 1 Thessaloniciens, surtout en ce qui concerne la résurrection et le jour de l’avènement du Seigneur Jésus-Christ. L’apparente contradiction entre '
    - type: usfm
      marker: it
      children:
      - type: text
        text: «… vous savez que le jour du Seigneur viendra comme un voleur dans la nuit»
    - type: text
      text: ' (voir 1 Thess 5:1-3) et '
    - type: usfm
      marker: it
      children:
      - type: text
        text: «Que personne ne vous séduise… car il faut que l’apostasie soit arrivée auparavant…»
    - type: text
      text: ' (voir 2 Thess 2:1-4) s’expliquerait si l’auteur des deux épîtres avait le souci de calmer les esprits de ceux qui croient que le jour du Seigneur est déjà là, empêchant les autres de mener calmement leur vie dans la foi et l’espérance.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Mais on peut aussi supposer que l’enseignement contenu dans la première épître n’ayant pas été bien compris, l’auteur aurait donc rédigé la seconde pour une certaine mise au point. Celle-ci était d’autant plus urgente que les perturbateurs attribuaient à l’apôtre des paroles et des correspondances qui n’étaient pas de lui (2 Thess 2:2).
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Après les encouragements au sujet de la foi dans les épreuves et la persécution, l’auteur parle des préliminaires à l’avènement du Christ, notamment de l’apostat et de l’impie que le Seigneur Jésus détruira du souffle de sa bouche (2:8).
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Trois leçons importantes résument les implications éthiques qui terminent l’épître:'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: – Le chrétien doit demeurer ferme parce que Dieu l’a choisi,
  - type: usfm
    marker: ip
    children:
    - type: text
      text: – le Dieu qui choisit mérite qu’on lui fasse confiance,
  - type: usfm
    marker: ip
    children:
    - type: text
      text: – les chrétiens peuvent donc œuvrer dans la quiétude.
