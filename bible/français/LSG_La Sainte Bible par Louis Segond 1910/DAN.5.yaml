document_id: DAN.5
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Festin de Belschatsar. Chute de l’empire babylonien
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-31: cf. Jg 16:23, etc. Da 4. (És 21:1-10; 47. Jé 50:29-38; 51:27-41, 57.) Lu 12:45-48.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Le roi Belschatsar donna un grand festin à ses grands au nombre de mille, et il but du vin en leur présence. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Belschatsar, quand il eut goûté au vin, fit apporter les vases d’or et d’argent que son père Nebucadnetsar avait enlevés du temple de Jérusalem, afin que le roi et ses grands, ses femmes et ses concubines, s’en servissent pour boire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Alors on apporta les vases d’or qui avaient été enlevés du temple, de la maison de Dieu à Jérusalem; et le roi et ses grands, ses femmes et ses concubines, s’en servirent pour boire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ils burent du vin, et ils louèrent les dieux d’or, d’argent, d’airain, de fer, de bois et de pierre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'En ce moment, apparurent les doigts d’une main d’homme, et ils écrivirent, en face du chandelier, sur la chaux de la muraille du palais royal. Le roi vit cette extrémité de main qui écrivait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Alors le roi changea de couleur, et ses pensées le troublèrent; les jointures de ses reins se relâchèrent, et ses genoux se heurtèrent l’un contre l’autre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Le roi cria avec force qu’on fît venir les astrologues, les Chaldéens et les devins; et le roi prit la parole et dit aux sages de Babylone: Quiconque lira cette écriture et m’en donnera l’explication sera revêtu de pourpre, portera un collier d’or à son cou, et aura la troisième place dans le gouvernement du royaume. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tous les sages du roi entrèrent; mais ils ne purent pas lire l’écriture et en donner au roi l’explication. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Sur quoi le roi Belschatsar, fut très effrayé, il changea de couleur, et ses grands furent consternés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'La reine, à cause des paroles du roi et de ses grands, entra dans la salle du festin, et prit ainsi la parole: O roi, vis éternellement! Que tes pensées ne te troublent pas, et que ton visage ne change pas de couleur! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il y a dans ton royaume un homme qui a en lui l’esprit des dieux saints; et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Da 2:47
      metadata:
        usfm: DAN.2.47
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '48'
      metadata:
        usfm: DAN.2.48
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'du temps de ton père, on trouva chez lui des lumières, de l’intelligence, et une sagesse semblable à la sagesse des dieux. Aussi le roi Nebucadnetsar, ton père, le roi, ton père, l’établit chef des magiciens, des astrologues, des Chaldéens, des devins, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'parce qu’on trouva chez lui, chez Daniel, nommé par le roi Beltschatsar, un esprit supérieur, de la science et de l’intelligence, la faculté d’interpréter les songes, d’expliquer les énigmes, et de résoudre les questions difficiles. Que Daniel soit donc appelé, et il donnera l’explication. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Alors Daniel fut introduit devant le roi. Le roi prit la parole et dit à Daniel: Es-tu ce Daniel, l’un des captifs de Juda, que le roi, mon père, a amenés de Juda? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'J’ai appris sur ton compte que tu as en toi l’esprit des dieux, et qu’on trouve chez toi des lumières, de l’intelligence, et une sagesse extraordinaire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'On vient d’amener devant moi les sages et les astrologues, afin qu’ils lussent cette écriture et m’en donnassent l’explication; mais ils n’ont pas pu donner l’explication des mots. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'J’ai appris que tu peux donner des explications et résoudre des questions difficiles; maintenant, si tu peux lire cette écriture et m’en donner l’explication, tu seras revêtu de pourpre, tu porteras un collier d’or à ton cou, et tu auras la troisième place dans le gouvernement du royaume. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Daniel répondit en présence du roi: Garde tes dons, et accorde à un autre tes présents; je lirai néanmoins l’écriture au roi, et je lui en donnerai l’explication. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'O roi, le Dieu suprême avait donné à Nebucadnetsar, ton père, l’empire, la grandeur, la gloire et la magnificence; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'et à cause de la grandeur qu’il lui avait donnée, tous les peuples, les nations, les hommes de toutes langues étaient dans la crainte et tremblaient devant lui. Le roi faisait mourir ceux qu’il voulait, et il laissait la vie à ceux qu’il voulait; il élevait ceux qu’il voulait, et il abaissait ceux qu’il voulait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Mais lorsque son cœur s’éleva et que son esprit s’endurcit jusqu’à l’arrogance, il fut précipité de son trône royal et dépouillé de sa gloire; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Da 4:25
      metadata:
        usfm: DAN.4.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'il fut chassé du milieu des enfants des hommes, son cœur devint semblable à celui des bêtes, et sa demeure fut avec les ânes sauvages; on lui donna comme aux bœufs de l’herbe à manger, et son corps fut trempé de la rosée du ciel, jusqu’à ce qu’il reconnût que le Dieu suprême domine sur le règne des hommes et qu’il le donne à qui il lui plaît. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Et toi, Belschatsar, son fils, tu n’as pas humilié ton cœur, quoique tu susses toutes ces choses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Tu t’es élevé contre le Seigneur des cieux; les vases de sa maison ont été apportés devant toi, et vous vous en êtes servis pour boire du vin, toi et tes grands, tes femmes et tes concubines; tu as loué les dieux d’argent, d’or, d’airain, de fer, de bois et de pierre, qui ne voient point, qui n’entendent point, et qui ne savent rien, et tu n’as pas glorifié le Dieu qui a dans sa main ton souffle et toutes tes voies. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'C’est pourquoi il a envoyé cette extrémité de main qui a tracé cette écriture. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Voici l’écriture qui a été tracée: Compté, compté, pesé, et divisé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Et voici l’explication de ces mots. Compté: Dieu a compté ton règne, et y a mis fin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Pesé: Tu as été pesé dans la balance, et tu as été trouvé léger. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Divisé: Ton royaume sera divisé, et donné aux Mèdes et aux Perses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Aussitôt Belschatsar donna des ordres, et l’on revêtit Daniel de pourpre, on lui mit au cou un collier d’or, et on publia qu’il aurait la troisième place dans le gouvernement du royaume. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Cette même nuit, Belschatsar, roi des Chaldéens, fut tué. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Et Darius, le Mède, s’empara du royaume, étant âgé de soixante-deux ans.
