document_id: 2CO.6,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Dévouement et fidélité de Paul dans son ministère. Exhortations pressantes aux Corinthiens. Joie de l’apôtre à la nouvelle, apportée par Tite, des heureux effets produits sur eux par sa dernière lettre
  - type: heading
    content: 'V. 1-10: cf. 2 Co 5:18-21. (1 Th 2:1-13. 2 Ti 3:10, 11. 2 Co 11:23-30. Ac 20:18-35.)'
  - type: text
    content: 'Puisque nous '
  - type: note
    content: 1 Co 3:9.
  - type: text
    content: 'travaillons avec Dieu, nous vous exhortons à '
  - type: note
    content: Hé 12:15.
  - type: text
    content: 'ne pas recevoir la grâce de Dieu en vain. '
  '10':
  - type: text
    content: comme attristés, et nous sommes toujours joyeux; comme pauvres, et nous en enrichissons plusieurs; comme n’ayant rien, et nous possédons toutes choses.
  - type: heading
    content: 'V. 11-13: cf. Ph 1:8. 1 Th 5:12, 13.'
  '11':
  - type: text
    content: 'Notre bouche s’est ouverte pour vous, Corinthiens, notre cœur s’est élargi. '
  '12':
  - type: text
    content: 'Vous n’êtes point à l’étroit au-dedans de nous; mais vos entrailles se sont rétrécies. '
  '13':
  - type: text
    content: 'Rendez-nous la pareille, je vous '
  - type: note
    content: 1 Co 4:14.
  - type: text
    content: parle comme à mes enfants, élargissez-vous aussi!
  - type: heading
    content: '6 v. 14 à 7 v. 1: cf. 1 Co 10:14-22. Ép 5:5-11. Ap 18:4. 1 Pi 2:9-12.'
  '14':
  - type: text
    content: ' '
  - type: note
    content: De 7:2. 1 Co 5:9.
  - type: text
    content: 'Ne vous mettez pas avec les infidèles sous un joug étranger. '
  - type: note
    content: 1 S 5:1, 2. 1 R 8:21. 1 Co 10:21. Ép 5:11.
  - type: text
    content: 'Car quel rapport y a-t-il entre la justice et l’iniquité? Ou qu’y a-t-il de commun entre la lumière et les ténèbres? '
  '15':
  - type: text
    content: 'Quel accord y a-t-il entre Christ et Bélial? Ou quelle part a le fidèle avec l’infidèle? '
  '16':
  - type: text
    content: 'Quel rapport y a-t-il entre le temple de Dieu '
  - type: note
    content: 1 Co 10:7, 14.
  - type: text
    content: 'et les idoles? '
  - type: note
    content: 1 Co 3:16; 6:19. Ép 2:21. Hé 3:6. 1 Pi 2:5.
  - type: text
    content: 'Car nous sommes le temple du Dieu vivant, comme Dieu l’a dit: '
  - type: note
    content: Ex 29:45. Lé 26:11. Éz 37:26.
  - type: text
    content: 'J’habiterai et je marcherai au milieu d’eux; je serai leur Dieu, et ils seront mon peuple. '
  '17':
  - type: text
    content: C’est pourquoi,
  - type: note
    content: És 52:11. Ap 18:4.
  - type: text
    content: Sortez du milieu d’eux,
  - type: text
    content: et séparez-vous, dit le Seigneur;
  - type: text
    content: ne touchez pas à ce qui est impur,
  - type: text
    content: et je vous accueillerai.
  '18':
  - type: text
    content: ' '
  - type: note
    content: Jé 31:1.
  - type: text
    content: Je serai pour vous un père,
  - type: text
    content: Et vous serez pour moi des fils et des filles,
  - type: text
    content: Dit le Seigneur tout-puissant.
  '2':
  - type: note
    content: És 49:8.
  - type: text
    content: 'Car il dit:'
  - type: text
    content: Au temps favorable je t’ai exaucé,
  - type: text
    content: au jour du salut je t’ai secouru.
  - type: text
    content: 'Voici maintenant le temps favorable, voici maintenant le jour du salut. '
  '3':
  - type: note
    content: Ro 14:13. 1 Co 10:32.
  - type: text
    content: 'Nous ne donnons aucun sujet de scandale en quoi que ce soit, afin que le ministère ne soit pas un objet de blâme. '
  '4':
  - type: text
    content: 'Mais nous nous rendons à tous égards recommandables, '
  - type: note
    content: 2 Co 4:1.
  - type: text
    content: 'comme serviteurs de Dieu, '
  - type: note
    content: 2 Co 11:23.
  - type: text
    content: 'par beaucoup de patience dans les tribulations, dans les calamités, dans les détresses, '
  '5':
  - type: text
    content: 'sous les coups, dans les prisons, dans les troubles, dans les travaux, dans les veilles, dans les jeûnes; '
  '6':
  - type: text
    content: 'par la pureté, par la connaissance, par la longanimité, par la bonté, par un esprit saint, par une charité sincère, '
  '7':
  - type: text
    content: 'par la parole de vérité, par la puissance de Dieu, par les armes offensives et défensives de la justice; '
  '8':
  - type: text
    content: 'au milieu de la gloire et de l’ignominie, au milieu de la mauvaise et de la bonne réputation; étant regardés comme imposteurs, quoique véridiques; '
  '9':
  - type: text
    content: 'comme inconnus, quoique bien connus; '
  - type: note
    content: Ps 118:18. És 26:19.
  - type: text
    content: 'comme mourants, et voici nous vivons; comme châtiés, quoique non mis à mort; '
