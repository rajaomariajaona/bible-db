document_id: 2CO.6,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dévouement et fidélité de Paul dans son ministère. Exhortations pressantes aux Corinthiens. Joie de l’apôtre à la nouvelle, apportée par Tite, des heureux effets produits sur eux par sa dernière lettre
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-10: cf. 2 Co 5:18-21. (1 Th 2:1-13. 2 Ti 3:10, 11. 2 Co 11:23-30. Ac 20:18-35.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puisque nous '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 3:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'travaillons avec Dieu, nous vous exhortons à '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 12:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'ne pas recevoir la grâce de Dieu en vain. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme attristés, et nous sommes toujours joyeux; comme pauvres, et nous en enrichissons plusieurs; comme n’ayant rien, et nous possédons toutes choses.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 11-13: cf. Ph 1:8. 1 Th 5:12, 13.'
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Notre bouche s’est ouverte pour vous, Corinthiens, notre cœur s’est élargi. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous n’êtes point à l’étroit au-dedans de nous; mais vos entrailles se sont rétrécies. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rendez-nous la pareille, je vous '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 4:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: parle comme à mes enfants, élargissez-vous aussi!
  - type: usfm
    marker: r
    children:
    - type: text
      text: '6 v. 14 à 7 v. 1: cf. 1 Co 10:14-22. Ép 5:5-11. Ap 18:4. 1 Pi 2:9-12.'
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 7:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 5:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Ne vous mettez pas avec les infidèles sous un joug étranger. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 5:1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 8:21
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 10:21
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 5:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Car quel rapport y a-t-il entre la justice et l’iniquité? Ou qu’y a-t-il de commun entre la lumière et les ténèbres? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quel accord y a-t-il entre Christ et Bélial? Ou quelle part a le fidèle avec l’infidèle? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quel rapport y a-t-il entre le temple de Dieu '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 10:7
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'et les idoles? '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 3:16
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 2:21
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 3:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 2:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Car nous sommes le temple du Dieu vivant, comme Dieu l’a dit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 29:45
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 26:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 37:26
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'J’habiterai et je marcherai au milieu d’eux; je serai leur Dieu, et ils seront mon peuple. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: C’est pourquoi,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 52:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 18:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Sortez du milieu d’eux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et séparez-vous, dit le Seigneur;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne touchez pas à ce qui est impur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je vous accueillerai.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 31:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Je serai pour vous un père,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et vous serez pour moi des fils et des filles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit le Seigneur tout-puissant.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 49:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Car il dit:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au temps favorable je t’ai exaucé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au jour du salut je t’ai secouru.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici maintenant le temps favorable, voici maintenant le jour du salut. '
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 14:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 10:32
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Nous ne donnons aucun sujet de scandale en quoi que ce soit, afin que le ministère ne soit pas un objet de blâme. '
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mais nous nous rendons à tous égards recommandables, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 4:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'comme serviteurs de Dieu, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 11:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'par beaucoup de patience dans les tribulations, dans les calamités, dans les détresses, '
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'sous les coups, dans les prisons, dans les troubles, dans les travaux, dans les veilles, dans les jeûnes; '
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'par la pureté, par la connaissance, par la longanimité, par la bonté, par un esprit saint, par une charité sincère, '
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'par la parole de vérité, par la puissance de Dieu, par les armes offensives et défensives de la justice; '
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'au milieu de la gloire et de l’ignominie, au milieu de la mauvaise et de la bonne réputation; étant regardés comme imposteurs, quoique véridiques; '
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'comme inconnus, quoique bien connus; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 118:18
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 26:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'comme mourants, et voici nous vivons; comme châtiés, quoique non mis à mort; '
