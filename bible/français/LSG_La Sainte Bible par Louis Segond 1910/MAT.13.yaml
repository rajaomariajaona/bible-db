document_id: MAT.13,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Paraboles du semeur, — de l’ivraie, — du grain de sénevé, — du levain, — du trésor caché, — de la perle, — du filet
  - type: heading
    content: 'V. 1-23: cf. (Mc 4:1-20. Lu 8:4-15.) 1 Co 3:9.'
  - type: text
    content: ' '
  - type: note
    content: Mc 4:1. Lu 8:4, 5.
  - type: text
    content: 'Ce même jour, Jésus sortit de la maison, et s’assit au bord de la mer. '
  '10':
  - type: note
    content: Mc 4:10. Lu 8:9.
  - type: text
    content: 'Les disciples s’approchèrent, et lui dirent: Pourquoi leur parles-tu en paraboles? '
  '11':
  - type: text
    content: 'Jésus leur répondit: '
  - type: note
    content: 2 Co 3:14.
  - type: text
    content: Parce qu’il vous a été donné de connaître les mystères du royaume des cieux, et
  - type: text
    content: ' '
  - type: note
    content: Mt 11:25.
  - type: text
    content: que cela ne leur a pas été donné.
  '12':
  - type: text
    content: ' '
  - type: note
    content: Mt 25:29. Mc 4:24, 25. Lu 8:18; 19:26.
  - type: text
    content: Car on donnera à celui qui a, et il sera dans l’abondance, mais à celui qui n’a pas on ôtera même ce qu’il a.
  - type: text
    content: ' '
  '13':
  - type: text
    content: C’est pourquoi je leur parle en paraboles, parce qu’en voyant ils ne voient point, et qu’en entendant ils n’entendent ni ne comprennent.
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'Et pour eux s’accomplit cette prophétie d’Ésaïe:'
  - type: note
    content: És 6:9. Mc 4:12. Lu 8:10. Jn 12:40. Ac 28:26. Ro 11:8.
  - type: text
    content: Vous entendrez de vos oreilles, et vous ne comprendrez point;
  - type: text
    content: Vous regarderez de vos yeux, et vous ne verrez point.
  - type: text
    content: ' '
  '15':
  - type: text
    content: Car le cœur de ce peuple est devenu insensible;
  - type: text
    content: Ils ont endurci leurs oreilles, et ils ont fermé leurs yeux,
  - type: text
    content: De peur qu’ils ne voient de leurs yeux, qu’ils n’entendent de leurs oreilles,
  - type: text
    content: Qu’ils ne comprennent de leur cœur,
  - type: text
    content: Qu’ils ne se convertissent, et que je ne les guérisse.
  '16':
  - type: text
    content: ' '
  - type: note
    content: Lu 10:23. Jn 20:29. 1 Pi 1:8.
  - type: text
    content: Mais heureux sont vos yeux, parce qu’ils voient, et vos oreilles, parce qu’elles entendent!
  - type: text
    content: ' '
  '17':
  - type: text
    content: Je vous le dis en vérité,
  - type: text
    content: ' '
  - type: note
    content: 1 Pi 1:10.
  - type: text
    content: beaucoup de prophètes et de justes ont désiré voir ce que vous voyez, et ne l’ont pas vu, entendre ce que vous entendez, et ne l’ont pas entendu.
  - type: text
    content: ' '
  '18':
  - type: note
    content: Mc 4:13. Lu 8:11.
  - type: text
    content: Vous donc, écoutez ce que signifie la parabole du semeur.
  - type: text
    content: ' '
  '19':
  - type: text
    content: Lorsqu’un homme écoute la parole du
  - type: text
    content: ' '
  - type: note
    content: Mt 4:23.
  - type: text
    content: 'royaume et ne la comprend pas, le malin vient et enlève ce qui a été semé dans son cœur: cet homme est celui qui a reçu la semence le long du chemin.'
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Une grande foule s’étant assemblée auprès de lui, il monta '
  - type: note
    content: Lu 5:3.
  - type: text
    content: 'dans une barque, et il s’assit. Toute la foule se tenait sur le rivage. '
  '20':
  - type: text
    content: Celui qui a reçu la semence dans les endroits pierreux, c’est celui qui entend la parole et la reçoit aussitôt avec joie;
  - type: text
    content: ' '
  '21':
  - type: text
    content: mais il n’a pas de racines en lui-même, il manque de persistance, et, dès que survient une tribulation ou une persécution à cause de la parole, il y trouve une occasion de chute.
  - type: text
    content: ' '
  '22':
  - type: note
    content: Mt 19:23. Mc 10:23. Lu 18:24. 1 Ti 6:9.
  - type: text
    content: Celui qui a reçu la semence parmi les épines, c’est celui qui entend la parole, mais en qui les soucis du siècle et la séduction des richesses étouffent cette parole, et la rendent infructueuse.
  - type: text
    content: ' '
  '23':
  - type: text
    content: Celui qui a reçu la semence dans la bonne terre, c’est celui qui entend la parole et la comprend; il porte du fruit, et un grain en donne cent, un autre soixante, un autre trente.
  - type: heading
    content: 'V. 24-30: cf. v. 36-43, 47-50. 1 Co 3:9; 4:5.'
  '24':
  - type: text
    content: 'Il leur proposa une autre parabole, et il dit: '
  - type: text
    content: Le royaume des cieux est semblable à un homme qui a semé une bonne semence dans son champ.
  - type: text
    content: ' '
  '25':
  - type: text
    content: Mais, pendant que les gens dormaient, son ennemi vint, sema de l’ivraie parmi le blé, et s’en alla.
  - type: text
    content: ' '
  '26':
  - type: text
    content: Lorsque l’herbe eut poussé et donné du fruit, l’ivraie parut aussi.
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'Les serviteurs du maître de la maison vinrent lui dire: Seigneur, n’as-tu pas semé une bonne semence dans ton champ? D’où vient donc qu’il y a de l’ivraie?'
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'Il leur répondit: C’est un ennemi qui a fait cela. Et les serviteurs lui dirent: Veux-tu que nous allions l’arracher?'
  - type: text
    content: ' '
  '29':
  - type: text
    content: Non, dit-il, de peur qu’en arrachant l’ivraie, vous ne déraciniez en même temps le blé.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Il leur parla en paraboles sur beaucoup de choses, et il dit:'
  '30':
  - type: text
    content: 'Laissez croître ensemble l’un et l’autre jusqu’à la moisson, et, à l’époque de la moisson, je dirai aux moissonneurs: Arrachez d’abord l’ivraie, et liez-la en gerbes pour la brûler,'
  - type: text
    content: ' '
  - type: note
    content: Mt 3:12.
  - type: text
    content: mais amassez le blé dans mon grenier.
  - type: heading
    content: 'V. 31-35: cf. (Mc 4:30-34. Lu 13:18-21.) Da 2:34, 35. Éz 47:1-9. Za 4:10.'
  '31':
  - type: text
    content: 'Il leur proposa une autre parabole, et il dit: '
  - type: note
    content: Mc 4:30. Lu 13:18.
  - type: text
    content: Le royaume des cieux est semblable à un grain de sénevé qu’un homme a pris et semé dans son champ.
  '32':
  - type: text
    content: ' '
  - type: text
    content: C’est la plus petite de toutes les semences; mais, quand il a poussé, il est plus grand que les légumes et devient un arbre, de sorte que les oiseaux du ciel viennent habiter dans ses branches.
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'Il leur dit cette autre parabole: '
  - type: note
    content: Lu 13:20, 21.
  - type: text
    content: Le royaume des cieux est semblable à du levain qu’une femme a pris et mis dans trois mesures de farine, jusqu’à ce que la pâte soit toute levée.
  - type: text
    content: ' '
  '34':
  - type: note
    content: Mc 4:33.
  - type: text
    content: 'Jésus dit à la foule toutes ces choses en paraboles, et il ne lui parlait point sans parabole, '
  '35':
  - type: text
    content: 'afin que s’accomplît ce qui avait été annoncé par le prophète:'
  - type: note
    content: Ps 78:2.
  - type: text
    content: J’ouvrirai ma bouche en paraboles,
  - type: text
    content: Je publierai des choses cachées depuis la création du monde.
  - type: heading
    content: 'V. 36-43: cf. v. 24-30, 47-50.'
  '36':
  - type: text
    content: 'Alors il renvoya la foule, et entra dans la maison. Ses disciples s’approchèrent de lui, et dirent: Explique-nous la parabole de l’ivraie du champ. '
  '37':
  - type: text
    content: 'Il répondit: '
  - type: text
    content: Celui qui sème la bonne semence, c’est le Fils de l’homme;
  '38':
  - type: text
    content: ' '
  - type: text
    content: le champ, c’est le monde; la bonne semence, ce sont les fils du royaume; l’ivraie, ce sont les fils du malin;
  - type: text
    content: ' '
  '39':
  - type: text
    content: l’ennemi qui l’a semée, c’est le diable;
  - type: text
    content: ' '
  - type: note
    content: Joë 3:13. Ap 14:15.
  - type: text
    content: la moisson, c’est la fin du monde; les moissonneurs, ce sont les anges.
  - type: text
    content: ' '
  '4':
  - type: text
    content: ' '
  - type: text
    content: 'Un semeur sortit pour semer. Comme il semait, une partie de la semence tomba le long du chemin: les oiseaux vinrent, et la mangèrent.'
  - type: text
    content: ' '
  '40':
  - type: text
    content: Or, comme on arrache l’ivraie et qu’on la jette au feu, il en sera de même à la fin du monde.
  - type: text
    content: ' '
  '41':
  - type: text
    content: 'Le Fils de l’homme enverra ses anges, qui arracheront de son royaume tous les scandales et ceux qui commettent l’iniquité:'
  - type: text
    content: ' '
  '42':
  - type: text
    content: et ils les jetteront dans la fournaise ardente,
  - type: text
    content: ' '
  - type: note
    content: Mt 8:12; 22:13; 24:51; 25:30. Lu 13:28.
  - type: text
    content: où il y aura des pleurs et des grincements de dents.
  - type: text
    content: ' '
  '43':
  - type: note
    content: Da 12:3. 1 Co 15:42.
  - type: text
    content: Alors les justes resplendiront comme le soleil dans le royaume de leur Père. Que celui qui a des oreilles pour entendre entende.
  - type: heading
    content: 'V. 44-46: cf. Ph 3:7-11. Hé 11:24-26.'
  '44':
  - type: text
    content: ' '
  - type: text
    content: Le royaume des cieux est encore semblable à un trésor caché dans un champ. L’homme qui l’a trouvé le cache; et, dans sa joie,
  - type: text
    content: ' '
  - type: note
    content: Ph 3:7.
  - type: text
    content: il va vendre tout ce qu’il a, et achète ce champ.
  - type: text
    content: ' '
  '45':
  - type: text
    content: Le royaume des cieux est encore semblable à un marchand qui cherche de belles perles.
  - type: text
    content: ' '
  '46':
  - type: text
    content: Il a trouvé une perle de grand prix; et il est allé vendre tout ce qu’il avait, et l’a achetée.
  - type: heading
    content: 'V. 47-52: cf. v. 24-30, 36-43.'
  '47':
  - type: text
    content: ' '
  - type: text
    content: Le royaume des cieux est encore semblable à un filet jeté dans la mer et ramassant des poissons de toute espèce.
  - type: text
    content: ' '
  '48':
  - type: text
    content: Quand il est rempli, les pêcheurs le tirent; et, après s’être assis sur le rivage, ils mettent dans des vases ce qui est bon, et ils jettent ce qui est mauvais.
  - type: text
    content: ' '
  '49':
  - type: text
    content: Il en sera de même à la fin du monde. Les anges viendront séparer les méchants d’avec les justes,
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'Une autre partie tomba dans les endroits pierreux, où elle n’avait pas beaucoup de terre: elle leva aussitôt, parce qu’elle ne trouva pas un sol profond;'
  - type: text
    content: ' '
  '50':
  - type: text
    content: et ils les jetteront dans la fournaise ardente,
  - type: text
    content: ' '
  - type: note
    content: v. 42.
  - type: text
    content: où il y aura des pleurs et des grincements de dents.
  - type: text
    content: ' '
  '51':
  - type: text
    content: Avez-vous compris toutes ces choses?
  - type: text
    content: ' Oui, répondirent-ils. '
  '52':
  - type: text
    content: 'Et il leur dit: '
  - type: text
    content: C’est pourquoi, tout scribe instruit de ce qui regarde le royaume des cieux est semblable à un maître de maison qui tire de son trésor des choses nouvelles et des choses anciennes.
  - type: heading
    content: Jésus à Nazareth. Incrédulité des habitants
  - type: heading
    content: 'V. 53-58: cf. Mc 6:1-6. (Lu 4:16-30.) Jn 1:11.'
  '53':
  - type: text
    content: ' '
  - type: note
    content: Mc 6:1. Lu 4:16.
  - type: text
    content: 'Lorsque Jésus eut achevé ces paraboles, il partit de là. '
  '54':
  - type: text
    content: 'S’étant rendu dans sa patrie, il enseignait dans la synagogue, de sorte que ceux qui l’entendirent étaient étonnés et disaient: '
  - type: note
    content: Mc 6:2.
  - type: text
    content: 'D’où lui viennent cette sagesse et ces miracles? '
  '55':
  - type: note
    content: Jn 6:42.
  - type: text
    content: 'N’est-ce pas le fils du charpentier? N’est-ce pas Marie qui est sa mère? Jacques, Joseph, Simon et Jude, ne sont-ils pas ses frères? '
  '56':
  - type: text
    content: 'et ses sœurs ne sont-elles pas toutes parmi nous? D’où lui viennent donc toutes ces choses? '
  '57':
  - type: text
    content: 'Et il était pour eux une occasion de chute. Mais Jésus leur dit: '
  - type: note
    content: Mc 6:4. Lu 4:24. Jn 4:44.
  - type: text
    content: Un prophète n’est méprisé que dans sa patrie et dans sa maison.
  - type: text
    content: ' '
  '58':
  - type: text
    content: Et il ne fit pas beaucoup de miracles dans ce lieu, à cause de leur incrédulité.
  '6':
  - type: text
    content: mais, quand le soleil parut, elle fut brûlée et sécha, faute de racines.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'Une autre partie tomba parmi les épines: les épines montèrent, et l’étouffèrent.'
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'Une autre partie tomba dans la bonne terre: elle donna du fruit, un grain cent, un autre soixante, un autre trente.'
  - type: text
    content: ' '
  '9':
  - type: text
    content: Que celui qui a des oreilles pour entendre entende.
  - type: text
    content: ' '
