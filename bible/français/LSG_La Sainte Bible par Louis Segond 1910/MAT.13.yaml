document_id: MAT.13
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paraboles du semeur, — de l’ivraie, — du grain de sénevé, — du levain, — du trésor caché, — de la perle, — du filet
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-23: cf. (Mc 4:1-20. Lu 8:4-15.) 1 Co 3:9.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 4:1
      metadata:
        usfm: MRK.4.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 8:4
      metadata:
        usfm: LUK.8.4
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '5'
      metadata:
        usfm: LUK.8.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ce même jour, Jésus sortit de la maison, et s’assit au bord de la mer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Une grande foule s’étant assemblée auprès de lui, il monta '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 5:3
      metadata:
        usfm: LUK.5.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'dans une barque, et il s’assit. Toute la foule se tenait sur le rivage. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il leur parla en paraboles sur beaucoup de choses, et il dit:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Un semeur sortit pour semer. Comme il semait, une partie de la semence tomba le long du chemin: les oiseaux vinrent, et la mangèrent.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Une autre partie tomba dans les endroits pierreux, où elle n’avait pas beaucoup de terre: elle leva aussitôt, parce qu’elle ne trouva pas un sol profond;'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: mais, quand le soleil parut, elle fut brûlée et sécha, faute de racines.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Une autre partie tomba parmi les épines: les épines montèrent, et l’étouffèrent.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Une autre partie tomba dans la bonne terre: elle donna du fruit, un grain cent, un autre soixante, un autre trente.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Que celui qui a des oreilles pour entendre entende.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 4:10
      metadata:
        usfm: MRK.4.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 8:9
      metadata:
        usfm: LUK.8.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Les disciples s’approchèrent, et lui dirent: Pourquoi leur parles-tu en paraboles? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Jésus leur répondit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 3:14
      metadata:
        usfm: 2CO.3.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Parce qu’il vous a été donné de connaître les mystères du royaume des cieux, et
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 11:25
      metadata:
        usfm: MAT.11.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: que cela ne leur a pas été donné.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 25:29
      metadata:
        usfm: MAT.25.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 4:24
      metadata:
        usfm: MRK.4.24
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '25'
      metadata:
        usfm: MRK.4.25
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 8:18
      metadata:
        usfm: LUK.8.18
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 19:26
      metadata:
        usfm: LUK.19.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Car on donnera à celui qui a, et il sera dans l’abondance, mais à celui qui n’a pas on ôtera même ce qu’il a.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: C’est pourquoi je leur parle en paraboles, parce qu’en voyant ils ne voient point, et qu’en entendant ils n’entendent ni ne comprennent.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Et pour eux s’accomplit cette prophétie d’Ésaïe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 6:9
      metadata:
        usfm: ISA.6.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 4:12
      metadata:
        usfm: MRK.4.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 8:10
      metadata:
        usfm: LUK.8.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 12:40
      metadata:
        usfm: JHN.12.40
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 28:26
      metadata:
        usfm: ACT.28.26
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 11:8
      metadata:
        usfm: ROM.11.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Vous entendrez de vos oreilles, et vous ne comprendrez point;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Vous regarderez de vos yeux, et vous ne verrez point.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Car le cœur de ce peuple est devenu insensible;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ils ont endurci leurs oreilles, et ils ont fermé leurs yeux,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: De peur qu’ils ne voient de leurs yeux, qu’ils n’entendent de leurs oreilles,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Qu’ils ne comprennent de leur cœur,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Qu’ils ne se convertissent, et que je ne les guérisse.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 10:23
      metadata:
        usfm: LUK.10.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 20:29
      metadata:
        usfm: JHN.20.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 1:8
      metadata:
        usfm: 1PE.1.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais heureux sont vos yeux, parce qu’ils voient, et vos oreilles, parce qu’elles entendent!
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je vous le dis en vérité,
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 1:10
      metadata:
        usfm: 1PE.1.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: beaucoup de prophètes et de justes ont désiré voir ce que vous voyez, et ne l’ont pas vu, entendre ce que vous entendez, et ne l’ont pas entendu.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 4:13
      metadata:
        usfm: MRK.4.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 8:11
      metadata:
        usfm: LUK.8.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Vous donc, écoutez ce que signifie la parabole du semeur.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Lorsqu’un homme écoute la parole du
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 4:23
      metadata:
        usfm: MAT.4.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'royaume et ne la comprend pas, le malin vient et enlève ce qui a été semé dans son cœur: cet homme est celui qui a reçu la semence le long du chemin.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Celui qui a reçu la semence dans les endroits pierreux, c’est celui qui entend la parole et la reçoit aussitôt avec joie;
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: mais il n’a pas de racines en lui-même, il manque de persistance, et, dès que survient une tribulation ou une persécution à cause de la parole, il y trouve une occasion de chute.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 19:23
      metadata:
        usfm: MAT.19.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 10:23
      metadata:
        usfm: MRK.10.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 18:24
      metadata:
        usfm: LUK.18.24
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 6:9
      metadata:
        usfm: 1TI.6.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Celui qui a reçu la semence parmi les épines, c’est celui qui entend la parole, mais en qui les soucis du siècle et la séduction des richesses étouffent cette parole, et la rendent infructueuse.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Celui qui a reçu la semence dans la bonne terre, c’est celui qui entend la parole et la comprend; il porte du fruit, et un grain en donne cent, un autre soixante, un autre trente.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 24-30: cf. v. 36-43, 47-50. 1 Co 3:9; 4:5.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Il leur proposa une autre parabole, et il dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Le royaume des cieux est semblable à un homme qui a semé une bonne semence dans son champ.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais, pendant que les gens dormaient, son ennemi vint, sema de l’ivraie parmi le blé, et s’en alla.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Lorsque l’herbe eut poussé et donné du fruit, l’ivraie parut aussi.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Les serviteurs du maître de la maison vinrent lui dire: Seigneur, n’as-tu pas semé une bonne semence dans ton champ? D’où vient donc qu’il y a de l’ivraie?'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Il leur répondit: C’est un ennemi qui a fait cela. Et les serviteurs lui dirent: Veux-tu que nous allions l’arracher?'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Non, dit-il, de peur qu’en arrachant l’ivraie, vous ne déraciniez en même temps le blé.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Laissez croître ensemble l’un et l’autre jusqu’à la moisson, et, à l’époque de la moisson, je dirai aux moissonneurs: Arrachez d’abord l’ivraie, et liez-la en gerbes pour la brûler,'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 3:12
      metadata:
        usfm: MAT.3.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: mais amassez le blé dans mon grenier.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 31-35: cf. (Mc 4:30-34. Lu 13:18-21.) Da 2:34, 35. Éz 47:1-9. Za 4:10.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Il leur proposa une autre parabole, et il dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 4:30
      metadata:
        usfm: MRK.4.30
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 13:18
      metadata:
        usfm: LUK.13.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Le royaume des cieux est semblable à un grain de sénevé qu’un homme a pris et semé dans son champ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: C’est la plus petite de toutes les semences; mais, quand il a poussé, il est plus grand que les légumes et devient un arbre, de sorte que les oiseaux du ciel viennent habiter dans ses branches.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Il leur dit cette autre parabole: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 13:20
      metadata:
        usfm: LUK.13.20
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '21'
      metadata:
        usfm: LUK.13.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Le royaume des cieux est semblable à du levain qu’une femme a pris et mis dans trois mesures de farine, jusqu’à ce que la pâte soit toute levée.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 4:33
      metadata:
        usfm: MRK.4.33
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Jésus dit à la foule toutes ces choses en paraboles, et il ne lui parlait point sans parabole, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'afin que s’accomplît ce qui avait été annoncé par le prophète:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 78:2
      metadata:
        usfm: PSA.78.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: J’ouvrirai ma bouche en paraboles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je publierai des choses cachées depuis la création du monde.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 36-43: cf. v. 24-30, 47-50.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Alors il renvoya la foule, et entra dans la maison. Ses disciples s’approchèrent de lui, et dirent: Explique-nous la parabole de l’ivraie du champ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Il répondit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Celui qui sème la bonne semence, c’est le Fils de l’homme;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: le champ, c’est le monde; la bonne semence, ce sont les fils du royaume; l’ivraie, ce sont les fils du malin;
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: l’ennemi qui l’a semée, c’est le diable;
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Joë 3:13
      metadata:
        usfm: JOL.3.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 14:15
      metadata:
        usfm: REV.14.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: la moisson, c’est la fin du monde; les moissonneurs, ce sont les anges.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Or, comme on arrache l’ivraie et qu’on la jette au feu, il en sera de même à la fin du monde.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Le Fils de l’homme enverra ses anges, qui arracheront de son royaume tous les scandales et ceux qui commettent l’iniquité:'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: et ils les jetteront dans la fournaise ardente,
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 8:12
      metadata:
        usfm: MAT.8.12
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 22:13
      metadata:
        usfm: MAT.22.13
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 24:51
      metadata:
        usfm: MAT.24.51
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 25:30
      metadata:
        usfm: MAT.25.30
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 13:28
      metadata:
        usfm: LUK.13.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: où il y aura des pleurs et des grincements de dents.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Da 12:3
      metadata:
        usfm: DAN.12.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 15:42
      metadata:
        usfm: 1CO.15.42
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Alors les justes resplendiront comme le soleil dans le royaume de leur Père. Que celui qui a des oreilles pour entendre entende.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 44-46: cf. Ph 3:7-11. Hé 11:24-26.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Le royaume des cieux est encore semblable à un trésor caché dans un champ. L’homme qui l’a trouvé le cache; et, dans sa joie,
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 3:7
      metadata:
        usfm: PHP.3.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: il va vendre tout ce qu’il a, et achète ce champ.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Le royaume des cieux est encore semblable à un marchand qui cherche de belles perles.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Il a trouvé une perle de grand prix; et il est allé vendre tout ce qu’il avait, et l’a achetée.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 47-52: cf. v. 24-30, 36-43.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Le royaume des cieux est encore semblable à un filet jeté dans la mer et ramassant des poissons de toute espèce.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Quand il est rempli, les pêcheurs le tirent; et, après s’être assis sur le rivage, ils mettent dans des vases ce qui est bon, et ils jettent ce qui est mauvais.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Il en sera de même à la fin du monde. Les anges viendront séparer les méchants d’avec les justes,
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: et ils les jetteront dans la fournaise ardente,
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: v. 42.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: où il y aura des pleurs et des grincements de dents.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Avez-vous compris toutes ces choses?
  - type: text
    text: ' Oui, répondirent-ils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Et il leur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: C’est pourquoi, tout scribe instruit de ce qui regarde le royaume des cieux est semblable à un maître de maison qui tire de son trésor des choses nouvelles et des choses anciennes.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus à Nazareth. Incrédulité des habitants
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 53-58: cf. Mc 6:1-6. (Lu 4:16-30.) Jn 1:11.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 6:1
      metadata:
        usfm: MRK.6.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 4:16
      metadata:
        usfm: LUK.4.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Lorsque Jésus eut achevé ces paraboles, il partit de là. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'S’étant rendu dans sa patrie, il enseignait dans la synagogue, de sorte que ceux qui l’entendirent étaient étonnés et disaient: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 6:2
      metadata:
        usfm: MRK.6.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'D’où lui viennent cette sagesse et ces miracles? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 6:42
      metadata:
        usfm: JHN.6.42
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'N’est-ce pas le fils du charpentier? N’est-ce pas Marie qui est sa mère? Jacques, Joseph, Simon et Jude, ne sont-ils pas ses frères? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'et ses sœurs ne sont-elles pas toutes parmi nous? D’où lui viennent donc toutes ces choses? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Et il était pour eux une occasion de chute. Mais Jésus leur dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 6:4
      metadata:
        usfm: MRK.6.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 4:24
      metadata:
        usfm: LUK.4.24
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 4:44
      metadata:
        usfm: JHN.4.44
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Un prophète n’est méprisé que dans sa patrie et dans sa maison.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: Et il ne fit pas beaucoup de miracles dans ce lieu, à cause de leur incrédulité.
