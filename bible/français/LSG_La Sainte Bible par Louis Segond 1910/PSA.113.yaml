document_id: PSA.113,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ps 8; 96; 97. 1 S 2:1-8.
  - type: text
    content: Louez l’Éternel!
  - type: text
    content: Serviteurs de l’Éternel, louez,
  - type: text
    content: Louez le nom de l’Éternel!
  '2':
  - type: text
    content: ' '
  - type: note
    content: Da 2:20.
  - type: text
    content: Que le nom de l’Éternel soit béni,
  - type: text
    content: Dès maintenant et à jamais!
  '3':
  - type: text
    content: ' '
  - type: note
    content: Mal 1:11.
  - type: text
    content: Du lever du soleil jusqu’à son couchant,
  - type: text
    content: Que le nom de l’Éternel soit célébré!
  '4':
  - type: text
    content: L’Éternel est élevé au-dessus de toutes les nations,
  - type: text
    content: Sa gloire est au-dessus des cieux.
  '5':
  - type: text
    content: Qui est semblable à l’Éternel, notre Dieu?
  - type: text
    content: Il a sa demeure en haut;
  '6':
  - type: text
    content: Il abaisse les regards
  - type: text
    content: Sur les cieux et sur la terre.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 1 S 2:8. Ps 107:41.
  - type: text
    content: De la poussière il retire le pauvre,
  - type: text
    content: Du fumier il relève l’indigent,
  '8':
  - type: text
    content: Pour les faire asseoir avec les grands,
  - type: text
    content: Avec les grands de son peuple.
  '9':
  - type: text
    content: Il donne une maison à celle qui était stérile,
  - type: text
    content: Il en fait une mère joyeuse au milieu de ses enfants.
  - type: text
    content: Louez l’Éternel!
