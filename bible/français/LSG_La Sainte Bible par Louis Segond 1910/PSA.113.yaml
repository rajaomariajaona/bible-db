document_id: PSA.113,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: Ps 8; 96; 97. 1 S 2:1-8.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Louez l’Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Serviteurs de l’Éternel, louez,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Louez le nom de l’Éternel!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Da 2:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Que le nom de l’Éternel soit béni,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dès maintenant et à jamais!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mal 1:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Du lever du soleil jusqu’à son couchant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que le nom de l’Éternel soit célébré!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel est élevé au-dessus de toutes les nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sa gloire est au-dessus des cieux.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui est semblable à l’Éternel, notre Dieu?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a sa demeure en haut;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il abaisse les regards
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur les cieux et sur la terre.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 2:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 107:41
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: De la poussière il retire le pauvre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Du fumier il relève l’indigent,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour les faire asseoir avec les grands,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avec les grands de son peuple.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il donne une maison à celle qui était stérile,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il en fait une mère joyeuse au milieu de ses enfants.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Louez l’Éternel!
