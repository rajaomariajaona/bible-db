document_id: 2CH.19
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’alliance de Josaphat avec Achab blâmée par le prophète Jéhu
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-3: cf. 2 Co 6:14-18. Ps 141:5. Ap 2:3-6.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Josaphat, roi de Juda, revint en paix dans sa maison à Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Jéhu, fils de Hanani, le prophète, alla au-devant de lui. Et il dit au roi Josaphat: Doit-on secourir le méchant, et aimes-tu ceux qui haïssent l’Éternel? A cause de cela, l’Éternel est irrité contre toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mais il s’est trouvé de bonnes choses en toi, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 17:4
      metadata:
        usfm: 2CH.17.4
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '6'
      metadata:
        usfm: 2CH.17.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: car tu as fait disparaître du pays les idoles, et tu as appliqué ton cœur à chercher Dieu.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Réformes dans l’administration de la justice
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 4-11: cf. De 16:18-20; 1:16, 17; 17:8-11. Ps 82. Col 4:17.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Josaphat resta à Jérusalem. Puis il fit encore une tournée parmi le peuple, depuis Beer-Schéba jusqu’à la montagne d’Éphraïm, et il les ramena à l’Éternel, le Dieu de leurs pères. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il établit des juges dans toutes les villes fortes du pays de Juda, dans chaque ville. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Et il dit aux juges: Prenez garde à ce que vous ferez, car ce n’est pas pour les hommes que vous prononcerez des jugements; c’est pour l’Éternel, qui sera près de vous quand vous les prononcerez. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Maintenant, que la crainte de l’Éternel soit sur vous; veillez sur vos actes, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 32:4
      metadata:
        usfm: DEU.32.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 9:14
      metadata:
        usfm: ROM.9.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'car il n’y a chez l’Éternel, notre Dieu, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 10:17
      metadata:
        usfm: DEU.10.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 34:19
      metadata:
        usfm: JOB.34.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 10:34
      metadata:
        usfm: ACT.10.34
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 2:11
      metadata:
        usfm: ROM.2.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 2:6
      metadata:
        usfm: GAL.2.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 6:9
      metadata:
        usfm: EPH.6.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 3:25
      metadata:
        usfm: COL.3.25
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 1:17
      metadata:
        usfm: 1PE.1.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ni iniquité, ni égards pour l’apparence des personnes, ni acceptation de présents. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Quand on fut de retour à Jérusalem, Josaphat y établit aussi, pour les jugements de l’Éternel et pour les contestations, des Lévites, des sacrificateurs et des chefs de maisons paternelles d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Et voici les ordres qu’il leur donna: Vous agirez de la manière suivante dans la crainte de l’Éternel, avec fidélité et avec intégrité de cœur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dans toute contestation qui vous sera soumise par vos frères, établis dans leurs villes, relativement à un meurtre, à une loi, à un commandement, à des préceptes et à des ordonnances, vous les éclairerez, afin qu’ils ne se rendent pas coupables envers l’Éternel, et que sa colère n’éclate pas sur vous et sur vos frères. C’est ainsi que vous agirez, et vous ne serez point coupables. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Et voici, vous avez à votre tête Amaria, le souverain sacrificateur, pour toutes les affaires de l’Éternel, et Zebadia, fils d’Ismaël, chef de la maison de Juda, pour toutes les affaires du roi, et vous avez devant vous des Lévites comme magistrats. Fortifiez-vous et agissez, et que l’Éternel soit avec celui qui fera le bien!
