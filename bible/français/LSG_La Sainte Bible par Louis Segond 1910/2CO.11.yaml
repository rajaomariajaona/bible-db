document_id: 2CO.11,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-15: cf. (Ga 1:6-9; 4:9-20.) 2 Co 12:11-15. (Mt 7:15-20. Ro 16:17, 18.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Oh! Si vous pouviez supporter de ma part un peu de folie! Mais vous me supportez! '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Par la vérité de Christ qui est en moi, je déclare que ce sujet de gloire ne me sera pas enlevé dans les contrées de l’Achaïe. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pourquoi?… Parce que je ne vous aime pas?… Dieu le sait! '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais j’agis et j’agirai de la sorte, pour ôter ce prétexte à ceux qui cherchent un prétexte, afin qu’ils soient trouvés tels que nous dans les choses dont ils se glorifient. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ces hommes-là sont de faux apôtres, des ouvriers trompeurs, déguisés en apôtres de Christ. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et cela n’est pas étonnant, puisque Satan lui-même se déguise en ange de lumière. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il n’est donc pas étrange que ses ministres aussi se déguisent en ministres de justice. Leur fin sera selon leurs œuvres.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 16-33: cf. (1 Co 15:10, 30-32; 4:9-13. 2 Co 6:3-10. Ac 20:18-27.) Ac 9:16, 23-25.'
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je le répète, que personne ne me regarde comme un insensé; sinon, recevez-moi comme un insensé, afin que moi aussi, je me glorifie un peu. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce que je dis, avec l’assurance d’avoir sujet de me glorifier, je ne le dis pas selon le Seigneur, mais comme par folie. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 10:13
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 12:5
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Puisqu’il en est plusieurs qui se glorifient selon la chair, je me glorifierai aussi. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car vous supportez volontiers les insensés, vous qui êtes sages. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car je suis jaloux de vous d’une jalousie de Dieu, parce que je vous ai fiancés à un seul époux, pour vous présenter à Christ '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 21:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'comme une vierge pure. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si quelqu’un vous asservit, si quelqu’un vous dévore, si quelqu’un s’empare de vous, si quelqu’un est arrogant, si quelqu’un vous frappe au visage, vous le supportez. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’ai honte de le dire, nous avons montré de la faiblesse. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ph 3:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Cependant, tout ce que peut oser quelqu’un, je parle en insensé, moi aussi, je l’ose! '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sont-ils Hébreux? '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 22:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Moi aussi. Sont-ils Israélites? Moi aussi. Sont-ils de la postérité d’Abraham? Moi aussi. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sont-ils ministres de Christ? Je parle en homme qui extravague. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 15:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Je le suis plus encore: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 9:16
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 21:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 6:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'par les travaux, bien plus; par les coups, bien plus; par les emprisonnements, bien plus. Souvent en danger de mort, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'cinq fois j’ai reçu des Juifs '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 25:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'quarante coups moins un, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 16:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'trois fois j’ai été battu de verges, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 14:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'une fois j’ai été lapidé, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 27:9
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '41'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'trois fois j’ai fait naufrage, j’ai passé un jour et une nuit dans l’abîme. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fréquemment en voyage, j’ai été en péril sur les fleuves, en péril de la part des brigands, en péril de la part de ceux de ma nation, en péril de la part des païens, en péril dans les villes, en péril dans les déserts, en péril sur la mer, en péril parmi les faux frères. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’ai été dans le travail et dans la peine, exposé à de nombreuses veilles, à la faim et à la soif, à des jeûnes multipliés, au froid et à la nudité. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et, sans parler d’autres choses, je suis assiégé chaque jour par '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 20:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'les soucis que me donnent toutes les Églises. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 8:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Qui est faible, que je ne sois faible? Qui vient à tomber, que je ne brûle? '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toutefois, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 3:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 8:44
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'de même que le serpent séduisit Eve par sa ruse, je crains que vos pensées ne se corrompent et ne se détournent de la simplicité à l’égard de Christ. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'S’il faut se glorifier, c’est de ma faiblesse que je me glorifierai! '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 1:9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 1:23
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 1:20
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ph 1:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Th 2:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Dieu, qui est le Père du Seigneur Jésus, et qui est béni éternellement, sait que je ne mens point!… '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A Damas, le gouverneur '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 9:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'du roi Arétas faisait garder la ville des Damascéniens, pour se saisir de moi; '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: mais on me descendit par une fenêtre, dans une corbeille, le long de la muraille, et j’échappai de leurs mains.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 1:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Car, si quelqu’un vient vous prêcher un autre Jésus que celui que nous avons prêché, ou si vous recevez un autre Esprit que celui que vous avez reçu, ou un autre Évangile que celui que vous avez embrassé, vous le supportez fort bien. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or, j’estime que je n’ai été inférieur en rien à ces apôtres par excellence. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si je suis un ignorant sous le rapport du langage, je ne le suis point sous celui de la connaissance, et nous l’avons montré parmi vous à tous égards et en toutes choses. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ou bien, ai-je commis un péché parce que, m’abaissant moi-même afin que vous fussiez élevés, je vous ai annoncé '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 9:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'gratuitement l’Évangile de Dieu? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’ai dépouillé d’autres Églises, en recevant d’elles un salaire, pour vous servir. Et lorsque j’étais chez vous et que je me suis trouvé dans le besoin, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 20:33
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 12:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Th 2:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Th 3:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'je n’ai été à charge à personne; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ph 4:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'car les frères venus de Macédoine ont pourvu à ce qui me manquait. En toutes choses je me suis gardé de vous être à charge, et je m’en garderai. '
