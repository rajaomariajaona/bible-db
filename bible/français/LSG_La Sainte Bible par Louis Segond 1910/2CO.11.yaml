document_id: 2CO.11
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-15: cf. (Ga 1:6-9; 4:9-20.) 2 Co 12:11-15. (Mt 7:15-20. Ro 16:17, 18.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Oh! Si vous pouviez supporter de ma part un peu de folie! Mais vous me supportez! '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Car je suis jaloux de vous d’une jalousie de Dieu, parce que je vous ai fiancés à un seul époux, pour vous présenter à Christ '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 21:13
      metadata:
        usfm: LEV.21.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'comme une vierge pure. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Toutefois, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 3:4
      metadata:
        usfm: GEN.3.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 8:44
      metadata:
        usfm: JHN.8.44
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'de même que le serpent séduisit Eve par sa ruse, je crains que vos pensées ne se corrompent et ne se détournent de la simplicité à l’égard de Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 1:8
      metadata:
        usfm: GAL.1.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Car, si quelqu’un vient vous prêcher un autre Jésus que celui que nous avons prêché, ou si vous recevez un autre Esprit que celui que vous avez reçu, ou un autre Évangile que celui que vous avez embrassé, vous le supportez fort bien. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Or, j’estime que je n’ai été inférieur en rien à ces apôtres par excellence. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Si je suis un ignorant sous le rapport du langage, je ne le suis point sous celui de la connaissance, et nous l’avons montré parmi vous à tous égards et en toutes choses. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ou bien, ai-je commis un péché parce que, m’abaissant moi-même afin que vous fussiez élevés, je vous ai annoncé '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 9:12
      metadata:
        usfm: 1CO.9.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'gratuitement l’Évangile de Dieu? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'J’ai dépouillé d’autres Églises, en recevant d’elles un salaire, pour vous servir. Et lorsque j’étais chez vous et que je me suis trouvé dans le besoin, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 20:33
      metadata:
        usfm: ACT.20.33
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 12:13
      metadata:
        usfm: 2CO.12.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 2:9
      metadata:
        usfm: 1TH.2.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Th 3:8
      metadata:
        usfm: 2TH.3.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'je n’ai été à charge à personne; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 4:15
      metadata:
        usfm: PHP.4.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'car les frères venus de Macédoine ont pourvu à ce qui me manquait. En toutes choses je me suis gardé de vous être à charge, et je m’en garderai. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Par la vérité de Christ qui est en moi, je déclare que ce sujet de gloire ne me sera pas enlevé dans les contrées de l’Achaïe. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Pourquoi?… Parce que je ne vous aime pas?… Dieu le sait! '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mais j’agis et j’agirai de la sorte, pour ôter ce prétexte à ceux qui cherchent un prétexte, afin qu’ils soient trouvés tels que nous dans les choses dont ils se glorifient. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ces hommes-là sont de faux apôtres, des ouvriers trompeurs, déguisés en apôtres de Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Et cela n’est pas étonnant, puisque Satan lui-même se déguise en ange de lumière. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Il n’est donc pas étrange que ses ministres aussi se déguisent en ministres de justice. Leur fin sera selon leurs œuvres.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 16-33: cf. (1 Co 15:10, 30-32; 4:9-13. 2 Co 6:3-10. Ac 20:18-27.) Ac 9:16, 23-25.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Je le répète, que personne ne me regarde comme un insensé; sinon, recevez-moi comme un insensé, afin que moi aussi, je me glorifie un peu. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ce que je dis, avec l’assurance d’avoir sujet de me glorifier, je ne le dis pas selon le Seigneur, mais comme par folie. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 10:13
      metadata:
        usfm: 2CO.10.13
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 12:5
      metadata:
        usfm: 2CO.12.5
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '6'
      metadata:
        usfm: 2CO.12.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Puisqu’il en est plusieurs qui se glorifient selon la chair, je me glorifierai aussi. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Car vous supportez volontiers les insensés, vous qui êtes sages. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Si quelqu’un vous asservit, si quelqu’un vous dévore, si quelqu’un s’empare de vous, si quelqu’un est arrogant, si quelqu’un vous frappe au visage, vous le supportez. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'J’ai honte de le dire, nous avons montré de la faiblesse. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 3:4
      metadata:
        usfm: PHP.3.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Cependant, tout ce que peut oser quelqu’un, je parle en insensé, moi aussi, je l’ose! '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Sont-ils Hébreux? '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 22:3
      metadata:
        usfm: ACT.22.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Moi aussi. Sont-ils Israélites? Moi aussi. Sont-ils de la postérité d’Abraham? Moi aussi. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Sont-ils ministres de Christ? Je parle en homme qui extravague. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 15:10
      metadata:
        usfm: 1CO.15.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Je le suis plus encore: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 9:16
      metadata:
        usfm: ACT.9.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 21:11
      metadata:
        usfm: ACT.21.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 6:4
      metadata:
        usfm: 2CO.6.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'par les travaux, bien plus; par les coups, bien plus; par les emprisonnements, bien plus. Souvent en danger de mort, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'cinq fois j’ai reçu des Juifs '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 25:3
      metadata:
        usfm: DEU.25.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'quarante coups moins un, '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 16:22
      metadata:
        usfm: ACT.16.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'trois fois j’ai été battu de verges, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 14:19
      metadata:
        usfm: ACT.14.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'une fois j’ai été lapidé, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 27:9
      metadata:
        usfm: ACT.27.9
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '41'
      metadata:
        usfm: ACT.27.41
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'trois fois j’ai fait naufrage, j’ai passé un jour et une nuit dans l’abîme. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Fréquemment en voyage, j’ai été en péril sur les fleuves, en péril de la part des brigands, en péril de la part de ceux de ma nation, en péril de la part des païens, en péril dans les villes, en péril dans les déserts, en péril sur la mer, en péril parmi les faux frères. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'J’ai été dans le travail et dans la peine, exposé à de nombreuses veilles, à la faim et à la soif, à des jeûnes multipliés, au froid et à la nudité. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Et, sans parler d’autres choses, je suis assiégé chaque jour par '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 20:18
      metadata:
        usfm: ACT.20.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'les soucis que me donnent toutes les Églises. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 8:13
      metadata:
        usfm: 1CO.8.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Qui est faible, que je ne sois faible? Qui vient à tomber, que je ne brûle? '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'S’il faut se glorifier, c’est de ma faiblesse que je me glorifierai! '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 1:9
      metadata:
        usfm: ROM.1.9
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 9:1
      metadata:
        usfm: ROM.9.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 1:23
      metadata:
        usfm: 2CO.1.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 1:20
      metadata:
        usfm: GAL.1.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 1:8
      metadata:
        usfm: PHP.1.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 2:5
      metadata:
        usfm: 1TH.2.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Dieu, qui est le Père du Seigneur Jésus, et qui est béni éternellement, sait que je ne mens point!… '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'A Damas, le gouverneur '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 9:24
      metadata:
        usfm: ACT.9.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'du roi Arétas faisait garder la ville des Damascéniens, pour se saisir de moi; '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: mais on me descendit par une fenêtre, dans une corbeille, le long de la muraille, et j’échappai de leurs mains.
