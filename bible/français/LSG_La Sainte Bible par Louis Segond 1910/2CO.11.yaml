document_id: 2CO.11,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-15: cf. (Ga 1:6-9; 4:9-20.) 2 Co 12:11-15. (Mt 7:15-20. Ro 16:17, 18.)'
  - type: text
    content: 'Oh! Si vous pouviez supporter de ma part un peu de folie! Mais vous me supportez! '
  '10':
  - type: text
    content: 'Par la vérité de Christ qui est en moi, je déclare que ce sujet de gloire ne me sera pas enlevé dans les contrées de l’Achaïe. '
  '11':
  - type: text
    content: 'Pourquoi?… Parce que je ne vous aime pas?… Dieu le sait! '
  '12':
  - type: text
    content: 'Mais j’agis et j’agirai de la sorte, pour ôter ce prétexte à ceux qui cherchent un prétexte, afin qu’ils soient trouvés tels que nous dans les choses dont ils se glorifient. '
  '13':
  - type: text
    content: 'Ces hommes-là sont de faux apôtres, des ouvriers trompeurs, déguisés en apôtres de Christ. '
  '14':
  - type: text
    content: 'Et cela n’est pas étonnant, puisque Satan lui-même se déguise en ange de lumière. '
  '15':
  - type: text
    content: Il n’est donc pas étrange que ses ministres aussi se déguisent en ministres de justice. Leur fin sera selon leurs œuvres.
  - type: heading
    content: 'V. 16-33: cf. (1 Co 15:10, 30-32; 4:9-13. 2 Co 6:3-10. Ac 20:18-27.) Ac 9:16, 23-25.'
  '16':
  - type: text
    content: 'Je le répète, que personne ne me regarde comme un insensé; sinon, recevez-moi comme un insensé, afin que moi aussi, je me glorifie un peu. '
  '17':
  - type: text
    content: 'Ce que je dis, avec l’assurance d’avoir sujet de me glorifier, je ne le dis pas selon le Seigneur, mais comme par folie. '
  '18':
  - type: note
    content: 2 Co 10:13; 12:5, 6.
  - type: text
    content: 'Puisqu’il en est plusieurs qui se glorifient selon la chair, je me glorifierai aussi. '
  '19':
  - type: text
    content: 'Car vous supportez volontiers les insensés, vous qui êtes sages. '
  '2':
  - type: text
    content: 'Car je suis jaloux de vous d’une jalousie de Dieu, parce que je vous ai fiancés à un seul époux, pour vous présenter à Christ '
  - type: note
    content: Lé 21:13.
  - type: text
    content: 'comme une vierge pure. '
  '20':
  - type: text
    content: 'Si quelqu’un vous asservit, si quelqu’un vous dévore, si quelqu’un s’empare de vous, si quelqu’un est arrogant, si quelqu’un vous frappe au visage, vous le supportez. '
  '21':
  - type: text
    content: 'J’ai honte de le dire, nous avons montré de la faiblesse. '
  - type: note
    content: Ph 3:4.
  - type: text
    content: 'Cependant, tout ce que peut oser quelqu’un, je parle en insensé, moi aussi, je l’ose! '
  '22':
  - type: text
    content: 'Sont-ils Hébreux? '
  - type: note
    content: Ac 22:3.
  - type: text
    content: 'Moi aussi. Sont-ils Israélites? Moi aussi. Sont-ils de la postérité d’Abraham? Moi aussi. '
  '23':
  - type: text
    content: 'Sont-ils ministres de Christ? Je parle en homme qui extravague. '
  - type: note
    content: 1 Co 15:10.
  - type: text
    content: 'Je le suis plus encore: '
  - type: note
    content: Ac 9:16; 21:11. 2 Co 6:4.
  - type: text
    content: 'par les travaux, bien plus; par les coups, bien plus; par les emprisonnements, bien plus. Souvent en danger de mort, '
  '24':
  - type: text
    content: 'cinq fois j’ai reçu des Juifs '
  - type: note
    content: De 25:3.
  - type: text
    content: 'quarante coups moins un, '
  '25':
  - type: note
    content: Ac 16:22.
  - type: text
    content: 'trois fois j’ai été battu de verges, '
  - type: note
    content: Ac 14:19.
  - type: text
    content: 'une fois j’ai été lapidé, '
  - type: note
    content: Ac 27:9, 41.
  - type: text
    content: 'trois fois j’ai fait naufrage, j’ai passé un jour et une nuit dans l’abîme. '
  '26':
  - type: text
    content: 'Fréquemment en voyage, j’ai été en péril sur les fleuves, en péril de la part des brigands, en péril de la part de ceux de ma nation, en péril de la part des païens, en péril dans les villes, en péril dans les déserts, en péril sur la mer, en péril parmi les faux frères. '
  '27':
  - type: text
    content: 'J’ai été dans le travail et dans la peine, exposé à de nombreuses veilles, à la faim et à la soif, à des jeûnes multipliés, au froid et à la nudité. '
  '28':
  - type: text
    content: 'Et, sans parler d’autres choses, je suis assiégé chaque jour par '
  - type: note
    content: Ac 20:18.
  - type: text
    content: 'les soucis que me donnent toutes les Églises. '
  '29':
  - type: note
    content: 1 Co 8:13.
  - type: text
    content: 'Qui est faible, que je ne sois faible? Qui vient à tomber, que je ne brûle? '
  '3':
  - type: text
    content: 'Toutefois, '
  - type: note
    content: Ge 3:4. Jn 8:44.
  - type: text
    content: 'de même que le serpent séduisit Eve par sa ruse, je crains que vos pensées ne se corrompent et ne se détournent de la simplicité à l’égard de Christ. '
  '30':
  - type: text
    content: 'S’il faut se glorifier, c’est de ma faiblesse que je me glorifierai! '
  '31':
  - type: note
    content: Ro 1:9; 9:1. 2 Co 1:23. Ga 1:20. Ph 1:8. 1 Th 2:5.
  - type: text
    content: 'Dieu, qui est le Père du Seigneur Jésus, et qui est béni éternellement, sait que je ne mens point!… '
  '32':
  - type: text
    content: 'A Damas, le gouverneur '
  - type: note
    content: Ac 9:24.
  - type: text
    content: 'du roi Arétas faisait garder la ville des Damascéniens, pour se saisir de moi; '
  '33':
  - type: text
    content: mais on me descendit par une fenêtre, dans une corbeille, le long de la muraille, et j’échappai de leurs mains.
  '4':
  - type: note
    content: Ga 1:8.
  - type: text
    content: 'Car, si quelqu’un vient vous prêcher un autre Jésus que celui que nous avons prêché, ou si vous recevez un autre Esprit que celui que vous avez reçu, ou un autre Évangile que celui que vous avez embrassé, vous le supportez fort bien. '
  '5':
  - type: text
    content: 'Or, j’estime que je n’ai été inférieur en rien à ces apôtres par excellence. '
  '6':
  - type: text
    content: 'Si je suis un ignorant sous le rapport du langage, je ne le suis point sous celui de la connaissance, et nous l’avons montré parmi vous à tous égards et en toutes choses. '
  '7':
  - type: text
    content: 'Ou bien, ai-je commis un péché parce que, m’abaissant moi-même afin que vous fussiez élevés, je vous ai annoncé '
  - type: note
    content: 1 Co 9:12.
  - type: text
    content: 'gratuitement l’Évangile de Dieu? '
  '8':
  - type: text
    content: 'J’ai dépouillé d’autres Églises, en recevant d’elles un salaire, pour vous servir. Et lorsque j’étais chez vous et que je me suis trouvé dans le besoin, '
  - type: note
    content: Ac 20:33. 2 Co 12:13. 1 Th 2:9. 2 Th 3:8.
  - type: text
    content: 'je n’ai été à charge à personne; '
  '9':
  - type: note
    content: Ph 4:15.
  - type: text
    content: 'car les frères venus de Macédoine ont pourvu à ce qui me manquait. En toutes choses je me suis gardé de vous être à charge, et je m’en garderai. '
