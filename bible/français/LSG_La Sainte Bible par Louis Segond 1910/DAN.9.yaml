document_id: DAN.9,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Prière de Daniel
  - type: heading
    content: 'V. 1-19: cf. 1 R 8:46-51. (Esd 9:5, etc. Né 1 et 9.)'
  - type: text
    content: 'La première année de Darius, fils d’Assuérus, de la race des Mèdes, lequel était devenu roi du royaume des Chaldéens, '
  '10':
  - type: text
    content: 'Nous n’avons pas écouté la voix de l’Éternel, notre Dieu, pour suivre ses lois qu’il avait mises devant nous par ses serviteurs, les prophètes. '
  '11':
  - type: text
    content: 'Tout Israël a transgressé ta loi, et s’est détourné pour ne pas écouter ta voix. Alors se sont répandues sur nous les '
  - type: note
    content: Lé 26:14, etc. De 27:15, etc.; 28:15, etc.; 29:20; 30:17, etc.; 31:17, etc.; 32:19, etc. La 2:17.
  - type: text
    content: 'malédictions et les imprécations qui sont écrites dans la loi de Moïse, serviteur de Dieu, parce que nous avons péché contre Dieu. '
  '12':
  - type: text
    content: 'Il a accompli les paroles qu’il avait prononcées contre nous et contre nos chefs qui nous ont gouvernés, il a fait venir sur nous une grande calamité, et il n’en est jamais arrivé sous le ciel entier une semblable à celle qui est arrivée à Jérusalem. '
  '13':
  - type: text
    content: 'Comme cela est écrit dans la loi de Moïse, toute cette calamité est venue sur nous; et nous n’avons pas imploré l’Éternel, notre Dieu, nous ne nous sommes pas détournés de nos iniquités, nous n’avons pas été attentifs à ta vérité. '
  '14':
  - type: text
    content: 'L’Éternel a veillé sur cette calamité, et l’a fait venir sur nous; car l’Éternel, notre Dieu, est juste dans toutes les choses qu’il a faites, mais nous n’avons pas écouté sa voix. '
  '15':
  - type: note
    content: Ps 105:7; 106:47.
  - type: text
    content: 'Et maintenant, Seigneur, notre Dieu, '
  - type: note
    content: Ex 32:11.
  - type: text
    content: 'toi qui as fait sortir ton peuple du pays d’Égypte par ta main puissante, et qui t’es fait un nom comme il l’est aujourd’hui, nous avons péché, nous avons commis l’iniquité. '
  '16':
  - type: text
    content: 'Seigneur, selon ta grande miséricorde, que ta colère et ta fureur se détournent de ta ville de Jérusalem, de ta montagne sainte; car, à cause de nos péchés et des iniquités de nos pères, Jérusalem et ton peuple sont en opprobre à tous ceux qui nous entourent. '
  '17':
  - type: text
    content: 'Maintenant donc, ô notre Dieu, écoute la prière et les supplications de ton serviteur, et, pour l’amour du Seigneur, fais briller ta face sur ton sanctuaire dévasté! '
  '18':
  - type: text
    content: 'Mon Dieu, prête l’oreille et écoute! Ouvre les yeux et regarde nos ruines, regarde la ville sur laquelle ton nom est invoqué! Car ce n’est pas à cause de notre justice que nous te présentons nos supplications, c’est à cause de tes grandes compassions. '
  '19':
  - type: text
    content: Seigneur, écoute! Seigneur, pardonne! Seigneur, sois attentif! Agis et ne tarde pas, par amour pour toi, ô mon Dieu! Car ton nom est invoqué sur ta ville et sur ton peuple.
  - type: heading
    content: 'V. 20-27: cf. (Ga 4:4, 5. Lu 24:44-47.) (Ro 3:21-25. 1 Pi 2:21-24. Hé 9:24-28; 10:5-18.) (Lu 19:41-44; 21:5, 6, 20-24.) Mt 24:15.'
  '2':
  - type: text
    content: 'la première année de son règne, moi, Daniel, je vis par les livres qu’il devait s’écouler soixante-dix ans pour les ruines de Jérusalem, d’après le nombre des années dont l’Éternel avait parlé à Jérémie, le prophète. '
  '20':
  - type: text
    content: 'Je parlais encore, je priais, je confessais mon péché et le péché de mon peuple d’Israël, et je présentais mes supplications à l’Éternel, mon Dieu, en faveur de la sainte montagne de mon Dieu; '
  '21':
  - type: text
    content: 'je parlais encore dans ma prière, quand l’homme, Gabriel, que j’avais vu précédemment dans une vision, s’approcha de moi d’un vol rapide, au moment de l’offrande du soir. '
  '22':
  - type: text
    content: 'Il m’instruisit, et s’entretint avec moi. Il me dit: Daniel, je suis venu maintenant pour ouvrir ton intelligence. '
  '23':
  - type: text
    content: 'Lorsque tu as commencé à prier, la parole est sortie, et je viens pour te l’annoncer; car tu es un bien-aimé. Sois attentif à la parole, et comprends la vision! '
  '24':
  - type: text
    content: 'Soixante-dix semaines ont été fixées sur ton peuple et sur ta ville sainte, pour faire cesser les transgressions et mettre fin aux péchés, pour expier l’iniquité et amener la justice éternelle, pour sceller la vision et le prophète, et pour oindre le Saint des saints. '
  '25':
  - type: text
    content: 'Sache-le donc, et comprends! Depuis le moment où la parole a annoncé que Jérusalem sera rebâtie jusqu’à l’Oint, au Conducteur, il y a sept semaines; dans soixante-deux semaines, les places et les fossés seront rétablis, mais en des temps fâcheux. '
  '26':
  - type: text
    content: 'Après les soixante-deux semaines, un Oint sera retranché, et il n’aura pas de successeur. Le peuple d’un chef qui viendra détruira la ville et le sanctuaire, et sa fin arrivera comme par une inondation; il est arrêté que les dévastations dureront jusqu’au terme de la guerre. '
  '27':
  - type: text
    content: 'Il fera une solide alliance avec plusieurs pour une semaine, et durant la moitié de la semaine il fera cesser le sacrifice et l’offrande; '
  - type: note
    content: Mt 24:15. Mc 13:14. Lu 21:20.
  - type: text
    content: le dévastateur commettra les choses les plus abominables, jusqu’à ce que la ruine et ce qui a été résolu fondent sur le dévastateur.
  '3':
  - type: text
    content: 'Je tournai ma face vers le Seigneur Dieu, afin de recourir à la prière et aux supplications, en jeûnant et en prenant le sac et la cendre. '
  '4':
  - type: text
    content: 'Je priai l’Éternel, mon Dieu, et je lui fis cette confession: Seigneur, Dieu grand et redoutable, toi '
  - type: note
    content: De 7:9.
  - type: text
    content: 'qui gardes ton alliance et qui fais miséricorde à ceux qui t’aiment et qui observent tes commandements! '
  '5':
  - type: note
    content: Ps 106:6. És 64:5, 6, 7.
  - type: text
    content: 'Nous avons péché, nous avons commis l’iniquité, nous avons été méchants et rebelles, nous nous sommes détournés de tes commandements et de tes ordonnances. '
  '6':
  - type: text
    content: 'Nous n’avons pas écouté tes serviteurs, les prophètes, qui ont parlé en ton nom à nos rois, à nos chefs, à nos pères, et à tout le peuple du pays. '
  '7':
  - type: text
    content: 'A toi, Seigneur, est la justice, et à nous la confusion de face, en ce jour, aux hommes de Juda, aux habitants de Jérusalem, et à tout Israël, à ceux qui sont près et à ceux qui sont loin, dans tous les pays où tu les as chassés à cause des infidélités dont ils se sont rendus coupables envers toi. '
  '8':
  - type: text
    content: 'Seigneur, à nous la confusion de face, à nos rois, à nos chefs, et à nos pères, parce que nous avons péché contre toi. '
  '9':
  - type: note
    content: Ps 130:3, 7. La 3:22.
  - type: text
    content: 'Auprès du Seigneur, notre Dieu, la miséricorde et le pardon, car nous avons été rebelles envers lui. '
