document_id: EZK.32
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-16: cf. Éz 29 à 31.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La douzième année, le premier jour du douzième mois, la parole de l’Éternel me fut adressée, en ces mots:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fils de l’homme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Prononce une complainte sur Pharaon, roi d’Égypte!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tu lui diras: Tu ressemblais à un lionceau parmi les nations;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tu étais comme un '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 29:3
      metadata:
        usfm: EZK.29.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: crocodile dans les mers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu t’élançais dans tes fleuves,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu troublais les eaux avec tes pieds,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu agitais leurs flots.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ainsi parle le Seigneur, l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'J’étendrai sur toi mon '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 12:13
      metadata:
        usfm: EZK.12.13
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 17:20
      metadata:
        usfm: EZK.17.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: rets,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans une foule nombreuse de peuples,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils te tireront dans mon filet.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Je te laisserai à terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je te jetterai sur la face des champs;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je ferai reposer sur toi tous les oiseaux du ciel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je rassasierai de toi les bêtes de toute la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Je mettrai ta chair sur les montagnes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je remplirai les vallées de tes débris;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: J’arroserai de ton sang le pays où tu nages,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jusqu’aux montagnes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les ravins seront remplis de toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Quand je t’éteindrai, je voilerai les '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 13:10
      metadata:
        usfm: ISA.13.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Joë 2:31
      metadata:
        usfm: JOL.2.31
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: cieux
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et j’obscurcirai leurs étoiles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je couvrirai le soleil de nuages,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la lune ne donnera plus sa lumière.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: J’obscurcirai à cause de toi tous les luminaires des cieux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je répandrai les ténèbres sur ton pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit le Seigneur, l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: J’affligerai le cœur de beaucoup de peuples,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand j’annoncerai ta ruine parmi les nations
- type: usfm
  marker: q1
  children:
  - type: text
    text: A des pays que tu ne connaissais pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Je frapperai de stupeur beaucoup de peuples à cause de toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et leurs rois seront saisis d’épouvante à cause de toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand j’agiterai mon épée devant leur face;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils trembleront à tout instant chacun pour sa vie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au jour de ta chute.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Car ainsi parle le Seigneur, l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’épée du roi de Babylone fondra sur toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Je ferai tomber ta multitude par l’épée de vaillants hommes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tous les '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 28:7
      metadata:
        usfm: EZK.28.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 31:12
      metadata:
        usfm: EZK.31.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: plus violents d’entre les peuples;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils anéantiront l’orgueil de l’Égypte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et toute sa '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 31:2
      metadata:
        usfm: EZK.31.2
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '18'
      metadata:
        usfm: EZK.31.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: multitude sera détruite.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Je ferai périr tout son bétail près des grandes eaux;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le pied de l’homme ne les troublera plus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le sabot des animaux ne les troublera plus.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Alors je calmerai ses eaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je ferai couler ses fleuves comme l’huile,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit le Seigneur, l’Éternel
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Quand je ferai du pays d’Égypte une solitude,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que le pays sera dépouillé de tout ce qu’il contient,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand je frapperai tous ceux qui l’habitent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils sauront que je suis l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: C’est là une complainte, et on la dira;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les filles des nations diront cette complainte;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elles la prononceront sur l’Égypte et sur toute sa multitude,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit le Seigneur, l’Éternel.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 17-32: cf. Éz 31. És 14:4-20. Ec 9:10.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'La douzième année, le quinzième jour du mois, la parole de l’Éternel me fut adressée, en ces mots:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Fils de l’homme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lamente-toi sur la multitude d’Égypte, et précipite-la,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle et les filles des nations puissantes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans les profondeurs de la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avec ceux qui descendent dans la fosse!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Qui surpasses-tu en beauté?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Descends, et couche-toi avec les incirconcis!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ils tomberont au milieu de ceux qui sont morts par l’épée.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Le glaive est donné:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Entraînez l’Égypte et toute sa multitude!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Les puissants héros lui adresseront la parole
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au sein du séjour des morts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avec ceux qui étaient ses soutiens.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils sont descendus, ils sont couchés, les incirconcis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tués par l’épée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Là est l’Assyrien, avec toute sa multitude,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ses sépulcres sont autour de lui;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous sont morts, sont tombés par l’épée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ses sépulcres sont dans les profondeurs de la fosse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et sa multitude est autour de son sépulcre;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous sont morts, sont tombés par l’épée;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eux qui répandaient la terreur dans le pays des vivants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Là est Élam, avec toute sa multitude,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Autour est son sépulcre;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous sont morts, sont tombés par l’épée;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils sont descendus incirconcis dans les profondeurs de la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eux qui répandaient la terreur dans le pays des vivants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils ont porté leur ignominie vers ceux qui descendent dans la fosse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: On a fait sa couche parmi les morts avec toute sa multitude,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ses sépulcres sont autour de lui;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous ces incirconcis sont morts par l’épée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car ils répandaient la terreur dans le pays des vivants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils ont porté leur ignominie vers ceux qui descendent dans la fosse;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ont été placés parmi les morts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Là sont Méschec, Tubal, et toute leur multitude,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et leurs sépulcres sont autour d’eux;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous ces incirconcis sont morts par l’épée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car ils répandaient la terreur dans le pays des vivants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ils ne sont pas couchés avec les héros,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ceux qui sont tombés d’entre les incirconcis;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils sont descendus au séjour des morts avec leurs armes de guerre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ont mis leurs épées sous leurs têtes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et leurs iniquités ont été sur leurs ossements;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car ils étaient la terreur des héros dans le pays des vivants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Toi aussi, tu seras brisé au milieu des incirconcis;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu seras couché avec ceux qui sont morts par l’épée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Là sont Édom, ses rois et tous ses princes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui, malgré leur vaillance, ont été placés
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avec ceux qui sont morts par l’épée;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils sont couchés avec les incirconcis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avec ceux qui descendent dans la fosse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Là sont tous les princes du septentrion, et tous les Sidoniens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui sont descendus vers les morts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Confus, malgré la terreur qu’inspirait leur vaillance;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ces incirconcis sont couchés avec ceux qui sont morts par l’épée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils ont porté leur ignominie vers ceux qui descendent dans la fosse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Pharaon les verra,
- type: usfm
  marker: q1
  children:
  - type: text
