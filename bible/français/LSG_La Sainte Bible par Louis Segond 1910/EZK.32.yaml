document_id: EZK.32,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-16: cf. Éz 29 à 31.'
  - type: text
    content: 'La douzième année, le premier jour du douzième mois, la parole de l’Éternel me fut adressée, en ces mots:'
  '10':
  - type: text
    content: Je frapperai de stupeur beaucoup de peuples à cause de toi,
  - type: text
    content: Et leurs rois seront saisis d’épouvante à cause de toi,
  - type: text
    content: Quand j’agiterai mon épée devant leur face;
  - type: text
    content: Ils trembleront à tout instant chacun pour sa vie,
  - type: text
    content: Au jour de ta chute.
  '11':
  - type: text
    content: 'Car ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: L’épée du roi de Babylone fondra sur toi.
  '12':
  - type: text
    content: Je ferai tomber ta multitude par l’épée de vaillants hommes,
  - type: text
    content: 'Tous les '
  - type: note
    content: Éz 28:7; 31:12.
  - type: text
    content: plus violents d’entre les peuples;
  - type: text
    content: Ils anéantiront l’orgueil de l’Égypte,
  - type: text
    content: 'Et toute sa '
  - type: note
    content: Éz 31:2, 18.
  - type: text
    content: multitude sera détruite.
  '13':
  - type: text
    content: Je ferai périr tout son bétail près des grandes eaux;
  - type: text
    content: Le pied de l’homme ne les troublera plus,
  - type: text
    content: Le sabot des animaux ne les troublera plus.
  '14':
  - type: text
    content: Alors je calmerai ses eaux,
  - type: text
    content: Et je ferai couler ses fleuves comme l’huile,
  - type: text
    content: Dit le Seigneur, l’Éternel
  '15':
  - type: text
    content: Quand je ferai du pays d’Égypte une solitude,
  - type: text
    content: Et que le pays sera dépouillé de tout ce qu’il contient,
  - type: text
    content: Quand je frapperai tous ceux qui l’habitent,
  - type: text
    content: Ils sauront que je suis l’Éternel.
  '16':
  - type: text
    content: C’est là une complainte, et on la dira;
  - type: text
    content: Les filles des nations diront cette complainte;
  - type: text
    content: Elles la prononceront sur l’Égypte et sur toute sa multitude,
  - type: text
    content: Dit le Seigneur, l’Éternel.
  - type: heading
    content: 'V. 17-32: cf. Éz 31. És 14:4-20. Ec 9:10.'
  '17':
  - type: text
    content: 'La douzième année, le quinzième jour du mois, la parole de l’Éternel me fut adressée, en ces mots:'
  '18':
  - type: text
    content: Fils de l’homme,
  - type: text
    content: Lamente-toi sur la multitude d’Égypte, et précipite-la,
  - type: text
    content: Elle et les filles des nations puissantes,
  - type: text
    content: Dans les profondeurs de la terre,
  - type: text
    content: Avec ceux qui descendent dans la fosse!
  '19':
  - type: text
    content: Qui surpasses-tu en beauté?
  - type: text
    content: Descends, et couche-toi avec les incirconcis!
  '2':
  - type: text
    content: Fils de l’homme,
  - type: text
    content: Prononce une complainte sur Pharaon, roi d’Égypte!
  - type: text
    content: 'Tu lui diras: Tu ressemblais à un lionceau parmi les nations;'
  - type: text
    content: 'Tu étais comme un '
  - type: note
    content: Éz 29:3.
  - type: text
    content: crocodile dans les mers,
  - type: text
    content: Tu t’élançais dans tes fleuves,
  - type: text
    content: Tu troublais les eaux avec tes pieds,
  - type: text
    content: Tu agitais leurs flots.
  '20':
  - type: text
    content: Ils tomberont au milieu de ceux qui sont morts par l’épée.
  - type: text
    content: 'Le glaive est donné:'
  - type: text
    content: Entraînez l’Égypte et toute sa multitude!
  '21':
  - type: text
    content: Les puissants héros lui adresseront la parole
  - type: text
    content: Au sein du séjour des morts,
  - type: text
    content: Avec ceux qui étaient ses soutiens.
  - type: text
    content: Ils sont descendus, ils sont couchés, les incirconcis,
  - type: text
    content: Tués par l’épée.
  '22':
  - type: text
    content: Là est l’Assyrien, avec toute sa multitude,
  - type: text
    content: Et ses sépulcres sont autour de lui;
  - type: text
    content: Tous sont morts, sont tombés par l’épée.
  '23':
  - type: text
    content: Ses sépulcres sont dans les profondeurs de la fosse,
  - type: text
    content: Et sa multitude est autour de son sépulcre;
  - type: text
    content: Tous sont morts, sont tombés par l’épée;
  - type: text
    content: Eux qui répandaient la terreur dans le pays des vivants.
  '24':
  - type: text
    content: Là est Élam, avec toute sa multitude,
  - type: text
    content: Autour est son sépulcre;
  - type: text
    content: Tous sont morts, sont tombés par l’épée;
  - type: text
    content: Ils sont descendus incirconcis dans les profondeurs de la terre,
  - type: text
    content: Eux qui répandaient la terreur dans le pays des vivants,
  - type: text
    content: Et ils ont porté leur ignominie vers ceux qui descendent dans la fosse.
  '25':
  - type: text
    content: On a fait sa couche parmi les morts avec toute sa multitude,
  - type: text
    content: Et ses sépulcres sont autour de lui;
  - type: text
    content: Tous ces incirconcis sont morts par l’épée,
  - type: text
    content: Car ils répandaient la terreur dans le pays des vivants,
  - type: text
    content: Et ils ont porté leur ignominie vers ceux qui descendent dans la fosse;
  - type: text
    content: Ils ont été placés parmi les morts.
  '26':
  - type: text
    content: Là sont Méschec, Tubal, et toute leur multitude,
  - type: text
    content: Et leurs sépulcres sont autour d’eux;
  - type: text
    content: Tous ces incirconcis sont morts par l’épée,
  - type: text
    content: Car ils répandaient la terreur dans le pays des vivants.
  '27':
  - type: text
    content: Ils ne sont pas couchés avec les héros,
  - type: text
    content: Ceux qui sont tombés d’entre les incirconcis;
  - type: text
    content: Ils sont descendus au séjour des morts avec leurs armes de guerre,
  - type: text
    content: Ils ont mis leurs épées sous leurs têtes,
  - type: text
    content: Et leurs iniquités ont été sur leurs ossements;
  - type: text
    content: Car ils étaient la terreur des héros dans le pays des vivants.
  '28':
  - type: text
    content: Toi aussi, tu seras brisé au milieu des incirconcis;
  - type: text
    content: Tu seras couché avec ceux qui sont morts par l’épée.
  '29':
  - type: text
    content: Là sont Édom, ses rois et tous ses princes,
  - type: text
    content: Qui, malgré leur vaillance, ont été placés
  - type: text
    content: Avec ceux qui sont morts par l’épée;
  - type: text
    content: Ils sont couchés avec les incirconcis,
  - type: text
    content: Avec ceux qui descendent dans la fosse.
  '3':
  - type: text
    content: 'Ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: 'J’étendrai sur toi mon '
  - type: note
    content: Éz 12:13; 17:20.
  - type: text
    content: rets,
  - type: text
    content: Dans une foule nombreuse de peuples,
  - type: text
    content: Et ils te tireront dans mon filet.
  '30':
  - type: text
    content: Là sont tous les princes du septentrion, et tous les Sidoniens,
  - type: text
    content: Qui sont descendus vers les morts,
  - type: text
    content: Confus, malgré la terreur qu’inspirait leur vaillance;
  - type: text
    content: Ces incirconcis sont couchés avec ceux qui sont morts par l’épée,
  - type: text
    content: Et ils ont porté leur ignominie vers ceux qui descendent dans la fosse.
  '31':
  - type: text
    content: Pharaon les verra,
  - type: text
    content: Et il se consolera au sujet de toute sa multitude,
  - type: text
    content: Des siens qui sont morts par l’épée et de toute son armée,
  - type: text
    content: Dit le Seigneur, l’Éternel.
  '32':
  - type: text
    content: Car je répandrai ma terreur dans le pays des vivants;
  - type: text
    content: Et ils seront couchés au milieu des incirconcis,
  - type: text
    content: Avec ceux qui sont morts par l’épée,
  - type: text
    content: Pharaon et toute sa multitude,
  - type: text
    content: Dit le Seigneur, l’Éternel.
  '4':
  - type: text
    content: Je te laisserai à terre,
  - type: text
    content: Je te jetterai sur la face des champs;
  - type: text
    content: Je ferai reposer sur toi tous les oiseaux du ciel,
  - type: text
    content: Et je rassasierai de toi les bêtes de toute la terre.
  '5':
  - type: text
    content: Je mettrai ta chair sur les montagnes,
  - type: text
    content: Et je remplirai les vallées de tes débris;
  '6':
  - type: text
    content: J’arroserai de ton sang le pays où tu nages,
  - type: text
    content: Jusqu’aux montagnes,
  - type: text
    content: Et les ravins seront remplis de toi.
  '7':
  - type: text
    content: 'Quand je t’éteindrai, je voilerai les '
  - type: note
    content: És 13:10. Joë 2:31.
  - type: text
    content: cieux
  - type: text
    content: Et j’obscurcirai leurs étoiles,
  - type: text
    content: Je couvrirai le soleil de nuages,
  - type: text
    content: Et la lune ne donnera plus sa lumière.
  '8':
  - type: text
    content: J’obscurcirai à cause de toi tous les luminaires des cieux,
  - type: text
    content: Et je répandrai les ténèbres sur ton pays,
  - type: text
    content: Dit le Seigneur, l’Éternel.
  '9':
  - type: text
    content: J’affligerai le cœur de beaucoup de peuples,
  - type: text
    content: Quand j’annoncerai ta ruine parmi les nations
  - type: text
    content: A des pays que tu ne connaissais pas.
