document_id: PSA.128
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: Ps 112; 127:3, 4.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Cantique des degrés.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Heureux tout homme qui craint l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui marche dans ses voies!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tu jouis alors du travail de tes mains,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu es heureux, tu prospères.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ta femme est comme une vigne féconde
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans l’intérieur de ta maison;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tes fils sont comme des plants d’olivier,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Autour de ta table.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: C’est ainsi qu’est béni
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’homme qui craint l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: L’Éternel te bénira de Sion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tu verras le bonheur de Jérusalem
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous les jours de ta vie;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tu verras les fils de tes fils.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que la paix soit sur Israël!
