document_id: PSA.128,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ps 112; 127:3, 4.
  - type: text
    content: Cantique des degrés.
  - type: text
    content: Heureux tout homme qui craint l’Éternel,
  - type: text
    content: Qui marche dans ses voies!
  '2':
  - type: text
    content: Tu jouis alors du travail de tes mains,
  - type: text
    content: Tu es heureux, tu prospères.
  '3':
  - type: text
    content: Ta femme est comme une vigne féconde
  - type: text
    content: Dans l’intérieur de ta maison;
  - type: text
    content: Tes fils sont comme des plants d’olivier,
  - type: text
    content: Autour de ta table.
  '4':
  - type: text
    content: C’est ainsi qu’est béni
  - type: text
    content: L’homme qui craint l’Éternel.
  '5':
  - type: text
    content: L’Éternel te bénira de Sion,
  - type: text
    content: Et tu verras le bonheur de Jérusalem
  - type: text
    content: Tous les jours de ta vie;
  '6':
  - type: text
    content: Tu verras les fils de tes fils.
  - type: text
    content: Que la paix soit sur Israël!
