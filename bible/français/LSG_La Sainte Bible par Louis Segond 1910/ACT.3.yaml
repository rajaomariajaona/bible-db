document_id: ACT.3,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Guérison d’un boiteux
  - type: heading
    content: 'V. 1-11: cf. Ac 4:9-22; 9:32-35; 14:8-10.'
  - type: text
    content: 'Pierre et Jean montaient ensemble au temple, à l’heure de la prière: c’était la neuvième heure. '
  '10':
  - type: text
    content: 'Ils reconnaissaient que c’était celui qui était assis à la Belle porte du temple pour demander l’aumône, et ils furent remplis d’étonnement et de surprise au sujet de ce qui lui était arrivé. '
  '11':
  - type: text
    content: Comme il ne quittait pas Pierre et Jean, tout le peuple étonné accourut vers eux, au portique dit de Salomon.
  - type: heading
    content: Discours de Pierre au peuple
  - type: heading
    content: 'V. 12-26: cf. Ac 4:5-12; 2:22-36; 5:30-32.'
  '12':
  - type: text
    content: 'Pierre, voyant cela, dit au peuple: Hommes Israélites, pourquoi vous étonnez-vous de cela? Pourquoi avez-vous les regards fixés sur nous, comme si c’était par notre propre puissance ou par notre piété que nous eussions fait marcher cet homme? '
  '13':
  - type: text
    content: 'Le Dieu d’Abraham, d’Isaac et de Jacob, le Dieu de nos pères, a glorifié son serviteur Jésus, que vous avez livré et renié '
  - type: note
    content: Mt 27:20. Mc 15:11. Lu 23:18. Jn 18:40.
  - type: text
    content: 'devant Pilate, qui était d’avis qu’on le relâchât. '
  '14':
  - type: text
    content: 'Vous avez renié le Saint et le Juste, et vous avez demandé qu’on vous accordât la grâce d’un meurtrier. '
  '15':
  - type: note
    content: Ac 1:8; 2:32.
  - type: text
    content: 'Vous avez fait mourir le Prince de la vie, que Dieu a ressuscité des morts; nous en sommes témoins. '
  '16':
  - type: text
    content: 'C’est par la foi en son nom que son nom a raffermi celui que vous voyez et connaissez; c’est la foi en lui qui a donné à cet homme cette entière guérison, en présence de vous tous. '
  '17':
  - type: text
    content: 'Et maintenant, frères, je sais que vous avez agi par ignorance, ainsi que vos chefs. '
  '18':
  - type: text
    content: 'Mais Dieu a accompli de la sorte ce qu’il avait '
  - type: note
    content: És 50:6; 53:5. Lu 24:27.
  - type: text
    content: 'annoncé d’avance par la bouche de tous ses prophètes, que son Christ devait souffrir. '
  '19':
  - type: note
    content: Ac 2:38.
  - type: text
    content: 'Repentez-vous donc et convertissez-vous, pour que vos péchés soient effacés, '
  '2':
  - type: note
    content: Ac 14:8.
  - type: text
    content: 'Il y avait un homme boiteux de naissance, qu’on portait et qu’on plaçait tous les jours à la porte du temple appelée la Belle, '
  - type: note
    content: Jn 9:8.
  - type: text
    content: 'pour qu’il demandât l’aumône à ceux qui entraient dans le temple. '
  '20':
  - type: text
    content: 'afin que des temps de rafraîchissement viennent de la part du Seigneur, et qu’il envoie celui qui vous a été destiné, Jésus-Christ, '
  '21':
  - type: text
    content: 'que le ciel doit recevoir jusqu’aux temps du rétablissement de toutes choses, dont Dieu a parlé anciennement par la bouche de ses saints prophètes. '
  '22':
  - type: text
    content: 'Moïse a dit: '
  - type: note
    content: De 18:15; 18:19. Jn 1:46. Ac 7:37.
  - type: text
    content: 'Le Seigneur votre Dieu vous suscitera d’entre vos frères un prophète comme moi; vous l’écouterez dans tout ce qu’il vous dira, '
  '23':
  - type: text
    content: 'et quiconque n’écoutera pas ce prophète sera exterminé du milieu du peuple. '
  '24':
  - type: text
    content: 'Tous les prophètes qui ont successivement parlé, depuis Samuel, ont aussi annoncé ces jours-là. '
  '25':
  - type: text
    content: 'Vous êtes les fils des prophètes et de l’alliance que Dieu a traitée avec nos pères, en disant à Abraham: '
  - type: note
    content: Ge 22:18. Ga 3:8.
  - type: text
    content: 'Toutes les familles de la terre seront bénies en ta postérité. '
  '26':
  - type: text
    content: C’est à vous premièrement que Dieu, ayant suscité son serviteur, l’a envoyé pour vous bénir, en détournant chacun de vous de ses iniquités.
  '3':
  - type: text
    content: 'Cet homme, voyant Pierre et Jean qui allaient y entrer, leur demanda l’aumône. '
  '4':
  - type: text
    content: 'Pierre, de même que Jean, fixa les yeux sur lui, et dit: Regarde-nous. '
  '5':
  - type: text
    content: 'Et il les regardait attentivement, s’attendant à recevoir d’eux quelque chose. '
  '6':
  - type: text
    content: 'Alors Pierre lui dit: Je n’ai ni argent, ni or; mais ce que j’ai, je te le donne: '
  - type: note
    content: Ac 4:10.
  - type: text
    content: 'au nom de Jésus-Christ de Nazareth, lève-toi et marche. '
  '7':
  - type: text
    content: 'Et le prenant par la main droite, il le fit lever. Au même instant, ses pieds et ses chevilles devinrent fermes; '
  '8':
  - type: text
    content: 'd’un saut il fut debout, et il se mit à marcher. Il entra avec eux dans le temple, marchant, sautant, et louant Dieu. '
  '9':
  - type: text
    content: 'Tout le monde le vit marchant et louant Dieu. '
