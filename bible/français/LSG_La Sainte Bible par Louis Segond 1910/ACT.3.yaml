document_id: ACT.3,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Guérison d’un boiteux
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-11: cf. Ac 4:9-22; 9:32-35; 14:8-10.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pierre et Jean montaient ensemble au temple, à l’heure de la prière: c’était la neuvième heure. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils reconnaissaient que c’était celui qui était assis à la Belle porte du temple pour demander l’aumône, et ils furent remplis d’étonnement et de surprise au sujet de ce qui lui était arrivé. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Comme il ne quittait pas Pierre et Jean, tout le peuple étonné accourut vers eux, au portique dit de Salomon.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Discours de Pierre au peuple
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 12-26: cf. Ac 4:5-12; 2:22-36; 5:30-32.'
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pierre, voyant cela, dit au peuple: Hommes Israélites, pourquoi vous étonnez-vous de cela? Pourquoi avez-vous les regards fixés sur nous, comme si c’était par notre propre puissance ou par notre piété que nous eussions fait marcher cet homme? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le Dieu d’Abraham, d’Isaac et de Jacob, le Dieu de nos pères, a glorifié son serviteur Jésus, que vous avez livré et renié '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 27:20
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 15:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 23:18
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 18:40
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'devant Pilate, qui était d’avis qu’on le relâchât. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous avez renié le Saint et le Juste, et vous avez demandé qu’on vous accordât la grâce d’un meurtrier. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 1:8
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2:32
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Vous avez fait mourir le Prince de la vie, que Dieu a ressuscité des morts; nous en sommes témoins. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est par la foi en son nom que son nom a raffermi celui que vous voyez et connaissez; c’est la foi en lui qui a donné à cet homme cette entière guérison, en présence de vous tous. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et maintenant, frères, je sais que vous avez agi par ignorance, ainsi que vos chefs. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Dieu a accompli de la sorte ce qu’il avait '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 50:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 53:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 24:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'annoncé d’avance par la bouche de tous ses prophètes, que son Christ devait souffrir. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 2:38
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Repentez-vous donc et convertissez-vous, pour que vos péchés soient effacés, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 14:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Il y avait un homme boiteux de naissance, qu’on portait et qu’on plaçait tous les jours à la porte du temple appelée la Belle, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 9:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'pour qu’il demandât l’aumône à ceux qui entraient dans le temple. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'afin que des temps de rafraîchissement viennent de la part du Seigneur, et qu’il envoie celui qui vous a été destiné, Jésus-Christ, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'que le ciel doit recevoir jusqu’aux temps du rétablissement de toutes choses, dont Dieu a parlé anciennement par la bouche de ses saints prophètes. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse a dit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 18:15
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 1:46
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 7:37
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Le Seigneur votre Dieu vous suscitera d’entre vos frères un prophète comme moi; vous l’écouterez dans tout ce qu’il vous dira, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et quiconque n’écoutera pas ce prophète sera exterminé du milieu du peuple. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tous les prophètes qui ont successivement parlé, depuis Samuel, ont aussi annoncé ces jours-là. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous êtes les fils des prophètes et de l’alliance que Dieu a traitée avec nos pères, en disant à Abraham: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 22:18
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 3:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Toutes les familles de la terre seront bénies en ta postérité. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: C’est à vous premièrement que Dieu, ayant suscité son serviteur, l’a envoyé pour vous bénir, en détournant chacun de vous de ses iniquités.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cet homme, voyant Pierre et Jean qui allaient y entrer, leur demanda l’aumône. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pierre, de même que Jean, fixa les yeux sur lui, et dit: Regarde-nous. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et il les regardait attentivement, s’attendant à recevoir d’eux quelque chose. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Pierre lui dit: Je n’ai ni argent, ni or; mais ce que j’ai, je te le donne: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 4:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'au nom de Jésus-Christ de Nazareth, lève-toi et marche. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et le prenant par la main droite, il le fit lever. Au même instant, ses pieds et ses chevilles devinrent fermes; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'd’un saut il fut debout, et il se mit à marcher. Il entra avec eux dans le temple, marchant, sautant, et louant Dieu. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tout le monde le vit marchant et louant Dieu. '
