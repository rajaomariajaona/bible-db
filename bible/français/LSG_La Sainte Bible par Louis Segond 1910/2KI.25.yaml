document_id: 2KI.25,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 36:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 32:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 39:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 52:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'La neuvième année du règne de Sédécias, le dixième jour du dixième mois, Nebucadnetsar, roi de Babylone, vint avec toute son armée contre Jérusalem; il campa devant elle, et éleva des retranchements tout autour. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toute l’armée des Chaldéens, qui était avec le chef des gardes, démolit les murailles formant l’enceinte de Jérusalem. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nebuzaradan, chef des gardes, emmena captifs ceux du peuple qui étaient demeurés dans la ville, ceux qui s’étaient rendus au roi de Babylone, et le reste de la multitude. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cependant le chef des gardes laissa comme vignerons et comme laboureurs quelques-uns des plus pauvres du pays. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les Chaldéens brisèrent '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 20:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 20:5
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 27:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'les colonnes d’airain qui étaient dans la maison de l’Éternel, les bases, la mer d’airain qui était dans la maison de l’Éternel, et ils en emportèrent l’airain à Babylone. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils prirent les cendriers, les pelles, les couteaux, les tasses, et tous les ustensiles d’airain avec lesquels on faisait le service. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le chef des gardes prit encore les brasiers et les coupes, ce qui était d’or et ce qui était d’argent. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les deux colonnes, la mer, et les bases, que Salomon avait faites pour la maison de l’Éternel, tous ces ustensiles d’airain avaient un poids inconnu. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 7:15
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 3:15
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 52:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'La hauteur d’une colonne était de dix-huit coudées, et il y avait au-dessus un chapiteau d’airain dont la hauteur était de trois coudées; autour du chapiteau il y avait un treillis et des grenades, le tout d’airain; il en était de même pour la seconde colonne avec le treillis. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le chef des gardes prit Seraja, le souverain sacrificateur, Sophonie, le second sacrificateur, et les trois gardiens du seuil. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et dans la ville il prit un eunuque qui avait sous son commandement les gens de guerre, cinq hommes qui faisaient partie des conseillers du roi et qui furent trouvés dans la ville, le secrétaire du chef de l’armée qui était chargé d’enrôler le peuple du pays, et soixante hommes du peuple du pays qui se trouvèrent dans la ville. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La ville fut assiégée jusqu’à la onzième année du roi Sédécias. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nebuzaradan, chef des gardes, les prit, et les conduisit vers le roi de Babylone à Ribla. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le roi de Babylone les frappa et les fit mourir à Ribla, dans le pays de Hamath.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 22-26: cf. Jé 40 à 43.'
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 40:5
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '9'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Ainsi Juda fut emmené captif loin de son pays. Et Nebucadnetsar, roi de Babylone, plaça le reste du peuple, qu’il laissa dans le pays de Juda, sous le commandement de Guedalia, fils d’Achikam, fils de Schaphan. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 40:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Lorsque tous les chefs des troupes eurent appris, eux et leurs hommes, que le roi de Babylone avait établi Guedalia pour gouverneur, ils se rendirent auprès de Guedalia à Mitspa, savoir Ismaël, fils de Nethania, Jochanan, fils de Karéach, Seraja, fils de Thanhumeth, de Nethopha, et Jaazania, fils du Maacathien, eux et leurs hommes. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Guedalia leur jura, à eux et à leurs hommes, et leur dit: Ne craignez rien de la part des serviteurs des Chaldéens; demeurez dans le pays, servez le roi de Babylone, et vous vous en trouverez bien. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais au septième mois, Ismaël, fils de Nethania, fils d’Élischama, de la race royale, vint, accompagné de dix hommes, et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 41:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'ils frappèrent mortellement Guedalia, ainsi que les Juifs et les Chaldéens qui étaient avec lui à Mitspa. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors tout le peuple, depuis le plus petit jusqu’au plus grand, et les chefs des troupes, se levèrent et s’en allèrent en Égypte, parce qu’ils avaient peur des Chaldéens.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 27-30: cf. Jé 52:31-34. Ps 102.'
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La trente-septième année de la captivité de Jojakin, roi de Juda, le vingt-septième jour du douzième mois, Évil-Merodac, roi de Babylone, dans la première année de son règne, releva la tête de Jojakin, roi de Juda, et le tira de prison. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il lui parla avec bonté, et il mit son trône au-dessus du trône des rois qui étaient avec lui à Babylone. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il lui fit changer ses vêtements de prison, et Jojakin mangea toujours à sa table tout le temps de sa vie. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le neuvième jour du mois, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 52:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'la famine était forte dans la ville, et il n’y avait pas de pain pour le peuple du pays. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le roi pourvut constamment à son entretien journalier tout le temps de sa vie.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors la brèche fut faite à la ville; et tous les gens de guerre s’enfuirent de nuit par le chemin de la porte entre les deux murs près du jardin du roi, pendant que les Chaldéens environnaient la ville. Les fuyards prirent le chemin de la plaine. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais l’armée des Chaldéens poursuivit le roi et l’atteignit dans les plaines de Jéricho, et toute son armée se dispersa loin de lui. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils saisirent le roi, et le firent monter vers le roi de Babylone à Ribla; et l’on prononça contre lui une sentence. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les fils de Sédécias furent égorgés en sa présence; puis on creva les yeux à Sédécias, on le lia avec des chaînes d’airain, et on le mena à Babylone.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les habitants du royaume de Juda emmenés en captivité
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 8-21: cf. (Jé 52:12-27; 39:8, etc. 2 Ch 36:17-21.) (Ps 74; 79. La 1 à 5.) De 29:25-28.'
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le septième jour du cinquième mois, c’était la dix-neuvième année du règne de Nebucadnetsar, roi de Babylone, Nebuzaradan, chef des gardes, serviteur du roi de Babylone, entra dans Jérusalem. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il brûla la maison de l’Éternel, la maison du roi, et toutes les maisons de Jérusalem; il livra au feu toutes les maisons de quelque importance. '
