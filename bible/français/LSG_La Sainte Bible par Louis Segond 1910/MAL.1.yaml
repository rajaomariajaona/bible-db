document_id: MAL.1
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ingratitude du peuple, et censures contre les sacrificateurs
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-5: cf. Ro 9:10-13. (Éz 35. Ab 1.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Oracle, parole de l’Éternel à Israël par Malachie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Je vous ai aimés, dit l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et vous dites: En quoi nous as-tu aimés?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ésaü n’est-il pas frère de Jacob? Dit l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 9:13
      metadata:
        usfm: ROM.9.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Cependant j’ai aimé Jacob,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Et j’ai eu de la haine pour Ésaü,
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’ai fait de ses montagnes une solitude,
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’ai livré son héritage aux chacals du désert.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Si Édom dit: Nous sommes détruits,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous relèverons les ruines!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ainsi parle l’Éternel des armées:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’ils bâtissent, je renverserai,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et on les appellera pays de la méchanceté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Peuple contre lequel l’Éternel est irrité pour toujours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Vos yeux le verront,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et vous direz: Grand est l’Éternel'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Par delà les frontières d’Israël!
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 6-14: cf. Mal 2:1-9. Lé 22:18-25. Pr 15:8. Ps 66:18.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Un fils honore son père, et un serviteur son maître.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si je suis père, où est l’honneur qui m’est dû?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si je suis maître, où est la crainte qu’on a de moi?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit l’Éternel des armées à vous, sacrificateurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui méprisez mon nom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et qui dites: En quoi avons-nous méprisé ton nom?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Vous offrez sur mon autel des aliments impurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et vous dites: En quoi t’avons-nous profané?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'C’est en disant: La table de l’Éternel est méprisable!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Quand vous offrez en sacrifice une bête aveugle, n’est-ce pas mal?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand vous en offrez une boiteuse ou infirme, n’est-ce pas mal?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Offre-la donc à ton gouverneur!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Te recevra-t-il bien, te fera-t-il bon accueil?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit l’Éternel des armées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Priez Dieu maintenant, pour qu’il ait pitié de nous!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'C’est de vous que cela vient:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous recevra-t-il favorablement?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit l’Éternel des armées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Lequel de vous fermera les portes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour que vous n’allumiez pas en vain le feu sur mon autel?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je ne prends aucun plaisir en vous, dit l’Éternel des armées,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 1:11
      metadata:
        usfm: ISA.1.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 6:20
      metadata:
        usfm: JER.6.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Am 5:21
      metadata:
        usfm: AMO.5.21
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '22'
      metadata:
        usfm: AMO.5.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et les offrandes de votre main
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne me sont point agréables.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Car depuis le lever du soleil jusqu’à son couchant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon nom est grand parmi les nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et en tout lieu on brûle de l’encens en l’honneur de mon nom
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et l’on présente des offrandes pures;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car grand est mon nom parmi les nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit l’Éternel des armées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mais vous, vous le profanez,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'En disant: La table de l’Éternel est souillée,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ce qu’elle rapporte est un aliment méprisable.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Vous dites: Quelle fatigue! Et vous le dédaignez,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit l’Éternel des armées;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et cependant vous amenez ce qui est dérobé, boiteux ou infirme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ce sont les offrandes que vous faites!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Puis-je les agréer de vos mains? Dit l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Maudit soit le trompeur qui a dans son troupeau un mâle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui voue et sacrifie au Seigneur une bête chétive!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car je suis un grand roi, dit l’Éternel des armées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et mon nom est redoutable parmi les nations.
