document_id: MAL.1,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ingratitude du peuple, et censures contre les sacrificateurs
  - type: heading
    content: 'V. 1-5: cf. Ro 9:10-13. (Éz 35. Ab 1.)'
  - type: text
    content: Oracle, parole de l’Éternel à Israël par Malachie.
  '10':
  - type: text
    content: Lequel de vous fermera les portes,
  - type: text
    content: Pour que vous n’allumiez pas en vain le feu sur mon autel?
  - type: text
    content: Je ne prends aucun plaisir en vous, dit l’Éternel des armées,
  - type: note
    content: És 1:11. Jé 6:20. Am 5:21, 22.
  - type: text
    content: Et les offrandes de votre main
  - type: text
    content: ne me sont point agréables.
  '11':
  - type: text
    content: Car depuis le lever du soleil jusqu’à son couchant,
  - type: text
    content: Mon nom est grand parmi les nations,
  - type: text
    content: Et en tout lieu on brûle de l’encens en l’honneur de mon nom
  - type: text
    content: Et l’on présente des offrandes pures;
  - type: text
    content: Car grand est mon nom parmi les nations,
  - type: text
    content: Dit l’Éternel des armées.
  '12':
  - type: text
    content: Mais vous, vous le profanez,
  - type: text
    content: 'En disant: La table de l’Éternel est souillée,'
  - type: text
    content: Et ce qu’elle rapporte est un aliment méprisable.
  '13':
  - type: text
    content: 'Vous dites: Quelle fatigue! Et vous le dédaignez,'
  - type: text
    content: Dit l’Éternel des armées;
  - type: text
    content: Et cependant vous amenez ce qui est dérobé, boiteux ou infirme,
  - type: text
    content: Et ce sont les offrandes que vous faites!
  - type: text
    content: Puis-je les agréer de vos mains? Dit l’Éternel.
  '14':
  - type: text
    content: Maudit soit le trompeur qui a dans son troupeau un mâle,
  - type: text
    content: Et qui voue et sacrifie au Seigneur une bête chétive!
  - type: text
    content: Car je suis un grand roi, dit l’Éternel des armées,
  - type: text
    content: Et mon nom est redoutable parmi les nations.
  '2':
  - type: text
    content: Je vous ai aimés, dit l’Éternel.
  - type: text
    content: 'Et vous dites: En quoi nous as-tu aimés?'
  - type: text
    content: Ésaü n’est-il pas frère de Jacob? Dit l’Éternel.
  - type: note
    content: Ro 9:13.
  - type: text
    content: Cependant j’ai aimé Jacob,
  '3':
  - type: text
    content: Et j’ai eu de la haine pour Ésaü,
  - type: text
    content: J’ai fait de ses montagnes une solitude,
  - type: text
    content: J’ai livré son héritage aux chacals du désert.
  '4':
  - type: text
    content: 'Si Édom dit: Nous sommes détruits,'
  - type: text
    content: Nous relèverons les ruines!
  - type: text
    content: 'Ainsi parle l’Éternel des armées:'
  - type: text
    content: Qu’ils bâtissent, je renverserai,
  - type: text
    content: Et on les appellera pays de la méchanceté,
  - type: text
    content: Peuple contre lequel l’Éternel est irrité pour toujours.
  '5':
  - type: text
    content: Vos yeux le verront,
  - type: text
    content: 'Et vous direz: Grand est l’Éternel'
  - type: text
    content: Par delà les frontières d’Israël!
  - type: heading
    content: 'V. 6-14: cf. Mal 2:1-9. Lé 22:18-25. Pr 15:8. Ps 66:18.'
  '6':
  - type: text
    content: Un fils honore son père, et un serviteur son maître.
  - type: text
    content: Si je suis père, où est l’honneur qui m’est dû?
  - type: text
    content: Si je suis maître, où est la crainte qu’on a de moi?
  - type: text
    content: Dit l’Éternel des armées à vous, sacrificateurs,
  - type: text
    content: Qui méprisez mon nom,
  - type: text
    content: 'Et qui dites: En quoi avons-nous méprisé ton nom?'
  '7':
  - type: text
    content: Vous offrez sur mon autel des aliments impurs,
  - type: text
    content: 'Et vous dites: En quoi t’avons-nous profané?'
  - type: text
    content: 'C’est en disant: La table de l’Éternel est méprisable!'
  '8':
  - type: text
    content: Quand vous offrez en sacrifice une bête aveugle, n’est-ce pas mal?
  - type: text
    content: Quand vous en offrez une boiteuse ou infirme, n’est-ce pas mal?
  - type: text
    content: Offre-la donc à ton gouverneur!
  - type: text
    content: Te recevra-t-il bien, te fera-t-il bon accueil?
  - type: text
    content: Dit l’Éternel des armées.
  '9':
  - type: text
    content: Priez Dieu maintenant, pour qu’il ait pitié de nous!
  - type: text
    content: 'C’est de vous que cela vient:'
  - type: text
    content: Vous recevra-t-il favorablement?
  - type: text
    content: Dit l’Éternel des armées.
