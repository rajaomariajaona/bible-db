document_id: ISA.31,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Contre l’alliance avec l’Égypte
  - type: heading
    content: 'V. 1-3: cf. És 30:1-7; 36:6, 9. Ps 20:8, 9.'
  - type: text
    content: Malheur à ceux qui descendent en Égypte pour avoir du secours,
  - type: text
    content: 'Qui s’appuient '
  - type: note
    content: Ps 20:8. Jé 17:5.
  - type: text
    content: sur des chevaux,
  - type: text
    content: Et se fient à la multitude des chars et à la force des cavaliers,
  - type: text
    content: Mais qui ne regardent pas vers le Saint d’Israël,
  - type: text
    content: Et ne recherchent pas l’Éternel!
  '2':
  - type: text
    content: Lui aussi, cependant, il est sage, il fait venir le malheur,
  - type: text
    content: Et ne retire point ses paroles;
  - type: text
    content: Il s’élève contre la maison des méchants,
  - type: text
    content: Et contre le secours de ceux qui commettent l’iniquité.
  '3':
  - type: text
    content: L’Égyptien est homme et non dieu;
  - type: text
    content: Ses chevaux sont chair et non esprit.
  - type: text
    content: Quand l’Éternel étendra sa main,
  - type: text
    content: Le protecteur chancellera, le protégé tombera,
  - type: text
    content: Et tous ensemble ils périront.
  - type: heading
    content: L’Éternel seul délivre Jérusalem
  - type: heading
    content: 'V. 4-9: cf. És 30:27, etc.; 37:26, etc. Pr 21:30, 31.'
  '4':
  - type: text
    content: 'Car ainsi m’a parlé l’Éternel:'
  - type: text
    content: Comme le lion, comme le lionceau rugit sur sa proie,
  - type: text
    content: Et, malgré tous les bergers rassemblés contre lui,
  - type: text
    content: Ne se laisse ni effrayer par leur voix,
  - type: text
    content: Ni intimider par leur nombre;
  - type: text
    content: De même l’Éternel des armées descendra
  - type: text
    content: Pour combattre sur la montagne de Sion et sur sa colline.
  '5':
  - type: text
    content: ' '
  - type: note
    content: De 32:11.
  - type: text
    content: Comme des oiseaux déploient les ailes sur leur couvée,
  - type: text
    content: Ainsi l’Éternel des armées étendra sa protection sur Jérusalem;
  - type: text
    content: Il protégera et délivrera,
  - type: text
    content: Il épargnera et sauvera.
  '6':
  - type: text
    content: Revenez à celui dont on s’est profondément détourné,
  - type: text
    content: Enfants d’Israël!
  '7':
  - type: text
    content: 'En '
  - type: note
    content: És 2:20.
  - type: text
    content: ce jour, chacun rejettera ses idoles d’argent et ses idoles d’or,
  - type: text
    content: Que vous vous êtes fabriquées de vos mains criminelles.
  '8':
  - type: text
    content: Et l’Assyrien tombera sous un glaive qui n’est pas celui d’un homme,
  - type: text
    content: Et un glaive qui n’est pas celui d’un homme le dévorera;
  - type: text
    content: Il s’enfuira devant le glaive,
  - type: text
    content: Et ses jeunes guerriers seront asservis.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 2 R 19:36, 37.
  - type: text
    content: Son rocher s’enfuira d’épouvante,
  - type: text
    content: Et ses chefs trembleront devant la bannière,
  - type: text
    content: Dit l’Éternel, qui a son feu dans Sion
  - type: text
    content: Et sa fournaise dans Jérusalem.
