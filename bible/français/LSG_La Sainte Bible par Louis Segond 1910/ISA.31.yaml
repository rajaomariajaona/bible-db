document_id: ISA.31,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Contre l’alliance avec l’Égypte
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-3: cf. És 30:1-7; 36:6, 9. Ps 20:8, 9.'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Malheur à ceux qui descendent en Égypte pour avoir du secours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Qui s’appuient '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 20:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 17:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: sur des chevaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et se fient à la multitude des chars et à la force des cavaliers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais qui ne regardent pas vers le Saint d’Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ne recherchent pas l’Éternel!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Lui aussi, cependant, il est sage, il fait venir le malheur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ne retire point ses paroles;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il s’élève contre la maison des méchants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et contre le secours de ceux qui commettent l’iniquité.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: L’Égyptien est homme et non dieu;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses chevaux sont chair et non esprit.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand l’Éternel étendra sa main,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le protecteur chancellera, le protégé tombera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tous ensemble ils périront.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’Éternel seul délivre Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 4-9: cf. És 30:27, etc.; 37:26, etc. Pr 21:30, 31.'
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Car ainsi m’a parlé l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme le lion, comme le lionceau rugit sur sa proie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et, malgré tous les bergers rassemblés contre lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne se laisse ni effrayer par leur voix,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ni intimider par leur nombre;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De même l’Éternel des armées descendra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour combattre sur la montagne de Sion et sur sa colline.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 32:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Comme des oiseaux déploient les ailes sur leur couvée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi l’Éternel des armées étendra sa protection sur Jérusalem;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il protégera et délivrera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il épargnera et sauvera.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Revenez à celui dont on s’est profondément détourné,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Enfants d’Israël!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'En '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 2:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: ce jour, chacun rejettera ses idoles d’argent et ses idoles d’or,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que vous vous êtes fabriquées de vos mains criminelles.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Et l’Assyrien tombera sous un glaive qui n’est pas celui d’un homme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et un glaive qui n’est pas celui d’un homme le dévorera;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il s’enfuira devant le glaive,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ses jeunes guerriers seront asservis.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 19:36
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '37'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Son rocher s’enfuira d’épouvante,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ses chefs trembleront devant la bannière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit l’Éternel, qui a son feu dans Sion
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et sa fournaise dans Jérusalem.
