  children:
  - type: text
    text: Malheur aux riches et aux grands d’Israël
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-14: cf. (Am 4:1-3; 3:9-15. És 5:8-14; 28:1-4.) Ja 5:1-6.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Malheur à ceux qui vivent tranquilles dans Sion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et en sécurité sur la montagne de Samarie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'A ces grands de la '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 19:5
      metadata:
        usfm: EXO.19.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 2:3
      metadata:
        usfm: JER.2.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: première des nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Auprès desquels va la maison d’Israël!…
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Passez à Calné et voyez,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Allez de là jusqu’à Hamath la grande,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et descendez à Gath chez les Philistins:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ces villes sont-elles plus prospères que vos deux royaumes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et leur territoire est-il plus étendu que le vôtre?…
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Vous croyez '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Am 5:18
      metadata:
        usfm: AMO.5.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'éloigné le '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 12:27
      metadata:
        usfm: EZK.12.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: jour du malheur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et vous faites approcher le règne de la violence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ils reposent sur des lits d’ivoire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils sont mollement étendus sur leurs couches;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils mangent les agneaux du troupeau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les veaux mis à l’engrais.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ils extravaguent au son du '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 5:12
      metadata:
        usfm: ISA.5.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: luth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils se croient habiles comme David sur les instruments de musique.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ils '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 5:11
      metadata:
        usfm: ISA.5.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: boivent le vin dans de larges coupes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils s’oignent avec la meilleure huile,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et ils ne '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 5:12
      metadata:
        usfm: ISA.5.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: s’attristent pas sur la ruine de Joseph!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'C’est pourquoi ils seront emmenés à la tête des '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 5:13
      metadata:
        usfm: ISA.5.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: captifs;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les cris de joie de ces voluptueux cesseront.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Le Seigneur, l’Éternel, l’a juré par lui-même;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'L’Éternel, le Dieu des armées, a dit:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’ai en horreur l’orgueil de Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je hais ses palais;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je livrerai la ville et tout ce qu’elle renferme.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Et s’il reste dix hommes dans une maison, ils mourront.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Lorsqu’un parent prendra un mort pour le brûler
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qu’il enlèvera de la maison les ossements,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Il dira à celui qui est au fond de la maison:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Y a-t-il encore quelqu’un avec toi?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et cet homme répondra: Personne…'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et l’autre dira: Silence!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce n’est pas le moment de prononcer le nom de l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Car voici, l’Éternel ordonne:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il fera tomber en ruines la grande maison,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et en débris la petite maison.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Est-ce que les chevaux courent sur un rocher,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Est-ce qu’on y laboure avec des bœufs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour que vous ayez changé la droiture en poison,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et le fruit de la justice en '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Am 5:7
      metadata:
        usfm: AMO.5.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: absinthe?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Vous vous réjouissez de ce qui n’est que néant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Vous dites: N’est-ce pas par notre force'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que nous avons acquis de la puissance?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: C’est pourquoi voici, je ferai lever contre vous, maison d’Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit l’Éternel, le Dieu des armées, une nation
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui vous opprimera depuis l’entrée de Hamath
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jusqu’au torrent du désert.
