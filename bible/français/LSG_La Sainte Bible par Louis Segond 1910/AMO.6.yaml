document_id: AMO.6,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Malheur aux riches et aux grands d’Israël
  - type: heading
    content: 'V. 1-14: cf. (Am 4:1-3; 3:9-15. És 5:8-14; 28:1-4.) Ja 5:1-6.'
  - type: text
    content: Malheur à ceux qui vivent tranquilles dans Sion,
  - type: text
    content: Et en sécurité sur la montagne de Samarie,
  - type: text
    content: 'A ces grands de la '
  - type: note
    content: Ex 19:5. Jé 2:3.
  - type: text
    content: première des nations,
  - type: text
    content: Auprès desquels va la maison d’Israël!…
  '10':
  - type: text
    content: Lorsqu’un parent prendra un mort pour le brûler
  - type: text
    content: Et qu’il enlèvera de la maison les ossements,
  - type: text
    content: 'Il dira à celui qui est au fond de la maison:'
  - type: text
    content: Y a-t-il encore quelqu’un avec toi?
  - type: text
    content: 'Et cet homme répondra: Personne…'
  - type: text
    content: 'Et l’autre dira: Silence!'
  - type: text
    content: Ce n’est pas le moment de prononcer le nom de l’Éternel.
  '11':
  - type: text
    content: 'Car voici, l’Éternel ordonne:'
  - type: text
    content: Il fera tomber en ruines la grande maison,
  - type: text
    content: Et en débris la petite maison.
  '12':
  - type: text
    content: Est-ce que les chevaux courent sur un rocher,
  - type: text
    content: Est-ce qu’on y laboure avec des bœufs,
  - type: text
    content: Pour que vous ayez changé la droiture en poison,
  - type: text
    content: 'Et le fruit de la justice en '
  - type: note
    content: Am 5:7.
  - type: text
    content: absinthe?
  '13':
  - type: text
    content: Vous vous réjouissez de ce qui n’est que néant,
  - type: text
    content: 'Vous dites: N’est-ce pas par notre force'
  - type: text
    content: Que nous avons acquis de la puissance?
  '14':
  - type: text
    content: C’est pourquoi voici, je ferai lever contre vous, maison d’Israël,
  - type: text
    content: Dit l’Éternel, le Dieu des armées, une nation
  - type: text
    content: Qui vous opprimera depuis l’entrée de Hamath
  - type: text
    content: Jusqu’au torrent du désert.
  '2':
  - type: text
    content: Passez à Calné et voyez,
  - type: text
    content: Allez de là jusqu’à Hamath la grande,
  - type: text
    content: 'Et descendez à Gath chez les Philistins:'
  - type: text
    content: Ces villes sont-elles plus prospères que vos deux royaumes,
  - type: text
    content: Et leur territoire est-il plus étendu que le vôtre?…
  '3':
  - type: text
    content: 'Vous croyez '
  - type: note
    content: Am 5:18.
  - type: text
    content: 'éloigné le '
  - type: note
    content: Éz 12:27.
  - type: text
    content: jour du malheur,
  - type: text
    content: Et vous faites approcher le règne de la violence.
  '4':
  - type: text
    content: Ils reposent sur des lits d’ivoire,
  - type: text
    content: Ils sont mollement étendus sur leurs couches;
  - type: text
    content: Ils mangent les agneaux du troupeau,
  - type: text
    content: Les veaux mis à l’engrais.
  '5':
  - type: text
    content: 'Ils extravaguent au son du '
  - type: note
    content: És 5:12.
  - type: text
    content: luth,
  - type: text
    content: Ils se croient habiles comme David sur les instruments de musique.
  '6':
  - type: text
    content: 'Ils '
  - type: note
    content: És 5:11.
  - type: text
    content: boivent le vin dans de larges coupes,
  - type: text
    content: Ils s’oignent avec la meilleure huile,
  - type: text
    content: 'Et ils ne '
  - type: note
    content: És 5:12.
  - type: text
    content: s’attristent pas sur la ruine de Joseph!
  '7':
  - type: text
    content: 'C’est pourquoi ils seront emmenés à la tête des '
  - type: note
    content: És 5:13.
  - type: text
    content: captifs;
  - type: text
    content: Et les cris de joie de ces voluptueux cesseront.
  '8':
  - type: text
    content: Le Seigneur, l’Éternel, l’a juré par lui-même;
  - type: text
    content: 'L’Éternel, le Dieu des armées, a dit:'
  - type: text
    content: J’ai en horreur l’orgueil de Jacob,
  - type: text
    content: Et je hais ses palais;
  - type: text
    content: Je livrerai la ville et tout ce qu’elle renferme.
  '9':
  - type: text
    content: Et s’il reste dix hommes dans une maison, ils mourront.
