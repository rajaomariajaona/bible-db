document_id: 2CO.12
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-10: cf. (No 12:6-8. Ac 22:17.) (Ga 4:13, 14. 1 Co 2:3-5. 2 Co 4:7-10.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Il faut se glorifier… Cela n’est pas bon. J’en viendrai néanmoins à des visions et à des révélations du Seigneur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 9:3
      metadata:
        usfm: ACT.9.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 22:17
      metadata:
        usfm: ACT.22.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 15:8
      metadata:
        usfm: 1CO.15.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Je connais un homme en Christ, qui fut, il y a quatorze ans, ravi jusqu’au troisième ciel (si ce fut dans son corps je ne sais, si ce fut hors de son corps je ne sais, Dieu le sait). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Et je sais que cet homme (si ce fut dans son corps ou sans son corps je ne sais, Dieu le sait) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'fut enlevé dans le paradis, et qu’il entendit des paroles ineffables qu’il n’est pas permis à un homme d’exprimer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Je me glorifierai d’un tel homme, mais de moi-même je ne me glorifierai pas, sinon de mes infirmités. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Si je voulais me glorifier, je ne serais pas un insensé, car je dirais la vérité; mais je m’en abstiens, afin que personne n’ait à mon sujet une opinion supérieure à ce qu’il voit en moi ou à ce qu’il entend de moi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Et pour que je ne sois pas enflé d’orgueil, à cause de l’excellence de ces révélations, il m’a été mis une écharde dans la chair, un ange de Satan '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 2:6
      metadata:
        usfm: JOB.2.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'pour me souffleter et m’empêcher de m’enorgueillir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Trois fois j’ai prié le Seigneur de l’éloigner de moi, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'et il m’a dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ma grâce te suffit, car ma puissance s’accomplit dans la faiblesse.
  - type: text
    text: ' Je me glorifierai donc bien plus volontiers de mes faiblesses, afin que la puissance de Christ repose sur moi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: C’est pourquoi je me plais dans les faiblesses, dans les outrages, dans les calamités, dans les persécutions, dans les détresses, pour Christ; car, quand je suis faible, c’est alors que je suis fort.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 11-21: cf. 2 Co 11; 13:1-10.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'J’ai été un insensé: vous m’y avez contraint. C’est par vous que je devais être recommandé, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 15:10
      metadata:
        usfm: 1CO.15.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'car je n’ai été inférieur en rien aux apôtres par excellence, quoique je ne sois rien. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 9:2
      metadata:
        usfm: 1CO.9.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Les preuves de mon apostolat ont éclaté au milieu de vous par une patience à toute épreuve, par des signes, des prodiges et des miracles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'En quoi avez-vous été traités moins favorablement que les autres Églises, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 9:12
      metadata:
        usfm: 1CO.9.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 11:9
      metadata:
        usfm: 2CO.11.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'sinon en ce que je ne vous ai point été à charge? Pardonnez-moi ce tort. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Voici, pour la troisième fois je suis prêt à aller chez vous, et je ne vous serai point à charge; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 20:33
      metadata:
        usfm: ACT.20.33
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'car ce ne sont pas vos biens que je cherche, c’est vous-mêmes. Ce n’est pas, en effet, aux enfants à amasser pour leurs parents, mais aux parents pour leurs enfants. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Pour moi, je dépenserai très volontiers, et je me dépenserai moi-même pour vos âmes, dussé-je, en vous aimant '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 6:12
      metadata:
        usfm: 2CO.6.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'davantage, être moins aimé de vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Soit! Je ne vous ai point été à charge; mais, en homme astucieux, je vous ai pris par ruse! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ai-je tiré du profit de vous par quelqu’un de ceux que je vous ai envoyés? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'J’ai engagé Tite à aller chez vous, et avec lui j’ai envoyé le frère: est-ce que Tite a exigé quelque chose de vous? N’avons-nous pas marché dans le même esprit, sur les mêmes traces? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Vous vous imaginez depuis longtemps que nous nous justifions auprès de vous. C’est devant Dieu, en Christ, que nous parlons; et tout cela, bien-aimés, nous le disons pour votre édification. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Car je crains de ne pas vous trouver, à mon arrivée, tels que je voudrais, et d’être moi-même trouvé par vous tel que vous ne voudriez pas. Je crains de trouver des querelles, de la jalousie, des animosités, des cabales, des médisances, des calomnies, de l’orgueil, des troubles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Je crains qu’à mon arrivée mon Dieu ne m’humilie de nouveau à votre sujet, et que je n’aie à pleurer sur plusieurs de ceux qui ont péché précédemment et qui ne se sont pas repentis de l’impureté, de l’impudicité et des dissolutions auxquelles ils se sont livrés.
