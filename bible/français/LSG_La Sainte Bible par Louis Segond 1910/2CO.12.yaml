document_id: 2CO.12,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-10: cf. (No 12:6-8. Ac 22:17.) (Ga 4:13, 14. 1 Co 2:3-5. 2 Co 4:7-10.)'
  - type: text
    content: 'Il faut se glorifier… Cela n’est pas bon. J’en viendrai néanmoins à des visions et à des révélations du Seigneur. '
  '10':
  - type: text
    content: C’est pourquoi je me plais dans les faiblesses, dans les outrages, dans les calamités, dans les persécutions, dans les détresses, pour Christ; car, quand je suis faible, c’est alors que je suis fort.
  - type: heading
    content: 'V. 11-21: cf. 2 Co 11; 13:1-10.'
  '11':
  - type: text
    content: 'J’ai été un insensé: vous m’y avez contraint. C’est par vous que je devais être recommandé, '
  - type: note
    content: 1 Co 15:10.
  - type: text
    content: 'car je n’ai été inférieur en rien aux apôtres par excellence, quoique je ne sois rien. '
  '12':
  - type: note
    content: 1 Co 9:2.
  - type: text
    content: 'Les preuves de mon apostolat ont éclaté au milieu de vous par une patience à toute épreuve, par des signes, des prodiges et des miracles. '
  '13':
  - type: text
    content: 'En quoi avez-vous été traités moins favorablement que les autres Églises, '
  - type: note
    content: 1 Co 9:12. 2 Co 11:9.
  - type: text
    content: 'sinon en ce que je ne vous ai point été à charge? Pardonnez-moi ce tort. '
  '14':
  - type: text
    content: 'Voici, pour la troisième fois je suis prêt à aller chez vous, et je ne vous serai point à charge; '
  - type: note
    content: Ac 20:33.
  - type: text
    content: 'car ce ne sont pas vos biens que je cherche, c’est vous-mêmes. Ce n’est pas, en effet, aux enfants à amasser pour leurs parents, mais aux parents pour leurs enfants. '
  '15':
  - type: text
    content: 'Pour moi, je dépenserai très volontiers, et je me dépenserai moi-même pour vos âmes, dussé-je, en vous aimant '
  - type: note
    content: 2 Co 6:12.
  - type: text
    content: 'davantage, être moins aimé de vous. '
  '16':
  - type: text
    content: 'Soit! Je ne vous ai point été à charge; mais, en homme astucieux, je vous ai pris par ruse! '
  '17':
  - type: text
    content: 'Ai-je tiré du profit de vous par quelqu’un de ceux que je vous ai envoyés? '
  '18':
  - type: text
    content: 'J’ai engagé Tite à aller chez vous, et avec lui j’ai envoyé le frère: est-ce que Tite a exigé quelque chose de vous? N’avons-nous pas marché dans le même esprit, sur les mêmes traces? '
  '19':
  - type: text
    content: 'Vous vous imaginez depuis longtemps que nous nous justifions auprès de vous. C’est devant Dieu, en Christ, que nous parlons; et tout cela, bien-aimés, nous le disons pour votre édification. '
  '2':
  - type: note
    content: Ac 9:3; 22:17. 1 Co 15:8.
  - type: text
    content: 'Je connais un homme en Christ, qui fut, il y a quatorze ans, ravi jusqu’au troisième ciel (si ce fut dans son corps je ne sais, si ce fut hors de son corps je ne sais, Dieu le sait). '
  '20':
  - type: text
    content: 'Car je crains de ne pas vous trouver, à mon arrivée, tels que je voudrais, et d’être moi-même trouvé par vous tel que vous ne voudriez pas. Je crains de trouver des querelles, de la jalousie, des animosités, des cabales, des médisances, des calomnies, de l’orgueil, des troubles. '
  '21':
  - type: text
    content: Je crains qu’à mon arrivée mon Dieu ne m’humilie de nouveau à votre sujet, et que je n’aie à pleurer sur plusieurs de ceux qui ont péché précédemment et qui ne se sont pas repentis de l’impureté, de l’impudicité et des dissolutions auxquelles ils se sont livrés.
  '3':
  - type: text
    content: 'Et je sais que cet homme (si ce fut dans son corps ou sans son corps je ne sais, Dieu le sait) '
  '4':
  - type: text
    content: 'fut enlevé dans le paradis, et qu’il entendit des paroles ineffables qu’il n’est pas permis à un homme d’exprimer. '
  '5':
  - type: text
    content: 'Je me glorifierai d’un tel homme, mais de moi-même je ne me glorifierai pas, sinon de mes infirmités. '
  '6':
  - type: text
    content: 'Si je voulais me glorifier, je ne serais pas un insensé, car je dirais la vérité; mais je m’en abstiens, afin que personne n’ait à mon sujet une opinion supérieure à ce qu’il voit en moi ou à ce qu’il entend de moi. '
  '7':
  - type: text
    content: 'Et pour que je ne sois pas enflé d’orgueil, à cause de l’excellence de ces révélations, il m’a été mis une écharde dans la chair, un ange de Satan '
  - type: note
    content: Job 2:6.
  - type: text
    content: 'pour me souffleter et m’empêcher de m’enorgueillir. '
  '8':
  - type: text
    content: 'Trois fois j’ai prié le Seigneur de l’éloigner de moi, '
  '9':
  - type: text
    content: 'et il m’a dit: '
  - type: text
    content: Ma grâce te suffit, car ma puissance s’accomplit dans la faiblesse.
  - type: text
    content: ' Je me glorifierai donc bien plus volontiers de mes faiblesses, afin que la puissance de Christ repose sur moi. '
