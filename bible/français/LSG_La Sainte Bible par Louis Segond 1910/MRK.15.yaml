document_id: MRK.15,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus devant Pilate, gouverneur romain
  - type: heading
    content: 'V. 1-5: cf. (Mt 27:1, 2, 11-14. Lu 22:66-71; 23:1-4. Jn 18:28-38.)'
  - type: text
    content: ' '
  - type: note
    content: Ps 2:2. Mt 27:1. Lu 22:66; 23:1. Jn 18:28.
  - type: text
    content: 'Dès le matin, les principaux sacrificateurs tinrent conseil avec les anciens et les scribes, et tout le sanhédrin. Après avoir lié Jésus, ils l’emmenèrent, et le livrèrent '
  - type: note
    content: Ac 3:13.
  - type: text
    content: 'à Pilate. '
  '10':
  - type: text
    content: 'Car il savait que c’était par envie que les principaux sacrificateurs l’avaient livré. '
  '11':
  - type: note
    content: Mt 27:20. Lu 23:18. Jn 18:40. Ac 3:14.
  - type: text
    content: 'Mais les chefs des sacrificateurs excitèrent la foule, afin que Pilate leur relâchât plutôt Barabbas. '
  '12':
  - type: text
    content: 'Pilate, reprenant la parole, leur dit: Que voulez-vous donc que je fasse de celui que vous appelez le roi des Juifs? '
  '13':
  - type: text
    content: 'Ils crièrent de nouveau: Crucifie-le! '
  '14':
  - type: text
    content: 'Pilate leur dit: Quel mal a-t-il fait? Et ils crièrent encore plus fort: Crucifie-le! '
  '15':
  - type: note
    content: Mt 27:26. Jn 19:1.
  - type: text
    content: 'Pilate, voulant satisfaire la foule, leur relâcha Barabbas; et, après avoir fait battre de verges Jésus, il le livra pour être crucifié. '
  '16':
  - type: note
    content: Mt 27:27. Jn 19:2.
  - type: text
    content: 'Les soldats conduisirent Jésus dans l’intérieur de la cour, c’est-à-dire, dans le prétoire, et ils assemblèrent toute la cohorte. '
  '17':
  - type: text
    content: 'Ils le revêtirent de pourpre, et posèrent sur sa tête une couronne d’épines, qu’ils avaient tressée. '
  '18':
  - type: text
    content: 'Puis ils se mirent à le saluer: Salut, roi des Juifs! '
  '19':
  - type: text
    content: 'Et ils lui frappaient la tête avec un roseau, crachaient sur lui, et, fléchissant les genoux, ils se prosternaient devant lui. '
  '2':
  - type: note
    content: Mt 27:11. Lu 23:3. Jn 18:33.
  - type: text
    content: 'Pilate l’interrogea: Es-tu le roi des Juifs? Jésus lui répondit: '
  - type: text
    content: Tu le dis.
  - type: text
    content: ' '
  '20':
  - type: text
    content: Après s’être ainsi moqués de lui, ils lui ôtèrent la pourpre, lui remirent ses vêtements, et l’emmenèrent pour le crucifier.
  - type: heading
    content: Jésus crucifié
  - type: heading
    content: 'V. 21-28: cf. (Mt 27:32-38. Lu 23:26-34, 38. Jn 19:17-24.) Ga 3:13. Jn 3:14, 15.'
  '21':
  - type: text
    content: ' '
  - type: note
    content: Mt 27:32. Lu 23:26.
  - type: text
    content: 'Ils forcèrent à porter la croix de Jésus un passant qui revenait des champs, Simon de Cyrène, père d’Alexandre et de Rufus; '
  '22':
  - type: note
    content: Mt 27:33. Lu 23:33. Jn 19:17.
  - type: text
    content: 'et ils conduisirent Jésus au lieu nommé Golgotha, ce qui signifie lieu du crâne. '
  '23':
  - type: text
    content: 'Ils lui donnèrent à boire du vin mêlé de myrrhe, mais il ne le prit pas. '
  '24':
  - type: note
    content: Mt 27:35. Lu 23:34. Jn 19:23.
  - type: text
    content: 'Ils le crucifièrent, et '
  - type: note
    content: Ps 22:19.
  - type: text
    content: 'se partagèrent ses vêtements, en tirant au sort pour savoir ce que chacun aurait. '
  '25':
  - type: text
    content: 'C’était la troisième heure, quand ils le crucifièrent. '
  '26':
  - type: note
    content: Mt 27:37. Lu 23:38. Jn 19:19.
  - type: text
    content: 'L’inscription indiquant le sujet de sa condamnation portait ces mots: Le roi des Juifs. '
  '27':
  - type: text
    content: 'Ils crucifièrent avec lui deux brigands, l’un à sa droite, et l’autre à sa gauche. '
  '28':
  - type: note
    content: És 53:12. Lu 22:37.
  - type: text
    content: 'Ainsi fut accompli ce que dit l’Écriture: Il a été mis au nombre des malfaiteurs.'
  - type: heading
    content: 'V. 29-32: cf. (Mt 27:39-44. Lu 23:35-43. Jn 19:25-27.)'
  '29':
  - type: text
    content: ' '
  - type: note
    content: Ps 22:8; 69:21; 109:25. Mt 27:39. Lu 23:35.
  - type: text
    content: 'Les passants l’injuriaient, et secouaient la tête, en disant: Hé! '
  - type: note
    content: Jn 2:19.
  - type: text
    content: 'toi qui détruis le temple, et qui le rebâtis en trois jours, '
  '3':
  - type: text
    content: 'Les principaux sacrificateurs portaient contre lui plusieurs accusations. '
  '30':
  - type: text
    content: 'sauve-toi toi-même, en descendant de la croix! '
  '31':
  - type: text
    content: 'Les principaux sacrificateurs aussi, avec les scribes, se moquaient entre eux, et disaient: Il a sauvé les autres, et il ne peut se sauver lui-même! '
  '32':
  - type: text
    content: Que le Christ, le roi d’Israël, descende maintenant de la croix, afin que nous voyions et que nous croyions! Ceux qui étaient crucifiés avec lui l’insultaient aussi.
  - type: heading
    content: 'V. 33-41: cf. (Mt 27:45-56. Lu 23:44-49. Jn 19:28-37.) (Ps 22. És 53:5, etc.) Jn 1:29; 10:11; 12:32, 33. Ro 5:6-8. 2 Co 5:14, 15, 21.'
  '33':
  - type: text
    content: ' '
  - type: note
    content: Mt 27:45. Lu 23:44.
  - type: text
    content: 'La sixième heure étant venue, il y eut des ténèbres sur toute la terre, jusqu’à la neuvième heure. '
  '34':
  - type: text
    content: 'Et à la neuvième heure, Jésus s’écria d’une voix forte: '
  - type: note
    content: Ps 22:2. Mt 27:46.
  - type: text
    content: Éloï, Éloï, lama sabachthani?
  - type: text
    content: ' ce qui signifie: Mon Dieu, mon Dieu, pourquoi m’as-tu abandonné? '
  '35':
  - type: text
    content: 'Quelques-uns de ceux qui étaient là, l’ayant entendu, dirent: Voici, il appelle Élie. '
  '36':
  - type: note
    content: Ps 69:22. Jn 19:29.
  - type: text
    content: 'Et l’un d’eux courut remplir une éponge de vinaigre, et, l’ayant fixée à un roseau, il lui donna à boire, en disant: Laissez, voyons si Élie viendra le descendre. '
  '37':
  - type: text
    content: 'Mais Jésus, ayant poussé un grand cri, expira. '
  '38':
  - type: note
    content: 2 Co 3:14. Mt 27:51. Lu 23:45.
  - type: text
    content: 'Le voile du temple se déchira en deux, depuis le haut jusqu’en bas. '
  '39':
  - type: note
    content: Mt 27:54. Lu 23:47.
  - type: text
    content: 'Le centenier, qui était en face de Jésus, voyant qu’il avait expiré de la sorte, dit: Assurément, cet homme était Fils de Dieu. '
  '4':
  - type: note
    content: Mt 27:13. Jn 19:10.
  - type: text
    content: 'Pilate l’interrogea de nouveau: Ne réponds-tu rien? Vois de combien de choses ils t’accusent. '
  '40':
  - type: note
    content: Mt 27:55. Lu 23:49.
  - type: text
    content: 'Il y avait aussi des femmes '
  - type: note
    content: Ps 38:12.
  - type: text
    content: 'qui regardaient de loin. Parmi elles étaient Marie de Magdala, Marie, mère de Jacques le mineur et de Joses, et Salomé, '
  '41':
  - type: text
    content: 'qui le suivaient et '
  - type: note
    content: Lu 8:2, 3.
  - type: text
    content: le servaient lorsqu’il était en Galilée, et plusieurs autres qui étaient montées avec lui à Jérusalem.
  - type: heading
    content: Le corps de Jésus mis dans un sépulcre
  - type: heading
    content: 'V. 42-47: cf. (Mt 27:57-61. Lu 23:50-56. Jn 19:38-42.)'
  '42':
  - type: text
    content: ' '
  - type: note
    content: Mt 27:57. Lu 23:50. Jn 19:38.
  - type: text
    content: 'Le soir étant venu, comme c’était la préparation, c’est-à-dire, la veille du sabbat, '
  '43':
  - type: text
    content: 'arriva Joseph d’Arimathée, conseiller de distinction, qui lui-même attendait aussi le royaume de Dieu. Il osa se rendre vers Pilate, pour demander le corps de Jésus. '
  '44':
  - type: text
    content: 'Pilate s’étonna qu’il fût mort si tôt; fit venir le centenier et lui demanda s’il était mort depuis longtemps. '
  '45':
  - type: text
    content: 'S’en étant assuré par le centenier, il donna le corps à Joseph. '
  '46':
  - type: text
    content: 'Et Joseph, ayant acheté un linceul, descendit Jésus de la croix, l’enveloppa du linceul, '
  - type: note
    content: Mt 12:40; 26:12; 27:60. Lu 23:53.
  - type: text
    content: 'et le déposa dans un sépulcre taillé dans le roc. Puis il roula une pierre à l’entrée du sépulcre. '
  '47':
  - type: text
    content: Marie de Magdala, et Marie, mère de Joses, regardaient où on le mettait.
  '5':
  - type: text
    content: Et Jésus ne fit plus aucune réponse, ce qui étonna Pilate.
  - type: heading
    content: Sentence de mort confirmée. Outrages des soldats
  - type: heading
    content: 'V. 6-20: cf. (Mt 27:15-31. Lu 23:13-25. Jn 18:39, 40; 19:1-16.)'
  '6':
  - type: text
    content: ' '
  - type: note
    content: Mt 27:15. Lu 23:17. Jn 18:39.
  - type: text
    content: 'A chaque fête, il relâchait un prisonnier, celui que demandait la foule. '
  '7':
  - type: note
    content: Mt 27:16. Lu 23:19. Jn 18:40.
  - type: text
    content: 'Il y avait en prison un nommé Barabbas avec ses complices, pour un meurtre qu’ils avaient commis dans une sédition. '
  '8':
  - type: text
    content: 'La foule, étant montée, se mit à demander ce qu’il avait coutume de leur accorder. '
  '9':
  - type: text
    content: 'Pilate leur répondit: Voulez-vous que je vous relâche le roi des Juifs? '
