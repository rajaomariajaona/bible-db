document_id: ISA.2,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Gloire future d’Israël. Jugement contre les infidèles
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-5: cf. Mi 4:1-5. És 11:4-10.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Prophétie d’Ésaïe, fils d’Amots, sur Juda et Jérusalem.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Entre dans les rochers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et cache-toi dans la poussière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour éviter la terreur de l’Éternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’éclat de sa majesté.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 5:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: L’homme au regard hautain sera abaissé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et l’orgueilleux sera humilié:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel seul sera élevé ce jour-là.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car il y a un jour pour l’Éternel des armées
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Contre tout homme orgueilleux et hautain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Contre quiconque s’élève, afin qu’il soit abaissé;
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Contre tous les cèdres du Liban, hauts et élevés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et contre tous les chênes de Basan;
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Contre toutes les hautes montagnes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et contre toutes les collines élevées;
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Contre toutes les hautes tours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et contre toutes les murailles fortifiées;
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Contre tous les navires de Tarsis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et contre tout ce qui plaît à la vue.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’homme orgueilleux sera humilié,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et le hautain sera abaissé:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel seul sera élevé ce jour-là.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toutes les idoles disparaîtront.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On entrera dans les cavernes des rochers
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et dans les profondeurs de la poussière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour éviter la terreur de l’Éternel et l’éclat de sa majesté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand il se lèvera pour effrayer la terre.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il arrivera, dans la suite des temps,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mi 4:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Que la montagne de la maison de l’Éternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sera fondée sur le sommet des montagnes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’elle s’élèvera par-dessus les collines,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que toutes les nations y afflueront.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En ce jour, les hommes jetteront
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leurs idoles d’argent et leurs idoles d’or,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’ils s’étaient faites pour les adorer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aux rats et aux chauves-souris;
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils entreront dans les fentes des rochers
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et dans les creux des pierres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour éviter la terreur de l’Éternel et l’éclat de sa majesté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand il se lèvera pour effrayer la terre.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cessez de vous confier en l’homme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dans les narines duquel il n’y a qu’un souffle:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car de quelle valeur est-il?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Des peuples s’y rendront en foule, et diront:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Venez, et montons à la montagne de l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A la maison du Dieu de Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afin qu’il nous enseigne ses voies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que nous marchions dans ses sentiers.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 110:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: de Sion sortira la loi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et de Jérusalem la parole de l’Éternel.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il sera le juge des nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’arbitre d’un grand nombre de peuples.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Joë 3:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: De leurs glaives ils forgeront des hoyaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et de leurs lances des serpes:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Une nation ne tirera plus l’épée contre une autre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’on n’apprendra plus la guerre.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maison de Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Venez, et marchons à la lumière de l’Éternel!
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 6-8: cf. 2 R 17:7-20.'
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car tu as abandonné ton peuple, la maison de Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce qu’ils sont pleins de l’Orient,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et adonnés à la magie comme les Philistins,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et parce qu’ils s’allient aux fils des étrangers.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le pays est rempli d’argent et d’or,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il y a des trésors sans fin;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le pays est rempli de chevaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il y a des chars sans nombre.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le pays est rempli d’idoles;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils se prosternent devant l’ouvrage de leurs mains,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Devant ce que leurs doigts ont fabriqué.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 9-22: cf. (És 5:15, 16; 13:11. Ps 76:8-13. Lu 16:15. Ap 6:15-17.)'
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Les petits seront abattus, et les grands seront abaissés:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu ne leur pardonneras point.
