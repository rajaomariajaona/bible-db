document_id: ISA.2,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Gloire future d’Israël. Jugement contre les infidèles
  - type: heading
    content: 'V. 1-5: cf. Mi 4:1-5. És 11:4-10.'
  - type: text
    content: Prophétie d’Ésaïe, fils d’Amots, sur Juda et Jérusalem.
  '10':
  - type: text
    content: Entre dans les rochers,
  - type: text
    content: Et cache-toi dans la poussière,
  - type: text
    content: Pour éviter la terreur de l’Éternel
  - type: text
    content: Et l’éclat de sa majesté.
  '11':
  - type: text
    content: ' '
  - type: note
    content: És 5:15.
  - type: text
    content: L’homme au regard hautain sera abaissé,
  - type: text
    content: 'Et l’orgueilleux sera humilié:'
  - type: text
    content: L’Éternel seul sera élevé ce jour-là.
  '12':
  - type: text
    content: Car il y a un jour pour l’Éternel des armées
  - type: text
    content: Contre tout homme orgueilleux et hautain,
  - type: text
    content: Contre quiconque s’élève, afin qu’il soit abaissé;
  '13':
  - type: text
    content: Contre tous les cèdres du Liban, hauts et élevés,
  - type: text
    content: Et contre tous les chênes de Basan;
  '14':
  - type: text
    content: Contre toutes les hautes montagnes,
  - type: text
    content: Et contre toutes les collines élevées;
  '15':
  - type: text
    content: Contre toutes les hautes tours,
  - type: text
    content: Et contre toutes les murailles fortifiées;
  '16':
  - type: text
    content: Contre tous les navires de Tarsis,
  - type: text
    content: Et contre tout ce qui plaît à la vue.
  '17':
  - type: text
    content: L’homme orgueilleux sera humilié,
  - type: text
    content: 'Et le hautain sera abaissé:'
  - type: text
    content: L’Éternel seul sera élevé ce jour-là.
  '18':
  - type: text
    content: Toutes les idoles disparaîtront.
  '19':
  - type: text
    content: On entrera dans les cavernes des rochers
  - type: text
    content: Et dans les profondeurs de la poussière,
  - type: text
    content: Pour éviter la terreur de l’Éternel et l’éclat de sa majesté,
  - type: text
    content: Quand il se lèvera pour effrayer la terre.
  '2':
  - type: text
    content: Il arrivera, dans la suite des temps,
  - type: note
    content: Mi 4:1.
  - type: text
    content: Que la montagne de la maison de l’Éternel
  - type: text
    content: Sera fondée sur le sommet des montagnes,
  - type: text
    content: Qu’elle s’élèvera par-dessus les collines,
  - type: text
    content: Et que toutes les nations y afflueront.
  '20':
  - type: text
    content: En ce jour, les hommes jetteront
  - type: text
    content: Leurs idoles d’argent et leurs idoles d’or,
  - type: text
    content: Qu’ils s’étaient faites pour les adorer,
  - type: text
    content: Aux rats et aux chauves-souris;
  '21':
  - type: text
    content: Et ils entreront dans les fentes des rochers
  - type: text
    content: Et dans les creux des pierres,
  - type: text
    content: Pour éviter la terreur de l’Éternel et l’éclat de sa majesté,
  - type: text
    content: Quand il se lèvera pour effrayer la terre.
  '22':
  - type: text
    content: Cessez de vous confier en l’homme,
  - type: text
    content: 'Dans les narines duquel il n’y a qu’un souffle:'
  - type: text
    content: Car de quelle valeur est-il?
  '3':
  - type: text
    content: 'Des peuples s’y rendront en foule, et diront:'
  - type: text
    content: Venez, et montons à la montagne de l’Éternel,
  - type: text
    content: A la maison du Dieu de Jacob,
  - type: text
    content: Afin qu’il nous enseigne ses voies,
  - type: text
    content: Et que nous marchions dans ses sentiers.
  - type: text
    content: 'Car '
  - type: note
    content: Ps 110:2.
  - type: text
    content: de Sion sortira la loi,
  - type: text
    content: Et de Jérusalem la parole de l’Éternel.
  '4':
  - type: text
    content: Il sera le juge des nations,
  - type: text
    content: L’arbitre d’un grand nombre de peuples.
  - type: note
    content: Joë 3:10.
  - type: text
    content: De leurs glaives ils forgeront des hoyaux,
  - type: text
    content: 'Et de leurs lances des serpes:'
  - type: text
    content: Une nation ne tirera plus l’épée contre une autre,
  - type: text
    content: Et l’on n’apprendra plus la guerre.
  '5':
  - type: text
    content: Maison de Jacob,
  - type: text
    content: Venez, et marchons à la lumière de l’Éternel!
  - type: heading
    content: 'V. 6-8: cf. 2 R 17:7-20.'
  '6':
  - type: text
    content: Car tu as abandonné ton peuple, la maison de Jacob,
  - type: text
    content: Parce qu’ils sont pleins de l’Orient,
  - type: text
    content: Et adonnés à la magie comme les Philistins,
  - type: text
    content: Et parce qu’ils s’allient aux fils des étrangers.
  '7':
  - type: text
    content: Le pays est rempli d’argent et d’or,
  - type: text
    content: Et il y a des trésors sans fin;
  - type: text
    content: Le pays est rempli de chevaux,
  - type: text
    content: Et il y a des chars sans nombre.
  '8':
  - type: text
    content: Le pays est rempli d’idoles;
  - type: text
    content: Ils se prosternent devant l’ouvrage de leurs mains,
  - type: text
    content: Devant ce que leurs doigts ont fabriqué.
  - type: heading
    content: 'V. 9-22: cf. (És 5:15, 16; 13:11. Ps 76:8-13. Lu 16:15. Ap 6:15-17.)'
  '9':
  - type: text
    content: 'Les petits seront abattus, et les grands seront abaissés:'
  - type: text
    content: Tu ne leur pardonneras point.
