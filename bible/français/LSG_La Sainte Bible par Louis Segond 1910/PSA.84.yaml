document_id: PSA.84,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2 S 15:25, 26. (Ps 42; 43; 63.)
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au chef des chantres. Sur la guitthith. Des fils de Koré. Psaume.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toi qui es notre bouclier, vois, ô Dieu!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et regarde la face de ton oint!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mieux vaut un jour dans tes parvis que mille ailleurs;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je préfère me tenir sur le seuil de la maison de mon Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Plutôt que d’habiter sous les tentes de la méchanceté.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car l’Éternel Dieu est un soleil et un bouclier,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel donne la grâce et la gloire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne refuse aucun bien à ceux qui marchent dans l’intégrité.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Éternel des armées!
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 2:12
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 34:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Heureux l’homme qui se confie en toi!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que tes demeures sont aimables,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Éternel des armées!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 42:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 63:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Mon âme soupire et languit après les parvis de l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon cœur et ma chair poussent des cris vers le Dieu vivant.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le passereau même trouve une maison,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’hirondelle un nid où elle dépose ses petits…
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes autels, Éternel des armées!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon roi et mon Dieu!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Heureux ceux qui habitent ta maison!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ils peuvent te célébrer encore. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: — Pause.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Heureux ceux qui placent en toi leur appui!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils trouvent dans leur cœur des chemins tout tracés.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lorsqu’ils traversent la vallée de Baca,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils la transforment en un lieu plein de sources,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la pluie la couvre aussi de bénédictions.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leur force augmente pendant la marche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils se présentent devant Dieu à Sion.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Éternel, Dieu des armées, écoute ma prière!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Prête l’oreille, Dieu de Jacob! '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: — Pause.
