document_id: PSA.84,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 2 S 15:25, 26. (Ps 42; 43; 63.)
  - type: text
    content: Au chef des chantres. Sur la guitthith. Des fils de Koré. Psaume.
  '10':
  - type: text
    content: Toi qui es notre bouclier, vois, ô Dieu!
  - type: text
    content: Et regarde la face de ton oint!
  '11':
  - type: text
    content: Mieux vaut un jour dans tes parvis que mille ailleurs;
  - type: text
    content: Je préfère me tenir sur le seuil de la maison de mon Dieu,
  - type: text
    content: Plutôt que d’habiter sous les tentes de la méchanceté.
  '12':
  - type: text
    content: Car l’Éternel Dieu est un soleil et un bouclier,
  - type: text
    content: L’Éternel donne la grâce et la gloire,
  - type: text
    content: Il ne refuse aucun bien à ceux qui marchent dans l’intégrité.
  '13':
  - type: text
    content: Éternel des armées!
  - type: note
    content: Ps 2:12; 34:9.
  - type: text
    content: Heureux l’homme qui se confie en toi!
  '2':
  - type: text
    content: Que tes demeures sont aimables,
  - type: text
    content: Éternel des armées!
  '3':
  - type: text
    content: ' '
  - type: note
    content: Ps 42:2; 63:2.
  - type: text
    content: Mon âme soupire et languit après les parvis de l’Éternel,
  - type: text
    content: Mon cœur et ma chair poussent des cris vers le Dieu vivant.
  '4':
  - type: text
    content: Le passereau même trouve une maison,
  - type: text
    content: Et l’hirondelle un nid où elle dépose ses petits…
  - type: text
    content: Tes autels, Éternel des armées!
  - type: text
    content: Mon roi et mon Dieu!
  '5':
  - type: text
    content: Heureux ceux qui habitent ta maison!
  - type: text
    content: 'Ils peuvent te célébrer encore. '
  - type: text
    content: — Pause.
  '6':
  - type: text
    content: Heureux ceux qui placent en toi leur appui!
  - type: text
    content: Ils trouvent dans leur cœur des chemins tout tracés.
  '7':
  - type: text
    content: Lorsqu’ils traversent la vallée de Baca,
  - type: text
    content: Ils la transforment en un lieu plein de sources,
  - type: text
    content: Et la pluie la couvre aussi de bénédictions.
  '8':
  - type: text
    content: Leur force augmente pendant la marche,
  - type: text
    content: Et ils se présentent devant Dieu à Sion.
  '9':
  - type: text
    content: Éternel, Dieu des armées, écoute ma prière!
  - type: text
    content: 'Prête l’oreille, Dieu de Jacob! '
  - type: text
    content: — Pause.
