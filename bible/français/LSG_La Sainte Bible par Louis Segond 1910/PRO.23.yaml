document_id: PRO.23,93
type_code: fra
verses:
  '1':
  - type: text
    content: Si tu es à table avec un grand,
  - type: text
    content: Fais attention à ce qui est devant toi;
  '10':
  - type: text
    content: ' '
  - type: note
    content: Pr 22:28.
  - type: text
    content: Ne déplace pas la borne ancienne,
  - type: text
    content: Et n’entre pas dans le champ des orphelins;
  '11':
  - type: text
    content: 'Car leur vengeur est puissant:'
  - type: text
    content: Il défendra leur cause contre toi.
  '12':
  - type: text
    content: Ouvre ton cœur à l’instruction,
  - type: text
    content: Et tes oreilles aux paroles de la science.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Pr 13:24; 19:18; 22:15; 29:15, 17.
  - type: text
    content: N’épargne pas la correction à l’enfant;
  - type: text
    content: Si tu le frappes de la verge, il ne mourra point.
  '14':
  - type: text
    content: En le frappant de la verge,
  - type: text
    content: Tu délivres son âme du séjour des morts.
  '15':
  - type: text
    content: Mon fils, si ton cœur est sage,
  - type: text
    content: Mon cœur à moi sera dans la joie;
  '16':
  - type: text
    content: Mes entrailles seront émues d’allégresse,
  - type: text
    content: Quand tes lèvres diront ce qui est droit.
  '17':
  - type: text
    content: ' '
  - type: note
    content: Ps 37:1; 73:3. Pr 24:1.
  - type: text
    content: Que ton cœur n’envie point les pécheurs,
  - type: text
    content: Mais qu’il ait toujours la crainte de l’Éternel;
  '18':
  - type: text
    content: ' '
  - type: note
    content: Pr 24:14.
  - type: text
    content: Car il est un avenir,
  - type: text
    content: Et ton espérance ne sera pas anéantie.
  '19':
  - type: text
    content: Écoute, mon fils, et sois sage;
  - type: text
    content: Dirige ton cœur dans la voie droite.
  '2':
  - type: text
    content: Mets un couteau à ta gorge,
  - type: text
    content: Si tu as trop d’avidité.
  '20':
  - type: text
    content: ' '
  - type: note
    content: És 5:22. Lu 21:34. Ro 13:13. Ép 5:18.
  - type: text
    content: Ne sois pas parmi les buveurs de vin,
  - type: text
    content: 'Parmi ceux qui font excès des viandes:'
  '21':
  - type: text
    content: Car l’ivrogne et celui qui se livre à des excès s’appauvrissent,
  - type: text
    content: Et l’assoupissement fait porter des haillons.
  '22':
  - type: text
    content: ' '
  - type: note
    content: Pr 1:8.
  - type: text
    content: Écoute ton père, lui qui t’a engendré,
  - type: text
    content: Et ne méprise pas ta mère, quand elle est devenue vieille.
  '23':
  - type: text
    content: ' '
  - type: note
    content: Pr 4:7.
  - type: text
    content: Acquiers la vérité, et ne la vends pas,
  - type: text
    content: La sagesse, l’instruction et l’intelligence.
  '24':
  - type: text
    content: ' '
  - type: note
    content: Pr 10:1; 15:20.
  - type: text
    content: Le père du juste est dans l’allégresse,
  - type: text
    content: Celui qui donne naissance à un sage aura de la joie.
  '25':
  - type: text
    content: Que ton père et ta mère se réjouissent,
  - type: text
    content: Que celle qui t’a enfanté soit dans l’allégresse!
  '26':
  - type: text
    content: Mon fils, donne-moi ton cœur,
  - type: text
    content: Et que tes yeux se plaisent dans mes voies.
  '27':
  - type: text
    content: ' '
  - type: note
    content: Pr 22:14.
  - type: text
    content: Car la prostituée est une fosse profonde,
  - type: text
    content: Et l’étrangère un puits étroit.
  '28':
  - type: text
    content: Elle dresse des embûches comme un brigand,
  - type: text
    content: Et elle augmente parmi les hommes le nombre des perfides.
  '29':
  - type: text
    content: Pour qui les ah? Pour qui les hélas?
  - type: text
    content: Pour qui les disputes? Pour qui les plaintes?
  - type: text
    content: Pour qui les blessures sans raison? Pour qui les yeux rouges?
  '3':
  - type: text
    content: 'Ne convoite pas ses friandises:'
  - type: text
    content: C’est un aliment trompeur.
  '30':
  - type: text
    content: ' '
  - type: note
    content: És 5:11, 22.
  - type: text
    content: Pour ceux qui s’attardent auprès du vin,
  - type: text
    content: Pour ceux qui vont déguster du vin mêlé.
  '31':
  - type: text
    content: Ne regarde pas le vin qui paraît d’un beau rouge,
  - type: text
    content: Qui fait des perles dans la coupe,
  - type: text
    content: Et qui coule aisément.
  '32':
  - type: text
    content: Il finit par mordre comme un serpent,
  - type: text
    content: Et par piquer comme un basilic.
  '33':
  - type: text
    content: Tes yeux se porteront sur des étrangères,
  - type: text
    content: Et ton cœur parlera d’une manière perverse.
  '34':
  - type: text
    content: Tu seras comme un homme couché au milieu de la mer,
  - type: text
    content: 'Comme un homme couché sur le sommet d’un mât:'
  '35':
  - type: text
    content: On m’a frappé,… je n’ai point de mal!…
  - type: text
    content: On m’a battu,… je ne sens rien!…
  - type: text
    content: Quand me réveillerai-je?… J’en veux encore!
  '4':
  - type: text
    content: Ne te tourmente pas pour t’enrichir,
  - type: text
    content: N’y applique pas ton intelligence.
  '5':
  - type: text
    content: Veux-tu poursuivre du regard ce qui va disparaître?
  - type: text
    content: Car la richesse se fait des ailes,
  - type: text
    content: Et comme l’aigle, elle prend son vol vers les cieux.
  '6':
  - type: text
    content: Ne mange pas le pain de celui dont le regard est malveillant,
  - type: text
    content: Et ne convoite pas ses friandises;
  '7':
  - type: text
    content: Car il est comme les pensées de son âme.
  - type: text
    content: Mange et bois, te dira-t-il;
  - type: text
    content: Mais son cœur n’est point avec toi.
  '8':
  - type: text
    content: Tu vomiras le morceau que tu as mangé,
  - type: text
    content: Et tu auras perdu tes propos agréables.
  '9':
  - type: text
    content: ' '
  - type: note
    content: Pr 9:8. Mt 7:6.
  - type: text
    content: Ne parle pas aux oreilles de l’insensé,
  - type: text
    content: Car il méprise la sagesse de tes discours.
