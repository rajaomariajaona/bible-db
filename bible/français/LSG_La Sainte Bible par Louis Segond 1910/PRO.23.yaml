document_id: PRO.23
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Si tu es à table avec un grand,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fais attention à ce qui est devant toi;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mets un couteau à ta gorge,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si tu as trop d’avidité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ne convoite pas ses friandises:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est un aliment trompeur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ne te tourmente pas pour t’enrichir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: N’y applique pas ton intelligence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Veux-tu poursuivre du regard ce qui va disparaître?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car la richesse se fait des ailes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et comme l’aigle, elle prend son vol vers les cieux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ne mange pas le pain de celui dont le regard est malveillant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ne convoite pas ses friandises;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Car il est comme les pensées de son âme.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mange et bois, te dira-t-il;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais son cœur n’est point avec toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tu vomiras le morceau que tu as mangé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tu auras perdu tes propos agréables.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 9:8
      metadata:
        usfm: PRO.9.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 7:6
      metadata:
        usfm: MAT.7.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ne parle pas aux oreilles de l’insensé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car il méprise la sagesse de tes discours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 22:28
      metadata:
        usfm: PRO.22.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ne déplace pas la borne ancienne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et n’entre pas dans le champ des orphelins;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Car leur vengeur est puissant:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il défendra leur cause contre toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ouvre ton cœur à l’instruction,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tes oreilles aux paroles de la science.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 13:24
      metadata:
        usfm: PRO.13.24
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 19:18
      metadata:
        usfm: PRO.19.18
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 22:15
      metadata:
        usfm: PRO.22.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 29:15
      metadata:
        usfm: PRO.29.15
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '17'
      metadata:
        usfm: PRO.29.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: N’épargne pas la correction à l’enfant;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si tu le frappes de la verge, il ne mourra point.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: En le frappant de la verge,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu délivres son âme du séjour des morts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Mon fils, si ton cœur est sage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon cœur à moi sera dans la joie;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Mes entrailles seront émues d’allégresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand tes lèvres diront ce qui est droit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 37:1
      metadata:
        usfm: PSA.37.1
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 73:3
      metadata:
        usfm: PSA.73.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 24:1
      metadata:
        usfm: PRO.24.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Que ton cœur n’envie point les pécheurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais qu’il ait toujours la crainte de l’Éternel;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 24:14
      metadata:
        usfm: PRO.24.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Car il est un avenir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ton espérance ne sera pas anéantie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Écoute, mon fils, et sois sage;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dirige ton cœur dans la voie droite.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 5:22
      metadata:
        usfm: ISA.5.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 21:34
      metadata:
        usfm: LUK.21.34
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 13:13
      metadata:
        usfm: ROM.13.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 5:18
      metadata:
        usfm: EPH.5.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ne sois pas parmi les buveurs de vin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Parmi ceux qui font excès des viandes:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Car l’ivrogne et celui qui se livre à des excès s’appauvrissent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et l’assoupissement fait porter des haillons.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 1:8
      metadata:
        usfm: PRO.1.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Écoute ton père, lui qui t’a engendré,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ne méprise pas ta mère, quand elle est devenue vieille.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 4:7
      metadata:
        usfm: PRO.4.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Acquiers la vérité, et ne la vends pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La sagesse, l’instruction et l’intelligence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 10:1
      metadata:
        usfm: PRO.10.1
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 15:20
      metadata:
        usfm: PRO.15.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Le père du juste est dans l’allégresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celui qui donne naissance à un sage aura de la joie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Que ton père et ta mère se réjouissent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que celle qui t’a enfanté soit dans l’allégresse!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Mon fils, donne-moi ton cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que tes yeux se plaisent dans mes voies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 22:14
      metadata:
        usfm: PRO.22.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Car la prostituée est une fosse profonde,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et l’étrangère un puits étroit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Elle dresse des embûches comme un brigand,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et elle augmente parmi les hommes le nombre des perfides.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Pour qui les ah? Pour qui les hélas?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour qui les disputes? Pour qui les plaintes?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour qui les blessures sans raison? Pour qui les yeux rouges?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 5:11
      metadata:
        usfm: ISA.5.11
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '22'
      metadata:
        usfm: ISA.5.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Pour ceux qui s’attardent auprès du vin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour ceux qui vont déguster du vin mêlé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ne regarde pas le vin qui paraît d’un beau rouge,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui fait des perles dans la coupe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui coule aisément.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Il finit par mordre comme un serpent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et par piquer comme un basilic.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Tes yeux se porteront sur des étrangères,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ton cœur parlera d’une manière perverse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Tu seras comme un homme couché au milieu de la mer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Comme un homme couché sur le sommet d’un mât:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: On m’a frappé,… je n’ai point de mal!…
- type: usfm
  marker: q1
  children:
  - type: text
    text: On m’a battu,… je ne sens rien!…
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand me réveillerai-je?… J’en veux encore!
