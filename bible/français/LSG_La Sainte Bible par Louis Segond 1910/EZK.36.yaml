document_id: EZK.36
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le rétablissement d’Israël
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-15: cf. (Éz 35. Jé 12:14.) Jé 31:4-14, 23-28.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Et toi, fils de l’homme, prophétise sur les '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 6:2
      metadata:
        usfm: EZK.6.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: montagnes d’Israël!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tu diras: Montagnes d’Israël, écoutez la parole de l’Éternel!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ainsi parle le Seigneur, l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Parce que l’ennemi a dit sur vous: Ah! Ah!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ces hauteurs éternelles sont devenues notre '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 35:10
      metadata:
        usfm: EZK.35.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: propriété!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Prophétise et dis: Ainsi parle le Seigneur, l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, parce qu’on a voulu de toutes parts vous dévaster et vous engloutir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour que vous soyez la propriété des autres nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parce que vous avez été l’objet des discours et des propos des peuples,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Montagnes d’Israël, écoutez la parole du Seigneur, de l’Éternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ainsi parle le Seigneur, l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aux montagnes et aux collines,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aux ruisseaux et aux vallées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aux ruines désertes et aux villes abandonnées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui ont servi de proie et de risée
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aux autres nations d’alentour;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ainsi parle le Seigneur, l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, dans le feu de ma jalousie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je parle contre les autres nations et contre Édom tout entier,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui se sont donné mon pays en propriété,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avec toute la joie de leur cœur et le mépris de leur âme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afin d’en piller les produits.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: C’est pourquoi prophétise sur le pays d’Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dis aux montagnes et aux collines,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Aux ruisseaux et aux vallées:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ainsi parle le Seigneur, l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voici, je parle dans ma jalousie et dans ma fureur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Parce que vous portez '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 34:29
      metadata:
        usfm: EZK.34.29
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: l’ignominie des nations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'C’est pourquoi ainsi parle le Seigneur, l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je lève ma main!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce sont les nations qui vous entourent
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui porteront elles-mêmes leur ignominie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Et vous, montagnes d’Israël, vous pousserez vos rameaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et vous porterez vos fruits pour mon peuple d’Israël;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car ces choses sont près d’arriver.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Voici, je vous serai favorable,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je me tournerai vers vous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et vous serez cultivées et ensemencées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Je mettrai sur vous des hommes en grand nombre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La maison d’Israël tout entière;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les villes seront habitées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et l’on rebâtira sur les ruines.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Je multiplierai sur vous les hommes et les animaux;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils multiplieront et seront féconds;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je veux que vous soyez habitées comme auparavant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je vous ferai plus de bien qu’autrefois;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et vous saurez que je suis l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Je ferai marcher sur vous des hommes, mon peuple d’Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils te posséderont;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu seras leur héritage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tu ne les détruiras plus.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ainsi parle le Seigneur, l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Parce qu’on vous dit: Tu as dévoré des hommes,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu as détruit ta propre nation,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: A cause de cela tu ne dévoreras plus d’hommes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu ne détruiras plus ta nation,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit le Seigneur, l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Je ne te ferai plus entendre les outrages des nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tu ne porteras plus l’opprobre des peuples;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu ne détruiras plus ta nation,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit le Seigneur, l’Éternel.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 16-21: cf. Éz 5:5, etc. 2 Ch 36:14-20.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'La parole de l’Éternel me fut adressée, en ces mots: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fils de l’homme, ceux de la maison d’Israël, quand ils habitaient leur pays, l’ont souillé par leur conduite et par leurs œuvres; leur conduite a été devant moi comme la souillure d’une femme pendant son impureté. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Alors j’ai répandu ma fureur sur eux, à cause du sang qu’ils avaient versé dans le pays, et des idoles dont ils l’avaient souillé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Je les ai dispersés parmi les nations, et ils ont été répandus en divers pays; je les ai jugés selon leur conduite et selon leurs œuvres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ils sont arrivés chez les nations où ils allaient, et ils ont '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 52:5
      metadata:
        usfm: ISA.52.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 2:24
      metadata:
        usfm: ROM.2.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'profané mon saint nom, en sorte qu’on disait d’eux: C’est le peuple de l’Éternel, c’est de son pays qu’ils sont sortis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Et j’ai voulu sauver l’honneur de mon saint nom, que profanait la maison d’Israël parmi les nations où elle est allée.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 22-38: cf. (Éz 11:16-20; 37:12-28. De 30:1-10. Jé 32:36-44.) 2 Co 5:17.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'C’est pourquoi dis à la maison d’Israël: Ainsi parle le Seigneur, l’Éternel: Ce n’est pas à cause de vous que j’agis de la sorte, maison d’Israël; c’est à cause de mon saint nom, que vous avez profané parmi les nations où vous êtes allés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Je sanctifierai mon grand nom, qui a été profané parmi les nations, que vous avez profané au milieu d’elles. Et les nations sauront que je suis l’Éternel, dit le Seigneur, l’Éternel, quand je serai sanctifié par vous sous leurs yeux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Je vous retirerai d’entre les nations, je vous rassemblerai de tous les pays, et je vous ramènerai dans votre pays. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Je répandrai sur vous une eau pure, et vous serez purifiés; je vous purifierai de toutes vos souillures et de toutes vos idoles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Je vous donnerai un '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 32:39
      metadata:
        usfm: JER.32.39
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 11:19
      metadata:
        usfm: EZK.11.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'cœur nouveau, et je mettrai en vous un '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 11:19
      metadata:
        usfm: EZK.11.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'esprit nouveau; j’ôterai de votre corps le cœur de pierre, et je vous donnerai un cœur de chair. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Je mettrai mon esprit en vous, et je ferai en sorte que vous suiviez mes ordonnances, et que vous observiez et pratiquiez mes lois. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Vous habiterez le pays que j’ai donné à vos pères; vous serez mon peuple, et je serai votre Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Je vous délivrerai de toutes vos souillures. J’appellerai le blé, et je le multiplierai; je ne vous enverrai plus la '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 34:29
      metadata:
        usfm: EZK.34.29
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'famine. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Je multiplierai le fruit des arbres et le produit des champs, afin que vous n’ayez plus l’opprobre de la famine parmi les nations. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Alors vous vous '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 16:61
      metadata:
        usfm: EZK.16.61
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '63'
      metadata:
        usfm: EZK.16.63
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'souviendrez de votre conduite qui était mauvaise, et de vos actions qui n’étaient pas bonnes; vous vous prendrez vous-mêmes en '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 6:9
      metadata:
        usfm: EZK.6.9
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 20:43
      metadata:
        usfm: EZK.20.43
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'dégoût, à cause de vos iniquités et de vos abominations. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ce n’est pas à cause de vous que j’agis de la sorte, dit le Seigneur, l’Éternel, sachez-le! Ayez honte et rougissez de votre conduite, maison d’Israël! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ainsi parle le Seigneur, l’Éternel: Le jour où je vous purifierai de toutes vos iniquités, je peuplerai les villes, et les ruines seront relevées; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'la terre dévastée sera cultivée, tandis qu’elle était déserte aux yeux de tous les passants; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'et l’on dira: Cette terre dévastée est devenue comme un jardin '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 51:3
      metadata:
        usfm: ISA.51.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 28:13
      metadata:
        usfm: EZK.28.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'd’Éden; et ces villes ruinées, désertes et abattues, sont fortifiées et habitées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Et les nations qui resteront autour de vous sauront que moi, l’Éternel, j’ai rebâti ce qui était abattu, et planté ce qui était dévasté. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 17:24
      metadata:
        usfm: EZK.17.24
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 22:14
      metadata:
        usfm: EZK.22.14
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 37:14
      metadata:
        usfm: EZK.37.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Moi, l’Éternel, j’ai parlé, et j’agirai. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ainsi parle le Seigneur, l’Éternel: Voici encore sur quoi je me laisserai fléchir par la maison d’Israël, voici ce que je ferai pour eux; je multiplierai les hommes comme un troupeau. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Les villes en ruines seront remplies de troupeaux d’hommes, pareils aux troupeaux consacrés, aux troupeaux qu’on amène à Jérusalem pendant ses fêtes solennelles. Et ils sauront que je suis l’Éternel.
