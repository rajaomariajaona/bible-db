document_id: EZK.36,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Le rétablissement d’Israël
  - type: heading
    content: 'V. 1-15: cf. (Éz 35. Jé 12:14.) Jé 31:4-14, 23-28.'
  - type: text
    content: 'Et toi, fils de l’homme, prophétise sur les '
  - type: note
    content: Éz 6:2.
  - type: text
    content: montagnes d’Israël!
  - type: text
    content: 'Tu diras: Montagnes d’Israël, écoutez la parole de l’Éternel!'
  '10':
  - type: text
    content: Je mettrai sur vous des hommes en grand nombre,
  - type: text
    content: La maison d’Israël tout entière;
  - type: text
    content: Les villes seront habitées,
  - type: text
    content: Et l’on rebâtira sur les ruines.
  '11':
  - type: text
    content: Je multiplierai sur vous les hommes et les animaux;
  - type: text
    content: Ils multiplieront et seront féconds;
  - type: text
    content: Je veux que vous soyez habitées comme auparavant,
  - type: text
    content: Et je vous ferai plus de bien qu’autrefois;
  - type: text
    content: Et vous saurez que je suis l’Éternel.
  '12':
  - type: text
    content: Je ferai marcher sur vous des hommes, mon peuple d’Israël,
  - type: text
    content: Et ils te posséderont;
  - type: text
    content: Tu seras leur héritage,
  - type: text
    content: Et tu ne les détruiras plus.
  '13':
  - type: text
    content: 'Ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: 'Parce qu’on vous dit: Tu as dévoré des hommes,'
  - type: text
    content: Tu as détruit ta propre nation,
  '14':
  - type: text
    content: A cause de cela tu ne dévoreras plus d’hommes,
  - type: text
    content: Tu ne détruiras plus ta nation,
  - type: text
    content: Dit le Seigneur, l’Éternel.
  '15':
  - type: text
    content: Je ne te ferai plus entendre les outrages des nations,
  - type: text
    content: Et tu ne porteras plus l’opprobre des peuples;
  - type: text
    content: Tu ne détruiras plus ta nation,
  - type: text
    content: Dit le Seigneur, l’Éternel.
  - type: heading
    content: 'V. 16-21: cf. Éz 5:5, etc. 2 Ch 36:14-20.'
  '16':
  - type: text
    content: 'La parole de l’Éternel me fut adressée, en ces mots: '
  '17':
  - type: text
    content: 'Fils de l’homme, ceux de la maison d’Israël, quand ils habitaient leur pays, l’ont souillé par leur conduite et par leurs œuvres; leur conduite a été devant moi comme la souillure d’une femme pendant son impureté. '
  '18':
  - type: text
    content: 'Alors j’ai répandu ma fureur sur eux, à cause du sang qu’ils avaient versé dans le pays, et des idoles dont ils l’avaient souillé. '
  '19':
  - type: text
    content: 'Je les ai dispersés parmi les nations, et ils ont été répandus en divers pays; je les ai jugés selon leur conduite et selon leurs œuvres. '
  '2':
  - type: text
    content: 'Ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: 'Parce que l’ennemi a dit sur vous: Ah! Ah!'
  - type: text
    content: 'Ces hauteurs éternelles sont devenues notre '
  - type: note
    content: Éz 35:10.
  - type: text
    content: propriété!
  '20':
  - type: text
    content: 'Ils sont arrivés chez les nations où ils allaient, et ils ont '
  - type: note
    content: És 52:5. Ro 2:24.
  - type: text
    content: 'profané mon saint nom, en sorte qu’on disait d’eux: C’est le peuple de l’Éternel, c’est de son pays qu’ils sont sortis. '
  '21':
  - type: text
    content: Et j’ai voulu sauver l’honneur de mon saint nom, que profanait la maison d’Israël parmi les nations où elle est allée.
  - type: heading
    content: 'V. 22-38: cf. (Éz 11:16-20; 37:12-28. De 30:1-10. Jé 32:36-44.) 2 Co 5:17.'
  '22':
  - type: text
    content: 'C’est pourquoi dis à la maison d’Israël: Ainsi parle le Seigneur, l’Éternel: Ce n’est pas à cause de vous que j’agis de la sorte, maison d’Israël; c’est à cause de mon saint nom, que vous avez profané parmi les nations où vous êtes allés. '
  '23':
  - type: text
    content: 'Je sanctifierai mon grand nom, qui a été profané parmi les nations, que vous avez profané au milieu d’elles. Et les nations sauront que je suis l’Éternel, dit le Seigneur, l’Éternel, quand je serai sanctifié par vous sous leurs yeux. '
  '24':
  - type: text
    content: 'Je vous retirerai d’entre les nations, je vous rassemblerai de tous les pays, et je vous ramènerai dans votre pays. '
  '25':
  - type: text
    content: 'Je répandrai sur vous une eau pure, et vous serez purifiés; je vous purifierai de toutes vos souillures et de toutes vos idoles. '
  '26':
  - type: text
    content: 'Je vous donnerai un '
  - type: note
    content: Jé 32:39. Éz 11:19.
  - type: text
    content: 'cœur nouveau, et je mettrai en vous un '
  - type: note
    content: Éz 11:19.
  - type: text
    content: 'esprit nouveau; j’ôterai de votre corps le cœur de pierre, et je vous donnerai un cœur de chair. '
  '27':
  - type: text
    content: 'Je mettrai mon esprit en vous, et je ferai en sorte que vous suiviez mes ordonnances, et que vous observiez et pratiquiez mes lois. '
  '28':
  - type: text
    content: 'Vous habiterez le pays que j’ai donné à vos pères; vous serez mon peuple, et je serai votre Dieu. '
  '29':
  - type: text
    content: 'Je vous délivrerai de toutes vos souillures. J’appellerai le blé, et je le multiplierai; je ne vous enverrai plus la '
  - type: note
    content: Éz 34:29.
  - type: text
    content: 'famine. '
  '3':
  - type: text
    content: 'Prophétise et dis: Ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: Oui, parce qu’on a voulu de toutes parts vous dévaster et vous engloutir,
  - type: text
    content: Pour que vous soyez la propriété des autres nations,
  - type: text
    content: Parce que vous avez été l’objet des discours et des propos des peuples,
  '30':
  - type: text
    content: 'Je multiplierai le fruit des arbres et le produit des champs, afin que vous n’ayez plus l’opprobre de la famine parmi les nations. '
  '31':
  - type: text
    content: 'Alors vous vous '
  - type: note
    content: Éz 16:61, 63.
  - type: text
    content: 'souviendrez de votre conduite qui était mauvaise, et de vos actions qui n’étaient pas bonnes; vous vous prendrez vous-mêmes en '
  - type: note
    content: Éz 6:9; 20:43.
  - type: text
    content: 'dégoût, à cause de vos iniquités et de vos abominations. '
  '32':
  - type: text
    content: 'Ce n’est pas à cause de vous que j’agis de la sorte, dit le Seigneur, l’Éternel, sachez-le! Ayez honte et rougissez de votre conduite, maison d’Israël! '
  '33':
  - type: text
    content: 'Ainsi parle le Seigneur, l’Éternel: Le jour où je vous purifierai de toutes vos iniquités, je peuplerai les villes, et les ruines seront relevées; '
  '34':
  - type: text
    content: 'la terre dévastée sera cultivée, tandis qu’elle était déserte aux yeux de tous les passants; '
  '35':
  - type: text
    content: 'et l’on dira: Cette terre dévastée est devenue comme un jardin '
  - type: note
    content: És 51:3. Éz 28:13.
  - type: text
    content: 'd’Éden; et ces villes ruinées, désertes et abattues, sont fortifiées et habitées. '
  '36':
  - type: text
    content: 'Et les nations qui resteront autour de vous sauront que moi, l’Éternel, j’ai rebâti ce qui était abattu, et planté ce qui était dévasté. '
  - type: note
    content: Éz 17:24; 22:14; 37:14.
  - type: text
    content: 'Moi, l’Éternel, j’ai parlé, et j’agirai. '
  '37':
  - type: text
    content: 'Ainsi parle le Seigneur, l’Éternel: Voici encore sur quoi je me laisserai fléchir par la maison d’Israël, voici ce que je ferai pour eux; je multiplierai les hommes comme un troupeau. '
  '38':
  - type: text
    content: Les villes en ruines seront remplies de troupeaux d’hommes, pareils aux troupeaux consacrés, aux troupeaux qu’on amène à Jérusalem pendant ses fêtes solennelles. Et ils sauront que je suis l’Éternel.
  '4':
  - type: text
    content: Montagnes d’Israël, écoutez la parole du Seigneur, de l’Éternel!
  - type: text
    content: Ainsi parle le Seigneur, l’Éternel,
  - type: text
    content: Aux montagnes et aux collines,
  - type: text
    content: Aux ruisseaux et aux vallées,
  - type: text
    content: Aux ruines désertes et aux villes abandonnées,
  - type: text
    content: Qui ont servi de proie et de risée
  - type: text
    content: Aux autres nations d’alentour;
  '5':
  - type: text
    content: 'Ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: Oui, dans le feu de ma jalousie,
  - type: text
    content: Je parle contre les autres nations et contre Édom tout entier,
  - type: text
    content: Qui se sont donné mon pays en propriété,
  - type: text
    content: Avec toute la joie de leur cœur et le mépris de leur âme,
  - type: text
    content: Afin d’en piller les produits.
  '6':
  - type: text
    content: C’est pourquoi prophétise sur le pays d’Israël,
  - type: text
    content: Dis aux montagnes et aux collines,
  - type: text
    content: 'Aux ruisseaux et aux vallées:'
  - type: text
    content: 'Ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: Voici, je parle dans ma jalousie et dans ma fureur,
  - type: text
    content: 'Parce que vous portez '
  - type: note
    content: Éz 34:29.
  - type: text
    content: l’ignominie des nations.
  '7':
  - type: text
    content: 'C’est pourquoi ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: Je lève ma main!
  - type: text
    content: Ce sont les nations qui vous entourent
  - type: text
    content: Qui porteront elles-mêmes leur ignominie.
  '8':
  - type: text
    content: Et vous, montagnes d’Israël, vous pousserez vos rameaux,
  - type: text
    content: Et vous porterez vos fruits pour mon peuple d’Israël;
  - type: text
    content: Car ces choses sont près d’arriver.
  '9':
  - type: text
    content: Voici, je vous serai favorable,
  - type: text
    content: Je me tournerai vers vous,
  - type: text
    content: Et vous serez cultivées et ensemencées.
