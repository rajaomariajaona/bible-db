document_id: ISA.60,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Jérusalem restaurée
  - type: heading
    content: 'V. 1-22: cf. (És 59:20, 21; 49:18-23; 2:2-4.) Ap 21:9-27.'
  - type: text
    content: Lève-toi, sois éclairée, car ta lumière arrive,
  - type: text
    content: Et la gloire de l’Éternel se lève sur toi.
  '10':
  - type: text
    content: Les fils de l’étranger rebâtiront tes murs,
  - type: note
    content: És 49:23.
  - type: text
    content: Et leurs rois seront tes serviteurs;
  - type: text
    content: Car je t’ai frappée dans ma colère,
  - type: text
    content: Mais dans ma miséricorde j’ai pitié de toi.
  '11':
  - type: text
    content: Tes portes seront toujours ouvertes,
  - type: text
    content: Elles ne seront fermées ni jour ni nuit,
  - type: text
    content: Afin de laisser entrer chez toi les trésors des nations,
  - type: text
    content: Et leurs rois avec leur suite.
  '12':
  - type: text
    content: Car la nation et le royaume qui ne te serviront pas périront,
  - type: text
    content: Ces nations-là seront exterminées.
  '13':
  - type: text
    content: La gloire du Liban viendra chez toi,
  - type: text
    content: Le cyprès, l’orme et le buis, tous ensemble,
  - type: text
    content: Pour orner le lieu de mon sanctuaire,
  - type: text
    content: Et je glorifierai la place où reposent mes pieds.
  '14':
  - type: text
    content: Les fils de tes oppresseurs viendront s’humilier devant toi,
  - type: text
    content: Et tous ceux qui te méprisaient se prosterneront à tes pieds;
  - type: text
    content: Ils t’appelleront ville de l’Éternel, Sion du Saint d’Israël.
  '15':
  - type: text
    content: 'Au lieu que '
  - type: note
    content: És 49:19; 54:1, 6, 7.
  - type: text
    content: tu étais délaissée et haïe,
  - type: text
    content: Et que personne ne te parcourait,
  - type: text
    content: Je ferai de toi un ornement pour toujours,
  - type: text
    content: Un sujet de joie de génération en génération.
  '16':
  - type: text
    content: Tu suceras le lait des nations,
  - type: text
    content: Tu suceras la mamelle des rois;
  - type: text
    content: 'Et tu sauras que je suis l’Éternel, '
  - type: note
    content: És 43:3.
  - type: text
    content: ton sauveur,
  - type: text
    content: Ton rédempteur, le puissant de Jacob.
  '17':
  - type: text
    content: Au lieu de l’airain je ferai venir de l’or,
  - type: text
    content: Au lieu du fer je ferai venir de l’argent,
  - type: text
    content: Au lieu du bois, de l’airain,
  - type: text
    content: Et au lieu des pierres, du fer;
  - type: text
    content: Je ferai régner sur toi la paix,
  - type: text
    content: Et dominer la justice.
  '18':
  - type: text
    content: On n’entendra plus parler de violence dans ton pays,
  - type: text
    content: Ni de ravage et de ruine dans ton territoire;
  - type: text
    content: Tu donneras à tes murs le nom de salut,
  - type: text
    content: Et à tes portes celui de gloire.
  '19':
  - type: text
    content: Ce ne sera plus le soleil qui te servira de lumière pendant le jour,
  - type: text
    content: Ni la lune qui t’éclairera de sa lueur;
  - type: text
    content: Mais l’Éternel sera ta lumière à toujours,
  - type: text
    content: Ton Dieu sera ta gloire.
  '2':
  - type: text
    content: Voici, les ténèbres couvrent la terre,
  - type: text
    content: Et l’obscurité les peuples;
  - type: text
    content: Mais sur toi l’Éternel se lève,
  - type: text
    content: Sur toi sa gloire apparaît.
  '20':
  - type: text
    content: Ton soleil ne se couchera plus,
  - type: text
    content: Et ta lune ne s’obscurcira plus;
  - type: text
    content: Car l’Éternel sera ta lumière à toujours,
  - type: text
    content: Et les jours de ton deuil seront passés.
  '21':
  - type: text
    content: Il n’y aura plus que des justes parmi ton peuple,
  - type: text
    content: Ils posséderont à toujours le pays;
  - type: text
    content: 'C’est '
  - type: note
    content: Mt 15:13.
  - type: text
    content: 'le rejeton que j’ai planté, '
  - type: note
    content: És 29:23; 45:11.
  - type: text
    content: l’œuvre de mes mains,
  - type: text
    content: Pour servir à ma gloire.
  '22':
  - type: text
    content: Le plus petit deviendra un millier,
  - type: text
    content: Et le moindre une nation puissante.
  - type: text
    content: Moi, l’Éternel, je hâterai ces choses en leur temps.
  '3':
  - type: text
    content: Des nations marchent à ta lumière,
  - type: text
    content: Et des rois à la clarté de tes rayons.
  '4':
  - type: text
    content: 'Porte tes yeux alentour, et regarde:'
  - type: text
    content: Tous ils s’assemblent, ils viennent vers toi;
  - type: text
    content: Tes fils arrivent de loin,
  - type: text
    content: Et tes filles sont portées sur les bras.
  '5':
  - type: text
    content: Tu tressailliras alors et tu te réjouiras,
  - type: text
    content: Et ton cœur bondira et se dilatera,
  - type: text
    content: Quand les richesses de la mer se tourneront vers toi,
  - type: text
    content: Quand les trésors des nations viendront à toi.
  '6':
  - type: text
    content: Tu seras couverte d’une foule de chameaux,
  - type: text
    content: De dromadaires de Madian et d’Épha;
  - type: text
    content: Ils viendront tous de Séba;
  - type: text
    content: Ils porteront de l’or et de l’encens,
  - type: text
    content: Et publieront les louanges de l’Éternel.
  '7':
  - type: text
    content: Les troupeaux de Kédar se réuniront tous chez toi;
  - type: text
    content: Les béliers de Nebajoth seront à ton service;
  - type: text
    content: Ils monteront sur mon autel et me seront agréables,
  - type: text
    content: Et je glorifierai la maison de ma gloire.
  '8':
  - type: text
    content: Qui sont ceux-là qui volent comme des nuées,
  - type: text
    content: Comme des colombes vers leur colombier?
  '9':
  - type: text
    content: Car les îles espèrent en moi,
  - type: text
    content: Et les navires de Tarsis sont en tête,
  - type: text
    content: Pour ramener de loin tes enfants,
  - type: text
    content: Avec leur argent et leur or,
  - type: text
    content: A cause du nom de l’Éternel, ton Dieu,
  - type: text
    content: Du Saint d’Israël qui te glorifie.
