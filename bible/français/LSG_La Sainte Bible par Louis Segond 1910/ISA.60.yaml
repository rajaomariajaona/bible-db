document_id: ISA.60,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jérusalem restaurée
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-22: cf. (És 59:20, 21; 49:18-23; 2:2-4.) Ap 21:9-27.'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Lève-toi, sois éclairée, car ta lumière arrive,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la gloire de l’Éternel se lève sur toi.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Les fils de l’étranger rebâtiront tes murs,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 49:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Et leurs rois seront tes serviteurs;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car je t’ai frappée dans ma colère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais dans ma miséricorde j’ai pitié de toi.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Tes portes seront toujours ouvertes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles ne seront fermées ni jour ni nuit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afin de laisser entrer chez toi les trésors des nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et leurs rois avec leur suite.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Car la nation et le royaume qui ne te serviront pas périront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ces nations-là seront exterminées.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: La gloire du Liban viendra chez toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le cyprès, l’orme et le buis, tous ensemble,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour orner le lieu de mon sanctuaire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je glorifierai la place où reposent mes pieds.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Les fils de tes oppresseurs viendront s’humilier devant toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tous ceux qui te méprisaient se prosterneront à tes pieds;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils t’appelleront ville de l’Éternel, Sion du Saint d’Israël.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Au lieu que '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 49:19
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 54:1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '7'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: tu étais délaissée et haïe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que personne ne te parcourait,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ferai de toi un ornement pour toujours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un sujet de joie de génération en génération.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Tu suceras le lait des nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu suceras la mamelle des rois;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et tu sauras que je suis l’Éternel, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 43:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: ton sauveur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ton rédempteur, le puissant de Jacob.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Au lieu de l’airain je ferai venir de l’or,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au lieu du fer je ferai venir de l’argent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au lieu du bois, de l’airain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et au lieu des pierres, du fer;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ferai régner sur toi la paix,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et dominer la justice.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: On n’entendra plus parler de violence dans ton pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ni de ravage et de ruine dans ton territoire;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu donneras à tes murs le nom de salut,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et à tes portes celui de gloire.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ce ne sera plus le soleil qui te servira de lumière pendant le jour,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ni la lune qui t’éclairera de sa lueur;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais l’Éternel sera ta lumière à toujours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ton Dieu sera ta gloire.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Voici, les ténèbres couvrent la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’obscurité les peuples;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais sur toi l’Éternel se lève,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur toi sa gloire apparaît.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ton soleil ne se couchera plus,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ta lune ne s’obscurcira plus;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car l’Éternel sera ta lumière à toujours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les jours de ton deuil seront passés.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Il n’y aura plus que des justes parmi ton peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils posséderont à toujours le pays;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'C’est '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 15:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'le rejeton que j’ai planté, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 29:23
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 45:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: l’œuvre de mes mains,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour servir à ma gloire.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Le plus petit deviendra un millier,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le moindre une nation puissante.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moi, l’Éternel, je hâterai ces choses en leur temps.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Des nations marchent à ta lumière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et des rois à la clarté de tes rayons.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Porte tes yeux alentour, et regarde:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous ils s’assemblent, ils viennent vers toi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes fils arrivent de loin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tes filles sont portées sur les bras.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Tu tressailliras alors et tu te réjouiras,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ton cœur bondira et se dilatera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand les richesses de la mer se tourneront vers toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand les trésors des nations viendront à toi.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Tu seras couverte d’une foule de chameaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De dromadaires de Madian et d’Épha;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils viendront tous de Séba;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils porteront de l’or et de l’encens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et publieront les louanges de l’Éternel.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Les troupeaux de Kédar se réuniront tous chez toi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les béliers de Nebajoth seront à ton service;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils monteront sur mon autel et me seront agréables,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je glorifierai la maison de ma gloire.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Qui sont ceux-là qui volent comme des nuées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme des colombes vers leur colombier?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Car les îles espèrent en moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les navires de Tarsis sont en tête,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour ramener de loin tes enfants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avec leur argent et leur or,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause du nom de l’Éternel, ton Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Du Saint d’Israël qui te glorifie.
