document_id: JHN.16
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-4: cf. Jn 15:18-25. Lu 6:22, 23.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je vous ai dit ces choses, afin qu’elles ne soient pas pour vous une occasion de chute.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 9:22
      metadata:
        usfm: JHN.9.22
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '34'
      metadata:
        usfm: JHN.9.34
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 12:42
      metadata:
        usfm: JHN.12.42
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ils vous excluront des synagogues; et même l’heure vient où quiconque vous fera mourir croira rendre un culte à Dieu.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 15:21
      metadata:
        usfm: JHN.15.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 2:8
      metadata:
        usfm: 1CO.2.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Et ils agiront ainsi, parce qu’ils n’ont connu ni le Père ni moi.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 13:19
      metadata:
        usfm: JHN.13.19
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 14:29
      metadata:
        usfm: JHN.14.29
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je vous ai dit ces choses, afin que, lorsque l’heure sera venue, vous vous souveniez que je vous les ai dites. Je ne vous en ai pas parlé dès le commencement, parce que j’étais avec vous.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 5-15: cf. (Jn 14:16, 17, 26; 15:26.) Ac 2. 1 Co 2:7-16. 1 Jn 2:20, 21, 27.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Maintenant je m’en vais vers celui qui m’a envoyé, et aucun de vous ne me demande: Où vas-tu?'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mais, parce que je vous ai dit ces choses, la tristesse a rempli votre cœur.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Cependant je vous dis la vérité: il vous est avantageux que je m’en aille, car si je ne m’en vais pas, le consolateur ne viendra pas vers vous;'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 24:49
      metadata:
        usfm: LUK.24.49
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 14:26
      metadata:
        usfm: JHN.14.26
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 15:26
      metadata:
        usfm: JHN.15.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: mais, si je m’en vais, je vous l’enverrai.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Et quand il sera venu, il convaincra le monde en ce qui concerne le péché, la justice, et le jugement:'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: en ce qui concerne le péché, parce qu’ils ne croient pas en moi;
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: la justice, parce que je vais au Père, et que vous ne me verrez plus;
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: le jugement,
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 12:31
      metadata:
        usfm: JHN.12.31
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 14:30
      metadata:
        usfm: JHN.14.30
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 2:2
      metadata:
        usfm: EPH.2.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 2:15
      metadata:
        usfm: COL.2.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: parce que le prince de ce monde est jugé.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: J’ai encore beaucoup de choses à vous dire, mais vous ne pouvez pas les porter maintenant.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Quand le consolateur sera venu, l’Esprit de vérité,
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 14:26
      metadata:
        usfm: JHN.14.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: il vous conduira dans toute la vérité;
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 12:49
      metadata:
        usfm: JHN.12.49
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: car il ne parlera pas de lui-même, mais il dira tout ce qu’il aura entendu, et il vous annoncera les choses à venir.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Il me glorifiera, parce qu’il prendra de ce qui est à moi, et vous l’annoncera.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 17:10
      metadata:
        usfm: JHN.17.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Tout ce que le Père a est à moi; c’est pourquoi j’ai dit qu’il prend de ce qui est à moi, et qu’il vous l’annoncera.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 16-24: cf. Jn 14:18, 19, 13, 14. Lu 24. Éz 39:29.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 7:33
      metadata:
        usfm: JHN.7.33
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Encore un peu de temps, et vous ne me verrez plus; et puis encore un peu de temps, et vous me verrez, parce que je vais au Père.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Là-dessus, quelques-uns de ses disciples dirent entre eux: Que signifie ce qu’il nous dit: Encore un peu de temps, et vous ne me verrez plus; et puis encore un peu de temps, et vous me verrez? Et: Parce que je vais au Père? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ils disaient donc: Que signifie ce qu’il dit: Encore un peu de temps? Nous ne savons de quoi il parle. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Jésus connut qu’ils voulaient l’interroger, et il leur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Vous vous questionnez les uns les autres sur ce que j’ai dit: Encore un peu de temps, et vous ne me verrez plus; et puis encore un peu de temps, et vous me verrez.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'En vérité, en vérité, je vous le dis, vous pleurerez et vous vous lamenterez, et le monde se réjouira: vous serez dans la tristesse, mais votre tristesse se changera en joie.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 26:17
      metadata:
        usfm: ISA.26.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: La femme, lorsqu’elle enfante, éprouve de la tristesse, parce que son heure est venue; mais, lorsqu’elle a donné le jour à l’enfant, elle ne se souvient plus de la souffrance, à cause de la joie qu’elle a de ce qu’un homme est né dans le monde.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Vous donc aussi, vous êtes maintenant dans la tristesse; mais
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 20:30
      metadata:
        usfm: JHN.20.30
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: je vous reverrai, et votre cœur se réjouira, et nul ne vous ravira votre joie.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: En ce jour-là, vous ne m’interrogerez plus sur rien.
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 29:12
      metadata:
        usfm: JER.29.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 7:7
      metadata:
        usfm: MAT.7.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 21:22
      metadata:
        usfm: MAT.21.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 11:24
      metadata:
        usfm: MRK.11.24
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 11:9
      metadata:
        usfm: LUK.11.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 14:13
      metadata:
        usfm: JHN.14.13
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 15:7
      metadata:
        usfm: JHN.15.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ja 1:5
      metadata:
        usfm: JAS.1.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 3:22
      metadata:
        usfm: 1JN.3.22
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 5:14
      metadata:
        usfm: 1JN.5.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: En vérité, en vérité, je vous le dis, ce que vous demanderez au Père, il vous le donnera en mon nom.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Jusqu’à présent vous n’avez rien demandé en mon nom. Demandez, et vous recevrez, afin que votre joie soit parfaite.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 25-33: cf. Jn 14:18-23, 37. Ro 8:35-39.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je vous ai dit ces choses en paraboles. L’heure vient où je ne vous parlerai plus en paraboles, mais où je vous parlerai ouvertement du Père.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: En ce jour, vous demanderez en mon nom, et je ne vous dis pas que je prierai le Père pour vous;
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: car le Père lui-même vous aime, parce que vous m’avez aimé,
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 17:8
      metadata:
        usfm: JHN.17.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: et que vous avez cru que je suis sorti de Dieu.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 13:3
      metadata:
        usfm: JHN.13.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je suis sorti du Père, et je suis venu dans le monde; maintenant je quitte le monde, et je vais au Père.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ses disciples lui dirent: Voici, maintenant tu parles ouvertement, et tu n’emploies aucune parabole. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Maintenant nous savons '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 21:17
      metadata:
        usfm: JHN.21.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'que tu sais toutes choses, et que tu n’as pas besoin que personne t’interroge; c’est pourquoi nous croyons que tu es sorti de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Jésus leur répondit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Vous croyez maintenant.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Za 13:7
      metadata:
        usfm: ZEC.13.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 26:31
      metadata:
        usfm: MAT.26.31
    - type: text
