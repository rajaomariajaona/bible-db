document_id: JHN.16,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-4: cf. Jn 15:18-25. Lu 6:22, 23.'
  - type: text
    content: ' '
  - type: text
    content: Je vous ai dit ces choses, afin qu’elles ne soient pas pour vous une occasion de chute.
  - type: text
    content: ' '
  '10':
  - type: text
    content: la justice, parce que je vais au Père, et que vous ne me verrez plus;
  - type: text
    content: ' '
  '11':
  - type: text
    content: le jugement,
  - type: text
    content: ' '
  - type: note
    content: Jn 12:31; 14:30. Ép 2:2. Col 2:15.
  - type: text
    content: parce que le prince de ce monde est jugé.
  - type: text
    content: ' '
  '12':
  - type: text
    content: J’ai encore beaucoup de choses à vous dire, mais vous ne pouvez pas les porter maintenant.
  - type: text
    content: ' '
  '13':
  - type: text
    content: Quand le consolateur sera venu, l’Esprit de vérité,
  - type: text
    content: ' '
  - type: note
    content: Jn 14:26.
  - type: text
    content: il vous conduira dans toute la vérité;
  - type: text
    content: ' '
  - type: note
    content: Jn 12:49.
  - type: text
    content: car il ne parlera pas de lui-même, mais il dira tout ce qu’il aura entendu, et il vous annoncera les choses à venir.
  - type: text
    content: ' '
  '14':
  - type: text
    content: Il me glorifiera, parce qu’il prendra de ce qui est à moi, et vous l’annoncera.
  - type: text
    content: ' '
  '15':
  - type: note
    content: Jn 17:10.
  - type: text
    content: Tout ce que le Père a est à moi; c’est pourquoi j’ai dit qu’il prend de ce qui est à moi, et qu’il vous l’annoncera.
  - type: heading
    content: 'V. 16-24: cf. Jn 14:18, 19, 13, 14. Lu 24. Éz 39:29.'
  '16':
  - type: text
    content: ' '
  - type: note
    content: Jn 7:33.
  - type: text
    content: Encore un peu de temps, et vous ne me verrez plus; et puis encore un peu de temps, et vous me verrez, parce que je vais au Père.
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'Là-dessus, quelques-uns de ses disciples dirent entre eux: Que signifie ce qu’il nous dit: Encore un peu de temps, et vous ne me verrez plus; et puis encore un peu de temps, et vous me verrez? Et: Parce que je vais au Père? '
  '18':
  - type: text
    content: 'Ils disaient donc: Que signifie ce qu’il dit: Encore un peu de temps? Nous ne savons de quoi il parle. '
  '19':
  - type: text
    content: 'Jésus connut qu’ils voulaient l’interroger, et il leur dit: '
  - type: text
    content: 'Vous vous questionnez les uns les autres sur ce que j’ai dit: Encore un peu de temps, et vous ne me verrez plus; et puis encore un peu de temps, et vous me verrez.'
  '2':
  - type: note
    content: Jn 9:22, 34; 12:42.
  - type: text
    content: Ils vous excluront des synagogues; et même l’heure vient où quiconque vous fera mourir croira rendre un culte à Dieu.
  - type: text
    content: ' '
  '20':
  - type: text
    content: ' '
  - type: text
    content: 'En vérité, en vérité, je vous le dis, vous pleurerez et vous vous lamenterez, et le monde se réjouira: vous serez dans la tristesse, mais votre tristesse se changera en joie.'
  - type: text
    content: ' '
  '21':
  - type: note
    content: És 26:17.
  - type: text
    content: La femme, lorsqu’elle enfante, éprouve de la tristesse, parce que son heure est venue; mais, lorsqu’elle a donné le jour à l’enfant, elle ne se souvient plus de la souffrance, à cause de la joie qu’elle a de ce qu’un homme est né dans le monde.
  - type: text
    content: ' '
  '22':
  - type: text
    content: Vous donc aussi, vous êtes maintenant dans la tristesse; mais
  - type: text
    content: ' '
  - type: note
    content: Jn 20:30.
  - type: text
    content: je vous reverrai, et votre cœur se réjouira, et nul ne vous ravira votre joie.
  - type: text
    content: ' '
  '23':
  - type: text
    content: En ce jour-là, vous ne m’interrogerez plus sur rien.
  - type: text
    content: ' '
  - type: note
    content: Jé 29:12. Mt 7:7; 21:22. Mc 11:24. Lu 11:9. Jn 14:13; 15:7. Ja 1:5. 1 Jn 3:22; 5:14.
  - type: text
    content: En vérité, en vérité, je vous le dis, ce que vous demanderez au Père, il vous le donnera en mon nom.
  - type: text
    content: ' '
  '24':
  - type: text
    content: Jusqu’à présent vous n’avez rien demandé en mon nom. Demandez, et vous recevrez, afin que votre joie soit parfaite.
  - type: heading
    content: 'V. 25-33: cf. Jn 14:18-23, 37. Ro 8:35-39.'
  '25':
  - type: text
    content: ' '
  - type: text
    content: Je vous ai dit ces choses en paraboles. L’heure vient où je ne vous parlerai plus en paraboles, mais où je vous parlerai ouvertement du Père.
  - type: text
    content: ' '
  '26':
  - type: text
    content: En ce jour, vous demanderez en mon nom, et je ne vous dis pas que je prierai le Père pour vous;
  - type: text
    content: ' '
  '27':
  - type: text
    content: car le Père lui-même vous aime, parce que vous m’avez aimé,
  - type: text
    content: ' '
  - type: note
    content: Jn 17:8.
  - type: text
    content: et que vous avez cru que je suis sorti de Dieu.
  - type: text
    content: ' '
  '28':
  - type: note
    content: Jn 13:3.
  - type: text
    content: Je suis sorti du Père, et je suis venu dans le monde; maintenant je quitte le monde, et je vais au Père.
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'Ses disciples lui dirent: Voici, maintenant tu parles ouvertement, et tu n’emploies aucune parabole. '
  '3':
  - type: note
    content: Jn 15:21. 1 Co 2:8.
  - type: text
    content: Et ils agiront ainsi, parce qu’ils n’ont connu ni le Père ni moi.
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'Maintenant nous savons '
  - type: note
    content: Jn 21:17.
  - type: text
    content: 'que tu sais toutes choses, et que tu n’as pas besoin que personne t’interroge; c’est pourquoi nous croyons que tu es sorti de Dieu. '
  '31':
  - type: text
    content: 'Jésus leur répondit: '
  - type: text
    content: Vous croyez maintenant.
  '32':
  - type: text
    content: ' '
  - type: note
    content: Za 13:7. Mt 26:31. Mc 14:27.
  - type: text
    content: Voici, l’heure vient, et elle est déjà venue, où vous serez dispersés chacun de son côté, et où vous me laisserez seul;
  - type: text
    content: ' '
  - type: note
    content: Jn 8:29; 14:10.
  - type: text
    content: mais je ne suis pas seul, car le Père est avec moi.
  - type: text
    content: ' '
  '33':
  - type: text
    content: Je vous ai dit ces choses,
  - type: text
    content: ' '
  - type: note
    content: És 9:5. Jn 14:27. Ro 5:1. Ép 2:13. Col 1:20.
  - type: text
    content: afin que vous ayez la paix en moi. Vous aurez des tribulations dans le monde; mais prenez courage, j’ai vaincu le monde.
  '4':
  - type: note
    content: Jn 13:19; 14:29.
  - type: text
    content: Je vous ai dit ces choses, afin que, lorsque l’heure sera venue, vous vous souveniez que je vous les ai dites. Je ne vous en ai pas parlé dès le commencement, parce que j’étais avec vous.
  - type: heading
    content: 'V. 5-15: cf. (Jn 14:16, 17, 26; 15:26.) Ac 2. 1 Co 2:7-16. 1 Jn 2:20, 21, 27.'
  '5':
  - type: text
    content: ' '
  - type: text
    content: 'Maintenant je m’en vais vers celui qui m’a envoyé, et aucun de vous ne me demande: Où vas-tu?'
  - type: text
    content: ' '
  '6':
  - type: text
    content: Mais, parce que je vous ai dit ces choses, la tristesse a rempli votre cœur.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'Cependant je vous dis la vérité: il vous est avantageux que je m’en aille, car si je ne m’en vais pas, le consolateur ne viendra pas vers vous;'
  - type: text
    content: ' '
  - type: note
    content: Lu 24:49. Jn 14:26; 15:26.
  - type: text
    content: mais, si je m’en vais, je vous l’enverrai.
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'Et quand il sera venu, il convaincra le monde en ce qui concerne le péché, la justice, et le jugement:'
  - type: text
    content: ' '
  '9':
  - type: text
    content: en ce qui concerne le péché, parce qu’ils ne croient pas en moi;
  - type: text
    content: ' '
