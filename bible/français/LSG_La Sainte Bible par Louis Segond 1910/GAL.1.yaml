document_id: GAL.1,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Adresse et salutation
  - type: heading
    content: 'V. 1-5: cf. Ro 1:1-7.'
  - type: text
    content: 'Paul, apôtre, non de la part des hommes, ni par un homme, mais '
  - type: note
    content: Tit 1:3.
  - type: text
    content: 'par Jésus-Christ et Dieu le Père, qui l’a ressuscité des morts, '
  '10':
  - type: text
    content: 'Et maintenant, '
  - type: note
    content: 1 Th 2:4.
  - type: text
    content: 'est-ce la faveur des hommes que je désire, ou celle de Dieu? '
  - type: note
    content: Ja 4:4.
  - type: text
    content: Est-ce que je cherche à plaire aux hommes? Si je plaisais encore aux hommes, je ne serais pas serviteur de Christ.
  - type: heading
    content: Paul annonce l’Évangile tel qu’il l’a appris par une révélation de Jésus-Christ. Sa prédication et son ministère ont été approuvés par les apôtres à Jérusalem. Résistance à Pierre, dont la conduite à Antioche lui avait paru en désaccord avec le principe de la justification sans les œuvres de la loi
  - type: heading
    content: 'V. 11-24: cf. Ac 22:3-16; 26:9-20; 9:1-20, 23-30.'
  '11':
  - type: text
    content: ' '
  - type: note
    content: 1 Co 15:1.
  - type: text
    content: 'Je vous déclare, frères, que l’Évangile qui a été annoncé par moi n’est pas de l’homme; '
  '12':
  - type: note
    content: Ép 3:3.
  - type: text
    content: 'car je ne l’ai ni reçu ni appris d’un homme, mais par une révélation de Jésus-Christ. '
  '13':
  - type: note
    content: Ac 8:3; 9:1; 22:4; 26:9. Ph 3:6. 1 Ti 1:13.
  - type: text
    content: 'Vous avez su, en effet, quelle était autrefois ma conduite dans le judaïsme, comment je persécutais à outrance et ravageais l’Église de Dieu, '
  '14':
  - type: text
    content: 'et comment j’étais plus avancé dans le judaïsme que beaucoup de ceux de mon âge et de ma nation, étant animé d’un zèle excessif pour les traditions de mes pères. '
  '15':
  - type: note
    content: Ac 9:15; 13:2.
  - type: text
    content: 'Mais, lorsqu’il plut à celui qui m’avait mis à part dès le sein de ma mère, et qui m’a appelé par sa grâce, '
  '16':
  - type: text
    content: 'de révéler en moi son Fils, '
  - type: note
    content: Ac 9:15; 13:2; 22:21. Ga 2:8. Ép 3:8.
  - type: text
    content: 'afin que je l’annonçasse parmi les païens, aussitôt, je ne consultai '
  - type: note
    content: Mt 16:17.
  - type: text
    content: 'ni la chair ni le sang, '
  '17':
  - type: text
    content: 'et je ne montai point à Jérusalem vers ceux qui furent apôtres avant moi, mais je partis pour l’Arabie. Puis je revins encore à Damas. '
  '18':
  - type: text
    content: 'Trois ans plus tard, je montai à Jérusalem pour faire la connaissance de Céphas, et je demeurai quinze jours chez lui. '
  '19':
  - type: text
    content: 'Mais je ne vis aucun autre des apôtres, si ce n’est Jacques, le frère du Seigneur. '
  '2':
  - type: text
    content: 'et tous les frères qui sont avec moi, aux Églises de la Galatie: '
  '20':
  - type: text
    content: 'Dans ce que je vous écris, voici, '
  - type: note
    content: Ro 1:9; 9:1. 2 Co 1:23; 11:41. 1 Th 2:5. 1 Ti 5:21. 2 Ti 4:1.
  - type: text
    content: 'devant Dieu, je ne mens point. '
  '21':
  - type: text
    content: 'J’allai ensuite dans les contrées de la Syrie et de la Cilicie. '
  '22':
  - type: text
    content: 'Or, j’étais inconnu de visage aux Églises de Judée qui sont en Christ; '
  '23':
  - type: text
    content: 'seulement, elles avaient entendu dire: Celui qui autrefois nous persécutait annonce maintenant la foi qu’il s’efforçait alors de détruire. '
  '24':
  - type: text
    content: Et elles glorifiaient Dieu à mon sujet.
  '3':
  - type: text
    content: 'que '
  - type: note
    content: Ro 1:7. 1 Co 1:3. Ép 1:2. 1 Pi 1:2.
  - type: text
    content: 'la grâce et la paix vous soient données de la part de Dieu le Père et de notre Seigneur Jésus-Christ, '
  '4':
  - type: note
    content: Mt 20:28. Ga 2:20. Ép 5:2. Tit 2:14. Hé 9:14.
  - type: text
    content: 'qui s’est donné lui-même pour nos péchés, afin de nous arracher du présent siècle mauvais, selon la volonté de notre Dieu et Père, '
  '5':
  - type: text
    content: à qui soit la gloire aux siècles des siècles! Amen!
  - type: heading
    content: Inconstance des Galates qui, entraînés par de faux docteurs, s’éloignent du pur Évangile
  - type: heading
    content: 'V. 6-10: cf. Ga 3:1-5; 4:9-20; 5:1-12.'
  '6':
  - type: text
    content: 'Je m’étonne que vous vous détourniez si promptement de celui qui vous a appelés par la grâce de Christ, pour passer à un autre Évangile. '
  '7':
  - type: text
    content: 'Non pas qu’il y ait un autre Évangile, mais il y a des gens '
  - type: note
    content: Ac 15:1.
  - type: text
    content: 'qui vous troublent, et qui veulent renverser l’Évangile de Christ. '
  '8':
  - type: note
    content: 2 Co 11:14.
  - type: text
    content: 'Mais, quand nous-mêmes, quand un ange du ciel annoncerait un autre Évangile que celui que nous vous avons prêché, qu’il soit anathème! '
  '9':
  - type: text
    content: 'Nous l’avons dit précédemment, et je le répète à cette heure: si quelqu’un vous annonce un autre Évangile que celui que vous avez reçu, qu’il soit anathème! '
