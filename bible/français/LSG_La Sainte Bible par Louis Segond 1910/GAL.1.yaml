document_id: GAL.1
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Adresse et salutation
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-5: cf. Ro 1:1-7.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Paul, apôtre, non de la part des hommes, ni par un homme, mais '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Tit 1:3
      metadata:
        usfm: TIT.1.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'par Jésus-Christ et Dieu le Père, qui l’a ressuscité des morts, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'et tous les frères qui sont avec moi, aux Églises de la Galatie: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'que '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 1:7
      metadata:
        usfm: ROM.1.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 1:3
      metadata:
        usfm: 1CO.1.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 1:2
      metadata:
        usfm: EPH.1.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 1:2
      metadata:
        usfm: 1PE.1.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'la grâce et la paix vous soient données de la part de Dieu le Père et de notre Seigneur Jésus-Christ, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 20:28
      metadata:
        usfm: MAT.20.28
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 2:20
      metadata:
        usfm: GAL.2.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 5:2
      metadata:
        usfm: EPH.5.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Tit 2:14
      metadata:
        usfm: TIT.2.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 9:14
      metadata:
        usfm: HEB.9.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qui s’est donné lui-même pour nos péchés, afin de nous arracher du présent siècle mauvais, selon la volonté de notre Dieu et Père, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: à qui soit la gloire aux siècles des siècles! Amen!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Inconstance des Galates qui, entraînés par de faux docteurs, s’éloignent du pur Évangile
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 6-10: cf. Ga 3:1-5; 4:9-20; 5:1-12.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Je m’étonne que vous vous détourniez si promptement de celui qui vous a appelés par la grâce de Christ, pour passer à un autre Évangile. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Non pas qu’il y ait un autre Évangile, mais il y a des gens '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 15:1
      metadata:
        usfm: ACT.15.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qui vous troublent, et qui veulent renverser l’Évangile de Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 11:14
      metadata:
        usfm: 2CO.11.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Mais, quand nous-mêmes, quand un ange du ciel annoncerait un autre Évangile que celui que nous vous avons prêché, qu’il soit anathème! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nous l’avons dit précédemment, et je le répète à cette heure: si quelqu’un vous annonce un autre Évangile que celui que vous avez reçu, qu’il soit anathème! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Et maintenant, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 2:4
      metadata:
        usfm: 1TH.2.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'est-ce la faveur des hommes que je désire, ou celle de Dieu? '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ja 4:4
      metadata:
        usfm: JAS.4.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Est-ce que je cherche à plaire aux hommes? Si je plaisais encore aux hommes, je ne serais pas serviteur de Christ.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul annonce l’Évangile tel qu’il l’a appris par une révélation de Jésus-Christ. Sa prédication et son ministère ont été approuvés par les apôtres à Jérusalem. Résistance à Pierre, dont la conduite à Antioche lui avait paru en désaccord avec le principe de la justification sans les œuvres de la loi
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 11-24: cf. Ac 22:3-16; 26:9-20; 9:1-20, 23-30.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 15:1
      metadata:
        usfm: 1CO.15.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Je vous déclare, frères, que l’Évangile qui a été annoncé par moi n’est pas de l’homme; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 3:3
      metadata:
        usfm: EPH.3.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'car je ne l’ai ni reçu ni appris d’un homme, mais par une révélation de Jésus-Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 8:3
      metadata:
        usfm: ACT.8.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 9:1
      metadata:
        usfm: ACT.9.1
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 22:4
      metadata:
        usfm: ACT.22.4
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 26:9
      metadata:
        usfm: ACT.26.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 3:6
      metadata:
        usfm: PHP.3.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 1:13
      metadata:
        usfm: 1TI.1.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Vous avez su, en effet, quelle était autrefois ma conduite dans le judaïsme, comment je persécutais à outrance et ravageais l’Église de Dieu, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'et comment j’étais plus avancé dans le judaïsme que beaucoup de ceux de mon âge et de ma nation, étant animé d’un zèle excessif pour les traditions de mes pères. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 9:15
      metadata:
        usfm: ACT.9.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 13:2
      metadata:
        usfm: ACT.13.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Mais, lorsqu’il plut à celui qui m’avait mis à part dès le sein de ma mère, et qui m’a appelé par sa grâce, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'de révéler en moi son Fils, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 9:15
      metadata:
        usfm: ACT.9.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 13:2
      metadata:
        usfm: ACT.13.2
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 22:21
      metadata:
        usfm: ACT.22.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 2:8
      metadata:
        usfm: GAL.2.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 3:8
      metadata:
        usfm: EPH.3.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'afin que je l’annonçasse parmi les païens, aussitôt, je ne consultai '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 16:17
      metadata:
        usfm: MAT.16.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ni la chair ni le sang, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'et je ne montai point à Jérusalem vers ceux qui furent apôtres avant moi, mais je partis pour l’Arabie. Puis je revins encore à Damas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Trois ans plus tard, je montai à Jérusalem pour faire la connaissance de Céphas, et je demeurai quinze jours chez lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Mais je ne vis aucun autre des apôtres, si ce n’est Jacques, le frère du Seigneur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dans ce que je vous écris, voici, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 1:9
      metadata:
        usfm: ROM.1.9
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 9:1
      metadata:
        usfm: ROM.9.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 1:23
      metadata:
        usfm: 2CO.1.23
    - type: text
      text: '; 11:41. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 2:5
      metadata:
        usfm: 1TH.2.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 5:21
      metadata:
        usfm: 1TI.5.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ti 4:1
      metadata:
        usfm: 2TI.4.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'devant Dieu, je ne mens point. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'J’allai ensuite dans les contrées de la Syrie et de la Cilicie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Or, j’étais inconnu de visage aux Églises de Judée qui sont en Christ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'seulement, elles avaient entendu dire: Celui qui autrefois nous persécutait annonce maintenant la foi qu’il s’efforçait alors de détruire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Et elles glorifiaient Dieu à mon sujet.
