document_id: JHN.12,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Son arrivée à Béthanie. Parfum répandu sur ses pieds par Marie
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-11: cf. (Mt 26:6-13. Mc 14:3-9.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 26:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 14:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 7:37
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 11:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Six jours avant la Pâque, Jésus arriva à Béthanie, où était Lazare, qu’il avait ressuscité des morts. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les principaux sacrificateurs délibérèrent de faire mourir aussi Lazare, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: parce que beaucoup de Juifs se retiraient d’eux à cause de lui, et croyaient en Jésus.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Entrée de Jésus à Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 12-19: cf. (Mt 21:1-11. Mc 11:1-10. Lu 19:29-44.)'
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 21:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 11:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 19:36
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Le lendemain, une foule nombreuse de gens venus à la fête ayant entendu dire que Jésus se rendait à Jérusalem, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'prirent des branches de palmiers, et allèrent au-devant de lui, en criant: Hosanna! '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 118:26
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Béni soit celui qui vient au nom du Seigneur, le roi d’Israël! '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus trouva un ânon, et s’assit dessus, selon ce qui est écrit: '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 62:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Za 9:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 21:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ne crains point, fille de Sion;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, ton roi vient,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Assis sur le petit d’une ânesse.
  '16':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Ses disciples ne comprirent pas d’abord ces choses; mais, lorsque Jésus eut été glorifié, ils se souvinrent qu’elles étaient écrites de lui, et qu’ils les avaient accomplies à son égard. '
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Tous ceux qui étaient avec Jésus, quand il appela Lazare du sépulcre et le ressuscita des morts, lui rendaient témoignage; '
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'et la foule vint au-devant de lui, parce qu’elle avait appris qu’il avait fait ce miracle. '
  '19':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Les pharisiens se dirent donc les uns aux autres: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 11:47
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Vous voyez que vous ne gagnez rien; voici, le monde est allé après lui.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus parle de sa mort prochaine
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 20-36: cf. (És 49:6; 53:10-12.) (Mt 16:24-27.) (Hé 2:9, 10, 14, 15.) (2 Co 6:2. Hé 3:7, 8.)'
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Là, on lui fit un souper; Marthe servait, et Lazare était un de ceux qui se trouvaient à table avec lui. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quelques Grecs, du nombre de ceux '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 8:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'qui étaient montés pour adorer pendant la fête, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 's’adressèrent à Philippe, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 1:45
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'de Bethsaïda en Galilée, et lui dirent avec instance: Seigneur, nous voudrions voir Jésus. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Philippe alla le dire à André, puis André et Philippe le dirent à Jésus. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus leur répondit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: L’heure est venue
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 13:32
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 17:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: où le Fils de l’homme doit être glorifié.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: En vérité, en vérité, je vous le dis,
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 15:36
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: si le grain de blé qui est tombé en terre ne meurt, il reste seul; mais, s’il meurt, il porte beaucoup de fruit.
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 10:39
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:25
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 8:35
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 9:24
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 17:33
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Celui qui aime sa vie la perdra, et celui qui hait sa vie dans ce monde la conservera pour la vie éternelle.
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Si quelqu’un me sert, qu’il me suive;
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 14:3
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 17:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: et là où je suis, là aussi sera mon serviteur. Si quelqu’un me sert, le Père l’honorera.
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Maintenant
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 26:37
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '38'
      - type: text
