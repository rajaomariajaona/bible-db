      - type: usfm
        marker: ref
        children:
        - type: text
          text: '39'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 14:34
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 22:44
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: mon âme est troublée. Et que dirai-je?… Père, délivre-moi de cette heure?… Mais c’est pour cela que je suis venu jusqu’à cette heure.
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Père, glorifie ton nom!
    - type: text
      text: ' Et une voix vint du ciel: Je l’ai glorifié, et je le glorifierai encore. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La foule qui était là, et qui avait entendu, disait que c’était un tonnerre. D’autres disaient: Un ange lui a parlé. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Marie, ayant pris une livre d’un parfum de nard pur de grand prix, oignit les pieds de Jésus, et elle lui essuya les pieds avec ses cheveux; et la maison fut remplie de l’odeur du parfum. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus dit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 11:49
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ce n’est pas à cause de moi que cette voix s’est fait entendre; c’est à cause de vous.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 16:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 2:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Maintenant a lieu le jugement de ce monde;
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 14:30
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 2:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: maintenant le prince de ce monde sera jeté dehors.
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 21:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 18:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 3:14
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:28
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Et moi, quand j’aurai été élevé de la terre, j’attirerai tous les hommes à moi.
    - type: text
      text: ' '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En parlant ainsi, il indiquait de quelle mort il devait mourir. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La foule lui répondit: Nous avons appris par la loi '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 7:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 22:10
      - type: text
        text: '. '
      - type: usfm
