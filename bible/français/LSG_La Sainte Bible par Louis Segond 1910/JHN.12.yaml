      metadata:
        usfm: ZEC.9.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 21:5
      metadata:
        usfm: MAT.21.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ne crains point, fille de Sion;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voici, ton roi vient,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Assis sur le petit d’une ânesse.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ses disciples ne comprirent pas d’abord ces choses; mais, lorsque Jésus eut été glorifié, ils se souvinrent qu’elles étaient écrites de lui, et qu’ils les avaient accomplies à son égard. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Tous ceux qui étaient avec Jésus, quand il appela Lazare du sépulcre et le ressuscita des morts, lui rendaient témoignage; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'et la foule vint au-devant de lui, parce qu’elle avait appris qu’il avait fait ce miracle. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Les pharisiens se dirent donc les uns aux autres: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 11:47
      metadata:
        usfm: JHN.11.47
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Vous voyez que vous ne gagnez rien; voici, le monde est allé après lui.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus parle de sa mort prochaine
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
