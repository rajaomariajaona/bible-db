    marker-yv: yv-n
  - type: text
    text: 'Six jours avant la Pâque, Jésus arriva à Béthanie, où était Lazare, qu’il avait ressuscité des morts. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Là, on lui fit un souper; Marthe servait, et Lazare était un de ceux qui se trouvaient à table avec lui. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Marie, ayant pris une livre d’un parfum de nard pur de grand prix, oignit les pieds de Jésus, et elle lui essuya les pieds avec ses cheveux; et la maison fut remplie de l’odeur du parfum. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Un de ses disciples, Judas Iscariot, fils de Simon, celui qui devait le livrer, dit: '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 14:5
      metadata:
        usfm: MRK.14.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Pourquoi n’a-t-on pas vendu ce parfum trois cents deniers, pour les donner aux pauvres? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il disait cela, non qu’il se mît en peine des pauvres, mais parce qu’il était voleur, et que, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 13:29
      metadata:
        usfm: JHN.13.29
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'tenant la bourse, il prenait ce qu’on y mettait. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mais Jésus dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Laisse-la garder ce parfum pour
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 14:8
      metadata:
        usfm: MRK.14.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: le jour de ma sépulture.
