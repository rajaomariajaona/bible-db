  - type: text
    text: 'Le lendemain, une foule nombreuse de gens venus à la fête ayant entendu dire que Jésus se rendait à Jérusalem, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'prirent des branches de palmiers, et allèrent au-devant de lui, en criant: Hosanna! '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 118:26
      metadata:
        usfm: PSA.118.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Béni soit celui qui vient au nom du Seigneur, le roi d’Israël! '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Jésus trouva un ânon, et s’assit dessus, selon ce qui est écrit: '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
