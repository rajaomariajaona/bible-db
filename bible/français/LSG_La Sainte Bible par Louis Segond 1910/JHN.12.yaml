  - type: usfm
    marker: wj
    children:
    - type: text
      text: mon âme est troublée. Et que dirai-je?… Père, délivre-moi de cette heure?… Mais c’est pour cela que je suis venu jusqu’à cette heure.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Père, glorifie ton nom!
  - type: text
    text: ' Et une voix vint du ciel: Je l’ai glorifié, et je le glorifierai encore. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'La foule qui était là, et qui avait entendu, disait que c’était un tonnerre. D’autres disaient: Un ange lui a parlé. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Jésus dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 11:49
      metadata:
        usfm: JHN.11.49
    - type: text
