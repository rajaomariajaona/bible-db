document_id: JHN.12,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Son arrivée à Béthanie. Parfum répandu sur ses pieds par Marie
  - type: heading
    content: 'V. 1-11: cf. (Mt 26:6-13. Mc 14:3-9.)'
  - type: text
    content: ' '
  - type: note
    content: Mt 26:6. Mc 14:3. Lu 7:37. Jn 11:12.
  - type: text
    content: 'Six jours avant la Pâque, Jésus arriva à Béthanie, où était Lazare, qu’il avait ressuscité des morts. '
  '10':
  - type: text
    content: 'Les principaux sacrificateurs délibérèrent de faire mourir aussi Lazare, '
  '11':
  - type: text
    content: parce que beaucoup de Juifs se retiraient d’eux à cause de lui, et croyaient en Jésus.
  - type: heading
    content: Entrée de Jésus à Jérusalem
  - type: heading
    content: 'V. 12-19: cf. (Mt 21:1-11. Mc 11:1-10. Lu 19:29-44.)'
  '12':
  - type: text
    content: ' '
  - type: note
    content: Mt 21:8. Mc 11:8. Lu 19:36.
  - type: text
    content: 'Le lendemain, une foule nombreuse de gens venus à la fête ayant entendu dire que Jésus se rendait à Jérusalem, '
  '13':
  - type: text
    content: 'prirent des branches de palmiers, et allèrent au-devant de lui, en criant: Hosanna! '
  - type: note
    content: Ps 118:26.
  - type: text
    content: 'Béni soit celui qui vient au nom du Seigneur, le roi d’Israël! '
  '14':
  - type: text
    content: 'Jésus trouva un ânon, et s’assit dessus, selon ce qui est écrit: '
  '15':
  - type: note
    content: És 62:11. Za 9:9. Mt 21:5.
  - type: text
    content: Ne crains point, fille de Sion;
  - type: text
    content: Voici, ton roi vient,
  - type: text
    content: Assis sur le petit d’une ânesse.
  '16':
  - type: text
    content: 'Ses disciples ne comprirent pas d’abord ces choses; mais, lorsque Jésus eut été glorifié, ils se souvinrent qu’elles étaient écrites de lui, et qu’ils les avaient accomplies à son égard. '
  '17':
  - type: text
    content: 'Tous ceux qui étaient avec Jésus, quand il appela Lazare du sépulcre et le ressuscita des morts, lui rendaient témoignage; '
  '18':
  - type: text
    content: 'et la foule vint au-devant de lui, parce qu’elle avait appris qu’il avait fait ce miracle. '
  '19':
  - type: text
    content: 'Les pharisiens se dirent donc les uns aux autres: '
  - type: note
    content: Jn 11:47.
  - type: text
    content: Vous voyez que vous ne gagnez rien; voici, le monde est allé après lui.
  - type: heading
    content: Jésus parle de sa mort prochaine
  - type: heading
    content: 'V. 20-36: cf. (És 49:6; 53:10-12.) (Mt 16:24-27.) (Hé 2:9, 10, 14, 15.) (2 Co 6:2. Hé 3:7, 8.)'
  '2':
  - type: text
    content: 'Là, on lui fit un souper; Marthe servait, et Lazare était un de ceux qui se trouvaient à table avec lui. '
  '20':
  - type: text
    content: 'Quelques Grecs, du nombre de ceux '
  - type: note
    content: Ac 8:27.
  - type: text
    content: 'qui étaient montés pour adorer pendant la fête, '
  '21':
  - type: text
    content: 's’adressèrent à Philippe, '
  - type: note
    content: Jn 1:45.
  - type: text
    content: 'de Bethsaïda en Galilée, et lui dirent avec instance: Seigneur, nous voudrions voir Jésus. '
  '22':
  - type: text
    content: 'Philippe alla le dire à André, puis André et Philippe le dirent à Jésus. '
  '23':
  - type: text
    content: 'Jésus leur répondit: '
  - type: text
    content: L’heure est venue
  - type: text
    content: ' '
  - type: note
    content: Jn 13:32; 17:1.
  - type: text
    content: où le Fils de l’homme doit être glorifié.
  '24':
  - type: text
    content: ' '
  - type: text
    content: En vérité, en vérité, je vous le dis,
  - type: text
    content: ' '
  - type: note
    content: 1 Co 15:36.
  - type: text
    content: si le grain de blé qui est tombé en terre ne meurt, il reste seul; mais, s’il meurt, il porte beaucoup de fruit.
  - type: text
    content: ' '
  '25':
  - type: note
    content: Mt 10:39; 16:25. Mc 8:35. Lu 9:24; 17:33.
  - type: text
    content: Celui qui aime sa vie la perdra, et celui qui hait sa vie dans ce monde la conservera pour la vie éternelle.
  - type: text
    content: ' '
  '26':
  - type: text
    content: Si quelqu’un me sert, qu’il me suive;
  - type: text
    content: ' '
  - type: note
    content: Jn 14:3; 17:24.
  - type: text
    content: et là où je suis, là aussi sera mon serviteur. Si quelqu’un me sert, le Père l’honorera.
  - type: text
    content: ' '
  '27':
  - type: text
    content: Maintenant
  - type: text
    content: ' '
  - type: note
    content: Mt 26:37, 38, 39. Mc 14:34. Lu 22:44.
  - type: text
    content: mon âme est troublée. Et que dirai-je?… Père, délivre-moi de cette heure?… Mais c’est pour cela que je suis venu jusqu’à cette heure.
  - type: text
    content: ' '
  '28':
  - type: text
    content: Père, glorifie ton nom!
  - type: text
    content: ' Et une voix vint du ciel: Je l’ai glorifié, et je le glorifierai encore. '
  '29':
  - type: text
    content: 'La foule qui était là, et qui avait entendu, disait que c’était un tonnerre. D’autres disaient: Un ange lui a parlé. '
  '3':
  - type: text
    content: 'Marie, ayant pris une livre d’un parfum de nard pur de grand prix, oignit les pieds de Jésus, et elle lui essuya les pieds avec ses cheveux; et la maison fut remplie de l’odeur du parfum. '
  '30':
  - type: text
    content: 'Jésus dit: '
  - type: note
    content: Jn 11:49.
  - type: text
    content: Ce n’est pas à cause de moi que cette voix s’est fait entendre; c’est à cause de vous.
  '31':
  - type: text
    content: ' '
  - type: note
    content: Jn 16:11. Ép 2:2.
  - type: text
    content: Maintenant a lieu le jugement de ce monde;
  - type: text
    content: ' '
  - type: note
    content: Jn 14:30. Col 2:15.
  - type: text
    content: maintenant le prince de ce monde sera jeté dehors.
  - type: text
    content: ' '
  '32':
  - type: note
    content: No 21:9. 2 R 18:4. Jn 3:14; 8:28.
  - type: text
    content: Et moi, quand j’aurai été élevé de la terre, j’attirerai tous les hommes à moi.
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'En parlant ainsi, il indiquait de quelle mort il devait mourir. '
  '34':
  - type: text
    content: 'La foule lui répondit: Nous avons appris par la loi '
  - type: note
    content: 2 S 7:16. 1 Ch 22:10. Ps 45:7; 89:37; 110:4. És 9:5. Jé 23:6. Éz 37:26. Da 2:44; 7:14, 27. Mi 4:7. Hé 1:8.
  - type: text
    content: 'que le Christ demeure éternellement; comment donc dis-tu: Il faut que le Fils de l’homme soit élevé? Qui est ce Fils de l’homme? '
  '35':
  - type: text
    content: 'Jésus leur dit: '
  - type: note
    content: Jn 1:9; 8:12; 9:5; 12:46.
  - type: text
    content: La lumière est encore pour un peu de temps au milieu de vous.
  - type: text
    content: ' '
  - type: note
    content: Jé 13:16. Ép 5:8. 1 Th 5:4.
  - type: text
    content: 'Marchez, pendant que vous avez la lumière, afin que les ténèbres ne vous surprennent point: celui qui marche dans les ténèbres ne sait où il va.'
  '36':
  - type: text
    content: ' '
  - type: text
    content: Pendant que vous avez la lumière, croyez en la lumière, afin que vous soyez des enfants de lumière.
  - type: heading
    content: Incrédulité des Juifs
  - type: heading
    content: 'V. 37-50: cf. És 6:1-12. De 18:18, 19. Lu 9:26.'
  - type: text
    content: 'Jésus dit ces choses, puis il s’en alla, et se cacha loin d’eux. '
  '37':
  - type: text
    content: 'Malgré tant de miracles qu’il avait faits en leur présence, ils ne croyaient pas en lui, '
  '38':
  - type: text
    content: 'afin que s’accomplît la parole qu’Ésaïe, le prophète, a prononcée:'
  - type: note
    content: És 53:1. Ro 10:16.
  - type: text
    content: Seigneur,
  - type: text
    content: Qui a cru à notre prédication?
  - type: text
    content: Et à qui le bras du Seigneur a-t-il été révélé?
  '39':
  - type: text
    content: 'Aussi ne pouvaient-ils croire, parce qu’Ésaïe a dit encore:'
  '4':
  - type: text
    content: 'Un de ses disciples, Judas Iscariot, fils de Simon, celui qui devait le livrer, dit: '
  '40':
  - type: text
    content: ' '
  - type: note
    content: És 6:9. Éz 12:2. Mt 13:14. Mc 4:12. Lu 8:10. Ac 28:26. Ro 11:8.
  - type: text
    content: Il a aveuglé leurs yeux; et il a endurci leur cœur,
  - type: text
    content: De peur qu’ils ne voient des yeux,
  - type: text
    content: Qu’ils ne comprennent du cœur,
  - type: text
    content: Qu’ils ne se convertissent, et que je ne les guérisse.
  '41':
  - type: text
    content: ' '
  - type: note
    content: És 6:1.
  - type: text
    content: 'Ésaïe dit ces choses, lorsqu’il vit sa gloire, et qu’il parla de lui. '
  '42':
  - type: note
    content: Jn 7:13, 48.
  - type: text
    content: 'Cependant, même parmi les chefs, plusieurs crurent en lui; mais, à cause des pharisiens, ils n’en faisaient pas l’aveu, '
  - type: note
    content: Jn 9:22.
  - type: text
    content: 'dans la crainte d’être exclus de la synagogue. '
  '43':
  - type: note
    content: Jn 5:44.
  - type: text
    content: 'Car ils aimèrent la gloire des hommes plus que la gloire de Dieu. '
  '44':
  - type: text
    content: 'Or, Jésus s’était écrié: '
  - type: text
    content: Celui qui croit en moi croit, non pas en moi, mais en celui qui m’a envoyé;
  '45':
  - type: text
    content: ' '
  - type: note
    content: Jn 10:30; 14:9.
  - type: text
    content: et celui qui me voit voit celui qui m’a envoyé.
  - type: text
    content: ' '
  '46':
  - type: note
    content: És 42:6; 49:6. Jn 1:9; 8:12; 9:5; 12:35. Ac 13:47.
  - type: text
    content: Je suis venu comme une lumière dans le monde, afin que quiconque croit en moi ne demeure pas dans les ténèbres.
  - type: text
    content: ' '
  '47':
  - type: text
    content: Si quelqu’un entend mes paroles et ne les garde point, ce n’est pas moi qui le juge;
  - type: text
    content: ' '
  - type: note
    content: Jn 3:17; 9:39.
  - type: text
    content: car je suis venu non pour juger le monde, mais pour sauver le monde.
  - type: text
    content: ' '
  '48':
  - type: note
    content: Jn 3:18; 8:24.
  - type: text
    content: Celui qui me rejette et qui ne reçoit pas mes paroles a son juge;
  - type: text
    content: ' '
  - type: note
    content: Mc 16:16.
  - type: text
    content: la parole que j’ai annoncée, c’est elle qui le jugera au dernier jour.
  - type: text
    content: ' '
  '49':
  - type: note
    content: De 18:18. Jn 3:11; 5:20; 7:16; 8:28; 14:10, 24; 16:13.
  - type: text
    content: Car je n’ai point parlé de moi-même; mais le Père, qui m’a envoyé, m’a prescrit lui-même ce que je dois dire et annoncer.
  - type: text
    content: ' '
  '5':
  - type: note
    content: Mc 14:5.
  - type: text
    content: 'Pourquoi n’a-t-on pas vendu ce parfum trois cents deniers, pour les donner aux pauvres? '
  '50':
  - type: text
    content: Et je sais que son commandement est la vie éternelle. C’est pourquoi les choses que je dis, je les dis comme le Père me les a dites.
  '6':
  - type: text
    content: 'Il disait cela, non qu’il se mît en peine des pauvres, mais parce qu’il était voleur, et que, '
  - type: note
    content: Jn 13:29.
  - type: text
    content: 'tenant la bourse, il prenait ce qu’on y mettait. '
  '7':
  - type: text
    content: 'Mais Jésus dit: '
  - type: text
    content: Laisse-la garder ce parfum pour
  - type: text
    content: ' '
  - type: note
    content: Mc 14:8.
  - type: text
    content: le jour de ma sépulture.
  '8':
  - type: text
    content: ' '
  - type: text
    content: Vous avez toujours les
  - type: text
    content: ' '
  - type: note
    content: De 15:11. Mt 26:11. Mc 14:7.
  - type: text
    content: pauvres avec vous, mais vous ne m’avez pas toujours.
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'Une grande multitude de Juifs apprirent que Jésus était à Béthanie; et ils y vinrent, non pas seulement à cause de lui, mais aussi pour voir Lazare, '
  - type: note
    content: Jn 11:44.
  - type: text
    content: 'qu’il avait ressuscité des morts. '
