        children:
        - type: text
          text: Mi 4:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 1:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'que le Christ demeure éternellement; comment donc dis-tu: Il faut que le Fils de l’homme soit élevé? Qui est ce Fils de l’homme? '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus leur dit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 1:9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:12
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:5
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 12:46
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: La lumière est encore pour un peu de temps au milieu de vous.
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 13:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 5:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Th 5:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Marchez, pendant que vous avez la lumière, afin que les ténèbres ne vous surprennent point: celui qui marche dans les ténèbres ne sait où il va.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Pendant que vous avez la lumière, croyez en la lumière, afin que vous soyez des enfants de lumière.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Incrédulité des Juifs
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 37-50: cf. És 6:1-12. De 18:18, 19. Lu 9:26.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus dit ces choses, puis il s’en alla, et se cacha loin d’eux. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Malgré tant de miracles qu’il avait faits en leur présence, ils ne croyaient pas en lui, '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'afin que s’accomplît la parole qu’Ésaïe, le prophète, a prononcée:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 53:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 10:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Seigneur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui a cru à notre prédication?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et à qui le bras du Seigneur a-t-il été révélé?
  '39':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Aussi ne pouvaient-ils croire, parce qu’Ésaïe a dit encore:'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un de ses disciples, Judas Iscariot, fils de Simon, celui qui devait le livrer, dit: '
  '40':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 6:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 12:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 13:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 4:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 8:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 28:26
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 11:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il a aveuglé leurs yeux; et il a endurci leur cœur,
  - type: usfm
