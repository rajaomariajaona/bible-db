    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: pauvres avec vous, mais vous ne m’avez pas toujours.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Une grande multitude de Juifs apprirent que Jésus était à Béthanie; et ils y vinrent, non pas seulement à cause de lui, mais aussi pour voir Lazare, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 11:44
      metadata:
        usfm: JHN.11.44
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qu’il avait ressuscité des morts. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Les principaux sacrificateurs délibérèrent de faire mourir aussi Lazare, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: parce que beaucoup de Juifs se retiraient d’eux à cause de lui, et croyaient en Jésus.
- type: usfm
  marker: s1
