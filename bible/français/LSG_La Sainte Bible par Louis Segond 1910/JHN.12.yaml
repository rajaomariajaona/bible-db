      metadata:
        usfm: JHN.1.45
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'de Bethsaïda en Galilée, et lui dirent avec instance: Seigneur, nous voudrions voir Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Philippe alla le dire à André, puis André et Philippe le dirent à Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Jésus leur répondit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: L’heure est venue
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
