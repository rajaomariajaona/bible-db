document_id: LUK.15,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Paraboles de la brebis égarée, de la drachme perdue, de l’enfant prodigue
  - type: heading
    content: 'V. 1-10: cf. Mt 9:10-13; 18:11-14.'
  - type: text
    content: ' '
  - type: note
    content: Mt 9:10. Mc 2:15. Lu 5:29.
  - type: text
    content: 'Tous les publicains et les gens de mauvaise vie s’approchaient de Jésus pour l’entendre. '
  '10':
  - type: text
    content: De même, je vous le dis, il y a de la joie devant les anges de Dieu pour un seul pécheur qui se repent.
  - type: heading
    content: 'V. 11-32: cf. v. 1-10; 19:1-10. Mt 21:18-32. Os 14. 1 Jn 3:1. Mi 7:7, 8.'
  '11':
  - type: text
    content: 'Il dit encore: '
  - type: text
    content: Un homme avait deux fils.
  '12':
  - type: text
    content: ' '
  - type: text
    content: 'Le plus jeune dit à son père: Mon père, donne-moi la part de bien qui doit me revenir. Et le père leur partagea son bien.'
  - type: text
    content: ' '
  '13':
  - type: text
    content: Peu de jours après, le plus jeune fils, ayant tout ramassé, partit pour un pays éloigné, où il dissipa son bien en vivant dans la débauche.
  - type: text
    content: ' '
  '14':
  - type: text
    content: Lorsqu’il eut tout dépensé, une grande famine survint dans ce pays, et il commença à se trouver dans le besoin.
  - type: text
    content: ' '
  '15':
  - type: text
    content: Il alla se mettre au service d’un des habitants du pays, qui l’envoya dans ses champs garder les pourceaux.
  - type: text
    content: ' '
  '16':
  - type: text
    content: Il aurait bien voulu se rassasier des carouges que mangeaient les pourceaux, mais personne ne lui en donnait.
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'Étant rentré en lui-même, il se dit: Combien de mercenaires chez mon père ont du pain en abondance, et moi, ici, je meurs de faim!'
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'Je me lèverai, j’irai vers mon père, et je lui dirai: Mon père, j’ai péché contre le ciel et contre toi,'
  - type: text
    content: ' '
  '19':
  - type: text
    content: je ne suis plus digne d’être appelé ton fils; traite-moi comme l’un de tes mercenaires.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Et les pharisiens et les scribes murmuraient, disant: Cet homme accueille des gens de mauvaise vie, et mange avec eux. '
  '20':
  - type: text
    content: Et il se leva, et alla vers son père.
  - type: text
    content: ' '
  - type: note
    content: Ac 2:39. Ép 2:12, 17.
  - type: text
    content: Comme il était encore loin, son père le vit et fut ému de compassion, il courut se jeter à son cou et le baisa.
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'Le fils lui dit: Mon père, j’ai péché contre le ciel et contre toi, je ne suis plus digne d’être appelé ton fils.'
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'Mais le père dit à ses serviteurs: Apportez vite la plus belle robe, et l’en revêtez; mettez-lui un anneau au doigt, et des souliers aux pieds.'
  - type: text
    content: ' '
  '23':
  - type: text
    content: Amenez le veau gras, et tuez-le. Mangeons et réjouissons-nous;
  - type: text
    content: ' '
  '24':
  - type: text
    content: car mon fils que voici était mort, et il est revenu à la vie; il était perdu, et il est retrouvé. Et ils commencèrent à se réjouir.
  - type: text
    content: ' '
  '25':
  - type: text
    content: Or, le fils aîné était dans les champs. Lorsqu’il revint et approcha de la maison, il entendit la musique et les danses.
  - type: text
    content: ' '
  '26':
  - type: text
    content: Il appela un des serviteurs, et lui demanda ce que c’était.
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'Ce serviteur lui dit: Ton frère est de retour, et, parce qu’il l’a retrouvé en bonne santé, ton père a tué le veau gras.'
  - type: text
    content: ' '
  '28':
  - type: text
    content: Il se mit en colère, et ne voulut pas entrer. Son père sortit, et le pria d’entrer.
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'Mais il répondit à son père: Voici, il y a tant d’années que je te sers, sans avoir jamais transgressé tes ordres, et jamais tu ne m’as donné un chevreau pour que je me réjouisse avec mes amis.'
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Mais il leur dit cette parabole:'
  '30':
  - type: text
    content: Et quand ton fils est arrivé, celui qui a mangé ton bien avec des prostituées, c’est pour lui que tu as tué le veau gras!
  - type: text
    content: ' '
  '31':
  - type: text
    content: Mon enfant, lui dit le père, tu es toujours avec moi, et tout ce que j’ai est à toi;
  - type: text
    content: ' '
  '32':
  - type: text
    content: mais il fallait bien s’égayer et se réjouir, parce que ton frère que voici était mort et qu’il est revenu à la vie, parce qu’il était perdu et qu’il est retrouvé.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Mt 18:12.
  - type: text
    content: Quel homme d’entre vous, s’il a cent brebis, et qu’il en perde une, ne laisse les quatre-vingt-dix-neuf autres dans le désert pour aller après celle qui est perdue, jusqu’à ce qu’il la retrouve?
  - type: text
    content: ' '
  '5':
  - type: text
    content: Lorsqu’il l’a retrouvée, il la met avec joie sur ses épaules,
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'et, de retour à la maison, il appelle ses amis et ses voisins, et leur dit: Réjouissez-vous avec moi, car j’ai retrouvé ma brebis'
  - type: text
    content: ' '
  - type: note
    content: 1 Pi 2:10.
  - type: text
    content: qui était perdue.
  - type: text
    content: ' '
  '7':
  - type: text
    content: De même, je vous le dis, il y aura plus de joie dans le ciel pour un seul pécheur qui se repent, que pour
  - type: text
    content: ' '
  - type: note
    content: Lu 5:32.
  - type: text
    content: quatre-vingt-dix-neuf justes qui n’ont pas besoin de repentance.
  - type: text
    content: ' '
  '8':
  - type: text
    content: Ou quelle femme, si elle a dix drachmes, et qu’elle en perde une, n’allume une lampe, ne balaie la maison, et ne cherche avec soin, jusqu’à ce qu’elle la retrouve?
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'Lorsqu’elle l’a retrouvée, elle appelle ses amies et ses voisines, et dit: Réjouissez-vous avec moi, car j’ai retrouvé la drachme que j’avais perdue.'
  - type: text
    content: ' '
