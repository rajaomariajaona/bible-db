document_id: LUK.15,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paraboles de la brebis égarée, de la drachme perdue, de l’enfant prodigue
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-10: cf. Mt 9:10-13; 18:11-14.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 9:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 2:15
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 5:29
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Tous les publicains et les gens de mauvaise vie s’approchaient de Jésus pour l’entendre. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: De même, je vous le dis, il y a de la joie devant les anges de Dieu pour un seul pécheur qui se repent.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 11-32: cf. v. 1-10; 19:1-10. Mt 21:18-32. Os 14. 1 Jn 3:1. Mi 7:7, 8.'
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Il dit encore: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Un homme avait deux fils.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Le plus jeune dit à son père: Mon père, donne-moi la part de bien qui doit me revenir. Et le père leur partagea son bien.'
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Peu de jours après, le plus jeune fils, ayant tout ramassé, partit pour un pays éloigné, où il dissipa son bien en vivant dans la débauche.
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Lorsqu’il eut tout dépensé, une grande famine survint dans ce pays, et il commença à se trouver dans le besoin.
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Il alla se mettre au service d’un des habitants du pays, qui l’envoya dans ses champs garder les pourceaux.
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Il aurait bien voulu se rassasier des carouges que mangeaient les pourceaux, mais personne ne lui en donnait.
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Étant rentré en lui-même, il se dit: Combien de mercenaires chez mon père ont du pain en abondance, et moi, ici, je meurs de faim!'
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Je me lèverai, j’irai vers mon père, et je lui dirai: Mon père, j’ai péché contre le ciel et contre toi,'
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: je ne suis plus digne d’être appelé ton fils; traite-moi comme l’un de tes mercenaires.
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Et les pharisiens et les scribes murmuraient, disant: Cet homme accueille des gens de mauvaise vie, et mange avec eux. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Et il se leva, et alla vers son père.
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 2:39
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 2:12
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '17'
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Comme il était encore loin, son père le vit et fut ému de compassion, il courut se jeter à son cou et le baisa.
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Le fils lui dit: Mon père, j’ai péché contre le ciel et contre toi, je ne suis plus digne d’être appelé ton fils.'
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Mais le père dit à ses serviteurs: Apportez vite la plus belle robe, et l’en revêtez; mettez-lui un anneau au doigt, et des souliers aux pieds.'
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Amenez le veau gras, et tuez-le. Mangeons et réjouissons-nous;
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: car mon fils que voici était mort, et il est revenu à la vie; il était perdu, et il est retrouvé. Et ils commencèrent à se réjouir.
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Or, le fils aîné était dans les champs. Lorsqu’il revint et approcha de la maison, il entendit la musique et les danses.
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Il appela un des serviteurs, et lui demanda ce que c’était.
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Ce serviteur lui dit: Ton frère est de retour, et, parce qu’il l’a retrouvé en bonne santé, ton père a tué le veau gras.'
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Il se mit en colère, et ne voulut pas entrer. Son père sortit, et le pria d’entrer.
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Mais il répondit à son père: Voici, il y a tant d’années que je te sers, sans avoir jamais transgressé tes ordres, et jamais tu ne m’as donné un chevreau pour que je me réjouisse avec mes amis.'
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Mais il leur dit cette parabole:'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Et quand ton fils est arrivé, celui qui a mangé ton bien avec des prostituées, c’est pour lui que tu as tué le veau gras!
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Mon enfant, lui dit le père, tu es toujours avec moi, et tout ce que j’ai est à toi;
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: mais il fallait bien s’égayer et se réjouir, parce que ton frère que voici était mort et qu’il est revenu à la vie, parce qu’il était perdu et qu’il est retrouvé.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 18:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Quel homme d’entre vous, s’il a cent brebis, et qu’il en perde une, ne laisse les quatre-vingt-dix-neuf autres dans le désert pour aller après celle qui est perdue, jusqu’à ce qu’il la retrouve?
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Lorsqu’il l’a retrouvée, il la met avec joie sur ses épaules,
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'et, de retour à la maison, il appelle ses amis et ses voisins, et leur dit: Réjouissez-vous avec moi, car j’ai retrouvé ma brebis'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 2:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: qui était perdue.
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: De même, je vous le dis, il y aura plus de joie dans le ciel pour un seul pécheur qui se repent, que pour
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 5:32
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: quatre-vingt-dix-neuf justes qui n’ont pas besoin de repentance.
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ou quelle femme, si elle a dix drachmes, et qu’elle en perde une, n’allume une lampe, ne balaie la maison, et ne cherche avec soin, jusqu’à ce qu’elle la retrouve?
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Lorsqu’elle l’a retrouvée, elle appelle ses amies et ses voisines, et dit: Réjouissez-vous avec moi, car j’ai retrouvé la drachme que j’avais perdue.'
    - type: text
      text: ' '
