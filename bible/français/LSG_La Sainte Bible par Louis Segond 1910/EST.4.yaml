document_id: EST.4,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Consternation et jeûne parmi les Juifs
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-17: cf. (2 R 19:1-4. 2 Ch 20:3, 4. Esd 8:21-23.) Mt 16:24-26. Ro 15:30.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Mardochée, ayant appris tout ce qui se passait, déchira ses vêtements, s’enveloppa d’un sac et se couvrit de cendre. Puis il alla au milieu de la ville en poussant avec force des cris amers, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Esther chargea Hathac d’aller dire à Mardochée: '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Tous les serviteurs du roi et le peuple des provinces du roi savent qu’il existe une loi portant peine de mort contre quiconque, homme ou femme, entre chez le roi, dans la cour intérieure, sans avoir été appelé; celui-là seul a la vie sauve, à qui le roi tend le sceptre d’or. Et moi, je n’ai point été appelée auprès du roi depuis trente jours. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Lorsque les paroles d’Esther eurent été rapportées à Mardochée, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Mardochée fit répondre à Esther: Ne t’imagine pas que tu échapperas seule d’entre tous les Juifs, parce que tu es dans la maison du roi; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'car, si tu te tais maintenant, le secours et la délivrance surgiront d’autre part pour les Juifs, et toi et la maison de ton père vous périrez. Et qui sait si ce n’est pas pour un temps comme celui-ci que tu es parvenue à la royauté? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Esther envoya dire à Mardochée: '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Va, rassemble tous les Juifs qui se trouvent à Suse, et jeûnez pour moi, sans manger ni boire pendant trois jours, ni la nuit ni le jour. Moi aussi, je jeûnerai de même avec mes servantes, puis j’entrerai chez le roi, malgré la loi; et si je dois périr, je périrai. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Mardochée s’en alla, et fit tout ce qu’Esther lui avait ordonné.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'et se rendit jusqu’à la porte du roi, dont l’entrée était interdite à toute personne revêtue d’un sac. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dans chaque province, partout où arrivaient l’ordre du roi et son édit, il y eut une grande désolation parmi les Juifs; ils jeûnaient, pleuraient et se lamentaient, et beaucoup se couchaient sur le sac et la cendre. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Les servantes d’Esther et ses eunuques vinrent lui annoncer cela, et la reine fut très effrayée. Elle envoya des vêtements à Mardochée pour le couvrir et lui faire ôter son sac, mais il ne les accepta pas. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Alors Esther appela Hathac, l’un des eunuques que le roi avait placés auprès d’elle, et elle le chargea d’aller demander à Mardochée ce que c’était et d’où cela venait. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Hathac se rendit vers Mardochée sur la place de la ville, devant la porte du roi. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Et Mardochée lui raconta tout ce qui lui était arrivé, et lui indiqua la somme d’argent qu’Haman avait promis de livrer au trésor du roi en retour du massacre des Juifs. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Il lui donna aussi une copie de l’édit publié dans Suse en vue de leur destruction, afin qu’il le montrât à Esther et lui fît tout connaître; et il ordonna qu’Esther se rendît chez le roi pour lui demander grâce et l’implorer en faveur de son peuple. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Hathac vint rapporter à Esther les paroles de Mardochée. '
