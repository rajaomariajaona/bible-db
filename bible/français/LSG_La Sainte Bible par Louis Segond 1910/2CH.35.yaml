document_id: 2CH.35,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Célébration solennelle de la Pâque sous Josias
  - type: heading
    content: 'V. 1-19: cf. 2 R 23:21-25. (2 Ch 30. Esd 6:19-22.)'
  - type: text
    content: ' '
  - type: note
    content: 2 R 23:21.
  - type: text
    content: 'Josias célébra la Pâque en l’honneur de l’Éternel à Jérusalem, et l’on immola la Pâque le quatorzième jour du premier mois. '
  '10':
  - type: text
    content: 'Le service s’organisa, et les sacrificateurs et les Lévites occupèrent leur place, selon leurs divisions, d’après l’ordre du roi. '
  '11':
  - type: text
    content: 'Ils immolèrent la Pâque; les sacrificateurs répandirent le sang qu’ils recevaient de la main des Lévites, et les Lévites dépouillèrent les victimes. '
  '12':
  - type: text
    content: 'Ils mirent à part les holocaustes pour les donner aux différentes maisons paternelles des gens du peuple, afin qu’ils les offrissent à l’Éternel, comme il est écrit dans le livre de Moïse; et de même pour les bœufs. '
  '13':
  - type: note
    content: Ex 12:8, 9.
  - type: text
    content: 'Ils firent cuire la Pâque au feu, selon l’ordonnance, et ils firent cuire les choses saintes dans des chaudières, des chaudrons et des poêles; et ils s’empressèrent de les distribuer à tout le peuple. '
  '14':
  - type: text
    content: 'Ensuite ils préparèrent ce qui était pour eux et pour les sacrificateurs, car les sacrificateurs, fils d’Aaron, furent occupés jusqu’à la nuit à offrir les holocaustes et les graisses; c’est pourquoi les Lévites préparèrent pour eux et pour les sacrificateurs, fils d’Aaron. '
  '15':
  - type: text
    content: 'Les chantres, fils d’Asaph, étaient à leur place, selon l’ordre de David, d’Asaph, d’Héman, et de Jeduthun le voyant du roi, et les portiers étaient à chaque porte; ils n’eurent pas à se détourner de leur office, car leurs frères les Lévites préparèrent ce qui était pour eux. '
  '16':
  - type: text
    content: 'Ainsi fut organisé ce jour-là tout le service de l’Éternel pour faire la Pâque et pour offrir des holocaustes sur l’autel de l’Éternel, d’après l’ordre du roi Josias. '
  '17':
  - type: text
    content: 'Les enfants d’Israël qui se trouvaient là célébrèrent la Pâque en ce temps et la fête des pains sans levain pendant sept jours. '
  '18':
  - type: text
    content: 'Aucune Pâque pareille à celle-là n’avait été célébrée en Israël depuis les jours de Samuel le prophète; et aucun des rois d’Israël n’avait célébré une Pâque pareille à celle que célébrèrent Josias, les sacrificateurs et les Lévites, tout Juda et Israël qui s’y trouvaient, et les habitants de Jérusalem. '
  '19':
  - type: text
    content: 'Ce fut '
  - type: note
    content: 2 R 23:23.
  - type: text
    content: la dix-huitième année du règne de Josias que cette Pâque fut célébrée.
  - type: heading
    content: Josias tué par les archers de Néco, roi d’Égypte
  - type: heading
    content: 'V. 20-27: cf. 2 R 23:26-30. Jé 22:10, 15, 16. Ap 3:10.'
  '2':
  - type: text
    content: 'Il établit les sacrificateurs dans leurs fonctions, et les encouragea au service de la maison de l’Éternel. '
  '20':
  - type: text
    content: 'Après tout cela, après que Josias eut réparé la maison de l’Éternel, '
  - type: note
    content: 2 R 23:29, etc.
  - type: text
    content: 'Néco, roi d’Égypte, monta pour combattre à Carkemisch sur l’Euphrate. Josias marcha à sa rencontre; '
  '21':
  - type: text
    content: 'et Néco lui envoya des messagers pour dire: Qu’y a-t-il entre moi et toi, roi de Juda? Ce n’est pas contre toi que je viens aujourd’hui; c’est contre une maison avec laquelle je suis en guerre. Et Dieu m’a dit de me hâter. Ne t’oppose pas à Dieu, qui est avec moi, de peur qu’il ne te détruise. '
  '22':
  - type: text
    content: 'Mais Josias ne se détourna point de lui, et il se déguisa pour l’attaquer, sans écouter les paroles de Néco, qui venaient de la bouche de Dieu. Il s’avança pour combattre dans la vallée de Meguiddo. '
  '23':
  - type: text
    content: 'Les archers tirèrent sur le roi Josias, et le roi dit à ses serviteurs: Emportez-moi, car je suis gravement blessé. '
  '24':
  - type: text
    content: 'Ses serviteurs l’emportèrent du char, le mirent dans un second char qui était à lui, et l’amenèrent à Jérusalem. Il mourut, et fut enterré dans le sépulcre de ses pères. Tout Juda et Jérusalem pleurèrent Josias. '
  '25':
  - type: text
    content: 'Jérémie fit une complainte sur Josias; tous les chanteurs et toutes les chanteuses ont parlé de Josias dans leurs complaintes jusqu’à ce jour, et en ont établi la coutume en Israël. Ces chants sont écrits dans les Complaintes. '
  '26':
  - type: text
    content: 'Le reste des actions de Josias, et ses œuvres de piété, telles que les prescrit la loi de l’Éternel, '
  '27':
  - type: text
    content: ses premières et ses dernières actions, cela est écrit dans le livre des rois d’Israël et de Juda.
  '3':
  - type: text
    content: 'Il dit aux Lévites qui enseignaient tout Israël et qui étaient consacrés à l’Éternel: Placez l’arche sainte dans la maison qu’a bâtie Salomon, fils de David, roi d’Israël; vous n’avez plus à la porter sur l’épaule. Servez maintenant l’Éternel, votre Dieu, et son peuple d’Israël. '
  '4':
  - type: text
    content: 'Tenez-vous prêts, selon vos maisons paternelles, selon vos divisions, '
  - type: note
    content: 1 Ch 23:24, 25, 26.
  - type: text
    content: 'comme l’ont réglé par écrit David, roi d’Israël, et Salomon, son fils; '
  '5':
  - type: text
    content: 'occupez vos places dans le sanctuaire, d’après les différentes maisons paternelles de vos frères les fils du peuple, et d’après la classification des maisons paternelles des Lévites. '
  '6':
  - type: text
    content: 'Immolez la Pâque, sanctifiez-vous, et préparez-la pour vos frères, en vous conformant à la parole de l’Éternel prononcée par Moïse. '
  '7':
  - type: note
    content: 2 R 30:24.
  - type: text
    content: 'Josias donna aux gens du peuple, à tous ceux qui se trouvaient là, des agneaux et des chevreaux au nombre de trente mille, le tout pour la Pâque, et trois mille bœufs; cela fut pris sur les biens du roi. '
  '8':
  - type: text
    content: 'Ses chefs firent de bon gré un présent au peuple, aux sacrificateurs et aux Lévites. Hilkija, Zacharie, et Jehiel, princes de la maison de Dieu, donnèrent aux sacrificateurs pour la Pâque deux mille six cents agneaux et trois cents bœufs. '
  '9':
  - type: text
    content: 'Conania, Schemaeja et Nethaneel, ses frères, Haschabia, Jeïel et Jozabad, chefs des Lévites, donnèrent aux Lévites pour la Pâque cinq mille agneaux et cinq cents bœufs. '
