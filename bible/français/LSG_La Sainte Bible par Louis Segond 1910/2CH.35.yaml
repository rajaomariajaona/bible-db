document_id: 2CH.35
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Célébration solennelle de la Pâque sous Josias
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-19: cf. 2 R 23:21-25. (2 Ch 30. Esd 6:19-22.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 23:21
      metadata:
        usfm: 2KI.23.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Josias célébra la Pâque en l’honneur de l’Éternel à Jérusalem, et l’on immola la Pâque le quatorzième jour du premier mois. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il établit les sacrificateurs dans leurs fonctions, et les encouragea au service de la maison de l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il dit aux Lévites qui enseignaient tout Israël et qui étaient consacrés à l’Éternel: Placez l’arche sainte dans la maison qu’a bâtie Salomon, fils de David, roi d’Israël; vous n’avez plus à la porter sur l’épaule. Servez maintenant l’Éternel, votre Dieu, et son peuple d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tenez-vous prêts, selon vos maisons paternelles, selon vos divisions, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 23:24
      metadata:
        usfm: 1CH.23.24
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '25'
      metadata:
        usfm: 1CH.23.25
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '26'
      metadata:
        usfm: 1CH.23.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'comme l’ont réglé par écrit David, roi d’Israël, et Salomon, son fils; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'occupez vos places dans le sanctuaire, d’après les différentes maisons paternelles de vos frères les fils du peuple, et d’après la classification des maisons paternelles des Lévites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Immolez la Pâque, sanctifiez-vous, et préparez-la pour vos frères, en vous conformant à la parole de l’Éternel prononcée par Moïse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 R 30:24.
    marker-yv: yv-n
  - type: text
    text: 'Josias donna aux gens du peuple, à tous ceux qui se trouvaient là, des agneaux et des chevreaux au nombre de trente mille, le tout pour la Pâque, et trois mille bœufs; cela fut pris sur les biens du roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ses chefs firent de bon gré un présent au peuple, aux sacrificateurs et aux Lévites. Hilkija, Zacharie, et Jehiel, princes de la maison de Dieu, donnèrent aux sacrificateurs pour la Pâque deux mille six cents agneaux et trois cents bœufs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Conania, Schemaeja et Nethaneel, ses frères, Haschabia, Jeïel et Jozabad, chefs des Lévites, donnèrent aux Lévites pour la Pâque cinq mille agneaux et cinq cents bœufs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Le service s’organisa, et les sacrificateurs et les Lévites occupèrent leur place, selon leurs divisions, d’après l’ordre du roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ils immolèrent la Pâque; les sacrificateurs répandirent le sang qu’ils recevaient de la main des Lévites, et les Lévites dépouillèrent les victimes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ils mirent à part les holocaustes pour les donner aux différentes maisons paternelles des gens du peuple, afin qu’ils les offrissent à l’Éternel, comme il est écrit dans le livre de Moïse; et de même pour les bœufs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 12:8
      metadata:
        usfm: EXO.12.8
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '9'
      metadata:
        usfm: EXO.12.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ils firent cuire la Pâque au feu, selon l’ordonnance, et ils firent cuire les choses saintes dans des chaudières, des chaudrons et des poêles; et ils s’empressèrent de les distribuer à tout le peuple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ensuite ils préparèrent ce qui était pour eux et pour les sacrificateurs, car les sacrificateurs, fils d’Aaron, furent occupés jusqu’à la nuit à offrir les holocaustes et les graisses; c’est pourquoi les Lévites préparèrent pour eux et pour les sacrificateurs, fils d’Aaron. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Les chantres, fils d’Asaph, étaient à leur place, selon l’ordre de David, d’Asaph, d’Héman, et de Jeduthun le voyant du roi, et les portiers étaient à chaque porte; ils n’eurent pas à se détourner de leur office, car leurs frères les Lévites préparèrent ce qui était pour eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ainsi fut organisé ce jour-là tout le service de l’Éternel pour faire la Pâque et pour offrir des holocaustes sur l’autel de l’Éternel, d’après l’ordre du roi Josias. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Les enfants d’Israël qui se trouvaient là célébrèrent la Pâque en ce temps et la fête des pains sans levain pendant sept jours. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Aucune Pâque pareille à celle-là n’avait été célébrée en Israël depuis les jours de Samuel le prophète; et aucun des rois d’Israël n’avait célébré une Pâque pareille à celle que célébrèrent Josias, les sacrificateurs et les Lévites, tout Juda et Israël qui s’y trouvaient, et les habitants de Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ce fut '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 23:23
      metadata:
        usfm: 2KI.23.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: la dix-huitième année du règne de Josias que cette Pâque fut célébrée.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Josias tué par les archers de Néco, roi d’Égypte
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 20-27: cf. 2 R 23:26-30. Jé 22:10, 15, 16. Ap 3:10.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Après tout cela, après que Josias eut réparé la maison de l’Éternel, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 R 23:29, etc.
    marker-yv: yv-n
  - type: text
    text: 'Néco, roi d’Égypte, monta pour combattre à Carkemisch sur l’Euphrate. Josias marcha à sa rencontre; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'et Néco lui envoya des messagers pour dire: Qu’y a-t-il entre moi et toi, roi de Juda? Ce n’est pas contre toi que je viens aujourd’hui; c’est contre une maison avec laquelle je suis en guerre. Et Dieu m’a dit de me hâter. Ne t’oppose pas à Dieu, qui est avec moi, de peur qu’il ne te détruise. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Mais Josias ne se détourna point de lui, et il se déguisa pour l’attaquer, sans écouter les paroles de Néco, qui venaient de la bouche de Dieu. Il s’avança pour combattre dans la vallée de Meguiddo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Les archers tirèrent sur le roi Josias, et le roi dit à ses serviteurs: Emportez-moi, car je suis gravement blessé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ses serviteurs l’emportèrent du char, le mirent dans un second char qui était à lui, et l’amenèrent à Jérusalem. Il mourut, et fut enterré dans le sépulcre de ses pères. Tout Juda et Jérusalem pleurèrent Josias. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Jérémie fit une complainte sur Josias; tous les chanteurs et toutes les chanteuses ont parlé de Josias dans leurs complaintes jusqu’à ce jour, et en ont établi la coutume en Israël. Ces chants sont écrits dans les Complaintes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Le reste des actions de Josias, et ses œuvres de piété, telles que les prescrit la loi de l’Éternel, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ses premières et ses dernières actions, cela est écrit dans le livre des rois d’Israël et de Juda.
