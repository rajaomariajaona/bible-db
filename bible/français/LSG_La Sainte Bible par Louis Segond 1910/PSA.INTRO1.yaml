document_id: PSA.INTRO1,93
type_code: fra
verses:
  '1':
  - type: text
    content: INTRODUCTION AU LIVRE DES PSAUMES
  - type: text
    content: (Né 9:5. Ép 5:19. Hé 13:15.)
  - type: text
    content: Le titre de ce livre, «Psaumes», évoque des louanges ou des cantiques. C’est un recueil de 150 poèmes destinés à être chantés, parfois avec accompagnement musical. Il s’agit en quelque sorte d’une petite Bible dans la grande.
  - type: text
    content: 'Il est divisé en cinq livres (1 à 41; 42 à 71; 72 à 89; 90 à 106; 107 à 150). Chaque Psaume traite d’un ou plusieurs thèmes dominants, d’où la classification indicative et non exhaustive ci-après:'
  - type: text
    content: '1. Les hymnes qui célèbrent la grandeur et la bonté de l’Éternel: Ps 8; 19; 33; 103; 105; 111; 113; 114; 117; 135; 136; 145; 149.'
  - type: text
    content: '2. Les cantiques de la royauté divine qui affirment que l’Éternel est roi: Ps 47; 93; 96; 99.'
  - type: text
    content: '3. Les Psaumes de la royauté humaine; prière d’un roi ou pour un roi: Ps 2; 18; 20; 45; 72; 89; 101; 110; 144.'
  - type: text
    content: '4. Les Psaumes de procession pour entrer au temple: Ps 15; 24.'
  - type: text
    content: '5. Les cantiques des pèlerins israélites se rendant à l’une des trois grandes fêtes annuelles (Pâque, fête des semaines, fête des huttes): Ps 84; 91; 121; 122.'
  - type: text
    content: '6. Les Psaumes de Sion, célébrant les privilèges de ce lieu choisi par l’Éternel pour son temple à Jérusalem: Ps 46; 48: 76; 87; 132.'
  - type: text
    content: '7. Les cantiques instructifs contenant des recommandations et des avertissements divins: Ps 14; 50; 53; 75; 81; 95.'
  - type: text
    content: '8. Les Psaumes comportant un enseignement: Ps 1; 37; 49; 73; 78; 112; 119; 127; 133.'
  - type: text
    content: '9. Les Psaumes du peuple en détresse: Ps 12; 44; 58; 60; 74; 79; 80; 83; 85; 90; 94; 106; 108; 123; 126; 137.'
  - type: text
    content: '10. Les Psaumes de supplications personnelles en cas de malheur: Ps 5–7; 13; 17; 22; 25; 26; 28; 31; 35; 38; 39; 41–43; 51; 54; 57; 59; 61; 63; 64; 69–71; 86; 88; 102; 109; 120; 130; 140–143.'
  - type: text
    content: '11. Les Psaumes d’action de grâces ou de reconnaissance à Dieu après une délivrance ou un pardon: Ps 9–10; 30; 32; 34; 40; 92; 107; 116; 118.'
  - type: text
    content: '12. Les Psaumes d’assurance exprimant la joie et la paix du fidèle: Ps 3; 4; 11; 16; 23; 62; 131; 139.'
  - type: text
    content: 'Le psautier peut aussi être classé selon les différents titres: le titre «mizmor» (= psaume) y revient 57 fois, celui de «shir» (= chant) trente fois, celui de «shir hamaalot» (= chant des montées) 15 fois, celui de «maskil» (= poème) 13 fois, celui de «mitkam» (= hymne) 6 fois, celui de «tephilla» (= prière) 5 fois, et celui de «shiggayon» (= complainte) une fois.'
  - type: text
    content: Le psautier est le recueil de prières d’Israël et de tous les fidèles à travers l’histoire. Chaque Psaume reste d’actualité ou actualisable pour tous ceux qui, en toutes circonstances, cherchent le secours de l’Éternel.
