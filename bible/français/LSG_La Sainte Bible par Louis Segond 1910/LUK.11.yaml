document_id: LUK.11,93
type_code: fra
verses:
  '1':
  - type: heading
    content: L’oraison dominicale
  - type: heading
    content: 'V. 1-4: cf. Mt 6:9-13.'
  - type: text
    content: 'Jésus priait un jour en un certain lieu. Lorsqu’il eut achevé, un de ses disciples lui dit: Seigneur, enseigne-nous à prier, comme Jean l’a enseigné à ses disciples. '
  '10':
  - type: text
    content: Car quiconque demande reçoit, celui qui cherche trouve, et l’on ouvre à celui qui frappe.
  - type: text
    content: ' '
  '11':
  - type: note
    content: Mt 7:9.
  - type: text
    content: Quel est parmi vous le père qui donnera une pierre à son fils, s’il lui demande du pain? Ou, s’il demande un poisson, lui donnera-t-il un serpent au lieu d’un poisson?
  - type: text
    content: ' '
  '12':
  - type: text
    content: Ou, s’il demande un œuf, lui donnera-t-il un scorpion?
  - type: text
    content: ' '
  '13':
  - type: text
    content: Si donc, méchants comme vous l’êtes, vous savez donner de bonnes choses à vos enfants, à combien plus forte raison le Père céleste donnera-t-il le Saint-Esprit à ceux qui le lui demandent.
  - type: heading
    content: Guérison d’un démoniaque muet. Réponse de Jésus à ses adversaires
  - type: heading
    content: 'V. 14-23: cf. (Mt 12:22-37. Mc 3:22-30.) Mt 9:32-34.'
  '14':
  - type: text
    content: ' '
  - type: note
    content: Mt 9:32; 12:22.
  - type: text
    content: 'Jésus chassa un démon qui était muet. Lorsque le démon fut sorti, le muet parla, et la foule fut dans l’admiration. '
  '15':
  - type: text
    content: 'Mais quelques-uns dirent: '
  - type: note
    content: Mt 9:34; 12:24. Mc 3:22.
  - type: text
    content: 'c’est par Béelzébul, le prince des démons, qu’il chasse les démons. '
  '16':
  - type: text
    content: 'Et d’autres, pour l’éprouver, lui '
  - type: note
    content: Mt 16:1.
  - type: text
    content: 'demandèrent un signe venant du ciel. '
  '17':
  - type: text
    content: 'Comme Jésus connaissait leurs pensées, il leur dit: '
  - type: note
    content: Mt 12:25. Mc 3:24.
  - type: text
    content: Tout royaume divisé contre lui-même est dévasté, et une maison s’écroule sur une autre.
  '18':
  - type: text
    content: ' '
  - type: text
    content: Si donc Satan est divisé contre lui-même, comment son royaume subsistera-t-il, puisque vous dites que je chasse les démons par Béelzébul?
  - type: text
    content: ' '
  '19':
  - type: text
    content: Et si moi, je chasse les démons par Béelzébul, vos fils, par qui les chassent-ils? C’est pourquoi ils seront eux-mêmes vos juges.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Il leur dit: '
  - type: note
    content: Mt 6:9.
  - type: text
    content: 'Quand vous priez, dites: Père! Que ton nom soit sanctifié; que ton règne vienne.'
  '20':
  - type: text
    content: Mais, si c’est par le doigt de Dieu que je chasse les démons, le royaume de Dieu est donc venu vers vous.
  - type: text
    content: ' '
  '21':
  - type: text
    content: Lorsqu’un homme fort et bien armé garde sa maison, ce qu’il possède est en sûreté.
  - type: text
    content: ' '
  '22':
  - type: note
    content: Col 2:15.
  - type: text
    content: Mais, si un plus fort que lui survient et le dompte, il lui enlève toutes les armes dans lesquelles il se confiait, et il distribue ses dépouilles.
  - type: text
    content: ' '
  '23':
  - type: note
    content: Mt 12:30.
  - type: text
    content: Celui qui n’est pas avec moi est contre moi, et celui qui n’assemble pas avec moi disperse.
  - type: heading
    content: 'V. 24-26: cf. Mt 12:43-45.'
  '24':
  - type: text
    content: ' '
  - type: note
    content: Mt 12:43, etc.
  - type: text
    content: 'Lorsque l’esprit impur est sorti d’un homme, il va dans des lieux arides, pour chercher du repos. N’en trouvant point, il dit: Je retournerai dans ma maison d’où je suis sorti;'
  - type: text
    content: ' '
  '25':
  - type: text
    content: et, quand il arrive, il la trouve balayée et ornée.
  - type: text
    content: ' '
  '26':
  - type: text
    content: Alors il s’en va, et il prend sept autres esprits plus méchants que lui; ils entrent dans la maison, s’y établissent,
  - type: text
    content: ' '
  - type: note
    content: Jn 5:14. Hé 6:4, 5; 10:26. 2 Pi 2:20.
  - type: text
    content: et la dernière condition de cet homme est pire que la première.
  - type: heading
    content: 'V. 27-28: cf. Lu 8:21. Ja 1:25. Ap 22:14.'
  '27':
  - type: text
    content: 'Tandis que Jésus parlait ainsi, une femme, élevant la voix du milieu de la foule, lui dit: Heureux le sein qui t’a porté! Heureuses les mamelles qui t’ont allaité! '
  '28':
  - type: text
    content: 'Et il répondit: '
  - type: note
    content: Mt 7:21. Jn 6:29. Ro 2:13.
  - type: text
    content: Heureux plutôt ceux qui écoutent la parole de Dieu, et qui la gardent!
  - type: heading
    content: Un miracle refusé
  - type: heading
    content: 'V. 29-32: cf. Mt 12:38-42; 16:1-4.'
  '29':
  - type: text
    content: 'Comme le peuple s’amassait en foule, il se mit à dire: '
  - type: text
    content: Cette génération est une génération méchante; elle demande un miracle; il ne lui sera donné d’autre miracle que
  - type: text
    content: ' '
  - type: note
    content: Jon 1:17; 2:10.
  - type: text
    content: celui de Jonas.
  '3':
  - type: text
    content: ' '
  - type: text
    content: Donne-nous chaque jour notre pain quotidien;
  - type: text
    content: ' '
  '30':
  - type: text
    content: ' '
  - type: text
    content: Car, de même que Jonas fut un signe pour les Ninivites, de même le Fils de l’homme en sera un pour cette génération.
  - type: text
    content: ' '
  '31':
  - type: text
    content: La reine du Midi se lèvera, au jour du jugement, avec les hommes de cette génération et les condamnera,
  - type: text
    content: ' '
  - type: note
    content: 1 R 10:1. 2 Ch 9:1. Mt 12:42.
  - type: text
    content: parce qu’elle vint des extrémités de la terre pour entendre la sagesse de Salomon; et voici, il y a ici plus que Salomon.
  - type: text
    content: ' '
  '32':
  - type: text
    content: Les hommes de Ninive se lèveront, au jour du jugement, avec cette génération et la condamneront,
  - type: text
    content: ' '
  - type: note
    content: Jon 3:5.
  - type: text
    content: parce qu’ils se repentirent à la prédication de Jonas; et voici, il y a ici plus que Jonas.
  - type: heading
    content: 'V. 33-36: cf. Mt 5:15; 6:22, 23.'
  '33':
  - type: text
    content: ' '
  - type: note
    content: Mt 5:15. Mc 4:21. Lu 8:16.
  - type: text
    content: Personne n’allume une lampe pour la mettre dans un lieu caché ou sous le boisseau, mais on la met sur le chandelier, afin que ceux qui entrent voient la lumière.
  - type: text
    content: ' '
  '34':
  - type: note
    content: Mt 6:22.
  - type: text
    content: Ton œil est la lampe de ton corps. Lorsque ton œil est en bon état, tout ton corps est éclairé; mais lorsque ton œil est en mauvais état, ton corps est dans les ténèbres.
  - type: text
    content: ' '
  '35':
  - type: text
    content: Prends donc garde que la lumière qui est en toi ne soit ténèbres.
  - type: text
    content: ' '
  '36':
  - type: text
    content: Si donc tout ton corps est éclairé, n’ayant aucune partie dans les ténèbres, il sera entièrement éclairé, comme lorsque la lampe t’éclaire de sa lumière.
  - type: heading
    content: Les scribes et les pharisiens censurés
  - type: heading
    content: 'V. 37-54: cf. Mc 7:1-16. Mt 23:1-36.'
  '37':
  - type: text
    content: 'Pendant que Jésus parlait, un pharisien le pria de dîner chez lui. Il entra, et se mit à table. '
  '38':
  - type: text
    content: 'Le pharisien vit avec étonnement '
  - type: note
    content: Mc 7:3.
  - type: text
    content: 'qu’il ne s’était pas lavé avant le repas. '
  '39':
  - type: text
    content: 'Mais le Seigneur lui dit: '
  - type: note
    content: Mt 23:25.
  - type: text
    content: Vous, pharisiens, vous nettoyez le dehors de la coupe et du plat,
  - type: text
    content: ' '
  - type: note
    content: Tit 1:15.
  - type: text
    content: et à l’intérieur vous êtes pleins de rapine et de méchanceté.
  '4':
  - type: text
    content: pardonne-nous nos péchés, car nous aussi nous pardonnons à quiconque nous offense; et ne nous induis pas en tentation.
  - type: heading
    content: La persévérance dans la prière
  - type: heading
    content: 'V. 5-13: cf. Mt 7:7-11. (Lu 18:1-8. Mt 15:22-28.) (Ja 1:5-7. 1 Jn 5:14, 15.)'
  '40':
  - type: text
    content: ' '
  - type: text
    content: Insensés! Celui qui a fait le dehors n’a-t-il pas fait aussi le dedans?
  - type: text
    content: ' '
  '41':
  - type: note
    content: És 58:7. Da 4:27. Lu 12:33.
  - type: text
    content: Donnez plutôt en aumônes ce qui est dedans, et voici, toutes choses seront pures pour vous.
  - type: text
    content: ' '
  '42':
  - type: note
    content: Mt 23:23.
  - type: text
    content: Mais malheur à vous, pharisiens! Parce que vous payez la dîme de la menthe, de la rue, et de toutes les herbes, et
  - type: text
    content: ' '
  - type: note
    content: 1 S 15:22. Os 6:6. Mi 6:8. Mt 9:13; 12:7.
  - type: text
    content: 'que vous négligez la justice et l’amour de Dieu: c’est là ce qu’il fallait pratiquer, sans omettre les autres choses.'
  - type: text
    content: ' '
  '43':
  - type: note
    content: Mt 23:6. Mc 12:38. Lu 20:46.
  - type: text
    content: Malheur à vous, pharisiens! Parce que vous aimez les premiers sièges dans les synagogues, et les salutations dans les places publiques.
  - type: text
    content: ' '
  '44':
  - type: note
    content: Mt 23:27.
  - type: text
    content: Malheur à vous! Parce que vous êtes comme les sépulcres qui ne paraissent pas, et sur lesquels on marche sans le savoir.
  - type: text
    content: ' '
  '45':
  - type: text
    content: 'Un des docteurs de la loi prit la parole, et lui dit: Maître, en parlant de la sorte, c’est aussi nous que tu outrages. '
  '46':
  - type: note
    content: És 10:1. Mt 23:4. Ac 15:10.
  - type: text
    content: 'Et Jésus répondit: '
  - type: text
    content: Malheur à vous aussi, docteurs de la loi! Parce que vous chargez les hommes de fardeaux difficiles à porter, et que vous ne touchez pas vous-mêmes de l’un de vos doigts.
  '47':
  - type: text
    content: ' '
  - type: note
    content: Mt 23:29.
  - type: text
    content: Malheur à vous! Parce que vous bâtissez les tombeaux des prophètes, que vos pères ont tués.
  - type: text
    content: ' '
  '48':
  - type: text
    content: Vous rendez donc témoignage aux œuvres de vos pères, et vous les approuvez; car eux, ils ont tué les prophètes, et vous, vous bâtissez leurs tombeaux.
  - type: text
    content: ' '
  '49':
  - type: text
    content: 'C’est pourquoi la sagesse de Dieu a dit:'
  - type: text
    content: ' '
  - type: note
    content: Mt 10:16. Lu 10:3. Jn 16:2. Ac 7:51. Hé 11:35.
  - type: text
    content: Je leur enverrai des prophètes et des apôtres; ils tueront les uns et persécuteront les autres,
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'Il leur dit encore: '
  - type: text
    content: 'Si l’un de vous a un ami, et qu’il aille le trouver au milieu de la nuit pour lui dire: Ami, prête-moi trois pains,'
  '50':
  - type: text
    content: afin qu’il soit demandé compte à cette génération du sang de tous les prophètes qui a été répandu depuis la création du monde,
  - type: text
    content: ' '
  '51':
  - type: note
    content: Ge 4:8. Hé 11:4.
  - type: text
    content: depuis le sang d’Abel
  - type: text
    content: ' '
  - type: note
    content: 2 Ch 24:21.
  - type: text
    content: jusqu’au sang de Zacharie, tué entre l’autel et le temple; oui, je vous le dis, il en sera demandé compte à cette génération.
  - type: text
    content: ' '
  '52':
  - type: note
    content: Mt 23:13.
  - type: text
    content: Malheur à vous, docteurs de la loi! Parce que vous avez enlevé la clef de la science; vous n’êtes pas entrés vous-mêmes, et vous avez empêché d’entrer ceux qui le voulaient.
  - type: text
    content: ' '
  '53':
  - type: text
    content: 'Quand il fut sorti de là, les scribes et les pharisiens commencèrent à le presser violemment, et à le faire parler sur beaucoup de choses, '
  '54':
  - type: text
    content: lui tendant des pièges, pour surprendre quelque parole sortie de sa bouche.
  '6':
  - type: text
    content: ' '
  - type: text
    content: car un de mes amis est arrivé de voyage chez moi, et je n’ai rien à lui offrir,
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'et si, de l’intérieur de sa maison, cet ami lui répond: Ne m’importune pas, la porte est déjà fermée, mes enfants et moi sommes au lit, je ne puis me lever pour te donner des pains,'
  - type: text
    content: ' '
  '8':
  - type: text
    content: je vous le dis, même s’il ne se levait pas pour les lui donner parce que c’est son ami, il se lèverait à cause de son importunité et lui donnerait tout ce dont il a besoin.
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'Et moi, je vous dis:'
  - type: text
    content: ' '
  - type: note
    content: Mt 7:7; 21:22. Mc 11:24. Jn 14:13; 15:7; 16:24. Ja 1:5, 6. 1 Jn 3:22; 5:14.
  - type: text
    content: Demandez, et l’on vous donnera; cherchez, et vous trouverez; frappez, et l’on vous ouvrira.
  - type: text
    content: ' '
