document_id: LUK.11,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’oraison dominicale
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-4: cf. Mt 6:9-13.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Jésus priait un jour en un certain lieu. Lorsqu’il eut achevé, un de ses disciples lui dit: Seigneur, enseigne-nous à prier, comme Jean l’a enseigné à ses disciples. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Car quiconque demande reçoit, celui qui cherche trouve, et l’on ouvre à celui qui frappe.
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 7:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Quel est parmi vous le père qui donnera une pierre à son fils, s’il lui demande du pain? Ou, s’il demande un poisson, lui donnera-t-il un serpent au lieu d’un poisson?
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ou, s’il demande un œuf, lui donnera-t-il un scorpion?
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Si donc, méchants comme vous l’êtes, vous savez donner de bonnes choses à vos enfants, à combien plus forte raison le Père céleste donnera-t-il le Saint-Esprit à ceux qui le lui demandent.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Guérison d’un démoniaque muet. Réponse de Jésus à ses adversaires
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 14-23: cf. (Mt 12:22-37. Mc 3:22-30.) Mt 9:32-34.'
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 9:32
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 12:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Jésus chassa un démon qui était muet. Lorsque le démon fut sorti, le muet parla, et la foule fut dans l’admiration. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Mais quelques-uns dirent: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 9:34
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 12:24
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 3:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'c’est par Béelzébul, le prince des démons, qu’il chasse les démons. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Et d’autres, pour l’éprouver, lui '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 16:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'demandèrent un signe venant du ciel. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Comme Jésus connaissait leurs pensées, il leur dit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 12:25
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 3:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Tout royaume divisé contre lui-même est dévasté, et une maison s’écroule sur une autre.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Si donc Satan est divisé contre lui-même, comment son royaume subsistera-t-il, puisque vous dites que je chasse les démons par Béelzébul?
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Et si moi, je chasse les démons par Béelzébul, vos fils, par qui les chassent-ils? C’est pourquoi ils seront eux-mêmes vos juges.
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Il leur dit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 6:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Quand vous priez, dites: Père! Que ton nom soit sanctifié; que ton règne vienne.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Mais, si c’est par le doigt de Dieu que je chasse les démons, le royaume de Dieu est donc venu vers vous.
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Lorsqu’un homme fort et bien armé garde sa maison, ce qu’il possède est en sûreté.
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 2:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Mais, si un plus fort que lui survient et le dompte, il lui enlève toutes les armes dans lesquelles il se confiait, et il distribue ses dépouilles.
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 12:30
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Celui qui n’est pas avec moi est contre moi, et celui qui n’assemble pas avec moi disperse.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 24-26: cf. Mt 12:43-45.'
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Mt 12:43, etc.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Lorsque l’esprit impur est sorti d’un homme, il va dans des lieux arides, pour chercher du repos. N’en trouvant point, il dit: Je retournerai dans ma maison d’où je suis sorti;'
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: et, quand il arrive, il la trouve balayée et ornée.
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Alors il s’en va, et il prend sept autres esprits plus méchants que lui; ils entrent dans la maison, s’y établissent,
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 5:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 6:4
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '5'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10:26
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Pi 2:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: et la dernière condition de cet homme est pire que la première.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 27-28: cf. Lu 8:21. Ja 1:25. Ap 22:14.'
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Tandis que Jésus parlait ainsi, une femme, élevant la voix du milieu de la foule, lui dit: Heureux le sein qui t’a porté! Heureuses les mamelles qui t’ont allaité! '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Et il répondit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 7:21
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 6:29
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 2:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Heureux plutôt ceux qui écoutent la parole de Dieu, et qui la gardent!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Un miracle refusé
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 29-32: cf. Mt 12:38-42; 16:1-4.'
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Comme le peuple s’amassait en foule, il se mit à dire: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Cette génération est une génération méchante; elle demande un miracle; il ne lui sera donné d’autre miracle que
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Jon 1:17; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: celui de Jonas.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Donne-nous chaque jour notre pain quotidien;
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Car, de même que Jonas fut un signe pour les Ninivites, de même le Fils de l’homme en sera un pour cette génération.
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: La reine du Midi se lèvera, au jour du jugement, avec les hommes de cette génération et les condamnera,
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 10:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 9:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 12:42
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: parce qu’elle vint des extrémités de la terre pour entendre la sagesse de Salomon; et voici, il y a ici plus que Salomon.
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Les hommes de Ninive se lèveront, au jour du jugement, avec cette génération et la condamneront,
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jon 3:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: parce qu’ils se repentirent à la prédication de Jonas; et voici, il y a ici plus que Jonas.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 33-36: cf. Mt 5:15; 6:22, 23.'
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 5:15
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 4:21
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 8:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Personne n’allume une lampe pour la mettre dans un lieu caché ou sous le boisseau, mais on la met sur le chandelier, afin que ceux qui entrent voient la lumière.
    - type: text
      text: ' '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 6:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ton œil est la lampe de ton corps. Lorsque ton œil est en bon état, tout ton corps est éclairé; mais lorsque ton œil est en mauvais état, ton corps est dans les ténèbres.
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Prends donc garde que la lumière qui est en toi ne soit ténèbres.
    - type: text
      text: ' '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Si donc tout ton corps est éclairé, n’ayant aucune partie dans les ténèbres, il sera entièrement éclairé, comme lorsque la lampe t’éclaire de sa lumière.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les scribes et les pharisiens censurés
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 37-54: cf. Mc 7:1-16. Mt 23:1-36.'
    marker-yv: yv-h
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Pendant que Jésus parlait, un pharisien le pria de dîner chez lui. Il entra, et se mit à table. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Le pharisien vit avec étonnement '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 7:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'qu’il ne s’était pas lavé avant le repas. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Mais le Seigneur lui dit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 23:25
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Vous, pharisiens, vous nettoyez le dehors de la coupe et du plat,
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Tit 1:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: et à l’intérieur vous êtes pleins de rapine et de méchanceté.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: pardonne-nous nos péchés, car nous aussi nous pardonnons à quiconque nous offense; et ne nous induis pas en tentation.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La persévérance dans la prière
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 5-13: cf. Mt 7:7-11. (Lu 18:1-8. Mt 15:22-28.) (Ja 1:5-7. 1 Jn 5:14, 15.)'
    marker-yv: yv-h
  '40':
  - type: usfm
    marker: p
