segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Joseph en Égypte
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-6: cf. 1 S 18:14. Ps 1:1-3.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 37:28
      metadata:
        usfm: GEN.37.28
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 105:17
      metadata:
        usfm: PSA.105.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'On fit descendre Joseph en Égypte; et Potiphar, officier de Pharaon, chef des gardes, Égyptien, l’acheta des Ismaélites qui l’y avaient fait descendre. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'L’Éternel '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'v. 21. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 7:9
      metadata:
        usfm: ACT.7.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'fut avec lui, et la prospérité l’accompagna; il habitait dans la maison de son maître, l’Égyptien. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Son maître vit que l’Éternel était avec lui, et que l’Éternel faisait prospérer entre ses mains tout ce qu’il entreprenait. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Joseph trouva grâce aux yeux de son maître, qui l’employa à son service, l’établit sur sa maison, et lui confia tout ce qu’il possédait. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dès que Potiphar l’eut établi sur sa maison et sur tout ce qu’il possédait, l’Éternel bénit la maison de l’Égyptien, à cause de Joseph; et la bénédiction de l’Éternel fut sur tout ce qui lui appartenait, soit à la maison, soit aux champs. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Il abandonna aux mains de Joseph tout ce qui lui appartenait, et il n’avait avec lui d’autre soin que celui de prendre sa nourriture. Or, Joseph était beau de taille et beau de figure.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 7-20: cf. Ec 7:26. Pr 6:20, etc. Job 31:1, 2. Ja 1:12.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Après ces choses, il arriva '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 7:13
      metadata:
        usfm: PRO.7.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'que la femme de son maître porta les yeux sur Joseph, et dit: Couche avec moi! '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Il refusa, et dit à la femme de son maître: Voici, mon maître ne prend avec moi connaissance de rien dans la maison, et il a remis entre mes mains tout ce qui lui appartient. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il n’est pas plus grand que moi dans cette maison, et il ne m’a rien interdit, excepté toi, parce que tu es sa femme. Comment ferais-je un aussi grand mal et pécherais-je contre Dieu? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Quoiqu’elle parlât tous les jours à Joseph, il refusa de coucher auprès d’elle, d’être avec elle. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Un jour qu’il était entré dans la maison pour faire son ouvrage, et qu’il n’y avait là aucun des gens de la maison, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'elle le saisit par son vêtement, en disant: Couche avec moi! Il lui laissa son vêtement dans la main, et s’enfuit au dehors. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Lorsqu’elle vit qu’il lui avait laissé son vêtement dans la main, et qu’il s’était enfui dehors, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'elle appela les gens de sa maison, et leur dit: Voyez, il nous a amené un Hébreu pour se jouer de nous. Cet homme est venu vers moi pour coucher avec moi; mais j’ai crié à haute voix. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Et quand il a entendu que j’élevais la voix et que je criais, il a laissé son vêtement à côté de moi et s’est enfui dehors. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Et elle posa le vêtement de Joseph à côté d’elle, jusqu’à ce que son maître rentrât à la maison. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Alors elle lui parla ainsi: L’esclave hébreu que tu nous as amené est venu vers moi pour se jouer de moi. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Et comme j’ai élevé la voix et que j’ai crié, il a laissé son vêtement à côté de moi et s’est enfui dehors. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Après avoir entendu les paroles de sa femme, qui lui disait: Voilà ce que m’a fait ton esclave! Le maître de Joseph fut enflammé de colère. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Il prit Joseph, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 105:18
      metadata:
        usfm: PSA.105.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'le mit dans la prison, dans le lieu où les prisonniers du roi étaient enfermés: il fut là, en prison.'
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 21-23: cf. Ps 105:18, 19. 1 Pi 2:19, 20.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'L’Éternel fut avec Joseph, et il étendit sur lui sa bonté. Il le mit en faveur aux yeux du chef de la prison. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Et le chef de la prison plaça sous sa surveillance tous les prisonniers qui étaient dans la prison; et rien ne s’y faisait que par lui. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Le chef de la prison ne prenait aucune connaissance de ce que Joseph avait en main, parce que l’Éternel était avec lui. Et l’Éternel donnait de la réussite à ce qu’il faisait.
