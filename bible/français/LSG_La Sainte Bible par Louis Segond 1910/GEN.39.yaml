document_id: GEN.39,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Joseph en Égypte
  - type: heading
    content: 'V. 1-6: cf. 1 S 18:14. Ps 1:1-3.'
  - type: text
    content: ' '
  - type: note
    content: Ge 37:28. Ps 105:17.
  - type: text
    content: 'On fit descendre Joseph en Égypte; et Potiphar, officier de Pharaon, chef des gardes, Égyptien, l’acheta des Ismaélites qui l’y avaient fait descendre. '
  '10':
  - type: text
    content: 'Quoiqu’elle parlât tous les jours à Joseph, il refusa de coucher auprès d’elle, d’être avec elle. '
  '11':
  - type: text
    content: 'Un jour qu’il était entré dans la maison pour faire son ouvrage, et qu’il n’y avait là aucun des gens de la maison, '
  '12':
  - type: text
    content: 'elle le saisit par son vêtement, en disant: Couche avec moi! Il lui laissa son vêtement dans la main, et s’enfuit au dehors. '
  '13':
  - type: text
    content: 'Lorsqu’elle vit qu’il lui avait laissé son vêtement dans la main, et qu’il s’était enfui dehors, '
  '14':
  - type: text
    content: 'elle appela les gens de sa maison, et leur dit: Voyez, il nous a amené un Hébreu pour se jouer de nous. Cet homme est venu vers moi pour coucher avec moi; mais j’ai crié à haute voix. '
  '15':
  - type: text
    content: 'Et quand il a entendu que j’élevais la voix et que je criais, il a laissé son vêtement à côté de moi et s’est enfui dehors. '
  '16':
  - type: text
    content: 'Et elle posa le vêtement de Joseph à côté d’elle, jusqu’à ce que son maître rentrât à la maison. '
  '17':
  - type: text
    content: 'Alors elle lui parla ainsi: L’esclave hébreu que tu nous as amené est venu vers moi pour se jouer de moi. '
  '18':
  - type: text
    content: 'Et comme j’ai élevé la voix et que j’ai crié, il a laissé son vêtement à côté de moi et s’est enfui dehors. '
  '19':
  - type: text
    content: 'Après avoir entendu les paroles de sa femme, qui lui disait: Voilà ce que m’a fait ton esclave! Le maître de Joseph fut enflammé de colère. '
  '2':
  - type: text
    content: 'L’Éternel '
  - type: note
    content: v. 21. Ac 7:9.
  - type: text
    content: 'fut avec lui, et la prospérité l’accompagna; il habitait dans la maison de son maître, l’Égyptien. '
  '20':
  - type: text
    content: 'Il prit Joseph, et '
  - type: note
    content: Ps 105:18.
  - type: text
    content: 'le mit dans la prison, dans le lieu où les prisonniers du roi étaient enfermés: il fut là, en prison.'
  - type: heading
    content: 'V. 21-23: cf. Ps 105:18, 19. 1 Pi 2:19, 20.'
  '21':
  - type: text
    content: 'L’Éternel fut avec Joseph, et il étendit sur lui sa bonté. Il le mit en faveur aux yeux du chef de la prison. '
  '22':
  - type: text
    content: 'Et le chef de la prison plaça sous sa surveillance tous les prisonniers qui étaient dans la prison; et rien ne s’y faisait que par lui. '
  '23':
  - type: text
    content: Le chef de la prison ne prenait aucune connaissance de ce que Joseph avait en main, parce que l’Éternel était avec lui. Et l’Éternel donnait de la réussite à ce qu’il faisait.
  '3':
  - type: text
    content: 'Son maître vit que l’Éternel était avec lui, et que l’Éternel faisait prospérer entre ses mains tout ce qu’il entreprenait. '
  '4':
  - type: text
    content: 'Joseph trouva grâce aux yeux de son maître, qui l’employa à son service, l’établit sur sa maison, et lui confia tout ce qu’il possédait. '
  '5':
  - type: text
    content: 'Dès que Potiphar l’eut établi sur sa maison et sur tout ce qu’il possédait, l’Éternel bénit la maison de l’Égyptien, à cause de Joseph; et la bénédiction de l’Éternel fut sur tout ce qui lui appartenait, soit à la maison, soit aux champs. '
  '6':
  - type: text
    content: Il abandonna aux mains de Joseph tout ce qui lui appartenait, et il n’avait avec lui d’autre soin que celui de prendre sa nourriture. Or, Joseph était beau de taille et beau de figure.
  - type: heading
    content: 'V. 7-20: cf. Ec 7:26. Pr 6:20, etc. Job 31:1, 2. Ja 1:12.'
  '7':
  - type: text
    content: 'Après ces choses, il arriva '
  - type: note
    content: Pr 7:13.
  - type: text
    content: 'que la femme de son maître porta les yeux sur Joseph, et dit: Couche avec moi! '
  '8':
  - type: text
    content: 'Il refusa, et dit à la femme de son maître: Voici, mon maître ne prend avec moi connaissance de rien dans la maison, et il a remis entre mes mains tout ce qui lui appartient. '
  '9':
  - type: text
    content: 'Il n’est pas plus grand que moi dans cette maison, et il ne m’a rien interdit, excepté toi, parce que tu es sa femme. Comment ferais-je un aussi grand mal et pécherais-je contre Dieu? '
