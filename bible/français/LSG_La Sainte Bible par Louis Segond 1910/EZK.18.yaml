document_id: EZK.18,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les rétributions divines
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-18: cf. Jé 31:29, 30. (Job 34:10-23. Ro 2:6-11. És 3:10, 11.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La parole de l’Éternel me fut adressée, en ces mots: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'S’il a un fils qui soit violent, qui répande le sang, ou qui commette quelque chose de semblable; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'si ce fils n’imite en rien la conduite de son père, s’il mange sur les montagnes, s’il déshonore la femme de son prochain, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 's’il opprime le malheureux et l’indigent, s’il commet des rapines, s’il ne rend pas le gage, s’il lève les yeux vers les idoles et fait des abominations, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 's’il prête à intérêt et tire une usure, ce fils-là vivrait! Il ne vivra pas; il a commis toutes ces abominations; qu’il meure! Que son sang retombe sur lui! '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais si un homme a un fils qui voie tous les péchés que commet son père, qui les voie et n’agisse pas de la même manière; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'si ce fils ne mange pas sur les montagnes et ne lève pas les yeux vers les idoles de la maison d’Israël, s’il ne déshonore pas la femme de son prochain, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 's’il n’opprime personne, s’il ne prend point de gage, s’il ne commet point de rapines, s’il donne son pain à celui qui a faim et couvre d’un vêtement celui qui est nu, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 's’il détourne sa main de l’iniquité, s’il n’exige ni intérêt ni usure, s’il observe mes ordonnances et suit mes lois, celui-là ne mourra pas pour l’iniquité de son père; il vivra. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: C’est son père, qui a été un oppresseur, qui a commis des rapines envers les autres, qui a fait au milieu de son peuple ce qui n’est pas bien, c’est lui qui mourra pour son iniquité.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 19-32: cf. Éz 33:7-20. Os 14.'
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous dites: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 24:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 14:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 25:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Pourquoi le fils ne porte-t-il pas l’iniquité de son père? C’est que le fils a agi selon la droiture et la justice, c’est qu’il a observé et mis en pratique toutes mes lois; il vivra. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pourquoi dites-vous ce proverbe dans le pays d’Israël: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 31:29
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Les pères ont mangé des raisins verts, et les dents des enfants en ont été agacées? '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’âme qui pèche, c’est celle qui mourra. Le fils ne portera pas l’iniquité de son père, et le père ne portera pas l’iniquité de son fils. La justice du juste sera sur lui, et la méchanceté du méchant sera sur lui. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si le méchant revient de tous les péchés qu’il a commis, s’il observe toutes mes lois et pratique la droiture et la justice, il vivra, il ne mourra pas. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toutes les transgressions qu’il a commises seront oubliées; il vivra, à cause de la justice qu’il a pratiquée. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 33:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Ce que je désire, est-ce que le méchant meure? Dit le Seigneur, l’Éternel. N’est-ce pas qu’il change de conduite et qu’il vive? '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si le juste se détourne de sa justice et commet l’iniquité, s’il imite toutes les abominations du méchant, vivra-t-il? Toute sa justice sera oubliée, parce qu’il s’est livré à l’iniquité et au péché; à cause de cela, il mourra. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous dites: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 33:17
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '20'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'La voie du Seigneur n’est pas droite. Écoutez donc, maison d’Israël! Est-ce ma voie qui n’est pas droite? Ne sont-ce pas plutôt vos voies qui ne sont pas droites? '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si le juste se détourne de sa justice et commet l’iniquité, et meurt pour cela, il meurt à cause de l’iniquité qu’il a commise. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si le méchant revient de sa méchanceté et pratique la droiture et la justice, il fera vivre son âme. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'S’il ouvre les yeux et se détourne de toutes les transgressions qu’il a commises, il vivra, il ne mourra pas. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La maison d’Israël dit: La voie du Seigneur n’est pas droite. Est-ce ma voie qui n’est pas droite, maison d’Israël? Ne sont-ce pas plutôt vos voies qui ne sont pas droites? '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je suis vivant! Dit le Seigneur, l’Éternel, vous n’aurez plus lieu de dire ce proverbe en Israël. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est pourquoi je vous jugerai chacun selon ses voies, maison d’Israël, dit le Seigneur, l’Éternel. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 3:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Revenez et détournez-vous de toutes vos transgressions, afin que l’iniquité ne cause pas votre ruine. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rejetez loin de vous toutes les transgressions par lesquelles vous avez péché; faites-vous un '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 32:39
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 11:19
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 36:26
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'cœur nouveau et un esprit nouveau. Pourquoi mourriez-vous, maison d’Israël? '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 33:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: je ne désire pas la mort de celui qui meurt, dit le Seigneur, l’Éternel. Convertissez-vous donc, et vivez.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici, toutes les âmes sont à moi; l’âme du fils comme l’âme du père, l’une et l’autre sont à moi; l’âme qui pèche, c’est celle qui mourra. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’homme qui est juste, qui pratique la droiture et la justice, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'qui ne mange pas sur les '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 57:7
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 65:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'montagnes et ne lève pas les yeux vers les idoles de la maison d’Israël, qui ne déshonore pas la femme de son '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 18:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'prochain et ne s’approche pas d’une femme '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 18:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'pendant son impureté, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'qui '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 22:21
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 19:13
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 25:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'n’opprime personne, qui rend au débiteur son '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 22:26
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 24:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'gage, qui ne commet point de rapines, qui '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 15:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 58:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 25:35
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'donne son pain à celui qui a faim et couvre d’un vêtement celui qui est nu, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'qui ne prête pas à '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 22:25
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 25:35
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '36'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'intérêt et ne tire point d’usure, qui détourne sa main de l’iniquité et juge selon la vérité entre un homme et un autre, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'qui suit mes lois et observe mes ordonnances en agissant avec fidélité, celui-là est juste, il vivra, dit le Seigneur, l’Éternel. '
