      - type: text
        text: Mt 5:34
      metadata:
        usfm: MAT.5.34
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '35'
      metadata:
        usfm: MAT.5.35
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 7:49
      metadata:
        usfm: ACT.7.49
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 17:24
      metadata:
        usfm: ACT.17.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'puisque les cieux et les cieux des cieux ne peuvent le contenir? Et qui suis-je pour lui bâtir une maison, si ce n’est pour faire brûler des parfums devant lui? '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Envoie-moi donc un homme habile pour les ouvrages en or, en argent, en airain et en fer, en étoffes teintes en pourpre, en cramoisi et en bleu, et connaissant la sculpture, afin qu’il travaille avec les hommes habiles qui sont auprès de moi en Juda et à Jérusalem et que David, mon père, a choisis. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Envoie-moi aussi du Liban des bois de cèdre, de cyprès et de sandal; car je sais que tes serviteurs s’entendent à couper les bois du Liban. Voici, mes serviteurs seront avec les tiens. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Que l’on me prépare du bois en abondance, car la maison que je vais bâtir sera grande et magnifique. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Je donnerai à tes serviteurs qui couperont, qui abattront les bois, vingt mille cors de froment foulé, vingt mille cors d’orge, vingt mille baths de vin, et vingt mille baths d’huile. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Huram, roi de Tyr, répondit dans une lettre qu’il envoya à Salomon: C’est parce que l’Éternel aime son peuple qu’il t’a établi roi sur eux. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Huram dit encore: Béni soit l’Éternel, le Dieu d’Israël, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 1:2
      metadata:
        usfm: GEN.1.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 20:11
      metadata:
        usfm: EXO.20.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 33:6
      metadata:
        usfm: PSA.33.6
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 96:5
      metadata:
        usfm: PSA.96.5
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 102:26
      metadata:
        usfm: PSA.102.26
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 124:8
      metadata:
        usfm: PSA.124.8
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 136:5
      metadata:
        usfm: PSA.136.5
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '6'
      metadata:
        usfm: PSA.136.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 4:24
      metadata:
        usfm: ACT.4.24
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 14:15
      metadata:
        usfm: ACT.14.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 10:6
      metadata:
        usfm: ACT.10.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qui a fait les cieux et la terre, de ce qu’il a donné au roi David un fils sage, prudent et intelligent, qui va bâtir une maison à l’Éternel et une maison royale pour lui! '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Je t’envoie donc un homme habile et intelligent, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Huram-Abi, fils d’une femme d’entre les filles de Dan, et d’un père Tyrien. Il est habile pour les ouvrages en or, en argent, en airain et en fer, en pierre et en bois, en étoffes teintes en pourpre et en bleu, en étoffes de byssus et de carmin, et pour toute espèce de sculptures et d’objets d’art qu’on lui donne à exécuter. Il travaillera avec tes hommes habiles et avec les hommes habiles de mon seigneur David, ton père. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Maintenant, que mon seigneur envoie à ses serviteurs le froment, l’orge, l’huile et le vin '
  - type: usfm
    marker: x
    children:
    - type: text
      text: v. 10.
    marker-yv: yv-n
  - type: text
    text: 'dont il a parlé. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Et nous, nous couperons des bois du Liban autant que tu en auras besoin; nous te les expédierons par mer en radeaux jusqu’à Japho, et tu les feras monter à Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 5:15
      metadata:
        usfm: 1KI.5.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Salomon compta tous les étrangers qui étaient dans le pays d’Israël, et dont le dénombrement avait '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 22:2
      metadata:
        usfm: 1CH.22.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'été fait par David, son père. On en trouva cent cinquante-trois mille six cents. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Et il en prit soixante-dix mille pour porter les fardeaux, quatre-vingt mille pour tailler les pierres dans la montagne, et trois mille six cents pour surveiller et faire travailler le peuple.
