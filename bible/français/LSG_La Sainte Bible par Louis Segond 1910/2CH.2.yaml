document_id: 2CH.2,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Préparatifs de Salomon pour la construction du temple
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-18: cf. 1 R 5. És 60:13.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Salomon ordonna que l’on bâtît une maison au nom de l’Éternel et une maison royale pour lui. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je donnerai à tes serviteurs qui couperont, qui abattront les bois, vingt mille cors de froment foulé, vingt mille cors d’orge, vingt mille baths de vin, et vingt mille baths d’huile. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Huram, roi de Tyr, répondit dans une lettre qu’il envoya à Salomon: C’est parce que l’Éternel aime son peuple qu’il t’a établi roi sur eux. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Huram dit encore: Béni soit l’Éternel, le Dieu d’Israël, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 1:2
      - type: text
