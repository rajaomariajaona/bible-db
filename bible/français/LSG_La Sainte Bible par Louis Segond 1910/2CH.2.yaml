      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'qui a fait les cieux et la terre, de ce qu’il a donné au roi David un fils sage, prudent et intelligent, qui va bâtir une maison à l’Éternel et une maison royale pour lui! '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je t’envoie donc un homme habile et intelligent, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Huram-Abi, fils d’une femme d’entre les filles de Dan, et d’un père Tyrien. Il est habile pour les ouvrages en or, en argent, en airain et en fer, en pierre et en bois, en étoffes teintes en pourpre et en bleu, en étoffes de byssus et de carmin, et pour toute espèce de sculptures et d’objets d’art qu’on lui donne à exécuter. Il travaillera avec tes hommes habiles et avec les hommes habiles de mon seigneur David, ton père. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maintenant, que mon seigneur envoie à ses serviteurs le froment, l’orge, l’huile et le vin '
    - type: usfm
      marker: x
      children:
      - type: text
        text: v. 10.
      marker-yv: yv-n
    - type: text
      text: 'dont il a parlé. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et nous, nous couperons des bois du Liban autant que tu en auras besoin; nous te les expédierons par mer en radeaux jusqu’à Japho, et tu les feras monter à Jérusalem. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 5:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Salomon compta tous les étrangers qui étaient dans le pays d’Israël, et dont le dénombrement avait '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 22:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'été fait par David, son père. On en trouva cent cinquante-trois mille six cents. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et il en prit soixante-dix mille pour porter les fardeaux, quatre-vingt mille pour tailler les pierres dans la montagne, et trois mille six cents pour surveiller et faire travailler le peuple.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Salomon compta soixante-dix mille hommes pour porter les fardeaux, quatre-vingt mille pour tailler les pierres dans la montagne, et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 5:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'trois mille six cents pour les surveiller. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Salomon '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 5:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'envoya dire à Huram, roi de Tyr: Fais pour moi comme tu as fait pour David, mon père, à qui tu as envoyé des cèdres afin qu’il se bâtît une maison d’habitation. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici, j’élève une maison au nom de l’Éternel, mon Dieu, pour la lui consacrer, pour brûler devant lui le parfum odoriférant, pour présenter continuellement les pains de proposition, et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 28:9
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '11'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'pour offrir les holocaustes du matin et du soir, des sabbats, des nouvelles lunes, et des fêtes de l’Éternel, notre Dieu, suivant une loi perpétuelle pour Israël. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La maison que je vais bâtir doit être grande, car notre Dieu est plus grand que tous les dieux. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais qui a le pouvoir de lui bâtir une maison, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 8:27
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 6:18
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 11:7
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '9'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 66:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 23:24
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 5:34
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '35'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 7:49
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 17:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'puisque les cieux et les cieux des cieux ne peuvent le contenir? Et qui suis-je pour lui bâtir une maison, si ce n’est pour faire brûler des parfums devant lui? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Envoie-moi donc un homme habile pour les ouvrages en or, en argent, en airain et en fer, en étoffes teintes en pourpre, en cramoisi et en bleu, et connaissant la sculpture, afin qu’il travaille avec les hommes habiles qui sont auprès de moi en Juda et à Jérusalem et que David, mon père, a choisis. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Envoie-moi aussi du Liban des bois de cèdre, de cyprès et de sandal; car je sais que tes serviteurs s’entendent à couper les bois du Liban. Voici, mes serviteurs seront avec les tiens. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Que l’on me prépare du bois en abondance, car la maison que je vais bâtir sera grande et magnifique. '
