  children:
  - type: text
    text: Préparatifs de Salomon pour la construction du temple
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-18: cf. 1 R 5. És 60:13.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Salomon ordonna que l’on bâtît une maison au nom de l’Éternel et une maison royale pour lui. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Salomon compta soixante-dix mille hommes pour porter les fardeaux, quatre-vingt mille pour tailler les pierres dans la montagne, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 5:16
      metadata:
        usfm: 1KI.5.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'trois mille six cents pour les surveiller. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Salomon '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 5:2
      metadata:
        usfm: 1KI.5.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'envoya dire à Huram, roi de Tyr: Fais pour moi comme tu as fait pour David, mon père, à qui tu as envoyé des cèdres afin qu’il se bâtît une maison d’habitation. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Voici, j’élève une maison au nom de l’Éternel, mon Dieu, pour la lui consacrer, pour brûler devant lui le parfum odoriférant, pour présenter continuellement les pains de proposition, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 28:9
      metadata:
        usfm: NUM.28.9
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '10'
      metadata:
        usfm: NUM.28.10
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '11'
      metadata:
        usfm: NUM.28.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'pour offrir les holocaustes du matin et du soir, des sabbats, des nouvelles lunes, et des fêtes de l’Éternel, notre Dieu, suivant une loi perpétuelle pour Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'La maison que je vais bâtir doit être grande, car notre Dieu est plus grand que tous les dieux. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Mais qui a le pouvoir de lui bâtir une maison, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 8:27
      metadata:
        usfm: 1KI.8.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 6:18
      metadata:
        usfm: 2CH.6.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 11:7
      metadata:
        usfm: JOB.11.7
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '8'
      metadata:
        usfm: JOB.11.8
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '9'
      metadata:
        usfm: JOB.11.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 66:1
      metadata:
        usfm: ISA.66.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 23:24
      metadata:
        usfm: JER.23.24
    - type: text
      text: '. '
    - type: usfm
