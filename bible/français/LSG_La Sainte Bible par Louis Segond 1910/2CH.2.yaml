document_id: 2CH.2,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Préparatifs de Salomon pour la construction du temple
  - type: heading
    content: 'V. 1-18: cf. 1 R 5. És 60:13.'
  - type: text
    content: 'Salomon ordonna que l’on bâtît une maison au nom de l’Éternel et une maison royale pour lui. '
  '10':
  - type: text
    content: 'Je donnerai à tes serviteurs qui couperont, qui abattront les bois, vingt mille cors de froment foulé, vingt mille cors d’orge, vingt mille baths de vin, et vingt mille baths d’huile. '
  '11':
  - type: text
    content: 'Huram, roi de Tyr, répondit dans une lettre qu’il envoya à Salomon: C’est parce que l’Éternel aime son peuple qu’il t’a établi roi sur eux. '
  '12':
  - type: text
    content: 'Huram dit encore: Béni soit l’Éternel, le Dieu d’Israël, '
  - type: note
    content: Ge 1:2. Ex 20:11. Ps 33:6; 96:5; 102:26; 124:8; 136:5, 6. Ac 4:24; 14:15. Ac 10:6.
  - type: text
    content: 'qui a fait les cieux et la terre, de ce qu’il a donné au roi David un fils sage, prudent et intelligent, qui va bâtir une maison à l’Éternel et une maison royale pour lui! '
  '13':
  - type: text
    content: 'Je t’envoie donc un homme habile et intelligent, '
  '14':
  - type: text
    content: 'Huram-Abi, fils d’une femme d’entre les filles de Dan, et d’un père Tyrien. Il est habile pour les ouvrages en or, en argent, en airain et en fer, en pierre et en bois, en étoffes teintes en pourpre et en bleu, en étoffes de byssus et de carmin, et pour toute espèce de sculptures et d’objets d’art qu’on lui donne à exécuter. Il travaillera avec tes hommes habiles et avec les hommes habiles de mon seigneur David, ton père. '
  '15':
  - type: text
    content: 'Maintenant, que mon seigneur envoie à ses serviteurs le froment, l’orge, l’huile et le vin '
  - type: note
    content: v. 10.
  - type: text
    content: 'dont il a parlé. '
  '16':
  - type: text
    content: 'Et nous, nous couperons des bois du Liban autant que tu en auras besoin; nous te les expédierons par mer en radeaux jusqu’à Japho, et tu les feras monter à Jérusalem. '
  '17':
  - type: note
    content: 1 R 5:15.
  - type: text
    content: 'Salomon compta tous les étrangers qui étaient dans le pays d’Israël, et dont le dénombrement avait '
  - type: note
    content: 1 Ch 22:2.
  - type: text
    content: 'été fait par David, son père. On en trouva cent cinquante-trois mille six cents. '
  '18':
  - type: text
    content: Et il en prit soixante-dix mille pour porter les fardeaux, quatre-vingt mille pour tailler les pierres dans la montagne, et trois mille six cents pour surveiller et faire travailler le peuple.
  '2':
  - type: text
    content: 'Salomon compta soixante-dix mille hommes pour porter les fardeaux, quatre-vingt mille pour tailler les pierres dans la montagne, et '
  - type: note
    content: 1 R 5:16.
  - type: text
    content: 'trois mille six cents pour les surveiller. '
  '3':
  - type: text
    content: 'Salomon '
  - type: note
    content: 1 R 5:2.
  - type: text
    content: 'envoya dire à Huram, roi de Tyr: Fais pour moi comme tu as fait pour David, mon père, à qui tu as envoyé des cèdres afin qu’il se bâtît une maison d’habitation. '
  '4':
  - type: text
    content: 'Voici, j’élève une maison au nom de l’Éternel, mon Dieu, pour la lui consacrer, pour brûler devant lui le parfum odoriférant, pour présenter continuellement les pains de proposition, et '
  - type: note
    content: No 28:9, 10, 11.
  - type: text
    content: 'pour offrir les holocaustes du matin et du soir, des sabbats, des nouvelles lunes, et des fêtes de l’Éternel, notre Dieu, suivant une loi perpétuelle pour Israël. '
  '5':
  - type: text
    content: 'La maison que je vais bâtir doit être grande, car notre Dieu est plus grand que tous les dieux. '
  '6':
  - type: text
    content: 'Mais qui a le pouvoir de lui bâtir une maison, '
  - type: note
    content: 1 R 8:27. 2 Ch 6:18. Job 11:7, 8, 9. És 66:1. Jé 23:24. Mt 5:34, 35. Ac 7:49; 17:24.
  - type: text
    content: 'puisque les cieux et les cieux des cieux ne peuvent le contenir? Et qui suis-je pour lui bâtir une maison, si ce n’est pour faire brûler des parfums devant lui? '
  '7':
  - type: text
    content: 'Envoie-moi donc un homme habile pour les ouvrages en or, en argent, en airain et en fer, en étoffes teintes en pourpre, en cramoisi et en bleu, et connaissant la sculpture, afin qu’il travaille avec les hommes habiles qui sont auprès de moi en Juda et à Jérusalem et que David, mon père, a choisis. '
  '8':
  - type: text
    content: 'Envoie-moi aussi du Liban des bois de cèdre, de cyprès et de sandal; car je sais que tes serviteurs s’entendent à couper les bois du Liban. Voici, mes serviteurs seront avec les tiens. '
  '9':
  - type: text
    content: 'Que l’on me prépare du bois en abondance, car la maison que je vais bâtir sera grande et magnifique. '
