document_id: MAL.2,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-9: cf. (De 33:8-11. No 25:11-13.) (Né 13:4-10, 28, 29. 1 S 2:12-17, 27, etc.)'
  - type: text
    content: Maintenant, à vous cet ordre, sacrificateurs!
  '10':
  - type: text
    content: N’avons-nous pas tous un seul père?
  - type: text
    content: N’est-ce pas un seul Dieu qui nous a créés?
  - type: text
    content: Pourquoi donc sommes-nous infidèles l’un envers l’autre,
  - type: text
    content: En profanant l’alliance de nos pères?
  '11':
  - type: text
    content: Juda s’est montré infidèle,
  - type: text
    content: Et une abomination a été commise en Israël et à Jérusalem;
  - type: text
    content: Car Juda a profané ce qui est consacré à l’Éternel, ce qu’aime l’Éternel,
  - type: text
    content: Il s’est uni à la fille d’un dieu étranger.
  '12':
  - type: text
    content: L’Éternel retranchera l’homme qui fait cela, celui qui veille et qui répond,
  - type: text
    content: Il le retranchera des tentes de Jacob,
  - type: text
    content: Et il retranchera celui qui présente une offrande
  - type: text
    content: A l’Éternel des armées.
  '13':
  - type: text
    content: 'Voici encore ce que vous faites:'
  - type: text
    content: Vous couvrez de larmes l’autel de l’Éternel,
  - type: text
    content: De pleurs et de gémissements,
  - type: text
    content: En sorte qu’il n’a plus égard aux offrandes
  - type: text
    content: Et qu’il ne peut rien agréer de vos mains.
  '14':
  - type: text
    content: 'Et vous dites: Pourquoi?…'
  - type: text
    content: Parce que l’Éternel a été témoin entre toi et la femme de ta jeunesse,
  - type: text
    content: A laquelle tu es infidèle,
  - type: text
    content: Bien qu’elle soit ta compagne et la femme de ton alliance.
  '15':
  - type: text
    content: Nul n’a fait cela, avec un reste de bon sens.
  - type: text
    content: Un seul l’a fait, et pourquoi?
  - type: text
    content: Parce qu’il cherchait la postérité que Dieu lui avait promise.
  - type: text
    content: Prenez donc garde en votre esprit,
  - type: text
    content: Et qu’aucun ne soit infidèle à la femme de sa jeunesse!
  '16':
  - type: text
    content: Car je hais la répudiation,
  - type: text
    content: Dit l’Éternel, le Dieu d’Israël,
  - type: text
    content: Et celui qui couvre de violence son vêtement,
  - type: text
    content: Dit l’Éternel des armées.
  - type: text
    content: Prenez donc garde en votre esprit,
  - type: text
    content: Et ne soyez pas infidèles!
  - type: heading
    content: La rétribution divine
  - type: heading
    content: '2 v. 17 à 3 v. 6: cf. Jé 12:1. Mt 11:7-12; 21:25, 37-44. (Za 13:9. 1 Pi 4:17, 18.)'
  '17':
  - type: text
    content: Vous fatiguez l’Éternel par vos paroles,
  - type: text
    content: 'Et vous dites: En quoi l’avons-nous fatigué?'
  - type: text
    content: 'C’est en disant: Quiconque fait le mal est bon aux yeux de l’Éternel,'
  - type: text
    content: Et c’est en lui qu’il prend plaisir!
  - type: text
    content: 'Ou bien: Où est le Dieu de la justice?'
  '2':
  - type: text
    content: Si vous n’écoutez pas, si vous ne prenez pas à cœur
  - type: text
    content: De donner gloire à mon nom, dit l’Éternel des armées,
  - type: text
    content: 'J’enverrai parmi vous la '
  - type: note
    content: Lé 26:14. De 28:15.
  - type: text
    content: malédiction, et je maudirai vos bénédictions;
  - type: text
    content: Oui, je les maudirai, parce que vous ne l’avez pas à cœur.
  '3':
  - type: text
    content: Voici, je détruirai vos semences,
  - type: text
    content: Et je vous jetterai des excréments au visage,
  - type: text
    content: Les excréments des victimes que vous sacrifiez,
  - type: text
    content: Et on vous emportera avec eux.
  '4':
  - type: text
    content: Vous saurez alors que je vous ai adressé cet ordre,
  - type: text
    content: Afin que mon alliance avec Lévi subsiste,
  - type: text
    content: Dit l’Éternel des armées.
  '5':
  - type: text
    content: Mon alliance avec lui était une alliance de vie et de paix,
  - type: text
    content: Ce que je lui accordai pour qu’il me craignît;
  - type: text
    content: Et il a eu pour moi de la crainte,
  - type: text
    content: Il a tremblé devant mon nom.
  '6':
  - type: text
    content: La loi de la vérité était dans sa bouche,
  - type: text
    content: Et l’iniquité ne s’est point trouvée sur ses lèvres;
  - type: text
    content: Il a marché avec moi dans la paix et dans la droiture,
  - type: text
    content: Et il a détourné du mal beaucoup d’hommes.
  '7':
  - type: text
    content: Car les lèvres du sacrificateur doivent garder la science,
  - type: text
    content: Et c’est à sa bouche qu’on demande la loi,
  - type: text
    content: Parce qu’il est un envoyé de l’Éternel des armées.
  '8':
  - type: text
    content: Mais vous, vous vous êtes écartés de la voie,
  - type: text
    content: Vous avez fait de la loi une occasion de chute pour plusieurs,
  - type: text
    content: Vous avez violé l’alliance de Lévi,
  - type: text
    content: Dit l’Éternel des armées.
  '9':
  - type: text
    content: Et moi, je vous rendrai méprisables et vils
  - type: text
    content: Aux yeux de tout le peuple,
  - type: text
    content: Parce que vous n’avez pas gardé mes voies,
  - type: text
    content: Et que vous avez égard à l’apparence des personnes
  - type: text
    content: Quand vous interprétez la loi.
  - type: heading
    content: Contre les mariages avec des femmes étrangères
  - type: heading
    content: 'V. 10-16: cf. (Esd 9:1-3, 10, 14. Né 13:23-29.) Mt 19:3-9.'
