document_id: MAL.2,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-9: cf. (De 33:8-11. No 25:11-13.) (Né 13:4-10, 28, 29. 1 S 2:12-17, 27, etc.)'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Maintenant, à vous cet ordre, sacrificateurs!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: N’avons-nous pas tous un seul père?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N’est-ce pas un seul Dieu qui nous a créés?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi donc sommes-nous infidèles l’un envers l’autre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En profanant l’alliance de nos pères?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Juda s’est montré infidèle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et une abomination a été commise en Israël et à Jérusalem;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car Juda a profané ce qui est consacré à l’Éternel, ce qu’aime l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il s’est uni à la fille d’un dieu étranger.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: L’Éternel retranchera l’homme qui fait cela, celui qui veille et qui répond,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il le retranchera des tentes de Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il retranchera celui qui présente une offrande
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A l’Éternel des armées.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Voici encore ce que vous faites:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous couvrez de larmes l’autel de l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De pleurs et de gémissements,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En sorte qu’il n’a plus égard aux offrandes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qu’il ne peut rien agréer de vos mains.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Et vous dites: Pourquoi?…'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce que l’Éternel a été témoin entre toi et la femme de ta jeunesse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A laquelle tu es infidèle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bien qu’elle soit ta compagne et la femme de ton alliance.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Nul n’a fait cela, avec un reste de bon sens.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un seul l’a fait, et pourquoi?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce qu’il cherchait la postérité que Dieu lui avait promise.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prenez donc garde en votre esprit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qu’aucun ne soit infidèle à la femme de sa jeunesse!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Car je hais la répudiation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit l’Éternel, le Dieu d’Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et celui qui couvre de violence son vêtement,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit l’Éternel des armées.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prenez donc garde en votre esprit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ne soyez pas infidèles!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La rétribution divine
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: '2 v. 17 à 3 v. 6: cf. Jé 12:1. Mt 11:7-12; 21:25, 37-44. (Za 13:9. 1 Pi 4:17, 18.)'
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Vous fatiguez l’Éternel par vos paroles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et vous dites: En quoi l’avons-nous fatigué?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'C’est en disant: Quiconque fait le mal est bon aux yeux de l’Éternel,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et c’est en lui qu’il prend plaisir!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ou bien: Où est le Dieu de la justice?'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Si vous n’écoutez pas, si vous ne prenez pas à cœur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De donner gloire à mon nom, dit l’Éternel des armées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'J’enverrai parmi vous la '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 26:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 28:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: malédiction, et je maudirai vos bénédictions;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, je les maudirai, parce que vous ne l’avez pas à cœur.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Voici, je détruirai vos semences,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je vous jetterai des excréments au visage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les excréments des victimes que vous sacrifiez,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et on vous emportera avec eux.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Vous saurez alors que je vous ai adressé cet ordre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afin que mon alliance avec Lévi subsiste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit l’Éternel des armées.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Mon alliance avec lui était une alliance de vie et de paix,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce que je lui accordai pour qu’il me craignît;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il a eu pour moi de la crainte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a tremblé devant mon nom.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: La loi de la vérité était dans sa bouche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’iniquité ne s’est point trouvée sur ses lèvres;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a marché avec moi dans la paix et dans la droiture,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il a détourné du mal beaucoup d’hommes.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Car les lèvres du sacrificateur doivent garder la science,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et c’est à sa bouche qu’on demande la loi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce qu’il est un envoyé de l’Éternel des armées.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Mais vous, vous vous êtes écartés de la voie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous avez fait de la loi une occasion de chute pour plusieurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous avez violé l’alliance de Lévi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit l’Éternel des armées.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Et moi, je vous rendrai méprisables et vils
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aux yeux de tout le peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce que vous n’avez pas gardé mes voies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que vous avez égard à l’apparence des personnes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand vous interprétez la loi.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Contre les mariages avec des femmes étrangères
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 10-16: cf. (Esd 9:1-3, 10, 14. Né 13:23-29.) Mt 19:3-9.'
    marker-yv: yv-h
