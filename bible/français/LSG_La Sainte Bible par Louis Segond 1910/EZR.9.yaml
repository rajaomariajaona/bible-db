document_id: EZR.9,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Désolation et prière d’Esdras à l’occasion de mariages avec des femmes étrangères
  - type: heading
    content: 'V. 1-15: cf. De 7:1-6. Né 9. (Da 9.) Ps 119:136. 2 Co 11:2.'
  - type: text
    content: 'Après que cela fut terminé, les chefs s’approchèrent de moi, en disant: Le peuple d’Israël, les sacrificateurs et les Lévites ne se sont point séparés des peuples de ces pays, et ils imitent leurs abominations, celles des Cananéens, des Héthiens, des Phéréziens, des Jébusiens, des Ammonites, des Moabites, des Égyptiens et des Amoréens. '
  '10':
  - type: text
    content: 'Maintenant, que dirons-nous après cela, ô notre Dieu? Car nous avons abandonné tes commandements, '
  '11':
  - type: text
    content: 'que tu nous avais prescrits par tes serviteurs les prophètes, en disant: Le pays dans '
  - type: note
    content: Lé 18:25, 27. De 7:3.
  - type: text
    content: 'lequel vous entrez pour le posséder est un pays souillé par les impuretés des peuples de ces contrées, par les abominations dont ils l’ont rempli d’un bout à l’autre avec leurs impuretés; '
  '12':
  - type: text
    content: 'ne donnez donc point vos filles à leurs fils et ne prenez point leurs filles pour vos fils, et n’ayez jamais souci ni de leur prospérité ni de leur bien-être, et ainsi vous deviendrez forts, vous mangerez les meilleures productions du pays, et vous le laisserez pour toujours en héritage à vos fils. '
  '13':
  - type: text
    content: 'Après tout ce qui nous est arrivé à cause des mauvaises actions et des grandes fautes que nous avons commises, quoique tu ne nous aies pas, ô notre Dieu, punis en proportion de nos iniquités, et maintenant que tu nous as conservé ces réchappés, '
  '14':
  - type: text
    content: 'recommencerions-nous à violer tes commandements et à nous allier avec ces peuples abominables? Ta colère n’éclaterait-elle pas encore contre nous jusqu’à nous détruire, sans laisser ni reste ni réchappés? '
  '15':
  - type: text
    content: Éternel, Dieu d’Israël, tu es juste, car nous sommes aujourd’hui un reste de réchappés. Nous voici devant toi comme des coupables, et nous ne saurions ainsi subsister devant ta face.
  '2':
  - type: text
    content: 'Car ils ont pris de leurs filles pour eux et pour leurs fils, et ont mêlé la race sainte avec les peuples de ces pays; et les chefs et les magistrats ont été les premiers à commettre ce péché. '
  '3':
  - type: text
    content: 'Lorsque j’entendis cela, je déchirai mes vêtements et mon manteau, je m’arrachai les cheveux de la tête et les poils de la barbe, et je m’assis désolé. '
  '4':
  - type: text
    content: 'Auprès de moi s’assemblèrent tous ceux que faisaient trembler les paroles du Dieu d’Israël, à cause du péché des fils de la captivité; et moi, je restai assis et désolé, jusqu’à l’offrande du soir. '
  '5':
  - type: text
    content: 'Puis, au moment de l’offrande du soir, je me levai du sein de mon humiliation, avec mes vêtements et mon manteau déchirés, je tombai à genoux, j’étendis les mains vers l’Éternel, mon Dieu, '
  '6':
  - type: text
    content: 'et je dis: Mon Dieu, je suis dans la confusion, et j’ai honte, ô mon Dieu, de lever ma face vers toi; car nos iniquités se sont '
  - type: note
    content: Ps 38:5.
  - type: text
    content: 'multipliées par-dessus nos têtes, et nos fautes ont atteint jusqu’aux cieux. '
  '7':
  - type: text
    content: 'Depuis les jours de nos pères nous avons été grandement coupables jusqu’à ce jour, et c’est à cause de nos iniquités que nous avons été livrés, nous, nos rois et nos sacrificateurs, aux mains des rois étrangers, à l’épée, à la captivité, au pillage, et à la honte qui couvre aujourd’hui notre visage. '
  '8':
  - type: text
    content: 'Et cependant l’Éternel, notre Dieu, vient de nous faire grâce en nous laissant quelques réchappés et en nous accordant un abri dans son saint lieu, afin d’éclaircir nos yeux et de nous donner un peu de vie au milieu de notre servitude. '
  '9':
  - type: text
    content: 'Car nous sommes esclaves, mais Dieu ne nous a pas abandonnés dans notre servitude. Il nous a rendus les objets de la bienveillance des rois de Perse, pour nous conserver la vie afin que nous puissions bâtir la maison de notre Dieu et en relever les ruines, et pour nous donner une retraite en Juda et à Jérusalem. '
