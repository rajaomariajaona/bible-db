document_id: REV.20,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Satan lié pour mille ans: règne des fidèles et de Christ'
  - type: heading
    content: 'V. 1-6: cf. (Da 7:22, 27. Ap 5:9, 10.) (És 2:2-4; 11:6-10; 65:16-25.)'
  - type: text
    content: 'Puis je vis descendre du ciel un ange, '
  - type: note
    content: Ap 1:18.
  - type: text
    content: 'qui avait la clef de l’abîme et une grande chaîne dans sa main. '
  '10':
  - type: text
    content: 'Et le diable, qui les séduisait, '
  - type: note
    content: Da 7:11. Ap 19:20.
  - type: text
    content: 'fut jeté dans l’étang de feu et de soufre, où sont '
  - type: note
    content: Ap 19:20.
  - type: text
    content: 'la bête et le faux prophète. Et ils seront '
  - type: note
    content: Ap 14:10.
  - type: text
    content: tourmentés jour et nuit, aux siècles des siècles.
  - type: heading
    content: Jugement dernier
  - type: heading
    content: 'V. 11-15: cf. (2 Pi 3:7-12. Jn 5:26-29. Ac 17:30, 31. 2 Co 5:10. Mt 13:38-43; 25:31-46.)'
  '11':
  - type: text
    content: 'Puis je vis un grand trône blanc, et celui qui était assis dessus. La terre et le ciel s’enfuirent devant sa face, et il ne fut plus trouvé de place pour eux. '
  '12':
  - type: text
    content: 'Et je vis les morts, les grands et les petits, qui se tenaient devant le trône. Des livres furent ouverts. Et un autre livre fut ouvert, celui qui est '
  - type: note
    content: Ex 33:32. Ps 69:29. Ph 4:3. Ap 3:5; 21:27.
  - type: text
    content: 'le livre de vie. Et les morts furent jugés '
  - type: note
    content: Ps 62:13. Jé 17:10; 32:19. Mt 16:27. Ro 2:6; 14:12. 2 Co 5:10. Ga 6:5. Ap 2:23.
  - type: text
    content: 'selon leurs œuvres, d’après ce qui était écrit dans ces livres. '
  '13':
  - type: text
    content: 'La mer rendit les morts qui étaient en elle, la mort et le séjour des morts rendirent les morts qui étaient en eux; et chacun fut jugé selon ses œuvres. '
  '14':
  - type: text
    content: 'Et la mort et le séjour des morts furent jetés dans l’étang de feu. C’est la seconde mort, l’étang de feu. '
  '15':
  - type: text
    content: Quiconque ne fut pas trouvé écrit dans le livre de vie fut jeté dans l’étang de feu.
  '2':
  - type: note
    content: 2 Pi 2:4. Ap 12:9.
  - type: text
    content: 'Il saisit le dragon, le serpent ancien, qui est le diable et Satan, et il le lia pour mille ans. '
  '3':
  - type: text
    content: 'Il le jeta dans l’abîme, ferma et scella l’entrée au-dessus de lui, '
  - type: note
    content: Ap 16:14, 16; 20:8.
  - type: text
    content: 'afin qu’il ne séduisît plus les nations, jusqu’à ce que les mille ans fussent accomplis. Après cela, il faut qu’il soit délié pour un peu de temps. '
  '4':
  - type: text
    content: 'Et je vis des trônes; et à ceux qui s’y assirent '
  - type: note
    content: Ap 6:10.
  - type: text
    content: 'fut donné le pouvoir de juger. Et je vis '
  - type: note
    content: Ap 6:9.
  - type: text
    content: 'les âmes de ceux qui avaient été décapités à cause du témoignage de Jésus et à cause de la parole de Dieu, et de ceux qui n’avaient pas adoré '
  - type: note
    content: Ap 13:12.
  - type: text
    content: 'la bête ni '
  - type: note
    content: Ap 13:15.
  - type: text
    content: 'son image, et qui n’avaient pas reçu '
  - type: note
    content: Ap 13:16.
  - type: text
    content: 'la marque sur leur front et sur leur main. '
  - type: note
    content: Ap 6:11.
  - type: text
    content: 'Ils revinrent à la vie, et ils régnèrent avec Christ pendant mille ans. '
  '5':
  - type: text
    content: 'Les autres morts ne revinrent point à la vie jusqu’à ce que les mille ans fussent accomplis. C’est la première résurrection. '
  '6':
  - type: text
    content: 'Heureux et saints ceux qui ont part à la première résurrection! La seconde mort n’a point de pouvoir sur eux; mais ils seront '
  - type: note
    content: És 61:6. 1 Pi 2:9. Ap 1:6; 5:10.
  - type: text
    content: sacrificateurs de Dieu et de Christ, et ils régneront avec lui pendant mille ans.
  - type: heading
    content: Satan délié, et vaincu pour toujours
  - type: heading
    content: 'V. 7-10: cf. Éz 38; 39.'
  '7':
  - type: text
    content: 'Quand les mille ans seront accomplis, Satan sera relâché de sa prison. '
  '8':
  - type: text
    content: 'Et il sortira pour séduire les nations qui sont aux quatre coins de la terre, '
  - type: note
    content: Éz 38:2; 39:1.
  - type: text
    content: 'Gog et Magog, afin de les '
  - type: note
    content: Ap 16:14.
  - type: text
    content: 'rassembler pour la guerre; leur nombre est comme le sable de la mer. '
  '9':
  - type: text
    content: 'Et ils montèrent sur la surface de la terre, et ils investirent le camp des saints et la ville bien-aimée. Mais un feu descendit du ciel, et les dévora. '
