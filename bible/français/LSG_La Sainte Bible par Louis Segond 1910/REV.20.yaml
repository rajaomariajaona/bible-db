document_id: REV.20,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Satan lié pour mille ans: règne des fidèles et de Christ'
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-6: cf. (Da 7:22, 27. Ap 5:9, 10.) (És 2:2-4; 11:6-10; 65:16-25.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Puis je vis descendre du ciel un ange, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 1:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'qui avait la clef de l’abîme et une grande chaîne dans sa main. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Et le diable, qui les séduisait, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Da 7:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 19:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'fut jeté dans l’étang de feu et de soufre, où sont '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 19:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'la bête et le faux prophète. Et ils seront '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 14:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: tourmentés jour et nuit, aux siècles des siècles.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jugement dernier
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 11-15: cf. (2 Pi 3:7-12. Jn 5:26-29. Ac 17:30, 31. 2 Co 5:10. Mt 13:38-43; 25:31-46.)'
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Puis je vis un grand trône blanc, et celui qui était assis dessus. La terre et le ciel s’enfuirent devant sa face, et il ne fut plus trouvé de place pour eux. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Et je vis les morts, les grands et les petits, qui se tenaient devant le trône. Des livres furent ouverts. Et un autre livre fut ouvert, celui qui est '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Ex 33:32. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 69:29
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ph 4:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 3:5
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 21:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'le livre de vie. Et les morts furent jugés '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 62:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 17:10
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 32:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 16:27
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 2:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 5:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 6:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 2:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'selon leurs œuvres, d’après ce qui était écrit dans ces livres. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'La mer rendit les morts qui étaient en elle, la mort et le séjour des morts rendirent les morts qui étaient en eux; et chacun fut jugé selon ses œuvres. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Et la mort et le séjour des morts furent jetés dans l’étang de feu. C’est la seconde mort, l’étang de feu. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Quiconque ne fut pas trouvé écrit dans le livre de vie fut jeté dans l’étang de feu.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Pi 2:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 12:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Il saisit le dragon, le serpent ancien, qui est le diable et Satan, et il le lia pour mille ans. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Il le jeta dans l’abîme, ferma et scella l’entrée au-dessus de lui, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 16:14
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '16'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 20:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'afin qu’il ne séduisît plus les nations, jusqu’à ce que les mille ans fussent accomplis. Après cela, il faut qu’il soit délié pour un peu de temps. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Et je vis des trônes; et à ceux qui s’y assirent '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 6:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'fut donné le pouvoir de juger. Et je vis '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 6:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'les âmes de ceux qui avaient été décapités à cause du témoignage de Jésus et à cause de la parole de Dieu, et de ceux qui n’avaient pas adoré '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 13:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'la bête ni '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 13:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'son image, et qui n’avaient pas reçu '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 13:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'la marque sur leur front et sur leur main. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 6:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Ils revinrent à la vie, et ils régnèrent avec Christ pendant mille ans. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Les autres morts ne revinrent point à la vie jusqu’à ce que les mille ans fussent accomplis. C’est la première résurrection. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Heureux et saints ceux qui ont part à la première résurrection! La seconde mort n’a point de pouvoir sur eux; mais ils seront '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 61:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 2:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 1:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: sacrificateurs de Dieu et de Christ, et ils régneront avec lui pendant mille ans.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Satan délié, et vaincu pour toujours
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 7-10: cf. Éz 38; 39.'
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Quand les mille ans seront accomplis, Satan sera relâché de sa prison. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Et il sortira pour séduire les nations qui sont aux quatre coins de la terre, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 38:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 39:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Gog et Magog, afin de les '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 16:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'rassembler pour la guerre; leur nombre est comme le sable de la mer. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Et ils montèrent sur la surface de la terre, et ils investirent le camp des saints et la ville bien-aimée. Mais un feu descendit du ciel, et les dévora. '
