document_id: 2CO.13
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Derniers avertissements aux Corinthiens. Salutations
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-10: cf. 2 Co 12:19-21; 10:1-11.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Je vais chez vous pour la troisième fois. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 35:30
      metadata:
        usfm: NUM.35.30
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 17:6
      metadata:
        usfm: DEU.17.6
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 19:15
      metadata:
        usfm: DEU.19.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 18:16
      metadata:
        usfm: MAT.18.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 8:17
      metadata:
        usfm: JHN.8.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 10:28
      metadata:
        usfm: HEB.10.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Toute affaire se réglera sur la déclaration de deux ou de trois témoins. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Lorsque j’étais présent pour la seconde fois, j’ai déjà dit, et aujourd’hui que je suis absent je dis encore d’avance à ceux qui ont péché précédemment et à tous les autres que, si je retourne chez vous, je n’userai d’aucun ménagement, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'puisque vous cherchez une preuve que Christ parle en moi, lui qui n’est pas faible à votre égard, mais qui est puissant parmi vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Car il a été crucifié à cause de sa faiblesse, mais il vit par la puissance de Dieu; nous aussi, nous sommes faibles en lui, mais nous vivrons avec lui par la puissance de Dieu pour agir envers vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 11:28
      metadata:
        usfm: 1CO.11.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Examinez-vous vous-mêmes, pour savoir si vous êtes dans la foi; éprouvez-vous vous-mêmes. Ne reconnaissez-vous pas que Jésus-Christ est en vous? À moins peut-être que vous ne soyez réprouvés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Mais j’espère que vous reconnaîtrez que nous, nous ne sommes pas réprouvés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Cependant nous prions Dieu que vous ne fassiez rien de mal, non pour paraître nous-mêmes approuvés, mais afin que vous pratiquiez ce qui est bien et que nous, nous soyons comme réprouvés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Car nous n’avons pas de puissance contre la vérité; nous n’en avons que pour la vérité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nous nous réjouissons lorsque nous sommes faibles, tandis que vous êtes forts; et ce que nous demandons dans nos prières, c’est votre perfectionnement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'C’est pourquoi j’écris ces choses étant absent, afin que, présent, je n’aie pas à user de rigueur, selon l’autorité '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 10:8
      metadata:
        usfm: 2CO.10.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: que le Seigneur m’a donnée pour l’édification et non pour la destruction.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 11-13: cf. Ph 4:4-9. Ép 6:23, 24. No 6:23-27.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Au reste, frères, soyez dans la joie, perfectionnez-vous, consolez-vous, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 12:16
      metadata:
        usfm: ROM.12.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 15:5
      metadata:
        usfm: ROM.15.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 1:10
      metadata:
        usfm: 1CO.1.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 2:2
      metadata:
        usfm: PHP.2.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 3:8
      metadata:
        usfm: 1PE.3.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ayez un même sentiment, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 12:18
      metadata:
        usfm: ROM.12.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 12:14
      metadata:
        usfm: HEB.12.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'vivez en paix; et le Dieu d’amour et de paix sera avec vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 16:16
      metadata:
        usfm: ROM.16.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 16:20
      metadata:
        usfm: 1CO.16.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 5:26
      metadata:
        usfm: 1TH.5.26
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 5:14
      metadata:
        usfm: 1PE.5.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Saluez-vous les uns les autres par un saint baiser. Tous les saints vous saluent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Que la grâce du Seigneur Jésus-Christ, l’amour de Dieu, et la communication du Saint-Esprit, soient avec vous tous!
