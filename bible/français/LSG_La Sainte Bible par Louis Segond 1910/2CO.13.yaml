document_id: 2CO.13,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Derniers avertissements aux Corinthiens. Salutations
  - type: heading
    content: 'V. 1-10: cf. 2 Co 12:19-21; 10:1-11.'
  - type: text
    content: 'Je vais chez vous pour la troisième fois. '
  - type: note
    content: No 35:30. De 17:6; 19:15. Mt 18:16. Jn 8:17. Hé 10:28.
  - type: text
    content: 'Toute affaire se réglera sur la déclaration de deux ou de trois témoins. '
  '10':
  - type: text
    content: 'C’est pourquoi j’écris ces choses étant absent, afin que, présent, je n’aie pas à user de rigueur, selon l’autorité '
  - type: note
    content: 2 Co 10:8.
  - type: text
    content: que le Seigneur m’a donnée pour l’édification et non pour la destruction.
  - type: heading
    content: 'V. 11-13: cf. Ph 4:4-9. Ép 6:23, 24. No 6:23-27.'
  '11':
  - type: text
    content: 'Au reste, frères, soyez dans la joie, perfectionnez-vous, consolez-vous, '
  - type: note
    content: Ro 12:16; 15:5. 1 Co 1:10. Ph 2:2. 1 Pi 3:8.
  - type: text
    content: 'ayez un même sentiment, '
  - type: note
    content: Ro 12:18. Hé 12:14.
  - type: text
    content: 'vivez en paix; et le Dieu d’amour et de paix sera avec vous. '
  '12':
  - type: note
    content: Ro 16:16. 1 Co 16:20. 1 Th 5:26. 1 Pi 5:14.
  - type: text
    content: 'Saluez-vous les uns les autres par un saint baiser. Tous les saints vous saluent. '
  '13':
  - type: text
    content: Que la grâce du Seigneur Jésus-Christ, l’amour de Dieu, et la communication du Saint-Esprit, soient avec vous tous!
  '2':
  - type: text
    content: 'Lorsque j’étais présent pour la seconde fois, j’ai déjà dit, et aujourd’hui que je suis absent je dis encore d’avance à ceux qui ont péché précédemment et à tous les autres que, si je retourne chez vous, je n’userai d’aucun ménagement, '
  '3':
  - type: text
    content: 'puisque vous cherchez une preuve que Christ parle en moi, lui qui n’est pas faible à votre égard, mais qui est puissant parmi vous. '
  '4':
  - type: text
    content: 'Car il a été crucifié à cause de sa faiblesse, mais il vit par la puissance de Dieu; nous aussi, nous sommes faibles en lui, mais nous vivrons avec lui par la puissance de Dieu pour agir envers vous. '
  '5':
  - type: note
    content: 1 Co 11:28.
  - type: text
    content: 'Examinez-vous vous-mêmes, pour savoir si vous êtes dans la foi; éprouvez-vous vous-mêmes. Ne reconnaissez-vous pas que Jésus-Christ est en vous? À moins peut-être que vous ne soyez réprouvés. '
  '6':
  - type: text
    content: 'Mais j’espère que vous reconnaîtrez que nous, nous ne sommes pas réprouvés. '
  '7':
  - type: text
    content: 'Cependant nous prions Dieu que vous ne fassiez rien de mal, non pour paraître nous-mêmes approuvés, mais afin que vous pratiquiez ce qui est bien et que nous, nous soyons comme réprouvés. '
  '8':
  - type: text
    content: 'Car nous n’avons pas de puissance contre la vérité; nous n’en avons que pour la vérité. '
  '9':
  - type: text
    content: 'Nous nous réjouissons lorsque nous sommes faibles, tandis que vous êtes forts; et ce que nous demandons dans nos prières, c’est votre perfectionnement. '
