document_id: MRK.2,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus de retour à Capernaüm. Guérison d’un paralytique
  - type: heading
    content: 'V. 1-12: cf. (Mt 9:1-8. Lu 5:17-26.) Jn 10:36-38.'
  - type: text
    content: ' '
  - type: note
    content: Mt 9:1. Lu 5:17.
  - type: text
    content: 'Quelques jours après, Jésus revint à Capernaüm. On apprit qu’il était à la maison, '
  '10':
  - type: text
    content: 'Or, afin que vous sachiez que le Fils de l’homme a sur la terre le pouvoir de pardonner les péchés:'
  - type: text
    content: ' '
  '11':
  - type: text
    content: Je te l’ordonne,
  - type: text
    content: ' dit-il au paralytique, '
  - type: text
    content: lève-toi, prends ton lit, et va dans ta maison.
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'Et, à l’instant, il se leva, prit son lit, et sortit en présence de tout le monde, de sorte qu’ils étaient tous dans l’étonnement et glorifiaient Dieu, disant: Nous n’avons jamais rien vu de pareil.'
  - type: heading
    content: Vocation de Lévi (Matthieu)
  - type: heading
    content: 'V. 13-14: cf. (Mt 9:9. Lu 5:27, 28.) Mt 4:18-22.'
  '13':
  - type: text
    content: ' '
  - type: note
    content: Mt 9:9. Lu 5:27.
  - type: text
    content: 'Jésus sortit de nouveau du côté de la mer. Toute la foule venait à lui, et il les enseignait. '
  '14':
  - type: text
    content: 'En passant, il vit Lévi, fils d’Alphée, assis au bureau des péages. Il lui dit: '
  - type: text
    content: Suis-moi.
  - type: text
    content: ' Lévi se leva, et le suivit.'
  - type: heading
    content: 'V. 15-17: cf. (Mt 9:10-13. Lu 5:29-32.) Lu 15:1-10. Ps 25:8, 9.'
  '15':
  - type: text
    content: 'Comme Jésus était à table dans la maison de Lévi, beaucoup de publicains et de gens de mauvaise vie se mirent aussi à table avec lui et avec ses disciples; car ils étaient nombreux, et l’avaient suivi. '
  '16':
  - type: text
    content: 'Les scribes et les pharisiens, le voyant manger avec les publicains et les gens de mauvaise vie, dirent à ses disciples: Pourquoi mange-t-il et boit-il avec les publicains et les gens de mauvaise vie? '
  '17':
  - type: text
    content: 'Ce que Jésus ayant entendu, il leur dit: '
  - type: text
    content: Ce ne sont pas ceux qui se portent bien qui ont besoin de médecin, mais les malades.
  - type: text
    content: ' '
  - type: note
    content: Mt 9:13; 21:31. Lu 5:32; 19:10. 1 Ti 1:15.
  - type: text
    content: Je ne suis pas venu appeler des justes, mais des pécheurs.
  - type: heading
    content: Question des disciples de Jean-Baptiste sur le jeûne
  - type: heading
    content: 'V. 18-22: cf. (Mt 9:14-17. Lu 5:33-39.)'
  '18':
  - type: text
    content: ' '
  - type: note
    content: Mt 9:14. Lu 5:33.
  - type: text
    content: 'Les disciples de Jean et les pharisiens jeûnaient. Ils vinrent dire à Jésus: Pourquoi les disciples de Jean et ceux des pharisiens jeûnent-ils, tandis que tes disciples ne jeûnent point? '
  '19':
  - type: text
    content: 'Jésus leur répondit: '
  - type: note
    content: És 62:5. 2 Co 11:2.
  - type: text
    content: Les amis de l’époux peuvent-ils jeûner pendant que l’époux est avec eux? Aussi longtemps qu’ils ont avec eux l’époux, ils ne peuvent jeûner.
  '2':
  - type: text
    content: 'et il s’assembla un si grand nombre de personnes que l’espace devant la porte ne pouvait plus les contenir. Il leur annonçait la parole. '
  '20':
  - type: text
    content: ' '
  - type: text
    content: Les jours viendront où l’époux leur sera enlevé, et alors ils jeûneront en ce jour-là.
  - type: text
    content: ' '
  '21':
  - type: text
    content: Personne ne coud une pièce de drap neuf à un vieil habit; autrement, la pièce de drap neuf emporterait une partie du vieux, et la déchirure serait pire.
  - type: text
    content: ' '
  '22':
  - type: note
    content: Mt 9:17.
  - type: text
    content: Et personne ne met du vin nouveau dans de vieilles outres; autrement, le vin fait rompre les outres, et le vin et les outres sont perdus; mais il faut mettre le vin nouveau dans des outres neuves.
  - type: heading
    content: Les épis de blé et le sabbat
  - type: heading
    content: 'V. 23-28: cf. (Mt 12:1-8. Lu 6:1-5.)'
  '23':
  - type: text
    content: ' '
  - type: note
    content: De 23:25. Mt 12:1. Lu 6:1.
  - type: text
    content: 'Il arriva, un jour de sabbat, que Jésus traversa des champs de blé. Ses disciples, chemin faisant, se mirent à arracher des épis. '
  '24':
  - type: text
    content: 'Les pharisiens lui dirent: Voici, pourquoi font-ils '
  - type: note
    content: Ex 20:10.
  - type: text
    content: 'ce qui n’est pas permis pendant le sabbat? '
  '25':
  - type: text
    content: 'Jésus leur répondit: '
  - type: text
    content: N’avez-vous jamais lu ce que fit
  - type: text
    content: ' '
  - type: note
    content: 1 S 21:6.
  - type: text
    content: David, lorsqu’il fut dans la nécessité et qu’il eut faim, lui et ceux qui étaient avec lui;
  '26':
  - type: text
    content: ' '
  - type: text
    content: comment il entra dans la maison de Dieu, du temps du souverain sacrificateur Abiathar, et mangea les pains de proposition, qu’il n’est permis
  - type: text
    content: ' '
  - type: note
    content: Lé 24:9.
  - type: text
    content: qu’aux sacrificateurs de manger, et en donna même à ceux qui étaient avec lui!
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'Puis il leur dit: '
  - type: text
    content: Le sabbat a été fait pour l’homme, et non l’homme pour le sabbat,
  '28':
  - type: text
    content: ' '
  - type: note
    content: Mt 12:8. Lu 6:5.
  - type: text
    content: de sorte que le Fils de l’homme est maître même du sabbat.
  '3':
  - type: note
    content: Mt 9:1. Lu 5:18.
  - type: text
    content: 'Des gens vinrent à lui, amenant un paralytique porté par quatre hommes. '
  '4':
  - type: text
    content: 'Comme ils ne pouvaient l’aborder, à cause de la foule, ils découvrirent le toit de la maison où il était, et ils descendirent par cette ouverture le lit sur lequel le paralytique était couché. '
  '5':
  - type: text
    content: 'Jésus, voyant leur foi, dit au paralytique: '
  - type: text
    content: Mon enfant, tes péchés sont pardonnés.
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'Il y avait là quelques scribes, qui étaient assis, et qui se disaient au-dedans d’eux: '
  '7':
  - type: text
    content: 'Comment cet homme parle-t-il ainsi? Il blasphème. '
  - type: note
    content: Ps 32:5; 51:3. És 43:25.
  - type: text
    content: 'Qui peut pardonner les péchés, si ce n’est Dieu seul? '
  '8':
  - type: text
    content: 'Jésus, ayant aussitôt connu par son esprit ce qu’ils pensaient au-dedans d’eux, leur dit: '
  - type: text
    content: Pourquoi avez-vous de telles pensées dans vos cœurs?
  '9':
  - type: text
    content: ' '
  - type: text
    content: 'Lequel est le plus aisé, de dire au paralytique: Tes péchés sont pardonnés, ou de dire: Lève-toi, prends ton lit, et marche?'
  - type: text
    content: ' '
