document_id: MRK.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus de retour à Capernaüm. Guérison d’un paralytique
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-12: cf. (Mt 9:1-8. Lu 5:17-26.) Jn 10:36-38.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 9:1
      metadata:
        usfm: MAT.9.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 5:17
      metadata:
        usfm: LUK.5.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Quelques jours après, Jésus revint à Capernaüm. On apprit qu’il était à la maison, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'et il s’assembla un si grand nombre de personnes que l’espace devant la porte ne pouvait plus les contenir. Il leur annonçait la parole. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 9:1
      metadata:
        usfm: MAT.9.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 5:18
      metadata:
        usfm: LUK.5.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Des gens vinrent à lui, amenant un paralytique porté par quatre hommes. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Comme ils ne pouvaient l’aborder, à cause de la foule, ils découvrirent le toit de la maison où il était, et ils descendirent par cette ouverture le lit sur lequel le paralytique était couché. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Jésus, voyant leur foi, dit au paralytique: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Mon enfant, tes péchés sont pardonnés.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il y avait là quelques scribes, qui étaient assis, et qui se disaient au-dedans d’eux: '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Comment cet homme parle-t-il ainsi? Il blasphème. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 32:5
      metadata:
        usfm: PSA.32.5
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 51:3
      metadata:
        usfm: PSA.51.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 43:25
      metadata:
        usfm: ISA.43.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Qui peut pardonner les péchés, si ce n’est Dieu seul? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Jésus, ayant aussitôt connu par son esprit ce qu’ils pensaient au-dedans d’eux, leur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Pourquoi avez-vous de telles pensées dans vos cœurs?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Lequel est le plus aisé, de dire au paralytique: Tes péchés sont pardonnés, ou de dire: Lève-toi, prends ton lit, et marche?'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Or, afin que vous sachiez que le Fils de l’homme a sur la terre le pouvoir de pardonner les péchés:'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je te l’ordonne,
  - type: text
    text: ' dit-il au paralytique, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: lève-toi, prends ton lit, et va dans ta maison.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Et, à l’instant, il se leva, prit son lit, et sortit en présence de tout le monde, de sorte qu’ils étaient tous dans l’étonnement et glorifiaient Dieu, disant: Nous n’avons jamais rien vu de pareil.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vocation de Lévi (Matthieu)
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 13-14: cf. (Mt 9:9. Lu 5:27, 28.) Mt 4:18-22.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 9:9
      metadata:
        usfm: MAT.9.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 5:27
      metadata:
        usfm: LUK.5.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Jésus sortit de nouveau du côté de la mer. Toute la foule venait à lui, et il les enseignait. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'En passant, il vit Lévi, fils d’Alphée, assis au bureau des péages. Il lui dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Suis-moi.
  - type: text
    text: ' Lévi se leva, et le suivit.'
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 15-17: cf. (Mt 9:10-13. Lu 5:29-32.) Lu 15:1-10. Ps 25:8, 9.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Comme Jésus était à table dans la maison de Lévi, beaucoup de publicains et de gens de mauvaise vie se mirent aussi à table avec lui et avec ses disciples; car ils étaient nombreux, et l’avaient suivi. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Les scribes et les pharisiens, le voyant manger avec les publicains et les gens de mauvaise vie, dirent à ses disciples: Pourquoi mange-t-il et boit-il avec les publicains et les gens de mauvaise vie? '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ce que Jésus ayant entendu, il leur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ce ne sont pas ceux qui se portent bien qui ont besoin de médecin, mais les malades.
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 9:13
      metadata:
        usfm: MAT.9.13
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 21:31
      metadata:
        usfm: MAT.21.31
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 5:32
      metadata:
        usfm: LUK.5.32
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 19:10
      metadata:
        usfm: LUK.19.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 1:15
      metadata:
        usfm: 1TI.1.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je ne suis pas venu appeler des justes, mais des pécheurs.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Question des disciples de Jean-Baptiste sur le jeûne
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 18-22: cf. (Mt 9:14-17. Lu 5:33-39.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 9:14
      metadata:
        usfm: MAT.9.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 5:33
      metadata:
        usfm: LUK.5.33
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Les disciples de Jean et les pharisiens jeûnaient. Ils vinrent dire à Jésus: Pourquoi les disciples de Jean et ceux des pharisiens jeûnent-ils, tandis que tes disciples ne jeûnent point? '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Jésus leur répondit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 62:5
      metadata:
        usfm: ISA.62.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 11:2
      metadata:
        usfm: 2CO.11.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Les amis de l’époux peuvent-ils jeûner pendant que l’époux est avec eux? Aussi longtemps qu’ils ont avec eux l’époux, ils ne peuvent jeûner.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Les jours viendront où l’époux leur sera enlevé, et alors ils jeûneront en ce jour-là.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Personne ne coud une pièce de drap neuf à un vieil habit; autrement, la pièce de drap neuf emporterait une partie du vieux, et la déchirure serait pire.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 9:17
      metadata:
        usfm: MAT.9.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Et personne ne met du vin nouveau dans de vieilles outres; autrement, le vin fait rompre les outres, et le vin et les outres sont perdus; mais il faut mettre le vin nouveau dans des outres neuves.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les épis de blé et le sabbat
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 23-28: cf. (Mt 12:1-8. Lu 6:1-5.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 23:25
      metadata:
        usfm: DEU.23.25
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 12:1
      metadata:
        usfm: MAT.12.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 6:1
      metadata:
        usfm: LUK.6.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il arriva, un jour de sabbat, que Jésus traversa des champs de blé. Ses disciples, chemin faisant, se mirent à arracher des épis. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Les pharisiens lui dirent: Voici, pourquoi font-ils '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 20:10
      metadata:
        usfm: EXO.20.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ce qui n’est pas permis pendant le sabbat? '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Jésus leur répondit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: N’avez-vous jamais lu ce que fit
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 21:6
      metadata:
        usfm: 1SA.21.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: David, lorsqu’il fut dans la nécessité et qu’il eut faim, lui et ceux qui étaient avec lui;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: comment il entra dans la maison de Dieu, du temps du souverain sacrificateur Abiathar, et mangea les pains de proposition, qu’il n’est permis
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 24:9
      metadata:
        usfm: LEV.24.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: qu’aux sacrificateurs de manger, et en donna même à ceux qui étaient avec lui!
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Puis il leur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Le sabbat a été fait pour l’homme, et non l’homme pour le sabbat,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 12:8
      metadata:
        usfm: MAT.12.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 6:5
      metadata:
        usfm: LUK.6.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: de sorte que le Fils de l’homme est maître même du sabbat.
