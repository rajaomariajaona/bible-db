document_id: JOB.26,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Réponse de Job à Bildad
  - type: heading
    content: 'V. 1-14: cf. Job 9:4-10; 11:7-9. Ps 104:1-9. És 40:12-28.'
  - type: text
    content: 'Job prit la parole et dit:'
  '10':
  - type: text
    content: ' '
  - type: note
    content: Job 38:8. Ps 33:7; 104:9. Jé 5:22.
  - type: text
    content: Il a tracé un cercle à la surface des eaux,
  - type: note
    content: Ge 1:9. Job 38:8. Ps 33:7; 104:9. Pr 8:29. Jé 5:22.
  - type: text
    content: Comme limite entre la lumière et les ténèbres.
  '11':
  - type: text
    content: Les colonnes du ciel s’ébranlent,
  - type: text
    content: Et s’étonnent à sa menace.
  '12':
  - type: text
    content: 'Par sa force '
  - type: note
    content: És 51:15.
  - type: text
    content: il soulève la mer,
  - type: text
    content: Par son intelligence il en brise l’orgueil.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Ps 33:6.
  - type: text
    content: Son souffle donne au ciel la sérénité,
  - type: text
    content: Sa main transperce le serpent fuyard.
  '14':
  - type: text
    content: Ce sont là les bords de ses voies,
  - type: text
    content: C’est le bruit léger qui nous en parvient;
  - type: text
    content: Mais qui entendra le tonnerre de sa puissance?
  '2':
  - type: text
    content: Comme tu sais bien venir en aide à la faiblesse!
  - type: text
    content: Comme tu prêtes secours au bras sans force!
  '3':
  - type: text
    content: Quels bons conseils tu donnes à celui qui manque d’intelligence!
  - type: text
    content: Quelle abondance de sagesse tu fais paraître!
  '4':
  - type: text
    content: A qui s’adressent tes paroles?
  - type: text
    content: Et qui est-ce qui t’inspire?
  '5':
  - type: text
    content: Devant Dieu les ombres tremblent
  - type: text
    content: Au-dessous des eaux et de leurs habitants;
  '6':
  - type: text
    content: ' '
  - type: note
    content: Ps 139:8, 11. Pr 15:11. Hé 4:13.
  - type: text
    content: Devant lui le séjour des morts est nu,
  - type: text
    content: L’abîme n’a point de voile.
  '7':
  - type: text
    content: Il étend le septentrion sur le vide,
  - type: note
    content: Ps 104:2.
  - type: text
    content: Il suspend la terre sur le néant.
  '8':
  - type: text
    content: Il renferme les eaux dans ses nuages,
  - type: text
    content: Et les nuages n’éclatent pas sous leur poids.
  '9':
  - type: text
    content: ' '
  - type: note
    content: Job 9:8. Ps 104:2, 3.
  - type: text
    content: Il couvre la face de son trône,
  - type: text
    content: Il répand sur lui sa nuée.
