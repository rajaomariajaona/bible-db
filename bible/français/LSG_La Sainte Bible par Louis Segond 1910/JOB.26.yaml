document_id: JOB.26
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Réponse de Job à Bildad
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-14: cf. Job 9:4-10; 11:7-9. Ps 104:1-9. És 40:12-28.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Job prit la parole et dit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Comme tu sais bien venir en aide à la faiblesse!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme tu prêtes secours au bras sans force!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Quels bons conseils tu donnes à celui qui manque d’intelligence!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quelle abondance de sagesse tu fais paraître!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: A qui s’adressent tes paroles?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui est-ce qui t’inspire?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Devant Dieu les ombres tremblent
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au-dessous des eaux et de leurs habitants;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 139:8
      metadata:
        usfm: PSA.139.8
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '11'
      metadata:
        usfm: PSA.139.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 15:11
      metadata:
        usfm: PRO.15.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 4:13
      metadata:
        usfm: HEB.4.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Devant lui le séjour des morts est nu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’abîme n’a point de voile.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il étend le septentrion sur le vide,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 104:2
      metadata:
        usfm: PSA.104.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il suspend la terre sur le néant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Il renferme les eaux dans ses nuages,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les nuages n’éclatent pas sous leur poids.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 9:8
      metadata:
        usfm: JOB.9.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 104:2
      metadata:
        usfm: PSA.104.2
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '3'
      metadata:
        usfm: PSA.104.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il couvre la face de son trône,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il répand sur lui sa nuée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 38:8
      metadata:
        usfm: JOB.38.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 33:7
      metadata:
        usfm: PSA.33.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 104:9
      metadata:
        usfm: PSA.104.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 5:22
      metadata:
        usfm: JER.5.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il a tracé un cercle à la surface des eaux,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 1:9
      metadata:
        usfm: GEN.1.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 38:8
      metadata:
        usfm: JOB.38.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 33:7
      metadata:
        usfm: PSA.33.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 104:9
      metadata:
        usfm: PSA.104.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 8:29
      metadata:
        usfm: PRO.8.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 5:22
      metadata:
        usfm: JER.5.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Comme limite entre la lumière et les ténèbres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Les colonnes du ciel s’ébranlent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et s’étonnent à sa menace.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Par sa force '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 51:15
      metadata:
        usfm: ISA.51.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: il soulève la mer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Par son intelligence il en brise l’orgueil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 33:6
      metadata:
        usfm: PSA.33.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Son souffle donne au ciel la sérénité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sa main transperce le serpent fuyard.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ce sont là les bords de ses voies,
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est le bruit léger qui nous en parvient;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais qui entendra le tonnerre de sa puissance?
