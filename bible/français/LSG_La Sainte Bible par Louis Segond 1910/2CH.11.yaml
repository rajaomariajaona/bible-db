document_id: 2CH.11,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Précautions de Roboam pour s’affermir dans son royaume. Idolâtrie
  - type: heading
    content: 'V. 1-17: cf. 1 R 12:21-33.'
  - type: text
    content: ' '
  - type: note
    content: 1 R 12:21.
  - type: text
    content: 'Roboam, arrivé à Jérusalem, rassembla la maison de Juda et de Benjamin, cent quatre-vingt mille hommes d’élite propres à la guerre, pour qu’ils combattissent contre Israël afin de le ramener sous la domination de Roboam. '
  '10':
  - type: text
    content: 'Tsorea, Ajalon et Hébron, qui étaient en Juda et en Benjamin, et il en fit des villes fortes. '
  '11':
  - type: text
    content: 'Il les fortifia, et y établit des commandants, et des magasins de vivres, d’huile et de vin. '
  '12':
  - type: text
    content: 'Il mit dans chacune de ces villes des boucliers et des lances, et il les rendit très fortes. Juda et Benjamin étaient à lui. '
  '13':
  - type: text
    content: 'Les sacrificateurs et les Lévites qui se trouvaient dans tout Israël quittèrent leurs demeures pour se rendre auprès de lui; '
  '14':
  - type: text
    content: 'car les Lévites abandonnèrent leurs banlieues et leurs propriétés et vinrent en Juda et à Jérusalem, parce que '
  - type: note
    content: 2 Ch 13:9.
  - type: text
    content: 'Jéroboam et ses fils les empêchèrent de remplir leurs fonctions comme sacrificateurs de l’Éternel. '
  '15':
  - type: text
    content: 'Jéroboam '
  - type: note
    content: 1 R 12:31.
  - type: text
    content: 'établit des sacrificateurs pour les hauts lieux, pour les boucs, et pour les veaux qu’il avait faits. '
  '16':
  - type: text
    content: 'Ceux de toutes les tribus d’Israël qui avaient à cœur de chercher l’Éternel, le Dieu d’Israël, suivirent les Lévites à Jérusalem pour sacrifier à l’Éternel, le Dieu de leurs pères. '
  '17':
  - type: text
    content: Ils donnèrent ainsi de la force au royaume de Juda, et affermirent Roboam, fils de Salomon, pendant trois ans; car ils marchèrent pendant trois ans dans la voie de David et de Salomon.
  - type: heading
    content: 'V. 18-23: cf. De 17:17; 21:15-17.'
  '18':
  - type: text
    content: 'Roboam prit pour femme Mahalath, fille de Jerimoth, fils de David et d’Abichaïl, fille d’Éliab, fils d’Isaï. '
  '19':
  - type: text
    content: 'Elle lui enfanta des fils: Jeusch, Schemaria et Zaham. '
  '2':
  - type: text
    content: 'Mais la parole de l’Éternel fut ainsi adressée à Schemaeja, homme de Dieu: '
  '20':
  - type: text
    content: 'Après elle, il prit '
  - type: note
    content: 1 R 15:2.
  - type: text
    content: 'Maaca, fille d’Absalom. Elle lui enfanta Abija, Attaï, Ziza et Schelomith. '
  '21':
  - type: text
    content: 'Roboam aimait Maaca, fille d’Absalom, plus que toutes ses femmes et ses concubines; car il eut dix-huit femmes et soixante concubines, et il engendra vingt-huit fils et soixante filles. '
  '22':
  - type: text
    content: 'Roboam donna le premier rang à Abija, fils de Maaca, et l’établit chef parmi ses frères, car il voulait le faire roi. '
  '23':
  - type: text
    content: Il agit avec habileté en dispersant tous ses fils dans toutes les contrées de Juda et de Benjamin, dans toutes les villes fortes; il leur fournit des vivres en abondance, et demanda pour eux une multitude de femmes.
  '3':
  - type: text
    content: 'Parle à Roboam, fils de Salomon, roi de Juda, et à tout Israël en Juda et en Benjamin. Et dis-leur: '
  '4':
  - type: text
    content: 'Ainsi parle l’Éternel: '
  - type: note
    content: 1 R 12:24.
  - type: text
    content: 'Ne montez point, et ne faites pas la guerre à vos frères! Que chacun de vous retourne dans sa maison, car c’est de par moi que cette chose est arrivée. Ils obéirent aux paroles de l’Éternel, et ils s’en retournèrent, renonçant à marcher contre Jéroboam. '
  '5':
  - type: text
    content: 'Roboam demeura à Jérusalem, et il bâtit des villes fortes en Juda. '
  '6':
  - type: text
    content: 'Il bâtit Bethléhem, Étham, Tekoa, '
  '7':
  - type: text
    content: 'Beth-Tsur, Soco, Adullam, '
  '8':
  - type: text
    content: 'Gath, Maréscha, Ziph, '
  '9':
  - type: text
    content: 'Adoraïm, Lakis, Azéka, '
