document_id: GEN.28
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fuite de Jacob en Mésopotamie
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-5: cf. Ge 27:41-46; 24:1-10.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Isaac appela Jacob, le bénit, et lui donna cet ordre: Tu ne prendras pas une femme parmi les filles de Canaan. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Os 12:13
      metadata:
        usfm: HOS.12.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Lève-toi, va à Paddan-Aram, à la maison de Bethuel, père de ta mère, et prends-y une femme d’entre les filles de Laban, frère de ta mère. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Que le Dieu tout-puissant te bénisse, te rende fécond et te multiplie, afin que tu deviennes une multitude de peuples! '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Qu’il te donne la bénédiction d’Abraham, à toi '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 12:7
      metadata:
        usfm: GEN.12.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 13:15
      metadata:
        usfm: GEN.13.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 15:18
      metadata:
        usfm: GEN.15.18
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 24:7
      metadata:
        usfm: GEN.24.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 26:3
      metadata:
        usfm: GEN.26.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 34:4
      metadata:
        usfm: DEU.34.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 7:5
      metadata:
        usfm: ACT.7.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et à ta postérité avec toi, afin que tu possèdes le pays où tu habites comme étranger, et qu’il a donné à Abraham! '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Et Isaac fit partir Jacob, qui s’en alla à Paddan-Aram, auprès de Laban, fils de Bethuel, l’Araméen, frère de Rebecca, mère de Jacob et d’Ésaü.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 6-9: cf. Ge 26:34, 35; 36:1-5.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ésaü vit qu’Isaac avait béni Jacob, et qu’il l’avait envoyé à Paddan-Aram pour y prendre une femme, et qu’en le bénissant il lui avait donné cet ordre: Tu ne prendras pas une femme parmi les filles de Canaan. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il vit que Jacob avait obéi à son père et à sa mère, et qu’il était parti pour Paddan-Aram. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ésaü comprit ainsi que les filles de Canaan déplaisaient à Isaac, son père. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Et Ésaü s’en alla vers Ismaël. Il prit pour femme, outre les femmes qu’il avait, Mahalath, fille d’Ismaël, fils d’Abraham, et sœur de Nebajoth.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vision de l’échelle
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 10-22: cf. Os 12:13. (Ge 35:1-15. Jn 1:51.) Ro 5:20.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Jacob partit de Beer-Schéba, et s’en alla à Charan. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il arriva dans un lieu où il passa la nuit; car le soleil était couché. Il y prit une pierre, dont il fit son chevet, et il se coucha dans ce lieu-là. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il eut un songe. Et voici, une échelle était appuyée sur la terre, et son sommet touchait au ciel. Et voici, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jn 1:52.
    marker-yv: yv-n
  - type: text
    text: 'les anges de Dieu montaient et descendaient par cette échelle. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Et voici, l’Éternel se tenait au-dessus d’elle; et il dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 35:1
      metadata:
        usfm: GEN.35.1
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '3'
      metadata:
        usfm: GEN.35.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 48:3
      metadata:
        usfm: GEN.48.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Je suis l’Éternel, le Dieu d’Abraham, ton père, et le Dieu d’Isaac. La terre sur laquelle tu es couché, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 12:20
      metadata:
        usfm: DEU.12.20
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 19:8
      metadata:
        usfm: DEU.19.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'je la donnerai à toi et à ta postérité. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ta postérité sera comme la poussière de la terre; tu t’étendras à l’occident et à l’orient, au septentrion et au midi; et toutes les familles de la terre seront bénies '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 12:3
      metadata:
        usfm: GEN.12.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 18:18
      metadata:
        usfm: GEN.18.18
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 22:18
      metadata:
        usfm: GEN.22.18
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 26:4
      metadata:
        usfm: GEN.26.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'en toi et en ta postérité. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Voici, je suis avec toi, je te garderai partout où tu iras, et je te ramènerai dans ce pays; car je ne t’abandonnerai point, que je n’aie exécuté ce que je te dis. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Jacob s’éveilla de son sommeil et il dit: Certainement, l’Éternel est en ce lieu, et moi, je ne le savais pas! '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il eut peur, et dit: Que ce lieu est redoutable! C’est ici la maison de Dieu, c’est ici la porte des cieux! '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Et Jacob se leva de bon matin; il prit la pierre dont il avait fait son chevet, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 31:13
      metadata:
        usfm: GEN.31.13
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 35:14
      metadata:
        usfm: GEN.35.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'il la dressa pour monument, et il versa de l’huile sur son sommet. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Il donna à ce lieu le nom de Béthel; mais la ville s’appelait auparavant Luz. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Jacob fit un vœu, en disant: Si Dieu est avec moi et me garde pendant ce voyage que je fais, s’il me donne du pain à manger et des habits pour me vêtir, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'et si je retourne en paix à la maison de mon père, alors l’Éternel sera mon Dieu; '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: cette pierre, que j’ai dressée pour monument, sera la maison de Dieu; et je te donnerai la dîme de tout ce que tu me donneras.
