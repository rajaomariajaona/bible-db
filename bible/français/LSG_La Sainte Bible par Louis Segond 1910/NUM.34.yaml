document_id: NUM.34,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Limites du pays de Canaan
  - type: heading
    content: 'V. 1-15: cf. (Jos 15:1-4. Éz 47:13-21.) (Jos 12:1-8; 13:1-8.)'
  - type: text
    content: 'L’Éternel parla à Moïse, et dit: '
  '10':
  - type: text
    content: 'Vous tracerez votre limite orientale de Hatsar-Énan à Schepham; '
  '11':
  - type: text
    content: 'elle descendra de Schepham vers Ribla, à l’orient d’Aïn; elle descendra, et s’étendra le long de la mer de Kinnéreth, à l’orient; '
  '12':
  - type: text
    content: 'elle descendra encore vers le Jourdain, pour aboutir à la mer Salée. Tel sera votre pays avec ses limites tout autour. '
  '13':
  - type: text
    content: 'Moïse transmit cet ordre aux enfants d’Israël, et dit: C’est là le pays que vous partagerez par le sort, et que l’Éternel a résolu de donner aux neuf tribus et à la demi-tribu. '
  '14':
  - type: text
    content: 'Car la tribu des fils de Ruben et la tribu des fils de Gad ont pris leur héritage, selon les maisons de leurs pères; la demi-tribu de Manassé a aussi pris son héritage. '
  '15':
  - type: text
    content: Ces deux tribus et la demi-tribu ont pris leur héritage en deçà du Jourdain, vis-à-vis de Jéricho, du côté de l’orient.
  - type: heading
    content: Ordre pour le partage
  - type: heading
    content: 'V. 16-29: cf. Jos 14. No 13:1-16.'
  '16':
  - type: text
    content: 'L’Éternel parla à Moïse, et dit: '
  '17':
  - type: note
    content: Jos 14:1.
  - type: text
    content: 'Voici les noms des hommes qui partageront entre vous le pays: le sacrificateur Éléazar, et Josué, fils de Nun. '
  '18':
  - type: text
    content: 'Vous prendrez encore un prince de chaque tribu, pour faire le partage du pays. '
  '19':
  - type: text
    content: 'Voici les noms de ces hommes. Pour la tribu de Juda: Caleb, fils de Jephunné; '
  '2':
  - type: text
    content: 'Donne cet ordre aux enfants d’Israël, et dis-leur: Quand vous serez entrés dans le pays de Canaan, ce pays deviendra votre héritage, le pays de Canaan, dont voici les limites. '
  '20':
  - type: text
    content: 'pour la tribu des fils de Siméon: Samuel, fils d’Ammihud; '
  '21':
  - type: text
    content: 'pour la tribu de Benjamin: Élidad, fils de Kislon; '
  '22':
  - type: text
    content: 'pour la tribu des fils de Dan: le prince Buki, fils de Jogli; '
  '23':
  - type: text
    content: 'pour les fils de Joseph, pour la tribu des fils de Manassé: le prince Hanniel, fils d’Éphod; '
  '24':
  - type: text
    content: 'et pour la tribu des fils d’Éphraïm: le prince Kemuel, fils de Schiphtan; '
  '25':
  - type: text
    content: 'pour la tribu des fils de Zabulon: le prince Élitsaphan, fils de Parnac; '
  '26':
  - type: text
    content: 'pour la tribu des fils d’Issacar: le prince Paltiel, fils d’Azzan; '
  '27':
  - type: text
    content: 'pour la tribu des fils d’Aser: le prince Ahihud, fils de Schelomi; '
  '28':
  - type: text
    content: 'pour la tribu des fils de Nephthali: le prince Pedahel, fils d’Ammihud. '
  '29':
  - type: text
    content: Tels sont ceux à qui l’Éternel ordonna de partager le pays de Canaan entre les enfants d’Israël.
  '3':
  - type: note
    content: Jos 15:1.
  - type: text
    content: 'Le côté du midi commencera au désert de Tsin près d’Édom. Ainsi, votre limite méridionale partira de l’extrémité de la mer Salée, vers l’orient; '
  '4':
  - type: text
    content: 'elle tournera au sud de la montée d’Akrabbim, passera par Tsin, et s’étendra jusqu’au midi de Kadès-Barnéa; elle continuera par Hatsar-Addar, et passera vers Atsmon; '
  '5':
  - type: text
    content: 'depuis Atsmon, elle tournera jusqu’au torrent d’Égypte, pour aboutir à la mer. '
  '6':
  - type: text
    content: 'Votre limite occidentale sera la grande mer: ce sera votre limite à l’occident. '
  '7':
  - type: text
    content: 'Voici quelle sera votre limite septentrionale: à partir de la grande mer, vous la tracerez jusqu’à la montagne de Hor; '
  '8':
  - type: text
    content: 'depuis la montagne de Hor, vous la ferez passer par Hamath, et arriver à Tsedad; '
  '9':
  - type: text
    content: 'elle continuera par Ziphron, pour aboutir à Hatsar-Énan: ce sera votre limite au septentrion. '
