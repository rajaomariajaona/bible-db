document_id: NUM.23,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-10: cf. De 23:3-5. (De 32:8, 9. Ps 147:19, 20.) Ge 50:20.'
  - type: text
    content: 'Balaam dit à Balak: Bâtis-moi ici sept autels, et prépare-moi ici sept taureaux et sept béliers. '
  '10':
  - type: text
    content: Qui peut compter la poussière de Jacob,
  - type: text
    content: Et dire le nombre du quart d’Israël?
  - type: text
    content: Que je meure de la mort des justes,
  - type: text
    content: Et que ma fin soit semblable à la leur!
  - type: heading
    content: 'V. 11-24: cf. Jos 24:9, 10. (Ro 11:29. De 7:6, etc.) Ro 8:33.'
  '11':
  - type: text
    content: 'Balak dit à Balaam: Que m’as-tu fait? Je t’ai pris pour maudire mon ennemi, et voici, tu le bénis! '
  '12':
  - type: text
    content: 'Il répondit, et dit: N’aurai-je pas soin de dire ce que l’Éternel met dans ma bouche? '
  '13':
  - type: text
    content: 'Balak lui dit: Viens donc avec moi dans un autre lieu, d’où tu le verras; tu n’en verras qu’une partie, tu n’en verras pas la totalité. Et de là maudis-le-moi. '
  '14':
  - type: text
    content: 'Il le mena au champ de Tsophim, sur le sommet du Pisga; il bâtit sept autels, et offrit un taureau et un bélier sur chaque autel. '
  '15':
  - type: text
    content: 'Balaam dit à Balak: Tiens-toi ici, près de ton holocauste, et j’irai à la rencontre de Dieu. '
  '16':
  - type: text
    content: 'L’Éternel vint au-devant de Balaam; '
  - type: note
    content: No 22:35.
  - type: text
    content: 'il mit des paroles dans sa bouche, et dit: Retourne vers Balak, et tu parleras ainsi. '
  '17':
  - type: text
    content: 'Il retourna vers lui; et voici, Balak se tenait près de son holocauste, avec les chefs de Moab. Balak lui dit: Qu’est-ce que l’Éternel a dit? '
  '18':
  - type: text
    content: 'Balaam prononça son oracle, et dit:'
  - type: text
    content: Lève-toi, Balak, écoute!
  - type: text
    content: Prête-moi l’oreille, fils de Tsippor!
  '19':
  - type: text
    content: ' '
  - type: note
    content: 1 S 15:29. Ja 1:17.
  - type: text
    content: Dieu n’est point un homme pour mentir,
  - type: text
    content: Ni fils d’un homme pour se repentir.
  - type: text
    content: Ce qu’il a dit, ne le fera-t-il pas?
  - type: text
    content: Ce qu’il a déclaré, ne l’exécutera-t-il pas?
  '2':
  - type: text
    content: 'Balak fit ce que Balaam avait dit; et Balak et Balaam offrirent un taureau et un bélier sur chaque autel. '
  '20':
  - type: text
    content: 'Voici, j’ai reçu l’ordre de bénir:'
  - type: text
    content: Il a béni, je ne le révoquerai point.
  '21':
  - type: text
    content: ' '
  - type: note
    content: Ps 32:1, 2; 51:11. Jé 50:20. Ro 4:7.
  - type: text
    content: Il n’aperçoit point d’iniquité en Jacob,
  - type: text
    content: Il ne voit point d’injustice en Israël;
  - type: text
    content: L’Éternel, son Dieu, est avec lui,
  - type: text
    content: Il est son roi, l’objet de son allégresse.
  '22':
  - type: text
    content: Dieu les a fait sortir d’Égypte,
  - type: note
    content: No 24:8.
  - type: text
    content: Il est pour eux comme la vigueur du buffle.
  '23':
  - type: text
    content: L’enchantement ne peut rien contre Jacob,
  - type: text
    content: Ni la divination contre Israël;
  - type: text
    content: 'Au temps marqué, il sera dit à Jacob et à Israël:'
  - type: text
    content: Quelle est l’œuvre de Dieu.
  '24':
  - type: text
    content: C’est un peuple qui se lève comme une lionne,
  - type: text
    content: Et qui se dresse comme un lion;
  - type: text
    content: Il ne se couche point jusqu’à ce qu’il ait dévoré la proie,
  - type: text
    content: Et qu’il ait bu le sang des blessés.
  - type: heading
    content: '23 v. 25 à 24 v. 14: cf. De 33:26-29. 1 R 4:20-25. Lu 1:54.'
  '25':
  - type: text
    content: 'Balak dit à Balaam: Ne le maudis pas, mais du moins ne le bénis pas. '
  '26':
  - type: text
    content: 'Balaam répondit, et dit à Balak: Ne t’ai-je pas parlé ainsi: Je ferai tout ce que l’Éternel dira? '
  '27':
  - type: text
    content: 'Balak dit à Balaam: Viens donc, je te mènerai dans un autre lieu; peut être Dieu trouvera-t-il bon que de là tu me maudisses ce peuple. '
  '28':
  - type: text
    content: 'Balak mena Balaam sur le sommet du Peor, en regard du désert. '
  '29':
  - type: text
    content: 'Balaam dit à Balak: Bâtis-moi ici sept autels, et prépare-moi ici sept taureaux et sept béliers. '
  '3':
  - type: text
    content: 'Balaam dit à Balak: Tiens-toi près de ton holocauste, et je m’éloignerai; peut-être que l’Éternel viendra à ma rencontre, et je te dirai ce qu’il me révélera. Et il alla sur un lieu élevé. '
  '30':
  - type: text
    content: Balak fit ce que Balaam avait dit, et il offrit un taureau et un bélier sur chaque autel.
  '4':
  - type: text
    content: 'Dieu vint au-devant de Balaam, et Balaam lui dit: J’ai dressé sept autels, et j’ai offert un taureau et un bélier sur chaque autel. '
  '5':
  - type: text
    content: 'L’Éternel mit des paroles dans la bouche de Balaam, et dit: Retourne vers Balak, et tu parleras ainsi. '
  '6':
  - type: text
    content: 'Il retourna vers lui; et voici, Balak se tenait près de son holocauste, lui et tous les chefs de Moab. '
  '7':
  - type: text
    content: 'Balaam prononça son oracle, et dit:'
  - type: text
    content: Balak m’a fait descendre d’Aram,
  - type: text
    content: Le roi de Moab m’a fait descendre des montagnes de l’Orient.
  - type: text
    content: Viens, maudis-moi Jacob!
  - type: text
    content: Viens, sois irrité contre Israël!
  '8':
  - type: text
    content: Comment maudirais-je celui que Dieu n’a point maudit?
  - type: text
    content: Comment serais-je irrité quand l’Éternel n’est point irrité?
  '9':
  - type: text
    content: 'Je le vois du sommet des rochers, Je le contemple du haut des collines: '
  - type: note
    content: De 33:28.
  - type: text
    content: C’est un peuple qui a sa demeure à part,
  - type: text
    content: Et qui ne fait point partie des nations.
