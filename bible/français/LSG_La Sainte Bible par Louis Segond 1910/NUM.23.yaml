document_id: NUM.23,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-10: cf. De 23:3-5. (De 32:8, 9. Ps 147:19, 20.) Ge 50:20.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Balaam dit à Balak: Bâtis-moi ici sept autels, et prépare-moi ici sept taureaux et sept béliers. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Qui peut compter la poussière de Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et dire le nombre du quart d’Israël?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que je meure de la mort des justes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que ma fin soit semblable à la leur!
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 11-24: cf. Jos 24:9, 10. (Ro 11:29. De 7:6, etc.) Ro 8:33.'
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Balak dit à Balaam: Que m’as-tu fait? Je t’ai pris pour maudire mon ennemi, et voici, tu le bénis! '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Il répondit, et dit: N’aurai-je pas soin de dire ce que l’Éternel met dans ma bouche? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Balak lui dit: Viens donc avec moi dans un autre lieu, d’où tu le verras; tu n’en verras qu’une partie, tu n’en verras pas la totalité. Et de là maudis-le-moi. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Il le mena au champ de Tsophim, sur le sommet du Pisga; il bâtit sept autels, et offrit un taureau et un bélier sur chaque autel. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Balaam dit à Balak: Tiens-toi ici, près de ton holocauste, et j’irai à la rencontre de Dieu. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'L’Éternel vint au-devant de Balaam; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 22:35
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'il mit des paroles dans sa bouche, et dit: Retourne vers Balak, et tu parleras ainsi. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Il retourna vers lui; et voici, Balak se tenait près de son holocauste, avec les chefs de Moab. Balak lui dit: Qu’est-ce que l’Éternel a dit? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Balaam prononça son oracle, et dit:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lève-toi, Balak, écoute!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prête-moi l’oreille, fils de Tsippor!
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 15:29
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ja 1:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Dieu n’est point un homme pour mentir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ni fils d’un homme pour se repentir.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce qu’il a dit, ne le fera-t-il pas?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce qu’il a déclaré, ne l’exécutera-t-il pas?
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Balak fit ce que Balaam avait dit; et Balak et Balaam offrirent un taureau et un bélier sur chaque autel. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Voici, j’ai reçu l’ordre de bénir:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a béni, je ne le révoquerai point.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 32:1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 51:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 50:20
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 4:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il n’aperçoit point d’iniquité en Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne voit point d’injustice en Israël;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel, son Dieu, est avec lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est son roi, l’objet de son allégresse.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Dieu les a fait sortir d’Égypte,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 24:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il est pour eux comme la vigueur du buffle.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: L’enchantement ne peut rien contre Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ni la divination contre Israël;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Au temps marqué, il sera dit à Jacob et à Israël:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quelle est l’œuvre de Dieu.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: C’est un peuple qui se lève comme une lionne,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qui se dresse comme un lion;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne se couche point jusqu’à ce qu’il ait dévoré la proie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qu’il ait bu le sang des blessés.
  - type: usfm
    marker: r
    children:
    - type: text
      text: '23 v. 25 à 24 v. 14: cf. De 33:26-29. 1 R 4:20-25. Lu 1:54.'
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Balak dit à Balaam: Ne le maudis pas, mais du moins ne le bénis pas. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Balaam répondit, et dit à Balak: Ne t’ai-je pas parlé ainsi: Je ferai tout ce que l’Éternel dira? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Balak dit à Balaam: Viens donc, je te mènerai dans un autre lieu; peut être Dieu trouvera-t-il bon que de là tu me maudisses ce peuple. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Balak mena Balaam sur le sommet du Peor, en regard du désert. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Balaam dit à Balak: Bâtis-moi ici sept autels, et prépare-moi ici sept taureaux et sept béliers. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Balaam dit à Balak: Tiens-toi près de ton holocauste, et je m’éloignerai; peut-être que l’Éternel viendra à ma rencontre, et je te dirai ce qu’il me révélera. Et il alla sur un lieu élevé. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Balak fit ce que Balaam avait dit, et il offrit un taureau et un bélier sur chaque autel.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Dieu vint au-devant de Balaam, et Balaam lui dit: J’ai dressé sept autels, et j’ai offert un taureau et un bélier sur chaque autel. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'L’Éternel mit des paroles dans la bouche de Balaam, et dit: Retourne vers Balak, et tu parleras ainsi. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Il retourna vers lui; et voici, Balak se tenait près de son holocauste, lui et tous les chefs de Moab. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Balaam prononça son oracle, et dit:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Balak m’a fait descendre d’Aram,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le roi de Moab m’a fait descendre des montagnes de l’Orient.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Viens, maudis-moi Jacob!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Viens, sois irrité contre Israël!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Comment maudirais-je celui que Dieu n’a point maudit?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comment serais-je irrité quand l’Éternel n’est point irrité?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Je le vois du sommet des rochers, Je le contemple du haut des collines: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 33:28
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: C’est un peuple qui a sa demeure à part,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qui ne fait point partie des nations.
