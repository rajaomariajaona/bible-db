document_id: ISA.21,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Prédiction de la chute de Babylone
  - type: heading
    content: 'V. 1-10: cf. És 13 et 14. Da 5.'
  - type: text
    content: Oracle sur le désert de la mer.
  - type: text
    content: Comme s’avance l’ouragan du midi,
  - type: text
    content: Il vient du désert, du pays redoutable.
  '10':
  - type: text
    content: O mon peuple, qui as été battu comme du grain dans mon aire!
  - type: text
    content: Ce que j’ai appris de l’Éternel des armées, Dieu d’Israël,
  - type: text
    content: Je vous l’ai annoncé.
  - type: heading
    content: Prophétie contre Édom et l’Arabie
  - type: heading
    content: 'V. 11-17: cf. (Jé 49:7-22. Ab 1.) Jé 49:28-33.'
  '11':
  - type: text
    content: Oracle sur Duma.
  - type: text
    content: 'On me crie de Séir:'
  - type: text
    content: Sentinelle, que dis-tu de la nuit?
  - type: text
    content: Sentinelle, que dis-tu de la nuit?
  '12':
  - type: text
    content: 'La sentinelle répond:'
  - type: text
    content: Le matin vient, et la nuit aussi.
  - type: text
    content: Si vous voulez interroger, interrogez;
  - type: text
    content: Convertissez-vous, et revenez.
  '13':
  - type: text
    content: Oracle sur l’Arabie.
  - type: text
    content: Vous passerez la nuit dans les broussailles de l’Arabie,
  - type: text
    content: Caravanes de Dedan!
  '14':
  - type: text
    content: Portez de l’eau à ceux qui ont soif;
  - type: text
    content: Les habitants du pays de Théma
  - type: text
    content: Portent du pain aux fugitifs.
  '15':
  - type: text
    content: Car ils fuient devant les épées,
  - type: text
    content: Devant l’épée nue, devant l’arc tendu,
  - type: text
    content: Devant un combat acharné.
  '16':
  - type: text
    content: 'Car ainsi m’a parlé le Seigneur:'
  - type: text
    content: Encore une année, comme les années d’un mercenaire,
  - type: text
    content: Et c’en est fait de toute la gloire de Kédar.
  '17':
  - type: text
    content: Il ne restera qu’un petit nombre des vaillants archers, fils de Kédar,
  - type: text
    content: Car l’Éternel, le Dieu d’Israël, l’a déclaré.
  '2':
  - type: text
    content: Une vision terrible m’a été révélée.
  - type: text
    content: L’oppresseur opprime, le dévastateur dévaste.
  - type: text
    content: Monte, Élam! Assiège, Médie!
  - type: text
    content: Je fais cesser tous les soupirs.
  '3':
  - type: text
    content: C’est pourquoi mes reins sont remplis d’angoisses;
  - type: text
    content: Des douleurs me saisissent,
  - type: text
    content: Comme les douleurs d’une femme en travail;
  - type: text
    content: Les spasmes m’empêchent d’entendre,
  - type: text
    content: Le tremblement m’empêche de voir.
  '4':
  - type: text
    content: Mon cœur est troublé,
  - type: text
    content: La terreur s’empare de moi;
  - type: note
    content: Job 7:3.
  - type: text
    content: La nuit de mes plaisirs devient une nuit d’épouvante.
  '5':
  - type: text
    content: On dresse la table, la garde veille, on mange, on boit…
  - type: text
    content: Debout, princes! Oignez le bouclier!
  '6':
  - type: text
    content: 'Car ainsi m’a parlé le Seigneur:'
  - type: text
    content: Va, place la sentinelle;
  - type: text
    content: Qu’elle annonce ce qu’elle verra.
  '7':
  - type: text
    content: Elle vit de la cavalerie, des cavaliers deux à deux,
  - type: text
    content: Des cavaliers sur des ânes, des cavaliers sur des chameaux;
  - type: text
    content: Et elle était attentive, très attentive.
  '8':
  - type: text
    content: 'Puis elle s’écria, comme un lion:'
  - type: text
    content: 'Seigneur, '
  - type: note
    content: Ha 2:1.
  - type: text
    content: je me tiens sur la tour toute la journée,
  - type: text
    content: Et je suis à mon poste toutes les nuits;
  '9':
  - type: text
    content: Et voici, il vient de la cavalerie, des cavaliers deux à deux!
  - type: text
    content: 'Elle prit encore la parole, et dit:'
  - type: text
    content: 'Elle est tombée, elle est tombée, '
  - type: note
    content: Jé 25:12; 51:8. Ap 14:8; 18:2.
  - type: text
    content: Babylone,
  - type: text
    content: Et toutes les images de ses dieux sont brisées par terre!
