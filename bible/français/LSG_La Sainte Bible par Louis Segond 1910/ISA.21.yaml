document_id: ISA.21,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prédiction de la chute de Babylone
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-10: cf. És 13 et 14. Da 5.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Oracle sur le désert de la mer.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme s’avance l’ouragan du midi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il vient du désert, du pays redoutable.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: O mon peuple, qui as été battu comme du grain dans mon aire!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce que j’ai appris de l’Éternel des armées, Dieu d’Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je vous l’ai annoncé.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prophétie contre Édom et l’Arabie
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 11-17: cf. (Jé 49:7-22. Ab 1.) Jé 49:28-33.'
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Oracle sur Duma.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'On me crie de Séir:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sentinelle, que dis-tu de la nuit?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sentinelle, que dis-tu de la nuit?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'La sentinelle répond:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le matin vient, et la nuit aussi.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si vous voulez interroger, interrogez;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Convertissez-vous, et revenez.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Oracle sur l’Arabie.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous passerez la nuit dans les broussailles de l’Arabie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Caravanes de Dedan!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Portez de l’eau à ceux qui ont soif;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les habitants du pays de Théma
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Portent du pain aux fugitifs.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Car ils fuient devant les épées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Devant l’épée nue, devant l’arc tendu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Devant un combat acharné.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Car ainsi m’a parlé le Seigneur:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Encore une année, comme les années d’un mercenaire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et c’en est fait de toute la gloire de Kédar.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Il ne restera qu’un petit nombre des vaillants archers, fils de Kédar,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car l’Éternel, le Dieu d’Israël, l’a déclaré.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Une vision terrible m’a été révélée.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’oppresseur opprime, le dévastateur dévaste.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Monte, Élam! Assiège, Médie!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je fais cesser tous les soupirs.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: C’est pourquoi mes reins sont remplis d’angoisses;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des douleurs me saisissent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme les douleurs d’une femme en travail;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les spasmes m’empêchent d’entendre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le tremblement m’empêche de voir.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Mon cœur est troublé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La terreur s’empare de moi;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 7:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: La nuit de mes plaisirs devient une nuit d’épouvante.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: On dresse la table, la garde veille, on mange, on boit…
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Debout, princes! Oignez le bouclier!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Car ainsi m’a parlé le Seigneur:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Va, place la sentinelle;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’elle annonce ce qu’elle verra.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Elle vit de la cavalerie, des cavaliers deux à deux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des cavaliers sur des ânes, des cavaliers sur des chameaux;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et elle était attentive, très attentive.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Puis elle s’écria, comme un lion:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Seigneur, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ha 2:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: je me tiens sur la tour toute la journée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je suis à mon poste toutes les nuits;
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Et voici, il vient de la cavalerie, des cavaliers deux à deux!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Elle prit encore la parole, et dit:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Elle est tombée, elle est tombée, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 25:12
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 51:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 14:8
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Babylone,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et toutes les images de ses dieux sont brisées par terre!
