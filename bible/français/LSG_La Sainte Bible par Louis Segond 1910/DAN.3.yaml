document_id: DAN.3,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Les trois compagnons de Daniel dans la fournaise
  - type: heading
    content: 'V. 1-30: cf. Ps 115:1-11. Da 6. (Hé 11:32-34. Ps 34:8; 91:15. Ro 8:31, etc.) (Mt 10:28. Ac 20:24.) 2 Ch 16:9.'
  - type: text
    content: 'Le roi Nebucadnetsar fit une statue d’or, haute de soixante coudées et large de six coudées. Il la dressa dans la vallée de Dura, dans la province de Babylone. '
  '10':
  - type: text
    content: 'Tu as donné un ordre d’après lequel tous ceux qui entendraient le son de la trompette, du chalumeau, de la guitare, de la sambuque, du psaltérion, de la cornemuse, et de toutes sortes d’instruments, devraient se prosterner et adorer la statue d’or, '
  '11':
  - type: text
    content: 'et d’après lequel quiconque ne se prosternerait pas et n’adorerait pas serait jeté au milieu d’une fournaise ardente. '
  '12':
  - type: text
    content: 'Or, il y a des Juifs à qui tu as remis l’intendance de la province de Babylone, Schadrac, Méschac et Abed-Nego, hommes qui ne tiennent aucun compte de toi, ô roi; ils ne servent pas tes dieux, et ils n’adorent point la statue d’or que tu as élevée. '
  '13':
  - type: text
    content: 'Alors Nebucadnetsar, irrité et furieux, donna l’ordre qu’on amenât Schadrac, Méschac et Abed-Nego. Et ces hommes furent amenés devant le roi. '
  '14':
  - type: text
    content: 'Nebucadnetsar prit la parole et leur dit: Est-ce de propos délibéré, Schadrac, Méschac et Abed-Nego, que vous ne servez pas mes dieux, et que vous n’adorez pas la statue d’or que j’ai élevée? '
  '15':
  - type: text
    content: 'Maintenant tenez-vous prêts, et au moment où vous entendrez le son de la trompette, du chalumeau, de la guitare, de la sambuque, du psaltérion, de la cornemuse, et de toutes sortes d’instruments, vous vous prosternerez et vous adorerez la statue que j’ai faite; si vous ne l’adorez pas, vous serez jetés à l’instant même au milieu d’une fournaise ardente. Et quel est le dieu qui vous délivrera de ma main? '
  '16':
  - type: text
    content: 'Schadrac, Méschac et Abed-Nego répliquèrent au roi Nebucadnetsar: Nous n’avons pas besoin de te répondre là-dessus. '
  '17':
  - type: text
    content: 'Voici, notre Dieu que nous servons peut nous délivrer de la fournaise ardente, et il nous délivrera de ta main, ô roi. '
  '18':
  - type: text
    content: 'Sinon, sache, ô roi, que nous ne servirons pas tes dieux, et que nous n’adorerons pas la statue d’or que tu as élevée. '
  '19':
  - type: text
    content: 'Sur quoi Nebucadnetsar fut rempli de fureur, et il changea de visage en tournant ses regards contre Schadrac, Méschac et Abed-Nego. Il reprit la parole et ordonna de chauffer la fournaise sept fois plus qu’il ne convenait de la chauffer. '
  '2':
  - type: text
    content: 'Le roi Nebucadnetsar fit convoquer les satrapes, les intendants et les gouverneurs, les grands juges, les trésoriers, les jurisconsultes, les juges, et tous les magistrats des provinces, pour qu’ils se rendissent à la dédicace de la statue qu’avait élevée le roi Nebucadnetsar. '
  '20':
  - type: text
    content: 'Puis il commanda à quelques-uns des plus vigoureux soldats de son armée de lier Schadrac, Méschac et Abed-Nego, et de les jeter dans la fournaise ardente. '
  '21':
  - type: text
    content: 'Ces hommes furent liés avec leurs caleçons, leurs tuniques, leurs manteaux et leurs autres vêtements, et jetés au milieu de la fournaise ardente. '
  '22':
  - type: text
    content: 'Comme l’ordre du roi était sévère, et que la fournaise était extraordinairement chauffée, la flamme tua les hommes qui y avaient jeté Schadrac, Méschac et Abed-Nego. '
  '23':
  - type: text
    content: 'Et ces trois hommes, Schadrac, Méschac et Abed-Nego, tombèrent liés au milieu de la fournaise ardente. '
  '24':
  - type: text
    content: 'Alors le roi Nebucadnetsar fut effrayé, et se leva précipitamment. Il prit la parole, et dit à ses conseillers: N’avons-nous pas jeté au milieu du feu trois hommes liés? Ils répondirent au roi: Certainement, ô roi! '
  '25':
  - type: text
    content: 'Il reprit et dit: Eh bien, je vois quatre hommes sans liens, qui marchent au milieu du feu, et qui n’ont point de mal; et la figure du quatrième ressemble à celle d’un fils des dieux. '
  '26':
  - type: text
    content: 'Ensuite Nebucadnetsar s’approcha de l’entrée de la fournaise ardente, et prenant la parole, il dit: Schadrac, Méschac et Abed-Nego, serviteurs du Dieu suprême, sortez et venez! Et Schadrac, Méschac et Abed-Nego sortirent du milieu du feu. '
  '27':
  - type: text
    content: 'Les satrapes, les intendants, les gouverneurs, et les conseillers du roi s’assemblèrent; ils virent que le feu n’avait eu aucun pouvoir sur le corps de ces hommes, que les cheveux de leur tête n’avaient pas été brûlés, que leurs caleçons n’étaient point endommagés, et que l’odeur du feu ne les avait pas atteints. '
  '28':
  - type: text
    content: 'Nebucadnetsar prit la parole et dit: Béni soit le Dieu de Schadrac, de Méschac et d’Abed-Nego, lequel a envoyé son ange et délivré ses serviteurs qui ont eu confiance en lui, et qui ont violé l’ordre du roi et livré leurs corps plutôt que de servir et d’adorer aucun autre dieu que leur Dieu! '
  '29':
  - type: text
    content: 'Voici maintenant l’ordre que je donne: tout homme, à quelque peuple, nation ou langue qu’il appartienne, qui parlera mal du Dieu de Schadrac, de Méschac et d’Abed-Nego, '
  - type: note
    content: Da 2:5.
  - type: text
    content: 'sera mis en pièces, et sa maison sera réduite en un tas d’immondices, parce qu’il n’y a aucun autre dieu qui puisse délivrer comme lui. '
  '3':
  - type: text
    content: 'Alors les satrapes, les intendants et les gouverneurs, les grands juges, les trésoriers, les jurisconsultes, les juges, et tous les magistrats des provinces, s’assemblèrent pour la dédicace de la statue qu’avait élevée le roi Nebucadnetsar. Ils se placèrent devant la statue qu’avait élevée Nebucadnetsar. '
  '30':
  - type: text
    content: Après cela, le roi fit prospérer Schadrac, Méschac et Abed-Nego, dans la province de Babylone.
  '4':
  - type: text
    content: 'Un héraut cria à haute voix: Voici ce qu’on vous ordonne, peuples, nations, hommes de toutes langues! '
  '5':
  - type: text
    content: 'Au moment où vous entendrez le son de la trompette, du chalumeau, de la guitare, de la sambuque, du psaltérion, de la cornemuse, et de toutes sortes d’instruments de musique, vous vous prosternerez et vous adorerez la statue d’or qu’a élevée le roi Nebucadnetsar. '
  '6':
  - type: text
    content: 'Quiconque ne se prosternera pas et n’adorera pas sera jeté à l’instant même au milieu d’une fournaise ardente. '
  '7':
  - type: text
    content: 'C’est pourquoi, au moment où tous les peuples entendirent le son de la trompette, du chalumeau, de la guitare, de la sambuque, du psaltérion, et de toutes sortes d’instruments de musique, tous les peuples, les nations, les hommes de toutes langues se prosternèrent et adorèrent la statue d’or qu’avait élevée le roi Nebucadnetsar. '
  '8':
  - type: text
    content: 'A cette occasion, et dans le même temps, quelques Chaldéens s’approchèrent et accusèrent les Juifs. '
  '9':
  - type: text
    content: 'Ils prirent la parole et dirent au roi Nebucadnetsar: O roi, vis éternellement! '
