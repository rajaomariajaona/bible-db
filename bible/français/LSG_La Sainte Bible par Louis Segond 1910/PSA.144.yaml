    marker-yv: yv-n
  - type: text
    text: Touche les montagnes, et qu’elles soient fumantes!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
