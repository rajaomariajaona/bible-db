document_id: PSA.144,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ps 18; 65:5, etc.; 33:12.
  - type: text
    content: De David.
  - type: text
    content: Béni soit l’Éternel, mon rocher,
  - type: note
    content: 2 S 22:35. Ps 18:35.
  - type: text
    content: Qui exerce mes mains au combat,
  - type: text
    content: Mes doigts à la bataille,
  '10':
  - type: text
    content: Toi, qui donnes le salut aux rois,
  - type: text
    content: Qui sauvas du glaive meurtrier
  - type: text
    content: David, ton serviteur,
  '11':
  - type: text
    content: Délivre-moi et sauve-moi de la main des fils de l’étranger,
  - type: text
    content: Dont la bouche profère la fausseté,
  - type: text
    content: Et dont la droite est une droite mensongère!…
  '12':
  - type: text
    content: Nos fils sont comme des plantes
  - type: text
    content: Qui croissent dans leur jeunesse;
  - type: text
    content: Nos filles comme les colonnes sculptées
  - type: text
    content: Qui font l’ornement des palais.
  '13':
  - type: text
    content: Nos greniers sont pleins,
  - type: text
    content: Regorgeant de toute espèce de provisions;
  - type: text
    content: Nos troupeaux se multiplient par milliers, par dix milliers,
  - type: text
    content: Dans nos campagnes;
  '14':
  - type: text
    content: Nos génisses sont fécondes;
  - type: text
    content: Point de désastre, point de captivité,
  - type: text
    content: Point de cris dans nos rues!
  '15':
  - type: text
    content: Heureux le peuple pour qui il en est ainsi!
  - type: text
    content: Heureux le peuple dont l’Éternel est le Dieu!
  '2':
  - type: text
    content: Mon bienfaiteur et ma forteresse,
  - type: text
    content: Ma haute retraite et mon libérateur,
  - type: text
    content: Mon bouclier, celui qui est mon refuge,
  - type: note
    content: 2 S 22:48. Ps 18:48.
  - type: text
    content: Qui m’assujettit mon peuple!
  '3':
  - type: text
    content: 'Éternel, '
  - type: note
    content: Job 7:17. Ps 8:5; 31:8. Hé 2:6.
  - type: text
    content: qu’est-ce que l’homme, pour que tu le connaisses?
  - type: text
    content: Le fils de l’homme, pour que tu prennes garde à lui?
  '4':
  - type: text
    content: ' '
  - type: note
    content: Ps 39:6; 62:10.
  - type: text
    content: L’homme est semblable à un souffle,
  - type: text
    content: 'Ses jours sont '
  - type: note
    content: Job 8:9; 14:2, 3. Ps 102:12.
  - type: text
    content: comme l’ombre qui passe.
  '5':
  - type: text
    content: 'Éternel, '
  - type: note
    content: Ps 18:10.
  - type: text
    content: abaisse tes cieux, et descends!
  - type: note
    content: Ps 18:8; 104:32.
  - type: text
    content: Touche les montagnes, et qu’elles soient fumantes!
  '6':
  - type: text
    content: ' '
  - type: note
    content: 2 S 22:8. Ps 18:5.
  - type: text
    content: Fais briller les éclairs, et disperse mes ennemis!
  - type: note
    content: 1 S 7:10.
  - type: text
    content: Lance tes flèches, et mets-les en déroute!
  '7':
  - type: text
    content: Étends tes mains d’en haut;
  - type: text
    content: Délivre-moi et sauve-moi des grandes eaux,
  - type: text
    content: De la main des fils de l’étranger,
  '8':
  - type: text
    content: Dont la bouche profère la fausseté,
  - type: text
    content: Et dont la droite est une droite mensongère.
  '9':
  - type: text
    content: O Dieu! Je te chanterai un cantique nouveau,
  - type: text
    content: Je te célébrerai sur le luth à dix cordes.
