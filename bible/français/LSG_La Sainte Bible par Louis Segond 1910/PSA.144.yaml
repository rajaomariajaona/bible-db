        usfm: 2SA.22.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 18:5
      metadata:
        usfm: PSA.18.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Fais briller les éclairs, et disperse mes ennemis!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 7:10
      metadata:
        usfm: 1SA.7.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Lance tes flèches, et mets-les en déroute!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Étends tes mains d’en haut;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Délivre-moi et sauve-moi des grandes eaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De la main des fils de l’étranger,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Dont la bouche profère la fausseté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et dont la droite est une droite mensongère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: O Dieu! Je te chanterai un cantique nouveau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je te célébrerai sur le luth à dix cordes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Toi, qui donnes le salut aux rois,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui sauvas du glaive meurtrier
- type: usfm
  marker: q1
  children:
  - type: text
    text: David, ton serviteur,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Délivre-moi et sauve-moi de la main des fils de l’étranger,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dont la bouche profère la fausseté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et dont la droite est une droite mensongère!…
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Nos fils sont comme des plantes
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui croissent dans leur jeunesse;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nos filles comme les colonnes sculptées
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui font l’ornement des palais.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Nos greniers sont pleins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Regorgeant de toute espèce de provisions;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nos troupeaux se multiplient par milliers, par dix milliers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans nos campagnes;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Nos génisses sont fécondes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Point de désastre, point de captivité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Point de cris dans nos rues!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Heureux le peuple pour qui il en est ainsi!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Heureux le peuple dont l’Éternel est le Dieu!
