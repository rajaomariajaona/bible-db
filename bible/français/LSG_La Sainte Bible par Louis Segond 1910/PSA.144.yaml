document_id: PSA.144,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: Ps 18; 65:5, etc.; 33:12.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: De David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Béni soit l’Éternel, mon rocher,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 22:35
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 18:35
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Qui exerce mes mains au combat,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes doigts à la bataille,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Toi, qui donnes le salut aux rois,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui sauvas du glaive meurtrier
  - type: usfm
    marker: q1
    children:
    - type: text
      text: David, ton serviteur,
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Délivre-moi et sauve-moi de la main des fils de l’étranger,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dont la bouche profère la fausseté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et dont la droite est une droite mensongère!…
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Nos fils sont comme des plantes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui croissent dans leur jeunesse;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nos filles comme les colonnes sculptées
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui font l’ornement des palais.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Nos greniers sont pleins,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Regorgeant de toute espèce de provisions;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nos troupeaux se multiplient par milliers, par dix milliers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans nos campagnes;
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Nos génisses sont fécondes;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Point de désastre, point de captivité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Point de cris dans nos rues!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Heureux le peuple pour qui il en est ainsi!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Heureux le peuple dont l’Éternel est le Dieu!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Mon bienfaiteur et ma forteresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ma haute retraite et mon libérateur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon bouclier, celui qui est mon refuge,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 22:48
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 18:48
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Qui m’assujettit mon peuple!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Éternel, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 7:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 8:5
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 31:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 2:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: qu’est-ce que l’homme, pour que tu le connaisses?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le fils de l’homme, pour que tu prennes garde à lui?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 39:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 62:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: L’homme est semblable à un souffle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ses jours sont '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 8:9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14:2
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 102:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: comme l’ombre qui passe.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Éternel, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 18:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: abaisse tes cieux, et descends!
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 18:8
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 104:32
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Touche les montagnes, et qu’elles soient fumantes!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 22:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 18:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Fais briller les éclairs, et disperse mes ennemis!
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 7:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Lance tes flèches, et mets-les en déroute!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Étends tes mains d’en haut;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Délivre-moi et sauve-moi des grandes eaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De la main des fils de l’étranger,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Dont la bouche profère la fausseté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et dont la droite est une droite mensongère.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: O Dieu! Je te chanterai un cantique nouveau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je te célébrerai sur le luth à dix cordes.
