document_id: PSA.104,93
type_code: fra
verses:
  '1':
  - type: heading
    content: (Ge 1. Ap 4:11.) (Ps 148; 8; 19:1-7; 147.)
  - type: text
    content: 'Mon âme, bénis '
  - type: note
    content: Ps 103:1; 146:1.
  - type: text
    content: l’Éternel!
  - type: text
    content: Éternel, mon Dieu, tu es infiniment grand!
  - type: text
    content: Tu es revêtu d’éclat et de magnificence!
  '10':
  - type: text
    content: Il conduit les sources dans des torrents
  - type: text
    content: Qui coulent entre les montagnes.
  '11':
  - type: text
    content: Elles abreuvent tous les animaux des champs;
  - type: text
    content: Les ânes sauvages y étanchent leur soif.
  '12':
  - type: text
    content: Les oiseaux du ciel habitent sur leurs bords,
  - type: text
    content: Et font résonner leur voix parmi les rameaux.
  '13':
  - type: text
    content: De sa haute demeure, il arrose les montagnes;
  - type: text
    content: La terre est rassasiée du fruit de tes œuvres.
  '14':
  - type: text
    content: Il fait germer l’herbe pour le bétail,
  - type: text
    content: Et les plantes pour les besoins de l’homme,
  - type: text
    content: Afin que la terre produise de la nourriture,
  '15':
  - type: text
    content: Le vin qui réjouit le cœur de l’homme,
  - type: text
    content: Et fait plus que l’huile resplendir son visage,
  - type: text
    content: Et le pain qui soutient le cœur de l’homme.
  '16':
  - type: text
    content: Les arbres de l’Éternel se rassasient,
  - type: text
    content: Les cèdres du Liban, qu’il a plantés.
  '17':
  - type: text
    content: C’est là que les oiseaux font leurs nids;
  - type: text
    content: La cigogne a sa demeure dans les cyprès,
  '18':
  - type: text
    content: Les montagnes élevées sont pour les boucs sauvages,
  - type: text
    content: Les rochers servent de retraite aux damans.
  '19':
  - type: text
    content: Il a fait la lune pour marquer les temps;
  - type: text
    content: Le soleil sait quand il doit se coucher.
  '2':
  - type: text
    content: Il s’enveloppe de lumière comme d’un manteau;
  - type: note
    content: Ge 1:6. Job 26:7.
  - type: text
    content: Il étend les cieux comme un pavillon.
  '20':
  - type: text
    content: 'Tu amènes les ténèbres, et il est nuit:'
  - type: text
    content: Alors tous les animaux des forêts sont en mouvement;
  '21':
  - type: text
    content: ' '
  - type: note
    content: Job 39:1, 2. És 31:4.
  - type: text
    content: Les lionceaux rugissent après la proie,
  - type: text
    content: Et demandent à Dieu leur nourriture.
  '22':
  - type: text
    content: 'Le soleil se lève: ils se retirent,'
  - type: text
    content: Et se couchent dans leurs tanières.
  '23':
  - type: text
    content: L’homme sort pour se rendre à son ouvrage,
  - type: text
    content: Et à son travail, jusqu’au soir.
  '24':
  - type: text
    content: Que tes œuvres sont en grand nombre, ô Éternel!
  - type: text
    content: Tu les as toutes faites avec sagesse.
  - type: text
    content: La terre est remplie de tes biens.
  '25':
  - type: text
    content: 'Voici la grande et vaste mer:'
  - type: text
    content: Là se meuvent sans nombre
  - type: text
    content: Des animaux petits et grands;
  '26':
  - type: text
    content: Là se promènent les navires,
  - type: text
    content: Et ce léviathan que tu as formé pour se jouer dans les flots.
  '27':
  - type: text
    content: 'Tous ces animaux '
  - type: note
    content: Ps 145:15.
  - type: text
    content: espèrent en toi,
  - type: text
    content: Pour que tu leur donnes la nourriture en son temps.
  '28':
  - type: text
    content: Tu la leur donnes, et ils la recueillent;
  - type: text
    content: Tu ouvres ta main, et ils se rassasient de biens.
  '29':
  - type: text
    content: ' '
  - type: note
    content: Ps 30:8.
  - type: text
    content: 'Tu caches ta face: ils sont tremblants;'
  - type: text
    content: 'Tu leur retires le souffle: ils expirent,'
  - type: text
    content: Et retournent dans leur poussière.
  '3':
  - type: text
    content: Il forme avec les eaux le faîte de sa demeure;
  - type: text
    content: Il prend les nuées pour son char,
  - type: note
    content: Ps 18:11. És 19:1. Ap 14:14.
  - type: text
    content: Il s’avance sur les ailes du vent.
  '30':
  - type: text
    content: 'Tu envoies ton souffle: ils sont créés,'
  - type: text
    content: Et tu renouvelles la face de la terre.
  '31':
  - type: text
    content: Que la gloire de l’Éternel subsiste à jamais!
  - type: text
    content: Que l’Éternel se réjouisse de ses œuvres!
  '32':
  - type: text
    content: Il regarde la terre, et elle tremble;
  - type: text
    content: Il touche les montagnes, et elles sont fumantes.
  '33':
  - type: text
    content: ' '
  - type: note
    content: Ps 63:5; 146:2.
  - type: text
    content: Je chanterai l’Éternel tant que je vivrai,
  - type: text
    content: Je célébrerai mon Dieu tant que j’existerai.
  '34':
  - type: text
    content: Que mes paroles lui soient agréables!
  - type: text
    content: Je veux me réjouir en l’Éternel.
  '35':
  - type: text
    content: Que les pécheurs disparaissent de la terre,
  - type: text
    content: Et que les méchants ne soient plus!
  - type: text
    content: Mon âme, bénis l’Éternel!
  - type: text
    content: Louez l’Éternel!
  '4':
  - type: text
    content: ' '
  - type: note
    content: Hé 1:7.
  - type: text
    content: Il fait des vents ses messagers,
  - type: text
    content: Des flammes de feu ses serviteurs.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Job 26:7; 38:4, 5, 6. Ps 24:2; 78:69.
  - type: text
    content: Il a établi la terre sur ses fondements,
  - type: text
    content: Elle ne sera jamais ébranlée.
  '6':
  - type: text
    content: Tu l’avais couverte de l’abîme comme d’un vêtement,
  - type: text
    content: Les eaux s’arrêtaient sur les montagnes;
  '7':
  - type: text
    content: Elles ont fui devant ta menace,
  - type: text
    content: Elles se sont précipitées à la voix de ton tonnerre.
  '8':
  - type: text
    content: Des montagnes se sont élevées, des vallées se sont abaissées,
  - type: text
    content: Au lieu que tu leur avais fixé.
  '9':
  - type: text
    content: Tu as posé une limite que les eaux ne doivent point franchir,
  - type: text
    content: Afin qu’elles ne reviennent plus couvrir la terre.
