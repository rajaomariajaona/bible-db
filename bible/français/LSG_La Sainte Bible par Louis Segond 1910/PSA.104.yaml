      metadata:
        usfm: PSA.146.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: l’Éternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Éternel, mon Dieu, tu es infiniment grand!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu es revêtu d’éclat et de magnificence!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Il s’enveloppe de lumière comme d’un manteau;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 1:6
      metadata:
        usfm: GEN.1.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 26:7
      metadata:
        usfm: JOB.26.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il étend les cieux comme un pavillon.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Il forme avec les eaux le faîte de sa demeure;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il prend les nuées pour son char,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 18:11
      metadata:
        usfm: PSA.18.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 19:1
      metadata:
        usfm: ISA.19.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 14:14
      metadata:
        usfm: REV.14.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il s’avance sur les ailes du vent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 1:7
      metadata:
        usfm: HEB.1.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il fait des vents ses messagers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Des flammes de feu ses serviteurs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 26:7
      metadata:
        usfm: JOB.26.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 38:4
      metadata:
        usfm: JOB.38.4
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '5'
      metadata:
        usfm: JOB.38.5
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '6'
      metadata:
        usfm: JOB.38.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 24:2
      metadata:
        usfm: PSA.24.2
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 78:69
      metadata:
        usfm: PSA.78.69
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il a établi la terre sur ses fondements,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle ne sera jamais ébranlée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tu l’avais couverte de l’abîme comme d’un vêtement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les eaux s’arrêtaient sur les montagnes;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Elles ont fui devant ta menace,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elles se sont précipitées à la voix de ton tonnerre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Des montagnes se sont élevées, des vallées se sont abaissées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au lieu que tu leur avais fixé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tu as posé une limite que les eaux ne doivent point franchir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afin qu’elles ne reviennent plus couvrir la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Il conduit les sources dans des torrents
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui coulent entre les montagnes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Elles abreuvent tous les animaux des champs;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les ânes sauvages y étanchent leur soif.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Les oiseaux du ciel habitent sur leurs bords,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et font résonner leur voix parmi les rameaux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: De sa haute demeure, il arrose les montagnes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: La terre est rassasiée du fruit de tes œuvres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Il fait germer l’herbe pour le bétail,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les plantes pour les besoins de l’homme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afin que la terre produise de la nourriture,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Le vin qui réjouit le cœur de l’homme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et fait plus que l’huile resplendir son visage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le pain qui soutient le cœur de l’homme.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Les arbres de l’Éternel se rassasient,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les cèdres du Liban, qu’il a plantés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: C’est là que les oiseaux font leurs nids;
- type: usfm
  marker: q1
  children:
  - type: text
    text: La cigogne a sa demeure dans les cyprès,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Les montagnes élevées sont pour les boucs sauvages,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les rochers servent de retraite aux damans.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Il a fait la lune pour marquer les temps;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le soleil sait quand il doit se coucher.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tu amènes les ténèbres, et il est nuit:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Alors tous les animaux des forêts sont en mouvement;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 39:1
      metadata:
        usfm: JOB.39.1
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '2'
      metadata:
        usfm: JOB.39.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 31:4
      metadata:
        usfm: ISA.31.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Les lionceaux rugissent après la proie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et demandent à Dieu leur nourriture.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Le soleil se lève: ils se retirent,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et se couchent dans leurs tanières.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: L’homme sort pour se rendre à son ouvrage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et à son travail, jusqu’au soir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Que tes œuvres sont en grand nombre, ô Éternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu les as toutes faites avec sagesse.
- type: usfm
  marker: q1
  children:
  - type: text
    text: La terre est remplie de tes biens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Voici la grande et vaste mer:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Là se meuvent sans nombre
- type: usfm
  marker: q1
  children:
  - type: text
    text: Des animaux petits et grands;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Là se promènent les navires,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ce léviathan que tu as formé pour se jouer dans les flots.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Tous ces animaux '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 145:15
      metadata:
        usfm: PSA.145.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: espèrent en toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour que tu leur donnes la nourriture en son temps.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Tu la leur donnes, et ils la recueillent;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu ouvres ta main, et ils se rassasient de biens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 30:8
      metadata:
        usfm: PSA.30.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu caches ta face: ils sont tremblants;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tu leur retires le souffle: ils expirent,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et retournent dans leur poussière.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Tu envoies ton souffle: ils sont créés,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tu renouvelles la face de la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Que la gloire de l’Éternel subsiste à jamais!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que l’Éternel se réjouisse de ses œuvres!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Il regarde la terre, et elle tremble;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il touche les montagnes, et elles sont fumantes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 63:5
      metadata:
        usfm: PSA.63.5
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 146:2
      metadata:
        usfm: PSA.146.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Je chanterai l’Éternel tant que je vivrai,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je célébrerai mon Dieu tant que j’existerai.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Que mes paroles lui soient agréables!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je veux me réjouir en l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Que les pécheurs disparaissent de la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que les méchants ne soient plus!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon âme, bénis l’Éternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Louez l’Éternel!
