document_id: PSA.104,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: (Ge 1. Ap 4:11.) (Ps 148; 8; 19:1-7; 147.)
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mon âme, bénis '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 103:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 146:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: l’Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Éternel, mon Dieu, tu es infiniment grand!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu es revêtu d’éclat et de magnificence!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il conduit les sources dans des torrents
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui coulent entre les montagnes.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles abreuvent tous les animaux des champs;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les ânes sauvages y étanchent leur soif.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les oiseaux du ciel habitent sur leurs bords,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et font résonner leur voix parmi les rameaux.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De sa haute demeure, il arrose les montagnes;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La terre est rassasiée du fruit de tes œuvres.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il fait germer l’herbe pour le bétail,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les plantes pour les besoins de l’homme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afin que la terre produise de la nourriture,
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le vin qui réjouit le cœur de l’homme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et fait plus que l’huile resplendir son visage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le pain qui soutient le cœur de l’homme.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les arbres de l’Éternel se rassasient,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les cèdres du Liban, qu’il a plantés.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est là que les oiseaux font leurs nids;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La cigogne a sa demeure dans les cyprès,
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les montagnes élevées sont pour les boucs sauvages,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les rochers servent de retraite aux damans.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a fait la lune pour marquer les temps;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le soleil sait quand il doit se coucher.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il s’enveloppe de lumière comme d’un manteau;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 1:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 26:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il étend les cieux comme un pavillon.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tu amènes les ténèbres, et il est nuit:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors tous les animaux des forêts sont en mouvement;
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 39:1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 31:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Les lionceaux rugissent après la proie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et demandent à Dieu leur nourriture.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Le soleil se lève: ils se retirent,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et se couchent dans leurs tanières.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’homme sort pour se rendre à son ouvrage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et à son travail, jusqu’au soir.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que tes œuvres sont en grand nombre, ô Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu les as toutes faites avec sagesse.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La terre est remplie de tes biens.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici la grande et vaste mer:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Là se meuvent sans nombre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des animaux petits et grands;
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Là se promènent les navires,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ce léviathan que tu as formé pour se jouer dans les flots.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tous ces animaux '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 145:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: espèrent en toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour que tu leur donnes la nourriture en son temps.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu la leur donnes, et ils la recueillent;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu ouvres ta main, et ils se rassasient de biens.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 30:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Tu caches ta face: ils sont tremblants;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tu leur retires le souffle: ils expirent,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et retournent dans leur poussière.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il forme avec les eaux le faîte de sa demeure;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il prend les nuées pour son char,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 18:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 19:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 14:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il s’avance sur les ailes du vent.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tu envoies ton souffle: ils sont créés,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tu renouvelles la face de la terre.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que la gloire de l’Éternel subsiste à jamais!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que l’Éternel se réjouisse de ses œuvres!
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il regarde la terre, et elle tremble;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il touche les montagnes, et elles sont fumantes.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 63:5
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 146:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Je chanterai l’Éternel tant que je vivrai,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je célébrerai mon Dieu tant que j’existerai.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que mes paroles lui soient agréables!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je veux me réjouir en l’Éternel.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que les pécheurs disparaissent de la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que les méchants ne soient plus!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon âme, bénis l’Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Louez l’Éternel!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 1:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il fait des vents ses messagers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des flammes de feu ses serviteurs.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 26:7
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 38:4
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '5'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 24:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 78:69
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il a établi la terre sur ses fondements,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle ne sera jamais ébranlée.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu l’avais couverte de l’abîme comme d’un vêtement,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les eaux s’arrêtaient sur les montagnes;
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles ont fui devant ta menace,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles se sont précipitées à la voix de ton tonnerre.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des montagnes se sont élevées, des vallées se sont abaissées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au lieu que tu leur avais fixé.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as posé une limite que les eaux ne doivent point franchir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afin qu’elles ne reviennent plus couvrir la terre.
