document_id: MAT.10,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-15: cf. (Mc 3:13-19; 6:7-11. Lu 6:12-16; 9:1-5.) Lu 10:1-12. Ac 1:13.'
  - type: text
    content: ' '
  - type: note
    content: Mc 3:13. Lu 6:13; 9:1.
  - type: text
    content: 'Puis, ayant appelé ses douze disciples, il leur donna le pouvoir de chasser les esprits impurs, et de guérir toute maladie et toute infirmité. '
  '10':
  - type: text
    content: ni sac pour le voyage, ni deux tuniques, ni souliers, ni bâton;
  - type: text
    content: ' '
  - type: note
    content: Lé 19:13. De 24:14; 25:4. Lu 10:7. 1 Co 9:4, 14. 1 Ti 5:18.
  - type: text
    content: car l’ouvrier mérite sa nourriture.
  - type: text
    content: ' '
  '11':
  - type: note
    content: Mc 6:10. Lu 9:4; 10:8.
  - type: text
    content: Dans quelque ville ou village que vous entriez, informez-vous s’il s’y trouve quelque homme digne de vous recevoir; et demeurez chez lui jusqu’à ce que vous partiez.
  - type: text
    content: ' '
  '12':
  - type: text
    content: En entrant dans la maison, saluez-la;
  - type: text
    content: ' '
  '13':
  - type: text
    content: et, si la maison en est digne, que votre paix vienne sur elle; mais si elle n’en est pas digne, que votre paix retourne à vous.
  - type: text
    content: ' '
  '14':
  - type: note
    content: Mc 6:11. Lu 9:5.
  - type: text
    content: Lorsqu’on ne vous recevra pas et qu’on n’écoutera pas vos paroles, sortez de cette maison ou de cette ville et
  - type: text
    content: ' '
  - type: note
    content: Ac 13:51; 18:6.
  - type: text
    content: secouez la poussière de vos pieds.
  - type: text
    content: ' '
  '15':
  - type: note
    content: Mc 6:11. Lu 10:12.
  - type: text
    content: 'Je vous le dis en vérité: au jour du jugement, le pays de Sodome et de Gomorrhe sera traité moins rigoureusement que cette ville-là.'
  - type: heading
    content: 'V. 16-39: cf. Lu 12:4-12, 51-53; 14:26-33; 21:12-17.'
  '16':
  - type: text
    content: ' '
  - type: note
    content: Lu 10:3.
  - type: text
    content: Voici, je vous envoie comme des brebis au milieu des loups. Soyez donc prudents comme les serpents, et simples comme les colombes.
  - type: text
    content: ' '
  '17':
  - type: text
    content: Mettez-vous en garde contre les hommes;
  - type: text
    content: ' '
  - type: note
    content: Mt 24:9. Lu 21:12. Jn 15:20; 16:2. Ap 2:10.
  - type: text
    content: car ils vous livreront aux tribunaux, et ils vous battront de verges dans leurs synagogues;
  - type: text
    content: ' '
  '18':
  - type: note
    content: Ac 24:1; 25:4.
  - type: text
    content: vous serez menés, à cause de moi, devant des gouverneurs et devant des rois, pour servir de témoignage à eux et aux païens.
  - type: text
    content: ' '
  '19':
  - type: note
    content: Mc 13:11. Lu 12:11; 21:14.
  - type: text
    content: 'Mais, quand on vous livrera, ne vous inquiétez ni de la manière dont vous parlerez ni de ce que vous direz: ce que vous aurez à dire vous sera donné à l’heure même;'
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Voici les noms des douze apôtres. Le premier, Simon appelé Pierre, et André, son frère; Jacques, fils de Zébédée, et Jean, son frère; '
  '20':
  - type: text
    content: car ce n’est pas vous qui parlerez, c’est l’Esprit de votre Père qui parlera en vous.
  - type: text
    content: ' '
  '21':
  - type: note
    content: Mi 7:2, 5. Lu 21:16.
  - type: text
    content: Le frère livrera son frère à la mort, et le père son enfant; les enfants se soulèveront contre leurs parents, et les feront mourir.
  - type: text
    content: ' '
  '22':
  - type: text
    content: Vous serez haïs de tous, à cause de mon nom;
  - type: text
    content: ' '
  - type: note
    content: Mt 24:13. Mc 13:13. Lu 21:19. Ap 2:10; 3:10.
  - type: text
    content: mais celui qui persévérera jusqu’à la fin sera sauvé.
  - type: text
    content: ' '
  '23':
  - type: note
    content: Mt 2:13; 4:12; 12:15. Ac 8:1; 9:25; 14:6.
  - type: text
    content: Quand on vous persécutera dans une ville, fuyez dans une autre. Je vous le dis en vérité, vous n’aurez pas achevé de parcourir les villes d’Israël que le Fils de l’homme sera venu.
  - type: text
    content: ' '
  '24':
  - type: note
    content: Lu 6:40. Jn 13:16; 15:20.
  - type: text
    content: Le disciple n’est pas plus que le maître, ni le serviteur plus que son seigneur.
  - type: text
    content: ' '
  '25':
  - type: text
    content: Il suffit au disciple d’être traité comme son maître, et au serviteur comme son seigneur.
  - type: text
    content: ' '
  - type: note
    content: Mt 9:34; 12:24. Mc 3:22. Lu 11:15. Jn 8:48.
  - type: text
    content: S’ils ont appelé le maître de la maison Béelzébul, à combien plus forte raison appelleront-ils ainsi les gens de sa maison!
  - type: text
    content: ' '
  '26':
  - type: note
    content: És 8:12. Jé 1:8.
  - type: text
    content: Ne les craignez donc point;
  - type: text
    content: ' '
  - type: note
    content: Job 12:22. Mc 4:22. Lu 8:17; 12:2.
  - type: text
    content: car il n’y a rien de caché qui ne doive être découvert, ni de secret qui ne doive être connu.
  - type: text
    content: ' '
  '27':
  - type: text
    content: Ce que je vous dis dans les ténèbres, dites-le en plein jour; et ce qui vous est dit à l’oreille, prêchez-le sur les toits.
  - type: text
    content: ' '
  '28':
  - type: note
    content: Jé 1:8. Lu 12:4.
  - type: text
    content: Ne craignez pas ceux qui tuent le corps et qui ne peuvent tuer l’âme; craignez plutôt celui qui peut faire périr l’âme et le corps dans la géhenne.
  - type: text
    content: ' '
  '29':
  - type: text
    content: Ne vend-on pas deux passereaux pour un sou? Cependant, il n’en tombe pas un à terre sans la volonté de votre Père.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Philippe, et Barthélemy; Thomas, et Matthieu, le publicain; Jacques, fils d’Alphée, et Thaddée; '
  '30':
  - type: text
    content: Et même les
  - type: text
    content: ' '
  - type: note
    content: 1 S 14:45.
  - type: text
    content: cheveux de votre tête sont tous comptés.
  - type: text
    content: ' '
  '31':
  - type: text
    content: 'Ne craignez donc point: vous valez plus que beaucoup de passereaux.'
  - type: text
    content: ' '
  '32':
  - type: note
    content: Mc 8:38. Lu 9:26; 12:8. 2 Ti 2:12.
  - type: text
    content: C’est pourquoi, quiconque me confessera devant les hommes, je le confesserai aussi devant mon Père qui est dans les cieux;
  - type: text
    content: ' '
  '33':
  - type: text
    content: mais quiconque me reniera devant les hommes, je le renierai aussi devant mon Père qui est dans les cieux.
  - type: text
    content: ' '
  '34':
  - type: note
    content: Lu 12:51.
  - type: text
    content: Ne croyez pas que je sois venu apporter la paix sur la terre; je ne suis pas venu apporter la paix, mais l’épée.
  - type: text
    content: ' '
  '35':
  - type: note
    content: Mi 7:6.
  - type: text
    content: Car je suis venu mettre la division entre l’homme et son père, entre la fille et sa mère, entre la belle-fille et sa belle-mère;
  - type: text
    content: ' '
  '36':
  - type: note
    content: Ps 41:10; 55:13. Jn 13:18.
  - type: text
    content: et l’homme aura pour ennemis les gens de sa maison.
  - type: text
    content: ' '
  '37':
  - type: note
    content: Lu 14:26.
  - type: text
    content: Celui qui aime son père ou sa mère plus que moi n’est pas digne de moi, et celui qui aime son fils ou sa fille plus que moi n’est pas digne de moi;
  - type: text
    content: ' '
  '38':
  - type: note
    content: Mt 16:24. Mc 8:34. Lu 9:23; 14:27.
  - type: text
    content: celui qui ne prend pas sa croix, et ne me suit pas, n’est pas digne de moi.
  - type: text
    content: ' '
  '39':
  - type: note
    content: Mt 16:25. Mc 8:35. Lu 9:24; 17:33. Jn 12:25.
  - type: text
    content: Celui qui conservera sa vie la perdra, et celui qui perdra sa vie à cause de moi la retrouvera.
  - type: heading
    content: '10 v. 40 à 11 v. 1: cf. Mt 25:34-40.'
  '4':
  - type: text
    content: 'Simon le Cananite, et Judas l’Iscariot, celui qui livra Jésus. '
  '40':
  - type: text
    content: ' '
  - type: note
    content: Lu 10:16. Jn 13:20.
  - type: text
    content: Celui qui vous reçoit me reçoit, et celui qui me reçoit, reçoit celui qui m’a envoyé.
  - type: text
    content: ' '
  '41':
  - type: note
    content: 1 R 17:10; 18:4. 2 R 4:8.
  - type: text
    content: Celui qui reçoit un prophète en qualité de prophète recevra une récompense de prophète, et celui qui reçoit un juste en qualité de juste recevra une récompense de juste.
  - type: text
    content: ' '
  '42':
  - type: note
    content: Mt 25:40. Mc 9:41. Hé 6:10.
  - type: text
    content: Et quiconque donnera seulement un verre d’eau froide à l’un de ces petits parce qu’il est mon disciple, je vous le dis en vérité, il ne perdra point sa récompense.
  '5':
  - type: text
    content: 'Tels sont les douze que Jésus envoya, après leur avoir donné les instructions suivantes: '
  - type: text
    content: N’allez pas vers les païens, et n’entrez pas dans les villes des Samaritains;
  '6':
  - type: text
    content: ' '
  - type: note
    content: Ac 3:26; 13:26, 46.
  - type: text
    content: allez plutôt vers les brebis perdues de la maison d’Israël.
  - type: text
    content: ' '
  '7':
  - type: text
    content: Allez,
  - type: text
    content: ' '
  - type: note
    content: Lu 9:2.
  - type: text
    content: 'prêchez, et dites: Le royaume des cieux est proche.'
  - type: text
    content: ' '
  '8':
  - type: note
    content: Lu 10:9.
  - type: text
    content: Guérissez les malades, ressuscitez les morts, purifiez les lépreux, chassez les démons.
  - type: text
    content: ' '
  - type: note
    content: Ac 8:18, 20.
  - type: text
    content: Vous avez reçu gratuitement, donnez gratuitement.
  - type: text
    content: ' '
  '9':
  - type: note
    content: Mc 6:8. Lu 9:3; 22:35.
  - type: text
    content: Ne prenez ni or, ni argent, ni monnaie, dans vos ceintures;
  - type: text
    content: ' '
