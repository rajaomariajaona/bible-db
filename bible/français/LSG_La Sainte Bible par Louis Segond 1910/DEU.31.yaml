document_id: DEU.31
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: DERNIÈRES PAROLES DE MOÏSE
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: Ch. 31 à 34. Jn 14 à 17.
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Josué successeur de Moïse
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-8: cf. (De 3:21-28. Jos 1:1-9.) (1 Co 16:13. Hé 13:20, 21.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Moïse adressa encore ces paroles à tout Israël: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Aujourd’hui, leur dit-il, je suis âgé de cent vingt ans, je ne pourrai plus sortir et entrer, et l’Éternel m’a dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 27:12
      metadata:
        usfm: NUM.27.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 3:26
      metadata:
        usfm: DEU.3.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu ne passeras pas ce Jourdain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'L’Éternel, ton Dieu, marchera lui-même devant toi, il détruira ces nations devant toi, et tu t’en rendras maître. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 27:18
      metadata:
        usfm: NUM.27.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Josué marchera aussi devant toi, comme l’Éternel l’a dit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'L’Éternel traitera ces nations comme il a traité '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 21:24
      metadata:
        usfm: NUM.21.24
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '33'
      metadata:
        usfm: NUM.21.33
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Sihon et Og, rois des Amoréens, qu’il a détruits avec leur pays. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'L’Éternel vous les livrera, et vous agirez à leur égard selon tous les ordres '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 7:1
      metadata:
        usfm: DEU.7.1
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '2'
      metadata:
        usfm: DEU.7.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'que je vous ai donnés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fortifiez-vous et ayez du courage! Ne craignez point et ne soyez point effrayés devant eux; car l’Éternel, ton Dieu, marchera lui-même avec toi, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 1:5
      metadata:
        usfm: JOS.1.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 13:5
      metadata:
        usfm: HEB.13.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'il ne te délaissera point, il ne t’abandonnera point. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Moïse appela Josué, et lui dit en présence de tout Israël: Fortifie-toi et prends courage, car tu entreras avec ce peuple dans le pays que l’Éternel a juré à leurs pères de leur donner, et c’est toi qui les en mettras en possession. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'L’Éternel marchera lui-même devant toi, il sera lui-même avec toi, il ne te délaissera point, il ne t’abandonnera point; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 1:9
      metadata:
        usfm: JOS.1.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: ne crains point, et ne t’effraie point.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ordre de lire la loi tous les sept ans
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 9-13: cf. (2 Ch 34:29-32. Né 8:1-8.) Ac 2:39.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Moïse écrivit cette loi, et il la remit aux sacrificateurs, fils de Lévi, qui portaient l’arche de l’alliance de l’Éternel, et à tous les anciens d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Moïse leur donna cet ordre: Tous les sept ans, à l’époque de l’année du relâche, à la fête des tabernacles, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'quand tout Israël viendra se présenter devant l’Éternel, ton Dieu, dans le lieu qu’il choisira, tu liras cette loi devant tout Israël, en leur présence. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tu rassembleras le peuple, les hommes, les femmes, les enfants, et l’étranger qui sera dans tes portes, afin qu’ils t’entendent, et afin qu’ils apprennent à craindre l’Éternel, votre Dieu, à observer et à mettre en pratique toutes les paroles de cette loi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Et leurs enfants qui ne la connaîtront pas l’entendront, et ils apprendront à craindre l’Éternel, votre Dieu, tout le temps que vous vivrez dans le pays dont vous prendrez possession, après avoir passé le Jourdain.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Violation future de l’alliance
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 14-30: cf. (No 27:18-23. De 34:9.) Da 9:5-14. De 32. (Ac 20:25-31. 2 Pi 1:12-15.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'L’Éternel dit à Moïse: Voici, le moment approche où tu vas mourir. Appelle Josué, et présentez-vous dans la tente d’assignation. Je lui donnerai mes ordres. Moïse et Josué allèrent se présenter dans la tente d’assignation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Et l’Éternel apparut dans la tente dans une colonne de nuée; et la colonne de nuée s’arrêta à l’entrée de la tente. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'L’Éternel dit à Moïse: Voici, tu vas être couché avec tes pères. Et ce peuple se lèvera, et se prostituera après les dieux étrangers du pays au milieu duquel il entre. Il m’abandonnera, et il violera mon alliance, que j’ai traitée avec lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'En ce jour-là, ma colère s’enflammera contre lui. Je les abandonnerai, et je leur cacherai ma face. Il sera dévoré, il sera la proie d’une multitude de maux et d’afflictions, et alors il dira: N’est-ce point parce que mon Dieu n’est pas au milieu de moi que ces maux m’ont atteint? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Et moi, je cacherai ma face en ce jour-là, à cause de tout le mal qu’il aura fait, en se tournant vers d’autres dieux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Maintenant, écrivez ce cantique. Enseigne-le aux enfants d’Israël, mets-le dans leur bouche, et que ce cantique me serve de témoin contre les enfants d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Car je mènerai ce peuple dans le pays que j’ai juré à ses pères de lui donner, pays où coulent le lait et le miel; il mangera, se rassasiera, s’engraissera; puis il se tournera vers d’autres dieux et les servira, il me méprisera et violera mon alliance; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'quand alors il sera atteint par une multitude de maux et d’afflictions, ce cantique, qui ne sera point oublié et que la postérité aura dans la bouche, déposera comme témoin contre ce peuple. Je connais, en effet, ses dispositions, qui déjà se manifestent aujourd’hui, avant même que je l’aie fait entrer dans le pays que j’ai juré de lui donner. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'En ce jour-là, Moïse écrivit ce cantique, et il l’enseigna aux enfants d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'L’Éternel donna ses ordres à Josué, fils de Nun. Il dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 1:6
      metadata:
        usfm: JOS.1.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Fortifie-toi et prends courage, car c’est toi qui feras entrer les enfants d’Israël dans le pays que j’ai juré de leur donner; et je serai moi-même avec toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Lorsque Moïse eut complètement achevé d’écrire dans un livre les paroles de cette loi, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'il donna cet ordre aux Lévites qui portaient l’arche de l’alliance de l’Éternel: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Prenez ce '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 22:8
      metadata:
        usfm: 2KI.22.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'livre de la loi, et mettez-le à côté de l’arche de l’alliance de l’Éternel, votre Dieu, et il sera là comme témoin contre toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Car je connais ton esprit de rébellion et la roideur de ton cou. Si vous êtes rebelles contre l’Éternel pendant que je suis encore vivant au milieu de vous, combien plus le serez-vous après ma mort! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Assemblez devant moi tous les anciens de vos tribus et vos officiers; je dirai ces paroles en leur présence, et je prendrai à témoin contre eux le ciel et la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Car je sais qu’après ma mort vous vous corromprez, et que vous vous détournerez de la voie que je vous ai prescrite; et le malheur finira par vous atteindre, quand vous ferez ce qui est mal aux yeux de l’Éternel, au point de l’irriter par l’œuvre de vos mains. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Moïse prononça dans leur entier les paroles de ce cantique, en présence de toute l’assemblée d’Israël:'
