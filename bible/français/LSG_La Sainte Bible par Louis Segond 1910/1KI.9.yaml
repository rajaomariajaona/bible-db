document_id: 1KI.9
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-9: cf. 2 Ch 7:11-22. (Ge 17:1-8. De 29:22-28.) (Mt 24:2.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 7:11
      metadata:
        usfm: 2CH.7.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Lorsque Salomon eut achevé de bâtir la maison de l’Éternel, la maison du roi, et tout ce qu’il lui plut de faire, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'l’Éternel apparut à Salomon une seconde fois, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 3:5
      metadata:
        usfm: 1KI.3.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'comme il lui était apparu à Gabaon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Et l’Éternel lui dit: J’exauce ta prière et ta supplication que tu m’as adressées, je sanctifie cette maison que tu as bâtie '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 12:11
      metadata:
        usfm: DEU.12.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 8:29
      metadata:
        usfm: 1KI.8.29
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'pour y mettre à jamais mon nom, et j’aurai toujours là mes yeux et mon cœur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Et toi, si tu marches en ma présence comme a marché David, ton père, avec sincérité de cœur et avec droiture, faisant tout ce que je t’ai commandé, si tu observes mes lois et mes ordonnances, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'j’établirai pour toujours le trône de ton royaume en Israël, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 S 7:12
      metadata:
        usfm: 2SA.7.12
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '16'
      metadata:
        usfm: 2SA.7.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 6:12
      metadata:
        usfm: 1KI.6.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 22:10
      metadata:
        usfm: 1CH.22.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 132:12
      metadata:
        usfm: PSA.132.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'comme je l’ai déclaré à David, ton père, en disant: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 2:4
      metadata:
        usfm: 1KI.2.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu ne manqueras jamais d’un successeur sur le trône d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Mais '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 S 7:14
      metadata:
        usfm: 2SA.7.14
    - type: text
      text: . Ps 89:30, 31, etc.
    marker-yv: yv-n
  - type: text
    text: 'si vous vous détournez de moi, vous et vos fils, si vous n’observez pas mes commandements, mes lois que je vous ai prescrites, et si vous allez servir d’autres dieux et vous prosterner devant eux, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'j’exterminerai Israël du pays que je lui ai donné, je rejetterai loin de moi la maison que '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 7:15
      metadata:
        usfm: JER.7.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'j’ai consacrée à mon nom, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 28:37
      metadata:
        usfm: DEU.28.37
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et Israël sera un sujet de sarcasme et de raillerie parmi tous les peuples. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 7:21
      metadata:
        usfm: 2CH.7.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Et si haut placée qu’ait été cette maison, quiconque passera près d’elle sera dans l’étonnement et sifflera. On dira: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 29:24
      metadata:
        usfm: DEU.29.24
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 22:8
      metadata:
        usfm: JER.22.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Pourquoi l’Éternel a-t-il ainsi traité ce pays et cette maison? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Et l’on répondra: Parce qu’ils ont abandonné l’Éternel, leur Dieu, qui a fait sortir leurs pères du pays d’Égypte, parce qu’ils se sont attachés à d’autres dieux, se sont prosternés devant eux et les ont servis; voilà pourquoi l’Éternel a fait venir sur eux tous ces maux.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Villes bâties par Salomon. Navires envoyés à Ophir
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 10-28: cf. 2 Ch 8. Ec 2:2-10.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 8:1
      metadata:
        usfm: 2CH.8.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Au bout de vingt ans, Salomon avait bâti les deux maisons, la maison de l’Éternel et la maison du roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Alors, comme Hiram, roi de Tyr, avait fourni à Salomon des bois de cèdre et des bois de cyprès, et de l’or, autant qu’il en voulut, le roi Salomon donna à Hiram vingt villes dans le pays de Galilée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Hiram sortit de Tyr, pour voir les villes que lui donnait Salomon. Mais elles ne lui plurent point, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'et il dit: Quelles villes m’as-tu données là, mon frère? Et il les appela pays de Cabul, nom qu’elles ont conservé jusqu’à ce jour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Hiram avait envoyé au roi cent vingt talents d’or. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Voici ce qui concerne les hommes de corvée que leva le roi Salomon pour bâtir la maison de l’Éternel et sa propre maison, Millo, et le mur de Jérusalem, Hatsor, Meguiddo et Guézer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Pharaon, roi d’Égypte, était venu s’emparer de Guézer, l’avait incendiée, et avait tué les Cananéens qui habitaient dans la ville. Puis il l’avait donnée pour dot à sa fille, femme de Salomon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Et Salomon bâtit Guézer, Beth-Horon la basse, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Ch 8:6, etc.
    marker-yv: yv-n
  - type: text
    text: 'Baalath, et Thadmor, au désert dans le pays, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'toutes les villes servant de magasins et lui appartenant, les villes pour les chars, les villes pour la cavalerie, et tout ce qu’il plut à Salomon de bâtir à Jérusalem, au Liban, et dans tout le pays dont il était le souverain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tout le peuple qui était resté des Amoréens, des Héthiens, des Phéréziens, des Héviens et des Jébusiens, ne faisant point partie des enfants d’Israël, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'leurs descendants qui étaient restés après eux dans le pays et que les enfants d’Israël n’avaient pu dévouer par interdit, Salomon les leva comme esclaves de corvée, ce qu’ils ont été jusqu’à ce jour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Mais Salomon '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 25:39
      metadata:
        usfm: LEV.25.39
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'n’employa point comme esclaves les enfants d’Israël; car ils étaient des hommes de guerre, ses serviteurs, ses chefs, ses officiers, les commandants de ses chars et de sa cavalerie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Les chefs préposés par Salomon sur les travaux étaient au nombre de cinq cent cinquante, chargés de surveiller les ouvriers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 8:11
      metadata:
        usfm: 2CH.8.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'La fille de Pharaon monta de la cité de David dans sa maison que Salomon lui avait construite. Ce fut alors qu’il bâtit Millo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Salomon offrit trois fois dans l’année des holocaustes et des sacrifices d’actions de grâces sur l’autel qu’il avait bâti à l’Éternel, et il brûla des parfums sur celui qui était devant l’Éternel. Et il acheva la maison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Le roi Salomon construisit des navires à Étsjon-Guéber, près d’Éloth, sur les bords de la mer Rouge, dans le pays d’Édom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Et Hiram envoya sur ces navires, auprès des serviteurs de Salomon, ses propres serviteurs, des matelots connaissant la mer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ils allèrent à Ophir, et ils y prirent de l’or, quatre cent vingt talents, qu’ils apportèrent au roi Salomon.
