document_id: 1KI.9,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-9: cf. 2 Ch 7:11-22. (Ge 17:1-8. De 29:22-28.) (Mt 24:2.)'
  - type: text
    content: ' '
  - type: note
    content: 2 Ch 7:11.
  - type: text
    content: 'Lorsque Salomon eut achevé de bâtir la maison de l’Éternel, la maison du roi, et tout ce qu’il lui plut de faire, '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 2 Ch 8:1.
  - type: text
    content: 'Au bout de vingt ans, Salomon avait bâti les deux maisons, la maison de l’Éternel et la maison du roi. '
  '11':
  - type: text
    content: 'Alors, comme Hiram, roi de Tyr, avait fourni à Salomon des bois de cèdre et des bois de cyprès, et de l’or, autant qu’il en voulut, le roi Salomon donna à Hiram vingt villes dans le pays de Galilée. '
  '12':
  - type: text
    content: 'Hiram sortit de Tyr, pour voir les villes que lui donnait Salomon. Mais elles ne lui plurent point, '
  '13':
  - type: text
    content: 'et il dit: Quelles villes m’as-tu données là, mon frère? Et il les appela pays de Cabul, nom qu’elles ont conservé jusqu’à ce jour. '
  '14':
  - type: text
    content: 'Hiram avait envoyé au roi cent vingt talents d’or. '
  '15':
  - type: text
    content: 'Voici ce qui concerne les hommes de corvée que leva le roi Salomon pour bâtir la maison de l’Éternel et sa propre maison, Millo, et le mur de Jérusalem, Hatsor, Meguiddo et Guézer. '
  '16':
  - type: text
    content: 'Pharaon, roi d’Égypte, était venu s’emparer de Guézer, l’avait incendiée, et avait tué les Cananéens qui habitaient dans la ville. Puis il l’avait donnée pour dot à sa fille, femme de Salomon. '
  '17':
  - type: text
    content: 'Et Salomon bâtit Guézer, Beth-Horon la basse, '
  '18':
  - type: note
    content: 2 Ch 8:6, etc.
  - type: text
    content: 'Baalath, et Thadmor, au désert dans le pays, '
  '19':
  - type: text
    content: 'toutes les villes servant de magasins et lui appartenant, les villes pour les chars, les villes pour la cavalerie, et tout ce qu’il plut à Salomon de bâtir à Jérusalem, au Liban, et dans tout le pays dont il était le souverain. '
  '2':
  - type: text
    content: 'l’Éternel apparut à Salomon une seconde fois, '
  - type: note
    content: 1 R 3:5.
  - type: text
    content: 'comme il lui était apparu à Gabaon. '
  '20':
  - type: text
    content: 'Tout le peuple qui était resté des Amoréens, des Héthiens, des Phéréziens, des Héviens et des Jébusiens, ne faisant point partie des enfants d’Israël, '
  '21':
  - type: text
    content: 'leurs descendants qui étaient restés après eux dans le pays et que les enfants d’Israël n’avaient pu dévouer par interdit, Salomon les leva comme esclaves de corvée, ce qu’ils ont été jusqu’à ce jour. '
  '22':
  - type: text
    content: 'Mais Salomon '
  - type: note
    content: Lé 25:39.
  - type: text
    content: 'n’employa point comme esclaves les enfants d’Israël; car ils étaient des hommes de guerre, ses serviteurs, ses chefs, ses officiers, les commandants de ses chars et de sa cavalerie. '
  '23':
  - type: text
    content: 'Les chefs préposés par Salomon sur les travaux étaient au nombre de cinq cent cinquante, chargés de surveiller les ouvriers. '
  '24':
  - type: note
    content: 2 Ch 8:11.
  - type: text
    content: 'La fille de Pharaon monta de la cité de David dans sa maison que Salomon lui avait construite. Ce fut alors qu’il bâtit Millo. '
  '25':
  - type: text
    content: 'Salomon offrit trois fois dans l’année des holocaustes et des sacrifices d’actions de grâces sur l’autel qu’il avait bâti à l’Éternel, et il brûla des parfums sur celui qui était devant l’Éternel. Et il acheva la maison. '
  '26':
  - type: text
    content: 'Le roi Salomon construisit des navires à Étsjon-Guéber, près d’Éloth, sur les bords de la mer Rouge, dans le pays d’Édom. '
  '27':
  - type: text
    content: 'Et Hiram envoya sur ces navires, auprès des serviteurs de Salomon, ses propres serviteurs, des matelots connaissant la mer. '
  '28':
  - type: text
    content: Ils allèrent à Ophir, et ils y prirent de l’or, quatre cent vingt talents, qu’ils apportèrent au roi Salomon.
  '3':
  - type: text
    content: 'Et l’Éternel lui dit: J’exauce ta prière et ta supplication que tu m’as adressées, je sanctifie cette maison que tu as bâtie '
  - type: note
    content: De 12:11. 1 R 8:29.
  - type: text
    content: 'pour y mettre à jamais mon nom, et j’aurai toujours là mes yeux et mon cœur. '
  '4':
  - type: text
    content: 'Et toi, si tu marches en ma présence comme a marché David, ton père, avec sincérité de cœur et avec droiture, faisant tout ce que je t’ai commandé, si tu observes mes lois et mes ordonnances, '
  '5':
  - type: text
    content: 'j’établirai pour toujours le trône de ton royaume en Israël, '
  - type: note
    content: 2 S 7:12, 16. 1 R 6:12. 1 Ch 22:10. Ps 132:12.
  - type: text
    content: 'comme je l’ai déclaré à David, ton père, en disant: '
  - type: note
    content: 1 R 2:4.
  - type: text
    content: 'Tu ne manqueras jamais d’un successeur sur le trône d’Israël. '
  '6':
  - type: text
    content: 'Mais '
  - type: note
    content: 2 S 7:14. Ps 89:30, 31, etc.
  - type: text
    content: 'si vous vous détournez de moi, vous et vos fils, si vous n’observez pas mes commandements, mes lois que je vous ai prescrites, et si vous allez servir d’autres dieux et vous prosterner devant eux, '
  '7':
  - type: text
    content: 'j’exterminerai Israël du pays que je lui ai donné, je rejetterai loin de moi la maison que '
  - type: note
    content: Jé 7:15.
  - type: text
    content: 'j’ai consacrée à mon nom, '
  - type: note
    content: De 28:37.
  - type: text
    content: 'et Israël sera un sujet de sarcasme et de raillerie parmi tous les peuples. '
  '8':
  - type: note
    content: 2 Ch 7:21.
  - type: text
    content: 'Et si haut placée qu’ait été cette maison, quiconque passera près d’elle sera dans l’étonnement et sifflera. On dira: '
  - type: note
    content: De 29:24. Jé 22:8.
  - type: text
    content: 'Pourquoi l’Éternel a-t-il ainsi traité ce pays et cette maison? '
  '9':
  - type: text
    content: 'Et l’on répondra: Parce qu’ils ont abandonné l’Éternel, leur Dieu, qui a fait sortir leurs pères du pays d’Égypte, parce qu’ils se sont attachés à d’autres dieux, se sont prosternés devant eux et les ont servis; voilà pourquoi l’Éternel a fait venir sur eux tous ces maux.'
  - type: heading
    content: Villes bâties par Salomon. Navires envoyés à Ophir
  - type: heading
    content: 'V. 10-28: cf. 2 Ch 8. Ec 2:2-10.'
