document_id: ISA.7,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Prophétie contre Israël et la Syrie
  - type: heading
    content: 'V. 1-9: cf. 2 R 16:1-5. És 51:12.'
  - type: text
    content: 'Il arriva, du temps d’Achaz, fils de Jotham, fils d’Ozias, roi de Juda, '
  - type: note
    content: 2 R 16:5. 2 Ch 28:5.
  - type: text
    content: 'que Retsin, roi de Syrie, monta avec Pékach, fils de Remalia, roi d’Israël, contre Jérusalem, pour l’assiéger; mais il ne put l’assiéger. '
  '10':
  - type: text
    content: 'L’Éternel parla de nouveau à Achaz, et lui dit:'
  '11':
  - type: text
    content: Demande en ta faveur un signe à l’Éternel, ton Dieu; demande-le, soit dans les lieux bas, soit dans les lieux élevés.
  '12':
  - type: text
    content: 'Achaz répondit: Je ne demanderai rien, je ne tenterai pas l’Éternel.'
  '13':
  - type: text
    content: 'Ésaïe dit alors:'
  - type: text
    content: Écoutez donc, maison de David!
  - type: text
    content: Est-ce trop peu pour vous de lasser la patience des hommes,
  - type: text
    content: Que vous lassiez encore celle de mon Dieu?
  '14':
  - type: text
    content: C’est pourquoi le Seigneur lui-même vous donnera un signe,
  - type: note
    content: Mt 1:23. Lu 1:31.
  - type: text
    content: Voici, la jeune fille deviendra enceinte, elle enfantera un fils,
  - type: text
    content: Et elle lui donnera le nom d’Emmanuel.
  '15':
  - type: text
    content: Il mangera de la crème et du miel,
  - type: text
    content: Jusqu’à ce qu’il sache rejeter le mal et choisir le bien.
  '16':
  - type: text
    content: Mais avant que l’enfant sache rejeter le mal et choisir le bien,
  - type: text
    content: Le pays dont tu crains les deux rois sera abandonné.
  - type: heading
    content: Menaces contre Juda
  - type: heading
    content: 'V. 17-25: cf. És 8:5-8. 2 R 18:13, etc. Os 9:7.'
  '17':
  - type: text
    content: L’Éternel fera venir sur toi,
  - type: text
    content: Sur ton peuple et sur la maison de ton père,
  - type: text
    content: Des jours tels qu’il n’y en a point eu
  - type: text
    content: Depuis le jour où Éphraïm s’est séparé de Juda
  - type: text
    content: (Le roi d’Assyrie).
  '18':
  - type: text
    content: En ce jour-là, l’Éternel sifflera les mouches
  - type: text
    content: Qui sont à l’extrémité des canaux de l’Égypte,
  - type: text
    content: Et les abeilles qui sont au pays d’Assyrie;
  '19':
  - type: text
    content: Elles viendront, et se poseront toutes dans les vallons désolés,
  - type: text
    content: Et dans les fentes des rochers,
  - type: text
    content: Sur tous les buissons,
  - type: text
    content: Et sur tous les pâturages.
  '2':
  - type: text
    content: 'On vint dire à la maison de David: Les Syriens sont campés en Éphraïm. Et le cœur d’Achaz et le cœur de son peuple furent agités, comme les arbres de la forêt sont agités par le vent. '
  '20':
  - type: text
    content: En ce jour-là, le Seigneur rasera, avec un rasoir pris à louage
  - type: text
    content: Au-delà du fleuve,
  - type: text
    content: Avec le roi d’Assyrie,
  - type: text
    content: La tête et le poil des pieds;
  - type: text
    content: Il enlèvera aussi la barbe.
  '21':
  - type: text
    content: En ce jour-là,
  - type: text
    content: Chacun entretiendra une jeune vache et deux brebis;
  '22':
  - type: text
    content: Et il y aura une telle abondance de lait
  - type: text
    content: Qu’on mangera de la crème,
  - type: text
    content: Car c’est de crème et de miel que se nourriront
  - type: text
    content: Tous ceux qui seront restés dans le pays.
  '23':
  - type: text
    content: En ce jour-là,
  - type: text
    content: Tout lieu qui contiendra mille ceps de vigne,
  - type: text
    content: Valant mille sicles d’argent,
  - type: text
    content: 'Sera livré '
  - type: note
    content: Lé 26:22.
  - type: text
    content: 'aux ronces et aux épines:'
  '24':
  - type: text
    content: On y entrera avec les flèches et avec l’arc,
  - type: text
    content: Car tout le pays ne sera que ronces et épines.
  '25':
  - type: text
    content: Et toutes les montagnes que l’on cultivait avec la bêche
  - type: text
    content: 'Ne seront plus fréquentées, par crainte des ronces et des épines:'
  - type: text
    content: On y lâchera le bœuf, et la brebis en foulera le sol.
  '3':
  - type: text
    content: 'Alors l’Éternel dit à Ésaïe: Va à la rencontre d’Achaz, toi et Schear-Jaschub, ton fils, vers l’extrémité de l’aqueduc de l’étang supérieur, sur la route du champ du foulon. '
  '4':
  - type: text
    content: 'Et dis-lui:'
  - type: text
    content: Sois tranquille, ne crains rien,
  - type: text
    content: Et que ton cœur ne s’alarme pas,
  - type: text
    content: Devant ces deux bouts de tisons fumants,
  - type: text
    content: Devant la colère de Retsin et de la Syrie, et du fils de Remalia,
  '5':
  - type: text
    content: De ce que la Syrie médite du mal contre toi,
  - type: text
    content: 'De ce qu’Éphraïm et le fils de Remalia disent:'
  '6':
  - type: text
    content: Montons contre Juda, assiégeons la ville,
  - type: text
    content: Et battons-la en brèche,
  - type: text
    content: Et proclamons-y pour roi le fils de Tabeel.
  '7':
  - type: text
    content: 'Ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: Cela n’arrivera pas, cela n’aura pas lieu.
  '8':
  - type: text
    content: Car Damas est la tête de la Syrie,
  - type: text
    content: Et Retsin est la tête de Damas.
  - type: text
    content: (Encore soixante-cinq ans,
  - type: text
    content: Éphraïm ne sera plus un peuple.)
  '9':
  - type: text
    content: La Samarie est la tête d’Éphraïm,
  - type: text
    content: Et le fils de Remalia est la tête de la Samarie.
  - type: text
    content: Si vous ne croyez pas,
  - type: text
    content: Vous ne subsisterez pas.
  - type: heading
    content: 'V. 10-16: cf. (Mt 1:18-25. Jn 1:14.) És 8:1-4.'
