document_id: ISA.7,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prophétie contre Israël et la Syrie
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-9: cf. 2 R 16:1-5. És 51:12.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Il arriva, du temps d’Achaz, fils de Jotham, fils d’Ozias, roi de Juda, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 16:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 28:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'que Retsin, roi de Syrie, monta avec Pékach, fils de Remalia, roi d’Israël, contre Jérusalem, pour l’assiéger; mais il ne put l’assiéger. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'L’Éternel parla de nouveau à Achaz, et lui dit:'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Demande en ta faveur un signe à l’Éternel, ton Dieu; demande-le, soit dans les lieux bas, soit dans les lieux élevés.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Achaz répondit: Je ne demanderai rien, je ne tenterai pas l’Éternel.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ésaïe dit alors:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Écoutez donc, maison de David!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Est-ce trop peu pour vous de lasser la patience des hommes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que vous lassiez encore celle de mon Dieu?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: C’est pourquoi le Seigneur lui-même vous donnera un signe,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 1:23
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 1:31
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Voici, la jeune fille deviendra enceinte, elle enfantera un fils,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et elle lui donnera le nom d’Emmanuel.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Il mangera de la crème et du miel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jusqu’à ce qu’il sache rejeter le mal et choisir le bien.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Mais avant que l’enfant sache rejeter le mal et choisir le bien,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le pays dont tu crains les deux rois sera abandonné.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Menaces contre Juda
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 17-25: cf. És 8:5-8. 2 R 18:13, etc. Os 9:7.'
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: L’Éternel fera venir sur toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur ton peuple et sur la maison de ton père,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des jours tels qu’il n’y en a point eu
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Depuis le jour où Éphraïm s’est séparé de Juda
  - type: usfm
    marker: q1
    children:
    - type: text
      text: (Le roi d’Assyrie).
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: En ce jour-là, l’Éternel sifflera les mouches
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui sont à l’extrémité des canaux de l’Égypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les abeilles qui sont au pays d’Assyrie;
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Elles viendront, et se poseront toutes dans les vallons désolés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et dans les fentes des rochers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur tous les buissons,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et sur tous les pâturages.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'On vint dire à la maison de David: Les Syriens sont campés en Éphraïm. Et le cœur d’Achaz et le cœur de son peuple furent agités, comme les arbres de la forêt sont agités par le vent. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: En ce jour-là, le Seigneur rasera, avec un rasoir pris à louage
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au-delà du fleuve,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avec le roi d’Assyrie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La tête et le poil des pieds;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il enlèvera aussi la barbe.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: En ce jour-là,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Chacun entretiendra une jeune vache et deux brebis;
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Et il y aura une telle abondance de lait
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’on mangera de la crème,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car c’est de crème et de miel que se nourriront
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous ceux qui seront restés dans le pays.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: En ce jour-là,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tout lieu qui contiendra mille ceps de vigne,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Valant mille sicles d’argent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Sera livré '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 26:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'aux ronces et aux épines:'
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: On y entrera avec les flèches et avec l’arc,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car tout le pays ne sera que ronces et épines.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Et toutes les montagnes que l’on cultivait avec la bêche
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ne seront plus fréquentées, par crainte des ronces et des épines:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On y lâchera le bœuf, et la brebis en foulera le sol.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Alors l’Éternel dit à Ésaïe: Va à la rencontre d’Achaz, toi et Schear-Jaschub, ton fils, vers l’extrémité de l’aqueduc de l’étang supérieur, sur la route du champ du foulon. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Et dis-lui:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sois tranquille, ne crains rien,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que ton cœur ne s’alarme pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Devant ces deux bouts de tisons fumants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Devant la colère de Retsin et de la Syrie, et du fils de Remalia,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: De ce que la Syrie médite du mal contre toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'De ce qu’Éphraïm et le fils de Remalia disent:'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Montons contre Juda, assiégeons la ville,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et battons-la en brèche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et proclamons-y pour roi le fils de Tabeel.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ainsi parle le Seigneur, l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cela n’arrivera pas, cela n’aura pas lieu.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Car Damas est la tête de la Syrie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et Retsin est la tête de Damas.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: (Encore soixante-cinq ans,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Éphraïm ne sera plus un peuple.)
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: La Samarie est la tête d’Éphraïm,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le fils de Remalia est la tête de la Samarie.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si vous ne croyez pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous ne subsisterez pas.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 10-16: cf. (Mt 1:18-25. Jn 1:14.) És 8:1-4.'
    marker-yv: yv-h
