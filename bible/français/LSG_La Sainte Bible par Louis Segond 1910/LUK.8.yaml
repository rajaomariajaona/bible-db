document_id: LUK.8,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Parabole du semeur
  - type: heading
    content: 'V. 1-3: cf. Mc 15:40, 41.'
  - type: text
    content: 'Ensuite, Jésus allait de ville en ville et de village en village, prêchant et annonçant la bonne nouvelle du royaume de Dieu. '
  '10':
  - type: text
    content: 'Il répondit: '
  - type: text
    content: Il vous a été
  - type: text
    content: ' '
  - type: note
    content: 2 Co 3:5.
  - type: text
    content: donné de connaître les mystères du royaume de Dieu;
  - type: text
    content: ' '
  - type: note
    content: Mt 11:25. 2 Co 3:14.
  - type: text
    content: mais pour les autres, cela leur est dit en paraboles,
  - type: text
    content: ' '
  - type: note
    content: És 6:9. Éz 12:2. Mt 13:14. Mc 4:12. Jn 12:40. Ac 28:26. Ro 11:8.
  - type: text
    content: afin qu’en voyant ils ne voient point, et qu’en entendant ils ne comprennent point.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Mt 13:18. Mc 4:13.
  - type: text
    content: 'Voici ce que signifie cette parabole: La semence, c’est la parole de Dieu.'
  - type: text
    content: ' '
  '12':
  - type: text
    content: Ceux qui sont le long du chemin, ce sont ceux qui entendent; puis le diable vient, et enlève de leur cœur la parole, de peur qu’ils ne croient et soient sauvés.
  - type: text
    content: ' '
  '13':
  - type: note
    content: Mt 13:20. Mc 4:16.
  - type: text
    content: Ceux qui sont sur le roc, ce sont ceux qui, lorsqu’ils entendent la parole, la reçoivent avec joie; mais ils n’ont point de racine, ils croient pour un temps, et ils succombent au moment de la tentation.
  - type: text
    content: ' '
  '14':
  - type: text
    content: Ce qui est tombé parmi les épines, ce sont ceux qui, ayant entendu la parole, s’en vont, et la laissent
  - type: text
    content: ' '
  - type: note
    content: Mt 19:23. Mc 10:23. Lu 18:24. 1 Ti 6:9.
  - type: text
    content: étouffer par les soucis, les richesses et les plaisirs de la vie, et ils ne portent point de fruit qui vienne à maturité.
  - type: text
    content: ' '
  '15':
  - type: text
    content: Ce qui est tombé dans la bonne terre, ce sont ceux qui, ayant entendu la parole avec un cœur honnête et bon, la retiennent, et portent du fruit avec persévérance.
  - type: text
    content: ' '
  '16':
  - type: note
    content: Mt 5:15. Mc 4:21. Lu 11:33.
  - type: text
    content: Personne, après avoir allumé une lampe, ne la couvre d’un vase, ou ne la met sous un lit; mais il la met sur un chandelier, afin que ceux qui entrent voient la lumière.
  - type: text
    content: ' '
  '17':
  - type: note
    content: Job 12:22. Mt 10:26. Mc 4:22. Lu 12:2.
  - type: text
    content: Car il n’est rien de caché qui ne doive être découvert, rien de secret qui ne doive être connu et mis au jour.
  - type: text
    content: ' '
  '18':
  - type: text
    content: Prenez donc garde à la manière dont vous écoutez;
  - type: text
    content: ' '
  - type: note
    content: Mt 13:12; 25:29. Mc 4:25. Lu 19:26.
  - type: text
    content: car on donnera à celui qui a, mais à celui qui n’a pas on ôtera même ce qu’il croit avoir.
  - type: heading
    content: La mère et les frères de Jésus
  - type: heading
    content: 'V. 19-21: cf. (Mt 12:46-50. Mc 3:31-35.)'
  '19':
  - type: text
    content: ' '
  - type: note
    content: Mt 12:46; 13:55. Mc 3:31.
  - type: text
    content: 'La mère et les frères de Jésus vinrent le trouver; mais ils ne purent l’aborder, à cause de la foule. '
  '2':
  - type: text
    content: 'Les douze étaient avec lui '
  - type: note
    content: Mt 27:55, 56.
  - type: text
    content: 'et quelques femmes qui avaient été guéries d’esprits malins et de maladies: Marie, dite de Magdala, '
  - type: note
    content: Mc 16:9.
  - type: text
    content: 'de laquelle étaient sortis sept démons, '
  '20':
  - type: text
    content: 'On lui dit: Ta mère et tes frères sont dehors, et ils désirent te voir. '
  '21':
  - type: text
    content: 'Mais il répondit: '
  - type: note
    content: Jn 15:14. 2 Co 5:16.
  - type: text
    content: Ma mère et mes frères, ce sont ceux qui écoutent la parole de Dieu, et qui la mettent en pratique.
  - type: heading
    content: Tempête apaisée
  - type: heading
    content: 'V. 22-25: cf. (Mt 8:23-27. Mc 4:35-41.) Ps 107:23-31.'
  '22':
  - type: text
    content: ' '
  - type: note
    content: Mt 8:23. Mc 4:35, 36.
  - type: text
    content: 'Un jour, Jésus monta dans une barque avec ses disciples. Il leur dit: '
  - type: text
    content: Passons de l’autre côté du lac.
  - type: text
    content: ' Et ils partirent. '
  '23':
  - type: text
    content: 'Pendant qu’ils naviguaient, Jésus s’endormit. Un tourbillon fondit sur le lac, la barque se remplissait d’eau, et ils étaient en péril. '
  '24':
  - type: text
    content: 'Ils s’approchèrent et le réveillèrent, en disant: Maître, maître, nous périssons! S’étant réveillé, il menaça le vent et les flots, qui s’apaisèrent, et le calme revint. '
  '25':
  - type: text
    content: 'Puis il leur dit: '
  - type: text
    content: Où est votre foi?
  - type: text
    content: ' Saisis de frayeur et d’étonnement, ils se dirent les uns aux autres: '
  - type: note
    content: Job 26:12. Ps 107:25.
  - type: text
    content: Quel est donc celui-ci, qui commande même au vent et à l’eau, et à qui ils obéissent?
  - type: heading
    content: Jésus sur le territoire des Géraséniens. Un démoniaque guéri
  - type: heading
    content: 'V. 26-39: cf. (Mt 8:28-34. Mc 5:1-20.)'
  '26':
  - type: text
    content: ' '
  - type: note
    content: Mt 8:28. Mc 5:1.
  - type: text
    content: 'Ils abordèrent dans le pays des Géraséniens, qui est vis-à-vis de la Galilée. '
  '27':
  - type: text
    content: 'Lorsque Jésus fut descendu à terre, il vint au-devant de lui un homme de la ville, qui était possédé de plusieurs démons. Depuis longtemps il ne portait point de vêtement, et avait sa demeure non dans une maison, mais dans les sépulcres. '
  '28':
  - type: text
    content: 'Ayant vu Jésus, il poussa un cri, se jeta à ses pieds, et dit d’une voix forte: Qu’y a-t-il entre moi et toi, Jésus, Fils du Dieu Très-Haut? Je t’en supplie, ne me tourmente pas. '
  '29':
  - type: text
    content: 'Car Jésus commandait à l’esprit impur de sortir de cet homme, dont il s’était emparé depuis longtemps; on le gardait lié de chaînes et les fers aux pieds, mais il rompait les liens, et il était entraîné par le démon dans les déserts. '
  '3':
  - type: text
    content: Jeanne, femme de Chuza, intendant d’Hérode, Susanne, et plusieurs autres, qui l’assistaient de leurs biens.
  - type: heading
    content: 'V. 4-18: cf. (Mt 13:1-23. Mc 4:1-25.)'
  '30':
  - type: text
    content: 'Jésus lui demanda: '
  - type: text
    content: Quel est ton nom?
  - type: text
    content: ' Légion, répondit-il. Car plusieurs démons étaient entrés en lui. '
  '31':
  - type: text
    content: 'Et ils priaient instamment Jésus de ne pas leur ordonner d’aller dans l’abîme. '
  '32':
  - type: text
    content: 'Il y avait là, dans la montagne, un grand troupeau de pourceaux qui paissaient. Et les démons supplièrent Jésus de leur permettre d’entrer dans ces pourceaux. Il le leur permit. '
  '33':
  - type: text
    content: 'Les démons sortirent de cet homme, entrèrent dans les pourceaux, et le troupeau se précipita des pentes escarpées dans le lac, et se noya. '
  '34':
  - type: text
    content: 'Ceux qui les faisaient paître, voyant ce qui était arrivé, s’enfuirent, et répandirent la nouvelle dans la ville et dans les campagnes. '
  '35':
  - type: text
    content: 'Les gens allèrent voir ce qui était arrivé. Ils vinrent auprès de Jésus, et ils trouvèrent l’homme de qui étaient sortis les démons, assis à ses pieds, vêtu, et dans son bon sens; et ils furent saisis de frayeur. '
  '36':
  - type: text
    content: 'Ceux qui avaient vu ce qui s’était passé leur racontèrent comment le démoniaque avait été guéri. '
  '37':
  - type: text
    content: 'Tous les habitants du pays des Géraséniens prièrent Jésus '
  - type: note
    content: Ac 16:39.
  - type: text
    content: 'de s’éloigner d’eux, car ils étaient saisis d’une grande crainte. Jésus monta dans la barque, et s’en retourna. '
  '38':
  - type: note
    content: Mc 5:18.
  - type: text
    content: 'L’homme de qui étaient sortis les démons lui demandait la permission de rester avec lui. Mais Jésus le renvoya, en disant:'
  '39':
  - type: text
    content: ' '
  - type: text
    content: Retourne dans ta maison, et raconte tout ce que Dieu t’a fait.
  - type: text
    content: ' Il s’en alla, et publia par toute la ville tout ce que Jésus avait fait pour lui.'
  - type: heading
    content: Résurrection de la fille de Jaïrus, et guérison d’une femme malade depuis douze ans
  - type: heading
    content: 'V. 40-56: cf. (Mt 9:1, 18-26. Mc 5:21-43.) Lu 7:11-17.'
  '4':
  - type: text
    content: ' '
  - type: note
    content: Mt 13:3. Mc 4:2.
  - type: text
    content: 'Une grande foule s’étant assemblée, et des gens étant venus de diverses villes auprès de lui, il dit cette parabole:'
  '40':
  - type: text
    content: 'A son retour, Jésus fut reçu par la foule, car tous l’attendaient. '
  '41':
  - type: note
    content: Mt 9:18. Mc 5:22.
  - type: text
    content: 'Et voici, il vint un homme, nommé Jaïrus, qui était chef de la synagogue. Il se jeta à ses pieds, et le supplia d’entrer dans sa maison, '
  '42':
  - type: text
    content: 'parce qu’il avait une fille unique d’environ douze ans qui se mourait. Pendant que Jésus y allait, il était pressé par la foule. '
  '43':
  - type: note
    content: Mt 9:20. Mc 5:25.
  - type: text
    content: 'Or, il y avait une femme atteinte '
  - type: note
    content: Lé 15:25.
  - type: text
    content: 'd’une perte de sang depuis douze ans, et qui avait dépensé tout son bien pour les médecins, sans qu’aucun ait pu la guérir. '
  '44':
  - type: text
    content: 'Elle s’approcha par derrière, et toucha le bord du vêtement de Jésus. Au même instant la perte de sang s’arrêta. '
  '45':
  - type: text
    content: 'Et Jésus dit: '
  - type: text
    content: Qui m’a touché?
  - type: text
    content: ' Comme tous s’en défendaient, Pierre et ceux qui étaient avec lui dirent: Maître, la foule t’entoure et te presse, et tu dis: Qui m’a touché? '
  '46':
  - type: text
    content: 'Mais Jésus répondit: '
  - type: text
    content: Quelqu’un m’a touché, car j’ai connu qu’une force était sortie de moi.
  - type: text
    content: ' '
  '47':
  - type: text
    content: 'La femme, se voyant découverte, vint toute tremblante se jeter à ses pieds, et déclara devant tout le peuple pourquoi elle l’avait touché, et comment elle avait été guérie à l’instant. '
  '48':
  - type: text
    content: 'Jésus lui dit: '
  - type: text
    content: Ma fille, ta foi t’a sauvée; va en paix.
  - type: text
    content: ' '
  '49':
  - type: note
    content: Mc 5:35.
  - type: text
    content: 'Comme il parlait encore, survint de chez le chef de la synagogue quelqu’un disant: Ta fille est morte; n’importune pas le maître. '
  '5':
  - type: text
    content: ' '
  - type: text
    content: 'Un semeur sortit pour semer sa semence. Comme il semait, une partie de la semence tomba le long du chemin: elle fut foulée aux pieds, et les oiseaux du ciel la mangèrent.'
  - type: text
    content: ' '
  '50':
  - type: text
    content: 'Mais Jésus, ayant entendu cela, dit au chef de la synagogue: '
  - type: text
    content: Ne crains pas, crois seulement, et elle sera sauvée.
  - type: text
    content: ' '
  '51':
  - type: text
    content: 'Lorsqu’il fut arrivé à la maison, il ne permit à personne d’entrer avec lui, si ce n’est à Pierre, à Jean et à Jacques, et au père et à la mère de l’enfant. '
  '52':
  - type: text
    content: 'Tous pleuraient et se lamentaient sur elle. Alors Jésus dit: '
  - type: text
    content: Ne pleurez pas; elle n’est pas morte,
  - type: text
    content: ' '
  - type: note
    content: Jn 11:11.
  - type: text
    content: mais elle dort.
  - type: text
    content: ' '
  '53':
  - type: text
    content: 'Et ils se moquaient de lui, sachant qu’elle était morte. '
  '54':
  - type: text
    content: 'Mais il la saisit par la main, et dit d’une voix forte: '
  - type: text
    content: Enfant, lève-toi.
  - type: text
    content: ' '
  '55':
  - type: text
    content: 'Et son esprit revint en elle, et à l’instant elle se leva; et Jésus ordonna qu’on lui donnât à manger. '
  '56':
  - type: text
    content: Les parents de la jeune fille furent dans l’étonnement, et il leur recommanda de ne dire à personne ce qui était arrivé.
  '6':
  - type: text
    content: 'Une autre partie tomba sur le roc: quand elle fut levée, elle sécha, parce qu’elle n’avait point d’humidité.'
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'Une autre partie tomba au milieu des épines: les épines crûrent avec elle, et l’étouffèrent.'
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'Une autre partie tomba dans la bonne terre: quand elle fut levée, elle donna du fruit au centuple.'
  - type: text
    content: ' Après avoir ainsi parlé, Jésus dit à haute voix: '
  - type: text
    content: Que celui qui a des oreilles pour entendre entende!
  - type: text
    content: ' '
  '9':
  - type: note
    content: Mt 13:10. Mc 4:10.
  - type: text
    content: 'Ses disciples lui demandèrent ce que signifiait cette parabole. '
