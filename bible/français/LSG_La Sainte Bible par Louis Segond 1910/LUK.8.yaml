document_id: LUK.8
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Parabole du semeur
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-3: cf. Mc 15:40, 41.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ensuite, Jésus allait de ville en ville et de village en village, prêchant et annonçant la bonne nouvelle du royaume de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Les douze étaient avec lui '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 27:55
      metadata:
        usfm: MAT.27.55
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '56'
      metadata:
        usfm: MAT.27.56
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et quelques femmes qui avaient été guéries d’esprits malins et de maladies: Marie, dite de Magdala, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 16:9
      metadata:
        usfm: MRK.16.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'de laquelle étaient sortis sept démons, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Jeanne, femme de Chuza, intendant d’Hérode, Susanne, et plusieurs autres, qui l’assistaient de leurs biens.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 4-18: cf. (Mt 13:1-23. Mc 4:1-25.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 13:3
      metadata:
        usfm: MAT.13.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 4:2
      metadata:
        usfm: MRK.4.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Une grande foule s’étant assemblée, et des gens étant venus de diverses villes auprès de lui, il dit cette parabole:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Un semeur sortit pour semer sa semence. Comme il semait, une partie de la semence tomba le long du chemin: elle fut foulée aux pieds, et les oiseaux du ciel la mangèrent.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Une autre partie tomba sur le roc: quand elle fut levée, elle sécha, parce qu’elle n’avait point d’humidité.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Une autre partie tomba au milieu des épines: les épines crûrent avec elle, et l’étouffèrent.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Une autre partie tomba dans la bonne terre: quand elle fut levée, elle donna du fruit au centuple.'
  - type: text
    text: ' Après avoir ainsi parlé, Jésus dit à haute voix: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Que celui qui a des oreilles pour entendre entende!
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 13:10
      metadata:
        usfm: MAT.13.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 4:10
      metadata:
        usfm: MRK.4.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ses disciples lui demandèrent ce que signifiait cette parabole. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il répondit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Il vous a été
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 3:5
      metadata:
        usfm: 2CO.3.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: donné de connaître les mystères du royaume de Dieu;
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 11:25
      metadata:
        usfm: MAT.11.25
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 3:14
      metadata:
        usfm: 2CO.3.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: mais pour les autres, cela leur est dit en paraboles,
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 6:9
      metadata:
        usfm: ISA.6.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 12:2
      metadata:
        usfm: EZK.12.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 13:14
      metadata:
        usfm: MAT.13.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 4:12
      metadata:
        usfm: MRK.4.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 12:40
      metadata:
        usfm: JHN.12.40
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 28:26
      metadata:
        usfm: ACT.28.26
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 11:8
      metadata:
        usfm: ROM.11.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: afin qu’en voyant ils ne voient point, et qu’en entendant ils ne comprennent point.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 13:18
      metadata:
        usfm: MAT.13.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 4:13
      metadata:
        usfm: MRK.4.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Voici ce que signifie cette parabole: La semence, c’est la parole de Dieu.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ceux qui sont le long du chemin, ce sont ceux qui entendent; puis le diable vient, et enlève de leur cœur la parole, de peur qu’ils ne croient et soient sauvés.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 13:20
      metadata:
        usfm: MAT.13.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 4:16
      metadata:
        usfm: MRK.4.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ceux qui sont sur le roc, ce sont ceux qui, lorsqu’ils entendent la parole, la reçoivent avec joie; mais ils n’ont point de racine, ils croient pour un temps, et ils succombent au moment de la tentation.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ce qui est tombé parmi les épines, ce sont ceux qui, ayant entendu la parole, s’en vont, et la laissent
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 19:23
      metadata:
        usfm: MAT.19.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 10:23
      metadata:
        usfm: MRK.10.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 18:24
      metadata:
        usfm: LUK.18.24
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 6:9
      metadata:
        usfm: 1TI.6.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: étouffer par les soucis, les richesses et les plaisirs de la vie, et ils ne portent point de fruit qui vienne à maturité.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ce qui est tombé dans la bonne terre, ce sont ceux qui, ayant entendu la parole avec un cœur honnête et bon, la retiennent, et portent du fruit avec persévérance.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 5:15
      metadata:
        usfm: MAT.5.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 4:21
      metadata:
        usfm: MRK.4.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 11:33
      metadata:
        usfm: LUK.11.33
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Personne, après avoir allumé une lampe, ne la couvre d’un vase, ou ne la met sous un lit; mais il la met sur un chandelier, afin que ceux qui entrent voient la lumière.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 12:22
      metadata:
        usfm: JOB.12.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 10:26
      metadata:
        usfm: MAT.10.26
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 4:22
      metadata:
        usfm: MRK.4.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 12:2
      metadata:
        usfm: LUK.12.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Car il n’est rien de caché qui ne doive être découvert, rien de secret qui ne doive être connu et mis au jour.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Prenez donc garde à la manière dont vous écoutez;
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 13:12
      metadata:
        usfm: MAT.13.12
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 25:29
      metadata:
        usfm: MAT.25.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 4:25
      metadata:
        usfm: MRK.4.25
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 19:26
      metadata:
        usfm: LUK.19.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: car on donnera à celui qui a, mais à celui qui n’a pas on ôtera même ce qu’il croit avoir.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La mère et les frères de Jésus
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 19-21: cf. (Mt 12:46-50. Mc 3:31-35.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 12:46
      metadata:
        usfm: MAT.12.46
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 13:55
      metadata:
        usfm: MAT.13.55
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 3:31
      metadata:
        usfm: MRK.3.31
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'La mère et les frères de Jésus vinrent le trouver; mais ils ne purent l’aborder, à cause de la foule. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'On lui dit: Ta mère et tes frères sont dehors, et ils désirent te voir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Mais il répondit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 15:14
      metadata:
        usfm: JHN.15.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 5:16
      metadata:
        usfm: 2CO.5.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ma mère et mes frères, ce sont ceux qui écoutent la parole de Dieu, et qui la mettent en pratique.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tempête apaisée
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 22-25: cf. (Mt 8:23-27. Mc 4:35-41.) Ps 107:23-31.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 8:23
      metadata:
        usfm: MAT.8.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 4:35
      metadata:
        usfm: MRK.4.35
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '36'
      metadata:
        usfm: MRK.4.36
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Un jour, Jésus monta dans une barque avec ses disciples. Il leur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Passons de l’autre côté du lac.
  - type: text
    text: ' Et ils partirent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Pendant qu’ils naviguaient, Jésus s’endormit. Un tourbillon fondit sur le lac, la barque se remplissait d’eau, et ils étaient en péril. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ils s’approchèrent et le réveillèrent, en disant: Maître, maître, nous périssons! S’étant réveillé, il menaça le vent et les flots, qui s’apaisèrent, et le calme revint. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Puis il leur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Où est votre foi?
  - type: text
    text: ' Saisis de frayeur et d’étonnement, ils se dirent les uns aux autres: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 26:12
      metadata:
        usfm: JOB.26.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 107:25
      metadata:
        usfm: PSA.107.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Quel est donc celui-ci, qui commande même au vent et à l’eau, et à qui ils obéissent?
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus sur le territoire des Géraséniens. Un démoniaque guéri
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 26-39: cf. (Mt 8:28-34. Mc 5:1-20.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 8:28
      metadata:
        usfm: MAT.8.28
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 5:1
      metadata:
        usfm: MRK.5.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ils abordèrent dans le pays des Géraséniens, qui est vis-à-vis de la Galilée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Lorsque Jésus fut descendu à terre, il vint au-devant de lui un homme de la ville, qui était possédé de plusieurs démons. Depuis longtemps il ne portait point de vêtement, et avait sa demeure non dans une maison, mais dans les sépulcres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ayant vu Jésus, il poussa un cri, se jeta à ses pieds, et dit d’une voix forte: Qu’y a-t-il entre moi et toi, Jésus, Fils du Dieu Très-Haut? Je t’en supplie, ne me tourmente pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Car Jésus commandait à l’esprit impur de sortir de cet homme, dont il s’était emparé depuis longtemps; on le gardait lié de chaînes et les fers aux pieds, mais il rompait les liens, et il était entraîné par le démon dans les déserts. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Jésus lui demanda: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Quel est ton nom?
  - type: text
    text: ' Légion, répondit-il. Car plusieurs démons étaient entrés en lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Et ils priaient instamment Jésus de ne pas leur ordonner d’aller dans l’abîme. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Il y avait là, dans la montagne, un grand troupeau de pourceaux qui paissaient. Et les démons supplièrent Jésus de leur permettre d’entrer dans ces pourceaux. Il le leur permit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Les démons sortirent de cet homme, entrèrent dans les pourceaux, et le troupeau se précipita des pentes escarpées dans le lac, et se noya. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ceux qui les faisaient paître, voyant ce qui était arrivé, s’enfuirent, et répandirent la nouvelle dans la ville et dans les campagnes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Les gens allèrent voir ce qui était arrivé. Ils vinrent auprès de Jésus, et ils trouvèrent l’homme de qui étaient sortis les démons, assis à ses pieds, vêtu, et dans son bon sens; et ils furent saisis de frayeur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ceux qui avaient vu ce qui s’était passé leur racontèrent comment le démoniaque avait été guéri. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Tous les habitants du pays des Géraséniens prièrent Jésus '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 16:39
      metadata:
        usfm: ACT.16.39
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'de s’éloigner d’eux, car ils étaient saisis d’une grande crainte. Jésus monta dans la barque, et s’en retourna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 5:18
      metadata:
        usfm: MRK.5.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'L’homme de qui étaient sortis les démons lui demandait la permission de rester avec lui. Mais Jésus le renvoya, en disant:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Retourne dans ta maison, et raconte tout ce que Dieu t’a fait.
  - type: text
    text: ' Il s’en alla, et publia par toute la ville tout ce que Jésus avait fait pour lui.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Résurrection de la fille de Jaïrus, et guérison d’une femme malade depuis douze ans
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 40-56: cf. (Mt 9:1, 18-26. Mc 5:21-43.) Lu 7:11-17.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'A son retour, Jésus fut reçu par la foule, car tous l’attendaient. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 9:18
      metadata:
        usfm: MAT.9.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 5:22
      metadata:
        usfm: MRK.5.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Et voici, il vint un homme, nommé Jaïrus, qui était chef de la synagogue. Il se jeta à ses pieds, et le supplia d’entrer dans sa maison, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'parce qu’il avait une fille unique d’environ douze ans qui se mourait. Pendant que Jésus y allait, il était pressé par la foule. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 9:20
      metadata:
        usfm: MAT.9.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 5:25
      metadata:
        usfm: MRK.5.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Or, il y avait une femme atteinte '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 15:25
      metadata:
        usfm: LEV.15.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'd’une perte de sang depuis douze ans, et qui avait dépensé tout son bien pour les médecins, sans qu’aucun ait pu la guérir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Elle s’approcha par derrière, et toucha le bord du vêtement de Jésus. Au même instant la perte de sang s’arrêta. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Et Jésus dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Qui m’a touché?
  - type: text
    text: ' Comme tous s’en défendaient, Pierre et ceux qui étaient avec lui dirent: Maître, la foule t’entoure et te presse, et tu dis: Qui m’a touché? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Mais Jésus répondit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Quelqu’un m’a touché, car j’ai connu qu’une force était sortie de moi.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'La femme, se voyant découverte, vint toute tremblante se jeter à ses pieds, et déclara devant tout le peuple pourquoi elle l’avait touché, et comment elle avait été guérie à l’instant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Jésus lui dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ma fille, ta foi t’a sauvée; va en paix.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 5:35
      metadata:
        usfm: MRK.5.35
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Comme il parlait encore, survint de chez le chef de la synagogue quelqu’un disant: Ta fille est morte; n’importune pas le maître. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Mais Jésus, ayant entendu cela, dit au chef de la synagogue: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ne crains pas, crois seulement, et elle sera sauvée.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Lorsqu’il fut arrivé à la maison, il ne permit à personne d’entrer avec lui, si ce n’est à Pierre, à Jean et à Jacques, et au père et à la mère de l’enfant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Tous pleuraient et se lamentaient sur elle. Alors Jésus dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ne pleurez pas; elle n’est pas morte,
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 11:11
      metadata:
        usfm: JHN.11.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: mais elle dort.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Et ils se moquaient de lui, sachant qu’elle était morte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Mais il la saisit par la main, et dit d’une voix forte: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Enfant, lève-toi.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Et son esprit revint en elle, et à l’instant elle se leva; et Jésus ordonna qu’on lui donnât à manger. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: Les parents de la jeune fille furent dans l’étonnement, et il leur recommanda de ne dire à personne ce qui était arrivé.
