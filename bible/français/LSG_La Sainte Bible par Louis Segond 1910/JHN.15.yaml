      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Je suis le vrai cep, et mon Père est le vigneron.
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
