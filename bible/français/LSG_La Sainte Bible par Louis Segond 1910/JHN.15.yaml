document_id: JHN.15,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-11: cf. Col 2:6, 7. Ga 2:20. Ép 3:17-19; 2:10. Jn 14:21, 23. Lu 13:6-9.'
  - type: text
    content: ' '
  - type: text
    content: Je suis le vrai cep, et mon Père est le vigneron.
  - type: text
    content: ' '
  '10':
  - type: note
    content: Jn 14:15, 21, 23. 1 Jn 5:3.
  - type: text
    content: Si vous gardez mes commandements, vous demeurerez dans mon amour, de même que j’ai gardé les commandements de mon Père, et que je demeure dans son amour.
  - type: text
    content: ' '
  '11':
  - type: text
    content: Je vous ai dit ces choses, afin que ma joie soit en vous, et que votre joie soit parfaite.
  - type: heading
    content: 'V. 12-17: cf. Jn 13:34, 35. 1 Jn 3:16-19; 4:7-12.'
  '12':
  - type: text
    content: ' '
  - type: note
    content: Lé 19:18. Mt 22:39. Jn 13:34. Ép 5:2. 1 Th 4:9. 1 Pi 4:8. 1 Jn 3:23; 4:21.
  - type: text
    content: 'C’est ici mon commandement: Aimez-vous les uns les autres, comme je vous ai aimés.'
  - type: text
    content: ' '
  '13':
  - type: note
    content: Ro 5:7. Ép 5:2. 1 Jn 3:16.
  - type: text
    content: Il n’y a pas de plus grand amour que de donner sa vie pour ses amis.
  - type: text
    content: ' '
  '14':
  - type: note
    content: Mt 12:50. 2 Co 5:16. Ga 5:6; 6:15. Col 3:11.
  - type: text
    content: Vous êtes mes amis, si vous faites ce que je vous commande.
  - type: text
    content: ' '
  '15':
  - type: text
    content: Je ne vous appelle plus serviteurs, parce que le serviteur ne sait pas ce que fait son maître; mais je vous ai appelés amis, parce que
  - type: text
    content: ' '
  - type: note
    content: Jn 8:26.
  - type: text
    content: je vous ai fait connaître tout ce que j’ai appris de mon Père.
  - type: text
    content: ' '
  '16':
  - type: note
    content: Jn 13:18. Ép 1:4.
  - type: text
    content: Ce n’est pas vous qui m’avez choisi; mais moi, je vous ai choisis, et je vous ai établis,
  - type: text
    content: ' '
  - type: note
    content: Mt 28:19. Mc 16:15. Col 1:6.
  - type: text
    content: afin que vous alliez, et que vous portiez du fruit, et que votre fruit demeure, afin que ce que vous demanderez au Père en mon nom, il vous le donne.
  - type: text
    content: ' '
  '17':
  - type: text
    content: Ce que je vous commande, c’est de vous aimer les uns les autres.
  - type: heading
    content: 'V. 18-27: cf. (Mt 10:22-33. Jn 16:1-3, 33.) Jn 3:18, 19.'
  '18':
  - type: text
    content: ' '
  - type: note
    content: 1 Jn 3:13.
  - type: text
    content: Si le monde vous hait, sachez qu’il m’a haï avant vous.
  - type: text
    content: ' '
  '19':
  - type: note
    content: Jn 17:14. Ga 1:10.
  - type: text
    content: Si vous étiez du monde, le monde aimerait ce qui est à lui; mais parce que vous n’êtes pas du monde, et que je vous ai choisis du milieu du monde, à cause de cela le monde vous hait.
  - type: text
    content: ' '
  '2':
  - type: note
    content: Mt 15:13.
  - type: text
    content: Tout sarment qui est en moi et qui ne porte pas de fruit, il le retranche; et tout sarment qui porte du fruit, il l’émonde, afin qu’il porte encore plus de fruit.
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'Souvenez-vous de la parole que je vous ai dite:'
  - type: text
    content: ' '
  - type: note
    content: Mt 10:24. Lu 6:40. Jn 13:16.
  - type: text
    content: Le serviteur n’est pas plus grand que son maître.
  - type: text
    content: ' '
  - type: note
    content: Mt 24:9. Jn 16:2.
  - type: text
    content: S’ils m’ont persécuté, ils vous persécuteront aussi; s’ils ont gardé ma parole, ils garderont aussi la vôtre.
  - type: text
    content: ' '
  '21':
  - type: note
    content: Mt 10:22. Jn 16:3.
  - type: text
    content: Mais ils vous feront toutes ces choses à cause de mon nom, parce qu’ils ne connaissent pas celui qui m’a envoyé.
  - type: text
    content: ' '
  '22':
  - type: note
    content: Ro 4:15; 5:20.
  - type: text
    content: Si je n’étais pas venu et que je ne leur eusse point parlé, ils n’auraient pas de péché; mais maintenant ils n’ont aucune excuse de leur péché.
  - type: text
    content: ' '
  '23':
  - type: text
    content: Celui qui me hait, hait aussi mon Père.
  - type: text
    content: ' '
  '24':
  - type: note
    content: Jn 10:37.
  - type: text
    content: Si je n’avais pas fait parmi eux des œuvres que nul autre n’a faites, ils n’auraient pas de péché; mais maintenant ils les ont vues, et ils ont haï et moi et mon Père.
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'Mais cela est arrivé afin que s’accomplît la parole qui est écrite dans leur loi:'
  - type: text
    content: ' '
  - type: note
    content: Ps 35:19; 69:5.
  - type: text
    content: Ils m’ont haï sans cause.
  - type: text
    content: ' '
  '26':
  - type: note
    content: Jn 14:26; 16:7. Ac 5:32.
  - type: text
    content: Quand sera venu le consolateur,
  - type: text
    content: ' '
  - type: note
    content: Lu 24:49.
  - type: text
    content: que je vous enverrai de la part du Père, l’Esprit de vérité, qui vient du Père, il rendra témoignage de moi;
  - type: text
    content: ' '
  '27':
  - type: note
    content: Ac 1:8, 21; 5:32.
  - type: text
    content: et vous aussi, vous rendrez témoignage, parce que vous êtes avec moi dès le commencement.
  '3':
  - type: text
    content: Déjà
  - type: text
    content: ' '
  - type: note
    content: Jn 13:10.
  - type: text
    content: vous êtes purs, à cause de la parole que je vous ai annoncée.
  - type: text
    content: ' '
  '4':
  - type: text
    content: Demeurez en moi, et je demeurerai en vous. Comme le sarment ne peut de lui-même porter du fruit, s’il ne demeure attaché au cep, ainsi vous ne le pouvez non plus, si vous ne demeurez en moi.
  - type: text
    content: ' '
  '5':
  - type: text
    content: Je suis le cep, vous êtes les sarments. Celui qui demeure en moi et en qui je demeure porte beaucoup de fruit, car sans moi vous ne pouvez rien faire.
  - type: text
    content: ' '
  '6':
  - type: note
    content: Éz 15:2, etc.
  - type: text
    content: Si quelqu’un ne demeure pas en moi,
  - type: text
    content: ' '
  - type: note
    content: Mt 3:10; 7:19. Col 1:23.
  - type: text
    content: il est jeté dehors, comme le sarment, et il sèche; puis on ramasse les sarments, on les jette au feu, et ils brûlent.
  - type: text
    content: ' '
  '7':
  - type: text
    content: Si vous demeurez en moi, et que mes paroles demeurent en vous,
  - type: text
    content: ' '
  - type: note
    content: Jé 29:12. Mt 7:7; 21:22. Mc 11:24. Lu 11:9. Jn 14:13; 16:24. Ja 1:5. 1 Jn 3:22; 5:14.
  - type: text
    content: demandez ce que vous voudrez, et cela vous sera accordé.
  - type: text
    content: ' '
  '8':
  - type: text
    content: Si vous portez beaucoup de fruit, c’est ainsi que mon Père sera glorifié, et que vous serez mes disciples.
  - type: text
    content: ' '
  '9':
  - type: text
    content: Comme le Père m’a aimé, je vous ai aussi aimés. Demeurez dans mon amour.
  - type: text
    content: ' '
