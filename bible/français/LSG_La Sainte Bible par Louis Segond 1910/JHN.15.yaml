      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Si vous gardez mes commandements, vous demeurerez dans mon amour, de même que j’ai gardé les commandements de mon Père, et que je demeure dans son amour.
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Je vous ai dit ces choses, afin que ma joie soit en vous, et que votre joie soit parfaite.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 12-17: cf. Jn 13:34, 35. 1 Jn 3:16-19; 4:7-12.'
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
