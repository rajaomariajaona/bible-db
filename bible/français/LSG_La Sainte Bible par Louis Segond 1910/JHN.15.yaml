      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'C’est ici mon commandement: Aimez-vous les uns les autres, comme je vous ai aimés.'
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
