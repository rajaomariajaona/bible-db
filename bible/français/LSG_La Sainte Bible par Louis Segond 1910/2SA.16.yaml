document_id: 2SA.16
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les amis et les ennemis de David
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-4: cf. 2 S 19:24-30.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Lorsque David eut un peu dépassé le sommet, voici, Tsiba, serviteur de Mephiboscheth, vint au-devant de lui avec deux ânes bâtés, sur lesquels il y avait deux cents pains, cent masses de raisins secs, cent de fruits d’été, et une outre de vin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Le roi dit à Tsiba: Que veux-tu faire de cela? '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 S 19:27
      metadata:
        usfm: 2SA.19.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Et Tsiba répondit: Les ânes serviront de monture à la maison du roi, le pain et les fruits d’été sont pour nourrir les jeunes gens, et le vin pour désaltérer ceux qui seront fatigués dans le désert. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Le roi dit: Où est le fils de ton maître? Et Tsiba répondit au roi: Voici, il est resté à Jérusalem, car il a dit: Aujourd’hui la maison d’Israël me rendra le royaume de mon père. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Le roi dit à Tsiba: Voici, tout ce qui appartient à Mephiboscheth est à toi. Et Tsiba dit: Je me prosterne! Que je trouve grâce à tes yeux, ô roi mon seigneur!'
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 5-14: cf. (2 S 19:16-23. 1 R 2:8, 9, 36-46.) Ps 7. 1 Pi 2:23.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'David était arrivé jusqu’à Bachurim. Et voici, il sortit de là un homme de la famille et de la maison de Saül, nommé '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 2:8
      metadata:
        usfm: 1KI.2.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Schimeï, fils de Guéra. Il s’avança en prononçant des malédictions, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'et il jeta des pierres à David et à tous les serviteurs du roi David, tandis que tout le peuple et tous les hommes vaillants étaient à la droite et à la gauche du roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Schimeï parlait ainsi en le maudissant: Va-t’en, va-t’en, homme de sang, méchant homme! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'L’Éternel fait retomber sur toi tout le sang de la maison de Saül, dont tu occupais le trône, et l’Éternel a livré le royaume entre les mains d’Absalom, ton fils; et te voilà malheureux comme tu le mérites, car tu es un homme de sang! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Alors Abischaï, fils de Tseruja, dit au roi: Pourquoi ce '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 24:15
      metadata:
        usfm: 1SA.24.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 S 9:8
      metadata:
        usfm: 2SA.9.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'chien mort maudit-il le roi mon seigneur? Laisse-moi, je te prie, aller lui couper la tête. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Mais le roi dit: Qu’ai-je affaire avec vous, fils de Tseruja? S’il maudit, c’est que l’Éternel lui a dit: Maudis David! Qui donc lui dira: Pourquoi agis-tu ainsi? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Et David dit à Abischaï et à tous ses serviteurs: Voici, mon fils, qui est sorti de mes entrailles, en veut à ma vie; à plus forte raison ce Benjamite! Laissez-le, et qu’il maudisse, car l’Éternel le lui a dit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Peut-être l’Éternel regardera-t-il mon affliction, et me fera-t-il du bien en retour des malédictions d’aujourd’hui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'David et ses gens continuèrent leur chemin. Et Schimeï marchait sur le flanc de la montagne près de David, et, en marchant, il maudissait, il jetait des pierres contre lui, il faisait voler la poussière. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Le roi et tout le peuple qui était avec lui arrivèrent à Ajephim, et là ils se reposèrent.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 15-19: cf. 2 S 15:32-37. (Ro 16:4. Ph 2:30.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Absalom et tout le peuple, les hommes d’Israël, étaient entrés dans Jérusalem; et Achitophel était avec Absalom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Lorsque Huschaï, l’Arkien, ami de David, fut arrivé auprès d’Absalom, il lui dit: Vive le roi! Vive le roi! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Et Absalom dit à Huschaï: Voilà donc l’attachement que tu as pour ton ami! Pourquoi n’es-tu pas allé avec ton ami? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Huschaï répondit à Absalom: C’est que je veux être à celui qu’ont choisi l’Éternel et tout ce peuple et tous les hommes d’Israël, et c’est avec lui que je veux rester. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: D’ailleurs, qui servirai-je? Ne sera-ce pas son fils? Comme j’ai servi ton père, ainsi je te servirai.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 20-23: cf. 2 S 12:11, 12; 20:3.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Absalom dit à Achitophel: Consultez ensemble; qu’avons-nous à faire? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Et Achitophel dit à Absalom: Va vers les concubines que ton père a laissées pour garder la maison; ainsi tout Israël saura que tu t’es rendu odieux à ton père, et les mains de tous ceux qui sont avec toi se fortifieront. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'On dressa pour Absalom une tente sur le toit, et Absalom alla vers les concubines de son père, aux yeux de tout Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Les conseils donnés en ce temps-là par Achitophel avaient autant d’autorité que si l’on eût consulté Dieu lui-même. Il en était ainsi de tous les conseils d’Achitophel, soit pour David, soit pour Absalom.
