document_id: EXO.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le buisson ardent
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-10: cf. Ac 7:30-34. (Ex 2:23-25; 6:2-8.) Am 7:14, 15.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Moïse faisait paître le troupeau de Jéthro, son beau-père, sacrificateur de Madian; et il mena le troupeau derrière le désert, et vint à la montagne de Dieu, à Horeb. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'L’ange de l’Éternel lui apparut dans une flamme de feu, au milieu d’un buisson. Moïse regarda; et voici, le buisson était tout en feu, et le buisson ne se consumait point. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Moïse dit: Je veux me détourner pour voir quelle est cette grande vision, et pourquoi le buisson ne se consume point. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'L’Éternel vit qu’il se détournait pour voir; et Dieu l’appela du milieu du buisson, et dit: Moïse! Moïse! Et il répondit: Me voici! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 5:15
      metadata:
        usfm: JOS.5.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Dieu dit: N’approche pas d’ici, ôte tes souliers de tes pieds, car le lieu sur lequel tu te tiens est une terre sainte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Et il ajouta: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 22:32
      metadata:
        usfm: MAT.22.32
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 12:26
      metadata:
        usfm: MRK.12.26
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 20:37
      metadata:
        usfm: LUK.20.37
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 7:32
      metadata:
        usfm: ACT.7.32
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Je suis le Dieu de ton père, le Dieu d’Abraham, le Dieu d’Isaac et le Dieu de Jacob. Moïse se cacha le visage, car il craignait de regarder Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 7:34
      metadata:
        usfm: ACT.7.34
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'L’Éternel dit: J’ai vu la souffrance de mon peuple qui est en Égypte, et j’ai entendu les cris que lui font pousser ses oppresseurs, car je connais ses douleurs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Je suis descendu pour le délivrer de la main des Égyptiens, et pour le faire monter de ce pays dans un bon et vaste pays, dans un pays où coulent le lait et le miel, dans les lieux qu’habitent les Cananéens, les Héthiens, les Amoréens, les Phéréziens, les Héviens et les Jébusiens. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Voici, les cris d’Israël sont venus jusqu’à moi, et j’ai vu l’oppression que leur font souffrir les Égyptiens. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Maintenant, va, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 105:26
      metadata:
        usfm: PSA.105.26
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Os 12:14
      metadata:
        usfm: HOS.12.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mi 6:4
      metadata:
        usfm: MIC.6.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 7:35
      metadata:
        usfm: ACT.7.35
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: je t’enverrai auprès de Pharaon, et tu feras sortir d’Égypte mon peuple, les enfants d’Israël.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 11-22: cf. De 32:3. Ex 4:28 à 5:4.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Moïse dit à Dieu: Qui suis-je, pour aller vers Pharaon, et pour faire sortir d’Égypte les enfants d’Israël? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dieu dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 1:5
      metadata:
        usfm: JOS.1.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Je serai avec toi; et ceci sera pour toi le signe que c’est moi qui t’envoie: quand tu auras fait sortir d’Égypte le peuple, vous servirez Dieu sur cette montagne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Moïse dit à Dieu: J’irai donc vers les enfants d’Israël, et je leur dirai: Le Dieu de vos pères m’envoie vers vous. Mais, s’ils me demandent quel est son nom, que leur répondrai-je? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dieu dit à Moïse: Je suis celui qui suis. Et il ajouta: C’est ainsi que tu répondras aux enfants d’Israël: Celui qui s’appelle “je suis” m’a envoyé vers vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dieu dit encore à Moïse: Tu parleras ainsi aux enfants d’Israël: L’Éternel, le Dieu de vos pères, le Dieu d’Abraham, le Dieu d’Isaac et le Dieu de Jacob, m’envoie vers vous. Voilà mon nom pour l’éternité, voilà mon nom de génération en génération. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Va, rassemble les anciens d’Israël, et dis-leur: L’Éternel, le Dieu de vos pères, m’est apparu, le Dieu d’Abraham, d’Isaac et de Jacob. Il a dit: Je vous ai vus, et j’ai vu ce qu’on vous fait en Égypte, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'et j’ai dit: Je vous ferai monter de l’Égypte, où vous souffrez, dans le pays des Cananéens, des Héthiens, des Amoréens, des Phéréziens, des Héviens et des Jébusiens, dans un pays où coulent le lait et le miel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ils écouteront ta voix; et tu iras, toi et les anciens d’Israël, auprès du roi d’Égypte, et vous lui direz: L’Éternel, le Dieu des Hébreux, nous est apparu. Permets-nous de faire trois journées de marche dans le désert, pour offrir des sacrifices à l’Éternel, notre Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Je sais que le roi d’Égypte ne vous laissera point aller, si ce n’est par une main puissante. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'J’étendrai ma main, et je frapperai l’Égypte par toutes sortes de prodiges que je ferai au milieu d’elle. Après quoi, il vous laissera aller. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Je ferai même trouver grâce à ce peuple aux yeux des Égyptiens, et quand vous partirez, vous ne partirez point à vide. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 11:2
      metadata:
        usfm: EXO.11.2
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 12:35
      metadata:
        usfm: EXO.12.35
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Chaque femme demandera à sa voisine et à celle qui demeure dans sa maison des vases d’argent, des vases d’or, et des vêtements, que vous mettrez sur vos fils et vos filles. Et vous '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 39:10
      metadata:
        usfm: EZK.39.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: dépouillerez les Égyptiens.
