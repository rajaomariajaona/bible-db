        text: De 1:3
      metadata:
        usfm: DEU.1.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et au désert, pendant quarante ans. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'C’est ce Moïse qui dit aux fils d’Israël: '
  - type: usfm
    marker: x
