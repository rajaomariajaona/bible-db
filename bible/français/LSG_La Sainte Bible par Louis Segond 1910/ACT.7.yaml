      - type: text
        text: Jos 5:15
      metadata:
        usfm: JOS.5.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ote tes souliers de tes pieds, car le lieu sur lequel tu te tiens est une terre sainte. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'J’ai vu la souffrance de mon peuple qui est en Égypte, j’ai entendu ses gémissements, et je suis descendu pour le délivrer. Maintenant, va, je t’enverrai en Égypte. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ce Moïse, qu’ils avaient renié, en disant: Qui t’a établi chef et juge? C’est lui que Dieu envoya comme chef et comme libérateur avec l’aide de l’ange qui lui était apparu dans le buisson. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
