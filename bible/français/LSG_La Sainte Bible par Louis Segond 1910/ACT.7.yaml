        text: 1 Ch 17:12
      metadata:
        usfm: 1CH.17.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Salomon qui lui bâtit une maison. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 8:27
      metadata:
        usfm: 1KI.8.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 17:24
      metadata:
        usfm: ACT.17.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Mais le Très-Haut n’habite pas dans ce qui est fait de main d’homme, comme dit le prophète:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: ' '
