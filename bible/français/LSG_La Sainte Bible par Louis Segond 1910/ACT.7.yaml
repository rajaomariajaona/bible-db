document_id: ACT.7,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-19: cf. Ac 6:9-15. Ps 105:7-25.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Le souverain sacrificateur dit: Les choses sont-elles ainsi? '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Mais Dieu fut avec lui, et le délivra de toutes ses tribulations; il lui donna de la sagesse et lui fit trouver grâce devant Pharaon, roi d’Égypte, qui '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 41:40
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'l’établit gouverneur d’Égypte et de toute sa maison. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 41:54
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 105:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Il survint une famine dans tout le pays d’Égypte, et dans celui de Canaan. La détresse était grande, et nos pères ne trouvaient pas de quoi se nourrir. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 42:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Jacob apprit qu’il y avait du blé en Égypte, et il y envoya nos pères une première fois. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 45:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Et la seconde fois, Joseph fut reconnu par ses frères, et Pharaon sut de quelle famille il était. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Puis Joseph envoya chercher son père Jacob, et toute sa famille, composée de soixante-quinze personnes. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 46:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Jacob descendit en Égypte, où il '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 49:33
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'mourut, ainsi que nos pères; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 50:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 13:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 24:32
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'et ils furent transportés à Sichem, et déposés dans le sépulcre '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 23:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'qu’Abraham avait acheté, à prix d’argent, des fils d’Hémor, père de Sichem. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Le temps approchait où devait s’accomplir la promesse que Dieu avait faite à Abraham, et le peuple '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 1:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 105:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 's’accrut et se multiplia en Égypte, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'jusqu’à ce que parut un autre roi, qui n’avait pas connu Joseph. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ce roi, usant d’artifice contre notre race, maltraita nos pères, au point de leur faire exposer leurs enfants, pour qu’ils ne vécussent pas.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 20-50: cf. (Hé 11:23-29. Ps 105:26-45; 106.) (Lu 16:29. Jn 5:45-47.) 1 R 8:12-27.'
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Étienne répondit: Hommes frères et pères, écoutez! Le Dieu de gloire apparut à notre père Abraham, lorsqu’il était en Mésopotamie, avant qu’il s’établît à Charran; et il lui dit: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 2:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 26:59
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 23:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 11:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'A cette époque, naquit Moïse, qui était beau aux yeux de Dieu. Il fut nourri trois mois dans la maison de son père; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'et, quand il eut été exposé, la fille de Pharaon le recueillit, et l’éleva comme son fils. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Moïse fut instruit dans toute la sagesse des Égyptiens, et il était puissant en paroles et en œuvres. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 2:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Il avait quarante ans, lorsqu’il lui vint dans le cœur de visiter ses frères, les fils d’Israël. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 2:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Il en vit un qu’on outrageait, et, prenant sa défense, il vengea celui qui était maltraité, et frappa l’Égyptien. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Il pensait que ses frères comprendraient que Dieu leur accordait la délivrance par sa main; mais ils ne comprirent pas. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 2:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Le jour suivant, il parut au milieu d’eux comme ils se battaient, et il les exhorta à la paix: Hommes, dit-il, vous êtes frères; pourquoi vous maltraitez-vous l’un l’autre? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Mais celui qui maltraitait son prochain le repoussa, en disant: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 2:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 21:23
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 4:7
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:35
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Qui t’a établi chef et juge sur nous? '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Veux-tu me tuer, comme tu as tué hier l’Égyptien? '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'A cette parole, Moïse prit la fuite, et il alla séjourner dans le pays de Madian, où il engendra deux fils. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 21:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Quitte ton pays et ta famille, et va dans le pays que je te montrerai. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 3:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Quarante ans plus tard, un ange lui apparut, au désert de la montagne de Sinaï, dans la flamme d’un buisson en feu. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Moïse, voyant cela, fut étonné de cette apparition; et, comme il s’approchait pour examiner, la voix du Seigneur se fit entendre: '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 3:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 22:32
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 11:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Je suis le Dieu de tes pères, le Dieu d’Abraham, d’Isaac et de Jacob. Et Moïse, tout tremblant, n’osait regarder. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Le Seigneur lui dit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 5:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Ote tes souliers de tes pieds, car le lieu sur lequel tu te tiens est une terre sainte. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'J’ai vu la souffrance de mon peuple qui est en Égypte, j’ai entendu ses gémissements, et je suis descendu pour le délivrer. Maintenant, va, je t’enverrai en Égypte. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Ce Moïse, qu’ils avaient renié, en disant: Qui t’a établi chef et juge? C’est lui que Dieu envoya comme chef et comme libérateur avec l’aide de l’ange qui lui était apparu dans le buisson. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 7:8
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '9'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '11'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '13'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'C’est lui qui les fit sortir d’Égypte, en opérant des prodiges et des miracles au pays d’Égypte, au sein de la mer Rouge, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 16:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 1:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'et au désert, pendant quarante ans. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'C’est ce Moïse qui dit aux fils d’Israël: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 18:15
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '18'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 1:46
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 3:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Dieu vous suscitera d’entre vos frères un prophète comme moi. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 19:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'C’est lui qui, lors de l’assemblée au désert, étant '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 3:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'avec l’ange qui lui parlait sur la montagne de Sinaï et avec nos pères, reçut des oracles vivants, pour nous les donner. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Nos pères ne voulurent pas lui obéir, ils le repoussèrent, et ils tournèrent leur cœur vers l’Égypte, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Il sortit alors du pays des Chaldéens, et s’établit à Charran. De là, après la mort de son père, Dieu le fit passer dans ce pays que vous habitez maintenant; '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'en disant à Aaron: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 32:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Fais-nous des dieux qui marchent devant nous; car ce Moïse qui nous a fait sortir du pays d’Égypte, nous ne savons ce qu’il est devenu. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Et, en ces jours-là, ils firent un veau, ils offrirent un sacrifice à l’idole, et se réjouirent de l’œuvre de leurs mains. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Alors Dieu se détourna, et les livra au culte de l’armée du ciel, selon qu’il est écrit dans le livre des prophètes:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Am 5:25
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: M’avez-vous offert des victimes et des sacrifices
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pendant quarante ans au désert, maison d’Israël?…
  '43':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Am 5:26
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '27'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Vous avez porté la tente de Moloch
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’étoile du dieu Remphan,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ces images que vous avez faites pour les adorer!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Aussi vous transporterai-je au-delà de Babylone. '
  '44':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
