      - type: text
        text: 23:22
      metadata:
        usfm: MAT.23.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Le ciel est mon trône,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la terre mon marchepied.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quelle maison me bâtirez-vous, dit le Seigneur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ou quel sera le lieu de mon repos?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 1:4
      metadata:
        usfm: GEN.1.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: N’est-ce pas ma main qui a fait toutes ces choses?…
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 51-60: cf. Mt 23:29-36. (2 Ti 4:6-8. Ap 2:10; 7:13-17.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
