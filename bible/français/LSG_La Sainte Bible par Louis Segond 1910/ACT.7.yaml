      metadata:
        usfm: JER.6.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Hommes au cou raide, incirconcis de cœur et d’oreilles! Vous vous opposez toujours au Saint-Esprit. Ce que vos pères ont été, vous l’êtes aussi. '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Lequel des prophètes vos pères n’ont-ils pas persécuté? Ils ont tué ceux qui annonçaient d’avance la venue du Juste, que vous avez livré maintenant, et dont vous avez été les meurtriers, '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 19:3
      metadata:
        usfm: EXO.19.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 24:3
      metadata:
        usfm: EXO.24.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 7:19
      metadata:
        usfm: JHN.7.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 3:19
      metadata:
        usfm: GAL.3.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 2:2
      metadata:
        usfm: HEB.2.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'vous qui avez reçu la loi d’après des commandements d’anges, et qui ne l’avez point gardée!… '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'En entendant ces paroles, ils étaient furieux dans leur cœur, et ils grinçaient des dents contre lui. '
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Mais Étienne, rempli du Saint-Esprit, et fixant les regards vers le ciel, vit la gloire de Dieu et Jésus debout à la droite de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'Et il dit: Voici, je vois les cieux ouverts, et le Fils de l’homme debout à la droite de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Ils poussèrent alors de grands cris, en se bouchant les oreilles, et ils se précipitèrent tous ensemble sur lui, '
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 21:13
      metadata:
        usfm: 1KI.21.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 4:29
      metadata:
        usfm: LUK.4.29
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'le traînèrent hors de la ville, et le lapidèrent. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 22:20
      metadata:
        usfm: ACT.22.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Les témoins déposèrent leurs vêtements aux pieds d’un jeune homme nommé Saul. '
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'Et ils lapidaient Étienne, qui priait et disait: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 31:6
      metadata:
        usfm: PSA.31.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 23:46
      metadata:
        usfm: LUK.23.46
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Seigneur Jésus, reçois mon esprit! '
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'Puis, s’étant mis à genoux, il s’écria d’une voix forte: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 5:44
      metadata:
        usfm: MAT.5.44
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 23:34
      metadata:
        usfm: LUK.23.34
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 4:12
      metadata:
        usfm: 1CO.4.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Seigneur, ne leur impute pas ce péché! Et, après ces paroles, il s’endormit.
