document_id: ACT.7
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-19: cf. Ac 6:9-15. Ps 105:7-25.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Le souverain sacrificateur dit: Les choses sont-elles ainsi? '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Étienne répondit: Hommes frères et pères, écoutez! Le Dieu de gloire apparut à notre père Abraham, lorsqu’il était en Mésopotamie, avant qu’il s’établît à Charran; et il lui dit: '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 21:1
      metadata:
        usfm: GEN.21.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Quitte ton pays et ta famille, et va dans le pays que je te montrerai. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il sortit alors du pays des Chaldéens, et s’établit à Charran. De là, après la mort de son père, Dieu le fit passer dans ce pays que vous habitez maintenant; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'il ne lui donna aucune propriété en ce pays, pas même de quoi poser le pied, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 12:7
      metadata:
        usfm: GEN.12.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 13:15
      metadata:
        usfm: GEN.13.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'mais il promit de lui en donner la possession, et à sa postérité après lui, quoiqu’il n’eût point d’enfant. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dieu parla ainsi: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 15:13
      metadata:
        usfm: GEN.15.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Sa postérité séjournera dans un pays étranger; on la réduira en servitude et on la maltraitera pendant '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 15:16
      metadata:
        usfm: GEN.15.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 12:40
      metadata:
        usfm: EXO.12.40
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 3:17
      metadata:
        usfm: GAL.3.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'quatre cents ans. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mais la nation à laquelle ils auront été asservis, c’est moi qui la jugerai, dit Dieu. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 15:16
      metadata:
        usfm: GEN.15.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Après cela, ils sortiront, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 3:12
      metadata:
        usfm: EXO.3.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ils me serviront dans ce lieu-ci. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Puis Dieu donna à Abraham '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 17:10
      metadata:
        usfm: GEN.17.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'l’alliance de la circoncision; et ainsi, Abraham, ayant '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 21:2
      metadata:
        usfm: GEN.21.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'engendré Isaac, le circoncit le huitième jour; Isaac '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 25:24
      metadata:
        usfm: GEN.25.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'engendra et circoncit Jacob, et Jacob '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 29:32
      metadata:
        usfm: GEN.29.32
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 30:5
      metadata:
        usfm: GEN.30.5
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 35:23
      metadata:
        usfm: GEN.35.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'les douze patriarches. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Les patriarches, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 37:4
      metadata:
        usfm: GEN.37.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'jaloux de Joseph, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 37:28
      metadata:
        usfm: GEN.37.28
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 105:17
      metadata:
        usfm: PSA.105.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'le vendirent pour être emmené en Égypte. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Mais Dieu fut avec lui, et le délivra de toutes ses tribulations; il lui donna de la sagesse et lui fit trouver grâce devant Pharaon, roi d’Égypte, qui '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 41:40
      metadata:
        usfm: GEN.41.40
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'l’établit gouverneur d’Égypte et de toute sa maison. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 41:54
      metadata:
        usfm: GEN.41.54
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 105:16
      metadata:
        usfm: PSA.105.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il survint une famine dans tout le pays d’Égypte, et dans celui de Canaan. La détresse était grande, et nos pères ne trouvaient pas de quoi se nourrir. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 42:1
      metadata:
        usfm: GEN.42.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Jacob apprit qu’il y avait du blé en Égypte, et il y envoya nos pères une première fois. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 45:4
      metadata:
        usfm: GEN.45.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Et la seconde fois, Joseph fut reconnu par ses frères, et Pharaon sut de quelle famille il était. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Puis Joseph envoya chercher son père Jacob, et toute sa famille, composée de soixante-quinze personnes. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 46:5
      metadata:
        usfm: GEN.46.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Jacob descendit en Égypte, où il '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 49:33
      metadata:
        usfm: GEN.49.33
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'mourut, ainsi que nos pères; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 50:13
      metadata:
        usfm: GEN.50.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 13:19
      metadata:
        usfm: EXO.13.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 24:32
      metadata:
        usfm: JOS.24.32
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et ils furent transportés à Sichem, et déposés dans le sépulcre '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 23:16
      metadata:
        usfm: GEN.23.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qu’Abraham avait acheté, à prix d’argent, des fils d’Hémor, père de Sichem. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Le temps approchait où devait s’accomplir la promesse que Dieu avait faite à Abraham, et le peuple '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 1:7
      metadata:
        usfm: EXO.1.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 105:24
      metadata:
        usfm: PSA.105.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 's’accrut et se multiplia en Égypte, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'jusqu’à ce que parut un autre roi, qui n’avait pas connu Joseph. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ce roi, usant d’artifice contre notre race, maltraita nos pères, au point de leur faire exposer leurs enfants, pour qu’ils ne vécussent pas.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 20-50: cf. (Hé 11:23-29. Ps 105:26-45; 106.) (Lu 16:29. Jn 5:45-47.) 1 R 8:12-27.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 2:2
      metadata:
        usfm: EXO.2.2
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 6:19
      metadata:
        usfm: EXO.6.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 26:59
      metadata:
        usfm: NUM.26.59
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 23:13
      metadata:
        usfm: 1CH.23.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 11:23
      metadata:
        usfm: HEB.11.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'A cette époque, naquit Moïse, qui était beau aux yeux de Dieu. Il fut nourri trois mois dans la maison de son père; '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'et, quand il eut été exposé, la fille de Pharaon le recueillit, et l’éleva comme son fils. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Moïse fut instruit dans toute la sagesse des Égyptiens, et il était puissant en paroles et en œuvres. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 2:11
      metadata:
        usfm: EXO.2.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il avait quarante ans, lorsqu’il lui vint dans le cœur de visiter ses frères, les fils d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 2:11
      metadata:
        usfm: EXO.2.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il en vit un qu’on outrageait, et, prenant sa défense, il vengea celui qui était maltraité, et frappa l’Égyptien. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Il pensait que ses frères comprendraient que Dieu leur accordait la délivrance par sa main; mais ils ne comprirent pas. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 2:13
      metadata:
        usfm: EXO.2.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Le jour suivant, il parut au milieu d’eux comme ils se battaient, et il les exhorta à la paix: Hommes, dit-il, vous êtes frères; pourquoi vous maltraitez-vous l’un l’autre? '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Mais celui qui maltraitait son prochain le repoussa, en disant: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 2:14
      metadata:
        usfm: EXO.2.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 21:23
      metadata:
        usfm: MAT.21.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 4:7
      metadata:
        usfm: ACT.4.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 7:35
      metadata:
        usfm: ACT.7.35
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Qui t’a établi chef et juge sur nous? '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Veux-tu me tuer, comme tu as tué hier l’Égyptien? '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'A cette parole, Moïse prit la fuite, et il alla séjourner dans le pays de Madian, où il engendra deux fils. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 3:2
      metadata:
        usfm: EXO.3.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Quarante ans plus tard, un ange lui apparut, au désert de la montagne de Sinaï, dans la flamme d’un buisson en feu. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Moïse, voyant cela, fut étonné de cette apparition; et, comme il s’approchait pour examiner, la voix du Seigneur se fit entendre: '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 3:6
      metadata:
        usfm: EXO.3.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 22:32
      metadata:
        usfm: MAT.22.32
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 11:16
      metadata:
        usfm: HEB.11.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Je suis le Dieu de tes pères, le Dieu d’Abraham, d’Isaac et de Jacob. Et Moïse, tout tremblant, n’osait regarder. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Le Seigneur lui dit: '
  - type: usfm
