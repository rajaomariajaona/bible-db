      metadata:
        usfm: PSA.89.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 13:22
      metadata:
        usfm: ACT.13.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'David trouva grâce devant Dieu, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 S 7:2
      metadata:
        usfm: 2SA.7.2
    - type: text
