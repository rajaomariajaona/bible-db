      metadata:
        usfm: JHN.1.46
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 3:22
      metadata:
        usfm: ACT.3.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Dieu vous suscitera d’entre vos frères un prophète comme moi. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 19:3
      metadata:
        usfm: EXO.19.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'C’est lui qui, lors de l’assemblée au désert, étant '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 3:19
      metadata:
        usfm: GAL.3.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'avec l’ange qui lui parlait sur la montagne de Sinaï et avec nos pères, reçut des oracles vivants, pour nous les donner. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Nos pères ne voulurent pas lui obéir, ils le repoussèrent, et ils tournèrent leur cœur vers l’Égypte, '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'en disant à Aaron: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 32:1
      metadata:
        usfm: EXO.32.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Fais-nous des dieux qui marchent devant nous; car ce Moïse qui nous a fait sortir du pays d’Égypte, nous ne savons ce qu’il est devenu. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Et, en ces jours-là, ils firent un veau, ils offrirent un sacrifice à l’idole, et se réjouirent de l’œuvre de leurs mains. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Alors Dieu se détourna, et les livra au culte de l’armée du ciel, selon qu’il est écrit dans le livre des prophètes:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Am 5:25
      metadata:
        usfm: AMO.5.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: M’avez-vous offert des victimes et des sacrifices
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pendant quarante ans au désert, maison d’Israël?…
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
