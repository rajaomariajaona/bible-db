      metadata:
        usfm: EXO.7.9
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '10'
      metadata:
        usfm: EXO.7.10
    - type: text
      text: ', '
    - type: usfm
      marker: ref
