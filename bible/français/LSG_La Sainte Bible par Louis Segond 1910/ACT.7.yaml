document_id: ACT.7,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-19: cf. Ac 6:9-15. Ps 105:7-25.'
  - type: text
    content: 'Le souverain sacrificateur dit: Les choses sont-elles ainsi? '
  '10':
  - type: text
    content: 'Mais Dieu fut avec lui, et le délivra de toutes ses tribulations; il lui donna de la sagesse et lui fit trouver grâce devant Pharaon, roi d’Égypte, qui '
  - type: note
    content: Ge 41:40.
  - type: text
    content: 'l’établit gouverneur d’Égypte et de toute sa maison. '
  '11':
  - type: note
    content: Ge 41:54. Ps 105:16.
  - type: text
    content: 'Il survint une famine dans tout le pays d’Égypte, et dans celui de Canaan. La détresse était grande, et nos pères ne trouvaient pas de quoi se nourrir. '
  '12':
  - type: note
    content: Ge 42:1.
  - type: text
    content: 'Jacob apprit qu’il y avait du blé en Égypte, et il y envoya nos pères une première fois. '
  '13':
  - type: note
    content: Ge 45:4.
  - type: text
    content: 'Et la seconde fois, Joseph fut reconnu par ses frères, et Pharaon sut de quelle famille il était. '
  '14':
  - type: text
    content: 'Puis Joseph envoya chercher son père Jacob, et toute sa famille, composée de soixante-quinze personnes. '
  '15':
  - type: note
    content: Ge 46:5.
  - type: text
    content: 'Jacob descendit en Égypte, où il '
  - type: note
    content: Ge 49:33.
  - type: text
    content: 'mourut, ainsi que nos pères; '
  '16':
  - type: note
    content: Ge 50:13. Ex 13:19. Jos 24:32.
  - type: text
    content: 'et ils furent transportés à Sichem, et déposés dans le sépulcre '
  - type: note
    content: Ge 23:16.
  - type: text
    content: 'qu’Abraham avait acheté, à prix d’argent, des fils d’Hémor, père de Sichem. '
  '17':
  - type: text
    content: 'Le temps approchait où devait s’accomplir la promesse que Dieu avait faite à Abraham, et le peuple '
  - type: note
    content: Ex 1:7. Ps 105:24.
  - type: text
    content: 's’accrut et se multiplia en Égypte, '
  '18':
  - type: text
    content: 'jusqu’à ce que parut un autre roi, qui n’avait pas connu Joseph. '
  '19':
  - type: text
    content: Ce roi, usant d’artifice contre notre race, maltraita nos pères, au point de leur faire exposer leurs enfants, pour qu’ils ne vécussent pas.
  - type: heading
    content: 'V. 20-50: cf. (Hé 11:23-29. Ps 105:26-45; 106.) (Lu 16:29. Jn 5:45-47.) 1 R 8:12-27.'
  '2':
  - type: text
    content: 'Étienne répondit: Hommes frères et pères, écoutez! Le Dieu de gloire apparut à notre père Abraham, lorsqu’il était en Mésopotamie, avant qu’il s’établît à Charran; et il lui dit: '
  '20':
  - type: text
    content: ' '
  - type: note
    content: Ex 2:2; 6:19. No 26:59. 1 Ch 23:13. Hé 11:23.
  - type: text
    content: 'A cette époque, naquit Moïse, qui était beau aux yeux de Dieu. Il fut nourri trois mois dans la maison de son père; '
  '21':
  - type: text
    content: 'et, quand il eut été exposé, la fille de Pharaon le recueillit, et l’éleva comme son fils. '
  '22':
  - type: text
    content: 'Moïse fut instruit dans toute la sagesse des Égyptiens, et il était puissant en paroles et en œuvres. '
  '23':
  - type: note
    content: Ex 2:11.
  - type: text
    content: 'Il avait quarante ans, lorsqu’il lui vint dans le cœur de visiter ses frères, les fils d’Israël. '
  '24':
  - type: note
    content: Ex 2:11.
  - type: text
    content: 'Il en vit un qu’on outrageait, et, prenant sa défense, il vengea celui qui était maltraité, et frappa l’Égyptien. '
  '25':
  - type: text
    content: 'Il pensait que ses frères comprendraient que Dieu leur accordait la délivrance par sa main; mais ils ne comprirent pas. '
  '26':
  - type: note
    content: Ex 2:13.
  - type: text
    content: 'Le jour suivant, il parut au milieu d’eux comme ils se battaient, et il les exhorta à la paix: Hommes, dit-il, vous êtes frères; pourquoi vous maltraitez-vous l’un l’autre? '
  '27':
  - type: text
    content: 'Mais celui qui maltraitait son prochain le repoussa, en disant: '
  - type: note
    content: Ex 2:14. Mt 21:23. Ac 4:7; 7:35.
  - type: text
    content: 'Qui t’a établi chef et juge sur nous? '
  '28':
  - type: text
    content: 'Veux-tu me tuer, comme tu as tué hier l’Égyptien? '
  '29':
  - type: text
    content: 'A cette parole, Moïse prit la fuite, et il alla séjourner dans le pays de Madian, où il engendra deux fils. '
  '3':
  - type: note
    content: Ge 21:1.
  - type: text
    content: 'Quitte ton pays et ta famille, et va dans le pays que je te montrerai. '
  '30':
  - type: note
    content: Ex 3:2.
  - type: text
    content: 'Quarante ans plus tard, un ange lui apparut, au désert de la montagne de Sinaï, dans la flamme d’un buisson en feu. '
  '31':
  - type: text
    content: 'Moïse, voyant cela, fut étonné de cette apparition; et, comme il s’approchait pour examiner, la voix du Seigneur se fit entendre: '
  '32':
  - type: note
    content: Ex 3:6. Mt 22:32. Hé 11:16.
  - type: text
    content: 'Je suis le Dieu de tes pères, le Dieu d’Abraham, d’Isaac et de Jacob. Et Moïse, tout tremblant, n’osait regarder. '
  '33':
  - type: text
    content: 'Le Seigneur lui dit: '
  - type: note
    content: Jos 5:15.
  - type: text
    content: 'Ote tes souliers de tes pieds, car le lieu sur lequel tu te tiens est une terre sainte. '
  '34':
  - type: text
    content: 'J’ai vu la souffrance de mon peuple qui est en Égypte, j’ai entendu ses gémissements, et je suis descendu pour le délivrer. Maintenant, va, je t’enverrai en Égypte. '
  '35':
  - type: text
    content: 'Ce Moïse, qu’ils avaient renié, en disant: Qui t’a établi chef et juge? C’est lui que Dieu envoya comme chef et comme libérateur avec l’aide de l’ange qui lui était apparu dans le buisson. '
  '36':
  - type: note
    content: Ex 7:8, 9, 10, 11, 13, 14.
  - type: text
    content: 'C’est lui qui les fit sortir d’Égypte, en opérant des prodiges et des miracles au pays d’Égypte, au sein de la mer Rouge, '
  - type: note
    content: Ex 16:1. De 1:3.
  - type: text
    content: 'et au désert, pendant quarante ans. '
  '37':
  - type: text
    content: 'C’est ce Moïse qui dit aux fils d’Israël: '
  - type: note
    content: De 18:15, 18. Jn 1:46. Ac 3:22.
  - type: text
    content: 'Dieu vous suscitera d’entre vos frères un prophète comme moi. '
  '38':
  - type: note
    content: Ex 19:3.
  - type: text
    content: 'C’est lui qui, lors de l’assemblée au désert, étant '
  - type: note
    content: Ga 3:19.
  - type: text
    content: 'avec l’ange qui lui parlait sur la montagne de Sinaï et avec nos pères, reçut des oracles vivants, pour nous les donner. '
  '39':
  - type: text
    content: 'Nos pères ne voulurent pas lui obéir, ils le repoussèrent, et ils tournèrent leur cœur vers l’Égypte, '
  '4':
  - type: text
    content: 'Il sortit alors du pays des Chaldéens, et s’établit à Charran. De là, après la mort de son père, Dieu le fit passer dans ce pays que vous habitez maintenant; '
  '40':
  - type: text
    content: 'en disant à Aaron: '
  - type: note
    content: Ex 32:1.
  - type: text
    content: 'Fais-nous des dieux qui marchent devant nous; car ce Moïse qui nous a fait sortir du pays d’Égypte, nous ne savons ce qu’il est devenu. '
  '41':
  - type: text
    content: 'Et, en ces jours-là, ils firent un veau, ils offrirent un sacrifice à l’idole, et se réjouirent de l’œuvre de leurs mains. '
  '42':
  - type: text
    content: 'Alors Dieu se détourna, et les livra au culte de l’armée du ciel, selon qu’il est écrit dans le livre des prophètes:'
  - type: note
    content: Am 5:25.
  - type: text
    content: M’avez-vous offert des victimes et des sacrifices
  - type: text
    content: Pendant quarante ans au désert, maison d’Israël?…
  '43':
  - type: text
    content: ' '
  - type: note
    content: Am 5:26, 27.
  - type: text
    content: Vous avez porté la tente de Moloch
  - type: text
    content: Et l’étoile du dieu Remphan,
  - type: text
    content: Ces images que vous avez faites pour les adorer!
  - type: text
    content: 'Aussi vous transporterai-je au-delà de Babylone. '
  '44':
  - type: text
    content: 'Nos pères avaient au désert le tabernacle du témoignage, comme l’avait ordonné celui qui dit à Moïse de le faire '
  - type: note
    content: Ex 25:40. Hé 8:5.
  - type: text
    content: 'd’après le modèle qu’il avait vu. '
  '45':
  - type: note
    content: Jos 3:14.
  - type: text
    content: 'Et nos pères, l’ayant reçu, l’introduisirent, sous la conduite de Josué, dans le pays qui était possédé par les nations que Dieu chassa devant eux, et il y resta jusqu’aux jours de David. '
  '46':
  - type: note
    content: 1 S 16:1. Ps 89:21. Ac 13:22.
  - type: text
    content: 'David trouva grâce devant Dieu, et '
  - type: note
    content: 2 S 7:2. 1 Ch 17:1. Ps 132:5.
  - type: text
    content: 'demanda d’élever une demeure pour le Dieu de Jacob; '
  '47':
  - type: text
    content: 'et ce fut '
  - type: note
    content: 1 Ch 6:1. 1 Ch 17:12.
  - type: text
    content: 'Salomon qui lui bâtit une maison. '
  '48':
  - type: note
    content: 1 R 8:27. Ac 17:24.
  - type: text
    content: 'Mais le Très-Haut n’habite pas dans ce qui est fait de main d’homme, comme dit le prophète:'
  '49':
  - type: text
    content: ' '
  - type: note
    content: 2 Ch 6:33. És 66:1. Mt 5:34; 23:22.
  - type: text
    content: Le ciel est mon trône,
  - type: text
    content: Et la terre mon marchepied.
  - type: text
    content: Quelle maison me bâtirez-vous, dit le Seigneur,
  - type: text
    content: Ou quel sera le lieu de mon repos?
  '5':
  - type: text
    content: 'il ne lui donna aucune propriété en ce pays, pas même de quoi poser le pied, '
  - type: note
    content: Ge 12:7; 13:15.
  - type: text
    content: 'mais il promit de lui en donner la possession, et à sa postérité après lui, quoiqu’il n’eût point d’enfant. '
  '50':
  - type: text
    content: ' '
  - type: note
    content: Ge 1:4.
  - type: text
    content: N’est-ce pas ma main qui a fait toutes ces choses?…
  - type: heading
    content: 'V. 51-60: cf. Mt 23:29-36. (2 Ti 4:6-8. Ap 2:10; 7:13-17.)'
  '51':
  - type: text
    content: ' '
  - type: note
    content: Né 9:16, 17. Jé 6:10.
  - type: text
    content: 'Hommes au cou raide, incirconcis de cœur et d’oreilles! Vous vous opposez toujours au Saint-Esprit. Ce que vos pères ont été, vous l’êtes aussi. '
  '52':
  - type: text
    content: 'Lequel des prophètes vos pères n’ont-ils pas persécuté? Ils ont tué ceux qui annonçaient d’avance la venue du Juste, que vous avez livré maintenant, et dont vous avez été les meurtriers, '
  '53':
  - type: note
    content: Ex 19:3; 24:3. Jn 7:19. Ga 3:19. Hé 2:2.
  - type: text
    content: 'vous qui avez reçu la loi d’après des commandements d’anges, et qui ne l’avez point gardée!… '
  '54':
  - type: text
    content: 'En entendant ces paroles, ils étaient furieux dans leur cœur, et ils grinçaient des dents contre lui. '
  '55':
  - type: text
    content: 'Mais Étienne, rempli du Saint-Esprit, et fixant les regards vers le ciel, vit la gloire de Dieu et Jésus debout à la droite de Dieu. '
  '56':
  - type: text
    content: 'Et il dit: Voici, je vois les cieux ouverts, et le Fils de l’homme debout à la droite de Dieu. '
  '57':
  - type: text
    content: 'Ils poussèrent alors de grands cris, en se bouchant les oreilles, et ils se précipitèrent tous ensemble sur lui, '
  '58':
  - type: note
    content: 1 R 21:13. Lu 4:29.
  - type: text
    content: 'le traînèrent hors de la ville, et le lapidèrent. '
  - type: note
    content: Ac 22:20.
  - type: text
    content: 'Les témoins déposèrent leurs vêtements aux pieds d’un jeune homme nommé Saul. '
  '59':
  - type: text
    content: 'Et ils lapidaient Étienne, qui priait et disait: '
  - type: note
    content: Ps 31:6. Lu 23:46.
  - type: text
    content: 'Seigneur Jésus, reçois mon esprit! '
  '6':
  - type: text
    content: 'Dieu parla ainsi: '
  - type: note
    content: Ge 15:13.
  - type: text
    content: 'Sa postérité séjournera dans un pays étranger; on la réduira en servitude et on la maltraitera pendant '
  - type: note
    content: Ge 15:16. Ex 12:40. Ga 3:17.
  - type: text
    content: 'quatre cents ans. '
  '60':
  - type: text
    content: 'Puis, s’étant mis à genoux, il s’écria d’une voix forte: '
  - type: note
    content: Mt 5:44. Lu 23:34. 1 Co 4:12.
  - type: text
    content: Seigneur, ne leur impute pas ce péché! Et, après ces paroles, il s’endormit.
  '7':
  - type: text
    content: 'Mais la nation à laquelle ils auront été asservis, c’est moi qui la jugerai, dit Dieu. '
  - type: note
    content: Ge 15:16.
  - type: text
    content: 'Après cela, ils sortiront, et '
  - type: note
    content: Ex 3:12.
  - type: text
    content: 'ils me serviront dans ce lieu-ci. '
  '8':
  - type: text
    content: 'Puis Dieu donna à Abraham '
  - type: note
    content: Ge 17:10.
  - type: text
    content: 'l’alliance de la circoncision; et ainsi, Abraham, ayant '
  - type: note
    content: Ge 21:2.
  - type: text
    content: 'engendré Isaac, le circoncit le huitième jour; Isaac '
  - type: note
    content: Ge 25:24.
  - type: text
    content: 'engendra et circoncit Jacob, et Jacob '
  - type: note
    content: Ge 29:32; 30:5; 35:23.
  - type: text
    content: 'les douze patriarches. '
  '9':
  - type: text
    content: 'Les patriarches, '
  - type: note
    content: Ge 37:4.
  - type: text
    content: 'jaloux de Joseph, '
  - type: note
    content: Ge 37:28. Ps 105:17.
  - type: text
    content: 'le vendirent pour être emmené en Égypte. '
