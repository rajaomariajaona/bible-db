      metadata:
        usfm: AMO.5.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Vous avez porté la tente de Moloch
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et l’étoile du dieu Remphan,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ces images que vous avez faites pour les adorer!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Aussi vous transporterai-je au-delà de Babylone. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Nos pères avaient au désert le tabernacle du témoignage, comme l’avait ordonné celui qui dit à Moïse de le faire '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 25:40
      metadata:
        usfm: EXO.25.40
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 8:5
      metadata:
        usfm: HEB.8.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'd’après le modèle qu’il avait vu. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 3:14
      metadata:
        usfm: JOS.3.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Et nos pères, l’ayant reçu, l’introduisirent, sous la conduite de Josué, dans le pays qui était possédé par les nations que Dieu chassa devant eux, et il y resta jusqu’aux jours de David. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
