document_id: 1KI.3,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mariage de Salomon avec la fille du roi d’Égypte. Le songe de Salomon
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-15: cf. (2 Ch 1:1-13. 1 R 4:29-34.) Ps 119:125. (Ja 1:5. Mt 6:33.) 1 Co 14:12.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Salomon s’allia par mariage avec Pharaon, roi d’Égypte. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 7:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Il prit pour femme la fille de Pharaon, et il l’amena dans la ville de David, jusqu’à ce qu’il eût achevé de bâtir sa maison, la maison de l’Éternel, et le mur d’enceinte de Jérusalem. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Cette demande de Salomon plut au Seigneur. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 1:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Et Dieu lui dit: Puisque c’est là ce que tu demandes, puisque tu ne demandes pour toi ni une longue vie, ni les richesses, ni la mort de tes ennemis, et que tu demandes de l’intelligence pour exercer la justice, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'voici, j’agirai selon ta parole. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ec 1:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Je te donnerai un cœur sage et intelligent, de telle sorte qu’il n’y aura eu personne avant toi et qu’on ne verra jamais personne de semblable à toi. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 6:33
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 3:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Je te donnerai, en outre, ce que tu n’as pas demandé, des richesses et de la gloire, de telle sorte qu’il n’y aura pendant toute ta vie aucun roi qui soit ton pareil. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Et si tu marches dans mes voies, en observant mes lois et mes commandements, comme l’a fait David, ton père, je prolongerai tes jours. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Salomon s’éveilla. Et voilà le songe. Salomon revint à Jérusalem, et se présenta devant l’arche de l’alliance de l’Éternel. Il offrit des holocaustes et des sacrifices d’actions de grâces, et il fit un festin à tous ses serviteurs.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le jugement de Salomon
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 16-28: cf. Ps 72:1-4. Pr 25:2; 16:10. (Lu 12:2. Ro 2:16.)'
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Alors deux femmes prostituées vinrent chez le roi, et se présentèrent devant lui. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'L’une des femmes dit: Pardon! Mon seigneur, moi et cette femme nous demeurions dans la même maison, et je suis accouchée près d’elle dans la maison. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Trois jours après, cette femme est aussi accouchée. Nous habitions ensemble, aucun étranger n’était avec nous dans la maison, il n’y avait que nous deux. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Le fils de cette femme est mort pendant la nuit, parce qu’elle s’était couchée sur lui. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Le peuple ne sacrifiait que sur les hauts lieux, car '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 12:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'jusqu’à cette époque il n’avait point été bâti de maison au nom de l’Éternel. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Elle s’est levée au milieu de la nuit, elle a pris mon fils à mes côtés tandis que ta servante dormait, et elle l’a couché dans son sein; et son fils qui était mort, elle l’a couché dans mon sein. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Le matin, je me suis levée pour allaiter mon fils; et voici, il était mort. Je l’ai regardé attentivement le matin; et voici, ce n’était pas mon fils que j’avais enfanté. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'L’autre femme dit: Au contraire! C’est mon fils qui est vivant, et c’est ton fils qui est mort. Mais la première répliqua: Nullement! C’est ton fils qui est mort, et c’est mon fils qui est vivant. C’est ainsi qu’elles parlèrent devant le roi. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Le roi dit: L’une dit: C’est mon fils qui est vivant, et c’est ton fils qui est mort; et l’autre dit: Nullement! C’est ton fils qui est mort, et c’est mon fils qui est vivant. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Puis il ajouta: Apportez-moi une épée. On apporta une épée devant le roi. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Et le roi dit: Coupez en deux l’enfant qui vit, et donnez-en la moitié à l’une et la moitié à l’autre. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Alors la femme dont le fils était vivant sentit ses entrailles s’émouvoir pour son fils, et elle dit au roi: Ah! Mon seigneur, donnez-lui l’enfant qui vit, et ne le faites point mourir. Mais l’autre dit: Il ne sera ni à moi ni à toi; coupez-le! '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Et le roi, prenant la parole, dit: Donnez à la première l’enfant qui vit, et ne le faites point mourir. C’est elle qui est sa mère. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Tout Israël apprit le jugement que le roi avait prononcé. Et l’on craignit le roi, car on vit que la sagesse de Dieu était en lui pour le diriger dans ses jugements.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Salomon aimait l’Éternel, et suivait les coutumes de David, son père. Seulement c’était sur les hauts lieux qu’il offrait des sacrifices et des parfums. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 1:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Le roi se rendit à Gabaon pour y sacrifier, car c’était le principal des hauts lieux. Salomon offrit mille holocaustes sur l’autel. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 9:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'A Gabaon, l’Éternel apparut en songe à Salomon pendant la nuit, et Dieu lui dit: Demande ce que tu veux que je te donne. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Salomon répondit: Tu as traité avec une grande bienveillance ton serviteur David, mon père, parce qu’il marchait en ta présence dans la fidélité, dans la justice, et dans la droiture de cœur envers toi; tu lui as conservé cette grande bienveillance, et tu lui as donné un fils qui est assis sur son trône, comme on le voit aujourd’hui. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 1:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Maintenant, Éternel mon Dieu, tu as fait régner ton serviteur à la place de David, mon père; et moi je ne suis qu’un jeune homme, je n’ai point d’expérience. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 1:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Ton serviteur est au milieu du peuple que tu as choisi, peuple immense, qui ne peut être ni compté ni nombré, à cause de sa multitude. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Accorde donc à ton serviteur un cœur intelligent pour juger ton peuple, pour discerner le bien du mal! Car qui pourrait juger ton peuple, ce peuple si nombreux? '
