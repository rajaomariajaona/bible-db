document_id: EXO.4
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-17: cf. Jé 1:4-9, 17-19. Ex 4:27-31.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Moïse répondit, et dit: Voici, ils ne me croiront point, et ils n’écouteront point ma voix. Mais ils diront: L’Éternel ne t’est point apparu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'L’Éternel lui dit: Qu’y a-t-il dans ta main? Il répondit: Une verge. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'L’Éternel dit: Jette-la par terre. Il la jeta par terre, et elle devint un serpent. Moïse fuyait devant lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'L’Éternel dit à Moïse: Étends ta main, et saisis-le par la queue. Il étendit la main et le saisit et le serpent redevint une verge dans sa main. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'C’est là, dit l’Éternel, ce que tu feras, afin qu’ils croient que l’Éternel, le Dieu de leurs pères, t’est apparu, le Dieu d’Abraham, le Dieu d’Isaac et le Dieu de Jacob. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'L’Éternel lui dit encore: Mets ta main dans ton sein. Il mit sa main dans son sein; puis il la retira, et voici, sa main était couverte de lèpre, blanche comme la neige. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'L’Éternel dit: Remets ta main dans ton sein. Il remit sa main dans son sein; puis il la retira de son sein, et voici, elle était redevenue comme sa chair. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'S’ils ne te croient pas, dit l’Éternel, et n’écoutent pas la voix du premier signe, ils croiront à la voix du dernier signe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'S’ils ne croient pas même à ces deux signes, et n’écoutent pas ta voix, tu prendras de l’eau du fleuve, tu la répandras sur la terre, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 7:19
      metadata:
        usfm: EXO.7.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'l’eau que tu auras prise du fleuve deviendra du sang sur la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Moïse dit à l’Éternel: Ah! Seigneur, je ne suis pas un homme qui ait la parole facile, et ce n’est ni d’hier ni d’avant-hier, ni même depuis que tu parles à ton serviteur; car j’ai la bouche et la langue embarrassées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'L’Éternel lui dit: Qui a fait la bouche de l’homme? Et qui rend muet ou sourd, voyant ou aveugle? N’est-ce pas moi, l’Éternel? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Va donc, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 10:19
      metadata:
        usfm: MAT.10.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 13:11
      metadata:
        usfm: MRK.13.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 12:12
      metadata:
        usfm: LUK.12.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'je serai avec ta bouche, et je t’enseignerai ce que tu auras à dire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Moïse dit: Ah! Seigneur, envoie qui tu voudras envoyer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Alors la colère de l’Éternel s’enflamma contre Moïse, et il dit: N’y a t-il pas ton frère Aaron, le Lévite? Je sais qu’il parlera facilement. Le voici lui-même, qui vient au-devant de toi; et, quand il te verra, il se réjouira dans son cœur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 7:2
      metadata:
        usfm: EXO.7.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu lui parleras, et tu mettras les paroles dans sa bouche; et moi, je serai avec ta bouche et avec sa bouche, et je vous enseignerai ce que vous aurez à faire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il parlera pour toi au peuple; il te servira de bouche, et tu tiendras pour lui la place de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Prends dans ta main cette verge, avec laquelle tu feras les signes.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Retour de Moïse en Égypte
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 18-26: cf. Ex 2:15-23. Mt 2:20, 21. (Ge 17:10-14. Ex 18:1-5.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Moïse s’en alla; et de retour auprès de Jéthro, son beau-père, il lui dit: Laisse-moi, je te prie, aller rejoindre mes frères qui sont en Égypte, afin que je voie s’ils sont encore vivants. Jéthro dit à Moïse: Va en paix. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'L’Éternel dit à Moïse, en Madian: Va, retourne en Égypte, car tous ceux qui en voulaient à ta vie sont morts. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Moïse prit sa femme et ses fils, les fit monter sur des ânes, et retourna dans le pays d’Égypte. Il prit dans sa main la verge de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'L’Éternel dit à Moïse: En partant pour retourner en Égypte, vois tous les prodiges que je mets en ta main: tu les feras devant Pharaon. Et moi, j’endurcirai son cœur, et il ne laissera point aller le peuple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Tu diras à Pharaon: Ainsi parle l’Éternel: Israël est mon fils, mon premier-né. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Je te dis: Laisse aller mon fils, pour qu’il me serve; si tu refuses de le laisser aller, voici, je ferai périr ton fils, ton premier-né. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Pendant le voyage, en un lieu où Moïse passa la nuit, l’Éternel l’attaqua et voulut le faire mourir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Séphora prit une pierre aiguë, coupa le prépuce de son fils, et le jeta aux pieds de Moïse, en disant: Tu es pour moi un époux de sang! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Et l’Éternel le laissa. C’est alors qu’elle dit: Époux de sang! À cause de la circoncision.'
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 27-31: cf. (Ex 3:16, 17; 4:1-17.) (És 52:7; 61:1, 2.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'L’Éternel dit à Aaron: Va dans le désert au-devant de Moïse. Aaron partit; il rencontra Moïse à la montagne de Dieu, et il le baisa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Moïse fit connaître à Aaron toutes les paroles de l’Éternel qui l’avait envoyé, et tous les signes qu’il lui avait ordonné de faire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Moïse et Aaron poursuivirent leur chemin, et ils assemblèrent tous les anciens des enfants d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Aaron rapporta toutes les paroles que l’Éternel avait dites à Moïse, et il exécuta les signes aux yeux du peuple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Et le peuple crut. Ils apprirent que l’Éternel avait visité les enfants d’Israël, qu’il avait vu leur souffrance; et ils s’inclinèrent et se prosternèrent.
