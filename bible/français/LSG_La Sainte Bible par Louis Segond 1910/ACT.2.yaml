    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Après avoir entendu ce discours, ils eurent le cœur vivement touché, et ils dirent à Pierre et aux autres apôtres: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 16:30
      metadata:
        usfm: ACT.16.30
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Hommes frères, que ferons-nous? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Pierre leur dit: Repentez-vous, et que chacun de vous soit baptisé au nom de Jésus-Christ, pour le pardon de vos péchés; et vous recevrez le don du Saint-Esprit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Car la promesse est pour vous, pour vos '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Joë 2:28
      metadata:
        usfm: JOL.2.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'enfants, et pour tous ceux '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 2:13
      metadata:
        usfm: EPH.2.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qui sont au loin, en aussi grand nombre que le Seigneur notre Dieu les appellera. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Et, par plusieurs autres paroles, il les conjurait et les exhortait, disant: Sauvez-vous de cette génération perverse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ceux qui acceptèrent sa parole furent baptisés; et, en ce jour-là, le nombre des disciples s’augmenta d’environ trois mille âmes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ils persévéraient dans l’enseignement des apôtres, dans la communion fraternelle, dans la fraction du pain, et dans les prières. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'La crainte s’emparait de chacun, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 16:17
      metadata:
        usfm: MRK.16.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 5:12
      metadata:
        usfm: ACT.5.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'il se faisait beaucoup de prodiges et de miracles par les apôtres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
