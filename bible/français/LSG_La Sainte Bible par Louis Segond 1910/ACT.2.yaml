  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or, il y avait en séjour à Jérusalem des Juifs, hommes pieux, de toutes les nations qui sont sous le ciel. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Au bruit qui eut lieu, la multitude accourut, et elle fut confondue parce que chacun les entendait parler dans sa propre langue. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils étaient tous dans l’étonnement et la surprise, et ils se disaient les uns aux autres: Voici, ces gens qui parlent ne sont-ils pas tous Galiléens? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et comment les entendons-nous dans notre propre langue à chacun, dans notre langue maternelle? '
  '9':
