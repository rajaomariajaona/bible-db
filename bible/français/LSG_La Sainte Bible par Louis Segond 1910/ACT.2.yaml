document_id: ACT.2,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Effusion du Saint-Esprit, le jour de la Pentecôte. — Discours de Pierre, et conversion de trois mille personnes. Les premiers chrétiens
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-21: cf. (Joë 2:28-32. Mt 3:11. Jn 14:16, 17, 26.) 1 Co 12:13.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le jour de la '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 23:15
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 16:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Pentecôte, ils étaient '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 1:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'tous ensemble dans le même lieu. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'la Phrygie, la Pamphylie, l’Égypte, le territoire de la Libye voisine de Cyrène, et ceux qui sont venus de Rome, Juifs et prosélytes, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Crétois et Arabes, comment les entendons-nous parler dans nos langues des merveilles de Dieu? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils étaient tous dans l’étonnement, et, ne sachant que penser, ils se disaient les uns aux autres: Que veut dire ceci? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais d’autres se moquaient, et disaient: Ils sont pleins de vin doux. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Pierre, se présentant avec les onze, éleva la voix, et leur parla en ces termes: Hommes Juifs, et vous tous qui séjournez à Jérusalem, sachez ceci, et prêtez l’oreille à mes paroles! '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ces gens ne sont pas ivres, comme vous le supposez, car c’est la troisième heure du jour. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais c’est ici ce qui a été dit par le prophète Joël:'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 44:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 11:19
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 36:27
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Joë 2:28
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Za 12:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 7:38
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Dans les derniers jours, dit Dieu, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 10:45
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: je répandrai de mon Esprit sur toute chair;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Vos fils et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 2:36
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 21:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: vos filles prophétiseront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vos jeunes gens auront des visions,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et vos vieillards auront des songes.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, sur mes serviteurs et sur mes servantes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans ces jours-là, je répandrai de mon Esprit; et ils prophétiseront.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ferai paraître des prodiges en haut dans le ciel et des miracles en bas sur la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Du sang, du feu, et une vapeur de fumée;
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tout à coup il vint du ciel un bruit comme celui d’un vent impétueux, et il remplit toute la maison où ils étaient assis. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le soleil se changera en ténèbres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la lune en sang,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avant l’arrivée du jour du Seigneur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De ce jour grand et glorieux.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Joë 2:32
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 10:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Alors quiconque invoquera le nom du Seigneur sera sauvé.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 22-36: cf. (Ac 1:8. Lu 24:47.) (Ac 3:13-26; 10:34-43; 13:23-41.)'
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Hommes Israélites, écoutez ces paroles! Jésus de Nazareth, cet homme à qui Dieu a rendu témoignage devant vous par les miracles, les prodiges et les signes qu’il a opérés par lui au milieu de vous, comme vous le savez vous-mêmes; '
  '23':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'cet homme, livré '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 4:28
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'selon le dessein arrêté et selon la prescience de Dieu, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 5:30
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'vous l’avez crucifié, vous l’avez fait mourir par la main des impies. '
  '24':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 10:40
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Dieu l’a ressuscité, en le délivrant des liens de la mort, parce qu’il n’était pas possible qu’il fût retenu par elle. '
  '25':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Car David dit de lui:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 16:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Je voyais constamment le Seigneur devant moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce qu’il est à ma droite, afin que je ne sois point ébranlé.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aussi mon cœur est dans la joie, et ma langue dans l’allégresse;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et même ma chair reposera avec espérance,
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car tu n’abandonneras pas mon âme dans le séjour des morts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tu ne permettras pas que ton Saint voie la corruption.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu m’as fait connaître les sentiers de la vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu me rempliras de joie par ta présence.
  '29':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Hommes frères, qu’il me soit permis de vous dire librement, au sujet du patriarche David, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 2:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 13:36
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'qu’il est mort, qu’il a été enseveli, et que son sépulcre existe encore aujourd’hui parmi nous. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Des langues, semblables à des langues de feu, leur apparurent, séparées les unes des autres, et se posèrent sur chacun d’eux. '
  '30':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Comme il était prophète, et qu’il savait '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 7:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 132:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 1:32
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 13:23
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 1:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ti 2:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'que Dieu lui avait promis avec serment de faire asseoir un de ses descendants sur son trône, '
  '31':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'c’est la résurrection du Christ qu’il a prévue et annoncée, en disant '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 16:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 13:35
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'qu’il ne serait pas abandonné dans le séjour des morts et que sa chair ne verrait pas la corruption. '
  '32':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'C’est ce Jésus que Dieu a ressuscité; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 15:27
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 1:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'nous en sommes tous témoins. '
  '33':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 5:31
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ph 2:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Élevé par la droite de Dieu, il a reçu du Père le Saint-Esprit qui avait été '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 1:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'promis, et il l’a '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 10:45
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'répandu, comme vous le voyez et l’entendez. '
  '34':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Car David n’est point monté au ciel, mais il dit lui-même:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 110:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 15:25
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 1:20
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 1:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Le Seigneur a dit à mon Seigneur:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Assieds-toi à ma droite,
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Jusqu’à ce que je fasse de tes ennemis ton marchepied. '
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que toute la maison d’Israël sache donc avec certitude que Dieu a fait Seigneur et Christ ce Jésus que vous avez crucifié.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 37-47: cf. Za 12:10. Jn 16:8. Ac 4:4, 32-37. Lu 5:10.'
    marker-yv: yv-h
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Za 12:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 3:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 9:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Après avoir entendu ce discours, ils eurent le cœur vivement touché, et ils dirent à Pierre et aux autres apôtres: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 16:30
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Hommes frères, que ferons-nous? '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pierre leur dit: Repentez-vous, et que chacun de vous soit baptisé au nom de Jésus-Christ, pour le pardon de vos péchés; et vous recevrez le don du Saint-Esprit. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car la promesse est pour vous, pour vos '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Joë 2:28
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'enfants, et pour tous ceux '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 2:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'qui sont au loin, en aussi grand nombre que le Seigneur notre Dieu les appellera. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 3:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 1:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 3:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 14:26
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:26
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 11:15
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 19:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Et ils furent tous remplis du Saint-Esprit, et se mirent à parler '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 16:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 10:46
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'en d’autres langues, selon que l’Esprit leur donnait de s’exprimer. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et, par plusieurs autres paroles, il les conjurait et les exhortait, disant: Sauvez-vous de cette génération perverse. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ceux qui acceptèrent sa parole furent baptisés; et, en ce jour-là, le nombre des disciples s’augmenta d’environ trois mille âmes. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils persévéraient dans l’enseignement des apôtres, dans la communion fraternelle, dans la fraction du pain, et dans les prières. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La crainte s’emparait de chacun, et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 16:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 5:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'il se faisait beaucoup de prodiges et de miracles par les apôtres. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 15:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 4:32
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Tous ceux qui croyaient étaient dans le même lieu, et ils avaient tout en commun. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils vendaient leurs propriétés et leurs biens, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 58:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 4:35
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'et ils en partageaient le produit entre tous, selon les besoins de chacun. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils étaient chaque jour tous '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 1:14
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
