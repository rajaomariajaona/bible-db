document_id: ACT.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Effusion du Saint-Esprit, le jour de la Pentecôte. — Discours de Pierre, et conversion de trois mille personnes. Les premiers chrétiens
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-21: cf. (Joë 2:28-32. Mt 3:11. Jn 14:16, 17, 26.) 1 Co 12:13.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Le jour de la '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 23:15
      metadata:
        usfm: LEV.23.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 16:9
      metadata:
        usfm: DEU.16.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Pentecôte, ils étaient '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 1:14
      metadata:
        usfm: ACT.1.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'tous ensemble dans le même lieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Tout à coup il vint du ciel un bruit comme celui d’un vent impétueux, et il remplit toute la maison où ils étaient assis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Des langues, semblables à des langues de feu, leur apparurent, séparées les unes des autres, et se posèrent sur chacun d’eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 3:11
      metadata:
        usfm: MAT.3.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 1:8
      metadata:
        usfm: MRK.1.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 3:16
      metadata:
        usfm: LUK.3.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 14:26
      metadata:
        usfm: JHN.14.26
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 15:26
      metadata:
        usfm: JHN.15.26
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 16:13
      metadata:
        usfm: JHN.16.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 11:15
      metadata:
        usfm: ACT.11.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 19:6
      metadata:
        usfm: ACT.19.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Et ils furent tous remplis du Saint-Esprit, et se mirent à parler '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 16:17
      metadata:
        usfm: MRK.16.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 10:46
      metadata:
        usfm: ACT.10.46
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'en d’autres langues, selon que l’Esprit leur donnait de s’exprimer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Or, il y avait en séjour à Jérusalem des Juifs, hommes pieux, de toutes les nations qui sont sous le ciel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Au bruit qui eut lieu, la multitude accourut, et elle fut confondue parce que chacun les entendait parler dans sa propre langue. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ils étaient tous dans l’étonnement et la surprise, et ils se disaient les uns aux autres: Voici, ces gens qui parlent ne sont-ils pas tous Galiléens? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Et comment les entendons-nous dans notre propre langue à chacun, dans notre langue maternelle? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Parthes, Mèdes, Élamites, ceux qui habitent la Mésopotamie, la Judée, la Cappadoce, le Pont, l’Asie, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'la Phrygie, la Pamphylie, l’Égypte, le territoire de la Libye voisine de Cyrène, et ceux qui sont venus de Rome, Juifs et prosélytes, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Crétois et Arabes, comment les entendons-nous parler dans nos langues des merveilles de Dieu? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ils étaient tous dans l’étonnement, et, ne sachant que penser, ils se disaient les uns aux autres: Que veut dire ceci? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mais d’autres se moquaient, et disaient: Ils sont pleins de vin doux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Alors Pierre, se présentant avec les onze, éleva la voix, et leur parla en ces termes: Hommes Juifs, et vous tous qui séjournez à Jérusalem, sachez ceci, et prêtez l’oreille à mes paroles! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ces gens ne sont pas ivres, comme vous le supposez, car c’est la troisième heure du jour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Mais c’est ici ce qui a été dit par le prophète Joël:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 44:3
      metadata:
        usfm: ISA.44.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 11:19
      metadata:
        usfm: EZK.11.19
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 36:27
      metadata:
        usfm: EZK.36.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Joë 2:28
      metadata:
        usfm: JOL.2.28
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Za 12:10
      metadata:
        usfm: ZEC.12.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 7:38
      metadata:
        usfm: JHN.7.38
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Dans les derniers jours, dit Dieu, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 10:45
      metadata:
        usfm: ACT.10.45
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: je répandrai de mon Esprit sur toute chair;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Vos fils et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 2:36
      metadata:
        usfm: LUK.2.36
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 21:9
      metadata:
        usfm: ACT.21.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: vos filles prophétiseront,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vos jeunes gens auront des visions,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et vos vieillards auront des songes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Oui, sur mes serviteurs et sur mes servantes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans ces jours-là, je répandrai de mon Esprit; et ils prophétiseront.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Je ferai paraître des prodiges en haut dans le ciel et des miracles en bas sur la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Du sang, du feu, et une vapeur de fumée;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Le soleil se changera en ténèbres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la lune en sang,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avant l’arrivée du jour du Seigneur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De ce jour grand et glorieux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Joë 2:32
      metadata:
        usfm: JOL.2.32
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 10:13
      metadata:
        usfm: ROM.10.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Alors quiconque invoquera le nom du Seigneur sera sauvé.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 22-36: cf. (Ac 1:8. Lu 24:47.) (Ac 3:13-26; 10:34-43; 13:23-41.)'
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Hommes Israélites, écoutez ces paroles! Jésus de Nazareth, cet homme à qui Dieu a rendu témoignage devant vous par les miracles, les prodiges et les signes qu’il a opérés par lui au milieu de vous, comme vous le savez vous-mêmes; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'cet homme, livré '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 4:28
      metadata:
        usfm: ACT.4.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'selon le dessein arrêté et selon la prescience de Dieu, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 5:30
      metadata:
        usfm: ACT.5.30
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'vous l’avez crucifié, vous l’avez fait mourir par la main des impies. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 10:40
      metadata:
        usfm: ACT.10.40
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Dieu l’a ressuscité, en le délivrant des liens de la mort, parce qu’il n’était pas possible qu’il fût retenu par elle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Car David dit de lui:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 16:8
      metadata:
        usfm: PSA.16.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Je voyais constamment le Seigneur devant moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parce qu’il est à ma droite, afin que je ne sois point ébranlé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Aussi mon cœur est dans la joie, et ma langue dans l’allégresse;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et même ma chair reposera avec espérance,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Car tu n’abandonneras pas mon âme dans le séjour des morts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tu ne permettras pas que ton Saint voie la corruption.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Tu m’as fait connaître les sentiers de la vie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu me rempliras de joie par ta présence.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Hommes frères, qu’il me soit permis de vous dire librement, au sujet du patriarche David, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 2:10
      metadata:
        usfm: 1KI.2.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 13:36
      metadata:
        usfm: ACT.13.36
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qu’il est mort, qu’il a été enseveli, et que son sépulcre existe encore aujourd’hui parmi nous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Comme il était prophète, et qu’il savait '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 S 7:12
      metadata:
        usfm: 2SA.7.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 132:11
      metadata:
        usfm: PSA.132.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 1:32
      metadata:
        usfm: LUK.1.32
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 13:23
      metadata:
        usfm: ACT.13.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 1:3
      metadata:
        usfm: ROM.1.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ti 2:8
      metadata:
        usfm: 2TI.2.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'que Dieu lui avait promis avec serment de faire asseoir un de ses descendants sur son trône, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'c’est la résurrection du Christ qu’il a prévue et annoncée, en disant '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 16:10
      metadata:
        usfm: PSA.16.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 13:35
      metadata:
        usfm: ACT.13.35
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qu’il ne serait pas abandonné dans le séjour des morts et que sa chair ne verrait pas la corruption. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'C’est ce Jésus que Dieu a ressuscité; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 15:27
      metadata:
        usfm: JHN.15.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 1:8
      metadata:
        usfm: ACT.1.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'nous en sommes tous témoins. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 5:31
      metadata:
        usfm: ACT.5.31
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 2:9
      metadata:
        usfm: PHP.2.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Élevé par la droite de Dieu, il a reçu du Père le Saint-Esprit qui avait été '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 1:4
      metadata:
        usfm: ACT.1.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'promis, et il l’a '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 10:45
      metadata:
        usfm: ACT.10.45
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'répandu, comme vous le voyez et l’entendez. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Car David n’est point monté au ciel, mais il dit lui-même:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 110:1
      metadata:
        usfm: PSA.110.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 15:25
      metadata:
        usfm: 1CO.15.25
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 1:20
      metadata:
        usfm: EPH.1.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 1:13
      metadata:
        usfm: HEB.1.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Le Seigneur a dit à mon Seigneur:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Assieds-toi à ma droite,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Jusqu’à ce que je fasse de tes ennemis ton marchepied. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Que toute la maison d’Israël sache donc avec certitude que Dieu a fait Seigneur et Christ ce Jésus que vous avez crucifié.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 37-47: cf. Za 12:10. Jn 16:8. Ac 4:4, 32-37. Lu 5:10.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
