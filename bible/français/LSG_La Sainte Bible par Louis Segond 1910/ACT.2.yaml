document_id: ACT.2,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Effusion du Saint-Esprit, le jour de la Pentecôte. — Discours de Pierre, et conversion de trois mille personnes. Les premiers chrétiens
  - type: heading
    content: 'V. 1-21: cf. (Joë 2:28-32. Mt 3:11. Jn 14:16, 17, 26.) 1 Co 12:13.'
  - type: text
    content: 'Le jour de la '
  - type: note
    content: Lé 23:15. De 16:9.
  - type: text
    content: 'Pentecôte, ils étaient '
  - type: note
    content: Ac 1:14.
  - type: text
    content: 'tous ensemble dans le même lieu. '
  '10':
  - type: text
    content: 'la Phrygie, la Pamphylie, l’Égypte, le territoire de la Libye voisine de Cyrène, et ceux qui sont venus de Rome, Juifs et prosélytes, '
  '11':
  - type: text
    content: 'Crétois et Arabes, comment les entendons-nous parler dans nos langues des merveilles de Dieu? '
  '12':
  - type: text
    content: 'Ils étaient tous dans l’étonnement, et, ne sachant que penser, ils se disaient les uns aux autres: Que veut dire ceci? '
  '13':
  - type: text
    content: 'Mais d’autres se moquaient, et disaient: Ils sont pleins de vin doux. '
  '14':
  - type: text
    content: 'Alors Pierre, se présentant avec les onze, éleva la voix, et leur parla en ces termes: Hommes Juifs, et vous tous qui séjournez à Jérusalem, sachez ceci, et prêtez l’oreille à mes paroles! '
  '15':
  - type: text
    content: 'Ces gens ne sont pas ivres, comme vous le supposez, car c’est la troisième heure du jour. '
  '16':
  - type: text
    content: 'Mais c’est ici ce qui a été dit par le prophète Joël:'
  '17':
  - type: text
    content: ' '
  - type: note
    content: És 44:3. Éz 11:19; 36:27. Joë 2:28. Za 12:10. Jn 7:38.
  - type: text
    content: 'Dans les derniers jours, dit Dieu, '
  - type: note
    content: Ac 10:45.
  - type: text
    content: je répandrai de mon Esprit sur toute chair;
  - type: text
    content: 'Vos fils et '
  - type: note
    content: Lu 2:36. Ac 21:9.
  - type: text
    content: vos filles prophétiseront,
  - type: text
    content: Vos jeunes gens auront des visions,
  - type: text
    content: Et vos vieillards auront des songes.
  '18':
  - type: text
    content: Oui, sur mes serviteurs et sur mes servantes,
  - type: text
    content: Dans ces jours-là, je répandrai de mon Esprit; et ils prophétiseront.
  '19':
  - type: text
    content: Je ferai paraître des prodiges en haut dans le ciel et des miracles en bas sur la terre,
  - type: text
    content: Du sang, du feu, et une vapeur de fumée;
  '2':
  - type: text
    content: 'Tout à coup il vint du ciel un bruit comme celui d’un vent impétueux, et il remplit toute la maison où ils étaient assis. '
  '20':
  - type: text
    content: Le soleil se changera en ténèbres,
  - type: text
    content: Et la lune en sang,
  - type: text
    content: Avant l’arrivée du jour du Seigneur,
  - type: text
    content: De ce jour grand et glorieux.
  '21':
  - type: text
    content: ' '
  - type: note
    content: Joë 2:32. Ro 10:13.
  - type: text
    content: Alors quiconque invoquera le nom du Seigneur sera sauvé.
  - type: heading
    content: 'V. 22-36: cf. (Ac 1:8. Lu 24:47.) (Ac 3:13-26; 10:34-43; 13:23-41.)'
  '22':
  - type: text
    content: 'Hommes Israélites, écoutez ces paroles! Jésus de Nazareth, cet homme à qui Dieu a rendu témoignage devant vous par les miracles, les prodiges et les signes qu’il a opérés par lui au milieu de vous, comme vous le savez vous-mêmes; '
  '23':
  - type: text
    content: 'cet homme, livré '
  - type: note
    content: Ac 4:28.
  - type: text
    content: 'selon le dessein arrêté et selon la prescience de Dieu, '
  - type: note
    content: Ac 5:30.
  - type: text
    content: 'vous l’avez crucifié, vous l’avez fait mourir par la main des impies. '
  '24':
  - type: note
    content: Ac 10:40.
  - type: text
    content: 'Dieu l’a ressuscité, en le délivrant des liens de la mort, parce qu’il n’était pas possible qu’il fût retenu par elle. '
  '25':
  - type: text
    content: 'Car David dit de lui:'
  - type: note
    content: Ps 16:8.
  - type: text
    content: Je voyais constamment le Seigneur devant moi,
  - type: text
    content: Parce qu’il est à ma droite, afin que je ne sois point ébranlé.
  '26':
  - type: text
    content: Aussi mon cœur est dans la joie, et ma langue dans l’allégresse;
  - type: text
    content: Et même ma chair reposera avec espérance,
  '27':
  - type: text
    content: Car tu n’abandonneras pas mon âme dans le séjour des morts,
  - type: text
    content: Et tu ne permettras pas que ton Saint voie la corruption.
  '28':
  - type: text
    content: Tu m’as fait connaître les sentiers de la vie,
  - type: text
    content: Tu me rempliras de joie par ta présence.
  '29':
  - type: text
    content: 'Hommes frères, qu’il me soit permis de vous dire librement, au sujet du patriarche David, '
  - type: note
    content: 1 R 2:10. Ac 13:36.
  - type: text
    content: 'qu’il est mort, qu’il a été enseveli, et que son sépulcre existe encore aujourd’hui parmi nous. '
  '3':
  - type: text
    content: 'Des langues, semblables à des langues de feu, leur apparurent, séparées les unes des autres, et se posèrent sur chacun d’eux. '
  '30':
  - type: text
    content: 'Comme il était prophète, et qu’il savait '
  - type: note
    content: 2 S 7:12. Ps 132:11. Lu 1:32. Ac 13:23. Ro 1:3. 2 Ti 2:8.
  - type: text
    content: 'que Dieu lui avait promis avec serment de faire asseoir un de ses descendants sur son trône, '
  '31':
  - type: text
    content: 'c’est la résurrection du Christ qu’il a prévue et annoncée, en disant '
  - type: note
    content: Ps 16:10. Ac 13:35.
  - type: text
    content: 'qu’il ne serait pas abandonné dans le séjour des morts et que sa chair ne verrait pas la corruption. '
  '32':
  - type: text
    content: 'C’est ce Jésus que Dieu a ressuscité; '
  - type: note
    content: Jn 15:27. Ac 1:8.
  - type: text
    content: 'nous en sommes tous témoins. '
  '33':
  - type: note
    content: Ac 5:31. Ph 2:9.
  - type: text
    content: 'Élevé par la droite de Dieu, il a reçu du Père le Saint-Esprit qui avait été '
  - type: note
    content: Ac 1:4.
  - type: text
    content: 'promis, et il l’a '
  - type: note
    content: Ac 10:45.
  - type: text
    content: 'répandu, comme vous le voyez et l’entendez. '
  '34':
  - type: text
    content: 'Car David n’est point monté au ciel, mais il dit lui-même:'
  - type: note
    content: Ps 110:1. 1 Co 15:25. Ép 1:20. Hé 1:13.
  - type: text
    content: 'Le Seigneur a dit à mon Seigneur:'
  - type: text
    content: Assieds-toi à ma droite,
  '35':
  - type: text
    content: 'Jusqu’à ce que je fasse de tes ennemis ton marchepied. '
  '36':
  - type: text
    content: Que toute la maison d’Israël sache donc avec certitude que Dieu a fait Seigneur et Christ ce Jésus que vous avez crucifié.
  - type: heading
    content: 'V. 37-47: cf. Za 12:10. Jn 16:8. Ac 4:4, 32-37. Lu 5:10.'
  '37':
  - type: text
    content: ' '
  - type: note
    content: Za 12:10. Lu 3:10. Ac 9:6.
  - type: text
    content: 'Après avoir entendu ce discours, ils eurent le cœur vivement touché, et ils dirent à Pierre et aux autres apôtres: '
  - type: note
    content: Ac 16:30.
  - type: text
    content: 'Hommes frères, que ferons-nous? '
  '38':
  - type: text
    content: 'Pierre leur dit: Repentez-vous, et que chacun de vous soit baptisé au nom de Jésus-Christ, pour le pardon de vos péchés; et vous recevrez le don du Saint-Esprit. '
  '39':
  - type: text
    content: 'Car la promesse est pour vous, pour vos '
  - type: note
    content: Joë 2:28.
  - type: text
    content: 'enfants, et pour tous ceux '
  - type: note
    content: Ép 2:13.
  - type: text
    content: 'qui sont au loin, en aussi grand nombre que le Seigneur notre Dieu les appellera. '
  '4':
  - type: note
    content: Mt 3:11. Mc 1:8. Lu 3:16. Jn 14:26; 15:26; 16:13. Ac 11:15; 19:6.
  - type: text
    content: 'Et ils furent tous remplis du Saint-Esprit, et se mirent à parler '
  - type: note
    content: Mc 16:17. Ac 10:46.
  - type: text
    content: 'en d’autres langues, selon que l’Esprit leur donnait de s’exprimer. '
  '40':
  - type: text
    content: 'Et, par plusieurs autres paroles, il les conjurait et les exhortait, disant: Sauvez-vous de cette génération perverse. '
  '41':
  - type: text
    content: 'Ceux qui acceptèrent sa parole furent baptisés; et, en ce jour-là, le nombre des disciples s’augmenta d’environ trois mille âmes. '
  '42':
  - type: text
    content: 'Ils persévéraient dans l’enseignement des apôtres, dans la communion fraternelle, dans la fraction du pain, et dans les prières. '
  '43':
  - type: text
    content: 'La crainte s’emparait de chacun, et '
  - type: note
    content: Mc 16:17. Ac 5:12.
  - type: text
    content: 'il se faisait beaucoup de prodiges et de miracles par les apôtres. '
  '44':
  - type: note
    content: De 15:4. Ac 4:32.
  - type: text
    content: 'Tous ceux qui croyaient étaient dans le même lieu, et ils avaient tout en commun. '
  '45':
  - type: text
    content: 'Ils vendaient leurs propriétés et leurs biens, '
  - type: note
    content: És 58:7. Ac 4:35.
  - type: text
    content: 'et ils en partageaient le produit entre tous, selon les besoins de chacun. '
  '46':
  - type: text
    content: 'Ils étaient chaque jour tous '
  - type: note
    content: Ac 1:14; 20:7.
  - type: text
    content: 'ensemble assidus au temple, ils rompaient le pain dans les maisons, et prenaient leur nourriture avec joie et simplicité de cœur, '
  '47':
  - type: text
    content: 'louant Dieu, et trouvant grâce auprès de tout le peuple. '
  - type: note
    content: Ac 5:14; 11:21.
  - type: text
    content: Et le Seigneur ajoutait chaque jour à l’Église ceux qui étaient sauvés.
  '5':
  - type: text
    content: 'Or, il y avait en séjour à Jérusalem des Juifs, hommes pieux, de toutes les nations qui sont sous le ciel. '
  '6':
  - type: text
    content: 'Au bruit qui eut lieu, la multitude accourut, et elle fut confondue parce que chacun les entendait parler dans sa propre langue. '
  '7':
  - type: text
    content: 'Ils étaient tous dans l’étonnement et la surprise, et ils se disaient les uns aux autres: Voici, ces gens qui parlent ne sont-ils pas tous Galiléens? '
  '8':
  - type: text
    content: 'Et comment les entendons-nous dans notre propre langue à chacun, dans notre langue maternelle? '
  '9':
  - type: text
    content: 'Parthes, Mèdes, Élamites, ceux qui habitent la Mésopotamie, la Judée, la Cappadoce, le Pont, l’Asie, '
