        text: De 15:4
      metadata:
        usfm: DEU.15.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 4:32
      metadata:
        usfm: ACT.4.32
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tous ceux qui croyaient étaient dans le même lieu, et ils avaient tout en commun. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Ils vendaient leurs propriétés et leurs biens, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 58:7
      metadata:
        usfm: ISA.58.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 4:35
      metadata:
        usfm: ACT.4.35
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et ils en partageaient le produit entre tous, selon les besoins de chacun. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Ils étaient chaque jour tous '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 1:14
      metadata:
        usfm: ACT.1.14
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 20:7
      metadata:
        usfm: ACT.20.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ensemble assidus au temple, ils rompaient le pain dans les maisons, et prenaient leur nourriture avec joie et simplicité de cœur, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'louant Dieu, et trouvant grâce auprès de tout le peuple. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 5:14
      metadata:
        usfm: ACT.5.14
    - type: text
      text: '; '
    - type: usfm
      marker: ref
