document_id: JAS.INTRO1,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: INTRODUCTION À L’ÉPÎTRE DE JACQUES
  - type: usfm
    marker: imt3
    children:
    - type: text
      text: (Tit 3:8.)
  - type: usfm
    marker: ip
    children:
    - type: text
      text: L’Épître de Jacques fait partie des épîtres dites «catholiques». Leur universalité ressort de leur destination, autrement dit, elles ne sont adressées ni à une communauté précise, ni à un individu en particulier (comparer avec 1 Cor 1:2; Gal 1:2; 1 Tim 1:2).
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Nous avons donc affaire ici à des lettres qui, dès leur rédaction, concernent tout le monde. Nous excluons de ce groupe les trois épîtres de Jean comme faisant partie de la littérature johannique avec l’Évangile de Jean et le livre de l’Apocalypse. Parmi ces épîtres figurent Hébreux (voir 1:1-2), Jacques (voir 1:1), 1 Pierre (voir 1:1-2), 2 Pierre (voir 1:1-2) et Jude (voir 1-2). Les articulations de l’épître de Jacques sont les suivantes:'
  - type: usfm
    marker: io1
    children:
    - type: text
      text: '1. Brève formule épistolaire '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 1:1
  - type: usfm
    marker: io1
    children:
    - type: text
      text: '2. Les épreuves et les tentations du croyant '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 1:2-15
  - type: usfm
    marker: io1
    children:
    - type: text
      text: '3. Mettez en pratique la parole, et ne vous bornez pas à l’écouter '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 1:16–2:13
  - type: usfm
    marker: io1
    children:
    - type: text
      text: '4. La foi et les œuvres '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 2:14-26
  - type: usfm
    marker: io1
    children:
    - type: text
      text: '5. La langue est un feu '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 3:1-18
  - type: usfm
    marker: io1
    children:
    - type: text
      text: '6. Résister aux passions '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 4:1-12
  - type: usfm
    marker: io1
    children:
    - type: text
      text: '7. Les projets des mauvais riches '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 4:13–5:6
  - type: usfm
    marker: io1
    children:
    - type: text
      text: '8. Exhortations finales '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 5:7-20
  - type: usfm
    marker: ip
    children:
    - type: text
      text: La tradition chrétienne identifie Jacques, auquel est attribuée la présente épître, avec Jacques le frère de Jésus (Mc 6:3) qui, comme les autres frères de Jésus, dut d’abord se réserver à croire en lui (Jn 7:1-5). Mais il joua finalement un rôle important dans l’Église primitive; il fut temporairement chef de l’Église de Jérusalem (Act 15:13; 21:18; 1 Cor 15:7; Gal 1:19).
  - type: usfm
    marker: ip
    children:
    - type: text
      text: L’épître de Jacques est une circulaire adressée aux douze tribus qui se trouvent dispersées (1:1). Elle est construite autour d’un ensemble d’exhortations éthiques et religieuses. Elle étonne par l’absence d’éléments du message de la Bonne Nouvelle du salut de Dieu en Jésus-Christ. On y retrouve toutefois le nom du Seigneur Jésus comme personnage central de la correspondance.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Cette épître porte sur l’engagement pratique et concret du chrétien:'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: '- Les épreuves de la vie en Christ doivent être un sujet de joie parce qu’elles produisent la patience (1:2). Il faut donc être prompt à écouter mais lent à parler et surtout à se mettre en colère car la colère de l’homme n’accomplit pas la justice de Dieu (1:19).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: '- La foi chrétienne doit nécessairement s’accompagner de bonnes œuvres qui la confirment: '
    - type: usfm
      marker: it
      children:
      - type: text
        text: '«Mes frères, que sert-il à quelqu’un de dire qu’il a la foi, s’il n’a pas les œuvres?» '
    - type: text
      text: (2:14). Ainsi l’image du corps sans âme illustre la foi des chrétiens qui se limitent à écouter la Parole de Dieu sans s’efforcer de la mettre en pratique.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: L’Épître de Jacques est la plus juive des épîtres, malgré la pureté de la langue grecque. Elle s’adresserait donc effectivement aux douze tribus dans la dispersion. Cette mention rappelle la désignation des ancêtres des Juifs dans l’Ancien Testament. Il faut toutefois atténuer cette adresse puisqu’il y est dit ailleurs que ces destinataires ont la foi au Seigneur Jésus-Christ (2:1).
