document_id: PSA.98,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: Ps 96. (Lu 1:49-55, 68-75. És 49:6.) Ap 11:15-18.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Psaume.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Chantez à l’Éternel un cantique nouveau!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car il a fait des prodiges.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sa droite et son bras saint lui sont venus en aide.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel a manifesté son salut,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a révélé sa justice aux yeux des nations.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il s’est souvenu de sa bonté et de sa fidélité envers la maison d’Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toutes les extrémités de la terre ont vu le salut de notre Dieu.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Poussez vers l’Éternel des cris de joie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous tous, habitants de la terre!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Faites éclater votre allégresse, et chantez!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Chantez à l’Éternel avec la harpe;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avec la harpe chantez des cantiques!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avec les trompettes et au son du cor,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Poussez des cris de joie devant le roi, l’Éternel!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que la mer retentisse avec tout ce qu’elle contient,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que le monde et ceux qui l’habitent éclatent d’allégresse,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que les fleuves battent des mains,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que toutes les montagnes poussent des cris de joie,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Devant l’Éternel! Car il vient pour juger la terre;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il jugera le monde avec justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les peuples avec équité.
