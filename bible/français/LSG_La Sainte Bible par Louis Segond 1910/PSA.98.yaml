document_id: PSA.98,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ps 96. (Lu 1:49-55, 68-75. És 49:6.) Ap 11:15-18.
  - type: text
    content: Psaume.
  - type: text
    content: Chantez à l’Éternel un cantique nouveau!
  - type: text
    content: Car il a fait des prodiges.
  - type: text
    content: Sa droite et son bras saint lui sont venus en aide.
  '2':
  - type: text
    content: L’Éternel a manifesté son salut,
  - type: text
    content: Il a révélé sa justice aux yeux des nations.
  '3':
  - type: text
    content: Il s’est souvenu de sa bonté et de sa fidélité envers la maison d’Israël,
  - type: text
    content: Toutes les extrémités de la terre ont vu le salut de notre Dieu.
  '4':
  - type: text
    content: Poussez vers l’Éternel des cris de joie,
  - type: text
    content: Vous tous, habitants de la terre!
  - type: text
    content: Faites éclater votre allégresse, et chantez!
  '5':
  - type: text
    content: Chantez à l’Éternel avec la harpe;
  - type: text
    content: Avec la harpe chantez des cantiques!
  '6':
  - type: text
    content: Avec les trompettes et au son du cor,
  - type: text
    content: Poussez des cris de joie devant le roi, l’Éternel!
  '7':
  - type: text
    content: Que la mer retentisse avec tout ce qu’elle contient,
  - type: text
    content: Que le monde et ceux qui l’habitent éclatent d’allégresse,
  '8':
  - type: text
    content: Que les fleuves battent des mains,
  - type: text
    content: Que toutes les montagnes poussent des cris de joie,
  '9':
  - type: text
    content: Devant l’Éternel! Car il vient pour juger la terre;
  - type: text
    content: Il jugera le monde avec justice,
  - type: text
    content: Et les peuples avec équité.
