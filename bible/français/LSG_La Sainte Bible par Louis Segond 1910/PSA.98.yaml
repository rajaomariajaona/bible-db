document_id: PSA.98
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: Ps 96. (Lu 1:49-55, 68-75. És 49:6.) Ap 11:15-18.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Psaume.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Chantez à l’Éternel un cantique nouveau!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car il a fait des prodiges.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sa droite et son bras saint lui sont venus en aide.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: L’Éternel a manifesté son salut,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a révélé sa justice aux yeux des nations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Il s’est souvenu de sa bonté et de sa fidélité envers la maison d’Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toutes les extrémités de la terre ont vu le salut de notre Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Poussez vers l’Éternel des cris de joie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous tous, habitants de la terre!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Faites éclater votre allégresse, et chantez!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Chantez à l’Éternel avec la harpe;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avec la harpe chantez des cantiques!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Avec les trompettes et au son du cor,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Poussez des cris de joie devant le roi, l’Éternel!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Que la mer retentisse avec tout ce qu’elle contient,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que le monde et ceux qui l’habitent éclatent d’allégresse,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Que les fleuves battent des mains,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que toutes les montagnes poussent des cris de joie,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Devant l’Éternel! Car il vient pour juger la terre;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il jugera le monde avec justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les peuples avec équité.
