document_id: ISA.48,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Les anciennes et les nouvelles prédictions
  - type: heading
    content: 'V. 1-11: cf. És 42:8, 9, 17-20; 43:8-12, 22, 25. Mal 3:6.'
  - type: text
    content: Écoutez ceci, maison de Jacob,
  - type: text
    content: Vous qui portez le nom d’Israël,
  - type: text
    content: Et qui êtes sortis des eaux de Juda;
  - type: text
    content: Vous qui jurez par le nom de l’Éternel,
  - type: text
    content: Et qui invoquez le Dieu d’Israël,
  - type: text
    content: Mais sans vérité ni droiture!
  '10':
  - type: text
    content: Je t’ai mis au creuset, mais non pour retirer de l’argent;
  - type: text
    content: Je t’ai éprouvé dans la fournaise de l’adversité.
  '11':
  - type: text
    content: C’est pour l’amour de moi, pour l’amour de moi, que je veux agir;
  - type: text
    content: Car comment mon nom serait-il profané?
  - type: note
    content: És 42:8.
  - type: text
    content: Je ne donnerai pas ma gloire à un autre.
  - type: heading
    content: 'V. 12-22: cf. (És 43:8-21; 44:21, etc.) Ps 81:9-17. És 40:9-11.'
  '12':
  - type: text
    content: Écoute-moi, Jacob!
  - type: text
    content: Et toi, Israël, que j’ai appelé!
  - type: note
    content: És 41:4; 44:6. Ap 1:17; 22:13.
  - type: text
    content: C’est moi, moi qui suis le premier,
  - type: text
    content: C’est aussi moi qui suis le dernier.
  '13':
  - type: text
    content: Ma main a fondé la terre,
  - type: text
    content: 'Et ma droite a étendu les cieux:'
  - type: text
    content: Je les appelle, et aussitôt ils se présentent.
  '14':
  - type: text
    content: Vous tous, assemblez-vous, et écoutez!
  - type: note
    content: És 41:22, 23.
  - type: text
    content: Qui d’entre eux a annoncé ces choses?
  - type: text
    content: Celui que l’Éternel aime exécutera sa volonté contre Babylone,
  - type: text
    content: Et son bras s’appesantira sur les Chaldéens.
  '15':
  - type: text
    content: Moi, moi, j’ai parlé, et je l’ai appelé;
  - type: text
    content: Je l’ai fait venir, et son œuvre réussira.
  '16':
  - type: text
    content: Approchez-vous de moi, et écoutez!
  - type: text
    content: Dès le commencement, je n’ai point parlé en cachette,
  - type: text
    content: Dès l’origine de ces choses, j’ai été là.
  - type: text
    content: Et maintenant, le Seigneur, l’Éternel, m’a envoyé avec son esprit.
  '17':
  - type: text
    content: 'Ainsi parle l’Éternel, ton rédempteur, le Saint d’Israël:'
  - type: text
    content: Moi, l’Éternel, ton Dieu, je t’instruis pour ton bien,
  - type: text
    content: Je te conduis dans la voie que tu dois suivre.
  '18':
  - type: text
    content: ' '
  - type: note
    content: De 32:29. Ps 81:14.
  - type: text
    content: Oh! Si tu étais attentif à mes commandements!
  - type: text
    content: Ton bien-être serait comme un fleuve,
  - type: text
    content: Et ton bonheur comme les flots de la mer;
  '19':
  - type: text
    content: Ta postérité serait comme le sable,
  - type: text
    content: Et les fruits de tes entrailles comme les grains de sable;
  - type: text
    content: Ton nom ne serait point effacé, anéanti devant moi.
  '2':
  - type: text
    content: Car ils prennent leur nom de la ville sainte,
  - type: text
    content: Et ils s’appuient sur le Dieu d’Israël,
  - type: text
    content: Dont le nom est l’Éternel des armées.
  '20':
  - type: text
    content: ' '
  - type: note
    content: És 52:11. Jé 50:8; 51:6, 45. Ap 18:4.
  - type: text
    content: Sortez de Babylone, fuyez du milieu des Chaldéens!
  - type: text
    content: Avec une voix d’allégresse annoncez-le, publiez-le,
  - type: text
    content: Faites-le savoir jusqu’à l’extrémité de la terre,
  - type: text
    content: 'Dites: L’Éternel a racheté son serviteur Jacob!'
  '21':
  - type: text
    content: 'Et ils n’auront pas soif dans les déserts où il les conduira:'
  - type: text
    content: Il fera jaillir pour eux l’eau du rocher,
  - type: text
    content: Il fendra le rocher,
  - type: text
    content: Et l’eau coulera.
  '22':
  - type: text
    content: ' '
  - type: note
    content: És 57:21.
  - type: text
    content: Il n’y a point de paix pour les méchants, dit l’Éternel.
  '3':
  - type: text
    content: Dès longtemps j’ai fait les premières prédictions,
  - type: text
    content: 'Elles sont sorties de ma bouche, et je les ai publiées:'
  - type: text
    content: Soudain j’ai agi, et elles se sont accomplies.
  '4':
  - type: text
    content: Sachant que tu es endurci,
  - type: text
    content: Que ton cou est une barre de fer,
  - type: text
    content: Et que tu as un front d’airain,
  '5':
  - type: text
    content: Je t’ai annoncé dès longtemps ces choses,
  - type: text
    content: Je te les ai déclarées avant qu’elles arrivassent,
  - type: text
    content: 'Afin que tu ne dises pas: C’est mon idole qui les a faites,'
  - type: text
    content: C’est mon image taillée ou mon image en fonte qui les a ordonnées.
  '6':
  - type: text
    content: Tu entends! Considère tout cela!
  - type: text
    content: Et vous, ne l’avouerez-vous pas?…
  - type: text
    content: Maintenant, je t’annonce des choses nouvelles,
  - type: text
    content: Cachées, inconnues de toi.
  '7':
  - type: text
    content: Elles se produisent à présent, et n’appartiennent point au passé;
  - type: text
    content: Jusqu’à leur avènement tu n’en avais aucune connaissance,
  - type: text
    content: 'Afin que tu ne dises pas: Voici, je le savais.'
  '8':
  - type: text
    content: Tu n’en as rien appris, tu n’en as rien su,
  - type: text
    content: 'Et jadis ton oreille n’en a point été frappée:'
  - type: text
    content: Car je savais que tu serais infidèle,
  - type: text
    content: Et que dès ta naissance tu fus appelé rebelle.
  '9':
  - type: text
    content: A cause de mon nom, je suspends ma colère;
  - type: note
    content: És 43:21, 25.
  - type: text
    content: A cause de ma gloire, je me contiens envers toi,
  - type: text
    content: Pour ne pas t’exterminer.
