document_id: ISA.48,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les anciennes et les nouvelles prédictions
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-11: cf. És 42:8, 9, 17-20; 43:8-12, 22, 25. Mal 3:6.'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Écoutez ceci, maison de Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous qui portez le nom d’Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qui êtes sortis des eaux de Juda;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous qui jurez par le nom de l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qui invoquez le Dieu d’Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais sans vérité ni droiture!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je t’ai mis au creuset, mais non pour retirer de l’argent;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je t’ai éprouvé dans la fournaise de l’adversité.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est pour l’amour de moi, pour l’amour de moi, que je veux agir;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car comment mon nom serait-il profané?
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 42:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Je ne donnerai pas ma gloire à un autre.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 12-22: cf. (És 43:8-21; 44:21, etc.) Ps 81:9-17. És 40:9-11.'
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Écoute-moi, Jacob!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et toi, Israël, que j’ai appelé!
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 41:4
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 44:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 1:17
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 22:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: C’est moi, moi qui suis le premier,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est aussi moi qui suis le dernier.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ma main a fondé la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et ma droite a étendu les cieux:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je les appelle, et aussitôt ils se présentent.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous tous, assemblez-vous, et écoutez!
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 41:22
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '23'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Qui d’entre eux a annoncé ces choses?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui que l’Éternel aime exécutera sa volonté contre Babylone,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et son bras s’appesantira sur les Chaldéens.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moi, moi, j’ai parlé, et je l’ai appelé;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je l’ai fait venir, et son œuvre réussira.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Approchez-vous de moi, et écoutez!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dès le commencement, je n’ai point parlé en cachette,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dès l’origine de ces choses, j’ai été là.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et maintenant, le Seigneur, l’Éternel, m’a envoyé avec son esprit.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ainsi parle l’Éternel, ton rédempteur, le Saint d’Israël:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moi, l’Éternel, ton Dieu, je t’instruis pour ton bien,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je te conduis dans la voie que tu dois suivre.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 32:29
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 81:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Oh! Si tu étais attentif à mes commandements!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ton bien-être serait comme un fleuve,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ton bonheur comme les flots de la mer;
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ta postérité serait comme le sable,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les fruits de tes entrailles comme les grains de sable;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ton nom ne serait point effacé, anéanti devant moi.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car ils prennent leur nom de la ville sainte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils s’appuient sur le Dieu d’Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dont le nom est l’Éternel des armées.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 52:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 50:8
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 51:6
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '45'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 18:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Sortez de Babylone, fuyez du milieu des Chaldéens!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avec une voix d’allégresse annoncez-le, publiez-le,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Faites-le savoir jusqu’à l’extrémité de la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dites: L’Éternel a racheté son serviteur Jacob!'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et ils n’auront pas soif dans les déserts où il les conduira:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il fera jaillir pour eux l’eau du rocher,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il fendra le rocher,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’eau coulera.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 57:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il n’y a point de paix pour les méchants, dit l’Éternel.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dès longtemps j’ai fait les premières prédictions,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Elles sont sorties de ma bouche, et je les ai publiées:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Soudain j’ai agi, et elles se sont accomplies.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sachant que tu es endurci,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que ton cou est une barre de fer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que tu as un front d’airain,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je t’ai annoncé dès longtemps ces choses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je te les ai déclarées avant qu’elles arrivassent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Afin que tu ne dises pas: C’est mon idole qui les a faites,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est mon image taillée ou mon image en fonte qui les a ordonnées.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu entends! Considère tout cela!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et vous, ne l’avouerez-vous pas?…
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maintenant, je t’annonce des choses nouvelles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cachées, inconnues de toi.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles se produisent à présent, et n’appartiennent point au passé;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jusqu’à leur avènement tu n’en avais aucune connaissance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Afin que tu ne dises pas: Voici, je le savais.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu n’en as rien appris, tu n’en as rien su,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et jadis ton oreille n’en a point été frappée:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car je savais que tu serais infidèle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que dès ta naissance tu fus appelé rebelle.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause de mon nom, je suspends ma colère;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 43:21
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '25'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: A cause de ma gloire, je me contiens envers toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour ne pas t’exterminer.
