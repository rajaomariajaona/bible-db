document_id: EZK.31
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-18: cf. Éz 32. Na 3:8-19. Da 4:10, etc. Pr 16:18.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La onzième année, le premier jour du troisième mois, la parole de l’Éternel me fut adressée, en ces mots:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fils de l’homme, dis à Pharaon, roi d’Égypte, et à sa multitude:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: A qui ressembles-tu dans ta grandeur?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Voici, l’Assyrie était un '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Da 4:10, etc.
    marker-yv: yv-n
  - type: text
    text: cèdre du Liban;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses branches étaient belles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Son feuillage était touffu, sa tige élevée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et sa cime s’élançait au milieu d’épais rameaux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Les eaux l’avaient fait croître,
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’abîme l’avait fait pousser en hauteur;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Des fleuves coulaient autour du lieu où il était planté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et envoyaient leurs canaux à tous les arbres des champs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: C’est pourquoi sa tige s’élevait au-dessus de tous les arbres des champs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses branches avaient multiplié, ses rameaux s’étendaient,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Par l’abondance des eaux qui l’avaient fait pousser.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tous les '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Da 4:12
      metadata:
        usfm: DAN.4.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: oiseaux du ciel nichaient dans ses branches,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toutes les bêtes des champs faisaient leurs petits sous ses rameaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et de nombreuses nations habitaient toutes à son ombre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il était beau par sa grandeur, par l’étendue de ses branches,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car ses racines plongeaient dans des eaux abondantes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Les cèdres du '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 2:8
      metadata:
        usfm: GEN.2.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: jardin de Dieu ne le surpassaient point,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les cyprès n’égalaient point ses branches,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les platanes n’étaient point comme ses rameaux;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aucun arbre du jardin de Dieu ne lui était comparable en beauté.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Je l’avais embelli par la multitude de ses branches,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tous les arbres d’Éden, dans le jardin de Dieu, lui portaient envie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'C’est pourquoi ainsi parle le Seigneur, l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parce qu’il avait une tige élevée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parce qu’il lançait sa cime au milieu d’épais rameaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que son cœur était fier de sa hauteur,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Je l’ai livré entre les mains du héros des nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui le traitera selon sa méchanceté; je l’ai chassé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Des étrangers, les '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 28:7
      metadata:
        usfm: EZK.28.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 30:11
      metadata:
        usfm: EZK.30.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: plus violents des peuples, l’ont abattu et rejeté;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses branches sont tombées dans les montagnes et dans toutes les vallées.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses rameaux se sont brisés dans tous les ravins du pays;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tous les peuples de la terre se sont retirés de son ombre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et l’ont abandonné.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Sur ses débris sont venus se poser tous les oiseaux du ciel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et toutes les bêtes des champs ont fait leur gîte parmi ses rameaux,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Afin que tous les arbres près des eaux n’élèvent plus leur tige,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qu’ils ne lancent plus leur cime au milieu d’épais rameaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afin que tous les chênes arrosés d’eau ne gardent plus leur hauteur;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car tous sont livrés à la mort, aux profondeurs de la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parmi les enfants des hommes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avec ceux qui descendent dans la fosse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ainsi parle le Seigneur, l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le jour où il est descendu dans le séjour des morts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’ai répandu le deuil, j’ai couvert l’abîme à cause de lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et j’en ai retenu les fleuves;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les grandes eaux ont été arrêtées;
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’ai rendu le Liban triste à cause de lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tous les arbres des champs ont été desséchés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Par le bruit de sa chute j’ai fait '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 14:9
      metadata:
        usfm: JER.14.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: trembler les nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand je l’ai précipité dans le séjour des morts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avec ceux qui descendent dans la fosse;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous les arbres d’Éden ont été consolés dans les profondeurs de la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les plus beaux et les meilleurs du Liban,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous arrosés par les eaux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Eux aussi sont descendus avec lui dans le séjour des morts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vers ceux qui ont péri par l’épée;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils étaient son bras et ils habitaient à son ombre parmi les nations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: A qui ressembles-tu ainsi en gloire et en grandeur
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parmi les arbres d’Éden?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu seras précipité avec les arbres d’Éden
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans les profondeurs de la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tu seras couché au milieu des '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 28:10
      metadata:
        usfm: EZK.28.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: incirconcis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avec ceux qui ont péri par l’épée.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voilà Pharaon et toute sa multitude!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit le Seigneur, l’Éternel.
