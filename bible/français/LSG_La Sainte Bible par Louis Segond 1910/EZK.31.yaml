document_id: EZK.31,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-18: cf. Éz 32. Na 3:8-19. Da 4:10, etc. Pr 16:18.'
  - type: text
    content: 'La onzième année, le premier jour du troisième mois, la parole de l’Éternel me fut adressée, en ces mots:'
  '10':
  - type: text
    content: 'C’est pourquoi ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: Parce qu’il avait une tige élevée,
  - type: text
    content: Parce qu’il lançait sa cime au milieu d’épais rameaux,
  - type: text
    content: Et que son cœur était fier de sa hauteur,
  '11':
  - type: text
    content: Je l’ai livré entre les mains du héros des nations,
  - type: text
    content: Qui le traitera selon sa méchanceté; je l’ai chassé.
  '12':
  - type: text
    content: 'Des étrangers, les '
  - type: note
    content: Éz 28:7; 30:11.
  - type: text
    content: plus violents des peuples, l’ont abattu et rejeté;
  - type: text
    content: Ses branches sont tombées dans les montagnes et dans toutes les vallées.
  - type: text
    content: Ses rameaux se sont brisés dans tous les ravins du pays;
  - type: text
    content: Et tous les peuples de la terre se sont retirés de son ombre,
  - type: text
    content: Et l’ont abandonné.
  '13':
  - type: text
    content: Sur ses débris sont venus se poser tous les oiseaux du ciel,
  - type: text
    content: Et toutes les bêtes des champs ont fait leur gîte parmi ses rameaux,
  '14':
  - type: text
    content: Afin que tous les arbres près des eaux n’élèvent plus leur tige,
  - type: text
    content: Et qu’ils ne lancent plus leur cime au milieu d’épais rameaux,
  - type: text
    content: Afin que tous les chênes arrosés d’eau ne gardent plus leur hauteur;
  - type: text
    content: Car tous sont livrés à la mort, aux profondeurs de la terre,
  - type: text
    content: Parmi les enfants des hommes,
  - type: text
    content: Avec ceux qui descendent dans la fosse.
  '15':
  - type: text
    content: 'Ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: Le jour où il est descendu dans le séjour des morts,
  - type: text
    content: J’ai répandu le deuil, j’ai couvert l’abîme à cause de lui,
  - type: text
    content: Et j’en ai retenu les fleuves;
  - type: text
    content: Les grandes eaux ont été arrêtées;
  - type: text
    content: J’ai rendu le Liban triste à cause de lui,
  - type: text
    content: Et tous les arbres des champs ont été desséchés.
  '16':
  - type: text
    content: 'Par le bruit de sa chute j’ai fait '
  - type: note
    content: Jé 14:9.
  - type: text
    content: trembler les nations,
  - type: text
    content: Quand je l’ai précipité dans le séjour des morts,
  - type: text
    content: Avec ceux qui descendent dans la fosse;
  - type: text
    content: Tous les arbres d’Éden ont été consolés dans les profondeurs de la terre,
  - type: text
    content: Les plus beaux et les meilleurs du Liban,
  - type: text
    content: Tous arrosés par les eaux.
  '17':
  - type: text
    content: Eux aussi sont descendus avec lui dans le séjour des morts,
  - type: text
    content: Vers ceux qui ont péri par l’épée;
  - type: text
    content: Ils étaient son bras et ils habitaient à son ombre parmi les nations.
  '18':
  - type: text
    content: A qui ressembles-tu ainsi en gloire et en grandeur
  - type: text
    content: Parmi les arbres d’Éden?
  - type: text
    content: Tu seras précipité avec les arbres d’Éden
  - type: text
    content: Dans les profondeurs de la terre,
  - type: text
    content: 'Tu seras couché au milieu des '
  - type: note
    content: Éz 28:10.
  - type: text
    content: incirconcis,
  - type: text
    content: Avec ceux qui ont péri par l’épée.
  - type: text
    content: Voilà Pharaon et toute sa multitude!
  - type: text
    content: Dit le Seigneur, l’Éternel.
  '2':
  - type: text
    content: 'Fils de l’homme, dis à Pharaon, roi d’Égypte, et à sa multitude:'
  - type: text
    content: A qui ressembles-tu dans ta grandeur?
  '3':
  - type: text
    content: 'Voici, l’Assyrie était un '
  - type: note
    content: Da 4:10, etc.
  - type: text
    content: cèdre du Liban;
  - type: text
    content: Ses branches étaient belles,
  - type: text
    content: Son feuillage était touffu, sa tige élevée,
  - type: text
    content: Et sa cime s’élançait au milieu d’épais rameaux.
  '4':
  - type: text
    content: Les eaux l’avaient fait croître,
  - type: text
    content: L’abîme l’avait fait pousser en hauteur;
  - type: text
    content: Des fleuves coulaient autour du lieu où il était planté,
  - type: text
    content: Et envoyaient leurs canaux à tous les arbres des champs.
  '5':
  - type: text
    content: C’est pourquoi sa tige s’élevait au-dessus de tous les arbres des champs,
  - type: text
    content: Ses branches avaient multiplié, ses rameaux s’étendaient,
  - type: text
    content: Par l’abondance des eaux qui l’avaient fait pousser.
  '6':
  - type: text
    content: 'Tous les '
  - type: note
    content: Da 4:12.
  - type: text
    content: oiseaux du ciel nichaient dans ses branches,
  - type: text
    content: Toutes les bêtes des champs faisaient leurs petits sous ses rameaux,
  - type: text
    content: Et de nombreuses nations habitaient toutes à son ombre.
  '7':
  - type: text
    content: Il était beau par sa grandeur, par l’étendue de ses branches,
  - type: text
    content: Car ses racines plongeaient dans des eaux abondantes.
  '8':
  - type: text
    content: 'Les cèdres du '
  - type: note
    content: Ge 2:8.
  - type: text
    content: jardin de Dieu ne le surpassaient point,
  - type: text
    content: Les cyprès n’égalaient point ses branches,
  - type: text
    content: Et les platanes n’étaient point comme ses rameaux;
  - type: text
    content: Aucun arbre du jardin de Dieu ne lui était comparable en beauté.
  '9':
  - type: text
    content: Je l’avais embelli par la multitude de ses branches,
  - type: text
    content: Et tous les arbres d’Éden, dans le jardin de Dieu, lui portaient envie.
