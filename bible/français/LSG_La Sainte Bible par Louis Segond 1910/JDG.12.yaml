document_id: JDG.12
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Guerre civile entre les Éphraïmites et les Galaadites
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-7: cf. Jg 8:1-3. Pr 17:14. (2 Ti 2:19.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Les hommes d’Éphraïm se rassemblèrent, partirent pour le nord, et dirent à Jephthé: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jg 8:1
      metadata:
        usfm: JDG.8.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Pourquoi es-tu allé combattre les fils d’Ammon sans nous avoir appelés à marcher avec toi? Nous voulons incendier ta maison et te brûler avec elle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Jephthé leur répondit: Nous avons eu de grandes contestations, moi et mon peuple, avec les fils d’Ammon; et quand je vous ai appelés, vous ne m’avez pas délivré de leurs mains. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Voyant que tu ne venais pas à mon secours, j’ai exposé ma vie, et j’ai marché contre les fils d’Ammon. L’Éternel les a livrés entre mes mains. Pourquoi donc aujourd’hui montez-vous contre moi pour me faire la guerre? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Jephthé rassembla tous les hommes de Galaad, et livra bataille à Éphraïm. Les hommes de Galaad battirent Éphraïm, parce que les Éphraïmites disaient: Vous êtes des fugitifs d’Éphraïm! Galaad est au milieu d’Éphraïm, au milieu de Manassé! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Galaad s’empara des gués du Jourdain du côté d’Éphraïm. Et quand l’un des fuyards d’Éphraïm disait: Laissez-moi passer! Les hommes de Galaad lui demandaient: Es-tu Éphraïmite? Il répondait: Non. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ils lui disaient alors: Hé bien, dis Schibboleth. Et il disait Sibboleth, car il ne pouvait pas bien prononcer. Sur quoi les hommes de Galaad le saisissaient, et l’égorgeaient près des gués du Jourdain. Il périt en ce temps-là quarante-deux mille hommes d’Éphraïm. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Jephthé fut juge en Israël pendant six ans; puis Jephthé, le Galaadite, mourut, et fut enterré dans l’une des villes de Galaad.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ibtsan, Élon, Abdon, juges en Israël
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 8-15: cf. Jg 10:1-5. Ps 127:3-5. És 32:16-18.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Après lui, Ibtsan de Bethléhem fut juge en Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il eut trente fils, il maria trente filles au-dehors, et il fit venir pour ses fils trente filles du dehors. Il fut juge en Israël pendant sept ans; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'puis Ibtsan mourut, et fut enterré à Bethléhem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Après lui, Élon de Zabulon fut juge en Israël. Il fut juge en Israël pendant dix ans; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'puis Élon de Zabulon mourut, et fut enterré à Ajalon, dans le pays de Zabulon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Après lui, Abdon, fils d’Hillel, le Pirathonite, fut juge en Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il eut quarante fils et trente petits-fils, qui montaient sur soixante dix '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jg 10:4
      metadata:
        usfm: JDG.10.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ânons. Il fut juge en Israël pendant huit ans; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: puis Abdon, fils d’Hillel, le Pirathonite, mourut, et fut enterré à Pirathon, dans le pays d’Éphraïm, sur la montagne des Amalécites.
