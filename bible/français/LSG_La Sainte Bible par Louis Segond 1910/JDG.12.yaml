document_id: JDG.12,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Guerre civile entre les Éphraïmites et les Galaadites
  - type: heading
    content: 'V. 1-7: cf. Jg 8:1-3. Pr 17:14. (2 Ti 2:19.)'
  - type: text
    content: 'Les hommes d’Éphraïm se rassemblèrent, partirent pour le nord, et dirent à Jephthé: '
  - type: note
    content: Jg 8:1.
  - type: text
    content: 'Pourquoi es-tu allé combattre les fils d’Ammon sans nous avoir appelés à marcher avec toi? Nous voulons incendier ta maison et te brûler avec elle. '
  '10':
  - type: text
    content: 'puis Ibtsan mourut, et fut enterré à Bethléhem. '
  '11':
  - type: text
    content: 'Après lui, Élon de Zabulon fut juge en Israël. Il fut juge en Israël pendant dix ans; '
  '12':
  - type: text
    content: 'puis Élon de Zabulon mourut, et fut enterré à Ajalon, dans le pays de Zabulon. '
  '13':
  - type: text
    content: 'Après lui, Abdon, fils d’Hillel, le Pirathonite, fut juge en Israël. '
  '14':
  - type: text
    content: 'Il eut quarante fils et trente petits-fils, qui montaient sur soixante dix '
  - type: note
    content: Jg 10:4.
  - type: text
    content: 'ânons. Il fut juge en Israël pendant huit ans; '
  '15':
  - type: text
    content: puis Abdon, fils d’Hillel, le Pirathonite, mourut, et fut enterré à Pirathon, dans le pays d’Éphraïm, sur la montagne des Amalécites.
  '2':
  - type: text
    content: 'Jephthé leur répondit: Nous avons eu de grandes contestations, moi et mon peuple, avec les fils d’Ammon; et quand je vous ai appelés, vous ne m’avez pas délivré de leurs mains. '
  '3':
  - type: text
    content: 'Voyant que tu ne venais pas à mon secours, j’ai exposé ma vie, et j’ai marché contre les fils d’Ammon. L’Éternel les a livrés entre mes mains. Pourquoi donc aujourd’hui montez-vous contre moi pour me faire la guerre? '
  '4':
  - type: text
    content: 'Jephthé rassembla tous les hommes de Galaad, et livra bataille à Éphraïm. Les hommes de Galaad battirent Éphraïm, parce que les Éphraïmites disaient: Vous êtes des fugitifs d’Éphraïm! Galaad est au milieu d’Éphraïm, au milieu de Manassé! '
  '5':
  - type: text
    content: 'Galaad s’empara des gués du Jourdain du côté d’Éphraïm. Et quand l’un des fuyards d’Éphraïm disait: Laissez-moi passer! Les hommes de Galaad lui demandaient: Es-tu Éphraïmite? Il répondait: Non. '
  '6':
  - type: text
    content: 'Ils lui disaient alors: Hé bien, dis Schibboleth. Et il disait Sibboleth, car il ne pouvait pas bien prononcer. Sur quoi les hommes de Galaad le saisissaient, et l’égorgeaient près des gués du Jourdain. Il périt en ce temps-là quarante-deux mille hommes d’Éphraïm. '
  '7':
  - type: text
    content: Jephthé fut juge en Israël pendant six ans; puis Jephthé, le Galaadite, mourut, et fut enterré dans l’une des villes de Galaad.
  - type: heading
    content: Ibtsan, Élon, Abdon, juges en Israël
  - type: heading
    content: 'V. 8-15: cf. Jg 10:1-5. Ps 127:3-5. És 32:16-18.'
  '8':
  - type: text
    content: 'Après lui, Ibtsan de Bethléhem fut juge en Israël. '
  '9':
  - type: text
    content: 'Il eut trente fils, il maria trente filles au-dehors, et il fit venir pour ses fils trente filles du dehors. Il fut juge en Israël pendant sept ans; '
