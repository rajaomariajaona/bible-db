document_id: 1JN.4,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Les faux docteurs
  - type: heading
    content: 'V. 1-6: cf. De 13:1-3. (1 Jn 2:18-27. 2 Jn 7-11.)'
  - type: text
    content: 'Bien-aimés, '
  - type: note
    content: Jé 29:8. Mt 24:4. Ép 5:6. Col 2:18.
  - type: text
    content: 'n’ajoutez pas foi à tout esprit; '
  - type: note
    content: Mt 7:15, 16. 1 Co 14:29. 1 Th 5:21.
  - type: text
    content: 'mais éprouvez les esprits, pour savoir s’ils sont de Dieu, '
  - type: note
    content: Mt 24:5, 24. 2 Pi 2:1. 2 Jn v. 7.
  - type: text
    content: 'car plusieurs faux prophètes sont venus dans le monde. '
  '10':
  - type: text
    content: 'Et cet amour consiste, non point en ce que nous avons aimé Dieu, '
  - type: note
    content: Ro 3:24. 2 Co 5:19. Col 1:19.
  - type: text
    content: 'mais en ce qu’il nous a aimés et a envoyé son Fils '
  - type: note
    content: Ro 3:25. 1 Jn 2:2.
  - type: text
    content: 'comme victime expiatoire pour nos péchés. '
  '11':
  - type: text
    content: 'Bien-aimés, si Dieu nous a ainsi aimés, nous devons aussi nous aimer les uns les autres. '
  '12':
  - type: note
    content: Ex 33:20. De 4:12. Jn 1:18. 1 Ti 1:17; 6:16.
  - type: text
    content: 'Personne n’a jamais vu Dieu; '
  - type: note
    content: 1 Jn 3:24.
  - type: text
    content: 'si nous nous aimons les uns les autres, Dieu demeure en nous, et son amour est parfait en nous. '
  '13':
  - type: text
    content: 'Nous connaissons que nous demeurons en lui, et qu’il demeure en nous, en ce qu’il nous a donné de son Esprit. '
  '14':
  - type: text
    content: 'Et nous, nous avons vu et nous attestons que le Père a envoyé le Fils comme Sauveur du monde. '
  '15':
  - type: text
    content: 'Celui qui confessera que Jésus est le Fils de Dieu, Dieu demeure en lui, et lui en Dieu. '
  '16':
  - type: text
    content: 'Et nous, nous avons connu l’amour que Dieu a pour nous, et nous y avons cru. Dieu est amour; et celui qui demeure dans l’amour demeure en Dieu, et Dieu demeure en lui. '
  '17':
  - type: text
    content: 'Tel il est, tels nous sommes aussi dans ce monde: c’est en cela que l’amour est parfait en nous, afin que nous ayons de l’assurance au jour du jugement. '
  '18':
  - type: text
    content: 'La crainte n’est pas dans l’amour, mais l’amour parfait bannit la crainte; car la crainte suppose un châtiment, et celui qui craint n’est pas parfait dans l’amour. '
  '19':
  - type: text
    content: 'Pour nous, nous l’aimons, parce qu’il nous a aimés le premier. '
  '2':
  - type: text
    content: 'Reconnaissez à ceci l’Esprit de Dieu: tout esprit qui confesse Jésus-Christ venu en chair est de Dieu; '
  '20':
  - type: note
    content: 1 Jn 2:4.
  - type: text
    content: 'Si quelqu’un dit: J’aime Dieu, et qu’il haïsse son frère, c’est un menteur; car celui qui n’aime pas son frère qu’il voit, comment peut-il aimer Dieu qu’il ne voit pas? '
  '21':
  - type: note
    content: Lé 19:18. Mt 22:39. Jn 13:34; 15:12. Ép 5:2. 1 Th 4:9. 1 Pi 4:8. 1 Jn 3:23.
  - type: text
    content: 'Et nous avons de lui ce commandement: que celui qui aime Dieu aime aussi son frère.'
  '3':
  - type: text
    content: 'et tout esprit qui ne confesse pas Jésus n’est pas de Dieu, '
  - type: note
    content: 1 Jn 2:22.
  - type: text
    content: 'c’est celui de l’antéchrist, '
  - type: note
    content: 1 Jn 2:18.
  - type: text
    content: 'dont vous avez appris la venue, et qui maintenant '
  - type: note
    content: 2 Th 2:7.
  - type: text
    content: 'est déjà dans le monde. '
  '4':
  - type: text
    content: 'Vous, petits enfants, vous êtes de Dieu, et vous les avez vaincus, parce que celui qui est en vous est plus grand que celui qui est dans le monde. '
  '5':
  - type: text
    content: 'Eux, ils sont du monde; c’est pourquoi ils parlent d’après le monde, et le monde les écoute. '
  '6':
  - type: note
    content: Jn 8:47; 10:27.
  - type: text
    content: 'Nous, nous sommes de Dieu; celui qui connaît Dieu nous écoute; celui qui n’est pas de Dieu ne nous écoute pas: c’est par là que nous connaissons l’esprit de la vérité et l’esprit de l’erreur.'
  - type: heading
    content: Dieu est amour. Aimer Dieu et aimer ses frères
  - type: heading
    content: 'V. 7-21: cf. 1 Jn 3:11-24. (Jn 3:16, 17. Ro 5:5-8. Ép 5:1, 2.)'
  '7':
  - type: text
    content: 'Bien-aimés, aimons nous les uns les autres; car l’amour est de Dieu, et quiconque aime est né de Dieu et connaît Dieu. '
  '8':
  - type: text
    content: 'Celui qui n’aime pas n’a pas connu Dieu, car Dieu est amour. '
  '9':
  - type: note
    content: Jn 3:16. Ro 5:8.
  - type: text
    content: 'L’amour de Dieu a été manifesté envers nous en ce que Dieu a envoyé son Fils unique dans le monde, afin que nous vivions par lui. '
