document_id: 1JN.4
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les faux docteurs
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-6: cf. De 13:1-3. (1 Jn 2:18-27. 2 Jn 7-11.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Bien-aimés, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 29:8
      metadata:
        usfm: JER.29.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 24:4
      metadata:
        usfm: MAT.24.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 5:6
      metadata:
        usfm: EPH.5.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 2:18
      metadata:
        usfm: COL.2.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'n’ajoutez pas foi à tout esprit; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 7:15
      metadata:
        usfm: MAT.7.15
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '16'
      metadata:
        usfm: MAT.7.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 14:29
      metadata:
        usfm: 1CO.14.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 5:21
      metadata:
        usfm: 1TH.5.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'mais éprouvez les esprits, pour savoir s’ils sont de Dieu, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 24:5
      metadata:
        usfm: MAT.24.5
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '24'
      metadata:
        usfm: MAT.24.24
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Pi 2:1
      metadata:
        usfm: 2PE.2.1
    - type: text
      text: . 2 Jn v. 7.
    marker-yv: yv-n
  - type: text
    text: 'car plusieurs faux prophètes sont venus dans le monde. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Reconnaissez à ceci l’Esprit de Dieu: tout esprit qui confesse Jésus-Christ venu en chair est de Dieu; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'et tout esprit qui ne confesse pas Jésus n’est pas de Dieu, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 2:22
      metadata:
        usfm: 1JN.2.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'c’est celui de l’antéchrist, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 2:18
      metadata:
        usfm: 1JN.2.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'dont vous avez appris la venue, et qui maintenant '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Th 2:7
      metadata:
        usfm: 2TH.2.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'est déjà dans le monde. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Vous, petits enfants, vous êtes de Dieu, et vous les avez vaincus, parce que celui qui est en vous est plus grand que celui qui est dans le monde. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Eux, ils sont du monde; c’est pourquoi ils parlent d’après le monde, et le monde les écoute. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 8:47
      metadata:
        usfm: JHN.8.47
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 10:27
      metadata:
        usfm: JHN.10.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Nous, nous sommes de Dieu; celui qui connaît Dieu nous écoute; celui qui n’est pas de Dieu ne nous écoute pas: c’est par là que nous connaissons l’esprit de la vérité et l’esprit de l’erreur.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dieu est amour. Aimer Dieu et aimer ses frères
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 7-21: cf. 1 Jn 3:11-24. (Jn 3:16, 17. Ro 5:5-8. Ép 5:1, 2.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Bien-aimés, aimons nous les uns les autres; car l’amour est de Dieu, et quiconque aime est né de Dieu et connaît Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Celui qui n’aime pas n’a pas connu Dieu, car Dieu est amour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 3:16
      metadata:
        usfm: JHN.3.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 5:8
      metadata:
        usfm: ROM.5.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'L’amour de Dieu a été manifesté envers nous en ce que Dieu a envoyé son Fils unique dans le monde, afin que nous vivions par lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Et cet amour consiste, non point en ce que nous avons aimé Dieu, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 3:24
      metadata:
        usfm: ROM.3.24
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 5:19
      metadata:
        usfm: 2CO.5.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 1:19
      metadata:
        usfm: COL.1.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'mais en ce qu’il nous a aimés et a envoyé son Fils '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 3:25
      metadata:
        usfm: ROM.3.25
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 2:2
      metadata:
        usfm: 1JN.2.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'comme victime expiatoire pour nos péchés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Bien-aimés, si Dieu nous a ainsi aimés, nous devons aussi nous aimer les uns les autres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 33:20
      metadata:
        usfm: EXO.33.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 4:12
      metadata:
        usfm: DEU.4.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 1:18
      metadata:
        usfm: JHN.1.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 1:17
      metadata:
        usfm: 1TI.1.17
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 6:16
      metadata:
        usfm: 1TI.6.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Personne n’a jamais vu Dieu; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 3:24
      metadata:
        usfm: 1JN.3.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'si nous nous aimons les uns les autres, Dieu demeure en nous, et son amour est parfait en nous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nous connaissons que nous demeurons en lui, et qu’il demeure en nous, en ce qu’il nous a donné de son Esprit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Et nous, nous avons vu et nous attestons que le Père a envoyé le Fils comme Sauveur du monde. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Celui qui confessera que Jésus est le Fils de Dieu, Dieu demeure en lui, et lui en Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Et nous, nous avons connu l’amour que Dieu a pour nous, et nous y avons cru. Dieu est amour; et celui qui demeure dans l’amour demeure en Dieu, et Dieu demeure en lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Tel il est, tels nous sommes aussi dans ce monde: c’est en cela que l’amour est parfait en nous, afin que nous ayons de l’assurance au jour du jugement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'La crainte n’est pas dans l’amour, mais l’amour parfait bannit la crainte; car la crainte suppose un châtiment, et celui qui craint n’est pas parfait dans l’amour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Pour nous, nous l’aimons, parce qu’il nous a aimés le premier. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 2:4
      metadata:
        usfm: 1JN.2.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Si quelqu’un dit: J’aime Dieu, et qu’il haïsse son frère, c’est un menteur; car celui qui n’aime pas son frère qu’il voit, comment peut-il aimer Dieu qu’il ne voit pas? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 19:18
      metadata:
        usfm: LEV.19.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 22:39
      metadata:
        usfm: MAT.22.39
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 13:34
      metadata:
        usfm: JHN.13.34
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 15:12
      metadata:
        usfm: JHN.15.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 5:2
      metadata:
        usfm: EPH.5.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 4:9
      metadata:
        usfm: 1TH.4.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 4:8
      metadata:
        usfm: 1PE.4.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 3:23
      metadata:
        usfm: 1JN.3.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Et nous avons de lui ce commandement: que celui qui aime Dieu aime aussi son frère.'
