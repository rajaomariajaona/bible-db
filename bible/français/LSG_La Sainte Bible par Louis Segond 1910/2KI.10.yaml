document_id: 2KI.10,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Jéhu, roi d’Israël
  - type: heading
    content: 'V. 1-16: cf. 2 R 9:6-9. 1 R 21:21-29. (Jé 35.) Ps 119:113.'
  - type: text
    content: 'Il y avait dans Samarie soixante-dix fils d’Achab. Jéhu écrivit des lettres qu’il envoya à Samarie aux chefs de Jizreel, aux anciens, et aux gouverneurs des enfants d’Achab. Il y était dit: '
  '10':
  - type: text
    content: 'Sachez donc qu’il ne tombera rien à terre de la parole de l’Éternel, de la parole que l’Éternel a prononcée contre la maison d’Achab; l’Éternel accomplit '
  - type: note
    content: 1 R 21:19, 21, 29.
  - type: text
    content: 'ce qu’il a déclaré par son serviteur Élie. '
  '11':
  - type: text
    content: 'Et Jéhu frappa tous ceux qui restaient de la maison d’Achab à Jizreel, tous ses grands, ses familiers et ses ministres, sans en laisser échapper un seul. '
  '12':
  - type: text
    content: 'Puis il se leva, et partit pour aller à Samarie. Arrivé à une maison de réunion des bergers, sur le chemin, '
  '13':
  - type: note
    content: 2 Ch 22:8.
  - type: text
    content: 'Jéhu trouva les frères d’Achazia, roi de Juda, et il dit: Qui êtes-vous? Ils répondirent: Nous sommes les frères d’Achazia, et nous descendons pour saluer les fils du roi et les fils de la reine. '
  '14':
  - type: text
    content: 'Jéhu dit: Saisissez-les vivants. Et ils les saisirent vivants, et les égorgèrent au nombre de quarante-deux, à la citerne de la maison de réunion; Jéhu n’en laissa échapper aucun. '
  '15':
  - type: text
    content: 'Étant parti de là, il rencontra Jonadab, fils de Récab, qui venait au-devant de lui. Il le salua, et lui dit: Ton cœur est-il sincère, comme mon cœur l’est envers le tien? Et Jonadab répondit: Il l’est. S’il l’est, répliqua Jéhu, donne-moi ta main. Jonadab lui donna la main. Et Jéhu le fit monter auprès de lui dans son char, '
  '16':
  - type: text
    content: 'et dit: Viens avec moi, et tu verras mon zèle pour l’Éternel. Il l’emmena ainsi dans son char.'
  - type: heading
    content: La famille d’Achab et les prophètes de Baal exterminés
  - type: heading
    content: 'V. 17-27: cf. (1 R 18:18-40; 19:16-18. De 13.) Ps 92:10. Jé 48:10.'
  '17':
  - type: text
    content: 'Lorsque Jéhu fut arrivé à Samarie, '
  - type: note
    content: 2 Ch 22:8.
  - type: text
    content: 'il frappa tous ceux qui restaient d’Achab à Samarie, et il les détruisit entièrement, selon la parole que l’Éternel avait dite à Élie. '
  '18':
  - type: text
    content: 'Puis il assembla tout le peuple, et leur dit: Achab a peu servi Baal, Jéhu le servira beaucoup. '
  '19':
  - type: text
    content: 'Maintenant convoquez auprès de moi tous les prophètes de Baal, tous ses serviteurs et tous ses prêtres, sans qu’il en manque un seul, car je veux offrir un grand sacrifice à Baal: quiconque manquera ne vivra pas. Jéhu agissait avec ruse, pour faire périr les serviteurs de Baal. '
  '2':
  - type: text
    content: 'Maintenant, quand cette lettre vous sera parvenue, puisque vous avez avec vous les fils de votre maître, avec vous les chars et les chevaux, une ville forte et les armes, '
  '20':
  - type: text
    content: 'Il dit: Publiez une fête en l’honneur de Baal. Et ils la publièrent. '
  '21':
  - type: text
    content: 'Il envoya des messagers dans tout Israël; et tous les serviteurs de Baal arrivèrent, il n’y en eut pas un qui ne vînt; ils entrèrent dans la maison de Baal, et la maison de Baal fut remplie d’un bout à l’autre. '
  '22':
  - type: text
    content: 'Jéhu dit à celui qui avait la garde du vestiaire: Sors des vêtements pour tous les serviteurs de Baal. Et cet homme sortit des vêtements pour eux. '
  '23':
  - type: text
    content: 'Alors Jéhu vint à la maison de Baal avec Jonadab, fils de Récab, et il dit aux serviteurs de Baal: Cherchez et regardez, afin qu’il n’y ait pas ici des serviteurs de l’Éternel, mais qu’il y ait seulement des serviteurs de Baal. '
  '24':
  - type: text
    content: 'Et ils entrèrent pour offrir des sacrifices et des holocaustes. Jéhu avait placé dehors quatre-vingts hommes, en leur disant: Celui qui laissera échapper quelqu’un des hommes que je remets entre vos mains, sa vie répondra de la sienne. '
  '25':
  - type: text
    content: 'Lorsqu’on eut achevé d’offrir les holocaustes, Jéhu dit aux coureurs et aux officiers: Entrez, frappez-les, que pas un ne sorte. Et ils les frappèrent du tranchant de l’épée. Les coureurs et les officiers les jetèrent là, et ils allèrent jusqu’à la ville de la maison de Baal. '
  '26':
  - type: text
    content: 'Ils tirèrent dehors les statues de la maison de Baal, et les brûlèrent. '
  '27':
  - type: text
    content: Ils renversèrent la statue de Baal, ils renversèrent aussi la maison de Baal, et ils en firent un cloaque, qui a subsisté jusqu’à ce jour.
  - type: heading
    content: 'V. 28-36: cf. 1 S 15:18-23. (2 R 17:21-23. Am 1:3-4.)'
  '28':
  - type: text
    content: 'Jéhu extermina Baal du milieu d’Israël; '
  '29':
  - type: text
    content: 'mais il ne se détourna point des péchés de Jéroboam, fils de Nebath, qui avait fait pécher Israël, il n’abandonna point '
  - type: note
    content: 1 R 12:28.
  - type: text
    content: 'les veaux d’or qui étaient à Béthel et à Dan. '
  '3':
  - type: text
    content: 'voyez lequel des fils de votre maître est le meilleur et convient le mieux, mettez-le sur le trône de son père, et combattez pour la maison de votre maître! '
  '30':
  - type: text
    content: 'L’Éternel dit à Jéhu: Parce que tu as bien exécuté ce qui était droit à mes yeux, et que tu as fait à la maison d’Achab tout ce qui était conforme à ma volonté, '
  - type: note
    content: 2 R 15:12.
  - type: text
    content: 'tes fils jusqu’à la quatrième génération seront assis sur le trône d’Israël. '
  '31':
  - type: text
    content: 'Toutefois Jéhu ne prit point garde à marcher de tout son cœur dans la loi de l’Éternel, le Dieu d’Israël; il ne se détourna point des péchés que Jéroboam avait fait commettre à Israël. '
  '32':
  - type: text
    content: 'Dans ce temps-là, l’Éternel commença à entamer le territoire d’Israël; et Hazaël les battit sur toute la frontière d’Israël. '
  '33':
  - type: text
    content: 'Depuis le Jourdain, vers le soleil levant, il battit tout le pays de Galaad, les Gadites, les Rubénites et les Manassites, depuis Aroër sur le torrent de l’Arnon jusqu’à Galaad et à Basan. '
  '34':
  - type: text
    content: 'Le reste des actions de Jéhu, tout ce qu’il a fait, et tous ses exploits, cela n’est-il pas écrit dans le livre des Chroniques des rois d’Israël? '
  '35':
  - type: text
    content: 'Jéhu se coucha avec ses pères, et on l’enterra à Samarie. Et Joachaz, son fils, régna à sa place. '
  '36':
  - type: text
    content: Jéhu avait régné vingt-huit ans sur Israël à Samarie.
  '4':
  - type: text
    content: 'Ils eurent une très grande peur, et ils dirent: Voici, deux rois n’ont pu lui résister; comment résisterions-nous? '
  '5':
  - type: text
    content: 'Et le chef de la maison, le chef de la ville, les anciens, et les gouverneurs des enfants, envoyèrent dire à Jéhu: Nous sommes tes serviteurs, et nous ferons tout ce que tu nous diras; nous n’établirons personne roi, fais ce qui te semble bon. '
  '6':
  - type: text
    content: 'Jéhu leur écrivit une seconde lettre où il était dit: Si vous êtes à moi et si vous obéissez à ma voix, prenez les têtes de ces hommes, fils de votre maître, et venez auprès de moi demain à cette heure, à Jizreel. Or les soixante-dix fils du roi étaient chez les grands de la ville, qui les élevaient. '
  '7':
  - type: text
    content: 'Quand la lettre leur fut parvenue, ils prirent les fils du roi, et ils égorgèrent ces soixante-dix hommes; puis ils mirent leurs têtes dans des corbeilles, et les envoyèrent à Jéhu, à Jizreel. '
  '8':
  - type: text
    content: 'Le messager vint l’en informer, en disant: Ils ont apporté les têtes des fils du roi. Et il dit: Mettez-les en deux tas à l’entrée de la porte, jusqu’au matin. '
  '9':
  - type: text
    content: 'Le matin, il sortit; et se présentant à tout le peuple, il dit: Vous êtes justes! Voici, moi, j’ai conspiré contre mon maître et je l’ai tué; mais qui a frappé tous ceux-ci? '
