document_id: JOB.16,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Réponse de Job à Éliphaz
  - type: heading
    content: 'V. 1-5: cf. Job 19:1-6. Mt 7:12.'
  - type: text
    content: 'Job prit la parole et dit:'
  '10':
  - type: text
    content: Ils ouvrent la bouche pour me dévorer,
  - type: text
    content: Ils m’insultent et me frappent les joues,
  - type: text
    content: Ils s’acharnent tous après moi.
  '11':
  - type: text
    content: Dieu me livre à la merci des impies,
  - type: text
    content: Il me précipite entre les mains des méchants.
  '12':
  - type: text
    content: J’étais tranquille, et il m’a secoué,
  - type: text
    content: Il m’a saisi par la nuque et m’a brisé,
  - type: note
    content: Job 7:20. La 3:12.
  - type: text
    content: Il a tiré sur moi comme à un but.
  '13':
  - type: text
    content: Ses traits m’environnent de toutes parts;
  - type: text
    content: Il me perce les reins sans pitié,
  - type: text
    content: Il répand ma bile sur la terre.
  '14':
  - type: text
    content: Il me fait brèche sur brèche,
  - type: text
    content: Il fond sur moi comme un guerrier.
  '15':
  - type: text
    content: J’ai cousu un sac sur ma peau;
  - type: note
    content: Job 30:19.
  - type: text
    content: J’ai roulé ma tête dans la poussière.
  '16':
  - type: text
    content: Les pleurs ont altéré mon visage;
  - type: text
    content: L’ombre de la mort est sur mes paupières.
  '17':
  - type: text
    content: Je n’ai pourtant commis aucune violence,
  - type: text
    content: Et ma prière fut toujours pure.
  - type: heading
    content: '16 v. 18 à 17 v. 9: cf. (Job 12:4, 5; 13:4-13.)'
  '18':
  - type: text
    content: O terre, ne couvre point mon sang,
  - type: text
    content: Et que mes cris prennent librement leur essor!
  '19':
  - type: text
    content: Déjà maintenant, mon témoin est dans le ciel,
  - type: text
    content: Mon témoin est dans les lieux élevés.
  '2':
  - type: text
    content: J’ai souvent entendu pareilles choses;
  - type: note
    content: Job 13:4.
  - type: text
    content: Vous êtes tous des consolateurs fâcheux.
  '20':
  - type: text
    content: Mes amis se jouent de moi;
  - type: text
    content: C’est Dieu que j’implore avec larmes.
  '21':
  - type: text
    content: ' '
  - type: note
    content: Job 31:35. Ec 6:10. És 45:9. Ro 9:20.
  - type: text
    content: Puisse-t-il donner à l’homme raison contre Dieu,
  - type: text
    content: Et au fils de l’homme contre ses amis!
  '22':
  - type: text
    content: Car le nombre de mes années touche à son terme,
  - type: text
    content: Et je m’en irai par un sentier d’où je ne reviendrai pas.
  '3':
  - type: text
    content: Quand finiront ces discours en l’air?
  - type: text
    content: Pourquoi cette irritation dans tes réponses?
  '4':
  - type: text
    content: Moi aussi, je pourrais parler comme vous,
  - type: text
    content: 'Si vous étiez à ma place:'
  - type: text
    content: Je vous accablerais de paroles,
  - type: text
    content: Je secouerais sur vous la tête,
  '5':
  - type: text
    content: Je vous fortifierais de la bouche,
  - type: text
    content: Je remuerais les lèvres pour vous soulager.
  - type: heading
    content: 'V. 6-17: cf. (La 3:1-20. Job 19:6-12.) (Job 23:1-17; 32:8-14.)'
  '6':
  - type: text
    content: Si je parle, mes souffrances ne seront point calmées,
  - type: text
    content: Si je me tais, en quoi seront-elles moindres?
  '7':
  - type: text
    content: Maintenant, hélas! Il m’a épuisé…
  - type: text
    content: Tu as ravagé toute ma maison;
  '8':
  - type: text
    content: Tu m’as saisi, pour témoigner contre moi;
  - type: text
    content: Ma maigreur se lève, et m’accuse en face.
  '9':
  - type: text
    content: ' '
  - type: note
    content: Job 10:16, 17.
  - type: text
    content: Il me déchire et me poursuit dans sa fureur,
  - type: text
    content: Il grince des dents contre moi,
  - type: text
    content: 'Il m’attaque '
  - type: note
    content: Job 13:24.
  - type: text
    content: et me perce de son regard.
