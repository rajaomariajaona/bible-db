document_id: JOB.16
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Réponse de Job à Éliphaz
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-5: cf. Job 19:1-6. Mt 7:12.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Job prit la parole et dit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: J’ai souvent entendu pareilles choses;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 13:4
      metadata:
        usfm: JOB.13.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Vous êtes tous des consolateurs fâcheux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Quand finiront ces discours en l’air?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi cette irritation dans tes réponses?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Moi aussi, je pourrais parler comme vous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Si vous étiez à ma place:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je vous accablerais de paroles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je secouerais sur vous la tête,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Je vous fortifierais de la bouche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je remuerais les lèvres pour vous soulager.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 6-17: cf. (La 3:1-20. Job 19:6-12.) (Job 23:1-17; 32:8-14.)'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Si je parle, mes souffrances ne seront point calmées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si je me tais, en quoi seront-elles moindres?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Maintenant, hélas! Il m’a épuisé…
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu as ravagé toute ma maison;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tu m’as saisi, pour témoigner contre moi;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ma maigreur se lève, et m’accuse en face.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 10:16
      metadata:
        usfm: JOB.10.16
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '17'
      metadata:
        usfm: JOB.10.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il me déchire et me poursuit dans sa fureur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il grince des dents contre moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Il m’attaque '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 13:24
      metadata:
        usfm: JOB.13.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: et me perce de son regard.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ils ouvrent la bouche pour me dévorer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils m’insultent et me frappent les joues,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils s’acharnent tous après moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Dieu me livre à la merci des impies,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il me précipite entre les mains des méchants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: J’étais tranquille, et il m’a secoué,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il m’a saisi par la nuque et m’a brisé,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 7:20
      metadata:
        usfm: JOB.7.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: La 3:12
      metadata:
        usfm: LAM.3.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il a tiré sur moi comme à un but.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ses traits m’environnent de toutes parts;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il me perce les reins sans pitié,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il répand ma bile sur la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Il me fait brèche sur brèche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il fond sur moi comme un guerrier.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: J’ai cousu un sac sur ma peau;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 30:19
      metadata:
        usfm: JOB.30.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: J’ai roulé ma tête dans la poussière.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Les pleurs ont altéré mon visage;
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’ombre de la mort est sur mes paupières.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Je n’ai pourtant commis aucune violence,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ma prière fut toujours pure.
- type: usfm
  marker: r
  children:
  - type: text
    text: '16 v. 18 à 17 v. 9: cf. (Job 12:4, 5; 13:4-13.)'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: O terre, ne couvre point mon sang,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que mes cris prennent librement leur essor!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Déjà maintenant, mon témoin est dans le ciel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon témoin est dans les lieux élevés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Mes amis se jouent de moi;
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est Dieu que j’implore avec larmes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 31:35
      metadata:
        usfm: JOB.31.35
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ec 6:10
      metadata:
        usfm: ECC.6.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 45:9
      metadata:
        usfm: ISA.45.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 9:20
      metadata:
        usfm: ROM.9.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Puisse-t-il donner à l’homme raison contre Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et au fils de l’homme contre ses amis!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Car le nombre de mes années touche à son terme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je m’en irai par un sentier d’où je ne reviendrai pas.
