document_id: REV.2,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Lettres aux sept Églises d’Asie. Première lettre: à l’Église d’Éphèse'
  - type: heading
    content: 'V. 1-7: cf. (Ac 20:17, 28-31. Ép 1:15, 16; 5:2. Hé 6:10-12.) (Mt 24:12, 13; 13:12.)'
  - type: text
    content: ' '
  - type: text
    content: 'Écris à l’ange de l’Église d’Éphèse:'
  - type: text
    content: 'Voici ce que dit celui qui tient les sept étoiles dans sa main droite, celui qui marche au milieu des sept chandeliers d’or:'
  - type: text
    content: ' '
  '10':
  - type: text
    content: Ne crains pas ce que tu vas souffrir. Voici, le diable jettera quelques-uns de vous en prison, afin que vous soyez éprouvés, et vous aurez une tribulation de dix jours. Sois fidèle jusqu’à la mort, et je te donnerai la couronne de vie.
  - type: text
    content: ' '
  '11':
  - type: note
    content: Mt 13:9.
  - type: text
    content: 'Que celui qui a des oreilles entende ce que l’Esprit dit aux Églises: Celui qui vaincra n’aura pas à souffrir la seconde mort.'
  - type: heading
    content: 'Troisième lettre: à l’Église de Pergame'
  - type: heading
    content: 'V. 12-17: cf. 2 Th 1:4, 5. (Jud v. 3, 4, 11. 2 Jn 7-11. És 11:4.)'
  '12':
  - type: text
    content: ' '
  - type: text
    content: 'Écris à l’ange de l’Église de Pergame:'
  - type: text
    content: Voici ce que dit celui qui a
  - type: text
    content: ' '
  - type: note
    content: Ap 1:16; 2:16.
  - type: text
    content: 'l’épée aiguë, à deux tranchants:'
  - type: text
    content: ' '
  '13':
  - type: text
    content: Je sais où tu demeures, je sais que là est le trône de Satan. Tu retiens mon nom, et tu n’as pas renié ma foi, même aux jours d’Antipas, mon témoin fidèle, qui a été mis à mort chez vous, là où Satan a sa demeure.
  - type: text
    content: ' '
  '14':
  - type: text
    content: Mais j’ai quelque chose contre toi, c’est que tu as là des gens attachés à la doctrine de
  - type: text
    content: ' '
  - type: note
    content: No 22:23; 24:14; 25:1; 31:16.
  - type: text
    content: Balaam, qui enseignait à Balak à mettre une pierre d’achoppement devant les fils d’Israël, pour qu’ils mangeassent des viandes sacrifiées aux idoles et qu’ils se livrassent à l’impudicité.
  - type: text
    content: ' '
  '15':
  - type: text
    content: De même, toi aussi, tu as des gens attachés pareillement à la doctrine des Nicolaïtes.
  - type: text
    content: ' '
  '16':
  - type: text
    content: Repens-toi donc; sinon, je viendrai à toi bientôt, et je les combattrai
  - type: text
    content: ' '
  - type: note
    content: És 49:2. Ép 6:17. Hé 4:12. Ap 1:16.
  - type: text
    content: avec l’épée de ma bouche.
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'Que celui qui a des oreilles entende ce que l’Esprit dit aux Églises: A celui qui vaincra je donnerai de la manne cachée, et je lui donnerai un caillou blanc; et sur ce caillou est écrit un nom nouveau, que personne ne connaît, si ce n’est celui qui le reçoit.'
  - type: heading
    content: 'Quatrième lettre: à l’Église de Thyatire'
  - type: heading
    content: 'V. 18-29: cf. 1 Th 1:2, 3. (Ac 15:28, 29. 1 Co 10:8, 19-22.) (Hé 6:9-12. Ap 3:11, 21.)'
  '18':
  - type: text
    content: ' '
  - type: text
    content: 'Écris à l’ange de l’Église de Thyatire:'
  - type: text
    content: Voici ce que dit le Fils de Dieu, celui
  - type: text
    content: ' '
  - type: note
    content: Ap 1:14, 15.
  - type: text
    content: 'qui a les yeux comme une flamme de feu, et dont les pieds sont semblables à de l’airain ardent:'
  - type: text
    content: ' '
  '19':
  - type: text
    content: Je connais tes œuvres, ton amour, ta foi, ton fidèle service, ta constance, et tes dernières œuvres plus nombreuses que les premières.
  - type: text
    content: ' '
  '2':
  - type: text
    content: Je connais tes œuvres, ton travail, et ta persévérance. Je sais que tu ne peux supporter les méchants; que tu as éprouvé ceux qui se disent apôtres et qui ne le sont pas, et que tu les as trouvés menteurs;
  - type: text
    content: ' '
  '20':
  - type: text
    content: Mais ce que j’ai contre toi, c’est que tu laisses la femme
  - type: text
    content: ' '
  - type: note
    content: 1 R 16:31. 2 R 9:7.
  - type: text
    content: Jézabel, qui se dit prophétesse, enseigner et séduire mes serviteurs, pour qu’ils se livrent à l’impudicité et qu’ils mangent des viandes sacrifiées aux idoles.
  - type: text
    content: ' '
  '21':
  - type: text
    content: Je lui ai donné du temps, afin qu’elle se repentît, et elle ne veut pas se repentir de son impudicité.
  - type: text
    content: ' '
  '22':
  - type: text
    content: Voici je vais la jeter sur un lit, et envoyer une grande tribulation à ceux qui commettent adultère avec elle, à moins qu’ils ne se repentent de leurs œuvres.
  - type: text
    content: ' '
  '23':
  - type: text
    content: Je ferai mourir de mort ses enfants; et toutes les Églises connaîtront
  - type: text
    content: ' '
  - type: note
    content: 1 S 16:7. 1 Ch 28:9; 29:17. Ps 7:10. Jé 11:20. Ac 1:24.
  - type: text
    content: que je suis celui qui sonde les reins et les cœurs, et
  - type: text
    content: ' '
  - type: note
    content: Ps 62:13. Jé 17:10; 32:19. Mt 16:27. Ro 2:6; 14:12. 2 Co 5:10. Ga 6:5. Ap 20:12.
  - type: text
    content: je vous rendrai à chacun selon vos œuvres.
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'A vous, à tous les autres de Thyatire, qui ne reçoivent pas cette doctrine, et qui n’ont pas connu les profondeurs de Satan, comme ils les appellent, je vous dis: Je ne mets pas sur vous d’autre fardeau;'
  - type: text
    content: ' '
  '25':
  - type: text
    content: seulement, ce que vous avez,
  - type: text
    content: ' '
  - type: note
    content: Ap 3:11.
  - type: text
    content: retenez-le jusqu’à ce que je vienne.
  - type: text
    content: ' '
  '26':
  - type: text
    content: A celui qui vaincra, et qui gardera jusqu’à la fin mes œuvres,
  - type: text
    content: ' '
  - type: note
    content: Ps 2:8.
  - type: text
    content: je donnerai autorité sur les nations.
  - type: text
    content: ' '
  '27':
  - type: text
    content: Il les paîtra avec une verge de fer, comme on brise les vases d’argile, ainsi que moi-même j’en ai reçu le pouvoir de mon Père.
  - type: text
    content: ' '
  '28':
  - type: text
    content: Et je lui donnerai l’étoile du matin.
  - type: text
    content: ' '
  '29':
  - type: text
    content: Que celui qui a des oreilles entende ce que l’Esprit dit aux Églises!
  '3':
  - type: text
    content: que tu as de la persévérance, que tu as souffert à cause de mon nom, et que tu ne t’es point lassé.
  - type: text
    content: ' '
  '4':
  - type: text
    content: Mais ce que j’ai contre toi, c’est que tu as abandonné ton premier amour.
  - type: text
    content: ' '
  '5':
  - type: text
    content: Souviens-toi donc d’où tu es tombé, repens-toi, et pratique tes premières œuvres; sinon, je viendrai à toi, et j’ôterai ton chandelier de sa place, à moins que tu ne te repentes.
  - type: text
    content: ' '
  '6':
  - type: text
    content: Tu as pourtant ceci, c’est que tu hais les œuvres
  - type: text
    content: ' '
  - type: note
    content: Ap 2:15.
  - type: text
    content: des Nicolaïtes, œuvres que je hais aussi.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'Que celui qui a des oreilles entende ce que l’Esprit dit aux Églises: A celui qui vaincra je donnerai à manger de'
  - type: text
    content: ' '
  - type: note
    content: Ge 2:9. Ap 22:2.
  - type: text
    content: l’arbre de vie, qui est dans le paradis de Dieu.
  - type: heading
    content: 'Seconde lettre: à l’Église de Smyrne'
  - type: heading
    content: 'V. 8-11: cf. Mt 5:10-12; 10:22, 39. Ja 1:12. 1 Pi 4:12, 13.'
  '8':
  - type: text
    content: ' '
  - type: text
    content: 'Écris à l’ange de l’Église de Smyrne:'
  - type: text
    content: Voici ce que dit
  - type: text
    content: ' '
  - type: note
    content: És 41:4; 44:6. Ap 1:17.
  - type: text
    content: 'le premier et le dernier, celui qui était mort, et qui est revenu à la vie:'
  - type: text
    content: ' '
  '9':
  - type: text
    content: Je connais ta tribulation et ta pauvreté (bien que tu sois riche), et les calomnies de la part de ceux qui se disent Juifs et ne le sont pas, mais qui sont une synagogue de Satan.
  - type: text
    content: ' '
