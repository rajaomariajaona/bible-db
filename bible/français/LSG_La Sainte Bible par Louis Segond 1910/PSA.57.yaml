document_id: PSA.57,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 1 S 24. (Ps 142; 108:1-7.)
  - type: text
    content: 'Au chef des chantres. “Ne détruis pas.” Hymne de David. '
  - type: note
    content: 1 S 22:1; 24:4.
  - type: text
    content: Lorsqu’il se réfugia dans la caverne, poursuivi par Saül.
  '10':
  - type: text
    content: ' '
  - type: note
    content: Ps 108:4.
  - type: text
    content: Je te louerai parmi les peuples, Seigneur!
  - type: text
    content: Je te chanterai parmi les nations.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Ps 36:6; 108:5.
  - type: text
    content: Car ta bonté atteint jusqu’aux cieux,
  - type: text
    content: Et ta fidélité jusqu’aux nues.
  '12':
  - type: text
    content: Élève-toi sur les cieux, ô Dieu!
  - type: text
    content: Que ta gloire soit sur toute la terre!
  '2':
  - type: text
    content: Aie pitié de moi, ô Dieu, aie pitié de moi!
  - type: text
    content: Car en toi mon âme cherche un refuge;
  - type: text
    content: Je cherche un refuge à l’ombre de tes ailes,
  - type: text
    content: Jusqu’à ce que les calamités soient passées.
  '3':
  - type: text
    content: Je crie au Dieu Très-Haut,
  - type: text
    content: Au Dieu qui agit en ma faveur.
  '4':
  - type: text
    content: Il m’enverra du ciel le salut,
  - type: text
    content: 'Tandis que mon persécuteur se répand en outrages; '
  - type: text
    content: — Pause.
  - type: text
    content: Dieu enverra sa bonté et sa fidélité.
  '5':
  - type: text
    content: Mon âme est parmi des lions;
  - type: text
    content: Je suis couché au milieu de gens qui vomissent la flamme,
  - type: text
    content: Au milieu d’hommes qui ont pour dents la lance et les flèches,
  - type: text
    content: Et dont la langue est un glaive tranchant.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Ps 108:6.
  - type: text
    content: Élève-toi sur les cieux, ô Dieu!
  - type: text
    content: Que ta gloire soit sur toute la terre!
  '7':
  - type: text
    content: 'Ils avaient tendu un filet sous mes pas:'
  - type: text
    content: Mon âme se courbait;
  - type: note
    content: Ps 7:16; 9:16.
  - type: text
    content: 'Ils avaient creusé une fosse devant moi:'
  - type: text
    content: 'Ils y sont tombés. '
  - type: text
    content: — Pause.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Ps 108:2, etc.
  - type: text
    content: Mon cœur est affermi, ô Dieu! Mon cœur est affermi;
  - type: text
    content: Je chanterai, je ferai retentir mes instruments.
  '9':
  - type: text
    content: Réveille-toi, mon âme! Réveillez-vous, mon luth et ma harpe!
  - type: text
    content: Je réveillerai l’aurore.
