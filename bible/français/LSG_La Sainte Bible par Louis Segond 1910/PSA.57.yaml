document_id: PSA.57,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 1 S 24. (Ps 142; 108:1-7.)
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Au chef des chantres. “Ne détruis pas.” Hymne de David. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 22:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 24:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Lorsqu’il se réfugia dans la caverne, poursuivi par Saül.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 108:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Je te louerai parmi les peuples, Seigneur!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je te chanterai parmi les nations.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 36:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 108:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Car ta bonté atteint jusqu’aux cieux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ta fidélité jusqu’aux nues.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Élève-toi sur les cieux, ô Dieu!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que ta gloire soit sur toute la terre!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aie pitié de moi, ô Dieu, aie pitié de moi!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car en toi mon âme cherche un refuge;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je cherche un refuge à l’ombre de tes ailes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jusqu’à ce que les calamités soient passées.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je crie au Dieu Très-Haut,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au Dieu qui agit en ma faveur.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il m’enverra du ciel le salut,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tandis que mon persécuteur se répand en outrages; '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: — Pause.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu enverra sa bonté et sa fidélité.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon âme est parmi des lions;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis couché au milieu de gens qui vomissent la flamme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au milieu d’hommes qui ont pour dents la lance et les flèches,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et dont la langue est un glaive tranchant.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 108:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Élève-toi sur les cieux, ô Dieu!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que ta gloire soit sur toute la terre!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ils avaient tendu un filet sous mes pas:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon âme se courbait;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 7:16
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Ils avaient creusé une fosse devant moi:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ils y sont tombés. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: — Pause.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ps 108:2, etc.
      marker-yv: yv-n
    - type: text
      text: Mon cœur est affermi, ô Dieu! Mon cœur est affermi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je chanterai, je ferai retentir mes instruments.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Réveille-toi, mon âme! Réveillez-vous, mon luth et ma harpe!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je réveillerai l’aurore.
