document_id: PSA.57
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 1 S 24. (Ps 142; 108:1-7.)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Au chef des chantres. “Ne détruis pas.” Hymne de David. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 22:1
      metadata:
        usfm: 1SA.22.1
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 24:4
      metadata:
        usfm: 1SA.24.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Lorsqu’il se réfugia dans la caverne, poursuivi par Saül.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Aie pitié de moi, ô Dieu, aie pitié de moi!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car en toi mon âme cherche un refuge;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je cherche un refuge à l’ombre de tes ailes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jusqu’à ce que les calamités soient passées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Je crie au Dieu Très-Haut,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au Dieu qui agit en ma faveur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Il m’enverra du ciel le salut,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tandis que mon persécuteur se répand en outrages; '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: — Pause.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dieu enverra sa bonté et sa fidélité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mon âme est parmi des lions;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je suis couché au milieu de gens qui vomissent la flamme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au milieu d’hommes qui ont pour dents la lance et les flèches,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et dont la langue est un glaive tranchant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 108:6
      metadata:
        usfm: PSA.108.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Élève-toi sur les cieux, ô Dieu!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que ta gloire soit sur toute la terre!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ils avaient tendu un filet sous mes pas:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon âme se courbait;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 7:16
      metadata:
        usfm: PSA.7.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 9:16
      metadata:
        usfm: PSA.9.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ils avaient creusé une fosse devant moi:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ils y sont tombés. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: — Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ps 108:2, etc.
    marker-yv: yv-n
  - type: text
    text: Mon cœur est affermi, ô Dieu! Mon cœur est affermi;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je chanterai, je ferai retentir mes instruments.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Réveille-toi, mon âme! Réveillez-vous, mon luth et ma harpe!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je réveillerai l’aurore.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 108:4
      metadata:
        usfm: PSA.108.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Je te louerai parmi les peuples, Seigneur!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je te chanterai parmi les nations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 36:6
      metadata:
        usfm: PSA.36.6
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 108:5
      metadata:
        usfm: PSA.108.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Car ta bonté atteint jusqu’aux cieux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ta fidélité jusqu’aux nues.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Élève-toi sur les cieux, ô Dieu!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que ta gloire soit sur toute la terre!
