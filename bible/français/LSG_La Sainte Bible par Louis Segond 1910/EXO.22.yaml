document_id: EXO.22,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Lois relatives à la propriété et aux mœurs
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-15: cf. (Ex 20:15. 2 S 12:1-6. Za 5:3, 4.) Lé 6:2-7.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Si '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 12:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'un homme dérobe un bœuf ou un agneau, et qu’il l’égorge ou le vende, il restituera cinq bœufs pour le bœuf et quatre agneaux pour l’agneau. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Si un homme donne à un autre un âne, un bœuf, un agneau, ou un animal quelconque à garder, et que l’animal meure, se casse un membre, ou soit enlevé, sans que personne l’ait vu, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'le serment au nom de l’Éternel interviendra entre les deux parties, et celui qui a gardé l’animal déclarera qu’il n’a pas mis la main sur le bien de son prochain; le maître de l’animal acceptera ce serment, et l’autre ne sera point tenu à une restitution. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Mais si l’animal a été dérobé chez lui, il sera tenu vis-à-vis de son maître à une restitution. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Si l’animal a été déchiré, il le produira en témoignage, et il ne sera point tenu à une restitution pour ce qui a été déchiré. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Si un homme emprunte à un autre un animal, et que l’animal se casse un membre ou qu’il meure, en l’absence de son maître, il y aura lieu à restitution. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Si le maître est présent, il n’y aura pas lieu à restitution. Si l’animal a été loué, le prix du louage suffira.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 16-20: cf. De 22:28, 29. (Lé 20:27. De 18:10-14.) De 13.'
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Si un homme séduit une vierge qui n’est point fiancée, et qu’il couche avec elle, il paiera sa dot et la prendra pour femme. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Si le père refuse de la lui accorder, il paiera en argent la valeur de la dot des vierges. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 18:10
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '11'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Tu ne laisseras point vivre la magicienne. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 18:23
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 20:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Quiconque couche avec une bête sera puni de mort. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Si le voleur est surpris dérobant avec effraction, et qu’il soit frappé et meure, on ne sera point coupable de meurtre envers lui; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 17:2
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '4'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '5'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Celui qui offre des sacrifices à d’autres dieux qu’à l’Éternel seul sera voué à l’extermination.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 21-27: cf. (Lé 19:33, 34. De 24:17-22; 10:17-19. Ps 10:14-18; 68:6.) De 24:10-15.'
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 19:34
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Tu ne maltraiteras point l’étranger, et tu ne l’opprimeras point; car vous avez été étrangers dans le pays d’Égypte. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Za 7:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Tu n’affligeras point la veuve, ni l’orphelin. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Si tu les affliges, et qu’ils viennent à moi, j’entendrai leurs cris; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'ma colère s’enflammera, et je vous détruirai par l’épée; vos femmes deviendront veuves, et vos enfants orphelins. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 25:36
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '37'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 23:19
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '20'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 15:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 28:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 18:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Si tu prêtes de l’argent à mon peuple, au pauvre qui est avec toi, tu ne seras point à son égard comme un créancier, tu n’exigeras de lui point d’intérêt. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 24:12
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '13'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Si tu prends en gage le vêtement de ton prochain, tu le lui rendras avant le coucher du soleil; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'car c’est sa seule couverture, c’est le vêtement dont il s’enveloppe le corps: dans quoi coucherait-il? S’il crie à moi, je l’entendrai, car je suis miséricordieux.'
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 28-31: cf. Ro 13:1-7. (Pr 3:9, 10. Ex 13:2, 11-16.)'
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Tu ne maudiras point Dieu, et tu ne maudiras point '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 23:3
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '4'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '5'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'le prince de ton peuple. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Tu ne différeras point de m’offrir les prémices de ta moisson et de ta vendange. Tu me donneras '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 13:2
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '12'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'le premier-né de tes fils. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'mais si le soleil est levé, on sera coupable de meurtre envers lui. Il fera restitution; s’il n’a rien, il sera vendu pour son vol; '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 23:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 22:27
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 44:30
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Tu me donneras aussi le premier-né de ta vache et de ta brebis; il restera sept jours avec sa mère; le huitième jour, tu me le donneras. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Vous serez pour moi des hommes saints. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 22:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 44:31
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Vous ne mangerez point de chair déchirée dans les champs: vous la jetterez aux chiens.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'si ce qu’il a dérobé, bœuf, âne, ou agneau, se trouve encore vivant entre ses mains, il fera une restitution au double. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Si un homme fait du dégât dans un champ ou dans une vigne, et qu’il laisse son bétail paître dans le champ d’autrui, il donnera en dédommagement le meilleur produit de son champ et de sa vigne. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Si un feu éclate et rencontre des épines, et que du blé en gerbes ou sur pied, ou bien le champ, soit consumé, celui qui a causé l’incendie sera tenu à un dédommagement. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Si un homme donne à un autre de l’argent ou des objets à garder, et qu’on les vole dans la maison de ce dernier, le voleur fera une restitution au double, dans le cas où il serait trouvé. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Si le voleur ne se trouve pas, le maître de la maison se présentera devant Dieu, pour déclarer qu’il n’a pas mis la main sur le bien de son prochain. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Dans toute affaire frauduleuse concernant un bœuf, un âne, un agneau, un vêtement, ou un objet perdu, au sujet duquel on dira: C’est cela! — la cause des deux parties ira jusqu’à Dieu; celui que Dieu condamnera fera à son prochain une restitution au double. '
