    marker-yv: yv-n
  - type: text
    text: 'je cherche en toi mon refuge:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que jamais je ne sois confondu!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Dans ta justice, sauve-moi et délivre-moi!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Incline vers moi ton oreille, et secours-moi!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Sois pour moi un rocher qui me serve d’asile,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Où je puisse toujours me retirer!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu as résolu de me sauver,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car tu es mon rocher et ma forteresse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mon Dieu, délivre-moi de la main du méchant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De la main de l’homme inique et violent!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Car tu es mon espérance, Seigneur Éternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: En toi je me confie dès ma jeunesse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dès le ventre de ma mère je m’appuie sur toi;
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est toi qui m’as fait sortir du sein maternel;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu es sans cesse l’objet de mes louanges.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Je suis pour plusieurs comme un prodige,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et toi, tu es mon puissant refuge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Que ma bouche soit remplie de tes louanges,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que chaque jour elle te glorifie!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ne me rejette pas au temps de la vieillesse;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand mes forces s’en vont, ne m’abandonne pas!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Car mes ennemis parlent de moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ceux qui guettent ma vie se consultent entre eux,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Disant: Dieu l’abandonne;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Poursuivez, saisissez-le; il n’y a personne pour le délivrer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: O Dieu, ne t’éloigne pas de moi!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon Dieu, viens en hâte à mon secours!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 35:4
      metadata:
        usfm: PSA.35.4
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '26'
      metadata:
        usfm: PSA.35.26
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 40:15
      metadata:
        usfm: PSA.40.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 70:3
      metadata:
        usfm: PSA.70.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Qu’ils soient confus, anéantis, ceux qui en veulent à ma vie!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’ils soient couverts de honte et d’opprobre, ceux qui cherchent ma perte!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Et moi, j’espérerai toujours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je te louerai de plus en plus.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ma bouche publiera ta justice, ton salut, chaque jour,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car j’ignore quelles en sont les bornes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Je dirai tes œuvres puissantes, Seigneur Éternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je rappellerai ta justice, la tienne seule.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: O Dieu! Tu m’as instruit dès ma jeunesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et jusqu’à présent j’annonce tes merveilles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ne m’abandonne pas, ô Dieu! Même dans la blanche vieillesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afin que j’annonce ta force à la génération présente,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ta puissance à la génération future!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ta justice, ô Dieu! Atteint jusqu’au ciel;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tu as accompli de grandes choses: ô Dieu! Qui est semblable à toi?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tu nous as fait éprouver bien des détresses et des malheurs;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais tu nous redonneras la vie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu nous feras remonter des abîmes de la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Relève ma grandeur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Console-moi de nouveau!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Et je te louerai au son du luth, je chanterai ta fidélité, mon Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je te célébrerai avec la harpe, Saint d’Israël!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: En te célébrant, j’aurai la joie sur les lèvres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La joie dans mon âme que tu as délivrée;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ma langue chaque jour publiera ta justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car ceux qui cherchent ma perte sont honteux et confus.
