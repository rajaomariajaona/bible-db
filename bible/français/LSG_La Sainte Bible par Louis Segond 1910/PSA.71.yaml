    children:
    - type: text
      text: 2 S 17. (Ps 70; 31; 55 à 57.)
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Éternel! '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 22:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 25:2
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 31:2
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 49:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'je cherche en toi mon refuge:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que jamais je ne sois confondu!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Car mes ennemis parlent de moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ceux qui guettent ma vie se consultent entre eux,
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Disant: Dieu l’abandonne;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Poursuivez, saisissez-le; il n’y a personne pour le délivrer.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: O Dieu, ne t’éloigne pas de moi!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon Dieu, viens en hâte à mon secours!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 35:4
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '26'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 40:15
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 70:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Qu’ils soient confus, anéantis, ceux qui en veulent à ma vie!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’ils soient couverts de honte et d’opprobre, ceux qui cherchent ma perte!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Et moi, j’espérerai toujours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je te louerai de plus en plus.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ma bouche publiera ta justice, ton salut, chaque jour,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car j’ignore quelles en sont les bornes.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Je dirai tes œuvres puissantes, Seigneur Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je rappellerai ta justice, la tienne seule.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: O Dieu! Tu m’as instruit dès ma jeunesse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et jusqu’à présent j’annonce tes merveilles.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ne m’abandonne pas, ô Dieu! Même dans la blanche vieillesse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afin que j’annonce ta force à la génération présente,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ta puissance à la génération future!
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ta justice, ô Dieu! Atteint jusqu’au ciel;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tu as accompli de grandes choses: ô Dieu! Qui est semblable à toi?'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Dans ta justice, sauve-moi et délivre-moi!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Incline vers moi ton oreille, et secours-moi!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Tu nous as fait éprouver bien des détresses et des malheurs;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais tu nous redonneras la vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu nous feras remonter des abîmes de la terre.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Relève ma grandeur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Console-moi de nouveau!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Et je te louerai au son du luth, je chanterai ta fidélité, mon Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je te célébrerai avec la harpe, Saint d’Israël!
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: En te célébrant, j’aurai la joie sur les lèvres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La joie dans mon âme que tu as délivrée;
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Ma langue chaque jour publiera ta justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car ceux qui cherchent ma perte sont honteux et confus.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Sois pour moi un rocher qui me serve d’asile,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Où je puisse toujours me retirer!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as résolu de me sauver,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car tu es mon rocher et ma forteresse.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Mon Dieu, délivre-moi de la main du méchant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De la main de l’homme inique et violent!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Car tu es mon espérance, Seigneur Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En toi je me confie dès ma jeunesse.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Dès le ventre de ma mère je m’appuie sur toi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est toi qui m’as fait sortir du sein maternel;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu es sans cesse l’objet de mes louanges.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Je suis pour plusieurs comme un prodige,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et toi, tu es mon puissant refuge.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Que ma bouche soit remplie de tes louanges,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que chaque jour elle te glorifie!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ne me rejette pas au temps de la vieillesse;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand mes forces s’en vont, ne m’abandonne pas!
