document_id: PSA.71,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 2 S 17. (Ps 70; 31; 55 à 57.)
  - type: text
    content: 'Éternel! '
  - type: note
    content: Ps 22:6; 25:2, 3; 31:2, 3. És 49:23.
  - type: text
    content: 'je cherche en toi mon refuge:'
  - type: text
    content: Que jamais je ne sois confondu!
  '10':
  - type: text
    content: Car mes ennemis parlent de moi,
  - type: text
    content: Et ceux qui guettent ma vie se consultent entre eux,
  '11':
  - type: text
    content: 'Disant: Dieu l’abandonne;'
  - type: text
    content: Poursuivez, saisissez-le; il n’y a personne pour le délivrer.
  '12':
  - type: text
    content: O Dieu, ne t’éloigne pas de moi!
  - type: text
    content: Mon Dieu, viens en hâte à mon secours!
  '13':
  - type: text
    content: ' '
  - type: note
    content: Ps 35:4, 26; 40:15; 70:3.
  - type: text
    content: Qu’ils soient confus, anéantis, ceux qui en veulent à ma vie!
  - type: text
    content: Qu’ils soient couverts de honte et d’opprobre, ceux qui cherchent ma perte!
  '14':
  - type: text
    content: Et moi, j’espérerai toujours,
  - type: text
    content: Je te louerai de plus en plus.
  '15':
  - type: text
    content: Ma bouche publiera ta justice, ton salut, chaque jour,
  - type: text
    content: Car j’ignore quelles en sont les bornes.
  '16':
  - type: text
    content: Je dirai tes œuvres puissantes, Seigneur Éternel!
  - type: text
    content: Je rappellerai ta justice, la tienne seule.
  '17':
  - type: text
    content: O Dieu! Tu m’as instruit dès ma jeunesse,
  - type: text
    content: Et jusqu’à présent j’annonce tes merveilles.
  '18':
  - type: text
    content: Ne m’abandonne pas, ô Dieu! Même dans la blanche vieillesse,
  - type: text
    content: Afin que j’annonce ta force à la génération présente,
  - type: text
    content: Ta puissance à la génération future!
  '19':
  - type: text
    content: Ta justice, ô Dieu! Atteint jusqu’au ciel;
  - type: text
    content: 'Tu as accompli de grandes choses: ô Dieu! Qui est semblable à toi?'
  '2':
  - type: text
    content: Dans ta justice, sauve-moi et délivre-moi!
  - type: text
    content: Incline vers moi ton oreille, et secours-moi!
  '20':
  - type: text
    content: Tu nous as fait éprouver bien des détresses et des malheurs;
  - type: text
    content: Mais tu nous redonneras la vie,
  - type: text
    content: Tu nous feras remonter des abîmes de la terre.
  '21':
  - type: text
    content: Relève ma grandeur,
  - type: text
    content: Console-moi de nouveau!
  '22':
  - type: text
    content: Et je te louerai au son du luth, je chanterai ta fidélité, mon Dieu,
  - type: text
    content: Je te célébrerai avec la harpe, Saint d’Israël!
  '23':
  - type: text
    content: En te célébrant, j’aurai la joie sur les lèvres,
  - type: text
    content: La joie dans mon âme que tu as délivrée;
  '24':
  - type: text
    content: Ma langue chaque jour publiera ta justice,
  - type: text
    content: Car ceux qui cherchent ma perte sont honteux et confus.
  '3':
  - type: text
    content: Sois pour moi un rocher qui me serve d’asile,
  - type: text
    content: Où je puisse toujours me retirer!
  - type: text
    content: Tu as résolu de me sauver,
  - type: text
    content: Car tu es mon rocher et ma forteresse.
  '4':
  - type: text
    content: Mon Dieu, délivre-moi de la main du méchant,
  - type: text
    content: De la main de l’homme inique et violent!
  '5':
  - type: text
    content: Car tu es mon espérance, Seigneur Éternel!
  - type: text
    content: En toi je me confie dès ma jeunesse.
  '6':
  - type: text
    content: Dès le ventre de ma mère je m’appuie sur toi;
  - type: text
    content: C’est toi qui m’as fait sortir du sein maternel;
  - type: text
    content: Tu es sans cesse l’objet de mes louanges.
  '7':
  - type: text
    content: Je suis pour plusieurs comme un prodige,
  - type: text
    content: Et toi, tu es mon puissant refuge.
  '8':
  - type: text
    content: Que ma bouche soit remplie de tes louanges,
  - type: text
    content: Que chaque jour elle te glorifie!
  '9':
  - type: text
    content: Ne me rejette pas au temps de la vieillesse;
  - type: text
    content: Quand mes forces s’en vont, ne m’abandonne pas!
