document_id: EXO.9
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-7: cf. (Ps 78:50. Job 9:4.) Mal 3:18.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Éternel dit à Moïse: Va vers Pharaon, et tu lui diras: Ainsi parle l’Éternel, le Dieu des Hébreux: Laisse aller mon peuple, afin qu’il me serve. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Si tu refuses de le laisser aller, et si tu le retiens encore, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'voici, la main de l’Éternel sera sur tes troupeaux qui sont dans les champs, sur les chevaux, sur les ânes, sur les chameaux, sur les bœufs et sur les brebis; il y aura une mortalité très grande. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'L’Éternel distinguera entre les troupeaux d’Israël et les troupeaux des Égyptiens, et il ne périra rien de tout ce qui est aux enfants d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'L’Éternel fixa le temps, et dit: Demain, l’Éternel fera cela dans le pays. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Et l’Éternel fit ainsi, dès le lendemain. Tous les troupeaux des Égyptiens périrent, et il ne périt pas une bête des troupeaux des enfants d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Pharaon s’informa de ce qui était arrivé; et voici, pas une bête des troupeaux d’Israël n’avait péri. Mais le cœur de Pharaon s’endurcit, et il ne laissa point aller le peuple.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 8-12: cf. (Ps 78:50. De 28:27. Ap 16:2.) És 47:13-15.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'L’Éternel dit à Moïse et à Aaron: Remplissez vos mains de cendre de fournaise, et que Moïse la jette vers le ciel, sous les yeux de Pharaon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Elle deviendra une poussière qui couvrira tout le pays d’Égypte; et elle produira, dans tout le pays d’Égypte, sur les hommes et sur les animaux, des ulcères formés par une éruption de pustules. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ils prirent de la cendre de fournaise, et se présentèrent devant Pharaon; Moïse la jeta vers le ciel, et elle produisit sur les hommes et sur les animaux des ulcères formés par une éruption de pustules. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Les magiciens ne purent paraître devant Moïse, à cause des ulcères; car les ulcères étaient sur les magiciens, comme sur tous les Égyptiens. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: L’Éternel endurcit le cœur de Pharaon, et Pharaon n’écouta point Moïse et Aaron, selon ce que l’Éternel avait dit à Moïse.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 13-35: cf. (Ps 78:47, 48; 105:32, 33.) (Ap 8:7; 16:21.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'L’Éternel dit à Moïse: Lève-toi de bon matin, et présente-toi devant Pharaon. Tu lui diras: Ainsi parle l’Éternel, le Dieu des Hébreux: Laisse aller mon peuple, afin qu’il me serve. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Car, cette fois, je vais envoyer toutes mes plaies contre ton cœur, contre tes serviteurs et contre ton peuple, afin que tu saches que nul n’est semblable à moi sur toute la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Si j’avais étendu ma main, et que je t’eusse frappé par la mortalité, toi et ton peuple, tu aurais disparu de la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 9:17
      metadata:
        usfm: ROM.9.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Mais, je t’ai laissé subsister, afin que tu voies ma puissance, et que l’on publie mon nom par toute la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Si tu t’élèves encore contre mon peuple, et si tu ne le laisses point aller, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'voici, je ferai pleuvoir demain, à cette heure, une grêle tellement forte, qu’il n’y en a point eu de semblable en Égypte depuis le jour où elle a été fondée jusqu’à présent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fais donc mettre en sûreté tes troupeaux et tout ce qui est à toi dans les champs. La grêle tombera sur tous les hommes et sur tous les animaux qui se trouveront dans les champs et qui n’auront pas été recueillis dans les maisons, et ils périront. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ceux des serviteurs de Pharaon qui craignirent la parole de l’Éternel firent retirer dans les maisons leurs serviteurs et leurs troupeaux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Mais ceux qui ne prirent point à cœur la parole de l’Éternel laissèrent leurs serviteurs et leurs troupeaux dans les champs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'L’Éternel dit à Moïse: Étends ta main vers le ciel; et qu’il tombe de la grêle dans tout le pays d’Égypte sur les hommes, sur les animaux, et sur toutes les herbes des champs, dans le pays d’Égypte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Moïse étendit sa verge vers le ciel; et l’Éternel envoya des tonnerres et de la grêle, et le feu se promenait sur la terre. L’Éternel fit pleuvoir de la grêle sur le pays d’Égypte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Il tomba de la grêle, et le feu se mêlait avec la grêle; elle était tellement forte qu’il n’y en avait point eu de semblable dans tout le pays d’Égypte depuis qu’il existe comme nation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'La grêle frappa, dans tout le pays d’Égypte, tout ce qui était dans les champs, depuis les hommes jusqu’aux animaux; la grêle frappa aussi toutes les herbes des champs, et brisa tous les arbres des champs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ce fut seulement dans le pays de Gosen, où étaient les enfants d’Israël, qu’il n’y eut point de grêle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Pharaon fit appeler Moïse et Aaron, et leur dit: Cette fois, j’ai péché; c’est l’Éternel qui est le juste, et moi et mon peuple nous sommes les coupables. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Priez l’Éternel, pour qu’il n’y ait plus de tonnerres et de grêle; et je vous laisserai aller, et l’on ne vous retiendra plus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Moïse lui dit: Quand je sortirai de la ville, je lèverai mes mains vers l’Éternel, les tonnerres cesseront et il n’y aura plus de grêle, afin que tu saches que la terre est à l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Mais je sais que toi et tes serviteurs, vous ne craindrez pas encore l’Éternel Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Le lin et l’orge avaient été frappés, parce que l’orge était en épis et que c’était la floraison du lin; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'le froment et l’épeautre n’avaient point été frappés, parce qu’ils sont tardifs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Moïse sortit de chez Pharaon, pour aller hors de la ville; il leva ses mains vers l’Éternel, les tonnerres et la grêle cessèrent, et la pluie ne tomba plus sur la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Pharaon, voyant que la pluie, la grêle et les tonnerres avaient cessé, continua de pécher, et il endurcit son cœur, lui et ses serviteurs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 4:21
      metadata:
        usfm: EXO.4.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Le cœur de Pharaon s’endurcit, et il ne laissa point aller les enfants d’Israël, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 7:3
      metadata:
        usfm: EXO.7.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: selon ce que l’Éternel avait dit par l’intermédiaire de Moïse.
