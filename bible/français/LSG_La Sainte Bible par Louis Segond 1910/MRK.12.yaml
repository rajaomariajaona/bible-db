      - type: text
        text: Lu 20:9
      metadata:
        usfm: LUK.20.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Jésus se mit ensuite à leur parler en paraboles. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Un
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 80:9
      metadata:
        usfm: PSA.80.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 5:1
      metadata:
        usfm: ISA.5.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 2:21
      metadata:
        usfm: JER.2.21
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 12:10
      metadata:
        usfm: JER.12.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: homme planta une vigne. Il l’entoura d’une haie, creusa un pressoir, et bâtit une tour; puis il l’afferma à des vignerons, et quitta le pays.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Au temps de la récolte, il envoya un serviteur vers les vignerons, pour recevoir d’eux une part du produit de la vigne.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: S’étant saisis de lui, ils le battirent, et le renvoyèrent à vide.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Il envoya de nouveau vers eux un autre serviteur; ils le frappèrent à la tête, et l’outragèrent.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Il en envoya un troisième, qu’ils tuèrent; puis plusieurs autres, qu’ils battirent ou tuèrent.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Il avait encore un fils bien-aimé; il l’envoya vers eux le dernier, en disant: Ils auront du respect pour mon fils.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Mais ces vignerons dirent entre eux:'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 2:8
      metadata:
        usfm: PSA.2.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Voici l’héritier;
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 37:18
      metadata:
        usfm: GEN.37.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 26:3
      metadata:
        usfm: MAT.26.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 11:53
      metadata:
        usfm: JHN.11.53
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: venez, tuons-le, et l’héritage sera à nous.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Et ils se saisirent de lui, le tuèrent, et le jetèrent hors de la vigne.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Maintenant, que fera le maître de la vigne? Il viendra, fera périr les vignerons, et il donnera la vigne à d’autres.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'N’avez-vous pas lu cette parole de l’Écriture:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 118:22
      metadata:
        usfm: PSA.118.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 28:16
      metadata:
        usfm: ISA.28.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 21:42
      metadata:
        usfm: MAT.21.42
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 20:17
      metadata:
        usfm: LUK.20.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 4:11
      metadata:
        usfm: ACT.4.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 9:33
      metadata:
        usfm: ROM.9.33
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 2:6
      metadata:
        usfm: 1PE.2.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: La pierre qu’ont rejetée ceux qui bâtissaient
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Est devenue la principale de l’angle;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: C’est par la volonté du Seigneur qu’elle l’est devenue,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Et c’est un prodige à nos yeux?
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ils cherchaient à se saisir de lui, mais ils craignaient la foule. Ils avaient compris que c’était pour eux que Jésus avait dit cette parabole. Et ils le quittèrent, et s’en allèrent.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Questions captieuses proposées à Jésus sur le tribut à César, la résurrection, le plus grand commandement
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 13-17: cf. Mt 22:15-22. Lu 20:20-26.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 22:15
      metadata:
        usfm: MAT.22.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 20:20
      metadata:
        usfm: LUK.20.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ils envoyèrent auprès de Jésus quelques-uns des pharisiens et des hérodiens, afin de le surprendre par ses propres paroles. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Et ils vinrent lui dire: Maître, nous savons que tu es vrai, et que tu ne t’inquiètes de personne; car tu ne regardes pas à l’apparence des hommes, et tu enseignes la voie de Dieu selon la vérité. Est-il permis, ou non, de payer le tribut à César? Devons-nous payer, ou ne pas payer? '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Jésus, connaissant leur hypocrisie, leur répondit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Pourquoi me tentez-vous? Apportez-moi un denier, afin que je le voie.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ils en apportèrent un; et Jésus leur demanda: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: De qui sont cette effigie et cette inscription?
  - type: text
    text: ' De César, lui répondirent-ils. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Alors il leur dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 17:25
      metadata:
        usfm: MAT.17.25
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 22:21
      metadata:
        usfm: MAT.22.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 13:7
      metadata:
        usfm: ROM.13.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Rendez à César ce qui est à César, et à Dieu ce qui est à Dieu.
  - type: text
    text: ' Et ils furent à son égard dans l’étonnement.'
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 18-27: cf. (Mt 22:23-33. Lu 20:27-40.) 2 Ti 3:8, 9.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 22:23
      metadata:
        usfm: MAT.22.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 20:27
      metadata:
        usfm: LUK.20.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 23:8
      metadata:
        usfm: ACT.23.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Les sadducéens, qui disent qu’il n’y a point de résurrection, vinrent auprès de Jésus, et lui firent cette question: '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Maître, voici ce que Moïse nous a prescrit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 25:5
      metadata:
        usfm: DEU.25.5
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '6'
      metadata:
        usfm: DEU.25.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Si le frère de quelqu’un meurt, et laisse une femme, sans avoir d’enfants, son frère épousera sa veuve, et suscitera une postérité à son frère. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Or, il y avait sept frères. Le premier se maria, et mourut sans laisser de postérité. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Le second prit la veuve pour femme, et mourut sans laisser de postérité. Il en fut de même du troisième, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'et aucun des sept ne laissa de postérité. Après eux tous, la femme mourut aussi. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'A la résurrection, duquel d’entre eux sera-t-elle la femme? Car les sept l’ont eue pour femme. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Jésus leur répondit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: N’êtes-vous pas dans l’erreur, parce que vous ne comprenez ni les Écritures, ni la puissance de Dieu?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Car, à la résurrection des morts, les hommes ne prendront point de femmes, ni les femmes de maris, mais ils seront
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 22:30
      metadata:
        usfm: MAT.22.30
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Jn 3:2
      metadata:
        usfm: 1JN.3.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: comme les anges dans les cieux.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Pour ce qui est de la résurrection des morts, n’avez-vous pas lu, dans le livre de Moïse, ce que Dieu lui dit, à propos du buisson:'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 3:6
      metadata:
        usfm: EXO.3.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 22:31
      metadata:
        usfm: MAT.22.31
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '32'
      metadata:
        usfm: MAT.22.32
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 7:32
      metadata:
        usfm: ACT.7.32
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 11:16
      metadata:
        usfm: HEB.11.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je suis le Dieu d’Abraham, le Dieu d’Isaac, et le Dieu de Jacob?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Dieu n’est pas Dieu des morts, mais des vivants. Vous êtes grandement dans l’erreur.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 28-34: cf. Mt 22:34-40. (Lu 10:25-37. Ro 13:8-10.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 22:34
      metadata:
        usfm: MAT.22.34
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 10:25
      metadata:
        usfm: LUK.10.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Un des scribes, qui les avait entendus discuter, sachant que Jésus avait bien répondu aux sadducéens, s’approcha, et lui demanda: Quel est le premier de tous les commandements? '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Jésus répondit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Voici le premier:'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 6:4
      metadata:
        usfm: DEU.6.4
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 10:12
      metadata:
        usfm: DEU.10.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 10:27
      metadata:
        usfm: LUK.10.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Écoute, Israël, le Seigneur, notre Dieu, est l’unique Seigneur;
- type: usfm
  marker: p
