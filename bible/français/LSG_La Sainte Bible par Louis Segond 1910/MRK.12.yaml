document_id: MRK.12
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Parabole des vignerons. La pierre de l’angle
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-12: cf. (Mt 21:33-46. Lu 20:9-19.) És 5:1-7.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 21:33
      metadata:
        usfm: MAT.21.33
    - type: text
      text: '. '
    - type: usfm
      marker: ref
