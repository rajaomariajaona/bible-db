document_id: MRK.12,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Parabole des vignerons. La pierre de l’angle
  - type: heading
    content: 'V. 1-12: cf. (Mt 21:33-46. Lu 20:9-19.) És 5:1-7.'
  - type: text
    content: ' '
  - type: note
    content: Mt 21:33. Lu 20:9.
  - type: text
    content: 'Jésus se mit ensuite à leur parler en paraboles. '
  - type: text
    content: Un
  - type: text
    content: ' '
  - type: note
    content: Ps 80:9. És 5:1. Jé 2:21; 12:10.
  - type: text
    content: homme planta une vigne. Il l’entoura d’une haie, creusa un pressoir, et bâtit une tour; puis il l’afferma à des vignerons, et quitta le pays.
  '10':
  - type: text
    content: 'N’avez-vous pas lu cette parole de l’Écriture:'
  - type: note
    content: Ps 118:22. És 28:16. Mt 21:42. Lu 20:17. Ac 4:11. Ro 9:33. 1 Pi 2:6.
  - type: text
    content: La pierre qu’ont rejetée ceux qui bâtissaient
  - type: text
    content: Est devenue la principale de l’angle;
  '11':
  - type: text
    content: ' '
  - type: text
    content: C’est par la volonté du Seigneur qu’elle l’est devenue,
  - type: text
    content: Et c’est un prodige à nos yeux?
  '12':
  - type: text
    content: Ils cherchaient à se saisir de lui, mais ils craignaient la foule. Ils avaient compris que c’était pour eux que Jésus avait dit cette parabole. Et ils le quittèrent, et s’en allèrent.
  - type: heading
    content: Questions captieuses proposées à Jésus sur le tribut à César, la résurrection, le plus grand commandement
  - type: heading
    content: 'V. 13-17: cf. Mt 22:15-22. Lu 20:20-26.'
  '13':
  - type: text
    content: ' '
  - type: note
    content: Mt 22:15. Lu 20:20.
  - type: text
    content: 'Ils envoyèrent auprès de Jésus quelques-uns des pharisiens et des hérodiens, afin de le surprendre par ses propres paroles. '
  '14':
  - type: text
    content: 'Et ils vinrent lui dire: Maître, nous savons que tu es vrai, et que tu ne t’inquiètes de personne; car tu ne regardes pas à l’apparence des hommes, et tu enseignes la voie de Dieu selon la vérité. Est-il permis, ou non, de payer le tribut à César? Devons-nous payer, ou ne pas payer? '
  '15':
  - type: text
    content: 'Jésus, connaissant leur hypocrisie, leur répondit: '
  - type: text
    content: Pourquoi me tentez-vous? Apportez-moi un denier, afin que je le voie.
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'Ils en apportèrent un; et Jésus leur demanda: '
  - type: text
    content: De qui sont cette effigie et cette inscription?
  - type: text
    content: ' De César, lui répondirent-ils. '
  '17':
  - type: text
    content: 'Alors il leur dit: '
  - type: note
    content: Mt 17:25; 22:21. Ro 13:7.
  - type: text
    content: Rendez à César ce qui est à César, et à Dieu ce qui est à Dieu.
  - type: text
    content: ' Et ils furent à son égard dans l’étonnement.'
  - type: heading
    content: 'V. 18-27: cf. (Mt 22:23-33. Lu 20:27-40.) 2 Ti 3:8, 9.'
  '18':
  - type: text
    content: ' '
  - type: note
    content: Mt 22:23. Lu 20:27. Ac 23:8.
  - type: text
    content: 'Les sadducéens, qui disent qu’il n’y a point de résurrection, vinrent auprès de Jésus, et lui firent cette question: '
  '19':
  - type: text
    content: 'Maître, voici ce que Moïse nous a prescrit: '
  - type: note
    content: De 25:5, 6.
  - type: text
    content: 'Si le frère de quelqu’un meurt, et laisse une femme, sans avoir d’enfants, son frère épousera sa veuve, et suscitera une postérité à son frère. '
  '2':
  - type: text
    content: ' '
  - type: text
    content: Au temps de la récolte, il envoya un serviteur vers les vignerons, pour recevoir d’eux une part du produit de la vigne.
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'Or, il y avait sept frères. Le premier se maria, et mourut sans laisser de postérité. '
  '21':
  - type: text
    content: 'Le second prit la veuve pour femme, et mourut sans laisser de postérité. Il en fut de même du troisième, '
  '22':
  - type: text
    content: 'et aucun des sept ne laissa de postérité. Après eux tous, la femme mourut aussi. '
  '23':
  - type: text
    content: 'A la résurrection, duquel d’entre eux sera-t-elle la femme? Car les sept l’ont eue pour femme. '
  '24':
  - type: text
    content: 'Jésus leur répondit: '
  - type: text
    content: N’êtes-vous pas dans l’erreur, parce que vous ne comprenez ni les Écritures, ni la puissance de Dieu?
  '25':
  - type: text
    content: ' '
  - type: text
    content: Car, à la résurrection des morts, les hommes ne prendront point de femmes, ni les femmes de maris, mais ils seront
  - type: text
    content: ' '
  - type: note
    content: Mt 22:30. 1 Jn 3:2.
  - type: text
    content: comme les anges dans les cieux.
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'Pour ce qui est de la résurrection des morts, n’avez-vous pas lu, dans le livre de Moïse, ce que Dieu lui dit, à propos du buisson:'
  - type: text
    content: ' '
  - type: note
    content: Ex 3:6. Mt 22:31, 32. Ac 7:32. Hé 11:16.
  - type: text
    content: Je suis le Dieu d’Abraham, le Dieu d’Isaac, et le Dieu de Jacob?
  - type: text
    content: ' '
  '27':
  - type: text
    content: Dieu n’est pas Dieu des morts, mais des vivants. Vous êtes grandement dans l’erreur.
  - type: heading
    content: 'V. 28-34: cf. Mt 22:34-40. (Lu 10:25-37. Ro 13:8-10.)'
  '28':
  - type: text
    content: ' '
  - type: note
    content: Mt 22:34. Lu 10:25.
  - type: text
    content: 'Un des scribes, qui les avait entendus discuter, sachant que Jésus avait bien répondu aux sadducéens, s’approcha, et lui demanda: Quel est le premier de tous les commandements? '
  '29':
  - type: text
    content: 'Jésus répondit: '
  - type: text
    content: 'Voici le premier:'
  - type: text
    content: ' '
  - type: note
    content: De 6:4; 10:12. Lu 10:27.
  - type: text
    content: Écoute, Israël, le Seigneur, notre Dieu, est l’unique Seigneur;
  '3':
  - type: text
    content: S’étant saisis de lui, ils le battirent, et le renvoyèrent à vide.
  - type: text
    content: ' '
  '30':
  - type: text
    content: ' '
  - type: text
    content: 'et: Tu aimeras le Seigneur, ton Dieu, de tout ton cœur, de toute ton âme, de toute ta pensée, et de toute ta force.'
  - type: text
    content: ' '
  '31':
  - type: text
    content: 'Voici le second:'
  - type: text
    content: ' '
  - type: note
    content: Lé 19:18. Mt 22:39. Ro 13:9. Ga 5:14. Ja 2:8.
  - type: text
    content: Tu aimeras ton prochain comme toi-même. Il n’y a pas d’autre commandement plus grand que ceux-là.
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'Le scribe lui dit: Bien, maître; tu as dit avec vérité que Dieu est unique, et qu’il n’y en a point d’autre que lui, '
  '33':
  - type: text
    content: 'et que l’aimer de tout son cœur, de toute sa pensée, de toute son âme et de toute sa force, et aimer son prochain comme soi-même, c’est plus que tous les holocaustes et tous les sacrifices. '
  '34':
  - type: text
    content: 'Jésus, voyant qu’il avait répondu avec intelligence, lui dit: '
  - type: text
    content: Tu n’es pas loin du royaume de Dieu.
  - type: text
    content: ' Et personne n’osa plus lui proposer des questions.'
  - type: heading
    content: De qui le Christ est-il fils?
  - type: heading
    content: 'V. 35-37: cf. (Mt 22:41-45. Lu 20:41-44.)'
  '35':
  - type: text
    content: ' '
  - type: note
    content: Mt 22:41. Lu 20:41.
  - type: text
    content: 'Jésus, continuant à enseigner dans le temple, dit: '
  - type: text
    content: Comment les scribes disent-ils que le Christ est fils de David?
  '36':
  - type: text
    content: ' '
  - type: text
    content: 'David lui-même, animé par l’Esprit-Saint, a dit:'
  - type: text
    content: 'Le Seigneur a dit à mon Seigneur:'
  - type: note
    content: Ps 110:1. Ac 2:34. 1 Co 15:25. Hé 1:13; 10:13.
  - type: text
    content: Assieds-toi à ma droite,
  - type: text
    content: Jusqu’à ce que je fasse de tes ennemis ton marchepied.
  '37':
  - type: text
    content: ' '
  - type: text
    content: David lui-même l’appelle Seigneur; comment donc est-il son fils?
  - type: text
    content: ' Et une grande foule l’écoutait avec plaisir.'
  - type: heading
    content: Les scribes censurés par Jésus
  - type: heading
    content: 'V. 38-40: cf. (Mt 23:1-14. Lu 20:45-47.)'
  '38':
  - type: text
    content: ' '
  - type: note
    content: Mt 23:5, 6. Lu 11:43; 20:46.
  - type: text
    content: 'Il leur disait dans son enseignement: '
  - type: text
    content: Gardez-vous des scribes, qui aiment à se promener en robes longues, et à être salués dans les places publiques;
  '39':
  - type: text
    content: ' '
  - type: text
    content: qui recherchent les premiers sièges dans les synagogues, et les premières places dans les festins;
  - type: text
    content: ' '
  '4':
  - type: text
    content: Il envoya de nouveau vers eux un autre serviteur; ils le frappèrent à la tête, et l’outragèrent.
  - type: text
    content: ' '
  '40':
  - type: note
    content: Mt 23:14. Lu 20:47. 2 Ti 3:6. Tit 1:11.
  - type: text
    content: qui dévorent les maisons des veuves, et qui font pour l’apparence de longues prières. Ils seront jugés plus sévèrement.
  - type: heading
    content: La pauvre veuve
  - type: heading
    content: 'V. 41-44: cf. Lu 21:1-4. (2 Co 8:1-5, 12.) 2 S 24:24. Mc 14:9.'
  '41':
  - type: text
    content: ' '
  - type: note
    content: Lu 21:1.
  - type: text
    content: 'Jésus, s’étant assis vis-à-vis '
  - type: note
    content: 2 R 12:9.
  - type: text
    content: 'du tronc, regardait comment la foule y mettait de l’argent. Plusieurs riches mettaient beaucoup. '
  '42':
  - type: text
    content: 'Il vint aussi une pauvre veuve, elle y mit deux petites pièces, faisant un quart de sou. '
  '43':
  - type: text
    content: 'Alors Jésus, ayant appelé ses disciples, leur dit: '
  - type: text
    content: Je vous le dis en vérité,
  - type: text
    content: ' '
  - type: note
    content: 2 Co 8:12.
  - type: text
    content: cette pauvre veuve a donné plus qu’aucun de ceux qui ont mis dans le tronc;
  '44':
  - type: text
    content: ' '
  - type: text
    content: car tous ont mis de leur superflu, mais elle a mis de son nécessaire, tout ce qu’elle possédait, tout ce qu’elle avait pour vivre.
  '5':
  - type: text
    content: Il en envoya un troisième, qu’ils tuèrent; puis plusieurs autres, qu’ils battirent ou tuèrent.
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'Il avait encore un fils bien-aimé; il l’envoya vers eux le dernier, en disant: Ils auront du respect pour mon fils.'
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'Mais ces vignerons dirent entre eux:'
  - type: text
    content: ' '
  - type: note
    content: Ps 2:8.
  - type: text
    content: Voici l’héritier;
  - type: text
    content: ' '
  - type: note
    content: Ge 37:18. Mt 26:3. Jn 11:53.
  - type: text
    content: venez, tuons-le, et l’héritage sera à nous.
  - type: text
    content: ' '
  '8':
  - type: text
    content: Et ils se saisirent de lui, le tuèrent, et le jetèrent hors de la vigne.
  - type: text
    content: ' '
  '9':
  - type: text
    content: Maintenant, que fera le maître de la vigne? Il viendra, fera périr les vignerons, et il donnera la vigne à d’autres.
  - type: text
    content: ' '
