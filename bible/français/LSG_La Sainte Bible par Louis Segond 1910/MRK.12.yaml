document_id: MRK.12,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Parabole des vignerons. La pierre de l’angle
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-12: cf. (Mt 21:33-46. Lu 20:9-19.) És 5:1-7.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 21:33
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 20:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Jésus se mit ensuite à leur parler en paraboles. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Un
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 80:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 5:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 2:21
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 12:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: homme planta une vigne. Il l’entoura d’une haie, creusa un pressoir, et bâtit une tour; puis il l’afferma à des vignerons, et quitta le pays.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'N’avez-vous pas lu cette parole de l’Écriture:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 118:22
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 28:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 21:42
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 20:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 4:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 9:33
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 2:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: La pierre qu’ont rejetée ceux qui bâtissaient
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Est devenue la principale de l’angle;
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: C’est par la volonté du Seigneur qu’elle l’est devenue,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Et c’est un prodige à nos yeux?
  '12':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Ils cherchaient à se saisir de lui, mais ils craignaient la foule. Ils avaient compris que c’était pour eux que Jésus avait dit cette parabole. Et ils le quittèrent, et s’en allèrent.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Questions captieuses proposées à Jésus sur le tribut à César, la résurrection, le plus grand commandement
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 13-17: cf. Mt 22:15-22. Lu 20:20-26.'
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 22:15
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 20:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Ils envoyèrent auprès de Jésus quelques-uns des pharisiens et des hérodiens, afin de le surprendre par ses propres paroles. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et ils vinrent lui dire: Maître, nous savons que tu es vrai, et que tu ne t’inquiètes de personne; car tu ne regardes pas à l’apparence des hommes, et tu enseignes la voie de Dieu selon la vérité. Est-il permis, ou non, de payer le tribut à César? Devons-nous payer, ou ne pas payer? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus, connaissant leur hypocrisie, leur répondit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Pourquoi me tentez-vous? Apportez-moi un denier, afin que je le voie.
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils en apportèrent un; et Jésus leur demanda: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: De qui sont cette effigie et cette inscription?
    - type: text
      text: ' De César, lui répondirent-ils. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors il leur dit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 17:25
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 22:21
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 13:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Rendez à César ce qui est à César, et à Dieu ce qui est à Dieu.
    - type: text
      text: ' Et ils furent à son égard dans l’étonnement.'
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 18-27: cf. (Mt 22:23-33. Lu 20:27-40.) 2 Ti 3:8, 9.'
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 22:23
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 20:27
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 23:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Les sadducéens, qui disent qu’il n’y a point de résurrection, vinrent auprès de Jésus, et lui firent cette question: '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maître, voici ce que Moïse nous a prescrit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 25:5
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Si le frère de quelqu’un meurt, et laisse une femme, sans avoir d’enfants, son frère épousera sa veuve, et suscitera une postérité à son frère. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Au temps de la récolte, il envoya un serviteur vers les vignerons, pour recevoir d’eux une part du produit de la vigne.
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or, il y avait sept frères. Le premier se maria, et mourut sans laisser de postérité. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le second prit la veuve pour femme, et mourut sans laisser de postérité. Il en fut de même du troisième, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et aucun des sept ne laissa de postérité. Après eux tous, la femme mourut aussi. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A la résurrection, duquel d’entre eux sera-t-elle la femme? Car les sept l’ont eue pour femme. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus leur répondit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: N’êtes-vous pas dans l’erreur, parce que vous ne comprenez ni les Écritures, ni la puissance de Dieu?
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Car, à la résurrection des morts, les hommes ne prendront point de femmes, ni les femmes de maris, mais ils seront
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 22:30
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Jn 3:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: comme les anges dans les cieux.
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Pour ce qui est de la résurrection des morts, n’avez-vous pas lu, dans le livre de Moïse, ce que Dieu lui dit, à propos du buisson:'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 3:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 22:31
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '32'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 7:32
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 11:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Je suis le Dieu d’Abraham, le Dieu d’Isaac, et le Dieu de Jacob?
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Dieu n’est pas Dieu des morts, mais des vivants. Vous êtes grandement dans l’erreur.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 28-34: cf. Mt 22:34-40. (Lu 10:25-37. Ro 13:8-10.)'
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 22:34
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 10:25
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Un des scribes, qui les avait entendus discuter, sachant que Jésus avait bien répondu aux sadducéens, s’approcha, et lui demanda: Quel est le premier de tous les commandements? '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus répondit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Voici le premier:'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 6:4
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 10:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Écoute, Israël, le Seigneur, notre Dieu, est l’unique Seigneur;
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: S’étant saisis de lui, ils le battirent, et le renvoyèrent à vide.
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'et: Tu aimeras le Seigneur, ton Dieu, de tout ton cœur, de toute ton âme, de toute ta pensée, et de toute ta force.'
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Voici le second:'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 19:18
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 22:39
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 13:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 5:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ja 2:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Tu aimeras ton prochain comme toi-même. Il n’y a pas d’autre commandement plus grand que ceux-là.
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le scribe lui dit: Bien, maître; tu as dit avec vérité que Dieu est unique, et qu’il n’y en a point d’autre que lui, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et que l’aimer de tout son cœur, de toute sa pensée, de toute son âme et de toute sa force, et aimer son prochain comme soi-même, c’est plus que tous les holocaustes et tous les sacrifices. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus, voyant qu’il avait répondu avec intelligence, lui dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Tu n’es pas loin du royaume de Dieu.
    - type: text
      text: ' Et personne n’osa plus lui proposer des questions.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: De qui le Christ est-il fils?
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 35-37: cf. (Mt 22:41-45. Lu 20:41-44.)'
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 22:41
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 20:41
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Jésus, continuant à enseigner dans le temple, dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Comment les scribes disent-ils que le Christ est fils de David?
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'David lui-même, animé par l’Esprit-Saint, a dit:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Le Seigneur a dit à mon Seigneur:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 110:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 2:34
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 15:25
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 1:13
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Assieds-toi à ma droite,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Jusqu’à ce que je fasse de tes ennemis ton marchepied.
  '37':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: David lui-même l’appelle Seigneur; comment donc est-il son fils?
    - type: text
      text: ' Et une grande foule l’écoutait avec plaisir.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les scribes censurés par Jésus
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 38-40: cf. (Mt 23:1-14. Lu 20:45-47.)'
    marker-yv: yv-h
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 23:5
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 11:43
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 20:46
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Il leur disait dans son enseignement: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Gardez-vous des scribes, qui aiment à se promener en robes longues, et à être salués dans les places publiques;
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: qui recherchent les premiers sièges dans les synagogues, et les premières places dans les festins;
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Il envoya de nouveau vers eux un autre serviteur; ils le frappèrent à la tête, et l’outragèrent.
    - type: text
      text: ' '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 23:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 20:47
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ti 3:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Tit 1:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
