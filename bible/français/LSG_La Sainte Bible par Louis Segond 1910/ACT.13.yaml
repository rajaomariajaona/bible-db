      marker: ref
      children:
      - type: text
        text: Ro 1:1
      metadata:
        usfm: ROM.1.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 1:15
      metadata:
        usfm: GAL.1.15
    - type: text
      text: '; '
    - type: usfm
