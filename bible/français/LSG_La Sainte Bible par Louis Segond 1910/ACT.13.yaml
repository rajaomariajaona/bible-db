  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Pendant qu’ils servaient le Seigneur dans leur ministère et qu’ils jeûnaient, le Saint-Esprit dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 9:15
      metadata:
        usfm: ACT.9.15
    - type: text
