document_id: ACT.13,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Barnabas et Saul envoyés en mission par l’Église d’Antioche. Dans l’île de Chypre: le magicien Élymas et le proconsul Sergius Paulus'
  - type: heading
    content: 'V. 1-12: cf. (Ga 2:7-9. Ac 14:26, 27.) 2 Ti 3:8, 9.'
  - type: text
    content: 'Il y avait dans l’Église '
  - type: note
    content: Ac 14:26.
  - type: text
    content: 'd’Antioche des prophètes et des docteurs: Barnabas, Siméon appelé Niger, Lucius de Cyrène, Manahen, qui avait été élevé avec Hérode le tétrarque, et Saul. '
  '10':
  - type: text
    content: 'Homme plein de toute espèce de ruse et de fraude, fils du diable, ennemi de toute justice, ne cesseras-tu point de pervertir les voies droites du Seigneur? '
  '11':
  - type: text
    content: 'Maintenant voici, la main du Seigneur est sur toi, tu seras aveugle, et pour un temps tu ne verras pas le soleil. Aussitôt l’obscurité et les ténèbres tombèrent sur lui, et il cherchait, en tâtonnant, des personnes pour le guider. '
  '12':
  - type: text
    content: Alors le proconsul, voyant ce qui était arrivé, crut, étant frappé de la doctrine du Seigneur.
  - type: heading
    content: Perge en Pamphylie. Prédication de Paul à Antioche de Pisidie
  - type: heading
    content: 'V. 13-41: cf. Ac 7:1-50; 10:36-43; 2:22-36.'
  '13':
  - type: text
    content: 'Paul et ses compagnons, s’étant embarqués à Paphos, se rendirent à Perge en Pamphylie. '
  - type: note
    content: Ac 15:38.
  - type: text
    content: 'Jean se sépara d’eux, et retourna à Jérusalem. '
  '14':
  - type: text
    content: 'De Perge ils poursuivirent leur route, et arrivèrent à Antioche de Pisidie. Étant entrés dans la synagogue le jour du sabbat, ils s’assirent. '
  '15':
  - type: text
    content: 'Après la lecture de la loi et des prophètes, les chefs de la synagogue leur envoyèrent dire: Hommes frères, si vous avez quelque exhortation à adresser au peuple, parlez. '
  '16':
  - type: text
    content: 'Paul se leva, et, '
  - type: note
    content: Ac 12:17; 19:33; 21:40.
  - type: text
    content: 'ayant fait signe de la main, il dit: Hommes Israélites, et vous qui craignez Dieu, écoutez! '
  '17':
  - type: text
    content: 'Le Dieu de ce peuple d’Israël a '
  - type: note
    content: Ex 1:1.
  - type: text
    content: 'choisi nos pères. Il mit ce peuple en honneur pendant son séjour au pays d’Égypte, et il l’en fit sortir par son bras puissant. '
  '18':
  - type: note
    content: Ex 16:35. No 14:34. Ps 95:10.
  - type: text
    content: 'Il les nourrit près de quarante ans dans le désert; '
  '19':
  - type: text
    content: 'et, ayant détruit sept nations au pays de Canaan, il leur '
  - type: note
    content: Jos 14:2.
  - type: text
    content: 'en accorda le territoire comme propriété. '
  '2':
  - type: text
    content: 'Pendant qu’ils servaient le Seigneur dans leur ministère et qu’ils jeûnaient, le Saint-Esprit dit: '
  - type: note
    content: Ac 9:15; 22:21. Ro 1:1. Ga 1:15; 2:8. Ép 3:8. 1 Ti 2:7. 2 Ti 1:11.
  - type: text
    content: 'Mettez-moi à part Barnabas et Saul pour l’œuvre à laquelle je les ai '
  - type: note
    content: Mt 9:38. Ro 10:15. Hé 5:4.
  - type: text
    content: 'appelés. '
  '20':
  - type: text
    content: 'Après cela, durant quatre cent cinquante ans environ, il leur donna '
  - type: note
    content: Jg 2:16; 3:9.
  - type: text
    content: 'des juges, jusqu’au prophète Samuel. '
  '21':
  - type: note
    content: 1 S 8:5. Os 13:11.
  - type: text
    content: 'Ils demandèrent alors un roi. Et Dieu leur donna, pendant quarante ans, '
  - type: note
    content: 1 S 9:15; 10:1.
  - type: text
    content: 'Saül, fils de Kis, de la tribu de Benjamin; '
  '22':
  - type: text
    content: 'puis, l’ayant rejeté, il leur suscita pour roi '
  - type: note
    content: 1 S 16:12.
  - type: text
    content: 'David, auquel il a rendu ce témoignage: '
  - type: note
    content: 1 S 13:14. Ps 89:21. Ac 7:45.
  - type: text
    content: 'J’ai trouvé David, fils d’Isaï, homme selon mon cœur, qui accomplira toutes mes volontés. '
  '23':
  - type: text
    content: 'C’est de la postérité de David que Dieu, selon sa promesse, a suscité à Israël un Sauveur, qui est Jésus. '
  '24':
  - type: note
    content: Mt 3:1. Mc 1:2. Lu 3:2. Jn 3:23.
  - type: text
    content: 'Avant sa venue, Jean avait prêché le baptême de repentance à tout le peuple d’Israël. '
  '25':
  - type: text
    content: 'Et lorsque Jean achevait sa course, il disait: '
  - type: note
    content: Jn 1:20.
  - type: text
    content: 'Je ne suis pas celui que vous pensez; '
  - type: note
    content: Mt 3:11.
  - type: text
    content: 'mais voici, après moi vient celui des pieds duquel je ne suis pas digne de délier les souliers. '
  '26':
  - type: text
    content: 'Hommes frères, fils de la race d’Abraham, et vous qui craignez Dieu, '
  - type: note
    content: Mt 10:6. Ac 3:26; 13:46.
  - type: text
    content: 'c’est à vous que cette parole de salut a été envoyée. '
  '27':
  - type: text
    content: 'Car les habitants de Jérusalem et leurs chefs '
  - type: note
    content: Jn 16:3. Ac 3:17. 1 Co 2:8. 1 Ti 1:13.
  - type: text
    content: 'ont méconnu Jésus, et, en le condamnant, ils ont accompli les paroles des prophètes qui se lisent chaque sabbat. '
  '28':
  - type: note
    content: Mt 27:20. Mc 15:11. Lu 23:18. Jn 19:6.
  - type: text
    content: 'Quoiqu’ils ne trouvassent en lui rien qui fût digne de mort, ils ont demandé à Pilate de le faire mourir. '
  '29':
  - type: text
    content: 'Et, après qu’ils eurent accompli tout ce qui est écrit de lui, ils le descendirent de la croix et le déposèrent dans un sépulcre. '
  '3':
  - type: note
    content: Ac 6:6; 8:15; 19:6.
  - type: text
    content: 'Alors, après avoir jeûné et prié, '
  - type: note
    content: Ac 14:26.
  - type: text
    content: 'ils leur imposèrent les mains, et les laissèrent partir. '
  '30':
  - type: note
    content: Mt 28:6. Mc 16:6. Lu 24:6.
  - type: text
    content: 'Mais Dieu l’a ressuscité des morts. '
  '31':
  - type: note
    content: Mc 16:14. Jn 20:19; 21:1. Ac 1:3. 1 Co 15:5.
  - type: text
    content: 'Il est apparu pendant plusieurs jours à ceux qui étaient montés avec lui de la Galilée à Jérusalem, et qui sont maintenant ses témoins auprès du peuple. '
  '32':
  - type: text
    content: 'Et nous, nous vous annonçons '
  - type: note
    content: Ge 3:15; 22:18; 26:4; 49:10. De 18:15. 2 S 7:12. Ps 132:11. És 4:2; 7:14; 9:5; 40:10. Jé 23:5; 33:14. Éz 34:23; 37:24. Da 9:24, 25.
  - type: text
    content: 'cette bonne nouvelle que la promesse faite à nos pères, '
  '33':
  - type: text
    content: 'Dieu l’a accomplie pour nous leurs enfants, en ressuscitant Jésus, selon ce qui est écrit dans le Psaume deuxième:'
  - type: note
    content: Ps 2:7.
  - type: text
    content: Tu es mon Fils,
  - type: text
    content: Je t’ai engendré aujourd’hui.
  '34':
  - type: text
    content: 'Qu’il l’ait ressuscité des morts, de telle sorte qu’il ne retournera pas à la corruption, c’est ce qu’il a déclaré, en disant: '
  - type: note
    content: És 55:3.
  - type: text
    content: 'Je vous donnerai les grâces saintes promises à David, ces grâces qui sont assurées. '
  '35':
  - type: text
    content: 'C’est pourquoi il dit encore ailleurs:'
  - type: note
    content: Ps 16:10. Ac 2:27.
  - type: text
    content: 'Tu ne permettras pas que ton Saint voie la corruption. '
  '36':
  - type: note
    content: 1 R 2:10. Ac 2:29.
  - type: text
    content: 'Or, David, après avoir en son temps servi au dessein de Dieu, est mort, a été réuni à ses pères, et a vu la corruption. '
  '37':
  - type: text
    content: 'Mais celui que Dieu a ressuscité n’a pas vu la corruption. '
  '38':
  - type: text
    content: 'Sachez donc, hommes frères, '
  - type: note
    content: Lu 24:47. 1 Jn 2:12.
  - type: text
    content: 'que c’est par lui que le pardon des péchés vous est annoncé, '
  '39':
  - type: text
    content: 'et que '
  - type: note
    content: Ro 3:28; 8:3. Ga 2:16. Hé 7:19.
  - type: text
    content: 'quiconque croit est justifié par lui '
  - type: note
    content: Ro 10:4.
  - type: text
    content: 'de toutes les choses dont vous ne pouviez être justifiés par la loi de Moïse. '
  '4':
  - type: text
    content: 'Barnabas et Saul, envoyés par le Saint-Esprit, descendirent à Séleucie, et de là ils s’embarquèrent pour l’île de Chypre. '
  '40':
  - type: text
    content: 'Ainsi, prenez garde qu’il ne vous arrive ce qui est dit dans les prophètes: '
  '41':
  - type: note
    content: És 28:14. Ha 1:5.
  - type: text
    content: Voyez, contempteurs,
  - type: text
    content: Soyez étonnés et disparaissez;
  - type: text
    content: Car je vais faire en vos jours une œuvre,
  - type: text
    content: Une œuvre que vous ne croiriez pas si on vous la racontait.
  - type: heading
    content: 'V. 42-52: cf. (És 49:5, 6. Ro 15:8-13.) 1 Th 2:14-16.'
  '42':
  - type: text
    content: 'Lorsqu’ils sortirent, on les pria de parler le sabbat suivant sur les mêmes choses; '
  '43':
  - type: text
    content: 'et, à l’issue de l’assemblée, beaucoup de Juifs et de prosélytes pieux suivirent Paul et Barnabas, qui s’entretinrent avec eux, '
  - type: note
    content: Ac 11:23; 14:22.
  - type: text
    content: 'et les exhortèrent à rester attachés à la grâce de Dieu. '
  '44':
  - type: text
    content: 'Le sabbat suivant, presque toute la ville se rassembla pour entendre la parole de Dieu. '
  '45':
  - type: text
    content: 'Les Juifs, voyant la foule, furent remplis de jalousie, et ils s’opposaient à ce que disait Paul, en le contredisant et en l’injuriant. '
  '46':
  - type: text
    content: 'Paul et Barnabas leur dirent avec assurance: '
  - type: note
    content: Mt 10:6. Ac 3:26; 13:26.
  - type: text
    content: 'C’est à vous premièrement que la parole de Dieu devait être annoncée; '
  - type: note
    content: Ex 32:10. És 55:5. Mt 8:12; 21:43. Ro 10:19.
  - type: text
    content: 'mais, puisque vous la repoussez, et que vous vous jugez vous-mêmes indignes de la vie éternelle, voici, nous nous tournons vers les païens. '
  '47':
  - type: text
    content: 'Car ainsi nous l’a ordonné le Seigneur:'
  - type: note
    content: És 42:6; 49:6. Lu 2:32.
  - type: text
    content: Je t’ai établi pour être la lumière des nations,
  - type: text
    content: Pour porter le salut jusqu’aux extrémités de la terre.
  '48':
  - type: text
    content: 'Les païens se réjouissaient en entendant cela, ils glorifiaient la parole du Seigneur, et tous ceux qui étaient destinés à la vie éternelle crurent. '
  '49':
  - type: text
    content: 'La parole du Seigneur se répandait dans tout le pays. '
  '5':
  - type: text
    content: 'Arrivés à Salamine, ils annoncèrent la parole de Dieu dans les synagogues des Juifs. Ils avaient '
  - type: note
    content: Ac 12:25.
  - type: text
    content: 'Jean pour aide. '
  '50':
  - type: text
    content: 'Mais les Juifs excitèrent les femmes dévotes de distinction et les principaux de la ville; '
  - type: note
    content: 2 Ti 3:11.
  - type: text
    content: 'ils provoquèrent une persécution contre Paul et Barnabas, et ils les chassèrent de leur territoire. '
  '51':
  - type: text
    content: 'Paul et Barnabas secouèrent contre eux la poussière de leurs pieds, et allèrent à Icone, '
  '52':
  - type: text
    content: tandis que les disciples étaient remplis de joie et du Saint-Esprit.
  '6':
  - type: text
    content: 'Ayant ensuite traversé toute l’île jusqu’à Paphos, ils trouvèrent '
  - type: note
    content: Ac 8:9; 19:13.
  - type: text
    content: 'un certain magicien, faux prophète juif, nommé Bar-Jésus, '
  '7':
  - type: text
    content: 'qui était avec le proconsul Sergius Paulus, homme intelligent. Ce dernier fit appeler Barnabas et Saul, et manifesta le désir d’entendre la parole de Dieu. '
  '8':
  - type: note
    content: Ex 7:11. 2 Ti 3:8.
  - type: text
    content: 'Mais Élymas, le magicien, car c’est ce que signifie son nom, leur faisait opposition, cherchant à détourner de la foi le proconsul. '
  '9':
  - type: text
    content: 'Alors Saul, appelé aussi Paul, rempli du Saint-Esprit, fixa les regards sur lui, et dit: '
