      - type: text
        text: 2:8
      metadata:
        usfm: GAL.2.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 3:8
      metadata:
        usfm: EPH.3.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 2:7
      metadata:
        usfm: 1TI.2.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ti 1:11
      metadata:
        usfm: 2TI.1.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Mettez-moi à part Barnabas et Saul pour l’œuvre à laquelle je les ai '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
