  - type: text
    text: Voyez, contempteurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Soyez étonnés et disparaissez;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car je vais faire en vos jours une œuvre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Une œuvre que vous ne croiriez pas si on vous la racontait.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 42-52: cf. (És 49:5, 6. Ro 15:8-13.) 1 Th 2:14-16.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Lorsqu’ils sortirent, on les pria de parler le sabbat suivant sur les mêmes choses; '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
