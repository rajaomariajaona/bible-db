document_id: ACT.13
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Barnabas et Saul envoyés en mission par l’Église d’Antioche. Dans l’île de Chypre: le magicien Élymas et le proconsul Sergius Paulus'
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-12: cf. (Ga 2:7-9. Ac 14:26, 27.) 2 Ti 3:8, 9.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Il y avait dans l’Église '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
