        usfm: ROM.10.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 5:4
      metadata:
        usfm: HEB.5.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'appelés. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 6:6
      metadata:
        usfm: ACT.6.6
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 8:15
      metadata:
        usfm: ACT.8.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 19:6
      metadata:
        usfm: ACT.19.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Alors, après avoir jeûné et prié, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 14:26
      metadata:
        usfm: ACT.14.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ils leur imposèrent les mains, et les laissèrent partir. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Barnabas et Saul, envoyés par le Saint-Esprit, descendirent à Séleucie, et de là ils s’embarquèrent pour l’île de Chypre. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Arrivés à Salamine, ils annoncèrent la parole de Dieu dans les synagogues des Juifs. Ils avaient '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 12:25
      metadata:
        usfm: ACT.12.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Jean pour aide. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ayant ensuite traversé toute l’île jusqu’à Paphos, ils trouvèrent '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 8:9
      metadata:
        usfm: ACT.8.9
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 19:13
      metadata:
        usfm: ACT.19.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'un certain magicien, faux prophète juif, nommé Bar-Jésus, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'qui était avec le proconsul Sergius Paulus, homme intelligent. Ce dernier fit appeler Barnabas et Saul, et manifesta le désir d’entendre la parole de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 7:11
      metadata:
        usfm: EXO.7.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ti 3:8
      metadata:
        usfm: 2TI.3.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Mais Élymas, le magicien, car c’est ce que signifie son nom, leur faisait opposition, cherchant à détourner de la foi le proconsul. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Alors Saul, appelé aussi Paul, rempli du Saint-Esprit, fixa les regards sur lui, et dit: '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Homme plein de toute espèce de ruse et de fraude, fils du diable, ennemi de toute justice, ne cesseras-tu point de pervertir les voies droites du Seigneur? '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Maintenant voici, la main du Seigneur est sur toi, tu seras aveugle, et pour un temps tu ne verras pas le soleil. Aussitôt l’obscurité et les ténèbres tombèrent sur lui, et il cherchait, en tâtonnant, des personnes pour le guider. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Alors le proconsul, voyant ce qui était arrivé, crut, étant frappé de la doctrine du Seigneur.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Perge en Pamphylie. Prédication de Paul à Antioche de Pisidie
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 13-41: cf. Ac 7:1-50; 10:36-43; 2:22-36.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Paul et ses compagnons, s’étant embarqués à Paphos, se rendirent à Perge en Pamphylie. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 15:38
      metadata:
        usfm: ACT.15.38
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Jean se sépara d’eux, et retourna à Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'De Perge ils poursuivirent leur route, et arrivèrent à Antioche de Pisidie. Étant entrés dans la synagogue le jour du sabbat, ils s’assirent. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Après la lecture de la loi et des prophètes, les chefs de la synagogue leur envoyèrent dire: Hommes frères, si vous avez quelque exhortation à adresser au peuple, parlez. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Paul se leva, et, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 12:17
      metadata:
        usfm: ACT.12.17
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 19:33
      metadata:
        usfm: ACT.19.33
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 21:40
      metadata:
        usfm: ACT.21.40
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ayant fait signe de la main, il dit: Hommes Israélites, et vous qui craignez Dieu, écoutez! '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Le Dieu de ce peuple d’Israël a '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 1:1
      metadata:
        usfm: EXO.1.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'choisi nos pères. Il mit ce peuple en honneur pendant son séjour au pays d’Égypte, et il l’en fit sortir par son bras puissant. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 16:35
      metadata:
        usfm: EXO.16.35
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 14:34
      metadata:
        usfm: NUM.14.34
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 95:10
      metadata:
        usfm: PSA.95.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il les nourrit près de quarante ans dans le désert; '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'et, ayant détruit sept nations au pays de Canaan, il leur '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jos 14:2
      metadata:
        usfm: JOS.14.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'en accorda le territoire comme propriété. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Après cela, durant quatre cent cinquante ans environ, il leur donna '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jg 2:16
      metadata:
        usfm: JDG.2.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 3:9
      metadata:
        usfm: JDG.3.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'des juges, jusqu’au prophète Samuel. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 8:5
      metadata:
        usfm: 1SA.8.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Os 13:11
      metadata:
        usfm: HOS.13.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ils demandèrent alors un roi. Et Dieu leur donna, pendant quarante ans, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 9:15
      metadata:
        usfm: 1SA.9.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 10:1
      metadata:
        usfm: 1SA.10.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Saül, fils de Kis, de la tribu de Benjamin; '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'puis, l’ayant rejeté, il leur suscita pour roi '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 16:12
      metadata:
        usfm: 1SA.16.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'David, auquel il a rendu ce témoignage: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 13:14
      metadata:
        usfm: 1SA.13.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 89:21
      metadata:
        usfm: PSA.89.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 7:45
      metadata:
        usfm: ACT.7.45
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'J’ai trouvé David, fils d’Isaï, homme selon mon cœur, qui accomplira toutes mes volontés. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'C’est de la postérité de David que Dieu, selon sa promesse, a suscité à Israël un Sauveur, qui est Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 3:1
      metadata:
        usfm: MAT.3.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 1:2
      metadata:
        usfm: MRK.1.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 3:2
      metadata:
        usfm: LUK.3.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 3:23
      metadata:
        usfm: JHN.3.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Avant sa venue, Jean avait prêché le baptême de repentance à tout le peuple d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Et lorsque Jean achevait sa course, il disait: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 1:20
      metadata:
        usfm: JHN.1.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Je ne suis pas celui que vous pensez; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 3:11
      metadata:
        usfm: MAT.3.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'mais voici, après moi vient celui des pieds duquel je ne suis pas digne de délier les souliers. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Hommes frères, fils de la race d’Abraham, et vous qui craignez Dieu, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 10:6
      metadata:
        usfm: MAT.10.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 3:26
      metadata:
        usfm: ACT.3.26
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 13:46
      metadata:
        usfm: ACT.13.46
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'c’est à vous que cette parole de salut a été envoyée. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Car les habitants de Jérusalem et leurs chefs '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 16:3
      metadata:
        usfm: JHN.16.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 3:17
      metadata:
        usfm: ACT.3.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 2:8
      metadata:
        usfm: 1CO.2.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 1:13
      metadata:
        usfm: 1TI.1.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ont méconnu Jésus, et, en le condamnant, ils ont accompli les paroles des prophètes qui se lisent chaque sabbat. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
