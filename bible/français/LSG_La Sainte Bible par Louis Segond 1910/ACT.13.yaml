      metadata:
        usfm: 1JN.2.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'que c’est par lui que le pardon des péchés vous est annoncé, '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
