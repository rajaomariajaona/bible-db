        marker: ref
        children:
        - type: text
          text: '25'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'cette bonne nouvelle que la promesse faite à nos pères, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Dieu l’a accomplie pour nous leurs enfants, en ressuscitant Jésus, selon ce qui est écrit dans le Psaume deuxième:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 2:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Tu es mon Fils,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je t’ai engendré aujourd’hui.
  '34':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Qu’il l’ait ressuscité des morts, de telle sorte qu’il ne retournera pas à la corruption, c’est ce qu’il a déclaré, en disant: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 55:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Je vous donnerai les grâces saintes promises à David, ces grâces qui sont assurées. '
  '35':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'C’est pourquoi il dit encore ailleurs:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 16:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 2:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Tu ne permettras pas que ton Saint voie la corruption. '
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 2:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 2:29
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Or, David, après avoir en son temps servi au dessein de Dieu, est mort, a été réuni à ses pères, et a vu la corruption. '
  '37':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Mais celui que Dieu a ressuscité n’a pas vu la corruption. '
  '38':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Sachez donc, hommes frères, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 24:47
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Jn 2:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'que c’est par lui que le pardon des péchés vous est annoncé, '
  '39':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'et que '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 3:28
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 2:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 7:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'quiconque croit est justifié par lui '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 10:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'de toutes les choses dont vous ne pouviez être justifiés par la loi de Moïse. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Barnabas et Saul, envoyés par le Saint-Esprit, descendirent à Séleucie, et de là ils s’embarquèrent pour l’île de Chypre. '
  '40':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Ainsi, prenez garde qu’il ne vous arrive ce qui est dit dans les prophètes: '
  '41':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 28:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ha 1:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Voyez, contempteurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Soyez étonnés et disparaissez;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car je vais faire en vos jours une œuvre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Une œuvre que vous ne croiriez pas si on vous la racontait.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 42-52: cf. (És 49:5, 6. Ro 15:8-13.) 1 Th 2:14-16.'
    marker-yv: yv-h
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Lorsqu’ils sortirent, on les pria de parler le sabbat suivant sur les mêmes choses; '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'et, à l’issue de l’assemblée, beaucoup de Juifs et de prosélytes pieux suivirent Paul et Barnabas, qui s’entretinrent avec eux, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 11:23
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'et les exhortèrent à rester attachés à la grâce de Dieu. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Le sabbat suivant, presque toute la ville se rassembla pour entendre la parole de Dieu. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Les Juifs, voyant la foule, furent remplis de jalousie, et ils s’opposaient à ce que disait Paul, en le contredisant et en l’injuriant. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'Paul et Barnabas leur dirent avec assurance: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 10:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 3:26
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 13:26
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'C’est à vous premièrement que la parole de Dieu devait être annoncée; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 32:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 55:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 8:12
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 21:43
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 10:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'mais, puisque vous la repoussez, et que vous vous jugez vous-mêmes indignes de la vie éternelle, voici, nous nous tournons vers les païens. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'Car ainsi nous l’a ordonné le Seigneur:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 42:6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 49:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 2:32
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Je t’ai établi pour être la lumière des nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour porter le salut jusqu’aux extrémités de la terre.
  '48':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Les païens se réjouissaient en entendant cela, ils glorifiaient la parole du Seigneur, et tous ceux qui étaient destinés à la vie éternelle crurent. '
  '49':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'La parole du Seigneur se répandait dans tout le pays. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Arrivés à Salamine, ils annoncèrent la parole de Dieu dans les synagogues des Juifs. Ils avaient '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 12:25
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Jean pour aide. '
  '50':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'Mais les Juifs excitèrent les femmes dévotes de distinction et les principaux de la ville; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ti 3:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'ils provoquèrent une persécution contre Paul et Barnabas, et ils les chassèrent de leur territoire. '
  '51':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'Paul et Barnabas secouèrent contre eux la poussière de leurs pieds, et allèrent à Icone, '
  '52':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: tandis que les disciples étaient remplis de joie et du Saint-Esprit.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ayant ensuite traversé toute l’île jusqu’à Paphos, ils trouvèrent '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 8:9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 19:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'un certain magicien, faux prophète juif, nommé Bar-Jésus, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'qui était avec le proconsul Sergius Paulus, homme intelligent. Ce dernier fit appeler Barnabas et Saul, et manifesta le désir d’entendre la parole de Dieu. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 7:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ti 3:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Mais Élymas, le magicien, car c’est ce que signifie son nom, leur faisait opposition, cherchant à détourner de la foi le proconsul. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Alors Saul, appelé aussi Paul, rempli du Saint-Esprit, fixa les regards sur lui, et dit: '
