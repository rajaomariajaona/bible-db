      - type: text
        text: Ps 2:7
      metadata:
        usfm: PSA.2.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Tu es mon Fils,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je t’ai engendré aujourd’hui.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Qu’il l’ait ressuscité des morts, de telle sorte qu’il ne retournera pas à la corruption, c’est ce qu’il a déclaré, en disant: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 55:3
      metadata:
        usfm: ISA.55.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Je vous donnerai les grâces saintes promises à David, ces grâces qui sont assurées. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'C’est pourquoi il dit encore ailleurs:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 16:10
      metadata:
        usfm: PSA.16.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 2:27
      metadata:
        usfm: ACT.2.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu ne permettras pas que ton Saint voie la corruption. '
  - type: usfm
    marker: v
    metadata:
