        text: 14:22
      metadata:
        usfm: ACT.14.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et les exhortèrent à rester attachés à la grâce de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Le sabbat suivant, presque toute la ville se rassembla pour entendre la parole de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Les Juifs, voyant la foule, furent remplis de jalousie, et ils s’opposaient à ce que disait Paul, en le contredisant et en l’injuriant. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Paul et Barnabas leur dirent avec assurance: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 10:6
      metadata:
        usfm: MAT.10.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 3:26
      metadata:
        usfm: ACT.3.26
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 13:26
      metadata:
        usfm: ACT.13.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'C’est à vous premièrement que la parole de Dieu devait être annoncée; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 32:10
      metadata:
        usfm: EXO.32.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 55:5
      metadata:
        usfm: ISA.55.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 8:12
      metadata:
        usfm: MAT.8.12
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 21:43
      metadata:
        usfm: MAT.21.43
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 10:19
      metadata:
        usfm: ROM.10.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'mais, puisque vous la repoussez, et que vous vous jugez vous-mêmes indignes de la vie éternelle, voici, nous nous tournons vers les païens. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Car ainsi nous l’a ordonné le Seigneur:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 42:6
      metadata:
        usfm: ISA.42.6
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 49:6
      metadata:
        usfm: ISA.49.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 2:32
      metadata:
        usfm: LUK.2.32
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Je t’ai établi pour être la lumière des nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour porter le salut jusqu’aux extrémités de la terre.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Les païens se réjouissaient en entendant cela, ils glorifiaient la parole du Seigneur, et tous ceux qui étaient destinés à la vie éternelle crurent. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'La parole du Seigneur se répandait dans tout le pays. '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Mais les Juifs excitèrent les femmes dévotes de distinction et les principaux de la ville; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ti 3:11
      metadata:
        usfm: 2TI.3.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ils provoquèrent une persécution contre Paul et Barnabas, et ils les chassèrent de leur territoire. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Paul et Barnabas secouèrent contre eux la poussière de leurs pieds, et allèrent à Icone, '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: tandis que les disciples étaient remplis de joie et du Saint-Esprit.
