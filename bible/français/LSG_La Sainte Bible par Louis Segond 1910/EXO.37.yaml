document_id: EXO.37,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Construction de l’arche, de la table, du chandelier, et de l’autel des parfums
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-9: cf. Ex 25:10-22. Hé 9:3-5. No 10:33-36.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 25:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Betsaleel fit l’arche de bois d’acacia; sa longueur était de deux coudées et demie, sa largeur d’une coudée et demie, et sa hauteur d’une coudée et demie. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 25:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Il fit la table de bois d’acacia, sa longueur était de deux coudées, sa largeur d’une coudée, et sa hauteur d’une coudée et demie. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 25:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Il la couvrit d’or pur, et il y fit une bordure d’or tout autour. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 25:25
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Il y fit à l’entour un rebord de quatre doigts, sur lequel il mit une bordure d’or tout autour. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 25:26
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Il fondit pour la table quatre anneaux d’or, et mit les anneaux aux quatre coins, qui étaient à ses quatre pieds. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 25:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Les anneaux étaient près du rebord, et recevaient les barres pour porter la table. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il fit les barres de bois d’acacia, et les couvrit d’or; et elles servaient à porter la table. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 25:29
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il fit les ustensiles qu’on devait mettre sur la table, ses plats, ses coupes, ses calices et ses tasses pour servir aux libations; il les fit d’or pur.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 17-24: cf. Ex 25:31-40. (Za 4. Ap 1:12-20; 4:5.)'
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 25:31
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Il fit le chandelier d’or pur; il fit le chandelier d’or battu; son pied, sa tige, ses calices, ses pommes et ses fleurs, étaient d’une même pièce. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 25:32
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Six branches sortaient de ses côtés, trois branches du chandelier de l’un des côtés, et trois branches du chandelier de l’autre côté. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 25:33
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Il y avait sur une branche trois calices en forme d’amande, avec pommes et fleurs, et sur une autre branche trois calices en forme d’amande, avec pommes et fleurs; il en était de même pour les six branches sortant du chandelier. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il la couvrit d’or pur en dedans et en dehors, et il y fit une bordure d’or tout autour. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 25:34
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'A la tige du chandelier il y avait quatre calices en forme d’amande, avec leurs pommes et leurs fleurs. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il y avait une pomme sous deux des branches sortant du chandelier, une pomme sous deux autres branches, et une pomme sous deux autres branches; il en était de même pour les six branches sortant du chandelier. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 25:36
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Les pommes et les branches du chandelier étaient d’une même pièce; il était tout entier d’or battu, d’or pur. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 25:37
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '38'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Il fit ses sept lampes, ses mouchettes et ses vases à cendre d’or pur. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 25:39
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il employa un talent d’or pur, pour faire le chandelier avec tous ses ustensiles.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 25-29: cf. Ex 30:1-10, 22-38. Ap 8:3, 4.'
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 30:1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Il fit l’autel des parfums de bois d’acacia; sa longueur était d’une coudée et sa largeur d’une coudée; il était carré, et sa hauteur était de deux coudées. Des cornes sortaient de l’autel. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 30:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Il le couvrit d’or pur, le dessus, les côtés tout autour et les cornes, et il y fit une bordure d’or tout autour. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 30:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Il fit au-dessous de la bordure deux anneaux d’or aux deux côtés; il en mit aux deux côtés, pour recevoir les barres qui servaient à le porter. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 30:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Il fit des barres de bois d’acacia, et les couvrit d’or. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 30:22
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '34'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il fit l’huile pour l’onction sainte, et le parfum odoriférant, pur, composé selon l’art du parfumeur.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il fondit pour elle quatre anneaux d’or, qu’il mit à ses quatre coins, deux anneaux d’un côté et deux anneaux de l’autre côté. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il fit des barres de bois d’acacia, et les couvrit d’or. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il passa les barres dans les anneaux sur les côtés de l’arche, pour porter l’arche. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il fit un propitiatoire d’or pur; sa longueur était de deux coudées et demie, et sa largeur d’une coudée et demie. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il fit deux chérubins d’or; il les fit d’or battu, aux deux extrémités du propitiatoire, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 25:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'un chérubin à l’une des extrémités, et un chérubin à l’autre extrémité; il fit les chérubins sortant du propitiatoire à ses deux extrémités. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 25:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Les chérubins étendaient les ailes par-dessus, couvrant de leurs ailes le propitiatoire, et se regardant l’un l’autre; les chérubins avaient la face tournée vers le propitiatoire.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 10-16: cf. Ex 25:23-30. Lé 24:5-9.'
    marker-yv: yv-h
