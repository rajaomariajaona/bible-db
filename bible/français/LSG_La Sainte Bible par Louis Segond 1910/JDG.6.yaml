document_id: JDG.6,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Gédéon, juge en Israël
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-10: cf. (Jg 2:11-15; 10:6-16.) 2 Pi 2:20. Ap 3:19.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les enfants d’Israël firent ce qui déplaît à l’Éternel; et l’Éternel les livra entre les mains de Madian, pendant sept ans. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je vous ai dit: Je suis l’Éternel, votre Dieu; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 17:35
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '38'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: vous ne craindrez point les dieux des Amoréens, dans le pays desquels vous habitez. Mais vous n’avez point écouté ma voix.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 11-24: cf. Ex 3:1-12. Jg 13:9-23. Hé 11:32.'
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis vint l’ange de l’Éternel, et il s’assit sous le térébinthe d’Ophra, qui appartenait à Joas, de la famille d’Abiézer. Gédéon, son fils, battait du froment au pressoir, pour le mettre à l’abri de Madian. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’ange de l’Éternel lui apparut, et lui dit: L’Éternel est avec toi, vaillant héros! '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Gédéon lui dit: Ah! Mon seigneur, si l’Éternel est avec nous, pourquoi toutes ces choses nous sont-elles arrivées? Et où sont tous ces prodiges que nos pères nous racontent, quand ils disent: L’Éternel ne nous a-t-il pas fait monter hors d’Égypte? Maintenant l’Éternel nous abandonne, et il nous livre entre les mains de Madian! '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Éternel se tourna vers lui, et dit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 12:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 11:32
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Va avec cette force que tu as, et délivre Israël de la main de Madian; n’est-ce pas moi qui t’envoie? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Gédéon lui dit: Ah! Mon seigneur, avec quoi délivrerai-je Israël? Voici, ma famille est la plus pauvre en Manassé, et je suis le plus petit dans la maison de mon père. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Éternel lui dit: Mais je serai avec toi, et tu battras Madian comme un seul homme. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Gédéon lui dit: Si j’ai trouvé grâce à tes yeux, donne-moi un signe pour montrer que c’est toi qui me parles. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ne t’éloigne point d’ici jusqu’à ce que je revienne auprès de toi, que j’apporte mon offrande, et que je la dépose devant toi. Et l’Éternel dit: Je resterai jusqu’à ce que tu reviennes. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Gédéon entra, prépara un chevreau, et fit avec un épha de farine des pains sans levain. Il mit la chair dans un panier et le jus dans un pot, les lui apporta sous le térébinthe, et les présenta. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La main de Madian fut puissante contre Israël. Pour échapper à Madian, les enfants d’Israël se retiraient dans les ravins des montagnes, dans les cavernes et sur les rochers fortifiés. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’ange de Dieu lui dit: Prends la chair et les pains sans levain, pose-les sur ce rocher, et répands le jus. Et il fit ainsi. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’ange de l’Éternel avança l’extrémité du bâton qu’il avait à la main, et toucha la chair et les pains sans levain. Alors il s’éleva du rocher un feu qui consuma la chair et les pains sans levain. Et l’ange de l’Éternel disparut à ses yeux. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Gédéon, voyant que c’était l’ange de l’Éternel, dit: Malheur à moi, Seigneur Éternel! Car j’ai vu l’ange de l’Éternel face à face. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et l’Éternel lui dit: Sois en paix, ne crains point, tu ne mourras pas. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Gédéon bâtit là un autel à l’Éternel, et lui donna pour nom l’Éternel paix: il existe encore aujourd’hui à Ophra, qui appartenait à la famille d’Abiézer.'
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 25-35: cf. 1 S 7:3, etc. Ps 40:9-12, 14-18.'
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dans la même nuit, l’Éternel dit à Gédéon: Prends le jeune taureau de ton père, et un second taureau de sept ans. Renverse l’autel de Baal qui est à ton père, et abats le pieu sacré qui est dessus. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu bâtiras ensuite et tu disposeras, sur le haut de ce rocher, un autel à l’Éternel ton Dieu. Tu prendras le second taureau, et tu offriras un holocauste, avec le bois de l’idole que tu auras abattue. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Gédéon prit dix hommes parmi ses serviteurs, et fit ce que l’Éternel avait dit; mais, comme il craignait la maison de son père et les gens de la ville, il l’exécuta de nuit, et non de jour. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque les gens de la ville se furent levés de bon matin, voici, l’autel de Baal était renversé, le pieu sacré placé dessus était abattu, et le second taureau était offert en holocauste sur l’autel qui avait été bâti. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils se dirent l’un à l’autre: Qui a fait cela? Et ils s’informèrent et firent des recherches. On leur dit: C’est Gédéon, fils de Joas, qui a fait cela. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand Israël avait semé, Madian montait avec Amalek et les fils de l’Orient, et ils marchaient contre lui. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors les gens de la ville dirent à Joas: Fais sortir ton fils, et qu’il meure, car il a renversé l’autel de Baal et abattu le pieu sacré qui était dessus. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joas répondit à tous ceux qui se présentèrent à lui: Est-ce à vous de prendre parti pour Baal? Est-ce à vous de venir à son secours? Quiconque prendra parti pour Baal mourra avant que le matin vienne. Si Baal est un dieu, qu’il plaide lui-même sa cause, puisqu’on a renversé son autel. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et en ce jour l’on donna à Gédéon le nom de Jerubbaal, en disant: Que Baal plaide contre lui, puisqu’il a renversé son autel. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tout Madian, Amalek et les fils de l’Orient, se rassemblèrent; ils passèrent le Jourdain, et campèrent dans la vallée de Jizréel. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Gédéon fut revêtu de l’esprit de l’Éternel; il sonna de la trompette, et Abiézer fut convoqué pour marcher à sa suite. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il envoya des messagers dans tout Manassé, qui fut aussi convoqué pour marcher à sa suite. Il envoya des messagers dans Aser, dans Zabulon et dans Nephthali, qui montèrent à leur rencontre.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 36-40: cf. 2 R 20:8-11.'
    marker-yv: yv-h
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Gédéon dit à Dieu: Si tu veux délivrer Israël par ma main, comme tu l’as dit, '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'voici, je vais mettre une toison de laine dans l’aire; si la toison seule se couvre de rosée et que tout le terrain reste sec, je connaîtrai que tu délivreras Israël par ma main, comme tu l’as dit. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et il arriva ainsi. Le jour suivant, il se leva de bon matin, pressa la toison, et en fit sortir la rosée, qui donna de l’eau plein une coupe. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Gédéon dit à Dieu: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 18:32
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Que ta colère ne s’enflamme point contre moi, et je ne parlerai plus que cette fois: Je voudrais seulement faire encore une épreuve avec la toison: que la toison seule reste sèche, et que tout le terrain se couvre de rosée. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils campaient en face de lui, détruisaient les productions du pays jusque vers Gaza, et ne laissaient en Israël ni vivres, ni brebis, ni bœufs, ni ânes. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et Dieu fit ainsi cette nuit-là. La toison seule resta sèche, et tout le terrain se couvrit de rosée.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car ils montaient avec leurs troupeaux et leurs tentes, ils arrivaient comme une multitude de sauterelles, ils étaient innombrables, eux et leurs chameaux, et ils venaient dans le pays pour le ravager. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Israël fut très malheureux à cause de Madian, et les enfants d’Israël crièrent à l’Éternel. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque les enfants d’Israël crièrent à l’Éternel au sujet de Madian, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'l’Éternel envoya un prophète aux enfants d’Israël. Il leur dit: Ainsi parle l’Éternel, le Dieu d’Israël: Je vous ai fait monter d’Égypte, et je vous ai fait sortir de la maison de servitude. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je vous ai délivrés de la main des Égyptiens et de la main de tous ceux qui vous opprimaient; je les ai chassés devant vous, et je vous ai donné leur pays. '
