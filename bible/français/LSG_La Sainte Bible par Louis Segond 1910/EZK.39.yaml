document_id: EZK.39,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-24: cf. Éz 38. Ps 76.'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Et toi, fils de l’homme, prophétise contre Gog!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tu diras: Ainsi parle le Seigneur, l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, j’en veux à toi, Gog,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prince de Rosch, de Méschec et de Tubal!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ils ne prendront point de bois dans les champs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils n’en couperont point dans les forêts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car c’est avec les armes qu’ils feront du feu.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils dépouilleront ceux qui les ont dépouillés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils pilleront ceux qui les ont pillés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit le Seigneur, l’Éternel.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: En ce jour-là,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je donnerai à Gog un lieu qui lui servira de sépulcre en Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La vallée des voyageurs, à l’orient de la mer;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce sépulcre fermera le passage aux voyageurs.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est là qu’on enterrera Gog et toute sa multitude,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et on appellera cette vallée la vallée de la multitude de Gog.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: La maison d’Israël les enterrera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afin de purifier le pays;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et cela durera sept mois.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Tout le peuple du pays les enterrera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il en aura du renom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le jour où je serai glorifié,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit le Seigneur, l’Éternel.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ils choisiront des hommes qui seront sans cesse à parcourir le pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qui enterreront, avec l’aide des voyageurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les corps restés à la surface de la terre;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils purifieront le pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils seront à la recherche pendant sept mois entiers.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ils parcourront le pays;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et quand l’un d’eux verra les ossements d’un homme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il mettra près de là un signe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jusqu’à ce que les fossoyeurs l’enterrent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans la vallée de la multitude de Gog.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Il y aura aussi une ville appelée Hamona.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est ainsi qu’on purifiera le pays.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Et toi, fils de l’homme, ainsi parle le Seigneur, l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dis aux oiseaux, à tout ce qui a des ailes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et à toutes les bêtes des champs:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Réunissez-vous, venez, rassemblez-vous de toutes parts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour le sacrifice où j’immole pour vous des victimes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Grand sacrifice sur les montagnes d’Israël!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous mangerez de la chair, et vous boirez du sang.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Vous mangerez la chair des héros,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et vous boirez le sang des princes de la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Béliers, agneaux, boucs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Taureaux engraissés sur le Basan.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Vous mangerez de la graisse jusqu’à vous en rassasier,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et vous boirez du sang jusqu’à vous enivrer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A ce festin de victimes que j’immolerai pour vous.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 38:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Je t’entraînerai, je te conduirai,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je te ferai monter des extrémités du septentrion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je t’amènerai sur les montagnes d’Israël.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Vous vous rassasierez à ma table de la chair des chevaux et des cavaliers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De la chair des héros et de tous les hommes de guerre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit le Seigneur, l’Éternel.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Je manifesterai ma gloire parmi les nations;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et toutes les nations verront les jugements que j’exercerai,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les châtiments dont ma main les frappera.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: La maison d’Israël saura que je suis l’Éternel, son Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dès ce jour et à l’avenir.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Et les nations sauront que c’est à cause de ses iniquités
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que la maison d’Israël a été conduite en captivité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause de ses infidélités envers moi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aussi je leur ai caché ma face,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je les ai livrés entre les mains de leurs ennemis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afin qu’ils périssent tous par l’épée.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Je les ai traités selon leurs souillures et leurs transgressions,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je leur ai caché ma face.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 25-29: cf. Éz 36:18, etc.; 37:21, etc.'
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'C’est pourquoi ainsi parle le Seigneur, l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maintenant je ramènerai les captifs de Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’aurai pitié de toute la maison d’Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je serai jaloux de mon saint nom.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Alors ils oublieront leur opprobre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et toutes les infidélités qu’ils ont commises envers moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lorsqu’ils habitaient en sécurité leur pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qu’il n’y avait personne pour les troubler.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Quand je les ramènerai d’entre les peuples,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand je les rassemblerai du pays de leurs ennemis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je serai sanctifié par eux aux yeux de beaucoup de nations.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Et ils sauront que je suis l’Éternel, leur Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui les avait emmenés captifs parmi les nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qui les rassemble dans leur pays;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ne laisserai chez elles aucun d’eux,
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Et je ne leur cacherai plus ma face,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car je répandrai mon '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Joë 2:28
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 2:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: esprit sur la maison d’Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit le Seigneur, l’Éternel.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: J’abattrai ton arc de ta main gauche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je ferai tomber tes flèches de ta main droite.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Tu tomberas sur les montagnes d’Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toi et toutes tes troupes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les peuples qui seront avec toi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aux oiseaux de proie, à tout ce qui a des ailes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et aux bêtes des champs je te donnerai '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 33:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: pour pâture.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Tu tomberas sur la face de la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car j’ai parlé, dit le Seigneur, l’Éternel.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: J’enverrai le feu dans Magog,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et parmi ceux qui habitent en sécurité les îles;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils sauront que je suis l’Éternel.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Je ferai connaître mon saint nom au milieu de mon peuple d’Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je ne laisserai plus profaner mon saint nom;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les nations sauront que je suis l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le Saint en Israël.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Voici, ces choses viennent, elles arrivent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit le Seigneur, l’Éternel;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est le jour dont j’ai parlé.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Alors les habitants des villes d’Israël sortiront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils brûleront et livreront aux flammes les armes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les petits et les grands boucliers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les arcs et les flèches,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les piques et les lances;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils en feront du feu pendant sept ans.
