document_id: EZK.39,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-24: cf. Éz 38. Ps 76.'
  - type: text
    content: Et toi, fils de l’homme, prophétise contre Gog!
  - type: text
    content: 'Tu diras: Ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: Voici, j’en veux à toi, Gog,
  - type: text
    content: Prince de Rosch, de Méschec et de Tubal!
  '10':
  - type: text
    content: Ils ne prendront point de bois dans les champs,
  - type: text
    content: Et ils n’en couperont point dans les forêts,
  - type: text
    content: Car c’est avec les armes qu’ils feront du feu.
  - type: text
    content: Ils dépouilleront ceux qui les ont dépouillés,
  - type: text
    content: Ils pilleront ceux qui les ont pillés,
  - type: text
    content: Dit le Seigneur, l’Éternel.
  '11':
  - type: text
    content: En ce jour-là,
  - type: text
    content: Je donnerai à Gog un lieu qui lui servira de sépulcre en Israël,
  - type: text
    content: La vallée des voyageurs, à l’orient de la mer;
  - type: text
    content: Ce sépulcre fermera le passage aux voyageurs.
  - type: text
    content: C’est là qu’on enterrera Gog et toute sa multitude,
  - type: text
    content: Et on appellera cette vallée la vallée de la multitude de Gog.
  '12':
  - type: text
    content: La maison d’Israël les enterrera,
  - type: text
    content: Afin de purifier le pays;
  - type: text
    content: Et cela durera sept mois.
  '13':
  - type: text
    content: Tout le peuple du pays les enterrera,
  - type: text
    content: Et il en aura du renom,
  - type: text
    content: Le jour où je serai glorifié,
  - type: text
    content: Dit le Seigneur, l’Éternel.
  '14':
  - type: text
    content: Ils choisiront des hommes qui seront sans cesse à parcourir le pays,
  - type: text
    content: Et qui enterreront, avec l’aide des voyageurs,
  - type: text
    content: Les corps restés à la surface de la terre;
  - type: text
    content: Ils purifieront le pays,
  - type: text
    content: Et ils seront à la recherche pendant sept mois entiers.
  '15':
  - type: text
    content: Ils parcourront le pays;
  - type: text
    content: Et quand l’un d’eux verra les ossements d’un homme,
  - type: text
    content: Il mettra près de là un signe,
  - type: text
    content: Jusqu’à ce que les fossoyeurs l’enterrent
  - type: text
    content: Dans la vallée de la multitude de Gog.
  '16':
  - type: text
    content: Il y aura aussi une ville appelée Hamona.
  - type: text
    content: C’est ainsi qu’on purifiera le pays.
  '17':
  - type: text
    content: 'Et toi, fils de l’homme, ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: Dis aux oiseaux, à tout ce qui a des ailes,
  - type: text
    content: 'Et à toutes les bêtes des champs:'
  - type: text
    content: Réunissez-vous, venez, rassemblez-vous de toutes parts,
  - type: text
    content: Pour le sacrifice où j’immole pour vous des victimes,
  - type: text
    content: Grand sacrifice sur les montagnes d’Israël!
  - type: text
    content: Vous mangerez de la chair, et vous boirez du sang.
  '18':
  - type: text
    content: Vous mangerez la chair des héros,
  - type: text
    content: Et vous boirez le sang des princes de la terre,
  - type: text
    content: Béliers, agneaux, boucs,
  - type: text
    content: Taureaux engraissés sur le Basan.
  '19':
  - type: text
    content: Vous mangerez de la graisse jusqu’à vous en rassasier,
  - type: text
    content: Et vous boirez du sang jusqu’à vous enivrer,
  - type: text
    content: A ce festin de victimes que j’immolerai pour vous.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Éz 38:4.
  - type: text
    content: Je t’entraînerai, je te conduirai,
  - type: text
    content: Je te ferai monter des extrémités du septentrion,
  - type: text
    content: Et je t’amènerai sur les montagnes d’Israël.
  '20':
  - type: text
    content: Vous vous rassasierez à ma table de la chair des chevaux et des cavaliers,
  - type: text
    content: De la chair des héros et de tous les hommes de guerre,
  - type: text
    content: Dit le Seigneur, l’Éternel.
  '21':
  - type: text
    content: Je manifesterai ma gloire parmi les nations;
  - type: text
    content: Et toutes les nations verront les jugements que j’exercerai,
  - type: text
    content: Et les châtiments dont ma main les frappera.
  '22':
  - type: text
    content: La maison d’Israël saura que je suis l’Éternel, son Dieu,
  - type: text
    content: Dès ce jour et à l’avenir.
  '23':
  - type: text
    content: Et les nations sauront que c’est à cause de ses iniquités
  - type: text
    content: Que la maison d’Israël a été conduite en captivité,
  - type: text
    content: A cause de ses infidélités envers moi;
  - type: text
    content: Aussi je leur ai caché ma face,
  - type: text
    content: Et je les ai livrés entre les mains de leurs ennemis,
  - type: text
    content: Afin qu’ils périssent tous par l’épée.
  '24':
  - type: text
    content: Je les ai traités selon leurs souillures et leurs transgressions,
  - type: text
    content: Et je leur ai caché ma face.
  - type: heading
    content: 'V. 25-29: cf. Éz 36:18, etc.; 37:21, etc.'
  '25':
  - type: text
    content: 'C’est pourquoi ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: Maintenant je ramènerai les captifs de Jacob,
  - type: text
    content: J’aurai pitié de toute la maison d’Israël,
  - type: text
    content: Et je serai jaloux de mon saint nom.
  '26':
  - type: text
    content: Alors ils oublieront leur opprobre,
  - type: text
    content: Et toutes les infidélités qu’ils ont commises envers moi,
  - type: text
    content: Lorsqu’ils habitaient en sécurité leur pays,
  - type: text
    content: Et qu’il n’y avait personne pour les troubler.
  '27':
  - type: text
    content: Quand je les ramènerai d’entre les peuples,
  - type: text
    content: Quand je les rassemblerai du pays de leurs ennemis,
  - type: text
    content: Je serai sanctifié par eux aux yeux de beaucoup de nations.
  '28':
  - type: text
    content: Et ils sauront que je suis l’Éternel, leur Dieu,
  - type: text
    content: Qui les avait emmenés captifs parmi les nations,
  - type: text
    content: Et qui les rassemble dans leur pays;
  - type: text
    content: Je ne laisserai chez elles aucun d’eux,
  '29':
  - type: text
    content: Et je ne leur cacherai plus ma face,
  - type: text
    content: 'Car je répandrai mon '
  - type: note
    content: Joë 2:28. Ac 2:17.
  - type: text
    content: esprit sur la maison d’Israël,
  - type: text
    content: Dit le Seigneur, l’Éternel.
  '3':
  - type: text
    content: J’abattrai ton arc de ta main gauche,
  - type: text
    content: Et je ferai tomber tes flèches de ta main droite.
  '4':
  - type: text
    content: Tu tomberas sur les montagnes d’Israël,
  - type: text
    content: Toi et toutes tes troupes,
  - type: text
    content: Et les peuples qui seront avec toi;
  - type: text
    content: Aux oiseaux de proie, à tout ce qui a des ailes,
  - type: text
    content: 'Et aux bêtes des champs je te donnerai '
  - type: note
    content: Éz 33:27.
  - type: text
    content: pour pâture.
  '5':
  - type: text
    content: Tu tomberas sur la face de la terre,
  - type: text
    content: Car j’ai parlé, dit le Seigneur, l’Éternel.
  '6':
  - type: text
    content: J’enverrai le feu dans Magog,
  - type: text
    content: Et parmi ceux qui habitent en sécurité les îles;
  - type: text
    content: Et ils sauront que je suis l’Éternel.
  '7':
  - type: text
    content: Je ferai connaître mon saint nom au milieu de mon peuple d’Israël,
  - type: text
    content: Et je ne laisserai plus profaner mon saint nom;
  - type: text
    content: Et les nations sauront que je suis l’Éternel,
  - type: text
    content: Le Saint en Israël.
  '8':
  - type: text
    content: Voici, ces choses viennent, elles arrivent,
  - type: text
    content: Dit le Seigneur, l’Éternel;
  - type: text
    content: C’est le jour dont j’ai parlé.
  '9':
  - type: text
    content: Alors les habitants des villes d’Israël sortiront,
  - type: text
    content: Ils brûleront et livreront aux flammes les armes,
  - type: text
    content: Les petits et les grands boucliers,
  - type: text
    content: Les arcs et les flèches,
  - type: text
    content: Les piques et les lances;
  - type: text
    content: Ils en feront du feu pendant sept ans.
