document_id: JOS.12,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Rois vaincus
  - type: heading
    content: 'V. 1-6: cf. (No 21:21-35. De 2:34-37; 3:1-16.)'
  - type: text
    content: 'Voici les rois que les enfants d’Israël battirent, et dont ils possédèrent le pays de l’autre côté du Jourdain, vers le soleil levant, depuis le torrent de l’Arnon jusqu’à la montagne de l’Hermon, avec toute la plaine à l’orient. '
  '10':
  - type: text
    content: 'le roi de Jérusalem, un; le roi d’Hébron, un; '
  '11':
  - type: text
    content: 'le roi de Jarmuth, un; le roi de Lakis, un; '
  '12':
  - type: text
    content: 'le roi d’Églon, un; le roi de Guézer, un; '
  '13':
  - type: text
    content: 'le roi de Debir, un; le roi de Guéder, un; '
  '14':
  - type: text
    content: 'le roi de Horma, un; le roi d’Arad, un; '
  '15':
  - type: text
    content: 'le roi de Libna, un; le roi d’Adullam, un; '
  '16':
  - type: text
    content: 'le roi de Makkéda, un; le roi de Béthel, un; '
  '17':
  - type: text
    content: 'le roi de Tappuach, un; le roi de Hépher, un; '
  '18':
  - type: text
    content: 'le roi d’Aphek, un; le roi de Lascharon, un; '
  '19':
  - type: text
    content: 'le roi de Madon, un; le roi de Hatsor, un; '
  '2':
  - type: text
    content: 'Sihon, roi des Amoréens, qui habitait à Hesbon. Sa domination s’étendait depuis Aroër, qui est au bord du torrent de l’Arnon, '
  - type: note
    content: De 3:8, 16.
  - type: text
    content: 'et, depuis le milieu du torrent, sur la moitié de Galaad, jusqu’au torrent de Jabbok, frontière des enfants d’Ammon; '
  '20':
  - type: text
    content: 'le roi de Schimron-Meron, un; le roi d’Acschaph, un; '
  '21':
  - type: text
    content: 'le roi de Taanac, un; le roi de Meguiddo, un; '
  '22':
  - type: text
    content: 'le roi de Kédesch, un; le roi de Jokneam, au Carmel, un; '
  '23':
  - type: text
    content: 'le roi de Dor, sur les hauteurs de Dor, un; le roi de Gojim, près de Guilgal, un; '
  '24':
  - type: text
    content: 'le roi de Thirtsa, un. Total des rois: trente et un.'
  '3':
  - type: text
    content: 'sur la plaine, jusqu’à la mer de Kinnéreth à l’orient, et jusqu’à la mer de la plaine, la mer Salée, à l’orient vers Beth-Jeschimoth; et du côté du midi, sur le pied du Pisga. '
  '4':
  - type: note
    content: De 1:4.
  - type: text
    content: 'Og, roi de Basan, seul reste des Rephaïm, qui habitait à Aschtaroth et à Édréï. '
  '5':
  - type: text
    content: 'Sa domination s’étendait sur la montagne de l’Hermon, sur Salca, sur tout Basan jusqu’à la frontière des Gueschuriens et des Maacathiens, et sur la moitié de Galaad, frontière de Sihon, roi de Hesbon. '
  '6':
  - type: text
    content: 'Moïse, serviteur de l’Éternel, et les enfants d’Israël, les battirent; '
  - type: note
    content: No 21:24; 32:33.
  - type: text
    content: et Moïse, serviteur de l’Éternel, donna leur pays en possession aux Rubénites, aux Gadites, et à la moitié de la tribu de Manassé.
  - type: heading
    content: 'V. 7-24: cf. Jos 10 et 11. Ps 76:13.'
  '7':
  - type: text
    content: 'Voici les rois que Josué et les enfants d’Israël battirent '
  - type: note
    content: Jos 10:40.
  - type: text
    content: 'de ce côté-ci du Jourdain, à l’occident, depuis Baal-Gad dans la vallée du Liban jusqu’à la montagne nue qui s’élève vers Séir. Josué donna leur pays en possession aux tribus d’Israël, à chacune sa portion, '
  '8':
  - type: text
    content: 'dans la montagne, dans la vallée, dans la plaine, sur les coteaux, dans le désert, et dans le midi; pays des Héthiens, des Amoréens, des Cananéens, des Phéréziens, des Héviens et des Jébusiens. '
  '9':
  - type: text
    content: 'Le roi de Jéricho, un; le roi d’Aï, près de Béthel, un; '
