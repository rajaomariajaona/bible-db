document_id: JOB.19,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Réponse de Job à Bildad
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-22: cf. Job 16. Ps 88; 102:4-12.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Job prit la parole et dit:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Il m’a brisé de toutes parts, et je m’en vais;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a arraché mon espérance comme un arbre.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Il s’est enflammé de colère contre moi,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 13:24
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 33:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: La 2:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il m’a traité comme l’un de ses ennemis.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ses troupes se sont de concert mises en marche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles se sont frayées leur chemin jusqu’à moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles ont campé autour de ma tente.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 31:12
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 38:12
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 69:9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 88:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il a éloigné de moi mes frères,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et mes amis se sont détournés de moi;
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Je suis abandonné de mes proches,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis oublié de mes intimes.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Je suis un étranger pour mes serviteurs et mes servantes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ne suis plus à leurs yeux qu’un inconnu.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: J’appelle mon serviteur, et il ne répond pas;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je le supplie de ma bouche, et c’est en vain.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Mon humeur est à charge à ma femme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ma plainte aux fils de mes entrailles.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 30:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Je suis méprisé même par des enfants;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si je me lève, je reçois leurs insultes.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 41:10
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 55:14
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '15'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ceux que j’avais pour confidents m’ont en horreur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux que j’aimais se sont tournés contre moi.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Jusques à quand affligerez-vous mon âme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et m’écraserez-vous de vos discours?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 30:30
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 102:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: La 4:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Mes os sont attachés à ma peau et à ma chair;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne me reste que la peau des dents.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ayez pitié, ayez pitié de moi, vous, mes amis!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car la main de Dieu m’a frappé.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Pourquoi me poursuivre comme Dieu me poursuit?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi vous montrer insatiables de ma chair?
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 23-29: cf. (Mt 5:8. 1 Jn 3:2, 3.) Jn 11:23-27.'
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Oh! Je voudrais que mes paroles fussent écrites,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’elles fussent écrites dans un livre;
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Je voudrais qu’avec un burin de fer et avec du plomb
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles fussent pour toujours gravées dans le roc…
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Mais je sais que mon rédempteur est vivant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qu’il se lèvera le dernier sur la terre.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Quand ma peau sera détruite, il se lèvera;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand je n’aurai plus de chair, je verrai Dieu.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Je le verrai, et il me sera favorable;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes yeux le verront, et non ceux d’un autre;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon âme languit d’attente au-dedans de moi.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Vous direz alors: Pourquoi le poursuivions-nous?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car la justice de ma cause sera reconnue.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Craignez pour vous le glaive:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les châtiments par le glaive sont terribles!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et sachez qu’il y a un jugement.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Voilà dix fois que vous m’outragez;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N’avez-vous pas honte de m’étourdir ainsi?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Si réellement j’ai péché,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Seul j’en suis responsable.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Pensez-vous me traiter avec hauteur?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pensez-vous démontrer que je suis coupable?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Sachez alors que c’est Dieu qui me poursuit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qui m’enveloppe de son filet.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Voici, je crie à la violence, et nul ne répond;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’implore justice, et point de justice!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Il m’a fermé toute issue, et je ne puis passer;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a répandu des ténèbres sur mes sentiers.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Il m’a dépouillé de ma gloire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a enlevé la couronne de ma tête.
