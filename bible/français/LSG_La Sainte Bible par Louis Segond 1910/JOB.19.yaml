document_id: JOB.19
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Réponse de Job à Bildad
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-22: cf. Job 16. Ps 88; 102:4-12.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Job prit la parole et dit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Jusques à quand affligerez-vous mon âme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et m’écraserez-vous de vos discours?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Voilà dix fois que vous m’outragez;
- type: usfm
  marker: q1
  children:
  - type: text
    text: N’avez-vous pas honte de m’étourdir ainsi?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Si réellement j’ai péché,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Seul j’en suis responsable.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Pensez-vous me traiter avec hauteur?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pensez-vous démontrer que je suis coupable?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Sachez alors que c’est Dieu qui me poursuit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui m’enveloppe de son filet.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Voici, je crie à la violence, et nul ne répond;
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’implore justice, et point de justice!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Il m’a fermé toute issue, et je ne puis passer;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a répandu des ténèbres sur mes sentiers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Il m’a dépouillé de ma gloire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a enlevé la couronne de ma tête.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Il m’a brisé de toutes parts, et je m’en vais;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a arraché mon espérance comme un arbre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Il s’est enflammé de colère contre moi,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 13:24
      metadata:
        usfm: JOB.13.24
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 16:9
      metadata:
        usfm: JOB.16.9
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 33:10
      metadata:
        usfm: JOB.33.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: La 2:5
      metadata:
        usfm: LAM.2.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il m’a traité comme l’un de ses ennemis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ses troupes se sont de concert mises en marche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elles se sont frayées leur chemin jusqu’à moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elles ont campé autour de ma tente.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 31:12
      metadata:
        usfm: PSA.31.12
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 38:12
      metadata:
        usfm: PSA.38.12
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 69:9
      metadata:
        usfm: PSA.69.9
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 88:9
      metadata:
        usfm: PSA.88.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il a éloigné de moi mes frères,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et mes amis se sont détournés de moi;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Je suis abandonné de mes proches,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je suis oublié de mes intimes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Je suis un étranger pour mes serviteurs et mes servantes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je ne suis plus à leurs yeux qu’un inconnu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: J’appelle mon serviteur, et il ne répond pas;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je le supplie de ma bouche, et c’est en vain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Mon humeur est à charge à ma femme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ma plainte aux fils de mes entrailles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 30:1
      metadata:
        usfm: JOB.30.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Je suis méprisé même par des enfants;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si je me lève, je reçois leurs insultes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 41:10
      metadata:
        usfm: PSA.41.10
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 55:14
      metadata:
        usfm: PSA.55.14
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '15'
      metadata:
        usfm: PSA.55.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ceux que j’avais pour confidents m’ont en horreur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ceux que j’aimais se sont tournés contre moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 30:30
      metadata:
        usfm: JOB.30.30
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 102:6
      metadata:
        usfm: PSA.102.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: La 4:8
      metadata:
        usfm: LAM.4.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Mes os sont attachés à ma peau et à ma chair;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il ne me reste que la peau des dents.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ayez pitié, ayez pitié de moi, vous, mes amis!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car la main de Dieu m’a frappé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Pourquoi me poursuivre comme Dieu me poursuit?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi vous montrer insatiables de ma chair?
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 23-29: cf. (Mt 5:8. 1 Jn 3:2, 3.) Jn 11:23-27.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Oh! Je voudrais que mes paroles fussent écrites,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’elles fussent écrites dans un livre;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Je voudrais qu’avec un burin de fer et avec du plomb
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elles fussent pour toujours gravées dans le roc…
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Mais je sais que mon rédempteur est vivant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qu’il se lèvera le dernier sur la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Quand ma peau sera détruite, il se lèvera;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand je n’aurai plus de chair, je verrai Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Je le verrai, et il me sera favorable;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mes yeux le verront, et non ceux d’un autre;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon âme languit d’attente au-dedans de moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Vous direz alors: Pourquoi le poursuivions-nous?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car la justice de ma cause sera reconnue.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Craignez pour vous le glaive:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les châtiments par le glaive sont terribles!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et sachez qu’il y a un jugement.
