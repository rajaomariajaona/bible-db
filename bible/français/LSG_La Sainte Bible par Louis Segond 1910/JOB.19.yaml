document_id: JOB.19,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Réponse de Job à Bildad
  - type: heading
    content: 'V. 1-22: cf. Job 16. Ps 88; 102:4-12.'
  - type: text
    content: 'Job prit la parole et dit:'
  '10':
  - type: text
    content: Il m’a brisé de toutes parts, et je m’en vais;
  - type: text
    content: Il a arraché mon espérance comme un arbre.
  '11':
  - type: text
    content: Il s’est enflammé de colère contre moi,
  - type: note
    content: Job 13:24; 16:9; 33:10. La 2:5.
  - type: text
    content: Il m’a traité comme l’un de ses ennemis.
  '12':
  - type: text
    content: Ses troupes se sont de concert mises en marche,
  - type: text
    content: Elles se sont frayées leur chemin jusqu’à moi,
  - type: text
    content: Elles ont campé autour de ma tente.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Ps 31:12; 38:12; 69:9; 88:9.
  - type: text
    content: Il a éloigné de moi mes frères,
  - type: text
    content: Et mes amis se sont détournés de moi;
  '14':
  - type: text
    content: Je suis abandonné de mes proches,
  - type: text
    content: Je suis oublié de mes intimes.
  '15':
  - type: text
    content: Je suis un étranger pour mes serviteurs et mes servantes,
  - type: text
    content: Je ne suis plus à leurs yeux qu’un inconnu.
  '16':
  - type: text
    content: J’appelle mon serviteur, et il ne répond pas;
  - type: text
    content: Je le supplie de ma bouche, et c’est en vain.
  '17':
  - type: text
    content: Mon humeur est à charge à ma femme,
  - type: text
    content: Et ma plainte aux fils de mes entrailles.
  '18':
  - type: text
    content: ' '
  - type: note
    content: Job 30:1.
  - type: text
    content: Je suis méprisé même par des enfants;
  - type: text
    content: Si je me lève, je reçois leurs insultes.
  '19':
  - type: text
    content: ' '
  - type: note
    content: Ps 41:10; 55:14, 15.
  - type: text
    content: Ceux que j’avais pour confidents m’ont en horreur,
  - type: text
    content: Ceux que j’aimais se sont tournés contre moi.
  '2':
  - type: text
    content: Jusques à quand affligerez-vous mon âme,
  - type: text
    content: Et m’écraserez-vous de vos discours?
  '20':
  - type: text
    content: ' '
  - type: note
    content: Job 30:30. Ps 102:6. La 4:8.
  - type: text
    content: Mes os sont attachés à ma peau et à ma chair;
  - type: text
    content: Il ne me reste que la peau des dents.
  '21':
  - type: text
    content: Ayez pitié, ayez pitié de moi, vous, mes amis!
  - type: text
    content: Car la main de Dieu m’a frappé.
  '22':
  - type: text
    content: Pourquoi me poursuivre comme Dieu me poursuit?
  - type: text
    content: Pourquoi vous montrer insatiables de ma chair?
  - type: heading
    content: 'V. 23-29: cf. (Mt 5:8. 1 Jn 3:2, 3.) Jn 11:23-27.'
  '23':
  - type: text
    content: Oh! Je voudrais que mes paroles fussent écrites,
  - type: text
    content: Qu’elles fussent écrites dans un livre;
  '24':
  - type: text
    content: Je voudrais qu’avec un burin de fer et avec du plomb
  - type: text
    content: Elles fussent pour toujours gravées dans le roc…
  '25':
  - type: text
    content: Mais je sais que mon rédempteur est vivant,
  - type: text
    content: Et qu’il se lèvera le dernier sur la terre.
  '26':
  - type: text
    content: Quand ma peau sera détruite, il se lèvera;
  - type: text
    content: Quand je n’aurai plus de chair, je verrai Dieu.
  '27':
  - type: text
    content: Je le verrai, et il me sera favorable;
  - type: text
    content: Mes yeux le verront, et non ceux d’un autre;
  - type: text
    content: Mon âme languit d’attente au-dedans de moi.
  '28':
  - type: text
    content: 'Vous direz alors: Pourquoi le poursuivions-nous?'
  - type: text
    content: Car la justice de ma cause sera reconnue.
  '29':
  - type: text
    content: 'Craignez pour vous le glaive:'
  - type: text
    content: Les châtiments par le glaive sont terribles!
  - type: text
    content: Et sachez qu’il y a un jugement.
  '3':
  - type: text
    content: Voilà dix fois que vous m’outragez;
  - type: text
    content: N’avez-vous pas honte de m’étourdir ainsi?
  '4':
  - type: text
    content: Si réellement j’ai péché,
  - type: text
    content: Seul j’en suis responsable.
  '5':
  - type: text
    content: Pensez-vous me traiter avec hauteur?
  - type: text
    content: Pensez-vous démontrer que je suis coupable?
  '6':
  - type: text
    content: Sachez alors que c’est Dieu qui me poursuit,
  - type: text
    content: Et qui m’enveloppe de son filet.
  '7':
  - type: text
    content: Voici, je crie à la violence, et nul ne répond;
  - type: text
    content: J’implore justice, et point de justice!
  '8':
  - type: text
    content: Il m’a fermé toute issue, et je ne puis passer;
  - type: text
    content: Il a répandu des ténèbres sur mes sentiers.
  '9':
  - type: text
    content: Il m’a dépouillé de ma gloire,
  - type: text
    content: Il a enlevé la couronne de ma tête.
