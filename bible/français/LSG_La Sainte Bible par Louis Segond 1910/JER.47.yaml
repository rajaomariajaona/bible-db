- type: usfm
  marker: s1
  children:
  - type: text
    text: Prophétie contre les Philistins
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-7: cf. Éz 25:15-17. Am 1:6-8. So 2:4-7.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: La parole de l’Éternel qui fut adressée à Jérémie, le prophète, sur les Philistins, avant que Pharaon frappât Gaza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ainsi parle l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voici, des eaux s’élèvent du septentrion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elles sont comme un torrent qui déborde;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elles inondent le pays et ce qu’il contient,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les villes et leurs habitants.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les hommes poussent des cris,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous les habitants du pays se lamentent,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'A cause du retentissement des sabots de ses '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 4:13
      metadata:
        usfm: JER.4.13
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 6:23
      metadata:
        usfm: JER.6.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: puissants chevaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Du bruit de ses chars et du fracas des '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 5:28
      metadata:
        usfm: ISA.5.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: roues;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les pères ne se tournent pas vers leurs enfants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tant les mains sont affaiblies,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Parce que le jour arrive où seront détruits tous les Philistins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Exterminés tous ceux qui servaient encore d’auxiliaires à '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 25:22
      metadata:
        usfm: JER.25.22
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Tyr et à Sidon;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car l’Éternel va détruire les Philistins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les restes de l’île de Caphtor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Gaza est devenue chauve,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 25:20
      metadata:
        usfm: JER.25.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Askalon est dans le silence, le reste de leur plaine aussi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Jusques à quand te feras-tu des '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 14:1
      metadata:
        usfm: DEU.14.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 16:6
      metadata:
        usfm: JER.16.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: incisions?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ah! Épée de l’Éternel, quand te reposeras-tu?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rentre dans ton fourreau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Arrête, et sois tranquille!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Comment te reposerais-tu?
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’Éternel lui donne ses ordres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est contre Askalon et la côte de la mer qu’il la dirige.
