document_id: JER.47,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Prophétie contre les Philistins
  - type: heading
    content: 'V. 1-7: cf. Éz 25:15-17. Am 1:6-8. So 2:4-7.'
  - type: text
    content: La parole de l’Éternel qui fut adressée à Jérémie, le prophète, sur les Philistins, avant que Pharaon frappât Gaza.
  '2':
  - type: text
    content: 'Ainsi parle l’Éternel:'
  - type: text
    content: Voici, des eaux s’élèvent du septentrion,
  - type: text
    content: Elles sont comme un torrent qui déborde;
  - type: text
    content: Elles inondent le pays et ce qu’il contient,
  - type: text
    content: Les villes et leurs habitants.
  - type: text
    content: Les hommes poussent des cris,
  - type: text
    content: Tous les habitants du pays se lamentent,
  '3':
  - type: text
    content: 'A cause du retentissement des sabots de ses '
  - type: note
    content: Jé 4:13; 6:23.
  - type: text
    content: puissants chevaux,
  - type: text
    content: 'Du bruit de ses chars et du fracas des '
  - type: note
    content: És 5:28.
  - type: text
    content: roues;
  - type: text
    content: Les pères ne se tournent pas vers leurs enfants,
  - type: text
    content: Tant les mains sont affaiblies,
  '4':
  - type: text
    content: Parce que le jour arrive où seront détruits tous les Philistins,
  - type: text
    content: 'Exterminés tous ceux qui servaient encore d’auxiliaires à '
  - type: note
    content: Jé 25:22.
  - type: text
    content: Tyr et à Sidon;
  - type: text
    content: Car l’Éternel va détruire les Philistins,
  - type: text
    content: Les restes de l’île de Caphtor.
  '5':
  - type: text
    content: Gaza est devenue chauve,
  - type: note
    content: Jé 25:20.
  - type: text
    content: Askalon est dans le silence, le reste de leur plaine aussi.
  - type: text
    content: 'Jusques à quand te feras-tu des '
  - type: note
    content: De 14:1. Jé 16:6.
  - type: text
    content: incisions?
  '6':
  - type: text
    content: Ah! Épée de l’Éternel, quand te reposeras-tu?
  - type: text
    content: Rentre dans ton fourreau,
  - type: text
    content: Arrête, et sois tranquille!
  '7':
  - type: text
    content: Comment te reposerais-tu?
  - type: text
    content: L’Éternel lui donne ses ordres,
  - type: text
    content: C’est contre Askalon et la côte de la mer qu’il la dirige.
