document_id: ISA.46,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Chute des dieux de Babylone
  - type: heading
    content: 'V. 1-8: cf. Jé 50:2; 10:1-15.'
  - type: text
    content: Bel s’écroule, Nebo tombe;
  - type: text
    content: On met leurs idoles sur des animaux, sur des bêtes;
  - type: text
    content: Vous les portiez, et les voilà chargées,
  - type: text
    content: Devenues un fardeau pour l’animal fatigué!
  '10':
  - type: text
    content: J’annonce dès le commencement ce qui doit arriver,
  - type: text
    content: Et longtemps d’avance ce qui n’est pas encore accompli;
  - type: text
    content: 'Je dis: '
  - type: note
    content: Ps 33:11. Pr 19:21; 21:30. Hé 6:17.
  - type: text
    content: Mes arrêts subsisteront,
  - type: text
    content: Et j’exécuterai toute ma volonté.
  '11':
  - type: text
    content: C’est moi qui appelle de l’orient un oiseau de proie,
  - type: text
    content: D’une terre lointaine un homme pour accomplir mes desseins,
  - type: text
    content: Je l’ai dit, et je le réaliserai;
  - type: text
    content: Je l’ai conçu, et je l’exécuterai.
  '12':
  - type: text
    content: Écoutez-moi, gens endurcis de cœur,
  - type: text
    content: Ennemis de la droiture!
  '13':
  - type: text
    content: 'Je fais approcher ma justice: elle n’est pas loin;'
  - type: text
    content: 'Et mon salut: il ne tardera pas.'
  - type: text
    content: Je mettrai le salut en Sion,
  - type: text
    content: Et ma gloire sur Israël.
  '2':
  - type: text
    content: Ils sont tombés, ils se sont écroulés ensemble,
  - type: text
    content: Ils ne peuvent sauver le fardeau,
  - type: text
    content: Et ils s’en vont eux-mêmes en captivité.
  '3':
  - type: text
    content: Écoutez-moi, maison de Jacob,
  - type: text
    content: Et vous tous, restes de la maison d’Israël,
  - type: text
    content: Vous que j’ai pris à ma charge dès votre origine,
  - type: text
    content: Que j’ai portés dès votre naissance!
  '4':
  - type: text
    content: Jusqu’à votre vieillesse je serai le même,
  - type: text
    content: Jusqu’à votre vieillesse je vous soutiendrai;
  - type: text
    content: Je l’ai fait, et je veux encore vous porter,
  - type: text
    content: Vous soutenir et vous sauver.
  '5':
  - type: text
    content: ' '
  - type: note
    content: És 40:18, 25.
  - type: text
    content: A qui me comparerez-vous, pour le faire mon égal?
  - type: text
    content: A qui me ferez-vous ressembler, pour que nous soyons semblables?
  '6':
  - type: text
    content: Ils versent l’or de leur bourse,
  - type: text
    content: Et pèsent l’argent à la balance;
  - type: text
    content: Ils paient un orfèvre, pour qu’il en fasse un dieu,
  - type: text
    content: Et ils adorent et se prosternent.
  '7':
  - type: text
    content: ' '
  - type: note
    content: És 45:20.
  - type: text
    content: Ils le portent, ils le chargent sur l’épaule,
  - type: text
    content: Ils le mettent en place, et il y reste;
  - type: text
    content: Il ne bouge pas de sa place;
  - type: text
    content: Puis on crie vers lui, mais il ne répond pas,
  - type: text
    content: Il ne sauve pas de la détresse.
  '8':
  - type: text
    content: Souvenez-vous de ces choses, et soyez des hommes!
  - type: text
    content: Pécheurs, rentrez en vous-mêmes!
  - type: heading
    content: 'V. 9-13: cf. És 41.'
  '9':
  - type: text
    content: Souvenez-vous de ce qui s’est passé dès les temps anciens;
  - type: text
    content: 'Car je suis Dieu, '
  - type: note
    content: És 45:5, 14, 18, 21, 22; 48:12.
  - type: text
    content: et il n’y en a point d’autre,
  - type: text
    content: Je suis Dieu, et nul n’est semblable à moi.
