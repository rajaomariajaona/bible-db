document_id: ISA.46,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Chute des dieux de Babylone
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-8: cf. Jé 50:2; 10:1-15.'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Bel s’écroule, Nebo tombe;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On met leurs idoles sur des animaux, sur des bêtes;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous les portiez, et les voilà chargées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Devenues un fardeau pour l’animal fatigué!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: J’annonce dès le commencement ce qui doit arriver,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et longtemps d’avance ce qui n’est pas encore accompli;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je dis: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 33:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 19:21
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 21:30
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 6:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Mes arrêts subsisteront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et j’exécuterai toute ma volonté.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: C’est moi qui appelle de l’orient un oiseau de proie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: D’une terre lointaine un homme pour accomplir mes desseins,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je l’ai dit, et je le réaliserai;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je l’ai conçu, et je l’exécuterai.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Écoutez-moi, gens endurcis de cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ennemis de la droiture!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Je fais approcher ma justice: elle n’est pas loin;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et mon salut: il ne tardera pas.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je mettrai le salut en Sion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ma gloire sur Israël.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ils sont tombés, ils se sont écroulés ensemble,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ne peuvent sauver le fardeau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils s’en vont eux-mêmes en captivité.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Écoutez-moi, maison de Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et vous tous, restes de la maison d’Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous que j’ai pris à ma charge dès votre origine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que j’ai portés dès votre naissance!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Jusqu’à votre vieillesse je serai le même,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jusqu’à votre vieillesse je vous soutiendrai;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je l’ai fait, et je veux encore vous porter,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous soutenir et vous sauver.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 40:18
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '25'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: A qui me comparerez-vous, pour le faire mon égal?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A qui me ferez-vous ressembler, pour que nous soyons semblables?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ils versent l’or de leur bourse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et pèsent l’argent à la balance;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils paient un orfèvre, pour qu’il en fasse un dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils adorent et se prosternent.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 45:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ils le portent, ils le chargent sur l’épaule,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils le mettent en place, et il y reste;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne bouge pas de sa place;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Puis on crie vers lui, mais il ne répond pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne sauve pas de la détresse.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Souvenez-vous de ces choses, et soyez des hommes!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pécheurs, rentrez en vous-mêmes!
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 9-13: cf. És 41.'
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Souvenez-vous de ce qui s’est passé dès les temps anciens;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car je suis Dieu, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 45:5
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '18'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '21'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '22'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 48:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: et il n’y en a point d’autre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis Dieu, et nul n’est semblable à moi.
