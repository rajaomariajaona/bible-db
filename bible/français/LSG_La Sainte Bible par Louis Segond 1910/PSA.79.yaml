document_id: PSA.79,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ps 74. La 1 à 5.
  - type: text
    content: Psaume d’Asaph.
  - type: text
    content: O Dieu! Les nations ont envahi ton héritage,
  - type: text
    content: Elles ont profané ton saint temple,
  - type: text
    content: Elles ont fait de Jérusalem un monceau de pierres.
  '10':
  - type: text
    content: 'Pourquoi les nations diraient-elles:'
  - type: text
    content: Où est leur Dieu?
  - type: text
    content: Qu’on sache, en notre présence, parmi les nations,
  - type: text
    content: Que tu venges le sang de tes serviteurs, le sang répandu!
  '11':
  - type: text
    content: Que les gémissements des captifs parviennent jusqu’à toi!
  - type: text
    content: Par ton bras puissant sauve ceux qui vont périr!
  '12':
  - type: text
    content: Rends à nos voisins sept fois dans leur sein
  - type: text
    content: Les outrages qu’ils t’ont faits, Seigneur!
  '13':
  - type: text
    content: Et nous, ton peuple, le troupeau de ton pâturage,
  - type: text
    content: Nous te célébrerons éternellement;
  - type: text
    content: De génération en génération nous publierons tes louanges.
  '2':
  - type: text
    content: Elles ont livré les cadavres de tes serviteurs
  - type: text
    content: En pâture aux oiseaux du ciel,
  - type: text
    content: La chair de tes fidèles aux bêtes de la terre;
  '3':
  - type: text
    content: Elles ont versé leur sang comme de l’eau
  - type: text
    content: Tout autour de Jérusalem,
  - type: text
    content: Et il n’y a eu personne pour les enterrer.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Ps 44:14; 80:7.
  - type: text
    content: Nous sommes devenus un objet d’opprobre pour nos voisins,
  - type: text
    content: De moquerie et de risée pour ceux qui nous entourent.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Ps 89:47.
  - type: text
    content: Jusques à quand, Éternel! T’irriteras-tu sans cesse,
  - type: text
    content: Et ta colère s’embrasera-t-elle comme le feu?
  '6':
  - type: text
    content: ' '
  - type: note
    content: Jé 10:25.
  - type: text
    content: Répands ta fureur sur les nations qui ne te connaissent pas,
  - type: text
    content: Et sur les royaumes qui n’invoquent pas ton nom!
  '7':
  - type: text
    content: Car on a dévoré Jacob,
  - type: text
    content: Et ravagé sa demeure.
  '8':
  - type: text
    content: ' '
  - type: note
    content: És 64:9.
  - type: text
    content: Ne te souviens plus de nos iniquités passées!
  - type: text
    content: Que tes compassions viennent en hâte au-devant de nous!
  - type: text
    content: Car nous sommes bien malheureux.
  '9':
  - type: text
    content: Secours-nous, Dieu de notre salut, pour la gloire de ton nom!
  - type: text
    content: Délivre-nous, et pardonne nos péchés, à cause de ton nom!
