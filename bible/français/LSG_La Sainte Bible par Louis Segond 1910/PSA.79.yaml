document_id: PSA.79
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: Ps 74. La 1 à 5.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Psaume d’Asaph.
- type: usfm
  marker: q1
  children:
  - type: text
    text: O Dieu! Les nations ont envahi ton héritage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elles ont profané ton saint temple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elles ont fait de Jérusalem un monceau de pierres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Elles ont livré les cadavres de tes serviteurs
- type: usfm
  marker: q1
  children:
  - type: text
    text: En pâture aux oiseaux du ciel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La chair de tes fidèles aux bêtes de la terre;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Elles ont versé leur sang comme de l’eau
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tout autour de Jérusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il n’y a eu personne pour les enterrer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 44:14
      metadata:
        usfm: PSA.44.14
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 80:7
      metadata:
        usfm: PSA.80.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Nous sommes devenus un objet d’opprobre pour nos voisins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De moquerie et de risée pour ceux qui nous entourent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 89:47
      metadata:
        usfm: PSA.89.47
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Jusques à quand, Éternel! T’irriteras-tu sans cesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ta colère s’embrasera-t-elle comme le feu?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 10:25
      metadata:
        usfm: JER.10.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Répands ta fureur sur les nations qui ne te connaissent pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et sur les royaumes qui n’invoquent pas ton nom!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Car on a dévoré Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ravagé sa demeure.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 64:9
      metadata:
        usfm: ISA.64.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ne te souviens plus de nos iniquités passées!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que tes compassions viennent en hâte au-devant de nous!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car nous sommes bien malheureux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Secours-nous, Dieu de notre salut, pour la gloire de ton nom!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Délivre-nous, et pardonne nos péchés, à cause de ton nom!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Pourquoi les nations diraient-elles:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Où est leur Dieu?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’on sache, en notre présence, parmi les nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que tu venges le sang de tes serviteurs, le sang répandu!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Que les gémissements des captifs parviennent jusqu’à toi!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Par ton bras puissant sauve ceux qui vont périr!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Rends à nos voisins sept fois dans leur sein
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les outrages qu’ils t’ont faits, Seigneur!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Et nous, ton peuple, le troupeau de ton pâturage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous te célébrerons éternellement;
- type: usfm
  marker: q1
  children:
  - type: text
    text: De génération en génération nous publierons tes louanges.
