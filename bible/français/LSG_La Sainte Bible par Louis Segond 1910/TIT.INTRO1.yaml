document_id: TIT.INTRO1,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: INTRODUCTION À L’ÉPÎTRE À TITE
  - type: usfm
    marker: imt3
    children:
    - type: text
      text: (1 Ti 3:15. 1 Pi 2:15.)
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'L’Épître à Tite fait partie, avec les deux précédentes, du groupe des pastorales, et partage donc avec elles certaines caractéristiques (voir l’introduction à 1 Timothée): il s’agit principalement d’instructions sur la direction des communautés ecclésiales. Voici la structure de cette épître:'
  - type: usfm
    marker: io1
    children:
    - type: text
      text: '1. Adresse et salutations '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 1:1-40
  - type: usfm
    marker: io1
    children:
    - type: text
      text: '2. Mission d’organiser l’Église de Crète: des anciens pour la lutte contre les faussaires '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 1:5-16
  - type: usfm
    marker: io1
    children:
    - type: text
      text: '3. Exhortation des fidèles toutes catégories confondues; être exemple dans la communauté '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 2:1–3:11
  - type: usfm
    marker: io1
    children:
    - type: text
      text: '4. Recommandations particulières et salutations '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 3:12-15
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Tite est d’origine inconnue. Selon Gal 2:3, il serait né païen et grec. Devenu chrétien, il ne fut pas contraint de se faire circoncire. Tite n’est pas nommé dans le livre des Actes des Apôtres. Ce que nous savons de lui se trouve uniquement dans les épîtres.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'L’objet de la lettre est donné en 1:5ss en ces termes: '
    - type: usfm
      marker: it
      children:
      - type: text
        text: «Je t’ai laissé en Crète afin que tu mettes en ordre ce qui reste à régler, et que, selon mes instructions, tu établisses des anciens dans chaque ville…»
    - type: text
      text: ' L’auteur lui précise ainsi sa mission. C’est donc pour cette raison fondamentale qu’il lui adresse des encouragements pour s’assurer que les choses se passent comme voulu.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: L’originalité du message de l’auteur apparaît précisément dans cette mission. Bien que Tite et Timothée soient appelés à exercer le même ministère, il incombe à Tite une tâche bien déterminée.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Même si le message de Tite reprend les sujets déjà traités dans 1 Timothée, on notera que les communautés tout comme les chrétiens sont différents. En effet dans la communauté crétoise il y a des incirconcis et des rebelles. L’auteur en avertit Tite: '
    - type: usfm
      marker: it
      children:
      - type: text
        text: '«L’un d’entre eux, leur propre prophète, a dit: Crétois toujours menteurs, méchantes bêtes, ventres paresseux… C’est pourquoi reprends-les sévèrement, afin qu’ils aient une foi saine…»'
    - type: text
      text: ' (Tite 1:12-13).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Tite est lui aussi un fils spirituel de l’auteur comme Timothée, cela depuis leur entrevue dont parle Gal 2:1. Cependant cette épître semble moins personnelle que celles à Timothée. Elle est toutefois ornée de quelques passages particulièrement riches et denses. Elle comporte une introduction théologique, un rappel de la mission d’installation d’anciens chargés de contrecarrer les contradictions, et un résumé des exhortations aux fidèles.
