document_id: MAT.1
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Généalogie de Jésus-Christ
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-17: cf. (1 Ch 2:3-15; 3.) Lu 3:23-38. (1 Ch 17:11-14. Ac 13:23.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Généalogie de Jésus-Christ, fils de '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 1:31
      metadata:
        usfm: LUK.1.31
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '32'
      metadata:
        usfm: LUK.1.32
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'David, fils d’Abraham. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 21:2
      metadata:
        usfm: GEN.21.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Abraham engendra Isaac; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 25:26
      metadata:
        usfm: GEN.25.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Isaac engendra Jacob; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 29:35
      metadata:
        usfm: GEN.29.35
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Jacob engendra Juda et ses frères; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 38:27
      metadata:
        usfm: GEN.38.27
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '29'
      metadata:
        usfm: GEN.38.29
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Juda engendra de Thamar Pharès et Zara; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ru 4:18
      metadata:
        usfm: RUT.4.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 2:5
      metadata:
        usfm: 1CH.2.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Pharès engendra Esrom; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ru 4:19
      metadata:
        usfm: RUT.4.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 2:9
      metadata:
        usfm: 1CH.2.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Esrom engendra Aram; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Aram engendra Aminadab; Aminadab engendra Naasson; Naasson engendra Salmon; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Salmon engendra Boaz de Rahab; Boaz engendra Obed de Ruth; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Obed engendra Isaï; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ru 4:22
      metadata:
        usfm: RUT.4.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 16:1
      metadata:
        usfm: 1SA.16.1
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 17:12
      metadata:
        usfm: 1SA.17.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 2:15
      metadata:
        usfm: 1CH.2.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 12:18
      metadata:
        usfm: 1CH.12.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Isaï engendra David. Le roi David engendra Salomon de la femme d’Urie; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 11:43
      metadata:
        usfm: 1CH.11.43
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 3:10
      metadata:
        usfm: 1CH.3.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Salomon engendra Roboam; Roboam engendra Abia; Abia engendra Asa; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Asa engendra Josaphat; Josaphat engendra Joram; Joram engendra Ozias; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ozias engendra Joatham; Joatham engendra Achaz; Achaz engendra Ézéchias; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ézéchias engendra Manassé; Manassé engendra Amon; Amon engendra Josias; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 3:16
      metadata:
        usfm: 1CH.3.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Josias engendra Jéchonias et ses frères, au temps de la déportation à Babylone. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Après la déportation à Babylone, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 2:17
      metadata:
        usfm: 1CH.2.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Jéchonias engendra Salathiel; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Esd 3:2
      metadata:
        usfm: EZR.3.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Salathiel engendra Zorobabel; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Zorobabel engendra Abiud; Abiud engendra Éliakim; Éliakim engendra Azor; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Azor engendra Sadok; Sadok engendra Achim; Achim engendra Éliud; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Éliud engendra Éléazar; Éléazar engendra Matthan; Matthan engendra Jacob; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Jacob engendra Joseph, l’époux de Marie, de laquelle est né Jésus, qui est appelé Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Il y a donc en tout quatorze générations depuis Abraham jusqu’à David, quatorze générations depuis David jusqu’à la déportation à Babylone, et quatorze générations depuis la déportation à Babylone jusqu’au Christ.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Naissance de Jésus-Christ
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 18-25: cf. Lu 2:1-21. És 7:14. Ga 4:4.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Voici de quelle manière arriva la naissance de Jésus-Christ. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 1:27
      metadata:
        usfm: LUK.1.27
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '34'
      metadata:
        usfm: LUK.1.34
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Marie, sa mère, ayant été fiancée à Joseph, se trouva enceinte, par la vertu du Saint-Esprit, avant qu’ils eussent habité ensemble. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Joseph, son époux, qui était un homme de bien et qui ne voulait pas la diffamer, se proposa de rompre secrètement avec elle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Comme il y pensait, voici, un ange du Seigneur lui apparut en songe, et dit: Joseph, fils de David, ne crains pas de prendre avec toi Marie, ta femme, car l’enfant qu’elle a conçu vient du Saint-Esprit; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'elle enfantera un fils, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 1:31
      metadata:
        usfm: LUK.1.31
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'tu lui donneras le nom de Jésus; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 4:12
      metadata:
        usfm: ACT.4.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'c’est lui qui sauvera son peuple de ses péchés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Tout cela arriva afin que s’accomplît ce que le Seigneur avait annoncé par le prophète:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 7:14
      metadata:
        usfm: ISA.7.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Voici, la vierge sera enceinte, elle enfantera un fils,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et on lui donnera le nom d’Emmanuel,
- type: usfm
  marker: m
  children:
  - type: text
    text: 'ce qui signifie Dieu avec nous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Joseph s’étant réveillé fit ce que l’ange du Seigneur lui avait ordonné, et il prit sa femme avec lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Mais il ne la connut point jusqu’à ce qu’elle eût enfanté un fils, auquel '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 2:21
      metadata:
        usfm: LUK.2.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: il donna le nom de Jésus.
