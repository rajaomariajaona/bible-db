document_id: MAT.1,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Généalogie de Jésus-Christ
  - type: heading
    content: 'V. 1-17: cf. (1 Ch 2:3-15; 3.) Lu 3:23-38. (1 Ch 17:11-14. Ac 13:23.)'
  - type: text
    content: 'Généalogie de Jésus-Christ, fils de '
  - type: note
    content: Lu 1:31, 32.
  - type: text
    content: 'David, fils d’Abraham. '
  '10':
  - type: text
    content: 'Ézéchias engendra Manassé; Manassé engendra Amon; Amon engendra Josias; '
  '11':
  - type: note
    content: 1 Ch 3:16.
  - type: text
    content: 'Josias engendra Jéchonias et ses frères, au temps de la déportation à Babylone. '
  '12':
  - type: text
    content: 'Après la déportation à Babylone, '
  - type: note
    content: 1 Ch 2:17.
  - type: text
    content: 'Jéchonias engendra Salathiel; '
  - type: note
    content: Esd 3:2.
  - type: text
    content: 'Salathiel engendra Zorobabel; '
  '13':
  - type: text
    content: 'Zorobabel engendra Abiud; Abiud engendra Éliakim; Éliakim engendra Azor; '
  '14':
  - type: text
    content: 'Azor engendra Sadok; Sadok engendra Achim; Achim engendra Éliud; '
  '15':
  - type: text
    content: 'Éliud engendra Éléazar; Éléazar engendra Matthan; Matthan engendra Jacob; '
  '16':
  - type: text
    content: 'Jacob engendra Joseph, l’époux de Marie, de laquelle est né Jésus, qui est appelé Christ. '
  '17':
  - type: text
    content: Il y a donc en tout quatorze générations depuis Abraham jusqu’à David, quatorze générations depuis David jusqu’à la déportation à Babylone, et quatorze générations depuis la déportation à Babylone jusqu’au Christ.
  - type: heading
    content: Naissance de Jésus-Christ
  - type: heading
    content: 'V. 18-25: cf. Lu 2:1-21. És 7:14. Ga 4:4.'
  '18':
  - type: text
    content: 'Voici de quelle manière arriva la naissance de Jésus-Christ. '
  - type: note
    content: Lu 1:27, 34.
  - type: text
    content: 'Marie, sa mère, ayant été fiancée à Joseph, se trouva enceinte, par la vertu du Saint-Esprit, avant qu’ils eussent habité ensemble. '
  '19':
  - type: text
    content: 'Joseph, son époux, qui était un homme de bien et qui ne voulait pas la diffamer, se proposa de rompre secrètement avec elle. '
  '2':
  - type: note
    content: Ge 21:2.
  - type: text
    content: 'Abraham engendra Isaac; '
  - type: note
    content: Ge 25:26.
  - type: text
    content: 'Isaac engendra Jacob; '
  - type: note
    content: Ge 29:35.
  - type: text
    content: 'Jacob engendra Juda et ses frères; '
  '20':
  - type: text
    content: 'Comme il y pensait, voici, un ange du Seigneur lui apparut en songe, et dit: Joseph, fils de David, ne crains pas de prendre avec toi Marie, ta femme, car l’enfant qu’elle a conçu vient du Saint-Esprit; '
  '21':
  - type: text
    content: 'elle enfantera un fils, et '
  - type: note
    content: Lu 1:31.
  - type: text
    content: 'tu lui donneras le nom de Jésus; '
  - type: note
    content: Ac 4:12.
  - type: text
    content: 'c’est lui qui sauvera son peuple de ses péchés. '
  '22':
  - type: text
    content: 'Tout cela arriva afin que s’accomplît ce que le Seigneur avait annoncé par le prophète:'
  '23':
  - type: text
    content: ' '
  - type: note
    content: És 7:14.
  - type: text
    content: Voici, la vierge sera enceinte, elle enfantera un fils,
  - type: text
    content: Et on lui donnera le nom d’Emmanuel,
  - type: text
    content: 'ce qui signifie Dieu avec nous. '
  '24':
  - type: text
    content: 'Joseph s’étant réveillé fit ce que l’ange du Seigneur lui avait ordonné, et il prit sa femme avec lui. '
  '25':
  - type: text
    content: 'Mais il ne la connut point jusqu’à ce qu’elle eût enfanté un fils, auquel '
  - type: note
    content: Lu 2:21.
  - type: text
    content: il donna le nom de Jésus.
  '3':
  - type: note
    content: Ge 38:27, 29.
  - type: text
    content: 'Juda engendra de Thamar Pharès et Zara; '
  - type: note
    content: Ru 4:18. 1 Ch 2:5.
  - type: text
    content: 'Pharès engendra Esrom; '
  - type: note
    content: Ru 4:19. 1 Ch 2:9.
  - type: text
    content: 'Esrom engendra Aram; '
  '4':
  - type: text
    content: 'Aram engendra Aminadab; Aminadab engendra Naasson; Naasson engendra Salmon; '
  '5':
  - type: text
    content: 'Salmon engendra Boaz de Rahab; Boaz engendra Obed de Ruth; '
  '6':
  - type: text
    content: 'Obed engendra Isaï; '
  - type: note
    content: Ru 4:22. 1 S 16:1; 17:12. 1 Ch 2:15; 12:18.
  - type: text
    content: 'Isaï engendra David. Le roi David engendra Salomon de la femme d’Urie; '
  '7':
  - type: note
    content: 1 Ch 11:43. 1 Ch 3:10.
  - type: text
    content: 'Salomon engendra Roboam; Roboam engendra Abia; Abia engendra Asa; '
  '8':
  - type: text
    content: 'Asa engendra Josaphat; Josaphat engendra Joram; Joram engendra Ozias; '
  '9':
  - type: text
    content: 'Ozias engendra Joatham; Joatham engendra Achaz; Achaz engendra Ézéchias; '
