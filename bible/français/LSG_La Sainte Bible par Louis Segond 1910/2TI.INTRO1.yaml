document_id: 2TI.INTRO1,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: INTRODUCTION À LA DEUXIÈME ÉPÎTRE À TIMOTHÉE
  - type: usfm
    marker: imt3
    children:
    - type: text
      text: (Ac 20:24, 28-30.) (Ro 8:35-39.)
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'La seconde épître de Paul à Timothée ressemble dans ses grandes lignes à la première. Le lecteur devra donc se référer à l’introduction de 1 Timothée pour un complément d’informations. Voici la structure de l’épître qui nous intéresse:'
  - type: usfm
    marker: io1
    children:
    - type: text
      text: '1. Adresse et salutations '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 1:1-2
  - type: usfm
    marker: io1
    children:
    - type: text
      text: '2. Affection de Paul pour Timothée et encouragement à tenir ferme '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 1:3–2:13
  - type: usfm
    marker: io1
    children:
    - type: text
      text: '3. Conduite envers ceux qui s’écartent de la saine doctrine et de la pureté chrétienne '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 2:14–4:5
  - type: usfm
    marker: io1
    children:
    - type: text
      text: '4. Paul à la perspective de sa mort et communications sur diverses personnes '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 4:6-18
  - type: usfm
    marker: io1
    children:
    - type: text
      text: '5. Salutation et doxologie finales '
    - type: usfm
      marker: ior
      children:
      - type: text
        text: 4:19-22
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'L’auteur dit: '
    - type: usfm
      marker: it
      children:
      - type: text
        text: '«Que le Seigneur répande sa miséricorde sur la maison d’Onésiphore, car il m’a souvent consolé, et il n’a pas eu honte de mes chaînes; au contraire lorsqu’il est venu à Rome, il m’a cherché avec beaucoup d’empressement, et il m’a trouvé» '
    - type: text
      text: '(1:16-17). Cela laisse supposer que la lettre a été écrite de Rome où l’apôtre Paul, à la fin de sa carrière apostolique et missionnaire, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: «demeura deux ans entiers dans une maison qu’il avait louée. Il recevait tous ceux qui venaient le voir…»
    - type: text
      text: ' (Act 28:30).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: S’agissant de la teneur de l’épître, Paul se considère comme en fin de carrière et partage ses expériences avec son disciple appelé à continuer la mission pastorale et apostolique.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'La deuxième épître à Timothée, comme les autres pastorales, traite des problèmes de communauté liés à la charge pastorale de leur destinataire. Elle s’en distingue toutefois en ce qu’elle insiste sur les rapports qui doivent exister entre le pasteur et celui qui l’a formé pour ce ministère. Il en découle des exhortations très utiles concernant les difficultés à venir du pasteur, surtout en rapport avec les derniers jours: '
    - type: usfm
      marker: it
      children:
      - type: text
        text: «Efforce-toi de te présenter devant Dieu comme un homme éprouvé, un ouvrier qui n’a point à rougir, qui dispense droitement la parole de la vérité…» (2 Tim 2:15)
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Cette épître, comme les autres pastorales, illustre l’accès de la pensée de Paul à l’histoire, surtout si on estime qu’avec ses apparentées, elles sont l’œuvre de l’un de ses disciples ou d’un secrétaire auquel il aurait laissé une grande liberté pour la mise en forme définitive du texte. 2 Tim 4:11-13 fait penser à Luc qui est resté seul avec lui pendant un temps, alors que 1:3–2:13 a l’allure d’un testament.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Cette seconde épître à Timothée met l’accent, plus que la première, sur les relations personnelles qui existaient entre l’apôtre et son disciple. Les exhortations sur la conduite à tenir face aux imposteurs des derniers temps et celles, pressantes, à continuer l’œuvre de prédicateur de la Bonne Nouvelle en sont une nette confirmation.
