type_code: fra
verses:
  '1':
  - type: text
    content: INTRODUCTION À LA DEUXIÈME ÉPÎTRE À TIMOTHÉE
  - type: text
    content: (Ac 20:24, 28-30.) (Ro 8:35-39.)
  - type: text
    content: 'La seconde épître de Paul à Timothée ressemble dans ses grandes lignes à la première. Le lecteur devra donc se référer à l’introduction de 1 Timothée pour un complément d’informations. Voici la structure de l’épître qui nous intéresse:'
  - type: text
    content: '1. Adresse et salutations '
  - type: text
    content: 1:1-2
  - type: text
    content: '2. Affection de Paul pour Timothée et encouragement à tenir ferme '
  - type: text
    content: 1:3–2:13
  - type: text
    content: '3. Conduite envers ceux qui s’écartent de la saine doctrine et de la pureté chrétienne '
  - type: text
    content: 2:14–4:5
  - type: text
    content: '4. Paul à la perspective de sa mort et communications sur diverses personnes '
  - type: text
    content: 4:6-18
  - type: text
    content: '5. Salutation et doxologie finales '
  - type: text
    content: 4:19-22
  - type: text
    content: 'L’auteur dit: '
  - type: text
    content: '«Que le Seigneur répande sa miséricorde sur la maison d’Onésiphore, car il m’a souvent consolé, et il n’a pas eu honte de mes chaînes; au contraire lorsqu’il est venu à Rome, il m’a cherché avec beaucoup d’empressement, et il m’a trouvé» '
  - type: text
    content: '(1:16-17). Cela laisse supposer que la lettre a été écrite de Rome où l’apôtre Paul, à la fin de sa carrière apostolique et missionnaire, '
  - type: text
    content: «demeura deux ans entiers dans une maison qu’il avait louée. Il recevait tous ceux qui venaient le voir…»
  - type: text
    content: ' (Act 28:30).'
  - type: text
    content: S’agissant de la teneur de l’épître, Paul se considère comme en fin de carrière et partage ses expériences avec son disciple appelé à continuer la mission pastorale et apostolique.
  - type: text
    content: 'La deuxième épître à Timothée, comme les autres pastorales, traite des problèmes de communauté liés à la charge pastorale de leur destinataire. Elle s’en distingue toutefois en ce qu’elle insiste sur les rapports qui doivent exister entre le pasteur et celui qui l’a formé pour ce ministère. Il en découle des exhortations très utiles concernant les difficultés à venir du pasteur, surtout en rapport avec les derniers jours: '
  - type: text
    content: «Efforce-toi de te présenter devant Dieu comme un homme éprouvé, un ouvrier qui n’a point à rougir, qui dispense droitement la parole de la vérité…» (2 Tim 2:15)
  - type: text
    content: Cette épître, comme les autres pastorales, illustre l’accès de la pensée de Paul à l’histoire, surtout si on estime qu’avec ses apparentées, elles sont l’œuvre de l’un de ses disciples ou d’un secrétaire auquel il aurait laissé une grande liberté pour la mise en forme définitive du texte. 2 Tim 4:11-13 fait penser à Luc qui est resté seul avec lui pendant un temps, alors que 1:3–2:13 a l’allure d’un testament.
  - type: text
    content: Cette seconde épître à Timothée met l’accent, plus que la première, sur les relations personnelles qui existaient entre l’apôtre et son disciple. Les exhortations sur la conduite à tenir face aux imposteurs des derniers temps et celles, pressantes, à continuer l’œuvre de prédicateur de la Bonne Nouvelle en sont une nette confirmation.
