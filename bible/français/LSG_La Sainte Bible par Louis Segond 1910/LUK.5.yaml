document_id: LUK.5,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Pêche miraculeuse. Vocation de trois disciples
  - type: heading
    content: 'V. 1-11: cf. (Mt 4:18-22. Mc 1:16-20.) Jn 21:1-11.'
  - type: text
    content: ' '
  - type: note
    content: Mt 13:2. Mc 4:1.
  - type: text
    content: 'Comme Jésus se trouvait auprès du lac de Génésareth, et que la foule se pressait autour de lui pour entendre la parole de Dieu, '
  '10':
  - type: text
    content: 'Il en était de même de Jacques et de Jean, fils de Zébédée, les associés de Simon. Alors Jésus dit à Simon: '
  - type: text
    content: Ne crains point;
  - type: text
    content: ' '
  - type: note
    content: Jé 16:16. Éz 47:9. Mt 4:19. Mc 1:17.
  - type: text
    content: désormais tu seras pêcheur d’hommes.
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'Et, ayant ramené les barques à terre, '
  - type: note
    content: Mt 4:20; 19:27. Mc 10:28. Lu 18:28.
  - type: text
    content: ils laissèrent tout, et le suivirent.
  - type: heading
    content: Guérison d’un lépreux et d’un paralytique
  - type: heading
    content: 'V. 12-16: cf. (Mt 8:2-4. Mc 1:40-45.) Lu 17:12-19. Ps 51:12.'
  '12':
  - type: text
    content: ' '
  - type: note
    content: Mt 8:2. Mc 1:40.
  - type: text
    content: 'Jésus était dans une des villes; et voici, un homme couvert de lèpre, l’ayant vu, tomba sur sa face, et lui fit cette prière: Seigneur, si tu le veux, tu peux me rendre pur. '
  '13':
  - type: text
    content: 'Jésus étendit la main, le toucha, et dit: '
  - type: text
    content: Je le veux, sois pur.
  - type: text
    content: ' Aussitôt la lèpre le quitta. '
  '14':
  - type: text
    content: 'Puis il lui ordonna de n’en parler à personne. Mais, dit-il, '
  - type: text
    content: va te montrer au sacrificateur, et offre pour ta purification
  - type: text
    content: ' '
  - type: note
    content: Lé 13:2; 14:2. Mt 8:4.
  - type: text
    content: ce que Moïse a prescrit, afin que cela leur serve de témoignage.
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'Sa renommée se répandait de plus en plus, et les gens venaient en foule pour l’entendre et pour être guéris de leurs maladies. '
  '16':
  - type: text
    content: Et lui, il se retirait dans les déserts, et priait.
  - type: heading
    content: 'V. 17-26: cf. (Mt 9:1-8. Mc 2:1-12.) Ps 103:3.'
  '17':
  - type: text
    content: 'Un jour Jésus enseignait. Des pharisiens et des docteurs de la loi étaient là assis, venus de tous les villages de la Galilée, de la Judée et de Jérusalem; et la puissance du Seigneur se manifestait par des guérisons. '
  '18':
  - type: note
    content: Mt 9:1. Mc 2:3. Ac 9:33.
  - type: text
    content: 'Et voici, des gens, portant sur un lit un homme qui était paralytique, cherchaient à le faire entrer et à le placer sous ses regards. '
  '19':
  - type: text
    content: 'Comme ils ne savaient par où l’introduire, à cause de la foule, ils montèrent sur le toit, et ils le descendirent par une ouverture, avec son lit, au milieu de l’assemblée, devant Jésus. '
  '2':
  - type: text
    content: 'il vit au bord du lac deux barques, d’où les pêcheurs étaient descendus pour laver leurs filets. '
  '20':
  - type: text
    content: 'Voyant leur foi, Jésus dit: '
  - type: text
    content: Homme, tes péchés te sont pardonnés.
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'Les scribes et les pharisiens se mirent à raisonner et à dire: Qui est celui-ci, qui profère des blasphèmes? '
  - type: note
    content: Ps 32:5. És 43:25.
  - type: text
    content: 'Qui peut pardonner les péchés, si ce n’est Dieu seul? '
  '22':
  - type: text
    content: 'Jésus, connaissant leurs pensées, prit la parole et leur dit: '
  - type: text
    content: Quelles pensées avez-vous dans vos cœurs?
  '23':
  - type: text
    content: ' '
  - type: text
    content: 'Lequel est le plus aisé, de dire: Tes péchés te sont pardonnés, ou de dire: Lève-toi, et marche?'
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'Or, afin que vous sachiez que le Fils de l’homme a sur la terre le pouvoir de pardonner les péchés: Je te l’ordonne,'
  - type: text
    content: ' dit-il au paralytique, '
  - type: text
    content: lève-toi, prends ton lit, et va dans ta maison.
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'Et, à l’instant, il se leva en leur présence, prit le lit sur lequel il était couché, et s’en alla dans sa maison, glorifiant Dieu. '
  '26':
  - type: text
    content: 'Tous étaient dans l’étonnement, et glorifiaient Dieu; remplis de crainte, ils disaient: Nous avons vu aujourd’hui des choses étranges.'
  - type: heading
    content: Vocation de Lévi (Matthieu)
  - type: heading
    content: 'V. 27-32: cf. (Mt 9:9-13. Mc 2:13-17.)'
  '27':
  - type: text
    content: ' '
  - type: note
    content: Mt 9:9. Mc 2:14, 15.
  - type: text
    content: 'Après cela, Jésus sortit, et il vit un publicain, nommé Lévi, assis au lieu des péages. Il lui dit: '
  - type: text
    content: Suis-moi.
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'Et, laissant tout, il se leva, et le suivit. '
  '29':
  - type: text
    content: 'Lévi lui donna un grand festin dans sa maison, '
  - type: note
    content: Mt 9:10. Mc 2:15. Lu 15:1.
  - type: text
    content: 'et beaucoup de publicains et d’autres personnes étaient à table avec eux. '
  '3':
  - type: text
    content: 'Il monta dans l’une de ces barques, qui était à Simon, et il le pria de s’éloigner un peu de terre. Puis il s’assit, et de la barque il enseignait la foule. '
  '30':
  - type: text
    content: 'Les pharisiens et les scribes murmurèrent, et dirent à ses disciples: Pourquoi mangez-vous et buvez-vous avec les publicains et les gens de mauvaise vie? '
  '31':
  - type: text
    content: 'Jésus, prenant la parole, leur dit: '
  - type: text
    content: Ce ne sont pas ceux qui se portent bien qui ont besoin de médecin, mais les malades.
  '32':
  - type: text
    content: ' '
  - type: note
    content: Mt 9:13. Lu 19:10. 1 Ti 1:15.
  - type: text
    content: Je ne suis pas venu appeler à la repentance des justes, mais des pécheurs.
  - type: heading
    content: Question sur le jeûne
  - type: heading
    content: 'V. 33-39: cf. (Mt 9:14-17. Mc 2:18-22.)'
  '33':
  - type: text
    content: ' '
  - type: note
    content: Mt 9:14.
  - type: text
    content: 'Ils lui dirent: Les disciples de Jean, comme ceux des pharisiens, jeûnent fréquemment et font des prières, tandis que les tiens mangent et boivent. '
  '34':
  - type: text
    content: 'Il leur répondit: '
  - type: note
    content: És 62:5. 2 Co 11:2.
  - type: text
    content: Pouvez-vous faire jeûner les amis de l’époux pendant que l’époux est avec eux?
  '35':
  - type: text
    content: ' '
  - type: text
    content: Les jours viendront où l’époux leur sera enlevé, alors ils jeûneront en ces jours-là.
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'Il leur dit aussi une parabole: '
  - type: text
    content: Personne ne déchire d’un habit neuf un morceau pour le mettre à un vieil habit; car, il déchire l’habit neuf, et le morceau qu’il en a pris n’est pas assorti au vieux.
  '37':
  - type: text
    content: ' '
  - type: text
    content: Et personne ne met
  - type: text
    content: ' '
  - type: note
    content: Mt 9:17. Mc 2:22.
  - type: text
    content: du vin nouveau dans de vieilles outres; autrement, le vin nouveau fait rompre les outres, il se répand, et les outres sont perdues;
  - type: text
    content: ' '
  '38':
  - type: text
    content: mais il faut mettre le vin nouveau dans des outres neuves.
  - type: text
    content: ' '
  '39':
  - type: text
    content: 'Et personne, après avoir bu du vin vieux, ne veut du nouveau, car il dit: Le vieux est bon.'
  '4':
  - type: text
    content: 'Lorsqu’il eut cessé de parler, il dit à Simon: '
  - type: note
    content: Jn 21:6.
  - type: text
    content: Avance en pleine eau, et jetez vos filets pour pêcher.
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'Simon lui répondit: Maître, nous avons travaillé toute la nuit sans rien prendre; mais, sur ta parole, je jetterai le filet. '
  '6':
  - type: text
    content: 'L’ayant jeté, ils prirent une grande quantité de poissons, et leur filet se rompait. '
  '7':
  - type: text
    content: 'Ils firent signe à leurs compagnons qui étaient dans l’autre barque de venir les aider. Ils vinrent et ils remplirent les deux barques, au point qu’elles enfonçaient. '
  '8':
  - type: text
    content: 'Quand il vit cela, Simon Pierre tomba aux genoux de Jésus, et dit: Seigneur, retire-toi de moi, parce que je suis un homme pécheur. '
  '9':
  - type: text
    content: 'Car l’épouvante l’avait saisi, lui et tous ceux qui étaient avec lui, à cause de la pêche qu’ils avaient faite. '
