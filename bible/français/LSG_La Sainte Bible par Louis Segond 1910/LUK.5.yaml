document_id: LUK.5
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Pêche miraculeuse. Vocation de trois disciples
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-11: cf. (Mt 4:18-22. Mc 1:16-20.) Jn 21:1-11.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 13:2
      metadata:
        usfm: MAT.13.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 4:1
      metadata:
        usfm: MRK.4.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Comme Jésus se trouvait auprès du lac de Génésareth, et que la foule se pressait autour de lui pour entendre la parole de Dieu, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'il vit au bord du lac deux barques, d’où les pêcheurs étaient descendus pour laver leurs filets. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il monta dans l’une de ces barques, qui était à Simon, et il le pria de s’éloigner un peu de terre. Puis il s’assit, et de la barque il enseignait la foule. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Lorsqu’il eut cessé de parler, il dit à Simon: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 21:6
      metadata:
        usfm: JHN.21.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Avance en pleine eau, et jetez vos filets pour pêcher.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Simon lui répondit: Maître, nous avons travaillé toute la nuit sans rien prendre; mais, sur ta parole, je jetterai le filet. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'L’ayant jeté, ils prirent une grande quantité de poissons, et leur filet se rompait. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ils firent signe à leurs compagnons qui étaient dans l’autre barque de venir les aider. Ils vinrent et ils remplirent les deux barques, au point qu’elles enfonçaient. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Quand il vit cela, Simon Pierre tomba aux genoux de Jésus, et dit: Seigneur, retire-toi de moi, parce que je suis un homme pécheur. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Car l’épouvante l’avait saisi, lui et tous ceux qui étaient avec lui, à cause de la pêche qu’ils avaient faite. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il en était de même de Jacques et de Jean, fils de Zébédée, les associés de Simon. Alors Jésus dit à Simon: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ne crains point;
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 16:16
      metadata:
        usfm: JER.16.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 47:9
      metadata:
        usfm: EZK.47.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 4:19
      metadata:
        usfm: MAT.4.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 1:17
      metadata:
        usfm: MRK.1.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: désormais tu seras pêcheur d’hommes.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Et, ayant ramené les barques à terre, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 4:20
      metadata:
        usfm: MAT.4.20
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 19:27
      metadata:
        usfm: MAT.19.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 10:28
      metadata:
        usfm: MRK.10.28
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 18:28
      metadata:
        usfm: LUK.18.28
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: ils laissèrent tout, et le suivirent.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Guérison d’un lépreux et d’un paralytique
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 12-16: cf. (Mt 8:2-4. Mc 1:40-45.) Lu 17:12-19. Ps 51:12.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 8:2
      metadata:
        usfm: MAT.8.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 1:40
      metadata:
        usfm: MRK.1.40
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Jésus était dans une des villes; et voici, un homme couvert de lèpre, l’ayant vu, tomba sur sa face, et lui fit cette prière: Seigneur, si tu le veux, tu peux me rendre pur. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Jésus étendit la main, le toucha, et dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je le veux, sois pur.
  - type: text
    text: ' Aussitôt la lèpre le quitta. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Puis il lui ordonna de n’en parler à personne. Mais, dit-il, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: va te montrer au sacrificateur, et offre pour ta purification
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 13:2
      metadata:
        usfm: LEV.13.2
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 14:2
      metadata:
        usfm: LEV.14.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 8:4
      metadata:
        usfm: MAT.8.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ce que Moïse a prescrit, afin que cela leur serve de témoignage.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Sa renommée se répandait de plus en plus, et les gens venaient en foule pour l’entendre et pour être guéris de leurs maladies. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Et lui, il se retirait dans les déserts, et priait.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 17-26: cf. (Mt 9:1-8. Mc 2:1-12.) Ps 103:3.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Un jour Jésus enseignait. Des pharisiens et des docteurs de la loi étaient là assis, venus de tous les villages de la Galilée, de la Judée et de Jérusalem; et la puissance du Seigneur se manifestait par des guérisons. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 9:1
      metadata:
        usfm: MAT.9.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 2:3
      metadata:
        usfm: MRK.2.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 9:33
      metadata:
        usfm: ACT.9.33
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Et voici, des gens, portant sur un lit un homme qui était paralytique, cherchaient à le faire entrer et à le placer sous ses regards. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Comme ils ne savaient par où l’introduire, à cause de la foule, ils montèrent sur le toit, et ils le descendirent par une ouverture, avec son lit, au milieu de l’assemblée, devant Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Voyant leur foi, Jésus dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Homme, tes péchés te sont pardonnés.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Les scribes et les pharisiens se mirent à raisonner et à dire: Qui est celui-ci, qui profère des blasphèmes? '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 32:5
      metadata:
        usfm: PSA.32.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 43:25
      metadata:
        usfm: ISA.43.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Qui peut pardonner les péchés, si ce n’est Dieu seul? '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Jésus, connaissant leurs pensées, prit la parole et leur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Quelles pensées avez-vous dans vos cœurs?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Lequel est le plus aisé, de dire: Tes péchés te sont pardonnés, ou de dire: Lève-toi, et marche?'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Or, afin que vous sachiez que le Fils de l’homme a sur la terre le pouvoir de pardonner les péchés: Je te l’ordonne,'
  - type: text
    text: ' dit-il au paralytique, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: lève-toi, prends ton lit, et va dans ta maison.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Et, à l’instant, il se leva en leur présence, prit le lit sur lequel il était couché, et s’en alla dans sa maison, glorifiant Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Tous étaient dans l’étonnement, et glorifiaient Dieu; remplis de crainte, ils disaient: Nous avons vu aujourd’hui des choses étranges.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vocation de Lévi (Matthieu)
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 27-32: cf. (Mt 9:9-13. Mc 2:13-17.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 9:9
      metadata:
        usfm: MAT.9.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 2:14
      metadata:
        usfm: MRK.2.14
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '15'
      metadata:
        usfm: MRK.2.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Après cela, Jésus sortit, et il vit un publicain, nommé Lévi, assis au lieu des péages. Il lui dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Suis-moi.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Et, laissant tout, il se leva, et le suivit. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Lévi lui donna un grand festin dans sa maison, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 9:10
      metadata:
        usfm: MAT.9.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 2:15
      metadata:
        usfm: MRK.2.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 15:1
      metadata:
        usfm: LUK.15.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'et beaucoup de publicains et d’autres personnes étaient à table avec eux. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Les pharisiens et les scribes murmurèrent, et dirent à ses disciples: Pourquoi mangez-vous et buvez-vous avec les publicains et les gens de mauvaise vie? '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Jésus, prenant la parole, leur dit: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ce ne sont pas ceux qui se portent bien qui ont besoin de médecin, mais les malades.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 9:13
      metadata:
        usfm: MAT.9.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 19:10
      metadata:
        usfm: LUK.19.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 1:15
      metadata:
        usfm: 1TI.1.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Je ne suis pas venu appeler à la repentance des justes, mais des pécheurs.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Question sur le jeûne
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 33-39: cf. (Mt 9:14-17. Mc 2:18-22.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 9:14
      metadata:
        usfm: MAT.9.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ils lui dirent: Les disciples de Jean, comme ceux des pharisiens, jeûnent fréquemment et font des prières, tandis que les tiens mangent et boivent. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Il leur répondit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 62:5
      metadata:
        usfm: ISA.62.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 11:2
      metadata:
        usfm: 2CO.11.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Pouvez-vous faire jeûner les amis de l’époux pendant que l’époux est avec eux?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Les jours viendront où l’époux leur sera enlevé, alors ils jeûneront en ces jours-là.
