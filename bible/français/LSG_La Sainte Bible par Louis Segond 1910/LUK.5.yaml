  - type: text
    text: 'Il leur dit aussi une parabole: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Personne ne déchire d’un habit neuf un morceau pour le mettre à un vieil habit; car, il déchire l’habit neuf, et le morceau qu’il en a pris n’est pas assorti au vieux.
