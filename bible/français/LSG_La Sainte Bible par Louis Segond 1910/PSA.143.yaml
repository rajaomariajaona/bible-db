document_id: PSA.143,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 2 S 15:25-31. Ps 142; 25.
  - type: text
    content: Psaume de David.
  - type: text
    content: Éternel, écoute ma prière, prête l’oreille à mes supplications!
  - type: text
    content: Exauce-moi dans ta fidélité, dans ta justice!
  '10':
  - type: text
    content: Enseigne-moi à faire ta volonté!
  - type: text
    content: Car tu es mon Dieu.
  - type: text
    content: Que ton bon esprit me conduise sur la voie droite!
  '11':
  - type: text
    content: A cause de ton nom, Éternel, rends-moi la vie!
  - type: text
    content: Dans ta justice, retire mon âme de la détresse!
  '12':
  - type: text
    content: Dans ta bonté, anéantis mes ennemis,
  - type: text
    content: Et fais périr tous les oppresseurs de mon âme!
  - type: note
    content: Ps 86:16; 116:16.
  - type: text
    content: Car je suis ton serviteur.
  '2':
  - type: text
    content: N’entre pas en jugement avec ton serviteur!
  - type: note
    content: Ro 3:4. Ga 3:4.
  - type: text
    content: Car aucun vivant n’est juste devant toi.
  '3':
  - type: text
    content: L’ennemi poursuit mon âme,
  - type: text
    content: Il foule à terre ma vie;
  - type: text
    content: Il me fait habiter dans les ténèbres,
  - type: text
    content: Comme ceux qui sont morts depuis longtemps.
  '4':
  - type: text
    content: Mon esprit est abattu au-dedans de moi,
  - type: text
    content: Mon cœur est troublé dans mon sein.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Ps 77:6, 11.
  - type: text
    content: Je me souviens des jours d’autrefois,
  - type: text
    content: Je médite sur toutes tes œuvres,
  - type: text
    content: Je réfléchis sur l’ouvrage de tes mains.
  '6':
  - type: text
    content: J’étends mes mains vers toi;
  - type: text
    content: 'Mon âme soupire après toi, comme une terre desséchée. '
  - type: text
    content: — Pause.
  '7':
  - type: text
    content: Hâte-toi de m’exaucer, ô Éternel!
  - type: text
    content: Mon esprit se consume.
  - type: text
    content: Ne me cache pas ta face!
  - type: text
    content: Je serais semblable à ceux qui descendent dans la fosse.
  '8':
  - type: text
    content: Fais-moi dès le matin entendre ta bonté!
  - type: text
    content: Car je me confie en toi.
  - type: text
    content: Fais-moi connaître le chemin où je dois marcher!
  - type: note
    content: Ps 25:1.
  - type: text
    content: Car j’élève à toi mon âme.
  '9':
  - type: text
    content: Délivre-moi de mes ennemis, ô Éternel!
  - type: text
    content: Auprès de toi je cherche un refuge.
