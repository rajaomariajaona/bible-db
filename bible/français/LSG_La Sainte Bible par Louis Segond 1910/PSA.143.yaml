document_id: PSA.143
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 2 S 15:25-31. Ps 142; 25.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Psaume de David.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Éternel, écoute ma prière, prête l’oreille à mes supplications!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Exauce-moi dans ta fidélité, dans ta justice!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: N’entre pas en jugement avec ton serviteur!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 3:4
      metadata:
        usfm: ROM.3.4
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 3:4
      metadata:
        usfm: GAL.3.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Car aucun vivant n’est juste devant toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: L’ennemi poursuit mon âme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il foule à terre ma vie;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il me fait habiter dans les ténèbres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme ceux qui sont morts depuis longtemps.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mon esprit est abattu au-dedans de moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon cœur est troublé dans mon sein.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 77:6
      metadata:
        usfm: PSA.77.6
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '11'
      metadata:
        usfm: PSA.77.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Je me souviens des jours d’autrefois,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je médite sur toutes tes œuvres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je réfléchis sur l’ouvrage de tes mains.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: J’étends mes mains vers toi;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Mon âme soupire après toi, comme une terre desséchée. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: — Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Hâte-toi de m’exaucer, ô Éternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon esprit se consume.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne me cache pas ta face!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je serais semblable à ceux qui descendent dans la fosse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fais-moi dès le matin entendre ta bonté!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car je me confie en toi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fais-moi connaître le chemin où je dois marcher!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 25:1
      metadata:
        usfm: PSA.25.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Car j’élève à toi mon âme.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Délivre-moi de mes ennemis, ô Éternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Auprès de toi je cherche un refuge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Enseigne-moi à faire ta volonté!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car tu es mon Dieu.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que ton bon esprit me conduise sur la voie droite!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: A cause de ton nom, Éternel, rends-moi la vie!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans ta justice, retire mon âme de la détresse!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Dans ta bonté, anéantis mes ennemis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et fais périr tous les oppresseurs de mon âme!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 86:16
      metadata:
        usfm: PSA.86.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 116:16
      metadata:
        usfm: PSA.116.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Car je suis ton serviteur.
