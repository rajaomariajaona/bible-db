document_id: EXO.15,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Cantique
  - type: heading
    content: 'V. 1-21: cf. Ap 15:2-4. (Jg 5. 2 S 22.)'
  - type: text
    content: 'Alors Moïse et les enfants d’Israël chantèrent ce cantique à l’Éternel. Ils dirent:'
  - type: note
    content: Ps 106:12.
  - type: text
    content: Je chanterai à l’Éternel, car il a fait éclater sa gloire;
  - type: text
    content: Il a précipité dans la mer le cheval et son cavalier.
  '10':
  - type: text
    content: ' '
  - type: note
    content: Ps 74:13; 106:11.
  - type: text
    content: 'Tu as soufflé de ton haleine:'
  - type: text
    content: La mer les a couverts;
  - type: text
    content: Ils se sont enfoncés comme du plomb,
  - type: text
    content: Dans la profondeur des eaux.
  '11':
  - type: text
    content: Qui est comme toi parmi les dieux, ô Éternel?
  - type: text
    content: Qui est comme toi magnifique en sainteté,
  - type: text
    content: Digne de louanges,
  - type: text
    content: Opérant des prodiges?
  '12':
  - type: text
    content: 'Tu as étendu ta droite:'
  - type: text
    content: La terre les a engloutis.
  '13':
  - type: text
    content: 'Par ta miséricorde tu as conduit, Tu as délivré ce peuple; '
  - type: note
    content: Ps 77:21.
  - type: text
    content: Par ta puissance tu le diriges Vers la demeure de ta sainteté.
  '14':
  - type: text
    content: 'Les peuples l’apprennent, et ils tremblent:'
  - type: text
    content: La terreur s’empare des Philistins;
  '15':
  - type: text
    content: ' '
  - type: note
    content: De 2:4.
  - type: text
    content: Les chefs d’Édom s’épouvantent;
  - type: text
    content: Un tremblement saisit les guerriers de Moab;
  - type: text
    content: Tous les habitants de Canaan tombent en défaillance.
  '16':
  - type: text
    content: ' '
  - type: note
    content: De 2:25; 11:25. Jos 2:9.
  - type: text
    content: La crainte et la frayeur les surprendront;
  - type: text
    content: Par la grandeur de ton bras
  - type: text
    content: Ils deviendront muets comme une pierre,
  - type: text
    content: Jusqu’à ce que ton peuple soit passé, ô Éternel!
  - type: text
    content: Jusqu’à ce qu’il soit passé,
  - type: text
    content: Le peuple que tu as acquis.
  '17':
  - type: text
    content: Tu les amèneras et tu les établiras sur la montagne de ton héritage,
  - type: text
    content: Au lieu que tu as préparé pour ta demeure, ô Éternel!
  - type: text
    content: Au sanctuaire, Seigneur! Que tes mains ont fondé.
  '18':
  - type: text
    content: L’Éternel régnera éternellement et à toujours.
  '19':
  - type: text
    content: Car les chevaux de Pharaon, ses chars et ses cavaliers sont entrés dans la mer,
  - type: text
    content: Et l’Éternel a ramené sur eux les eaux de la mer;
  - type: text
    content: Mais les enfants d’Israël ont marché à sec au milieu de la mer.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Ps 18:2; 118:14. És 12:2.
  - type: text
    content: L’Éternel est ma force et le sujet de mes louanges;
  - type: text
    content: C’est lui qui m’a sauvé.
  - type: text
    content: 'Il est mon Dieu: je le célèbrerai;'
  - type: text
    content: 'Il est le Dieu de mon père: je l’exalterai.'
  '20':
  - type: text
    content: 'Marie, la prophétesse, sœur d’Aaron, '
  - type: note
    content: 1 S 18:6.
  - type: text
    content: 'prit à sa main un tambourin, et toutes les femmes vinrent après elle, avec des tambourins et en dansant. '
  '21':
  - type: text
    content: 'Marie répondait aux enfants d’Israël:'
  - type: text
    content: Chantez à l’Éternel, car il a fait éclater sa gloire;
  - type: text
    content: Il a précipité dans la mer le cheval et son cavalier.
  - type: heading
    content: LE PEUPLE D’ISRAËL DANS LE DÉSERT
  - type: heading
    content: Ch. 15:22 à 40. (Né 9:13-20. Ps 136:16.)
  - type: heading
    content: Les eaux de Mara
  - type: heading
    content: 'V. 22-27: cf. No 33:8, 9. Ex 17:1-7.'
  '22':
  - type: text
    content: 'Moïse fit partir Israël de la mer Rouge. Ils prirent la direction du désert de Schur; et, après trois journées de marche dans le désert, ils ne trouvèrent point d’eau. '
  '23':
  - type: note
    content: No 33:8.
  - type: text
    content: 'Ils arrivèrent à Mara; mais ils ne purent pas boire l’eau de Mara parce qu’elle était amère. C’est pourquoi ce lieu fut appelé Mara. '
  '24':
  - type: text
    content: 'Le peuple murmura contre Moïse, en disant: Que boirons-nous? '
  '25':
  - type: text
    content: 'Moïse cria à l’Éternel; et l’Éternel lui indiqua un bois, qu’il jeta dans l’eau. Et l’eau devint douce. Ce fut là que l’Éternel donna au peuple des lois et des ordonnances, et ce fut là qu’il le mit à l’épreuve. '
  '26':
  - type: text
    content: 'Il dit: Si tu écoutes attentivement la voix de l’Éternel, ton Dieu, si tu fais ce qui est droit à ses yeux, si tu prêtes l’oreille à ses commandements, et si tu observes toutes ses lois, je ne te frapperai d’aucune des maladies dont j’ai frappé les Égyptiens; car je suis l’Éternel, qui te guérit. '
  '27':
  - type: text
    content: Ils arrivèrent à Élim, où il y avait douze sources d’eau et soixante-dix palmiers. Ils campèrent là, près de l’eau.
  '3':
  - type: text
    content: L’Éternel est un vaillant guerrier;
  - type: text
    content: L’Éternel est son nom.
  '4':
  - type: text
    content: Il a lancé dans la mer les chars de Pharaon et son armée;
  - type: text
    content: Ses combattants d’élite ont été engloutis dans la mer Rouge.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Né 9:11.
  - type: text
    content: 'Les flots les ont couverts:'
  - type: text
    content: Ils sont descendus au fond des eaux, comme une pierre.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Ps 118:15, 16.
  - type: text
    content: Ta droite, ô Éternel! A signalé sa force;
  - type: text
    content: Ta droite, ô Éternel! A écrasé l’ennemi.
  '7':
  - type: text
    content: Par la grandeur de ta majesté
  - type: text
    content: Tu renverses tes adversaires;
  - type: text
    content: 'Tu déchaînes ta colère:'
  - type: text
    content: Elle les consume comme du chaume.
  '8':
  - type: text
    content: ' '
  - type: note
    content: És 63:12, 13. Ha 3:10.
  - type: text
    content: Au souffle de tes narines, les eaux se sont amoncelées,
  - type: text
    content: Les courants se sont dressés comme une muraille,
  - type: text
    content: Les flots se sont durcis au milieu de la mer.
  '9':
  - type: text
    content: 'L’ennemi disait:'
  - type: text
    content: Je poursuivrai, j’atteindrai,
  - type: text
    content: Je partagerai le butin;
  - type: text
    content: Ma vengeance sera assouvie,
  - type: text
    content: Je tirerai l’épée, ma main les détruira.
