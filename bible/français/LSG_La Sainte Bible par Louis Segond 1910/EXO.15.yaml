document_id: EXO.15,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Cantique
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-21: cf. Ap 15:2-4. (Jg 5. 2 S 22.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Alors Moïse et les enfants d’Israël chantèrent ce cantique à l’Éternel. Ils dirent:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 106:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Je chanterai à l’Éternel, car il a fait éclater sa gloire;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a précipité dans la mer le cheval et son cavalier.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 74:13
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 106:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Tu as soufflé de ton haleine:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La mer les a couverts;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils se sont enfoncés comme du plomb,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans la profondeur des eaux.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Qui est comme toi parmi les dieux, ô Éternel?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui est comme toi magnifique en sainteté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Digne de louanges,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Opérant des prodiges?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Tu as étendu ta droite:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La terre les a engloutis.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Par ta miséricorde tu as conduit, Tu as délivré ce peuple; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 77:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Par ta puissance tu le diriges Vers la demeure de ta sainteté.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Les peuples l’apprennent, et ils tremblent:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La terreur s’empare des Philistins;
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 2:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Les chefs d’Édom s’épouvantent;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un tremblement saisit les guerriers de Moab;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous les habitants de Canaan tombent en défaillance.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 2:25
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 11:25
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jos 2:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: La crainte et la frayeur les surprendront;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par la grandeur de ton bras
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils deviendront muets comme une pierre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jusqu’à ce que ton peuple soit passé, ô Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jusqu’à ce qu’il soit passé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le peuple que tu as acquis.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Tu les amèneras et tu les établiras sur la montagne de ton héritage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au lieu que tu as préparé pour ta demeure, ô Éternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au sanctuaire, Seigneur! Que tes mains ont fondé.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: L’Éternel régnera éternellement et à toujours.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Car les chevaux de Pharaon, ses chars et ses cavaliers sont entrés dans la mer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’Éternel a ramené sur eux les eaux de la mer;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais les enfants d’Israël ont marché à sec au milieu de la mer.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 18:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 118:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 12:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: L’Éternel est ma force et le sujet de mes louanges;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est lui qui m’a sauvé.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Il est mon Dieu: je le célèbrerai;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Il est le Dieu de mon père: je l’exalterai.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Marie, la prophétesse, sœur d’Aaron, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 18:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'prit à sa main un tambourin, et toutes les femmes vinrent après elle, avec des tambourins et en dansant. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Marie répondait aux enfants d’Israël:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Chantez à l’Éternel, car il a fait éclater sa gloire;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a précipité dans la mer le cheval et son cavalier.
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: LE PEUPLE D’ISRAËL DANS LE DÉSERT
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: Ch. 15:22 à 40. (Né 9:13-20. Ps 136:16.)
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les eaux de Mara
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 22-27: cf. No 33:8, 9. Ex 17:1-7.'
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Moïse fit partir Israël de la mer Rouge. Ils prirent la direction du désert de Schur; et, après trois journées de marche dans le désert, ils ne trouvèrent point d’eau. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 33:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Ils arrivèrent à Mara; mais ils ne purent pas boire l’eau de Mara parce qu’elle était amère. C’est pourquoi ce lieu fut appelé Mara. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Le peuple murmura contre Moïse, en disant: Que boirons-nous? '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Moïse cria à l’Éternel; et l’Éternel lui indiqua un bois, qu’il jeta dans l’eau. Et l’eau devint douce. Ce fut là que l’Éternel donna au peuple des lois et des ordonnances, et ce fut là qu’il le mit à l’épreuve. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Il dit: Si tu écoutes attentivement la voix de l’Éternel, ton Dieu, si tu fais ce qui est droit à ses yeux, si tu prêtes l’oreille à ses commandements, et si tu observes toutes ses lois, je ne te frapperai d’aucune des maladies dont j’ai frappé les Égyptiens; car je suis l’Éternel, qui te guérit. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Ils arrivèrent à Élim, où il y avait douze sources d’eau et soixante-dix palmiers. Ils campèrent là, près de l’eau.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: L’Éternel est un vaillant guerrier;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel est son nom.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Il a lancé dans la mer les chars de Pharaon et son armée;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses combattants d’élite ont été engloutis dans la mer Rouge.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Né 9:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Les flots les ont couverts:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils sont descendus au fond des eaux, comme une pierre.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 118:15
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '16'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ta droite, ô Éternel! A signalé sa force;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ta droite, ô Éternel! A écrasé l’ennemi.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Par la grandeur de ta majesté
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu renverses tes adversaires;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tu déchaînes ta colère:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle les consume comme du chaume.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 63:12
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '13'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ha 3:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Au souffle de tes narines, les eaux se sont amoncelées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les courants se sont dressés comme une muraille,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les flots se sont durcis au milieu de la mer.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'L’ennemi disait:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je poursuivrai, j’atteindrai,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je partagerai le butin;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ma vengeance sera assouvie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je tirerai l’épée, ma main les détruira.
