document_id: 2KI.15
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Azaria (Ozias), roi de Juda
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-7: cf. 2 Ch 26. (És 1:1; 6:1, etc.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La vingt-septième année de Jéroboam, roi d’Israël, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 14:21
      metadata:
        usfm: 2KI.14.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 26:3
      metadata:
        usfm: 2CH.26.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Azaria, fils d’Amatsia, roi de Juda, régna. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il avait '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 26:1
      metadata:
        usfm: 2CH.26.1
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '3'
      metadata:
        usfm: 2CH.26.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'seize ans lorsqu’il devint roi, et il régna cinquante-deux ans à Jérusalem. Sa mère s’appelait '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 27:3
      metadata:
        usfm: 2CH.27.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Jecolia, de Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il fit ce qui est droit aux yeux de l’Éternel, entièrement comme avait fait Amatsia, son père. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Seulement, les hauts lieux ne disparurent point; le peuple offrait encore des sacrifices et des parfums sur les hauts lieux. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'L’Éternel frappa le roi, qui fut lépreux jusqu’au jour de sa mort et demeura dans une maison écartée. Et Jotham, fils du roi, était à la tête de la maison et jugeait le peuple du pays. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Le reste des actions d’Azaria, et tout ce qu’il a fait, cela n’est-il pas écrit dans le livre des Chroniques des rois de Juda? '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Azaria se coucha avec ses pères, et on l’enterra avec ses pères dans la ville de David. Et Jotham, son fils, régna à sa place.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Zacharie, Schallum, Menahem, Pekachia, Pékach, rois d’Israël
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 8-12: cf. 2 R 10:30. Am 7:9-11.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'La trente-huitième année d’Azaria, roi de Juda, Zacharie, fils de Jéroboam, régna sur Israël à Samarie. Il régna six mois. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il fit ce qui est mal aux yeux de l’Éternel, comme avaient fait ses pères; il ne se détourna point des péchés de Jéroboam, fils de Nebath, qui avait fait pécher Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Schallum, fils de Jabesch, conspira contre lui, le frappa devant le peuple, et le fit mourir; et il régna à sa place. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Le reste des actions de Zacharie, cela est écrit dans le livre des Chroniques des rois d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ainsi s’accomplit ce que '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 10:30
      metadata:
        usfm: 2KI.10.30
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'l’Éternel avait déclaré à Jéhu, en disant: Tes fils jusqu’à la quatrième génération seront assis sur le trône d’Israël.'
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 13-31: cf. 1 R 16:8-22. Job 20:5-9. 1 Ch 5:25-26. Os 10:3, 7, 15.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Schallum, fils de Jabesch, régna la trente-neuvième année d’Ozias, roi de Juda. Il régna pendant un mois à Samarie. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Menahem, fils de Gadi, monta de Thirtsa et vint à Samarie, frappa dans Samarie Schallum, fils de Jabesch, et le fit mourir; et il régna à sa place. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Le reste des actions de Schallum, et la conspiration qu’il forma, cela est écrit dans le livre des Chroniques des rois d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Alors Menahem frappa Thiphsach et tous ceux qui y étaient, avec son territoire depuis Thirtsa; il la frappa parce qu’elle n’avait pas ouvert ses portes, et il fendit le ventre de toutes les femmes enceintes. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'La trente-neuvième année d’Azaria, roi de Juda, Menahem, fils de Gadi, régna sur Israël. Il régna dix ans à Samarie. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Il fit ce qui est mal aux yeux de l’Éternel; il ne se détourna point, tant qu’il vécut, des péchés de Jéroboam, fils de Nebath, qui avait fait pécher Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 5:26
      metadata:
        usfm: 1CH.5.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Pul, roi d’Assyrie, vint dans le pays; et Menahem donna à Pul mille talents d’argent, pour qu’il l’aidât à affermir la royauté entre ses mains. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Menahem leva cet argent sur tous ceux d’Israël qui avaient de la richesse, afin de le donner au roi d’Assyrie; il les taxa chacun à cinquante sicles d’argent. Le roi d’Assyrie s’en retourna, et ne s’arrêta pas alors dans le pays. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Le reste des actions de Menahem, et tout ce qu’il a fait, cela n’est-il pas écrit dans le livre des Chroniques des rois d’Israël? '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Menahem se coucha avec ses pères. Et Pekachia, son fils, régna à sa place. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'La cinquantième année d’Azaria, roi de Juda, Pekachia, fils de Menahem, régna sur Israël à Samarie. Il régna deux ans. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Il fit ce qui est mal aux yeux de l’Éternel; il ne se détourna point des péchés de Jéroboam, fils de Nebath, qui avait fait pécher Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Pékach, fils de Remalia, son officier, conspira contre lui; il le frappa à Samarie, dans le palais de la maison du roi, de même qu’Argob et Arié; il avait avec lui cinquante hommes d’entre les fils des Galaadites. Il fit ainsi mourir Pekachia, et il régna à sa place. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Le reste des actions de Pekachia, et tout ce qu’il a fait, cela est écrit dans le livre des Chroniques des rois d’Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'La cinquante-deuxième année d’Azaria, roi de Juda, Pékach, fils de Remalia, régna sur Israël à Samarie. Il régna vingt ans. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Il fit ce qui est mal aux yeux de l’Éternel; il ne se détourna point des péchés de Jéroboam, fils de Nebath, qui avait fait pécher Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Du temps de Pékach, roi d’Israël, Tiglath-Piléser, roi d’Assyrie, vint et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 8:23
      metadata:
        usfm: ISA.8.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'prit Ijjon, Abel-Beth-Maaca, Janoach, Kédesch, Hatsor, Galaad et la Galilée, tout le pays de Nephthali, et il emmena captifs les habitants en Assyrie. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Osée, fils d’Éla, forma une conspiration contre Pékach, fils de Remalia, le frappa et le fit mourir; et il régna à sa place, la vingtième année de Jotham, fils d’Ozias. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Le reste des actions de Pékach, et tout ce qu’il a fait, cela est écrit dans le livre des Chroniques des rois d’Israël.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jotham, roi de Juda
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 32-38: cf. 2 Ch 27. Mi 1:1.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'La seconde année de Pékach, fils de Remalia, roi d’Israël, '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Ch 27:1, etc.
    marker-yv: yv-n
  - type: text
    text: 'Jotham, fils d’Ozias, roi de Juda, régna. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 2 Ch 27:1, etc.
    marker-yv: yv-n
  - type: text
    text: 'Il avait vingt-cinq ans lorsqu’il devint roi, et il régna seize ans à Jérusalem. Sa mère s’appelait Jeruscha, fille de Tsadok. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Il fit ce qui est droit aux yeux de l’Éternel; il agit entièrement comme avait agi Ozias, son père. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Seulement, les hauts lieux ne disparurent point; le peuple offrait encore des sacrifices et des parfums sur les hauts lieux. Jotham bâtit la porte supérieure de la maison de l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Le reste des actions de Jotham, et tout ce qu’il a fait, cela n’est-il pas écrit dans le livre des Chroniques des rois de Juda? '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Dans ce temps-là, l’Éternel commença à '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 16:5
      metadata:
        usfm: 2CH.16.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 7:1
      metadata:
        usfm: ISA.7.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'envoyer contre Juda Retsin, roi de Syrie, et Pékach, fils de Remalia. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Jotham se coucha avec ses pères, et il fut enterré avec ses pères dans la ville de David, son père. Et Achaz, son fils, régna à sa place.
