document_id: 2KI.15,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Azaria (Ozias), roi de Juda
  - type: heading
    content: 'V. 1-7: cf. 2 Ch 26. (És 1:1; 6:1, etc.)'
  - type: text
    content: 'La vingt-septième année de Jéroboam, roi d’Israël, '
  - type: note
    content: 2 R 14:21. 2 Ch 26:3.
  - type: text
    content: 'Azaria, fils d’Amatsia, roi de Juda, régna. '
  '10':
  - type: text
    content: 'Schallum, fils de Jabesch, conspira contre lui, le frappa devant le peuple, et le fit mourir; et il régna à sa place. '
  '11':
  - type: text
    content: 'Le reste des actions de Zacharie, cela est écrit dans le livre des Chroniques des rois d’Israël. '
  '12':
  - type: text
    content: 'Ainsi s’accomplit ce que '
  - type: note
    content: 2 R 10:30.
  - type: text
    content: 'l’Éternel avait déclaré à Jéhu, en disant: Tes fils jusqu’à la quatrième génération seront assis sur le trône d’Israël.'
  - type: heading
    content: 'V. 13-31: cf. 1 R 16:8-22. Job 20:5-9. 1 Ch 5:25-26. Os 10:3, 7, 15.'
  '13':
  - type: text
    content: 'Schallum, fils de Jabesch, régna la trente-neuvième année d’Ozias, roi de Juda. Il régna pendant un mois à Samarie. '
  '14':
  - type: text
    content: 'Menahem, fils de Gadi, monta de Thirtsa et vint à Samarie, frappa dans Samarie Schallum, fils de Jabesch, et le fit mourir; et il régna à sa place. '
  '15':
  - type: text
    content: 'Le reste des actions de Schallum, et la conspiration qu’il forma, cela est écrit dans le livre des Chroniques des rois d’Israël. '
  '16':
  - type: text
    content: 'Alors Menahem frappa Thiphsach et tous ceux qui y étaient, avec son territoire depuis Thirtsa; il la frappa parce qu’elle n’avait pas ouvert ses portes, et il fendit le ventre de toutes les femmes enceintes. '
  '17':
  - type: text
    content: 'La trente-neuvième année d’Azaria, roi de Juda, Menahem, fils de Gadi, régna sur Israël. Il régna dix ans à Samarie. '
  '18':
  - type: text
    content: 'Il fit ce qui est mal aux yeux de l’Éternel; il ne se détourna point, tant qu’il vécut, des péchés de Jéroboam, fils de Nebath, qui avait fait pécher Israël. '
  '19':
  - type: note
    content: 1 Ch 5:26.
  - type: text
    content: 'Pul, roi d’Assyrie, vint dans le pays; et Menahem donna à Pul mille talents d’argent, pour qu’il l’aidât à affermir la royauté entre ses mains. '
  '2':
  - type: text
    content: 'Il avait '
  - type: note
    content: 2 Ch 26:1, 3.
  - type: text
    content: 'seize ans lorsqu’il devint roi, et il régna cinquante-deux ans à Jérusalem. Sa mère s’appelait '
  - type: note
    content: 2 Ch 27:3.
  - type: text
    content: 'Jecolia, de Jérusalem. '
  '20':
  - type: text
    content: 'Menahem leva cet argent sur tous ceux d’Israël qui avaient de la richesse, afin de le donner au roi d’Assyrie; il les taxa chacun à cinquante sicles d’argent. Le roi d’Assyrie s’en retourna, et ne s’arrêta pas alors dans le pays. '
  '21':
  - type: text
    content: 'Le reste des actions de Menahem, et tout ce qu’il a fait, cela n’est-il pas écrit dans le livre des Chroniques des rois d’Israël? '
  '22':
  - type: text
    content: 'Menahem se coucha avec ses pères. Et Pekachia, son fils, régna à sa place. '
  '23':
  - type: text
    content: 'La cinquantième année d’Azaria, roi de Juda, Pekachia, fils de Menahem, régna sur Israël à Samarie. Il régna deux ans. '
  '24':
  - type: text
    content: 'Il fit ce qui est mal aux yeux de l’Éternel; il ne se détourna point des péchés de Jéroboam, fils de Nebath, qui avait fait pécher Israël. '
  '25':
  - type: text
    content: 'Pékach, fils de Remalia, son officier, conspira contre lui; il le frappa à Samarie, dans le palais de la maison du roi, de même qu’Argob et Arié; il avait avec lui cinquante hommes d’entre les fils des Galaadites. Il fit ainsi mourir Pekachia, et il régna à sa place. '
  '26':
  - type: text
    content: 'Le reste des actions de Pekachia, et tout ce qu’il a fait, cela est écrit dans le livre des Chroniques des rois d’Israël. '
  '27':
  - type: text
    content: 'La cinquante-deuxième année d’Azaria, roi de Juda, Pékach, fils de Remalia, régna sur Israël à Samarie. Il régna vingt ans. '
  '28':
  - type: text
    content: 'Il fit ce qui est mal aux yeux de l’Éternel; il ne se détourna point des péchés de Jéroboam, fils de Nebath, qui avait fait pécher Israël. '
  '29':
  - type: text
    content: 'Du temps de Pékach, roi d’Israël, Tiglath-Piléser, roi d’Assyrie, vint et '
  - type: note
    content: És 8:23.
  - type: text
    content: 'prit Ijjon, Abel-Beth-Maaca, Janoach, Kédesch, Hatsor, Galaad et la Galilée, tout le pays de Nephthali, et il emmena captifs les habitants en Assyrie. '
  '3':
  - type: text
    content: 'Il fit ce qui est droit aux yeux de l’Éternel, entièrement comme avait fait Amatsia, son père. '
  '30':
  - type: text
    content: 'Osée, fils d’Éla, forma une conspiration contre Pékach, fils de Remalia, le frappa et le fit mourir; et il régna à sa place, la vingtième année de Jotham, fils d’Ozias. '
  '31':
  - type: text
    content: Le reste des actions de Pékach, et tout ce qu’il a fait, cela est écrit dans le livre des Chroniques des rois d’Israël.
  - type: heading
    content: Jotham, roi de Juda
  - type: heading
    content: 'V. 32-38: cf. 2 Ch 27. Mi 1:1.'
  '32':
  - type: text
    content: 'La seconde année de Pékach, fils de Remalia, roi d’Israël, '
  - type: note
    content: 2 Ch 27:1, etc.
  - type: text
    content: 'Jotham, fils d’Ozias, roi de Juda, régna. '
  '33':
  - type: note
    content: 2 Ch 27:1, etc.
  - type: text
    content: 'Il avait vingt-cinq ans lorsqu’il devint roi, et il régna seize ans à Jérusalem. Sa mère s’appelait Jeruscha, fille de Tsadok. '
  '34':
  - type: text
    content: 'Il fit ce qui est droit aux yeux de l’Éternel; il agit entièrement comme avait agi Ozias, son père. '
  '35':
  - type: text
    content: 'Seulement, les hauts lieux ne disparurent point; le peuple offrait encore des sacrifices et des parfums sur les hauts lieux. Jotham bâtit la porte supérieure de la maison de l’Éternel. '
  '36':
  - type: text
    content: 'Le reste des actions de Jotham, et tout ce qu’il a fait, cela n’est-il pas écrit dans le livre des Chroniques des rois de Juda? '
  '37':
  - type: text
    content: 'Dans ce temps-là, l’Éternel commença à '
  - type: note
    content: 2 Ch 16:5. És 7:1.
  - type: text
    content: 'envoyer contre Juda Retsin, roi de Syrie, et Pékach, fils de Remalia. '
  '38':
  - type: text
    content: Jotham se coucha avec ses pères, et il fut enterré avec ses pères dans la ville de David, son père. Et Achaz, son fils, régna à sa place.
  '4':
  - type: text
    content: 'Seulement, les hauts lieux ne disparurent point; le peuple offrait encore des sacrifices et des parfums sur les hauts lieux. '
  '5':
  - type: text
    content: 'L’Éternel frappa le roi, qui fut lépreux jusqu’au jour de sa mort et demeura dans une maison écartée. Et Jotham, fils du roi, était à la tête de la maison et jugeait le peuple du pays. '
  '6':
  - type: text
    content: 'Le reste des actions d’Azaria, et tout ce qu’il a fait, cela n’est-il pas écrit dans le livre des Chroniques des rois de Juda? '
  '7':
  - type: text
    content: Azaria se coucha avec ses pères, et on l’enterra avec ses pères dans la ville de David. Et Jotham, son fils, régna à sa place.
  - type: heading
    content: Zacharie, Schallum, Menahem, Pekachia, Pékach, rois d’Israël
  - type: heading
    content: 'V. 8-12: cf. 2 R 10:30. Am 7:9-11.'
  '8':
  - type: text
    content: 'La trente-huitième année d’Azaria, roi de Juda, Zacharie, fils de Jéroboam, régna sur Israël à Samarie. Il régna six mois. '
  '9':
  - type: text
    content: 'Il fit ce qui est mal aux yeux de l’Éternel, comme avaient fait ses pères; il ne se détourna point des péchés de Jéroboam, fils de Nebath, qui avait fait pécher Israël. '
