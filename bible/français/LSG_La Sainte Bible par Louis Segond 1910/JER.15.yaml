document_id: JER.15,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-9: cf. (Jé 7:13-16. Éz 14:12-21.) 2 R 21:10-16.'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'L’Éternel me dit:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 14:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Quand '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 32:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Moïse et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 7:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Samuel se présenteraient devant moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ne serais pas favorable à ce peuple.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Chasse-le loin de ma face, qu’il s’en aille!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Malheur à moi, ma mère, de ce que tu m’as fait '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 3:1, etc. Jé 20:14, etc.
      marker-yv: yv-n
    - type: text
      text: naître
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Homme de dispute et de querelle pour tout le pays!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je n’emprunte ni ne prête,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et cependant tous me maudissent.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'L’Éternel dit:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Certes, tu auras un avenir heureux;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Certes, je forcerai l’ennemi à t’adresser ses supplications,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au temps du malheur et au temps de la détresse.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 6:28
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Le fer brisera-t-il le fer du septentrion et l’airain?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je livre gratuitement au '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 17:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: pillage tes biens et tes trésors,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause de tous tes péchés, sur tout ton territoire.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je te fais passer avec ton ennemi dans un pays que tu ne connais pas,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 32:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Car le feu de ma colère s’est allumé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il brûle sur vous.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 15-21: cf. Jé 1:17-19; 20:7-13. La 3:64, etc.'
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu sais tout, ô Éternel, souviens-toi de moi, ne m’oublie pas,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 11:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Venge-moi de mes persécuteurs!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne m’enlève pas, tandis que tu te montres lent à la colère!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sache que je supporte l’opprobre à cause de toi.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai recueilli tes paroles, et je les ai dévorées;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes paroles ont fait la joie et l’allégresse de mon cœur;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car ton nom est invoqué sur moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Éternel, Dieu des armées!
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je ne me suis point assis dans l’assemblée des '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 1:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: moqueurs, afin de m’y réjouir;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais à cause de ta puissance, je me suis assis solitaire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car tu me remplissais de fureur.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Pourquoi ma '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 30:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: souffrance est-elle continuelle?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi ma plaie est-elle douloureuse, et ne veut-elle pas se guérir?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Serais-tu pour moi comme une source trompeuse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Comme une eau '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Job 6:15, etc.
      marker-yv: yv-n
    - type: text
      text: dont on n’est pas sûr?
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'C’est pourquoi ainsi parle l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si tu te rattaches à moi, je te répondrai, et tu te tiendras devant moi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si tu sépares ce qui est précieux de ce qui est vil, tu seras comme ma bouche.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est à eux de revenir à toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais ce n’est pas à toi de retourner vers eux.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et s’ils te disent: Où irons-nous?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tu leur répondras: Ainsi parle l’Éternel:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Za 11:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: A la mort ceux qui sont pour la mort,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A l’épée ceux qui sont pour l’épée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A la famine ceux qui sont pour la famine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A la captivité ceux qui sont pour la captivité!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je te rendrai pour ce peuple comme une forte '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 1:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: muraille d’airain;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils te feront la guerre, mais ils ne te vaincront pas;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car je serai avec toi pour te sauver et te délivrer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit l’Éternel.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je te délivrerai de la main des méchants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je te sauverai de la main des violents.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'J’enverrai contre eux quatre '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 26:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: espèces de fléaux, dit l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’épée pour les tuer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les chiens pour les traîner,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 7:33
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Les oiseaux du ciel et les bêtes de la terre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour les dévorer et les détruire.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je les rendrai '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 28:25
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: un objet d’effroi pour tous les royaumes de la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause de Manassé, fils d’Ézéchias, roi de Juda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et de tout ce qu’il a fait dans Jérusalem.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 51:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Qui aura pitié de toi, Jérusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui te plaindra?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui ira s’informer de ton état?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tu m’as '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 5:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: abandonné, dit l’Éternel, tu es allée en arrière;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais j’étends ma main sur toi, et je te détruis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis las d’avoir compassion.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je les '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 4:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: vanne avec le vent aux portes du pays;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je prive d’enfants, je fais périr mon peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui ne s’est pas détourné de ses voies.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses veuves sont plus nombreuses que les grains de sable de la mer;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’amène sur eux, sur la mère du jeune homme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le dévastateur en plein midi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je fais soudain tomber sur elle l’angoisse et la terreur.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celle qui avait enfanté sept fils est désolée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle rend l’âme;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Am 8:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Son soleil se couche quand il est encore jour;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle est confuse, couverte de honte.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux qui restent, je les livre à l’épée devant leurs ennemis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dit l’Éternel.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Plainte du prophète
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 10-14: cf. Jé 11:19, etc.; 18:18, etc.; 20:11, etc. La 3:59, etc.'
    marker-yv: yv-h
