document_id: JER.15,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-9: cf. (Jé 7:13-16. Éz 14:12-21.) 2 R 21:10-16.'
  - type: text
    content: 'L’Éternel me dit:'
  - type: note
    content: Éz 14:14.
  - type: text
    content: 'Quand '
  - type: note
    content: Ex 32:14.
  - type: text
    content: 'Moïse et '
  - type: note
    content: 1 S 7:9.
  - type: text
    content: Samuel se présenteraient devant moi,
  - type: text
    content: Je ne serais pas favorable à ce peuple.
  - type: text
    content: Chasse-le loin de ma face, qu’il s’en aille!
  '10':
  - type: text
    content: 'Malheur à moi, ma mère, de ce que tu m’as fait '
  - type: note
    content: Job 3:1, etc. Jé 20:14, etc.
  - type: text
    content: naître
  - type: text
    content: Homme de dispute et de querelle pour tout le pays!
  - type: text
    content: Je n’emprunte ni ne prête,
  - type: text
    content: Et cependant tous me maudissent.
  '11':
  - type: text
    content: 'L’Éternel dit:'
  - type: text
    content: Certes, tu auras un avenir heureux;
  - type: text
    content: Certes, je forcerai l’ennemi à t’adresser ses supplications,
  - type: text
    content: Au temps du malheur et au temps de la détresse.
  '12':
  - type: text
    content: ' '
  - type: note
    content: Jé 6:28.
  - type: text
    content: Le fer brisera-t-il le fer du septentrion et l’airain?
  '13':
  - type: text
    content: 'Je livre gratuitement au '
  - type: note
    content: Jé 17:3.
  - type: text
    content: pillage tes biens et tes trésors,
  - type: text
    content: A cause de tous tes péchés, sur tout ton territoire.
  '14':
  - type: text
    content: Je te fais passer avec ton ennemi dans un pays que tu ne connais pas,
  - type: note
    content: De 32:22.
  - type: text
    content: Car le feu de ma colère s’est allumé,
  - type: text
    content: Il brûle sur vous.
  - type: heading
    content: 'V. 15-21: cf. Jé 1:17-19; 20:7-13. La 3:64, etc.'
  '15':
  - type: text
    content: Tu sais tout, ô Éternel, souviens-toi de moi, ne m’oublie pas,
  - type: note
    content: Jé 11:20.
  - type: text
    content: Venge-moi de mes persécuteurs!
  - type: text
    content: Ne m’enlève pas, tandis que tu te montres lent à la colère!
  - type: text
    content: Sache que je supporte l’opprobre à cause de toi.
  '16':
  - type: text
    content: J’ai recueilli tes paroles, et je les ai dévorées;
  - type: text
    content: Tes paroles ont fait la joie et l’allégresse de mon cœur;
  - type: text
    content: Car ton nom est invoqué sur moi,
  - type: text
    content: Éternel, Dieu des armées!
  '17':
  - type: text
    content: 'Je ne me suis point assis dans l’assemblée des '
  - type: note
    content: Ps 1:1.
  - type: text
    content: moqueurs, afin de m’y réjouir;
  - type: text
    content: Mais à cause de ta puissance, je me suis assis solitaire,
  - type: text
    content: Car tu me remplissais de fureur.
  '18':
  - type: text
    content: 'Pourquoi ma '
  - type: note
    content: Jé 30:15.
  - type: text
    content: souffrance est-elle continuelle?
  - type: text
    content: Pourquoi ma plaie est-elle douloureuse, et ne veut-elle pas se guérir?
  - type: text
    content: Serais-tu pour moi comme une source trompeuse,
  - type: text
    content: 'Comme une eau '
  - type: note
    content: Job 6:15, etc.
  - type: text
    content: dont on n’est pas sûr?
  '19':
  - type: text
    content: 'C’est pourquoi ainsi parle l’Éternel:'
  - type: text
    content: Si tu te rattaches à moi, je te répondrai, et tu te tiendras devant moi;
  - type: text
    content: Si tu sépares ce qui est précieux de ce qui est vil, tu seras comme ma bouche.
  - type: text
    content: C’est à eux de revenir à toi,
  - type: text
    content: Mais ce n’est pas à toi de retourner vers eux.
  '2':
  - type: text
    content: 'Et s’ils te disent: Où irons-nous?'
  - type: text
    content: 'Tu leur répondras: Ainsi parle l’Éternel:'
  - type: note
    content: Za 11:9.
  - type: text
    content: A la mort ceux qui sont pour la mort,
  - type: text
    content: A l’épée ceux qui sont pour l’épée,
  - type: text
    content: A la famine ceux qui sont pour la famine,
  - type: text
    content: A la captivité ceux qui sont pour la captivité!
  '20':
  - type: text
    content: 'Je te rendrai pour ce peuple comme une forte '
  - type: note
    content: Jé 1:18.
  - type: text
    content: muraille d’airain;
  - type: text
    content: Ils te feront la guerre, mais ils ne te vaincront pas;
  - type: text
    content: Car je serai avec toi pour te sauver et te délivrer,
  - type: text
    content: Dit l’Éternel.
  '21':
  - type: text
    content: Je te délivrerai de la main des méchants,
  - type: text
    content: Je te sauverai de la main des violents.
  '3':
  - type: text
    content: 'J’enverrai contre eux quatre '
  - type: note
    content: Lé 26:16.
  - type: text
    content: espèces de fléaux, dit l’Éternel,
  - type: text
    content: L’épée pour les tuer,
  - type: text
    content: Les chiens pour les traîner,
  - type: note
    content: Jé 7:33.
  - type: text
    content: Les oiseaux du ciel et les bêtes de la terre
  - type: text
    content: Pour les dévorer et les détruire.
  '4':
  - type: text
    content: 'Je les rendrai '
  - type: note
    content: De 28:25.
  - type: text
    content: un objet d’effroi pour tous les royaumes de la terre,
  - type: text
    content: A cause de Manassé, fils d’Ézéchias, roi de Juda,
  - type: text
    content: Et de tout ce qu’il a fait dans Jérusalem.
  '5':
  - type: text
    content: ' '
  - type: note
    content: És 51:19.
  - type: text
    content: Qui aura pitié de toi, Jérusalem,
  - type: text
    content: Qui te plaindra?
  - type: text
    content: Qui ira s’informer de ton état?
  '6':
  - type: text
    content: 'Tu m’as '
  - type: note
    content: Jé 5:7.
  - type: text
    content: abandonné, dit l’Éternel, tu es allée en arrière;
  - type: text
    content: Mais j’étends ma main sur toi, et je te détruis,
  - type: text
    content: Je suis las d’avoir compassion.
  '7':
  - type: text
    content: 'Je les '
  - type: note
    content: Jé 4:11.
  - type: text
    content: vanne avec le vent aux portes du pays;
  - type: text
    content: Je prive d’enfants, je fais périr mon peuple,
  - type: text
    content: Qui ne s’est pas détourné de ses voies.
  '8':
  - type: text
    content: Ses veuves sont plus nombreuses que les grains de sable de la mer;
  - type: text
    content: J’amène sur eux, sur la mère du jeune homme,
  - type: text
    content: Le dévastateur en plein midi;
  - type: text
    content: Je fais soudain tomber sur elle l’angoisse et la terreur.
  '9':
  - type: text
    content: Celle qui avait enfanté sept fils est désolée,
  - type: text
    content: Elle rend l’âme;
  - type: note
    content: Am 8:9.
  - type: text
    content: Son soleil se couche quand il est encore jour;
  - type: text
    content: Elle est confuse, couverte de honte.
  - type: text
    content: Ceux qui restent, je les livre à l’épée devant leurs ennemis,
  - type: text
    content: Dit l’Éternel.
  - type: heading
    content: Plainte du prophète
  - type: heading
    content: 'V. 10-14: cf. Jé 11:19, etc.; 18:18, etc.; 20:11, etc. La 3:59, etc.'
