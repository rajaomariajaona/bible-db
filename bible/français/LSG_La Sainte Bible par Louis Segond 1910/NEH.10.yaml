document_id: NEH.10
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Voici ceux qui apposèrent leur sceau. Néhémie, le gouverneur, fils de Hacalia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Sédécias, Seraja, Azaria, Jérémie, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Paschhur, Amaria, Malkija, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Hattusch, Schebania, Malluc, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Harim, Merémoth, Abdias, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Daniel, Guinnethon, Baruc, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Meschullam, Abija, Mijamin, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Maazia, Bilgaï, Schemaeja, sacrificateurs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Lévites: Josué, fils d’Azania, Binnuï, des fils de Hénadad, Kadmiel, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'et leurs frères, Schebania, Hodija, Kelitha, Pelaja, Hanan, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Michée, Rehob, Haschabia, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Zaccur, Schérébia, Schebania, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Hodija, Bani, Beninu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Chefs du peuple: Pareosch, Pachath-Moab, Élam, Zatthu, Bani, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Bunni, Azgad, Bébaï, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Adonija, Bigvaï, Adin, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ather, Ézéchias, Azzur, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Hodija, Haschum, Betsaï, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Hariph, Anathoth, Nébaï, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Magpiasch, Meschullam, Hézir, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Meschézabeel, Tsadok, Jaddua, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Pelathia, Hanan, Anaja, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Hosée, Hanania, Haschub, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Hallochesch, Pilcha, Schobek, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Rehum, Haschabna, Maaséja, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Achija, Hanan, Anan, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Malluc, Harim, Baana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Le reste du peuple, les sacrificateurs, les Lévites, les portiers, les chantres, les Néthiniens, et tous ceux qui s’étaient séparés des peuples étrangers pour suivre la loi de Dieu, leurs femmes, leurs fils et leurs filles, tous ceux qui étaient capables de connaissance et d’intelligence, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'se joignirent à leurs frères les plus considérables d’entre eux. Ils promirent avec serment et jurèrent de marcher dans la loi de Dieu donnée par Moïse, serviteur de Dieu, d’observer et de mettre en pratique tous les commandements de l’Éternel, notre Seigneur, ses ordonnances et ses lois. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 34:16
      metadata:
        usfm: EXO.34.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 7:3
      metadata:
        usfm: DEU.7.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Nous promîmes de ne pas donner nos filles aux peuples du pays et de ne pas prendre leurs filles pour nos fils; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 20:10
      metadata:
        usfm: EXO.20.10
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 34:21
      metadata:
        usfm: EXO.34.21
    - type: text
      text: . Lé 23:2, etc. De 5:12, 13, 14, etc.
    marker-yv: yv-n
  - type: text
    text: 'de ne rien acheter, le jour du sabbat et les jours de fête, des peuples du pays qui apporteraient à vendre, le jour du sabbat, des marchandises ou denrées quelconques; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 23:10
      metadata:
        usfm: EXO.23.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 25:2
      metadata:
        usfm: LEV.25.2
    - type: text
      text: . De 15:1, etc.
    marker-yv: yv-n
  - type: text
    text: et de faire relâche la septième année, en n’exigeant le paiement d’aucune dette.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Résolutions pour l’entretien du culte
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 32-39: cf. No 18:12, etc. 2 Co 8:1, 2.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Nous nous imposâmes aussi des ordonnances qui nous obligeaient à donner un tiers de sicle par année pour le service de la maison de notre Dieu, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'pour les pains de proposition, pour l’offrande perpétuelle, pour l’holocauste perpétuel des '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 28:29
      metadata:
        usfm: NUM.28.29
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'sabbats, des nouvelles lunes et des fêtes, pour les choses consacrées, pour les sacrifices d’expiation en faveur d’Israël, et pour tout ce qui se fait dans la maison de notre Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Nous tirâmes au sort, sacrificateurs, Lévites et peuple, au sujet du bois qu’on devait chaque année apporter en offrande à la maison de notre Dieu, selon nos maisons paternelles, à des époques fixes, pour qu’il fût brûlé sur l’autel de l’Éternel, notre Dieu, comme il est écrit dans la loi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Nous résolûmes d’apporter chaque année à la maison de l’Éternel '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 23:19
      metadata:
        usfm: EXO.23.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 19:23
      metadata:
        usfm: LEV.19.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'les prémices de notre sol et les prémices de tous les fruits de tous les arbres; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'd’amener à la maison de notre Dieu, aux sacrificateurs qui font le service dans la maison de notre Dieu, les premiers-nés de nos fils et de notre bétail, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 13:2
      metadata:
        usfm: EXO.13.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 3:13
      metadata:
        usfm: NUM.3.13
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 8:17
      metadata:
        usfm: NUM.8.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'comme il est écrit dans la loi, les premiers-nés de nos bœufs et de nos brebis; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 23:17
      metadata:
        usfm: LEV.23.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 15:19
      metadata:
        usfm: NUM.15.19
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 18:12
      metadata:
        usfm: NUM.18.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 18:4
      metadata:
        usfm: DEU.18.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'd’apporter aux sacrificateurs, dans les chambres de la maison de notre Dieu, les prémices de notre pâte et nos offrandes, des fruits de tous les arbres, du moût et de l’huile; et de livrer '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 18:24
      metadata:
        usfm: NUM.18.24
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '25'
      metadata:
        usfm: NUM.18.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'la dîme de notre sol aux Lévites qui doivent la prendre eux-mêmes dans toutes les villes situées sur les terres que nous cultivons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Le sacrificateur, fils d’Aaron, sera avec les Lévites quand ils lèveront la dîme; et les Lévites apporteront '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 18:26
      metadata:
        usfm: NUM.18.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'la dîme de la dîme à la maison de notre Dieu, dans les chambres de la maison du trésor. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Car les enfants d’Israël et les fils de Lévi apporteront dans ces chambres les offrandes de blé, de moût et d’huile; là sont les ustensiles du sanctuaire, et se tiennent les sacrificateurs qui font le service, les portiers et les chantres. C’est ainsi que nous résolûmes de ne pas abandonner la maison de notre Dieu.
