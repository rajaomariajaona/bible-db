document_id: NEH.10,93
type_code: fra
verses:
  '1':
  - type: text
    content: 'Voici ceux qui apposèrent leur sceau. Néhémie, le gouverneur, fils de Hacalia. '
  '10':
  - type: text
    content: 'et leurs frères, Schebania, Hodija, Kelitha, Pelaja, Hanan, '
  '11':
  - type: text
    content: 'Michée, Rehob, Haschabia, '
  '12':
  - type: text
    content: 'Zaccur, Schérébia, Schebania, '
  '13':
  - type: text
    content: 'Hodija, Bani, Beninu. '
  '14':
  - type: text
    content: 'Chefs du peuple: Pareosch, Pachath-Moab, Élam, Zatthu, Bani, '
  '15':
  - type: text
    content: 'Bunni, Azgad, Bébaï, '
  '16':
  - type: text
    content: 'Adonija, Bigvaï, Adin, '
  '17':
  - type: text
    content: 'Ather, Ézéchias, Azzur, '
  '18':
  - type: text
    content: 'Hodija, Haschum, Betsaï, '
  '19':
  - type: text
    content: 'Hariph, Anathoth, Nébaï, '
  '2':
  - type: text
    content: 'Sédécias, Seraja, Azaria, Jérémie, '
  '20':
  - type: text
    content: 'Magpiasch, Meschullam, Hézir, '
  '21':
  - type: text
    content: 'Meschézabeel, Tsadok, Jaddua, '
  '22':
  - type: text
    content: 'Pelathia, Hanan, Anaja, '
  '23':
  - type: text
    content: 'Hosée, Hanania, Haschub, '
  '24':
  - type: text
    content: 'Hallochesch, Pilcha, Schobek, '
  '25':
  - type: text
    content: 'Rehum, Haschabna, Maaséja, '
  '26':
  - type: text
    content: 'Achija, Hanan, Anan, '
  '27':
  - type: text
    content: 'Malluc, Harim, Baana. '
  '28':
  - type: text
    content: 'Le reste du peuple, les sacrificateurs, les Lévites, les portiers, les chantres, les Néthiniens, et tous ceux qui s’étaient séparés des peuples étrangers pour suivre la loi de Dieu, leurs femmes, leurs fils et leurs filles, tous ceux qui étaient capables de connaissance et d’intelligence, '
  '29':
  - type: text
    content: 'se joignirent à leurs frères les plus considérables d’entre eux. Ils promirent avec serment et jurèrent de marcher dans la loi de Dieu donnée par Moïse, serviteur de Dieu, d’observer et de mettre en pratique tous les commandements de l’Éternel, notre Seigneur, ses ordonnances et ses lois. '
  '3':
  - type: text
    content: 'Paschhur, Amaria, Malkija, '
  '30':
  - type: note
    content: Ex 34:16. De 7:3.
  - type: text
    content: 'Nous promîmes de ne pas donner nos filles aux peuples du pays et de ne pas prendre leurs filles pour nos fils; '
  '31':
  - type: note
    content: Ex 20:10; 34:21. Lé 23:2, etc. De 5:12, 13, 14, etc.
  - type: text
    content: 'de ne rien acheter, le jour du sabbat et les jours de fête, des peuples du pays qui apporteraient à vendre, le jour du sabbat, des marchandises ou denrées quelconques; '
  - type: note
    content: Ex 23:10. Lé 25:2. De 15:1, etc.
  - type: text
    content: et de faire relâche la septième année, en n’exigeant le paiement d’aucune dette.
  - type: heading
    content: Résolutions pour l’entretien du culte
  - type: heading
    content: 'V. 32-39: cf. No 18:12, etc. 2 Co 8:1, 2.'
  '32':
  - type: text
    content: 'Nous nous imposâmes aussi des ordonnances qui nous obligeaient à donner un tiers de sicle par année pour le service de la maison de notre Dieu, '
  '33':
  - type: text
    content: 'pour les pains de proposition, pour l’offrande perpétuelle, pour l’holocauste perpétuel des '
  - type: note
    content: No 28:29.
  - type: text
    content: 'sabbats, des nouvelles lunes et des fêtes, pour les choses consacrées, pour les sacrifices d’expiation en faveur d’Israël, et pour tout ce qui se fait dans la maison de notre Dieu. '
  '34':
  - type: text
    content: 'Nous tirâmes au sort, sacrificateurs, Lévites et peuple, au sujet du bois qu’on devait chaque année apporter en offrande à la maison de notre Dieu, selon nos maisons paternelles, à des époques fixes, pour qu’il fût brûlé sur l’autel de l’Éternel, notre Dieu, comme il est écrit dans la loi. '
  '35':
  - type: text
    content: 'Nous résolûmes d’apporter chaque année à la maison de l’Éternel '
  - type: note
    content: Ex 23:19. Lé 19:23.
  - type: text
    content: 'les prémices de notre sol et les prémices de tous les fruits de tous les arbres; '
  '36':
  - type: text
    content: 'd’amener à la maison de notre Dieu, aux sacrificateurs qui font le service dans la maison de notre Dieu, les premiers-nés de nos fils et de notre bétail, '
  - type: note
    content: Ex 13:2. No 3:13; 8:17.
  - type: text
    content: 'comme il est écrit dans la loi, les premiers-nés de nos bœufs et de nos brebis; '
  '37':
  - type: note
    content: Lé 23:17. No 15:19; 18:12. De 18:4.
  - type: text
    content: 'd’apporter aux sacrificateurs, dans les chambres de la maison de notre Dieu, les prémices de notre pâte et nos offrandes, des fruits de tous les arbres, du moût et de l’huile; et de livrer '
  - type: note
    content: No 18:24, 25.
  - type: text
    content: 'la dîme de notre sol aux Lévites qui doivent la prendre eux-mêmes dans toutes les villes situées sur les terres que nous cultivons. '
  '38':
  - type: text
    content: 'Le sacrificateur, fils d’Aaron, sera avec les Lévites quand ils lèveront la dîme; et les Lévites apporteront '
  - type: note
    content: No 18:26.
  - type: text
    content: 'la dîme de la dîme à la maison de notre Dieu, dans les chambres de la maison du trésor. '
  '39':
  - type: text
    content: Car les enfants d’Israël et les fils de Lévi apporteront dans ces chambres les offrandes de blé, de moût et d’huile; là sont les ustensiles du sanctuaire, et se tiennent les sacrificateurs qui font le service, les portiers et les chantres. C’est ainsi que nous résolûmes de ne pas abandonner la maison de notre Dieu.
  '4':
  - type: text
    content: 'Hattusch, Schebania, Malluc, '
  '5':
  - type: text
    content: 'Harim, Merémoth, Abdias, '
  '6':
  - type: text
    content: 'Daniel, Guinnethon, Baruc, '
  '7':
  - type: text
    content: 'Meschullam, Abija, Mijamin, '
  '8':
  - type: text
    content: 'Maazia, Bilgaï, Schemaeja, sacrificateurs. '
  '9':
  - type: text
    content: 'Lévites: Josué, fils d’Azania, Binnuï, des fils de Hénadad, Kadmiel, '
