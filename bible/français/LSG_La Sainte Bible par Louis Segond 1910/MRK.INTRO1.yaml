  - type: text
    text: INTRODUCTION À L’ÉVANGILE SELON MARC
- type: usfm
  marker: imt3
  children:
  - type: text
    text: (És 42:1. Ac 10:38. Ph 2:7.)
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'L’auteur de l’Évangile selon Marc est le seul qui donne à son livre le titre de: «Évangile de Jésus-Christ, Fils de Dieu» (1:1). Pour cette raison, on peut le considérer comme le créateur de ce genre littéraire. Autrement dit, il serait le premier à mettre par écrit la tradition sur la personne, la vie et l’œuvre de Jésus-Christ qui, jusque-là, circulait sous une forme orale. L’Évangile à ses débuts était prédication, Bonne Nouvelle du salut en Jésus-Christ. Avec la disparition des témoins oculaires de la vie de Jésus, la préservation par écrit de ce qui se disait sur sa personne et son œuvre s’imposa. Marc serait le premier dans cette entreprise. Le canevas de cet évangile est donc le suivant:'
- type: usfm
  marker: io1
  children:
  - type: text
    text: '1. Prédication de Jean-Baptiste, baptême et tentation de Jésus-Christ '
  - type: usfm
    marker: ior
    children:
    - type: text
      text: 1:1-13
- type: usfm
  marker: io1
  children:
  - type: text
    text: '2. Commencement du ministère et ministère de Jésus en Galilée '
  - type: usfm
    marker: ior
    children:
    - type: text
      text: 1:14–7:23
- type: usfm
  marker: io1
  children:
  - type: text
    text: '3. Jésus dans les territoires de Tyr et de Sidon; ministère de Jésus hors de Galilée et en route vers Jérusalem '
  - type: usfm
    marker: ior
    children:
    - type: text
      text: 7:24–10:52
- type: usfm
  marker: io1
  children:
  - type: text
    text: '4. Entrée de Jésus à Jérusalem et ministère jérusalémite de Jésus avec les événements majeurs que sont sa passion et sa résurrection '
  - type: usfm
    marker: ior
    children:
    - type: text
      text: 11:1–16:20
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le titre: «Évangile de Jésus-Christ, Fils de Dieu» résume le contenu de Marc. Pour lui, Jésus est le Fils de Dieu, l’homme en qui et par qui Dieu se manifesta au monde. En Jésus et en Jésus seul, Dieu se fait connaître, il s’incarne pour permettre aux hommes de le reconnaître comme Dieu, de croire en lui et de recevoir la vie véritable. De tous les quatre évangiles, celui de Marc est le plus court. Il contient donc l’essentiel de ce que la tradition a voulu préserver au sujet de la vie et de l’œuvre de Jésus-Christ.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Le nom de l’auteur ne se trouve pas dans le texte de l’évangile, toutefois la tradition l’attribue à Marc. Il s’agirait de Jean Marc (Act 12:25; 13:5; 15:37), fils de Marie (Act 12:12) et cousin de Barnabas (Col 4:10), compagnon de Paul (Phm 24, 2 Tim 4:11), disciple de Pierre (1 Pi 5:13). Il s’agirait donc d'un personnage suffisamment renseigné sur Jésus grâce aux apports de Pierre et de Paul, mais aussi à ses connaissances personnelles de chrétien probablement encore très jeune lors des événements de la passion de Jésus. Marc 14:51-52 apparaît comme une signature anonyme de l’auteur qui a voulu laisser une marque de son souvenir personnel.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Les destinataires de Marc sont des chrétiens d’origine païenne. En effet, quand on lit Marc, on se rend facilement compte qu’il prend soin, chaque fois que cela s’avère nécessaire, d’expliquer les usages des Juifs. C’est le cas en 7:3: «Or, les pharisiens et tous les Juifs ne mangent pas sans s’être lavé soigneusement les mains, conformément à la tradition des anciens; et, quand ils reviennent de la place publique, ils ne mangent qu’après s’être purifiés» (voir aussi 3:7; 5:4; 7:11; 14:12; 15:42, etc.).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'L’Évangile de Marc est comme un drame plutôt qu’un enseignement. Il se déroule autour de la personne de Jésus par rapport aux relations qu’il a entretenues avec les hommes, que l’on peut facilement classer en trois catégories: ses propres intimes, ses opposants et, entre ces extrêmes, les foules.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Le message dramatique de Marc est que Jésus, pendant sa carrière terrestre, est resté incompris et, à la limite, mystérieux pour tous ceux qui l’entouraient, aussi bien ses opposants que ses propres disciples. Malgré ses enseignements en paroles et en actes, ses miracles et ses guérisons spectaculaires, le secret de sa messianité ne sera connu de tous qu’après sa mort et sa résurrection.
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: '«Ne vous épouvantez pas; vous cherchez Jésus de Nazareth, qui a éte crucifié; il est ressuscité, il n’est point ici… Allez dire à ses disciples et à Pierre qu’il vous précède en Galilée: c’est là que vous le verrez, comme il vous l’a dit'
  - type: text
    text: » (Mc 16:6-7).
- type: usfm
  marker: ip
  children:
  - type: text
    text: La pédagogie de Marc consiste à rendre son lecteur participant de l’événement qui survient à l’écoute de la Bonne Nouvelle de Jésus-Christ. Le titre qu’il donne à son livre «l’Évangile de Jésus-Christ, Fils de Dieu» (1:1), comparativement à celui qu’il donne à la prédication de Jésus «la bonne nouvelle» (1:15) interroge le lecteur sur la Bonne Nouvelle annoncée par Jésus et sur celle le concernant. Il ne faudrait donc pas confondre ce que Jésus a été réellement avec ce que les témoins de sa vie rapportent sur lui. Chacun a procédé à une sélection des événements de sa vie. S’agissant de Marc, voici les miracles et paraboles qu’il a trouvé utile de rapporter.
