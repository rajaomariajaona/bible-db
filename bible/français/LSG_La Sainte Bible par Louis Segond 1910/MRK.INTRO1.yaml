- type: usfm
  marker: ip
  children:
  - type: text
    text: Marc a sélectionné les éléments de la tradition sur Jésus dans le but louable de démontrer ce que signifie «être disciple». Le mystérieux titre du «Fils de l’homme» que Jésus se donne (2:10; 8:29; 14:61, etc.) n’aura pas permis à ses contemporains de reconnaître sa véritable identité. Bien qu’ayant vu en lui le Christ/Messie (8:27-33), ils ne savaient de quel genre de Messie il s’agissait. Alors comment être disciple de Jésus?
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: «Si quelqu’un veut venir après moi, qu’il renonce à lui-même, qu’il se charge de sa croix, et qu’il me suive. Car celui qui voudra sauver sa vie la perdra, mais celui qui perdra sa vie à cause de moi et de la Bonne Nouvelle la sauvera» (8:34-35).
