document_id: AMO.5,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Lamentation sur Israël
  - type: heading
    content: 'V. 1-3: cf. Jé 9:17-22.'
  - type: text
    content: Écoutez cette parole,
  - type: text
    content: Cette complainte que je prononce sur vous,
  - type: text
    content: Maison d’Israël!
  '10':
  - type: text
    content: Ils haïssent celui qui les reprend à la porte,
  - type: text
    content: Et ils ont en horreur celui qui parle sincèrement.
  '11':
  - type: text
    content: Aussi, parce que vous avez foulé le misérable,
  - type: text
    content: Et que vous avez pris de lui du blé en présent,
  - type: text
    content: 'Vous avez bâti des maisons en '
  - type: note
    content: So 1:13.
  - type: text
    content: pierres de taille,
  - type: text
    content: Mais vous ne les habiterez pas;
  - type: text
    content: Vous avez planté d’excellentes vignes,
  - type: text
    content: Mais vous n’en boirez pas le vin.
  '12':
  - type: text
    content: Car, je le sais, vos crimes sont nombreux,
  - type: text
    content: Vos péchés se sont multipliés;
  - type: text
    content: Vous opprimez le juste, vous recevez des présents,
  - type: text
    content: Et vous violez à la porte le droit des pauvres.
  '13':
  - type: text
    content: Voilà pourquoi, en des temps comme ceux-ci, le sage se tait;
  - type: text
    content: Car ces temps sont mauvais.
  '14':
  - type: text
    content: Recherchez le bien et non le mal, afin que vous viviez,
  - type: text
    content: Et qu’ainsi l’Éternel, le Dieu des armées, soit avec vous,
  - type: text
    content: Comme vous le dites.
  '15':
  - type: text
    content: ' '
  - type: note
    content: Ps 34:15; 97:10. Ro 12:9.
  - type: text
    content: Haïssez le mal et aimez le bien,
  - type: text
    content: Faites régner à la porte la justice;
  - type: text
    content: Et peut-être l’Éternel, le Dieu des armées, aura pitié
  - type: text
    content: Des restes de Joseph.
  '16':
  - type: text
    content: C’est pourquoi ainsi parle l’Éternel, le Dieu des armées, le Seigneur;
  - type: text
    content: Dans toutes les places on se lamentera,
  - type: text
    content: 'Dans toutes les rues on dira: Hélas! Hélas!'
  - type: text
    content: On appellera le laboureur au deuil,
  - type: text
    content: Et aux lamentations ceux qui disent des complaintes.
  '17':
  - type: text
    content: Dans toutes les vignes on se lamentera,
  - type: text
    content: Lorsque je passerai au milieu de toi, dit l’Éternel.
  - type: heading
    content: Le jour de l’Éternel
  - type: heading
    content: 'V. 18-27: cf. So 1:14-18. (És 1:11-15; 66:3, 4.) Ac 7:42, 43.'
  '18':
  - type: text
    content: ' '
  - type: note
    content: És 5:19.
  - type: text
    content: Malheur à ceux qui désirent le jour de l’Éternel!
  - type: text
    content: Qu’attendez-vous du jour de l’Éternel?
  - type: text
    content: 'Il sera '
  - type: note
    content: Jé 30:7. Joë 2:2. So 1:15.
  - type: text
    content: ténèbres et non lumière.
  '19':
  - type: text
    content: Vous serez comme un homme qui fuit devant un lion
  - type: text
    content: Et que rencontre un ours,
  - type: text
    content: Qui gagne sa demeure, appuie sa main sur la muraille,
  - type: text
    content: Et que mord un serpent.
  '2':
  - type: text
    content: Elle est tombée, elle ne se relèvera plus,
  - type: text
    content: La vierge d’Israël;
  - type: text
    content: Elle est couchée par terre,
  - type: text
    content: Nul ne la relève.
  '20':
  - type: text
    content: Le jour de l’Éternel n’est-il pas ténèbres et non lumière?
  - type: text
    content: N’est-il pas obscur et sans éclat?
  '21':
  - type: text
    content: Je hais, je méprise vos fêtes,
  - type: note
    content: És 1:11. Jé 6:20.
  - type: text
    content: Je ne puis sentir vos assemblées.
  '22':
  - type: text
    content: Quand vous me présentez des holocaustes et des offrandes,
  - type: text
    content: Je n’y prends aucun plaisir;
  - type: text
    content: Et les veaux engraissés que vous sacrifiez en actions de grâces,
  - type: text
    content: Je ne les regarde pas.
  '23':
  - type: text
    content: Éloigne de moi le bruit de tes cantiques;
  - type: text
    content: Je n’écoute pas le son de tes luths.
  '24':
  - type: text
    content: Mais que la droiture soit comme un courant d’eau,
  - type: text
    content: Et la justice comme un torrent qui jamais ne tarit.
  '25':
  - type: text
    content: ' '
  - type: note
    content: Ac 7:42.
  - type: text
    content: M’avez-vous fait des sacrifices et des offrandes
  - type: text
    content: Pendant les quarante années du désert, maison d’Israël?…
  '26':
  - type: text
    content: Emportez donc la tente de votre roi,
  - type: text
    content: Le piédestal de vos idoles,
  - type: text
    content: L’étoile de votre Dieu
  - type: text
    content: Que vous vous êtes fabriqué!
  '27':
  - type: text
    content: Et je vous emmènerai captifs au-delà de Damas,
  - type: text
    content: Dit l’Éternel, dont le nom est le Dieu des armées.
  '3':
  - type: text
    content: 'Car ainsi parle le Seigneur, l’Éternel:'
  - type: text
    content: La ville qui mettait en campagne mille hommes
  - type: text
    content: N’en conservera que cent,
  - type: text
    content: Et celle qui mettait en campagne cent hommes
  - type: text
    content: N’en conservera que dix,
  - type: text
    content: pour la maison d’Israël.
  - type: heading
    content: 'V. 4-9: cf. So 2:1-3. És 55:3, 6, 7.'
  '4':
  - type: text
    content: 'Car ainsi parle l’Éternel à la maison d’Israël:'
  - type: text
    content: Cherchez-moi, et vous vivrez!
  '5':
  - type: text
    content: 'Ne cherchez pas '
  - type: note
    content: Am 4:4.
  - type: text
    content: Béthel,
  - type: text
    content: N’allez pas à Guilgal,
  - type: text
    content: Ne passez pas à Beer-Schéba.
  - type: text
    content: Car Guilgal sera captif,
  - type: text
    content: Et Béthel anéanti.
  '6':
  - type: text
    content: Cherchez l’Éternel, et vous vivrez!
  - type: text
    content: Craignez qu’il ne saisisse comme un feu la maison de Joseph,
  - type: text
    content: Et que ce feu ne la dévore, sans personne à Béthel pour l’éteindre,
  '7':
  - type: text
    content: O vous qui changez le droit en absinthe,
  - type: text
    content: Et qui foulez à terre la justice!
  '8':
  - type: text
    content: 'Il a créé les '
  - type: note
    content: Job 9:9; 38:31.
  - type: text
    content: Pléiades et l’Orion,
  - type: text
    content: Il change les ténèbres en aurore,
  - type: text
    content: Il obscurcit le jour pour en faire la nuit,
  - type: text
    content: 'Il appelle les '
  - type: note
    content: Am 9:6.
  - type: text
    content: eaux de la mer,
  - type: text
    content: 'Et les répand à la surface de la terre:'
  - type: text
    content: L’Éternel est son nom.
  '9':
  - type: text
    content: Il fait lever la ruine sur les puissants,
  - type: text
    content: Et la ruine vient sur les forteresses.
  - type: heading
    content: 'V. 10-17: cf. (Mi 2:1-5; 3:1-4, 9-12.) (Ps 34:12-15. És 1:16-20.)'
