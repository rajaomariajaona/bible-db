document_id: AMO.5
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Lamentation sur Israël
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-3: cf. Jé 9:17-22.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Écoutez cette parole,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cette complainte que je prononce sur vous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Maison d’Israël!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Elle est tombée, elle ne se relèvera plus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La vierge d’Israël;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle est couchée par terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nul ne la relève.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Car ainsi parle le Seigneur, l’Éternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: La ville qui mettait en campagne mille hommes
- type: usfm
  marker: q1
  children:
  - type: text
    text: N’en conservera que cent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et celle qui mettait en campagne cent hommes
- type: usfm
  marker: q1
  children:
  - type: text
    text: N’en conservera que dix,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour la maison d’Israël.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 4-9: cf. So 2:1-3. És 55:3, 6, 7.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Car ainsi parle l’Éternel à la maison d’Israël:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cherchez-moi, et vous vivrez!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ne cherchez pas '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Am 4:4
      metadata:
        usfm: AMO.4.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Béthel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: N’allez pas à Guilgal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne passez pas à Beer-Schéba.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car Guilgal sera captif,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et Béthel anéanti.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Cherchez l’Éternel, et vous vivrez!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Craignez qu’il ne saisisse comme un feu la maison de Joseph,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que ce feu ne la dévore, sans personne à Béthel pour l’éteindre,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: O vous qui changez le droit en absinthe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui foulez à terre la justice!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Il a créé les '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 9:9
      metadata:
        usfm: JOB.9.9
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 38:31
      metadata:
        usfm: JOB.38.31
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Pléiades et l’Orion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il change les ténèbres en aurore,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il obscurcit le jour pour en faire la nuit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Il appelle les '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Am 9:6
      metadata:
        usfm: AMO.9.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: eaux de la mer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et les répand à la surface de la terre:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’Éternel est son nom.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Il fait lever la ruine sur les puissants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la ruine vient sur les forteresses.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 10-17: cf. (Mi 2:1-5; 3:1-4, 9-12.) (Ps 34:12-15. És 1:16-20.)'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ils haïssent celui qui les reprend à la porte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ils ont en horreur celui qui parle sincèrement.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Aussi, parce que vous avez foulé le misérable,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que vous avez pris de lui du blé en présent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Vous avez bâti des maisons en '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: So 1:13
      metadata:
        usfm: ZEP.1.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: pierres de taille,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais vous ne les habiterez pas;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous avez planté d’excellentes vignes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais vous n’en boirez pas le vin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Car, je le sais, vos crimes sont nombreux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vos péchés se sont multipliés;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous opprimez le juste, vous recevez des présents,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et vous violez à la porte le droit des pauvres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Voilà pourquoi, en des temps comme ceux-ci, le sage se tait;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car ces temps sont mauvais.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Recherchez le bien et non le mal, afin que vous viviez,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qu’ainsi l’Éternel, le Dieu des armées, soit avec vous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme vous le dites.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 34:15
      metadata:
        usfm: PSA.34.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 97:10
      metadata:
        usfm: PSA.97.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 12:9
      metadata:
        usfm: ROM.12.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Haïssez le mal et aimez le bien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Faites régner à la porte la justice;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et peut-être l’Éternel, le Dieu des armées, aura pitié
- type: usfm
  marker: q1
  children:
  - type: text
    text: Des restes de Joseph.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: C’est pourquoi ainsi parle l’Éternel, le Dieu des armées, le Seigneur;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans toutes les places on se lamentera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dans toutes les rues on dira: Hélas! Hélas!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: On appellera le laboureur au deuil,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et aux lamentations ceux qui disent des complaintes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Dans toutes les vignes on se lamentera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lorsque je passerai au milieu de toi, dit l’Éternel.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le jour de l’Éternel
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 18-27: cf. So 1:14-18. (És 1:11-15; 66:3, 4.) Ac 7:42, 43.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 5:19
      metadata:
        usfm: ISA.5.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Malheur à ceux qui désirent le jour de l’Éternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’attendez-vous du jour de l’Éternel?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Il sera '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 30:7
      metadata:
        usfm: JER.30.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Joë 2:2
      metadata:
        usfm: JOL.2.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: So 1:15
      metadata:
        usfm: ZEP.1.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: ténèbres et non lumière.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Vous serez comme un homme qui fuit devant un lion
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que rencontre un ours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui gagne sa demeure, appuie sa main sur la muraille,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que mord un serpent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Le jour de l’Éternel n’est-il pas ténèbres et non lumière?
- type: usfm
  marker: q1
  children:
  - type: text
    text: N’est-il pas obscur et sans éclat?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Je hais, je méprise vos fêtes,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 1:11
      metadata:
        usfm: ISA.1.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 6:20
      metadata:
        usfm: JER.6.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Je ne puis sentir vos assemblées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Quand vous me présentez des holocaustes et des offrandes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je n’y prends aucun plaisir;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les veaux engraissés que vous sacrifiez en actions de grâces,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je ne les regarde pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Éloigne de moi le bruit de tes cantiques;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je n’écoute pas le son de tes luths.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Mais que la droiture soit comme un courant d’eau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la justice comme un torrent qui jamais ne tarit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 7:42
      metadata:
        usfm: ACT.7.42
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: M’avez-vous fait des sacrifices et des offrandes
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pendant les quarante années du désert, maison d’Israël?…
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Emportez donc la tente de votre roi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le piédestal de vos idoles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’étoile de votre Dieu
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que vous vous êtes fabriqué!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Et je vous emmènerai captifs au-delà de Damas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit l’Éternel, dont le nom est le Dieu des armées.
