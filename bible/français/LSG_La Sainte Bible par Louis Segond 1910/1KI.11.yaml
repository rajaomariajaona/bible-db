document_id: 1KI.11,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Les femmes étrangères, l’idolâtrie et les ennemis de Salomon. — Sa mort
  - type: heading
    content: 'V. 1-13: cf. (De 17:17; 7:3, 4. Né 13:23-27.) Mt 13:22. (Ap 2:4; 3:17.) 1 Co 10:12.'
  - type: text
    content: 'Le roi Salomon aima '
  - type: note
    content: De 17:17.
  - type: text
    content: 'beaucoup de femmes étrangères, outre la fille de Pharaon: des Moabites, des Ammonites, des Édomites, des Sidoniennes, des Héthiennes, '
  '10':
  - type: note
    content: 1 R 6:12.
  - type: text
    content: 'Il lui avait à cet égard défendu d’aller après d’autres dieux; mais Salomon n’observa point les ordres de l’Éternel. '
  '11':
  - type: text
    content: 'Et l’Éternel dit à Salomon: Puisque tu as agi de la sorte, et que tu n’as point observé mon alliance et mes lois que je t’avais prescrites, '
  - type: note
    content: 2 R 12:15.
  - type: text
    content: 'je déchirerai le royaume de dessus toi et je le donnerai à ton serviteur. '
  '12':
  - type: text
    content: 'Seulement, je ne le ferai point pendant ta vie, à cause de David, ton père. C’est de la main de ton fils que je l’arracherai. '
  '13':
  - type: text
    content: Je n’arracherai cependant pas tout le royaume; je laisserai une tribu à ton fils, à cause de David, mon serviteur, et à cause de Jérusalem, que j’ai choisie.
  - type: heading
    content: 'V. 14-25: cf. 2 S 8:13, 14. Ps 89:31-33.'
  '14':
  - type: text
    content: 'L’Éternel suscita un ennemi à Salomon: Hadad, l’Édomite, de la race royale d’Édom. '
  '15':
  - type: note
    content: 2 S 8:14. 1 Ch 18:12, 13.
  - type: text
    content: 'Dans le temps où David battit Édom, Joab, chef de l’armée, étant monté pour enterrer les morts, tua tous les mâles qui étaient en Édom; '
  '16':
  - type: text
    content: 'il y resta six mois avec tout Israël, jusqu’à ce qu’il en eût exterminé tous les mâles. '
  '17':
  - type: text
    content: 'Ce fut alors qu’Hadad prit la fuite avec des Édomites, serviteurs de son père, pour se rendre en Égypte. Hadad était encore un jeune garçon. '
  '18':
  - type: text
    content: 'Partis de Madian, ils allèrent à Paran, prirent avec eux des hommes de Paran, et arrivèrent en Égypte auprès de Pharaon, roi d’Égypte, Pharaon donna une maison à Hadad, pourvut à sa subsistance, et lui accorda des terres. '
  '19':
  - type: text
    content: 'Hadad trouva grâce aux yeux de Pharaon, à tel point que Pharaon lui donna pour femme la sœur de sa femme, la sœur de la reine Thachpenès. '
  '2':
  - type: text
    content: 'appartenant aux nations dont l’Éternel avait dit aux enfants d’Israël: '
  - type: note
    content: Ex 34:16. De 7:3.
  - type: text
    content: 'Vous n’irez point chez elles, et elles ne viendront point chez vous; elles tourneraient certainement vos cœurs du côté de leurs dieux. Ce fut à ces nations que s’attacha Salomon, entraîné par l’amour. '
  '20':
  - type: text
    content: 'La sœur de Thachpenès lui enfanta son fils Guenubath. Thachpenès le sevra dans la maison de Pharaon; et Guenubath fut dans la maison de Pharaon, au milieu des enfants de Pharaon. '
  '21':
  - type: text
    content: 'Lorsque Hadad apprit en Égypte que David était couché avec ses pères, et que Joab, chef de l’armée, était mort, il dit à Pharaon: Laisse-moi aller dans mon pays. '
  '22':
  - type: text
    content: 'Et Pharaon lui dit: Que te manque-t-il auprès de moi, pour que tu désires aller dans ton pays? Il répondit: Rien, mais laisse-moi partir. '
  '23':
  - type: note
    content: 2 S 8:3; 10:18.
  - type: text
    content: 'Dieu suscita un autre ennemi à Salomon: Rezon, fils d’Éliada, qui s’était enfui de chez son maître Hadadézer, roi de Tsoba. '
  '24':
  - type: text
    content: 'Il avait rassemblé des gens auprès de lui, et il était chef de bande, '
  - type: note
    content: 2 S 8:3.
  - type: text
    content: 'lorsque David massacra les troupes de son maître. Ils allèrent à Damas, et s’y établirent, et ils régnèrent à Damas. '
  '25':
  - type: text
    content: Il fut un ennemi d’Israël pendant toute la vie de Salomon, en même temps qu’Hadad lui faisait du mal, et il avait Israël en aversion. Il régna sur la Syrie.
  - type: heading
    content: 'V. 26-40: cf. 1 R 12:1-24.'
  '26':
  - type: text
    content: ' '
  - type: note
    content: 2 Ch 13:6.
  - type: text
    content: 'Jéroboam aussi, serviteur de Salomon, leva la main contre le roi. Il était fils de Nebath, Éphratien de Tseréda, et il avait pour mère une veuve nommée Tserua. '
  '27':
  - type: text
    content: 'Voici à quelle occasion il leva la main contre le roi. Salomon bâtissait Millo, et fermait la brèche de la cité de David, son père. '
  '28':
  - type: text
    content: 'Jéroboam était fort et vaillant; et Salomon, ayant vu ce jeune homme à l’œuvre, lui donna la surveillance de tous les gens de corvée de la maison de Joseph. '
  '29':
  - type: text
    content: 'Dans ce temps-là, Jéroboam, étant sorti de Jérusalem, fut rencontré en chemin par le prophète Achija de Silo, revêtu d’un manteau neuf. Ils étaient tous deux seuls dans les champs. '
  '3':
  - type: text
    content: 'Il eut sept cents princesses pour femmes et trois cents concubines; et ses femmes détournèrent son cœur. '
  '30':
  - type: text
    content: 'Achija saisit le manteau neuf qu’il avait sur lui, le déchira en douze morceaux, '
  '31':
  - type: text
    content: 'et dit à Jéroboam: Prends pour toi dix morceaux! Car ainsi parle l’Éternel, le Dieu d’Israël: '
  - type: note
    content: 1 S 15:28.
  - type: text
    content: 'Voici, je vais arracher le royaume de la main de Salomon, et je te donnerai dix tribus. '
  '32':
  - type: text
    content: 'Mais il aura une tribu, à cause de mon serviteur David, et à cause de Jérusalem, la ville que j’ai choisie sur toutes les tribus d’Israël. '
  '33':
  - type: text
    content: 'Et cela, parce qu’ils m’ont abandonné, et se sont prosternés devant Astarté, divinité des Sidoniens, devant Kemosch, dieu de Moab, et devant Milcom, dieu des fils d’Ammon, et parce qu’ils n’ont point marché dans mes voies pour faire ce qui est droit à mes yeux et pour observer mes lois et mes ordonnances, comme l’a fait David, père de Salomon. '
  '34':
  - type: text
    content: 'Je n’ôterai pas de sa main tout le royaume, car je le maintiendrai prince tout le temps de sa vie, à cause de David, mon serviteur, que j’ai choisi, et qui a observé mes commandements et mes lois. '
  '35':
  - type: text
    content: 'Mais j’ôterai le royaume de la main de son fils, et je t’en donnerai dix tribus; '
  '36':
  - type: text
    content: 'je laisserai une tribu à son fils, '
  - type: note
    content: 1 R 15:4. Ps 132:17.
  - type: text
    content: 'afin que David, mon serviteur, ait toujours une lampe devant moi à Jérusalem, la ville que j’ai choisie pour y mettre mon nom. '
  '37':
  - type: text
    content: 'Je te prendrai, et tu régneras sur tout ce que ton âme désirera, tu seras roi d’Israël. '
  '38':
  - type: text
    content: 'Si tu obéis à tout ce que je t’ordonnerai, si tu marches dans mes voies et si tu fais ce qui est droit à mes yeux, en observant mes lois et mes commandements, comme l’a fait David, mon serviteur, je serai avec toi, je te bâtirai une maison stable, comme j’en ai bâti une à David, et je te donnerai Israël. '
  '39':
  - type: text
    content: 'J’humilierai par là la postérité de David, mais ce ne sera pas pour toujours. '
  '4':
  - type: text
    content: 'A l’époque de la vieillesse de Salomon, ses femmes inclinèrent son cœur vers d’autres dieux; et son cœur ne fut point tout entier à l’Éternel, son Dieu, comme l’avait été le cœur de David, son père. '
  '40':
  - type: text
    content: Salomon chercha à faire mourir Jéroboam. Et Jéroboam se leva et s’enfuit en Égypte auprès de Schischak, roi d’Égypte; il demeura en Égypte jusqu’à la mort de Salomon.
  - type: heading
    content: 'V. 41-43: cf. 2 Ch 9:29-31. Ec 8:8.'
  '41':
  - type: text
    content: ' '
  - type: note
    content: 2 Ch 9:29.
  - type: text
    content: 'Le reste des actions de Salomon, tout ce qu’il a fait, et sa sagesse, cela n’est-il pas écrit dans le livre des actes de Salomon? '
  '42':
  - type: text
    content: 'Salomon régna '
  - type: note
    content: 2 Ch 9:30.
  - type: text
    content: 'quarante ans à Jérusalem sur tout Israël. '
  '43':
  - type: text
    content: Puis Salomon se coucha avec ses pères, et il fut enterré dans la ville de David, son père. Roboam, son fils, régna à sa place.
  '5':
  - type: text
    content: 'Salomon alla après '
  - type: note
    content: Jg 2:13. 2 R 13:23.
  - type: text
    content: 'Astarté, divinité des Sidoniens, et après Milcom, l’abomination des Ammonites. '
  '6':
  - type: text
    content: 'Et Salomon fit ce qui est mal aux yeux de l’Éternel, et il ne suivit point pleinement l’Éternel, comme David, son père. '
  '7':
  - type: note
    content: 2 R 23:13.
  - type: text
    content: 'Alors Salomon bâtit sur la montagne qui est en face de Jérusalem un haut lieu pour Kemosch, l’abomination de Moab, et pour Moloc, l’abomination des fils d’Ammon. '
  '8':
  - type: text
    content: 'Et il fit ainsi pour toutes ses femmes étrangères, qui offraient des parfums et des sacrifices à leurs dieux. '
  '9':
  - type: text
    content: 'L’Éternel fut irrité contre Salomon, parce qu’il avait détourné son cœur de l’Éternel, le Dieu d’Israël, '
  - type: note
    content: 1 R 3:5; 9:2.
  - type: text
    content: 'qui lui était apparu deux fois. '
