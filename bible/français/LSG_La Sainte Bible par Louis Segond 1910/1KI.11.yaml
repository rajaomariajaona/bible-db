document_id: 1KI.11,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les femmes étrangères, l’idolâtrie et les ennemis de Salomon. — Sa mort
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-13: cf. (De 17:17; 7:3, 4. Né 13:23-27.) Mt 13:22. (Ap 2:4; 3:17.) 1 Co 10:12.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi Salomon aima '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 17:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'beaucoup de femmes étrangères, outre la fille de Pharaon: des Moabites, des Ammonites, des Édomites, des Sidoniennes, des Héthiennes, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 6:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Il lui avait à cet égard défendu d’aller après d’autres dieux; mais Salomon n’observa point les ordres de l’Éternel. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et l’Éternel dit à Salomon: Puisque tu as agi de la sorte, et que tu n’as point observé mon alliance et mes lois que je t’avais prescrites, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 12:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'je déchirerai le royaume de dessus toi et je le donnerai à ton serviteur. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Seulement, je ne le ferai point pendant ta vie, à cause de David, ton père. C’est de la main de ton fils que je l’arracherai. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je n’arracherai cependant pas tout le royaume; je laisserai une tribu à ton fils, à cause de David, mon serviteur, et à cause de Jérusalem, que j’ai choisie.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 14-25: cf. 2 S 8:13, 14. Ps 89:31-33.'
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Éternel suscita un ennemi à Salomon: Hadad, l’Édomite, de la race royale d’Édom. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 8:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 18:12
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '13'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Dans le temps où David battit Édom, Joab, chef de l’armée, étant monté pour enterrer les morts, tua tous les mâles qui étaient en Édom; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'il y resta six mois avec tout Israël, jusqu’à ce qu’il en eût exterminé tous les mâles. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce fut alors qu’Hadad prit la fuite avec des Édomites, serviteurs de son père, pour se rendre en Égypte. Hadad était encore un jeune garçon. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Partis de Madian, ils allèrent à Paran, prirent avec eux des hommes de Paran, et arrivèrent en Égypte auprès de Pharaon, roi d’Égypte, Pharaon donna une maison à Hadad, pourvut à sa subsistance, et lui accorda des terres. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hadad trouva grâce aux yeux de Pharaon, à tel point que Pharaon lui donna pour femme la sœur de sa femme, la sœur de la reine Thachpenès. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'appartenant aux nations dont l’Éternel avait dit aux enfants d’Israël: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 34:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 7:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Vous n’irez point chez elles, et elles ne viendront point chez vous; elles tourneraient certainement vos cœurs du côté de leurs dieux. Ce fut à ces nations que s’attacha Salomon, entraîné par l’amour. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La sœur de Thachpenès lui enfanta son fils Guenubath. Thachpenès le sevra dans la maison de Pharaon; et Guenubath fut dans la maison de Pharaon, au milieu des enfants de Pharaon. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque Hadad apprit en Égypte que David était couché avec ses pères, et que Joab, chef de l’armée, était mort, il dit à Pharaon: Laisse-moi aller dans mon pays. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et Pharaon lui dit: Que te manque-t-il auprès de moi, pour que tu désires aller dans ton pays? Il répondit: Rien, mais laisse-moi partir. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 8:3
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Dieu suscita un autre ennemi à Salomon: Rezon, fils d’Éliada, qui s’était enfui de chez son maître Hadadézer, roi de Tsoba. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il avait rassemblé des gens auprès de lui, et il était chef de bande, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 8:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'lorsque David massacra les troupes de son maître. Ils allèrent à Damas, et s’y établirent, et ils régnèrent à Damas. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il fut un ennemi d’Israël pendant toute la vie de Salomon, en même temps qu’Hadad lui faisait du mal, et il avait Israël en aversion. Il régna sur la Syrie.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 26-40: cf. 1 R 12:1-24.'
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 13:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Jéroboam aussi, serviteur de Salomon, leva la main contre le roi. Il était fils de Nebath, Éphratien de Tseréda, et il avait pour mère une veuve nommée Tserua. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici à quelle occasion il leva la main contre le roi. Salomon bâtissait Millo, et fermait la brèche de la cité de David, son père. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jéroboam était fort et vaillant; et Salomon, ayant vu ce jeune homme à l’œuvre, lui donna la surveillance de tous les gens de corvée de la maison de Joseph. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dans ce temps-là, Jéroboam, étant sorti de Jérusalem, fut rencontré en chemin par le prophète Achija de Silo, revêtu d’un manteau neuf. Ils étaient tous deux seuls dans les champs. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il eut sept cents princesses pour femmes et trois cents concubines; et ses femmes détournèrent son cœur. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Achija saisit le manteau neuf qu’il avait sur lui, le déchira en douze morceaux, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et dit à Jéroboam: Prends pour toi dix morceaux! Car ainsi parle l’Éternel, le Dieu d’Israël: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 15:28
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Voici, je vais arracher le royaume de la main de Salomon, et je te donnerai dix tribus. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais il aura une tribu, à cause de mon serviteur David, et à cause de Jérusalem, la ville que j’ai choisie sur toutes les tribus d’Israël. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et cela, parce qu’ils m’ont abandonné, et se sont prosternés devant Astarté, divinité des Sidoniens, devant Kemosch, dieu de Moab, et devant Milcom, dieu des fils d’Ammon, et parce qu’ils n’ont point marché dans mes voies pour faire ce qui est droit à mes yeux et pour observer mes lois et mes ordonnances, comme l’a fait David, père de Salomon. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je n’ôterai pas de sa main tout le royaume, car je le maintiendrai prince tout le temps de sa vie, à cause de David, mon serviteur, que j’ai choisi, et qui a observé mes commandements et mes lois. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais j’ôterai le royaume de la main de son fils, et je t’en donnerai dix tribus; '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'je laisserai une tribu à son fils, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 15:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 132:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'afin que David, mon serviteur, ait toujours une lampe devant moi à Jérusalem, la ville que j’ai choisie pour y mettre mon nom. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je te prendrai, et tu régneras sur tout ce que ton âme désirera, tu seras roi d’Israël. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si tu obéis à tout ce que je t’ordonnerai, si tu marches dans mes voies et si tu fais ce qui est droit à mes yeux, en observant mes lois et mes commandements, comme l’a fait David, mon serviteur, je serai avec toi, je te bâtirai une maison stable, comme j’en ai bâti une à David, et je te donnerai Israël. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’humilierai par là la postérité de David, mais ce ne sera pas pour toujours. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A l’époque de la vieillesse de Salomon, ses femmes inclinèrent son cœur vers d’autres dieux; et son cœur ne fut point tout entier à l’Éternel, son Dieu, comme l’avait été le cœur de David, son père. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Salomon chercha à faire mourir Jéroboam. Et Jéroboam se leva et s’enfuit en Égypte auprès de Schischak, roi d’Égypte; il demeura en Égypte jusqu’à la mort de Salomon.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 41-43: cf. 2 Ch 9:29-31. Ec 8:8.'
    marker-yv: yv-h
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 9:29
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Le reste des actions de Salomon, tout ce qu’il a fait, et sa sagesse, cela n’est-il pas écrit dans le livre des actes de Salomon? '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Salomon régna '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 9:30
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'quarante ans à Jérusalem sur tout Israël. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Puis Salomon se coucha avec ses pères, et il fut enterré dans la ville de David, son père. Roboam, son fils, régna à sa place.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Salomon alla après '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jg 2:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 13:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Astarté, divinité des Sidoniens, et après Milcom, l’abomination des Ammonites. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et Salomon fit ce qui est mal aux yeux de l’Éternel, et il ne suivit point pleinement l’Éternel, comme David, son père. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 23:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Alors Salomon bâtit sur la montagne qui est en face de Jérusalem un haut lieu pour Kemosch, l’abomination de Moab, et pour Moloc, l’abomination des fils d’Ammon. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et il fit ainsi pour toutes ses femmes étrangères, qui offraient des parfums et des sacrifices à leurs dieux. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’Éternel fut irrité contre Salomon, parce qu’il avait détourné son cœur de l’Éternel, le Dieu d’Israël, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 3:5
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'qui lui était apparu deux fois. '
