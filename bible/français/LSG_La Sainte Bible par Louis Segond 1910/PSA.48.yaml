document_id: PSA.48,93
type_code: fra
verses:
  '1':
  - type: heading
    content: (2 Ch 20. Ps 83.) Ps 46. De 33:28, 29.
  - type: text
    content: Cantique. Psaume des fils de Koré.
  '10':
  - type: text
    content: O Dieu, nous pensons à ta bonté
  - type: text
    content: Au milieu de ton temple.
  '11':
  - type: text
    content: Comme ton nom, ô Dieu!
  - type: text
    content: Ta louange retentit jusqu’aux extrémités de la terre;
  - type: text
    content: Ta droite est pleine de justice.
  '12':
  - type: text
    content: La montagne de Sion se réjouit,
  - type: text
    content: Les filles de Juda sont dans l’allégresse,
  - type: text
    content: A cause de tes jugements.
  '13':
  - type: text
    content: Parcourez Sion, parcourez-en l’enceinte,
  - type: text
    content: Comptez ses tours,
  '14':
  - type: text
    content: Observez son rempart,
  - type: text
    content: Examinez ses palais,
  - type: text
    content: Pour le raconter à la génération future.
  '15':
  - type: text
    content: Voilà le Dieu qui est notre Dieu éternellement et à jamais;
  - type: text
    content: Il sera notre guide jusqu’à la mort.
  '2':
  - type: text
    content: L’Éternel est grand, il est l’objet de toutes les louanges,
  - type: text
    content: Dans la ville de notre Dieu, sur sa montagne sainte.
  '3':
  - type: text
    content: Belle est la colline, joie de toute la terre, la montagne de Sion;
  - type: text
    content: 'Le côté septentrional, '
  - type: note
    content: Mt 5:35.
  - type: text
    content: c’est la ville du grand roi.
  '4':
  - type: text
    content: Dieu, dans ses palais, est connu pour une haute retraite.
  '5':
  - type: text
    content: 'Car voici, les rois s’étaient concertés:'
  - type: text
    content: Ils n’ont fait que passer ensemble.
  '6':
  - type: text
    content: Ils ont regardé, tout stupéfaits,
  - type: text
    content: Ils ont eu peur, et ont pris la fuite.
  '7':
  - type: text
    content: Là un tremblement les a saisis,
  - type: text
    content: Comme la douleur d’une femme qui accouche.
  '8':
  - type: text
    content: Ils ont été chassés comme par le vent d’orient,
  - type: text
    content: Qui brise les navires de Tarsis.
  '9':
  - type: text
    content: Ce que nous avions entendu dire, nous l’avons vu
  - type: text
    content: Dans la ville de l’Éternel des armées,
  - type: text
    content: 'Dans la ville de notre Dieu:'
  - type: text
    content: 'Dieu la fera subsister à toujours. '
  - type: text
    content: — Pause.
