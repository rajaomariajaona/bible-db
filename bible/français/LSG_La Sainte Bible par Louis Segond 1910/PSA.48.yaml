document_id: PSA.48,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: (2 Ch 20. Ps 83.) Ps 46. De 33:28, 29.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Cantique. Psaume des fils de Koré.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: O Dieu, nous pensons à ta bonté
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au milieu de ton temple.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Comme ton nom, ô Dieu!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ta louange retentit jusqu’aux extrémités de la terre;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ta droite est pleine de justice.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: La montagne de Sion se réjouit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les filles de Juda sont dans l’allégresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause de tes jugements.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Parcourez Sion, parcourez-en l’enceinte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comptez ses tours,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Observez son rempart,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Examinez ses palais,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour le raconter à la génération future.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Voilà le Dieu qui est notre Dieu éternellement et à jamais;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il sera notre guide jusqu’à la mort.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: L’Éternel est grand, il est l’objet de toutes les louanges,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans la ville de notre Dieu, sur sa montagne sainte.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Belle est la colline, joie de toute la terre, la montagne de Sion;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Le côté septentrional, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 5:35
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: c’est la ville du grand roi.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Dieu, dans ses palais, est connu pour une haute retraite.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Car voici, les rois s’étaient concertés:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils n’ont fait que passer ensemble.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ils ont regardé, tout stupéfaits,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ont eu peur, et ont pris la fuite.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Là un tremblement les a saisis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme la douleur d’une femme qui accouche.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ils ont été chassés comme par le vent d’orient,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui brise les navires de Tarsis.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ce que nous avions entendu dire, nous l’avons vu
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans la ville de l’Éternel des armées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dans la ville de notre Dieu:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dieu la fera subsister à toujours. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: — Pause.
