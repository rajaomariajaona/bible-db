document_id: EXO.38
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Construction de l’autel des holocaustes, de la cuve d’airain, et du parvis
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-8: cf. Ex 27:1-8; 30:17-21.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 27:1
      metadata:
        usfm: EXO.27.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il fit l’autel des holocaustes de bois d’acacia; sa longueur était de cinq coudées, et sa largeur de cinq coudées; il était carré, et sa hauteur était de trois coudées. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 27:2
      metadata:
        usfm: EXO.27.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il fit, aux quatre coins, des cornes qui sortaient de l’autel, et il le couvrit d’airain. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 27:3
      metadata:
        usfm: EXO.27.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il fit tous les ustensiles de l’autel, les cendriers, les pelles, les bassins, les fourchettes et les brasiers; il fit d’airain tous ces ustensiles. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 27:4
      metadata:
        usfm: EXO.27.4
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '5'
      metadata:
        usfm: EXO.27.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il fit pour l’autel une grille d’airain, en forme de treillis, qu’il plaça au-dessous du rebord de l’autel, à partir du bas, jusqu’à la moitié de la hauteur de l’autel. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il fondit quatre anneaux, qu’il mit aux quatre coins de la grille d’airain, pour recevoir les barres. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il fit les barres de bois d’acacia, et les couvrit d’airain. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il passa dans les anneaux aux côtés de l’autel '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 27:8
      metadata:
        usfm: EXO.27.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'les barres qui servaient à le porter. Il le fit creux, avec des planches. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 30:18
      metadata:
        usfm: EXO.30.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il fit la cuve d’airain, avec sa base d’airain, en employant les miroirs des femmes qui s’assemblaient à l’entrée de la tente d’assignation.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 9-20: cf. Ex 27:9-19.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 27:9
      metadata:
        usfm: EXO.27.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Il fit le parvis. Du côté du midi, il y avait, pour former le parvis, des toiles de fin lin retors, sur une longueur de cent coudées, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'avec vingt colonnes posant sur vingt bases d’airain; les crochets des colonnes et leurs tringles étaient d’argent. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Du côté du nord, il y avait cent coudées de toiles, avec vingt colonnes et leurs vingt bases d’airain; les crochets des colonnes et leurs tringles étaient d’argent. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Du côté de l’occident, il y avait cinquante coudées de toiles, avec dix colonnes et leurs dix bases; les crochets des colonnes et leurs tringles étaient d’argent. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Du côté de l’orient, sur les cinquante coudées de largeur, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'il y avait, pour une aile, quinze coudées de toiles, avec trois colonnes et leurs trois bases, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'et, pour la seconde aile, qui lui correspondait de l’autre côté de la porte du parvis, quinze coudées de toiles, avec trois colonnes et leurs trois bases. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Toutes les toiles formant l’enceinte du parvis étaient de fin lin retors. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Les bases pour les colonnes étaient d’airain, les crochets des colonnes et leurs tringles étaient d’argent, et leurs chapiteaux étaient couverts d’argent. Toutes les colonnes du parvis étaient jointes par des tringles d’argent. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Le rideau de la porte du parvis était un ouvrage de broderie en fil bleu, pourpre et cramoisi, et en fin lin retors; il avait une longueur de vingt coudées, et sa hauteur était de cinq coudées, comme la largeur des toiles du parvis; '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'ses quatre colonnes et leurs quatre bases étaient d’airain, les crochets et leurs tringles étaient d’argent, et leurs chapiteaux étaient couverts d’argent. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tous les pieux de l’enceinte du tabernacle et du parvis étaient d’airain.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Comptes du tabernacle
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 21-31: cf. (Ex 35:4-10; 36:1-7.) 1 Ch 29:1-8.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Voici les comptes du tabernacle, du tabernacle d’assignation, révisés, d’après l’ordre de Moïse, par les soins des Lévites, sous la direction d’Ithamar, fils du sacrificateur Aaron. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Betsaleel, fils d’Uri, fils de Hur, de la tribu de Juda, fit tout ce que l’Éternel avait ordonné à Moïse; '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'il eut pour aide Oholiab, fils d’Ahisamac, de la tribu de Dan, habile à graver, à inventer, et à broder sur les étoffes teintes en bleu, en pourpre, en cramoisi, et sur le fin lin. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Le total de l’or employé à l’œuvre pour tous les travaux du sanctuaire, or qui fut le produit des offrandes, montait à vingt-neuf talents et sept cent trente sicles, selon le sicle du sanctuaire. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'L’argent de ceux de l’assemblée dont on fit le dénombrement montait à cent talents et mille sept cent soixante-quinze sicles, selon le sicle du sanctuaire. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'C’était un demi-sicle par tête, la moitié d’un sicle, selon le sicle du sanctuaire, pour chaque homme compris dans le dénombrement, depuis l’âge de vingt ans et au-dessus, soit pour six cent trois mille cinq cent cinquante hommes. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Les cent talents d’argent servirent à fondre les bases du sanctuaire et les bases du voile, cent bases pour les cent talents, un talent par base. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Et avec les mille sept cent soixante-quinze sicles on fit les crochets et les tringles pour les colonnes, et on couvrit les chapiteaux. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'L’airain des offrandes montait à soixante-dix talents et deux mille quatre cents sicles. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'On en fit les bases de l’entrée de la tente d’assignation; l’autel d’airain avec sa grille, et tous les ustensiles de l’autel; '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: les bases du parvis, tout autour, et les bases de la porte du parvis; et tous les pieux de l’enceinte du tabernacle et du parvis.
