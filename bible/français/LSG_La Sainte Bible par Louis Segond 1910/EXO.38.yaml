document_id: EXO.38,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Construction de l’autel des holocaustes, de la cuve d’airain, et du parvis
  - type: heading
    content: 'V. 1-8: cf. Ex 27:1-8; 30:17-21.'
  - type: text
    content: ' '
  - type: note
    content: Ex 27:1.
  - type: text
    content: 'Il fit l’autel des holocaustes de bois d’acacia; sa longueur était de cinq coudées, et sa largeur de cinq coudées; il était carré, et sa hauteur était de trois coudées. '
  '10':
  - type: text
    content: 'avec vingt colonnes posant sur vingt bases d’airain; les crochets des colonnes et leurs tringles étaient d’argent. '
  '11':
  - type: text
    content: 'Du côté du nord, il y avait cent coudées de toiles, avec vingt colonnes et leurs vingt bases d’airain; les crochets des colonnes et leurs tringles étaient d’argent. '
  '12':
  - type: text
    content: 'Du côté de l’occident, il y avait cinquante coudées de toiles, avec dix colonnes et leurs dix bases; les crochets des colonnes et leurs tringles étaient d’argent. '
  '13':
  - type: text
    content: 'Du côté de l’orient, sur les cinquante coudées de largeur, '
  '14':
  - type: text
    content: 'il y avait, pour une aile, quinze coudées de toiles, avec trois colonnes et leurs trois bases, '
  '15':
  - type: text
    content: 'et, pour la seconde aile, qui lui correspondait de l’autre côté de la porte du parvis, quinze coudées de toiles, avec trois colonnes et leurs trois bases. '
  '16':
  - type: text
    content: 'Toutes les toiles formant l’enceinte du parvis étaient de fin lin retors. '
  '17':
  - type: text
    content: 'Les bases pour les colonnes étaient d’airain, les crochets des colonnes et leurs tringles étaient d’argent, et leurs chapiteaux étaient couverts d’argent. Toutes les colonnes du parvis étaient jointes par des tringles d’argent. '
  '18':
  - type: text
    content: 'Le rideau de la porte du parvis était un ouvrage de broderie en fil bleu, pourpre et cramoisi, et en fin lin retors; il avait une longueur de vingt coudées, et sa hauteur était de cinq coudées, comme la largeur des toiles du parvis; '
  '19':
  - type: text
    content: 'ses quatre colonnes et leurs quatre bases étaient d’airain, les crochets et leurs tringles étaient d’argent, et leurs chapiteaux étaient couverts d’argent. '
  '2':
  - type: note
    content: Ex 27:2.
  - type: text
    content: 'Il fit, aux quatre coins, des cornes qui sortaient de l’autel, et il le couvrit d’airain. '
  '20':
  - type: text
    content: Tous les pieux de l’enceinte du tabernacle et du parvis étaient d’airain.
  - type: heading
    content: Comptes du tabernacle
  - type: heading
    content: 'V. 21-31: cf. (Ex 35:4-10; 36:1-7.) 1 Ch 29:1-8.'
  '21':
  - type: text
    content: 'Voici les comptes du tabernacle, du tabernacle d’assignation, révisés, d’après l’ordre de Moïse, par les soins des Lévites, sous la direction d’Ithamar, fils du sacrificateur Aaron. '
  '22':
  - type: text
    content: 'Betsaleel, fils d’Uri, fils de Hur, de la tribu de Juda, fit tout ce que l’Éternel avait ordonné à Moïse; '
  '23':
  - type: text
    content: 'il eut pour aide Oholiab, fils d’Ahisamac, de la tribu de Dan, habile à graver, à inventer, et à broder sur les étoffes teintes en bleu, en pourpre, en cramoisi, et sur le fin lin. '
  '24':
  - type: text
    content: 'Le total de l’or employé à l’œuvre pour tous les travaux du sanctuaire, or qui fut le produit des offrandes, montait à vingt-neuf talents et sept cent trente sicles, selon le sicle du sanctuaire. '
  '25':
  - type: text
    content: 'L’argent de ceux de l’assemblée dont on fit le dénombrement montait à cent talents et mille sept cent soixante-quinze sicles, selon le sicle du sanctuaire. '
  '26':
  - type: text
    content: 'C’était un demi-sicle par tête, la moitié d’un sicle, selon le sicle du sanctuaire, pour chaque homme compris dans le dénombrement, depuis l’âge de vingt ans et au-dessus, soit pour six cent trois mille cinq cent cinquante hommes. '
  '27':
  - type: text
    content: 'Les cent talents d’argent servirent à fondre les bases du sanctuaire et les bases du voile, cent bases pour les cent talents, un talent par base. '
  '28':
  - type: text
    content: 'Et avec les mille sept cent soixante-quinze sicles on fit les crochets et les tringles pour les colonnes, et on couvrit les chapiteaux. '
  '29':
  - type: text
    content: 'L’airain des offrandes montait à soixante-dix talents et deux mille quatre cents sicles. '
  '3':
  - type: note
    content: Ex 27:3.
  - type: text
    content: 'Il fit tous les ustensiles de l’autel, les cendriers, les pelles, les bassins, les fourchettes et les brasiers; il fit d’airain tous ces ustensiles. '
  '30':
  - type: text
    content: 'On en fit les bases de l’entrée de la tente d’assignation; l’autel d’airain avec sa grille, et tous les ustensiles de l’autel; '
  '31':
  - type: text
    content: les bases du parvis, tout autour, et les bases de la porte du parvis; et tous les pieux de l’enceinte du tabernacle et du parvis.
  '4':
  - type: note
    content: Ex 27:4, 5.
  - type: text
    content: 'Il fit pour l’autel une grille d’airain, en forme de treillis, qu’il plaça au-dessous du rebord de l’autel, à partir du bas, jusqu’à la moitié de la hauteur de l’autel. '
  '5':
  - type: text
    content: 'Il fondit quatre anneaux, qu’il mit aux quatre coins de la grille d’airain, pour recevoir les barres. '
  '6':
  - type: text
    content: 'Il fit les barres de bois d’acacia, et les couvrit d’airain. '
  '7':
  - type: text
    content: 'Il passa dans les anneaux aux côtés de l’autel '
  - type: note
    content: Ex 27:8.
  - type: text
    content: 'les barres qui servaient à le porter. Il le fit creux, avec des planches. '
  '8':
  - type: note
    content: Ex 30:18.
  - type: text
    content: Il fit la cuve d’airain, avec sa base d’airain, en employant les miroirs des femmes qui s’assemblaient à l’entrée de la tente d’assignation.
  - type: heading
    content: 'V. 9-20: cf. Ex 27:9-19.'
  '9':
  - type: text
    content: ' '
  - type: note
    content: Ex 27:9.
  - type: text
    content: 'Il fit le parvis. Du côté du midi, il y avait, pour former le parvis, des toiles de fin lin retors, sur une longueur de cent coudées, '
