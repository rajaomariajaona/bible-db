document_id: MAT.5,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Sermon sur la montagne. Les béatitudes
  - type: heading
    content: 'V. 1-12: cf. Lu 6:20-26. Ps 34:12-20. (De 18:15, 18, 19. És 61:1-3.)'
  - type: text
    content: 'Voyant la foule, Jésus monta sur la montagne; et, après qu’il se fut assis, ses disciples s’approchèrent de lui. '
  '10':
  - type: note
    content: 2 Co 4:10. 2 Ti 2:12. 1 Pi 3:14.
  - type: text
    content: Heureux ceux qui sont persécutés pour la justice, car le royaume des cieux est à eux!
  - type: text
    content: ' '
  '11':
  - type: text
    content: Heureux serez-vous, lorsqu’on vous outragera, qu’on vous persécutera et qu’on dira faussement de vous toute sorte de mal,
  - type: text
    content: ' '
  - type: note
    content: 1 Pi 4:14.
  - type: text
    content: à cause de moi.
  - type: text
    content: ' '
  '12':
  - type: note
    content: Lu 6:23.
  - type: text
    content: Réjouissez-vous et soyez dans l’allégresse, parce que votre récompense sera grande dans les cieux; car c’est ainsi qu’on a persécuté les prophètes qui ont été avant vous.
  - type: heading
    content: Les disciples, sel de la terre et lumière du monde
  - type: heading
    content: 'V. 13-16: cf. 1 Pi 2:9-12.'
  '13':
  - type: text
    content: ' '
  - type: note
    content: Mc 9:50. Lu 14:34.
  - type: text
    content: Vous êtes le sel de la terre. Mais si le sel perd sa saveur, avec quoi la lui rendra-t-on? Il ne sert plus qu’à être jeté dehors, et foulé aux pieds par les hommes.
  - type: text
    content: ' '
  '14':
  - type: text
    content: Vous êtes la lumière du monde. Une ville située sur une montagne ne peut être cachée;
  - type: text
    content: ' '
  '15':
  - type: text
    content: et
  - type: text
    content: ' '
  - type: note
    content: Mc 4:21. Lu 3:16; 11:33.
  - type: text
    content: on n’allume pas une lampe pour la mettre sous le boisseau, mais on la met sur le chandelier, et elle éclaire tous ceux qui sont dans la maison.
  - type: text
    content: ' '
  '16':
  - type: note
    content: 1 Pi 2:12.
  - type: text
    content: Que votre lumière luise ainsi devant les hommes, afin qu’ils voient vos bonnes œuvres, et qu’ils glorifient votre Père qui est dans les cieux.
  - type: heading
    content: L’accomplissement de la loi et des prophètes
  - type: heading
    content: 'V. 17-20: cf. (Ps 40:7-11. Ro 8:3, 4.) Lu 24:44.'
  '17':
  - type: text
    content: ' '
  - type: text
    content: Ne croyez pas que je sois venu pour abolir la loi ou les prophètes; je suis venu non pour abolir, mais pour accomplir.
  - type: text
    content: ' '
  '18':
  - type: text
    content: Car, je vous le dis en vérité,
  - type: text
    content: ' '
  - type: note
    content: Lu 16:17.
  - type: text
    content: tant que le ciel et la terre ne passeront point, il ne disparaîtra pas de la loi un seul iota ou un seul trait de lettre, jusqu’à ce que tout soit arrivé.
  - type: text
    content: ' '
  '19':
  - type: note
    content: Ja 2:10.
  - type: text
    content: Celui donc qui supprimera l’un de ces plus petits commandements, et qui enseignera aux hommes à faire de même, sera appelé le plus petit dans le royaume des cieux; mais celui qui les observera, et qui enseignera à les observer, celui-là sera appelé grand dans le royaume des cieux.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Puis, ayant ouvert la bouche, il les enseigna, et dit:'
  '20':
  - type: text
    content: Car, je vous le dis, si votre justice ne surpasse celle des scribes et des pharisiens, vous n’entrerez point dans le royaume des cieux.
  - type: heading
    content: 'V. 21-26: cf. (1 Jn 3:15. Lu 12:58, 59.) Ps 119:96.'
  '21':
  - type: text
    content: ' '
  - type: text
    content: 'Vous avez entendu qu’il a été dit aux anciens:'
  - type: text
    content: ' '
  - type: note
    content: Ex 20:13. De 5:17.
  - type: text
    content: Tu ne tueras point; celui qui tuera mérite d’être puni par les juges.
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'Mais moi, je vous dis que quiconque se met en colère contre son frère mérite d’être puni par les juges; que celui qui dira à son frère: Raca! Mérite d’être puni par le sanhédrin; et que celui qui lui dira: Insensé! Mérite d’être puni par le feu de la géhenne.'
  - type: text
    content: ' '
  '23':
  - type: text
    content: Si donc tu présentes ton offrande à l’autel, et que là tu te souviennes que ton frère a quelque chose contre toi,
  - type: text
    content: ' '
  '24':
  - type: text
    content: laisse là ton offrande devant l’autel, et va d’abord te réconcilier avec ton frère; puis, viens présenter ton offrande.
  - type: text
    content: ' '
  '25':
  - type: note
    content: Lu 12:58. Ép 4:26.
  - type: text
    content: Accorde-toi promptement avec ton adversaire, pendant que tu es en chemin avec lui, de peur qu’il ne te livre au juge, que le juge ne te livre à l’officier de justice, et que tu ne sois mis en prison.
  - type: text
    content: ' '
  '26':
  - type: text
    content: Je te le dis en vérité, tu ne sortiras pas de là que tu n’aies payé le dernier quadrant.
  - type: heading
    content: 'V. 27-32: cf. (2 S 11:2, 3. Mc 9:43-48. Ga 5:24.) Pr 16:30. Mc 10:2-12.'
  '27':
  - type: text
    content: ' '
  - type: text
    content: 'Vous avez appris qu’il a été dit:'
  - type: text
    content: ' '
  - type: note
    content: Ex 20:14. De 5:18.
  - type: text
    content: Tu ne commettras point d’adultère.
  - type: text
    content: ' '
  '28':
  - type: text
    content: Mais moi, je vous dis que quiconque
  - type: text
    content: ' '
  - type: note
    content: Job 31:1. Ps 119:37.
  - type: text
    content: regarde une femme pour la convoiter a déjà commis un adultère avec elle dans son cœur.
  - type: text
    content: ' '
  '29':
  - type: note
    content: Mt 18:8. Mc 9:43.
  - type: text
    content: Si ton œil droit est pour toi une occasion de chute, arrache-le et jette-le loin de toi; car il est avantageux pour toi qu’un seul de tes membres périsse, et que ton corps entier ne soit pas jeté dans la géhenne.
  - type: text
    content: ' '
  '3':
  - type: text
    content: ' '
  - type: note
    content: Lu 6:20.
  - type: text
    content: Heureux les pauvres en esprit, car le royaume des cieux est à eux!
  - type: text
    content: ' '
  '30':
  - type: text
    content: Et si ta main droite est pour toi une occasion de chute, coupe-la et jette-la loin de toi; car il est avantageux pour toi qu’un seul de tes membres périsse, et que ton corps entier n’aille pas dans la géhenne.
  - type: text
    content: ' '
  '31':
  - type: text
    content: 'Il a été dit:'
  - type: text
    content: ' '
  - type: note
    content: De 24:1.
  - type: text
    content: Que celui qui répudie sa femme lui donne une lettre de divorce.
  - type: text
    content: ' '
  '32':
  - type: note
    content: Mt 19:7. Mc 10:4, 11. Lu 16:18. 1 Co 7:10.
  - type: text
    content: Mais moi, je vous dis que celui qui répudie sa femme, sauf pour cause d’infidélité, l’expose à devenir adultère, et que celui qui épouse une femme répudiée commet un adultère.
  - type: heading
    content: 'V. 33-37: cf. Mt 12:36; 23:16-22. Ja 5:12.'
  '33':
  - type: text
    content: ' '
  - type: text
    content: 'Vous avez encore appris qu’il a été dit aux anciens:'
  - type: text
    content: ' '
  - type: note
    content: Ex 20:7. Lé 19:12. De 5:11.
  - type: text
    content: Tu ne te parjureras point, mais tu t’acquitteras envers le Seigneur de ce que tu as déclaré par serment.
  - type: text
    content: ' '
  '34':
  - type: text
    content: Mais moi, je vous dis de
  - type: text
    content: ' '
  - type: note
    content: Ja 5:12.
  - type: text
    content: ne jurer aucunement, ni par le ciel, parce que c’est le trône de Dieu;
  - type: text
    content: ' '
  '35':
  - type: text
    content: ni par la terre,
  - type: text
    content: ' '
  - type: note
    content: Jé 66:1.
  - type: text
    content: parce que c’est son marchepied; ni par Jérusalem,
  - type: text
    content: ' '
  - type: note
    content: Ps 48:3.
  - type: text
    content: parce que c’est la ville du grand roi.
  - type: text
    content: ' '
  '36':
  - type: text
    content: Ne jure pas non plus par ta tête, car tu ne peux rendre blanc ou noir un seul cheveu.
  - type: text
    content: ' '
  '37':
  - type: text
    content: Que votre parole soit oui, oui, non, non; ce qu’on y ajoute vient du malin.
  - type: heading
    content: 'V. 38-48: cf. Lu 6:27-36. (Ro 12:17-21.)'
  '38':
  - type: text
    content: ' '
  - type: text
    content: Vous avez appris qu’il a été
  - type: text
    content: ' '
  - type: note
    content: Ex 21:24. Lé 24:20. De 19:21.
  - type: text
    content: 'dit: œil pour œil, et dent pour dent.'
  - type: text
    content: ' '
  '39':
  - type: text
    content: Mais moi, je vous dis de
  - type: text
    content: ' '
  - type: note
    content: Pr 24:29. Lu 6:29. Ro 12:17. 1 Co 6:7. 1 Th 5:15. 1 Pi 3:9.
  - type: text
    content: ne pas résister au méchant. Si quelqu’un te frappe sur la joue droite, présente-lui aussi l’autre.
  - type: text
    content: ' '
  '4':
  - type: note
    content: Lu 6:21.
  - type: text
    content: Heureux les affligés, car ils seront consolés!
  - type: text
    content: ' '
  '40':
  - type: text
    content: Si quelqu’un veut plaider contre toi, et prendre ta tunique, laisse-lui encore ton manteau.
  - type: text
    content: ' '
  '41':
  - type: text
    content: Si quelqu’un te force à faire un mille, fais-en deux avec lui.
  - type: text
    content: ' '
  '42':
  - type: note
    content: De 15:8. Lu 6:35.
  - type: text
    content: Donne à celui qui te demande, et ne te détourne pas de celui qui veut emprunter de toi.
  - type: text
    content: ' '
  '43':
  - type: text
    content: 'Vous avez appris qu’il a été dit:'
  - type: text
    content: ' '
  - type: note
    content: Lé 19:18.
  - type: text
    content: Tu aimeras ton prochain, et tu haïras ton ennemi.
  - type: text
    content: ' '
  '44':
  - type: text
    content: 'Mais moi, je vous dis:'
  - type: text
    content: ' '
  - type: note
    content: Lu 6:27. Ro 12:20.
  - type: text
    content: Aimez vos ennemis, bénissez ceux qui vous maudissent, faites du bien à ceux qui vous haïssent, et
  - type: text
    content: ' '
  - type: note
    content: Lu 23:34. Ac 7:60. 1 Co 1:13. 1 Pi 2:23.
  - type: text
    content: priez pour ceux qui vous maltraitent et qui vous persécutent,
  - type: text
    content: ' '
  '45':
  - type: text
    content: afin que vous soyez fils de votre Père qui est dans les cieux; car il fait lever son soleil sur les méchants et sur les bons, et il fait pleuvoir sur les justes et sur les injustes.
  - type: text
    content: ' '
  '46':
  - type: note
    content: Lu 6:32.
  - type: text
    content: Si vous aimez ceux qui vous aiment, quelle récompense méritez-vous? Les publicains aussi n’agissent-ils pas de même?
  - type: text
    content: ' '
  '47':
  - type: text
    content: Et si vous saluez seulement vos frères, que faites-vous d’extraordinaire? Les païens aussi n’agissent-ils pas de même?
  - type: text
    content: ' '
  '48':
  - type: text
    content: Soyez donc parfaits, comme votre Père céleste est parfait.
  '5':
  - type: note
    content: Ps 37:11.
  - type: text
    content: Heureux les débonnaires, car ils hériteront la terre!
  - type: text
    content: ' '
  '6':
  - type: note
    content: És 55:1.
  - type: text
    content: Heureux ceux qui ont faim et soif de la justice, car ils seront rassasiés!
  - type: text
    content: ' '
  '7':
  - type: text
    content: Heureux les miséricordieux, car ils obtiendront miséricorde!
  - type: text
    content: ' '
  '8':
  - type: note
    content: Ps 15:2; 24:4. Hé 12:14.
  - type: text
    content: Heureux ceux qui ont le cœur pur, car ils verront Dieu!
  - type: text
    content: ' '
  '9':
  - type: text
    content: Heureux ceux qui procurent la paix, car ils seront appelés fils de Dieu!
  - type: text
    content: ' '
