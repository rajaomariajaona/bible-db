document_id: ZEC.2,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Le cordeau à mesurer
  - type: heading
    content: 'V. 1-5: cf. Za 1:16, 17. Jé 31:27, 38-40. És 4:5, 6.'
  - type: text
    content: 'Je levai les yeux et je regardai, et voici, il y avait un homme tenant dans la main un cordeau pour mesurer. '
  '10':
  - type: text
    content: Pousse des cris d’allégresse et réjouis-toi,
  - type: text
    content: Fille de Sion!
  - type: text
    content: 'Car voici, je viens, et '
  - type: note
    content: Lé 26:12. Éz 37:27. 2 Co 6:16.
  - type: text
    content: j’habiterai au milieu de toi,
  - type: text
    content: Dit l’Éternel.
  '11':
  - type: text
    content: Beaucoup de nations s’attacheront à l’Éternel en ce jour-là,
  - type: text
    content: Et deviendront mon peuple;
  - type: text
    content: J’habiterai au milieu de toi,
  - type: text
    content: Et tu sauras que l’Éternel des armées m’a envoyé vers toi.
  '12':
  - type: text
    content: L’Éternel possédera Juda comme sa part
  - type: text
    content: Dans la terre sainte,
  - type: text
    content: Et il choisira encore Jérusalem.
  '13':
  - type: text
    content: Que toute chair fasse silence devant l’Éternel!
  - type: text
    content: Car il s’est réveillé de sa demeure sainte.
  '2':
  - type: text
    content: 'Je dis: Où vas-tu? Et il me dit: Je vais mesurer Jérusalem, pour voir de quelle largeur et de quelle longueur elle doit être. '
  '3':
  - type: text
    content: 'Et voici, l’ange qui parlait avec moi s’avança, et un autre ange vint à sa rencontre. '
  '4':
  - type: text
    content: 'Il lui dit: Cours, parle à ce jeune homme, et dis: Jérusalem sera une ville ouverte, à cause de la multitude d’hommes et de bêtes qui seront au milieu d’elle; '
  '5':
  - type: text
    content: je serai pour elle, dit l’Éternel, une muraille de feu tout autour, et je serai sa gloire au milieu d’elle.
  - type: heading
    content: 'V. 6-13: cf. Jé 50:8, 9. És 14:1, 2. So 2:9, 10; 3:14, 15. Za 8:3, 20-23. És 2:1-3.'
  '6':
  - type: text
    content: Fuyez, fuyez du pays du septentrion!
  - type: text
    content: Dit l’Éternel.
  - type: text
    content: Car je vous ai dispersés aux quatre vents des cieux,
  - type: text
    content: Dit l’Éternel.
  '7':
  - type: text
    content: Sauve-toi, Sion,
  - type: text
    content: Toi qui habites chez la fille de Babylone!
  '8':
  - type: text
    content: 'Car ainsi parle l’Éternel des armées:'
  - type: text
    content: Après cela, viendra la gloire!
  - type: text
    content: Il m’a envoyé vers les nations qui vous ont dépouillés;
  - type: text
    content: Car celui qui vous touche touche la prunelle de son œil.
  '9':
  - type: text
    content: Voici, je lève ma main contre elles,
  - type: text
    content: Et elles seront la proie de ceux qui leur étaient asservis.
  - type: text
    content: Et vous saurez que l’Éternel des armées m’a envoyé.
