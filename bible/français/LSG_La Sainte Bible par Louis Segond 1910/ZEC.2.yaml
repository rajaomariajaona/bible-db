document_id: ZEC.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le cordeau à mesurer
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-5: cf. Za 1:16, 17. Jé 31:27, 38-40. És 4:5, 6.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Je levai les yeux et je regardai, et voici, il y avait un homme tenant dans la main un cordeau pour mesurer. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Je dis: Où vas-tu? Et il me dit: Je vais mesurer Jérusalem, pour voir de quelle largeur et de quelle longueur elle doit être. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Et voici, l’ange qui parlait avec moi s’avança, et un autre ange vint à sa rencontre. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il lui dit: Cours, parle à ce jeune homme, et dis: Jérusalem sera une ville ouverte, à cause de la multitude d’hommes et de bêtes qui seront au milieu d’elle; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: je serai pour elle, dit l’Éternel, une muraille de feu tout autour, et je serai sa gloire au milieu d’elle.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 6-13: cf. Jé 50:8, 9. És 14:1, 2. So 2:9, 10; 3:14, 15. Za 8:3, 20-23. És 2:1-3.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fuyez, fuyez du pays du septentrion!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car je vous ai dispersés aux quatre vents des cieux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Sauve-toi, Sion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toi qui habites chez la fille de Babylone!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Car ainsi parle l’Éternel des armées:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Après cela, viendra la gloire!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il m’a envoyé vers les nations qui vous ont dépouillés;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car celui qui vous touche touche la prunelle de son œil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Voici, je lève ma main contre elles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et elles seront la proie de ceux qui leur étaient asservis.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et vous saurez que l’Éternel des armées m’a envoyé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Pousse des cris d’allégresse et réjouis-toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fille de Sion!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Car voici, je viens, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 26:12
      metadata:
        usfm: LEV.26.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 37:27
      metadata:
        usfm: EZK.37.27
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 6:16
      metadata:
        usfm: 2CO.6.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: j’habiterai au milieu de toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dit l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Beaucoup de nations s’attacheront à l’Éternel en ce jour-là,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et deviendront mon peuple;
- type: usfm
  marker: q1
  children:
  - type: text
    text: J’habiterai au milieu de toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tu sauras que l’Éternel des armées m’a envoyé vers toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: L’Éternel possédera Juda comme sa part
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans la terre sainte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il choisira encore Jérusalem.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Que toute chair fasse silence devant l’Éternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car il s’est réveillé de sa demeure sainte.
