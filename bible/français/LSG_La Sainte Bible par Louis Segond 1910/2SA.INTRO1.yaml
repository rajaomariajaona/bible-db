  children:
  - type: text
    text: INTRODUCTION AU SECOND LIVRE DE SAMUEL
- type: usfm
  marker: ip
  children:
  - type: text
    text: Le deuxième livre de Samuel fait suite au premier. Il raconte le règne de David, roi d’Israël.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'D’abord le roi David entonna un cantique funèbre sur la mort de son ennemi Saül et de son ami Jonathan (1). Il devint ensuite roi de Juda pendant qu’un des fils de Saül, Isch-Boscheth, était roi d’Israël. Une guerre civile éclata et se solda par l’assassinat de ce dernier (2 à 4). David devint alors roi sur toutes les tribus avec résidence à Jérusalem (5). L’accession de David au pouvoir se passa sur fond d’intrigue politique: Abner, cousin de Saül et général en chef de son armée, installa d’abord sur le trône un fils de ce dernier au curieux nom d’Isch-Boscheth. Entre-temps, Akisch, le prince philistin de Gath, utilisait David contre la maison de Saül.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Ensuite David fit transporter l’arche à Jérusalem (6), il projeta de bâtir un temple à l’Éternel, qui s’y opposa et lui promit une royauté perpétuelle (7). Ce roi guerrier dut combattre successivement les Philistins, les Moabites, les Édomites, les Ammonites et leurs alliés (8 à 10).
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'David, resté à Jérusalem, enleva Bath-Schéba, femme du vaillant soldat Urie tué par la suite sur ordre royal (11). Malgré la repentance de David (12), son adultère ouvrit les portes à plusieurs péchés dans sa famille: l’inceste (13:1-22), le fratricide (13:23-39), les intrigues de succession (14), la révolte filiale, le coup d’État (15), la prise du pouvoir, la guerre civile (15–19).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: De retour à Jérusalem, David, humilié, continua à essuyer l’affront des ennemis de l’extérieur tels que Schéba le Benjaminite, le vengeur Joab (20). Il fit aussi face à une famine de trois ans et à la guerre contre les Philistins (21).
- type: usfm
  marker: ip
  children:
  - type: text
    text: Enfin, au crépuscule de sa vie, le roi David exécuta un cantique de délivrance (23) et prononça ses dernières paroles (24:1-7). Ce livre se termine par une liste de vaillants hommes de David (23:8-39) et par une peste causée par un certain recensement général sur ordre royal (24).
- type: usfm
  marker: ip
  children:
  - type: text
    text: '2 Samuel présente sans complaisance la vie d’une autorité: le bien-aimé de l’Éternel, le roi David. Ce livre nous montre la puissance, la gloire et la grandeur de David, et présente aussi ses faiblesses personnelles, familiales et nationales. Malgré une royauté tourmentée, David reçoit de Dieu par son prophète Nathan la promesse d’avoir toujours un descendant comme roi après lui.'
