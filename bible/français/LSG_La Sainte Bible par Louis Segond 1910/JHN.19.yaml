document_id: JHN.19,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Outrages des soldats. Jésus livré aux Juifs par Pilate
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-16: cf. (Mt 27:26-31. Mc 15:15-20. Lu 23:23-25.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 27:26
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 15:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Pilate prit Jésus, et le fit battre de verges. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pilate lui dit: Est-ce à moi que tu ne parles pas? Ne sais-tu pas que j’ai le pouvoir de te crucifier, et que j’ai le pouvoir de te relâcher? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus répondit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Tu n’aurais sur moi aucun pouvoir, s’il ne t’avait été donné d’en haut. C’est pourquoi celui qui me livre à toi commet un plus grand péché.
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dès ce moment, Pilate cherchait à le relâcher. Mais les Juifs criaient: Si tu le relâches, tu n’es pas ami de César. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 17:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Quiconque se fait roi se déclare contre César. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pilate, ayant entendu ces paroles, amena Jésus dehors; et il s’assit sur le tribunal, au lieu appelé le Pavé, et en hébreu Gabbatha. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’était la préparation de la Pâque, et environ la sixième heure. Pilate dit aux Juifs: Voici votre roi. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais ils s’écrièrent: Ote, ôte, crucifie-le! Pilate leur dit: Crucifierai-je votre roi? Les principaux sacrificateurs répondirent: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 49:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Nous n’avons de roi que César. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 27:26
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 15:22
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 23:24
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '25'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Alors il le leur livra pour être crucifié. Ils prirent donc Jésus, et l’emmenèrent.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus crucifié
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 17-30: cf. (Mt 27:32-50. Mc 15:21-37. Lu 23:26-46.) (Ga 3:13. 1 Pi 2:24.) Jn 1:29.'
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 27:31
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '33'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 15:22
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 23:26
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '33'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Jésus, portant sa croix, arriva au lieu du crâne, qui se nomme en hébreu Golgotha. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est là qu’il fut crucifié, et deux autres avec lui, un de chaque côté, et Jésus au milieu. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 27:37
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 15:26
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 23:38
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Pilate fit une inscription, qu’il plaça sur la croix, et qui était ainsi conçue: Jésus de Nazareth, roi des Juifs. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les soldats tressèrent une couronne d’épines qu’ils posèrent sur sa tête, et ils le revêtirent d’un manteau de pourpre; puis, s’approchant de lui, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Beaucoup de Juifs lurent cette inscription, parce que le lieu où Jésus fut crucifié était près de la ville: elle était en hébreu, en grec et en latin. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les principaux sacrificateurs des Juifs dirent à Pilate: N’écris pas: Roi des Juifs. Mais écris qu’il a dit: Je suis roi des Juifs. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pilate répondit: Ce que j’ai écrit, je l’ai écrit. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 27:35
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 15:24
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 23:34
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Les soldats, après avoir crucifié Jésus, prirent ses vêtements, et ils en firent quatre parts, une part pour chaque soldat. Ils prirent aussi sa tunique, qui était sans couture, d’un seul tissu depuis le haut jusqu’en bas. Et ils dirent entre eux: '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ne la déchirons pas, mais tirons au sort à qui elle sera. Cela arriva afin que s’accomplît cette parole de l’Écriture:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 22:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ils se sont partagé mes vêtements,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils ont tiré au sort ma tunique.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voilà ce que firent les soldats.
  '25':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 27:55
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 15:40
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 23:49
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Près de la croix de Jésus se tenaient sa mère et la sœur de sa mère, Marie, femme de Clopas, et Marie de Magdala. '
  '26':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Jésus, voyant sa mère, et auprès d’elle le disciple qu’il aimait, dit à sa mère: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Femme, voilà ton fils.
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Puis il dit au disciple: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Voilà ta mère.
    - type: text
      text: ' Et, dès ce moment, le disciple la prit chez lui. '
  '28':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Après cela, Jésus, qui savait que tout était déjà consommé, dit, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 69:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'afin que l’Écriture fût accomplie: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: J’ai soif.
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 27:48
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Il y avait là un vase plein de vinaigre. Les soldats en remplirent une éponge, et, l’ayant fixée à une branche d’hysope, ils l’approchèrent de sa bouche. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ils disaient: Salut, roi des Juifs! Et ils lui donnaient des soufflets. '
  '30':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Quand Jésus eut pris le vinaigre, il dit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 17:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Tout est accompli.
    - type: text
      text: ' Et, baissant la tête, il rendit l’esprit.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La mort de Jésus constatée
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 31-37: cf. (Mt 27:51-56. Mc 15:39-41. Lu 23:47-49.) 1 Co 15:3.'
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dans la crainte que les corps ne restassent sur la croix pendant le sabbat, car c’était la préparation, et ce jour de sabbat était un grand jour, les Juifs demandèrent à Pilate qu’on rompît les jambes aux crucifiés, et qu’on les enlevât. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les soldats vinrent donc, et ils rompirent les jambes au premier, puis à l’autre qui avait été crucifié avec lui. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'S’étant approchés de Jésus, et le voyant déjà mort, ils ne lui rompirent pas les jambes; '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mais un des soldats lui perça le côté avec une lance, et aussitôt '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Jn 5:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'il sortit du sang et de l’eau. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Celui qui l’a vu en a rendu témoignage, et son témoignage est vrai; et il sait qu’il dit vrai, afin que vous croyiez aussi. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ces choses sont arrivées, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 12:46
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: No 9:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'afin que l’Écriture fût accomplie:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aucun de ses os ne sera brisé.
  '37':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Et ailleurs l’Écriture dit encore:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Za 12:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ils verront celui qu’ils ont percé.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mise au sépulcre
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 38-42: cf. (Mt 27:57-61. Mc 15:42-47. Lu 23:50-56.)'
    marker-yv: yv-h
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 27:57
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 15:42
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 23:50
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Après cela, Joseph d’Arimathée, qui était disciple de Jésus, mais en secret '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 12:42
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'par crainte des Juifs, demanda à Pilate la permission de prendre le corps de Jésus. Et Pilate le permit. Il vint donc, et prit le corps de Jésus. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 3:1
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:50
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Nicodème, qui auparavant était allé de nuit vers Jésus, vint aussi, apportant un mélange d’environ cent livres de myrrhe et d’aloès. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pilate sortit de nouveau, et dit aux Juifs: Voici, je vous l’amène dehors, afin que vous sachiez que je ne trouve en lui aucun crime. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils prirent donc le corps de Jésus, et l’enveloppèrent de bandes, avec les aromates, comme c’est la coutume d’ensevelir chez les Juifs. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or, il y avait un jardin dans le lieu où Jésus avait été crucifié, et dans le jardin un sépulcre neuf, où personne encore n’avait été mis. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ce fut là qu’ils déposèrent Jésus, à cause de la préparation des Juifs, parce que le sépulcre était proche.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus sortit donc, portant la couronne d’épines et le manteau de pourpre. Et Pilate leur dit: Voici l’homme. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque les principaux sacrificateurs et les huissiers le virent, ils s’écrièrent: Crucifie! Crucifie! Pilate leur dit: Prenez-le vous-mêmes, et crucifiez-le; car moi, je ne trouve point de crime en lui. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les Juifs lui répondirent: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 24:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Nous avons une loi; et, selon notre loi, il doit mourir, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 5:18
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10:33
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'parce qu’il s’est fait Fils de Dieu. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand Pilate entendit cette parole, sa frayeur augmenta. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il rentra dans le prétoire, et il dit à Jésus: D’où es-tu? Mais Jésus ne lui donna point de réponse. '
