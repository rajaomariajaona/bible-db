document_id: JHN.19,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Outrages des soldats. Jésus livré aux Juifs par Pilate
  - type: heading
    content: 'V. 1-16: cf. (Mt 27:26-31. Mc 15:15-20. Lu 23:23-25.)'
  - type: text
    content: 'Alors '
  - type: note
    content: Mt 27:26. Mc 15:15.
  - type: text
    content: 'Pilate prit Jésus, et le fit battre de verges. '
  '10':
  - type: text
    content: 'Pilate lui dit: Est-ce à moi que tu ne parles pas? Ne sais-tu pas que j’ai le pouvoir de te crucifier, et que j’ai le pouvoir de te relâcher? '
  '11':
  - type: text
    content: 'Jésus répondit: '
  - type: text
    content: Tu n’aurais sur moi aucun pouvoir, s’il ne t’avait été donné d’en haut. C’est pourquoi celui qui me livre à toi commet un plus grand péché.
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'Dès ce moment, Pilate cherchait à le relâcher. Mais les Juifs criaient: Si tu le relâches, tu n’es pas ami de César. '
  - type: note
    content: Ac 17:7.
  - type: text
    content: 'Quiconque se fait roi se déclare contre César. '
  '13':
  - type: text
    content: 'Pilate, ayant entendu ces paroles, amena Jésus dehors; et il s’assit sur le tribunal, au lieu appelé le Pavé, et en hébreu Gabbatha. '
  '14':
  - type: text
    content: 'C’était la préparation de la Pâque, et environ la sixième heure. Pilate dit aux Juifs: Voici votre roi. '
  '15':
  - type: text
    content: 'Mais ils s’écrièrent: Ote, ôte, crucifie-le! Pilate leur dit: Crucifierai-je votre roi? Les principaux sacrificateurs répondirent: '
  - type: note
    content: Ge 49:10.
  - type: text
    content: 'Nous n’avons de roi que César. '
  '16':
  - type: note
    content: Mt 27:26. Mc 15:22. Lu 23:24, 25.
  - type: text
    content: Alors il le leur livra pour être crucifié. Ils prirent donc Jésus, et l’emmenèrent.
  - type: heading
    content: Jésus crucifié
  - type: heading
    content: 'V. 17-30: cf. (Mt 27:32-50. Mc 15:21-37. Lu 23:26-46.) (Ga 3:13. 1 Pi 2:24.) Jn 1:29.'
  '17':
  - type: text
    content: ' '
  - type: note
    content: Mt 27:31, 33. Mc 15:22. Lu 23:26, 33.
  - type: text
    content: 'Jésus, portant sa croix, arriva au lieu du crâne, qui se nomme en hébreu Golgotha. '
  '18':
  - type: text
    content: 'C’est là qu’il fut crucifié, et deux autres avec lui, un de chaque côté, et Jésus au milieu. '
  '19':
  - type: note
    content: Mt 27:37. Mc 15:26. Lu 23:38.
  - type: text
    content: 'Pilate fit une inscription, qu’il plaça sur la croix, et qui était ainsi conçue: Jésus de Nazareth, roi des Juifs. '
  '2':
  - type: text
    content: 'Les soldats tressèrent une couronne d’épines qu’ils posèrent sur sa tête, et ils le revêtirent d’un manteau de pourpre; puis, s’approchant de lui, '
  '20':
  - type: text
    content: 'Beaucoup de Juifs lurent cette inscription, parce que le lieu où Jésus fut crucifié était près de la ville: elle était en hébreu, en grec et en latin. '
  '21':
  - type: text
    content: 'Les principaux sacrificateurs des Juifs dirent à Pilate: N’écris pas: Roi des Juifs. Mais écris qu’il a dit: Je suis roi des Juifs. '
  '22':
  - type: text
    content: 'Pilate répondit: Ce que j’ai écrit, je l’ai écrit. '
  '23':
  - type: note
    content: Mt 27:35. Mc 15:24. Lu 23:34.
  - type: text
    content: 'Les soldats, après avoir crucifié Jésus, prirent ses vêtements, et ils en firent quatre parts, une part pour chaque soldat. Ils prirent aussi sa tunique, qui était sans couture, d’un seul tissu depuis le haut jusqu’en bas. Et ils dirent entre eux: '
  '24':
  - type: text
    content: 'Ne la déchirons pas, mais tirons au sort à qui elle sera. Cela arriva afin que s’accomplît cette parole de l’Écriture:'
  - type: note
    content: Ps 22:19.
  - type: text
    content: Ils se sont partagé mes vêtements,
  - type: text
    content: Et ils ont tiré au sort ma tunique.
  - type: text
    content: Voilà ce que firent les soldats.
  '25':
  - type: text
    content: ' '
  - type: note
    content: Mt 27:55. Mc 15:40. Lu 23:49.
  - type: text
    content: 'Près de la croix de Jésus se tenaient sa mère et la sœur de sa mère, Marie, femme de Clopas, et Marie de Magdala. '
  '26':
  - type: text
    content: 'Jésus, voyant sa mère, et auprès d’elle le disciple qu’il aimait, dit à sa mère: '
  - type: text
    content: Femme, voilà ton fils.
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'Puis il dit au disciple: '
  - type: text
    content: Voilà ta mère.
  - type: text
    content: ' Et, dès ce moment, le disciple la prit chez lui. '
  '28':
  - type: text
    content: 'Après cela, Jésus, qui savait que tout était déjà consommé, dit, '
  - type: note
    content: Ps 69:22.
  - type: text
    content: 'afin que l’Écriture fût accomplie: '
  - type: text
    content: J’ai soif.
  - type: text
    content: ' '
  '29':
  - type: note
    content: Mt 27:48.
  - type: text
    content: 'Il y avait là un vase plein de vinaigre. Les soldats en remplirent une éponge, et, l’ayant fixée à une branche d’hysope, ils l’approchèrent de sa bouche. '
  '3':
  - type: text
    content: 'ils disaient: Salut, roi des Juifs! Et ils lui donnaient des soufflets. '
  '30':
  - type: text
    content: 'Quand Jésus eut pris le vinaigre, il dit: '
  - type: note
    content: Jn 17:4.
  - type: text
    content: Tout est accompli.
  - type: text
    content: ' Et, baissant la tête, il rendit l’esprit.'
  - type: heading
    content: La mort de Jésus constatée
  - type: heading
    content: 'V. 31-37: cf. (Mt 27:51-56. Mc 15:39-41. Lu 23:47-49.) 1 Co 15:3.'
  '31':
  - type: text
    content: 'Dans la crainte que les corps ne restassent sur la croix pendant le sabbat, car c’était la préparation, et ce jour de sabbat était un grand jour, les Juifs demandèrent à Pilate qu’on rompît les jambes aux crucifiés, et qu’on les enlevât. '
  '32':
  - type: text
    content: 'Les soldats vinrent donc, et ils rompirent les jambes au premier, puis à l’autre qui avait été crucifié avec lui. '
  '33':
  - type: text
    content: 'S’étant approchés de Jésus, et le voyant déjà mort, ils ne lui rompirent pas les jambes; '
  '34':
  - type: text
    content: 'mais un des soldats lui perça le côté avec une lance, et aussitôt '
  - type: note
    content: 1 Jn 5:6.
  - type: text
    content: 'il sortit du sang et de l’eau. '
  '35':
  - type: text
    content: 'Celui qui l’a vu en a rendu témoignage, et son témoignage est vrai; et il sait qu’il dit vrai, afin que vous croyiez aussi. '
  '36':
  - type: text
    content: 'Ces choses sont arrivées, '
  - type: note
    content: Ex 12:46. No 9:12.
  - type: text
    content: 'afin que l’Écriture fût accomplie:'
  - type: text
    content: Aucun de ses os ne sera brisé.
  '37':
  - type: text
    content: 'Et ailleurs l’Écriture dit encore:'
  - type: note
    content: Za 12:10.
  - type: text
    content: Ils verront celui qu’ils ont percé.
  - type: heading
    content: Mise au sépulcre
  - type: heading
    content: 'V. 38-42: cf. (Mt 27:57-61. Mc 15:42-47. Lu 23:50-56.)'
  '38':
  - type: text
    content: ' '
  - type: note
    content: Mt 27:57. Mc 15:42. Lu 23:50.
  - type: text
    content: 'Après cela, Joseph d’Arimathée, qui était disciple de Jésus, mais en secret '
  - type: note
    content: Jn 12:42.
  - type: text
    content: 'par crainte des Juifs, demanda à Pilate la permission de prendre le corps de Jésus. Et Pilate le permit. Il vint donc, et prit le corps de Jésus. '
  '39':
  - type: note
    content: Jn 3:1; 7:50.
  - type: text
    content: 'Nicodème, qui auparavant était allé de nuit vers Jésus, vint aussi, apportant un mélange d’environ cent livres de myrrhe et d’aloès. '
  '4':
  - type: text
    content: 'Pilate sortit de nouveau, et dit aux Juifs: Voici, je vous l’amène dehors, afin que vous sachiez que je ne trouve en lui aucun crime. '
  '40':
  - type: text
    content: 'Ils prirent donc le corps de Jésus, et l’enveloppèrent de bandes, avec les aromates, comme c’est la coutume d’ensevelir chez les Juifs. '
  '41':
  - type: text
    content: 'Or, il y avait un jardin dans le lieu où Jésus avait été crucifié, et dans le jardin un sépulcre neuf, où personne encore n’avait été mis. '
  '42':
  - type: text
    content: Ce fut là qu’ils déposèrent Jésus, à cause de la préparation des Juifs, parce que le sépulcre était proche.
  '5':
  - type: text
    content: 'Jésus sortit donc, portant la couronne d’épines et le manteau de pourpre. Et Pilate leur dit: Voici l’homme. '
  '6':
  - type: text
    content: 'Lorsque les principaux sacrificateurs et les huissiers le virent, ils s’écrièrent: Crucifie! Crucifie! Pilate leur dit: Prenez-le vous-mêmes, et crucifiez-le; car moi, je ne trouve point de crime en lui. '
  '7':
  - type: text
    content: 'Les Juifs lui répondirent: '
  - type: note
    content: Lé 24:16.
  - type: text
    content: 'Nous avons une loi; et, selon notre loi, il doit mourir, '
  - type: note
    content: Jn 5:18; 10:33.
  - type: text
    content: 'parce qu’il s’est fait Fils de Dieu. '
  '8':
  - type: text
    content: 'Quand Pilate entendit cette parole, sa frayeur augmenta. '
  '9':
  - type: text
    content: 'Il rentra dans le prétoire, et il dit à Jésus: D’où es-tu? Mais Jésus ne lui donna point de réponse. '
