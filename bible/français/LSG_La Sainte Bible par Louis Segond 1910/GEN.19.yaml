document_id: GEN.19
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sodome et Gomorrhe
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-11: cf. (Hé 13:2. Ge 18:1-8.) (Ge 18:16-22. Éz 16:49, 50.) Jg 19.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Les deux anges arrivèrent à Sodome sur le soir; et Lot était assis à la porte de Sodome. Quand Lot les vit, il se leva pour aller au-devant d’eux, et se prosterna la face contre terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Puis il dit: Voici, mes seigneurs, entrez, je vous prie, dans la maison de votre serviteur, et passez-y la nuit; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 18:4
      metadata:
        usfm: GEN.18.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'lavez-vous les pieds; vous vous lèverez de bon matin, et vous poursuivrez votre route. Non, répondirent-ils, nous passerons la nuit dans la rue. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 13:2
      metadata:
        usfm: HEB.13.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Mais Lot les pressa tellement qu’ils vinrent chez lui et entrèrent dans sa maison. Il leur donna un festin, et fit cuire des pains sans levain. Et ils mangèrent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ils n’étaient pas encore couchés que les gens de la ville, les gens de Sodome, entourèrent la maison, depuis les enfants jusqu’aux vieillards; toute la population était accourue. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ils appelèrent Lot, et lui dirent: Où sont les hommes qui sont entrés chez toi cette nuit? Fais-les sortir vers nous, pour que nous les connaissions. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Lot sortit vers eux à l’entrée de la maison, et ferma la porte derrière lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Et il dit: Mes frères, je vous prie, ne faites pas le mal! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Voici, j’ai deux filles qui n’ont point connu d’homme; je vous les amènerai dehors, et vous leur ferez ce qu’il vous plaira. Seulement, ne faites rien à ces hommes puisqu’ils sont venus à l’ombre de mon toit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ils dirent: Retire-toi! Ils dirent encore: Celui-ci est venu comme étranger, et il veut '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 2:14
      metadata:
        usfm: EXO.2.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 7:27
      metadata:
        usfm: ACT.7.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'faire le juge! Eh bien, nous te ferons pis qu’à eux. Et, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Pi 2:7
      metadata:
        usfm: 2PE.2.7
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '8'
      metadata:
        usfm: 2PE.2.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'pressant Lot avec violence, ils s’avancèrent pour briser la porte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Les hommes étendirent la main, firent rentrer Lot vers eux dans la maison, et fermèrent la porte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Et ils frappèrent d’aveuglement les gens qui étaient à l’entrée de la maison, depuis le plus petit jusqu’au plus grand, de sorte qu’ils se donnèrent une peine inutile pour trouver la porte.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 12-29: cf. (Lu 17:28-32. 2 Pi 2:6-9. Jud 7.) Mt 11:23, 24.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Les hommes dirent à Lot: Qui as-tu encore ici? Gendres, fils et filles, et tout ce qui t’appartient dans la ville, fais-les sortir de ce lieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Car nous allons détruire ce lieu, parce que le cri contre ses habitants est grand devant l’Éternel. L’Éternel nous a envoyés pour le détruire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Lot sortit, et parla à ses gendres qui avaient pris ses filles: Levez-vous, dit-il, sortez de ce lieu; car l’Éternel va détruire la ville. Mais, aux yeux de ses gendres, il parut plaisanter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dès l’aube du jour, les anges insistèrent auprès de Lot, en disant: Lève-toi, prends ta femme et tes deux filles qui se trouvent ici, de peur que tu ne périsses dans la ruine de la ville. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Et comme il tardait, les hommes le saisirent par la main, lui, sa femme et ses deux filles, car l’Éternel voulait l’épargner; ils l’emmenèrent, et le laissèrent hors de la ville. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Après les avoir fait sortir, l’un d’eux dit: Sauve-toi, pour ta vie; ne regarde pas derrière toi, et ne t’arrête pas dans toute la plaine; sauve-toi vers la montagne, de peur que tu ne périsses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Lot leur dit: Oh! Non, Seigneur! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Voici, j’ai trouvé grâce à tes yeux, et tu as montré la grandeur de ta miséricorde à mon égard, en me conservant la vie; mais je ne puis me sauver à la montagne, avant que le désastre m’atteigne, et je périrai. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Voici, cette ville est assez proche pour que je m’y réfugie, et elle est petite. Oh! Que je puisse m’y sauver,… n’est-elle pas petite?… et que mon âme vive! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Et il lui dit: Voici, je t’accorde encore cette grâce, et je ne détruirai pas la ville dont tu parles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Hâte-toi de t’y réfugier, car je ne puis rien faire jusqu’à ce que tu y sois arrivé. C’est pour cela que l’on a donné à cette ville le nom de Tsoar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Le soleil se levait sur la terre, lorsque Lot entra dans Tsoar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Alors '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 29:23
      metadata:
        usfm: DEU.29.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 13:19
      metadata:
        usfm: ISA.13.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 20:16
      metadata:
        usfm: JER.20.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 50:40
      metadata:
        usfm: JER.50.40
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: La 4:6
      metadata:
        usfm: LAM.4.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 16:50
      metadata:
        usfm: EZK.16.50
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Os 11:8
      metadata:
        usfm: HOS.11.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Am 4:11
      metadata:
        usfm: AMO.4.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: So 2:9
      metadata:
        usfm: ZEP.2.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 17:29
      metadata:
        usfm: LUK.17.29
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Pi 2:6
      metadata:
        usfm: 2PE.2.6
    - type: text
      text: . Jud v. 7.
    marker-yv: yv-n
  - type: text
    text: 'l’Éternel fit pleuvoir du ciel sur Sodome et sur Gomorrhe du soufre et du feu, de par l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Il détruisit ces villes, toute la plaine et tous les habitants des villes, et les plantes de la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'La femme de Lot '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 17:32
      metadata:
        usfm: LUK.17.32
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'regarda en arrière, et elle devint une statue de sel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Abraham se leva de bon matin, pour aller au lieu où il s’était tenu en présence de l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Il porta ses regards du côté de Sodome et de Gomorrhe, et sur tout le territoire de la plaine; et voici, il vit s’élever de la terre une fumée, comme la fumée d’une fournaise. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Lorsque Dieu détruisit les villes de la plaine, il se souvint d’Abraham; et il fit échapper Lot du milieu du désastre, par lequel il bouleversa les villes où Lot avait établi sa demeure.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Origine des Moabites et des Ammonites
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 30-38: cf. (Ge 38:11-30. Ro 3:8.) 1 Co 15:33. (So 2:9.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Lot quitta Tsoar pour la hauteur, et se fixa sur la montagne, avec ses deux filles, car il craignait de rester à Tsoar. Il habita dans une caverne, lui et ses deux filles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'L’aînée dit à la plus jeune: Notre père est vieux; et il n’y a point d’homme dans la contrée, pour venir vers nous, selon l’usage de tous les pays. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Viens, faisons boire du vin à notre père, et couchons avec lui, afin que nous conservions la race de notre père. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Elles firent donc boire du vin à leur père cette nuit-là; et l’aînée alla coucher avec son père: il ne s’aperçut ni quand elle se coucha, ni quand elle se leva. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Le lendemain, l’aînée dit à la plus jeune: Voici, j’ai couché la nuit dernière avec mon père; faisons-lui boire du vin encore cette nuit, et va coucher avec lui, afin que nous conservions la race de notre père. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Elles firent boire du vin à leur père encore cette nuit-là; et la cadette alla coucher avec lui: il ne s’aperçut ni quand elle se coucha, ni quand elle se leva. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Les deux filles de Lot devinrent enceintes de leur père. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'L’aînée enfanta un fils, qu’elle appela du nom de Moab: c’est le père des Moabites, jusqu’à ce jour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'La plus jeune enfanta aussi un fils, qu’elle appela du nom de Ben-Ammi: c’est le père des Ammonites, jusqu’à ce jour.'
