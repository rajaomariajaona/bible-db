document_id: PRO.2,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-9: cf. Pr 4:1-13. Ja 1:5.'
  - type: text
    content: Mon fils, si tu reçois mes paroles,
  - type: text
    content: Et si tu gardes avec toi mes préceptes,
  '10':
  - type: text
    content: Car la sagesse viendra dans ton cœur,
  - type: text
    content: Et la connaissance fera les délices de ton âme;
  '11':
  - type: text
    content: La réflexion veillera sur toi,
  - type: text
    content: L’intelligence te gardera,
  '12':
  - type: text
    content: Pour te délivrer de la voie du mal,
  - type: text
    content: De l’homme qui tient des discours pervers,
  '13':
  - type: text
    content: De ceux qui abandonnent les sentiers de la droiture
  - type: text
    content: Afin de marcher dans des chemins ténébreux,
  '14':
  - type: text
    content: Qui trouvent de la jouissance à faire le mal,
  - type: text
    content: Qui mettent leur plaisir dans la perversité,
  '15':
  - type: text
    content: Qui suivent des sentiers détournés,
  - type: text
    content: Et qui prennent des routes tortueuses;
  '16':
  - type: text
    content: Pour te délivrer de la femme étrangère,
  - type: note
    content: Pr 5:3; 6:24; 7:5.
  - type: text
    content: De l’étrangère qui emploie des paroles doucereuses,
  '17':
  - type: text
    content: Qui abandonne l’ami de sa jeunesse,
  - type: text
    content: Et qui oublie l’alliance de son Dieu;
  '18':
  - type: text
    content: Car sa maison penche vers la mort,
  - type: text
    content: 'Et sa route mène chez les morts:'
  '19':
  - type: text
    content: Aucun de ceux qui vont à elle ne revient,
  - type: text
    content: Et ne retrouve les sentiers de la vie.
  '2':
  - type: text
    content: Si tu rends ton oreille attentive à la sagesse,
  - type: text
    content: Et si tu inclines ton cœur à l’intelligence;
  '20':
  - type: text
    content: Tu marcheras ainsi dans la voie des gens de bien,
  - type: text
    content: Tu garderas les sentiers des justes.
  '21':
  - type: text
    content: ' '
  - type: note
    content: Ps 37:29.
  - type: text
    content: Car les hommes droits habiteront le pays,
  - type: text
    content: Les hommes intègres y resteront;
  '22':
  - type: text
    content: ' '
  - type: note
    content: Job 18:17. Ps 104:35.
  - type: text
    content: Mais les méchants seront retranchés du pays,
  - type: text
    content: Les infidèles en seront arrachés.
  '3':
  - type: text
    content: Oui, si tu appelles la sagesse,
  - type: text
    content: Et si tu élèves ta voix vers l’intelligence,
  '4':
  - type: text
    content: ' '
  - type: note
    content: Mt 13:44.
  - type: text
    content: Si tu la cherches comme l’argent,
  - type: text
    content: Si tu la poursuis comme un trésor,
  '5':
  - type: text
    content: Alors tu comprendras la crainte de l’Éternel,
  - type: text
    content: Et tu trouveras la connaissance de Dieu.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 1 R 3:9, 12. Ja 1:5.
  - type: text
    content: Car l’Éternel donne la sagesse;
  - type: text
    content: De sa bouche sortent la connaissance et l’intelligence;
  '7':
  - type: text
    content: Il tient en réserve le salut pour les hommes droits,
  - type: text
    content: Un bouclier pour ceux qui marchent dans l’intégrité,
  '8':
  - type: text
    content: En protégeant les sentiers de la justice
  - type: text
    content: Et en gardant la voie de ses fidèles.
  '9':
  - type: text
    content: Alors tu comprendras la justice, l’équité,
  - type: text
    content: La droiture, toutes les routes qui mènent au bien.
  - type: heading
    content: 'V. 10-22: cf. Pr 4:13-27; 5:1-11.'
