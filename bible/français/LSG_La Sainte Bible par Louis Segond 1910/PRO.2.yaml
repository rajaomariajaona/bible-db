document_id: PRO.2
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-9: cf. Pr 4:1-13. Ja 1:5.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Mon fils, si tu reçois mes paroles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et si tu gardes avec toi mes préceptes,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Si tu rends ton oreille attentive à la sagesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et si tu inclines ton cœur à l’intelligence;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Oui, si tu appelles la sagesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et si tu élèves ta voix vers l’intelligence,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 13:44
      metadata:
        usfm: MAT.13.44
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Si tu la cherches comme l’argent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si tu la poursuis comme un trésor,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Alors tu comprendras la crainte de l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tu trouveras la connaissance de Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 3:9
      metadata:
        usfm: 1KI.3.9
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '12'
      metadata:
        usfm: 1KI.3.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ja 1:5
      metadata:
        usfm: JAS.1.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Car l’Éternel donne la sagesse;
- type: usfm
  marker: q1
  children:
  - type: text
    text: De sa bouche sortent la connaissance et l’intelligence;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il tient en réserve le salut pour les hommes droits,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Un bouclier pour ceux qui marchent dans l’intégrité,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: En protégeant les sentiers de la justice
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et en gardant la voie de ses fidèles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Alors tu comprendras la justice, l’équité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La droiture, toutes les routes qui mènent au bien.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 10-22: cf. Pr 4:13-27; 5:1-11.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Car la sagesse viendra dans ton cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la connaissance fera les délices de ton âme;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: La réflexion veillera sur toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’intelligence te gardera,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Pour te délivrer de la voie du mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De l’homme qui tient des discours pervers,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: De ceux qui abandonnent les sentiers de la droiture
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afin de marcher dans des chemins ténébreux,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Qui trouvent de la jouissance à faire le mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui mettent leur plaisir dans la perversité,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Qui suivent des sentiers détournés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui prennent des routes tortueuses;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Pour te délivrer de la femme étrangère,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 5:3
      metadata:
        usfm: PRO.5.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 6:24
      metadata:
        usfm: PRO.6.24
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 7:5
      metadata:
        usfm: PRO.7.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: De l’étrangère qui emploie des paroles doucereuses,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Qui abandonne l’ami de sa jeunesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui oublie l’alliance de son Dieu;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Car sa maison penche vers la mort,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et sa route mène chez les morts:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Aucun de ceux qui vont à elle ne revient,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ne retrouve les sentiers de la vie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tu marcheras ainsi dans la voie des gens de bien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu garderas les sentiers des justes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 37:29
      metadata:
        usfm: PSA.37.29
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Car les hommes droits habiteront le pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les hommes intègres y resteront;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 18:17
      metadata:
        usfm: JOB.18.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 104:35
      metadata:
        usfm: PSA.104.35
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Mais les méchants seront retranchés du pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les infidèles en seront arrachés.
