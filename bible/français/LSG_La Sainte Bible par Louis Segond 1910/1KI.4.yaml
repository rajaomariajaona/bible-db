document_id: 1KI.4,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Hauts fonctionnaires de Salomon
  - type: heading
    content: 'V. 1-6: cf. (2 S 8:15-18; 20:23-26.) 1 Co 12:4-11.'
  - type: text
    content: 'Le roi Salomon était roi sur tout Israël. '
  '10':
  - type: text
    content: 'Le fils de Hésed, à Arubboth; il avait Soco et tout le pays de Hépher. '
  '11':
  - type: text
    content: 'Le fils d’Abinadab avait toute la contrée de Dor. Thaphath, fille de Salomon, était sa femme. '
  '12':
  - type: text
    content: 'Baana, fils d’Achilud, avait Thaanac et Meguiddo, et tout Beth-Schean qui est près de Tsarthan au-dessous de Jizreel, depuis Beth-Schean jusqu’à Abel-Mehola, jusqu’au-delà de Jokmeam. '
  '13':
  - type: text
    content: 'Le fils de Guéber, à Ramoth en Galaad; il avait les bourgs de Jaïr, fils de Manassé, en Galaad; il avait encore la contrée d’Argob en Basan, soixante grandes villes à murailles et à barres d’airain. '
  '14':
  - type: text
    content: 'Achinadab, fils d’Iddo, à Mahanaïm. '
  '15':
  - type: text
    content: 'Achimaats, en Nephthali. Il avait pris pour femme Basmath, fille de Salomon. '
  '16':
  - type: text
    content: 'Baana, fils de Huschaï, en Aser et à Bealoth. '
  '17':
  - type: text
    content: 'Josaphat, fils de Paruach, en Issacar. '
  '18':
  - type: text
    content: 'Schimeï, fils d’Éla, en Benjamin. '
  '19':
  - type: text
    content: Guéber, fils d’Uri, dans le pays de Galaad; il avait la contrée de Sihon, roi des Amoréens, et d’Og, roi de Basan. Il y avait un seul intendant pour ce pays.
  - type: heading
    content: 'V. 20-28: cf. (Ge 22:17; 15:18.) Ps 72.'
  '2':
  - type: text
    content: 'Voici les chefs qu’il avait à son service. Azaria, fils du sacrificateur Tsadok, '
  '20':
  - type: text
    content: 'Juda et Israël étaient très nombreux, pareils au sable qui est sur le bord de la mer. Ils mangeaient, buvaient et se réjouissaient. '
  '21':
  - type: text
    content: 'Salomon dominait encore sur tous les royaumes depuis le fleuve jusqu’au pays des Philistins et jusqu’à la frontière d’Égypte; ils apportaient des présents, et ils furent assujettis à Salomon tout le temps de sa vie. '
  '22':
  - type: text
    content: 'Chaque jour Salomon consommait en vivres: trente cors de fleur de farine et soixante cors de farine, '
  '23':
  - type: text
    content: 'dix bœufs gras, vingt bœufs de pâturage, et cent brebis, outre les cerfs, les gazelles, les daims, et les volailles engraissées. '
  '24':
  - type: text
    content: 'Il dominait sur tout le pays de l’autre côté du fleuve, depuis Thiphsach jusqu’à Gaza, sur tous les rois de l’autre côté du fleuve. Et il avait la paix de tous les côtés alentour. '
  '25':
  - type: text
    content: 'Juda et Israël, depuis Dan jusqu’à Beer-Schéba, '
  - type: note
    content: Lé 26:5.
  - type: text
    content: 'habitèrent en sécurité, chacun sous sa vigne et sous son figuier, tout le temps de Salomon. '
  '26':
  - type: note
    content: 2 Ch 1:14; 9:25.
  - type: text
    content: 'Salomon avait quarante mille crèches pour les chevaux destinés à ses chars, et douze mille cavaliers. '
  '27':
  - type: text
    content: 'Les intendants pourvoyaient à l’entretien du roi Salomon et de tous ceux qui s’approchaient de sa table, chacun pendant son mois; ils ne laissaient manquer de rien. '
  '28':
  - type: text
    content: Ils faisaient aussi venir de l’orge et de la paille pour les chevaux et les coursiers dans le lieu où se trouvait le roi, chacun selon les ordres qu’il avait reçus.
  - type: heading
    content: Sa grandeur, sa renommée et sa sagesse
  - type: heading
    content: 'V. 29-34: cf. (1 R 3:5-14; 10:1-9, 23, 24.)'
  '29':
  - type: text
    content: 'Dieu donna à Salomon de la sagesse, une très grande intelligence, et des connaissances multipliées comme le sable qui est au bord de la mer. '
  '3':
  - type: text
    content: 'Élihoreph et Achija, fils de Schischa, étaient secrétaires; Josaphat, fils d’Achilud, était archiviste; '
  '30':
  - type: text
    content: 'La sagesse de Salomon surpassait la sagesse de tous les fils de l’Orient et toute la sagesse des Égyptiens. '
  '31':
  - type: text
    content: 'Il était plus sage qu’aucun homme, plus qu’Éthan, l’Ezrachite, plus qu’Héman, Calcol et Darda, les fils de Machol; et sa renommée était répandue parmi toutes les nations d’alentour. '
  '32':
  - type: text
    content: 'Il a prononcé trois mille sentences, et composé mille cinq cantiques. '
  '33':
  - type: text
    content: 'Il a parlé sur les arbres, depuis le cèdre du Liban jusqu’à l’hysope qui sort de la muraille; il a aussi parlé sur les animaux, sur les oiseaux, sur les reptiles et sur les poissons. '
  '34':
  - type: text
    content: Il venait des gens de tous les peuples pour entendre la sagesse de Salomon, de la part de tous les rois de la terre qui avaient entendu parler de sa sagesse.
  '4':
  - type: text
    content: 'Benaja, fils de Jehojada, commandait l’armée; Tsadok et Abiathar étaient sacrificateurs; '
  '5':
  - type: text
    content: 'Azaria, fils de Nathan, était chef des intendants; Zabud, fils de Nathan, était ministre d’état, favori du roi; '
  '6':
  - type: text
    content: 'Achischar était chef de la maison du roi; et '
  - type: note
    content: 1 R 5:14; 12:18.
  - type: text
    content: Adoniram, fils d’Abda, était préposé sur les impôts.
  - type: heading
    content: 'V. 7-19: cf. 1 Ch 27:25-31. (1 Co 12:7; 14:33.)'
  '7':
  - type: text
    content: 'Salomon avait douze intendants sur tout Israël. Ils pourvoyaient à l’entretien du roi et de sa maison, chacun pendant un mois de l’année. '
  '8':
  - type: text
    content: 'Voici leurs noms. Le fils de Hur, dans la montagne d’Éphraïm. '
  '9':
  - type: text
    content: 'Le fils de Déker, à Makats, à Saalbim, à Beth-Schémesch, à Élon et à Beth-Hanan. '
