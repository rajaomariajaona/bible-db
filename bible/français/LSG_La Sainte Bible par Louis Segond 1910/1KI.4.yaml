document_id: 1KI.4,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hauts fonctionnaires de Salomon
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-6: cf. (2 S 8:15-18; 20:23-26.) 1 Co 12:4-11.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Le roi Salomon était roi sur tout Israël. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Le fils de Hésed, à Arubboth; il avait Soco et tout le pays de Hépher. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Le fils d’Abinadab avait toute la contrée de Dor. Thaphath, fille de Salomon, était sa femme. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Baana, fils d’Achilud, avait Thaanac et Meguiddo, et tout Beth-Schean qui est près de Tsarthan au-dessous de Jizreel, depuis Beth-Schean jusqu’à Abel-Mehola, jusqu’au-delà de Jokmeam. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Le fils de Guéber, à Ramoth en Galaad; il avait les bourgs de Jaïr, fils de Manassé, en Galaad; il avait encore la contrée d’Argob en Basan, soixante grandes villes à murailles et à barres d’airain. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Achinadab, fils d’Iddo, à Mahanaïm. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Achimaats, en Nephthali. Il avait pris pour femme Basmath, fille de Salomon. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Baana, fils de Huschaï, en Aser et à Bealoth. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Josaphat, fils de Paruach, en Issacar. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Schimeï, fils d’Éla, en Benjamin. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Guéber, fils d’Uri, dans le pays de Galaad; il avait la contrée de Sihon, roi des Amoréens, et d’Og, roi de Basan. Il y avait un seul intendant pour ce pays.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 20-28: cf. (Ge 22:17; 15:18.) Ps 72.'
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Voici les chefs qu’il avait à son service. Azaria, fils du sacrificateur Tsadok, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Juda et Israël étaient très nombreux, pareils au sable qui est sur le bord de la mer. Ils mangeaient, buvaient et se réjouissaient. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Salomon dominait encore sur tous les royaumes depuis le fleuve jusqu’au pays des Philistins et jusqu’à la frontière d’Égypte; ils apportaient des présents, et ils furent assujettis à Salomon tout le temps de sa vie. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Chaque jour Salomon consommait en vivres: trente cors de fleur de farine et soixante cors de farine, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'dix bœufs gras, vingt bœufs de pâturage, et cent brebis, outre les cerfs, les gazelles, les daims, et les volailles engraissées. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Il dominait sur tout le pays de l’autre côté du fleuve, depuis Thiphsach jusqu’à Gaza, sur tous les rois de l’autre côté du fleuve. Et il avait la paix de tous les côtés alentour. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Juda et Israël, depuis Dan jusqu’à Beer-Schéba, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lé 26:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'habitèrent en sécurité, chacun sous sa vigne et sous son figuier, tout le temps de Salomon. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 1:14
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:25
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Salomon avait quarante mille crèches pour les chevaux destinés à ses chars, et douze mille cavaliers. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Les intendants pourvoyaient à l’entretien du roi Salomon et de tous ceux qui s’approchaient de sa table, chacun pendant son mois; ils ne laissaient manquer de rien. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Ils faisaient aussi venir de l’orge et de la paille pour les chevaux et les coursiers dans le lieu où se trouvait le roi, chacun selon les ordres qu’il avait reçus.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sa grandeur, sa renommée et sa sagesse
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 29-34: cf. (1 R 3:5-14; 10:1-9, 23, 24.)'
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Dieu donna à Salomon de la sagesse, une très grande intelligence, et des connaissances multipliées comme le sable qui est au bord de la mer. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Élihoreph et Achija, fils de Schischa, étaient secrétaires; Josaphat, fils d’Achilud, était archiviste; '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'La sagesse de Salomon surpassait la sagesse de tous les fils de l’Orient et toute la sagesse des Égyptiens. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Il était plus sage qu’aucun homme, plus qu’Éthan, l’Ezrachite, plus qu’Héman, Calcol et Darda, les fils de Machol; et sa renommée était répandue parmi toutes les nations d’alentour. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Il a prononcé trois mille sentences, et composé mille cinq cantiques. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Il a parlé sur les arbres, depuis le cèdre du Liban jusqu’à l’hysope qui sort de la muraille; il a aussi parlé sur les animaux, sur les oiseaux, sur les reptiles et sur les poissons. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Il venait des gens de tous les peuples pour entendre la sagesse de Salomon, de la part de tous les rois de la terre qui avaient entendu parler de sa sagesse.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Benaja, fils de Jehojada, commandait l’armée; Tsadok et Abiathar étaient sacrificateurs; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Azaria, fils de Nathan, était chef des intendants; Zabud, fils de Nathan, était ministre d’état, favori du roi; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Achischar était chef de la maison du roi; et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 5:14
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 12:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Adoniram, fils d’Abda, était préposé sur les impôts.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 7-19: cf. 1 Ch 27:25-31. (1 Co 12:7; 14:33.)'
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Salomon avait douze intendants sur tout Israël. Ils pourvoyaient à l’entretien du roi et de sa maison, chacun pendant un mois de l’année. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Voici leurs noms. Le fils de Hur, dans la montagne d’Éphraïm. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Le fils de Déker, à Makats, à Saalbim, à Beth-Schémesch, à Élon et à Beth-Hanan. '
