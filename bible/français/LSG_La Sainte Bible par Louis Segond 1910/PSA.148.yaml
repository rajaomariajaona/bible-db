document_id: PSA.148,93
type_code: fra
verses:
  '1':
  - type: heading
    content: (Ps 103:20-22; 113:1-4.) (Ap 4:8-11; 5:11-14.)
  - type: text
    content: Louez l’Éternel!
  - type: text
    content: 'Louez l’Éternel '
  - type: note
    content: Ap 5:13.
  - type: text
    content: du haut des cieux!
  - type: text
    content: 'Louez-le '
  - type: note
    content: Lu 2:14.
  - type: text
    content: dans les lieux élevés!
  '10':
  - type: text
    content: Animaux et tout le bétail,
  - type: text
    content: Reptiles et oiseaux ailés,
  '11':
  - type: text
    content: Rois de la terre et tous les peuples,
  - type: text
    content: Princes et tous les juges de la terre,
  '12':
  - type: text
    content: Jeunes hommes et jeunes filles,
  - type: text
    content: Vieillards et enfants!
  '13':
  - type: text
    content: Qu’ils louent le nom de l’Éternel!
  - type: note
    content: Pr 18:10. És 12:4.
  - type: text
    content: Car son nom seul est élevé;
  - type: text
    content: Sa majesté est au-dessus de la terre et des cieux.
  '14':
  - type: text
    content: ' '
  - type: note
    content: Ps 132:17.
  - type: text
    content: 'Il a relevé la force de son peuple:'
  - type: text
    content: Sujet de louange pour tous ses fidèles,
  - type: text
    content: Pour les enfants d’Israël, du peuple qui est près de lui.
  - type: text
    content: Louez l’Éternel!
  '2':
  - type: text
    content: Louez-le, vous tous ses anges!
  - type: text
    content: Louez-le, vous toutes ses armées!
  '3':
  - type: text
    content: Louez-le, soleil et lune!
  - type: text
    content: Louez-le, vous toutes, étoiles lumineuses!
  '4':
  - type: text
    content: Louez-le, cieux des cieux,
  - type: text
    content: Et vous, eaux qui êtes au-dessus des cieux!
  '5':
  - type: text
    content: Qu’ils louent le nom de l’Éternel!
  - type: note
    content: Ge 1:6, 7, 8, etc. Ps 33:6, 9.
  - type: text
    content: Car il a commandé, et ils ont été créés.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Ps 104:5; 119:91.
  - type: text
    content: Il les a affermis pour toujours et à perpétuité;
  - type: note
    content: Job 14:5, 13; 26:10; 38:33. Jé 31:35; 33:25.
  - type: text
    content: Il a donné des lois, et il ne les violera point.
  '7':
  - type: text
    content: Louez l’Éternel du bas de la terre,
  - type: text
    content: Monstres marins, et vous tous, abîmes,
  '8':
  - type: text
    content: Feu et grêle, neige et brouillards,
  - type: text
    content: Vents impétueux, qui exécutez ses ordres,
  '9':
  - type: text
    content: Montagnes et toutes les collines,
  - type: text
    content: Arbres fruitiers et tous les cèdres,
