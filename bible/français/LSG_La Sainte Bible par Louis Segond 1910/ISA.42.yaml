document_id: ISA.42,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Le serviteur de l’Éternel
  - type: heading
    content: 'V. 1-12: cf. És 49:1-9. (Mt 12:15-21. Ro 15:8-12.)'
  - type: text
    content: Voici mon serviteur, que je soutiendrai,
  - type: text
    content: 'Mon élu, en qui mon âme '
  - type: note
    content: Mt 3:17; 17:5. Ép 1:6.
  - type: text
    content: prend plaisir.
  - type: note
    content: És 11:2. Jn 3:34.
  - type: text
    content: J’ai mis mon esprit sur lui;
  - type: text
    content: Il annoncera la justice aux nations.
  '10':
  - type: text
    content: ' '
  - type: note
    content: Ps 33:3.
  - type: text
    content: Chantez à l’Éternel un cantique nouveau,
  - type: text
    content: Chantez ses louanges aux extrémités de la terre,
  - type: text
    content: Vous qui voguez sur la mer et vous qui la peuplez,
  - type: text
    content: Iles et habitants des îles!
  '11':
  - type: text
    content: Que le désert et ses villes élèvent la voix!
  - type: text
    content: Que les villages occupés par Kédar élèvent la voix!
  - type: text
    content: Que les habitants des rochers tressaillent d’allégresse!
  - type: text
    content: Que du sommet des montagnes retentissent des cris de joie!
  '12':
  - type: text
    content: Qu’on rende gloire à l’Éternel,
  - type: text
    content: Et que dans les îles on publie ses louanges!
  - type: heading
    content: 'V. 13-17: cf. Jé 50:1, etc. (2 Co 10:4, 5. Ap 6:2.)'
  '13':
  - type: text
    content: L’Éternel s’avance comme un héros,
  - type: text
    content: Il excite son ardeur comme un homme de guerre;
  - type: text
    content: Il élève la voix, il jette des cris,
  - type: text
    content: Il manifeste sa force contre ses ennemis.
  '14':
  - type: text
    content: J’ai longtemps gardé le silence,
  - type: text
    content: Je me suis tu, je me suis contenu;
  - type: text
    content: Je crierai comme une femme en travail,
  - type: text
    content: Je serai haletant et je soufflerai tout à la fois.
  '15':
  - type: text
    content: Je ravagerai montagnes et collines,
  - type: text
    content: Et j’en dessécherai toute la verdure;
  - type: text
    content: Je changerai les fleuves en terre ferme,
  - type: text
    content: Et je mettrai les étangs à sec.
  '16':
  - type: text
    content: Je ferai marcher les aveugles sur un chemin qu’ils ne connaissent pas,
  - type: text
    content: Je les conduirai par des sentiers qu’ils ignorent;
  - type: text
    content: Je changerai devant eux les ténèbres en lumière,
  - type: note
    content: És 40:3, 4.
  - type: text
    content: 'Et les endroits tortueux en plaine:'
  - type: text
    content: Voilà ce que je ferai, et je ne les abandonnerai point.
  '17':
  - type: text
    content: ' '
  - type: note
    content: Ps 97:7. És 1:29; 44:11; 45:16.
  - type: text
    content: Ils reculeront, ils seront confus,
  - type: text
    content: Ceux qui se confient aux idoles taillées,
  - type: text
    content: 'Ceux qui disent aux idoles de fonte:'
  - type: text
    content: Vous êtes nos dieux!
  - type: heading
    content: 'V. 18-25: cf. Mt 13:9-15. De 28:30-34. Am 4:6-11.'
  '18':
  - type: text
    content: Sourds, écoutez!
  - type: text
    content: Aveugles, regardez et voyez!
  '19':
  - type: text
    content: Qui est aveugle, sinon mon serviteur,
  - type: text
    content: Et sourd comme mon messager que j’envoie?
  - type: text
    content: Qui est aveugle, comme l’ami de Dieu,
  - type: text
    content: Aveugle comme le serviteur de l’Éternel?
  '2':
  - type: text
    content: Il ne criera point, il n’élèvera point la voix,
  - type: text
    content: Et ne la fera point entendre dans les rues.
  '20':
  - type: text
    content: 'Tu as vu beaucoup de choses, '
  - type: note
    content: Ro 2:2, etc.
  - type: text
    content: mais tu n’y as point pris garde;
  - type: text
    content: On a ouvert les oreilles, mais on n’a point entendu.
  '21':
  - type: text
    content: L’Éternel a voulu, pour le bonheur d’Israël,
  - type: text
    content: Publier une loi grande et magnifique.
  '22':
  - type: text
    content: Et c’est un peuple pillé et dépouillé!
  - type: text
    content: On les a tous enchaînés dans des cavernes,
  - type: text
    content: Plongés dans des cachots;
  - type: text
    content: Ils ont été mis au pillage, et personne qui les délivre!
  - type: text
    content: 'Dépouillés, et personne qui dise: Restitue!'
  '23':
  - type: text
    content: Qui parmi vous prêtera l’oreille à ces choses?
  - type: text
    content: Qui voudra s’y rendre attentif et écouter à l’avenir?
  '24':
  - type: text
    content: Qui a livré Jacob au pillage,
  - type: text
    content: Et Israël aux pillards?
  - type: text
    content: N’est-ce pas l’Éternel?
  - type: text
    content: Nous avons péché contre lui.
  - type: text
    content: Ils n’ont point voulu marcher dans ses voies,
  - type: text
    content: Et ils n’ont point écouté sa loi.
  '25':
  - type: text
    content: Aussi a-t-il versé sur Israël l’ardeur de sa colère
  - type: text
    content: Et la violence de la guerre;
  - type: text
    content: La guerre l’a embrasé de toutes parts, et il n’a point compris;
  - type: text
    content: Elle l’a consumé, et il n’y a point pris garde.
  '3':
  - type: text
    content: Il ne brisera point le roseau cassé,
  - type: text
    content: Et il n’éteindra point la mèche qui brûle encore;
  - type: text
    content: Il annoncera la justice selon la vérité.
  '4':
  - type: text
    content: Il ne se découragera point et ne se relâchera point,
  - type: text
    content: Jusqu’à ce qu’il ait établi la justice sur la terre,
  - type: text
    content: Et que les îles espèrent en sa loi.
  '5':
  - type: text
    content: Ainsi parle Dieu, l’Éternel,
  - type: text
    content: Qui a créé les cieux et qui les a déployés,
  - type: text
    content: Qui a étendu la terre et ses productions,
  - type: text
    content: Qui a donné la respiration à ceux qui la peuplent,
  - type: text
    content: Et le souffle à ceux qui y marchent.
  '6':
  - type: text
    content: Moi, l’Éternel, je t’ai appelé pour le salut,
  - type: text
    content: Et je te prendrai par la main,
  - type: text
    content: Je te garderai, et je t’établirai pour traiter alliance avec le peuple,
  - type: text
    content: Pour être la lumière des nations,
  '7':
  - type: text
    content: Pour ouvrir les yeux des aveugles,
  - type: text
    content: Pour faire sortir de prison le captif,
  - type: text
    content: Et de leur cachot ceux qui habitent dans les ténèbres.
  '8':
  - type: text
    content: Je suis l’Éternel, c’est là mon nom;
  - type: note
    content: És 48:11.
  - type: text
    content: Et je ne donnerai pas ma gloire à un autre,
  - type: text
    content: Ni mon honneur aux idoles.
  '9':
  - type: text
    content: Voici, les premières choses se sont accomplies,
  - type: text
    content: Et je vous en annonce de nouvelles;
  - type: text
    content: Avant qu’elles arrivent, je vous les prédis.
  - type: heading
    content: Le cantique nouveau
