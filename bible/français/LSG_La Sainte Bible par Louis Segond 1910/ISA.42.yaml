document_id: ISA.42,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le serviteur de l’Éternel
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-12: cf. És 49:1-9. (Mt 12:15-21. Ro 15:8-12.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Voici mon serviteur, que je soutiendrai,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mon élu, en qui mon âme '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 3:17
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 17:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 1:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: prend plaisir.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 11:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 3:34
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: J’ai mis mon esprit sur lui;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il annoncera la justice aux nations.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 33:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Chantez à l’Éternel un cantique nouveau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Chantez ses louanges aux extrémités de la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous qui voguez sur la mer et vous qui la peuplez,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Iles et habitants des îles!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que le désert et ses villes élèvent la voix!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que les villages occupés par Kédar élèvent la voix!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que les habitants des rochers tressaillent d’allégresse!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que du sommet des montagnes retentissent des cris de joie!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’on rende gloire à l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que dans les îles on publie ses louanges!
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 13-17: cf. Jé 50:1, etc. (2 Co 10:4, 5. Ap 6:2.)'
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel s’avance comme un héros,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il excite son ardeur comme un homme de guerre;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il élève la voix, il jette des cris,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il manifeste sa force contre ses ennemis.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai longtemps gardé le silence,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je me suis tu, je me suis contenu;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je crierai comme une femme en travail,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je serai haletant et je soufflerai tout à la fois.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ravagerai montagnes et collines,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et j’en dessécherai toute la verdure;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je changerai les fleuves en terre ferme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je mettrai les étangs à sec.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ferai marcher les aveugles sur un chemin qu’ils ne connaissent pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je les conduirai par des sentiers qu’ils ignorent;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je changerai devant eux les ténèbres en lumière,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 40:3
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '4'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Et les endroits tortueux en plaine:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voilà ce que je ferai, et je ne les abandonnerai point.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 97:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 1:29
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 44:11
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 45:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Ils reculeront, ils seront confus,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux qui se confient aux idoles taillées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ceux qui disent aux idoles de fonte:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous êtes nos dieux!
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 18-25: cf. Mt 13:9-15. De 28:30-34. Am 4:6-11.'
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sourds, écoutez!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aveugles, regardez et voyez!
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui est aveugle, sinon mon serviteur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et sourd comme mon messager que j’envoie?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui est aveugle, comme l’ami de Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aveugle comme le serviteur de l’Éternel?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne criera point, il n’élèvera point la voix,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ne la fera point entendre dans les rues.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tu as vu beaucoup de choses, '
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ro 2:2, etc.
      marker-yv: yv-n
    - type: text
      text: mais tu n’y as point pris garde;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On a ouvert les oreilles, mais on n’a point entendu.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel a voulu, pour le bonheur d’Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Publier une loi grande et magnifique.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et c’est un peuple pillé et dépouillé!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On les a tous enchaînés dans des cavernes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Plongés dans des cachots;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ont été mis au pillage, et personne qui les délivre!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dépouillés, et personne qui dise: Restitue!'
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui parmi vous prêtera l’oreille à ces choses?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui voudra s’y rendre attentif et écouter à l’avenir?
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui a livré Jacob au pillage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et Israël aux pillards?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N’est-ce pas l’Éternel?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous avons péché contre lui.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils n’ont point voulu marcher dans ses voies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils n’ont point écouté sa loi.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aussi a-t-il versé sur Israël l’ardeur de sa colère
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et la violence de la guerre;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La guerre l’a embrasé de toutes parts, et il n’a point compris;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle l’a consumé, et il n’y a point pris garde.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne brisera point le roseau cassé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il n’éteindra point la mèche qui brûle encore;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il annoncera la justice selon la vérité.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne se découragera point et ne se relâchera point,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jusqu’à ce qu’il ait établi la justice sur la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et que les îles espèrent en sa loi.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi parle Dieu, l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui a créé les cieux et qui les a déployés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui a étendu la terre et ses productions,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui a donné la respiration à ceux qui la peuplent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le souffle à ceux qui y marchent.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moi, l’Éternel, je t’ai appelé pour le salut,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je te prendrai par la main,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je te garderai, et je t’établirai pour traiter alliance avec le peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour être la lumière des nations,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour ouvrir les yeux des aveugles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour faire sortir de prison le captif,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et de leur cachot ceux qui habitent dans les ténèbres.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis l’Éternel, c’est là mon nom;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 48:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Et je ne donnerai pas ma gloire à un autre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ni mon honneur aux idoles.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, les premières choses se sont accomplies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et je vous en annonce de nouvelles;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avant qu’elles arrivent, je vous les prédis.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le cantique nouveau
    marker-yv: yv-h
