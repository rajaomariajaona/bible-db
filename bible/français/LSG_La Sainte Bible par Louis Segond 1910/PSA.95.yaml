document_id: PSA.95
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: Ps 100; 81. (Hé 3:6-19; 4:1-11.)
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Venez, chantons avec allégresse à l’Éternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Poussons des cris de joie vers le rocher de notre salut.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Allons au-devant de lui avec des louanges,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Faisons retentir des cantiques en son honneur!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Car l’Éternel est un grand Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est un grand roi au-dessus de tous les dieux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 26:6
      metadata:
        usfm: JOB.26.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Il tient dans sa main les profondeurs de la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les sommets des montagnes sont à lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: La mer est à lui, c’est lui qui l’a faite;
- type: usfm
  marker: q1
  children:
  - type: text
    text: La terre aussi, ses mains l’ont formée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Venez, prosternons-nous et humilions-nous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fléchissons le genou devant l’Éternel, notre créateur!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 100:3
      metadata:
        usfm: PSA.100.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Car il est notre Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et nous sommes le peuple de son pâturage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le troupeau que sa main conduit…
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 3:7
      metadata:
        usfm: HEB.3.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Oh! Si vous pouviez écouter aujourd’hui sa voix!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'N’endurcissez pas votre cœur, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 17:7
      metadata:
        usfm: EXO.17.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 20:1
      metadata:
        usfm: NUM.20.1
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '2'
      metadata:
        usfm: NUM.20.2
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '13'
      metadata:
        usfm: NUM.20.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 6:16
      metadata:
        usfm: DEU.6.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: comme à Meriba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme à la journée de Massa, dans le désert,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Où vos pères me tentèrent,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 3:9
      metadata:
        usfm: HEB.3.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: M’éprouvèrent, quoiqu’ils vissent mes œuvres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 3:17
      metadata:
        usfm: HEB.3.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Pendant quarante ans j’eus cette race en dégoût,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et je dis: C’est un peuple dont le cœur est égaré;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ne connaissent pas mes voies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Aussi je jurai dans ma colère:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils n’entreront pas dans mon repos!
