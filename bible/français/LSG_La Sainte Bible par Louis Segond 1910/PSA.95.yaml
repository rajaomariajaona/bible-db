document_id: PSA.95,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ps 100; 81. (Hé 3:6-19; 4:1-11.)
  - type: text
    content: Venez, chantons avec allégresse à l’Éternel!
  - type: text
    content: Poussons des cris de joie vers le rocher de notre salut.
  '10':
  - type: text
    content: ' '
  - type: note
    content: Hé 3:17.
  - type: text
    content: Pendant quarante ans j’eus cette race en dégoût,
  - type: text
    content: 'Et je dis: C’est un peuple dont le cœur est égaré;'
  - type: text
    content: Ils ne connaissent pas mes voies.
  '11':
  - type: text
    content: 'Aussi je jurai dans ma colère:'
  - type: text
    content: Ils n’entreront pas dans mon repos!
  '2':
  - type: text
    content: Allons au-devant de lui avec des louanges,
  - type: text
    content: Faisons retentir des cantiques en son honneur!
  '3':
  - type: text
    content: Car l’Éternel est un grand Dieu,
  - type: text
    content: Il est un grand roi au-dessus de tous les dieux.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Job 26:6.
  - type: text
    content: Il tient dans sa main les profondeurs de la terre,
  - type: text
    content: Et les sommets des montagnes sont à lui.
  '5':
  - type: text
    content: La mer est à lui, c’est lui qui l’a faite;
  - type: text
    content: La terre aussi, ses mains l’ont formée.
  '6':
  - type: text
    content: Venez, prosternons-nous et humilions-nous,
  - type: text
    content: Fléchissons le genou devant l’Éternel, notre créateur!
  '7':
  - type: text
    content: ' '
  - type: note
    content: Ps 100:3.
  - type: text
    content: Car il est notre Dieu,
  - type: text
    content: Et nous sommes le peuple de son pâturage,
  - type: text
    content: Le troupeau que sa main conduit…
  - type: note
    content: Hé 3:7.
  - type: text
    content: Oh! Si vous pouviez écouter aujourd’hui sa voix!
  '8':
  - type: text
    content: 'N’endurcissez pas votre cœur, '
  - type: note
    content: Ex 17:7. No 20:1, 2, 13. De 6:16.
  - type: text
    content: comme à Meriba,
  - type: text
    content: Comme à la journée de Massa, dans le désert,
  '9':
  - type: text
    content: Où vos pères me tentèrent,
  - type: note
    content: Hé 3:9.
  - type: text
    content: M’éprouvèrent, quoiqu’ils vissent mes œuvres.
