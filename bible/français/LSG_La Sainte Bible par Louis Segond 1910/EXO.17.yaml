document_id: EXO.17,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Murmures à Rephidim. Le rocher d’Horeb
  - type: heading
    content: 'V. 1-7: cf. No 20:1-13. (Ps 78:15, 16. 1 Co 10:4.) Ps 114:7, 8.'
  - type: text
    content: 'Toute l’assemblée des enfants d’Israël partit du désert de Sin, selon les marches que l’Éternel leur avait ordonnées; et ils campèrent à Rephidim, où le peuple ne trouva point d’eau à boire. '
  '10':
  - type: text
    content: 'Josué fit ce que lui avait dit Moïse, pour combattre Amalek. Et Moïse, Aaron et Hur montèrent au sommet de la colline. '
  '11':
  - type: text
    content: 'Lorsque Moïse élevait sa main, Israël était le plus fort; et lorsqu’il baissait sa main, Amalek était le plus fort. '
  '12':
  - type: text
    content: 'Les mains de Moïse étant fatiguées, ils prirent une pierre qu’ils placèrent sous lui, et il s’assit dessus. Aaron et Hur soutenaient ses mains, l’un d’un côté, l’autre de l’autre; et ses mains restèrent fermes jusqu’au coucher du soleil. '
  '13':
  - type: text
    content: 'Et Josué vainquit Amalek et son peuple, au tranchant de l’épée. '
  '14':
  - type: text
    content: 'L’Éternel dit à Moïse: Écris cela dans le livre, pour que le souvenir s’en conserve, et déclare à Josué '
  - type: note
    content: No 24:20. 1 S 15:2, 3. De 25:17, 18, 19.
  - type: text
    content: 'que j’effacerai la mémoire d’Amalek de dessous les cieux. '
  '15':
  - type: text
    content: 'Moïse bâtit un autel, et lui donna pour nom: l’Éternel ma bannière. '
  '16':
  - type: text
    content: 'Il dit: Parce que la main a été levée sur le trône de l’Éternel, '
  - type: note
    content: 1 S 15:2.
  - type: text
    content: il y aura guerre de l’Éternel contre Amalek, de génération en génération.
  '2':
  - type: text
    content: 'Alors le peuple chercha querelle à Moïse. Ils dirent: Donnez-nous de l’eau à boire. '
  - type: note
    content: No 20:3, 4.
  - type: text
    content: 'Moïse leur répondit: Pourquoi me cherchez-vous querelle? Pourquoi tentez-vous l’Éternel? '
  '3':
  - type: text
    content: 'Le peuple était là, pressé par la soif, et murmurait contre Moïse. Il disait: Pourquoi nous as-tu fait monter hors d’Égypte, pour me faire mourir de soif avec mes enfants et mes troupeaux? '
  '4':
  - type: text
    content: 'Moïse cria à l’Éternel, en disant: Que ferai-je à ce peuple? Encore un peu, et ils me lapideront. '
  '5':
  - type: text
    content: 'L’Éternel dit à Moïse: Passe devant le peuple, et prends avec toi des anciens d’Israël; prends aussi dans ta main ta verge '
  - type: note
    content: Ex 7:20.
  - type: text
    content: 'avec laquelle tu as frappé le fleuve, et marche! '
  '6':
  - type: text
    content: 'Voici, je me tiendrai devant toi sur le rocher d’Horeb; '
  - type: note
    content: No 20:9. Ps 78:15; 114:8. 1 Co 10:4.
  - type: text
    content: 'tu frapperas le rocher, et il en sortira de l’eau, et le peuple boira. Et Moïse fit ainsi, aux yeux des anciens d’Israël. '
  '7':
  - type: text
    content: 'Il donna à ce lieu le nom de Massa et Meriba, parce que les enfants d’Israël avaient contesté, et parce qu’ils avaient tenté l’Éternel, en disant: L’Éternel est-il au milieu de nous, ou n’y est-il pas?'
  - type: heading
    content: Amalek vaincu
  - type: heading
    content: 'V. 8-16: cf. De 25:17-19. 1 S 15. 1 Ch 4:42, 43.'
  '8':
  - type: text
    content: ' '
  - type: note
    content: De 25:17, 18.
  - type: text
    content: 'Amalek vint combattre Israël à Rephidim. '
  '9':
  - type: text
    content: 'Alors Moïse dit à Josué: Choisis-nous des hommes, sors, et combats Amalek; demain je me tiendrai sur le sommet de la colline, la verge de Dieu dans ma main. '
