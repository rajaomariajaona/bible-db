document_id: EXO.17
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Murmures à Rephidim. Le rocher d’Horeb
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-7: cf. No 20:1-13. (Ps 78:15, 16. 1 Co 10:4.) Ps 114:7, 8.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Toute l’assemblée des enfants d’Israël partit du désert de Sin, selon les marches que l’Éternel leur avait ordonnées; et ils campèrent à Rephidim, où le peuple ne trouva point d’eau à boire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Alors le peuple chercha querelle à Moïse. Ils dirent: Donnez-nous de l’eau à boire. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 20:3
      metadata:
        usfm: NUM.20.3
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '4'
      metadata:
        usfm: NUM.20.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Moïse leur répondit: Pourquoi me cherchez-vous querelle? Pourquoi tentez-vous l’Éternel? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Le peuple était là, pressé par la soif, et murmurait contre Moïse. Il disait: Pourquoi nous as-tu fait monter hors d’Égypte, pour me faire mourir de soif avec mes enfants et mes troupeaux? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Moïse cria à l’Éternel, en disant: Que ferai-je à ce peuple? Encore un peu, et ils me lapideront. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'L’Éternel dit à Moïse: Passe devant le peuple, et prends avec toi des anciens d’Israël; prends aussi dans ta main ta verge '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 7:20
      metadata:
        usfm: EXO.7.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'avec laquelle tu as frappé le fleuve, et marche! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Voici, je me tiendrai devant toi sur le rocher d’Horeb; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 20:9
      metadata:
        usfm: NUM.20.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 78:15
      metadata:
        usfm: PSA.78.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 114:8
      metadata:
        usfm: PSA.114.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 10:4
      metadata:
        usfm: 1CO.10.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'tu frapperas le rocher, et il en sortira de l’eau, et le peuple boira. Et Moïse fit ainsi, aux yeux des anciens d’Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il donna à ce lieu le nom de Massa et Meriba, parce que les enfants d’Israël avaient contesté, et parce qu’ils avaient tenté l’Éternel, en disant: L’Éternel est-il au milieu de nous, ou n’y est-il pas?'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Amalek vaincu
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 8-16: cf. De 25:17-19. 1 S 15. 1 Ch 4:42, 43.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 25:17
      metadata:
        usfm: DEU.25.17
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '18'
      metadata:
        usfm: DEU.25.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Amalek vint combattre Israël à Rephidim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Alors Moïse dit à Josué: Choisis-nous des hommes, sors, et combats Amalek; demain je me tiendrai sur le sommet de la colline, la verge de Dieu dans ma main. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Josué fit ce que lui avait dit Moïse, pour combattre Amalek. Et Moïse, Aaron et Hur montèrent au sommet de la colline. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Lorsque Moïse élevait sa main, Israël était le plus fort; et lorsqu’il baissait sa main, Amalek était le plus fort. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Les mains de Moïse étant fatiguées, ils prirent une pierre qu’ils placèrent sous lui, et il s’assit dessus. Aaron et Hur soutenaient ses mains, l’un d’un côté, l’autre de l’autre; et ses mains restèrent fermes jusqu’au coucher du soleil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Et Josué vainquit Amalek et son peuple, au tranchant de l’épée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'L’Éternel dit à Moïse: Écris cela dans le livre, pour que le souvenir s’en conserve, et déclare à Josué '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 24:20
      metadata:
        usfm: NUM.24.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 15:2
      metadata:
        usfm: 1SA.15.2
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '3'
      metadata:
        usfm: 1SA.15.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 25:17
      metadata:
        usfm: DEU.25.17
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '18'
      metadata:
        usfm: DEU.25.18
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '19'
      metadata:
        usfm: DEU.25.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'que j’effacerai la mémoire d’Amalek de dessous les cieux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Moïse bâtit un autel, et lui donna pour nom: l’Éternel ma bannière. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il dit: Parce que la main a été levée sur le trône de l’Éternel, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 15:2
      metadata:
        usfm: 1SA.15.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: il y aura guerre de l’Éternel contre Amalek, de génération en génération.
