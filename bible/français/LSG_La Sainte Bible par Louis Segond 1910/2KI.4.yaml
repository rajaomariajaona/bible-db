document_id: 2KI.4
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Miracles d’Élisée. L’huile de la veuve
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-7: cf. 1 R 17:8-16. Mc 6:34-44. Ps 68:6. Ph 4:19.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Une femme d’entre les femmes des fils des prophètes cria à Élisée, en disant: Ton serviteur mon mari est mort, et tu sais que ton serviteur craignait l’Éternel; or le créancier est venu '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 25:39
      metadata:
        usfm: LEV.25.39
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'pour prendre mes deux enfants et en faire ses esclaves. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Élisée lui dit: Que puis-je faire pour toi? Dis-moi, qu’as-tu à la maison? Elle répondit: Ta servante n’a rien du tout à la maison qu’un vase d’huile. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Et il dit: Va demander au-dehors des vases chez tous tes voisins, des vases vides, et n’en demande pas un petit nombre. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Quand tu seras rentrée, tu fermeras la porte sur toi et sur tes enfants; tu verseras dans tous ces vases, et tu mettras de côté ceux qui seront pleins. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Alors elle le quitta. Elle ferma la porte sur elle et sur ses enfants; ils lui présentaient les vases, et elle versait. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Lorsque les vases furent pleins, elle dit à son fils: Présente-moi encore un vase. Mais il lui répondit: Il n’y a plus de vase. Et l’huile s’arrêta. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Elle alla le rapporter à l’homme de Dieu, et il dit: Va vendre l’huile, et paie ta dette; et tu vivras, toi et tes fils, de ce qui restera.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le fils de la Sunamite
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 8-37: cf. (Hé 13:2. Mt 10:40-42.) (1 R 17:17-24. Hé 11:35.) (Ps 84:7; 116:11-12.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Un jour Élisée passait par Sunem. Il y avait là une femme de distinction, qui le pressa d’accepter à manger. Et toutes les fois qu’il passait, il se rendait chez elle pour manger. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Elle dit à son mari: Voici, je sais que cet homme qui passe toujours chez nous est un saint homme de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Faisons une petite chambre haute avec des murs, et mettons-y pour lui un lit, une table, un siège et un chandelier, afin qu’il s’y retire quand il viendra chez nous. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Élisée, étant revenu à Sunem, se retira dans la chambre haute et y coucha. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il dit à Guéhazi, son serviteur: Appelle cette Sunamite. Guéhazi l’appela, et elle se présenta devant lui. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Et Élisée dit à Guéhazi: Dis-lui: Voici, tu nous as montré tout cet empressement; que peut-on faire pour toi? Faut-il parler pour toi au roi ou au chef de l’armée? Elle répondit: J’habite au milieu de mon peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Et il dit: Que faire pour elle? Guéhazi répondit: Mais, elle n’a point de fils, et son mari est vieux. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Et il dit: Appelle-la. Guéhazi l’appela, et elle se présenta à la porte. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Élisée lui dit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 18:10
      metadata:
        usfm: GEN.18.10
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '14'
      metadata:
        usfm: GEN.18.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'A cette même époque, l’année prochaine, tu embrasseras un fils. Et elle dit: Non! Mon seigneur, homme de Dieu, ne trompe pas ta servante! '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Cette femme devint enceinte, et elle enfanta un fils à la même époque, l’année suivante, comme Élisée lui avait dit. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'L’enfant grandit. Et un jour qu’il était allé trouver son père vers les moissonneurs, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'il dit à son père: Ma tête! Ma tête! Le père dit à son serviteur: Porte-le à sa mère. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Le serviteur l’emporta et l’amena à sa mère. Et l’enfant resta sur les genoux de sa mère jusqu’à midi, puis il mourut. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Elle monta, le coucha sur le lit de l’homme de Dieu, ferma la porte sur lui, et sortit. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Elle appela son mari, et dit: Envoie-moi, je te prie, un des serviteurs et une des ânesses; je veux aller en hâte vers l’homme de Dieu, et je reviendrai. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Et il dit: Pourquoi veux-tu aller aujourd’hui vers lui? Ce n’est ni nouvelle lune ni sabbat. Elle répondit: Tout va bien. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Puis elle fit seller l’ânesse, et dit à son serviteur: Mène et pars; ne m’arrête pas en route sans que je te le dise. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Elle partit donc et se rendit vers l’homme de Dieu sur la montagne du Carmel. L’homme de Dieu, l’ayant aperçue de loin, dit à Guéhazi, son serviteur: Voici cette Sunamite! '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Maintenant, cours donc à sa rencontre, et dis-lui: Te portes-tu bien? Ton mari et ton enfant se portent-ils bien? Elle répondit: Bien. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Et dès qu’elle fut arrivée auprès de l’homme de Dieu sur la montagne, elle embrassa ses pieds. Guéhazi s’approcha pour la repousser. Mais l’homme de Dieu dit: Laisse-la, car son âme est dans l’amertume, et l’Éternel me l’a caché et ne me l’a point fait connaître. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Alors elle dit: Ai-je demandé un fils à mon seigneur? '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 4:16
      metadata:
        usfm: 2KI.4.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'N’ai-je pas dit: Ne me trompe pas? '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Et Élisée dit à Guéhazi: Ceins tes reins, prends mon bâton dans ta main, et pars. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 10:4
      metadata:
        usfm: LUK.10.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Si tu rencontres quelqu’un, ne le salue pas; et si quelqu’un te salue, ne lui réponds pas. Tu mettras mon bâton sur le visage de l’enfant. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'La mère de l’enfant dit: L’Éternel est vivant et ton âme est vivante! Je ne te quitterai point. Et il se leva et la suivit. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Guéhazi les avait devancés, et il avait mis le bâton sur le visage de l’enfant; mais il n’y eut ni voix ni signe d’attention. Il s’en retourna à la rencontre d’Élisée, et lui rapporta la chose, en disant: L’enfant ne s’est pas réveillé. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Lorsque Élisée arriva dans la maison, voici, l’enfant était mort, couché sur son lit. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Élisée entra et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 6:6
      metadata:
        usfm: MAT.6.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ferma la porte sur eux deux, et il pria l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Il monta, et se coucha sur l’enfant; il mit sa bouche sur sa bouche, ses yeux sur ses yeux, ses mains sur ses mains, et il s’étendit sur lui. Et la chair de l’enfant se réchauffa. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Élisée s’éloigna, alla çà et là par la maison, puis remonta et s’étendit sur l’enfant. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 R 17:21
      metadata:
        usfm: 1KI.17.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 R 8:1
      metadata:
        usfm: 2KI.8.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 20:10
      metadata:
        usfm: ACT.20.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Et l’enfant éternua sept fois, et il ouvrit les yeux. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Élisée appela Guéhazi, et dit: Appelle cette Sunamite. Guéhazi l’appela, et elle vint vers Élisée, qui dit: Prends ton fils! '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Elle alla se jeter à ses pieds, et se prosterna contre terre. Et elle prit son fils, et sortit.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La mort dans le pot
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 38-41: cf. 2 R 2:19-22. Ex 15:23-25. Ps 119:91.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Élisée revint à Guilgal, et il y avait une famine dans le pays. Comme les fils des prophètes étaient assis devant lui, il dit à son serviteur: Mets le grand pot, et fais cuire un potage pour les fils des prophètes. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'L’un d’eux sortit dans les champs pour cueillir des herbes; il trouva de la vigne sauvage et il y cueillit des coloquintes sauvages, plein son vêtement. Quand il rentra, il les coupa en morceaux dans le pot où était le potage, car on ne les connaissait pas. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'On servit à manger à ces hommes; mais dès qu’ils eurent mangé du potage, ils s’écrièrent: La mort est dans le pot, homme de Dieu! Et ils ne purent manger. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Élisée dit: Prenez de la farine. Il en jeta '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 15:25
      metadata:
        usfm: EXO.15.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'dans le pot, et dit: Sers à ces gens, et qu’ils mangent. Et il n’y avait plus rien de mauvais dans le pot.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les vingt pains d’orge
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 42-44: cf. Pr 3:9-10. Mt 14:14-21; 6:11.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Un homme arriva de Baal-Schalischa. Il apporta du pain des prémices à l’homme de Dieu, vingt pains d’orge, et des épis nouveaux dans son sac. Élisée dit: Donne à ces gens, et qu’ils mangent. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Son serviteur répondit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 6:9
      metadata:
        usfm: JHN.6.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Comment pourrais-je en donner à cent personnes? Mais Élisée dit: Donne à ces gens, et qu’ils mangent; car ainsi parle l’Éternel: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 6:11
      metadata:
        usfm: JHN.6.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'On mangera, et on en aura de reste. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Il mit alors les pains devant eux; et ils mangèrent et en eurent de reste, selon la parole de l’Éternel.
