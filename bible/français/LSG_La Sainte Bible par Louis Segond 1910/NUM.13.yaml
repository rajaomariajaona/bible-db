document_id: NUM.13,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Les douze espions envoyés en Canaan
  - type: heading
    content: 'V. 1-33: cf. De 1:19-28. (2 Co 2:17.)'
  - type: text
    content: 'L’Éternel parla à Moïse, et dit: '
  '10':
  - type: text
    content: 'pour la tribu de Zabulon: Gaddiel, fils de Sodi; '
  '11':
  - type: text
    content: 'pour la tribu de Joseph, la tribu de Manassé: Gaddi, fils de Susi; '
  '12':
  - type: text
    content: 'pour la tribu de Dan: Ammiel, fils de Guemalli; '
  '13':
  - type: text
    content: 'pour la tribu d’Aser: Sethur, fils de Micaël; '
  '14':
  - type: text
    content: 'pour la tribu de Nephthali: Nachbi, fils de Vophsi; '
  '15':
  - type: text
    content: 'pour la tribu de Gad: Guéuel, fils de Maki. '
  '16':
  - type: text
    content: 'Tels sont les noms des hommes que Moïse envoya pour explorer le pays. Moïse donna à Hosée, fils de Nun, le nom de Josué. '
  '17':
  - type: text
    content: 'Moïse les envoya pour explorer le pays de Canaan. Il leur dit: Montez ici, par le midi; et vous monterez sur la montagne. '
  '18':
  - type: text
    content: 'Vous verrez le pays, ce qu’il est, et le peuple qui l’habite, s’il est fort ou faible, s’il est en petit ou en grand nombre; '
  '19':
  - type: text
    content: 'ce qu’est le pays où il habite, s’il est bon ou mauvais; ce que sont les villes où il habite, si elles sont ouvertes ou fortifiées; '
  '2':
  - type: text
    content: 'Envoie des hommes pour explorer le pays de Canaan, que je donne aux enfants d’Israël. Tu enverras un homme de chacune des tribus de leurs pères; tous seront des principaux d’entre eux. '
  '20':
  - type: text
    content: 'ce qu’est le terrain, s’il est gras ou maigre, s’il y a des arbres ou s’il n’y en a point. Ayez bon courage, et prenez des fruits du pays. C’était le temps des premiers raisins. '
  '21':
  - type: text
    content: 'Ils montèrent, et ils explorèrent le pays, depuis le désert de Tsin jusqu’à Rehob, sur le chemin de Hamath. '
  '22':
  - type: text
    content: 'Ils montèrent, par le midi, et ils allèrent jusqu’à Hébron, où étaient Ahiman, Schéschaï et Talmaï, enfants d’Anak. Hébron avait été bâtie sept ans avant Tsoan en Égypte. '
  '23':
  - type: text
    content: 'Ils arrivèrent jusqu’à la vallée d’Eschcol, où ils coupèrent une branche de vigne avec une grappe de raisin, qu’ils portèrent à deux au moyen d’une perche; ils prirent aussi des grenades et des figues. '
  '24':
  - type: text
    content: 'On donna à ce lieu le nom de vallée d’Eschcol, à cause de la grappe que les enfants d’Israël y coupèrent. '
  '25':
  - type: text
    content: 'Ils furent de retour de l’exploration du pays au bout de quarante jours. '
  '26':
  - type: text
    content: 'A leur arrivée, ils se rendirent auprès de Moïse et d’Aaron, et de toute l’assemblée des enfants d’Israël, à Kadès dans le désert de Paran. Ils leur firent un rapport, ainsi qu’à toute l’assemblée, et ils leur montrèrent les fruits du pays. '
  '27':
  - type: text
    content: 'Voici ce qu’ils racontèrent à Moïse: Nous sommes allés dans le pays où tu nous as envoyés. A la vérité, '
  - type: note
    content: Ex 3:8; 33:3.
  - type: text
    content: 'c’est un pays où coulent le lait et le miel, et en voici les fruits. '
  '28':
  - type: text
    content: 'Mais le peuple qui habite ce pays est puissant, les villes sont fortifiées, très grandes; nous y avons vu des enfants d’Anak. '
  '29':
  - type: text
    content: 'Les Amalécites habitent la contrée du midi; les Héthiens, les Jébusiens et les Amoréens habitent la montagne; et les Cananéens habitent près de la mer et le long du Jourdain. '
  '3':
  - type: text
    content: 'Moïse les envoya du désert de Paran, d’après l’ordre de l’Éternel; tous ces hommes étaient chefs des enfants d’Israël. '
  '30':
  - type: text
    content: 'Caleb fit taire le peuple, qui murmurait contre Moïse. Il dit: Montons, emparons-nous du pays, nous y serons vainqueurs! '
  '31':
  - type: text
    content: 'Mais les hommes qui y étaient allés avec lui dirent: Nous ne pouvons pas monter contre ce peuple, car il est plus fort que nous. '
  '32':
  - type: text
    content: 'Et ils décrièrent devant les enfants d’Israël le pays qu’ils avaient exploré. Ils dirent: Le pays que nous avons parcouru, pour l’explorer, est un pays qui dévore ses habitants; tous ceux que nous y avons vus sont des hommes d’une haute taille; '
  '33':
  - type: text
    content: 'et nous y avons vu les géants, enfants d’Anak, de la race des géants: nous étions à nos yeux et aux leurs comme des sauterelles.'
  '4':
  - type: text
    content: 'Voici leurs noms. Pour la tribu de Ruben: Schammua, fils de Zaccur; '
  '5':
  - type: text
    content: 'pour la tribu de Siméon: Schaphath, fils de Hori; '
  '6':
  - type: text
    content: 'pour la tribu de Juda: Caleb, fils de Jephunné; '
  '7':
  - type: text
    content: 'pour la tribu d’Issacar: Jigual, fils de Joseph; '
  '8':
  - type: text
    content: 'pour la tribu d’Éphraïm: Hosée, fils de Nun; '
  '9':
  - type: text
    content: 'pour la tribu de Benjamin: Palthi, fils de Raphu; '
