document_id: PSA.142,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 1 S 24. Ps 57; 143.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Cantique de David. Lorsqu’il était dans la caverne. Prière.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De ma voix je crie à l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De ma voix j’implore l’Éternel.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je répands ma plainte devant lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je lui raconte ma détresse.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 77:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Quand mon esprit est abattu au-dedans de moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toi, tu connais mon sentier.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur la route où je marche
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils m’ont tendu un piège.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jette les yeux à droite, et regarde!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Personne ne me reconnaît,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tout refuge est perdu pour moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nul ne prend souci de mon âme.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Éternel! C’est à toi que je crie.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je dis: Tu es mon refuge,'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 16:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Mon partage sur la terre des vivants.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sois attentif à mes cris!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car je suis bien malheureux.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 41:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 79:8
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 116:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Délivre-moi de ceux qui me poursuivent!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car ils sont plus forts que moi.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tire mon âme de sa prison,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afin que je célèbre ton nom!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les justes viendront m’entourer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand tu m’auras fait du bien.
