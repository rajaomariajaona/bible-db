document_id: PSA.142
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 1 S 24. Ps 57; 143.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Cantique de David. Lorsqu’il était dans la caverne. Prière.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: De ma voix je crie à l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De ma voix j’implore l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Je répands ma plainte devant lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je lui raconte ma détresse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 77:4
      metadata:
        usfm: PSA.77.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Quand mon esprit est abattu au-dedans de moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toi, tu connais mon sentier.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sur la route où je marche
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils m’ont tendu un piège.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Jette les yeux à droite, et regarde!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Personne ne me reconnaît,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tout refuge est perdu pour moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nul ne prend souci de mon âme.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Éternel! C’est à toi que je crie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Je dis: Tu es mon refuge,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 16:5
      metadata:
        usfm: PSA.16.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Mon partage sur la terre des vivants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Sois attentif à mes cris!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car je suis bien malheureux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 41:2
      metadata:
        usfm: PSA.41.2
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 79:8
      metadata:
        usfm: PSA.79.8
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 116:6
      metadata:
        usfm: PSA.116.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Délivre-moi de ceux qui me poursuivent!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car ils sont plus forts que moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tire mon âme de sa prison,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afin que je célèbre ton nom!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les justes viendront m’entourer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand tu m’auras fait du bien.
