document_id: PSA.142,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 1 S 24. Ps 57; 143.
  - type: text
    content: Cantique de David. Lorsqu’il était dans la caverne. Prière.
  '2':
  - type: text
    content: De ma voix je crie à l’Éternel,
  - type: text
    content: De ma voix j’implore l’Éternel.
  '3':
  - type: text
    content: Je répands ma plainte devant lui,
  - type: text
    content: Je lui raconte ma détresse.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Ps 77:4.
  - type: text
    content: Quand mon esprit est abattu au-dedans de moi,
  - type: text
    content: Toi, tu connais mon sentier.
  - type: text
    content: Sur la route où je marche
  - type: text
    content: Ils m’ont tendu un piège.
  '5':
  - type: text
    content: Jette les yeux à droite, et regarde!
  - type: text
    content: Personne ne me reconnaît,
  - type: text
    content: Tout refuge est perdu pour moi,
  - type: text
    content: Nul ne prend souci de mon âme.
  '6':
  - type: text
    content: Éternel! C’est à toi que je crie.
  - type: text
    content: 'Je dis: Tu es mon refuge,'
  - type: note
    content: Ps 16:5.
  - type: text
    content: Mon partage sur la terre des vivants.
  '7':
  - type: text
    content: Sois attentif à mes cris!
  - type: text
    content: Car je suis bien malheureux.
  - type: note
    content: Ps 41:2; 79:8; 116:6.
  - type: text
    content: Délivre-moi de ceux qui me poursuivent!
  - type: text
    content: Car ils sont plus forts que moi.
  '8':
  - type: text
    content: Tire mon âme de sa prison,
  - type: text
    content: Afin que je célèbre ton nom!
  - type: text
    content: Les justes viendront m’entourer,
  - type: text
    content: Quand tu m’auras fait du bien.
