document_id: 1TI.2,93
type_code: fra
verses:
  '1':
  - type: heading
    content: La prière pour tous
  - type: heading
    content: 'V. 1-8: cf. (1 R 8:48. Jé 29:7. 1 Pi 2:12-15.) (Jn 3:16, 17. Hé 2:9. Mc 16:15, 16.) 1 Jn 3:21, 22.'
  - type: text
    content: 'J’exhorte donc, avant toutes choses, à faire des prières, des supplications, des requêtes, des actions de grâces, pour tous les hommes, '
  '10':
  - type: text
    content: 'mais qu’elles se parent de bonnes œuvres, comme il convient à des femmes qui font profession de servir Dieu. '
  '11':
  - type: text
    content: 'Que la femme écoute l’instruction en silence, avec une entière soumission. '
  '12':
  - type: note
    content: 1 Co 14:34.
  - type: text
    content: 'Je ne permets pas à la femme d’enseigner, '
  - type: note
    content: Ge 3:16. Ép 5:24.
  - type: text
    content: 'ni de prendre de l’autorité sur l’homme; mais elle doit demeurer dans le silence. '
  '13':
  - type: note
    content: Ge 1:27; 2:22.
  - type: text
    content: 'Car Adam a été formé le premier, Eve ensuite; '
  '14':
  - type: note
    content: Ge 3:6.
  - type: text
    content: 'et ce n’est pas Adam qui a été séduit, c’est la femme qui, séduite, s’est rendue coupable de transgression. '
  '15':
  - type: text
    content: Elle sera néanmoins sauvée en devenant mère, si elle persévère avec modestie dans la foi, dans la charité, et dans la sainteté.
  '2':
  - type: note
    content: Jé 29.
  - type: text
    content: 'pour les rois et pour tous ceux qui sont élevés en dignité, afin que nous menions une vie paisible et tranquille, en toute piété et honnêteté. '
  '3':
  - type: text
    content: 'Cela est bon et agréable devant Dieu notre Sauveur, '
  '4':
  - type: note
    content: Éz 18:23. 2 Pi 3:9.
  - type: text
    content: 'qui veut que tous les hommes soient sauvés et parviennent à la connaissance de la vérité. '
  '5':
  - type: note
    content: Jn 17:3. Ro 3:10.
  - type: text
    content: 'Car il y a un seul Dieu, et aussi '
  - type: note
    content: Ga 3:19. Hé 9:15.
  - type: text
    content: 'un seul médiateur entre Dieu et les hommes, Jésus-Christ homme, '
  '6':
  - type: note
    content: Mt 20:28. Ép 1:7. Col 1:14.
  - type: text
    content: 'qui s’est donné lui-même en rançon pour tous. C’est là le témoignage rendu en son propre temps, '
  '7':
  - type: text
    content: 'et pour lequel j’ai été '
  - type: note
    content: Ac 9:15; 13:2; 22:21. Ga 1:16; 2:8. Ép 3:8. 2 Ti 1:11.
  - type: text
    content: 'établi prédicateur et apôtre, '
  - type: note
    content: Ro 1:9; 9:1.
  - type: text
    content: 'je dis la vérité, je ne mens pas, chargé d’instruire les païens dans la foi et la vérité. '
  '8':
  - type: text
    content: 'Je veux donc que les hommes '
  - type: note
    content: Jn 4:21.
  - type: text
    content: 'prient en tout lieu, '
  - type: note
    content: Ps 134:2.
  - type: text
    content: en élevant des mains pures, sans colère ni mauvaises pensées.
  - type: heading
    content: Les devoirs des femmes
  - type: heading
    content: 'V. 9-15: cf. 1 Pi 3:1-6. 1 Co 14:34, 35. Tit 2:3-5.'
  '9':
  - type: text
    content: ' '
  - type: note
    content: Tit 2:3. 1 Pi 3:3.
  - type: text
    content: 'Je veux aussi que les femmes, vêtues d’une manière décente, avec pudeur et modestie, ne se parent ni de tresses, ni d’or, ni de perles, ni d’habits somptueux, '
