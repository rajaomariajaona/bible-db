document_id: 1TI.2,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La prière pour tous
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-8: cf. (1 R 8:48. Jé 29:7. 1 Pi 2:12-15.) (Jn 3:16, 17. Hé 2:9. Mc 16:15, 16.) 1 Jn 3:21, 22.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J’exhorte donc, avant toutes choses, à faire des prières, des supplications, des requêtes, des actions de grâces, pour tous les hommes, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mais qu’elles se parent de bonnes œuvres, comme il convient à des femmes qui font profession de servir Dieu. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Que la femme écoute l’instruction en silence, avec une entière soumission. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 14:34
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Je ne permets pas à la femme d’enseigner, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 3:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 5:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'ni de prendre de l’autorité sur l’homme; mais elle doit demeurer dans le silence. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 1:27
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Car Adam a été formé le premier, Eve ensuite; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 3:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'et ce n’est pas Adam qui a été séduit, c’est la femme qui, séduite, s’est rendue coupable de transgression. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Elle sera néanmoins sauvée en devenant mère, si elle persévère avec modestie dans la foi, dans la charité, et dans la sainteté.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 29
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'pour les rois et pour tous ceux qui sont élevés en dignité, afin que nous menions une vie paisible et tranquille, en toute piété et honnêteté. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cela est bon et agréable devant Dieu notre Sauveur, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 18:23
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Pi 3:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'qui veut que tous les hommes soient sauvés et parviennent à la connaissance de la vérité. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 17:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 3:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Car il y a un seul Dieu, et aussi '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 3:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 9:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'un seul médiateur entre Dieu et les hommes, Jésus-Christ homme, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 20:28
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 1:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 1:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'qui s’est donné lui-même en rançon pour tous. C’est là le témoignage rendu en son propre temps, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et pour lequel j’ai été '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 9:15
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 13:2
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 22:21
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 1:16
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 3:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ti 1:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'établi prédicateur et apôtre, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 1:9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'je dis la vérité, je ne mens pas, chargé d’instruire les païens dans la foi et la vérité. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je veux donc que les hommes '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 4:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'prient en tout lieu, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 134:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: en élevant des mains pures, sans colère ni mauvaises pensées.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les devoirs des femmes
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 9-15: cf. 1 Pi 3:1-6. 1 Co 14:34, 35. Tit 2:3-5.'
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Tit 2:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 3:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Je veux aussi que les femmes, vêtues d’une manière décente, avec pudeur et modestie, ne se parent ni de tresses, ni d’or, ni de perles, ni d’habits somptueux, '
