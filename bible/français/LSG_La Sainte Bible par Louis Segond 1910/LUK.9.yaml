document_id: LUK.9,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mission des douze apôtres
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-6: cf. (Mt 10. Mc 6:7-13.) Lu 6:12-16; 10:1-16.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus, ayant '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 10:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 3:13
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 6:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'assemblé les douze, leur donna force et pouvoir sur tous les démons, avec la puissance de guérir les maladies. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 6:30
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Les apôtres, étant de retour, racontèrent à Jésus tout ce qu’ils avaient fait. '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 14:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 6:31
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '32'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Il les prit avec lui, et se retira à l’écart, du côté d’une ville appelée Bethsaïda. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les foules, l’ayant su, le suivirent. Jésus les accueillit, et il leur parlait du royaume de Dieu; il guérit aussi ceux qui avaient besoin d’être guéris. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 14:15
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 6:35
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 6:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Comme le jour commençait à baisser, les douze s’approchèrent, et lui dirent: Renvoie la foule, afin qu’elle aille dans les villages et dans les campagnes des environs, pour se loger et pour trouver des vivres; car nous sommes ici dans un lieu désert. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 14:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 6:37
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 6:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Jésus leur dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Donnez-leur vous-mêmes à manger.
    - type: text
      text: ' Mais ils répondirent: Nous n’avons que cinq pains et deux poissons, à moins que nous n’allions nous-mêmes acheter des vivres pour tout ce peuple. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or, il y avait environ cinq mille hommes. Jésus dit à ses disciples: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Faites-les asseoir par rangées de cinquante.
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils firent ainsi, ils les firent tous asseoir. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus prit les cinq pains et les deux poissons, et, levant les yeux vers le ciel, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 9:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'il les bénit. Puis, il les rompit, et les donna aux disciples, afin qu’ils les distribuassent à la foule. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tous mangèrent et furent rassasiés, et l’on emporta douze paniers pleins des morceaux qui restaient.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Opinions diverses sur le Christ. Confession de Pierre. Jésus annonce ses souffrances et sa mort
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 18-22: cf. (Mt 16:13-21. Mc 8:27-31.)'
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 16:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 8:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Un jour que Jésus priait à l’écart, ayant avec lui ses disciples, il leur posa cette question: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Qui dit-on que je suis?
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils répondirent: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 14:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Jean Baptiste; les autres, Élie; les autres, qu’un des anciens prophètes est ressuscité.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 10:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Il les envoya prêcher le royaume de Dieu, et guérir les malades.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Et vous,
    - type: text
      text: ' leur demanda-t-il, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: qui dites-vous que je suis?
    - type: text
      text: ' Pierre répondit: Le '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 6:69
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Christ de Dieu. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jésus leur recommanda sévèrement de ne le dire à personne.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Il ajouta
    - type: text
      text: ' qu’il fallait '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: que
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 16:21
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 17:22
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 8:31
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:31
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10:33
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 18:31
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 24:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: le Fils de l’homme souffrît beaucoup, qu’il fût rejeté par les anciens, par les principaux sacrificateurs et par les scribes, qu’il fût mis à mort, et qu’il ressuscitât le troisième jour.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Comment suivre Jésus
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 23-27: cf. (Mt 16:24-28. Mc 8:34 à 9:1.)'
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis il dit à tous: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 10:38
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:24
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 8:34
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 14:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Si quelqu’un veut venir après moi, qu’il renonce à lui-même, qu’il se charge chaque jour de sa croix, et qu’il me suive.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 10:39
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:25
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 8:35
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 17:33
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 12:25
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Car celui qui voudra sauver sa vie la perdra, mais celui qui la perdra à cause de moi la sauvera.
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Et que servirait-il à un homme de gagner tout le monde, s’il se détruisait ou se perdait lui-même?
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 10:33
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 8:38
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 12:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ti 2:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Jn 2:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Car quiconque aura honte de moi et de mes paroles, le Fils de l’homme aura honte de lui, quand il viendra dans sa gloire, et dans celle du Père et des saints anges.
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 16:28
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 9:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Je vous le dis en vérité, quelques-uns de ceux qui sont ici ne mourront point qu’ils n’aient vu le royaume de Dieu.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La transfiguration
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 28-36: cf. (Mt 17:1-9. Mc 9:2-10. 2 Pi 1:16-18.) Ap 1:13-18.'
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 17:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 9:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Environ huit jours après qu’il eut dit ces paroles, Jésus prit avec lui Pierre, Jean et Jacques, et il monta sur la montagne pour prier. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pendant qu’il priait, l’aspect de son visage changea, et son vêtement devint d’une éclatante blancheur. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 10:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 6:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 22:35
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ne prenez rien pour le voyage,
    - type: text
      text: ' leur dit-il, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ni bâton, ni sac, ni pain, ni argent, et n’ayez pas deux tuniques.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et voici, deux hommes s’entretenaient avec lui: c’étaient Moïse et Élie, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'qui, apparaissant dans la gloire, parlaient de son départ qu’il allait accomplir à Jérusalem. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pierre et ses compagnons étaient appesantis par le sommeil; mais, s’étant tenus éveillés, ils virent la gloire de Jésus et les deux hommes qui étaient avec lui. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Au moment où ces hommes se séparaient de Jésus, Pierre lui dit: Maître, il est bon que nous soyons ici; dressons trois tentes, une pour toi, une pour Moïse, et une pour Élie. Il ne savait ce qu’il disait. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Comme il parlait ainsi, une nuée vint les couvrir; et les disciples furent saisis de frayeur en les voyant entrer dans la nuée. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 34:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 3:17
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 17:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 1:11
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 3:22
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 1:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Pi 1:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Et de la nuée sortit une voix, qui dit: Celui-ci est mon Fils élu: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 18:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 3:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'écoutez-le! '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Quand la voix se fit entendre, Jésus se trouva seul. Les disciples gardèrent le silence, et ils ne racontèrent à personne, en ce temps-là, rien de ce qu’ils avaient vu.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Guérison d’un démoniaque
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 37-43: cf. (Mt 17:14-21. Mc 9:14-29.) Mc 1:23-27.'
    marker-yv: yv-h
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 17:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 9:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Le lendemain, lorsqu’ils furent descendus de la montagne, une grande foule vint au-devant de Jésus. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et voici, du milieu de la foule un homme s’écria: Maître, je t’en prie, porte les regards sur mon fils, car c’est mon fils unique. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un esprit le saisit, et aussitôt il pousse des cris; et l’esprit l’agite avec violence, le fait écumer, et a de la peine à se retirer de lui, après l’avoir tout brisé. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Dans quelque maison que vous entriez, restez-y; et c’est de là que vous partirez.
    - type: text
      text: ' '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: J’ai prié tes disciples de le chasser, et ils n’ont pas pu.
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Race incrédule et perverse,
    - type: text
      text: ' répondit Jésus, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: jusqu’à quand serai-je avec vous, et vous supporterai-je? Amène ici ton fils.
    - type: text
      text: ' '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Comme il approchait, le démon le jeta par terre, et l’agita avec violence. Mais Jésus menaça l’esprit impur, guérit l’enfant, et le rendit à son père. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et tous furent frappés de la grandeur de Dieu.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus annonce sa mort et sa résurrection
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 44-45: cf. (Mt 17:22, 23. Mc 9:30-32.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tandis que chacun était dans l’admiration de tout ce que faisait Jésus, il dit à ses disciples: '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Pour vous, écoutez bien ceci:'
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 17:22
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 9:31
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Le Fils de l’homme doit être livré entre les mains des hommes.
    - type: text
      text: ' '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 2:50
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18:34
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Mais les disciples ne comprenaient pas cette parole; elle était voilée pour eux, afin qu’ils n’en eussent pas le sens; et ils craignaient de l’interroger à ce sujet.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Qui est le plus grand?
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 46-50: cf. (Mt 18:1-7. Mc 9:33-42.)'
    marker-yv: yv-h
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 18:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 9:33
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 22:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Or, une pensée leur vint à l’esprit, savoir lequel d’entre eux était le plus grand. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus, voyant la pensée de leur cœur, prit un petit enfant, le plaça près de lui, '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 18:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 9:37
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 13:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'et leur dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Quiconque reçoit en mon nom ce petit enfant me reçoit moi-même;
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 10:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 13:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: et quiconque me reçoit reçoit celui qui m’a envoyé.
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 23:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 4:11
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Car celui qui est le plus petit parmi vous tous, c’est celui-là qui est grand.
    - type: text
      text: ' '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 9:38
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Jean prit la parole, et dit: Maître, nous avons vu un homme qui chasse des démons en ton nom; et nous l’en avons empêché, parce qu’il ne nous suit pas.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 10:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 6:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 10:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 13:51
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Et, si les gens ne vous reçoivent pas, sortez de cette ville, et secouez la poussière de vos pieds, en témoignage contre eux.
    - type: text
      text: ' '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Ne l’en empêchez pas,
    - type: text
      text: ' lui répondit Jésus; '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: car
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 12:30
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 11:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: qui n’est pas contre vous est pour vous.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus se rend à Jérusalem. Un bourg des Samaritains
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 51-56: cf. 2 R 1:2-15. No 20:14-21. Ja 3:13-18.'
    marker-yv: yv-h
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque le temps où il devait être '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 16:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 1:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ti 3:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'enlevé du monde approcha, Jésus prit la résolution de se rendre à Jérusalem. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il envoya devant lui des messagers, qui se mirent en route et entrèrent dans un bourg des Samaritains, pour lui préparer un logement. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais on ne le reçut pas, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 4:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'parce qu’il se dirigeait sur Jérusalem. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les disciples Jacques et Jean, voyant cela, dirent: Seigneur, veux-tu que nous commandions que '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 R 1:10
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '12'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'le feu descende du ciel et les consume? '
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus se tourna vers eux, et les réprimanda, disant: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Vous ne savez de quel esprit vous êtes animés.
  '56':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 3:17
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 12:47
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Car le Fils de l’homme est venu, non pour perdre les âmes des hommes, mais pour les sauver. Et ils allèrent dans un autre bourg.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Comment suivre Jésus
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 57-62: cf. Mt 8:19-22.'
    marker-yv: yv-h
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 8:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Pendant qu’ils étaient en chemin, un homme lui dit: Seigneur, je te suivrai partout où tu iras. '
  '58':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus lui répondit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Les renards ont des tanières, et les oiseaux du ciel ont des nids: mais le Fils de l’homme n’a pas un lieu où il puisse reposer sa tête.'
    - type: text
      text: ' '
  '59':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 8:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Il dit à un autre: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Suis-moi.
    - type: text
      text: ' Et il répondit: Seigneur, permets-moi d’aller d’abord ensevelir mon père. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils partirent, et ils allèrent de village en village, annonçant la bonne nouvelle et opérant partout des guérisons.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hérode ne sait que penser de Jésus
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 7-9: cf. (Mt 14:1, 2. Mc 6:14-16.)'
    marker-yv: yv-h
  '60':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 8:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Mais Jésus lui dit: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Laisse les morts ensevelir leurs morts; et toi, va annoncer le royaume de Dieu.
    - type: text
      text: ' '
  '61':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un autre dit: Je te suivrai, Seigneur, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 R 19:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'mais permets-moi d’aller d’abord prendre congé de ceux de ma maison. '
  '62':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus lui répondit: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 26:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ph 3:14
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 6:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Pi 2:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Quiconque met la main à la charrue, et regarde en arrière, n’est pas propre au royaume de Dieu.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 14:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mc 6:14
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Hérode le tétrarque entendit parler de tout ce qui se passait, et il ne savait que penser. Car les uns disaient que Jean était ressuscité des morts; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'd’autres, qu’Élie était apparu; et d’autres, qu’un des anciens prophètes était ressuscité. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Hérode disait: J’ai fait décapiter Jean; qui donc est celui-ci, dont j’entends dire de telles choses? Et il cherchait à le voir.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Multiplication des pains
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 10-17: cf. (Mt 14:13-21. Mc 6:30-44. Jn 6:1-14.) Mt 15:32-38.'
    marker-yv: yv-h
