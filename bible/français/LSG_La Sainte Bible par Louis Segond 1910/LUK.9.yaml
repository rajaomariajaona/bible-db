document_id: LUK.9,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Mission des douze apôtres
  - type: heading
    content: 'V. 1-6: cf. (Mt 10. Mc 6:7-13.) Lu 6:12-16; 10:1-16.'
  - type: text
    content: 'Jésus, ayant '
  - type: note
    content: Mt 10:1. Mc 3:13; 6:7. Lu 6:13.
  - type: text
    content: 'assemblé les douze, leur donna force et pouvoir sur tous les démons, avec la puissance de guérir les maladies. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: Mc 6:30.
  - type: text
    content: 'Les apôtres, étant de retour, racontèrent à Jésus tout ce qu’ils avaient fait. '
  - type: note
    content: Mt 14:13. Mc 6:31, 32.
  - type: text
    content: 'Il les prit avec lui, et se retira à l’écart, du côté d’une ville appelée Bethsaïda. '
  '11':
  - type: text
    content: 'Les foules, l’ayant su, le suivirent. Jésus les accueillit, et il leur parlait du royaume de Dieu; il guérit aussi ceux qui avaient besoin d’être guéris. '
  '12':
  - type: note
    content: Mt 14:15. Mc 6:35. Jn 6:5.
  - type: text
    content: 'Comme le jour commençait à baisser, les douze s’approchèrent, et lui dirent: Renvoie la foule, afin qu’elle aille dans les villages et dans les campagnes des environs, pour se loger et pour trouver des vivres; car nous sommes ici dans un lieu désert. '
  '13':
  - type: note
    content: Mt 14:16. Mc 6:37. Jn 6:9.
  - type: text
    content: 'Jésus leur dit: '
  - type: text
    content: Donnez-leur vous-mêmes à manger.
  - type: text
    content: ' Mais ils répondirent: Nous n’avons que cinq pains et deux poissons, à moins que nous n’allions nous-mêmes acheter des vivres pour tout ce peuple. '
  '14':
  - type: text
    content: 'Or, il y avait environ cinq mille hommes. Jésus dit à ses disciples: '
  - type: text
    content: Faites-les asseoir par rangées de cinquante.
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'Ils firent ainsi, ils les firent tous asseoir. '
  '16':
  - type: text
    content: 'Jésus prit les cinq pains et les deux poissons, et, levant les yeux vers le ciel, '
  - type: note
    content: 1 S 9:13.
  - type: text
    content: 'il les bénit. Puis, il les rompit, et les donna aux disciples, afin qu’ils les distribuassent à la foule. '
  '17':
  - type: text
    content: Tous mangèrent et furent rassasiés, et l’on emporta douze paniers pleins des morceaux qui restaient.
  - type: heading
    content: Opinions diverses sur le Christ. Confession de Pierre. Jésus annonce ses souffrances et sa mort
  - type: heading
    content: 'V. 18-22: cf. (Mt 16:13-21. Mc 8:27-31.)'
  '18':
  - type: text
    content: ' '
  - type: note
    content: Mt 16:13. Mc 8:27.
  - type: text
    content: 'Un jour que Jésus priait à l’écart, ayant avec lui ses disciples, il leur posa cette question: '
  - type: text
    content: Qui dit-on que je suis?
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'Ils répondirent: '
  - type: note
    content: Mt 14:2.
  - type: text
    content: Jean Baptiste; les autres, Élie; les autres, qu’un des anciens prophètes est ressuscité.
  '2':
  - type: note
    content: Mt 10:7.
  - type: text
    content: Il les envoya prêcher le royaume de Dieu, et guérir les malades.
  '20':
  - type: text
    content: ' '
  - type: text
    content: Et vous,
  - type: text
    content: ' leur demanda-t-il, '
  - type: text
    content: qui dites-vous que je suis?
  - type: text
    content: ' Pierre répondit: Le '
  - type: note
    content: Jn 6:69.
  - type: text
    content: 'Christ de Dieu. '
  '21':
  - type: text
    content: Jésus leur recommanda sévèrement de ne le dire à personne.
  '22':
  - type: text
    content: ' '
  - type: text
    content: Il ajouta
  - type: text
    content: ' qu’il fallait '
  - type: text
    content: que
  - type: text
    content: ' '
  - type: note
    content: Mt 16:21; 17:22. Mc 8:31; 9:31; 10:33. Lu 18:31; 24:7.
  - type: text
    content: le Fils de l’homme souffrît beaucoup, qu’il fût rejeté par les anciens, par les principaux sacrificateurs et par les scribes, qu’il fût mis à mort, et qu’il ressuscitât le troisième jour.
  - type: heading
    content: Comment suivre Jésus
  - type: heading
    content: 'V. 23-27: cf. (Mt 16:24-28. Mc 8:34 à 9:1.)'
  '23':
  - type: text
    content: 'Puis il dit à tous: '
  - type: note
    content: Mt 10:38; 16:24. Mc 8:34. Lu 14:27.
  - type: text
    content: Si quelqu’un veut venir après moi, qu’il renonce à lui-même, qu’il se charge chaque jour de sa croix, et qu’il me suive.
  '24':
  - type: text
    content: ' '
  - type: note
    content: Mt 10:39; 16:25. Mc 8:35. Lu 17:33. Jn 12:25.
  - type: text
    content: Car celui qui voudra sauver sa vie la perdra, mais celui qui la perdra à cause de moi la sauvera.
  - type: text
    content: ' '
  '25':
  - type: text
    content: Et que servirait-il à un homme de gagner tout le monde, s’il se détruisait ou se perdait lui-même?
  - type: text
    content: ' '
  '26':
  - type: note
    content: Mt 10:33. Mc 8:38. Lu 12:9. 2 Ti 2:12. 1 Jn 2:23.
  - type: text
    content: Car quiconque aura honte de moi et de mes paroles, le Fils de l’homme aura honte de lui, quand il viendra dans sa gloire, et dans celle du Père et des saints anges.
  - type: text
    content: ' '
  '27':
  - type: note
    content: Mt 16:28. Mc 9:1.
  - type: text
    content: Je vous le dis en vérité, quelques-uns de ceux qui sont ici ne mourront point qu’ils n’aient vu le royaume de Dieu.
  - type: heading
    content: La transfiguration
  - type: heading
    content: 'V. 28-36: cf. (Mt 17:1-9. Mc 9:2-10. 2 Pi 1:16-18.) Ap 1:13-18.'
  '28':
  - type: text
    content: ' '
  - type: note
    content: Mt 17:1. Mc 9:2.
  - type: text
    content: 'Environ huit jours après qu’il eut dit ces paroles, Jésus prit avec lui Pierre, Jean et Jacques, et il monta sur la montagne pour prier. '
  '29':
  - type: text
    content: 'Pendant qu’il priait, l’aspect de son visage changea, et son vêtement devint d’une éclatante blancheur. '
  '3':
  - type: text
    content: ' '
  - type: note
    content: Mt 10:9. Mc 6:8. Lu 22:35.
  - type: text
    content: Ne prenez rien pour le voyage,
  - type: text
    content: ' leur dit-il, '
  - type: text
    content: ni bâton, ni sac, ni pain, ni argent, et n’ayez pas deux tuniques.
  '30':
  - type: text
    content: 'Et voici, deux hommes s’entretenaient avec lui: c’étaient Moïse et Élie, '
  '31':
  - type: text
    content: 'qui, apparaissant dans la gloire, parlaient de son départ qu’il allait accomplir à Jérusalem. '
  '32':
  - type: text
    content: 'Pierre et ses compagnons étaient appesantis par le sommeil; mais, s’étant tenus éveillés, ils virent la gloire de Jésus et les deux hommes qui étaient avec lui. '
  '33':
  - type: text
    content: 'Au moment où ces hommes se séparaient de Jésus, Pierre lui dit: Maître, il est bon que nous soyons ici; dressons trois tentes, une pour toi, une pour Moïse, et une pour Élie. Il ne savait ce qu’il disait. '
  '34':
  - type: text
    content: 'Comme il parlait ainsi, une nuée vint les couvrir; et les disciples furent saisis de frayeur en les voyant entrer dans la nuée. '
  '35':
  - type: note
    content: És 34:1. Mt 3:17; 17:5. Mc 1:11; 9:7. Lu 3:22. Col 1:13. 2 Pi 1:17.
  - type: text
    content: 'Et de la nuée sortit une voix, qui dit: Celui-ci est mon Fils élu: '
  - type: note
    content: De 18:19. Ac 3:22.
  - type: text
    content: 'écoutez-le! '
  '36':
  - type: text
    content: Quand la voix se fit entendre, Jésus se trouva seul. Les disciples gardèrent le silence, et ils ne racontèrent à personne, en ce temps-là, rien de ce qu’ils avaient vu.
  - type: heading
    content: Guérison d’un démoniaque
  - type: heading
    content: 'V. 37-43: cf. (Mt 17:14-21. Mc 9:14-29.) Mc 1:23-27.'
  '37':
  - type: text
    content: ' '
  - type: note
    content: Mt 17:14. Mc 9:17.
  - type: text
    content: 'Le lendemain, lorsqu’ils furent descendus de la montagne, une grande foule vint au-devant de Jésus. '
  '38':
  - type: text
    content: 'Et voici, du milieu de la foule un homme s’écria: Maître, je t’en prie, porte les regards sur mon fils, car c’est mon fils unique. '
  '39':
  - type: text
    content: 'Un esprit le saisit, et aussitôt il pousse des cris; et l’esprit l’agite avec violence, le fait écumer, et a de la peine à se retirer de lui, après l’avoir tout brisé. '
  '4':
  - type: text
    content: ' '
  - type: text
    content: Dans quelque maison que vous entriez, restez-y; et c’est de là que vous partirez.
  - type: text
    content: ' '
  '40':
  - type: text
    content: J’ai prié tes disciples de le chasser, et ils n’ont pas pu.
  '41':
  - type: text
    content: ' '
  - type: text
    content: Race incrédule et perverse,
  - type: text
    content: ' répondit Jésus, '
  - type: text
    content: jusqu’à quand serai-je avec vous, et vous supporterai-je? Amène ici ton fils.
  - type: text
    content: ' '
  '42':
  - type: text
    content: 'Comme il approchait, le démon le jeta par terre, et l’agita avec violence. Mais Jésus menaça l’esprit impur, guérit l’enfant, et le rendit à son père. '
  '43':
  - type: text
    content: Et tous furent frappés de la grandeur de Dieu.
  - type: heading
    content: Jésus annonce sa mort et sa résurrection
  - type: heading
    content: 'V. 44-45: cf. (Mt 17:22, 23. Mc 9:30-32.)'
  - type: text
    content: 'Tandis que chacun était dans l’admiration de tout ce que faisait Jésus, il dit à ses disciples: '
  '44':
  - type: text
    content: 'Pour vous, écoutez bien ceci:'
  - type: text
    content: ' '
  - type: note
    content: Mt 17:22. Mc 9:31.
  - type: text
    content: Le Fils de l’homme doit être livré entre les mains des hommes.
  - type: text
    content: ' '
  '45':
  - type: note
    content: Lu 2:50; 18:34.
  - type: text
    content: Mais les disciples ne comprenaient pas cette parole; elle était voilée pour eux, afin qu’ils n’en eussent pas le sens; et ils craignaient de l’interroger à ce sujet.
  - type: heading
    content: Qui est le plus grand?
  - type: heading
    content: 'V. 46-50: cf. (Mt 18:1-7. Mc 9:33-42.)'
  '46':
  - type: text
    content: ' '
  - type: note
    content: Mt 18:1. Mc 9:33. Lu 22:24.
  - type: text
    content: 'Or, une pensée leur vint à l’esprit, savoir lequel d’entre eux était le plus grand. '
  '47':
  - type: text
    content: 'Jésus, voyant la pensée de leur cœur, prit un petit enfant, le plaça près de lui, '
  '48':
  - type: note
    content: Mt 18:5. Mc 9:37. Jn 13:20.
  - type: text
    content: 'et leur dit: '
  - type: text
    content: Quiconque reçoit en mon nom ce petit enfant me reçoit moi-même;
  - type: text
    content: ' '
  - type: note
    content: Lu 10:16. Jn 13:20.
  - type: text
    content: et quiconque me reçoit reçoit celui qui m’a envoyé.
  - type: text
    content: ' '
  - type: note
    content: Mt 23:11. Lu 4:11; 18:14.
  - type: text
    content: Car celui qui est le plus petit parmi vous tous, c’est celui-là qui est grand.
  - type: text
    content: ' '
  '49':
  - type: note
    content: Mc 9:38.
  - type: text
    content: 'Jean prit la parole, et dit: Maître, nous avons vu un homme qui chasse des démons en ton nom; et nous l’en avons empêché, parce qu’il ne nous suit pas.'
  '5':
  - type: note
    content: Mt 10:14. Mc 6:11. Lu 10:11. Ac 13:51; 18:6.
  - type: text
    content: Et, si les gens ne vous reçoivent pas, sortez de cette ville, et secouez la poussière de vos pieds, en témoignage contre eux.
  - type: text
    content: ' '
  '50':
  - type: text
    content: ' '
  - type: text
    content: Ne l’en empêchez pas,
  - type: text
    content: ' lui répondit Jésus; '
  - type: text
    content: car
  - type: text
    content: ' '
  - type: note
    content: Mt 12:30. Lu 11:23.
  - type: text
    content: qui n’est pas contre vous est pour vous.
  - type: heading
    content: Jésus se rend à Jérusalem. Un bourg des Samaritains
  - type: heading
    content: 'V. 51-56: cf. 2 R 1:2-15. No 20:14-21. Ja 3:13-18.'
  '51':
  - type: text
    content: 'Lorsque le temps où il devait être '
  - type: note
    content: Mc 16:19. Ac 1:2. 1 Ti 3:16.
  - type: text
    content: 'enlevé du monde approcha, Jésus prit la résolution de se rendre à Jérusalem. '
  '52':
  - type: text
    content: 'Il envoya devant lui des messagers, qui se mirent en route et entrèrent dans un bourg des Samaritains, pour lui préparer un logement. '
  '53':
  - type: text
    content: 'Mais on ne le reçut pas, '
  - type: note
    content: Jn 4:9.
  - type: text
    content: 'parce qu’il se dirigeait sur Jérusalem. '
  '54':
  - type: text
    content: 'Les disciples Jacques et Jean, voyant cela, dirent: Seigneur, veux-tu que nous commandions que '
  - type: note
    content: 2 R 1:10, 12.
  - type: text
    content: 'le feu descende du ciel et les consume? '
  '55':
  - type: text
    content: 'Jésus se tourna vers eux, et les réprimanda, disant: '
  - type: text
    content: Vous ne savez de quel esprit vous êtes animés.
  '56':
  - type: text
    content: ' '
  - type: note
    content: Jn 3:17; 12:47.
  - type: text
    content: Car le Fils de l’homme est venu, non pour perdre les âmes des hommes, mais pour les sauver. Et ils allèrent dans un autre bourg.
  - type: heading
    content: Comment suivre Jésus
  - type: heading
    content: 'V. 57-62: cf. Mt 8:19-22.'
  '57':
  - type: text
    content: ' '
  - type: note
    content: Mt 8:19.
  - type: text
    content: 'Pendant qu’ils étaient en chemin, un homme lui dit: Seigneur, je te suivrai partout où tu iras. '
  '58':
  - type: text
    content: 'Jésus lui répondit: '
  - type: text
    content: 'Les renards ont des tanières, et les oiseaux du ciel ont des nids: mais le Fils de l’homme n’a pas un lieu où il puisse reposer sa tête.'
  - type: text
    content: ' '
  '59':
  - type: note
    content: Mt 8:21.
  - type: text
    content: 'Il dit à un autre: '
  - type: text
    content: Suis-moi.
  - type: text
    content: ' Et il répondit: Seigneur, permets-moi d’aller d’abord ensevelir mon père. '
  '6':
  - type: text
    content: Ils partirent, et ils allèrent de village en village, annonçant la bonne nouvelle et opérant partout des guérisons.
  - type: heading
    content: Hérode ne sait que penser de Jésus
  - type: heading
    content: 'V. 7-9: cf. (Mt 14:1, 2. Mc 6:14-16.)'
  '60':
  - type: note
    content: Mt 8:22.
  - type: text
    content: 'Mais Jésus lui dit: '
  - type: text
    content: Laisse les morts ensevelir leurs morts; et toi, va annoncer le royaume de Dieu.
  - type: text
    content: ' '
  '61':
  - type: text
    content: 'Un autre dit: Je te suivrai, Seigneur, '
  - type: note
    content: 1 R 19:20.
  - type: text
    content: 'mais permets-moi d’aller d’abord prendre congé de ceux de ma maison. '
  '62':
  - type: text
    content: 'Jésus lui répondit: '
  - type: note
    content: Pr 26:11. Ph 3:14. Hé 6:5. 2 Pi 2:20.
  - type: text
    content: Quiconque met la main à la charrue, et regarde en arrière, n’est pas propre au royaume de Dieu.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Mt 14:1. Mc 6:14.
  - type: text
    content: 'Hérode le tétrarque entendit parler de tout ce qui se passait, et il ne savait que penser. Car les uns disaient que Jean était ressuscité des morts; '
  '8':
  - type: text
    content: 'd’autres, qu’Élie était apparu; et d’autres, qu’un des anciens prophètes était ressuscité. '
  '9':
  - type: text
    content: 'Mais Hérode disait: J’ai fait décapiter Jean; qui donc est celui-ci, dont j’entends dire de telles choses? Et il cherchait à le voir.'
  - type: heading
    content: Multiplication des pains
  - type: heading
    content: 'V. 10-17: cf. (Mt 14:13-21. Mc 6:30-44. Jn 6:1-14.) Mt 15:32-38.'
