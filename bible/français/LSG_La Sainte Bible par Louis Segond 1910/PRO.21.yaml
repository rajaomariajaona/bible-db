document_id: PRO.21,93
type_code: fra
verses:
  '1':
  - type: text
    content: Le cœur du roi est un courant d’eau dans la main de l’Éternel;
  - type: text
    content: Il l’incline partout où il veut.
  '10':
  - type: text
    content: L’âme du méchant désire le mal;
  - type: text
    content: Son ami ne trouve pas grâce à ses yeux.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Pr 19:25.
  - type: text
    content: Quand on châtie le moqueur, le sot devient sage;
  - type: text
    content: Et quand on instruit le sage, il accueille la science.
  '12':
  - type: text
    content: Le juste considère la maison du méchant;
  - type: text
    content: L’Éternel précipite les méchants dans le malheur.
  '13':
  - type: text
    content: Celui qui ferme son oreille au cri du pauvre
  - type: text
    content: Criera lui-même et n’aura point de réponse.
  '14':
  - type: text
    content: ' '
  - type: note
    content: Pr 17:8; 18:16.
  - type: text
    content: Un don fait en secret apaise la colère,
  - type: text
    content: Et un présent fait en cachette calme une fureur violente.
  '15':
  - type: text
    content: C’est une joie pour le juste de pratiquer la justice,
  - type: text
    content: Mais la ruine est pour ceux qui font le mal.
  '16':
  - type: text
    content: L’homme qui s’écarte du chemin de la sagesse
  - type: text
    content: Reposera dans l’assemblée des morts.
  '17':
  - type: text
    content: Celui qui aime la joie reste dans l’indigence;
  - type: text
    content: Celui qui aime le vin et l’huile ne s’enrichit pas.
  '18':
  - type: text
    content: ' '
  - type: note
    content: Pr 11:8.
  - type: text
    content: Le méchant sert de rançon pour le juste,
  - type: text
    content: Et le perfide pour les hommes droits.
  '19':
  - type: text
    content: ' '
  - type: note
    content: v. 9. Pr 25:24.
  - type: text
    content: Mieux vaut habiter dans une terre déserte,
  - type: text
    content: Qu’avec une femme querelleuse et irritable.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Pr 16:2.
  - type: text
    content: Toutes les voies de l’homme sont droites à ses yeux;
  - type: text
    content: Mais celui qui pèse les cœurs, c’est l’Éternel.
  '20':
  - type: text
    content: De précieux trésors et de l’huile sont dans la demeure du sage;
  - type: text
    content: Mais l’homme insensé les engloutit.
  '21':
  - type: text
    content: Celui qui poursuit la justice et la bonté
  - type: text
    content: Trouve la vie, la justice et la gloire.
  '22':
  - type: text
    content: Le sage monte dans la ville des héros,
  - type: text
    content: Et il abat la force qui lui donnait de l’assurance.
  '23':
  - type: text
    content: ' '
  - type: note
    content: Pr 18:21.
  - type: text
    content: Celui qui veille sur sa bouche et sur sa langue
  - type: text
    content: Préserve son âme des angoisses.
  '24':
  - type: text
    content: L’orgueilleux, le hautain, s’appelle un moqueur;
  - type: text
    content: Il agit avec la fureur de l’arrogance.
  '25':
  - type: text
    content: Les désirs du paresseux le tuent,
  - type: text
    content: Parce que ses mains refusent de travailler;
  '26':
  - type: text
    content: Tout le jour il éprouve des désirs;
  - type: note
    content: Ps 37:26.
  - type: text
    content: Mais le juste donne sans parcimonie.
  '27':
  - type: text
    content: ' '
  - type: note
    content: Pr 15:8. És 1:13. Jé 6:20. Am 5:21.
  - type: text
    content: Le sacrifice des méchants est quelque chose d’abominable;
  - type: text
    content: Combien plus quand ils l’offrent avec des pensées criminelles!
  '28':
  - type: text
    content: ' '
  - type: note
    content: Pr 19:5, 9.
  - type: text
    content: Le témoin menteur périra,
  - type: text
    content: Mais l’homme qui écoute parlera toujours.
  '29':
  - type: text
    content: Le méchant prend un air effronté,
  - type: text
    content: Mais l’homme droit affermit sa voie.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 1 S 15:22. Ps 50:8, 14. És 1:11, 16. Os 6:6.
  - type: text
    content: La pratique de la justice et de l’équité,
  - type: text
    content: Voilà ce que l’Éternel préfère aux sacrifices.
  '30':
  - type: text
    content: Il n’y a ni sagesse, ni intelligence,
  - type: text
    content: Ni conseil, en face de l’Éternel.
  '31':
  - type: text
    content: ' '
  - type: note
    content: Ps 33:17.
  - type: text
    content: Le cheval est équipé pour le jour de la bataille,
  - type: text
    content: Mais la délivrance appartient à l’Éternel.
  '4':
  - type: text
    content: Des regards hautains et un cœur qui s’enfle,
  - type: text
    content: Cette lampe des méchants, ce n’est que péché.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Pr 10:4; 13:4.
  - type: text
    content: Les projets de l’homme diligent ne mènent qu’à l’abondance,
  - type: text
    content: Mais celui qui agit avec précipitation n’arrive qu’à la disette.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Pr 10:2, 4; 13:11.
  - type: text
    content: Des trésors acquis par une langue mensongère
  - type: text
    content: Sont une vanité fugitive et l’avant-coureur de la mort.
  '7':
  - type: text
    content: La violence des méchants les emporte,
  - type: text
    content: Parce qu’ils refusent de faire ce qui est juste.
  '8':
  - type: text
    content: Le coupable suit des voies détournées,
  - type: text
    content: Mais l’innocent agit avec droiture.
  '9':
  - type: text
    content: ' '
  - type: note
    content: v. 19. Pr 25:24; 27:15.
  - type: text
    content: Mieux vaut habiter à l’angle d’un toit,
  - type: text
    content: Que de partager la demeure d’une femme querelleuse.
