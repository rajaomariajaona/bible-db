document_id: PRO.21
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Le cœur du roi est un courant d’eau dans la main de l’Éternel;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il l’incline partout où il veut.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 16:2
      metadata:
        usfm: PRO.16.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Toutes les voies de l’homme sont droites à ses yeux;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais celui qui pèse les cœurs, c’est l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 15:22
      metadata:
        usfm: 1SA.15.22
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 50:8
      metadata:
        usfm: PSA.50.8
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '14'
      metadata:
        usfm: PSA.50.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 1:11
      metadata:
        usfm: ISA.1.11
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '16'
      metadata:
        usfm: ISA.1.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Os 6:6
      metadata:
        usfm: HOS.6.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: La pratique de la justice et de l’équité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voilà ce que l’Éternel préfère aux sacrifices.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Des regards hautains et un cœur qui s’enfle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cette lampe des méchants, ce n’est que péché.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 10:4
      metadata:
        usfm: PRO.10.4
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 13:4
      metadata:
        usfm: PRO.13.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Les projets de l’homme diligent ne mènent qu’à l’abondance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais celui qui agit avec précipitation n’arrive qu’à la disette.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 10:2
      metadata:
        usfm: PRO.10.2
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '4'
      metadata:
        usfm: PRO.10.4
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 13:11
      metadata:
        usfm: PRO.13.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Des trésors acquis par une langue mensongère
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sont une vanité fugitive et l’avant-coureur de la mort.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: La violence des méchants les emporte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parce qu’ils refusent de faire ce qui est juste.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Le coupable suit des voies détournées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais l’innocent agit avec droiture.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'v. 19. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 25:24
      metadata:
        usfm: PRO.25.24
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 27:15
      metadata:
        usfm: PRO.27.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Mieux vaut habiter à l’angle d’un toit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que de partager la demeure d’une femme querelleuse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: L’âme du méchant désire le mal;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Son ami ne trouve pas grâce à ses yeux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 19:25
      metadata:
        usfm: PRO.19.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Quand on châtie le moqueur, le sot devient sage;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et quand on instruit le sage, il accueille la science.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Le juste considère la maison du méchant;
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’Éternel précipite les méchants dans le malheur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Celui qui ferme son oreille au cri du pauvre
- type: usfm
  marker: q1
  children:
  - type: text
    text: Criera lui-même et n’aura point de réponse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 17:8
      metadata:
        usfm: PRO.17.8
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 18:16
      metadata:
        usfm: PRO.18.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Un don fait en secret apaise la colère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et un présent fait en cachette calme une fureur violente.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: C’est une joie pour le juste de pratiquer la justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais la ruine est pour ceux qui font le mal.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: L’homme qui s’écarte du chemin de la sagesse
- type: usfm
  marker: q1
  children:
  - type: text
    text: Reposera dans l’assemblée des morts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Celui qui aime la joie reste dans l’indigence;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celui qui aime le vin et l’huile ne s’enrichit pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 11:8
      metadata:
        usfm: PRO.11.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Le méchant sert de rançon pour le juste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le perfide pour les hommes droits.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'v. 9. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 25:24
      metadata:
        usfm: PRO.25.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Mieux vaut habiter dans une terre déserte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’avec une femme querelleuse et irritable.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: De précieux trésors et de l’huile sont dans la demeure du sage;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais l’homme insensé les engloutit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Celui qui poursuit la justice et la bonté
- type: usfm
  marker: q1
  children:
  - type: text
    text: Trouve la vie, la justice et la gloire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Le sage monte dans la ville des héros,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il abat la force qui lui donnait de l’assurance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 18:21
      metadata:
        usfm: PRO.18.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Celui qui veille sur sa bouche et sur sa langue
- type: usfm
  marker: q1
  children:
  - type: text
    text: Préserve son âme des angoisses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: L’orgueilleux, le hautain, s’appelle un moqueur;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il agit avec la fureur de l’arrogance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Les désirs du paresseux le tuent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parce que ses mains refusent de travailler;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Tout le jour il éprouve des désirs;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 37:26
      metadata:
        usfm: PSA.37.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Mais le juste donne sans parcimonie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 15:8
      metadata:
        usfm: PRO.15.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 1:13
      metadata:
        usfm: ISA.1.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 6:20
      metadata:
        usfm: JER.6.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Am 5:21
      metadata:
        usfm: AMO.5.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Le sacrifice des méchants est quelque chose d’abominable;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Combien plus quand ils l’offrent avec des pensées criminelles!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 19:5
      metadata:
        usfm: PRO.19.5
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '9'
      metadata:
        usfm: PRO.19.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Le témoin menteur périra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais l’homme qui écoute parlera toujours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Le méchant prend un air effronté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais l’homme droit affermit sa voie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Il n’y a ni sagesse, ni intelligence,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ni conseil, en face de l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 33:17
      metadata:
        usfm: PSA.33.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Le cheval est équipé pour le jour de la bataille,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais la délivrance appartient à l’Éternel.
