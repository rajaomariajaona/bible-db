document_id: PRO.21,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le cœur du roi est un courant d’eau dans la main de l’Éternel;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il l’incline partout où il veut.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’âme du méchant désire le mal;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Son ami ne trouve pas grâce à ses yeux.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 19:25
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Quand on châtie le moqueur, le sot devient sage;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et quand on instruit le sage, il accueille la science.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le juste considère la maison du méchant;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel précipite les méchants dans le malheur.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui ferme son oreille au cri du pauvre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Criera lui-même et n’aura point de réponse.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 17:8
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Un don fait en secret apaise la colère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et un présent fait en cachette calme une fureur violente.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est une joie pour le juste de pratiquer la justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais la ruine est pour ceux qui font le mal.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’homme qui s’écarte du chemin de la sagesse
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Reposera dans l’assemblée des morts.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui aime la joie reste dans l’indigence;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui aime le vin et l’huile ne s’enrichit pas.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 11:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Le méchant sert de rançon pour le juste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le perfide pour les hommes droits.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'v. 9. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 25:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Mieux vaut habiter dans une terre déserte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’avec une femme querelleuse et irritable.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 16:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Toutes les voies de l’homme sont droites à ses yeux;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais celui qui pèse les cœurs, c’est l’Éternel.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De précieux trésors et de l’huile sont dans la demeure du sage;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais l’homme insensé les engloutit.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui poursuit la justice et la bonté
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Trouve la vie, la justice et la gloire.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le sage monte dans la ville des héros,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et il abat la force qui lui donnait de l’assurance.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 18:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Celui qui veille sur sa bouche et sur sa langue
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Préserve son âme des angoisses.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’orgueilleux, le hautain, s’appelle un moqueur;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il agit avec la fureur de l’arrogance.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les désirs du paresseux le tuent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce que ses mains refusent de travailler;
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tout le jour il éprouve des désirs;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 37:26
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Mais le juste donne sans parcimonie.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 15:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 1:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 6:20
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Am 5:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Le sacrifice des méchants est quelque chose d’abominable;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Combien plus quand ils l’offrent avec des pensées criminelles!
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 19:5
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '9'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Le témoin menteur périra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais l’homme qui écoute parlera toujours.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le méchant prend un air effronté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais l’homme droit affermit sa voie.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 S 15:22
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 50:8
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 1:11
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '16'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Os 6:6
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: La pratique de la justice et de l’équité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voilà ce que l’Éternel préfère aux sacrifices.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n’y a ni sagesse, ni intelligence,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ni conseil, en face de l’Éternel.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 33:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Le cheval est équipé pour le jour de la bataille,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais la délivrance appartient à l’Éternel.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des regards hautains et un cœur qui s’enfle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cette lampe des méchants, ce n’est que péché.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 10:4
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 13:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Les projets de l’homme diligent ne mènent qu’à l’abondance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais celui qui agit avec précipitation n’arrive qu’à la disette.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 10:2
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '4'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 13:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Des trésors acquis par une langue mensongère
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sont une vanité fugitive et l’avant-coureur de la mort.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La violence des méchants les emporte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce qu’ils refusent de faire ce qui est juste.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le coupable suit des voies détournées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais l’innocent agit avec droiture.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'v. 19. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 25:24
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 27:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Mieux vaut habiter à l’angle d’un toit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que de partager la demeure d’une femme querelleuse.
