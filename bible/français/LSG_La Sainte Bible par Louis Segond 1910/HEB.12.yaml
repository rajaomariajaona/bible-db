document_id: HEB.12,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La persévérance au milieu des épreuves, à l’exemple de Jésus-Christ
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-3: cf. (1 Co 9:24-27. Ph 3:11-14.) (Ph 2:5-11. 1 Pi 2:21-24; 4:12, 13.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous donc aussi, puisque nous sommes environnés d’une si grande nuée de témoins, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 6:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 4:22
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 3:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 2:1
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'rejetons tout fardeau, et le péché qui nous enveloppe si facilement, et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 12:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 10:36
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'courons '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 9:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'avec persévérance dans la carrière qui nous est ouverte, '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Nos pères nous châtiaient pour peu de jours, comme ils le trouvaient bon; mais Dieu nous châtie pour notre bien, afin que nous participions à sa sainteté. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: text
      text: Il est vrai que tout châtiment semble d’abord un sujet de tristesse, et non de joie; mais il produit plus tard pour ceux qui ont été ainsi exercés un fruit paisible de justice.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La sanctification. Préceptes divers
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 12-17: cf. (1 Pi 3:11, 12; 1:13-17. Ap 21:27.) (Ge 25:29-34; 27:30-38.)'
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 35:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Fortifiez donc vos mains languissantes et vos genoux affaiblis; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et suivez avec vos pieds des voies droites, afin que ce qui est boiteux ne dévie pas, mais plutôt se raffermisse. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 12:18
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ti 2:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Recherchez la paix avec tous, et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 5:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'la sanctification, sans laquelle personne ne verra le Seigneur. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 6:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Veillez à ce que nul ne se prive de la grâce de Dieu; à ce qu’aucune '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 29:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'racine d’amertume, poussant des rejetons, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 17:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 5:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'ne produise du trouble, et que plusieurs n’en soient infectés; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 5:3
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 3:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Th 4:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'à ce qu’il n’y ait ni impudique, ni profane '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 25:33
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'comme Ésaü, qui pour un mets vendit son droit d’aînesse. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 27:36
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Vous savez que, plus tard, voulant obtenir la bénédiction, il fut rejeté, quoiqu’il la sollicitât avec larmes; car son repentir ne put avoir aucun effet.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 18-29: cf. (Ex 19:10-25; 20:1-19.) (Ga 4:26. Ap 3:12; 21:2, 3; 5:11, 12. Ép 1:10.) (Hé 2:1-3; 10:26-35.)'
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous ne vous êtes pas approchés '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Ex 19:10, etc.; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 20:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'd’une montagne qu’on pouvait toucher '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 19:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 5:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'et qui était embrasée par le feu, ni de la nuée, ni des ténèbres, ni de la tempête, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ni du retentissement de la trompette, ni du bruit des paroles, tel que ceux qui l’entendirent '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 20:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 5:25
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'demandèrent qu’il ne leur en fût adressé aucune de plus, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ayant les regards sur Jésus, le chef et le consommateur de la foi, qui, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 24:26
      - type: text
        text: '. Ph 2:8, 9, etc. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 1:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'en vue de la joie qui lui était réservée, a souffert la croix, méprisé l’ignominie, et s’est assis à la droite '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 1:3
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'du trône de Dieu. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'car ils ne supportaient pas cette déclaration: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 19:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Si même une bête touche la montagne, elle sera lapidée. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et ce spectacle était si terrible que Moïse dit: Je suis épouvanté et tout tremblant! '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais vous vous êtes approchés de la montagne de Sion, de la cité du Dieu vivant, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 4:26
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 3:12
      - type: text
        text: ; 21:10, etc.
      marker-yv: yv-n
    - type: text
      text: 'la Jérusalem céleste, des myriades qui forment le chœur des anges, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'de l’assemblée des premiers-nés '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 10:20
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'inscrits dans les cieux, du juge qui est le Dieu de tous, des esprits des justes parvenus à la perfection, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'de Jésus qui est le médiateur de la nouvelle alliance, et du sang '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 10:22
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 1:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'de l’aspersion qui parle mieux que celui '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ge 4:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 11:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'd’Abel. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hé 2:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Gardez-vous de refuser d’entendre celui qui parle; car si ceux-là n’ont pas échappé qui refusèrent d’entendre celui qui publiait les oracles sur la terre, combien moins échapperons-nous, si nous nous détournons de celui qui parle du haut des cieux, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'lui, dont la voix alors ébranla la terre, et qui maintenant a fait cette promesse: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ag 2:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Une fois encore j’ébranlerai non seulement la terre, mais aussi le ciel. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ces mots: Une fois encore, indiquent le changement des choses ébranlées, comme étant faites pour un temps, afin que les choses inébranlables subsistent. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C’est pourquoi, recevant un royaume inébranlable, montrons notre reconnaissance '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 2:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'en rendant à Dieu un culte qui lui soit agréable, avec piété et avec crainte, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 4:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: car notre Dieu est aussi un feu dévorant.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Considérez, en effet, celui qui a supporté contre sa personne une telle opposition de la part des pécheurs, afin que vous ne vous lassiez point, l’âme découragée.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 4-11: cf. (Pr 3:11, 12. Ap 3:19.) (Ps 119:67, 71. 1 Pi 1:6, 7.)'
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 10:13
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Vous n’avez pas encore résisté jusqu’au sang, en luttant contre le péché. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et vous avez oublié l’exhortation qui vous est adressée comme à des fils:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 5:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pr 3:11
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 3:19
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Mon fils, ne méprise pas le châtiment du Seigneur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ne perds pas courage lorsqu’il te reprend;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car le Seigneur châtie celui qu’il aime,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il frappe de la verge tous ceux qu’il reconnaît pour ses fils.
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Supportez le châtiment: c’est comme des fils que Dieu vous traite; car quel est le fils qu’un père ne châtie pas? '
  '8':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Mais si vous êtes exempts du châtiment auquel tous ont part, vous êtes donc des enfants illégitimes, et non des fils. '
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'D’ailleurs, puisque nos pères selon la chair nous ont châtiés, et que nous les avons respectés, ne devons-nous pas à bien plus forte raison nous soumettre au Père des esprits, pour avoir la vie? '
