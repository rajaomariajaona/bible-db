document_id: HEB.12,93
type_code: fra
verses:
  '1':
  - type: heading
    content: La persévérance au milieu des épreuves, à l’exemple de Jésus-Christ
  - type: heading
    content: 'V. 1-3: cf. (1 Co 9:24-27. Ph 3:11-14.) (Ph 2:5-11. 1 Pi 2:21-24; 4:12, 13.)'
  - type: text
    content: 'Nous donc aussi, puisque nous sommes environnés d’une si grande nuée de témoins, '
  - type: note
    content: Ro 6:4. Ép 4:22. Col 3:8. 1 Pi 2:1, 2.
  - type: text
    content: 'rejetons tout fardeau, et le péché qui nous enveloppe si facilement, et '
  - type: note
    content: Ro 12:12. Hé 10:36.
  - type: text
    content: 'courons '
  - type: note
    content: 1 Co 9:24.
  - type: text
    content: 'avec persévérance dans la carrière qui nous est ouverte, '
  '10':
  - type: text
    content: 'Nos pères nous châtiaient pour peu de jours, comme ils le trouvaient bon; mais Dieu nous châtie pour notre bien, afin que nous participions à sa sainteté. '
  '11':
  - type: text
    content: Il est vrai que tout châtiment semble d’abord un sujet de tristesse, et non de joie; mais il produit plus tard pour ceux qui ont été ainsi exercés un fruit paisible de justice.
  - type: heading
    content: La sanctification. Préceptes divers
  - type: heading
    content: 'V. 12-17: cf. (1 Pi 3:11, 12; 1:13-17. Ap 21:27.) (Ge 25:29-34; 27:30-38.)'
  '12':
  - type: text
    content: ' '
  - type: note
    content: És 35:3.
  - type: text
    content: 'Fortifiez donc vos mains languissantes et vos genoux affaiblis; '
  '13':
  - type: text
    content: 'et suivez avec vos pieds des voies droites, afin que ce qui est boiteux ne dévie pas, mais plutôt se raffermisse. '
  '14':
  - type: note
    content: Ro 12:18. 2 Ti 2:22.
  - type: text
    content: 'Recherchez la paix avec tous, et '
  - type: note
    content: Mt 5:8.
  - type: text
    content: 'la sanctification, sans laquelle personne ne verra le Seigneur. '
  '15':
  - type: note
    content: 2 Co 6:1.
  - type: text
    content: 'Veillez à ce que nul ne se prive de la grâce de Dieu; à ce qu’aucune '
  - type: note
    content: De 29:18.
  - type: text
    content: 'racine d’amertume, poussant des rejetons, '
  - type: note
    content: Ac 17:13. Ga 5:12.
  - type: text
    content: 'ne produise du trouble, et que plusieurs n’en soient infectés; '
  '16':
  - type: note
    content: Ép 5:3. Col 3:5. 1 Th 4:3.
  - type: text
    content: 'à ce qu’il n’y ait ni impudique, ni profane '
  - type: note
    content: Ge 25:33.
  - type: text
    content: 'comme Ésaü, qui pour un mets vendit son droit d’aînesse. '
  '17':
  - type: note
    content: Ge 27:36.
  - type: text
    content: Vous savez que, plus tard, voulant obtenir la bénédiction, il fut rejeté, quoiqu’il la sollicitât avec larmes; car son repentir ne put avoir aucun effet.
  - type: heading
    content: 'V. 18-29: cf. (Ex 19:10-25; 20:1-19.) (Ga 4:26. Ap 3:12; 21:2, 3; 5:11, 12. Ép 1:10.) (Hé 2:1-3; 10:26-35.)'
  '18':
  - type: text
    content: 'Vous ne vous êtes pas approchés '
  - type: note
    content: Ex 19:10, etc.; 20:21.
  - type: text
    content: 'd’une montagne qu’on pouvait toucher '
  - type: note
    content: Ex 19:16. De 5:22.
  - type: text
    content: 'et qui était embrasée par le feu, ni de la nuée, ni des ténèbres, ni de la tempête, '
  '19':
  - type: text
    content: 'ni du retentissement de la trompette, ni du bruit des paroles, tel que ceux qui l’entendirent '
  - type: note
    content: Ex 20:19. De 5:25; 18:16.
  - type: text
    content: 'demandèrent qu’il ne leur en fût adressé aucune de plus, '
  '2':
  - type: text
    content: 'ayant les regards sur Jésus, le chef et le consommateur de la foi, qui, '
  - type: note
    content: Lu 24:26. Ph 2:8, 9, etc. 1 Pi 1:11.
  - type: text
    content: 'en vue de la joie qui lui était réservée, a souffert la croix, méprisé l’ignominie, et s’est assis à la droite '
  - type: note
    content: Hé 1:3; 8:1.
  - type: text
    content: 'du trône de Dieu. '
  '20':
  - type: text
    content: 'car ils ne supportaient pas cette déclaration: '
  - type: note
    content: Ex 19:13.
  - type: text
    content: 'Si même une bête touche la montagne, elle sera lapidée. '
  '21':
  - type: text
    content: 'Et ce spectacle était si terrible que Moïse dit: Je suis épouvanté et tout tremblant! '
  '22':
  - type: text
    content: 'Mais vous vous êtes approchés de la montagne de Sion, de la cité du Dieu vivant, '
  - type: note
    content: Ga 4:26. Ap 3:12; 21:10, etc.
  - type: text
    content: 'la Jérusalem céleste, des myriades qui forment le chœur des anges, '
  '23':
  - type: text
    content: 'de l’assemblée des premiers-nés '
  - type: note
    content: Lu 10:20.
  - type: text
    content: 'inscrits dans les cieux, du juge qui est le Dieu de tous, des esprits des justes parvenus à la perfection, '
  '24':
  - type: text
    content: 'de Jésus qui est le médiateur de la nouvelle alliance, et du sang '
  - type: note
    content: Hé 10:22. 1 Pi 1:2.
  - type: text
    content: 'de l’aspersion qui parle mieux que celui '
  - type: note
    content: Ge 4:10. Hé 11:4.
  - type: text
    content: 'd’Abel. '
  '25':
  - type: note
    content: Hé 2:3.
  - type: text
    content: 'Gardez-vous de refuser d’entendre celui qui parle; car si ceux-là n’ont pas échappé qui refusèrent d’entendre celui qui publiait les oracles sur la terre, combien moins échapperons-nous, si nous nous détournons de celui qui parle du haut des cieux, '
  '26':
  - type: text
    content: 'lui, dont la voix alors ébranla la terre, et qui maintenant a fait cette promesse: '
  - type: note
    content: Ag 2:7.
  - type: text
    content: 'Une fois encore j’ébranlerai non seulement la terre, mais aussi le ciel. '
  '27':
  - type: text
    content: 'Ces mots: Une fois encore, indiquent le changement des choses ébranlées, comme étant faites pour un temps, afin que les choses inébranlables subsistent. '
  '28':
  - type: text
    content: 'C’est pourquoi, recevant un royaume inébranlable, montrons notre reconnaissance '
  - type: note
    content: 1 Pi 2:5.
  - type: text
    content: 'en rendant à Dieu un culte qui lui soit agréable, avec piété et avec crainte, '
  '29':
  - type: note
    content: De 4:24.
  - type: text
    content: car notre Dieu est aussi un feu dévorant.
  '3':
  - type: text
    content: Considérez, en effet, celui qui a supporté contre sa personne une telle opposition de la part des pécheurs, afin que vous ne vous lassiez point, l’âme découragée.
  - type: heading
    content: 'V. 4-11: cf. (Pr 3:11, 12. Ap 3:19.) (Ps 119:67, 71. 1 Pi 1:6, 7.)'
  '4':
  - type: text
    content: ' '
  - type: note
    content: 1 Co 10:13.
  - type: text
    content: 'Vous n’avez pas encore résisté jusqu’au sang, en luttant contre le péché. '
  '5':
  - type: text
    content: 'Et vous avez oublié l’exhortation qui vous est adressée comme à des fils:'
  - type: note
    content: Job 5:17. Pr 3:11. Ap 3:19.
  - type: text
    content: Mon fils, ne méprise pas le châtiment du Seigneur,
  - type: text
    content: et ne perds pas courage lorsqu’il te reprend;
  '6':
  - type: text
    content: car le Seigneur châtie celui qu’il aime,
  - type: text
    content: et il frappe de la verge tous ceux qu’il reconnaît pour ses fils.
  '7':
  - type: text
    content: 'Supportez le châtiment: c’est comme des fils que Dieu vous traite; car quel est le fils qu’un père ne châtie pas? '
  '8':
  - type: text
    content: 'Mais si vous êtes exempts du châtiment auquel tous ont part, vous êtes donc des enfants illégitimes, et non des fils. '
  '9':
  - type: text
    content: 'D’ailleurs, puisque nos pères selon la chair nous ont châtiés, et que nous les avons respectés, ne devons-nous pas à bien plus forte raison nous soumettre au Père des esprits, pour avoir la vie? '
