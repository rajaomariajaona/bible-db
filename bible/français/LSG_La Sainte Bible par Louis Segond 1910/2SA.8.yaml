document_id: 2SA.8,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Victoires de David sur les Philistins, les Moabites, les Syriens, les Édomites
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-14: cf. 1 Ch 18:1-13. (Ps 44; 60; 108.) 1 S 18:14.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Ch 18:1, etc.
      marker-yv: yv-n
    - type: text
      text: 'Après cela, David battit les Philistins et les humilia, et il enleva de la main des Philistins les rênes de leur capitale. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et il envoya Joram, son fils, vers le roi David, pour le saluer, et pour le féliciter d’avoir attaqué Hadadézer et de l’avoir battu. Car Thoï était en guerre avec Hadadézer. Joram apporta des vases d’argent, des vases d’or, et des vases d’airain. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi David les consacra à l’Éternel, comme il avait déjà consacré l’argent et l’or pris sur toutes les nations qu’il avait vaincues, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sur la Syrie, sur Moab, sur les fils d’Ammon, sur les Philistins, sur Amalek, et sur le butin d’Hadadézer, fils de Rehob, roi de Tsoba. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 60:2
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Au retour de sa victoire sur les Syriens, David se fit encore un nom, en battant dans la vallée du sel dix-huit mille Édomites. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il mit des garnisons dans Édom, il mit des garnisons dans tout Édom. Et tout Édom fut assujetti à David. L’Éternel protégeait David partout où il allait.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hauts fonctionnaires de David
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 15-18: cf. 1 Ch 18:14-17. 2 S 20:23-26.'
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David régna sur Israël, et il faisait droit et justice à tout son peuple. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: text
        text: 1 Ch 18:15, etc.
      marker-yv: yv-n
    - type: text
      text: 'Joab, fils de Tseruja, commandait l’armée; Josaphat, fils d’Achilud, était archiviste; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsadok, fils d’Achithub, et Achimélec, fils d’Abiathar, étaient sacrificateurs; Seraja était secrétaire; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Benaja, fils de Jehojada, était chef des Kéréthiens et des Péléthiens; et les fils de David étaient ministres d’état.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il battit les Moabites, et il les mesura avec un cordeau, en les faisant coucher par terre; il en mesura deux cordeaux pour les livrer à la mort, et un plein cordeau pour leur laisser la vie. Et les Moabites furent assujettis à David, et lui payèrent un tribut. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David battit Hadadézer, fils de Rehob, roi de Tsoba, lorsqu’il alla rétablir sa domination sur le fleuve de l’Euphrate. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Ch 18:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'lui prit mille sept cents cavaliers et vingt mille hommes de pied; il coupa les jarrets à tous les chevaux de trait, et ne conserva que cent attelages. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les Syriens de Damas vinrent au secours d’Hadadézer, roi de Tsoba, et David battit vingt-deux mille Syriens. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David mit des garnisons dans la Syrie de Damas. Et les Syriens furent assujettis à David, et lui payèrent un tribut. L’Éternel protégeait David partout où il allait. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et David prit les boucliers d’or qu’avaient les serviteurs d’Hadadézer, et les apporta à Jérusalem. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi David prit encore une grande quantité d’airain à Béthach et à Bérothaï, villes d’Hadadézer. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thoï, roi de Hamath, apprit que David avait battu toute l’armée d’Hadadézer, '
