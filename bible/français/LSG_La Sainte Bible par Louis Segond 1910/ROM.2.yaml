document_id: ROM.2,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les païens
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-16: cf. (Mt 7:1-5. Ro 14:10-12.) Ga 6:7, 8. (Ja 1:22-25. Lu 12:47, 48. Ac 10:34, 35.) Ec 12:15, 16.'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'O homme, qui que tu sois, toi qui juges, tu es donc inexcusable; '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 S 12:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 7:1
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 4:5
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'car, en jugeant les autres, tu te condamnes toi-même, puisque toi qui juges, tu fais les mêmes choses. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Gloire, honneur et paix pour quiconque fait le bien, pour le Juif premièrement, puis pour le Grec! '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 10:17
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Ch 19:7
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 34:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 10:34
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 2:6
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ép 6:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 3:25
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pi 1:17
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Car devant Dieu il n’y a point d’acception de personnes. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tous ceux qui ont péché sans la loi périront aussi sans la loi, et tous ceux qui ont péché avec la loi seront jugés par la loi. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 7:21
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ja 1:22
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Jn 3:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Ce ne sont pas, en effet, ceux qui écoutent la loi qui sont justes devant Dieu, mais ce sont ceux qui la mettent en pratique qui seront justifiés. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand les païens, qui n’ont point la loi, font naturellement ce que prescrit la loi, ils sont, eux qui n’ont point la loi, une loi pour eux-mêmes; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ils montrent que l’œuvre de la loi est écrite dans leurs cœurs, leur conscience en rendant témoignage, et leurs pensées s’accusant ou se défendant tour à tour. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 25:31
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: C’est ce qui paraîtra au jour où, selon mon Évangile, Dieu jugera par Jésus-Christ les actions secrètes des hommes.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les Juifs
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 17-24: cf. Jé 8:8, 9. Ja 4:16, 17. Ro 14:15.'
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toi qui te donnes le nom de Juif, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 9:4
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'qui te reposes sur la loi, qui te glorifies de Dieu, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'qui connais sa volonté, qui apprécies la différence des choses, étant instruit par la loi; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'toi qui te flattes d’être le conducteur des aveugles, la lumière de ceux qui sont dans les ténèbres, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous savons, en effet, que le jugement de Dieu contre ceux qui commettent de telles choses est selon la vérité. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le docteur des insensés, le maître des ignorants, parce que tu as dans la loi la règle de la science et de la vérité; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'toi donc, qui enseignes les autres, tu ne t’enseignes pas toi-même! Toi qui prêches de ne pas dérober, tu dérobes! '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toi qui dis de ne pas commettre d’adultère, tu commets l’adultère! Toi qui as en abomination les idoles, tu commets des sacrilèges! '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toi qui te fais une gloire de la loi, tu déshonores Dieu par la transgression de la loi! '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car le nom de Dieu est à cause de vous blasphémé parmi les païens, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 52:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 36:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: comme cela est écrit.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 25-29: cf. (Jé 4:4. Jn 1:48. Ro 4:11, 12.) (1 Co 7:19. Ga 5:6.)'
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La circoncision est utile, si tu mets en pratique la loi; mais si tu transgresses la loi, ta circoncision devient incirconcision. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si donc l’incirconcis observe les ordonnances de la loi, son incirconcision ne sera-t-elle pas tenue pour circoncision? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L’incirconcis de nature, qui accomplit la loi, ne te condamnera-t-il pas, toi qui la transgresses, tout en ayant la lettre de la loi et la circoncision? '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jn 8:39
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 9:7
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Le Juif, ce n’est pas celui qui en a les dehors; et la circoncision, ce n’est pas celle qui est visible dans la chair. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais le Juif, c’est celui qui l’est intérieurement; et la circoncision, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 10:16
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 4:4
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ph 3:2
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3'
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 2:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: c’est celle du cœur, selon l’esprit et non selon la lettre. La louange de ce Juif ne vient pas des hommes, mais de Dieu.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et penses-tu, ô homme, qui juges ceux qui commettent de telles choses, et qui les fais, que tu échapperas au jugement de Dieu? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ou méprises-tu les richesses de sa bonté, de sa patience et de sa '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Pi 3:15
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'longanimité, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 30:18
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'ne reconnaissant pas que la bonté de Dieu te pousse à la repentance? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais, par ton endurcissement et par ton cœur impénitent, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 9:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'tu t’amasses un trésor de colère pour le jour de la colère et de la manifestation du juste jugement de Dieu, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 62:13
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 17:10
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 32:19
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 16:27
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ro 14:12
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 3:8
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 5:10
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 6:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ap 2:23
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 22:12
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'qui rendra à chacun selon ses œuvres; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'réservant la vie éternelle à ceux qui, par la persévérance à bien faire, cherchent l’honneur, la gloire et l’immortalité; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Th 1:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'mais l’irritation et la colère à ceux qui, par esprit de dispute, sont rebelles à la vérité et obéissent à l’injustice. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tribulation et angoisse sur toute âme d’homme qui fait le mal, sur le Juif premièrement, puis sur le Grec! '
