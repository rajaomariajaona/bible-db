document_id: ROM.2,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Les païens
  - type: heading
    content: 'V. 1-16: cf. (Mt 7:1-5. Ro 14:10-12.) Ga 6:7, 8. (Ja 1:22-25. Lu 12:47, 48. Ac 10:34, 35.) Ec 12:15, 16.'
  - type: text
    content: 'O homme, qui que tu sois, toi qui juges, tu es donc inexcusable; '
  - type: note
    content: 2 S 12:5. Mt 7:1. 1 Co 4:5.
  - type: text
    content: 'car, en jugeant les autres, tu te condamnes toi-même, puisque toi qui juges, tu fais les mêmes choses. '
  '10':
  - type: text
    content: 'Gloire, honneur et paix pour quiconque fait le bien, pour le Juif premièrement, puis pour le Grec! '
  '11':
  - type: note
    content: De 10:17. 2 Ch 19:7. Job 34:19. Ac 10:34. Ga 2:6. Ép 6:9. Col 3:25. 1 Pi 1:17.
  - type: text
    content: 'Car devant Dieu il n’y a point d’acception de personnes. '
  '12':
  - type: text
    content: 'Tous ceux qui ont péché sans la loi périront aussi sans la loi, et tous ceux qui ont péché avec la loi seront jugés par la loi. '
  '13':
  - type: note
    content: Mt 7:21. Ja 1:22. 1 Jn 3:7.
  - type: text
    content: 'Ce ne sont pas, en effet, ceux qui écoutent la loi qui sont justes devant Dieu, mais ce sont ceux qui la mettent en pratique qui seront justifiés. '
  '14':
  - type: text
    content: 'Quand les païens, qui n’ont point la loi, font naturellement ce que prescrit la loi, ils sont, eux qui n’ont point la loi, une loi pour eux-mêmes; '
  '15':
  - type: text
    content: 'ils montrent que l’œuvre de la loi est écrite dans leurs cœurs, leur conscience en rendant témoignage, et leurs pensées s’accusant ou se défendant tour à tour. '
  '16':
  - type: note
    content: Mt 25:31.
  - type: text
    content: C’est ce qui paraîtra au jour où, selon mon Évangile, Dieu jugera par Jésus-Christ les actions secrètes des hommes.
  - type: heading
    content: Les Juifs
  - type: heading
    content: 'V. 17-24: cf. Jé 8:8, 9. Ja 4:16, 17. Ro 14:15.'
  '17':
  - type: text
    content: 'Toi qui te donnes le nom de Juif, '
  - type: note
    content: Ro 9:4.
  - type: text
    content: 'qui te reposes sur la loi, qui te glorifies de Dieu, '
  '18':
  - type: text
    content: 'qui connais sa volonté, qui apprécies la différence des choses, étant instruit par la loi; '
  '19':
  - type: text
    content: 'toi qui te flattes d’être le conducteur des aveugles, la lumière de ceux qui sont dans les ténèbres, '
  '2':
  - type: text
    content: 'Nous savons, en effet, que le jugement de Dieu contre ceux qui commettent de telles choses est selon la vérité. '
  '20':
  - type: text
    content: 'le docteur des insensés, le maître des ignorants, parce que tu as dans la loi la règle de la science et de la vérité; '
  '21':
  - type: text
    content: 'toi donc, qui enseignes les autres, tu ne t’enseignes pas toi-même! Toi qui prêches de ne pas dérober, tu dérobes! '
  '22':
  - type: text
    content: 'Toi qui dis de ne pas commettre d’adultère, tu commets l’adultère! Toi qui as en abomination les idoles, tu commets des sacrilèges! '
  '23':
  - type: text
    content: 'Toi qui te fais une gloire de la loi, tu déshonores Dieu par la transgression de la loi! '
  '24':
  - type: text
    content: 'Car le nom de Dieu est à cause de vous blasphémé parmi les païens, '
  - type: note
    content: És 52:5. Éz 36:23.
  - type: text
    content: comme cela est écrit.
  - type: heading
    content: 'V. 25-29: cf. (Jé 4:4. Jn 1:48. Ro 4:11, 12.) (1 Co 7:19. Ga 5:6.)'
  '25':
  - type: text
    content: 'La circoncision est utile, si tu mets en pratique la loi; mais si tu transgresses la loi, ta circoncision devient incirconcision. '
  '26':
  - type: text
    content: 'Si donc l’incirconcis observe les ordonnances de la loi, son incirconcision ne sera-t-elle pas tenue pour circoncision? '
  '27':
  - type: text
    content: 'L’incirconcis de nature, qui accomplit la loi, ne te condamnera-t-il pas, toi qui la transgresses, tout en ayant la lettre de la loi et la circoncision? '
  '28':
  - type: note
    content: Jn 8:39. Ro 9:7.
  - type: text
    content: 'Le Juif, ce n’est pas celui qui en a les dehors; et la circoncision, ce n’est pas celle qui est visible dans la chair. '
  '29':
  - type: text
    content: 'Mais le Juif, c’est celui qui l’est intérieurement; et la circoncision, '
  - type: note
    content: De 10:16. Jé 4:4. Ph 3:2, 3. Col 2:11.
  - type: text
    content: c’est celle du cœur, selon l’esprit et non selon la lettre. La louange de ce Juif ne vient pas des hommes, mais de Dieu.
  '3':
  - type: text
    content: 'Et penses-tu, ô homme, qui juges ceux qui commettent de telles choses, et qui les fais, que tu échapperas au jugement de Dieu? '
  '4':
  - type: text
    content: 'Ou méprises-tu les richesses de sa bonté, de sa patience et de sa '
  - type: note
    content: 2 Pi 3:15.
  - type: text
    content: 'longanimité, '
  - type: note
    content: És 30:18.
  - type: text
    content: 'ne reconnaissant pas que la bonté de Dieu te pousse à la repentance? '
  '5':
  - type: text
    content: 'Mais, par ton endurcissement et par ton cœur impénitent, '
  - type: note
    content: Ro 9:22.
  - type: text
    content: 'tu t’amasses un trésor de colère pour le jour de la colère et de la manifestation du juste jugement de Dieu, '
  '6':
  - type: note
    content: Ps 62:13. Jé 17:10; 32:19. Mt 16:27. Ro 14:12. 1 Co 3:8. 2 Co 5:10. Ga 6:5. Ap 2:23; 22:12.
  - type: text
    content: 'qui rendra à chacun selon ses œuvres; '
  '7':
  - type: text
    content: 'réservant la vie éternelle à ceux qui, par la persévérance à bien faire, cherchent l’honneur, la gloire et l’immortalité; '
  '8':
  - type: note
    content: 2 Th 1:8.
  - type: text
    content: 'mais l’irritation et la colère à ceux qui, par esprit de dispute, sont rebelles à la vérité et obéissent à l’injustice. '
  '9':
  - type: text
    content: 'Tribulation et angoisse sur toute âme d’homme qui fait le mal, sur le Juif premièrement, puis sur le Grec! '
