document_id: EXO.6,93
type_code: fra
verses:
  '1':
  - type: heading
    content: La délivrance promise par l’Éternel
  - type: heading
    content: 'V. 1-13: cf. Ex 3:13-20. Éz 20:5-9. De 32:36.'
  - type: text
    content: 'L’Éternel dit à Moïse: Tu verras maintenant ce que je ferai à Pharaon; une main puissante le forcera à les laisser aller, une main puissante le forcera à les chasser de son pays. '
  '10':
  - type: text
    content: 'L’Éternel parla à Moïse, et dit: '
  '11':
  - type: text
    content: 'Va, parle à Pharaon, roi d’Égypte, pour qu’il laisse aller les enfants d’Israël hors de son pays. '
  '12':
  - type: text
    content: 'Moïse répondit en présence de l’Éternel: Voici, les enfants d’Israël ne m’ont point écouté; comment Pharaon m’écouterait-il, '
  - type: note
    content: Ex 4:10; 6:29.
  - type: text
    content: 'moi qui n’ai pas la parole facile? '
  '13':
  - type: text
    content: L’Éternel parla à Moïse et à Aaron, et leur donna des ordres au sujet des enfants d’Israël et au sujet de Pharaon, roi d’Égypte, pour faire sortir du pays d’Égypte les enfants d’Israël.
  - type: heading
    content: Généalogie de Moïse et d’Aaron
  - type: heading
    content: 'V. 14-30: cf. Ge 46:8-11. No 26:5-14, 57-62.'
  '14':
  - type: text
    content: 'Voici les chefs de leurs familles. '
  - type: note
    content: Ge 46:9. No 26:5. 1 Ch 5:3.
  - type: text
    content: 'Fils de Ruben, premier-né d’Israël: Hénoc, Pallu, Hetsron et Carmi. Ce sont là les familles de Ruben. '
  '15':
  - type: note
    content: Ge 46:10. No 26:12. 1 Ch 4:24.
  - type: text
    content: 'Fils de Siméon: Jemuel, Jamin, Ohad, Jakin et Tsochar; et Saül, fils de la Cananéenne. Ce sont là les familles de Siméon. '
  '16':
  - type: note
    content: Ge 46:11. No 3:17; 26:57. 1 Ch 6:1, 16; 23:6.
  - type: text
    content: 'Voici les noms des fils de Lévi, avec leur postérité: Guerschon, Kehath et Merari. Les années de la vie de Lévi furent de cent trente-sept ans. '
  '17':
  - type: note
    content: 1 Ch 6:17; 23:6.
  - type: text
    content: 'Fils de Guerschon: Libni et Schimeï, et leurs familles. '
  '18':
  - type: note
    content: 1 Ch 6:18; 23:12.
  - type: text
    content: 'Fils de Kehath: Amram, Jitsehar, Hébron et Uziel. Les années de la vie de Kehath furent de cent trente-trois ans. '
  '19':
  - type: note
    content: 1 Ch 6:19; 23:21.
  - type: text
    content: 'Fils de Merari: Machli et Muschi. Ce sont là les familles de Lévi, avec leur postérité. '
  '2':
  - type: text
    content: 'Dieu parla encore à Moïse, et lui dit: Je suis l’Éternel. '
  '20':
  - type: note
    content: Ex 2:1. No 26:59.
  - type: text
    content: 'Amram prit pour femme Jokébed, sa tante; et elle lui enfanta Aaron, et Moïse. Les années de la vie d’Amram furent de cent trente-sept ans. '
  '21':
  - type: text
    content: 'Fils de Jitsehar: Koré, Népheg et Zicri. '
  '22':
  - type: text
    content: 'Fils d’Uziel: Mischaël, Eltsaphan et Sithri. '
  '23':
  - type: note
    content: No 3:2; 26:60.
  - type: text
    content: 'Aaron prit pour femme Élischéba, fille d’Amminadab, sœur de Nachschon; et '
  - type: note
    content: 1 Ch 6:3; 24:1.
  - type: text
    content: 'elle lui enfanta Nadab, Abihu, Éléazar et Ithamar. '
  '24':
  - type: text
    content: 'Fils de Koré: Assir, Elkana et Abiasaph. Ce sont là les familles des Korites. '
  '25':
  - type: text
    content: 'Éléazar, fils d’Aaron, prit pour femme une des filles de Puthiel; et elle lui enfanta Phinées. Tels sont les chefs de famille des Lévites, avec leurs familles. '
  '26':
  - type: text
    content: 'Ce sont là cet Aaron et ce Moïse, à qui l’Éternel dit: Faites sortir du pays d’Égypte les enfants d’Israël, selon leurs armées. '
  '27':
  - type: text
    content: 'Ce sont eux qui parlèrent à Pharaon, roi d’Égypte, pour faire sortir d’Égypte les enfants d’Israël. Ce sont là ce Moïse et cet Aaron. '
  '28':
  - type: text
    content: 'Lorsque l’Éternel parla à Moïse dans le pays d’Égypte, '
  '29':
  - type: text
    content: 'l’Éternel dit à Moïse: Je suis l’Éternel. Dis à Pharaon, roi d’Égypte, tout ce que je te dis. '
  '3':
  - type: text
    content: 'Je suis apparu à Abraham, à Isaac et à Jacob, comme le Dieu tout-puissant; mais je n’ai pas été connu d’eux sous mon nom, l’Éternel. '
  '30':
  - type: text
    content: 'Et Moïse répondit en présence de l’Éternel: Voici, '
  - type: note
    content: Ex 4:10; 6:11.
  - type: text
    content: je n’ai pas la parole facile; comment Pharaon m’écouterait-il?
  '4':
  - type: text
    content: 'J’ai aussi établi mon alliance avec eux, pour leur donner le pays de Canaan, le pays de leurs pèlerinages, dans lequel ils ont séjourné. '
  '5':
  - type: text
    content: 'J’ai entendu les gémissements des enfants d’Israël, que les Égyptiens tiennent dans la servitude, et je me suis souvenu de mon alliance. '
  '6':
  - type: text
    content: 'C’est pourquoi dis aux enfants d’Israël: Je suis l’Éternel, je vous affranchirai des travaux dont vous chargent les Égyptiens, je vous délivrerai de leur servitude, et je vous sauverai à bras étendu et par de grands jugements. '
  '7':
  - type: text
    content: 'Je vous prendrai pour mon peuple, je serai votre Dieu, et vous saurez que c’est moi, l’Éternel, votre Dieu, qui vous affranchis des travaux dont vous chargent les Égyptiens. '
  '8':
  - type: text
    content: 'Je vous ferai entrer dans le pays que j’ai juré de donner à Abraham, à Isaac et à Jacob; je vous le donnerai en possession, moi l’Éternel. '
  '9':
  - type: text
    content: 'Ainsi parla Moïse aux enfants d’Israël. Mais l’angoisse et la dure servitude les empêchèrent d’écouter Moïse. '
