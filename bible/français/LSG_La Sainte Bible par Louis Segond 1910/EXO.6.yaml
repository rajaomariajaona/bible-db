document_id: EXO.6
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La délivrance promise par l’Éternel
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-13: cf. Ex 3:13-20. Éz 20:5-9. De 32:36.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L’Éternel dit à Moïse: Tu verras maintenant ce que je ferai à Pharaon; une main puissante le forcera à les laisser aller, une main puissante le forcera à les chasser de son pays. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dieu parla encore à Moïse, et lui dit: Je suis l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Je suis apparu à Abraham, à Isaac et à Jacob, comme le Dieu tout-puissant; mais je n’ai pas été connu d’eux sous mon nom, l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'J’ai aussi établi mon alliance avec eux, pour leur donner le pays de Canaan, le pays de leurs pèlerinages, dans lequel ils ont séjourné. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'J’ai entendu les gémissements des enfants d’Israël, que les Égyptiens tiennent dans la servitude, et je me suis souvenu de mon alliance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'C’est pourquoi dis aux enfants d’Israël: Je suis l’Éternel, je vous affranchirai des travaux dont vous chargent les Égyptiens, je vous délivrerai de leur servitude, et je vous sauverai à bras étendu et par de grands jugements. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Je vous prendrai pour mon peuple, je serai votre Dieu, et vous saurez que c’est moi, l’Éternel, votre Dieu, qui vous affranchis des travaux dont vous chargent les Égyptiens. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Je vous ferai entrer dans le pays que j’ai juré de donner à Abraham, à Isaac et à Jacob; je vous le donnerai en possession, moi l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ainsi parla Moïse aux enfants d’Israël. Mais l’angoisse et la dure servitude les empêchèrent d’écouter Moïse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'L’Éternel parla à Moïse, et dit: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Va, parle à Pharaon, roi d’Égypte, pour qu’il laisse aller les enfants d’Israël hors de son pays. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Moïse répondit en présence de l’Éternel: Voici, les enfants d’Israël ne m’ont point écouté; comment Pharaon m’écouterait-il, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 4:10
      metadata:
        usfm: EXO.4.10
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 6:29
      metadata:
        usfm: EXO.6.29
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'moi qui n’ai pas la parole facile? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: L’Éternel parla à Moïse et à Aaron, et leur donna des ordres au sujet des enfants d’Israël et au sujet de Pharaon, roi d’Égypte, pour faire sortir du pays d’Égypte les enfants d’Israël.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Généalogie de Moïse et d’Aaron
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 14-30: cf. Ge 46:8-11. No 26:5-14, 57-62.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Voici les chefs de leurs familles. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 46:9
      metadata:
        usfm: GEN.46.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 26:5
      metadata:
        usfm: NUM.26.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 5:3
      metadata:
        usfm: 1CH.5.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Fils de Ruben, premier-né d’Israël: Hénoc, Pallu, Hetsron et Carmi. Ce sont là les familles de Ruben. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 46:10
      metadata:
        usfm: GEN.46.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 26:12
      metadata:
        usfm: NUM.26.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 4:24
      metadata:
        usfm: 1CH.4.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Fils de Siméon: Jemuel, Jamin, Ohad, Jakin et Tsochar; et Saül, fils de la Cananéenne. Ce sont là les familles de Siméon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 46:11
      metadata:
        usfm: GEN.46.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 3:17
      metadata:
        usfm: NUM.3.17
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 26:57
      metadata:
        usfm: NUM.26.57
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 6:1
      metadata:
        usfm: 1CH.6.1
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '16'
      metadata:
        usfm: 1CH.6.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 23:6
      metadata:
        usfm: 1CH.23.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Voici les noms des fils de Lévi, avec leur postérité: Guerschon, Kehath et Merari. Les années de la vie de Lévi furent de cent trente-sept ans. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 6:17
      metadata:
        usfm: 1CH.6.17
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 23:6
      metadata:
        usfm: 1CH.23.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Fils de Guerschon: Libni et Schimeï, et leurs familles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 6:18
      metadata:
        usfm: 1CH.6.18
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 23:12
      metadata:
        usfm: 1CH.23.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Fils de Kehath: Amram, Jitsehar, Hébron et Uziel. Les années de la vie de Kehath furent de cent trente-trois ans. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 6:19
      metadata:
        usfm: 1CH.6.19
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 23:21
      metadata:
        usfm: 1CH.23.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Fils de Merari: Machli et Muschi. Ce sont là les familles de Lévi, avec leur postérité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 2:1
      metadata:
        usfm: EXO.2.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 26:59
      metadata:
        usfm: NUM.26.59
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Amram prit pour femme Jokébed, sa tante; et elle lui enfanta Aaron, et Moïse. Les années de la vie d’Amram furent de cent trente-sept ans. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fils de Jitsehar: Koré, Népheg et Zicri. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fils d’Uziel: Mischaël, Eltsaphan et Sithri. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: No 3:2
      metadata:
        usfm: NUM.3.2
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 26:60
      metadata:
        usfm: NUM.26.60
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Aaron prit pour femme Élischéba, fille d’Amminadab, sœur de Nachschon; et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 6:3
      metadata:
        usfm: 1CH.6.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 24:1
      metadata:
        usfm: 1CH.24.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'elle lui enfanta Nadab, Abihu, Éléazar et Ithamar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Fils de Koré: Assir, Elkana et Abiasaph. Ce sont là les familles des Korites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Éléazar, fils d’Aaron, prit pour femme une des filles de Puthiel; et elle lui enfanta Phinées. Tels sont les chefs de famille des Lévites, avec leurs familles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ce sont là cet Aaron et ce Moïse, à qui l’Éternel dit: Faites sortir du pays d’Égypte les enfants d’Israël, selon leurs armées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ce sont eux qui parlèrent à Pharaon, roi d’Égypte, pour faire sortir d’Égypte les enfants d’Israël. Ce sont là ce Moïse et cet Aaron. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Lorsque l’Éternel parla à Moïse dans le pays d’Égypte, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'l’Éternel dit à Moïse: Je suis l’Éternel. Dis à Pharaon, roi d’Égypte, tout ce que je te dis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Et Moïse répondit en présence de l’Éternel: Voici, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 4:10
      metadata:
        usfm: EXO.4.10
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 6:11
      metadata:
        usfm: EXO.6.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: je n’ai pas la parole facile; comment Pharaon m’écouterait-il?
