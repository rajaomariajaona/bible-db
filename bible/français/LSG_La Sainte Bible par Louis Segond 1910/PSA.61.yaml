document_id: PSA.61,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2 S 17:22, etc. (Ps 42; 43; 63.) 2 S 7:29.
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Au chef des chantres. Sur instruments à cordes. De David.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Dieu! Écoute mes cris,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sois attentif à ma prière!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Du bout de la terre je crie à toi, le cœur abattu;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Conduis-moi sur le rocher que je ne puis atteindre!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car tu es pour moi un refuge,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Une tour forte, en face de l’ennemi.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je voudrais séjourner éternellement dans ta tente,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Me réfugier à l’abri de tes ailes. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: — Pause.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car toi, ô Dieu! Tu exauces mes vœux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu me donnes l’héritage de ceux qui craignent ton nom.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ajoute des jours aux jours du roi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que ses années se prolongent à jamais!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’il reste sur le trône éternellement devant Dieu!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fais que ta bonté et ta fidélité veillent sur lui!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors je chanterai sans cesse ton nom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En accomplissant chaque jour mes vœux.
