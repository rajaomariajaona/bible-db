document_id: PSA.61,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 2 S 17:22, etc. (Ps 42; 43; 63.) 2 S 7:29.
  - type: text
    content: Au chef des chantres. Sur instruments à cordes. De David.
  '2':
  - type: text
    content: O Dieu! Écoute mes cris,
  - type: text
    content: Sois attentif à ma prière!
  '3':
  - type: text
    content: Du bout de la terre je crie à toi, le cœur abattu;
  - type: text
    content: Conduis-moi sur le rocher que je ne puis atteindre!
  '4':
  - type: text
    content: Car tu es pour moi un refuge,
  - type: text
    content: Une tour forte, en face de l’ennemi.
  '5':
  - type: text
    content: Je voudrais séjourner éternellement dans ta tente,
  - type: text
    content: 'Me réfugier à l’abri de tes ailes. '
  - type: text
    content: — Pause.
  '6':
  - type: text
    content: Car toi, ô Dieu! Tu exauces mes vœux,
  - type: text
    content: Tu me donnes l’héritage de ceux qui craignent ton nom.
  '7':
  - type: text
    content: Ajoute des jours aux jours du roi;
  - type: text
    content: Que ses années se prolongent à jamais!
  '8':
  - type: text
    content: Qu’il reste sur le trône éternellement devant Dieu!
  - type: text
    content: Fais que ta bonté et ta fidélité veillent sur lui!
  '9':
  - type: text
    content: Alors je chanterai sans cesse ton nom,
  - type: text
    content: En accomplissant chaque jour mes vœux.
