document_id: PSA.61
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 2 S 17:22, etc. (Ps 42; 43; 63.) 2 S 7:29.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef des chantres. Sur instruments à cordes. De David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: O Dieu! Écoute mes cris,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sois attentif à ma prière!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Du bout de la terre je crie à toi, le cœur abattu;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Conduis-moi sur le rocher que je ne puis atteindre!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Car tu es pour moi un refuge,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Une tour forte, en face de l’ennemi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Je voudrais séjourner éternellement dans ta tente,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Me réfugier à l’abri de tes ailes. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: — Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Car toi, ô Dieu! Tu exauces mes vœux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu me donnes l’héritage de ceux qui craignent ton nom.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ajoute des jours aux jours du roi;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que ses années se prolongent à jamais!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Qu’il reste sur le trône éternellement devant Dieu!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fais que ta bonté et ta fidélité veillent sur lui!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Alors je chanterai sans cesse ton nom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: En accomplissant chaque jour mes vœux.
