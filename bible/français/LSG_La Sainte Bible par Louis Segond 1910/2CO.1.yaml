document_id: 2CO.1
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Adresse et salutation
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-2: cf. Ga 1:1-5. Col 1:1, 2.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Paul, apôtre de Jésus-Christ par la volonté de Dieu, et le frère '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 1:1
      metadata:
        usfm: PHP.1.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Timothée, à l’Église de Dieu qui est à Corinthe, et à tous les saints qui sont dans toute l’Achaïe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 1:7
      metadata:
        usfm: ROM.1.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 1:3
      metadata:
        usfm: 1CO.1.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 1:2
      metadata:
        usfm: EPH.1.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 1:2
      metadata:
        usfm: 1PE.1.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: que la grâce et la paix vous soient données de la part de Dieu notre Père et du Seigneur Jésus-Christ!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Consolations de l’apôtre au milieu de ses souffrances. Motifs pour lesquels il a différé sa visite aux Corinthiens
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 3-11: cf. (2 Co 4:8-18. 2 Ti 2:8-12. Ph 1:27-30.) Ac 19:23, etc.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 1:3
      metadata:
        usfm: EPH.1.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 1:2
      metadata:
        usfm: 1PE.1.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Béni soit Dieu, le Père de notre Seigneur Jésus-Christ, le Père des miséricordes et le Dieu de toute consolation, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 7:6
      metadata:
        usfm: 2CO.7.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qui nous console dans toutes nos afflictions, afin que, par la consolation dont nous sommes l’objet de la part de Dieu, nous puissions consoler ceux qui se trouvent dans quelque affliction! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 34:20
      metadata:
        usfm: PSA.34.20
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 94:19
      metadata:
        usfm: PSA.94.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Car, de même que les souffrances de Christ abondent en nous, de même notre consolation abonde par Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Si nous sommes affligés, c’est pour votre consolation et pour votre salut; si nous sommes consolés, c’est pour votre consolation, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 4:17
      metadata:
        usfm: 2CO.4.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qui se réalise par la patience à supporter les mêmes souffrances que nous endurons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Et notre espérance à votre égard est ferme, parce que nous savons que, si vous avez part aux souffrances, vous avez part aussi à la consolation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nous ne voulons pas, en effet, vous laisser ignorer, frères, au sujet de la tribulation '
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ac 19:23, etc.
    marker-yv: yv-n
  - type: text
    text: 'qui nous est survenue en Asie, que nous avons été excessivement accablés, au-delà de nos forces, de telle sorte que nous désespérions même de conserver la vie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Et nous regardions comme certain notre arrêt de mort, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 17:5
      metadata:
        usfm: JER.17.5
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '7'
      metadata:
        usfm: JER.17.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'afin de ne pas placer notre confiance en nous-mêmes, mais de la placer en Dieu, qui ressuscite les morts. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 15:31
      metadata:
        usfm: 1CO.15.31
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'C’est lui qui nous a délivrés et qui nous délivrera d’une telle mort, lui de qui nous espérons qu’il nous délivrera encore, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 15:30
      metadata:
        usfm: ROM.15.30
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 1:19
      metadata:
        usfm: PHP.1.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'vous-mêmes aussi nous assistant de vos prières, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 4:15
      metadata:
        usfm: 2CO.4.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: afin que la grâce obtenue pour nous par plusieurs soit pour plusieurs une occasion de rendre grâces à notre sujet.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 12-22: cf. 1 Th 2:3-12. (1 Co 4:18-21; 16:5-7.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Car ce qui fait notre gloire, c’est ce témoignage de notre conscience, que nous nous sommes conduits dans le monde, et surtout à votre égard, avec sainteté et pureté devant Dieu, non point avec une sagesse charnelle, mais avec la grâce de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nous ne vous écrivons pas autre chose que ce que vous lisez, et ce que vous reconnaissez. Et j’espère que vous le reconnaîtrez jusqu’à la fin, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'comme vous avez déjà reconnu en partie que nous sommes votre gloire, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 2:16
      metadata:
        usfm: PHP.2.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 2:19
      metadata:
        usfm: 1TH.2.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'de même que vous serez aussi la nôtre au jour du Seigneur Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 16:5
      metadata:
        usfm: 1CO.16.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Dans cette persuasion, je voulais aller d’abord vers vous, afin que vous eussiez une double grâce; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'je voulais passer chez vous pour me rendre en Macédoine, puis revenir de la Macédoine chez vous, et vous m’auriez fait accompagner en Judée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Est-ce que, en voulant cela, j’ai donc usé de légèreté? Ou bien, mes résolutions sont-elles des résolutions selon la chair, de sorte qu’il y ait en moi le oui et le non? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Aussi vrai que Dieu est fidèle, la parole que nous vous avons adressée '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 5:37
      metadata:
        usfm: MAT.5.37
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ja 5:12
      metadata:
        usfm: JAS.5.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'n’a pas été oui et non. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Car le Fils de Dieu, Jésus-Christ, qui a été prêché par nous au milieu de vous, par moi, et par Silvain, et par Timothée, n’a pas été oui et non, mais c’est oui qui a été en lui; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'car, pour ce qui concerne toutes les promesses de Dieu, c’est en lui qu’est le oui; c’est pourquoi encore l’Amen par lui est prononcé par nous à la gloire de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Et celui qui nous affermit avec vous en Christ, et qui nous a oints, c’est Dieu, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 8:16
      metadata:
        usfm: ROM.8.16
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 5:5
      metadata:
        usfm: 2CO.5.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 1:13
      metadata:
        usfm: EPH.1.13
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 4:30
      metadata:
        usfm: EPH.4.30
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: lequel nous a aussi marqués d’un sceau et a mis dans nos cœurs les arrhes de l’Esprit.
- type: usfm
  marker: r
  children:
  - type: text
    text: '1 v. 23 à 2 v. 4: cf. (2 Co 12:19-21; 13:1, 2, 10.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 1:9
      metadata:
        usfm: ROM.1.9
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 9:1
      metadata:
        usfm: ROM.9.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 11:31
      metadata:
        usfm: 2CO.11.31
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 1:20
      metadata:
        usfm: GAL.1.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 1:8
      metadata:
        usfm: PHP.1.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 2:5
      metadata:
        usfm: 1TH.2.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 5:21
      metadata:
        usfm: 1TI.5.21
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ti 4:1
      metadata:
        usfm: 2TI.4.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Or, je prends Dieu à témoin sur mon âme, que c’est pour vous épargner que je ne suis plus allé à Corinthe; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 5:3
      metadata:
        usfm: 1PE.5.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: non pas que nous dominions sur votre foi, mais nous contribuons à votre joie, car vous êtes fermes dans la foi.
