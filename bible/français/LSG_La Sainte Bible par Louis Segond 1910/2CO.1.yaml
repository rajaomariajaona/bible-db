document_id: 2CO.1,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Adresse et salutation
  - type: heading
    content: 'V. 1-2: cf. Ga 1:1-5. Col 1:1, 2.'
  - type: text
    content: 'Paul, apôtre de Jésus-Christ par la volonté de Dieu, et le frère '
  - type: note
    content: Ph 1:1.
  - type: text
    content: 'Timothée, à l’Église de Dieu qui est à Corinthe, et à tous les saints qui sont dans toute l’Achaïe: '
  '10':
  - type: note
    content: 1 Co 15:31.
  - type: text
    content: 'C’est lui qui nous a délivrés et qui nous délivrera d’une telle mort, lui de qui nous espérons qu’il nous délivrera encore, '
  '11':
  - type: note
    content: Ro 15:30. Ph 1:19.
  - type: text
    content: 'vous-mêmes aussi nous assistant de vos prières, '
  - type: note
    content: 2 Co 4:15.
  - type: text
    content: afin que la grâce obtenue pour nous par plusieurs soit pour plusieurs une occasion de rendre grâces à notre sujet.
  - type: heading
    content: 'V. 12-22: cf. 1 Th 2:3-12. (1 Co 4:18-21; 16:5-7.)'
  '12':
  - type: text
    content: 'Car ce qui fait notre gloire, c’est ce témoignage de notre conscience, que nous nous sommes conduits dans le monde, et surtout à votre égard, avec sainteté et pureté devant Dieu, non point avec une sagesse charnelle, mais avec la grâce de Dieu. '
  '13':
  - type: text
    content: 'Nous ne vous écrivons pas autre chose que ce que vous lisez, et ce que vous reconnaissez. Et j’espère que vous le reconnaîtrez jusqu’à la fin, '
  '14':
  - type: text
    content: 'comme vous avez déjà reconnu en partie que nous sommes votre gloire, '
  - type: note
    content: Ph 2:16. 1 Th 2:19.
  - type: text
    content: 'de même que vous serez aussi la nôtre au jour du Seigneur Jésus. '
  '15':
  - type: note
    content: 1 Co 16:5.
  - type: text
    content: 'Dans cette persuasion, je voulais aller d’abord vers vous, afin que vous eussiez une double grâce; '
  '16':
  - type: text
    content: 'je voulais passer chez vous pour me rendre en Macédoine, puis revenir de la Macédoine chez vous, et vous m’auriez fait accompagner en Judée. '
  '17':
  - type: text
    content: 'Est-ce que, en voulant cela, j’ai donc usé de légèreté? Ou bien, mes résolutions sont-elles des résolutions selon la chair, de sorte qu’il y ait en moi le oui et le non? '
  '18':
  - type: text
    content: 'Aussi vrai que Dieu est fidèle, la parole que nous vous avons adressée '
  - type: note
    content: Mt 5:37. Ja 5:12.
  - type: text
    content: 'n’a pas été oui et non. '
  '19':
  - type: text
    content: 'Car le Fils de Dieu, Jésus-Christ, qui a été prêché par nous au milieu de vous, par moi, et par Silvain, et par Timothée, n’a pas été oui et non, mais c’est oui qui a été en lui; '
  '2':
  - type: note
    content: Ro 1:7. 1 Co 1:3. Ép 1:2. 1 Pi 1:2.
  - type: text
    content: que la grâce et la paix vous soient données de la part de Dieu notre Père et du Seigneur Jésus-Christ!
  - type: heading
    content: Consolations de l’apôtre au milieu de ses souffrances. Motifs pour lesquels il a différé sa visite aux Corinthiens
  - type: heading
    content: 'V. 3-11: cf. (2 Co 4:8-18. 2 Ti 2:8-12. Ph 1:27-30.) Ac 19:23, etc.'
  '20':
  - type: text
    content: 'car, pour ce qui concerne toutes les promesses de Dieu, c’est en lui qu’est le oui; c’est pourquoi encore l’Amen par lui est prononcé par nous à la gloire de Dieu. '
  '21':
  - type: text
    content: 'Et celui qui nous affermit avec vous en Christ, et qui nous a oints, c’est Dieu, '
  '22':
  - type: note
    content: Ro 8:16. 2 Co 5:5. Ép 1:13; 4:30.
  - type: text
    content: lequel nous a aussi marqués d’un sceau et a mis dans nos cœurs les arrhes de l’Esprit.
  - type: heading
    content: '1 v. 23 à 2 v. 4: cf. (2 Co 12:19-21; 13:1, 2, 10.)'
  '23':
  - type: text
    content: ' '
  - type: note
    content: Ro 1:9; 9:1. 2 Co 11:31. Ga 1:20. Ph 1:8. 1 Th 2:5. 1 Ti 5:21. 2 Ti 4:1.
  - type: text
    content: 'Or, je prends Dieu à témoin sur mon âme, que c’est pour vous épargner que je ne suis plus allé à Corinthe; '
  '24':
  - type: note
    content: 1 Pi 5:3.
  - type: text
    content: non pas que nous dominions sur votre foi, mais nous contribuons à votre joie, car vous êtes fermes dans la foi.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Ép 1:3. 1 Pi 1:2.
  - type: text
    content: 'Béni soit Dieu, le Père de notre Seigneur Jésus-Christ, le Père des miséricordes et le Dieu de toute consolation, '
  '4':
  - type: note
    content: 2 Co 7:6.
  - type: text
    content: 'qui nous console dans toutes nos afflictions, afin que, par la consolation dont nous sommes l’objet de la part de Dieu, nous puissions consoler ceux qui se trouvent dans quelque affliction! '
  '5':
  - type: note
    content: Ps 34:20; 94:19.
  - type: text
    content: 'Car, de même que les souffrances de Christ abondent en nous, de même notre consolation abonde par Christ. '
  '6':
  - type: text
    content: 'Si nous sommes affligés, c’est pour votre consolation et pour votre salut; si nous sommes consolés, c’est pour votre consolation, '
  - type: note
    content: 2 Co 4:17.
  - type: text
    content: 'qui se réalise par la patience à supporter les mêmes souffrances que nous endurons. '
  '7':
  - type: text
    content: 'Et notre espérance à votre égard est ferme, parce que nous savons que, si vous avez part aux souffrances, vous avez part aussi à la consolation. '
  '8':
  - type: text
    content: 'Nous ne voulons pas, en effet, vous laisser ignorer, frères, au sujet de la tribulation '
  - type: note
    content: Ac 19:23, etc.
  - type: text
    content: 'qui nous est survenue en Asie, que nous avons été excessivement accablés, au-delà de nos forces, de telle sorte que nous désespérions même de conserver la vie. '
  '9':
  - type: text
    content: 'Et nous regardions comme certain notre arrêt de mort, '
  - type: note
    content: Jé 17:5, 7.
  - type: text
    content: 'afin de ne pas placer notre confiance en nous-mêmes, mais de la placer en Dieu, qui ressuscite les morts. '
