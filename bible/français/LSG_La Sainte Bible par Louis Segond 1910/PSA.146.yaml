document_id: PSA.146
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: Esd 6:16. (Ps 145; 147.) Jé 17:5-8.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Louez l’Éternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon âme, loue l’Éternel!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Je louerai l’Éternel tant que je vivrai,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je célébrerai mon Dieu tant que j’existerai.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 118:8
      metadata:
        usfm: PSA.118.8
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '9'
      metadata:
        usfm: PSA.118.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Ne vous confiez pas aux grands,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aux fils de l’homme, qui ne peuvent sauver.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Leur souffle s’en va, ils rentrent dans la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ce même jour leurs desseins périssent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Heureux celui qui a pour secours le Dieu de Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui met son espoir en l’Éternel, son Dieu!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Il a fait les cieux et la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La mer et tout ce qui s’y trouve.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il garde la fidélité à toujours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il fait droit aux opprimés;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il donne du pain aux affamés;
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’Éternel délivre les captifs;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 9:30
      metadata:
        usfm: MAT.9.30
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 9:7
      metadata:
        usfm: JHN.9.7
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '32'
      metadata:
        usfm: JHN.9.32
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: L’Éternel ouvre les yeux des aveugles;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'L’Éternel '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 145:14
      metadata:
        usfm: PSA.145.14
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 147:3
      metadata:
        usfm: PSA.147.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 13:13
      metadata:
        usfm: LUK.13.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: redresse ceux qui sont courbés;
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’Éternel aime les justes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: L’Éternel protège les étrangers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il soutient l’orphelin et la veuve,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais il renverse la voie des méchants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 15:18
      metadata:
        usfm: EXO.15.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 145:13
      metadata:
        usfm: PSA.145.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: L’Éternel règne éternellement;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ton Dieu, ô Sion! Subsiste d’âge en âge!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Louez l’Éternel!
