document_id: PSA.146,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Esd 6:16. (Ps 145; 147.) Jé 17:5-8.
  - type: text
    content: Louez l’Éternel!
  - type: text
    content: Mon âme, loue l’Éternel!
  '10':
  - type: text
    content: ' '
  - type: note
    content: Ex 15:18. Ps 145:13.
  - type: text
    content: L’Éternel règne éternellement;
  - type: text
    content: Ton Dieu, ô Sion! Subsiste d’âge en âge!
  - type: text
    content: Louez l’Éternel!
  '2':
  - type: text
    content: Je louerai l’Éternel tant que je vivrai,
  - type: text
    content: Je célébrerai mon Dieu tant que j’existerai.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Ps 118:8, 9.
  - type: text
    content: Ne vous confiez pas aux grands,
  - type: text
    content: Aux fils de l’homme, qui ne peuvent sauver.
  '4':
  - type: text
    content: Leur souffle s’en va, ils rentrent dans la terre,
  - type: text
    content: Et ce même jour leurs desseins périssent.
  '5':
  - type: text
    content: Heureux celui qui a pour secours le Dieu de Jacob,
  - type: text
    content: Qui met son espoir en l’Éternel, son Dieu!
  '6':
  - type: text
    content: Il a fait les cieux et la terre,
  - type: text
    content: La mer et tout ce qui s’y trouve.
  - type: text
    content: Il garde la fidélité à toujours.
  '7':
  - type: text
    content: Il fait droit aux opprimés;
  - type: text
    content: Il donne du pain aux affamés;
  - type: text
    content: L’Éternel délivre les captifs;
  '8':
  - type: text
    content: ' '
  - type: note
    content: Mt 9:30. Jn 9:7, 32.
  - type: text
    content: L’Éternel ouvre les yeux des aveugles;
  - type: text
    content: 'L’Éternel '
  - type: note
    content: Ps 145:14; 147:3. Lu 13:13.
  - type: text
    content: redresse ceux qui sont courbés;
  - type: text
    content: L’Éternel aime les justes.
  '9':
  - type: text
    content: L’Éternel protège les étrangers,
  - type: text
    content: Il soutient l’orphelin et la veuve,
  - type: text
    content: Mais il renverse la voie des méchants.
