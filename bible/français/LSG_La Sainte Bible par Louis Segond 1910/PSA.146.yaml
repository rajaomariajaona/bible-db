  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je louerai l’Éternel tant que je vivrai,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je célébrerai mon Dieu tant que j’existerai.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
