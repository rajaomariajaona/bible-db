      marker-yv: yv-n
    - type: text
      text: Ne vous confiez pas aux grands,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aux fils de l’homme, qui ne peuvent sauver.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leur souffle s’en va, ils rentrent dans la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ce même jour leurs desseins périssent.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Heureux celui qui a pour secours le Dieu de Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui met son espoir en l’Éternel, son Dieu!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a fait les cieux et la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La mer et tout ce qui s’y trouve.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il garde la fidélité à toujours.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il fait droit aux opprimés;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il donne du pain aux affamés;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel délivre les captifs;
