document_id: PSA.15,93
type_code: fra
verses:
  '1':
  - type: heading
    content: (Ps 24; 34:12-15.) Éz 18:5-9. Éz 33:14, etc. (1 Jn 2:6; 3:24.)
  - type: text
    content: Psaume de David.
  - type: text
    content: O Éternel! Qui séjournera dans ta tente?
  - type: text
    content: Qui demeurera sur ta montagne sainte?
  '2':
  - type: text
    content: ' '
  - type: note
    content: Ps 24:4. És 33:15.
  - type: text
    content: Celui qui marche dans l’intégrité, qui pratique la justice
  - type: text
    content: Et qui dit la vérité selon son cœur.
  '3':
  - type: text
    content: Il ne calomnie point avec sa langue,
  - type: text
    content: Il ne fait point de mal à son semblable,
  - type: text
    content: Et il ne jette point l’opprobre sur son prochain.
  '4':
  - type: text
    content: Il regarde avec dédain celui qui est méprisable,
  - type: text
    content: Mais il honore ceux qui craignent l’Éternel;
  - type: text
    content: Il ne se rétracte point, s’il fait un serment à son préjudice.
  '5':
  - type: text
    content: Il n’exige point d’intérêt de son argent,
  - type: text
    content: Et il n’accepte point de don contre l’innocent.
  - type: text
    content: Celui qui se conduit ainsi ne chancelle jamais.
