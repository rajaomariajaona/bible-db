document_id: PSA.34
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 1 S 21:10-15. (Ps 33:18-22; 84:12, 13; 91.) 1 Pi 3:9-12. Pr 14:26, 27.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'De David. '
  - type: usfm
    marker: x
    children:
    - type: text
      text: 1 S 21:13, etc.
    marker-yv: yv-n
  - type: text
    text: Lorsqu’il contrefit l’insensé en présence d’Abimélec, et qu’il s’en alla chassé par lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Je bénirai l’Éternel en tout temps;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sa louange sera toujours dans ma bouche.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Que mon âme se glorifie en l’Éternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que les malheureux écoutent et se réjouissent!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Exaltez avec moi l’Éternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Célébrons tous son nom!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: J’ai cherché l’Éternel, et il m’a répondu;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il m’a délivré de toutes mes frayeurs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Quand on tourne vers lui les regards, on est rayonnant de joie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le visage ne se couvre pas de honte.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Quand un malheureux crie, l’Éternel entend,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il le sauve de toutes ses détresses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: L’ange de l’Éternel campe autour de ceux qui le craignent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il les arrache au danger.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Sentez et voyez combien l’Éternel est bon!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Heureux l’homme qui cherche en lui son refuge!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Craignez l’Éternel, vous ses saints!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car rien ne manque à ceux qui le craignent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 4:11
      metadata:
        usfm: JOB.4.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Les lionceaux éprouvent la disette et la faim,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais ceux qui cherchent l’Éternel ne sont privés d’aucun bien.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Venez, mes fils, écoutez-moi!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je vous enseignerai la crainte de l’Éternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 3:10
      metadata:
        usfm: 1PE.3.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Quel est l’homme qui aime la vie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui désire la prolonger pour jouir du bonheur?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Préserve ta langue du mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tes lèvres des paroles trompeuses;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Éloigne-toi du mal, et fais le bien;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Recherche et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 12:14
      metadata:
        usfm: HEB.12.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: poursuis la paix.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 36:7
      metadata:
        usfm: JOB.36.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 33:18
      metadata:
        usfm: PSA.33.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 3:12
      metadata:
        usfm: 1PE.3.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Les yeux de l’Éternel sont sur les justes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ses oreilles sont attentives à leurs cris.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: L’Éternel tourne sa face contre les méchants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour retrancher de la terre leur souvenir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Quand les justes crient, l’Éternel entend,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il les délivre de toutes leurs détresses;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ti 3:11
      metadata:
        usfm: 2TI.3.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: L’Éternel est près de ceux qui ont le cœur brisé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il sauve ceux qui ont l’esprit dans l’abattement.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ti 3:12
      metadata:
        usfm: 2TI.3.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Le malheur atteint souvent le juste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais l’Éternel l’en délivre toujours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Il garde tous ses os,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 1:36
      metadata:
        usfm: JHN.1.36
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Aucun d’eux n’est brisé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Le malheur tue le méchant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les ennemis du juste sont châtiés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: L’Éternel délivre l’âme de ses serviteurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et tous ceux qui l’ont pour refuge échappent au châtiment.
