document_id: PSA.34,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 1 S 21:10-15. (Ps 33:18-22; 84:12, 13; 91.) 1 Pi 3:9-12. Pr 14:26, 27.
  - type: text
    content: 'De David. '
  - type: note
    content: 1 S 21:13, etc.
  - type: text
    content: Lorsqu’il contrefit l’insensé en présence d’Abimélec, et qu’il s’en alla chassé par lui.
  '10':
  - type: text
    content: Craignez l’Éternel, vous ses saints!
  - type: text
    content: Car rien ne manque à ceux qui le craignent.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Job 4:11.
  - type: text
    content: Les lionceaux éprouvent la disette et la faim,
  - type: text
    content: Mais ceux qui cherchent l’Éternel ne sont privés d’aucun bien.
  '12':
  - type: text
    content: Venez, mes fils, écoutez-moi!
  - type: text
    content: Je vous enseignerai la crainte de l’Éternel.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 1 Pi 3:10.
  - type: text
    content: Quel est l’homme qui aime la vie,
  - type: text
    content: Qui désire la prolonger pour jouir du bonheur?
  '14':
  - type: text
    content: Préserve ta langue du mal,
  - type: text
    content: Et tes lèvres des paroles trompeuses;
  '15':
  - type: text
    content: Éloigne-toi du mal, et fais le bien;
  - type: text
    content: 'Recherche et '
  - type: note
    content: Hé 12:14.
  - type: text
    content: poursuis la paix.
  '16':
  - type: text
    content: ' '
  - type: note
    content: Job 36:7. Ps 33:18. 1 Pi 3:12.
  - type: text
    content: Les yeux de l’Éternel sont sur les justes,
  - type: text
    content: Et ses oreilles sont attentives à leurs cris.
  '17':
  - type: text
    content: L’Éternel tourne sa face contre les méchants,
  - type: text
    content: Pour retrancher de la terre leur souvenir.
  '18':
  - type: text
    content: Quand les justes crient, l’Éternel entend,
  - type: text
    content: Et il les délivre de toutes leurs détresses;
  '19':
  - type: text
    content: ' '
  - type: note
    content: 2 Ti 3:11.
  - type: text
    content: L’Éternel est près de ceux qui ont le cœur brisé,
  - type: text
    content: Et il sauve ceux qui ont l’esprit dans l’abattement.
  '2':
  - type: text
    content: Je bénirai l’Éternel en tout temps;
  - type: text
    content: Sa louange sera toujours dans ma bouche.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 2 Ti 3:12.
  - type: text
    content: Le malheur atteint souvent le juste,
  - type: text
    content: Mais l’Éternel l’en délivre toujours.
  '21':
  - type: text
    content: Il garde tous ses os,
  - type: note
    content: Jn 1:36.
  - type: text
    content: Aucun d’eux n’est brisé.
  '22':
  - type: text
    content: Le malheur tue le méchant,
  - type: text
    content: Et les ennemis du juste sont châtiés.
  '23':
  - type: text
    content: L’Éternel délivre l’âme de ses serviteurs,
  - type: text
    content: Et tous ceux qui l’ont pour refuge échappent au châtiment.
  '3':
  - type: text
    content: Que mon âme se glorifie en l’Éternel!
  - type: text
    content: Que les malheureux écoutent et se réjouissent!
  '4':
  - type: text
    content: Exaltez avec moi l’Éternel!
  - type: text
    content: Célébrons tous son nom!
  '5':
  - type: text
    content: J’ai cherché l’Éternel, et il m’a répondu;
  - type: text
    content: Il m’a délivré de toutes mes frayeurs.
  '6':
  - type: text
    content: Quand on tourne vers lui les regards, on est rayonnant de joie,
  - type: text
    content: Et le visage ne se couvre pas de honte.
  '7':
  - type: text
    content: Quand un malheureux crie, l’Éternel entend,
  - type: text
    content: Et il le sauve de toutes ses détresses.
  '8':
  - type: text
    content: L’ange de l’Éternel campe autour de ceux qui le craignent,
  - type: text
    content: Et il les arrache au danger.
  '9':
  - type: text
    content: Sentez et voyez combien l’Éternel est bon!
  - type: text
    content: Heureux l’homme qui cherche en lui son refuge!
