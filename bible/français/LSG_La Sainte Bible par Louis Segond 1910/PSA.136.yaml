document_id: PSA.136,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Ps 135. Esd 3:11. Lu 1:47, 50.
  - type: text
    content: Louez l’Éternel, car il est bon,
  - type: text
    content: Car sa miséricorde dure à toujours!
  '10':
  - type: text
    content: ' '
  - type: note
    content: Ex 12:29. Ps 78:43, 51.
  - type: text
    content: Celui qui frappa les Égyptiens dans leurs premiers-nés,
  - type: text
    content: Car sa miséricorde dure à toujours!
  '11':
  - type: text
    content: 'Et fit sortir Israël '
  - type: note
    content: Ex 12:31, 51; 13:3, 17.
  - type: text
    content: du milieu d’eux,
  - type: text
    content: Car sa miséricorde dure à toujours!
  '12':
  - type: text
    content: 'A main forte et '
  - type: note
    content: Ex 6:5.
  - type: text
    content: à bras étendu,
  - type: text
    content: Car sa miséricorde dure à toujours!
  '13':
  - type: text
    content: ' '
  - type: note
    content: Ex 14:21, 22. Ps 78:13.
  - type: text
    content: Celui qui coupa en deux la mer Rouge,
  - type: text
    content: Car sa miséricorde dure à toujours!
  '14':
  - type: text
    content: Qui fit passer Israël au milieu d’elle,
  - type: text
    content: Car sa miséricorde dure à toujours!
  '15':
  - type: text
    content: ' '
  - type: note
    content: Ex 14:24.
  - type: text
    content: Et précipita Pharaon et son armée dans la mer Rouge,
  - type: text
    content: Car sa miséricorde dure à toujours!
  '16':
  - type: text
    content: ' '
  - type: note
    content: Ex 15:16, 17, 19. Ps 78:53.
  - type: text
    content: Celui qui conduisit son peuple dans le désert,
  - type: text
    content: Car sa miséricorde dure à toujours!
  '17':
  - type: text
    content: ' '
  - type: note
    content: No 21:24, 25, 34, 35. Jos 12:1. Ps 135:10, 11.
  - type: text
    content: Celui qui frappa de grands rois,
  - type: text
    content: Car sa miséricorde dure à toujours!
  '18':
  - type: text
    content: Qui tua des rois puissants,
  - type: text
    content: Car sa miséricorde dure à toujours!
  '19':
  - type: text
    content: Sihon, roi des Amoréens,
  - type: text
    content: Car sa miséricorde dure à toujours!
  '2':
  - type: text
    content: Louez le Dieu des dieux,
  - type: text
    content: Car sa miséricorde dure à toujours!
  '20':
  - type: text
    content: ' '
  - type: note
    content: De 3:1, etc.
  - type: text
    content: Et Og, roi de Basan,
  - type: text
    content: Car sa miséricorde dure à toujours!
  '21':
  - type: text
    content: 'Et donna leur pays '
  - type: note
    content: Jos 12:6.
  - type: text
    content: en héritage,
  - type: text
    content: Car sa miséricorde dure à toujours!
  '22':
  - type: text
    content: En héritage à Israël, son serviteur,
  - type: text
    content: Car sa miséricorde dure à toujours!
  '23':
  - type: text
    content: Celui qui se souvint de nous quand nous étions humiliés,
  - type: text
    content: Car sa miséricorde dure à toujours!
  '24':
  - type: text
    content: Et nous délivra de nos oppresseurs,
  - type: text
    content: Car sa miséricorde dure à toujours!
  '25':
  - type: text
    content: Celui qui donne la nourriture à toute chair,
  - type: text
    content: Car sa miséricorde dure à toujours!
  '26':
  - type: text
    content: Louez le Dieu des cieux,
  - type: text
    content: Car sa miséricorde dure à toujours!
  '3':
  - type: text
    content: Louez le Seigneur des seigneurs,
  - type: text
    content: Car sa miséricorde dure à toujours!
  '4':
  - type: text
    content: Celui qui seul fait de grands prodiges,
  - type: text
    content: Car sa miséricorde dure à toujours!
  '5':
  - type: text
    content: ' '
  - type: note
    content: Ge 1:1.
  - type: text
    content: Celui qui a fait les cieux avec intelligence,
  - type: text
    content: Car sa miséricorde dure à toujours!
  '6':
  - type: text
    content: ' '
  - type: note
    content: Ps 24:2.
  - type: text
    content: Celui qui a étendu la terre sur les eaux,
  - type: text
    content: Car sa miséricorde dure à toujours!
  '7':
  - type: text
    content: ' '
  - type: note
    content: Ge 1:14.
  - type: text
    content: Celui qui a fait les grands luminaires,
  - type: text
    content: Car sa miséricorde dure à toujours!
  '8':
  - type: text
    content: ' '
  - type: note
    content: Ge 1:16.
  - type: text
    content: Le soleil pour présider au jour,
  - type: text
    content: Car sa miséricorde dure à toujours!
  '9':
  - type: text
    content: La lune et les étoiles pour présider à la nuit,
  - type: text
    content: Car sa miséricorde dure à toujours!
