document_id: ISA.30,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Contre l’alliance avec l’Égypte
  - type: heading
    content: 'V. 1-7: cf. És 31:1-3; 20. Jé 17:5.'
  - type: text
    content: Malheur, dit l’Éternel, aux enfants rebelles,
  - type: text
    content: Qui prennent des résolutions sans moi,
  - type: text
    content: Et qui font des alliances sans ma volonté,
  - type: text
    content: Pour accumuler péché sur péché!
  '10':
  - type: text
    content: 'Qui disent aux voyants: Ne voyez pas!'
  - type: text
    content: 'Et aux prophètes: Ne nous prophétisez pas des vérités,'
  - type: text
    content: Dites-nous des choses flatteuses,
  - type: text
    content: Prophétisez des chimères!
  '11':
  - type: text
    content: Détournez-vous du chemin,
  - type: text
    content: Écartez-vous du sentier,
  - type: text
    content: Éloignez de notre présence le Saint d’Israël!
  '12':
  - type: text
    content: 'C’est pourquoi ainsi parle le Saint d’Israël:'
  - type: text
    content: Puisque vous rejetez cette parole,
  - type: text
    content: Que vous vous confiez dans la violence et dans les détours
  - type: text
    content: Et que vous les prenez pour appuis,
  '13':
  - type: text
    content: Ce crime sera pour vous
  - type: text
    content: Comme une partie crevassée qui menace ruine
  - type: text
    content: Et fait saillie dans un mur élevé,
  - type: note
    content: És 29:5.
  - type: text
    content: 'Dont l’écroulement arrive tout à coup, en un instant:'
  '14':
  - type: text
    content: 'Il se brise comme se brise '
  - type: note
    content: Jé 19:11.
  - type: text
    content: un vase de terre,
  - type: text
    content: Que l’on casse sans ménagement,
  - type: text
    content: Et dont les débris ne laissent pas un morceau
  - type: text
    content: Pour prendre du feu au foyer,
  - type: text
    content: Ou pour puiser de l’eau à la citerne.
  '15':
  - type: text
    content: 'Car ainsi a parlé le Seigneur, l’Éternel, le Saint d’Israël:'
  - type: text
    content: C’est dans la tranquillité et le repos que sera votre salut,
  - type: text
    content: C’est dans le calme et la confiance que sera votre force.
  - type: text
    content: Mais vous ne l’avez pas voulu!
  '16':
  - type: text
    content: 'Vous avez dit: Non! Nous prendrons la course à cheval!'
  - type: text
    content: C’est pourquoi vous fuirez à la course.
  - type: text
    content: Nous monterons des coursiers légers!
  - type: text
    content: C’est pourquoi ceux qui vous poursuivront seront légers.
  '17':
  - type: text
    content: Mille fuiront à la menace d’un seul,
  - type: text
    content: Et, à la menace de cinq, vous fuirez,
  - type: note
    content: És 17:6; 24:6, 13.
  - type: text
    content: Jusqu’à ce que vous restiez
  - type: text
    content: Comme un signal au sommet de la montagne,
  - type: text
    content: Comme un étendard sur la colline.
  - type: heading
    content: 'V. 18-26: cf. És 37:21, etc. Ps 30:6.'
  '18':
  - type: text
    content: Cependant l’Éternel désire vous faire grâce,
  - type: text
    content: Et il se lèvera pour vous faire miséricorde;
  - type: text
    content: 'Car l’Éternel est un Dieu juste:'
  - type: note
    content: Ps 2:12; 34:9. Pr 16:20. Jé 17:7.
  - type: text
    content: Heureux tous ceux qui espèrent en lui!
  '19':
  - type: text
    content: Oui, peuple de Sion, habitant de Jérusalem,
  - type: text
    content: Tu ne pleureras plus!
  - type: text
    content: Il te fera grâce, quand tu crieras;
  - type: text
    content: Dès qu’il aura entendu, il t’exaucera.
  '2':
  - type: text
    content: Qui descendent en Égypte sans me consulter,
  - type: text
    content: Pour se réfugier sous la protection de Pharaon,
  - type: text
    content: Et chercher un abri sous l’ombre de l’Égypte!
  '20':
  - type: text
    content: Le Seigneur vous donnera du pain dans l’angoisse,
  - type: text
    content: Et de l’eau dans la détresse;
  - type: text
    content: Ceux qui t’instruisent ne se cacheront plus,
  - type: text
    content: Mais tes yeux verront ceux qui t’instruisent.
  '21':
  - type: text
    content: 'Tes oreilles entendront derrière toi la voix qui dira:'
  - type: text
    content: Voici le chemin, marchez-y!
  - type: text
    content: Car vous iriez à droite, ou vous iriez à gauche.
  '22':
  - type: text
    content: Vous tiendrez pour souillés l’argent qui recouvre vos idoles,
  - type: text
    content: Et l’or dont elles sont revêtues;
  - type: text
    content: 'Tu en disperseras les débris comme une impureté:'
  - type: text
    content: Hors d’ici! Leur diras-tu.
  - type: heading
    content: Temps messianique
  '23':
  - type: text
    content: Alors il répandra la pluie sur la semence que tu auras mise en terre,
  - type: text
    content: Et le pain que produira la terre sera savoureux et nourrissant;
  - type: text
    content: En ce même temps, tes troupeaux paîtront dans de vastes pâturages.
  '24':
  - type: text
    content: Les bœufs et les ânes, qui labourent la terre,
  - type: text
    content: Mangeront un fourrage salé,
  - type: text
    content: Qu’on aura vanné avec la pelle et le van.
  '25':
  - type: text
    content: Sur toute haute montagne et sur toute colline élevée,
  - type: text
    content: Il y aura des ruisseaux, des courants d’eau,
  - type: text
    content: Au jour du grand carnage,
  - type: text
    content: A la chute des tours.
  '26':
  - type: text
    content: La lumière de la lune sera comme la lumière du soleil,
  - type: text
    content: Et la lumière du soleil sera sept fois plus grande
  - type: text
    content: (Comme la lumière de sept jours),
  - type: text
    content: Lorsque l’Éternel bandera la blessure de son peuple,
  - type: text
    content: Et qu’il guérira la plaie de ses coups.
  - type: heading
    content: Chute des Assyriens
  - type: heading
    content: 'V. 27-33: cf. És 29:5-8. 2 Ch 32:21-23. Ps 92:8-12.'
  '27':
  - type: text
    content: Voici, le nom de l’Éternel vient de loin;
  - type: text
    content: Sa colère est ardente, c’est un violent incendie;
  - type: text
    content: Ses lèvres sont pleines de fureur,
  - type: text
    content: Et sa langue est comme un feu dévorant;
  '28':
  - type: text
    content: ' '
  - type: note
    content: És 8:8.
  - type: text
    content: Son souffle est comme un torrent débordé qui atteint jusqu’au cou,
  - type: text
    content: Pour cribler les nations avec le crible de la destruction,
  - type: text
    content: Et comme un mors trompeur
  - type: text
    content: Entre les mâchoires des peuples.
  '29':
  - type: text
    content: Vous chanterez comme la nuit où l’on célèbre la fête,
  - type: text
    content: Vous aurez le cœur joyeux comme celui qui marche au son de la flûte,
  - type: text
    content: Pour aller à la montagne de l’Éternel, vers le rocher d’Israël.
  '3':
  - type: text
    content: La protection de Pharaon sera pour vous une honte,
  - type: text
    content: Et l’abri sous l’ombre de l’Égypte une ignominie.
  '30':
  - type: text
    content: Et l’Éternel fera retentir sa voix majestueuse,
  - type: text
    content: Il montrera son bras prêt à frapper,
  - type: text
    content: Dans l’ardeur de sa colère,
  - type: text
    content: Au milieu de la flamme d’un feu dévorant,
  - type: text
    content: De l’inondation, de la tempête et des pierres de grêle.
  '31':
  - type: text
    content: A la voix de l’Éternel, l’Assyrien tremblera;
  - type: text
    content: 'L’Éternel le frappera de sa verge. '
  '32':
  - type: text
    content: A chaque coup de la verge qui lui est destinée,
  - type: text
    content: Et que l’Éternel fera tomber sur lui,
  - type: text
    content: On entendra les tambourins et les harpes;
  - type: text
    content: L’Éternel combattra contre lui à main levée.
  '33':
  - type: text
    content: Depuis longtemps un bûcher est préparé,
  - type: text
    content: Il est préparé pour le roi,
  - type: text
    content: Il est profond, il est vaste;
  - type: text
    content: Son bûcher, c’est du feu et du bois en abondance;
  - type: text
    content: Le souffle de l’Éternel l’enflamme, comme un torrent de soufre.
  '4':
  - type: text
    content: Déjà ses princes sont à Tsoan,
  - type: text
    content: Et ses envoyés ont atteint Hanès.
  '5':
  - type: text
    content: 'Tous seront confus au sujet d’un peuple '
  - type: note
    content: Jé 2:36.
  - type: text
    content: qui ne leur sera point utile,
  - type: text
    content: Ni pour les secourir, ni pour les aider,
  - type: text
    content: Mais qui fera leur honte et leur opprobre.
  '6':
  - type: text
    content: 'Sentence des bêtes du midi:'
  - type: text
    content: A travers une contrée de détresse et d’angoisse,
  - type: text
    content: D’où viennent la lionne et le lion,
  - type: text
    content: La vipère et le dragon volant,
  - type: text
    content: Ils portent à dos d’ânes leurs richesses,
  - type: text
    content: Et sur la bosse des chameaux leurs trésors,
  - type: text
    content: A un peuple qui ne leur sera point utile.
  '7':
  - type: text
    content: Car le secours de l’Égypte n’est que vanité et néant;
  - type: text
    content: C’est pourquoi j’appelle cela du bruit qui n’aboutit à rien.
  - type: heading
    content: 'V. 8-17: cf. És 28:14-22. Jé 5:23-29. Ps 52:9; 62:10-12.'
  '8':
  - type: text
    content: Va maintenant, écris ces choses devant eux sur une table,
  - type: text
    content: Et grave-les dans un livre,
  - type: text
    content: Afin qu’elles subsistent dans les temps à venir,
  - type: text
    content: Éternellement et à perpétuité.
  '9':
  - type: text
    content: Car c’est un peuple rebelle,
  - type: text
    content: Ce sont des enfants menteurs,
  - type: text
    content: Des enfants qui ne veulent point écouter la loi de l’Éternel,
