document_id: ISA.30
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Contre l’alliance avec l’Égypte
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-7: cf. És 31:1-3; 20. Jé 17:5.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Malheur, dit l’Éternel, aux enfants rebelles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui prennent des résolutions sans moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui font des alliances sans ma volonté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour accumuler péché sur péché!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Qui descendent en Égypte sans me consulter,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour se réfugier sous la protection de Pharaon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et chercher un abri sous l’ombre de l’Égypte!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: La protection de Pharaon sera pour vous une honte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et l’abri sous l’ombre de l’Égypte une ignominie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Déjà ses princes sont à Tsoan,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ses envoyés ont atteint Hanès.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tous seront confus au sujet d’un peuple '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 2:36
      metadata:
        usfm: JER.2.36
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: qui ne leur sera point utile,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ni pour les secourir, ni pour les aider,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais qui fera leur honte et leur opprobre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Sentence des bêtes du midi:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: A travers une contrée de détresse et d’angoisse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: D’où viennent la lionne et le lion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La vipère et le dragon volant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils portent à dos d’ânes leurs richesses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et sur la bosse des chameaux leurs trésors,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A un peuple qui ne leur sera point utile.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Car le secours de l’Égypte n’est que vanité et néant;
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est pourquoi j’appelle cela du bruit qui n’aboutit à rien.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 8-17: cf. És 28:14-22. Jé 5:23-29. Ps 52:9; 62:10-12.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Va maintenant, écris ces choses devant eux sur une table,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et grave-les dans un livre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Afin qu’elles subsistent dans les temps à venir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Éternellement et à perpétuité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Car c’est un peuple rebelle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce sont des enfants menteurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Des enfants qui ne veulent point écouter la loi de l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Qui disent aux voyants: Ne voyez pas!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et aux prophètes: Ne nous prophétisez pas des vérités,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dites-nous des choses flatteuses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Prophétisez des chimères!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Détournez-vous du chemin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Écartez-vous du sentier,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Éloignez de notre présence le Saint d’Israël!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'C’est pourquoi ainsi parle le Saint d’Israël:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Puisque vous rejetez cette parole,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que vous vous confiez dans la violence et dans les détours
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que vous les prenez pour appuis,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ce crime sera pour vous
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme une partie crevassée qui menace ruine
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et fait saillie dans un mur élevé,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 29:5
      metadata:
        usfm: ISA.29.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Dont l’écroulement arrive tout à coup, en un instant:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il se brise comme se brise '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 19:11
      metadata:
        usfm: JER.19.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: un vase de terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que l’on casse sans ménagement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et dont les débris ne laissent pas un morceau
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour prendre du feu au foyer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ou pour puiser de l’eau à la citerne.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Car ainsi a parlé le Seigneur, l’Éternel, le Saint d’Israël:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est dans la tranquillité et le repos que sera votre salut,
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est dans le calme et la confiance que sera votre force.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais vous ne l’avez pas voulu!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Vous avez dit: Non! Nous prendrons la course à cheval!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est pourquoi vous fuirez à la course.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous monterons des coursiers légers!
- type: usfm
  marker: q1
  children:
  - type: text
    text: C’est pourquoi ceux qui vous poursuivront seront légers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Mille fuiront à la menace d’un seul,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et, à la menace de cinq, vous fuirez,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 17:6
      metadata:
        usfm: ISA.17.6
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 24:6
      metadata:
        usfm: ISA.24.6
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '13'
      metadata:
        usfm: ISA.24.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Jusqu’à ce que vous restiez
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme un signal au sommet de la montagne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme un étendard sur la colline.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 18-26: cf. És 37:21, etc. Ps 30:6.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Cependant l’Éternel désire vous faire grâce,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il se lèvera pour vous faire miséricorde;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Car l’Éternel est un Dieu juste:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 2:12
      metadata:
        usfm: PSA.2.12
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 34:9
      metadata:
        usfm: PSA.34.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 16:20
      metadata:
        usfm: PRO.16.20
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 17:7
      metadata:
        usfm: JER.17.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Heureux tous ceux qui espèrent en lui!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Oui, peuple de Sion, habitant de Jérusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu ne pleureras plus!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il te fera grâce, quand tu crieras;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dès qu’il aura entendu, il t’exaucera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Le Seigneur vous donnera du pain dans l’angoisse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et de l’eau dans la détresse;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ceux qui t’instruisent ne se cacheront plus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais tes yeux verront ceux qui t’instruisent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Tes oreilles entendront derrière toi la voix qui dira:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voici le chemin, marchez-y!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car vous iriez à droite, ou vous iriez à gauche.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Vous tiendrez pour souillés l’argent qui recouvre vos idoles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et l’or dont elles sont revêtues;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tu en disperseras les débris comme une impureté:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hors d’ici! Leur diras-tu.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Temps messianique
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Alors il répandra la pluie sur la semence que tu auras mise en terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le pain que produira la terre sera savoureux et nourrissant;
- type: usfm
  marker: q1
  children:
  - type: text
    text: En ce même temps, tes troupeaux paîtront dans de vastes pâturages.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Les bœufs et les ânes, qui labourent la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mangeront un fourrage salé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’on aura vanné avec la pelle et le van.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Sur toute haute montagne et sur toute colline élevée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il y aura des ruisseaux, des courants d’eau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au jour du grand carnage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: A la chute des tours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: La lumière de la lune sera comme la lumière du soleil,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et la lumière du soleil sera sept fois plus grande
- type: usfm
  marker: q1
  children:
  - type: text
    text: (Comme la lumière de sept jours),
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lorsque l’Éternel bandera la blessure de son peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qu’il guérira la plaie de ses coups.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Chute des Assyriens
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 27-33: cf. És 29:5-8. 2 Ch 32:21-23. Ps 92:8-12.'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Voici, le nom de l’Éternel vient de loin;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sa colère est ardente, c’est un violent incendie;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses lèvres sont pleines de fureur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et sa langue est comme un feu dévorant;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 8:8
      metadata:
        usfm: ISA.8.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Son souffle est comme un torrent débordé qui atteint jusqu’au cou,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour cribler les nations avec le crible de la destruction,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et comme un mors trompeur
- type: usfm
  marker: q1
  children:
  - type: text
    text: Entre les mâchoires des peuples.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Vous chanterez comme la nuit où l’on célèbre la fête,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous aurez le cœur joyeux comme celui qui marche au son de la flûte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour aller à la montagne de l’Éternel, vers le rocher d’Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Et l’Éternel fera retentir sa voix majestueuse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il montrera son bras prêt à frapper,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans l’ardeur de sa colère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au milieu de la flamme d’un feu dévorant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De l’inondation, de la tempête et des pierres de grêle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: A la voix de l’Éternel, l’Assyrien tremblera;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'L’Éternel le frappera de sa verge. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: A chaque coup de la verge qui lui est destinée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que l’Éternel fera tomber sur lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: On entendra les tambourins et les harpes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: L’Éternel combattra contre lui à main levée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Depuis longtemps un bûcher est préparé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est préparé pour le roi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est profond, il est vaste;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Son bûcher, c’est du feu et du bois en abondance;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le souffle de l’Éternel l’enflamme, comme un torrent de soufre.
