document_id: 1PE.1,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Adresse et salutation
  - type: heading
    content: 'V. 1-2: cf. 2 Pi 1:1, 2. Ja 1:1. Jud 1, 2.'
  - type: text
    content: 'Pierre, apôtre de Jésus-Christ, à ceux qui sont étrangers et '
  - type: note
    content: Ja 1:1.
  - type: text
    content: 'dispersés dans le Pont, la Galatie, la Cappadoce, l’Asie et la Bithynie, '
  '10':
  - type: note
    content: Ge 49:10. Da 2:44. Ag 2:8. Za 6:12.
  - type: text
    content: 'Les prophètes, qui ont prophétisé touchant la grâce qui vous était réservée, ont fait de ce salut l’objet de leurs recherches et de leurs investigations, '
  '11':
  - type: note
    content: Da 9:24.
  - type: text
    content: 'voulant sonder l’époque et les circonstances marquées par l’Esprit de Christ qui était en eux, et qui attestait d’avance '
  - type: note
    content: Ps 22:7. És 53:3.
  - type: text
    content: 'les souffrances de Christ et la gloire dont elles seraient suivies. '
  '12':
  - type: text
    content: 'Il leur fut révélé que ce n’était pas pour eux-mêmes, mais pour vous, qu’ils étaient les dispensateurs de ces choses, que vous ont annoncées maintenant ceux qui vous ont prêché l’Évangile '
  - type: note
    content: Ac 2:4.
  - type: text
    content: 'par le Saint-Esprit envoyé du ciel, et '
  - type: note
    content: Ép 3:10.
  - type: text
    content: dans lesquelles les anges désirent plonger leurs regards.
  - type: heading
    content: Exhortation à la sainteté
  - type: heading
    content: 'V. 13-25: cf. (1 Th 5:8, 9. Ép 5:1. Hé 12:14.) (1 Co 6:20. Tit 2:11-14.) (1 Jn 5:1. Ja 1:18.)'
  '13':
  - type: text
    content: ' '
  - type: note
    content: Lu 12:35. Ép 6:14.
  - type: text
    content: 'C’est pourquoi, ceignez les reins de votre entendement, soyez sobres, et ayez une entière espérance dans la grâce qui vous sera apportée, lorsque Jésus-Christ apparaîtra. '
  '14':
  - type: text
    content: 'Comme des enfants obéissants, ne vous conformez pas aux convoitises que vous aviez autrefois, quand vous étiez dans l’ignorance. '
  '15':
  - type: text
    content: 'Mais, puisque celui qui vous a appelés est saint, '
  - type: note
    content: Lu 1:75.
  - type: text
    content: vous aussi soyez saints dans toute votre conduite,
  '16':
  - type: text
    content: 'selon qu’il est écrit: '
  - type: note
    content: Lé 11:44, 45; 19:2; 20:7.
  - type: text
    content: Vous serez saints, car je suis saint.
  '17':
  - type: text
    content: 'Et si vous invoquez comme Père celui qui juge selon l’œuvre de chacun, '
  - type: note
    content: De 10:17. 2 Ch 19:7. Job 34:19. Ac 10:34. Ro 2:11. Ga 2:6. Ép 6:9. Col 3:25.
  - type: text
    content: 'sans acception de personnes, conduisez-vous avec crainte pendant le temps de votre pèlerinage, '
  '18':
  - type: note
    content: 1 Co 6:20; 7:23.
  - type: text
    content: 'sachant que ce n’est pas par des choses périssables, par de l’argent ou de l’or, que vous avez été rachetés de la vaine manière de vivre que vous aviez héritée de vos pères, '
  '19':
  - type: text
    content: 'mais '
  - type: note
    content: Ac 20:28. Hé 9:12. Ap 1:5.
  - type: text
    content: 'par le sang précieux de Christ, comme d’un agneau sans défaut et sans tache, '
  '2':
  - type: text
    content: 'et qui sont élus selon la prescience de Dieu le Père, par la sanctification de l’Esprit, afin qu’ils deviennent obéissants, et qu’ils participent à '
  - type: note
    content: Hé 12:24.
  - type: text
    content: 'l’aspersion du sang de Jésus-Christ: '
  - type: note
    content: Ro 1:17. 1 Co 1:3. Ga 1:3. Ép 1:2.
  - type: text
    content: 'que la grâce et la paix vous soient '
  - type: note
    content: 2 Pi 1:2. Jud v. 2.
  - type: text
    content: multipliées!
  - type: heading
    content: Actions de grâces au sujet de l’espérance du salut
  - type: heading
    content: 'V. 3-12: cf. (Ép 2:4-8. 1 Co 15:20-23. Col 1:5, 12, 13.) (Ro 8:17, 18. 2 Co 4:17, 18. 1 Jn 3:1, 2.) (Mt 13:17. Ro 16:25, 26.)'
  '20':
  - type: note
    content: Ro 16:25. Ép 1:9; 3:9. Col 1:26. 2 Ti 1:9. Tit 1:2.
  - type: text
    content: 'prédestiné avant la fondation du monde, et manifesté à la fin des temps, à cause de vous, '
  '21':
  - type: text
    content: 'qui par lui croyez en Dieu, lequel l’a ressuscité des morts et '
  - type: note
    content: Ac 2:33. Ph 2:9.
  - type: text
    content: 'lui a donné la gloire, en sorte que votre foi et votre espérance reposent sur Dieu. '
  '22':
  - type: text
    content: 'Ayant purifié vos âmes en obéissant à la vérité pour avoir un amour fraternel sincère, '
  - type: note
    content: Ro 12:10. Ép 4:3. Hé 13:1. 1 Pi 2:17.
  - type: text
    content: 'aimez-vous ardemment les uns les autres, de tout votre cœur, '
  '23':
  - type: text
    content: 'puisque vous avez été '
  - type: note
    content: Ja 1:18.
  - type: text
    content: 'régénérés, non par une semence corruptible, mais par une '
  - type: note
    content: 1 Jn 3:9.
  - type: text
    content: 'semence incorruptible, par la parole vivante et permanente de Dieu. '
  '24':
  - type: note
    content: És 40:6. 1 Co 7:31. Ja 1:10; 4:14. 1 Jn 2:17.
  - type: text
    content: Car
  - type: text
    content: Toute chair est comme l’herbe,
  - type: text
    content: et toute sa gloire comme la fleur de l’herbe.
  - type: text
    content: L’herbe sèche, et la fleur tombe;
  '25':
  - type: text
    content: mais la parole du Seigneur demeure éternellement.
  - type: text
    content: Et cette parole est celle qui vous a été annoncée par l’Évangile.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 2 Co 1:3. Ép 1:3.
  - type: text
    content: 'Béni soit Dieu, le Père de notre Seigneur Jésus-Christ, '
  - type: note
    content: Ro 6:23. Ja 1:18.
  - type: text
    content: 'qui, selon sa grande miséricorde, nous a régénérés, pour une espérance vivante, '
  - type: note
    content: 1 Co 15:20.
  - type: text
    content: 'par la résurrection de Jésus-Christ d’entre les morts, '
  '4':
  - type: text
    content: 'pour un héritage qui ne se peut ni corrompre, ni souiller, ni flétrir, '
  - type: note
    content: Col 1:5. 2 Ti 1:12.
  - type: text
    content: 'lequel vous est réservé dans les cieux, '
  '5':
  - type: text
    content: 'à vous qui, par la puissance de Dieu, êtes gardés par la foi pour le salut prêt à être révélé dans les derniers temps! '
  '6':
  - type: note
    content: Ro 5:3. Ja 1:2.
  - type: text
    content: 'C’est là ce qui fait votre joie, '
  - type: note
    content: Hé 10:37. 1 Pi 5:10.
  - type: text
    content: 'quoique maintenant, puisqu’il le faut, vous soyez attristés pour un peu de temps par diverses épreuves, '
  '7':
  - type: note
    content: És 48:10. 1 Co 3:13. Ja 1:3. 1 Pi 4:12.
  - type: text
    content: 'afin que l’épreuve de votre foi, plus précieuse que l’or périssable (qui cependant est éprouvé par le feu), ait pour résultat la louange, la gloire et l’honneur, lorsque Jésus-Christ apparaîtra, '
  '8':
  - type: note
    content: Jn 20:29.
  - type: text
    content: 'lui que vous aimez sans l’avoir vu, en qui vous croyez sans le voir encore, vous réjouissant d’une joie ineffable et glorieuse, '
  '9':
  - type: text
    content: 'parce que vous obtiendrez le salut de vos âmes pour prix de votre foi. '
