document_id: 1PE.1
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Adresse et salutation
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-2: cf. 2 Pi 1:1, 2. Ja 1:1. Jud 1, 2.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Pierre, apôtre de Jésus-Christ, à ceux qui sont étrangers et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ja 1:1
      metadata:
        usfm: JAS.1.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'dispersés dans le Pont, la Galatie, la Cappadoce, l’Asie et la Bithynie, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'et qui sont élus selon la prescience de Dieu le Père, par la sanctification de l’Esprit, afin qu’ils deviennent obéissants, et qu’ils participent à '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 12:24
      metadata:
        usfm: HEB.12.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'l’aspersion du sang de Jésus-Christ: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 1:17
      metadata:
        usfm: ROM.1.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 1:3
      metadata:
        usfm: 1CO.1.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 1:3
      metadata:
        usfm: GAL.1.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 1:2
      metadata:
        usfm: EPH.1.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'que la grâce et la paix vous soient '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Pi 1:2
      metadata:
        usfm: 2PE.1.2
    - type: text
      text: . Jud v. 2.
    marker-yv: yv-n
  - type: text
    text: multipliées!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Actions de grâces au sujet de l’espérance du salut
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 3-12: cf. (Ép 2:4-8. 1 Co 15:20-23. Col 1:5, 12, 13.) (Ro 8:17, 18. 2 Co 4:17, 18. 1 Jn 3:1, 2.) (Mt 13:17. Ro 16:25, 26.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Co 1:3
      metadata:
        usfm: 2CO.1.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 1:3
      metadata:
        usfm: EPH.1.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Béni soit Dieu, le Père de notre Seigneur Jésus-Christ, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 6:23
      metadata:
        usfm: ROM.6.23
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ja 1:18
      metadata:
        usfm: JAS.1.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'qui, selon sa grande miséricorde, nous a régénérés, pour une espérance vivante, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 15:20
      metadata:
        usfm: 1CO.15.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'par la résurrection de Jésus-Christ d’entre les morts, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'pour un héritage qui ne se peut ni corrompre, ni souiller, ni flétrir, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 1:5
      metadata:
        usfm: COL.1.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ti 1:12
      metadata:
        usfm: 2TI.1.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'lequel vous est réservé dans les cieux, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'à vous qui, par la puissance de Dieu, êtes gardés par la foi pour le salut prêt à être révélé dans les derniers temps! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 5:3
      metadata:
        usfm: ROM.5.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ja 1:2
      metadata:
        usfm: JAS.1.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'C’est là ce qui fait votre joie, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 10:37
      metadata:
        usfm: HEB.10.37
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 5:10
      metadata:
        usfm: 1PE.5.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'quoique maintenant, puisqu’il le faut, vous soyez attristés pour un peu de temps par diverses épreuves, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 48:10
      metadata:
        usfm: ISA.48.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 3:13
      metadata:
        usfm: 1CO.3.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ja 1:3
      metadata:
        usfm: JAS.1.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 4:12
      metadata:
        usfm: 1PE.4.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'afin que l’épreuve de votre foi, plus précieuse que l’or périssable (qui cependant est éprouvé par le feu), ait pour résultat la louange, la gloire et l’honneur, lorsque Jésus-Christ apparaîtra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 20:29
      metadata:
        usfm: JHN.20.29
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'lui que vous aimez sans l’avoir vu, en qui vous croyez sans le voir encore, vous réjouissant d’une joie ineffable et glorieuse, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'parce que vous obtiendrez le salut de vos âmes pour prix de votre foi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 49:10
      metadata:
        usfm: GEN.49.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Da 2:44
      metadata:
        usfm: DAN.2.44
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ag 2:8
      metadata:
        usfm: HAG.2.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Za 6:12
      metadata:
        usfm: ZEC.6.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Les prophètes, qui ont prophétisé touchant la grâce qui vous était réservée, ont fait de ce salut l’objet de leurs recherches et de leurs investigations, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Da 9:24
      metadata:
        usfm: DAN.9.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'voulant sonder l’époque et les circonstances marquées par l’Esprit de Christ qui était en eux, et qui attestait d’avance '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 22:7
      metadata:
        usfm: PSA.22.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 53:3
      metadata:
        usfm: ISA.53.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'les souffrances de Christ et la gloire dont elles seraient suivies. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il leur fut révélé que ce n’était pas pour eux-mêmes, mais pour vous, qu’ils étaient les dispensateurs de ces choses, que vous ont annoncées maintenant ceux qui vous ont prêché l’Évangile '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 2:4
      metadata:
        usfm: ACT.2.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'par le Saint-Esprit envoyé du ciel, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 3:10
      metadata:
        usfm: EPH.3.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: dans lesquelles les anges désirent plonger leurs regards.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Exhortation à la sainteté
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 13-25: cf. (1 Th 5:8, 9. Ép 5:1. Hé 12:14.) (1 Co 6:20. Tit 2:11-14.) (1 Jn 5:1. Ja 1:18.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 12:35
      metadata:
        usfm: LUK.12.35
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 6:14
      metadata:
        usfm: EPH.6.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'C’est pourquoi, ceignez les reins de votre entendement, soyez sobres, et ayez une entière espérance dans la grâce qui vous sera apportée, lorsque Jésus-Christ apparaîtra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Comme des enfants obéissants, ne vous conformez pas aux convoitises que vous aviez autrefois, quand vous étiez dans l’ignorance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Mais, puisque celui qui vous a appelés est saint, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 1:75
      metadata:
        usfm: LUK.1.75
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: vous aussi soyez saints dans toute votre conduite,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'selon qu’il est écrit: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 11:44
      metadata:
        usfm: LEV.11.44
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '45'
      metadata:
        usfm: LEV.11.45
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 19:2
      metadata:
        usfm: LEV.19.2
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 20:7
      metadata:
        usfm: LEV.20.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Vous serez saints, car je suis saint.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Et si vous invoquez comme Père celui qui juge selon l’œuvre de chacun, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 10:17
      metadata:
        usfm: DEU.10.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 19:7
      metadata:
        usfm: 2CH.19.7
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 34:19
      metadata:
        usfm: JOB.34.19
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 10:34
      metadata:
        usfm: ACT.10.34
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 2:11
      metadata:
        usfm: ROM.2.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 2:6
      metadata:
        usfm: GAL.2.6
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 6:9
      metadata:
        usfm: EPH.6.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 3:25
      metadata:
        usfm: COL.3.25
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'sans acception de personnes, conduisez-vous avec crainte pendant le temps de votre pèlerinage, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 6:20
      metadata:
        usfm: 1CO.6.20
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 7:23
      metadata:
        usfm: 1CO.7.23
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'sachant que ce n’est pas par des choses périssables, par de l’argent ou de l’or, que vous avez été rachetés de la vaine manière de vivre que vous aviez héritée de vos pères, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'mais '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 20:28
      metadata:
        usfm: ACT.20.28
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 9:12
      metadata:
        usfm: HEB.9.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ap 1:5
      metadata:
        usfm: REV.1.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'par le sang précieux de Christ, comme d’un agneau sans défaut et sans tache, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 16:25
      metadata:
        usfm: ROM.16.25
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 1:9
      metadata:
        usfm: EPH.1.9
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 3:9
      metadata:
        usfm: EPH.3.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 1:26
      metadata:
        usfm: COL.1.26
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ti 1:9
      metadata:
        usfm: 2TI.1.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Tit 1:2
      metadata:
        usfm: TIT.1.2
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'prédestiné avant la fondation du monde, et manifesté à la fin des temps, à cause de vous, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'qui par lui croyez en Dieu, lequel l’a ressuscité des morts et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 2:33
      metadata:
        usfm: ACT.2.33
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 2:9
      metadata:
        usfm: PHP.2.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'lui a donné la gloire, en sorte que votre foi et votre espérance reposent sur Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ayant purifié vos âmes en obéissant à la vérité pour avoir un amour fraternel sincère, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 12:10
      metadata:
        usfm: ROM.12.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 4:3
      metadata:
        usfm: EPH.4.3
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hé 13:1
      metadata:
        usfm: HEB.13.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 2:17
      metadata:
        usfm: 1PE.2.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'aimez-vous ardemment les uns les autres, de tout votre cœur, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'puisque vous avez été '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ja 1:18
      metadata:
        usfm: JAS.1.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
