document_id: PSA.138
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 2 S 7. Ps 117; 67; 113.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: De David.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je te célèbre de tout mon cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je chante tes louanges en la présence de Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Je me prosterne dans ton saint temple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et je célèbre ton nom, à cause de ta bonté et de ta fidélité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car ta renommée s’est accrue par l’accomplissement de tes promesses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Le jour où je t’ai invoqué, tu m’as exaucé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu m’as rassuré, tu as fortifié mon âme.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tous les rois de la terre te loueront, ô Éternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: En entendant les paroles de ta bouche;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ils célébreront les voies de l’Éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Car la gloire de l’Éternel est grande.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'L’Éternel est élevé: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 113:6
      metadata:
        usfm: PSA.113.6
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '7'
      metadata:
        usfm: PSA.113.7
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: il voit les humbles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et il reconnaît de loin les orgueilleux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Quand je marche au milieu de la détresse, tu me rends la vie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu étends ta main sur la colère de mes ennemis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ta droite me sauve.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: L’Éternel agira en ma faveur.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Éternel, ta bonté dure toujours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: N’abandonne pas les œuvres de tes mains!
