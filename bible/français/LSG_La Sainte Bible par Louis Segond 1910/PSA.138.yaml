document_id: PSA.138,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 2 S 7. Ps 117; 67; 113.
  - type: text
    content: De David.
  - type: text
    content: Je te célèbre de tout mon cœur,
  - type: text
    content: Je chante tes louanges en la présence de Dieu.
  '2':
  - type: text
    content: Je me prosterne dans ton saint temple,
  - type: text
    content: Et je célèbre ton nom, à cause de ta bonté et de ta fidélité,
  - type: text
    content: Car ta renommée s’est accrue par l’accomplissement de tes promesses.
  '3':
  - type: text
    content: Le jour où je t’ai invoqué, tu m’as exaucé,
  - type: text
    content: Tu m’as rassuré, tu as fortifié mon âme.
  '4':
  - type: text
    content: Tous les rois de la terre te loueront, ô Éternel!
  - type: text
    content: En entendant les paroles de ta bouche;
  '5':
  - type: text
    content: Ils célébreront les voies de l’Éternel,
  - type: text
    content: Car la gloire de l’Éternel est grande.
  '6':
  - type: text
    content: 'L’Éternel est élevé: '
  - type: note
    content: Ps 113:6, 7.
  - type: text
    content: il voit les humbles,
  - type: text
    content: Et il reconnaît de loin les orgueilleux.
  '7':
  - type: text
    content: Quand je marche au milieu de la détresse, tu me rends la vie,
  - type: text
    content: Tu étends ta main sur la colère de mes ennemis,
  - type: text
    content: Et ta droite me sauve.
  '8':
  - type: text
    content: L’Éternel agira en ma faveur.
  - type: text
    content: Éternel, ta bonté dure toujours,
  - type: text
    content: N’abandonne pas les œuvres de tes mains!
