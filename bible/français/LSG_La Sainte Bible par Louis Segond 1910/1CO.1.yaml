document_id: 1CO.1,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Adresse et salutation
  - type: heading
    content: 'V. 1-3: cf. Ro 1:1-7. Jud v. 1, 2. Ac 18.'
  - type: text
    content: 'Paul, appelé à être apôtre de Jésus-Christ par la volonté de Dieu, et le frère Sosthène, '
  '10':
  - type: text
    content: 'Je vous exhorte, frères, par le nom de notre Seigneur Jésus-Christ, '
  - type: note
    content: Ro 12:16; 15:5. Ph 2:2; 3:16. 1 Pi 3:8.
  - type: text
    content: 'à tenir tous un même langage, et à ne point avoir de divisions parmi vous, mais à être parfaitement unis dans un même esprit et dans un même sentiment. '
  '11':
  - type: text
    content: 'Car, mes frères, j’ai appris à votre sujet, par les gens de Chloé, qu’il y a des disputes au milieu de vous. '
  '12':
  - type: text
    content: 'Je veux dire que chacun de vous parle ainsi: '
  - type: note
    content: 1 Co 3:4.
  - type: text
    content: 'Moi, je suis de Paul! Et moi, '
  - type: note
    content: Ac 18:24. 1 Co 16:12.
  - type: text
    content: 'd’Apollos! Et moi, de Céphas! Et moi, de Christ! '
  '13':
  - type: text
    content: 'Christ est-il divisé? Paul a-t-il été crucifié pour vous, ou est-ce au nom de Paul que vous avez été baptisés? '
  '14':
  - type: text
    content: 'Je rends grâces à Dieu de ce que je n’ai baptisé aucun de vous, excepté '
  - type: note
    content: Ac 18:8.
  - type: text
    content: 'Crispus et '
  - type: note
    content: Ro 16:23.
  - type: text
    content: 'Gaïus, '
  '15':
  - type: text
    content: 'afin que personne ne dise que vous avez été baptisés en mon nom. '
  '16':
  - type: text
    content: 'J’ai encore baptisé la famille de '
  - type: note
    content: 1 Co 16:15, 17.
  - type: text
    content: Stéphanas; du reste, je ne sache pas que j’aie baptisé quelque autre personne.
  - type: heading
    content: La sagesse du monde et la sagesse de Dieu. — Caractère et but de la prédication de Paul
  - type: heading
    content: 'V. 17-31: cf. (1 Co 3:18-20. Ro 1:16.) Mt 11:25-27. Lu 1:35. Jé 9:23, 24.'
  '17':
  - type: text
    content: 'Ce n’est pas pour baptiser que Christ m’a envoyé, c’est pour annoncer l’Évangile, et cela '
  - type: note
    content: 1 Co 2:1, 4. 2 Pi 1:16.
  - type: text
    content: 'sans la sagesse du langage, afin que la croix de Christ ne soit pas rendue vaine. '
  '18':
  - type: text
    content: 'Car la prédication de la croix est une folie pour ceux qui périssent; '
  - type: note
    content: Ro 1:16.
  - type: text
    content: 'mais pour nous qui sommes sauvés, elle est une puissance de Dieu. '
  '19':
  - type: text
    content: 'Aussi est-il écrit:'
  - type: note
    content: Job 5:12. És 29:14.
  - type: text
    content: Je détruirai la sagesse des sages,
  - type: text
    content: 'Et j’anéantirai l’intelligence des intelligents. '
  '2':
  - type: text
    content: 'à l’Église de Dieu qui est à Corinthe, '
  - type: note
    content: Jn 17:19. Ac 15:9. 1 Th 4:7.
  - type: text
    content: 'à ceux qui ont été sanctifiés en Jésus-Christ, '
  - type: note
    content: Ro 1:7. Ép 1:1.
  - type: text
    content: 'appelés à être saints, '
  - type: note
    content: 2 Ti 2:22.
  - type: text
    content: 'et à tous ceux qui invoquent en quelque lieu que ce soit le nom de notre Seigneur Jésus-Christ, leur Seigneur et le nôtre: '
  '20':
  - type: note
    content: És 33:18.
  - type: text
    content: 'Où est le sage? Où est le scribe? Où est le disputeur de ce siècle? Dieu n’a-t-il pas convaincu de folie la sagesse du monde? '
  '21':
  - type: note
    content: Mt 11:25. Lu 10:21.
  - type: text
    content: 'Car puisque le monde, avec sa sagesse, n’a point connu Dieu dans la sagesse de Dieu, il a plu à Dieu de sauver les croyants par la folie de la prédication. '
  '22':
  - type: note
    content: Mt 12:38; 16:1. Jn 4:48.
  - type: text
    content: 'Les Juifs demandent des miracles et les Grecs cherchent la sagesse: '
  '23':
  - type: text
    content: 'nous, nous prêchons Christ crucifié; scandale '
  - type: note
    content: Mt 11:6. Jn 6:60, 66.
  - type: text
    content: 'pour les Juifs et folie pour les païens, '
  '24':
  - type: text
    content: 'mais puissance de Dieu et '
  - type: note
    content: Col 2:3.
  - type: text
    content: 'sagesse de Dieu pour ceux qui sont appelés, tant Juifs que Grecs. '
  '25':
  - type: text
    content: 'Car la folie de Dieu est plus sage que les hommes, et la faiblesse de Dieu est plus forte que les hommes. '
  '26':
  - type: text
    content: 'Considérez, frères, que parmi vous qui avez été appelés '
  - type: note
    content: Jn 7:48. Ja 2:5.
  - type: text
    content: 'il n’y a ni beaucoup de sages selon la chair, ni beaucoup de puissants, ni beaucoup de nobles. '
  '27':
  - type: text
    content: 'Mais Dieu a choisi les choses folles du monde pour confondre les sages; Dieu a choisi les choses faibles du monde pour confondre les fortes; '
  '28':
  - type: text
    content: 'et Dieu a choisi les choses viles du monde et celles qu’on méprise, celles qui ne sont point, pour réduire à néant celles qui sont, '
  '29':
  - type: text
    content: 'afin que nulle chair ne se glorifie devant Dieu. '
  '3':
  - type: note
    content: Ro 1:7. 2 Co 1:2. Ép 1:2. 1 Pi 1:2.
  - type: text
    content: que la grâce et la paix vous soient données de la part de Dieu notre Père et du Seigneur Jésus-Christ!
  - type: heading
    content: Actions de grâces pour les dons accordés aux Corinthiens. Appel à l’union
  - type: heading
    content: 'V. 4-16: cf. (Ph 1:3-6. Col 1:3-6.) 1 Co 3:3-8, 21, 22.'
  '30':
  - type: text
    content: 'Or, c’est par lui que vous êtes en Jésus-Christ, '
  - type: note
    content: Jé 23:5. Jn 17:19.
  - type: text
    content: 'lequel, de par Dieu, a été fait pour nous sagesse, justice et sanctification et rédemption, '
  '31':
  - type: text
    content: afin, comme il est écrit,
  - type: note
    content: És 65:16. Jé 9:23, 24. 2 Co 10:17.
  - type: text
    content: Que celui qui se glorifie se glorifie dans le Seigneur.
  '4':
  - type: text
    content: 'Je rends à mon Dieu de continuelles actions de grâces à votre sujet, pour la grâce de Dieu qui vous a été accordée en Jésus-Christ. '
  '5':
  - type: note
    content: Col 1:9.
  - type: text
    content: 'Car en lui vous avez été comblés de toutes les richesses qui concernent la parole et la connaissance, '
  '6':
  - type: text
    content: 'le témoignage de Christ ayant été solidement établi parmi vous, '
  '7':
  - type: text
    content: 'de sorte qu’il ne vous manque aucun don, '
  - type: note
    content: Ph 3:20. Tit 2:13.
  - type: text
    content: 'dans l’attente où vous êtes de la manifestation de notre Seigneur Jésus-Christ. '
  '8':
  - type: note
    content: 1 Th 3:13; 5:23.
  - type: text
    content: 'Il vous affermira aussi jusqu’à la fin, pour que vous soyez irréprochables au jour de notre Seigneur Jésus-Christ. '
  '9':
  - type: note
    content: 1 Co 10:13. 1 Th 5:24.
  - type: text
    content: 'Dieu est fidèle, lui qui vous a appelés à '
  - type: note
    content: Jé 32:40, etc. Jn 15:5. Ga 2:20. 1 Jn 1:3.
  - type: text
    content: 'la communion de son Fils, Jésus-Christ notre Seigneur. '
