document_id: 1SA.22,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-5: cf. 1 Ch 11:15-19. (Ps 57; 142.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'David partit de là, et se sauva dans la caverne d’Adullam. Ses frères et toute la maison de son père l’apprirent, et ils descendirent vers lui. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Achimélec a consulté pour lui l’Éternel, il lui a donné des vivres et lui a remis l’épée de Goliath, le Philistin. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Le roi envoya chercher Achimélec, fils d’Achithub, le sacrificateur, et toute la maison de son père, les sacrificateurs qui étaient à Nob. Ils se rendirent tous vers le roi. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Saül dit: Écoute, fils d’Achithub! Il répondit: Me voici, mon seigneur! '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Saül lui dit: Pourquoi avez-vous conspiré contre moi, toi et le fils d’Isaï? Pourquoi lui as-tu donné du pain et une épée, et as-tu consulté Dieu pour lui, afin qu’il s’élevât contre moi et me dressât des embûches, comme il le fait aujourd’hui? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Achimélec répondit au roi: Lequel d’entre tous tes serviteurs peut être comparé au fidèle David, gendre du roi, dévoué à ses ordres, et honoré dans ta maison? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Est-ce aujourd’hui que j’ai commencé à consulter Dieu pour lui? Loin de moi! Que le roi ne mette rien à la charge de son serviteur ni de personne de la maison de mon père, car ton serviteur ne connaît de tout ceci aucune chose, petite ou grande. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Le roi dit: Tu mourras, Achimélec, toi et toute la maison de ton père. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Et le roi dit aux coureurs qui se tenaient près de lui: Tournez-vous, et mettez à mort les sacrificateurs de l’Éternel; car ils sont d’accord avec David, ils ont bien su qu’il s’enfuyait, et ils ne m’ont point averti. Mais les serviteurs du roi ne voulurent pas avancer la main pour frapper les sacrificateurs de l’Éternel. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Alors le roi dit à Doëg: Tourne-toi, et frappe les sacrificateurs. Et Doëg, l’Édomite, se tourna, et ce fut lui qui frappa les sacrificateurs; il fit mourir en ce jour quatre-vingt-cinq hommes portant l’éphod de lin. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Saül frappa encore du tranchant de l’épée Nob, ville sacerdotale; hommes et femmes, enfants et nourrissons, bœufs, ânes, et brebis, tombèrent sous le tranchant de l’épée. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Tous ceux qui se trouvaient dans la détresse, qui avaient des créanciers, ou qui étaient mécontents, se rassemblèrent auprès de lui, et il devint leur chef. Ainsi se joignirent à lui environ quatre cents hommes. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Un fils d’Achimélec, fils d’Achithub, échappa. Son nom était Abiathar. Il s’enfuit auprès de David, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'et lui rapporta que Saül avait tué les sacrificateurs de l’Éternel. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'David dit à Abiathar: J’ai bien pensé ce jour même que Doëg, l’Édomite, se trouvant là, ne manquerait pas d’informer Saül. C’est moi qui suis cause de la mort de toutes les personnes de la maison de ton père. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Reste avec moi, ne crains rien, car celui qui cherche ma vie cherche la tienne; près de moi tu seras bien gardé.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'De là David s’en alla à Mitspé dans le pays de Moab. Il dit au roi de Moab: Permets, je te prie, à mon père et à ma mère de se retirer chez vous, jusqu’à ce que je sache ce que Dieu fera de moi. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Et il les conduisit devant le roi de Moab, et ils demeurèrent avec lui tout le temps que David fut dans la forteresse. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Le prophète Gad dit à David: Ne reste pas dans la forteresse, va-t’en, et entre dans le pays de Juda. Et David s’en alla, et parvint à la forêt de Héreth.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Vengeance de Saül contre Achimélec; massacre de quatre-vingt-cinq sacrificateurs et de tous les habitants de Nob
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 6-23: cf. 1 S 21:1-9. Ps 52. (1 S 2:27, etc.; 3:12-14.) Pr 29:12.'
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Saül apprit que l’on avait des renseignements sur David et sur ses gens. Saül était assis sous le tamarisc, à Guibea, sur la hauteur; il avait sa lance à la main, et tous ses serviteurs se tenaient près de lui. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Et Saül dit à ses serviteurs qui se tenaient près de lui: Écoutez, Benjamites! Le fils d’Isaï vous donnera-t-il à tous des champs et des vignes? Fera-t-il de vous tous des chefs de mille et des chefs de cent? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Sinon, pourquoi avez-vous tous conspiré contre moi, et n’y a-t-il personne qui m’informe de l’alliance de mon fils avec le fils d’Isaï? Pourquoi n’y a-t-il personne de vous qui souffre à mon sujet, et qui m’avertisse que mon fils a soulevé mon serviteur contre moi, afin qu’il me dressât des embûches, comme il le fait aujourd’hui? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Doëg, l’Édomite, qui se trouvait aussi parmi les serviteurs de Saül, répondit: J’ai vu le fils d’Isaï venir à Nob, auprès d’Achimélec, fils d’Achithub. '
