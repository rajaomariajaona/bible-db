document_id: 1SA.1,93
type_code: fra
verses:
  '1':
  - type: heading
    content: ÉLI ET SAMUEL,
  - type: heading
    content: LES DEUX DERNIERS JUGES EN ISRAËL
  - type: heading
    content: Ch. 1 à 12. (Ps 99:6.)
  - type: heading
    content: Éli souverain sacrificateur et juge en Israël
  - type: heading
    content: 'V. 1-8: cf. (De 12:5-18; 16:16, 17.) (Ge 29:30, 31; 30:1, 2.)'
  - type: text
    content: 'Il y avait un homme de Ramathaïm-Tsophim, de la montagne d’Éphraïm, nommé '
  - type: note
    content: 1 Ch 6:26, 27.
  - type: text
    content: 'Elkana, fils de Jeroham, fils d’Élihu, fils de Thohu, fils de Tsuph, Éphratien. '
  '10':
  - type: text
    content: 'Et, l’amertume dans l’âme, elle pria l’Éternel et versa des pleurs. '
  '11':
  - type: text
    content: 'Elle fit un vœu, en disant: Éternel des armées! Si tu daignes regarder l’affliction de ta servante, si tu te souviens de moi et n’oublies point ta servante, et si tu donnes à ta servante un enfant mâle, je le consacrerai à l’Éternel pour tous les jours de sa vie, et '
  - type: note
    content: Jg 13:5.
  - type: text
    content: 'le rasoir ne passera point sur sa tête. '
  '12':
  - type: text
    content: 'Comme elle restait longtemps en prière devant l’Éternel, Éli observa sa bouche. '
  '13':
  - type: text
    content: 'Anne parlait dans son cœur, et ne faisait que remuer les lèvres, mais on n’entendait point sa voix. Éli pensa qu’elle était ivre, '
  '14':
  - type: text
    content: 'et il lui dit: Jusques à quand seras-tu dans l’ivresse? Fais passer ton vin. '
  '15':
  - type: text
    content: 'Anne répondit: Non, mon seigneur, je suis une femme qui souffre en son cœur, et je n’ai bu ni vin ni boisson enivrante; mais je '
  - type: note
    content: Ps 62:9.
  - type: text
    content: 'répandais mon âme devant l’Éternel. '
  '16':
  - type: text
    content: 'Ne prends pas ta servante pour une femme pervertie, car c’est l’excès de ma douleur et de mon chagrin qui m’a fait parler jusqu’à présent. '
  '17':
  - type: text
    content: 'Éli reprit la parole, et dit: Va en paix, et que le Dieu d’Israël exauce la prière que tu lui as adressée! '
  '18':
  - type: text
    content: 'Elle dit: Que ta servante trouve grâce à tes yeux! Et cette femme s’en alla. Elle mangea, et son visage ne fut plus le même. '
  '19':
  - type: text
    content: Ils se levèrent de bon matin, et après s’être prosternés devant l’Éternel, ils s’en retournèrent et revinrent dans leur maison à Rama.
  - type: heading
    content: Naissance de Samuel
  - type: heading
    content: 'V. 20-28: cf. (Ge 25:21. Ps 116:1, 2, 12-14.) 1 S 2:18-21.'
  - type: text
    content: 'Elkana connut Anne, sa femme, et l’Éternel se souvint d’elle. '
  '2':
  - type: text
    content: 'Il avait deux femmes, dont l’une s’appelait Anne, et l’autre Peninna; Peninna avait des enfants, mais Anne n’en avait point. '
  '20':
  - type: text
    content: 'Dans le cours de l’année, Anne devint enceinte, et elle enfanta un fils, qu’elle nomma Samuel, car, dit-elle, je l’ai demandé à l’Éternel. '
  '21':
  - type: text
    content: 'Son mari Elkana monta ensuite avec toute sa maison, pour offrir à l’Éternel le sacrifice annuel, et pour accomplir son vœu. '
  '22':
  - type: text
    content: 'Mais Anne ne monta point, et elle dit à son mari: Lorsque l’enfant sera sevré, je le mènerai, afin qu’il soit présenté devant l’Éternel et qu’il reste là pour toujours. '
  '23':
  - type: text
    content: 'Elkana, son mari, lui dit: Fais ce qui te semblera bon, attends de l’avoir sevré. Veuille seulement l’Éternel accomplir sa parole! Et la femme resta et allaita son fils, jusqu’à ce qu’elle le sevrât. '
  '24':
  - type: note
    content: Lu 2:41.
  - type: text
    content: 'Quand elle l’eut sevré, elle le fit monter avec elle, et prit trois taureaux, un épha de farine, et une outre de vin. Elle le mena dans la maison de l’Éternel à Silo: l’enfant était encore tout jeune. '
  '25':
  - type: text
    content: 'Ils égorgèrent les taureaux, et ils conduisirent l’enfant à Éli. '
  '26':
  - type: text
    content: 'Anne dit: Mon seigneur, pardon! Aussi vrai que ton âme vit, mon seigneur, je suis cette femme qui me tenais ici près de toi pour prier l’Éternel. '
  '27':
  - type: text
    content: 'C’était pour cet enfant que je priais, et l’Éternel a exaucé la prière que je lui adressais. '
  '28':
  - type: text
    content: 'Aussi je veux le prêter à l’Éternel: il sera toute sa vie prêté à l’Éternel. Et ils se prosternèrent là devant l’Éternel'
  '3':
  - type: note
    content: Ex 23:14. De 16:16.
  - type: text
    content: 'Chaque année, cet homme montait de sa ville à Silo, pour se prosterner devant l’Éternel des armées et pour lui offrir des sacrifices. Là se trouvaient les deux fils d’Éli, Hophni et Phinées, sacrificateurs de l’Éternel. '
  '4':
  - type: text
    content: 'Le jour où Elkana offrait son sacrifice, il donnait des portions à Peninna, sa femme, et à tous les fils et à toutes les filles qu’il avait d’elle. '
  '5':
  - type: text
    content: 'Mais il donnait à Anne une portion double; car il aimait Anne, que l’Éternel avait rendue stérile. '
  '6':
  - type: text
    content: 'Sa rivale lui prodiguait les mortifications, pour la porter à s’irriter de ce que l’Éternel l’avait rendue stérile. '
  '7':
  - type: text
    content: 'Et toutes les années il en était ainsi. Chaque fois qu’Anne montait à la maison de l’Éternel, Peninna la mortifiait de la même manière. Alors elle pleurait et ne mangeait point. '
  '8':
  - type: text
    content: 'Elkana, son mari, lui disait: Anne, pourquoi pleures-tu, et ne manges-tu pas? Pourquoi ton cœur est-il attristé? '
  - type: note
    content: Ru 4:15.
  - type: text
    content: Est-ce que je ne vaux pas pour toi mieux que dix fils?
  - type: heading
    content: 'V. 9-19: cf. No 30:4, etc. (Ps 50:15; 120:1, etc. Ja 5:13. Ph 4:6, 7.) Ps 10:14.'
  '9':
  - type: text
    content: 'Anne se leva, après que l’on eut mangé et bu à Silo. Le sacrificateur Éli était assis sur un siège, près de l’un des poteaux du temple de l’Éternel. '
