document_id: 1SA.1
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: ÉLI ET SAMUEL,
  marker-yv: yv-h
- type: usfm
  marker: ms2
  children:
  - type: text
    text: LES DEUX DERNIERS JUGES EN ISRAËL
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: Ch. 1 à 12. (Ps 99:6.)
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Éli souverain sacrificateur et juge en Israël
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-8: cf. (De 12:5-18; 16:16, 17.) (Ge 29:30, 31; 30:1, 2.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Il y avait un homme de Ramathaïm-Tsophim, de la montagne d’Éphraïm, nommé '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ch 6:26
      metadata:
        usfm: 1CH.6.26
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '27'
      metadata:
        usfm: 1CH.6.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Elkana, fils de Jeroham, fils d’Élihu, fils de Thohu, fils de Tsuph, Éphratien. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il avait deux femmes, dont l’une s’appelait Anne, et l’autre Peninna; Peninna avait des enfants, mais Anne n’en avait point. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 23:14
      metadata:
        usfm: EXO.23.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 16:16
      metadata:
        usfm: DEU.16.16
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Chaque année, cet homme montait de sa ville à Silo, pour se prosterner devant l’Éternel des armées et pour lui offrir des sacrifices. Là se trouvaient les deux fils d’Éli, Hophni et Phinées, sacrificateurs de l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Le jour où Elkana offrait son sacrifice, il donnait des portions à Peninna, sa femme, et à tous les fils et à toutes les filles qu’il avait d’elle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mais il donnait à Anne une portion double; car il aimait Anne, que l’Éternel avait rendue stérile. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Sa rivale lui prodiguait les mortifications, pour la porter à s’irriter de ce que l’Éternel l’avait rendue stérile. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Et toutes les années il en était ainsi. Chaque fois qu’Anne montait à la maison de l’Éternel, Peninna la mortifiait de la même manière. Alors elle pleurait et ne mangeait point. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Elkana, son mari, lui disait: Anne, pourquoi pleures-tu, et ne manges-tu pas? Pourquoi ton cœur est-il attristé? '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ru 4:15
      metadata:
        usfm: RUT.4.15
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Est-ce que je ne vaux pas pour toi mieux que dix fils?
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 9-19: cf. No 30:4, etc. (Ps 50:15; 120:1, etc. Ja 5:13. Ph 4:6, 7.) Ps 10:14.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Anne se leva, après que l’on eut mangé et bu à Silo. Le sacrificateur Éli était assis sur un siège, près de l’un des poteaux du temple de l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Et, l’amertume dans l’âme, elle pria l’Éternel et versa des pleurs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Elle fit un vœu, en disant: Éternel des armées! Si tu daignes regarder l’affliction de ta servante, si tu te souviens de moi et n’oublies point ta servante, et si tu donnes à ta servante un enfant mâle, je le consacrerai à l’Éternel pour tous les jours de sa vie, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jg 13:5
      metadata:
        usfm: JDG.13.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'le rasoir ne passera point sur sa tête. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Comme elle restait longtemps en prière devant l’Éternel, Éli observa sa bouche. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Anne parlait dans son cœur, et ne faisait que remuer les lèvres, mais on n’entendait point sa voix. Éli pensa qu’elle était ivre, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'et il lui dit: Jusques à quand seras-tu dans l’ivresse? Fais passer ton vin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Anne répondit: Non, mon seigneur, je suis une femme qui souffre en son cœur, et je n’ai bu ni vin ni boisson enivrante; mais je '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 62:9
      metadata:
        usfm: PSA.62.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'répandais mon âme devant l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ne prends pas ta servante pour une femme pervertie, car c’est l’excès de ma douleur et de mon chagrin qui m’a fait parler jusqu’à présent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Éli reprit la parole, et dit: Va en paix, et que le Dieu d’Israël exauce la prière que tu lui as adressée! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Elle dit: Que ta servante trouve grâce à tes yeux! Et cette femme s’en alla. Elle mangea, et son visage ne fut plus le même. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ils se levèrent de bon matin, et après s’être prosternés devant l’Éternel, ils s’en retournèrent et revinrent dans leur maison à Rama.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Naissance de Samuel
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 20-28: cf. (Ge 25:21. Ps 116:1, 2, 12-14.) 1 S 2:18-21.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Elkana connut Anne, sa femme, et l’Éternel se souvint d’elle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dans le cours de l’année, Anne devint enceinte, et elle enfanta un fils, qu’elle nomma Samuel, car, dit-elle, je l’ai demandé à l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Son mari Elkana monta ensuite avec toute sa maison, pour offrir à l’Éternel le sacrifice annuel, et pour accomplir son vœu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Mais Anne ne monta point, et elle dit à son mari: Lorsque l’enfant sera sevré, je le mènerai, afin qu’il soit présenté devant l’Éternel et qu’il reste là pour toujours. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Elkana, son mari, lui dit: Fais ce qui te semblera bon, attends de l’avoir sevré. Veuille seulement l’Éternel accomplir sa parole! Et la femme resta et allaita son fils, jusqu’à ce qu’elle le sevrât. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 2:41
      metadata:
        usfm: LUK.2.41
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Quand elle l’eut sevré, elle le fit monter avec elle, et prit trois taureaux, un épha de farine, et une outre de vin. Elle le mena dans la maison de l’Éternel à Silo: l’enfant était encore tout jeune. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ils égorgèrent les taureaux, et ils conduisirent l’enfant à Éli. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Anne dit: Mon seigneur, pardon! Aussi vrai que ton âme vit, mon seigneur, je suis cette femme qui me tenais ici près de toi pour prier l’Éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'C’était pour cet enfant que je priais, et l’Éternel a exaucé la prière que je lui adressais. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Aussi je veux le prêter à l’Éternel: il sera toute sa vie prêté à l’Éternel. Et ils se prosternèrent là devant l’Éternel'
