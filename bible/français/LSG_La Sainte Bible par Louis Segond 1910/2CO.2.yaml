document_id: 2CO.2,93
type_code: fra
verses:
  '1':
  - type: text
    content: 'Je résolus donc en moi-même de ne pas retourner chez vous dans la tristesse. '
  '10':
  - type: text
    content: 'Or, à qui vous pardonnez, je pardonne aussi; et ce que j’ai pardonné, si j’ai pardonné quelque chose, c’est à cause de vous, en présence de Christ, '
  '11':
  - type: text
    content: 'afin de ne pas laisser à Satan l’avantage sur nous, car nous n’ignorons pas ses desseins. '
  '12':
  - type: text
    content: 'Au reste, '
  - type: note
    content: Ac 16:8.
  - type: text
    content: 'lorsque je fus arrivé à Troas pour l’Évangile de Christ, quoique le Seigneur m’y eût ouvert une porte, je n’eus point de repos d’esprit, parce que je ne trouvai pas Tite, mon frère; '
  '13':
  - type: text
    content: c’est pourquoi, ayant pris congé d’eux, je partis pour la Macédoine.
  - type: heading
    content: 'Ministère de l’apôtre: succès, rapportés à Dieu. Supériorité de la nouvelle alliance sur l’ancienne; difficultés de la tâche; motifs de confiance et d’encouragement'
  - type: heading
    content: 'V. 14-17: cf. Ro 15:17-19. (1 Co 1:17-24. 2 Co 4:1-7.)'
  '14':
  - type: text
    content: 'Grâces soient rendues à Dieu, qui nous fait toujours triompher en Christ, '
  - type: note
    content: Col 1:27.
  - type: text
    content: 'et qui répand par nous en tout lieu l’odeur de sa connaissance! '
  '15':
  - type: text
    content: 'Nous sommes, en effet, pour Dieu la bonne odeur de Christ, parmi ceux qui sont sauvés et parmi ceux qui périssent: '
  '16':
  - type: note
    content: Lu 2:34.
  - type: text
    content: 'aux uns, une odeur de mort, donnant la mort; aux autres, une odeur de vie, donnant la vie. Et qui est suffisant pour ces choses? '
  '17':
  - type: text
    content: Car nous ne falsifions point la parole de Dieu, comme font plusieurs; mais c’est avec sincérité, mais c’est de la part de Dieu, que nous parlons en Christ devant Dieu.
  '2':
  - type: text
    content: 'Car si je vous attriste, qui peut me réjouir, sinon celui qui est attristé par moi? '
  '3':
  - type: text
    content: 'J’ai écrit comme je l’ai fait pour ne pas éprouver, à mon arrivée, de la tristesse de la part de ceux qui devaient me donner de la joie, '
  - type: note
    content: 2 Co 1:22. Ga 5:10.
  - type: text
    content: 'ayant en vous tous cette confiance que ma joie est la vôtre à tous. '
  '4':
  - type: text
    content: C’est dans une grande affliction, le cœur angoissé, et avec beaucoup de larmes, que je vous ai écrit, non pas afin que vous fussiez attristés, mais afin que vous connussiez l’amour extrême que j’ai pour vous.
  - type: heading
    content: 'V. 5-13: cf. 2 Co 7:5-16. Lu 17:3.'
  '5':
  - type: text
    content: 'Si quelqu’un a été une cause de tristesse, ce n’est pas moi qu’il a attristé, c’est vous tous, du moins en partie, pour ne rien exagérer. '
  '6':
  - type: note
    content: 1 Co 5:3.
  - type: text
    content: 'Il suffit pour cet homme du châtiment qui lui a été infligé par le plus grand nombre, '
  '7':
  - type: text
    content: 'en sorte que vous devez bien plutôt lui pardonner et le consoler, de peur qu’il ne soit accablé par une tristesse excessive. '
  '8':
  - type: text
    content: 'Je vous exhorte donc à faire acte de charité envers lui; '
  '9':
  - type: text
    content: 'car je vous ai écrit aussi dans le but de connaître, en vous mettant à l’épreuve, si vous êtes obéissants en toutes choses. '
