document_id: 2CO.2,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Je résolus donc en moi-même de ne pas retourner chez vous dans la tristesse. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Or, à qui vous pardonnez, je pardonne aussi; et ce que j’ai pardonné, si j’ai pardonné quelque chose, c’est à cause de vous, en présence de Christ, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'afin de ne pas laisser à Satan l’avantage sur nous, car nous n’ignorons pas ses desseins. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Au reste, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ac 16:8
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'lorsque je fus arrivé à Troas pour l’Évangile de Christ, quoique le Seigneur m’y eût ouvert une porte, je n’eus point de repos d’esprit, parce que je ne trouvai pas Tite, mon frère; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: c’est pourquoi, ayant pris congé d’eux, je partis pour la Macédoine.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Ministère de l’apôtre: succès, rapportés à Dieu. Supériorité de la nouvelle alliance sur l’ancienne; difficultés de la tâche; motifs de confiance et d’encouragement'
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 14-17: cf. Ro 15:17-19. (1 Co 1:17-24. 2 Co 4:1-7.)'
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Grâces soient rendues à Dieu, qui nous fait toujours triompher en Christ, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col 1:27
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'et qui répand par nous en tout lieu l’odeur de sa connaissance! '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Nous sommes, en effet, pour Dieu la bonne odeur de Christ, parmi ceux qui sont sauvés et parmi ceux qui périssent: '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 2:34
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'aux uns, une odeur de mort, donnant la mort; aux autres, une odeur de vie, donnant la vie. Et qui est suffisant pour ces choses? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Car nous ne falsifions point la parole de Dieu, comme font plusieurs; mais c’est avec sincérité, mais c’est de la part de Dieu, que nous parlons en Christ devant Dieu.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Car si je vous attriste, qui peut me réjouir, sinon celui qui est attristé par moi? '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'J’ai écrit comme je l’ai fait pour ne pas éprouver, à mon arrivée, de la tristesse de la part de ceux qui devaient me donner de la joie, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Co 1:22
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ga 5:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'ayant en vous tous cette confiance que ma joie est la vôtre à tous. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: C’est dans une grande affliction, le cœur angoissé, et avec beaucoup de larmes, que je vous ai écrit, non pas afin que vous fussiez attristés, mais afin que vous connussiez l’amour extrême que j’ai pour vous.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 5-13: cf. 2 Co 7:5-16. Lu 17:3.'
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Si quelqu’un a été une cause de tristesse, ce n’est pas moi qu’il a attristé, c’est vous tous, du moins en partie, pour ne rien exagérer. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Co 5:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Il suffit pour cet homme du châtiment qui lui a été infligé par le plus grand nombre, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'en sorte que vous devez bien plutôt lui pardonner et le consoler, de peur qu’il ne soit accablé par une tristesse excessive. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Je vous exhorte donc à faire acte de charité envers lui; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'car je vous ai écrit aussi dans le but de connaître, en vous mettant à l’épreuve, si vous êtes obéissants en toutes choses. '
