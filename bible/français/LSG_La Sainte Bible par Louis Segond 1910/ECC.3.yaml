document_id: ECC.3,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-15: cf. Ec 8:5-8, 15-17. És 28:23-29. Ps 33:8-11.'
  - type: text
    content: 'Il y a un temps pour tout, un temps pour toute chose sous les cieux: '
  '10':
  - type: text
    content: 'J’ai vu à quelle occupation Dieu soumet les fils de l’homme. '
  '11':
  - type: text
    content: 'Il fait toute chose bonne en son temps; même il a mis dans leur cœur la pensée de l’éternité, bien que l’homme ne puisse pas saisir l’œuvre que Dieu fait, du commencement jusqu’à la fin. '
  '12':
  - type: text
    content: 'J’ai reconnu qu’il n’y a de bonheur pour eux qu’à se réjouir et à se donner du bien-être pendant leur vie; '
  '13':
  - type: text
    content: 'mais que, si un homme mange et boit et jouit du bien-être au milieu de tout son travail, c’est là un don de Dieu. '
  '14':
  - type: text
    content: 'J’ai reconnu que tout ce que Dieu fait durera toujours, qu’il n’y a rien à y ajouter et rien à en retrancher, et que Dieu agit ainsi afin qu’on le craigne. '
  '15':
  - type: text
    content: Ce qui est a déjà été, et ce qui sera a déjà été, et Dieu ramène ce qui est passé.
  - type: heading
    content: 'V. 16-22: cf. (Ec 5:7; 12:15, 16.) (Ec 12:9; 9:1-10.)'
  '16':
  - type: text
    content: 'J’ai encore vu sous le soleil qu’au lieu établi pour juger il y a de la méchanceté, et qu’au lieu établi pour la justice il y a de la méchanceté. '
  '17':
  - type: text
    content: 'J’ai dit en mon cœur: Dieu jugera le juste et le méchant; car il y a là un temps pour toute chose et pour toute œuvre. '
  '18':
  - type: text
    content: 'J’ai dit en mon cœur, au sujet des fils de l’homme, que Dieu les éprouverait, et qu’eux-mêmes verraient qu’ils ne sont que des bêtes. '
  '19':
  - type: text
    content: 'Car le sort des fils de l’homme et celui de la bête sont pour eux un même sort; comme meurt l’un, ainsi meurt l’autre, ils ont tous un même souffle, et la supériorité de l’homme sur la bête est nulle; car tout est vanité. '
  '2':
  - type: text
    content: 'un temps pour naître, et un temps pour mourir; un temps pour planter, et un temps pour arracher ce qui a été planté; '
  '20':
  - type: text
    content: 'Tout va dans un même lieu; '
  - type: note
    content: Ge 3:19.
  - type: text
    content: 'tout a été fait de la poussière, et tout retourne à la poussière. '
  '21':
  - type: text
    content: 'Qui sait si le souffle des fils de l’homme monte en haut, et si le souffle de la bête descend en bas dans la terre? '
  '22':
  - type: text
    content: 'Et j’ai vu qu’il n’y a rien de mieux pour l’homme que de se réjouir de ses œuvres: c’est là sa part. Car qui le fera jouir de ce qui sera après lui?'
  '3':
  - type: text
    content: 'un temps pour tuer, et un temps pour guérir; un temps pour abattre, et un temps pour bâtir; '
  '4':
  - type: text
    content: 'un temps pour pleurer, et un temps pour rire; un temps pour se lamenter, et un temps pour danser; '
  '5':
  - type: text
    content: 'un temps pour lancer des pierres, et un temps pour ramasser des pierres; un temps '
  - type: note
    content: 1 Co 7:5.
  - type: text
    content: 'pour embrasser, et un temps pour s’éloigner des embrassements; '
  '6':
  - type: text
    content: 'un temps pour chercher, et un temps pour perdre; un temps pour garder, et un temps pour jeter; '
  '7':
  - type: text
    content: 'un temps pour déchirer, et un temps pour coudre; un temps pour se taire, et un temps pour parler; '
  '8':
  - type: text
    content: 'un temps pour aimer, et un temps pour haïr; un temps pour la guerre, et un temps pour la paix. '
  '9':
  - type: text
    content: 'Quel '
  - type: note
    content: Ec 1:3.
  - type: text
    content: 'avantage celui qui travaille retire-t-il de sa peine? '
