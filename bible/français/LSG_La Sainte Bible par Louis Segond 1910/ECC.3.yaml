document_id: ECC.3
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-15: cf. Ec 8:5-8, 15-17. És 28:23-29. Ps 33:8-11.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Il y a un temps pour tout, un temps pour toute chose sous les cieux: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'un temps pour naître, et un temps pour mourir; un temps pour planter, et un temps pour arracher ce qui a été planté; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'un temps pour tuer, et un temps pour guérir; un temps pour abattre, et un temps pour bâtir; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'un temps pour pleurer, et un temps pour rire; un temps pour se lamenter, et un temps pour danser; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'un temps pour lancer des pierres, et un temps pour ramasser des pierres; un temps '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 7:5
      metadata:
        usfm: 1CO.7.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'pour embrasser, et un temps pour s’éloigner des embrassements; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'un temps pour chercher, et un temps pour perdre; un temps pour garder, et un temps pour jeter; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'un temps pour déchirer, et un temps pour coudre; un temps pour se taire, et un temps pour parler; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'un temps pour aimer, et un temps pour haïr; un temps pour la guerre, et un temps pour la paix. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Quel '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ec 1:3
      metadata:
        usfm: ECC.1.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'avantage celui qui travaille retire-t-il de sa peine? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'J’ai vu à quelle occupation Dieu soumet les fils de l’homme. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il fait toute chose bonne en son temps; même il a mis dans leur cœur la pensée de l’éternité, bien que l’homme ne puisse pas saisir l’œuvre que Dieu fait, du commencement jusqu’à la fin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'J’ai reconnu qu’il n’y a de bonheur pour eux qu’à se réjouir et à se donner du bien-être pendant leur vie; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'mais que, si un homme mange et boit et jouit du bien-être au milieu de tout son travail, c’est là un don de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'J’ai reconnu que tout ce que Dieu fait durera toujours, qu’il n’y a rien à y ajouter et rien à en retrancher, et que Dieu agit ainsi afin qu’on le craigne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ce qui est a déjà été, et ce qui sera a déjà été, et Dieu ramène ce qui est passé.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 16-22: cf. (Ec 5:7; 12:15, 16.) (Ec 12:9; 9:1-10.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'J’ai encore vu sous le soleil qu’au lieu établi pour juger il y a de la méchanceté, et qu’au lieu établi pour la justice il y a de la méchanceté. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'J’ai dit en mon cœur: Dieu jugera le juste et le méchant; car il y a là un temps pour toute chose et pour toute œuvre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'J’ai dit en mon cœur, au sujet des fils de l’homme, que Dieu les éprouverait, et qu’eux-mêmes verraient qu’ils ne sont que des bêtes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Car le sort des fils de l’homme et celui de la bête sont pour eux un même sort; comme meurt l’un, ainsi meurt l’autre, ils ont tous un même souffle, et la supériorité de l’homme sur la bête est nulle; car tout est vanité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tout va dans un même lieu; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 3:19
      metadata:
        usfm: GEN.3.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'tout a été fait de la poussière, et tout retourne à la poussière. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Qui sait si le souffle des fils de l’homme monte en haut, et si le souffle de la bête descend en bas dans la terre? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Et j’ai vu qu’il n’y a rien de mieux pour l’homme que de se réjouir de ses œuvres: c’est là sa part. Car qui le fera jouir de ce qui sera après lui?'
