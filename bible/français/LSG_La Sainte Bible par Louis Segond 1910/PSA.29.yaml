document_id: PSA.29,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: Job 37:1-5, 23, 24.
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Psaume de David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fils de Dieu, rendez à l’Éternel,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 96:7
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8'
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Rendez à l’Éternel gloire et honneur!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: L’Éternel était sur son trône lors du déluge;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 10:16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: L’Éternel sur son trône règne éternellement.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: L’Éternel donne la force à son peuple;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel bénit son peuple et le rend heureux.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Rendez à l’Éternel gloire pour son nom!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prosternez-vous devant l’Éternel avec des ornements sacrés!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: La voix de l’Éternel retentit sur les eaux,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ex 9:23
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Le Dieu de gloire fait gronder le tonnerre;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel est sur les grandes eaux.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: La voix de l’Éternel est puissante,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La voix de l’Éternel est majestueuse.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: La voix de l’Éternel brise les cèdres;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel brise les cèdres du Liban,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Il les fait bondir comme des veaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et le Liban et le Sirion comme de jeunes buffles.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: La voix de l’Éternel fait jaillir des flammes de feu.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: La voix de l’Éternel fait trembler le désert;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’Éternel fait trembler le désert de Kadès.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: La voix de l’Éternel fait enfanter les biches,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle dépouille les forêts.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dans son palais tout s’écrie: Gloire!'
