document_id: PSA.29,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Job 37:1-5, 23, 24.
  - type: text
    content: Psaume de David.
  - type: text
    content: Fils de Dieu, rendez à l’Éternel,
  - type: note
    content: Ps 96:7, 8.
  - type: text
    content: Rendez à l’Éternel gloire et honneur!
  '10':
  - type: text
    content: L’Éternel était sur son trône lors du déluge;
  - type: note
    content: Ps 10:16.
  - type: text
    content: L’Éternel sur son trône règne éternellement.
  '11':
  - type: text
    content: L’Éternel donne la force à son peuple;
  - type: text
    content: L’Éternel bénit son peuple et le rend heureux.
  '2':
  - type: text
    content: Rendez à l’Éternel gloire pour son nom!
  - type: text
    content: Prosternez-vous devant l’Éternel avec des ornements sacrés!
  '3':
  - type: text
    content: La voix de l’Éternel retentit sur les eaux,
  - type: note
    content: Ex 9:23.
  - type: text
    content: Le Dieu de gloire fait gronder le tonnerre;
  - type: text
    content: L’Éternel est sur les grandes eaux.
  '4':
  - type: text
    content: La voix de l’Éternel est puissante,
  - type: text
    content: La voix de l’Éternel est majestueuse.
  '5':
  - type: text
    content: La voix de l’Éternel brise les cèdres;
  - type: text
    content: L’Éternel brise les cèdres du Liban,
  '6':
  - type: text
    content: Il les fait bondir comme des veaux,
  - type: text
    content: Et le Liban et le Sirion comme de jeunes buffles.
  '7':
  - type: text
    content: La voix de l’Éternel fait jaillir des flammes de feu.
  '8':
  - type: text
    content: La voix de l’Éternel fait trembler le désert;
  - type: text
    content: L’Éternel fait trembler le désert de Kadès.
  '9':
  - type: text
    content: La voix de l’Éternel fait enfanter les biches,
  - type: text
    content: Elle dépouille les forêts.
  - type: text
    content: 'Dans son palais tout s’écrie: Gloire!'
