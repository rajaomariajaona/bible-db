document_id: 2KI.20,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Maladie d’Ézéchias; sa vie prolongée de quinze ans. Ambassade babylonienne
  - type: heading
    content: 'V. 1-11: cf. (2 Ch 32:24. És 38.) Ps 30:2, etc.'
  - type: text
    content: 'En ce temps-là, '
  - type: note
    content: 2 Ch 32:24. És 38:1.
  - type: text
    content: 'Ézéchias fut malade à la mort. Le prophète Ésaïe, fils d’Amots, vint auprès de lui, et lui dit: Ainsi parle l’Éternel: Donne tes ordres à ta maison, car tu vas mourir, et tu ne vivras plus. '
  '10':
  - type: text
    content: 'Ézéchias répondit: C’est peu de chose que l’ombre avance de dix degrés; mais plutôt qu’elle recule de dix degrés. '
  '11':
  - type: text
    content: Alors Ésaïe, le prophète, invoqua l’Éternel, qui fit reculer l’ombre de dix degrés sur les degrés d’Achaz, où elle était descendue.
  - type: heading
    content: 'V. 12-21: cf. (És 39. 2 Ch 32:25-33.) 1 Co 4:7; 10:12.'
  '12':
  - type: text
    content: 'En ce même temps, Berodac-Baladan, fils de Baladan, roi de Babylone, envoya une lettre et un présent à Ézéchias, car il avait appris la maladie d’Ézéchias. '
  '13':
  - type: text
    content: 'Ézéchias donna audience aux envoyés, et il leur montra le lieu où étaient ses choses de prix, l’argent et l’or, les aromates et l’huile précieuse, son arsenal, et tout ce qui se trouvait dans ses trésors: il n’y eut rien qu’Ézéchias ne leur fît voir dans sa maison et dans tous ses domaines. '
  '14':
  - type: text
    content: 'Ésaïe, le prophète, vint ensuite auprès du roi Ézéchias, et lui dit: Qu’ont dit ces gens-là, et d’où sont-ils venus vers toi? Ézéchias répondit: Ils sont venus d’un pays éloigné, de Babylone. '
  '15':
  - type: text
    content: 'Ésaïe dit encore: Qu’ont-ils vu dans ta maison? Ézéchias répondit: Ils ont vu tout ce qui est dans ma maison: il n’y a rien dans mes trésors que je ne leur aie fait voir. '
  '16':
  - type: text
    content: 'Alors Ésaïe dit à Ézéchias: Écoute la parole de l’Éternel! '
  '17':
  - type: text
    content: 'Voici, les temps viendront où l’on emportera à Babylone tout ce qui est dans ta maison et ce que tes pères ont amassé jusqu’à ce jour; il n’en restera rien, dit l’Éternel. '
  '18':
  - type: text
    content: 'Et l’on prendra de tes fils, qui seront sortis de toi, que tu auras engendrés, pour en faire des eunuques dans le palais du roi de Babylone. '
  '19':
  - type: text
    content: 'Ézéchias répondit à Ésaïe: La parole de l’Éternel, que tu as prononcée, est bonne. Et il ajouta: N’y aura-t-il pas paix et sécurité pendant ma vie? '
  '2':
  - type: text
    content: 'Ézéchias tourna son visage contre le mur, et fit cette prière à l’Éternel: '
  '20':
  - type: text
    content: 'Le reste des actions d’Ézéchias, tous ses exploits, et comment il fit l’étang et l’aqueduc, et amena les eaux dans la ville, cela n’est-il pas écrit dans le livre des Chroniques des rois de Juda? '
  '21':
  - type: text
    content: Ézéchias se coucha avec ses pères. Et Manassé, son fils, régna à sa place.
  '3':
  - type: text
    content: 'O Éternel! Souviens-toi que j’ai marché devant ta face avec fidélité et intégrité de cœur, et que j’ai fait ce qui est bien à tes yeux! Et Ézéchias répandit d’abondantes larmes. '
  '4':
  - type: text
    content: 'Ésaïe, qui était sorti, n’était pas encore dans la cour du milieu, lorsque la parole de l’Éternel lui fut adressée en ces termes: '
  '5':
  - type: text
    content: 'Retourne, et dis à Ézéchias, chef de mon peuple: Ainsi parle l’Éternel, le Dieu de David, ton père: J’ai entendu ta prière, j’ai vu tes larmes. Voici, je te guérirai; le troisième jour, tu monteras à la maison de l’Éternel. '
  '6':
  - type: text
    content: 'J’ajouterai à tes jours quinze années. Je te délivrerai, toi et cette ville, de la main du roi d’Assyrie; je protégerai cette ville, à cause de moi, et à cause de David, mon serviteur. '
  '7':
  - type: text
    content: 'Ésaïe dit: Prenez une masse de figues. On la prit, et on l’appliqua sur l’ulcère. Et Ézéchias guérit. '
  '8':
  - type: text
    content: 'Ézéchias avait dit à Ésaïe: A quel signe connaîtrai-je que l’Éternel me guérira, et que je monterai le troisième jour à la maison de l’Éternel? '
  '9':
  - type: text
    content: 'Et Ésaïe dit: Voici, de la part de l’Éternel, le signe auquel tu connaîtras que l’Éternel accomplira la parole qu’il a prononcée: L’ombre avancera-t-elle de dix degrés, ou reculera-t-elle de dix degrés? '
