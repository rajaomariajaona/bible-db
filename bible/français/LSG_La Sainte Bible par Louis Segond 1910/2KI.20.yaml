document_id: 2KI.20
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Maladie d’Ézéchias; sa vie prolongée de quinze ans. Ambassade babylonienne
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-11: cf. (2 Ch 32:24. És 38.) Ps 30:2, etc.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'En ce temps-là, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Ch 32:24
      metadata:
        usfm: 2CH.32.24
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 38:1
      metadata:
        usfm: ISA.38.1
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Ézéchias fut malade à la mort. Le prophète Ésaïe, fils d’Amots, vint auprès de lui, et lui dit: Ainsi parle l’Éternel: Donne tes ordres à ta maison, car tu vas mourir, et tu ne vivras plus. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ézéchias tourna son visage contre le mur, et fit cette prière à l’Éternel: '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'O Éternel! Souviens-toi que j’ai marché devant ta face avec fidélité et intégrité de cœur, et que j’ai fait ce qui est bien à tes yeux! Et Ézéchias répandit d’abondantes larmes. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ésaïe, qui était sorti, n’était pas encore dans la cour du milieu, lorsque la parole de l’Éternel lui fut adressée en ces termes: '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Retourne, et dis à Ézéchias, chef de mon peuple: Ainsi parle l’Éternel, le Dieu de David, ton père: J’ai entendu ta prière, j’ai vu tes larmes. Voici, je te guérirai; le troisième jour, tu monteras à la maison de l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'J’ajouterai à tes jours quinze années. Je te délivrerai, toi et cette ville, de la main du roi d’Assyrie; je protégerai cette ville, à cause de moi, et à cause de David, mon serviteur. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ésaïe dit: Prenez une masse de figues. On la prit, et on l’appliqua sur l’ulcère. Et Ézéchias guérit. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ézéchias avait dit à Ésaïe: A quel signe connaîtrai-je que l’Éternel me guérira, et que je monterai le troisième jour à la maison de l’Éternel? '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Et Ésaïe dit: Voici, de la part de l’Éternel, le signe auquel tu connaîtras que l’Éternel accomplira la parole qu’il a prononcée: L’ombre avancera-t-elle de dix degrés, ou reculera-t-elle de dix degrés? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ézéchias répondit: C’est peu de chose que l’ombre avance de dix degrés; mais plutôt qu’elle recule de dix degrés. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Alors Ésaïe, le prophète, invoqua l’Éternel, qui fit reculer l’ombre de dix degrés sur les degrés d’Achaz, où elle était descendue.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 12-21: cf. (És 39. 2 Ch 32:25-33.) 1 Co 4:7; 10:12.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'En ce même temps, Berodac-Baladan, fils de Baladan, roi de Babylone, envoya une lettre et un présent à Ézéchias, car il avait appris la maladie d’Ézéchias. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ézéchias donna audience aux envoyés, et il leur montra le lieu où étaient ses choses de prix, l’argent et l’or, les aromates et l’huile précieuse, son arsenal, et tout ce qui se trouvait dans ses trésors: il n’y eut rien qu’Ézéchias ne leur fît voir dans sa maison et dans tous ses domaines. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ésaïe, le prophète, vint ensuite auprès du roi Ézéchias, et lui dit: Qu’ont dit ces gens-là, et d’où sont-ils venus vers toi? Ézéchias répondit: Ils sont venus d’un pays éloigné, de Babylone. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ésaïe dit encore: Qu’ont-ils vu dans ta maison? Ézéchias répondit: Ils ont vu tout ce qui est dans ma maison: il n’y a rien dans mes trésors que je ne leur aie fait voir. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Alors Ésaïe dit à Ézéchias: Écoute la parole de l’Éternel! '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Voici, les temps viendront où l’on emportera à Babylone tout ce qui est dans ta maison et ce que tes pères ont amassé jusqu’à ce jour; il n’en restera rien, dit l’Éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Et l’on prendra de tes fils, qui seront sortis de toi, que tu auras engendrés, pour en faire des eunuques dans le palais du roi de Babylone. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ézéchias répondit à Ésaïe: La parole de l’Éternel, que tu as prononcée, est bonne. Et il ajouta: N’y aura-t-il pas paix et sécurité pendant ma vie? '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Le reste des actions d’Ézéchias, tous ses exploits, et comment il fit l’étang et l’aqueduc, et amena les eaux dans la ville, cela n’est-il pas écrit dans le livre des Chroniques des rois de Juda? '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ézéchias se coucha avec ses pères. Et Manassé, son fils, régna à sa place.
