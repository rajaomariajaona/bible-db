  - type: text
    content: .
  - type: text
    content: 'Le livre de l’Ecclésiaste nous rappelle qu’il n’y a pas de vraie foi en Dieu sans un regard lucide et objectif sur la condition humaine. Nous avons ici une sorte d’investigation sur ce que se passe sur la terre: l’impossibilité de connaître les plans de l’Éternel pour le monde, inhérente à la condition humaine, l’insécurité causée par la menace constante de la mort qui survient à l’improviste. Précarité des précarités, tout est précaire!'
