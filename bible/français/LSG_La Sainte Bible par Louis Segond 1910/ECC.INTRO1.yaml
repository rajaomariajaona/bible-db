document_id: ECC.INTRO1,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: INTRODUCTION AU LIVRE DE L’ECCLÉSIASTE
  - type: usfm
    marker: imt3
    children:
    - type: text
      text: (És 40:6-8. 1 Jn 2:17. Jn 4:13. 2 Co 4:18.)
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Ce livre, encore appelé Qohéleth, est un recueil de réflexions sur la vie et surtout sur la perplexité et le sens du bonheur humain. Selon l’auteur et son expérience, tout est précaire sous le soleil.
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: '«Moi, l’Ecclésiaste, j’ai été roi d’Israël» '
    - type: text
      text: ': ainsi se présente l’auteur de cette série de réflexions réalistes frisant parfois le pessimisme, l’épicurisme, le fatalisme et la révolte contre tout objet de foi.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'La vie n’a pas de sens, confesse ce roi après son bilan négatif de l’expérience vécue (1–2). Il y a un temps pour toutes choses et tout se termine par la mort (3). Il note cependant l’existence de certaines différences: mieux vaut être mort que vivant dans certaines situations. Mieux vaut le repos que le travail. Mieux vaut être à deux que tout seul (4). Il faut cependant éviter les abus de la parole de l’autorité, même si on est riche (5). À quoi sert une longue vie sans bonheur: soyons sages (6–7)!'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Au regard de cette sagesse humaine, l’on est limité devant le roi et son pouvoir, face à l’avenir et au regard du mystère de l’œuvre de Dieu (8). En substance, chaque lecteur est invité à faire preuve de sagesse, d’humilité et de prudence dans tous les domaines de la vie terrestre.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Un même sort attend tous les êtres vivants. Le malheur arrive à tous à l’improviste. La sagesse est le plus souvent méconnue. Cependant, il faut jouir de la vie comme d’un don de Dieu (9–10). Il importe donc de savoir prendre des risques, de jouir de la vie avec discernement (11) et d’être conscient que la mort est imminente pour tous. Que faire alors? '
    - type: usfm
      marker: it
      children:
      - type: text
        text: «Crains Dieu et observe ses commandements. C’est là ce que doit faire tout homme»
    - type: text
      text: ' (12:15).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: En somme, ce livre remet en cause les prétendues évidences concernant le travail (1:12–2:11), la sagesse (2:12-13), la vie humaine (3:18-22; 8:1-8), la justice (3:16s; 8:14), les biens matériels (5:7–6:12) et même la religion traditionnelle (4:17–5:6).
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Qohéleth (en hébreu) est particulièrement favorable à la formule traditionnellement rendue par «
    - type: usfm
      marker: it
      children:
      - type: text
        text: vanité des vanités, tout est vanité
    - type: text
      text: '». Cette tournure superlative en hébreu signifie littéralement '
    - type: usfm
      marker: it
      children:
      - type: text
        text: «buée, vapeur, haleine»
    - type: text
      text: '. L’expression '
    - type: usfm
      marker: it
      children:
      - type: text
        text: habél habélim hakol habél
    - type: text
      text: ' serait mieux rendue par '
    - type: usfm
      marker: it
      children:
      - type: text
        text: précarité des précarités, tout est précaire
    - type: text
      text: .
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Le livre de l’Ecclésiaste nous rappelle qu’il n’y a pas de vraie foi en Dieu sans un regard lucide et objectif sur la condition humaine. Nous avons ici une sorte d’investigation sur ce que se passe sur la terre: l’impossibilité de connaître les plans de l’Éternel pour le monde, inhérente à la condition humaine, l’insécurité causée par la menace constante de la mort qui survient à l’improviste. Précarité des précarités, tout est précaire!'
