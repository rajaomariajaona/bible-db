document_id: ROM.13
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Soumission aux autorités
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-7: cf. 1 Pi 2:13-17. Pr 24:21, 22. Lu 20:20-26.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Tit 3:1
      metadata:
        usfm: TIT.3.1
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 2:13
      metadata:
        usfm: 1PE.2.13
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Que toute personne soit soumise aux autorités supérieures; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pr 8:15
      metadata:
        usfm: PRO.8.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Da 4:32
      metadata:
        usfm: DAN.4.32
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'car il n’y a point d’autorité qui ne vienne de Dieu, et les autorités qui existent ont été instituées de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'C’est pourquoi celui qui s’oppose à l’autorité résiste à l’ordre que Dieu a établi, et ceux qui résistent attireront une condamnation sur eux-mêmes. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ce n’est pas pour une bonne action, c’est pour une mauvaise, que les magistrats sont à redouter. Veux-tu ne pas craindre l’autorité? Fais le bien, et tu auras son approbation. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Le magistrat est serviteur de Dieu pour ton bien. Mais si tu fais le mal, crains; car ce n’est pas en vain qu’il porte l’épée, étant serviteur de Dieu pour exercer la vengeance et punir celui qui fait le mal. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il est donc nécessaire d’être soumis, non seulement par crainte de la punition, mais encore par motif de conscience. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'C’est aussi pour cela que vous payez les impôts. Car les magistrats sont des ministres de Dieu entièrement appliqués à cette fonction. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 22:21
      metadata:
        usfm: MAT.22.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Rendez à tous ce qui leur est dû: l’impôt à qui vous devez l’impôt, le tribut à qui vous devez le tribut, la crainte à qui vous devez la crainte, l’honneur à qui vous devez l’honneur.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Amour mutuel. Vigilance et pureté
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 8-10: cf. Mt 22:35-40. Ga 5:14. 1 Jn 3:11-23.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ne devez rien à personne, si ce n’est de vous aimer les uns les autres; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 5:14
      metadata:
        usfm: GAL.5.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Ti 1:5
      metadata:
        usfm: 1TI.1.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'car celui qui aime les autres a accompli la loi. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'En effet, les commandements:'
- type: usfm
  marker: pi1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ex 20:13
      metadata:
        usfm: EXO.20.13
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 5:17
      metadata:
        usfm: DEU.5.17
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 19:18
      metadata:
        usfm: MAT.19.18
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu ne commettras point d’adultère, tu ne tueras point, tu ne déroberas point, tu ne convoiteras point, et ceux qu’il peut encore y avoir, se résument dans cette parole: '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lé 19:18
      metadata:
        usfm: LEV.19.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 22:39
      metadata:
        usfm: MAT.22.39
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 12:31
      metadata:
        usfm: MRK.12.31
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 5:14
      metadata:
        usfm: GAL.5.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ja 2:8
      metadata:
        usfm: JAS.2.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Tu aimeras ton prochain comme toi-même.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'L’amour ne fait point de mal au prochain: l’amour est donc l’accomplissement de la loi.'
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 11-14: cf. 1 Th 5:4-10. Ép 5:3-18.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Cela importe d’autant plus '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 5:14
      metadata:
        usfm: EPH.5.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 5:6
      metadata:
        usfm: 1TH.5.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'que vous savez en quel temps nous sommes: c’est l’heure de vous réveiller enfin du sommeil, car maintenant le salut est plus près de nous que lorsque nous avons cru. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 5:5
      metadata:
        usfm: 1TH.5.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'La nuit est avancée, le jour approche. '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col 3:8
      metadata:
        usfm: COL.3.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Dépouillons-nous donc des œuvres des ténèbres, et revêtons les armes de la lumière. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ph 4:8
      metadata:
        usfm: PHP.4.8
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 4:12
      metadata:
        usfm: 1TH.4.12
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Marchons honnêtement, comme en plein jour, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 21:34
      metadata:
        usfm: LUK.21.34
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Th 5:6
      metadata:
        usfm: 1TH.5.6
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'loin des excès et de l’ivrognerie, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Co 6:10
      metadata:
        usfm: 1CO.6.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ép 5:5
      metadata:
        usfm: EPH.5.5
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'de la luxure et de l’impudicité, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ja 3:14
      metadata:
        usfm: JAS.3.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'des querelles et des jalousies. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ga 3:27
      metadata:
        usfm: GAL.3.27
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Mais revêtez-vous du Seigneur Jésus-Christ, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pi 2:11
      metadata:
        usfm: 1PE.2.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: et n’ayez pas soin de la chair pour en satisfaire les convoitises.
