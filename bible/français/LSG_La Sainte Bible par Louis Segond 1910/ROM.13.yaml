document_id: ROM.13,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Soumission aux autorités
  - type: heading
    content: 'V. 1-7: cf. 1 Pi 2:13-17. Pr 24:21, 22. Lu 20:20-26.'
  - type: text
    content: ' '
  - type: note
    content: Tit 3:1. 1 Pi 2:13.
  - type: text
    content: 'Que toute personne soit soumise aux autorités supérieures; '
  - type: note
    content: Pr 8:15. Da 4:32.
  - type: text
    content: 'car il n’y a point d’autorité qui ne vienne de Dieu, et les autorités qui existent ont été instituées de Dieu. '
  '10':
  - type: text
    content: 'L’amour ne fait point de mal au prochain: l’amour est donc l’accomplissement de la loi.'
  - type: heading
    content: 'V. 11-14: cf. 1 Th 5:4-10. Ép 5:3-18.'
  '11':
  - type: text
    content: 'Cela importe d’autant plus '
  - type: note
    content: Ép 5:14. 1 Th 5:6.
  - type: text
    content: 'que vous savez en quel temps nous sommes: c’est l’heure de vous réveiller enfin du sommeil, car maintenant le salut est plus près de nous que lorsque nous avons cru. '
  '12':
  - type: note
    content: 1 Th 5:5.
  - type: text
    content: 'La nuit est avancée, le jour approche. '
  - type: note
    content: Col 3:8.
  - type: text
    content: 'Dépouillons-nous donc des œuvres des ténèbres, et revêtons les armes de la lumière. '
  '13':
  - type: note
    content: Ph 4:8. 1 Th 4:12.
  - type: text
    content: 'Marchons honnêtement, comme en plein jour, '
  - type: note
    content: Lu 21:34. 1 Th 5:6.
  - type: text
    content: 'loin des excès et de l’ivrognerie, '
  - type: note
    content: 1 Co 6:10. Ép 5:5.
  - type: text
    content: 'de la luxure et de l’impudicité, '
  - type: note
    content: Ja 3:14.
  - type: text
    content: 'des querelles et des jalousies. '
  '14':
  - type: note
    content: Ga 3:27.
  - type: text
    content: 'Mais revêtez-vous du Seigneur Jésus-Christ, '
  - type: note
    content: 1 Pi 2:11.
  - type: text
    content: et n’ayez pas soin de la chair pour en satisfaire les convoitises.
  '2':
  - type: text
    content: 'C’est pourquoi celui qui s’oppose à l’autorité résiste à l’ordre que Dieu a établi, et ceux qui résistent attireront une condamnation sur eux-mêmes. '
  '3':
  - type: text
    content: 'Ce n’est pas pour une bonne action, c’est pour une mauvaise, que les magistrats sont à redouter. Veux-tu ne pas craindre l’autorité? Fais le bien, et tu auras son approbation. '
  '4':
  - type: text
    content: 'Le magistrat est serviteur de Dieu pour ton bien. Mais si tu fais le mal, crains; car ce n’est pas en vain qu’il porte l’épée, étant serviteur de Dieu pour exercer la vengeance et punir celui qui fait le mal. '
  '5':
  - type: text
    content: 'Il est donc nécessaire d’être soumis, non seulement par crainte de la punition, mais encore par motif de conscience. '
  '6':
  - type: text
    content: 'C’est aussi pour cela que vous payez les impôts. Car les magistrats sont des ministres de Dieu entièrement appliqués à cette fonction. '
  '7':
  - type: note
    content: Mt 22:21.
  - type: text
    content: 'Rendez à tous ce qui leur est dû: l’impôt à qui vous devez l’impôt, le tribut à qui vous devez le tribut, la crainte à qui vous devez la crainte, l’honneur à qui vous devez l’honneur.'
  - type: heading
    content: Amour mutuel. Vigilance et pureté
  - type: heading
    content: 'V. 8-10: cf. Mt 22:35-40. Ga 5:14. 1 Jn 3:11-23.'
  '8':
  - type: text
    content: 'Ne devez rien à personne, si ce n’est de vous aimer les uns les autres; '
  - type: note
    content: Ga 5:14. 1 Ti 1:5.
  - type: text
    content: 'car celui qui aime les autres a accompli la loi. '
  '9':
  - type: text
    content: 'En effet, les commandements:'
  - type: note
    content: Ex 20:13. De 5:17. Mt 19:18.
  - type: text
    content: 'Tu ne commettras point d’adultère, tu ne tueras point, tu ne déroberas point, tu ne convoiteras point, et ceux qu’il peut encore y avoir, se résument dans cette parole: '
  - type: note
    content: Lé 19:18. Mt 22:39. Mc 12:31. Ga 5:14. Ja 2:8.
  - type: text
    content: Tu aimeras ton prochain comme toi-même.
