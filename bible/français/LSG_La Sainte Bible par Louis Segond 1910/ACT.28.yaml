document_id: ACT.28,93
type_code: fra
verses:
  '1':
  - type: heading
    content: Trois mois dans l’île de Malte. Arrivée à Rome. Captivité et prédication de Paul à Rome pendant deux ans
  - type: heading
    content: 'V. 1-6: cf. Hé 13:2. (Lu 10:19. Ac 14:11, 12.) 2 Co 6:4-10.'
  - type: text
    content: 'Après nous être sauvés, nous reconnûmes que '
  - type: note
    content: Ac 27:26.
  - type: text
    content: 'l’île s’appelait Malte. '
  '10':
  - type: text
    content: On nous rendit de grands honneurs, et, à notre départ, on nous fournit les choses dont nous avions besoin.
  - type: heading
    content: 'V. 11-16: cf. 3 Jn 5-8. (Ro 1:9-15; 15:29. Ac 23:11.)'
  '11':
  - type: text
    content: 'Après un séjour de trois mois, nous nous embarquâmes sur un navire d’Alexandrie, qui avait passé l’hiver dans l’île, et qui portait pour enseigne les Dioscures. '
  '12':
  - type: text
    content: 'Ayant abordé à Syracuse, nous y restâmes trois jours. '
  '13':
  - type: text
    content: 'De là, en suivant la côte, nous atteignîmes Reggio; et, le vent du midi s’étant levé le lendemain, nous fîmes en deux jours le trajet jusqu’à Pouzzoles, '
  '14':
  - type: text
    content: 'où nous trouvâmes des frères qui nous prièrent de passer sept jours avec eux. Et c’est ainsi que nous allâmes à Rome. '
  '15':
  - type: text
    content: 'De Rome vinrent à notre rencontre, jusqu’au Forum d’Appius et aux Trois Tavernes, les frères qui avaient entendu parler de nous. Paul, en les voyant, rendit grâces à Dieu, et prit courage. '
  '16':
  - type: text
    content: 'Lorsque nous fûmes arrivés à Rome, '
  - type: note
    content: Ac 24:23; 27:3.
  - type: text
    content: on permit à Paul de demeurer en son particulier, avec un soldat qui le gardait.
  - type: heading
    content: 'V. 17-29: cf. (Ro 10:1-3; 11:1-11.) (És 6:9-12; 49:5, 6.) Ac 13:11.'
  '17':
  - type: text
    content: 'Au bout de trois jours, Paul convoqua les principaux des Juifs; et, quand ils furent réunis, il leur adressa ces paroles: Hommes frères, '
  - type: note
    content: Ac 24:12; 25:8.
  - type: text
    content: 'sans avoir rien fait contre le peuple ni contre les coutumes de nos pères, j’ai été mis en prison à Jérusalem et livré de là entre les mains des Romains. '
  '18':
  - type: text
    content: 'Après m’avoir interrogé, ils voulaient me relâcher, parce qu’il n’y avait en moi rien qui méritât la mort. '
  '19':
  - type: text
    content: 'Mais les Juifs s’y opposèrent, et j’ai été forcé d’en appeler à César, n’ayant du reste aucun dessein d’accuser ma nation. '
  '2':
  - type: text
    content: 'Les barbares nous témoignèrent une bienveillance peu commune; ils nous recueillirent tous auprès d’un grand feu, qu’ils avaient allumé parce que la pluie tombait et qu’il faisait grand froid. '
  '20':
  - type: text
    content: 'Voilà pourquoi j’ai demandé à vous voir et à vous parler; '
  - type: note
    content: Ac 23:6; 24:21.
  - type: text
    content: 'car c’est à cause de l’espérance d’Israël que je porte cette chaîne. '
  '21':
  - type: text
    content: 'Ils lui répondirent: Nous n’avons reçu de Judée aucune lettre à ton sujet, et il n’est venu aucun frère qui ait rapporté ou dit du mal de toi. '
  '22':
  - type: text
    content: 'Mais nous voudrions apprendre de toi ce que tu penses, car nous savons que cette secte rencontre partout de l’opposition. '
  '23':
  - type: text
    content: 'Ils lui fixèrent un jour, et plusieurs vinrent le trouver dans son logis. Paul leur annonça le royaume de Dieu, en rendant témoignage, et en cherchant, '
  - type: note
    content: Ge 3:15; 22:18; 26:4; 49:10. De 18:15. 2 S 7:12. Ps 132:11. És 4:2; 7:14; 9:5; 40:10. Jé 23:5; 33:14. Éz 34:23; 37:24. Da 9:24. Mi 7:20.
  - type: text
    content: 'par la loi de Moïse et par les prophètes, à les persuader de ce qui concerne Jésus. L’entretien dura depuis le matin jusqu’au soir. '
  '24':
  - type: note
    content: Ac 17:4.
  - type: text
    content: 'Les uns furent persuadés par ce qu’il disait, et les autres ne crurent point. '
  '25':
  - type: text
    content: 'Comme ils se retiraient en désaccord, Paul n’ajouta que ces mots: C’est avec raison que le Saint-Esprit, parlant à vos pères par le prophète Ésaïe, a dit:'
  '26':
  - type: text
    content: ' '
  - type: note
    content: És 6:9. Éz 12:2. Mt 13:14. Mc 4:12. Lu 8:10. Jn 12:40. Ro 11:8.
  - type: text
    content: 'Va vers ce peuple, et dis:'
  - type: text
    content: Vous entendrez de vos oreilles, et vous ne comprendrez point;
  - type: text
    content: Vous regarderez de vos yeux, et vous ne verrez point.
  '27':
  - type: text
    content: Car le cœur de ce peuple est devenu insensible;
  - type: text
    content: Ils ont endurci leurs oreilles, et ils ont fermé leurs yeux,
  - type: text
    content: De peur qu’ils ne voient de leurs yeux, qu’ils n’entendent de leurs oreilles,
  - type: text
    content: Qu’ils ne comprennent de leur cœur,
  - type: text
    content: Qu’ils ne se convertissent, et que je ne les guérisse.
  '28':
  - type: text
    content: 'Sachez donc que ce salut de Dieu a été envoyé aux païens, et qu’ils l’écouteront. '
  '29':
  - type: text
    content: '[Lorsqu’il eut dit cela, les Juifs s’en allèrent, discutant vivement entre eux.]'
  - type: heading
    content: 'V. 30-31: cf. Ép 6:19, 20. Ph 1:12-14. Col 1:24-29; 4:3, 4.'
  '3':
  - type: text
    content: 'Paul ayant ramassé un tas de broussailles et l’ayant mis au feu, une vipère en sortit par l’effet de la chaleur et s’attacha à sa main. '
  '30':
  - type: text
    content: 'Paul demeura deux ans entiers dans une maison qu’il avait louée. Il recevait tous ceux qui venaient le voir, '
  '31':
  - type: text
    content: prêchant le royaume de Dieu et enseignant ce qui concerne le Seigneur Jésus-Christ, en toute liberté et sans obstacle.
  '4':
  - type: text
    content: 'Quand les barbares virent l’animal suspendu à sa main, ils se dirent les uns aux autres: Assurément cet homme est un meurtrier, puisque la Justice n’a pas voulu le laisser vivre, après qu’il a été sauvé de la mer. '
  '5':
  - type: text
    content: 'Paul secoua l’animal dans le feu, et '
  - type: note
    content: Mc 16:18. Lu 10:19.
  - type: text
    content: 'ne ressentit aucun mal. '
  '6':
  - type: text
    content: 'Ces gens s’attendaient à le voir enfler ou tomber mort subitement; mais, après avoir longtemps attendu, voyant qu’il ne lui arrivait aucun mal, ils changèrent d’avis et '
  - type: note
    content: Ac 14:11.
  - type: text
    content: dirent que c’était un dieu.
  - type: heading
    content: 'V. 7-10: cf. Mt 8:14-16; 10:8-13.'
  '7':
  - type: text
    content: 'Il y avait, dans les environs, des terres appartenant au principal personnage de l’île, nommé Publius, qui nous reçut et nous logea pendant trois jours de la manière la plus amicale. '
  '8':
  - type: text
    content: 'Le père de Publius était alors au lit, '
  - type: note
    content: Mt 8:14.
  - type: text
    content: 'malade de la fièvre et de la dysenterie; Paul, s’étant rendu vers lui, pria, lui imposa les mains, et le guérit. '
  '9':
  - type: text
    content: 'Là-dessus, vinrent les autres malades de l’île, et ils furent guéris. '
