document_id: ACT.28
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Trois mois dans l’île de Malte. Arrivée à Rome. Captivité et prédication de Paul à Rome pendant deux ans
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-6: cf. Hé 13:2. (Lu 10:19. Ac 14:11, 12.) 2 Co 6:4-10.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Après nous être sauvés, nous reconnûmes que '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 27:26
      metadata:
        usfm: ACT.27.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'l’île s’appelait Malte. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Les barbares nous témoignèrent une bienveillance peu commune; ils nous recueillirent tous auprès d’un grand feu, qu’ils avaient allumé parce que la pluie tombait et qu’il faisait grand froid. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Paul ayant ramassé un tas de broussailles et l’ayant mis au feu, une vipère en sortit par l’effet de la chaleur et s’attacha à sa main. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Quand les barbares virent l’animal suspendu à sa main, ils se dirent les uns aux autres: Assurément cet homme est un meurtrier, puisque la Justice n’a pas voulu le laisser vivre, après qu’il a été sauvé de la mer. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Paul secoua l’animal dans le feu, et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 16:18
      metadata:
        usfm: MRK.16.18
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 10:19
      metadata:
        usfm: LUK.10.19
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'ne ressentit aucun mal. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ces gens s’attendaient à le voir enfler ou tomber mort subitement; mais, après avoir longtemps attendu, voyant qu’il ne lui arrivait aucun mal, ils changèrent d’avis et '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 14:11
      metadata:
        usfm: ACT.14.11
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: dirent que c’était un dieu.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 7-10: cf. Mt 8:14-16; 10:8-13.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il y avait, dans les environs, des terres appartenant au principal personnage de l’île, nommé Publius, qui nous reçut et nous logea pendant trois jours de la manière la plus amicale. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Le père de Publius était alors au lit, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 8:14
      metadata:
        usfm: MAT.8.14
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'malade de la fièvre et de la dysenterie; Paul, s’étant rendu vers lui, pria, lui imposa les mains, et le guérit. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Là-dessus, vinrent les autres malades de l’île, et ils furent guéris. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: On nous rendit de grands honneurs, et, à notre départ, on nous fournit les choses dont nous avions besoin.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 11-16: cf. 3 Jn 5-8. (Ro 1:9-15; 15:29. Ac 23:11.)'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Après un séjour de trois mois, nous nous embarquâmes sur un navire d’Alexandrie, qui avait passé l’hiver dans l’île, et qui portait pour enseigne les Dioscures. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ayant abordé à Syracuse, nous y restâmes trois jours. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'De là, en suivant la côte, nous atteignîmes Reggio; et, le vent du midi s’étant levé le lendemain, nous fîmes en deux jours le trajet jusqu’à Pouzzoles, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'où nous trouvâmes des frères qui nous prièrent de passer sept jours avec eux. Et c’est ainsi que nous allâmes à Rome. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'De Rome vinrent à notre rencontre, jusqu’au Forum d’Appius et aux Trois Tavernes, les frères qui avaient entendu parler de nous. Paul, en les voyant, rendit grâces à Dieu, et prit courage. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Lorsque nous fûmes arrivés à Rome, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 24:23
      metadata:
        usfm: ACT.24.23
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 27:3
      metadata:
        usfm: ACT.27.3
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: on permit à Paul de demeurer en son particulier, avec un soldat qui le gardait.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 17-29: cf. (Ro 10:1-3; 11:1-11.) (És 6:9-12; 49:5, 6.) Ac 13:11.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Au bout de trois jours, Paul convoqua les principaux des Juifs; et, quand ils furent réunis, il leur adressa ces paroles: Hommes frères, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 24:12
      metadata:
        usfm: ACT.24.12
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 25:8
      metadata:
        usfm: ACT.25.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'sans avoir rien fait contre le peuple ni contre les coutumes de nos pères, j’ai été mis en prison à Jérusalem et livré de là entre les mains des Romains. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Après m’avoir interrogé, ils voulaient me relâcher, parce qu’il n’y avait en moi rien qui méritât la mort. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Mais les Juifs s’y opposèrent, et j’ai été forcé d’en appeler à César, n’ayant du reste aucun dessein d’accuser ma nation. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Voilà pourquoi j’ai demandé à vous voir et à vous parler; '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 23:6
      metadata:
        usfm: ACT.23.6
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 24:21
      metadata:
        usfm: ACT.24.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'car c’est à cause de l’espérance d’Israël que je porte cette chaîne. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ils lui répondirent: Nous n’avons reçu de Judée aucune lettre à ton sujet, et il n’est venu aucun frère qui ait rapporté ou dit du mal de toi. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Mais nous voudrions apprendre de toi ce que tu penses, car nous savons que cette secte rencontre partout de l’opposition. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ils lui fixèrent un jour, et plusieurs vinrent le trouver dans son logis. Paul leur annonça le royaume de Dieu, en rendant témoignage, et en cherchant, '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ge 3:15
      metadata:
        usfm: GEN.3.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 22:18
      metadata:
        usfm: GEN.22.18
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 26:4
      metadata:
        usfm: GEN.26.4
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 49:10
      metadata:
        usfm: GEN.49.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: De 18:15
      metadata:
        usfm: DEU.18.15
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 S 7:12
      metadata:
        usfm: 2SA.7.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 132:11
      metadata:
        usfm: PSA.132.11
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 4:2
      metadata:
        usfm: ISA.4.2
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 7:14
      metadata:
        usfm: ISA.7.14
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 9:5
      metadata:
        usfm: ISA.9.5
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 40:10
      metadata:
        usfm: ISA.40.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 23:5
      metadata:
        usfm: JER.23.5
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 33:14
      metadata:
        usfm: JER.33.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 34:23
      metadata:
        usfm: EZK.34.23
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 37:24
      metadata:
        usfm: EZK.37.24
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Da 9:24
      metadata:
        usfm: DAN.9.24
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mi 7:20
      metadata:
        usfm: MIC.7.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'par la loi de Moïse et par les prophètes, à les persuader de ce qui concerne Jésus. L’entretien dura depuis le matin jusqu’au soir. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ac 17:4
      metadata:
        usfm: ACT.17.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Les uns furent persuadés par ce qu’il disait, et les autres ne crurent point. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Comme ils se retiraient en désaccord, Paul n’ajouta que ces mots: C’est avec raison que le Saint-Esprit, parlant à vos pères par le prophète Ésaïe, a dit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: És 6:9
      metadata:
        usfm: ISA.6.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Éz 12:2
      metadata:
        usfm: EZK.12.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 13:14
      metadata:
        usfm: MAT.13.14
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mc 4:12
      metadata:
        usfm: MRK.4.12
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 8:10
      metadata:
        usfm: LUK.8.10
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jn 12:40
      metadata:
        usfm: JHN.12.40
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ro 11:8
      metadata:
        usfm: ROM.11.8
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Va vers ce peuple, et dis:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous entendrez de vos oreilles, et vous ne comprendrez point;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous regarderez de vos yeux, et vous ne verrez point.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Car le cœur de ce peuple est devenu insensible;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ont endurci leurs oreilles, et ils ont fermé leurs yeux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De peur qu’ils ne voient de leurs yeux, qu’ils n’entendent de leurs oreilles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’ils ne comprennent de leur cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’ils ne se convertissent, et que je ne les guérisse.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Sachez donc que ce salut de Dieu a été envoyé aux païens, et qu’ils l’écouteront. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: '[Lorsqu’il eut dit cela, les Juifs s’en allèrent, discutant vivement entre eux.]'
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 30-31: cf. Ép 6:19, 20. Ph 1:12-14. Col 1:24-29; 4:3, 4.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Paul demeura deux ans entiers dans une maison qu’il avait louée. Il recevait tous ceux qui venaient le voir, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: prêchant le royaume de Dieu et enseignant ce qui concerne le Seigneur Jésus-Christ, en toute liberté et sans obstacle.
