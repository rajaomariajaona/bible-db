document_id: 1SA.23
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les habitants de Keïla attaqués par les Philistins et délivrés par David. David poursuivi par Saül
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-14: cf. 1 S 30:6-8. (Ps 31; 64; 140; 143.) 1 S 2:9.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'On vint dire à David: Voici, les Philistins ont attaqué Keïla, et ils pillent les aires. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'David consulta l’Éternel, en disant: Irai-je, et battrai-je ces Philistins? Et l’Éternel lui répondit: Va, tu battras les Philistins, et tu délivreras Keïla. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mais les gens de David lui dirent: Voici, nous ne sommes pas sans crainte ici même en Juda; que sera-ce si nous allons à Keïla contre les troupes des Philistins? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'David consulta encore l’Éternel. Et l’Éternel lui répondit: Lève-toi, descends à Keïla, car je livre les Philistins entre tes mains. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'David alla donc avec ses gens à Keïla, et il se battit contre les Philistins; il emmena leur bétail, et leur fit éprouver une grande défaite. Ainsi David délivra les habitants de Keïla. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 S 22:20
      metadata:
        usfm: 1SA.22.20
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: 'Lorsque Abiathar, fils d’Achimélec, s’enfuit vers David à Keïla, il descendit ayant en main l’éphod. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Saül fut informé de l’arrivée de David à Keïla, et il dit: Dieu le livre entre mes mains, car il est venu s’enfermer dans une ville qui a des portes et des barres. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Et Saül convoqua tout le peuple à la guerre, afin de descendre à Keïla et d’assiéger David et ses gens. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'David, ayant eu connaissance du mauvais dessein que Saül projetait contre lui, dit au sacrificateur Abiathar: Apporte l’éphod! '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Et David dit: Éternel, Dieu d’Israël, ton serviteur apprend que Saül veut venir à Keïla pour détruire la ville à cause de moi. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Les habitants de Keïla me livreront-ils entre ses mains? Saül descendra-t-il, comme ton serviteur l’a appris? Éternel, Dieu d’Israël, daigne le révéler à ton serviteur! Et l’Éternel répondit: Il descendra. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'David dit encore: Les habitants de Keïla me livreront-ils, moi et mes gens, entre les mains de Saül? Et l’Éternel répondit: Ils te livreront. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Alors David se leva avec ses gens au nombre d’environ six cents hommes; ils sortirent de Keïla, et s’en allèrent où ils purent. Saül, informé que David s’était sauvé de Keïla, suspendit sa marche. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: David demeura au désert, dans des lieux forts, et il resta sur la montagne du désert de Ziph. Saül le cherchait toujours, mais Dieu ne le livra pas entre ses mains.
- type: usfm
  marker: s1
  children:
  - type: text
    text: David dans les déserts de Ziph et de Maon
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 15-28: cf. Ps 54; 140. 1 S 26:1-4. Ps 37:32, 33.'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'David, voyant Saül en marche pour attenter à sa vie, se tint au désert de Ziph, dans la forêt. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ce fut alors que Jonathan, fils de Saül, se leva et alla vers David dans la forêt. Il fortifia sa confiance en Dieu, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'et lui dit: Ne crains rien, car la main de Saül, mon père, ne t’atteindra pas. Tu régneras sur Israël, et moi je serai au second rang près de toi; Saül, mon père, le sait bien aussi. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ils firent tous deux alliance devant l’Éternel; et David resta dans la forêt, et Jonathan s’en alla chez lui. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Les Ziphiens montèrent auprès de Saül à Guibea, et dirent: David n’est-il pas caché parmi nous dans des lieux forts, dans la forêt, sur la colline de Hakila, qui est au midi du désert? '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Descends donc, ô roi, puisque c’est là tout le désir de ton âme; et à nous de le livrer entre les mains du roi. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Saül dit: Que l’Éternel vous bénisse de ce que vous avez pitié de moi! '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Allez, je vous prie, prenez encore des informations pour savoir et découvrir dans quel lieu il a dirigé ses pas et qui l’y a vu, car il est, m’a-t-on dit, fort rusé. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Examinez et reconnaissez tous les lieux où il se cache, puis revenez vers moi avec quelque chose de certain, et je partirai avec vous. S’il est dans le pays, je le chercherai parmi tous les milliers de Juda. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ils se levèrent donc et allèrent à Ziph avant Saül. David et ses gens étaient au désert de Maon, dans la plaine au midi du désert. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Saül partit avec ses gens à la recherche de David. Et l’on en informa David, qui descendit le rocher et resta dans le désert de Maon. Saül, l’ayant appris, poursuivit David au désert de Maon. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Saül marchait d’un côté de la montagne, et David avec ses gens de l’autre côté de la montagne. David fuyait précipitamment pour échapper à Saül. Mais déjà Saül et ses gens entouraient David et les siens pour s’emparer d’eux, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'lorsqu’un messager vint dire à Saül: Hâte-toi de venir, car les Philistins ont fait invasion dans le pays. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Saül cessa de poursuivre David, et il s’en retourna pour aller à la rencontre des Philistins. C’est pourquoi l’on appela ce lieu Séla-Hammachlekoth.
