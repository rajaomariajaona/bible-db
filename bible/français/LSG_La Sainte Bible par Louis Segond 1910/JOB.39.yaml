document_id: JOB.39
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 1-33: cf. (Ps 104:18-31; 147:5, 9, 10; 148:10, 13.)'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 104:21
      metadata:
        usfm: PSA.104.21
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Chasses-tu la proie pour la lionne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et apaises-tu la faim des lionceaux,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Quand ils sont couchés dans leur tanière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand ils sont en embuscade dans leur repaire?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 147:9
      metadata:
        usfm: PSA.147.9
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 6:26
      metadata:
        usfm: MAT.6.26
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Qui prépare au corbeau sa pâture,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand ses petits crient vers Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand ils sont errants et affamés?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Sais-tu quand les chèvres sauvages font leurs petits?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 29:9
      metadata:
        usfm: PSA.29.9
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Observes-tu les biches quand elles mettent bas?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Comptes-tu les mois pendant lesquels elles portent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et connais-tu l’époque où elles enfantent?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Elles se courbent, laissent échapper leur progéniture,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et sont délivrées de leurs douleurs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Leurs petits prennent de la vigueur et grandissent en plein air,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils s’éloignent et ne reviennent plus auprès d’elles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Qui met en liberté l’âne sauvage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et l’affranchit de tout lien?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 24:5
      metadata:
        usfm: JOB.24.5
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 2:24
      metadata:
        usfm: JER.2.24
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: J’ai fait du désert son habitation,
- type: usfm
  marker: q1
  children:
  - type: text
    text: De la terre salée sa demeure.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Il se rit du tumulte des villes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il n’entend pas les cris d’un maître.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Il parcourt les montagnes pour trouver sa pâture,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est à la recherche de tout ce qui est vert.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Le buffle veut-il être à ton service?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Passe-t-il la nuit vers ta crèche?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: L’attaches-tu par une corde pour qu’il trace un sillon?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Va-t-il après toi briser les mottes des vallées?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Te reposes-tu sur lui, parce que sa force est grande?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lui abandonnes-tu le soin de tes travaux?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Te fies-tu à lui pour la rentrée de ta récolte?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Est-ce lui qui doit l’amasser dans ton aire?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: L’aile de l’autruche se déploie joyeuse;
- type: usfm
  marker: q1
  children:
  - type: text
    text: On dirait l’aile, le plumage de la cigogne.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Mais l’autruche abandonne ses œufs à la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les fait chauffer sur la poussière;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Elle oublie que le pied peut les écraser,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu’une bête des champs peut les fouler.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Elle est dure envers ses petits comme s’ils n’étaient point à elle;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle ne s’inquiète pas de l’inutilité de son enfantement.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Car Dieu lui a refusé la sagesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il ne lui a pas donné l’intelligence en partage.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Quand elle se lève et prend sa course,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle se rit du cheval et de son cavalier.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Est-ce toi qui donnes la vigueur au cheval,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qui revêts son cou d’une crinière flottante?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Le fais-tu bondir comme la sauterelle?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Son fier hennissement répand la terreur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Il creuse le sol et se réjouit de sa force,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il s’élance au-devant des armes;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Il se rit de la crainte, il n’a pas peur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il ne recule pas en face de l’épée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Sur lui retentit le carquois,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Brillent la lance et le javelot.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Bouillonnant d’ardeur, il dévore la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il ne peut se contenir au bruit de la trompette.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Quand la trompette sonne, il dit: En avant!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et de loin il flaire la bataille,
- type: usfm
  marker: q1
  children:
  - type: text
    text: La voix tonnante des chefs et les cris de guerre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Est-ce par ton intelligence que l’épervier prend son vol,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et qu’il étend ses ailes vers le midi?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Est-ce par ton ordre que l’aigle s’élève,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jé 49:16
      metadata:
        usfm: JER.49.16
    - type: text
      text: . Ab v. 4.
    marker-yv: yv-n
  - type: text
    text: Et qu’il place son nid sur les hauteurs?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: C’est dans les rochers qu’il habite, qu’il a sa demeure,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sur la cime des rochers, sur le sommet des monts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: De là il épie sa proie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il plonge au loin les regards.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ses petits boivent le sang;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mt 24:28
      metadata:
        usfm: MAT.24.28
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lu 17:37
      metadata:
        usfm: LUK.17.37
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et là où sont des cadavres, l’aigle se trouve.
- type: usfm
  marker: r
  children:
  - type: text
    text: 'V. 34-38: cf. (Job 38:1-3; 42:1-6.)'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'L’Éternel, s’adressant à Job, dit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Celui qui dispute contre le Tout-Puissant est-il convaincu?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celui qui conteste avec Dieu a-t-il une réplique à faire?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Job répondit à l’Éternel et dit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Voici, je suis trop peu de chose; que te répliquerais-je?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 39:10
      metadata:
        usfm: PSA.39.10
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Je mets la main sur ma bouche.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: J’ai parlé une fois, je ne répondrai plus;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Deux fois, je n’ajouterai rien.
