document_id: JOB.39,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-33: cf. (Ps 104:18-31; 147:5, 9, 10; 148:10, 13.)'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 104:21
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Chasses-tu la proie pour la lionne,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et apaises-tu la faim des lionceaux,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il se rit du tumulte des villes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n’entend pas les cris d’un maître.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il parcourt les montagnes pour trouver sa pâture,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est à la recherche de tout ce qui est vert.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le buffle veut-il être à ton service?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Passe-t-il la nuit vers ta crèche?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’attaches-tu par une corde pour qu’il trace un sillon?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Va-t-il après toi briser les mottes des vallées?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Te reposes-tu sur lui, parce que sa force est grande?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lui abandonnes-tu le soin de tes travaux?
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Te fies-tu à lui pour la rentrée de ta récolte?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Est-ce lui qui doit l’amasser dans ton aire?
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L’aile de l’autruche se déploie joyeuse;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On dirait l’aile, le plumage de la cigogne.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais l’autruche abandonne ses œufs à la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les fait chauffer sur la poussière;
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle oublie que le pied peut les écraser,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu’une bête des champs peut les fouler.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle est dure envers ses petits comme s’ils n’étaient point à elle;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle ne s’inquiète pas de l’inutilité de son enfantement.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand ils sont couchés dans leur tanière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand ils sont en embuscade dans leur repaire?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car Dieu lui a refusé la sagesse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne lui a pas donné l’intelligence en partage.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand elle se lève et prend sa course,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle se rit du cheval et de son cavalier.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Est-ce toi qui donnes la vigueur au cheval,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qui revêts son cou d’une crinière flottante?
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le fais-tu bondir comme la sauterelle?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Son fier hennissement répand la terreur.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il creuse le sol et se réjouit de sa force,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il s’élance au-devant des armes;
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il se rit de la crainte, il n’a pas peur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne recule pas en face de l’épée.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur lui retentit le carquois,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Brillent la lance et le javelot.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bouillonnant d’ardeur, il dévore la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne peut se contenir au bruit de la trompette.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Quand la trompette sonne, il dit: En avant!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et de loin il flaire la bataille,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La voix tonnante des chefs et les cris de guerre.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Est-ce par ton intelligence que l’épervier prend son vol,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et qu’il étend ses ailes vers le midi?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 147:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 6:26
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Qui prépare au corbeau sa pâture,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand ses petits crient vers Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand ils sont errants et affamés?
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Est-ce par ton ordre que l’aigle s’élève,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 49:16
      - type: text
        text: . Ab v. 4.
      marker-yv: yv-n
    - type: text
      text: Et qu’il place son nid sur les hauteurs?
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C’est dans les rochers qu’il habite, qu’il a sa demeure,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur la cime des rochers, sur le sommet des monts.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De là il épie sa proie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il plonge au loin les regards.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses petits boivent le sang;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mt 24:28
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lu 17:37
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Et là où sont des cadavres, l’aigle se trouve.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 34-38: cf. (Job 38:1-3; 42:1-6.)'
    marker-yv: yv-h
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'L’Éternel, s’adressant à Job, dit:'
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui dispute contre le Tout-Puissant est-il convaincu?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui conteste avec Dieu a-t-il une réplique à faire?
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Job répondit à l’Éternel et dit:'
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, je suis trop peu de chose; que te répliquerais-je?
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 39:10
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Je mets la main sur ma bouche.
  '38':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J’ai parlé une fois, je ne répondrai plus;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Deux fois, je n’ajouterai rien.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sais-tu quand les chèvres sauvages font leurs petits?
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps 29:9
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: Observes-tu les biches quand elles mettent bas?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comptes-tu les mois pendant lesquels elles portent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et connais-tu l’époque où elles enfantent?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles se courbent, laissent échapper leur progéniture,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et sont délivrées de leurs douleurs.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leurs petits prennent de la vigueur et grandissent en plein air,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils s’éloignent et ne reviennent plus auprès d’elles.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui met en liberté l’âne sauvage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et l’affranchit de tout lien?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 24:5
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 2:24
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: J’ai fait du désert son habitation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De la terre salée sa demeure.
