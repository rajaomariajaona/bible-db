document_id: JOB.39,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-33: cf. (Ps 104:18-31; 147:5, 9, 10; 148:10, 13.)'
  - type: text
    content: ' '
  - type: note
    content: Ps 104:21.
  - type: text
    content: Chasses-tu la proie pour la lionne,
  - type: text
    content: Et apaises-tu la faim des lionceaux,
  '10':
  - type: text
    content: Il se rit du tumulte des villes,
  - type: text
    content: Il n’entend pas les cris d’un maître.
  '11':
  - type: text
    content: Il parcourt les montagnes pour trouver sa pâture,
  - type: text
    content: Il est à la recherche de tout ce qui est vert.
  '12':
  - type: text
    content: Le buffle veut-il être à ton service?
  - type: text
    content: Passe-t-il la nuit vers ta crèche?
  '13':
  - type: text
    content: L’attaches-tu par une corde pour qu’il trace un sillon?
  - type: text
    content: Va-t-il après toi briser les mottes des vallées?
  '14':
  - type: text
    content: Te reposes-tu sur lui, parce que sa force est grande?
  - type: text
    content: Lui abandonnes-tu le soin de tes travaux?
  '15':
  - type: text
    content: Te fies-tu à lui pour la rentrée de ta récolte?
  - type: text
    content: Est-ce lui qui doit l’amasser dans ton aire?
  '16':
  - type: text
    content: L’aile de l’autruche se déploie joyeuse;
  - type: text
    content: On dirait l’aile, le plumage de la cigogne.
  '17':
  - type: text
    content: Mais l’autruche abandonne ses œufs à la terre,
  - type: text
    content: Et les fait chauffer sur la poussière;
  '18':
  - type: text
    content: Elle oublie que le pied peut les écraser,
  - type: text
    content: Qu’une bête des champs peut les fouler.
  '19':
  - type: text
    content: Elle est dure envers ses petits comme s’ils n’étaient point à elle;
  - type: text
    content: Elle ne s’inquiète pas de l’inutilité de son enfantement.
  '2':
  - type: text
    content: Quand ils sont couchés dans leur tanière,
  - type: text
    content: Quand ils sont en embuscade dans leur repaire?
  '20':
  - type: text
    content: Car Dieu lui a refusé la sagesse,
  - type: text
    content: Il ne lui a pas donné l’intelligence en partage.
  '21':
  - type: text
    content: Quand elle se lève et prend sa course,
  - type: text
    content: Elle se rit du cheval et de son cavalier.
  '22':
  - type: text
    content: Est-ce toi qui donnes la vigueur au cheval,
  - type: text
    content: Et qui revêts son cou d’une crinière flottante?
  '23':
  - type: text
    content: Le fais-tu bondir comme la sauterelle?
  - type: text
    content: Son fier hennissement répand la terreur.
  '24':
  - type: text
    content: Il creuse le sol et se réjouit de sa force,
  - type: text
    content: Il s’élance au-devant des armes;
  '25':
  - type: text
    content: Il se rit de la crainte, il n’a pas peur,
  - type: text
    content: Il ne recule pas en face de l’épée.
  '26':
  - type: text
    content: Sur lui retentit le carquois,
  - type: text
    content: Brillent la lance et le javelot.
  '27':
  - type: text
    content: Bouillonnant d’ardeur, il dévore la terre,
  - type: text
    content: Il ne peut se contenir au bruit de la trompette.
  '28':
  - type: text
    content: 'Quand la trompette sonne, il dit: En avant!'
  - type: text
    content: Et de loin il flaire la bataille,
  - type: text
    content: La voix tonnante des chefs et les cris de guerre.
  '29':
  - type: text
    content: Est-ce par ton intelligence que l’épervier prend son vol,
  - type: text
    content: Et qu’il étend ses ailes vers le midi?
  '3':
  - type: text
    content: ' '
  - type: note
    content: Ps 147:9. Mt 6:26.
  - type: text
    content: Qui prépare au corbeau sa pâture,
  - type: text
    content: Quand ses petits crient vers Dieu,
  - type: text
    content: Quand ils sont errants et affamés?
  '30':
  - type: text
    content: Est-ce par ton ordre que l’aigle s’élève,
  - type: note
    content: Jé 49:16. Ab v. 4.
  - type: text
    content: Et qu’il place son nid sur les hauteurs?
  '31':
  - type: text
    content: C’est dans les rochers qu’il habite, qu’il a sa demeure,
  - type: text
    content: Sur la cime des rochers, sur le sommet des monts.
  '32':
  - type: text
    content: De là il épie sa proie,
  - type: text
    content: Il plonge au loin les regards.
  '33':
  - type: text
    content: Ses petits boivent le sang;
  - type: note
    content: Mt 24:28. Lu 17:37.
  - type: text
    content: Et là où sont des cadavres, l’aigle se trouve.
  - type: heading
    content: 'V. 34-38: cf. (Job 38:1-3; 42:1-6.)'
  '34':
  - type: text
    content: 'L’Éternel, s’adressant à Job, dit:'
  '35':
  - type: text
    content: Celui qui dispute contre le Tout-Puissant est-il convaincu?
  - type: text
    content: Celui qui conteste avec Dieu a-t-il une réplique à faire?
  '36':
  - type: text
    content: 'Job répondit à l’Éternel et dit:'
  '37':
  - type: text
    content: Voici, je suis trop peu de chose; que te répliquerais-je?
  - type: note
    content: Ps 39:10.
  - type: text
    content: Je mets la main sur ma bouche.
  '38':
  - type: text
    content: J’ai parlé une fois, je ne répondrai plus;
  - type: text
    content: Deux fois, je n’ajouterai rien.
  '4':
  - type: text
    content: Sais-tu quand les chèvres sauvages font leurs petits?
  - type: note
    content: Ps 29:9.
  - type: text
    content: Observes-tu les biches quand elles mettent bas?
  '5':
  - type: text
    content: Comptes-tu les mois pendant lesquels elles portent,
  - type: text
    content: Et connais-tu l’époque où elles enfantent?
  '6':
  - type: text
    content: Elles se courbent, laissent échapper leur progéniture,
  - type: text
    content: Et sont délivrées de leurs douleurs.
  '7':
  - type: text
    content: Leurs petits prennent de la vigueur et grandissent en plein air,
  - type: text
    content: Ils s’éloignent et ne reviennent plus auprès d’elles.
  '8':
  - type: text
    content: Qui met en liberté l’âne sauvage,
  - type: text
    content: Et l’affranchit de tout lien?
  '9':
  - type: text
    content: ' '
  - type: note
    content: Job 24:5. Jé 2:24.
  - type: text
    content: J’ai fait du désert son habitation,
  - type: text
    content: De la terre salée sa demeure.
