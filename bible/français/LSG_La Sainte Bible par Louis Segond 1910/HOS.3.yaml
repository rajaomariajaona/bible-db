document_id: HOS.3,93
type_code: fra
verses:
  '1':
  - type: heading
    content: 'V. 1-5: cf. Os 1. (Jé 3:6, etc.; 30:3, 8, 9.) (Lu 21:24. Ro 11:25, etc.)'
  - type: text
    content: 'L’Éternel me dit: Va encore, et aime une femme aimée d’un amant, et adultère; aime-la comme l’Éternel aime les enfants d’Israël, qui se tournent vers d’autres dieux et qui aiment les gâteaux de raisins. '
  '2':
  - type: text
    content: 'Je l’achetai pour quinze sicles d’argent, un homer d’orge et un léthec d’orge. '
  '3':
  - type: text
    content: 'Et je lui dis: '
  - type: note
    content: De 21:11.
  - type: text
    content: 'Reste longtemps pour moi, ne te livre pas à la prostitution, ne sois à aucun homme, et je serai de même envers toi. '
  '4':
  - type: text
    content: 'Car les enfants d’Israël resteront longtemps '
  - type: note
    content: Os 10:3.
  - type: text
    content: 'sans roi, sans chef, sans sacrifice, sans statue, sans éphod, et sans théraphim. '
  '5':
  - type: text
    content: 'Après cela, les enfants d’Israël reviendront; ils chercheront l’Éternel, leur Dieu, et '
  - type: note
    content: Jé 30:9. Éz 34:23; 37:22.
  - type: text
    content: 'David, leur roi; et ils tressailliront à la vue de l’Éternel et de sa bonté, '
  - type: note
    content: És 2:2. Mi 4:1.
  - type: text
    content: dans la suite des temps.
