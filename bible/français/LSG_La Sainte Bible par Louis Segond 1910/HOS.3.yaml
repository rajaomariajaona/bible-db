document_id: HOS.3,93
type_code: fra
verses:
  '1':
  - type: usfm
    marker: r
    children:
    - type: text
      text: 'V. 1-5: cf. Os 1. (Jé 3:6, etc.; 30:3, 8, 9.) (Lu 21:24. Ro 11:25, etc.)'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'L’Éternel me dit: Va encore, et aime une femme aimée d’un amant, et adultère; aime-la comme l’Éternel aime les enfants d’Israël, qui se tournent vers d’autres dieux et qui aiment les gâteaux de raisins. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Je l’achetai pour quinze sicles d’argent, un homer d’orge et un léthec d’orge. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Et je lui dis: '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: De 21:11
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'Reste longtemps pour moi, ne te livre pas à la prostitution, ne sois à aucun homme, et je serai de même envers toi. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Car les enfants d’Israël resteront longtemps '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Os 10:3
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'sans roi, sans chef, sans sacrifice, sans statue, sans éphod, et sans théraphim. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Après cela, les enfants d’Israël reviendront; ils chercheront l’Éternel, leur Dieu, et '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jé 30:9
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Éz 34:23
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 37:22
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: 'David, leur roi; et ils tressailliront à la vue de l’Éternel et de sa bonté, '
    - type: usfm
      marker: x
      children:
      - type: usfm
        marker: ref
        children:
        - type: text
          text: És 2:2
      - type: text
        text: '. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mi 4:1
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: dans la suite des temps.
