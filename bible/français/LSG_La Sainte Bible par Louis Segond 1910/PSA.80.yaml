document_id: PSA.80
type_code: fra
segments:
- type: usfm
  marker: r
  children:
  - type: text
    text: (2 Ch 30:1-11. És 5:1-7.) Ps 44.
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef des chantres. Sur les lis lyriques. D’Asaph. Psaume.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Prête l’oreille, berger d’Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toi qui conduis Joseph comme un troupeau!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parais dans ta splendeur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toi qui es assis sur les chérubins!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Devant Éphraïm, Benjamin et Manassé, réveille ta force,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et viens à notre secours!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: O Dieu, relève-nous!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 4:7
      metadata:
        usfm: PSA.4.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 31:17
      metadata:
        usfm: PSA.31.17
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 67:2
      metadata:
        usfm: PSA.67.2
    - type: text
      text: '. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Da 9:17
      metadata:
        usfm: DAN.9.17
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Fais briller ta face, et nous serons sauvés!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Éternel, Dieu des armées!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jusques à quand t’irriteras-tu contre la prière de ton peuple?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tu les nourris d’un pain de larmes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu les abreuves de larmes à pleine mesure.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tu fais de nous un objet de discorde pour nos voisins,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: x
    children:
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps 44:14
      metadata:
        usfm: PSA.44.14
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 79:4
      metadata:
        usfm: PSA.79.4
    - type: text
      text: .
    marker-yv: yv-n
  - type: text
    text: Et nos ennemis se raillent de nous.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Dieu des armées, relève-nous!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fais briller ta face, et nous serons sauvés!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tu avais arraché de l’Égypte une vigne;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu as chassé des nations, et tu l’as plantée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tu as fait place devant elle:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle a jeté des racines et rempli la terre;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Les montagnes étaient couvertes de son ombre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ses rameaux étaient comme des cèdres de Dieu;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Elle étendait ses branches jusqu’à la mer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et ses rejetons jusqu’au fleuve.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Pourquoi as-tu rompu ses clôtures,
- type: usfm
  marker: q1
  children:
  - type: text
    text: En sorte que tous les passants la dépouillent?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Le sanglier de la forêt la ronge,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les bêtes des champs en font leur pâture.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Dieu des armées, reviens donc!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Regarde du haut des cieux, et vois! Considère cette vigne!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Protège ce que ta droite a planté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et le fils que tu t’es choisi!…
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Elle est brûlée par le feu, elle est coupée!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils périssent devant ta face menaçante.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Que ta main soit sur l’homme de ta droite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sur le fils de l’homme que tu t’es choisi!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Et nous ne nous éloignerons plus de toi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fais-nous revivre, et nous invoquerons ton nom.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Éternel, Dieu des armées, relève-nous!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fais briller ta face, et nous serons sauvés!
