document_id: PSA.80,93
type_code: fra
verses:
  '1':
  - type: heading
    content: (2 Ch 30:1-11. És 5:1-7.) Ps 44.
  - type: text
    content: Au chef des chantres. Sur les lis lyriques. D’Asaph. Psaume.
  '10':
  - type: text
    content: 'Tu as fait place devant elle:'
  - type: text
    content: Elle a jeté des racines et rempli la terre;
  '11':
  - type: text
    content: Les montagnes étaient couvertes de son ombre,
  - type: text
    content: Et ses rameaux étaient comme des cèdres de Dieu;
  '12':
  - type: text
    content: Elle étendait ses branches jusqu’à la mer,
  - type: text
    content: Et ses rejetons jusqu’au fleuve.
  '13':
  - type: text
    content: Pourquoi as-tu rompu ses clôtures,
  - type: text
    content: En sorte que tous les passants la dépouillent?
  '14':
  - type: text
    content: Le sanglier de la forêt la ronge,
  - type: text
    content: Et les bêtes des champs en font leur pâture.
  '15':
  - type: text
    content: Dieu des armées, reviens donc!
  - type: text
    content: Regarde du haut des cieux, et vois! Considère cette vigne!
  '16':
  - type: text
    content: Protège ce que ta droite a planté,
  - type: text
    content: Et le fils que tu t’es choisi!…
  '17':
  - type: text
    content: Elle est brûlée par le feu, elle est coupée!
  - type: text
    content: Ils périssent devant ta face menaçante.
  '18':
  - type: text
    content: Que ta main soit sur l’homme de ta droite,
  - type: text
    content: Sur le fils de l’homme que tu t’es choisi!
  '19':
  - type: text
    content: Et nous ne nous éloignerons plus de toi.
  - type: text
    content: Fais-nous revivre, et nous invoquerons ton nom.
  '2':
  - type: text
    content: Prête l’oreille, berger d’Israël,
  - type: text
    content: Toi qui conduis Joseph comme un troupeau!
  - type: text
    content: Parais dans ta splendeur,
  - type: text
    content: Toi qui es assis sur les chérubins!
  '20':
  - type: text
    content: Éternel, Dieu des armées, relève-nous!
  - type: text
    content: Fais briller ta face, et nous serons sauvés!
  '3':
  - type: text
    content: Devant Éphraïm, Benjamin et Manassé, réveille ta force,
  - type: text
    content: Et viens à notre secours!
  '4':
  - type: text
    content: O Dieu, relève-nous!
  - type: note
    content: Ps 4:7; 31:17; 67:2. Da 9:17.
  - type: text
    content: Fais briller ta face, et nous serons sauvés!
  '5':
  - type: text
    content: Éternel, Dieu des armées!
  - type: text
    content: Jusques à quand t’irriteras-tu contre la prière de ton peuple?
  '6':
  - type: text
    content: Tu les nourris d’un pain de larmes.
  - type: text
    content: Tu les abreuves de larmes à pleine mesure.
  '7':
  - type: text
    content: Tu fais de nous un objet de discorde pour nos voisins,
  - type: note
    content: Ps 44:14; 79:4.
  - type: text
    content: Et nos ennemis se raillent de nous.
  '8':
  - type: text
    content: Dieu des armées, relève-nous!
  - type: text
    content: Fais briller ta face, et nous serons sauvés!
  '9':
  - type: text
    content: Tu avais arraché de l’Égypte une vigne;
  - type: text
    content: Tu as chassé des nations, et tu l’as plantée.
